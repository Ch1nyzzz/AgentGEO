"><span data-dcnode-id="1719" instrument_node="">37</span></a><span data-dcnode-id="1717" instrument_node="">] and the inclusion of a wide range of stakeholders in the design of a sustainable bioeconomy (ibid; [</span><a aria-label="Reference 33" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d3796380e1338" title="Balkema A, Pols A (2015) Biofuels: sustainable innovation or gold rush? Identifying responsibilities for biofuel innovations. In: Koops BJ, Oosterlaken I, Romijn H, Swierstra T, Van den Hoven J (eds) Responsible innovation 2: concepts, approaches, and applications. Springer, Dordrecht, pp 283–303"><span data-dcnode-id="1716" instrument_node="">33</span></a><span data-dcnode-id="1714" instrument_node="">, </span><a aria-label="Reference 38" data-dcnode-id="1712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d3796380e1342" title="Levidow L, Birch K, Papaioannou T (2012) EU agri-innovation policy: two contending visions of the bio-economy. Crit Policy Stud 6(1):40–65"><span data-dcnode-id="1713" instrument_node="">38</span></a><span data-dcnode-id="1711" instrument_node="">, </span><a aria-label="Reference 39" data-dcnode-id="1709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d3796380e1345" title="Schuurbiers D, Osseweijer P, Kinderlerer J (2007) Future issues in industrial biotechnology. Biotechnol J 2007(2):1112–1120"><span data-dcnode-id="1710" instrument_node="">39</span></a><span data-dcnode-id="1708" instrument_node="">]).</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">Overall the value of economic justice is widely shared. The main challenge here is how to bring it about effectively in relation to industrial biotechnology. Some actors claim that industrial biotechnology should be largely abandoned because they see it as inherently tied up with unjust economic systems. Others see many promising opportunities offered by industrial biotechnology [</span><a aria-label="Reference 17" data-dcnode-id="1704" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d3796380e1351" title="Asveld L, Ganzevles J, Osseweijer P, Landeweerd L (2014) Naturally sustainable: the social aspects of the transition to a sustainable bio-economy. Delft University of Technology, Delft"><span data-dcnode-id="1705" instrument_node="">17</span></a><span data-dcnode-id="1703" instrument_node="">]. The call for wide-ranging participation is one we will pick up on here as a means of dealing with the many societal and ethical issues surrounding industrial biotechnology.</span></p></div></div></section><section data-dcnode-id="1571" data-title="Responsible Research and Innovation for Industrial Biotechnology"><div class="c-article-section" data-dcnode-id="1572" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1697" id="Sec12"><span data-dcnode-id="1698" instrument_node="">Responsible Research and Innovation for Industrial Biotechnology</span></h2><div class="c-article-section__content" data-dcnode-id="1573" id="Sec12-content"><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">As we have shown, there are many societally intricate issues related to industrial biotechnology. To support societally intricate technological trajectories, the approach of Responsible Research and Innovation (RRI) has been proposed. RRI has been defined as:</span></p><blockquote class="c-blockquote" data-dcnode-id="1686"><div class="c-blockquote__body" data-dcnode-id="1687"><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1693" instrument_node="">A transparent, interactive process by which societal actors and innovators become mutually responsive to each other with a view to the ethical acceptability, sustainability and societal desirability of the innovation process and its marketable products (in order to allow a proper embedding of scientific and technological advances in our society). (Von Schomberg [</span><a aria-label="Reference 40" data-dcnode-id="1691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d3796380e1367" title="Von Schomberg R (2011) Towards responsible research and innovation in the information and communication technologies and security technologies fields. Publication Office of the European Union, Luxembourg"><span data-dcnode-id="1692" instrument_node="">40</span></a><span data-dcnode-id="1690" instrument_node="">], p. 9)</span></p><span data-dcnode-id="1688" instrument_node="">
</span></div></blockquote><p data-dcnode-id="1678"><span data-dcnode-id="1685" instrument_node="">The approach of Responsible Research and Innovation (RRI) can be understood as an attempt to align new technologies with societal concerns and needs. RRI is intended to help designers and manufacturers of new technologies identify and accommodate public concerns when developing a new technology by engaging with a wide range of relevant actors [</span><a aria-label="Reference 41" data-dcnode-id="1683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d3796380e1374" title="Van den Hoven JVD, Jacob K (2013) Options for strengthening responsible research and innovation. European Commission, Brussels"><span data-dcnode-id="1684" instrument_node="">41</span></a><span data-dcnode-id="1682" instrument_node="">]. As such RRI can be considered as a tool to answer questions about the direction in which we would want to use available scientific and technical knowledge (cf. [</span><a aria-label="Reference 32" data-dcnode-id="1680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d3796380e1377" title="Owen R, Macnaghten P, Stilgoe J (2012) Responsible research and innovation: from science in society to science for society, with society. Sci Public Policy 39:751–760"><span data-dcnode-id="1681" instrument_node="">32</span></a><span data-dcnode-id="1679" instrument_node="">]).</span></p><p data-dcnode-id="1673"><span data-dcnode-id="1677" instrument_node="">RRI has four dimensions, namely, anticipation, reflexivity, inclusion and responsiveness [</span><a aria-label="Reference 42" data-dcnode-id="1675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d3796380e1383" title="Stilgoe J, Owen R, Macnaghten P (2013) Developing a framework for responsible innovation. Res Policy 42(9):1568–1580"><span data-dcnode-id="1676" instrument_node="">42</span></a><span data-dcnode-id="1674" instrument_node="">]. We will consider in turn how these might play out a role in industrial biotechnology.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1671" id="Sec13"><span data-dcnode-id="1672" instrument_node="">Anticipation</span></h3><span data-dcnode-id="1670" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="1661"><div class="c-blockquote__body" data-dcnode-id="1662"><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1668" instrument_node="">Anticipation involves systematic thinking aimed at increasing resilience, while revealing new opportunities for innovation and the shaping of agendas for socially-robust risk research. (Stilgoe et al. [</span><a aria-label="Reference 42" data-dcnode-id="1666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d3796380e1397" title="Stilgoe J, Owen R, Macnaghten P (2013) Developing a framework for responsible innovation. Res Policy 42(9):1568–1580"><span data-dcnode-id="1667" instrument_node="">42</span></a><span data-dcnode-id="1665" instrument_node="">])</span></p><span data-dcnode-id="1663" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Aside from promising visions on sustainability, new industrial biotechnologies also bring about new uncertainties. Questions arise about the exact environmental impacts of new technologies and about how to control new potential risks. And questions arise about what sustainability amounts to and what innovation trajectories should be instigated to achieve sustainability. Well-informed anticipation that includes a variety of perspectives may potentially substantially reduce uncertainty and thereby prevent the occurrence of unwanted consequences. RRI asks innovators to consider the possible effects of their innovation in an integral and structured way.</span></p><p data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">However, anticipation is always necessarily limited. Unexpected consequences may emerge even after the most thorough and inclusive anticipation efforts. As van de Poel [</span><a aria-label="Reference 43" data-dcnode-id="1655" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d3796380e1408" title="Van de Poel I (2017) Society as a laboratory to experiment with new technologies. In: Bowman D, Stokes E, Rip A (eds) Embedding new technologies into society: a regulatory, ethical and societal perspective, 1st edn. Pan Stanford Publishing, Singapore, pp 61–68"><span data-dcnode-id="1656" instrument_node="">43</span></a><span data-dcnode-id="1654" instrument_node="">] shows, this is due to the complex epistemological uncertainties that surrounds a new technology, i.e. technologies can have impacts on so many different levels that it is often impossible to predict all of them correctly, also because many of these effects depend on how individuals will eventually apply a new technology and what (moral) meanings they associate with a technology.</span></p><p data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">Still it is important to try and foresee the possible effects an innovation might have and to try and accommodate this, as much as possible. When an alternative for a naturally occurring substance is produced by means of industrial biotechnology, it makes sense to think about the effects the new product may have on the existing value chain. Moreover, it is also possible to anticipate uncertainty and try to design an innovation in such a way that it can be adapted if unforeseen, unwanted effects occur (ibid). With the production of biofuels, for instance, it can be advisable, for example, to set up production systems that are flexible in terms of feedstock [</span><a aria-label="Reference 44" data-dcnode-id="1650" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d3796380e1414" title="Parada MP, Asveld L, Osseweijer P et al (2018) Setting the design space of biorefineries through sustainability values, a practical approach. Biofuels Bioprod Biorefin 12(1):29–44"><span data-dcnode-id="1651" instrument_node="">44</span></a><span data-dcnode-id="1649" instrument_node="">]. If new insights emerge that indicate that a particular feedstock might not be so sustainable after all, a flexible production system allows to switch to another, more sustainable feedstock.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1646" id="Sec14"><span data-dcnode-id="1647" instrument_node="">Reflexivity</span></h3><p data-dcnode-id="1635"><span data-dcnode-id="1645" instrument_node="">RRI asks for reflexivity in actors implying that they critically assess their own preconceptions. When different actors have different perceptions about the desirability of a technology, it can be possible for actors to construct a compromise or even a shared perspective on that technology. However, such a shared perspective or compromise requires a willingness to reconsider one’s own position and the associated preconceptions [</span><a aria-label="Reference 16" data-dcnode-id="1643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d3796380e1426" title="Asveld L, Stemerding D (2018) Social learning in the bioeconomy: the case of Ecover. In: Van de Poel I, Asveld L, Mehos D (eds) Experimentation beyond the laboratory: new perspectives on technology in society. Routledge, London, pp 103–124"><span data-dcnode-id="1644" instrument_node="">16</span></a><span data-dcnode-id="1642" instrument_node="">, </span><a aria-label="Reference 45" data-dcnode-id="1640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d3796380e1429" title="Roling N (2002) Beyond the aggregation of individual preferences: moving from multiple to distributed cognition in resource dilemmas. In: Leeuwis C, Assen RP (eds) Wheelbarrows full of frogs: social learning in rural resource management. Koninklijke Van Gorcum, pp 25–47"><span data-dcnode-id="1641" instrument_node="">45</span></a><span data-dcnode-id="1639" instrument_node="">]. If environmental activists are unwilling to reconsider their preconception that </span><i data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">all</span></i><span data-dcnode-id="1636" instrument_node=""> genetic engineering is unsustainable, it will be hard to achieve a common vision with other people who are convinced that genetic engineering is essential to achieve a sustainable society. However, possibly these groups can find a common ground, such as agreeing that instead of genetic engineering, directed evolution as a means to achieve sustainable applications, is considered acceptable by all groups involved. To achieve such a common ground, each of the actors involved will need to carefully consider their values, beliefs and convictions to see what kind of innovations are compatible with it or what kind of compromises might be acceptable.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1633" id="Sec15"><span data-dcnode-id="1634" instrument_node="">Inclusion</span></h3><p data-dcnode-id="1622"><span data-dcnode-id="1632" instrument_node="">Inclusion implies that a wide range of people and perspectives is taken into account when developing a new technology [</span><a aria-label="Reference 42" data-dcnode-id="1630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d3796380e1443" title="Stilgoe J, Owen R, Macnaghten P (2013) Developing a framework for responsible innovation. Res Policy 42(9):1568–1580"><span data-dcnode-id="1631" instrument_node="">42</span></a><span data-dcnode-id="1629" instrument_node="">]. In the bio-based economy, inclusion already takes place in many shapes, such as for the certification and monitoring of sustainable biomass [</span><a aria-label="Reference 46" data-dcnode-id="1627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d3796380e1446" title="Van Dam J, Junginger M, Faaij A et al (2008) Overview of recent developments in sustainable biomass certification. Biomass Bioenergy 32(8):749–780"><span data-dcnode-id="1628" instrument_node="">46</span></a><span data-dcnode-id="1626" instrument_node="">]. There is an ongoing international debate on the norms for sustainable biomass as well as on the quality of the labels monitoring these norms [</span><a aria-label="Reference 17" data-dcnode-id="1624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d3796380e1449" title="Asveld L, Ganzevles J, Osseweijer P, Landeweerd L (2014) Naturally sustainable: the social aspects of the transition to a sustainable bio-economy. Delft University of Technology, Delft"><span data-dcnode-id="1625" instrument_node="">17</span></a><span data-dcnode-id="1623" instrument_node="">]. A wide variety of actors takes part in these debates, such as NGOs, companies and governmental organisations. Their views are incorporated in schemes for the certification and monitoring of the sustainability. The criteria by which sustainability is determined are hence done in an inclusive, participatory manner.</span></p><p data-dcnode-id="1611"><span data-dcnode-id="1621" instrument_node="">According to RRI such inclusion should go beyond the formulation of criteria and extend to the actual design choices that are being made when developing a new technology. There are of course many practical and institutional barriers to actually implement a wide variety of perspectives into the R&amp;D phase of innovation, such as confidentiality issues, a balanced division of responsibility [</span><a aria-label="Reference 47" data-dcnode-id="1619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d3796380e1455" title="Blok V, Lemmens P (2015) The emerging concept of responsible innovation. Three reasons why it is questionable and calls for a radical transformation of the concept of innovation. In: Koops BJ, Oosterlaken I, Romijn H et al (eds) Responsible innovation 2: concepts, approaches, and applications. Springer, Dordrecht, pp 19–35"><span data-dcnode-id="1620" instrument_node="">47</span></a><span data-dcnode-id="1618" instrument_node="">] and stakeholders who might not be willing to get involved [</span><a aria-label="Reference 48" data-dcnode-id="1616" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d3796380e1458" title="Noorman M, Swierstra T, Zandbergen D (2017) Questioning the normative core of RI: the challenges posed to stakeholder engagement in a corporate setting. In: Asveld L, Van dam-Mieras MEC, Swierstra T et al (eds) Responsible innovation 3: a European agenda. Springer, New York, pp 231–239"><span data-dcnode-id="1617" instrument_node="">48</span></a><span data-dcnode-id="1615" instrument_node="">] or are unable to get involved due to geographical or time-management reasons [</span><a aria-label="Reference 49" data-dcnode-id="1613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d3796380e1461" title="Sonck M, Asveld L, Landeweerd L et al (2017) Creative tensions: mutual responsiveness adapted to private sector research and development. Life Sci Soc Policy 13(1):14"><span data-dcnode-id="1614" instrument_node="">49</span></a><span data-dcnode-id="1612" instrument_node="">].</span></p><p data-dcnode-id="1603"><span data-dcnode-id="1610" instrument_node="">Even if these barriers occur, there are still actions that companies and other innovators can undertake to assure a representation of a wide variety of perspectives. One option is to learn from other related cases what are relevant concerns from stakeholders. The cases described above can, for instance, serve as guide for the kind of societal concerns that might affect comparable industrial biotechnology products [</span><a aria-label="Reference 16" data-dcnode-id="1608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d3796380e1467" title="Asveld L, Stemerding D (2018) Social learning in the bioeconomy: the case of Ecover. In: Van de Poel I, Asveld L, Mehos D (eds) Experimentation beyond the laboratory: new perspectives on technology in society. Routledge, London, pp 103–124"><span data-dcnode-id="1609" instrument_node="">16</span></a><span data-dcnode-id="1607" instrument_node="">]. Also, stakeholders that are at a given time unavailable might be represented by other parties that are available such as academic experts or NGOs [</span><a aria-label="Reference 49" data-dcnode-id="1605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d3796380e1470" title="Sonck M, Asveld L, Landeweerd L et al (2017) Creative tensions: mutual responsiveness adapted to private sector research and development. Life Sci Soc Policy 13(1):14"><span data-dcnode-id="1606" instrument_node="">49</span></a><span data-dcnode-id="1604" instrument_node="">].</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">Once a wide variety of perspectives has been identified, either indirectly as described above or directly through interviews or workshops, they can be used to inform the design choices made in an innovation trajectory. Such choices can, for instance, concern the choice for a particular feedstock, for a particular kind of technology or for centralised or decentralised production facilities [</span><a aria-label="Reference 44" data-dcnode-id="1600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d3796380e1476" title="Parada MP, Asveld L, Osseweijer P et al (2018) Setting the design space of biorefineries through sustainability values, a practical approach. Biofuels Bioprod Biorefin 12(1):29–44"><span data-dcnode-id="1601" instrument_node="">44</span></a><span data-dcnode-id="1599" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1596" id="Sec16"><span data-dcnode-id="1597" instrument_node="">Responsiveness</span></h3><p data-dcnode-id="1588"><span data-dcnode-id="1595" instrument_node="">The last dimension of RRI is that of responsiveness and this might be seen as an overarching attitude for which the other three strategies are essential conditions. Responsiveness is the action that is taken after innovators have anticipated possible effects of their innovation, have been reflective and have included a wide variety of perspectives [</span><a aria-label="Reference 32" data-dcnode-id="1593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d3796380e1487" title="Owen R, Macnaghten P, Stilgoe J (2012) Responsible research and innovation: from science in society to science for society, with society. Sci Public Policy 39:751–760"><span data-dcnode-id="1594" instrument_node="">32</span></a><span data-dcnode-id="1592" instrument_node="">, </span><a aria-label="Reference 49" data-dcnode-id="1590" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d3796380e1490" title="Sonck M, Asveld L, Landeweerd L et al (2017) Creative tensions: mutual responsiveness adapted to private sector research and development. Life Sci Soc Policy 13(1):14"><span data-dcnode-id="1591" instrument_node="">49</span></a><span data-dcnode-id="1589" instrument_node="">].</span></p><p data-dcnode-id="1583"><span data-dcnode-id="1587" instrument_node="">Stilgoe et al. [</span><a aria-label="Reference 42" data-dcnode-id="1585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d3796380e1496" title="Stilgoe J, Owen R, Macnaghten P (2013) Developing a framework for responsible innovation. Res Policy 42(9):1568–1580"><span data-dcnode-id="1586" instrument_node="">42</span></a><span data-dcnode-id="1584" instrument_node="">] define responsiveness as a willingness to change an innovation when it becomes clear that it conflicts on crucial issues with values of other stakeholders: ‘Responsible innovation requires a capacity to change shape or direction in response to stakeholder and public values and changing circumstances’. Especially in a setting that is continuously evolving and where the learning curve on social values is steep such as in the bio-based economy, a responsive attitude is crucial to achieve societally robust innovations. The public outcry over using food crops for fuel has, for instance, intensified the policy support for fuels from nonedible parts of crops and algae. This can be considered a responsive attitude towards societal concerns of biotechnological innovations.</span></p><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">It can be difficult to be responsive because innovations are sometimes locked into their own trajectory. It is possible to change the policy surrounding biofuels, but it may also be difficult to change the production platforms of the biofuels. Responsiveness is hence not always technologically possible without abandoning existing production facilities. Therefore responsiveness can be a costly affair if not managed properly. According to RRI philosophy, companies should always be aware of the need for responsiveness and try to incorporate it in their innovation strategies by ensuring some form of flexibility. For the biotech companies described in the beginning, such responsiveness seems available to different degrees because they can switch to different end products if needed without changing the core of their business, namely, the production platform (engineered micro-organisms).</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">Responsiveness does not necessarily always imply a change in course of those developing an innovation. Although they had the option to change to other end products, all three biotech companies that faced societal criticism (e.g. Amyris, Evolva and Solazyme) are actually still producing as they were before. They have considered the societal criticism, and they did not deem it necessary to change their innovations. The management of Solazyme started a new company focussing on health foods based on non-engineered algae, named TerraVia, thereby expanding their portfolio. They are also still producing oil from engineered algae. However, the end-user of the algae-based oil that Solazyme produced, Ecover, has stopped using the oil as ingredient for their detergents, even though they still deem it a desirable innovation. The innovation manager, Tom Domen, thought the company needed to reconsider its communication and engagement strategies before continuing with a controversial innovation such as the algae-based oil [</span><a aria-label="Reference 9" data-dcnode-id="1578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e1505" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="1579" instrument_node="">9</span></a><span data-dcnode-id="1577" instrument_node="">].</span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">These different responses to societal criticism show that responsiveness does not necessarily imply the same course of actions for each company. Ultimately, the response to other stakeholders’ values and concerns needs to be in line with the innovators’ own values and concerns; otherwise it becomes a hollow public relations exercise in which the company or the innovators lose track of their own moral compass and motivation. Responsiveness does not imply a blind catering to societal concerns; it does, however, imply a reflection on one’s own motives and values in light of such societal concerns. This might lead to an adaptation of the technology, but it should, at minimum, lead to a better articulation and explication of the reasons and values behind choices made in a particular innovation process.</span></p></div></div></section><section data-dcnode-id="1524" data-title="Reflecting Social Issues in Sustainability Assessment for Industrial Biotechnology"><div class="c-article-section" data-dcnode-id="1525" id="Sec17-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1569" id="Sec17"><span data-dcnode-id="1570" instrument_node="">Reflecting Social Issues in Sustainability Assessment for Industrial Biotechnology</span></h2><div class="c-article-section__content" data-dcnode-id="1526" id="Sec17-content"><p data-dcnode-id="1558"><span data-dcnode-id="1568" instrument_node="">Sustainability was already introduced in Sect. </span><a data-dcnode-id="1566" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec7"><span data-dcnode-id="1567" instrument_node="">3.1</span></a><span data-dcnode-id="1565" instrument_node=""> as one of the five social ethical issues in relation to potential social, environmental and economic impacts that may derive from the application of novel biotechnologies. Such impacts should in principle be qualitatively or quantitatively assessed to determine whether a process, product or service should be realised or not. In other words, knowing the potential positive or negative consequences (in terms of social, environmental and economic impacts) of a novel biotechnology-related project – throughout the entire value chain – is a valuable instrument to motivate and support debates among the five social ethical issues (see Sect. </span><a data-dcnode-id="1563" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="1564" instrument_node="">3</span></a><span data-dcnode-id="1562" instrument_node="">) and allows a structured reflection on the four dimensions of RRI (see Sect. </span><a data-dcnode-id="1560" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec12"><span data-dcnode-id="1561" instrument_node="">4</span></a><span data-dcnode-id="1559" instrument_node="">).</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1557" instrument_node="">In the case of economic and environmental impacts assessment, multiple methodologies are already available and have extensively been described in literature [</span><a aria-label="Reference 50" data-dcnode-id="1555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d3796380e1533" title="Posada JA, Osseweijer P (2016) Socio-economic and environmental considerations for sustainable supply and fractionation of lignocellulosic biomass in a biorefinery context. In: Mussatto S (ed) Biomass fractionation technologies for a lignocellulosic feedstock based biorefinery. 1st edn. Elsevier, Amsterdam pp 611–631"><span data-dcnode-id="1556" instrument_node="">50</span></a><span data-dcnode-id="1554" instrument_node="">]. However, in the case of social sustainability assessment, literature is scarce since methodologies are still under development, being social impact assessment (SIA) and social life cycle assessment (SLCA) the most commonly used approaches [</span><a aria-label="Reference 13" data-dcnode-id="1552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d3796380e1536" title="Macombe C (2019) Social Life Cycle Assessment (sLCA) for Industrial Biotechnology. In: Fröhling M, Hiete M (eds) Sustainability and life cycle assessment in industrial biotechnology, advances in biochemical engineering/biotechnology. Springer, Berlin"><span data-dcnode-id="1553" instrument_node="">13</span></a><span data-dcnode-id="1551" instrument_node="">, </span><a aria-label="Reference 51" data-dcnode-id="1549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d3796380e1539" title="Lehmann A, Russi D, Bala A et al (2011) Integration of social aspects in decision support, based on life cycle thinking. Sustainability 3:562–577"><span data-dcnode-id="1550" instrument_node="">51</span></a><span data-dcnode-id="1548" instrument_node="">]. The former considers on-site specific impacts, while the latter accounts for the entire life cycle. In the case of the SLCA methodology, a twofold classification of social impacts is considered, i.e. stakeholder categories and impact categories, and such social impacts are subdivided into social, socio-economic and geographical subcategories. These subcategories deal with 31 aspects of the entire value chain, such as working conditions and employment, health and safety (H&amp;S) aspects (at different levels), access to resources (material and immaterial), contribution to economic and technology development and corporate responsibility, among others [</span><a aria-label="Reference 52" data-dcnode-id="1546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d3796380e1542" title="UNEP/SETAC (2013) (Pre-publication version) the methodological sheets for subcategories in social life cycle assessment (S-LCA). UNEP/SETAC Life Cycle Initiative, Gothenburg"><span data-dcnode-id="1547" instrument_node="">52</span></a><span data-dcnode-id="1545" instrument_node="">].</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1543" instrument_node="">In the particular case of industrial biotechnology for biofuels and biochemicals production, some of the most critical social issues are related to food security, land use, water availability, energy security, rural and social development, employment, working conditions and health and safety impacts [</span><a aria-label="Reference 50" data-dcnode-id="1541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d3796380e1548" title="Posada JA, Osseweijer P (2016) Socio-economic and environmental considerations for sustainable supply and fractionation of lignocellulosic biomass in a biorefinery context. In: Mussatto S (ed) Biomass fractionation technologies for a lignocellulosic feedstock based biorefinery. 1st edn. Elsevier, Amsterdam pp 611–631"><span data-dcnode-id="1542" instrument_node="">50</span></a><span data-dcnode-id="1540" instrument_node="">]. For instance, land expansion for industrial biotechnology applications had raised concerns in the last decade on food security and land competition for food production, especially in view of the increasing food demand of a constantly growing population. Although this connection has been in public scrutiny as the food-vs-fuel debate, there is evidence that the effect of biofuels production on food prices is limited as compared to the effects from the oil prices [</span><a aria-label="Reference 35" data-dcnode-id="1538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d3796380e1551" title="Souza GM, Victoria RL, Joly CA et al (2015) Bioenergy &amp; sustainability: bridging the gaps. SCOPE72, Paris, Sao Paulo"><span data-dcnode-id="1539" instrument_node="">35</span></a><span data-dcnode-id="1537" instrument_node="">]. Another concern from biomass production and expansion for industrial biotechnology applications is that such projects may significantly affect water availability and quality for other basic uses like sanitation or food production. Although this concern highly depends on contextual features (e.g. geographical location, crop type, cultivation practice and agricultural practices, among others), it has also been demonstrated that water consumption per ton of bio-based feedstock can significantly be decreased due to technological improvements in water recovery and recycling by using closed-loop water cycles and municipal wastewaters. However, it is also acknowledged that further water stress would raise from growing biomass production demands [</span><a aria-label="Reference 50" data-dcnode-id="1535" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d3796380e1554" title="Posada JA, Osseweijer P (2016) Socio-economic and environmental considerations for sustainable supply and fractionation of lignocellulosic biomass in a biorefinery context. In: Mussatto S (ed) Biomass fractionation technologies for a lignocellulosic feedstock based biorefinery. 1st edn. Elsevier, Amsterdam pp 611–631"><span data-dcnode-id="1536" instrument_node="">50</span></a><span data-dcnode-id="1534" instrument_node="">]. On the other hand, industrial biotechnology-related projects, like biofuels and biochemicals production, have shown positive social effects, at local and global scales, in terms of employment creation (e.g. over 3.5 million (direct and indirect) jobs globally in the bioenergy transportation sector by 2010 [</span><a aria-label="Reference 53" data-dcnode-id="1532" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d3796380e1557" title="IRENA (2011) Renewable energy jobs: status, prospects and policies. IRENA Working Paper, Abu Dhabi"><span data-dcnode-id="1533" instrument_node="">53</span></a><span data-dcnode-id="1531" instrument_node="">]), value generation (e.g. increase in the municipal GDP per capita, regional tax income and poverty reduction [</span><a aria-label="Reference 54" data-dcnode-id="1529" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d3796380e1560" title="Satolo LF, Bacchi M (2013) Impacts of the recent expansion of the sugarcane sector on municipal per capita income in São Paulo state. ISRN Economics 2013:1–14"><span data-dcnode-id="1530" instrument_node="">54</span></a><span data-dcnode-id="1528" instrument_node="">]), infrastructure investments and social services contributions.</span></p></div></div></section><section data-dcnode-id="1517" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1518" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1522" id="Sec18"><span data-dcnode-id="1523" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1519" id="Sec18-content"><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Industrial biotechnology carries the promise of sustainable solutions based on natural resources. However, some issues invoke societal criticism, showing that different actors have different perspectives on salient issues. These issues include sustainability, naturalness, risk management, innovation trajectories and economic justice. To achieve societally robust innovations, innovators can learn from actors who have a different view on a specific application. The framework of Responsible Research and Innovations offers guidelines to organise such learning. These guidelines are based on the principles of anticipation, inclusion, reflexivity and responsiveness. The outcome of such a learning process might be that an innovation trajectory is adapted, or at minimum that the innovators are aware of possible objections to their innovation and can widen their understanding of their own motivation for pursuing that innovation. Currently efforts are on the way to integrate social and economic aspects into LCA, but these are still in their infancy.</span></p></div></div></section><span data-dcnode-id="1516" instrument_node="">
</span><section data-dcnode-id="1462" data-title="Notes" lang="en"><div class="c-article-section" data-dcnode-id="1463" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1514" id="notes"><span data-dcnode-id="1515" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1464" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1465"><li class="c-article-footnote--listed__item" data-dcnode-id="1506" id="Fn1"><span class="c-article-footnote--listed__index" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">1.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1507"><p data-dcnode-id="1508"><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.etcgroup.org/"><span data-dcnode-id="1511" instrument_node="">www.etcgroup.org</span></a><span data-dcnode-id="1509" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1498" id="Fn2"><span class="c-article-footnote--listed__index" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">2.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1499"><p data-dcnode-id="1500"><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//investors.amyris.com/news-releases/news-release-details/amyris-scientists-describe-breakthrough-development-anti"><span data-dcnode-id="1503" instrument_node="">http://investors.amyris.com/news-releases/news-release-details/amyris-scientists-describe-breakthrough-development-anti</span></a><span data-dcnode-id="1501" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1490" id="Fn3"><span class="c-article-footnote--listed__index" data-dcnode-id="1496"><span data-dcnode-id="1497" inst "">http://solazymeindustrials.com/</span></a><span data-dcnode-id="1469" instrument_node="">.</span></p></div></li></ol></div></div></section><div data-dcnode-id="990" id="MagazineFulltextChapterBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="991" data-title="References"><div class="c-article-section" data-dcnode-id="992" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1460" id="Bib1"><span data-dcnode-id="1461" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="993" id="Bib1-content"><div data-container-section="references" data-dcnode-id="994"><ol class="c-article-references" data-dcnode-id="1004"><li class="c-article-references__item js-c-reading-companion-references-item" data-counter="1." data-dcnode-id="1453"><p class="c-article-references__text" data-dcnode-id="1458" id="ref-CR1"><span data-dcnode-id="1459" instrument_node="">Gaskell G, Stares S, Allansdottir A et al (2006) Eurobarometer 64.3: Europeans and biotechnology in 2005: patterns and trends, a report to the European Commission’s Directorate-General for Research, Brussels</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="1454" id="ref-CR1-links"><a data-dcnode-id="1456" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3F%26q%3DGaskell%2520G%252C%2520Stares%2520S%252C%2520Allansdottir%2520A%2520et%2520al%2520%282006%29%2520Eurobarometer%252064.3%3A%2520Europeans%2520and%2520biotechnology%2520in%25202005%3A%2520patterns%2520and%2520trends%252C%2520a%2520report%2520to%2520the%2520European%2520Commission%25E2%2580%2599s%2520Directorate-General%2520for%2520Research%252C%2520Brussels"><span data-dcnode-id="1457" instrument_node="">
