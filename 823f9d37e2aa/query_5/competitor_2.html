</span><h1 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Controversial issues</span></h1><span data-dcnode-id="911" instrument_node="">

</span><div class="sectionHeader" data-dcnode-id="881"><span data-dcnode-id="904" instrument_node="">
</span><div class="description" data-dcnode-id="883"><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">History is not an easy subject as it is full of contradictions and challenging situations. It requires children to look at how people responded to complicated dilemmas. It also requires them to consider motivation. Looking at what people did in the past children to make links with present events. It requires children to evaluate the history of their own country and how it has interacted with other people. </span><a data-dcnode-id="899" href="#" id="showmore"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Read more</span></strong></a></p><span data-dcnode-id="897" instrument_node="">
</span><div data-dcnode-id="888" id="intro_more" style="display:none;"><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">There are controversial topics such as slavery and the Holocaust that are challenging to reach and are not appropriate for younger children. Migration and the treatment of those who came allow children to investigate ideas around personal identity. This section will also demonstrate links with British values and teaching SMSC.</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">In this section, you will find examples of resources that will provide some practical examples for planning and teaching. Within this, it will provide advice and support for those who want to tackle some controversial and emotive issues but lack the confidence to try.</span></p><span data-dcnode-id="892" instrument_node=""> </span><a data-dcnode-id="889" href="#" id="showless"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Show less</span></strong></a></div><span data-dcnode-id="887" instrument_node="">
