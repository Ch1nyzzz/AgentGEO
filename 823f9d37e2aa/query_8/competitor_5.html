Darwinism examples?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="693"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="694" href="#What_are_social_Darwinism_implications" title="What are social Darwinism implications?"><span data-dcnode-id="695" instrument_node="">What are social Darwinism implications?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="690"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="691" href="#What_is_social_Darwinism_significance" title="What is social Darwinism significance?"><span data-dcnode-id="692" instrument_node="">What is social Darwinism significance?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="687"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="688" href="#Social_Darwinism_Imperialism" title="Social Darwinism Imperialism"><span data-dcnode-id="689" instrument_node="">Social Darwinism Imperialism</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="684"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="685" href="#Should_Darwin_be_blamed_for_Social_Darwinism" title="Should Darwin be blamed for Social Darwinism?"><span data-dcnode-id="686" instrument_node="">Should Darwin be blamed for Social Darwinism?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="681"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="682" href="#More_resources_to_study_pre-Darwinism_and_Post-Darwinism" title="More resources to study pre-Darwinism and Post-Darwinism"><span data-dcnode-id="683" instrument_node="">More resources to study pre-Darwinism and Post-Darwinism</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="675" instrument_node="">
</span><h3 data-dcnode-id="671"><span class="ez-toc-section" data-dcnode-id="674" id="Background"></span><span data-dcnode-id="673" instrument_node="">Background</span><span class="ez-toc-section-end" data-dcnode-id="672"></span></h3><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">The Victorian era which started in the year 1837 is usually known as the period of logic and reasoning. The thought process of the people of that age changed due to the industrial revolution. This was also the period when </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/charles-darwin-during-victorian-era2.html"><span data-dcnode-id="668" instrument_node="">Charles Darwin</span></a><span data-dcnode-id="666" instrument_node="">&nbsp;published a theory about the origin of the species.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Before the theory was published people believed that God has created the universe as well as men. But the theory demolished this concept which caused a great stir in the society. The religious sentiments were hurt and lots of people were strictly against this theory.</span></p><span data-dcnode-id="661" instrument_node="">
</span><h2 data-dcnode-id="657"><span class="ez-toc-section" data-dcnode-id="660" id="What_is_social_Darwinism_definition_for_dummies"></span><span data-dcnode-id="659" instrument_node="">What is social Darwinism definition for dummies?</span><span class="ez-toc-section-end" data-dcnode-id="658"></span></h2><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="655" instrument_node="">In modern times, </span><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Social Darwinism</span></strong><span data-dcnode-id="652" instrument_node=""> is a name given to various theories of society that emerged in England and the United States in the 19th century. Social Darwinism applies biological concepts of natural selection and survival of the fittest to branches like sociology and politics.</span></p><div class="code-block code-block-3" data-dcnode-id="644" style="margin: 8px 0; clear: both;"><span data-dcnode-id="650" instrument_node="">
</span><span data-dcnode-id="648" instrument_node="">
</span><div data-dcnode-id="647" id="ezoic-pub-ad-placeholder-114"></div><span data-dcnode-id="646" instrument_node="">
</span></div><span data-dcnode-id="643" instrument_node="">
</span><h3 data-dcnode-id="639"><span class="ez-toc-section" data-dcnode-id="642" id="What_are_social_Darwinist_beliefs"></span><span data-dcnode-id="641" instrument_node="">What are social Darwinist beliefs?</span><span class="ez-toc-section-end" data-dcnode-id="640"></span></h3><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Social Darwinists usually argue that the strong should see their wealth and power increase while the weak should see their wealth and power decrease.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">However, there is a&nbsp;difference of opinion on which groups of people which are strong and the ones which are weak. Many such views stress competition between individuals in laissez-faire capitalism; whereas the opposite concept of government intervention in social development (also known as Reform Darwinism) motivated ideas of eugenics, racism, imperialism, fascism, Nazism and struggle between national or racial groups.</span></p><div class="code-block code-block-4" data-dcnode-id="626" style="margin: 8px 0; clear: both;"><span data-dcnode-id="632" instrument_node="">
</span><span data-dcnode-id="630" instrument_node="">
</span><div data-dcnode-id="629" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">So, to define simply, Social Darwinism is an&nbsp;application of survival of the fittest to sociology. Eugenics is a different idea but can be motivated by Social Darwinism. It is the selective breeding of humans to produce “favorable” traits, as one might do with livestock or dogs.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The world has gone through a number of changes and these changes have been visible in different periods. Most of the changes were brought by certain incidents which shook the base of that period.</span></p><div class="code-block code-block-9" data-dcnode-id="613" style="margin: 8px 0; clear: both;"><span data-dcnode-id="619" instrument_node="">
</span><span data-dcnode-id="617" instrument_node="">
</span><div data-dcnode-id="616" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="615" instrument_node="">
</span></div><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Victorian Social Darwinism is now largely discredited.</span></p><span data-dcnode-id="609" instrument_node="">
</span><figure aria-describedby="caption-attachment-1584" class="wp-caption alignnone" data-dcnode-id="605" id="attachment_1584" style="width: 570px"><img alt="Charles Darwin resting against pillar covered with vines." class="size-full wp-image-1584" data-dcnode-id="608" height="782" loading="lazy" sizes="(max-width: 570px) 100vw, 570px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/charles-darwin-during-victorian-era2-1.jpg&amp;raw" srcset="http://victorian-era.org/images/charles-darwin-during-victorian-era2-1.jpg 570w, http://victorian-era.org/images/charles-darwin-during-victorian-era2-1-219x300.jpg 219w" width="570"><figcaption class="wp-caption-text" data-dcnode-id="606" id="caption-attachment-1584"><span data-dcnode-id="607" instrument_node="">Charles Darwin</span></figcaption></figure><span data-dcnode-id="604" instrument_node="">
</span><blockquote data-dcnode-id="600"><p data-dcnode-id="601"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Social Darwinism applied biological concepts of natural selection and survival of the fittest to sociology and politics.</span></strong></p></blockquote><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="595"><span class="ez-toc-section" data-dcnode-id="598" id="Who_advocated_social_Darwinism"></span><span data-dcnode-id="597" instrument_node="">Who advocated social Darwinism?</span><span class="ez-toc-section-end" data-dcnode-id="596"></span></h3><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Social Darwinism was advocated by Herbert Spencer and others in the late 19th and early 20th centuries. Spencer was instrumental in developing theories that linked natural and social sciences under an umbrella of evolution. His belief was that biological evolution has resulted in human intellect, which in turn produced society. So his argument was, human intellectual ability and social activities were a result of biological evolution, and all three operated on natural laws.</span></p><div class="code-block code-block-10" data-dcnode-id="585" style="margin: 8px 0; clear: both;"><span data-dcnode-id="591" instrument_node="">
</span><span data-dcnode-id="589" instrument_node="">
</span><div data-dcnode-id="588" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">It was an absolute reflection of English industrialism, which was promoting competition and exploitation. His assertion was that all facets of life, be it human, plant, or animal life, are guided by the constant struggle. In this process, the weak were subjugated by the strong. However unlikable humanitarians might find this process, it was the natural order of things and could not be altered by charity, government welfare policies, or legislative actions.</span></p><span data-dcnode-id="581" instrument_node="">
</span><h3 data-dcnode-id="577"><span class="ez-toc-section" data-dcnode-id="580" id="Reasons_used_to_advocate_social_Darwinism"></span><span data-dcnode-id="579" instrument_node="">Reasons used to advocate social Darwinism</span><span class="ez-toc-section-end" data-dcnode-id="578"></span></h3><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">One of the reasons was imperialism in nature as elaborated in above section.Social Darwinism was used to justify political conservatism, imperialism, and racism and to discourage intervention and reform.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Social Darwinism was used to justify political conservatism, imperialism, and racism and to discourage intervention and reform.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">There are some relevant ideas during this period were Victorian degeneration theory and post-Darwinian theories of evolution. Another interesting debate you may wish to look up is&nbsp;pre-Darwinian vs post-Darwinian.</span></p><span data-dcnode-id="567" instrument_node="">
</span><h3 data-dcnode-id="563"><span class="ez-toc-section" data-dcnode-id="566" id="What_are_social_Darwinism_examples"></span><span data-dcnode-id="565" instrument_node="">What are social Darwinism examples?</span><span class="ez-toc-section-end" data-dcnode-id="564"></span></h3><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Here are some examples of Social Darwinism.</span></p><span data-dcnode-id="559" instrument_node="">
</span><ol data-dcnode-id="546"><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">A belief that an ethnic group or race is superior</span></li><span data-dcnode-id="555" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="554" instrument_node="">Humanitarian assistance blocked for few and promoted for others which include government welfare programs</span><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">.</span></strong></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Applying Charles Darwin’s theory to human society like economics and politics. Applying the theory of “survival of the fittest” to humans.</span></li><span data-dcnode-id="547" instrument_node="">
</span></ol><span data-dcnode-id="545" instrument_node="">
</span><h3 data-dcnode-id="541"><span class="ez-toc-section" data-dcnode-id="544" id="What_are_social_Darwinism_implications"></span><span data-dcnode-id="543" instrument_node="">What are social Darwinism implications?</span><span class="ez-toc-section-end" data-dcnode-id="542"></span></h3><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Some terrible implications of Social Darwinism are in justifying racism and thoughts of one ethnicity being superior. Proponents of this theory argue that some human races and ethnic groups have more desirable and stronger traits. These groups end up dominating perceived weaker and defective&nbsp;groups and deserve dominion. Adolph Hitler used the theory of Social Darwinism in declaring Aryan race being superior and others like Jews and minorities being inferior.</span></p><div class="code-block code-block-11" data-dcnode-id="531" style="margin: 8px 0; clear: both;"><span data-dcnode-id="537" instrument_node="">
</span><span data-dcnode-id="535" instrument_node="">
</span><div data-dcnode-id="534" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="530" instrument_node="">
</span><h3 data-dcnode-id="526"><span class="ez-toc-section" data-dcnode-id="529" id="What_is_social_Darwinism_significance"></span><span data-dcnode-id="528" instrument_node="">What is social Darwinism significance?</span><span class="ez-toc-section-end" data-dcnode-id="527"></span></h3><span data-dcnode-id="525" instrument_node="">
</span><p class="qtext_para" data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">While originally meant as rules of nature, it does not mean that the&nbsp;</span><i data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">fittest one</span></i><span data-dcnode-id="521" instrument_node="">&nbsp;will survive and that the most adapted to survive will remain.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p class="qtext_para" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Society is not following the rules as Darwin’s natural selection, there is no reproduction of the poor&nbsp;or the criminals. It just means that society determines a rule of selection about who is worthy and who should be ostracized. These rules are determined by society itself. In my opinion, the significance of social Darwinism ends there.</span></p><span data-dcnode-id="516" instrument_node="">
</span><h3 data-dcnode-id="512"><span class="ez-toc-section" data-dcnode-id="515" id="Social_Darwinism_Imperialism"></span><span data-dcnode-id="514" instrument_node="">Social Darwinism Imperialism</span><span class="ez-toc-section-end" data-dcnode-id="513"></span></h3><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">As per Social Darwinism, Imperialism was the natural expansion and success of a well-evolved culture and this expansion would help remove or improve underperforming cultures.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Imperialism in Europe was at its peak between 1850 and 1950. Great Britain ruled vast regions of the globe. To justify their control of the colonial population, for several years, Europeans had stated that the colonial population was inferior and so needed to be controlled by the more intelligent Europeans.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">It changed in the second half of the nineteenth century when&nbsp;</span><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">On the Origin of Species</span></em><span data-dcnode-id="501" instrument_node="">&nbsp;by Charles Darwin was published. While it was attacked for opposing to the church and the bible, was soon accepted as a “scientific” explanation for the dominance of Europeans. Darwinism was used as a major justification for racism and imperialism, especially by fascist governments like that of as Hitler’s Germany.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">This was how is social Darwinism is linked to imperialism.</span></p><span data-dcnode-id="496" instrument_node="">
</span><h3 data-dcnode-id="492"><span class="ez-toc-section" data-dcnode-id="495" id="Should_Darwin_be_blamed_for_Social_Darwinism"></span><span data-dcnode-id="494" instrument_node="">Should Darwin be blamed for Social Darwinism?</span><span class="ez-toc-section-end" data-dcnode-id="493"></span></h3><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Absolutely NO!</span></p><span data-dcnode-id="488" instrument_node="">
