</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1308" id="mntl-sc-block_1-0"><span data-dcnode-id="1312" instrument_node="">
A custom is defined as a </span><a data-component="link" data-dcnode-id="1310" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/culture-definition-4135409"><span data-dcnode-id="1311" instrument_node="">cultural idea</span></a><span data-dcnode-id="1309" instrument_node=""> that describes a regular, patterned behavior that is considered characteristic of life in a social system. Shaking hands, bowing, and kissing—all customs—are methods of greeting people. The method most commonly used in a given society helps distinguish one culture from another.

Key Takeaways</span></h3><span data-dcnode-id="1291" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1280" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1290" instrument_node="">
</span><ul data-dcnode-id="1281"><li data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">A custom is a pattern of behavior that is followed by members of a particular culture, for example, shaking hands upon meeting someone.</span></li><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Customs foster social harmony and unity within a group.</span></li><li data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">If a law goes against an established social custom, the law may be difficult to uphold. </span></li><li data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">The loss of cultural norms, such as customs, can cause a grief reaction that leads to mourning.</span></li></ul></div><span data-dcnode-id="1279" instrument_node="">
</span></div><span data-dcnode-id="1277" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1276" id="toc-the-origins-of-customs"></span><span data-dcnode-id="1275" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1270" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1274" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node=""> The Origins of Customs </span></span><span data-dcnode-id="1271" instrument_node=""> </span></h2><span data-dcnode-id="1269" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1264" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1268" instrument_node="">
Customs can persist for generations, as new members of a society learn about existing customs through a process of </span><a data-component="link" data-dcnode-id="1266" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/socialization-in-sociology-4104466"><span data-dcnode-id="1267" instrument_node="">socialization</span></a><span data-dcnode-id="1265" instrument_node="">. Generally, as a member of society, most people adhere to customs without any real understanding of why they exist or how they got started.&nbsp;

</span><div class="rail-video__title" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Do You Know When to Use Affect vs. Effect?</span></div><span data-dcnode-id="989" instrument_node="">
</span></div><span data-dcnode-id="987" instrument_node="">
</span></div><span data-dcnode-id="985" instrument_node="">
</span></div></div><span data-dcnode-id="982" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="980" id="mntl-sc-block_1-0-6"><span data-dcnode-id="981" instrument_node="">
Societal customs often begin out of habit. A man clasps the hand of another upon first greeting him. The other man—and perhaps still others who are observing— take note. When they meet someone on the street later, they extend a hand. After a while, the handshaking action becomes habitual and takes on a life of its own.
</span></p><span data-dcnode-id="979" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="968" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="969" id="mntl-block_6-0"><span data-dcnode-id="978" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="966" id="toc-the-importance-of-customs"></span><span data-dcnode-id="965" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="960" id="mntl-sc-block_1-0-8"><span data-dcnode-id="964" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node=""> The Importance of Customs&nbsp; </span></span><span data-dcnode-id="961" instrument_node=""> </span></h2><span data-dcnode-id="959" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="954" id="mntl-sc-block_1-0-9"><span data-dcnode-id="958" instrument_node="">
Over time, customs become the laws of social life, and because customs are so important to social harmony, breaking them can theoretically result in an upheaval that has little or nothing to do with the custom itself—particularly when the reasons perceived for breaking it have no bearing in fact.&nbsp;For example, after handshaking becomes a norm, an individual who declines to offer his hand upon meeting another may be looked down upon and or perceived as being suspicious. </span><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Why won't he shake hands? What's wrong with him?</span></em><span data-dcnode-id="955" instrument_node="">
</span></p><span data-dcnode-id="953" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="942" id="mntl-sc-block_1-0-10"><div class="comp mntl-block" data-dcnode-id="943" id="mntl-block_7-0"><span data-dcnode-id="952" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard3-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="945" data-height="600" id="ref-billboard3-sticky-dynamic_2-0" style="height: 600px; top: 2025px;"><span data-dcnode-id="951" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="939" id="mntl-sc-block_1-0-11"><span data-dcnode-id="940" instrument_node="">
Assuming that a handshake is a very important custom, consider what might happen if an entire segment of a population suddenly decided to stop shaking hands. Animosity might grow between those who continued to shake hands and those who did not. This anger and unease might even escalate. Those who continue to shake hands might assume the non-shakers refuse to participate because they're unwashed or dirty. Or perhaps, those who no longer shake hands have come to believe they're superior and don't want to sully themselves by touching an inferior person.
</span></p><span data-dcnode-id="938" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="927" id="mntl-sc-block_1-0-12"><div class="comp mntl-block" data-dcnode-id="928" id="mntl-block_8-0"><span data-dcnode-id="937" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="924" id="mntl-sc-block_1-0-13"><span data-dcnode-id="925" instrument_node="">
It's for reasons such as these that conservative forces often warn that breaking customs can result in the decline of society. While this may be true in some instances, more progressive voices argue that in order for society to evolve, certain customs must be left behind.
</span></p><span data-dcnode-id="923" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="922" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="921" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="920" id="toc-when-custom-meets-law"></span><span data-dcnode-id="919" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="914" id="mntl-sc-block_1-0-15"><span data-dcnode-id="918" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node=""> When Custom Meets Law&nbsp; </span></span><span data-dcnode-id="915" instrument_node=""> </span></h2><span data-dcnode-id="913" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="905" id="mntl-sc-block_1-0-16"><span data-dcnode-id="912" instrument_node="">
Sometimes a political group seizes on a particular societal custom and, for one reason or another, works to legislate it. An example of this would be </span><a data-component="link" data-dcnode-id="910" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/history-of-prohibition-1779250"><span data-dcnode-id="911" instrument_node="">Prohibition</span></a><span data-dcnode-id="909" instrument_node="">. When temperance forces in the United States came into a position of prominence, they lobbied to make the manufacture, transport, and sale of alcohol illegal. Congress passed the </span><a data-component="link" data-dcnode-id="907" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/the-18th-amendment-1779200"><span data-dcnode-id="908" instrument_node="">18th Amendment</span></a><span data-dcnode-id="906" instrument_node=""> to the Constitution in January 1919 and the law was enacted a year later.&nbsp;
</span></p><span data-dcnode-id="904" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="903" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="902" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="897" id="mntl-sc-block_1-0-18"><span data-dcnode-id="901" instrument_node="">
While a popular concept, </span><a data-component="link" data-dcnode-id="899" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/temperance-movement-prohibition-timeline-3530548"><span data-dcnode-id="900" instrument_node="">temperance</span></a><span data-dcnode-id="898" instrument_node="">&nbsp;was never accepted as a custom by American society as a whole. Consuming alcohol was never declared illegal or unconstitutional, and plenty of citizens continued to find ways to make, move, and buy alcohol despite the laws contravening those actions.
</span></p><span data-dcnode-id="896" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="885" id="mntl-sc-block_1-0-19"><div class="comp mntl-block" data-dcnode-id="886" id="mntl-block_9-0"><span data-dcnode-id="895" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard5-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="888" data-height="600" id="ref-billboard5-sticky-dynamic_2-0" style="height: 600px;"><span data-dcnode-id="894" instrument_node="">

</span><div class="wrapper" data-auction-floor-id="10ba6b0f121548579b01537d8368aa14" data-auction-floor-value="55" data-dcnode-id="892" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[250, 250],[200, 200],[180, 150],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">
</span></div><span data-dcnode-id="887" instrument_node="">
</span></div></div><span data-dcnode-id="884" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="882" id="mntl-sc-block_1-0-20"><span data-dcnode-id="883" instrument_node="">
The failure of Prohibition demonstrates that when customs and laws promote similar thinking and values, the law is more likely to be successful, while aws that are not backed by custom and acceptance are more likely to fail. Congress repealed the 18th Amendment in 1933.&nbsp;
</span></p><span data-dcnode-id="881" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="880" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="879" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="878" id="toc-customs-across-cultures"></span><span data-dcnode-id="877" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="872" id="mntl-sc-block_1-0-22"><span data-dcnode-id="876" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node=""> Customs Across Cultures </span></span><span data-dcnode-id="873" instrument_node=""> </span></h2><span data-dcnode-id="871" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="866" id="mntl-sc-block_1-0-23"><span data-dcnode-id="870" instrument_node="">
Different cultures, of course, have </span><a data-component="link" data-dcnode-id="868" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/cultural-relativism-definition-3026122"><span data-dcnode-id="869" instrument_node="">different customs</span></a><span data-dcnode-id="867" instrument_node="">, which means that something that may be an established tradition in one society may not be in another. For example, in the United States, cereal is considered a traditional breakfast food, but in other cultures, breakfast might include dishes such as soup or vegetables.
</span></p><span data-dcnode-id="865" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="864" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="863" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="861" id="mntl-sc-block_1-0-25"><span data-dcnode-id="862" instrument_node="">
While customs tend to be more entrenched in less industrialized societies, they exist in all types of societies, regardless of how industrialized they are or to what level of literacy the populace has risen. Some customs are so strongly entrenched in a society (i.e. circumcision, both male and female) that they continue to flourish regardless of outside influences or attempts at intervention.
</span></p><span data-dcnode-id="860" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="849" id="mntl-sc-block_1-0-26"><div class="comp mntl-block" data-dcnode-id="850" id="mntl-block_10-0"><span data-dcnode-id="859" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard6-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="852" data-height="600" id="ref-billboard6-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="858" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="854" id="mntl-sc-sticky-billboard-ad_13-0"><span data-dcnode-id="857" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="0caa42cf7280481ebb9c69581524920b" data-auction-floor-value="40" data-dcnode-id="856" data-pos="btf5" data-priority="8" data-rtb="true" data-sizes="[[300, 250],[300, 255],[250, 250],[200, 200],[180, 150],[7, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard6"></div><span data-dcnode-id="855" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span></div><span data-dcnode-id="851" instrument_node="">
</span></div></div><span data-dcnode-id="848" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="847" id="toc-when-customs-migrate"></span><span data-dcnode-id="846" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="841" id="mntl-sc-block_1-0-27"><span data-dcnode-id="845" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node=""> When Customs Migrate </span></span><span data-dcnode-id="842" instrument_node=""> </span></h2><span data-dcnode-id="840" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="838" id="mntl-sc-block_1-0-28"><span data-dcnode-id="839" instrument_node="">
While you can't pack them up neatly in a suitcase, customs are one of the most important things people take with them when they leave their native societies–for whatever reason—to immigrate and settle elsewhere. Immigration has a huge impact on cultural diversity and on the whole, many of the customs immigrants bring with them serve to enrich and broaden the cultures of their new homes.
</span></p><span data-dcnode-id="837" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="836" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="835" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="833" id="mntl-sc-block_1-0-30"><span data-dcnode-id="834" instrument_node="">
Customs that center on music, the arts, and culinary traditions are often the first to be accepted and assimilated into a new culture. On the other hand, customs that focus on religious beliefs, the traditional roles of men and women, and languages that are perceived to be foreign, are often met with resistance.
</span></p><span data-dcnode-id="832" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="831" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="830" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="829" id="toc-mourning-the-loss-of-customs"></span><span data-dcnode-id="828" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="823" id="mntl-sc-block_1-0-32"><span data-dcnode-id="827" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node=""> Mourning the Loss of Customs </span></span><span data-dcnode-id="824" instrument_node=""> </span></h2><span data-dcnode-id="822" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="820" id="mntl-sc-block_1-0-33"><span data-dcnode-id="821" instrument_node="">
According to the World Psychiatry Association (WPA) the impact of moving from one society to another can have deep psychological implications. "Individuals who migrate experience multiple stresses that can impact their mental well being, including the loss of cultural norms, religious customs, and social support systems," report Dinesh Bhugra and Matthew Becker, authors of a study on the phenomenon who go on to explain that such cultural adjustments speak to the very concept of self.
</span></p><span data-dcnode-id="819" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="808" id="mntl-sc-block_1-0-34"><div class="comp mntl-block" data-dcnode-id="809" id="mntl-block_11-0"><span data-dcnode-id="818" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard7-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="811" data-height="600" id="ref-billboard7-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="817" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="813" id="mntl-sc-sticky-billboard-ad_14-0"><span data-dcnode-id="816" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="daa077095a294d2ca303ee5b1463de4c" data-auction-floor-value="30" data-dcnode-id="815" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[250, 250],[200, 200],[180, 150],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="814" instrument_node="">
</span></div><span data-dcnode-id="812" instrument_node="">
</span></div><span data-dcnode-id="810" instrument_node="">
</span></div></div><span data-dcnode-id="807" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="796" id="mntl-sc-block_1-0-35"><span data-dcnode-id="806" instrument_node="">
As a result of the trauma many refugees experience, the rate of mental illness in that population segment is on the rise. "The loss of one's social structure and culture can cause a grief reaction," Bhugra and Becker note. "Migration involves the loss of the familiar, including </span><a data-component="link" data-dcnode-id="804" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-is-a-natural-language-1691422"><span data-dcnode-id="805" instrument_node="">language</span></a><span data-dcnode-id="803" instrument_node=""> (especially </span><a data-component="link" data-dcnode-id="801" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-is-colloquial-style-1689867"><span data-dcnode-id="802" instrument_node="">colloquial</span></a><span data-dcnode-id="800" instrument_node=""> and </span><a data-component="link" data-dcnode-id="798" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/dialect-language-term-1690446"><span data-dcnode-id="799" instrument_node="">dialect</span></a><span data-dcnode-id="797" instrument_node="">), attitudes, values, social structures, and support networks."
</span></p><span data-dcnode-id="795" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="794" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="793" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="792" id="toc-sources"></span><span data-dcnode-id="791" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="786" id="mntl-sc-block_1-0-37"><span data-dcnode-id="790" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node=""> Sources </span></span><span data-dcnode-id="787" instrument_node=""> </span></h2><span data-dcnode-id="785" instrument_node="">
