normal; font-style: normal; background: none;"><span data-dcnode-id="2925" instrument_node="">The independence of Indonesia had been planned jointly by Imperial Japan and Indonesian Nationalist groups/activists since 1943. The institutions of government already been constr</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2911" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2912" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2913" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2914" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2915" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2920" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2921" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2922" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2916" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2917"><svg data-dcnode-id="2918" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2919" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2831" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2832" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2833"><span class="q-box qu-userSelect--text" data-dcnode-id="2834" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2903" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2904" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2905" instrument_node="">Republic of Indonesia proclaimed its independence at August 17th 1945 after Imperial Japan announced their surender to the Allies. This proclamation of independence was done on a condition of Vacum of Power when there was no clear imperial ruler of Indonesia. The Japanese surrender not yet officialy accepted (September 3rd 1945) by the Allies but all Japanese Forces already orderded to stopped all kind of war efforts.</span></span></p><span data-dcnode-id="2902" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2899" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2900" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2901" instrument_node="">The independence of Indonesia had been planned jointly by Imperial Japan and Indonesian Nationalist groups/activists since 1943. The institutions of government already been constructed, mainly the Indonesian Nationalist would took over the already established governmental institutions that were vestiges of Dutch East Indies Colonial Government (which had been modified somewhat by the Japanese Imperials for their own purposes).</span></span></p><span data-dcnode-id="2898" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2895" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2896" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2897" instrument_node="">The old colonial master, Kingdom of the Netherlands, rejected the legality of the 1945 Proclamation. Saying the sovereignty of Dutch East Indies automatically returned to them after the defeat of Imperial Japan. And the Proclamation was done by Nationalists that was nothing more than Japanese puppets and Fascist collaborator.</span></span></p><span data-dcnode-id="2894" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2891" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2892" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2893" instrument_node="">In addition, the Dutch claimed that the Nationalist was not representing the will of the majority of Indonesian peoples, high and small. That very many Indonesian were loyal subject of the Dutch Monarch. The Dutch claimed they would give gradual Self Government status to Dutch East Indies which had been promised by the Dutch Queen in exile on late 1942 when both the Netherlands and the Dutch East Indies already lost. When things clearly no longer like 1942, with enormous public support for Republic of Indonesia solidify across the islands, the Dutch upgrade their promise with a time table for independence and sponsored the creation of several “Federal State” in their area of control.</span></span></p><span data-dcnode-id="2890" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2887" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2888" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2889" instrument_node="">The Nationalist already had a State in 17 August 1945. That’s an undeniable fact.</span></span></p><span data-dcnode-id="2886" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2883" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2884" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2885" instrument_node="">The Dutch didn’t want to lost their major colony. The Dutch did not recognized the Proclamation and denied its legality. That’s also an undeniable fact.</span></span></p><span data-dcnode-id="2882" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2879" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2880" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2881" instrument_node="">Thus both side fought for control of the islands. Those that won by Right of Conquest should be taken by force, after all.</span></span></p><span data-dcnode-id="2878" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2867" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2876" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2877" instrument_node="">The Republiken fought to </span></span><span data-dcnode-id="2874" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2875" instrument_node="">preserve and defend </span></span><span data-dcnode-id="2872" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2873" instrument_node="">their independence because they already have theirs in </span></span><span data-dcnode-id="2870" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2871" instrument_node="">17 August 1945</span></span><span data-dcnode-id="2868" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2869" instrument_node="">.</span></span></p><span data-dcnode-id="2866" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2863" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2864" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2865" instrument_node="">Due to combination of lack of national strength post World War II; the economic devastation and social problems after the War; the armed struggle of Indonesian peoples; the Indonesian diplomatic struggles via the UN; foreign support from the USA, elements of Australian government &amp; political groups, and several newly independent (and on-process toward independence) nations; the dwindling public support at the Homeland after the War turned into quaqmire of guerilla conflict; and clear lack of willingness of majority of Indonesian peoples to reaccepting the return of imperialism, the Dutch concluded that their engaged in a futile enterprise. They decided to cut it off while still could.</span></span></p><span data-dcnode-id="2862" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2855" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2860" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2861" instrument_node="">The Dutch agreed to </span></span><span data-dcnode-id="2858" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2859" instrument_node="">gave/transfered the sovereignty</span></span><span data-dcnode-id="2856" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2857" instrument_node=""> of the former colony to a new entity of United State of Republic of Indonesia (the combination of Republic of Indonesia and Dutch sponsored Federal States) on November 2nd 1949 in a conference at Den Haag. The formal ceremony held in Amsterdam, December 27th 1949.</span></span></p><span data-dcnode-id="2854" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2847" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2852" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2853" instrument_node="">This was remain a point of contention for years (until 2005) because it’s implied that the Dutch still did not accept the 1945 Proclamation and the whole War was merely a suppression of local rebellion, instead of </span></span><span data-dcnode-id="2850" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2851" instrument_node="">returning the sovereignity </span></span><span data-dcnode-id="2848" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2849" instrument_node="">to the Republik government.</span></span></p><span data-dcnode-id="2846" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2843" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2844" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2845" instrument_node="">So when Indonesia became an independent country? Well, 17 August 1945 of course! Why? Because Indonesian do not care the sophistry of an Imperial Power that only dare to fought those who were weak and 100%-certain-to-be-defeated-anyway, but fled when facing somebody that actually could fight!</span></span></p><span data-dcnode-id="2842" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2839" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2840" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2841" instrument_node="">Indonesia is an independence nation that will use our own version and interpretation of history, not the version of our former Overlord regardless their dogmatic legalist views.</span></span></p><span data-dcnode-id="2838" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2835" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2836" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2837" instrument_node="">The Dutch had “Indonesia” by the Right of Conquest. So they lost it when they can not hold on that Ancient Right, the legalistic debate means nothing.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2763" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2764" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2765" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2779" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2801" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2802" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2812" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2813" style="box-sizing: border-box; position: relative;"><button aria-label="6 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadi Islam that incorporated many practices of Indonesia's mainly Buddhist and Hindu communities, was the most widespread, and helped Islam spread more widely throughout Indonesia, as it didn't force new converts to abandon their traditional cultures the way a more conservative form of Islam may have. It's not really surprising then, when you see that in modern Indonesia, the most conservative area is Aceh, which is where the oldest and first communities in the region were, while the areas more influenced by Sufism were more tolerant of other beliefs and practices, and therefore spread more easily and peacefully with less resistance from practitioners from other religions.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2618" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2619"><div class="q-box unzoomed" data-dcnode-id="2620" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2621" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b64184fb511dc0501324407b6e90bfae-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="2617" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="2613" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2614"><div class="q-box unzoomed" data-dcnode-id="2615" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2616" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-0bbe85acf75174a615b0b7d442140d42-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2610" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2611" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2612" instrument_node="">Notice from these two maps that the oldest Muslim community in Indonesia is in Aceh, in northwestern Sumatra. This is also the most conservative Muslim region in modern Indonesia, and implements Shariah Law. In other parts of Sumatra, as well as Java and parts of Borneo where Islam largely became influential between the 15th and 16th centuries, they are less strict than Aceh, because they were more influenced by Sufism. Even more noticable is the furthest east Muslim regions in Borneo and Sulawesi, where Islam arrived mainly after the 17th century. These areas are the least strict Muslim regions. Finally, the furthest eastern regions of the archipelago, such the Maliku Islands, New Guinea, Timor and Bali. Muslims only really began reaching these areas at the same time or after European contacts and colonization of these lands had taken place, and so they were influenced more by conversions to Christianity rather than Islam. Bali also remained the last major Hindu center in the Indonesian Archipelago, while the other Buddhist and Hindu areas in the west became Muslim mainly Muslim, and the animist areas in the east became mainly Christian.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2533" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2534" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tin box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2024" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2025" instrument_node="">b.: a community of people composed of one or more nationalities and possessing a more or less defined territory and government</span></span></p><span data-dcnode-id="2022" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2019" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2020" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2021" instrument_node="">Canada is a nation with a written constitution</span></span></p><span data-dcnode-id="2018" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2015" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2016" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2017" instrument_node="">— B. K. Sandwell</span></span></p><span data-dcnode-id="2014" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2012" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2013" instrument_node="">c.: a territorial division containing a body of people of one or more nationalities and usually characterized by relatively large size and independent status</span></span></p><span data-dcnode-id="2010" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2007" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2008" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2009" instrument_node="">a nation of vast size with a small population</span></span></p><span data-dcnode-id="2006" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2003" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2004" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2005" instrument_node="">— Mary K. Hammond</span></span></p><span data-dcnode-id="2002" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1999" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2000" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2001" instrument_node="">2: archaic : GROUP, AGGREGATION</span></span></p><span data-dcnode-id="1998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1995" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1996" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1997" instrument_node="">3: a tribe or federation of tribes (as of American Indians)</span></span></p><span data-dcnode-id="1994" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1991" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1993" instrument_node="">the Seminole Nation in Oklahoma</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1990" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1986" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1987" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1988" instrument_node="">This definition of the Merriam-Webster dictionary is too vague for me. Therefore I take a look at another source. According to Wikipedia the definition is as follows:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1977" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1983" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1985" instrument_node="">A nation is a stable community of people formed on the basis of a common language, territory, history, ethnicity, or psychological make-up manifested in a common culture. A nation is more overtly political than an ethnic group; it has been described as "a fully mobilized or institutionalized ethnic group". Some nations are ethnic groups (see ethnic nationalism) and some are not (see civic nationalism and multiculturalism). A nation has also been defined as a cultural-political community that has become conscious of its autonomy, unity and particular interests.</span></span></p><span data-dcnode-id="1982" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1979" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1980" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1981" instrument_node="">American political scientist Benedict Anderson characterised a nation as an "imagined community", and Australian academic Paul James sees it as an "abstract community".</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1978" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1970" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1975" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1976" instrument_node="">Now we have the definition, I like to pick Benedict Anderson’s definition of a nation first as an “</span></span><span data-dcnode-id="1973" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1974" instrument_node="">imagined community</span></span><span data-dcnode-id="1971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1972" instrument_node="">.” As a matter of fact he was a famous scholar and an Indonesianist and his very definition applied to Indonesia.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1967" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1968" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1969" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-cb88d12c18656152d6d3ea001372571f-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1960" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1965" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1966" instrument_node="">Benedict Anderson</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="1961" href="#adGHF" id="cite-adGHF" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="1964" instrument_node="">[</span><span data-dcnode-id="1963" instrument_node="">2</span><span data-dcnode-id="1962" instrument_node="">]</span></a></p><span data-dcnode-id="1959" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1956" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1958" instrument_node="">As an imagined community, Indonesia existed from October 28, 1928. At that day the second Youth Congress was organised in Batavia, Dutch East-Indies. This congress was closed with these words:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1931" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1953" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1954" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1955" instrument_node="">Firstly</span></span></p><span data-dcnode-id="1952" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1949" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1950" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1951" instrument_node="">We the sons and daughters of Indonesia, acknowledge one motherland, Indonesia.</span></span></p><span data-dcnode-id="1948" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1945" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1946" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1947" instrument_node="">Secondly</span></span></p><span data-dcnode-id="1944" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1941" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1942" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1943" instrument_node="">We the sons and daughters of Indonesia, acknowledge one nation [are one people], the nation of Indonesia.</span></span></p><span data-dcnode-id="1940" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1937" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1938" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1939" instrument_node="">Thirdly</span></span></p><span data-dcnode-id="1936" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1933" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1934" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1935" instrument_node="">We the sons and daughters of Indonesia, respect the language of unity, Indonesian.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1932" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1928" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1930" instrument_node="">Therefore this historical date has been regarded as a sacred date by Indonesian nationalists as the beginning of the Indonesian nation. It was at that moment indeed an imagined community. The independence of Indonesia would only be recognised by the Dutch a few days before 1950, about 20 years later.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1924" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1925"><div class="q-box unzoomed" data-dcnode-id="1926" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1927" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-c46a451f602eb530d7a18926af545c79-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1917" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1922" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1923" instrument_node="">Members of the Young Java movement. These people could be regarded as proto-Indonesians.</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="1918" href="#iqsyk" id="cite-iqsyk" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="1921" instrument_node="">[</span><span data-dcnode-id="1920" instrument_node="">3</span><span data-dcnode-id="1919" instrument_node="">]</span></a></p><span data-dcnode-id="1916" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1907" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1914" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1915" instrument_node="">There Indonesia as </span></span><span data-dcnode-id="1912" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1913" instrument_node="">politically organized nationality</span></span><span data-dcnode-id="1910" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1911" instrument_node=""> as defined by Merriam-Webster only came to existence on August 17, 1945, when its Independence was declared by Soekarno and Hatta. After that on December 27, 1949 as Indonesia was then officially recognized by the Dutch as a nation. Therefore since that day Indonesia is </span></span><span data-dcnode-id="1908" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1909" instrument_node="">a community of people composed of one or more nationalities and possessing a more or less defined territory and government.</span></span></p><span data-dcnode-id="1906" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1893" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1904" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1905" instrument_node="">But as a </span></span><span data-dcnode-id="1902" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1903" instrument_node="">nationality</span></span><span data-dcnode-id="1900" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1901" instrument_node=""> perhaps Indonesia only existed after 1966 during the New Order era. Between 1949–1966, during the Old Order era the existence of Indonesia as new nation was plagued with rebellions and widespread separatism. However during the New Order era, Soeharto forged Indonesia as a nation with an iron fist. He created a stable and strong nation by nation-building.</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="1896" href="#slcKx" id="cite-slcKx" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="1899" instrument_node="">[</span><span data-dcnode-id="1898" instrument_node="">4</span><span data-dcnode-id="1897" instrument_node="">]</span></a><span data-dcnode-id="1894" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1895" instrument_node=""> Therefore when Soeharto stepped down as a president in 1998, Indonesia still existed as a nation. Only the former Portuguese colony of East-Timor gained independence.</span></span></p><span data-dcnode-id="1892" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1889" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1890" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1891" instrument_node="">Conclusion</span></span></p><span data-dcnode-id="1888" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1885" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1886" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1887" instrument_node="">Indonesia as a nation in the sense an imagined community has already existed since 1928, almost a century as of today May 17, 2020. However Indonesia as a nation in the sense of a politically organized nationality has existed for 75 years this year. But as nation in the sense of a community of people composed of one or more nationalities and possessing a more or less defined territory and government, Indonesia only exists for 70 years. Yet Indonesia as nationality with its own identity has only came to existence after Soeharto’s nation-building during the New Order Era, which came to existence more than 50 years ago and came to an end 22 years ago. Therefore Indonesia as a nation with its own identity is actually a result of Soeharto’s rule.</span></span></p><span data-dcnode-id="1884" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1881" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1882" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1883" instrument_node="">I hope this answers your question.</span></span></p><p class="q-text qu-bold qu-pb--small" data-dcnode-id="1879" style="box-sizing: border-box; margin-top: 1em;"><span data-dcnode-id="1880" instrument_node="">Footnotes</span></p><div class="q-text qu-mb--small qu-wordBreak--break-word" data-dcnode-id="1868" id="spTgU" style="box-sizing: border-box;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1875" href="#cite-spTgU" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="1878" instrument_node="">[</span><span data-dcnode-id="1877" instrument_node="">1</span><span data-dcnode-id="1876" instrument_node="">] </span></a><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/nation" rel="noopener nofollow" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><span data-dcnode-id="1874" instrument_node="">Definition of NATION</span><span class="q-inlineBlock" data-dcnode-id="1870" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1871"><svg data-dcnode-id="1872" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1873" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></a></div><div class="q-text qu-mb--small qu-wordBreak--break-word" data-dcnode-id="1857" id="adGH  normal; font-style: normal; background: none;"><span data-dcnode-id="1667" instrument_node="">From an insider's perspective, it's not so bad as pictured in other answer. There are many progresses especially after the 1998 reform that ended 32 years of Suharto's presidency. Of course, there are also regressions here and there, but all in all, things are gradually improving.</span></span></p><span data-dcnode-id="1664" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1661" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1662" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1663" instrument_node="">As a person who experienced what it was like during that transition, I've witnessed the birth of so many independent mass medias as soon as the press restrictions ended. It was basically an euphoria where suddenly everyone wanted to be heard that it seemed so chaotic at first before started to calm down a few years la</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1649" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1650" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1651" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1652" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1653" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1658" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1659" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1660" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1654" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1655"><svg data-dcnode-id="1656" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1657" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1601" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1602" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1603"><span class="q-box qu-userSelect--text" data-dcnode-id="1604" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1641" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1642" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1643" instrument_node="">From an insider's perspective, it's not so bad as pictured in other answer. There are many progresses especially after the 1998 reform that ended 32 years of Suharto's presidency. Of course, there are also regressions here and there, but all in all, things are gradually improving.</span></span></p><span data-dcnode-id="1640" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1635" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1638" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1639" instrument_node="">As a person who experienced what it was like during that transition, I've witnessed the birth of so many independent mass medias as soon as the press restrictions ended. It was basically an euphoria where suddenly everyone wanted to be heard that it seemed so chaotic at first before started to calm down a few years later; right around the time when most of those new medias dying out one by one. In short, </span></span><span data-dcnode-id="1636" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1637" instrument_node="">while still far from ideal, the freedom of the press that we have now is certainly something worth noted for. </span></span></p><span data-dcnode-id="1634" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1631" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1632" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1633" instrument_node="">The politics in Indonesia is also improving. Compared to pre-1998 Indonesia during Suharto's era with only three approved political parties - mainly to give impression of a democratic nation - now we have 10 political parties with enough votes to gain seats in the parliament that largely split into two coalitions. Public scrutiny to the parliament is also increasing since most of the so-called "people representatives" represent nothing but their own personal interests - at least that's how the public perceive them. Recent resignation of the head of Indonesia's House of Representatives over his involvement in an extortion scandal can also be seen as the result of public pressure; something that was unthinkable could happen twenty years ago.</span></span></p><span data-dcnode-id="1630" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1621" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1628" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1629" instrument_node="">In some ways, improvement in one aspect brings deteriorations in some others. For example, the successful decentralization process that gives each provinces more liberty to manage themselves, also opened more doors for corruptions in those provinces. Since the establishment of KPK (Komisi Pemberantasan Korupsi - Corruption Eradication Comission) in 2002, there are 56 corrupt regional leaders (12 governors, 33 regents and 11 mayors) </span></span><span data-dcnode-id="1626" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1627" instrument_node="">that has been caught, tried and sentenced; excluding </span></span><span data-dcnode-id="1624" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1625" instrument_node="">more than 50 other high profile corruption cases that KPK has managed to brought to justice</span></span><span data-dcnode-id="1622" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1623" instrument_node="">. There are, indeed, many more that hasn't been caught yet, but still, these achievements are also an indication of improvement.</span></span></p><span data-dcnode-id="1620" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1617" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1618" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1619" instrument_node="">And let's not forget about the improving social interaction and integration, especially after the government abolished the discriminative terms of "pribumi" (native) and "non-pribumi" (non-native, mostly directed at Indonesians of Chinese descent) in official government documents and businesses. This was soon followed by the abolishment of the ban on public display and the practice of Chinese language, culture and traditions that were heavily repressed under Suharto's rule. These policies, along with the emergence of numerous Chinese Indonesian public figures outside of the trade and business sectors in the last 15 years, are slowly but surely eroding the pervasive racism and discriminatory views that were still deliberately maintained until two decades earlier.</span></span></p><span data-dcnode-id="1616" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1609" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1614" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1615" instrument_node="">Surely, all of those above aren't the only improvements that has happened and still happening in Indonesia. As I wrote earlier, there are also regressions which also mean that as a nation, we still have a long way to go before we can be truly successful. However, we've taken the right steps </span></span><span data-dcnode-id="1612" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1613" instrument_node="">and heading for the right direction towards it</span></span><span data-dcnode-id="1610" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1611" instrument_node="">.</span></span></p><span data-dcnode-id="1608" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1605" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1606" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1607" instrument_node="">In short, taking the analogy of a house, we managed to alter and strenghten the foundation and pillars without bringing down the whole building. There are still leaks in many places, and some of the walls are in dire need of repair or replacement. But for the most part, this house is getting more and more comfortable to live in.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1533" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1534" style="box-sizing: border-box; tr gnItems--center qu-justifyContent--center" data-dcnode-id="1256" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1261" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1262" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1263" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1257" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1258"><svg data-dcnode-id="1259" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1260" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1217" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1218" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1219"><span class="q-box qu-userSelect--text" data-dcnode-id="1220" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1244" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1245" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1246" instrument_node="">The most devastating and certainly most deadly natural disaster which took the lives of many, it killed 100,000 people in the direct impact. But it led to tens of millions more deaths later. Nope I am not talking about Krakatoa eruption but the one which was even more disastrous. That eruption didn’t only affect Indonesia but in general the entire world.</span></span></p><span data-dcnode-id="1243" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1240" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1241" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1242" instrument_node="">That was the Tambora eruption which caused all the aforementioned casualties. Let me elaborate it, in 1815, Mount Tambora erupted on Sumbawa, an island of modern-day Indonesia. Historians regard it as the volcano eruption with the deadliest known direct impact: roughly 100,000 people died in the immediate aftermath.</span></span></p><span data-dcnode-id="1239" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1236" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1237" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1238" instrument_node="">But wait that was the beginning of the worse, far more died over the next several years due to secondary effects that spread all over the globe. After the tambora eruption there was three years of climate change. The world got colder, and the weather systems changed completely for three years. And so you had widespread crop failure and starvation all from Asia to the United States to Europe. Communities worldwide endured famine, disease, and civil unrest on a catastrophic scale.</span></span></p><span data-dcnode-id="1235" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1232" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1233" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1234" instrument_node="">One could note that volcanoes near the equator can cause global weather changes if the gas it releases is powerful enough to cause changes into the stratosphere. As I said the level of the gas is too high to be washed away by rain and hence travels along the equator and spreads out toward the poles.</span></span></p><span data-dcnode-id="1231" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1228" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1229" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1230" instrument_node="">This decreases the amount of heat that passes through the stratosphere from the sun. It affects the ecosystem in which you live. With Tambora’s eruption, cooling temperatures led to decreased rainfall, failed crops, and mass starvation in many parts of the world.</span></span></p><span data-dcnode-id="1227" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1224" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1225" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1226" instrument_node="">In today’s time the after effects of a volcano eruption is more disastrous then it’s direct impact, although due to technological advances we can more accurately predict about eruptions But there’s a lot of risk with hydro climate shocks and drought all over the world.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1221" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1222" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-268a29f5d0fce5321b028ca482d39610-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1144" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1145" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1146" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1160" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1187" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1188" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1198" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1199" style="box-sizing: border-box; position: rela  Islands was already granted its self-governance on 2 January 1976, so few months after Papua New Guinea gained its independence from Australia.</span></span></p><span data-dcnode-id="514" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="511" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="512" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="513" instrument_node="">During the World War 2, Solomon Islands had been the theatre of confrontations between the Americans and the Japanese, known as the Solomon Islands campaign. It almost destroyed all the country. It’s the beginning of the end for the British Empire in Solomon Islands.</span></span></p><span data-dcnode-id="510" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="507" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="508" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="509" instrument_node="">Between 1950 and 1970, Indigenous people became more organised and more aware about how to deal with Western policies and as a result some Indigenous councils and movements were created. It had slowly hurt the British hegemony in Solomon Islands. In addition, few years before Solomon Islands was granted the independence, the price of oil became so high that Solomon Islands became much less valuable for UK. This is why the self-governance was allowed a bit more than 2 years before the official independence of Solomon Islands.</span></span></p><span data-dcnode-id="506" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="503" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="504" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="505" instrument_node="">Why I wrote this is to explain that UK would have never allowed Solomon Islands to become independent if Solomon Islands would have remained economically advantageous for them. And in fact, and it’s something not teach too much, the main move of UK wasn’t to grant Solomon Islands its independence, but to sell Solomon Islands to Australia. It was close to happen but for some economic and geopolitical reasons, Australia decided it wasn’t really worthy to do it. If Solomon Islands would have been the home of natural reserves like it’s the case in New Caledonia, another Melanesian nation, UK or Australia would have done their best to keep it as a colony, a protectorate, or whatever else form of imperialism.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="426" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="427" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="428" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="442" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="469" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="470" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="480" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_refe
