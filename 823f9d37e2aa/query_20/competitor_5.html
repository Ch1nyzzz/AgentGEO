span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4285" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4286" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4287" instrument_node="">The arrival of Dutch</span></span></p><span data-dcnode-id="4284" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4277" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4282" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4283" instrument_node="">Colonial powers of Europe were searching the goods like fruits, spices and others. They somehow discovered that Nusantara ( Now Indonesia ) produced goods like fruits and spices and spices in particular could be processed into medicines, preserving foods and others. Ducth came to Indonesia in June, 22 1596 via naval expedition led by </span></span><span data-dcnode-id="4280" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4281" instrument_node="">Cournelis De Houtman</span></span><span data-dcnode-id="4278" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4279" instrument_node=""> arriving at Banten Port, at first Banten Sultanate welcame kindly the arrival of this white people but we were stabbed from behind, Dutch people who came to Banten acted arrogantly and looked down on locals and they were so greedy. In shorts, people of Banten hated them so much, had enough of their arrogance attitudes and decided to kick them out of Banten and finally Dutch people were expelled from Banten.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4274" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4275" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-e471d4884128c6fb45d9f9d6587ee2ae-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4265" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4272" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4273" instrument_node="">Ducth Oppression Through VOC ( </span></span><span data-dcnode-id="4270" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4271" instrument_node="">Vereenigde Oost Indische</span></span><span data-dcnode-id="4268" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4269" instrument_node=""> </span></span><span data-dcnode-id="4266" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4267" instrument_node="">Compagnie )</span></span></p><span data-dcnode-id="4264" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4257" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4262" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4263" instrument_node="">What is VOC ? its a trading company established by Dutch Colonial Power to persuade us to trade with them. </span></span><span data-dcnode-id="4260" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4261" instrument_node="">It was two years after the incident of Banten</span></span><span data-dcnode-id="4258" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4259" instrument_node="">, The Ducth People came again and this time they were nicer and showing polite manners when interacting with locals in Nusantara and locals decided to tolerate them and they were willing to open trade with them.</span></span></p><span data-dcnode-id="4256" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4253" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4255" instrument_node="">But guess what ? VOC then monopolized the trade and sealed dirty deals with some local kings, giving them some gold and Ducth People were good at manipulating situation. When they found a local king had disagreement with another local king, Dutch would came to one of the local King and provided him with weapons to anihilate another local king in conflict with him and we knew that the help from Dutch was not free, Dutch people demanded lots of things more than they deserved for their helps.</span></span></p><span data-dcnode-id="4252" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4249" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4251" instrument_node="">In shorts, VOC then monopolized the whole trade in Nusantara and it had its own military forces. VOC abused locals, locals who did not want to trade with them would be prosecuted, their homes would be burned, their children would be killed before their parents and other atrocities you could not possibly imagine.</span></span></p><span data-dcnode-id="4248" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4245" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4246" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4247" instrument_node="">The greed of Ducth People in VOC was staggering and it finally anoyed their own imperial government so in December 31, 1799 VOC was dissolved, the reasons were :</span></span></p><span data-dcnode-id="4244" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4241" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4242" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4243" instrument_node="">a. VOC officials were corrupt and seeking profits for themselves</span></span></p><span data-dcnode-id="4240" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4237" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4238" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4239" instrument_node="">b. Its operational cost was to expensive</span></span></p><span data-dcnode-id="4236" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4233" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4234" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4235" instrument_node="">c. Lost in competition to their fellow invaders like France and Britain</span></span></p><span data-dcnode-id="4232" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4229" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4230" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4231" instrument_node="">After VOC was dissolved, Nusantara was taken over directly by Dutch Central Imperial Government and the regime of Dutch Colonial power in Nusantara lasted until 1942.</span></span></p><span data-dcnode-id="4228" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4225" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4226" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4227" instrument_node="">Dutch Oppresion Through Forced Labor, Insane Taxation and Forced Agriculture</span></span></p><span data-dcnode-id="4224" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4213" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4222" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4223" instrument_node="">In 1806, that Corsica Born Young General, Napoleon Bonaparte conquered Dutch but this guy was no different at all from the previous Dutch Invaders and he was not even better. Napoleon sent </span></span><span data-dcnode-id="4220" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4221" instrument_node="">Infamous Herman Williem Daendels </span></span><span data-dcnode-id="4218" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4219" instrument_node="">to manage Nusantara and this Daendels commited </span></span><span data-dcnode-id="4216" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4217" instrument_node="">notorious crimes againts humanity</span></span><span data-dcnode-id="4214" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4215" instrument_node=""> in Nusantara. These were what Daendels did to our poor people at that time :</span></span></p><span data-dcnode-id="4212" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4209" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4210" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4211" instrument_node="">He mobilized locals to work without any payment. To Indonesians, we know it as Kerja Rodi. Locals were brutally forced to construct roads from Anyer to Panarukan as long as about 1.000 km. He issued edict that forced locals to pay insane tax to support the construction projects and if any locals dared to refuse paying tax, Daendels Soldiers would kill him and his familiy then their corpses would be displayed as lessons to locals who refused to pay taxes. Daendels also ordered locals to plant Cofee for the market of Europe and the locals did not get the share of any profit from the sale of Cofee to Europe Market at that time. What would happen to locals who did not want to plant Cofee ? they would be killed.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4206" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4207" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-968e3bc4588232c8d4c523c81016a75c-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4203" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4204" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4205" instrument_node="">Illustration of Herman Williem Daendels overseeing the forced labor works.</span></span></p><span data-dcnode-id="4202" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4199" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4200" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4201" instrument_node="">The Classic periode of Independence Wars againts Dutch Colonial Powers</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4196" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4197" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-279e38192aaf9e6610a59e56b2db8999-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="4195" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="4192" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4193" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-034f76628310d466991f4699a0b2f97e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4189" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4190" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4191" instrument_node="">Having enough of being abused, invaded, tricked and deprived of lands and property, many local kings in Nusantara decided to fight againts Dutch Colonial Powers. The struggle broke out nearly in all part of Nusantara,</span></span></p><span data-dcnode-id="4188" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4185" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4186" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4187" instrument_node="">Mataram Wars ( 1628 - 1629 )</span></span></p><span data-dcnode-id="4184" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4181" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4182" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4183" instrument_node="">Initiated by Sultan Ageng who mobilized thousands of strong men, attacking Dutch Strongholds in Batavia and caused death to thousands of Dutch Colonial Soldiers.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4177" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4178"><div class="q-box unzoomed" data-dcnode-id="4179" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ef059ee9ea6eeec4ffa09a7f927d2a97-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4174" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4175" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4176" instrument_node="">Sultan Ageng</span></span></p><span data-dcnode-id="4173" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4170" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4171" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4172" instrument_node="">Pattimura Wars ( 1817 )</span></span></p><span data-dcnode-id="4169" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4166" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4167" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4168" instrument_node="">Led by heroic Thomas Matulessi Pattimura, Great people of Maluku fought againts Ducth Soldiers and caused tremendous losses to Ducth Powers in Maluku. Sadly Pattimura was betrayed by his fellow friend who was bribed by Dutch to tell the fortress location where Pattimura was staying. Pattimura then captured and hang by Dutch Soldiers.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4163" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4164" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-36ad1709b50876a8bd7a8844f2cb2caf-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4160" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4161" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4162" instrument_node="">Image of Kapitan Patimura</span></span></p><span data-dcnode-id="4159" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4156" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4157" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4158" instrument_node="">The Wars of Padri (1821-1837)</span></span></p><span data-dcnode-id="4155" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4144" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4153" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4154" instrument_node="">It was initiated by local conflict betwen Adat Group and Padri Group. Those two were local tribes. Dutch Colonial Powers took side with Adat Group in exchange for territorial occupation in Minangkabau Region of Nusantara. Led by </span></span><span data-dcnode-id="4151" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4152" instrument_node="">Datuk Bandaro </span></span><span data-dcnode-id="4149" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4150" instrument_node="">then succeeded by </span></span><span data-dcnode-id="4147" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4148" instrument_node="">Tuanku Imam Bonjol, </span></span><span data-dcnode-id="4145" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4146" instrument_node="">Tuanku Imam Bonjol employed sporadic attack tactics againts Dutch Colonial Soldiers which forced Dutch Colonial Powers to come to negotiation table for ending the wars.</span></span></p><span data-dcnode-id="4143" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4140" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4141" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4142" instrument_node="">Ducth Colonial Powers then betrayed the agreement negotiation and the war broke out again. In October 1837, Tuanku Imam Bonjol was killed by Dutch Soldiers.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4137" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4138" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4139" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-790ecc2989d65b0e038377b21ca250a2-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4134" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4135" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4136" instrument_node="">Image of Tuanku Imam Bonjol</span></span></p><span data-dcnode-id="4133" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4130" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4131" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4132" instrument_node="">Diponegoro Wars (1925-1830)</span></span></p><span data-dcnode-id="4129" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4126" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4127" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4128" instrument_node="">It was triggered by the intervention of Dutch Colonial Powers in local affairs and hostile take over of his anchestral lands and properties conducted by Dutch Colonial Powers. It was one of the most bloodiest war in classic history of Indonesian War of Independence.</span></span></p><span data-dcnode-id="4125" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4122" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4123" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4124" instrument_node="">Pangeran ( Prince ) Diponegoro led his strong men in war campaign againts Dutch Colonial Powers led by General De Kock. After years of attrition war, Dutch Colonial Power set up vicious tactic to defeat Prince Diponegoro. De Kock invited Prince Diponegoro to come to talk to end the war and Prince Diponegoro saw this as effort to end the wars which had killed hundred thousands of innocent people. But Prince Diponegoro failed to see the trap set up by General De Kock.</span></span></p><span data-dcnode-id="4121" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4118" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4119" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4120" instrument_node="">During the talk at negotiation, De Kock suddenly ordered his soldiers to capture Prince Diponegoro and there was nothing Prince Diponegoro could do. His pure and good intention to end the war had been betrayed by General De Kock.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4115" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4116" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-338fcea1251253d197f15414b002dea0-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4112" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4113" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4114" instrument_node="">Painting showing how Prince Diponegoro was captured during negotiation talk.</span></span></p><span data-dcnode-id="4111" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4108" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4109" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4110" instrument_node="">Banjarmasin Wars (1859-1863)</span></span></p><span data-dcnode-id="4107" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4104" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4105" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4106" instrument_node="">Led by Sultan Antasari who fought againts Dutch Colonial Powers in Banjarmasin</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4101" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4102" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4ed762b0a8bf307513f2e68142470f14-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4098" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4099" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4100" instrument_node="">Illustration of Banjarmasin wars. Dutch Soldiers were hunting Sultan Antasari.</span></span></p><span data-dcnode-id="4097" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4094" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4095" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4096" instrument_node="">Bali Wars (1846-1868)</span></span></p><span data-dcnode-id="4093" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4090" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4091" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4092" instrument_node="">Led by Gusti Ktut Jelantik who fought againts Dutch Colonial Powers in Bali. It was because Dutch demanded all Bali Kings to surrender to Dutch Colonial Powers and paid tribute to the Dutch.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4087" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4088" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4089" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b054bf490dd189d6ce039e5167b35522-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4084" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4085" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4086" instrument_node="">Sisingamangaraja Wars XII (1870-1907)</span></span></p><span data-dcnode-id="4083" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4080" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4081" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4082" instrument_node="">Dutch took over Tapanuli and killed thousands of innocent locals there which angered King Sisingamaraja</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4077" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4078" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4079" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-19672f6712aa165372dcfe97c5f9454b-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4074" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4075" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4076" instrument_node="">King Sisingamaraja</span></span></p><span data-dcnode-id="4073" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4070" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4071" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4072" instrument_node="">Aceh Wars (1873-1906)</span></span></p><span data-dcnode-id="4069" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4066" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4067" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4068" instrument_node="">Led by Badass Cut Nyak Dien who despised Dutch Colonial Powers trying to occupy and monopolizing all trades in Aceh and she hated how Dutch People in that time did not respect the local cultures and acting arrogantly towards the locals in Aceh. Dutch Powers were cornered due to ferocious fight done by Cut Nyak Dien followers and finally Dutch Imperial Government sent Dr. Snouck Hurgronje to study the tactics if Cut Nyak Dien. To win the heart of people in Aceh, this Snouck pretended to embrace Islam.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4063" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4064" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4065" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-e7f624104b12163c4ae3ecae07d5b6c1-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4060" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4061" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4062" instrument_node="">Image of Cut Nyak Dien</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4057" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4058" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4059" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-230e31e3162c4af324f998a4bb432b1e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="4056" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="4053" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4054" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4055" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-3e67378b31285a7eea6065b62eabc9b1-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4050" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4051" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4052" instrument_node="">Dr. Snouck Hurgronje</span></span></p><span data-dcnode-id="4049" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4046" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4047" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4048" instrument_node="">The Modern periode of Independence Wars againts Invanding Colonial Powers Modern Dutch and Empire of Rising Sun Japan</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4043" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4044" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4045" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-efb3e06bc486939d4b6dbf0cc695bb3a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4040" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4041" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4042" instrument_node="">Japan Blitzkrieg in Early March 1942</span></span></p><span data-dcnode-id="4039" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4032" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4037" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4038" instrument_node="">In March 1942, the entire regime of Dutch Colonial Force which was assisted by allied forces was easily annihilated by Japan Shock Force in less than a week. This Dramatic defeat started when the naval fleet of Allied forces and Dutch Colonial Force led by Admiral </span></span><span data-dcnode-id="4035" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4036" instrument_node="">Karel Doorman</span></span><span data-dcnode-id="4033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4034" instrument_node=""> was wiped out by Japanase Naval Force in Java Sea</span></span></p><span data-dcnode-id="4031" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4028" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4029" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4030" instrument_node="">Not too long after the successful campaign in sea, Japan landed its soldiers in four separate places in Java Island : Merak, Eretan Wetan Beach, West Indramayu, Rembang and Kranggan Eastern Java. Besieged and cut off supports, Dutch Forces then surrendered to Japan not long after the landing in those four places.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4025" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4026" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4027" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ff6f6f7a9c4c5dc764aa9cf455bba27f-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="4024" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="4021" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4022" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4023" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ea4dd07d679c0e411fbe0f54ef253a18-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4018" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4019" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4020" instrument_node="">Illustration how Dutch Surrendered to Japan in Kalijati in 1942.</span></span></p><span data-dcnode-id="4017" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4014" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4015" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4016" instrument_node="">The end of Dutch Colonial Force and the coming of new Invader Japan</span></span></p><span data-dcnode-id="4013" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4010" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4011" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4012" instrument_node="">Dutch Surrender to Japan in March 1942 unconditionally. This marked the end of Dutch Colonial Force in Indonesia. At first we though Japan was going to help up by wiping out those white men invanders from our motherland, the propaganda was so immense, Japan Colonial Force used these words to win the local support :</span></span></p><span data-dcnode-id="4009" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4006" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4007" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4008" instrument_node="">a. We are your old Brothers, we are the light of Asia</span></span></p><span data-dcnode-id="4005" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4002" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4003" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4004" instrument_node="">b. We will give you your independece, we are the leader of Asia</span></span></p><span data-dcnode-id="4001" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3998" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3999" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4000" instrument_node="">c. We will protect you, we are the protector of Asia</span></span></p><span data-dcnode-id="3997" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3992" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3995" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3996" instrument_node="">Those are fake words</span></span><span data-dcnode-id="3993" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3994" instrument_node="">. All they want is our oils and other resources that we have in order to support their war againts US in Pasific and to keep their occupation in Asia Countries like China or Malaysia.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3989" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3990" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3991" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-3f37d6a2cee9b8d051c3c8d7cce7d428-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3986" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3987" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3988" instrument_node="">Japan Colonial Powers did abuse of human rights in Indonesia. Its not better than Dutch and during Japan Occupation, nearly more than 2 million of Indonesians were killed by Japan Soldiers and our women were raped.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3983" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3984" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3985" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8859fbe7d4772558a8519154f8e2fcd0-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3980" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3981" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3982" instrument_node="">Did we Indonesians just watch they badly treat us like that ? were we affraid of their superior weapons ? No we were not affraid, we fought despite we knew we could not win againts them, their guns, planes and machine guns, their Bushido Spirit and Their Katana Swords never scared us at all !.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3977" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3978" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3979" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-740bdd85aeee7e7001697e15b7486e50-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3974" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3975" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3976" instrument_node="">The end of Japan Colonial Force and the come of back of Dutch again and again</span></span></p><span data-dcnode-id="3973" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3966" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3972" instrument_node="">The atomic bombing of Hiroshima and Nagasaki Japan in August 1945 devastated Japan Colonial Force in Indonesia and it boosted the morale of Indonesian Fighters to keep fighting Japan Colonial Forces, until the declaration of </span></span><span data-dcnode-id="3969" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3970" instrument_node="">our National Independence in August 17 1945</span></span><span data-dcnode-id="3967" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3968" instrument_node="">.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3963" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3964" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3965" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4a9e17e59764af5a0c7f9786e963169c-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3960" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3961" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3962" instrument_node="">Sukarno, our First President declared our Independece in August 17, 1945. We finally became Independent Country after hundred years of struggle but It did not run smoothly because Dutch Guys came back again with the assistance of Great Britain to claim their rights to re-colonize Indonesia ( this time we were ready to fight them )</span></span></p><span data-dcnode-id="3959" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3956" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3958" instrument_node="">Battles after the proclamation of our National Independence</span></span></p><span data-dcnode-id="3955" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3952" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3953" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3954" instrument_node="">Battle of Surabaya November 10, 1945</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3949" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3950" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3951" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-659793d8a521841401cf2425da8ee207-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3946" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3947" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3948" instrument_node="">Indonesian Fighters fought againts Dutch Soldiers assisted by British Soldiers in bloody Urban Battle in Surabaya and Britain General Mallaby, the commander of British Soldiers in East Java was killed.</span></span></p><span data-dcnode-id="3945" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3942" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3943" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3944" instrument_node="">Battle of First March 1949</span></span></p><span data-dcnode-id="3941" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3938" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3939" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3940" instrument_node="">Led by our Former President Soeharto, we proved the world that Indonesia still existed and the claim made by the Dutch that Indonesia Republic did not exists anymore was broken. Indonesian Soldiers at that time managed to repel Dutch Soldiers from Yogyakarta and we successfully took Yogyakarta back to us.</span></span></p><span data-dcnode-id="3937" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3934" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3935" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3936" instrument_node="">Angered by the First March 1949 attack, Dutch Soldiers brutally killed many Indonesians.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3931" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3932" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3933" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-154474450e7684a2dea04ea4a0ef883e-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="3930" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3927" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3928" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3929" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-da6a8395457df4f291b417a658cdc905-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="3926" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3923" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3924" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3925" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-94b1729e7fd131b86821b18db9dc9fdf-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3916" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3922" instrument_node="">Kapitein Westerling .. </span></span><span data-dcnode-id="3919" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3920" instrument_node="">The War Criminal who masterminded and ordered the mass murder of Indonesians during Dutch Military Aggresion in Indonesia</span></span><span data-dcnode-id="3917" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3918" instrument_node="">.</span></span></p><span data-dcnode-id="3915" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3912" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3913" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3914" instrument_node="">After long struggle which took hundred years, Indonesia finally got its full sovereignity and acknowledgement from the world in The Dutch–Indonesian Round Table Conference held in The Hague from 23 August to 2 November 1949.</span></span></p><span data-dcnode-id="3911" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3908" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3910" instrument_node="">Note :</span></span></p><span data-dcnode-id="3907" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3904" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3905" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3906" instrument_node="">I am not trying to open old wounds, I am not trying to make Present Day Dutch and Present day Japan look bad. I am just telling the history of my country and like other men in other countries, we have the right to tell the history of our countries as lessons to learn with.</span></span></p><span data-dcnode-id="3903" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3900" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3901" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3902" instrument_node="">Finally about How and why did the Indonesians win their war of independence?</span></span></p><ol class="q-box" data-dcnode-id="3886" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3897" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3898" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3899" instrument_node="">We did not tolerate invasion and oppression which happened to our country.</span></span></li><li class="q-relative" data-dcnode-id="3894" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3895" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3896" instrument_node="">We stood together, we united and we fought to defend our lands until the last drop of our blood,</span></span></li><li class="q-relative" data-dcnode-id="3887" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3892" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3893" instrument_node="">We never surrendered, We don’t care how big your tank was, how good your gun was, how fast your plane was, how devastating the explosion of your bomb, how impressive your capital ship was, to us it was better to die in fighting than live by kneeling down before the enemy ( </span></span><span data-dcnode-id="3890" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3891" instrument_node="">These words were said by an old Indonesian veteran I met during Independence Day National Ceremony in Kalibata 2015</span></span><span data-dcnode-id="3888" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3889" instrument_node=""> )</span></span></li></ol></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3804" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3805" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnod  available education system for natives was traditional system, either royal-based or folk Islamic-based. After the policy, Western-based education was available for the natives, albeit limited. These limited privileged Western-educated people become the primary actors during independence.</span></span></p><span data-dcnode-id="3632" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3625" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3630" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3631" instrument_node="">2. The National Awakening, </span></span><span data-dcnode-id="3628" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3629" instrument_node="">Youth Pledge</span></span><span data-dcnode-id="3626" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3627" instrument_node=""> (28 October 1928)</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3621" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3622"><div class="q-box unzoomed" data-dcnode-id="3623" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3624" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-395e50cda9333f476ed22db498a80710-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3618" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3619" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3620" instrument_node="">The Youth Pledge (28 October 1928) was a major event. The event primarily showed that the youth (as from the photos, were well-educated) declared the ‘national identities’. The event showed that the national identities has been formed (even before the country it self).</span></span></p><span data-dcnode-id="3617" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3614" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3615" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3616" instrument_node="">3. The Japanese Occupation (1942–1945)</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3610" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3611"><div class="q-box unzoomed" data-dcnode-id="3612" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3613" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8177fe7fb09ab19d19463982db5dda33-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3603" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3608" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3609" instrument_node="">The last important events was the Japanese Occupation. Indonesia would reach independence. However, Japanese Occupation created the form of the independence of Indonesia. The effect of Japanese Occupation has been answered </span></  0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="3441" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="3442" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="3443" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3444" style="box-sizing: border-box;"><span data-dcnode-id="3445" style="background: none;"><span data-dcnode-id="3446" instrument_node="">Why won't Indonesia let West Papua become independent?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3377" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3378" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3379" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3432" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3380" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3402" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3403" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3404" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3405" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3406" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3429" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3430" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3431" instrument_node="">The same reason why India won’t let go of Kashmir, why Spain won’t let go of Catalonia and why China won’t let go of Tibet and Hong Kong.</span></span></p><span data-dcnode-id="3428" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3423" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3426" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3427" instrument_node="">Indonesia’s sovereignty of West Papua is not without any legal basis. West Papua, or formerly known as Western New Guinea is part of the Dutch East Indies, the predecessor of the modern Republic of Indonesia. When the Dutch acknowledged Indonesia’s independence in 1949, they purposely detached Western New Guinea from the soon-to-be independent colony, arguing that </span></span><span data-dcnode-id="3424" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3425" instrument_node="">Western New Guinea is geographically and culturally distinct from other parts of Indonesia.</span></span></p><span data-dcnode-id="3422" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3419" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3420" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3421" instrument_node="">While</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3407" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3408" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3409" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3410" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3411" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3416" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3417" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3418" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3412" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3413"><svg data-dcnode-id="3414" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3415" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3381" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3382" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3383"><span class="q-box qu-userSelect--text" data-dcnode-id="3384" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3399" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3400" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3401" instrument_node="">The same reason why India won’t let go of Kashmir, why Spain won’t let go of Catalonia and why China won’t let go of Tibet and Hong Kong.</span></span></p><span data-dcnode-id="3398" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3393" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3396" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3397" instrument_node="">Indonesia’s sovereignty of West Papua is not without any legal basis. West Papua, or formerly known as Western New Guinea is part of the Dutch East Indies, the predecessor of the modern Republic of Indonesia. When the Dutch acknowledged Indonesia’s independence in 1949, they purposely detached Western New Guinea from the soon-to-be independent colony, arguing that </span></span><span data-dcnode-id="3394" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3395" instrument_node="">Western New Guinea is geographically and culturally distinct from other parts of Indonesia.</span></span></p><span data-dcnode-id="3392" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3389" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3390" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3391" instrument_node="">While this point may be true to some extent, let's take some examples. The Tamils in Southern India and the Naga people in Northeastern India are physically and culturally distinct. However, they all still identify themselves as Indian. Likewise, the Chams in Southern Vietnam and the Hmong people in Northern Vietnam are also culturally very distinct, yet they are still considered as Vietnamese. Moreover, people within Indonesia itself also have distinct cultures, such as the Acehnese in Aceh and the Minahasan in North Sulawesi.</span></span></p><span data-dcnode-id="3388" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3385" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3386" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3387" instrument_node="">Indonesia let go of East Timor because it was a Portuguese colony and not a Dutch colony, therefore Indonesia does not have any legal basis on the sovereignty of East Timor. So for those West Papuan independence supporters out there, Indonesia has a legal basis on the sovereignty of West Papua, which predates to the Dutch colonial era.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3313" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3314" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3315" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3329" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3351" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3352" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3362" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3363" style="box-sizing: border-box; position: relative;"><button aria-label="14 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--
