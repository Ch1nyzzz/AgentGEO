</span><span class="credit" data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Photo-Illustration: Walter McBride/WireImage/Getty Images/2018 Walter McBride</span></span><span data-dcnode-id="2214" instrument_node="">
</span></div><span data-dcnode-id="2212" instrument_node="">
</span></div><span data-dcnode-id="2210" instrument_node="">
</span></div><span data-dcnode-id="2208" instrument_node="">
</span><p class="clay-paragraph_intro" data-dcnode-id="2203" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiut0ueq000j77ofqvu1yq2x@published" data-word-count="61"><span data-dcnode-id="2207" instrument_node="">Edinburgh Castle, many centuries old, has been called the most besieged place in Britain. In 2005, on the night Melissa Anelli arrived, it was besieged primarily by children. The cover of </span><em data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Harry Potter and the Half-Blood Prince</span></em><span data-dcnode-id="2204" instrument_node=""> was projected on its outer walls. Inside, J. K. Rowling, a longtime Edinburgh resident, was celebrating the midnight release of the sixth Harry Potter book.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2194" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxatym000s3g6f0w5un4qn@published" data-word-count="107"><span data-dcnode-id="2201" instrument_node="">Anelli was then the 25-year-old web mistress of a Harry Potter fan site called </span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.the-leaky-cauldron.org/"><span data-dcnode-id="2200" instrument_node="">The Leaky Cauldron</span></a><span data-dcnode-id="2198" instrument_node="">. Rowling had personally summoned Anelli, along with Emerson Spartz (the proprietor of another fan site, </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mugglenet.com/"><span data-dcnode-id="2197" instrument_node="">MuggleNet</span></a><span data-dcnode-id="2195" instrument_node="">), for an interview in her home. It would take place on the afternoon of the day the book came out. And so, after collecting their copies at the castle, Spartz and Anelli had some 12 hours to read the Potter series’ 650-page penultimate installment. “We were sleepless and dizzy and euphoric,” Anelli told me. By the time a car arrived to ferry them to Rowling’s house, Anelli had a 66-page sheaf of questions prepared.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2191" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxau0c000t3g6ff4uk53pg@published" data-word-count="76"><span data-dcnode-id="2192" instrument_node="">Rowling lived in an ivy-covered Victorian stone mansion set within landscaped gardens, and, like Edinburgh Castle, it was something of a picturesque fortress. After a stalker had taken to showing up at the house, Rowling and her husband had, despite their neighbors’ objections, implemented increasingly strict security measures: first an eight-foot-high wall and an electronic gate, then CCTV security cameras. Anelli and Spartz were ushered into Rowling’s office, an outbuilding with honey-colored wood and floor-to-ceiling windows.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2188" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxau4a000u3g6fhasvx0dt@published" data-word-count="71"><span data-dcnode-id="2189" instrument_node="">Rowling arrived: She gave them hugs, and when her husband walked in with their 6-month-old baby, she made introductions all around. Then the family cleared out and the interview began. Anelli and Spartz asked Rowling everything they could about the world she had created. For example, the Sorting Hat — it peers into the thoughts of each new Hogwarts student who arrives, then assigns them to one of four school houses.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2185" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxau6x000v3g6fvjip3q5r@published" data-word-count="9"><span data-dcnode-id="2186" instrument_node="">“Has the Sorting Hat ever been wrong?” Spartz asked.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2182" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxau7j000w3g6fic9qvrvc@published" data-word-count="4"><span data-dcnode-id="2183" instrument_node="">“No,” Rowling said, unequivocal.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2179" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxau8v000x3g6flz2k1o03@published" data-word-count="52"><span data-dcnode-id="2180" instrument_node="">The interview wound up running close to two hours, and on the car ride home, they opened the presents Rowling had given them: Anelli received a gold ring shaped like a snake with emerald eyes. The ring, Rowling wrote, was to thank her for her “invaluable protectiveness towards Harry and his fans.”</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2176" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaubi000y3g6fiq673f7c@published" data-word-count="39"><span data-dcnode-id="2177" instrument_node="">That weekend, Anelli had lived a fan fairy tale: She had gotten everything she wanted. Rowling had too. Her authority was, indeed, the whole point of the exercise. Anelli and Spartz were there to receive authorial pronouncements ex cathedra.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2167" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxauel000z3g6fmy0wdihy@published" data-word-count="62"><span data-dcnode-id="2174" instrument_node="">Anelli stayed in touch with the author for years after that first visit and interviewed Rowling for her own book, </span><a data-dcnode-id="2171" data-track-type="product-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Harry-History-Wizard-Inside-Phenomenon/dp/1416554955%3Fascsubtag%3D%255B%255Dc2%255Bp%255Dckiut0uce000077ofmyfogj70%26tag%3Dthecutonsite-20" rel="sponsored,nofollow"><em data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Harry, a History</span></em></a><em data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">.</span></em><span data-dcnode-id="2168" instrument_node=""> But over time, something changed — possibly for the author herself, certainly for Anelli and many other fans. By the summer of 2020, when The Leaky Cauldron and MuggleNet once more joined forces, it was to condemn J. K. Rowling.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2158" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxauf100103g6fqxixyldb@published" data-word-count="113"><span data-dcnode-id="2165" instrument_node="">In the past few years, Rowling began to share her skepticism of transgender identity online. She seemed to have aligned herself with a camp of people who often call themselves “gender-critical feminists”; opponents tend to call them TERFs, or “trans-exclusionary radical feminists,” though they are not necessarily very radical. Then, in June of 2020, she </span><a data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jkrowling.com/opinions/j-k-rowling-writes-about-her-reasons-for-speaking-out-on-sex-and-gender-issues/"><span data-dcnode-id="2164" instrument_node="">posted</span></a><span data-dcnode-id="2162" instrument_node=""> a 3,670-word essay titled “J. K. Rowling Writes About Her Reasons for Speaking Out on Sex and Gender Issues.” Here, </span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecut.com/2020/07/j-k-rowling-writes-essay-defending-her-transphobic-remarks.html"><span data-dcnode-id="2161" instrument_node="">she eliminated any lingering doubt</span></a><span data-dcnode-id="2159" instrument_node="">: Yes, she did in fact believe the trans-rights movement was “doing demonstrable harm in seeking to erode ‘woman’ as a political and biological class and offering cover to predators like few before it.”</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2153" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaugp00113g6fkdut2sm3@published" data-word-count="55"><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecut.com/2020/06/j-k-rowling-accused-of-transphobia-over-twitter-commentary.html"><span data-dcnode-id="2156" instrument_node="">Outcry followed.</span></a><span data-dcnode-id="2154" instrument_node=""> Fans, including many trans and nonbinary fans, felt betrayed. Rowling, meanwhile, felt she was the victim of online harassment by a mob hostile to her free speech. By the fall, her attitude toward trans people had become perhaps the first subject on which both Judith Butler and Pete Davidson were asked to opine.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2147" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxauk100123g6f3p8h1wfc@published" data-word-count="44"><span data-dcnode-id="2151" instrument_node="">“What’s wrong with her, Colin?” </span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vulture.com/2020/10/pete-davidson-talks-j-k-rowling-anti-trans-comments-on-snl.html"><span data-dcnode-id="2150" instrument_node="">Davidson asked “Weekend Update” co-anchor Colin Jost</span></a><span data-dcnode-id="2148" instrument_node="">. “She creates a seven-book fantasy series about all types of mythical creatures living in harmony with wizards and elves, and the one thing she can’t wrap her head around is Laverne Cox?”</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2138" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaulk00133g6ffapqqp8m@published" data-word-count="34"><span data-dcnode-id="2145" instrument_node="">“I confess to being perplexed,” Butler </span><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newstatesman.com/international/2020/09/judith-butler-culture-wars-jk-rowling-and-living-anti-intellectual-times"><span data-dcnode-id="2144" instrument_node="">told</span></a><span data-dcnode-id="2142" instrument_node=""> a </span><em data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">New Statesman</span></em><span data-dcnode-id="2139" instrument_node=""> interviewer, “by the fact that you point out the abuse levelled against J. K. Rowling, but you do not cite the abuse against trans people.”</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2132" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaun600143g6fb3jfchur@published" data-word-count="79"><span data-dcnode-id="2136" instrument_node="">“Perplexed” was a common reaction. Rowling had never been a particularly controversial figure. Her books sold hundreds of millions of copies, they inspired films that brought in billions of dollars, and she used the money she made to save children from orphanages. In 2012, she gave enough to charity and paid enough in taxes to knock herself off the </span><em data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Forbes</span></em><span data-dcnode-id="2133" instrument_node=""> billionaires list. In 2020, she was tweeting links to a store that sold pins that said F*CK YOUR PRONOUNS.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2129" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxautc00153g6fadfpu316@published" data-word-count="104"><span data-dcnode-id="2130" instrument_node="">Read another way, though, the latest turn in Rowling’s story looks perhaps less perplexing than inevitable. It is the culmination of a two-decade power struggle for ownership of her fictional world — the right to say what Harry Potter means. The Harry Potter books describe a stark moral universe: Their heroes fight on behalf of all that is good to defeat the forces of absolute evil. Though the struggle may be lonely and hard, right ultimately beats wrong. For fans, when it came to the matter of trans rights, the message of Harry Potter was clear. For Rowling, this was no less the case.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2126" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxauuw00163g6fdwx7nqss@published" data-word-count="31"><span data-dcnode-id="2127" instrument_node="">“She absolutely believes that she is right, that she’s on a mission, and that history will eventually bear her out,” Anelli told me. “She thinks she’s doing good work right now.”</span></p><span data-dcnode-id="2125" instrument_node="">
</span><div class="divider_short" data-dcnode-id="2121" data-editable="settings" data-uri="www.thecut.com/_components/divider/instances/ckiyxd2wt003n3g6fjhpyjsl9@published"><span data-dcnode-id="2124" instrument_node="">
</span><span class="divider-border" data-dcnode-id="2123"></span><span data-dcnode-id="2122" instrument_node="">
</span></div><span data-dcnode-id="2120" instrument_node="">
</span><p class="clay-paragraph_drop-cap" data-dcnode-id="2116" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxauy200173g6fpgvyj6xz@published" data-word-count="104"><strong data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Rowling completed the</span></strong><span data-dcnode-id="2117" instrument_node=""> first Harry Potter book in 1995 in a modest apartment in the Edinburgh port neighborhood of Leith. The period of her life spent there has been a longtime fixture of the Harry Potter press — before Scholastic paid her an unheard-of $105,000 for the American rights to the first book, Rowling was a single mother on public assistance, nursing cups of coffee so she could write in cafés. This Cinderella story proved irresistible, as did the parallel to Harry himself. Like the orphaned boy wizard who slept in a cupboard, his creator had been recognized and swept off to well-deserved glory.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2113" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxav1900183g6fynafkbun@published" data-word-count="129"><span data-dcnode-id="2114" instrument_node="">Rowling’s circumstances were in some ways not quite so dire as this story may suggest. She was a college graduate from a solidly middle-class background considering a teaching career. Still, she moved into the Leith apartment during a turbulent stretch of her late 20s and early 30s in which she was eventually diagnosed with depression. When Rowling was 25, her mother died of complications from multiple sclerosis; grieving, Rowling moved abroad and took a job teaching English in Portugal. She married a Portuguese journalist, but the marriage, she has said, was “catastrophic.” (Her ex-husband later told the tabloid press that he had slapped her the night she left.) Just over a year after the wedding, Rowling took her baby daughter and moved to be near her sister in Edinburgh.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2110" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxav2p00193g6fhbvjasp3@published" data-word-count="41"><span data-dcnode-id="2111" instrument_node="">She completed the seventh and final Harry Potter book at Edinburgh’s five-star Balmoral Hotel. J.K. ROWLING FINISHED WRITING HARRY POTTER AND THE DEATHLY HALLOWS IN THIS ROOM (652) ON 11 JAN 2007, she wrote on a marble bust in her suite.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2107" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxav47001a3g6fhqk8zuws@published" data-word-count="92"><span data-dcnode-id="2108" instrument_node="">As the series progressed, book tours and readings took on the pitch of Beatlemania. Rowling hired her own PR sentries and earned a reputation for guarding her privacy vigilantly. (In the fourth book, she introduces an unscrupulous tabloid journalist named Rita Skeeter, who is described as having heavy makeup and “mannish” hands. This is as good a place as any to mention that Rowling declined to be interviewed for this story.) She remarried after being set up with a Scottish doctor named Neil Murray, and she had two more children with him.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2104" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxav6d001b3g6fmotpnj5g@published" data-word-count="71"><span data-dcnode-id="2105" instrument_node="">Rowling had resisted Warner Bros.’ initial offer for the movie rights because she was far from completing the series and the studio hadn’t promised that any sequels would come from her work. By the time they reached an agreement, Rowling was no longer an unknown debut author; she had a growing fan base the studio didn’t want to alienate. She secured a deal that future films would hew to her books.</span></p><span data-dcnode-id="2103" instrument_node="">
</span><aside class="pull-quote" data-dcnode-id="2098" data-editable="inlineGroup" data-uri="www.thecut.com/_components/pull-quote/instances/ckiyxg2n6004m3g6f4hwj7fr9@published" itemscope=""><span data-dcnode-id="2102" instrument_node="">
</span><span class="quote has-quote-marks" data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">She absolutely believes that she is right, that she’s on a mission, and that history will eventually bear her out.</span></span><span data-dcnode-id="2099" instrument_node="">
</span></aside><span data-dcnode-id="2097" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2095" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxav7x001c3g6ffqo97szi@published" data-word-count="117"><span data-dcnode-id="2096" instrument_node="">When Oprah included an interview with “the billionaire mom behind the Harry Potter empire” in the final season of her talk show, such access was a trophy. Rowling had turned Oprah down once before, during the first flush of Potter publicity. This time, the author chose the Balmoral for their interview. As the two women spoke, a 1,300-square-foot suite stretched behind them; a tea service sat ornamentally in between. The red of a rug picked up the soles of Rowling’s beige patent Louboutin pumps. Her hair was sleek and blonde, her delivery polished. The 13 years that had passed since her first TV spots seemed not to have aged her but buffed her to a higher sheen.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2092" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxav9l001d3g6fufuxpo52@published" data-word-count="75"><span data-dcnode-id="2093" instrument_node="">Winfrey did her best to probe personal trauma; Rowling responded with polite restraint. In her unhappy first marriage, she allowed, she had “repeated patterns” from the family in which she had grown up. She and her father were estranged, she confirmed — “It wasn’t a good relationship, from my point of view, for a very long time.” Surrounded by the opulence Rowling could now treat as office space, Winfrey also wanted to talk about success.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2089" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavb3001e3g6f3jpard4b@published" data-word-count="18"><span data-dcnode-id="2090" instrument_node="">“Are you in a place now where you can accept that you will always be rich?” she asked.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2086" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavcm001f3g6fkqdezvk4@published" data-word-count="5"><span data-dcnode-id="2087" instrument_node="">“No,” said Rowling. “Are you?”</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2083" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavfx001g3g6f4u1mn2p2@published" data-word-count="90"><span data-dcnode-id="2084" instrument_node="">Winfrey said she was (“Kinda. Getting there”). Perhaps Rowling’s immediate reply had been British self-effacement, but it also suggested a certain alienation from the circumstances she had attained. Rowling had found herself an Oprah-level celebrity — but her idea of the perfect day, as she once said, was waking up in the morning two-thirds of the way through a book and knowing exactly where she was going, with nothing to do all day but write. Her fantasy was to be left alone in a world where she made the rules.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2080" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavga001h3g6f6lb8yurt@published" data-word-count="118"><span data-dcnode-id="2081" instrument_node="">Finishing her work on the Harry Potter books was an occasion Rowling mourned like a death. Harry’s world had been a reliable refuge, and she now seemed reluctant to depart. The final book concludes with an epilogue that stretches out her characters’ futures — their marriages, their children, their children’s prospective marriages. (She later told Anelli she tried to include more — more characters, more children, more details — but her editor had gently reined her in.) Shortly after the last book was published, Rowling made it clear that she wasn’t quite finished yet. Addressing an audience at Carnegie Hall, she announced that, though it hadn’t come up in the books, the Hogwarts headmaster Albus Dumbledore was gay.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2068" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavhx001i3g6f5x5kba2i@published" data-word-count="153"><span data-dcnode-id="2078" instrument_node="">At the time, this revelation caused a stir that was enthusiastic — mostly. “</span><em data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Oh, lady, you had your chance!” </span></em><span data-dcnode-id="2075" instrument_node="">Roger Sutton remembers thinking when Rowling unleashed the Dumbledore news. “I thought that was a real intrusion upon the reader’s experience. And I’m gayer than five Dumbledores.” Sutton is editor-in-chief of the American children’s-literature journal </span><em data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The Horn Book Magazine, </span></em><span data-dcnode-id="2072" instrument_node="">and when the Harry Potter books were first published, he was a rare dissenting voice (</span><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">The Sorcerer’s Stone</span></em><span data-dcnode-id="2069" instrument_node=""> was “likable but critically insignificant,” he wrote in 1999.) What repelled Sutton was precisely what had attracted many others: the way the author seemed determined to map and describe every corner of her fictional world. “Rowling showed you everything you would see. She told you everything you would hear,” he said. “I need more air in the books I read.” Down to the level of the sentence — her penchant for adverbs became a well-known foible — Rowling eschewed ambiguity.</span></p><span data-dcnode-id="2067" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2062" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavje001j3g6fxkkip4cn@published" data-word-count="106"><span data-dcnode-id="2066" instrument_node="">One of the fans most devoted to Rowling’s exhaustive world building was a former Michigan school librarian named Steven Vander Ark. His website, </span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hp-lexicon.org/"><span data-dcnode-id="2065" instrument_node="">The Harry Potter Lexicon</span></a><span data-dcnode-id="2063" instrument_node="">, had won Rowling’s praise; it catalogued the minutiae of her books in such detail that she said she occasionally consulted it to fact-check her work as she wrote. In the months after the series concluded, Vander Ark contracted with a local publisher to turn his site into a print volume, and Rowling’s appreciation soured. Suing Vander Ark’s publishers for copyright infringement, she said, “I believe that this book constitutes the wholesale theft of 17 years of my hard work.”</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2059" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavkt001k3g6fp8ztoxm8@published" data-word-count="111"><span data-dcnode-id="2060" instrument_node="">Representing Vander Ark’s publisher, the executive director of Stanford Law School’s Fair Use Project pointed out that publishing companion guides to existing works was a practice that had been accepted “for hundreds of years.” But Neil Blair, one of Rowling’s agents, said that people who wished to produce such companions typically approached Rowling’s representatives first. Before publishing anything, they would seek her approval and make changes where requested; they would, in other words, “fall in line.” The judge ruled in Rowling’s favor, awarding $6,750 in damages. Vander Ark had broken down in tears as he testified, but after the trial, he avowed that he would always be a Harry Potter fan.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><div class="divider_short" data-dcnode-id="2054" data-editable="settings" data-uri="www.thecut.com/_components/divider/instances/ckiyxcqxk003f3g6fetdw5apg@published"><span data-dcnode-id="2057" instrument_node="">
</span><span class="divider-border" data-dcnode-id="2056"></span><span data-dcnode-id="2055" instrument_node="">
</span></div><span data-dcnode-id="2053" instrument_node="">
</span><p class="clay-paragraph_drop-cap" data-dcnode-id="2049" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavm6001l3g6frz0ws1le@published" data-word-count="135"><strong data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Blair was working</span></strong><span data-dcnode-id="2050" instrument_node=""> at Warner Bros. when he got into the business of Harry Potter. He was quick to sense the books’ commercial promise and the potential for its author to play a powerful role. He left Warner Bros. to work for Rowling’s agent; then, in 2011, he started an agency of his own and took Rowling with him. This inaugurated a period in which, books complete, the business continued to grow. Warner Bros. would eventually announce a Harry Potter Global Franchise Development Team. Two Harry Potter theme parks had already opened; plans were under way to expand and open others. Pottermore, an online publishing hub launched in 2012, allowed Rowling to control her own e-book rights and share her writing with fans. But what exactly the fans wanted from her remained to be seen.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2046" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavny001m3g6f73ek9kgg@published" data-word-count="197"><span data-dcnode-id="2047" instrument_node="">“Rowling was very much an untouchable goddess in the 2000s, at the height of her power,” Ebony Elizabeth Thomas told me. Thomas is a professor of children’s literature at the University of Pennsylvania; back in 2000, she was a recent college graduate teaching fifth grade. That was when she discovered Harry Potter and soon became immersed in the fandom taking shape online. She had just led a 2003 fan panel on postcolonial readings (“Imperial Harry”) when a Dr. Seuss scholar in the audience suggested she consider academia. From the fifth-graders she first taught to the graduate students she teaches now, Thomas has spent years following the millennials who grew up alongside Rowling’s characters. It’s the last cohort with any memory at all of a world where they couldn’t read a story and fire off a public critique — or, for that matter, rewrite the story in a way its author never imagined, share it publicly, and find readers of their own. Thomas is only a decade or so older than her students, but she still marvels at the agency they claim as readers. Rowling fashioned herself an untouchable goddess at the exact moment untouchable goddesses became obsolete.</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2043" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavqf001n3g6fxxvirycr@published" data-word-count="171"><span data-dcnode-id="2044" instrument_node="">Rowling knew her books had a tremendous number of fans, and she knew the fans talked to one another online. Still, she had published four Harry Potter books before she permitted herself to do some Googling and explore. “I was concerned for the safety of the fragile glass bubble within which I wrote,” she once explained. There was something about the internet’s basic dynamics that unnerved her. “I had no idea there was this huge underworld seething beneath me,” she told Anelli and Spartz in their Edinburgh interview. The plot of the second Harry Potter book hinges on a sinister enchanted diary — you write in it, and someone unseen and unidentified writes back. Although, at the time, Rowling had never been in a chat room, she realized later that this was basically what she had in mind. “Just typing your deepest thoughts into the ether and getting answers back, and you don’t know who is answering you,” she told an interviewer. “That was always a very scary image to me.”</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2040" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavs5001o3g6f46u3ghip@published" data-word-count="139"><span data-dcnode-id="2041" instrument_node="">What Rowling initially found scary was exactly what others found exciting, even liberating: Identity could be slippery online. Flourish Klink was 11 in 1998, when Harry Potter fandom (and a Bondi Blue iMac) became the gateway to a new life. On the internet, after all, nobody knows you’re a suburban middle-schooler. Klink could write, and that was what mattered in the Harry Potter for Grownups fan group — “so I was just, like, rocking out.” There were plenty of fans who were reverential toward Rowling’s creation, but many others reimagined her work so that dead characters were living, straight characters gay, or villains sympathetic. Rowling’s creations felt ubiquitous, timeless; for readers who had grown up on Harry, J. K. Rowling was practically the Brothers Grimm. The archetypes and lore she assembled were raw material for new stories to be told.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2031" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavtj001p3g6fnnqmqovr@published" data-word-count="141"><span data-dcnode-id="2038" instrument_node="">In Rowling’s world, for example, gender was an essential, immutable fact, and it had been that way from her first flicker of inspiration. “From the word </span><em data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">go,</span></em><span data-dcnode-id="2035" instrument_node=""> it was a boy,” she has said of imagining her protagonist. “I never thought, </span><em data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Oh, maybe it’s a girl. </span></em><span data-dcnode-id="2032" instrument_node="">Never once. It was always a boy.” Yet Rowling also invented the character Nymphadora Tonks (known as Tonks) — a “Metamorphmagus” able to change shape at will. Klink remembers writing “the queerest fanfic I’ve ever written” about Tonks turning into a man. Since then, Klink has come out as nonbinary. “I loved Tonks — and for a lot of other people who are nonbinary, Tonks was a big deal,” they told me. But “when you look back on Tonks, Tonks never changes into a guy. Tonks never changes into anything but different kinds of girl.”</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2028" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavv4001q3g6fwl2nnzq3@published" data-word-count="104"><span data-dcnode-id="2029" instrument_node="">While the fandom emerged alongside the social internet, it wasn’t until 2014 that Rowling herself embraced Twitter and embarked on a prolific posting career. Tweeting, she was delighted to discover, was writing. “You’re swimming in your own medium,” she told a 2015 interviewer. “Twitter for me has been an unmixed blessing.” Rowling too found she could be the person she wanted to be online. For her, this meant shrugging off the trappings of celebrity. “There came a point where Harry became so enormous that, at a reading, there were 2,000 people,” she explained. “You can’t answer everyone’s question. Twitter gave that back to me.”</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2025" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxavws001r3g6fde7vqxgk@published" data-word-count="102"><span data-dcnode-id="2026" instrument_node="">It was also an ideal conduit for a constant stream of Harry Potter amendments. Readers learned that Fluffy, the three-headed dog, had been repatriated to Greece; that Luna Lovegood’s birthday was February 13; and that there was at least one Jewish student at Hogwarts (his name was Anthony Goldstein, and he was a Ravenclaw). They learned that Hogwarts was tuition-free and that, among wizards, homophobia did not exist. The journalist Brian Feldman’s tweet poking fun at her relentless output went viral: “*J. K. rowling wakes up* what’s today’s tweet *spins large bingo cage* hagrid … is … pansexual and … he later joined isis.”</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2022" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaw20001s3g6fety5y5yd@published" data-word-count="109"><span data-dcnode-id="2023" instrument_node="">Rowling’s updates sometimes seemed like retroactive gestures toward inclusion. She often described the series as a plea for tolerance. A fixation on blood purity is central to Voldemort’s villainy — he and his followers look down on wizards of non-magical birth. A 2014 study by Italian psychologists suggested that reading Harry Potter “improves attitudes toward stigmatized groups,” and young fans seemed to bear this out. An organization called the Harry Potter Alliance sought to channel the energy of fandom into activism. The group launched campaigns to fight genocide in Darfur and bring medical supplies to Haiti; it championed literacy, net neutrality, girls’ education access, gay rights, and immigration reform.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2013" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaw3q001t3g6fusjbl6bi@published" data-word-count="142"><span data-dcnode-id="2020" instrument_node="">Jackson Bird worked at the Harry Potter Alliance from 2013 to 2018, eventually serving as communications director. He is the author of </span><a data-dcnode-id="2017" data-track-type="product-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Sorted-Growing-Coming-Finding-Transgender/dp/198213075X%3Fascsubtag%3D%255B%255Dc2%255Bp%255Dckiut0uce000077ofmyfogj70%26tag%3Dthecutonsite-20" rel="sponsored,nofollow"><em data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Sorted</span></em></a><em data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">,</span></em><span data-dcnode-id="2014" instrument_node=""> a 2019 memoir about coming out as trans and being a Harry Potter fan. “The fan community had to evolve on LGBTQ+ issues in the same way that the larger Western world has in recent decades,” Bird told me, “but did so a little bit more quickly and a little bit earlier — probably just because there were so many closeted people in the community.” In 2016, the Harry Potter Alliance ran a campaign called Protego, named for “a powerful shield spell, used throughout the magical world to make a space safer.” Fans working on Protego contributed to a worldwide map of gender-neutral bathrooms and sent postcards to North Carolina’s Republican governor to protest the state’s anti-trans bathroom bill.</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2010" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaw5d001u3g6fh4o3woa3@published" data-word-count="132"><span data-dcnode-id="2011" instrument_node="">The Harry Potter books are about tolerance, but they are also about identity and the experience of being identified. Harry’s story starts when he learns the reason he has always felt different: He’s a wizard, and the world he inhabits is divided into non-magical muggles and people like him. Upon arriving at Hogwarts, Harry and his magical peers are sorted into four houses based on their characters. The process reveals their truest selves and shapes their fates. While this may seem like a grave crossroads for an 11-year-old to face, sorting has always held a powerful appeal. The self-proclaimed millennial Gryffindor (or Slytherin or Ravenclaw or Hufflepuff) is the stuff of generational caricature. And for fans like Jackson Bird and Flourish Klink, Harry Potter was the realm in which real-life identities crystallized.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2001" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaw70001v3g6fh2n876c0@published" data-word-count="252"><span data-dcnode-id="2008" instrument_node="">Rowling published adult fiction regularly through the 2010s, primarily a crime series under the pseudonym Robert Galbraith. (When her real identity was leaked through a partner at her law firm, she sued the partner. The books then became best sellers.) Still, she hadn’t left Harry’s universe behind, and her efforts at expansion could raise fresh questions of identity and inclusivity. In 2016, with a film adaptation of her fictional textbook </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Fantastic Beasts and Where to Find Them</span></em><span data-dcnode-id="2005" instrument_node=""> on the horizon, Rowling released new writing on Pottermore. This time, she cast her gaze beyond Britain, to unfortunate effect. According to “Magic in North America,” the Magical Congress of the United States of America was founded in 1693, or 83 years before there was a United States. In 1777, wizard president Elizabeth McGilliguddy worked out of Washington, D.C., a city that did not then exist. While these mistakes were partially corrected on Pottermore, larger concerns remained: Rowling had taken the Navajo concept of shape-shifting “skin walkers” and adapted it to suit her magical world in a way that struck many Native American readers as trivializing. “Rowling is known for responding directly to fan questions on Twitter,” </span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nativeappropriations.com/2016/03/magic-in-north-america-part-1-ugh.html"><span data-dcnode-id="2004" instrument_node="">wrote</span></a><span data-dcnode-id="2002" instrument_node=""> Cherokee academic Adrienne Keene on her blog, Native Appropriations. “Despite thousands of tweets directed at her about these concerns, she has not addressed it at all.” Meanwhile, readers pointed out that the wizarding school Rowling placed in Uganda had a West African name; the wizarding school in Japan had a name that didn’t make sense in Japanese.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1998" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawab001w3g6ffn2i931u@published" data-word-count="113"><span data-dcnode-id="1999" instrument_node="">Flourish Klink now advises entertainment franchises on building relationships with fans. The approach Rowling took to global wizarding struck them as a waste. “She missed a big trick there,” Klink told me. There had been an opportunity to collaborate with writers who had relevant expertise, but it would have meant ceding some creative control. “People always get pissed off about anything where you’re using cultural beliefs in any way,” Klink said of the response to Rowling’s take on skin walkers. “But I think that if it had been well done, and in consultation with someone who had even a remote amount of knowledge about it, it would have been a lot less offensive.”</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1995" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawaq001x3g6fc8ixp2zo@published" data-word-count="182"><span data-dcnode-id="1996" instrument_node="">Between the Pottermore updates and the constant tweets, “she was beginning to revise her canon in ways that became increasingly cringeworthy,” said Thomas, the children’s-literature scholar. Revisiting books published ten or 15 years before made more readers pay attention to things that might have slipped their notice as children. (For example: Wouldn’t it have been a better choice, all things considered, not to make the bankers of the wizarding world a race of hook-nosed goblins? And surely it wouldn’t have taken too much work to find a better name for Harry’s generically Asian love interest than Cho Chang?) Yet none of this was, in itself, destructive to Harry Potter’s appeal. The fandom had grown into a vast community independent of one woman in Edinburgh. By the time Klink took Flourish as their legal name, they had long since come to feel that Rowling, “while great, was not, you know … the greatest writer who ever lived.” What started out as a reference to her work — the wizarding bookstore Flourish and Blotts — had been Klink’s screen name for more than two decades.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1986" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawgb001y3g6f27kg4kje@published" data-word-count="64"><span data-dcnode-id="1993" instrument_node="">The year 2016 also brought the closest thing yet to a new Harry Potter book. </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vulture.com/2016/07/critics-love-harry-potter-and-the-cursed-child.html"><em data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Harry Potter and the Cursed Child</span></em></a><em data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">,</span></em><span data-dcnode-id="1987" instrument_node=""> a two-part play lasting over five hours, was based on a story by Rowling conceived in collaboration with director John Tiffany and playwright Jack Thorne. The three joined Will Gompertz of the BBC for an interview before its opening in London’s West End.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1983" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawhr001z3g6f535emmfd@published" data-word-count="32"><span data-dcnode-id="1984" instrument_node="">“Is there a sense,” Gompertz asked Rowling, “in your own mind — philosophically, more than sort of literally — that you don’t own Potter anymore, that it’s owned by the fan base?”</span></p><span data-dcnode-id="1982" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1977" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawkd00203g6f98rcn03f@published" data-word-count="100"><span data-dcnode-id="1981" instrument_node="">“I wouldn’t go that far, Will,” she said, not quite smiling. (Someone with Rowling’s taste for adverbs might note that she said this </span><em data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">rather sharply.</span></em><span data-dcnode-id="1978" instrument_node="">) The collaborators sitting alongside her laughed. “I’m deadly serious,” she continued. “Because that would be to disavow what that world was to me. Seventeen years, that world was mine. And for seven of those years, it was entirely mine; not a living soul knew anything about it. And I can’t just uproot that from all the personal experiences that informed those stories and say, ‘I’m throwing that away now.’ And that’s how that would feel.”</span></p><span data-dcnode-id="1976" instrument_node="">
</span><div class="divider_short" data-dcnode-id="1972" data-editable="settings" data-uri="www.thecut.com/_components/divider/instances/ckiyxcerc00383g6f7g7y24jn@published"><span data-dcnode-id="1975" instrument_node="">
</span><span class="divider-border" data-dcnode-id="1974"></span><span data-dcnode-id="1973" instrument_node="">

</span></div><span data-dcnode-id="1937" instrument_node="">
</span></div><span data-dcnode-id="1935" instrument_node="">
</span><p class="clay-paragraph_drop-cap" data-dcnode-id="1931" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawkp00213g6f5obkh9ud@published" data-word-count="62"><strong data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">The dawn of the Trump era</span></strong><span data-dcnode-id="1932" instrument_node=""> found the vocabulary of Harry Potter deployed with new urgency. Hermione signs proliferated at the Women’s March. A meme juxtaposed the grim Inauguration Day faces of Barack Obama’s staff with a movie still from Voldemort’s arrival at the climactic Battle of Hogwarts. “Order of the Phoenix, mount up,” tweeted Lin-Manuel Miranda alongside a Harry Potter GIF.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1922" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawma00223g6f43kcag46@published" data-word-count="138"><span data-dcnode-id="1929" instrument_node="">Rowling, for her part, fired off insults at the new U.S. president with palpable delight. Her politics had always been comfortably center left. Back in 2005, she had chatted with Spartz and Anelli about how much she loved </span><em data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">The West Wing</span></em><span data-dcnode-id="1926" instrument_node="">; in 2009, she contributed to the “</span><em data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Time</span></em><span data-dcnode-id="1923" instrument_node=""> 100” with an ode to Labour prime minister Gordon Brown. Like her fans, Rowling translated politics into the language of Harry Potter: Voldemort was “nowhere near as bad” as Trump, she declared. Sometimes the analogies were more complicated, as when she cited Dumbledore to explain her opposition to a boycott of Israel. And sometimes she objected to the parallels others saw. Quote-tweeting a woman with 44 followers (Rowling had at the time some 7.5 million), Rowling took issue with her description of Labour leader Jeremy Corbyn as “a political Dumbledore.”</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1919" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawnm00233g6f2zwe81b7@published" data-word-count="143"><span data-dcnode-id="1920" instrument_node="">“I forgot Dumbledore trashed Hogwarts, refused to resign and ran off to the forest to make speeches to angry trolls,” she wrote. She stressed the point two months later: “Corbyn. Is. Not. Dumbledore.” Rowling issued long threads decrying “Saint Jeremy” and lambasting a Corbyn supporter who had called Theresa May a whore. Corbyn, though hardly above reproach, was, notably, pro-trans-rights. He supported making gender self-identification less onerous; he would later, on occasion, introduce himself with his pronouns. One of Rowling’s early gestures that attracted scrutiny on trans rights was her liking a tweet that referred to young Corbynite Labour figures who were trans. “Men in dresses get brocialist solidarity I never had. That’s misogyny!” it read. Rowling’s publicist dismissed the like as “a clumsy and middle-aged moment,” but, if it had been an accident, it was not one her client chose to correct.</span></p><span data-dcnode-id="1918" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1916" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawp600243g6fbdnlsut5@published" data-word-count="179"><span data-dcnode-id="1917" instrument_node="">At the time, transgender rights were becoming a lightning rod in the U.K. The British government called for a public consultation on the country’s Gender Recognition Act in 2018, which moved the issue to the center of national debate. In the Labour Party infighting Rowling had joined, the “trans-rights activist” had become a figure discussed in much the same way as the “Bernie bro” across the Atlantic: They were young, they were angry at their Establishment elders, and, crucially, for many prominent British feminists, this anger was coded as misogyny. British feminism’s leading voices, writers who had been setting the feminist agenda in Britain’s major papers for years, advanced the view that trans rights were an attack on women’s rights (or even an attempt at “female erasure”), that trans women were men seeking to invade women’s spaces, that trans men were women lost to homophobia and self-loathing, and that all this represented a grave threat to “natal” women and girls. On Mumsnet, a popular British parenting site, anxiety over the dangers of trans rights overtook the “Feminism” message board.</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1913" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawqp00253g6fzqr8fhgj@published" data-word-count="59"><span data-dcnode-id="1914" instrument_node="">The divide here between mainstream British feminists and their American counterparts is striking: American opponents of trans rights tend to be right wing. The difference reflects, perhaps, the relative insularity and homogeneity of British feminism. In America, challenges from feminists across marginalized groups have increasingly pressed those who would speak on behalf of “women” to reexamine whom they mean.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1907" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaws700263g6faep6eolq@published" data-word-count="128"><span data-dcnode-id="1911" instrument_node="">Fans began to note with alarm that Rowling followed vocally anti-trans Twitter accounts. Some had also taken note of certain things in Rowling’s crime novels — like the trans character her detective hero taunts by saying that jail “won’t be fun … not pre-op.” All of this mostly passed beneath widespread public notice, however. More prominently controversial was Rowling’s support for Johnny Depp. Set to star in a new </span><em data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Fantastic Beasts</span></em><span data-dcnode-id="1908" instrument_node=""> movie, he stood accused of domestic abuse. In a statement, Rowling said that, based on her understanding of his case, she was “genuinely happy” to have Depp stay on. Others may disagree, she acknowledged, but “conscience isn’t governable by committee.” Depp was her peer in a rarefied world; they had (at different times) owned the same yacht.</span></p><span data-dcnode-id="1906" instrument_node="">
</span><aside class="pull-quote" data-dcnode-id="1901" data-editable="inlineGroup" data-uri="www.thecut.com/_components/pull-quote/instances/ckiyxhepp004v3g6fmo6ccmvs@published" itemscope=""><span data-dcnode-id="1905" instrument_node="">
</span><span class="quote has-quote-marks" data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">I can’t imagine having had that much cultural significance and power, feeling as if the ground is shifting underneath your feet. Being told that you’re wrong.</span></span><span data-dcnode-id="1902" instrument_node="">
</span></aside><span data-dcnode-id="1900" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1898" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawtm00273g6fmihchzhk@published" data-word-count="134"><span data-dcnode-id="1899" instrument_node="">Meanwhile, Rowling undertook a new courtroom battle. In 2019, she brought a lawsuit against Amanda Donaldson, a former personal assistant who, between 2014 and 2017, had used a business credit card and unauthorized cash withdrawals to defraud Rowling of some £18,743. (Rowling said she intended to donate any money she recovered to Lumos, her children’s charity.) “The expenditure on Molton Brown toiletries of £3,629 was extraordinary,” Rowling testified, according to court records. She “had never asked [Donaldson] to buy these toiletries. She does not like them. She finds them overly-perfumed.” Donaldson’s exploits suggested a portrait of Rowling’s life that (according to Rowling) was all wrong. “It was darkly comical to suggest that the things [Donaldson] bought were what [Rowling] would want or need. She was staggered that [Donaldson] thought she would not be caught.”</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1895" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawv400283g6f876nr7xf@published" data-word-count="82"><span data-dcnode-id="1896" instrument_node="">Animating the Donaldson lawsuit is a sense of shocked violation — alarm at a sanctuary breached. Ever since vaulting to fame, Rowling had sought the protection of some private realm. After selling the Edinburgh house Melissa Anelli had visited, she purchased another, this one behind fast-growing hedges; they soon approached 30 feet high. But her safest space had long been the one she found in writing. There, she knew all the secrets, ordained good and evil, and decided how everything would end.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1892" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawwj00293g6flbexqhjx@published" data-word-count="93"><span data-dcnode-id="1893" instrument_node="">“I can’t imagine what it would be like to exist in her shoes,” Thomas said of Rowling’s recent years. “Where this story that lived in your head during the worst time in your life — when you’re a single mom, abuse survivor, living on welfare — your wildest dream comes true. Your story is the best-selling children’s-book series of all time. You transform children’s literature and media … I can’t imagine having had that much cultural significance and power, feeling as if the ground is shifting underneath your feet. Being told that you’re wrong.”</span></p><span data-dcnode-id="1891" instrument_node="">
</span><div class="divider_short" data-dcnode-id="1887" data-editable="settings" data-uri="www.thecut.com/_components/divider/instances/ckiyxbxsc00323g6fipwsidn4@published"><span data-dcnode-id="1890" instrument_node="">
</span><span class="divider-border" data-dcnode-id="1889"></span><span data-dcnode-id="1888" instrument_node="">
</span></div><span data-dcnode-id="1886" instrument_node="">
</span><p class="clay-paragraph_drop-cap" data-dcnode-id="1882" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawyc002a3g6fh709td05@published" data-word-count="93"><strong data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Maya Forstater was</span></strong><span data-dcnode-id="1883" instrument_node=""> a British tax researcher at a think tank, and after she repeatedly voiced her belief that trans women are men, the think tank chose not to renew her contract. Forstater challenged the decision, an employment tribunal ruled against her, and at this point Rowling was inspired to speak up. “Dress however you please. Call yourself whatever you like. Sleep with any consenting adult who’ll have you. Live your best life in peace and security,” Rowling tweeted. “But force women out of their jobs for stating sex is real? #IStandWithMaya #ThisIsNotADrill.”</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1876" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxawzz002b3g6ffes5amlh@published" data-word-count="96"><span data-dcnode-id="1880" instrument_node="">The tweet marked </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecut.com/2019/12/j-k-rowling-defends-researcher-who-made-anti-trans-comments.html"><span data-dcnode-id="1879" instrument_node="">Rowling’s first direct statement on trans issues</span></a><span data-dcnode-id="1877" instrument_node="">. “This Is Not a Drill” is the title of a Medium post on the case by the British philosopher Kathleen Stock, who had taken up Forstater’s cause. Apart from advancing philosophical objections to trans identity, Stock’s work focuses on aesthetics, and in that field, she is a proponent of “extreme intentionalism.” Set in opposition to Continental theory, this view holds that fiction is “a set of instructions to imagine certain things” — a book means whatever its writer says it does. The author is always right.</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1870" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxax4f002c3g6f05eypa12@published" data-word-count="92"><span data-dcnode-id="1874" instrument_node="">After the outrage over her Forstater tweet, Rowling stepped away from Twitter. She returned in the spring of this year. She was preparing for the release of a new children’s book called </span><em data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">The Ickabog,</span></em><span data-dcnode-id="1871" instrument_node=""> and besides, it was lockdown. She was taking Harry Potter quizzes. She was reorganizing her books by color, she reported, posting a video of her library. She seemed to be recapturing her old enthusiasm for the medium when, in June, she shared a story with the headline “Opinion: Creating a More Equal Post-COVID-19 World for People Who Menstruate.”</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1867" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxax77002d3g6fzaxp7ycl@published" data-word-count="79"><span data-dcnode-id="1868" instrument_node="">“I’m sure there used to be a word for those people. Someone help me out. Wumben? Wimpund? Woomud?” she wrote. The tone called to mind her Trump-heckling days; it was a tweet that anticipated applause. It bombed. Rowling returned a half-hour later on a note of affronted righteousness. “It isn’t hate to speak the truth,” she wrote in a thread insisting that she respected “every trans person’s right to live any way that feels authentic and comfortable to them.”</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1864" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxax98002e3g6frnqtm4va@published" data-word-count="211"><span data-dcnode-id="1865" instrument_node="">Four days later, Rowling elaborated in her long essay on reasons for “speaking out.” She had been following trans issues for a couple of years now, she wrote. In part, her interest was professional: One of the main characters in her crime novels is a young woman “of an age to be interested in, and affected by” such issues. The connection between the Galbraith books’ heroine and trans issues was not at first apparent, but this character is a rape survivor, and, as Rowling’s essay progressed, it became clear that this went to the crux of her argument. “I’ve been in the public eye now for over twenty years and have never talked publicly about being a domestic abuse and sexual assault survivor,” she wrote. She had hesitated to discuss these things not out of shame but because they remained so difficult to revisit. “My perennial jumpiness is a family joke,” Rowling wrote. “I pray my daughters never have the same reasons I do for hating sudden loud noises, or finding people behind me when I haven’t heard them approaching.” She brought up her experiences now “out of solidarity with the huge numbers of women who have histories like mine, who’ve been slurred as bigots for having concerns around single-sex spaces.”</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1861" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxan002f3g6f7gyncgba@published" data-word-count="43"><span data-dcnode-id="1862" instrument_node="">“When you throw open the doors of bathrooms and changing rooms to any man who believes or feels he’s a woman,” Rowling wrote, “then you open the door to any and all men who wish to come inside. That is the simple truth.”</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1852" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxih002g3g6fj514t14p@published" data-word-count="237"><span data-dcnode-id="1859" instrument_node="">In the U.S., right-wing supporters of “bathroom bills” have long conjured the specter of a male predator in the ladies’ room. Yet there’s an element of psychological reality to an argument like Rowling’s that makes it something more than cynical scare-mongering. Alison Phipps is a professor of gender studies at the University of Sussex and the author of </span><a data-dcnode-id="1856" data-track-type="product-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Me-not-you-Alison-Phipps/dp/1526147173%3Fascsubtag%3D%255B%255Dc2%255Bp%255Dckiut0uce000077ofmyfogj70%26tag%3Dthecutonsite-20" rel="sponsored,nofollow"><em data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Me, Not You: The Trouble With Mainstream Feminism</span></em></a><em data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">.</span></em><span data-dcnode-id="1853" instrument_node=""> In her observation of the self-styled “gender-critical” feminists, their position “has a lot to do with trauma, and it has a lot to do with anger,” she told me. “I’m not excusing this politics, but I think that that is a reason for it. I think there are a lot of women involved in gender-critical feminism who have been really, really badly hurt by men — cis men.” The problem is that “gender-critical feminism completely misrepresents where the danger is. Very few people are going to be raped by somebody in a public toilet.” (A 2019 Harvard study, meanwhile, found that policies restricting bathroom access by birth sex were correlated with a greater likelihood of sexual assault for trans and nonbinary teens.) Fears can be ungrounded or unfair and still be genuinely felt. “People’s triggers are not politically correct,” Phipps said. You can support people who are triggered, try to help them manage their fears — but “that doesn’t mean that people’s triggers should be used as the basis of policy.”</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1846" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxq9002h3g6ftszx7xj7@published" data-word-count="114"><span data-dcnode-id="1850" instrument_node="">The experience of womanhood that anti-trans feminists present often seems to be defined by fear. Maya Forstater, for example, shared an essay in 2019 </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncommongroundmedia.com/banned-from-medium-pronouns-are-rohypnol/"><span data-dcnode-id="1849" instrument_node="">called</span></a><span data-dcnode-id="1847" instrument_node=""> “Pronouns Are Rohypnol.” The pseudonymous author writes that she refuses to “use female pronouns for anyone male”: Extra mental effort might be expended in using a trans woman’s preferred pronouns, and therefore their effect is akin to a date-rape drug. “They dull your defenses. They change your inhibitions. They’re meant to. You’ve had a lifetime’s experience learning to be alert to ‘him’ and relax to ‘her.’ ” Forstater called it an “important article,” adding, “every woman has learnt from experience that politeness is exploitable &amp; can put us in danger.”</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1843" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxsp002i3g6f0xgcixpm@published" data-word-count="10"><span data-dcnode-id="1844" instrument_node="">“I think there’s a certain attachment to victimhood,” Phipps said.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1836" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxuc002j3g6flnicrkup@published" data-word-count="70"><span data-dcnode-id="1841" instrument_node="">“I spoke up about the importance of sex and have been paying the price ever since,” Rowling wrote in her essay. “I was transphobic, I was a cunt, a bitch, a TERF, I deserved cancelling, punching and death.” Describing herself as “a much-banned author,” she cast her choice to write anyway in terms of free speech and later lent her support to the </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harpers.org/a-letter-on-justice-and-open-debate/"><em data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Harper’s</span></em></a><span data-dcnode-id="1837" instrument_node=""> “Letter on Justice and Open Debate.”</span></p><span data-dcnode-id="1835" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1833" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxvw002k3g6fr7rfrq5v@published" data-word-count="84"><span data-dcnode-id="1834" instrument_node="">Twelve years before, at a Harvard commencement, Rowling had delivered a speech in which she extolled the importance of imaginative empathy. “Unlike any other creature on this planet, humans can learn and understand without having experienced. They can think themselves into other people’s place,” she said. But “many prefer not to exercise their imaginations at all. They choose to remain comfortably within the bounds of their own experience, never troubling to wonder how it would feel to have been born other than they are.”</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1830" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxyi002l3g6fzz4mouue@published" data-word-count="49"><span data-dcnode-id="1831" instrument_node="">Rowling now seemed unable to think her way into her critics’ point of view. Comfortably within the bounds of her own experience, she could not imagine the reader who detected a threat, if not in the person of Joanne Rowling herself, then in the audience her words might reach.</span></p><span data-dcnode-id="1829" instrument_node="">
</span><div class="divider_short" data-dcnode-id="1825" data-editable="settings" data-uri="www.thecut.com/_components/divider/instances/ckiyxbmv2002x3g6fo5blbxc1@published"><span data-dcnode-id="1828" instrument_node="">
</span><span class="divider-border" data-dcnode-id="1827"></span><span data-dcnode-id="1826" instrument_node="">
</span></div><span data-dcnode-id="1824" instrument_node="">
</span><p class="clay-paragraph_drop-cap" data-dcnode-id="1818" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxaxys002m3g6f2ty28xwl@published" data-word-count="136"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">I </span></strong><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">❤️ JK ROWLING,</span></strong><span data-dcnode-id="1819" instrument_node=""> read a poster that appeared in the Edinburgh Waverley rail station in July. It stayed up only briefly. Network Rail said its “political nature” violated its advertising rules. But it lasted long enough to make an impression on Chris Elston, an insurance broker in British Columbia. Elston told me that in the past year or so, he had begun following “all of the things to do with gender ideology.” He was troubled by what he read. “This self-identification law Canada has just passed will enable any man to suddenly declare that they’re a woman,” he said. “I have two little girls, and I just got really tired of all this nonsense.” When he saw that the Edinburgh sign had been removed, he decided to commission a billboard of his own in Vancouver.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1812" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxay1x002n3g6f9kegp4ju@published" data-word-count="81"><span data-dcnode-id="1816" instrument_node="">The September morning that Elston’s billboard went up, it received little reaction until he tweeted it out. “It went </span><em data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">boom</span></em><span data-dcnode-id="1813" instrument_node=""> on Twitter,” he said. The billboard was paint-bombed overnight; a city councillor called it hate speech. The sign company “buckled to the pressure right away” and brought in a crew to cover it up. Afterward, Elston sent out a call on Twitter, where he has 25,100 followers. He sought funding to put up more billboards, and he received an enthusiastic response.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1809" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxay44002o3g6f3nli1g0e@published" data-word-count="159"><span data-dcnode-id="1810" instrument_node="">For those opposed to “gender ideology,” Rowling’s embrace of their cause has made her an icon. How, proponents ask rhetorically, could it possibly be “hate speech” to proclaim a love for the best-selling children’s author of all time? Around Vancouver, Elston likes to go out in a sandwich board that reads I ❤️JK ROWLING on one side and GENDER IDEOLOGY DOES NOT BELONG IN SCHOOLS on the other. “I stand on street corners, and I go to wherever there are crowds downtown, and I have conversations with people. I’m really calm,” he said. Even so, “I’ve been making a lot of waves.” In October, he wore his sandwich board to a rally held by a trans candidate for local office. Later that month — the same week an Edinburgh street was shut down so Rowling could comply with a city order to trim her hedges — Elston was arrested at a protest in Vancouver for allegedly causing a disturbance.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1806" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxay79002p3g6f5zn8ccxn@published" data-word-count="116"><span data-dcnode-id="1807" instrument_node="">“J. K. Rowling has absolutely been the inspiration for all of this,” Elston said. “In her books, there’s a journalist called Rita Skeeter. And Rita Skeeter is one of these lying journalists who has a poison pen and constantly lies about people and writes fake news. And that’s what’s going on about J. K. Rowling. And that’s what’s going on with me.” He is determined to stay the course. “It’s really hard. My pulse is often elevated way beyond what it should be, because there’s so much hate and lies and stress coming at me. So that’s physiologically going on. But in my mind, I’m crystal clear. And I’m totally at peace with what needs to be done.”</span></p><span data-dcnode-id="1805" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1803" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxay8z002q3g6fsfqmfe6j@published" data-word-count="49"><span data-dcnode-id="1804" instrument_node="">Elston began the Harry Potter books for the first time with his 8-year-old daughter this year. When we spoke, they were just starting the fourth. “Honestly, as I read these books, I feel J. K. Rowling’s character just shine through,” he said. “I consider her to be a genius among geniuses.”</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1792" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ckiyxb3g1002t3g6f7irecr4m@published" data-word-count="14"><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">*This article appears in the December 21, 2020, issue of&nbsp;</span></em><span data-dcnode-id="1799" instrument_node="">New York</span><em data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node=""> Magazine. </span></em><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subs.nymag.com/magazine/subscribe/official-subscription.html%3Futm_source%3Dcsitepromo%26utm_medium%3Dsiteacquisition%26utm_campaign%3Dend-of-magazine-article"><strong data-dcnode-id="1794"><em data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Subscribe Now!</span></em></strong></a></p><span data-dcnode-id="1791" instrument_node="">
