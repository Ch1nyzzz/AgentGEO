</span><article class="post-21936 post type-post status-publish format-standard hentry category-sociological-concepts tag-behaviour tag-norms tag-surveys tag-united-kingdom tag-values" data-dcnode-id="2750" id="post-21936"><span data-dcnode-id="3209" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3203"><span data-dcnode-id="3208" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="3205"><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2018/09/03/what-is-normal/" rel="bookmark"><span data-dcnode-id="3207" instrument_node="">What is Normal?</span></a></h2><span data-dcnode-id="3204" instrument_node=""> </span></header><span data-dcnode-id="3201" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2800"><span data-dcnode-id="3200" instrument_node="">
</span><p data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">The concepts of ‘normal’, and ‘normality’, and the question of what counts as ‘normal behaviour’ has long been of interest to sociologists. Sociologists from different perspectives have very different approaches to answering the basic, but fundamental question, ‘what is normal’?</span></p><span data-dcnode-id="3197" instrument_node="">
</span><p data-dcnode-id="3192"><span data-dcnode-id="3196" instrument_node="">For the </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2015/05/19/positivism-sociology-social-research/"><span data-dcnode-id="3195" instrument_node="">early positivists</span></a><span data-dcnode-id="3193" instrument_node=""> such as August Comte and Emile Durkheim, uncovering the existence of social norms (or typical patterns of behaviour) was central to their early positivist sociology. However, contemporary sociologists are more likely to question whether or not there is such a thing as ‘normal’ in our postmodern society.</span></p><span data-dcnode-id="3191" instrument_node="">
</span><figure aria-describedby="caption-attachment-21939" class="wp-caption aligncenter" data-dcnode-id="3184" id="attachment_21939" style="width: 640px"><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/ngrams/graph%3Fcontent%3DNormal%26case_insensitive%3Don%26year_start%3D1800%26year_end%3D2008%26corpus%3D15%26smoothing%3D7%26share%3D%26direct_url%3Dt4%253B%252CNormal%253B%252Cc0%253B%252Cs0%253B%253Bnormal%253B%252Cc0%253B%253BNormal%253B%252Cc0" rel="noopener" target="_blank"><img alt="" class="wp-image-21939 size-large jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="21939" data-comments-opened="1" data-dcnode-id="3190" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="what is normal" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?fit=840%2C317&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?fit=300%2C113&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?fit=1146%2C433&amp;ssl=1" data-orig-size="1146,433" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/what-is-normal-2/" data-recalc-dims="1" height="242" loading="eager" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png%3Fresize%3D640%252C242%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=1024%2C387&amp;ssl=1 1024w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=300%2C113&amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=768%2C290&amp;ssl=1 768w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?w=1146&amp;ssl=1 1146w" width="640"><noscript data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">&lt;img data-attachment-id="21939" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/what-is-normal-2/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?fit=1146%2C433&amp;amp;ssl=1" data-orig-size="1146,433" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="what is normal" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?fit=300%2C113&amp;amp;ssl=1" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?fit=840%2C317&amp;amp;ssl=1" class="wp-image-21939 size-large" src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=640%2C242&amp;#038;ssl=1" alt="" width="640" height="242" srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=1024%2C387&amp;amp;ssl=1 1024w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=300%2C113&amp;amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?resize=768%2C290&amp;amp;ssl=1 768w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal-1.png?w=1146&amp;amp;ssl=1 1146w" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="3185" id="caption-attachment-21939"><span data-dcnode-id="3186" instrument_node="">Source: Google Ngram’s viewer</span></figcaption></figure><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3180"><em data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Interest in the word ‘normal’ started to grow in line with early Positivist sociology, peaked during the ‘heyday’ of structuralist sociology in the 1940s-70s and has been in decline since the (contested) shift to postmodern society from the 1980s…&nbsp;</span></em></p><span data-dcnode-id="3179" instrument_node="">
</span><h2 data-dcnode-id="3176"><strong data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">What is Normal?</span></strong></h2><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">‘Normal’can be defined as any behavior or condition which is usual, expected, typical, or conforms to a pre-existing standard.</span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3168"><img alt="" class="aligncenter size-large wp-image-21938 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="21938" data-comments-opened="1" data-dcnode-id="3171" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="what is normal" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?fit=840%2C594&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?fit=300%2C212&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?fit=1754%2C1240&amp;ssl=1" data-orig-size="1754,1240" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/what-is-normal/" data-recalc-dims="1" height="453" loading="eager" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png%3Fresize%3D640%252C453%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=1024%2C724&amp;ssl=1 1024w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=300%2C212&amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=768%2C543&amp;ssl=1 768w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?w=1754&amp;ssl=1 1754w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?w=1680&amp;ssl=1 1680w" width="640"><noscript data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">&lt;img data-attachment-id="21938" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/what-is-normal/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?fit=1754%2C1240&amp;amp;ssl=1" data-orig-size="1754,1240" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="what is normal" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?fit=300%2C212&amp;amp;ssl=1" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?fit=840%2C594&amp;amp;ssl=1" loading="lazy" class="aligncenter size-large wp-image-21938" src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=640%2C453&amp;#038;ssl=1" alt="" width="640" height="453" srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=1024%2C724&amp;amp;ssl=1 1024w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=300%2C212&amp;amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?resize=768%2C543&amp;amp;ssl=1 768w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?w=1754&amp;amp;ssl=1 1754w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/what-is-normal.png?w=1680&amp;amp;ssl=1 1680w" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3163"><strong data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">‘Normal behaviour’</span></strong><span data-dcnode-id="3164" instrument_node=""> may be defined as any behaviour which conforms to social norms, which are the expected or typical patterns of human behaviour in any given society.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">It follows that in order to establish what ‘normal’ behaviour is, sociologists firstly need to establish what social norms are present in any given society.</span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">This is actually more difficult than it may sound, because social norms exist at ‘different levels’ of society (at least for those sociologists who actually believe social norms actually exist!)</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node="">Some social norms exist at the level of society as a whole, known as </span><strong data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">‘societal level norms’</span></strong><span data-dcnode-id="3152" instrument_node="">, which tend to be very general norms, such as ‘obeying the law most of the time’ or ‘children being expected to not talk to strangers’.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3149" instrument_node="">Other norms are </span><strong data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">context-dependent</span></strong><span data-dcnode-id="3146" instrument_node="">, and are specific to certain institutions – for example the specific norms associated with sitting a formal examination within an educational setting, or those associated with a funeral. (In some respects the two examples are quite similar!)</span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Social norms can also vary from place to place, time of day, and different norms may be expected of people depending on their social characteristics: their age, or gender for example.</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Given all of the above problems with establishing the existence of social norms, postmodern sociologists have suggested that we need to abandon the concept of normality all together, and just accept the fact that we live in a society of individuals, each of whom is unique.</span></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">However, many contemporary sociologists disagree with this postmodern view, given then fact that there do appear to be certain patterns of behaviour which the vast majority of people in society conform to.</span></p><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">The remainder of this post will consider a range of examples of behaviours which might reasonably be regarded as ‘normal’ in the context of contemporary British society….</span></p><span data-dcnode-id="3132" instrument_node="">
</span><h2 data-dcnode-id="3129"><strong data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">How might sociologists ‘determine’ what is ‘normal’?</span></strong></h2><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">As far as I see it, there are a number of places sociologists can look, for example:</span></p><span data-dcnode-id="3125" instrument_node="">
</span><ol data-dcnode-id="3108"><span data-dcnode-id="3124" instrument_node="">
</span><li data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">They can simply start out by making observations (possibly backed up by ‘mass observation’ data) of daily life, which will reveal certain General norms of behavior.</span></li><span data-dcnode-id="3121" instrument_node="">
</span><li data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">They can use statistical data to uncover ‘life events’ or actions that most people will engage in at some point during their ‘life-course’.</span></li><span data-dcnode-id="3118" instrument_node="">
</span><li data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">They can look at statistical averages.</span></li><span data-dcnode-id="3115" instrument_node="">
</span><li data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">They can look at attitude surveys and field experiments to find out about typical attitudes towards certain objects of attention and typical behaviours in specific contexts.</span></li><span data-dcnode-id="3112" instrument_node="">
</span><li data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">They can simply look at the most popular tastes and actions which the majority (or ‘largest minority’ of people engage in.</span></li><span data-dcnode-id="3109" instrument_node="">
</span></ol><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3103"><em data-dcnode-id="3104"><strong data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Below I discuss the first three of these… </span></strong></em></p><span data-dcnode-id="3102" instrument_node="">
</span><h2 data-dcnode-id="3099"><strong data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Normal behaviour in daily life….?</span></strong></h2><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Simple observations of daily life (backed up with a few basic surveys) reveal there are several social norms that the vast majority of the public conform to. For example:</span></p><span data-dcnode-id="3095" instrument_node="">
</span><h3 data-dcnode-id="3092"><strong data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Wearing clothes most of the time</span></strong></h3><span data-dcnode-id="3091" instrument_node="">
</span><p data-dcnode-id="3086"><span data-dcnode-id="3090" instrument_node="">Despite the fact that according to</span><a data-dcnode-id="3088" href="file:///C:/Users/karlt/Downloads/briefing_statistics.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3089" instrument_node=""> one survey</span></a><span data-dcnode-id="3087" instrument_node=""> as many as 1.2 million people in the UK define themselves as naturists (which is about as many as there are members of the Church of England), only 2% of people report that they would ‘get their kit off too’ if they came across a group of naked people playing cricket on a beach while on a coastal ramble’.</span></p><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">[poll id=”2″]</span></p><span data-dcnode-id="3082" instrument_node="">
</span><h3 data-dcnode-id="3079"><strong data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">Brushing your teeth at least once a day</span></strong></h3><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3074"><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yougov.co.uk/news/2017/10/23/three-ten-brits-only-brush-their-teeth-once-day/" rel="noopener" target="_blank"><span data-dcnode-id="3077" instrument_node="">96% of Britons brush their teeth at least once a day</span></a><span data-dcnode-id="3075" instrument_node="">, with only 2% of people saying they don’t brush at least once daily, and 2% of confused people saying they don’t know how often they brush.</span></p><span data-dcnode-id="3073" instrument_node="">
</span><h3 data-dcnode-id="3070"><strong data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Ignoring other people on public transport….</span></strong></h3><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3064"><span data-dcnode-id="3068" instrument_node="">You probably don’t think about it very much, but nearly all of us do it – ignoring other people on public transport. So much so that if you type in ‘avoiding people on public transport’ to Google, then the first search return is actually a link to ‘</span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Avoid-Conversation-on-Public-Transportation" rel="noopener" target="_blank"><span data-dcnode-id="3067" instrument_node="">how to do it</span></a><span data-dcnode-id="3065" instrument_node="">‘… from ‘sitting by yourself and putting a bag on the seat next to you’ to (most obviously) using your mobile phone or eating something. There’s even advice on how to ‘disengage’ from conversation, just in case some deviant is socially unaware enough to talk to you.</span></p><span data-dcnode-id="3063" instrument_node="">
</span><h3 data-dcnode-id="3060"><strong data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">The limitations of establishing ‘normality’ from such ordinary, everyday behaviours…</span></strong></h3><span data-dcnode-id="3059" instrument_node="">
</span><p data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">While most of us engage in such behaviours, is this actually significant? Do these ‘manifestations of similarity’ actually mean anything? Most of us brush our teeth, most of us ignore each other on public transport, most of us wear clothes, but so what?</span></p><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">All of these manifestations of ‘normality’ are quite passive, they don’t really involve much of a ‘buy in’, and there’s still scope for a whole lot of differences of greater significance to occur even with all of us doing all of these ‘basic’ activities in unison…</span></p><span data-dcnode-id="3053" instrument_node="">
</span><h2 data-dcnode-id="3050"><strong data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Life Course Norms…?</span></strong></h2><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">It’s probably not as simply as ‘normal life in the U.K.’ as equating to having a 9-5 job, a mortgage, a fuck off big television, walking the dog, paying taxes and having a pension….</span></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3041"><span data-dcnode-id="3045" instrument_node="">&lt;iframe width=”560″ height=”315″ src=”</span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/W9ZNKGrpnKM%26%238221" rel="nofollow"><span data-dcnode-id="3044" instrument_node="">https://www.youtube.com/embed/W9ZNKGrpnKM&amp;#8221</span></a><span data-dcnode-id="3042" instrument_node="">; frameborder=”0″ allow=”autoplay; encrypted-media” allowfullscreen&gt;&lt;/iframe&gt;</span></p><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">But it possible to identify some ‘life-events’ that the vast majority of people in the United Kingdom (or at least England in some of the examples below) will experience at some points in their life. All of the examples below are take from across the A-level sociology syllabus…</span></p><span data-dcnode-id="3037" instrument_node="">
</span><h3 data-dcnode-id="3034"><strong data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Most children in the United Kingdom will go to school….</span></strong></h3><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3032" instrument_node="">According to </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//databank.worldbank.org/data/reports.aspx%3Fsource%3D2%26series%3DSE.SEC.NENR" rel="noopener" target="_blank"><span data-dcnode-id="3031" instrument_node="">World Bank data</span></a><span data-dcnode-id="3029" instrument_node="">, 98.9% of children in the United Kingdom are enrolled in school, so it’s reasonably fair to say that ‘it is normal for children in the UK to go to secondary school’.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3023"><img alt="" class="aligncenter size-full wp-image-22006 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="22006" data-comments-opened="1" data-dcnode-id="3026" data-image-caption="" data-image-description="<p>Percentage of pupils enrolled in secondary school according to World Bank Data UK</p>
" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Secondary school enrollment" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?fit=769%2C225&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?fit=300%2C88&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?fit=769%2C225&amp;ssl=1" data-orig-size="769,225" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/secondary-school-enrollment/" data-recalc-dims="1" height="225" loading="eager" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png%3Fresize%3D769%252C225%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?w=769&amp;ssl=1 769w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?resize=300%2C88&amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?resize=768%2C225&amp;ssl=1 768w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?resize=320%2C94&amp;ssl=1 320w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?resize=640%2C187&amp;ssl=1 640w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?resize=360%2C105&amp;ssl=1 360w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?resize=720%2C211&amp;ssl=1 720w" width="769"><noscript data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">&lt;img data-attachment-id="22006" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/secondary-school-enrollment/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/Secondary-school-enrollment.png?fit=769%2C225&amp;amp;ssl=1" data-orig-size="769,225" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Secondary school enrollment" data-image-description="&amp;lt;p&amp;gt;Percentage of pupils enrolled in secondary school according to World Bank Data UK&amp;lt;/p&amp;gt;

</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">NB – it’s probably worth pointing out that ‘secondary school enrollment is much more common in the UK compared to the United States, and especially Uruguay, and various other less economically developed countries.</span></p><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Of course the fact that nearly 99% of children are enrolled in secondary school in the UK tells us nothing about their experience of education, or how long they actually spend in school, but nonetheless, being enrolled and being subjected to the expectation to attend secondary school in the UK is one of the most universal experiences through the life-course.</span></p><span data-dcnode-id="3016" instrument_node="">
</span><h3 data-dcnode-id="3013"><strong data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">Most people in the U.k. will engage in paid work or live with someone who has engaged in paid work at some point in their lives</span></strong></h3><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Only 0.8% of 16-64 year olds live in households where all members have never worked. These figures don’t actually tell us how many people have never worked, but we can say that 99.2% of the adult population has either worked, or is currently living with someone who has, at some point in their lives, worked.</span></p><span data-dcnode-id="3009" instrument_node="">
</span><h3 data-dcnode-id="3006"><strong data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Most people will live until they are over 50</span></strong></h3><span data-dcnode-id="3005" instrument_node="">
</span><figure aria-describedby="caption-attachment-22007" class="wp-caption aligncenter" data-dcnode-id="2999" id="attachment_22007" style="width: 600px"><img alt="" class="size-full wp-image-22007 jetpack-lazy-image" data-attachment-id="22007" data-comments-opened="1" data-dcnode-id="3004" data-image-caption="<p>Source: ONS, based on registered deaths</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="how many people die before 50" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?fit=600%2C338&amp;ssl=1" data-lazy-sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" data-lazy-src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?resize=600%2C338&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?w=600&amp;ssl=1 600w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?resize=300%2C169&amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?resize=320%2C180&amp;ssl=1 320w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?resize=360%2C203&amp;ssl=1 360w" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?fit=300%2C169&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?fit=600%2C338&amp;ssl=1" data-orig-size="600,338" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/how-many-people-die-before-50/" data-recalc-dims="1" height="338" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png%3Fresize%3D600%252C338%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="600"><noscript data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">&lt;img data-attachment-id="22007" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/how-many-people-die-before-50/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/how-many-people-die-before-50.png?fit=600%2C338&amp;amp;ssl=1" data-orig-size="600,338" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="how many people die before 50" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Source: ONS, based on registered deaths&amp;lt;/p&amp;gt;

</span><p data-dcnode-id="2993"><span data-dcnode-id="2997" instrument_node="">‘Only’ 9.2% of men and 5.7% of women will die before the age of 50, according to </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/bulletins/deathsregistrationsummarytables/2017"><span data-dcnode-id="2996" instrument_node="">ONS data averaged over the last 20 years</span></a><span data-dcnode-id="2994" instrument_node="">.</span></p><span data-dcnode-id="2992" instrument_node="">
</span><h3 data-dcnode-id="2989"><strong data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Limitations of establishing ‘normal’ behaviour from these trends&nbsp;</span></strong></h3><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">The limitations of deriving an idea of ‘normality’ from life-course data is that you are much less likely to find norms across the generations rather than in one specific age-cohort. More-over, one of main reasons postmodernists argue that it is no longer appropriate to talk about social norms today is that there is a trend away from shared norms in many areas of social life and a movement towards greater diversity.</span></p><span data-dcnode-id="2985" instrument_node="">
</span><h2 data-dcnode-id="2982"><strong data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">Social Norms based on statistical averages&nbsp;</span></strong></h2><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">A third method of determining what is ‘normal’ is to look at the ‘median’ value of a distribution, that is the value which lies at the midpoint.</span></p><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">In social statistics, it is very like that the median will provide a more representative average figure than the mean because a higher percentage of people will cluster around the median compared to the mean.</span></p><span data-dcnode-id="2975" instrument_node="">
</span><h3 data-dcnode-id="2972"><strong data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Median disposable household income in the UK in 2017 was £27,300</span></strong></h3><span data-dcnode-id="2971" instrument_node="">

</span><p data-dcnode-id="2960"><em data-dcnode-id="2961"><span data-dcnode-id="2965" instrument_node="">Source:&nbsp;</span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/personalandhouseholdfinances/incomeandwealth/bulletins/householddisposableincomeandinequality/financialyearending2017" rel="noopener" target="_blank"><span data-dcnode-id="2964" instrument_node="">Household disposable income and inequality in the UK: financial year ending 2017</span></a><span data-dcnode-id="2962" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2959" instrument_node="">
</span><h3 data-dcnode-id="2956"><strong data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Average household size in the UK in 2016 was 2.4&nbsp;</span></strong></h3><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2951"><img alt="" class="aligncenter size-full wp-image-22040 jetpack-lazy-image" data-attachment-id="22040" data-comments-opened="1" data-dcnode-id="2954" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="average household size UK" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?fit=565%2C499&amp;ssl=1" data-lazy-sizes="(max-width: 565px) 85vw, 565px" data-lazy-src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?resize=565%2C499&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?w=565&amp;ssl=1 565w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?resize=300%2C265&amp;ssl=1 300w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?resize=320%2C283&amp;ssl=1 320w, https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?resize=360%2C318&amp;ssl=1 360w" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?fit=300%2C265&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2018/08/average-household-size-UK.png?fit=565%2C499&amp;ssl=1" data-orig-size="565,499" data-permalink="https://revisesociology.com/2018/09/03/what-is-normal/average-household-size-uk/" data-recalc-dims="1" height="499" loading="lazy" src=" </span><p data-dcnode-id="2947"><em data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Source: ONS</span></em></p><span data-dcnode-id="2946" instrument_node="">
</span><h3 data-dcnode-id="2943"><strong data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Limitations of establishing ‘normal behaviour’ from medians or means</span></strong></h3><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2939"><span data-dcnode-id="2940" style="color: #000000;"><span data-dcnode-id="2941" instrument_node="">Is the median the ‘best’ way of establishing ‘what is normal’? Even though it’s the figure around which most people cluster, there can still be enormous differences in those at both ends of the distribution. </span></span></p><span data-dcnode-id="2938" instrument_node="">
</span><p data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">As to the mean, as with the household average above…. this might be useful for establishing trends over time, but surely when we look at ‘today’, this is meaningless… there are no households with 2.4 people in!</span></p><span data-dcnode-id="2935" instrument_node="">
</span><h3 data-dcnode-id="2932"><strong data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">So… is there such a thing as normal?</span></strong></h3><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">While it is possible to identify ‘norms’ using various methods, hopefully the above examples at least demonstrate why postmodernists are so sceptical about the concept of normality today!</span></p><span data-dcnode-id="2928" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2741"><span data-dcnode-id="2746" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2743"><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2017/09/08/meet-the-natives-sociology-on-t-v/" rel="bookmark"><span data-dcnode-id="2745" instrument_node="">Meet the Natives (Sociology on T.V.)</span></a></h2><span data-dcnode-id="2742" instrument_node=""> </span></header><span data-dcnode-id="2739" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2608"><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Meet the Natives involves five people from a tropical island visiting a ‘strange land called England’, where they find many of the customs unusual.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">At various points throughout the video the ‘natives’ from Oceania have problems understanding British dinner rituals, the food we eat, housework/ the amount of stuff we have and even the concept of wearing clothes.</span></p><span data-dcnode-id="2732" instrument_node="">
</span><div class="jetpack-video-wrapper" data-dcnode-id="2727"><span data-dcnode-id="2731" instrument_node="">
</span><div class="embed-dailymotion" data-dcnode-id="2729"><iframe allowfullscreen="" data-dcnode-id="2730" data-height="467" data-ratio="0.555952380952381" data-width="840" frameborder="0" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymotion.com/embed/video/x2qmab3&amp;raw" style="display: block; margin: 0px; width: 446.359px; height: 248.154px;"></iframe></div><span data-dcnode-id="2728" instrument_node="">
</span></div><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Videos like this are a great way to introduce the ‘sociological imagination’ to students, because they are shot from the perspective of ‘the outsider’ and remind us that many of our taken for granted activities are actually quite unusual….</span></p><span data-dcnode-id="2723" instrument_node="">

</span><article class="post-15613 post type-post status-publish format-standard hentry category-sex-and-gender tag-biology tag-female tag-feminine tag-gender tag-identity tag-male tag-masculine tag-norms tag-sex tag-sexuality tag-sociology" data-dcnode-id="1712" id="post-15613"><span data-dcnode-id="2546" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2540"><span data-dcnode-id="2545" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2542"><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2017/08/07/sex-gender-identity-sociology-introduction/" rel="bookmark"><span data-dcnode-id="2544" instrument_node="">An Introduction to Sex, Gender and Gender Identity</span></a></h2><span data-dcnode-id="2541" instrument_node=""> </span></header><span data-dcnode-id="2538" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1780"><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2534"><em data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">The aim of this post is to provide a very brief introduction to the very complex topic of sex, gender and gender identity.&nbsp;</span></em></p><span data-dcnode-id="2533" instrument_node="">
</span><h3 data-dcnode-id="2530"><strong data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Sex, gender and gender identity: basic definitions</span></strong></h3><span data-dcnode-id="2529" instrument_node="">
</span><ul data-dcnode-id="2512"><span data-dcnode-id="2528" instrument_node="">
</span><li data-dcnode-id="2524"><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Sex</span></strong><span data-dcnode-id="2525" instrument_node=""> refers to the biological differences between men and women</span></li><span data-dcnode-id="2523" instrument_node="">
</span><li data-dcnode-id="2519"><strong data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Gender</span></strong><span data-dcnode-id="2520" instrument_node=""> refers to the cultural differences between – it is to do with social norms surrounding masculinity and femininity.</span></li><span data-dcnode-id="2518" instrument_node="">
</span><li data-dcnode-id="2514"><strong data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Gender Identity</span></strong><span data-dcnode-id="2515" instrument_node=""> is an individual’s own sense of their own gender. Their private sense of whether they feel masculine, feminine, both or neither, irrespective of their biological sex.</span></li><span data-dcnode-id="2513" instrument_node="">
</span></ul><span data-dcnode-id="2511" instrument_node="">
</span><h3 data-dcnode-id="2508"><strong data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Biological differences between men and women</span></strong></h3><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2504"><em data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">At first glance, there appears to be some fairly obvious biological differences between men and women – most obviously:</span></em></p><span data-dcnode-id="2503" instrument_node="">
</span><ul data-dcnode-id="2483"><span data-dcnode-id="2502" instrument_node="">
</span><li data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Reproductive organs – women have eggs and wombs and men produce sperm which fertilizes eggs – no need to go into the joys of exactly how this is done at this stage, suffice to say that in terms of the physical reproduction of the species men have a fairly easy time of it, women are the ones who have to carry the babies inside of them, and suffer the physical trauma of childbirth.</span></li><span data-dcnode-id="2499" instrument_node="">
</span><li data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Women can lactate, men can’t, meaning women are the only sex who can produce food for their young offspring.</span></li><span data-dcnode-id="2496" instrument_node="">
</span><li data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">On average men are physically stronger, and can run faster than women.</span></li><span data-dcnode-id="2493" instrument_node="">
</span><li data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Women typically cannot reproduce over the age of 50, while men can perform the reproductive function until much later on in their lives.</span></li><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">On average, women live longer than men</span></li><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">There are also hormonal differences – most obviously men have higher testosterone levels – which some scientific studies have linked to their higher levels of aggression.</span></li><span data-dcnode-id="2484" instrument_node="">
</span></ul><span data-dcnode-id="2482" instrument_node="">
</span><h3 data-dcnode-id="2479"><strong data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Traditional Gender Roles and Norms</span></strong></h3><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">In the 1950s Functionalist sociologist Talcott Parsons argued that these biological differences meant there were ‘natural’ social roles that men and women should fulfill in society –</span></p><span data-dcnode-id="2475" instrument_node="">
</span><ul data-dcnode-id="2467"><span data-dcnode-id="2474" instrument_node="">
</span><li data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">women should perform the expressive role, or caring and nurturing role.</span></li><span data-dcnode-id="2471" instrument_node="">
</span><li data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">men should perform the instrumental role, or the ‘breadwinner’ role – going out and earning money.</span></li><span data-dcnode-id="2468" instrument_node="">
</span></ul><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Such ideas formed part of the common sense’ way of viewing relations through much of the 20th century, with most people seeing maleness and masculinity and femaleness and femininity as a binary relationship – with men being seen as the opposite of women.</span></p><span data-dcnode-id="2463" instrument_node="">
</span><h3 data-dcnode-id="2460"><strong data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Criticisms of the male-female gender divide</span></strong></h3><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Successive Feminists movements have spearheaded criticisms of traditional gender roles in society, arguing that stereotypical ideas about the roles men and women should occupy, and the norms they should subscribe to, have systematically disadvantaged women.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">One of the key Feminist ideas is that gender is socially constructed, that gender roles and norms are not determined by biology, but are shaped by society, and some of the best evidence of this fact lies in the enormous variation in gender roles between different cultures – simply put, if you can find just a handful of examples of men and women occupying different roles, having different amounts of power, and acting differently in different cultures, then this disproves the theory that there is some kind of ‘natural’ link between biological sex and gender.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Feminists have effectively spearheaded campaigns for greater gender equality and diversity of gender roles, and the last century has seen a blurring of boundaries between male and female roles and norms surrounding masculinity and femininity.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">And, of course, the fact that gender roles and norms have changed so much so rapidly adds further weight to the fact that gender is socially constructed rather than biologically determined.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><h3 data-dcnode-id="2444"><strong data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Criticisms of the binary opposition between male/ masculine and female/ feminine</span></strong></h3><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Contemporary Feminism has criticized the binary opposition between male and female, arguing that every aspect of sex and gender are in fact sliding scales rather than opposites – as illustrated by the Genderbread person:</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2436"><img alt="Genderbread-Person.jpg" class="alignnone size-full wp-image-15721 jetpack-lazy-image" data-attachment-id="15721" data-comments-opened="1" data-dcnode-id="2439" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Genderbread-Person" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?fit=800%2C518&amp;ssl=1" data-lazy-src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?resize=800%2C518&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?fit=300%2C194&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?fit=800%2C518&amp;ssl=1" data-orig-size="800,518" data-permalink="https://revisesociology.com/2017/08/07/sex-gender-identity-sociology-introduction/genderbread-person/" data-recalc-dims="1" height="518" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg%3Fresize%3D800%252C518%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="800"><noscript data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">&lt;img data-attachment-id="15721" data-permalink="https://revisesociology.com/2017/08/07/sex-gender-identity-sociology-introduction/genderbread-person/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?fit=800%2C518&amp;amp;ssl=1" data-orig-size="800,518" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Genderbread-Person" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?fit=300%2C194&amp;amp;ssl=1" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?fit=800%2C518&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-15721" src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/genderbread-person.jpg?resize=800%2C518&amp;#038;ssl=1" alt="Genderbread-Person.jpg" width="800" height="518" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2434" instrument_node="">The genderbread person was developed by </span><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.samuelkillermann.com/" rel="noopener" target="_blank"><span data-dcnode-id="2433" instrument_node="">Sam Killerman</span></a><span data-dcnode-id="2431" instrument_node="">, who argues that gender identity incorporates not only one’s biological sex, but also one’s sexuality, one’s sense of social-identity and how one feels about one’s self – gender identity is thus fluid and complex, rather than static and binary binary, as explored further by Sam Killerman in the TED talk below.</span></p><span data-dcnode-id="2429" instrument_node="">

</span><h3 data-dcnode-id="1905"><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Hegemonic masculinity and femininity in contemporary society&nbsp;&nbsp;</span></strong></h3><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Of course just because we are more accepting of gender diversity in contemporary society, this doesn’t mean that the old stereotypes have disappeared –&nbsp;&nbsp;biological males are still ‘called upon’ to act in a typically masculine way, and biological females are still called upon to act in typically feminine ways, which at least in part explains why there are still clear gender inequalities in society today.</span></p><span data-dcnode-id="1901" instrument_node="">

noir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/tag/sex/" rel="tag"><span data-dcnode-id="1730" instrument_node="">sex</span></a><span data-dcnode-id="1728" instrument_node="">, </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/tag/sexuality/" rel="tag"><span data-dcnode-id="1727" instrument_node="">sexuality</span></a><span data-dcnode-id="1725" instrument_node="">, </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/tag/sociology/" rel="tag"><span data-dcnode-id="1724" instrument_node="">Sociology</span></a></span><span class="comments-link" data-dcnode-id="1717"><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2017/08/07/sex-gender-identity-sociology-introduction/%23respond"><span data-dcnode-id="1721" instrument_node="">Leave a comment</span><span class="screen-reader-text" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node=""> on An Introduction to Sex, Gender and Gender Identity</span></span></a></span><span data-dcnode-id="1716" instrument_node=""> </span></footer><span data-dcnode-id="1713" instrument_node="">

</span><article class="post-15461 post type-post status-publish format-standard hentry category-culture-and-identity tag-culture tag-norms tag-socialisation tag-values" data-dcnode-id="1387" id="post-15461"><span data-dcnode-id="1709" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1703"><span data-dcnode-id="1708" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1705"><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2017/08/04/culture-socialisation-social-norms-introduction/" rel="bookmark"><span data-dcnode-id="1707" instrument_node="">An Introduction to Culture, Socialisation, and Social Norms</span></a></h2><span data-dcnode-id="1704" instrument_node=""> </span></header><span data-dcnode-id="1701" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1434"><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">In sociology, it is essential to understand the social context in which human behaviour takes place – and this involves understanding the culture in which social action occurs.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Culture is a very broad concept which encompasses the norms, values, customs, traditions, habits, skills, knowledge, beliefs and the whole way of life of a group of people.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">To give two specific, and classic definitions of the term culture:</span></p><span data-dcnode-id="1691" instrument_node="">
</span><ul data-dcnode-id="1683"><span data-dcnode-id="1690" instrument_node="">
</span><li data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Ralph Linton (1945) defined the culture of a society as ‘the way of life of its members: the collection of ideas and habits which they learn, share and transmit from generation to generation’.</span></li><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Clyde Kluckhohn (1951) described culture as a ‘design for living’ held by the members of a particular society.</span></li><span data-dcnode-id="1684" instrument_node="">
</span></ul><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">To a large degree, culture determines how members of society think and feel: it directs their actions and defines their outlook on life. Culture defines accepted ways of behaving for members of society.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">In order to survive, any newborn infant must learn the accepted ways of behaving in a society, it must learn that society’s culture, a process known as socialisation, which sociologists tend to split into two ‘phases’ – primary and secondary.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Primary socialisation takes place in the family: the child learns many social rules simply by copying its parents, and responding to their approval or disapproval of ‘good’ and ‘bad’ behaviour, which is taught through a variety of rewards and punishments, such as simple praise, treats, smacking and the naughty step.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Secondary socialisation takes place outside of the family in other social institutions including the education system, the peer group, the media, religion and the work place.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Many (though not all) sociologists argue that the norms and values we pick up through these institutions encourage us to act in certain ways, and discourage us from acting in others, and, just as importantly,&nbsp;&nbsp;they ‘frame’ our worldviews in subtle ways – encouraging us value certain things that other cultures might think have no value, or discouraging us to ask certain ‘critical questions’.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Just some of the ways these institutions might subtly shape our behaviour include:</span></p><span data-dcnode-id="1664" instrument_node="">
</span><ul data-dcnode-id="1647"><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1659"><strong data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Religion</span></strong><span data-dcnode-id="1660" instrument_node=""> – reinforces basic moral codes such as ‘not killing’, ‘not stealing’, and the value of monogamous relationships, sanctioned by marriage.</span></li><span data-dcnode-id="1658" instrument_node="">
</span><li data-dcnode-id="1654"><strong data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Education</span></strong><span data-dcnode-id="1655" instrument_node=""> – teaches us the value of tolerating people with different views from ourselves, the value of teamwork and the idea of the individual work ethic – ‘if I work hard I can achieve’.</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1649"><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">The Media</span></strong><span data-dcnode-id="1650" instrument_node=""> – through advertising, it teaches us that high levels of consumption of products are normal, and through the over-representation of skinny, beautiful, young people, it encourages to spend time and money to look good.</span></li><span data-dcnode-id="1648" instrument_node="">
</span></ul><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1643"><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Socialisation is not simply a process in which individuals just passively accept the values of a society – children and adults actively reflect on whether they should accept them, and some choose to actively engage in ‘mainstream’ culture, others just go along with it, and still other reject these values, but those who reject mainstream culture are very much in a minority, while most of us go along with mainstream norms and values most of the time.&nbsp;</span></em></p><span data-dcnode-id="1642" instrument_node="">
</span><h3 data-dcnode-id="1639"><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Socialisation and the process of learning social norms</span></strong></h3><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Part of the socialisation process involves learning the specific norms, or informal rules which govern behaviour in particular situations.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">There are literally hundreds (and probably thousands) of social norms which govern how people act in specific places and at specific times – the most obvious ones being dress codes, ways of speaking, ways of interacting with others, body language, and the general demeanor appropriate to specific situations.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Social norms are most obvious at key events in the life course such as weddings and funerals, with their obvious rituals (which would be out of place in most other situations) and codes of dress, but they also exist in day to day life – there is a ‘general norm’ that we should wear clothes in public, we are generally expected to turn up to school and work on time, to not push in if there’s a queue in a shop, and we are also generally expected to politely ignore strangers in public places and on public transport (1) (2)</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Norms also vary depending on the characteristics of the person – for example, whether you are male or female, or young or old, but more of that later.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><h3 data-dcnode-id="1623"><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Cross cultural differences in social norms</span></strong></h3><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">One of the best ways of illustrating just how many social norms we have in Britain is to look at examples of other cultures which are far removed from our own – such as traditional tribes who still exist in parts of South America, Oceania, Asia, and Africa. By reflecting on how different the norms are in these other cultures, we get a good idea of just how many aspects of our day to day lives we take for granted.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">For example the </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_people" rel="noopener" target="_blank"><span data-dcnode-id="1617" instrument_node="">San Bushmen of Southern Africa</span></a><span data-dcnode-id="1615" instrument_node=""> have very different norms surrounding material culture – because they are hunter gatherers, they own very few items, and traditionally their economy was a gift economy, rather than a money economy. Thus, in this culture, money has no value, and ‘stuff’ is simply a burden.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><figure aria-describedby="caption-attachment-15558" class="wp-caption alignnone" data-dcnode-id="1607" id="attachment_15558" style="width: 1024px"><img alt="San Bushmen.jpg" class="alignnone size-full wp-image-15558 jetpack-lazy-image" data-attachment-id="15558" data-comments-opened="1" data-dcnode-id="1612" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="San Bushmen" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?fit=840%2C594&amp;ssl=1" data-lazy-src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?resize=840%2C594&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?fit=300%2C212&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?fit=1024%2C724&amp;ssl=1" data-orig-size="1024,724" data-permalink="https://revisesociology.com/2017/08/04/culture-socialisation-social-norms-introduction/san-bushmen/" data-recalc-dims="1" height="594" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg%3Fresize%3D840%252C594%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="840"><noscript data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">&lt;img data-attachment-id="15558" data-permalink="https://revisesociology.com/2017/08/04/culture-socialisation-social-norms-introduction/san-bushmen/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?fit=1024%2C724&amp;amp;ssl=1" data-orig-size="1024,724" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="San Bushmen" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?fit=300%2C212&amp;amp;ssl=1" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?fit=840%2C594&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-15558" src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/san-bushmen.jpg?resize=840%2C594&amp;#038;ssl=1" alt="San Bushmen.jpg" width="840" height="594" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1608" id="caption-attachment-15558"><span data-dcnode-id="1609" instrument_node="">The San Bushmen (although their traditional culture is much changed from 100 years ago)</span></figcaption></figure><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1602"><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/tribe/tribes/sanema/index.shtml%23further1" rel="noopener" target="_blank"><span data-dcnode-id="1605" instrument_node="">The Sanema</span></a><span data-dcnode-id="1603" instrument_node="">, who live in the rain forests of Brazil and Venezuela, have a radically different belief system in which dreams are as important as ‘waking reality’:</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">The Sanema believe in a dream world inhabited by the spirits of everything around them. The trees, the animals, the rocks, the water all have a spirit. Some can be used to heal, others to bring disaster and death.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Four out of five Sanema men are practicing shamans and it is in their dreams that the spirits visit them. The main work of &nbsp;the shamen is to dispel the evil spirits they believe cause illnesses, and to do this they induce a trance by taking powerful hallucinogenic drug, sakona, made from the dried sap of the virola tree.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">In Sanema culture, it is perfectly usual for these shamans to be off their faces on hallucinogenic drugs, ‘warding off evil spirits’ in the middle of the day, while other people go about their more ‘ordinary’ (by our standards) business of cooking, washing, cleaning, or just chillaxing (typically in hammocks).</span></p><span data-dcnode-id="1592" instrument_node="">
</span><figure aria-describedby="caption-attachment-15562" class="wp-caption aligncenter" data-dcnode-id="1586" id="attachment_15562" style="width: 640px"><img alt="Sanema Tribe" class="size-full wp-image-15562 aligncenter jetpack-lazy-image" data-attachment-id="15562" data-comments-opened="1" data-dcnode-id="1591" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Sanema Tribe" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?fit=640%2C360&amp;ssl=1" data-lazy-src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?resize=640%2C360&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?fit=300%2C169&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?fit=640%2C360&amp;ssl=1" data-orig-size="640,360" data-permalink="https://revisesociology.com/2017/08/04/culture-socialisation-social-norms-introduction/sanema-tribe/" data-recalc-dims="1" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg%3Fresize%3D640%252C360%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="640"><noscript data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">&lt;img data-attachment-id="15562" data-permalink="https://revisesociology.com/2017/08/04/culture-socialisation-social-norms-introduction/sanema-tribe/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?fit=640%2C360&amp;amp;ssl=1" data-orig-size="640,360" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Sanema Tribe" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?fit=300%2C169&amp;amp;ssl=1" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?fit=640%2C360&amp;amp;ssl=1" loading="lazy" class=" size-full wp-image-15562 aligncenter" src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/08/sanema-tribe.jpg?resize=640%2C360&amp;#038;ssl=1" alt="Sanema Tribe" width="640" height="360" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1587" id="caption-attachment-15562"><span data-dcnode-id="1588" instrument_node="">Bruce Parry and a Sanema shaman off their faces on hallucinogens – it’s normal there!</span></figcaption></figure><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">There are many other examples that could be used to illustrate the extreme variations in social norms across cultures – such as differences in how cultures treat children, or differences in gender norms, the point is that none of these behaviours are determined by biology or physical environment – we’re all pretty much the same as a biological species – these cultural differences are simply to do with social traditions, passed down by socialisation.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><h3 data-dcnode-id="1579"><strong data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Historical differences in social norms&nbsp;</span></strong></h3><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Social norms also change over time – the most obvious being how norms surrounding childhood and gender have changed, as well as norms surrounding expenditure and consumption.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">The fact that social norms change over time again shows that biological differences cannot explain historical variations in human behaviour, and also raises the important point that individuals have the freedom to change the norms they are born into.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1569"><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Related Posts&nbsp;</span></strong></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">(1) To illustrate just now many social norms govern our lives, you might like to read this post: how social norms structure your day (forthcoming post)</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">(2) Some sociologists (and sociologicalish commentators) are very critical of many of our social norms – suggesting variously that they are just not necessary, too restrictive of individual freedom, or even downright harmful – for more on this – see this post: Social Norms – the unnecessary and the harmful (forthcoming post).</span></p><span data-dcnode-id="1562" instrument_node="">
