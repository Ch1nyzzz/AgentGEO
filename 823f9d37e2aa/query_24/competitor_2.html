</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="847" id="firstHeading"><span data-dcnode-id="848" instrument_node="">Societal transformation</span></h1><span data-dcnode-id="846" instrument_node="">
</span><div class="vector-body" data-dcnode-id="427" id="bodyContent"><span data-dcnode-id="845" instrument_node="">
</span><div class="noprint" data-dcnode-id="843" id="siteSub"><span data-dcnode-id="844" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="842" instrument_node="">

</span><div data-dcnode-id="837" id="jump-to-nav"></div><span data-dcnode-id="836" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="834" href="#mw-head"><span data-dcnode-id="835" instrument_node="">Jump to navigation</span></a><span data-dcnode-id="833" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="831" href="#searchInput"><span data-dcnode-id="832" instrument_node="">Jump to search</span></a><span data-dcnode-id="830" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="439" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="448"><p data-dcnode-id="812"><b data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Societal transformation</span></b><span data-dcnode-id="827" instrument_node=""> refers to “a deep and sustained, nonlinear systemic change”.</span><sup class="reference" data-dcnode-id="824" id="cite_ref-1"><a data-dcnode-id="825" href="#cite_note-1"><span data-dcnode-id="826" instrument_node="">[1]</span></a></sup><span data-dcnode-id="823" instrument_node=""> in a society. Transformational changes can occur within a particular system, such as a city, a transport or energy system. Societal transformations can also refer to changes of an entire culture or civilization. Such transformations often include not only social changes but cultural, technological, political, economic as well as environmental. Whereas </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_transformation" title="Social transformation"><span data-dcnode-id="822" instrument_node="">social transformation</span></a><span data-dcnode-id="820" instrument_node=""> is typically used within sociology to characterize the process of change either in an individual’s ascribed social status, or in social structures, such as institutional relationships, habits, norms, and values, societal transformation refers to a wider set of societal structural changes. The concept of societal transformation refers not only to social changes, but the interaction between cultural, technological, political, economic as well as environmental transformations. Transformations can be seen as occurring over several centuries, such as the </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neolithic_Revolution" title="Neolithic Revolution"><span data-dcnode-id="819" instrument_node="">Neolithic Revolution</span></a><span data-dcnode-id="817" instrument_node=""> or at a rapid pace, such as the rapid expansion of megacities in China.</span><sup class="reference" data-dcnode-id="814" id="cite_ref-2"><a data-dcnode-id="815" href="#cite_note-2"><span data-dcnode-id="816" instrument_node="">[2]</span></a></sup><span data-dcnode-id="813" instrument_node="">
</span></p><p data-dcnode-id="732"><span data-dcnode-id="811" instrument_node="">The concept of societal transformations have for some time been used in academic disciplines such as </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_economy" title="Political economy"><span data-dcnode-id="810" instrument_node="">political economy</span></a><span data-dcnode-id="808" instrument_node="">,</span><sup class="reference" data-dcnode-id="805" id="cite_ref-3"><a data-dcnode-id="806" href="#cite_note-3"><span data-dcnode-id="807" instrument_node="">[3]</span></a></sup><span data-dcnode-id="804" instrument_node=""> </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Development_economics" title="Development economics"><span data-dcnode-id="803" instrument_node="">development economics</span></a><sup class="reference" data-dcnode-id="799" id="cite_ref-4"><a data-dcnode-id="800" href="#cite_note-4"><span data-dcnode-id="801" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="796" id="cite_ref-5"><a data-dcnode-id="797" href="#cite_note-5"><span data-dcnode-id="798" instrument_node="">[5]</span></a></sup><span data-dcnode-id="795" instrument_node="">], </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History" title="History"><span data-dcnode-id="794" instrument_node="">history</span></a><sup class="reference" data-dcnode-id="790" id="cite_ref-6"><a data-dcnode-id="791" href="#cite_note-6"><span data-dcnode-id="792" instrument_node="">[6]</span></a></sup><span data-dcnode-id="789" instrument_node=""> or </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropology" title="Anthropology"><span data-dcnode-id="788" instrument_node="">anthropology</span></a><span data-dcnode-id="786" instrument_node="">.</span><sup class="reference" data-dcnode-id="783" id="cite_ref-7"><a data-dcnode-id="784" href="#cite_note-7"><span data-dcnode-id="785" instrument_node="">[7]</span></a></sup><span data-dcnode-id="782" instrument_node=""> Since 2010, the concept has been increasingly used in policy-making, research and media to point out that small adjustments of present habits, technologies and policies does not suffice to meet the environmental, climate and sustainable development goals.</span><sup class="reference" data-dcnode-id="779" id="cite_ref-8"><a data-dcnode-id="780" href="#cite_note-8"><span data-dcnode-id="781" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="776" id="cite_ref-9"><a data-dcnode-id="777" href="#cite_note-9"><span data-dcnode-id="778" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="773" id="cite_ref-10"><a data-dcnode-id="774" href="#cite_note-10"><span data-dcnode-id="775" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="770" id="cite_ref-11"><a data-dcnode-id="771" href="#cite_note-11"><span data-dcnode-id="772" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="767" id="cite_ref-12"><a data-dcnode-id="768" href="#cite_note-12"><span data-dcnode-id="769" instrument_node="">[12]</span></a></sup><span data-dcnode-id="766" instrument_node=""> The Decision of the </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="765" instrument_node="">United Nations</span></a><span data-dcnode-id="763" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2030_Agenda" title="2030 Agenda"><span data-dcnode-id="762" instrument_node="">2030 Agenda</span></a><span data-dcnode-id="760" instrument_node=""> outlining the </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_Development_Goals" title="Sustainable Development Goals"><span data-dcnode-id="759" instrument_node="">Sustainable Development Goals</span></a><span data-dcnode-id="757" instrument_node=""> bears the heading “transforming our world”.  The special report on global warming of 1.5&nbsp;°C by the </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_Panel_on_Climate_Change" title="Intergovernmental Panel on Climate Change"><span data-dcnode-id="756" instrument_node="">Intergovernmental Panel on Climate Change</span></a><span data-dcnode-id="754" instrument_node=""> (IPCC) states that  curbing global warming to 1.5&nbsp;°C compared to preindustrial levels “would require transformative systemic change, integrated with sustainable development”.</span><sup class="reference" data-dcnode-id="751" id="cite_ref-13"><a data-dcnode-id="752" href="#cite_note-13"><span data-dcnode-id="753" instrument_node="">[13]</span></a></sup><span data-dcnode-id="750" instrument_node=""> Similarly, the 2019 global assessment report of the </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_Science-Policy_Platform_on_Biodiversity_and_Ecosystem_Services" title="Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services"><span data-dcnode-id="749" instrument_node="">Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services</span></a><span data-dcnode-id="747" instrument_node=""> (IPBES) concludes that transformative changes in society are crucial for nature protection.</span><sup class="reference" data-dcnode-id="744" id="cite_ref-14"><a data-dcnode-id="745" href="#cite_note-14"><span data-dcnode-id="746" instrument_node="">[14]</span></a></sup><span data-dcnode-id="743" instrument_node=""> The </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Green_Deal" title="European Green Deal"><span data-dcnode-id="742" instrument_node="">European Green Deal</span></a><span data-dcnode-id="740" instrument_node="">, proposed by the </span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Commission" title="European Commission"><span data-dcnode-id="739" instrument_node="">European Commission</span></a><span data-dcnode-id="737" instrument_node="">, see deeply transformative policies to restructure the EU's economy as fundamental for its vision of a healthier, greener and more prosperous Europe.</span><sup class="reference" data-dcnode-id="734" id="cite_ref-15"><a data-dcnode-id="735" href="#cite_note-15"><span data-dcnode-id="736" instrument_node="">[15]</span></a></sup><span data-dcnode-id="733" instrument_node="">
</span></p><span data-dcnode-id="731" instrument_node="">
</span><h2 data-dcnode-id="721"><span class="mw-headline" data-dcnode-id="729" id="Further_reading"><span data-dcnode-id="730" instrument_node="">Further reading</span></span><span class="mw-editsection" data-dcnode-id="722"><span class="mw-editsection-bracket" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">[</span></span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_transformation%26action%3Dedit%26section%3D1" title="Edit section: Further reading"><span data-dcnode-id="726" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">]</span></span></span></h2><span data-dcnode-id="720" instrument_node="">
</span><div class="refbegin" data-dcnode-id="692" style=""><span data-dcnode-id="717" instrument_node="">
</span><ul data-dcnode-id="694"><li data-dcnode-id="710"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bj%25C3%25B6rn-Ola_Linn%25C3%25A9r" title="Björn-Ola Linnér"><span data-dcnode-id="716" instrument_node="">Björn-Ola Linnér</span></a><span data-dcnode-id="714" instrument_node=""> and Victoria Wibeck (2019). </span><i data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Sustainability Transformations: Agents and Drivers across Societies</span></i><span data-dcnode-id="711" instrument_node="">. Cambridge UK: Cambridge University Press</span></li><span data-dcnode-id="709" instrument_node="">
