</span><p data-dcnode-id="1775"><a class="linkbutton biglinkbutton rightlink" data-dcnode-id="1776" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="#comment"><span data-dcnode-id="1777" instrument_node="">Post a Comment &amp;Acirc;&amp;raquo;</span></a></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Authors: Rachel Teasdale, California State University-Chico; Hannah Scherer, Virginia Polytechnic Institute and State Univ; Lauren Holder, Texas A &amp;amp; M University; Rebecca Boger, CUNY Brooklyn College; and Cory Forbes, University of Nebraska at Lincoln</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1770" instrument_node="">Jump Down To: </span><a data-dcnode-id="1768" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="#gc1"><span data-dcnode-id="1769" instrument_node="">Grand Challenge 1</span></a><span data-dcnode-id="1767" instrument_node=""> | </span><a data-dcnode-id="1765" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="#gc2"><span data-dcnode-id="1766" instrument_node="">Grand Challenge 2</span></a><span data-dcnode-id="1764" instrument_node=""> | </span><a data-dcnode-id="1762" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="#gc3"><span data-dcnode-id="1763" instrument_node="">Grand Challenge 3</span></a><span data-dcnode-id="1761" instrument_node=""> |</span></p><span data-dcnode-id="1759" instrument_node="">
</span><h2 data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Introduction</span></h2><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">The use of societal problems as an effective context for teaching about the earth was suggested in the 2015 and 2016 workshops on the future of Geoscience Educational Research (GER) (Macdonald et al., 2016). Around the same time, the number one outcome of the Summit on The Future of Undergraduate Geoscience Education indicated that among the content and competencies of graduating geoscientists, students "must understand the societal relevance of geoscience topics as well as their ethical dimensions" (Mosher et al., 2014). Similarly, at a societal level, as our population approaches 9 billion by 2050, there are increasing pressures on Earth systems (e.g., water, energy, soils, biochemical cycles) so efforts to understand how to live sustainably on our planet will require new knowledge, tools and approaches that are interdisciplinary and even transdisciplinary (InTeGrate, 2017; Lang et al., 2012; Van der Leeuw et al., 2012; AGI, 2012; figure 1).</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">
</span></p><div class="quarterimage rightfloat image-right-margin modal-display small" data-dcnode-id="1731" id="image-170781"><span data-dcnode-id="1750" instrument_node="">
</span><img alt="AGI 2012 List of Critical Needs.jpg" class="main-image shadow border" crossorigin="anonymous" data-dcnode-id="1749" data-full="https://d32ogoqmya1dw8.cloudfront.net/images/earth_rendezvous/2017/program/morning_workshops/w3/workspace/agi_2012_list_critical.jpg" data-h="449" data-w="367" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d32ogoqmya1dw8.cloudfront.net/images/earth_rendezvous/2017/program/morning_workshops/w3/workspace/agi_2012_list_critical.jpg&amp;raw"><span data-dcnode-id="1748" instrument_node="">

</span><img alt="AGI 2012 List of Critical Needs.jpg" class="main-image border" crossorigin="anonymous" data-dcnode-id="1738" data-full="https://d32ogoqmya1dw8.cloudfront.net/images/earth_rendezvous/2017/program/morning_workshops/w3/workspace/agi_2012_list_critical.jpg" data-h="449" data-w="367" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d32ogoqmya1dw8.cloudfront.net/images/earth_rendezvous/2017/program/morning_workshops/w3/workspace/agi_2012_list_critical.jpg&amp;raw" style="cursor: auto; padding: 0px; border: none;"></div><span data-dcnode-id="1736" instrument_node="">

	Figure 1: A list of "Critical Needs" compiled by the Role of Geoscience in the 21st Century report (AGI, 2012).</span></div><p data-dcnode-id="1729"></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Preparation of future geoscientists is no small task, research on the geoscience workforce indicates the need for more (90,000) geoscientists in the next decade (Wilson, 2016a), in addition to the need for scientists overall discussed in the PCAST report (Olson and Riordan, 2012). As of 2016, 31% of recent geoscience BA/BS graduates are employed in the environmental services industry (Wilson, 2016b), making environmental issues and societal problems important components of the preparation of undergraduate geoscience students for their future careers.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">In addition to preparing future geoscientists, knowledge and consideration of societal issues are critical for non-science students and the general public so that earth related issues are considered in ways that integrate geoscience with other disciplines such as urban planning, social justice, politics, communications and more makes geoscience literacy a critical component to all students as well as to the general public (Wysession et al., 2012; InTeGrate, 2017a). Thus, understanding the best practices for improving geoscience literacy in future geoscientists and in the general population has become a critical call to action for geoscience researchers and educators (Earth Science Literacy Initiative, 2010).</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Improving undergraduate (geo)science education with the use of relevant issues such as societal problems, is also a useful mechanism to garner student interest in such issues (e.g. van der Hoeven Kraft, 2017; InTeGrate 2017b). Recent work also found that curriculum that addresses science and society have a positive effect on student attitudes about science and their perceptions on the relevance of science (e.g. Pelch and McConnell, 2017). Improved pedagogy in geoscience and STEM is consistent with research examining the reasons student don't persist in the geosciences, such as the lack or loss of interest in the material and poor teaching (Seymour, 1995 and 2000).</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Given these multiple calls to action and research results, an important element of GER is to investigate ways to blend DBER-based teaching practices within the context of geoscience topics that can help drive student interest, such as through the use of societal issues, which affect their lives and drive their interest (e.g. Manduca et al., 2004). According to Social Cognitive Theory (e.g., Bandura, 1986; Reninger &amp;amp; Hidi, 2016), interest is a combination of external drivers that an instructor can use to encourage interest, as well as internal drivers that may help students emotionally connect with course content or finding that the curriculum is relevant to their own lives (van der Hoeven Kraft, 2017). As such, teaching geosciences in the context of societal problems is one way to address scientific content in ways that capture student interest.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">
</span></p><div class="quarterimage rightfloat image-right-margin modal-display small" data-dcnode-id="1691" id="image-170793"><span data-dcnode-id="1713" instrument_node="">

	Figure 2: Components considered in the </span><em data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Teaching about Earth in the Context of Societal Problems</span></em><span data-dcnode-id="1692" instrument_node=""> Grand Challenges included here. Graphic modified from NASA, 2012.</span></div><p data-dcnode-id="1689"></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">This paper considers the grand challenges related to using societal issues to teach about the earth, by considering the design principles of curricula that best integrate geoscience content within the context of societal issues that result in maximum student learning and the assessment needed to measure the efficacy of these methods (figure 2). There are excellent models of curriculum that already incorporates the use of societal problems in teaching about the earth (e.g. Eisen et al., 2009; King et al., 2012; InTeGrate, 2017c; SENCER, 2017), which can help inform research on developing, measuring and assessing student learning through the use of geoscience curriculum focused on societal problems.</span></p><span data-dcnode-id="1685" instrument_node="">

</span><h2 data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Grand Challenge 1: How does teaching with societal problems affect student learning about the Earth?</span></h2><span data-dcnode-id="1565" instrument_node="">
</span><h3 data-dcnode-id="1562"><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Rationale:</span></strong></h3><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Geoscience plays a critical role in building sustainable societies and environment, both in the types of research that address societal needs as well as creating scientifically literate citizens (Lewis and Baker 2010). Geoscientists have long been involved with research that intersects with societal issues, including resource issues (food, water quantity, mineral/aggregate resources, energy), environmental stability (environmental degradation, environmental justice), health and safety issues (natural hazards, climate change, water quality; InTeGrate, 2017). However, there is a need to increase undergraduate students choosing geoscience subjects and being prepared with skills and content required in the workplace (Wilson 2016), and this requires us to examine novel approaches to teach geoscience.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Increasing undergraduate student engagement and motivation are key. Societal issues are of high interest to students (e.g. Pelch and McConnell, 2017). Science education research has shown that the disconnect between school science and students' day-to-day lived experiences contributes to lack of interest in science (Basu and Barton 2007, DeFelice et al., Lemke 2001, Roth and Tobin, 2007). As a result, science has little relevancy to students. Furthermore, students need to recognize the usefulness of the knowledge or skill in their lives and future goals for learning experiences to lead to usable knowledge (Edelson et al. 2006). Underrepresented and urban students (often with great diversity) are often at greater risk of losing interest in science as there is the added cultural and linguistic disconnect between school, school science, and their lifeworlds (Basu and Barton, 2007; Rahm 2007; Integrate website). The world is becoming increasingly urbanized and is expected to rise from 54% to 66% of the world's population to live in urban areas by 2050 (UN).</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">Teaching geoscience in societal contexts opens avenues to increase student exposure to and interest in geosciences (Integrate 2017). Students tackle open-ended, real world, and often complex problems that are relevant, especially if placed based pedagogy and high impact teaching approaches (e.g., learning communities; service learning or other courses with a community-based project component; study abroad experiences; internships capstone courses or culminating senior experiences, and research with a faculty member) (taken from serc website; original source </span><a data-dcnode-id="1552" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nsse.indiana.edu/Institutional_Report/High-Impact%2520Practices.pdf"><span data-dcnode-id="1553" instrument_node="">NSSE 2016</span></a><span data-dcnode-id="1551" instrument_node="">). Students today, especially millennials, want to make a difference in their communities and the world at large. By providing societal contexts, they become interested, empowered, and motivated to become agents of change (Kang et al. 2016).</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Whether or not students choose geoscience as a career, exposure to societal issues increases the role of science in building sustainability and can directly or indirectly affect attitudes and behaviors toward sustainable consumption (Kang et al. 2016) According to the United States National Center for Education Statistics, "scientific literacy is the knowledge and understanding of scientific concepts and processes required for personal decision making, participation in civic and cultural affairs, and economic productivity" (from Krajcik and Sutherland 2010). Lack of geo/science literacy makes society less informed and more vulnerable to resource use, disasters, and impacts of climate change.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">The Summary Report for Summit on Future of Undergraduate Geoscience Education contributed toward building a collective community vision for the geosciences focusing on three areas: 1) curriculum, content, competencies, and skills, 2) pedagogy and use of technology, and 3) broadening participation and retention of underrepresented groups and preparation of K-12 science teachers (2014, p.1). This provides a framework in which to research how the inclusion of societal issues contributes to student learning about the Earth.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><h3 data-dcnode-id="1540"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Research Strategies:</span></strong></h3><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">To examine the efficacy of using societal problems to teach about the earth, we need to determine theoretical frameworks that connect the use of societal problems with 1) student motivation to learn about the Earth; 2) student motivation to act (e.g. solve problems/change behaviors), and 3) if learning progressions are important considerations and what the ideal progressions are (e.g. use of issues/activities/solutions appropriate to grade level and STEM/non-STEM majors). Specific research strategies to determine how the use of societal problems impacts student learning and contributes to content goals and general geoscience literacy should include:</span></p><span data-dcnode-id="1536" instrument_node="">
</span><ol data-dcnode-id="1518"><span data-dcnode-id="1535" instrument_node="">
</span><li data-dcnode-id="1532"><span data-dcnode-id="1534" instrument_node="">
Literature review to identify relevant theoretical frameworks that will help explain the mechanisms through which teaching about the Earth through societal problems leads to student learning.</span><br data-dcnode-id="1533"></li><span data-dcnode-id="1531" instrument_node="">
</span><li data-dcnode-id="1528"><span data-dcnode-id="1530" instrument_node="">
In addition student engagement and motivation issues, GER must clearly define geoscience literacy and goals towards achieving geoscience literacy, perhaps describing achievement level goals for different levels of learners (e.g. introductory non-major students through senior level geoscience majors and graduate students). Such definitions will need examination and inspiration from but unique from characterizations of science literacy. Achievement of geoscience literacy should incorporate skills from the Summit Workforce document.</span><br data-dcnode-id="1529"></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1524"><span data-dcnode-id="1526" instrument_node="">
Shorter term and longitudinal studies should also examine if/how students use new-found knowledge of societal problems in their own lives and whether such issues contribute to student motivation to act (e.g. solve problems/change behaviors). Such research should also investigate questions of dosage and timing of such curriculum. For example are there important learning progressions that indicate how much attention to societal issues results in learning and attitudes as well as changes in behavior and if there is specific timing in which societal problems should be included (e.g. use of issues appropriate to grade level and STEM/non-STEM majors).</span><br data-dcnode-id="1525"></li><span data-dcnode-id="1523" instrument_node="">
</span><li data-dcnode-id="1520"><span data-dcnode-id="1522" instrument_node="">
GER should also be used to determine if the use of societal problems contributes to expanding diversity in the geosciences, which may be addressed through short term or longitudinal research on the current and evolving diversity in the geosciences, along with demographic analyses and interviews with students in various stages of courses in the geosciences.</span><br data-dcnode-id="1521"></li><span data-dcnode-id="1519" instrument_node="">
</span></ol><span data-dcnode-id="1517" instrument_node="">

</span><h2 data-dcnode-id="1443"><a data-dcnode-id="1445" id="gc2"></a><span data-dcnode-id="1444" instrument_node="">Grand Challenge 2: What are the design principles for curriculum needed to teach with societal problems?</span></h2><span data-dcnode-id="1442" instrument_node="">
</span><h3 data-dcnode-id="1439"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Rationale:</span></strong></h3><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">Identification of design principles is an important next step in supporting teaching about the Earth with societal problems. Teaching with societal problems as a means to enhance student interest, motivations, dispositions, and learning outcomes, has emerged as a common design conjecture (i.e. a proposed relationship between an educational design and student learning; Sandoval, 2004) in recent reform efforts. Notably, the materials design rubric for the InTeGrate project (</span><a data-dcnode-id="1435" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//serc.carleton.edu/integrate/info_team_members/currdev/rubric.html"><span data-dcnode-id="1436" instrument_node="">https://serc.carleton.edu/integrate/info_team_members/currdev/rubric.html</span></a><span data-dcnode-id="1434" instrument_node="">) tasks materials developers to create curricula that "connect geoscience to grand challenges facing society." This has resulted in a large body of modules and courses (currently 37) that accomplish this in a variety of ways.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node="">Efforts such as the Serving Our Communities blog (</span><a data-dcnode-id="1429" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nagt.org/nagt/profdev/serving/index.html"><span data-dcnode-id="1430" instrument_node="">https://nagt.org/nagt/profdev/serving/index.html</span></a><span data-dcnode-id="1428" instrument_node="">) have collected stories about how faculty are engaging with this work in creative ways that involve communities outside the campus. While the theoretical underpinnings of this conjecture are sound (see Introduction and GC1 above), there is a wide variety of possible teaching strategies that can be used, many of which are not yet well studied (e.g. service learning, National Academies of Sciences, Engineering, and Medicine, 2017). Documenting how this design conjecture is embodied in learning environments can lead not only to information about the efficacy of these approaches, but also lead to new insights into the underlying mechanisms for learning that are at play (Sandoval, 2004).</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Of particular importance for supporting development and implementation of strategies for teaching with societal problems are considerations of scale. Societal problems can be used to address issues at a variety of scales (local, regional, global), leading to questions about implications for student outcomes (e.g., how does the scale of the issue impact student motivation?). Additionally, instructors can use societal problems to engage learners at different scales (e.g., activity scale within class periods, modules, courses, cross-cutting themes across a degree program). Identification of research-based design principles that operate at different scales on both dimensions should be a principal focus of this work. Future directions for this work include determining how best to support faculty in the use of the design principles to incorporate teaching with societal problems into their courses. This could include structures for developing action plans and repositories of examples for issues on multiple scales.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h3 data-dcnode-id="1420"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Research Strategies:</span></strong></h3><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Recent efforts in the GER community show promise for moving this work forward in meaningful ways, lending credence to the claim that this is a timely pursuit and providing guidance for recommended strategies. Throughout this work, we encourage researchers to consider linkages between geoscience classrooms and other entities that can support this work, such as community groups and artists.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><ol data-dcnode-id="1402"><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1414" instrument_node="">
Inventory existing resources and promising practices. The rich body of practitioner-developed resources, coupled with the research literature, provides an ideal starting point for this work. We recommend conducting systematic analyses of approaches and strategies identified through conducting literature reviews, developing inventories of current practice found in existing databases (e.g. InTeGrate, On the Cutting Edge Exemplary Teaching Activities collection, SENCER model courses), and collecting narratives from faculty. Kastens and Krumhansl (2017) describe a method for identifying design patterns in practitioner-developed resources that could be implemented here.</span><br data-dcnode-id="1413"></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1410" instrument_node="">
Determine what resources lead to student learning and engagement. Large scale investigations of the efficacy of existing resources can serve as a starting point for identifying targets for further research. For example, students who participated in InTeGrate modules demonstrated higher scores on systems thinking (Gilbert et al., 2017) and interdisciplinary essays (Awad et al., 2017) when compared to control groups. Modules with particularly high gains could be identified through further analysis of these datasets as a starting point.</span><br data-dcnode-id="1409"></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1406" instrument_node="">
Determine what characteristics of approaches are effective at what scale and in what contexts. We recommend conducting design research studies of existing resources and promising practices, with a particular emphasis on identifying practices that lead to target student learning outcomes. This approach has the "dual goals of refining both theory and practice" (Collins et al., 2004) and embraces the real-world context in which teaching and learning occurs (Sandoval, 2004). Holder et al. (2017) proposed the Problem-Solving in Practice model, which identifies elements of instructional design that can be used to guide student engagement in real-world problem solving; this model could serve as the basis for design research studies.</span><br data-dcnode-id="1405"></li><span data-dcnode-id="1403" instrument_node="">
</span></ol><span data-dcnode-id="1401" instrument_node="">
</span><div aria-controls="f578755" aria-expanded="false" aria-hidden="false" class="hiddenversion" data-dcnode-id="1397" id="c578755"><a data-dcnode-id="1398" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="javascript:swapDiv(578755,true,%20'block')" style="text-decoration:none;"><img alt="" data-dcnode-id="1400" height="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nagt.org/images/twiddle-right.gif&amp;raw" width="12"><span data-dcnode-id="1399" instrument_node="">Show References</span></a></div><span data-dcnode-id="1396" instrument_node="">

</span><h2 data-dcnode-id="1359"><a data-dcnode-id="1361" id="gc3"></a><span data-dcnode-id="1360" instrument_node="">Grand Challenge 3: How do we assess the influence of teaching with societal problems in terms of student motivation and learning about the Earth?</span></h2><span data-dcnode-id="1358" instrument_node="">
</span><h3 data-dcnode-id="1355"><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Rationale:</span></strong></h3><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Teaching about the Earth through the use of societal issues or problems can theoretically increase student motivation, engagement, and learning. The NRC, 2012 advocates for the use of societal issues in the classroom in multiple disciplines, but this can be especially useful in the geosciences because our field focuses around the surface of the Earth where humans live:</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">"studying and engaging in the practices of science and engineering during their K&amp;acirc;&amp;#128;&amp;#147;12 schooling should help students see how science and engineering are instrumental in addressing major challenges that confront society today, such as . . . solving the problems of global environmental change''(pg. 9).</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Societal issues may serve as the vehicle to increase cognitive and affective skills like problem solving, as a student may be more motivated or engaged during problem solving that has personal significance (Gilbert, 2006; Sawyer, 2006; McConnell and Van Der Hoeven Kraft, 2011). Furthermore, in today's society, students must be able to distinguish between "fake news" and scientific facts, especially when there is an issue that impacts their local community. By teaching about these types of situations early and often during students' academic careers, we can prepare them to be informed citizens that can vote accordingly:</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">"Scientists must make critical judgments about their own work and that of their peers, and the scientist and the citizen alike must make evaluative judgments about the validity of science-related media reports and their implications for people's own lives and society. (NRC, 2012, pg 71)"</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">In order to know if teaching through the use of societal problems is valid, we as a community should produce research to substantiate the claims that we make about increases in engagement, motivation, and problem solving and learning. We should also investigate student centered course activities like flipped courses or service-learning could help to increase engagement and motivation:</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">"... the geosciences... offer fertile ground for service-learning programs that address intersections between science and society" (National Academies, 2017, pg 6).</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Finally, we must use assessment techniques to measure changes in both the cognitive (eg. problem solving and learning) and affective domains (eg. motivation, engagement, self-efficacy). In the future, we will need to conduct multi-institutional longitudinal studies that look at the impact of teaching with societal issues.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><h3 data-dcnode-id="1330"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Strategies:</span></strong></h3><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Research on the efficacy of teaching about the Earth through the use of societal problems should include student data, but should also explicitly link defined student learning outcomes to validated assessment techniques. To do this, we must first fully explain student learning outcomes and the numerous variables related to these, such as defining "scientific literacy" as this phrase may have different definitions. In general, GER will need to define the best ways to measure the effect of using societal problems on student learning and on resulting motivations to act (e.g. solve problems/change behaviors). To do so, we will need to determine what instruments currently exist or need to be developed to assess the use of societal problems that allows for future meta-analysis. We suggest that although there are generalized problem solving, argumentation, engagement, and motivation surveys, it may be useful to tailor these specifically for the geosciences.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Specific research strategies will likely include:</span></p><span data-dcnode-id="1323" instrument_node="">
</span><ol data-dcnode-id="1301"><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1319"><span data-dcnode-id="1321" instrument_node="">
In the cognitive domain, we should assess general problem solving skills as well as how students approach a problem, make decisions, argumentation, and solution generation. To do this, we can use validated assessment techniques like the Social Problem-Solving Inventory-Revised (SPSI-R; D'Zurilla et al., 2004). This inventory examines the ways in which students orient themselves towards the problem, rational problem solving, impulsivity, and avoidance, and self-efficacy.</span><br data-dcnode-id="1320"></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1317" instrument_node="">
General learning in the geosciences as a result of teaching using societal issues could be assessed using the Geoscience Concept Inventory (GCI; Libarkin and Anderson, 2005), a validated bank of questions that assess learning, or through the use of the Learning and Study Skills Inventory (LASSI; Cano, 2006).</span><br data-dcnode-id="1316"></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1313" instrument_node="">
Argumentation may also be an effective way to engage students in problem solving and learning (Driver et al., 2000; Osborne et al., 2004). While assessment of argumentation is difficult, there are methods such as the use of Toulmin's (1958) argumentation model, and revisions of this model, based upon warrants and claims; however, this data is much more qualitative in nature.</span><br data-dcnode-id="1312"></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1307"><span data-dcnode-id="1309" instrument_node="">
Student affective domain is of equal importance when considering societal issues because of the claim that teaching with these issues may lead to increases in engagement and motivation. To measure engagement, instructors and researchers can use a variety of instruments, but one of the most popular of these is the National Survey of Student Engagement (NSSE; Kuh, 2003). However, this instrument is expensive, and fairly generalized and so it may be useful to have a engagement survey that relates more directly to the geosciences.</span><br data-dcnode-id="1308"></li><span data-dcnode-id="1306" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1305" instrument_node="">
In terms of motivation and attitude, there are several valid options including: Attitudes toward Science Survey (ATSS; Bickmore et al., 2009), Motivated Strategies for Learning Questionnaire (MSLQ; Pintrich et al., 1991), Intrinsic Motivation Inventory (IMI; Ryan and Deci, 2000), and the Academic Motivation Scale (AMS; Vallerand et al., 1992). In addition to these instruments, there are quite a few instruments listed on the NAGT GER Toolbox (GER Toolbox, 2017). Student engagement, motivation, and attitudes can also be linked to the teaching style of the instructor (instructor centered or student centered), and so using a observation protocol like the Reformed Teaching Observation Protocol (RTOP) could be useful to gauge the impact of the instructor (Piburn and Daiyo, 2000).</span><br data-dcnode-id="1304"></li><span data-dcnode-id="1302" instrument_node="">
</span></ol><span data-dcnode-id="1300" instrument_node="">

</span><h2 data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Linkages to other GER Working Groups</span></h2><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Teaching with societal issues has important linkages to other GER Working Groups:</span></p><span data-dcnode-id="1218" instrument_node="">
</span><ul data-dcnode-id="1200"><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1214"><span data-dcnode-id="1216" instrument_node="">
WG2: Research on Students' Conceptual Understanding of Environmental, Ocean, Atmosphere and Climate Science Content, in that there are numerous and diverse societal issues related to all three spheres as well as climate issues. Given media coverage of climate and representations of IPCC (good and bad), teaching with societal issues is especially relevant and important for informing students on ways to interpret such reports and the sources and reliability of data in considering issues they may see in the news.</span><br data-dcnode-id="1215"></li><span data-dcnode-id="1213" instrument_node="">
</span><li data-dcnode-id="1210"><span data-dcnode-id="1212" instrument_node="">
WG3: Research on Elementary, Middle and Secondary Earth Science Teacher Education (working with teachers and future teachers in all settings), in that new K-12 standards (NGSS) explore the use of transdisciplinary approaches, so our future college students will bring those skills, experiences and content knowledge to our classrooms.</span><br data-dcnode-id="1211"></li><span data-dcnode-id="1209" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1208" instrument_node="">
WG9: Research on Geoscience Students' Self-Regulated Learning/Metacognition and Affective Domain has potential links to investigation of teaching with societal problems as a mechanism to increase student interest in the geosciences.</span><br data-dcnode-id="1207"></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1202"><span data-dcnode-id="1204" instrument_node="">
WG5: Research on Access and Success of Underrepresented Groups in the Geosciences, because the use of societal issues may support learning of students in underrepresented groups as noted in overlapping research with WG9, in that addressing societal issues may increase interest of underrepresented groups. Societal issues may in some cases be familiar to students if issues in their local community are those considered in geoscience courses. This connection to place-based learning may also have good linkages with WG8, Research on Instructional Strategies to Improve Geoscience Learning in Different Settings and with Different Technologies (e.g., place-based instruction, teaching large lectures, online instruction).</span><br data-dcnode-id="1203"></li><span data-dcnode-id="1201" instrument_node="">
</span></ul><span data-dcnode-id="1199" instrument_node="">

</span><a class="link-reset discussion-author" data-dcnode-id="1175" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nagt.org/person/1052.html"><span data-dcnode-id="1176" instrument_node="">Kim Kastens</span></a><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">

</span><div class="discussion-cell" data-dcnode-id="1162" style="width:12px;"><span data-dcnode-id="1165" instrument_node="">
</span><span class="discussion-carrot" data-dcnode-id="1164"></span><span data-dcnode-id="1163" instrument_node="">

</span><div class="discussion-post-content discussion-cell" data-dcnode-id="1108"><span data-dcnode-id="1160" instrument_node="">
</span><div class="discussion-post-text" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">
						
						With respect to the question of whether and how teaching in the context of societal issues increases student engagement, I think we should anticipate that there will be a wide range of individual differences here, and that this will therefore be a noisy type of data.   Different people are impacted by different societal challenges, and what is an existential issue for one student may be of absolutely no importance or interest to a different student.
					</span></div><span data-dcnode-id="1157" instrument_node="">

</span><a class="link-reset" data-dcnode-id="1096" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nagt.org/person/2110.html"><img class="border" data-dcnode-id="1097" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d32ogoqmya1dw8.cloudfront.net/images/serc/kristen_st_john_40.jpg&amp;raw"></a><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">
</span><a class="link-reset discussion-author" data-dcnode-id="1092" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nagt.org/person/2110.html"><span data-dcnode-id="1093" instrument_node="">Kristen St. John</span></a><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">
</span><span class="mediumsmall" data-dcnode-id="1088" title="January 15, 2018 1:00 pm CST"><span data-dcnode-id="1089" instrument_node="">

						</span></span><span data-dcnode-id="1087" instrument_node="">
</span></p><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><div class="discussion-cell" data-dcnode-id="1079" style="width:12px;"><span data-dcnode-id="1082" instrument_node="">
</span><span class="discussion-carrot" data-dcnode-id="1081"></span><span data-dcnode-id="1080" instrument_node="">
</span></div><span data-dcnode-id="1078" instrument_node="">
</span><div class="discussion-post-content discussion-cell" data-dcnode-id="993"><span data-dcnode-id="1077" instrument_node="">
</span><div class="discussion-post-text" data-dcnode-id="1043"><span data-dcnode-id="1076" instrument_node="">
						
						1. I really like that the intro starts with grounding in the 2015 future of GER workshop (Macdonald et al., 2016) and the Summit on The Future of Undergraduate Geoscience Education. That really helps establish that the topic is important both to researchers, educators, and employers (the Summit included surveys of employers). Having the connections to InteGrate and AGI is great too.  Then the following paragraphs of the intro do an equally great job giving a well-cited foundation to the topic. I think this is important because we could have just kept teaching about the Earth in the context of societal problems as a subset of say WG2( Research on Students’ Conceptual understanding of ocean-atm-climate-env) or perhaps under research Instructional strategies to improve student learning (WG7), but it would have been buried. I think you all have made a strong case for why it should stand on its own and why now is the time to focus GER efforts on this theme. </span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
2. I like the critical needs table/figure but at first glance I think someone might look at that and think those are critical needs that your WG has defined and that it is a summary of the your groups recommendations. The caption makes it clear the source but could the list header be revised to make it clear how these critical needs related to your theme? </span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
3. End of Intro: “This paper considers the grand challenges related to using societal issues to teach about the earth, by considering the design principles of curricula that best integrate geoscience content within the context of societal issues that result in maximum student learning and the assessment needed to measure the efficacy of these methods”.  I don’t think it is a paper, it is a chapter? Or maybe that could be rephrased so it reflects the “charge” of the WG - See what WG3 did in their intro.  Then you have a sentence referencing several models for curriculum that does this, but then it kind of stops awkwardly. Do you describe these models later under the GCs? Or do you summarize what makes them excellent somewhere? If these model are excellent does that mean they are comprehensive too and therefore we don’t really need more original research in teaching about the Earth in the context of societally relevant problems? Instead, we just need to adapt those models and assess how they work? </span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
4. General comment: I think the rationale for GC#1 is well cited, but I was wondering what future research is actually needed by the time I got to the end of it. My question was addressed though in the first paragraph of the Research Strategies section - But should that go instead as the last paragraph of the rationale? I think I’m getting at if the rationale need to include the needs or gaps that currently exist? The recommended strategies lay out paths to help address those needs/fill those gaps? (I may be overthinking this.) Another way to approach this might be to do what WG3 did and include some suggestions for important researchable questions under each Grand Challenge, in addition to the recommended strategies. That wasn’t a requirement in the format, but I think it is very effective. Please look at WG3’s draft chapter and see if you think that is a good way to go.  </span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
5. GC#1: Recommended strategy 1 about need for theoretical frameworks. Can you elaborate or give an example? I think it might help to see how theoretical frameworks can help support the research in this area.</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
</span><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">
6. GC#1: Recommended strategy 2: You state “GER must clearly define geoscience literacy and goals towards achieving geoscience literacy…” but do researcher define the literacy goals or do educators/practitioners/employers? I’m not sure that is GER’s role (or not exclusively GERs role). I do see GER though helping figure out what is the best way to achieve the goals once set. </span><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">
</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">
7. GC#2 Rationale: I think could benefit from GER looking outside our discipline for strategies that are working in other STEM (medicine, ecosystem management, agriculture education) and non-STEM (e.g., urban studies?, economics?) fields that address societally-relevant problems. What could you suggest here to branch out from InTeGrate materials so we can learn about other models too outside of our discipline? </span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">
</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
8. GC#3: I like that you offer several examples of possible assessment resources. Because you referred to InTeGrate a lot in the other GCs and in the intro, does the InTeGrate program offer an assessment model that can be adapted for use outside of InTeGrate materials?</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
9. I like that you included a summary at the end of how your theme connects to other work group themes. Such cross- theme connections will be important for me to summarize in a synthesis chapter that builds on all of the WG theme chapters. Thanks for already thinking though some important connections!

						Hi GC4, I really enjoyed reading your chapter! I have some little editing suggestions that I'll send to Rachel, but as an overarching suggestion:</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
Might it be more effective to open with "how do we assess..." as your first GC, then go into "how does this affect student learning"? I suggest this partly because it is in this section where you really unpack the variety of types of learning that might result, which was a question for me throughout your intro and GC1 and 2. As an alternative, you could lay out those ideas in the intro. Either way, I think carrying through specific reference to the specific types of learning and the ways that we might measure them will be useful throughout the other two GCs- for example, we might design very differently for a different type of desired learning, which might be clarified by and grounded in the specific assessment we use to measure whether we've achieved it. Hope that's helpful!

</span><div class="discussion-post-text" data-dcnode-id="855"><span data-dcnode-id="876" instrument_node="">
						
						What I have seen by looking through all of the different sections (which, by the bye, seems very comprehensive and well done) is an emphasis on teaching the "what" of geology and very little teaching about the "how" of geology. We want our students to develop an understanding of what we know. That's fine, but possibly even more important is developing an understanding of HOW we know what we know. I put this comment here because it is probably closest in nature to what I have in mind. Geology is a human endeavor, and as such reflects human thinking, biases, and social, economic and political influences (Allchin 2011). I have multiple geology texts and every one of them begins in chapter one with the "scientific method" like it is the way that science gets done; the only way science gets done. Well, I bet if geologists reflected on how they do their science, they will see that they rarely (if ever) employ the step-by-step method (Cleland, 2013; Frodeman, 1995; Turner, 2013). It is taught as some idealized version of science, to emphasize the idea that what we have in the end is the truth and beyond question. However, what this tells students is that what they learn in geology class is a list of facts that have already been figured out, and there is no need to explore any further because the truth has already been discovered (Gasparatou, 2017). There is no need for problem-solving, no need to negotiate meaning, no need to argue for or against a controversial idea because a simple experiment will decide the answer. But how do you set up an experiment to test a mass extinction, or whether mantle plumes are driving motion of the lithosphere, or the conditions of metamorphism deep in the roots of a mountain range? Working on current problems gets partially at the process of geology, but it doesn't allow closure of the idea for the students to see how a particular problem or controversy gets resolved (Allchin, 2014). Teaching the history of science can add this vital part. By using historical case studies, students can still experience science-in-the-making (Latour, 1987), but there is eventually a closure to the problem. Students see how the controversy resolved and the aspects of the process involved in that resolution (Allchin, 1997, 2013). Very few of our stdents will end up being scientists. Far fewer of them will be geologists. However, they will ALL be consumers of science. They will all be making decisions based on "scientific" claims that affect themselves, their families, communities, nation and maybe even the world. Understanding the concepts is important. Understanding why we have faith in those concepts, I feel is even more important. We can always Google the facts, but getting the 'why' they are facts is something they will have to work out on their own. They will only learn this in a course that teaches it.</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">
</span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">
Allchin, D. (1997). The power of history as a tool for teaching science. In A. Dally, T. Nielsen, &amp; F. Reiß (Eds.), History and philosophy of science: A means to better scientific literacy? (pp. 70-98). Loccum: Evangelische Akadamie Loccum.</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">

						Figure 1: This is not the most recent list of critical needs from AGI, and I think the 2016 one is stronger: </span><a data-dcnode-id="771" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americangeosciences.org/policy/critical-needs."><span data-dcnode-id="772" instrument_node="">https://www.americangeosciences.org/policy/critical-needs.</span></a><span data-dcnode-id="770" instrument_node=""> If you use this (and I think it's worth using), you might describe in the text that this document is written in advance of the presidential election to inform policy makers (in the US, of course). The 2016 critical needs are:</span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
• Ensuring sufficient supplies of clean water</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
• Developing energy to power the nation</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
• Building resiliency to natural hazards</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
• Managing healthy soils</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
• Providing raw materials for modern society</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
• Expanding opportunities and mitigating threats in the ocean and at coasts</span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
• Confronting climate variability</span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">
• Managing waste to maintain a healthy environment</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
• Meeting the future demand for geoscientists</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">
</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">
GC #1, Research strategy 2: The geoscience literacy documents are not mentioned here, but these documents represent the community consensus on what every citizen should know about Earth science, atmospheric science, climate, and oceans. How does this strategy relate to or build from those documents? All of the literacy documents are available here: </span><a data-dcnode-id="746" data-event-listener-contextmenu="contextmenu" data-event-listener-keydown="keydown" data-event-listener-mouseup="mouseup" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nagt.org/nagt/teaching_resources/literacies.html."><span data-dcnode-id="747" instrument_node="">https://nagt.org/nagt/teaching_resources/literacies.html.</span></a><span data-dcnode-id="745" instrument_node=""> I also agree with Kristen's comment above that it is not really the role of the GER community to </span><em data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">define</span></em><span data-dcnode-id="742" instrument_node=""> literacy, but it can invest in research to understand how we achieve literacy. Learning progressions research might also be useful here. </span><br data-dcnode-id="741"><span data-dcnode-id="740" instrument_node="">
</span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">
GC #2: I have a hard time seeing this as a grand challenge. I think we already know good curriculum design principles and strategies and I see this more as a process of applying what we already know - many of these ideas come from the interdisciplinary teaching literature. Key references:</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">
</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">
Spelt, E. H., Biemans, H. A., Tobi, H., Luning, P., &amp; Mulder, M. (2009). Teaching and Learning in Interdisciplinary Higher Education: A Systematic Review. Educational Psychology Review, 21(4), 365-378. doi:10.1007/s10648-009-9113-z</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">
</span><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">
Nikitina, S. (2006). Three strategies for interdisciplinary teaching: contextualizing, conceptualizing, and problem‐centring. Journal of Curriculum Studies, 38(3), 251-271. </span><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">
</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
Barab, S. A., &amp; Landa, A. (1997). Designing effective interdisciplinary anchors. Educational Leadership, March, 52-55. </span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">
</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
Klein, J. T., &amp; Newell, W. H. (1996). Advancing Interdisciplinary Studies. In J. Gaff &amp; J. Ratcliff (Eds.), Handbook of the Undergraduate Curriculum. San Francisco: Jossey-Bass.</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
These are in addition to general curriculum design literature, like:</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">
Wiggins, G., &amp; McTighe, J. (2005). Understanding by Design. Alexandria, VA: Association for Supervision and Curriculum Development.</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
GC #3: To me, this is where the important questions really are. How well does this approach really work, and we can consider that along several dimensions, which you've outlined very nicely here. One additional dimension to consider is how the effect of teaching in the context of societal issues changes over the course of a major. For example, I can imagine a few hypotheses: </span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
- Students who are introduced to Earth science in context of societal issues in the first few courses they take will be disappointed (less motivated, learn less, etc.) if more advanced classes do not take that approach, and may even start to demand faculty take this approach in all courses</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
- Societal issues are considered a scaffold for learning, and while the scaffolds are significant and strong at the introductory level, they can be removed and fade at more advanced levels because students can make the societal connections on their own.
