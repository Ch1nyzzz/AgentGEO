</span><h1 class="entry-title" data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Scandalous Facts About Ramon Novarro, The Tragic Idol</span></h1><span data-dcnode-id="1968" instrument_node="">
</span></div><span data-dcnode-id="1966" instrument_node="">
</span><div class="inner_content_wrapper inner_content" data-dcnode-id="971"><span data-dcnode-id="1965" instrument_node="">
</span><div class="entry-content" data-dcnode-id="973" itemprop="articleBody"><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">The life of matinee idol Ramon Novarro was bookended by immense stardom on one end and then, in his very last breaths, immense tragedy. On October 30, 1968, the secret he tried so desperately to hide throughout his glamorous career came out in one infamous, violent act. After that “Bloody Wednesday,” the legacy of this Latin Lover was never the same. This is his story.</span></p><span data-dcnode-id="1961" instrument_node="">
</span><hr data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">
</span><h1 data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Ramon Novarro Facts</span></h1><span data-dcnode-id="1956" instrument_node="">
</span><h2 data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">1. He Lived In The Garden Of Eden</span></h2><div class="partial_slot" data-dcnode-id="1953" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1951" instrument_node="">In many ways, Novarro’s beginnings were steeped in tragedy. Born Jose Samaniego on February 6, 1899, in Mexico, his family were wealthy doctors and dentists, and there was even a legend they were descended from Mexican royalty. A huge family of 12 children, they lived on an enormous family estate they called “The Garden of Eden”—and like Adam and Eve,</span><strong data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node=""> they soon had a brutal downfall.</span></strong></p><span data-dcnode-id="1947" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1939" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1940" style="width: 2560px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450051 lazy-loaded" data-dcnode-id="1946" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-scaled.jpg" data-srcset="" height="1994" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-scaled.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-1024x798.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-1536x1196.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-2048x1595.jpg 2048w" width="2560"><noscript data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">&lt;img class="size-full wp-image-450051" src="https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-scaled.jpg" alt="Ramon Novarro Facts" width="2560" height="1994" srcset="https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-1024x798.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-1536x1196.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/8623342098_de503bdb02_o-2048x1595.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1941"><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/62100938%40N02/8623342098"><span data-dcnode-id="1943" instrument_node="">Flickr, John Irving</span></a></span></div></figure><span data-dcnode-id="1938" instrument_node="">
</span><h2 data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">2. He Fled His Home</span></h2><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">In 1913, when Novarro was barely a teenager, the Mexican Revolution erupted, throwing his family into total chaos. Suddenly, they were targets, and the brood moved around the country for a time before finally fleeing to Los Angeles to escape a potentially dark fate. But for Ramon, it was out of the frying pan and into the fire.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1924" style="width: 1240px"><div class="media-credit-container alignnone" data-dcnode-id="1925" style="width: 1240px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450052 lazy-loaded" data-dcnode-id="1931" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001.jpg" data-srcset="" height="873" loading="lazy" sizes="(max-width: 1240px) 100vw, 1240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001.jpg 1240w, https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001-1024x721.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001-768x541.jpg 768w" width="1240"><noscript data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450052" src="https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001.jpg" alt="Ramon Novarro Facts" width="1240" height="873" srcset="https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001.jpg 1240w, https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001-1024x721.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/1280px-Carl__Pancho_001-768x541.jpg 768w" sizes="(max-width: 1240px) 100vw, 1240px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1926"><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ACarl__Pancho_001.jpg"><span data-dcnode-id="1928" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1923" instrument_node="">
</span><h2 data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">3. He Was A Teenage Star</span></h2><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Before Novarro had turned 18, he was already set on being a heartthrob. While in Los Angeles, he befriended famed Hollywood power couple Rex Ingram and his wife Alice Terry, who both saw good old dollar signs in the young man’s sweet, serene face. Before they started promoting him, however, they asked him to make one big change.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1909" style="width: 702px"><div class="media-credit-container alignnone" data-dcnode-id="1910" style="width: 702px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450053" data-dcnode-id="1916" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922.jpg" data-srcset="" height="465" loading="lazy" sizes="(max-width: 702px) 100vw, 702px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922.jpg 702w, https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922-340x225.jpg 340w" width="702"><noscript data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450053" src="https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922.jpg" alt="Ramon Novarro Facts" width="702" height="465" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922.jpg 702w, https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Rex_Ingram__Alice_Terry_1922-340x225.jpg 340w" sizes="(max-width: 702px) 100vw, 702px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1911"><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARex_Ingram__Alice_Terry_1922.jpg"><span data-dcnode-id="1913" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1908" instrument_node="">
</span><h2 data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">4. He Took A Fake Name</span></h2><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Ingram and Terry didn’t think the soon-to-be star’s birth name of “Jose Samaniego” was going to fly, and pressured the teen to change it to a more silver-screen friendly moniker. Even that didn’t go to plan: According to legend, he chose “Navarro” after his friend Gabriel Navarro, but after a typing error ended up Ramon Novarro. Either way, the rest was history.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1894" style="width: 1155px"><div class="media-credit-container alignnone" data-dcnode-id="1895" style="width: 1155px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450054 lazy-loaded" data-dcnode-id="1901" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o.jpg" data-srcset="" height="838" loading="lazy" sizes="(max-width: 1155px) 100vw, 1155px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o.jpg 1155w, https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o-1024x743.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o-768x557.jpg 768w" width="1155"><noscript data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450054" src="https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o.jpg" alt="Ramon Novarro Facts" width="1155" height="838" srcset="https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o.jpg 1155w, https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o-1024x743.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/5985534677_bb6e1a8ec9_o-768x557.jpg 768w" sizes="(max-width: 1155px) 100vw, 1155px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1896"><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/62100938%40N02/5985534677"><span data-dcnode-id="1898" instrument_node="">Flickr, John Irving</span></a></span></div></figure><span data-dcnode-id="1893" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="1888" style="min-height: 120px;"><div data-dcnode-id="1889"><span data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Advertisement</span></span><div data-dcnode-id="1890" id="div-gpt-ad-3568692-15"></div></div></div><h2 data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">5. He Had A Powerful Rival</span></h2><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1884" instrument_node="">Besides his new name change, Ramon Novarro had one more Hollywood strategy up his sleeve. At the time, </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-rudolph-valentino/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1883" instrument_node="">Rudolph Valentino</span></a><span data-dcnode-id="1881" instrument_node=""> was the King of Hollywood and the prince of most women’s hearts, but Ingram and Terry cleverly positioned their protégée as competition for the so-called “Latin Lover.” Yet even though these elder stars helped Novarro immensely, </span><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">their relationship had a dark side.</span></strong></p><span data-dcnode-id="1877" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1869" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1870" style="width: 800px"><img alt="Rudolph Valentino facts" class="size-full wp-image-420376" data-dcnode-id="1876" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1.jpg" data-srcset="" height="630" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1.jpg 800w, https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1-768x605.jpg 768w" width="800"><noscript data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-420376" src="https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1.jpg" alt="Rudolph Valentino facts" width="800" height="630" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1.jpg 800w, https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Rudolph_Valentino-1-768x605.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1871"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARudolph_Valentino.jpg"><span data-dcnode-id="1873" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1868" instrument_node="">
</span><h2 data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">6. His Friend Put Him Through A Grueling Test</span></h2><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1864" instrument_node="">Ingram believed Novarro could be a star, but he was also shamelessly using him. The director had actually worked with Rudolph Valentino first, but found him too difficult—and he was hoping the naïve Novarro would prove easier to control. As if to test this theory, when Novarro tried out for Ingram’s film </span><em data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">The Prisoner of Zenda</span></em><span data-dcnode-id="1861" instrument_node="">, the man made him go through three grueling screen tests just to get the part. And that wasn’t all.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1851" style="width: 702px"><div class="media-credit-container alignnone" data-dcnode-id="1852" style="width: 702px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450055" data-dcnode-id="1858" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4.jpg" data-srcset="" height="565" loading="lazy" sizes="(max-width: 702px) 100vw, 702px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4.jpg 702w, https://www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4-300x241.jpg 300w" width="702"><noscript data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450055" src="https://www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4.jpg" alt="Ramon Novarro Facts" width="702" height="565" srcset="https://www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4.jpg 702w, https://www.factinate.com/wp-content/uploads/2020/10/The_Prisoner_of_Zenda_1922_4-300x241.jpg 300w" sizes="(max-width: 702px) 100vw, 702px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1853"><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AThe_Prisoner_of_Zenda_%281922%29_4.jpg"><span data-dcnode-id="1855" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1850" instrument_node="">
</span><h2 data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">7. He Was a Copy-Cat</span></h2><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">When Ingram promoted his newest male ingénue, he forced Novarro to take up Rudolph Valentino’s mannerisms and his physical traits, down to the very last creepy detail. When Novarro took publicity shots, Ingram even made him comb his hair in the exact same way that the Italian heartthrob did. As we’ll see, though, Novarro’s rumored connection to Valentino only got more eerie as time went on.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1836" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1837" style="width: 2560px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450056 lazy-loaded" data-dcnode-id="1843" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-scaled.jpg" data-srcset="" height="2040" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-scaled.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-1024x816.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-768x612.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-1536x1224.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-2048x1632.jpg 2048w" width="2560"><noscript data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450056" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-scaled.jpg" alt="Ramon Novarro Facts" width="2560" height="2040" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-1024x816.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-768x612.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-1536x1224.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-553957007-2048x1632.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1838"><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1840" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1835" instrument_node="">
</span><h2 data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">8. He Got A Big Break</span></h2><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">In 1923, Novarro finally got his big break, and it was an enormous one. That year, Rex Ingram directed him in the blockbuster </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Scaramouche</span></em><span data-dcnode-id="1828" instrument_node="">, opposite none other than Alice Terry. The film was a huge success, making back its huge budget handily at the box office and turning Novarro into a household name. Yet somehow, his most famous role was yet to come.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1818" style="width: 1193px"><div class="media-credit-container alignnone" data-dcnode-id="1819" style="width: 1193px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450057 lazy-loaded" data-dcnode-id="1825" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro.jpg" data-srcset="" height="873" loading="lazy" sizes="(max-width: 1193px) 100vw, 1193px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro.jpg 1193w, https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro-300x220.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro-1024x749.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro-768x562.jpg 768w" width="1193"><noscript data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450057" src="https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro.jpg" alt="Ramon Novarro Facts" width="1193" height="873" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro.jpg 1193w, https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro-300x220.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro-1024x749.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/Scaramouche_1923_-_Ramon_Novarro-768x562.jpg 768w" sizes="(max-width: 1193px) 100vw, 1193px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1820"><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AScaramouche_1923_-_Ramon_Novarro.jpg"><span data-dcnode-id="1822" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1817" instrument_node="">
</span><h2 data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">9. He Stole His Most Famous Role</span></h2><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1813" instrument_node="">Right after </span><em data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Scaramouche</span></em><span data-dcnode-id="1810" instrument_node="">, Novarro nabbed the lead role in the legendary biblical epic </span><em data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Ben-Hur: A Tale of the Christ. </span></em><strong data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">But how he did it was scandalous</span></strong><span data-dcnode-id="1805" instrument_node="">. Initially, he lost out on the part, and producers cast athlete-actor George Walsh as the title prince. When </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">that</span></em><span data-dcnode-id="1802" instrument_node=""> production turned into a fiasco, the studio took over, fired Walsh, and cast Novarro instead.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Reportedly, Walsh was bitter about his replacement until the end…but Novarro didn’t seem to care.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1789" style="width: 700px"><div class="media-credit-container alignnone" data-dcnode-id="1790" style="width: 700px"><img alt="Ramon Novarro Facts" class="size-full wp-image-450059" data-dcnode-id="1796" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH.jpg" data-srcset="" height="586" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH.jpg 700w, https://www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH-300x251.jpg 300w" width="700"><noscript data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450059" src="https://www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH.jpg" alt="Ramon Novarro Facts" width="700" height="586" srcset="https://www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH.jpg 700w, https://www.factinate.com/wp-content/uploads/2020/10/George_Walsh_-_Oct_1920_EH-300x251.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1791"><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AGeorge_Walsh_-_Oct_1920_EH.jpg"><span data-dcnode-id="1793" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1788" instrument_node="">

</span></div><h2 data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">10. He Caused A Scandal</span></h2><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node="">When </span><em data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Ben-Hur</span></em><span data-dcnode-id="1728" instrument_node=""> came out, it was more than an instant sensation, it was also an instant controversy—and Novarro was right at the center. As the wealthy, glamorous Jewish prince Ben-Hur, Novarro wore a series of tight, shiny, and short costumes, setting his female fans atwitter once more and firmly cementing his “hunk” status. But behind the scenes, things were much less glamorous.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1718" style="width: 2398px"><div class="media-credit-container alignnone" data-dcnode-id="1719" style="width: 2398px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450058" data-dcnode-id="1725" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur.jpg 2398w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-1024x793.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-768x595.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-1536x1189.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-2048x1586.jpg 2048w" height="1857" loading="lazy" sizes="(max-width: 2398px) 100vw, 2398px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2398"><noscript data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450058" src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur.jpg" alt="Ramon Novarro Facts" width="2398" height="1857" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur.jpg 2398w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-1024x793.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-768x595.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-1536x1189.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_as_Ben-Hur-2048x1586.jpg 2048w" sizes="(max-width: 2398px) 100vw, 2398px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1720"><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARamon_Novarro_as_Ben-Hur.jpg"><span data-dcnode-id="1722" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1717" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1716" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF2" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF3"></div><h2 data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">11. He Looked Much Different In Person</span></h2><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1712" instrument_node="">Novarro’s role in </span><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Ben-Hur</span></em><span data-dcnode-id="1709" instrument_node=""> often required him to go </span><em data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">sans</span></em><span data-dcnode-id="1706" instrument_node=""> shirt, but his buff appearance in the film was actually a total trick. Although he got a trainer while on set and tried to amp his muscles up, he still ran a little too pudgy for the producers’ tastes. Eventually, they gave up entirely and just had the makeup department paint muscles on him. And there was some other movie black magic going on…</span></p><span data-dcnode-id="1704" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1696" style="width: 897px"><div class="media-credit-container alignnone" data-dcnode-id="1697" style="width: 897px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450071" data-dcnode-id="1703" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15.png" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15.png 897w, https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15-300x240.png 300w, https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15-768x616.png 768w" height="719" loading="lazy" sizes="(max-width: 897px) 100vw, 897px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="897"><noscript data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450071" src="https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15.png" alt="Ramon Novarro Facts" width="897" height="719" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15.png 897w, https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15-300x240.png 300w, https://www.factinate.com/wp-content/uploads/2020/10/Untitled-15-768x616.png 768w" sizes="(max-width: 897px) 100vw, 897px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1698"><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mgm.com/"><span data-dcnode-id="1700" instrument_node="">Ben-Hur: A Tale of the Christ (1925), Metro-Goldwyn-Mayer</span></a></span></div></figure><span data-dcnode-id="1695" instrument_node="">
</span><h2 data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">12. He Played Tricks On Audiences</span></h2><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1691" instrument_node="">Novarro’s 5’6″ tall frame was way too small next to his strapping co-star Francis Bushman, who played the movie’s villain Messala. Desperate to make their leading man look intimidating next to his rival, filmmakers made Bushman stand in a ditch whenever he had a scene with Novarro. Movies: They’re all lies. Then again, </span><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Novarro was hiding something even bigger…</span></strong></p><span data-dcnode-id="1687" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1679" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1680" style="width: 1024px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450072" data-dcnode-id="1686" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494-768x615.jpg 768w" height="820" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450072" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494.jpg" alt="Ramon Novarro Facts" width="1024" height="820" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-607409494-768x615.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1681"><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1683" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1678" instrument_node="">
</span><h2 data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">13. His Bedroom Life Was Forbidden</span></h2><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Despite his legions of straight female fans, Ramon Novarro was bound to disappoint them in bed—and vice versa. The Mexican heartthrob was actually thoroughly homosexual, even as he desperately tried to conceal this fact from the public eye, keeping his private life intensely private. Behind the scenes, though, Novarro’s love life was running wild.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1664" style="width: 700px"><div class="media-credit-container alignnone" data-dcnode-id="1665" style="width: 700px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450073" data-dcnode-id="1671" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_AM825.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_AM825.jpg 700w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_AM825-300x241.jpg 300w" height="562" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="700"><noscript data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450073" src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_AM825.jpg" alt="Ramon Novarro Facts" width="700" height="562" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_AM825.jpg 700w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_AM825-300x241.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1666"><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARamon_Novarro_AM825.jpg"><span data-dcnode-id="1668" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1663" instrument_node="">
</span><h2 data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">14. He Had A Cruel Breakup</span></h2><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">Just before he gained international superstardom, Novarro took up with the composer Harry Partch, staying with him through the early 1920s. </span><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">But he soon dealt his lover a heartbreaking betrayal.</span></strong><span data-dcnode-id="1656" instrument_node=""> Whether stardom went to his head or he was afraid of exposure, Novarro dropped Partch like a hot potato as soon as he became famous.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1646" style="width: 2186px"><div class="media-credit-container alignnone" data-dcnode-id="1647" style="width: 2186px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450074" data-dcnode-id="1653" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299.jpg 2186w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-1024x793.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-768x594.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-1536x1189.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-2048x1585.jpg 2048w" height="1692" loading="lazy" sizes="(max-width: 2186px) 100vw, 2186px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2186"><noscript data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450074" src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299.jpg" alt="Ramon Novarro Facts" width="2186" height="1692" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299.jpg 2186w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-1024x793.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-768x594.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-1536x1189.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_silent_film_actor_SAYRE_7299-2048x1585.jpg 2048w" sizes="(max-width: 2186px) 100vw, 2186px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1648"><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.m.wikimedia.org/wiki/File%3ARamon_Novarro%2C_silent_film_actor_%28SAYRE_7299%29.jpg"><span data-dcnode-id="1650" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1645" instrument_node="">
</span><h2 data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">15. He Developed Self-Destructive Behaviors</span></h2><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Hollywood wasn’t ready to accept a gay leading man, but more tragically, Novarro could barely accept himself. His family raised him as a staunch Roman Catholic, and he could never shake the feeling that what he was doing was a “sin.” This persistent belief affected him deeply, and Novarro eventually developed a raging alcohol problem that many trace back to his sexuality. Later in life, this would catch up to him in a big way.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1631" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1632" style="width: 1280px"><img alt="Whitney Houston Facts" class="lazy-hidden size-full wp-image-448998" data-dcnode-id="1638" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280-768x432.jpg 768w" height="720" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-448998" src="https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280.jpg" alt="Whitney Houston Facts" width="1280" height="720" srcset="https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/06/bible-4249164_1280-768x432.jpg 768w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1633"><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.needpix.com/"><span data-dcnode-id="1635" instrument_node="">Needpix </span></a></span></div></figure><span data-dcnode-id="1630" instrument_node="">
</span><h2 data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">16. His Lover Was Powerful</span></h2><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node="">In 1924, Novarro met </span><em data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Photoplay</span></em><span data-dcnode-id="1623" instrument_node=""> celebrity journalist Herbert Howe, and quickly started a torrid affair with the news writer. Together, they hid in plain sight. Howe would write about Novarro in his columns as his “closest friend,” which only those in the know understood as code for “lover,” all while Novarro’s profile got a boost. Oh, but they got more ingenious than that.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1613" style="width: 1560px"><div class="media-credit-container alignnone" data-dcnode-id="1614" style="width: 1560px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450076" data-dcnode-id="1620" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422.jpg 1560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-300x213.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-1024x727.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-768x545.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-1536x1091.jpg 1536w" height="1108" loading="lazy" sizes="(max-width: 1560px) 100vw, 1560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1560"><noscript data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450076" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422.jpg" alt="Ramon Novarro Facts" width="1560" height="1108" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422.jpg 1560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-300x213.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-1024x727.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-768x545.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-837868422-1536x1091.jpg 1536w" sizes="(max-width: 1560px) 100vw, 1560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1615"><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1617" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1612" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1611" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF3" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF4"></div><h2 data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">17. He Had A Strange Publicity Stunt</span></h2><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">As long as Novarro was private about his lovers, the studios let him do whatever he wanted. In fact, they helped him create smokescreens, feeding news to the press that he was going on dates with starlets without ever making him actually meet the women. The best part? Herbert Howe, his real paramour, was the one writing these false stories.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1604" instrument_node="">It seemed like a match made in heaven, </span><strong data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">but the couple was doomed to a bitter end.</span></strong></p><span data-dcnode-id="1600" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1592" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1593" style="width: 1000px"><img alt="The Most Hated Rulers In World History Facts" class="lazy-hidden size-full wp-image-228300" data-dcnode-id="1599" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-228300" src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128.jpg" alt="The Most Hated Rulers In World History Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1047377128-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1594"><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1596" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1591" instrument_node="">
</span><h2 data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">18. He Dumped The Wrong Man</span></h2><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">In 1928, after nearly half a decade together, Howe and Novarro broke up, sending shockwaves through subterranean Hollywood. Well, it must have been a shock for Howe, too, because he immediately took to his column and penned a vitriolic revenge article about his ex Novarro. Among a certain set, its contents were utterly infamous.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1577" style="width: 2224px"><div class="media-credit-container alignnone" data-dcnode-id="1578" style="width: 2224px"><img alt="Worst Thing a Guest did facts" class="lazy-hidden size-full wp-image-239463" data-dcnode-id="1584" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152.jpg 2224w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152-300x182.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152-768x465.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152-1024x621.jpg 1024w" height="1348" loading="lazy" sizes="(max-width: 2224px) 100vw, 2224px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2224"><noscript data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-239463" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152.jpg" alt="Worst Thing a Guest did facts" width="2224" height="1348" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152.jpg 2224w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152-300x182.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152-768x465.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-1003399152-1024x621.jpg 1024w" sizes="(max-width: 2224px) 100vw, 2224px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1579"><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1581" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1576" instrument_node="">
</span><h2 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">19. His Ex Got A Bitter Revenge</span></h2><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">In his article, Howe accused Novarro of nothing less than cruelty and coldness, claiming he was incapable of showing any inner life or warmth in a relationship, and suggesting he very likely had no inner life at all. Concentrating all his skill for wordplay on obliterating his ex-boyfriend, Howe scathingly wrote that, “Off-screen he is a theater with the lights out.” Novarro’s response was nothing short of drastic.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1562" style="width: 716px"><div class="media-credit-container alignnone" data-dcnode-id="1563" style="width: 716px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450075" data-dcnode-id="1569" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_1933.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_1933.jpg 716w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_1933-300x245.jpg 300w" height="585" loading="lazy" sizes="(max-width: 716px) 100vw, 716px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="716"><noscript data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450075" src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_1933.jpg" alt="Ramon Novarro Facts" width="716" height="585" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_1933.jpg 716w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_1933-300x245.jpg 300w" sizes="(max-width: 716px) 100vw, 716px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1564"><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARamon_Novarro_1933.JPG"><span data-dcnode-id="1566" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1561" instrument_node="">
</span><h2 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">20. He Almost Became A Monk</span></h2><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1557" instrument_node="">Sore from his breakup and newly burned by Howe’s caustic bitterness, </span><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Novarro tried to escape in the most bizarre way possible.</span></strong><span data-dcnode-id="1554" instrument_node=""> True to his Roman Catholic roots, the heartthrob decided the best thing for his life and happiness was to…become a full-blown monk. He even approached a monastery, but they rejected him because they didn’t think a Hollywood star could be serious about enlightenment.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1544" style="width: 1575px"><div class="media-credit-container alignnone" data-dcnode-id="1545" style="width: 1575px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450077" data-dcnode-id="1551" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_.jpg 1575w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-1536x1024.jpg 1536w" height="1050" loading="lazy" sizes="(max-width: 1575px) 100vw, 1575px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1575"><noscript data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450077" src="https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_.jpg" alt="Ramon Novarro Facts" width="1575" height="1050" srcset="https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_.jpg 1575w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/architecture-white-san-francisco-arch-column-monk-1250406-pxhere.com_-1536x1024.jpg 1536w" sizes="(max-width: 1575px) 100vw, 1575px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1546"><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pxhere.com/"><span data-dcnode-id="1548" instrument_node="">PxHere</span></a></span></div></figure><span data-dcnode-id="1543" instrument_node="">
</span><h2 data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">21. His Rival Met A Tragic End</span></h2><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1539" instrument_node="">In the mid-1920s, Novarro got a huge and disturbing windfall. In 1926, Rudolph Valentino passed at the tender age of 31, leaving thousands of frenzied female fans mourning in his wake. But what was bad for Valentino was </span><em data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">very</span></em><span data-dcnode-id="1536" instrument_node=""> good for Ramon Novarro, and he quickly became one of the leading romantic actors of the period. Only, the bigger they are, the harder they fall.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1526" style="width: 3416px"><div class="media-credit-container alignnone" data-dcnode-id="1527" style="width: 3416px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245122" data-dcnode-id="1533" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg 3416w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-768x590.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-1024x787.jpg 1024w" height="2626" loading="lazy" sizes="(max-width: 3416px) 100vw, 3416px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3416"><noscript data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245122" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg" alt="Rudolph Valentino facts" width="3416" height="2626" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg 3416w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-768x590.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-1024x787.jpg 1024w" sizes="(max-width: 3416px) 100vw, 3416px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1528"><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1530" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1525" instrument_node="">
</span><h2 data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">22. He Took A Big Career Risk</span></h2><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">Nobody expected Novarro’s next move, and nobody liked it, either. In 1929, Novarro decided he wanted to become an opera singer and went over to Europe to make his debut. </span><strong data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">It ended in disaster</span></strong><span data-dcnode-id="1518" instrument_node="">. For reasons that are lost to history, the debut never happened, and Novarro only had modest success singing in his next films. Sadly, success did not keep coming.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1508" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1509" style="width: 2560px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450087" data-dcnode-id="1515" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-1536x1024.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-2048x1365.jpg 2048w" height="1707" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450087" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-scaled.jpg" alt="Ramon Novarro Facts" width="2560" height="1707" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-1536x1024.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_763776817-2048x1365.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1510"><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1512" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1507" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1506" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF4" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF5"></div><h2 data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">23. He Was Banned From The Screen</span></h2><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1502" instrument_node="">The next years of Novarro’s life are tinged with slight desperation. His work in </span><em data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">The Barbarian</span></em><span data-dcnode-id="1499" instrument_node=""> opposite Myrna Loy was just a re-tread of his earlier hit </span><em data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">The Arab</span></em><span data-dcnode-id="1496" instrument_node="">. Besides that, the film was so seedy and so intent on showing Loy nearly half naked, the censorship boards banned it from release.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">His true career low, however, was up next.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1483" style="width: 1398px"><div class="media-credit-container alignnone" data-dcnode-id="1484" style="width: 1398px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450094" data-dcnode-id="1490" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o.jpg 1398w, https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o-1024x775.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o-768x581.jpg 768w" height="1058" loading="lazy" sizes="(max-width: 1398px) 100vw, 1398px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1398"><noscript data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450094" src="https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o.jpg" alt="Ramon Novarro Facts" width="1398" height="1058" srcset="https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o.jpg 1398w, https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o-1024x775.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/8487717829_b82a7d279c_o-768x581.jpg 768w" sizes="(max-width: 1398px) 100vw, 1398px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1485"><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/53035820%40N02/8487717829"><span data-dcnode-id="1487" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1482" instrument_node="">
</span><h2 data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">24. He Suffered A Brutal Humiliation</span></h2><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1478" instrument_node="">Novarro’s role in </span><em data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Laughing Boy</span></em><span data-dcnode-id="1475" instrument_node=""> was opposite the “Mexican Spitfire” Lupe Velez, but neither actor brought passion to the screen. The fact that the two Mexican stars were playing Navajo people is cringe-worthy in the first place, but critics at the time also took aim at Novarro’s embarrassingly bad wig and aging face. Audiences felt the same, and the film flopped. </span><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">And Novarro’s nightmare was just beginning.</span></strong></p><span data-dcnode-id="1471" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1463" style="width: 771px"><div class="media-credit-container alignnone" data-dcnode-id="1464" style="width: 771px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450095" data-dcnode-id="1470" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer.jpg 771w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer-768x598.jpg 768w" height="600" loading="lazy" sizes="(max-width: 771px) 100vw, 771px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="771"><noscript data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450095" src="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer.jpg" alt="Ramon Novarro Facts" width="771" height="600" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer.jpg 771w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/Ramon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer-768x598.jpg 768w" sizes="(max-width: 771px) 100vw, 771px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1465"><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARamon_Novarro_and_Lupe_Velez_in_Laughing_Boy_trailer.jpg"><span data-dcnode-id="1467" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1462" instrument_node="">
</span><h2 data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">25. The Studio Gave Him An Ultimatum</span></h2><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">A year after </span><em data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Laughing Boy</span></em><span data-dcnode-id="1455" instrument_node=""> made Novarro a laughing stock on the Hollywood scene, his studio pulled him into a meeting he’d never recover from. In 1935, infamous Hollywood “fixer” Eddie Mannix asked to see him, then told Novarro he was washed up, costing the studio money, and that they would pay him $19,000 to break his contract and never return.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Humiliated, Novarro nonetheless accepted, and it was a steep downhill from there.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1442" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1443" style="width: 1000px"><img alt="Katharine Hepburn Facts" class="lazy-hidden size-full wp-image-310729" data-dcnode-id="1449" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-960x634.jpg 960w" height="661" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-310729" src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640.jpg" alt="Katharine Hepburn Facts" width="1000" height="661" srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_280933640-960x634.jpg 960w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1444"><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1446" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1441" instrument_node="">
</span><h2 data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">26. He Came Out In A Tragic Way</span></h2><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">In the wake of all this personal tragedy, Novarro actually moved back in with his huge family in the mansion had bought for them. </span><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">He quickly made himself infamous</span></strong><span data-dcnode-id="1434" instrument_node="">. Film historians think he likely suffered a nervous breakdown around this time—so much so that he brought his current boyfriend with him, exposing his extremely traditional family to his hidden sexuality for the very first time.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1424" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1425" style="width: 2560px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450096" data-dcnode-id="1431" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-1024x784.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-768x588.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-1536x1176.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-2048x1568.jpg 2048w" height="1960" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450096" src="https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-scaled.jpg" alt="Ramon Novarro Facts" width="2560" height="1960" srcset="https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-1024x784.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-768x588.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-1536x1176.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/8666180940_d955c6bf1d_o-2048x1568.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1426"><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/30811353%40N04/8666180940/"><span data-dcnode-id="1428" instrument_node="">Flickr, J Jakobson</span></a></span></div></figure><span data-dcnode-id="1423" instrument_node="">
