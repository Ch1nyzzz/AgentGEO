</span><h2 data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">27. He Lost His Looks</span></h2><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1419" instrument_node="">Ramon Novarro was always a fighter, and after his breakdown, he tried his hardest to make a comeback. Spoiler: It went horrifically. He went to London to perform a stage version of his movie </span><em data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">The Prisoner of Zenda</span></em><span data-dcnode-id="1416" instrument_node="">, but when the crowd glimpsed him, they were shocked to see the former heartthrob had let himself go to seed.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">The once-beautiful idol now carried around a bloated face and wore a corset to hide his growing belly. But oh, it got so much worse.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1403" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1404" style="width: 1024px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450097" data-dcnode-id="1410" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085-300x242.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085-768x619.jpg 768w" height="825" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450097" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085.jpg" alt="Ramon Novarro Facts" width="1024" height="825" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085-300x242.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-3271085-768x619.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1405"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1407" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1402" instrument_node="">
</span><h2 data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">28. Audiences Jeered Him</span></h2><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">It wasn’t just Novarro’s physique that suffered, but also his talent. He could no longer project his voice into the nosebleed seats at the back, and the crowd began to jeer, shouting at him to speak up. </span><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Novarro’s response was brutal. </span></strong><span data-dcnode-id="1395" instrument_node="">He got so upset that he broke character to shout back at them. Unsurprisingly, this move didn’t make the heckling any better.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1385" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1386" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450098" data-dcnode-id="1392" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931-768x591.jpg 768w" height="770" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450098" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931.jpg" alt="Ramon Novarro Facts" width="1000" height="770" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_99439931-768x591.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1387"><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1389" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1384" instrument_node="">
</span><h2 data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">29. He Had Personal Demons</span></h2><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Ramon Novarro’s less-than-camera-ready body wasn’t just the result of a life spent out of the spotlight. It was also a dark symptom of his inner demons. In his years away from Hollywood, his drinking problem had swollen to epic proportions, and he now often drove around bleary-eyed and recklessly. This had devastating consequences.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1370" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1371" style="width: 1280px"><img alt="Bela Lugosi facts" class="lazy-hidden size-full wp-image-350206" data-dcnode-id="1377" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-960x634.jpg 960w" height="847" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350206" src="https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280.jpg" alt="Bela Lugosi facts" width="1280" height="847" srcset="https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/10/whiskey-315178_1280-960x634.jpg 960w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1372"><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1374" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="1369" instrument_node="">
</span><h2 data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">30. He Got Into A Horrible Crash</span></h2><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1365" instrument_node="">In the 1940s and 1950s, Ramon Novarro became notorious with the LAPD for his midnight run-ins with the law, and he got into several car accidents during this time. In one particularly bad crash, the actor even broke his ribs, injured his chest, and lost his driver’s license. </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Yet behind this dangerous behavior was a darker motive.</span></strong></p><span data-dcnode-id="1361" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1353" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1354" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450099" data-dcnode-id="1360" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466-768x538.jpg 768w" height="700" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450099" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466.jpg" alt="Ramon Novarro Facts" width="1000" height="700" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_59715466-768x538.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1355"><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1357" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1352" instrument_node="">
</span><h2 data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">31. He Had A “Sinful” Habit</span></h2><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Starting in the 1950s, Novarro began calling up male sex workers to fulfill his needs, and developed a network of men around Los Angeles. Sadly, though, this habit also fueled his drinking and his driving. Every time he used the “sinful” services, the guilty star would take liquid courage and drive around town before calling the hustlers up, leading to his many infractions. Over the years, Novarro’s mental anguish grew and grew.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1338" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1339" style="width: 1024px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450104" data-dcnode-id="1345" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356-300x245.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356-768x627.jpg 768w" height="836" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450104" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356.jpg" alt="Ramon Novarro Facts" width="1024" height="836" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356-300x245.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-848069356-768x627.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1340"><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1342" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1337" instrument_node="">
</span><h2 data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">32. He Had A Strange Beauty Trick</span></h2><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Ramon Novarro was unusually—and bizarrely—conscious of his image, and some say he went to extreme lengths to maintain his youthful looks. In order to help him achieve a picture-perfect smile, he even used to regularly rub Vaseline over his gums so his lips would always smoothly form a grin. And he had more tricks in his arsenal.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1323" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1324" style="width: 1000px"><img alt="Accidental Discoveries Facts" class="lazy-hidden size-full wp-image-384960" data-dcnode-id="1330" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641-300x184.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641-768x471.jpg 768w" height="613" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-384960" src="https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641.jpg" alt="Accidental Discoveries Facts" width="1000" height="613" srcset="https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641-300x184.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/02/Vaseline_-_TWCMS-G12142_16692709641-768x471.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1325"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AVaseline_-_TWCMS-G12142_%2816692709641%29.jpg"><span data-dcnode-id="1327" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1322" instrument_node="">
</span><h2 data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">33. He Had A Beauty Guru</span></h2><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">In order to slim up and stay in shape, Novarro became a client of Sylvia of Hollywood, an iconic Los Angeles beauty guru who specialized in helping stars shed unwanted pounds. </span><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">But he likely didn’t know what he was getting into</span></strong><span data-dcnode-id="1315" instrument_node="">. Sylvia had notorious methods, and she later confessed that some stars even cried and hid from her stringent exercises. When it came to Novarro, though, she did him even dirtier.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1305" style="width: 5398px"><div class="media-credit-container alignnone" data-dcnode-id="1306" style="width: 5398px"><img alt="Ideas That Backfired facts" class="lazy-hidden size-full wp-image-352242" data-dcnode-id="1312" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735.jpg 5398w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-360x240.jpg 360w" height="3598" loading="lazy" sizes="(max-width: 5398px) 100vw, 5398px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5398"><noscript data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-352242" src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735.jpg" alt="Ideas That Backfired facts" width="5398" height="3598" srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735.jpg 5398w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_197711735-360x240.jpg 360w" sizes="(max-width: 5398px) 100vw, 5398px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1307"><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1309" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1304" instrument_node="">
</span><h2 data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">34. He Was At The Center Of A Strange Rumor</span></h2><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">In her later ghostwritten book</span><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node=""> Hollywood Undressed</span></em><span data-dcnode-id="1297" instrument_node="">, Madame Sylvia spilled all her clients’ secrets, including some of Novarro’s supposed bedroom habits. Sylvia claimed that, a good little Catholic boy until the end, Novarro slept in a coffin that was a “replica of the burial crypt…in the Vatican.” Was this true? Probably not, but the image sure works.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1287" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1288" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450117" data-dcnode-id="1294" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317-300x190.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317-768x485.jpg 768w" height="632" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450117" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317.jpg" alt="Ramon Novarro Facts" width="1000" height="632" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317-300x190.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1179074317-768x485.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1289"><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1291" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1286" instrument_node="">
</span><h2 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">35. He Made A Dark Confession</span></h2><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">In 1962, Ramon Novarro was still up to his old habits and crashed his car while driving around drunk. This time, however, he seemed on the verge of sanity when the officers detained him, and one of the men claimed the actor turned to him and said, “I am old and I just want to die.” Novarro later denied saying any such thing…but he would tragically get his wish.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1272" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1273" style="width: 1000px"><img alt="Airport X-Ray Facts" class="lazy-hidden size-full wp-image-365551" data-dcnode-id="1279" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-360x240.jpg 360w" height="664" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-365551" src="https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128.jpg" alt="Airport X-Ray Facts" width="1000" height="664" srcset="https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/11/shutterstock_88130128-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1274"><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1276" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1271" instrument_node="">
</span><h2 data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">36. He Had An Infamous Home</span></h2><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Shortly after this last run-in, Novarro moved to the now-infamous Laurel Canyon area of Los Angeles. The remote canyon was far away for many stars, but it was especially lonely for a man without a driver’s license or much of a career to speak of. During the final years of his brief life, the former matinee idol spent the little money he had on the services of male escorts.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1257" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1258" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450118" data-dcnode-id="1264" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306-768x512.jpg 768w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450118" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306.jpg" alt="Ramon Novarro Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1054331306-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1259"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1261" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1256" instrument_node="">
</span><h2 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">37. He Had Shady Contacts</span></h2><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">One of Novarro’s favorite “technicians” was a young man named Larry Ortega, a long-time contact who Novarro would often pay with coded checks that referenced “Gardening” or, more pointedly, “Massage.” For a while, Ortega and his larger network kept Novarro satisfied and safe. Until, that is, the fateful day the star was left cold on a bed, choking in his own blood.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1242" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1243" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450119" data-dcnode-id="1249" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598-340x225.jpg 340w" height="665" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450119" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598.jpg" alt="Ramon Novarro Facts" width="1000" height="665" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1688841598-340x225.jpg 340w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1244"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1246" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1241" instrument_node="">
</span><h2 data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">38. He Invited Strangers In</span></h2><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">On the eve of Halloween, 1968, Ramon Novarro received a phone call from a sex worker who claimed he got the star’s number from Larry Ortega and asked Novarro if he wanted his services tonight. Trusting his long-term network, Novarro invited the man over to his home. When two men showed up, brothers by the name of Paul and Tom Ferguson, he invited both in anyway. It would be his doom.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1227" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="1228" style="width: 1920px"><img alt="Hattie McDaniel Facts" class="lazy-hidden size-full wp-image-422770" data-dcnode-id="1234" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-1536x1024.jpg 1536w" height="1280" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-422770" src="https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920.jpg" alt="Hattie McDaniel Facts" width="1920" height="1280" srcset="https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/06/old-phone-4717604_1920-1536x1024.jpg 1536w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1229"><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1231" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="1226" instrument_node="">
</span><h2 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">39. He Had A Type</span></h2><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Ferguson brothers were painfully young. Paul was just 22 and Tom, 17. Even so, Paul had hustled before and was apparently ready to try again. More than that, Paul was classically beautiful; according to later testimony, after inviting them in, Novarro had told the elder brother he could act in movies and possibly rival Burt Lancaster in stardom. Tragically, that wasn’t what Paul was there for.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1212" style="width: 1566px"><div class="media-credit-container alignnone" data-dcnode-id="1213" style="width: 1566px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450120" data-dcnode-id="1219" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920.jpg 1566w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-1024x753.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-768x565.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-1536x1130.jpg 1536w" height="1152" loading="lazy" sizes="(max-width: 1566px) 100vw, 1566px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1566"><noscript data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450120" src="https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920.jpg" alt="Ramon Novarro Facts" width="1566" height="1152" srcset="https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920.jpg 1566w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-1024x753.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-768x565.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/burt-lancaster-394754_1920-1536x1130.jpg 1536w" sizes="(max-width: 1566px) 100vw, 1566px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1214"><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1216" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="1211" instrument_node="">
</span><h2 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">40. His End Is Mysterious</span></h2><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1207" instrument_node="">The next—and final—moments of Ramon Novarro’s life are mysterious even as they are infamous. Both brothers told different stories. According to Paul’s vague and abstract testimony, he fell asleep during their visit, only to awake to Tom informing him Novarro was dead. However, </span><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Tom tells a much more sinister and detailed tale.</span></strong></p><span data-dcnode-id="1203" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1195" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1196" style="width: 1000px"><img alt="Maximilien Robespierre Facts" class="lazy-hidden size-full wp-image-418491" data-dcnode-id="1202" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761-768x512.jpg 768w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-418491" src="https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761.jpg" alt="Maximilien Robespierre Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/06/shutterstock_1497882761-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1197"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1199" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1194" instrument_node="">
</span><h2 data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">41. He Met A Tragic Fate</span></h2><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">According to Tom, he entered the bedroom and saw that Paul had Novarro on the bed. He then watched as his brother bludgeoned Novarro with a prop cane and demanded a large sum of money he thought the star had. By the time Tom went to the bathroom and came back, Novarro’s life had dwindled to nothing. Whatever the truth, Ramon Novarro was dead—but Paul and Tom weren’t finished.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1180" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1181" style="width: 2560px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450122" data-dcnode-id="1187" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-1024x811.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-768x608.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-1536x1216.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-2048x1621.jpg 2048w" height="2027" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450122" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-scaled.jpg" alt="Ramon Novarro Facts" width="2560" height="2027" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-1024x811.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-768x608.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-1536x1216.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-961803676-2048x1621.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1182"><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1184" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1179" instrument_node="">
</span><h2 data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">42. His Attackers Tried To Cover It Up</span></h2><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">After doing the deed, the Ferguson brothers had to cover it up, and they went to great lengths to mask the scent of their trail. Paul and Tom proceeded to make it look like either a </span><em data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">female</span></em><span data-dcnode-id="1172" instrument_node=""> sex worker or Larry Ortega himself had been the one to take Novarro’s life, putting a condom in his hand while also writing Ortega’s name on a bedsheet and in a notepad. Then they got another idea.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1162" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1163" style="width: 1000px"><img alt="Worst Thing Found in Hotel Facts" class="lazy-hidden size-full wp-image-272288" data-dcnode-id="1169" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-272288" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164.jpg" alt="Worst Thing Found in Hotel Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_317160164-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1164"><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1166" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1161" instrument_node="">
</span><h2 data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">43. His Assailants Left A Message</span></h2><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Though few people mention it about the case, the Fergusons made sure to write one chilling message on Novarro’s mirror, a hastily scrawled and grammatically incorrect: “Us girls are better than faggots.” The eerie message was yet another attempt to keep the blame from them and put it onto a woman. Satisfied, they started to leave—but not before dealing Novarro one final indignity.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1147" style="width: 3399px"><div class="media-credit-container alignnone" data-dcnode-id="1148" style="width: 3399px"><img alt="Haunted Objects facts" class="lazy-hidden size-full wp-image-279067" data-dcnode-id="1154" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825.jpg 3399w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825-768x521.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825-1024x694.jpg 1024w" height="2304" loading="lazy" sizes="(max-width: 3399px) 100vw, 3399px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3399"><noscript data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-279067" src="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825.jpg" alt="Haunted Objects facts" width="3399" height="2304" srcset="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825.jpg 3399w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825-768x521.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_546064825-1024x694.jpg 1024w" sizes="(max-width: 3399px) 100vw, 3399px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1149"><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1151" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1146" instrument_node="">
</span><h2 data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">44. His House Was Ransacked</span></h2><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">According to the court records, just before Paul and Tom Ferguson left Novarro’s Laurel Canyon house, they realized their clothes were bloody and that they couldn’t exactly walk out undetected. To clean up, they took clothes from Novarro’s closet, put them on, and dumped their own ruined garments near his property as they left. None of these ploys worked; the authorities quickly caught up with them.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1132" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1133" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450126" data-dcnode-id="1139" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499-768x512.jpg 768w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450126" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499.jpg" alt="Ramon Novarro Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_1060900499-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1134"><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1136" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1131" instrument_node="">
</span><h2 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">45. His Life Was Taken For A Senseless Reason</span></h2><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">As for that stash of money Paul claimed Ramon Novarro had? It was non-existent. Novarro had been spending the remains of his fortune on boys and booze for so long that he didn’t have much else to his name. In the end, the Fergusons left Novarro’s house that night with a measly 20-dollar bill they had found in his housecoat pocket. Justice was around the corner, but only the coroner could help Novarro now.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1117" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1118" style="width: 1000px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450131" data-dcnode-id="1124" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942-300x197.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942-768x503.jpg 768w" height="655" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450131" src="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942.jpg" alt="Ramon Novarro Facts" width="1000" height="655" srcset="https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942.jpg 1000w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942-300x197.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/shutterstock_378595942-768x503.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1119"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1121" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">46. His Final Moments Were Painful</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1112" instrument_node="">By the time the authorities got there, the former star’s body was in bad shape. He had bruises from head to toe, including in sensitive areas, and officers even found his broken tooth lying on the floor. Eventually, they determined his cause of his demise was asphyxiation; after receiving the beating, blood dripped down Novarro’s throat and clogged his airways. </span><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">But this led to the most infamous rumor of all.</span></strong></p><span data-dcnode-id="1108" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1100" style="width: 716px"><div class="media-credit-container alignnone" data-dcnode-id="1101" style="width: 716px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-420418" data-dcnode-id="1107" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Ecco_la_felicità_-_Ramon_Novarro.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Ecco_la_felicità_-_Ramon_Novarro.jpg 716w, https://www.factinate.com/wp-content/uploads/2019/01/Ecco_la_felicità_-_Ramon_Novarro-300x218.jpg 300w" height="520" loading="lazy" sizes="(max-width: 716px) 100vw, 716px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="716"><noscript data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-420418" src="https://www.factinate.com/wp-content/uploads/2019/01/Ecco_la_felicità_-_Ramon_Novarro.jpg" alt="Rudolph Valentino facts" width="716" height="520" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Ecco_la_felicità_-_Ramon_Novarro.jpg 716w, https://www.factinate.com/wp-content/uploads/2019/01/Ecco_la_felicità_-_Ramon_Novarro-300x218.jpg 300w" sizes="(max-width: 716px) 100vw, 716px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1102"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/File%3AEcco_la_felicit%21_-_Ramon_Novarro.jpg"><span data-dcnode-id="1104" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1099" instrument_node="">
</span><h2 data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">47. A Sadistic Rumor Surrounds His End</span></h2><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">For years in Hollywood, whispers persisted that when Ramon Novarro met his ignominious end, he hadn’t choked on his own blood, but on an embarrassing bedroom toy. In </span><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Hollywood Babylon,</span></em><span data-dcnode-id="1092" instrument_node=""> cinema bad boy Kenneth Anger claimed that the Fergusons had stuffed an art deco dildo down Novarro’s throat…and Anger’s juicy accusations don’t stop there.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1082" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1083" style="width: 2560px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450127" data-dcnode-id="1089" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-1024x888.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-768x666.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-1536x1333.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-2048x1777.jpg 2048w" height="2221" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450127" src="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-scaled.jpg" alt="Ramon Novarro Facts" width="2560" height="2221" srcset="https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-1024x888.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-768x666.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-1536x1333.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/10/GettyImages-526854702-2048x1777.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1084"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1086" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1081" instrument_node="">
</span><h2 data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">48. He “Worshipped” Valentino</span></h2><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">According to </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Hollywood Babylon</span></em><span data-dcnode-id="1074" instrument_node="">, the fatal bedroom toy had once belonged to Novarro’s professional nemesis Rudolph Valentino, who had gifted it to the star and engraved the instrument with his initials. Anger even went so far as to claim that Novarro had a shrine to Valentino in his house, and that the toy was the centerpiece of his worship. The truth, however, is much different.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1064" style="width: 1982px"><div class="media-credit-container alignnone" data-dcnode-id="1065" style="width: 1982px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245114" data-dcnode-id="1071" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2.jpg 1982w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2-768x534.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2-1024x712.jpg 1024w" height="1379" loading="lazy" sizes="(max-width: 1982px) 100vw, 1982px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1982"><noscript data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245114" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2.jpg" alt="Rudolph Valentino facts" width="1982" height="1379" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2.jpg 1982w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2-768x534.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-12-2-1024x712.jpg 1024w" sizes="(max-width: 1982px) 100vw, 1982px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1066"><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1068" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1063" instrument_node="">
</span><h2 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">49. His Secret Got Out</span></h2><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1053"><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Hollywood Babylon</span></em><span data-dcnode-id="1057" instrument_node=""> is notoriously inaccurate, and no one on the scene that day remembers anything like what Anger describes. </span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Yet in reality, Novarro’s end was actually more scandalous than this. </span></strong><span data-dcnode-id="1054" instrument_node="">When authorities nabbed both brothers and the case hit the newspapers, Novarro’s sexuality was suddenly on display for the entire world. Not only were his fans heartbroken, but his public image also fell apart instantly. As for that trial itself…</span></p><span data-dcnode-id="1052" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1044" style="width: 768px"><div class="media-credit-container alignnone" data-dcnode-id="1045" style="width: 768px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450128" data-dcnode-id="1051" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/1548697552_8aaf040817_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/1548697552_8aaf040817_o.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/1548697552_8aaf040817_o-300x227.jpg 300w" height="582" loading="lazy" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="768"><noscript data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450128" src="https://www.factinate.com/wp-content/uploads/2020/10/1548697552_8aaf040817_o.jpg" alt="Ramon Novarro Facts" width="768" height="582" srcset="https://www.factinate.com/wp-content/uploads/2020/10/1548697552_8aaf040817_o.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/10/1548697552_8aaf040817_o-300x227.jpg 300w" sizes="(max-width: 768px) 100vw, 768px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1046"><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/tom-margie/1548697552/"><span data-dcnode-id="1048" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1043" instrument_node="">
</span><h2 data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">50. His Fate Is Symbolic</span></h2><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">In many ways, Novarro’s trial was the first chime of the death knell for Old Hollywood. Taking place just weeks before the </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/49-twisted-facts-charles-manson/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1038" instrument_node="">Manson Murders</span></a><span data-dcnode-id="1036" instrument_node="">, it became symbolic of the end of the free love of the 1960s as much as it was the end of Novarro’s carefully constructed private life. Yet in the end, he got justice. The court convicted both brothers, and decades later, Paul finally confessed to the act.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1026" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="1027" style="width: 1920px"><img alt="Lawyers Screwed facts" class="lazy-hidden size-full wp-image-430041" data-dcnode-id="1033" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG.jpg 1920w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-1536x1024.jpg 1536w" height="1280" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-430041" src="https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG.jpg" alt="Lawyers Screwed facts" width="1920" height="1280" srcset="https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG.jpg 1920w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/07/judge-gavel-1461286875UVG-1536x1024.jpg 1536w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1028"><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicdomainpictures.net/"><span data-dcnode-id="1030" instrument_node="">Public Domain Pictures </span></a></span></div></figure><span data-dcnode-id="1025" instrument_node="">
</span><h2 data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">51. He Is Unforgettable</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Ramon Novarro’s tragic tale—a matinee idol with a ruinous secret, a macabre end on the eve of Halloween, a symbolic trial heralding the end of Hollywood—has fascinated writers for decades, from Joan Didion to Charles Bukowski. Yet despite the violent “Bloody Wednesday” that ended his life, Novarro’s film work continues to speak for itself. Rest in peace, Ramon Novarro.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1011" style="width: 700px"><div class="media-credit-container alignnone" data-dcnode-id="1012" style="width: 700px"><img alt="Ramon Novarro Facts" class="lazy-hidden size-full wp-image-450129" data-dcnode-id="1018" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/10/Mata_Hari_1931_film_promo.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/10/Mata_Hari_1931_film_promo.jpg 700w, https://www.factinate.com/wp-content/uploads/2020/10/Mata_Hari_1931_film_promo-300x227.jpg 300w" height="530" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="700"><noscript data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-450129" src="https://www.factinate.com/wp-content/uploads/2020/10/Mata_Hari_1931_film_promo.jpg" alt="Ramon Novarro Facts" width="700" height="530" srcset="https://www.factinate.com/wp-content/uploads/2020/10/Mata_Hari_1931_film_promo.jpg 700w, https://www.factinate.com/wp-content/uploads/2020/10/Mata_Hari_1931_film_promo-300x227.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1013"><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMata_Hari_1931_film_promo.jpg"><span data-dcnode-id="1015" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1010" instrument_node="">
