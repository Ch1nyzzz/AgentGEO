</span><span class="readable" data-dcnode-id="3996" id="reviewTextContainer72122554"><span data-dcnode-id="4021" instrument_node="">
</span><span data-dcnode-id="4016" id="freeTextContainer13748855198133401221"><span data-dcnode-id="4020" instrument_node="">I have a bias against older nonfiction books as I don't think they age well. The evidence gets old, the arguments get settled or the style becomes out-dated and the read just isn't the same. Well, Frederick Allen Lewis sure showed me up. He wrote Only Yesterday in 1931 and it read like it was written last year. </span><br data-dcnode-id="4019"><br data-dcnode-id="4018"><span data-dcnode-id="4017" instrument_node="">Lewis was an editor at the Atlantic and I wonder if his style has influenced later writers there. He is crisp, funny and has a strong point of view throughout. I loved his description of </span></span><span data-dcnode-id="4015" instrument_node="">
</span><span data-dcnode-id="4001" id="freeText13748855198133401221" style="display:none"><span data-dcnode-id="4014" instrument_node="">I have a bias against older nonfiction books as I don't think they age well. The evidence gets old, the arguments get settled or the style becomes out-dated and the read just isn't the same. Well, Frederick Allen Lewis sure showed me up. He wrote Only Yesterday in 1931 and it read like it was written last year. </span><br data-dcnode-id="4013"><br data-dcnode-id="4012"><span data-dcnode-id="4011" instrument_node="">Lewis was an editor at the Atlantic and I wonder if his style has influenced later writers there. He is crisp, funny and has a strong point of view throughout. I loved his description of the motivations of Klan members:</span><br data-dcnode-id="4010"><br data-dcnode-id="4009"><span data-dcnode-id="4008" instrument_node="">"...but it white robe and hood, its flaming cross, its secrecy, and the preposterous vocabulary of it ritual could be made the vehicle for all that infantile love of hocus-pocus and mummery, that lust for secret adventure, which survives in the adult whose lot is cast in drab places. Here was a chance to dress up the village bigot and let him be a Knight of the Invisible Empire."</span><br data-dcnode-id="4007"><br data-dcnode-id="4006"><span data-dcnode-id="4005" instrument_node="">It doesn't hurt that the subjects feel particularly relevant today. Lewis covers racism, populism, and the infatuation with celebrity, sports, and trifling events, at the expense of vital issues. He describes the madness of the stock bubble and the shouting down of anyone who call into question the riches to be made. He also looks at the cult of business (the business of America is business, and all that) and at the how religion and business began to use each other's language. He describes a very popular book called the Man Nobody Knows which argued that Jesus was the founder of modern business thanks to his executive experience and his skills at advertising.</span><br data-dcnode-id="4004"><br data-dcnode-id="4003"><span data-dcnode-id="4002" instrument_node="">Reading this book, I was both happy and sad to see that we as a society have many of the same problems. On the downside, there are many problems that we have failed to conquer for so long. On the plus side, our time is not a uniquely debased one.</span></span><span data-dcnode-id="4000" instrument_node="">

</span><span data-dcnode-id="3904" id="freeTextContainer4340123793006229637"><blockquote data-dcnode-id="3905"><b data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">The nation was spiritually tired. Wearied by the excitements of the war and nervous tension of the Big Red Scare, they hoped for quiet and healing. Sick of Wilson and his talk of America’s duty to humanity, callous to political idealism, they hoped for a chance to pursue their private affairs without government interference and to forget about public affairs. There might be no such word in the dictionary as normalcy, but normalcy was what they wanted.</span></b><br data-dcnode-id="3909"><i data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Only Yesterday</span></i><span data-dcnode-id="3906" instrument_node=""> by Frederick Lewis Allen (Page</span></blockquote></span><span data-dcnode-id="3903" instrument_node="">
</span><span data-dcnode-id="3823" id="freeText4340123793006229637" style="display:none"><blockquote data-dcnode-id="3896"><b data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">The nation was spiritually tired. Wearied by the excitements of the war and nervous tension of the Big Red Scare, they hoped for quiet and healing. Sick of Wilson and his talk of America’s duty to humanity, callous to political idealism, they hoped for a chance to pursue their private affairs without government interference and to forget about public affairs. There might be no such word in the dictionary as normalcy, but normalcy was what they wanted.</span></b><br data-dcnode-id="3900"><i data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Only Yesterday</span></i><span data-dcnode-id="3897" instrument_node=""> by Frederick Lewis Allen (Page 99)</span></blockquote><br data-dcnode-id="3895"><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">The subtitle on my edition of this book is “An Informal History of the 1920s”. That seems an apt description in that the history is told in a casual as opposed to an analytical style—almost conversational. The author states in the preface that the audience for this book, which was published in 1931, less than 2 years after the Great Stock Market Crash, is for people who likely will remember the events reported.</span><br data-dcnode-id="3892"><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node="">People were tired of the sacrifices they had to make during the war and the hate engendered by that and the fear of Bolshevism. The country would go through a period of restlessness, but was learning how to relax and have fun. There were changes in women’s fashion, automobiles gave people more freedom, the radio became popular, and it became fashionable to drink, smoke, swear and talk openly about sex in public.</span><br data-dcnode-id="3889"><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">The first half of this book covers the social patterns of the country during this time. The Harding scandals are dealt with, and the Coolidge era of prosperity is described. The fascination by the public with “tremendous trifles” such as a heavyweight boxing match, or a murder trial, a new card game, crossword puzzles, the Scopes monkey trial, or the grand prize, a transatlantic flight by Charles Lindbergh.</span><br data-dcnode-id="3886"><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">There is an interesting chapter titled “The Revolt of the Highbrows” which describes a generation of intellectuals. These intellectuals decried the </span><i data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">“emotional and aesthetic starvation of American life.”</span></i><span data-dcnode-id="3881" instrument_node=""> (Page 177) They endorsed the views expressed by Sinclair Lewis in his novels </span><i data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Main Street</span></i><span data-dcnode-id="3878" instrument_node=""> and </span><i data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Babbitt</span></i><span data-dcnode-id="3875" instrument_node="">. In these two volumes </span><i data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">“Lewis revealed the ugliness of the American small town, the cultural poverty of its life, the tyranny of its mass prejudices, and the blatant vulgarity and insularity of the booster.”</span></i><span data-dcnode-id="3872" instrument_node=""> (Page 178) Also in this chapter H. L. Mencken is introduced, who is called the keynoter of this revolt.</span><br data-dcnode-id="3871"><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node="">After this chapter the author turns to some of the more serious issues of the decade. I had previously read </span><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/4336566835" rel="nofollow noopener"><span data-dcnode-id="3868" instrument_node="">Last Call: The Rise and Fall of Prohibition</span></a><span data-dcnode-id="3866" instrument_node=""> by Daniel Okrent and that book gives a better history of Prohibition. In this book Prohibition is dealt with lightly and then turns to Al Capone and the criminal element spawned by Prohibition.</span><br data-dcnode-id="3865"><br data-dcnode-id="3864"><span data-dcnode-id="3863" instrument_node="">The Florida land boom which is a harbinger of the speculative nature of Americans seeking a get-rich-quick plan is described. Here glowing descriptions of the tropical paradise in Florida saw people buying up land with the hope of selling it later and making a profit. However, they were taught a lesson that </span><i data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">“a scheme of land values based upon grandiose plans, preposterous expectations, and hot air”</span></i><span data-dcnode-id="3860" instrument_node=""> (Page 218) would eventually crash taking their profits with it. The impact of two hurricanes blew away any other pretensions of Florida being a tropical, get-rich-quick paradise.</span><br data-dcnode-id="3859"><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">The most memorable image of the 1920s is of the Stock Market Crash of 1929. The Coolidge-Hoover Prosperity was a state of mind rather than an economic condition. A speculative fever was fed by the actions of many investors seemingly making huge profits on stock market gains. Government officials and other economic experts continued to praise the economy. And prices just continued to rise. A boundless romanticism was the result of years of the Coolidge Prosperity. The public watched as record after record was squashed by the continued rise in stock prices. Each time forecasters predicted a fall, the market continued to rise. President Hoover himself stated that he saw the end to poverty. </span><br data-dcnode-id="3856"><br data-dcnode-id="3855"><span data-dcnode-id="3854" instrument_node="">These last two chapters were the best of this book. An earlier book that I read </span><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/4477843796" rel="nofollow noopener"><span data-dcnode-id="3853" instrument_node="">The Great Crash of 1929</span></a><span data-dcnode-id="3851" instrument_node=""> by John Kenneth Galbraith cites this book as one of its sources and is quoted widely. The description of the crash is told in a dramatic fashion. </span><i data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">“The Big Bull Market was dead. Billions of dollars’ worth of profits—and paper profits— had disappeared.”</span></i><span data-dcnode-id="3848" instrument_node=""> (Page 262).</span><br data-dcnode-id="3847"><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node="">As the 1930s began it was apparent that a major depression was on its way. </span><br data-dcnode-id="3844"><br data-dcnode-id="3843"><blockquote data-dcnode-id="3839"><i data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">“[T]here was a general sense that something had gone wrong with individualistic capitalism and must be set right—how could it be otherwise, with the existing system dragging millions of families down toward hunger and want?”</span></i><span data-dcnode-id="3840" instrument_node=""> (Page 276)</span></blockquote><br data-dcnode-id="3838"><br data-dcnode-id="3837"><span data-dcnode-id="3836" instrument_node="">President Hoover who had administered relief to Belgium after the war proved unable to administer relief to Americans falling into poverty. But this was a different problem. A major change in the national economy along with the drop in prices and production signaled an end to a chapter of American economic history. The author states that Hoover’s greatest mistake had been getting elected in 1928.</span><br data-dcnode-id="3835"><br data-dcnode-id="3834"><blockquote data-dcnode-id="3830"><i data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">“The Post-war Decade had come to its close An era had ended.”</span></i><span data-dcnode-id="3831" instrument_node=""> (Page 263)</span></blockquote><br data-dcnode-id="3829"><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">This is a great history of a fascinating decade. With Prohibition, the stock market speculation and crash, and the change in the social behavior that was notable in this period, the 1920s were an interesting time in American History.</span><br data-dcnode-id="3826"><br data-dcnode-id="3825"><span data-dcnode-id="3824" instrument_node="">Now onto FDR and the New Deal.</span></span><span data-dcnode-id="3822" instrument_node="">

</span><span data-dcnode-id="3732" id="freeTextContainer947204109758399005"><span data-dcnode-id="3733" instrument_node="">A very thorough review of the very turbulent decade of the 1920s. As James Howard Kunstler said in a recent podcast (probably quoting somebody else), "History doesn't repeat itself, but it rhymes." We find a lot of "rhyming' with recent years in the story of the 1920s: starting the decade with a blind faith in the power of capital, and attacking those who question the irrational exuberance of the dedication to material gain; the rise of sports and entertainment as dominant forces in American cul</span></span><span data-dcnode-id="3731" instrument_node="">
</span><span data-dcnode-id="3723" id="freeText947204109758399005" style="display:none"><span data-dcnode-id="3730" instrument_node="">A very thorough review of the very turbulent decade of the 1920s. As James Howard Kunstler said in a recent podcast (probably quoting somebody else), "History doesn't repeat itself, but it rhymes." We find a lot of "rhyming' with recent years in the story of the 1920s: starting the decade with a blind faith in the power of capital, and attacking those who question the irrational exuberance of the dedication to material gain; the rise of sports and entertainment as dominant forces in American culture; the failure of Prohibition, and the rise of organized crime as a result; and the naivete of those who expected "prosperity" to continue forever. (Republicans never change, do they?) Many more comparisons can be found in the text.</span><br data-dcnode-id="3729"><br data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">Overall a very interesting observation of the USA of the time, from politics to culture, and everyday life. I'll be reading (or listening to) the sequel ("Since Yesterday") sometime soon.</span><br data-dcnode-id="3726"><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node=""> </span></span><span data-dcnode-id="3722" instrument_node="">

</span><span data-dcnode-id="3638" id="freeText3584379816125172588" style="display:none"><span data-dcnode-id="3639" instrument_node="">This is a very interesting little book which touches on the memorable (and not so memorable) events of the Roaring 20's. The author covers most of the things that history lovers already know but adds his own thoughts which makes old material new again. Since it was written in the 1930's, there are some events that have been interpreted a little differently in the present day. An example is the positive light thrown on the Coolidge presidency and the blaming of the great depression solely on President Hoover. Time has shown that this is not exactly the way it was but that just makes the information more interesting. His analysis of the stock market crash is very well done and understandable even to the reader who knows little about how that system works. Enjoyable and recommended.</span></span><span data-dcnode-id="3637" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3457" title="it was ok"><span class="staticStar p10" data-dcnode-id="3462" size="15x15"><span data-dcnode-id="3463" instrument_node="">it was ok</span></span><span class="staticStar p10" data-dcnode-id="3461" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3460" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3459" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3458" size="15x15"></span></span><span data-dcnode-id="3456" instrument_node="">

</span><span class="readable" data-dcnode-id="3406" id="reviewTextContainer3066084780"><span data-dcnode-id="3452" instrument_node="">
</span><span data-dcnode-id="3450" id="freeTextContainer2817910603128198605"><span data-dcnode-id="3451" instrument_node="">Much modern popular history is mendacious, written with an ideological agenda that deliberately distorts, or omits, or simply lies about, the truth. Sometimes, therefore, reading history written in the past can offer better information. Earlier historians were often more objective, ideology being less prevalent. Their biases, if they have any, are usually obvious. Thus I thought that "Only Yesterday," a semi-famous history of the 1920s, published in 1931 by a mass-market journalist/intellectual </span></span><span data-dcnode-id="3449" instrument_node="">
</span><span data-dcnode-id="3411" id="freeText2817910603128198605" style="display:none"><span data-dcnode-id="3448" instrument_node="">Much modern popular history is mendacious, written with an ideological agenda that deliberately distorts, or omits, or simply lies about, the truth. Sometimes, therefore, reading history written in the past can offer better information. Earlier historians were often more objective, ideology being less prevalent. Their biases, if they have any, are usually obvious. Thus I thought that "Only Yesterday," a semi-famous history of the 1920s, published in 1931 by a mass-market journalist/intellectual of the time, Frederick Lewis Allen, might teach me something new about that decade. But I found, to my sorrow, that I learned little new, and I was instead again reminded of how early the rot in America’s ruling classes set in.</span><br data-dcnode-id="3447"><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">In today’s common imagination, the 1920s are the “Roaring Twenties”—an economic boom combined with a new focus on the freedom to do as one pleased (even if Prohibition was the law of the land). The HBO series "Boardwalk Empire" gives a flavor of the times—or at least reflects the common imagination. Only Yesterday contains nothing that is not precisely in-line with today’s common imagination about the decade, which suggests one of two things. Either today’s common imagination correctly reflects the reality of the 1920s—or today’s common imagination was shaped by men like Allen, with their own agenda, and does not fully reflect reality.</span><br data-dcnode-id="3444"><br data-dcnode-id="3443"><span data-dcnode-id="3442" instrument_node="">After reading this book, I conclude the latter seems more likely. It would appear that since all his readers lived through the period he covers, Allen could not distort history. Up to a point, that’s true, since he couldn’t simply lie like many modern historians do. But Allen still distorts, because he is preaching to the choir—he is writing to people like him, members of the 1920s professional-managerial elite, sympathetic to the Progressives and Woodrow Wilson, violently opposed to Calvin Coolidge, and eager to find and support a candidate like Franklin Roosevelt, although he is nowhere mentioned in this book. Allen’s main air is one of supercilious superiority; he knows what is good for the country, and he is pleased to be able to report that the benighted masses are generally getting with the program advocated by their betters. He reports the 1920s through this lens, not objectively. And that his book has been used for decades in schools and colleges reinforces my conclusion that our image of the 1920s, in particular that it was a decade of moral progress, rather than moral decay, arises from this book and the ideology its author pushes.</span><br data-dcnode-id="3441"><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">Allen begins with a great deal of detail about Wilson’s attempts to force America to join the League of Nations. Using a combination of over-the-top language about the utopia the League would bring and what he knew to be falsehoods about the League’s origin and purpose, Wilson, the first ideological President, desperately tried to get America to take the medicine he was sure would be good for it. “He warned his audiences that if the Treaty were not ratified, disorder would shake the foundations of the world, and he envisioned ‘those heights upon which there rests nothing but the pure light of the justice of God.’ ” But America, we know, was not interested, something Allen attributes mostly to a lack of “idealism” and a desire to return to “normalcy,” along with a variety of special interests, not to simply a clear-eyed rejection of what Wilson had to offer. Wilson failed, as we also know.</span><br data-dcnode-id="3438"><br data-dcnode-id="3437"><span data-dcnode-id="3436" instrument_node="">In the next section, Allen’s prejudices really begin to show. He sneers at length at “The Big Red Scare.” I don’t know how significant the Communist threat in America was in 1919 and 1920. Certainly, there were many militants demanding Communism and anarchism, and the war atmosphere, combined with the Bolshevik victory in Russia and numerous bombings of public places in America killing hundreds of people (with an impact on society like September 11th on us), certainly led many to rationally believe that Communism was a real present threat to America. That it didn’t turn out to be a problem in the end does not prove that it was not a problem at the time. Communists certainly were a huge problem later, in the 1940s and 1950s, when circumstances were more favorable to Communist traitors and to Communist power gains. Not to mention that the crackdown on Communists in 1919 may have prevented it being a bigger problem in 1921.</span><br data-dcnode-id="3435"><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">Allen’s claim, though, is that the public was stupid, the “Red Scare” was a chimera put out by the Attorney General, Mitchell Palmer, for no good reason while Wilson was incapacitated and unable to stop him, and there was zero basis for concern. Allen, who has nothing to say about the massive suspensions of civil liberties by Wilson and the federal government during World War I, nor about the hundreds of African Americans killed in race pogroms at the exact same time as the so-called Red Scare in places like Tulsa, claims that this period was “in a very literal sense, a reign of terror,” even though no Communist was harmed or killed (except a few executed for proven crimes) and within a few months they could stop even looking over their shoulders. The reader concludes that suppression of the Left is Allen’s only concern, and that suggests that he’s simply protecting his own kind and enlarging their freedom for future operation.</span><br data-dcnode-id="3432"><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node="">That said, it’s certainly possible Allen is objectively describing the ideological oppression that he says briefly swept over the country for a few months. Students and businessmen, he says, were only able to state their real opinions in whispers; schoolteachers were made to sign ideological commitments; college professors were dismissed for wrongthink; the media spread historical propaganda; and much more along the same lines. All of it is very familiar, because it is precisely the treatment conservatives suffer under in America today, under constant vicious attack by the woke Left that controls all the levers of power. In 1919, though, things quickly returned to normal, whereas our current Scare isn’t a scare at all, but a deliberate attempt to exercise total ideological dominance and total power. That’s why today’s atmosphere of Left terror has lasted for years, not months, is accelerating, not slowing, and is very unlikely to stop unless it is stopped by force.</span><br data-dcnode-id="3429"><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">This is also the chapter in which we are introduced to Calvin Coolidge, not by name, but as the Governor of Massachusetts, “an inconspicuous, sour-faced man with a reputation for saying as little as possible and never jeopardizing his political position by being betrayed into a false move.” Allen’s treatment of Coolidge, the substance of whose Presidency he barely mentions, further betrays his bias in favor of the Left. Coolidge’s "Autobiography" is “smug”; in all his writings and speeches “the most original thing you will find in them is his uncompromising unoriginality.” For no given reason at all, Allen claims “his presidential record was surprisingly negative.” He was “uninspired and unheroic”—Allen wants, obviously, the so-called inspiration and heroism that the Progressives and other men of the Left foisted on America.</span><br data-dcnode-id="3426"><br data-dcnode-id="3425"><span data-dcnode-id="3424" instrument_node="">As to the common people, Allen complains that in the 1920s “public spirit,” that is, eagerness for Left nostrums, “was at low ebb.” Instead, Americans filled up their time with becoming excited about boxing matches and local crimes given national attention, sniffs Allen, along with crosswords and mah-jongg. Allen is glad that at least religiosity declined, accelerated by the appearance of the prosperity gospel and by propaganda pushing science as exalting itself over religion. But what makes up for it in Allen’s eyes is “The Revolution in Manner and Morals” and its effect on the common people, both of which he celebrates, not analyzes. (And revolution was no doubt what it was, although nothing compared to what the Baby Boomers managed to bequeath to us since the late 1960s.) Allen attributes the new moral laxity to many factors: the war, the “growing independence of the American woman,” arising from labor-saving housekeeping devices and an increased ability to be employed outside the home; Freudianism; automobiles; Prohibition; and mass media, especially movies and the new risqué magazines. Slickly, he deliberately confuses new hairstyles and clothing with substantive changes in morals, a motte-and-bailey technique allowing him to respond to any criticism of the corrosive social effect of lax sexual morality with a snippy comment about rubes who think that hairstyles have a moral component.</span><br data-dcnode-id="3423"><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">What is very evident is that in every area, the ruling classes set new low standards permitting and encouraging hugely increased moral laxity, which quickly filtered down to the lower orders. Among the “prosperous classes,” “It was better to be modern, —everybody wanted to be modern, —and sophisticated, and smart, to smash the conventions and to be devastatingly frank.” Allen loves all of the resulting moral laxity spreading through the country. Obscene material is, righteously, “upheld by a liberal judge and endorsed by intelligent public opinion.” Those trying to maintain the rules on obscenity found “the intellectuals of the whole country were laughing at them. . . . [T]he taste of the country demanded a new sort of reading matter.” That is, for Allen, the “taste of the country” is really the “taste of the left-wing intellectuals.” He even has a whole chapter celebrating left-wing intellectuals, whom he calls “highbrows,” such as Sinclair Lewis (and also H. L. Mencken, not strictly speaking left-wing but just as corrosive), and magazines like the "American Mercury" (where the odious Albert Jay Nock got his start). This is contrasted with the “hinterlands [where] there was still plenty of old-fashioned sentimental thinking about sex,” leading to “frantic efforts to stay the tide of moral change” by people unable to “all at once forget the admonitions of their childhood.” Sure, Allen says, this laxity led to some temporary bad manners, but was all to the good with a few years of practice in the new laxity.</span><br data-dcnode-id="3420"><br data-dcnode-id="3419"><span data-dcnode-id="3418" instrument_node="">The masses experienced, despite Prohibition, a great deal of new freedom, the release from old moral codes and expectations, and for Allen, this is all to the good, as long as they keep the right people in charge. Not necessarily in charge of the government—the federal government did not have the powers it does now, and its only real relevancy was in foreign affairs and, as the Progressive agenda of hugely expanding federal power began its first major project, Prohibition. Rather, in charge of society at every level.</span><br data-dcnode-id="3417"><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">Allen covers Prohibition and the resulting big-city crime, especially Al Capone. He admits Prohibition sharply reduced alcohol consumption, and resultant pathologies, among the common people, but “among the prosperous classes which set the standards of national social behavior, alcohol flowed more freely than ever.” In other words, the rotten ruling classes of the 1920s were responsible for the ills of Prohibition, too. When Allen wrote this book, Prohibition was still in effect, so there is no resolution, just lots of text about the social ills resulting. Other chapters cover land speculation boom and bust in Florida, and, for the last third of the book, the run-up in the stock market and the subsequent crash, in more detail than is really interesting.</span><br data-dcnode-id="3414"><br data-dcnode-id="3413"><span data-dcnode-id="3412" instrument_node="">At the end, the modern reader has learned nothing new about the 1920s, and as I have shown, has good reason to suspect he has been led by the nose down the ideological garden path. Like so much else used in the educational system today, this book is still force-fed to present-day students because it is useful as propaganda to advance the indoctrination of the Left. I suspect that there exist now-obscure works that portray an entirely different picture of the 1920s. Find those books, and give them to your children, not this toxic mush.</span></span><span data-dcnode-id="3410" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/10770371-dan%3Fshelf%3D5-star-history-and-non-fiction"><span data-dcnode-id="3160" instrument_node="">5-star-history-and-non-fiction</span></a><span data-dcnode-id="3158" instrument_node="">

</span><span data-dcnode-id="3144" id="freeTextContainer4495637590968600999"><span data-dcnode-id="3151" instrument_node="">Only Yesterday by Frederick Lewis Allen</span><br data-dcnode-id="3150"><br data-dcnode-id="3149"><span data-dcnode-id="3148" instrument_node="">A near-contemporaneous and well written narrative of the 1920’s that still feels fresh today. Allen has a gift for story telling. Within the fourteen distinct chapters here there are a lot of interesting details that I learned. Most of the book is geared towards American attitudes in the big cities as there isn’t much coverage on rural areas. I guess we have to look to Sinclair Lewis and others for that main street perspective. </span><br data-dcnode-id="3147"><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node="">This is not an excessively li</span></span><span data-dcnode-id="3143" instrument_node="">
</span><span data-dcnode-id="3006" id="freeText4495637590968600999" style="display:none"><span data-dcnode-id="3142" instrument_node="">Only Yesterday by Frederick Lewis Allen</span><br data-dcnode-id="3141"><br data-dcnode-id="3140"><span data-dcnode-id="3139" instrument_node="">A near-contemporaneous and well written narrative of the 1920’s that still feels fresh today. Allen has a gift for story telling. Within the fourteen distinct chapters here there are a lot of interesting details that I learned. Most of the book is geared towards American attitudes in the big cities as there isn’t much coverage on rural areas. I guess we have to look to Sinclair Lewis and others for that main street perspective. </span><br data-dcnode-id="3138"><br data-dcnode-id="3137"><span data-dcnode-id="3136" instrument_node="">This is not an excessively liberal interpretation of history like Howard Zinn’s ‘A People’s History of the United States’. But there are some parallels and common sympathies for the average Joe. This book is focused on a smaller number of years and at 300 pages is not a lengthy read which made it more of an enjoyable read for me than Zinn’s bible. </span><br data-dcnode-id="3135"><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">Here are some notes on interesting facts and some of the chapters that I enjoyed most. </span><br data-dcnode-id="3132"><br data-dcnode-id="3131"><b data-dcnode-id="3127"><span data-dcnode-id="3130" instrument_node=""> </span><i data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">The Big Red Scare </span></i></b><br data-dcnode-id="3126"><br data-dcnode-id="3125"><span data-dcnode-id="3124" instrument_node="">Aggressive and extra-judicial actions were taken by local officials in fear of Communist bogeymen. This paranoia was fueled by U.S. Attorney General Palmer who began targeting Reds in 1919. One such outcome was</span><br data-dcnode-id="3123"><br data-dcnode-id="3122"><span data-dcnode-id="3121" instrument_node=""> </span><b data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node=""> In Hartford, while the suspects were in jail the authorities took the further precaution of arresting and incarcerating all visitors who came to see them, a friendly call being regarded as prima facie evidence of affiliation with the Communist party.</span></b><br data-dcnode-id="3118"><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">Repression of free speech came from many of the same hate groups who targeted socialists and communists. These groups perverted their cause further by going after minorities, Jews and Catholics. In Chicago there was the case of a black boy who drowned after being stoned by a mob for swimming into an area near a ‘whites only’ beach. Dozens of riots followed in Chicago and hundreds lost their lives. In Tulsa the Wall Street Massacre of black Americans occurred largely because others were viewed as a threat to the white establishment. Elsewhere Jews were targeted by none other than Henry Ford - the most visible (or perhaps the wealthiest) anti-Semite in America. Not surprisingly KKK enrollment soared during this period. </span><br data-dcnode-id="3115"><br data-dcnode-id="3114"><b data-dcnode-id="3110"><span data-dcnode-id="3113" instrument_node=""> </span><i data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">The Revolution in Manners and Morals</span></i></b><br data-dcnode-id="3109"><br data-dcnode-id="3108"><span data-dcnode-id="3107" instrument_node="">In this interesting chapter we unsurprisingly learn that the dress code and mores of young people were rapidly changing following the Great War … </span><br data-dcnode-id="3106"><br data-dcnode-id="3105"><b data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node=""> In July, 1920, a fashion-writer reported in the New York Times that “the American woman has lifted her skirts far beyond any modest limitation,” which was another way of saying that the hem line was now all of nine inches above the ground. It was freely predicted that skirts would come down again in the winter but instead they climbed a few scandalous inches further.</span></b><br data-dcnode-id="3102"><br data-dcnode-id="3101"><span data-dcnode-id="3100" instrument_node="">and by 1927 skirt lines were above the knee </span><br data-dcnode-id="3099"><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node=""> </span><b data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node=""> Supposedly nice girls were smoking cigarettes … It was not until F. Scott Fitzgerald, who had hardly graduated from Princeton and ought to know what his generation was doing, brought out This Side of Paradise in April 1920 that fathers and mothers realized what was afoot and how long it had been going on. </span></b><br data-dcnode-id="3094"><br data-dcnode-id="3093"><span data-dcnode-id="3092" instrument_node="">But why had this revolution come about? </span><br data-dcnode-id="3091"><br data-dcnode-id="3090"><b data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node=""> First of all was the state of mind brought about by the war and its conclusion. A whole generation has been infected by the eat-drink-and-be-merry-for-tomorrow-we-die spirit which accompanied the departure of the soldiers to the training camps and the fighting front. There had been an epidemic not only of abrupt war marriages, but of less conventional liaisons.</span></b><br data-dcnode-id="3087"><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">One American nurse who came back from the front in Europe said in 1920 to an Atlantic Monthly reporter </span><b data-dcnode-id="3080"><span data-dcnode-id="3084" instrument_node=""> </span><br data-dcnode-id="3083"><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">“The older generation pretty much ruined this world before passing it on to us. They give us this thing, knocked to pieces, leaky, red-hot, threatening to blow up; and then they are surprised that we don’t accept it with the same attitude of pretty, decorous enthusiasm with which they received it, way back in the eighties [1880s]”</span></b><br data-dcnode-id="3079"><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">Women had recently gained the right to vote and there more economic opportunities opening to them. Freud and European views on sex were becoming more popular. Practical hairdos like bobs were popular and cosmetic sales exploded. Men and women now drank together. Contraceptives were now popular. Surveys indicated that half of high school kids were engaging in sex of one degree or another. These factors led to liberation. </span><br data-dcnode-id="3076"><br data-dcnode-id="3075"><span data-dcnode-id="3074" instrument_node=""> </span><b data-dcnode-id="3070"><span data-dcnode-id="3073" instrument_node=""> </span><i data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Harding and the Scandals</span></i></b><br data-dcnode-id="3069"><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">In this chapter Allen seems to have a clear eyed view of Harding. Over the years after Harding’s death we see the drip-by-drip release of scandalous news. Early on there was a lot of historical whitewashing of Harding’s image. </span><br data-dcnode-id="3066"><br data-dcnode-id="3065"><b data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node=""> Warren Harding had two great assets, and these were already apparent. First he looked as a President of the United States should. He was superbly handsome …. And he was the friendliest man who ever entered the White House. He seemed to like everybody, he wanted to do favors for everybody, he wanted to make everybody happy …. His liabilities were not at first so apparent, yet they were disastrously real. Beyond the limited scope of his political experience he was almost unbelievably ill informed … If he had been discriminating in the choice of his friends and advisors, all might have been well … Nor did Harding appear to be able to distinguish between honesty and rascality … And why did he choose such company? The truth was that under his imposing exterior he was just a common small-town man.</span></b><br data-dcnode-id="3062"><br data-dcnode-id="3061"><span data-dcnode-id="3060" instrument_node="">Allen touches on the Teapot Dome scandal, the corruption of the Veteran’s bureau,one administration official committed suicide rather than testifying before Congress, the affair and the love child. But most American’s didn’t care at the time during this era of prosperity. In fact most condemnation was directed towards those Senators who were uncovering the scandals. Over time the senators and other Harding detractors would be vindicated but it took until the 1930’s for Harding’s image to be entirely ruined. </span><br data-dcnode-id="3059"><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">In the next chapters Allen covers the radio era, the expansion of the auto industry and Ford in particular. During this post war period America becomes the financier to the world. This led, in part, to the Stock Market Crash and subsequent Depression. On the Coolidge chapter we learn that Coolidge never made any effort to “persuade the American people that they were not happily isolated from the outside world.” Coolidge was the right president for America of the late 1800’s but not the 1920’s. He was principled and frugal but he never seriously contemplated the complexities of a global economy.</span><br data-dcnode-id="3056"><br data-dcnode-id="3055"><span data-dcnode-id="3054" instrument_node="">Allen discusses horse racing, boxing, the mah-jong craze, the Lindbergh flight and the Scopes Monkey Trial in a chapter entitled the Ballyhoo Years. There was a detailed assessment of H.L. Mencken. Mencken was an American critic who wrote of the insane excesses of the period and the harbinger of the Great Depression. </span><br data-dcnode-id="3053"><br data-dcnode-id="3052"><b data-dcnode-id="3048"><span data-dcnode-id="3051" instrument_node=""> </span><i data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Alcohol and Al Capone </span></i></b><br data-dcnode-id="3047"><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">In this chapter, Allen focuses on Chicago. </span><br data-dcnode-id="3044"><br data-dcnode-id="3043"><b data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Nothing in recent American history is more extraordinary, as one looks back from the nineteen-thirties, than the ease with which - after generations of uphill fighting by the drys - prohibition was finally written upon the statute-books. The country accepted it not only willingly, but almost absent-mindedly. </span></b><br data-dcnode-id="3040"><br data-dcnode-id="3039"><span data-dcnode-id="3038" instrument_node="">After the Volstead Act was passed and Prohibition was enacted, it was clear that enforcement was hopeless in such a large country with porous borders and so many legal variants of near liquor that could be modified into outlaw liquor. Allen suggests that within months of the new law that Capone’s boss Johnny Torio decided to corner all the booze in Chicago and pegged Capone as his enforcer. Capone subsequently invented new methods of murder never seen before. These included shooting Thompson sub-machine guns into the car sitting at the stop light and driving away without any real consequences. Capone’s terror began in 1920 many years before the St. Valentine’s Day Massacre of 1929 when perfecting their depravity Capone’s men dressed as policeman in order to mow down the opposition as they stood lined up against the wall waiting to be frisked. </span><br data-dcnode-id="3037"><br data-dcnode-id="3036"><span data-dcnode-id="3035" instrument_node="">Allen points out that although prohibition is blamed for the rise of organized crime most of the actual increase in barbarity came about from the rise of automobiles. Largely because of the ease at which assassins could get from point A to B, commit a murder, flee the scene and even to dispose of bodies. I guess it would be significantly harder to bring out the horse and wagon every time you needed to dispose of a body. Interestingly enough the violence wasn’t all done with guns either - there were more than a hundred bombings in Chicago in 1929 alone. </span><br data-dcnode-id="3034"><br data-dcnode-id="3033"><b data-dcnode-id="3029"><span data-dcnode-id="3032" instrument_node=""> </span><i data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Home Sweet Florida</span></i></b><br data-dcnode-id="3028"><br data-dcnode-id="3027"><span data-dcnode-id="3026" instrument_node="">This was an interesting but odd chapter. This era brought about the raising of Miami and south Florida from the Everglades estuaries and swamps. Allen writes that in 1925 alone there were 25,000 real estate agents selling land and homes in and around Miami and south Florida! The area went from a population of 30,000 in 1920 to 150,000 by 1930. But there were two developments beginning in 1926 that created a large number of communities in South Florida to go bankrupt prior to the crash. They were both caused by deadly hurricanes. And more deadly hurricanes continued into the ‘30s. </span><br data-dcnode-id="3025"><br data-dcnode-id="3024"><b data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node=""> No malevolent Providence bent upon the teaching of humility could have struck with a more precise aim than the second and worst of these Florida hurricanes. It concentrated upon the exact region where the boom had been the noisiest and most hysterical - the region about Miami. Hitting the Gold Coast early in the morning of September 18, 1926, it piled the waters of Biscayne Bay into the lovely Venetian developments, deposited a five-masted steel schooner high in the street at Coral Gables, tossed big steam yachts on the avenues of Miami, picked up trees, lumber, pipes, tile, debris, and even small automobiles and sent them crashing into the houses, ripped the roofs off jerry-built cottages and villas, almost wiped out the town of Moore Haven on Lake Okeechobee, and left behind it some four hundred dead, sixty-three hundred injured, and fifty thousand homeless. </span></b><br data-dcnode-id="3021"><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">Imagine a place were nearly half the population was homeless. As one could expect the real estate in South Florida plunged and it would be more than a decade before it fully recovered. For the real estate speculators the focus would move to Wall Street in 1927.</span><br data-dcnode-id="3018"><br data-dcnode-id="3017"><span data-dcnode-id="3016" instrument_node="">The last two chapters cover the Bull Market and the Crash. It was notable that Hoover ran on Republican prosperity and rode the wave of stock market exuberance. In 1928 - at least on the surface - the economic drivers were positive. In fact he was so positive of the progress that he said America could wipe out poverty. Allen points out many times that such words would come back to bite Hoover when he would abandon the needs of the poverty stricken and stubbornly refuse to help. </span><br data-dcnode-id="3015"><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">In the final pages there are some nice summaries but not so much new information. Allen relates the mood and sense of failure that gripped the country in 1930 following the crash a few months earlier and we begin to see American culture move away from intellectualism and the fine arts. Not so much a move from elitism altogether - that wouldn’t happen until the Barry Goldwater campaign in 1964. </span><br data-dcnode-id="3012"><br data-dcnode-id="3011"><span data-dcnode-id="3010" instrument_node="">If you are a history buff and like popular culture then this book will resonate. My favorite era of history is the period from 1910 to 1930 so I especially enjoyed this book. There is also some truly exceptional literature from this period that helps bring these years into focus but this was as good a summary of the 20s that I have read. </span><br data-dcnode-id="3009"><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node="">5 stars</span></span><span data-dcnode-id="3005" instrument_node="">

</span><span data-dcnode-id="2927" id="freeText4887141802231661717" style="display:none"><span data-dcnode-id="2928" instrument_node=""> Noticed that one of my goodreads friends had read this, and it triggered me to add it. I read it years ago, but it is easily one of the best compact histories of the 1920s. The only thing I can compare it to is the multi-volume Mark Sullivan series "Our Times" (which dealt with several decades, but Allen is a more engaging writer. It is interesting to see the perspective on the 1920s from 1931. Many things that seem iconic about the decade are ignored or glossed over in this book, but it gives a rather immediate sense of the everyday concerns and social attitudes of the time. "Only Yesterday" was turned into a movie by Universal in 1933, though the film tosses out any pretense of being a history of the 1920s; rather the filmmakers just used the title and adapted the story of what was later remade as "Letter From an Unknown Woman." A great movie, nonetheless. Although not quite as good as "Only Yesterday," Allen's study of the 1930s, called "Since Yesterday," is also worth reading.</span></span><span data-dcnode-id="2926" instrument_node="">

</span><span data-dcnode-id="2844" id="freeText3456638133743163908" style="display:none"><span data-dcnode-id="2849" instrument_node="">There’s politics, political scandals, the Big Red Scare, laxity of morals among the young and technology that altered the daily habits of Americans. Minus flappers, Prohibition and the market crash of the Great Depression (we hope), this could describe today’s America. But this is the 1920s of Warren Gamaliel Harding, Calvin Coolidge and Herbert Hoover. Young people were not staring at candlestick phones, wall phones or into phone booths, but were listening with fascination to the new technology of radio.</span><br data-dcnode-id="2848"><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">Only Yesterday is a wonderful book about the fashion, fads, music, sports of the 1920s, first published in 1931. I was looking for a book to get the feel and mindset of people living in the Roaring Twenties that didn’t read like a textbook and this book was more than I could have hoped for. Only Yesterday is the bee’s knees and highly recommended.</span><br data-dcnode-id="2845"></span><span data-dcnode-id="2843" instrument_node="">

</span><span data-dcnode-id="2759" id="freeText14578911950077095939" style="display:none"><span data-dcnode-id="2760" instrument_node="">I pulled this for a hold at my library a few weeks ago so when I saw it again on the shelf, I picked it up. Considered an historical non-fiction classic, the author also wrote Since Yesterday (about the 1930s), which I'd also like to read. Though under 300 pages, this is a tightly written and concise history of the madcap 1920s, covering everything from fads to fashion, murder to prohibition, to the inevitable stock market crash. There was a section highlighting the crazy real estate boom in Florida during this time and, coincidentally, I just picked up a new book focusing on just that titled Bubble in the Sun: The Florida Boom of the 1920s and How it Brought on the Great Depression by Christopher Knowlton. I was struck by how many events have been repeated in this country (especially the 2008 housing bubble), with short memories and the same tragic results. But I suppose that's human nature and the infallibility of each generation.</span></span><span data-dcnode-id="2758" instrument_node="">

</span><span data-dcnode-id="2579" id="freeText1685026206516857340" style="display:none"><span data-dcnode-id="2583" instrument_node="">This classic of popular history is the best first place to go to wade into the decade of the 1920s. Breezily written and spiced with on-the-ground anecdotes that lend depth to the larger events and trends. I read this many years ago, but I'll never forget the story about the company sales dinner in which the salesmen were humiliated by exponentially decreased meal portions based on their sales performance. The sales winner who best exceeded his quota had a grand roast beef feast with all the fixins and the loser was served something like a single pea with a sprig of parsley. That story somehow gets at the heart of darkness of the cutthroat side of the modern American Dream; a Republican wet dream of social Darwinism gone amok. One of the most memorably interesting things about the book is its wistful and distanced perspective, because even though this was published in 1931, it already regarded the 1920s as ancient history.</span><br data-dcnode-id="2582"><br data-dcnode-id="2581"><span data-dcnode-id="2580" instrument_node="">(KevinR@Ky)</span></span><span data-dcnode-id="2578" instrument_node="">

</span><span data-dcnode-id="2500" id="freeText8787314157166523863" style="display:none"><span data-dcnode-id="2501" instrument_node="">Fredrick Allen undertook this informal history of the twenties in 1930 to aide him in grieving the loss of his wife and daughter. This shows in how compassionately and understandingly he writes of a confusing and confounding time. His story begins with a look at how Mr and Mrs Smith lived in 1919 and reflects on what they do not know (radio, prize-fighting, Al Capone, normalcy for starters). Each successive chapter focuses on how one aspect of life changed dramatically. After finishing this book I felt intimately acquainted with Woodrow Wilson, the Labor Movement, Warren G. Harding and his scandals, Lindbergh, Coral Gables, and all that jazz of the twenties. </span></span><span data-dcnode-id="2499" instrument_node="">

</span><span data-dcnode-id="2217" id="freeText14973663874804694347" style="display:none"><span data-dcnode-id="2219" instrument_node="">Very well narrated by Grover Gardner, this was an enjoyable re-read of a history classic. Allen really brings the '20s into an exciting light. It seems like wedged between WW I and The Depression was a time of exuberance and exciting changes during a period of enlarging freedom (Women Granted the Right to Vote in U.S.) and improved quality of life (radio frenzy). This all jibes peculiarly with sociological pathology (crimes and trials "of the century" like Leopold and Loeb Murder a Neighbor Out of Boredom; "Fatty" Arbuckle Scandal) and loosening of sexual mores in flapper lifestyle and shortening skirts much documented by F. Scott Fitzgerald. The intensely interesting decade gave birth to fads and crazes: mah jongg, hobby radio, crossword puzzles, etc. That wireless invention was bringing in the world's exciting changes and discoveries: Tomb of King Tut, Not all knowledge was embraced and the radio made the nation ringside to The Scopes (Monkey) Trial and the imperiled </span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Floyd_Collins%253Espelunker%2520Floyd%2520Collins%253C/a%253E%2520There%2520were%2520clear%2520evils%2C%2520too%3A%2520Hitler%27s%2520rise%2C%2520Teapot%2520Dome%2520Scandal%2C%2520Prohibition-spawned%2520gangsters%2520and%2520the%2520St.%2520Valentine%27s%2520Day%2520Massacre.%2520All%2520this%2520heard%2520on%2520the%2520radio%2520and%2520it%2520seemed%2520the%2520concept%2520of%2520mass%2520marketing%2520was%2520now%2520possible%2C%2520allowing%2520the%2520estate%2520and%2520image%2520of%2520actor%2520Rudolph%2520Valentino%2C%2520dead%2520suddenly%2520at%252031%2C%2520to%2520become%2520more%2520valuable%2520posthumously.%2520Movies%2520changed%2520to%3B%2520including%2520the%2520first%2520talking%2520movie%2C%2520%253Ci%253EThe%2520Jazz </span><span data-dcnode-id="2129" id="freeTextContainer13691731947720775975"><span data-dcnode-id="2136" instrument_node="">An opinionated history. </span><br data-dcnode-id="2135"><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">Not an arms-length textbook history, it is rather a gut level look back at the roaring 20s. As it was written in 1931, the 20's were still a fresh memory. You can feel the visceral sense of the debates of the time. In that sense, it is dated. the attitude reminds me a bit of HL Mencken: snooty and dismissive, but not vitriolic.</span><br data-dcnode-id="2132"><br data-dcnode-id="2131"><span data-dcnode-id="2130" instrument_node="">But this 'point of view' history does provide some benefits. It makes for a lively read. It also provides a lot of social history. the fads and cha</span></span><span data-dcnode-id="2128" instrument_node="">
</span><span data-dcnode-id="2114" id="freeText13691731947720775975" style="display:none"><span data-dcnode-id="2127" instrument_node="">An opinionated history. </span><br data-dcnode-id="2126"><br data-dcnode-id="2125"><span data-dcnode-id="2124" instrument_node="">Not an arms-length textbook history, it is rather a gut level look back at the roaring 20s. As it was written in 1931, the 20's were still a fresh memory. You can feel the visceral sense of the debates of the time. In that sense, it is dated. the attitude reminds me a bit of HL Mencken: snooty and dismissive, but not vitriolic.</span><br data-dcnode-id="2123"><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">But this 'point of view' history does provide some benefits. It makes for a lively read. It also provides a lot of social history. the fads and changes that occurred in the 20s are a big concern. It covers fashion, fads, mores, crime, prohibition, politics, scandals, and of course the economy.</span><br data-dcnode-id="2120"><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">In many ways, a lot of the concerns of the book sound remarkably contemporary. Socialism and the capitalist, race, new technology (radio), science vs state, the rise of entertainment, weird fads, changing morality, obsession with sex, gender norms, immigration, Asian competition, political scandals, emptying churches, nihilism, antitrust concerns, prohibition, free speech, the markets. It's as if we are rewriting the 1920s a hundred years later. </span><br data-dcnode-id="2117"><br data-dcnode-id="2116"><span data-dcnode-id="2115" instrument_node="">Overall, an enjoyable read to get a sense of what the 1920s felt like, at least what they felt like in the early 30s. It also shows how the time of writing has a big impact. This book says as much about 1931 as about the 1920s. </span></span><span data-dcnode-id="2113" instrument_node="">

</span><span data-dcnode-id="2029" id="freeText2458200962525162577" style="display:none"><span data-dcnode-id="2030" instrument_node="">This book was SO interesting. I feel like I have a more well rounded view of New York (and America) in the 1920s. All I was really in love with was the flapper dresses and speakeasies. But with this book, the author explains how the change of technology (the radio), culture, the stock market, agriculture, magazines all affected each other. The contrast of city vs. country. Why people moved where. I wish I had taken better notes because there was so much to learn. He also wrote a book about the 30s -- only a few years after both decades wrapped up so it feels very current. Many issues they faced as a society are not unlike those of today which brings a unique sort of comfort as well. </span></span><span data-dcnode-id="2028" instrument_node="">

</span><span data-dcnode-id="1950" id="freeText3267695755298566210" style="display:none"><span data-dcnode-id="1951" instrument_node="">I love reading history books. It's one of my favorite genres. This book was so interesting because it was written as modern history, that is, right after the events happened, Mr. Allen wrote about them. No worry about being tainted by 2020 thoughts or comparisons. Just full-on history. I loved it. I took my time reading it because I let each chapter soak in. I'm so glad that I did. And if there's anything I learn from history books, it's that as much as things change, they stay the same. I was continually amazed by how similar things are, 100 years and loads of technology later. There were passages and passages of this book that could easily fit descriptions for today. Truly a great view in to the past. Highly recommend.</span></span><span data-dcnode-id="1949" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1506" title="really liked it"><span class="staticStar p10" data-dcnode-id="1511" size="15x15"><span data-dcnode-id="1512" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="1510" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1509" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1508" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1507" size="15x15"></span></span><span data-dcnode-id="1505" instrument_node="">
