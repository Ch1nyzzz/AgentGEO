</span><span data-dcnode-id="1497" id="freeTextContainer7298380393100979652"><span data-dcnode-id="1500" instrument_node="">Aw, the 1920's. As a history buff I of course have my favorite decades; the 60's, 70's, 80's, and 90's. That list also includes the "roaring" 20's. For a while now I've been thinking of the 50's a bit more fondly. Especially considering that Eisenhower being one of my favorite presidents. In fact I always complain about the conformity, blandness, etc of the 1940's and 50's. As I always tell prudes. </span><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">conservatives, etc "you want to take us back to the 1950's!!!!! BORING BORING f**king decade" yet </span></span><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1356" id="freeText7298380393100979652" style="display:none"><span data-dcnode-id="1495" instrument_node="">Aw, the 1920's. As a history buff I of course have my favorite decades; the 60's, 70's, 80's, and 90's. That list also includes the "roaring" 20's. For a while now I've been thinking of the 50's a bit more fondly. Especially considering that Eisenhower being one of my favorite presidents. In fact I always complain about the conformity, blandness, etc of the 1940's and 50's. As I always tell prudes. </span><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">conservatives, etc "you want to take us back to the 1950's!!!!! BORING BORING f**king decade" yet the 40's and 50's had my favorite presidents; FDR and Eisenhower. Both of who did their fair share of uplifting America. Eisenhower created the highway system following in the footsteps of FDR's "new deal" which expanded and created new jobs and opportunities. When ever I now hear the "leftism is communism. Progressives/social democrats are communist" I just mock back "Oh, so America was a COMMUNIST STATE BACK IN THE 30's, 40's, and 50's RIGHT?! FDR was elected 4 times and died in office! He won in LANDSLIDE EVERY SINGLE TIME. In one election he lost to only one single state. In another he lost to two, and another he lost to 4. Americans LOVED FDR. So I guess America was just FULL OF COMMUNIST, RIGHT?!" Americans got a little taste of social democracy and they LOVED IT. Just like they loved Teddy, FDR's cousin. </span><br data-dcnode-id="1492"><br data-dcnode-id="1491"><span data-dcnode-id="1490" instrument_node="">So actually....ya, I've actually come around and said "Ya I actually do want to go back to the 50's." Back when the mobility of the American citizen was far far more fair. Before the rise of extreme crony laissez-faire capitalism, better worker union force, etc. Back before the New deal was destroyed and forgotten.</span><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">This of course provides further context into the whole "wanting to go back the 40's and 50's" what they REALLY MEAN is "before the CIVIL RIGHTS MOVEMENT and counter culture" because they sure as f**k aint talking about FDR and Eisenhower who were progressives. </span><br data-dcnode-id="1486"><br data-dcnode-id="1485"><span data-dcnode-id="1484" instrument_node="">I've thought about American presidents recently. While I detest a lot about Richard Nixon [especially the war on drugs]....he did get us out of Vietnam, he started the EPA, etc. So I don't think Nixon was one of the worse or bad presidents. When it comes to the WORSE presidents it would have to be -</span><br data-dcnode-id="1483"><span data-dcnode-id="1482" instrument_node="">1.George W. Bush.</span><br data-dcnode-id="1481"><span data-dcnode-id="1480" instrument_node="">2.Ronald Reagan.</span><br data-dcnode-id="1479"><span data-dcnode-id="1478" instrument_node="">3.Trump.</span><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">Ronald Reagan especially for destroying union power in America, destroying the mental health system in America, and Reaganomics; laissez-fair capitalism on steroids. Undercutting and ruining the social safety net and economic prospects. </span><br data-dcnode-id="1475"><br data-dcnode-id="1474"><span data-dcnode-id="1473" instrument_node="">In the intro into the 1920's the author of course has to put the decade in perspective in terms of what came before. Especially the end of the 1910's.</span><br data-dcnode-id="1472"><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">Episode of the X files;</span><br data-dcnode-id="1469"><br data-dcnode-id="1468"><span data-dcnode-id="1467" instrument_node="">Mulder: Christmas; 1917. It was a time of dark dark despair. American soldiers were dying in an ungodly raid in a war torn Europe. While at home a deadly strain of the flu virus attacked young and old alike. Tragedy was a visitor on every door step. While a creeping hopelessness set in with every man, women, and child. It was a time of dark dark despair.</span><br data-dcnode-id="1466"><br data-dcnode-id="1465"><span data-dcnode-id="1464" instrument_node="">Scully: You said that.</span><br data-dcnode-id="1463"><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">Mulder: But at here at 1501 Larkspur lane; for a pair of star crossed lovers tragedy did not come from war or pestilence. Not by the boot heel of the bombardier, but by their own innocent hand.</span><br data-dcnode-id="1460"><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">World war 1 and the Spanish flu which was a perfect time for a pandemic to kill a very large percentage of the population. By the government especially the president the pandemic was largely ignored. We had anti maskers, the virus loved to kill the young and healthy, young and healthy American soldiers dying and fighting in a war overseas. Several instances of soldiers having to sleep like sardines. A perfect environment for the virus to kill 40 million people globally. </span><br data-dcnode-id="1457"><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">It very reminds me of the 1970's and into the 1980's. Where the 1970's was a time of dark despair. Poverty and crime were exploding, the energy crisis, economic down turn, political assassinations, the rise of the serial killer. While a creeping hopelessness set in every adult; man and women. It was a time of dark dark despair.</span><br data-dcnode-id="1454"><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">Author: The statistics were stupendous. I mean, violent crimes of all kinds was soaring. The spectacles that people were seeing on their TV screen was unlike anything they'd had ever seen before.</span><br data-dcnode-id="1451"><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">70's reporter: Today ordinary citizens who would not otherwise dream of owning a gun are buying one because they're scared out of their wits.</span><br data-dcnode-id="1448"><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">#2 70's reporter: William Rubiak is a Ukrainian immigrant who owns a store outside Washington DC. He has been robbed at gun point 4 times in the past two years. Now Rubiak has bought a gun and he says next time he'll use it.</span><br data-dcnode-id="1445"><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">Rubiak holds up gun at counter: I will shoot and I will shoot to kill.</span><br data-dcnode-id="1442"><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">#3 70's reporter: Fear is the biggest seller of guns. Studies have shown that erach Urban crime wave has set off a new round of gun buying. </span><br data-dcnode-id="1439"><br data-dcnode-id="1438"><span data-dcnode-id="1437" instrument_node="">Lawyer: When Gerald Ford became president within the space of one month were two attempts on his life. Squeaky Fromme and Jane Moore. Both tried to shoot him. It's like 'what's going on?!"</span><br data-dcnode-id="1436"><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">#2 author: In the 70's New york was really in danger. The whole social fabric seemed to have been torn in half and crime was just one of the many indications that we were lost.</span><br data-dcnode-id="1433"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">New york cop who caught and interrogated Son of sam. Interview in the 70's: In the last 10 years I'd say the homicide rate has increased by leaps and bounds. We hit our peak probably in 1972 when the Bronx had 430 homicides. </span><br data-dcnode-id="1430"><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">New york cop in recent interview: In the 70's the Bronx looked like Berlin...after WW2. Literally looked like Berlin.</span><br data-dcnode-id="1427"><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">New york reporter: 1 and a half million people live in this borough. Once that smoke represented industry; progress, jobs. Now it means someone is burning down a building. It has become the arson capital of the world. It happens 30 times a day and the flames are a signal of a national disaster.</span><br data-dcnode-id="1424"><br data-dcnode-id="1423"><span data-dcnode-id="1422" instrument_node="">Reporter interviewing firefighter: Is there anything that can change the situation?</span><br data-dcnode-id="1421"><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">Firefighter after putting out another fire: The Bronx; my own estimation is doomed with a capital 'D'.</span><br data-dcnode-id="1418"><br data-dcnode-id="1417"><span data-dcnode-id="1416" instrument_node="">Narrator in Jones town documentary: By the late 1960's and early 70's the streets of America erupted in violence and civil strife. The war in Vietnam, civil rights marches in the streets, and political assassinations played out on television. Out of this turmoil thousands of Americans flocked to hear the sermons of a charismatic preacher named Jim Jones. </span><br data-dcnode-id="1415"><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">Sister of Jonestown member: I think the early 60's had been a great time of optimism. There was a belief that we could change the world through social movements. With various political assassinations; Malcolm X, Medgar Evers, Martin Luther King, Robert Kennedy. There was definitely a feeling of hopelessness. The message of People's temple [Jone's cult] was 'no, the dream is alive.'. </span><br data-dcnode-id="1412"><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">Former cult member: The government was infiltrating and wire taping and trying to kill people or assassinate people. That was what was happening.</span><br data-dcnode-id="1409"><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">Historian: It became an era where Americans began to expect the worse.</span><br data-dcnode-id="1406"><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">A few days before reading this book I really screwed up my sleeping pattern. Staying up till 8 in the morning. Sometimes stay up till 11 AM. Waking up at 4 in the morning. Tossing and turning unable to go back to sleep. Part of it being the fact that I had to move and share a room. But over all I would get tired around the time I usually go to bed and read my book. I still did it, but less so. So I've been reading it while working out on my bike as well as bedtime to get through it faster and keep up with it.</span><br data-dcnode-id="1403"><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">So I had a hard time getting "into" it and going with the author's writing style, but after a couple pages and first two chapters I began to really enjoy it.</span><br data-dcnode-id="1400"><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">The book starts off with the end of the decade; 1919. Talking about the decade in general. Then it stays on 1919 into the 1920's. This book was written during The great depression 1930's...which is incredibly revealing and ironic. The author goes on about Woodrow Wilson and the Treaty of Versailles. As well as the League of nations which Wilson promoted. Which was a precursor to The united nations. According to the author Wilson never liked the treaty and apparently made the treaty more "fair" then it otherwise would of been. Wilson then went to the American people and tried to defend the treaty and the things he said about it are laughable and ironic as hell considering what the treaty lead to; Nazi Germany. The holocaust. WW2. WIlson literally tried to argue that the treaty would make the world safer and ensure peace. How? By undercutting and economically RUINING a nation?! *wink, wink* [America ruining the economy of Russia and several other countries] *</span><br data-dcnode-id="1397"><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">In this way Woodrow Wilson kind of reminds me of Lydon Johnson who knew Vietnam was total b*llsh*t but kept on with the war anyway. After all Wilson apparently was the one who negotiated to make the treaty less bad, but of course it still lead to WW2.</span><br data-dcnode-id="1394"><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">After talk about the fall out of the WW1 and the treaty, Wilson's stroke, etc. It then moves on to the Red scare. Even before the beginning of the Red scare, it mentions and talks about the "high cost of living" in the 1910's, the hatred of greedy landowners and renters, and union strikes.</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">I couldn't help but hear Daria from the 90's show Daria say "Bolshevist cementaries" when ever the author used the term "Bolshevist" although he later uses the term "communist". I am anti communist but democratic socialist and I was very happy to see the author acknowledge the difference.</span><br data-dcnode-id="1389"><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">What the f**k ever happened to "We both profit from each other. Worker and employer. MUTUAL RESPECT FOR EACH OTHER"????? I am not anti capitalist. I want there to be more BUSINESSES and FREE COMPETITION. Not crony capitalist made of nothing but just monopolies. I DESPISE monopolies. I've been known to go on anti monopoly tirades. I just want to scream "Ya, great for you BUT WHAT ABOUT THE REST OF US?!" And these billionaire scumbags need to pay their fair share!!!!!! And we need to use that money to improve the MATERIAL CONDITIONS OF THE COUNTRY AS A WHOLE. Not just let the #1 f**king HOG IT ALL. These mother f**kers want to talk about "patriotism" and accuse me of being anti American.....what the F**K IS AMERICAN ABOUT HOGGING ALL THE MONEY FOR YOUR SELF AND LETTING THE COUNTRY ROT?! These are the same a$$h(les who force women to give birth "for the baby. We are so much for the baby. That's a LIFE! Abortion is MURDER" and once the baby is actually born "GET THE F**K OUT OF HERE! YOU GET NOTHING FROM US! YOU CAN ROT for ALL WE CARE! YOU COST TOO MUCH!!! YOUR A PARASITE ON THE SYSTEM!!!!" </span><br data-dcnode-id="1386"><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">So the author talks about the red scare in the 1910's during a rise of union strikes. The author points out this obvious point. Scumbags realized they can use the word "communist" as a scare tactic to paint on unions; worker's rights.</span><br data-dcnode-id="1383"><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">A very good chapter and I kept going "Nothing new under the sun. Same sh*t. Different scumbags. Just parroting b*llsh*t from the 1910's!!!" One reason for so many of the strikes was the cost of living rising. I would of liked for the author to have explained why. I suspect it might of been due to WW1 and the pandemic.</span><br data-dcnode-id="1380"><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">A very good chapter on the Red scare. Lots of similarities to the 1950's red scare and with Russia invading Ukraine. I couldn't help but think of the prejudice against Russians when the book talks about prejudice against "the slavs" and "amercanism"; xenophobia and American jingoism. As I said "nothing new under the sun" because part of the red scare was bashing colleges as beehives for communist and radicals. They even went so far as to promote "Americanism"; American nationalism where children are brainwashed with hypernationalism/jingoism....I was shocked when I read that. Literally nothing new under the sun!!! MAGA existed back in the 1910's, who f**king knew?! Anti maskers and all.</span><br data-dcnode-id="1377"><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">note: The author doesn't talk about the pandemic other then mention it calling it an "epidemic" instead of a pandemic. Doesn't mention the anti maskers.</span><br data-dcnode-id="1374"><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">To be clear....I do see an issue with colleges. I am very anti SJW and I do think SJW has infected the colleges and I don't think pseodo science and racism and sexism should be taught at a college...but to paint colleges like Fox news claims "oh colleges are just swamped with radicals and communist" is total fear mongering and total b*llsh*t. I don't believe SJWS are just swarming college campuses. </span><br data-dcnode-id="1371"><span data-dcnode-id="1370" instrument_node="">The book then turns to the rise of the KKK in the 1910's which got bigger and bigger at the end of the decade and into the 1920's. As the author pointed out it was a perfect storm for the KKK to rise. </span><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">Also got to love this quote from the author</span><br data-dcnode-id="1367"><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">"Here was a chance to dress up the village bigot and let him be a Knight of the Invisible Empire."</span><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">I highly appreciated that the 1910's was not cast aside. Giving context into the 1920's. At this point I also began to go along with the author's writing.</span><br data-dcnode-id="1362"><br data-dcnode-id="1361"><span data-dcnode-id="1360" instrument_node="">The author mentions the radio coming out, food fads; eskimo pies, a game I had never heard before. It then talks about the sexual revolution of the period. The fashion industry in terms of retail, the younger generation being open about sex. Going out to the cars with their dates and having premarital sex or "petting"; making out, probably some oral sex, who knows.</span><br data-dcnode-id="1359"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">Eventually it begins to talk more about the trends and revolution in terms not just sex but women's equality as well as men. Smoking cigarettes was considered very unmanly and smoking and drinking for women was considered unwomenly but within the 1920's men began smoking cigarettes and women began to drink alcohol and smoke. The author mentions several times that in the post WW1/Spanish flu era there was this great "disillusion"ment towards the 1910's. Towards the old "puritan" way or living. The author mentions the fact that it took a lot of people to find comfort in the "modern" zeitgeist of the decade because they didn't have anything else to replace the "old ways". Which made me of course think of Nietzsche. The author says if anything, at least have a few drinks and screw. Might as well have some fun.</span></span><span data-dcnode-id="1355" instrument_node="">

</span><span data-dcnode-id="1252" id="freeTextContainer7101090212670035772"><span data-dcnode-id="1258" instrument_node="">This book provides and high-level review of what happened in the 1920's. I believe this was written in the 1950's. </span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">Amazingly it shows how things really don't change - mainly the boundaries of extremes get pushed. Every generation goes through a generational Amnesia, as it doesn't know what came before, so the perception of reality is baselined at now... and not the 20-30 yrs prior in which their parents grew up. This is the importance in reading and knowing history.</span><br data-dcnode-id="1255"><br data-dcnode-id="1254"><span data-dcnode-id="1253" instrument_node="">The below quote applies to eve</span></span><span data-dcnode-id="1251" instrument_node="">
</span><span data-dcnode-id="1187" id="freeText7101090212670035772" style="display:none"><span data-dcnode-id="1250" instrument_node="">This book provides and high-level review of what happened in the 1920's. I believe this was written in the 1950's. </span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">Amazingly it shows how things really don't change - mainly the boundaries of extremes get pushed. Every generation goes through a generational Amnesia, as it doesn't know what came before, so the perception of reality is baselined at now... and not the 20-30 yrs prior in which their parents grew up. This is the importance in reading and knowing history.</span><br data-dcnode-id="1247"><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">The below quote applies to every decade up to today:</span><br data-dcnode-id="1244"><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">"The older generation had certainly pretty well ruined this world before passing it on to us."</span><br data-dcnode-id="1241"><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">Other chestnuts:</span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">- Preachers using bible verses saying god support you to be rich</span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">- The morality of elders imposed on participants returning from WWI and being forced to puritanical and pollyanna morals that world had destroyed for them (paraphrase by me)</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">- the belief in uninhibited sex</span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">- Fundamentalists pushing through an amendment (prohibition) which nobody thought would pass, but did, and couldn't possibly be funded to enforce. It moved the public from grain (beer) to distilled (gin) alcohol consumption, created a lucrative black market (Capone) which pervaded racketeering into government at all levels, thereby training them on how to game the system. "Whats the use of trying to do anything about?"</span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">- The rise of sensationalism of sex, crazy stunts, Charles Lindbergh flying to Paris (though others did similar flights before him) as the press/media learned that leading with one top story is what draws the people in. Case in point: a guy gets stuck in a cave as he was worming his way through</span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">the underground to find natural resources for companies. He gets stuck and captures the headlines for weeks until he dies. A mine collapse during the same period gets scant coverage even though many people died.</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">- The profits of heroism - Charles Lindbergh again, but today it's celebrities who make even less an impact and receive great compensation: CEO's, sports players, musicians. "A disillusioned nation fed on cheap heroics and scandal and crime was revolting against the low estimate of human nature..."</span><br data-dcnode-id="1224"><span data-dcnode-id="1223" instrument_node="">- the consolidation of the press into less owners. Local reporters being replaced by access to</span><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node="">agencies providing content nationally.</span><br data-dcnode-id="1220"><span data-dcnode-id="1219" instrument_node="">- advertising from what a product does to selling a lifestyle</span><br data-dcnode-id="1218"><span data-dcnode-id="1217" instrument_node="">- "hands off" approach to Business by the president/government (basically cash and carry and letting the public get swindled and then having them pay to clean-up the mess, see </span><i data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">The Big Short</span></i><span data-dcnode-id="1214" instrument_node="">)</span><br data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">- The increase in industrial corporations mergers</span><br data-dcnode-id="1211"><span data-dcnode-id="1210" instrument_node="">- financial instruments that had holdings of Company A, which invested in Company B, which owned pieces of Company C, and Company C invested in Company A...</span><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">- securities being sold of investment trusts which held stock in holding companies which </span><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">owned stocks of banks, which had affiliates which in turn controlled holding companies, etc</span><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">- "The big bull market covered a multitude of sins."" The economic system had proved itself too complex... to continue unbridled" (ha ha!)</span><br data-dcnode-id="1203"><span data-dcnode-id="1202" instrument_node="">- lost prestige of religion</span><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">- Extreme PC-ism based on nothing "The red scare" (See </span><i data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Trumbo</span></i><span data-dcnode-id="1197" instrument_node="">), where an actual</span><br data-dcnode-id="1196"><span data-dcnode-id="1195" instrument_node="">government committee was funded to perform witch hunts by pointing a finger at someone and accusing someone of people a US-hating communist.</span><br data-dcnode-id="1194"><span data-dcnode-id="1193" instrument_node="">- Political fund-raising and government contract scams where the whistle-blowers are treated as the bad guys, even by the press.</span><br data-dcnode-id="1192"><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">The circle of life can be dizzying.</span><br data-dcnode-id="1189"><br data-dcnode-id="1188"></span><span data-dcnode-id="1186" instrument_node="">

</span><span data-dcnode-id="1109" id="freeTextContainer116364356220382599"><span data-dcnode-id="1112" instrument_node="">This is, as the title suggests, the history of the 1920s, chiefly in the USA. My first surprise with the book was that it wasn’t written recently but in 1930 and first published in 1931. This fact cannot be spotted immediately, thus it is a rare kind of the historical text that remains valid.</span><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">It is true that the book omits or pays a little attention to some themes, which other more modern books on the period describe, most importantly life of African-Americans and jazz music. At the same time it </span></span><span data-dcnode-id="1108" instrument_node="">
</span><span data-dcnode-id="1097" id="freeText116364356220382599" style="display:none"><span data-dcnode-id="1107" instrument_node="">This is, as the title suggests, the history of the 1920s, chiefly in the USA. My first surprise with the book was that it wasn’t written recently but in 1930 and first published in 1931. This fact cannot be spotted immediately, thus it is a rare kind of the historical text that remains valid.</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">It is true that the book omits or pays a little attention to some themes, which other more modern books on the period describe, most importantly life of African-Americans and jazz music. At the same time it illuminates in detail such advances as a sexual revolution (not in the 60s), appearance of tabloids and sensational press – I’ve learnt a new word – ballyhoo from it :)</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">It is astounding how the life drastically changed during the roaring 20s – out of my four decades on this Earth I cannot select one that shifted the world so drastically. Despite the fall of the USSR, rise of the internet and election of non-white as a president of the USA.</span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">It is interesting how open the author speaks about prohibition and Al Capone, I thought that a lot of details were open to general public much later. Other flashlights: the Red Scare of 1920, Lindbergh’s flight, Ford model A, boom and crash of the stock market, Harding and corruption, Wilson and the world peace.</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">Recommended as a forgotten jewel of the early 1930s to anyone who has the basic knowledge of the period</span><br data-dcnode-id="1098"></span><span data-dcnode-id="1096" instrument_node="">

</span><span data-dcnode-id="1006" id="freeText3809215809882255006" style="display:none"><span data-dcnode-id="1016" instrument_node=""> I originally read this during my college days, but enjoyed re-reading it just as much in recent months. </span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node=""> Written just after the '20s ended, this is a lively, informative review of a tumultuous decade. Frederick Lewis Allen, who is a wonderful writer, takes his readers from the failed idealism of the crusade of the "war to end all wars," through the fearful reaction to "the Reds" and radical revolutionaries, through the escapist and hedonistic escapades of the rich and young, and through the sensational adventures and criminal trials of the great gangs and their flamboyant leaders. </span><br data-dcnode-id="1012"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node=""> One of the greatest virtues of this book is the "you are there" feeling that flows through his narrative. Slang, clothing styles, popular "isms" and fads of the day all feel fresh.'' </span><br data-dcnode-id="1009"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node=""> For those especially who disdain "heavy history," this work displays well the wonder of remembering the recent past, and discovering once again that the people that lived then were hardly different from our own "modern" times. </span></span><span data-dcnode-id="1005" instrument_node="">

</span><span data-dcnode-id="927" id="freeText13098197974210815000" style="display:none"><span data-dcnode-id="928" instrument_node="">Only Yesterday by Frederick Lewis Allen starts out as an interesting book. Filled with specific details, Allen does an exemplary job of describing life before the 1920’s. After that chapter, everything goes crazy. This book is like a rich, delicious cake. The first few bites are amazing, and the reader doesn’t want to stop eating. The cake begins to get sweeter and harder to digest until the reader has to take a break before starting again. Only Yesterday is similar to this example. Although the first chapters were captivating, the rest of the book only contained a few sentences that were worth reading. The book began to drag, and all of the facts were thrown in a non-chronological order, making the book confusing and dull. Even so, the beginning of the book was an insight into daily life for an ordinary family and was delightful to read. Overall, the book was a long, tiring journey whose end was boring and monotonous like the chapters preceding it. This book is recommended to readers who enjoy reading plain, stated facts and a more encyclopedia-like book on the 1920’s.</span></span><span data-dcnode-id="926" instrument_node="">
