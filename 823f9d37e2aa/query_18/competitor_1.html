</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Sure, it was difficult to be a woman let alone a mother during this time, and Colette endured more than her fair share of hardship before having Bel-Gazou. Even so, being a bad parent gave her a sense of pride; she believed that her refusal to be a “happy and tender” mother prevented her from becoming “a mediocre author.” And then there was her husband…</span></p><span data-dcnode-id="1428" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1420" style="width: 863px"><div class="media-credit-container alignnone" data-dcnode-id="1421" style="width: 863px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534651" data-dcnode-id="1427" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2.jpg 863w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2-300x160.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2-768x408.jpg 768w" height="459" loading="lazy" sizes="(max-width: 863px) 100vw, 863px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="863"><noscript data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534651" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2.jpg" alt="Colette facts" width="863" height="459" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2.jpg 863w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2-300x160.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_19-2-768x408.jpg 768w" sizes="(max-width: 863px) 100vw, 863px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1422"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1424" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1419" instrument_node="">
</span><h2 data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">29. Her Husband Betrayed Her</span></h2><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1415" instrument_node="">While Colette’s financially stable marriage to de Jouvenel seemed placid on the surface,</span><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node=""> underneath they were hiding dark secrets.</span></strong><span data-dcnode-id="1412" instrument_node=""> For one, Colette’s new husband seemed to value fidelity as little as her first, and he was constantly having affairs with a multitude of women around Paris. Now, don’t get me wrong, this is bad. But Collette’s actions were much, much worse.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1402" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1403" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534642" data-dcnode-id="1409" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-1024x716.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-768x537.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-1536x1074.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-2048x1431.jpg 2048w" height="1789" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534642" src="https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-scaled.jpg" alt="Colette facts" width="2560" height="1789" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-1024x716.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-768x537.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-1536x1074.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/Henry_de_Jouvenel-2048x1431.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1404"><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_de_Jouvenel"><span data-dcnode-id="1406" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1401" instrument_node="">
</span><h2 data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">30. She Was A Cradle-Robber</span></h2><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">De Jouvenel had been married before, and had a young son, Bertrand de Jouvenel, with his first wife. For a long time, Bertrand was out of the picture in their marriage, but in 1920, the nearly 50-year-old Colette finally met the now 16-year-old Bertrand…and sparks flew. Before long, the teenager stepson and the seasoned stepmother struck up an affair right under daddy’s nose.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">In case you’re wondering, this went nowhere good.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1384" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1385" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534664" data-dcnode-id="1391" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-1024x791.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-768x593.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-1536x1187.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-2048x1582.jpg 2048w" height="1978" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534664" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-scaled.jpg" alt="Colette facts" width="2560" height="1978" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-1024x791.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-768x593.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-1536x1187.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-53402058-2048x1582.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1386"><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1388" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1383" instrument_node="">
</span><h2 data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">31. Her Husband Found Out Her Secret</span></h2><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Whether she was getting back at her husband or too lost in her young lover, Colette really went off the deep end when it came to Bertrand—and she wasn’t subtle about it. Although they managed to carry on their tryst for a whopping four years, Henry de Jouvenel eventually found out about the cradle-robbing situation, as one usually does. His reaction was swift and brutal.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1369" style="width: 816px"><div class="media-credit-container alignnone" data-dcnode-id="1370" style="width: 816px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534667" data-dcnode-id="1376" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2.jpg 816w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2-768x529.jpg 768w" height="562" loading="lazy" sizes="(max-width: 816px) 100vw, 816px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="816"><noscript data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534667" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2.jpg" alt="Colette facts" width="816" height="562" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2.jpg 816w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_20-2-768x529.jpg 768w" sizes="(max-width: 816px) 100vw, 816px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1371"><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AColette_1932_%282%29.jpg"><span data-dcnode-id="1373" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1368" instrument_node="">
</span><h2 data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">32. She Had A Bitter Split</span></h2><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Henry de Jouvenel was (pretty justifiably) horrified at the thought of his wife getting it on with his son, and he gave Colette no mercy. In 1924, the same year that he discovered the affair, de Jouvenel divorced the writer, pushing her out of her cushy existence and setting the Parisian gossip grapevines atwitter. Did Colette learn from this colossal mistake? No, not at all.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1354" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1355" style="width: 2560px"><img alt="King Louis XI Of France Facts" class="lazy-hidden size-full wp-image-457104" data-dcnode-id="1361" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-1024x721.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-768x541.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-1536x1082.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-2048x1442.jpg 2048w" height="1803" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-457104" src="https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-scaled.jpg" alt="King Louis XI Of France Facts" width="2560" height="1803" srcset="https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-1024x721.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-768x541.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-1536x1082.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/11/shutterstock_736848754-2048x1442.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1356"><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1358" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1353" instrument_node="">
</span><h2 data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">33. She Rushed Into Her Third Marriage</span></h2><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1349" instrument_node="">For all that Colette had sacrificed her second marriage for her young lover Bertrand de Jouvenel, they didn’t survive the humiliation of the discovery and divorce and stopped seeing each other almost immediately after. </span><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">But this only pushed Colette into more and more risky decisions.</span></strong><span data-dcnode-id="1346" instrument_node=""> Just a year after the split, she met her </span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">next</span></em><span data-dcnode-id="1343" instrument_node=""> husband, Maurice Goudeket.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">And there were a lot of alarm bells ringing right off the top.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1330" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1331" style="width: 1024px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534674" data-dcnode-id="1337" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015-300x293.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015-768x750.jpg 768w" height="1000" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534674" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015.jpg" alt="Colette facts" width="1024" height="1000" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015-300x293.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1211749015-768x750.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1332"><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1334" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1329" instrument_node="">
</span><h2 data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">34. She Liked Younger Men</span></h2><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1325" instrument_node="">Besides the fact that Colette probably should have been taking a breather from love and </span><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">not</span></em><span data-dcnode-id="1322" instrument_node=""> jumping into a committed relationship, there were other issues with Maurice Goudeket. Like the fact that, like Bertrand, he too was significantly younger than Colette, being 16 years her junior. I guess Colette now had a type. Even so, this third marriage was doomed for much more shocking reasons.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1312" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1313" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534676" data-dcnode-id="1319" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-1024x819.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-768x614.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-1536x1228.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-2048x1638.jpg 2048w" height="2047" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534676" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-scaled.jpg" alt="Colette facts" width="2560" height="2047" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-1024x819.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-768x614.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-1536x1228.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-515387560-2048x1638.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1314"><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1316" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1311" instrument_node="">
</span><h2 data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">35. Her World Changed For The Worse</span></h2><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">During the 1940s, Colette was in her 60s and still married to Maurice Goudeket when the world turned upside down. The Germans now occupied Colette’s beloved France in the middle of WWII, </span><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">and far worse was on the way.</span></strong><span data-dcnode-id="1304" instrument_node=""> See, Goudeket was actually Jewish, and he and Colette waited breathlessly for a knock on the door in the middle of the night from the Gestapo. One day, it came.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1294" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="1295" style="width: 1920px"><img alt="Tsar Nicholas II facts" class="lazy-hidden size-full wp-image-314101" data-dcnode-id="1301" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-360x240.jpg 360w" height="1280" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314101" src="https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920.jpg" alt="Tsar Nicholas II facts" width="1920" height="1280" srcset="https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/jewish-1159704_1920-360x240.jpg 360w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1296"><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1298" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="1293" instrument_node="">
</span><h2 data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">36. She Witnessed Her Husband’s Arrest</span></h2><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">In December 1941, Colette’s worst nightmare happened, and the Germans forcibly arrested her husband on trumped-up charges. For a handful of months, Colette was on tenterhooks about Goudeket’s fate, until at long last she had a stroke of luck. The French wife of a German ambassador managed to convince the Gestapo to let Maurice go, and he and Colette had a tearful reunion.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Yet tragically, the damage was very much done.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1276" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1277" style="width: 800px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534680" data-dcnode-id="1283" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2-768x527.jpg 768w" height="549" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534680" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2.jpg" alt="Colette facts" width="800" height="549" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_21-2-768x527.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1278"><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mk.wikipedia.org/wiki/"><span data-dcnode-id="1280" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1275" instrument_node="">
</span><h2 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">37. She Had Bad Opinions</span></h2><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1271" instrument_node="">Colette had lived her life up until this point on the cutting, libertine edge of everything,</span><strong data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node=""> but she then went through a terrifying transformation.</span></strong><span data-dcnode-id="1268" instrument_node=""> Whether out of inborn prejudice or a desire to please the authorities and keep her husband from more jail time, she spent the final years of WWII writing for pro-Reich newspapers, and her writing featured anti-Semitic language.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Somehow, though, Colette’s influence only rose in her final years, and all because of one book.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1255" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1256" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534685" data-dcnode-id="1262" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-1024x782.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-768x586.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-1536x1173.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-2048x1564.jpg 2048w" height="1955" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534685" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-scaled.jpg" alt="Colette facts" width="2560" height="1955" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-1024x782.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-768x586.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-1536x1173.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3142838-2048x1564.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1257"><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1259" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1254" instrument_node="">
</span><h2 data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">38. She Wrote Her Most Famous Novel Late In Life</span></h2><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1250" instrument_node="">In 1944, the aging Colette went from French celebrity to international superstar when she published </span><em data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Gigi,</span></em><span data-dcnode-id="1247" instrument_node=""> her novel about a courtesan who falls in love with one of her clients. The book became an instant success, and in 1949, just five years after its publication, a French film came out starring Danièle Delorme and Gaby Morlay. Then suddenly, Colette hit Hollywood in a big way.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1237" style="width: 2048px"><div class="media-credit-container alignnone" data-dcnode-id="1238" style="width: 2048px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534691" data-dcnode-id="1244" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-1536x1152.jpg 1536w" height="1536" loading="lazy" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2048"><noscript data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534691" src="https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k.jpg" alt="Colette facts" width="2048" height="1536" srcset="https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/34042148090_8113a0afea_k-1536x1152.jpg 1536w" sizes="(max-width: 2048px) 100vw, 2048px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1239"><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/grupoemausfundacionsocial/34042148090"><span data-dcnode-id="1241" instrument_node="">Flickr, Grupo Emaús F.S.</span></a></span></div></figure><span data-dcnode-id="1236" instrument_node="">
</span><h2 data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">39. She Discovered A Famous Starlet</span></h2><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1232" instrument_node="">As </span><em data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Gigi</span></em><span data-dcnode-id="1229" instrument_node=""> continued to reap success and rewards on the page and on the screen, producers decided to turn it into a stage play as well and began casting about for the titular character. </span><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Colette ended up turning an unknown actress into a star.</span></strong><span data-dcnode-id="1226" instrument_node=""> The writer personally picked a young </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/41-elegant-facts-audrey-hepburn/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1225" instrument_node="">Audrey Hepburn</span></a><span data-dcnode-id="1223" instrument_node=""> to star as Gigi, launching Hepburn’s storied career.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">But Audrey wasn’t the only famous person Colette hobnobbed with.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1210" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1211" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534697" data-dcnode-id="1217" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-1024x767.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-768x575.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-1536x1150.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-2048x1533.jpg 2048w" height="1917" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534697" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-scaled.jpg" alt="Colette facts" width="2560" height="1917" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-1024x767.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-768x575.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-1536x1150.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-89726704-2048x1533.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1212"><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1214" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1209" instrument_node="">
</span><h2 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">40. Truman Capote Was A Huge Fan</span></h2><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1205" instrument_node="">During this time, Colette hung out with literary luminaries like </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/42-infamous-facts-truman-capote/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1204" instrument_node="">Truman Capote</span></a><span data-dcnode-id="1202" instrument_node="">, and she made quite an impression on the writer of </span><em data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Breakfast at Tiffany’s.</span></em><span data-dcnode-id="1199" instrument_node=""> In his essay “The White Rose,” Capote recalls being with Colette and noticing a paperweight of a white rose on her table. It struck Capote as beautiful, and he said as much to the older writer. Her response was surprising.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1189" style="width: 1092px"><div class="media-credit-container alignnone" data-dcnode-id="1190" style="width: 1092px"><img alt="Wild Parties Facts" class="lazy-hidden size-full wp-image-390128" data-dcnode-id="1196" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517.png" data-srcset="https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517.png 1092w, https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517-300x237.png 300w, https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517-1024x808.png 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517-768x606.png 768w" height="862" loading="lazy" sizes="(max-width: 1092px) 100vw, 1092px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1092"><noscript data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-390128" src="https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517.png" alt="Wild Parties Facts" width="1092" height="862" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517.png 1092w, https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517-300x237.png 300w, https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517-1024x808.png 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Selection_999517-768x606.png 768w" sizes="(max-width: 1092px) 100vw, 1092px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1191"><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ATruman_Capote_%281968%29.jpg"><span data-dcnode-id="1193" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1188" instrument_node="">
</span><h2 data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">41. She Gave Some Good Advice</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Colette wasn’t necessarily famous for her warm, fuzzy demeanor, but when Capote complimented the item, Colette immediately insisted that he take it home with him. When Capote objected because she so clearly loved the paperweight, she only pressed further, saying, “My dear, really there is no point in giving a gift unless one also treasures it oneself.”</span></p><span data-dcnode-id="1182" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1174" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1175" style="width: 1280px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534701" data-dcnode-id="1181" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin.jpg 1280w, https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin-300x217.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin-1024x742.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin-768x556.jpg 768w" height="927" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534701" src="https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin.jpg" alt="Colette facts" width="1280" height="927" srcset="https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin.jpg 1280w, https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin-300x217.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin-1024x742.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/1280px-Colette_et_ses_chats_années_1930_Épreuve_gélatin-768x556.jpg 768w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1176"><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Colette_et_ses_chats_annes_1930_preuve_glatin.jpg/1280px-Colette_et_ses_chats_annes_1930_preuve_glatin.jpg"><span data-dcnode-id="1178" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1173" instrument_node="">
</span><h2 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">42. She Was Second-Best</span></h2><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1169" instrument_node="">Throughout her life, Colette had countless dramatic romances, </span><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">but she had only one arch-enemy.</span></strong><span data-dcnode-id="1166" instrument_node=""> For decades, many considered Colette as a close second to the French writer Marcel Proust, who wrote the infamously difficult </span><em data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">In Search of Lost Time.</span></em><span data-dcnode-id="1163" instrument_node=""> Still, in recent years others have contested this second-best position, with the </span><em data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">New York Times</span></em><span data-dcnode-id="1160" instrument_node=""> declaring in 1951 that “She is the greatest living French writer of fiction [and] she was while Gide and Proust still lived.”</span></p><span data-dcnode-id="1158" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1150" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1151" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534700" data-dcnode-id="1157" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-1024x845.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-768x634.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-1536x1268.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-2048x1691.jpg 2048w" height="2113" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534700" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-scaled.jpg" alt="Colette facts" width="2560" height="2113" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-1024x845.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-768x634.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-1536x1268.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-1322699138-2048x1691.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1152"><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1154" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1149" instrument_node="">
</span><h2 data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">43. She Hated Other Women</span></h2><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Colette may have justly earned her reputation as one of France’s greatest writers, but—even besides her anti-Semitic writings—not all of her opinions were heroic. While she valued women’s freedoms, she also despised suffragettes and political collectives of women. As she once said, “You know what suffragettes deserve? The whip and the harem.”</span></p><span data-dcnode-id="1143" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1135" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1136" style="width: 800px"><img alt="Emmeline Pankhurst facts" class="lazy-hidden size-full wp-image-437088" data-dcnode-id="1142" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908.jpg 800w, https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908-768x523.jpg 768w" height="545" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-437088" src="https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908.jpg" alt="Emmeline Pankhurst facts" width="800" height="545" srcset="https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908.jpg 800w, https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/08/Suffragettes_England_1908-768x523.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1137"><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASuffragettes%2C_England%2C_1908.JPG"><span data-dcnode-id="1139" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1134" instrument_node="">
</span><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">44. She Was A Jack Of All Trades</span></h2><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Colette didn’t just stick to writing and acting throughout her life but also took up a host of other passions and hobbies. At one point, she even opened a chain of beauty salons, using her long-suffering daughter Bel-Gazou as one of her makeover models. Given Colette’s shaky reputation as a mother, this may have been more of a backhanded compliment than anything.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Some of her other interests, however, were even more provocative.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1117" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1118" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534704" data-dcnode-id="1124" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-1024x722.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-768x541.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-1536x1083.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-2048x1443.jpg 2048w" height="1804" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534704" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-scaled.jpg" alt="Colette facts" width="2560" height="1804" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-1024x722.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-768x541.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-1536x1083.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-167443369-2048x1443.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1119"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1121" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">45. She Kissed And Told</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">Many of Colette’s extensive writings were based on her own personal experiences, and she wrote about subjects like marital intimacy, motherhood, and friendship with an honestly that raised even her friends’ eyebrows. In one book, </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Claudine Married</span></em><span data-dcnode-id="1109" instrument_node="">, Colette even divulged on a threesome she was having in real time, and with such detail that the other woman tried to get the book destroyed.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1099" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1100" style="width: 800px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534706" data-dcnode-id="1106" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2-768x573.jpg 768w" height="597" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534706" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2.jpg" alt="Colette facts" width="800" height="597" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_22-2-768x573.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1101"><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJacques_Humbert_-_Colette.jpg"><span data-dcnode-id="1103" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1098" instrument_node="">
</span><h2 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">46. She Never Forgot Her First</span></h2><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Even in her later years, Colette could never fully renounce her first husband Willy’s influence over her life. According to her, she would never have even picked up a pen and started writing if it weren’t for her husband acting as her mentor and, you know, passing off her work as his own. Okay, I added that last part, but show me the lie and I’ll take it back.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1084" style="width: 947px"><div class="media-credit-container alignnone" data-dcnode-id="1085" style="width: 947px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534708" data-dcnode-id="1091" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2.jpg 947w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2-300x146.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2-768x375.jpg 768w" height="462" loading="lazy" sizes="(max-width: 947px) 100vw, 947px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="947"><noscript data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534708" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2.jpg" alt="Colette facts" width="947" height="462" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2.jpg 947w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2-300x146.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_23-2-768x375.jpg 768w" sizes="(max-width: 947px) 100vw, 947px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1086"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1088" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1083" instrument_node="">
</span><h2 data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">47. She Was A Modern Woman</span></h2><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">Colette truly was a woman ahead of her time, and this happened beyond the pages of her writings. She was also an avant-garde proponent of modern pastimes like sushi, perms, and weightlifting, and she actively participated in beautification like facelifts as well as health tactics such as acupuncture. After all, she was</span><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node=""> the</span></em><span data-dcnode-id="1076" instrument_node=""> Colette, and she strove to uphold her celebrated reputation at all costs.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">But although the end of her life was full of success, tragedy came back for Colette at last.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1063" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1064" style="width: 1000px"><img alt="Miles Davis facts" class="lazy-hidden size-full wp-image-268835" data-dcnode-id="1070" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/30.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/30.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/02/30-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/30-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/30-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-268835" src="https://www.factinate.com/wp-content/uploads/2019/02/30.jpg" alt="Miles Davis facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/02/30.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/02/30-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/30-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/30-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1065"><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1067" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1062" instrument_node="">
</span><h2 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">48. Her Last Years Were Full Of Pain</span></h2><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Although Colette spent her later years as the toast of Paris—she was even nominated for the Nobel Prize in Literature in 1948— she was in unbelievable pain. She suffered with debilitating arthritis, and her younger, healthier husband Maurice Goudeket had to act more as her nurse than her lover as she entered the twilight of her life.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">But all the same, she did have one last scandal up her sleeve.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1045" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1046" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534710" data-dcnode-id="1052" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-1024x718.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-768x538.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-1536x1076.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-2048x1435.jpg 2048w" height="1794" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534710" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-scaled.jpg" alt="Colette facts" width="2560" height="1794" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-1024x718.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-768x538.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-1536x1076.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-56217093-2048x1435.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1047"><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1049" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1044" instrument_node="">
</span><h2 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">49. The Church Refused To Bury Her</span></h2><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">On August 3, 1954, Colette passed at the ripe old age of 81, having achieved things most women of her generation could only dream about. </span><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Nonetheless, she still had powerful enemies.</span></strong><span data-dcnode-id="1037" instrument_node=""> The Catholic Church, officially because of her many divorces, refused to let her have a Catholic burial. Don’t worry, though, Colette still managed to one-up the government from beyond the grave.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1027" style="width: 960px"><div class="media-credit-container alignnone" data-dcnode-id="1028" style="width: 960px"><img alt="Hoaxes Facts" class="lazy-hidden size-full wp-image-358390" data-dcnode-id="1034" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061.jpg 960w, https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061-768x576.jpg 768w" height="720" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-358390" src="https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061.jpg" alt="Hoaxes Facts" width="960" height="720" srcset="https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061.jpg 960w, https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/11/Rome-Church-Vatican-Catholic-St-Peters-Basilica-2677061-768x576.jpg 768w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1029"><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maxpixel.net/"><span data-dcnode-id="1031" instrument_node="">Max Pixel</span></a></span></div></figure><span data-dcnode-id="1026" instrument_node="">
</span><h2 data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">50. She Lies With The Greats</span></h2><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node="">In the end, Colette didn’t need no stinking Catholic burial; she got a state funeral instead for her contributions to French letters. Indeed, she was the very first woman writer to receive a state funeral. If you ever want to visit her grave, she is interred in the famous Père-Lachaise cemetery in Paris, alongside other scandalous women like the </span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-countess-castiglione/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1021" instrument_node="">Countess of Castiglione</span></a><span data-dcnode-id="1019" instrument_node="">.</span></p><span data-dcnode-id="1017" instrument_node="">
