</span><h1 class="entry-title" data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Scandalous Facts About Colette, The Most Notorious Woman In Paris</span></h1><span data-dcnode-id="2007" instrument_node="">
</span></div><span data-dcnode-id="2005" instrument_node="">
</span><div class="inner_content_wrapper inner_content" data-dcnode-id="971"><span data-dcnode-id="2004" instrument_node="">
</span><div class="entry-content" data-dcnode-id="973" itemprop="articleBody"><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Colette may have been the most gifted writer of her day, but she was also the most scandalous woman in Paris—and society didn’t have to pick up one of her books to find that out. From her disastrous marriages to her even more sordid affairs, Colette put propriety to shame in the most delicious ways possible. Yet for all that, dark and ruinous secrets stain her legacy.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><hr data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">
</span><h1 data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Colette Facts</span></h1><span data-dcnode-id="1995" instrument_node="">
</span><h2 data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">1. She Was Rich</span></h2><div class="partial_slot" data-dcnode-id="1992" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Although she has since become a one-name wonder, Colette was actually born as Sidonie-Gabrielle Colette in the winter of 1873 in Burgundy, France. Still, even from her first breaths, the little girl was remarkable. After all, her father was the bona fide war hero Jules-Joseph Colette, and her family had a good deal of money for the time. Sadly, her luck was about to change for the tragic.</span></p><span data-dcnode-id="1988" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1980" style="width: 805px"><div class="media-credit-container alignnone" data-dcnode-id="1981" style="width: 805px"><img alt="Colette facts " class="size-full wp-image-534431" data-dcnode-id="1987" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel.jpg" data-srcset="" height="618" sizes="(max-width: 805px) 100vw, 805px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel.jpg 805w, https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel-768x590.jpg 768w" width="805"><noscript data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">&lt;img class="size-full wp-image-534431" src="https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel.jpg" alt="Colette facts " width="805" height="618" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel.jpg 805w, https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Colette_-_photo_Henri_Manuel-768x590.jpg 768w" sizes="(max-width: 805px) 100vw, 805px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1982"><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colette"><span data-dcnode-id="1984" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1979" instrument_node="">
</span><h2 data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">2. Her Parents Failed Her</span></h2><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1975" instrument_node="">In her early years, Colette got nearly as good an education as a woman could in those days, and attended a public school until she was 17. But as Colette soaked up as much knowledge as she could, </span><strong data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">her family had an enormous downfall.</span></strong><span data-dcnode-id="1972" instrument_node=""> Over the years, her parents so badly mismanaged their money, the brood was almost destitute by the time Colette exited her schooling. Maybe this explains some of Colette’s very bad decision-making.</span></p><span data-dcnode-id="1970" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1962" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1963" style="width: 2560px"><img alt="Colette facts " class="size-full wp-image-534433 lazy-loaded" data-dcnode-id="1969" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-scaled.jpg" data-srcset="" height="1870" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-scaled.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-1024x748.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-768x561.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-1536x1122.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-2048x1496.jpg 2048w" width="2560"><noscript data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534433" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-scaled.jpg" alt="Colette facts " width="2560" height="1870" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-1024x748.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-768x561.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-1536x1122.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-104401887-2048x1496.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1964"><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1966" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1961" instrument_node="">
</span><h2 data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">3. She Fell In Love With A Famous Man</span></h2><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">When she was fresh out of school, Colette met and became infatuated with the dashing writer Henry Gauthier-Villars, AKA “Willy.” Still, writing wasn’t exactly what Willy was (in)famous for. He was better known around Paris as one of the most shameless libertines the arrondissements had ever seen, and he indulged in all manner of debauchery at all hours of the night or day. Oh, but that was far from all.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1947" style="width: 871px"><div class="media-credit-container alignnone" data-dcnode-id="1948" style="width: 871px"><img alt="Colette facts " class="size-full wp-image-534435" data-dcnode-id="1954" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5.jpg" data-srcset="" height="461" loading="lazy" sizes="(max-width: 871px) 100vw, 871px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5.jpg 871w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5-300x159.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5-768x406.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5-348x183.jpg 348w" width="871"><noscript data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534435" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5.jpg" alt="Colette facts " width="871" height="461" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5.jpg 871w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5-300x159.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5-768x406.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_1-5-348x183.jpg 348w" sizes="(max-width: 871px) 100vw, 871px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1949"><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1951" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1946" instrument_node="">
</span><h2 data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">4. She Liked Bad Men</span></h2><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1942" instrument_node="">Besides being a notorious bad boy, </span><strong data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Colette’s new lover had much more sinister qualities.</span></strong><span data-dcnode-id="1939" instrument_node=""> At 14 years her senior, Willy was much more experienced in life and the linens of the bedroom than the naïve Colette. So while Willy was all too happy to take Colette under his wing and introduce her to all the avant-garde luminaries of their day, Colette would find out too late what a double-edged sword this was.</span></p><span data-dcnode-id="1937" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1929" style="width: 837px"><div class="media-credit-container alignnone" data-dcnode-id="1930" style="width: 837px"><img alt="Colette facts " class="size-full wp-image-534437" data-dcnode-id="1936" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3.jpg" data-srcset="" height="460" loading="lazy" sizes="(max-width: 837px) 100vw, 837px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3.jpg 837w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3-300x165.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3-768x422.jpg 768w" width="837"><noscript data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534437" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3.jpg" alt="Colette facts " width="837" height="460" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3.jpg 837w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3-300x165.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_2-3-768x422.jpg 768w" sizes="(max-width: 837px) 100vw, 837px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1931"><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1933" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1928" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="1923" style="min-height: 120px;"><div data-dcnode-id="1924"><span data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Advertisement</span></span><div data-dcnode-id="1925" id="div-gpt-ad-3568692-15"></div></div></div><h2 data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">5. She Married For Status</span></h2><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">In 1893, at just barely 20 years old, Colette sealed the deal with her “Willy,” marrying him in an official ceremony. At first, it was all sunshine and rainbows. Not only did the marriage offer Colette some long-awaited financial stability, but she also started dipping her toes into writing herself; she published her first book, the coming-of-age novel </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Claudine à l’école,</span></em><span data-dcnode-id="1916" instrument_node=""> just a year later. Only…there was one gaping issue.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1906" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1907" style="width: 800px"><img alt="Colette facts" class="size-full wp-image-534542" data-dcnode-id="1913" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4.jpg" data-srcset="" height="601" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4-768x577.jpg 768w" width="800"><noscript data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534542" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4.jpg" alt="Colette facts" width="800" height="601" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_3-4-768x577.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1908"><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Gauthier-Villars"><span data-dcnode-id="1910" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1905" instrument_node="">
</span><h2 data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">6. Her Husband Stole Her Work</span></h2><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1901" instrument_node="">Although Colette would go on to publish four </span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Claudine</span></em><span data-dcnode-id="1898" instrument_node=""> novels and gain literary acclaim through them, </span><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">she had to make a great sacrifice for her fame.</span></strong><span data-dcnode-id="1895" instrument_node=""> Partly because of the social mores of the day and partly because she was still inexperienced, Colette actually published all of these novels under her husband’s “Willy” name. Yeah, as we’ll see….this was an extremely bad idea. And actually, the problems were already underway.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1885" style="width: 866px"><div class="media-credit-container alignnone" data-dcnode-id="1886" style="width: 866px"><img alt="Colette facts" class="size-full wp-image-534553" data-dcnode-id="1892" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5.jpg" data-srcset="" height="459" loading="lazy" sizes="(max-width: 866px) 100vw, 866px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5.jpg 866w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5-300x159.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5-768x407.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5-348x183.jpg 348w" width="866"><noscript data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534553" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5.jpg" alt="Colette facts" width="866" height="459" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5.jpg 866w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5-300x159.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5-768x407.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_5-5-348x183.jpg 348w" sizes="(max-width: 866px) 100vw, 866px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1887"><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1889" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1884" instrument_node="">
</span><h2 data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">7. She Married A Good-For-Nothing</span></h2><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1880" instrument_node="">See, while Colette was all starry-eyed for her smart, handsome, man about town, anyone who had really been around Willy for more than a few weeks knew the truth: He was an almost complete and total fake. In fact, he barely wrote at </span><em data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">all</span></em><span data-dcnode-id="1877" instrument_node="">, and instead functioned more as an impresario and pen name for other, more talented ghostwriters to pump up his brand. Ooh girl, run away now.</span></p><span data-dcnode-id="1875" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1867" style="width: 801px"><div class="media-credit-container alignnone" data-dcnode-id="1868" style="width: 801px"><img alt="Colette facts" class="size-full wp-image-534547" data-dcnode-id="1874" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3.jpg" data-srcset="" height="459" loading="lazy" sizes="(max-width: 801px) 100vw, 801px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3.jpg 801w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3-300x172.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3-768x440.jpg 768w" width="801"><noscript data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534547" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3.jpg" alt="Colette facts" width="801" height="459" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3.jpg 801w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3-300x172.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_4-3-768x440.jpg 768w" sizes="(max-width: 801px) 100vw, 801px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1869"><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1871" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1866" instrument_node="">
</span><h2 data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">8. Her Husband Pimped Her Out</span></h2><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1862" instrument_node="">In the ultimate gross guy move, Willy couldn’t help but get greedy over the success of the </span><em data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Claudine</span></em><span data-dcnode-id="1859" instrument_node=""> novels. Soon, he had branded Colette’s creative endeavors out into all manner of merchandise, including everything from soaps and perfumes to school uniforms and cigars. After all, why not treat your wife like a cash cow? In fact, why not amp up the mistreatment…</span></p><span data-dcnode-id="1857" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1849" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1850" style="width: 800px"><img alt="Colette facts" class="size-full wp-image-534555" data-dcnode-id="1856" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5.jpg" data-srcset="" height="456" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5-300x171.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5-768x438.jpg 768w" width="800"><noscript data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534555" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5.jpg" alt="Colette facts" width="800" height="456" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5-300x171.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_6-5-768x438.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1851"><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1853" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1848" instrument_node="">
</span><h2 data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">9. She Got A Disturbing Wedding Gift</span></h2><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">During their marriage, Colette’s husband didn’t let a ring stop him from doing exactly what—and whom—he pleased, and he didn’t waste any time getting back to his side pieces around Paris. This had heartbreaking consequences. Not only did the young Colette fall into a deep depression as her rosy view of her marriage shattered, but it’s also very likely that Willy gave her gonorrhea in their early years together. Would you believe it gets worse?</span></p><span data-dcnode-id="1842" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1834" style="width: 823px"><div class="media-credit-container alignnone" data-dcnode-id="1835" style="width: 823px"><img alt="Colette facts" class="size-full wp-image-534557" data-dcnode-id="1841" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4.jpg" data-srcset="" height="452" loading="lazy" sizes="(max-width: 823px) 100vw, 823px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4.jpg 823w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4-300x165.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4-768x422.jpg 768w" width="823"><noscript data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534557" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4.jpg" alt="Colette facts" width="823" height="452" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4.jpg 823w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4-300x165.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_7-4-768x422.jpg 768w" sizes="(max-width: 823px) 100vw, 823px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1836"><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1838" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1833" instrument_node="">

</span></div><h2 data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">10. Her Husband Treated Her Like A Prisoner</span></h2><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1776" instrument_node="">Willy’s paternal control over his wife’s publications was one thing, </span><strong data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">but behind closed doors, he was utterly chilling.</span></strong><span data-dcnode-id="1773" instrument_node=""> According to one story that Colette herself liked to tell, during the creation of the </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Claudine</span></em><span data-dcnode-id="1770" instrument_node=""> novels, Willy often “locked her in her room until she produced enough pages to suit him.” Okay, that’s rough, but maybe she asked for the motivation to work. Well, you’re going to want to sit down for this next one.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1760" style="width: 886px"><div class="media-credit-container alignnone" data-dcnode-id="1761" style="width: 886px"><img alt="Colette facts" class="size-full wp-image-534562" data-dcnode-id="1767" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5.jpg" data-srcset="" height="479" loading="lazy" sizes="(max-width: 886px) 100vw, 886px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5.jpg 886w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5-300x162.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5-768x415.jpg 768w" width="886"><noscript data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534562" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5.jpg" alt="Colette facts" width="886" height="479" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5.jpg 886w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5-300x162.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_8-5-768x415.jpg 768w" sizes="(max-width: 886px) 100vw, 886px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1762"><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1764" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1759" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="1754" style="min-height: 120px;"><div data-dcnode-id="1755"><span data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Advertisement</span></span><div data-dcnode-id="1756" id="div-gpt-ad-3568692-16"></div></div></div><h2 data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">11. She Wrote To “Please” Her Husband</span></h2><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1750" instrument_node="">Willy’s bedroom appetites were the stuff of legend around Paris, and his libido even had an enormous effect on Colette’s work. The</span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node=""> Claudine</span></em><span data-dcnode-id="1747" instrument_node=""> novels weren’t just coming-of-age stories, they were also Sapphic, sensual pieces of art, and it was Willy himself who insisted on this tone. He drove Colette to write about a “girls’ school or convent ruled by a seductive female teacher.”</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Only, as it happened, fiction wasn’t enough for Willy.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1734" style="width: 885px"><div class="media-credit-container alignnone" data-dcnode-id="1735" style="width: 885px"><img alt="Colette facts" class="size-full wp-image-534564" data-dcnode-id="1741" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5.jpg" data-srcset="" height="505" loading="lazy" sizes="(max-width: 885px) 100vw, 885px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5.jpg 885w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5-300x171.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5-768x438.jpg 768w" width="885"><noscript data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534564" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5.jpg" alt="Colette facts" width="885" height="505" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5.jpg 885w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5-300x171.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_9-5-768x438.jpg 768w" sizes="(max-width: 885px) 100vw, 885px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1736"><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1738" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1733" instrument_node="">
</span><h2 data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">12. She Made Scandalous Friends</span></h2><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node="">A good many of Willy and Colette’s friends were in the lesbian artistic set, and when Colette was still discovering what her sexuality was, Willy pushed her to make alliances with these women to boost her star power—and, you know, maybe direct some attention away from his endless affairs. But there was one thing Willy might not have been counting on: Colette, uh,</span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node=""> really</span></em><span data-dcnode-id="1726" instrument_node=""> liked these women. And she was waking the heck up.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1716" style="width: 959px"><div class="media-credit-container alignnone" data-dcnode-id="1717" style="width: 959px"><img alt="Colette facts" class="size-full wp-image-534567" data-dcnode-id="1723" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4.jpg" data-srcset="" height="488" loading="lazy" sizes="(max-width: 959px) 100vw, 959px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4.jpg 959w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4-300x153.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4-768x391.jpg 768w" width="959"><noscript data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534567" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4.jpg" alt="Colette facts" width="959" height="488" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4.jpg 959w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4-300x153.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_10-4-768x391.jpg 768w" sizes="(max-width: 959px) 100vw, 959px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1718"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1720" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1715" instrument_node="">
</span><h2 data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">13. She Was A Cool Girl</span></h2><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1711" instrument_node="">As the years wore on in her untraditional but nonetheless unhappy marriage, Colette started coping in strange ways. When she discovered that Willy was having yet another affair with his long-term mistress Charlotte Kinceler, Colette pulled the ultimate “no, I’m cool, everything is normal” move and later became Charlotte’s close friend. </span><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Then she went from making friends to getting revenge.</span></strong></p><span data-dcnode-id="1707" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1699" style="width: 839px"><div class="media-credit-container alignnone" data-dcnode-id="1700" style="width: 839px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534573" data-dcnode-id="1706" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4.jpg 839w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4-300x174.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4-768x446.jpg 768w" height="487" loading="lazy" sizes="(max-width: 839px) 100vw, 839px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="839"><noscript data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534573" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4.jpg" alt="Colette facts" width="839" height="487" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4.jpg 839w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4-300x174.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_12-4-768x446.jpg 768w" sizes="(max-width: 839px) 100vw, 839px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1701"><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1703" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1698" instrument_node="">
</span><h2 data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">14. She Got Back At Her Husband</span></h2><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">Soon enough, Colette did what many women would do and struck up her </span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">own</span></em><span data-dcnode-id="1691" instrument_node=""> affair, taking up with the beautiful American writer and socialite Georgie Raoul-Duval in March of 1901. With her literary star flying high and a devoted lover on her arm, Colette must have felt fully in her power. Except…as her tryst continued, there was a very crucial piece of information she was missing.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1681" style="width: 1168px"><div class="media-credit-container alignnone" data-dcnode-id="1682" style="width: 1168px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534571" data-dcnode-id="1688" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3.jpg 1168w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3-300x151.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3-1024x514.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3-768x385.jpg 768w" height="586" loading="lazy" sizes="(max-width: 1168px) 100vw, 1168px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1168"><noscript data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534571" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3.jpg" alt="Colette facts" width="1168" height="586" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3.jpg 1168w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3-300x151.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3-1024x514.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_11-3-768x385.jpg 768w" sizes="(max-width: 1168px) 100vw, 1168px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1683"><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1685" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1680" instrument_node="">
</span><h2 data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">15. She Was In A Soap Opera Plot</span></h2><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1676" instrument_node="">Let it not be said that Colette and Willy were </span><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">completely</span></em><span data-dcnode-id="1673" instrument_node=""> mismatched for each other because they apparently had the same taste in women. See, shortly after Colette seduced Georgie, her husband Willy </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">also</span></em><span data-dcnode-id="1670" instrument_node=""> jumped into bed with the socialite, though neither spouse knew about their soap-opera predicament. </span><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">And when they did find out, it produced their most scandalous scene yet.</span></strong></p><span data-dcnode-id="1666" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1658" style="width: 825px"><div class="media-credit-container alignnone" data-dcnode-id="1659" style="width: 825px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534575" data-dcnode-id="1665" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3.jpg 825w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3-300x179.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3-768x457.jpg 768w" height="491" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="825"><noscript data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534575" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3.jpg" alt="Colette facts" width="825" height="491" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3.jpg 825w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3-300x179.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_13-3-768x457.jpg 768w" sizes="(max-width: 825px) 100vw, 825px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1660"><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1662" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1657" instrument_node="">
</span><h2 data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">16. She Had A Public Menage A Trois</span></h2><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Gossip always gets out, so it was only a matter of time before Colette and Willy realized they had the exact same side piece. Instead of fighting over it, however, the sexually liberated Parisians decided to become a threesome and even took Georgie to the Bayreuth festival together to partake in some music-making….as well as other things.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Still, you know what they always say: Every ill-conceived polyamorous marriage has to implode eventually. And oh, did it ever.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1640" style="width: 991px"><div class="media-credit-container alignnone" data-dcnode-id="1641" style="width: 991px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534578" data-dcnode-id="1647" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3.jpg 991w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3-300x149.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3-768x381.jpg 768w" height="492" loading="lazy" sizes="(max-width: 991px) 100vw, 991px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="991"><noscript data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534578" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3.jpg" alt="Colette facts" width="991" height="492" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3.jpg 991w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3-300x149.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_14-3-768x381.jpg 768w" sizes="(max-width: 991px) 100vw, 991px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1642"><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1644" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1639" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1638" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF3" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF4"></div><h2 data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">17. She Had A Drawn-Out Divorce</span></h2><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">As Colette explored her sexuality, she began to look upon Willy and her marriage more as a burden than a safety blanket. In 1906, after more than a decade together, the 33-year-old Colette (finally!) split from her not-great husband, though the divorce only officially went through a full four years later, in 1910. In the meantime, Colette had an extremely rude awakening.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1624" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1625" style="width: 1000px"><img alt="Divorce Facts" class="lazy-hidden size-full wp-image-482637" data-dcnode-id="1631" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342-768x512.jpg 768w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-482637" src="https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342.jpg" alt="Divorce Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/05/shutterstock_1598380342-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1626"><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1628" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1623" instrument_node="">
</span><h2 data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">18. Her Ex Backstabbed Her</span></h2><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1619" instrument_node="">While Colette had been under Willy’s wing, things hadn’t been the best. </span><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">But after her separation, she experienced a vicious betrayal.</span></strong><span data-dcnode-id="1616" instrument_node=""> Because she had published the </span><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Claudine</span></em><span data-dcnode-id="1613" instrument_node=""> novels under the umbrella of Willy’s brand, it was her husband, not her, who owned all the extensive copyrights—and he refused to let her see a cent of the heaps of money the novels made.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">Instead, the celebrated writer experienced crushing poverty once more. But she was </span><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Colette</span></em><span data-dcnode-id="1607" instrument_node="">, dammit. She knew what she had to do.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1597" style="width: 2532px"><div class="media-credit-container alignnone" data-dcnode-id="1598" style="width: 2532px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534591" data-dcnode-id="1604" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1.jpg 2532w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-1024x755.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-768x566.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-1536x1132.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-2048x1509.jpg 2048w" height="1866" loading="lazy" sizes="(max-width: 2532px) 100vw, 2532px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2532"><noscript data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534591" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1.jpg" alt="Colette facts" width="2532" height="1866" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1.jpg 2532w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-1024x755.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-768x566.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-1536x1132.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3245600-1-2048x1509.jpg 2048w" sizes="(max-width: 2532px) 100vw, 2532px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1599"><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1601" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1596" instrument_node="">
</span><h2 data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">19. She Went To Desperate Measures</span></h2><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">In 1912, Colette took to the stage, playing her “Claudine” character in any production that would have her, earning pennies for her work and barely scraping by on the scraps of bread they would buy her. Only, there was quite the silver lining: Working on the stage put Colette into contact with scores of beautiful, liberal women…and Colette was ready to take full advantage.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1582" style="width: 903px"><div class="media-credit-container alignnone" data-dcnode-id="1583" style="width: 903px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534595" data-dcnode-id="1589" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3.jpg 903w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3-300x152.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3-768x390.jpg 768w" height="459" loading="lazy" sizes="(max-width: 903px) 100vw, 903px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="903"><noscript data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534595" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3.jpg" alt="Colette facts" width="903" height="459" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3.jpg 903w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3-300x152.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_15-3-768x390.jpg 768w" sizes="(max-width: 903px) 100vw, 903px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1584"><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1586" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1581" instrument_node="">
</span><h2 data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">20. She Went Both Ways</span></h2><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1577" instrument_node="">While working on the stage and still writing on the side, </span><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">one of Colette’s habits scandalized “polite” society.</span></strong><span data-dcnode-id="1574" instrument_node=""> She entered into several high-profile relationships with women, including the novelist Natalie Clifford Barney, a woman-eater if there ever was one and one of the most influential society women. But when it came to her love affairs, Colette was just warming up.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1564" style="width: 945px"><div class="media-credit-container alignnone" data-dcnode-id="1565" style="width: 945px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534603" data-dcnode-id="1571" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1.jpg 945w, https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1-768x595.jpg 768w" height="732" loading="lazy" sizes="(max-width: 945px) 100vw, 945px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="945"><noscript data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534603" src="https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1.jpg" alt="Colette facts" width="945" height="732" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1.jpg 945w, https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Natalie_Barney_in_Fur_Cape-1-768x595.jpg 768w" sizes="(max-width: 945px) 100vw, 945px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1566"><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natalie_Clifford_Barney"><span data-dcnode-id="1568" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1563" instrument_node="">
</span><h2 data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">21. She Had A Scandalous Lover</span></h2><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">After splitting from the frankly horrific Willy, Colette sowed her wild oats in a big way. One of her other lovers was the dashing trans-masculine Mathilde de Morny, Marquise de Belbeuf, who went by the name of “Max,” or “Uncle Max” (if you’re nasty). De Morny was one of the most scandalous figures in Paris, having been assigned female at birth but who dressed and lived openly as man, defying scores of French laws with impeccable style.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">In other words, handsome Uncle Max was just what the doctor ordered for the rebounding Colette, and it wasn’t long before they shacked up together. But with a pair as hot and heavy as those two, drama would always follow.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1546" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1547" style="width: 800px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534610" data-dcnode-id="1553" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1-768x614.jpg 768w" height="640" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534610" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1.jpg" alt="Colette facts" width="800" height="640" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_16-1-1-768x614.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1548"><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathilde_de_Morny"><span data-dcnode-id="1550" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1545" instrument_node="">
</span><h2 data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">22. She Mixed Business With Pleasure</span></h2><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1541" instrument_node="">Both Colette and Max were obsessed with performing on the stage at this point, and they decided to shake up the theater world with one infamous act. On January 3, 1907, the couple put on the pantomime </span><em data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Rêve d’Égypte</span></em><span data-dcnode-id="1538" instrument_node=""> together, performing it at the notorious Moulin Rouge. The crowd that night must have been expecting a risqué act—</span><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">but nothing could have prepared them for what they saw.</span></strong></p><span data-dcnode-id="1534" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1526" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1527" style="width: 800px"><img alt="Edith Piaf facts" class="lazy-hidden size-full wp-image-486273" data-dcnode-id="1533" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge-768x569.jpg 768w" height="593" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-486273" src="https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge.jpg" alt="Edith Piaf facts" width="800" height="593" srcset="https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/02/Paris_1914_Moulin_Rouge-768x569.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1528"><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moulin_Rouge%23/media/File%3AParis_1914_Moulin_Rouge.jpg"><span data-dcnode-id="1530" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1525" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1524" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF4" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF5"></div><h2 data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">23. She Almost Started A Riot</span></h2><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">During their performance together, de Morny played an Egyptologist romancing Colette’s character, and during one love scene, the pair shared a kiss for the titillation of the crowd. It was instant pandemonium. Even this libertine audience clutched their pearls at the idea of two people they perceived as women getting their PDA on, and they nearly started a riot. Still, more dire consequences were ahead.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1510" style="width: 923px"><div class="media-credit-container alignnone" data-dcnode-id="1511" style="width: 923px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534633" data-dcnode-id="1517" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3.jpg 923w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3-300x152.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3-768x389.jpg 768w" height="467" loading="lazy" sizes="(max-width: 923px) 100vw, 923px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="923"><noscript data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534633" src="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3.jpg" alt="Colette facts" width="923" height="467" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3.jpg 923w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3-300x152.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Screenshot_17-3-768x389.jpg 768w" sizes="(max-width: 923px) 100vw, 923px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1512"><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//number9films.co.uk/"><span data-dcnode-id="1514" instrument_node="">Colette (2018), Number 9 Films</span></a></span></div></figure><span data-dcnode-id="1509" instrument_node="">
</span><h2 data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">24. She Had A Star-Crossed Love</span></h2><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Colette and de Morny’s kiss was no flash in the pan scandal. The authorities shut down the production entirely, and the infamy crept into their private lives as well. Where before they could live together in relative peace as, ahem, “roommates,” they now had to keep any of their cohabitations a secret, even as they continued their relationship for five more years.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Soon enough, though, Colette was moving on from high society gossip to genuine infamy.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1492" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1493" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534640" data-dcnode-id="1499" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-1024x735.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-768x551.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-1536x1103.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-2048x1471.jpg 2048w" height="1838" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534640" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-scaled.jpg" alt="Colette facts" width="2560" height="1838" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-1024x735.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-768x551.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-1536x1103.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-541081551-2048x1471.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1494"><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1496" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1491" instrument_node="">
</span><h2 data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">25. She Married Up</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1487" instrument_node="">By 1912, Colette seemed to have moved on from both de Morny and this more bohemian phase of her life. She met and then married her second husband, the respectable Henry de Jouvenel, who was the editor of the French daily paper</span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node=""> Le Matin</span></em><span data-dcnode-id="1484" instrument_node=""> and came from a long line of lawyers and politicians. The next year, they even had a child together, a daughter they named Colette and nicknamed “Bel-Gazou,” which is colloquial French for “beautiful babbling.”</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Yes, it seems like Colette finally had it all…but appearances can be deceiving.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1471" style="width: 1256px"><div class="media-credit-container alignnone" data-dcnode-id="1472" style="width: 1256px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534653" data-dcnode-id="1478" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie.jpg 1256w, https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie-1024x806.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie-768x605.jpg 768w" height="989" loading="lazy" sizes="(max-width: 1256px) 100vw, 1256px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1256"><noscript data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534653" src="https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie.jpg" alt="Colette facts" width="1256" height="989" srcset="https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie.jpg 1256w, https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie-1024x806.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/Atelier_Nadar_-_Henri_de_Jouvenel_1876-1935_Politiker_und_Journalist_Zeno_Fotografie-768x605.jpg 768w" sizes="(max-width: 1256px) 100vw, 1256px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1473"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAtelier_Nadar_-_Henri_de_Jouvenel_%281876-1935%29%2C_Politiker_und_Journalist_%28Zeno_Fotografie%29.jpg"><span data-dcnode-id="1475" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1470" instrument_node="">
</span><h2 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">26. She Abandoned Her Daughter</span></h2><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">One of the early warning signs in Colette’s new marriage was her relationship with little Bel-Gazou. Which is to say, she had very little of one. Although she had waited a long time to have children, Colette seemed to regret the one she did have, and she was regularly away from the girl for six months at a time during her most formative years. Unfortunately, that’s not even the whole story.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1456" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1457" style="width: 2560px"><img alt="Colette facts" class="lazy-hidden size-full wp-image-534647" data-dcnode-id="1463" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-1024x763.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-768x572.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-1536x1144.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-2048x1526.jpg 2048w" height="1907" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-534647" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-scaled.jpg" alt="Colette facts" width="2560" height="1907" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-1024x763.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-768x572.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-1536x1144.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3244924-2048x1526.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1458"><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1460" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1455" instrument_node="">
</span><h2 data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">27. She Was Physically Abusive</span></h2><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">Colette had very little patience for grown men, and she seemed to have even less for her daughter. </span><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">One day, it came to an extremely disturbing climax.</span></strong><span data-dcnode-id="1448" instrument_node=""> Colette confessed that, at one point, Bel-Gazou angered her so terribly, she grabbed a horsewhip to whack her with. Thankfully, a friend intervened, tearing it out of her hand to prevent her from using it.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Perhaps most tragic of all, Colette made no apologies for her behavior. Quite the opposite, actually.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1435" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1436" style="width: 1280px"><img alt="Marquis De Sade facts" class="lazy-hidden size-full wp-image-520905" data-dcnode-id="1442" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip-768x576.jpg 768w" height="960" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-520905" src="https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip.jpg" alt="Marquis De Sade facts" width="1280" height="960" srcset="https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/06/1280px-Brown_Nylon_Bullwhip-768x576.jpg 768w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1437"><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABrown_Nylon_Bullwhip.jpg"><span data-dcnode-id="1439" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1434" instrument_node="">
</span><h2 data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">28. She Was Proud Of Her Negligence</span></h2><span data-dcnode-id="1431" instrument_node="">
