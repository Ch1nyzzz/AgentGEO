</span><figure class="wp-caption alignnone" data-dcnode-id="2743" style="width: 4961px"><div class="media-credit-container alignnone" data-dcnode-id="2744" style="width: 4961px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-288997" data-dcnode-id="2750" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903.jpg 4961w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-768x543.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-1024x724.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-270x190.jpg 270w" height="3508" loading="lazy" sizes="(max-width: 4961px) 100vw, 4961px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4961"><noscript data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-288997" src="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903.jpg" alt="Joan Crawford facts" width="4961" height="3508" srcset="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903.jpg 4961w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-768x543.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-1024x724.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_581893903-270x190.jpg 270w" sizes="(max-width: 4961px) 100vw, 4961px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2745"><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2747" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2742" instrument_node="">
</span><h2 data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">57. Not Dead Yet</span></h2><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">After this tumultuous period, Crawford came roaring back with the 1945 release of </span><em data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Mildred Pierce</span></em><span data-dcnode-id="2735" instrument_node="">. The film was a major hit, and Crawford won rave reviews for her performance as the title character. She would go onto win Best Actress at the Oscars for the role—surprisingly, it would be her only win at the Academy Awards.</span></p><span data-dcnode-id="2733" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2725" style="width: 1008px"><div class="media-credit-container alignnone" data-dcnode-id="2726" style="width: 1008px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289001" data-dcnode-id="2732" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04.png 1008w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04-300x198.png 300w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04-768x506.png 768w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04-340x225.png 340w" height="664" loading="lazy" sizes="(max-width: 1008px) 100vw, 1008px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1008"><noscript data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289001" src="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04.png" alt="Joan Crawford facts" width="1008" height="664" srcset="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04.png 1008w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04-300x198.png 300w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04-768x506.png 768w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-12-59-04-340x225.png 340w" sizes="(max-width: 1008px) 100vw, 1008px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2727"><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.warnerbros.com/"><span data-dcnode-id="2729" instrument_node="">Mildred Pierce (1945), Warner Bros.</span></a></span></div></figure><span data-dcnode-id="2724" instrument_node="">
</span><h2 data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">58. Crawford’s Brood</span></h2><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Throughout her life, Crawford successfully adopted four children: Christina, Christopher, Cindy, and Cathy. Another child, also named Christopher, was reclaimed by his birth mother shortly after the adoption.</span></p><span data-dcnode-id="2718" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2710" style="width: 3873px"><div class="media-credit-container alignnone" data-dcnode-id="2711" style="width: 3873px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-288994" data-dcnode-id="2717" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050.jpg 3873w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050-768x584.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050-1024x778.jpg 1024w" height="2944" loading="lazy" sizes="(max-width: 3873px) 100vw, 3873px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3873"><noscript data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-288994" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050.jpg" alt="Joan Crawford facts" width="3873" height="2944" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050.jpg 3873w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050-768x584.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-940105050-1024x778.jpg 1024w" sizes="(max-width: 3873px) 100vw, 3873px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2712"><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2714" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2709" instrument_node="">
</span><h2 data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">59. Cleanliness Is Next to Godliness</span></h2><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">One of&nbsp;the&nbsp;most infamous claims about Crawford was that she was obsessed with cleanliness and order. Though her rivals may have made some other unverifiable accusations throughout her career, Crawford was indeed a germaphobe. In an interview, her interior designer Carleton Varney said, “There were more objects wrapped in plastic in Joan’s apartment than in an A&amp;P meat counter.”</span></p><span data-dcnode-id="2703" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2695" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2696" style="width: 1000px"><img alt="David Beckham Facts" class="lazy-hidden size-full wp-image-276696" data-dcnode-id="2702" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-276696" src="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872.jpg" alt="David Beckham Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/09/shutterstock_1011272872-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2697"><a data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2699" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2694" instrument_node="">
</span><h2 data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">60. No Money for You</span></h2><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">In her will, Crawford left her children Cindy and Cathy $77,500 each, while infamously shutting out Christina and Christopher. This was no mere forgetful snub: Crawford explicitly disinherited them, writing, “It is my intention to make no provision herein for my son, Christopher, or my daughter, Christina, for reasons which are well known to them.”</span></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Christina and Christopher would both challenge the will, and were later afforded a big settlement.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2677" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2678" style="width: 1000px"><img alt="Margaret Tudor Facts" class="lazy-hidden size-full wp-image-281241" data-dcnode-id="2684" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134-768x513.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134-360x240.jpg 360w" height="668" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-281241" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134.jpg" alt="Margaret Tudor Facts" width="1000" height="668" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134-768x513.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_434570134-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2679"><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2681" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2676" instrument_node="">
</span><h2 data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">61. Tell-All</span></h2><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2668"><span data-dcnode-id="2672" instrument_node="">In 1978, Christina released a tell-all book entitled </span><em data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Mommie Dearest, </span></em><span data-dcnode-id="2669" instrument_node="">which described her fraught relationship with her legendary actress mother. Christina alleged that she and her brother Christopher were both victims of emotional and physical abuse by her mother. The book caused a huge sensation, and it quickly topped the bestsellers list.</span></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">The book’s incendiary claims were disputed by many of Crawford’s friends, though others also spoke in favor of its veracity.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2656" style="width: 2203px"><div class="media-credit-container alignnone" data-dcnode-id="2657" style="width: 2203px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289125" data-dcnode-id="2663" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg 2203w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-300x253.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-768x648.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-1024x865.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-120x102.jpg 120w" height="1860" loading="lazy" sizes="(max-width: 2203px) 100vw, 2203px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2203"><noscript data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289125" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg" alt="Joan Crawford facts" width="2203" height="1860" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg 2203w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-300x253.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-768x648.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-1024x865.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-120x102.jpg 120w" sizes="(max-width: 2203px) 100vw, 2203px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2658"><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2660" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2655" instrument_node="">
</span><h2 data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">62. Not the Girl Next Door</span></h2><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Crawford was infamous for once quipping about her glamorous looks and prickly personality, “If you want to see the girl next door, go next door.”</span></p><span data-dcnode-id="2649" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2641" style="width: 2219px"><div class="media-credit-container alignnone" data-dcnode-id="2642" style="width: 2219px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289047" data-dcnode-id="2648" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg 2219w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-768x644.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-1024x858.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-120x102.jpg 120w" height="1860" loading="lazy" sizes="(max-width: 2219px) 100vw, 2219px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2219"><noscript data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289047" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg" alt="Joan Crawford facts" width="2219" height="1860" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg 2219w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-768x644.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-1024x858.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-120x102.jpg 120w" sizes="(max-width: 2219px) 100vw, 2219px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2643"><a data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2645" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2640" instrument_node="">
</span><h2 data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">63. Bette Davis: Oscar Favorite</span></h2><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">As with Crawford, any piece of writing about Bette Davis threatens to just be about their legendary feud (which we will certainly get to…) However, Davis was a Hollywood juggernaut in her own terms. With her famously big eyes and embrace of “unlikable” characters, Davis put everything she had into her craft—and got a whopping 10 Oscar nominations for her efforts.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2626" style="width: 800px"><div class="media-credit-container aligncenter" data-dcnode-id="2627" style="width: 800px"><img alt="Bette Davis Facts" class="lazy-hidden size-full wp-image-277477" data-dcnode-id="2633" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19.jpg 800w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19-768x584.jpg 768w" height="608" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277477" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19.jpg" alt="Bette Davis Facts" width="800" height="608" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19.jpg 800w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-19-768x584.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2628"><a data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pt.wikipedia.org/wiki/Ficheiro%3ABette_Davis_in_The_Pefrified_Forest_film_trailer.jpg"><span data-dcnode-id="2630" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2625" instrument_node="">
</span><h2 data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">64. Taking Time to Catch on</span></h2><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Right from the beginning of her career, people had polarizing opinions about Bette Davis. She was actually turned down by the Manhattan Civic Repertory Theatre for her “frivolous” and insincere” attitude. Likewise, when she went to Hollywood for her first screen test in 1930, a studio head failed to meet her at the airport. He had actually gone, but saw no one who “looked like an actress” at the terminal—even though she was standing right there.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Let me just say: OUCH.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2608" style="width: 3544px"><div class="media-credit-container alignnone" data-dcnode-id="2609" style="width: 3544px"><img alt="Bette Davis Facts" class="lazy-hidden size-full wp-image-277320" data-dcnode-id="2615" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785.jpg 3544w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785-768x599.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785-1024x799.jpg 1024w" height="2764" loading="lazy" sizes="(max-width: 3544px) 100vw, 3544px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3544"><noscript data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277320" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785.jpg" alt="Bette Davis Facts" width="3544" height="2764" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785.jpg 3544w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785-768x599.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2673785-1024x799.jpg 1024w" sizes="(max-width: 3544px) 100vw, 3544px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2610"><a data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2612" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2607" instrument_node="">
</span><h2 data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">65. Stick It to the Man</span></h2><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">1983 was not a healthy year for Bette Davis. Not only was she diagnosed with breast cancer, but she suffered four strokes and became paralyzed on the left side of her face and left arm—just within two weeks of her mastectomy surgery. But even during (and after) her illnesses, Davis continued to smoke about 100 cigarettes a day.</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">She preferred Vanguards and smoked them constantly. She couldn’t even let them go for a 10-minute interview.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2590" style="width: 944px"><div class="media-credit-container alignnone" data-dcnode-id="2591" style="width: 944px"><img alt="Bette Davis Facts" class="lazy-hidden size-full wp-image-277434" data-dcnode-id="2597" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720.jpg 944w, https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720-768x586.jpg 768w" height="720" loading="lazy" sizes="(max-width: 944px) 100vw, 944px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="944"><noscript data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277434" src="https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720.jpg" alt="Bette Davis Facts" width="944" height="720" srcset="https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720.jpg 944w, https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/bette-davis-401258_960_720-768x586.jpg 768w" sizes="(max-width: 944px) 100vw, 944px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2592"><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2594" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="2589" instrument_node="">
</span><h2 data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">66. Eager to Be Ugly</span></h2><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2585" instrument_node="">Davis wasn’t afraid to look as gross as required by her roles. She did her own makeup to play the titular unhinged has-been in </span><em data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">What Ever Happened to Baby Jane?</span></em><span data-dcnode-id="2582" instrument_node=""> No professional “make-up man” wanted his name attached to how grotesque Davis wanted to look in the movie. To quote the actress, “One told me he was afraid that if he did what I wanted, he might never work again.”</span></p><span data-dcnode-id="2580" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2572" style="width: 2728px"><div class="media-credit-container aligncenter" data-dcnode-id="2573" style="width: 2728px"><img alt="Bette Davis Facts" class="lazy-hidden size-full wp-image-277438" data-dcnode-id="2579" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13.jpg 2728w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-768x514.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-1024x685.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-360x240.jpg 360w" height="1826" loading="lazy" sizes="(max-width: 2728px) 100vw, 2728px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2728"><noscript data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277438" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13.jpg" alt="Bette Davis Facts" width="2728" height="1826" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13.jpg 2728w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-768x514.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-1024x685.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-13-360x240.jpg 360w" sizes="(max-width: 2728px) 100vw, 2728px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2574"><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2576" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2571" instrument_node="">
</span><h2 data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">67. Clara Bow: It Girl Extraordinaire</span></h2><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Clara Bow was a silent film actress from the 1920s who is largely considered Hollywood’s First “It” Girl. With her tomboy charms and expressive face, Bow took Old Hollywood by storm as one of the most iconic “flapper” actresses of her day. These days, Bow’s name isn’t uttered with the same esteem as silent stars such as Lillian Gish or Charlie Chaplin, but her life and career had both the credits and the scandal to match either of those legends.</span></p><span data-dcnode-id="2565" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2557" style="width: 3011px"><div class="media-credit-container aligncenter" data-dcnode-id="2558" style="width: 3011px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224113" data-dcnode-id="2564" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg 3011w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-300x254.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-768x650.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-1024x866.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-120x102.jpg 120w" height="2547" loading="lazy" sizes="(max-width: 3011px) 100vw, 3011px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3011"><noscript data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224113" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg" alt="Clara Bow facts" width="3011" height="2547" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg 3011w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-300x254.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-768x650.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-1024x866.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-120x102.jpg 120w" sizes="(max-width: 3011px) 100vw, 3011px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2559"><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="2561" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2556" instrument_node="">
</span><h2 data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">68. Started From the Bottom</span></h2><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Bow was born to very humble origins. It’s said she entered this world in a “bleak, sparsely furnished room above [a] dilapidated Baptist Church” in Brooklyn.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2542" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="2543" style="width: 900px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223946" data-dcnode-id="2549" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/40-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/40-1.jpg 900w, https://www.factinate.com/wp-content/uploads/2018/12/40-1-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/40-1-768x550.jpg 768w" height="644" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223946" src="https://www.factinate.com/wp-content/uploads/2018/12/40-1.jpg" alt="Clara Bow facts" width="900" height="644" srcset="https://www.factinate.com/wp-content/uploads/2018/12/40-1.jpg 900w, https://www.factinate.com/wp-content/uploads/2018/12/40-1-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/40-1-768x550.jpg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2544"><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixnio.com/"><span data-dcnode-id="2546" instrument_node="">Pixnio</span></a></span></div></figure><span data-dcnode-id="2541" instrument_node="">
</span><h2 data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">69. A Rough Landing</span></h2><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Bow’s birth was also risky: her two older sisters had just died in infancy and her mother was medically advised to not become pregnant again. If that wasn’t enough, Bow was born amidst a massive heatwave. Despite it all, both mother and child were healthy. To quote the actress, “I don’t suppose two people ever looked death in the face more clearly than my mother and I the morning I was born.”</span></p><span data-dcnode-id="2535" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2527" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="2528" style="width: 1920px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223948" data-dcnode-id="2534" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/39.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/39.jpg 1920w, https://www.factinate.com/wp-content/uploads/2018/12/39-300x205.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/39-768x524.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/39-1024x699.jpg 1024w" height="1311" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223948" src="https://www.factinate.com/wp-content/uploads/2018/12/39.jpg" alt="Clara Bow facts" width="1920" height="1311" srcset="https://www.factinate.com/wp-content/uploads/2018/12/39.jpg 1920w, https://www.factinate.com/wp-content/uploads/2018/12/39-300x205.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/39-768x524.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/39-1024x699.jpg 1024w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2529"><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicdomainpictures.net/en/index.php"><span data-dcnode-id="2531" instrument_node="">Public Domain Pictures</span></a></span></div></figure><span data-dcnode-id="2526" instrument_node="">
</span><h2 data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">70. Drawn Back to Life</span></h2><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Cartoon character Betty Boop was partly modeled after Clara Bow. The character is also inspired by fellow entertainer Helen Kane.</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2516"><img alt="Clara Bow facts" class="lazy-hidden aligncenter size-full wp-image-224191" data-dcnode-id="2519" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11.jpg 1509w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11-768x587.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11-1024x783.jpg 1024w" height="1154" loading="lazy" sizes="(max-width: 1509px) 100vw, 1509px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1509"><noscript data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-224191" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11.jpg" alt="Clara Bow facts" width="1509" height="1154" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11.jpg 1509w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11-768x587.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-11-1024x783.jpg 1024w" sizes="(max-width: 1509px) 100vw, 1509px" /&gt;</span></noscript></p><span data-dcnode-id="2515" instrument_node="">
</span><h2 data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">71. We Have a Winner</span></h2><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Whereas Bow’s father was supportive of her acting dreams, her mother once declared that her daughter “would be much better off dead” than work as an actress. Nevertheless, Bow competed in her first nationwide acting contest when she was only 16. Though she eventually proved her mother wrong, their relationship would always be strained.</span></p><span data-dcnode-id="2509" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2501" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2502" style="width: 1024px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223968" data-dcnode-id="2508" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-300x269.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-768x688.jpg 768w" height="917" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223968" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg" alt="Clara Bow facts" width="1024" height="917" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-300x269.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-768x688.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2503"><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="2505" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2500" instrument_node="">
</span><h2 data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">72. She’s Got It</span></h2><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2496" instrument_node="">Clara Bow’s big break came with her role in the 1927 movie </span><em data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">It, </span></em><span data-dcnode-id="2493" instrument_node="">a silent film adaptation of an Elinor Glyn novella—not the Stephen King horror novel. The movie was an absolutely blockbuster at the time and earned her the nickname “It Girl,” which is still used to this day. The “It-Girls” of the future had Clara to thank for the moniker.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2483" style="width: 768px"><div class="media-credit-container alignnone" data-dcnode-id="2484" style="width: 768px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224017" data-dcnode-id="2490" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-360x240.jpg 360w" height="515" loading="lazy" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="768"><noscript data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224017" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg" alt="Clara Bow facts" width="768" height="515" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-360x240.jpg 360w" sizes="(max-width: 768px) 100vw, 768px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2485"><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="2487" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2482" instrument_node="">
</span><h2 data-dcnode-id="2478"><span data-dcnode-id="2481" instrument_node="">73. Stick Your Nose up at </span><em data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">This</span></em></h2><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Bow had plenty of charm, but not a lot of high-class manners. In fact, her demeanor was considered quite “dreadful” to high society. She acted as a constant reminder of Hollywood’s ambiguous position to the upper-class order. Bow refused to bow down to their “old” rules and stated, “They are snobs. Frightful snobs…I’m a curiosity in Hollywood. I’m a big freak, because I’m myself!”</span></p><span data-dcnode-id="2474" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2466" style="width: 3466px"><div class="media-credit-container alignnone" data-dcnode-id="2467" style="width: 3466px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224086" data-dcnode-id="2473" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg 3466w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-768x553.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-1024x737.jpg 1024w" height="2496" loading="lazy" sizes="(max-width: 3466px) 100vw, 3466px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3466"><noscript data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224086" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg" alt="Clara Bow facts" width="3466" height="2496" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg 3466w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-768x553.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-1024x737.jpg 1024w" sizes="(max-width: 3466px) 100vw, 3466px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2468"><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="2470" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2465" instrument_node="">
</span><h2 data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">74. You Have to See It to Hear It</span></h2><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2461" instrument_node="">The shift from silent films to talkies shook up Bow’s confidence. Not used to microphones, several scenes in </span><em data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">The Wild Party</span></em><span data-dcnode-id="2458" instrument_node=""> had to be reshot because her eyes kept looking up at the overhead sound equipment. Riddled with nerves, it was reported she kept “rows of bottles of sedatives” at her bedside just to keep it together.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2448" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2449" style="width: 800px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224109" data-dcnode-id="2455" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-768x616.jpg 768w" height="642" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224109" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg" alt="Clara Bow facts" width="800" height="642" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-768x616.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2450"><a data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Fichier%3AMarceline_Day-Clara_Bow_in_The_Wild_Party.jpg"><span data-dcnode-id="2452" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2447" instrument_node="">
</span><h2 data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">75. Taking a Break</span></h2><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">By 1931, Clara Bow was sometimes referred to by executives as “Crisis-a-day-Clara.” The pressure of fame, her fading star, and a troubling lawsuit from her secretary put Bow’s mental health in a bad place. Entering a sanitorium at the age of 25, she asked to be released from her final film with Paramount. This retreat effectively ended Bow’s career.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2433" style="width: 2206px"><div class="media-credit-container aligncenter" data-dcnode-id="2434" style="width: 2206px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224036" data-dcnode-id="2440" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3.jpg 2206w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3-300x249.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3-768x638.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3-1024x851.jpg 1024w" height="1834" loading="lazy" sizes="(max-width: 2206px) 100vw, 2206px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2206"><noscript data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224036" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3.jpg" alt="Clara Bow facts" width="2206" height="1834" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3.jpg 2206w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3-300x249.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3-768x638.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-3-1024x851.jpg 1024w" sizes="(max-width: 2206px) 100vw, 2206px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2435"><a data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="2437" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2432" instrument_node="">
</span><h2 data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">78. Louis Brooks: The Sad Story of Lulu</span></h2><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Louise Brooks was once one of the world’s biggest stars. With her bobbed haircut and hard-partying lifestyle, “Lulu” epitomized the Jazz Age Flapper Girl, bringing a sense of flirtatious fun to the stages and screens in the United States and Europe. And then, just as suddenly as she came, she was gone. Whatever happened to the It Girl of the 1920s?</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2422"><img alt="Louise Brooks Facts" class="lazy-hidden aligncenter size-full wp-image-257210" data-dcnode-id="2425" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-257210" src="https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1.jpg" alt="Louise Brooks Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/4-Louise-Brooks-Rec-1-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></p><span data-dcnode-id="2421" instrument_node="">
</span><h2 data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">79. Thanks, But No Thanks</span></h2><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Beautiful and more than a little reckless, Brooks carried on numerous affairs with both men and women. She even carried on a brief fling with her silver screen competitor, Greta Garbo. Brooks never considered herself bisexual, however; she said, “Out of curiosity, I had two affairs with girls—they did nothing for me.”</span></p><span data-dcnode-id="2415" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2407" style="width: 2138px"><div class="media-credit-container alignnone" data-dcnode-id="2408" style="width: 2138px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249630" data-dcnode-id="2414" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg 2138w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-300x268.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-768x687.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-1024x916.jpg 1024w" height="1913" loading="lazy" sizes="(max-width: 2138px) 100vw, 2138px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2138"><noscript data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249630" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg" alt="Greta Garbo facts" width="2138" height="1913" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg 2138w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-300x268.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-768x687.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-1024x916.jpg 1024w" sizes="(max-width: 2138px) 100vw, 2138px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2409"><a data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2411" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2406" instrument_node="">
</span><h2 data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">80. Not the Marrying Type</span></h2><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">In 1933, Brooks married millionaire Deering Davis. The marriage would last only five months, though Brooks and Davis were not formally divorced until 1938. She reportedly left “without a good-bye…and leaving only a note of her intentions.”</span></p><span data-dcnode-id="2400" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2392" style="width: 960px"><div class="media-credit-container aligncenter" data-dcnode-id="2393" style="width: 960px"><img alt="Betty White Facts" class="lazy-hidden size-full wp-image-221291" data-dcnode-id="2399" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720.jpg 960w, https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720-360x240.jpg 360w" height="640" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-221291" src="https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720.jpg" alt="Betty White Facts" width="960" height="640" srcset="https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720.jpg 960w, https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/rings-2319465_960_720-360x240.jpg 360w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2394"><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/en/rings-hands-wedding-marriage-2319465/"><span data-dcnode-id="2396" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="2391" instrument_node="">
</span><h2 data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">81. Set Romance Gone Wrong</span></h2><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2387" instrument_node="">One of the most traumatic moments Brooks faced as a Hollywood star came on the set of&nbsp;</span><em data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Beggars of Life</span></em><span data-dcnode-id="2384" instrument_node="">. According to her memoir&nbsp;</span><em data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Lulu in Hollywood</span></em><span data-dcnode-id="2381" instrument_node="">, Brooks was so impressed with one of the stuntmen on the film, Harvey, that she shared an intimate evening with him while on location. But the next day, Harvey betrayed her.</span></p><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">The morning after, Brooks walked out of the hotel to see Harvey lounging on the porch. He stopped her and, in front of crew members, cruelly and falsely accused her of contracting syphilis from a torrid affair with a studio executive she had, in fact, never met. He then tossed out,”Another reason I want to know [if you have syphilis] is that my girl is coming up at noon to drive me back to Hollywood.”</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Only a few short years later, Brooks left Hollywood forever, claiming she couldn’t take the heartless studio system. No wonder.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2365" style="width: 957px"><div class="media-credit-container alignnone" data-dcnode-id="2366" style="width: 957px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-256116" data-dcnode-id="2372" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg 957w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-768x624.jpg 768w" height="777" loading="lazy" sizes="(max-width: 957px) 100vw, 957px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="957"><noscript data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-256116" src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg" alt="Louise Brooks Facts" width="957" height="777" srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg 957w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-768x624.jpg 768w" sizes="(max-width: 957px) 100vw, 957px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2367"><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="2369" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2364" instrument_node="">
</span><h2 data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">82. Sharon Tate: Gone Too Soon</span></h2><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Hollywood bombshell Sharon Tate was just 26 years old when she became a victim of the Manson family murders. But she was so much more than that. She was an actress, wife, soon-to-be mother, daughter, and friend. A natural beauty, she was kind and warm-hearted according to those who knew her well. But all this couldn’t stop her tragic end…</span></p><span data-dcnode-id="2358" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2350" style="width: 800px"><div class="media-credit-container aligncenter" data-dcnode-id="2351" style="width: 800px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313491" data-dcnode-id="2357" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o-300x270.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o-768x691.jpg 768w" height="720" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313491" src="https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o.jpg" alt="Sharon Tate Facts" width="800" height="720" srcset="https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o-300x270.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/45054869925_fcfa80c9ef_o-768x691.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2352"><a data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/147314555%40N04/45054869925"><span data-dcnode-id="2354" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2349" instrument_node="">
</span><h2 data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">83. Not Impressed</span></h2><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2345" instrument_node="">In the late 60s, Tate met her future husband, director Roman Polanski. Soon after, Tate began lobbying for a role in Polanski’s film&nbsp;</span><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">The Fearless Vampire Killers</span></em><span data-dcnode-id="2342" instrument_node="">, but&nbsp;both Tate and Polanski admitted that it was far from love at first sight. For his part, Polanski was a hardened perfectionist who felt that Tate was too naive and innocent—criticisms she had heard before.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2332" style="width: 960px"><div class="media-credit-container alignnone" data-dcnode-id="2333" style="width: 960px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313470" data-dcnode-id="2339" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1.jpg 960w, https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1-340x225.jpg 340w" height="632" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313470" src="https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1.jpg" alt="Sharon Tate Facts" width="960" height="632" srcset="https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1.jpg 960w, https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/36283473926_fba18e258e_b-1-340x225.jpg 340w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2334"><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/147314555%40N04/36283473926"><span data-dcnode-id="2336" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2331" instrument_node="">
</span><h2 data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">84. Love on Film</span></h2><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">When filming started, Tate did proved her worth and impressed everybody on set. Soon enough, Polanski was praising her performances, and before they knew what was happening, the young star and her director were in love. It was fast and all-consuming: by the end of filming, Tate had even moved into Polanski’s London apartment.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2317" style="width: 3094px"><div class="media-credit-container alignnone" data-dcnode-id="2318" style="width: 3094px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313474" data-dcnode-id="2324" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236.jpg 3094w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236-300x264.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236-768x675.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236-1024x901.jpg 1024w" height="2721" loading="lazy" sizes="(max-width: 3094px) 100vw, 3094px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3094"><noscript data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313474" src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236.jpg" alt="Sharon Tate Facts" width="3094" height="2721" srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236.jpg 3094w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236-300x264.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236-768x675.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-505808236-1024x901.jpg 1024w" sizes="(max-width: 3094px) 100vw, 3094px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2319"><a data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2321" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2316" instrument_node="">
</span><h2 data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">85. Passed Over</span></h2><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2312" instrument_node="">Roman Polanski wanted Tate to be the star of his now-classic film&nbsp;</span><em data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Rosemary’s Baby, </span></em><span data-dcnode-id="2309" instrument_node="">which he directed and wrote. However, he felt their relationship made it impossible for him to suggest her for the part, and he kept waiting for someone else to bring her name up. That never happened, and the iconic role famously went to Mia Farrow instead.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2299" style="width: 5241px"><div class="media-credit-container alignnone" data-dcnode-id="2300" style="width: 5241px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313495" data-dcnode-id="2306" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167.jpg 5241w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167-768x515.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167-1024x687.jpg 1024w" height="3516" loading="lazy" sizes="(max-width: 5241px) 100vw, 5241px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5241"><noscript data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313495" src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167.jpg" alt="Sharon Tate Facts" width="5241" height="3516" srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167.jpg 5241w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167-768x515.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-562619167-1024x687.jpg 1024w" sizes="(max-width: 5241px) 100vw, 5241px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2301"><a data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2303" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2298" instrument_node="">
</span><h2 data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">86. Wedded Bliss</span></h2><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">On January 20, 1968, Sharon Tate married Roman Polanski just days before her 25th birthday. Although Tate hoped marrying Polanski would help settle them down as a couple, they hid some bedroom secrets: it was far from a faithful marriage. Polanski had an unapologetically wandering eye, and called Tate’s discomfort with his infidelity “Sharon’s big hang-up.”</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">For her part, Tate was said to have confided in friends bitterly, “We have a good arrangement. Roman lies to me and I pretend to believe him.”</span></p><span data-dcnode-id="2289" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2281" style="width: 2276px"><div class="media-credit-container alignnone" data-dcnode-id="2282" style="width: 2276px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313510" data-dcnode-id="2288" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492.jpg 2276w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492-300x274.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492-768x702.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492-1024x935.jpg 1024w" height="2079" loading="lazy" sizes="(max-width: 2276px) 100vw, 2276px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2276"><noscript data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313510" src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492.jpg" alt="Sharon Tate Facts" width="2276" height="2079" srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492.jpg 2276w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492-300x274.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492-768x702.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2662492-1024x935.jpg 1024w" sizes="(max-width: 2276px) 100vw, 2276px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2283"><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2285" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2280" instrument_node="">
</span><h2 data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">87. Love House</span></h2><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">In 1969, Polanski and a very pregnant Tate moved into 10050 Cielo Drive. It was a mansion fit for Hollywood’s best and brightest: nestled deep in Benedict Canyon, the house used to belong to the couple’s friends Terry Melcher and actress Candice Bergen. Tate was reportedly over the moon about the move, and referred to the home as her “love house.”</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Infamously, it was the house she would die in.</span></p><span data-dcnode-id="2271" instrument_node="">
