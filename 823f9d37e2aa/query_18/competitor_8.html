</span><figure class="wp-caption alignnone" data-dcnode-id="2263" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2264" style="width: 1024px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313515" data-dcnode-id="2270" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b-300x175.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b-768x449.jpg 768w" height="599" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313515" src="https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b.jpg" alt="Sharon Tate Facts" width="1024" height="599" srcset="https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b-300x175.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/38484784896_ee0e968d88_b-768x449.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2265"><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/georgie56/38484784896"><span data-dcnode-id="2267" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2262" instrument_node="">
</span><h2 data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">88. Five Lives, Cut Too Short</span></h2><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Tate’s life took a sad, cruel twist when the Manson Family burst into her home and killed her along with Abigail Folger, Voytek Frykowski, Steve Parent, and Jay Sebring. The infamous crime took place on the night of August 9, 1969 in Tate’s Cielo Drive home while she was entertaining friends. It was a tragedy that shook the nation—not to mention Polanski, who was abroad at the time.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2248" style="width: 1172px"><div class="media-credit-container alignnone" data-dcnode-id="2249" style="width: 1172px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313528" data-dcnode-id="2255" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1.jpg 1172w, https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1-300x281.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1-768x719.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1-1024x958.jpg 1024w" height="1097" loading="lazy" sizes="(max-width: 1172px) 100vw, 1172px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1172"><noscript data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313528" src="https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1.jpg" alt="Sharon Tate Facts" width="1172" height="1097" srcset="https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1.jpg 1172w, https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1-300x281.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1-768x719.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/42828473100_008a2fba84_o-1-1024x958.jpg 1024w" sizes="(max-width: 1172px) 100vw, 1172px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2250"><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/georgie56/42828473100"><span data-dcnode-id="2252" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2247" instrument_node="">
</span><h2 data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">89. Mother and Son, Forever Together</span></h2><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Tate’s tombstone reflects both herself and her unborn son. She wanted to name him after her father—Paul Richard Polanski, and her name sits above his on the grave. At the time of her death, she was already eight and a half months pregnant.</span></p><span data-dcnode-id="2241" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2233" style="width: 3648px"><div class="media-credit-container alignnone" data-dcnode-id="2234" style="width: 3648px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313534" data-dcnode-id="2240" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave.jpg 3648w, https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave-1024x768.jpg 1024w" height="2736" loading="lazy" sizes="(max-width: 3648px) 100vw, 3648px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3648"><noscript data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313534" src="https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave.jpg" alt="Sharon Tate Facts" width="3648" height="2736" srcset="https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave.jpg 3648w, https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/Tate_family_grave-1024x768.jpg 1024w" sizes="(max-width: 3648px) 100vw, 3648px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2235"><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ATate_family_grave.JPG"><span data-dcnode-id="2237" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2232" instrument_node="">
</span><h2 data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">90. Losing Love</span></h2><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Whatever their issues, when Polanski heard about the death of his beloved wife, he was utterly inconsolable. He rushed home to mourn her, and soon gave away all his worldly possessions in the aftermath of the tragedy. He simply couldn’t bear to be reminded of Tate or her unjust fate, and he later called his marriage to the actress “the happiest I ever was in my life.”</span></p><span data-dcnode-id="2226" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2218" style="width: 4002px"><div class="media-credit-container alignnone" data-dcnode-id="2219" style="width: 4002px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313520" data-dcnode-id="2225" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171.jpg 4002w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171-300x262.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171-768x671.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171-1024x894.jpg 1024w" height="3495" loading="lazy" sizes="(max-width: 4002px) 100vw, 4002px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4002"><noscript data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313520" src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171.jpg" alt="Sharon Tate Facts" width="4002" height="3495" srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171.jpg 4002w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171-300x262.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171-768x671.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-522302171-1024x894.jpg 1024w" sizes="(max-width: 4002px) 100vw, 4002px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2220"><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2222" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2217" instrument_node="">
</span><h2 data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">91. The Dedication</span></h2><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2213" instrument_node="">Roman Polanski decided to direct the 1979 film </span><em data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Tess, </span></em><span data-dcnode-id="2210" instrument_node="">based on Thomas Hardy’s novel </span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Tess of the d’Urbervilles,&nbsp;</span></em><span data-dcnode-id="2207" instrument_node="">for an incredibly heartbreaking reason. This was the last novel Tate was reading before her death, and she suggested to Polanski that it would be great as a film. The dedication for the film states simply: “For Sharon.”</span></p><span data-dcnode-id="2205" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2197" style="width: 4214px"><div class="media-credit-container alignnone" data-dcnode-id="2198" style="width: 4214px"><img alt="Sharon Tate Facts" class="lazy-hidden size-full wp-image-313541" data-dcnode-id="2204" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059.jpg 4214w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059-300x223.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059-768x572.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059-1024x763.jpg 1024w" height="3138" loading="lazy" sizes="(max-width: 4214px) 100vw, 4214px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4214"><noscript data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313541" src="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059.jpg" alt="Sharon Tate Facts" width="4214" height="3138" srcset="https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059.jpg 4214w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059-300x223.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059-768x572.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/GettyImages-2695059-1024x763.jpg 1024w" sizes="(max-width: 4214px) 100vw, 4214px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2199"><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2201" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2196" instrument_node="">
</span><h2 data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">92. Judy Garland: Somewhere Over the Rainbow</span></h2><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">For Judy Garland, Dorothy Gale in </span><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">The Wizard of Oz&nbsp;</span></em><span data-dcnode-id="2189" instrument_node="">was just the beginning of a decades-long career that touched the hearts of millions. Throughout her musical success in Hollywood and Broadway, and through her very public battle with addiction, Garland’s setbacks and comebacks—and her enduring strength of spirit—have inspired fans for almost 50 years after her tragic death.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2179" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="2180" style="width: 1200px"><img alt="Old Hollywood Stars Facts" class="lazy-hidden size-full wp-image-290929" data-dcnode-id="2186" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/internal-15.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/internal-15.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/04/internal-15-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/internal-15-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/internal-15-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-290929" src="https://www.factinate.com/wp-content/uploads/2019/04/internal-15.jpg" alt="Old Hollywood Stars Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/04/internal-15.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/04/internal-15-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/internal-15-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/internal-15-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2181"><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pixabay.com/"><span data-dcnode-id="2183" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="2178" instrument_node="">
</span><h2 data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">93. High Expectations</span></h2><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">As a teenage actress, Garland endured ruthless criticism of her appearance. She was often dressed plainly and was sent for auditions for homely “girl-next-door” roles, all while attending school with silver screen beauties like Elizabeth Taylor and Ava Gardner. This insecurity had tragic consequences for the young star.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">As Charles Walters, who directed Garland in several films, once said, “Judy was the big money-maker at the time, a big success, but she was the ugly duckling…I think it had a very damaging effect on her emotionally for a long time. I think it lasted forever, really.”</span></p><span data-dcnode-id="2169" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2161" style="width: 1600px"><div class="media-credit-container alignnone" data-dcnode-id="2162" style="width: 1600px"><img alt="Judy Garland facts " class="lazy-hidden size-full wp-image-189998" data-dcnode-id="2168" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default.jpg 1600w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-328x186.jpg 328w" height="900" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1600"><noscript data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-189998" src="https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default.jpg" alt="Judy Garland facts " width="1600" height="900" srcset="https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default.jpg 1600w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/09/easter_parade_film-1600x900-c-default-328x186.jpg 328w" sizes="(max-width: 1600px) 100vw, 1600px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2163"><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmlinc.org/films/easter-parade/"><span data-dcnode-id="2165" instrument_node="">Film Society of Lincoln Center</span></a></span></div></figure><span data-dcnode-id="2160" instrument_node="">
</span><h2 data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">94. The Price of Beauty</span></h2><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Young Judy went to great lengths to improve her appearance at the studio’s insistence. Despite dressing her in frumpy or frilly dresses to fit the “girl next door” image they were peddling, Garland was made to wear caps on her teeth and special prosthetics for her nose. Louis B. Mayer, the head of MGM, even called the teenage Garland “my little hunchback,” mocking the curvature of her spine and her short stature: even as an adult, she stood only 4’11”.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2146" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2147" style="width: 1000px"><img alt="Judy Garland facts " class="lazy-hidden size-full wp-image-190010" data-dcnode-id="2153" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals-768x576.jpg 768w" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-190010" src="https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals.jpg" alt="Judy Garland facts " width="1000" height="750" srcset="https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/harvey_weinstein-casting_scandals-768x576.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2148"><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalpost.com/entertainment/celebrity/ill-break-you-judy-garland-faced-her-own-harvey-weinstein-in-mgm-head-louis-b-mayer"><span data-dcnode-id="2150" instrument_node="">National Post</span></a></span></div></figure><span data-dcnode-id="2145" instrument_node="">
</span><h2 data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">95. Body Shaming</span></h2><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">As a teenage movie star, Garland’s weight was a constant concern to the movie studio. She was forced on diets of nothing but chicken soup and cottage cheese, and was once served soup and plain lettuce when she ordered a regular meal. This was despite the fact that her weight was well within a healthy range for her age and height.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2131" style="width: 950px"><div class="media-credit-container alignnone" data-dcnode-id="2132" style="width: 950px"><img alt="Judy Garland facts " class="lazy-hidden size-full wp-image-190016" data-dcnode-id="2138" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb.jpg 950w, https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb-768x432.jpg 768w" height="534" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="950"><noscript data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-190016" src="https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb.jpg" alt="Judy Garland facts " width="950" height="534" srcset="https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb.jpg 950w, https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/https_2F2Fblueprint-api-production.s3.amazonaws.com2Fuploads2Fcard2Fimage2F1258812Fschooldressshame_thumb-768x432.jpg 768w" sizes="(max-width: 950px) 100vw, 950px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2133"><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mashable.com/2016/06/24/stop-shaming-students-dress-code/%23pBUPJIyjEOqH"><span data-dcnode-id="2135" instrument_node="">Mashable</span></a></span></div></figure><span data-dcnode-id="2130" instrument_node="">
</span><h2 data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">96. Dangerous Habits</span></h2><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Garland alleged that she was often prescribed amphetamines by the studio to energize her enough to keep up with the frantic pace of filming one movie after another. To help her sleep, she was prescribed barbiturates. This regular regime of dangerous and addictive drugs, she said, led to her lifelong battle with addiction.</span></p><span data-dcnode-id="2124" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2116" style="width: 3200px"><div class="media-credit-container alignnone" data-dcnode-id="2117" style="width: 3200px"><img alt="Judy Garland facts " class="lazy-hidden size-full wp-image-190019" data-dcnode-id="2123" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1.jpg 3200w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-768x528.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-1024x704.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-348x240.jpg 348w" height="2200" loading="lazy" sizes="(max-width: 3200px) 100vw, 3200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3200"><noscript data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-190019" src="https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1.jpg" alt="Judy Garland facts " width="3200" height="2200" srcset="https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1.jpg 3200w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-768x528.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-1024x704.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/09/addiction-hammer-1-348x240.jpg 348w" sizes="(max-width: 3200px) 100vw, 3200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2118"><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rayhaderclinic.com.au/self-will-addiction/"><span data-dcnode-id="2120" instrument_node="">Rayhaderclinic</span></a></span></div></figure><span data-dcnode-id="2115" instrument_node="">
</span><h2 data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">97. Then Comes Marriage…</span></h2><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Garland began seeing musician David Rose, who presented a diamond engagement ring to her on her 18th birthday in 1938—though at the time Rose was still married to his wife. The studio successfully drove Rose and Garland apart, though after a brief&nbsp;break, Garland and Rose were wed in 1941. Garland was just 19 years old, and Rose was just the first of her five husbands.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2101" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="2102" style="width: 1280px"><img alt="Judy Garland facts" class="lazy-hidden size-full wp-image-190037" data-dcnode-id="2108" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280-768x583.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280-1024x778.jpg 1024w" height="972" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-190037" src="https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280.jpg" alt="Judy Garland facts" width="1280" height="972" srcset="https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280-768x583.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/tumblr_od6tupbjq81qcl9ujo1_1280-1024x778.jpg 1024w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2103"><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fansofjoots.tumblr.com/post/150120934638/enjoying-a-night-out-with-david-rose-c-1943"><span data-dcnode-id="2105" instrument_node="">Fansofjoots</span></a></span></div></figure><span data-dcnode-id="2100" instrument_node="">
</span><h2 data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">98. Office Romance</span></h2><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2096" instrument_node="">While it technically wasn’t an “office” romance, Garland met her next husband while on the job. She was cast in </span><em data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Meet Me in St.</span></em><span data-dcnode-id="2093" instrument_node=""> Louis, the second of her iconic musical roles. Director Vincente Minnelli allowed Garland to appear attractive and sexy, rather than her previous roles where she was portrayed as plain or childlike.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Garland married Minnelli in 1945, despite rumors of his homosexuality. The couple, who had a 20 year age difference between them, had a daughter, Liza, born in 1946.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2080" style="width: 1398px"><div class="media-credit-container alignnone" data-dcnode-id="2081" style="width: 1398px"><img alt="Judy Garland facts" class="lazy-hidden size-full wp-image-190045" data-dcnode-id="2087" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist.jpg 1398w, https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist-768x613.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist-1024x817.jpg 1024w" height="1116" loading="lazy" sizes="(max-width: 1398px) 100vw, 1398px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1398"><noscript data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-190045" src="https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist.jpg" alt="Judy Garland facts" width="1398" height="1116" srcset="https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist.jpg 1398w, https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist-768x613.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/014-judy-garland-and-vincente-minnelli-theredlist-1024x817.jpg 1024w" sizes="(max-width: 1398px) 100vw, 1398px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2082"><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theredlist.com/wiki-2-24-224-523-view-hollywood-cinecitta-stars-profile-judy-garland-vincente-minnelli.html"><span data-dcnode-id="2084" instrument_node="">The Red List</span></a></span></div></figure><span data-dcnode-id="2079" instrument_node="">
</span><h2 data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">99. Curtains</span></h2><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">The next years of Garland’s life were riddled with failed marriages, dramatic on-set antics (including not showing up for work because of her pill habit), and triumphant comeback shows. In 1969, Garland married her fifth husband, nightclub manager Mickey Deans, but it only lasted a few short months. Deans discovered Garland dead of a barbiturate overdose on June 22nd, 1969.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">She was a tragically young 47 years old.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2062" style="width: 2000px"><div class="media-credit-container alignnone" data-dcnode-id="2063" style="width: 2000px"><img alt="Judy Garland facts" class="lazy-hidden size-full wp-image-190083" data-dcnode-id="2069" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41.jpg 2000w, https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41-768x518.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41-1024x691.jpg 1024w" height="1349" loading="lazy" sizes="(max-width: 2000px) 100vw, 2000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2000"><noscript data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-190083" src="https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41.jpg" alt="Judy Garland facts" width="2000" height="1349" srcset="https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41.jpg 2000w, https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41-768x518.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/09/judy-garland-41-1024x691.jpg 1024w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2064"><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.com/celebrity/judy-garland-husbands-sid-luft-david-rose-vincente-minnelli/"><span data-dcnode-id="2066" instrument_node="">People Magazine</span></a></span></div></figure><span data-dcnode-id="2061" instrument_node="">
</span><h2 data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">100. Dorothy Dandridge: Pioneer</span></h2><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Sad Hollywood stories are a dime a dozen, but the tragedy of Dorothy Dandridge feels unique. As one of the first African-American superstars of the screen and stage, Dandridge’s life was one of huge potential, and yet it ended in utter, mysterious tragedy. How exactly did “Carmen Jones” rise and fall from grace?</span></p><span data-dcnode-id="2055" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2047" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="2048" style="width: 1200px"><img alt="Dorothy Dandridge Facts" class="lazy-hidden size-full wp-image-257908" data-dcnode-id="2054" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-257908" src="https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec.jpg" alt="Dorothy Dandridge Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/Internal-Dorothy-Dandridge-Rec-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2049"><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikipedia.org/"><span data-dcnode-id="2051" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2046" instrument_node="">
</span><h2 data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">101. Golden Girl</span></h2><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2042" instrument_node="">In 1955, Dandridge became the first African-American woman to be nominated for Best Actress for her titular performance in </span><em data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Carmen Jones</span></em><span data-dcnode-id="2039" instrument_node="">.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2029" style="width: 3000px"><div class="media-credit-container alignnone" data-dcnode-id="2030" style="width: 3000px"><img alt="Horror Movies facts" class="lazy-hidden size-full wp-image-254816" data-dcnode-id="2036" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807.jpg 3000w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-1024x677.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-960x634.jpg 960w" height="1983" loading="lazy" sizes="(max-width: 3000px) 100vw, 3000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3000"><noscript data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-254816" src="https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807.jpg" alt="Horror Movies facts" width="3000" height="1983" srcset="https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807.jpg 3000w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-1024x677.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/05/GettyImages-2999807-960x634.jpg 960w" sizes="(max-width: 3000px) 100vw, 3000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2031"><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2033" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2028" instrument_node="">
</span><h2 data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">102. A Precedent Takes a Long Time to Repeat</span></h2><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node="">It would take almost 50 years after Dandridge for an African-American actress to finally win the Best Actress trophy at the Oscars. Halle Berry won the gold for her 2002 role in </span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Monster’s Ball.&nbsp;&nbsp;</span></em><span data-dcnode-id="2021" instrument_node="">When it came time for her acceptance speech, Berry didn’t forget the woman who went before her, and she thanked&nbsp;Dandridge along with Lena Horne and Diahann Carroll.</span></p><span data-dcnode-id="2019" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2011" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2012" style="width: 1024px"><img alt="Dorothy Dandridge Facts" class="lazy-hidden size-full wp-image-256711" data-dcnode-id="2018" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156-360x240.jpg 360w" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-256711" src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156.jpg" alt="Dorothy Dandridge Facts" width="1024" height="683" srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-826076156-360x240.jpg 360w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2013"><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2015" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2010" instrument_node="">
</span><h2 data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">103. Single Mother Blues Would Be Underselling It</span></h2><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">In 1943, Dandridge had her first and only child, Harolyn Suzanne Nicholas, with her husband Harold Nicholas, who was a dancer and entertainer. Unfortunately, the little girl was born with brain damage and required long-term care. Within five years, Dandridge’s husband abandoned them both. But things were only going to get worse for the Hollywood starlet…</span></p><span data-dcnode-id="2004" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1996" style="width: 3000px"><div class="media-credit-container alignnone" data-dcnode-id="1997" style="width: 3000px"><img alt="Mary Pickford facts" class="lazy-hidden alignnone wp-image-243693 size-full" data-dcnode-id="2003" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180.jpg 3000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-360x240.jpg 360w" height="2000" loading="lazy" sizes="(max-width: 3000px) 100vw, 3000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3000"><noscript data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">&lt;img loading="lazy" class="alignnone wp-image-243693 size-full" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180.jpg" alt="Mary Pickford facts" width="3000" height="2000" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180.jpg 3000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1114973180-360x240.jpg 360w" sizes="(max-width: 3000px) 100vw, 3000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1998"><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2000" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1995" instrument_node="">
</span><h2 data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">104. Swan Song</span></h2><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">The exact circumstances of Dorothy Dandridge’s death remain a Hollywood mystery. The actress called up friends on September 8, 1965 to prepare for her flight to New York for nightclub appearances. She apparently sang Barbara Streisand’s “People” in its entirety over the phone before hanging up with these chilling last words: “Whatever happens, I know you will understand.”</span></p><span data-dcnode-id="1989" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1981" style="width: 714px"><div class="media-credit-container alignnone" data-dcnode-id="1982" style="width: 714px"><img alt="Dorothy Dandridge Facts" class="lazy-hidden size-full wp-image-256767" data-dcnode-id="1988" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/Selection_812.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/Selection_812.png 714w, https://www.factinate.com/wp-content/uploads/2019/02/Selection_812-300x280.png 300w" height="666" loading="lazy" sizes="(max-width: 714px) 100vw, 714px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="714"><noscript data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-256767" src="https://www.factinate.com/wp-content/uploads/2019/02/Selection_812.png" alt="Dorothy Dandridge Facts" width="714" height="666" srcset="https://www.factinate.com/wp-content/uploads/2019/02/Selection_812.png 714w, https://www.factinate.com/wp-content/uploads/2019/02/Selection_812-300x280.png 300w" sizes="(max-width: 714px) 100vw, 714px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1983"><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADorothy_Dandridge_Cains_Hundred_1962.jpg"><span data-dcnode-id="1985" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1980" instrument_node="">
</span><h2 data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">105. Gone Too Soon</span></h2><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Several hours after her known last phone call, Dandridge was discovered naked and unconscious in her apartment by her manager, Earl Mills. She was just 42 years old.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1966" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1967" style="width: 1000px"><img alt="Johann Sebastian Bach Facts" class="lazy-hidden size-full wp-image-244468" data-dcnode-id="1973" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244468" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg" alt="Johann Sebastian Bach Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1968"><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1970" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1965" instrument_node="">
</span><h2 data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">106. This Is a Case for the FBI</span></h2><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Dandridge’s cause of death has conflicting stories. A pathology institute has argued that her death was caused by imipramine (an antidepressant) overdose. However, the Los Angeles County Coroner’s Office has insisted she died of a fat embolism, caused by an injury from her right foot. We may never know the true story about Dandridge’s death.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1951" style="width: 855px"><div class="media-credit-container alignnone" data-dcnode-id="1952" style="width: 855px"><img alt="Ancient Cities Facts" class="lazy-hidden size-full wp-image-241116" data-dcnode-id="1958" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1.png 855w, https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1-300x202.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1-768x517.png 768w" height="576" loading="lazy" sizes="(max-width: 855px) 100vw, 855px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="855"><noscript data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-241116" src="https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1.png" alt="Ancient Cities Facts" width="855" height="576" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1.png 855w, https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1-300x202.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/Screenshot_1-768x517.png 768w" sizes="(max-width: 855px) 100vw, 855px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1953"><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1955" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1950" instrument_node="">
</span><h2 data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">107. Zsa Zsa Gabor: The Hollywood Diva</span></h2><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Long before the Kardashians became famous for being famous, that honor went to Zsa Zsa Gabor. While she was a noted actress in her prime, Gabor’s more lasting fame came from her scandalous socialite activities in the most elite circles of Old Hollywood. From her petty feuds to her multiple marriages, Gabor’s personal life far overshadowed her career.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1936" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="1937" style="width: 1200px"><img alt="Zsa Zsa Gabor Facts" class="lazy-hidden size-full wp-image-314232" data-dcnode-id="1943" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314232" src="https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal.jpg" alt="Zsa Zsa Gabor Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/Gabor-Internal-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1938"><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.ca/"><span data-dcnode-id="1940" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1935" instrument_node="">
</span><h2 data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">108. Three Beauties</span></h2><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Gabor was the middle of three daughters, all of whom grew up to be exquisite beauties and celebrities in their own right. Her older sister Magda became an American socialite, while the youngest girl, Eva Gabor, became nearly as notorious a celebrity as Zsa Zsa herself. There’s no telling what was in the water in that family!</span></p><span data-dcnode-id="1929" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1921" style="width: 2945px"><div class="media-credit-container alignnone" data-dcnode-id="1922" style="width: 2945px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-313815" data-dcnode-id="1928" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1.jpg 2945w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1-768x568.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1-1024x758.jpg 1024w" height="2179" loading="lazy" sizes="(max-width: 2945px) 100vw, 2945px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2945"><noscript data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313815" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1.jpg" alt="Zsa Zsa Gabor facts" width="2945" height="2179" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1.jpg 2945w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1-768x568.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3306478-1-1024x758.jpg 1024w" sizes="(max-width: 2945px) 100vw, 2945px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1923"><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1925" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1917"><em data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Eva Gabor</span></em></p><span data-dcnode-id="1916" instrument_node="">
</span><h2 data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">109. Kept Woman</span></h2><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Gabor’s parents were the Jewish-Hungarians Vilmos and Jolie Gabor. Jolie was a noted beauty, jeweller, and socialite in her own day, and her three daughters came by their scandalous diva ways honestly: Jolie was married no less than three times throughout her life, and her last husband was a wealthy Hungarian count.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">In a 1976 interview, Jolie said of her aristocratic sugar daddy: “He takes care of me, he takes care of my business, my three homes in Florida, New York, and Connecticut. When I marry him, darling, he looks younger than me, but now, he looks older.” Yep, we can definitely see where her girls got it all from…</span></p><span data-dcnode-id="1907" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1899" style="width: 4431px"><div class="media-credit-container alignnone" data-dcnode-id="1900" style="width: 4431px"><img alt="Zsa Zsa Gabor facts " class="lazy-hidden size-full wp-image-313802" data-dcnode-id="1906" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694.jpg 4431w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694-300x273.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694-768x699.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694-1024x932.jpg 1024w" height="4032" loading="lazy" sizes="(max-width: 4431px) 100vw, 4431px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4431"><noscript data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313802" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694.jpg" alt="Zsa Zsa Gabor facts " width="4431" height="4032" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694.jpg 4431w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694-300x273.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694-768x699.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-83461694-1024x932.jpg 1024w" sizes="(max-width: 4431px) 100vw, 4431px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1901"><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1903" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1898" instrument_node="">
</span><h2 data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">110. Nice to Meet You, Dahling</span></h2><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Gabor became very well-known during her lifetime for calling everyone “darling,” which her Hungarian accent turned into the drawling, sophisticated “dah-ling.” Of course, Gabor wasn’t just keeping up her elegant socialite persona: during one of her many TV interviews, she admitted that she called everyone “dah-ling” because it was much easier than actually remembering people’s names.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1884" style="width: 3660px"><div class="media-credit-container alignnone" data-dcnode-id="1885" style="width: 3660px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-313829" data-dcnode-id="1891" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064.jpg 3660w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064-1024x801.jpg 1024w" height="2863" loading="lazy" sizes="(max-width: 3660px) 100vw, 3660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3660"><noscript data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313829" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064.jpg" alt="Zsa Zsa Gabor facts" width="3660" height="2863" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064.jpg 3660w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3228064-1024x801.jpg 1024w" sizes="(max-width: 3660px) 100vw, 3660px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1886"><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1888" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1883" instrument_node="">
</span><h2 data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">111. Quite the Social Life</span></h2><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Zsa Zsa’s sense of drama wasn’t all she got from her mother Jolie. During her life, Gabor was married to nine different men, beating her mommy dearest by a whole bunch of husbands.&nbsp;Seven of these marriages ended in divorce, while another was annulled. But hey, maybe Zsa Zsa was just an utterly hopeless romantic?</span></p><span data-dcnode-id="1877" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1869" style="width: 5472px"><div class="media-credit-container alignnone" data-dcnode-id="1870" style="width: 5472px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-313845" data-dcnode-id="1876" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856.jpg 5472w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-360x240.jpg 360w" height="3648" loading="lazy" sizes="(max-width: 5472px) 100vw, 5472px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5472"><noscript data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313845" src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856.jpg" alt="Zsa Zsa Gabor facts" width="5472" height="3648" srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856.jpg 5472w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1112746856-360x240.jpg 360w" sizes="(max-width: 5472px) 100vw, 5472px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1871"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1873" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1868" instrument_node="">
</span><h2 data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">112. Born Comedian</span></h2><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Gabor wasn’t just a pretty face. She was known for her razor-sharp wit, penchant for one-liners, and self-deprecating humor. On one occasion, when talking about her notorious love life, she quipped,&nbsp;“A girl must marry for love and keep on marrying until she finds it.” In a reference to her many divorces, she later joked, “I am a marvelous housekeeper. Every time I leave a man, I keep his house!”</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Something tells us this woman would have been legendary on Twitter.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1851" style="width: 2222px"><div class="media-credit-container alignnone" data-dcnode-id="1852" style="width: 2222px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-313877" data-dcnode-id="1858" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022.jpg 2222w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022-768x599.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022-1024x798.jpg 1024w" height="1732" loading="lazy" sizes="(max-width: 2222px) 100vw, 2222px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2222"><noscript data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313877" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022.jpg" alt="Zsa Zsa Gabor facts" width="2222" height="1732" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022.jpg 2222w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022-768x599.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2663022-1024x798.jpg 1024w" sizes="(max-width: 2222px) 100vw, 2222px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1853"><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1855" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1850" instrument_node="">
</span><h2 data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">113. Honeymoon Suite</span></h2><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Gabor always had expensive tastes, and she liked to find expensive men to keep the cash flowing. In 1942, she thought she’d found just the man: Conrad Hilton, founder of the famous (and swanky) Hilton Hotel chain. Like most of Gabor’s unions, it wasn’t wedded bliss: the couple was married a handful of years, but called it quits in 1947.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1836" style="width: 2142px"><div class="media-credit-container alignnone" data-dcnode-id="1837" style="width: 2142px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-313901" data-dcnode-id="1843" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377.jpg 2142w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377-768x579.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377-1024x773.jpg 1024w" height="1616" loading="lazy" sizes="(max-width: 2142px) 100vw, 2142px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2142"><noscript data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313901" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377.jpg" alt="Zsa Zsa Gabor facts" width="2142" height="1616" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377.jpg 2142w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377-768x579.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-3266377-1024x773.jpg 1024w" sizes="(max-width: 2142px) 100vw, 2142px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1838"><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1840" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1835" instrument_node="">
</span><h2 data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">114. Hard to Find the One</span></h2><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Collectively, the three Gabor sisters were divorced a whopping 18 times.</span></p><span data-dcnode-id="1829" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1821" style="width: 3029px"><div class="media-credit-container alignnone" data-dcnode-id="1822" style="width: 3029px"><img alt="Margaret Tudor Facts" class="lazy-hidden size-full wp-image-281615" data-dcnode-id="1828" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2.jpg 3029w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2-300x238.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2-768x608.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2-1024x811.jpg 1024w" height="2399" loading="lazy" sizes="(max-width: 3029px) 100vw, 3029px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3029"><noscript data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-281615" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2.jpg" alt="Margaret Tudor Facts" width="3029" height="2399" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2.jpg 3029w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2-300x238.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2-768x608.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-8-2-1024x811.jpg 1024w" sizes="(max-width: 3029px) 100vw, 3029px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1823"><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1825" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1820" instrument_node="">
</span><h2 data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">115. One-Kid Family</span></h2><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Though the Gabor girls were prolific in their marriages, they weren’t so industrious when it came to children. In fact, of her sisters, Gabor was the only one to have a child.&nbsp;Her daughter Constance Francesca Gabor Hilton was born on&nbsp;March 10th, 1947 to Gabor and her then-husband, hotel magnate Conrad Hilton.</span></p><span data-dcnode-id="1814" instrument_node="">
