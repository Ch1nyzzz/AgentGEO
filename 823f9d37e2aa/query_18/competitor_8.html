</span><figure class="wp-caption alignnone" data-dcnode-id="1806" style="width: 4894px"><div class="media-credit-container alignnone" data-dcnode-id="1807" style="width: 4894px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-313893" data-dcnode-id="1813" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975.jpg 4894w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975-768x590.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975-1024x787.jpg 1024w" height="3761" loading="lazy" sizes="(max-width: 4894px) 100vw, 4894px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4894"><noscript data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313893" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975.jpg" alt="Zsa Zsa Gabor facts" width="4894" height="3761" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975.jpg 4894w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975-768x590.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-103403975-1024x787.jpg 1024w" sizes="(max-width: 4894px) 100vw, 4894px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1808"><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1810" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1805" instrument_node="">
</span><h2 data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">116. Oh No You Didn’t!</span></h2><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1801" instrument_node="">As with any self-respecting Old Hollywood celebrity, Gabor was involved in several feuds. The longest-running one involved a spat with German-born Hollywood star Elke Sommer. The feud began after the two women appeared on the annual television special&nbsp;</span><em data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Circus of the Stars.&nbsp;</span></em><span data-dcnode-id="1798" instrument_node="">Reportedly, Sommer made comments about Gabor’s weight: When Sommer watched her mount a horse, she muttered, “Poor horse.”</span></p><span data-dcnode-id="1796" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1788" style="width: 4209px"><div class="media-credit-container alignnone" data-dcnode-id="1789" style="width: 4209px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-314019" data-dcnode-id="1795" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612.jpg 4209w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612-768x561.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612-1024x748.jpg 1024w" height="3075" loading="lazy" sizes="(max-width: 4209px) 100vw, 4209px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4209"><noscript data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314019" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612.jpg" alt="Zsa Zsa Gabor facts" width="4209" height="3075" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612.jpg 4209w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612-768x561.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-979990612-1024x748.jpg 1024w" sizes="(max-width: 4209px) 100vw, 4209px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1790"><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1792" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1787" instrument_node="">
</span><h2 data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">117. Keep It Classy</span></h2><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">As time went on, the feud only got more and more bitter. Eventually, Gabor and her husband Frederic Prinz von Anhalt gave a shocking interview that called out Sommer for looking like a balding, “100-year-old grandmother.” Gabor also added that the&nbsp;actress was so poor she “had to sell her house in Hollywood and now lives in the worst section of Los Angeles.”</span></p><span data-dcnode-id="1781" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1773" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1774" style="width: 1000px"><img alt="Bettie Page Facts" class="lazy-hidden size-full wp-image-279842" data-dcnode-id="1780" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-279842" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731.jpg" alt="Bettie Page Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1229663731-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1775"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1777" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1772" instrument_node="">
</span><h2 data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">118. I’ll See You in Court</span></h2><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Eventually, the feud—and this series of colorful comments—landed Gabor and Sommer in libel court in 1992. As it turned out, Gabor’s rival won, and the court awarded Sommer a nice $3.3 million in damages. Upon hearing the verdict, Gabor immediately announced her intent to appeal, stating bitterly,&nbsp;“I’d rather see her starve to death than give her one single dollar.”</span></p><span data-dcnode-id="1766" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1758" style="width: 5254px"><div class="media-credit-container alignnone" data-dcnode-id="1759" style="width: 5254px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-314021" data-dcnode-id="1765" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202.jpg 5254w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-360x240.jpg 360w" height="3503" loading="lazy" sizes="(max-width: 5254px) 100vw, 5254px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5254"><noscript data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314021" src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202.jpg" alt="Zsa Zsa Gabor facts" width="5254" height="3503" srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202.jpg 5254w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_537678202-360x240.jpg 360w" sizes="(max-width: 5254px) 100vw, 5254px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1760"><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1762" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1757" instrument_node="">
</span><h2 data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">120. Anna May Wong: Breaking Barriers</span></h2><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Hollywood starlet Anna May Wong defied traditions. Widely considered to be the first Chinese-American movie star in Hollywood, Wong was also the first Chinese-American actress gain recognition on an international level. However, movies aren’t even the beginning of Wong’s fascinating, dramatic, and scandalous life.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1743" style="width: 3684px"><div class="media-credit-container aligncenter" data-dcnode-id="1744" style="width: 3684px"><img alt="Anna May Wong Facts" class="lazy-hidden size-full wp-image-290404" data-dcnode-id="1750" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581.jpg 3684w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581-300x214.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581-768x547.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581-1024x730.jpg 1024w" height="2625" loading="lazy" sizes="(max-width: 3684px) 100vw, 3684px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3684"><noscript data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-290404" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581.jpg" alt="Anna May Wong Facts" width="3684" height="2625" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581.jpg 3684w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581-300x214.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581-768x547.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205581-1024x730.jpg 1024w" sizes="(max-width: 3684px) 100vw, 3684px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1745"><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1747" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1742" instrument_node="">
</span><h2 data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">121. Forbidden Love</span></h2><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Despite her rising star and the strength of her acting talent, Wong’s career was hampered by Hollywood’s refusal to give her meaty roles. This was partly due to an anti-miscegenation law, which forbade an interracial couple from kissing on-screen. The lack of Asian-American film stars meant that Wong was denied leading lady roles that would have been hers if she’d been white, or if Hollywood had been less prejudicial.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1728" style="width: 3016px"><div class="media-credit-container alignnone" data-dcnode-id="1729" style="width: 3016px"><img alt="Anna May Wong Facts" class="lazy-hidden size-full wp-image-290502" data-dcnode-id="1735" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805.jpg 3016w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805-300x276.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805-768x707.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805-1024x943.jpg 1024w" height="2777" loading="lazy" sizes="(max-width: 3016px) 100vw, 3016px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3016"><noscript data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-290502" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805.jpg" alt="Anna May Wong Facts" width="3016" height="2777" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805.jpg 3016w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805-300x276.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805-768x707.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3205805-1024x943.jpg 1024w" sizes="(max-width: 3016px) 100vw, 3016px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1730"><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1732" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1727" instrument_node="">
</span><h2 data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">122. Dressed for the Occasion</span></h2><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">During the 1920s and 1930s, Wong was not only a famous actress, but also an international fashion icon. New York’s Mayfair Mannequin Society chose her to be the “World’s Best-Dressed Woman” in 1934.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1713" style="width: 2941px"><div class="media-credit-container alignnone" data-dcnode-id="1714" style="width: 2941px"><img alt="Anna May Wong Facts" class="lazy-hidden size-full wp-image-290468" data-dcnode-id="1720" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393.jpg 2941w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393-300x269.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393-768x688.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393-1024x917.jpg 1024w" height="2635" loading="lazy" sizes="(max-width: 2941px) 100vw, 2941px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2941"><noscript data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-290468" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393.jpg" alt="Anna May Wong Facts" width="2941" height="2635" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393.jpg 2941w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393-300x269.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393-768x688.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3089393-1024x917.jpg 1024w" sizes="(max-width: 2941px) 100vw, 2941px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1715"><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1717" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1712" instrument_node="">
</span><h2 data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">123. I’m Sorry, What?!</span></h2><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">In the 1930s, Wong lobbied fiercely for the lead romantic role in </span><em data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">The Good Earth</span></em><span data-dcnode-id="1705" instrument_node="">. However, it would have meant that she’d be playing the wife of white actor Paul Muni (who was himself playing a Chinese character). Because Hollywood wouldn’t allow an interracial couple onscreen, Wong was not allowed to play the role of O-lan, despite being the proper ethnic background.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1695" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="1696" style="width: 1200px"><img alt="Nice Things Backfired Experience" class="lazy-hidden size-full wp-image-293646" data-dcnode-id="1702" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-293646" src="https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal.jpg" alt="Nice Things Backfired Experience" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/Nice-Thing-Backfired-Rec-Internal-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1697"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1699" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1694" instrument_node="">
</span><h2 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">124. That’s Some Real Nerve</span></h2><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1690" instrument_node="">Wong was understandably insulted when she was once again denied a Chinese role in&nbsp;</span><em data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">The Good Earth</span></em><span data-dcnode-id="1687" instrument_node="">. Instead, to accommodate Paul Muni, the role went to white actress Luise Rainer. Wong was offered another role, the villainous character of Lotus, but she furiously and righteously refused to take part in the film at all.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">To add insult to injury, Rainer eventually won an Oscar for her work playing the Chinese role.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1674" style="width: 910px"><div class="media-credit-container alignnone" data-dcnode-id="1675" style="width: 910px"><img alt="Anna May Wong Facts" class="lazy-hidden size-full wp-image-290474" data-dcnode-id="1681" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937.jpg 910w, https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937-768x572.jpg 768w" height="678" loading="lazy" sizes="(max-width: 910px) 100vw, 910px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="910"><noscript data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-290474" src="https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937.jpg" alt="Anna May Wong Facts" width="910" height="678" srcset="https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937.jpg 910w, https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/Luise_Rainer_Paul_Muni_The_Good_Earth_1937-768x572.jpg 768w" sizes="(max-width: 910px) 100vw, 910px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1676"><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALuise_Rainer_Paul_Muni_The_Good_Earth_1937.jpg"><span data-dcnode-id="1678" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1673" instrument_node="">
</span><h2 data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">125. All Good Things Must End</span></h2><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">The publicity of Mary Pickford’s marriage to Douglas Fairbanks Sr. sadly contributed to their relationship’s disintegration. Their schedules were filled up with movie-making or public appearances of one form or another. Pickford and Fairbanks also struggled with the end of the silent era, leading Fairbanks to embark on an affair.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">The affair was the nail in the coffin, and the two of them divorced in 1936. According to Douglas Fairbanks Jr., his father and his stepmother always regretted the failure of their marriage.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1656" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1657" style="width: 1000px"><img alt="Jack Kerouac facts" class="lazy-hidden size-full wp-image-235317" data-dcnode-id="1663" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664-768x544.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664-270x190.jpg 270w" height="708" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-235317" src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664.jpg" alt="Jack Kerouac facts" width="1000" height="708" srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664-768x544.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_561396664-270x190.jpg 270w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1658"><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/home"><span data-dcnode-id="1660" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1655" instrument_node="">
</span><h2 data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">126. Maternal Affliction</span></h2><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">When she was only 16 years old, Clara Bow’s mother fell out of a second-story window and suffered brain injuries that would later contribute to her terrifying epilepsy and acute psychosis. No longer herself, Mrs. Bow grew to resent her daughter, and even once put a knife to the teenager’s throat. After the assault, Bow’s mother was&nbsp;committed to a sanitorium, where she later died at the age of 43.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1641" style="width: 1124px"><div class="media-credit-container aligncenter" data-dcnode-id="1642" style="width: 1124px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223959" data-dcnode-id="1648" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg 1124w, https://www.factinate.com/wp-content/uploads/2018/12/37-300x200.jpeg 300w, https://www.factinate.com/wp-content/uploads/2018/12/37-768x512.jpeg 768w, https://www.factinate.com/wp-content/uploads/2018/12/37-1024x683.jpeg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/37-360x240.jpeg 360w" height="750" loading="lazy" sizes="(max-width: 1124px) 100vw, 1124px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1124"><noscript data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223959" src="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg" alt="Clara Bow facts" width="1124" height="750" srcset="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg 1124w, https://www.factinate.com/wp-content/uploads/2018/12/37-300x200.jpeg 300w, https://www.factinate.com/wp-content/uploads/2018/12/37-768x512.jpeg 768w, https://www.factinate.com/wp-content/uploads/2018/12/37-1024x683.jpeg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/37-360x240.jpeg 360w" sizes="(max-width: 1124px) 100vw, 1124px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1643"><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/"><span data-dcnode-id="1645" instrument_node="">Pexels</span></a></span></div></figure><span data-dcnode-id="1640" instrument_node="">
</span><h2 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">127. Chilling…</span></h2><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node="">In 1991, Zsa Zsa Gabor released her autobiography, which she titled </span><em data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">One Lifetime is Not Enough</span></em><span data-dcnode-id="1633" instrument_node="">. As you might imagine, some of the claims in the book are incredibly scandalous, though some are more serious than others. In one chapter, Gabor reveals that her only daughter Francesca Hilton was conceived through an act of non-consensual sex&nbsp;by&nbsp;Gabor’s then-husband Conrad Hilton.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1623" style="width: 3828px"><div class="media-credit-container alignnone" data-dcnode-id="1624" style="width: 3828px"><img alt="Zsa Zsa Gabor facts" class="lazy-hidden size-full wp-image-314031" data-dcnode-id="1630" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954.jpg 3828w, https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954-768x561.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954-1024x747.jpg 1024w" height="2794" loading="lazy" sizes="(max-width: 3828px) 100vw, 3828px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3828"><noscript data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314031" src="https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954.jpg" alt="Zsa Zsa Gabor facts" width="3828" height="2794" srcset="https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954.jpg 3828w, https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954-768x561.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/Zsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza_circa_1954-1024x747.jpg 1024w" sizes="(max-width: 3828px) 100vw, 3828px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1625"><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AZsa_Zsa_Gabor_with_playboy_Porfirio_Rubirosa_Ariza%2C_circa_1954.jpg"><span data-dcnode-id="1627" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1622" instrument_node="">
</span><h2 data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">128. So Fresh and So Clean</span></h2><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Joan Crawford’s obsessive cleanliness reared its pristine head even in her bedroom affairs. In his memoirs, Kirk Douglas recalled a particularly disturbing and bizarre romantic encounter when the two stars once went back to Crawford’s house. In the middle of the act, Douglas reports, Crawford leaned in and murmured into his ear—but it was far from sweet nothings.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">“You’re so clean,” she said. “It’s wonderful that you shaved your armpits when you made&nbsp;</span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Champion</span></em><span data-dcnode-id="1612" instrument_node="">.” As Douglas put it, her passionate outburst was “a real conversation stopper.” Nonetheless, Douglas admits that, “All by herself, she was equivalent to my six sisters and my mother.”</span></p><span data-dcnode-id="1610" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1602" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1603" style="width: 1024px"><img alt="Kirk Douglas Facts" class="lazy-hidden size-full wp-image-276912" data-dcnode-id="1609" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070-768x529.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070-348x240.jpg 348w" height="705" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-276912" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070.jpg" alt="Kirk Douglas Facts" width="1024" height="705" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070-768x529.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-947246070-348x240.jpg 348w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1604"><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1606" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1601" instrument_node="">
</span><h2 data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">129. Are You Team Joan or Team Bette?</span></h2><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Throughout her career, Crawford found herself in competition against fellow Hollywood actress Bette Davis. The two were often up for the same roles, and reportedly even competed for the affections of Franchot Tone, Crawford’s second husband. Indeed, this romantic spat was allegedly the beginning of their legendary feud.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">The rivalry saw both women call each other out publicly. Davis once said of Crawford that she “slept with every male star at MGM except Lassie,” while Crawford once quipped, “Bette and I work differently. Bette screams and I knit. While she screamed, I knitted a scarf that stretched clear to Malibu.” Those are fighting words, Joan.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1584" style="width: 1281px"><div class="media-credit-container aligncenter" data-dcnode-id="1585" style="width: 1281px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289131" data-dcnode-id="1591" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21.png 1281w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21-300x162.png 300w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21-768x414.png 768w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21-1024x552.png 1024w" height="690" loading="lazy" sizes="(max-width: 1281px) 100vw, 1281px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1281"><noscript data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289131" src="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21.png" alt="Joan Crawford facts" width="1281" height="690" srcset="https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21.png 1281w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21-300x162.png 300w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21-768x414.png 768w, https://www.factinate.com/wp-content/uploads/2019/04/Screenshot-from-2019-04-12-15-35-21-1024x552.png 1024w" sizes="(max-width: 1281px) 100vw, 1281px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1586"><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paramount.com/"><span data-dcnode-id="1588" instrument_node="">Mommie Dearest, Paramount Pictures</span></a></span></div></figure><span data-dcnode-id="1583" instrument_node="">
</span><h2 data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">130. Drama Queens</span></h2><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1579" instrument_node="">Despite their intense rivalry, Crawford and Davis appeared together in the 1962 film </span><em data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">What Ever Happened to Baby Jane?</span></em><span data-dcnode-id="1576" instrument_node="">&nbsp;They mostly got along during filming, but the trouble really started after the cameras shut off. Crawford pulled out of promoting the film, apparently because she didn’t want to share the stage with Davis (or so said Davis).</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">The movie about two aging actress sisters was a smash hit at the box office—but then the drama really began.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1563" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1564" style="width: 1000px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289101" data-dcnode-id="1570" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis-768x575.jpg 768w" height="749" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289101" src="https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis.jpg" alt="Joan Crawford facts" width="1000" height="749" srcset="https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/What_Ever_Happened_to_Baby_Jane__film_1962_-_Production_photo._Robert_Aldrich_Bette_Davis-768x575.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1565"><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AWhat_Ever_Happened_to_Baby_Jane_%28film%29_1962_-_Production_photo._Robert_Aldrich%2C_Bette_Davis.jpg"><span data-dcnode-id="1567" instrument_node="">Wikimedia Commons, Warner Bros.</span></a></span></div></figure><span data-dcnode-id="1562" instrument_node="">
</span><h2 data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">131. Controversy at the Oscars</span></h2><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">The real-life melodramatics around </span><em data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">What Ever Happened to Baby Jane?</span></em><span data-dcnode-id="1555" instrument_node=""> continued at the Oscars. Davis received a nomination in the Best Actress category, while Crawford didn’t. This must have stung Crawford, because she contacted all the other Best Actress nominees and “graciously” offered to accept any award on their behalf in the event that they couldn’t attend the show. Since they were all located on the East coast, they all agreed.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">Sure enough, Davis lost out, and Anne Bancroft won the award for her role in </span><em data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The Miracle Worker</span></em><span data-dcnode-id="1549" instrument_node="">. Bancroft wasn’t able to attend, so Crawford waltzed onto the stage in her place and accepted the statuette in front of an unimpressed Davis. Forever after that moment, Davis claimed that Crawford had campaigned against her in the Oscar race.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1539" style="width: 3596px"><div class="media-credit-container alignnone" data-dcnode-id="1540" style="width: 3596px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289105" data-dcnode-id="1546" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438.jpg 3596w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438-768x584.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438-1024x778.jpg 1024w" height="2733" loading="lazy" sizes="(max-width: 3596px) 100vw, 3596px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3596"><noscript data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289105" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438.jpg" alt="Joan Crawford facts" width="3596" height="2733" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438.jpg 3596w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438-768x584.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-2640438-1024x778.jpg 1024w" sizes="(max-width: 3596px) 100vw, 3596px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1541"><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1543" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1538" instrument_node="">
</span><h2 data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">132. Head Case</span></h2><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">During the war, Bette Davis tragically lost her second husband, Arthur Farnsworth, but he did not die in battle. However, his death was due to violent reasons: he passed out in a Hollywood street and died two days later. When the autopsy came back, it revealed that he died from a skull fracture incurred two weeks before.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Davis testified she didn’t know what could possibly have caused the fatal injury, and the court’s labeled Farnsworth’s death an accident.</span></p><span data-dcnode-id="1529" instrument_node="">
