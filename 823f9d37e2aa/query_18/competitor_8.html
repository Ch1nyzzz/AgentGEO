</span><h1 class="entry-title" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Glossy Facts About Scandalous Old Hollywood Actresses</span></h1><span data-dcnode-id="3777" instrument_node="">

</span><div class="inner_content_wrapper inner_content" data-dcnode-id="968"><span data-dcnode-id="3774" instrument_node="">
</span><div class="entry-content" data-dcnode-id="970" itemprop="articleBody"><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">In Old Hollywood, the studio system reigned supreme. Executives were always trying to cover up their glamorous starlets’ darkest secrets and keep these wild, young girls out of the tabloids. Yet despite this, Hollywood’s most beautiful women somehow always found themselves knee-deep in tragedy.</span></p><span data-dcnode-id="3770" instrument_node="">
</span><p data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Here are glamorous facts about the most scandalous Old Hollywood actresses.</span></p><span data-dcnode-id="3767" instrument_node="">
</span><hr data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">
</span><h2 data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">1. Poor Little Marilyn</span></h2><div class="partial_slot" data-dcnode-id="3762" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Marilyn Monroe is one of the most tragic actresses in Hollywood history, but her hardships began even before she was born. Her mother Gladys was a paranoid schizophrenic who was completely unprepared to have a child. Gladys was placed her newborn daughter in foster care, and for much her childhood, Monroe only saw her mother sporadically.</span></p><span data-dcnode-id="3758" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3750" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="3751" style="width: 1200px"><img alt="People Who Died Young Quiz" class="size-full wp-image-246001 lazy-loaded" data-dcnode-id="3757" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/internal-10.jpg" data-srcset="" height="627" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/internal-10.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/internal-10.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/01/internal-10-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/internal-10-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/internal-10-1024x535.jpg 1024w" width="1200"><noscript data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">&lt;img class="size-full wp-image-246001" src="https://www.factinate.com/wp-content/uploads/2019/01/internal-10.jpg" alt="People Who Died Young Quiz" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/01/internal-10.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/01/internal-10-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/internal-10-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/internal-10-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3752"><a data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3754" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3749" instrument_node="">
</span><h2 data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">2. A Rose by Any Other Name…</span></h2><span data-dcnode-id="3746" instrument_node="">
</span><p data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">Everyone knows Marilyn Monroe’s real name was actually Norma Jeane Mortenson. What they don’t know is all the other names Monroe tried out before becoming a big star: she modeled with the names&nbsp;Jean Norman and Mona Monroe, and hoped to make it on the silver screen with the glamorous name “Jean Adair.” It took a long time for her to settle on her now iconic moniker.</span></p><span data-dcnode-id="3743" instrument_node="">
</span><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">The name was so unfamiliar to her that the first time she signed an autograph as “Marilyn Monroe,” she had to ask how to spell it.</span></p><span data-dcnode-id="3740" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3732" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3733" style="width: 1024px"><img alt="" class="size-full wp-image-215356" data-dcnode-id="3739" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1.jpg" data-srcset="" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1-768x576.jpg 768w" width="1024"><noscript data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215356" src="https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1.jpg" alt="" width="1024" height="768" srcset="https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/170257936_82828027da_b-1-768x576.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3734"><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/jackdorsey/170257936"><span data-dcnode-id="3736" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="3731" instrument_node="">
</span><h2 data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">3. Vulnerable</span></h2><span data-dcnode-id="3728" instrument_node="">
</span><p data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">While staying in foster care, Monroe suffered a series of abuses and tragedies at the hands of the people who were supposed to protect her. The trauma caused Monroe’s grades to slip, and eventually the sensitive girl even developed a stutter. Later on, Monroe would confess that she often felt like no one ever wanted her.</span></p><span data-dcnode-id="3725" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3717" style="width: 3006px"><div class="media-credit-container alignnone" data-dcnode-id="3718" style="width: 3006px"><img alt="" class="size-full wp-image-215568 lazy-loaded" data-dcnode-id="3724" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696.jpg" data-srcset="" height="2400" loading="lazy" sizes="(max-width: 3006px) 100vw, 3006px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696.jpg 3006w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696-768x613.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696-1024x818.jpg 1024w" width="3006"><noscript data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215568" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696.jpg" alt="" width="3006" height="2400" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696.jpg 3006w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696-768x613.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-57427696-1024x818.jpg 1024w" sizes="(max-width: 3006px) 100vw, 3006px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3719"><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/detail/news-photo/norma-jeane-baker-future-film-star-marilyn-monroe-on-the-news-photo/57427696"><span data-dcnode-id="3721" instrument_node="">Gettyimages</span></a></span></div></figure><span data-dcnode-id="3716" instrument_node="">
</span><h2 data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">4. Line Please, Sugar</span></h2><span data-dcnode-id="3713" instrument_node="">
</span><p data-dcnode-id="3708"><span data-dcnode-id="3712" instrument_node="">Monroe found it almost impossible to learn lines, and took 60 takes to deliver the simple line “It’s me, Sugar” in </span><em data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">Some Like It Hot</span></em><span data-dcnode-id="3709" instrument_node="">.</span></p><span data-dcnode-id="3707" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3699" style="width: 945px"><div class="media-credit-container aligncenter" data-dcnode-id="3700" style="width: 945px"><img alt="Lindsay Lohan Facts" class="size-full wp-image-313588" data-dcnode-id="3706" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara.png" data-srcset="" height="699" loading="lazy" sizes="(max-width: 945px) 100vw, 945px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara.png&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara.png 945w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara-300x222.png 300w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara-768x568.png 768w" width="945"><noscript data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313588" src="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara.png" alt="Lindsay Lohan Facts" width="945" height="699" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara.png 945w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara-300x222.png 300w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_Niagara-768x568.png 768w" sizes="(max-width: 945px) 100vw, 945px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3701"><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMarilyn_Monroe_Niagara.png"><span data-dcnode-id="3703" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="3698" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="3693" style="min-height: 120px;"><div data-dcnode-id="3694"><span data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">Advertisement</span></span><div data-dcnode-id="3695" id="div-gpt-ad-3568692-15"></div></div></div><h2 data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">5. Cruel Curtis</span></h2><span data-dcnode-id="3690" instrument_node="">
</span><p data-dcnode-id="3685"><span data-dcnode-id="3689" instrument_node="">Sadly, the filming of the beloved&nbsp;</span><em data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Some Like It Hot&nbsp;</span></em><span data-dcnode-id="3686" instrument_node="">was incredibly difficult for Monroe. She had issues with her mental health, and often suffered sudden crying fits where she would lock herself in her trailer and cling to her acting coach. As a result, the cast and crew began to resent the star’s presence, and they treated her with incredible cruelty.</span></p><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">When it was time for a kissing scene between Monroe and co-star Tony Curtis, he sniped that he’d “rather be kissing Hitler.”</span></p><span data-dcnode-id="3681" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3672" style="width: 5250px"><div class="media-credit-container alignnone" data-dcnode-id="3673" style="width: 5250px"><img alt="" class="size-full wp-image-215576 lazy-loaded" data-dcnode-id="3680" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855.jpg" data-srcset="" height="3658" loading="lazy" sizes="(max-width: 5250px) 100vw, 5250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855.jpg 5250w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855-768x535.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855-1024x713.jpg 1024w" width="5250"><noscript data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215576" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855.jpg" alt="" width="5250" height="3658" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855.jpg 5250w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855-768x535.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-141560855-1024x713.jpg 1024w" sizes="(max-width: 5250px) 100vw, 5250px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3674"><a data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3677" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3675" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3671" instrument_node="">
</span><h2 data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">6.&nbsp;Love of Children</span></h2><span data-dcnode-id="3668" instrument_node="">
</span><p data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">The paradox in Marilyn’s life was that although she never had a child of her own, she absolutely adored children and always yearned for a baby. She had close relationships with her stepchildren from her marriages to Joe DiMaggio and Arthur Miller. Though Marilyn was pregnant several times, she miscarried because she suffered from endometriosis and ectopic pregnancies.</span></p><span data-dcnode-id="3665" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3656" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3657" style="width: 1024px"><img class="alignnone wp-image-215581 size-full" data-dcnode-id="3664" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742.jpg" data-srcset="" height="793" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742-768x595.jpg 768w" width="1024"><noscript data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">&lt;img loading="lazy" class="alignnone wp-image-215581 size-full" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742.jpg" width="1024" height="793" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240742-768x595.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3658"><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3661" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3659" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3655" instrument_node="">
</span><h2 data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">7. Brains and Beauty</span></h2><span data-dcnode-id="3652" instrument_node="">
</span><p data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">When she was a rising star, Monroe and the studios played upon her looks and created a “blonde bombshell” persona. Sadly, “blonde bombshell” is apparently next door to “dumb blonde,” and she began being typecast as just that, which she hated. Probably because in reality, she was actually extremely intelligent. She had an IQ of 168.</span></p><span data-dcnode-id="3649" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3640" style="width: 2805px"><div class="media-credit-container alignnone" data-dcnode-id="3641" style="width: 2805px"><img alt="Marilyn Monroe facts " class="size-full wp-image-101238 lazy-loaded" data-dcnode-id="3648" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575.jpg" data-srcset="" height="2184" loading="lazy" sizes="(max-width: 2805px) 100vw, 2805px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575.jpg 2805w, https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575-1024x797.jpg 1024w" width="2805"><noscript data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-101238" src="https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575.jpg" alt="Marilyn Monroe facts " width="2805" height="2184" srcset="https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575.jpg 2805w, https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/02/GettyImages-2637575-1024x797.jpg 1024w" sizes="(max-width: 2805px) 100vw, 2805px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3642"><a data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/aleksandrapandevska/"><span data-dcnode-id="3645" instrument_node="">Aleksandra Pandevska</span></a><span data-dcnode-id="3643" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3639" instrument_node="">
</span><h2 data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">8. Weight Woes</span></h2><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3635" instrument_node="">Monroe’s weight went up and down throughout her life and closely aligned with her emotional turbulence. Her figure shifted so dramatically during the filming of </span><em data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">The Prince and the Showgirl</span></em><span data-dcnode-id="3632" instrument_node=""> that the costume designer, Beatrice Dawson, had to create facsimile dresses in different sizes. “I have two ulcers from this film,”&nbsp;Dawson said, “and they’re both monogrammed MM.”</span></p><span data-dcnode-id="3630" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3621" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3622" style="width: 1024px"><img alt="" class="size-full wp-image-215592" data-dcnode-id="3629" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910.jpg" data-srcset="" height="749" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910-768x562.jpg 768w" width="1024"><noscript data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215592" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910.jpg" alt="" width="1024" height="749" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-607405910-768x562.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3623"><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3626" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3624" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3620" instrument_node="">
</span><h2 data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">9. Papa Clark</span></h2><span data-dcnode-id="3617" instrument_node="">
</span><p data-dcnode-id="3609"><span data-dcnode-id="3616" instrument_node="">Marilyn had a fixation with&nbsp;</span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-clark-gable/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3615" instrument_node="">Clark Gable</span></a><span data-dcnode-id="3613" instrument_node="">, her co-star in </span><em data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">The Misfits</span></em><span data-dcnode-id="3610" instrument_node="">. Monroe never knew who her father was, and as a young girl,&nbsp;she had dreamed that&nbsp;Gable was her father. When Gable died, she said that she cried for two days.</span></p><span data-dcnode-id="3608" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3599" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3600" style="width: 1024px"><img alt="" class="lazy-hidden size-full wp-image-215663" data-dcnode-id="3607" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060-300x242.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060-768x620.jpg 768w" height="826" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215663" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060.jpg" alt="" width="1024" height="826" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060-300x242.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517368060-768x620.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3601"><a data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3604" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3602" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3598" instrument_node="">

</span></div><h2 data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">10. In the Nude</span></h2><span data-dcnode-id="3542" instrument_node="">
</span><p data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">Monroe loved to walk around naked, at least among female studio employees.&nbsp;She also gave interviews in the nude, and often went out wearing&nbsp;nothing under a black mink coat. Though sometimes these spicy habits got her in hot water—including an infamous scandal concerning a 1949 nude photoshoot—she wouldn’t have it any other way.</span></p><span data-dcnode-id="3539" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3530" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3531" style="width: 1024px"><img alt="" class="lazy-hidden size-full wp-image-215670" data-dcnode-id="3538" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764-768x522.jpg 768w" height="696" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215670" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764.jpg" alt="" width="1024" height="696" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517257764-768x522.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3532"><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3535" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3533" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3529" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="3524" style="min-height: 120px;"><div data-dcnode-id="3525"><span data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Advertisement</span></span><div data-dcnode-id="3526" id="div-gpt-ad-3568692-16"></div></div></div><h2 data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">11.&nbsp;Sewn in</span></h2><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">On May 19, 1962, Marilyn Monroe infamously serenaded President John F. Kennedy with a sultry, sexy rendition of “Happy Birthday.” At the time, she was rumored to be his lover—but whatever the truth of the matter, Monroe made sure she was unforgettable on stage: her dress that night was so tight that it had to be sewn onto her.</span></p><span data-dcnode-id="3518" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3509" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3510" style="width: 1024px"><img alt="" class="lazy-hidden size-full wp-image-215621" data-dcnode-id="3517" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882-768x557.jpg 768w" height="743" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215621" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882.jpg" alt="" width="1024" height="743" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-1064868882-768x557.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3511"><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3514" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3512" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3508" instrument_node="">
</span><h2 data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">12. In Solemn Memory</span></h2><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Marilyn Monroe’s passionate but short-lived marriage to Joe DiMaggio lasted just a year, from 1945 to 1955. However, the union reverberated for the rest of her life—and beyond.&nbsp;For 20 years after Marilyn’s death, Joe DiMaggio sent roses to her crypt three times a week.&nbsp;He outlived her by 36 years but never married again, and his last words were apparently, “I’ll finally get to see Marilyn.”</span></p><span data-dcnode-id="3502" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3494" style="width: 1024px"><div class="media-credit-container aligncenter" data-dcnode-id="3495" style="width: 1024px"><img alt="Quiz: Famous Last Words" class="lazy-hidden size-full wp-image-244031" data-dcnode-id="3501" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-360x240.jpg 360w" height="680" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244031" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542.jpg" alt="Quiz: Famous Last Words" width="1024" height="680" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-2630542-360x240.jpg 360w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3496"><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3498" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3493" instrument_node="">
</span><h2 data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">13. You Can Never Leave Me</span></h2><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3485"><span data-dcnode-id="3489" instrument_node="">While Joe DiMaggio’s undying devotion to&nbsp;Marilyn Monroe&nbsp;</span><em data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">looks</span></em><span data-dcnode-id="3486" instrument_node="">&nbsp;like the stuff of Hollywood romance, it shouldn’t eclipse how their union also echoed a Hollywood violent thriller. When they divorced, DiMaggio had Monroe’s phones tapped and would show up to her house at random intervals, just to see if she was with other men. Not cool.</span></p><span data-dcnode-id="3484" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3475" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3476" style="width: 1024px"><img alt="" class="lazy-hidden size-full wp-image-215608" data-dcnode-id="3483" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326-768x625.jpg 768w" height="833" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215608" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326.jpg" alt="" width="1024" height="833" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517721326-768x625.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3477"><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3480" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3478" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3474" instrument_node="">
</span><h2 data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">14.&nbsp;Suspicious Circumstances</span></h2><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Monroe was discovered dead at her home on Fifth Helena Drive in Brentwood on August 5, 1962. She had a phone in one of her hands, and her body was completely nude and face down on her bed. There was no odor of drugs on her mouth, as would be consistent with suicidal pill ingestion. There was also no report of alcohol or water near the bed where she was found, as would also be typical.</span></p><span data-dcnode-id="3468" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">The coroner’s report noted no traces of pills in her stomach. The coroner suggested that the lack of pills was the result of Monroe’s long history of substance abuse, which allowed her to digest the capsules faster than a non-addict. A journalist later bribed the county morgue staff with a bottle of whiskey to get inside and photograph Monroe hours after her death.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Her body showed cyanosis, blue or purple coloration of the skin, which is consistent with needle injection.</span></p><span data-dcnode-id="3462" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3454" style="width: 3545px"><div class="media-credit-container alignnone" data-dcnode-id="3455" style="width: 3545px"><img alt="" class="lazy-hidden size-full wp-image-215531" data-dcnode-id="3461" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481.jpg 3545w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481-768x520.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481-1024x693.jpg 1024w" height="2400" loading="lazy" sizes="(max-width: 3545px) 100vw, 3545px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3545"><noscript data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215531" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481.jpg" alt="" width="3545" height="2400" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481.jpg 3545w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481-768x520.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996481-1024x693.jpg 1024w" sizes="(max-width: 3545px) 100vw, 3545px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3456"><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3458" instrument_node="">Gettyimages</span></a></span></div></figure><span data-dcnode-id="3453" instrument_node="">
</span><h2 data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">15. “Probable”</span></h2><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Marilyn’s death was ruled a “probable suicide,” but toxicology tests were only carried out on her liver. When the deputy coroner tried to obtain her other organs for testing, he was told they’d been destroyed. Details like this have become part of the myriad conspiracy theories surrounding the star’s tragic, untimely death.</span></p><span data-dcnode-id="3447" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3439" style="width: 3534px"><div class="media-credit-container alignnone" data-dcnode-id="3440" style="width: 3534px"><img alt="" class="lazy-hidden size-full wp-image-215526" data-dcnode-id="3446" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473.jpg 3534w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473-768x522.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473-1024x695.jpg 1024w" height="2400" loading="lazy" sizes="(max-width: 3534px) 100vw, 3534px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3534"><noscript data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215526" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473.jpg" alt="" width="3534" height="2400" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473.jpg 3534w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473-768x522.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-73996473-1024x695.jpg 1024w" sizes="(max-width: 3534px) 100vw, 3534px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3441"><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/detail/news-photo/movie-star-marilyn-monroe-is-seen-in-a-candid-moment-on-the-news-photo/73996473"><span data-dcnode-id="3443" instrument_node="">Gettyimages</span></a></span></div></figure><span data-dcnode-id="3438" instrument_node="">
</span><h2 data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">16.&nbsp;The Wedding That Never Came</span></h2><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">According to her historians, Monroe may have been planning to remarry Joe DiMaggio at the time of her death. After the failure of their first marriage, DiMaggio had undergone therapy, stopped drinking alcohol, and expanded his interests beyond baseball. He and his beloved Marilyn even read poetry together in her final years.</span></p><span data-dcnode-id="3432" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3423" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3424" style="width: 1024px"><img alt="" class="lazy-hidden size-full wp-image-215616" data-dcnode-id="3431" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042-768x602.jpg 768w" height="803" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215616" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042.jpg" alt="" width="1024" height="803" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-517240042-768x602.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3425"><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/author/kristinap/"><span data-dcnode-id="3428" instrument_node="">Kristina Popovska</span></a><span data-dcnode-id="3426" instrument_node=""> | Factinate</span></span></div></figure><span data-dcnode-id="3422" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="3421" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF3" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF4"></div><h2 data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">17. Heartbreaking Last Words</span></h2><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">The last person to ever talk to Marilyn Monroe was actor Peter Lawford. He called the starlet to convince her to come to his party, but was alarmed when she sounded sleepy and possibly not sober. Her last words to him before she drifted away were,&nbsp;“Say goodbye to&nbsp;Pat [Lawford’s wife], say goodbye to the president [Lawford’s brother-in-law], and say goodbye to yourself, because you’re a nice guy.”</span></p><span data-dcnode-id="3415" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3407" style="width: 1024px"><div class="media-credit-container aligncenter" data-dcnode-id="3408" style="width: 1024px"><img alt="Marilyn Monroe." class="lazy-hidden size-full wp-image-215523" data-dcnode-id="3414" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020-768x586.jpg 768w" height="781" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-215523" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020.jpg" alt="Marilyn Monroe." width="1024" height="781" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-515984020-768x586.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3409"><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3411" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3406" instrument_node="">
</span><h2 data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">18. Mary Pickford: The First Star</span></h2><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Mary Pickford was one of the very first movie stars, and she became a household name at the peak of Old Hollywood. In fact, Pickford became known as “America’s Sweetheart,” and her legacy lives on in modern big name stars like Julia Roberts. She was also called&nbsp;“the girl with the curls,” referencing her iconic curly hair.</span></p><span data-dcnode-id="3400" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3392" style="width: 2531px"><div class="media-credit-container aligncenter" data-dcnode-id="3393" style="width: 2531px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243891" data-dcnode-id="3399" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2.jpg 2531w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2-300x267.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2-768x684.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2-1024x912.jpg 1024w" height="2255" loading="lazy" sizes="(max-width: 2531px) 100vw, 2531px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2531"><noscript data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243891" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2.jpg" alt="Mary Pickford facts" width="2531" height="2255" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2.jpg 2531w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2-300x267.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2-768x684.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-2-1024x912.jpg 1024w" sizes="(max-width: 2531px) 100vw, 2531px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3394"><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3396" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3391" instrument_node="">
</span><h2 data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">19. Silver Medal</span></h2><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3383"><span data-dcnode-id="3387" instrument_node="">Pickford received only the second Academy Award ever given to an actress. She won it for her performance in 1930’s </span><em data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Coquette</span></em><span data-dcnode-id="3384" instrument_node="">.</span></p><span data-dcnode-id="3382" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3374" style="width: 2000px"><div class="media-credit-container alignnone" data-dcnode-id="3375" style="width: 2000px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243740" data-dcnode-id="3381" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929.jpg 2000w, https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929-768x597.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929-1024x796.jpg 1024w" height="1554" loading="lazy" sizes="(max-width: 2000px) 100vw, 2000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2000"><noscript data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243740" src="https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929.jpg" alt="Mary Pickford facts" width="2000" height="1554" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929.jpg 2000w, https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929-768x597.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/Mary_Pickford_in_Coquette_1929-1024x796.jpg 1024w" sizes="(max-width: 2000px) 100vw, 2000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3376"><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMary_Pickford_in_Coquette_%281929%29.jpg"><span data-dcnode-id="3378" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="3373" instrument_node="">
</span><h2 data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">20. Who Run the World?</span></h2><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Pickford was infamously choosy and in control of her movies. She was heavily involved in producing her films, and even formed United Artists in 1919 in a bid to get even more control over her work. She also loved screenwriting, employed the same trusted cameraman on many of her films, and contributed to advancements in film lighting techniques.</span></p><span data-dcnode-id="3367" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3359" style="width: 2912px"><div class="media-credit-container alignnone" data-dcnode-id="3360" style="width: 2912px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243799" data-dcnode-id="3366" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939.jpg 2912w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939-768x579.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939-1024x773.jpg 1024w" height="2197" loading="lazy" sizes="(max-width: 2912px) 100vw, 2912px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2912"><noscript data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243799" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939.jpg" alt="Mary Pickford facts" width="2912" height="2197" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939.jpg 2912w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939-768x579.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311939-1024x773.jpg 1024w" sizes="(max-width: 2912px) 100vw, 2912px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3361"><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3363" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3358" instrument_node="">
</span><h2 data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">21. Act Your Age</span></h2><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3350"><span data-dcnode-id="3354" instrument_node="">The great irony of Mary Pickford’s life was that she was such a powerful and influential woman behind the scenes in Hollywood, yet she was famous for playing young women onscreen, even well into her adulthood. In 1917, she played the 12-year-old protagonist of </span><em data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">The Little Princess</span></em><span data-dcnode-id="3351" instrument_node=""> when she was already 24 years of age.</span></p><span data-dcnode-id="3349" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3341" style="width: 742px"><div class="media-credit-container alignnone" data-dcnode-id="3342" style="width: 742px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243809" data-dcnode-id="3348" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/ZaSu_Pitts-Mary_Pickford.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/ZaSu_Pitts-Mary_Pickford.png 742w, https://www.factinate.com/wp-content/uploads/2019/01/ZaSu_Pitts-Mary_Pickford-300x264.png 300w" height="652" loading="lazy" sizes="(max-width: 742px) 100vw, 742px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="742"><noscript data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243809" src="https://www.factinate.com/wp-content/uploads/2019/01/ZaSu_Pitts-Mary_Pickford.png" alt="Mary Pickford facts" width="742" height="652" srcset="https://www.factinate.com/wp-content/uploads/2019/01/ZaSu_Pitts-Mary_Pickford.png 742w, https://www.factinate.com/wp-content/uploads/2019/01/ZaSu_Pitts-Mary_Pickford-300x264.png 300w" sizes="(max-width: 742px) 100vw, 742px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3343"><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/File%3AZaSu_Pitts-Mary_Pickford.png"><span data-dcnode-id="3345" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="3340" instrument_node="">
</span><h2 data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">22. Unhappy Marriage</span></h2><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">In 1911, Pickford married her first husband, a silent film actor named Owen Moore. However, their marriage was far from perfect. Like Pickford’s father and brother, Moore was an alcoholic, but he was also deeply insecure that Pickford was by far the more famous actor. This led to domestic violence and to Pickford living separately from Moore on several occasions.</span></p><span data-dcnode-id="3334" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3326" style="width: 2139px"><div class="media-credit-container alignnone" data-dcnode-id="3327" style="width: 2139px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243760" data-dcnode-id="3333" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5.jpg 2139w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5-300x277.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5-768x708.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5-1024x945.jpg 1024w" height="1973" loading="lazy" sizes="(max-width: 2139px) 100vw, 2139px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2139"><noscript data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243760" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5.jpg" alt="Mary Pickford facts" width="2139" height="1973" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5.jpg 2139w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5-300x277.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5-768x708.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-5-1024x945.jpg 1024w" sizes="(max-width: 2139px) 100vw, 2139px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3328"><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3330" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3325" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="3324" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF4" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF5"></div><h2 data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">23. Hello, Lover</span></h2><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">When the United States entered the First World War, Pickford embarked on a nationwide tour to encourage the purchase of Liberty Bonds to raise money for the war. In this, she was joined by renowned actor Douglas Fairbanks Sr. Desperately unhappy with her marriage to Moore, Pickford embarked on a steamy affair with Fairbanks.</span></p><span data-dcnode-id="3318" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3310" style="width: 953px"><div class="media-credit-container alignnone" data-dcnode-id="3311" style="width: 953px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243782" data-dcnode-id="3317" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3.jpg 953w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3-300x214.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3-768x548.jpg 768w" height="680" loading="lazy" sizes="(max-width: 953px) 100vw, 953px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="953"><noscript data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243782" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3.jpg" alt="Mary Pickford facts" width="953" height="680" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3.jpg 953w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3-300x214.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-3-768x548.jpg 768w" sizes="(max-width: 953px) 100vw, 953px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3312"><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picryl.com/media/douglas-fairbanks-in-liberty-loan-drive-full-length-standing-on-platform-in"><span data-dcnode-id="3314" instrument_node="">Picryl</span></a></span></div></figure><span data-dcnode-id="3309" instrument_node="">
</span><h2 data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">24. Out With the Old, in With the New</span></h2><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Pickford and Owen Moore divorced on March 2, 1920. Moore insisted on a $100,000 settlement before he agreed to divorce, but Pickford was passionately in love and would do anything to marry Fairbanks. She didn’t even wait a month to marry him,&nbsp;and they wed on March 28. Like the Brangelina of their day, Fairbanks and Pickford were referred to as Hollywood royalty, drawing crowds whenever they went out in public.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Sadly, as we’ll see, the marriage had a tragic end…</span></p><span data-dcnode-id="3300" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3292" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="3293" style="width: 900px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243772" data-dcnode-id="3299" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4-300x252.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4-768x645.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4-120x102.jpg 120w" height="756" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243772" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4.jpg" alt="Mary Pickford facts" width="900" height="756" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4-300x252.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4-768x645.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-4-120x102.jpg 120w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3294"><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sh.wikipedia.org/wiki/1920"><span data-dcnode-id="3296" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="3291" instrument_node="">
</span><h2 data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">25. Glitz and Glamour</span></h2><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3287" instrument_node="">While she was married to Douglas Fairbanks Sr., Pickford lived in a sprawling mansion known as Pickfair. The legendary status of Pickfair stems from the vast parties that Pickford and Fairbanks would host. Because of their star power, the couple regularly rubbed shoulders with larger-than-life figures in high society. Among the many people who came to their dinners were </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/42-slapstick-facts-charlie-chaplin/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3286" instrument_node="">Charlie Chaplin</span></a><span data-dcnode-id="3284" instrument_node="">,&nbsp;</span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/41-vanishing-facts-amelia-earhart/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3283" instrument_node="">Amelia Earhart</span></a><span data-dcnode-id="3281" instrument_node="">, and Albert Einstein!</span></p><span data-dcnode-id="3279" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3271" style="width: 5616px"><div class="media-credit-container alignnone" data-dcnode-id="3272" style="width: 5616px"><img alt="Mary Pickford facts" class="lazy-hidden size-full wp-image-243838" data-dcnode-id="3278" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468.jpg 5616w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468-768x603.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468-1024x804.jpg 1024w" height="4407" loading="lazy" sizes="(max-width: 5616px) 100vw, 5616px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5616"><noscript data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243838" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468.jpg" alt="Mary Pickford facts" width="5616" height="4407" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468.jpg 5616w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468-768x603.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-103908468-1024x804.jpg 1024w" sizes="(max-width: 5616px) 100vw, 5616px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3273"><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3275" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3270" instrument_node="">
</span><h2 data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">26. Audrey Hepburn: Survivor</span></h2><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">It’s a crazy thing to think about now, but legendary actress Audrey Hepburn and her family survived a German occupation of their town during World War II. The Nazis rounded up anyone who was&nbsp;suspected of being part of the resistance against Adolf Hitler and killed them. Tragically, Hepburn’s own relatives were among those killed.</span></p><span data-dcnode-id="3264" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3256" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="3257" style="width: 1200px"><img alt="Celebrities Changed Names Story" class="lazy-hidden size-full wp-image-244178" data-dcnode-id="3263" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244178" src="https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn.jpg" alt="Celebrities Changed Names Story" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/audreyhepburn-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3258"><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="3260" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="3255" instrument_node="">
</span><h2 data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">27. Dark Family Secrets</span></h2><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Hepburn was praised for her courage during the Nazi regime, but all the while her film agents desperately tried to cover up a dark secret: Hepburn actually had ties, through her parents, to the Nazis. Her&nbsp;mother and father&nbsp;were Fascist sympathizers, and&nbsp;recruited donations for the British Union of Fascists in the 1930s.</span></p><span data-dcnode-id="3249" instrument_node="">
</span><p data-dcnode-id="3245"><img alt="" class="lazy-hidden wp-image-54943" data-dcnode-id="3248" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/01/29a-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/01/29a-1.jpg 1920w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-1024x677.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-960x634.jpg 960w" height="609" loading="lazy" sizes="(max-width: 921px) 100vw, 921px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="921"><noscript data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">&lt;img loading="lazy" class=" wp-image-54943" src="https://www.factinate.com/wp-content/uploads/2018/01/29a-1.jpg" alt="" width="921" height="609" srcset="https://www.factinate.com/wp-content/uploads/2018/01/29a-1.jpg 1920w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-1024x677.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2018/01/29a-1-960x634.jpg 960w" sizes="(max-width: 921px) 100vw, 921px" /&gt;</span></noscript></p><span data-dcnode-id="3244" instrument_node="">
</span><h2 data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">28. What’s in a Name?</span></h2><span data-dcnode-id="3241" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Although Audrey Hepburn is now synonymous with classic style, “Audrey Hepburn” wasn’t actually her real name.&nbsp;She was born Audrey Kathleen Ruston on May 4, 1929. In 1940, she started to go by Edda van Heemstra, as having an English-sounding name was dangerous during the war. After that, the switch to Audrey Hepburn was easy.</span></p><span data-dcnode-id="3238" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3230" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="3231" style="width: 900px"><img alt="" class="lazy-hidden size-full wp-image-54920" data-dcnode-id="3237" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/01/34-11.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/01/34-11.jpg 900w, https://www.factinate.com/wp-content/uploads/2018/01/34-11-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/34-11-768x537.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/34-11-270x190.jpg 270w" height="629" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-54920" src="https://www.factinate.com/wp-content/uploads/2018/01/34-11.jpg" alt="" width="900" height="629" srcset="https://www.factinate.com/wp-content/uploads/2018/01/34-11.jpg 900w, https://www.factinate.com/wp-content/uploads/2018/01/34-11-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/34-11-768x537.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/34-11-270x190.jpg 270w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3232"><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dayonline.ru/showbusiness/photo/odri-hepbern-neizvestnye-fakty-iz-zhizni-samoy-kra-34334"><span data-dcnode-id="3234" instrument_node="">Day online</span></a></span></div></figure><span data-dcnode-id="3229" instrument_node="">
</span><h2 data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">29. Oh You Know, Just Taking Her Fawn for a Walk</span></h2><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3221"><span data-dcnode-id="3225" instrument_node="">Most people have dogs or cats, maybe even bunnies for pets. But not Hepburn. She had a pet fawn named Pippin. The baby deer was part of her movie </span><em data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Green Mansions</span></em><span data-dcnode-id="3222" instrument_node="">. The film’s animal trainer suggested she take the fawn home so he could get used to her. Hepburn ended up falling in love with him, and would adopt the baby deer once the filming was over.</span></p><span data-dcnode-id="3220" instrument_node="">
