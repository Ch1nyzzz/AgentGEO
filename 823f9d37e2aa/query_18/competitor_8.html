</span><figure class="wp-caption alignnone" data-dcnode-id="3212" style="width: 1029px"><div class="media-credit-container alignnone" data-dcnode-id="3213" style="width: 1029px"><img alt="" class="lazy-hidden size-full wp-image-55040" data-dcnode-id="3219" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/01/11-33.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/01/11-33.jpg 1029w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-960x634.jpg 960w" height="681" loading="lazy" sizes="(max-width: 1029px) 100vw, 1029px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1029"><noscript data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-55040" src="https://www.factinate.com/wp-content/uploads/2018/01/11-33.jpg" alt="" width="1029" height="681" srcset="https://www.factinate.com/wp-content/uploads/2018/01/11-33.jpg 1029w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2018/01/11-33-960x634.jpg 960w" sizes="(max-width: 1029px) 100vw, 1029px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3214"><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anothermag.com/design-living/1387/audrey-hepburn-and-her-fawn"><span data-dcnode-id="3216" instrument_node="">Another</span></a></span></div></figure><span data-dcnode-id="3211" instrument_node="">
</span><h2 data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">30. First Lady Audrey</span></h2><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3207" instrument_node="">Like Marilyn Monroe, Audrey Hepburn dated John F. Kennedy was he was still a young senator. After his brutal assassination, Hepburn was utterly devastated. She was filming&nbsp;</span><em data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">My Fair Lady</span></em><span data-dcnode-id="3204" instrument_node=""> at the time, and had to tell everyone on set the horrible news. Before she left&nbsp;the set to cry, she asked all those around to pray for him.</span></p><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3198"><img alt="" class="lazy-hidden alignnone wp-image-55058" data-dcnode-id="3201" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1.jpg 2479w, https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1-300x130.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1-768x333.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1-1024x444.jpg 1024w" height="526" loading="lazy" sizes="(max-width: 1214px) 100vw, 1214px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1214"><noscript data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">&lt;img loading="lazy" class="alignnone wp-image-55058" src="https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1.jpg" alt="" width="1214" height="526" srcset="https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1.jpg 2479w, https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1-300x130.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1-768x333.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/FotoJet-5-1-1024x444.jpg 1024w" sizes="(max-width: 1214px) 100vw, 1214px" /&gt;</span></noscript></p><span data-dcnode-id="3197" instrument_node="">
</span><h2 data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">31. Affairs of the Heart</span></h2><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3189"><span data-dcnode-id="3193" instrument_node="">Hepburn had love affairs with more than a few of her film co-stars, but on the most volatile was her relationship with William Holden, her romantic interest in the classic movie&nbsp;</span><em data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Sabrina</span></em><span data-dcnode-id="3190" instrument_node="">. Holden was married at the time, but the two couldn’t keep away from each other—until he dealt Hepburn an absolutely cold-hearted betrayal.</span></p><span data-dcnode-id="3188" instrument_node="">
</span><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Hepburn desperately wanted children, but Holden&nbsp;secretly went and had a vasectomy without telling her. When he finally revealed to her what he had done, Hepburn was heartbroken.</span></p><span data-dcnode-id="3185" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3177" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="3178" style="width: 1920px"><img alt="" class="lazy-hidden size-full wp-image-55061" data-dcnode-id="3184" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/01/7-30.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/01/7-30.jpg 1920w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-328x186.jpg 328w" height="1080" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-55061" src="https://www.factinate.com/wp-content/uploads/2018/01/7-30.jpg" alt="" width="1920" height="1080" srcset="https://www.factinate.com/wp-content/uploads/2018/01/7-30.jpg 1920w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/01/7-30-328x186.jpg 328w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3179"><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chrisklimek.com/tag/william-holden/"><span data-dcnode-id="3181" instrument_node="">Chrisklimek</span></a></span></div></figure><span data-dcnode-id="3176" instrument_node="">
</span><h2 data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">32. Liz Taylor: A Star Is Born</span></h2><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3172" instrument_node="">Legendary (and legendarily jealous) actress Elizabeth Taylor was just 10 years old when she made her film debut in&nbsp;</span><em data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">There’s One Born Every Minute</span></em><span data-dcnode-id="3169" instrument_node="">.</span></p><span data-dcnode-id="3167" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="3159" style="width: 1967px"><div class="media-credit-container aligncenter" data-dcnode-id="3160" style="width: 1967px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280550" data-dcnode-id="3166" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1.jpg 1967w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1-300x264.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1-768x675.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1-1024x900.jpg 1024w" height="1729" loading="lazy" sizes="(max-width: 1967px) 100vw, 1967px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1967"><noscript data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280550" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1.jpg" alt="Elizabeth Taylor Facts" width="1967" height="1729" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1.jpg 1967w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1-300x264.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1-768x675.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-10-1-1024x900.jpg 1024w" sizes="(max-width: 1967px) 100vw, 1967px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3161"><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3163" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3158" instrument_node="">
</span><h2 data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">33. Scandal in the Presidential Suite</span></h2><span data-dcnode-id="3155" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3154" instrument_node="">Perhaps because of her early start in Hollywood, Taylor was a precocious and overly mature child, with some shocking consequences. One of her biographers claims that when she was only 15 years old, the well-developed Taylor ended up in bed with a 36-year-old </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/42-astonishing-facts-ronald-reagan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3153" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="3151" instrument_node="">, who was a well-known actor at the time.</span></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Reportedly, the teenaged Taylor went to the future President’s place and they soon began kissing on his couch before moving to the bedroom. As she later told her friend, “Reagan was treating me like a grown woman, and that thrilled me.”</span></p><span data-dcnode-id="3146" instrument_node="">
</span><figure aria-describedby="caption-attachment-218941" class="wp-caption aligncenter" data-dcnode-id="3136" id="attachment_218941" style="width: 800px"><div class="media-credit-container aligncenter" data-dcnode-id="3139" style="width: 800px"><img alt="General Custer facts" class="lazy-hidden wp-image-218941 size-full" data-dcnode-id="3145" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11-768x519.jpg 768w" height="541" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">&lt;img loading="lazy" class="wp-image-218941 size-full" src="https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11.jpg" alt="General Custer facts" width="800" height="541" srcset="https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/FotoJet-7-11-768x519.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3140"><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASanta_Fe_Trail_4.jpg"><span data-dcnode-id="3142" instrument_node="">Wikimedia Commons</span></a></span></div><figcaption class="wp-caption-text" data-dcnode-id="3137" id="caption-attachment-218941"><span data-dcnode-id="3138" instrument_node="">Ronald Reagan is second from the left</span></figcaption></figure><span data-dcnode-id="3135" instrument_node="">
</span><h2 data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">34. Heartbreak Hotel</span></h2><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Taylor was always in love with the idea of love, but she found it difficult to hold on to it. In 1950, she married the wealthy, handsome hotel heir Conrad Hilton Jr. The couple divorced just three months later after a lengthy European honeymoon, citing irreconcilable differences. It would be the first of eight marriages for the starlet.</span></p><span data-dcnode-id="3129" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3122" style="width: 2125px"><div class="media-credit-container alignnone" data-dcnode-id="3123" style="width: 2125px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280491" data-dcnode-id="3128" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4.jpg 2125w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4-1024x798.jpg 1024w" height="1656" loading="lazy" sizes="(max-width: 2125px) 100vw, 2125px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2125"><noscript data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280491" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4.jpg" alt="Elizabeth Taylor Facts" width="2125" height="1656" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4.jpg 2125w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-5-4-1024x798.jpg 1024w" sizes="(max-width: 2125px) 100vw, 2125px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Getty Images</span></span></div></figure><span data-dcnode-id="3121" instrument_node="">
</span><h2 data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">35. The Other Woman</span></h2><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Taylor married fellow actor Eddie Fisher in 1959. Marriage was nothing new for Taylor—but it also came with scandal. Just hours before the wedding, Fisher was actually still married to Taylor’s good friend&nbsp;Debbie Reynolds. Taylor’s betrayal wasn’t worth it: Taylor and Fisher divorced bitterly in 1964, though the actress eventually patched up her friendship with Reynolds.</span></p><span data-dcnode-id="3115" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3107" style="width: 3050px"><div class="media-credit-container alignnone" data-dcnode-id="3108" style="width: 3050px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280640" data-dcnode-id="3114" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870.jpg 3050w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-768x544.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-1024x725.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-270x190.jpg 270w" height="2160" loading="lazy" sizes="(max-width: 3050px) 100vw, 3050px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3050"><noscript data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280640" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870.jpg" alt="Elizabeth Taylor Facts" width="3050" height="2160" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870.jpg 3050w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-768x544.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-1024x725.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-2667870-270x190.jpg 270w" sizes="(max-width: 3050px) 100vw, 3050px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3109"><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3111" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3106" instrument_node="">
</span><h2 data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">36. Payday</span></h2><span data-dcnode-id="3103" instrument_node="">
</span><p data-dcnode-id="3098"><span data-dcnode-id="3102" instrument_node="">In 1961, Taylor began work on </span><em data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Cleopatra</span></em><span data-dcnode-id="3099" instrument_node="">. It was the most expensive film ever made and remains one of the most famous films of all time. For her role as the Queen of the Nile, Taylor was paid $1 million, the largest sum ever paid to an actress at the time. She would later comment, “If someone’s dumb enough to offer me a million dollars to make a picture, I’m certainly not dumb enough to turn it down.”</span></p><span data-dcnode-id="3097" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3090" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="3091" style="width: 1024px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280522" data-dcnode-id="3096" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-960x634.jpg 960w" height="675" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280522" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1.jpg" alt="Elizabeth Taylor Facts" width="1024" height="675" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-838067656-1-960x634.jpg 960w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Getty Images</span></span></div></figure><span data-dcnode-id="3089" instrument_node="">
</span><h2 data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">37. Liz and Dick</span></h2><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3085" instrument_node="">While filming </span><em data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Cleopatra</span></em><span data-dcnode-id="3082" instrument_node="">, Taylor began an affair with her co-star Richard Burton. It was to be her most torrid and infamous affair—which is saying something for a woman like Elizabeth Taylor.&nbsp;She married Burton directly following her divorce from Fisher in 1964. By 1976, the passionate pair would be divorced, remarried, and divorced </span><em data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">again</span></em><span data-dcnode-id="3079" instrument_node="">.</span></p><span data-dcnode-id="3077" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3069" style="width: 2813px"><div class="media-credit-container alignnone" data-dcnode-id="3070" style="width: 2813px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280529" data-dcnode-id="3076" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg 2813w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-768x642.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-1024x856.jpg 1024w" height="2351" loading="lazy" sizes="(max-width: 2813px) 100vw, 2813px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2813"><noscript data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280529" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg" alt="Elizabeth Taylor Facts" width="2813" height="2351" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg 2813w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-768x642.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-1024x856.jpg 1024w" sizes="(max-width: 2813px) 100vw, 2813px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3071"><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3073" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3068" instrument_node="">
</span><h2 data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">38. Don’t Call It a Comeback</span></h2><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3057"><span data-dcnode-id="3064" instrument_node="">Taylor had planned to retire from making movies after 1958’s </span><em data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">Cat on a Hot Tin Roof</span></em><span data-dcnode-id="3061" instrument_node="">, but a contract dispute with MGM forced her to return to film </span><em data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">BUtterfield 8</span></em><span data-dcnode-id="3058" instrument_node="">, in which she starred as a sex worker opposite her real-life husband at the time, Eddie Fisher. Bitter and resentful, Taylor absolutely&nbsp;refused to speak to the director for the entire shoot.</span></p><span data-dcnode-id="3056" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3048" style="width: 3482px"><div class="media-credit-container alignnone" data-dcnode-id="3049" style="width: 3482px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280503" data-dcnode-id="3055" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500.jpg 3482w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500-768x600.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500-1024x800.jpg 1024w" height="2722" loading="lazy" sizes="(max-width: 3482px) 100vw, 3482px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3482"><noscript data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280503" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500.jpg" alt="Elizabeth Taylor Facts" width="3482" height="2722" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500.jpg 3482w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500-768x600.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-3331500-1024x800.jpg 1024w" sizes="(max-width: 3482px) 100vw, 3482px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3050"><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3052" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3047" instrument_node="">
</span><h2 data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">39. What Were You Thinking?</span></h2><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3043" instrument_node="">Just because Taylor hated </span><em data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">BUtterfield 8</span></em><span data-dcnode-id="3040" instrument_node="">&nbsp;doesn’t mean Hollywood agreed with her. She ended up winning her first Academy Award for Best Actress for her performance in the film. For all the acclaim, Taylor remained bitter about the movie. Later, when asked about the film’s success, she replied, “I still say it stinks.”</span></p><span data-dcnode-id="3038" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3030" style="width: 3000px"><div class="media-credit-container alignnone" data-dcnode-id="3031" style="width: 3000px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224020" data-dcnode-id="3037" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193.jpg 3000w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193-768x520.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193-1024x694.jpg 1024w" height="2033" loading="lazy" sizes="(max-width: 3000px) 100vw, 3000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3000"><noscript data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224020" src="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193.jpg" alt="Clara Bow facts" width="3000" height="2033" srcset="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193.jpg 3000w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193-768x520.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-462980193-1024x694.jpg 1024w" sizes="(max-width: 3000px) 100vw, 3000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3032"><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="3034" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3029" instrument_node="">
</span><h2 data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">40. To the Rescue</span></h2><span data-dcnode-id="3026" instrument_node="">
</span><p data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">One evening while he was driving home from a party at Elizabeth Taylor’s house, actor Montgomery Clift fell asleep and brutally crashed his car into a telephone pole. Hearing the commotion, Taylor ran out of her home and rushed to her friend’s side&nbsp;until an ambulance arrived. Gruesomely, she even went so far as to pluck shards of teeth from Clift’s tongue to keep him from choking.</span></p><span data-dcnode-id="3023" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3015" style="width: 2793px"><div class="media-credit-container alignnone" data-dcnode-id="3016" style="width: 2793px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280537" data-dcnode-id="3022" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1.jpg 2793w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1-300x193.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1-768x495.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1-1024x660.jpg 1024w" height="1800" loading="lazy" sizes="(max-width: 2793px) 100vw, 2793px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2793"><noscript data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280537" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1.jpg" alt="Elizabeth Taylor Facts" width="2793" height="1800" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1.jpg 2793w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1-300x193.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1-768x495.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-9-1-1024x660.jpg 1024w" sizes="(max-width: 2793px) 100vw, 2793px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3017"><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3019" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3014" instrument_node="">
</span><h2 data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">41. The Late Elizabeth Taylor</span></h2><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">On March 23, 2011, Elizabeth Taylor died of heart failure at the age of 79. Though it was a natural death, Taylor made sure the world would remember her: her&nbsp;coffin arrived 15 minutes after her funeral was scheduled to begin. She had actually stated in her will that she wanted to be late—fashionably late, that is. Even in death, she was a true diva.</span></p><span data-dcnode-id="3008" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3000" style="width: 3000px"><div class="media-credit-container alignnone" data-dcnode-id="3001" style="width: 3000px"><img alt="Elizabeth Taylor Facts" class="lazy-hidden size-full wp-image-280651" data-dcnode-id="3007" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975.jpg 3000w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-768x509.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-1024x679.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-360x240.jpg 360w" height="1989" loading="lazy" sizes="(max-width: 3000px) 100vw, 3000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3000"><noscript data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280651" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975.jpg" alt="Elizabeth Taylor Facts" width="3000" height="1989" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975.jpg 3000w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-768x509.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-1024x679.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-110814975-360x240.jpg 360w" sizes="(max-width: 3000px) 100vw, 3000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3002"><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3004" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2999" instrument_node="">
</span><h2 data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">42. Grace Kelly: The Girl Next Door</span></h2><span data-dcnode-id="2996" instrument_node="">
</span><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Although we all know actress Grace Kelly as the epitome of classic beauty, her friends and family were surprised to discover this as she got older. She was a bit of a tomboy, and it took a long time for them to get used to her as a starlet.&nbsp;“We had no idea she was as beautiful as she was,” said one of her childhood friends. “Grace always a bandana on, and had the glasses, and the sweater, nothing glamorous.”</span></p><span data-dcnode-id="2993" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2985" style="width: 1024px"><div class="media-credit-container aligncenter" data-dcnode-id="2986" style="width: 1024px"><img alt="Grace Kelly" class="lazy-hidden size-full wp-image-214169" data-dcnode-id="2992" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942-768x603.jpg 768w" height="804" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-214169" src="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942.jpg" alt="Grace Kelly" width="1024" height="804" srcset="https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/11/GettyImages-527186942-768x603.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2987"><a data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/detail/news-photo/grace-kelly-news-photo/527186942"><span data-dcnode-id="2989" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2984" instrument_node="">
</span><h2 data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">43. The Prince and Me</span></h2><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Though she was a famous actress in her own right, these days Kelly is best remembered as “Princess Grace” after her marriage to Prince Rainier of Monaco. The pair met in 1955, when Kelly&nbsp;led the American delegation to the Cannes Film Festival. There was an immediate connection, and after she went back to the US, the two wrote letters to each other constantly.</span></p><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Rainier had a diplomatic tour that brought him to the US, where he then met with Kelly and her family. Three days later, he proposed.</span></p><span data-dcnode-id="2975" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2967" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="2968" style="width: 1280px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179910" data-dcnode-id="2974" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/meet.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/meet.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/08/meet-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/meet-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/meet-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/meet-328x186.jpg 328w" height="720" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179910" src="https://www.factinate.com/wp-content/uploads/2018/08/meet.jpg" alt="Grace Kelly facts" width="1280" height="720" srcset="https://www.factinate.com/wp-content/uploads/2018/08/meet.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/08/meet-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/meet-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/meet-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/meet-328x186.jpg 328w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2969"><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.com/royals/the-incredible-story-of-how-olivia-de-havilland-introduced-grace-kelly-to-prince-rainier-of-monaco/"><span data-dcnode-id="2971" instrument_node="">People Magazine</span></a></span></div></figure><span data-dcnode-id="2966" instrument_node="">
</span><h2 data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">44. The Role of a Lifetime</span></h2><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">The wedding between Kelly and Prince Rainier was a grand affair, to say the least, and the people of Monaco were ecstatic. Thousands of them lined the streets to greet their new princess following the nuptials, with film director Alfred Hitchcock saying that he was “very happy that Grace has found herself such a good part.”</span></p><span data-dcnode-id="2960" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2952" style="width: 2048px"><div class="media-credit-container alignnone" data-dcnode-id="2953" style="width: 2048px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179926" data-dcnode-id="2959" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/3-55.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/3-55.jpg 2048w, https://www.factinate.com/wp-content/uploads/2018/08/3-55-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/3-55-768x565.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/3-55-1024x753.jpg 1024w" height="1506" loading="lazy" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2048"><noscript data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179926" src="https://www.factinate.com/wp-content/uploads/2018/08/3-55.jpg" alt="Grace Kelly facts" width="2048" height="1506" srcset="https://www.factinate.com/wp-content/uploads/2018/08/3-55.jpg 2048w, https://www.factinate.com/wp-content/uploads/2018/08/3-55-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/3-55-768x565.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/3-55-1024x753.jpg 1024w" sizes="(max-width: 2048px) 100vw, 2048px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2954"><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tagesspiegel.de/weltspiegel/fuerstentum-monaco-zwei-hochzeiten-und-ein-todesfall/13457320.html"><span data-dcnode-id="2956" instrument_node="">Tagesspiegel</span></a></span></div></figure><span data-dcnode-id="2951" instrument_node="">
</span><h2 data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">45. Not a Fairy Tale</span></h2><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2943"><span data-dcnode-id="2947" instrument_node="">The fairy-tale wedding came at a high cost: as Princess, Kelly’s Hollywood days were seen as inappropriate. After marrying, Prince Rainier had all screenings of Kelly’s films banned in Monaco. What’s more, film director Alfred Hitchcock had offered the actress-turned-princess a role in his new movie, </span><em data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Marnie</span></em><span data-dcnode-id="2944" instrument_node="">, but she turned it down because of the pressure put on her by Monaco.</span></p><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Eventually, Kelly officially retired from acting.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2931" style="width: 1200px"><div class="media-credit-container alignnone" data-dcnode-id="2932" style="width: 1200px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179860" data-dcnode-id="2938" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/17-54.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/17-54.jpg 1200w, https://www.factinate.com/wp-content/uploads/2018/08/17-54-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/17-54-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/17-54-1024x768.jpg 1024w" height="900" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179860" src="https://www.factinate.com/wp-content/uploads/2018/08/17-54.jpg" alt="Grace Kelly facts" width="1200" height="900" srcset="https://www.factinate.com/wp-content/uploads/2018/08/17-54.jpg 1200w, https://www.factinate.com/wp-content/uploads/2018/08/17-54-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/17-54-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/17-54-1024x768.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2933"><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.southernliving.com/weddings/dresses/grace-kelly-wedding-civil-ceremony-dress"><span data-dcnode-id="2935" instrument_node="">Southern Living</span></a></span></div></figure><span data-dcnode-id="2930" instrument_node="">
</span><h2 data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">46. An Heir and a Spare</span></h2><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Besides quitting acting, Kelly had a couple other things to do before she could marry into the royal family of Monaco. First, she was forced to renounce her American citizenship. Second, she had to take a fertility test. Kelly had to be able to give the prince an heir, otherwise their marriage likely would have been a no-go.</span></p><span data-dcnode-id="2924" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2916" style="width: 1600px"><div class="media-credit-container alignnone" data-dcnode-id="2917" style="width: 1600px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179915" data-dcnode-id="2923" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace.jpg 1600w, https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace-768x557.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace-1024x742.jpg 1024w" height="1160" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1600"><noscript data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179915" src="https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace.jpg" alt="Grace Kelly facts" width="1600" height="1160" srcset="https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace.jpg 1600w, https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace-768x557.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/Monaco-February-4-1965.-Princess-Grace-holding-her-four-day-old-daughter-Princess-Stephanie-at-the-Princely-Palace-1024x742.jpg 1024w" sizes="(max-width: 1600px) 100vw, 1600px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2918"><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byelisabethnl.blogspot.com/2014/09/grace-kelly-princess-style-icon.html"><span data-dcnode-id="2920" instrument_node="">ByElisabethNL</span></a></span></div></figure><span data-dcnode-id="2915" instrument_node="">
</span><h2 data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">47. Not All That Glitters Is Gold</span></h2><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Kelly was only 26 when she married the Prince, and she was still full of vim and vigor, particularly for acting.&nbsp;Despite seeming to live an incredible life as a princess, Kelly was known to suffer from depression, and often yearned for her acting days.</span></p><span data-dcnode-id="2909" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2901" style="width: 675px"><div class="media-credit-container alignnone" data-dcnode-id="2902" style="width: 675px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179892" data-dcnode-id="2908" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/ranieri_grace_klly.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/ranieri_grace_klly.jpg 675w, https://www.factinate.com/wp-content/uploads/2018/08/ranieri_grace_klly-300x241.jpg 300w" height="542" loading="lazy" sizes="(max-width: 675px) 100vw, 675px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="675"><noscript data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179892" src="https://www.factinate.com/wp-content/uploads/2018/08/ranieri_grace_klly.jpg" alt="Grace Kelly facts" width="675" height="542" srcset="https://www.factinate.com/wp-content/uploads/2018/08/ranieri_grace_klly.jpg 675w, https://www.factinate.com/wp-content/uploads/2018/08/ranieri_grace_klly-300x241.jpg 300w" sizes="(max-width: 675px) 100vw, 675px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2903"><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sanremonews.it/2016/05/20/leggi-notizia/argomenti/eventi-1/articolo/sanremo-il-31-maggio-i-grimaldi-di-monaco-ai-martedi-letterari-con-paolo-lingua.html"><span data-dcnode-id="2905" instrument_node="">sanremo news</span></a></span></div></figure><span data-dcnode-id="2900" instrument_node="">
</span><h2 data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">48. When Tragedy Strikes</span></h2><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Kelly’s life ended too soon following a car accident. In 1982, at just 52 years old and while driving with her daughter, she had a stroke and wound up going down a mountainside. Stephanie, her daughter, suffered a hairline fracture as well as a light concussion, and she wasn’t even able to go to her mother’s funeral.</span></p><span data-dcnode-id="2894" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2886" style="width: 987px"><div class="media-credit-container alignnone" data-dcnode-id="2887" style="width: 987px"><img alt="Grace Kelly facts" class="lazy-hidden wp-image-179949" data-dcnode-id="2893" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/2-53.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/2-53.jpg 740w, https://www.factinate.com/wp-content/uploads/2018/08/2-53-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/2-53-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2018/08/2-53-360x240.jpg 360w" height="656" loading="lazy" sizes="(max-width: 987px) 100vw, 987px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="987"><noscript data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">&lt;img loading="lazy" class=" wp-image-179949" src="https://www.factinate.com/wp-content/uploads/2018/08/2-53.jpg" alt="Grace Kelly facts" width="987" height="656" srcset="https://www.factinate.com/wp-content/uploads/2018/08/2-53.jpg 740w, https://www.factinate.com/wp-content/uploads/2018/08/2-53-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/2-53-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2018/08/2-53-360x240.jpg 360w" sizes="(max-width: 987px) 100vw, 987px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2888"><a data-dcnode-id="2889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveinternet.ru/users/marusya_esk/post421421947/"><span data-dcnode-id="2890" instrument_node="">LiveInternet</span></a></span></div></figure><span data-dcnode-id="2885" instrument_node="">
</span><h2 data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">49. Double Trouble With Terrible Consequences</span></h2><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">French doctors discovered that Kelly actually suffered two brain hemorrhages. The CAT scan showed the first happened prior to the crash and was likely the reason why the car accident happened. The second happened after, when she was in hospital. It likely occurred because of all of the trauma her body endured from the accident.</span></p><span data-dcnode-id="2879" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2871" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="2872" style="width: 1280px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179945" data-dcnode-id="2878" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-768x536.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-1024x715.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-270x190.jpg 270w" height="894" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179945" src="https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c.jpg" alt="Grace Kelly facts" width="1280" height="894" srcset="https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c.jpg 1280w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-300x210.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-768x536.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-1024x715.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/2747cd1979d21a4a2c21d79c9fb4ef4c-270x190.jpg 270w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2873"><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.co.uk/pin/460704236853645094/%3Flp%3Dtrue"><span data-dcnode-id="2875" instrument_node="">Pinterest</span></a></span></div></figure><span data-dcnode-id="2870" instrument_node="">
</span><h2 data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">50. Gone But Not Forgotten</span></h2><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2866" instrument_node="">Kelly was buried in the royal family’s vault following the funeral, which featured a eulogy by fellow actor James Stewart. “I just love Grace Kelly. Not because she was a princess, not because she was an actress, not because she was my friend, but because she was just about the nicest lady I ever met.” In a moment of tragic irony, </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/47-royal-facts-princess-diana-3/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2865" instrument_node="">Princess Diana</span></a><span data-dcnode-id="2863" instrument_node=""> also attended her funeral.</span></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">When Prince Rainier passed away in 2005, he was buried alongside her. He had never remarried.</span></p><span data-dcnode-id="2858" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2850" style="width: 968px"><div class="media-credit-container alignnone" data-dcnode-id="2851" style="width: 968px"><img alt="Grace Kelly facts" class="lazy-hidden size-full wp-image-179940" data-dcnode-id="2857" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/3-1-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/08/3-1-1.jpg 968w, https://www.factinate.com/wp-content/uploads/2018/08/3-1-1-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/3-1-1-768x534.jpg 768w" height="673" loading="lazy" sizes="(max-width: 968px) 100vw, 968px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="968"><noscript data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-179940" src="https://www.factinate.com/wp-content/uploads/2018/08/3-1-1.jpg" alt="Grace Kelly facts" width="968" height="673" srcset="https://www.factinate.com/wp-content/uploads/2018/08/3-1-1.jpg 968w, https://www.factinate.com/wp-content/uploads/2018/08/3-1-1-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/3-1-1-768x534.jpg 768w" sizes="(max-width: 968px) 100vw, 968px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2852"><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/people/grace-kelly-s-life-in-pictures-the-history-of-hollywood-s-untouchable-princess-9498185.html"><span data-dcnode-id="2854" instrument_node="">The Independent</span></a></span></div></figure><span data-dcnode-id="2849" instrument_node="">
</span><h2 data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">51. Olivia de Havilland: A Hollywood Legend</span></h2><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2841"><span data-dcnode-id="2845" instrument_node="">Olivia de Havilland is one of the last living legends of Old Hollywood. As of July 2019, de Havilland was the only surviving member of the cast of </span><em data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Gone with the Wind. </span></em><span data-dcnode-id="2842" instrument_node="">Despite a cast with over 50 speaking parts, she managed to survive all of them. Ironically, de Havilland’s character in the movie is the only one of the main characters to die in the film.</span></p><span data-dcnode-id="2840" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2832" style="width: 857px"><div class="media-credit-container aligncenter" data-dcnode-id="2833" style="width: 857px"><img alt="Olivia de Havilland Facts" class="lazy-hidden size-full wp-image-292317" data-dcnode-id="2839" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442.png 857w, https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442-300x181.png 300w, https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442-768x464.png 768w, https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442-845x510.png 845w" height="518" loading="lazy" sizes="(max-width: 857px) 100vw, 857px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="857"><noscript data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-292317" src="https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442.png" alt="Olivia de Havilland Facts" width="857" height="518" srcset="https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442.png 857w, https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442-300x181.png 300w, https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442-768x464.png 768w, https://www.factinate.com/wp-content/uploads/2019/04/Selection_999442-845x510.png 845w" sizes="(max-width: 857px) 100vw, 857px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2834"><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mgm.com/"><span data-dcnode-id="2836" instrument_node="">Gone With the Wind,Metro-Goldwyn-Mayer Studios Inc. </span></a></span></div></figure><span data-dcnode-id="2831" instrument_node="">
</span><h2 data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">52. The Best Revenge Is Living Longer</span></h2><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">One of the most famous stories revolving around de Havilland was her intense rivalry with her younger sister, fellow actress Joan Fontaine. Beginning in childhood, the two sisters vied for their mother’s favor (who didn’t help matters by favoring de Havilland). This rivalry continued for the rest of their lives, getting worse over Oscar competition.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2821"><span data-dcnode-id="2824" instrument_node="">When Fontaine attempted to congratulate her sister on her Oscar win, de Havilland’s reaction was utterly cold-blooded. </span><span data-dcnode-id="2822" style="font-weight: 400;"><span data-dcnode-id="2823" instrument_node="">As Fontaine extended her hand, de Havilland simply turned away, refusing to acknowledge her. The pair didn’t speak for five years after the public snub, and continued to feud for the rest of Fontaine’s life.</span></span></p><span data-dcnode-id="2820" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2812" style="width: 4764px"><div class="media-credit-container aligncenter" data-dcnode-id="2813" style="width: 4764px"><img alt="Montgomery Clift facts" class="lazy-hidden size-full wp-image-313679" data-dcnode-id="2819" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649.jpg 4764w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649-768x612.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649-1024x817.jpg 1024w" height="3799" loading="lazy" sizes="(max-width: 4764px) 100vw, 4764px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4764"><noscript data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313679" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649.jpg" alt="Montgomery Clift facts" width="4764" height="3799" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649.jpg 4764w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649-768x612.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-697788649-1024x817.jpg 1024w" sizes="(max-width: 4764px) 100vw, 4764px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2814"><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2816" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2811" instrument_node="">
</span><h2 data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">53. Joan Crawford: Queen of the Feud</span></h2><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Joan Crawford was one of the biggest stars in the Golden Age of Hollywood. Her sultry beauty, bold fashion, and powerful performances&nbsp;won adoration from film critics and audiences alike. But she was also known for her eccentric off-screen behavior, most notably her long-simmering feud with fellow screen legend Bette Davis.</span></p><span data-dcnode-id="2805" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2797" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="2798" style="width: 1200px"><img alt="Joan Crawford Facts" class="lazy-hidden size-full wp-image-290231" data-dcnode-id="2804" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-290231" src="https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal.jpg" alt="Joan Crawford Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/Joan-Crawford-Internal-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2799"><a data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/"><span data-dcnode-id="2801" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2796" instrument_node="">
</span><h2 data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">54. Daddy’s Not Home</span></h2><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Crawford was born as Lucille Fay LeSueur in San Antonio, Texas on March 23, 1904, to parents Thomas LeSueur and Anna Bell Johnson. Her father abandoned the family when she was only a few months old, and her mother would later re-marry Henry J. Cassin, who Crawford believed was her biological father for much of her childhood.</span></p><span data-dcnode-id="2790" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2782" style="width: 2452px"><div class="media-credit-container alignnone" data-dcnode-id="2783" style="width: 2452px"><img alt="Nichelle Nichols facts" class="lazy-hidden size-full wp-image-250112" data-dcnode-id="2789" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906.jpg 2452w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-1024x682.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-360x240.jpg 360w" height="1634" loading="lazy" sizes="(max-width: 2452px) 100vw, 2452px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2452"><noscript data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-250112" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906.jpg" alt="Nichelle Nichols facts" width="2452" height="1634" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906.jpg 2452w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-1024x682.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_135911906-360x240.jpg 360w" sizes="(max-width: 2452px) 100vw, 2452px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2784"><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2786" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2781" instrument_node="">
</span><h2 data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">55. The Name Game</span></h2><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2773"><span data-dcnode-id="2777" instrument_node="">One of the major turning points in Crawford’s career was when the head of publicity at MGM, Pete Smith, decided to change the budding star’s screen name. He felt that “LeSueur” sounded too much like “sewer,” and worked with&nbsp;</span><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Movie Weekly</span></em><span data-dcnode-id="2774" instrument_node=""> magazine to organize a “Name the Star” campaign and find a commercial-friendly moniker.</span></p><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">The readers initially picked “Joan Arden,” but after it was discovered that another actress already went by that name, they settled on the runner-up: “Joan Crawford.” Crawford herself wasn’t that enthusiastic about the name that made her famous. She wanted her first name to be pronounced as “Jo-Anne” and felt that Crawford was too close to “crawfish.”</span></p><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">That’s Hollywood for you!</span></p><span data-dcnode-id="2766" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2758" style="width: 6000px"><div class="media-credit-container alignnone" data-dcnode-id="2759" style="width: 6000px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-288941" data-dcnode-id="2765" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309.jpg 6000w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-360x240.jpg 360w" height="4000" loading="lazy" sizes="(max-width: 6000px) 100vw, 6000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="6000"><noscript data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-288941" src="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309.jpg" alt="Joan Crawford facts" width="6000" height="4000" srcset="https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309.jpg 6000w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/shutterstock_1091222309-360x240.jpg 360w" sizes="(max-width: 6000px) 100vw, 6000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2760"><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2762" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2757" instrument_node="">
</span><h2 data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">56. Poison in My Veins</span></h2><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">After a period where she was considered one of the top stars in Hollywood, Crawford appeared in a string of commercial flops. This rough patch infamously led to her being deemed “box office poison.”</span></p><span data-dcnode-id="2751" instrument_node="">
