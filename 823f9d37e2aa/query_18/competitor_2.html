atnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/section/collectorsweekly" target="_blank"><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">
</span></a></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3300" data-mm-id="_vfaq6sq3u"><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/section/collectorsweekly" target="_blank"><span data-dcnode-id="3302" instrument_node="">
</span></a></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3297" data-mm-id="_dhx63u7pk"><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/section/collectorsweekly" target="_blank"><span data-dcnode-id="3299" instrument_node="">
</span></a></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3294" data-mm-id="_0dd015isb"><strong data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">By Lisa Hix&nbsp;</span></strong></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3292" data-mm-id="_eg7jg95hk"><span data-dcnode-id="3293" instrument_node="">After excusing herself from the dinner table, the 13-year-old girl begins to shout, her excited voice ringing through her family’s Mid-Century Modern home, “I got it! I got it!!” Her mother, in a Donna Reed-type dress, beams, while her 10-year-old brother looks up quizzically and asks, “Got what?” The boy’s father turns to him and says, brusquely, “She got her period, son!”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3290" data-mm-id="_5efkuxw2f"><span data-dcnode-id="3291" instrument_node="">I saw this film in a middle-school sex-education class in 1988, and even though I’d read, “Are You There, God? It’s Me, Margaret,” the movie seemed embarrassingly old and this scene particularly laughable. How uncool did you have to be to announce the arrival of your period to the whole house? Is it really something you want your dad and brother discussing over potatoes? After all, our school felt girls&nbsp;had to be separated from the boys in our class just to watch this movie.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3288" data-mm-id="_6o0nj155q"><span data-dcnode-id="3289" instrument_node="">Today, most American adults can call up some memory of sex ed in their school, whether it was watching corny menstruation movies or seeing their school nurse demonstrate putting a condom on a banana. The movies, in particular, tend to stick in our minds.&nbsp;Screening films at school to teach kids how babies are made has always been a touchy issue, particularly for people who fear such knowledge will steer their children toward sexual behavior. But sex education actually has its roots in moralizing: American sex-ed films emerged from concerns that social morals and the family structure were breaking down.</span></p><div data-dcnode-id="3278" data-mm-id="_hh6n9q9vo"><figure class="style_1tb5rbs" data-dcnode-id="3279" data-id="_hh6n9q9vo"><div class="base_1u373dh" data-dcnode-id="3280"><picture class="_1olj64kn" data-dcnode-id="3283"><source data-dcnode-id="3287" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 3x"><source data-dcnode-id="3286" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 3x"><source data-dcnode-id="3285" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 3x"><img alt="" class="_1olj64kn" data-dcnode-id="3284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png&amp;raw" title=""></picture><noscript data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e19e8570bff0f05e7c619a305c51d6b4.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3276" data-mm-id="_1elhbwfu4"><span data-dcnode-id="3277" instrument_node="">Top: The 1938 movie “Human Wreckage: They Must Be Told” (later re-released as “Sex Madness”) tells the story of a chorus girl who is promiscuous with both men and women and contracts venereal disease. Above: Pamphlets entitled “Growing Up and Liking It!” were distributed to schoolgirls who watched Modess’ film on menustration in the 1960s. (Pamphlet courtesy of the Prelinger Archives)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3274" data-mm-id="_7zdbimjv0"><span data-dcnode-id="3275" instrument_node="">When the first sex-ed films appeared in 1914, no one wanted to talk about sex, but venereal diseases, like syphilis and gonorrhea, were wreaking so much havoc on the American public, filmmakers took on the burden of educating adults about them. Film proved an ideal instructional medium for topics that made people blush, and over the century, movies were made with a wide range of agendas—to prevent VDs from weakening our military forces, to teach teens how to date, to promote birth control in the developing world, and to ward children away from sexual predators.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3257" data-mm-id="_6a1ygbcsu"><span data-dcnode-id="3273" instrument_node="">After watching more than 500 sex-ed films spanning 100 years, Brenda Goodman produced a documentary this year called “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sexedmovie.com/" target="_blank"><span data-dcnode-id="3272" instrument_node="">Sex(Ed): The Movie</span></a><span data-dcnode-id="3270" instrument_node="">” (not to be confused with the recent raunchy romantic comedy “Sex Ed”) that follows the medium’s trajectory in America through the good, bad, and ridiculous. In the beginning, sex-ed films for teenagers served to reinforce middle-class norms, specifically the belief that sex is only for procreation in the context of a heterosexual&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/articles/how-romance-wrecked-traditional-marriage/" target="_blank"><span data-dcnode-id="3269" instrument_node="">marriage</span></a><span data-dcnode-id="3267" instrument_node="">. Today, you’d think that we’d have a much more evolved point of view, embracing films that teach youth about safe, healthy, and respectful expression of diverse sexuality. But the most open-minded and detailed classroom sex-ed films were made and screened in the ’70s, and many of those are banned as pornographic now. Even though polls consistently show more than&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.advocatesforyouth.org/publications/1487" target="_blank"><span data-dcnode-id="3266" instrument_node="">80 percent</span></a><span data-dcnode-id="3264" instrument_node="">&nbsp;of Americans support comprehensive sex education, less than&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncsl.org/research/health/state-policies-on-sex-education-in-schools.aspx" target="_blank"><span data-dcnode-id="3263" instrument_node="">half of all U.S. states</span></a><span data-dcnode-id="3261" instrument_node="">&nbsp;require their schools to have sex-ed programs. Many of the films&nbsp;that are shown today focus on advocating chastity and upholding traditional family roles—often&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.advocatesforyouth.org/publications/1487" target="_blank"><span data-dcnode-id="3260" instrument_node="">eschewing science</span></a><span data-dcnode-id="3258" instrument_node="">&nbsp;in the process.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3252" data-mm-id="_666y19t1v"><span data-dcnode-id="3256" instrument_node="">Of course, America has a long tradition of keeping tight-lipped about the facts of life. In the 17th and 18th centuries, the United States was by and large a rural country, and most children learned about sex by observing animals on the farm. Young women, expected to abstain from sex until marriage, often only learned about it the night before their weddings, but young men usually had earlier access to carnal knowledge: Older relatives or co-workers might take an adolescent to a brothel as a coming-of-age initiation. As industrialization and urbanization spread and immigrants flooded into the cities, vices seemed even more accessible and the self-righteous started to rail against all forms of excitement, from&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newsweek.com/brief-history-sex-ed-america-81001" target="_blank"><span data-dcnode-id="3255" instrument_node="">male masturbation</span></a><span data-dcnode-id="3253" instrument_node="">&nbsp;and to rich, spicy, or processed food.</span></p><div data-dcnode-id="3242" data-mm-id="_kz45hkd42"><figure class="style_1tb5rbs" data-dcnode-id="3243" data-id="_kz45hkd42"><div class="base_1u373dh" data-dcnode-id="3244"><picture class="_1olj64kn" data-dcnode-id="3247"><source data-dcnode-id="3251" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 3x"><source data-dcnode-id="3250" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 3x"><source data-dcnode-id="3249" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 3x"><img alt="" class="_1olj64kn" data-dcnode-id="3248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png&amp;raw" title=""></picture><noscript data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-054ad21b03634decabeaec7fff4eee4b.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3240" data-mm-id="_buqod20t5"><span data-dcnode-id="3241" instrument_node="">The frontispiece by J.A. Hertel for the 1903 book “Social Purity, or The Life of the Home and Nation” compares the lonely Old Bachelor and Fussy Old Maid with the happy Ideal Family Life. (Via Open Library at the Internet Archive)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3238" data-mm-id="_kyp58aal0"><span data-dcnode-id="3239" instrument_node="">In the mid-19th century, women, who were considered the moral compasses of their families, started organizing against their husband’s indiscretions, whether that was coming home violently drunk or infected with a venereal disease (VD). Long-suffering wives formed groups to push&nbsp;for temperance, abolition, and women’s suffrage. Such activism led to the social purity movement (“social” being a euphemism for “sexual”), which started out in the late 1860s to prevent the legalization of prostitution. Proponents went on to demand a legal age of consent and sexually segregated prisons. The activists also opposed abortion, contraception, and pornography. Such anxiety about living in an impure society led to the Comstock Obscenity Law of 1873, which made it illegal to send erotica and information about contraceptives and abortifacients through the U.S. mail.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3236" data-mm-id="_gf56170e9"><span data-dcnode-id="3237" instrument_node="">At one point, the Comstock Law even blocked anatomy textbooks; the idea of students learning how their own sex organs function in books was apparently scandalous to Victorians. While social purity leaders urged parents to teach their children proper sexual morals, by the end of the 1800s they were looking to school as the next-best place to teach proper behavior. In 1892, the National Education Association teacher’s union, which was proposing a standard 12-year school curriculum, passed a resolution endorsing “moral education” in schools.</span></p><div data-dcnode-id="3226" data-mm-id="_tblffjywk"><figure class="style_1tb5rbs" data-dcnode-id="3227" data-id="_tblffjywk"><div class="base_1u373dh" data-dcnode-id="3228"><picture class="_1olj64kn" data-dcnode-id="3231"><source data-dcnode-id="3235" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 3x"><source data-dcnode-id="3234" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 3x"><source data-dcnode-id="3233" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 3x"><img alt="" class="_1olj64kn" data-dcnode-id="3232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png&amp;raw" title=""></picture><noscript data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a53c831fc96ab4f22bdaf10fdf23f314.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3224" data-mm-id="_s23yl1f3a"><span data-dcnode-id="3225" instrument_node="">Margaret Sanger’s “Birth Control Review” magazine from 1919. (Via WikiCommons)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3219" data-mm-id="_b4s53pd60"><span data-dcnode-id="3223" instrument_node="">In the early 1900s, groups like the American Social Hygiene Association pushed for sex-ed programs in schools that promoted restricting sex to marital procreation and warned of the dangers of contracting VD from non-marital sex. As conservative as this sounds, it sparked outrage: After Chicago initiated the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newsweek.com/brief-history-sex-ed-america-81001" target="_blank"><span data-dcnode-id="3222" instrument_node="">first sexual education program</span></a><span data-dcnode-id="3220" instrument_node="">&nbsp;in its high schools in 1913, the Catholic Church campaigned against it, so fiercely the city quickly discontinued it and ousted superintendent Ella Flagg Young. It would be at least six years before another school system would introduce a sex-ed program.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3217" data-mm-id="_z98fd4kid"><span data-dcnode-id="3218" instrument_node="">Not every turn-of-the-century American engaged in such pearl-clutching. In fact, new ideas about sexuality and sex education were brewing in New York City. There, Margaret Sanger, a young nurse working with the immigrant population, encountered the horrific aftermath of self-induced abortion attempts. Moved, Sanger began publishing a frank sex-education column in 1912 in the socialist magazine the “New York Call,” and in 1914, launched a monthly newsletter, “The Woman Rebel,” which declared a woman should be “the absolute mistress of her own body” and made “birth control” a common term. The U.S. postal service prevented five of seven issues from being mailed, and in August of that year, Sanger was indicted for violating the Comstock Law.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3215" data-mm-id="_t8n9z8vhr"><span data-dcnode-id="3216" instrument_node="">Meanwhile, fears of a venereal disease reached a fever pitch, and in 1914, a short silent film called “Damaged Goods” addressed the topic on the silver screen for the first time. Based on a 1913 American play of the same name—which was adapted from Eugéne Brieux’s 1902 French play about syphilis, “Les Avaries”—it told the story of a man who has sex with a prostitute the night before his wedding and gets syphilis. He visits a doctor who takes him on a tour of the hospital filled with patients tormented by the disease and its sores. When his baby is born with syphilis, he commits suicide.</span></p><div data-dcnode-id="3205" data-mm-id="_tatin0dcy"><figure class="style_1tb5rbs" data-dcnode-id="3206" data-id="_tatin0dcy"><div class="base_1u373dh" data-dcnode-id="3207"><picture class="_1olj64kn" data-dcnode-id="3210"><source data-dcnode-id="3214" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 3x"><source data-dcnode-id="3213" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 3x"><source data-dcnode-id="3212" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 3x"><img alt="" class="_1olj64kn" data-dcnode-id="3211" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png&amp;raw" title=""></picture><noscript data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f33ef44a6bf1a86c2efbbd3a74c6cb16.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3203" data-mm-id="_znchvqmld"><span data-dcnode-id="3204" instrument_node="">An ad for the 1917 update of “Damaged Goods.” Click image to see larger. (Via WikiCommons)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3201" data-mm-id="_7ifeb79wv"><span data-dcnode-id="3202" instrument_node="">A “Variety” review in 1914 stated, “The ravages of syphilis were shown in patients, their limbs exposed, and to make the impression indelible, book illustrations from medical works were thrown upon the screen.” When the film was re-released in 1915, a “Variety” review asserted that “every American boy … should be made to see it, for they are to become the American manhood, and the cleaner physically, the better.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3195" data-mm-id="_6tgnzsq0u"><span data-dcnode-id="3200" instrument_node="">“Damaged Goods” effectively shattered the taboo against talking about venereal disease in film, and soon dozens of movies on the topic hit the screen. “In the 1910s, there were a number of narrative films that concerned the issue of sex education, and the thrust of that trend was the issue of venereal disease,” says Robert Eberwein, Distinguished Professor of English at Oakland University in Michigan and the author of&nbsp;</span><em data-dcnode-id="3197"><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Sex-Ed-Video-Framework-Desire/dp/081352637X" target="_blank"><span data-dcnode-id="3199" instrument_node="">Sex Ed: Film, Video, and the Framework of Desire</span></a></em><span data-dcnode-id="3196" instrument_node="">. “Both commercial narrative films and other kinds of films, like governmental films, were made at the time to alert people to the dangers of venereal disease, how to avoid it, and how to avoid quacks who foisted useless remedies on infected people.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3190" data-mm-id="_qjbi5uy80"><span data-dcnode-id="3194" instrument_node="">Although we have no record of how widespread syphilis and gonorrhea were in the early 20th century, Eberwein says the belief VD was epidemic drove America toward public sex education. Rick Prelinger, the archivist, writer, and filmmaker who co-founded of the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/articles/a-visit-to-the-prelinger-library/" target="_blank"><span data-dcnode-id="3193" instrument_node="">Prelinger Archives</span></a><span data-dcnode-id="3191" instrument_node="">&nbsp;with his wife, Megan, agrees. “VD was a huge public health issue that exacted a big toll upon the people and upon the public health system,” he says.</span></p><div data-dcnode-id="3179" data-mm-id="_yquz4509q"><figure class="style_1tb5rbs" data-dcnode-id="3180" data-id="_yquz4509q"><div class="base_1u373dh" data-dcnode-id="3181"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3189" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3184"><source data-dcnode-id="3188"><source data-dcnode-id="3187"><source data-dcnode-id="3186"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3185" title=""></picture><noscript data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-c2960a54b3c73b4bc5076bd024a27dce.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3177" data-mm-id="_fj41as9zb"><span data-dcnode-id="3178" instrument_node="">Donald Duck promotes birth control in the 1968 animation “Family Planning,” which was financed by the Rockefellers’ Population Council and shown all over the developing world.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3175" data-mm-id="_5t8c6dywa"><span data-dcnode-id="3176" instrument_node="">The fear of the “other,” or immigrants flooding into the cities, also drove some of the earliest “guidance films,” explains Prelinger, who is interviewed in “Sex(Ed): The Movie.” Movies intended to teach immigrants “American morals” screened at movie theaters, community centers, settlement houses, and adult schools. Some corporations would show these films on the lunch hour.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3173" data-mm-id="_nl2f2x2iq"><span data-dcnode-id="3174" instrument_node="">“Films aimed at immigrants were trying to set examples of what it was like to be an American,” Prelinger says. “Part of that was strengthening family ties, encouraging people to settle down, to work steadily, to learn English. The moral panic over immigration in the ’10s and ’20s, which is similar to the panic over immigration now, was ‘These people aren’t like us. They create revolution, breed disease, and spread bad practices.’”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3171" data-mm-id="_vsp2biwn0"><span data-dcnode-id="3172" instrument_node="">But progressive activists looked at immigrants with more sympathetic eyes, and saw that they were living in poverty and suffering from poor health. So the films also had an altruistic side, coming from progressives who hoped to alleviate some of the misery. “It’s one of these funny amalgams that you see so often in the history of the United States where there are real concerns to be addressed—and when we address them by enlisting the media, it turns into this public crusade that’s built upon racism, nativism, and fear,” Prelinger says.</span></p><div data-dcnode-id="3160" data-mm-id="_0nx3ex0e7"><figure class="style_1tb5rbs" data-dcnode-id="3161" data-id="_0nx3ex0e7"><div class="base_1u373dh" data-dcnode-id="3162"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3170" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3165"><source data-dcnode-id="3169"><source data-dcnode-id="3168"><source data-dcnode-id="3167"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3166" title=""></picture><noscript data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-21cd52ad4a26bc0e68198986f61904d7.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3158" data-mm-id="_k0z1y6qwh"><span data-dcnode-id="3159" instrument_node="">This American Social Hygiene pamphlet for soldiers from 1918 warns in all caps, “KEEP AWAY FROM THE WHORES.” (Courtesy of Social Welfare History Archives, University of Minnesota Libraries)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3153" data-mm-id="_eey3jllzk"><span data-dcnode-id="3157" instrument_node="">The summer of 1914 also marked the beginning of&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/military-and-wartime/world-war-one" target="_blank"><span data-dcnode-id="3156" instrument_node="">World War I&nbsp;</span></a><span data-dcnode-id="3154" instrument_node="">in Europe. According to Prelinger, people like Franklin Lane, U.S. Secretary of the Interior, expressed worry that young American men who could be called on to fight would not be up to the task, thanks to a “high rate of illiteracy, poor nutrition, poor public health, and a high rate of VD.” In fact, nearly a quarter of the men drafted into the military learned they had VD during their physical exam.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3151" data-mm-id="_d0cvcorra"><span data-dcnode-id="3152" instrument_node="">Before the war, the Army and Navy presented lectures to soldiers on the dangers of VD, and distributed a pamphlet entitled “Keeping Fit to Fight.” Often, the men would be shown a scientific film about reproduction called “How Life Begins,” and sometimes a movie featuring photos of venereal disease symptoms and animated drawings of the male genital system. Showing penises in such films was considered more acceptable than in other movies because they were filtered through a lust-free “medical gaze,” seeing the body as if through a doctor’s eyes.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3149" data-mm-id="_szj3cjwb2"><span data-dcnode-id="3150" instrument_node="">When the United States joined the Allied war effort in April 1917, the American Social Hygiene Association—led by New York physician Prince Morrow, religious crusader Anna Garlin Spencer, progressive reformer Katharine Bement Davis, and philanthropist and Standard Oil heir John D. Rockefeller, Jr.—joined forces with the U.S. government and other organizations to form the Commission on&nbsp;Training Camp Activities to protect soldiers from venereal disease.</span></p><div data-dcnode-id="3138" data-mm-id="_7bbc0wc52"><figure class="style_1tb5rbs" data-dcnode-id="3139" data-id="_7bbc0wc52"><div class="base_1u373dh" data-dcnode-id="3140"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3148" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3143"><source data-dcnode-id="3147"><source data-dcnode-id="3146"><source data-dcnode-id="3145"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3144" title=""></picture><noscript data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e40ef8f330eaa34ddbb6de6f44b6a26f.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3136" data-mm-id="_0j9b59cpz"><span data-dcnode-id="3137" instrument_node="">This 1922 ASHA physical-education poster echoes the sentiments of “The Science of Life.” (Courtesy of Social Welfare History Archives, University of Minnesota Libraries)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3128" data-mm-id="_2ql5jbxqy"><span data-dcnode-id="3135" instrument_node="">The question of what the men should be taught about sex was hotly debated. According to Eberwein’s book,&nbsp;</span><em data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Sex Ed</span></em><span data-dcnode-id="3132" instrument_node="">, some people believed that sexually active men made better fighters, while others thought suggesting or encouraging men to have extramarital sex was outrageous. Since 1910, U.S. government had been issuing troops a&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/articles/getting-it-on-the-covert-history-of-the-american-condom/" target="_blank"><span data-dcnode-id="3131" instrument_node="">Dough-Boy Prophylactic kit</span></a><span data-dcnode-id="3129" instrument_node="">, which included a chemical disinfectant wash they were instructed to apply to their genitals after sexual contact. When the war started, the public questioned the morality of such kits.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3126" data-mm-id="_6h4rfavvv"><span data-dcnode-id="3127" instrument_node="">But the Commission on&nbsp;Training Camp Activities decided to include instructions on how to use prophylaxis in its training materials, along with suggestions of sports and social activities meant to distract men from their “primitive instincts,” Eberwein writes. A popular tool for educating soldiers was the stereomotorgraph, an early slide protector. The training-camp slides usually included a mix of photos like images of disfigurement from syphilis&nbsp;and microscopic shots of germs with title cards that said things like, “We can show the disfigurements and sores. We cannot show the suffering, mental agony, divorces, and ruined homes caused by syphilis and gonorrhea.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3121" data-mm-id="_o2fi7c52t"><span data-dcnode-id="3125" instrument_node="">According to Eberwein’s book, the first film the CTCA introduced to soldiers followed the tradition of warning them against the siren call of prostitutes. “Fit to Fight,” now a lost film, told the story of five military recruits: the two that pay attention to the sex-education lecture—one abstains from sex and the other uses a prophylactic treatment—go home disease-free heroes, while the other three contract venereal disease. In July, just four months before Armistice Day, Congress passed the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brocku.ca/MeadProject/USA/Chamberlain_Kahn_1918.html" target="_blank"><span data-dcnode-id="3124" instrument_node="">Chamberlin-Kahn Act</span></a><span data-dcnode-id="3122" instrument_node="">&nbsp;that both funded sex education for the soldiers and also gave the U.S. government the authority to crack down on prostitutes who had set up shop near base camps.</span></p><div data-dcnode-id="3110" data-mm-id="_u3xma5ck7"><figure class="style_1tb5rbs" data-dcnode-id="3111" data-id="_u3xma5ck7"><div class="base_1u373dh" data-dcnode-id="3112"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3120" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3115"><source data-dcnode-id="3119"><source data-dcnode-id="3118"><source data-dcnode-id="3117"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3116" title=""></picture><noscript data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-28f3264304689eaca68c17e2ff1ceb9c.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3108" data-mm-id="_r88g6msi9"><span data-dcnode-id="3109" instrument_node="">A 1940 poster from the ASHA blames the spread of venereal disease on prostitutes. This 1922 ASHA physical-education poster echoes the sentiments of “The Science of Life.” (Courtesy of Social Welfare History Archives, University of Minnesota Libraries)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3106" data-mm-id="_7hc2bl1x7"><span data-dcnode-id="3107" instrument_node="">“In World War I, women were singled out as the source of all this venereal disease,” Eberwein says. “The message was, ‘Prostitutes are the threat. They must be avoided.’ It’s a very anti-female tone. Of course, men pass on a lot of VD to women, which is one of the things that turns up in films where children are born blind or dead. During World War I, certainly a major element in the fight against VD is making women take the fall as the carriers.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3101" data-mm-id="_6enb436lk"><span data-dcnode-id="3105" instrument_node="">After the war, thanks in part to the writings of Margaret Sanger, who opened the first birth control clinic in Brooklyn in 1916 and started the American Birth Control League (which later became Planned Parenthood) in 1921, the idea that sex, especially marital sex, was for pleasure and not just procreation started to catch on. Young men, after facing their own mortality during the war, began to drink and dance at Jazz Age speakeasies, and young women embraced sexual liberation through&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/articles/the-great-gatsby-still-gets-flappers-wrong/" target="_blank"><span data-dcnode-id="3104" instrument_node="">the flapper movement</span></a><span data-dcnode-id="3102" instrument_node="">.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3096" data-mm-id="_f3nyzd532"><span data-dcnode-id="3100" instrument_node="">Suddenly, teaching traditional sexual morals in high schools and at universities seemed more urgent, especially with VD still rampant. At the 1919 White House Conference on Child Welfare, the U.S. government came out in support of sex education for adolescents and young adults. According to “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newsweek.com/brief-history-sex-ed-america-81001" target="_blank"><span data-dcnode-id="3099" instrument_node="">Newsweek</span></a><span data-dcnode-id="3097" instrument_node="">,” during the 1920s, somewhere between 20 and 40 percent of high schools had sex-education programs.</span></p><div data-dcnode-id="3085" data-mm-id="_fnxrk1ael"><figure class="style_1tb5rbs" data-dcnode-id="3086" data-id="_fnxrk1ael"><div class="base_1u373dh" data-dcnode-id="3087"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3095" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3090"><source data-dcnode-id="3094"><source data-dcnode-id="3093"><source data-dcnode-id="3092"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3091" title=""></picture><noscript data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-e48750821d9c1315528b46de69289413.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3083" data-mm-id="_qi2k4xfu4"><span data-dcnode-id="3084" instrument_node="">The 1927 movie “Are You Fit to Marry?” promotes eugenics and includes the 1916 short movie, “The Black Stork,” which advocates the idea that babies born with syphilis and other deforming diseases should be left to die. Click image to see larger.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3078" data-mm-id="_4rdri5bg7"><span data-dcnode-id="3082" instrument_node="">Made specifically for college and high school classrooms, U.S. government-sponsored films like “The Gift of Life” (1920) and “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.criticalpast.com/video/65675032292_disease-causing-micro-organisms_books_currency-notes_lady" target="_blank"><span data-dcnode-id="3081" instrument_node="">The Science of Life</span></a><span data-dcnode-id="3079" instrument_node="">” (1922), created by Bray Productions, were shown for decades, although no one knows how many schools screened them. Both strongly moralistic films show young people grooming and keeping physically fit, with animated sequences depicting the process of menstruation and fertilization, and warnings about the risk of venereal disease.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3076" data-mm-id="_okth065e4"><span data-dcnode-id="3077" instrument_node="">“Those films are long, slow, and very difficult to watch,” Prelinger says. “They’re also extremely scientific; they’re the birth of the ‘plumbing film.’ They’re also the earliest schoolroom films to show male genitalia, but they’re not really about intercourse and they’re certainly not about pleasure. I don’t think it’s until the ’60s that you see a sex-ed film that actually mentions why we have sex.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3074" data-mm-id="_7ukz7bt8v"><span data-dcnode-id="3075" instrument_node="">“The Science of Life” even had separate segments meant for boys and girls. Part of the boy’s section voice-over states, “The sex impulse contributes to those masculine qualities which make men ambitious to strive and achieve. Controlled, the sex impulse, like the horse, may be a source of power and service. The sex impulse is like a fiery horse. Uncontrolled, it may be destructive and dangerous.” “The Gift of Life” warns, “Masturbation may seriously hinder a boy’s progress towards vigorous manhood. It is a selfish, childish, stupid habit.”</span></p><div data-dcnode-id="3063" data-mm-id="_10xy4h5at"><figure class="style_1tb5rbs" data-dcnode-id="3064" data-id="_10xy4h5at"><div class="base_1u373dh" data-dcnode-id="3065"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3073" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3068"><source data-dcnode-id="3072"><source data-dcnode-id="3071"><source data-dcnode-id="3070"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3069" title=""></picture><noscript data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-07249de82a387eac19472819c5bcecdd.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3061" data-mm-id="_lrci69hn5"><span data-dcnode-id="3062" instrument_node="">A depiction of the female reproduction system in “The Science of Life,” one of the first “plumbing movies.” (Still from “Sex(Ed): The Movie”)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3059" data-mm-id="_92g9r9bzb"><span data-dcnode-id="3060" instrument_node="">“They delineate how sexuality affects men and how it affects women, with a lot about women’s roles as a future mother and men’s role in controlling their sexual impulses,” says Brenda Goodman, the director of “Sex(Ed).” Of course, the notion that women have sexual impulses wasn’t even considered. “That’s the theme that goes in sex-ed films today as well.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3053" data-mm-id="_fxsk2auvy"><span data-dcnode-id="3058" instrument_node="">“The Science of Life” also approached physical ugliness as a genetic disease, according to Martin S. Pernick’s&nbsp;</span><em data-dcnode-id="3055"><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/The-Black-Stork-Eugenics-Defective/dp/0195135393" target="_blank"><span data-dcnode-id="3057" instrument_node="">The Black Stork: Eugenics and the Death of ‘Defective’ Babies in American Medicine and Motion Pictures Since 1915</span></a></em><span data-dcnode-id="3054" instrument_node="">. “An attractive appearance goes hand in hand with health,” the film states, promoting a standard of beauty intended to influence teenagers as to whom they would select for mates. The idea was that if young people married and had children with partners who displayed a “fit” ideal of beauty—as opposed to the seductive but dangerous beauty of prostitutes infected with VD—the American gene pool would become more robust. As you might expect, the youth depicted as the ideals of fitness and beauty in the movie were white.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3051" data-mm-id="_hr5tcc0sz"><span data-dcnode-id="3052" instrument_node="">All these ideas derived from the study of eugenics, which deformed Darwin’s theory of evolution into the idea that humans could and should be bred for desirable traits. Birth control was seen as one means of reshaping the human race; another was forced sterilization of prisoners and people held in insane asylums.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3049" data-mm-id="_gddilpx17"><span data-dcnode-id="3050" instrument_node="">While they had very different views on women’s sexuality, Sanger and the American Social Hygiene Association had some common ground: Both opposed abortion, but aligned themselves with eugenicists. Given the times, it’s not surprising that the ideas about what makes person “defective” were usually based on prejudices such as racism, classism, homophobia, and ableism. Eugenics also laid the foundation for the Nazi genocide campaign to build a “perfect Aryan race” in the late 1930s and ’40s Germany. When the Nazis became the enemy—and the epitome of murderous evil—American thinkers and scientists disowned their formerly open beliefs in eugenics.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3044" data-mm-id="_8ia7jnsv0"><span data-dcnode-id="3048" instrument_node="">Once America entered&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/military-and-wartime/world-war-two" target="_blank"><span data-dcnode-id="3047" instrument_node="">World War II</span></a><span data-dcnode-id="3045" instrument_node="">, the question again arose about the morality of teaching venereal disease prevention to young soldiers, many of whom arrived fresh from the farm, inexperienced in both warfare and sex. But the American Social Hygiene Association’s methods from World War I prevailed. This time, the U.S. government got ahead of a potential VD crisis among the troops by issuing condoms and aggressively marketing a prevention campaign.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3042" data-mm-id="_5mizikfus"><span data-dcnode-id="3043" instrument_node="">Big-name Hollywood filmmakers like Darryl Zanuck, Frank Capra, John Huston, and George Stevens all made patriotic use of their talents, serving in a branch of the U.S. Army Signal Corps focused on making training films for military and civilian personnel and also documenting battles. “World War II was an important moment in the history of sex education,” Prelinger says. “The Signal Corps made a lot of sex-ed films for the American military because the U.S. government didn’t want the forces to be ravaged with venereal disease.”</span></p><div data-dcnode-id="3031" data-mm-id="_3oah6nr44"><figure class="style_1tb5rbs" data-dcnode-id="3032" data-id="_3oah6nr44"><div class="base_1u373dh" data-dcnode-id="3033"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3041" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3036"><source data-dcnode-id="3040"><source data-dcnode-id="3039"><source data-dcnode-id="3038"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3037" title=""></picture><noscript data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-824eeb342d275a9f8adde7148b1aba7b.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3029" data-mm-id="_32r6q3og0"><span data-dcnode-id="3030" instrument_node="">A WWII training film demonstrates how to put on a condom. (Still from “Sex(Ed): The Movie”)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3027" data-mm-id="_18p6jl3cr"><span data-dcnode-id="3028" instrument_node="">To cinephiles, the caliber of the talent makes these dated training-camp films well worth-watching. “In terms of pure cinema—cinematography, production design, and direction—there were some great films,” Goodman says.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3022" data-mm-id="_kojun5cau"><span data-dcnode-id="3026" instrument_node="">The Oscar-winning director John Ford, known for his John Wayne Westerns like “Stagecoach” and “The Searchers,” made a movie for the U.S. military called “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DOgR_ykUf9t0" target="_blank"><span data-dcnode-id="3025" instrument_node="">Sex Hygiene</span></a><span data-dcnode-id="3023" instrument_node="">,” which may be the most watched sex-ed movie ever, according to Eberwein.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3020" data-mm-id="_1wyb3w0nv"><span data-dcnode-id="3021" instrument_node="">“He actually made it before World War II began,” Eberwein says. “It’s my understanding that everybody in the military, no matter what branch of service, saw this film four times. It’s completely candid about showing the gross-out effects of venereal disease on the genitals. And the ‘Sex Hygiene’ narrative isn’t just warning about a dangerous woman like a prostitute—it’s also the ‘nice girl.’ One of the posters during World War II even says, ‘Just because she’s a nice girl doesn’t mean you can’t get venereal disease.’”</span></p><div data-dcnode-id="3009" data-mm-id="_gl8cz3xvd"><figure class="style_1tb5rbs" data-dcnode-id="3010" data-id="_gl8cz3xvd"><div class="base_1u373dh" data-dcnode-id="3011"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="3019" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3014"><source data-dcnode-id="3018"><source data-dcnode-id="3017"><source data-dcnode-id="3016"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="3015" title=""></picture><noscript data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-23ec2293a2f0b14fb2a40d7882d09112.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3007" data-mm-id="_9ss6x63l5"><span data-dcnode-id="3008" instrument_node="">A 1940s wartime poster warns troops, “She may look clean—but pick-ups, ‘good time’ girls, prostitutes spread syphilis and gonorrhea.” (Courtesy of the National Library of Medicine, History of Medicine Division)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3005" data-mm-id="_1wh350yj3"><span data-dcnode-id="3006" instrument_node="">The running theme through World War II sexual education films is that female sexuality is a serious threat to men’s dominance. In Eberwein’s book, he explains how the films gave servicemen—whose numbers reached 12 million in 1945—visions of emasculation and manhood diminished by openly sexual or promiscuous women. Eberwein argues that the message that women who have sex with multiple partners will emasculate men, and by extension, ruin American society, was so hammered into the minds of millions of American men who served in World War II that the fear lives on in our culture today.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="3000" data-mm-id="_zgh1zy7ba"><span data-dcnode-id="3004" instrument_node="">Besides warning the men against women’s sexuality, Goodman says World War II training films were also shockingly frank about&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/articles/getting-it-on-the-covert-history-of-the-american-condom/" target="_blank"><span data-dcnode-id="3003" instrument_node="">condom use</span></a><span data-dcnode-id="3001" instrument_node="">&nbsp;for VD prevention, even showing how to put them on models of penises. “It was a real surprise to me that those military films were very much supportive of protecting yourself,” Goodman says. "If you’re a smart soldier, you use a condom. There wasn’t a moral spin on&nbsp;that.&nbsp;There wasn’t anything about ‘Condoms may not be effective.’ It was just, ‘Use them.’ Now, we’ve come full circle, and condoms are suspect according to some agendas.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2998" data-mm-id="_dqwuqnttm"><span data-dcnode-id="2999" instrument_node="">Condoms figure symbolically in 1944’s
