" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1196" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1194" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=t2DkiceqmzU" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1172" data-mm-id="_i4vusqm5j"><span data-dcnode-id="1173" instrument_node="">But, oddly enough, some conservatives—fiscal conservatives—embraced oral contraception and other forms of birth control in the 1960s. As people grew more aware of the dangers of the degrading environment, peak oil, and diminished food supplies, a population-control movement emerged. While it was couched as an altruistic attempt to alleviate strain on limited resources and improve life on earth, campaigns largely targeted the non-white developing world.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1167" data-mm-id="_ymxfx1v3q"><span data-dcnode-id="1171" instrument_node="">That’s how beloved children’s character Donald Duck ended up schilling contraception on the big screen in 1968. The film “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dt2DkiceqmzU" target="_blank"><span data-dcnode-id="1170" instrument_node="">Family Planning</span></a><span data-dcnode-id="1168" instrument_node="">,” another of the several Disney-produced sex-education animations, focuses on a nuclear family of an unspecified non-white ethnic group who faces disaster if too many children are born. The way these babies are made—sex—is not mentioned, and the wife is so demure, she refuses to speak out loud, instead whispering her questions in her husband’s ear.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1165" data-mm-id="_ogr0zmmyh"><span data-dcnode-id="1166" instrument_node="">As surprising as it may seem in the era of “anti-contraception conservatives,” the financial backers of this pro-birth control film were, in fact, business-minded Republicans—Standard Oil-fortune heir John D. Rockefeller III and his Population Council. Rockefeller’s father had also been a big proponent of eugenics in the original American Social Hygiene Association. In the late ’60s and ’70s, “Family Planning” was translated into 25 languages and distributed throughout Asia and Central and South America to urge population control in developing countries.</span></p><div data-dcnode-id="1154" data-mm-id="_mqtuatwcj"><figure class="style_1tb5rbs" data-dcnode-id="1155" data-id="_mqtuatwcj"><div class="base_1u373dh" data-dcnode-id="1156"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1164" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1159"><source data-dcnode-id="1163"><source data-dcnode-id="1162"><source data-dcnode-id="1161"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1160" title=""></picture><noscript data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-31a5b110f930a4ead1678bdbc542e8d7.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1152" data-mm-id="_o9wjqi0m8"><span data-dcnode-id="1153" instrument_node="">Sociologist and sexologist Carol Queen talks about the women’s movement in “Sex(Ed): The Movie.” (Still from “Sex(Ed): The Movie”)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1150" data-mm-id="_cgrwurete"><span data-dcnode-id="1151" instrument_node="">As the birth control pill was altering the American landscape, so were ’60s and ’70s activists. The Stonewall Riots of 1969, prompted by a clash between the New York City gay community and police, gave birth to the gay rights movement. Four years later, the feminist movement scored a victory when the Supreme Court case Roe v. Wade gave American women the right to abortion.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1148" data-mm-id="_vm3w7yzgo"><span data-dcnode-id="1149" instrument_node="">Thanks to those advances, the ’60s and ’70s sex-education films started to address issues around feminism and homosexuality and began to show people of color and mixed-race couples. “When the ’60s came, we were much more open about sex and sexuality,” Goodman says. “The women’s movement, civil rights movement, and the gay rights movement, all coalesced at the same time.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1146" data-mm-id="_c1l5z1s6z"><span data-dcnode-id="1147" instrument_node="">New films challenged the traditional notion of marriage and sexuality. In 1979’s “Who Happen to Be Gay,” six professionals discuss frankly the effect their homosexuality has had on their lives, while 1974’s “Early Homosexual Fears” presents different views of homosexuality.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1144" data-mm-id="_15bg562ih"><span data-dcnode-id="1145" instrument_node="">In 1974’s “Self Awareness and Sex Roles,” Maureen McCormick, a.k.a. Marcia Brady, plays a young feminist explaining why she dumped her boyfriend: “He wanted me to do his laundry. Can you believe it?” The 1975 guidance film “Getting Married” describes a range of marriage types from “traditional” (the wife devotes her life to her husband) to “egalitarian” (both husband and wife make money and share household duties).</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1142" data-mm-id="_nuql8efuo"><span data-dcnode-id="1143" instrument_node="">The makers of 1974’s “Taking Our Bodies Back: The Women’s Health Movement” intended&nbsp;to give women knowledge about their bodies that had been restricted by the male-dominated medical industry. The young woman leading the lecture in the film, at one point, removes her underwear, pulls up her skirt, and demonstrates a speculum self-exam of her vagina. The startlingly open film also addresses home birth, abortion, hysterectomy, and breast cancer. Other films from the women’s movement explored female sexual pleasure and orgasm—the first time any sex-ed films acknowledged that they exist.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1140" data-mm-id="_cms8n55xq"><span data-dcnode-id="1141" instrument_node="">Sexual pleasure and communication between partners is explicit in 1974’s “Would You Kiss a Naked Man?”, wherein two young, inexperienced heterosexual lovers get naked and talk about their desires—the first time a sex-ed film meant for teenagers showed full-frontal male nudity. Today, this film is considered obscene and is impossible to show in a public setting. “‘Would You Kiss a Naked Man?’ is great, actually,” Goodman says. “In it, two people who obviously are attracted to each other but haven’t been with anybody work through how and what they communicate with each other.”</span></p><div data-dcnode-id="1129" data-mm-id="_fb4ze25p7"><figure class="style_1tb5rbs" data-dcnode-id="1130" data-id="_fb4ze25p7"><div class="base_1u373dh" data-dcnode-id="1131"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1139" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1134"><source data-dcnode-id="1138"><source data-dcnode-id="1137"><source data-dcnode-id="1136"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1135" title=""></picture><noscript data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-b0be073bb693794da19901f1f8fcdf1f.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1127" data-mm-id="_w3ax3po0d"><span data-dcnode-id="1128" instrument_node="">The country song accompanying the 1976 sex-ed movie, “Masturbatory Story,” has lyrics like, “I reached down in the bubbles and started feeling around, and oh lordy, oh mercy, what I found!” (Still from “Sex(Ed): The Movie”)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1125" data-mm-id="_faync35sq"><span data-dcnode-id="1126" instrument_node="">Even more peculiar is 1976’s celebration of male masturbation, “Masturbatory Story.” “Some of the ’70s films should have never been made,” Goodman says. “‘Masturbatory Story’ shows this 30-year-old guy in a bathtub while a country song about masturbation plays. I was like, ‘This could not have been shown anywhere!’, but then I looked at the leader on the film, and it said the ‘Los Angeles School System.’”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1123" data-mm-id="_9ntcdclz8"><span data-dcnode-id="1124" instrument_node="">“There was this brief period of openness where diverse and more explicit films could be shown in schools,” Prelinger says. “Part of that was a shift in authority: Instead of these incredibly hierarchical, often preachy, educational films that tend to propose very specific ways of looking at things, you began to see movements by educators in Cambridge and Berkeley to disrupt ideological hegemony.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1121" data-mm-id="_hpb5fuz35"><span data-dcnode-id="1122" instrument_node="">“It’s amazing how short that period of openness was,” he continues. “Now, those books with photographs about sexuality for kids are considered child porn, and no bookstore will sell them over the counter. But they’re actually an important part of the history. It seems like these periods of openness and diverse expression are very, very short. And the periods of mystification and anxiety are much longer.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1119" data-mm-id="_3ennpu0xz"><span data-dcnode-id="1120" instrument_node="">But even communities that successfully buttressed themselves from the influences of Berkeley and Cambridge in the ’60s and ’70s crumbled under the looming threat of a new epidemic in the early 1980s: a deadly sexually transmitted disease (STD) known as Acquired Immune Deficiency Syndrome, or AIDS.</span></p><div data-dcnode-id="1108" data-mm-id="_s702e4x6t"><figure class="style_1tb5rbs" data-dcnode-id="1109" data-id="_s702e4x6t"><div class="base_1u373dh" data-dcnode-id="1110"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1118" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1113"><source data-dcnode-id="1117"><source data-dcnode-id="1116"><source data-dcnode-id="1115"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1114" title=""></picture><noscript data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a76a226208411995432221398ade28da.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1106" data-mm-id="_3fgjmchpg"><span data-dcnode-id="1107" instrument_node="">A man wears a giant condom costume in 1981’s “Condom Sense.” (Still from “Sex(Ed): The Movie”)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1101" data-mm-id="_by45m62wu"><span data-dcnode-id="1105" instrument_node="">In September 1986,&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//time.com/3578597/aids-sex-ed-history/" target="_blank"><span data-dcnode-id="1104" instrument_node="">U.S. Surgeon General C. Everett Koop</span></a><span data-dcnode-id="1102" instrument_node="">&nbsp;asserted that the United States needed to change its approach to sex education. Instead of just explaining the biology of puberty, schools felt obligated to discuss, in detail, how sexually transmitted diseases were spread (including the formerly taboo subjects of premarital sex, homosexuality, and anal sex) and how transmission (as well as pregnancy) could be prevented through condoms. By 1993, 47 states had mandated sex education in schools. During the late ’70s and ’80s, the proliferation of video technology also made it easier and cheaper to produce and distribute sex-ed movies.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1099" data-mm-id="_tip13f0ti"><span data-dcnode-id="1100" instrument_node="">“The impetus for a definite change in and acceleration of warning films came with AIDS,” Eberwein says. “Those movies are quite powerful, actually, and in the context of those, you get a lot of very frank discussions about sexuality and women’s sexual needs are given more foregrounding. You see stuff in these movies that you would never have seen five years before the AIDS crisis.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1094" data-mm-id="_n257h5fd3"><span data-dcnode-id="1098" instrument_node="">Movies promoting condom use like 1981’s campy “Condom Sense” hit the market, but the movement quickly lost steam, Goodman says, as finger-pointing and the fear of otherness emerged once again. Congress passed the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.siecus.org/index.cfm%3Ffuseaction%3Dpage.viewpage%26pageid%3D1340%26nodeid%3D1" target="_blank"><span data-dcnode-id="1097" instrument_node="">Adolescent Family Life Act&nbsp;</span></a><span data-dcnode-id="1095" instrument_node="">(AFLA) that year to create programs intended to prevent teen pregnancy through “chastity and self-discipline.” While many schools embraced expanded sex education that described condoms as effective in preventing AIDS and pregnancy, two new abstinence-only sex-ed curricula called Teen Aid and Sex Respect characterized premarital sex as damaging to everyone, upheld traditional gender roles and sexual orientations, and often gave kids medically inaccurate information about AIDS and other STDs.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1092" data-mm-id="_yjafnoq8m"><span data-dcnode-id="1093" instrument_node="">“At first, the message was ‘Use condoms,” Goodman says. “In the beginning of the AIDS crisis, there was so much not known and a tremendous amount of fear. It’s like the Ebola virus now. There was a lot of confusion and concern about various populations such as drug users and homosexuals. Right away, one movement said, ‘Look, you can protect yourself. We believe we know how this is spread. And if you protect yourself from fluids —and one way is with a condom—you will be safe.’ On the other hand, a lot of people felt that the ‘undesirables’ in our society were responsible for AIDS. So all that came together and boiled up.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1090" data-mm-id="_gxb42vlp2"><span data-dcnode-id="1091" instrument_node="">America has always been prudish about sex, Prelinger says. “The abstinence movement goes so far back. They used to joke that the best contraceptive is an aspirin tablet held closely between the legs. There’s a million ways that has been said. It’s just now there are million more channels by which any idea can be expressed, and people can sell it or put it out for free. That’s how films like ‘The Gay Agenda,’ the homophobic movie about gays trying to take over, find their audience.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1085" data-mm-id="_xgyf72sxu"><span data-dcnode-id="1089" instrument_node="">But thanks to video technology, members of communities most affected by the spread of AIDS were able to make their own documentaries on the topic. “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DjmdY02R124U" target="_blank"><span data-dcnode-id="1088" instrument_node="">Sex, Drugs, and AIDS</span></a><span data-dcnode-id="1086" instrument_node="">” (1986), which was shown widely in New York City schools, featured interracial youth discussing AIDS risk and safe sex.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1077" data-mm-id="_qjmm3oc2b"><span data-dcnode-id="1084" instrument_node="">“The one good thing that came out of the AIDS crisis was this great, flowering of community-based video and video made by people who are most at risk,” Prelinger says. “Video collectives like the lesbian organization&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.actupny.org/divatv/" target="_blank"><span data-dcnode-id="1083" instrument_node="">DIVA TV (Damned Interfering Video Activists)</span></a><span data-dcnode-id="1081" instrument_node="">&nbsp;in New York were testing the limits of the format. Then in 1991, Ellen Spiro made a really inspirational video called ‘</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//spirofilms.com/hair.html" target="_blank"><span data-dcnode-id="1080" instrument_node="">DiAna’s Hair Ego</span></a><span data-dcnode-id="1078" instrument_node="">.’ DiAna was a black cosmetician in South Carolina who gave AIDS advice and counseling to her clients. She would give out condoms for safe sex, along with mousse and cosmetics samples.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1071" data-mm-id="_kkvipj8nt"><span data-dcnode-id="1076" instrument_node="">“AIDS changed everything and made what had been somewhat political majorly political,” Goodman says. “In her book&nbsp;</span><em data-dcnode-id="1073"><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Talk-About-Sex-Battles-Education/dp/0520243293" target="_blank"><span data-dcnode-id="1075" instrument_node="">Talk About Sex: The Battles Over Sex Education in the United States</span></a></em><span data-dcnode-id="1072" instrument_node="">, Janice Irvine’s point is that the whole rise of the American Right happened around people getting on school boards and fighting about sex education. It became a big flashpoint in the 1990s. They argued that we’ve become a sexual society and we’ve got to cut it out.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1066" data-mm-id="_6rj4stqv6"><span data-dcnode-id="1070" instrument_node="">In 1996, $50 million in federal funding for abstinence-only education each year was tacked onto&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.futureofsexed.org/background.html" target="_blank"><span data-dcnode-id="1069" instrument_node="">Clinton’s welfare reform bill</span></a><span data-dcnode-id="1067" instrument_node="">&nbsp;in Title V. Because states wanted this money, the films and programs used in schools in the 1990s were often created by religious organizations as opposed to public health nonprofits. “Under the guise of ‘We’re going to protect young people from AIDS,’ there was a heavy, heavy moral message that came along with it,” Goodman says.</span></p><div data-dcnode-id="1055" data-mm-id="_mv5mfj61l"><figure class="style_1tb5rbs" data-dcnode-id="1056" data-id="_mv5mfj61l"><div class="base_1u373dh" data-dcnode-id="1057"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1065" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1060"><source data-dcnode-id="1064"><source data-dcnode-id="1063"><source data-dcnode-id="1062"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1061" title=""></picture><noscript data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-38f0f41222192f582fd69c2de85b9de8.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1053" data-mm-id="_1qeny2wva"><span data-dcnode-id="1054" instrument_node="">This Abstinence.net image echoes a poster slogan from the Sex Respect program, “Pet Your Dog … Not Your Date.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1048" data-mm-id="_957cztcp5"><span data-dcnode-id="1052" instrument_node="">The 1991 sex-ed film “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeremiahfilms.com/store/no-second-chance.html" target="_blank"><span data-dcnode-id="1051" instrument_node="">No Second Chance</span></a><span data-dcnode-id="1049" instrument_node="">” was produced and distributed by Jeremiah Films, a company that claims to “promote patriotism, traditional values, and the Biblical worldview of [the] founding fathers.” In it, the movie teacher tells her class, “When you use a condom, it’s like you’re playing Russian roulette, there’s less chance when you pull the trigger you’re going to get a bullet in your head, but who wants to play Russian roulette with a condom?” When one blond popular boy asks her, “What happens if I want to have sex before I get married?”, she gets morbid: “Well, I guess you’ll just have to be prepared to die. And you’ll probably take with you, your spouse and one or more of your children.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1043" data-mm-id="_abxlo2snv"><span data-dcnode-id="1047" instrument_node="">Under President George W. Bush, funding for abstinence-only education skyrocketed. In 2000, Congress created even more funding and more restrictions for abstinence-only education with the passing of&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.futureofsexed.org/background.html" target="_blank"><span data-dcnode-id="1046" instrument_node="">Community-Based Abstinence Education (CBAE)</span></a><span data-dcnode-id="1044" instrument_node="">. According to “Sex(Ed): The Movie,” in 2000, $60 million was awarded for abstinence-only education; in 2002, $102 million; in 2008, $176 million. Meanwhile, states that required sex education in schools dropped from 47 to 22. The number of states that require sex education be based on scientific evidence is only 19.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1041" data-mm-id="_vi5e781gr"><span data-dcnode-id="1042" instrument_node="">“The most funding that’s ever been given by the federal government for sex ed has gone to abstinence-only education,” Goodman says. “A lot of organizations sprung up to take advantage of the millions and millions of dollars that suddenly became available for the purpose of communicating an abstinence message to young people.”</span></p><div data-dcnode-id="1030" data-mm-id="_2h7lqw6tm"><figure class="style_1tb5rbs" data-dcnode-id="1031" data-id="_2h7lqw6tm"><div class="base_1u373dh" data-dcnode-id="1032"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1040" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1035"><source data-dcnode-id="1039"><source data-dcnode-id="1038"><source data-dcnode-id="1037"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1036" title=""></picture><noscript data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-2be72fb1c716e13ad7dac28d23ac0188.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1028" data-mm-id="_guxh2kup6"><span data-dcnode-id="1029" instrument_node="">A 1960s “Growing Up and Liking It!” pamphlet instructs girls on “How to Take Those Days in Your Stride.” Click image to see larger. (Courtesy of the Prelinger Archives)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1020" data-mm-id="_12xcz5q01"><span data-dcnode-id="1027" instrument_node="">In 2004, Democratic congressman Henry Waxman issued a report called&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.siecus.org/index.cfm%3Ffuseaction%3DFeature.showFeature%26featureid%3D1180%26pageid%3D483%26parentid%3D478" target="_blank"><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The Content of Federally Funded Abstinence-Only Education Programs</span></em></a><em data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1021" instrument_node="">that found the curricula often had scientifically inaccurate information, used tones of fear and shame, mixed religion and science, and perpetuated stereotypes about gender roles. A program called WAIT Training, for example, taught&nbsp;kids that the AIDS virus HIV can be transmitted through tears or sweat, which contradicts facts from the Centers for Disease Control and Prevention. Abstinence-only programs, like films by James Dobson’s Focus on the Family, often point to a study that said condoms have only a 69 percent effectiveness rate, even though the study was discounted by the CDC and FDA in 1997.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1018" data-mm-id="_32zfianz4"><span data-dcnode-id="1019" instrument_node="">“Some of the pro-abstinence films argue that condoms do not always offer protection,” Eberwein says. “It’s interesting shift to see the shift from using condoms to prevent venereal disease in some of the military training films to using condoms to prevent conception in schools. But people can get angry about both of them because in either case, you’re saying the kid can use a condom, you’re saying a kid can have sex outside marriage, when the function of marriage is to produce children.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1013" data-mm-id="_djjwcx0rh"><span data-dcnode-id="1017" instrument_node="">Starting in 2001, Rep. Barbara Lee (D-Calif.) and Sen. Frank Lautenberg (D-N.J.) have been working on bills to offer federal funding for comprehensive sex-education programs. Their&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/113th-congress/senate-bill/372" target="_blank"><span data-dcnode-id="1016" instrument_node="">current legislation</span></a><span data-dcnode-id="1014" instrument_node="">, which has not yet passed Congress, would also block federal funding to programs that “deliberately withhold life-saving information about HIV; are medically inaccurate or have been scientifically shown to be ineffective; promote gender stereotypes; are insensitive and unresponsive to the needs of sexually active youth or lesbian, gay, bisexual, or transgender youth; or are inconsistent with the ethical imperatives of medicine and public health.”</span></p><div data-dcnode-id="1002" data-mm-id="_zgr9zao7o"><figure class="style_1tb5rbs" data-dcnode-id="1003" data-id="_zgr9zao7o"><div class="base_1u373dh" data-dcnode-id="1004"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1012" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1007"><source data-dcnode-id="1011"><source data-dcnode-id="1010"><source data-dcnode-id="1009"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1008" title=""></picture><noscript data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-68ff2a3b09f7aefd4ac53419decf310a.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1000" data-mm-id="_xg4dzkejf"><span data-dcnode-id="1001" instrument_node="">In the 1973 Disney animation “VD Attack Plan!”, Contagion Corps Sergeant gives a pep talk to armies of syphilis and gonorrhea germs, surrounded by phony pills that don’t hurt him.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="992" data-mm-id="_icjq997s7"><span data-dcnode-id="999" instrument_node="">But in 2009, Congress did pass a law that eliminated the Bush’s CBAE funding for abstinence-only education programs, and $100 million in funding was reallocated to evidence-based sex education. However, the Affordable Care Act in 2010 made funding available to both evidence-based and abstinence-only sex-education programs. Oregon, one of the most liberal states in the nation, doesn’t mandate abstinence-only education, but its diverse-cast “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vimeo.com/36866805" target="_blank"><span data-dcnode-id="998" instrument_node="">My Future—My Choice</span></a><span data-dcnode-id="996" instrument_node="">” film still focuses on the dangers of having sex, including teen pregnancy and AIDS. In the film, a teenage girl says, “The only 100 percent sure way to prevent pregnancy or a sexually transmitted disease is to say ‘no’ to sexual involvement.” According to&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bitchmagazine.org/post/the-surprising-history-of-american-sex-ed-films" target="_blank"><span data-dcnode-id="995" instrument_node="">Bitch Media</span></a><span data-dcnode-id="993" instrument_node="">, while condoms are not mentioned in the film, they are discussed in the film’s companion classroom material.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="984" data-mm-id="_5ytcnmf4b"><span data-dcnode-id="991" instrument_node="">It’s worth noting that wealthier kids in private schools are more likely to get comprehensive sex education—and are less likely to get pregnant or contract a sexually transmitted disease—than poor kids in public schools with abstinence-only education. States with the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thinkprogress.org/health/2012/04/10/461402/teen-pregnancy-sex-education/" target="_blank"><span data-dcnode-id="990" instrument_node="">highest pregnancy rates</span></a><span data-dcnode-id="988" instrument_node="">&nbsp;are ones that don’t require sex education. However, Goodman says by far the best sex-ed program&nbsp;she’s&nbsp;encountered, which is taught&nbsp;in some public schools, have come from a religious but not evangelical organization—the Unitarian Universalist’s&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uua.org/re/owl/297209.shtml" target="_blank"><span data-dcnode-id="987" instrument_node="">Our Whole Lives</span></a><span data-dcnode-id="985" instrument_node="">&nbsp;(OWL) program, a sexuality education curricula developed in the 1970s.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="982" data-mm-id="_i2505p48x"><span data-dcnode-id="983" instrument_node="">“The OWL program, which is being taught in some schools, is the best thing out there because it starts when you’re just a little guy with a few things about ‘This is my body’ and maybe a little bit about where you came from,” she says. “But then it grows up with you and deals with the psychological and the physical aspects of what it means to relate to yourself and to relate to another human being.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="980" data-mm-id="_3776jd1bj"><span data-dcnode-id="981" instrument_node="">“I came up to the San Francisco Bay Area and trained with some OWL folks who were training the teachers,” she continues. “I learned a lot about how sex ed could be done well, and it was an eye-opening experience for me. I remember coming home to L.A., having dinner with some friends, and telling them I am fascinated by the OWL notion that we should teach kids about sexual pleasure. These are all progressive Los Angelenos, and their mouths fell to the table. That’s a really tough concept, I think.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="972" data-mm-id="_1k7up5pv4"><span data-dcnode-id="979" instrument_node="">Today, of course, kids who don’t learn about sex at school or in the home can turn to the Internet. Unfortunately, online, misconceptions about sex abound, although self-produced videos like “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blip.tv/midwest-teen-sex-show" target="_blank"><span data-dcnode-id="978" instrument_node="">The Midwest Teen Sex Show</span></a><span data-dcnode-id="976" instrument_node="">” and Laci Green’s “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/lacigreen" target="_blank"><span data-dcnode-id="975" instrument_node="">Sex+</span></a><span data-dcnode-id="973" instrument_node="">” offer helpful, accurate, sex-positive information.</span></p><div class="style_1kwjqt6" data-dcnode-id="452" data-mm-id="_a42cu2j00"><figure class="style_sk5w3b" data-dcnode-id="453"><iframe allowfullscreen="" class="style_1nhfz2" data-dcnode-id="454" frameborder="0" height="113" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TD2EooMhqRI%3Ffeature%3Doembed&amp;raw" width="200"><html data-cast-api-enabled="true" data-dcnode-id="456" dir="ltr" lang="en"><head data-dcnode-id="946"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="966" name="viewport"/><link data-dcnode-id="961" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="KE0YpapGw35aI1BM8FPFTQ" rel="stylesheet"/><title data-dcnode-id="948">YouTube</title><link data-dcnode-id="947" href="https://www.youtube.com/watch?v=TD2EooMhqRI" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="457" dir="ltr"><div data-dcnode-id="464" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-con go online and get an affirming message. But there’s also a lot of damaging stuff out there. That’s why schools are a great place for sex education. If we could keep this in the schools in a neutral fashion where people could be passively watching a film and taking in information but then actively role-playing and working things out with a neutral authority figure, that would be ideal.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="448" data-mm-id="_5q6dbvbfy"><span data-dcnode-id="449" instrument_node="">Even though sex education has not progressed as far as we think, time has not stood still, either, which is obvious when we watch the old videos. It’s tempting to laugh at how dated, uptight, or even offensive they seem to us—the same way the recollection of my middle school’s menstruation video sends me into giggles. But Prelinger says we have to remember where those films were coming from.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="446" data-mm-id="_a77pivm05"><span data-dcnode-id="447" instrument_node="">“A lot of the films that appear ridiculous today have a kernel of truth in them,” he says. “They were made in part for good reasons, in some cases, to try and relieve suffering. They may have been racist and nativist, but they were also trying to make people healthier. We can laugh, but if we take a nuanced look, there’s much more than that going on.”</span></p><figure class="style_m54o41-o_O-style_48hmcm" data-dcnode-id="129" data-mm-id="_c4amzk7wh"><iframe allowfullscreen="" class="style_1nhfz2" data-dcnode-id="130" frameborder="0" height="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/89463337&amp;raw" width="620"><html data-dcnode-id="132" lang="en"><head data-dcnode-id="422"><meta charset="utf-8"><span data-dcnode-id="444" instrument_node=""> </span><meta charset="utf-8" data-dcnode
