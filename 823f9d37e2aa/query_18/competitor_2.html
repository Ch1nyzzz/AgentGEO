 “Easy to Get,” the very first sex-ed movie featuring African American protagonists. When a black serviceman hooks up with a “nice girl” over the holidays, he reaches for a condom, but she—being the emasculator—pushes his hand away.</span></p><div data-dcnode-id="2987" data-mm-id="_hhauue6ob"><figure class="style_1tb5rbs" data-dcnode-id="2988" data-id="_hhauue6ob"><div class="base_1u373dh" data-dcnode-id="2989"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="2997" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="2992"><source data-dcnode-id="2996"><source data-dcnode-id="2995"><source data-dcnode-id="2994"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="2993" title=""></picture><noscript data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-ba0c5cc4210c079747632547adc40c9c.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2985" data-mm-id="_vcl6fx3zt"><span data-dcnode-id="2986" instrument_node="">Another WWII-era poster, featuring cheesecake art, warns against the “booby trap.” (Courtesy of Social Welfare History Archives, University of Minnesota Libraries)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2983" data-mm-id="_uun7cnm7w"><span data-dcnode-id="2984" instrument_node="">“He comes back to the base camp and discovers some sore on his genitals,” Goodman says. “Then he goes to the white doctor on the base, who tells him that he’s had a ‘dirty woman.’ The young soldier says, ‘She looked so clean. She looked clean all over.’ And the doctor says, ‘Where you touched her, she was filthy and diseased inside,’ and it’s shocking. You’re like, ‘Oh my God, I cannot believe that any person would talk about anybody that way.’ But that was the only film from that period that we saw that was for black servicemen.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2975" data-mm-id="_hk88iinfm"><span data-dcnode-id="2982" instrument_node="">During the war, Pfizer scientists developed a way to mass-produce pharmaceutical-grade penicillin, making syphilis and gonorrhea less dire. But the media was sounding the alarm bells for a new “national scandal”—juvenile delinquency. With fathers away fighting the war and mothers working in factories, adolescents had more freedom than ever before and, according to the&nbsp;December 20, 1943 issue of&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3Dx1YEAAAAMBAJ%26pg%3DPA96%26lpg%3DPA96%26dq%3D%2522victory%2Bgirls%2522%2Bboston%2Bcommon%26source%3Dbl%26ots%3D5F4lB4g85R%26sig%3DOqDF5wNBPfw8osGWjs7K0y_Gnzg%26hl%3Den%26sa%3DX%26ei%3Da0eCVKDbCcbToASR0oLIDA%26ved%3D0CD0Q6AEwBQ%23v%3Donepage%26q%26f%3Dfalse" target="_blank"><span data-dcnode-id="2981" instrument_node="">“LIFE” magazine</span></a><span data-dcnode-id="2979" instrument_node="">, these unsupervised youth tended to engage in sexual exploits like orgies and violent crime, including rape. Plus, teenage girls known as “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.faqs.org/childhood/Th-W/Victory-Girls.html" target="_blank"><span data-dcnode-id="2978" instrument_node="">Victory girls</span></a><span data-dcnode-id="2976" instrument_node="">” believed that having sex with young soldiers on leave was&nbsp;an act of patriotism.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2973" data-mm-id="_i18mn5ilh"><span data-dcnode-id="2974" instrument_node="">“I don’t know if that was true or if it was moral panic,” Prelinger says. “A lot of people—educators, the clergy, anthropologists—were worried that the family was dead, that people felt they didn’t need to be married to have sex&lt;. There wasn’t an incentive to be in codified and more easily regulated relationships. After the war, there was the sense of ‘Let’s get this country back on the rails.’”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2971" data-mm-id="_wc9fgcuue"><span data-dcnode-id="2972" instrument_node="">With the war ended, 16mm film projectors from training camps were deaccessioned and made available to schools and nonprofits, leading to the proliferation of classroom films, most of which were meant to restore social order to a culture disrupted by the war effort. According to “Sex(Ed): The Movie,” by 1949, 84 percent of classrooms had projectors.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2969" data-mm-id="_tzl5eghje"><span data-dcnode-id="2970" instrument_node="">“You have this media infrastructure that had been built by the government during World War II that was then handed off to schools,” Prelinger says. “Although there had been many educational films in schools in the ’10s, ’20s, and ’30s, that just totally mainstreamed it.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2952" data-mm-id="_gszozlmj4"><span data-dcnode-id="2968" instrument_node="">In attempt to correct the course of American youth, Coronet Instructional Media Company produced a number of films in the ’40s and ’50s that were intended to re-socialize teenagers and teach them how to engage with one another in traditional, gendered ways that would lead to becoming good workers and respectable married adults with children of their own. Coronet titles include “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnQHkCQI1vO0" target="_blank"><span data-dcnode-id="2967" instrument_node="">Going Steady?</span></a><span data-dcnode-id="2965" instrument_node="">” “How to Be Well Groomed,” “Developing Friendships,” “Better Use of Leisure Time,” and “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/DatingDo1949" target="_blank"><span data-dcnode-id="2964" instrument_node="">Dating: Do’s and Don’ts</span></a><span data-dcnode-id="2962" instrument_node="">.” In Canada, B-film maker Budge Crawley put out similar guidance films like “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DErJ5-nev0io" target="_blank"><span data-dcnode-id="2961" instrument_node="">Social-Sex Attitudes in Adolescence</span></a><span data-dcnode-id="2959" instrument_node="">,” “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWCh3a-J9y_4" target="_blank"><span data-dcnode-id="2958" instrument_node="">How Much Affection?</span></a><span data-dcnode-id="2956" instrument_node="">”, and “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DoClBRCJeKAg" target="_blank"><span data-dcnode-id="2955" instrument_node="">Age of Turmoil</span></a><span data-dcnode-id="2953" instrument_node="">.”</span></p><div class="style_1kwjqt6" data-dcnode-id="2432" data-mm-id="_z0vfbpug3"><figure class="style_sk5w3b" data-dcnode-id="2433"><iframe allowfullscreen="" class="style_1nhfz2" data-dcnode-id="2434" frameborder="0" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Eqpe7Y_6rmQ%3Ffeature%3Doembed&amp;raw" width="200"><html data-cast-api-enabled="true" da d="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2451"><use class="ytp-svg-shadow" data-dcnode-id="2453" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2454" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2452" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Eqpe7Y_6rmQ" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2430" data-mm-id="_u2byqwg4w"><span data-dcnode-id="2431" instrument_node="">“These films are less sexual in nature and more about interacting with other kids—like how to conduct oneself in social situations, how to get a date, and how to behave on a date,” Goodman says. “Some of the younger folks that worked on our documentary found them fascinating and said they wished they had something like that growing up.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2425" data-mm-id="_a49lxy7e8"><span data-dcnode-id="2429" instrument_node="">In Coronet’s 1947 film “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DEqpe7Y_6rmQ" target="_blank"><span data-dcnode-id="2428" instrument_node="">Are You Popular?</span></a><span data-dcnode-id="2426" instrument_node="">,” Jenny, the promiscuous high schooler, is shamed and compared unfavorably to proper, virginal Carolyn. The voice-over says, “Jenny thinks she has the keys to popularity, parking in cars with boys at night. When Jerry brags about taking Jenny out, he learns that she dates all the boys, and he feels less important. No, those who park in cars are not really popular, not even with the boys they park with. Not when they meet at school or elsewhere.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2423" data-mm-id="_4u45g3evp"><span data-dcnode-id="2424" instrument_node="">“That was certainly a message in these films, which I think still exists today, that a young woman who is interested in sexual relationships, who maybe initiates sex, is seen as the ‘bad girl’—and that’s the girl nobody wants to sustain a relationship with.” Goodman says. “That was a burdensome message to many young women.”</span></p><div data-dcnode-id="2412" data-mm-id="_1qc1lk2sk"><figure class="style_1tb5rbs" data-dcnode-id="2413" data-id="_1qc1lk2sk"><div class="base_1u373dh" data-dcnode-id="2414"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="2422" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="2417"><source data-dcnode-id="2421"><source data-dcnode-id="2420"><source data-dcnode-id="2419"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="2418" title=""></picture><noscript data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-45c99ad16fe5f2b99294d01d2c04aecf.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2410" data-mm-id="_xji3laqx7"><span data-dcnode-id="2411" instrument_node="">The back of the 1960 “Growing Up and Loving It!” pamphlet encourages girls to buy Teen-Age by Modess sanitary napkins and “Princess” Vee-Form belts. (Courtesy of the Prelinger Archives)</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2408" data-mm-id="_vdk9d1huc"><span data-dcnode-id="2409" instrument_node="">Other movies dealt with the changes a boy or girl’s body will go through during puberty. Often, the makers of feminine hygiene products such as Johnson &amp; Johnson, which produced Modess, and Kimberly-Clark, which produces Kotex, sponsored the films for girls. After classroom screenings, girls would receive branded pamphlets on menstruation and the process of “becoming a woman,” as well as period journals, with prominent advertising for the company’s sanitary napkins.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2406" data-mm-id="_xqvxlwrwb"><span data-dcnode-id="2407" instrument_node="">“Some of movies produced by feminine hygiene companies were wonderful,” Goodman says. “‘Molly Grows Up’ is a great film, even if the list of what you can do and can’t do on your period—like no fast dancing or horseback riding—seems silly now. Anybody with skin in the game was willing to finance these films. I don’t think there was a thought on the part of the schools to say, ‘Okay, wait a minute, where are these messages coming from?’”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="2401" data-mm-id="_s3ai0ytc8"><span data-dcnode-id="2405" instrument_node="">In 1946, for example,&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/advertising/disney" target="_blank"><span data-dcnode-id="2404" instrument_node="">Disney</span></a><span data-dcnode-id="2402" instrument_node="">, in partnership with Kimberly-Clark, released a classroom film called “The Story of Menstruation” featuring a petite doe-eye redhead, who wouldn’t be out of place among the company’s fairy-tale princesses. While the scenes explaining menstruation are frank and scientific, the male narrator also instructs the young woman on how to cope with PMS without offending anyone with a disheveled, unattractive appearance or improper displays of emotion.</span></p><div class="style_1kwjqt6" data-dcnode-id="1881" data-mm-id="_rhn7dii0l"><figure class="style_sk5w3b" data-dcnode-id="1882"><iframe allowfullscreen="" class="style_1nhfz2" data-dcnode-id="1883" frameborder="0" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/kDDcn0BroiY%3Ffeature%3Doembed&amp;raw" width="200"><html data-cast-api-enabled="true" data-dcnode-id="1885" dir="ltr" lang="en"><head data-dcnode-id="2375"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="2395" name="viewport"/><link data-dcnode-id="2390" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="XF/0s2ow40JGZmXYvU99sQ" rel="stylesheet"/><title data-dcnode-id="2377">YouTube</title><link data-dcnode-id="2376" href="https://www.youtube.com/watch?v=kDDcn0BroiY" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="1886" dir="ltr"><div data-dcnode-id="1893" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls ytp-large-width-mode" data-dcnode-id="1894" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="2373" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="2374" playsinline="" style="width: 650px; height: 366px; left: 0px; top: -366px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="2372" data-layer="1"></div><div class="ytp-chrome-top ytp-show-cards-title" data-dcnode 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1911" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1909" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1904"><use class="ytp-svg-shadow" data-dcnode-id="1906" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1907" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1905" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1900"><use class="ytp-svg-shadow" data-dcnode-id="1902" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1903" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1901" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=kDDcn0BroiY" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1879" data-mm-id="_uel35qknj"><span data-dcnode-id="1880" instrument_node="">“During this time, you may feel less pep, or a twinge, or a touch of nerves,” he intones, as the pretty girl cries in the mirror. “No matter how you feel, you have to live with people. You have to live with yourself, too. Once you stop feeling sorry for yourself and take those days in your stride,” he says, as she perks up on command, “you’ll find it easier to keep smiling and even-tempered. It’s smart to keep looking smart.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1877" data-mm-id="_4ur1oml7t"><span data-dcnode-id="1878" instrument_node="">“Buck up!” Goodman says. “Buck up and look good, that’s the message of that film. We saw several films that asserted women needed to look good and act appropriate.&nbsp;There’s a lot of appropriateness, for everybody, in these films.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1867" data-mm-id="_0266dbur6"><span data-dcnode-id="1876" instrument_node="">Such films didn’t get much attention, until a sex-ed class was splashed on the pages of&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3DREYEAAAAMBAJ%26pg%3DPA55%26dq%3D%2522human%2Bgrowth%2522%2Blife%2B1948%2Blester%2Bbeck%26hl%3Den%26sa%3DX%26ei%3DxG6mUYeEHeOtiQKhoYHoAQ%26ved%3D0CDAQ6AEwAA%23v%3Donepage%26q%3D%2522human%2520growth%2522%2520life%25201948%2520lester%2520beck%26f%3Dfalse" target="_blank"><span data-dcnode-id="1875" instrument_node="">“LIFE” </span></a><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3DREYEAAAAMBAJ%26pg%3DPA55%26dq%3D%2522human%2Bgrowth%2522%2Blife%2B1948%2Blester%2Bbeck%26hl%3Den%26sa%3DX%26ei%3DxG6mUYeEHeOtiQKhoYHoAQ%26ved%3D0CDAQ6AEwAA%23v%3Donepage%26q%3D%2522human%2520growth%2522%2520life%25201948%2520lester%2520beck%26f%3Dfalse" target="_blank"><span data-dcnode-id="1873" instrument_node="">magazine</span></a><span data-dcnode-id="1871" instrument_node="">on May 24,&nbsp;1948. Eddie Albert, an American actor and activist, known later for his role in “Green Acres,” had teamed up with the Portland social hygiene organization E.C. Brown Trust, which is affiliated with the University of Oregon, to produce sex education films that would be appropriate to show kids as young as 11 years old. The trust bankrolled the first production called “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dkh_vRiHfV58" target="_blank"><span data-dcnode-id="1870" instrument_node="">Human Growth</span></a><span data-dcnode-id="1868" instrument_node="">,” UO psychology professor Lester F. Beck wrote the film, director Sy Wexler shot it, and Albert Productions produced it.</span></p><div data-dcnode-id="1856" data-mm-id="_ia96prypr"><figure class="style_1tb5rbs" data-dcnode-id="1857" data-id="_ia96prypr"><div class="base_1u373dh" data-dcnode-id="1858"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1866" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1861"><source data-dcnode-id="1865"><source data-dcnode-id="1864"><source data-dcnode-id="1863"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1862" title=""></picture><noscript data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-a04c9f2934f1fde0d6df7a5e0348d31e.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1854" data-mm-id="_9sixnioc3"><span data-dcnode-id="1855" instrument_node="">A still from the animation in 1947’s “Human Growth.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1852" data-mm-id="_utaqpr5rm"><span data-dcnode-id="1853" instrument_node="">“Human Growth,” released in 1947, starts out with a nuclear family in the living room, the son and daughter gawking at the sight of Native Americans in loincloths in a book. This segues to the daughter in a mixed-gender classroom where the teacher is leading a discussion about the change from child to adolescent. When the movie teacher then presents an animated film on “the cycle of human growth,” which takes over the screen. When the animation ends, the movie teacher quizzes the movie kids and fields their polite questions. At the end, she breaks the fourth wall and addresses the real audience directly, “You students who’ve been watching this film, you’ve heard the questions we’re going to discuss. You can discuss these same questions with your teacher, and you can add any others.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1850" data-mm-id="_ylfsdho29"><span data-dcnode-id="1851" instrument_node="">“It dealt with the basic mechanics of conception without graphic photographs or things like that,” Eberwein says. “It was very tastefully done. You have the model family—the boy, girl, mother, and father in the living room—a monument to middle-class normality.&nbsp;There’s nothing sleazy about it. It’s okay, if Mom and Dad and the teacher are there.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1848" data-mm-id="_m35vg7byb"><span data-dcnode-id="1849" instrument_node="">Of course, the trajectory for the boy and girl in the film is a heteronormative path to dating (while staying chaste), getting married, and having children. Homosexuality was never addressed in these movies, and the actors were never people of color. “I grew up in North Carolina, and nothing deviated from that notion of that sex education was really to train you to get together, as a man and a woman, to reproduce—but not before the time that is sanctioned,” Goodman says.&nbsp;Honestly, if you were a gay or trans kid or just someone who saw things a little bit differently, you didn’t get to see yourself represented. Probably you had questions like, ‘Is there something wrong with me?'"</span></p><div data-dcnode-id="1837" data-mm-id="_njfw379gt"><figure class="style_1tb5rbs" data-dcnode-id="1838" data-id="_njfw379gt"><div class="base_1u373dh" data-dcnode-id="1839"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1847" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1842"><source data-dcnode-id="1846"><source data-dcnode-id="1845"><source data-dcnode-id="1844"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1843" title=""></picture><noscript data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-52e90934c6f314742bafd92f50336571.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1835" data-mm-id="_mw9s6i59c"><span data-dcnode-id="1836" instrument_node="">The spread on sex education in the May 24, 1948 issue of “LIFE” showed seventh-grade students watching “Human Growth” in Oregon.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1833" data-mm-id="_z3hwoqfp9"><span data-dcnode-id="1834" instrument_node="">One of the first groups to see “Human Growth” was a class of seventh graders at Theodore Roosevelt Junior High School in Eugene, Oregon. By the time “LIFE” magazine did its big five-page feature on the movie, it had screened for 2,200 Oregon students. It also received a thumbs-up from magazines like “Time” and “Better Homes &amp; Gardens.” Still, it was banned in many parts of the country, including New York State. “People were outraged that such a thing would be shown in the classroom,” Eberwein says.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1831" data-mm-id="_dicjr7m5l"><span data-dcnode-id="1832" instrument_node="">“It got a lot of media attention because it was a real stretch,” Prelinger says. “First off, it’s for younger kids, and second off, it’s mainstream. The idea was look, ‘We’re going to talk about this in class. It isn’t going to be a regulated curriculum; we’re going to let the kids ask their questions.’ A lot of parents didn’t want their kids engaging in discussions like that. The idea that it wasn’t hierarchical or teachers reading from the script but kids talking about it on their own, I think that was symbolically threatening.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1829" data-mm-id="_xwkktqeju"><span data-dcnode-id="1830" instrument_node="">Despite the objections, “Human Growth” was an extremely popular film. As “Sex(Ed)” explains, the first run distributed 1,200 prints of the film across the United States. “The master film actually wore out,” Eberwein says. “So they remade it using the same actress who played the chief educator in the film, and tried to follow precisely the terms of the original movie. It was shown all over, except where it was banned.”</span></p><div data-dcnode-id="1818" data-mm-id="_vechx6jug"><figure class="style_1tb5rbs" data-dcnode-id="1819" data-id="_vechx6jug"><div class="base_1u373dh" data-dcnode-id="1820"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1828" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1823"><source data-dcnode-id="1827"><source data-dcnode-id="1826"><source data-dcnode-id="1825"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1824" title=""></picture><noscript data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-f980f041e8e00f2a69ef7311f140aa12.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1816" data-mm-id="_6kue7af68"><span data-dcnode-id="1817" instrument_node="">In 1957’s “As Boys Grow,” a coach is shown telling the boys in his class how they can expect their bodies to change.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1799" data-mm-id="_jg37u51hg"><span data-dcnode-id="1815" instrument_node="">Because it was such a hit, sex education started to take off in the United States, with films meant to be shown to boys and girls together, like 1947’s “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DP46ulJR1Bk0" target="_blank"><span data-dcnode-id="1814" instrument_node="">Human Reproduction</span></a><span data-dcnode-id="1812" instrument_node="">,” and separately, like 1953’s “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D--45yAU7NUw" target="_blank"><span data-dcnode-id="1811" instrument_node="">Molly Grows Up,</span></a><span data-dcnode-id="1809" instrument_node="">” 1957’s “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DOsTOHyJRxrI" target="_blank"><span data-dcnode-id="1808" instrument_node="">As Boys Grow</span></a><span data-dcnode-id="1806" instrument_node="">,” and the 1962 companion films, “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DBjeFBwoLSJM" target="_blank"><span data-dcnode-id="1805" instrument_node="">Girl to Woman</span></a><span data-dcnode-id="1803" instrument_node="">” and “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D4i-JuT5mge0" target="_blank"><span data-dcnode-id="1802" instrument_node="">Boy to Man</span></a><span data-dcnode-id="1800" instrument_node="">.” Interestingly, sex-ed films for mixed-gender classes tended to use techniques such as scenes of students listening to a lecture and medical graphics to distance the kids from identifying too closely with the movie, whereas movies for specific genders featured characters, like Molly, meant for the children to relate to.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1794" data-mm-id="_fu9jxsr49"><span data-dcnode-id="1798" instrument_node="">The same year the “LIFE” magazine article on “Human Growth” appeared, the shocking Kinsey Report “Sexual Behavior in the Human Male” was published, discussing taboo topics such as oral sex and homosexuality. Among the finding, the report stated that&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kinseyinstitute.org/research/ak-data.html%23masturbation" target="_blank"><span data-dcnode-id="1797" instrument_node="">92 percent of men&nbsp;</span></a><span data-dcnode-id="1795" instrument_node="">interviewed had masturbated. In “As Boys Grow,” the coach presenting the lesson on puberty tells the boys, “Sometimes you hear that masturbation affects your mind or your manhood, but for boys your age it’s natural,” which is a long way from the views espoused in “The Gift of Life” from 1920. In “Boy to Man,” the voice-over states, “Many boys are worried by masturbation and nocturnal emissions, yet doctors know that neither causes mental disease nor physical injury, that both are natural outlets in no way harmful.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1789" data-mm-id="_d196gbhbf"><span data-dcnode-id="1793" instrument_node="">Even though the Kinsey Report on “Sexual Behavior in the Human Female” in 1953 also found that&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kinseyinstitute.org/research/ak-data.html%23masturbation" target="_blank"><span data-dcnode-id="1792" instrument_node="">62 percent of women</span></a><span data-dcnode-id="1790" instrument_node="">&nbsp;interviewed had masturbated, the girls’ films never addressed masturbation or sexual pleasure, “Sex(Ed)” explains. Instead, girls’ films—like the one I watched in sixth grade—centered on menstruation and reproduction, while advertising menstrual pads and tampons.</span></p><div data-dcnode-id="1778" data-mm-id="_m9wbani0f"><figure class="style_1tb5rbs" data-dcnode-id="1779" data-id="_m9wbani0f"><div class="base_1u373dh" data-dcnode-id="1780"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1788" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1783"><source data-dcnode-id="1787"><source data-dcnode-id="1786"><source data-dcnode-id="1785"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1784" title=""></picture><noscript data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-15d01482022888202fdc072d93737bb6.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1776" data-mm-id="_zoxzadj84"><span data-dcnode-id="1777" instrument_node="">The 1962 sex-ed film “Boy to Man” tells teenage boys not to worry about nocturnal emissions.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1768" data-mm-id="_4vg3b1gxg"><span data-dcnode-id="1775" instrument_node="">While films focusing solely on the threat of venereal disease were a staple of military sex ed, the first such movie intended for teenagers didn’t appear until 1959 when the Kansas State Board of Health commissioned “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnGN264vs1k4" target="_blank"><span data-dcnode-id="1774" instrument_node="">The Innocent Party</span></a><span data-dcnode-id="1772" instrument_node="">” (now available thanks to&nbsp;Prelinger’s videos on the&nbsp;Internet Archive) from Centron Corp. The film gives short shrift to the science of how syphilis is transmitted, prevented through condoms, or treated with penicillin. Instead, it draws audiences in with a melodramatic narrative promoting the notion that premarital sex—and women giving it up too easily—can only lead to anguish and shame. In 1961, the Kansas health board and Centron teamed up again to produce “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/Lc0rr0zst0r3fr0nt112DanceLittleChildren1" target="_blank"><span data-dcnode-id="1771" instrument_node="">Dance, Little Children</span></a><span data-dcnode-id="1769" instrument_node="">.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1766" data-mm-id="_w5dhtbl8e"><span data-dcnode-id="1767" instrument_node="">“‘The Innocent Party’ is about an upper middle-class boy who goes out with a woman who’s poor or working class,” Prelinger says. “She is desperate to be taken seriously, and so she gives herself to him. But he catches a disease from her and passes it on to his ‘nice girl’ girlfriend. ‘Dance, Little Children’ is about the brassy blonde under the bleachers at the game who gives all these kids VD—and it’s about contact tracing. Again, the woman is the vector.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1764" data-mm-id="_s4szuvffa"><span data-dcnode-id="1765" instrument_node="">But VDs weren’t even parents’ worst fear. In the postwar era, cities grew larger and more hostile, and even new suburbs spread into one another, creating unbroken sprawl. Suddenly, parents felt they no longer knew everyone in town, and their children faced all sorts of risk when they rode out to the ballpark on their bikes.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1762" data-mm-id="_d7w4bbthz"><span data-dcnode-id="1763" instrument_node="">“In the new urban landscape of the postwar period, Los Angeles was no longer a series of villages where everybody knew each other,” Prelinger says. “It’s endless sprawl filled with all sorts of dangers that lurked in the sunlight. The broad boulevards were filled with sexual predators and dope. Somebody wanted to run your bicycle down, and somebody wanted to steal something from you. There were drunken drivers, too. It was a world filled with all kinds of danger for kids.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1760" data-mm-id="_7rrbggv5s"><span data-dcnode-id="1761" instrument_node="">Former child actor Sid Davis became the driving force behind “stranger danger” guidance films. “Sid Davis is very much his own phenomenon,” says Prelinger, who was friends with the director before his death. “He was a chancer himself. He had been a juvenile delinquent and a bit of a gambler, and he’d made fortunes and lost them. Before he died, he told me the story of how he was working as John Wayne’s stand-in on the set of ‘Red River,’ and he was talking with the Duke about a case of kidnapping and child molestation in L.A. And the Duke said, ‘Why don’t you make a film?’ and staked him money to make ‘The Dangerous Stranger’ (1950), which was the first film about abduction and sex crimes—the sex crimes being suggested, if not shown.</span></p><div data-dcnode-id="1749" data-mm-id="_q3g4s4dr5"><figure class="style_1tb5rbs" data-dcnode-id="1750" data-id="_q3g4s4dr5"><div class="base_1u373dh" data-dcnode-id="1751"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1759" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1754"><source data-dcnode-id="1758"><source data-dcnode-id="1757"><source data-dcnode-id="1756"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1755" title=""></picture><noscript data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-57be30518633ffa7164eeccdde8ae179.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1747" data-mm-id="_haaqf6jkf"><span data-dcnode-id="1748" instrument_node="">Sid Davis’ 1961 stranger-danger film, “Girls Beware,” warns girls of all the trouble they could get into talking to men they don’t know.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1742" data-mm-id="_jf5s1g0mg"><span data-dcnode-id="1746" instrument_node="">“Sid said he sold tens of thousands copies of it, and he realized he was on to something,” Prelinger continues. “So he made similar films over and over again. ‘Girls Beware’ (1958) is about rapists abducting girls. The message is, ‘Don’t go in cars with strange boys. Don’t answer ads tacked up at the supermarket for babysitting unless you know who’s there. Don’t do stupid things.’ Perfectly good advice, actually, for anybody. But he put a real moral spin on it. There are several editions of ‘Girls Beware,’ and&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DheRvRYGX6Rk" target="_blank"><span data-dcnode-id="1745" instrument_node="">the best one is from 1961</span></a><span data-dcnode-id="1743" instrument_node="">, where there are two ‘nice girls’ who are sitting at the drive-in, and this punk teenager in a pickup picks one of them up. They develop the kind of relationship where he keeps wanting more and more. There’s that great scene where you see them sitting in the park, the camera pans up to the sky, and it’s clear what’s happening. Then she’s pregnant.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1737" data-mm-id="_s1oo4n811"><span data-dcnode-id="1741" instrument_node="">Davis made a companion film to “Girls Beware” in 1961 called “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DECilAeLLATc" target="_blank"><span data-dcnode-id="1740" instrument_node="">Boys Beware</span></a><span data-dcnode-id="1738" instrument_node="">” in partnership with the Inglewood, California, Police Department and Inglewood Unified School District. In it, boys innocently befriend older men who offer them rides home. The voice-over intones: “Jimmy didn’t know was that Ralph was sick, a sickness that isn’t visible like small pox but no less dangerous and contagious. A sickness of the mind. You see, Ralph was a homosexual, a person who demands an intimate relationship with persons of their own sex.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1735" data-mm-id="_wgqrx4g58"><span data-dcnode-id="1736" instrument_node="">
At the time, traditionalists saw homosexuality&nbsp;as a serious threat to the fabric of the American family. But whether Sid Davis himself was homophobic is up for debate. “He made a homophobic film,” Prelinger says. “I’ve never been able to find out how many prints were sold. There were never many films like that. He made it four times. I think the third time, it was called ‘Boys Aware,’ and it became more generalized. We don’t have a print of it anymore, but in it, the knee-jerk equation of gay men with child molestation disappeared. When I talked to Sid about it, I didn’t see him as a deep homophobe. I saw him as a profiteer. I’m not trying to get him off the hook. That film has great force, and it’s offensive.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1724" data-mm-id="_mrpdopfzs"><span data-dcnode-id="1734" instrument_node="">Despite all the people who longed for more innocent times, a sexual revolution was underway. The FDA approved oral contraception, or birth control pills, for prescription use in the United States in 1960. Four years later, Mary Calderone, medical director at&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.plannedparenthood.org/" target="_blank"><span data-dcnode-id="1733" instrument_node="">Planned Parenthood</span></a><span data-dcnode-id="1731" instrument_node="">, established the national nonprofit organization&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.siecus.org/index.cfm" target="_blank"><span data-dcnode-id="1730" instrument_node="">Sexuality Information and Education Council of the United States (SIECUS)</span></a><span data-dcnode-id="1728" instrument_node="">&nbsp;in New York City to promote comprehensive “sexuality education” based on the idea that sexuality is a natural and healthy part of life and individuals should be educated and trusted to make responsible decisions around sex. SIECUS programs for schools began to include information on birth-control methods, teen pregnancy, masturbation, gender relations, and later, homosexuality. This challenged the more conservative programs promoted by the American Social Hygiene Association (which had become the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ashasexualhealth.org/" target="_blank"><span data-dcnode-id="1727" instrument_node="">American Social Health Association</span></a><span data-dcnode-id="1725" instrument_node="">&nbsp;in 1960) that still emphasized abstinence until marriage while also teaching&nbsp;disease prevention.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1716" data-mm-id="_wwqswrdzs"><span data-dcnode-id="1723" instrument_node="">As America got more and more involved in the War in&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/military-and-wartime/vietnam-war" target="_blank"><span data-dcnode-id="1722" instrument_node="">Vietnam</span></a><span data-dcnode-id="1720" instrument_node="">, young people faced with their own mortality started to reject the war and the traditional culture they felt brought America into it, experimenting with drugs and “free love.” In San Francisco, the Multimedia Resource Center (MMRC), now known as the&nbsp;</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sexandculture.org/" target="_blank"><span data-dcnode-id="1719" instrument_node="">Center for Sex and Culture</span></a><span data-dcnode-id="1717" instrument_node="">, “distributed a whole bunch of films, many of which were artsy and extremely explicit,” Prelinger says. “They were about gay or lesbian sex, or people who were severely disabled having sex. Anybody could rent them. Some churches even showed these films as part of the general trend to openness.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1711" data-mm-id="_re6vg7r07"><span data-dcnode-id="1715" instrument_node="">Of course, all this brought on a whole new round of panic about young people having sex without consequence. The ultra-conservatives felt that kids were getting too much information about sex at school, thanks to SIECUS—and putting it to use. In 1965, a strangely titillating anti-obscenity propaganda film, “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dom4kMTw-R6o" target="_blank"><span data-dcnode-id="1714" instrument_node="">Perversion for Profit</span></a><span data-dcnode-id="1712" instrument_node="">,” was released, warning against the “world of lesbians, homosexuals, and other sexual deviants.” Television news reporter George Putnam narrates, “We know that once a person is perverted, it is practically impossible for that person to adjust to normal attitudes in regards to sex.”</span></p><div data-dcnode-id="1700" data-mm-id="_4k0gcjvwx"><figure class="style_1tb5rbs" data-dcnode-id="1701" data-id="_4k0gcjvwx"><div class="base_1u373dh" data-dcnode-id="1702"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="1710" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1705"><source data-dcnode-id="1709"><source data-dcnode-id="1708"><source data-dcnode-id="1707"><img alt="" class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="1706" title=""></picture><noscript data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/brokenimagev3-205ad53f812e751c24e7e2c7fbc1d0aa.png" alt="" title=""/&gt;&lt;/picture&gt;</span></noscript></div></figure></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1698" data-mm-id="_1freucdd0"><span data-dcnode-id="1699" instrument_node="">The 1965 anti-obscenity Citizens for Decent Literature production “Perversion for Profit” features strangely titillating images barely covered with black bars.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1696" data-mm-id="_gckmt2oeg"><span data-dcnode-id="1697" instrument_node="">“That film was made by Citizens for Decent Literature, a lay Catholic group formed to lend support to local efforts to pass obscenity laws because after the Supreme Court said that the definition of pornography was up to local norms,” Prelinger says. “I think it was shown pretty widely.’”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="1694" data-mm-id="_j3pi8klx4"><span data-dcnode-id="1695" instrument_node="">“Perversion for Profit” was unintentionally ironic, Goodman points out. “This film was about what happens if you have too much access to sexual material,” she says. “Yet it showed these pictures of women who were in some provocative poses—let’s say their breasts were somewhat exposed—and they would put a banner over their eyes. So it just made no sense whatsoever. Just the way they chose to cover things up was titillating. It’s hilarious.”</span></p><div class="style_1kwjqt6" data-dcnode-id="1174" data-mm-id="_au3oz0ym0"><figure class="style_sk5w3b" data-dcnode-id="1175"><iframe allowfullscreen="" class="style_1nhfz2" data-dcnode-id="1176" frameborder="0" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/t2DkiceqmzU%3Ffeature%3Doembed&amp;raw" width="200"><html data-cast-api-enabled="true" data-dcnode-id="1178" dir="ltr" lang="en"><head data-dcnode-id="1668"><meta charset="utf-8"><meta content="width=device-width, initial-s
