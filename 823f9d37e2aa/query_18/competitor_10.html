</span><figure class="wp-caption alignnone" data-dcnode-id="2226" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="2227" style="width: 1920px"><img alt="Prisoners Adjusting Outside facts" class="lazy-hidden size-full wp-image-348418" data-dcnode-id="2233" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-360x240.jpg 360w" height="1280" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-348418" src="https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920.jpg" alt="Prisoners Adjusting Outside facts" width="1920" height="1280" srcset="https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/prison-553836_1920-360x240.jpg 360w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2228"><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2230" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="2225" instrument_node="">
</span><h2 data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">54. Fatty on Trial</span></h2><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">After a media storm, the first trial was set up for November of 1921. Public opinion toward Arbuckle was so negative that when his estranged-but-supportive wife arrived at the courthouse, someone in the crowd tried to shoot her.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2211" style="width: 4547px"><div class="media-credit-container alignnone" data-dcnode-id="2212" style="width: 4547px"><img alt="Favorite Childhood Christmas Movies facts" class="lazy-hidden size-full wp-image-234589" data-dcnode-id="2218" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_.jpg 4547w, https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_-1024x768.jpg 1024w" height="3410" loading="lazy" sizes="(max-width: 4547px) 100vw, 4547px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4547"><noscript data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-234589" src="https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_.jpg" alt="Favorite Childhood Christmas Movies facts" width="4547" height="3410" srcset="https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_.jpg 4547w, https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/wood-tool-hammer-symbol-balance-business-839873-pxhere.com_-1024x768.jpg 1024w" sizes="(max-width: 4547px) 100vw, 4547px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2213"><a data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pxhere.com/"><span data-dcnode-id="2215" instrument_node="">PxHere </span></a></span></div></figure><span data-dcnode-id="2210" instrument_node="">
</span><h2 data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">55. The Defense Rests</span></h2><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2206" instrument_node="">The prosecution’s case was less than solid. Fatty Arbuckle was, by every account, a kind-hearted and gentle person. Multiple guests at the party also testified that he had never been alone with Rappe. Doctors found no evidence of sexual assault and testified that Rappe had been struggling with bladder problems for some time. After a dramatic trial, the jury couldn’t reach a verdict. With a mistrial, </span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Arbuckle would have to repeat his nightmare in court again. </span></strong></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2198"><img alt="Rest My Case facts" class="lazy-hidden size-full wp-image-317607" data-dcnode-id="2201" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701.jpg 2993w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-360x240.jpg 360w" height="1995" loading="lazy" sizes="(max-width: 2993px) 100vw, 2993px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" style="text-align: center;" width="2993"><noscript data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-317607" style="text-align: center;" src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701.jpg" alt="Rest My Case facts" width="2993" height="1995" srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701.jpg 2993w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1292651701-360x240.jpg 360w" sizes="(max-width: 2993px) 100vw, 2993px" /&gt;</span></noscript></p><span data-dcnode-id="2197" instrument_node="">
</span><div class="mceMediaCreditOuterTemp alignnone" data-dcnode-id="2194" style="width: 2993px;"><span class="mceMediaCreditTemp mceNonEditable" data-dcnode-id="2195" data-media-credit-align="alignnone" data-media-credit-author-id="" data-media-credit-link="https://www.shutterstock.com" data-media-credit-nofollow="" data-media-credit-text="Shutterstock"><span data-dcnode-id="2196" instrument_node="">Shutterstock</span></span></div><span data-dcnode-id="2193" instrument_node="">
</span><h2 data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">56. Third Time’s a Charm</span></h2><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">The defense pulled no punches for the third trial in March 1922. Not only was Rappe’s party-girl reputation brought up, but Buster Keaton was brought to the stand as a character witness. Then Zey Prevon, the prosecution’s main witness, recanted his testimony, saying he was pressured to lie by San Francisco DA Matthew Brady.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2183"><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">It took the jury just six minutes to acquit the movie star.</span></strong><span data-dcnode-id="2184" instrument_node=""> After the verdict was delivered, the chairman of the jury read a formal apology to Arbuckle, declaring “Acquittal is not enough for Mr. Arbuckle.” Arbuckle had the apology framed and hung in his home.</span></p><span data-dcnode-id="2182" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2174" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2175" style="width: 1000px"><img alt="Fatty Arbuckle Facts" class="lazy-hidden size-full wp-image-350478" data-dcnode-id="2181" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350478" src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646.jpg" alt="Fatty Arbuckle Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_1008468646-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2176"><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2178" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2173" instrument_node="">
</span><h2 data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">57. Breaking the Bank</span></h2><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">By the time the smoke had cleared, Arbuckle owed the equivalent of $10.5 million in legal fees, plus a $500 fine for violating prohibition laws. Arbuckle was forced to sell his house and his cars to cover the costs. Sadly, his marriage also disintegrated.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2159" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2160" style="width: 1000px"><img alt="Elizabeth of York Facts" class="lazy-hidden size-full wp-image-281323" data-dcnode-id="2166" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-281323" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771.jpg" alt="Elizabeth of York Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_367655771-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2161"><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2163" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2158" instrument_node="">
</span><h2 data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">58. Outcasted</span></h2><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2154" instrument_node="">Though Arbuckle had been declared innocent, the Motion Picture Producers and Distributors of America </span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">dealt him a heartbreaking blow. </span></strong><span data-dcnode-id="2151" instrument_node="">They barred Arbuckle from ever working in movies again. The ban was eventually lifted, but theater owners were still reluctant to show any new Arbuckle movies. Because of this, most of Arbuckle’s films were never preserved and are now lost to history.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2141" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2142" style="width: 1000px"><img alt="Fatty Arbuckle Facts" class="lazy-hidden size-full wp-image-350488" data-dcnode-id="2148" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396-328x186.jpg 328w" height="563" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350488" src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396.jpg" alt="Fatty Arbuckle Facts" width="1000" height="563" srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_618911396-328x186.jpg 328w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2143"><a data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2145" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2140" instrument_node="">
</span><h2 data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">59. The Best Day</span></h2><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2136" instrument_node="">Roscoe “Fatty” Arbuckle died in his sleep on June 23, 1933, following a heart attack. </span><strong data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Earlier that day</span></strong><span data-dcnode-id="2133" instrument_node="">, he had signed a contract with Warner Brothers to make a full-length feature film, and then went out that evening to celebrate he and Addie’s one-year anniversary. Arbuckle told friends that evening, “This is the best day of my life.”</span></p><span data-dcnode-id="2131" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2123" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2124" style="width: 1000px"><img alt="Mae West Facts" class="lazy-hidden size-full wp-image-280689" data-dcnode-id="2130" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727-328x186.jpg 328w" height="563" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280689" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727.jpg" alt="Mae West Facts" width="1000" height="563" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_500043727-328x186.jpg 328w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2125"><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2127" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2122" instrument_node="">
</span><h2 data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">60. Too Pretty For This World</span></h2><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2118" instrument_node="">Gorgeous, talented, and wife to an indeterminate number of husbands, Barbara La Marr took “femme fatale” to the next level. Combine the allure of Hollywood glamor, the boldness of an independent woman professional in the 1920s, and the drama of a sordid personal life rife with fiction and romance, and you’ve got Barbara La Marr. </span><strong data-dcnode-id="2113"><span data-dcnode-id="2117" instrument_node="">Her star burned bright and it burned </span><em data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">fast</span></em><span data-dcnode-id="2114" instrument_node="">.</span></strong><span data-dcnode-id="2112" instrument_node=""> Though she spent barely 30 years in the world, “The Girl Who Was Too Beautiful” more than made her mark.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2102" style="width: 776px"><div class="media-credit-container alignnone" data-dcnode-id="2103" style="width: 776px"><img alt="Barbara La Marr facts " class="lazy-hidden size-full wp-image-372996" data-dcnode-id="2109" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown.jpg 776w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown-768x606.jpg 768w" height="612" loading="lazy" sizes="(max-width: 776px) 100vw, 776px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="776"><noscript data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-372996" src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown.jpg" alt="Barbara La Marr facts " width="776" height="612" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown.jpg 776w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_by_Milton_Brown-768x606.jpg 768w" sizes="(max-width: 776px) 100vw, 776px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2104"><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABarbara_La_Marr_by_Milton_Brown.jpg"><span data-dcnode-id="2106" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2101" instrument_node="">
</span><h2 data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">61. Sleep When You’re Dead</span></h2><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">As La Marr’s film career rose, La Marr was thrown into Hollywood night life. The already-wild actress adjusted to this change of pace with enthusiasm. She once claimed never to sleep more than two hours a night because she had “better things to do.”</span></p><span data-dcnode-id="2095" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2087" style="width: 796px"><div class="media-credit-container alignnone" data-dcnode-id="2088" style="width: 796px"><img alt="Barbara La Marr facts " class="lazy-hidden size-full wp-image-373013" data-dcnode-id="2094" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay.jpg 796w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay-768x540.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay-270x190.jpg 270w" height="560" loading="lazy" sizes="(max-width: 796px) 100vw, 796px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="796"><noscript data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373013" src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay.jpg" alt="Barbara La Marr facts " width="796" height="560" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay.jpg 796w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay-300x211.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay-768x540.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_-_Nov_1922_Photoplay-270x190.jpg 270w" sizes="(max-width: 796px) 100vw, 796px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2089"><a data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABarbara_La_Marr_-_Nov_1922_Photoplay.jpg"><span data-dcnode-id="2091" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2086" instrument_node="">
</span><h2 data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">62. Sleeping Beauty</span></h2><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2082" instrument_node="">La Marr’s party life and sleep deprivation finally caught up to her. </span><strong data-dcnode-id="2077"><span data-dcnode-id="2081" instrument_node="">While shooting </span><em data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">The Girl from Montmartre,&nbsp;</span></em><span data-dcnode-id="2078" instrument_node="">disaster struck.</span></strong><span data-dcnode-id="2076" instrument_node=""> One day on set, La Marr suddenly collapsed and even fell into a coma – but that didn’t stop production. The studio used a body double in long shots to complete the film. No one’s irreplaceable in show business; not even the girl who’s too beautiful.</span></p><span data-dcnode-id="2074" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2066" style="width: 855px"><div class="media-credit-container alignnone" data-dcnode-id="2067" style="width: 855px"><img alt="Barbara La Marr facts " class="lazy-hidden size-full wp-image-373017" data-dcnode-id="2073" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre.jpg 855w, https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre-300x246.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre-768x631.jpg 768w" height="702" loading="lazy" sizes="(max-width: 855px) 100vw, 855px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="855"><noscript data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373017" src="https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre.jpg" alt="Barbara La Marr facts " width="855" height="702" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre.jpg 855w, https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre-300x246.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Lewis_Stone_Barbara_La_Marr_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre-768x631.jpg 768w" sizes="(max-width: 855px) 100vw, 855px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2068"><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALewis_Stone%2C_Barbara_La_Marr%2C_and_Nicholas_de_Ruiz_in_Girl_From_Montmartre.jpg"><span data-dcnode-id="2070" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2065" instrument_node="">
</span><h2 data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">63. Boys Drool</span></h2><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">La Marr was a dazzling beauty who could entrance a man in mere minutes. Unfortunately for her, La Marr tended to attract… less than stellar options. After four or five failed attempts at wedlock (more on that later), La Marr was officially tired of romance. She was quoted as saying, “I am sick of men. The admiration of men. The so-called love of men.” Honestly, me too, sis.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2051" style="width: 710px"><div class="media-credit-container alignnone" data-dcnode-id="2052" style="width: 710px"><img alt="Barbara La Marr facts " class="lazy-hidden size-full wp-image-373049" data-dcnode-id="2058" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Trifling_Women_1922_-_Stone__La_Marr.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Trifling_Women_1922_-_Stone__La_Marr.jpg 710w, https://www.factinate.com/wp-content/uploads/2019/12/Trifling_Women_1922_-_Stone__La_Marr-300x228.jpg 300w" height="540" loading="lazy" sizes="(max-width: 710px) 100vw, 710px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="710"><noscript data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373049" src="https://www.factinate.com/wp-content/uploads/2019/12/Trifling_Women_1922_-_Stone__La_Marr.jpg" alt="Barbara La Marr facts " width="710" height="540" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Trifling_Women_1922_-_Stone__La_Marr.jpg 710w, https://www.factinate.com/wp-content/uploads/2019/12/Trifling_Women_1922_-_Stone__La_Marr-300x228.jpg 300w" sizes="(max-width: 710px) 100vw, 710px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2053"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbara_La_Marr"><span data-dcnode-id="2055" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="2050" instrument_node="">
</span><h2 data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">64. Road Trip!</span></h2><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">La Marr and her half-sister, Violet, were very close. The duo would constantly pal around and go out on the town for adventures. </span><strong data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">But things took a disturbing turn on one fateful day.</span></strong><span data-dcnode-id="2043" instrument_node="">&nbsp;When La Marr was 16 years old, she and Violet took a three-day drive with a man named C.C. Boxley. They got all the way to Santa Barbara when La Marr realized the terrible truth. Boxley had no intention of taking them back home ever again.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2033" style="width: 2976px"><div class="media-credit-container alignnone" data-dcnode-id="2034" style="width: 2976px"><img alt="Barbara La Marr facts" class="lazy-hidden size-full wp-image-373063" data-dcnode-id="2040" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677.jpg 2976w, https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677-300x146.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677-768x373.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677-1024x498.jpg 1024w" height="1446" loading="lazy" sizes="(max-width: 2976px) 100vw, 2976px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2976"><noscript data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373063" src="https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677.jpg" alt="Barbara La Marr facts" width="2976" height="1446" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677.jpg 2976w, https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677-300x146.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677-768x373.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Santa_Barbara_and_Montecito_past_and_present_1920_14590939677-1024x498.jpg 1024w" sizes="(max-width: 2976px) 100vw, 2976px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2035"><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASanta_Barbara_and_Montecito%2C_past_and_present_%281920%29_%2814590939677%29.jpg"><span data-dcnode-id="2037" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2032" instrument_node="">
</span><h2 data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">65. Found by Police and the Lime Light</span></h2><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">The press gobbled up the story of the two young women who were kidnapped by the sinister C. C. Boxley. Luckily, the police issued a warrant for Boxley’s arrest, with their quick actions leading the girls to be saved from captivity. A strategic showgirl from the start, La Marr wasted no time in crafting fantastical details about herself to extend the media attention. The 16-year-old claimed she was adopted and even that she was a widow.</span></p><span data-dcnode-id="2026" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2018" style="width: 4500px"><div class="media-credit-container alignnone" data-dcnode-id="2019" style="width: 4500px"><img alt="Aphra Behn facts" class="lazy-hidden size-full wp-image-354386" data-dcnode-id="2025" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126.jpg 4500w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-360x240.jpg 360w" height="3000" loading="lazy" sizes="(max-width: 4500px) 100vw, 4500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4500"><noscript data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-354386" src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126.jpg" alt="Aphra Behn facts" width="4500" height="3000" srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126.jpg 4500w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_671164126-360x240.jpg 360w" sizes="(max-width: 4500px) 100vw, 4500px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2020"><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2022" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2017" instrument_node="">
</span><h2 data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">66. Partying Problem</span></h2><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2004"><strong data-dcnode-id="2009"><span data-dcnode-id="2013" instrument_node="">La Marr’s penchant for having a good time got out of hand </span><em data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">fast</span></em><span data-dcnode-id="2010" instrument_node="">.</span></strong><span data-dcnode-id="2008" instrument_node=""> By the time she was filming </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Thy Name Is Woman</span></em><span data-dcnode-id="2005" instrument_node="">, the production supervisor had to make regular visits to the set, just to make sure that La Marr’s notoriously heavy drinking wasn’t interfering with filming. In other words, a fully grown woman had a baby sitter.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1995" style="width: 1202px"><div class="media-credit-container alignnone" data-dcnode-id="1996" style="width: 1202px"><img alt="Barbara La Marr facts" class="lazy-hidden size-full wp-image-373085" data-dcnode-id="2002" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2.jpg 1202w, https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2-768x603.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2-1024x803.jpg 1024w" height="943" loading="lazy" sizes="(max-width: 1202px) 100vw, 1202px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1202"><noscript data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373085" src="https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2.jpg" alt="Barbara La Marr facts" width="1202" height="943" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2.jpg 1202w, https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2-768x603.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Thy_Name_is_Woman_lobby_card_2-1024x803.jpg 1024w" sizes="(max-width: 1202px) 100vw, 1202px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1997"><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AThy_Name_is_Woman_lobby_card_2.jpg"><span data-dcnode-id="1999" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1994" instrument_node="">
</span><h2 data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">67. The Real Deal?</span></h2><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1990" instrument_node="">La Marr’s first husband shared her proclivity for changing names. Marrying her as Max Lawrence, it later turned out he was actually an ex-soldier name Lawrence Converse. Unfortunately for La Marr, </span><strong data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">that was just the beginning of this web of deception.</span></strong><span data-dcnode-id="1987" instrument_node=""> It turned out that Lawrence Converse already had a wife and children. He was arrested for bigamy the day after their marriage. He suffered a fatal blood clot just three days later.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1977" style="width: 4494px"><div class="media-credit-container alignnone" data-dcnode-id="1978" style="width: 4494px"><img alt="Biggest Attention Hogs facts" class="lazy-hidden size-full wp-image-333896" data-dcnode-id="1984" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038.jpg 4494w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038-300x213.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038-768x545.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038-1024x727.jpg 1024w" height="3192" loading="lazy" sizes="(max-width: 4494px) 100vw, 4494px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4494"><noscript data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-333896" src="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038.jpg" alt="Biggest Attention Hogs facts" width="4494" height="3192" srcset="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038.jpg 4494w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038-300x213.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038-768x545.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_662945038-1024x727.jpg 1024w" sizes="(max-width: 4494px) 100vw, 4494px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1979"><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1981" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1976" instrument_node="">
</span><h2 data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">68. Guess She Liked Bad Boys</span></h2><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">La Marr likely thought she’d have better luck in the romance department when she married dancer Philip Ainsworth. With their shared backgrounds and Ainsworth’s dashing good looks, what could go wrong? A lot, apparently. The good news is he didn’t immediately kick the bucket. The bad news is he was still arrested, not for bigamy but for passing bad checks. At least he didn’t have a secret second family?</span></p><span data-dcnode-id="1970" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1962" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="1963" style="width: 1920px"><img alt="Quentin Tarantino facts" class="lazy-hidden size-full wp-image-321362" data-dcnode-id="1969" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920-1024x768.jpg 1024w" height="1440" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-321362" src="https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920.jpg" alt="Quentin Tarantino facts" width="1920" height="1440" srcset="https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/barbed-wire-482608_1920-1024x768.jpg 1024w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1964"><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1966" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="1961" instrument_node="">
</span><h2 data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">69. Third Time, No Charm</span></h2><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1957" instrument_node="">La Marr’s </span><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">third</span></em><span data-dcnode-id="1954" instrument_node=""> marriage (also to a dancer, a man named Ben Deely) ended for slightly&nbsp;normal reasons. He was twice her age, an alcoholic, and a gambling addict. You know you need to rethink your type when this guy sets the standard for a good husband. Of course, the marriage between La Marr and Deely inevitably ended in divorce. But hey, no arrests or deaths!</span></p><span data-dcnode-id="1952" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1944" style="width: 5472px"><div class="media-credit-container alignnone" data-dcnode-id="1945" style="width: 5472px"><img alt="Improve Their Lives facts" class="lazy-hidden size-full wp-image-342298" data-dcnode-id="1951" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177.jpg 5472w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-360x240.jpg 360w" height="3648" loading="lazy" sizes="(max-width: 5472px) 100vw, 5472px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5472"><noscript data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342298" src="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177.jpg" alt="Improve Their Lives facts" width="5472" height="3648" srcset="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177.jpg 5472w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1469681177-360x240.jpg 360w" sizes="(max-width: 5472px) 100vw, 5472px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1946"><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1948" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1943" instrument_node="">
</span><h2 data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">70. Secret Baby??</span></h2><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1939" instrument_node="">La Marr did, indeed, have a child! Her son, Marvin Carville, was born on July 29</span><sup data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">, </span></sup><span data-dcnode-id="1936" instrument_node="">1922, but his arrival wasn’t exactly public knowledge. In a scandalous twist, especially for the 1920s, little Marvin’s father’s identity was never publicly revealed.&nbsp;</span><strong data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">But that’s not even the juiciest part</span></strong><span data-dcnode-id="1933" instrument_node="">. His identity as La Marr’s son only came to light </span><em data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">after</span></em><span data-dcnode-id="1930" instrument_node=""> she died.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1920" style="width: 784px"><div class="media-credit-container alignnone" data-dcnode-id="1921" style="width: 784px"><img alt="Barbara La Marr facts" class="lazy-hidden size-full wp-image-373087" data-dcnode-id="1927" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922.jpg 784w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922-768x579.jpg 768w" height="591" loading="lazy" sizes="(max-width: 784px) 100vw, 784px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="784"><noscript data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373087" src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922.jpg" alt="Barbara La Marr facts" width="784" height="591" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922.jpg 784w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_and_son_Marvin_1922-768x579.jpg 768w" sizes="(max-width: 784px) 100vw, 784px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1922"><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//es.wikipedia.org/wiki/Archivo%3ABarbara_La_Marr_and_son_Marvin%2C_1922.jpg"><span data-dcnode-id="1924" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1919" instrument_node="">
</span><h2 data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">71. Beauty is Pain</span></h2><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node="">Sleep deprivation, over-drinking, and exhaustion played an obvious role in La Marr’s steady health decline- but her extreme weight loss tactics may have contributed as well. </span><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">In the last two years of her life, La Marr was plagued with insecurities</span></strong><span data-dcnode-id="1912" instrument_node=""> about her already-thin frame. She went on several crash diets and was even rumored to have swallowed a tapeworm.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">In the end, she achieved extreme litheness, though it cost La Marr her life. When she died of tuberculosis, she weighed&nbsp;less than 80 pounds.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1899" style="width: 833px"><div class="media-credit-container alignnone" data-dcnode-id="1900" style="width: 833px"><img alt="Barbara La Marr facts" class="lazy-hidden size-full wp-image-373101" data-dcnode-id="1906" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924.jpg 833w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924-300x255.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924-768x653.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924-120x102.jpg 120w" height="708" loading="lazy" sizes="(max-width: 833px) 100vw, 833px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="833"><noscript data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373101" src="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924.jpg" alt="Barbara La Marr facts" width="833" height="708" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924.jpg 833w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924-300x255.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924-768x653.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Barbara_La_Marr_at_home_April_1924-120x102.jpg 120w" sizes="(max-width: 833px) 100vw, 833px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1901"><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//es.wikipedia.org/wiki/Archivo%3ABarbara_La_Marr_at_home_April_1924.jpg"><span data-dcnode-id="1903" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1898" instrument_node="">
</span><h2 data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">72. The Best Funeral You’ll Ever See</span></h2><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">La Marr’s funeral mimicked the way she lived with its grandeur and drama. In a crowd of 3,000 fans, no less than five women reportedly fainted. After La Marr’s body was removed from the church, people swarmed the chapel trying to get their hands on the floral arrangements. The entire thing was a mess, and La Marr probably wouldn’t have had it any other way.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1884" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="1885" style="width: 900px"><img alt="Barbara La Marr facts" class="lazy-hidden size-full wp-image-373097" data-dcnode-id="1891" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white-768x527.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white-348x240.jpg 348w" height="617" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-373097" src="https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white.jpg" alt="Barbara La Marr facts" width="900" height="617" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white-768x527.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Flower-arrangement-funeral-white-348x240.jpg 348w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1886"><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AFlower-arrangement-funeral-white.jpg"><span data-dcnode-id="1888" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1883" instrument_node="">
</span><h2 data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">&nbsp;73. The Original Heartthrob</span></h2><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1879" instrument_node="">He was born—deep breath now—Rodolfo Alfonso Raffaello Pierre Filibert Guglielmi di Valentina d’Antonguella, and came to be known as the Great Lover, the Latin Lover, the Sheik…or simply Rudy to his friends. One of the first male heartthrobs of cinema’s silent era, </span><strong data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Rudolph Valentino’s short life was filled with astronomical success and fame, but also plagued with toxic criticism, tumultuous love affairs, bad fortune, and poor health.&nbsp;</span></strong></p><span data-dcnode-id="1875" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1867" style="width: 1830px"><div class="media-credit-container alignnone" data-dcnode-id="1868" style="width: 1830px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-244983" data-dcnode-id="1874" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9.jpg 1830w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9-300x272.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9-768x695.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9-1024x927.jpg 1024w" height="1657" loading="lazy" sizes="(max-width: 1830px) 100vw, 1830px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1830"><noscript data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244983" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9.jpg" alt="Rudolph Valentino facts" width="1830" height="1657" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9.jpg 1830w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9-300x272.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9-768x695.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-9-1024x927.jpg 1024w" sizes="(max-width: 1830px) 100vw, 1830px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1869"><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARudolph_Valentino%2C_Stars_of_the_Photoplay.jpg"><span data-dcnode-id="1871" instrument_node="">Wikimedia Commons, James Abbe </span></a></span></div></figure><span data-dcnode-id="1866" instrument_node="">
</span><h2 data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">74. The Big, Rotten Apple</span></h2><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">The “Great American Melting Pot” hasn’t always been an easy place to integrate oneself, and sure enough, New York City living was not easy on Rudy. Money was drastically tight; he took on odd jobs like bussing tables, gardening, and “taxi dancing” which really meant keeping single women company at clubs. To make ends meet, Valentino sometimes slept in Central Park or in all-night movie theaters that continuously ran movies.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1852" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="1853" style="width: 900px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-244970" data-dcnode-id="1859" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-300x292.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-768x748.jpg 768w" height="876" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244970" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17.jpg" alt="Rudolph Valentino facts" width="900" height="876" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-300x292.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-768x748.jpg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1854"><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARudolph_Valentino.jpg"><span data-dcnode-id="1856" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1851" instrument_node="">
</span><h2 data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">75. On His Way to Steal Your Girl</span></h2><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">Valentino made a big impression on a screenwriter named June Mathis. After seeing him in an early screen role, she insisted he perform in her movie, </span><em data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">The Four Horsemen of the Apocalypse</span></em><span data-dcnode-id="1844" instrument_node="">. Mathis’ instincts were right: After seeing the early cuts, the movie’s director Rex Ingram decided to give Valentino even more screen time. He asked Mathis to write a brand new scene where Valentino’s character steals another man’s woman, and together they dance the tango. With this scene, the “Latin Lover” was born.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1834" style="width: 1600px"><div class="media-credit-container alignnone" data-dcnode-id="1835" style="width: 1600px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245000" data-dcnode-id="1841" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01.jpg 1600w, https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01-768x573.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01-1024x764.jpg 1024w" height="1194" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1600"><noscript data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245000" src="https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01.jpg" alt="Rudolph Valentino facts" width="1600" height="1194" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01.jpg 1600w, https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01-768x573.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/Valentino_Rudolph_Four_Horsemen_of_the_Apocalypse_The_NRFPT_01-1024x764.jpg 1024w" sizes="(max-width: 1600px) 100vw, 1600px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1836"><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AValentino%2C_Rudolph_%28Four_Horsemen_of_the_Apocalypse%2C_The%29_NRFPT_01.jpg"><span data-dcnode-id="1838" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1833" instrument_node="">
</span><h2 data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">76. Sign of the Times</span></h2><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1829" instrument_node="">Valentino was active at a time when traditional modes of masculinity were clung to with an icy grip, and gay-bashing was rife. </span><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Despite persistent speculation and rumors</span></strong><span data-dcnode-id="1826" instrument_node=""> about his sexuality—along with the notion that his relationships with Acker and Rambova were merely “lavender marriages”—by all credible accounts, Valentino was straight. The relentless scrutiny left him feeling constantly insecure about his masculinity.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1816" style="width: 2043px"><div class="media-credit-container alignnone" data-dcnode-id="1817" style="width: 2043px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245089" data-dcnode-id="1823" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2.jpg 2043w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2-300x270.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2-768x692.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2-1024x923.jpg 1024w" height="1842" loading="lazy" sizes="(max-width: 2043px) 100vw, 2043px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2043"><noscript data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245089" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2.jpg" alt="Rudolph Valentino facts" width="2043" height="1842" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2.jpg 2043w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2-300x270.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2-768x692.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-9-2-1024x923.jpg 1024w" sizes="(max-width: 2043px) 100vw, 2043px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1818"><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1820" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1815" instrument_node="">
</span><h2 data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">77. Boxed In</span></h2><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1811" instrument_node="">When a reporter for the Chicago Tribune blamed Valentino for the presence of a powdering station in a men’s bathroom, </span><strong data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Valentino responded in the most perfect way possible.</span></strong><span data-dcnode-id="1808" instrument_node=""> He wrote to the paper and challenged the writer to a boxing match. Apparently the reporter was all talk and no action because the match never materialized.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1798" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1799" style="width: 1000px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245057" data-dcnode-id="1805" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383-340x225.jpg 340w" height="662" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245057" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383.jpg" alt="Rudolph Valentino facts" width="1000" height="662" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_586524383-340x225.jpg 340w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1800"><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1802" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1797" instrument_node="">
</span><h2 data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">78. The Fatal Collapse</span></h2><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">During the press tour for his final film, </span><em data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">The Son of the Sheik, </span></em><span data-dcnode-id="1790" instrument_node="">Valentino collapsed and was hospitalized due to a perforated ulcer. Fans stood outside Polyclinic Hospital in New York for a week, but it was no use: Their beloved Valentino succumbed to infection around midday on August 23. He was only 31 years old when he died.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1780" style="width: 766px"><div class="media-credit-container alignnone" data-dcnode-id="1781" style="width: 766px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245061" data-dcnode-id="1787" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Bánky_Vilma_és_Rudolph_Valentino-A_sejk_fia.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Bánky_Vilma_és_Rudolph_Valentino-A_sejk_fia.jpg 766w, https://www.factinate.com/wp-content/uploads/2019/01/Bánky_Vilma_és_Rudolph_Valentino-A_sejk_fia-300x235.jpg 300w" height="600" loading="lazy" sizes="(max-width: 766px) 100vw, 766px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="766"><noscript data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245061" src="https://www.factinate.com/wp-content/uploads/2019/01/Bánky_Vilma_és_Rudolph_Valentino-A_sejk_fia.jpg" alt="Rudolph Valentino facts" width="766" height="600" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Bánky_Vilma_és_Rudolph_Valentino-A_sejk_fia.jpg 766w, https://www.factinate.com/wp-content/uploads/2019/01/Bánky_Vilma_és_Rudolph_Valentino-A_sejk_fia-300x235.jpg 300w" sizes="(max-width: 766px) 100vw, 766px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1782"><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eo.wikipedia.org/wiki/Dosiero%3ABnky_Vilma_s_Rudolph_Valentino-A_sejk_fia.jpg"><span data-dcnode-id="1784" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1779" instrument_node="">
</span><h2 data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">79. Braver Than Most</span></h2><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Valentino asked his doctor, “And do I now act like a ‘pink powder puff’?” His doctor reportedly responded that he was actually “braver than most.”</span></p><span data-dcnode-id="1773" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1765" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1766" style="width: 1280px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245071" data-dcnode-id="1772" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-300x256.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-768x656.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-1024x874.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-120x102.jpg 120w" height="1093" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245071" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4.jpg" alt="Rudolph Valentino facts" width="1280" height="1093" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-300x256.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-768x656.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-1024x874.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-4-120x102.jpg 120w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1767"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/116153022%40N02/15481919039"><span data-dcnode-id="1769" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1764" instrument_node="">
</span><h2 data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">80. Burial Blues</span></h2><span data-dcnode-id="1761" instrument_node="">
