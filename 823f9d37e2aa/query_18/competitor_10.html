</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">It turned out that Valentino was in serious debt at the time of his death, and his heirs could not afford a burial plot for him. Friend and screenwriter June Mathis agreed to loan him one of the spaces she owned at Hollywood Park Cemetery so that he could be interred without delay. However, when Mathis died the following year, all further memorial plans for Valentino fell through. To this day, his body remains in that temporary space.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1750" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="1751" style="width: 900px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245081" data-dcnode-id="1757" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3-768x531.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3-348x240.jpg 348w" height="622" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245081" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3.jpg" alt="Rudolph Valentino facts" width="900" height="622" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3-768x531.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-3-348x240.jpg 348w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1752"><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJune_Mathis_and_Rudolph_Valentino.jpg"><span data-dcnode-id="1754" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1749" instrument_node="">
</span><h2 data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">81. Funeral Hysterics</span></h2><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Valentino’s passing left mourners in a state of inconsolable grief. Over 100,000 desolate mourners lined the streets outside the church where his funeral service was held, there were riots, and a number of suicide attempts were reported.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1735" style="width: 2868px"><div class="media-credit-container alignnone" data-dcnode-id="1736" style="width: 2868px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245094" data-dcnode-id="1742" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368.jpg 2868w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368-768x583.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368-1024x778.jpg 1024w" height="2179" loading="lazy" sizes="(max-width: 2868px) 100vw, 2868px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2868"><noscript data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245094" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368.jpg" alt="Rudolph Valentino facts" width="2868" height="2179" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368.jpg 2868w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368-768x583.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3311368-1024x778.jpg 1024w" sizes="(max-width: 2868px) 100vw, 2868px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1737"><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1739" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1734" instrument_node="">
</span><h2 data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">82. Scandalo</span></h2><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1730" instrument_node="">When Valentino was a taxi dancer in New York City, he befriended the Chilean heiress Blanca de Saulles, and became embroiled in one of the biggest New York scandals of the time. Blanca was unhappily married to John de Saulles, a prominent businessman. When the couple divorced, Valentino testified in court in support of Blanca’s claims that John had been having an affair with Valentino’s dancing partner, Joan Sawyer. After the divorce, John used his political connections to have Valentino arrested on unspecified—and most likely false—charges. Even though Valentino quickly paid his bail and was released, </span><strong data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">his reputation suffered greatly. </span></strong></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">After the trial, Valentino couldn’t find work and was shunned by his old friends and colleagues. But things got worse: Blanca shot her husband dead after a custody dispute for the couple’s son turned ugly. Valentino left town for fear of being called as a witness in another scandalous and damaging trial. He joined a traveling musical which eventually took him to California.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1715" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1716" style="width: 1000px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-244978" data-dcnode-id="1722" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244978" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319.jpg" alt="Rudolph Valentino facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_141666319-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1717"><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1719" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1714" instrument_node="">
</span><h2 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">83. Unlucky in Love</span></h2><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1710" instrument_node="">Valentino impulsively married his first wife, actress Jean Acker, in 1919, two months after they met. Acker had only seemed to be interested in women at the time, and had reportedly been involved in a love triangle with actresses Grace Darmond and Alla Nazimova. Whether or not she was ever actually romantically interested in Valentino is unclear, but we do know that </span><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">she regretted marrying him immediately.</span></strong></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Acker locked Valentino out of their hotel room on their wedding night, the couple separated soon after, and Acker moved back in with girlfriend Grace Darmond soon after. They finalized their divorce in 1922, but ironically became good friends afterward.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1695" style="width: 2081px"><div class="media-credit-container alignnone" data-dcnode-id="1696" style="width: 2081px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-244993" data-dcnode-id="1702" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7.jpg 2081w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7-768x560.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7-1024x746.jpg 1024w" height="1517" loading="lazy" sizes="(max-width: 2081px) 100vw, 2081px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2081"><noscript data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244993" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7.jpg" alt="Rudolph Valentino facts" width="2081" height="1517" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7.jpg 2081w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7-768x560.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-7-1024x746.jpg 1024w" sizes="(max-width: 2081px) 100vw, 2081px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1697"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJean_Acker_1_-_Nov_1922_Photoplay.jpg"><span data-dcnode-id="1699" instrument_node="">Wikimedia Commons, James Abbe </span></a></span></div></figure><span data-dcnode-id="1694" instrument_node="">
</span><h2 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">84. Not-So-Smooth Sailing</span></h2><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1690" instrument_node="">Valentino’s second marriage was even rockier than the first. Natascha Rambova was not popular with a number of Valentino’s friends and the marriage disintegrated to the point where Rambova was eventually banned from his film sets. That bad blood didn’t end when he died, and </span><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">he left behind a cruel tribute to her</span></strong><span data-dcnode-id="1687" instrument_node="">. Valentino passed away a year after their divorce, but luckily for him, he’d updated his will in time—and in that will, he left her one single dollar bill. Ouch.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1677" style="width: 1920px"><div class="media-credit-container alignnone" data-dcnode-id="1678" style="width: 1920px"><img alt="Mel Gibson facts" class="lazy-hidden size-full wp-image-238957" data-dcnode-id="1684" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-360x240.jpg 360w" height="1280" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-238957" src="https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920.jpg" alt="Mel Gibson facts" width="1920" height="1280" srcset="https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/03/business-3219263_1920-360x240.jpg 360w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1679"><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1681" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="1676" instrument_node="">
</span><h2 data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">85. The Woman in Black</span></h2><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">For decades after Valentino’s death, a veiled woman in black has arrived at his tomb on the anniversary of his death to place a single rose on his grave. The identity of the woman was a mystery at first, until it was revealed that the whole thing was—you guessed it—a publicity stunt, this time cooked up by press agent Russel Birdwell in 1928. When this got out, several copycats vied to be the new “Woman in Black” and the tradition continued. Film historian Karie Bible is the most recent to have taken up the mantle.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1662" style="width: 3416px"><div class="media-credit-container alignnone" data-dcnode-id="1663" style="width: 3416px"><img alt="Rudolph Valentino facts" class="lazy-hidden size-full wp-image-245122" data-dcnode-id="1669" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg 3416w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-768x590.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-1024x787.jpg 1024w" height="2626" loading="lazy" sizes="(max-width: 3416px) 100vw, 3416px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3416"><noscript data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-245122" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg" alt="Rudolph Valentino facts" width="3416" height="2626" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046.jpg 3416w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-768x590.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-3397046-1024x787.jpg 1024w" sizes="(max-width: 3416px) 100vw, 3416px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1666" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1661" instrument_node="">
</span><h2 data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">86. The Original “It” Girl</span></h2><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Clara Bow was Hollywood’s First “It” Girl. With her tomboy charms and expressive face, she took Old Hollywood by storm as one of the most iconic “flapper” actresses of her day. These days, Bow’s name isn’t uttered with the same esteem as silent stars such as Lillian Gish or Charlie Chaplin. If you ask us, that’s a darned shame. Her life and career had both the credits and the scandal to match either of those legends.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1647" style="width: 3466px"><div class="media-credit-container alignnone" data-dcnode-id="1648" style="width: 3466px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224086" data-dcnode-id="1654" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg 3466w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-768x553.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-1024x737.jpg 1024w" height="2496" loading="lazy" sizes="(max-width: 3466px) 100vw, 3466px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3466"><noscript data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224086" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg" alt="Clara Bow facts" width="3466" height="2496" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5.jpg 3466w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-768x553.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-5-1024x737.jpg 1024w" sizes="(max-width: 3466px) 100vw, 3466px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1649"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="1651" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1646" instrument_node="">
</span><h2 data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">87. A Rough Landing</span></h2><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1639"><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Bow’s birth was incredibly risky</span></strong><span data-dcnode-id="1640" instrument_node="">: Her two older sisters died in infancy and doctors advised her mother not to become pregnant again. If that wasn’t enough, Bow’s mother went into labor during a horrendous heat wave. Despite it all, both mother and child were healthy. To quote the actress, “I don’t suppose two people ever looked death in the face more clearly than my mother and I the morning I was born. We were both given up, but somehow we struggled back to life.”</span></p><span data-dcnode-id="1638" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1630" style="width: 2165px"><div class="media-credit-container aligncenter" data-dcnode-id="1631" style="width: 2165px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224164" data-dcnode-id="1637" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10.jpg 2165w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10-768x560.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10-1024x746.jpg 1024w" height="1578" loading="lazy" sizes="(max-width: 2165px) 100vw, 2165px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2165"><noscript data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224164" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10.jpg" alt="Clara Bow facts" width="2165" height="1578" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10.jpg 2165w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10-768x560.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-10-1024x746.jpg 1024w" sizes="(max-width: 2165px) 100vw, 2165px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1632"><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="1634" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1629" instrument_node="">
</span><h2 data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">88. She’s Got It</span></h2><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1625" instrument_node="">Clara Bow’s big break came with her role in the 1927 movie </span><em data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">It, </span></em><span data-dcnode-id="1622" instrument_node="">a silent film adaptation of an Elinor Glyn novella—not the Stephen King horror novel. The movie was a blockbuster and earned her the nickname “It Girl.” The “It-Girls” of the future had her to thank for the moniker.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1612" style="width: 768px"><div class="media-credit-container alignnone" data-dcnode-id="1613" style="width: 768px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224017" data-dcnode-id="1619" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-360x240.jpg 360w" height="515" loading="lazy" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="768"><noscript data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224017" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg" alt="Clara Bow facts" width="768" height="515" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-1-360x240.jpg 360w" sizes="(max-width: 768px) 100vw, 768px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1614"><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="1616" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1611" instrument_node="">
</span><h2 data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">89. You Have to See It to Hear It</span></h2><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">The shift from silent films to talkies shook up Bow’s confidence. Not used to microphones, several scenes in </span><em data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">The Wild Party</span></em><span data-dcnode-id="1604" instrument_node=""> had to be reshot because her eyes kept looking up at the overhead sound equipment. Riddled with nerves, rumors swirled that she kept “rows of bottles of sedatives” at her bedside just to keep it together.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1594" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1595" style="width: 800px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224109" data-dcnode-id="1601" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-768x616.jpg 768w" height="642" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224109" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg" alt="Clara Bow facts" width="800" height="642" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6.jpg 800w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-6-768x616.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1596"><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Fichier%3AMarceline_Day-Clara_Bow_in_The_Wild_Party.jpg"><span data-dcnode-id="1598" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1593" instrument_node="">
</span><h2 data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">90. Taking a Break</span></h2><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">By 1931, studio executives sometimes referred to Clara Bow with a cruel nickname: “Crisis-a-day-Clara.” The pressure of fame, her fading star, and a troubling lawsuit from her secretary put Bow’s mental health in a bad place. Entering a sanitorium at the age of 25, she asked to be released from her final film with Paramount. This retreat effectively ended Bow’s career.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1579" style="width: 3011px"><div class="media-credit-container alignnone" data-dcnode-id="1580" style="width: 3011px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224113" data-dcnode-id="1586" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg 3011w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-300x254.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-768x650.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-1024x866.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-120x102.jpg 120w" height="2547" loading="lazy" sizes="(max-width: 3011px) 100vw, 3011px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3011"><noscript data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224113" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg" alt="Clara Bow facts" width="3011" height="2547" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7.jpg 3011w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-300x254.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-768x650.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-1024x866.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-7-120x102.jpg 120w" sizes="(max-width: 3011px) 100vw, 3011px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1581"><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="1583" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1578" instrument_node="">
</span><h2 data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">91. Life on the Ranch</span></h2><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">Bow made her peace with Hollywood… by getting the heck out of it. With her partner, fellow actor Rex Bell, she left for his Nevada ranch, which she called her “desert paradise.” The couple married in December 1931 in a Las Vegas ceremony. Thanks to a more stable regime of food, sleep, and exercise, </span><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Bow managed to become healthy again—for a time</span></strong><span data-dcnode-id="1571" instrument_node="">. In her words, she only returned to Hollywood “for the sole purpose of making enough money to be able to stay out of there.”</span></p><span data-dcnode-id="1569" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1561" style="width: 2836px"><div class="media-credit-container alignnone" data-dcnode-id="1562" style="width: 2836px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224118" data-dcnode-id="1568" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8.jpg 2836w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-768x526.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-1024x702.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-348x240.jpg 348w" height="1944" loading="lazy" sizes="(max-width: 2836px) 100vw, 2836px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2836"><noscript data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224118" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8.jpg" alt="Clara Bow facts" width="2836" height="1944" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8.jpg 2836w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-300x206.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-768x526.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-1024x702.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-8-348x240.jpg 348w" sizes="(max-width: 2836px) 100vw, 2836px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1563"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="1565" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1560" instrument_node="">
</span><h2 data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">92. It’s A Smaller World After All</span></h2><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">Unfortunately, Bow seems to have inherited her mother’s history of mental health issues later in life. After her retirement, she became increasingly withdrawn, both refusing to interact with her husband or let him leave the house by himself. </span><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Sadly, things got much worse</span></strong><span data-dcnode-id="1553" instrument_node="">. In 1944, Bow’s husband Rex Bell ran for the US House of Representatives. Bow attempted to end her own life, writing that she would rather die than live so publicly.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1543" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1544" style="width: 1024px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223968" data-dcnode-id="1550" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-300x269.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-768x688.jpg 768w" height="917" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223968" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg" alt="Clara Bow facts" width="1024" height="917" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-300x269.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-768x688.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1545"><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="1547" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1542" instrument_node="">
</span><h2 data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">93. Imperfect Patient</span></h2><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Following her suicide attempt, Bow resided in the Institute of Living in Connecticut for her chronic insomnia and abdominal pains. The staff subjected her to shock therapy and diagnosed her with schizophrenia, although she never experienced hallucinations.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1528" style="width: 2223px"><div class="media-credit-container alignnone" data-dcnode-id="1529" style="width: 2223px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224162" data-dcnode-id="1535" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9.jpg 2223w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9-300x266.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9-768x682.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9-1024x909.jpg 1024w" height="1973" loading="lazy" sizes="(max-width: 2223px) 100vw, 2223px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2223"><noscript data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224162" src="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9.jpg" alt="Clara Bow facts" width="2223" height="1973" srcset="https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9.jpg 2223w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9-300x266.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9-768x682.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/FotoJet-9-1024x909.jpg 1024w" sizes="(max-width: 2223px) 100vw, 2223px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1530"><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="1532" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1527" instrument_node="">
</span><h2 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">94. Three’s Company, Four Is a Crowd</span></h2><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node="">Scandalously for the 1920s, Bow moved in with her boyfriend, cameraman Arthur Jacobson, in 1924. Although Bow’s father also lived with them, this premarital arrangement was still unacceptable by the standards of their day. More importantly, </span><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">it enraged her studio chief B. P. Schulberg</span></strong><span data-dcnode-id="1520" instrument_node="">. The boss fired Bow’s boyfriend, which, in turn, enraged Bow. The actress allegedly ripped up her contract, flung it in Schulberg’s face, and told him to stay out of her life. Afterward, Bow’s father would be her “business manager” and people referred to Jacobson as her “brother” for decency’s sake.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1510" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="1511" style="width: 1000px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224068" data-dcnode-id="1517" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527-340x225.jpg 340w" height="662" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224068" src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527.jpg" alt="Clara Bow facts" width="1000" height="662" srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527.jpg 1000w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527-768x508.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1035680527-340x225.jpg 340w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1512"><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/home"><span data-dcnode-id="1514" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1509" instrument_node="">
</span><h2 data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">95. Maternal Affliction</span></h2><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">When she was 16, Bow’s mother fell out of a second-story window and suffered brain injuries that would likely contribute to her epilepsy and psychosis. Mrs. Bow would grow to resent her daughter and once put a knife to the teenager’s throat. The assault led to her mother’s commitment to a sanitorium, where she later died at the age of 43.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1495" style="width: 1124px"><div class="media-credit-container aligncenter" data-dcnode-id="1496" style="width: 1124px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223959" data-dcnode-id="1502" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg 1124w, https://www.factinate.com/wp-content/uploads/2018/12/37-300x200.jpeg 300w, https://www.factinate.com/wp-content/uploads/2018/12/37-768x512.jpeg 768w, https://www.factinate.com/wp-content/uploads/2018/12/37-1024x683.jpeg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/37-360x240.jpeg 360w" height="750" loading="lazy" sizes="(max-width: 1124px) 100vw, 1124px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1124"><noscript data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223959" src="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg" alt="Clara Bow facts" width="1124" height="750" srcset="https://www.factinate.com/wp-content/uploads/2018/12/37.jpeg 1124w, https://www.factinate.com/wp-content/uploads/2018/12/37-300x200.jpeg 300w, https://www.factinate.com/wp-content/uploads/2018/12/37-768x512.jpeg 768w, https://www.factinate.com/wp-content/uploads/2018/12/37-1024x683.jpeg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/37-360x240.jpeg 360w" sizes="(max-width: 1124px) 100vw, 1124px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1497"><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/"><span data-dcnode-id="1499" instrument_node="">Pexels</span></a></span></div></figure><span data-dcnode-id="1494" instrument_node="">
</span><h2 data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">96. Words Hurt</span></h2><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Even at the height of her success, film executives had little respect for their biggest box office draw. Some called her a “birdbrain” and “dumbbell,” even as she worked hard to bring them money.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1480" style="width: 3478px"><div class="media-credit-container alignnone" data-dcnode-id="1481" style="width: 3478px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-224096" data-dcnode-id="1487" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592.jpg 3478w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592-1024x802.jpg 1024w" height="2723" loading="lazy" sizes="(max-width: 3478px) 100vw, 3478px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3478"><noscript data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-224096" src="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592.jpg" alt="Clara Bow facts" width="3478" height="2723" srcset="https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592.jpg 3478w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/GettyImages-3133592-1024x802.jpg 1024w" sizes="(max-width: 3478px) 100vw, 3478px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1482"><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/editorial-images"><span data-dcnode-id="1484" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1479" instrument_node="">
</span><h2 data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">97. Birth of a Filmmaker</span></h2><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">There is hardly a film director in Hollywood history more important—or controversial—than D.W. Griffith. During the early years of Hollywood, Griffith’s filmmaking skills were nothing short of groundbreaking. His techniques influenced filmmaking to this day, and Hollywood films copies his style so much that we now take it for granted. However, the offensive subject matter of Griffith’s most famous film will forever taint his shining legacy.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1465" style="width: 3190px"><div class="media-credit-container alignnone" data-dcnode-id="1466" style="width: 3190px"><img alt="D.W. Griffith Facts" class="lazy-hidden size-full wp-image-308696" data-dcnode-id="1472" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409.jpg 3190w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409-300x268.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409-768x686.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409-1024x915.jpg 1024w" height="2851" loading="lazy" sizes="(max-width: 3190px) 100vw, 3190px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3190"><noscript data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-308696" src="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409.jpg" alt="D.W. Griffith Facts" width="3190" height="2851" srcset="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409.jpg 3190w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409-300x268.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409-768x686.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-3311409-1024x915.jpg 1024w" sizes="(max-width: 3190px) 100vw, 3190px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1467"><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1469" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1464" instrument_node="">
</span><h2 data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">98. I Should have Trademarked it!</span></h2><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">It’s safe to say that if there’s one phrase associated with a film director to this day, it would be the three-word phrase “Lights, Camera, Action!” We have Griffith to thank for that. He first said it in 1910 while he was filming </span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">In Old California. </span></em><span data-dcnode-id="1457" instrument_node="">The rest is history.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1447" style="width: 4999px"><div class="media-credit-container alignnone" data-dcnode-id="1448" style="width: 4999px"><img alt="D.W. Griffith Facts" class="lazy-hidden size-full wp-image-308708" data-dcnode-id="1454" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617.jpg 4999w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617-300x184.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617-768x471.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617-1024x628.jpg 1024w" height="3067" loading="lazy" sizes="(max-width: 4999px) 100vw, 4999px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4999"><noscript data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-308708" src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617.jpg" alt="D.W. Griffith Facts" width="4999" height="3067" srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617.jpg 4999w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617-300x184.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617-768x471.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_507281617-1024x628.jpg 1024w" sizes="(max-width: 4999px) 100vw, 4999px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1449"><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1451" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1446" instrument_node="">
</span><h2 data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">99. Acknowledging Innovation (and Nothing Else!)</span></h2><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1442" instrument_node="">Although Griffith’s most well-known and controversial film </span><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">The Birth of a Nation</span></em><span data-dcnode-id="1439" instrument_node=""> is now reviled for its use of blackface and its glorification of the Ku Klux Klan, it nevertheless pioneered film techniques which are still used to this day. These techniques include night photography, still shots, panning shots, panoramic long shots, color tinting to indicate drama, and carefully staging a scene to make hundreds of extras look like thousands.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">This has caused some scholars to declare that Griffith’s </span><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">The Birth of a Nation</span></em><span data-dcnode-id="1433" instrument_node=""> marked the beginning of modern American cinema. That’s, um, quite an unsettling history.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1423" style="width: 4014px"><div class="media-credit-container alignnone" data-dcnode-id="1424" style="width: 4014px"><img alt="D.W. Griffith Facts" class="lazy-hidden size-full wp-image-308760" data-dcnode-id="1430" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722.jpg 4014w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722-768x611.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722-1024x815.jpg 1024w" height="3195" loading="lazy" sizes="(max-width: 4014px) 100vw, 4014px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4014"><noscript data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-308760" src="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722.jpg" alt="D.W. Griffith Facts" width="4014" height="3195" srcset="https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722.jpg 4014w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722-768x611.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/GettyImages-53116722-1024x815.jpg 1024w" sizes="(max-width: 4014px) 100vw, 4014px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1425"><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1427" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1422" instrument_node="">
</span><h2 data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">100. Boycotting Racism</span></h2><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node="">Despite the fact that Griffith’s</span><em data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node=""> The Birth of a Nation</span></em><span data-dcnode-id="1415" instrument_node=""> was a massive box office hit, not everybody responded positively to the film, even at the time. Theatres in several American cities banned the film, and protests met the film where it was screened. Not surprisingly, one of the groups in strongest opposition to the film was the National Association for the Advancement of Colored People (NAACP).</span></p><span data-dcnode-id="1413" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1405" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1406" style="width: 1000px"><img alt="D.W. Griffith Facts" class="lazy-hidden size-full wp-image-308827" data-dcnode-id="1412" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726-328x186.jpg 328w" height="563" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-308827" src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726.jpg" alt="D.W. Griffith Facts" width="1000" height="563" srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_1180858726-328x186.jpg 328w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1407"><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1409" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1404" instrument_node="">
</span><h2 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">101. Intentions Vs. Results</span></h2><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1400" instrument_node="">Given how Griffith’s reputation has suffered from the label of racism, it might be considered ironic that he himself dedicated many of his early films to criticizing how the United States government treated Native Americans. The most notable of these films were arguably </span><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Ramona </span></em><span data-dcnode-id="1397" instrument_node="">and </span><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">The Red Man’s View</span></em><span data-dcnode-id="1394" instrument_node="">, which is a title that hasn’t quite aged well, regardless of Griffith’s original intent.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1384" style="width: 700px"><div class="media-credit-container alignnone" data-dcnode-id="1385" style="width: 700px"><img alt="D.W. Griffith Facts" class="lazy-hidden size-full wp-image-308842" data-dcnode-id="1391" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/Billy_Bitzer_D_W_Griffith_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/Billy_Bitzer_D_W_Griffith_1920.jpg 700w, https://www.factinate.com/wp-content/uploads/2019/06/Billy_Bitzer_D_W_Griffith_1920-300x260.jpg 300w" height="606" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="700"><noscript data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-308842" src="https://www.factinate.com/wp-content/uploads/2019/06/Billy_Bitzer_D_W_Griffith_1920.jpg" alt="D.W. Griffith Facts" width="700" height="606" srcset="https://www.factinate.com/wp-content/uploads/2019/06/Billy_Bitzer_D_W_Griffith_1920.jpg 700w, https://www.factinate.com/wp-content/uploads/2019/06/Billy_Bitzer_D_W_Griffith_1920-300x260.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1386"><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABilly_Bitzer_D_W_Griffith_1920.jpg"><span data-dcnode-id="1388" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1383" instrument_node="">
</span><h2 data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">102. Time to Eat Crow!</span></h2><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1379" instrument_node="">In 1919, Griffith directed the film </span><em data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Broken Blossoms</span></em><span data-dcnode-id="1376" instrument_node=""> for the Artcraft Company, which Adolph Zukor ran at the time. However, when Griffith delivered the finished film, </span><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Zukor felt enraged by</span></strong><span data-dcnode-id="1373" instrument_node="">&nbsp;an inferior-quality film. Griffith was so angry that he returned the next day with $250,000 in cash, declaring that he’d buy the film and distribute it himself. Zukor agreed, but he would live to regret it. </span><em data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Broken Blossoms</span></em><span data-dcnode-id="1370" instrument_node="">, released through United Artists, was a critical and commercial triumph.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1360" style="width: 1533px"><div class="media-credit-container alignnone" data-dcnode-id="1361" style="width: 1533px"><img alt="D.W. Griffith Facts" class="lazy-hidden size-full wp-image-308863" data-dcnode-id="1367" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card.jpg 1533w, https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card-1024x802.jpg 1024w" height="1200" loading="lazy" sizes="(max-width: 1533px) 100vw, 1533px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1533"><noscript data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-308863" src="https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card.jpg" alt="D.W. Griffith Facts" width="1533" height="1200" srcset="https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card.jpg 1533w, https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/Broken_Blossoms_lobby_card-1024x802.jpg 1024w" sizes="(max-width: 1533px) 100vw, 1533px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1362"><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABroken_Blossoms_lobby_card.jpg"><span data-dcnode-id="1364" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1359" instrument_node="">
