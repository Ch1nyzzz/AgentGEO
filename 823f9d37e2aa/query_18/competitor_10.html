</span><p data-dcnode-id="2756"><span data-dcnode-id="2762" instrument_node="">Anyone who has seen </span><em data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Steamboat Bill Jr.</span></em><span data-dcnode-id="2759" instrument_node=""> will know that the film includes a moment where a cyclone causes a house’s front to collapse on top of Keaton. His character only survives because he is standing precisely where the open window is. Believe it or not, there was no trick behind this particular stunt. Keaton and his crew meticulously calculated exactly where Keaton should stand, </span><strong data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">knowing full well that if they were off by even a few inches, Keaton would be killed.</span></strong></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Such was the tension when they filmed that scene that many people on set turned away, too terrified of potentially seeing Keaton get crushed to death. Thankfully, he survived, and created one of the most incredible shots in film history.</span></p><span data-dcnode-id="2752" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2744" style="width: 1600px"><div class="media-credit-container alignnone" data-dcnode-id="2745" style="width: 1600px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342526" data-dcnode-id="2751" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1.jpg 1600w, https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1-300x238.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1-768x609.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1-1024x812.jpg 1024w" height="1269" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1600"><noscript data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342526" src="https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1.jpg" alt="Buster Keaton facts" width="1600" height="1269" srcset="https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1.jpg 1600w, https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1-300x238.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1-768x609.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/Steamboat_Bill_Jr_1928_1-1024x812.jpg 1024w" sizes="(max-width: 1600px) 100vw, 1600px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2746"><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASteamboat_Bill%2C_Jr_%281928%29_1.jpg"><span data-dcnode-id="2748" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2743" instrument_node="">
</span><h2 data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">28. This Aged Well</span></h2><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2739" instrument_node="">One of Keaton’s biggest films from his heyday was </span><em data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">The General</span></em><span data-dcnode-id="2736" instrument_node="">, a silent comedy that was set during the Civil War. It should have been a hit, with the studio shelling out major money for elaborate stunts (like letting a real train fall into a river!) but</span><strong data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node=""> sadly, it was a major flop.</span></strong><span data-dcnode-id="2733" instrument_node=""> The expensive failure ended&nbsp;Keaton’s auteur-style control over his own films.</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2730" instrument_node="">Years later, </span><em data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">The General</span></em><span data-dcnode-id="2727" instrument_node=""> is now regarded by many as Keaton’s masterpiece.</span></p><span data-dcnode-id="2725" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2717" style="width: 1005px"><div class="media-credit-container alignnone" data-dcnode-id="2718" style="width: 1005px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342450" data-dcnode-id="2724" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28.png 1005w, https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28-300x212.png 300w, https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28-768x543.png 768w, https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28-270x190.png 270w" height="711" loading="lazy" sizes="(max-width: 1005px) 100vw, 1005px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1005"><noscript data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342450" src="https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28.png" alt="Buster Keaton facts" width="1005" height="711" srcset="https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28.png 1005w, https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28-300x212.png 300w, https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28-768x543.png 768w, https://www.factinate.com/wp-content/uploads/2019/09/Screenshot-from-2019-09-20-16-05-28-270x190.png 270w" sizes="(max-width: 1005px) 100vw, 1005px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2719"><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedartistsreleasing.com/"><span data-dcnode-id="2721" instrument_node="">The General (1926), United Artists</span></a></span></div></figure><span data-dcnode-id="2716" instrument_node="">
</span><h2 data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">29. Friends in Sneaky Places</span></h2><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node="">During his career slump in the 1930s, </span><strong data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Keaton truly fell on hard times.</span></strong><span data-dcnode-id="2709" instrument_node=""> Not only did he struggle with alcoholism and a wrecked personal life, he was also making very little money and had to sell his beloved mansion. At one point, his alcoholism became such an issue that he was institutionalized, straitjacket and all. However, even this couldn’t contain Keaton, as he’d been taught how to escape a straitjacket by family friend and magician Harry Houdini.</span></p><span data-dcnode-id="2707" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2699" style="width: 2119px"><div class="media-credit-container alignnone" data-dcnode-id="2700" style="width: 2119px"><img alt="The Smartest Person In The Room Facts" class="lazy-hidden size-full wp-image-227981" data-dcnode-id="2706" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1.jpg 2119w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-768x513.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-1024x684.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-360x240.jpg 360w" height="1415" loading="lazy" sizes="(max-width: 2119px) 100vw, 2119px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2119"><noscript data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-227981" src="https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1.jpg" alt="The Smartest Person In The Room Facts" width="2119" height="1415" srcset="https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1.jpg 2119w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-768x513.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-1024x684.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/09/GettyImages-760289669-1-360x240.jpg 360w" sizes="(max-width: 2119px) 100vw, 2119px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2701"><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2703" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2698" instrument_node="">
</span><h2 data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">30. Reversal of Fortunes</span></h2><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2694" instrument_node="">In 1921, Keaton married actress Natalie Talmadge, who acted alongside him in the film </span><em data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Our Hospitality</span></em><span data-dcnode-id="2691" instrument_node="">. The couple had two sons, James and Robert, both of whom took their mother’s surname. As it was a Hollywood marriage, </span><strong data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">there was a lot of gossip about the union</span></strong><span data-dcnode-id="2688" instrument_node="">, with people specifically thinking that Keaton was only marrying Talmadge for her connections in Hollywood. Whether that’s true or not, the irony nowadays is that Keaton’s name endured far longer than Talmadge’s.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2678" style="width: 3513px"><div class="media-credit-container alignnone" data-dcnode-id="2679" style="width: 3513px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342441" data-dcnode-id="2685" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564.jpg 3513w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564-768x589.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564-1024x785.jpg 1024w" height="2694" loading="lazy" sizes="(max-width: 3513px) 100vw, 3513px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3513"><noscript data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342441" src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564.jpg" alt="Buster Keaton facts" width="3513" height="2694" srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564.jpg 3513w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564-768x589.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3434564-1024x785.jpg 1024w" sizes="(max-width: 3513px) 100vw, 3513px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2680"><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2682" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2677" instrument_node="">
</span><h2 data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">31. The Honeymoon’s Definitely Over</span></h2><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2670"><strong data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Keaton’s marriage to Natalie Talmadge did not end well.</span></strong><span data-dcnode-id="2671" instrument_node=""> Following the birth of their second son, Talmadge didn’t want any more kids, and even moved into a separate bedroom to make sure that happened. Problems kept building, such as Keaton’s extramarital affairs and Talmadge’s excessive spending, and the couple divorced in 1932. Talmadge was not only awarded the entirety of Keaton’s fortune, she prevented him access to their children.</span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Keaton, for his part, was suffering badly from alcoholism and dealing with the depressive slump that his career was in.</span></p><span data-dcnode-id="2666" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2658" style="width: 4928px"><div class="media-credit-container alignnone" data-dcnode-id="2659" style="width: 4928px"><img alt="Divorce Screwed client facts" class="lazy-hidden size-full wp-image-326146" data-dcnode-id="2665" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716.jpg 4928w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716-300x173.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716-768x442.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716-1024x589.jpg 1024w" height="2835" loading="lazy" sizes="(max-width: 4928px) 100vw, 4928px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4928"><noscript data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-326146" src="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716.jpg" alt="Divorce Screwed client facts" width="4928" height="2835" srcset="https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716.jpg 4928w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716-300x173.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716-768x442.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/shutterstock_1155875716-1024x589.jpg 1024w" sizes="(max-width: 4928px) 100vw, 4928px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2660"><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2662" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2657" instrument_node="">
</span><h2 data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">32. Could He Ever Watch It Again?</span></h2><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2653" instrument_node="">Keaton always performed his own stunts,</span><strong data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node=""> even when they risked his life</span></strong><span data-dcnode-id="2650" instrument_node="">. Case in point: When Keaton filmed </span><em data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Sherlock, Jr</span></em><span data-dcnode-id="2647" instrument_node="">., one stun had him hang from a tube that was hooked up to a basin full of water. On cue, the water poured out, but the force of the deluge was so intense that it actually broke Keaton’s neck. And good luck getting through that scene next time you watch it—Keaton ended up using the actual footage of his brutal injury in the final product.</span></p><span data-dcnode-id="2645" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2637" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2638" style="width: 1024px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342524" data-dcnode-id="2644" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b-768x606.jpg 768w" height="808" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342524" src="https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b.jpg" alt="Buster Keaton facts" width="1024" height="808" srcset="https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/15471639410_1d35c6d196_b-768x606.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2639"><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/116153022%40N02/15471639410"><span data-dcnode-id="2641" instrument_node="">Flickr, Breve Storia del Cinema</span></a></span></div></figure><span data-dcnode-id="2636" instrument_node="">
</span><h2 data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">33. From Bad to Worse</span></h2><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2632" instrument_node="">As if his first marriage didn’t end badly enough, </span><strong data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Keaton rebounded with a truly horrific second marriage.</span></strong><span data-dcnode-id="2629" instrument_node=""> In 1933, just a year after his divorce, Keaton married Mae Scriven, his nurse. As you can imagine, it wasn’t exactly the most romantic marriage; Scriven claimed that she didn’t know Keaton’s real first name until after the wedding, and Keaton claimed that he was going through an alcoholic binge from which he remembered nothing. It only took them three years to divorce after Scriven caught Keaton in bed with another woman.</span></p><span data-dcnode-id="2627" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2619" style="width: 4932px"><div class="media-credit-container alignnone" data-dcnode-id="2620" style="width: 4932px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342466" data-dcnode-id="2626" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230.jpg 4932w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-360x240.jpg 360w" height="3288" loading="lazy" sizes="(max-width: 4932px) 100vw, 4932px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4932"><noscript data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342466" src="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230.jpg" alt="Buster Keaton facts" width="4932" height="3288" srcset="https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230.jpg 4932w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/09/shutterstock_1388505230-360x240.jpg 360w" sizes="(max-width: 4932px) 100vw, 4932px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2621"><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2623" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2618" instrument_node="">
</span><h2 data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">34. Third Time’s the Charm</span></h2><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">In 1940, Keaton married for a third and final time, to Eleanor Norris. Norris was credited with not only saving Keaton’s life by helping him curb his alcoholism, but also with saving his career as a result, as he was able to return to work more effectively. Not only that, Norris learned Keaton’s comedy routines so that they appeared as a double act in Paris’s Cirque Medrano.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Norris and Keaton remained a couple for 26 years until Keaton’s death.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2601" style="width: 3414px"><div class="media-credit-container alignnone" data-dcnode-id="2602" style="width: 3414px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342506" data-dcnode-id="2608" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699.jpg 3414w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699-768x554.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699-1024x739.jpg 1024w" height="2463" loading="lazy" sizes="(max-width: 3414px) 100vw, 3414px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3414"><noscript data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342506" src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699.jpg" alt="Buster Keaton facts" width="3414" height="2463" srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699.jpg 3414w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699-768x554.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3321699-1024x739.jpg 1024w" sizes="(max-width: 3414px) 100vw, 3414px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2603"><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2605" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2600" instrument_node="">
</span><h2 data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">35. Don’t Tell Him!</span></h2><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2596" instrument_node="">Keaton was a heavy smoker throughout his life, and this naturally affected his health in a very bad way. However, when doctors diagnosed him with lung cancer in 1966, </span><strong data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">they dealt him a cold betrayal</span></strong><span data-dcnode-id="2593" instrument_node="">. Neither they nor Keaton’s family never actually told him what was wrong with him. They were allegedly worried that knowing about the cancer would be “detrimental to his health.”</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Keaton went to his grave convinced that he was recovering from bronchitis and wondering why he wasn’t allowed to leave the hospital.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2580" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="2581" style="width: 1280px"><img alt="Tippi Hedren facts" class="lazy-hidden size-full wp-image-298841" data-dcnode-id="2587" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280-300x190.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280-768x486.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280-1024x648.jpg 1024w" height="810" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-298841" src="https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280.jpg" alt="Tippi Hedren facts" width="1280" height="810" srcset="https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280-300x190.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280-768x486.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/cigarette-110849_1280-1024x648.jpg 1024w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2582"><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2584" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="2579" instrument_node="">
</span><h2 data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">36. The Iconic Flapper</span></h2><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2571"><span data-dcnode-id="2575" instrument_node="">Louise Brooks was once one of the world’s biggest stars. With her iconic bobbed haircut and hard-partying lifestyle, “Lulu” epitomized the Jazz Age Flapper Girl, bringing a sense of flirtatious fun to the stages and screens in the United States and Europe. </span><strong data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">But then, everything changed.</span></strong><span data-dcnode-id="2572" instrument_node=""> Just as suddenly as Louise Brooks came, she was gone.</span></p><span data-dcnode-id="2570" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2562" style="width: 2805px"><div class="media-credit-container alignnone" data-dcnode-id="2563" style="width: 2805px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-255939" data-dcnode-id="2569" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397.jpg 2805w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397-768x577.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397-1024x770.jpg 1024w" height="2109" loading="lazy" sizes="(max-width: 2805px) 100vw, 2805px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2805"><noscript data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-255939" src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397.jpg" alt="Louise Brooks Facts" width="2805" height="2109" srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397.jpg 2805w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397-768x577.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3264397-1024x770.jpg 1024w" sizes="(max-width: 2805px) 100vw, 2805px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2564"><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2566" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2561" instrument_node="">
</span><h2 data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">37. Landing on Her Feet</span></h2><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2557" instrument_node="">After proving her mettle in vaudeville, Brooks became part of&nbsp;the legendary </span><em data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Ziegfeld Follies,</span></em><span data-dcnode-id="2554" instrument_node=""> where the bewitching brunette caught the eye of Walter Wanger, a producer for Paramount Studios. Not only did Wanger sign Brooks to a five-year studio contract, they also began an on-again, off-again relationship.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">During some of the couple’s “off” periods, Brooks dated Hollywood heavyweights like Charlie Chaplin and Greta Garbo.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2541" style="width: 1559px"><div class="media-credit-container alignnone" data-dcnode-id="2542" style="width: 1559px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-255944" data-dcnode-id="2548" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4.jpg 1559w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4-300x246.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4-768x630.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4-1024x840.jpg 1024w" height="1279" loading="lazy" sizes="(max-width: 1559px) 100vw, 1559px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1559"><noscript data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-255944" src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4.jpg" alt="Louise Brooks Facts" width="1559" height="1279" srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4.jpg 1559w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4-300x246.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4-768x630.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-4-1024x840.jpg 1024w" sizes="(max-width: 1559px) 100vw, 1559px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2543"><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/ky_olsen/5115676230"><span data-dcnode-id="2545" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2540" instrument_node="">
</span><h2 data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">38. Evicted!</span></h2><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2536" instrument_node="">In Hollywood, </span><strong data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Brooks immediately built a reputation for decadence and debauchery</span></strong><span data-dcnode-id="2533" instrument_node="">. Thrown out of the Algonquin Hotel, she took up residence at the Martha Washington Hotel. She was once again thrown out. The evictions took place in the span of a month.</span></p><span data-dcnode-id="2531" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2523" style="width: 960px"><div class="media-credit-container alignnone" data-dcnode-id="2524" style="width: 960px"><img alt="Clara Bow facts" class="lazy-hidden size-full wp-image-223953" data-dcnode-id="2530" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file.jpg 960w, https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file-300x193.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file-768x494.jpg 768w" height="618" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-223953" src="https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file.jpg" alt="Clara Bow facts" width="960" height="618" srcset="https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file.jpg 960w, https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file-300x193.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/unnamed-file-768x494.jpg 768w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2525"><a data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2527" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="2522" instrument_node="">
</span><h2 data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">39. Eurotrip</span></h2><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2518" instrument_node="">At the height of her fame, Brooks left the United States to work in Germany. The three films she made there,&nbsp;</span><em data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Pandora’s Box</span></em><span data-dcnode-id="2515" instrument_node="">, </span><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Diary of a Lost Girl</span></em><span data-dcnode-id="2512" instrument_node="">, and </span><em data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Miss Europe</span></em><span data-dcnode-id="2509" instrument_node="">, are considered the best of her career. </span><strong data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Unfortunately, her trip would have terrible consequences.&nbsp;</span></strong></p><span data-dcnode-id="2505" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2497" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2498" style="width: 1024px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-255967" data-dcnode-id="2504" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b-768x586.jpg 768w" height="781" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-255967" src="https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b.jpg" alt="Louise Brooks Facts" width="1024" height="781" srcset="https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/7792532842_5e951d4514_b-768x586.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2499"><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/underrrloved/7792532842"><span data-dcnode-id="2501" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2496" instrument_node="">
</span><h2 data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">40. The Silent Treatment</span></h2><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2492" instrument_node="">Brooks’ final film for Paramount was </span><em data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">The Canary Murder Case</span></em><span data-dcnode-id="2489" instrument_node="">. Originally a silent picture, executives decided it should be a “talkie.” And while no one was too mad that Brooks left Paramount to work in Germany, her refusal to return and record dialogue for the film</span><strong data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node=""> landed her on Hollywood’s blacklist.</span></strong><span data-dcnode-id="2486" instrument_node=""> But even when the studio threatened to run her out of town, Brooks was unfazed. She simply replied, “Who wants to work in Hollywood?”</span></p><span data-dcnode-id="2484" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2476" style="width: 802px"><div class="media-credit-container alignnone" data-dcnode-id="2477" style="width: 802px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-255985" data-dcnode-id="2483" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6.jpg 802w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6-300x249.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6-768x638.jpg 768w" height="666" loading="lazy" sizes="(max-width: 802px) 100vw, 802px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="802"><noscript data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-255985" src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6.jpg" alt="Louise Brooks Facts" width="802" height="666" srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6.jpg 802w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6-300x249.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-6-768x638.jpg 768w" sizes="(max-width: 802px) 100vw, 802px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2478"><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.m.wikipedia.org/wiki/Fichier%3AThe_Canary_Murder_Case_%281929%29_1.jpg"><span data-dcnode-id="2480" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2475" instrument_node="">
</span><h2 data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">41. Bust</span></h2><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2471" instrument_node="">For a time, Louise Brooks was on top of the world, but as her reputation for bad behavior spread, film roles dried up. By 1932, </span><strong data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Brooks declared herself bankrupt.</span></strong><span data-dcnode-id="2468" instrument_node=""> To make ends meet in the 30s and 40s, Brooks worked as a nightclub dancer, gossip columnist, Saks Fifth Avenue sales girl, and—for a brief, unhappy period—a “courtesan.” When her former film-star colleagues saw her at Saks, Brooks says they were “disgusted” and shunned her.</span></p><span data-dcnode-id="2466" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2458" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2459" style="width: 1000px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-256026" data-dcnode-id="2465" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-256026" src="https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585.jpg" alt="Louise Brooks Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/shutterstock_1108088585-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2460"><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2462" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2457" instrument_node="">
</span><h2 data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">42. For Her Eyes Only</span></h2><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2453" instrument_node="">In the late 40s, Brooks wrote her first autobiography, </span><em data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Naked on My Goat</span></em><span data-dcnode-id="2450" instrument_node="">. Despite the eye-catching title, the book never saw the light of day: </span><strong data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Brooks herself threw the manuscript into an incinerator</span></strong><span data-dcnode-id="2447" instrument_node="">. Writing, however, proved to be a hidden talent for the former star. Brooks began a second career as a film essayist, historian, and critic, drawing on her wealth of experience and insider knowledge to craft witty, insightful essays that often contradicted the “official” history of Hollywood.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2437" style="width: 5184px"><div class="media-credit-container alignnone" data-dcnode-id="2438" style="width: 5184px"><img alt="Calamity Jane facts" class="lazy-hidden size-full wp-image-225449" data-dcnode-id="2444" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426.jpg 5184w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-360x240.jpg 360w" height="3456" loading="lazy" sizes="(max-width: 5184px) 100vw, 5184px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5184"><noscript data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-225449" src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426.jpg" alt="Calamity Jane facts" width="5184" height="3456" srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426.jpg 5184w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_1042993426-360x240.jpg 360w" sizes="(max-width: 5184px) 100vw, 5184px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2439"><a data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2441" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2436" instrument_node="">
</span><h2 data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">43. #MeToo Moment</span></h2><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2428"><span data-dcnode-id="2432" instrument_node="">There may be other reasons for the decline of Brooks’s film career. She later claimed that Columbia Pictures head Harry Cohn had made advances at her, making it very clear that a film contract could be drawn up </span><em data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">if </span></em><span data-dcnode-id="2429" instrument_node="">she cooperated. An indignant Brooks refused.</span></p><span data-dcnode-id="2427" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2419" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="2420" style="width: 1000px"><img alt="The American Civil War Facts" class="lazy-hidden size-full wp-image-255669" data-dcnode-id="2426" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286-768x518.jpg 768w" height="674" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-255669" src="https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286.jpg" alt="The American Civil War Facts" width="1000" height="674" srcset="https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/05/shutterstock_1267551286-768x518.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2421"><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2423" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2418" instrument_node="">
</span><h2 data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">44. Set Romance Gone Wrong</span></h2><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2414" instrument_node="">One of the most traumatic moments Brooks faced as a Hollywood star came on the set of&nbsp;</span><em data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Beggars of Life</span></em><span data-dcnode-id="2411" instrument_node="">. According to her memoir&nbsp;</span><em data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Lulu in Hollywood</span></em><span data-dcnode-id="2408" instrument_node="">, Brooks was so impressed with one of the stuntmen on the film, Harvey, that she shared an intimate evening with him while on location. </span><strong data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">But the next day, Harvey dealt her an absolutely cold-blooded betrayal.</span></strong></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">The morning after, Brooks walked out of the hotel to see Harvey lounging on the porch. He stopped her and, in front of crew members, cruelly and falsely accused her of contracting syphilis from a torrid affair with a studio executive she had, in fact, never met. He then tossed out,”Another reason I want to know [if you have syphilis] is that my girl is coming up at noon to drive me back to Hollywood.” No wonder she left.</span></p><span data-dcnode-id="2401" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2393" style="width: 957px"><div class="media-credit-container alignnone" data-dcnode-id="2394" style="width: 957px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-256116" data-dcnode-id="2400" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg 957w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-768x624.jpg 768w" height="777" loading="lazy" sizes="(max-width: 957px) 100vw, 957px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="957"><noscript data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-256116" src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg" alt="Louise Brooks Facts" width="957" height="777" srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17.jpg 957w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-17-768x624.jpg 768w" sizes="(max-width: 957px) 100vw, 957px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2395"><a data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="2397" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2392" instrument_node="">
</span><h2 data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">45. How’d You Like to Be a Star?</span></h2><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">In the later stages of her career, Brooks was so unknown that, after appearing in a play under the stage name Linda Carter, she received an offer to do a screen-test for 20th Century Fox. The talent scout had no idea that Brooks once ruled the silver screen.</span></p><span data-dcnode-id="2386" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2378" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="2379" style="width: 1000px"><img alt="Tom Hanks Quiz" class="lazy-hidden size-full wp-image-248765" data-dcnode-id="2385" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-248765" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779.jpg" alt="Tom Hanks Quiz" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_424802779-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2380"><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2382" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2377" instrument_node="">
</span><h2 data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">46. Some Regrets</span></h2><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2369"><span data-dcnode-id="2373" instrument_node="">While her place in film history was secured, </span><strong data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Brooks went to her grave filled with disappointment and regret</span></strong><span data-dcnode-id="2370" instrument_node="">. At the end of her life, she wrote, “How I have existed fills me with horror. For I have failed in everything—spelling, arithmetic, riding, swimming, tennis, golf, dancing, singing, acting, wife, mistress, whore, friend. Even cooking. And I do not excuse myself with the usual escape of ‘not trying.’ I tried with all my heart.” Brooks died of a heart attack on August 8, 1985.</span></p><span data-dcnode-id="2368" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2360" style="width: 1098px"><div class="media-credit-container alignnone" data-dcnode-id="2361" style="width: 1098px"><img alt="Louise Brooks Facts" class="lazy-hidden size-full wp-image-256120" data-dcnode-id="2367" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15.jpg 1098w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15-300x249.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15-768x639.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15-1024x851.jpg 1024w" height="913" loading="lazy" sizes="(max-width: 1098px) 100vw, 1098px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1098"><noscript data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-256120" src="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15.jpg" alt="Louise Brooks Facts" width="1098" height="913" srcset="https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15.jpg 1098w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15-300x249.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15-768x639.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/FotoJet-15-1024x851.jpg 1024w" sizes="(max-width: 1098px) 100vw, 1098px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2362"><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/johnmcnab/5080998689"><span data-dcnode-id="2364" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2359" instrument_node="">
</span><h2 data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">47. The Star Who Lost it All</span></h2><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2355" instrument_node="">In more ways than one, Roscoe “Fatty” Arbuckle was the biggest star in America. He was heavy-set but extremely agile—the prototype for a legion of comedic big men—audiences marveled at his physicality. The first actor to receive a million-dollar paycheck, Arbuckle was more popular even than Charlie Chaplin. </span><strong data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Then it all went away.</span></strong><span data-dcnode-id="2352" instrument_node=""> Arbuckle spent the final years of his career hiding from the spotlight, tainted by shame and scandal. His tumultuous story makes Fatty Arbuckle one of the most tragic figures in Hollywood history.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2342" style="width: 701px"><div class="media-credit-container alignnone" data-dcnode-id="2343" style="width: 701px"><img alt="Fatty Arbuckle Facts" class="lazy-hidden size-full wp-image-350425" data-dcnode-id="2349" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/Selection_726.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/Selection_726.png 701w, https://www.factinate.com/wp-content/uploads/2019/10/Selection_726-300x277.png 300w" height="648" loading="lazy" sizes="(max-width: 701px) 100vw, 701px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="701"><noscript data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350425" src="https://www.factinate.com/wp-content/uploads/2019/10/Selection_726.png" alt="Fatty Arbuckle Facts" width="701" height="648" srcset="https://www.factinate.com/wp-content/uploads/2019/10/Selection_726.png 701w, https://www.factinate.com/wp-content/uploads/2019/10/Selection_726-300x277.png 300w" sizes="(max-width: 701px) 100vw, 701px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2344"><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/5/5c/Roscoe_Arbuckle.jpg"><span data-dcnode-id="2346" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2341" instrument_node="">
</span><h2 data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">48. Stage Dive</span></h2><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Arbuckle didn’t have a loving childhood. His mother passed away and his father despised him, so when Arbuckle was 12 years old, he decided to strike out on his own and give showbiz a try.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2334" instrument_node="">He entered an amateur talent contest in 1899, but his singing and dancing failed to impress the crowd. </span><strong data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Arbuckle panicked&nbsp;</span></strong><span data-dcnode-id="2331" instrument_node="">and attempted to flee the stage, but he tripped, somehow executed a perfect backflip, and landed in the orchestra pit. The audience roared with applause. In an instant, Arbuckle had gone from getting booed offstage to winning the contest.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2321" style="width: 2180px"><div class="media-credit-container alignnone" data-dcnode-id="2322" style="width: 2180px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342329" data-dcnode-id="2328" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212.jpg 2180w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212-768x581.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212-1024x774.jpg 1024w" height="1648" loading="lazy" sizes="(max-width: 2180px) 100vw, 2180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2180"><noscript data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342329" src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212.jpg" alt="Buster Keaton facts" width="2180" height="1648" srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212.jpg 2180w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212-768x581.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3300212-1024x774.jpg 1024w" sizes="(max-width: 2180px) 100vw, 2180px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2323"><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2325" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2320" instrument_node="">
</span><h2 data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">49. Just Desserts</span></h2><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2316" instrument_node="">After cutting his teeth on the stage, Arbuckle’s comedy chops led him to Hollywood where he collaborated with Buster Keaton, married fellow actress Minta Durfee, and, oh right, </span><strong data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">made cinema history.</span></strong><span data-dcnode-id="2313" instrument_node=""> Arbuckle’s 1913 film </span><em data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">A Noise from the Deep </span></em><span data-dcnode-id="2310" instrument_node="">marks the first time the pie-in-the-face gag was shown onscreen. The pie was thrown by Mabel Normand, the target, of course, was Arbuckle himself.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2300" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2301" style="width: 1000px"><img alt="Fatty Arbuckle Facts" class="lazy-hidden size-full wp-image-350439" data-dcnode-id="2307" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747-768x516.jpg 768w" height="672" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350439" src="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747.jpg" alt="Fatty Arbuckle Facts" width="1000" height="672" srcset="https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/shutterstock_260423747-768x516.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2302"><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2304" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2299" instrument_node="">
</span><h2 data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">50. Bonus Points</span></h2><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">In 1920, Arbuckle signed a million-dollar contract with Paramount Pictures; he was the first actor to earn $1 million a year. </span><strong data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">One of the clauses of Arbuckle’s contract was basically cruel</span></strong><span data-dcnode-id="2292" instrument_node="">: it held that he must remain over 250 pounds. He would even receive a bonus if he added 50 or 100 pounds. Arbuckle dutifully obliged, and spent the rest of his life hovering around 300 pounds.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2282" style="width: 5760px"><div class="media-credit-container alignnone" data-dcnode-id="2283" style="width: 5760px"><img alt="Strange Historical Beauty Practices facts" class="lazy-hidden size-full wp-image-309708" data-dcnode-id="2289" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273.jpg 5760w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-360x240.jpg 360w" height="3840" loading="lazy" sizes="(max-width: 5760px) 100vw, 5760px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5760"><noscript data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-309708" src="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273.jpg" alt="Strange Historical Beauty Practices facts" width="5760" height="3840" srcset="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273.jpg 5760w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_701998273-360x240.jpg 360w" sizes="(max-width: 5760px) 100vw, 5760px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2284"><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2286" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2281" instrument_node="">
</span><h2 data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">51. Fat Pride</span></h2><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">That’s not to say Arbuckle was always comfortable with his weight. He made a point of not using his weight as a joke: he wouldn’t, for example, get stuck in a chair. He hated to be called Fatty, the nickname he had carried around since childhood. On set, whenever crew or cast members referred to him as Fatty, he would shoot back, “I got a name, you know.”</span></p><span data-dcnode-id="2275" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2267" style="width: 2878px"><div class="media-credit-container alignnone" data-dcnode-id="2268" style="width: 2878px"><img alt="Osman I facts" class="lazy-hidden size-full wp-image-319108" data-dcnode-id="2274" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518.jpg 2878w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-360x240.jpg 360w" height="1919" loading="lazy" sizes="(max-width: 2878px) 100vw, 2878px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2878"><noscript data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-319108" src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518.jpg" alt="Osman I facts" width="2878" height="1919" srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518.jpg 2878w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_1426158518-360x240.jpg 360w" sizes="(max-width: 2878px) 100vw, 2878px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2269"><a data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2271" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2266" instrument_node="">
</span><h2 data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">52. Party’s Over</span></h2><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2262" instrument_node="">Arbuckle was on top of the world in 1921, and so he was entitled to take a little vacation. On September 5, Labor Day, he and some friends rented a string of rooms at the St. Francis Hotel in San Francisco and threw a little gin party. </span><strong data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">The party proved to be the biggest mistake of Arbuckle’s career.</span></strong></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2257" instrument_node="">After a nap, Arbuckle woke to discover his party had been crashed by several uninvited guests. Among them was Virginia Rappe, an actress with a reputation for overdoing it at parties. </span><strong data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Rappe appeared to be in great distress</span></strong><span data-dcnode-id="2254" instrument_node="">, clutching her stomach and tearing at her clothes. She lay in bed at the St. Francis Hotel for two days before being taken to hospital.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2244" style="width: 797px"><div class="media-credit-container alignnone" data-dcnode-id="2245" style="width: 797px"><img alt="Fatty Arbuckle Facts" class="lazy-hidden size-full wp-image-350450" data-dcnode-id="2251" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/Selection_729.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/Selection_729.png 797w, https://www.factinate.com/wp-content/uploads/2019/10/Selection_729-300x251.png 300w, https://www.factinate.com/wp-content/uploads/2019/10/Selection_729-768x643.png 768w" height="667" loading="lazy" sizes="(max-width: 797px) 100vw, 797px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="797"><noscript data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350450" src="https://www.factinate.com/wp-content/uploads/2019/10/Selection_729.png" alt="Fatty Arbuckle Facts" width="797" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/10/Selection_729.png 797w, https://www.factinate.com/wp-content/uploads/2019/10/Selection_729-300x251.png 300w, https://www.factinate.com/wp-content/uploads/2019/10/Selection_729-768x643.png 768w" sizes="(max-width: 797px) 100vw, 797px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2246"><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/a/a0/Virginia_Rappe_LCCN2014713221crop.jpg"><span data-dcnode-id="2248" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2243" instrument_node="">
</span><h2 data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">53. Accused</span></h2><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">While Rappe was in hospital, her friend, Maude Delmont, told doctors Rappe had been sexually assaulted by Arbuckle. While doctors found no signs of sexual assault and Delmont had a reputation as an extortionist, police took the report seriously and speculated that Rappe’s organs must have been crushed under Arbuckle’s weight.</span></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Rappe died from a ruptured bladder on September 9, 1921. Fatty Arbuckle, charged with manslaughter, turned himself in to the police.</span></p><span data-dcnode-id="2234" instrument_node="">
