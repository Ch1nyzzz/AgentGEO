</span><h1 class="entry-title" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Dazzling Facts About Hollywood’s Scandalous Silent Film Stars</span></h1><span data-dcnode-id="3338" instrument_node="">
</span></div><span data-dcnode-id="3336" instrument_node="">
</span><div class="inner_content_wrapper inner_content" data-dcnode-id="968"><span data-dcnode-id="3335" instrument_node="">
</span><div class="entry-content" data-dcnode-id="970" itemprop="articleBody"><span data-dcnode-id="3334" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">As Hollywood boomed in the Jazz Age, stars like Greta Garbo, Louise Brooks, and Rudolph Valentino entranced cinema-goers all over the world. But as the Silent Film era saw Hollywood’s rise, it also learned that if something goes up, it must come down. Behind the camera, heartthrobs and screen sirens led chilling double lives full of scandal, tragedy, and heartbreak. With its twisted secrets and magnetic celebrities, the Roaring 20s took “dark glamor” to the next level.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><hr data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">
</span><h1 data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Silent Film Stars Facts</span></h1><span data-dcnode-id="3326" instrument_node="">
</span><h2 data-dcnode-id="3323"><strong data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">1. A Star Is Born</span></strong></h2><div class="partial_slot" data-dcnode-id="3322" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">Charlie Chaplin was once the biggest star in the entire world, but a cruel twist of fate—and his own dark demons—destroyed his reputation, turning his fame into infamy. Yet when it comes to this English king of comedy, those scandals are just the beginning.</span></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3313"><span data-dcnode-id="3317" instrument_node="">Chaplin’s childhood was like something out of a Charles Dickens’ novel. His parents, Hannah and Charles Sr., were both roaming music hall actors with very little stable income. Chaplin and his older half-brother Sydney grew up in abject poverty,</span><strong data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node=""> but it was about to get so much worse.</span></strong><span data-dcnode-id="3314" instrument_node=""> His father and mother soon became estranged, with his dad all but abandoning the family.</span></p><span data-dcnode-id="3312" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3304" style="width: 1400px"><div class="media-credit-container alignnone" data-dcnode-id="3305" style="width: 1400px"><img alt="Charlie Chaplin facts " class="size-full wp-image-107357 lazy-loaded" data-dcnode-id="3311" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/42-1.jpeg" data-srcset="" height="1091" sizes="(max-width: 1400px) 100vw, 1400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/42-1.jpeg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/42-1.jpeg 1400w, https://www.factinate.com/wp-content/uploads/2018/03/42-1-300x234.jpeg 300w, https://www.factinate.com/wp-content/uploads/2018/03/42-1-768x598.jpeg 768w, https://www.factinate.com/wp-content/uploads/2018/03/42-1-1024x798.jpeg 1024w" width="1400"><noscript data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">&lt;img class="size-full wp-image-107357" src="https://www.factinate.com/wp-content/uploads/2018/03/42-1.jpeg" alt="Charlie Chaplin facts " width="1400" height="1091" srcset="https://www.factinate.com/wp-content/uploads/2018/03/42-1.jpeg 1400w, https://www.factinate.com/wp-content/uploads/2018/03/42-1-300x234.jpeg 300w, https://www.factinate.com/wp-content/uploads/2018/03/42-1-768x598.jpeg 768w, https://www.factinate.com/wp-content/uploads/2018/03/42-1-1024x798.jpeg 1024w" sizes="(max-width: 1400px) 100vw, 1400px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3306"><a data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3308" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3300"><em data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">First row, third from left&nbsp;</span></em></p><span data-dcnode-id="3299" instrument_node="">
</span><h2 data-dcnode-id="3295"><span data-dcnode-id="3298" instrument_node="">2. </span><strong data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">The Role of a Lifetime</span></strong></h2><span data-dcnode-id="3294" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3293" instrument_node="">Chaplin’s most well-known role is The Little Tramp, the gentile and clumsy character he played in many of his films. </span><strong data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Except the Little Tramp hid a dark secret.&nbsp;</span></strong><span data-dcnode-id="3290" instrument_node="">Later, Chaplin’s daughter Geraldine once confessed that Chaplin was obsessed with achieving immortality through the character, and he was so afraid he wouldn’t be remembered that he let the Tramp appear on almost anything.</span></p><span data-dcnode-id="3288" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3280" style="width: 4489px"><div class="media-credit-container alignnone" data-dcnode-id="3281" style="width: 4489px"><img alt="'City Lights' 1931" class="size-full wp-image-207258 lazy-loaded" data-dcnode-id="3287" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232.jpg" data-srcset="" height="3498" loading="lazy" sizes="(max-width: 4489px) 100vw, 4489px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232.jpg 4489w, https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232-1024x798.jpg 1024w" width="4489"><noscript data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-207258" src="https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232.jpg" alt="'City Lights' 1931" width="4489" height="3498" srcset="https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232.jpg 4489w, https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/10/GettyImages-500407232-1024x798.jpg 1024w" sizes="(max-width: 4489px) 100vw, 4489px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3282"><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/detail/news-photo/charlie-chaplin-during-the-shooting-of-the-movie-city-news-photo/500407232"><span data-dcnode-id="3284" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3279" instrument_node="">
</span><h2 data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">3. It’s a Nice Day for a Sham Wedding</span></h2><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3271"><span data-dcnode-id="3275" instrument_node="">When he was a rising star, Chaplin’s 16-year-old lover Mildred Harris confessed to him that she was pregnant, forcing him to marry her in a quickie wedding. Chaplin was deeply unhappy in this first marriage—</span><strong data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">but he didn’t know it was going to get much worse.&nbsp; </span></strong><span data-dcnode-id="3272" instrument_node="">When their son was born, the baby boy was severely malformed, and died just days later. Within a year, Chaplin and Harris had divorced.</span></p><span data-dcnode-id="3270" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3262" style="width: 1840px"><div class="media-credit-container alignnone" data-dcnode-id="3263" style="width: 1840px"><img alt="Charlie Chaplin Facts" class="size-full wp-image-378765 lazy-loaded" data-dcnode-id="3269" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-scaled.jpg" data-srcset="" height="1623" loading="lazy" sizes="(max-width: 1840px) 100vw, 1840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-scaled.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-300x265.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-1024x903.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-768x677.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-1536x1355.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-2048x1807.jpg 2048w" width="1840"><noscript data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378765" src="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-scaled.jpg" alt="Charlie Chaplin Facts" width="1840" height="1623" srcset="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-300x265.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-1024x903.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-768x677.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-1536x1355.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-3253817-2048x1807.jpg 2048w" sizes="(max-width: 1840px) 100vw, 1840px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3264"><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3266" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="3261" instrument_node="">
</span><h2 data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">4. Second Time’s Not the Charm</span></h2><span data-dcnode-id="3258" instrument_node="">
</span><p data-dcnode-id="3253"><span data-dcnode-id="3257" instrument_node="">Chaplin’s second marriage to the starlet Lita Grey was even more troubled than his first. Like his first wife Mildred, Grey was just a 16-year-old girl when she met the 35-year-old Chaplin…and got pregnant. Chaplin hastily wed the girl in Mexico and tried to be happy. </span><strong data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">He wasn’t.</span></strong><span data-dcnode-id="3254" instrument_node=""> Chaplin spent all his free time desperately trying to avoid Grey.</span></p><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">In 1926, Grey unsurprisingly filed for divorce, charging Chaplin with infidelity, misconduct, and even “perverted desires.” When the press got a hold of the allegations, the public demanded to ban his films. In the end, Chaplin paid Grey a massive sum of $600,000 to make it all go away.</span></p><span data-dcnode-id="3249" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3241" style="width: 1840px"><div class="media-credit-container alignnone" data-dcnode-id="3242" style="width: 1840px"><img alt="Charlie Chaplin Facts" class="size-full wp-image-378772 lazy-loaded" data-dcnode-id="3248" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-scaled.jpg" data-srcset="" height="1592" loading="lazy" sizes="(max-width: 1840px) 100vw, 1840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-scaled.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-1024x886.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-768x665.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-1536x1329.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-2048x1772.jpg 2048w" width="1840"><noscript data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378772" src="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-scaled.jpg" alt="Charlie Chaplin Facts" width="1840" height="1592" srcset="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-1024x886.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-768x665.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-1536x1329.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-2628787-2048x1772.jpg 2048w" sizes="(max-width: 1840px) 100vw, 1840px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3243"><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3245" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="3240" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="3235" style="min-height: 120px;"><div data-dcnode-id="3236"><span data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Advertisement</span></span><div data-dcnode-id="3237" id="div-gpt-ad-3568692-15"></div></div></div><h2 data-dcnode-id="3232"><strong data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">5. Learning From a Pro</span></strong></h2><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Chaplin’s interest in comedy came from one incident with his beloved mother. During one period of his childhood, the young Charlie was incredibly ill and had to spend weeks recovering in bed. While he was there, his mother sat beside the window and re-enacted anything she saw that might amuse her son. It was then that Chaplin realized the power of comedy.</span></p><span data-dcnode-id="3228" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3220" style="width: 1561px"><div class="media-credit-container alignnone" data-dcnode-id="3221" style="width: 1561px"><img alt="Charlie Chaplin Facts" class="size-full wp-image-378863 lazy-loaded" data-dcnode-id="3227" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times.jpg" data-srcset="" height="1229" loading="lazy" sizes="(max-width: 1561px) 100vw, 1561px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times.jpg 1561w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-1024x806.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-768x605.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-1536x1209.jpg 1536w" width="1561"><noscript data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378863" src="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times.jpg" alt="Charlie Chaplin Facts" width="1561" height="1229" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times.jpg 1561w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-1024x806.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-768x605.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_-_Modern_Times-1536x1209.jpg 1536w" sizes="(max-width: 1561px) 100vw, 1561px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3222"><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AChaplin_-_Modern_Times.jpg"><span data-dcnode-id="3224" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="3219" instrument_node="">
</span><h2 data-dcnode-id="3216"><strong data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">6. Don’t Call It a Comeback</span></strong></h2><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3214" instrument_node="">In 1972, after decades of exile, Chaplin finally traveled to America again to pick up an honorary Oscar. </span><strong data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">His appearance was absolutely heartbreaking</span></strong><span data-dcnode-id="3211" instrument_node="">. When he came on the stage, the audience gave him an incredible 12-minute standing ovation. Chaplin was visibly touched that he hadn’t been forgotten after all these years. As he said, “Words seem so futile and so feeble…you are all wonderful, sweet people. Thank you.”</span></p><span data-dcnode-id="3209" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3201" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="3202" style="width: 900px"><img alt="Charlie Chaplin Facts" class="size-full wp-image-378810" data-dcnode-id="3208" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar.jpg" data-srcset="" height="743" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar.jpg 900w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar-768x634.jpg 768w" width="900"><noscript data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378810" src="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar.jpg" alt="Charlie Chaplin Facts" width="900" height="743" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar.jpg 900w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_oscar-768x634.jpg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3203"><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AChaplin_oscar.JPG"><span data-dcnode-id="3205" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="3200" instrument_node="">
</span><h2 data-dcnode-id="3197"><strong data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">7. Just One More Take, I Can Do It!</span></strong></h2><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3195" instrument_node="">Actors go to far lengths sometimes in their roles, and Chaplin is no exception. One day, Chaplin even ended up in the hospital for severe insulin shock. Why? Well, he reshot one scene for his masterpiece </span><em data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">The Gold Rush </span></em><span data-dcnode-id="3192" instrument_node="">a whopping 63 times. As a result, he had to eat a prop boot, which was made of black licorice, over and over again.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3182" style="width: 1452px"><div class="media-credit-container alignnone" data-dcnode-id="3183" style="width: 1452px"><img alt="Charlie Chaplin Facts" class="size-full wp-image-378817 lazy-loaded" data-dcnode-id="3189" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot.jpg" data-srcset="" height="1047" loading="lazy" sizes="(max-width: 1452px) 100vw, 1452px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot.jpg 1452w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot-1024x738.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot-768x554.jpg 768w" width="1452"><noscript data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378817" src="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot.jpg" alt="Charlie Chaplin Facts" width="1452" height="1047" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot.jpg 1452w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot-1024x738.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Chaplin_the_gold_rush_boot-768x554.jpg 768w" sizes="(max-width: 1452px) 100vw, 1452px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3184"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Datei%3AChaplin_the_gold_rush_boot.jpg"><span data-dcnode-id="3186" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="3181" instrument_node="">
</span><h2 data-dcnode-id="3178"><strong data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">8. Seal of Approval</span></strong></h2><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3176" instrument_node="">Chaplin almost decided to pull the plug on his classic film </span><em data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">The Great Dictator </span></em><span data-dcnode-id="3173" instrument_node="">because he worried that people wouldn’t find his mockery of Hitler funny. When it came time to make a decision, Chaplin got encouragement from the highest source in the land: President Franklin D. Roosevelt. Roosevelt actually called Chaplin up and told him to go forward with it.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3163" style="width: 1300px"><div class="media-credit-container alignnone" data-dcnode-id="3164" style="width: 1300px"><img alt="Charlie Chaplin Facts" class="lazy-hidden size-full wp-image-378840" data-dcnode-id="3170" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3.jpg 1300w, https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3-768x576.jpg 768w" height="975" loading="lazy" sizes="(max-width: 1300px) 100vw, 1300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1300"><noscript data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378840" src="https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3.jpg" alt="Charlie Chaplin Facts" width="1300" height="975" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3.jpg 1300w, https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Dictator_charlie3-768x576.jpg 768w" sizes="(max-width: 1300px) 100vw, 1300px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3165"><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADictator_charlie3.jpg"><span data-dcnode-id="3167" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="3162" instrument_node="">
</span><h2 data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">9. Young Love</span></h2><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3158" instrument_node="">Chaplin had experienced public troubles in love before, </span><strong data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">but his last marriage was his most infamous.&nbsp;</span></strong><span data-dcnode-id="3155" instrument_node="">In 1943, Chaplin married the young Oona O’Neill, the 17-year-old daughter of famed playwright Eugene O’Neill. The actor obviously had a well-known taste for young girls, but even this was too much for the public to take. Why? Chaplin was 54 years old at the time.</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Despite the age difference, it was a happy union. O’Neill and Chaplin had eight children and remained together until Chaplin’s death.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3142" style="width: 6012px"><div class="media-credit-container alignnone" data-dcnode-id="3143" style="width: 6012px"><img alt="J.D. Salinger Facts" class="lazy-hidden size-full wp-image-271408" data-dcnode-id="3149" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068.jpg 6012w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068-768x599.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068-1024x799.jpg 1024w" height="4691" loading="lazy" sizes="(max-width: 6012px) 100vw, 6012px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="6012"><noscript data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-271408" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068.jpg" alt="J.D. Salinger Facts" width="6012" height="4691" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068.jpg 6012w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068-768x599.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-104206068-1024x799.jpg 1024w" sizes="(max-width: 6012px) 100vw, 6012px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3144"><a data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3146" instrument_node="">Getty Images</span></a></span></di </span></div><h2 data-dcnode-id="3085"><strong data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">10. Even Better Than the Real Thing</span></strong></h2><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3077"><span data-dcnode-id="3083" instrument_node="">According to lore, Chaplin once entered a “Charlie Chaplin Look-a-Like” contest undercover, just to see if he could win the prize for his own iconic look. </span><strong data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">H</span></strong><strong data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">e was sorely disappointed.</span></strong><span data-dcnode-id="3078" instrument_node=""> Depending on the source you read, he came either in a disappointing second or a middling third. Probably not the results the bona fide Chaplin was expecting.</span></p><span data-dcnode-id="3076" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3068" style="width: 1274px"><div class="media-credit-container alignnone" data-dcnode-id="3069" style="width: 1274px"><img alt="Hearst Castle facts" class="lazy-hidden size-full wp-image-372341" data-dcnode-id="3075" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin.jpg 1274w, https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin-1024x797.jpg 1024w" height="992" loading="lazy" sizes="(max-width: 1274px) 100vw, 1274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1274"><noscript data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-372341" src="https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin.jpg" alt="Hearst Castle facts" width="1274" height="992" srcset="https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin.jpg 1274w, https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/Charlie_Chaplin-1024x797.jpg 1024w" sizes="(max-width: 1274px) 100vw, 1274px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3070"><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACharlie_Chaplin.jpg"><span data-dcnode-id="3072" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="3067" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="3066" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF2" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF3"></div><h2 data-dcnode-id="3063"><strong data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">11. The Case of the Body Snatchers</span></strong></h2><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3057"><span data-dcnode-id="3061" instrument_node="">In 1977, Chaplin passed on at the ripe age of 88 from a stroke in his sleep—</span><strong data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">but even in death, the scandal continued.</span></strong><span data-dcnode-id="3058" instrument_node=""> Get this: After his family buried him, grave-robbers dug up his body and held it for ransom. The thieves demanded his grieving loved ones pay $600,000 for the deceased actor’s return. Luckily, though, his widow Oona had a trick up her sleeve.</span></p><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Oona had the robbers’ phones tapped, allowing the authorities to track them down and detain them. After all that, Chaplin was reburied in a vault surrounded by impenetrable cement.</span></p><span data-dcnode-id="3053" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3045" style="width: 1840px"><div class="media-credit-container alignnone" data-dcnode-id="3046" style="width: 1840px"><img alt="Charlie Chaplin Facts" class="lazy-hidden size-full wp-image-378865" data-dcnode-id="3052" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-768x509.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-1536x1017.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-2048x1356.jpg 2048w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-340x225.jpg 340w" height="1219" loading="lazy" sizes="(max-width: 1840px) 100vw, 1840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1840"><noscript data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378865" src="https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-scaled.jpg" alt="Charlie Chaplin Facts" width="1840" height="1219" srcset="https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-768x509.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-1536x1017.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-2048x1356.jpg 2048w, https://www.factinate.com/wp-content/uploads/2018/03/shutterstock_102339601-340x225.jpg 340w" sizes="(max-width: 1840px) 100vw, 1840px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3047"><a data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="3049" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="3044" instrument_node="">
</span><h2 data-dcnode-id="3041"><strong data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">12. Behind Bedroom Doors</span></strong></h2><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3039" instrument_node="">In the 1940s, the middle-aged and very married Chaplin had a tryst with 22-year-old aspiring starlet Joan Barry. Predictably,</span><strong data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node=""> they were doomed to a ruinous end. </span></strong><span data-dcnode-id="3036" instrument_node="">When Chaplin broke up with Barry, the young girl did </span><em data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">not</span></em><span data-dcnode-id="3033" instrument_node=""> take it well. She reportedly suffered from obsessive and paranoid behavior, and the breakup only made things worse. When she resurfaced in Chaplin’s life, Barry claimed she was pregnant—and that Chaplin was the father.</span></p><span data-dcnode-id="3031" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3023" style="width: 700px"><div class="media-credit-container alignnone" data-dcnode-id="3024" style="width: 700px"><img alt="Charlie Chaplin Facts" class="lazy-hidden size-full wp-image-378871" data-dcnode-id="3030" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Joan_Barry_publ.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/03/Joan_Barry_publ.jpg 700w, https://www.factinate.com/wp-content/uploads/2018/03/Joan_Barry_publ-300x244.jpg 300w" height="570" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="700"><noscript data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378871" src="https://www.factinate.com/wp-content/uploads/2018/03/Joan_Barry_publ.jpg" alt="Charlie Chaplin Facts" width="700" height="570" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Joan_Barry_publ.jpg 700w, https://www.factinate.com/wp-content/uploads/2018/03/Joan_Barry_publ-300x244.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3025"><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.m.wikipedia.org/wiki/%3AJoan_Barry_publ.jpg"><span data-dcnode-id="3027" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="3022" instrument_node="">
</span><h2 data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">13. Public Enemy No. 1</span></h2><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3014"><span data-dcnode-id="3018" instrument_node="">After her child, a daughter named Carol Ann, was born, Barry sued Chaplin for parental support. The move ignited a frenzy in the papers about Chaplin’s moral depravity and degradation. </span><strong data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">But when the trial started, the real horror began</span></strong><span data-dcnode-id="3015" instrument_node="">. Chaplin’s lawyers used blood-type evidence to prove that he wasn’t the father. However, the tests were inadmissible at the time, and Barry won the suit. Chaplin had to pay $75 every week until Barry’s child turned 21—even though Carol Ann wasn’t his daughter.</span></p><span data-dcnode-id="3013" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3005" style="width: 1840px"><div class="media-credit-container alignnone" data-dcnode-id="3006" style="width: 1840px"><img alt="Charlie Chaplin Facts" class="lazy-hidden size-full wp-image-378875" data-dcnode-id="3012" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-1024x858.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-768x643.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-1536x1287.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-2048x1716.jpg 2048w" height="1541" loading="lazy" sizes="(max-width: 1840px) 100vw, 1840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1840"><noscript data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-378875" src="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-scaled.jpg" alt="Charlie Chaplin Facts" width="1840" height="1541" srcset="https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-scaled.jpg 1840w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-1024x858.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-768x643.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-1536x1287.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/03/GettyImages-104206138-2048x1716.jpg 2048w" sizes="(max-width: 1840px) 100vw, 1840px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3007"><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3009" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="3004" instrument_node="">
</span><h2 data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">14. Storming Into Hollywood</span></h2><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2997"><span data-dcnode-id="3000" instrument_node="">Upon moving to Hollywood from Sweden, Greta Garbo became one of the most beautiful and exciting movie stars of the 1920s and 30s. She was best-known for portraying heroines who were strong-willed and mysterious, much like the actress herself. By the time she retired, “The Swedish Sphinx” had starred in 28 films and become a complete legend, </span><strong data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">but behind the scenes, things weren’t so rosy…</span></strong></p><span data-dcnode-id="2996" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2988" style="width: 2138px"><div class="media-credit-container alignnone" data-dcnode-id="2989" style="width: 2138px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249630" data-dcnode-id="2995" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg 2138w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-300x268.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-768x687.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-1024x916.jpg 1024w" height="1913" loading="lazy" sizes="(max-width: 2138px) 100vw, 2138px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2138"><noscript data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249630" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg" alt="Greta Garbo facts" width="2138" height="1913" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21.jpg 2138w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-300x268.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-768x687.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-21-1024x916.jpg 1024w" sizes="(max-width: 2138px) 100vw, 2138px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2990"><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2992" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2987" instrument_node="">
</span><h2 data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">15. No, No, and No!</span></h2><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2983" instrument_node="">In keeping with her general dislike of the Hollywood life, Garbo never signed autographs, answered fan mail, or gave interviews. She also refused to attend film premieres or awards ceremonies, even turning down an invite to the 1955 Oscars, where she was promised an honorary Oscar. After all, we </span><em data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">are</span></em><span data-dcnode-id="2980" instrument_node=""> talking about the woman who famously said “I want to be alone.”</span></p><span data-dcnode-id="2978" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2970" style="width: 4842px"><div class="media-credit-container alignnone" data-dcnode-id="2971" style="width: 4842px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249629" data-dcnode-id="2977" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751.jpg 4842w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751-1024x801.jpg 1024w" height="3787" loading="lazy" sizes="(max-width: 4842px) 100vw, 4842px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4842"><noscript data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249629" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751.jpg" alt="Greta Garbo facts" width="4842" height="3787" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751.jpg 4842w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-79750751-1024x801.jpg 1024w" sizes="(max-width: 4842px) 100vw, 4842px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2972"><a data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2974" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2969" instrument_node="">
</span><h2 data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">16. Devoted to Diets</span></h2><span data-dcnode-id="2966" instrument_node="">
</span><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">For her entire life, Garbo was always on one diet or another, and she particularly liked fad diets. When she met nutritionist Gayelord Hauser, they hit it off, and she started following his diet. The diet consisted of drinking buttermilk, eating raw yeast, vegetables, nuts, and yogurt. While most of Garbo’s glamorous life fills me with envy, that weird diet’s all hers.</span></p><span data-dcnode-id="2963" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2955" style="width: 2121px"><div class="media-credit-container alignnone" data-dcnode-id="2956" style="width: 2121px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249692" data-dcnode-id="2962" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158.jpg 2121w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-360x240.jpg 360w" height="1414" loading="lazy" sizes="(max-width: 2121px) 100vw, 2121px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2121"><noscript data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249692" src="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158.jpg" alt="Greta Garbo facts" width="2121" height="1414" srcset="https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158.jpg 2121w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/GettyImages-842029158-360x240.jpg 360w" sizes="(max-width: 2121px) 100vw, 2121px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2957"><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2959" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2954" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="2953" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF3" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF4"></div><h2 data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">17. Where’s Greta?</span></h2><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2945"><span data-dcnode-id="2949" instrument_node="">In her later years, </span><strong data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Garbo was almost as elusive as Waldo.</span></strong><span data-dcnode-id="2946" instrument_node=""> She loved going out for walks and would wear men’s pants, sunglasses, and big hats when she did, but she wasn’t totally unrecognizable. New Yorkers got a real kick out of spotting and recognizing her through her disguises.</span></p><span data-dcnode-id="2944" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2936" style="width: 2205px"><div class="media-credit-container alignnone" data-dcnode-id="2937" style="width: 2205px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249770" data-dcnode-id="2943" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2.jpg 2205w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2-768x574.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2-1024x765.jpg 1024w" height="1647" loading="lazy" sizes="(max-width: 2205px) 100vw, 2205px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2205"><noscript data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249770" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2.jpg" alt="Greta Garbo facts" width="2205" height="1647" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2.jpg 2205w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2-768x574.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-17-2-1024x765.jpg 1024w" sizes="(max-width: 2205px) 100vw, 2205px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2938"><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2940" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2935" instrument_node="">
</span><h2 data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">18. I Said Cut!</span></h2><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2931" instrument_node="">During the filming of </span><em data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Grand Hotel</span></em><span data-dcnode-id="2928" instrument_node="">, Garbo got so caught up in a romantic scene with John Barrymore that she continued kissing him for a full three minutes after the director yelled cut. Hot!</span></p><span data-dcnode-id="2926" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2918" style="width: 1487px"><div class="media-credit-container alignnone" data-dcnode-id="2919" style="width: 1487px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249728" data-dcnode-id="2925" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5.jpg 1487w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5-300x259.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5-768x664.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5-1024x886.jpg 1024w" height="1286" loading="lazy" sizes="(max-width: 1487px) 100vw, 1487px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1487"><noscript data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249728" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5.jpg" alt="Greta Garbo facts" width="1487" height="1286" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5.jpg 1487w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5-300x259.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5-768x664.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-11-5-1024x886.jpg 1024w" sizes="(max-width: 1487px) 100vw, 1487px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2920"><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Fichier%3AGreta_Garbo_John_Barrymore_Grand_Hotel_still.jpg"><span data-dcnode-id="2922" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2917" instrument_node="">
</span><h2 data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">19. Garbo the Spy</span></h2><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2913" instrument_node="">During WWII, </span><strong data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Garbo allegedly assisted the British Secret Intelligence Service</span></strong><span data-dcnode-id="2910" instrument_node=""> by secretly collecting information about Nazi sympathizers in Sweden. She also supposedly transmitted messages back and forth between the British agents and the King of Sweden.</span></p><span data-dcnode-id="2908" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2900" style="width: 3200px"><div class="media-credit-container alignnone" data-dcnode-id="2901" style="width: 3200px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249739" data-dcnode-id="2907" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376.jpg 3200w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-360x240.jpg 360w" height="2134" loading="lazy" sizes="(max-width: 3200px) 100vw, 3200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3200"><noscript data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249739" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376.jpg" alt="Greta Garbo facts" width="3200" height="2134" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376.jpg 3200w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_1064830376-360x240.jpg 360w" sizes="(max-width: 3200px) 100vw, 3200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2902"><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2904" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2899" instrument_node="">
</span><h2 data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">20. The Feeling’s Not Mutual</span></h2><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2895" instrument_node="">While Hitler adored Garbo, she did not return the feeling. She allegedly wanted to meet Hitler in person to try and convince him to stop the war. </span><strong data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">She also had a devious backup plan</span></strong><span data-dcnode-id="2892" instrument_node=""> just in case her personality alone couldn’t do it. As she mused to her friend Sam Green, “I would have taken a gun out of my purse and shot him, because I’m the only person who would not have been searched.”</span></p><span data-dcnode-id="2890" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2882" style="width: 2891px"><div class="media-credit-container alignnone" data-dcnode-id="2883" style="width: 2891px"><img alt="king kong facts" class="lazy-hidden size-full wp-image-237414" data-dcnode-id="2889" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097.jpg 2891w, https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097-768x591.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097-1024x788.jpg 1024w" height="2226" loading="lazy" sizes="(max-width: 2891px) 100vw, 2891px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2891"><noscript data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-237414" src="https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097.jpg" alt="king kong facts" width="2891" height="2226" srcset="https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097.jpg 2891w, https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097-768x591.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/03/GettyImages-3277097-1024x788.jpg 1024w" sizes="(max-width: 2891px) 100vw, 2891px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2884"><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2886" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2881" instrument_node="">
</span><h2 data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">21. She Speaks!</span></h2><span data-dcnode-id="2878" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">As Hollywood began to usher in the era of the “talkies,” many silent film stars failed to make the transition, and MGM was understandably desperate to keep their biggest star out of them for as long as possible. When they couldn’t hold out any longer, they made a pretty big deal about it, and structured an ad campaign around the tag line “Garbo Talks!”</span></p><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2870"><span data-dcnode-id="2874" instrument_node="">Luckily for them, audiences were immediately enchanted with Garbo’s voice, and her first talkie </span><em data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Anna Christie</span></em><span data-dcnode-id="2871" instrument_node=""> earned Garbo her first Oscar nomination.</span></p><span data-dcnode-id="2869" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2861" style="width: 940px"><div class="media-credit-container alignnone" data-dcnode-id="2862" style="width: 940px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249633" data-dcnode-id="2868" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler.jpg 940w, https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler-768x588.jpg 768w" height="720" loading="lazy" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="940"><noscript data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249633" src="https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler.jpg" alt="Greta Garbo facts" width="940" height="720" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler.jpg 940w, https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Anna-Christie-Garbo-Dressler-768x588.jpg 768w" sizes="(max-width: 940px) 100vw, 940px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2863"><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Datei%3AAnna-Christie-Garbo-Dressler.jpg"><span data-dcnode-id="2865" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2860" instrument_node="">
</span><h2 data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">22. Royal Refusal</span></h2><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2856" instrument_node="">According to her </span><em data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Los Angeles Times</span></em><span data-dcnode-id="2853" instrument_node=""> obituary, MGM once arranged for Garbo to have lunch with Prince Wilhelm of Sweden, but </span><strong data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">she turned him down with one of the most epic rejection lines in history</span></strong><span data-dcnode-id="2850" instrument_node="">, saying “Thank you. I’m not hungry.” Ouch.</span></p><span data-dcnode-id="2848" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2840" style="width: 2128px"><div class="media-credit-container alignnone" data-dcnode-id="2841" style="width: 2128px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249701" data-dcnode-id="2847" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5.jpg 2128w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5-300x263.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5-768x674.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5-1024x899.jpg 1024w" height="1868" loading="lazy" sizes="(max-width: 2128px) 100vw, 2128px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2128"><noscript data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249701" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5.jpg" alt="Greta Garbo facts" width="2128" height="1868" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5.jpg 2128w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5-300x263.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5-768x674.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-8-5-1024x899.jpg 1024w" sizes="(max-width: 2128px) 100vw, 2128px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2842"><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2844" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2839" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="2838" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF4" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF5"></div><h2 data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">23. Mutual Dislike</span></h2><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2834" instrument_node="">Clark Gable was a rising star known for his looks, and he was frequently tapped to star with some of the most beautiful women in Hollywood, including Greta Garbo. On screen, they played well together and their one film </span><em data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Susan Lenox</span></em><span data-dcnode-id="2831" instrument_node=""> was a hit. Off screen, however, they allegedly disliked each other immensely. She thought his acting was “wooden,” and he thought she was a “stuck up snob.”</span></p><span data-dcnode-id="2829" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2821" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2822" style="width: 800px"><img alt="Greta Garbo facts" class="lazy-hidden size-full wp-image-249664" data-dcnode-id="2828" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-9.jpg" height="786" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="800"><noscript data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249664" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-9.jpg" alt="Greta Garbo facts" width="800" height="786" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2823"><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/kndynt2099/5739972950"><span data-dcnode-id="2825" instrument_node="">Flickr, Dennis Amith</span></a></span></div></figure><span data-dcnode-id="2820" instrument_node="">
</span><h2 data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">24. Double Loss</span></h2><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2816" instrument_node="">Garbo became a massive star after she made the jump from Europe to the US, </span><strong data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">but few people knew about the tragic life she was leaving behind.</span></strong><span data-dcnode-id="2813" instrument_node=""> When she was young, she suffered the loss of two close family members in less than a decade. When she was 14, her father died of nephritis (inflammation of the kidneys), and then just seven years later, her sister died of lymphatic cancer.</span></p><span data-dcnode-id="2811" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2803" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="2804" style="width: 1000px"><img alt="Johann Sebastian Bach Facts" class="lazy-hidden size-full wp-image-244468" data-dcnode-id="2810" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-244468" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg" alt="Johann Sebastian Bach Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_330408701-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2805"><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="2807" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="2802" instrument_node="">
</span><h2 data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">25. Playing it Up</span></h2><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2798" instrument_node="">The supposed true love of Garbo’s life was silent film actor John Gilbert, with whom she starred in several films. But sadly, marriage just wasn’t in the cards for the pair. He proposed several times, finally getting her to agree to a double wedding with King Vidor and actress Eleanor Boardman. On the day of the wedding, however, </span><strong data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">she betrayed him with a heartbreaking gesture.</span></strong><span data-dcnode-id="2795" instrument_node=""> Garbo left him at the altar.</span></p><span data-dcnode-id="2793" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2785" style="width: 861px"><div class="media-credit-container alignnone" data-dcnode-id="2786" style="width: 861px"><img alt="Greta Garbo facts" class="lazy-hidden wp-image-249675 size-full" data-dcnode-id="2792" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8.jpg 861w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8-768x636.jpg 768w" height="713" loading="lazy" sizes="(max-width: 861px) 100vw, 861px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="861"><noscript data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">&lt;img loading="lazy" class="wp-image-249675 size-full" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8.jpg" alt="Greta Garbo facts" width="861" height="713" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8.jpg 861w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-8-768x636.jpg 768w" sizes="(max-width: 861px) 100vw, 861px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2787"><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGarbo_-_Gilbert_-_publicity.jpg"><span data-dcnode-id="2789" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2784" instrument_node="">
</span><h2 data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">26. The Great Stone Face</span></h2><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2776"><span data-dcnode-id="2780" instrument_node="">In Hollywood’s silent era, few people were as successful and memorable as Buster Keaton. Known for his deadpan expression, this multifaceted man spent the 1920s ruling the silver screen with death-defying stunts that inspired Harry Houdini and Jackie Chan. While Keaton rose to fame with comedies, when the camera wasn’t rolling, </span><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">his life wasn’t so full of laughs.</span></strong><span data-dcnode-id="2777" instrument_node=""> From his painful career slump to his romantic pains, Buster Keaton defined Hollywood drama.</span></p><span data-dcnode-id="2775" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2767" style="width: 2208px"><div class="media-credit-container alignnone" data-dcnode-id="2768" style="width: 2208px"><img alt="Buster Keaton facts" class="lazy-hidden size-full wp-image-342325" data-dcnode-id="2774" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652.jpg 2208w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652-768x605.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652-1024x807.jpg 1024w" height="1740" loading="lazy" sizes="(max-width: 2208px) 100vw, 2208px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2208"><noscript data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-342325" src="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652.jpg" alt="Buster Keaton facts" width="2208" height="1740" srcset="https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652.jpg 2208w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652-768x605.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/09/GettyImages-3306652-1024x807.jpg 1024w" sizes="(max-width: 2208px) 100vw, 2208px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2769"><a data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2771" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2766" instrument_node="">
</span><h2 data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">27. That was Real?!</span></h2><span data-dcnode-id="2763" instrument_node="">
