gin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4408" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4409" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4410" instrument_node="">Thou shalt not use a computer to harm other people.</span></span></li><li class="q-relative" data-dcnode-id="4405" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4406" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4407" instrument_node="">Thou shalt not interfere with other people's computer work.</span></span></li><li class="q-relative" data-dcnode-id="4402" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4403" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4404" instrument_node="">Thou shalt not snoop around in other people's computer files.</span></span></li><li class="q-relative" data-dcnode-id="4399" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4400" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4401" instrument_node="">Thou shalt not use a computer to steal.</span></span></li><li class="q-relative" data-dcnode-id="4396" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4397" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4398" instrument_node="">Thou shalt not use a computer to bear false witness.</span></span></li><li class="q-relative" data-dcnode-id="4393" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4394" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4395" instrument_node="">Thou shalt not copy or use proprietary software for which you have not paid (without permission).</span></span></li><li class="q-relative" data-dcnode-id="4390" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4391" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4392" instrument_node="">Thou shalt not use other people's computer resources without authorization or proper compensation.</span></span></li><li class="q-relative" data-dcnode-id="4387" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4388" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4389" instrument_node="">Thou shalt not appropriate other people's intellectual output.</span></span></li><li class="q-relative" data-dcnode-id="4384" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4385" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4386" instrument_node="">Thou shalt think about the social consequences of the program you are writing or the system you are designing.</span></span></li><li class="q-relative" data-dcnode-id="4374" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4382" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4383" instrument_node="">Thou shalt always use a computer in ways that ensure consideration and respect for other humans.</span></span><span class="q-inline" data-dcnode-id="4375" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.m.wikipedia.org/wiki/Ten_Commandments_of_Computer_Ethics%23cite_note-8" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.m.wikipedia.org"><span data-dcnode-id="4381" instrument_node="">[8]</span></a><span class="q-inlineBlock" data-dcnode-id="4376" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4377"><svg data-dcnode-id="4378" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4379" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4370" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4371" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4372" instrument_node="">Exegesis</span></span></p><ul class="q-box" data-dcnode-id="4339" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4367" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4368" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4369" instrument_node="">Commandment 1Simply put: Do not use the computer in ways that may harm other people.Explanation: This commandment says that it is unethical to use a computer to harm another user. It is not limited to physical injury. It includes harming or corrupting other users' data or files. The commandment states that it is wrong to use a computer to steal someone's personal information. Manipulating or destroying files of other users is ethically wrong. It is unethical to write programs, which on execution lead to stealing, copying or gaining unauthorized access to other users' data. Being involved in practices like hacking, spamming, phishing or cyber bullying does not conform to computer ethics.</span></span></li><li class="q-relative" data-dcnode-id="4364" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4365" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4366" instrument_node="">Commandment 2Simply put: Do not use computer technology to cause interference in other users' work.Explanation: Computer software can be used in ways that disturb other users or disrupt their work. Viruses, for example, are programs meant to harm useful computer programs or interfere with the normal functioning of a computer. Malicious software can disrupt the functioning of computers in more ways than one. It may overload computer memory through excessive consumption of computer resources, thus slowing its functioning. It may cause a computer to function wrongly or even stop working. Using malicious software to attack a computer is unethical.</span></span></li><li class="q-relative" data-dcnode-id="4361" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4362" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4363" instrument_node="">Commandment 3Simply put: Do not spy on another person's computer data.Explanation: We know it is wrong to read someone's personal letters. On the same lines, it is wrong to read someone else's email messages or files. Obtaining data from another person's private files is nothing less than breaking into someone's room. Snooping around in another person's files or reading someone else's personal messages is the invasion of his privacy. There are exceptions to this. For example, spying is necessary and cannot be called unethical when it is done against illegitimate use of computers. For example, intelligence agencies working on cybercrime cases need to spy on the internet activity of suspects.</span></span></li><li class="q-relative" data-dcnode-id="4358" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4359" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4360" instrument_node="">Commandment 4Simply put: Do not use computer technology to steal information.Explanation: Stealing sensitive information or leaking confidential information is as good as robbery. It is wrong to acquire personal information of employees from an employee database or patient history from a hospital database or other such information that is meant to be confidential. Similarly, breaking into a bank account to collect information about the account or account holder is wrong. Illegal electronic transfer of funds is a type of fraud. With the use of technology, stealing of information is much easier. Computers can be used to store stolen information.</span></span></li><li class="q-relative" data-dcnode-id="4355" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4356" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4357" instrument_node="">Commandment 5Simply put: Do not contribute to the spread of misinformation using computer technology.Explanation: Spread of information has become viral today, because of the Internet. This also means that false news or rumors can spread speedily through social networking sites or emails. Being involved in the circulation of incorrect information is unethical. Mails and pop-ups are commonly used to spread the wrong information or give false alerts with the only intent of selling products. Mails from untrusted sources advertising certain products or spreading some hard-to-believe information, are not uncommon. Direct or indirect involvement in the circulation of false information is ethically wrong. Giving wrong information can hurt other parties or organizations that are affected by that particular theme.</span></span></li><li class="q-relative" data-dcnode-id="4352" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4353" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4354" instrument_node="">Commandment 6Simply put: Refrain from copying software or buying pirated copies. Pay for software unless it is free.Explanation: Like any other artistic or literary work, software is copyrighted. A piece of code is the original work of the individual who created it. It is copyrighted in his/her name. In case of a developer writing software for the organization she works for, the organization holds the copyright for it. Copyright holds true unless its creators announce it is not. Obtaining illegal copies of copyrighted software is unethical and also encourages others to make copies illegally.</span></span></li><li class="q-relative" data-dcnode-id="4349" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4350" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4351" instrument_node="">Commandment 7Simply put: Do not use someone else's computer resources unless authorized to.Explanation: Multi-user systems have user specific passwords. Breaking into some other user's password, thus intruding his/her private space is unethical. It is not ethical to hack passwords for gaining unauthorized access to a password-protected computer system. Accessing data that you are not authorized to access or gaining access to another user's computer without her permission is not ethical.</span></span></li><li class="q-relative" data-dcnode-id="4346" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4347" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4348" instrument_node="">Commandment 8Simply put: It is wrong to claim ownership on a work which is the output of someone else's intellect.Explanation: Programs developed by a software developer are her property. If he is working with an organization, they are the organization's property. Copying them and propagating them in one's own name is unethical. This applies to any creative work, program or design. Establishing ownership on a work which is not yours is ethically wrong.</span></span></li><li class="q-relative" data-dcnode-id="4343" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4344" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4345" instrument_node="">Commandment 9Simply put: Before developing a software, think about the social impact it can have.Explanation: Looking at the social consequences that a program can have, describes a broader perspective of looking at technology. A computer software on release, reaches millions. Software like video games and animations or educational software can have a social impact on their users. When working on animation films or designing video games, for example, it is the programmer's responsibility to understand his target audience/users and the effect it may have on them. For example, a computer game for kids should not have content that can influence them negatively. Similarly, writing malicious software is ethically wrong. A software developer/development firm should consider the influence their code can have on the society at large.</span></span></li><li class="q-relative" data-dcnode-id="4340" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4341" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4342" instrument_node="">Commandment 10Simply put: In using computers for communication, be respectful and courteous with the fellow members.Explanation: The communication etiquette we follow in the real world applies to communication over computers as well. While communicating over the Internet, one should treat others with respect. One should not intrude others' private space, use abusive language, make false statements or pass irresponsible remarks about others. One should be courteous while communicating over the web and should respect others' time and resources. Also, one should be considerate with a novice computer user.</span></span></li></ul></span></span></div><div data-dcnode-id="4335"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="4318" style="box-sizing: border-box;"><span data-dcnode-id="4319"><span class="q-box qu-display--none" data-dcnode-id="4331" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="4328"><span data-dcnode-id="4330" instrument_node="">2.8K</span><span data-dcnode-id="4329" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="4326" style="box-sizing: border-box;"><span data-dcnode-id="4327" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="4323"><div c -block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1180" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1181" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1182" instrument_node="">However it is still significant in my opinion because it primarily presents you with uncomfortable topics within the field that you may never realize that unironically you will more than likely come across in your career that question the morality of the decisions of the technology that you make as well as the career decisions that you decide for yourself.</span></span></p><span data-dcnode-id="1179" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1176" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1177" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1178" instrument_node="">As an example, in my work, briefly for a time I volunteered my services to work on a mobile platform that would engage people to make a social network for individuals to be able to engage in topics that were not appropriate for facebook/twitter, such as racism, mental health, etc. Although I enjoyed working on the project as a developer it helped me to learn a lot about really working for the sake of myself, there were a lot of questionable issues with the project not only as a platform, but from the company as a whole. For starters, as I started to work more on the project I realized that the platform that was seeking to fight against “injustice” was essentially on the cusp of essentially creating an injustice against all of the things we deem are wrong with cancel culture society. While sure, it allows for the space of being able to discuss topics that are within the realm, it also in its nature was bound to also promote the exclusion of others by the nature of their own. Many of the problems I was personally seeing the app for what people wanted it to present was this idea that it was going to be an application that would allow you to be able to discuss these topics within an open space where you would feel safe, however the nature of these topics more often than not tends to cause division, as there are many different ideals for what is the “ethical” choice. No one way is really the right way to think about anything, but my co workers wanted to promote the ideas of a singular truth, instead of promoting the ideas of opening yourself to perspective.</span></span></p><span data-dcnode-id="1175" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1172" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1173" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1174" instrument_node="">Along with this there were problems with the way that this project was handled that now that I’m a little more seasoned made this project doomed to fail from the start. The people looking to make this project only hired inexperienced junior developers, as a means to be able to get the cheapest labor possible with the most naïve work force possible to be able to get work for free essentially to hopefully be able to create this project. After months and delays with inexperience and the fact that none of us were really a great group together, as people have lives together ultimately the project was outsourced over to a team over in Nigeria, which is where I made my decision to leave the project as a whole, due to the above reasons I mentioned as well as other issues that I can’t really go in detail over. Whenever you create software for the sake of the human public, you need to ultimately realize that the software that you create will affect people in real time, some more dramatically than others. If you’re working in the airplane or automobile field, your software has the capability to unironically be the difference that may save or kill people in the long term. Some articles related to really horrible decisions made</span></span></p><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techbeacon.com/app-dev-testing/most-epic-developer-fails-2017-lessons-learned" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="techbeacon.com"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="1152" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="1154" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="1169" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="1171" style="box-sizing: border-box; background-image: url(&quot;https://techbeacon.com/sites/default/files/styles/social/public/field/image/developer-fails.jpg?itok=-MBk3SUq&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="1170" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="1155" style="box-sizing: bor opener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="money.cnn.com"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="1128" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="1130" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="1145" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="1147" style="box-sizing: border-box; background-image: url(&quot;https://i2.cdn.turner.com/money/galleries/2010/technology/1012/gallery.5_data_breaches/images/facebook.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="1146" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="1131" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="1132" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1133" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="1143" style="box-sizing: border-box;"><span data-dcnode-id="1144" instrument_node="">5 data breaches: From embarrassing to deadly</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="1141" style="box-sizing: border-box;"><span data-dcnode-id="1142" instrument_node="">Facebook Beacon remains one of the blackest marks in the history of the social network, which was a mere fledgling when it launched the moneymaking initiative in November 2007. Beacon sucked in data from external websites and posted those activities to a user's wall. The idea was to promote the merchants users chose to shop at. In Facebook's press release about the Beacon launch, which included 44 partners, the company called Beacon "a core element of the Facebook Ads system." But Facebook members found their online purchases posted to their profiles without their consent; they had to choose to opt out. Forrester Research analyst Charlene Li blogged  that her purchase of a coffee table on Overstock.com was added to her Facebook wall without any prior warning. "In the present day, Facebook has set the expectation that things are public," Li told CNNMoney in an interview last week. "But in 2007, we users were under the assumption that we were in control. So it was shocking." A commenter named Will posted on Li's blog: "I purchased a diamond engagement ring set from Overstock in preparation for a New Year's surprise for my girlfriend...Within hours, I received [phone calls of] 'congratulations' for getting engaged.... I learned that Overstock had published the details of my purchase (including a link to the item and its price) on my public Facebook newsfeed, as well as notifications to all of my friends... including my girlfriend." Li says she wasn't able to confirm the story, as Will left no contact information -- but the tale soon spread around the Internet. Then Facebook users started complaining their purchases were posted to their walls even after they explicitly opted out. On November 29, the New York Times quoted a Facebook executive insisting that users were able to opt out of the Beacon program entirely. But that same day, security researcher Stefan Berteau published a note saying he'd found that data was still being collected and sent to Facebook -- even if users had opted out of Beacon and/or were logged out of Facebook. Less than one month after Beacon's launch, Facebook changed Beacon to an opt-in system and added a privacy setting to turn Beacon off completely. Facebook CEO Mark Zuckerberg posted an apology on the company blog: "We've made a lot of mistakes building this feature, but we've made even more with how we've handled them. We simply did a bad job with this release, and I apologize for it." Beacon was the target of a lawsuit filed in 2008, and the service shut down in September 2009.</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="1134" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="1137" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1138"><svg data-dcnode-id="1139" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.77l-1.421 1.418a.256.256 0 0 1-.032.027l-.719-1.217zm-8.784 3.697-.973.969a2.744 2.744 0 0 0-.028 3.881 2.77 2.77 0 0 0 3.909.044l3.31-3.301c.764-.782.987-1.732.651-2.769s-1.083-1.651-2.155-1.871l-.1
