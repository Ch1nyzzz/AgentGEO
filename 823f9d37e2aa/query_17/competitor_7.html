</span><section aria-labelledby="Abs1" data-dcnode-id="1781" data-gtm-vis-first-on-screen-50443292_562="797" data-gtm-vis-first-on-screen-50443292_563="797" data-gtm-vis-polling-id-50443292_562="87" data-gtm-vis-polling-id-50443292_563="90" data-gtm-vis-recent-on-screen-50443292_562="797" data-gtm-vis-recent-on-screen-50443292_563="797" data-gtm-vis-total-visible-time-50443292_562="9600" data-gtm-vis-total-visible-time-50443292_563="9600" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1782" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1819" id="Abs1"><span data-dcnode-id="1820" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1783" id="Abs1-content"><p data-dcnode-id="1814"><span data-dcnode-id="1818" instrument_node="">The Philippines’ mental health situation is an amalgam of its rich pre-colonial history, the influence of Spanish and American colonization and the Filipinos’ subsequent quest for identity and national consciousness. Beliefs attributing illness to changes in the natural environment, witchcraft and sorcery, transgressions of social norms and punishment by environmental spirits and the healing power of the shamans permeated the archipelago even before the colonizers came and continue to persist even up to this day. Spain left its imprint on the country through Roman Catholic teaching and rituals and the introduction of Western medicine and the hospital system. The Americans, on the other hand, introduced Protestantism, which had its own impact on the understanding of mental health, and reoriented the health-care system with the introduction of private institutions and the establishment of a system of health professional training based on that of the United States of America. In the 1970s, </span><i data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Sikolohiyang Pilipino</span></i><span data-dcnode-id="1815" instrument_node=""> (Filipino psychology) emerged and sought to probe into indigenous concepts and descriptions of personality and mental health at about the same time as when the country was put under an oppressive martial law regime that was ended by the 1986 EDSA People Power revolution. The earliest formal and institutionalized mental health services in the country were provided by the Hospicio de San Jose, a mental health asylum established in the mid-nineteenth century. Since then, the predominant system of mental health care has been mental hospital-based. A National Mental Health Program (NMHP) was set up post-1986 revolution to reevaluate the mental health situation and services in the country. Through the years, the NMHP met serious challenges in its implementation with the dearth of epidemiologic data on mental health, serious financial and human resources limitations, low government prioritization and the absence of a dedicated mental health law in the country. Despite being few and sometimes isolated, efforts to deinstitutionalize mental health care and bring programs to communities and special population groups, like migrant workers, have been documented. Among prevailing and emerging mental health issues in the Philippines at present are: (1) the inadequacy of work around the indigenous concepts of mental health; (2) disparities in mental health practices and care due to multiculturalism and economic differences; (3) the effects of the Overseas Filipino Worker phenomenon especially to families; (4) the gap between Western-trained professionals and popular culture; (5) the continuing predominance of custodial and isolated care; (6) mental health care in disasters; and (7) the need for reorientation of the teaching and practice of psychiatry. Psychiatry in the Philippines needs to face up to many old challenges as well as new ones. Filipino psychiatrists will need to take on multiple roles in relation to these challenges, not just as clinicians but also as community trainers, advocates, researchers, leaders and civil servants, with a sensitivity to culture and history.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="1784"><li class="c-article-subject-list__subject" data-dcnode-id="1809"><span data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Pre-colonial history</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1806"><span data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Colonization</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1803"><span data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Cultural and indigenous concepts of mental illness</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1800"><span data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Western medicine</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1797"><span data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Mental institutions and hospitals</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1794"><span data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Deinstitutionalization</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1791"><span data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Filipino psychology</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1788"><span data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Mental health and disasters</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="1785"><span data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Teaching and practice of psychiatry</span></span></li></ul></div></div></section><span data-dcnode-id="1780" instrument_node="">

</span><section data-dcnode-id="1690" data-gtm-vis-first-on-screen-50443292_562="797" data-gtm-vis-first-on-screen-50443292_563="797" data-gtm-vis-polling-id-50443292_562="88" data-gtm-vis-polling-id-50443292_563="91" data-gtm-vis-recent-on-screen-50443292_562="797" data-gtm-vis-recent-on-screen-50443292_563="797" data-gtm-vis-total-visible-time-50443292_562="9600" data-gtm-vis-total-visible-time-50443292_563="9600" data-title="Historical and Cultural Milieu"><div class="c-article-section" data-dcnode-id="1691" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1763" id="Sec1"><span data-dcnode-id="1764" instrument_node="">Historical and Cultural Milieu</span></h2><div class="c-article-section__content" data-dcnode-id="1692" id="Sec1-content"><p data-dcnode-id="1755"><span data-dcnode-id="1762" instrument_node="">The Philippines is often described as having gone through “300&nbsp;years in the convent and 50&nbsp;years in Hollywood,” (Karnow </span><a aria-label="Reference 1990" data-dcnode-id="1760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR01" id="ref-link-section-d27880976e422" title="Karnow, S. (1990). In Our Image: America’s Empire in the Philippines. New York: Ballantine Books."><span data-dcnode-id="1761" instrument_node="">1990</span></a><span data-dcnode-id="1759" instrument_node="">) a reference to its colonial history of about 300&nbsp;years under Spain and 48&nbsp;years under the USA. Such descriptions can lead to an undervaluing of the pre-colonial period, which, from early Spanish chronicles, was already marked by extensive economic and cultural exchanges, within the archipelago as well as with neighboring states. It also presumes a wholesale adoption of culture brought in by Spain and the USA without considering how other external influences interact, in the past and at present, with the local milieu. Particularly important was the introduction of Islam in the fourteenth century. By the time Spanish colonization began in the sixteenth century, Islam had reached Manila in the northern island of Luzon (Majul </span><a aria-label="Reference 1973" data-dcnode-id="1757" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d27880976e425" title="Majul, C. A. (1973). Muslims in the Philippines. Quezon City: Asian Center, University of the Philippines Press."><span data-dcnode-id="1758" instrument_node="">1973</span></a><span data-dcnode-id="1756" instrument_node="">).</span></p><p data-dcnode-id="1747"><span data-dcnode-id="1754" instrument_node="">Scott (</span><a aria-label="Reference 1994" data-dcnode-id="1752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d27880976e431" title="Scott, W. H. (1994). Barangay: Sixteenth century Philippine culture and society. Quezon City: Ateneo de Manila University Press."><span data-dcnode-id="1753" instrument_node="">1994</span></a><span data-dcnode-id="1751" instrument_node="">) and Reid (</span><a aria-label="Reference 1988" data-dcnode-id="1749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d27880976e434" title="Reid, A. (1988). Southeast Asia in the age of commerce 1450–1680 volume one: The Lands Below the Winds. New Haven: New Haven Yale University Press."><span data-dcnode-id="1750" instrument_node="">1988</span></a><span data-dcnode-id="1748" instrument_node="">) both present a summary of the pre-colonial situation of the Philippines that includes glimpses into the health situation, as well as concepts around health and illness with great similarities across cultures. These include attributions of illness to changes in the natural environment, witchcraft and sorcery, transgressions of social norms and punishment by environmental spirits.</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1746" instrument_node="">One of the most comprehensive accounts of life in the Philippines during the period of contact with Spanish colonialism appears in a seventeenth century account by Alcina (</span><a aria-label="Reference 1668" data-dcnode-id="1744" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d27880976e440" title="Alcina, F. I. (1668, 2005). History of the Bisayan people in the Philippine Islands: Evangelization and culture at the contact period. Book 1, Part 3, Vol. III. (Trans. and Ed. by Kobak, C.J. and Gutierrez, L.). Manila: UST Publishing House."><span data-dcnode-id="1745" instrument_node="">1668</span></a><span data-dcnode-id="1743" instrument_node="">, </span><a aria-label="Reference 2005" data-dcnode-id="1741" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d27880976e443" title="Alcina, F. I. (1668, 2005). History of the Bisayan people in the Philippine Islands: Evangelization and culture at the contact period. Book 1, Part 3, Vol. III. (Trans. and Ed. by Kobak, C.J. and Gutierrez, L.). Manila: UST Publishing House."><span data-dcnode-id="1742" instrument_node="">2005</span></a><span data-dcnode-id="1740" instrument_node="">) a Spanish Jesuit friar. It includes several descriptions of “locura o furor” (madness or rage), using local terms and attributing the illnesses to demonic possession in concurrence with the native perspectives. He describes how these illnesses were treated by healers, some of whom were said to have suffered from these mental illnesses and became healers after they had recovered. Such healers are referred to by anthropologists as shamans who treat illnesses by going into a trance and who claim to be able to communicate with the supernatural during this altered state of consciousness.</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node="">We get another glimpse into mental health in the Philippines in an essay written in 1895 by one of the country’s national heroes, Jose Rizal, who was a physician. His essay “La Curacion de los Hechizados” (The Treatment of the Bewitched) was first intended as advice for the town’s health and welfare inspector. Rizal is contemptuous of local practices, but toward the end of the essay, he also speculates that there may be “autosuggestion” involved and that this might be useful: “Should we find ourselves before a case of autosuggestion we would not hesitate to follow the principle on which the primitive treatment is based.” (Rizal </span><a aria-label="Reference 1895" data-dcnode-id="1736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d27880976e449" title="Rizal, J. (1895, 1964). The treatment of the bewitched. Miscellaneous writings of Dr. Jose Rizal (Vol. 8). Manila: National Heroes Commission."><span data-dcnode-id="1737" instrument_node="">1895</span></a><span data-dcnode-id="1735" instrument_node="">, </span><a aria-label="Reference 1964" data-dcnode-id="1733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d27880976e452" title="Rizal, J. (1895, 1964). The treatment of the bewitched. Miscellaneous writings of Dr. Jose Rizal (Vol. 8). Manila: National Heroes Commission."><span data-dcnode-id="1734" instrument_node="">1964</span></a><span data-dcnode-id="1732" instrument_node="">).</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Many of the rituals and traditional healers described by Alcina, other Spanish chroniclers, and Rizal continue to exist today in different parts of the country and in both rural and urban areas, Christian or Muslim.</span></p><p data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">Colonialism did leave its imprint on the Philippines, with Spanish culture, mainly through Roman Catholicism, blending in with pre-colonial religious beliefs and practices. Veneration of images and religious processions, for example, continue to remain an integral part of popular medicine; churches still draw hundreds of devotees each day, many appealing to religious images for recovery from illnesses. The Spaniards also introduced Western medicine, establishing a medical school and a nationwide network of hospitals, administered by the religious (Tiglao and Cruz </span><a aria-label="Reference 1975" data-dcnode-id="1726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR02" id="ref-link-section-d27880976e462" title="Tiglao, T. &amp; Cruz, W. (1975). Seven decades of public in the Philippines: 1892–1972. Tokyo: SEAMIC Center."><span data-dcnode-id="1727" instrument_node="">1975</span></a><span data-dcnode-id="1725" instrument_node="">).</span></p><p data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">The Americans occupied the Philippines from 1898 to 1946. While Roman Catholicism remained the majority religion, the Americans introduced Protestantism, including many evangelical sects that have had their own impact on the understanding of mental health. The Americans reoriented the health-care system with the introduction of private institutions. They also established a system of health professional training based on that of the USA. Despite their attempts to introduce “scientific” medicine, many of the indigenous beliefs and practices persisted. Anderson (</span><a aria-label="Reference 2006" data-dcnode-id="1721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d27880976e468" title="Anderson, W. (2006). Colonial pathologies: American medicine, race and tropical hygiene in the Philippines. Durham, North Carolina: Duke University Press."><span data-dcnode-id="1722" instrument_node="">2006</span></a><span data-dcnode-id="1720" instrument_node="">) describes resistance to western medicine for many different reasons ranging from its association with colonialism to a perception that local medicine was more effective or at least had greater explanatory power. This was probably the case for mental illnesses for which religious explanations, such as possession or witchcraft, seemed more convincing.</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1718" instrument_node="">In the 1970s, Filipino psychology professor Virgilio Enriquez (</span><a aria-label="Reference 1992" data-dcnode-id="1716" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d27880976e474" title="Enriquez, V. (1992). From colonial to liberation psychology: The Philippine experience. Quezon City: University of the Philippines Press."><span data-dcnode-id="1717" instrument_node="">1992</span></a><span data-dcnode-id="1715" instrument_node="">) developed </span><i data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Sikolohiyang Pilipino</span></i><span data-dcnode-id="1712" instrument_node=""> (Filipino psychology), which sought to probe into indigenous concepts and descriptions of personality and mental health. Converging with the work of Salazar (</span><a aria-label="Reference 1977" data-dcnode-id="1710" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d27880976e480" title="Salazar, Z. (1977). Ang Kamalayan at Kaluluwa: Isang Paglilinaw ng Ilang Konsepto sa Kinagisnang Sikolohiya. Paper presented at the “Ikalawang Pambansang Kumperensiya sa Sikolohiyang Pilipino”."><span data-dcnode-id="1711" instrument_node="">1977</span></a><span data-dcnode-id="1709" instrument_node="">) on </span><i data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">ginhawa</span></i><span data-dcnode-id="1706" instrument_node=""> (loosely translated, the term denotes well-being), </span><i data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Sikolohiyang Pilipino</span></i><span data-dcnode-id="1703" instrument_node=""> spurred interest in situating mental health within Filipino culture (or cultures). It also highlighted the quest for identity and national consciousness and articulated Filipino values such as </span><i data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">kalayaaan</span></i><span data-dcnode-id="1700" instrument_node=""> (freedom), </span><i data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">pagkakaisa</span></i><span data-dcnode-id="1697" instrument_node=""> (unity or consensus) and </span><i data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">kapayapaan</span></i><span data-dcnode-id="1694" instrument_node=""> (peace). This was about the same time as when the country was put under an oppressive martial law regime that was ended by the 1986 EDSA People Power revolution. The restoration of democracy meant greater participation by various sectors in the formulation of government policies including those on mental health.</span></p></div></div></section><section data-dcnode-id="1491" data-gtm-vis-first-on-screen-50443292_562="797" data-gtm-vis-first-on-screen-50443292_563="797" data-gtm-vis-polling-id-50443292_562="89" data-gtm-vis-polling-id-50443292_563="92" data-gtm-vis-recent-on-screen-50443292_562="797" data-gtm-vis-recent-on-screen-50443292_563="797" data-gtm-vis-total-visible-time-50443292_562="9600" data-gtm-vis-total-visible-time-50443292_563="9600" data-title="Mental Health Situation and Services"><div class="c-article-section" data-dcnode-id="1492" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1688" id="Sec2"><span data-dcnode-id="1689" instrument_node="">Mental Health Situation and Services</span></h2><div class="c-article-section__content" data-dcnode-id="1493" id="Sec2-content"><p data-dcnode-id="1683"><span data-dcnode-id="1687" instrument_node="">The earliest epidemiological data on mental health available were statistics of patients admitted to the Hospicio de San Jose. A total of 741 patients were documented from 1865 to 1898, mostly men, and the majority were diagnosed with “demente,” an encompassing term for any mental disorder or abnormality in behavior. The Hospicio de San Jose, established in the mid-nineteenth century, is known to be the first mental asylum in the country. Treatment followed the European model. With the increase in the number of patients, those who were violent or had committed criminal acts were placed in prisons. These arrangements became an alternative to the predominant practice of consulting with shamans for healing rituals or Catholic priests for exorcism (Paular </span><a aria-label="Reference 1991" data-dcnode-id="1685" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR03" id="ref-link-section-d27880976e507" title="Paular, R. (1991). Mental illness in the Spanish Colonial Period: 1865–1898. Philippine Studies, 39(4), 525–533"><span data-dcnode-id="1686" instrument_node="">1991</span></a><span data-dcnode-id="1684" instrument_node="">).</span></p><p data-dcnode-id="1672"><span data-dcnode-id="1682" instrument_node="">From the 1900s to the present, the predominant system of mental health care has been mental hospital-based. As earlier mentioned, however, there was the post-1986 revolution reevaluation of the mental health situation, especially in concepts and services that led to the organization of a National Mental Health Program (NMHP). Initially a task force on mental health was formed to formulate a NMHP with the objective of generating the shift from the predominantly mental hospital-based services to a community-based mental health-care system and integrating mental health within the total health system (Salazar-Aleta </span><a aria-label="Reference 1999" data-dcnode-id="1680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR04" id="ref-link-section-d27880976e513" title="Salazar-Aleta, M.C. (1999). Historical development of the mental health services. The Philippine Journal of Psychiatry, 23(2), 18–23."><span data-dcnode-id="1681" instrument_node="">1999</span></a><span data-dcnode-id="1679" instrument_node="">). Despite serious limitations in running the NMHP and low government prioritization, a national mental health policy was formulated in 2001. The policy served as a framework for developing mental health services in the absence of a dedicated mental health legislation (Conde </span><a aria-label="Reference 2004" data-dcnode-id="1677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR05" id="ref-link-section-d27880976e516" title="Conde, B. (2004). Philippines mental health country profile. International Review of Psychiatry, 16(1–2), 159–166."><span data-dcnode-id="1678" instrument_node="">2004</span></a><span data-dcnode-id="1676" instrument_node="">). Some legal provisions pertaining to mental health are currently contained in other laws, and the Philippine Mental Health Act of 2014 has been recently filed in the senate (Senate of the Philippines </span><a aria-label="Reference 2014" data-dcnode-id="1674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR06" id="ref-link-section-d27880976e519" title="Senate of the Philippines. (2014). An act promoting mental health, promulgating a national mental health policy towards the enhancement of integrated mental health services, protection of persons utilizing mental health services and establishment of a Philippine mental health council, S.B. 2450. Manila: Senate of the Philippines."><span data-dcnode-id="1675" instrument_node="">2014</span></a><span data-dcnode-id="1673" instrument_node="">). The NMHP also brought together stakeholders from government, non-government and academic groups, including returning psychiatrists and other mental health professionals trained overseas, for a fruitful collaboration. The landscape of mental health has slowly evolved to be more responsive to the country’s needs, though at times it is still hampered by the bureaucratic structure of government agencies and subject to political maneuvers.</span></p><p data-dcnode-id="1667"><span data-dcnode-id="1671" instrument_node="">The current NMHP, as revised in 2013–2014 (Department of Health, Philippines </span><a aria-label="Reference 2014" data-dcnode-id="1669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d27880976e525" title="Department of Health, Philippines. (2014). Draft of the integrated national framework of action on mental health aligned to kalusugan pangkalahatan. (Further Amendment to Administrative Order 2007-0009), Manila, Unpublished."><span data-dcnode-id="1670" instrument_node="">2014</span></a><span data-dcnode-id="1668" instrument_node="">), includes the following priority mental health concerns:</span></p><ol class="u-list-style-none" data-dcnode-id="1611"><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1665" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">1.</span></span><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Promotion of mental health and well-being</span></p><span data-dcnode-id="1659" instrument_node="">
</span></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1649"><span data-dcnode-id="1656" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">2.</span></span><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Program to address extreme life experiences</span></p><span data-dcnode-id="1650" instrument_node="">
</span></li><span data-dcnode-id="1648" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1647" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">3.</span></span><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Program for the treatment and rehabilitation from mental disorders</span></p><span data-dcnode-id="1641" instrument_node="">
</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1631"><span data-dcnode-id="1638" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">4.</span></span><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Prevention and rehabilitation from substance use disorders</span></p><span data-dcnode-id="1632" instrument_node="">
</span></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1622"><span data-dcnode-id="1629" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">5.</span></span><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Community mental health programs</span></p><span data-dcnode-id="1623" instrument_node="">
</span></li><span data-dcnode-id="1621" instrument_node="">

</span><span class="u-custom-list-number" data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">6.</span></span><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Program on the mental health information system.</span></p><span data-dcnode-id="1614" instrument_node="">
</span></li><span data-dcnode-id="1612" instrument_node="">
</span></ol><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">This framework addresses the mental health situation in the country not just by treating disorders but also by promoting healthy mental practices and a holistic lifestyle, enhancing coping strategies and managing stress, especially during extreme life experiences such as disasters and other traumas. It also responds to the evolving targets of psychiatry and mental health program development. Unfortunately, most of the existing government programs have still been centered on diagnosing and treating mental disorders.</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1607" instrument_node="">There are few prevalence studies on the different psychiatric disorders in the general population. A local baseline survey in 1964–1967 in Sta. Cruz, Lubao, Pampanga by the Department of Health Division of Mental Hygiene found that the prevalence of mental disorders was 36 per 1000 population (Department of Health, Philippines </span><a aria-label="Reference 2011b" data-dcnode-id="1605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR024" id="ref-link-section-d27880976e605" title="Department of Health, Philippines. (2011b, October). Woeful Suicide. Retrieved March 1, 2015, from 
                  http://portal.doh.gov.ph/content/woeful-suicide.html
                  
                
        "><span data-dcnode-id="1606" instrument_node="">2011b</span></a><span data-dcnode-id="1604" instrument_node="">, October). Then, the pioneering, seven-nation, World Health Organization (WHO) Collaborative Studies for Extending Mental Health Care in General Health Care Services in 1980, conducted in three primary health centers in an urban slum in Manila, revealed that 17% of adults and 15.67% of children had mental disorders (Climent et al. </span><a aria-label="Reference 1980" data-dcnode-id="1602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR07" id="ref-link-section-d27880976e608" title="Climent, C.E., Diop, B.S., Harding, T.W., Ibrahim, H.H., Ladrido-Ignacio, L &amp; Wig, N.N. (1980). Mental Health in Primary Health Care. World Health Organization Chronicle, 34(6), 231–236."><span data-dcnode-id="1603" instrument_node="">1980</span></a><span data-dcnode-id="1601" instrument_node="">; Harding et al. </span><a aria-label="Reference 1980" data-dcnode-id="1599" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR08" id="ref-link-section-d27880976e611" title="Harding, T.W., De Arango, M.V., Baltazar, J., Climent, C., Ibrahim, H.A., Ignacio, L.L. &amp; Wig, N.N. (1980). Mental disorders in primary health care, a study of their frequency and diagnosis in four developing countries. Psychological Medicine, 10(2), 221–341"><span data-dcnode-id="1600" instrument_node="">1980</span></a><span data-dcnode-id="1598" instrument_node="">; Ignacio </span><a aria-label="Reference 1984" data-dcnode-id="1596" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR09" id="ref-link-section-d27880976e614" title="	Ignacio, L.L. (1984). Mental health in primary health care. Philippine Journal of Psychiatry, 11(2), 2–3."><span data-dcnode-id="1597" instrument_node="">1984</span></a><span data-dcnode-id="1595" instrument_node="">). In 1993–1994, a population survey of mental disorders in both urban and rural settings in three provinces in the Western Visayas region was conducted by the University of the Philippines Psychiatrists Foundation Inc. in collaboration with the regional health office (Council on Health Research for Development </span><a aria-label="Reference 1997" data-dcnode-id="1593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR010" id="ref-link-section-d27880976e617" title="Council on Health Research for Development (COHRED). (1997). Essential national health research in the Philippines: The first five years 1991–1996. Geneva: COHRED."><span data-dcnode-id="1594" instrument_node="">1997</span></a><span data-dcnode-id="1592" instrument_node="">). Table&nbsp;</span><a data-dcnode-id="1590" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1591" instrument_node="">11.1</span></a><span data-dcnode-id="1589" instrument_node=""> lists the prevalence rates of the most frequent diagnoses among children and adults in the study.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1570" data-test="inline-table" id="table-1"><figure data-dcnode-id="1571"><figcaption class="c-article-table__figcaption" data-dcnode-id="1582"><b data-dcnode-id="1583" data-test="table-caption" id="Tab1"><span data-dcnode-id="1587" instrument_node="">Table&nbsp;11.1 Most frequent diagnoses seen among adults and children in Western Visayas in 1993–1994 (Council on Health Research for Development </span><a aria-label="Reference 1997" data-dcnode-id="1585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR010" id="ref-link-section-d27880976e634" title="Council on Health Research for Development (COHRED). (1997). Essential national health research in the Philippines: The first five years 1991–1996. Geneva: COHRED."><span data-dcnode-id="1586" instrument_node="">1997</span></a><span data-dcnode-id="1584" instrument_node="">)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1572"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1573" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-1-4899-7999-5_11/tables/1" rel="nofollow"><span data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1574" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1575" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1576" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1579" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1578" fill-rule="evenodd"></path><span data-dcnode-id="1577" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1568" instrument_node="">Even in recent years, there has been a dearth of epidemiological data to document mental disorders. A few new studies tried to extract prevalence of specific disorders in different subsets of populations but do not give generalizable results. Census data from the Philippine Statistics Authority (</span><a aria-label="Reference 2013" data-dcnode-id="1566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d27880976e697" title="Philippine Statistics Authority. (2013). Persons with disability in the Philippines (Results from the 2010 Census). Retrieved March 1, 2015, from 
                  http://web0.psa.gov.ph/content/persons-disability-philippines-results-2010-census
                  
                
        "><span data-dcnode-id="1567" instrument_node="">2013</span></a><span data-dcnode-id="1565" instrument_node="">)  reported that in 2010 there were 16 per 1000 population who had a disability reported that in 2010 there were 16 per 1000 population who had a disability including mental disability, but did not identify the specific mental disorders. A Department of Health study in 2007 revealed that 15 out of 900 teenagers tried to commit suicide. The WHO, on the other hand, reported that in 2004 there were over 4.5&nbsp;million cases of depression in the country but only three percent of which were clinically diagnosed. Among those who are depressed, only one-third will seek help, while the rest will suffer the symptoms but would either not know what is wrong with them or be ashamed to seek help (Department of Health, Philippines </span><a aria-label="Reference 2011b" data-dcnode-id="1563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR024" id="ref-link-section-d27880976e700" title="Department of Health, Philippines. (2011b, October). Woeful Suicide. Retrieved March 1, 2015, from 
                  http://portal.doh.gov.ph/content/woeful-suicide.html
                  
                
        "><span data-dcnode-id="1564" instrument_node="">2011b</span></a><span data-dcnode-id="1562" instrument_node="">, October). The WHO—Assessment Instrument for Mental Health Systems (AIMS) Country Profile report in 2007 showed that the top three most frequently diagnosed cases in all mental health facilities were schizophrenia, mood disorders and substance abuse disorders, in that order.</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1560" instrument_node="">On the other hand, resources for mental health have been very limited. Only 5% of the overall health expenditures of government is allocated for mental health; of this amount, 95% is spent on running mental hospitals. The national social insurance scheme, PhilHealth, covers mental disorders but is limited to acute inpatient care (World Health Organization and Department of Health, Philippines </span><a aria-label="Reference 2007" data-dcnode-id="1558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d27880976e706" title="World Health Organization (WHO) and Department of Health, Philippines. (2007). WHO-AIMS (Assessment instrument for mental health systems) Report on Mental Health System in the Philippines. Manila: WHO."><span data-dcnode-id="1559" instrument_node="">2007</span></a><span data-dcnode-id="1557" instrument_node="">). As for human resources in mental health, only 2.82 mental health practitioners are available per 100,000 population. Figure&nbsp;</span><a data-dcnode-id="1555" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1556" instrument_node="">11.1</span></a><span data-dcnode-id="1554" instrument_node=""> depicts the breakdown of these workers according to professions. A larger number is shown to represent mostly medical assistants and non-medical auxiliary staff, manning facilities. According to the WHO-AIMS (World Health Organization and Department of Health, Philippines </span><a aria-label="Reference 2007" data-dcnode-id="1552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d27880976e712" title="World Health Organization (WHO) and Department of Health, Philippines. (2007). WHO-AIMS (Assessment instrument for mental health systems) Report on Mental Health System in the Philippines. Manila: WHO."><span data-dcnode-id="1553" instrument_node="">2007</span></a><span data-dcnode-id="1551" instrument_node="">), more than 50% of psychiatrists work in for-profit, mental health facilities and private practice. Numbers of social workers and occupational therapists are very low. Many trained community-based health workers no longer serve in their localities and the current primary health-care staff seem to have inadequate training in mental health and rare interaction with mental health facilities. Most primary health-care doctors and nurses have not received official in-service training on mental health within the last five years, and while manuals on the management and treatment of mental disorders exist, they are not necessarily available in the majority of primary health-care clinics (WHO </span><a aria-label="Reference 2011" data-dcnode-id="1549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR0020" id="ref-link-section-d27880976e715" title="World Health Organization (2011). Mental Health Atlas 2011. Geneva: WHO."><span data-dcnode-id="1550" instrument_node="">2011</span></a><span data-dcnode-id="1548" instrument_node="">). Furthermore, although different psychopharmacological agents are available in the market, they are not necessarily accessible to or affordable by the general public (Asia Pacific Observatory on Health Systems and Policies </span><a aria-label="Reference 2011" data-dcnode-id="1546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d27880976e718" title="Asia Pacific Observatory on Health Systems and Policies. (2011). The Philippines Health System Review. Geneva: WHO."><span data-dcnode-id="1547" instrument_node="">2011</span></a><span data-dcnode-id="1545" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1517" data-test="figure" data-title="Fig.&nbsp;11.1" id="figure-1"><figure data-dcnode-id="1518"><figcaption data-dcnode-id="1541"><b class="c-article-section__figure-caption" data-dcnode-id="1542" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1543" instrument_node="">Fig.&nbsp;11.1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1529"><div class="c-article-section__figure-item" data-dcnode-id="1536"><a class="c-article-section__figure-link" data-dcnode-id="1537" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-1-4899-7999-5_11/figures/1" rel="nofollow"><picture data-dcnode-id="1538"><source data-dcnode-id="1540" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-1-4899-7999-5_11/MediaObjects/306943_1_En_11_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1539" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-1-4899-7999-5_11/MediaObjects/306943_1_En_11_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1530" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">Human resources in mental health (rate per 100,000 population). Adapted from WHO (</span><a aria-label="Reference 2011" data-dcnode-id="1533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR0020" id="ref-link-section-d27880976e732" title="World Health Organization (2011). Mental Health Atlas 2011. Geneva: WHO."><span data-dcnode-id="1534" instrument_node="">2011</span></a><span data-dcnode-id="1532" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1519"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1520" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-1-4899-7999-5_11/figures/1" rel="nofollow"><span data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1521" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1522" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1523" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1526" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1525" fill-rule="evenodd"></path><span data-dcnode-id="1524" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1515" instrument_node="">Community mental health programs have mostly been run by non-government organizations, such as the Philippine Mental Health Association (PMHA) and the World Association for Psychosocial Rehabilitation—Philippines (WAPR-P). Philippine Mental Health Association has been in existence for more than half a century and has run out-patient clinics, mental health programs in schools as well as public information and advocacy programs (Philippine Mental Health Association </span><a aria-label="Reference 2015" data-dcnode-id="1513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d27880976e747" title="Philppine Mental Health Association. (2015). PMHA programs and services. Retrieved March 1, 2015, from 
                  http://www.pmha.org.ph/programsservices
                  
                
        "><span data-dcnode-id="1514" instrument_node="">2015</span></a><span data-dcnode-id="1512" instrument_node="">). But its efforts have been rather isolated (Conde </span><a aria-label="Reference 2004" data-dcnode-id="1510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR05" id="ref-link-section-d27880976e750" title="Conde, B. (2004). Philippines mental health country profile. International Review of Psychiatry, 16(1–2), 159–166."><span data-dcnode-id="1511" instrument_node="">2004</span></a><span data-dcnode-id="1509" instrument_node="">). WAPR-P has undertaken projects on mental health in primary health care in coordination with local government units and academic institutions. Although still seen as demonstration projects and outside of the NMHP, local government enthusiasm for them increased after a project on the management of psychosocial problems among survivors of a disaster was awarded one of the ten best governance projects by the Galing Pook Foundation, working in coordination with the Department of the Interior and Local Government and the Office of the President (Galing Pook Foundation </span><a aria-label="Reference 2011" data-dcnode-id="1507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR011" id="ref-link-section-d27880976e753" title="Galing Pook Foundation. (2011). Community-based health management Real, Infanta, Gen. Nakar, Panukulan, Quezon. Outstanding Local Governance Programs for 2011. Quezon City: Galing Pook Foundation."><span data-dcnode-id="1508" instrument_node="">2011</span></a><span data-dcnode-id="1506" instrument_node="">).</span></p><p data-dcnode-id="1494"><span data-dcnode-id="1504" instrument_node="">Among government agencies implementing community-oriented efforts are those of the Department of Labor and Employment (DOLE) and the Department of Social Welfare and Development (DSWD). A welfare program for overseas Filipino workers under the DOLE and in cooperation with the Commission for Overseas Filipinos has been initiated. Psychological assessment of departing overseas workers and a pre-departure orientation seminar with a psychosocial orientation on the country of employment, work expectations and some ways to deal with stress, as well as families left behind, is carried out (Conde </span><a aria-label="Reference 2004" data-dcnode-id="1502" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR05" id="ref-link-section-d27880976e759" title="Conde, B. (2004). Philippines mental health country profile. International Review of Psychiatry, 16(1–2), 159–166."><span data-dcnode-id="1503" instrument_node="">2004</span></a><span data-dcnode-id="1501" instrument_node="">). The DOLE also posts welfare officers to different embassies to address the concerns of these workers including psychosocial problems (International Organization for Migration </span><a aria-label="Reference 2008" data-dcnode-id="1499" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d27880976e762" title="International Organization for Migration. (2008). World Migration 2008: Managing Labour Mobility in the Evolving Global Economy. Geneva."><span data-dcnode-id="1500" instrument_node="">2008</span></a><span data-dcnode-id="1498" instrument_node="">). The DSWD, on the other hand, provides mental health assistance through their program for the protection of children and another for the welfare of families, now primary priorities under the Pantawid Pamilyang Pilipino program (Official Gazette of the Republic of the Philippines </span><a aria-label="Reference 2015" data-dcnode-id="1496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d27880976e765" title="Official Gazette of the Republic of the Philippines. (2015). Pantawid Pamilyang Pilipino Program. Retrieved March 1, 2015, from 
                  http://www.gov.ph/programs/conditional-cash-transfer/
                  
                
        "><span data-dcnode-id="1497" instrument_node="">2015</span></a><span data-dcnode-id="1495" instrument_node="">), a government poverty reduction program.</span></p></div></div></section><section data-dcnode-id="1383" data-title="Prevailing and Emerging Issues"><div class="c-article-section" data-dcnode-id="1384" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1489" id="Sec3"><span data-dcnode-id="1490" instrument_node="">Prevailing and Emerging Issues</span></h2><div class="c-article-section__content" data-dcnode-id="1385" id="Sec3-content"><p data-dcnode-id="1481"><span data-dcnode-id="1488" instrument_node="">While interest in </span><i data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Sikolohiyang Pilipino</span></i><span data-dcnode-id="1485" instrument_node=""> (Psychology) was strong from the 1970s to the 1990s, the work around indigenous concepts of mental health remains inadequate. This is exemplified by the difficulties psychiatrists have in trying to understand local terms used to describe emotions and mental states. So far, only Luciano Santiago (</span><a aria-label="Reference 1993" data-dcnode-id="1483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d27880976e779" title="Santiago, L. P. (1993). The language of mourning and depression in Filipino and its Indonesian and Malayan cognates: Transcultural, sociological, historical, artistic and therapeutic significance. Phil Quarterly of Culture and Society, 21(3), 269–311."><span data-dcnode-id="1484" instrument_node="">1993</span></a><span data-dcnode-id="1482" instrument_node="">) has produced an in-depth study probing into terms used to describe emotions, specifically around grief and mourning. Western psychology and psychiatry have certainly had an impact on Filipinos, who use English terms like “neurotic,” “psychotic,” “bipolar” and many other terms, though these terms often have local meanings. “Psychotic” or its fairly recent neologism “praning” is often used to refer to a drug-dependent person. In general, the terms have very negative pathological connotations: Mental disorder is still heavily stigmatized, resulting in a reluctance on the part of patients themselves and their families to seek professional help.</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1480" instrument_node="">The terms “Filipino” and “local culture” are in themselves problematic because the Philippines is marked by multiculturalism. There are 149 languages spoken in the Philippines (Komisyon sa Wikang Filipino </span><a aria-label="Reference 2015" data-dcnode-id="1478" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR012" id="ref-link-section-d27880976e785" title="Komisyon sa Wikang Filipino. (2015). ‘149 na wika sa Filipinas, buhay!’ – KWF. Retrieved March 1, 2015, from 
                  http://kwf.gov.ph
                  
                
        "><span data-dcnode-id="1479" instrument_node="">2015</span></a><span data-dcnode-id="1477" instrument_node="">), and there are many cultural divisions based on religion, socioeconomic status and even residence (urban and rural; Filipinos living in the Philippines and those living overseas). Today’s challenges in mental health are often described as economic in nature. No doubt, the gap between rich and poor does spell differences in access, further highlighting the effects of social determinants to mental health. It is important to note the phenomenon of Overseas Filipino Workers, numbering about 10&nbsp;million (International Organization for Migration </span><a aria-label="Reference 2013" data-dcnode-id="1475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR013" id="ref-link-section-d27880976e788" title="International Organization for Migration. (2013). Country Migration Report The Philippines 2013. Retrieved March 1, 2015, from 
                  http://www.smc.org.ph/administrator/uploads/publication_pdf/CMReport%20Philipines%202013.pdf
                  
                
        "><span data-dcnode-id="1476" instrument_node="">2013</span></a><span data-dcnode-id="1474" instrument_node="">) and comprising about 10% of the Philippine population (Philippine Statistics Authority </span><a aria-label="Reference 2012a" data-dcnode-id="1472" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR022" id="ref-link-section-d27880976e791" title="Philippine Statistics Authority. (2012a, April 4). The 2010 Census of Population and Housing Reveals the Philippine Population at 92.34 Million. Retrieved March 1, 2015, from 
                  http://psa.gov.ph/content/2010-census-population-and-housing-reveals-philippine-population-9234-million
                  
                
        "><span data-dcnode-id="1473" instrument_node="">2012a</span></a><span data-dcnode-id="1471" instrument_node="">, April 4). The changing family dynamics among families with migrant workers and their overseas experiences present additional challenges to their mental health. The psychological effects among the migrants and their families have been documented in several studies (Bhugra et al. </span><a aria-label="Reference 2011" data-dcnode-id="1469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR014" id="ref-link-section-d27880976e794" title="Bhugra, D., Gupta, D., Bhui, K., Craig, T., Dorga, N., Ingleby, J.D., Kirkbride, J., Moussaoui, D., Nazrro, J., Qureshi, A., Stompe, T. &amp; Tribe, R. (2011). World Psychiatric Association guidance on mental health and mental health care in migrants. World Psychiatry, 10(1), 2–10."><span data-dcnode-id="1470" instrument_node="">2011</span></a><span data-dcnode-id="1468" instrument_node="">). Among studies on Filipino migrants’ mental health, noteworthy are those done identifying stressors and coping mechanisms of domestic workers (van der Ham et al. </span><a aria-label="Reference 2014" data-dcnode-id="1466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR015" id="ref-link-section-d27880976e797" title="Van der Ham, A.J., Ujano-Batangan, M.T., Ignacio, R. and Wolffers, I. (2014). Toward healty migration: An exploratory study on the resilience of migrant domestic workers from the Philippines. Transcultural Psychiatry, 51(4), 545–568."><span data-dcnode-id="1467" instrument_node="">2014</span></a><span data-dcnode-id="1465" instrument_node="">; Quiring </span><a aria-label="Reference 2011" data-dcnode-id="1463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR016" id="ref-link-section-d27880976e801" title="	Quiring, J.S. (2011). Mental health status and care among Filipino household service workers in Italy and Spain. Master in Sustainable Regional Health Systems thesis, Vilnius University, Unpublished."><span data-dcnode-id="1464" instrument_node="">2011</span></a><span data-dcnode-id="1462" instrument_node="">).</span></p><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">There is also the equally important problem of a gap between the professional sector trained in western psychiatry and popular culture. This popular culture is not necessarily defined by class, with even upper-class and highly educated Filipinos finding no conflict in regular visits to a psychiatrist, participation in healing prayer sessions and consultations with traditional healers.</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">The lack of research into the interfaces of mental health with culture and society has resulted in a strong tendency among mental health professionals to disregard local concepts of mental health and disease, not just by dismissing local explanatory models as “superstition” but also failing to consider the broader contexts of local beliefs around mental health. Beliefs in witchcraft, for example, have to be understood in the context of low levels of social affiliation. Trust levels will be high at the level of the family and, loosely, for people of the same ethnolinguistic group, but beyond these groups, there is much distrust. Thus, suspicions of witchcraft are quick to rise when illnesses strike, especially if they are psychological (Tan </span><a aria-label="Reference 2008" data-dcnode-id="1456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR017" id="ref-link-section-d27880976e810" title="Tan, M. L. (2008). Revisiting usog, pasma, kulam. Quezon City: University of the Philippines Press."><span data-dcnode-id="1457" instrument_node="">2008</span></a><span data-dcnode-id="1455" instrument_node="">).</span></p><p data-dcnode-id="1449"><span data-dcnode-id="1453" instrument_node="">Mention has been made of Rizal, writing in the nineteenth century about traditional healers and illnesses attributed to witchcraft and the need to recognize the role of “autosuggestion” and the possibility that the healers could be effective. Demetrio (</span><a aria-label="Reference 1978" data-dcnode-id="1451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d27880976e817" title="Demetrio, F. R. (1978). The shaman as psychologist. Asian Folklore Studies, 37(1), 57–73."><span data-dcnode-id="1452" instrument_node="">1978</span></a><span data-dcnode-id="1450" instrument_node="">) in a study on Philippine culture and folklore expounded on Rizal’s observation and suggested that shamans may have the skills of psychologists. Psychiatrists might do well to consider how their patients’ healing might involve these traditional health practitioners.</span></p><p data-dcnode-id="1441"><span data-dcnode-id="1448" instrument_node="">Another prevailing issue in the Philippines is the continuing predominance of the mental hospital-based system of custodial and isolated care despite the NMHP. In fact, mental hospitals in the country continue to face overcrowding (Asia Pacific Observatory on Health Systems and Policies </span><a aria-label="Reference 2011" data-dcnode-id="1446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d27880976e823" title="Asia Pacific Observatory on Health Systems and Policies. (2011). The Philippines Health System Review. Geneva: WHO."><span data-dcnode-id="1447" instrument_node="">2011</span></a><span data-dcnode-id="1445" instrument_node="">). While the country has been an advocate of “health for all” including mental health (World Health Organization </span><a aria-label="Reference 1978" data-dcnode-id="1443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d27880976e826" title="World Health Organization (1978). Declaration of Alma-Ata. Retrived March 1, 2015, from 
                  http://www.who.int/publications/almaata_declaration_en.pdf
                  
                ."><span data-dcnode-id="1444" instrument_node="">1978</span></a><span data-dcnode-id="1442" instrument_node="">), the present system sustains such isolation and prevents universal access to mental health care. While there is appreciation of the need for deinstitutionalization, greater community-based efforts and integration of mental health in primary health care, these ideas have yet to be fully implemented. The establishment of some psychiatric facilities in provincial hospitals and the growth of home-care services for discharged patients have progressed slowly. The alternative solution to it happening in the grassroots is the engagement of local government units with private groups or non-government organizations in integrating mental health care with their daily health-care activities, an action that makes care more accessible to their people, especially the less privileged ones. The development of community-based mental health programs, although included in the 2013 expansion of the NMHP, has yet to be operational.</span></p><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">In contrast to custodial care in institutions, there are social support systems, starting with the family, that are not being adequately tapped. Filipino families are extended and, frequently, relatives, especially the women, will give up their careers to care for someone with a psychiatric illness. More support needs to be given to train such family carers including the prevention of burn-out.</span></p><p data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">Another growing area of interest is disaster mental health. The Philippines is highly vulnerable to natural disasters because of its location along the Pacific ring of fire and typhoon belt, and on the Pacific tectonic plate. Devastating earthquakes strike regularly, and strong typhoons hit the country each year (United Nations </span><a aria-label="Reference 2015" data-dcnode-id="1436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d27880976e835" title="United Nations. (2015). Philippines Country Profile. Retrieved March 1, 2015, from 
                  http://www.un.org.ph/country-profile
                  
                
        "><span data-dcnode-id="1437" instrument_node="">2015</span></a><span data-dcnode-id="1435" instrument_node="">). These disasters such as the recent typhoon Haiyan, the strongest in history to make landfall and which devastated several eastern provinces of the Philippines, exposed the necessity and urgency of planning for and organizing psychosocial response programs in the country. Current efforts are at best fragmented as the national system for responding to such disasters has limited capacity for engagement and collaboration. Nonetheless, there has been greater recognition of the need to coordinate efforts, conduct collegial discussion regarding psychosocial concepts and strategies of psychosocial interventions and make relevant researches. Professional organizations have actively pursued post-disaster mental health work with a long-term perspective and have shown that this could become the door to the development of a community mental health service through capacity-building in mental health of existing health workers. This results in the integration of mental health care with general care.</span></p><p data-dcnode-id="1426"><span data-dcnode-id="1433" instrument_node="">In disasters, as well as all other extreme life events, mental health workers are confronted by the psychosocial reactions being experienced and observed among the survivors (Ignacio and Perlas </span><a aria-label="Reference 1994" data-dcnode-id="1431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR018" id="ref-link-section-d27880976e841" title="	Ignacio, L. &amp; Perlas, A. (1994). From Victims to Survivors, Psychosocial Intervention to Disaster Management. Manila: UP Manila Information, Publication &amp; Public Affairs Office."><span data-dcnode-id="1432" instrument_node="">1994</span></a><span data-dcnode-id="1430" instrument_node="">). Locally, there has been recognition that it is imperative to discern whether such reactions are pathological or just part of a normal process. A broader perspective of assessment and treatment is warranted when dealing with survivors of trauma to avoid medicalization. Will the view be clinical and therefore aim to detect symptoms of a disorder that must be treated? Or will the view be normative and promotive of psychosocial well-being and therefore non-clinical? The World Psychiatric Association has called attention to the psychosocial experiences of disasters and other adversities as the evolving targets of psychiatry (Maj </span><a aria-label="Reference 2012" data-dcnode-id="1428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR019" id="ref-link-section-d27880976e844" title="Maj, M. (2012). From “madness” to “mental health problems”: Reflections on the evolving target of psychiatry. World Psychiatry, 11(3), 137–138."><span data-dcnode-id="1429" instrument_node="">2012</span></a><span data-dcnode-id="1427" instrument_node="">). Although these do not clearly fall under the official nomenclature and classification of mental disorders, they are of such intensity that they necessitate some kind of intervention and care from psychiatrists or if psychiatrists are unavailable, trained health workers or other mental health professionals.</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1425" instrument_node="">Ignacio (</span><a aria-label="Reference 2011" data-dcnode-id="1423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d27880976e850" title="Ignacio, L. (Ed.). (2011). Ginhawa: Wellbeing in the aftermath of disaster. Quezon City Art Angel Printshop."><span data-dcnode-id="1424" instrument_node="">2011</span></a><span data-dcnode-id="1422" instrument_node="">) has compiled an anthology of case studies in post-disaster psychosocial rehabilitation, showing the importance of tapping into indigenous concepts of physical and mental well-being, particularly around </span><i data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">ginhawa,</span></i><span data-dcnode-id="1419" instrument_node=""> earlier referred to as well-being. References to local descriptions of breath (</span><i data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">hininga</span></i><span data-dcnode-id="1416" instrument_node="">) like </span><i data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">habol hininga</span></i><span data-dcnode-id="1413" instrument_node=""> (struggling for breath) and </span><i data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">buntong hininga</span></i><span data-dcnode-id="1410" instrument_node=""> (sigh of frustration) can provide useful indicators on the depth of psychological pain. </span><i data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Ginhawa or kaginhawaan</span></i><span data-dcnode-id="1407" instrument_node=""> (relief) has been used to describe healing and wholeness in a person in the aftermath of adversities. For it is also in </span><i data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">ginhawa</span></i><span data-dcnode-id="1404" instrument_node=""> through which resilience is strengthened, </span><i data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">bayanihan</span></i><span data-dcnode-id="1401" instrument_node=""> (cooperation and unity) is fostered and humor inevitably becomes a by-product. That is why the Filipino can laugh even amidst the storms of life.</span></p><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Last, a reorientation of the teaching and practice of psychiatry is imperative. In the Philippines, although the mental health network is composed of practitioners and professional groups from other disciplines, psychiatrists are still recognized as leaders in mental health. This stems from the fact that, in the country, medical practitioners are still generally highly esteemed and assumed to take leadership roles. Psychiatrists, however, have their work cut out for them, as they take on the burden of addressing the mental health needs of the country, especially during these times of greater need and crises. More and more Filipinos are affected by various extreme life experiences (not only by natural or man-made disasters in communities but also neglect, violence and abuse in homes and localities) and not given adequate mental health care.</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">The training program for psychiatrists in the Philippines, currently in 12 accredited institutions mostly based in Metro Manila (Philippine Psychiatric Association </span><a aria-label="Reference 2015" data-dcnode-id="1395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR020" id="ref-link-section-d27880976e882" title="Philippine Psychiatric Association. (2015). Training institutions. Retrieved March 1, 2015, from 
                  http://www.philpsych.ph/training-institutions
                  
                
        "><span data-dcnode-id="1396" instrument_node="">2015</span></a><span data-dcnode-id="1394" instrument_node="">), has been designed by those trained in the USA and therefore carries a western framework, with its present strong emphasis on the neurosciences. Hence, a majority of Filipino psychiatrists have a strong biological orientation with symptom-relief as a primary objective. In most cases, this is driven by economics and limitations of the training programs which have been inadequate in providing knowledge and skills in other major components of psychiatry like social and community psychiatry. A majority do not regularly participate in programs for the management of mental health concerns in the community, even if there has been a recent increase in the number of those who have joined medical missions in disaster areas. The hesitation of psychiatrists to be involved in community mental health programs stems from the feeling of inadequacy and lack of technical know-how. Many have not sufficiently understood or internalized that social psychiatry, which focuses on the interconnectedness between the individual and the social environment, is an important component of general psychiatry. The introduction of social and community psychiatry concepts to provide psychiatrists with the conceptual foundation to be able to engage in community mental health programs has been minimal.</span></p><p data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">Psychiatry in the Philippines needs to face up to many old challenges as well as new ones that come with changing demographics. Urbanization is taking place at a rapid pace, with problems of congested living conditions, traffic congestion, and criminality, contributing to mental dysfunction. The country’s age dependency ratio remains high, with the 2010 national census showing that 54% of the population was below the age of 15, and 7% above the age of 65 (Philippine Statistics Authority </span><a aria-label="Reference 2012b" data-dcnode-id="1390" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR021" id="ref-link-section-d27880976e888" title="Philippine Statistics Authority. (2012b, August 30). The Age and Sex Structure of the Philippine Population: (Facts from the 2010 Census). Retrieved March 1, 2015, from 
                  http://psa.gov.ph/content/age-and-sex-structure-philippine-population-facts-2010-census
                  
                
        "><span data-dcnode-id="1391" instrument_node="">2012b</span></a><span data-dcnode-id="1389" instrument_node="">, August 30). The elderly population is increasing with many needs in mental health, particularly around dementias.</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Filipino psychiatrists will need to take on multiple roles in relation to these challenges, not just as clinicians but also as community trainers, advocates, researchers, leaders and civil servants, with a sensitivity to culture and history.</span></p></div></div></section><span data-dcnode-id="1382" instrument_node="">
