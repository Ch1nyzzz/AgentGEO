</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="485" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="494"><p data-dcnode-id="6949"><span data-dcnode-id="7025" instrument_node="">
</span><b data-dcnode-id="7023"><span data-dcnode-id="7024" instrument_node="">Cultural-historical activity theory</span></b><span data-dcnode-id="7022" instrument_node=""> (</span><b data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">CHAT</span></b><span data-dcnode-id="7019" instrument_node="">)</span><sup class="reference" data-dcnode-id="7016" id="cite_ref-1"><a data-dcnode-id="7017" href="#cite_note-1"><span data-dcnode-id="7018" instrument_node="">[1]</span></a></sup><span data-dcnode-id="7015" instrument_node=""> is a theoretical framework</span><sup class="reference" data-dcnode-id="7012" id="cite_ref-2"><a data-dcnode-id="7013" href="#cite_note-2"><span data-dcnode-id="7014" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7011" instrument_node=""> which helps to understand and analyse the relationship between the human mind (what people think and feel) and activity (what people do).</span><sup class="reference" data-dcnode-id="7008" id="cite_ref-Daniels10_3-0"><a data-dcnode-id="7009" href="#cite_note-Daniels10-3"><span data-dcnode-id="7010" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7005" id="cite_ref-KaptNard6_4-0"><a data-dcnode-id="7006" href="#cite_note-KaptNard6-4"><span data-dcnode-id="7007" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="7002" id="cite_ref-5"><a data-dcnode-id="7003" href="#cite_note-5"><span data-dcnode-id="7004" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7001" instrument_node=""> It traces its origins to the founders</span><sup class="reference" data-dcnode-id="6998" id="cite_ref-6"><a data-dcnode-id="6999" href="#cite_note-6"><span data-dcnode-id="7000" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6997" instrument_node=""> of the cultural-historical school of Russian psychology </span><a class="mw-redirect" data-dcnode-id="6995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L._S._Vygotsky" title="L. S. Vygotsky"><span data-dcnode-id="6996" instrument_node="">L. S. Vygotsky</span></a><sup class="reference" data-dcnode-id="6992" id="cite_ref-bioBook_7-0"><a data-dcnode-id="6993" href="#cite_note-bioBook-7"><span data-dcnode-id="6994" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6991" instrument_node=""> and </span><a data-dcnode-id="6989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksei_N._Leontiev" title="Aleksei N. Leontiev"><span data-dcnode-id="6990" instrument_node="">Aleksei N. Leontiev</span></a><span data-dcnode-id="6988" instrument_node="">.</span><sup class="reference" data-dcnode-id="6985" id="cite_ref-8"><a data-dcnode-id="6986" href="#cite_note-8"><span data-dcnode-id="6987" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="6982" id="cite_ref-Enge99_9-0"><a data-dcnode-id="6983" href="#cite_note-Enge99-9"><span data-dcnode-id="6984" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="6979" id="cite_ref-10"><a data-dcnode-id="6980" href="#cite_note-10"><span data-dcnode-id="6981" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="6976" id="cite_ref-11"><a data-dcnode-id="6977" href="#cite_note-11"><span data-dcnode-id="6978" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6975" instrument_node=""> Vygotsky's important insight into the dynamics of consciousness was that it is essentially subjective and shaped by the history of  each individual's social and cultural experience.</span><sup class="reference" data-dcnode-id="6972" id="cite_ref-Vyg78_12-0"><a data-dcnode-id="6973" href="#cite_note-Vyg78-12"><span data-dcnode-id="6974" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6971" instrument_node=""> Especially since the 1990s, CHAT has attracted a growing interest among academics worldwide.</span><sup class="reference" data-dcnode-id="6968" id="cite_ref-13"><a data-dcnode-id="6969" href="#cite_note-13"><span data-dcnode-id="6970" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6967" instrument_node=""> Elsewhere CHAT has been defined as "a cross-disciplinary framework for studying how humans purposefully transform natural and social reality, including themselves, as an ongoing culturally and historically </span><a data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Situated_learning" title="Situated learning"><span data-dcnode-id="6966" instrument_node="">situated</span></a><span data-dcnode-id="6964" instrument_node="">, materially and socially </span><a data-dcnode-id="6962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_mediation" title="Cultural mediation"><span data-dcnode-id="6963" instrument_node="">mediated</span></a><span data-dcnode-id="6961" instrument_node=""> process".</span><sup class="reference" data-dcnode-id="6958" id="cite_ref-14"><a data-dcnode-id="6959" href="#cite_note-14"><span data-dcnode-id="6960" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6957" instrument_node=""> Core ideas are: 1) humans act collectively, learn by doing, and communicate in and via their actions; 2) humans make, employ, and adapt tools of all kinds to learn and communicate; and 3) community is central to the process of making and interpreting meaning – and thus to all forms of learning, communicating, and acting.</span><sup class="reference" data-dcnode-id="6954" id="cite_ref-Leont78_15-0"><a data-dcnode-id="6955" href="#cite_note-Leont78-15"><span data-dcnode-id="6956" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="6951" id="cite_ref-16"><a data-dcnode-id="6952" href="#cite_note-16"><span data-dcnode-id="6953" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6950" instrument_node="">
</span></p><p data-dcnode-id="6928"><span data-dcnode-id="6948" instrument_node="">The term CHAT was coined by Michael Cole</span><sup class="reference" data-dcnode-id="6945" id="cite_ref-17"><a data-dcnode-id="6946" href="#cite_note-17"><span data-dcnode-id="6947" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6944" instrument_node=""> and popularized by Yrjö  Engeström</span><sup class="reference" data-dcnode-id="6941" id="cite_ref-18"><a data-dcnode-id="6942" href="#cite_note-18"><span data-dcnode-id="6943" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6940" instrument_node=""> to promote the unity of what, by the 1990s, had become a variety of currents</span><sup class="reference" data-dcnode-id="6937" id="cite_ref-19"><a data-dcnode-id="6938" href="#cite_note-19"><span data-dcnode-id="6939" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6936" instrument_node=""> harking back to Vygotsky's work.</span><sup class="reference" data-dcnode-id="6933" id="cite_ref-Stets05_20-0"><a data-dcnode-id="6934" href="#cite_note-Stets05-20"><span data-dcnode-id="6935" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="6930" id="cite_ref-Yama07_21-0"><a data-dcnode-id="6931" href="#cite_note-Yama07-21"><span data-dcnode-id="6932" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6929" instrument_node="">
</span></p><span data-dcnode-id="6927" instrument_node="">

</span><h2 data-dcnode-id="6717"><span class="mw-headline" data-dcnode-id="6725" id="Historical_overview"><span data-dcnode-id="6726" instrument_node="">Historical overview</span></span><span class="mw-editsection" data-dcnode-id="6718"><span class="mw-editsection-bracket" data-dcnode-id="6723"><span data-dcnode-id="6724" instrument_node="">[</span></span><a data-dcnode-id="6721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D1" title="Edit section: Historical overview"><span data-dcnode-id="6722" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6719"><span data-dcnode-id="6720" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6716" instrument_node="">
</span><h3 data-dcnode-id="6706"><span class="mw-headline" data-dcnode-id="6714" id="Origins:_revolutionary_Russia"><span data-dcnode-id="6715" instrument_node="">Origins: revolutionary Russia</span></span><span class="mw-editsection" data-dcnode-id="6707"><span class="mw-editsection-bracket" data-dcnode-id="6712"><span data-dcnode-id="6713" instrument_node="">[</span></span><a data-dcnode-id="6710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D2" title="Edit section: Origins: revolutionary Russia"><span data-dcnode-id="6711" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6705" instrument_node="">
</span><p data-dcnode-id="6601"><span data-dcnode-id="6704" instrument_node="">CHAT traces its lineage to </span><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dialectical_materialism" title="Dialectical materialism"><span data-dcnode-id="6703" instrument_node="">dialectical materialism</span></a><span data-dcnode-id="6701" instrument_node="">, classical </span><a data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_philosophy" title="German philosophy"><span data-dcnode-id="6700" instrument_node="">German philosophy</span></a><span data-dcnode-id="6698" instrument_node="">,</span><sup class="reference" data-dcnode-id="6695" id="cite_ref-Enge99_9-1"><a data-dcnode-id="6696" href="#cite_note-Enge99-9"><span data-dcnode-id="6697" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="6692" id="cite_ref-22"><a data-dcnode-id="6693" href="#cite_note-22"><span data-dcnode-id="6694" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="6689" id="cite_ref-23"><a data-dcnode-id="6690" href="#cite_note-23"><span data-dcnode-id="6691" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6688" instrument_node=""> and the work of </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lev_Vygotsky" title="Lev Vygotsky"><span data-dcnode-id="6687" instrument_node="">Lev Vygotsky</span></a><span data-dcnode-id="6685" instrument_node="">, </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksei_N._Leontiev" title="Aleksei N. Leontiev"><span data-dcnode-id="6684" instrument_node="">Aleksei N. Leontiev</span></a><span data-dcnode-id="6682" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksandr_Luria" title="Aleksandr Luria"><span data-dcnode-id="6681" instrument_node="">Aleksandr Luria</span></a><span data-dcnode-id="6679" instrument_node="">, known as </span><i data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">"the founding troika"</span></i><sup class="reference" data-dcnode-id="6674" id="cite_ref-24"><a data-dcnode-id="6675" href="#cite_note-24"><span data-dcnode-id="6676" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6673" instrument_node=""> of the </span><a data-dcnode-id="6671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural-historical_psychology" title="Cultural-historical psychology"><span data-dcnode-id="6672" instrument_node="">cultural-historical</span></a><span data-dcnode-id="6670" instrument_node=""> approach to </span><a class="mw-redirect" data-dcnode-id="6668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Psychology" title="Social Psychology"><span data-dcnode-id="6669" instrument_node="">Social Psychology</span></a><span data-dcnode-id="6667" instrument_node="">. In a radical departure from the </span><a data-dcnode-id="6665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Behaviorism" title="Behaviorism"><span data-dcnode-id="6666" instrument_node="">behaviorism</span></a><span data-dcnode-id="6664" instrument_node=""> and </span><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflexology" title="Reflexology"><span data-dcnode-id="6663" instrument_node="">reflexology</span></a><span data-dcnode-id="6661" instrument_node=""> that dominated much of psychology in the early 1920s, they formulated, in the spirit of </span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="6660" instrument_node="">Karl Marx</span></a><span data-dcnode-id="6658" instrument_node="">'s </span><a data-dcnode-id="6656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theses_on_Feuerbach" title="Theses on Feuerbach"><span data-dcnode-id="6657" instrument_node="">Theses on Feuerbach</span></a><span data-dcnode-id="6655" instrument_node="">, the concept of activity, i.e., "artifact-mediated and object-oriented action".</span><sup class="reference" data-dcnode-id="6652" id="cite_ref-25"><a data-dcnode-id="6653" href="#cite_note-25"><span data-dcnode-id="6654" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="6649" id="cite_ref-26"><a data-dcnode-id="6650" href="#cite_note-26"><span data-dcnode-id="6651" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6648" instrument_node=""> By bringing together the notion of history and culture in the understanding of human activity, they were able to transcend the </span><a class="mw-redirect" data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cartesian_dualism" title="Cartesian dualism"><span data-dcnode-id="6647" instrument_node="">Cartesian dualism</span></a><span data-dcnode-id="6645" instrument_node=""> between subject and object, internal and external, between people and society, between individual inner consciousness and the outer world of society.</span><sup class="reference" data-dcnode-id="6642" id="cite_ref-27"><a data-dcnode-id="6643" href="#cite_note-27"><span data-dcnode-id="6644" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6641" instrument_node=""> </span><a data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lev_Vygotsky" title="Lev Vygotsky"><span data-dcnode-id="6640" instrument_node="">Lev Vygotsky</span></a><span data-dcnode-id="6638" instrument_node="">, who created the foundation of cultural-historical psychology, based on the concept of mediation, published six books on psychology topics during a working life which spanned only ten years. He died of TB in 1934 at the age of 37. A.N. Leont'ev worked with Lev Vygotsky and Alexandr Luria from 1924 to 1930, collaborating on the development of a </span><a class="new" data-dcnode-id="6636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMarxist_psychology%26action%3Dedit%26redlink%3D1" title="Marxist psychology (page does not exist)"><span data-dcnode-id="6637" instrument_node="">Marxist psychology</span></a><span data-dcnode-id="6635" instrument_node="">. Leontiev left Vygotsky's group in Moscow in 1931, to take up a position in </span><a class="mw-redirect" data-dcnode-id="6633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kharkov" title="Kharkov"><span data-dcnode-id="6634" instrument_node="">Kharkov</span></a><span data-dcnode-id="6632" instrument_node="">. There he was joined by local psychologists, including Pyotr Galperin and </span><a data-dcnode-id="6630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyotr_Zinchenko" title="Pyotr Zinchenko"><span data-dcnode-id="6631" instrument_node="">Pyotr Zinchenko</span></a><span data-dcnode-id="6629" instrument_node="">.</span><sup class="reference" data-dcnode-id="6626" id="cite_ref-28"><a data-dcnode-id="6627" href="#cite_note-28"><span data-dcnode-id="6628" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6625" instrument_node=""> He continued to work with Vygotsky for some time but, eventually, there was a split, although they continued to communicate with one another on scientific matters.</span><sup class="reference" data-dcnode-id="6622" id="cite_ref-29"><a data-dcnode-id="6623" href="#cite_note-29"><span data-dcnode-id="6624" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6621" instrument_node=""> Leontiev returned to Moscow in 1934. Contrary to popular belief, Vygotsky's work per se was never banned in Stalinist</span><sup class="reference" data-dcnode-id="6618" id="cite_ref-30"><a data-dcnode-id="6619" href="#cite_note-30"><span data-dcnode-id="6620" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6617" instrument_node=""> Soviet Russia.</span><sup class="reference" data-dcnode-id="6614" id="cite_ref-31"><a data-dcnode-id="6615" href="#cite_note-31"><span data-dcnode-id="6616" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6613" instrument_node=""> In 1950 A.N.Leontiev became the Head of the Psychology Department at the Faculty of Philosophy of the </span><a class="mw-redirect" data-dcnode-id="6611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lomonosov_Moscow_State_University" title="Lomonosov Moscow State University"><span data-dcnode-id="6612" instrument_node="">Lomonosov Moscow State University</span></a><span data-dcnode-id="6610" instrument_node=""> (MGU). This department became an independent Faculty in 1966 due mainly to his hard work. He remained there until his death in 1979. Leontiev's formulation of activity theory, post 1962, had become the new "official" basis for Soviet psychology.</span><sup class="reference" data-dcnode-id="6607" id="cite_ref-32"><a data-dcnode-id="6608" href="#cite_note-32"><span data-dcnode-id="6609" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6606" instrument_node=""> In the two decades between a thaw in the suppression of scientific enquiry in Russia and the death of the Vygotsky's continuers,</span><sup class="reference" data-dcnode-id="6603" id="cite_ref-33"><a data-dcnode-id="6604" href="#cite_note-33"><span data-dcnode-id="6605" instrument_node="">[33]</span></a></sup><span data-dcnode-id="6602" instrument_node=""> contact was made with the West.
</span></p><span data-dcnode-id="6600" instrument_node="">
</span><h3 data-dcnode-id="6590"><span class="mw-headline" data-dcnode-id="6598" id="Developments_in_the_West"><span data-dcnode-id="6599" instrument_node="">Developments in the West</span></span><span class="mw-editsection" data-dcnode-id="6591"><span class="mw-editsection-bracket" data-dcnode-id="6596"><span data-dcnode-id="6597" instrument_node="">[</span></span><a data-dcnode-id="6594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D3" title="Edit section: Developments in the West"><span data-dcnode-id="6595" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6589" instrument_node="">
</span><p data-dcnode-id="6526"><span data-dcnode-id="6588" instrument_node="">Michael Cole, then a young </span><a data-dcnode-id="6586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indiana_University" title="Indiana University"><span data-dcnode-id="6587" instrument_node="">Indiana University</span></a><span data-dcnode-id="6585" instrument_node=""> psychology post-graduate exchange student, arrived in Moscow in 1962 for a one-year stint of research under Alexandr Luria. Keenly aware of the gulf between Soviet and American psychology, he was one for the first Westerners to present Luria's and Vygotsky's idea to an Anglo-Saxon public.</span><sup class="reference" data-dcnode-id="6582" id="cite_ref-34"><a data-dcnode-id="6583" href="#cite_note-34"><span data-dcnode-id="6584" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="6579" id="cite_ref-35"><a data-dcnode-id="6580" href="#cite_note-35"><span data-dcnode-id="6581" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6578" instrument_node=""> This, and a steady flow of books translated from the Russian</span><sup class="reference" data-dcnode-id="6575" id="cite_ref-36"><a data-dcnode-id="6576" href="#cite_note-36"><span data-dcnode-id="6577" instrument_node="">[36]</span></a></sup><span data-dcnode-id="6574" instrument_node=""> ensured the gradual establishment of a solid Cultural Psychology base in the west.</span><sup class="reference" data-dcnode-id="6571" id="cite_ref-37"><a data-dcnode-id="6572" href="#cite_note-37"><span data-dcnode-id="6573" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6570" instrument_node=""> Another American scholar, James V. Wertsch, after completing his PhD at the </span><a data-dcnode-id="6568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Chicago" title="University of Chicago"><span data-dcnode-id="6569" instrument_node="">University of Chicago</span></a><span data-dcnode-id="6567" instrument_node=""> in 1975, spent a year as a postdoctoral fellow in Moscow to study linguistics and neuropsychology. Wertsch subsequently became one of the leading Western experts on Soviet Psychology.</span><sup class="reference" data-dcnode-id="6564" id="cite_ref-38"><a data-dcnode-id="6565" href="#cite_note-38"><span data-dcnode-id="6566" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6563" instrument_node=""> Principal among the groups promoting CHAT-related research is Yjrö Engeström's Helsinki-based CRADLE.</span><sup class="reference" data-dcnode-id="6560" id="cite_ref-39"><a data-dcnode-id="6561" href="#cite_note-39"><span data-dcnode-id="6562" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6559" instrument_node=""> In 1982 an Activity Conference, claimed to have been the first of its kind in Europe, organized by Yrjö Engeström to concentrate on teaching and learning issues, took place in </span><a data-dcnode-id="6557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Espoo" title="Espoo"><span data-dcnode-id="6558" instrument_node="">Espoo</span></a><span data-dcnode-id="6556" instrument_node=""> (Fl), with the participation of experts from both Eastern and Western European countries. This was followed by the </span><a data-dcnode-id="6554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aarhus" title="Aarhus"><span data-dcnode-id="6555" instrument_node="">Aarhus</span></a><span data-dcnode-id="6553" instrument_node=""> (Dk) Conference in 1983 and the Utrecht (Nl) conference in 1984. In October 1986, West Berlin's College of Arts hosted the first ISCAR</span><sup class="reference" data-dcnode-id="6550" id="cite_ref-40"><a data-dcnode-id="6551" href="#cite_note-40"><span data-dcnode-id="6552" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6549" instrument_node=""> International Congress on Activity Theory. This was also the first effort to bring together under one roof researchers, theorists, and philosophers working in the tradition of the Soviet psychologists Leontiev and Vygotsky.</span><sup class="reference" data-dcnode-id="6546" id="cite_ref-41"><a data-dcnode-id="6547" href="#cite_note-41"><span data-dcnode-id="6548" instrument_node="">[41]</span></a></sup><span data-dcnode-id="6545" instrument_node=""> The second ISCRAT congress took place in </span><a data-dcnode-id="6543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lahti" title="Lahti"><span data-dcnode-id="6544" instrument_node="">Lahti</span></a><span data-dcnode-id="6542" instrument_node="">, (Fl) in 1990. ISCRAT became a formal legal organization with its own by-laws in </span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amsterdam" title="Amsterdam"><span data-dcnode-id="6541" instrument_node="">Amsterdam</span></a><span data-dcnode-id="6539" instrument_node="">, 1992. Other ISCRAT conferences: Rome (1993), Moscow (1995), </span><a data-dcnode-id="6537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aarhus" title="Aarhus"><span data-dcnode-id="6538" instrument_node="">Aarhus</span></a><span data-dcnode-id="6536" instrument_node=""> (1998) and </span><a data-dcnode-id="6534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amsterdam" title="Amsterdam"><span data-dcnode-id="6535" instrument_node="">Amsterdam</span></a><span data-dcnode-id="6533" instrument_node=""> (2002), when ISCRAT and the Conference for Socio-Cultural Research merged into ISCAR. From here on, ISCAR organizes an international Congress every three years: </span><a class="mw-redirect" data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sevilla" title="Sevilla"><span data-dcnode-id="6532" instrument_node="">Sevilla</span></a><span data-dcnode-id="6530" instrument_node=""> (Es) 2005; </span><a data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Diego" title="San Diego"><span data-dcnode-id="6529" instrument_node="">San Diego</span></a><span data-dcnode-id="6527" instrument_node=""> (USA) 2008; Rome (It) 2011; Sydney (Au) 2014; Quebec, Canada (2017).
</span></p><p data-dcnode-id="6507"><span data-dcnode-id="6525" instrument_node="">In more recent years the implications of activity theory in organizational development have been promoted by the work Yrjö Engeström's team at the Centre for Activity Theory and Developmental Work Research (CATDWR)</span><sup class="reference" data-dcnode-id="6522" id="cite_ref-42"><a data-dcnode-id="6523" href="#cite_note-42"><span data-dcnode-id="6524" instrument_node="">[42]</span></a></sup><span data-dcnode-id="6521" instrument_node=""> at the </span><a data-dcnode-id="6519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Helsinki" title="University of Helsinki"><span data-dcnode-id="6520" instrument_node="">University of Helsinki</span></a><span data-dcnode-id="6518" instrument_node="">, and Mike Cole at the Laboratory of Comparative Human Cognition </span><a class="external text" data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lchc.ucsd.edu/home" rel="nofollow"><span data-dcnode-id="6517" instrument_node="">(LCHC)</span></a><span data-dcnode-id="6515" instrument_node=""> at the University of California San Diego campus.</span><sup class="reference" data-dcnode-id="6512" id="cite_ref-43"><a data-dcnode-id="6513" href="#cite_note-43"><span data-dcnode-id="6514" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="6509" id="cite_ref-44"><a data-dcnode-id="6510" href="#cite_note-44"><span data-dcnode-id="6511" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6508" instrument_node="">
</span></p><span data-dcnode-id="6506" instrument_node="">
</span><h3 data-dcnode-id="6496"><span class="mw-headline" data-dcnode-id="6504" id="The_three_generations_of_activity_theory"><span data-dcnode-id="6505" instrument_node="">The three generations of activity theory</span></span><span class="mw-editsection" data-dcnode-id="6497"><span class="mw-editsection-bracket" data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">[</span></span><a data-dcnode-id="6500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D4" title="Edit section: The three generations of activity theory"><span data-dcnode-id="6501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6495" instrument_node="">
</span><p data-dcnode-id="6452"><span data-dcnode-id="6494" instrument_node="">In his 1987 </span><i data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">"Learning by expanding"</span></i><span data-dcnode-id="6491" instrument_node="">, Engeström</span><sup class="reference" data-dcnode-id="6488" id="cite_ref-Enge87_45-0"><a data-dcnode-id="6489" href="#cite_note-Enge87-45"><span data-dcnode-id="6490" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6487" instrument_node=""> offers a very detailed account of the diverse sources, philosophical and psychological, that inform activity theory. In subsequent years, however, a simplified picture has emerged from his and other researchers' work, namely the idea that (to date) there are three principal 'stages' or 'generations'</span><sup class="reference" data-dcnode-id="6484" id="cite_ref-46"><a data-dcnode-id="6485" href="#cite_note-46"><span data-dcnode-id="6486" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6483" instrument_node=""> of activity theory, or "cultural-historical activity theory (CHAT).</span><sup class="reference" data-dcnode-id="6480" id="cite_ref-Eng09b_47-0"><a data-dcnode-id="6481" href="#cite_note-Eng09b-47"><span data-dcnode-id="6482" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="6477" id="cite_ref-Yama10_48-0"><a data-dcnode-id="6478" href="#cite_note-Yama10-48"><span data-dcnode-id="6479" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="6474" id="cite_ref-49"><a data-dcnode-id="6475" href="#cite_note-49"><span data-dcnode-id="6476" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="6471" id="cite_ref-Enge99a_50-0"><a data-dcnode-id="6472" href="#cite_note-Enge99a-50"><span data-dcnode-id="6473" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="6468" id="cite_ref-Bakh09_51-0"><a data-dcnode-id="6469" href="#cite_note-Bakh09-51"><span data-dcnode-id="6470" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6467" instrument_node=""> Whilst the first generation built on Vygotsky's notion of mediated action, from the individual's perspective, and the second generation built on Leont'ev's notion of activity system, with emphasis on the collective,</span><sup class="reference" data-dcnode-id="6464" id="cite_ref-52"><a data-dcnode-id="6465" href="#cite_note-52"><span data-dcnode-id="6466" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6463" instrument_node=""> the third generation, which appeared in the mid-nineties, builds on the idea of multiple interacting activity systems focused on a partially shared object, and boundary-crossings between them.</span><sup class="reference" data-dcnode-id="6460" id="cite_ref-Eng09b_47-1"><a data-dcnode-id="6461" href="#cite_note-Eng09b-47"><span data-dcnode-id="6462" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="6457" id="cite_ref-53"><a data-dcnode-id="6458" href="#cite_note-53"><span data-dcnode-id="6459" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="6454" id="cite_ref-AkkerBakker_54-0"><a data-dcnode-id="6455" href="#cite_note-AkkerBakker-54"><span data-dcnode-id="6456" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6453" instrument_node="">
</span></p><span data-dcnode-id="6451" instrument_node="">
</span><h4 data-dcnode-id="6440"><span data-dcnode-id="6450" id="First_generation_.E2.80.93_Vygotsky"></span><span class="mw-headline" data-dcnode-id="6448" id="First_generation_–_Vygotsky"><span data-dcnode-id="6449" instrument_node="">First generation – Vygotsky</span></span><span class="mw-editsection" data-dcnode-id="6441"><span class="mw-editsection-bracket" data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">[</span></span><a data-dcnode-id="6444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D5" title="Edit section: First generation – Vygotsky"><span data-dcnode-id="6445" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">]</span></span></span></h4><p data-dcnode-id="6421"><span data-dcnode-id="6439" instrument_node="">
The first generation emerges from Vygotsky's theory of </span><a data-dcnode-id="6437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_mediation" title="Cultural mediation"><span data-dcnode-id="6438" instrument_node="">cultural mediation</span></a><span data-dcnode-id="6436" instrument_node="">, which was a response to </span><a data-dcnode-id="6434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Behaviorism" title="Behaviorism"><span data-dcnode-id="6435" instrument_node="">behaviorism</span></a><span data-dcnode-id="6433" instrument_node="">'s explanation of consciousness, or the development of the human mind, by reducing "mind" to a series of atomic components or structures associated primarily with the brain as "stimulus – response" (S-R) processes. Vygotsky argued that the relationship between a human subject and an object is never direct but must be sought in society and culture as they evolve historically, rather than in the human brain or individual mind unto itself.</span><sup class="reference" data-dcnode-id="6430" id="cite_ref-55"><a data-dcnode-id="6431" href="#cite_note-55"><span data-dcnode-id="6432" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6429" instrument_node=""> His cultural-historical psychology attempted to account for the social origins of language and thinking.  To Vygotsky, consciousness emerges from human activity mediated by artifacts (tools) and signs.</span><sup class="reference" data-dcnode-id="6426" id="cite_ref-Vyg78_12-1"><a data-dcnode-id="6427" href="#cite_note-Vyg78-12"><span data-dcnode-id="6428" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6423" id="cite_ref-56"><a data-dcnode-id="6424" href="#cite_note-56"><span data-dcnode-id="6425" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6422" instrument_node=""> </span></p><div class="thumb tright" data-dcnode-id="6412"><div class="thumbinner" data-dcnode-id="6413" style="width:287px;"><a class="image" data-dcnode-id="6419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVygotsky_Basic_Mediated_Action.jpg"><img alt="" class="thumbimage" data-dcnode-id="6420" data-file-height="1403" data-file-width="2599" decoding="async" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Vygotsky_Basic_Mediated_Action.jpg/285px-Vygotsky_Basic_Mediated_Action.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Vygotsky_Basic_Mediated_Action.jpg/428px-Vygotsky_Basic_Mediated_Action.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Vygotsky_Basic_Mediated_Action.jpg/570px-Vygotsky_Basic_Mediated_Action.jpg 2x" width="285"></a><span data-dcnode-id="6418" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6414"><div class="magnify" data-dcnode-id="6416"><a class="internal" data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVygotsky_Basic_Mediated_Action.jpg" title="Enlarge"></a></div><span data-dcnode-id="6415" instrument_node="">First Generation CHAT</span></div></div></div><p data-dcnode-id="6346"><span data-dcnode-id="6411" instrument_node=""> This idea of semiotic mediation</span><sup class="reference" data-dcnode-id="6408" id="cite_ref-57"><a data-dcnode-id="6409" href="#cite_note-57"><span data-dcnode-id="6410" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6407" instrument_node=""> is embodied in Vygotsky's famous triangular model</span><sup class="reference" data-dcnode-id="6404" id="cite_ref-58"><a data-dcnode-id="6405" href="#cite_note-58"><span data-dcnode-id="6406" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6403" instrument_node=""> which features the Subject (S), Object (O), and Mediating Artifact triad:</span><sup class="reference" data-dcnode-id="6400" id="cite_ref-59"><a data-dcnode-id="6401" href="#cite_note-59"><span data-dcnode-id="6402" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6399" instrument_node=""> in mediated action the Subject, Object, and Artifact stand in a dialectical relationship whereby each affects the other and the activity as a whole.</span><sup class="reference" data-dcnode-id="6396" id="cite_ref-Stets05_20-1"><a data-dcnode-id="6397" href="#cite_note-Stets05-20"><span data-dcnode-id="6398" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="6393" id="cite_ref-Yama07_21-1"><a data-dcnode-id="6394" href="#cite_note-Yama07-21"><span data-dcnode-id="6395" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="6390" id="cite_ref-60"><a data-dcnode-id="6391" href="#cite_note-60"><span data-dcnode-id="6392" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="6387" id="cite_ref-61"><a data-dcnode-id="6388" href="#cite_note-61"><span data-dcnode-id="6389" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6386" instrument_node=""> Vygotsky argues that the use of signs leads to a specific structure of human behavior, which breaks away from mere biological development allowing the creation of new forms of culturally-based psychological processes – hence the importance of (cultural-historical) context: individuals could no longer be understood without their cultural environment, nor society without the </span><i data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node="">agency</span></i><span data-dcnode-id="6383" instrument_node=""> of the individuals who use and produced these artifacts. The objects became cultural entities, and action oriented towards the objects became the key to understanding the human psyche.</span><sup class="reference" data-dcnode-id="6380" id="cite_ref-62"><a data-dcnode-id="6381" href="#cite_note-62"><span data-dcnode-id="6382" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6379" instrument_node=""> In the Vygotskyan framework the unit of analysis, however, remains principally the individual. First-generation activity theory has been used to understand individual behavior by examining the ways in which a person's objectivized actions are culturally </span><i data-dcnode-id="6377"><span data-dcnode-id="6378" instrument_node="">mediated</span></i><span data-dcnode-id="6376" instrument_node="">.</span><sup class="reference" data-dcnode-id="6373" id="cite_ref-63"><a data-dcnode-id="6374" href="#cite_note-63"><span data-dcnode-id="6375" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6372" instrument_node="">  Besides a strong focus on material and symbolic mediation, internalization</span><sup class="reference" data-dcnode-id="6369" id="cite_ref-64"><a data-dcnode-id="6370" href="#cite_note-64"><span data-dcnode-id="6371" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6368" instrument_node=""> of external (social, societal, and cultural) forms of mediation, another important aspect of first generation CHAT is the concept of the </span><a data-dcnode-id="6366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zone_of_proximal_development" title="Zone of proximal development"><span data-dcnode-id="6367" instrument_node="">zone of proximal development</span></a><span data-dcnode-id="6365" instrument_node=""> (ZPD),</span><sup class="reference" data-dcnode-id="6362" id="cite_ref-Vyg78_12-2"><a data-dcnode-id="6363" href="#cite_note-Vyg78-12"><span data-dcnode-id="6364" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6361" instrument_node=""> meaning, as advanced in </span><i data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">Mind in Society</span></i><span data-dcnode-id="6358" instrument_node=""> (1978), </span><i data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">"the distance between the actual developmental level as determined by independent problem solving and the level of potential development as determined through problem solving under adult guidance or in collaboration with more capable peers"</span></i><span data-dcnode-id="6355" instrument_node="">.</span><sup class="reference" data-dcnode-id="6352" id="cite_ref-65"><a data-dcnode-id="6353" href="#cite_note-65"><span data-dcnode-id="6354" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6351" instrument_node=""> ZPD is one of the major legacies of Vygotsky's work in the social sciences.</span><sup class="reference" data-dcnode-id="6348" id="cite_ref-66"><a data-dcnode-id="6349" href="#cite_note-66"><span data-dcnode-id="6350" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6347" instrument_node="">
</span></p><h4 data-dcnode-id="6335"><span data-dcnode-id="6345" id="Second_generation_.E2.80.93_Leontiev"></span><span class="mw-headline" data-dcnode-id="6343" id="Second_generation_–_Leontiev"><span data-dcnode-id="6344" instrument_node="">Second generation – Leontiev</span></span><span class="mw-editsection" data-dcnode-id="6336"><span class="mw-editsection-bracket" data-dcnode-id="6341"><span data-dcnode-id="6342" instrument_node="">[</span></span><a data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D6" title="Edit section: Second generation – Leontiev"><span data-dcnode-id="6340" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">]</span></span></span></h4><p data-dcnode-id="6298"><span data-dcnode-id="6334" instrument_node="">
While Vygotsky formulated practical human activity as the general explanatory category in human psychology, he did not fully clarify its precise nature. The second generation moves, beyond Vygotsky's individually-focused to A.N. Leontiev's</span><sup class="reference" data-dcnode-id="6331" id="cite_ref-67"><a data-dcnode-id="6332" href="#cite_note-67"><span data-dcnode-id="6333" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6330" instrument_node=""> collective model. In Engeström's</span><sup class="reference" data-dcnode-id="6327" id="cite_ref-Enge87_45-1"><a data-dcnode-id="6328" href="#cite_note-Enge87-45"><span data-dcnode-id="6329" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6326" instrument_node=""> now famous graphic depiction of second-generation activity, the unit of analysis has been expanded to include collective motivated activity toward an object, making room for understanding how collective action by social groups mediates activity.</span><sup class="reference" data-dcnode-id="6323" id="cite_ref-68"><a data-dcnode-id="6324" href="#cite_note-68"><span data-dcnode-id="6325" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6322" instrument_node=""> Hence the inclusion of </span><i data-dcnode-id="6320"><span data-dcnode-id="6321" instrument_node="">community</span></i><span data-dcnode-id="6319" instrument_node="">, </span><i data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">rules</span></i><span data-dcnode-id="6316" instrument_node="">, </span><i data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">division of labor</span></i><span data-dcnode-id="6313" instrument_node=""> and the importance of analyzing their interactions with each other.</span><sup class="reference" data-dcnode-id="6310" id="cite_ref-Enge99a_50-1"><a data-dcnode-id="6311" href="#cite_note-Enge99a-50"><span data-dcnode-id="6312" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6309" instrument_node=""> Rules may be explicit or implicit. Division of labor refers to the explicit and implicit organization of the community involved in the activity.  Engeström</span><sup class="reference" data-dcnode-id="6306" id="cite_ref-Enge87_45-2"><a data-dcnode-id="6307" href="#cite_note-Enge87-45"><span data-dcnode-id="6308" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6305" instrument_node=""> articulated the clearest distinction between classic Vygotskian psychology, which emphasizes the way semiotic and cultural systems mediate human </span><i data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">action</span></i><span data-dcnode-id="6302" instrument_node="">, and Leontiev's second-generation  CHAT, which is focused on the mediational effects of the systemic organization of human </span><i data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">activity</span></i><span data-dcnode-id="6299" instrument_node="">. </span></p><div class="thumb tright" data-dcnode-id="6289"><div class="thumbinner" data-dcnode-id="6290" style="width:287px;"><a class="image" data-dcnode-id="6296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASecond_Generation_CHAT.jpg"><img alt="" class="thumbimage" data-dcnode-id="6297" data-file-height="2351" data-file-width="3369" decoding="async" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Second_Generation_CHAT.jpg/285px-Second_Generation_CHAT.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Second_Generation_CHAT.jpg/428px-Second_Generation_CHAT.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/26/Second_Generation_CHAT.jpg/570px-Second_Generation_CHAT.jpg 2x" width="285"></a><span data-dcnode-id="6295" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6291"><div class="magnify" data-dcnode-id="6293"><a class="internal" data-dcnode-id="6294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASecond_Generation_CHAT.jpg" title="Enlarge"></a></div><span data-dcnode-id="6292" instrument_node="">Second Generation CHAT</span></div></div></div><p data-dcnode-id="6257"><span data-dcnode-id="6288" instrument_node=""> In insisting that activity only exists in relation to rules, community and division of labor, Engeström expands </span><i data-dcnode-id="6286"><span data-dcnode-id="6287" instrument_node="">the unit of analysis</span></i><span data-dcnode-id="6285" instrument_node=""> for studying human behavior from that of individual activity to a collective </span><i data-dcnode-id="6283"><span data-dcnode-id="6284" instrument_node="">activity system</span></i><span data-dcnode-id="6282" instrument_node="">.</span><sup class="reference" data-dcnode-id="6279" id="cite_ref-69"><a data-dcnode-id="6280" href="#cite_note-69"><span data-dcnode-id="6281" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="6276" id="cite_ref-70"><a data-dcnode-id="6277" href="#cite_note-70"><span data-dcnode-id="6278" instrument_node="">[70]</span></a></sup><span data-dcnode-id="6275" instrument_node=""> The collective </span><i data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">activity system</span></i><span data-dcnode-id="6272" instrument_node=""> includes the social, psychological, cultural and institutional perspectives in the analysis. In this conceptualization context or activity systems are inherently related to what Engeström argues are the deep-seated material practices and socioeconomic structures of a given culture. These societal dimensions had not been taken sufficiently into account by Vygotsky's, earlier, more 'simple' triadic model:</span><sup class="reference" data-dcnode-id="6269" id="cite_ref-71"><a data-dcnode-id="6270" href="#cite_note-71"><span data-dcnode-id="6271" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="6266" id="cite_ref-Hard07_72-0"><a data-dcnode-id="6267" href="#cite_note-Hard07-72"><span data-dcnode-id="6268" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6265" instrument_node=""> in Leontiev's understanding, thought and cognition should be understood as a part of social life – as a part of the means of production and systems of social relations on one hand, and the intentions of individuals in certain social conditions on the other.</span><sup class="reference" data-dcnode-id="6262" id="cite_ref-Leont78_15-1"><a data-dcnode-id="6263" href="#cite_note-Leont78-15"><span data-dcnode-id="6264" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="6259" id="cite_ref-73"><a data-dcnode-id="6260" href="#cite_note-73"><span data-dcnode-id="6261" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6258" instrument_node="">
</span></p><p data-dcnode-id="6207"><span data-dcnode-id="6256" instrument_node="">In his famous example of the </span><a class="external text" data-dcnode-id="6254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20041110023910/http%3A//home.hio.no/~kristihh/1_lektor/paper/hunt.htm" rel="nofollow"><span data-dcnode-id="6255" instrument_node="">'primeval collective hunt'</span></a><span data-dcnode-id="6253" instrument_node="">,</span><sup class="reference" data-dcnode-id="6250" id="cite_ref-74"><a data-dcnode-id="6251" href="#cite_note-74"><span data-dcnode-id="6252" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6249" instrument_node=""> Leontiev clarifies the crucial difference between an individual </span><i data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">action</span></i><span data-dcnode-id="6246" instrument_node=""> ("the beater frightening game") and a collective </span><i data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">activity</span></i><span data-dcnode-id="6243" instrument_node=""> ("the hunt"). While individuals' actions (frightening game) are different from the overall </span><i data-dcnode-id="6241"><span data-dcnode-id="6242" instrument_node="">goal</span></i><span data-dcnode-id="6240" instrument_node=""> of the activity (hunt), they all share in the same </span><i data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">motive</span></i><span data-dcnode-id="6237" instrument_node=""> (obtaining food). </span><i data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">Operations</span></i><span data-dcnode-id="6234" instrument_node="">, on the other hand, are driven by the conditions and tools at hand, i.e. the objective circumstances under which the hunt is taking place. To understand the separate actions of the individuals, one needs to understand the broader </span><i data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">motive</span></i><span data-dcnode-id="6231" instrument_node=""> behind the activity as a whole: this accounts for the three hierarchical levels of human functioning:</span><sup class="reference" data-dcnode-id="6228" id="cite_ref-Enge87_45-3"><a data-dcnode-id="6229" href="#cite_note-Enge87-45"><span data-dcnode-id="6230" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="6225" id="cite_ref-75"><a data-dcnode-id="6226" href="#cite_note-75"><span data-dcnode-id="6227" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6224" instrument_node=""> </span><i data-dcnode-id="6222"><span data-dcnode-id="6223" instrument_node="">object</span></i><span data-dcnode-id="6221" instrument_node="">-related motives drive the collective activity (top); </span><i data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">goals</span></i><span data-dcnode-id="6218" instrument_node=""> drive individual/group action(s) (middle); </span><i data-dcnode-id="6216"><span data-dcnode-id="6217" instrument_node="">conditions</span></i><span data-dcnode-id="6215" instrument_node=""> and </span><i data-dcnode-id="6213"><span data-dcnode-id="6214" instrument_node="">tools</span></i><span data-dcnode-id="6212" instrument_node=""> drive automated operations (lower level).</span><sup class="reference" data-dcnode-id="6209" id="cite_ref-76"><a data-dcnode-id="6210" href="#cite_note-76"><span data-dcnode-id="6211" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6208" instrument_node="">
</span></p><span data-dcnode-id="6206" instrument_node="">
</span><h4 data-dcnode-id="6195"><span data-dcnode-id="6205" id="Third_generation_.E2.80.93_Engestr.C3.B6m_et_al."></span><span class="mw-headline" data-dcnode-id="6203" id="Third_generation_–_Engeström_et_al."><span data-dcnode-id="6204" instrument_node="">Third generation – Engeström et al.</span></span><span class="mw-editsection" data-dcnode-id="6196"><span class="mw-editsection-bracket" data-dcnode-id="6201"><span data-dcnode-id="6202" instrument_node="">[</span></span><a data-dcnode-id="6199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D7" title="Edit section: Third generation – Engeström et al."><span data-dcnode-id="6200" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6197"><span data-dcnode-id="6198" instrument_node="">]</span></span></span></h4><p data-dcnode-id="6151"><span data-dcnode-id="6194" instrument_node="">
After Vygotsky's foundational work on the individual's higher psychological functions</span><sup class="reference" data-dcnode-id="6191" id="cite_ref-Vyg78_12-3"><a data-dcnode-id="6192" href="#cite_note-Vyg78-12"><span data-dcnode-id="6193" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6190" instrument_node=""> and Leontiev's extension of these insights to collective activity systems,</span><sup class="reference" data-dcnode-id="6187" id="cite_ref-77"><a data-dcnode-id="6188" href="#cite_note-77"><span data-dcnode-id="6189" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6186" instrument_node=""> questions of diversity and dialogue between different traditions or perspectives became increasingly serious challenges, when, especially in the post-1990s, activity theory 'went international'. The work of Michael Cole and Yrjö Engeström in the 1970s and 1980s – mostly in parallel, but occasionally in collaboration – brought activity theory to a much wider audience of scholars in Scandinavia and North America.</span><sup class="reference" data-dcnode-id="6183" id="cite_ref-78"><a data-dcnode-id="6184" href="#cite_note-78"><span data-dcnode-id="6185" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6182" instrument_node=""> Once the lives and biographies of all the participants and the history of the wider community are taken into account, </span><i data-dcnode-id="6180"><span data-dcnode-id="6181" instrument_node="">multiple activity systems</span></i><span data-dcnode-id="6179" instrument_node=""> need to be considered, positing, according to Engeström, the need for a "third generation" to "</span><i data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">develop conceptual tools to understand dialogue, multiple perspectives, and networks of interacting activity Systems</span></i><span data-dcnode-id="6176" instrument_node="">".</span><sup class="reference" data-dcnode-id="6173" id="cite_ref-79"><a data-dcnode-id="6174" href="#cite_note-79"><span data-dcnode-id="6175" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="6170" id="cite_ref-Enge01_80-0"><a data-dcnode-id="6171" href="#cite_note-Enge01-80"><span data-dcnode-id="6172" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="6167" id="cite_ref-Enge09a_81-0"><a data-dcnode-id="6168" href="#cite_note-Enge09a-81"><span data-dcnode-id="6169" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6166" instrument_node=""> This larger canvas of active individuals (and researchers) embedded in organizational, political, and discursive practices constitutes a tangible advantage of second- and third-generation CHAT over its earlier Vygotskian ancestor, which focused on mediated action in relative isolation</span><sup class="reference" data-dcnode-id="6163" id="cite_ref-82"><a data-dcnode-id="6164" href="#cite_note-82"><span data-dcnode-id="6165" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6162" instrument_node=""> Third-generation activity theory is the application of </span><i data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">Activity Systems Analysis</span></i><span data-dcnode-id="6159" instrument_node=""> (ASA)</span><sup class="reference" data-dcnode-id="6156" id="cite_ref-Yama10_48-1"><a data-dcnode-id="6157" href="#cite_note-Yama10-48"><span data-dcnode-id="6158" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="6153" id="cite_ref-83"><a data-dcnode-id="6154" href="#cite_note-83"><span data-dcnode-id="6155" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6152" instrument_node=""> in developmental research where investigators take a participatory and interventionist role in the participants' activities and change their experiences. </span></p><div class="thumb tright" data-dcnode-id="6142"><div class="thumbinner" data-dcnode-id="6143" style="width:287px;"><a class="image" data-dcnode-id="6149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThird_Generation_CHAT.jpg"><img alt="" class="thumbimage" data-dcnode-id="6150" data-file-height="2318" data-file-width="3385" decoding="async" height="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Third_Generation_CHAT.jpg/285px-Third_Generation_CHAT.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Third_Generation_CHAT.jpg/428px-Third_Generation_CHAT.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Third_Generation_CHAT.jpg/570px-Third_Generation_CHAT.jpg 2x" width="285"></a><span data-dcnode-id="6148" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6144"><div class="magnify" data-dcnode-id="6146"><a class="internal" data-dcnode-id="6147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThird_Generation_CHAT.jpg" title="Enlarge"></a></div><span data-dcnode-id="6145" instrument_node="">Third-generation CHAT</span></div></div></div><p data-dcnode-id="6129"><span data-dcnode-id="6141" instrument_node=""> Engeström's</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-Enge87_45-4"><a data-dcnode-id="6139" href="#cite_note-Enge87-45"><span data-dcnode-id="6140" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6137" instrument_node=""> now famous diagram, or </span><i data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">basic activity triangle</span></i><span data-dcnode-id="6134" instrument_node="">, – (which adds rules/norms, intersubjective community relations, and division of labor, as well as multiple activity systems sharing an object) – has become the principal third-generation model among the research community for analysing individuals and groups.</span><sup class="reference" data-dcnode-id="6131" id="cite_ref-84"><a data-dcnode-id="6132" href="#cite_note-84"><span data-dcnode-id="6133" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6130" instrument_node=""> Engeström summarizes the current state of CHAT with five principles:
</span></p><ol data-dcnode-id="6102"><li data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">The activity system as primary unit of analysis: the basic third-generation model includes minimally two interacting activity systems.</span></li><span data-dcnode-id="6126" instrument_node="">
</span><li data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">Multi-voicedness: an activity system is always a community of multiple points of views, traditions and interests.</span></li><span data-dcnode-id="6123" instrument_node="">
</span><li data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">Historicity: activity systems take shape and get transformed over long stretches of time. Potentials and problems can only be understood against the background of their own histories.</span></li><span data-dcnode-id="6120" instrument_node="">
</span><li data-dcnode-id="6115"><span data-dcnode-id="6119" instrument_node="">The central role of contradictions as sources of change and development.</span><sup class="reference" data-dcnode-id="6116" id="cite_ref-85"><a data-dcnode-id="6117" href="#cite_note-85"><span data-dcnode-id="6118" instrument_node="">[85]</span></a></sup></li><span data-dcnode-id="6114" instrument_node="">
</span><li data-dcnode-id="6103"><span data-dcnode-id="6113" instrument_node="">Activity Systems' possibility for </span><i data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">expansive transformation</span></i><span data-dcnode-id="6110" instrument_node=""> (cycles of qualitative transformation):  when object and motive are reconceptualized a radically wider horizon opens up.</span><sup class="reference" data-dcnode-id="6107" id="cite_ref-Enge01_80-1"><a data-dcnode-id="6108" href="#cite_note-Enge01-80"><span data-dcnode-id="6109" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="6104" id="cite_ref-86"><a data-dcnode-id="6105" href="#cite_note-86"><span data-dcnode-id="6106" instrument_node="">[86]</span></a></sup></li></ol><span data-dcnode-id="6101" instrument_node="">
</span><p data-dcnode-id="6089"><span data-dcnode-id="6100" instrument_node="">Most often, learning technologists have used third-generation CHAT as a guiding theoretical framework to understand how technologies are adopted, adapted, and configured through use in complex social situations.</span><sup class="reference" data-dcnode-id="6097" id="cite_ref-87"><a data-dcnode-id="6098" href="#cite_note-87"><span data-dcnode-id="6099" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="6094" id="cite_ref-88"><a data-dcnode-id="6095" href="#cite_note-88"><span data-dcnode-id="6096" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="6091" id="cite_ref-89"><a data-dcnode-id="6092" href="#cite_note-89"><span data-dcnode-id="6093" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6090" instrument_node="">
</span></p><span data-dcnode-id="6088" instrument_node="">
</span><h2 data-dcnode-id="6078"><span class="mw-headline" data-dcnode-id="6086" id="Informing_research_and_practice"><span data-dcnode-id="6087" instrument_node="">Informing research and practice</span></span><span class="mw-editsection" data-dcnode-id="6079"><span class="mw-editsection-bracket" data-dcnode-id="6084"><span data-dcnode-id="6085" instrument_node="">[</span></span><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D8" title="Edit section: Informing research and practice"><span data-dcnode-id="6083" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6077" instrument_node="">
</span><h3 data-dcnode-id="6067"><span class="mw-headline" data-dcnode-id="6075" id="Leontiev_and_social_development"><span data-dcnode-id="6076" instrument_node="">Leontiev and social development</span></span><span class="mw-editsection" data-dcnode-id="6068"><span class="mw-editsection-bracket" data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">[</span></span><a data-dcnode-id="6071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D9" title="Edit section: Leontiev and social development"><span data-dcnode-id="6072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6066" instrument_node="">
</span><p data-dcnode-id="6019"><span data-dcnode-id="6065" instrument_node="">From the 1960s onwards, starting in the </span><a class="mw-redirect" data-dcnode-id="6063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_South" title="Global South"><span data-dcnode-id="6064" instrument_node="">global South</span></a><span data-dcnode-id="6062" instrument_node="">, and independently from the mainstream </span><i data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">European</span></i><span data-dcnode-id="6059" instrument_node=""> developmental line,</span><sup class="reference" data-dcnode-id="6056" id="cite_ref-90"><a data-dcnode-id="6057" href="#cite_note-90"><span data-dcnode-id="6058" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6055" instrument_node=""> Leontiev's core  </span><i data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">Objective Activity</span></i><span data-dcnode-id="6052" instrument_node=""> concept</span><sup class="reference" data-dcnode-id="6049" id="cite_ref-91"><a data-dcnode-id="6050" href="#cite_note-91"><span data-dcnode-id="6051" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6048" instrument_node=""> has been used in a Social Development context. In the </span><a class="mw-redirect" data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organization_Workshop" title="Organization Workshop"><span data-dcnode-id="6047" instrument_node="">Organization Workshop</span></a><span data-dcnode-id="6045" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="6043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Group_Capacitation" title="Large Group Capacitation"><span data-dcnode-id="6044" instrument_node="">Large Group Capacitation</span></a><span data-dcnode-id="6042" instrument_node="">-method,</span><sup class="reference" data-dcnode-id="6039" id="cite_ref-92"><a data-dcnode-id="6040" href="#cite_note-92"><span data-dcnode-id="6041" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6038" instrument_node=""> </span><i data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">objective/ized activity</span></i><span data-dcnode-id="6035" instrument_node=""> acts as the core causal principle which postulates that, in order to change the mind-set of (large groups of) individuals, we need to start with changes to their activity – and/or to the object that "suggests" their activity.</span><sup class="reference" data-dcnode-id="6032" id="cite_ref-93"><a data-dcnode-id="6033" href="#cite_note-93"><span data-dcnode-id="6034" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6031" instrument_node=""> In Leontievian vein, the Organization Workshop is all about semiotically-mediated activities through which (large groups of) participants</span><sup class="reference" data-dcnode-id="6028" id="cite_ref-94"><a data-dcnode-id="6029" href="#cite_note-94"><span data-dcnode-id="6030" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6027" instrument_node=""> </span><i data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">learn how to manage themselves and the organizations they create to perform tasks that require a complex division of labor</span></i><span data-dcnode-id="6024" instrument_node="">.</span><sup class="reference" data-dcnode-id="6021" id="cite_ref-95"><a data-dcnode-id="6022" href="#cite_note-95"><span data-dcnode-id="6023" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6020" instrument_node="">
</span></p><span data-dcnode-id="6018" instrument_node="">
</span><h3 data-dcnode-id="6008"><span class="mw-headline" data-dcnode-id="6016" id="CHAT-inspired_research_and_practice_since_the_1980s"><span data-dcnode-id="6017" instrument_node="">CHAT-inspired research and practice since the 1980s</span></span><span class="mw-editsection" data-dcnode-id="6009"><span class="mw-editsection-bracket" data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">[</span></span><a data-dcnode-id="6012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D10" title="Edit section: CHAT-inspired research and practice since the 1980s"><span data-dcnode-id="6013" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6007" instrument_node="">
</span><p data-dcnode-id="5989"><span data-dcnode-id="6006" instrument_node="">Especially over the last two decades, CHAT has offered a theoretical lens informing research and practice, in that it posits that learning takes place through collective activities that are purposefully conducted around a common object.  Starting from the premise that learning is a social and cultural process that draws on historical achievements, its </span><a data-dcnode-id="6004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Systems_thinking" title="Systems thinking"><span data-dcnode-id="6005" instrument_node="">systems thinking</span></a><span data-dcnode-id="6003" instrument_node="">-based perspectives allow insights into the real world.</span><sup class="reference" data-dcnode-id="6000" id="cite_ref-Enge01_80-2"><a data-dcnode-id="6001" href="#cite_note-Enge01-80"><span data-dcnode-id="6002" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="5997" id="cite_ref-Enge09a_81-1"><a data-dcnode-id="5998" href="#cite_note-Enge09a-81"><span data-dcnode-id="5999" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="5994" id="cite_ref-96"><a data-dcnode-id="5995" href="#cite_note-96"><span data-dcnode-id="5996" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="5991" id="cite_ref-Foot14_97-0"><a data-dcnode-id="5992" href="#cite_note-Foot14-97"><span data-dcnode-id="5993" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5990" instrument_node="">
</span></p><span data-dcnode-id="5988" instrument_node="">
</span><h4 data-dcnode-id="5977"><span data-dcnode-id="5987" id="Change_Laboratory_.28CL.29"></span><span class="mw-headline" data-dcnode-id="5985" id="Change_Laboratory_(CL)"><span data-dcnode-id="5986" instrument_node="">Change Laboratory (CL)</span></span><span class="mw-editsection" data-dcnode-id="5978"><span class="mw-editsection-bracket" data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">[</span></span><a data-dcnode-id="5981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D11" title="Edit section: Change Laboratory (CL)"><span data-dcnode-id="5982" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5976" instrument_node="">
</span><p data-dcnode-id="5879"><span data-dcnode-id="5975" instrument_node="">Change Laboratory (CL) is a CHAT-based method for formative intervention in activity systems and for research on their developmental potential as well as processes of expansive learning, collaborative concept-formation, and transformation of practices, elaborated in the mid-nineties</span><sup class="reference" data-dcnode-id="5972" id="cite_ref-98"><a data-dcnode-id="5973" href="#cite_note-98"><span data-dcnode-id="5974" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="5969" id="cite_ref-99"><a data-dcnode-id="5970" href="#cite_note-99"><span data-dcnode-id="5971" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5968" instrument_node=""> by the Finnish Developmental Work Research </span><a class="external text" data-dcnode-id="5966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20150121135314/http%3A//www.edu.helsinki.fi/activity/" rel="nofollow"><span data-dcnode-id="5967" instrument_node="">(DWR)</span></a><span data-dcnode-id="5965" instrument_node=""> group.</span><sup class="reference" data-dcnode-id="5962" id="cite_ref-100"><a data-dcnode-id="5963" href="#cite_note-100"><span data-dcnode-id="5964" instrument_node="">[100]</span></a></sup><sup class="reference" data-dcnode-id="5959" id="cite_ref-Enge05a_101-0"><a data-dcnode-id="5960" href="#cite_note-Enge05a-101"><span data-dcnode-id="5961" instrument_node="">[101]</span></a></sup><span data-dcnode-id="5958" instrument_node="">
The CL method relies on collaboration between the practitioners of the activity being analyzed and transformed, and academic researchers or interventionists supporting and facilitating collective developmental processes.</span><sup class="reference" data-dcnode-id="5955" id="cite_ref-Enge01_80-3"><a data-dcnode-id="5956" href="#cite_note-Enge01-80"><span data-dcnode-id="5957" instrument_node="">[80]</span></a></sup><span data-dcnode-id="5954" instrument_node=""> On the basis of Engeström's theory of </span><i data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">expansive learning</span></i><span data-dcnode-id="5951" instrument_node="">,</span><sup class="reference" data-dcnode-id="5948" id="cite_ref-Enge87_45-5"><a data-dcnode-id="5949" href="#cite_note-Enge87-45"><span data-dcnode-id="5950" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="5945" id="cite_ref-102"><a data-dcnode-id="5946" href="#cite_note-102"><span data-dcnode-id="5947" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5944" instrument_node=""> the foundation of an interventionist research approach at DWR</span><sup class="reference" data-dcnode-id="5941" id="cite_ref-Enge05a_101-1"><a data-dcnode-id="5942" href="#cite_note-Enge05a-101"><span data-dcnode-id="5943" instrument_node="">[101]</span></a></sup><span data-dcnode-id="5940" instrument_node=""> was elaborated in the 1980s, and developed further in the 1990s as an intervention method now known as </span><i data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">Change Laboratory</span></i><span data-dcnode-id="5937" instrument_node="">.</span><sup class="reference" data-dcnode-id="5934" id="cite_ref-EngeVirkk_103-0"><a data-dcnode-id="5935" href="#cite_note-EngeVirkk-103"><span data-dcnode-id="5936" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="5931" id="cite_ref-CRAD09_104-0"><a data-dcnode-id="5932" href="#cite_note-CRAD09-104"><span data-dcnode-id="5933" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5930" instrument_node=""> CL interventions are used both to study the conditions of change and to help those working in organizations to develop their work, drawing on participant observation, interviews, and the recording and videotaping of meetings and work practices.  Initially, with the help of an external interventionist, the first stimulus that </span><i data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">is beyond the actors' present capabilities</span></i><span data-dcnode-id="5927" instrument_node="">, is produced in the Change Laboratory by collecting first-hand empirical data on problematic aspects of the activity. This data may comprise difficult client cases, descriptions of recurrent disturbances and ruptures in the process of producing the outcome. Steps in the CL process: Step 1 Questioning; Step 2 Analysis;  Step 3 Modeling; Step 4 Examining; Step 5 Implementing; Step 6 Reflecting; Step 7 Consolidating.  These seven action steps for increased understanding are described by Engeström as </span><i data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">expansive learning</span></i><span data-dcnode-id="5924" instrument_node="">, or phases of an outwardly expanding spiral,</span><sup class="reference" data-dcnode-id="5921" id="cite_ref-105"><a data-dcnode-id="5922" href="#cite_note-105"><span data-dcnode-id="5923" instrument_node="">[105]</span></a></sup><span data-dcnode-id="5920" instrument_node=""> while multiple kinds of actions can take place at any time.</span><sup class="reference" data-dcnode-id="5917" id="cite_ref-106"><a data-dcnode-id="5918" href="#cite_note-106"><span data-dcnode-id="5919" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5916" instrument_node=""> The phases of the model simply allow for the identification and analysis of the dominant action type during a particular period of time. These learning act
