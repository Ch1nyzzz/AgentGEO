ions are provoked by contradictions.</span><sup class="reference" data-dcnode-id="5913" id="cite_ref-107"><a data-dcnode-id="5914" href="#cite_note-107"><span data-dcnode-id="5915" instrument_node="">[107]</span></a></sup><sup class="reference" data-dcnode-id="5910" id="cite_ref-108"><a data-dcnode-id="5911" href="#cite_note-108"><span data-dcnode-id="5912" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5909" instrument_node=""> CL is used by a team or work unit or by collaborating partners across the organizational boundaries, initially with the help of an interventionist-researcher.</span><sup class="reference" data-dcnode-id="5906" id="cite_ref-Foot14_97-1"><a data-dcnode-id="5907" href="#cite_note-Foot14-97"><span data-dcnode-id="5908" instrument_node="">[97]</span></a></sup><sup class="reference" data-dcnode-id="5903" id="cite_ref-EngeVirkk_103-1"><a data-dcnode-id="5904" href="#cite_note-EngeVirkk-103"><span data-dcnode-id="5905" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5902" instrument_node=""> The CL method has been used in agricultural contexts,</span><sup class="reference" data-dcnode-id="5899" id="cite_ref-109"><a data-dcnode-id="5900" href="#cite_note-109"><span data-dcnode-id="5901" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5898" instrument_node=""> educational and media settings,</span><sup class="reference" data-dcnode-id="5895" id="cite_ref-110"><a data-dcnode-id="5896" href="#cite_note-110"><span data-dcnode-id="5897" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5894" instrument_node=""> health care</span><sup class="reference" data-dcnode-id="5891" id="cite_ref-111"><a data-dcnode-id="5892" href="#cite_note-111"><span data-dcnode-id="5893" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="5888" id="cite_ref-112"><a data-dcnode-id="5889" href="#cite_note-112"><span data-dcnode-id="5890" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5887" instrument_node=""> and learning support.</span><sup class="reference" data-dcnode-id="5884" id="cite_ref-113"><a data-dcnode-id="5885" href="#cite_note-113"><span data-dcnode-id="5886" instrument_node="">[113]</span></a></sup><sup class="reference" data-dcnode-id="5881" id="cite_ref-114"><a data-dcnode-id="5882" href="#cite_note-114"><span data-dcnode-id="5883" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5880" instrument_node="">
</span></p><span data-dcnode-id="5878" instrument_node="">
</span><h4 data-dcnode-id="5867"><span data-dcnode-id="5877" id="Activity_systems_analysis_.28ASA.29"></span><span class="mw-headline" data-dcnode-id="5875" id="Activity_systems_analysis_(ASA)"><span data-dcnode-id="5876" instrument_node="">Activity systems analysis (ASA)</span></span><span class="mw-editsection" data-dcnode-id="5868"><span class="mw-editsection-bracket" data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">[</span></span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D12" title="Edit section: Activity systems analysis (ASA)"><span data-dcnode-id="5872" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5866" instrument_node="">
</span><p data-dcnode-id="5799"><i data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">Activity systems analysis</span></i><span data-dcnode-id="5863" instrument_node=""> is a CHAT-based method,</span><sup class="reference" data-dcnode-id="5860" id="cite_ref-115"><a data-dcnode-id="5861" href="#cite_note-115"><span data-dcnode-id="5862" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5859" instrument_node=""> discussed in </span><a data-dcnode-id="5857" href="#CITEREFEngestr%C3%B6m1987"><span data-dcnode-id="5858" instrument_node="">Engeström 1987</span></a><span data-dcnode-id="5856" instrument_node="">/</span><a data-dcnode-id="5854" href="#CITEREFEngestr%C3%B6m1993"><span data-dcnode-id="5855" instrument_node="">Engeström 1993</span></a><span data-dcnode-id="5853" instrument_node=""> and in Cole &amp; Engeström, 1993,</span><sup class="reference" data-dcnode-id="5850" id="cite_ref-116"><a data-dcnode-id="5851" href="#cite_note-116"><span data-dcnode-id="5852" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5849" instrument_node=""> for understanding human activity in real-world situations with data collection, analysis, and presentation methods that address the complexities of human activity in natural settings aimed to advance both theory and practice. It is based on Vygotsky's concept of mediated action and captures human activity in a triangle model that includes the subject, tool, object, rule, community, and division of labor.</span><sup class="reference" data-dcnode-id="5846" id="cite_ref-Enge87_45-6"><a data-dcnode-id="5847" href="#cite_note-Enge87-45"><span data-dcnode-id="5848" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5845" instrument_node=""> Subjects are participants in an activity, motivated toward a purpose or attainment of the object. The object can be the goal of an activity, the subject's motives for participating in an activity, and the material products that subjects gain through an activity. Tools are socially shared cognitive and/or material resources that subjects can use to attain the object. Informal or formal rules regulate the subject's participation while engaging in an activity. The community is the group or organization to which subjects belong. The division of labor is the shared participation responsibilities in the activity determined by the community. Finally, the outcome is the consequences that the subject faces because of his/her actions driven by the object. These outcomes can encourage or hinder the subject's participation in future activities.</span><sup class="reference" data-dcnode-id="5842" id="cite_ref-117"><a data-dcnode-id="5843" href="#cite_note-117"><span data-dcnode-id="5844" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5841" instrument_node=""> In Part 2 of her video "</span><i data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">Using Activity Theory to understand human behaviour</span></i><span data-dcnode-id="5838" instrument_node="">", </span><a data-dcnode-id="5836" href="#CITEREFvan_der_Riet2010"><span data-dcnode-id="5837" instrument_node="">van der Riet 2010</span></a><span data-dcnode-id="5835" instrument_node=""> shows how activity theory is applied to the problem of behavior change and HIV and AIDs (in South Africa). The video focuses on sexual activity as the activity of the system and illustrates how an </span><i data-dcnode-id="5833"><span data-dcnode-id="5834" instrument_node="">Activity System Analysis</span></i><span data-dcnode-id="5832" instrument_node="">, through a historical and current account of the activity, provides a way of understanding the lack of behavior change in response to HIV and AIDS. In her eponymous book </span><i data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">"Activity Systems Analysis Methods."</span></i><span data-dcnode-id="5829" instrument_node="">, </span><a data-dcnode-id="5827" href="#CITEREFYamagata-Lynch2010"><span data-dcnode-id="5828" instrument_node="">Yamagata-Lynch 2010</span></a><span data-dcnode-id="5826" instrument_node="">, p.&nbsp;37ss describes seven ASA case studies which fall </span><i data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">"into four distinct work clusters. These clusters include works that help (a) understand developmental work research (DWR), (b) describe real-world learning situations, (c) design human-computer interaction systems, and (d) plan solutions to complicated work-based problems"</span></i><span data-dcnode-id="5823" instrument_node="">. Other uses of ASA: Summarizing organizational change;</span><sup class="reference" data-dcnode-id="5820" id="cite_ref-118"><a data-dcnode-id="5821" href="#cite_note-118"><span data-dcnode-id="5822" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5819" instrument_node=""> Identifying guidelines for designing Constructivist Learning Environments;</span><sup class="reference" data-dcnode-id="5816" id="cite_ref-119"><a data-dcnode-id="5817" href="#cite_note-119"><span data-dcnode-id="5818" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5815" instrument_node=""> Identifying contradictions and tensions that shape developments in educational settings;</span><sup class="reference" data-dcnode-id="5812" id="cite_ref-Yama07_21-2"><a data-dcnode-id="5813" href="#cite_note-Yama07-21"><span data-dcnode-id="5814" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="5809" id="cite_ref-Yama10_48-2"><a data-dcnode-id="5810" href="#cite_note-Yama10-48"><span data-dcnode-id="5811" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5808" instrument_node=""> Demonstrating historical developments in organizational learning.,</span><sup class="reference" data-dcnode-id="5805" id="cite_ref-120"><a data-dcnode-id="5806" href="#cite_note-120"><span data-dcnode-id="5807" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5804" instrument_node=""> and Evaluating K–12 school and university partnership relations.</span><sup class="reference" data-dcnode-id="5801" id="cite_ref-121"><a data-dcnode-id="5802" href="#cite_note-121"><span data-dcnode-id="5803" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5800" instrument_node="">
</span></p><span data-dcnode-id="5798" instrument_node="">
</span><h4 data-dcnode-id="5787"><span data-dcnode-id="5797" id="Human.E2.80.93computer_interaction_.28HCI.29"></span><span class="mw-headline" data-dcnode-id="5795" id="Human–computer_interaction_(HCI)"><span data-dcnode-id="5796" instrument_node="">Human–computer interaction (HCI)</span></span><span class="mw-editsection" data-dcnode-id="5788"><span class="mw-editsection-bracket" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">[</span></span><a data-dcnode-id="5791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D13" title="Edit section: Human–computer interaction (HCI)"><span data-dcnode-id="5792" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5786" instrument_node="">
</span><p data-dcnode-id="5747"><span data-dcnode-id="5785" instrument_node="">When HCI</span><sup class="reference" data-dcnode-id="5782" id="cite_ref-122"><a data-dcnode-id="5783" href="#cite_note-122"><span data-dcnode-id="5784" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5781" instrument_node=""> first appeared on the scene as a separate field of study in the early 1980s, HCI adopted the </span><a data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_processing" title="Information processing"><span data-dcnode-id="5780" instrument_node="">information processing</span></a><span data-dcnode-id="5778" instrument_node=""> paradigm of computer science as the model for human cognition, predicated on prevalent </span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_psychology" title="Cognitive psychology"><span data-dcnode-id="5777" instrument_node="">cognitive psychology</span></a><span data-dcnode-id="5775" instrument_node=""> criteria, which, it was soon realized, failed to account for individuals' interests, needs and frustrations involved, nor of the fact that the technology critically depends on complex, meaningful, social, and dynamic contexts in which it takes place.</span><sup class="reference" data-dcnode-id="5772" id="cite_ref-123"><a data-dcnode-id="5773" href="#cite_note-123"><span data-dcnode-id="5774" instrument_node="">[123]</span></a></sup><sup class="reference" data-dcnode-id="5769" id="cite_ref-124"><a data-dcnode-id="5770" href="#cite_note-124"><span data-dcnode-id="5771" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5768" instrument_node=""> Adopting a CHAT theoretical perspective had important implications for understanding how people use interactive technologies: the realization, for example, that a computer is typically an object of activity rather than a mediating artefact means that people interact with the world through computers, rather than with computer 'objects'.</span><sup class="reference" data-dcnode-id="5765" id="cite_ref-KaptNard6_4-1"><a data-dcnode-id="5766" href="#cite_note-KaptNard6-4"><span data-dcnode-id="5767" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5762" id="cite_ref-125"><a data-dcnode-id="5763" href="#cite_note-125"><span data-dcnode-id="5764" instrument_node="">[125]</span></a></sup><sup class="reference" data-dcnode-id="5759" id="cite_ref-126"><a data-dcnode-id="5760" href="#cite_note-126"><span data-dcnode-id="5761" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5758" instrument_node=""> A number of diverse methodologies outlining techniques for human–computer interaction design have emerged since the rise of the field in the 1980s. Most design methodologies stem from a model for how users, designers, and technical systems interact. </span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bonnie_Nardi" title="Bonnie Nardi"><span data-dcnode-id="5757" instrument_node="">Bonnie Nardi</span></a><span data-dcnode-id="5755" instrument_node=""> produced the – hitherto – most applicable collection of activity theoretical HCI literature.</span><sup class="reference" data-dcnode-id="5752" id="cite_ref-KaptNard6_4-2"><a data-dcnode-id="5753" href="#cite_note-KaptNard6-4"><span data-dcnode-id="5754" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5749" id="cite_ref-127"><a data-dcnode-id="5750" href="#cite_note-127"><span data-dcnode-id="5751" instrument_node="">[127]</span></a></sup><span data-dcnode-id="5748" instrument_node="">
</span></p><span data-dcnode-id="5746" instrument_node="">
</span><h4 data-dcnode-id="5735"><span data-dcnode-id="5745" id="Systemic-structural_activity_theory_.28SSAT.29"></span><span class="mw-headline" data-dcnode-id="5743" id="Systemic-structural_activity_theory_(SSAT)"><span data-dcnode-id="5744" instrument_node="">Systemic-structural activity theory (SSAT)</span></span><span class="mw-editsection" data-dcnode-id="5736"><span class="mw-editsection-bracket" data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">[</span></span><a data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D14" title="Edit section: Systemic-structural activity theory (SSAT)"><span data-dcnode-id="5740" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5737"><span data-dcnode-id="5738" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5734" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5733" instrument_node="">SSAT builds on the general theory of activity to provide an effective basis for both experimental and analytic methods of studying human performance, using carefully developed units of analysis</span><sup class="reference" data-dcnode-id="5730" id="cite_ref-128"><a data-dcnode-id="5731" href="#cite_note-128"><span data-dcnode-id="5732" instrument_node="">[128]</span></a></sup><span data-dcnode-id="5729" instrument_node=""> SSAT approaches cognition both as a process and as a structured system of actions or other functional information-processing units, developing a taxonomy of human activity through the use of structurally organized units of analysis. The systemic-structural approach to activity design and analysis involves identifying the available means of work, tools and objects; their relationship with possible strategies of work activity; existing constraints on activity performance; social norms and rules; possible stages of object transformation; and changes in the structure of activity during skills acquisition.This method is demonstrated by applying it to the study of a human–computer interaction task.</span><sup class="reference" data-dcnode-id="5726" id="cite_ref-129"><a data-dcnode-id="5727" href="#cite_note-129"><span data-dcnode-id="5728" instrument_node="">[129]</span></a></sup><span data-dcnode-id="5725" instrument_node="">
</span></p><span data-dcnode-id="5723" instrument_node="">
</span><h2 data-dcnode-id="5713"><span class="mw-headline" data-dcnode-id="5721" id="Future"><span data-dcnode-id="5722" instrument_node="">Future</span></span><span class="mw-editsection" data-dcnode-id="5714"><span class="mw-editsection-bracket" data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">[</span></span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D15" title="Edit section: Future"><span data-dcnode-id="5718" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5712" instrument_node="">
</span><h3 data-dcnode-id="5702"><span class="mw-headline" data-dcnode-id="5710" id="Evolving_field_of_study"><span data-dcnode-id="5711" instrument_node="">Evolving field of study</span></span><span class="mw-editsection" data-dcnode-id="5703"><span class="mw-editsection-bracket" data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">[</span></span><a data-dcnode-id="5706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D16" title="Edit section: Evolving field of study"><span data-dcnode-id="5707" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5701" instrument_node="">
</span><p data-dcnode-id="5627"><span data-dcnode-id="5700" instrument_node="">The strengths of CHAT are grounded both in its long historical roots and extensive contemporary use: it offers a philosophical and cross-disciplinary perspective for analyzing diverse human practices as development processes in which both individual and social levels are interlinked, as well as interactions and boundary-crossings.</span><sup class="reference" data-dcnode-id="5697" id="cite_ref-AkkerBakker_54-1"><a data-dcnode-id="5698" href="#cite_note-AkkerBakker-54"><span data-dcnode-id="5699" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5694" id="cite_ref-130"><a data-dcnode-id="5695" href="#cite_note-130"><span data-dcnode-id="5696" instrument_node="">[130]</span></a></sup><span data-dcnode-id="5693" instrument_node=""> between activity systems</span><sup class="reference" data-dcnode-id="5690" id="cite_ref-131"><a data-dcnode-id="5691" href="#cite_note-131"><span data-dcnode-id="5692" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="5687" id="cite_ref-132"><a data-dcnode-id="5688" href="#cite_note-132"><span data-dcnode-id="5689" instrument_node="">[132]</span></a></sup><span data-dcnode-id="5686" instrument_node=""> More recently, the focus of studies of organizational learning has increasingly shifted away from learning within single organizations or organizational units, towards learning in multi‐organizational or inter‐organizational networks, as well as to the exploration and better understanding of interactions in their social context, multiple contexts and cultures, and the dynamics and development of particular activities. This shift has generated, among others, such concepts as "networks of learning"</span><sup class="reference" data-dcnode-id="5683" id="cite_ref-133"><a data-dcnode-id="5684" href="#cite_note-133"><span data-dcnode-id="5685" instrument_node="">[133]</span></a></sup><span data-dcnode-id="5682" instrument_node=""> and "</span><a data-dcnode-id="5680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Networked_learning" title="Networked learning"><span data-dcnode-id="5681" instrument_node="">networked learning</span></a><span data-dcnode-id="5679" instrument_node="">",</span><sup class="reference" data-dcnode-id="5676" id="cite_ref-134"><a data-dcnode-id="5677" href="#cite_note-134"><span data-dcnode-id="5678" instrument_node="">[134]</span></a></sup><sup class="reference" data-dcnode-id="5673" id="cite_ref-135"><a data-dcnode-id="5674" href="#cite_note-135"><span data-dcnode-id="5675" instrument_node="">[135]</span></a></sup><span data-dcnode-id="5672" instrument_node=""> </span><a data-dcnode-id="5670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coworking" title="Coworking"><span data-dcnode-id="5671" instrument_node="">coworking</span></a><span data-dcnode-id="5669" instrument_node="">,</span><sup class="reference" data-dcnode-id="5666" id="cite_ref-EngSann_136-0"><a data-dcnode-id="5667" href="#cite_note-EngSann-136"><span data-dcnode-id="5668" instrument_node="">[136]</span></a></sup><span data-dcnode-id="5665" instrument_node=""> and knotworking.</span><sup class="reference" data-dcnode-id="5662" id="cite_ref-Enge04_137-0"><a data-dcnode-id="5663" href="#cite_note-Enge04-137"><span data-dcnode-id="5664" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="5659" id="cite_ref-138"><a data-dcnode-id="5660" href="#cite_note-138"><span data-dcnode-id="5661" instrument_node="">[138]</span></a></sup><span data-dcnode-id="5658" instrument_node=""> Industry of late has seen strong growth in nonemployer firms (NEFs), thanks to changes in long-term employment trends and developments in mobile technology</span><sup class="reference" data-dcnode-id="5655" id="cite_ref-139"><a data-dcnode-id="5656" href="#cite_note-139"><span data-dcnode-id="5657" instrument_node="">[139]</span></a></sup><span data-dcnode-id="5654" instrument_node=""> which have led to more work from remote locations, more distance collaboration, and more work organized around temporary projects.</span><sup class="reference" data-dcnode-id="5651" id="cite_ref-Spin14_140-0"><a data-dcnode-id="5652" href="#cite_note-Spin14-140"><span data-dcnode-id="5653" instrument_node="">[140]</span></a></sup><span data-dcnode-id="5650" instrument_node=""> Developments such as these and new forms of social production or </span><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commons-based_peer_production" title="Commons-based peer production"><span data-dcnode-id="5649" instrument_node="">commons-based peer production</span></a><span data-dcnode-id="5647" instrument_node="">, such as e.g. </span><a data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_source" title="Open source"><span data-dcnode-id="5646" instrument_node="">open source</span></a><sup class="reference" data-dcnode-id="5642" id="cite_ref-141"><a data-dcnode-id="5643" href="#cite_note-141"><span data-dcnode-id="5644" instrument_node="">[141]</span></a></sup><span data-dcnode-id="5641" instrument_node=""> development and cultural production in </span><a data-dcnode-id="5639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peer-to-peer" title="Peer-to-peer"><span data-dcnode-id="5640" instrument_node="">peer-to-peer</span></a><span data-dcnode-id="5638" instrument_node=""> (P2P) networks, have become a key focus in Engeström's more recent work.</span><sup class="reference" data-dcnode-id="5635" id="cite_ref-Enge04_137-1"><a data-dcnode-id="5636" href="#cite_note-Enge04-137"><span data-dcnode-id="5637" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="5632" id="cite_ref-142"><a data-dcnode-id="5633" href="#cite_note-142"><span data-dcnode-id="5634" instrument_node="">[142]</span></a></sup><sup class="reference" data-dcnode-id="5629" id="cite_ref-143"><a data-dcnode-id="5630" href="#cite_note-143"><span data-dcnode-id="5631" instrument_node="">[143]</span></a></sup><span data-dcnode-id="5628" instrument_node="">
</span></p><span data-dcnode-id="5626" instrument_node="">
</span><h3 data-dcnode-id="5615"><span data-dcnode-id="5625" id=".22Fourth_generation.22"></span><span class="mw-headline" data-dcnode-id="5623" id="&quot;Fourth_generation&quot;"><span data-dcnode-id="5624" instrument_node="">"Fourth generation"</span></span><span class="mw-editsection" data-dcnode-id="5616"><span class="mw-editsection-bracket" data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">[</span></span><a data-dcnode-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural-historical_activity_theory%26action%3Dedit%26section%3D17" title="Edit section: &quot;Fourth generation&quot;"><span data-dcnode-id="5620" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5617"><span data-dcnode-id="5618" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5614" instrument_node="">
</span><p data-dcnode-id="5561"><span data-dcnode-id="5613" instrument_node="">The rapid rise of new forms of activities characterised by web-based social and participatory practices,</span><sup class="reference" data-dcnode-id="5610" id="cite_ref-144"><a data-dcnode-id="5611" href="#cite_note-144"><span data-dcnode-id="5612" instrument_node="">[144]</span></a></sup><span data-dcnode-id="5609" instrument_node=""> 
,</span><sup class="reference" data-dcnode-id="5606" id="cite_ref-145"><a data-dcnode-id="5607" href="#cite_note-145"><span data-dcnode-id="5608" instrument_node="">[145]</span></a></sup><span data-dcnode-id="5605" instrument_node=""> phenomena such as </span><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Distributed_workforce" title="Distributed workforce"><span data-dcnode-id="5604" instrument_node="">distributed workforce</span></a><span data-dcnode-id="5602" instrument_node=""> and the dominance of knowledge work, prompts a rethink of the third-generation model, bringing with it the need, as suggested by Engestrōm, for a new, </span><i data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">fourth generation</span></i><span data-dcnode-id="5599" instrument_node=""> activity system model.</span><sup class="reference" data-dcnode-id="5596" id="cite_ref-146"><a data-dcnode-id="5597" href="#cite_note-146"><span data-dcnode-id="5598" instrument_node="">[146]</span></a></sup><sup class="reference" data-dcnode-id="5593" id="cite_ref-147"><a data-dcnode-id="5594" href="#cite_note-147"><span data-dcnode-id="5595" instrument_node="">[147]</span></a></sup><span data-dcnode-id="5592" instrument_node=""> which activity theorists indeed have been working on in recent years.</span><sup class="reference" data-dcnode-id="5589" id="cite_ref-Daniels10_3-1"><a data-dcnode-id="5590" href="#cite_note-Daniels10-3"><span data-dcnode-id="5591" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="5586" id="cite_ref-EngSann_136-1"><a data-dcnode-id="5587" href="#cite_note-EngSann-136"><span data-dcnode-id="5588" instrument_node="">[136]</span></a></sup><sup class="reference" data-dcnode-id="5583" id="cite_ref-148"><a data-dcnode-id="5584" href="#cite_note-148"><span data-dcnode-id="5585" instrument_node="">[148]</span></a></sup><span data-dcnode-id="5582" instrument_node=""> In fourth generation CHAT, the object(ive) will typically comprise multiple perspectives and contexts and be inherently transient; collaborations between actors, too, are likely to be temporary, with multiple boundary crossings between interrelated activities.</span><sup class="reference" data-dcnode-id="5579" id="cite_ref-AkkerBakker_54-2"><a data-dcnode-id="5580" href="#cite_note-AkkerBakker-54"><span data-dcnode-id="5581" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5578" instrument_node=""> Fourth-generation activity theorists have specifically developed activity theory to better accommodate Castells's (and others') insights into how work organization has shifted in the </span><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Network_society" title="Network society"><span data-dcnode-id="5577" instrument_node="">network society</span></a><span data-dcnode-id="5575" instrument_node="">: they hence will focus less on the workings of individual activity systems (often represented by triangles) and more on the interactions across activity systems functioning in networks.</span><sup class="reference" data-dcnode-id="5572" id="cite_ref-Spin14_140-1"><a data-dcnode-id="5573" href="#cite_note-Spin14-140"><span data-dcnode-id="5574" instrument_node="">[140]</span></a></sup><sup class="reference" data-dcnode-id="5569" id="cite_ref-149"><a data-dcnode-id="5570" href="#cite_note-149"><span data-dcnode-id="5571" instrument_node="">[149]</span></a></sup><sup class="reference" data-dcnode-id="5566" id="cite_ref-150"><a data-dcnode-id="5567" href="#cite_note-150"><span data-dcnode-id="5568" instrument_node="">[150]</span></a></sup><span data-dcnode-id="5565" instrument_node=""> The 2017 ISCAR congress (August, Quebec City) has the following theme: ''</span><i data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">Taking a 360° view of the landscape of cultural-historical activity research:The state of our scholarship in practice</span></i><span data-dcnode-id="5562" instrument_node="">.

nt_node=""> 1 September 2014 at </span><a data-dcnode-id="3845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archive.today" title="Archive.today"><span data-dcnode-id="3846" instrument_node="">archive.today</span></a><span data-dcnode-id="3844" instrument_node="">. Engeström would be happy to also include [in the account of A.T.] reference to Luria, Zinchenko (father, Peter, and son, Vladimir), Elkonin, Davydov and  Brushlinsky (as well as to various other figures who have influenced activity-theory in the West, such as Dewey, Mead, and Wittgenstein). </span><a data-dcnode-id="3842" href="#CITEREFBakhurst2009"><span data-dcnode-id="3843" instrument_node="">Bakhurst 2009</span></a><span data-dcnode-id="3841" instrument_node="">, p.&nbsp;201</span></span><span data-dcnode-id="3839" instrument_node="">

</span><li data-dcnode-id="3816" id="cite_note-11"><span class="mw-cite-backlink" data-dcnode-id="3833"><b data-dcnode-id="3834"><a aria-label="Jump up" data-dcnode-id="3835" href="#cite_ref-11" title="Jump up"><span data-dcnode-id="3836" instrument_node="">^</span></a></b></span><span data-dcnode-id="3832" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3818"><span data-dcnode-id="3831" instrument_node="">Political restrictions in its country of origin (Stalinist Russia) had suppressed the cultural-historical psychology – also known as the Vygotsky School – in the mid-thirties. This meant that the core "</span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Activity_theory" title="Activity theory"><span data-dcnode-id="3830" instrument_node="">activity</span></a><span data-dcnode-id="3828" instrument_node="">" concept remained confined to the field of psychology, although </span><a data-dcnode-id="3826" href="#CITEREFBlunden2011"><span data-dcnode-id="3827" instrument_node="">Blunden 2011</span></a><span data-dcnode-id="3825" instrument_node="">, in "</span><i data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">An Interdisciplinary Theory of Activity</span></i><span data-dcnode-id="3822" instrument_node="">", argues that it has the potential to evolve as a genuinely interdisciplinary concept. See also </span><a data-dcnode-id="3820" href="#CITEREFNussbaumer2012"><span data-dcnode-id="3821" instrument_node="">Nussbaumer 2012</span></a><span data-dcnode-id="3819" instrument_node="">, p.&nbsp;37</span></span><span data-dcnode-id="3817" instrument_node="">

</span><li data-dcnode-id="3595" id="cite_note-22"><span class="mw-cite-backlink" data-dcnode-id="3615"><b data-dcnode-id="3616"><a aria-label="Jump up" data-dcnode-id="3617" href="#cite_ref-22" title="Jump up"><span data-dcnode-id="3618" instrument_node="">^</span></a></b></span><span data-dcnode-id="3614" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3597"><span data-dcnode-id="3613" instrument_node="">In particular Goethe's </span><a class="external text" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//home.mira.net/~andy/works/goethe.htm" rel="nofollow"><span data-dcnode-id="3612" instrument_node="">romantic science</span></a><span data-dcnode-id="3610" instrument_node=""> </span><a class="external text" data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20151003123616/http%3A//home.mira.net/~andy/works/goethe.htm" rel="nofollow"><span data-dcnode-id="3609" instrument_node="">Archived</span></a><span data-dcnode-id="3607" instrument_node=""> 3 October 2015 at the </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wayback_Machine" title="Wayback Machine"><span data-dcnode-id="3606" instrument_node="">Wayback Machine</span></a><span data-dcnode-id="3604" instrument_node=""> ideas which were later taken up by </span><a class="mw-redirect" data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hegel" title="Hegel"><span data-dcnode-id="3603" instrument_node="">Hegel</span></a><span data-dcnode-id="3601" instrument_node="">. The meaning of "activity" in the conceptual sense is rooted in the German word </span><i data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Tätigkeit</span></i><span data-dcnode-id="3598" instrument_node="">. Hegel is considered the first philosopher to point out that the development of humans' knowledge is not spiritually given, but developed in history from living and working in natural environments.</span></span><span data-dcnode-id="3596" instrument_node="">

</span><li data-dcnode-id="3533" id="cite_note-26"><span class="mw-cite-backlink" data-dcnode-id="3544"><b data-dcnode-id="3545"><a aria-label="Jump up" data-dcnode-id="3546" href="#cite_ref-26" title="Jump up"><span data-dcnode-id="3547" instrument_node="">^</span></a></b></span><span data-dcnode-id="3543" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3535"><span data-dcnode-id="3542" instrument_node="">"</span><i data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">A human individual never reacts directly (or merely with inborn reflexes) to the environment. Consciousness and conscious action must be the central object of study for psychological science, since it is this that distinguishes humanity. The relationship between human agent and objects of the environment is mediated by cultural means, tools and signs. Human action has a tripartite structure.</span></i><span data-dcnode-id="3539" instrument_node="">"(</span><a data-dcnode-id="3537" href="#CITEREFCRADLE2009"><span data-dcnode-id="3538" instrument_node="">CRADLE 2009</span></a><span data-dcnode-id="3536" instrument_node="">)</span></span><span data-dcnode-id="3534" instrument_node="">

</span><li data-dcnode-id="2832" id="cite_note-59"><span class="mw-cite-backlink" data-dcnode-id="2839"><b data-dcnode-id="2840"><a aria-label="Jump up" data-dcnode-id="2841" href="#cite_ref-59" title="Jump up"><span data-dcnode-id="2842" instrument_node="">^</span></a></b></span><span data-dcnode-id="2838" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2834"><a data-dcnode-id="2836" href="#CITEREFEngestr%C3%B6m2001"><span data-dcnode-id="2837" instrument_node="">Engeström 2001</span></a><span data-dcnode-id="2835" instrument_node="">, p.&nbsp;134. Vygotsky's triangular representation of mediated action attempts to explain human consciousness development in a manner that did not rely on dualistic stimulus–response (S-R) associations.</span></span><span data-dcnode-id="2833" instrument_node="">
</span></li><span data-dcnode-id="2831" instrument_node="">
</span><li data-dcnode-id="2816" id="cite_note-60"><span class="mw-cite-backlink" data-dcnode-id="2827"><b data-dcnode-id="2828"><a aria-label="Jump up" data-dcnode-id="2829" href="#cite_ref-60" title="Jump up"><span data-dcnode-id="2830" instrument_node="">^</span></a></b></span><span data-dcnode-id="2826" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2818"><span data-dcnode-id="2825" instrument_node="">"</span><i data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">the dialectic relationship between subject and object as a fundamental unit of analysis for all human endeavour</span></i><span data-dcnode-id="2822" instrument_node="">" </span><a data-dcnode-id="2820" href="#CITEREFHasan2007"><span data-dcnode-id="2821" instrument_node="">Hasan 2007</span></a><span data-dcnode-id="2819" instrument_node="">, p.&nbsp;3.</span></span><span data-dcnode-id="2817" instrument_node="">
</span></li><span data-dcnode-id="2815" instrument_node="">
</span><li data-dcnode-id="2800" id="cite_note-61"><span class="mw-cite-backlink" data-dcnode-id="2811"><b data-dcnode-id="2812"><a aria-label="Jump up" data-dcnode-id="2813" href="#cite_ref-61" title="Jump up"><span data-dcnode-id="2814" instrument_node="">^</span></a></b></span><span data-dcnode-id="2810" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2802"><span data-dcnode-id="2809" instrument_node="">For Vygotsky's idea of a </span><i data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">"complex, mediated act"</span></i><span data-dcnode-id="2806" instrument_node=""> commonly expressed as a triad of subject, object and mediating artifact, see </span><a data-dcnode-id="2804" href="#CITEREFVygotsky1978"><span data-dcnode-id="2805" instrument_node="">Vygotsky 1978</span></a><span data-dcnode-id="2803" instrument_node="">, p.&nbsp;40.</span></span><span data-dcnode-id="2801" instrument_node="">
</span></li><span data-dcnode-id="2799" instrument_node="">
</span><li data-dcnode-id="2787" id="cite_note-62"><span class="mw-cite-backlink" data-dcnode-id="2795"><b data-dcnode-id="2796"><a aria-label="Jump up" data-dcnode-id="2797" href="#cite_ref-62" title="Jump up"><span data-dcnode-id="2798" instrument_node="">^</span></a></b></span><span data-dcnode-id="2794" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2789"><span data-dcnode-id="2793" instrument_node="">Vygotsky makes the point that </span><i data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">"man himself determines his behavior with the help of an artificially created stimulus means."</span></i><span data-dcnode-id="2790" instrument_node=""> (as cited by Norris Minick in Vol I of "The Collected Works of L.S. Vygotsky", 1987, PLENUM – New York/London, p.21);</span></span><span data-dcnode-id="2788" instrument_node="">
</span></li><span data-dcnode-id="2786" instrument_node="">
</span><li data-dcnode-id="2775" id="cite_note-63"><span class="mw-cite-backlink" data-dcnode-id="2782"><b data-dcnode-id="2783"><a aria-label="Jump up" data-dcnode-id="2784" href="#cite_ref-63" title="Jump up"><span data-dcnode-id="2785" instrument_node="">^</span></a></b></span><span data-dcnode-id="2781" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2777"><i data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Mediation</span></i><span data-dcnode-id="2778" instrument_node=""> is perhaps the key theoretical idea behind activity: we don't just use tools and symbol systems; instead, our everyday lived experience is significantly mediated and intermediated by our use of tools and symbols systems. Activity theory helps frame, therefore, our understanding of such mediation.</span></span><span data-dcnode-id="2776" instrument_node="">
</span></li><span data-dcnode-id="2774" instrument_node="">
</span><li data-dcnode-id="2765" id="cite_note-64"><span class="mw-cite-backlink" data-dcnode-id="2770"><b data-dcnode-id="2771"><a aria-label="Jump up" data-dcnode-id="2772" href="#cite_ref-64" title="Jump up"><span data-dcnode-id="2773" instrument_node="">^</span></a></b></span><span data-dcnode-id="2769" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">In Vygotskyan psychology internalization is a theoretical concept that explains how individuals process what they learned through mediated action in the development of individual consciousness.</span></span><span data-dcnode-id="2766" instrument_node="">
</span></li><span data-dcnode-id="2764" instrument_node="">
</span><li data-dcnode-id="2747" id="cite_note-65"><span class="mw-cite-backlink" data-dcnode-id="2760"><b data-dcnode-id="2761"><a aria-label="Jump up" data-dcnode-id="2762" href="#cite_ref-65" title="Jump up"><span data-dcnode-id="2763" instrument_node="">^</span></a></b></span><span data-dcnode-id="2759" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2749"><a data-dcnode-id="2757" href="#CITEREFVygotsky1978"><span data-dcnode-id="2758" instrument_node="">Vygotsky 1978</span></a><span data-dcnode-id="2756" instrument_node="">, p.&nbsp;86 –  Restated, ZPD is the theoretical range of what a performer can do with competent peers and assistance, as compared with what can be accomplished on one's own(</span><a data-dcnode-id="2754" href="#CITEREFAndersson2013"><span data-dcnode-id="2755" instrument_node="">Andersson 2013</span></a><span data-dcnode-id="2753" instrument_node="">, p.&nbsp;21; DeVane &amp; Squire in </span><a data-dcnode-id="2751" href="#CITEREFJonassenLand2012"><span data-dcnode-id="2752" instrument_node="">Jonassen &amp; Land 2012</span></a><span data-dcnode-id="2750" instrument_node="">, p.&nbsp;245).</span></span><span data-dcnode-id="2748" instrument_node="">
</span></li><span data-dcnode-id="2746" instrument_node="">
</span><li data-dcnode-id="2734" id="cite_note-66"><span class="mw-cite-backlink" data-dcnode-id="2742"><b data-dcnode-id="2743"><a aria-label="Jump up" data-dcnode-id="2744" href="#cite_ref-66" title="Jump up"><span data-dcnode-id="2745" instrument_node="">^</span></a></b></span><span data-dcnode-id="2741" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2736"><span data-dcnode-id="2740" instrument_node="">see for example </span><a data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collaborative_learning" title="Collaborative learning"><span data-dcnode-id="2739" instrument_node="">Collaborative learning</span></a><span data-dcnode-id="2737" instrument_node="">.</span></span><span data-dcnode-id="2735" instrument_node="">
</span></li><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2721" id="cite_note-67"><span class="mw-cite-backlink" data-dcnode-id="2729"><b data-dcnode-id="2730"><a aria-label="Jump up" data-dcnode-id="2731" href="#cite_ref-67" title="Jump up"><span data-dcnode-id="2732" instrument_node="">^</span></a></b></span><span data-dcnode-id="2728" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2723"><span data-dcnode-id="2727" instrument_node="">Leontiev, (variously spelled Leont'ev/Leontyev) was, with </span><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Luria" title="Alexander Luria"><span data-dcnode-id="2726" instrument_node="">Alexander Luria</span></a><span data-dcnode-id="2724" instrument_node="">, one of Vygotsky's pupils in the late 1920s and 1930s. After Vygotsky's death, Leontyev became the principal theoretical contributor within the Vygotskian social-historical school.</span></span><span data-dcnode-id="2722" instrument_node="">
</span></li><span data-dcnode-id="2720" instrument_node="">
</span><li data-dcnode-id="2708" id="cite_note-68"><span class="mw-cite-backlink" data-dcnode-id="2716"><b data-dcnode-id="2717"><a aria-label="Jump up" data-dcnode-id="2718" href="#cite_ref-68" title="Jump up"><span data-dcnode-id="2719" instrument_node="">^</span></a></b></span><span data-dcnode-id="2715" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">Leontiev's breakthrough was twofold: first he theorized activity as resulting from the confluence of a human subject, the object of his/her activity (predmet/</span><a class="extiw" data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%259F%25D1%2580%25D0%25B5%25D0%25B4%25D0%25BC%25D0%25B5%25D1%2582" title="ru:Предмет"><span data-dcnode-id="2713" instrument_node="">Предмет(Russian)</span></a><span data-dcnode-id="2711" instrument_node=""> "the target or content of a thought or action" (Kaptelinin, 2005, p. 6), and the tools (including symbol systems) that mediate the object(ive); second, he saw activity as essentially tripartite in structure, being composed of unconscious operations on/with tools, conscious but finite actions which are goal-directed, and higher level activities which are object-oriented and driven by motives (Leontiev, at times, seems to conflate object and motive, which is potentially problematic).</span></span><span data-dcnode-id="2709" instrument_node="">
</span></li><span data-dcnode-id="2707" instrument_node="">
</span><li data-dcnode-id="2696" id="cite_note-69"><span class="mw-cite-backlink" data-dcnode-id="2703"><b data-dcnode-id="2704"><a aria-label="Jump up" data-dcnode-id="2705" href="#cite_ref-69" title="Jump up"><span data-dcnode-id="2706" instrument_node="">^</span></a></b></span><span data-dcnode-id="2702" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2698"><a data-dcnode-id="2700" href="#CITEREFEngestr%C3%B6m1987"><span data-dcnode-id="2701" instrument_node="">Engeström 1987</span></a><span data-dcnode-id="2699" instrument_node=""> first popularized the triangular representation of the activity system in chapter 2.</span></span><span data-dcnode-id="2697" instrument_node="">
</span></li><span data-dcnode-id="2695" instrument_node="">
</span><li data-dcnode-id="2669" id="cite_note-70"><span class="mw-cite-backlink" data-dcnode-id="2691"><b data-dcnode-id="2692"><a aria-label="Jump up" data-dcnode-id="2693" href="#cite_ref-70" title="Jump up"><span data-dcnode-id="2694" instrument_node="">^</span></a></b></span><span data-dcnode-id="2690" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2671"><span data-dcnode-id="2689" instrument_node="">While the </span><i data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">unit of analysis</span></i><span data-dcnode-id="2686" instrument_node="">, for Vygotsky, is "individual activity" and, for Leontiev, the "collective activity system", for </span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Lave" title="Jean Lave"><span data-dcnode-id="2685" instrument_node="">Jean Lave</span></a><span data-dcnode-id="2683" instrument_node=""> and others working around </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Situated_cognition" title="Situated cognition"><span data-dcnode-id="2682" instrument_node="">situated cognition</span></a><span data-dcnode-id="2680" instrument_node=""> the unit of analysis is "practice", "</span><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Community_of_practice" title="Community of practice"><span data-dcnode-id="2679" instrument_node="">community of practice</span></a><span data-dcnode-id="2677" instrument_node="">", and "participation". Other scholars analyze "the relationships between the individual's psychological development and the development of social systems". re: Minick in </span><a data-dcnode-id="2675" href="#CITEREFColeEngestr%C3%B6mVasquez1997"><span data-dcnode-id="2676" instrument_node="">Cole, Engeström &amp; Vasquez 1997</span></a><span data-dcnode-id="2674" instrument_node="">, p.&nbsp;125; </span><a data-dcnode-id="2672" href="#CITEREFLaveWenger1991"><span data-dcnode-id="2673" instrument_node="">Lave &amp; Wenger 1991</span></a></span><span data-dcnode-id="2670" instrument_node="">
</span></li><span data-dcnode-id="2668" instrument_node="">
</span><li data-dcnode-id="2654" id="cite_note-71"><span class="mw-cite-backlink" data-dcnode-id="2664"><b data-dcnode-id="2665"><a aria-label="Jump up" data-dcnode-id="2666" href="#cite_ref-71" title="Jump up"><span data-dcnode-id="2667" instrument_node="">^</span></a></b></span><span data-dcnode-id="2663" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2656"><a data-dcnode-id="2661" href="#CITEREFLeontiev1979"><span data-dcnode-id="2662" instrument_node="">Leontiev 1979</span></a><span data-dcnode-id="2660" instrument_node="">, p.&nbsp;163;</span><a data-dcnode-id="2658" href="#CITEREFEngestr%C3%B6m1999"><span data-dcnode-id="2659" instrument_node="">Engeström 1999</span></a><span data-dcnode-id="2657" instrument_node="">, p.&nbsp;30</span></span><span data-dcnode-id="2655" instrument_node="">
</span></li><span data-dcnode-id="2653" instrument_node="">
</span><li data-dcnode-id="2643" id="cite_note-Hard07-72"><span class="mw-cite-backlink" data-dcnode-id="2649"><b data-dcnode-id="2650"><a aria-label="Jump up" data-dcnode-id="2651" href="#cite_ref-Hard07_72-0" title="Jump up"><span data-dcnode-id="2652" instrument_node="">^</span></a></b></span><span data-dcnode-id="2648" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2645"><a data-dcnode-id="2646" href="#CITEREFHardman2007"><span data-dcnode-id="2647" instrument_node="">Hardman 2007</span></a></span><span data-dcnode-id="2644" instrument_node="">
</span></li><span data-dcnode-id="2642" instrument_node="">
</span><li data-dcnode-id="2630" id="cite_note-73"><span class="mw-cite-backlink" data-dcnode-id="2638"><b data-dcnode-id="2639"><a aria-label="Jump up" data-dcnode-id="2640" href="#cite_ref-73" title="Jump up"><span data-dcnode-id="2641" instrument_node="">^</span></a></b></span><span data-dcnode-id="2637" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2632"><span data-dcnode-id="2636" instrument_node="">In the second generation diagram, activity is positioned in the middle, mediation at the top, adding rules, community and division of labor at the bottom. The minimum components of an </span><i data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">activity system</span></i><span data-dcnode-id="2633" instrument_node=""> are:  the subject; the object; outcome; mediating instruments/tools/artifacts; rules and signs; community and division of labor.</span></span><span data-dcnode-id="2631" instrument_node="">
</span></li><span data-dcnode-id="2629" instrument_node="">
</span><li data-dcnode-id="2618" id="cite_note-74"><span class="mw-cite-backlink" data-dcnode-id="2625"><b data-dcnode-id="2626"><a aria-label="Jump up" data-dcnode-id="2627" href="#cite_ref-74" title="Jump up"><span data-dcnode-id="2628" instrument_node="">^</span></a></b></span><span data-dcnode-id="2624" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2620"><a data-dcnode-id="2622" href="#CITEREFLeontiev1981"><span data-dcnode-id="2623" instrument_node="">Leontiev 1981</span></a><span data-dcnode-id="2621" instrument_node="">, p.&nbsp;210–213</span></span><span data-dcnode-id="2619" instrument_node="">
</span></li><span data-dcnode-id="2617" instrument_node="">

</span></li><span data-dcnode-id="2595" instrument_node="">
</span><li data-dcnode-id="2575" id="cite_note-76"><span class="mw-cite-backlink" data-dcnode-id="2591"><b data-dcnode-id="2592"><a aria-label="Jump up" data-dcnode-id="2593" href="#cite_ref-76" title="Jump up"><span data-dcnode-id="2594" instrument_node="">^</span></a></b></span><span data-dcnode-id="2590" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2577"><a data-dcnode-id="2588" href="#CITEREFLeontiev2009"><span data-dcnode-id="2589" instrument_node="">Leontiev 2009</span></a><span data-dcnode-id="2587" instrument_node="">, p.&nbsp;400–405&nbsp;; </span><a data-dcnode-id="2585" href="#CITEREFBlunden2011"><span data-dcnode-id="2586" instrument_node="">Blunden 2011</span></a><span data-dcnode-id="2584" instrument_node="">, p.&nbsp;201; </span><a data-dcnode-id="2582" href="#CITEREFNussbaumer2012"><span data-dcnode-id="2583" instrument_node="">Nussbaumer 2012</span></a><span data-dcnode-id="2581" instrument_node="">, p.&nbsp;39; DeVane &amp; Squire in </span><a data-dcnode-id="2579" href="#CITEREFJonassenLand2012"><span data-dcnode-id="2580" instrument_node="">Jonassen &amp; Land 2012</span></a><span data-dcnode-id="2578" instrument_node="">, p.&nbsp;247</span></span><span data-dcnode-id="2576" instrument_node="">
</span></li><span data-dcnode-id="2574" instrument_node="">
</span><li data-dcnode-id="2562" id="cite_note-77"><span class="mw-cite-backlink" data-dcnode-id="2570"><b data-dcnode-id="2571"><a aria-label="Jump up" data-dcnode-id="2572" href="#cite_ref-77" title="Jump up"><span data-dcnode-id="2573" instrument_node="">^</span></a></b></span><span data-dcnode-id="2569" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">Engeström in </span><a data-dcnode-id="2566" href="#CITEREFEngestr%C3%B6mMiettinenPunam%C3%A4ki1999"><span data-dcnode-id="2567" instrument_node="">Engeström, Miettinen &amp; Punamäki 1999</span></a><span data-dcnode-id="2565" instrument_node="">, p.&nbsp;19</span></span><span data-dcnode-id="2563" instrument_node="">
</span></li><span data-dcnode-id="2561" instrument_node="">
</span><li data-dcnode-id="2546" id="cite_note-78"><span class="mw-cite-backlink" data-dcnode-id="2557"><b data-dcnode-id="2558"><a aria-label="Jump up" data-dcnode-id="2559" href="#cite_ref-78" title="Jump up"><span data-dcnode-id="2560" instrument_node="">^</span></a></b></span><span data-dcnode-id="2556" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2548"><span data-dcnode-id="2555" instrument_node="">"[Activity Theory]  </span><i data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">is not only used in Russia, where it originated, but also in Australia, Belgium, Brazil, Canada, Denmark, Finland, France, Germany, Italy, Japan, Norway, South Africa, Sweden, Switzerland, the UK, the United States and other countries.</span></i><span data-dcnode-id="2552" instrument_node="">". (</span><a data-dcnode-id="2550" href="#CITEREFKaptelininNardi2006"><span data-dcnode-id="2551" instrument_node="">Kaptelinin &amp; Nardi 2006</span></a><span data-dcnode-id="2549" instrument_node="">, p.&nbsp;6)</span></span><span data-dcnode-id="2547" instrument_node="">
</span></li><span data-dcnode-id="2545" instrument_node="">
