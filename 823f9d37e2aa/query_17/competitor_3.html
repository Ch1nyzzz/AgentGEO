, kids without parents, adults begging for food and living places, as well as individuals walking around the streets without shoes and clothes. Certain parts of Africa portray such issues, although it is worth noting that certain parts of the developed world also portray</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="550" data-href="/writing/document/P3HE8EVYS4PF" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="549"><span class="document__preview text-l source-serif" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The individuals rely on agriculture and pastoralist activities while they reside mostly in the southwestern and central parts of Ethiopia. Regarding the Shankellas, they usually reside in the country’s western region on the border of Lake Turkana and Eritrea. It comprises of around 6 percent of the entire population in the nation. The other groups of individuals living in Ethiopia that comprise the remainder of the population include Sidamo, Tigreano, Afrar, Somali, and Gurage (Tikuye, 2009). 
Concerning the Amhara population, it portrays varied physiological heritage. The individuals usually speak the Semitic language while their linguistic and historical forces as depicted by their primary origin myths appear to reveal that their Ancestors originated from the present day Yemen. Addis Ababa serves as Ethiopia’s capital while it served as the prior Abyssinian Empire of the Amhara. A large number of Amahara people reside in the area although in an enclave based in the Oromo people’s land (Getahun &amp; Kassu, 2014). The Amhara speak Amharic as their main language although other people across Ethiopia usually speak it as a second language. The Amharic language was mostly used in schools but it has recently spread to different parts of Ethiopia commencing in 1991. The Ethiopian people also speak English, which serves as the dominant foreign language, while it is mostly taught in high schools. Ethiopians are capable of speaking more than one language in a</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="545"></div><div class="center paper__cta" data-dcnode-id="542"><a class="button text-m button--orange" data-dcnode-id="543" data-href="/writing/document/P3HE8EVYS4PF" href="javascript:void(0)" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="544" instrument_node="">Get Access</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="539" id="AdCenterMiddle"></div></div><div class="columns large-4 hide-for-medium-only hide-for-small-only" data-dcnode-id="524"><div class="rhino-slot center" data-dcnode-id="537" id="AdSidebarTop"></div><ul class="card--sidebar-nav__list" data-dcnode-id="526"><li class="rhino-slot side-items" data-dcnode-id="536" id="sidebar-nav1"></li><li class="rhino-slot side-items" data-dcnode-id="535" id="sidebar-nav2"></li><li class="rhino-slot side-items" data-dcnode-id="534" id="sidebar-nav3"></li><li class="rhino-slot side-items" data-dcnode-id="533" id="sidebar-nav4"></li><l
