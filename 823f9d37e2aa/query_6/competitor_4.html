ring up further ferment.</span></span></p><span data-dcnode-id="3833" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3830" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3831" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3832" instrument_node="">It should also be remembered that even the Prime Minister has Trumpian leanings and actually is known to have a family friend who is a QAnon sympathizer.</span></span></p><span data-dcnode-id="3829" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3826" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3827" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3828" instrument_node="">So the most controversial and dangerous topic in this country is the infiltration of unAustralian violent and potentially deadly influence from external forces. It must be recognised that most of these ideas are coming into the minds of the people via (anti) social media from that bastion of “Freedom” the USA.</span></span></p><span data-dcnode-id="3825" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3824" instrument_node="">I find it very disturbing that politicians who claim to be true blue Australians are in fact working more as agents for a foreign political movement.</span></span></p><span data-dcnode-id="3821" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-wo al and religious bias.</span></span></p><span data-dcnode-id="3643" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3640" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3642" instrument_node="">The Religious Department under the Prime Minister’s Department deem such benefits to be halal or approved by Allah.</span></span></p><span data-dcnode-id="3639" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3636" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3637" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3638" instrument_node="">This is why Malaysia, bolstered by the majority of the beneficiaries refuses to validate the Rome Statute and ICERD, both of which would immediately present problems of compliance.</span></span></p></span></span></div><div data-dcnode-id="3632"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="3604" style="box-sizing: border-box;"><span data-dcnode-id="3605"><span class="q-box qu-display--none" data-dcnode-id="3628" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="3625"><span data-dcnode-id="3627" instrument_node="">1.6K</span><span data-dcnode-id="3626" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="3623" style="box-sizing: border-box;"><span data-dcnode-id="3624" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-4 ata-dcnode-id="3054" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3055" instrument_node="">is</span></span><span data-dcnode-id="3052" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3053" instrument_node=""> no controversy in which I come down clearly and exclusively on one side or the other. As I’ve stated several times on Quora, I don’t </span></span><span data-dcnode-id="3050" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3051" instrument_node="">take</span></span><span data-dcnode-id="3048" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3049" instrument_node=""> sides. I don’t fully align with any of the main sides (typically, two) and therefore have no team that can be identified with in general public discourse. I don’t buy into isms or what I call “boxed sets” of ideologies.</span></span></p><span data-dcnode-id="3046" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3043" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3044" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3045" instrument_node="">Rather, I prosecute any and every issue one point or aspect at a time. No individual, no faction, no consensus, and no philosophy of man is a hundred percent flawless and free from human error. People are s</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3031" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3032" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3033" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3034" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3035" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3040" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3041" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3042" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3036" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3037"><svg data-dcnode-id="3038" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3039" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2907" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2908" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2909"><span class="q-box qu-userSelect--text" data-dcnode-id="2910" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3015" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3024" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3025" instrument_node="">ALL of them! That’s because there </span></span><span data-dcnode-id="3022" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3023" instrument_node="">is</span></span><span data-dcnode-id="3020" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3021" instrument_node=""> no controversy in which I come down clearly and exclusively on one side or the other. As I’ve stated several times on Quora, I don’t </span></span><span data-dcnode-id="3018" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3019" instrument_node="">take</span></span><span data-dcnode-id="3016" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3017" instrument_node=""> sides. I don’t fully align with any of the main sides (typically, two) and therefore have no team that can be identified with in general public discourse. I don’t buy into isms or what I call “boxed sets” of ideologies.</span></span></p><span data-dcnode-id="3014" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3013" instrument_node="">Rather, I prosecute any and every issue one point or aspect at a time. No individual, no faction, no consensus, and no philosophy of man is a hundred percent flawless and free from human error. People are self-serving, deceitful, and vain.</span></span></p><span data-dcnode-id="3010" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3003" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3008" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3009" instrument_node="">The only “side” I’m </span></span><span data-dcnode-id="3006" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3007" instrument_node="">committed to</span></span><span data-dcnode-id="3004" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3005" instrument_node=""> is the side of Truth, Honesty, and Principle—which form a single standpoint. I want to know the truth regarding each specific point of contention on any issue whatsoever—even if it means I’m found to be wrong or to be blamed of some mental or moral failing.</span></span></p><span data-dcnode-id="3002" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2999" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3000" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3001" instrument_node="">This automatically puts me at odds with most people, who find their identity in their affiliation with one faction or the other. Whether the topic is scientific, political, or ideological, people are generally afraid to stand alone, resolute against cronyism, nepotism, chauvinism, narcissism, separatism, elitism, classism, and isms of all types. Except I’m committed to one kind of separation (or setting apart)—that promises ultimately to lead to global unity.</span></span></p><span data-dcnode-id="2998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2995" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2997" instrument_node="">Otherwise, all the evils of mankind are born of contention over who’s better, who’s smarter, who’s more correct, who’s more moral or ethical, who’s more powerful, who’s more popular, who’s more deserving, and who has more than whoever else. Everyone wants to be on top of somebody else.</span></span></p><span data-dcnode-id="2994" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2991" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2993" instrument_node="">The easiest way to accomplish this is by coalescing with those who seem to possess the best traits we see in ourselves and label others as not belonging, with some term meant to denigrate them. Grouping, then, becomes the extension of the ego—a way to exclude others by committee.</span></span></p><span data-dcnode-id="2990" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2981" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2989" instrument_node="">People will even group </span></span><span data-dcnode-id="2986" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2987" instrument_node="">themselves </span></span><span data-dcnode-id="2984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2985" instrument_node="">with those in lower social strata, just to belong. </span></span><span data-dcnode-id="2982" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2983" instrument_node="">Revenge of the Nerds. Introverts unite. Hi, I’m Johnnie and I’m OCD. Hi Johnnie.</span></span></p><span data-dcnode-id="2980" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2977" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2978" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2979" instrument_node="">Controversies exist because everyone involved has a personal stake and a personal agenda—typically, connected to their greater identity with some association. Safety in numbers. Strength in numbers.</span></span></p><span data-dcnode-id="2976" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2973" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2974" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2975" instrument_node="">And I’m not criticizing this, except where people write off those outside their group as hopeless and worthless. Ultimately, I belong to a group from which I, in large part, draw a sense of identity. But even there I depart from a few things most others in that same group hold to, unofficially. Yes, there is a core set of rules and principles I share with almost 100% of the others. And I doubt I will ever change position on these.</span></span></p><span data-dcnode-id="2972" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2969" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2970" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2971" instrument_node="">But they’re not “boxed” in the sense that I hold to them blindly. In fact, I test them on a regular basis to see if they still hold up to rigorous testing. My being on Quora, in fact, is not in full alignment with that core set of rules. So, I doubt any other active Quoran belongs to that group (though, at least one person I know of may read it now and then).</span></span></p><span data-dcnode-id="2968" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2965" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2966" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2967" instrument_node="">Eventually—very soon—even I will permanently disappear from Quora.</span></span></p><span data-dcnode-id="2964" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2957" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2962" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2963" instrument_node="">Meanwhile, I”m pretty much a lone wolf on Quora. I will never completely align with any other Quoran on most topics. There are a handful with whom I agree on most aspects of </span></span><span data-dcnode-id="2960" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2961" instrument_node="">a certain few</span></span><span data-dcnode-id="2958" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2959" instrument_node=""> topics. And they, naturally, go against the mainstream themselves. I suspect one day soon—right around the time I disappear—we may quickly be found to be part of the same team.</span></span></p><span data-dcnode-id="2956" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2953" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2954" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2955" instrument_node="">Right now, we upvote each others’ answers—but not every one. And that’s not a slight by any one towards the other. People are individuals. None of us is a duplicate of someone else. Every person sees the universe from a unique vantage point, and from within a unique past of life experiences. Therefore, no two people will agree on every conceivable point.</span></span></p><span data-dcnode-id="2952" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2949" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2950" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2951" instrument_node="">So, no matter who you are, no matter how smart you are, no matter how honest you are, no matter what your knowledge base is, no matter what credentials you have, no matter your cultural background, and no matter your belief system, you and I are on different sides of some point or issue.</span></span></p><span data-dcnode-id="2948" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2945" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2946" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2947" instrument_node="">And not completely knowing any other person in this world, I can confidently state the same is true between you and any other individual you care to name. It’s just that, in most cases, other people aren’t as audacious as I am about making so broad an assumption without being able to prove it.</span></span></p><span data-dcnode-id="2944" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2941" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2942" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2943" instrument_node="">But then I’m not one to worry about such things, because I have no interest in proving my claims to anyone—ever. I don’t believe it’s possible to “prove” things in other people’s minds that they don’t want proved.</span></span></p><span data-dcnode-id="2940" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2937" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2938" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2939" instrument_node="">And most people don’t want every question answered or the biggest questions proved, for one reason or the other.</span></span></p><span data-dcnode-id="2936" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2933" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2934" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2935" instrument_node="">So, you name the controversy, name the side or sides, and I’ll affirm that I disagree with them somewhere, if it’s minor. Hey, sometimes I even discover I disagree with myself. Fortunately, myself and I have a way of eventually coming to terms.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2930" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2931" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2932" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-6f053cd7fe67ab143ecdce15090544cd-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2927" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2928" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2929" instrument_node="">I find myself on the wrong side of the tracks—philosophically—quite often.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2923" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2924"><div class="q-box unzoomed" data-dcnode-id="2925" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2926" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-610b1098eae1c395333d59be49a094f3-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2911" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2922" instrument_node="">Image Credit: </span></span><span class="q-inline" data-dcnode-id="2914" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cs.trains.com/mrr/f/88/t/187747.aspx" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="cs.trains.com"><span data-dcnode-id="2920" instrument_node="">Philosophy Friday -- The Wrong Side of the Tracks</span></a><span class="q-inlineBlock" data-dcnode-id="2915" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2916"><svg data-dcnode-id="2917" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2  a wall between the US and Mexico. What arguments do Trump and others who agree with him make about this impregnable wall? What arguments do those who oppose the wall make?</span></span></p><span data-dcnode-id="726" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="725" instrument_node="">Gay marriage is also a hot topic, and many activists within the LGBTQ movement want same-sex marriage to be sanctioned nationwide, with no exceptions. What arguments do they advance? What arguments do people who favor “one husband, one wife for life” advance for keeping the status quo (which is no longer the status quo in a number of states already.</span></span></p><span data-dcnode-id="722" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="719" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="720" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="721" instrument_node="">OK, I’ve given you a couple options, but there are many, many more. If you do as respondent John Clayman suggests, and “Google” debate resolutions, I’m sure you’ll come up with something which interests you and may just keep your attention for the entire school year. Best wishes!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="652" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="653" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><d
