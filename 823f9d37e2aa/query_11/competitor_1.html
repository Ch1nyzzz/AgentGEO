</span><div data-dcnode-id="928"><span data-dcnode-id="929"><span data-dcnode-id="930"><span data-dcnode-id="937" instrument_node="">Women's Independence. Multiple factors—political, cultural and technological—</span><b data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">led to</span></b><span data-dcnode-id="934" instrument_node=""> the rise of the </span><b data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">flappers</span></b><span data-dcnode-id="931" instrument_node="">. During World War I, women entered the workforce in large numbers, receiving higher wages that many working women were not inclined to give up during peacetime.</span></span></span></div><a class="lc" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treehozz.com/goto/255963" rel="nofollow" target="_blank"><span data-dcnode-id="927" instrument_node="">Click here</span></a><span data-dcnode-id="925" instrument_node=""> to know more about it.</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node=""> Similarly one may ask,  why did flappers start in the 1920s?</span><p data-dcnode-id="907"><span data-dcnode-id="908"><span data-dcnode-id="909"><span data-dcnode-id="922" instrument_node="">The rise of the automobile was another factor in the rise of </span><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">flapper</span></b><span data-dcnode-id="919" instrument_node=""> culture. </span><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Flappers did</span></b><span data-dcnode-id="916" instrument_node=""> what society </span><b data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">did</span></b><span data-dcnode-id="913" instrument_node=""> not expect from young women. They danced to Jazz Age music, they smoked, they wore makeup, they spoke their own language, and they lived for the moment. </span><b data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Flapper</span></b><span data-dcnode-id="910" instrument_node=""> fashion followed the lifestyle.</span></span></span></p><p data-dcnode-id="887"><span data-dcnode-id="906" instrument_node="">Also,  how did the flapper represent the new woman of the 1920s? </span><span data-dcnode-id="888"><span data-dcnode-id="889"><span data-dcnode-id="905" instrument_node="">Initiated in the </span><b data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">1920s</span></b><span data-dcnode-id="902" instrument_node="">, the term “</span><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">flapper</span></b><span data-dcnode-id="899" instrument_node="">” described </span><b data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">women</span></b><span data-dcnode-id="896" instrument_node=""> who flamboyantly flouted their contempt for what was back then deemed as societal behavior that was conventional. </span><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Flappers were women</span></b><span data-dcnode-id="893" instrument_node=""> who </span><b data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">were</span></b><span data-dcnode-id="890" instrument_node=""> characterized by their choice of bobbed hair, short skirts, and their enjoyment of jazz music.</span></span></span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node=""> Similarly,  what were flappers in the 1920s?</span></p><p data-dcnode-id="875"><span data-dcnode-id="884" instrument_node=""> </span><span data-dcnode-id="876"><span data-dcnode-id="877"><b data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Flappers were</span></b><span data-dcnode-id="881" instrument_node=""> a generation of young Western women in the </span><b data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">1920s</span></b><span data-dcnode-id="878" instrument_node=""> who wore short skirts (just at the knee was short for that time period), bobbed their hair, listened to jazz, and flaunted their disdain for what was then considered acceptable behavior.</span></span></span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Where did the flappers live in the 1920s?</span></p><p data-dcnode-id="862"><span data-dcnode-id="872" instrument_node="">Most </span><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">flappers</span></b><span data-dcnode-id="869" instrument_node=""> came from Northern, urban America. Some popular cities were NYC and Chicago, although the </span><b data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">flapper</span></b><span data-dcnode-id="866" instrument_node=""> movement originally began in Great Britain. The </span><b data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">flapper</span></b><span data-dcnode-id="863" instrument_node=""> movement was not as widespread as most people believe.</span></p><span data-dcnode-id="861" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="860" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="859" instrument_node="">

</span><p data-dcnode-id="804"></p><div data-dcnode-id="791"><span data-dcnode-id="792"><span data-dcnode-id="793"><span data-dcnode-id="803" instrument_node="">Being a </span><b data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">flapper</span></b><span data-dcnode-id="800" instrument_node=""> wasn't all about fashion. It was about rebellion. </span><b data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Flappers did</span></b><span data-dcnode-id="797" instrument_node=""> what </span><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">society did</span></b><span data-dcnode-id="794" instrument_node=""> not expect from young women. They danced to Jazz Age music, they smoked, they wore makeup, they spoke their own language, and they lived for the moment.</span></span></span></div><p data-dcnode-id="790"></p><span data-dcnode-id="789" instrument_node="">

</span><p data-dcnode-id="650"></p><div data-dcnode-id="631"><span data-dcnode-id="632"><span data-dcnode-id="633"><span data-dcnode-id="649" instrument_node="">Today the easily recognized image of the </span><b data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">flapper</span></b><span data-dcnode-id="646" instrument_node=""> symbolizes the </span><b data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">1920s</span></b><span data-dcnode-id="643" instrument_node=""> for many people. The </span><b data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">flapper</span></b><span data-dcnode-id="640" instrument_node="">—with her short skirts, short hair, noticeable makeup, and fun-loving </span><b data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">attitude</span></b><span data-dcnode-id="637" instrument_node="">—</span><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">represented</span></b><span data-dcnode-id="634" instrument_node=""> a new freedom for women. The old restrictions on dress and behavior were being overthrown.</span></span></span></div><p data-dcnode-id="630"></p><span data-dcnode-id="629" instrument_node="">

</span><p data-dcnode-id="582"></p><div data-dcnode-id="569"><span data-dcnode-id="570"><span data-dcnode-id="571"><span data-dcnode-id="581" instrument_node="">The economic boom and the Jazz Age were over, and America began the period called the Great Depression. The </span><b data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">1920s</span></b><span data-dcnode-id="578" instrument_node=""> represented an era of change and growth. The decade of the </span><b data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">1920s</span></b><span data-dcnode-id="575" instrument_node=""> helped to establish America's position </span><b data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">in</span></b><span data-dcnode-id="572" instrument_node=""> respect to the rest of the world, through its industry, its inventions, and its creativity.</span></span></span></div><p data-dcnode-id="568"></p><span data-dcnode-id="567" instrument_node="">

</span></h3><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="551"></p><div data-dcnode-id="524"><span data-dcnode-id="525"><span data-dcnode-id="526"><b data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Flappers</span></b><span data-dcnode-id="548" instrument_node=""> with long </span><b data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">hair</span></b><span data-dcnode-id="545" instrument_node=""> would do different things to </span><b data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">their hair</span></b><span data-dcnode-id="542" instrument_node=""> to make it look shorter and more like a bob, like putting it into a bun. When they put </span><b data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">their hair</span></b><span data-dcnode-id="539" instrument_node=""> up to go out, it would be wavy with loose pieces of </span><b data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">hair</span></b><span data-dcnode-id="536" instrument_node=""> sticking out. If a </span><b data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">flapper</span></b><span data-dcnode-id="533" instrument_node=""> didn't put </span><b data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">her hair</span></b><span data-dcnode-id="530" instrument_node=""> up, she would </span><b data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">wear</span></b><span data-dcnode-id="527" instrument_node=""> it down and curl it.</span></span></span></div><p data-dcnode-id="523"></p><span data-dcnode-id="522" instrument_node="">

</span><p data-dcnode-id="500"></p><div data-dcnode-id="490"><span data-dcnode-id="491"><span data-dcnode-id="492"><span data-dcnode-id="499" instrument_node="">The </span><b data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">term flapper</span></b><span data-dcnode-id="496" instrument_node=""> originated in Great Britain, where there was a short fad among young women to wear rubber galoshes (an overshoe worn in the rain or snow) left open to flap when they walked. The name stuck, and throughout the United States and Europe </span><b data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">flapper</span></b><span data-dcnode-id="493" instrument_node=""> was the name given to liberated young women.</span></span></span></div><p data-dcnode-id="489"></p><span data-dcnode-id="488" instrument_node="">

</span><p data-dcnode-id="472"></p><div data-dcnode-id="456"><span data-dcnode-id="457"><span data-dcnode-id="458"><span data-dcnode-id="471" instrument_node="">How </span><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">did flappers express their freedom</span></b><span data-dcnode-id="468" instrument_node="">? By cutting </span><b data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">their</span></b><span data-dcnode-id="465" instrument_node=""> hair short, waring makup, and waring short dresses. How </span><b data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">were</span></b><span data-dcnode-id="462" instrument_node=""> young people of the 1920s more independent than </span><b data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">their</span></b><span data-dcnode-id="459" instrument_node=""> parents? Because they took advantage of the economy and got jobs.</span></span></span></div><p data-dcnode-id="455"></p><span data-dcnode-id="454" instrument_node="">

</span><p data-dcnode-id="438"></p><div data-dcnode-id="423"><span data-dcnode-id="424"><span data-dcnode-id="425"><b data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Flappers</span></b><span data-dcnode-id="435" instrument_node=""> wore their skirts shorter so they could show off their legs and ankles—but also so they could </span><b data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">dance</span></b><span data-dcnode-id="432" instrument_node="">. They particularly loved the Charleston, a 1920s </span><b data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">dance</span></b><span data-dcnode-id="429" instrument_node=""> craze involving waving arms and fast-moving feet that </span><b data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">had</span></b><span data-dcnode-id="426" instrument_node=""> been pioneered by African Americans, first in the South and later in Harlem.</span></span></span></div><p data-dcnode-id="422"></p><span data-dcnode-id="421" instrument_node="">
