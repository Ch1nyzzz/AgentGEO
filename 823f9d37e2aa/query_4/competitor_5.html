</span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="958"><p class="tml-image--caption" data-dcnode-id="959" itemprop="caption"><span data-dcnode-id="960" instrument_node="">Alexander Hamilton (Credit: DeAgostini/Getty Images)</span></p></figcaption></figure></div><p data-dcnode-id="948"><span data-dcnode-id="955" instrument_node="">The United States’ first secretary of the treasury was always tight-lipped about his upbringing, which he called “the subject of the most humiliating criticism,” but there’s little doubt that it was a struggle. Born in 1755 (some sources say 1757) on the Caribbean island of Nevis, </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/american-revolution/alexander-hamilton"><span data-dcnode-id="954" instrument_node="">Hamilton</span></a><span data-dcnode-id="952" instrument_node=""> was the illegitimate son of a Scottish father and a </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/france/huguenots"><span data-dcnode-id="951" instrument_node="">French Huguenot</span></a><span data-dcnode-id="949" instrument_node=""> mother who was still married to another man. His father abandoned the family when Alexander was 10, and his mother died from fever just a few years later, leaving Hamilton and his brother orphans. A cousin tapped to serve as the boys’ guardian later committed suicide, but by then the teenaged Hamilton had secured a job as a clerk at an import-export firm on St. Croix. His intellect impressed his managers, and in 1773 a group of local businessmen put up the money to send him to New York, where he studied at what would eventually become Columbia University. </span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="945"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="946" data-zone-count="6"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-c964418c034149138e212533e0a04b66&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-c964418c034149138e212533e0a04b66&quot;,&quot;a chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-government/bank-of-the-united-states"><span data-dcnode-id="931" instrument_node="">first national bank</span></a><span data-dcnode-id="929" instrument_node="">. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="925"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="926" data-zone-count="4"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;cla ot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-4b2e0de6966b4f5498e7e5c78a1be9de&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/news&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="863"></phoenix-ad></div></aside><p data-dcnode-id="853"><span data-dcnode-id="860" instrument_node="">Although he was just 8 years old when it began, </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-presidents/andrew-jackson"><span data-dcnode-id="859" instrument_node="">Andrew Jackson</span></a><span data-dcnode-id="857" instrument_node=""> sacrificed a great deal during the </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/american-revolution"><span data-dcnode-id="856" instrument_node="">American Revolution</span></a><span data-dcnode-id="854" instrument_node="">. The son of Irish immigrants had already lost his father shortly before he was born, and he was forced to grow up quickly while serving as a Continental courier in the backcountry of the Carolinas. In 1781, 13-year-old Andrew and his brother Robert were captured by a group of British soldiers, one of whom slashed the future president with a sword after the boy refused to clean his boots. Robert would later die from smallpox while in enemy hands, and Jackson’s mother perished that same year.</span></p><p data-dcnode-id="845"><span data-dcnode-id="852" instrument_node="">Having lost all the members of his immediate family, Jackson briefly lived with relatives before striking out on his own and working as a saddle maker and schoolteacher. Despite having little formal education, he later distinguished himself as a lawyer and politician before winning fame as a general during the </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/war-of-1812/war-of-1812"><span data-dcnode-id="851" instrument_node="">War of 1812</span></a><span data-dcnode-id="849" instrument_node="">. Jackson never had any kids of his own, but before </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/19th-century/jacksonian-democracy"><span data-dcnode-id="848" instrument_node="">winning the White House</span></a><span data-dcnode-id="846" instrument_node=""> in 1828, the former orphan served as the guardian to several different parentless children. He also adopted two Native American boys whose families had been killed during his military campaigns. </span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="842"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="843" data-zone-count="4"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fl ot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-760ffd701a3242f1b8b6656e59d0f1bd&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/news&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="780"></phoenix-ad></div></aside><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Simón Bolívar was born in 1783 into one of the most prosperous families in Spanish Venezuela, yet his childhood was anything but idyllic. The future revolutionary never knew his father, who died before his third birthday, and he later lost his mother to illness when he was 9. The young orphan briefly lived with his grandfather before being passed off to his uncles, but according to Bolívar, his true guardian was a black slave nurse named Hipólita, who he regarded as an adoptive parent. “Her milk has nourished my life and she is the only father I have known,” he once wrote. Thanks to his family’s considerable financial means, Bolívar received a top-notch education in Europe.</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">After returning to Venezuela in 1807, he became a leading voice in the territory’s fight for independence from Spain. He served as a militia commander and politician during the Venezuelan War of Independence, and later took part in military campaigns that led to the formation of a half-dozen South American states including Colombia, Ecuador and Peru. By the time of his death in 1830, the orphaned aristocrat was known across the continent as “El Libertador,” or “The Liberator.”</span></p><h2 data-dcnode-id="772" id="4-edgar-allan-poe"><span data-dcnode-id="773" instrument_node="">4. Edgar Allan Poe</span></h2><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="719"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="720" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="728"><a data-dcnode-id="767"><picture class="is-loaded" data-dcnode-id="768"><source data-dcnode-id="771" sizes="(min-width: 1240px) 686px, (min-width: 675px) 620px, calc(100vw - 40px)" srcset="https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.webp 380w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.webp 620w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_686/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.webp 686w" type="image/webp"><source data-dcnode-id="770" sizes="(min-width: 1240px) 686px, (min-width: 675px) 620px, calc(100vw - 40px)" srcset="https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.jpg 380w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_620/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.jpg 620w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_686/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.jpg 686w"><img alt="edgar allan poe" class="m-detail--tml-image m-image" data-dcnode-id="769" data-src="https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_700/MTU3ODc4NjA0MzE4MTg4ODcz/image-placeholder-title.jpg" decoding="async" height="385" itemprop="contentUrl url" src="h ckClickEvent(this, event);" phx-track-id="Image" rel="" tabindex="-1" title="Arab American autoworkers lead walkout at Chrysler’s Dodge Main plant"><div class="m-card--image-aspect-ratio-pusher" data-dcnode-id="673"></div></a></div><div class="m-card--content" data-dcnode-id="663"><div class="m-card--label mm-card--tdih-year" data-dcnode-id="668"><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/this-day-in-history/arab-american-chrysler-dodge-strike-walkout-detroit" onclick="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" oncontextmenu="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);"><span data-dcnode-id="670" instrument_node="">1973</span></a></div><phoenix-ellipsis class="m-ellipsis m-card--header" data-dcnode-id="664"><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/this-day-in-history/arab-american-chrysler-dodge-strike-walkout-detroit" onclick="return phoenixTrackClickEvent(this, event, 'click', 'phx-track-id', true) &amp;&amp; window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" oncontextmenu="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" phx-track-id="Title" rel=""><h2 aria-level="2" class="m-ellipsis--text m-card--header-text" data-dcnode-id="666" role="heading"><span data-dcnode-id="667" instrument_node="">Arab American autoworkers lead walkout at Chrysler’s Dodge Main plant</span></h2></a></phoenix-ellipsis></div></phoenix-card></phoenix-super-link></div></phoenix-recommendations></section></div></section><p data-dcnode-id="648"><span data-dcnode-id="655" instrument_node="">The sense of dread and despair that permeates much of </span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/edgar-allan-poe-is-born"><span data-dcnode-id="654" instrument_node="">Edgar Allan Poe’s</span></a><span data-dcnode-id="652" instrument_node=""> writing may have its roots in his unhappy childhood. The author of </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/the-raven-is-published"><span data-dcnode-id="651" instrument_node="">“The Raven”</span></a><span data-dcnode-id="649" instrument_node=""> and “The Tell-Tale Heart” was born in 1809 into a penniless family of traveling actors, and by his third birthday his father had left and his mother had died of tuberculosis. Poe was raised by a Richmond, Virginia, tobacco merchant named John Allan—whose name he eventually took—but the two had a rocky relationship. Allan was not supportive of Poe’s literary aspirations, and young Edgar enraged his guardian by racking up considerable gambling debts during a stint at the University of Virginia.</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Poe was later disinherited after the two fell out in the early 1830s, at which point he embarked on a roving writing career that took him to Richmond, Philadelphia, New York and Baltimore. His life was cut short after he died under still-mysterious circumstances in 1849, but his many poems and short stories are now credited with influencing everything from detective fiction to the horror and science fiction genres. </span></p><h2 data-dcnode-id="644" id="5-ella-fitzgerald"><span data-dcnode-id="645" instrument_node="">5. Ella Fitzgerald</span></h2><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="591"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="592" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="600"><a data-dcnode-id="639"><picture class="is-loaded" data-dcnode-id="640"><source data-dcnode-id="643" sizes="(min-w istory/ella-fitzgerald-wins-amateur-night-at-harlems-apollo-theater"><span data-dcnode-id="573" instrument_node="">Apollo Theater</span></a><span data-dcnode-id="571" instrument_node="">. Fitzgerald’s tuneful, versatile voice soon earned her a gig with bandleader Chick Webb and his orchestra. By 1938—just six years after the death of her mother—she had scored her first hit with the song “A-Tisket, A-Tasket.”</span></p><h2 data-dcnode-id="568" id="6-marilyn-monroe"><span data-dcnode-id="569" instrument_node="">6. Marilyn Monroe</span></h2><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="515"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="516" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="524"><a data-dcnode-id="563"><picture class="is-waiting-to-load" data-dcnode-id="564"><source data-dcnode-id="567" data-srcset="https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTU3ODc4NjAzMjUyMjQ1ODMz/image-placeholder-title.webp 380w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTU3ODc4NjAzMjUyMjQ1ODMz/image-placeholder-title.webp 620w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_686/MTU3ODc4NjAzMjUyMjQ1ODMz/image-placeholder-title.webp 686w" sizes="(min-width: 1240px) 686px, (min-width: 675px) 620px, calc(100vw - 40px)" type="image/webp"><source data-dcnode-id="566" data-srcset="https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_380/MTU3ODc4NjAzMjUyMjQ1ODMz/image-placeholder-title.jpg 380w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_620/MTU3ODc4NjAzMjUyMjQ1ODMz/image-placeholder-title.jpg 620w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:good%2Cw_686/MTU3ODc4NjAzMjUyMjQ1ODMz/image-placeholder-title.jpg 686w" sizes="(min-width: 1240px) 686px, (min-width: 675px) 620px, calc(100vw - 40px)"><img alt="Actress Mari t was there that an army photographer spotted her and suggested that she try her hand at modeling. She proved to be a natural in front of the camera, and by 1946 she had dyed her hair blond, changed her name to Marilyn Monroe and started a new career as an actress. Her big break followed in 1950, when she nabbed memorable roles in the films “The Asphalt Jungle” and “All About Eve.” </span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-5" data-dcnode-id="499"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-5" data-dcnode-id="500" data-zone-count="6"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-192b2617bd8a474cb772efd8aefde3e4&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-5&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:
