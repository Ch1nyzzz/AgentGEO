</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">What makes a painting controversial? People would say something that attacks our religious concepts can be controversial; some would argue, anything that contains nude matter is controversial. Well, nothing of this is wrong because people have general norms related to such matters. And paintings often become controversial when it goes against these commonly accepted norms. Matters also depend on the time and era we are living in. Then there is the painting style; Art is a subjective assessment, with different opinions from art critics and general viewers. An artist who has an unusual style of painting can also create controversy in the art world, arguing if the works created by that artist should be considered a piece of art or not. So you see, people are so complicated with such matters that there again can be controversy in deciding whether a painting is controversial or not.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Nevertheless, throughout history audiences have been offended and outraged by paintings that were socially, religiously or politically inappropriate. Artists used subject matters that were a taboo in social situations. This could be a matter relating to one human being or nudity or addressing a complicated moral issue. In this post, I have tried to analyze some of the paintings from history that were considered controversial. Read on as some might make you feel uneasy even today.</span></p><span data-dcnode-id="872" instrument_node="">

</span><h2 data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">10. Rokeby Venus by Diego Velazquez</span></h2><span data-dcnode-id="855" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="845" style="margin: 8px 0; clear: both;"><span data-dcnode-id="854" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-4611886520401719" data-ad-format="auto" data-ad-slot="7423016370" data-dcnode-id="849" style="display:block"></ins><span data-dcnode-id="848" instrument_node="">
</span></div><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-by-Diego-Velazquez.jpg"><picture data-dcnode-id="841"><source data-dcnode-id="843" sizes="(max-width: 542px) 100vw, 542px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Rokeby-Venus-by-Diego-Velazquez.jpg.webp 542w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Rokeby-Venus-by-Diego-Velazquez-300x205.jpg.webp 300w" type="image/webp"><img alt="Rokeby Venus by Diego Velazquez" class="aligncenter size-full wp-image-826 webpexpress-processed" data-dcnode-id="842" height="371" sizes="(max-width: 542px) 100vw, 542px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-by-Diego-Velazquez.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-by-Diego-Velazquez.jpg 542w, https://www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-by-Diego-Velazquez-300x205.jpg 300w" width="542"></picture></a></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">This painting is the only surviving nude by Velazquez, a Spanish artist of the 17</span><sup data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">th</span></sup><span data-dcnode-id="834" instrument_node=""> century. Such &nbsp;paintings were really rare during those times and due to its nude content it was officially discouraged by the Spanish inquisition. But Velazquez being King Philip IV’s painter did not fear making such paintings. Considerable controversy had taken place from time to time relating to history of this painting, but the main reason it made to top ten is because of the controversy&nbsp; it faced in the later years. On March 10, 1914 this painting was mercilessly attacked by a woman named Mary Richardson. At first it was stated that the reason for her this action was provoked by the arrest of a fellow companion, but later in 1952, when interviewed she said that she destroyed&nbsp;the picture because she didn’t like the way men visitors gazed at it all day long. This act was observed as the representation of the feminist perception towards the female nude and that it showed a stereotypical image of feminism.</span></p><span data-dcnode-id="832" instrument_node="">
</span><h2 data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">9. Sick Bacchus by Caravaggio</span></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="824"><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/Sick-Bacchus-by-Caravaggio.jpg"><picture data-dcnode-id="826"><source data-dcnode-id="828" sizes="(max-width: 807px) 100vw, 807px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Sick-Bacchus-by-Caravaggio.jpg.webp 807w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Sick-Bacchus-by-Caravaggio-232x300.jpg.webp 232w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Sick-Bacchus-by-Caravaggio-794x1024.jpg.webp 794w" type="image/webp"><img alt="Sick Bacchus by Caravaggio" class="aligncenter size-full wp-image-827 webpexpress-processed" data-dcnode-id="827" height="1040" loading="lazy" sizes="(max-width: 807px) 100vw, 807px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/Sick-Bacchus-by-Caravaggio.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/Sick-Bacchus-by-Caravaggio.jpg 807w, https://www.elist10.com/wp-content/uploads/2013/09/Sick-Bacchus-by-Caravaggio-232x300.jpg 232w, https://www.elist10.com/wp-content/uploads/2013/09/Sick-Bacchus-by-Caravaggio-794x1024.jpg 794w" width="807"></picture></a></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">The painting shows a pale figure with blue lips which points at a serious disease called Syphilis. Syphilis is a sexually claimed disease which was extreme in the 19</span><sup data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">th</span></sup><span data-dcnode-id="819" instrument_node=""> century. The surprising fact about this painting is that it is a self-portrait of the artist himself. The artist, Caravaggio was suffering from the disease due to having multiple love partners in his life. The artist choosing himself to be painted as Bacchus (symbol in Greek mythology which stands for sexual liberation) is what makes this painting controversial. He had also killed his lover and lived the rest of his life running from authorities; adds up to the controversy of his paintings.</span></p><span data-dcnode-id="817" instrument_node="">
</span><h2 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">8. The Trench warfare by Otto Dix</span></h2><span data-dcnode-id="814" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="804" style="margin: 8px 0; clear: both;"><span data-dcnode-id="813" instrument_node="">
</span><span data-dcnode-id="811" instrument_node="">
</span><span data-dcnode-id="809" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4611886520401719" data-ad-format="auto" data-ad-slot="7423016370" data-dcnode-id="808" style="display:block"></ins><span data-dcnode-id="807" instrument_node="">
</span></div><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="798"><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Trench-warfare-by-Otto-Dix.jpg"><picture data-dcnode-id="800"><source data-dcnode-id="802" sizes="(max-width: 735px) 100vw, 735px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Trench-warfare-by-Otto-Dix-294x300.jpg.webp 294w" type="image/webp"><img alt="The Trench warfare by Otto Dix" class="aligncenter size-full wp-image-828 webpexpress-processed" data-dcnode-id="801" height="750" loading="lazy" sizes="(max-width: 735px) 100vw, 735px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Trench-warfare-by-Otto-Dix.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-Trench-warfare-by-Otto-Dix.jpg 735w, https://www.elist10.com/wp-content/uploads/2013/09/The-Trench-warfare-by-Otto-Dix-294x300.jpg 294w" width="735"></picture></a></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">A painting that portrays the effects of World War I by Otto Dix who is well known for painting horrid war paintings. He himself was a German soldier and while on the front he was wounded and sent back to home where he started painting the vivid nightmares he had about the war during his stay. Otto Dix later became an art teacher at the Dresden Academy but when Nazi’s took over Germany, they asked Otto to step down from his Job. His war paintings were also burned saying it was a gruesome depiction of war.&nbsp; ‘The Trench Warfare’ was the third in the three series paintings of the WWI by Otto. Otto was then forced to join the Nazi Government’s Reich chamber of fine arts and banned from making offensive paintings from there on</span></p><span data-dcnode-id="794" instrument_node="">
</span><h2 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">7. The Enigma of William Tell by Salvador Dali</span></h2><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Enigma-of-William-Tell-by-Salvador-Dali.jpg"><picture data-dcnode-id="788"><source data-dcnode-id="790" sizes="(max-width: 858px) 100vw, 858px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Enigma-of-William-Tell-by-Salvador-Dali.jpg.webp 858w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Enigma-of-William-Tell-by-Salvador-Dali-300x174.jpg.webp 300w" type="image/webp"><img alt="The Enigma of William Tell by Salvador Dali" class="aligncenter size-full wp-image-829 webpexpress-processed" data-dcnode-id="789" height="498" loading="lazy" sizes="(max-width: 858px) 100vw, 858px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Enigma-of-William-Tell-by-Salvador-Dali.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-Enigma-of-William-Tell-by-Salvador-Dali.jpg 858w, https://www.elist10.com/wp-content/uploads/2013/09/The-Enigma-of-William-Tell-by-Salvador-Dali-300x174.jpg 300w" width="858"></picture></a></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Shocking, weird, offensive and a lot other adjectives can be used to describe this painting from the very famous surrealist painter Salvador Dali. This is one of the strangest paintings to hang in any art museum. The reason that makes it a controversial piece of art is the way it represents Vladimir linen (the then Russian communist revolutionary, politician and political theorist). Andre Breton, the founder of surrealism, found this painting so outrageous that he and other Marxists surrealists wanted to destroy it and ruin the reputation of Dali. A lot of his other works are also provocative to look at but which made him famous. History also states that Breton’s anger was more of a professional jealousy. He thought that Dali’s art had become too commercialized and was threating the reputation and agenda of surrealists. After this Dali was no longer associated with the surrealists but he never left his paintings ever.</span></p><span data-dcnode-id="782" instrument_node="">
</span><h2 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">6. The last Judgment by Michelangelo</span></h2><span data-dcnode-id="779" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="769" style="margin: 8px 0; clear: both;"><span data-dcnode-id="778" instrument_node="">
</span><span data-dcnode-id="776" instrument_node="">
</span><span data-dcnode-id="774" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4611886520401719" data-ad-format="auto" data-ad-slot="7423016370" data-dcnode-id="773" style="display:block"></ins><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="763"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-last-Judgment-by-Michelangelo.jpg"><picture data-dcnode-id="765"><source data-dcnode-id="767" sizes="(max-width: 1200px) 100vw, 1200px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-last-Judgment-by-Michelangelo-249x300.jpg.webp 249w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-last-Judgment-by-Michelangelo-852x1024.jpg.webp 852w" type="image/webp"><img alt="The last Judgment by Michelangelo" class="aligncenter size-full wp-image-830 webpexpress-processed" data-dcnode-id="766" height="1442" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-last-Judgment-by-Michelangelo.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-last-Judgment-by-Michelangelo.jpg 924w, https://www.elist10.com/wp-content/uploads/2013/09/The-last-Judgment-by-Michelangelo-249x300.jpg 249w, https://www.elist10.com/wp-content/uploads/2013/09/The-last-Judgment-by-Michelangelo-852x1024.jpg 852w" width="1200"></picture></a></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">This is a fresco by Michelangelo on the altar wall of the Sistine Chapel. This painting was the reason of heavy dispute between the Catholic Church and those who appreciated Michelangelo’s work. The church stated that this painting was not meant for a chapel but rather for public baths and taverns for depicting nude figures in such a sacred place. All the genitalia exposed in the fresco were then censored by painting over with drapery after Michelangelo’s death. Later between 1980 and 1994 when the fresco was being restored, it was then that half of its censorship was removed which revealed various buried details.</span></p><span data-dcnode-id="759" instrument_node="">
</span><h2 data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">5. The death of the Virgin by Caravaggio</span></h2><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="751"><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-death-of-the-Virgin-by-Caravaggio.jpg"><picture data-dcnode-id="753"><source data-dcnode-id="755" sizes="(max-width: 820px) 100vw, 820px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-death-of-the-Virgin-by-Caravaggio.jpg.webp 820w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-death-of-the-Virgin-by-Caravaggio-246x300.jpg.webp 246w" type="image/webp"><img alt="The death of the Virgin by Caravaggio" class="aligncenter size-full wp-image-831 webpexpress-processed" data-dcnode-id="754" height="1000" loading="lazy" sizes="(max-width: 820px) 100vw, 820px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-death-of-the-Virgin-by-Caravaggio.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-death-of-the-Virgin-by-Caravaggio.jpg 820w, https://www.elist10.com/wp-content/uploads/2013/09/The-death-of-the-Virgin-by-Caravaggio-246x300.jpg 246w" width="820"></picture></a></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">Again a painting from Caravaggio. He was himself a controversial painter of the 16</span><sup data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">th</span></sup><span data-dcnode-id="746" instrument_node=""> century because he always painting the things as he wanted and not the way the church wanted. This is what makes this painting controversial as well. The church was outraged as soon as they saw this painting for many reasons. Firstly, because Caravaggio used a well-known prostitute of those times as the model of this painting. Secondly, Mary is considered a holy figure by many and according to the church Caravaggio had painted her as if she was just like everyone else. Also, that this painting was supposed to show Mary dying peacefully but looking at the painting, the figure suggested that she was long gone (due to her swollen feet and bloated stomach). Plus, they also didn’t like the way her legs were showing (Duh!).</span></p><span data-dcnode-id="744" instrument_node="">
</span><h2 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">4. The Gross Clinic by Thomas Eakins</span></h2><span data-dcnode-id="741" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="731" style="margin: 8px 0; clear: both;"><span data-dcnode-id="740" instrument_node="">
</span><span data-dcnode-id="738" instrument_node="">
</span><span data-dcnode-id="736" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4611886520401719" data-ad-format="auto" data-ad-slot="7423016370" data-dcnode-id="735" style="display:block"></ins><span data-dcnode-id="734" instrument_node="">
</span></div><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725"><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-controversial-paintings.jpg"><picture data-dcnode-id="727"><source data-dcnode-id="729" sizes="(max-width: 483px) 100vw, 483px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Rokeby-Venus-controversial-paintings.jpg.webp 483w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/Rokeby-Venus-controversial-paintings-241x300.jpg.webp 241w" type="image/webp"><img alt="Rokeby Venus controversial paintings" class="aligncenter size-full wp-image-821 webpexpress-processed" data-dcnode-id="728" height="599" loading="lazy" sizes="(max-width: 483px) 100vw, 483px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-controversial-paintings.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-controversial-paintings.jpg 483w, https://www.elist10.com/wp-content/uploads/2013/09/Rokeby-Venus-controversial-paintings-241x300.jpg 241w" width="483"></picture></a></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Thomas Eakins, the painter of this painting, had spent a large part of his career in scandals and controversy. When Eakins has submitted this painting to the exposition, it was rejected saying that it’s too gruesome to be called a work of art. The painting is controversial for both the odd representation of the figure of the patient, which is still not clear, is a male or a female and the displeasing procedure shown. Adding to the drama is the woman in the painting sitting aside, possibly the patient’s mother in distress. This blood-spattered and dull depiction of surgery had shocked the audience when it was first exhibited.</span></p><span data-dcnode-id="721" instrument_node="">
</span><h2 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">3. The Nude Maja by Francisco Goya</span></h2><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Nude-Maja-by-Francisco-Goya.jpg"><picture data-dcnode-id="715"><source data-dcnode-id="717" sizes="(max-width: 640px) 100vw, 640px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Nude-Maja-by-Francisco-Goya.jpg.webp 640w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Nude-Maja-by-Francisco-Goya-300x150.jpg.webp 300w" type="image/webp"><img alt="The Nude Maja by Francisco Goya" class="aligncenter size-full wp-image-832 webpexpress-processed" data-dcnode-id="716" height="322" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Nude-Maja-by-Francisco-Goya.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-Nude-Maja-by-Francisco-Goya.jpg 640w, https://www.elist10.com/wp-content/uploads/2013/09/The-Nude-Maja-by-Francisco-Goya-300x150.jpg 300w" width="640"></picture></a></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">The nude Maja is the first in a two paintings series, the second being ‘The clothed Maja’ by Francisco Goya. The painting is controversial for obvious reasons of exposing a naked woman. The 1815 Spanish inquisitions had rejected the painting saying that it’s obscene and Goya had to paint a clothed one. In 1936 the former painting was returned to the Academy of Fine Arts. What adds to the controversy is that later in 1930, two sets of stamps depicting ‘The nude Maja’ was privately produced which the Spanish postal authorities had approved of but the US government barred from entering it into the country and returned the mails bearing the stamp as it was the first time a stamp represented a naked woman.</span></p><span data-dcnode-id="709" instrument_node="">
</span><h2 data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">2. The Mona Lisa by Leonardo da Vinci</span></h2><span data-dcnode-id="706" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="696" style="margin: 8px 0; clear: both;"><span data-dcnode-id="705" instrument_node="">
</span><span data-dcnode-id="703" instrument_node="">
</span><span data-dcnode-id="701" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4611886520401719" data-ad-format="auto" data-ad-slot="7423016370" data-dcnode-id="700" style="display:block"></ins><span data-dcnode-id="699" instrument_node="">
</span></div><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Mona-Lisa-by-Leonardo-da-Vinci.jpg"><picture data-dcnode-id="692"><source data-dcnode-id="694" sizes="(max-width: 743px) 100vw, 743px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Mona-Lisa-by-Leonardo-da-Vinci.jpg.webp 743w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Mona-Lisa-by-Leonardo-da-Vinci-658x1024.jpg.webp 658w" type="image/webp"><img alt="The Mona Lisa by Leonardo da Vinci" class="aligncenter size-full wp-image-833 webpexpress-processed" data-dcnode-id="693" height="1155" loading="lazy" sizes="(max-width: 743px) 100vw, 743px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Mona-Lisa-by-Leonardo-da-Vinci.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-Mona-Lisa-by-Leonardo-da-Vinci.jpg 743w, https://www.elist10.com/wp-content/uploads/2013/09/The-Mona-Lisa-by-Leonardo-da-Vinci-658x1024.jpg 658w" width="743"></picture></a></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Toping second on the list is Mona Lisa, by Leonardo da Vinci. This painting has never failed to captivate the countless generations in its mystery and ongoing controversy. It still remains a suspense weather the speculations put upon The Mona Lisa are real or is it just a simple beautiful painting which it is supposed to be. It began at first by arguing that the painting has been trimmed and the panel on both sides of the painting has been removed as earlier copies had depicted column on both the sides of the figure. But later it was proved to be genuine and not edited. Then came the landscape, which seemed more than just a landscape to the speculators. They started to claim that the background contained hidden images of animals such as a lion, an ape and buffalos hovering in the air, even crocodiles and snakes and that Mona Lisa is actually an epitome of envy.&nbsp; Then the epic smile, which seems different to everyone who looks at it. Also, the eyebrows and eyelashes, it was strange that Mona Lisa didn’t have any of it. And the list would go on and on.&nbsp; If Vinci was alive today, he would be thoroughly amused by the way people interpreted his paintings.</span></p><span data-dcnode-id="686" instrument_node="">
</span><h2 data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">1. The Origin of the World by Gustave Courbet</span></h2><span data-dcnode-id="683" instrument_node="">
</span><figure aria-describedby="caption-attachment-834" class="wp-caption aligncenter" data-dcnode-id="676" id="attachment_834" style="width: 590px"><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Origin-of-the-World-by-Gustavo-Courbet.jpg"><picture data-dcnode-id="680"><source data-dcnode-id="682" sizes="(max-width: 600px) 100vw, 600px" srcset="https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Origin-of-the-World-by-Gustavo-Courbet.jpg.webp 600w, https://www.elist10.com/wp-content/webp-express/webp-images/uploads/2013/09/The-Origin-of-the-World-by-Gustavo-Courbet-300x247.jpg.webp 300w" type="image/webp"><img alt="The Origin of the World by Gustavo Courbet" class="size-full wp-image-834 webpexpress-processed" data-dcnode-id="681" height="495" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elist10.com/wp-content/uploads/2013/09/The-Origin-of-the-World-by-Gustavo-Courbet.jpg&amp;raw" srcset="https://www.elist10.com/wp-content/uploads/2013/09/The-Origin-of-the-World-by-Gustavo-Courbet.jpg 600w, https://www.elist10.com/wp-content/uploads/2013/09/The-Origin-of-the-World-by-Gustavo-Courbet-300x247.jpg 300w" width="600"></picture></a><figcaption class="wp-caption-text" data-dcnode-id="677" id="caption-attachment-834"><span data-dcnode-id="678" instrument_node="">The image has been censored in the blog due to explicit sexual content</span></figcaption></figure><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A very bold painting by Gustavo Courbet. This realistic, graphical eroticism in the name of painting still have the power to shock and trigger censorship. Gustavo tried to violate the public and he loved doing that via his paintings. But he never dared to cross the lines. He made ‘The origin of the world’ in protest against the Academy, where students were trained to draw the statues with stereotyped and camouflaged bodies. Courbet hated this formula and said he could only paint what he saw. Then started the paintings ride with controversies. In 1994 a French novel reproduced this painting on its book cover, which the French police removed from the stalls as soon as it was published. Similar controversy was repeated in 2009 in Baraga, Portugal. Later in 2011, Facebook also censored ‘The origin of the world’, disabling the accounts and pages about this painting. (better not to put up a picture)</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">&nbsp;</span></p><span data-dcnode-id="669" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="659" style="margin: 8px 0; clear: both;"><span data-dcnode-id="668" instrument_node="">
</span><span data-dcnode-id="666" instrument_node="">
</span><span data-dcnode-id="664" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4611886520401719" data-ad-format="auto" data-ad-slot="7423016370" data-dcnode-id="663" style="display:block"></ins><span data-dcnode-id="662" instrument_node="">
</span></div><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="654"><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Final Conclusion:</span></strong><span data-dcnode-id="655" instrument_node=""> &nbsp;So, one can say that it really boils down to three major factors- sex, religion and politics when it comes to controversies related to paintings. All other issues link to or fall between those three only. So, if you can combine all the three factors and come up a piece of art, then voila! You are in news already.</span></p><span data-dcnode-id="653" instrument_node="">
