</span><figure class="wp-caption alignnone" data-dcnode-id="1549" style="width: 1504px"><div class="media-credit-container alignnone" data-dcnode-id="1550" style="width: 1504px"><img alt="Jane Fonda facts" class="lazy-hidden size-full wp-image-350436" data-dcnode-id="1556" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay.jpg 1504w, https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay-300x263.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay-768x674.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay-1024x899.jpg 1024w" height="1320" loading="lazy" sizes="(max-width: 1504px) 100vw, 1504px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1504"><noscript data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350436" src="https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay.jpg" alt="Jane Fonda facts" width="1504" height="1320" srcset="https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay.jpg 1504w, https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay-300x263.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay-768x674.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/Fondas-1938-Photoplay-1024x899.jpg 1024w" sizes="(max-width: 1504px) 100vw, 1504px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1551"><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/File%3AFondas-1938-Photoplay.jpg"><span data-dcnode-id="1553" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1548" instrument_node="">
</span><h2 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">75. The Mother Of His Children Met A Tragic End</span></h2><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">On April 14, 1950, just 10 days after she turned 42, Frances Ford Seymour perished by suicide while still receiving treatment for her mental illness. Fonda must have been devastated at the horrific news, as well as what it meant for his young family—but all the same, his response to the tragedy has lived in infamy ever since.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1534" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1535" style="width: 2560px"><img alt="Henry Fonda facts" class="lazy-hidden size-full wp-image-473631" data-dcnode-id="1541" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-1024x687.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-768x515.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-1536x1031.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-2048x1374.jpg 2048w" height="1718" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-473631" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-scaled.jpg" alt="Henry Fonda facts" width="2560" height="1718" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-300x201.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-1024x687.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-768x515.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-1536x1031.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-507261293-2048x1374.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1536"><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1538" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1533" instrument_node="">
</span><h2 data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">76. He Lied To His Family</span></h2><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1529" instrument_node="">When Frances passed, Fonda’s children Jane and Peter were only 12 and 10 years old. Thinking he was protecting them, </span><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Fonda told them a horrific lie</span></strong><span data-dcnode-id="1526" instrument_node="">. Instead of admitting the true circumstances of their mother’s passing, Fonda claimed she had died from heart failure. Maybe that’s forgivable, but his next actions sure weren’t.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1516" style="width: 842px"><div class="media-credit-container alignnone" data-dcnode-id="1517" style="width: 842px"><img alt="Henry Fonda facts" class="lazy-hidden size-full wp-image-473638" data-dcnode-id="1523" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s.jpg 842w, https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s-768x597.jpg 768w" height="654" loading="lazy" sizes="(max-width: 842px) 100vw, 842px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="842"><noscript data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-473638" src="https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s.jpg" alt="Henry Fonda facts" width="842" height="654" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s.jpg 842w, https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Jane_Fonda__Henry_Fonda__Peter_Fonda_1950s-768x597.jpg 768w" sizes="(max-width: 842px) 100vw, 842px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1518"><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJane_Fonda__Henry_Fonda__Peter_Fonda%2C_1950s.jpg"><span data-dcnode-id="1520" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1515" instrument_node="">
</span><h2 data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">77. He Gave His Wife A Cruel Goodbye</span></h2><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Fonda was a man who did nothing by halves, and he took his dishonesty about Frances to the next level. Likely afraid of any “unnecessary” outpourings of emotion, Fonda didn’t even let his own children go to their mother’s funeral, instead putting on a hasty affair with just himself and his mother-in-law in attendance. Oh, but that wasn’t all.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1501" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1502" style="width: 2560px"><img alt="Henry Fonda facts" class="lazy-hidden size-full wp-image-473643" data-dcnode-id="1508" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-1024x857.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-768x643.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-1536x1285.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-2048x1713.jpg 2048w" height="2142" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-473643" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-scaled.jpg" alt="Henry Fonda facts" width="2560" height="2142" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-1024x857.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-768x643.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-1536x1285.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-527189626-2048x1713.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1503"><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1505" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1500" instrument_node="">
</span><h2 data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">78. Controlled His Children</span></h2><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1496" instrument_node="">Fonda’s final turn of the screw was a doozy. In order to completely hide the truth from his children, he canceled all newspaper and magazine subscriptions to their house, lest they stumble across a story about it. Despite Fonda’s efforts, </span><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">he couldn’t hide the truth</span></strong><span data-dcnode-id="1493" instrument_node="">. Young Jane found out about her own mother’s tragic end while thumbing through a magazine in a study hall.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">As we’ll see, however, there was still one bitter coda to Brokaw’s story—contained in her final letters.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1480" style="width: 3252px"><div class="media-credit-container alignnone" data-dcnode-id="1481" style="width: 3252px"><img alt="Jane Fonda facts" class="lazy-hidden size-full wp-image-350580" data-dcnode-id="1487" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270.jpg 3252w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270-768x580.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270-1024x773.jpg 1024w" height="2456" loading="lazy" sizes="(max-width: 3252px) 100vw, 3252px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3252"><noscript data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-350580" src="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270.jpg" alt="Jane Fonda facts" width="3252" height="2456" srcset="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270.jpg 3252w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270-768x580.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-73160270-1024x773.jpg 1024w" sizes="(max-width: 3252px) 100vw, 3252px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1482"><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1484" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1479" instrument_node="">
</span><h2 data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">79. His Wife Gave Him One Final Insult</span></h2><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1475" instrument_node="">When the dust settled on Brokaw’s passing, the disturbed woman still managed to haunt Fonda. Before her suicide, she had written no fewer than six goodbye letters to the loved ones in her life. </span><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">But there was one bitter omission. </span></strong><span data-dcnode-id="1472" instrument_node="">She hadn’t written a single thing to Fonda himself. And Brokaw’s therapist at the asylum thought she knew why…</span></p><span data-dcnode-id="1470" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1462" style="width: 1969px"><div class="media-credit-container alignnone" data-dcnode-id="1463" style="width: 1969px"><img alt="Henry Fonda facts " class="lazy-hidden size-full wp-image-473599" data-dcnode-id="1469" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock.jpg 1969w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-1024x784.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-768x588.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-1536x1176.jpg 1536w" height="1508" loading="lazy" sizes="(max-width: 1969px) 100vw, 1969px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1969"><noscript data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-473599" src="https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock.jpg" alt="Henry Fonda facts " width="1969" height="1508" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock.jpg 1969w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-1024x784.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-768x588.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/Henry_Fonda_in_Warlock-1536x1176.jpg 1536w" sizes="(max-width: 1969px) 100vw, 1969px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1464"><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Fonda"><span data-dcnode-id="1466" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1461" instrument_node="">
</span><h2 data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">80. He Was “A Complete Narcissist”</span></h2><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Therapists are supposed to be objective, but apparently not when it comes to Henry Fonda. Brokaw’s doctor got an incredibly chilling portrait of the actor through his late wife’s final sessions. Years later, the psychiatrist confessed that in her medical opinion, Fonda was “a cold, self-absorbed person, [and] a complete narcissist.” Ouch.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">However, when it came to truly profiling their actors, Hollywood had its work cut out. You see, some of its actors were living secret double lives.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1444" style="width: 2005px"><div class="media-credit-container alignnone" data-dcnode-id="1445" style="width: 2005px"><img alt="Henry Fonda facts" class="lazy-hidden size-full wp-image-473671" data-dcnode-id="1451" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565.jpg 2005w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-1024x818.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-768x613.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-1536x1227.jpg 1536w" height="1601" loading="lazy" sizes="(max-width: 2005px) 100vw, 2005px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2005"><noscript data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-473671" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565.jpg" alt="Henry Fonda facts" width="2005" height="1601" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565.jpg 2005w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-300x240.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-1024x818.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-768x613.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-51529565-1536x1227.jpg 1536w" sizes="(max-width: 2005px) 100vw, 2005px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1446"><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1448" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1443" instrument_node="">
</span><h2 data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">81. Burt Lancaster: A Double Life</span></h2><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1439" instrument_node="">In 2000, six years after his passing, </span><strong data-dcnode-id="1435"><span data-dcnode-id="1438" instrument_node="">the FBI released documents shocking new documents about </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/burt-lancaster/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1437" instrument_node="">Burt Lancaster.</span></a></strong><span data-dcnode-id="1434" instrument_node="">&nbsp;Back in the 1950s, J. Edgar Hoover was keeping a close eye on Lancaster—specifically on his private life. The information pointed to Lancaster having affairs with many men, and even being a predator. Whether we can trust this information is another story.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Hoover could have made it up to further implicate Lancaster, who he saw as a dangerous communist.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1421" style="width: 1233px"><div class="media-credit-container alignnone" data-dcnode-id="1422" style="width: 1233px"><img alt="Burt Lancaster facts " class="lazy-hidden size-full wp-image-525995" data-dcnode-id="1428" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947.jpg 1233w, https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947-1024x816.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947-768x612.jpg 768w" height="982" loading="lazy" sizes="(max-width: 1233px) 100vw, 1233px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1233"><noscript data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-525995" src="https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947.jpg" alt="Burt Lancaster facts " width="1233" height="982" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947.jpg 1233w, https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947-1024x816.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/Burt_Lancaster_-_publicity_1947-768x612.jpg 768w" sizes="(max-width: 1233px) 100vw, 1233px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1423"><a data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burt_Lancaster"><span data-dcnode-id="1425" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1420" instrument_node="">
</span><h2 data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">82. The Gay Rumors Won’t Die</span></h2><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">Even outside the FBI, rumors of Lancaster’s homosexuality continue to proliferate. Most of them come from Lancaster’s acute attention to staying fit and his preference for male personal secretaries over female ones. The other, maybe more telling, proof is the number of times he visited </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/rock-hudson-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1415" instrument_node="">Rock Hudson’s</span></a><span data-dcnode-id="1413" instrument_node=""> home, where gay orgies allegedly took place frequently.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">In fact, </span><em data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">years </span></em><span data-dcnode-id="1407" instrument_node="">before Lancaster’s passing, whispers about these hot and heavy interludes had already begun to circulate.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1397" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1398" style="width: 2560px"><img alt="Burt Lancaster facts" class="lazy-hidden size-full wp-image-526196" data-dcnode-id="1404" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-300x245.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-1024x838.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-768x628.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-1536x1256.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-2048x1675.jpg 2048w" height="2094" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-526196" src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-scaled.jpg" alt="Burt Lancaster facts" width="2560" height="2094" srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-300x245.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-1024x838.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-768x628.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-1536x1256.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-516478902-2048x1675.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1399"><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1401" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1396" instrument_node="">
</span><h2 data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">83. He Was Wrapped Up In Scandal</span></h2><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">In 1960, a revealing report emerged about a raid on a Hollywood mansion. It turns out that the owner of the mansion was hosting lewd parties catered to gay men. Even though the mansion was highly secure, photographers secretly snapped shots of the partygoers having all-male orgies. The attendees allegedly included Burt Lancaster, Rock Hudson, an admiral, oh…and 250 Marines.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Hollywood insiders have a habit of protecting the secrets of their own, so we may never know the absolute truth.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1379" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1380" style="width: 2560px"><img alt="Burt Lancaster facts" class="lazy-hidden size-full wp-image-526332" data-dcnode-id="1386" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-300x217.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-1024x742.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-768x557.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-1536x1114.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-2048x1485.jpg 2048w" height="1856" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-526332" src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-scaled.jpg" alt="Burt Lancaster facts" width="2560" height="1856" srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-300x217.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-1024x742.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-768x557.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-1536x1114.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-3170403-2048x1485.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1381"><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1383" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1378" instrument_node="">
</span><h2 data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">84. He Started A Scene</span></h2><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Even though Lancaster’s alleged gay lifestyle was almost completely under wraps, some people say that he and Rock Hudson may have started something that’s still with us today: The idea of being openly gay. Young people finding out that two famous men, like Lancaster and Hudson, were, or even could have been, “a little light in their loafers”—to use an old euphemism—maybe set the tone for future men and women to come out.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Lancaster, however, wasn’t the only gay heartthrob in Hollywood to keep his secrets close.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1361" style="width: 1979px"><div class="media-credit-container alignnone" data-dcnode-id="1362" style="width: 1979px"><img alt="Burt Lancaster facts" class="lazy-hidden size-full wp-image-526218" data-dcnode-id="1368" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o.jpg 1979w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-1024x773.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-768x579.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-1536x1159.jpg 1536w" height="1493" loading="lazy" sizes="(max-width: 1979px) 100vw, 1979px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1979"><noscript data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-526218" src="https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o.jpg" alt="Burt Lancaster facts" width="1979" height="1493" srcset="https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o.jpg 1979w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-1024x773.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-768x579.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/46360760121_7ab5f0c157_o-1536x1159.jpg 1536w" sizes="(max-width: 1979px) 100vw, 1979px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1363"><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/vintagemusclemags/46360760121/"><span data-dcnode-id="1365" instrument_node="">Flickr, Bob Sinclair</span></a></span></div></figure><span data-dcnode-id="1360" instrument_node="">
</span><h2 data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">85. Anthony Perkins: The King Of Secrets</span></h2><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1356" instrument_node="">One of </span><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/anthony-perkins/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1355" instrument_node="">Anthony Perkins’</span></a><span data-dcnode-id="1353" instrument_node=""> greatest secrets was his romance with Hollywood heartthrob </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/tab-hunter-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1352" instrument_node="">Tab Hunter</span></a><span data-dcnode-id="1350" instrument_node="">. They kept their affair a secret from </span><em data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">everyone,&nbsp;</span></em><span data-dcnode-id="1347" instrument_node="">and to their friends, they were always just good “college buddies.” Behind closed doors, however, their passion for one another was red-hot. Although their clandestine love only lasted three years, it was </span><em data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">nothing</span></em><span data-dcnode-id="1344" instrument_node=""> compared to Perkins’ most brutal truth.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1334" style="width: 1970px"><div class="media-credit-container alignnone" data-dcnode-id="1335" style="width: 1970px"><img alt="Tab Hunter facts" class="lazy-hidden size-full wp-image-434406" data-dcnode-id="1341" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o.jpg 1970w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-1024x779.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-768x584.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-1536x1168.jpg 1536w" height="1498" loading="lazy" sizes="(max-width: 1970px) 100vw, 1970px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1970"><noscript data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-434406" src="https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o.jpg" alt="Tab Hunter facts" width="1970" height="1498" srcset="https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o.jpg 1970w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-1024x779.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-768x584.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/08/5190365823_a70fb16208_o-1536x1168.jpg 1536w" sizes="(max-width: 1970px) 100vw, 1970px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1336"><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/slightlyterrific/5190365823"><span data-dcnode-id="1338" instrument_node="">Flickr, kate gabrielle</span></a></span></div></figure><span data-dcnode-id="1333" instrument_node="">
</span><h2 data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">86. His Friends Won’t Tattle</span></h2><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node="">Nobody close to Perkins is willing to divulge anything regarding his fidelity or whether he had affairs with men throughout his marriage. His friends were resolutely loyal to his privacy. However, when he was 58, </span><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">a strange series of events occurred that led Perkins to a devastating discovery</span></strong><span data-dcnode-id="1326" instrument_node="">—one with the power to topple not only his marriage but the foundation of his entire life…</span></p><span data-dcnode-id="1324" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1316" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1317" style="width: 1280px"><img alt="Anthony Perkins facts " class="lazy-hidden size-full wp-image-475040" data-dcnode-id="1323" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo.jpg 1280w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo-1024x817.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo-768x613.jpg 768w" height="1021" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475040" src="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo.jpg" alt="Anthony Perkins facts " width="1280" height="1021" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo.jpg 1280w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo-300x239.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo-1024x817.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_Psycho_Publicity_Photo-768x613.jpg 768w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1318"><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Perkins%23/media/File%3AAnthony_Perkins_Psycho_Publicity_Photo.jpg"><span data-dcnode-id="1320" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1315" instrument_node="">
</span><h2 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">87. The Tabloids Found Out First</span></h2><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1311" instrument_node="">When </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The Enquirer</span></em><span data-dcnode-id="1308" instrument_node="">—a tabloid paper—published a story claiming that Perkins had HIV, nobody took it too seriously…except maybe for Perkins himself. Completely thrown by the media’s claim, he went for tests to find out the truth. When the results proved positive, he realized that </span><em data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The Enquirer </span></em><span data-dcnode-id="1305" instrument_node="">must have gained access to this confidential information before he did…</span></p><span data-dcnode-id="1303" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1295" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1296" style="width: 2560px"><img alt="Anthony Perkins facts" class="lazy-hidden size-full wp-image-475089" data-dcnode-id="1302" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-1024x733.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-768x550.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-1536x1100.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-2048x1467.jpg 2048w" height="1833" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475089" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-scaled.jpg" alt="Anthony Perkins facts" width="2560" height="1833" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-1024x733.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-768x550.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-1536x1100.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-141567303-2048x1467.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1297"><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1299" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1294" instrument_node="">
</span><h2 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">88. He Contracted HIV…</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1290" instrument_node="">When a salacious story is on the table, morals have a funny way of flying out the window. Here’s what happened: When Perkins visited the hospital for treatment regarding a facial palsy, someone with access to his blood samples tested it for HIV and leaked the positive results to the paper. Already a seasoned pro in the secrets domain, </span><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Perkins was ready to hide his newest, most ruinous secret of all.</span></strong></p><span data-dcnode-id="1286" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1278" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1279" style="width: 2560px"><img alt="Anthony Perkins facts" class="lazy-hidden size-full wp-image-475134" data-dcnode-id="1285" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-1024x682.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-1536x1022.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-2048x1363.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-340x225.jpg 340w" height="1704" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475134" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-scaled.jpg" alt="Anthony Perkins facts" width="2560" height="1704" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-1024x682.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-1536x1022.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-2048x1363.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-949966392-340x225.jpg 340w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1280"><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1282" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1277" instrument_node="">
</span><h2 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">89. …But His Wife Didn’t</span></h2><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">As a devoted wife and mother, Berry Berenson was no doubt heartbroken by the news of her husband’s diagnosis. But she was also terrified for herself and her children. Over the next two years, she went for testing multiple times and, thankfully, received negative results every time. With sad confusion and bafflement, she said, ”I don’t understand any of this. I don’t understand this disease at all.”</span></p><span data-dcnode-id="1271" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1263" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1264" style="width: 2560px"><img alt="Anthony Perkins facts" class="lazy-hidden size-full wp-image-475120" data-dcnode-id="1270" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-1024x698.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-768x523.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-1536x1047.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-2048x1395.jpg 2048w" height="1744" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475120" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-scaled.jpg" alt="Anthony Perkins facts" width="2560" height="1744" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-1024x698.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-768x523.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-1536x1047.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-158874628-2048x1395.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1265"><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1267" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1262" instrument_node="">
</span><h2 data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">90. He Suffered In Silence</span></h2><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">As we know, anything that could hurt Perkins’s career remained concealed beneath the surface. This applied to his many boyfriends—and now—his debilitating diagnosis. He chose to suffer through AIDs with only his wife and family as close confidantes. Even visits to the hospital were incognito…</span></p><span data-dcnode-id="1256" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1248" style="width: 884px"><div class="media-credit-container alignnone" data-dcnode-id="1249" style="width: 884px"><img alt="Anthony Perkins facts" class="lazy-hidden size-full wp-image-475118" data-dcnode-id="1255" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7.jpg 884w, https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7-300x185.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7-768x473.jpg 768w" height="544" loading="lazy" sizes="(max-width: 884px) 100vw, 884px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="884"><noscript data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475118" src="https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7.jpg" alt="Anthony Perkins facts" width="884" height="544" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7.jpg 884w, https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7-300x185.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Untitled-8-7-768x473.jpg 768w" sizes="(max-width: 884px) 100vw, 884px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1250"><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paramount.com/"><span data-dcnode-id="1252" instrument_node="">Psycho (1960), Paramount Pictures</span></a></span></div></figure><span data-dcnode-id="1247" instrument_node="">
</span><h2 data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">91. He Used An Alias</span></h2><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Perkins visited the hospital three times during his illness and every time, he and his wife used aliases. The pretending was especially difficult for Berenson—watching her husband slip into another role for the sake of saving face: “You think that this man has spent his entire life giving people so much pleasure in show business, and this is his reward. He can’t even be himself at the end.”</span></p><span data-dcnode-id="1241" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1233" style="width: 2190px"><div class="media-credit-container alignnone" data-dcnode-id="1234" style="width: 2190px"><img alt="Anthony Perkins facts" class="lazy-hidden size-full wp-image-475112" data-dcnode-id="1240" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864.jpg 2190w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-300x213.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-1024x727.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-768x545.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-1536x1090.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-2048x1453.jpg 2048w" height="1554" loading="lazy" sizes="(max-width: 2190px) 100vw, 2190px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2190"><noscript data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475112" src="https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864.jpg" alt="Anthony Perkins facts" width="2190" height="1554" srcset="https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864.jpg 2190w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-300x213.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-1024x727.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-768x545.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-1536x1090.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/shutterstock_1397783864-2048x1453.jpg 2048w" sizes="(max-width: 2190px) 100vw, 2190px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1235"><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1237" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1232" instrument_node="">
</span><h2 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">92. He Quoted A Famous Film</span></h2><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">During his final days, Perkins illuminated the reason for his silence. He spoke directly to his sons about his decision to keep his illness a secret: “…because to misquote </span><em data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Casablanca</span></em><span data-dcnode-id="1225" instrument_node="">, I’m not much at being noble, but it doesn’t take too much to see that the problems of an old actor don’t amount to a hill of beans in this crazy old world.”</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node="">Now, while a private man like Perkins tried to keep his life under wraps, this next actress had a knack for letting&nbsp;</span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">everything</span></em><span data-dcnode-id="1219" instrument_node=""> show.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1209" style="width: 2121px"><div class="media-credit-container alignnone" data-dcnode-id="1210" style="width: 2121px"><img alt="Anthony Perkins facts" class="lazy-hidden size-full wp-image-475122" data-dcnode-id="1216" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983.jpg 2121w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-1024x770.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-768x578.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-1536x1155.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-2048x1540.jpg 2048w" height="1595" loading="lazy" sizes="(max-width: 2121px) 100vw, 2121px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2121"><noscript data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475122" src="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983.jpg" alt="Anthony Perkins facts" width="2121" height="1595" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983.jpg 2121w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-1024x770.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-768x578.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-1536x1155.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/Anthony_Perkins_1983-2048x1540.jpg 2048w" sizes="(max-width: 2121px) 100vw, 2121px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1211"><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Perkins%23/media/File%3AAnthony_Perkins_%281983%29.jpg"><span data-dcnode-id="1213" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="1208" instrument_node="">
</span><h2 data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">93. Joan Collins and Warren Beatty: Love’s Dire Consequences</span></h2><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1201"><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-joan-collins/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1204" instrument_node="">Joan Collins’</span></a><span data-dcnode-id="1202" instrument_node=""> scandalous career hid a number of naughty secrets, but the most heartbreaking one of all revolves around one notorious Hollywood player. One night, while dining at a Hollywood restaurant, Joan Collins couldn’t help but notice a handsome younger man looking her way. The man was very confident, brazen even.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1199" instrument_node="">Collins became intrigued and asked her companion who the young man was. Her friend told her that it was </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-shirley-maclaine/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1198" instrument_node="">Shirley MacLaine’s</span></a><span data-dcnode-id="1196" instrument_node=""> brother, who was just getting started as an actor. His name? </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/42-star-studded-facts-warren-beatty/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1195" instrument_node="">Warren Beatty</span></a><span data-dcnode-id="1193" instrument_node="">.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1183" style="width: 1624px"><div class="media-credit-container alignnone" data-dcnode-id="1184" style="width: 1624px"><img alt="Joan Collins facts" class="lazy-hidden size-full wp-image-513272" data-dcnode-id="1190" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o.jpg 1624w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-1024x806.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-768x604.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-1536x1209.jpg 1536w" height="1278" loading="lazy" sizes="(max-width: 1624px) 100vw, 1624px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1624"><noscript data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-513272" src="https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o.jpg" alt="Joan Collins facts" width="1624" height="1278" srcset="https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o.jpg 1624w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-1024x806.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-768x604.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/06/6684645109_0fd09943cc_o-1536x1209.jpg 1536w" sizes="(max-width: 1624px) 100vw, 1624px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1185"><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/22864665%40N06/6684645109"><span data-dcnode-id="1187" instrument_node="">Flickr, Isabel Santos Pilot</span></a></span></div></figure><span data-dcnode-id="1182" instrument_node="">
</span><h2 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">94. She Played House</span></h2><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1178" instrument_node="">After seeing Collins that night, Beatty—determined to take her out on a date—managed to get a hold of her number. Collins was 26 and Beatty was just 22, but once they started dating, their passion was unrivaled. In fact, it didn’t take long for Beatty to move into Collins’ apartment. The two played like they were a married couple and Collins enjoyed how compatible they were. But soon,</span><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node=""> Collins found out something very odd about her younger boyfriend.</span></strong></p><span data-dcnode-id="1174" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1166" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1167" style="width: 2560px"><img alt="Joan Collins facts " class="lazy-hidden size-full wp-image-513481" data-dcnode-id="1173" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-1024x832.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-768x624.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-1536x1248.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-2048x1664.jpg 2048w" height="2080" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-513481" src="https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-scaled.jpg" alt="Joan Collins facts " width="2560" height="2080" srcset="https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-1024x832.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-768x624.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-1536x1248.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/06/GettyImages-515257824-2048x1664.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1168"><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1170" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1165" instrument_node="">
</span><h2 data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">95. She Tried To Keep Him Satisfied</span></h2><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Despite the age difference, Collins and Beatty got on like a house on fire. But there was one area that they didn’t see eye to eye on: the bedroom. It seemed that Beatty wanted to spend a lot of time there—in fact, he wanted it several times a day. Collins’ pal Joanne Woodward showed her no pity. Her not-so-woke advice? If he’s 22 and “libidinous”, let him do what he wants, as often as he wants.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1151" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1152" style="width: 800px"><img alt="Joan Collins facts " class="lazy-hidden size-full wp-image-513483" data-dcnode-id="1158" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956-300x246.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956-768x629.jpg 768w" height="655" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-513483" src="https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956.jpg" alt="Joan Collins facts " width="800" height="655" srcset="https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956-300x246.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/Joan_Collins_1956-768x629.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1153"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJoan_Collins_1956.JPG"><span data-dcnode-id="1155" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1150" instrument_node="">
</span><h2 data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">96. She Dated A Heartthrob</span></h2><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1146" instrument_node="">In spite of Collins’ exhaustion from keeping Beatty happy in the bedroom, in 1960, she agreed to marry the young heartthrob. But unfortunately, their careers kept pulling them apart, not to mention Beatty’s wandering eye and womanizing ways. In the short time they’d been together, he’d catapulted to fame and now had attention from every corner. Soon,</span><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node=""> Collins caught wind of some disturbing rumors.</span></strong></p><span data-dcnode-id="1142" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1134" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1135" style="width: 2560px"><img alt="Warren Beatty facts" class="lazy-hidden size-full wp-image-498409" data-dcnode-id="1141" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-1024x791.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-768x593.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-1536x1186.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-2048x1582.jpg 2048w" height="1977" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-498409" src="https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-scaled.jpg" alt="Warren Beatty facts" width="2560" height="1977" srcset="https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-1024x791.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-768x593.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-1536x1186.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/06/GettyImages-156472193-2048x1582.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1136"><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1138" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">97. She Couldn’t Wait To Get Away</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">When whispers of Beatty’s infidelity began to circulate, Collins didn’t want to believe it. But that was only the tip of the iceberg. At home, they regularly engaged in vicious fights—sometimes about rent and sometimes about their house guests. It was a total mess. When Collins got the opportunity to film on location in Hong Kong, she jumped at the chance.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">She just wanted to get away from him. Their time together had run its course. But even after they were through, she held on to a huge secret.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1116" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1117" style="width: 800px"><img alt="Joan Collins facts " class="lazy-hidden size-full wp-image-513402" data-dcnode-id="1123" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o-768x604.jpg 768w" height="629" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-513402" src="https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o.jpg" alt="Joan Collins facts " width="800" height="629" srcset="https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o-300x236.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/06/40132273462_2aaa593b47_o-768x604.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1118"><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/colorizedimages/40132273462"><span data-dcnode-id="1120" instrument_node="">Flickr, oneredsf1</span></a></span></div></figure><span data-dcnode-id="1115" instrument_node="">
</span><h2 data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">98. She Confessed It All</span></h2><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">Years down the road, Joan Collins published a memoir that spilled the tea on her and Beatty’s tumultuous relationship. In it, </span><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">a particular secret came out:</span></strong><span data-dcnode-id="1108" instrument_node=""> she had once been pregnant with Beatty’s child. Fearing scandal and a ruined career, Collins opted for an abortion and never started a family with Beatty. When they called it quits, she walked away and never looked back.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">Collins’ unabashed memoir left every secret dangling out in the open. Similarly, Esther Williams also wrote a tell-all—and it was&nbsp;</span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">filled&nbsp;</span></em><span data-dcnode-id="1102" instrument_node="">with sordid details.</span></p><span data-dcnode-id="1100" instrument_node="">

</span><h2 data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">99. Esther Williams: Exposing The Ex</span></h2><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1081"><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-esther-williams/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1087" instrument_node="">Esther Williams</span></a><span data-dcnode-id="1085" instrument_node=""> was the undisputed queen bee of one of the most baffling Hollywood sub-genres: the Aqua Musicals of the 40s and 50s. No one rose out of the pool depths—with a smile, no less—quite like Williams.</span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node=""> But behind her glittering facade, Williams was no stranger to torrid affairs and naughty indulgences.</span></strong><span data-dcnode-id="1082" instrument_node=""> However, much of her personal life was kept under wraps until her scandalous tell-all was published, exposing one of her lover’s greatest secrets.</span></p><span data-dcnode-id="1080" instrument_node="">

</span><h2 data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">100. She Dove Right In</span></h2><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Perhaps the most shocking revelation of Williams’ memoir was her relationship with Jeff Chandler. She’d met the striking actor during a rough patch: MGM had just dumped and her marriage was definitely on the rocks. Teetering on the edge, Williams didn’t think twice about diving straight into a passionate affair, and before long, it became incredibly serious.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1064" instrument_node="">She and Chandler were on the verge of tying the knot—</span><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">until Chandler gave her the surprise of her life.&nbsp;</span></strong></p><span data-dcnode-id="1060" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1052" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1053" style="width: 2560px"><img alt="Esther Williams facts" class="lazy-hidden size-full wp-image-533993" data-dcnode-id="1059" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-1024x764.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-768x573.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-1536x1146.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-2048x1528.jpg 2048w" height="1910" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-533993" src="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-scaled.jpg" alt="Esther Williams facts" width="2560" height="1910" srcset="https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-1024x764.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-768x573.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/09/GettyImages-3233881-1536x1146.jpg 1536w, https://www.factinate.co
