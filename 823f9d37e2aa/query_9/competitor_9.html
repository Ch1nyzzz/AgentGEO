</span><h1 class="entry-title" data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">Hollywood’s Most Scandalous Secrets</span></h1><span data-dcnode-id="3105" instrument_node="">
</span></div><span data-dcnode-id="3103" instrument_node="">
</span><div class="inner_content_wrapper inner_content" data-dcnode-id="971"><span data-dcnode-id="3102" instrument_node="">
</span><div class="entry-content" data-dcnode-id="973" itemprop="articleBody"><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Old Hollywood was practically built on a roiling river of scandal. Forever fighting off rumors, these glamorous celebrities tried their best to conceal some of their naughtiest and most heartbreaking secrets. Unfortunately, with the gossip mill working around the clock, these private struggles eventually breached the surface—and the details are as juicy as ever.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><hr data-dcnode-id="3097"><span data-dcnode-id="3096" instrument_node="">
</span><h2 data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">1. Richard Burton: A Mysterious Letter</span></h2><div class="partial_slot" data-dcnode-id="3093" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3084"><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/richard-burton-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3091" instrument_node="">Richard Burton</span></a><span data-dcnode-id="3089" instrument_node=""> was one of Hollywood’s wildest hellraisers and a formidable acting talent. But it was his tempestuous romance with Elizabeth Taylor that provided the world with the most delicious tabloid fodder: </span><span data-dcnode-id="3085" style="font-weight: 400;"><span data-dcnode-id="3088" instrument_node="">Vicious fights, passionate displays of affection, and bitter betrayal. Still, no matter how bright they burned—</span><strong data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Liz and Dick were always doomed to a heartbreaking end.</span></strong></span></p><span data-dcnode-id="3083" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3075" style="width: 1059px"><div class="media-credit-container alignnone" data-dcnode-id="3076" style="width: 1059px"><img alt="Richard Burton Facts" class="size-full wp-image-335830 lazy-loaded" data-dcnode-id="3082" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/09/Selection_575.png" data-srcset="" height="899" sizes="(max-width: 1059px) 100vw, 1059px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/09/Selection_575.png&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/09/Selection_575.png 1059w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-300x255.png 300w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-768x652.png 768w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-1024x869.png 1024w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-120x102.png 120w" width="1059"><noscript data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">&lt;img class="size-full wp-image-335830" src="https://www.factinate.com/wp-content/uploads/2019/09/Selection_575.png" alt="Richard Burton Facts" width="1059" height="899" srcset="https://www.factinate.com/wp-content/uploads/2019/09/Selection_575.png 1059w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-300x255.png 300w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-768x652.png 768w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-1024x869.png 1024w, https://www.factinate.com/wp-content/uploads/2019/09/Selection_575-120x102.png 120w" sizes="(max-width: 1059px) 100vw, 1059px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3077"><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/slightlyterrific/5190961392"><span data-dcnode-id="3079" instrument_node="">Flickr, kate gabrielle</span></a></span></div></figure><span data-dcnode-id="3074" instrument_node="">
</span><h2 data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">2. He Only Loved One Woman</span></h2><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Although Burton went on to marry two other women after Taylor, she was the one who truly owned his heart. Three days before his sudden passing, Burton wrote Taylor a heart-wrenching love letter—the contents of which remain a mystery to this day. On August 5, 1984, Burton suffered an intracerebral hemorrhage and closed his eyes forever.</span></p><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Elizabeth Taylor was heartbroken, but she was no stranger to receiving correspondence from her devoted ex-husband.</span></p><span data-dcnode-id="3065" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3057" style="width: 1792px"><div class="media-credit-container alignnone" data-dcnode-id="3058" style="width: 1792px"><img alt="Historical Insults facts" class="size-full wp-image-475023 lazy-loaded" data-dcnode-id="3064" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s.jpg" data-srcset="" height="1442" loading="lazy" sizes="(max-width: 1792px) 100vw, 1792px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s.jpg 1792w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-1024x824.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-768x618.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-1536x1236.jpg 1536w" width="1792"><noscript data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-475023" src="https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s.jpg" alt="Historical Insults facts" width="1792" height="1442" srcset="https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s.jpg 1792w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-1024x824.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-768x618.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/Elizabeth_Taylor_late_1950s-1536x1236.jpg 1536w" sizes="(max-width: 1792px) 100vw, 1792px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3059"><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Taylor%23/media/File%3AElizabeth_Taylor%2C_late_1950s.jpg"><span data-dcnode-id="3061" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="3056" instrument_node="">
</span><h2 data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">3. He Confessed It All</span></h2><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Throughout his other marriages, Burton wrote more than 40 poignant letters to Elizabeth Taylor—all of them overflowing with declarations of love: “I love you, lovely woman. If anybody hurts you, just send me a line saying something like ‘Need’ or ‘Necessary’ or just the one magic word ‘Elizabeth’, and I will be there somewhat faster than sound.”</span></p><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3047"><strong data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">But none of these letters cut as deep as his final words to her.</span></strong></p><span data-dcnode-id="3046" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3038" style="width: 2813px"><div class="media-credit-container alignnone" data-dcnode-id="3039" style="width: 2813px"><img alt="Elizabeth Taylor Facts" class="size-full wp-image-280529 lazy-loaded" data-dcnode-id="3045" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg" data-srcset="" height="2351" loading="lazy" sizes="(max-width: 2813px) 100vw, 2813px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg 2813w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-768x642.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-1024x856.jpg 1024w" width="2813"><noscript data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280529" src="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg" alt="Elizabeth Taylor Facts" width="2813" height="2351" srcset="https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2.jpg 2813w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-768x642.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/FotoJet-7-2-1024x856.jpg 1024w" sizes="(max-width: 2813px) 100vw, 2813px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3040"><a data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3042" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="3037" instrument_node="">
</span><h2 data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">4. He Left Her One Final Message</span></h2><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Elizabeth Taylor received Richard Burton’s last love letter after attending his memorial service. When she saw his handwriting, she fell apart. From then on, she kept the letter next to her bed, ensuring that he was always in arm’s reach. Although she revealed many of his other letters, this was the one letter she kept for herself.</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">However, she did reveal one satisfying detail.</span></p><span data-dcnode-id="3028" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="3020" style="width: 1172px"><div class="media-credit-container alignnone" data-dcnode-id="3021" style="width: 1172px"><img alt="Sharon Tate Facts" class="size-full wp-image-313499 lazy-loaded" data-dcnode-id="3027" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper.jpg" data-srcset="" height="1007" loading="lazy" sizes="(max-width: 1172px) 100vw, 1172px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper.jpg 1172w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-300x258.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-768x660.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-1024x880.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-120x102.jpg 120w" width="1172"><noscript data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-313499" src="https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper.jpg" alt="Sharon Tate Facts" width="1172" height="1007" srcset="https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper.jpg 1172w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-300x258.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-768x660.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-1024x880.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/08/Taylor-Burton-Sandpiper-120x102.jpg 120w" sizes="(max-width: 1172px) 100vw, 1172px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3022"><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ATaylor-Burton-Sandpiper.jpg"><span data-dcnode-id="3024" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="3019" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="3014" style="min-height: 120px;"><div data-dcnode-id="3015"><span data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Advertisement</span></span><div data-dcnode-id="3016" id="div-gpt-ad-3568692-15"></div></div></div><h2 data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">5. He Wanted To Go Home</span></h2><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3010" instrument_node="">To her biographer’s delight, Taylor finally gave some insight into Burton’s final letter. She said, “In it he told [me] what he wanted. Home was where Elizabeth was, and he wanted to come home.” When Taylor herself passed, it was her wish to be buried with the letter. But while this secret had romance written all over it, </span><strong data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">this next starlet’s love life was so disastrous—she hid the most disturbing part of all.</span></strong></p><span data-dcnode-id="3006" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2998" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="2999" style="width: 2560px"><img alt="Power Couples facts" class="size-full wp-image-374812 lazy-loaded" data-dcnode-id="3005" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-scaled.jpg" data-srcset="" height="1965" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-scaled.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-1024x786.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-768x589.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-1536x1179.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-2048x1572.jpg 2048w" width="2560"><noscript data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-374812" src="https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-scaled.jpg" alt="Power Couples facts" width="2560" height="1965" srcset="https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-1024x786.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-768x589.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-1536x1179.jpg 1536w, https://www.factinate.com/wp-content/uploads/2018/02/GettyImages-3287282-2048x1572.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="3000"><a data-dcnode-id="3001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3002" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2997" instrument_node="">
</span><h2 data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">6. Ann Miller: A Real-Life Horror Story</span></h2><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2984"><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-ann-miller/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2993" instrument_node="">Ann Miller</span></a><span data-dcnode-id="2991" instrument_node=""> was notorious for being the best tap dancer in Hollywood, </span><strong data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">but behind closed doors, she suffered the most unspeakable tragedies.</span></strong><span data-dcnode-id="2988" instrument_node=""> First of all, her first husband Reese Milner was a total nightmare. Although this wealthy scrap iron heir had won Ann’s heart with his sizable wallet, his rage eventually led to the most traumatic moment of her life&nbsp;</span><em data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">and&nbsp;</span></em><span data-dcnode-id="2985" instrument_node="">her greatest secret.</span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">You see, Milner was the exact definition of a wolf in sheep’s clothing…and poor Ann was in for the rudest awakening imaginable.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2972" style="width: 1390px"><div class="media-credit-container alignnone" data-dcnode-id="2973" style="width: 1390px"><img alt="Ann Miller facts " class="size-full wp-image-530237 lazy-loaded" data-dcnode-id="2979" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946.jpg" data-srcset="" height="960" loading="lazy" sizes="(max-width: 1390px) 100vw, 1390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946.jpg 1390w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946-1024x707.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946-768x530.jpg 768w" width="1390"><noscript data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530237" src="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946.jpg" alt="Ann Miller facts " width="1390" height="960" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946.jpg 1390w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946-1024x707.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_by_Ned_Scott_May_1946-768x530.jpg 768w" sizes="(max-width: 1390px) 100vw, 1390px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2974"><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAnn_Miller_by_Ned_Scott%2C_May_1946.jpg"><span data-dcnode-id="2976" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2971" instrument_node="">
</span><h2 data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">7. She Had To Escape First</span></h2><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2964"><span data-dcnode-id="2967" instrument_node="">Ann was ready to cash in her chips and run away with Milner. Unfortunately, she still had one problem standing in her way. Her contract with Columbia Pictures still bound her to work for another couple of years, and before she could wed, she’d have to break her way out. But when Ann approached Harry Cohn with her desire to leave the studio, </span><strong data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">his response was absolutely terrifying.</span></strong></p><span data-dcnode-id="2963" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2955" style="width: 2400px"><div class="media-credit-container alignnone" data-dcnode-id="2956" style="width: 2400px"><img alt="Ann Miller facts " class="size-full wp-image-530299 lazy-loaded" data-dcnode-id="2962" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320.jpg" data-srcset="" height="1856" loading="lazy" sizes="(max-width: 2400px) 100vw, 2400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320.jpg 2400w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-1024x792.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-768x594.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-1536x1188.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-2048x1584.jpg 2048w" width="2400"><noscript data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530299" src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320.jpg" alt="Ann Miller facts " width="2400" height="1856" srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320.jpg 2400w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-1024x792.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-768x594.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-1536x1188.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-1151366320-2048x1584.jpg 2048w" sizes="(max-width: 2400px) 100vw, 2400px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2957"><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2959" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2954" instrument_node="">
</span><h2 data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">8. She Refused To Believe Him</span></h2><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2950" instrument_node="">To her surprise, Harry Cohn told Ann that she should </span><em data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">not</span></em><span data-dcnode-id="2947" instrument_node=""> marry Reese Milner. But his advice didn’t end there. He was so worried about her engagement that he found some of Milner’s exes and brought them in to regale Ann with their horrifying stories. According to these girls, Milner was a brute—aggressive and dangerous.</span></p><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Anne refused to believe these girls’ claims, thinking that Harry Cohn had managed this whole intervention in an attempt to keep her at Columbia Studios. Sadly, it turned out that Cohn wasn’t acting out of spite…</span></p><span data-dcnode-id="2942" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2934" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2935" style="width: 800px"><img alt="Ann Miller facts " class="lazy-hidden size-full wp-image-530279" data-dcnode-id="2941" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9-300x208.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9-768x532.jpg 768w" height="554" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530279" src="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9.jpg" alt="Ann Miller facts " width="800" height="554" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9-300x208.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_10-9-768x532.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2936"><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAnne_Miller_1948.jpg"><span data-dcnode-id="2938" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2933" instrument_node="">
</span><h2 data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">9. She Felt His Jealous Wrath</span></h2><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">In 1946, after Cohn begrudgingly freed Ann from her contract, she and Milner tied the knot two days after Valentine’s Day. The chapel wedding in Montecito, California went off without a hitch—but it was all downhill from there. Within two months of being married, Ann was pregnant. Sadly, as excited as Ann was to be a mother, she couldn’t deny that her marriage had taken a dark turn.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Milner was a wildly jealous man and even resented Ann spending time with her mother and friends. But that was just the tip of the iceberg.</span></p><span data-dcnode-id="2924" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2916" style="width: 816px"><div class="media-credit-container alignnone" data-dcnode-id="2917" style="width: 816px"><img alt="Ann Miller facts " class="lazy-hidden size-full wp-image-530285" data-dcnode-id="2923" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8.jpg 816w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8-768x531.jpg 768w" height="564" loading="lazy" sizes="(max-width: 816px) 100vw, 816px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="816"><noscript data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530285" src="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8.jpg" alt="Ann Miller facts " width="816" height="564" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8.jpg 816w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_13-8-768x531.jpg 768w" sizes="(max-width: 816px) 100vw, 816px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2918"><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aenetworks.com/brands/biography"><span data-dcnode-id="2920" instrument_node="">Biography (1987– ), The Ann Miller Story, A+E Networks</span></a></span></div></figure><span data-dcnode-id="2915" instrument_node="">

</span></div><h2 data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">10. Her Husband Was Vicious Man</span></h2><span data-dcnode-id="2859" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2858" instrument_node="">When Ann married Milner, she had no idea what she was getting into. To her dismay, she soon learned that Milner had unpredictable mood swings, ranging from aggressive to terrifyingly vicious—</span><strong data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">but there was a tragic reason behind it all</span></strong><span data-dcnode-id="2855" instrument_node="">. You see, years before, a horse had fallen on Milner, and the resulting head injury had made him aggressive and altered his personality forever.</span></p><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Sadly, Milner turned his volatile nature toward Ann, and in the end, she paid the ultimate price.</span></p><span data-dcnode-id="2850" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2842" style="width: 822px"><div class="media-credit-container alignnone" data-dcnode-id="2843" style="width: 822px"><img alt="Ann Miller facts " class="lazy-hidden size-full wp-image-530277" data-dcnode-id="2849" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11.jpg 822w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11-768x530.jpg 768w" height="567" loading="lazy" sizes="(max-width: 822px) 100vw, 822px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="822"><noscript data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530277" src="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11.jpg" alt="Ann Miller facts " width="822" height="567" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11.jpg 822w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Screenshot_9-11-768x530.jpg 768w" sizes="(max-width: 822px) 100vw, 822px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2844"><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aenetworks.com/brands/biography"><span data-dcnode-id="2846" instrument_node="">Biography (1987– ), The Ann Miller Story, A+E Networks</span></a></span></div></figure><span data-dcnode-id="2841" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="2840" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF2" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF3"></div><h2 data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">11. She Wrote A Secret Letter</span></h2><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">That summer, Ann sat down to write a harrowing letter to her mother. But this wasn’t just any letter. In it, she documented the horrors of her three months of marriage—her fear of her husband and his unspeakable treatment of her. And the saddest part of all? The letter was only to be opened in the event of Ann’s passing.</span></p><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">It was almost as though she was expecting something horrible to happen…and she was right.</span></p><span data-dcnode-id="2831" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2823" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="2824" style="width: 2560px"><img alt="Ann Miller facts " class="lazy-hidden size-full wp-image-530270" data-dcnode-id="2830" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-1024x736.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-768x552.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-1536x1103.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-2048x1471.jpg 2048w" height="1839" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530270" src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-scaled.jpg" alt="Ann Miller facts " width="2560" height="1839" srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-300x216.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-1024x736.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-768x552.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-1536x1103.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-2893450-2048x1471.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2825"><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2827" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2822" instrument_node="">
</span><h2 data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">12. She Broke Her Back</span></h2><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2818" instrument_node="">When she was nine months pregnant, Ann and Milner were staying at his ranch, eagerly awaiting the birth of their baby girl, Mary. In a horrifying turn of events, Milner lost his temper during an argument and ended up throwing Ann down a flight of stairs. The fall fractured her lower back, and soon after, she went into labor. </span><strong data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">This is when the real nightmare truly began.</span></strong></p><span data-dcnode-id="2814" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2806" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="2807" style="width: 2560px"><img alt="Ann Miller facts " class="lazy-hidden size-full wp-image-530291" data-dcnode-id="2813" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-1024x675.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-1536x1013.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-2048x1350.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-960x634.jpg 960w" height="1688" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530291" src="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-scaled.jpg" alt="Ann Miller facts " width="2560" height="1688" srcset="https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-1024x675.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-1536x1013.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-2048x1350.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2021/08/GettyImages-104415742-960x634.jpg 960w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2808"><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2810" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2805" instrument_node="">
</span><h2 data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">13. She Suffered A Harrowing Loss</span></h2><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">On November 12, 1946, Ann Miller managed to deliver her daughter while laboring through the pain of a broken back. But her relief was short-lived. Little Mary only lived for three hours before passing. In the wake of this loss, Ann’s devastation was immeasurable. And just like the rest of her troubles, nobody could know the truth. This was her traumatic secret to keep.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2798" instrument_node="">Instead, the media reported a completely different story…They claimed that Ann Miller had been in a car accident and that tragically, she had lost the baby. While Miller never got know to know her child, another huge star suffered a similar injustice, only he had his </span><em data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">mother</span></em><span data-dcnode-id="2795" instrument_node=""> ripped away from him.</span></p><span data-dcnode-id="2793" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2785" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2786" style="width: 800px"><img alt="Ann Miller facts " class="lazy-hidden size-full wp-image-530272" data-dcnode-id="2792" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957-768x634.jpg 768w" height="660" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-530272" src="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957.jpg" alt="Ann Miller facts " width="800" height="660" srcset="https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/08/Ann_Miller_1957-768x634.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2787"><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAnn_Miller_1957.jpg"><span data-dcnode-id="2789" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2784" instrument_node="">
</span><h2 data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">14. Cary Grant: A Missing Mother</span></h2><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2773"><span data-dcnode-id="2780" instrument_node="">When </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/sophisticated-facts-cary-grant/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2779" instrument_node="">Cary Grant</span></a><span data-dcnode-id="2777" instrument_node=""> was just nine years old, his mother disappeared out of his life. At first, Grant’s father Elias said that his mom was away at a seaside resort, but after time passed, he revealed the “truth”: Grant’s mother had died. This too, however, was a horrible </span><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">lie—</span></em><span data-dcnode-id="2774" instrument_node="">and Grant didn’t discover the real story behind his mother’s vanishing until he was already grown.</span></p><span data-dcnode-id="2772" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2764" style="width: 1030px"><div class="media-credit-container alignnone" data-dcnode-id="2765" style="width: 1030px"><img alt="Mae West Facts" class="lazy-hidden size-full wp-image-280601" data-dcnode-id="2771" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051.png 1030w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051-300x240.png 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051-768x614.png 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051-1024x818.png 1024w" height="823" loading="lazy" sizes="(max-width: 1030px) 100vw, 1030px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1030"><noscript data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-280601" src="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051.png" alt="Mae West Facts" width="1030" height="823" srcset="https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051.png 1030w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051-300x240.png 300w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051-768x614.png 768w, https://www.factinate.com/wp-content/uploads/2019/03/GettyImages-1761051-1024x818.png 1024w" sizes="(max-width: 1030px) 100vw, 1030px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2766"><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2768" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2763" instrument_node="">
</span><h2 data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">15. He Learned The Disturbing Truth</span></h2><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2755"><span data-dcnode-id="2759" instrument_node="">When Grant was 31 years old, his father Elias became terribly ill. As he lay on his deathbed, </span><strong data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">he finally told his son his darkest secret.</span></strong><span data-dcnode-id="2756" instrument_node=""> Grant’s mother Elsie wasn’t dead, and she definitely wasn’t at a “seaside resort.” Instead, she’d been alive the whole time, locked up in a lunatic asylum. Grant’s father had placed her there so that he could pursue a new bride.</span></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Horrified, Grant immediately traveled to England to get his mother out of the asylum.</span></p><span data-dcnode-id="2751" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2743" style="width: 3644px"><div class="media-credit-container alignnone" data-dcnode-id="2744" style="width: 3644px"><img alt="Cary Grant facts" class="lazy-hidden size-full wp-image-314596" data-dcnode-id="2750" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648.jpg 3644w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-1024x674.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-340x225.jpg 340w" height="2400" loading="lazy" sizes="(max-width: 3644px) 100vw, 3644px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3644"><noscript data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314596" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648.jpg" alt="Cary Grant facts" width="3644" height="2400" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648.jpg 3644w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-1024x674.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-94143648-340x225.jpg 340w" sizes="(max-width: 3644px) 100vw, 3644px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2745"><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2747" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2742" instrument_node="">
</span><h2 data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">16. He Was A Stranger To Her</span></h2><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">It took a while for Grant’s mother to recover from the trauma of being locked up, but afterward, she and Grant became very close. When Grant looked back on his father’s lies, he sadly said that by the time he got her out, “My name was changed and I was a full-grown man living in America.” It felt cruel and unjust that Cary Grant was “known to most people of the world by sight and by name, yet not to my mother.”</span></p><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Cary Grant was a victim of a secret, but these next stars took their lies to a whole new level.</span></p><span data-dcnode-id="2733" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2725" style="width: 1693px"><div class="media-credit-container alignnone" data-dcnode-id="2726" style="width: 1693px"><img alt="Cary Grant facts " class="lazy-hidden size-full wp-image-314539" data-dcnode-id="2732" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/actor-63082.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/actor-63082.jpg 1693w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-300x256.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-768x656.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-1024x875.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-120x102.jpg 120w" height="1446" loading="lazy" sizes="(max-width: 1693px) 100vw, 1693px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1693"><noscript data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-314539" src="https://www.factinate.com/wp-content/uploads/2019/07/actor-63082.jpg" alt="Cary Grant facts " width="1693" height="1446" srcset="https://www.factinate.com/wp-content/uploads/2019/07/actor-63082.jpg 1693w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-300x256.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-768x656.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-1024x875.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/actor-63082-120x102.jpg 120w" sizes="(max-width: 1693px) 100vw, 1693px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2727"><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2729" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="2724" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="2723" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF3" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF4"></div><h2 data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">17. Loretta Young and Clark Gable: A Secret Child</span></h2><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2707"><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-loretta-young/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2719" instrument_node="">Loretta Young</span></a><span data-dcnode-id="2717" instrument_node=""> and </span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-clark-gable/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2716" instrument_node="">Clark Gable</span></a><span data-dcnode-id="2714" instrument_node=""> met on the set of </span><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Call of the Wild,</span></em><span data-dcnode-id="2711" instrument_node=""> and the consequences of their meeting led to a secret child and some of the most questionable parenting imaginable. In fact, </span><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">their entire relationship was a horrifying mess.</span></strong><span data-dcnode-id="2708" instrument_node=""> According to Young, Gable forced himself on her without her consent while aboard an overnight train back to Hollywood. The consequences?</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">A child that neither of them ever planned on having…</span></p><span data-dcnode-id="2703" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2695" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2696" style="width: 1024px"><img alt="Loretta Young Facts" class="lazy-hidden size-full wp-image-489533" data-dcnode-id="2702" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812-768x560.jpg 768w" height="746" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-489533" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812.jpg" alt="Loretta Young Facts" width="1024" height="746" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526900812-768x560.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2697"><a data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2699" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2694" instrument_node="">
</span><h2 data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">18. She Couldn’t Sin</span></h2><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2690" instrument_node="">When Loretta Young discovered that she was pregnant with Clark Gable’s child, she was devastated. They’d only been together one time, but the damage was done. Afraid to tell her production company for fear that they’d want her to have an abortion, </span><strong data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Young made a drastic decision. </span></strong><span data-dcnode-id="2687" instrument_node="">She decided to keep the pregnancy and the baby a secret.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Abortion, after all, was a mortal sin in her books, and she was determined to do the “right thing.” And so, Young set out to fool them all.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2674" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2675" style="width: 800px"><img alt="Loretta Young Facts" class="lazy-hidden size-full wp-image-489543" data-dcnode-id="2681" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1-768x624.jpg 768w" height="650" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-489543" src="https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1.jpg" alt="Loretta Young Facts" width="800" height="650" srcset="https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/1538912737_1e5d06ac36_o-1-768x624.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2676"><a data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/tom-margie/1538912737"><span data-dcnode-id="2678" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2673" instrument_node="">
</span><h2 data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">19. She Had To Make A Choice</span></h2><span data-dcnode-id="2670" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2669" instrument_node="">Young gave birth to her daughter and named her Judy after St. Jude—the patron saint of desperate cases and lost causes. According to rumors, an anonymous sender sent Clark Gable a telegram notifying him of his daughter’s birth. </span><strong data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">His reaction was chilling. </span></strong><span data-dcnode-id="2666" instrument_node="">He allegedly tore the notice up, letting the pieces fall to the ground. He wanted nothing to do with her.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Young, on the other hand, now had a living, breathing child to consider and a difficult choice to make.</span></p><span data-dcnode-id="2661" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2653" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2654" style="width: 1024px"><img alt="Loretta Young Facts" class="lazy-hidden size-full wp-image-489541" data-dcnode-id="2660" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735-768x592.jpg 768w" height="789" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-489541" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735.jpg" alt="Loretta Young Facts" width="1024" height="789" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735-300x231.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-158743735-768x592.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2655"><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2657" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2652" instrument_node="">
</span><h2 data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">20. She Gave Her Up</span></h2><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">In order to ensure that nobody found out about Judy’s true parentage, Loretta Young did the unthinkable. She placed her daughter in an orphanage, and then 19 months later, went back and adopted her biological child. She craftily manipulated the system and reunited with her daughter without causing a public scandal. This was the lie that Young worked hard to conceal for the rest of her life.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">However, if Young thought that Gable would eventually step up and provide for his daughter, she was sorely mistaken…</span></p><span data-dcnode-id="2643" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2635" style="width: 989px"><div class="media-credit-container alignnone" data-dcnode-id="2636" style="width: 989px"><img alt="Loretta Young Facts" class="lazy-hidden size-full wp-image-489587" data-dcnode-id="2642" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018.jpg 989w, https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018-300x195.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018-768x500.jpg 768w" height="644" loading="lazy" sizes="(max-width: 989px) 100vw, 989px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="989"><noscript data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-489587" src="https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018.jpg" alt="Loretta Young Facts" width="989" height="644" srcset="https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018.jpg 989w, https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018-300x195.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/Screenshot-2021-03-10-145018-768x500.jpg 768w" sizes="(max-width: 989px) 100vw, 989px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2637"><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AClark_Gable_and_Loretta_Young_in_Key_to_the_City%2C_1950.jpg"><span data-dcnode-id="2639" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2634" instrument_node="">
</span><h2 data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">21. She Never Swayed Him</span></h2><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Loretta Young invited Clark Gable over to see his daughter, but she could only recall him visiting Judy once. She even opened up a bank account to allow Gable to discreetly provide for his daughter, but he never deposited a single dollar. Despite her efforts to allow some father-daughter connection, her main goal remained the same—nobody could ever discover that Gable was Judy’s real father.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">And as Judy grew older, this feat became harder and harder.</span></p><span data-dcnode-id="2625" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2617" style="width: 1562px"><div class="media-credit-container alignnone" data-dcnode-id="2618" style="width: 1562px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-288978" data-dcnode-id="2624" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920.jpg 1562w, https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920-768x597.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920-1024x797.jpg 1024w" height="1215" loading="lazy" sizes="(max-width: 1562px) 100vw, 1562px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1562"><noscript data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-288978" src="https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920.jpg" alt="Joan Crawford facts" width="1562" height="1215" srcset="https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920.jpg 1562w, https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920-300x233.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920-768x597.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/clark-gable-394285_1920-1024x797.jpg 1024w" sizes="(max-width: 1562px) 100vw, 1562px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2619"><a data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2621" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="2616" instrument_node="">
</span><h2 data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">22. She Couldn’t Hide Her Forever</span></h2><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2609"><span data-dcnode-id="2612" instrument_node="">With mounting unease, Young watched as Judy grew into a spitting image of her father, with his high cheekbones, large ears, and a mischievous grin. To hide Judy’s tell-tale ears, she made sure to always dress her in frilly bonnets. But soon, certain features became too obvious to conceal, and within Hollywood circles, </span><strong data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">dangerous rumors began to circulate.</span></strong></p><span data-dcnode-id="2608" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2600" style="width: 996px"><div class="media-credit-container alignnone" data-dcnode-id="2601" style="width: 996px"><img alt="Clark Gable Facts" class="lazy-hidden size-full wp-image-471245" data-dcnode-id="2607" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1.jpg 996w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1-768x516.jpg 768w" height="669" loading="lazy" sizes="(max-width: 996px) 100vw, 996px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="996"><noscript data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-471245" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1.jpg" alt="Clark Gable Facts" width="996" height="669" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1.jpg 996w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1-300x202.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3246542-1-768x516.jpg 768w" sizes="(max-width: 996px) 100vw, 996px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2602"><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2604" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2599" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="2598" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF4" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF5"></div><h2 data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">23. Her Methods Were Extreme</span></h2><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2594" instrument_node="">When Judy turned seven, Young took her to a plastic surgeon to pin back her ears. After all, they were Gable’s ears, and this procedure was a fix-all. Then, </span><strong data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">the lies became deeper and more elaborate</span></strong><span data-dcnode-id="2591" instrument_node="">. Years later, Young deception came around to haunt her. When Judy finally discovered the truth about her father, their relationship was never the same again.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">While many of Young’s secrets came out while she was alive, another notorious starlet—Ingrid Bergman—saw scandal long after she’d passed.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2578" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="2579" style="width: 2560px"><img alt="Loretta Young Facts" class="lazy-hidden size-full wp-image-489589" data-dcnode-id="2585" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-1024x682.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-1536x1023.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-2048x1364.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-340x225.jpg 340w" height="1705" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-489589" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-scaled.jpg" alt="Loretta Young Facts" width="2560" height="1705" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-1024x682.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-1536x1023.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-2048x1364.jpg 2048w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-517815578-1-340x225.jpg 340w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2580"><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2582" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2577" instrument_node="">
</span><h2 data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">24. Ingrid Bergman: Breaking The Silence</span></h2><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2573" instrument_node="">Five years after her passing, news of one of </span><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-ingrid-bergman/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2572" instrument_node="">Ingrid Bergman’s</span></a><span data-dcnode-id="2570" instrument_node=""> secret affairs came to light. In an interview with </span><em data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">People,&nbsp;</span></em><strong data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Gregory Peck made a shocking confession:</span></strong><span data-dcnode-id="2565" instrument_node=""> On the set of 1945’s </span><em data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Spellbound, </span></em><span data-dcnode-id="2562" instrument_node="">he and Bergman had enjoyed a fleeting moment of pure passion: “All I can say is that I had a real love for her (Bergman), and I think that’s where I ought to stop…I was young. She was young. We were involved for weeks in close and intense work.”</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Oh, but Peck wasn’t the only one to creep out of the woodwork.</span></p><span data-dcnode-id="2557" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2549" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="2550" style="width: 1280px"><img alt="Ingrid Bergman Facts" class="lazy-hidden size-full wp-image-539966" data-dcnode-id="2556" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still-1024x756.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still-768x567.jpg 768w" height="945" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539966" src="https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still.jpg" alt="Ingrid Bergman Facts" width="1280" height="945" srcset="https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still-300x221.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still-1024x756.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/1280px-Spellbound_1945_Still-768x567.jpg 768w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2551"><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASpellbound_1945_Still.jpg"><span data-dcnode-id="2553" instrument_node="">Wikimedia Commons </span></a></span></div></figure><span data-dcnode-id="2548" instrument_node="">
</span><h2 data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">25. She Had An Enemy</span></h2><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2544" instrument_node="">In her autobiography, Bergman spoke of all her ex-husbands with utter respect and even remained close friends with Rossellini and Schmidt to the day she died. However, there was one man with an ax to grind—one who still held a grudge for the wife who abandoned him: Bergman’s first husband, Petter Lindström. </span><strong data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">He wanted the world to know the “real” Bergman and didn’t care if it threw a shadow across her legacy.</span></strong></p><span data-dcnode-id="2540" instrument_node="">
