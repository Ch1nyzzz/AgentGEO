</span><figure class="wp-caption alignnone" data-dcnode-id="2028" style="width: 952px"><div class="media-credit-container alignnone" data-dcnode-id="2029" style="width: 952px"><img alt="Kim Novak facts" class="lazy-hidden size-full wp-image-539068" data-dcnode-id="2035" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o.jpg 952w, https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o-768x584.jpg 768w" height="724" loading="lazy" sizes="(max-width: 952px) 100vw, 952px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="952"><noscript data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539068" src="https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o.jpg" alt="Kim Novak facts" width="952" height="724" srcset="https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o.jpg 952w, https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o-300x228.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/7117719815_bf3793fc98_o-768x584.jpg 768w" sizes="(max-width: 952px) 100vw, 952px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2030"><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/53035820%40N02/7117719815"><span data-dcnode-id="2032" instrument_node="">Flickr, Kristine</span></a></span></div></figure><span data-dcnode-id="2027" instrument_node="">
</span><h2 data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">50. She Risked Her Career</span></h2><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2023" instrument_node="">Tired of dodging any kind of attention, Davis pulled a power move and bought a luxurious beach house in Malibu where he could conduct his private affairs in&nbsp;</span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">private.&nbsp;</span></em><span data-dcnode-id="2020" instrument_node="">But this wasn’t the only pitfall of their relationship. Both Novak and Davis had high-flying careers, and by dabbling in a forbidden romance, they risked&nbsp;</span><em data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">everything.&nbsp;</span></em><span data-dcnode-id="2017" instrument_node="">And then there was the matter of&nbsp;</span><em data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">race.</span></em></p><span data-dcnode-id="2013" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2005" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2006" style="width: 800px"><img alt="Sammy Davis Jr. facts" class="lazy-hidden size-full wp-image-518776" data-dcnode-id="2012" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff-768x607.jpg 768w" height="632" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-518776" src="https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff.jpg" alt="Sammy Davis Jr. facts" width="800" height="632" srcset="https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/07/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff-768x607.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2007"><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picryl.com/media/sammy-davis-jr-the-star-of-broadway-hit-musical-golden-boy-views-hub-skyline-aeb7ff"><span data-dcnode-id="2009" instrument_node="">Picryl</span></a></span></div></figure><span data-dcnode-id="2004" instrument_node="">
</span><h2 data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">51. She Had A Forbidden Love</span></h2><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node="">At the time that Novak and Davis were busy falling head over heels for one another, America still upheld segregation. Conducting their high-profile romance under the watchful eye of a prejudiced industry, not to mention, a prejudiced&nbsp;</span><em data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">world—</span></em><span data-dcnode-id="1997" instrument_node="">this couple tested the limits. After all, this was a Black man dating a white movie star.</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1994" instrument_node="">Not only was this risky, but sadly, it was also dangerous…</span><strong data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">And they were about to get found out.</span></strong></p><span data-dcnode-id="1990" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1982" style="width: 1889px"><div class="media-credit-container alignnone" data-dcnode-id="1983" style="width: 1889px"><img alt="Kim Novak facts" class="lazy-hidden size-full wp-image-539072" data-dcnode-id="1989" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k.jpg 1889w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-300x192.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-1024x655.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-768x492.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-1536x983.jpg 1536w" height="1209" loading="lazy" sizes="(max-width: 1889px) 100vw, 1889px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1889"><noscript data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539072" src="https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k.jpg" alt="Kim Novak facts" width="1889" height="1209" srcset="https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k.jpg 1889w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-300x192.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-1024x655.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-768x492.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/49459658176_e51dae10d2_k-1536x983.jpg 1536w" sizes="(max-width: 1889px) 100vw, 1889px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1984"><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/washington_area_spark/49459658176"><span data-dcnode-id="1986" instrument_node="">Flickr, Washington Area Spark</span></a></span></div></figure><span data-dcnode-id="1981" instrument_node="">
</span><h2 data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">52. Her Secret Got Out</span></h2><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">While in New York, Harry Cohn finally caught wind of his star’s scandalous affair. While at his brother’s memorial dinner, an aide leaned down, and in a hushed voice, filled Cohn in on Novak and Davis. He was absolutely enraged by this news. And when rumors of church bells and a wedding began to swirl, his anger only deepened.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1967" style="width: 845px"><div class="media-credit-container alignnone" data-dcnode-id="1968" style="width: 845px"><img alt="Kim Novak facts" class="lazy-hidden size-full wp-image-539069" data-dcnode-id="1974" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o.jpg 845w, https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o-768x575.jpg 768w" height="633" loading="lazy" sizes="(max-width: 845px) 100vw, 845px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="845"><noscript data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539069" src="https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o.jpg" alt="Kim Novak facts" width="845" height="633" srcset="https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o.jpg 845w, https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/8089302076_4b79caa8cc_o-768x575.jpg 768w" sizes="(max-width: 845px) 100vw, 845px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1969"><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/53035820%40N02/8089302076/"><span data-dcnode-id="1971" instrument_node="">Flickr, Kristine</span></a></span></div></figure><span data-dcnode-id="1966" instrument_node="">
</span><h2 data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">53. She Was The Victim Of Sabotage</span></h2><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Cohn’s plan to destroy Novak and Davis was diabolical. With his shady ties to the underworld, he went to the mob and had Mickey Cohen corner Davis’s father, Sam Davis Sr.,&nbsp; at the Hollywood Park racetrack. What the mobster had to say was absolutely chilling: “Listen. I got some terrible news for you. I just got a call from Chicago to hurt Sammy.”</span></p><span data-dcnode-id="1960" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1952" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1953" style="width: 2560px"><img alt="Kim Novak facts" class="lazy-hidden size-full wp-image-539067" data-dcnode-id="1959" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-1536x1152.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-2048x1535.jpg 2048w" height="1919" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539067" src="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-scaled.jpg" alt="Kim Novak facts" width="2560" height="1919" srcset="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-1024x768.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-1536x1152.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-148263730-2048x1535.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1954"><a data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1956" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1951" instrument_node="">
</span><h2 data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">54. She Lost Her Boyfriend To An Ultimatum</span></h2><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1947" instrument_node="">With Cohn&nbsp;</span><em data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">and&nbsp;</span></em><span data-dcnode-id="1944" instrument_node="">Cohen out for blood, Novak’s boyfriend was in immediate danger. He could have his legs broken or&nbsp;</span><em data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">worse.&nbsp;</span></em><span data-dcnode-id="1941" instrument_node="">Luckily, there was still one way out of this mess—</span><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">but the solution was utterly heartbreaking.</span></strong><span data-dcnode-id="1938" instrument_node="">&nbsp;Cohen agreed to spare Sammy on one condition: “I’ll give him 24 hours. Sammy has to get married—to a colored girl.”</span></p><span data-dcnode-id="1936" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1928" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="1929" style="width: 800px"><img alt="Sammy Davis Jr. facts" class="lazy-hidden size-full wp-image-518754" data-dcnode-id="1935" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15-300x243.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15-768x622.jpg 768w" height="648" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-518754" src="https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15.jpg" alt="Sammy Davis Jr. facts" width="800" height="648" srcset="https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15-300x243.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/07/Untitled-15-768x622.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1930"><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picryl.com/media/sammy-davis-jr-tijdens-optreden-in-theater-carre-ad60ae"><span data-dcnode-id="1932" instrument_node="">Picryl</span></a></span></div></figure><span data-dcnode-id="1927" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1926"></figure><span data-dcnode-id="1925" instrument_node="">
</span><h2 data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">55. They Were Doomed</span></h2><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1921" instrument_node="">Cohn had pulled the rug out from under Novak; he was a true villain in every sense of the word. Because of him, Davis had no choice but to leave Novak and marry the talented Black singer, Loray White. He even&nbsp;</span><em data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">paid</span></em><span data-dcnode-id="1918" instrument_node="">&nbsp;her to do it. It was all a lie, but at the end of the day, Cohn’s wishes came true: He got his blonde beauty back.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">There was no “happily ever after” for Novak and Davis. And when it comes to distressing endings, this next actress endured her fair share of turmoil.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1905" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1906" style="width: 2560px"><img alt="Kim Novak facts" class="lazy-hidden size-full wp-image-539078" data-dcnode-id="1912" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-300x255.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-1024x869.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-768x652.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-1536x1304.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-2048x1738.jpg 2048w" height="2173" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539078" src="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-scaled.jpg" alt="Kim Novak facts" width="2560" height="2173" srcset="https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-300x255.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-1024x869.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-768x652.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-1536x1304.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/12/GettyImages-607401110-2048x1738.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1907"><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1909" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1904" instrument_node="">
</span><h2 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">56. Marion Davies: Mothering In The Shadows</span></h2><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1895"><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-marion-davies/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1900" instrument_node="">Marion Davies</span></a><span data-dcnode-id="1898" instrument_node=""> had always been close with her nieces and nephews, but one, in particular, had been her favorite—her sister Rose’s daughter, Patricia. She’d spent extensive time with Hearst and Davies, and Davies had left her a sizable inheritance when she passed. No one questioned it—until 1993, </span><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">when Patricia made a twisted deathbed confession. </span></strong></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">It was then that she revealed to her immediate family that Davies and Hearst were, in fact, her real mother and father, not her aunt and uncle. Soon, her family began to put together a clearer picture.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1883" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1884" style="width: 2560px"><img alt="Marion Davies Facts" class="lazy-hidden size-full wp-image-468419" data-dcnode-id="1890" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-1024x756.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-768x567.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-1536x1134.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-2048x1512.jpg 2048w" height="1890" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-468419" src="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-scaled.jpg" alt="Marion Davies Facts" width="2560" height="1890" srcset="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-1024x756.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-768x567.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-1536x1134.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-1065225696-2048x1512.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1885"><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1887" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1882" instrument_node="">
</span><h2 data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">57. They Switched It All Around</span></h2><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Patricia had been born in an unnamed hospital in France sometime between 1919 and 1923—right around the time that Davies and Hearst began their decades-long affair. As the story goes, Davies got pregnant, and Hearst sent her to France to give birth away from the prying eyes of the Hollywood gossip columnists. In a strange case of timing, Davies’ sister Rose had just lost a child.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">The choice was there on the table. Davies gave Rose the baby, and they fudged the paperwork. That was that—but it wasn’t always smooth sailing.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1865" style="width: 2175px"><div class="media-credit-container alignnone" data-dcnode-id="1866" style="width: 2175px"><img alt="Marion Davies facts " class="lazy-hidden size-full wp-image-468377" data-dcnode-id="1872" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green.jpg 2175w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-1024x733.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-768x549.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-1536x1099.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-2048x1465.jpg 2048w" height="1556" loading="lazy" sizes="(max-width: 2175px) 100vw, 2175px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2175"><noscript data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-468377" src="https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green.jpg" alt="Marion Davies facts " width="2175" height="1556" srcset="https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green.jpg 2175w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-300x215.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-1024x733.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-768x549.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-1536x1099.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/08/Marion_Davies_-_Emerald_Green-2048x1465.jpg 2048w" sizes="(max-width: 2175px) 100vw, 2175px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1867"><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMarion_Davies_-_Emerald_Green.jpg"><span data-dcnode-id="1869" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1864" instrument_node="">
</span><h2 data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">58. She Kept It A Secret</span></h2><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node="">In 1924, Rose’s estranged husband George kidnapped young Patricia and disappeared for </span><em data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">five whole years</span></em><span data-dcnode-id="1857" instrument_node="">. If the loss of her secret child affected Davies, she couldn’t really show it, for fear of exposing herself. Regardless, Hearst jumped into action and hired a detective to track the pair down, eventually reuniting the family.</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Hearst supported Patricia financially throughout the years, and both Davies and Hearst confessed their secret and the circumstances of her birth to her at different times. She nearly took the knowledge to get her grave—but thankfully the truth finally surfaced. Of course, Hollywood had no shortage of hidden babies…Unfortunately, celebrated actor Michael Caine learned this the hard way…</span></p><span data-dcnode-id="1852" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1844" style="width: 1272px"><div class="media-credit-container alignnone" data-dcnode-id="1845" style="width: 1272px"><img alt="Hearst Castle facts" class="lazy-hidden size-full wp-image-372268" data-dcnode-id="1851" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst.jpg 1272w, https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst-768x560.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst-1024x747.jpg 1024w" height="928" loading="lazy" sizes="(max-width: 1272px) 100vw, 1272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1272"><noscript data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-372268" src="https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst.jpg" alt="Hearst Castle facts" width="1272" height="928" srcset="https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst.jpg 1272w, https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst-300x219.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst-768x560.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/WilliamRandolphHearst-1024x747.jpg 1024w" sizes="(max-width: 1272px) 100vw, 1272px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1846"><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AWilliamRandolphHearst.jpg"><span data-dcnode-id="1848" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1843" instrument_node="">
</span><h2 data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">59. Michael Caine: An Invisible Sibling</span></h2><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1836"><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-michael-caine/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1839" instrument_node="">Michael Caine’s</span></a><span data-dcnode-id="1837" instrument_node=""> mother hid an enormous secret from his entire family—one that turned his entire life upside down. You see, he has a younger brother named Stanley and an older half-brother named David. However, it wasn’t until the passing of Caine’s mother that Caine became aware of David’s existence. Even his father hadn’t known about David.</span></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">The family’s matriarch kept her lips sealed her entire life. The only hints were the occasions when Caine’s mother visited David in the hospital, where he spent his entire life due to severe epilepsy. As harrowing as these familial revelations are, it would seem that this next actor’s specialty was, undoubtedly, shameless philandering.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1824" style="width: 2923px"><div class="media-credit-container alignnone" data-dcnode-id="1825" style="width: 2923px"><img alt="Michael Caine facts" class="lazy-hidden size-full wp-image-322788" data-dcnode-id="1831" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678.jpg 2923w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678-768x587.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678-1024x783.jpg 1024w" height="2235" loading="lazy" sizes="(max-width: 2923px) 100vw, 2923px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2923"><noscript data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-322788" src="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678.jpg" alt="Michael Caine facts" width="2923" height="2235" srcset="https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678.jpg 2923w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678-768x587.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/GettyImages-2660678-1024x783.jpg 1024w" sizes="(max-width: 2923px) 100vw, 2923px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1826"><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1828" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1823" instrument_node="">
</span><h2 data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">60. Bob Hope: A Diabolical Ladies’ Man</span></h2><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1819" instrument_node="">The public knew </span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/bob-hope/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1818" instrument_node="">Bob Hope</span></a><span data-dcnode-id="1816" instrument_node=""> as a stand-up family man,</span><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node=""> but industry insiders knew him much differently</span></strong><span data-dcnode-id="1813" instrument_node="">. Surprise, surprise: The man who hoodwinked two women into marriage wasn’t so faithful. Actually, he wasn’t faithful at all. As one insider wrote, whenever the superstar went to a hotel, “outside his room were three, four, five young, beautiful girls, waiting to be picked by him to come in.”</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Hope was flirting with disaster…and disaster flirted right back.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1800" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1801" style="width: 1024px"><img alt="Bob Hope Facts" class="lazy-hidden size-full wp-image-470673" data-dcnode-id="1807" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631-300x205.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631-768x526.jpg 768w" height="701" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-470673" src="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631.jpg" alt="Bob Hope Facts" width="1024" height="701" srcset="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631-300x205.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-496229631-768x526.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1802"><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1804" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1799" instrument_node="">
</span><h2 data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">61. He Had A Secret Rendezvous Spot</span></h2><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">In 1949, Hope began an affair with the up-and-coming actress Barbara Payton, even setting her up with a Hollywood apartment so he could come and go from her bed at all hours of the night. But Payton, like many a starlet before her, was starved for attention and kept demanding more gifts and more favors from the veteran actor. Cue ominous music.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1785" style="width: 692px"><div class="media-credit-container alignnone" data-dcnode-id="1786" style="width: 692px"><img alt="Bob Hope Facts" class="lazy-hidden size-full wp-image-470642" data-dcnode-id="1792" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-120418.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-120418.jpg 692w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-120418-300x224.jpg 300w" height="517" loading="lazy" sizes="(max-width: 692px) 100vw, 692px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="692"><noscript data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-470642" src="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-120418.jpg" alt="Bob Hope Facts" width="692" height="517" srcset="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-120418.jpg 692w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-120418-300x224.jpg 300w" sizes="(max-width: 692px) 100vw, 692px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1787"><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABarbara_Payton-Lloyd_Bridges_in_Trapped_still.jpg"><span data-dcnode-id="1789" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1784" instrument_node="">
</span><h2 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">62. His Mistress Betrayed Him</span></h2><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1780" instrument_node="">Fed up with his play thing, Hope eventually broke things off with Payton, though he made sure to pay her off to keep her quiet.&nbsp;</span><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Her reaction was the definition of “spiteful.” </span></strong><span data-dcnode-id="1777" instrument_node="">Unable to seal her lips, the actress signed up for a 1956 tell-all interview in </span><em data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Confidential</span></em><span data-dcnode-id="1774" instrument_node=""> magazine, spilling the beans about her affair with Hope. And that wasn’t the only confession she made…</span></p><span data-dcnode-id="1772" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1764" style="width: 2283px"><div class="media-credit-container alignnone" data-dcnode-id="1765" style="width: 2283px"><img alt="Famous Last Words Facts" class="lazy-hidden size-full wp-image-243671" data-dcnode-id="1771" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/11/35-1-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/11/35-1-1.jpg 2283w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-300x257.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-768x659.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-1024x878.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-120x102.jpg 120w" height="1958" loading="lazy" sizes="(max-width: 2283px) 100vw, 2283px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2283"><noscript data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243671" src="https://www.factinate.com/wp-content/uploads/2017/11/35-1-1.jpg" alt="Famous Last Words Facts" width="2283" height="1958" srcset="https://www.factinate.com/wp-content/uploads/2017/11/35-1-1.jpg 2283w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-300x257.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-768x659.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-1024x878.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/11/35-1-1-120x102.jpg 120w" sizes="(max-width: 2283px) 100vw, 2283px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1766"><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1768" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1763" instrument_node="">
</span><h2 data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">63. He Was Tabloid Fodder</span></h2><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Payton was out for blood in her interview, and she painted a grim portrait of the sunny comedian. According to the starlet, Hope wasn’t an American everyman, but instead “a mean-spirited individual with the ability to respond with zxxxxxxxxxxxxxxa ruthless vengeance when sufficiently provoked.” Unfortunately for Payton, Hope’s response was nothing short of chilling.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1749" style="width: 840px"><div class="media-credit-container alignnone" data-dcnode-id="1750" style="width: 840px"><img alt="Bob Hope Facts" class="lazy-hidden size-full wp-image-470675" data-dcnode-id="1756" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218.jpg 840w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218-768x534.jpg 768w" height="584" loading="lazy" sizes="(max-width: 840px) 100vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="840"><noscript data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-470675" src="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218.jpg" alt="Bob Hope Facts" width="840" height="584" srcset="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218.jpg 840w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218-300x209.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-131218-768x534.jpg 768w" sizes="(max-width: 840px) 100vw, 840px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1751"><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJerry_colonna_bob_hope_1940_nbc.JPG"><span data-dcnode-id="1753" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1748" instrument_node="">
</span><h2 data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">64. He Knew How To Be Cruel</span></h2><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Although Hope must have been beside himself when Payton’s interview came out, he hadn’t survived so long in Hollywood without picking up a few tricks for dealing with attention-seekers, and he knew just what to do. He ignored her. Without Hope commenting, poor Barbara’s splashy confessions made barely a ripple in Tinseltown, and his secrets remained safe a while longer.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1734" style="width: 3462px"><div class="media-credit-container alignnone" data-dcnode-id="1735" style="width: 3462px"><img alt="Roy Orbison Facts" class="lazy-hidden size-full wp-image-360306" data-dcnode-id="1741" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268.jpg 3462w, https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268-768x578.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268-1024x771.jpg 1024w" height="2605" loading="lazy" sizes="(max-width: 3462px) 100vw, 3462px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3462"><noscript data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-360306" src="https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268.jpg" alt="Roy Orbison Facts" width="3462" height="2605" srcset="https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268.jpg 3462w, https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268-768x578.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/11/GettyImages-3349268-1024x771.jpg 1024w" sizes="(max-width: 3462px) 100vw, 3462px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1736"><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1738" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1733" instrument_node="">
</span><h2 data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">65. He Seduced A Wholesome Star</span></h2><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node="">Of all Hope’s affairs, the most scandalous might have been his naughty acts with a famous “good girl” screen siren: None other than the wholesome </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/fact-doris-day/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1728" instrument_node="">Doris Day</span></a><span data-dcnode-id="1726" instrument_node="">. According to Hope, the two had a fiery affair while touring together to raise funds for charity in 1949. But before the two stars had time to catch feelings, it ended abruptly…</span></p><span data-dcnode-id="1724" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1716" style="width: 790px"><div class="media-credit-container alignnone" data-dcnode-id="1717" style="width: 790px"><img alt="Doris Day Facts" class="lazy-hidden size-full wp-image-299222" data-dcnode-id="1723" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1.jpg 790w, https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1-300x257.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1-768x657.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1-120x102.jpg 120w" height="676" loading="lazy" sizes="(max-width: 790px) 100vw, 790px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="790"><noscript data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-299222" src="https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1.jpg" alt="Doris Day Facts" width="790" height="676" srcset="https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1.jpg 790w, https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1-300x257.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1-768x657.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/GettyImages-51252887-1-120x102.jpg 120w" sizes="(max-width: 790px) 100vw, 790px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1718"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1720" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1715" instrument_node="">
</span><h2 data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">66. His Wife Lashed Out</span></h2><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node="">When Hope and Day returned to California from their charity efforts,&nbsp;</span><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">the lovers got a nasty surprise.&nbsp;</span></strong><span data-dcnode-id="1708" instrument_node="">Dolores Reade—Hope’s wife—was waiting at the airport to give her husband a nice, big, and pointed welcome home hug. Day interpreted the gesture as a shot across the bow and backed off, squelching the dalliance.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1698" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1699" style="width: 2560px"><img alt="Bob Hope Facts" class="lazy-hidden size-full wp-image-470665" data-dcnode-id="1705" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-1024x707.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-768x531.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-1536x1061.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-2048x1415.jpg 2048w" height="1768" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-470665" src="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-scaled.jpg" alt="Bob Hope Facts" width="2560" height="1768" srcset="https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-1024x707.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-768x531.jpg 768w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-1536x1061.jpg 1536w, https://www.factinate.com/wp-content/uploads/2020/12/GettyImages-1178095475-1-2048x1415.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1700"><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1702" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1697" instrument_node="">
</span><h2 data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">67. He May Have Been Cursed</span></h2><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Loving Bob Hope was a dangerous game in more ways than one. Yes, you were dealing with a serial cheater…but an eerie curse seemed to follow him around as well. Many of Hope’s mistresses passed tragically sometime after their affairs ended, with Barbara Payton, Ursula Halloran, and Rosemarie Frankland all dying young from overdoses.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Hope certainly seemed like a handful, but even then, he wasn’t as wild as this next starlet…</span></p><span data-dcnode-id="1688" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1680" style="width: 948px"><div class="media-credit-container alignnone" data-dcnode-id="1681" style="width: 948px"><img alt="Bob Hope Facts" class="lazy-hidden size-full wp-image-470623" data-dcnode-id="1687" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643.jpg 948w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643-300x182.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643-768x466.jpg 768w" height="575" loading="lazy" sizes="(max-width: 948px) 100vw, 948px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="948"><noscript data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-470623" src="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643.jpg" alt="Bob Hope Facts" width="948" height="575" srcset="https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643.jpg 948w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643-300x182.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/12/Screenshot-2021-01-05-114643-768x466.jpg 768w" sizes="(max-width: 948px) 100vw, 948px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1682"><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADolores_Hope_and_Bob_Hope%2C_1953.jpg"><span data-dcnode-id="1684" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1679" instrument_node="">
</span><h2 data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">68. Joan Crawford: The Rage Behind The Smile</span></h2><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1675" instrument_node="">When </span><a data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/joan-crawford-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1674" instrument_node="">Joan Crawford</span></a><span data-dcnode-id="1672" instrument_node=""> passed, her adopted brood of children seemed heartbroken—</span><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">until the contents of her will revealed the dark truth.</span></strong><span data-dcnode-id="1669" instrument_node=""> Though she left Cindy and Cathy a small sum of money, she notoriously shut out her two other children entirely from an inheritance. As she wrote, “It is my intention to make no provision herein for my son, Christopher, or my daughter, Christina, for reasons which are well known to them.” That secret soon came out.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1659" style="width: 918px"><div class="media-credit-container alignnone" data-dcnode-id="1660" style="width: 918px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-441990" data-dcnode-id="1666" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39.jpg 918w, https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39-768x557.jpg 768w" height="666" loading="lazy" sizes="(max-width: 918px) 100vw, 918px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="918"><noscript data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-441990" src="https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39.jpg" alt="Joan Crawford facts" width="918" height="666" srcset="https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39.jpg 918w, https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39-300x218.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/JCrawford39-768x557.jpg 768w" sizes="(max-width: 918px) 100vw, 918px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3FcirrusUserTesting%3Dmediasearch_commons_int%26sort%3Drelevance%26search%3Djoan%2B%2Bcrawford%26title%3DSpecial%3ASearch%26profile%3Dadvanced%26fulltext%3D1%26advancedSearch-current%3D%26ns0%3D1%26ns6%3D1%26ns12%3D1%26ns14%3D1%26ns100%3D1%26ns106%3D1%26searchToken%3D9f60aanpaonb5xqh11xtu3l65%23mediaFileJCrawford39.jpg"><span data-dcnode-id="1663" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1658" instrument_node="">
</span><h2 data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">69. She Hurt Her Children</span></h2><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">In 1978, while Crawford was still warm in her grave, her daughter Christina got a long-awaited revenge. The young woman released her infamous tell-all book </span><em data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Mommie Dearest</span></em><span data-dcnode-id="1651" instrument_node="">, letting all Crawford’s secrets loose in the process. Although many contest the claims, the book alleges that Crawford emotionally and physically mistreated Christina and her brother Christopher—and the details weren’t pretty.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1641" style="width: 2203px"><div class="media-credit-container alignnone" data-dcnode-id="1642" style="width: 2203px"><img alt="Joan facts" class="lazy-hidden wp-image-289125 size-full" data-dcnode-id="1648" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg 2203w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-300x253.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-768x648.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-1024x865.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-120x102.jpg 120w" height="1860" loading="lazy" sizes="(max-width: 2203px) 100vw, 2203px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2203"><noscript data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">&lt;img loading="lazy" class="wp-image-289125 size-full" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg" alt="Joan facts" width="2203" height="1860" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883.jpg 2203w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-300x253.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-768x648.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-1024x865.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3262883-120x102.jpg 120w" sizes="(max-width: 2203px) 100vw, 2203px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1643"><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1645" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1640" instrument_node="">
</span><h2 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">70. She Used Her Kids Like Puppets</span></h2><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">According to Christina, Crawford’s abuse combined with her cleanliness obsession to make one unholy mix. Most famously, Crawford hated wire hangers and any kind of mess, and she would wake her children up in the middle of the night if they hung anything up on an ordinary hanger or left a crumb on the floor or a book out of order.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1626" style="width: 913px"><div class="media-credit-container alignnone" data-dcnode-id="1627" style="width: 913px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-441999" data-dcnode-id="1633" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/jkhj.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/jkhj.jpg 913w, https://www.factinate.com/wp-content/uploads/2019/04/jkhj-300x186.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/jkhj-768x475.jpg 768w" height="565" loading="lazy" sizes="(max-width: 913px) 100vw, 913px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="913"><noscript data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-441999" src="https://www.factinate.com/wp-content/uploads/2019/04/jkhj.jpg" alt="Joan Crawford facts" width="913" height="565" srcset="https://www.factinate.com/wp-content/uploads/2019/04/jkhj.jpg 913w, https://www.factinate.com/wp-content/uploads/2019/04/jkhj-300x186.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/jkhj-768x475.jpg 768w" sizes="(max-width: 913px) 100vw, 913px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1628"><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paramount.com/"><span data-dcnode-id="1630" instrument_node="">Mommie Dearest, Paramount Pictures</span></a></span></div></figure><span data-dcnode-id="1625" instrument_node="">
</span><h2 data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">71. She Played Cruel Tricks</span></h2><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1621" instrument_node="">One of </span><em data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Mommie Dearest’s</span></em><span data-dcnode-id="1618" instrument_node=""> most chilling accusations targets Joan Crawford’s picture-perfect image. Christina claimed that during Christmas, Crawford would lavish her children with gifts for photo ops, but then force them to choose only one while the cameras stopped rolling, giving the rest away to charity. But when it came to infamous allegations, Christina saved the best for last.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1608" style="width: 2219px"><div class="media-credit-container alignnone" data-dcnode-id="1609" style="width: 2219px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-289047" data-dcnode-id="1615" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg 2219w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-768x644.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-1024x858.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-120x102.jpg 120w" height="1860" loading="lazy" sizes="(max-width: 2219px) 100vw, 2219px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2219"><noscript data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-289047" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg" alt="Joan Crawford facts" width="2219" height="1860" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149.jpg 2219w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-768x644.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-1024x858.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-3309149-120x102.jpg 120w" sizes="(max-width: 2219px) 100vw, 2219px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1610"><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1612" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1607" instrument_node="">
</span><h2 data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">72. She May Have Killed Her Husband</span></h2><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node="">In the aftermath of </span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Mommie Dearest</span></em><span data-dcnode-id="1600" instrument_node="">, Christina added a new sin to Joan’s reputation: Murder. According to Christina, Joan’s fourth husband Alfred Steele didn’t pass from a heart attack. The family found him at the bottom of a flight of stairs, and there was apparently no autopsy. Without explicitly calling Joan out, Christina said, “I didn’t believe it was an accident…I know what Mommie was capable of in a state of rage.”</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">When it comes to bad parenting and a pocketful of secrets, Hollywood has its fair share of transgressors…</span></p><span data-dcnode-id="1595" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1587" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1588" style="width: 2560px"><img alt="Joan Crawford facts" class="lazy-hidden size-full wp-image-441984" data-dcnode-id="1594" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-300x245.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-1024x836.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-768x627.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-1536x1254.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-2048x1672.jpg 2048w" height="2090" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-441984" src="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-scaled.jpg" alt="Joan Crawford facts" width="2560" height="2090" srcset="https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-300x245.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-1024x836.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-768x627.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-1536x1254.jpg 1536w, https://www.factinate.com/wp-content/uploads/2019/04/GettyImages-607407036-2048x1672.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1589"><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1591" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1586" instrument_node="">
</span><h2 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">73. Henry Fonda: The Cruel Truth</span></h2><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1582" instrument_node="">In 1949, after 13 miserable years and two children together, </span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-henry-fonda/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1581" instrument_node="">Henry Fonda</span></a><span data-dcnode-id="1579" instrument_node=""> approached his wife Frances Brokaw and told her he wanted a divorce. Never one for empathy, </span><strong data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">he then dug the knife in more.</span></strong><span data-dcnode-id="1576" instrument_node=""> He admitted to her that he wanted to split because he wanted to be free to marry his mistress Susan. His poor wife’s reaction was beyond tragic.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1566" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="1567" style="width: 2560px"><img alt="Henry Fonda facts" class="lazy-hidden size-full wp-image-473611" data-dcnode-id="1573" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-1024x797.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-1536x1196.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-2048x1594.jpg 2048w" height="1993" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-473611" src="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-scaled.jpg" alt="Henry Fonda facts" width="2560" height="1993" srcset="https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-1024x797.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-768x598.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-1536x1196.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/01/GettyImages-526869434-2048x1594.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1568"><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1570" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="1565" instrument_node="">
</span><h2 data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">74. He Drove His Wife To An Asylum</span></h2><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1561" instrument_node="">Less than six months later, Brokaw was so distraught about the end of her marriage and her husband’s infidelity, she checked herself into the Austen Riggs Psychiatric Hospital for treatment for her depression. For months, Fonda’s wife tried to process the pain her cruel ex-husband had dealt her. </span><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Sadly, her suffering had only begun.</span></strong></p><span data-dcnode-id="1557" instrument_node="">
