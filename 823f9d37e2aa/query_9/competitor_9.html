</span><figure class="wp-caption alignnone" data-dcnode-id="2532" style="width: 1162px"><div class="media-credit-container alignnone" data-dcnode-id="2533" style="width: 1162px"><img alt="Ingrid Bergman Facts" class="lazy-hidden size-full wp-image-539796" data-dcnode-id="2539" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1.jpg 1162w, https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1-1024x706.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1-768x529.jpg 768w" height="801" loading="lazy" sizes="(max-width: 1162px) 100vw, 1162px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1162"><noscript data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-539796" src="https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1.jpg" alt="Ingrid Bergman Facts" width="1162" height="801" srcset="https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1.jpg 1162w, https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1-300x207.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1-1024x706.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/4682147740_c4f2366335_o-1-768x529.jpg 768w" sizes="(max-width: 1162px) 100vw, 1162px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2534"><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/nordiskamuseet/4682147740"><span data-dcnode-id="2536" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="2531" instrument_node="">
</span><h2 data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">26. Her Ex Sought Revenge</span></h2><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2527" instrument_node="">In the biography </span><em data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">As Time Goes By, The Life of Ingrid Bergman</span></em><span data-dcnode-id="2524" instrument_node=""> by Laurence Leamer, Lindström went on the record and revealed some of the unfeeling things his wife had uttered. Allegedly, she’d said, “I’m only interested in two kinds of people, those who can entertain me, and those who can advance my career.” But this barely scratched the surface.</span></p><span data-dcnode-id="2522" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2514" style="width: 4942px"><div class="media-credit-container alignnone" data-dcnode-id="2515" style="width: 4942px"><img alt="Marlene Dietrich Facts" class="lazy-hidden size-full wp-image-258673" data-dcnode-id="2521" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778.jpg 4942w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778-768x578.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778-1024x771.jpg 1024w" height="3720" loading="lazy" sizes="(max-width: 4942px) 100vw, 4942px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4942"><noscript data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-258673" src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778.jpg" alt="Marlene Dietrich Facts" width="4942" height="3720" srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778.jpg 4942w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778-768x578.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-931262778-1024x771.jpg 1024w" sizes="(max-width: 4942px) 100vw, 4942px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2516"><a data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2518" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2513" instrument_node="">
</span><h2 data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">27. He Slandered Her</span></h2><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2509" instrument_node="">Lindström didn’t hold anything back and helped the biographer paint a very unappealing portrait of Ingrid Bergman. Through his eyes, she became the most selfish human imaginable. And then, to add insult to injury, there were her </span><em data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">vices.&nbsp;</span></em><span data-dcnode-id="2506" instrument_node="">According to the biography, she drank and smoked and slept around with all scores of men. And it didn’t end there.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2496" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2497" style="width: 1024px"><img alt="Ingrid Bergman Facts" class="lazy-hidden size-full wp-image-324008" data-dcnode-id="2503" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971-300x267.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971-768x683.jpg 768w" height="910" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-324008" src="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971.jpg" alt="Ingrid Bergman Facts" width="1024" height="910" srcset="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971-300x267.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-52801971-768x683.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2498"><a data-dcnode-id="2499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2500" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2495" instrument_node="">
</span><h2 data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">28. Her Legacy Reigns Supreme</span></h2><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Bergman’s ex-husband certainly got his petty revenge, even if the actress never lived to feel his wrath. He condemned her for abandoning her children and for always prioritizing her career over her family. But in the end, was his vitriol really necessary? After all, Bergman’s own children seemed to forgive their mother on all counts.</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Finally, no tell-all could erase the fact that Ingrid Bergman was a formidable acting talent—one of the all-time greats. However, Ingrid Bergman wasn’t the only great actress to have her dirty laundry aired after her passing.</span></p><span data-dcnode-id="2486" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2478" style="width: 5221px"><div class="media-credit-container alignnone" data-dcnode-id="2479" style="width: 5221px"><img alt="Ingrid Bergman Facts" class="lazy-hidden size-full wp-image-323996" data-dcnode-id="2485" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645.jpg 5221w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-1024x681.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-360x240.jpg 360w" height="3470" loading="lazy" sizes="(max-width: 5221px) 100vw, 5221px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5221"><noscript data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-323996" src="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645.jpg" alt="Ingrid Bergman Facts" width="5221" height="3470" srcset="https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645.jpg 5221w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-1024x681.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/08/GettyImages-603412645-360x240.jpg 360w" sizes="(max-width: 5221px) 100vw, 5221px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2480"><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2482" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2477" instrument_node="">
</span><h2 data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">29. Marilyn Monroe: Gossip From Beyond The Grave</span></h2><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2473" instrument_node="">For twenty long years after Marilyn Monroe’s demise, her ex Joe DiMaggio sent roses to her crypt three times a week. He outlived her by 36 years but in all that time, he never married again. His last words were apparently, “I’ll finally get to see Marilyn.” As if this story needed to get even sadder, </span><strong data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">there’s a heartbreaking reason for DiMaggio’s lifelong inability to get over Marilyn.</span></strong></p><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Apparently, at the time of her demise, they had gotten back together and even planned to remarry. And what’s more? The bombshell revelations about Monroe’s tragic final years didn’t end with her demise.</span></p><span data-dcnode-id="2466" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2458" style="width: 1200px"><div class="media-credit-container alignnone" data-dcnode-id="2459" style="width: 1200px"><img alt="Romantic Gestures History" class="lazy-hidden wp-image-397725 size-full" data-dcnode-id="2465" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2020/03/rominternal.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2020/03/rominternal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2020/03/rominternal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/03/rominternal-1024x535.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/03/rominternal-768x401.jpg 768w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">&lt;img loading="lazy" class="wp-image-397725 size-full" src="https://www.factinate.com/wp-content/uploads/2020/03/rominternal.jpg" alt="Romantic Gestures History" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2020/03/rominternal.jpg 1200w, https://www.factinate.com/wp-content/uploads/2020/03/rominternal-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2020/03/rominternal-1024x535.jpg 1024w, https://www.factinate.com/wp-content/uploads/2020/03/rominternal-768x401.jpg 768w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2460"><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/"><span data-dcnode-id="2462" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2457" instrument_node="">
</span><h2 data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">30. Her Home Contained A Dark Secret</span></h2><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2453" instrument_node="">In 1972, an actress named Veronica Hamel bought Marilyn’s old house. She claimed that when she was renovating the home, </span><strong data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">she made a shocking discovery.</span></strong><span data-dcnode-id="2450" instrument_node=""> She uncovered an extensive system of wire-taps. For years, people had wondered if the FBI, CIA, and/or the Mafia had bugged Monroe’s home. With this discovery, it looked like at least one of them had.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">But perhaps the most disturbing discovery of all was not Monroe’s home, but a rather demented rumor that eventually surfaced.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2437" style="width: 1335px"><div class="media-credit-container alignnone" data-dcnode-id="2438" style="width: 1335px"><img alt="Marlon Brando facts" class="lazy-hidden size-full wp-image-394309" data-dcnode-id="2444" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952.jpg 1335w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952-1024x771.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952-768x578.jpg 768w" height="1005" loading="lazy" sizes="(max-width: 1335px) 100vw, 1335px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1335"><noscript data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-394309" src="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952.jpg" alt="Marlon Brando facts" width="1335" height="1005" srcset="https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952.jpg 1335w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952-1024x771.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/03/Marilyn_Monroe_in_1952-768x578.jpg 768w" sizes="(max-width: 1335px) 100vw, 1335px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2439"><a data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMarilyn_Monroe_in_1952.jpg"><span data-dcnode-id="2441" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2436" instrument_node="">
</span><h2 data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">31. She Had A Twisted Desire</span></h2><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2432" instrument_node="">Many, many, </span><em data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">many </span></em><span data-dcnode-id="2429" instrument_node="">books have been written about Marilyn Monroe. But only one penned by her old friend Charles Casillo, contains this claim. It’s common knowledge that Monroe was obsessed with meeting her biological father—</span><strong data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">but few people realize just how twisted her fixation really was.</span></strong><span data-dcnode-id="2426" instrument_node=""> Once, at a party, Monroe told Casillo that she wanted to put on a black wig, pick up her father in a bar, and make love to him.</span></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">After the deed was done, she planned to ask him, “How do you feel now that you have a daughter that you’ve made love to?” Monroe’s passing sparked controversy and fresh rumors, but this next star hid some secrets that were downright heartbreaking.</span></p><span data-dcnode-id="2421" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2413" style="width: 4082px"><div class="media-credit-container alignnone" data-dcnode-id="2414" style="width: 4082px"><img alt="Jayne Mansfield facts" class="lazy-hidden size-full wp-image-352629" data-dcnode-id="2420" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313.jpg 4082w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-300x257.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-768x658.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-1024x877.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-120x102.jpg 120w" height="3496" loading="lazy" sizes="(max-width: 4082px) 100vw, 4082px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4082"><noscript data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-352629" src="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313.jpg" alt="Jayne Mansfield facts" width="4082" height="3496" srcset="https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313.jpg 4082w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-300x257.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-768x658.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-1024x877.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/10/GettyImages-131651313-120x102.jpg 120w" sizes="(max-width: 4082px) 100vw, 4082px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2415"><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2417" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2412" instrument_node="">
</span><h2 data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">32. Lauren Bacall: Final Confessions</span></h2><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2408" instrument_node="">Just a month before her 90th birthday, </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-lauren-bacall/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2407" instrument_node="">Lauren Bacall</span></a><span data-dcnode-id="2405" instrument_node=""> suffered a stroke and passed on at her long-time Manhattan home, the Dakota. Bacall had been a mysterious figure throughout her life, but in her final years,</span><strong data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node=""> she had started to spill the secrets that had never come out before—and many were absolutely jaw-dropping.</span></strong></p><span data-dcnode-id="2401" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2393" style="width: 2146px"><div class="media-credit-container alignnone" data-dcnode-id="2394" style="width: 2146px"><img alt="Lauren Bacall facts" class="lazy-hidden size-full wp-image-260383" data-dcnode-id="2400" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094.jpg 2146w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094-768x593.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094-1024x790.jpg 1024w" height="1656" loading="lazy" sizes="(max-width: 2146px) 100vw, 2146px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2146"><noscript data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-260383" src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094.jpg" alt="Lauren Bacall facts" width="2146" height="1656" srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094.jpg 2146w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094-300x232.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094-768x593.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-2635094-1024x790.jpg 1024w" sizes="(max-width: 2146px) 100vw, 2146px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2395"><a data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2397" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2392" instrument_node="">
</span><h2 data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">33. She Chose Another Man</span></h2><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2388" instrument_node="">When Lauren Bacall spurned Howard Hawks, the director who’d discovered her, on the set of her first film, he was furious—and he was even madder when he discovered that she’d been having an affair with </span><a data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-humphrey-bogart/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2387" instrument_node="">Humphrey Bogart</span></a><span data-dcnode-id="2385" instrument_node="">. Years later, when asked about the love triangle,&nbsp;</span><strong data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">his answer was so brutal that it’s impossible to forget</span></strong><span data-dcnode-id="2382" instrument_node="">.</span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Hawks said: “Bogie fell in love with the character she played, so she had to keep playing it the rest of her life.” Harsh.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2369" style="width: 1200px"><div class="media-credit-container alignnone" data-dcnode-id="2370" style="width: 1200px"><img alt="Humphrey Bogart Facts" class="lazy-hidden size-full wp-image-249472" data-dcnode-id="2376" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/internal-16.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/internal-16.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/01/internal-16-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/internal-16-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/internal-16-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249472" src="https://www.factinate.com/wp-content/uploads/2019/01/internal-16.jpg" alt="Humphrey Bogart Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/01/internal-16.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/01/internal-16-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/internal-16-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/internal-16-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2371"><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/"><span data-dcnode-id="2373" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2368" instrument_node="">
</span><h2 data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">34. Her Grief Was Traumatic</span></h2><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Lauren Bacall came to Hollywood looking for fame. Instead, she found the love of her life, Humphrey Bogart. They were pretty much the most famous couple in Hollywood—but after Bogart passed on, few knew just how horrible things got for Bacall. Years later, she confessed that she was completely lost without him, and would regularly wake up screaming, tormented by nightmares about him.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2354" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="2355" style="width: 1280px"><img alt="Lauren Bacall facts" class="lazy-hidden size-full wp-image-260543" data-dcnode-id="2361" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280-768x586.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280-1024x782.jpg 1024w" height="977" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-260543" src="https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280.jpg" alt="Lauren Bacall facts" width="1280" height="977" srcset="https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280-768x586.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/humphrey-bogart-619157_1280-1024x782.jpg 1024w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2356"><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="2358" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="2353" instrument_node="">
</span><h2 data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">35. She Never Forgot</span></h2><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2349" instrument_node="">During Humphrey Bogart’s funeral, when the coffin was lowered,&nbsp;</span><strong data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">his widow Lauren Bacall made a final, heartbreaking tribute.</span></strong><span data-dcnode-id="2346" instrument_node="">&nbsp;Bacall placed a whistle on his coffin. He’d given it to her years earlier, in reference to&nbsp;</span><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">To Have and Have Not,&nbsp;</span></em><span data-dcnode-id="2343" instrument_node="">the film that had brought the pair together. It included an iconic moment where Bacall’s character says to Bogart’s: “You know how to whistle, don’t you? You just put your lips together and blow.”</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Before giving it to Bacall, Bogart had it engraved with the words: “If you need me, just whistle.”</span></p><span data-dcnode-id="2338" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2330" style="width: 1600px"><div class="media-credit-container alignnone" data-dcnode-id="2331" style="width: 1600px"><img alt="Lauren Bacall Facts" class="lazy-hidden size-full wp-image-479145" data-dcnode-id="2337" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945.jpg 1600w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-1024x724.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-768x543.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-1536x1086.jpg 1536w" height="1131" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1600"><noscript data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-479145" src="https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945.jpg" alt="Lauren Bacall Facts" width="1600" height="1131" srcset="https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945.jpg 1600w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-300x212.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-1024x724.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-768x543.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/Lauren_Bacall_1945-1536x1086.jpg 1536w" sizes="(max-width: 1600px) 100vw, 1600px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2332"><a data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALauren_Bacall_1945.jpg"><span data-dcnode-id="2334" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2329" instrument_node="">
</span><h2 data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">36. He Turned On Her</span></h2><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2325" instrument_node="">Of course, after Bogart’s passing, his friend </span><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/42-swingin-facts-frank-sinatra/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2324" instrument_node="">Frank Sinatra</span></a><span data-dcnode-id="2322" instrument_node=""> swooped in—</span><strong data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">but their relationship was utterly disastrous.</span></strong><span data-dcnode-id="2319" instrument_node="">&nbsp;Although Bacall tried to resist, she couldn’t deny the chemistry she had with Sinatra. Finally, he proposed—but within days, he coldly broke things off.&nbsp;</span><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">The reason why was chilling.</span></strong><span data-dcnode-id="2316" instrument_node="">&nbsp;They wanted to keep things quiet, but Bacall had told just one friend about the engagement…who then turned around and told notorious gossip columnist Louella Parsons.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2306" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="2307" style="width: 1024px"><img alt="Lauren Bacall Facts" class="lazy-hidden size-full wp-image-479165" data-dcnode-id="2313" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726-768x617.jpg 768w" height="822" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-479165" src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726.jpg" alt="Lauren Bacall Facts" width="1024" height="822" srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726-300x241.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3207726-768x617.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2308"><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2310" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="2305" instrument_node="">
</span><h2 data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">37. A Horrible Miscommunication</span></h2><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">The next day, the headlines read “Sinatra to Marry Bacall.” Bacall was humiliated, and Sinatra was furious. He thought she’d been the one to tell the press, and he immediately dumped her. It was so bad that months later, they sat near each other at a party, and Sinatra wouldn’t even look her in the eye. It was only decades later that he learned that she hadn’t been behind the leak.</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2298" instrument_node="">Bacall’s relationships were exciting and fraught with misunderstanding—but they were nowhere near as&nbsp;</span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">bloody</span></em><span data-dcnode-id="2295" instrument_node=""> as this next actress’s.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2282"><span data-dcnode-id="2292" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2284" style="width: 2552px"><div class="media-credit-container alignnone" data-dcnode-id="2285" style="width: 2552px"><img alt="Lauren Bacall facts" class="lazy-hidden size-full wp-image-260744" data-dcnode-id="2291" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509.jpg 2552w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509-768x606.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509-1024x808.jpg 1024w" height="2013" loading="lazy" sizes="(max-width: 2552px) 100vw, 2552px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2552"><noscript data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-260744" src="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509.jpg" alt="Lauren Bacall facts" width="2552" height="2013" srcset="https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509.jpg 2552w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509-768x606.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/02/GettyImages-3397509-1024x808.jpg 1024w" sizes="(max-width: 2552px) 100vw, 2552px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2286"><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2288" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2283" instrument_node="">
</span></figure><span data-dcnode-id="2281" instrument_node="">
</span><h2 data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">38. Lila Lee: A Slip Of The Tongue</span></h2><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2267"><span data-dcnode-id="2277" instrument_node="">In 1935, </span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-lila-lee/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2276" instrument_node="">Lila Lee</span></a><span data-dcnode-id="2274" instrument_node=""> began dating car salesman, Reid Russell—</span><strong data-dcnode-id="2269"><span data-dcnode-id="2273" instrument_node="">but their romance came to a heartbreaking and shockingly </span><em data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">gruesome</span></em><span data-dcnode-id="2270" instrument_node=""> end.</span></strong><span data-dcnode-id="2268" instrument_node=""> On September 25, 1936, Lee’s son Kirkwood Jr. discovered the lifeless body of Russell swinging in a hammock outside of the Morris household. Russell had a single .32 caliber bullet wound to the head. Curiously, however, investigators never found the bullet or the shell casing.</span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">That was just the opening chapter in the scandal that would ruin Lee’s great career.</span></p><span data-dcnode-id="2263" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2255" style="width: 802px"><div class="media-credit-container alignnone" data-dcnode-id="2256" style="width: 802px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494086" data-dcnode-id="2262" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj.jpg 802w, https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj-768x636.jpg 768w" height="664" loading="lazy" sizes="(max-width: 802px) 100vw, 802px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="802"><noscript data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494086" src="https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj.jpg" alt="Lila Lee facts" width="802" height="664" srcset="https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj.jpg 802w, https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj-300x248.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/dfhsfjsfj-768x636.jpg 768w" sizes="(max-width: 802px) 100vw, 802px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2257"><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AIs_Matrimony_a_Failure_%281922%29_-_1.jpg"><span data-dcnode-id="2259" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2254" instrument_node="">
</span><h2 data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">39. She Got Her Story Straight</span></h2><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2247"><span data-dcnode-id="2250" instrument_node="">The speculation surrounding the discovery of Russell’s body began immediately. Lee and the Morrises all confirmed to investigators, however, that there wasn’t much to see here at all. All three told the investigators—for the benefit of the tabloids—that Russell had talked incessantly about suicide, particularly after losing his job. </span><strong data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">But their story didn’t totally add up.</span></strong></p><span data-dcnode-id="2246" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2238" style="width: 2175px"><div class="media-credit-container alignnone" data-dcnode-id="2239" style="width: 2175px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494091" data-dcnode-id="2245" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867.jpg 2175w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-300x214.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-1024x730.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-768x548.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-1536x1095.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-2048x1460.jpg 2048w" height="1551" loading="lazy" sizes="(max-width: 2175px) 100vw, 2175px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2175"><noscript data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494091" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867.jpg" alt="Lila Lee facts" width="2175" height="1551" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867.jpg 2175w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-300x214.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-1024x730.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-768x548.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-1536x1095.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3289867-2048x1460.jpg 2048w" sizes="(max-width: 2175px) 100vw, 2175px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2240"><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2242" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2237" instrument_node="">
</span><h2 data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">40. She Kept A Secret From Investigators</span></h2><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Lila Lee later divulged that Mrs. Morris had told her about a suicide note. Lee said that Ruth Morris told her that she had discovered the note in her jewel box—of all the strange places—two or three days following the discovery of Russell’s body. Lee chose not to disclose this fact to the investigators—and then, her behavior got weirder.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2223" style="width: 2073px"><div class="media-credit-container alignnone" data-dcnode-id="2224" style="width: 2073px"><img alt="Lila Lee facts " class="lazy-hidden size-full wp-image-494005" data-dcnode-id="2230" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545.jpg 2073w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-1024x783.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-768x587.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-1536x1174.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-2048x1566.jpg 2048w" height="1585" loading="lazy" sizes="(max-width: 2073px) 100vw, 2073px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2073"><noscript data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494005" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545.jpg" alt="Lila Lee facts " width="2073" height="1585" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545.jpg 2073w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-300x229.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-1024x783.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-768x587.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-1536x1174.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752545-2048x1566.jpg 2048w" sizes="(max-width: 2073px) 100vw, 2073px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2225"><a data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2227" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2222" instrument_node="">
</span><h2 data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">41. She Burned After Reading</span></h2><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node="">Mrs. Morris did eventually tell the investigators about the suicide note she had found in her jewel box. But she also told them that she couldn’t produce the note itself—</span><strong data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">all for a bizarre reason</span></strong><span data-dcnode-id="2215" instrument_node="">. Lee claimed that she had never seen the note herself, but said that Mrs. Morris had read it to her and then burned it in an ashtray.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">If that seemed suspicious, then the next hole in their story was ominous.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2202" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2203" style="width: 800px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494097" data-dcnode-id="2209" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/oio.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/oio.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/03/oio-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/oio-768x569.jpg 768w" height="593" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494097" src="https://www.factinate.com/wp-content/uploads/2021/03/oio.jpg" alt="Lila Lee facts" width="800" height="593" srcset="https://www.factinate.com/wp-content/uploads/2021/03/oio.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/03/oio-300x222.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/oio-768x569.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2204"><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/c/cd/Lila_Lee__Apperson.jpg"><span data-dcnode-id="2206" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2201" instrument_node="">
</span><h2 data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">42. She Had Selective Deafness</span></h2><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Even more strange than the whole suicide note episode was Lee and the Morrises’ recollections of the events preceding the discovery of Russell’s body. While they claimed that there had been no argument or even any noise around the time of the incident, their neighbors claimed to have heard something completely different.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">While Lee and the Morrises claimed not to have heard the assuredly deafening sound of a .32 caliber round going off, all of their neighbors said they’d heard it.</span></p><span data-dcnode-id="2192" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2184" style="width: 2225px"><div class="media-credit-container alignnone" data-dcnode-id="2185" style="width: 2225px"><img alt="Lila Lee facts " class="lazy-hidden size-full wp-image-494055" data-dcnode-id="2191" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388.jpg 2225w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-1024x808.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-768x606.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-1536x1212.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-2048x1615.jpg 2048w" height="1755" loading="lazy" sizes="(max-width: 2225px) 100vw, 2225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2225"><noscript data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494055" src="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388.jpg" alt="Lila Lee facts " width="2225" height="1755" srcset="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388.jpg 2225w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-1024x808.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-768x606.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-1536x1212.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_silent_film_actress_SAYRE_5388-2048x1615.jpg 2048w" sizes="(max-width: 2225px) 100vw, 2225px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2186"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALila_Lee%2C_silent_film_actress_%28SAYRE_5388%29.jpg"><span data-dcnode-id="2188" instrument_node=""> Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2183" instrument_node="">
</span><h2 data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">43. She Would Have Slain For Love</span></h2><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2179" instrument_node="">If you can believe it, </span><strong data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">there was yet another twist. </span></strong><span data-dcnode-id="2176" instrument_node="">To cast even more suspicion on the whole debacle, Russell’s mother claimed to have received phone calls from an unknown female demanding to know where Russell was. Investigators entertained the idea of a “love slaying.” Of course, Lee was Russell’s only known lover at the time.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">The investigation was just starting to get interesting.</span></p><span data-dcnode-id="2171" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2163" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2164" style="width: 800px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494063" data-dcnode-id="2170" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen-768x589.jpg 768w" height="614" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494063" src="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen.jpg" alt="Lila Lee facts" width="800" height="614" srcset="https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen-300x230.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen-768x589.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2165"><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/5/5a/Lila_Lee_by_Nelson_Evans_-_The_Blue_Book_of_the_Screen.jpg"><span data-dcnode-id="2167" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2162" instrument_node="">
</span><h2 data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">44. She May Have Had The Investigation Shut Down</span></h2><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">On December 12, 1936, a little over a year after Kirkwood Jr. discovered Russell’s body, District Attorney Burron Fitts closed the Russell case as a suicide. Fitts claimed that there could not have been foul play at hand. However, Fitts had a history of accepting bribe money from film studios. And who worked for film studios? Well, Lila Lee, of course.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2148" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="2149" style="width: 2560px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494106" data-dcnode-id="2155" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-1024x801.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-1536x1202.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-2048x1603.jpg 2048w" height="2003" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494106" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-scaled.jpg" alt="Lila Lee facts" width="2560" height="2003" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-300x235.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-1024x801.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-768x601.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-1536x1202.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-3353606-2048x1603.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2150"><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2152" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2147" instrument_node="">
</span><h2 data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">45. She Wrote A Confession</span></h2><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Lee wrote about the scandal in her autobiography. She said: “They started digging around the place and they had found that our gardener had had relations with a sheep, had buried it […] The gardener had made a pass at Jimmy when he was alone in the house in the afternoon. He was gotten rid of but fast.” So, law enforcement turned up plenty about the gardener, but what was Reid Russell?</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">As Lee wrote, “I think he [Reid Russell] committed suicide.” But later on, she contradicted herself.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2130" style="width: 2172px"><div class="media-credit-container alignnone" data-dcnode-id="2131" style="width: 2172px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494067" data-dcnode-id="2137" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543.jpg 2172w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-1024x697.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-768x523.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-1536x1045.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-2048x1394.jpg 2048w" height="1478" loading="lazy" sizes="(max-width: 2172px) 100vw, 2172px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2172"><noscript data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494067" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543.jpg" alt="Lila Lee facts" width="2172" height="1478" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543.jpg 2172w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-300x204.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-1024x697.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-768x523.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-1536x1045.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-635752543-2048x1394.jpg 2048w" sizes="(max-width: 2172px) 100vw, 2172px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2132"><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2134" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2129" instrument_node="">
</span><h2 data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">46. She Revealed The Final Clue</span></h2><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">Years after the whole scandal had blown over, </span><strong data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Lila Lee made a disturbing slip of the tongue.</span></strong><span data-dcnode-id="2122" instrument_node=""> She was speaking to Evan Rhodes about the scandal when she might have let the truth about Russell’s untimely demise slip out. Rhodes wrote down that Lee had said in the interview, “Do you want to know about the killing? [No], not the killing—the suicide[?]”</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2119" instrument_node="">Now, this next foray into secrecy doesn’t exactly involve a horrific passing, but it&nbsp;</span><em data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">does </span></em><span data-dcnode-id="2116" instrument_node="">promise a near-fatal experience </span><em data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">and</span></em><span data-dcnode-id="2113" instrument_node=""> a very steamy love affair…</span></p><span data-dcnode-id="2111" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2103" style="width: 2560px"><div class="media-credit-container alignnone" data-dcnode-id="2104" style="width: 2560px"><img alt="Lila Lee facts" class="lazy-hidden size-full wp-image-494113" data-dcnode-id="2110" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-scaled.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-1024x810.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-768x607.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-1536x1215.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-2048x1620.jpg 2048w" height="2025" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2560"><noscript data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-494113" src="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-scaled.jpg" alt="Lila Lee facts" width="2560" height="2025" srcset="https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-scaled.jpg 2560w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-300x237.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-1024x810.jpg 1024w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-768x607.jpg 768w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-1536x1215.jpg 1536w, https://www.factinate.com/wp-content/uploads/2021/03/GettyImages-526875294-2048x1620.jpg 2048w" sizes="(max-width: 2560px) 100vw, 2560px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2105"><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="2107" instrument_node="">Getty Images </span></a></span></div></figure><span data-dcnode-id="2102" instrument_node="">
</span><h2 data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">47. Kim Novak And Sammy Davis Jr.: A Forbidden Love</span></h2><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2098" instrument_node="">Blonde beauty </span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-kim-novak/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2097" instrument_node="">Kim Novak</span></a><span data-dcnode-id="2095" instrument_node=""> obeyed her studio’s every demand, that is </span><strong data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node="">until she fell deeply in love with a man she was </span><em data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">not&nbsp;</span></em><span data-dcnode-id="2091" instrument_node="">supposed to.</span></strong><span data-dcnode-id="2089" instrument_node=""> Enter: The multi-talented entertainer,&nbsp;</span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/sammy-davis-jr-the-candy-man-of-show-biz/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2088" instrument_node="">Sammy Davis Jr.</span></a><span data-dcnode-id="2086" instrument_node=""> In 1957, Davis confided in Tony Curtis that he really desired an interlude with Kim Novak. Curtis told Davis exactly what he wanted to hear: “I’m going to have a party at my house. Come on by, and I’ll invite Kim.”</span></p><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2083" instrument_node="">Luckily for Davis, he’d already caught Novak’s eye, and when they met at the party, sparks began to fly </span><em data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">instantly</span></em><span data-dcnode-id="2080" instrument_node="">. Unsurprisingly rumors about their intimate </span><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">tête-à-tête&nbsp;</span></em><span data-dcnode-id="2077" instrument_node="">got out—but for Novak and Davis, there was no turning back. Caught up in this newfound desire, neither of them realized just how dangerous their love could be.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2067" style="width: 1996px"><div class="media-credit-container alignnone" data-dcnode-id="2068" style="width: 1996px"><img alt="Kim Novak facts" class="lazy-hidden size-full wp-image-538980" data-dcnode-id="2074" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o.jpg 1996w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-1024x776.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-768x582.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-1536x1164.jpg 1536w" height="1512" loading="lazy" sizes="(max-width: 1996px) 100vw, 1996px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1996"><noscript data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-538980" src="https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o.jpg" alt="Kim Novak facts" width="1996" height="1512" srcset="https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o.jpg 1996w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-300x227.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-1024x776.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-768x582.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/12/2105923098_0f12726d1b_o-1536x1164.jpg 1536w" sizes="(max-width: 1996px) 100vw, 1996px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2069"><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/carbonated/2105923098/"><span data-dcnode-id="2071" instrument_node="">Flickr, Allison Marchant</span></a></span></div></figure><span data-dcnode-id="2066" instrument_node="">
</span><h2 data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">48. She Stuck It To The Man</span></h2><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2062" instrument_node="">There’s a good chance that Novak saw Davis as more than just a handsome, endearing face. He was also someone willing to go off the deep end with her and defy the ever-powerful Harry Cohn. Novak had grown tired of being constantly used as a pawn in Cohn’s games and wanted to follow her heart in at least one respect—</span><em data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">love. S</span></em><span data-dcnode-id="2059" instrument_node="">he’d go the distance just to keep it alive.</span></p><span data-dcnode-id="2057" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2049" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2050" style="width: 800px"><img alt="Sammy Davis Jr. facts" class="lazy-hidden size-full wp-image-518469" data-dcnode-id="2056" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966-768x600.jpg 768w" height="625" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="800"><noscript data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-518469" src="https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966.jpg" alt="Sammy Davis Jr. facts" width="800" height="625" srcset="https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966.jpg 800w, https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966-300x234.jpg 300w, https://www.factinate.com/wp-content/uploads/2021/07/Sammy_Davis_Jr._performing_1966-768x600.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2051"><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sammy_Davis_Jr.%23/media/File%3ASammy_Davis_Jr._performing_1966.JPG"><span data-dcnode-id="2053" instrument_node="">Wikipedia </span></a></span></div></figure><span data-dcnode-id="2048" instrument_node="">
</span><h2 data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">49. She Evaded Spies</span></h2><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2044" instrument_node="">With Cohn’s spies honed in on her every move,&nbsp;</span><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Novak had to get sneaky.</span></strong><span data-dcnode-id="2041" instrument_node="">&nbsp;In fact, she and Davis transformed their relationship into a covert operation and evaded both the press and their employers at all cost. While on his way to Novak’s home, Davis would even&nbsp;</span><em data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">hide&nbsp;</span></em><span data-dcnode-id="2038" instrument_node="">from prying eyes, curling up beneath a rug in the back of the car. And that wasn’t all.</span></p><span data-dcnode-id="2036" instrument_node="">
