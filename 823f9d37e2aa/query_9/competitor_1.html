</span><span data-dcnode-id="2675" id="freeTextContainer1718096914666728271"><i data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">(English review at the bottom)</span></i><br data-dcnode-id="2680"><br data-dcnode-id="2679"><span data-dcnode-id="2678" instrument_node="">Me costó algo de trabajo encontrar algo de interés durante las dos primeras partes de la historia, pero de repente llegó a un punto en el que todo el drama se volvió inmensamente interesante y tenía que saber que sucedería después.</span><br data-dcnode-id="2677"><span data-dcnode-id="2676" instrument_node="">El comienzo de la historia es de lo más genérico posible, tratando el inicio del amorío y los primeros meses de felicidad. Está bien escrito, pero lo he leído antes con mejor desarrollo y le faltaba algo de dinamismo para mantener mi atenc</span></span><span data-dcnode-id="2674" instrument_node="">
</span><span data-dcnode-id="2657" id="freeText1718096914666728271" style="display:none"><i data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">(English review at the bottom)</span></i><br data-dcnode-id="2671"><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">Me costó algo de trabajo encontrar algo de interés durante las dos primeras partes de la historia, pero de repente llegó a un punto en el que todo el drama se volvió inmensamente interesante y tenía que saber que sucedería después.</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">El comienzo de la historia es de lo más genérico posible, tratando el inicio del amorío y los primeros meses de felicidad. Está bien escrito, pero lo he leído antes con mejor desarrollo y le faltaba algo de dinamismo para mantener mi atención.</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">Todo lo interesante y original sucede en las últimas páginas; de repente, eventos se desenvuelven uno tras otro. Me dejó un poco triste saber que el inicio es tan aburrido, de no ser así, este sería uno de los libros que más recomiendo en el género de romance histórico.</span><br data-dcnode-id="2664"><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">I had a hard time getting into the story for the first two-thirds of it, but it suddendly hit a point that it became super interesting and I just had to know what was going to happen next. </span><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">It starts out as a super generic historical romance story that's all about the beginning of the affair and the bliss of those first months - it's well written, but I've definitely read this done better and it was missing some pizzaza. </span><br data-dcnode-id="2659"><span data-dcnode-id="2658" instrument_node="">All the juicy events happen in the very last pages and things are suddenly happening one after another. I'm just so sad about the boring beginning, because if the whole book had been like this, it would probably be one of my go-to recommendations for historical romance. </span></span><span data-dcnode-id="2656" instrument_node="">

</span><span data-dcnode-id="2087" id="freeTextContainer4393235798107528219"><span data-dcnode-id="2096" instrument_node="">So I didn't finish this one, and actually, I barely managed to start it.. Let me tell you why!</span><br data-dcnode-id="2095"><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">First off, there is a suitable amount of historical, flouncy and flowery language that can be used in historical novels. A few "Pray Tells!" and a couple of choice nouns is more than sufficient to put across the fact that it's a regency romance.</span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">Furthermore it is very hard to find a man attractive when he sounds like he has stepped out of a mockumentary Blackadder style spoof. </span><br data-dcnode-id="2090"><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node="">Our hero stumbles onto our </span></span><span data-dcnode-id="2086" instrument_node="">
</span><span data-dcnode-id="2058" id="freeText4393235798107528219" style="display:none"><span data-dcnode-id="2085" instrument_node="">So I didn't finish this one, and actually, I barely managed to start it.. Let me tell you why!</span><br data-dcnode-id="2084"><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">First off, there is a suitable amount of historical, flouncy and flowery language that can be used in historical novels. A few "Pray Tells!" and a couple of choice nouns is more than sufficient to put across the fact that it's a regency romance.</span><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">Furthermore it is very hard to find a man attractive when he sounds like he has stepped out of a mockumentary Blackadder style spoof. </span><br data-dcnode-id="2079"><br data-dcnode-id="2078"><span data-dcnode-id="2077" instrument_node="">Our hero stumbles onto our heroine being threatened - Dum dum duuum - instead of baffling the villian with his deft use of witty banter or a masculine show of staring, glaring and the threat of physical pain, our hero just lets the villian leave. He then says to the heroine </span><i data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node=""> in all seriousness </span></i><span data-dcnode-id="2074" instrument_node=""> "Dear Lady, you mustn't worry!" </span><br data-dcnode-id="2073"><br data-dcnode-id="2072"><span data-dcnode-id="2071" instrument_node="">Unless my hero is using the phrase "Dear Lady.." in a completely mocking tone, I don't want him saying it </span><b data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node=""> at all. </span></b><span data-dcnode-id="2068" instrument_node=""> I mean really, grow a pair and talk like a </span><u data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node=""> real </span></u><span data-dcnode-id="2065" instrument_node=""> man.</span><br data-dcnode-id="2064"><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">Bringing me onto my second point, which is that the hero was entirely unattractive to me from his first utterance and I can't imagine he was any better in the rest of the novel. He seemed too weak, too spineless and far too linguistically flamboyant. </span><br data-dcnode-id="2061"><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">A shame because my first impressions of Emily were positive, I just felt that Evan would never be good enough for her.</span></span><span data-dcnode-id="2057" instrument_node="">

</span><span data-dcnode-id="385" id="freeTextContainer2880910606294159035"><span data-dcnode-id="386" instrument_node="">Julia Justiss grew up breathing the scent of sea air near the colonial town of Annapolis, Maryland, a fact responsible for two of her life-long passions: sailors and history! By age twelve she was a junior tour guide for Historic Annapolis, conducting visitors on walking tours through the city that was a hotbed of revolutionary fervor. (Annapolis hosted its own tea party, dispensing with the cargo</span></span><span data-dcnode-id="384" instrument_node="">
</span><span data-dcnode-id="367" id="freeText2880910606294159035" style="display:none"><span data-dcnode-id="383" instrument_node="">Julia Justiss grew up breathing the scent of sea air near the colonial town of Annapolis, Maryland, a fact responsible for two of her life-long passions: sailors and history! By age twelve she was a junior tour guide for Historic Annapolis, conducting visitors on walking tours through the city that was a hotbed of revolutionary fervor. (Annapolis hosted its own tea party, dispensing with the cargo aboard the "Peggy Stewart," and was briefly capital of the United States.) She also took tourists through Annapolis's other big attraction, the United States Naval Academy. After so many years of observing future naval officers at P-rade and chapel, it seemed almost inevitable that she eventually married one.</span><br data-dcnode-id="382"><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node="">But long before embarking on romantic adventures of her own, she read about them, transporting herself to such favorite venues as ancient Egypt, World War II submarine patrols, the Old South and, of course, Regency England. Soon she was keeping notebooks for jotting down story ideas. From plotting adventures for her first favorite heroine Nancy Drew she went on to write poetry in high school and college, then worked as a business journalist doing speeches, sales promotion material and newsletter articles. After her marriage to a naval lieutenant took her overseas, she wrote the newsletter for the American Embassy in Tunis, Tunisia and traveled extensively throughout Europe. Before leaving Tunis, she fulfilled her first goal: completing a Regency novel.</span><br data-dcnode-id="379"><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">Children intervened, and not until her husband left the Navy to return to his Texas homeland did she sit down to pen a second novel. The reply to her fan mail letter to a Regency author led her to Romance Writers of America. From the very first meeting, she knew she'd found a home among fellow writers--doubtless the largest group of people outside a mental institution who talk back to the voices in their heads.</span><br data-dcnode-id="376"><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">Her second goal was achieved the day before her birthday in May, 1998 when Margaret Marbury of Harlequin Historicals offered to buy that second book, the Golden-Heart-Award winning novel that became THE WEDDING GAMBLE. Since then, she has gone on to write fourteen novels, three novellas and an on-line serial, along the way winning or finalling for historical awards from The Golden Quill, the National Reader’s Choice, Romantic Times, and All About Romance’s Favorite Book of the Year. </span><br data-dcnode-id="373"><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">Julia now inhabits an English Georgian-style house she and her husband built in the East Texas countryside where, if she closes her eyes and ignores the summer thermometer, she can almost imagine she inhabits the landscape of "Pride and Prejudice." In between travelling to visit her three children (a naval officer son stationed in Washington, DC, a textiles and design major daughter who cheers for University of Texas at Austin, and a mechanical engineering major son also at UT Austin) keeping up with her science teacher husband and juggling a part-time day job as a high school French teacher, she pursues her first and dearest love--crafting stories.</span><br data-dcnode-id="370"><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node="">To relax, she enjoys watching movies, reading (historical fiction, mystery, suspense) and puttering about in the garden trying to kill off more weeds than flowers.</span></span><span data-dcnode-id="366" instrument_node="">
