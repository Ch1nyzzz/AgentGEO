</span><span data-dcnode-id="4165" id="freeText8943884319013442323" style="display:none"><span data-dcnode-id="4166" instrument_node="">In 1963, when traditional values are coming under attack, a young woman in her twenties, Venetia Flaxton, becomes disastrously involved with her best friend's father, the powerful, dynamic but ultimately mysterious Dean of Starbridge Cathedral. Yet, as a married man and a senior Churchman, Aysgarth has nothing to offer her but an admiration which spirals out of control into an obsessive love. As Aysgarth begins to take scandalous risks to further their friendship, pressures rise and the dangers multiply. Venetia finds herself trapped in a desperate web of love and lies from which it seems impossible to escape. Witty, compassionate and compelling, Scandalous Risks explores not only the reality of sin and the fantasy of sexual obsession, but the overpowering human need for redemption, love and lasting happiness.</span></span><span data-dcnode-id="4164" instrument_node="">

</span><span data-dcnode-id="3628" id="freeTextContainer7280491121864116488"><span data-dcnode-id="3629" instrument_node="">Short review: This is the fourth in the Church of England Series by Susan Howatch. These books could be read independently and/or out of order, but you will get a lot more out of the books if you read them all and in order. As I am writing this I have finished all six. Scandalous Risks is the only of the six narrated by a woman. It starts about 15 years after the end of Ultimate Prizes. Ultimate Prizes was about Neville and his desire to marry Dido, which did not turn out that well, but he did f</span></span><span data-dcnode-id="3627" instrument_node="">
</span><span data-dcnode-id="3614" id="freeText7280491121864116488" style="display:none"><span data-dcnode-id="3626" instrument_node="">Short review: This is the fourth in the Church of England Series by Susan Howatch. These books could be read independently and/or out of order, but you will get a lot more out of the books if you read them all and in order. As I am writing this I have finished all six. Scandalous Risks is the only of the six narrated by a woman. It starts about 15 years after the end of Ultimate Prizes. Ultimate Prizes was about Neville and his desire to marry Dido, which did not turn out that well, but he did find a semblance of purpose in his marriage and some stability in his faith and calling. But Neville did not stop drinking and did not stop taking the 'scandalous risks'. So in this book Venetia, a young socialite that is looking around for purpose and meaning and God happens to find Neville. He is one of the best friends of her father (and the father of one of her best friends.) But she starts to see him in a new way. They fall in love and have an affair. So this book is about the pain (and joys) of the affair.</span><br data-dcnode-id="3625"><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">If I had to quickly describe the focus of the series is it about how sin separates us from God and detracts from our ability to fulfill our calling as God intends. I have read that others thought this was one of the weaker books of the series. But I think it is more that this is the least hopeful book of the series. Because it does not end with redemption in the same way that the others do. Book five starts essentially right at the end of this book. But it did not bring this book to a satisfying conclusion yet either. My hope is that Venetia is still in the spin off series that starts with High Fliers. </span><br data-dcnode-id="3622"><br data-dcnode-id="3621"><span data-dcnode-id="3620" instrument_node="">My full review is on my blog at </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bookwi.se/scandalous-risks/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3619" instrument_node="">http://bookwi.se/scandalous-risks/</span></a><br data-dcnode-id="3617"><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">As with the other books in the series, while I liked them before, I liked them even more on the second reading</span></span><span data-dcnode-id="3613" instrument_node="">

</span><span data-dcnode-id="3493" id="freeTextContainer4964859625607868888"><span data-dcnode-id="3500" instrument_node="">The titles of the books make them sound like something just a shade below the tabloids. However, if you take into consideration the characters are all clergy and their families, friends, and associates, the extreme nature of the adjectives used will give you a better frame of reference. </span><br data-dcnode-id="3499"><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">The books are about learning to live as God would have us in the world He created as these particular churchmen view that world and their place in it. </span><br data-dcnode-id="3496"><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">The 'scandalous' risks seem tame by contemporary standards. T</span></span><span data-dcnode-id="3492" instrument_node="">
</span><span data-dcnode-id="3462" id="freeText4964859625607868888" style="display:none"><span data-dcnode-id="3491" instrument_node="">The titles of the books make them sound like something just a shade below the tabloids. However, if you take into consideration the characters are all clergy and their families, friends, and associates, the extreme nature of the adjectives used will give you a better frame of reference. </span><br data-dcnode-id="3490"><br data-dcnode-id="3489"><span data-dcnode-id="3488" instrument_node="">The books are about learning to live as God would have us in the world He created as these particular churchmen view that world and their place in it. </span><br data-dcnode-id="3487"><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">The 'scandalous' risks seem tame by contemporary standards. That they aren't to the characters is the redeeming nature of Howatch's writing. Actions are seen in light of the Gospel. However, in this particular book, the Dean's view of the central message of Love is at odds with his old nemesis, and now Bishop, Charles Ashworth.</span><br data-dcnode-id="3484"><br data-dcnode-id="3483"><span data-dcnode-id="3482" instrument_node="">It's 1963 and a popular book on theology has just been published called, </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1431652.Honest_to_God" rel="nofollow noopener" title="Honest to God by John A.T. Robinson"><span data-dcnode-id="3481" instrument_node="">Honest to God</span></a><span data-dcnode-id="3479" instrument_node=""> and it has set the C of E on its ears. Did St. Augustine real mean it when he wrote that we can love God and do what we will?</span><br data-dcnode-id="3478"><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">It's easy to hear Saint Augustine's remark as: "Love God and </span><i data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">do what you will</span></i><span data-dcnode-id="3473" instrument_node="">." </span><br data-dcnode-id="3472"><br data-dcnode-id="3471"><span data-dcnode-id="3470" instrument_node="">It's more appropriate to Augustine's original meaning to put the emphasis on the first two words: "</span><b data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Love God</span></b><span data-dcnode-id="3467" instrument_node=""> and do what you will." </span><br data-dcnode-id="3466"><br data-dcnode-id="3465"><span data-dcnode-id="3464" instrument_node="">Howatch gets it right in this story! Superb!</span><br data-dcnode-id="3463"></span><span data-dcnode-id="3461" instrument_node="">

</span><span data-dcnode-id="3371" id="freeTextContainer5178824246810090047"><span data-dcnode-id="3372" instrument_node="">"SCANDALOUS RISKS", the fourth novel in the Starbridge Series set in the English town of Starbridge, begins in 1988 with the reappearance there of Venetia Flaxton, a woman of aristocratic background, who had abruptly left town 25 years earlier. Venetia goes on to share with the reader her experiences of that pivotal and decisive year in her life: 1963. Then, aged 26, unsure of what she wanted to make of herself and increasingly restless living with her parents in their palatial residence, Veneti</span></span><span data-dcnode-id="3370" instrument_node="">
</span><span data-dcnode-id="3348" id="freeText5178824246810090047" style="display:none"><span data-dcnode-id="3369" instrument_node="">"SCANDALOUS RISKS", the fourth novel in the Starbridge Series set in the English town of Starbridge, begins in 1988 with the reappearance there of Venetia Flaxton, a woman of aristocratic background, who had abruptly left town 25 years earlier. Venetia goes on to share with the reader her experiences of that pivotal and decisive year in her life: 1963. Then, aged 26, unsure of what she wanted to make of herself and increasingly restless living with her parents in their palatial residence, Venetia --- who had always been headstrong, often locking horns in spirited debates with her atheistic, Victorian father, a member of the House of Lords -- had left home after leaving a job he had secured for her. It - a job working at Liberal Party headquarters - was a job that she absolutely loathed! Indeed, as Venetia boldly asserted to her father: 'I'm off to Starbridge to meditate on God and contemplate Eternity --- which is exactly what you ought to be doing at your age!'</span><br data-dcnode-id="3368"><br data-dcnode-id="3367"><span data-dcnode-id="3366" instrument_node="">Once situated in Starbridge (sharing temporary residence with Marina Markhampton, a popular "society lady" whose beauty few men could resist), Venetia set about remaking herself. She reintroduced herself to an old childhood friend, Primrose Aysgarth, and Primrose's father Dean Aysgarth, a high-ranking figure in the Church of England in his early 60s. Aysgarth, a kindly, avuncular man with a taste for good whisky and modern art, was representative of the rising liberal wing of the Church of England at that time, which was challenging the traditional strictures and practices stoutly defended by the "old order" (represented by Bishop Charles Ashworth, a contemporary of Aysgarth, who previously made an appearance about 20 years earlier in the third novel in the Starbridge Series: Ultimate Prizes). </span><br data-dcnode-id="3365"><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">Starbridge, while on the surface an old town famed for its great medieval cathedral, is seething with religious, political, and sexual intrigues. Venetia herself becomes caught up in one of these intrigues when she falls deeply in love with Aysgarth (whom she referred to affectionally as "Mr Dean"), who gladly reciprocates. For Aysgarth is in an unhappy marriage with Dido, a neurotic yet canny woman. So both of them have to take considerable pains to keep their relationship discreet. For if even a hint of it became known in Starbridge, both of them would face utter ruin. </span><br data-dcnode-id="3362"><br data-dcnode-id="3361"><span data-dcnode-id="3360" instrument_node="">Aysgarth and Venetia found places a fair distance from the heart of Starbridge to meet once a week, where they shared their burning passion for each other. They also, when time and opportunity allowed, wrote love letters to each other, which I, as a person who grew up long before the advent of e-mail, enjoyed reading because they were so eloquent and heartfelt. </span><br data-dcnode-id="3359"><br data-dcnode-id="3358"><br data-dcnode-id="3357"><span data-dcnode-id="3356" instrument_node="">Yet the dream-like world in which both Aysgarth and Venetia sustained their love will find itself faced with challenges neither can ignore. </span><br data-dcnode-id="3355"><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">Any reader who loves a novel with vividly realized characters and a strong, compelling storyline, will savor "SCANDALOUS RISKS." So, sit back, relax with a juice or drink, and you'll soon be fully absorbed in this rich and dramatic tale of lives transformed amid crisis and controversy. </span><br data-dcnode-id="3352"><br data-dcnode-id="3351"><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node=""> </span></span><span data-dcnode-id="3347" instrument_node="">

</span><span data-dcnode-id="2610" id="freeText7997322397519512178" style="display:none"><span data-dcnode-id="2611" instrument_node="">This is fourth in Howatch's series about the Church of England. Or rather, about the people who make up the Church of England. Venetia, the narrator, is a young socialite of the 1960s trying to find meaning, purpose and even God. She finds, instead, Neville (who featured in the previous book), dean of the Cathedral. Neville is much older than Venetia but none-the-less becomes exceedingly attractive to her as she does to him. He's a married man but that does not stop him from taking the scandalous risk and becoming quite emmeshed with Venetia. This book has much to say about the risks we take and how we fool ourselves into believing such risks to be necessary and even redemptive. I was thrilled to have a female protagonist in this book who, honestly, makes a case for female clergy. There was much to reflect on and Howatch does not disappoint in her command of theology and church history. I look forward to Book 5!!!</span></span><span data-dcnode-id="2609" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2472" title="liked it"><span class="staticStar p10" data-dcnode-id="2477" size="15x15"><span data-dcnode-id="2478" instrument_node="">liked it</span></span><span class="staticStar p10" data-dcnode-id="2476" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2475" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2474" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2473" size="15x15"></span></span><span data-dcnode-id="2471" instrument_node="">

</span><span data-dcnode-id="2454" id="freeTextContainer8853475472717161367"><span data-dcnode-id="2460" instrument_node="">My 2nd time reading, but this time within the context of the series:</span><br data-dcnode-id="2459"><span data-dcnode-id="2458" instrument_node="">Such a fascinating look at the way we can lie to ourselves. </span><br data-dcnode-id="2457"><br data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node="">I really didn't care for Neville Aysgarth in the previous book, Ultimate Prizes, and I REALLY didn't like him in this one. Ultimate Prizes was from his POV, so even if I didn't like him, I could see his perspective. This book is told from Venetia's POV and Aysgarth's lying to himself hurts everyone around him. Venetia's perspective doesn't really make much sense either,</span></span><span data-dcnode-id="2453" instrument_node="">
</span><span data-dcnode-id="2411" id="freeText8853475472717161367" style="display:none"><span data-dcnode-id="2452" instrument_node="">My 2nd time reading, but this time within the context of the series:</span><br data-dcnode-id="2451"><span data-dcnode-id="2450" instrument_node="">Such a fascinating look at the way we can lie to ourselves. </span><br data-dcnode-id="2449"><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">I really didn't care for Neville Aysgarth in the previous book, Ultimate Prizes, and I REALLY didn't like him in this one. Ultimate Prizes was from his POV, so even if I didn't like him, I could see his perspective. This book is told from Venetia's POV and Aysgarth's lying to himself hurts everyone around him. Venetia's perspective doesn't really make much sense either, but you can tell how sucked into the illicit relationship she is.</span><br data-dcnode-id="2446"><br data-dcnode-id="2445"><span data-dcnode-id="2444" instrument_node="">What is so interesting about this series is how lovely the peripheral figures seem, and how horrid the main characters are. And in the next book we'll see that the peripheral figures really have a lot of their own faults.</span><br data-dcnode-id="2443"><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">This is the series I hate to love. I don't really like many of the characters, but the look into motivations at relationships are fascinating. </span><br data-dcnode-id="2440"><br data-dcnode-id="2439"><span data-dcnode-id="2438" instrument_node="">From my review on Bookcrossing: December 05, 2005</span><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node="">Intense!</span><br data-dcnode-id="2435"><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node="">Some random thoughts:</span><br data-dcnode-id="2432"><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node="">From the moment I began reading this book, I doubted that I would finish it. But, for lack of something better to do, I plugged away at it...and then I was hooked. The characters suddenly emerged and I found myself fascinated by their spiraling descent downwards as they continued to take scandalous risks. I became frustrated as they became caught in a trap they could not escape.</span><br data-dcnode-id="2429"><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node="">Although there is one character, through her conversations and letters, I got a fascinating look at the perceptions held by each character for the others in the book. Each character has its own strengths and weaknesses; though I was sad sometimes to learn of the weaknesses of characters I admired.</span><br data-dcnode-id="2426"><br data-dcnode-id="2425"><span data-dcnode-id="2424" instrument_node="">Though there is despair in this book, there can be redemption.</span><br data-dcnode-id="2423"><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">There's a lot of theology in this book. Half of the book is a discussion of a theological book that was written in the 60s, when this book was set.</span><br data-dcnode-id="2420"><br data-dcnode-id="2419"><span data-dcnode-id="2418" instrument_node="">How is it that everyone in this book is so smart and clever and witty?</span><br data-dcnode-id="2417"><br data-dcnode-id="2416"><span data-dcnode-id="2415" instrument_node="">An excellent book. However, I did not rate it *too* highly because I doubt I would reread such an emotionally exhausting book.</span><br data-dcnode-id="2414"><br data-dcnode-id="2413"><span data-dcnode-id="2412" instrument_node="">(One question though: What in the world is Pre-Raphealite hair? And how does every single character in this book spot it from a mile away?)</span></span><span data-dcnode-id="2410" instrument_node="">

</span><span data-dcnode-id="2311" id="freeTextContainer1004433835681960109"><span data-dcnode-id="2315" instrument_node="">This is the fourth book in the Starbridge series and is narrated by Venetia Flaxton, a young woman of intellect and means but no direction, and centers around her strange affair in 1963 with 61-year-old Neville Aysgarth, dean of Starbridge Cathedral.</span><br data-dcnode-id="2314"><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">This book had me grinding my teeth in frustration with Neville. Everything Jon did in the previous book to help him get back on a correct spiritual path seems to go down the drain with his obsession with Venetia. Marrying Dido was the worse possible </span></span><span data-dcnode-id="2310" instrument_node="">
</span><span data-dcnode-id="2297" id="freeText1004433835681960109" style="display:none"><span data-dcnode-id="2309" instrument_node="">This is the fourth book in the Starbridge series and is narrated by Venetia Flaxton, a young woman of intellect and means but no direction, and centers around her strange affair in 1963 with 61-year-old Neville Aysgarth, dean of Starbridge Cathedral.</span><br data-dcnode-id="2308"><br data-dcnode-id="2307"><span data-dcnode-id="2306" instrument_node="">This book had me grinding my teeth in frustration with Neville. Everything Jon did in the previous book to help him get back on a correct spiritual path seems to go down the drain with his obsession with Venetia. Marrying Dido was the worse possible thing he could have done both for himself personally and also for his children. Because he doesn't love her but feels guilty for marrying her he overcompensates by doting on her while suppresses his own needs and desires. This conflict ends up being a recipe for a disaster for not only himself and his family but has disastrous consequences for Venetia as well.</span><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node="">To compound his problems Neville also indulges in high risk behaviours managing the cathedral. Much is made in this book about his alcoholism but personally I thought his addiction to adrenalin and to living on the edge of disaster was a bigger problem.</span><br data-dcnode-id="2303"><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">In the background of all this drama we see the return of Charles and Lyle Ashworth, the main characters in Glittering Images. Charles is now the Bishop of Starbridge and represents the conservative wing of the CoE, a position which puts him into conflict with Neville over the cathedral management.</span><br data-dcnode-id="2300"><br data-dcnode-id="2299"><span data-dcnode-id="2298" instrument_node="">Meanwhile, the offspring of the older characters are romping though the 1960's putting additional grey in their parents hair and courting disasters of their own.</span></span><span data-dcnode-id="2296" instrument_node="">

</span><span data-dcnode-id="2127" id="freeText1986608750793339332" style="display:none"><span data-dcnode-id="2128" instrument_node="">I remembered not having liked this book as well as others in the series when I read it before, and for a large part of the book I wondered why that had been, as it seemed very engrossing. I don't want to think it is because this is the only one narrated by a woman. It may be because, unlike the others (at least the first three which I have just reread), it does not have a significant portion devoted to the person in trouble finding the way back to God. There is just the barest hint at the end, but no more. What I like in the other books is not just the discussion of theology and how it relates to our lives, but how it not only shows the Christian perspective on how we mess up our lives but also the process of redemption, not just the initial repentance but the slow and difficult changes in attitudes and habits.</span></span><span data-dcnode-id="2126" instrument_node="">

</span><span data-dcnode-id="2042" id="freeText15393810331943826132" style="display:none"><span data-dcnode-id="2046" instrument_node="">I went back and forth on this a lot. It's too long, too slow, it gets a little confusing because it's so slow I didn't always pay attention. The author chose to call two important characters Aysgarth and Ashworth and that annoyed me.</span><br data-dcnode-id="2045"><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node="">But the heart of the book concerns moral choices and moral risks and a whole lotta crap about philosophical moral hair-splitting and even trends in belief. I liked that, I liked looking at slow dissections of spiritual discourse; don't see that a lot. As for the heroine--she was okay, not really someone I could identify with, and for me the conclusion was a little unconvincing. I don't know if I would ever go with the rest of the books in this group; probably not. But I don't regret spending time with this one.</span></span><span data-dcnode-id="2041" instrument_node="">

</span><span data-dcnode-id="1788" id="freeTextContainer12204961194826690069"><span data-dcnode-id="1792" instrument_node="">Very scandalous, indeed! This, the 4th in the "Church of England" series, is a rather gripping story, this time emphasizing the certain and devastating effects of sin, whether the sin is acknowledged as sin or not. It also interweaves, among other things, a debate involving liberal and conservative theologies, clearly showing the inadequacies and impossibility of dealing with sin without true repentance. Justification by rationalization just doesn't cut it! A rather tragic story overall.</span><br data-dcnode-id="1791"><br data-dcnode-id="1790"><span data-dcnode-id="1789" instrument_node="">Some of </span></span><span data-dcnode-id="1787" instrument_node="">
</span><span data-dcnode-id="1766" id="freeText12204961194826690069" style="display:none"><span data-dcnode-id="1786" instrument_node="">Very scandalous, indeed! This, the 4th in the "Church of England" series, is a rather gripping story, this time emphasizing the certain and devastating effects of sin, whether the sin is acknowledged as sin or not. It also interweaves, among other things, a debate involving liberal and conservative theologies, clearly showing the inadequacies and impossibility of dealing with sin without true repentance. Justification by rationalization just doesn't cut it! A rather tragic story overall.</span><br data-dcnode-id="1785"><br data-dcnode-id="1784"><span data-dcnode-id="1783" instrument_node="">Some of the memorable characters . . .:</span><br data-dcnode-id="1782"><br data-dcnode-id="1781"><span data-dcnode-id="1780" instrument_node="">Neville Aysgarth [a.k.a. the deluded one]</span><br data-dcnode-id="1779"><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">"Adultery is prima facie wrong. That we all know. But if, for example, a married man found himself in a truly loving relationship with a woman who was not his wife, there would be no adultery because he would love that woman enough to abstain from any behavior which was morally wrong."</span><br data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">Lyle Ashworth</span><br data-dcnode-id="1774"><br data-dcnode-id="1773"><span data-dcnode-id="1772" instrument_node="">" I know it's quite wrong for a bishop's wife to be so cynical, but at least I'm being entirely honest when I say that in my opinion a man in the grip of a grand passion can always work out a way to circumvent his moral beliefs. He'd still hold those particular beliefs, of course, but he'd decide his case wasn't covered by the rules. There's nothing like a grand passion for encouraging self-deception on an epic scale."</span><br data-dcnode-id="1771"><span data-dcnode-id="1770" instrument_node="">Venetia Flaxton</span><br data-dcnode-id="1769"><br data-dcnode-id="1768"><span data-dcnode-id="1767" instrument_node="">"And as she talked on, telling him about her plans, it suddenly dawned on me not only that she was in love with him, but that the unsupervised stay in a beautiful house, the placing of herself against the ravishing backdrop of the Cathedral, the exact nature of the social event which would inevitably lure him from Oxford--all had been planned long before she left London. It seemed I had met yet another slave to a one-sided grand passion. No wonder we had discovered we were soul-mates."</span></span><span data-dcnode-id="1765" instrument_node="">

</span><span data-dcnode-id="1691" id="freeText4970419062667077009" style="display:none"><span data-dcnode-id="1692" instrument_node="">This is book #4 in Susan Howatch's 'Starbridge Series'. It is narrated by Venetia Flaxton who made a quick appearance as a young child in Book #3, 'Ultimate Prizes'--which tells the story of Neville Aysgarth. Fast forward 20 years and the action takes place in the early 1960s when Venetia, now a young adult, falls in love with Aysgarth, a married clerical and father of her best friend. It is a complicated story, but that is what Howatch does best. Just when you think you might lose interest, she throws you a curve and you are once again addicted to her storytelling. Characters from the previous three books also make their appearances and it is a great treat to see where they have ended up. When I started the series, I didn't think I was going to like it, but each book is better than the last one. In Book #4, we are introduced to Nick Darrow who is the son of Jonathan Darrow, a mystic. Nick seems to have inherited his father's psychic abilities, but he remains in the background as the affair of Venetia and Neville unfolds despite Nick's warnings. Book #5 tells Nick's story and I can't wait to dig in! </span></span><span data-dcnode-id="1690" instrument_node="">

</span><span data-dcnode-id="1616" id="freeText13944579921277825913" style="display:none"><span data-dcnode-id="1617" instrument_node="">All of Susan Howatch books are in the end potboilers featuring Christians and academics losing themselves then coming back for redemption. This one and "The Heartbreaker" are perhaps the saddest of them all. The idea of sin has been re-framed for the times and in many cases moved away from personal morality and accountability to a higher power. Howatch of course isn't buying. Where she seems very contemporary is in her portrait of a gifted and academic woman who is condemned to life as an upper class twit surrounded by intellectual men. When she is seduced by one who really should know better she is drawn into the most intense experience of her life. Venetia Flaxton is one of the most complete and well drawn of Howatch's characters and perhaps the reason why the St. Benets series focused more on women. Her tale in some ways is the most moralistic told my Howatch (and that is saying a lot) and I suspect most reflects her potential fear: "that could have been me" Wonderful work.</span></span><span data-dcnode-id="1615" instrument_node="">
