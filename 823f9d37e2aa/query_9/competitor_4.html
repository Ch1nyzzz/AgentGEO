 other figure from ancient history.</span></span></p><span data-dcnode-id="2249" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2246" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2247" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2248" instrument_node="">There’s an abundance of corroborating archaeological evidence; a great amount of the people, cities, places, etc. of Jesus’ life and ministry are established in the archaeological record. I’ll summarize a lot of that at the end of this answer.</span></span></p><span data-dcnode-id="2245" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2242" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2243" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2244" instrument_node="">But when it comes to Jesus specifically, the best proof we have is the Bible.</span></span></p><span data-dcnode-id="2241" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2238" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2239" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2240" instrument_node="">Many people will object here. They will deny that the Bible can ever be used as proof of Jesus.</span></span></p><span data-dcnode-id="2237" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2234" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2235" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2236" instrument_node="">But this question doesn’t get to make that objection. You asked for archaeological evidence of Jesus’ existence, and the Bible fits the bill perfectly.</span></span></p><span data-dcnode-id="2233" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2230" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2231" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2232" instrument_node="">This wasn’t always the case. Back when the King James Version was first translated from the Greek (roughly 400 years ago in 1611 A.D/C.E.), they had reference to perhaps a dozen Greek manuscripts of the New Testament. None of these were particularly old; they were removed from the time of Jesus by many hundreds, if not a thousand, years.</span></span></p><span data-dcnode-id="2229" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2226" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2227" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2228" instrument_node="">In such a situation, you could imagine all sorts of changes occurring in the text between the time it was first written to the time it was translated.</span></span></p><span data-dcnode-id="2225" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2222" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2223" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2224" instrument_node="">But then came archaeology.</span></span></p><span data-dcnode-id="2221" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2218" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2219" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2220" instrument_node="">In the last 150 years, archaeologists have dug up thousands of ancient biblical manuscripts. Today we have over 10,000 manuscripts of the New Testament in the original languages, stretching back in time to the early 2nd and late 1st centuries.</span></span></p><span data-dcnode-id="2217" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2212" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2215" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2216" instrument_node="">In all of this, </span></span><span data-dcnode-id="2213" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2214" instrument_node="">there is no evidence of the content changing over time.</span></span></p><span data-dcnode-id="2211" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2208" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2209" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2210" instrument_node="">There are minor scribal issues, of course. There will always be minor copy issues when human agents perform the copying. But given the abundance of manuscripts, we can easily spot and correct these changes.</span></span></p><span data-dcnode-id="2207" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2200" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2205" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2206" instrument_node="">The evidence is so strong that even Bart Ehrman, one of the staunchest skeptics around, agrees. Out of the nearly 8,000 verses in the New Testament, Ehrman might quibble on perhaps a dozen, and none of these affect the teaching or beliefs of Christianity. They’re all exceedingly minor issues. (For a complete interview with Ehrman on this subject, consult the appendix of Ehrman’s book </span></span><span data-dcnode-id="2203" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2204" instrument_node="">Misquoting Jesus, </span></span><span data-dcnode-id="2201" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2202" instrument_node="">which establishes this information and much more).</span></span></p><span data-dcnode-id="2199" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2196" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2197" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2198" instrument_node="">What does all this have to do with archaeological proof for Jesus?</span></span></p><span data-dcnode-id="2195" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2192" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2193" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2194" instrument_node="">Everything.</span></span></p><span data-dcnode-id="2191" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2188" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2189" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2190" instrument_node="">Consider the impact of these three facts, all of which archaeology has established for the New Testament:</span></span></p><ul class="q-box" data-dcnode-id="2178" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2185" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2186" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2187" instrument_node="">It was written during the lifetimes of the eye-witnesses to Jesus.</span></span></li><li class="q-relative" data-dcnode-id="2182" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2183" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2184" instrument_node="">It was published in the lands where the events happened, while tens of thousands of eye-witnesses could put the lie to anything in them that wasn’t accurate.</span></span></li><li class="q-relative" data-dcnode-id="2179" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2180" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2181" instrument_node="">It was not changed over time; the content of the New Testament today is the same as when it was first written.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2175" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2176" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2177" instrument_node="">All this happened during a time when Jesus’ enemies held all the power and tried to destroy Christianity in any way possible. And yet they never charged the Bible with any kind of inaccuracy, nor did they attempt to argue that Jesus didn’t exist.</span></span></p><span data-dcnode-id="2174" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2171" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2172" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2173" instrument_node="">Robert Van Voorst searched the first few centuries A.D./C.E and concluded clearly:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="2166" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2168" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2169" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2170" instrument_node="">“… [N]o pagans and Jews who opposed Christianity denied Jesus’ historicity or even questioned it.”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="2167" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2159" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2164" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2165" instrument_node="">(Van Voorst, </span></span><span data-dcnode-id="2162" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2163" instrument_node="">Jesus Outside</span></span><span data-dcnode-id="2160" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2161" instrument_node="">, p. 15)</span></span></p><span data-dcnode-id="2158" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2155" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2156" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2157" instrument_node="">He elaborates:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="2146" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2148" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2153" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2154" instrument_node="">“… [I]f anyone in the ancient world had a reason to dislike the Christian faith, it was the rabbis. To argue successfully that Jesus never existed but was a creation of early Christians would have been the most effective polemic against Christianity … [Yet] all Jewish sources treated Jesus as a fully historical person … </span></span><span data-dcnode-id="2151" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2152" instrument_node="">[T]he rabbis … used the real events of Jesus’ life against him</span></span><span data-dcnode-id="2149" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2150" instrument_node="">”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="2147" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2139" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2144" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2145" instrument_node="">(Van Voorst, </span></span><span data-dcnode-id="2142" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2143" instrument_node="">Jesus Outside,</span></span><span data-dcnode-id="2140" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2141" instrument_node=""> pp. 133–134, emphasis added)</span></span></p><span data-dcnode-id="2138" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2135" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2136" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2137" instrument_node="">Jesus’ enemies unintentionally did Him a great service: they corroborated the accounts written about Him. They used the real events of Jesus’ life against Him, which you only do when you cannot deny that those events happened.</span></span></p><span data-dcnode-id="2134" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2131" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2132" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2133" instrument_node="">To bring all this together:</span></span></p><span data-dcnode-id="2130" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2127" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2128" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2129" instrument_node="">Every hint of archaeology and history confirms what the New Testament says about Jesus.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="2126" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2123" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2124" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2125" instrument_node="">To further establish the reliability of the New Testament accounts of Jesus, we can look to all of the background details. Do the places really exist as they’re described? Did the people Jesus interacted with truly exist? Did they occupy the roles the Bible says they did? Did the culture behave as the Bible describes?</span></span></p><span data-dcnode-id="2122" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2117" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2120" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2121" instrument_node="">In all these cases, archaeology establishes a resounding </span></span><span data-dcnode-id="2118" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2119" instrument_node="">YES!</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1932" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2096" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2115" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2116" instrument_node="">On the </span></span><span class="q-inline" data-dcnode-id="2108" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/sea-of-galilee-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2114" instrument_node="">Sea of Galilee</span></a><span class="q-inlineBlock" data-dcnode-id="2109" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2110"><svg data-dcnode-id="2111" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2112" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2106" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2107" instrument_node="">, Christ’s childhood town of Nazareth is still active today. In addition, ancient harbors matching the biblical record have been located in recent drought cycles. In fact, a first century </span></span><span class="q-inline" data-dcnode-id="2099" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/galilee-boat-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2105" instrument_node="">Galilean fishing boat</span></a><span class="q-inlineBlock" data-dcnode-id="2100" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2101"><svg data-dcnode-id="2102" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2103" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2097" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2098" instrument_node=""> was recently unearthed from the mud and preserved. Although we have no idea who the boat belonged to, it matches the biblical record for the vessels used by Christ’s disciples.</span></span></p><span data-dcnode-id="2095" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2067" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="2088" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/capernaum-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2094" instrument_node="">Capernaum</span></a><span class="q-inlineBlock" data-dcnode-id="2089" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2090"><svg data-dcnode-id="2091" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2092" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2086" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2087" instrument_node="">, a town often visited by Jesus, is widely excavated and protected. Specific sites of interest include the </span></span><span class="q-inline" data-dcnode-id="2079" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/synagogue-at-capernaum-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2085" instrument_node="">synagogue at Capernaum</span></a><span class="q-inlineBlock" data-dcnode-id="2080" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2081"><svg data-dcnode-id="2082" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2083" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2077" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2078" instrument_node=""> where Jesus cured a man with an unclean spirit and delivered the sermon on the bread of life, and the </span></span><span class="q-inline" data-dcnode-id="2070" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/house-of-peter-at-capernaum-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2076" instrument_node="">house of Peter</span></a><span class="q-inlineBlock" data-dcnode-id="2071" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2072"><svg data-dcnode-id="2073" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2074" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2068" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2069" instrument_node=""> where Jesus healed Peter's mother-in-law and others.</span></span></p><span data-dcnode-id="2066" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2036" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2064" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2065" instrument_node="">Other archaeological sites involved in Christ’s ministry include </span></span><span class="q-inline" data-dcnode-id="2057" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/chorazin-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2063" instrument_node="">Chorazin</span></a><span class="q-inlineBlock" data-dcnode-id="2058" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2059"><svg data-dcnode-id="2060" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2061" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2055" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2056" instrument_node=""> (where Jesus taught in the synagogue), Kursi (the swine miracle), </span></span><span class="q-inline" data-dcnode-id="2048" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/tabgha-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2054" instrument_node="">Tabgha</span></a><span class="q-inlineBlock" data-dcnode-id="2049" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2050"><svg data-dcnode-id="2051" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2052" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2046" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2047" instrument_node=""> (loaves and fishes), the Mount of Beatitudes (Sermon on the Mount), </span></span><span class="q-inline" data-dcnode-id="2039" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/caesarea-philippi-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2045" instrument_node="">Caesarea Philippi</span></a><span class="q-inlineBlock" data-dcnode-id="2040" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2041"><svg data-dcnode-id="2042" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2043" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2037" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2038" instrument_node=""> (Peter's confession), and Jacob's well where Jesus spoke to the Samaritan woman.</span></span></p><span data-dcnode-id="2035" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2005" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2034" instrument_node="">In Jerusalem, we still see the foundations for the Jewish </span></span><span class="q-inline" data-dcnode-id="2026" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/temple-mount-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2032" instrument_node="">Temple Mount</span></a><span class="q-inlineBlock" data-dcnode-id="2027" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2028"><svg data-dcnode-id="2029" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2030" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2024" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2025" instrument_node=""> built by Herod the Great. Other remarkable sites in Jerusalem include the "Southern Steps" where Jesus and his followers entered the Temple, the </span></span><span class="q-inline" data-dcnode-id="2017" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/pool-of-bethesda-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2023" instrument_node="">Pool of Bethesda</span></a><span class="q-inlineBlock" data-dcnode-id="2018" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2019"><svg data-dcnode-id="2020" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2021" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2015" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2016" instrument_node=""> where Jesus healed a crippled man, and the recently uncovered </span></span><span class="q-inline" data-dcnode-id="2008" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/pool-of-siloam-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2014" instrument_node="">Pool of Siloam</span></a><span class="q-inlineBlock" data-dcnode-id="2009" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2010"><svg data-dcnode-id="2011" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2012" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2006" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2007" instrument_node=""> where Jesus healed a blind man.</span></span></p><span data-dcnode-id="2004" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1974" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2002" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2003" instrument_node="">The evidence for Jesus in the events leading to his crucifixion starts across the </span></span><span class="q-inline" data-dcnode-id="1995" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/kidron-valley-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="2001" instrument_node="">Kidron Valley</span></a><span class="q-inlineBlock" data-dcnode-id="1996" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1997"><svg data-dcnode-id="1998" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1999" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1993" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1994" instrument_node=""> from Jerusalem at the </span></span><span class="q-inline" data-dcnode-id="1986" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/mount-of-olives-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1992" instrument_node="">Mount of Olives</span></a><span class="q-inlineBlock" data-dcnode-id="1987" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1988"><svg data-dcnode-id="1989" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1990" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1985" instrument_node="">. There, we can walk through ancient olive trees to the </span></span><span class="q-inline" data-dcnode-id="1977" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/garden-of-gethsemane-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1983" instrument_node="">Garden of Gethsemane</span></a><span class="q-inlineBlock" data-dcnode-id="1978" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1979"><svg data-dcnode-id="1980" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1981" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1975" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1976" instrument_node=""> where Jesus prayed before his capture. Then, we can look back across the Kidron Valley to the Golden Gate where Christ entered Jerusalem for his trial, scourging and death.</span></span></p><span data-dcnode-id="1973" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1934" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1972" instrument_node="">Elsewhere, we find more evidence for Jesus and the leaders presiding over his trial and crucifixion, including an inscription that mentions the Roman procurator of the time, </span></span><span class="q-inline" data-dcnode-id="1964" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/pontius-pilate-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1970" instrument_node="">Pontius Pilate</span></a><span class="q-inlineBlock" data-dcnode-id="1965" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1966"><svg data-dcnode-id="1967" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1968" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1962" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1963" instrument_node="">, and the actual bones of the Jewish High Priest of the time, </span></span><span class="q-inline" data-dcnode-id="1955" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/caiaphas-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1961" instrument_node="">Caiaphas</span></a><span class="q-inlineBlock" data-dcnode-id="1956" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1957"><svg data-dcnode-id="1958" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1959" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1953" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1954" instrument_node="">, preserved in an ornate ossuary (bone box). The evidence continues throughout Jerusalem where we can stand in the judgment place of Pontius Pilate called Gabbatha, and then walk the Via Dolorosa where Christ carried his own cross to Calvary. The huge </span></span><span class="q-inline" data-dcnode-id="1946" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/church-of-the-holy-sepulchre-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1952" instrument_node="">Church of the Holy Sepulchre</span></a><span class="q-inlineBlock" data-dcnode-id="1947" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1948"><svg data-dcnode-id="1949" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1950" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1944" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1945" instrument_node=""> is considered by most scholars to be a reliable historical site covering the locations of the crucifixion and burial of Christ. Incredibly, a </span></span><span class="q-inline" data-dcnode-id="1937" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/crucifixion-evidence-faq.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1943" instrument_node="">2,000-year-old heel bone pierced by an iron nail</span></a><span class="q-inlineBlock" data-dcnode-id="1938" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1939"><svg data-dcnode-id="1940" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1941" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1935" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1936" instrument_node=""> was recently discovered in a Jerusalem graveyard that sheds more light on the practice of crucifixion by the first century Romans.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1933" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1920" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1930" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1931" instrument_node="">(</span></span><span class="q-inline" data-dcnode-id="1923" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allaboutarchaeology.org/evidence-for-jesus.htm" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.allaboutarchaeology.org"><span data-dcnode-id="1929" instrument_node="">https://www.allaboutarchaeology.org/evidence-for-jesus.htm</span></a><span class="q-inlineBlock" data-dcnode-id="1924" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1925"><svg data-dcnode-id="1926" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1927" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1922" instrument_node="">)</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1916" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1917"><div class="q-box unzoomed" data-dcnode-id="1918" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1919" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-0611b07f08f633ef8746e1daf3d8bebd-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1913" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1914" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1915" instrument_node="">Jesus’ hometown of Nazareth in 1st century Israel, from archaeologyillustrated.com</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="1912" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1909" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1910" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1911" instrument_node="">I’ll throw in one more tidbit, because this one’s just fun:</span></span></p><span data-dcnode-id="1908" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1905" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1907" instrument_node="">In 64 A.D./C.E., Rome suffered a tragic fire. Nero blamed it on the Christians, to try to divert blame away from himself as the culprit.</span></span></p><span data-dcnode-id="1904" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1901" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1902" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1903" instrument_node="">Nero hated Christianity. But his hatred ended up serving Christianity. It provides a solid touchstone, historically.</span></span></p><span data-dcnode-id="1900" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1897" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1898" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1899" instrument_node="">Because of Nero, we know that within a mere 30 years after Jesus’ death and Resurrection, Christianity had spread so far so rapidly that it had a sizable and public presence in Rome.</span></span></p><span data-dcnode-id="1896" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1893" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1894" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1895" instrument_node="">Further, the historian who recorded the events, Tacitus, was one of the finest historians Rome ever produced. In his record, he corroborates several of the major facts about Jesus. He also hated Christianity, yet his words still ended up serving the cause of Christ:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1880" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1882" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1892" instrument_node="">[N]either human effort nor the emperor’s generosity nor the placating of the gods ended the scandalous belief that the fire had been ordered [by Nero]. Therefore, to put down the rumor, Nero substituted as culprits and punished in the most unusual ways those hated for their shameful acts … whom the crowd called “Chrestians.” </span></span><span data-dcnode-id="1889" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1890" instrument_node="">The founder of this name, Christ [</span></span><span data-dcnode-id="1887" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1888" instrument_node="">Christus </span></span><span data-dcnode-id="1885" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1886" instrument_node="">in Latin], had been executed in the reign of Tiberius by the procurator Pontius Pilate … </span></span><span data-dcnode-id="1883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1884" instrument_node="">Suppressed for a time, the deadly superstition erupted again not only in Judea, the origin of this evil, but also in the city [Rome], where all things horrible and shameful from everywhere come together and become popular.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1881" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1873" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1878" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1879" instrument_node="">(Tacitus, </span></span><span data-dcnode-id="1876" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1877" instrument_node="">Annals</span></span><span data-dcnode-id="1874" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1875" instrument_node="">, XV)</span></span></p><span data-dcnode-id="1872" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1869" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1870" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1871" instrument_node="">Touch points like these are critical because they destroy a great deal of silly arguments about Jesus. Some people erroneously claim that Paul invented the stories of Jesus, or that Paul took a humble peasant sage named Jesus and greatly exaggerated the claims about Him.</span></span></p><span data-dcnode-id="1868" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1865" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1866" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1867" instrument_node="">But the 60’s A.D./C.E. are when Paul wrote. By this time Christianity had already exploded in Judea and all over the Roman Empire.</span></span></p><span data-dcnode-id="1864" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1861" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1862" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1863" instrument_node="">It’s simply impossible that Paul invented the stories about Jesus, because by the time he wrote Christianity had already begun saturating the entire Empire.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="1860" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1857" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1858" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1859" instrument_node="">Much more could be said, but to draw it to a conclusion:</span></span></p><span data-dcnode-id="1856" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1853" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1854" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1855" instrument_node="">The more we dig up, the more confirmation we find for everything the Bible says about Jesus.</span></span></p><span data-dcnode-id="1852" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1849" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1850" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1851" instrument_node="">Or to state it another way:</span></span></p><span data-dcnode-id="1848" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1845" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1846" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1847" instrument_node="">The more we dig up, it makes less and less sense to imagine that Jesus didn’t exist, or that the stories about Him were wildly exaggerated. The evidence for such a thing simply doesn’t exist.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1763" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1764" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1765" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1779" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1811" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1812" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1822" style="box-sizing: border e; direction: ltr;"><span class="q-inline" data-dcnode-id="1614" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ospreypublishing.com/store/osprey-games/osprey-wargames/broken-legions" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="ospreypublishing.com"><span data-dcnode-id="1620" instrument_node="">To quote the Osprey website</span></a><span class="q-inlineBlock" data-dcnode-id="1615" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1616"><svg data-dcnode-id="1617" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1618" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1612" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1613" instrument_node="">:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1600" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1602" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1607" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1610" instrument_node="">The Roman Empire rules the civilised world with an iron fist, seemingly all-powerful and limitless. And yet, the power of Rome is secured not by its mighty legions, but by small bands of warriors and agents fighting a secret war. Tasked by the Emperor to explore ancient temples, forgotten labyrinths and beast-haunted caverns, they seek out artefacts hidden by the gods themselves, hunt creatures of myth and face enemies that would use dark magic against the empire.</span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node=""></span></span><span data-dcnode-id="1605" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1606" instrument_node="">Broken Legions</span></span><span data-dcnode-id="1603" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1604" instrument_node=""> is a set of fantasy skirmish rules for a war unknown to history, fought in the shadows of the Roman Empire. Various factions recruit small warbands to fight in tight, scenario-driven battles that could secure the mystical power to defend - or crush - Rome. A points system allows factions to easily build a warband, and mercenaries and free agents may also be hired to bolster a force. Heroes and leaders may possess a range of skills, traits and magical abilities, but a henchman's blade can be just as sharp, and a campaign can see even the lowliest henchman become a hero of renown.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1601" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1597" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1598" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1599" instrument_node="">You could also say that Asterix is historical fantasy. It’s set in Roman Gaul, but with some differences from reality.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1593" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1594"><div class="q-box unzoomed" data-dcnode-id="1595" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-f2f6208e161b426d7e8244136f95f5bf-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1585" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="1586" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asterixstrips.blogspot.com/2009/06/asterix-and-obelix-all-at-sea-page-31.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="asterixstrips.blogspot.com"><span data-dcnode-id="1592" instrument_node="">Asterix and Obelix All at Sea - [Page 31]</span></a><span class="q-inlineBlock" data-dcnode-id="1587" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16p  normal;"><span data-dcnode-id="944" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="938" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="939"><svg data-dcnode-id="940" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="941" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="893" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="894" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="895"><span class="q-box qu-userSelect--text" data-dcnode-id="896" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="925" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="926" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="927" instrument_node="">No one can be completely objective. We all have opinions, beliefs, bias. They play into how we regard and present a subject. However, there are steps to enhance objectivity.</span></span></p><span data-dcnode-id="924" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="921" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="922" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="923" instrument_node="">Truth. Seek it – even if it goes against your beliefs and bias. Truth is illusive. Make it your objective.</span></span></p><span data-dcnode-id="920" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="917" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="918" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="919" instrument_node="">Always get all sides. This is important. It will show you where you might be wrong and therefore strengthen your objectivity. Make sure you find and give fair presentation to the other side, even if you disagree. You can give weight to one side or other as long as support that weight with proper argument.</span></span></p><span data-dcnode-id="916" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="913" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="914" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="915" instrument_node="">Follow leads to their end, not just to where you wanted them to lead. They might give you a new perspective closer to the truth. Keep an open mind.</span></span></p><span data-dcnode-id="912" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="909" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="910" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="911" instrument_node="">Listen. I try to tape any interview and then transcribe. You would be surprised at how much is missed by the ear. This will give you information you otherwise would miss and thus increase truth.</span></span></p><span data-dcnode-id="908" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="905" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="907" instrument_node="">Don’t rely solely on the internet for information. It is a quick and useful aid but often, especially in history, only a beginning. The internet is new. It doesn’t have all information and what it does have can be wrong. Wikipedia, for instance, is ruled by others with opinions, beliefs and bias - sometimes with little knowledge of the past. These controllers determine what information you get. They are not always right. Libraries are still important repositories of information, especially those specific to your subject. Much of what they contain may not be on the internet.</span></span></p><span data-dcnode-id="904" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="901" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="902" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="903" instrument_node="">Always, if you can, go to the source. By that I mean the people, place or thing closest to your subject; i.e. the subject itself. Then those other than the subject closest to it. The further away from the source, the greater the chance for misinformation. Hearsay is not good enough. Seek and you shall find - most of the time.</span></span></p><span data-dcnode-id="900" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="897" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="898" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="899" instrument_node="">If you do all this and research hard, you will enhance objectivity.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="830" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="831" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="832" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="846" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="868" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="869" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="879" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="880" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="881" role="button" style="box-sizing: border-bo
