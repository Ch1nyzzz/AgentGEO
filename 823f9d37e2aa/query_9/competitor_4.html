-id="4794" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4795" instrument_node="">From what I can tell of its use, it refers to the primary source* of a person’s own anecdotal evidence of a historic event that person directly witnessed or experienced. For example, someone standing in the grass on Dealy Plaza on November 22, 1963, may be able to offer a “historical account” of what h</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4781" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4782" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4783" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4784" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4785" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4790" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4791" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4792" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4786" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4787"><svg data-dcnode-id="4788" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4789" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4744" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4745" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4746"><span class="q-box qu-userSelect--text" data-dcnode-id="4747" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4773" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4774" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4775" instrument_node="">It’s funny you ask that, because it’s never really come up in my experience other than in TV documentaries and news magazines. I’m sure there are other places it would show, but it’s not a common term in history writing I’ve encountered, at least certainly not often in secondary source* material.</span></span></p><span data-dcnode-id="4772" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4769" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4770" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4771" instrument_node="">From what I can tell of its use, it refers to the primary source* of a person’s own anecdotal evidence of a historic event that person directly witnessed or experienced. For example, someone standing in the grass on Dealy Plaza on November 22, 1963, may be able to offer a “historical account” of what happened, “that fateful day.”</span></span></p><span data-dcnode-id="4768" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4765" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4766" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4767" instrument_node="">I should note, though, that when I tried looking up the expression online, most of the mentions I found were far more generic. It is simply a telling of past events, though it is usually to provide evidence for a specific historic argument. So, technically, a historical account can also just be a history- which believe it or not, is still simply a story based on factual evidence and primary source comments.</span></span></p><span data-dcnode-id="4764" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4761" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4762" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4763" instrument_node="">*The difference between primary, secondary, and tertiary sources are as follows:</span></span></p><ol class="q-box" data-dcnode-id="4751" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4758" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4759" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4760" instrument_node="">Primary Source = actual documents from the past, such as the US Declaration of Independence. It can be a copy and still be a primary source, as long as its copied verbatim. If it is an original document (not a copy) it’s both primary source material AND a historical artifact. Oral accounts given by an eye witness to an event can also be primary sources.</span></span></li><li class="q-relative" data-dcnode-id="4755" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4756" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4757" instrument_node="">Secondary Source= a history of the past (usually very narrow in scope) relying solely on primary source material as evidence (although it can refer to other secondary sources for additional arguments, contrast the historian’s perspective, etc.)</span></span></li><li class="q-relative" data-dcnode-id="4752" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4753" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4754" instrument_node="">Tertiary Source= materials that rely on no original research. They instead rely heavily on secondary source material, and occasionally even other tertiary sources. They can quote primary source material a little, unless they are Wikipedia or another site with specific requirement. Pretty much all encyclopedias and textbooks fall in this zone.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4748" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4749" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4750" instrument_node="">Pardon me for such a long entry slightly off topic. But I was pretty ignorant about these terms not too long ego and wanted to share this with others in case there was any confusion.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4676" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4677" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4678" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4692" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4714" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4715" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4725" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id= " target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4176" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="4177" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="4178" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="4179" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4180" style="box-sizing: border-box;"><span data-dcnode-id="4181" style="background: none;"><span data-dcnode-id="4182" instrument_node="">Are there any Roman historical accounts that mention Jesus Christ?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mb--tiny spacing_log_originally_answered_banner qu-color--gray_light qu-passColorToLinks" data-dcnode-id="4165" style="box-sizing: border-box;"><span data-dcnode-id="4168" instrument_node="">Originally Answered: </span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Is-there-any-mention-of-Jesus-Christ-in-Roman-texts%3Fno_redirect%3D1" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="4167" instrument_node="">Is there any mention of Jesus Christ in Roman texts?</span></a></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4117" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="4118" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4119" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="4164" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="4120" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4140" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4141" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4142" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4143" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4144" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4161" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4162" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4163" instrument_node="">Jesus is mentioned by Josephus, Tacitus, and Suetonius. Of those three authors, Josephus is the only one who we might expect to mention Jesus; the other two just happened to mention him because they were talking about the Christians in Rome. Early Christian authors also claimed that there was a letter from Pontius Pilate mentioning Jesus archived at Rome, although the extant Letter of Pilate is an obvious forgery. Once you get past Suetonius, Christianity was gaining ground in the Roman Empire, and references to Jesus and Christianity are common.</span></span></p><span data-dcnode-id="4160" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4157" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4158" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4159" instrument_node="">It’s worth noting that Tacitus was a meticulous </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4145" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4146" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4147" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4148" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4149" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4154" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4155" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4156" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4150" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4151"><svg data-dcnode-id="4152" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4153" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4121" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4122" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4123"><span class="q-box qu-userSelect--text" data-dcnode-id="4124" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4137" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4138" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4139" instrument_node="">Jesus is mentioned by Josephus, Tacitus, and Suetonius. Of those three authors, Josephus is the only one who we might expect to mention Jesus; the other two just happened to mention him because they were talking about the Christians in Rome. Early Christian authors also claimed that there was a letter from Pontius Pilate mentioning Jesus archived at Rome, although the extant Letter of Pilate is an obvious forgery. Once you get past Suetonius, Christianity was gaining ground in the Roman Empire, and references to Jesus and Christianity are common.</span></span></p><span data-dcnode-id="4136" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4133" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4134" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4135" instrument_node="">It’s worth noting that Tacitus was a meticulous historian with access to the imperial records and close government ties, and he blasted historians who wrote without thoroughly verifying their facts. He recorded that Jesus was crucified in Judea under Pontius Pilate.</span></span></p><span data-dcnode-id="4132" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4129" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4130" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4131" instrument_node="">Now, one misleading claim making the rounds on the Internet is that “the Romans kept meticulous records, but there is not a single official Roman document that mentions Jesus.” That is usually accompanied by a list of such documents, i.e., execution records, trial records, military dispatches, census forms, tax records, palace records, temple records, etc. Of course, the claim is misleading because none of those kinds of records exist for the time and place of Jesus. There are no execution records, trial records, census records, etc. from Judea in the time of Jesus. And if such records did exist, they would be full of references to “Jesus,” because that was one of the most common names at the time (there are eight people named Jesus in the Greek translation of the Bible, and nearly twenty people named Jesus in the works of Josephus).</span></span></p><span data-dcnode-id="4128" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4125" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4126" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4127" instrument_node="">Also somewhat misleading is the claim that there are no contemporary references to Jesus, as if that were significant. Jesus was only in the public eye for around one to three years before his death, which isn’t enough time for any contemporary reference in antiquity. It took Caligula twenty years in the public eye before we got a contemporary reference, and he was one of the most infamous emperors in history. But aside from that, there were no contemporary authors whose works can be reliably dated to the period of Jesus’ ministry, and there are plenty of far more famous and powerful figures in the world of Jesus that also lack any contemporary references.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4048" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4049" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" dat -sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3873" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3874" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3875" instrument_node="">There are a few possible answers.</span></span></p><span data-dcnode-id="3872" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3867" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3870" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3871" instrument_node="">1). The </span></span><span data-dcnode-id="3868" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3869" instrument_node="">Gathas</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3863" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3864"><div class="q-box unzoomed" data-dcnode-id="3865" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3866" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-a9743e1ec097b0bcb53b22328967472e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3856" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3861" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3862" instrument_node="">The</span></span><span data-dcnode-id="3859" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3860" instrument_node=""> Gathas</span></span><span data-dcnode-id="3857" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3858" instrument_node=""> are considered to be the original texts that created the foundations for the Zoroastrian religion, supposedly being written by the prophet Zoroaster himself around 1,000 BC. They’re a collection of hymns, some of which describe Zoroaster’s process of spreading his Truth. Of course, this is far from a historical document, and it’s unlikely that these accounts are factually accurate.</span></span></p><span data-dcnode-id="3855" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3852" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3853" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3854" instrument_node="">2). The Mesha Stele / Moabite Stone</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3849" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3850" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3851" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-744f8c53590efd5af6bb62a38ff881fe-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3842" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3847" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3848" instrument_node="">An inscription from the Kingdom of Moab in the Levant, written around 840BC. In it, King Mesha describes how the Moabites threw off the yoke of their overlords, the Kingdom of Israel, regaining their independence. This is certainly more historical in nature than the </span></span><span data-dcnode-id="3845" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3846" instrument_node="">Gathas, </span></span><span data-dcnode-id="3843" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3844" instrument_node="">and we possess it in it’s original copy. It was erected for reasons of propaganda/royal commemoration, so take that into consideration when evaluating its accuracy.</span></span></p><span data-dcnode-id="3841" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3838" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3839" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3840" instrument_node="">3). The Library of Ashurbanipal</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3834" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3835"><div class="q-box unzoomed" data-dcnode-id="3836" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3837" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-39a6518b1ee28e001bc97b8225e6f953-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3831" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3832" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3833" instrument_node="">The world’s oldest library, dating to the 600sBC, collected by the eponymous King of the Neo-Assyrian Empire. There are over 30,000 tablets of cuneiform script, a number of which record historical events.</span></span></p><span data-dcnode-id="3830" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3825" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3828" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3829" instrument_node="">4). Herodotus’ </span></span><span data-dcnode-id="3826" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3827" instrument_node="">Histories</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3821" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3822"><div class="q-box unzoomed" data-dcnode-id="3823" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3824" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-0af9b77ff21a097528b97a53acaa64ae-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3818" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3819" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3820" instrument_node="">Herodotus is known as the Father of History, but also the Father of Lies. It’s clear that this text, written around 440BC, intends to be historical in nature, but we don’t know how much of it is actually true, and we know that at least some of it is patently untrue.</span></span></p><span data-dcnode-id="3817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3812" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3816" instrument_node="">5). Thucydides’ </span></span><span data-dcnode-id="3813" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3814" instrument_node="">The Peloponnesian War</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3808" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3809"><div class="q-box unzoomed" data-dcnode-id="3810" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3811" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-836607a6aa50c7a3d1232079d58121fb-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3801" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3806" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3807" instrument_node="">Thucydides, is considered the father of </span></span><span data-dcnode-id="3804" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3805" instrument_node="">modern</span></span><span data-dcnode-id="3802" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3803" instrument_node=""> History, surpassing Herodotus in a commitment to naturalistic, non-mythical explanations of events, and accuracy. His account of the Peloponnesian War between Athens and Sparta was written between 430 and 400BC.</span></span></p><span data-dcnode-id="3800" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3791" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3798" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3799" instrument_node="">6). The </span></span><span data-dcnode-id="3796" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3797" instrument_node="">Zuo</span></span><span data-dcnode-id="3794" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3795" instrument_node=""> </span></span><span data-dcnode-id="3792" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3793" instrument_node="">Zhuan</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3788" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3789" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3790" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-26abab7038c502d7406893e9e8b33ec3-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3785" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3786" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3787" instrument_node="">Written in Ming Dynasty China sometime in the early 4th century BC. Attributed (with uncertainty) to Zuo Qiuming, a contemporary of Confucius. This is considered to be one of the earliest true narrative histories, being written in the modern style.</span></span></p><span data-dcnode-id="3784" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3781" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3782" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3783" instrument_node="">To my mind, the Moabite Stone is the first account of an historical event, and Thucydides’s work is the first work of actual history as we know it today. The Stone and Ashurpabanipal’s tablets are the only items on the list we possess in their original copies, because of the materials they were written on. Everything else has been repeatedly transcribed.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3699" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3700" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3701" style="box-sizing: border-box; display: flex;"><di : normal; background: none;"><span data-dcnode-id="3604" instrument_node="">Many scholars agree that Jesus existed as a historical person and was crucified by the order of the Roman Prefect Pontius Pilate.</span></span></p><span data-dcnode-id="3601" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3598" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3599" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3600" instrument_node="">Jesus was not only written about in the gospels of the New Testament, but also by historians.</span></span></p><span data-dcnode-id="3597" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3594" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3595" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3596" instrument_node="">Thallus (52 AD) is perhaps the earliest secular writer to mention Jesus, but his texts are not preserved. Julius Africanus (221 AD) did quote Thallus, who tried to explain the darkness occurring at Jesus’ crucifixion: “On the whole world there pressed a most fearful darkness; and the rocks were rent by an earthquake, and many places in Judea and other districts were thrown do</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3582" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3583" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3584" style="box-sizing: border-box; position: relative; bottom: -60px;" ne;"><span data-dcnode-id="3568" instrument_node="">Thallus (52 AD) is perhaps the earliest secular writer to mention Jesus, but his texts are not preserved. Julius Africanus (221 AD) did quote Thallus, who tried to explain the darkness occurring at Jesus’ crucifixion: “On the whole world there pressed a most fearful darkness; and the rocks were rent by an earthquake, and many places in Judea and other districts were thrown down. This darkness Thallus, in the third book of his History, calls, as appears to me without reason, an eclipse of the sun.” (Julius Africanus, Chronography, 18:1)</span></span></p><span data-dcnode-id="3565" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3562" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3563" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3564" instrument_node="">After 70AD, a Syrian philosopher named Mara Bar-Serapion, compared the life and persecution of Jesus with that of other philosophers who were persecuted for their ideas. Mara Bar-Serapion referred to Jesus as the “Wise King”.</span></span></p><span data-dcnode-id="3561" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3558" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3559" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3560" instrument_node="">The most accepted reference is Roman historian Tacitus, who referred to 'Christus' and his execution by Pontius Pilate in his Annals (written ca. AD 116), book 15, chapter 44. Tacitus wrote in a very negative tone about the Christians, and this make it extremely unlikely to have been forged by a Christian scribe.</span></span></p></span></span></div></div></  none;"><span data-dcnode-id="3188" instrument_node="">History is the examination and study and analysis of the PAST. When we believe in the past, we like to make connections and how we do depends on each one of us. Your view of history is always different. This is what BELIEF does. One reason as to why there are so many religions, so many different scientific views is all about how we make so called ‘connections’. In TRUTH there are no connections!</span></span></p><span data-dcnode-id="3185" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3182" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3183" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3184" instrument_node="">Because the truth is NOW and we don't even understand what ‘now’ means because for us TIME is very REAL.</span></span></p><span data-dcnode-id="3181" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3178" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3179" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3180" instrument_node="">Many claim to KNOW - NOW - only a FEW experience it.</span></span></p><span data-dcnode-id="3177" instrument_node=""> </span><p class="q-text qu-display--inline qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3174" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3175" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3176" instrument_node="">iu</span></span></p></span></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3105" style="box-sizing: border-box;"><div ing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3004" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3009" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3010" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3011" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3005" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3006"><svg data-dcnode-id="3007" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3008" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2965" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2966" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2967"><span class="q-box qu-userSelect--text" data-dcnode-id="2968" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2992" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2993" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2994" instrument_node="">Historical materialism is a part of Marxism and details how society effected history pretty much. It says this is controlled through the material condition of societies mode of production. A really fancy way of saying it how it makes and continues to make the means for humans. He called it the union of productive capacity and social relations of production. It looks for the cause of changes as to how humans find a way to live. It assumes that social classes and the relationship between them, along with the political structures and ways of thinking in society, are founded on and reflect contemporary economic activity.</span></span></p><span data-dcnode-id="2991" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2988" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2989" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2990" instrument_node="">It makes the claims that:</span></span></p><ol class="q-box" data-dcnode-id="2972" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2985" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2986" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2987" instrument_node="">The basis of human society is how humans work on nature to produce the means of subsistence.</span></span></li><li class="q-relative" data-dcnode-id="2982" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2983" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2984" instrument_node="">There is a division of labor into social classes (relations of production) based on property ownership where some people live from the labor of others.</span></span></li><li class="q-relative" data-dcnode-id="2979" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2980" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2981" instrument_node="">The system of class division is dependent on the mode of production.</span></span></li><li class="q-relative" data-dcnode-id="2976" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2977" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2978" instrument_node="">The mode of production is based on the level of the productive forces.</span></span></li><li class="q-relative" data-dcnode-id="2973" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2974" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2975" instrument_node="">Society moves from stage to stage when the dominant class is displaced by a new emerging class, by overthrowing the "political shell" that enforces the old relations of production no longer corresponding to the new productive forces. This takes place in the superstructure of society, the political arena in the form of revolution, whereby the underclass "liberates" the productive forces with new relations of -wrap: anywhere; direction: ltr;"><span data-dcnode-id="2820" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2821" instrument_node="">I love this question. So seemingly innocent… and yet it cuts to the heart of key questions surrounding the writing of history!</span></span></p><span data-dcnode-id="2818" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2815" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2816" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2817" instrument_node="">Lets start with some possible directions hinted at in the answers already put forward.</span></span></p><span data-dcnode-id="2814" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2811" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2812" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2813" instrument_node="">One commenter suggests that a historical narrative that is set down closer to the event in question will somehow have the advantage of being more accurate. Now, as any historian who has studied medieval or ancient annals (and their extremely biased descriptions of battles) will tell you, this is hardly the case. Nearly everything in such documents can be misleading; from the size of ar</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2799" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2800" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2801" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2802" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2803" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2808" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2809" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2810" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2804" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2805"><svg data-dcnode-id="2806" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2807" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2719" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2720" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2721"><span class="q-box qu-userSelect--text" data-dcnode-id="2722" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2791" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2792" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2793" instrument_node="">I love this question. So seemingly innocent… and yet it cuts to the heart of key questions surrounding the writing of history!</span></span></p><span data-dcnode-id="2790" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2787" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2788" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2789" instrument_node="">Lets start with some possible directions hinted at in the answers already put forward.</span></span></p><span data-dcnode-id="2786" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2779" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2784" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2785" instrument_node="">One commenter suggests that a historical narrative that is set down closer to the event in question will somehow have the advantage of being more accurate. Now, as any historian who has studied medieval or ancient annals (and their extremely biased descriptions of battles) will tell you, this is hardly the case. Nearly everything in such documents can be misleading; from the size of armies, to the people who were declared present, to the outstanding achievements of certain leaders, etc. So much for the advantages of temporal proximity to an event! Indeed, it used to be a commonplace within academic history to refer to the “20 year rule”: the idea that no real historical perspective on a historical event was possible until a requisite number of years had passed to remove people from their contemporary passions and allow alternative </span></span><span data-dcnode-id="2782" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2783" instrument_node="">historical</span></span><span data-dcnode-id="2780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2781" instrument_node=""> perspectives to enter the scene.</span></span></p><span data-dcnode-id="2778" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2755" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2777" instrument_node="">Similarly, another commenter suggests that he prefers to hear the direct words of a soldier in the trenches (note how much people seem to associate history specifically with war and events like that!) rather than listening to any “academic” spin him a yarn about history. But why would a soldier hold any secret key into the truth of history that someone from outside would not? Does the commenter believe that soldiers are all neutral, deep-thinking, independent souls that are impervious to propaganda and or ideological motivations? Of course not. Ask a soldier at some historical event why they are there and you will most likely be given the most narrow perspective of all: some unthinking and straight-forwardly ideological answer (the answer that their leaders told to them to send them off to war). History is not all about simply </span></span><span data-dcnode-id="2774" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2775" instrument_node="">what </span></span><span data-dcnode-id="2772" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2773" instrument_node="">happened… but also (and perhaps much more pertinently) </span></span><span data-dcnode-id="2770" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2771" instrument_node="">why</span></span><span data-dcnode-id="2768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2769" instrument_node=""> such things happened. This is not to say that contemporary testimonies are not useful (far from it!). But no one holds some unique first-person objective perspective on </span></span><span data-dcnode-id="2766" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2767" instrument_node="">history</span></span><span data-dcnode-id="2764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2765" instrument_node=""> (or even the history of any event). History is unavoidably </span></span><span data-dcnode-id="2762" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2763" instrument_node="">interpretative </span></span><span data-dcnode-id="2760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2761" instrument_node="">and not simply </span></span><span data-dcnode-id="2758" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2759" instrument_node="">descriptive</span></span><span data-dcnode-id="2756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2757" instrument_node="">. In fact, whenever one encounters a more meaningful or profound comment by a contemporary soldier or witness, you can rest assured that a historian of some skill and learning has sifted through thousands of documents in order to elevate and conserve that particularly interesting and interpretative statement for you (whether in an archive or in a book of oral testimonies)!</span></span></p><span data-dcnode-id="2754" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2753" instrument_node="">The problems underlying such views on history as expressed in these answers are connected with an ideological commitment that has long hung around historical research for many many years: a commitment to a sort of </span></span><span data-dcnode-id="2750" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2751" instrument_node="">naive</span></span><span data-dcnode-id="2748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2749" instrument_node=""> empiricism. History in the purely empirical vision is presumed to be a “thing” that took place “back there” and historians are all just uncovering objective “facts” that bring it back into the present in its fullness once again. The truth is more complex: this mysterious full thing called “the past”… a strangely unified and self-evident thing… if we could in fact get at it at all, would still not explain everything we need to know. There are so many problems with this vision of history and history-writing that it would take a book to go through them all (and those books do exist by the dozen!).</span></span></p><span data-dcnode-id="2746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2745" instrument_node="">But we will restrict ourselves here to suggesting that history is not simply a “self-evident thing” that existed “back then”… It is, much more accurately, the process of evoking the past in the present… through some process of narrativizing it. In that sense it is never simply the past “as it happened” in the sense of straight-forward, and self-evident material actions and such. It is all the complex motivations and justifications and words that accompany such historical actions.</span></span></p><span data-dcnode-id="2742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2740" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2741" instrument_node="">And so, finally, in part answer to your question: the best narratives capture not just “facts” that pretend to “speak for themselves”, but the much more complex way in which the past itself was always already a contested ideological battle-ground between competing (and always incomplete and inconsistent) ideologies, explanations and narratives. The best historical accounts give you a sense of this: a sense of the impossibility of reducing history to simple and straightforward answers or neutral, </span></span><span data-dcnode-id="2738" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2739" instrument_node="">descriptive</span></span><span data-dcnode-id="2736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2737" instrument_node=""> narratives.</span></span></p><span data-dcnode-id="2734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2723" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2733" instrument_node="">I would be almost tempted to conclude by saying, that when you encounter someone who is “simply” telling you “how things were”, without any sense of the complexity or contradiction of all historical narratives… and without offering any explanation as to why there are </span></span><span data-dcnode-id="2730" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2731" instrument_node="">always</span></span><span data-dcnode-id="2728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2729" instrument_node=""> multiple competing narratives about the same historical events… well </span></span><span data-dcnode-id="2726" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2727" instrument_node="">that</span></span><span data-dcnode-id="2724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2725" instrument_node=""> is when you know you are dealing with a more dubious historical account. The best historical accounts will give you an insight into the difficulties of reducing an historical event to a narrative… why it is unavoidable… and what is going on (ideologically and theoretically) in that process.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2651" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2652" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2653" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2667" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2689" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2690" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2700" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2701" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="2702" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 3
