ursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/What-is-the-historical-background-of-accounting" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="529" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="530" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="531" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="532" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="533" style="box-sizing: border-box;"><span data-dcnode-id="534" style="background: none;"><span data-dcnode-id="535" instrument_node="">What is the historical background of accounting?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="466" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="467" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="468" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="521" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="469" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="493" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="494" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="495" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="496" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="497" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="518" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="519" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="520" instrument_node="">As soon as someone owned more things that he could easily see at one time, there was a need for abstract representation of ownership. This likely took the form of images, like a small clay cow to represent one cow. These images got stylized, then replaced by counters, then by marks written on clay tablets or other surfaces.</span></span></p><span data-dcnode-id="517" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="514" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="515" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="516" instrument_node="">That’s fine for lists of assets, but accounting also has to track liabilities. The natural way was to use the asset symbols, but mark them in a way to represent negative ownership.</span></span></p><span data-dcnode-id="513" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="510" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="511" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="512" instrument_node="">Once money was invented around 2,500 years ago, it was possible to place values on all of these</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="498" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="499" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="500" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="501" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="502" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="507" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="508" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="509" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="503" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="504"><svg data-dcnode-id="505" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="506" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="470" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="471" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="472"><span class="q-box qu-userSelect--text" data-dcnode-id="473" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="490" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="491" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="492" instrument_node="">As soon as someone owned more things that he could easily see at one time, there was a need for abstract representation of ownership. This likely took the form of images, like a small clay cow to represent one cow. These images got stylized, then replaced by counters, then by marks written on clay tablets or other surfaces.</span></span></p><span data-dcnode-id="489" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="486" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="487" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="488" instrument_node="">That’s fine for lists of assets, but accounting also has to track liabilities. The natural way was to use the asset symbols, but mark them in a way to represent negative ownership.</span></span></p><span data-dcnode-id="485" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="482" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="483" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="484" instrument_node="">Once money was invented around 2,500 years ago, it was possible to place values on all of these assets and liabilities to add them up. This led to a rudimentary concept of an income statement, because you could add up all the assets and subtract the liabilities at two points in time, and the difference in net asset value was the income in between.</span></span></p><span data-dcnode-id="481" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="478" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="479" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="480" instrument_node="">It was Luca Pacioli in 15th century Italy who popularized the ideas of double entry bookkeeping in Europe, probably building on ideas developed by Islamic traders around the Mediterranean, but possible older. This converted lists of assets and liabilities to a balance sheet, with equity to make things balance, and formalized the income statement.</span></span></p><span data-dcnode-id="477" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="474" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="475" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="476" instrument_node="">Since then it’s been mostly downhill.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="407" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="408" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="409" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="423" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="445" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="446" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="456" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="457" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClic
