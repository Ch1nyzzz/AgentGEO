</span><span data-dcnode-id="4544" id="freeText2295709763668684251" style="display:none"><span data-dcnode-id="4559" instrument_node="">If you will be a great man’s mistress you must pay the price...</span><br data-dcnode-id="4558"><br data-dcnode-id="4557"><span data-dcnode-id="4556" instrument_node="">1372, The Savoy. Widow Lady Katherine Swynford presents herself for a role in the household of merciless royal prince John of Gaunt, Duke of Lancaster, hoping to end her destitution. But the Duke’s scandalous proposition leaves her life of pious integrity reeling...</span><br data-dcnode-id="4555"><br data-dcnode-id="4554"><span data-dcnode-id="4553" instrument_node="">Seduced by the glare of royal adoration, Katherine becomes John’s mistress. She will leave behind everything she has stood for to play second fiddle to his young wife and ruthless ambition. She will live in the shadows of the most powerful man in England in the hope of a love greater than propriety. </span><br data-dcnode-id="4552"><br data-dcnode-id="4551"><span data-dcnode-id="4550" instrument_node="">But soon the court whispers – whore, harlot, vile temptress – reach the ears of not just John’s bride but his most dangerous political enemies. As the Plantagenet prince is accused of bringing England to its knees, who better to blame than shameless she-devil Katherine Swynford? Dragged from the shadows, Katherine must answer for her sins.</span><br data-dcnode-id="4549"><br data-dcnode-id="4548"><span data-dcnode-id="4547" instrument_node="">‘Anne O’Brien has joined the exclusive club of excellent historical novelists.’</span><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">Sunday Express</span></span><span data-dcnode-id="4543" instrument_node="">

</span><span data-dcnode-id="4018" id="freeText4362904128387484600" style="display:none"><span data-dcnode-id="4027" instrument_node="">There are few things we know about Katherine Swynford, the Duchess of Lancaster. Married at sixteen to "Hugh" Ottes Swynford, a Knight from the manor of Kettlethorpe in Lincolnshire. It would be after his death with her time spent John of Gaunt, Duke of Lancaster, first as his lover and then after the death of John's second wife Infanta Constance of Castile, as a married couple that would be the focus of the novel.</span><br data-dcnode-id="4026"><br data-dcnode-id="4025"><span data-dcnode-id="4024" instrument_node="">Written from Katherine's thoughts, we the reader as swept along with the forbidden love between between the two and the sacrifices that both make. For the Duke who is married at the time the consequences of his action could be disastrous to his political hopes while katherine faces the complete destruction of her reputation. Her greatest triumph seeing her children she had out of wedlock with John, legitimated during the reign of the Duke's nephew, Richard II. </span><br data-dcnode-id="4023"><br data-dcnode-id="4022"><span data-dcnode-id="4021" instrument_node="">Author Anne O'Brien has done a great job in her way she creatively fills in the gaps that historians can't answer. Despite being little documentation about Katherine, the author has come up with a plausible description of her feelings for John in the years from there first encounters as lovers until there marriage and his untimely death. The importance of there union could not be understated with the Tudor's being a direct result of there descendants. For me this was an enthralling read that that all medieval historical fiction fans should consider reading.</span><br data-dcnode-id="4020"><br data-dcnode-id="4019"></span><span data-dcnode-id="4017" instrument_node="">

</span><span data-dcnode-id="3924" id="freeTextContainer3599985248983654991"><span data-dcnode-id="3925" instrument_node="">I came to this novel with very low expectations. I felt surprisingly indignant that another author had tried to 'remake' Katherine and The Scandalous Duchess' format was not designed to quell my concerns. The cover features a model with an obviously twenty-first century blonde dye job and within the first three pages, I spotted three typos - dairy maids became diary maids, instead of poring over books, the Duke poured over them. Additionally, all the way through, there was a problem with the typ</span></span><span data-dcnode-id="3923" instrument_node="">
</span><span data-dcnode-id="3912" id="freeText3599985248983654991" style="display:none"><span data-dcnode-id="3922" instrument_node="">I came to this novel with very low expectations. I felt surprisingly indignant that another author had tried to 'remake' Katherine and The Scandalous Duchess' format was not designed to quell my concerns. The cover features a model with an obviously twenty-first century blonde dye job and within the first three pages, I spotted three typos - dairy maids became diary maids, instead of poring over books, the Duke poured over them. Additionally, all the way through, there was a problem with the typesetting for words containing the letter f. So inflamed became inf lamed, fury became f ury and often the f was left on one line and the rest of the word on the other. When reading a novel that is essentially a bodice ripper, it is surprisingly distracting. Still, not too far in, I realised the true reason why I had picked up the book in the first place. It was really good to read a book featuring John of Gaunt again.</span><br data-dcnode-id="3921"><br data-dcnode-id="3920"><span data-dcnode-id="3919" instrument_node="">I am a self-confessed geek over history. I am not even particularly selective concerning the period, I just like the stories. It is always interesting to imagine the lives of these people - would the fact that they lived hundreds of years ago have made them truly different from us? There are certain figures from history though whose stories dance no matter how long they have been in the ground. John of Gaunt is one of these. Despite holding the title of King of Castile, he never truly sat on a throne and yet he was one of the most influential men of his era and a renowned force on the battlefield. His lifestyle arguably caused the Peasants' Revolt, he was the uncle to Richard II and father to Henry IV, he was married thrice, the third time to his long-term mistress and governess to his daughters, Katherine Swynford. John of Gaunt was basically Sir Gawain except actually real. When I was in the Tower of London and saw the armour that is supposedly his, even though Alison Weir explained that it could not have been, I was incredibly excited. I am not sure if it is strange to have a crush on someone who died approximately six hundred years before you were born but yes, speaking candidly - I have a little bit of a thing for John of Gaunt.</span><br data-dcnode-id="3918"><br data-dcnode-id="3917"><span data-dcnode-id="3916" instrument_node="">For my full review:</span><br data-dcnode-id="3915"><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//girlwithherheadinabook.blogspot.co.uk/2014/03/the-scandalous-duchess-anne-obrien.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3914" instrument_node="">http://girlwithherheadinabook.blogspo...</span></a></span><span data-dcnode-id="3911" instrument_node="">

</span><span data-dcnode-id="3815" id="freeTextContainer4388665628033070868"><span data-dcnode-id="3816" instrument_node="">Unlike many court dramas, THE SCANDALOUS DUCHESS is focused almost wholly on its female protagonist, Katherine Swynford, and the matters of her heart rather than on politics and royal intrigue, an important point of difference from other such books. The story mentions political events only in as much as they have an impact on Katherine's personal life. She is a woman completely lacking in political ambition, and this story is a romantic and domestic drama, nothing more - which does not mean that</span></span><span data-dcnode-id="3814" instrument_node="">
</span><span data-dcnode-id="3796" id="freeText4388665628033070868" style="display:none"><span data-dcnode-id="3813" instrument_node="">Unlike many court dramas, THE SCANDALOUS DUCHESS is focused almost wholly on its female protagonist, Katherine Swynford, and the matters of her heart rather than on politics and royal intrigue, an important point of difference from other such books. The story mentions political events only in as much as they have an impact on Katherine's personal life. She is a woman completely lacking in political ambition, and this story is a romantic and domestic drama, nothing more - which does not mean that it is inconsequential.</span><br data-dcnode-id="3812"><br data-dcnode-id="3811"><span data-dcnode-id="3810" instrument_node="">This book centers firmly on the experiences of women in fourteenth-century England and their vicissitudes in conforming to the whims of men, the consequences of this condition, and the women's powerlessness to change their situation or act with any sort of autonomy. Early in the story comes a brief interlude in which Katherine receives romantic advice from a pilgrim who seems modeled quite blatantly on the Wife of Bath from Chaucer's CANTERBURY TALES (made doubly ironic by the fact that Katherine's sister, Philippa, is married to Geoffrey Chaucer). It is an amusing reminder that mediaeval women were every bit as worldly as are modern women. THE SCANDALOUS DUCHESS is thus both implicitly and explicitly a feminist book. When popular opinion turns against Katherine and Duke John's affair, Katherine says that "... fury flooded through me that the cruellest accusations were directed at me. The woman. The daughter of Eve, guilty of seduction as she had been since the beginning of time."</span><br data-dcnode-id="3809"><span data-dcnode-id="3808" instrument_node=""> </span><br data-dcnode-id="3807"><span data-dcnode-id="3806" instrument_node="">This book is also a very intimate look at the ramifications of royal blood for the human beings in whose veins it flows. With great privilege comes a great weight of duty, with little space for those everyday human emotions like, for instance, love. When a royal duke must marry for political reasons, is it really wrong for him to take a mistress for love? And when he does, what are the emotional consequences for the women involved? Overall, the book examines these questions closely, compellingly, and effectively, but far from perfectly. Unfortunately, the quality of the story's characterization, exposition, and style is somewhat patchy.</span><br data-dcnode-id="3805"><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">THE SCANDALOUS DUCHESS has a surprisingly small cast of characters for a court drama - the only people of any real consequence in the story are Katherine, John, and John's wife, the Duchess Constanza. Even more limiting is the fact that Katherine's is the only point of view given in the book, placing the burden of the entire story on her shoulders alone, which may, in part, account for the book's flaws. Luckily, Katherine is a character easy to sympathize with, but she does, of course, have some irritating traits, too. She quickly demonstrates a wry, self-deprecating, and, in a sense, particularly feminine wit that is quite endearing. There is much emphasis placed on Katherine's piety and morality - we are made to understand in no uncertain terms that she is not a woman prone to scandalous activities. But neither is she without passion and desire, as demonstrated by her assertion that "Constanza would never understand that a woman could be drawn to a man for other reasons than wealth and power. She would never understand that I had rejected every moral teaching of my youth simply because the Duke had wanted me and I had been unable to resist his allure." However, Katherine does a little too much hypocritically pious hand-wringing to allow the reader to identify with her unreservedly, whereas the Duke's air of dormant menace makes him a much more enigmatic and interesting character.</span><br data-dcnode-id="3802"><br data-dcnode-id="3801"><span data-dcnode-id="3800" instrument_node="">The story begins at a fast pace and the first-person narrative gives it even more immediacy, although the style is just slightly stilted at times. However, the first half of the book has an air of superficiality that makes many scenes feel a little flat. There is something lacking in the professed love between Katherine and John - it is a love that is stated rather than demonstrated and is therefore difficult for the reader to feel truly invested in. The account of John and Katherine's courtship often reaches the fanciful heights of melodrama, although this is sometimes tempered by a lively humor. Thankfully, after the seeming superficiality of the first half of the book, the author seems to hit her stride about halfway through, drawing the reader in with more heartfelt emotions and more dramatic scenes that have real impact. From that point, the reader is more likely to find themselves emotionally invested in the story and its characters. This story contains a twist that instantly heightens emotions and the reader's sympathies, riveting the attention on the sudden burst of action and true conflict - conflict within and conflict without.</span><br data-dcnode-id="3799"><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">I found THE SCANDALOUS DUCHESS to be an enjoyable and enlightening read, if inconsistent in quality. However, I must take issue with the publisher (rather than the author) on a few points. Typographical errors are irritatingly common in this book, as is sloppy punctuation and inappropriate word usage, all problems that should have been corrected during the editing process. After the close of the story, I also found the thirty-odd pages of additional material about the book, its author, and her writing process to be maddeningly excessive. The author's note explaining how much factual material she had to work with and how much of the story involved poetic licence is conventional and appropriate for a historical novel, and I can understand and appreciate the questions and suggestions included for use by book clubs. I also enjoy reading a short author biography. However, when this is followed by another four discrete sections on why the author writes, a Q&amp;A about her writing, her writing life, and then a day in her life, I begin to fear I am simply being subjected to an extraordinarily lengthy advertisement of the author's other books - especially as these pages are peppered with website addresses. And finally, a list of the ten best places in which to read THE SCANDALOUS DUCHESS ... I found that risible and all but insulting - I really don't need to be told where to read this book, especially when the suggestions include a dentist's waiting room and ruined castles on the other side of the planet from where I live!</span></span><span data-dcnode-id="3795" instrument_node="">

</span><span data-dcnode-id="3396" id="freeTextContainer6838353991638506222"><span data-dcnode-id="3397" instrument_node="">Royal scandals are not confined to the current history of bare-bottomed princes and topless brides; they have been with us since royalty began; and the love affair between Katherine Swynford and John of Gaunt was the hugest scandal of Plantagenet era. In a world where sin was blamed for every little thing that went wrong, Katherine and John were sitting ducks to be attributed the blame of all the kingdom’s ills. There were a lot of ills too – the Black Death, The Peasants Revolt and the failure </span></span><span data-dcnode-id="3395" instrument_node="">
</span><span data-dcnode-id="3379" id="freeText6838353991638506222" style="display:none"><span data-dcnode-id="3394" instrument_node="">Royal scandals are not confined to the current history of bare-bottomed princes and topless brides; they have been with us since royalty began; and the love affair between Katherine Swynford and John of Gaunt was the hugest scandal of Plantagenet era. In a world where sin was blamed for every little thing that went wrong, Katherine and John were sitting ducks to be attributed the blame of all the kingdom’s ills. There were a lot of ills too – the Black Death, The Peasants Revolt and the failure to capture Castile to name but a few. There is not a lot of historical evidence on the details of Kathrine’s life, so working within the few historical facts that are known, author Anne O’Brien was able to let her imagination run free against a background of mediaeval politics and bring to life a wonderful love affair in a time when love matches were not the norm and political alliances were a necessity to survival. </span><br data-dcnode-id="3393"><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">Katherine Swynford had been brought up with the royal children under the care of good Queen Philippa; as a result she leads a life of integrity and dignity. She also served as a lady-in-waiting to Blanche – the first Duchess of Lancaster. With this experience behind her she petitions John Plantagenet for a position in his household serving his new Queen as she is now a widow and her stately manor is falling apart around her ears. He agrees, but only on the proviso that she becomes his mistress he assures her that he loves and adores her and will always respect and support her. She succumbs as she has always had feelings for him. Together they defy everyone, they break all the conventional rules, they have four children together, and, despite all the condemnation of their relationship (especially that of his wife) the two stay true to each other until he is in a position to marry him and make their children legitimate. </span><br data-dcnode-id="3390"><br data-dcnode-id="3389"><span data-dcnode-id="3388" instrument_node="">Anne O’Brien has brought a very believable Katherine to life on the pages, despite the danger she follows her heart and is torn between her love for John and her love for God, a constant battle between her conscience about committing adultery and her desire for John. She is not afraid to love him and neither is she afraid to speak her mind and berate him when needed. She is also incredibly brave and resilient as she is blamed for being a temptress, whore and for the political unrest that is plaguing England so death threats are made. I was enthralled by the story and swept along with the political machinations that were occurring outside of the relationship. For some twenty-five years their relationship continued, although occasionally battered by events and separated a couple of times for the good of England, their love never wavered for each other. The story gives believable reasons as to why a pious and moral, widow, with a strong sense of duty to her children would put her reputation and more importantly her immortal soul at risk to love a man who belonged to another. And, of course, it is through John and Katherine’s descendants that the Tudors become the ruling house of England. </span><br data-dcnode-id="3387"><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node=""> </span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node=""> </span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">With thanks to Harlequin Australia - Mira for my copy to read and review.</span><br data-dcnode-id="3380"></span><span data-dcnode-id="3378" instrument_node="">

</span><span data-dcnode-id="3285" id="freeText15423949880832283788" style="display:none"><span data-dcnode-id="3290" instrument_node="">First off I would like to recommend that you don't embark upon this novel if you know you're going to spend every second comparing it to Anya Seton's "Katherine". It would be entirely unfair do to this as "Katherine" is one of the most magnificent historical fiction books ever written and it's unlikely to be matched. </span><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">That being said, I enjoyed this novel by Anne O'Brien and found favor in how she chose to write her novel based upon the love affair of Katherine Swynford and John of Gaunt. This is a very passionate portrayal of their lives together and is very personal in it's telling. What I mean by this is that this is not a novel that shows their relationship in the grand scheme of things, but rather their relationship IS the focal point of the novel. As Ms. O'Brien writes of their relationship in her author's note "I consider it to be a tale of compulsive desire and need, so much stronger than love" and this is clearly portrayed throughout the novel. Absolutely this is a romance novel BUT it is a romance novel set in the real world, a medieval world full of rigorous protocol and moralistic standards. Therefore the bad comes right along with the good. This is not a light-hearted romance tale, this is a raw and stark account of two people who love each other against all odds and endure a lot in the name of such love. It was an emotional roller-coaster. </span><br data-dcnode-id="3287"><span data-dcnode-id="3286" instrument_node="">As relentless of emotional portrayal this novel was I will say that it could be a heavy-going read at times. I found myself wanting to take a step back from it and wishing there was a wider perspective to be found from another character's point of view. However this was not the nature of this novel, it keeps you centered right in the middle of this fiery relationship and there the reader is stuck throughout. A very interestingly written novel and one I won't forget. </span></span><span data-dcnode-id="3284" instrument_node="">

</span><span data-dcnode-id="3169" id="freeText9014607775882789135" style="display:none"><span data-dcnode-id="3190" instrument_node="">Thank you to the author/publisher for the advance reading copy.</span><br data-dcnode-id="3189"><br data-dcnode-id="3188"><span data-dcnode-id="3187" instrument_node="">If you will be a great man’s mistress you must pay the price…</span><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">1372, The Savoy. Widow Lady Katherine Swynford presents herself for a role in the household of merciless royal prince John of Gaunt, Duke of Lancaster, hoping to end her destitution. But the Duke’s scandalous proposition leaves her life of pious integrity reeling…</span><br data-dcnode-id="3184"><br data-dcnode-id="3183"><span data-dcnode-id="3182" instrument_node="">Right so first of all I should be clear – I’m not great at History, and I do not read many historical novels. This one being based on real people and events, for me it was an absolutely brand new story. Having read the blurb from the author at the back I understand how she has built the story up around the little that is known of Katherine Swynford and John of Gaunt – and done so beautifully.</span><br data-dcnode-id="3181"><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">I found the whole thing highly intriguing and it made fascinating reading. From the wonderfully drawn background and sense of the time, to the characters and the events surrounding them I was engaged and enthralled throughout. At its heart there is an emotional love story and some truly terrific characters.</span><br data-dcnode-id="3178"><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">It has certainly encouraged me to find out some more of the fact behind the fiction – and also given me a great reason for reading more books like this one. In fact I have just added Devils Consort by the same author to my next batch of purchases so you may hear about that one sometime soon.</span><br data-dcnode-id="3175"><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">Recommended for fans of Historical Fiction based in fact and for anyone who has not read in this genre before and are looking for a good place to start.</span><br data-dcnode-id="3172"><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">Happy Reading Folks!</span></span><span data-dcnode-id="3168" instrument_node="">

</span><span data-dcnode-id="3054" id="freeTextContainer4822922307938427173"><span data-dcnode-id="3058" instrument_node="">3 stars is a little generous.</span><br data-dcnode-id="3057"><br data-dcnode-id="3056"><span data-dcnode-id="3055" instrument_node="">I have read several by this author now and they are mildly diverting but not outstandingly historical. I do take the point that not a lot is known etc but others have done well on just as little to go on. The outstanding thing that struck me reading this is that all this author's heroines (they are more romances than HF really) are alike; they could almost be the same character - and they are all prone to a bit of hysterically misunderstanding and angry blaming. I ho</span></span><span data-dcnode-id="3053" instrument_node="">
</span><span data-dcnode-id="3045" id="freeText4822922307938427173" style="display:none"><span data-dcnode-id="3052" instrument_node="">3 stars is a little generous.</span><br data-dcnode-id="3051"><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">I have read several by this author now and they are mildly diverting but not outstandingly historical. I do take the point that not a lot is known etc but others have done well on just as little to go on. The outstanding thing that struck me reading this is that all this author's heroines (they are more romances than HF really) are alike; they could almost be the same character - and they are all prone to a bit of hysterically misunderstanding and angry blaming. I hope this is not representative of the author herself! There is also a tendency to 'feistyness' which does pall and is historically ingenuous at best.</span><br data-dcnode-id="3048"><br data-dcnode-id="3047"><span data-dcnode-id="3046" instrument_node="">The author does still spin a good tale, though; it is always readable though historically annoying. Worth a read if you like a romance with a good dollop of multiple misunderstanding betwixt star-crossed lovers.</span></span><span data-dcnode-id="3044" instrument_node="">

</span><span data-dcnode-id="2924" id="freeTextContainer8045311138203329102"><span data-dcnode-id="2931" instrument_node="">3, maybe 3.5 stars. A long book that took me quite a while to get through. A fictionalised account of the long love affair of the real historical figures Lady Katherine Swynford with John of Gaunt, the Duke of Lancaster. Their incredible story was previously told in the iconic novel </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/33609.Katherine" rel="nofollow noopener" title="Katherine by Anya Seton"><span data-dcnode-id="2930" instrument_node="">Katherine</span></a><span data-dcnode-id="2928" instrument_node=""> by Anya Seton, written in the 1950s, a book which I discovered as a teenager, and was probably one of the first historical romances I ever read. </span><br data-dcnode-id="2927"><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">O'Brien does not try to copy Seton's book in any way - she si</span></span><span data-dcnode-id="2923" instrument_node="">
</span><span data-dcnode-id="2906" id="freeText8045311138203329102" style="display:none"><span data-dcnode-id="2922" instrument_node="">3, maybe 3.5 stars. A long book that took me quite a while to get through. A fictionalised account of the long love affair of the real historical figures Lady Katherine Swynford with John of Gaunt, the Duke of Lancaster. Their incredible story was previously told in the iconic novel </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/33609.Katherine" rel="nofollow noopener" title="Katherine by Anya Seton"><span data-dcnode-id="2921" instrument_node="">Katherine</span></a><span data-dcnode-id="2919" instrument_node=""> by Anya Seton, written in the 1950s, a book which I discovered as a teenager, and was probably one of the first historical romances I ever read. </span><br data-dcnode-id="2918"><br data-dcnode-id="2917"><span data-dcnode-id="2916" instrument_node="">O'Brien does not try to copy Seton's book in any way - she simply retells the story herself in her own way, which was a good move on her part. Her writing was a little slow-moving for me, however, and the book felt too long. There were sections that felt dragged out, then other sections that had sudden, abrupt jumps forward in time. The fascination of the subject material kept me reading, and I admit that O'Brien did convince about the strength of the love between the couple. </span><br data-dcnode-id="2915"><br data-dcnode-id="2914"><span data-dcnode-id="2913" instrument_node="">I was a bit disappointed to find that it was pretty much a closed-door romance though, with no explicit scenes beyond a bit of kissing or very mild touching. I personally would have liked some sex scenes. For me this would have added to the reality of their story. They were probably both very beautiful people, and their illicit romance defied the mores of their time. The fact that both were apparently strongly committed to their Christian faith probably points to the strength of their love. It may have begun in weakness and temptation, but the number of years it lasted, and their eventual marriage, tells us it became a very genuine love that persisted in the face of opposition and shaming.</span><br data-dcnode-id="2912"><br data-dcnode-id="2911"><span data-dcnode-id="2910" instrument_node="">I love that John and Katherine's descendants became ancestors of the Stuart and Tudor royal houses of Scotland and England. John was a younger son of the king but never became a king himself, however his descendants did. This is part of the fascination of the story.</span><br data-dcnode-id="2909"><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">So for me this book was a reasonably good but not outstanding read. Fabulous source material and characters, but the execution of the book lacked some oomph for me, and it was all a little bit flat. I won't be rereading this one, or seeking out other books by this author. Anya Seton's book however has stuck in my mind for years.</span></span><span data-dcnode-id="2905" instrument_node="">

</span><span data-dcnode-id="2815" id="freeTextContainer3551889492972562122"><span data-dcnode-id="2819" instrument_node="">I haven’t read any other Anne O’Brien books, so I have no basis for comparison against other works. I’m personally not a fan of first-person POV for actual historical people, either, but I gave it a chance because of the subject matter.</span><br data-dcnode-id="2818"><br data-dcnode-id="2817"><span data-dcnode-id="2816" instrument_node="">Unfortunately, because of the focus is so astonishingly heavy on the addictive love aspect that these two characters share and little else (romance does not have to be constant gush in my humble opinion, and certainly not almost every single scene) it caused Kathe</span></span><span data-dcnode-id="2814" instrument_node="">
</span><span data-dcnode-id="2806" id="freeText3551889492972562122" style="display:none"><span data-dcnode-id="2813" instrument_node="">I haven’t read any other Anne O’Brien books, so I have no basis for comparison against other works. I’m personally not a fan of first-person POV for actual historical people, either, but I gave it a chance because of the subject matter.</span><br data-dcnode-id="2812"><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">Unfortunately, because of the focus is so astonishingly heavy on the addictive love aspect that these two characters share and little else (romance does not have to be constant gush in my humble opinion, and certainly not almost every single scene) it caused Katherine - in my perception of her history, a woman of strength and intellect as well as grace and dignity - to come off bland and uninspired, and actually irritating. Her perpetual worry is how much she loves John but he might not feel the same, even when he tells her, and she lets us know constantly. Even after a 25+ year relationship, when, after all the things they'd experienced and lived through, she's worrying about whether he actually loves her. I was left wondering that if she was that distracted for so much of her life how she ever got anything done, including learn enough about anything to become a governess to ducal children (which is stressed as the *huge* role it was). I’m positive if she was that shallow and extraordinarily irresolute the Duke of Lancaster wouldn’t have left her such a glowing epitaph or let her so near his children to educate them! But this version of Gaunt, too, leaves much to be desired. </span><br data-dcnode-id="2809"><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">I think the story misses out on all that strength and wilfulness I believe Katherine had in bounds (especially in widowhood), which was still completely possible to possess even with the grace and dignity expected of someone brought up in Queen Philippa’s household. Women could be powerhouses, and have senses of humour, whilst still maintaining their emotions. I don't think a romance story should need to eject that to be romantic. Unfortunately, for me, this version of Katherine Swynford misses out on everything that made her whole, and I find it difficult to like heroines who have nothing much else to offer but selfish devotion.</span></span><span data-dcnode-id="2805" instrument_node="">

</span><span data-dcnode-id="2727" id="freeTextContainer1533383461429185177"><span data-dcnode-id="2731" instrument_node="">Firstly I’d like to thank ED PR for sending me this book to read and give an honest review. I previously read and very much enjoyed The Forbidden Queen (review on my blog) by the same author so I was really keen to get started on this one!</span><br data-dcnode-id="2730"><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node="">The prologue introduced me to Katherine and the unfortunate situation she found herself in. Katherine seemed like a strong, interesting woman and I was immediately drawn in by her. When the Duke’s proposition came along a short while later I found that it wasn’</span></span><span data-dcnode-id="2726" instrument_node="">
</span><span data-dcnode-id="2712" id="freeText1533383461429185177" style="display:none"><span data-dcnode-id="2725" instrument_node="">Firstly I’d like to thank ED PR for sending me this book to read and give an honest review. I previously read and very much enjoyed The Forbidden Queen (review on my blog) by the same author so I was really keen to get started on this one!</span><br data-dcnode-id="2724"><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node="">The prologue introduced me to Katherine and the unfortunate situation she found herself in. Katherine seemed like a strong, interesting woman and I was immediately drawn in by her. When the Duke’s proposition came along a short while later I found that it wasn’t as harsh as I had expected and, even though I felt he was rather quick off the mark, I actually quite liked him. Katherine’s reaction to the proposition was interesting and once again not as I had expected – as I read further and learned the strength of her feelings I began to understand her reaction better.</span><br data-dcnode-id="2721"><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">The Duke’s seduction of Katherine was wonderful to read, this part created a dangerous sort of excitement that radiated from the book. I felt nervous for Katherine when rumours began to circulate and I was surprised by this – being a married woman myself, I thought I would feel a strong dislike towards the ‘scandalous Duchess’ simply because of her involvement with a married man but somehow it wasn’t like that at all. She wasn’t as brazen as I thought she would be and I found myself respecting her attempts to put distance between herself and the Duke.</span><br data-dcnode-id="2718"><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">The whole story captivated me, I was taken along on a historical ride that had me glued to the pages and eventually I was brought to tears by an emotional epilogue. It was beautifully written once again, the author has the wonderful ability of making history come to life. I have to admit that history has never been one of my favourite subjects but with Anne’s books I find myself utterly immersed in the subject – the characters, the setting, the old-fashioned customs, and especially the romance, all combined to give me a fascinating glimpse into the past!</span><br data-dcnode-id="2715"><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">This was another fabulous, romantic read by Anne O’Brien.</span></span><span data-dcnode-id="2711" instrument_node="">

</span><span data-dcnode-id="2516" id="freeTextContainer5198384191255889108"><span data-dcnode-id="2520" instrument_node="">I have to admit that I do enjoy Anne O'Brien as a writer of historical fiction. Maybe it's not great literature, but it's still an enjoyable ready and she actually makes a first person narrative come off, whereas with some other authors it sounds unnatural or is handled clumsily.</span><br data-dcnode-id="2519"><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">O'Brien's latest offering gives us the tale of Katherine de Swynford (nee de Roet), famous (or perhaps infamous!) as the mistress and later wife of John of Gaunt, Duke of Lancaster (and if you didn't know that he marries</span></span><span data-dcnode-id="2515" instrument_node="">
</span><span data-dcnode-id="2504" id="freeText5198384191255889108" style="display:none"><span data-dcnode-id="2514" instrument_node="">I have to admit that I do enjoy Anne O'Brien as a writer of historical fiction. Maybe it's not great literature, but it's still an enjoyable ready and she actually makes a first person narrative come off, whereas with some other authors it sounds unnatural or is handled clumsily.</span><br data-dcnode-id="2513"><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">O'Brien's latest offering gives us the tale of Katherine de Swynford (nee de Roet), famous (or perhaps infamous!) as the mistress and later wife of John of Gaunt, Duke of Lancaster (and if you didn't know that he marries her, I think the title might give it away, so I don't think it's a spoiler!). There actually isn't all that much known about Katherine herself, which may seem surprising. I'm sure there may be other novels about her, but by far the best known is Anya Seton's 'Katherine' which might well give another author pause when looking to cover the same ground. The fact that so little is really known about her life does give an author a fair bit of freedom. It must be fairly obvious that there is a love story in there - she was his mistress for many years and then he chose to marry her, which I doubt anyone would have expected.</span><br data-dcnode-id="2510"><br data-dcnode-id="2509"><span data-dcnode-id="2508" instrument_node="">The novel's subtitle give it as 'the forbidden affair that started the Tudors' - who of course were descended from the legitimated Beaufort line.... but then again Joan was also the maternal grandmother of Edward IV and Richard III! The benefit of hindsight can show us clearly how a seemingly small decision, such as Katherine's decision to acquiesce in becoming John of Gaunt's mistress, can have such a huge impact - namely being a large factor in the Wars of the Roses!</span><br data-dcnode-id="2507"><br data-dcnode-id="2506"><span data-dcnode-id="2505" instrument_node="">I found this a well written and entertaining novel and I do enjoy my historical fiction! If you've read O'Brien before, I think you'll like this and if not I would recommend giving her a try. I find her writing far superior to the much touted Philippa Gregory.</span></span><span data-dcnode-id="2503" instrument_node="">

</span><span data-dcnode-id="2425" id="freeText11142258426813107164" style="display:none"><span data-dcnode-id="2426" instrument_node="">I started reading this book with some trepidation as Anya Seton's KATHERINE was the book that started me on a lifelong obsession with historical novels - and I have eventually ended up writing them myself. I didn't like the over glamorous cover design! At first I felt uncertain - the book was very easy to read and romantic - starting straight into the Katherine Swynford/John of Gaunt relationship with very little build up, but the more I continued, the more I found that the remarkable historical events seemed to take over. This story cannot follow the classical romance because we know roughly what happened and a lot of it was not romantic at all. I felt that Anne O Brian conveyed the darker moments on Katherine's life very well and I found myself reading late at night, gripped by the heroines hardships - desperate for things to improve, as I knew they must. All in all I think this novel does add something of value to Katherine's astonishing story and I feel that the more writers who tackle this interesting period the better. When I finished it I went straight back to read the Anya Seton version again and then on to Alison Weir's excellent biography of Katherine Swynford. That can't be a bad reaction! Who is going to write the next version? Judging by the interest that has developed in the Tudor period from the many different versions - this could be the next big thing!</span></span><span data-dcnode-id="2424" instrument_node="">

</span><span data-dcnode-id="2039" id="freeTextContainer18118812165443719946"><span data-dcnode-id="2052" instrument_node="">I admit to being somewhat cautious with picking this up. I’m fascinated by the figure of Katherine Swynford and her relationship with John of Gaunt, but I hadn’t exactly loved Anya Seton’s </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/33609.Katherine" rel="nofollow noopener" title="Katherine by Anya Seton"><span data-dcnode-id="2051" instrument_node="">Katherine</span></a><span data-dcnode-id="2049" instrument_node="">, the iconic romance novel about the pair. And while I enjoyed Anne O’Brien’s </span><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/32181766.The_Shadow_Queen" rel="nofollow noopener" title="The Shadow Queen by Anne O'Brien"><span data-dcnode-id="2048" instrument_node="">The Shadow Queen</span></a><span data-dcnode-id="2046" instrument_node="">, I was bitterly disappointed by the next novel of hers I read, </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/23249847.The_King_s_Sister" rel="nofollow noopener" title="The King's Sister by Anne O'Brien"><span data-dcnode-id="2045" instrument_node="">The King's Sister</span></a><span data-dcnode-id="2043" instrument_node="">, and many of the faults I’d found in that one were at risk of being repeated in </span><i data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="2040" instrument_node="">, given they take place </span></span><span data-dcnode-id="2038" instrument_node="">
</span><span data-dcnode-id="1970" id="freeText18118812165443719946" style="display:none"><span data-dcnode-id="2037" instrument_node="">I admit to being somewhat cautious with picking this up. I’m fascinated by the figure of Katherine Swynford and her relationship with John of Gaunt, but I hadn’t exactly loved Anya Seton’s </span><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/33609.Katherine" rel="nofollow noopener" title="Katherine by Anya Seton"><span data-dcnode-id="2036" instrument_node="">Katherine</span></a><span data-dcnode-id="2034" instrument_node="">, the iconic romance novel about the pair. And while I enjoyed Anne O’Brien’s </span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/32181766.The_Shadow_Queen" rel="nofollow noopener" title="The Shadow Queen by Anne O'Brien"><span data-dcnode-id="2033" instrument_node="">The Shadow Queen</span></a><span data-dcnode-id="2031" instrument_node="">, I was bitterly disappointed by the next novel of hers I read, </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/23249847.The_King_s_Sister" rel="nofollow noopener" title="The King's Sister by Anne O'Brien"><span data-dcnode-id="2030" instrument_node="">The King's Sister</span></a><span data-dcnode-id="2028" instrument_node="">, and many of the faults I’d found in that one were at risk of being repeated in </span><i data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="2025" instrument_node="">, given they take place at roughly the same time and focus on the historical figures closely connected to each other. </span><br data-dcnode-id="2024"><br data-dcnode-id="2023"><span data-dcnode-id="2022" instrument_node="">To my delight, however, I found </span><i data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="2019" instrument_node=""> to be a fairly decent read. Whatever my reasons for picking up a book, I always hope I’ll like it and, even if </span><i data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="2016" instrument_node=""> isn’t a perfect match for me, I did at least somewhat enjoy reading it.</span><br data-dcnode-id="2015"><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node="">Part of the success with </span><i data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="2010" instrument_node=""> is O’Brien’s decision to focus in on the relationship between Katherine Swynford and John of Gaunt almost to the exclusion of all else. That does have some drawbacks – it means that primary conflict of the story is the will they/won’t they/they are/but will it last/oh no things are terrible/but can things get better/etc. romantic drama. At times this conflict verges on irritating as it’s repetitive and drawn out – drama for the sake of drama – but it also means that the focus is primarily on Katherine Swynford and her experiences of life, as opposed to court drama as glimpsed by Katherine Swynford.</span><br data-dcnode-id="2009"><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node="">As a side effect, the world that Katherine inhabits becomes very insular, which does mean that some things are skipped or glossed over. There’s one chapter in which Gaunt’s brother, the Black Prince, dies, shortly followed by their father, King Edward III, before ten-year-old Richard II is coronated and then Katherine’s daughter, Blanche, sickens and dies. With the exception of Blanche’s death, these events are only given a glancing mention. Perhaps that’s unfair criticism – Anne O’Brien can’t include everything in great detail and it is debatable whether these events would have relevant to Katherine – but as we’d already seen Gaunt in tears because of his brother’s ill-health and expressing fears that his father will soon follow his brother to the grave so it feels a bit odd gloss over these fears coming true. </span><br data-dcnode-id="2006"><br data-dcnode-id="2005"><span data-dcnode-id="2004" instrument_node="">Hilariously, as well, Katherine’s experience of the Great Uprising of 1381 is largely about her hiding in Pontefract and being the sole reason why Constanza, the Duchess of Lancaster (that is, the wife of the man Katherine’s having an affair with) is refused refuge in Pontefract, and her greatest grief is the loss of the Savoy Palace in London. Not one mention is made of the fact that her stepson, Gaunt’s only son and heir, Henry Bolingbroke, was in the Tower of London when the rebels broke into it and was lucky to escape with his life. Or that, within Anne O’Brien’s story universe, his sister and Katherine’s charge, Elizabeth of Lancaster, was there requiring rescue as well. </span><br data-dcnode-id="2003"><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node="">At another time, the feud between Henry Bolingbroke and Thomas Mowbray appears to happen before Richard II’s truce with France, his second marriage or his revenge on the Lords of Appellant, only for references to those events to be shoved in later. </span><br data-dcnode-id="2000"><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">I enjoyed O’Brien’s characterisation of Katherine Swynford. Her personality felt mature and well-thought out, there’s a bit of complexity in that while she’s generally a good person, she does act poorly and pettily at times (see: doing nothing when her lover’s wife is refused refuge when she’s the sole reason for it). There’s not much historical evidence to go on, but it did feel this could have been Katherine Swynford. There are elements of John of Gaunt’s character I felt were quite true to life – his arrogance, his assurance that he will get what he wants (which unfortunately comes across quite rape-y when Katherine initially refuses to become his mistress) – and I do love the idea that he was quite terrible at being romantic (“you stir my loins, Katherine de Swynford” (exact quote)and “this quitclaim was issued on Valentine’s Day which means I still love you even though I’ve just rendered any obligations I have to you null and void” (paraphrased)), though perhaps that was inadvertent and I was really meant to be swooning over these things.</span><br data-dcnode-id="1997"><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node="">I do, however, feel that his character was white-washed. I mean, this is the guy who threatened to drag the Archbishop of Canterbury out of his own cathedral by the hair on his head. Here, the fact that he’s the number one enemy of the rebels in the Great Uprising is simply because he’s been made into the “scapegoat” of the unpopular policies of Richard II’s court and parliament – he hasn’t done anything wrong, honest, he’s really innocent! Similarly, no real mention is made of the fears that Gaunt would usurp the throne, the fact that he was desperately unpopular and efforts were taken by both parliament and the Black Prince to safeguard Richard II’s inheritance and succession to the throne. No, Gaunt is just generally a good guy and his unpopularity is down to him being an innocent scapegoat of unpopular policies. This, ultimately, is a big, steaming pile of bull. </span><br data-dcnode-id="1994"><br data-dcnode-id="1993"><span data-dcnode-id="1992" instrument_node="">O’Brien’s take on Richard II is still awful and he gets unfairly blamed for Gaunt’s death but at least he’s barely in the book this time yay. </span><br data-dcnode-id="1991"><br data-dcnode-id="1990"><span data-dcnode-id="1989" instrument_node="">In terms of historical accuracy, I don’t have a lot to say. O’Brien has a lot of room to invent for Katherine, because her world is so insular and what is known about her is so little, and what I tended to notice was relatively small (e.g. Thomas of Woodstock being named Duke of Gloucester in Edward III’s lifetime, when he was only raised to that title by Richard II), or repeats of mistakes I’d previously found in </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">The King’s Sister</span></i><span data-dcnode-id="1986" instrument_node="">. If you’re interested in historical accuracy, I’d recommend looking at </span><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2342290267" rel="nofollow noopener"><span data-dcnode-id="1985" instrument_node="">my review of that book</span></a><span data-dcnode-id="1983" instrument_node="">, but here follows a sampler. The Appellant Crisis was not just about removing Robert de Vere and his influence over Richard II but a whole host of issues that likely lead to the brief disposition of Richard and did lead to the forced exile or execution of a number of other individuals close to him. O’Brien repeats the same story about Bolingbroke and his wife Mary de Bohun consummating their marriage too early and their tragically short-lived son, Edward – the “evidence” of this narrative actually refers to Humphrey of Gloucester, the son of Thomas of Woodstock and Eleanor de Bohun, and the name “Edward” was invented by Alison Weir. Ian Mortimer’s </span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1106062.The_Fears_of_Henry_IV_The_Life_of_England_s_Self_made_King" rel="nofollow noopener" title="The Fears of Henry IV The Life of England's Self-made King by Ian Mortimer"><span data-dcnode-id="1982" instrument_node="">The Fears of Henry IV: The Life of England's Self-made King</span></a><span data-dcnode-id="1980" instrument_node="">, published several years before </span><i data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="1977" instrument_node="">, debunked this quite clearly. And, to be honest, if I bought this biography in an actual physical bookshop in Australia for under $30 in 2018, I’m sure Anne O’Brien could have found an affordable copy somewhere in England while she was researching and writing her book, much closer to the original publication date. It’s not as though it’s a vital plot point in her story; Henry and Mary barely appear in </span><i data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="1974" instrument_node="">.</span><br data-dcnode-id="1973"><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node="">Yet, on the whole, I largely enjoyed this novel. It wasn’t perfect for me – I’m not much of a fan of melodramatic romances, and the treatment of Richard II remained a bugbear for me. But I enjoyed the characters and world and plot a lot more than I thought I would, which is always great. 2 stars. </span></span><span data-dcnode-id="1969" instrument_node="">

</span><span data-dcnode-id="1790" id="freeTextContainer7914121015834282873"><span data-dcnode-id="1813" instrument_node="">This is going to be the most complex review that I think I have written. As complex as the scandalous affair between a duke and a young widow..</span><br data-dcnode-id="1812"><br data-dcnode-id="1811"><span data-dcnode-id="1810" instrument_node="">Okay so, the first 200 pages were the longest and most painful of my life and I very, </span><i data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node=""> very </span></i><span data-dcnode-id="1807" instrument_node=""> nearly gave up on reading it. </span><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node="">"I want you!"</span><br data-dcnode-id="1804"><span data-dcnode-id="1803" instrument_node="">"But it's </span><b data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node=""> such </span></b><span data-dcnode-id="1800" instrument_node=""> a sin!"</span><br data-dcnode-id="1799"><span data-dcnode-id="1798" instrument_node="">"I know... but still...?"</span><br data-dcnode-id="1797"><span data-dcnode-id="1796" instrument_node="">"Well I would, but you know... sins and all that..."</span><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node="">To-ing and fro-ing like a medieval boat travelling to Aquitaine.</span><br data-dcnode-id="1793"><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node="">Regardless I stuck with it, like a young widow with her </span></span><span data-dcnode-id="1789" instrument_node="">
</span><span data-dcnode-id="1741" id="freeText7914121015834282873" style="display:none"><span data-dcnode-id="1788" instrument_node="">This is going to be the most complex review that I think I have written. As complex as the scandalous affair between a duke and a young widow..</span><br data-dcnode-id="1787"><br data-dcnode-id="1786"><span data-dcnode-id="1785" instrument_node="">Okay so, the first 200 pages were the longest and most painful of my life and I very, </span><i data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node=""> very </span></i><span data-dcnode-id="1782" instrument_node=""> nearly gave up on reading it. </span><br data-dcnode-id="1781"><span data-dcnode-id="1780" instrument_node="">"I want you!"</span><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">"But it's </span><b data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node=""> such </span></b><span data-dcnode-id="1775" instrument_node=""> a sin!"</span><br data-dcnode-id="1774"><span data-dcnode-id="1773" instrument_node="">"I know... but still...?"</span><br data-dcnode-id="1772"><span data-dcnode-id="1771" instrument_node="">"Well I would, but you know... sins and all that..."</span><br data-dcnode-id="1770"><span data-dcnode-id="1769" instrument_node="">To-ing and fro-ing like a medieval boat travelling to Aquitaine.</span><br data-dcnode-id="1768"><br data-dcnode-id="1767"><span data-dcnode-id="1766" instrument_node="">Regardless I stuck with it, like a young widow with her </span><s data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node=""> twit </span></s><span data-dcnode-id="1763" instrument_node=""> hero of a Duke.</span><br data-dcnode-id="1762"><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node="">After these 200 pages however there was a subtle change in the theme of the story, gone was the oppressing idea of sin and the intial trepidation concerning their souls should they become adulterers, and in its place grew a deep love that was really truly touching. This was a very long novel and at times it felt as though there was nothing going on to develop the plot, yet there was such a subtle and well-crafted development that it was without realisation that I watched Kathryn and John evolve from their lust and into fleeting glances that conveyed an entire conversation. These touching and gentle exchanges that spoke more of love and respect that that inital burning desire. By the end of the novel I felt </span><i data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node=""> everything </span></i><span data-dcnode-id="1757" instrument_node=""> that these characters were feeling, just because O'Brien had connected me so closely to their relationship and lives. I hurt when Kathryn received the Quitclaim, and I cried in my car on my lunch break reading the final chapters, reading those final precious minutes between them. Moreso as Kathryn talks to John once he has already gone and her scolding him for putting her back in the widow's weeds that he so hated in the first chapters. A real summation of their lives, a full circle from the birth of their love to death.</span><br data-dcnode-id="1756"><br data-dcnode-id="1755"><span data-dcnode-id="1754" instrument_node="">I found Kathyn to be quite a weak character despite the fact that O'Brien obviously tries to display her as a strong woman. I wish she had called John up on more of his slights against her, such as his other affairs. If he really loved her more than any other I would sincerely doubt that sleeping with anyone but her would be acceptable to him - would he have allowed her to sleep with another man? - and to give the excuse of "Well, I'm a man, duhhh." really put me off John as a character, undermining his image as an honourable man and as the true love of Kathryn. </span><br data-dcnode-id="1753"><span data-dcnode-id="1752" instrument_node="">As the novel wore on, I grew to feel a begrudging sympathy with Kathryn who seemed destined to love a man who slighted her often. </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1745" style="display: none"><span data-dcnode-id="1749" instrument_node="">[ When John died and chose to buried next to Blanche, I was so furious. At John for betrying Kathryn in death and choosing to save his soul rather than stand by a lifetime of promises that he did not regret their relationship, and at Kathryn who accepted this insult as though she had expected it. I was devastated for her!  </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1746" instrument_node="">]</span></span><br data-dcnode-id="1744"><br data-dcnode-id="1743"><span data-dcnode-id="1742" instrument_node="">The book was a bit too long, John wasn't the honourable hero that I would usually love and Kathryn wasn't as strong as I had hoped her to be, but the writing of this novel was so spellbinding and completely engrossing, and my reaction was just so strong. I was emotionally connected to the characters for better and for worse and after crying my way through the last few chapters and spending the remainder of the day thinking about them (and hoping that John was nicer in real life...) I couldn't not give four stars.</span></span><span data-dcnode-id="1740" instrument_node="">

</span><span data-dcnode-id="1647" id="freeTextContainer11023790033163115067"><span data-dcnode-id="1654" instrument_node="">Even though it may not be fair, it is impossible for me to think about this book without comparing it to Anya Seton's </span><i data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Katherine</span></i><span data-dcnode-id="1651" instrument_node="">, which is one of my favourite books ever. That is also the reason why I simply </span><b data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">had</span></b><span data-dcnode-id="1648" instrument_node=""> to read this book when I stumbled upon it in the library - how could I resist reading another take of the captivating love affair between Katherine and John, even though I had reservations from the beginning because I knew it could not be nearly as wonderful as Seton's novel. Without this</span></span><span data-dcnode-id="1646" instrument_node="">
</span><span data-dcnode-id="1617" id="freeText11023790033163115067" style="display:none"><span data-dcnode-id="1645" instrument_node="">Even though it may not be fair, it is impossible for me to think about this book without comparing it to Anya Seton's </span><i data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Katherine</span></i><span data-dcnode-id="1642" instrument_node="">, which is one of my favourite books ever. That is also the reason why I simply </span><b data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">had</span></b><span data-dcnode-id="1639" instrument_node=""> to read this book when I stumbled upon it in the library - how could I resist reading another take of the captivating love affair between Katherine and John, even though I had reservations from the beginning because I knew it could not be nearly as wonderful as Seton's novel. Without this comparison I might have given </span><i data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="1636" instrument_node=""> three stars, but because of </span><i data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Katherine</span></i><span data-dcnode-id="1633" instrument_node=""> I just can't. Then again, the writing really isn't very good, so probably not. The awfully modern "medieval" cover (which is of course not the author's fault) and the typos don't help making a favourable impression either.</span><br data-dcnode-id="1632"><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">While </span><i data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Katherine</span></i><span data-dcnode-id="1627" instrument_node=""> tells the story of Katherine's life from the age of 16 to old age with vivid descriptions of medieval England, </span><i data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">The Scandalous Duchess</span></i><span data-dcnode-id="1624" instrument_node=""> offers a very narrow point of view. O'Brien tells the story through Katherine's eyes in first person narrative, beginning after she was first widowed and ending when she becomes a widow again. The main focus is far from the politics and "the big picture". This book is all about the love affair and Katherine's inner turmoil: conflicting emotions, love, passion, jealousy, anguish and pangs of conscience. I have no idea why it had to be stretched out to nearly 600 pages - the repetition grew weary after a while.</span><br data-dcnode-id="1623"><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">I know that in truth we know very little about the details of Katherine's life and her relationship with John of Gaunt, but still there is too much in this book that feels simply wrong, and not only because I am subconsciously thinking Seton's version to be the "real" story. My main complaints have to do with family trees and timelines. Even though there is no absolute certainty, Katherine is generally believed to be the youngest of her siblings, yet here Philippa is her little sister. Most sources say that Katherine married Hugh Swynford at the age of 16 or 17, yet here she becomes a mother at 14. I have no idea why O'Brien has made Thomas the youngest Beaufort instead of Joan, for I haven't encountered any other source saying that's the correct order. </span><br data-dcnode-id="1620"><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">The author's note doesn't offer any explanations for the deviations from the generally accepted dates, but instead the "end credits" provides the reader with an agonisingly long description of "a day in the life" of the author and suggestions of places where one should read this book (too late, by the way - maybe you should have started with those, not that any of those were viable options for me anyway).</span></span><span data-dcnode-id="1616" instrument_node="">

</span><span data-dcnode-id="1514" id="freeTextContainer1465981796340116630"><span data-dcnode-id="1527" instrument_node="">I remember walking out of the theater the night I went to see Keira Knightley's version of </span><i data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Pride and Prejudice</span></i><span data-dcnode-id="1524" instrument_node=""> and thinking, "That is just a good </span><i data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">story</span></i><span data-dcnode-id="1521" instrument_node="">". No matter how many times it's been told, there is just something satisfying in the telling of it.</span><br data-dcnode-id="1520"><br data-dcnode-id="1519"><span data-dcnode-id="1518" instrument_node="">As far as I'm concerned, the same goes for the true story of John of Gaunt and Katherine Swynford. However, Anya Seton's novel </span><i data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Katherine</span></i><span data-dcnode-id="1515" instrument_node=""> is considered such a classic, I think it's scared away some other historical fiction authors who might have been</span></span><span data-dcnode-id="1513" instrument_node="">
</span><span data-dcnode-id="1484" id="freeText1465981796340116630" style="display:none"><span data-dcnode-id="1512" instrument_node="">I remember walking out of the theater the night I went to see Keira Knightley's version of </span><i data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Pride and Prejudice</span></i><span data-dcnode-id="1509" instrument_node=""> and thinking, "That is just a good </span><i data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">story</span></i><span data-dcnode-id="1506" instrument_node="">". No matter how many times it's been told, there is just something satisfying in the telling of it.</span><br data-dcnode-id="1505"><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">As far as I'm concerned, the same goes for the true story of John of Gaunt and Katherine Swynford. However, Anya Seton's novel </span><i data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Katherine</span></i><span data-dcnode-id="1500" instrument_node=""> is considered such a classic, I think it's scared away some other historical fiction authors who might have been attracted to this tale. </span><br data-dcnode-id="1499"><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">I'm glad Anne O'Brien took up the challenge. I have to agree with a previous reviewer that it was just nice to spend time with this couple again.</span><br data-dcnode-id="1496"><br data-dcnode-id="1495"><span data-dcnode-id="1494" instrument_node="">This was very much a historical romance. It is told from Katherine's perspective and focuses almost exclusively on John and Katherine's relationship. A lot of ink is spent on their passionate fights and passionate reunions at the expense of secondary character development and any but the most cursory examinations of 14th Century politics or socioeconomic realities. For example, there was a lot of hand-wringing about how their affair went against God, but I never got a sense of how powerful a force the church was on daily life in the middle ages. And their children wandered in and out of the story as the plot demanded. These flaws could have been quite annoying, but I found myself </span><i data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">liking</span></i><span data-dcnode-id="1491" instrument_node=""> this couple despite them. </span><br data-dcnode-id="1490"><br data-dcnode-id="1489"><span data-dcnode-id="1488" instrument_node="">These were characters with a sense of humor. It was exciting to see both of them realize (perhaps at separate times) that this was an affair based on more than just lust. And, I admit by the time I got to Katherine's final conversation with John, I was in tears.</span><br data-dcnode-id="1487"><br data-dcnode-id="1486"><span data-dcnode-id="1485" instrument_node="">This may not be the definitive take on this story, but it's one well worth a look. It's too bad that it hasn't been published yet in the U.S. and is somewhat hard to come by on this side of the pond.</span></span><span data-dcnode-id="1483" instrument_node="">

</span><span data-dcnode-id="1384" id="freeTextContainer12770642952464432145"><span data-dcnode-id="1391" instrument_node="">One of the greatest love stories, the 25 year affair and eventual marriage of Katherine Swynford and John of Gaunt, Duke of Lancaster, younger son of King Edward III. </span><br data-dcnode-id="1390"><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">The story isn't new to me, I read the classic, Anya Seton's </span><i data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Katherine</span></i><span data-dcnode-id="1385" instrument_node=""> quite a few years ago and was excited to read Anne O'Brien's take on things. There's little documented of Katherine which offers an author quite a bit of freedom but Anne O'Brien grounds this fictionalised story firmly in historical events; The Black Death, the P</span></span><span data-dcnode-id="1383" instrument_node="">
</span><span data-dcnode-id="1359" id="freeText12770642952464432145" style="display:none"><span data-dcnode-id="1382" instrument_node="">One of the greatest love stories, the 25 year affair and eventual marriage of Katherine Swynford and John of Gaunt, Duke of Lancaster, younger son of King Edward III. </span><br data-dcnode-id="1381"><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">The story isn't new to me, I read the classic, Anya Seton's </span><i data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Katherine</span></i><span data-dcnode-id="1376" instrument_node=""> quite a few years ago and was excited to read Anne O'Brien's take on things. There's little documented of Katherine which offers an author quite a bit of freedom but Anne O'Brien grounds this fictionalised story firmly in historical events; The Black Death, the Peasants' Revolt, The Hundred Years' War.</span><br data-dcnode-id="1375"><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node="">I was once again surprised that John &amp; Katherine's longstanding, passionate affair didn't elicit more sympathy from me, for John's wife, Constance of Castile. But, no attacks of conscience here. For me, great love definitely won over strategic alliance. </span><br data-dcnode-id="1372"><br data-dcnode-id="1371"><span data-dcnode-id="1370" instrument_node="">John was one of the most charismatic and influential men of his time ... I'd have had a hard time refusing his </span><i data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">mistress offer</span></i><span data-dcnode-id="1367" instrument_node="">, even fearing for my reputation and mortal soul. HA </span><br data-dcnode-id="1366"><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">John and Katherine had four 'Beaufort' children together, legitimised after their marriage, and from their descendants came the Royal Houses of York and Tudor ... a very significant couple to dynastic England. </span><br data-dcnode-id="1363"><br data-dcnode-id="1362"><span data-dcnode-id="1361" instrument_node="">Through political unrest, public scandal, great shame, separation and sorrow, their love stood the test of time. </span><br data-dcnode-id="1360"></span><span data-dcnode-id="1358" instrument_node="">

</span><span data-dcnode-id="1169" id="freeText284845808445774061" style="display:none"><span data-dcnode-id="1175" instrument_node="">I think any author writing a novel about Katherine Swynford has a hard row to hoe. The quintessential historical novel about this enigmatic and historically important lady has to be Anya Seton’s ‘Katherine’ and for many readers any other novels about her are going to be measured against this classic and found wanting. Unfortunately this new novel featuring Katherine falls into this category.</span><br data-dcnode-id="1174"><br data-dcnode-id="1173"><span data-dcnode-id="1172" instrument_node="">If you haven’t read ‘Katherine’ then you will probably enjoy this romanticised version of what is actually a marvellous love story. John of Gaunt and Katherine Swynford overcame many years of separation to achieve what seems to have been a happy marriage and this shines through the book. I found some of the dialogue clunky and unbelievable and found myself skimming some of it. Unfortunately I found this book a disappointing read.</span><br data-dcnode-id="1171"><br data-dcnode-id="1170"></span><span data-dcnode-id="1168" instrument_node="">

</span><span data-dcnode-id="1090" id="freeText17424783081304664883" style="display:none"><span data-dcnode-id="1091" instrument_node="">Oh I do love a good medieval romance! And the story of Katherine de Swynford and John of Gaunt is a favourite of mine. Anne O'Brien writes a good story and keeps us entertained throughout the book. I think she covers the history relatively well considering the lack of material available to us. I liked the way she portrayed Lancaster as well as the relationship between him, his wife, his mistress, his children, his king. And I liked the way she portrayed Katherine - the mistress who has always been of interest to me (after all where would the Plantagenet and Tudor lines without her!) I didn't like the way she skipped through "love scenes" - definitely would have liked a bit more detail!! - but it is a Harlequin book LOL! </span></span><span data-dcnode-id="1089" instrument_node="">

</span><span data-dcnode-id="932" id="freeText2877040528153960187" style="display:none"><span data-dcnode-id="933" instrument_node="">I don't tend to think of myself as a fan of historical fiction, but lately every time I pick up a historical read, I love the escapism and the intensity of the story. Anne O'Brien's 'The Scandalous Duchess' is no exception. Lady Katherine is a fabulously strong, scrupulous heroine, so it's surprising to find her lured into an ongoing affair with the powerful, seductive Duke of Lancaster. More surprising still are the twists and turns in their longstanding relationship. I loved the historical detail and most of all the sense of a very private love constantly challenged by public standards and scrutiny. Still very much relevant today. </span></span><span data-dcnode-id="931" instrument_node="">
