</span><span data-dcnode-id="351" id="freeTextContainer13471565716651909476"><i data-dcnode-id="356"><span data-dcnode-id="359" instrument_node="">Librarian Note: There is more than one author in the GoodReads database with this name. </span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/topic/show/44217-master-list-of-author-disambiguation-by-spaces" rel="nofollow noopener"><span data-dcnode-id="358" instrument_node="">See this thread for more information.</span></a></i><span data-dcnode-id="355" instrument_node=""> </span><br data-dcnode-id="354"><br data-dcnode-id="353"><span data-dcnode-id="352" instrument_node="">My home is in the Welsh Marches, although much of my early life was spent in Yorkshire, most recently in the East Riding.Ann O'Brien The Marches is a remote region of England, surrounded by echoes from the past. Hereford is close with its famous Mappa Mundi and chained libr</span></span><span data-dcnode-id="350" instrument_node="">
</span><span data-dcnode-id="327" id="freeText13471565716651909476" style="display:none"><i data-dcnode-id="346"><span data-dcnode-id="349" instrument_node="">Librarian Note: There is more than one author in the GoodReads database with this name. </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/topic/show/44217-master-list-of-author-disambiguation-by-spaces" rel="nofollow noopener"><span data-dcnode-id="348" instrument_node="">See this thread for more information.</span></a></i><span data-dcnode-id="345" instrument_node=""> </span><br data-dcnode-id="344"><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">My home is in the Welsh Marches, although much of my early life was spent in Yorkshire, most recently in the East Riding.Ann O'Brien The Marches is a remote region of England, surrounded by echoes from the past. Hereford is close with its famous Mappa Mundi and chained library.So is Shrewsbury, and also Ludlow with its splendid castle and its connections with our Plantagenet and Tudor kings. With my husband, I live in an eighteenth century timber framed cottage, which itself must have seen much history over two hundred years.</span><br data-dcnode-id="341"><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">I have always enjoyed the appeal of History.I taught the subject with enthusiasm but it became my ambition to write historical romances. My first novel, The Runaway Heiress, was published by Mills and Boon in 2004.</span><br data-dcnode-id="338"><span data-dcnode-id="337" instrument_node="">This first book was a Regency Romance in the great tradition of Georgette Heyer - who has not admired her skill and delicate touch for the period? I have drawn on my interest in the Stuart century to write about the English Civil War and Restoration England of Charles II. Living in the Marches however I soon discovered the wealth of atmosphere and legend in this isolated part of England from medieval times. It was not long before I was encouraged to create a medieval romance inConquering Knight, Captive Lady.</span><br data-dcnode-id="336"><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">When not writing, I have a large rambling garden where George and I grow organic vegetables and soft fruit - or perhaps I should admit that he grows them whilst I pick and cook them. We have a wild garden, an orchard, a formal pond and herbaceous flower borders. We share it all with rabbits and pheasants, frogs and goldfinches, hedgehogs and buzzards. It is a beautiful place. When we first settled into our cottage I planted a herb garden on a Tudor pattern with stone pathways and clipped box hedges. From this I developed my interest in herbs and their uses.</span><br data-dcnode-id="333"><br data-dcnode-id="332"><span data-dcnode-id="331" instrument_node="">Nicholas Culpeper's The Complete Herbal, a fascinating resource to a historical novelist first published in 1649, has become essential bedside reading. As a result the use of herbs in medicine and witchcraft, for both good and ill, has appeared in some of my novels.</span><br data-dcnode-id="330"><br data-dcnode-id="329"><span data-dcnode-id="328" instrument_node="">For pure relaxation I enjoy yoga as well as singing with a local Choral Society. Watercolour painting allows me to simply sit and appreciate the landscape and the flowers in my garden, when my mind is busy constructing my next plot.</span></span><span data-dcnode-id="326" instrument_node="">
