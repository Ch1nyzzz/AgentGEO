</span><span data-dcnode-id="3784" id="freeText17722399143202201344" style="display:none"><span data-dcnode-id="3787" instrument_node="">When I heard about Marriage Most Scandalous was about I was intrigued. The hero was described as a mercenary which made my ears perk up. I love dangerous romance heroes. What can I say? I was tempted, despite my limited financial funds to buy the book when it came out (from Walmart at a considerable discount), but since money wasn't good I elected to wait. And lo and behold, my patience was rewarded when I found it at the library. I finished the book in 2 days (because I saw three movies also in that time period), and I was totally satisfied.</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">Sebastian Townshend is in a word, a fantastic hero, despite his flaws: broody, rude, short-tempered. But also principled, vulnerable, and heroic. I pictured Christian Bale with a ponytail: tall, brawny, beautiful, brownish eyes, brooding. Perfection. Although I could not find an actress who fit Maggie's description, I had a very good picture of her in my head. This book definitely had elements that I love in my romance novels: dark, brooding hero, with an air of danger, who is disgraced for a past event that isn't totally his fault. A strong-willed, intelligent heroine who can handle him. And loads of chemistry. Sebastian's sexuality fairly erupted off the page. He makes such a very determined assault on Maggie's virtue that I know if I were in her shoes I would find very hard to resist, especially since their pretend marriage puts them in very close quarters. I felt the need to fan myself as I read the book. Lovely in a word. The secondary characters were also quite interesting and well-drawn. Of course there's never enough time to delve too deeply but JL tantalized the reader enough to wish that the book was 300 pages longer. As I finished this book I knew that my Johanna Lindsey slump was broken</span></span><span data-dcnode-id="3783" instrument_node="">

</span><span data-dcnode-id="3689" id="freeTextContainer436591360898602149"><b data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">2.5 I might be at the end of my binge Stars</span></b><br data-dcnode-id="3692"><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">I occasionally go on a romance run and binge read romance novels back to back until they start to seem silly and tedious…I think I’m there. It isn’t necessarily that this is a bad Historical Romance….but it isn’t a great one either. I LONG for a really good HR story where both the romance and the plot line up and are both good. For me this had a decent plot that I liked the revelation of at the end and the romance had moments but that was about it. Most</span></span><span data-dcnode-id="3688" instrument_node="">
</span><span data-dcnode-id="3655" id="freeText436591360898602149" style="display:none"><b data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">2.5 I might be at the end of my binge Stars</span></b><br data-dcnode-id="3685"><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">I occasionally go on a romance run and binge read romance novels back to back until they start to seem silly and tedious…I think I’m there. It isn’t necessarily that this is a bad Historical Romance….but it isn’t a great one either. I LONG for a really good HR story where both the romance and the plot line up and are both good. For me this had a decent plot that I liked the revelation of at the end and the romance had moments but that was about it. Most of the time it was just blah for me.</span><br data-dcnode-id="3682"><br data-dcnode-id="3681"><b data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">First the Plot:</span></b><br data-dcnode-id="3678"><br data-dcnode-id="3677"><span data-dcnode-id="3676" instrument_node="">I actually liked this most about the book. Sebastian killed his best friend in a Duel, was disowned by his family and had to leave the country. That all happens in the prologue so not a spoiler. He is working as a type of mercenary when Maggie finds him quite accidentally and convinces him to return to solve the mystery of who is trying to kill his father. </span><br data-dcnode-id="3675"><br data-dcnode-id="3674"><span data-dcnode-id="3673" instrument_node="">Okay so I really wasn’t impressed at first because I thought I had figured out the mystery really early, in fact I was sure of it. But in the last 30% I found out I totally misjudged the mystery and then the plot became infinitely more interesting to me. A book that had been just ho hum was now, way more interesting and I did very much enjoy how the mystery played out.</span><br data-dcnode-id="3672"><br data-dcnode-id="3671"><b data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Second the Romance:</span></b><br data-dcnode-id="3668"><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">I wanted desperately to like it but I didn’t. I liked the bad boy persona of ‘The Raven’ but it came and went too easy and one minute Sebastian was a devilish rogue with ambiguous morals and the next a perfect gentleman. I much preferred the rogue, I admit it I sometimes like it when the hero is a bit of a jerk. </span><br data-dcnode-id="3665"><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">Then there is Maggie who is all prim properness. I liked her for the most part, she was headstrong and stubborn and a little bit wild. What I didn’t like is the initial sex scene. Sebastian asks her to say “yes” before going all the way and she says “no”. Okay it is very clear from what is happening that she is into the pre love making but she still said “no”. He says “okay as long as we both know you mean yes.” I am a huge proponent of No means No, no matter what the signals say. So that definitely ruined the initial smexy times for me. I would have enjoyed it better if he left her wanting what she said she didn’t want.</span><br data-dcnode-id="3662"><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">The romance ended up turning out cute in the end but some of it just really left a sour taste in my mouth.</span><br data-dcnode-id="3659"><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">So overall I liked the mystery, but wasn’t sold on the romance (which is really what I read this for). </span><br data-dcnode-id="3656"></span><span data-dcnode-id="3654" instrument_node="">

</span><span data-dcnode-id="3392" id="freeText9053536602328631529" style="display:none"><span data-dcnode-id="3429" instrument_node="">"Marriage Most Scandalous" is the story of Margaret "Maggie" and Sebastian.</span><br data-dcnode-id="3428"><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">What an unexpectedly sweet read!</span><br data-dcnode-id="3425"><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">The book begins with an unwanted duel, which ends in a death, heartbreak and banishment. </span><br data-dcnode-id="3422"><br data-dcnode-id="3421"><span data-dcnode-id="3420" instrument_node="">Eleven years later, our H, the son of the eighth Earl of Edgewood has assumed the identity of the infamous spy known as "The Raven". He travels the world helping rogues with his companions in exchange for a price, avoiding England like a plague. That is until the h tracks him down..</span><br data-dcnode-id="3419"><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">Our h is a distant family friend, who is taken in by the H's father when she gets orphaned. When the Earl begins to have mysterious accidents, the h suspects foul play and spends months tracking down the H. She soon does, and bribes him to come and find the culprit for a hefty sum. His disguise is to be her newly wed husband, rather than be the prodigal son..</span><br data-dcnode-id="3416"><br data-dcnode-id="3415"><span data-dcnode-id="3414" instrument_node="">But as the H returns to the family he was abandoned by, he finds lots of surprise, the biggest one being his sizzling attraction to his curvaceous "bride".</span><br data-dcnode-id="3413"><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">Very enjoyable read! Likable h and H who are quite suited to one another, bantering and totally light up the sheets. The mystery element was well plotted and I liked how things tied up together at the end- did not see it coming! Secondary characters contributed significantly to the plot, and I like the dynamic between the H, his father and the grandmother (the stubborn trio). The angst was minimal and everything was just..nice.</span><br data-dcnode-id="3410"><br data-dcnode-id="3409"><span data-dcnode-id="3408" instrument_node="">Recommended!</span><br data-dcnode-id="3407"><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">Safe for me/SWE for others </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="3398" style="display: none"><span data-dcnode-id="3402" instrument_node="">[ they've known each other distantly for years- he has obviously been with OW in the meanwhile and the h had caught him kissing OW in the past. However, their actual attraction starts in the present  </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3399" instrument_node="">]</span></span><br data-dcnode-id="3397"><span data-dcnode-id="3396" instrument_node="">4/5</span><br data-dcnode-id="3395"><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">P.S. I will always miss you Ms Lindsay &lt;3</span></span><span data-dcnode-id="3391" instrument_node="">

</span><span data-dcnode-id="3278" id="freeTextContainer9196579403512328061"><span data-dcnode-id="3283" instrument_node="">I wish Goodreads would allow you to give negative ratings. </span><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">First of all, let me just say that one of my biggest pet peeve is when authors of historical fiction/romance use words or phrases that were obviously not used during that time period. </span><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node="">Johanna Lindsey is an author who is guilty of this on multiple occasions. Usually, it’s a just a word or two, so I’m not extremely annoyed by it. But this particular book was just filled with modern words and phrases, it droved me crazy. Someone living in E</span></span><span data-dcnode-id="3277" instrument_node="">
</span><span data-dcnode-id="3264" id="freeText9196579403512328061" style="display:none"><span data-dcnode-id="3276" instrument_node="">I wish Goodreads would allow you to give negative ratings. </span><br data-dcnode-id="3275"><span data-dcnode-id="3274" instrument_node="">First of all, let me just say that one of my biggest pet peeve is when authors of historical fiction/romance use words or phrases that were obviously not used during that time period. </span><br data-dcnode-id="3273"><span data-dcnode-id="3272" instrument_node="">Johanna Lindsey is an author who is guilty of this on multiple occasions. Usually, it’s a just a word or two, so I’m not extremely annoyed by it. But this particular book was just filled with modern words and phrases, it droved me crazy. Someone living in England in the 1820s would not being using expressions such as “none of your business,” “hear me out,” “I believe this is my cue.” The list is never ending. </span><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node="">The story’s conclusion was incredibly far-fetched. I know this is a romance book and happy endings are a given but this one was too unreal. I felt that it was an insult to my intelligence. Characters coming back from the dead, elaborate faked deaths, and everyone is ultimately forgiven? Really?!? It’s just not plausible. </span><br data-dcnode-id="3269"><span data-dcnode-id="3268" instrument_node="">And when did the hero and heroine fall in love? The only time they were together was when they were arguing and having sex. Where was the romance?</span><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">I don’t know why I keep reading Johanna Lindsey’s book since I’m usually disappointed in them but they are always available at the library and like moths to a flame, I can’t stop myself. </span><br data-dcnode-id="3265"></span><span data-dcnode-id="3263" instrument_node="">

</span><span data-dcnode-id="2865" id="freeText3827750826721554286" style="display:none"><span data-dcnode-id="2869" instrument_node="">I finished this book last night, and would have given it five stars except that I thought the ending was a bit rushed. It's not that I thought the author didn't know how to finish the book, but more that she'd been given a set number of pages to complete the novel, and had run out of room. If that is the case, then I think that sucks, because it was a great story, and I had no clue what was going to happen, so was totally surprised with the ending. As to modern words and phrases, there may have been a couple, but I believe 'cue'is an old English theatre word, so one of the reviewers who said it was modern may have been incorrect. Really, there wasn't enough to be concerned about, and when push comes to shove, how do we REALLY know if some of these terms weren't used back then or not....the terms 'home boy' or 'that sucks' I would definitely question, but some of the terms the reviewers complained about I really have no problem with. </span><br data-dcnode-id="2868"><br data-dcnode-id="2867"><span data-dcnode-id="2866" instrument_node="">All that being said, it was a great story, and yes it was a bit far-fetched if you really want to pick at it, but historical romantic fiction is just that...fiction. It's supposed to take you away to somewhere else so you can forget about your worries for a while, and get lost in a love story. I did, totally and completely and I will definitely put this book on my 'TO KEEP' shelf and read it again! I also highly recommend it to anyone who loves historical romance with a mystery, and characters who are funny, lovable, and come to life in the book!</span></span><span data-dcnode-id="2864" instrument_node="">

</span><span data-dcnode-id="1819" id="freeText11949432213095501683" style="display:none"><span data-dcnode-id="1820" instrument_node="">This was my first book by this author and I ended up really enjoying it. Sebastian Townshend (our hero) has been banished from his family. In the synopsis it says he is a deadly mercenary. I didn't really consider him to be deadly at all. Yes he is a brooding hero with an attitude and he knows how to get what he wants but he wasn't deadly. Also he was very swoony. Margaret is a great heroine. She is headstrong and I loved the banter between her and Sebastian and how she never shied away from telling Sebastian just what she thought even though he intimidated her. There was one scene that kind of irked me though. This might be a little spoilery so if you don't want to be spoiled skip this. There was a moment when Maggie was pretending to be asleep when he came into the room and he touched her. She was awake and eventually made it known that she was awake and had told him no but we get her inner dialogue and she was saying she actually really wanted him to do what he was doing. I was torn because she said no but she actually wanted it and it just kind of bothered me a little. There were a couple of reveals toward the end of the book. One of them I didn't see coming at all but the other one I did. Overall I really enjoyed this book and look forward to reading more by this author.&nbsp;</span></span><span data-dcnode-id="1818" instrument_node="">

</span><span data-dcnode-id="1650" id="freeText8539028204340583345" style="display:none"><span data-dcnode-id="1661" instrument_node="">Having been banished by his father after the duel that left his best friend dead, Sebastian Townshend vowed to never return to England. After living for eleven years as the deadly mercenary, The Raven, Sebastian is shocked when his former neighbor, Lady Margaret Landor arrives at his doorstep, looking to hire him. She in turn receives a shock, when The Raven turns out to be the man she was looking to hire him to find. </span><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node=""> </span><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">At home, Sebastian’s father has had several accidents and, suspecting foul play and a deception that goes as far back as the duel, Margaret is convinced that only Sebastian can get to the bottom of things. First she must convince him to return home and fearing that he will be turned away at the door, Margaret arranges a scandalous bargain with him. He will return as her husband. The ploy works, but instead of just uncovering the facts, a powerful passion blooms between them, that neither can resist.</span><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">I love historical romance, so what that some of the phrases used weren't actually used in the period in which this book is set. I loved the characters and the way they never failed to make me laugh (even when using one of the phrases that doesn't belong!), the story was wonderful. I got swept up in their adventure!</span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">Johanna Lindsey is one of my favorite authors and I would recommend this book. </span></span><span data-dcnode-id="1649" instrument_node="">

</span><span data-dcnode-id="1553" id="freeTextContainer16407015959260619577"><span data-dcnode-id="1557" instrument_node="">Ugh... My favorite romance writer disappointed me on this one. The romantic hero did not get consent for the first sex scene. He called a woman he slept with a slut (but he's also a slut for sleeping around then right?). He forced his fake wife to really marry him without having a conversation with her about it then left her immediately after the elopement. I'm just not a fan of Sebastian OR The Raven.</span><br data-dcnode-id="1556"><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">I also can't stand the female protagonist, Margaret. Her personality is so wishy washy. It was </span></span><span data-dcnode-id="1552" instrument_node="">
</span><span data-dcnode-id="1544" id="freeText16407015959260619577" style="display:none"><span data-dcnode-id="1551" instrument_node="">Ugh... My favorite romance writer disappointed me on this one. The romantic hero did not get consent for the first sex scene. He called a woman he slept with a slut (but he's also a slut for sleeping around then right?). He forced his fake wife to really marry him without having a conversation with her about it then left her immediately after the elopement. I'm just not a fan of Sebastian OR The Raven.</span><br data-dcnode-id="1550"><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">I also can't stand the female protagonist, Margaret. Her personality is so wishy washy. It was ballsy to go on a "European Tour" in order to find Sebastian and bring him home to fix everything. However, the rest of the book she NEVER did anything ballsy. She didn't speak up for herself. She didn't like one half of her husband's personality and was too scared to argue or discuss anything with him. That was never resolved.</span><br data-dcnode-id="1547"><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">I'm surprised I was even able to finish Marriage Most Scandalous. But I did. It doesn't tarnish my opinion of Johanna Lindsey. I just need to remember to NEVER re-read this book and go ahead and donate this book so it doesn't sit on my shelves gathering dust.</span></span><span data-dcnode-id="1543" instrument_node="">

</span><span data-dcnode-id="1099" id="freeTextContainer4675079785873177723"><span data-dcnode-id="1106" instrument_node="">An enjoyable read. It has been more than a...ahem, score of years since I read a book by Johanna Lindsey. That said, this was fun. A twisted plot that got really knotted and perhaps, a little too quickly resolved for my tastes. The emotional changes were sped up, peoples feelings altering and accepting grievances to easily. Then again, I am a grudge bearer and malicious when wronged, so mayhap it is only my view. </span><br data-dcnode-id="1105"><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">Anyway, </span><i data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Marriage Most Scandalous</span></i><span data-dcnode-id="1100" instrument_node=""> was amusing and diverting. </span></span><span data-dcnode-id="1098" instrument_node="">

</span><span data-dcnode-id="374" id="freeText13866051703194113373" style="display:none"><span data-dcnode-id="387" instrument_node="">Johanna Helen Howard was born on March 10, 1952 in Germany, where her father, Edwin Dennis Howard, a soldier in the U.S. Army was stationed. The family moved about a great deal when she was young. Her father always dreamed of retiring to Hawaii, and after he passed away in 1964 Johanna and her mother settled there to honor him.</span><br data-dcnode-id="386"><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">In 1970, when she was still in school, she married Ralph Lindsey, becoming a young housewife. The marriage had three children; Alfred, Joseph and Garret, who already have made her a grandmother. After her husband's death, Johanna moved to Maine, New England, to stay near her family.</span><br data-dcnode-id="383"><br data-dcnode-id="382"><span data-dcnode-id="381" instrument_node="">Johanna Lindsey wrote her first book, Captive Bride in 1977 "on a whim", and the book was a success. By 2006, with over 58 Million copies of her books have been sold worldwide, with translations appearing in 12 languages, Johanna Lindsey is one of the world's most popular authors of historical romance.</span><br data-dcnode-id="380"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">Johanna's books span the various eras of history, including books set in the Middle Ages, the American "Old West" and the popular Regency England-Scotland. She has even written a few sci-fi romances. By far the most popular among her books are the stories about the Malory-Anderson Family, a Regency England saga. </span><br data-dcnode-id="377"><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">Johanna Lindsey died on Oct. 27, 2019 in Nashua, N.H. She was 67.</span></span><span data-dcnode-id="373" instrument_node="">
