</span><h1 class="articlepage-hero__heading" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">
          The Prevent Strategy: Practical Tips for Managing Controversial Topics in the Classroom        </span></h1><span data-dcnode-id="956" instrument_node="">
</span><div class="articlepage-hero__info" data-dcnode-id="940"><span data-dcnode-id="955" instrument_node="">

</span><h2 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Controversial Topics: A Guide for Teachers</span></h2><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">This guide has been designed with teachers in mind to help you navigate sensitive or potentially controversial topics in the classroom.</span></strong></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">Issues like immigration, terrorism, war, religion and extremism,&nbsp;</span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/en/letsfightracism/classroom.shtml" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="904" instrument_node="">race and racism</span></a><span data-dcnode-id="902" instrument_node="">, and sexism are big in the news.&nbsp;Discussing sensitive issues and providing age-appropriate learning opportunities around these issues helps prepare students for democratic participation in later life.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Debate-style activities can be used successfully in all areas of the curriculum, but you are perhaps more likely to include them in regards to more sensitive concepts and issues, within PSHE, relationship, sex and health education, citizenship, and religious studies.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Structured classroom debate provides students with the ability to:</span></strong></p><span data-dcnode-id="893" instrument_node="">
</span><ul data-dcnode-id="870"><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Debate their beliefs.</span></li><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Practice and develop reason.</span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Make cognitive gains in decision making.</span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Challenge their views and the views of others.</span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Recognise, unpack, and explain subtext.</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Take a step back and develop objectivity.</span></li><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Acknowledge and explain the reasons why other people hold their views.</span></li><span data-dcnode-id="871" instrument_node="">
</span></ul><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">These are skills that children need – and they also help promote </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/british-values-lesson-plan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="867" instrument_node="">British values</span></a><span data-dcnode-id="865" instrument_node=""> which is part of the Prevent duty within the education sector.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="859"><img alt="A teacher discusses sensitive issues with a small group of students" class="alignnone wp-image-10612 size-full lazy-loaded" data-dcnode-id="862" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Discussing-Sensitive-Issues.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Discussing-Sensitive-Issues.jpg&amp;raw" width="685"><noscript data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">&lt;img loading="lazy" class="alignnone wp-image-10612 size-full" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Discussing-Sensitive-Issues.jpg" alt="A teacher discusses sensitive issues with a small group of students" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="858" instrument_node="">
</span><hr data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">
</span><h2 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Tips for Teachers</span></h2><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Whether you’re new to teaching or a seasoned veteran, it’s important to have a toolbox of tips for successfully navigating discussion of sensitive issues. Here are our six favourites:</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="847"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">1. Establish Ground Rules.</span></strong></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">In the classroom, you need to establish ground rules and create an atmosphere of respect and tolerance. It is important that you discuss these beforehand, ideally co-construct them with the students, and refresh everyone’s memory of them at the start of sessions. Remember – by modelling the ground rules, and the way you expect students to conduct themselves in such discussions, you are also providing a powerful learning opportunity</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Such ground rules may include:</span></p><span data-dcnode-id="840" instrument_node="">
</span><ul data-dcnode-id="826"><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Not permitting personal attacks.</span></li><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Maintaining a zero-tolerance policy on intolerance like homophobia and Islamophobia.</span></li><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Asking students to be open to and examine their own subtext.</span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Asking students to remain open to multiple perspectives.</span></li><span data-dcnode-id="827" instrument_node="">
</span></ul><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Never show surprise at what some people believe. Everyone is different. Overcoming intolerant beliefs can be hard because these thoughts and opinions are often deeply embedded.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="819"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">2. Never Ignore Intolerant Remarks.</span></strong></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="814"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.adl.org/education-outreach/curriculum-resources/c/making-it-meaningful.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="817" instrument_node="">Never leave remarks unchallenged</span></a><span data-dcnode-id="815" instrument_node=""> or unexplored. If you ignore something hateful, this teaches students that intolerance and trivialising are okay. Worse, it makes some students feel like they aren’t protected in the classroom. When someone makes a comment that is hurtful, upsetting or intolerant, it’s a good idea to discuss it calmly and try to consider why some people might feel this way. However, you need to balance exploring the comment with making sure the student who said it doesn’t feel isolated or attacked! If you can do this, you can turn a heated moment into an opportunity for deeper learning and development.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">And remember, all your students should be protected in the classroom, no matter who they are or what they’re saying.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="806"><img alt="A Mosque in London, England" class="alignnone wp-image-10645 size-full lazy-loaded" data-dcnode-id="809" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Mosque-London.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Mosque-London.jpg&amp;raw" width="685"><noscript data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">&lt;img loading="lazy" class="alignnone wp-image-10645 size-full" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Mosque-London.jpg" alt="A Mosque in London, England" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="802"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">3. Know When to Talk Outside The Classroom</span></strong></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Supporting students who’ve had a difficult time in class can help them learn from their experience and feel supported. You may need to support people whom you don’t agree with as well. It’s just as important to speak to the student who got upset as it is to speak to the student who made the remark or held the belief.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Of course, if something mentioned in the activity strikes you as a potential safeguarding concern, you should follow the established procedures for reporting that.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Part of your Prevent duty responsibilities is to notice signs of radicalisation. If, during such activities, you become concerned that a student might be exposed to, or supporting, extremist ideologies, you need to respond to these concerns. Recalling your Prevent training, the next step after noticing a concern, would be to check that concern by speak to a colleague, your Designated Safeguarding Lead, and the student themselves.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="788"><img alt="A teacher speaking to a student in a school hall" class="alignnone size-full wp-image-10608 lazy-loaded" data-dcnode-id="791" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/A-teacher-supporting-a-student.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/A-teacher-supporting-a-student.jpg&amp;raw" width="685"><noscript data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-10608" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/A-teacher-supporting-a-student.jpg" alt="A teacher speaking to a student in a school hall" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">4. Recognise when students are distressed.</span></strong></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Sometimes you may have to guess what’s upsetting a student who’s showing visible signs of distress. Without mentioning who in the room is being affected, it can be a good idea to introduce other perspectives if the conversation begins to get one-sided.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="777"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">5. Respect that some students might want to remain silent.</span></strong></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Some issues are uncomfortable for some people. They might be worried about the views of their peers, or they could worry that hateful language and generalisations might be directed at them. If they choose to remain silent be sure to respect this.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="769"><img alt="Students sat round a table discussing sensitive issues" class="alignnone size-full wp-image-10641" data-dcnode-id="772" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Students-discussing-heated-issues-at-school.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Students-discussing-heated-issues-at-school.jpg&amp;raw" width="685"><noscript data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-10641" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Students-discussing-heated-issues-at-school.jpg" alt="Students sat round a table discussing sensitive issues" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">6. Make use of The Five Minute Rule.</span></strong></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">The </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cft.vanderbilt.edu/guides-sub-pages/difficult-dialogues/%23tools" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="762" instrument_node="">Five Minute Rule</span></a><span data-dcnode-id="760" instrument_node=""> is an activity that allows students to explore marginalised, invisible or controversial views by trying to get into the mindset of a person who holds that view for five minutes.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Students can ask for this exercise to be used or you can implement it at any time. The Five Minute Rule requires you to set a timer for five minutes. During this time, the group must refrain from criticising the perspective in question and try to get into the mindset of someone who believes it.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">You can prompt students using the following questions:</span></p><span data-dcnode-id="752" instrument_node="">
</span><ul data-dcnode-id="738"><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">What’s interesting or helpful about this view?</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">What are some intriguing features of this viewpoint?</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">What would be different if you believed this perspective?</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Under what conditions might this idea seem truthful? Think social, cultural, economic conditions, etc.</span></li><span data-dcnode-id="739" instrument_node="">
</span></ul><span data-dcnode-id="737" instrument_node="">
</span><div class="tip__box" data-dcnode-id="715"><span data-dcnode-id="736" instrument_node="">
</span><div class="tip__title__container" data-dcnode-id="723"><span data-dcnode-id="735" instrument_node="">
</span><div class="tip__title__text" data-dcnode-id="725"><span data-dcnode-id="734" instrument_node="">
</span><div class="tip__title__icon" data-dcnode-id="730"><img alt="expert icon" class="lazy-loaded" data-dcnode-id="733" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2019/11/expert-tip-icon.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/wp-content/uploads/2019/11/expert-tip-icon.png&amp;raw"><noscript data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">&lt;img src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2019/11/expert-tip-icon.png" alt="expert icon" /&gt;</span></noscript></div><span data-dcnode-id="729" instrument_node="">
</span><h3 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Need a Course?</span></h3><span data-dcnode-id="726" instrument_node="">
</span></div><span data-dcnode-id="724" instrument_node="">
</span></div><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">Our </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/safeguarding-people/preventing-radicalisation-and-extremism-training.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="720" instrument_node="">Prevent Training</span></a><span data-dcnode-id="718" instrument_node=""> gives you a clear and concise overview of the Prevent duty, with opportunities to apply your learning to case studies and scenarios. It also contains Choose Your Path content so that you can access the information that is most relevant to your role.</span></p><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="710"><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/prevent-guidance-for-teachers/" rel="noopener noreferrer" target="_blank"><button data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Download Our Full Prevent Guidance Pack For Teachers</span></button></a></p><span data-dcnode-id="709" instrument_node="">
</span><hr data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">
</span><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Managing Difficult Conversations in the Classroom</span></h3><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">If, during these activities, emotions seem to run high, or students become upset or angry, these results can still form part of their learning experience. Emotive responses lead to the recognition that debates on social issues should be handled with care, sensitivity and respect. It also teaches students to try remain objective, and that not everyone will agree with them – coming to terms with this is vital!</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Exploring these tensions in a carefully managed and structured way is essential.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="694"><img alt="Little boy sat in the school playground alone and isolated" class="alignnone size-full wp-image-10695 lazy-loaded" data-dcnode-id="697" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Little-boy-feels-alone-in-the-playground.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Little-boy-feels-alone-in-the-playground.jpg&amp;raw" width="685"><noscript data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-10695" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Little-boy-feels-alone-in-the-playground.jpg" alt="Little boy sat in the school playground alone and isolated" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="690"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Ask students to leave emotions and beliefs at the door.</span></strong></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">This isn’t always possible.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">But you need to remember that no one makes a controversial comment without reasoning. Try to get students to adopt this attitude because it’s much better to explore the thoughts, experiences, and conditioning behind a comment. Equally, trying to approach topics on an abstract level allows students to take a step away from themselves and consider the perspectives of others.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="676"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">However, abstract reasoning doesn’t mean that students should say insensitive, cold, cruel or unkind remarks – make this clear.</span></strong><span data-dcnode-id="680" instrument_node=""> Thinking in abstract terms is useful to allow students to perspective take and remain removed from </span><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">themselves</span></em><span data-dcnode-id="677" instrument_node="">, not from others.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="671"><img alt="Managing conflict in the classroom" class="lazy-hidden alignnone size-full wp-image-10614" data-dcnode-id="674" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Managing-Conflict-1.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hub.highspeedtraining.co.uk/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="685"><noscript data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-10614" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Managing-Conflict-1.jpg" alt="Managing conflict in the classroom" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Help students explore subtext.</span></strong></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Subtext refers to the ideas or hidden meanings underneath communication. Sometimes subtext expresses hidden meanings that are purposefully ambiguous – this device is often employed when expressing controversial ideas but not wanting to be pinned down for a controversial view. Body language, tone, and intonation are also a part of subtext.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Sometimes, the subtext is visible to others but invisible to the person who said it. In these cases, it may be that the speaker isn’t aware of the impact of their words.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">A common feature of controversial topics and social issues is that, for the people whom the issue does not apply to, they are unaware of the impact of their words and the hidden message within them. Someone who is unaware of their prejudices won’t consider themselves racist, sexist, homophobic, etc. and it’s possible that they won’t understand the subtle impact of the language they’re using.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Being able to understand AND explain subtext in a clear way is a huge asset for students in their future relationships and in the world of business.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="650"><img alt="Primary school children discuss heated topics in the school library" class="lazy-hidden alignnone size-full wp-image-10592" data-dcnode-id="653" data-lazy-type="image" data-src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Prevent-Duty-Classroom-Discussions.jpg" height="295" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hub.highspeedtraining.co.uk/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="685"><noscript data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-10592" src="https://www.highspeedtraining.co.uk/hub/wp-content/uploads/2016/11/Prevent-Duty-Classroom-Discussions.jpg" alt="Primary school children discuss heated topics in the school library" width="685" height="295" /&gt;</span></noscript></p><span data-dcnode-id="649" instrument_node="">
</span><hr data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Keeping Your Head</span></h2><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Recognise your biases. </span></strong><span data-dcnode-id="641" instrument_node="">Everyone has biases; recognise what yours are, how they could be offensive and remain neutral.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="635"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Breathe. </span></strong><span data-dcnode-id="636" instrument_node="">Monitor yourself if you know that the subject is something you feel strongly about.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="630"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Be a role model. </span></strong><span data-dcnode-id="631" instrument_node="">Handle controversy how you want your students to because they’ll look to you for guidance.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="625"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Keep some distance. </span></strong><span data-dcnode-id="626" instrument_node="">Don’t get involved in the&nbsp;debate. Your role is to facilitate students learning, to guide students, to introduce new arguments, and to remind students of the ground rules.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="620"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Prepare. </span></strong><span data-dcnode-id="621" instrument_node="">If the issues that might come up are areas that you don’t know a lot about, do your research. Is it an area with many misconceptions? Come armed with facts and statistics.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="615"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Be proactive. </span></strong><span data-dcnode-id="616" instrument_node="">Stop the discussion if you need to and interrupt politely to provide guidance and structure if the conversation stops being useful.</span></p><span data-dcnode-id="614" instrument_node="">
</span><hr data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
