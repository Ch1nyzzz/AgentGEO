title" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">
    What Makes a Controversial Art Project Controversial?
  </span></h1><span data-dcnode-id="493" instrument_node=""> </span><div class="ww-c-single-magazine__subtitle-list" data-dcnode-id="485"><div class="ww-c-main-card__categories" data-dcnode-id="486" slot="subtitle"><span class="ww-c-main-card__categories-list" data-dcnode-id="487"><span data-dcnode-id="488"><span class="ww-u-app-link ww-u-cursor-pointer ww-u-app-transition" data-dcnode-id="490"><span data-dcnode-id="492" instrument_node="">Art History</span></span><span data-dcnode-id="489" instrument_node=""> </span></span></span></div></div><span data-dcnode-id="484" instrument_node=""> </span><span data-dcnode-id="482" instrument_node=""> </span><div class="ww-c-artist-tab-content-biography__author-info" data-dcnode-id="473"><p class="ww-c-artist-tab-content-biography__magazine-date" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">November 28, 2016</span></p><span data-dcnode-id="479" instrument_node=""> </span><div class="ww-c-artist-tab-content-biography__author-name" data-dcnode-id="474"><a class="ww-c-artist-tab-content-biography__author-link" data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/author/marija"><span data-dcnode-id="478" instrument_node="">Maria R</span></a><span data-dcnode-id="476" instrument_node=""> </span></div></div><span data-dcnode-id="472" instrument_node=""> </span><div class="ww-c-style-text-from-database" data-dcnode-id="217"><p data-dcnode-id="438"><span data-dcnode-id="471" instrument_node="">What is controversial in </span><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">controversial art pieces</span></strong><span data-dcnode-id="468" instrument_node="">? Is it the audacity of presentation, obscenity, perceived blasphemy or something else? We will try to answer this question by examining some of the indubitably controversial artworks and the strategies of their authors and hopefully, we could come up with a provisional conclusion because the field of controversial art is still blurred by its transgressive nature and frequently offensive language. The pieces we understand as controversial could be found throughout the whole history of art and in all media - from early </span><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">engravings</span></strong><span data-dcnode-id="465" instrument_node="">, </span><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">designs</span></strong><span data-dcnode-id="462" instrument_node=""> and </span><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">paintings</span></strong><span data-dcnode-id="459" instrument_node="">, across the </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/avant-garde-movement-theater-music-photography-contemporary-art/"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">avant-garde</span></strong></a><span data-dcnode-id="455" instrument_node=""> and </span><strong data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">conceptual art</span></strong><span data-dcnode-id="452" instrument_node=""> to </span><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">photography</span></strong><span data-dcnode-id="449" instrument_node="">, </span><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">sculpture</span></strong><span data-dcnode-id="446" instrument_node="">, </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/installation-art/"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">installation art</span></strong></a><span data-dcnode-id="442" instrument_node=""> and </span><strong data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">performance</span></strong><span data-dcnode-id="439" instrument_node=""> and all neighboring practices.</span></p><span data-dcnode-id="437" instrument_node="">
</span><figure align="aligncenter" data-dcnode-id="429" id="attachment_192033" width="855"><img alt="controversial work in its own time" class="size-full wp-image-192033" data-dcnode-id="436" height="569" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2jv9003bew7ag.cloudfront.net/uploads/Diego-Velazquez-Pope-Innocent-X-1650.-Study-after-Velazquezs-Portrait-of-Pop-Innocent-X-1953-%25C2%25A9-The-Estate-of-Francis-Bacon.-All-rights-reserved..jpg&amp;raw" width="855"><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">
</span><figcaption data-dcnode-id="432"><span data-dcnode-id="433" instrument_node=""> Diego Velazquez Pope Innocent X 1650. Study after Velazquez's Portrait of Pop Innocent X 1953 © The Estate of Francis Bacon. All rights reserved.</span></figcaption><p data-dcnode-id="431"></p><span data-dcnode-id="430" instrument_node="">
</span></figure><span data-dcnode-id="428" instrument_node="">
</span><h2 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">The Case of the Urinal</span></h2><p data-dcnode-id="425"></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="423" instrument_node="">The emblematic example of the controversial art projects is the </span><i data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Fountain</span></i><span data-dcnode-id="420" instrument_node=""> ready-made art piece from 1917 that challenged the art establishment. Avant-garde artist and forefather of </span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Conceptual Art</span></strong><span data-dcnode-id="417" instrument_node="">, </span><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/Marcel-Duchamp/"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Marcel Duchamp</span></strong></a><span data-dcnode-id="413" instrument_node=""> applied to the exhibition of the Society of Independent Artists with a porcelain urinal, mysteriously signed with “R. Mutt” pseudonym, because it was clearly stated in rules that all works would be accepted from artists who paid the fee. This intelligent provocation showed the hypocrisy of the system of art and its impermeability to the innovative practices while maintaining unspoken and unwritten canon of what art is and how it should look like. At the time, the Fountain arose a great scandal since it provoked the public sphere and Paris cultural milieu. It was offensive but sharply directed only to the dominant structures and to the positions of power held by eminent curators and intellectuals.</span></p><span data-dcnode-id="411" instrument_node="">
</span><figure align="aligncenter" data-dcnode-id="403" id="attachment_255127" width="855"><img alt="" class="size-full wp-image-255127" data-dcnode-id="410" height="618" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2jv9003bew7ag.cloudfront.net/uploads/Marcel-Duchamp-Fountain-1917-1.jpg&amp;raw" width="855"><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node="">
</span><figcaption data-dcnode-id="406"><span data-dcnode-id="407" instrument_node=""> Marcel Duchamp - Fountain, 1917</span></figcaption><p data-dcnode-id="405"></p><span data-dcnode-id="404" instrument_node="">
</span></figure><span data-dcnode-id="402" instrument_node="">
</span><h2 data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Controversial Feminist Art</span></h2><p data-dcnode-id="399"></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="397" instrument_node="">By its definition, </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/feminist-artists/"><span data-dcnode-id="396" instrument_node="">feminist art</span></a><span data-dcnode-id="394" instrument_node=""> is aimed to provoke the hetero-patriarchal societal norms but not all feminist works are historically assigned as controversial. In 1976 </span><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/feminist-art-sexual-radical/fanni-tutti/"><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Cosey Fanni Tutti</span></strong></a><span data-dcnode-id="390" instrument_node=""> became a sex worker and involved herself in pornography and then later exhibited images within her show </span><i data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Prostitution</span></i><span data-dcnode-id="387" instrument_node=""> at the Institute for Contemporary Art. She provoked a public scandal and disturbed even the British Parliament. In the late 80s, an anonymous group of artists </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/guerrilla-girls/"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Guerilla Girls</span></strong></a><span data-dcnode-id="383" instrument_node=""> reacted on the male dominating statistic in art world and produced the&nbsp;</span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/political-art"><span data-dcnode-id="382" instrument_node="">politically engaged</span></a><span data-dcnode-id="380" instrument_node=""> protest work </span><i data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Do Women Have to be Naked to get into the Met. Museum?</span></i><span data-dcnode-id="377" instrument_node=""> criticizing the fact there were only 5% of female artists are included in MoMA collection. </span><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/Tracey-Emin/"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Tracey Emin</span></strong></a><span data-dcnode-id="373" instrument_node=""> built her artistic career around the controversial project </span><i data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Everyone I Have Ever Slept With 1963-1995</span></i><span data-dcnode-id="370" instrument_node=""> (1995) when she set up the tent and embroidered the names of 102 persons she had slept with or had sexual intercourse.</span></p><span data-dcnode-id="368" instrument_node="">
</span><h3 data-dcnode-id="365" style="text-align: center;"><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/online-art-gallery%3Fartist%3D57%26galleryLocation%3D%26gallery%3D%26only_for_sale%3D%26artists_you_follow%3D1%26galleries_you_follow%3D1%26categories%3D%26min_price%3D%26max_price%3D%26min_height%3D%26max_height%3D%26min_width%3D%26max_width%3D%26min_year%3D%26max_year%3D%26color%3D%26orderBy%3D%26page%3D1"><span data-dcnode-id="367" instrument_node="">Be sure to check out works by Tracey Emin on our marketplace!</span></a></h3><p data-dcnode-id="364"></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="339"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/ORLAN/"><strong data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">ORLAN</span></strong></a><span data-dcnode-id="359" instrument_node=""> and her series of plastic surgeries to meet the ideals of beauty from the art canon assigned bio politic art in the nineties. When </span><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/katarzyna-kozyra/"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Katarzyna Kozyra</span></strong></a><span data-dcnode-id="355" instrument_node=""> in 1996 first challenged the stereotypes around body affected with cancer depicting her own body with strong reference on </span><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/edouard-manet/"><span data-dcnode-id="354" instrument_node="">Edouard Manet</span></a><span data-dcnode-id="352" instrument_node="">’s </span><i data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Olympia</span></i><span data-dcnode-id="349" instrument_node="">, the public was also shocked. The list of the </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/feminist-art-sexual-radical/"><span data-dcnode-id="348" instrument_node="">provoking feminist works</span></a><span data-dcnode-id="346" instrument_node=""> is endless because our society considers as provocative any artistic practice directly addressing some of the main feminist topics – explicit sexuality, </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/lesbian-art-history-sapphic/"><span data-dcnode-id="345" instrument_node="">lesbian</span></a><span data-dcnode-id="343" instrument_node=""> or </span><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/lgbt-and-photography/the-movement-through-the-lens/"><span data-dcnode-id="342" instrument_node="">queer </span></a><span data-dcnode-id="340" instrument_node="">practices, sex work, pornography matters around violence against women or heavy criticism on patriarchy or religion. But, this statement on feminist art is telling us more about our society than on the artworks, because the cause of the fact we understand some work as controversial lay in its discrepancy with the public moral and criterions of normality. And feminist art often tends to questions dominant politics, norms and laws.</span></p><span data-dcnode-id="338" instrument_node="">
</span><figure align="aligncenter" data-dcnode-id="330" id="attachment_333083" width="855"><img alt="" class="size-full wp-image-333083" data-dcnode-id="337" height="569" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2jv9003bew7ag.cloudfront.net/uploads/Katarzyna-Kozyra-Olimpia-1996-1.jpg&amp;raw" width="855"><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">
</span><figcaption data-dcnode-id="333"><span data-dcnode-id="334" instrument_node=""> Katarzyna Kozyra - Olympia, 1996</span></figcaption><p data-dcnode-id="332"></p><span data-dcnode-id="331" instrument_node="">
</span></figure><span data-dcnode-id="329" instrument_node="">
</span><h2 data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Controversial Conceptual Art</span></h2><p data-dcnode-id="326"></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="324" instrument_node="">Similarly to feminist art, conceptual art is considered controversial from its beginnings and there are many examples of the works continue to shock the public realm. From </span><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/damien-hirst/"><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Damien Hirst</span></strong></a><span data-dcnode-id="320" instrument_node=""> and his </span><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/damien-hirst-artwork-leaked-dangerous-levels-of-formaldehyde-gas/"><span data-dcnode-id="319" instrument_node="">formaldehyde pickled animals</span></a><span data-dcnode-id="317" instrument_node="">&nbsp;to </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/Andres-Serrano/"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Andres Serrano</span></strong></a><span data-dcnode-id="313" instrument_node="">’s </span><i data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Piss Christ</span></i><span data-dcnode-id="310" instrument_node="">, or explicit sexual content of the </span><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/robert-mapplethorpe/"><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Robert Mapplethorpe</span></strong></a><span data-dcnode-id="306" instrument_node=""> photographs or controversial paintings from </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/Pablo-Picasso/"><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Picasso</span></strong></a><span data-dcnode-id="302" instrument_node="">’s </span><i data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Guernica</span></i><span data-dcnode-id="299" instrument_node=""> to </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/francis-bacon"><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Bacon</span></strong></a><span data-dcnode-id="295" instrument_node="">’s </span><i data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Screaming Pope series</span></i><span data-dcnode-id="292" instrument_node=""> to the facebook art piece </span><i data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Los Intocables</span></i><span data-dcnode-id="289" instrument_node=""> (The Untouchables) by </span><strong data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Erik Ravelo</span></strong><span data-dcnode-id="286" instrument_node="">.</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="283" instrument_node="">One of the projects that completely shocked the world with its </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/magazine/animal-rights-art-what-is-acceptable/"><span data-dcnode-id="282" instrument_node="">unacceptable cruelty</span></a><span data-dcnode-id="280" instrument_node=""> was the 2007 showcase </span><i data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Exposition No 1</span></i><span data-dcnode-id="277" instrument_node=""> by </span><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Guillermo Vargas</span></strong><span data-dcnode-id="274" instrument_node=""> when he tied a dog to a wall in the Codice Gallery in Nicaragua. The words spelled out with dog food behind the tied dog stated: "You Are What You Read". Dog was left without the food during the show and even died as a result of starvation. The artist has this radical strategy of provoking intervention at the public but no one who attended the show intervened by giving the food or untied the dog. Many moral questions arose after this piece and one could rightly ask - </span><i data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Is the art concept worth the life of innocent creatures?</span></i><span data-dcnode-id="271" instrument_node="">&nbsp;It is a completely different story when artist uses his or her own body or the bodies of the people gave written consent.</span></p><span data-dcnode-id="269" instrument_node="">
</span><figure align="aligncenter" data-dcnode-id="261" id="attachment_233414" width="855"><img alt="search for bizarre painting and other artwork located in new york museums" class="size-full wp-image-233414" data-dcnode-id="268" height="594" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2jv9003bew7ag.cloudfront.net/uploads/Damian-Hirst-Away-from-the-Flock-1994.jpg&amp;raw" width="855"><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node="">
</span><figcaption data-dcnode-id="264"><span data-dcnode-id="265" instrument_node=""> Damian Hirst - Away from the Flock, 1994</span></figcaption><p data-dcnode-id="263"></p><span data-dcnode-id="262" instrument_node="">
</span></figure><span data-dcnode-id="260" instrument_node="">
</span><h2 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Two Sides of Controversial Art</span></h2><p data-dcnode-id="257"></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="255" instrument_node="">In her legendary six-hour performance </span><i data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Rhythm 0</span></i><span data-dcnode-id="252" instrument_node=""> in Studio Morra, Naples, the dame of performance art </span><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.widewalls.ch/artists/Marina-Abramovic"><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Marina Abramovic</span></strong></a><span data-dcnode-id="248" instrument_node=""> stood still while the audience was invited to use or abuse using one of 72 objects she had placed on a table. The controversial part was that she placed the scissors, a scalpel, nails, a metal bar and above all - a gun loaded with one bullet to voluntarily challenge the people to hurt or even kill her. But, there is another controversial example of Abramovic’s work that could show the elusive margin of morally acceptable provocation within the art world. In 2011, Abramovic organized a fundraising dinner tending to show all the absurdity of the world of art, reenacting the bacchanal party at the Museum of Contemporary Art in Los Angeles and for the occasion organized the audition for extrast to take part in the performance </span><i data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">An Artist’s Life Manifesto</span></i><span data-dcnode-id="245" instrument_node="">. According to art-direction some of the young artist were required to lay dead still in the nude or to be buried under a skeleton for a significant period of time, while others would crouch underneath the table with their heads out during the fundraising feast. Immediately, the other performance artist </span><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Yvonne Rainer</span></strong><span data-dcnode-id="242" instrument_node=""> reacted by publicly criticizing Abramovic for using her symbolic capital to gather the cast and for subjecting her collaborators to public humiliation who, though willing, were exploited for the sake of performance and even more - the fundraising dinner.</span></p><span data-dcnode-id="240" instrument_node="">
</span><figure align="aligncenter" data-dcnode-id="232" id="attachment_331877" width="855"><img alt="search for bizarre painting and other artwork located in new york museums" class="size-full wp-image-331877" data-dcnode-id="239" height="577" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2jv9003bew7ag.cloudfront.net/uploads/Marina-Abramovic-Rhythm-0-19741.jpg&amp;raw" width="855"><br data-dcnode-id="238"><span data-dcnode-id="237" instrument_node="">
</span><figcaption data-dcnode-id="235"><span data-dcnode-id="236" instrument_node=""> Marina Abramovic - Rhythm 0, 1974</span></figcaption><p data-dcnode-id="234"></p><span data-dcnode-id="233" instrument_node="">
</span></figure><span data-dcnode-id="231" instrument_node="">
</span><h2 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Duality of the Controversy</span></h2><p data-dcnode-id="228"></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="226" instrument_node="">These two examples of controversial art projects, conducted by the same artist precisely mark the duality of controversy within art - it could be the critique of the society norms or it could completely reproduce the laws one tends to critic under the very artwork. The main concern with the </span><strong data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">controversial art</span></strong><span data-dcnode-id="223" instrument_node=""> pieces is that the artwork could (un)willingly become its own opposite – from emancipatory and critical work of art to repressive and offensive practice. There are many artistic strategies to create an artwork transgressive and controversial but the question of the justification of these methods will always lay at the singularity of that specific case and will be regulated only by the personal moral norms of the very artist.</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="218"><small data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Featured images:Marina Abramovic - An Artist's Life Manifesto, 2011 via latimesblog; Tracey Emin, Everyone I Have Ever Slept With, 1995; ORLAN - Blooming, 7th Surgery-Performance Titled Omnipresence, 1993; Damien Hirst - The Physical Impossibility of Death in the Mind of Someone Living, 1991; Cosey Fanni Tutti - Artist's pornographic images via post-punk.com</span></small></p></div><span data-dcnode-id="216" instrument_node=""> </span><div class="ww-c-single-magazine__addition-container" data-dcnode-id="155" id="6872"><div class="ww-c-single-magazine__artists-container" data-dcnode-id="191"><span class="ww-c-single-magazine__addition-title" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">
