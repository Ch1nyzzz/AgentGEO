</span><h1 data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">How Do I Become a Historian?</span></h1><span data-dcnode-id="1191" instrument_node="">
</span><p class="wikiDesc" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Find out what it takes to work as a historian. Learn about education requirements, salary potential and job outlook to determine if this is the right career path for you.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><span data-dcnode-id="1187" id="findYourDegreeMobileContainer"></span><span data-dcnode-id="1186" instrument_node="">
</span><div class="schools-cta" data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">
</span><button class="cta" data-cname="btn_view_schools" data-dcnode-id="1183" id="viewSchoolsCTA" type="submit"><span data-dcnode-id="1184" instrument_node="">
							View Schools
						</span></button><span data-dcnode-id="1182" instrument_node="">
</span></div><span data-dcnode-id="1180" instrument_node="">
</span><main class="wikiContent" data-dcnode-id="1076"><span data-dcnode-id="1179" instrument_node="">
</span><h2 data-dcnode-id="1177" id="section---WhatIsAHistorian"><span data-dcnode-id="1178" instrument_node="">What Is a Historian?</span></h2><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Historians study the past by researching and analyzing artifacts, as well as written and electronic accounts of events gone by. They may interpret and report the significance of these events for the benefit of government entities, historical organizations and clubs as well as educational institutions.  Historians work in a variety of places, including museums, universities or government agencies. Some focus on writing historical articles and books. The main purpose of historians is to inform and educate.
</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">The chart below outlines the education requirements, salary potential and job outlook for historians in general.
</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">
</span></p><span data-dcnode-id="1159" instrument_node="">
</span><span data-dcnode-id="1150" instrument_node="">
</span><span data-dcnode-id="1141" instrument_node="">
</span><span data-dcnode-id="1132" instrument_node="">
</span><span data-dcnode-id="1123" instrument_node="">
</span><table border="1" class="wikitable" data-dcnode-id="1121"><tbody data-dcnode-id="1122"><tr class="odd" data-dcnode-id="1160"><td data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node=""> </span><b data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Degree Required</span></b><span data-dcnode-id="1164" instrument_node=""> </span></td><td data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">	Master's or Ph.D</span></td></tr><tr data-dcnode-id="1151"><td data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node=""> </span><b data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Education Field of Study</span></b><span data-dcnode-id="1155" instrument_node=""> </span></td><td data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">	History, specialized historical topic</span></td></tr><tr class="odd" data-dcnode-id="1142"><td data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node=""> </span><b data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Key Skills</span></b><span data-dcnode-id="1146" instrument_node=""> </span></td><td data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">	Writing, research</span></td></tr><tr data-dcnode-id="1133"><td data-dcnode-id="1136"><span data-dcnode-id="1140" instrument_node=""> </span><b data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Projected Job Growth (2020-2030)</span></b><span data-dcnode-id="1137" instrument_node=""> </span></td><td data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">	5% (all historians)*</span></td></tr><tr class="odd" data-dcnode-id="1124"><td data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node=""> </span><b data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Median Salary (2020)</span></b><span data-dcnode-id="1128" instrument_node=""> </span></td><td data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">	$63,100 (all historians)*</span></td></tr></tbody></table><p data-dcnode-id="1117"><i data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Source: *U.S. Bureau of Labor Statistics</span></i><span data-dcnode-id="1118" instrument_node="">
</span></p><span data-dcnode-id="1116" instrument_node="">
</span><h3 data-dcnode-id="1114" id="section---WhatEducationalRequirementsAreThereForHistorians"><span data-dcnode-id="1115" instrument_node="">What Educational Requirements Are There for Historians?</span></h3><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Historians, like most other workers in the social sciences, most often need a graduate education. You can prepare in high school by taking strong foundational classes in social sciences and different types of history. Next, as an undergraduate, you may major in history and begin to think about which areas of history you want to specialize in.  Specializations are usually categorized in terms of geographical location (e.g., history of Norway), topic (e.g., history of gender), group of people (e.g., history of the Vikings) or science (e.g., history of modern machinery). You will need good grades at this stage if you choose to continue on to graduate school.
</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">While some positions related to history - like being a high school educator or doing work of a historical nature for a campaign, corporation or newspaper - are open to you after completing your bachelor's degree, if you aspire to be a professional historian, you must seek a graduate education. Master's programs in history usually last about two years, while Ph.D. programs typically take a minimum of five years to complete; you'll have the best job prospects with a doctoral degree.
</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Graduate-level curricula include advanced courses in historiography (the writing of historical narratives) and your specialization, which will help to lay the groundwork for the writing of publishable historical articles, findings and inquiries. Ph.D. programs usually culminate with two years or more of work on a dissertation, which could have you flying across the world and huddled for hours in a library, surrounded by dozens of books.
</span></p><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1102" id="section---WhatMightMyNormalDayLookLike"><span data-dcnode-id="1103" instrument_node="">What Might My Normal Day Look Like?</span></h3><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Whether you work for a museum, university or the government, or even if you work on projects like writing history books on your own time, you will spend lots of time with books, manuscripts, artifacts, steles (stone markers or slabs, typically bearing inscriptions) and other relevant historical documents. Being good at sifting through these large quantities of information and finding what is adequate quickly is necessary.
</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">You might have to brush up on arcane geographical, political and technological terminology; research methods; and ancient languages for your next meeting with visiting professors, researchers, fellows or other experts. Be sure to work out all the technological kinks in your audio-visual material before your big book promotional presentation or lecture, since these will often define your public reputation as a historian.
</span></p><span data-dcnode-id="1095" instrument_node="">
</span><h3 data-dcnode-id="1093" id="section---HowDoIAdvance"><span data-dcnode-id="1094" instrument_node="">How Do I Advance?</span></h3><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">What can you do? What have you done? You need diverse and high-quality answers to these questions in order to advance. Have you written numerous articles for peer-reviewed, esteemed journals linked to the American Historical Association (AHA)? How many well-received books have you written? How many research and analysis methods are you familiar with?
</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">And how broad is your range of historical knowledge? The more you've accomplished and the more you know, the better your chances are of receiving a promotion. How many languages can you speak, read and write? Many doctoral-level programs have a foreign language requirement, so historians with Ph.D.s typically know at least two languages; being able to understand even more can be beneficial to your research. These achievements can help you reach upper-level posts as a senior fellow, department chair or historical society head.
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1084" id="section---WhatAreSomeRelatedAlternativeCareers"><span data-dcnode-id="1085" instrument_node="">What Are Some Related Alternative Careers?</span></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Sociologists are closely related to historians. They investigate society as well, though not necessarily from a historical perspective. They examine the behavior and interaction of various cultures, groups and organizations, analyze the information and develop theories on how these groups affect society and vice versa. Some sociologists specialize in a certain area such as criminology or statistics.
</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">A political scientist incorporates many of the characteristics of historians and sociologists. They are concerned with the origin and development of political systems and how the operation of these systems can shape individual and societal behavior. They investigate the workings and interactions of political systems in various contexts such as international relations, national and local politics, and pure political theory.</span></p><span data-dcnode-id="1077" instrument_node="">
</span></main><span data-dcnode-id="1075" instrument_node="">
</span></div><span data-dcnode-id="1073" instrument_node="">
