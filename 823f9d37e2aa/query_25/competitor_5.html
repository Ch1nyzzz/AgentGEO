. He meets the leaders of seven tribal confederacies and claims that he can bring France’s air force to their help in seven days. Only, he insists that a leader must be chosen, either himself or someone else, who will represent the Kurdish coalition internationally and negotiate with the French. Eminê Ahmed, one of the leaders present, stands up and says </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5610" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5611" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5612" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5613" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5614" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5619" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5620" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5621" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5615" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5616"><svg data-dcnode-id="5617" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5618" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5510" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5511" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5512"><span class="q-box qu-userSelect--text" data-dcnode-id="5513" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5602" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5603" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5604" instrument_node="">There’s a story about the famous Kurdish leader Cemilê Çeto who prepares to fight the Kemalist movement. It was at a moment when he saw an opportunity to call upon foreign powers to support the Kurds and assist them in founding a Kurdish state. He meets the leaders of seven tribal confederacies and claims that he can bring France’s air force to their help in seven days. Only, he insists that a leader must be chosen, either himself or someone else, who will represent the Kurdish coalition internationally and negotiate with the French. Eminê Ahmed, one of the leaders present, stands up and says that he will never relinquish his title or give his father’s legacy away to bow to anyone else. Others follow him in that decision. In short, according to the story the chance to establish a Kurdish state was missed because of the lack of unity among Kurdish leaders, and never such an opportunity was obtained again.</span></span></p><span data-dcnode-id="5601" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5598" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5599" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5600" instrument_node="">my grandmother used to tell me a similar story, about Sheikh or king Mahmoud Barzinji; as he was appointed the governor of Sulaymaniyah by the Brits. As my grandma proudly used to say, he spited on the British commander while refusing to shake hands. He chose to revolt and attack the “engliz”. The Brits captured him and send him to India in exile. Due to instability they released him from exile and promised him a kingdom in the near future. Once’s again he revolted, he chose to work with he’s the moslim ottomaans and attacked the Brits once again. It is believed he was promised the same.</span></span></p><span data-dcnode-id="5597" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5594" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5595" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5596" instrument_node="">my mom used to tell me about a book on idris- Bidllisi, where he advised almost the same thing to Sultan Selim (I) five centuries ago, when Selim asked “which of the begs was most worthy of this paramount leadership.” He intended to choose one of the thirty Kurdish nobles as the ruler of Kurdistan. But Idris advised him not to do so, as “they are all more or less equal, and none of them will bow his head before any other.” The similarity between the two historical moments, despite a half millennium of time between them, is very striking. One cannot possibly assume that it is just a coincidence or a random course of events. It therefore occurred to me that what seemed to be a ‘failure’ could have been a deliberate and conscious choice, since choices, not coincidences, have the quality to repeat themselves almost identically in history. The appealing theme in the story and the historical account is that they make room for the element of choice. We see a continual reluctance or rejection to bow before a higher political authority, a preference to remain local and small in scale, and a tendency to stay autonomous. Modernist-nationalist discourses have long suggested that it testifies to the fact that the Kurds had been the victims of their own premodern (read backwards) socio-political organization and primordial (read primitive) traditions.</span></span></p><span data-dcnode-id="5593" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5590" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5591" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5592" instrument_node="">all the above can be put into rational; once one bows to a higher authority it does not matter if this authority is foreign or familiar; it is still domination and subordination.</span></span></p><span data-dcnode-id="5589" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5586" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5587" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5588" instrument_node="">I don’t think it’s reasonable that the fact Kurds have no nation-state of their own cannot be explained by sheer failure on the part of Kurdish nobility, but the element of deliberate choice to avoid and evade the state is also involved. It does so by highlighting historical moments and sociopolitical phenomena which demonstrate that the Kurds did not only resist incorporation in state-structures when they were pressured to do so, they also avoided state formation per se for most parts of their history from the sixteenth to the twentieth century; be it in the sense of escaping foreign domination or in the sense “to prevent states from springing up among them (Scott 2009; X).” Even though such an understanding of Kurdish history may seem unconventional, I think many scholars have already cleared the path towards this conclusion. Drawing on Scott’s work, The Art of Not Being Governed (2009), I argue that the Kurds have preferred to keep the state at a distance and to remain loyal to sub-state social and political structures.</span></span></p><span data-dcnode-id="5585" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5582" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5583" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5584" instrument_node="">Historically, a state WITH the NAME Kurdistan has never existed. The largest political structures that were formed in the geographical territory called Kurdistan today were several Kurdish principalities under Ottoman and Persian rule, and a province named Kurdistan that existed for most part of the last millennium in the margins of both empires. Scholars have provided a number of geographical, social and political reasons that prevented the Kurds from forming a state of their own. The most common one is that Kurdistan is a mountainous country, a rough geography, which makes it extremely difficult for a single political entity to gain a substantial control over the entire region. A well-known idiom suggests that "even Alexander the Great couldn't bring this region under his rule." This rugged geography, it is further argued, also prevented the formation of a collective social identity, a standard language, and the development of a shared goal among Kurds. However, Scott (2009: XI) reverses this argument by stating that “the mountains as a refuge for state-fleeing people, including guerrillas, is an important geographical theme.” Likewise, Kurdistan has also functioned as a refuge for many. Due to the rugged terrain that allowed no easy access, the Kurds maintained their presence in this region despite many invasions and long centuries of foreign rule.</span></span></p><span data-dcnode-id="5581" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5578" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5579" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5580" instrument_node="">Another dominant theme is that the Kurds did not develop a national consciousness and a national unity among themselves, and thus cold not build a state of their own. However, social practices like the reluctance and even resistance to being incorporated in the spheres of state influence, the inclination to avoid being ruled, regulated, taxed, conscripted, and contained by formal state borders, could all be seen as deliberate attempts to keep the state at a distance. For instance, switching sides between imperial powers was a frequent practice for local rulers who occupied the margins of the empires. And crossing state borders has been a common practice for the Kurds who live in borderlands. Many Kurds have grown up hearing stories of fugitives, bandits and ordinary peasants, who used to take shelter in the mountains of Kurdistan to escape state laws and obligations.</span></span></p><span data-dcnode-id="5577" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5574" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5575" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5576" instrument_node="">The Kurdish population under the threat of the Safavid and Ottoman empires in the sixteenth century neither resisted through military confrontation nor fled, nor were they absorbed or assimilated. The Kurdish notables adopted a third strategy: they played the two empires against each-other and maintained their autonomy in the margins of political and military powers far more superior then themselves. Scott (ibid; 210) also points out to such a strategy later on, when he states: “when nonstate peoples (aka tribes) face pressures for political and social incorporation into a state system, a variety of responses is possible. They, or a section of them, may be incorporated loosely or tightly as a tributary society with a designated leader (indirect rule).” It must be highlighted that the indirect rule in the case of Kurdish emirates characterized a high level of autonomy. As Ateş (2013) and (2004) have demonstrated, the authority of the rulers in Kurdistan was not interfered with by the Ottoman Sultan and they maintained hereditary privileges like property of the land and succession. The administrations of the least accessed territories were named hükümets (government) and behaved accordingly:</span></span></p><span data-dcnode-id="5573" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5570" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5571" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5572" instrument_node="">The state preferred not to interfere in their succession and internal affairs, and contented itself with recognizing the authority of the rulers. The sultan issued official diplomas of investiture to show his approval. The hükümets did not have the timar, zeamet, or has. They neither paid taxes to the Ottoman state nor provided regular military forces to the sipahi army. ( 2004; 57)</span></span></p><span data-dcnode-id="5569" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5566" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5567" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5568" instrument_node="">This helps us to understand two important things. First, the Kurds have played their role in shaping the course of events in Kurdistan, and are thus not mere victims of historical developments. Second, the existence of hükümets that had a high level of internal political organization demonstrates that the Kurds did not lack the characteristics attributed to other social and political groups around them. This defies the argument that they are second to categorically superior groups called nations.</span></span></p><span data-dcnode-id="5565" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5562" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5563" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5564" instrument_node="">Additionally, when the Ottomans implemented modern reforms aimed at centralizing political power and therewith gravely diminished Kurdish autonomy, we see that Kurds followed two trajectories to resist the state. The first one was rebelling against those policies, exemplified by the resistance of Mir Bedirxan, the emirate of the province of Botan. The revolt of Mir Bedirxan was an attempt to preserve political autonomy and self-rule in Kurdistan. The other strategy was that they developed new structures and forms of social organization. The Ottomans had eliminated Kurdish aristocracy and destroyed political autonomy in Kurdistan by the mid-nineteenth century. The power vacuum was filled by Dervish/Sufi orders, because the Ottoman state was yet to develop a modern form of citizenship which could replace feudal political loyalties. But more importantly, the state had nothing to offer to the Kurds, because they had already re-organized themselves around religious orders, just when the power of Kurdish emirates started to fade away. While Ateş (2013) and Özoğlu (2004) demonstrate that the autonomy of Kurdish emirates diminished substantially after the seventeenth century, Bruinessen (1990; 2) refers to the ascendance of Sufi orders and religious sects in Kurdistan almost at the same time span. When we put the pieces together, we see that the moment that Kurdish political autonomy was restricted, there appeared an increasing activity of religious orders, which is culminated in the outbreak of the Sheikh Ubeydullah Rebellion in 1880. This revolt is important because it was the first Kurdish resistance that was not organized by Kurdish aristocracy or nobility against Ottoman attempts of centralizing political power in Kurdistan. Sheikh Ubeydullah Nehri was not a Kurdish aristocrat, but a well-respected cleric of a Sufi order known as the Nakşibendi.</span></span></p><span data-dcnode-id="5561" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5558" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5559" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5560" instrument_node="">We know that Kurdistan as an administrative unit existed as early as the fourteenth century, and that Kurdish as an identity and Kurdistan as a country clearly appears, with its boundaries and clans, in the fifteenth century (Özoğlu 2004; 26-32). We also know that Ehmedê Xanê stressed the desire of those who would like to see a united Kurdish kingdom as early as the seventeenth century, in the introduction of his epic Mem and Zin (Mem û Zîn) (ibid). Although they were incorporated in larger state structures, their own customs, traditions and social practices preserved the Kurds from being totally absorbed by the State. In that sense, Belge’s (2011; 105) analyses take us to the heart of the point:</span></span></p><span data-dcnode-id="5557" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5554" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5555" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5556" instrument_node="">Kinship networks thus enabled a variety of resistant acts that cumulatively undermined the state-building project. First, they served as networks of information and trust accessible only to the locals, regularly disrupting law enforcement. Second, contacts in the lower-level bureaucracy enabled local society to manipulate crucial records on population, land ownership, and marriage, creating a problem of legibility and posing important challenges for the institutionalization of state law. Third, state officials who were sent from outside the region were occasionally absorbed in the local moral order and began to act according to local rules, favoring “kin” and ignoring the commands from above. On the ground, then, quotidian conspiracies rendered the boundary between state and society fuzzy, undermined the state’s infrastructural power, and impeded state rationality and order from deepening its hold over the imagination of citizens.</span></span></p><span data-dcnode-id="5553" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5550" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5551" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5552" instrument_node="">Fragmented social and political structures and the absence of a centralized political authority in a society, as Bruinessen (1978) emphasizes, may indicate a tendency to remain out of the direct control of the state. Although Kurdish tribes have frequently formed and still form alliances with the state, this mostly serves them to gain more power in the competition with their rivals or to preserve their power and autonomy. It does not necessarily suggest that they are absorbed by or incorporated into state structures . Kurds are loyal, Bruinessen (ibid.)argues, not to an ethnic group, a nation, or a state, but the chief loyalty is that of local characteristics, owed to tribal chieftains (Agha) and charismatic religious leaders (Shaikh). The (psychological) remoteness of the Kurds to the institutional existence of the idea of the state is a dominant theme in Bruinessen’s thesis. One example of this is the word binxetê, the word used by Kurds in southeast Turkey to refer to Syria. It means ‘below the line’, referring to the railway passing through the region. In Kurdish vernacular, Syria was thus not seen as a different country, but as the lands ‘below the railway line’. Also the continuous illegal border crossings of Kurds living in these borderland zones show that they do not recognize the border as a legitimate structure. Crossing these artificial state borders is a daily phenomenon for those who live near borderlines. They are preserving relationships with their relatives across borders, they trade with each other and marry their sons and daughters to people at the other side. Belge (2011; 101) stresses that “The ease with which Kurds crossed the border undermined the government’s efforts to institutionalize borders as containers of discrete nations.” Last time that I expired the latter was 3 years ago in hawram, an elderly man and he’s daughter where detained while crossing the border into the KRG from east Kurdistan without papers. The old man was laughing and at the same time mad, saying i don’t need papers to visit my nieces wedding in my own village.</span></span></p><span data-dcnode-id="5549" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5546" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5547" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5548" instrument_node="">Furthermore, those practices are not just anachronic strategies that belong to almost a century ago. There are contemporary forms of such socio-political activities. Anyone who grew up in a Kurdish village or city will recall that conflicts are mostly solved by a local “judicial” mechanism. Sheikhs and mullahs invoked sharia law, and local notables customary law. What they avoid to do is, for sure, to invoke the state and its courts. Additionally, we see that legal or illegal institutions of Kurdish political movement taken upon themselves the role of arbitration and judiciary: a role that is generally performed by a sovereign.</span></span></p><span data-dcnode-id="5545" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5542" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5543" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5544" instrument_node="">The aforesaid social and (a)political practices, on the other hand, also became the ground of a self-orientalist conception, especially in 1990s in Turkey, which implied that the Kurds have not yet developed a sense of nationhood, and that they are not politically mature enough to form a nation. “You cannot convince me that the Turkish nation (Türk Ulusu) and the Kurdish nationality are equal, said Birgul Ayman Guler.</span></span></p><span data-dcnode-id="5541" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5538" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5539" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5540" instrument_node="">The statement puts ‘Kurdish nationality’ in a secondary rank as a political category, vis-à-vis the ‘superior’ one, the ‘Turkish nation’. What made the difference was, clearly, mastery over a territory in the ownership of a sovereign state. This self-orientalist understanding had become the ground for some Kurdish nationalists to blame their ancestry of lacking national consciousness as well. Here, we see a clear link between the ages-old colonialist/modernist discourses that imposed dichotomies of ‘civilized’-‘uncivilized’, ‘modern’-‘backward’, ‘developed’-‘undeveloped’; and the nationalist tendency to rank and hierarchize peoples on the bases of having or not having a sovereign state.</span></span></p><span data-dcnode-id="5537" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5534" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5535" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5536" instrument_node="">However, we think that there surely are ways of political activism free from the dichotomy of sovereignty and statelessness; and that resistance to political centralization reflected in the practices outlined above is one of those ways that conceives political autonomy in evading the state. As Arendt (1998; 234) suggests,</span></span></p><span data-dcnode-id="5533" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5530" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5531" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5532" instrument_node="">If it were true that sovereignty and freedom are the same, then indeed no man could be free, because sovereignty, the ideal of uncompromising self-sufficiency and mastership, is contradictory to the very condition of plurality. No man can be sovereign because not one man, but men, inhabit the earth...</span></span></p><span data-dcnode-id="5529" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5526" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5527" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5528" instrument_node="">Therefore, in the case of the Kurds, the tendency towards remaining autonomous, could testify to a notion of freedom as the will to evade the state. In other words, not having a state of their own and not trying to found one until the early twentieth century, might, after all, just be an alternative vision of freedom.</span></span></p><span data-dcnode-id="5525" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5522" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5523" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5524" instrument_node="">Although mainstream nationalist discourses in Turkey and academics in Kurdish studies often suggest that statelessness is an indication of the lack of national consciousness on the part of the Kurds, one provide a alternative interpretation of political fragmentation in Kurdistan. The Kurds prioritized self-rule and local autonomy; and that they deliberately avoided being incorporated into larger state structures, due to a different political culture and an alternative understanding of freedom.</span></span></p><span data-dcnode-id="5521" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5518" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5519" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5520" instrument_node="">My thanks to our brother,</span></span></p><ul class="q-box" data-dcnode-id="5514" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="5515" s e-id="4033"><svg data-dcnode-id="4034" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4035" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3842" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3843" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3844"><span class="q-box qu-userSelect--text" data-dcnode-id="3845" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4019" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4020" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4021" instrument_node="">The Kurds have their origins in the land of Karda. They are one of the indigenous people of the Middle East. More precisely, one of the indigenous people of south-eastern Turkey, north-eastern Syria, northern Iraq, north-western Iran and south-western Armenia.</span></span></p><span data-dcnode-id="4018" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4007" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4016" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4017" instrument_node="">The land of Karda was mentioned on a Sumerian clay tablet from the 3rd millennium BC and with that Sumerians meant the area between the south of Lake Van and the Zagros Mountains. Also, historical, linguistic and genetic studies point out to the origin of the Kurds being the Zagros Mountains in the northwest of Iran and southeastern of Turkey. </span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="4012" href="#cAqPM" id="cite-cAqPM" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="4015" instrument_node="">[</span><span data-dcnode-id="4014" instrument_node="">1</span><span data-dcnode-id="4013" instrument_node="">]</span></a><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="4008" href="#MnRLx" id="cite-MnRLx" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="4011" instrument_node="">[</span><span data-dcnode-id="4010" instrument_node="">2</span><span data-dcnode-id="4009" instrument_node="">]</span></a></p><span data-dcnode-id="4006" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3999" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4004" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4005" instrument_node="">The Babylonians referred to the Kurds as “Garda” and the Persians used the similar term to referrer to the people who were living around the Zagros Mountains in what is now northwest Iran. In 745 BC, the Assyrian king Tiglath-Pileser III declared war against a man by the name Kurti (Qurtie) and who was from the same area, the land of Karda.</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="4000" href="#sSBdi" id="cite-sSBdi" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="4003" instrument_node="">[</span><span data-dcnode-id="4002" instrument_node="">3</span><span data-dcnode-id="4001" instrument_node="">]</span></a></p><span data-dcnode-id="3998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3995" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3997" instrument_node="">The ancient Kurds waged war with the Assyrians for almost 700 years. Later, an alliance of the Medes, the Elamites and the Kurds succeeded to bring down the Assyrian Empire in their areas. The Kurds coalesced with the Medes and adopted their language. The Medes have often been believed to be a starting point for the Kurdish ethnogesis. The reason why I said it is believed, because there is no strong proof of this yet, but also not one single scholar who has completely/strictly opposed to it either.</span></span></p><span data-dcnode-id="3994" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3979" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3993" instrument_node="">Corduene, which was an ancient region, which covered the land of Karda and some areas from Zagros mountains in present-day northern Iraq, southeastern Turkey was mentioned in many Jewish sources. Jewish sources traced the origins of the people of Corduene to the marriage of the mythical“Jinns” of King Solomon with beautiful Jewish women. Another the most interesting aspect in these legends is that, in the so-called Islamic Golden Age, King Solomon was also mentioned by the early Islamic scholars/authorities to explain the origin of the Kurds. Corroborated by a great deal of other historical documents and studies, Corduene remains the only region which can be considered as the most probable origin of the Kurds, with such reliable and solid evidences. That is the reason recent academic sources consider Corduene as the proto-Kurdish region.</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="3988" href="#biwGF" id="cite-biwGF" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="3991" instrument_node="">[</span><span data-dcnode-id="3990" instrument_node="">4</span><span data-dcnode-id="3989" instrument_node="">]</span></a><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="3984" href="#oBHpS" id="cite-oBHpS" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="3987" instrument_node="">[</span><span data-dcnode-id="3986" instrument_node="">5</span><span data-dcnode-id="3985" instrument_node="">]</span></a><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="3980" href="#CnONH" id="cite-CnONH" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="3983" instrument_node="">[</span><span data-dcnode-id="3982" instrument_node="">6</span><span data-dcnode-id="3981" instrument_node="">]</span></a></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3975" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3976"><div class="q-box unzoomed" data-dcnode-id="3977" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3978" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-5f4e7b67624e7cc8ddb650abb3e5a99a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3972" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3973" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3974" instrument_node="">(60 BC Kingdom of Corduene, Source: Wikimedia)</span></span></p><span data-dcnode-id="3971" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3964" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3969" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3970" instrument_node="">The greatest discovery which has helped to clarify the origin of the Kurds was made when dialectologists succeeded in proving that the Kurdish language does not belong to the Southwestern Iranian language subdivision, to which the Persian language belongs to. The Kurdish language belongs to the Northwestern Iranian subdivision (branch of Indo-European family). </span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="3965" href="#jyphk" id="cite-jyphk" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="3968" instrument_node="">[</span><span data-dcnode-id="3967" instrument_node="">7</span><span data-dcnode-id="3966" instrument_node="">]</span></a></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3960" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3961"><div class="q-box unzoomed" data-dcnode-id="3962" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3963" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-e440a7e4ce8e58d4e236f15da92bcec7-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3957" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3958" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3959" instrument_node="">(Iranian languages family tree, Source: Wikimedia)</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="3956" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3953" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3954" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3955" instrument_node="">There are tons of scientific theories, assumptions, claims, conspiracy theories and even some ludicrous rumors about the origin of the Kurds.</span></span></p><span data-dcnode-id="3952" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3949" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3950" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3951" instrument_node="">Here are some of such theories, claims and wild assumptions:</span></span></p><ul class="q-box" data-dcnode-id="3928" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3944" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3945" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3948" instrument_node="">The Kurds are Persians</span><br data-dcnode-id="3947"><span data-dcnode-id="3946" instrument_node="">The Kurds aren’t Persians. The Kurds and Persians have lived together thousands of years and they have affected each other´s cultures and languages, however, they are still distinct peoples.</span></span></li><li class="q-relative" data-dcnode-id="3939" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3940" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3943" instrument_node="">There are no Kurds, they are mix of different people.</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">There are still many among the Turkish people, including MPs and professors, who publicly claim that there are no such a thing as Kurds. That is the most absurd of all such claims, no doubt.</span></span></li><li class="q-relative" data-dcnode-id="3934" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3935" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3938" instrument_node="">The Kurds are Arabs</span><br data-dcnode-id="3937"><span data-dcnode-id="3936" instrument_node="">The Kurds aren’t Arabs.</span></span></li><li class="q-relative" data-dcnode-id="3929" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3930" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3933" instrument_node="">The Kurds are actually Jews, because they are genetically close to each other.</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">However, the sheer fact that they are genetically close to each other does not mean per se that they are same people.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3925" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3926" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3927" instrument_node="">Thanks for the A2A.</span></span></p><p class="q-text qu-bold qu-pb--small" data-dcnode-id="3923" style="box-sizing: border-box; margin-top: 1em;"><span data-dcnode-id="3924" instrument_node="">Footnotes</span></p><div class="q-text qu-mb--small qu-wordBreak--break-word" data-dcnode-id="3912" id="cAqPM" style="box-sizing: border-box;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3919" href="#cite-cAqPM" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="3922" instrument_node="">[</span><span data-dcnode-id="3921" instrument_node="">1</span><span data-dcnode-id="3920" instrument_node="">] </span></a><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.fi/books%3Fid%3D-9RNCgAAQBAJ%26pg%3DPA353%26lpg%3DPA353%26dq%3DAchaemenid%2520Empire%2520Kurdish%26source%3Dbl%26ots%3DgC9Ezsruea%26sig%3Dx8hDhdgJtt6BHWLIiTbHM2-XxyY%26hl%3Den%26sa%3DX%26ved%3D0ahUKEwiR__30zbfNAhVlDZoKHesGBpoQ6AEIUDAJ%23v%253Donepage%2526q%253DAchaemenid%2520Empire%2520Kurdish%2526f%253Dfalse" rel="noopener nofollow" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><span data-dcnode-id="3918" instrument_node="">Iraq</span><span class="q-inlineBlock" data-dcnode-id="3914" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3915"><svg data-dcnode-id="3916" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www. 094" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3095" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3096" instrument_node="">A2A. Nothing is wrong with the idea of a Kurdish state. Kurds have to get organized, and fight for it. To get land from SE Turkey, they will have to defeat Turkish army. To get land from N Syria, they have to convince Russia, Iran and Turkey to stay uninvolved, and defeat the Syrian Army. To get land from Iraq, they have to defeat the Iraqi army.</span></span></p><span data-dcnode-id="3093" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3090" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3091" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3092" instrument_node="">So far, that has not happened. It does not appear like it will be any time soon. Kurdish people are fractured, and different groups have different agendas. Various Kurdish groups also keep doing weird shit (yes, that’s the technical term). For example,</span></span></p><ul class="q-box" data-dcnode-id="3065" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3069" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3088" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3089" instrument_node="">In 2017, not heeding the warnings of Iraq, the US, Turkey and more, one of the factions in Iraq held the </span></span><span class="q-inline" data-dcnode-id="3081" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_Iraqi_Kurdistan_independence_referendum" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3087" instrument_node="">Iraqi Kurdistan independence referendum</span></a><span class="q-inlineBlock" data-dcnode-id="3082" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3083"><svg data-dcnode-id="3084" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3085" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3079" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3080" instrument_node="">. Kurds were over 93% for independence. This is not very impressive, considering the question is par with “do people need water to survive?” However, Iraq was not really happy about this, naturally as they are the ones whom Kurds are being independent from. The events resulted in </span></span><span class="q-inline" data-dcnode-id="3072" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_Iraqi%25E2%2580%2593Kurdish_conflict" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3078" instrument_node="">2017 Iraqi–Kurdish conflict</span></a><span class="q-inlineBlock" data-dcnode-id="3073" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3074"><svg data-dcnode-id="3075" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3076" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3070" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3071" instrument_node="">. Kurds lost some (oil-rich) land. Note that they also lost to the current Iraqi army - which is not a serious fighting force itself.</span></span></li><li class="q-relative" data-dcnode-id="3066" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3067" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3068" instrument_node="">In 2016, Trump got elected with the promise of bringing US troops out of Afghanistan and the Middle East. Between 2016 and 2018, the main Kurdish militia in Northern Syria (YPG) relied on US troops to enlarge their land, and displace non-Kurds in the land they have. This antagonized Turkey, and Syria; but no sane country will attack a force if there are US troops embedded in it. So among the praises of western press, and images of beautiful Kurdish women fighters (not sarcasm, I do find them hot), YPG expanded their territory. In December 2018, Trump said to the US military “I gave you 2 years to fix things. You are now coming back.” And now YPG is suddenly without their US protection. Antagonizing all your your neighbors while relying on a transient force that is your ally for a short period of time... That’s not the political maneuvering that makes nations.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3062" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3063" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3064" instrument_node="">The situation is, of course, much more nuanced than a 250-word CNN article on how the poor Kurds are suffering. I am Turkish. North Iraq Kurdish territory is almost nation itself, and is politically allied to Turkey, with a lot of trade going on between. I don’t want any conflict between Iraq and North Iraq Kurdish territory - both because the people of region can do with fewer conflicts, but also because it is bad for Turkish economy. I don’t like Kurds do political blunders like the referendum in 2017.</span></span></p><span data-dcnode-id="3061" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3058" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3059" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3060" instrument_node="">There are two groups of Kurdish militias that do terror attacks on Turkey. These militias look cute on western press, but they benefit from conflict, and take steps to prevent a political resolution. The Kurdish party in Turkey (HDP) gets over 10% of the vote in general elections. That is a strong political power base if Turkey was not forced to exist in a state of emergency all the time. Denounce the violence. Stop the attacks. Do politics.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2976" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2977" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2978" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2992" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3024" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3025" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3035" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3036" style="box-sizing: border-box; position: relative;"><button aria-label="210 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="3037" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width  background: none;"><span data-dcnode-id="2694" instrument_node="">Some do and some don’t. It depends on their point of view: some Kurds want to live in harmony with Turks in Turkey, some crave for an independent Kurdistan. Those who hate Turks are obviously those who have their mind fixed on an independent Kurdish state that Turkey (probably) won’t give. Those who don’t mess up with politics generally live at peace with Turks, as they are okay with the Turkish state.</span></span></p><span data-dcnode-id="2691" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2688" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2690" instrument_node="">I’m politically neutral at the moment because I need to do deeper researches about the Turkish-Kurdish conflict going on. But personally I see Turks as my brothers, I don’t want some political ideas to ruin our brotherhood/humanity, wether there will be an independent Kurdish state or not. I have many Turkish friends and they make me feel better when I am with them. Obviously, like in every culture, there are Turks who are racist as well whom hate Kurds in all ways. I don’t have to do much with them except wishing them some guidance.</span></span></p><span data-dcnode-id="2687" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2684" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2686" instrument_node="">I love Turks because I don’t see an end to this Kurdish-Turkish conflict if we don’t start making peace at first. Humanity should always be our first priority, no matter what’s going on. Hate will only lead to more hate and that’s disgusting.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2607" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2608" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2609" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2623" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2650" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2651" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2661" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2662" style="box-sizing: border-box; position: relative;"><button aria-label="14 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="2663" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;
