ing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2517" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2362" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2489" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2490" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2491" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2492" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2493" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2510" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2515" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2516" instrument_node="">I am a Kurd. I am really curious, why those people who dont like Kurds are more interested in writing in Kurdish issues? It seems they just want to leave </span></span><span data-dcnode-id="2513" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2514" instrument_node="">a bad Kurdish image</span></span><span data-dcnode-id="2511" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2512" instrument_node=""> for their racial interests. I mean racist Turks, Persians, Arabs and Assyrians.</span></span></p><span data-dcnode-id="2509" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2506" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2507" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2508" instrument_node="">If you ask them “Did Kurds denied your identity in any time?” They will say “No”. If you ask them “Did Kurds ever tried to divide your own homeland?” They will say “No”. If you ask them “Did Kurds tried to ban your own mother language? They will say “No.” If you ask them “Who are real land onwers in the Kurdish territories in Turkey, Iraq, Iran </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2494" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2495" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2496" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2497" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2498" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2503" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2504" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2505" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2499" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2500"><svg data-dcnode-id="2501" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2502" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2363" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2364" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2365"><span class="q-box qu-userSelect--text" data-dcnode-id="2366" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2482" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2487" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2488" instrument_node="">I am a Kurd. I am really curious, why those people who dont like Kurds are more interested in writing in Kurdish issues? It seems they just want to leave </span></span><span data-dcnode-id="2485" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2486" instrument_node="">a bad Kurdish image</span></span><span data-dcnode-id="2483" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2484" instrument_node=""> for their racial interests. I mean racist Turks, Persians, Arabs and Assyrians.</span></span></p><span data-dcnode-id="2481" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2478" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2479" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2480" instrument_node="">If you ask them “Did Kurds denied your identity in any time?” They will say “No”. If you ask them “Did Kurds ever tried to divide your own homeland?” They will say “No”. If you ask them “Did Kurds tried to ban your own mother language? They will say “No.” If you ask them “Who are real land onwers in the Kurdish territories in Turkey, Iraq, Iran and Syria? And, did Kurds came from Altai Mount, Asia in the past?” They will say “The real owners are Kurds but we are Muslim brothers. And no, Kurds didn't come from Asia on the contrary Turks came from Asia”. If you ask them “Who fought against English colonialism? Have you ever heard of Sheikh Mahmud Barzanji and his struggle against English colonialism in Iraq?” They will say “We don't know.”</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2469" style="box-sizing: border-box;"><div class="q-relative qu-cursor--pointer" data-dcnode-id="2470" data-embed-type="youtube" style="box-sizing: border-box; position: relative; margin-bottom: 1em;" type="youtube"><div class="q-box qu-bg--gray_ultralight" data-dcnode-id="2477" style="box-sizing: border-box; background-image: url(&quot;https://img.youtube.com/vi/8rrSaFvRBFU/0.jpg&quot;); width: 100%; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px inset; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat; padding-top: 56.25%;" width="100%"></div><div class="q-absolute qu-full qu-zIndex--qtext_overlay qu-display--flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2471" style="box-sizing: border-box; position: absolute; pointer-events: none;"><div class="q-flex qu-alignItems--center qu-justifyContent--center qu-bg--black_transparent qu-borderRadius--circle QTextVideo___StyledFlex-sc-4ox5j0-0 ksflZX" data-dcnode-id="2472" size="64" style="box-sizing: border-box; display: flex; width: 64px; height: 64px;"><span class="q-inlineBlock" data-dcnode-id="2473" name="VideoPlay" style="box-sizing: border-box; display: inline-block; width: 48px; height: 48px; flex-shrink: 0; line-height: 48px;" width="48px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 bPncvY" data-dcnode-id="2474"><svg data-dcnode-id="2475" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke icon_svg-fill" d="m18.5 12-11 7V5z" data-dcnode-id="2476" fill="none" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></div></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2466" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2467" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2468" instrument_node="">———————————Timeline (5:12) ————————————</span></span></p><span data-dcnode-id="2465" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2446" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2463" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2464" instrument_node="">If you ask them “Who collaborated with the English invaders?” You won't get any answer. Because they are </span></span><span data-dcnode-id="2461" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2462" instrument_node="">all</span></span><span data-dcnode-id="2459" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2460" instrument_node=""> guilty. Kurdish homeland divied by English rulers with support of racist Turks/Persians/Arabs. Because the Kurdish </span></span><span data-dcnode-id="2457" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2458" instrument_node="">bravery</span></span><span data-dcnode-id="2455" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2456" instrument_node="">, </span></span><span data-dcnode-id="2453" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2454" instrument_node="">honesty</span></span><span data-dcnode-id="2451" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2452" instrument_node=""> and </span></span><span data-dcnode-id="2449" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2450" instrument_node="">just</span></span><span data-dcnode-id="2447" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2448" instrument_node=""> treat was hurting them. Today Kurdish identity and language is officially banned in Turkey and Persia/Iran and until yesterday it was banned in Syria and Iraq too. If today the Kurds did not have a state of their own, the main reason is their struggle against English exploitation and injustice.</span></span></p><span data-dcnode-id="2445" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2442" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2443" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2444" instrument_node="">And as if these were not enough, those colonial collaborators and characterless personalities, trying to portray the Kurds as the pawn of international powers and the main cause of unrest. Stop bringing a curse down upon Kurds' heads despite not being real genies/djinns you are.</span></span></p><span data-dcnode-id="2441" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2438" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2439" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2440" instrument_node="">Kurds have always been lived free in their mountainous homeland despite racist Turks’ or Persians’ or Arabs' bad treat. If they say “No rest for Kurds” then we Kurds say to them “No rest for you too”. This is their all pain.</span></span></p><span data-dcnode-id="2437" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2434" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2435" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2436" instrument_node="">Despite all the smear of racist Turks, Persians, Arabs, and Assyrians; I am hundred percent sure all honored, dignified, anti-colonial people around the World will support Kurdish pace of today.</span></span></p><span data-dcnode-id="2433" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2430" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2431" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2432" instrument_node="">Below you'll see some historians' views on Kurds in the 1800s: (¹)</span></span></p><span data-dcnode-id="2429" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2426" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2427" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2428" instrument_node="">An intimate acquaintance with them of some years duration would lead us to say, that we know of scarcely any people or tribe more interesting to the historian of our race than the Kurds. There they have remained in their mountain fastnesses, an unchanged and unrecorded race, for certainly more than two thousand years. They have preserved, during all this time, their language, their laws, customs, habits, and independence. From their heights they have witnessed the plains below successively occupied and forsaken by nations from every quarter of the compass. The Assyrian, the Persian, the Arab, the Greek, the Roman, the Tatar, and Turk, have all set up their habitations in these vales and have passed forever; the Turk only lingers. It has been no home or resting-place for any of these races. But the Kurd looks back on an unbroken descent through a hundred or more generations. From father to son the mountain heritage has been handed down without a breach"</span></span></p><span data-dcnode-id="2425" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2422" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2423" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2424" instrument_node="">The Kurds, scattered through the East, numbering at the present time perhaps one million and a half, or two millions, are divided into various tribes, some of which acknowledge no allegiance to the Turkish or Persian governments. They are generally warlike, and many tribes are addicted to pillage and robbery. They are especially hostile to the Turks, and this in consequence of the oppressive and cruel policy of the government towards them. In many instances they have desired to abandon their mountain life and settle upon the plains, giving themselves to agriculture and trade; but the extortions of the government upon such villagers have been so unjust, and such atrocities have been committed upon them, that they have generally been driven back again into their mountain fastnesses. These extortions provoke attacks upon the Turkish caravans as they pass through the mountains; they are often plundered and the Turks massacred. Then the irritated government will send a strong force into some of the Kurdish villages that are perhaps innocent, the Turkish soldiers committing every kind of atrocity, burning the village, and putting all to the sword, men, women, and children. It is such a policy which has placed the Kurd in a fixed attitude of hostility to the Turk, and has produced the conviction in his mind, that he may rightfully plunder and oppose the government.</span></span></p><span data-dcnode-id="2421" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2418" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2419" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2420" instrument_node="">The life of a Kurdish chief is therefore usually full of adventure, excitement, and peril. He is the head of his tribe, or army, which assembles, as by enchantment, at his least signal, and which disappears as suddenly after a successful attack. He has, as a body-guard, a few daring warriors who never leave his side. With these he fears not to go upon the highways in quest of booty, nor to enter even into large cities. Frequently a chief with his imposing body-guard comes into the courts of justice, where are present the governor, it may be, the judge, counselor, and others in authority. They enter, at such times, bold and fearless, giving the usual salutation, then seat themselves upon the divan, at the same time carelessly holding their weapons, or laying them down by their side. Even Turkish officials then would not dare treat them otherwise than with the utmost deference. They are ever well informed upon all measures of the government.</span></span></p><span data-dcnode-id="2417" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2414" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2415" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2416" instrument_node="">These chiefs are in some instances so powerful that the Turkish government pays them an annual sum to keep them quiet; and sometimes provincial governors and pashas are in league with them in their depredations, sharing their profits and plunder. The more powerful of these predatory chiefs are seldom brought to punishment. Occasionally, however, one is lured into a snare and made to suffer. Sometimes he is invited to an entertainment given professedly by the government in his honor, when poison will be mixed in his cup, or a secret assassin plunge the dagger into his heart while seated at the table.</span></span></p><span data-dcnode-id="2413" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2410" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2411" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2412" instrument_node="">As a people, they are very strong, possessing noble forms, tall, with broad shoulders, erect head, black hair, and large black eyes, which are the highest constituent of beauty in the East. Their whole appearance makes no unpleasing impression. In stature they excel the Turks, and the clear and often deep expression of the eyes gives them the mark of the Indo-European race. Their uncommon exertions and hardships from their youth do not prevent them from attaining an advanced age. They often reach one hundred years in the full possession of their mental and physical powers. Rich, the celebrated English traveler in the East, declares that he has nowhere seen so many fine, hale old persons of both sexes as in Kurdistan. Notwithstanding the apparent disadvantage of climate, they are a very strong and healthy people. The children, too, are clear skinned and ruddy. A Kurdish child is a hardy, light, active little creature. These children, at the same time, are all remarkably well-behaved. True, they often have fierce conflicts and struggles among themselves, in which they are encouraged by their parents, but they always go through with them in a very good-natured way.</span></span></p><span data-dcnode-id="2409" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2406" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2407" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2408" instrument_node="">Like the Arabs, the Kurds are renowned for their hospitality. In visiting them in their tents, we were ever sure of receiving a cordial welcome. The fattest lamb or kid of the flock was slaughtered and placed entire before us, all cooked, and standing in a mountain of rice. This is their pilaf, a choice dish throughout all the East. Numerous other dishes, savory in smell and taste, would always be present, of which we were forced, by etiquette, to partake. Our spoons, or more generally our fingers, must go into the same dish with all the others, and we must eat with a relish. No greater insult can be given a Kurdish host than not partaking of his bounty. It is a custom to which they are strongly bound, that if they eat with one they become his firm and constant friend, and a knowledge of this custom is sometimes of great use in traveling among them.</span></span></p><span data-dcnode-id="2405" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2402" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2403" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2404" instrument_node="">The condition of Kurdish females is in many respects far preferable to that of the women of any oriental nation with which the writer has been acquainted. Their morality greatly exceeds that of the Turkish females, or of those of some oriental Christian nations. They are treated as equals by their husbands, and they laugh at and despise the slavish subjection of the Turkish women. They are very hospitable and attentive to guests, joining freely in conversation with them, in the presence of their husbands and men of their tribe. They go unveiled, and yet are modest and respectful, virtuous, ingenuous, and unsuspecting; they exhibit an easy familiarity which is both attractive and pleasing. Kurdish women are also very intelligent and industrious. Those remaining in the tent, or at home, give much time to the manufacture of carpets, similar to those which are made by the Persians and some tribes of the Turcomans. These are very beautiful, and give evidence of much ingenuity.</span></span></p><span data-dcnode-id="2401" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2398" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2399" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2400" instrument_node="">Some customs relating to marriage among the Kurds are quite different from those of other Oriental nations. Among the Turks, Armenians, and some others, the parties really most concerned or interested in the marriage are not in the least consulted, being betrothed by their parents, frequently when mere children, sometimes when in the cradle, and not seeing each other till after marriage. Not thus, however, among the Kurds. They permit their young people to associate together and become acquainted, and never compel them to marry against their will.</span></span></p><span data-dcnode-id="2397" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2394" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2395" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2396" instrument_node="">The Turks consider their wives as creatures for their pleasure, whom they must control gently to preserve peace in the family, or as toys, which they must handle carefully in order not to break them or tarnish their brightness, but they accord to them neither esteem nor confidence. These rude mountaineers, however, show marked respect and deference to their women, conversing freely and confidingly with them, and consulting them in all important affairs. They have nothing of that feeling of shame which the Turk ever manifests when he suddenly finds himself in the presence of a Frank lady, but are entirely at ease, respectful and attentive. Having traveled for weeks and even months with ladies, among these Kurds, and with Kurdish muleteers, remaining in their encampments over night, and entirely in their power, in all embarrassing and delicate situations, never has the writer seen the least departure from the strictest decorum, or even from the proprieties of refined and civilized life. Frank and ingenuous, they have conversed freely, asking questions without end, eager for information, but always entirely respectful. They are affable and benevolent, without observing the etiquette of a cold formality.</span></span></p><span data-dcnode-id="2393" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2390" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2391" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2392" instrument_node="">Dancing is a passion with them, as well as music, particularly with the females. All the Oriental dances are nearly of the same character, and of the highest antiquity. The women, adorned with silk dresses, gold buckles, and turbans, dance usually in a circle, and with much grace and beauty. These dances are in the field, or at the fountains, where they frequently assemble to pass a pleasant and joyous hour. In the common dance performed by the men, they clasp each other around the waist and form a long train. In another, which they sometimes practice, they dance in twos, flourishing the sword and shield. While the Kurd thus shows the vivacity of his character, the Turk, who manifests little or no inclination to activity, is never seen to dance.</span></span></p><span data-dcnode-id="2389" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2386" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2387" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2388" instrument_node="">Their music is simple, though not entirely destitute of art. It is usually expressive and melancholy. The mountaineer singer prolongs and slightly modulates monotonous sounds, articulating a few words which he forcibly throws in between sighs and tears. He greatly varies his lamentations in force, and usually closes by pouring forth the most moving cries. The correctness and sweetness of the voice are valued very much less than its extent or strength. To eulogize a singer, the Kurds say, “he can be heard a parasang.” Indeed, the chant for them, while they wander in the mountains, is the means to make known to their friends the place where they are to be found.</span></span></p><span data-dcnode-id="2385" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2382" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2383" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2384" instrument_node="">The songs of the Kurds are of love, war, and heroism. Many of their national chants celebrate, in a simple manner, without much rhetorical display, their homes, mountains, valleys, rivulets, deeds, their arms well furbished, their garments of bright and gaudy colors, and every thing accessible to their feelings and conceptions; and in these, there is no want of humor. Their war-songs are vividly descriptive of the honor, bravery, and struggle of the conflict; the trumpet that calls to combat, the dress of the sharp-shooters, the hiding place of the archers, the enemy harrassed or discovered by ambuscade, the noise of the cannon, the overthrow of battalions, the wounds of the bleeding, the death of the dying, and the crown that awaits the victor, covering all with glory and beauty.</span></span></p><span data-dcnode-id="2381" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2378" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2379" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2380" instrument_node="">The Kurds, in their rudeness and barbarity, preserve certain forms and usages which show in them an inclination towards civilization and generosity. Thus they are very fond of society, even wishing their guests to prolong their visits, devising many ingenious expedients to entertain and amuse them. And, with this keen relish for social and lively intercourse, their eye is ever open and attentive to every object around them. Rarely is a Kurd ever seen wandering alone, but always with two or more companions; they visit each other often, and if many are found together, there is always singing and mirth. They talk much in praise of their chiefs, of their courage and generosity, and relate with emotion the misfortunes which happen to them, through the faithlessness and cruelty of some Turkish pasha. In their work of plunder, even, they sometimes give strange proofs of their generosity and humanity.</span></span></p><span data-dcnode-id="2377" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2367" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2375" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2376" instrument_node="">(¹) </span></span><span class="q-inline" data-dcnode-id="2368" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/books/details%3Fid%3D_vUaAAAAYAAJ%26rdid%3Dbook-_vUaAAAAYAAJ%26rdot%3D1" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="play.google.com"><span data-dcnode-id="2374" instrument_node="">The New Englander: Volume 23 by - Books on Google Play</span></a><span class="q-inlineBlock" data-dcnode-id="2369" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2370"><svg data-dcnode-id="2371" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2372" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2290" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2291" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu- ally bordering each other, such that Corduene that situated in south of Lake Van had Armenian missionaries convert many of its people to the Armenian Apostolic Church in the early Middle Ages. Afte</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2177" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2178" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2179" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2180" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2181" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2186" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2187" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2188" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2182" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2183"><svg data-dcnode-id="2184" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2185" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2138" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2139" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2140"><span class="q-box qu-userSelect--text" data-dcnode-id="2141" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2169" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2170" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2171" instrument_node="">Technically they shouldn’t be related much, but historically they are.</span></span></p><span data-dcnode-id="2168" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2165" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2166" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2167" instrument_node="">They are both Indo-European ethnicities, but Armenians form the unique Armenian branch, when Kurds are a part of the Iranian branch. Historically, Kurds originate in the Zagros Mountain Range, and the Armenians originate in the Armenian Highlands and the Lesser Caucasus Mountains.</span></span></p><span data-dcnode-id="2164" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2161" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2162" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2163" instrument_node="">The homelands of these two ethnicities were historically bordering each other, such that Corduene that situated in south of Lake Van had Armenian missionaries convert many of its people to the Armenian Apostolic Church in the early Middle Ages. After the spread of Islam, Kurds converted to the new faith, when Armenians retained their unique church of Christianity.</span></span></p><span data-dcnode-id="2160" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2157" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2158" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2159" instrument_node="">When the Caliphate, and then the Turkic nomads, seized control of the Armenian Highlands, the region technically became a part of an Islamic state, opening the gateway for the Kurds to migrate to the Armenian Highlands and spread to a larger area much more easily. The Seljuqs expedited that process greatly, because they sold some of the Armenian lands to Muslim Kurdish lords, such that Ani, the capital of the Armenian kingdom, was sold to the Shaddadids in 1072, who married with Armenian nobles. Hence, Kurds further mixed with the Armenians. During the Ottoman times, Kurdish tribes were introduced to the region, initiating a change in the demographics of the region that would continue till this day. Although there were some Kurdish tribes that didn’t have amicable relationships with the Armenian locals, the Armenians and the Kurds managed to co-exist, until the late 19th century.</span></span></p><span data-dcnode-id="2156" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2153" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2154" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2155" instrument_node="">Just before the genocide, Kurdish and Armenian people became so intertwined that most of their villages in the region were side by side. The map below shows how the Armenian settlements (green) around Lake Van had some enclaves of Kurdish settlements and vice versa for the other regions.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2149" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2150"><div class="q-box unzoomed" data-dcnode-id="2151" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-d2bc3bbebfa74aeab86d120383be6f70-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2146" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2147" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2148" instrument_node="">The ethnographic map of the Middle East, before the dissolution of the Ottoman Empire. (This map may not be very accurate, so do not take for granted every element of this map.)</span></span></p><span data-dcnode-id="2145" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2142" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2143" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2144" instrument_node="">During the Armenian genocide, some Kurdish and Turkish tribes and the Ottoman officials went on to aggressively expel Armenians from their homes, because they regarded the Armenians as traitors. Along this process, because both the Armenian and the Kurdish settlements existed right beside each other for several centuries, most Armenians chose to disguise and identify as Kurds, out of their fear to get killed by them and the Turks. Although unpleasant, this added another layer of cultural and identity exchange. So, some Kurds in the Eastern Anatolia region, are actually crypto-Armenians.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2060" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2061" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2062" style="box-sizing: border-box; display: flex;"><div class="q-flex q ers of the country. So, it isn’t solely danced by Kurds.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1959" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1960"><div class="q-box unzoomed" data-dcnode-id="1961" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1962" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-d1c17e59d83cbdae93b7c18da42b80f4-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1956" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1957" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1958" instrument_node="">Rough distribution of folk dances in Turkey by province</span></span></p><span data-dcnode-id="1955" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1952" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1953" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1954" instrument_node="">The etymology of the name of the dance can be a clue. There aren’t much reliable sources about its name. A decade ago,</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1940" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1941" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1942" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1943" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1944" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1949" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1950" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1951" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1945" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1946"><svg data-dcnode-id="1947" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1948" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1884" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1885" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1886"><span class="q-box qu-userSelect--text" data-dcnode-id="1887" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1928" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1934" instrument_node="">I don’t understand what “for Kurds” means, but I am assuming that the question asks whether it is Kurdish. Well, the answer is complicated, but it can be said that </span></span><span data-dcnode-id="1931" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1932" instrument_node="">it is but not exclusively</span></span><span data-dcnode-id="1929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1930" instrument_node="">. In Turkey, many dances are called by the same name throughout many regions, despite ethnic/cultural differences. Halay is danced from the eastern side of Ankara to the eastern borders of the country. So, it isn’t solely danced by Kurds.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1924" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1925"><div class="q-box unzoomed" data-dcnode-id="1926" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1927" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-d1c17e59d83cbdae93b7c18da42b80f4-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1921" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1922" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1923" instrument_node="">Rough distribution of folk dances in Turkey by province</span></span></p><span data-dcnode-id="1920" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1917" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1918" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1919" instrument_node="">The etymology of the name of the dance can be a clue. There aren’t much reliable sources about its name. A decade ago, most etymological explanations regarded its origin as Turkic, which was obviously fake, as dances similar to halay aren’t continuously seen past Iran. There were other claims referring to its connection with the word “alay,” a word borrowed from Farsi.</span></span></p><span data-dcnode-id="1916" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1913" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1914" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1915" instrument_node="">Less than a decade ago, some dictionaries started referring to its etymological origin as Kurdish; however, on most dictionaries, there are no sources. Apparently, the explanation comes from Sevan Nişanyan, a linguist.</span></span></p><span data-dcnode-id="1912" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1909" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1910" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1911" instrument_node="">According to him, the first appearance of the word is in 1928 and wasn’t widely known as a term. In the book “Anadilden Derlemeler,” which was written in 1932, the term seems to be used for specific dances found in Central Anatolia.</span></span></p><span data-dcnode-id="1908" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1892" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1907" instrument_node="">I had made further research. According to what I found, the dance indeed seems to have roots in Central Anatolia, because there is a Pontic (?) Greek dance from Yozgat, which is known as “Χαλάι”. When surfing on the Internet, I have encountered that Iraqi Kurds claim that this term is unknown to them. It seems that the words such as “govend” or “dîlan,” etc. are used in Kurdish for such dances. Though, I have also seen some Kurds say that they call such dances “xel,” but I don’t remember the region. I also extensively searched the word “hilayi,” the suggested word that “halay” comes from, and related rootwords and suffixes but couldn’t find anything about the suggested word and connection. </span></span><span class="q-inline" data-dcnode-id="1899" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abakus.inonu.edu.tr/xmlui/bitstream/handle/11616/15285/Tez%2520Dosyas%25C4%25B1.pdf%3Fsequence%3D1%26isAllowed%3Dy" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="abakus.inonu.edu.tr"><span data-dcnode-id="1905" instrument_node="">And it seems that even in the western parts (Kahta, Adıyaman) of the Kurdish majority regions, the word “govend” is used (34).</span></a><span class="q-inlineBlock" data-dcnode-id="1900" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1901"><svg data-dcnode-id="1902" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1903" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1897" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1898" instrument_node=""> There seems to be an interesting word in Armenian, which means game or dance: խաղ (</span></span><span data-dcnode-id="1895" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1896" instrument_node="">xał</span></span><span data-dcnode-id="1893" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1894" instrument_node="">).</span></span></p><span data-dcnode-id="1891" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1888" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1889" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1890" instrument_node="">Regardless of its origin, the dance is found in many peoples, so there are indeed Kurdish variants. However, it seems that the word “halay” possibly came to use among the Kurds in Turkey as a result of assimilation, and through many decades under the Republic of Turkey, the dance (but actually the name) started to be associated with the Kurds due to politics. There aren’t enough reliable sources for its etymological origin. When you look at this in another way, a less controversial and complicated question would be whether “govend” is Kurdish or not, which is absolutely yes.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1816" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1817" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1818" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1832" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1854" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id t of a Kurdish state.  Turkey will protest, but they are powerless to stop it.  At some point, it will be recognized by the UN as well.</span></span></p><span data-dcnode-id="1424" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1421" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1422" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1423" instrument_node="">Drawing borders along ethnic lines as proven more stable than just using rulers on a map, which is how the former lands of the Ottomans was divided up by the Anglo-French after WWI.</span></span></p><span data-dcnode-id="1420" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1417" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1418" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1419" instrument_node="">This way, when the ethnicity based nation states go to war, at least it will be a war of states, not a civil war, which usually entails more civilian casualties.  Civil wars are ugly affairs.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1340" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1341" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1342" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1356" style="box-sizing: border-box; display: flex;">< s or ethnic group had more than 50% of the population. T.E. Lawrence (Lawrence of Arabia), who had worked with Bedouin tribes to fight against the Turks, understood this, and proposed a different map than that which Sykes-Picot had agreed on. Under his plan, many ethnic groups including the Kurds, would have some degree of</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1228" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1229" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1230" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1231" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1232" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1237" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1238" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1239" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1233" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1234"><svg data-dcnode-id="1235" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1236" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1208" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1209" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1210"><span class="q-box qu-userSelect--text" data-dcnode-id="1211" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1220" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1221" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1222" instrument_node="">The Kurds were basically sold out by the Sykes-Picot agreement between the UK and France. </span></span></p><span data-dcnode-id="1219" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1216" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1217" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1218" instrument_node="">The Sykes-Picot agreement was a disastrous attempt to impose western colonialism and the Westphalian state model on a heterogeneous population in the Middle East where no single religious or ethnic group had more than 50% of the population. T.E. Lawrence (Lawrence of Arabia), who had worked with Bedouin tribes to fight against the Turks, understood this, and proposed a different map than that which Sykes-Picot had agreed on. Under his plan, many ethnic groups including the Kurds, would have some degree of regional autonomy within each state. Unfortunately, he was overruled by the Foreign Office, who thought it would be easier to deal with a stronger central government. </span></span></p><span data-dcnode-id="1215" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1212" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1213" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1214" instrument_node="">No doubt, another factor which contributed to the Kurds' failure to secure a state at this time was the discovery of oil near Kirkuk. You need to keep in mind that just before this, in 1905, Winston Churchill, then First Sea Lord, moved the Royal Navy from coal to oil, and the Anglo-Persian Oil Company, which later became BP, was established. Britain was more interested in stability in the regions where it got oil than the rights of the Kurds.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id
