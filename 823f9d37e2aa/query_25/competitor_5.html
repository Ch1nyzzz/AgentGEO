id="836" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="837" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="667" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="668" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="669"><span class="q-box qu-userSelect--text" data-dcnode-id="670" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="821" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="822" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="823" instrument_node="">Women have always had a significant influence in Kurdish culture.</span></span></p><span data-dcnode-id="820" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="813" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="818" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="819" instrument_node="">The stories told about the fierce kurdish women first began in the kingdom of Gutium. It is said that the women of Gutium fought alongside their husbands, fathers and sons. The Kurds are believed to derive from the ancient renowned people of the Gutians, who were known as “</span></span><span data-dcnode-id="816" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="817" instrument_node="">namrûtum</span></span><span data-dcnode-id="814" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="815" instrument_node="">” (the light colured) by the ancient Akkadians. The word Guti itself means, Gu (mountain), ti (belongs to), the ones who belong to the mountains.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="810" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="811" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="812" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-4292395f91db89152637e80f75d96577-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="807" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="808" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="809" instrument_node="">The stories of the Kurdish women does not end here.</span></span></p><span data-dcnode-id="806" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="803" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="804" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="805" instrument_node="">Xenophon himself wrote in the Anabasis that the presence of women was very visible in the army of the Medes.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="799" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="800"><div class="q-box unzoomed" data-dcnode-id="801" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="802" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-afc5dc3850c66d44fcf9fd364f1304ed-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="796" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="797" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="798" instrument_node="">Now we need to jump over several centuries until we see the presence of Kurdish women in the army, but that does not mean they did not have a significant role anymore.</span></span></p><span data-dcnode-id="795" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="792" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="793" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="794" instrument_node="">Kurdish society was a matriarchal society. It was often the women in the individual households that kept hold of what we now see as the “man’s job”. While the men were out grazing the sheep on the steppes and mountains, the women took care of the affairs at home. She would maintain the household economy (Gold, silver, wool etc.), and it was her responsibility to make sure that everything was going smoothly.</span></span></p><span data-dcnode-id="791" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="788" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="789" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="790" instrument_node="">We can still see this in todays Kurdish societies where the women almost always have control over the material assets in the household. Among my Kurds (Konya), it is the women who take care of the gold, recovers debts, make sure that the family has no oustanding disputes with other families etc., and it is often with the women’s gold that the people of our villages have managed to build a wealth not seen anywhere else in Turkey in such a big scale.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="785" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="786" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="787" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-857128a74dc035ce07669b58f10d193e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="784" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="780" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="781"><div class="q-box unzoomed" data-dcnode-id="782" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="783" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-9a93af29a3a0ca37bbc4a03180673d45-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="779" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="776" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="777" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="778" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-1d8f1440af520536194f8253a4602bd9-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="775" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="771" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="772"><div class="q-box unzoomed" data-dcnode-id="773" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="774" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-447b4e9f5c1e016d1a1fd8b027140a8b-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="768" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="769" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="770" instrument_node="">Princess Sinem Khan of the Botan Emirate.</span></span></p><span data-dcnode-id="767" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="764" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="765" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="766" instrument_node="">Of course i am to mention the fierce Kurdish women fighters who fought bravely against ISIL and other extremist groups.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="761" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="762" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="763" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-2b3c1276d6117936496ded6d100546a8-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="760" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="756" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="757"><div class="q-box unzoomed" data-dcnode-id="758" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="759" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-22b09bd9713b33f792df55c0e874d356-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="755" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="751" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="752"><div class="q-box unzoomed" data-dcnode-id="753" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="754" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-fc1eb2288bea311dae36b4ac3ee70266-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="750" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="746" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="747"><div class="q-box unzoomed" data-dcnode-id="748" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="749" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-81c7688612ee3e469687c07bbcbd92ad-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="745" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="741" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="742"><div class="q-box unzoomed" data-dcnode-id="743" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="744" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-16ba1f73f12b8b2c1333580db0026a6a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="738" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="739" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="740" instrument_node="">A fun little story.</span></span></p><span data-dcnode-id="737" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="734" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="735" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="736" instrument_node="">This woman here is Asiye Hanim, also known as Kara Fatima Khanum, (Black Lady Fatima).</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="730" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="731"><div class="q-box unzoomed" data-dcnode-id="732" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-f21be3379ae80174b748959d88a1dc63-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="727" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="729" instrument_node="">She was a renowned Kurdish female chieftain who lived in the 19th century.</span></span></p><span data-dcnode-id="726" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="725" instrument_node="">She was married to a Kurdish cheiftan who was imprisoned, but Fatima did not let that stop her. She took control of the tribe and marched to Istanbul with 300 horsemen. It is said that Fatima had the capability of furnishing 4000 horsemen.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="719" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="720"><div class="q-box unzoomed" data-dcnode-id="721" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="722" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-be8b6bb76a3474c13f0204508502863e-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="716" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="717" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="718" instrument_node="">Fatima aided Sultan Abdülmecid the first in the crimean war which eventually resulted in victory for the Ottomans.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="712" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="713"><div class="q-box unzoomed" data-dcnode-id="714" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="715" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-6d600e2c5516075a4362ba694e9a9613-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="711" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="707" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="708"><div class="q-box unzoomed" data-dcnode-id="709" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="710" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-dace306ca7503e2688c9bb4c388d23a4-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="704" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="705" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="706" instrument_node="">All in all we can conclude that Kurdish women had a significant role in Kurdish society, and the idea of a women oppressing society is false. Not only regarding the Kurdish society but in the Middle East in general.</span></span></p><span data-dcnode-id="703" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="700" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="701" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="702" instrument_node="">So please stop your stereotypical prejudices.</span></span></p><span data-dcnode-id="699" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="696" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="697" s
