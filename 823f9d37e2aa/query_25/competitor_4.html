ground: none;"><span data-dcnode-id="6301" instrument_node="">In Europe, one of the main reasons that anti-Semitism was so prevalent was that Jews were “foreigners”</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="6287" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="6288" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="6289" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="6290" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="6291" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="6296" style="box-sizing: border-box; font-size: class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="6261" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="6276" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6277" instrument_node="">Aside from, of course, from the fact that there is not one iota of genetic evidence to support this incredibly anti-Semitic “argument,” I think I should remind you that </span></span><span data-dcnode-id="6274" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="6275" instrument_node="">the ethnogenesis of all Jewish people in Israel was </span></span><span data-dcnode-id="6272" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="6273" instrument_node="">not</span></span><span data-dcnode-id="6270" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="6271" instrument_node=""> </span></span><span data-dcnode-id="6268" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="6269" instrument_node="">once </span></span><span data-dcnode-id="6266" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="6267" instrument_node="">denied</span></span><span data-dcnode-id="6264" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="6265" instrument_node=""> </span></span><span data-dcnode-id="6262" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="6263" instrument_node="">until 1948.</span></span></p><span data-dcnode-id="6260" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="6253" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="6258" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6259" instrument_node="">In Europe, one of the main reasons that anti-Semitism was so prevalent was that Jews were “foreigners” and “Orientals.” The Semitic origins of Jews were not only accepted, but </span></span><span data-dcnode-id="6256" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="6257" instrument_node="">used </span></span><span data-dcnode-id="6254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6255" instrument_node="">as a reason to hate them.</span></span></p><span data-dcnode-id="6252" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="6245" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="6250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6251" instrument_node="">Jews weren’t considered “white Europeans” when they were only granted equal legal rights in the second half of the 19th century. They weren’t considered “white Europeans” the Tsarist regime imposed racial laws on them; nor when Hungary, Germany, Romania, Poland, Russia, and so many other European nations began persecuting Jews in the aftermath of World War I; nor when the Nazis began eagerly encouraging the boycott of Jewish businesses; </span></span><span data-dcnode-id="6248" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="6249" instrument_node="">and certainly not when the Third Reich massacred 6 million of them</span></span><span data-dcnode-id="6246" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6247" instrument_node="">.</span></span></p><span data-dcnode-id="6244" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="6241" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="6242" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6243" instrument_node="">There was never a problem for you when Jews were being persecuted in Europe and the Middle East. But the second that the Jewish people returned to their ancestral homeland to form their own Nation, they became foreigners.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="6137" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="6138" style="box-sizing: border-box;"><div data-dcnode-id="6139"><div class="q-box qu-borderBottom qu-px--medium qu-pt--small qu-pb--small" data-dcnode-id="6212" style="box-sizing: border-box;"><div class="q-flex qu-alignItems--center" data-dcnode-id="6213" style="box-sizing: border-box; display: flex;"><div class="q-box" data-dcnode-id="6220" style="box-sizing: border-box; flex: 1 1 0%;"><div class="q-text qu-dynamicFontSize--regular qu-medium qu-color--gray_dark qu-passColorToLinks" data-dcnode-id="6221" style="box-sizing: border-box;"><span data-dcnode-id="6222" instrument_node="">Related questions</span></div></div><div class="q-box qu-ml--small" data-dcnode-id="6214" style="box-sizing: border-box;"><button class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 laIUvT qu-active--bg--darken qu-active--textDecoration--none qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="6215" role="button" style="box-sizing: border- nal, it’s accepted, it establishes you as one of the guys, and it’s perfectly safe. Talk racist shit to a black person and you might get punched in the face. Talk smack about the Jews and nothing happens. When a black person gets killed by a cop, our cities erupt in violence. When 11 Jews are murdered in a Pittsburgh synagogue, letters get written to the editor at the New York Times.</span></span></p><span data-dcnode-id="6047" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="6044" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="6045" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6046" instrument_node="">Ahed Tamimi could slap Israeli soldiers with impunity because she knew there would be no repercussions for it. Had the soldiers been ISIS in stead of Israeli, she would have had her head cut off.</span></span></p><span data-dcnode-id="6043" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="6040" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="6041" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="6042" instrument_node="">Jews by and large are model citizens who obey the law and present no danger to social order. That’s why we can be abused with impunity. In Europe and the UK, governments find it easier to appease Muslim antisemitism than to afford Jews justice, because when Muslims are pissed off, they riot ands burn shit down. Jews just agonize over it and perhaps leave the country, which is kind of what they’re shooting for.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="5824"><div class="q-box qu-borderAl e="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="5974" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="5837" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="5950" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="5951" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5952" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="5953" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="5954" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5971" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5973" instrument_node="">Until approximately the 20th Century, most people, including most Jews, did not consider any Jews, including Ashkenazi Jews, “white.” Prior to that time Jews of all backgrounds just viewed themselves as distinctly Jewish and not part of the “white/black/yellow” racial paradigm and pseudoscience.</span></span></p><span data-dcnode-id="5970" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5967" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5968" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5969" instrument_node="">After WWII and in large part because of the bogus pseudoscience of the Nazis and their obsession about race and their corresponding conclusion that Jews were not only not “white” but also uniquely sub-human, there were many Jews, particularly in America, who wanted to be considered “white” just like man</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5955" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5956" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5957" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5958" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5959" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5964" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5965" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5966" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5960" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5961"><svg data-dcnode-id="5962" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5963" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5838" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5839" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5840"><span class="q-box qu-userSelect--text" data-dcnode-id="5841" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5947" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5948" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5949" instrument_node="">Until approximately the 20th Century, most people, including most Jews, did not consider any Jews, including Ashkenazi Jews, “white.” Prior to that time Jews of all backgrounds just viewed themselves as distinctly Jewish and not part of the “white/black/yellow” racial paradigm and pseudoscience.</span></span></p><span data-dcnode-id="5946" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5943" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5944" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5945" instrument_node="">After WWII and in large part because of the bogus pseudoscience of the Nazis and their obsession about race and their corresponding conclusion that Jews were not only not “white” but also uniquely sub-human, there were many Jews, particularly in America, who wanted to be considered “white” just like many other people of Middle Eastern ancestry. In fact, a number of the early lawsuits in the 20th Century filed by individuals who wished to be considered “white” under American law and racial classifications were by Americans from Syria and Lebanon.</span></span></p><span data-dcnode-id="5942" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5939" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5940" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5941" instrument_node="">Thus, the only way it makes sense to consider Ashkenazi Jews “white” when they are as genetically connected to the Levant and the Middle East as many if not most Lebanese and Syrians living in the USA, is if one considers all Middle Easteners “white” and no longer considers “white” to be a synonym for “European.”</span></span></p><span data-dcnode-id="5938" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5935" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5936" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5937" instrument_node="">Today, however, identity politics and the need to justify a new form of antisemitism, drives a great deal of the discussion about so-called “white Jews.” It is ironic in many respects because the very term “antisemitism’ was coined by anti-Jewish activist Wilhelm Marr, who objected to the idea that Jews could or should assimilate into Germany. His notion of antisemitism became interlaced with the idea that Jews were themselves a separate and unique (albeit to him inferior) “race” from white Europeans.</span></span></p><span data-dcnode-id="5934" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5931" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5932" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5933" instrument_node="">Presently, people who are generally hostile to Jews and to the State of Israel existing as the indigenous homeland of the Jewish people, often disparagingly throw around the term “white Jew.” Of course, these same people never throw around the term “white Muslim” though Islam is - unlike Judaism - a universal, non-tribal faith, and there are plainly many more people whose are exclusively ethnically European, who are Muslim than who are Jewish. And In both Europe and America, which essentially invented the racialized pseudoscience that divides people into white/black/yellow categories and has nothing to do with Jewish identity, there are likely as many Muslims who “pass” as “white” and there are Jews who “pass” as “white.”</span></span></p><span data-dcnode-id="5930" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5918" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5928" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5929" instrument_node="">None of this, however, changes the fact that the entire notion of Ashkenazi Jews as “White people” is new (from a historical perspective) and is also detached from any historical context, including in America, where, as recently as the </span></span><span class="q-inline" data-dcnode-id="5921" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="5926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/1986/03/04/nyregion/yale-s-limit-on-jewish-enrollment-lasted-until-early-1960-s-book-says.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.nytimes.com"><span data-dcnode-id="5927" instrument_node="">early 1960’s there were still quotas on Jewish enrollment in some Ivy League schools</span></a><span class="q-inlineBlock" data-dcnode-id="5922" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="5923"><svg data-dcnode-id="5924" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="5925" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="5919" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5920" instrument_node="">.</span></span></p><span data-dcnode-id="5917" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5888" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5915" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5916" instrument_node="">As America developed its race conscious beginnings, Jews were certainly not considered “white.” In the American colonies, the 1705 Virginia statute, regarding the “</span></span><span class="q-inline" data-dcnode-id="5908" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="5913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopediavirginia.org/_An_act_concerning_Servants_and_Slaves_1705" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.encyclopediavirginia.org"><span data-dcnode-id="5914" instrument_node="">Act Concerning Servants and Slaves</span></a><span class="q-inlineBlock" data-dcnode-id="5909" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="5910"><svg data-dcnode-id="5911" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="5912" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="5906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5907" instrument_node="">” provided: </span></span><span data-dcnode-id="5904" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5905" instrument_node="">“[N]o Negros, mulattos or Indians, </span></span><span data-dcnode-id="5902" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="5903" instrument_node="">Jew</span></span><span data-dcnode-id="5900" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5901" instrument_node="">, Moor, Mahometan, or other infidel… shall purchase any Christian white servant…”. So </span></span><span data-dcnode-id="5898" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5899" instrument_node="">while Europeans persecuted and even massacred Ashkenazi and Sephardi Jews for not being “white” and institutions in America until at least the middle of the 20th Century mistreated numerous people, including Jews for being non-white, contemporary population genetics reveal how this simplistic pseudoscience </span></span><span class="q-inline" data-dcnode-id="5891" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="5896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scientificamerican.com/article/race-is-a-social-construct-scientists-argue/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.scientificamerican.com"><span data-dcnode-id="5897" instrument_node="">was just plain wrong</span></a><span class="q-inlineBlock" data-dcnode-id="5892" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="5893"><svg data-dcnode-id="5894" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="5895" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="5889" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5890" instrument_node="">. The idea of three distinct races, including a “White” race, is a biological myth, as wrong as the once widely held belief that the sun revolved around the earth. Anthropologists, biologists and geneticists have increasingly found that, biologically speaking; there is no such thing as “race.” Modern science has allowed us to unravel the genetic puzzle of DNA and human variation – and their findings don’t remotely support the European pseudoscientific characterization of human beings being divided along these three simplistic categories.</span></span></p><span data-dcnode-id="5887" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5880" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5885" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5886" instrument_node="">The reality is that most people who describe Ashkenazi Jews as “white” do so for one of two reasons. The first is, as described above, to further their antisemitic goal of detaching many Jews, including the majority of Jews who founded Israel from their Middle Eastern ancestry, all while “otherizing” the Jew as a somehow “privileged” member of a minority group, one that is not entitled to be considered within the “intersection” of persecuted groups (despite Jews being among the most persecuted groups in history). The other reason is that many people have colonized minds and view people and “race” through a very Eurocentric lens. Under that lens, Judaism is just a religion and people who are Jewish and pale skinned are “white people” with a Jewish religion. But, Judaism and being Jewish is not simply a “religion.” That is a European concept. And it is a very Western/European concept to identify people under categories of religion or race. Middle Eastern people, however, have tribal identities. Jews, like many others in the Middle East, such as Pashtuns (who often have light skin and yet would not identify as “White”), are neither a religion nor race but a tribe. Jewish identity since at least the time of Joshua (approximately 3,450 years ago) has always been a tribal/national peoplehood (</span></span><span data-dcnode-id="5883" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5884" instrument_node="">Am Yisrael</span></span><span data-dcnode-id="5881" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5882" instrument_node="">).</span></span></p><span data-dcnode-id="5879" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5846" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5877" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5878" instrument_node="">Like many indigenous tribal people, a person is a “Jew” because he/she was born into a tribe/people; (in this case) called the Nation of Israel (</span></span><span data-dcnode-id="5875" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5876" instrument_node="">Am Yisrael</span></span><span data-dcnode-id="5873" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5874" instrument_node="">) or they were accepted into the tribe under the Jewish people’s tribal rites (</span></span><span data-dcnode-id="5871" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5872" instrument_node="">Giyur</span></span><span data-dcnode-id="5869" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5870" instrument_node="">). Genetics – mixed or otherwise – does not determine Jewish identity. But, if genetics did play a role in Jewish identity, there can be no denying that the Jewish people are a separate people as genetically connected to the Land of Israel as most African-Americans are to Africa. In his 2012 book, </span></span><span class="q-inline" data-dcnode-id="5862" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="5867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2010/06/10/science/10jews.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.nytimes.com"><span data-dcnode-id="5868" instrument_node="">“Legacy: A Genetic History of the Jewish People,” Dr. Harry Ostrer, a medical geneticist</span></a><span class="q-inlineBlock" data-dcnode-id="5863" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="5864"><svg data-dcnode-id="5865" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="5866" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="5860" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5861" instrument_node=""> and professor at Albert Einstein College of Medicine, based on comprehensive studies, including from the human genome project, notes that despite (and in part because) of centuries of exile, oppression and persecution, Jews are one of the most genetically distinctive population groups in the world and approximately 75% of all Ashkenazi Jews, and </span></span><span class="q-inline" data-dcnode-id="5853" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="5858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.haaretz.com/landmark-study-proves-90-of-jews-are-genetically-linked-to-the-levant-1.295231" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: italic; background: none;" target="_blank" title="www.haaretz.com"><span data-dcnode-id="5859" instrument_node="">90% of all Jews</span></a><span class="q-inlineBlock" data-dcnode-id="5854" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="5855"><svg data-dcnode-id="5856" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="5857" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="5851" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5852" instrument_node=""> worldwide trace their genetics directly to the Levant. And while many Jewish groups look different, often sharing characteristics of their surrounding populations, Dr. Ostrer’s research demonstrates that despite outward appearances, Jewish genetics link the Jewish communities of North America and Europe (mainly Ashkenazi Jews) to most Sephardic Jews, and to most Mizrahi Jews, </span></span><span data-dcnode-id="5849" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5850" instrument_node="">as well as to the land of Israel</span></span><span data-dcnode-id="5847" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5848" instrument_node="">.</span></span></p><span data-dcnode-id="5845" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5842" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5843" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5844" instrument_node="">Bottom line, the idea of a “White Race” was and is a fiction created by the same people who oppressed and persecuted Jews for centuries; and in the last century murdered over 6 million mainly Ashkenazi Jews precisely for not being “white.” Thus, if one is a light skinned Jew (Ashkenazi or otherwise), then you are not a “White person” with a “Jewish religion,” you are a Jew – a member of a people who originated in Judea, whether you are “religious” or not. By the same token, how some European racists decided a few hundred years ago to label people with outdated pseudoscientific categories designed to justify European oppression of non-Europeans, including millions of Jews, should have no bearing on Jewish identity, an identity that pre-dates any European pseudo-scientists by three millennia.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="5650"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="5651" style="box-sizing: border-box;"><div data-dcnode-id="5652"><div data-dcnode-id="5653"><div data-dcnode-id="5654"><div data-dcnode-id="5655"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="5656" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="5657" style="box-sizing: border-box;"><div data-dcnode-id="5658"><div class="q-box" data-dcnode-id="5659" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="5767" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="5768" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="5769" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="5770" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-id="5811" style="box-sizing: border-box; display: inline-flex;"><div class="q-box qu-display--inline-flex" data-dcnode-id="5812" style="box-sizing: border-box; z-index: 0;"><div class="q-box qu-display--inline-flex" data-dcnode-id="5813" style="box-sizing: border-box;"><div class="q-relative qu-display--inline-flex puppeteer_popper_reference" data-dcnode-id="5814" style="box-sizing: border-box; position: relative;"><div aria-expanded="false" aria-haspopup="dialog" class="q-click-wrapper qu-display--inline-flex qu-tapHighlight--white qu-cursor- de-id="5764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5765" instrument_node="">Ashkenazi Jews are considered white when it suits someone else’s purpose. We are considered something else when it suits someone else’s purpose.</span></span></p><span data-dcnode-id="5762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5759" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5761" instrument_node="">Let’s be honest… race is a fiction. Genetics are science, but race is something we believe exists only when you can easily put someone in a particular category based upon their looks.</span></span></p><span data-dcnode-id="5758" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5755" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5757" instrument_node="">White? Sure. I count as white when someone decides that I’m privileged. My family only made it up to middle class when my father joined the military. There are certainly some Jews with a lot of money, fame, and power, but that isn’t true for the vast majority of us.</span></span></p><span data-dcnode-id="5754" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5751" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5753" instrument_node="">But the</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5739" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5740" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5741" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5742" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5743" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5748" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5749" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5750" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5744" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5745"><svg data-dcnode-id="5746" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5747" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5664" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5665" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5666"><span class="q-box qu-userSelect--text" data-dcnode-id="5667" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5731" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5733" instrument_node="">Ashkenazi Jews are considered white when it suits someone else’s purpose. We are considered something else when it suits someone else’s purpose.</span></span></p><span data-dcnode-id="5730" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5727" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5729" instrument_node="">Let’s be honest… race is a fiction. Genetics are science, but race is something we believe exists only when you can easily put someone in a particular category based upon their looks.</span></span></p><span data-dcnode-id="5726" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5725" instrument_node="">White? Sure. I count as white when someone decides that I’m privileged. My family only made it up to middle class when my father joined the military. There are certainly some Jews with a lot of money, fame, and power, but that isn’t true for the vast majority of us.</span></span></p><span data-dcnode-id="5722" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5719" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5720" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5721" instrument_node="">But the claim of whiteness only extends to the point where someone wants to make it seem like we have no worries. It ends the instant someone can make us into an “other.”</span></span></p><span data-dcnode-id="5718" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5715" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5716" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5717" instrument_node="">Consider the statements made by two congresswomen over the last few years:</span></span></p><span data-dcnode-id="5714" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5707" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5712" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5713" instrument_node="">In 2019, a deleted tweet from Ilhan Omar announced that congressmen sided with Israel because of Israeli money (a claim that has zero truth).</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="5708" href="#DoguT" id="cite-DoguT" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="5711" instrument_node="">[</span><span data-dcnode-id="5710" instrument_node="">1</span><span data-dcnode-id="5709" instrument_node="">]</span></a></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5703" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="5704"><div class="q-box unzoomed" data-dcnode-id="5705" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="5706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-c3e2cc1dc1672fdbadf6ec4f3215ef2c-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5700" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5701" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5702" instrument_node="">She made several other comments along the same line, including a statement that Israel had “hypnotized the world.” She later “apologized” in one of the least spirited and least believable apologies I’ve ever witnessed.</span></span></p><span data-dcnode-id="5699" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5696" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5697" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5698" instrument_node="">Then we have Marjorie Taylor-Greene of Georgia:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5692" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="5693"><div class="q-box unzoomed" data-dcnode-id="5694" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="5695" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-a2baf58b0ed3c537d1cc32d36845bdb3-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5689" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5690" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5691" instrument_node="">Wow. I guess we used a bunch of our evil money to buy a space laser.</span></span></p><span data-dcnode-id="5688" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5685" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5686" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5687" instrument_node="">So… privileged eno jgusd" data-dcnode-id="5397" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="5398" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5399" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="5400" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="5401" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5418" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5419" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5420" instrument_node="">SO, I am an Ashkenazi Jew. My Dad was a child and sole survivor of his Jewish family from Poland in Nazi Germany and the ghetto and the camps. I also have a Russian Jewish and French Canadian Catholic mix (although grandpa converted) on the other side.</span></span></p><span data-dcnode-id="5417" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5414" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5415" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5416" instrument_node="">Askenazi represents the Eastern European Jew which is considered white. The countries are generally from north eastern European countries. The countries and regions each have their own language and cultures. The countries that represent the Saphardi is Spanish, Arabic and othern places where Jews lived for centuries. This group generally has a da</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5402" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5403" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5404" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5405" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5406" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5411" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5412" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5413" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5407" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5408"><svg data-dcnode-id="5409" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5410" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5342" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5343" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5344"><span class="q-box qu-userSelect--text" data-dcnode-id="5345" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5394" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5395" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5396" instrument_node="">SO, I am an Ashkenazi Jew. My Dad was a child and sole survivor of his Jewish family from Poland in Nazi Germany and the ghetto and the camps. I also have a Russian Jewish and French Canadian Catholic mix (although grandpa converted) on the other side.</span></span></p><span data-dcnode-id="5393" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5390" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5391" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5392" instrument_node="">Askenazi represents the Eastern European Jew which is considered white. The countries are generally from north eastern European countries. The countries and regions each have their own language and cultures. The countries that represent the Saphardi is Spanish, Arabic and othern places where Jews lived for centuries. This group generally has a darker complexion and have taken on those regions cultures. There are differences. There are other Jews from outside of these two groups. But a Jew is a Jew. It’s a lable that defines us no matter where we live or how we appear.</span></span></p><span data-dcnode-id="5389" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5386" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5387" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5388" instrument_node="">Every time I fill out a form or paperwork with a check box for race, I pause. Occasionally I inwardly wince. Who am I kidding? Because, I can never distance myself from the Holocaust experience of the Eastern European Jew and other victims and all of it's related events. I was born into the history and facts of it.</span></span></p><span data-dcnode-id="5385" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5382" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5383" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5384" instrument_node="">I know that being white meant nothing there. I know that my name would convict me. Round me up like cattle. Displace me. Strip me of my humanness. I could not use my 1/4 Christian genetic component to help me. If I were the reverse, only 1/4 genetically Jewish it was certain trouble. I could only rely on luck.</span></span></p><span data-dcnode-id="5381" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5378" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5379" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5380" instrument_node="">I know 2 things. I know art. I know Holocaust.</span></span></p><span data-dcnode-id="5377" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5374" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5375" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5376" instrument_node="">I know about the safety and fragility of life at the hands of hatred and the common enemy. I am not afraid. I can't change fate. I am silently, keenly aware.</span></span></p><span data-dcnode-id="5373" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5370" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5371" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5372" instrument_node="">You might say, forget it Cindy. It’s in the past now. But that was not my promise to my father, David Kestenberg. (Not an easy, lighthearted dad to have.) Our King David. After all of his experience, he was wise like King Soloman. It was not his legacy to his murdered family to leave this to be forgotten. And the 6,000,000. It is pummeled into my DNA.</span></span></p><span data-dcnode-id="5369" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5366" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5367" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5368" instrument_node="">There is a lot of hate out there. And on Quora for the 15,000,000 Jewish people or so who inhabit planet earth. We almost dont exist in numbers. Some would have liked Hitler to have finished the job.</span></span></p><span data-dcnode-id="5365" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5362" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5363" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5364" instrument_node="">So, am I white? I look it. Are Sephardic Jews something else? We are all Jewish people. We are one.</span></span></p><span data-dcnode-id="5361" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5358" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5359" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5360" instrument_node="">But inside I know I'm a needle in 100 haystacks that wants to get through my days without the dread and disgust of hatred. I hope my sons will live as well too.</span></span></p><span data-dcnode-id="5357" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5354" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5355" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5356" instrument_node="">Not exactly white. Thanks for this Quora question.</span></span></p><span data-dcnode-id="5353" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5350" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5351" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5352" instrument_node="">Where else could I express that?</span></span></p><span data-dcnode-id="5349" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5346" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5347" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5348" instrument_node="">CK</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="5268"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="5269" style="box-sizing: border-box;"><div data-dcnode-id="5270"><div data-dcnode-id="5271"><div data-dcnode-id="5272"><div data-dcnode-id="5273"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="5274" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="5275" style="box-sizing: border-box;"><div data-dcnode-id="5276"><div class="q-box" data-dcnode-id="5277" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="5286" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="5287" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="5288" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="5289" style="box-sizing: border-box; display: flex; align-it ode-id="5203" instrument_node="">But why do many people classify them as white?</span></span></p><span data-dcnode-id="5200" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5197" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5198" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5199" instrument_node="">In the US being considered white often has more to do with cultural identity and status rather than ancestry. If a group is fairly well assimilated into American culture, then it will likely be labelled white. It’s a social construct.</span></span></p><span data-dcnode-id="5196" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5193" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5194" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5195" instrument_node="">Most Ashkenazi Jews in the US are from families that immigrated there many generations ago. So many of them are fairly well integrated into American culture.</span></span></p><span data-dcnode-id="5192" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5189" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5190" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5191" instrument_node="">Regarding appearances, the stereotypical Ashkenazi Jew looks s</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5177" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, -shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5183"><svg data-dcnode-id="5184" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5185" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5137" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5138" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5139"><span class="q-box qu-userSelect--text" data-dcnode-id="5140" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5169" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5170" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5171" instrument_node="">Well first off, a lot of people don’t consider Ashkenazi Jews to be white. It depends on who you ask.</span></span></p><span data-dcnode-id="5168" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5165" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5166" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5167" instrument_node="">But why do many people classify them as white?</span></span></p><span data-dcnode-id="5164" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5161" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5162" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5163" instrument_node="">In the US being considered white often has more to do with cultural identity and status rather than ancestry. If a group is fairly well assimilated into American culture, then it will likely be labelled white. It’s a social construct.</span></span></p><span data-dcnode-id="5160" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5157" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5158" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5159" instrument_node="">Most Ashkenazi Jews in the US are from families that immigrated there many generations ago. So many of them are fairly well integrated into American culture.</span></span></p><span data-dcnode-id="5156" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5153" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5154" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5155" instrument_node="">Regarding appearances, the stereotypical Ashkenazi Jew looks similar to an Italian, Greek or Armenian. Aren’t all of the latter three groups seen as white today?</span></span></p><span data-dcnode-id="5152" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5149" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5150" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5151" instrument_node="">Many Turks, and to a lesser extent Arabs, who I know will identify as white if asked. Middle Eastern populations were historically classified as “Caucasoid” by scientists, along with North Africans, Europeans and Northern Indians. This is due to these aforementioned groups having very similar skull shape, which reflects ancestry much more deeply than skin tone.</span></span></p><span data-dcnode-id="5148" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5145" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5146" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5147" instrument_node="">So if even many Turks and Arabs identify as white, then why not Ashkenazi Jews? They’re Caucasoid, many of them are assimilated, and they look pale enough.</span></span></p><span data-dcnode-id="5144" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5141" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5142" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5143" instrument_node="">It all depends on one’s definition of white. If the definition is being genetically European, as the questioner believes it is, then Ashkenazi Jews would be non-white to an extent. But to sum up my answer, that’s not what the definition is to a lot of people.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="5042"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="5043" style="box-sizing: border-box;"><div data-dcnode-id="5044"><div data-d erranean Jews in the Hellenistic and Roman diasporas. We are at minimum half Levantine Middle Eastern and are close to South Italians, Sicilians, Maltese, Cretans and mainland Greeks and also Cypriots, Lebanese, Turks, Syrians, Samaritans and Druze. Ashkenazi Jews are primarily Mediterranean and Middle Eastern. Like other Mediterranean and Middle Eastern people we have a wide range of phenotypes from very dark to very light and everything in between.</span></span></p></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="4897"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="4898" style="box-sizing: border-box;"><div data-dcnode-id="4899"><div data-dcnode-id="4900"><div data-dcnode-id="4901"><div data-dcnode-id="4902"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="4903" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="4904" style="box-sizing: border-box;"><div data-dcnode-id="4905"><div class="q-box" data-dcnode-id="4906" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4983" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="4984" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="4985" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4986" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-id="5029" style="box-sizing: border-box; display: inline-flex;"><div class="q-box qu-display--inline-flex" data-dcnode-id="5030" style="box-sizing: border-box; z-index: 0;"><div class="q-box qu-display--inline-flex" data-dcnode-id="5031" style="
