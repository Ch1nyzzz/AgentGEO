h="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="4908" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4909" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="4978" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="4910" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4954" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4955" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4956" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4957" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4958" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4971" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4977" instrument_node="">I find it kind funny that questions like this all come from the same lame premise </span></span><span data-dcnode-id="4974" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4975" instrument_node="">European = White skin = Western</span></span><span data-dcnode-id="4972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4973" instrument_node="">. What’s even funnier is that some of those questions come from people who are purportedly against xenophobia and racism, but they themselves are deeply imprinted by the notion that a people must be “pure” to be respected in their ethnic identity (therefore, if it’s been proven that Ashkenazim have European admixture, especially Southern European one, then they aren’t “Jewish proper” anymore), and that if a population is light-skinned then it must be “European”, as if Europe owned “</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4959" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4960" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4961" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4962" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4963" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4968" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4969" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4970" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4964" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4965"><svg data-dcnode-id="4966" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4967" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4911" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4912" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4913"><span class="q-box qu-userSelect--text" data-dcnode-id="4914" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4947" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4952" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4953" instrument_node="">I find it kind funny that questions like this all come from the same lame premise </span></span><span data-dcnode-id="4950" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4951" instrument_node="">European = White skin = Western</span></span><span data-dcnode-id="4948" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4949" instrument_node="">. What’s even funnier is that some of those questions come from people who are purportedly against xenophobia and racism, but they themselves are deeply imprinted by the notion that a people must be “pure” to be respected in their ethnic identity (therefore, if it’s been proven that Ashkenazim have European admixture, especially Southern European one, then they aren’t “Jewish proper” anymore), and that if a population is light-skinned then it must be “European”, as if Europe owned “whiteness”, and Europeans are necessarily white (that point is utter ignorance after all we’ve learned from the findings of paleogenomics - such as this minor teaser: white skin probably expanded from West Asia).</span></span></p><span data-dcnode-id="4946" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4943" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4944" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4945" instrument_node="">Therefore, the thing is: the Ashkenazi Jews were not historically treated as “fellow Europeans” because of their distinct religion, their culture, their ethnic identity and - yes - their particular genetic makeup. Ashkenazi Jews, exactly like Ethiopian Jews, Iraqi Jews, Yemenite Jews, any Jewish population of the diaspora, did mix extensively with the locals, absorbing many of them (in general mostly local women) especially in the first centuries of their immigration and consolidation as a new Jewish group away from their original homeland.</span></span></p><span data-dcnode-id="4942" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4939" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4940" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4941" instrument_node="">Ashkenazi Jews are not “exotic” on that aspect, or do you think Ethiopian Jews look like Tunisian Jews or like Georgian Jews? Of course they don’t. But the fact remains that, apart from that local admixture, all Jews carry a major contribution that is most similar to the DNA makeup of people of the Bronze Age Levant, and probably would be even closer to that of the people of the Classical Antiquity Judea if we already had a large number of ancient DNA samples from that era and place.</span></span></p><span data-dcnode-id="4938" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4927" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4936" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4937" instrument_node="">Just consider that most Brazilian blacks are around 50–60% African in their ancestry. Would you really consider saying </span></span><span data-dcnode-id="4934" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4935" instrument_node="">oh no, you’re not black, you’re so mixed now, so just quit claiming African roots and keeping your African traditions</span></span><span data-dcnode-id="4932" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4933" instrument_node="">. Would you really dare doing so?! I really hope not. So, why would you do that to Ashkenazi Jews? They are around 50–60% Middle Eastern Levantines </span></span><span data-dcnode-id="4930" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4931" instrument_node="">even after</span></span><span data-dcnode-id="4928" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4929" instrument_node=""> 2000 years. That amount of non-European admixture is much more than enough to pull them apart from other Europeans and make them clearly distinct from them. And of course Europeans historically saw them as “foreigners”, when not even worse things.</span></span></p><span data-dcnode-id="4926" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4923" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4924" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4925" instrument_node="">Ashkenazi Jews are people with - obviously - a lot of European genetic and cultural contribution, but in everything that may matter - genetics, culture, religion, tradition, linguistics, ethnic/social identity - they have maintained their unmistakable differentiation from any other population living in Europe and maintained their strong links to the Middle Eastern, Jewish roots of their forebears.</span></span></p><span data-dcnode-id="4922" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4915" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4920" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4921" instrument_node="">Were they “European” in the sense that they were a part of the population residing in Europe and developing their culture and society there? Of course. Are they “European” in the sense that this question clearly implies? (that is, “they are white, so if they are white they just </span></span><span data-dcnode-id="4918" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4919" instrument_node="">cannot</span></span><span data-dcnode-id="4916" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4917" instrument_node=""> be Middle Eastern and then they are deceiving us by saying that their homeland is in Israel, their true homeland is Europe” (as if those things were decided through a DNA test, sigh!) No, of course they aren’t. Ethnicity is not a matter of DNA or looks. At the core of their ethnic identity, their allegiances and inspirations were never like those that formed the culture and identity of the other Europeans.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="4826"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="4827" style="box-sizing: border-box;"><div data-dcnode-id="4828"><div data-dcnode-id="4829"><div data-dcnode-id="4830"><div data-dcnode-id="4831"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="4832" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="4833" style="box-sizing: border-box;"><div data-dcnode-id="4834"><div class="q-box" data-dcnode-id="4835" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4852" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="4853" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="4854" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4855" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-id="4884" style="box-sizing: border-b enter" data-dcnode-id="4856" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="4857" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4836" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="4837" style="box-sizing: border-box;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4838" style="box-sizing: border-box;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4839" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4840" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4849" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4850" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4851" instrument_node="">When were we ever white in Europe? If anything, we weren’t considered “white” until the latter half of the twentieth century.</span></span></p><span data-dcnode-id="4848" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4845" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4846" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4847" instrument_node="">Some famous Europeans even recognized our Middle Eastern origins. A good example is Immanuel Kent, who was a Prussian philosopher who referred to us as “Palestinians living among us”.</span></span></p><span data-dcnode-id="4844" instrument_node=""> </span><p class="q-text qu-display--inline qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4841" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4842" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4843" instrument_node="">Anyways, most Americans would consider us “white” because of our lighter skin tone and the fact that we resided in Europe for centuries in exile.</span></span></p></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="4739"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="4740" style="box-sizing: border-box;"><div data-dcnode-id="4741"><div data-dcnode-id="4742"><div data-dcnode-id="4743"><div data-dcnode-id="4744"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="4745" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="4746" style="box-sizing: border-box;"><div data-dcnode-id="4747"><div class="q-box" data-dcnode-id="4748" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4769" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="4770" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="4771" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4772" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-id="4813" style="box-sizing: border-box; display: inline-flex;"><div class="q-box qu-display--i ; background: none;"><span data-dcnode-id="4768" instrument_node="">White is a social construct.</span></span></p><span data-dcnode-id="4765" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4762" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4763" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4764" instrument_node="">I personally don’t really find white and black to be such a good way of determining a person’s background. Ethnicity is more accurate, if you ask me.</span></span></p><span data-dcnode-id="4761" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4758" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4759" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4760" instrument_node="">Ethnically, Ashkenazi Jews are both Middle Eastern and European. Some look very white (I know some Ashkenazi Jews who have blond hair and blue eyes), and some look more Mediterranean (I also know some Ashkenazi Jews who have dark hair, dark skin and dark eyes).</span></span></p><span data-dcnode-id="4757" instrument_node=""> </span><p class="q-text qu-display--inline qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4754" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4755" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4756" instrument_node="">Not all Jews are the same.</span></span></p></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="4656"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small q ge qu-display--block" data-dcnode-id="4523" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-7aaa9e536ca7d7fbbf48fafe0c5aafb2-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4517" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4518" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4519" instrument_node="">Mila Kunis and Odeya Rush:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4513" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4514"><div class="q-box unzoomed" data-dcnode-id="4515" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4516" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-ed11f4171768fa7c59f92faee1e9e4a4-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4510" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4511" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4512" instrument_node="">Actress Elina Bistritskaya</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4507" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4508" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4509" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-c81e0620a336d824c4a4376a21a5fd7f-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4504" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4505" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4506" instrument_node="">My mother:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4500" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4501"><div class="q-box unzoomed" data-dcnode-id="4502" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4503" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-343290342e431bc63ddff66041a86728-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4497" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4499" instrument_node="">Today Judaism is clearly and unambiguously a religion, not an ethnicity or race as some people believe. Over the past 2,700 years of exiles, several Jewish nationalities have emerged in different regions of the world. To understand how it worked, it is necessary to explain what ethnicity is and how it was formed. ...</span></span></p><span data-dcnode-id="4496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4493" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4494" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4495" instrument_node="">How are ethnicities formed?</span></span></p><span data-dcnode-id="4492" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4491" instrument_node="">If a large group of people lives separately, without mixing with anyone else for a long period, say, 2000 years, they develop their own distinctive DNA pool in which their physical characteristics are formed, such as phenotype, structure of muscles and bones, hair color, color of skin, eyes, and other physical parameters. It is how ethnicities are formed, and this is what we call ethnicity. A tribe is another name for an ethnos.</span></span></p><span data-dcnode-id="4488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4487" instrument_node="">Over the 3800 years of existence, as a result of foreign intervention in the Jewish kingdom, the Jewish people have survived several exiles: </span></span><span data-dcnode-id="4484" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4485" instrument_node="">Neo-Assyrian, Babylonian and Roman</span></span><span data-dcnode-id="4482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4483" instrument_node="">. After the Neo-Assyrian exile, 10 Jewish tribes left the Holy Jewish Land and got lost somewhere in relocation. This is how the Jewish nation ceased to be one homogeneous ethnic group and became a religious multiracial community.</span></span></p><span data-dcnode-id="4480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4477" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4478" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4479" instrument_node="">Today Jews Come in All Colors:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4474" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4475" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4476" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.cf2.quoracdn.net/main-qimg-7278078bf5d5c6990a9ac9bc86364d29-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><ol class="q-box" data-dcnode-id="4448" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4469" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4470" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4473" instrument_node="">DID YOU KNOW?</span><br data-dcnode-id="4472"><span data-dcnode-id="4471" instrument_node="">The Jews of China built their famous “Purity and Truth” Synagogue in the third year of the Da Ding period (1163) of the Jin (Golden Tartar) Dynasty, in the ancient Chinese capitol city of Kaifeng.</span></span></li><li class="q-relative" data-dcnode-id="4464" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4465" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4468" instrument_node="">DID YOU KNOW?</span><br data-dcnode-id="4467"><span data-dcnode-id="4466" instrument_node="">15,000 Black African Jews trace their 3,000-year history to the time of Israel’s King Solomon.</span></span></li><li class="q-relative" data-dcnode-id="4459" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4460" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4463" instrument_node="">DID YOU KNOW?</span><br data-dcnode-id="4462"><span data-dcnode-id="4461" instrument_node="">Spanish &amp; Portuguese “Crypto” (secret) Jews arrived in New Mexico some 500 years ago, fleeing the Spanish Inquisition. Their descendents still recite Shabbat blessings in Ladino (archaic Spanish).</span></span></li><li class="q-relative" data-dcnode-id="4454" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4455" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4458" instrument_node="">DID YOU KNOW?</span><br data-dcnode-id="4457"><span data-dcnode-id="4456" instrument_node="">In India, the Bene Israel community – their ancestors arrived there 2,000 years ago – are called “Shanwar Telis” (Saturday Oil Pressers) as they refrain from work on the Shabbat.</span></span></li><li class="q-relative" data-dcnode-id="4449" style="box-sizing: bo uery,</span><br data-dcnode-id="4219"><span data-dcnode-id="4218" instrument_node=""> </span></span><span data-dcnode-id="4215" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4216" instrument_node="">"Why are Ashkenazi Jews considered white people?"</span></span><span data-dcnode-id="4209" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4214" instrument_node=""></span><br data-dcnode-id="4213"><span data-dcnode-id="4212" instrument_node=""> compares with,</span><br data-dcnode-id="4211"><span data-dcnode-id="4210" instrument_node=""> </span></span><span data-dcnode-id="4207" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4208" instrument_node="">"Is it true that Ashkenazi Jews in Israel are just white colonizers?"</span></span></p><span data-dcnode-id="4205" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4198" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4199" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4204" instrument_node="">The import of the two queries is virtually the same only one of them is framed in a slightly more acceptable manner.</span><br data-dcnode-id="4203"><span data-dcnode-id="4202" instrument_node=""> At all events the answer to either one of the two questions is applicable to the other.</span><br data-dcnode-id="4201"><span data-dcnode-id="4200" instrument_node=""> Let us be typically Jewish and answer the two questions with a few questions of our own.</span></span></p><span data-dcnode-id="4197" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4140" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4191" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4196" instrument_node="">Why should Ashkenazi Jews not be considered white? Why should they? Either way what difference should it make? What is wrong with being a "White Colonizer"?</span><br data-dcnode-id="4195"><span data-dcnode-id="4194" instrument_node=""> Most of the people in North and South America, Australia, New Zealand, and many other places had a "White Colonizer" contribution to their ancestry.</span><br data-dcnode-id="4193"><span data-dcnode-id="4192" instrument_node=""></span></span><span data-dcnode-id="4189" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4190" instrument_node=""> Is it already a crime to be a White Man?</span></span><span data-dcnode-id="4181" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4188" instrument_node=""></span><br data-dcnode-id="4187"><span data-dcnode-id="4186" instrument_node=""> What about the Jews of Ethiopia? Are they "Black" Colonizers?</span><br data-dcnode-id="4185"><span data-dcnode-id="4184" instrument_node=""> What about the Arabs who came out of Arabia and conquered the Holy land and all of Syria and North Africa, and Spain and other places. What kind of colonizers were they?</span><br data-dcnode-id="4183"><span data-dcnode-id="4182" instrument_node=""> Or is it because their skin is off-white, or a little tanned that they should be classified as "</span></span><span data-dcnode-id="4179" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4180" instrument_node="">Coffee Colonizers!</span></span><span data-dcnode-id="4161" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4178" instrument_node="">"</span><br data-dcnode-id="4177"><span data-dcnode-id="4176" instrument_node=""> Are "Coffee Colonizers" more Kosher?</span><br data-dcnode-id="4175"><span data-dcnode-id="4174" instrument_node=""> What is the difference between Ashkenazi Jews and Sephardi Jews in your opinion?</span><br data-dcnode-id="4173"><span data-dcnode-id="4172" instrument_node=""> Are the Sephardi Jews better? Are they preferable because some of them have a little more coffee in their milk? Why then did the Muslims treat them so horribly when the Sephardim sojourned in their lands? Was it because of their slightly coffee coloring that was only a little whiter than that of their Coffee Colored Gentile neighbors?</span><br data-dcnode-id="4171"><span data-dcnode-id="4170" instrument_node=""> Did you know that the Jews in Islamic Lands were treated very badly most of the time?</span><br data-dcnode-id="4169"><span data-dcnode-id="4168" instrument_node=""> Did you know that Jews were expelled from Arab and Muslim Lands (Iraq, Syria, North Africa, Egypt, etc) or at least persuaded to do so due to "moderate physical pressure" as they say in official jargon?</span><br data-dcnode-id="4167"><span data-dcnode-id="4166" instrument_node=""> Did you know that most of them lost most of their properties and possessions when they left?</span><br data-dcnode-id="4165"><span data-dcnode-id="4164" instrument_node=""> Did you know that more Jews came to Israel from Muslim Lands than "Palestinian" Arabs who fled or otherwise were induced to move on in 1948?</span><br data-dcnode-id="4163"><span data-dcnode-id="4162" instrument_node=""> </span></span><span data-dcnode-id="4159" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4160" instrument_node="">Is that how one "Coffee-Colored" victim of colonialist exploitation treats another?</span></span><span data-dcnode-id="4147" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4158" instrument_node=""></span><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node=""> Where is the "Coffee-Colored" Brotherhood of peoples in all this? </span><br data-dcnode-id="4155"><span data-dcnode-id="4154" instrument_node=""> Let us face the facts:</span><br data-dcnode-id="4153"><span data-dcnode-id="4152" instrument_node=""> No matter what the Jews are they will be hated for one reason or other.</span><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node=""> If no reason exists then reasons will be invented.</span><br data-dcnode-id="4149"><span data-dcnode-id="4148" instrument_node=""> </span></span><span data-dcnode-id="4145" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4146" instrument_node="">Do you really care whether Jews are “White Men” or not?</span></span><span data-dcnode-id="4141" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4144" instrument_node=""></span><br data-dcnode-id="4143"><span data-dcnode-id="4142" instrument_node=""> Does not the fact that Jews are simply Jewish (no matter what color they may be) bother you more?</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="4047"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="4048" style="box-sizing: border-box;"><div data-dcnode-id="4049"><div data-dcnode-id="4050"><div data-dcnode-id="4051"><div data-dcnode-id="4052"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="4053" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="4054" style="box-sizing: border-box;"><div data-dcnode-id="4055"><div class="q-box" data-dcnode-id="4056" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="4065" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="4066" style="box-sizing: border-box; width: 100%;" width="100%" data-dcnode-id="3618" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3619" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3587" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3588" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3589"><span class="q-box qu-userSelect--text" data-dcnode-id="3590" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3603" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3604" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3605" instrument_node="">Not exactly. We originate amongst Jews enslaved in Europe but there are converts who become Ashkenazi Jews who aren’t white as well as people adopted by Ashkenazi parents. These people are full Ashkenazis but they aren’t white. Also because of our Middle Eastern ancestry, many “pure” ethnic Ashkenazi will not be passing for white. A lot of us are as dark as any arab, if not darker. Though that might be irrelevant because in some countries arabs are considered white, so it’s subjective.</span></span></p><span data-dcnode-id="3602" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3599" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3600" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3601" instrument_node="">Also, as ridiculous as this sounds, for a lot of us it depends on the weather and how long it was since we last shaved and cut our hair. A lot of us have pretty light skin, but tan a ridiculous amount to the point that we don’t even appear white and also we grow afros, which aren’t considered to be a very white feature. I know for me personally I currently don’t look all that white because I have facial hair and an afro. If I shave and cut my hair though, I will look pretty much like any other white person. It’s surreal.</span></span></p><span data-dcnode-id="3598" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3595" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3596" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3597" instrument_node="">Also there’s the fact that white is a social construct rather than a scientific one meaning that it’s subjective and fits a social role. Remember that Ashkenazi Jews were persecuted for much of the modern era specifically because we were not considered white. White supremacists still don’t consider us to be white.</span></span></p><span data-dcnode-id="3594" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3591" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3592" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3593" instrument_node="">So ya, it’s complicated, though I think the fact that we even are having this discussion means we probably aren’t white.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="3474"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor-- beria</span></span></p><span data-dcnode-id="3057" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3054" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3055" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3056" instrument_node="">And the Iberian climate and diet and locals they mix with made them all pass for Europeans. Similar to what happened to the Jews.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="2961"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="2962" style="box-sizing: border-box;"><div data-dcnode-id="2963"><div data-dcnode-id="2964"><div data-dcnode-id="2965"><div data-dcnode-id="2966"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="2967" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="2968" style="box-sizing: border-box;"><div data-dcnode-id="2969"><div class="q-box" data-dcnode-id="2970" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="2979" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="2980" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="2981" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="2982" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-id="3023" style="box-sizing: border-box; display: inline-flex;"><div class="q-box qu-display--inline-flex" data-dcnode-id="3024" style= /span><span class="q-text qu-bold" data-dcnode-id="2914" style="box-sizing: border-box;"><span data-dcnode-id="2915" instrument_node="">4.6M</span></span><span data-dcnode-id="2913" instrument_node=""> answer views</span></span></div><div class="q-inline qu-verticalAlign--middle" data-dcnode-id="2910" style="box-sizing: border-box; display: inline;"></div></div></div><div class="q-inlineFlex qu-ml--small qu-alignItems--center" data-dcnode-id="2906" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="2907" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mb--tiny spacing_log_originally_answered_banner qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2898" style="box-sizing: border-box;"><span data-dcnode-id="2901" instrument_node="">Originally Answered: </span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Are-Ashkenazi-Jews-white%3Fno_redirect%3D1" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="2900" instrument_node="">Are Ashkenazi Jews white?</span></a></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2758" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2759" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2760" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2897" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2761" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2873" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2874" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2875" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2876" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2877" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2894" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2895" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2896" instrument_node="">It's complicated; the answer to the question depends on the context and what you mean when you say "white". It also depends on what you mean when you say “Ashkenazi”; the term can refer to ethnicity, but it can also refer to traditions/customs that are associated with that ethnicity as well as those who adhere to such customs, including those who convert to Judaism in Ashkenazi communities or those who marry Ashkenazim and adopt Ashkenazi custom, and thus the term Ashkenazi can include individuals with a range of complexions and racial backgrounds.</span></span></p><span data-dcnode-id="2893" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2890" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2892" instrument_node="">Within Jewish spaces, describing light-skinned</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2878" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2879" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2880" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2881" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2882" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2887" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2888" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2889" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2883" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2884"><svg data-dcnode-id="2885" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2886" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2762" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2763" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2764"><span class="q-box qu-userSelect--text" data-dcnode-id="2765" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2870" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2872" instrument_node="">It's complicated; the answer to the question depends on the context and what you mean when you say "white". It also depends on what you mean when you say “Ashkenazi”; the term can refer to ethnicity, but it can also refer to traditions/customs that are associated with that ethnicity as well as those who adhere to such customs, including those who convert to Judaism in Ashkenazi communities or those who marry Ashkenazim and adopt Ashkenazi custom, and thus the term Ashkenazi can include individuals with a range of complexions and racial backgrounds.</span></span></p><span data-dcnode-id="2869" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2866" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2867" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2868" instrument_node="">Within Jewish spaces, describing light-skinned Jews as "white" as a distinction from Jews of Color may be reasonable; outside of Jewish spaces, the use of the term "white" as a descriptor for Jews is highly misleading even though assimilated light-skinned Jews who do not wear identifying clothing do benefit from white privilege today, and even light-skinned Jews who are identifiably Jewish do today benefit from white privilege conditionally to some degree while, at the same time, frequently being the target of anti-Semitic harassment and violence.</span></span></p><span data-dcnode-id="2865" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2862" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2863" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2864" instrument_node="">Although light-skinned Jews benefit from white privilege in the present, the use of the term "white" in connection with Jews is problematic because:</span></span></p><ul class="q-box" data-dcnode-id="2826" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2851" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2860" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2861" instrument_node="">There are still many Jews alive today who were victims of the Holocaust or had parents who were victims of the Holocaust and who lived through a period of not having the privilege of “whiteness” in this country prior to the implementation of the Civil Rights Act; to say that they </span></span><span data-dcnode-id="2858" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2859" instrument_node="">are</span></span><span data-dcnode-id="2856" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2857" instrument_node=""> “white” (i.e. that they </span></span><span data-dcnode-id="2854" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2855" instrument_node="">are</span></span><span data-dcnode-id="2852" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2853" instrument_node=""> privileged, as is it were an innate, ever present state) rather than that they currently enjoy white privilege in certain scenarios is to deny their lived experiences of persecution and discrimination based on the perception that they are insufficiently aryan/white.</span></span></li><li class="q-relative" data-dcnode-id="2848" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2849" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2850" instrument_node="">The term "white" generally implies far more culpability and involvement in the black slave trade than is historically accurate (while some Jews were involved, a large proportion of Jewish Americans came to the US after abolition, and Jews were disproportionately involved in the fight for civil rights compared with non-Jewish whites). In the context of modern day blood libels that accuse Jews of masterminding the slave trade (such as the infamous "The Secret Relationship Between Blacks and Jews" by the well-known anti-Semite Louis Farrakhan), the "white" labeling is especially problematic.</span></span></li><li class="q-relative" data-dcnode-id="2845" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2846" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2847" instrument_node="">The term "white" generally implies being free of persecution and discrimination. While Italians and Irish individuals were once perceived as non-white and later became considered white, the situation with Jews is not analogous; while light-skinned Jews benefit from white privilege, anti-Semitic persecution remains in a way that does not apply for other groups that have transitioned from non-white to becoming white.</span></span></li><li class="q-relative" data-dcnode-id="2842" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2843" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2844" instrument_node="">While Jews are not a "race" (but rather a national group whose national identity derives from originally religious sources), the reality is that the Nazis did and neo-Nazis and white supremacists still do view Jews as a race and a non-white one at that. Thus, contextually, it is also the case that Jews are not white from the angle of how they are treated and perceived by various hate groups that persecute Jews.</span></span></li><li class="q-relative" data-dcnode-id="2839" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2840" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2841" instrument_node="">The term "white" generally implies European origin and heritage. However, throughout the diaspora and especially during the Holocaust, it was made eminently clear by Europeans that we Jews are not of them. Our rejection and persecution at the hand of Europeans make the lumping in with other "white"s highly offensive. Moreover, the Jewish people originated from the Middle East, not Europe. And amid attempts to erase and rewrite our history for political gain to divorce us from our origin in the Middle East in the land of Israel (the false Khazar theory is a prime example of this), it is all the more problematic for Jews to be labeled as "white", which wrongly implies European identity.</span></span></li><li class="q-relative" data-dcnode-id="2836" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2837" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2838" instrument_node="">Culturally and politically, light-skinned Jews and other "whites" are often at disagreement; for example, the difference in affinity for each political party among light-skinned Jews and non-Jewish whites could not be more stark. To lump in light-skinned Jews with other "whites" effectively misrepresents key distinctions between these groups.</span></span></li><li class="q-relative" data-dcnode-id="2833" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2834" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2835" instrument_node="">As a racial category, it isn't even accurate; "Middle Eastern" or "Semitic" would much more correctly convey our history and our genetics.</span></span></li><li class="q-relative" data-dcnode-id="2830" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2831" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2832" instrument_node="">It is offensive to be lumped in with white supremacists and other groups who are the primary purveyors and perpetrators of discrimination and persecution against us.</span></span></li><li class="q-relative" data-dcnode-id="2827" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2828" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2829" instrument_node="">In many left-leaning spaces, persecution and marginalization is generally considered as being strictly on a racial axis, with a false dichotomy between "oppressor" and "oppressed" groups. This false dichotomy and viewing persecution only through the lens of race, combined with a view that oppressor groups should "shut up and listen" leads to the labeling of light-skinned Jews as "white" being effectively silenced on issues of anti-Semitism (especially in the cases of anti-Semitism emanating from other marginalized groups such as from people of color like Mallory, Farrakhan, etc. or from Muslims like Sarsour as well as in cases of anti-Semitism in the form of anti-Zionism). To use the label "white" would greatly aid anti-Semites in silencing Jews when complaining about anti-Semitism and lend ammunition to the grossly inaccurate labeling of Israel as a "European colony" that is responsible for "oppression".</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2824" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2825" instrument_node="">For all these reasons and more, I personally reject the claim that light-skinned Jews are "white". Light-skinned Jews benefit from white privilege in certain contexts to varying degrees; this doesn't make them "white". While I used to use the phrase "white-passing" to describe this, I have since learned from the conversations arising from </span></span><span class="q-inline" data-dcnode-id="2817" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forward.com/opinion/404482/white-jews-stop-calling-yourselves-white-passing/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="forward.com"><span data-dcnode-id="2823" instrument_node="">Nylah Burton's article</span></a><span class="q-inlineBlock" data-dcnode-id="2818" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2819"><svg data-dcnode-id="2820" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2821" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="2815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2816" instrument_node=""> that this term, too, has its problems; in particular, the phrase has its own meaning in association with African Americans and Creoles who have slipped into white-ness. For lack of a better phrase, I think that "conditionally white" or "contextually white" would more accurately describe the situation of light-skinned Jews -- simultaneously not being truly and fully white but also benefiting from the privilege that goes along with being perceived and treated as white in many circumstances. Note that this doesn't mean that light-skinned Jews are “black”, “people of color”, or “non-white”, either; we are neither “white” nor “non-white”, with these terms applying poorly in the case of Jewish identity.</span></span></p><span data-dcnode-id="2813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2810" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2812" instrument_node="">While this is my own take on this issue, it is important to note that this question and topic is a highly controversial one within the Jewish community, with many differences of opinion. While it is far less controversial that light-skinned Jews can benefit from white privilege, whether this then means that “white” is a valid label is something not universally agreed on, with some more open to this labeling than others.</span></span></p><span data-dcnode-id="2809" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2806" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2807" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2808" instrument_node="">I would also add that this labeling is more problematic when applied to Jews as a group, but less problematic when applied to an individual member of the group. For example, saying “Josh is a white male” (where Josh happens to be Jewish and where you may not even know he is Jewish) is clearly just an attempt to describe how you perceive that person's appearance; from my viewpoint, this is not particularly problematic and doesn't carry with it the overtones of trying to make an anti-Semitic rhetorical argument. It is, rather, general statements about Jews (statements like “Jews are white” or “Ashkenazi Jews are white”) that strike me as problematic, because they are much more closely associated with then following up with an anti-Semitic statement (e.g. accusing Jews of masterminding the slave trade, diminishing or excusing anti-Semitism, delegitimizing the Jewish national liberation movement, etc.)</span></span></p><span data-dcnode-id="2805" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2802" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2803" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2804" instrument_node="">Original Answer</span></span></p><span data-dcnode-id="2801" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2798" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2799" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2800" instrument_node="">Below is an earlier version of my answer</span></span></p><span data-dcnode-id="2797" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2790" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2795" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2796" instrument_node="">Please see my related answer to “</span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Do-Ashkenazi-Jews-have-white-privilege/answer/Michael-Safyan" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2794" instrument_node="">Do Ashkenazi Jews have white privilege?</span></a><span data-dcnode-id="2791" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2792" instrument_node="">”</span></span></p><span data-dcnode-id="2789" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2786" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2787" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2788" instrument_node="">The short summary is that to say that Ashkenazi Jews are white is problematic for several reasons. First, the statement isn’t strictly true (semitic would be a more accurate description, with some passing as white more easily than others). Secondly, however, even for those who most easily pass as white, to say that Ashkenazi Jews are white is to overlook the history of anti-Semitic persecution; even though Ashkenazi Jews may appear to be “white”, white supremacists and Neo Nazis certainly do not see Jews (Ashkenazi or otherwise) in this category, and while Ashkenazi Jews may benefit from the appearance of being white as compared to Blacks (e.g. not being randomly killed by police), to say that Jews are white is to incorrectly associate the group both with the source of this racial discrimination (Jews were very involved in the civil rights movement) as well as to imply that Jews suffer from no discrimination when, in reality, Jews do occupy a minority status and frequently have been persecuted in that way.</span></span></p><span data-dcnode-id="2785" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2782" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2783" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2784" instrument_node="">Related answers:</span></span></p><ul class="q-box" data-dcnode-id="2766" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2779" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Why-do-some-white-people-say-that-Jewish-people-aren-t-white-while-some-other-races-say-that-they-are-white/answer/Michael-Safyan" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2781" instrument_node="">My answer to Why do some white people say that Jewish people aren’t white, while some other races say that they are white?</span></a></li><li class="q-relative" data-dcnode-id="2776" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Can-black-people-be-Jewish/answer/Michael-Safyan" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2778" instrument_node="">My answer to Can Black people be Jewish?</span></a></li><li class="q-relative" data-dcnode-id 684" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2642" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2662" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2663" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2664" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2665" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2666" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2679" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2682" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2683" instrument_node="">“White” is a social construct, not a scientific one. The US government assigns the term “White” to a large collection of people from a very large stretch of lands. Nearly all Ashkenazi Jews fall into the category that the US government calls “White” — and nearly all Sephardic Jews do too. So do Arabs and Persians, as well as Turks. According to the US race categories, we’re all the same as Irish, English, German, Nordics, and Caucasians. Does this make sense? yes, and no. It’s a simplistic category of a complex concept. For a longer explanation of the issue, please see </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Should-Jews-who-are-not-religious-but-who-identify-culturally-and-ethnically-as-Jewish-refer-to-themselves-as-something-other-than-Jewish/answer/Gil-Yehuda" styl  nearly all Sephardic Jews do too. So do Arabs and Persians, as well as Turks. According to the US race categories, we’re all the same as Irish, English, German, Nordics, and Caucasians. Does this make sense? yes, and no. It’s a simplistic category of a complex concept. For a longer explanation of the issue, please see </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Should-Jews-who-are-not-religious-but-who-identify-culturally-and-ethnically-as-Jewish-refer-to-themselves-as-something-other-than-Jewish/answer/Gil-Yehuda" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2659" instrument_node="">Gil Yehuda's answer to Should Jews who are not religious but who identify culturally and ethnically as Jewish refer to themselves as something other than "Jewish"?</span></a><span data-dcnode-id="2656" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2657" instrument_node="">.</span></span></p><span data-dcnode-id="2654" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2651" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2652" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2653" instrument_node="">To look at the question more scientifically, you can’t use “White” since it has no testable definition. Rather, you have to consider the genetic similarity between the set of Jews who are Ashkenazi and compare them to two other sets: 1. Sephardic Jews, and 2. European non-Jews. I’d assume you will find similarity in both sets. First of all, we are all human. Secondly, there are many ways in which genetics mix (intermarriage, conversions, rape, adultery, etc.). Thirdly, set to set similarity on thousands of genetic markers is not going to give you clean results.</span></span></p><span data-dcnode-id="2650" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2647" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2648" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2649" instrument_node="">There was a time in the US when Jews were not considered White. This changed (I believe in the 1960s, perhaps slightly earlier). Most Jews in the US are Ashkenazic and if they fill out a form that asks about race, they are instructed to mark “White” as their race. Some Jews will tell you they are white, others will tell you they are not. In certain contexts, the term “White” is used to signify a social class (e.g. people who are not discriminated against, people who have privileges, etc.), not a race. In those contexts, some Jews will say they are white, and others will say they are not. Whites will sometimes describe Jews as White, other times not. There’s no clear answer since these are overly simplistic terms.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="2548"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="2549" style="box-sizing: border-box;"><div data-dcnode-id="2550"><div data-dcnode-id="2551"><div data-dcnode-id="2552"><div data-dcnode-id="2553"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="2554" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" da 93" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2495" instrument_node="">Judaism is the religion of the Jewish people, but you don’t have to practice and will still be considered Jewish because it’s in their DNA.</span></span></p><span data-dcnode-id="2492" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2489" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2491" instrument_node="">Judaism is an ethnoreligion - meaning that their 3500+ year old religion is based on the land fro</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2477" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2478" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2479" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2480" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, ba
