xt" data-dcnode-id="2448" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2469" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2470" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2471" instrument_node="">People are mixing up ‘ethnic group’ and ‘race’. the Jews are not a race they are an ethnic group. It is incorrect to assume ethnicity from phenotype. The whole of the Levant region is full of people of different colours, some light, some dark. People of an ethnic group can have many different phenotypes. This is demonstrated in many different parts of the world.</span></span></p><span data-dcnode-id="2468" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2465" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2466" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2467" instrument_node="">Judaism is the religion of the Jewish people, but you don’t have to practice and will still be considered Jewish because it’s in their DNA.</span></span></p><span data-dcnode-id="2464" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2461" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2462" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2463" instrument_node="">Judaism is an ethnoreligion - meaning that their 3500+ year old religion is based on the land from which it came. The only reason they left the land is because they were forced to. The Jewish diaspora may have many different phenotypes but there is high homogeneity between the different groups (they are more related to each other than to the people in the countries where they live). There are Ashkenazi Jews who are dark, Sephardic Jews who are light. Genetic recombination is a random thing with an infinite number of possible outcomes. Don’t use that as your barometer for ethnicity. It works a lot of the time, but not all the time.</span></span></p><span data-dcnode-id="2460" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2457" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2458" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2459" instrument_node="">I would say that some are white passing and have CONDITIONAL white privilege (white privilege until people find out who they are, then it is rescinded), but not white. Also, it seems that everyone wants to overlay the American race issue onto other issues. It’s not as binary as black and white.</span></span></p><span data-dcnode-id="2456" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2453" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2454" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2455" instrument_node="">I am an Ashkenazi Jew and I have been ‘othered’ my whole life for my facial features. The first thing people always ask me is where I’m from since they know I am definitely not European.</span></span></p><span data-dcnode-id="2452" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2449" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2450" style="font-weight: normal; font-style: n ox qu-userSelect--text" data-dcnode-id="2338" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2363" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2364" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2367" instrument_node="">TL; DR</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">In the US, "white people" are from Europe, Middle East and North Africa. So according to the US definition, the Hebrews who left Israel were white.</span></span></p><span data-dcnode-id="2362" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2355" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2360" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2361" instrument_node="">More Detail</span></span><span data-dcnode-id="2356" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2359" instrument_node=""></span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">Ashkenazi are the result of some admixture between the Hebrews who left Israel and Southern Europeans (who I supposed you could say are "whiter") who then continued onto Eastern Europe. They're definitely more white than their Sephardic cousins, but by some measure, they're all white anyways. By the time of WWII, Jews had been in Eastern Europe for centuries.</span></span></p><span data-dcnode-id="2354" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2351" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2352" style="font-weight: normal; font-styl  qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2321" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2326" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2327" instrument_node="">More Detail</span></span><span data-dcnode-id="2322" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2325" instrument_node=""></span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">Ashkenazi are the result of some admixture between the Hebrews who left Israel and Southern Europeans (who I supposed you could say are "whiter") who then continued onto Eastern Europe. They're definitely more white than their Sephardic cousins, but by some measure, they're all white anyways. By the time of WWII, Jews had been in Eastern Europe for centuries.</span></span></p><span data-dcnode-id="2320" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2317" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2318" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2319" instrument_node="">Jews have been in Europe since Roman times, but there was a relatively large migration around the 1100s following the crusades and their expulsion from England and France. This resulted in denser Jewish populations in Poland, Russia and Lithuania.</span></span></p><span data-dcnode-id="2316" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2313" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2314" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2315" instrument_node="">Whether Jews are "white" or not depends on what you mean by white. If you mean WASP (white Anglo Saxon Protestant), then clearly Ashkenazi Jews are not that.</span></span></p><span data-dcnode-id="2312" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2309" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2310" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2311" instrument_node="">****EDIT****</span></span></p><span data-dcnode-id="2308" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2301" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2306" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2307" instrument_node="">thanks </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2305" instrument_node="">Quora User</span></a><span data-dcnode-id="2302" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2303" instrument_node=""> and Yeshayahu ben Pinchas Cohen</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="2158"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="2159" style="box-sizing: border-box;"><div data-dcnode-id="2160"><div data-dcnode- 12" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2113" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2114" instrument_node="">If “white” (which is a silly term) is meant to mean caucasoid, then the Jews are indeed that. While the original Jews came from the Levant, which is populated pretty much exclusively by caucasoids (look at Lebanese people for an example), the Ashkenazi Jews of today are predominantly descended from the populations of the regions where they live(d). Due to interbreeding during periods of ghettoization, they have developed some distinctive genetic markers as well as phenotypic traits, however those don’t have anything to do with non-white admixture.</span></span></p><span data-dcnode-id="2111" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2108" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2109" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2110" instrument_node="">A moral simple answer is, well, look at most As</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2096" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2097" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2098" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-a iv><div class="q-box qu-display--none" data-dcnode-id="2072" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2073" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2074"><span class="q-box qu-userSelect--text" data-dcnode-id="2075" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2088" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2089" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2090" instrument_node="">If “white” (which is a silly term) is meant to mean caucasoid, then the Jews are indeed that. While the original Jews came from the Levant, which is populated pretty much exclusively by caucasoids (look at Lebanese people for an example), the Ashkenazi Jews of today are predominantly descended from the populations of the regions where they live(d). Due to interbreeding during periods of ghettoization, they have developed some distinctive genetic markers as well as phenotypic traits, however those don’t have anything to do with non-white admixture.</span></span></p><span data-dcnode-id="2087" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2084" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2085" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2086" instrument_node="">A moral simple answer is, well, look at most Ashkenazi Jews. You have blonde, blue-eyed Jews who are more Aryan-looking than Hitler and his cronies. Even the ones who don’t pass Nordicist muster still fall well within the phenotypic bounds of Caucasian.</span></span></p><span data-dcnode-id="2083" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2076" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2081" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2082" instrument_node="">The real question is why are they </span></span><span data-dcnode-id="2079" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2080" instrument_node="">not </span></span><span data-dcnode-id="2077" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2078" instrument_node="">considered white people? And the answer there is that it was politically expedient to cut Jews out. They were already an out group, so creating one more wall to shut them out made perfect sense. The same thing was done to Italians and Irish and Polish in America. They were arbitrarily de-caucasized because they were Catholic immigrants and any means of generating xenophobic sentiment against them was taken. Anti-Jewish sentiment has a much longer history so the re-caucasization of the Jews will take longer. Genetic engineering and bespoke children may well make race irrelevant before that happens.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="1965"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="1966" style="box-sizing: border-box;"><div data-dcnode-id="1967"><div data-dcnode-id="1968"><div data-dcnode-id="1969"><div data-dcnode-id="1970"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="1971" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id 6" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1467" instrument_node="">Most. Ashkenazi Jews couldn't give a crap about idiotic racial categories. What the hell is “white” anyway? Is it about skin tone or ideology?</span></span></p><span data-dcnode-id="1464" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1461" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1462" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1463" instrument_node="">If it's about skin tone, most of us have skin that would be considered pinkish, sort of “peachy colored”, ranging from pale and quite whitish through to “olive”. This is the same broad range of skin tones that people who claim to be “white” have- to the extent that you usually can't tell who is Jewish and who is WASPish just by looking. By that “definition”, most of us are therefore, probably “white”.</span></span></p><span data-dcnode-id="1460" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1457" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1458" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1459" instrument_node="">If, however, by “white” you mean some dopey ass racist ideology, then count me out. I am not interested in being “ideologically white”. Those people can go *enjoy intimate relations* with themselves.</span></span></p></span></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="1358"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="1359" style="box-siz roups of “people of color” or “white” doesn’t necessarily work. It’s common these days to lump in Mizrahim as “Jews of color” in contradistinction to Ashkenazim. But many Ashkenazim can be darker than many Mizrahim.</span></span></p></span></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div data-dcnode-id="1241"><div class="q-box qu-borderAll qu-borderRadius--small qu-borderColor--raised qu-boxShadow--small qu-mb--small qu-bg--raised" data-dcnode-id="1242" style="box-sizing: border-box;"><div data-dcnode-id="1243"><div data-dcnode-id="1244"><div data-dcnode-id="1245"><div data-dcnode-id="1246"><div class="q-box qu-pt--medium qu-pb--medium qu-hover--bg--darken" data-dcnode-id="1247" style="box-sizing: border-box; padding-left: 16px; padding-right: 16px; position: relative;"><div class="q-box" data-dcnode-id="1248" style="box-sizing: border-box;"><div data-dcnode-id="1249"><div class="q-box" data-dcnode-id="1250" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="1299" style="box-sizing: border-box; display: flex;"><div class="q-box qu-mb--small" data-dcnode-id="1300" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-box spacing_log_answer_header" data-dcnode-id="1301" style="box-sizing: border-box;"><div class="q-flex" data-dcnode-id="1302" style="box-sizing: border-box; display: flex; align-items: start; width: 100%;" width="100%"><div class="q-inlineFlex qu-flex--none qu-mr--small qu-alignItems--center" data-dcnode-id="1345" style="box-sizing: border-box; display: inline-flex;"><div class="q-box qu-display--inline-flex" data-dcnode-id="1346" style="box-sizing: border-box; z-index: 0;"><div class="q-box qu-display--inline-flex" data-dcnode-id="1347" style="box-sizing: border-box;"><div class="q-relative qu-display--inline-flex puppeteer_popper_reference" data-dcnode-id="1348" style="box-sizing: border-box; position: relative;"><div aria-expanded="false" aria-haspopup="dialog" class="q-click-
