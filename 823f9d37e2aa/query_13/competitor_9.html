</span><div class="c-article-body" data-article-body="true" data-dcnode-id="2375" data-track-component="article body"><span data-dcnode-id="5652" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="5645" data-gtm-vis-first-on-screen-50443292_562="2098" data-gtm-vis-first-on-screen-50443292_563="2099" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2098" data-gtm-vis-recent-on-screen-50443292_563="2099" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5646" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5650" id="Abs1"><span data-dcnode-id="5651" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5647" id="Abs1-content"><p data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">Many models of (un)ethical decision making assume that people decide rationally and are in principle able to evaluate their decisions from a moral point of view. However, people might behave unethically without being aware of it. They are ethically blind. Adopting a sensemaking approach, we argue that ethical blindness results from a complex interplay between individual sensemaking activities and context factors.</span></p></div></div></section><span data-dcnode-id="5644" instrument_node="">
</span><section data-dcnode-id="5555" data-gtm-vis-first-on-screen-50443292_562="2099" data-gtm-vis-first-on-screen-50443292_563="2099" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2099" data-gtm-vis-recent-on-screen-50443292_563="2099" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="5556" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5642" id="Sec1"><span data-dcnode-id="5643" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="5557" id="Sec1-content"><p data-dcnode-id="5640"><span data-dcnode-id="5641" instrument_node="">Business history is rich with examples of extreme forms of unethical behavior by and within companies. When these cases are made public by traditional muckrakers like Upton Sinclair in the nineteenth century or today’s NGOs, by internal whistle-blowers or official investigations, the public is often shocked. It seems to be difficult to understand how behaviors that seem to violate any moral common sense are possible.</span></p><p data-dcnode-id="5614"><span data-dcnode-id="5639" instrument_node="">During the last three decades, the business ethics literature has developed sophisticated models that have considerably improved our understanding of why, how, and under what conditions individuals make ethical decisions—and when they fail to do so. These models suggest that (un)ethical decisions are the result of an interplay between personal traits of the decision maker and characteristics of the situation (Trevino </span><a aria-label="Reference 1986" data-dcnode-id="5637" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d225481274e324" title="Trevino, L. K. (1986). Ethical decision making in organizations: A person-situation interactionist model. Academy of Management Review,
                           11, 601–617."><span data-dcnode-id="5638" instrument_node="">1986</span></a><span data-dcnode-id="5636" instrument_node="">). However, most research on ethical decision making still builds on the assumption that decisions are made by rational actors (see critically Sonenshein </span><a aria-label="Reference 2007" data-dcnode-id="5634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d225481274e327" title="Sonenshein, S. (2007). The role of construction, intuition, and justification in responding to ethical issues at work: The sensemaking-intuition model. Academy of Management Review,
                           32, 1022–1040."><span data-dcnode-id="5635" instrument_node="">2007</span></a><span data-dcnode-id="5633" instrument_node="">). The rationality assumption is displayed in several ways. Standing in the tradition of moral philosophy, business ethicists usually assume that there is a </span><i data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">moral point of view</span></i><span data-dcnode-id="5630" instrument_node=""> from which the ethicality of a decision can be evaluated. They acknowledge that the moral point of view can be interpreted differently, depending on the specific background philosophy (e.g., the Kantian duty approach versus the Utilitarian calculation). But they share the assumption that there is an objective and impartial yardstick that people can (and do) use to weigh arguments and come to a decision (Hunt and Vitell </span><a aria-label="Reference 1986" data-dcnode-id="5628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR200" id="ref-link-section-d225481274e333" title="Hunt, S. D., &amp; Vitell, S. J. (1986). A general theory of marketing ethics. Journal of Macromarketing, 6, 5–17."><span data-dcnode-id="5629" instrument_node="">1986</span></a><span data-dcnode-id="5627" instrument_node="">). For example, Sharp-Paine (</span><a aria-label="Reference 1997" data-dcnode-id="5625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d225481274e336" title="Sharp-Paine, L. (1997). Cases in leadership, ethics, and organizational integrity. A strategic perspective. Chicago: Irwin."><span data-dcnode-id="5626" instrument_node="">1997</span></a><span data-dcnode-id="5624" instrument_node="">) suggested that managers use different philosophical lenses when making a decision—reflecting on consequences (Utilitarian lens), principles (Kantian lens) and objectives (economic lens)—to include as many aspects as possible. In contrast, interactionist models (Trevino </span><a aria-label="Reference 1986" data-dcnode-id="5622" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d225481274e340" title="Trevino, L. K. (1986). Ethical decision making in organizations: A person-situation interactionist model. Academy of Management Review,
                           11, 601–617."><span data-dcnode-id="5623" instrument_node="">1986</span></a><span data-dcnode-id="5621" instrument_node="">) question the assumption that managers simply take a Kantian or Utilitarian position, independently of the context in which the decision is made. Indeed, context factors can have an important impact on the decision-making process. Nevertheless, even though person-situation models have dropped the assumption that managers deliberate like philosophers, they still conceive them as rational actors, holding that “cognitive moral development is the critical element in the judgment phase” (Jones </span><a aria-label="Reference 1991" data-dcnode-id="5619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d225481274e343" title="Jones, T. M. (1991). Ethical decision making by individuals in organizations: An issue-contingent model. Academy of Management Review,
                           16, 366–395."><span data-dcnode-id="5620" instrument_node="">1991</span></a><span data-dcnode-id="5618" instrument_node="">, p. 371, see also Sonenshein </span><a aria-label="Reference 2007" data-dcnode-id="5616" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d225481274e346" title="Sonenshein, S. (2007). The role of construction, intuition, and justification in responding to ethical issues at work: The sensemaking-intuition model. Academy of Management Review,
                           32, 1022–1040."><span data-dcnode-id="5617" instrument_node="">2007</span></a><span data-dcnode-id="5615" instrument_node="">).</span></p><p data-dcnode-id="5597"><span data-dcnode-id="5613" instrument_node="">Often, however, (un)ethical decision making is less rational and deliberate but more intuitive and automatic (Gigerenzer </span><a aria-label="Reference 2008" data-dcnode-id="5611" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d225481274e352" title="Gigerenzer, G. (2008). Moral intuition&nbsp;=&nbsp;Fast and frugal heuristics? In W. Sinnott-Armstrong (Ed.), Moral psychology: Vol. 2. The cognitive science of morality: Intuition and diversity (pp. 1–26). Cambridge, MA: MIT Press."><span data-dcnode-id="5612" instrument_node="">2008</span></a><span data-dcnode-id="5610" instrument_node="">; Haidt </span><a aria-label="Reference 2001" data-dcnode-id="5608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d225481274e355" title="Haidt, J. (2001). The emotional dog and its rational tail: A social intuitionist approach to moral judgement. Psychological Review,
                           108, 814–834."><span data-dcnode-id="5609" instrument_node="">2001</span></a><span data-dcnode-id="5607" instrument_node="">; Reynolds </span><a aria-label="Reference 2006" data-dcnode-id="5605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d225481274e358" title="Reynolds, S. J. (2006). A neurocognitive model of the ethical decision-making process: Implications for study and practice. Journal of Applied Psychology,
                           91, 737–748."><span data-dcnode-id="5606" instrument_node="">2006</span></a><span data-dcnode-id="5604" instrument_node="">; Sonenshein </span><a aria-label="Reference 2007" data-dcnode-id="5602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d225481274e361" title="Sonenshein, S. (2007). The role of construction, intuition, and justification in responding to ethical issues at work: The sensemaking-intuition model. Academy of Management Review,
                           32, 1022–1040."><span data-dcnode-id="5603" instrument_node="">2007</span></a><span data-dcnode-id="5601" instrument_node="">). As a consequence, the ethical dimension of a decision is not necessarily visible to the decision maker. People may behave unethically without being aware of it—they may even be convinced that they are doing the right thing. It is only later that they realize the unethical dimension of their decision. We call this state </span><i data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">ethical blindness</span></i><span data-dcnode-id="5598" instrument_node="">: the decision maker’s temporary inability to see the ethical dimension of a decision at stake.</span></p><p data-dcnode-id="5574"><span data-dcnode-id="5596" instrument_node="">How can ethical blindness be explained? Some recent accounts in the literature allude to this question. Tenbrunsel and Messick (</span><a aria-label="Reference 2004" data-dcnode-id="5594" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d225481274e370" title="Tenbrunsel, A. E., &amp; Messick, D. M. (2004). Ethical fading: The role of self-deception in unethical behavior. Social Justice Research,
                           17, 223–236."><span data-dcnode-id="5595" instrument_node="">2004</span></a><span data-dcnode-id="5593" instrument_node="">) argue that under specific circumstances the ethical aspect of a decision fades away so that the decision maker gradually becomes unaware of it. There are several triggers of ethical fading. One is the use of euphemistic language. Another one is pointed out by Chugh et al. (</span><a aria-label="Reference 2005" data-dcnode-id="5591" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d225481274e373" title="Chugh, D., Banaji, M. R., &amp; Bazerman, M. H. (2005). Bounded ethicality as a psychological barrier to recognizing conflicts of interest. In D. A. Moore, D. M. Cain, G. Loewenstein, &amp; M. Bazerman (Eds.), Conflicts of interest: Challenges and solutions in business, law, medicine, and public policy (pp. 74–95). New York: Cambridge University Press."><span data-dcnode-id="5592" instrument_node="">2005</span></a><span data-dcnode-id="5590" instrument_node="">) who, in their work on bounded ethicality, analyze how the computational limits of the human mind lead to the use of simple heuristics which might, in turn, give rise to unethical decisions beyond the decision maker’s awareness. Bandura (</span><a aria-label="Reference 1999" data-dcnode-id="5588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d225481274e376" title="Bandura, A. (1999). Moral disengagement in the perpetration of inhumanities. Personality and Social Psychology Review,
                           3, 193–209."><span data-dcnode-id="5589" instrument_node="">1999</span></a><span data-dcnode-id="5587" instrument_node="">, </span><a aria-label="Reference 2002" data-dcnode-id="5585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d225481274e379" title="Bandura, A. (2002). Selective moral disengagement in the exercise of moral agency. Journal of Moral Education,
                           31, 101–119."><span data-dcnode-id="5586" instrument_node="">2002</span></a><span data-dcnode-id="5584" instrument_node="">) argues that unethical decisions are promoted by disengaging from the decision’s moral dimension. He illustrates how moral disengagement is driven by individual, situational and institutional forces. We build on and extend the above-mentioned accounts of ethical decision making in two ways: Firstly, we propose a theoretical model that conceptualizes the interplay of psychological and sociological forces on three analytical levels, namely the individual sensemaking, the decision-making situation and the ideological context, carving out specific constellations that make ethical blindness more or less probable. The debate in previous accounts has mainly focused on psychological forces and aspects of the immediate context. The institutional context in which individuals and their organizations are embedded has, so far, been neglected or discussed separately from the psychological analysis. Secondly, many authors underline that unethical decision making can only be understood as the result of a process that unfolds over time (den Nieuwenboer and Kaptein </span><a aria-label="Reference 2008" data-dcnode-id="5582" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d225481274e382" title="den Nieuwenboer, N. A., &amp; Kaptein, M. (2008). Spiraling down into corruption: A dynamic analysis of the social identity processes that cause corruption in organizations to grow. Journal of Business Ethics,
                           83, 133–146."><span data-dcnode-id="5583" instrument_node="">2008</span></a><span data-dcnode-id="5581" instrument_node="">; Fleming and Zyglidopoulos </span><a aria-label="Reference 2008" data-dcnode-id="5579" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d225481274e386" title="Fleming, P., &amp; Zyglidopoulos, S. C. (2008). The escalation of deception in organizations. Journal of Business Ethics,
                           81, 837–850."><span data-dcnode-id="5580" instrument_node="">2008</span></a><span data-dcnode-id="5578" instrument_node="">; McDevitt et al. </span><a aria-label="Reference 2007" data-dcnode-id="5576" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d225481274e389" title="McDevitt, R., Giapponi, C., &amp; Tromley, C. (2007). A model of ethical decision making: The integration of process and content. Journal of Business Ethics,
                           73, 219–229."><span data-dcnode-id="5577" instrument_node="">2007</span></a><span data-dcnode-id="5575" instrument_node="">). However, the notion of time and its mechanisms has not been developed further yet. Our model discusses the role of time in more detail, drawing on research on the temporal aspects of decision making.</span></p><p data-dcnode-id="5560"><span data-dcnode-id="5573" instrument_node="">We position our model in the context of constructivism, explaining ethical blindness as the result of a sensemaking process. Ethical decision making unfolds in four steps, starting with moral awareness (Rest </span><a aria-label="Reference 1986" data-dcnode-id="5571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d225481274e396" title="Rest, J. R. (1986). Moral development: Advances in research and theory. New York: Praeger."><span data-dcnode-id="5572" instrument_node="">1986</span></a><span data-dcnode-id="5570" instrument_node="">): Whether or not people make ethical decisions depends on their ability to process and encode incoming information in moral categories. If a person is not aware of the moral dimension of a decision at stake, she can not proceed to the next steps, that is, evaluate the information from a normative viewpoint, establish a moral intention and make an ethical decision. Butterfield et al. (</span><a aria-label="Reference 2000" data-dcnode-id="5568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d225481274e399" title="Butterfield, K. D., Treviño, L. K., &amp; Weaver, G. R. (2000). Moral awareness in business: Influences of issue-related and social context factors. Human Relations,
                           53(7), 981–1018."><span data-dcnode-id="5569" instrument_node="">2000</span></a><span data-dcnode-id="5567" instrument_node="">) have demonstrated that the first step, i.e., moral awareness, needs to be understood as a </span><i data-dcnode-id="5565"><span data-dcnode-id="5566" instrument_node="">social</span></i><span data-dcnode-id="5564" instrument_node=""> sensemaking process. Put differently, whether or not a person becomes aware of a decision’s ethical dimension depends on the sensemaking process unfolding within the social group that the person is part of. We suggest that the sensemaking process leading to ethical blindness is based on the interplay between a tendency toward rigid framing and contextual pressures. Frames make us view the world from one particular and thus necessarily limited perspective. They have blind spots. The more rigidly people apply specific frames when making decisions, the lower their ability to switch to another perspective. They are locked into one frame. We refer to this phenomenon as </span><i data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">rigid framing</span></i><span data-dcnode-id="5561" instrument_node=""> and describe it as the result of an interplay of individual sensemaking activities with proximal and distal contextual factors. The proximal context of sensemaking includes situational as well as organizational factors, while the distal context describes the overarching institutional context in which individual and organizational actors are embedded. As outlined below, ethical blindness is the result of a complex interplay between sensemaking activities and context pressures that unfold over time. As such, the phenomenon only occurs given a particular constellation of framing tendencies and contextual influences. Nevertheless, its consequences can be substantial.</span></p><p data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">In the following, we first describe the phenomenon of ethical blindness and explain how it can result from rigid framing. Then we explain how framing interacts with proximal and distal context pressures. We subsequently highlight the temporal dynamics behind the phenomenon. Finally, we conclude with some reflections on the descriptive and normative dimensions of ethical blindness.</span></p></div></div></section><section data-dcnode-id="5457" data-gtm-vis-first-on-screen-50443292_562="2099" data-gtm-vis-first-on-screen-50443292_563="2102" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2099" data-gtm-vis-recent-on-screen-50443292_563="2102" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="What is Ethical Blindness?"><div class="c-article-section" data-dcnode-id="5458" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5553" id="Sec2"><span data-dcnode-id="5554" instrument_node="">What is Ethical Blindness?</span></h2><div class="c-article-section__content" data-dcnode-id="5459" id="Sec2-content"><p data-dcnode-id="5536"><span data-dcnode-id="5552" instrument_node="">Recent discussions on “bounded awareness” (Chugh and Bazerman </span><a aria-label="Reference 2007" data-dcnode-id="5550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d225481274e418" title="Chugh, D., &amp; Bazerman, M. (2007). Bounded awareness: What you fail to see can hurt you. Mind &amp; Society,
                           6, 1–18."><span data-dcnode-id="5551" instrument_node="">2007</span></a><span data-dcnode-id="5549" instrument_node="">) and “bounded ethicality” (Chugh et al. </span><a aria-label="Reference 2005" data-dcnode-id="5547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d225481274e421" title="Chugh, D., Banaji, M. R., &amp; Bazerman, M. H. (2005). Bounded ethicality as a psychological barrier to recognizing conflicts of interest. In D. A. Moore, D. M. Cain, G. Loewenstein, &amp; M. Bazerman (Eds.), Conflicts of interest: Challenges and solutions in business, law, medicine, and public policy (pp. 74–95). New York: Cambridge University Press."><span data-dcnode-id="5548" instrument_node="">2005</span></a><span data-dcnode-id="5546" instrument_node="">) highlight the fact that people can make decisions that run counter to their own values and principles, without being aware of it. Anecdotal evidence suggests that the ethical dimensions might indeed escape decision maker’s attention. For instance, in reflecting upon his own role in the Ford Pinto case, Gioia (</span><a aria-label="Reference 1992" data-dcnode-id="5544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d225481274e424" title="Gioia, D. A. (1992). Pinto fires and personal ethics: A script analysis of missed opportunities. Journal of Business Ethics,
                           11, 379–389."><span data-dcnode-id="5545" instrument_node="">1992</span></a><span data-dcnode-id="5543" instrument_node="">, p. 383) asked himself: “Why didn’t I see the gravity of the problem and its ethical overtones?” In a similar vein, one of the guards taking part in the classic Stanford prison experiment reported after the experiment: “While I was doing it, I didn’t feel any regret, I didn’t feel any guilt. It was only afterwards, when I began to reflect on what I had done, that this behavior began to dawn on me” (Zimbardo </span><a aria-label="Reference 2007" data-dcnode-id="5541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR159" id="ref-link-section-d225481274e427" title="Zimbardo, P. (2007). The Lucifer effect. Understanding how good people turn evil. New York: Random House."><span data-dcnode-id="5542" instrument_node="">2007</span></a><span data-dcnode-id="5540" instrument_node="">, p. 158). Also in the most extreme forms of harm doing, mass murder for instance, the phenomenon of blindness can be observed. Browning (</span><a aria-label="Reference 2001" data-dcnode-id="5538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d225481274e430" title="Browning, C. R. (2001). Ordinary men. Reserve police battalion 101 and the final solution in Poland. London: Penguin."><span data-dcnode-id="5539" instrument_node="">2001</span></a><span data-dcnode-id="5537" instrument_node="">, p. 72) cites a German policeman participating in the genocide in Poland and Russia in the early 1940s: “Truthfully I must say that at the time we didn’t reflect about it at all. Only years later did any of us become truly conscious of what had happened then. Only later did it first occur to me that [it] had not been right.”</span></p><p data-dcnode-id="5501"><span data-dcnode-id="5535" instrument_node="">Formally, ethical blindness can be defined as the temporary inability of a decision maker to see the ethical dimension of a decision at stake. The phenomenon can be understood along three aspects. First, it builds on the assumption that people </span><i data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">deviate from their own values</span></i><span data-dcnode-id="5532" instrument_node="">
</span><i data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">and principles</span></i><span data-dcnode-id="5529" instrument_node="">. These values and principles are part of their identity and they have tried to live up to them in the past. Ethical blindness refers to the fact that “good people behave in pathological ways that are alien to their nature” (Zimbardo </span><a aria-label="Reference 2007" data-dcnode-id="5527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR159" id="ref-link-section-d225481274e442" title="Zimbardo, P. (2007). The Lucifer effect. Understanding how good people turn evil. New York: Random House."><span data-dcnode-id="5528" instrument_node="">2007</span></a><span data-dcnode-id="5526" instrument_node="">, p. 195; see also Bandura </span><a aria-label="Reference 2002" data-dcnode-id="5524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d225481274e445" title="Bandura, A. (2002). Selective moral disengagement in the exercise of moral agency. Journal of Moral Education,
                           31, 101–119."><span data-dcnode-id="5525" instrument_node="">2002</span></a><span data-dcnode-id="5523" instrument_node="">). It results from people’s inability to access ethical values or prototypes (Reynolds </span><a aria-label="Reference 2006" data-dcnode-id="5521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d225481274e448" title="Reynolds, S. J. (2006). A neurocognitive model of the ethical decision-making process: Implications for study and practice. Journal of Applied Psychology,
                           91, 737–748."><span data-dcnode-id="5522" instrument_node="">2006</span></a><span data-dcnode-id="5520" instrument_node="">) that, in principle, are available to them. Second, ethical blindness is context-bound and thus a </span><i data-dcnode-id="5518"><span data-dcnode-id="5519" instrument_node="">temporary state</span></i><span data-dcnode-id="5517" instrument_node="">. It describes a psychological state of people with normal (or even high) levels of integrity and the ability for moral reasoning. But for some reasons (often related to the situation, as we outline further below), they are not able to use these capacities when making the decision. However, when the situation changes, they are likely to return to practicing their original values and principles. This characteristic is well illustrated by the fact that the perpetrators might be surprised or even shocked by their own behavior once the context has changed (Gioia </span><a aria-label="Reference 1992" data-dcnode-id="5515" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d225481274e455" title="Gioia, D. A. (1992). Pinto fires and personal ethics: A script analysis of missed opportunities. Journal of Business Ethics,
                           11, 379–389."><span data-dcnode-id="5516" instrument_node="">1992</span></a><span data-dcnode-id="5514" instrument_node="">; Chugh and Bazerman </span><a aria-label="Reference 2007" data-dcnode-id="5512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d225481274e458" title="Chugh, D., &amp; Bazerman, M. (2007). Bounded awareness: What you fail to see can hurt you. Mind &amp; Society,
                           6, 1–18."><span data-dcnode-id="5513" instrument_node="">2007</span></a><span data-dcnode-id="5511" instrument_node="">). This sentiment indicates that under different circumstances, those people may have been able and willing to make a more ethical decision. Third, ethical blindness is </span><i data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">unconscious</span></i><span data-dcnode-id="5508" instrument_node="">. People who are ethically blind are not aware of the fact that they deviate from their values and/or that they cannot and do not access those values when making a decision. This aspect has also been observed by Tenbrunsel and Smith-Crowe (</span><a aria-label="Reference 2008" data-dcnode-id="5506" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d225481274e464" title="Tenbrunsel, A. E., &amp; Smith-Crowe, K. (2008). Ethical decision making: Where we’ve been and where we’re going. Academy of Management Annals,
                           2, 545–607."><span data-dcnode-id="5507" instrument_node="">2008</span></a><span data-dcnode-id="5505" instrument_node="">) who examine it as a state of “unintended unethicality”. As we argue further below, ethical blindness results from the co-evolution and mutual transformation of sensemaking and contextual forces. At the beginning of the transformation process, people often sense that something is wrong. They feel tensions between the implications of their decision and their own personal values. However, under certain conditions (i.e., a specific constellation of context pressures), as time goes by, sensemaking becomes more and more narrow and rigid, tensions become less and less intense, and ethical concerns start to fade away (Tenbrunsel and Messick </span><a aria-label="Reference 2004" data-dcnode-id="5503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d225481274e467" title="Tenbrunsel, A. E., &amp; Messick, D. M. (2004). Ethical fading: The role of self-deception in unethical behavior. Social Justice Research,
                           17, 223–236."><span data-dcnode-id="5504" instrument_node="">2004</span></a><span data-dcnode-id="5502" instrument_node="">). This process continues, in small steps, until the person loses sight of the ethical dimension. She becomes ethically blind.</span></p><p data-dcnode-id="5460"><span data-dcnode-id="5500" instrument_node="">Ethical blindness is in line with recent models that underline the automatic, intuitive or unconscious components of ethical decision making (e.g., Sonenshein </span><a aria-label="Reference 2007" data-dcnode-id="5498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d225481274e473" title="Sonenshein, S. (2007). The role of construction, intuition, and justification in responding to ethical issues at work: The sensemaking-intuition model. Academy of Management Review,
                           32, 1022–1040."><span data-dcnode-id="5499" instrument_node="">2007</span></a><span data-dcnode-id="5497" instrument_node="">). Those models challenge the idea that an ethical decision is the result of a deliberative and rational decision-making process where people weigh alternative options against their own values, general principles, and the potential consequences for important others or the world in general (Jones </span><a aria-label="Reference 1991" data-dcnode-id="5495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d225481274e476" title="Jones, T. M. (1991). Ethical decision making by individuals in organizations: An issue-contingent model. Academy of Management Review,
                           16, 366–395."><span data-dcnode-id="5496" instrument_node="">1991</span></a><span data-dcnode-id="5494" instrument_node="">; Kohlberg </span><a aria-label="Reference 1969" data-dcnode-id="5492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d225481274e479" title="Kohlberg, L. (1969). Stage and sequence: The cognitive-developmental approach to socialization. In D. A. Goslin (Ed.), Handbook of socialization theory and research (pp. 347–480). Chicago: Rand McNally."><span data-dcnode-id="5493" instrument_node="">1969</span></a><span data-dcnode-id="5491" instrument_node="">; Rest </span><a aria-label="Reference 1986" data-dcnode-id="5489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d225481274e482" title="Rest, J. R. (1986). Moral development: Advances in research and theory. New York: Praeger."><span data-dcnode-id="5490" instrument_node="">1986</span></a><span data-dcnode-id="5488" instrument_node="">), pragmatically applying appropriate combinations of Kantian principles and Utilitarian calculations (Hare </span><a aria-label="Reference 1981" data-dcnode-id="5486" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d225481274e485" title="Hare, R. M. (1981). Moral thinking: Its levels, methods, and point. Oxford: Clarendon Press."><span data-dcnode-id="5487" instrument_node="">1981</span></a><span data-dcnode-id="5485" instrument_node="">; Sharp-Paine </span><a aria-label="Reference 1997" data-dcnode-id="5483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d225481274e489" title="Sharp-Paine, L. (1997). Cases in leadership, ethics, and organizational integrity. A strategic perspective. Chicago: Irwin."><span data-dcnode-id="5484" instrument_node="">1997</span></a><span data-dcnode-id="5482" instrument_node="">). According to the rational actor view, even a person who opts for an unethical decision knows (at least in principle) the difference between right and wrong in a given situation. She just weighs positive and negative incentives against personal interests and sees more advantages in the unethical decision (Ashkanasy et al. </span><a aria-label="Reference 2006" data-dcnode-id="5480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d225481274e492" title="Ashkanasy, N. M., Windsor, C. A., &amp; Trevino, L. (2006). Bad apples in bad barrels revisited: Cognitive moral development, just world beliefs, rewards, and ethical decision-making. Business Ethics Quarterly,
                           16, 449–473."><span data-dcnode-id="5481" instrument_node="">2006</span></a><span data-dcnode-id="5479" instrument_node="">; Becker </span><a aria-label="Reference 1968" data-dcnode-id="5477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d225481274e495" title="Becker, G. S. (1968). Crime and punishment: An economic approach. Journal of Political Economy,
                           76, 169–217."><span data-dcnode-id="5478" instrument_node="">1968</span></a><span data-dcnode-id="5476" instrument_node="">). Recent models questioning these assumptions refer to intuition (Haidt </span><a aria-label="Reference 2001" data-dcnode-id="5474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d225481274e498" title="Haidt, J. (2001). The emotional dog and its rational tail: A social intuitionist approach to moral judgement. Psychological Review,
                           108, 814–834."><span data-dcnode-id="5475" instrument_node="">2001</span></a><span data-dcnode-id="5473" instrument_node="">), sensemaking (Sonenshein </span><a aria-label="Reference 2007" data-dcnode-id="5471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d225481274e501" title="Sonenshein, S. (2007). The role of construction, intuition, and justification in responding to ethical issues at work: The sensemaking-intuition model. Academy of Management Review,
                           32, 1022–1040."><span data-dcnode-id="5472" instrument_node="">2007</span></a><span data-dcnode-id="5470" instrument_node="">), neurocognitive processes (Reynolds </span><a aria-label="Reference 2006" data-dcnode-id="5468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d225481274e504" title="Reynolds, S. J. (2006). A neurocognitive model of the ethical decision-making process: Implications for study and practice. Journal of Applied Psychology,
                           91, 737–748."><span data-dcnode-id="5469" instrument_node="">2006</span></a><span data-dcnode-id="5467" instrument_node="">) or heuristics (Gigerenzer </span><a aria-label="Reference 2008" data-dcnode-id="5465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d225481274e508" title="Gigerenzer, G. (2008). Moral intuition&nbsp;=&nbsp;Fast and frugal heuristics? In W. Sinnott-Armstrong (Ed.), Moral psychology: Vol. 2. The cognitive science of morality: Intuition and diversity (pp. 1–26). Cambridge, MA: MIT Press."><span data-dcnode-id="5466" instrument_node="">2008</span></a><span data-dcnode-id="5464" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="5462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d225481274e511" title="Gigerenzer, G. (2009). Moral satisficing: Rethinking morality as bounded rationality. Topics in Cognitive Science,
                           2, 528–554."><span data-dcnode-id="5463" instrument_node="">2009</span></a><span data-dcnode-id="5461" instrument_node="">) instead. Frames, schemas, prototypes, and their related concepts are indispensable building blocks of our cognitive system, guiding our perceptions and understanding of the world. However, as we argue further below, frames bear some inherent risks because they tend to have blind spots and they can be applied in a more or less rigid manner. As a consequence, the ethical dimension of a decision may be difficult to identify for the actor. Moreover, specific ways in which frames or schemata are used may be reinforced by aspects of the context which, in turn, may further increase the risk of ethical blindness. The model proposed in this article shows how specific interactions between the tendency toward rigid framing and situational or institutional pressures are especially likely to give rise to ethical blindness. In what follows, we first introduce the concept of rigid framing and then outline the model in more detail.</span></p></div></div></section><section data-dcnode-id="5300" data-title="Rigid Framing and Ethical Blindness"><div class="c-article-section" data-dcnode-id="5301" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5455" id="Sec3"><span data-dcnode-id="5456" instrument_node="">Rigid Framing and Ethical Blindness</span></h2><div class="c-article-section__content" data-dcnode-id="5302" id="Sec3-content"><p data-dcnode-id="5441"><span data-dcnode-id="5454" instrument_node="">Research in (neo)institutional theory (DiMaggio and Powell </span><a aria-label="Reference 1983" data-dcnode-id="5452" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d225481274e522" title="DiMaggio, P., &amp; Powell, W. (1983). The iron cage revisited: Institutional isomorphism and collective rationality in organizational fields. American Sociological Review,
                           48(2), 147–160."><span data-dcnode-id="5453" instrument_node="">1983</span></a><span data-dcnode-id="5451" instrument_node="">) and sensemaking (Weick </span><a aria-label="Reference 1995" data-dcnode-id="5449" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e525" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5450" instrument_node="">1995</span></a><span data-dcnode-id="5448" instrument_node="">) show that individuals construct and enact the reality in which they operate. These constructionist approaches have been largely neglected in the business ethics literature (Sonenshein </span><a aria-label="Reference 2007" data-dcnode-id="5446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d225481274e528" title="Sonenshein, S. (2007). The role of construction, intuition, and justification in responding to ethical issues at work: The sensemaking-intuition model. Academy of Management Review,
                           32, 1022–1040."><span data-dcnode-id="5447" instrument_node="">2007</span></a><span data-dcnode-id="5445" instrument_node="">) but are, in our view, particularly useful to explain ethical blindness (Werhane et al. </span><a aria-label="Reference 2011" data-dcnode-id="5443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d225481274e531" title="Werhane, P. H., Hartman, L. P., Moberg, D., Englehardt, E., Pritchard, M. &amp; Parmar, B. (2011). Social constructivism, mental models, and problems of obedience. Journal of Business Ethics, 100(1), 103–118."><span data-dcnode-id="5444" instrument_node="">2011</span></a><span data-dcnode-id="5442" instrument_node="">).</span></p><p data-dcnode-id="5415"><span data-dcnode-id="5440" instrument_node="">According to the constructionist view (Berger and Luckmann </span><a aria-label="Reference 1966" data-dcnode-id="5438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d225481274e537" title="Berger, P., &amp; Luckmann, T. (1966). The social construction of reality. New York: Anchor Books."><span data-dcnode-id="5439" instrument_node="">1966</span></a><span data-dcnode-id="5437" instrument_node="">; Weick </span><a aria-label="Reference 1995" data-dcnode-id="5435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e540" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5436" instrument_node="">1995</span></a><span data-dcnode-id="5434" instrument_node="">), individuals act upon frames that they develop while interacting with their environment (Ring and Rands </span><a aria-label="Reference 1989" data-dcnode-id="5432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d225481274e543" title="Ring, P. S., &amp; Rands, G. P. (1989). Sensemaking, understanding, and committing: Emergent interpersonal transaction processes in the evolution of 3M’s microgravity research program. In H. Van den Ven, H. L. Angle, &amp; M. S. Poole (Eds.), Research on the management of innovation: The Minnesota studies (pp. 337–366). New York: Ballinger."><span data-dcnode-id="5433" instrument_node="">1989</span></a><span data-dcnode-id="5431" instrument_node="">). Frames are “mental structures that simplify and guide our understanding of a complex reality” (Russo and Schoemaker </span><a aria-label="Reference 2004" data-dcnode-id="5429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d225481274e546" title="Russo, J. E., &amp; Schoemaker, P. J. H. (2004). Winning decisions: Getting it right the first time. New York: Doubleday."><span data-dcnode-id="5430" instrument_node="">2004</span></a><span data-dcnode-id="5428" instrument_node="">, p. 21) or, similarly, cognitive frameworks “that people use to impose structure upon information, situations, and expectations to facilitate understanding” (Gioia </span><a aria-label="Reference 1992" data-dcnode-id="5426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d225481274e549" title="Gioia, D. A. (1992). Pinto fires and personal ethics: A script analysis of missed opportunities. Journal of Business Ethics,
                           11, 379–389."><span data-dcnode-id="5427" instrument_node="">1992</span></a><span data-dcnode-id="5425" instrument_node="">, p. 385). Frames make us view the world from one particular and thus necessarily limited perspective. They filter what we see and how we see it. These filters function as vocabularies “in which words that are more abstract (frames) include and point to other less abstract words (cues)” (Weick </span><a aria-label="Reference 1995" data-dcnode-id="5423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e553" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5424" instrument_node="">1995</span></a><span data-dcnode-id="5422" instrument_node="">, p. 110). In the process of sensemaking, people pull from several vocabularies that are mainly shaped by the dominating ideology of their society, by the organizations they work for, and by their professional education (Weick </span><a aria-label="Reference 1995" data-dcnode-id="5420" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e556" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5421" instrument_node="">1995</span></a><span data-dcnode-id="5419" instrument_node="">). As a result, frames promote particular problem definitions, causal relations between phenomena, normative evaluations and recommendations for action (Entman </span><a aria-label="Reference 1993" data-dcnode-id="5417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d225481274e559" title="Entman, R. M. (1993). Framing: Toward clarification of a fractured paradigm. Journal of Communication,
                           43, 51–58."><span data-dcnode-id="5418" instrument_node="">1993</span></a><span data-dcnode-id="5416" instrument_node="">).</span></p><p data-dcnode-id="5380"><span data-dcnode-id="5414" instrument_node="">Frames develop through socialization processes where stimuli and social phenomena are filtered repeatedly in a specific way. In using these frames, often in an automatic fashion, people make sense “by seeing a world on which they already imposed what they believe” (Weick </span><a aria-label="Reference 1995" data-dcnode-id="5412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e565" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5413" instrument_node="">1995</span></a><span data-dcnode-id="5411" instrument_node="">, p. 15). Frames guide how information is processed, controlling what information is attended to and, just as important, what is obscured. Frames are indispensable. Without these mental structures, we would not be able to perceive and understand a complex situation. However, frames have blind spots, because they impose “mental boundaries on options” (Schoemaker and Russo </span><a aria-label="Reference 2001" data-dcnode-id="5409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d225481274e568" title="Schoemaker, P. J. H., &amp; Russo, J. E. (2001). Managing frames to make better decisions. In S. Hoch &amp; H. Kunreuther (Eds.), Wharton on making decisions (pp. 131–155). Ort: Wiley."><span data-dcnode-id="5410" instrument_node="">2001</span></a><span data-dcnode-id="5408" instrument_node="">, p. 137). Blind spots in attention and perception have been widely demonstrated in cognitive psychology (Neisser </span><a aria-label="Reference 1979" data-dcnode-id="5406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d225481274e571" title="Neisser, U. (1979). The control of information pickup in selective looking. In A. D. Pick (Ed.), Perception and its development: A tribute to Eleanor J Gibson (pp. 201–219). Hillsdale, NJ: Lawrence Erlbaum Associates."><span data-dcnode-id="5407" instrument_node="">1979</span></a><span data-dcnode-id="5405" instrument_node="">; Chabris and Simons </span><a aria-label="Reference 2010" data-dcnode-id="5403" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d225481274e574" title="Chabris, C., &amp; Simons, D. (2010). The invisible gorilla: And other ways our intuitions deceive us. New York: Crown Publishing Group."><span data-dcnode-id="5404" instrument_node="">2010</span></a><span data-dcnode-id="5402" instrument_node="">). People sometimes fail to perceive relevant things going on in front of their eyes—a phenomenon that Mack and Rock (</span><a aria-label="Reference 1998" data-dcnode-id="5400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d225481274e577" title="Mack, A., &amp; Rock, I. (1998). Inattentional blindness. Cambridge, MA: MIT Press."><span data-dcnode-id="5401" instrument_node="">1998</span></a><span data-dcnode-id="5399" instrument_node="">) have called “inattentional blindness”. Social psychology is also rich with examples that demonstrate how mental preconceptions such as stereotypes bias our perceptions, often unconsciously (Fiske </span><a aria-label="Reference 1998" data-dcnode-id="5397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d225481274e581" title="Fiske, S. T. (1998). Stereotyping, prejudice, and discrimination. In D. T. Gilbert, S. T. Fiske, &amp; G. Lindzey (Eds.), The handbook of social psychology: Vol. 2 (4th ed., pp. 357–411). New York: McGraw Hill."><span data-dcnode-id="5398" instrument_node="">1998</span></a><span data-dcnode-id="5396" instrument_node="">). Research in personality psychology further demonstrates how individual differences in, for example, morality influence cognition (Narvaez et al. </span><a aria-label="Reference 2006" data-dcnode-id="5394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d225481274e584" title="Narvaez, D., Lapsley, D. K., Hagele, S., &amp; Lasky, B. (2006). Moral chronicity and social information processing: Tests of a social cognitive approach to the moral personality. Journal of Research in Personality,
                           40, 966–985."><span data-dcnode-id="5395" instrument_node="">2006</span></a><span data-dcnode-id="5393" instrument_node="">). In management research, the phenomenon has been covered as well (e.g., Dearborn and Simon </span><a aria-label="Reference 1958" data-dcnode-id="5391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d225481274e587" title="Dearborn, D. C., &amp; Simon, H. A. (1958). Selective perception: A note on the departmental identification of executives. Sociometry,
                           21, 360–396."><span data-dcnode-id="5392" instrument_node="">1958</span></a><span data-dcnode-id="5390" instrument_node="">; Zajac and Bazerman </span><a aria-label="Reference 1991" data-dcnode-id="5388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d225481274e590" title="Zajac, E. J., &amp; Bazerman, M. H. (1991). Blind spots in industry and competitor analysis: Implications of interfirm (mis)perception for strategic decisions. Academy of Management Review,
                           16, 37–56."><span data-dcnode-id="5389" instrument_node="">1991</span></a><span data-dcnode-id="5387" instrument_node="">). For instance, Zahra and Couples (</span><a aria-label="Reference 1993" data-dcnode-id="5385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR157" id="ref-link-section-d225481274e593" title="Zahra, S. A., &amp; Couples, S. S. (1993). Blind spots in competitive analysis. Academy of Management Executive,
                           7, 7–28."><span data-dcnode-id="5386" instrument_node="">1993</span></a><span data-dcnode-id="5384" instrument_node="">) have demonstrated the impact of blind spots in competitive analysis. Recently, Ng et al. (</span><a aria-label="Reference 2009" data-dcnode-id="5382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d225481274e596" title="Ng, D., Westgren, R., &amp; Sonka, S. (2009). Competitive blind spots in an institutional field. Strategic Management Journal,
                           30, 349–369."><span data-dcnode-id="5383" instrument_node="">2009</span></a><span data-dcnode-id="5381" instrument_node="">) discussed blind spots in the way corporations perceive their value chain.</span></p><p data-dcnode-id="5369"><span data-dcnode-id="5379" instrument_node="">By masking some elements and highlighting others, frames make people blind to some aspects of a problem. Those blind spots can only be detected when looking at the problem from a different perspective, that is, by using a different frame. Another consequence of blind spots is that, depending on the frames people use, they may hold opposing views of the very same situation. For instance, what is perceived as a “web of economic relationships” can also be constructed as a “web of moral relationships” (Werhane </span><a aria-label="Reference 1999" data-dcnode-id="5377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR154" id="ref-link-section-d225481274e602" title="Werhane, P. H. (1999). Moral imagination and management decision making. New York: Oxford University Press."><span data-dcnode-id="5378" instrument_node="">1999</span></a><span data-dcnode-id="5376" instrument_node="">, p. 6). Or the same phenomenon may be perceived by managers as “the end of an old and inefficient industry”, whereas local stakeholders would see “families uprooted and lives destroyed” (Oestreich </span><a aria-label="Reference 2002" data-dcnode-id="5374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d225481274e605" title="Oestreich, J. E. (2002). What can business do to appease anti-globalization protestors? Business and Society Review,
                           107, 207–220."><span data-dcnode-id="5375" instrument_node="">2002</span></a><span data-dcnode-id="5373" instrument_node="">, p. 215). Similarly, Wheeler et al. (</span><a aria-label="Reference 2002" data-dcnode-id="5371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR156" id="ref-link-section-d225481274e608" title="Wheeler, D., Fabig, H., &amp; Boele, R. (2002). Paradoxes and dilemmas for stakeholder responsive firms in the extractive sector: lessons from the case of Shell and the Ogoni. Journal of Business Ethics,
                           39, 297–318."><span data-dcnode-id="5372" instrument_node="">2002</span></a><span data-dcnode-id="5370" instrument_node="">) argued that Shell’s problems in dealing with the critique and pressure of the Ogoni people in Nigeria over environmental pollution can partly be explained by a clash between the company’s scientific, technical rationale and the Ogoni’s more spiritual, cultural understanding of the environment.</span></p><p data-dcnode-id="5331"><span data-dcnode-id="5368" instrument_node="">Typically, frames are exclusive, in the sense that we use only one frame at a time. As optical illusions such as Rubin’s vase demonstrate, we can have one interpretation (e.g., two bright faces looking at each other in front of a dark background, with the edges being seen as part of the faces) or another interpretation (e.g., a dark vase in front of a bright background, with the edges being seen as part of the vase), but we cannot adapt both views simultaneously (Driver and Baylis </span><a aria-label="Reference 1996" data-dcnode-id="5366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d225481274e615" title="Driver, J., &amp; Baylis, G. C. (1996). Edge-assignment and figure-ground segmentation in short-term visual matching. Cognitive Psychology,
                           31, 248–306."><span data-dcnode-id="5367" instrument_node="">1996</span></a><span data-dcnode-id="5365" instrument_node="">). Being locked in one frame (Schoemaker and Russo </span><a aria-label="Reference 2001" data-dcnode-id="5363" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d225481274e618" title="Schoemaker, P. J. H., &amp; Russo, J. E. (2001). Managing frames to make better decisions. In S. Hoch &amp; H. Kunreuther (Eds.), Wharton on making decisions (pp. 131–155). Ort: Wiley."><span data-dcnode-id="5364" instrument_node="">2001</span></a><span data-dcnode-id="5362" instrument_node="">) and not being able to switch to a different frame is what we refer to as </span><i data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">rigid framing</span></i><span data-dcnode-id="5359" instrument_node="">. Rigid framing seriously impairs a person’s ability to see a more complete or richer picture of the world. As a result, people might create a </span><i data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">particulate rationality</span></i><span data-dcnode-id="5356" instrument_node=""> (Welzer </span><a aria-label="Reference 2005" data-dcnode-id="5354" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d225481274e627" title="Welzer, H. (2005). Täter. Wie aus ganz normalen Menschen Massenmörder werden. Frankfurt: S. Fischer."><span data-dcnode-id="5355" instrument_node="">2005</span></a><span data-dcnode-id="5353" instrument_node="">) in which they behave on the basis of a narrow and self-referentially closed concept of reality. Through collective interpretations, people in an organization may develop “a moral microcosmos that likely could not survive outside the organization” (Brief et al. </span><a aria-label="Reference 2000a" data-dcnode-id="5351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d225481274e631" title="Brief, A. P., Buttram, R. T., &amp; Dukerich, J. M. (2000a). Collective corruption in the corporate world: Toward a process model. In M. E. Turner (Ed.), Groups at work: Advances in theory and research (pp. 471–499). Hillsdale, NJ: Lawrence Erlbaum."><span data-dcnode-id="5352" instrument_node="">2000a</span></a><span data-dcnode-id="5350" instrument_node="">, p. 484; see also Ashforth and Anand </span><a aria-label="Reference 2003" data-dcnode-id="5348" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d225481274e634" title="Ashforth, B. E., &amp; Anand, V. (2003). The normalization of corruption in organizations. Research in Organizational Behavior,
                           25, 1–52."><span data-dcnode-id="5349" instrument_node="">2003</span></a><span data-dcnode-id="5347" instrument_node="">). Nevertheless, they believe that they “have the complete picture” (Schoemaker and Russo </span><a aria-label="Reference 2001" data-dcnode-id="5345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d225481274e637" title="Schoemaker, P. J. H., &amp; Russo, J. E. (2001). Managing frames to make better decisions. In S. Hoch &amp; H. Kunreuther (Eds.), Wharton on making decisions (pp. 131–155). Ort: Wiley."><span data-dcnode-id="5346" instrument_node="">2001</span></a><span data-dcnode-id="5344" instrument_node="">, p. 140) and ignore any information that cannot be captured by the initially used frame (Lakoff </span><a aria-label="Reference 2004" data-dcnode-id="5342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d225481274e640" title="Lakoff, G. (2004). Don’t think of an elephant!. Vermont: Chelsea Green Publishing."><span data-dcnode-id="5343" instrument_node="">2004</span></a><span data-dcnode-id="5341" instrument_node="">). As a consequence, a decision that may look irrational, unethical, and pathological from outside the microcosmos may be considered rational, ethical, and normal from the inside. Thus, unethical practice may appear as normal routine when perceived through the lens of the sensemaker (Brief et al. </span><a aria-label="Reference 2000a" data-dcnode-id="5339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d225481274e643" title="Brief, A. P., Buttram, R. T., &amp; Dukerich, J. M. (2000a). Collective corruption in the corporate world: Toward a process model. In M. E. Turner (Ed.), Groups at work: Advances in theory and research (pp. 471–499). Hillsdale, NJ: Lawrence Erlbaum."><span data-dcnode-id="5340" instrument_node="">2000a</span></a><span data-dcnode-id="5338" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="5336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d225481274e646" title="Brief, A. P., Dietz, J., Cohen, R. R., Pugh, S. D., &amp; Vaslow, J. B. (2000b). Just doing business: Modern racism and obedience to authority as explanations for employment discrimination. Organizational Behavior and Human Decision Processes,
                           81, 72–97."><span data-dcnode-id="5337" instrument_node="">b</span></a><span data-dcnode-id="5335" instrument_node="">; Punch </span><a aria-label="Reference 1996" data-dcnode-id="5333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d225481274e650" title="Punch, M. (1996). Dirty business. Exploring corporate misconduct. London: Sage."><span data-dcnode-id="5334" instrument_node="">1996</span></a><span data-dcnode-id="5332" instrument_node="">).</span></p><p data-dcnode-id="5317"><span data-dcnode-id="5330" instrument_node="">Rigid framing makes it difficult to transcend a specific view on the world and adopt another, different frame. As a consequence, it prevents people from compensating for the frame’s blind spots and from developing a deeper understanding of the situation. People risk losing the “functional utility” of their representation of the world (Walsh </span><a aria-label="Reference 1995" data-dcnode-id="5328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR146" id="ref-link-section-d225481274e656" title="Walsh, J. P. (1995). Managerial and organizational cognition: Notes from a trip down memory lane. Organization Science,
                           6, 280–321."><span data-dcnode-id="5329" instrument_node="">1995</span></a><span data-dcnode-id="5327" instrument_node="">, p. 303). Conversely, using a repertoire of frames (i.e., applying multiple frames, Schoemaker and Russo </span><a aria-label="Reference 2001" data-dcnode-id="5325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d225481274e659" title="Schoemaker, P. J. H., &amp; Russo, J. E. (2001). Managing frames to make better decisions. In S. Hoch &amp; H. Kunreuther (Eds.), Wharton on making decisions (pp. 131–155). Ort: Wiley."><span data-dcnode-id="5326" instrument_node="">2001</span></a><span data-dcnode-id="5324" instrument_node="">), allows one to (consciously or unconsciously) alternate between them when analyzing a problem. As a result, more meanings can be extracted from a situation (Weick </span><a aria-label="Reference 1995" data-dcnode-id="5322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e662" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5323" instrument_node="">1995</span></a><span data-dcnode-id="5321" instrument_node="">). A problem can be viewed from multiple perspectives, using different frames (e.g., from an economic, a legal, an administrative, a technical, and an ethical perspective). Even though it is not possible to adopt different frames at the same time, it is possible to employ them in a sequential fashion. Ideally, the insights gained from this sequential process are later structured and integrated (e.g., by assigning priorities) into a well-balanced and well-elaborated decision: “The greater the variety of beliefs in a repertoire, the more fully should any situation be seen, the more solutions that should be identified, and the more likely it should be that someone knows a great deal about what is happening” (Weick </span><a aria-label="Reference 1995" data-dcnode-id="5319" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d225481274e665" title="Weick, K. E. (1995). Sensemaking in organizations. Thousand Oaks: Sage."><span data-dcnode-id="5320" instrument_node="">1995</span></a><span data-dcnode-id="5318" instrument_node="">, p. 87).</span></p><p data-dcnode-id="5303"><span data-dcnode-id="5316" instrument_node="">In sum, we suggest that rigid framing is related to (dangerously) narrow and limited sensemaking. Ethical blindness may thus result from framing a decision making situation in a too rigid manner. For example, key (implicit) assumptions of </span><i data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">rigid</span></i><span data-dcnode-id="5313" instrument_node=""> economic, legal and scientific framing are that profit maximization is inherently moral, that laws are the only moral limit to profits and that scientific expertise should prevail over the concerns of affected laypersons, respectively. People who use those frames do not necessarily make unethical decisions. However, using these frames rigidly increases the probability that people don’t see the ethical dimension of their decision (Tenbrunsel and Messick </span><a aria-label="Reference 2004" data-dcnode-id="5311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d225481274e674" title="Tenbrunsel, A. E., &amp; Messick, D. M. (2004). Ethical fading: The role of self-deception in unethical behavior. Social Justice Research,
                           17, 223–236."><span data-dcnode-id="5312" instrument_node="">2004</span></a><span data-dcnode-id="5310" instrument_node="">). In line with this argument, Punch (</span><a aria-label="Reference 1996" data-dcnode-id="5308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d225481274e677" title="Punch, M. (1996). Dirty business. Exploring corporate misconduct. London: Sage."><span data-dcnode-id="5309" instrument_node="">1996</span></a><span data-dcnode-id="5307" instrument_node="">) explained some managers’ unethical decisions by the fact that they are dominated by an economic frame upon which they automatically draw, blinding them for other perspectives. The same may be true for using ethical frames too rigidly. For example, it has been demonstrated that Christian fundamentalists react with strong outrage to those who, in their view, violate sacred values (Tetlock et al. </span><a aria-label="Reference 2000" data-dcnode-id="5305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d225481274e680" title="Tetlock, P. E., Kristel, O. V., Elson, S. B., &amp; Green, M. C. (2000). The psychology of the unthinkable: Taboo trade-offs, forbidden base rates, and heretical counterfactuals. Journal of Personality and Social Psychology,
                           78, 853–870."><span data-dcnode-id="5306" instrument_node="">2000</span></a><span data-dcnode-id="5304" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="4917" data-title="Sensemaking in Context: The Interplay Between Framing and Contextual Factors"><div class="c-article-section" data-dcnode-id="4918" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5298" id="Sec4"><span data-dcnode-id="5299" instrument_node="">Sensemaking in Context: The Interplay Between Framing and Contextual Factors</span></h2><div class="c-article-section__content" data-dcnode-id="4919" id="Sec4-content"><p data-dcnode-id="5284"><span data-dcnode-id="5297" instrument_node="">In line with the person–situation interactionist model of ethical decision making (Trevino </span><a aria-label="Reference 1986" data-dcnode-id="5295" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d225481274e691" title="Trevino, L. K. (1986). Ethical decision making in organizations: A person-situation interactionist model. Academy of Management Review,
                           11, 601–617."><span data-dcnode-id="5296" instrument_node="">1986</span></a><span data-dcnode-id="5294" instrument_node="">), we assume that framing interacts with context factors. Sensemaking depends on the surrounding context, specifically on context factors that can amplify or attenuate a specific way in which a frame is used. Most research following the interactionist tradition only considers aspects of the organization and the immediate situation. We distinguish between a </span><i data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">proximal</span></i><span data-dcnode-id="5291" instrument_node=""> and a </span><i data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">distal</span></i><span data-dcnode-id="5288" instrument_node=""> context and discuss them further below in separate sections. Proximal context comprises the organization as well as the immediate decision making situation. Distal context refers to the overarching institutional constellation in which the organization and individual actors are embedded. The impact of institutions on ethical or unethical decision making has received little attention (Misangyi et al. </span><a aria-label="Reference 2008" data-dcnode-id="5286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d225481274e700" title="Misangyi, V. F., Weaver, G. R., &amp; Elms, H. (2008). Ending corruption: The interplay among institutional logics, resources, and institutional entrepreneurs. Academy of Management Review,
                           33, 750–770."><span data-dcnode-id="5287" instrument_node="">2008</span></a><span data-dcnode-id="5285" instrument_node="">) but is likely to have an important influence on the construction and use of frames and thus on ethical blindness. In what follows, we outline the basic mechanisms of the sensemaking model to account for ethical blindness, together with empirical evidence and business examples illustrating the proposed interaction between context pressures and rigid framing.</span></p><p data-dcnode-id="5276"><span data-dcnode-id="5283" instrument_node="">As Weick (</span><a aria-label="Reference 2005" data-dcnode-id="5281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR151" id="ref-link-section-d225481274e706" title="Weick, K. (2005). Making sense of blurred images: Mindful organizing in mission STS-107. In W. H. Starbuck &amp; M. Farjoun (Eds.), Organization at the limit. Lessons from the Columbia disaster (pp. 159–177). Malden: Blackwell Publishing."><span data-dcnode-id="5282" instrument_node="">2005</span></a><span data-dcnode-id="5280" instrument_node="">) pointed out, people do not engage in sensemaking starting from scratch, but by building on previous experiences that have shaped their way of perceiving the world. Our model (see Fig.&nbsp;</span><a data-dcnode-id="5278" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5279" instrument_node="">1</span></a><span data-dcnode-id="5277" instrument_node="">) begins with an individual sensemaking process that tends to be dominated by a specific frame; that is, a person’s perception is characterized by a certain degree of rigidity in framing. As a consequence, she tends to see only certain aspects of the situation and neglects others. She does not look at the situation from different angles (i.e., apply different frames), running the risk of staying locked into one frame.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5252" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="5253"><figcaption data-dcnode-id="5273"><b class="c-article-section__figure-caption" data-dcnode-id="5274" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="5275" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5264"><div class="c-article-section__figure-item" data-dcnode-id="5268"><a class="c-article-section__figure-link" data-dcnode-id="5269" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10551-011-1130-4/figures/1" rel="nofollow"><picture data-dcnode-id="5270"><source data-dcnode-id="5272" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10551-011-1130-4/MediaObjects/10551_2011_1130_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="5271" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10551-011-1130-4/MediaObjects/10551_2011_1130_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5265" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">Sensemaking model of ethical blindness</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5254"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="5255" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10551-011-1130-4/figures/1" rel="nofollow"><span data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5256" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5257" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5258" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5261" instrument_node="">
