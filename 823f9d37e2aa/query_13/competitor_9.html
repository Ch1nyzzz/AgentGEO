                           17, 223–236."><span data-dcnode-id="4868" instrument_node="">2004</span></a><span data-dcnode-id="4866" instrument_node="">; Vaughan </span><a aria-label="Reference 1996" data-dcnode-id="4864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR143" id="ref-link-section-d225481274e1154" title="Vaughan, D. (1996). The Challenger launch decision: Risky technology, culture and deviance at NASA. Chicago: University of Chicago Press."><span data-dcnode-id="4865" instrument_node="">1996</span></a><span data-dcnode-id="4863" instrument_node="">) can be understood as a sequence of small transgressions—as a former Enron executive stated: “You did it once, it smelled bad,… you did it again, it didn’t smell as bad” (McLean and Elkind </span><a aria-label="Reference 2003" data-dcnode-id="4861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d225481274e1158" title="McLean, B., &amp; Elkind, P. (2003). The smartest guys in the room: The amazing rise and scandalous fall of Enron. Penguin books: New York."><span data-dcnode-id="4862" instrument_node="">2003</span></a><span data-dcnode-id="4860" instrument_node="">, p. 128). How can this process be explained? What drives the temporal dynamic toward ethical blindness? To find answers to this question, we draw on four concepts that have been mainly discussed in psychological research: temporal construal theory, the concept of just-noticeable-differences, hindsight bias, and the phenomenon of escalation of commitment.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4857" id="Sec9"><span data-dcnode-id="4858" instrument_node="">Temporal Construal Theory</span></h4><p data-dcnode-id="4837"><span data-dcnode-id="4856" instrument_node="">Trope and Liberman (</span><a aria-label="Reference 2000" data-dcnode-id="4854" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR141" id="ref-link-section-d225481274e1168" title="Trope, Y., &amp; Liberman, N. (2000). Temporal construal and time-dependent changes in preference. Journal of Personality and Social Psychology,
                           79, 876–889."><span data-dcnode-id="4855" instrument_node="">2000</span></a><span data-dcnode-id="4853" instrument_node="">, </span><a aria-label="Reference 2003" data-dcnode-id="4851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR142" id="ref-link-section-d225481274e1171" title="Trope, Y., &amp; Liberman, N. (2003). Temporal construal. Psychological Review,
                           110, 403–421."><span data-dcnode-id="4852" instrument_node="">2003</span></a><span data-dcnode-id="4850" instrument_node="">) demonstrated that people construe situations differently depending on how temporally close they are to the situation. It is easier to make demanding but abstract ethical commitments for one’s future behavior than specific commitments for one’s current behavior. Believing that we can change our behavior </span><i data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">later</span></i><span data-dcnode-id="4847" instrument_node=""> might actually keep us from changing it </span><i data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">now</span></i><span data-dcnode-id="4844" instrument_node="">. Focusing on the temporal relation between decisions and their consequences, the philosopher Hans Jonas argued that a large temporal distance between the two has a negative impact on the morality of the decision. People have difficulties seeing or imagining consequences that are temporally distant. If they try imagining these consequences, they are so abstract and speculative that people cannot emotionally connect to them. Arendt (</span><a aria-label="Reference 1963" data-dcnode-id="4842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d225481274e1180" title="Arendt, H. (1963). Eichman in Jerusalem: A report on the banality of evil. New York: The Vinking Press."><span data-dcnode-id="4843" instrument_node="">1963</span></a><span data-dcnode-id="4841" instrument_node="">) described this as a lack of moral imagination. Hence, in this case, knowledge about the consequences does not lead to behavioral changes (Jonas </span><a aria-label="Reference 1985" data-dcnode-id="4839" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d225481274e1184" title="Jonas, H. (1985). The imperative of responsibility: In search of an ethics for the technological age. Chicago: Chicago University Press."><span data-dcnode-id="4840" instrument_node="">1985</span></a><span data-dcnode-id="4838" instrument_node="">). If the temporal lag between a decision and its consequences is large, ethical blindness becomes more likely.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4835" id="Sec10"><span data-dcnode-id="4836" instrument_node="">Just-Noticeable-Differences</span></h4><p data-dcnode-id="4809"><span data-dcnode-id="4834" instrument_node="">The difference between two subsequent decisions over time might give some insight into the temporal dynamics underlying ethical blindness. Because change occurs at a slow pace and often on a small scale, one small step after the other, each often below a just-noticeable difference, it may remain unnoticed (Hoffrage </span><a aria-label="Reference 2011" data-dcnode-id="4832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d225481274e1195" title="Hoffrage, U. (2011). How people can behave irresponsibly and unethically without noticing it. In G. Palazzo &amp; M. Wentland (Eds.), Practising responsible management in the 21st century. Paris: Pearson Education."><span data-dcnode-id="4833" instrument_node="">2011</span></a><span data-dcnode-id="4831" instrument_node="">). The concept of a just-noticeable-difference (Gescheider </span><a aria-label="Reference 1985" data-dcnode-id="4829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d225481274e1198" title="Gescheider, G. A. (1985). Psychophysics: Method, theory and application (2nd ed.). Hillsdale, NJ: Erlbaum."><span data-dcnode-id="4830" instrument_node="">1985</span></a><span data-dcnode-id="4828" instrument_node="">) refers to the smallest difference between two stimuli that a person is able to notice. If one holds a 30&nbsp;g weight in one hand and a 40&nbsp;g weight in the other, it is quite easy to tell which one is heavier. In contrast, comparing 30&nbsp;g and 31&nbsp;g is a much harder task for most people. While a 10&nbsp;g difference is clearly above the noticeability threshold, 1&nbsp;g is below. The Weber–Fechner law (Gescheider </span><a aria-label="Reference 1985" data-dcnode-id="4826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d225481274e1201" title="Gescheider, G. A. (1985). Psychophysics: Method, theory and application (2nd ed.). Hillsdale, NJ: Erlbaum."><span data-dcnode-id="4827" instrument_node="">1985</span></a><span data-dcnode-id="4825" instrument_node="">) describes that the just-noticeable difference is not absolute but depends on a reference system, and, in fact, a 10&nbsp;g difference can no longer be noticed when comparing a weight of 930&nbsp;g to one of 940&nbsp;g. In a process of behavioral change that evolves over time, the point of reference for a decision is not an imaginary point of nowhere, a moral starting point where a person was still acting with integrity. The reference point for today’s decision is yesterday’s decision and if today’s transgression just goes a bit further than yesterday’s decision, the ethical difference remains acceptable and the overall progression toward a more unethical course of action goes unnoticed. People might view small steps of harmdoing as not nice but acceptable because those steps seem to deviate only very little from what they perceive as the right thing to do (Welzer </span><a aria-label="Reference 2008" data-dcnode-id="4823" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR153" id="ref-link-section-d225481274e1204" title="Welzer, H. (2008). Klimakriege. Frankfurt: S. Fischer."><span data-dcnode-id="4824" instrument_node="">2008</span></a><span data-dcnode-id="4822" instrument_node="">). Thus, unethical decisions may even evolve against the conscious intention of the decision maker (Chugh and Bazerman </span><a aria-label="Reference 2007" data-dcnode-id="4820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d225481274e1207" title="Chugh, D., &amp; Bazerman, M. (2007). Bounded awareness: What you fail to see can hurt you. Mind &amp; Society,
                           6, 1–18."><span data-dcnode-id="4821" instrument_node="">2007</span></a><span data-dcnode-id="4819" instrument_node="">). Continuing in small steps and comparing the next level of harmdoing only to the previous one and not to an (imaginary) objective moral point of view, makes it easier to continue. Ultimately, this dynamic may lead into an escalation process. Small transgressions spiral into more severe ones. “The essence of the process involves causing individuals, under pressure, to take small steps along a continuum that ends with evildoing. Each step is so small as to be essentially continuous with previous ones; after each step, the individual is positioned to take the next one” (Darley </span><a aria-label="Reference 1992" data-dcnode-id="4817" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d225481274e1211" title="Darley, J. M. (1992). Social organization for the production of evil. Psychological Inquiry,
                           3, 199–218."><span data-dcnode-id="4818" instrument_node="">1992</span></a><span data-dcnode-id="4816" instrument_node="">, pp. 208, 210, cited in Brief et al. </span><a aria-label="Reference 2000a" data-dcnode-id="4814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d225481274e1214" title="Brief, A. P., Buttram, R. T., &amp; Dukerich, J. M. (2000a). Collective corruption in the corporate world: Toward a process model. In M. E. Turner (Ed.), Groups at work: Advances in theory and research (pp. 471–499). Hillsdale, NJ: Lawrence Erlbaum."><span data-dcnode-id="4815" instrument_node="">2000a</span></a><span data-dcnode-id="4813" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4811" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d225481274e1217" title="Brief, A. P., Dietz, J., Cohen, R. R., Pugh, S. D., &amp; Vaslow, J. B. (2000b). Just doing business: Modern racism and obedience to authority as explanations for employment discrimination. Organizational Behavior and Human Decision Processes,
                           81, 72–97."><span data-dcnode-id="4812" instrument_node="">b</span></a><span data-dcnode-id="4810" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4807" id="Sec11"><span data-dcnode-id="4808" instrument_node="">Hindsight Bias</span></h4><p data-dcnode-id="4787"><span data-dcnode-id="4806" instrument_node="">The fact that the process of incremental change remains unnoticed is strengthened by a phenomenon well-known in memory research, namely the hindsight bias (Hoffrage and Pohl </span><a aria-label="Reference 2003" data-dcnode-id="4804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d225481274e1228" title="Hoffrage, U., &amp; Pohl, R. (2003). Research on Hindsight bias: A rich past, a productive present, and a challenging future. Memory,
                           11, 329–335."><span data-dcnode-id="4805" instrument_node="">2003</span></a><span data-dcnode-id="4803" instrument_node="">; Blank et al. </span><a aria-label="Reference 2007" data-dcnode-id="4801" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d225481274e1231" title="Blank, H., Musch, J., &amp; Pohl, R. (2007). Hindsight bias: On being wise after the event. Social Cognition,
                           25, 1–9."><span data-dcnode-id="4802" instrument_node="">2007</span></a><span data-dcnode-id="4800" instrument_node="">). If people hear about the outcome of a story, they tend to think they knew it all along. Moreover, their memories on what they themselves predicted prior to receiving outcome information are also systematically shifted toward the outcome information. When attempting to reconstruct events, people engage in “‘rejudging’ the outcome” (Hawkins and Hastie </span><a aria-label="Reference 1990" data-dcnode-id="4798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d225481274e1234" title="Hawkins, S. A., &amp; Hastie, R. (1990). Hindsight: Biased judgment of the past events after the outcomes are known. Psychological Bulletin,
                           107, 311–327."><span data-dcnode-id="4799" instrument_node="">1990</span></a><span data-dcnode-id="4797" instrument_node="">, p. 321). Such reconstruction attempts, however, are systematically distorted by outcome knowledge (Pohl et al. </span><a aria-label="Reference 2003" data-dcnode-id="4795" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d225481274e1237" title="Pohl, R. F., Eisenhauer, M., &amp; Hardt, O. (2003). SARA—a cognitive process model to simulate anchoring effect and hindsight bias. Memory,
                           11, 337–356."><span data-dcnode-id="4796" instrument_node="">2003</span></a><span data-dcnode-id="4794" instrument_node="">; Hoffrage et al. </span><a aria-label="Reference 2000" data-dcnode-id="4792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d225481274e1240" title="Hoffrage, U., Hertwig, R., &amp; Gigerenzer, G. (2000). Hindsight bias: A by-product of knowledge updating? Journal of Experimental Psychology. Learning, Memory, and Cognition,
                           26, 566–581."><span data-dcnode-id="4793" instrument_node="">2000</span></a><span data-dcnode-id="4791" instrument_node="">). Similarly, autobiographical memories of past events are often adjusted to more recent information, eliminating inconsistencies, so that, ultimately, events form a coherent story (Mazzoni and Vannucci </span><a aria-label="Reference 2007" data-dcnode-id="4789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d225481274e1244" title="Mazzoni, G., &amp; Vannucci, M. (2007). Hindsight bias, the misinformation effect, and false autobiographical memories. Social Cognition,
                           25, 203–220."><span data-dcnode-id="4790" instrument_node="">2007</span></a><span data-dcnode-id="4788" instrument_node="">). To the extent that memories of past beliefs and behaviors are systematically distorted toward current beliefs and behaviors, changes over time remain unnoticed.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4785" id="Sec12"><span data-dcnode-id="4786" instrument_node="">Escalation of Commitment</span></h4><p data-dcnode-id="4777"><span data-dcnode-id="4784" instrument_node="">The progression in small steps is propelled by a phenomenon described as the escalation of commitment (Arkes and Blumer </span><a aria-label="Reference 1985" data-dcnode-id="4782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d225481274e1256" title="Arkes, H. R., &amp; Blumer, C. (1985). The psychology of sunk costs. Organizational Behavior and Human Decision Processes,
                           35, 124–140."><span data-dcnode-id="4783" instrument_node="">1985</span></a><span data-dcnode-id="4781" instrument_node="">; Staw </span><a aria-label="Reference 1976" data-dcnode-id="4779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d225481274e1259" title="Staw, B. M. (1976). Knee-deep in the big muddy: A study of escalating commitment to a chosen course of action. Organizational Behavior and Human Performance,
                           16, 27–44."><span data-dcnode-id="4780" instrument_node="">1976</span></a><span data-dcnode-id="4778" instrument_node="">). People tend to continue a course of action once it is taken, even if their former decisions turn out to be poor or even blatantly wrong. The reason for this tendency lays in the fact that once people have invested time, money, or other resources in a decision, it creates sunk costs. From a rational point of view, these costs should be ignored when reconsidering a decision. However, in reality, they make it more difficult for people to move away from a chosen path.</span></p><p data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">Two aspects emerge from the approaches described above as particularly relevant for understanding the role of time for unethical decision making: the temporal relation between subsequent decisions and the temporal relation between decisions and consequences. For the former, it is temporal proximity, for the latter, it is the temporal distance that bears the risk of leading into ethical blindness.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4773" id="Sec13"><span data-dcnode-id="4774" instrument_node="">Context and Time</span></h3><p data-dcnode-id="4741"><span data-dcnode-id="4772" instrument_node="">Within our sensemaking model, the evolution of ethical blindness is driven by the interaction between framing and context. Our previous discussion of context factors like authority pressure or institutional norms might lead to the misunderstanding that proximal and distal context factors are descriptions of an objectively given environment that is clearly separable from the individual. However, the sensemaking approach posits that environments are enacted and co-created through individual and shared interpretation (Smircich and Stubbart </span><a aria-label="Reference 1985" data-dcnode-id="4770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d225481274e1273" title="Smircich, L., &amp; Stubbart, C. (1985). Strategic management in an enacted world. Academy of Management Review,
                           10, 724–736."><span data-dcnode-id="4771" instrument_node="">1985</span></a><span data-dcnode-id="4769" instrument_node="">). As we have argued, frames come from previous experiences made within a social context and they have the potential to change the very same context. Thus, repeatedly using a specific frame may not only perpetuate the frame (Ashforth and Anand </span><a aria-label="Reference 2003" data-dcnode-id="4767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d225481274e1276" title="Ashforth, B. E., &amp; Anand, V. (2003). The normalization of corruption in organizations. Research in Organizational Behavior,
                           25, 1–52."><span data-dcnode-id="4768" instrument_node="">2003</span></a><span data-dcnode-id="4766" instrument_node="">) but also change the context, for example, the organizational culture (Vaughan </span><a aria-label="Reference 2005" data-dcnode-id="4764" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR144" id="ref-link-section-d225481274e1279" title="Vaughan, D. (2005). System effects: On slippery slopes, repeating negative patterns, and learning from mistake? In W. H. Starbuck &amp; M. Farjoun (Eds.), Organization at the limit. Lessons from the Columbia disaster (pp. 41–59). Malden: Blackwell Publishing."><span data-dcnode-id="4765" instrument_node="">2005</span></a><span data-dcnode-id="4763" instrument_node="">). Subsequently, individuals act within the new, transformed context, the one that they co-created (for example, in a culture where unethical behavior is increasingly tolerated) (Ashforth and Anand </span><a aria-label="Reference 2003" data-dcnode-id="4761" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d225481274e1282" title="Ashforth, B. E., &amp; Anand, V. (2003). The normalization of corruption in organizations. Research in Organizational Behavior,
                           25, 1–52."><span data-dcnode-id="4762" instrument_node="">2003</span></a><span data-dcnode-id="4760" instrument_node="">). The consequences of yesterday’s actions become the preconditions of tomorrow’s actions (Welzer </span><a aria-label="Reference 2005" data-dcnode-id="4758" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d225481274e1285" title="Welzer, H. (2005). Täter. Wie aus ganz normalen Menschen Massenmörder werden. Frankfurt: S. Fischer."><span data-dcnode-id="4759" instrument_node="">2005</span></a><span data-dcnode-id="4757" instrument_node="">). Put differently, today’s decisions reinforce or even create tomorrow’s situational and institutional pressures (March and Simon </span><a aria-label="Reference 1958" data-dcnode-id="4755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d225481274e1289" title="March, J. G., &amp; Simon, H. A. (1958). Organizations. New York: Wiley."><span data-dcnode-id="4756" instrument_node="">1958</span></a><span data-dcnode-id="4754" instrument_node="">; Ocasio </span><a aria-label="Reference 1997" data-dcnode-id="4752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d225481274e1292" title="Ocasio, W. (1997). Towards an attention-based view of the firm. Strategic Management Journal,
                           18, 187–206."><span data-dcnode-id="4753" instrument_node="">1997</span></a><span data-dcnode-id="4751" instrument_node="">). The escalating commitment of individual decision makers might manifest in organizational path dependence. This phenomenon describes a process in which organizational decisions become more and more routinized and rigid until the organization is locked into a situation, where only a considerably reduced range of decision making options is perceived as possible (von Sydow et al. </span><a aria-label="Reference 2009" data-dcnode-id="4749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR145" id="ref-link-section-d225481274e1295" title="Von Sydow, J., Schreyögg, G., &amp; Koch, J. (2009). Organizational path dependence: Opening the black box. Academy of Management Review,
                           34, 689–709."><span data-dcnode-id="4750" instrument_node="">2009</span></a><span data-dcnode-id="4748" instrument_node="">). Given such a dynamic, sensemaking processes of individuals as well as their context will co-change over time. As frames become more rigid, the risk of ethical blindness increases. This development takes place step-by-step, gradually over time, in a process of mutual confirmation that transforms both individual actors and their context. If context and individuals co-evolve, the relation between the two remains stable and, as a consequence, the individual cannot see the change that took place (Chugh and Bazerman </span><a aria-label="Reference 2007" data-dcnode-id="4746" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d225481274e1298" title="Chugh, D., &amp; Bazerman, M. (2007). Bounded awareness: What you fail to see can hurt you. Mind &amp; Society,
                           6, 1–18."><span data-dcnode-id="4747" instrument_node="">2007</span></a><span data-dcnode-id="4745" instrument_node="">; Welzer </span><a aria-label="Reference 2005" data-dcnode-id="4743" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d225481274e1301" title="Welzer, H. (2005). Täter. Wie aus ganz normalen Menschen Massenmörder werden. Frankfurt: S. Fischer."><span data-dcnode-id="4744" instrument_node="">2005</span></a><span data-dcnode-id="4742" instrument_node="">).</span></p><p data-dcnode-id="4721"><span data-dcnode-id="4740" instrument_node="">To the extent that unethical decision making can be understood as the result of a process that unfolds over time, it might be worth to also consider the role of specific historic moments in the past which manifest in specific institutional constellations (in our model, distal context). These constellations define normality for a particular society and provide the context for individuals and their organizations (in our model, proximal context). When the maritime biologists Saenz Arroyo et al. (</span><a aria-label="Reference 2005" data-dcnode-id="4738" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d225481274e1307" title="Saenz-Arroyo, A., Roberts, C. M., Torre, J., Carino-Olvera, M., &amp; Enriuez-Andrade, R. R. (2005). Rapidly shifting environmental baselines among fishers of the Gulf of California. Proceedings of the Royal Society B,
                           272, 1957–1962."><span data-dcnode-id="4739" instrument_node="">2005</span></a><span data-dcnode-id="4737" instrument_node="">) set out to examine how fish populations at the Gulf of California change over time due to commercial fishing, they needed—as a reference point—</span><i data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">the natural population</span></i><span data-dcnode-id="4734" instrument_node="">, that is, the population that existed before it was influenced by human activity. When interviewing fishermen, they found that each generation of fishermen considered the fish stock that was present when they started fishing as the natural stock. As a consequence, the three generations of fishermen had different perceptions of how the environment had changed: While for younger fishers, changes in fish stock were small, older fishers perceived them as dramatic. Importantly, the young fishermen failed to realize previous changes and were relatively relaxed about the small changes they observed. Almost nobody (with the exception of a few very old fishermen) could adopt a perspective that spanned more than a single generation. Yet it is precisely this generation-spanning, overarching perspective that would allow one to recognize dramatic changes. Due to the shift in baselines from one generation to the next, individuals could not see them. The intriguing term “shifting baselines” was introduced by Pauly (</span><a aria-label="Reference 1995" data-dcnode-id="4732" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d225481274e1313" title="Pauly, D. (1995). Anecdotes and the shifting baseline syndrome of fisheries. Trends in Ecology &amp; Evolution,
                           10, 430."><span data-dcnode-id="4733" instrument_node="">1995</span></a><span data-dcnode-id="4731" instrument_node="">): People perceive changes in the environment only relative to their own experience; as a consequence, they consider the state of environment they live in as the “natural” state. Hence, what is dramatic at one moment in history becomes normal in a following moment in history. For example, Enron might be a phenomenon that was only possible in the anything-goes context of the new economy hype in the early 2000s. The mutual transformation of decision makers and their distal and proximal context establishes a new </span><i data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">normality</span></i><span data-dcnode-id="4728" instrument_node=""> that, in its most extreme form, may even allow genocide to appear as normal (Welzer </span><a aria-label="Reference 2005" data-dcnode-id="4726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d225481274e1319" title="Welzer, H. (2005). Täter. Wie aus ganz normalen Menschen Massenmörder werden. Frankfurt: S. Fischer."><span data-dcnode-id="4727" instrument_node="">2005</span></a><span data-dcnode-id="4725" instrument_node="">; Hagan and Raymond-Richmond </span><a aria-label="Reference 2008" data-dcnode-id="4723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d225481274e1323" title="Hagan, J., &amp; Rymond-Richmond, W. (2008). The collective dynamics of racial dehumanization and genocidal victimization in Darfur. American Sociological Review,
                           73, 875–902."><span data-dcnode-id="4724" instrument_node="">2008</span></a><span data-dcnode-id="4722" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="4662" data-title="Reducing the Risk of Ethical Blindness Through Moral Imagination"><div class="c-article-section" data-dcnode-id="4663" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4716" id="Sec14"><span data-dcnode-id="4717" instrument_node="">Reducing the Risk of Ethical Blindness Through Moral Imagination</span></h2><div class="c-article-section__content" data-dcnode-id="4664" id="Sec14-content"><p data-dcnode-id="4684"><span data-dcnode-id="4715" instrument_node="">If rigid framing is the problem behind ethical blindness, flexible framing may be part of the solutions. Flexible framing reduces the risk of ethical blindness, because it challenges mindless routines and promotes moral imagination, that is “an ability to imaginatively discern various possibilities for acting within a given situation and to envision the potential help and harm that are likely to result from a given action” (Johnson </span><a aria-label="Reference 1993" data-dcnode-id="4713" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d225481274e1336" title="Johnson, M. (1993). Moral imagination. Chicago: University of Chicago Press."><span data-dcnode-id="4714" instrument_node="">1993</span></a><span data-dcnode-id="4712" instrument_node="">, p. 202). Moral imagination requires that people are “frame-vigilant” (Zimbardo </span><a aria-label="Reference 2007" data-dcnode-id="4710" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR159" id="ref-link-section-d225481274e1339" title="Zimbardo, P. (2007). The Lucifer effect. Understanding how good people turn evil. New York: Random House."><span data-dcnode-id="4711" instrument_node="">2007</span></a><span data-dcnode-id="4709" instrument_node="">, p. 454) and understand that they cannot see certain aspects because of the frame(s) they use. Moreover, it requires that people understand how proximal and distal context factors narrow their own sensemaking activities. Also, people should be encouraged to engage in “script-breaking” behavior (Gioia </span><a aria-label="Reference 1992" data-dcnode-id="4707" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d225481274e1342" title="Gioia, D. A. (1992). Pinto fires and personal ethics: A script analysis of missed opportunities. Journal of Business Ethics,
                           11, 379–389."><span data-dcnode-id="4708" instrument_node="">1992</span></a><span data-dcnode-id="4706" instrument_node="">, p. 388). For instance, managers’ rigid framing of situations in terms of organizational loyalty may be challenged and progressively replaced by a broader view of having duties toward various stakeholders (Brief et al. </span><a aria-label="Reference 2000a" data-dcnode-id="4704" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d225481274e1345" title="Brief, A. P., Buttram, R. T., &amp; Dukerich, J. M. (2000a). Collective corruption in the corporate world: Toward a process model. In M. E. Turner (Ed.), Groups at work: Advances in theory and research (pp. 471–499). Hillsdale, NJ: Lawrence Erlbaum."><span data-dcnode-id="4705" instrument_node="">2000a</span></a><span data-dcnode-id="4703" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4701" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d225481274e1348" title="Brief, A. P., Dietz, J., Cohen, R. R., Pugh, S. D., &amp; Vaslow, J. B. (2000b). Just doing business: Modern racism and obedience to authority as explanations for employment discrimination. Organizational Behavior and Human Decision Processes,
                           81, 72–97."><span data-dcnode-id="4702" instrument_node="">b</span></a><span data-dcnode-id="4700" instrument_node="">). It is crucial that organizations provide the appropriate support in terms of processes and norms. Brief et al. (</span><a aria-label="Reference 2000a" data-dcnode-id="4698" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d225481274e1352" title="Brief, A. P., Buttram, R. T., &amp; Dukerich, J. M. (2000a). Collective corruption in the corporate world: Toward a process model. In M. E. Turner (Ed.), Groups at work: Advances in theory and research (pp. 471–499). Hillsdale, NJ: Lawrence Erlbaum."><span data-dcnode-id="4699" instrument_node="">2000a</span></a><span data-dcnode-id="4697" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4695" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d225481274e1355" title="Brief, A. P., Dietz, J., Cohen, R. R., Pugh, S. D., &amp; Vaslow, J. B. (2000b). Just doing business: Modern racism and obedience to authority as explanations for employment discrimination. Organizational Behavior and Human Decision Processes,
                           81, 72–97."><span data-dcnode-id="4696" instrument_node="">b</span></a><span data-dcnode-id="4694" instrument_node="">) have criticized the fact that management scholars have focused on how to ensure compliance rather than on how to promote dissent. One way to introduce fruitful disagreement would be to disperse or multiply authority (Brief et al. </span><a aria-label="Reference 2000a" data-dcnode-id="4692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d225481274e1358" title="Brief, A. P., Buttram, R. T., &amp; Dukerich, J. M. (2000a). Collective corruption in the corporate world: Toward a process model. In M. E. Turner (Ed.), Groups at work: Advances in theory and research (pp. 471–499). Hillsdale, NJ: Lawrence Erlbaum."><span data-dcnode-id="4693" instrument_node="">2000a</span></a><span data-dcnode-id="4691" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4689" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d225481274e1361" title="Brief, A. P., Dietz, J., Cohen, R. R., Pugh, S. D., &amp; Vaslow, J. B. (2000b). Just doing business: Modern racism and obedience to authority as explanations for employment discrimination. Organizational Behavior and Human Decision Processes,
                           81, 72–97."><span data-dcnode-id="4690" instrument_node="">b</span></a><span data-dcnode-id="4688" instrument_node="">; Kelman and Hamilton </span><a aria-label="Reference 1989" data-dcnode-id="4686" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d225481274e1364" title="Kelman, H. C., &amp; Hamilton, V. L. (1989). Crimes of obedience. New Haven: Yale University Press."><span data-dcnode-id="4687" instrument_node="">1989</span></a><span data-dcnode-id="4685" instrument_node="">). As a consequence, organizational practices, policies, and decisions are exposed to independent decision making parties and thus, multiple perspectives, weakening strong routines.</span></p><p data-dcnode-id="4676"><span data-dcnode-id="4683" instrument_node="">Leadership qualities play an equally important role. Leaders who openly invite dissent are more likely to challenge rigid framing and foster sensemaking activities characterized by flexible framing (Foldy et al. </span><a aria-label="Reference 2008" data-dcnode-id="4681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d225481274e1370" title="Foldy, E. G., Goldman, L., &amp; Ospina, S. (2008). Sensegiving and the role of cognitive shifts in the work of leadership. Leadership Quarterly,
                           19, 514–529."><span data-dcnode-id="4682" instrument_node="">2008</span></a><span data-dcnode-id="4680" instrument_node="">). Russo and Schoemaker (</span><a aria-label="Reference 2004" data-dcnode-id="4678" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d225481274e1373" title="Russo, J. E., &amp; Schoemaker, P. J. H. (2004). Winning decisions: Getting it right the first time. New York: Doubleday."><span data-dcnode-id="4679" instrument_node="">2004</span></a><span data-dcnode-id="4677" instrument_node="">, p. 164) point at the dissent-promoting leadership style of Alfred P. Sloan, Jr. at the General Motor’s board of directors whom they cite as follows: “Gentlemen, I take it we are all in complete agreement on the decision here. … Then I propose we postpone further discussion of this matter until our next meeting to give ourselves time to develop disagreement and perhaps gain some understanding of what the decision is all about”.</span></p><p data-dcnode-id="4665"><span data-dcnode-id="4675" instrument_node="">We argued that the risk of ethical blindness is amplified by institutional forces of the distal context. Those forces are mostly not under the control of the individual or the organization. Nevertheless, what corporations can do is to weaken the influence of specific overarching worldviews by systematically creating multiple communication channels with their environment. Thus, flexible framing might be promoted by organizational boundary spanning that provides decision makers with a richer picture of their societal context (Fennell and Alexander </span><a aria-label="Reference 1987" data-dcnode-id="4673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d225481274e1379" title="Fennell, M., &amp; Alexander, J. A. (1987). Organizational boundary spanning in institutionalized environments. Academy of Management Journal,
                           30, 456–476."><span data-dcnode-id="4674" instrument_node="">1987</span></a><span data-dcnode-id="4672" instrument_node="">). Boundary spanning lays at the crossroads of proximal (organization) and distal (society, other organizations) context factors. It provides corporations with what Post and Altman (</span><a aria-label="Reference 1992" data-dcnode-id="4670" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d225481274e1382" title="Post, J. E., &amp; Altman, B. W. (1992). Models of corporate greening: How corporate social policy and organisational learning inform leading-edge environmental management. Research in Corporate Social Performance and Policy,
                           13, 3–29."><span data-dcnode-id="4671" instrument_node="">1992</span></a><span data-dcnode-id="4669" instrument_node="">, p. 13) have called “windows of the corporation through which management can perceive, monitor, and understand external change, and simultaneously, a window in through which society can influence corporate policy and practice”. Successful boundary spanning reduces the probability that organizations develop their own microcosmos of particulate rationality. If this microcosmos already exists, boundary spanning might help to induce a strong external shock often needed to overcome the dynamics of rigid framing and ethical blindness (Ashforth and Anand </span><a aria-label="Reference 2003" data-dcnode-id="4667" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d225481274e1385" title="Ashforth, B. E., &amp; Anand, V. (2003). The normalization of corruption in organizations. Research in Organizational Behavior,
                           25, 1–52."><span data-dcnode-id="4668" instrument_node="">2003</span></a><span data-dcnode-id="4666" instrument_node="">, p. 38).</span></p></div></div></section><section data-dcnode-id="4594" data-title="Ethical Blindness as a Normative and Descriptive Concept"><div class="c-article-section" data-dcnode-id="4595" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4660" id="Sec15"><span data-dcnode-id="4661" instrument_node="">Ethical Blindness as a Normative and Descriptive Concept</span></h2><div class="c-article-section__content" data-dcnode-id="4596" id="Sec15-content"><p data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">The conceptual model developed in this article offers a novel view on interactions between person and context factors to explain the risk of unethical behavior, integrating cognitive-psychological and constructivist literature. It defines ethical blindness as a psychological state where people are temporarily blind to ethical dimensions in a decision making situation. As such, it increases the risk of unethical behavior. Ethical blindness is the result of a sensemaking process that unfolds over time during which framing and context pressures mutually reinforce and ultimately transform each other. Thus, when ethically blind, even people with high levels of integrity may deviate from their own values.</span></p><p data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">It is important to note that by highlighting the impact of context forces and arguing that people are sometimes unable to draw on their personal values and unable to see ethical dimensions in a situation, we do not want to “excuse” unethical behavior. At the heart of the sensemaking process is the assumption that people actively construct (and co-evolve with) the environment. Thus, sensemaking is not an automated response but an active construction process. Hence, people are responsible for their decisions and for the environment they shape. However, it could be argued that the concept of moral responsibility needs to be defined in a broader way: Those who contribute to building a context that strengthens rigid framing are morally responsible for unethical decisions as well.</span></p><p data-dcnode-id="4648"><span data-dcnode-id="4655" instrument_node="">What is ethical? This question is not crucial for understanding ethical blindness. By adopting the insider perspective of the decision maker, the question of whether her behavior is ethical or not from an objective and universal point of view is irrelevant. The important thing is that the decision maker deviates </span><i data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">from her own values</span></i><span data-dcnode-id="4652" instrument_node="">. Nevertheless, in our view, the question of what is ethical is still important. Individual values do not develop in a social vacuum but are formed and nourished through socialization processes that embed and situate individual actors in a context of normative traditions. As such, individual values are not only a personal but also a social category. The literature on ethical decision making treats this category mainly in a descriptive way. Accordingly, unethical behavior is defined as behavior “that is either illegal or morally inacceptable to the larger community” (Jones </span><a aria-label="Reference 1991" data-dcnode-id="4650" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d225481274e1403" title="Jones, T. M. (1991). Ethical decision making by individuals in organizations: An issue-contingent model. Academy of Management Review,
                           16, 366–395."><span data-dcnode-id="4651" instrument_node="">1991</span></a><span data-dcnode-id="4649" instrument_node="">, p. 367).</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4647" instrument_node="">This position has been criticized as being too relativistic because it avoids a precise normative stance on right and wrong (Reynolds </span><a aria-label="Reference 2006" data-dcnode-id="4645" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d225481274e1409" title="Reynolds, S. J. (2006). A neurocognitive model of the ethical decision-making process: Implications for study and practice. Journal of Applied Psychology,
                           91, 737–748."><span data-dcnode-id="4646" instrument_node="">2006</span></a><span data-dcnode-id="4644" instrument_node="">; Tenbrunsel and Smith-Crowe </span><a aria-label="Reference 2008" data-dcnode-id="4642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d225481274e1412" title="Tenbrunsel, A. E., &amp; Smith-Crowe, K. (2008). Ethical decision making: Where we’ve been and where we’re going. Academy of Management Annals,
                           2, 545–607."><span data-dcnode-id="4643" instrument_node="">2008</span></a><span data-dcnode-id="4641" instrument_node="">). In fact, as our discussion of the mutual transformation of individuals and context suggests, values and normative standards of an entire community might shift, developing into a self-referentially closed microcosmos, and creating a new “normality”. This new normality itself might be morally dubious. Indeed, the analysis of past and present genocides (Welzer </span><a aria-label="Reference 2005" data-dcnode-id="4639" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d225481274e1415" title="Welzer, H. (2005). Täter. Wie aus ganz normalen Menschen Massenmörder werden. Frankfurt: S. Fischer."><span data-dcnode-id="4640" instrument_node="">2005</span></a><span data-dcnode-id="4638" instrument_node="">; Hagan and Rymond-Richmond </span><a aria-label="Reference 2008" data-dcnode-id="4636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d225481274e1418" title="Hagan, J., &amp; Rymond-Richmond, W. (2008). The collective dynamics of racial dehumanization and genocidal victimization in Darfur. American Sociological Review,
                           73, 875–902."><span data-dcnode-id="4637" instrument_node="">2008</span></a><span data-dcnode-id="4635" instrument_node="">) demonstrates that dominant norms of a community can become questionable from a moral point of view because they violate hypernorms (Donaldson and Dunfee </span><a aria-label="Reference 1994" data-dcnode-id="4633" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d225481274e1421" title="Donaldson, T., &amp; Dunfee, T. W. (1994). Toward a unified conception of business ethics: Integrative social contracts theory. Academy of Management Review,
                           19, 252–284."><span data-dcnode-id="4634" instrument_node="">1994</span></a><span data-dcnode-id="4632" instrument_node="">) or deviate from “cosmopolitan” or “higher order interests” (Teegen et al. </span><a aria-label="Reference 2004" data-dcnode-id="4630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d225481274e1425" title="Teegen, H., Doh, J. P., &amp; Vachani, S. (2004). The importance of nongovernmental organization (NGOs)in global governance and value creation: An international business research agenda. Journal of International Business Studies,
                           35(6), 463–483."><span data-dcnode-id="4631" instrument_node="">2004</span></a><span data-dcnode-id="4629" instrument_node="">, p. 471).</span></p><p data-dcnode-id="4620"><span data-dcnode-id="4627" instrument_node="">Thus, decisions can be unethical because organizational decision makers act against their own moral standards and those of their community (e.g., the organization) with the community standards themselves being in line with higher order principles such as those outlined in the principles of the UN Global Compact. Furthermore, a decision can be unethical despite the fact that it is in line with the community standards because these standards themselves might violate universal moral principles that the decision maker normally shares and supports. Importantly, the insider perspective of the organizational decision maker remains the point of reference but the yardstick for normative evaluation can either be </span><i data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">polis</span></i><span data-dcnode-id="4624" instrument_node=""> or </span><i data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">cosmos</span></i><span data-dcnode-id="4621" instrument_node="">, thereby allowing for descriptive and normative research on ethical decision making in corporations.</span></p><p data-dcnode-id="4597"><span data-dcnode-id="4619" instrument_node="">We deliberately abstained from taking a normative position of what is right and wrong. However, this article takes a normative standpoint with respect to the phenomenon of ethical blindness itself and its driving factors. Overall, we posit that flexible framing is better than rigid framing. Specifically, we argue that flexible framing reduces the risk of ethical blindness and, ultimately, that of unethical behavior. Flexible framing, however, should not be confused with ethical relativity or opportunism. It refers to the contention that good decisions depend on moral imagination (Arendt </span><a aria-label="Reference 1963" data-dcnode-id="4617" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d225481274e1441" title="Arendt, H. (1963). Eichman in Jerusalem: A report on the banality of evil. New York: The Vinking Press."><span data-dcnode-id="4618" instrument_node="">1963</span></a><span data-dcnode-id="4616" instrument_node="">; Werhane </span><a aria-label="Reference 1999" data-dcnode-id="4614" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR154" id="ref-link-section-d225481274e1444" title="Werhane, P. H. (1999). Moral imagination and management decision making. New York: Oxford University Press."><span data-dcnode-id="4615" instrument_node="">1999</span></a><span data-dcnode-id="4613" instrument_node="">; Werhane et al. </span><a aria-label="Reference 2011" data-dcnode-id="4611" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d225481274e1447" title="Werhane, P. H., Hartman, L. P., Moberg, D., Englehardt, E., Pritchard, M. &amp; Parmar, B. (2011). Social constructivism, mental models, and problems of obedience. Journal of Business Ethics, 100(1), 103–118."><span data-dcnode-id="4612" instrument_node="">2011</span></a><span data-dcnode-id="4610" instrument_node="">), that is, on a person’s ability to see and consider a multitude of aspects when making decisions. Seeing and taking more aspects of an issue into consideration helps to compensate for a frame’s blind spots and increases the probability of considering ethics, together with other aspects, in corporate decision making. To the extent that flexible framing is superior to rigid framing on the individual level, it makes sense to promote conditions in societies and organizations that foster a climate of tolerance and pluralism instead of fundamentalism and dogmatism (Habermas </span><a aria-label="Reference 1996" data-dcnode-id="4608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d225481274e1450" title="Habermas, J. (1996). Between facts and norms. Cambridge, MA: MIT Press."><span data-dcnode-id="4609" instrument_node="">1996</span></a><span data-dcnode-id="4607" instrument_node="">; Popper </span><a aria-label="Reference 1995" data-dcnode-id="4605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d225481274e1453" title="Popper, K. (1995/1945). The open society and its enemies (2 volumes). London: Routledge."><span data-dcnode-id="4606" instrument_node="">1995</span></a><span data-dcnode-id="4604" instrument_node="">; Rorty </span><a aria-label="Reference 1991" data-dcnode-id="4602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d225481274e1457" title="Rorty, R. (1991). The priority of democracy to philosophy. In R. Rorty (Ed.), Objectivity, relativism, and truth: Philosophical papers (Vol. I, pp. 175–196). Cambridge, UK: Cambridge University Press."><span data-dcnode-id="4603" instrument_node="">1991</span></a><span data-dcnode-id="4601" instrument_node="">; Walzer </span><a aria-label="Reference 1997" data-dcnode-id="4599" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR147" id="ref-link-section-d225481274e1460" title="Walzer, M. (1997). On toleration. Yale: Yale University Press."><span data-dcnode-id="4600" instrument_node="">1997</span></a><span data-dcnode-id="4598" instrument_node="">). Flexible framing is unlikely to develop if rigid definitions of what is right and wrong dominate, and if alternative opinions are suppressed and critical voices silenced. The most effective cure for ethical blindness is an atmosphere of open, democratic, and critical deliberation.</span></p></div></div></section><span data-dcnode-id="4593" instrument_node="">
</span><div data-dcnode-id="2566" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="2567" data-title="References"><div class="c-article-section" data-dcnode-id="2568" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4591" id="Bib1"><span data-dcnode-id="4592" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="2569" id="Bib1-content"><div data-container-section="references" data-dcnode-id="2570"><ul class="c-article-references" data-dcnode-id="2580"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="4581"><p class="c-article-references__text" data-dcnode-id="4586" id="ref-CR2"><span data-dcnode-id="4590" instrument_node="">Arendt, H. (1963). </span><i data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">Eichman in Jerusalem: A report on the banality of evil</span></i><span data-dcnode-id="4587" instrument_node="">. New York: The Vinking Press.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="4582"><a aria-label="Google Scholar reference 1" data-dcnode-id="4584" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3F%26title%3DEichman%2520in%2520Jerusalem%253A%2520A%2520report%2520on%2520the%2520banality%2520of%2520evil%26publication_year%3D1963%26author%3DArendt%252CH"><span data-dcnode-id="4585" instrument_node="">

</span><i data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">35</span></i><span data-dcnode-id="4564" instrument_node="">, 124–140.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="4556"><a aria-label="Article reference 3" data-dcnode-id="4561" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/0749-5978%252885%252990049-4"><span data-dcnode-id="4562" instrument_node="">Article</span></a><span data-dcnode-id="4560" instrument_node="">&nbsp;
    </span><a aria-label="Google Scholar reference 3" data-dcnode-id="4558" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3F%26title%3DThe%2520psychology%2520of%2520sunk%2520costs%26journal%3DOrganizational%2520Behavior%2520and%2520Human%2520Decision%2520Processes%26volume%3D35%26pages%3D124-140%26publication_year%3D1985%26author%3DArkes%252CHR%26author%3DBlumer%252CC"><span data-dcnode-id="4559" instrument_node="">
