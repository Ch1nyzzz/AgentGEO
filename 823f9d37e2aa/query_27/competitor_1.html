</span><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Salaams,</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">There certainly are some scholars that will say that women wearing pants is haram because it falls under the "imitation of men". However there are also scholars that say there is nothing that specifically forbids wearing pants, and that as long as women follow the guidelines of modesty by wearing loose-fitting pants it is acceptable. As you may have noticed, there are Islamic sub-cultures and many muslimahs who do wear baggy pants as part of a two-piece outfit, and I've never personally seen anyone approach them to tell them to stop.</span></p><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">It sounds like you live in a western culture.  As I've said before, trying to stick to a strict interpretation of sharia in an un-Islamic culture (particularly if a woman is working) is really impractical.  There are scholars who live and work in the west who understand this, and teach that the moderate course is to go ahead and wear loose pants, and cover the rest of yourself as you would normally.</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">On the issue of shaking hands, here again is a controversy between strict and loose interpretations. Generally, non-mahrems are not to touch each other at all, for any reason. Yet, in a western culture (especially in corporate culture), following this in entirety would be seen as rude and may jeopardize one's livelihood.  Even though Islam sets clear guidelines about how non-mahrems should interact, Islam also teaches that we should keep good and peaceful relations with non Muslims around us. For that reason, some would say that "shaking hands" is permitted (although it may be disliked) because it is a cultural norm that is more noticeable when NOT practiced (ie: someone tries to shake your hand and you refuse).</span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">I realize these are not clear-cut answers, but such is the case with a lot of legal technicalities like these, particularly when practiced in a western setting.  If you want to research the issue further, talk to a few local imams where you live and see what their views are. I'm sure after getting more information you will have a conviction about how you want to approach this in your own life.</span></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2520" instrument_node="">-Amy</span><br data-dcnode-id="2519"><span data-dcnode-id="2518" instrument_node="">
IslamicAnswers.com Editor</span></p><span data-dcnode-id="2516" instrument_node="">

Question: Some women dress their young daughters in trousers, and thereafter dress them up in an 'abaa.ah (full-length outer garment covering a female's body from head to toe).What is the ruling regarding this?</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2467" instrument_node="">Response: That which I am of the opinion is that the young girls should not be dressed in trousers, since from one angle - this does away with their humility, and from another angle – there is a rule amongst the people of knowledge, (and that is) «whatever is haraam for the elder (female) to wear is (also) haraam for the younger (female) to wear»; (in that case), I am of the opinion that the young girl should not be dressed in trousers, even if she is covered with an 'abaa.ah.</span><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">

</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Assalamu'alaikum, </span></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">I disagree with sister Amy about the handshake. In no case can this be termed "permitted" because when we are warned not to come near zina, this handshake is actually something that stimulates one's desire and takes one to zina.  The result is that one will look for pleasure and if one does not find halaal means, chances are that one may turn to haraam. We do not change for the west but we remain on the middle path and have patience. It is haraam to shake hands with a non Mahram and may Allah  Forgive us for our weaknesses and enable us to follow His True Guidance.</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Concerning the jeans, yes if you wear jeans and go out of your home it is imitation of men. And the hadeeth that says imitating men is haraam is applicable here. However, if you wear a proper hijaab over this jeans, I can recall a fatwa which says this is not haraam as you have covered it with a modest dress. What hijaab is, is again another matter.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">This life is a test to see whether we obey Allah or we don't. It is required that we follow what is most correct and according to the teachings of Rasoolullah. He advised women to wear long loose outfits which reach the ground. When they complained that it would get dirty, he said what comes after the dirt will clean it. (accrding to a Hasan hadith in Abu Dawood) This was to cover their feet which is awrah (accrdong to a Sahih hadith in Abu Dawood).</span></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">So sister, thank the One Who gave you the tawfeeq to wear a hijaab and adopt it completely and may Allah Give you Barakah.</span></p><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">He Says:</span></p><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2382" instrument_node="">يَا أَيُّهَا الَّذِينَ آمَنُوا ادْخُلُوا فِي السِّلْمِ كَافَّةً وَلَا تَتَّبِعُوا خُطُوَاتِ الشَّيْطَانِ ۚ إِنَّهُ لَكُمْ عَدُوٌّ مُبِينٌ</span><br data-dcnode-id="2381"><span data-dcnode-id="2380" instrument_node="">
O you who have believed, enter into Islam completely [and perfectly] and do not follow the footsteps of Satan. Indeed, he is to you a clear enemy.</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2377" instrument_node="">Abu Abdul Bari</span><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">
IslamicAnswers.com Editor</span></p><span data-dcnode-id="2373" instrument_node="">

</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Salaams,</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Like I said, these are not my opinions, but opinions of teachers and scholars who actually live in the west and see what we deal with here as Muslims. Here is one of their fatwas, for your reference: </span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2219"><strong data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">It is permissible for a woman to wear pants as long as they meet the minimum requirements of an Islamic dress. Among the minimum requirement of an Islamic dress is that it covers the entire body of the woman except face, hands and feet, it is not revealing, it is exposing the shape of particular body parts etc...</span></strong></p><strong data-dcnode-id="2209"><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2217" instrument_node="">With regard to your question about imitating the dress of woman, it is only a concern when some dress is exclusive for one gender apart from the other. If some dress is unisex then there is no harm in wearing that dress such as pajama or trouser.</span><br data-dcnode-id="2216"><span data-dcnode-id="2215" instrument_node="">
And Allah knows best.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Mufti Ikram ul Haq</span></p><span data-dcnode-id="2210" instrument_node="">
</span></strong><p data-dcnode-id="2206"><strong data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Fatwa Center of America</span></strong></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2204" instrument_node="">In addition, this website gives an extensive analysis on permissibility of shaking hands based on likelihood of desire (among other things): </span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.suhaibwebb.com/islam-studies/faqs-and-fatwas/shaking-hands-with-a-non-mahram-dr-yusuf-al-qaradawi/" rel="nofollow ugc"><span data-dcnode-id="2203" instrument_node="">http://www.suhaibwebb.com/islam-studies/faqs-and-fatwas/shaking-hands-with-a-non-mahram-dr-yusuf-al-qaradawi/</span></a></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">I realize some things I say don't apply to every person or cultural environment, but the truth is that Muslims in the west don't have the same Islamic support to practice as fully as Muslims elsewhere.  Not only that, but for converts like myself, the west IS the culture we've known most of our lives, and trying to practice Islam is the change. We didn't grow up with Islam, and in most cases we never heard of it until well into our adult years. We've been doing things like shaking hands with no thought all our lives (and for that reason it's not something that incites lust at all), so to drastically change those culturally accepted practices suddenly one day does have very serious repurcussions. I don't think Muslims in other parts of the world realize how much Islam is hated and feared in the west, particularly in the USA. Even something as simple as stopping shaking hands only adds fuel to the fire of the western non-Muslims, and further "proves" in their mind that we are simply not like them, and that we are out to take them over. There is no way to combat this mindset if western Muslims were to insist on following shariah "no matter what".</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">I'm not saying all this to prove or disprove fatwas given by muftis. All I'm saying is that in the giving of fatwas, the muftis who appreciate what is actually going on in western culture factor that into their interpretations. Now what they rule, that's between them and Allah, and hopefully all muftis have enough taqwa to try to rule as prudently as they are able. Those who follow a formal ruling aren't to blame as much as the giver of that ruling would be.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">I think every Muslim in the west would LOVE to live their lives according to Islam more freely. We would love to practice shariah more, but unless we are willing or able to move to another part of the world it's simply impossible to do perfectly. The cultures we live actually force us to do many things that are contrary to Islam. If a Muslim woman gets pulled over by an officer, and he reaches out to shake her hand when he greets her, do you know she could be arrested for disrespecting a law enforcement officer if she refuses? Not saying she would actually be convicted of the crime, but this is not something you play with. Most Muslims I know aren't willing to jeopardize their family, their livelihood, or their good standing as a Muslim in their local community over something as simple as handshakes.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">And I'm sure there are those who would advise us to stand up and follow these guidelines anyway, no matter what the cost, and trust Allah.  As if that would help the case for Muslims in the west, making us more palatable and acceptable. These are the realities, and for those who want to practice things hard and fast, I have the utmost respect. But I've yet to see someone stick to that while living in the US, whether they are a born Muslim raised here or immigrant, or convert. I challenge anyone to try, because most who start out that way end up seeing very quickly where that road leads.</span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">I'm sorry to have vented. I just hope that some of our brothers and sisters can take the time to truly understand how some of us live so proper support can be offered, instead of picking about "should's".</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2181"><span data-dcnode-id="2184" instrument_node="">-Amy</span><br data-dcnode-id="2183"><span data-dcnode-id="2182" instrument_node="">
IslamicAnswers.com Editor</span></p><span data-dcnode-id="2180" instrument_node="">

</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Sister, in the link you provided, Yusuf al Qardawi is wrong in using his logic over the evidences of deen.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">He permits handshaking when there is no desire, while the ahaadeeth do not permit a second look at a woman (for a man), as this hadith says...touching a woman/handshakes are far ahead of the deed of the eye:</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">“O Ali, do not follow a glance with another, for you will be forgiven for the first, but not for the second.”&nbsp;(Reported by al-Tirmidhi, 2701; see Saheeh al-Jaami’, 7953)</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">And his words are also against the following hadith:</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">It is better for a Believer to be struck in the head with a hot iron rod than to touch a woman who is not lawful for him.[Tabarani &amp; Baihaqqi]</span></p><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">There is no mention of desire or no desire. When he talks about touching older women, scholars agree that even looking at an older woman is permissible. So this has nothing to do here.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">He also uses the hadith about slave women of Madeenah taking hold of his hand. This is totally out of context. This hadith shows how humble our beloved Sallallahu Alaihi Wasallam was towards slave women. His qiyas is also against the explanation of the classical scholars. Ibn Hajar says in Fathul Bari about this hadith:</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">It became clear to us via powerful evidence that the Prophet Sallallahu Alaihi Wasallam was especially permitted to be alone with a women who is foreign to him (non Haram to him), and to look at her. This is the correct response to the story of Um Haram bint Milahan, when He Sallallahu Alaihi Wasallam entered her home, and slept in her home. And when she cleaned His hair, without them being married or being Mahrams.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">According to this qiyas, men must also be allowed to have 9 wives at a time because Rasoolillah Sallallahu Alaihi Wasallam did and he is the best example. Instead, some things are only for him and not for his Ummah.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">So, this is no excuse for handshaking with a non Mahram. May Allah Give us the Tawfeeq to follow what is best.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2109" instrument_node="">قُلْ إِنِّي أَخَافُ إِنْ عَصَيْتُ رَبِّي عَذَابَ يَوْمٍ عَظِيمٍ</span><br data-dcnode-id="2108"><span data-dcnode-id="2107" instrument_node="">
Say,  "Indeed  I  fear,  if  I  should  disobey  my  Lord,  the  punishment  of  a  tremendous  Day." (al An'aam)</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2104" instrument_node="">Abu Abdul Bari</span><br data-dcnode-id="2103"><span data-dcnode-id="2102" instrument_node="">
IslamicAnswers.com Editor</span></p><span data-dcnode-id="2100" instrument_node="">

</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Salaams,</span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">I totally understand the point you are trying to make. And certainly there is plenty of scholarly support for your position.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">However,  I feel, as lay-people, we should be careful about saying a mufti "is wrong" in their opinion.  Of course, we are all free to accept/reject, to follow or not follow, any fatwa. If this mufti were present to ask about his position, and ask why he disagrees with the opposing position, and then conclude based on his answers what we want to follow, that's one thing. But to read an opinion and declare it "wrong", without being on any level of scholarship ourselves, that seems a bit disrespectful. After all, we all know that the qualifications for becoming a mufti are high, and this status can't be pulled out of a cereal box. Whether we agree or disagree with a fatwa or scholarly opinion, we should still have enough respect for the recognized positions of the learnt to approach it with adab.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2050" instrument_node="">-Amy</span><br data-dcnode-id="2049"><span data-dcnode-id="2048" instrument_node="">

</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Assalaamualaikam</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">There are a lot of different opinions and interpretations regarding this issue, and it's one that stirs a lot of feelings in many people.</span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Living and working in a society in which Islam is not accepted or even widely tolerated can be a daily struggle and it can be very hard to find a path that allows us to fulfil our spiritual aims and our requirements for being able to keep our jobs, support our families, etc. For example, a female doctor might have to treat a male patient, and if she refused she might well lose her job.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">My personal approach is that I aim to live up to the guidance given to us, and try my best to avoid going against it. Where there are things I am prevented from doing, I look at how I can adapt the situation - either through talking to someone and making changes to the environment, or by making plans to get into a more appropriate situation.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">With regards your query about jeans and trousers, I would advise you to read the opinions of scholars and try to apply that to your situation - people can say you should or shouldn't do things, but I feel the best way to proceed is to read the information and decide for yourself whether you wish to follow it, and which bits you wish to follow.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">May Allah guide us all and give us tolerance to support and accept our brothers and sisters in faith, wherever they may be.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1816" instrument_node="">Midnightmoon</span><br data-dcnode-id="1815"><span data-dcnode-id="1814" instrument_node="">

</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Salaams,</span></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">When a woman is at home -alone or only among her mahram- she may wear whatever she wants so long as her awrah is covered. I believe that most scholars (I know at least Hanafi ones say this) will say the awrah for a woman in such a case is the navel to the knee (and this actually surprised me because it is essentially saying women can walk around topless at home if they like lol). Of course for salat only you would have to cover everything again. </span></p><span data-dcnode-id="1629" instrument_node="">

</span><p data-dcnode-id="1581"><span data-dcnode-id="1584" instrument_node="">As-salamu Alaykum,</span><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">
Although a woman's awrah is from the navel to the knee, this does not mean it is okay for a woman to go topless at home or in front of other women. Although I cannot tell you for sure what is meant by this permission, my feeling is that it may have to do with granting women some allowances to perform natural acts like breastfeeding in the presence of other women without having to worry about being exposed. All of the opinions I have read on the topic of women's modesty state that it is better for women to remain modest in the presence of other women and not expose more of the body than necessary.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Regarding the issue of pants, I think if we go back to the Qur'an we will find that the relevant verses speak of an overgarment of some sort. Also consider that elderly women beyond the age of desire are granted permission to cast aside the overgarment. If women were simply wearing "regular" clothes, then what garments are the elderly women casting aside in verse 24:60? There are obviously two levels of dress - the "regular" modest dress that the majority of Muslim women are required to maintain and a slightly less modest dress that elderly women are allowed to wear because it is more relaxed for them.</span></p><span data-dcnode-id="1577" instrument_node="">

</span><p data-dcnode-id="1381"><span data-dcnode-id="1414" instrument_node="">or do we have to wear the traditional black burka outside?</span><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node="">
Hijaab is not a piece of cloth on your head. It's a way of life.</span><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">
Its a whole way of life.Allaah says:</span><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">
“And say to the believing women to lower their gazes, and to guard their private parts, and not to display their beauty (zeenah) except what is apparent of it, and to extend their headcoverings (khimars) to cover their bosoms (jaybs), and not to display their beauty except to their husbands, or their fathers, or their husband's fathers, or their sons, or their husband's sons, or their brothers, or their brothers' sons, or their sisters' sons, or their womenfolk, or what their right hands rule (slaves), or the followers from the men who do not feel sexual desire, or the small children to whom the nakedness of women is not apparent, and not to strike their feet (on the ground) so as to make known what they hide of their adornments. And turn in repentance to Allah together, O you believers, in order that you are successful.” (Surat-un-Nur: 31)</span><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">
Well, my head is covered. What more do you want?AS IF IT IS A FAVOUR DONE ON ALLAH-</span><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">
Sorry....tight jeans and short shirt just don’t cut itYou can’t wear tight jeans and a short shirt with a piece of cloth on your head and think this is Hijaab. Nor can you wear anything else that is tight, describing the shape of the body in any way, even if it is long. The Prophet (Sal Allaahu Alaiyhi wa Sallam) said:"In later (generations) of my ummah there will be women who will be dressed but naked. On top of their heads (what looks) like camel humps. They will not enter into paradise or (even) get a smell of it." (Muslim)</span><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node="">
If it is see-through, its NOT Hijaab</span><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">
The Hijaab shouldn’t attract attention</span><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">
Tinkling Jewelry and Jingling bracelets</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
No laughing, joking, or hanging out with non-Mahrams</span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">
Staring at the brothers or ‘checking them out’ is NOT Hijaab</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">
‘Chatting’ on the internet/phone is not part of Hijaab, either</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">
Be careful, even in the way you walk</span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
Don’t shake hands with non-Mahrams. Its part of Hijaab</span><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node="">
Stay away from the men’s areas</span><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">
Hijaab is also to conceal your sisterAlthough some sisters wear the Hijaab themselves, they forget that they cannot talk about another sister and her beauty in front of their own husbands, brothers, etc. Remember, part of your Hijaab is to cover your sisters ‘awrah’ as well.The Prophet (Sal Allaahu Alaiyhi wa Sallam) said: “No woman should mix with a woman and describe her to her husband so that it is as if he can see her.” (Muslim)</span><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
FINALLY-"Every religion has a morality, and the morality of Islam is Haya (Shyness)".</span></p><span data-dcnode-id="1380" instrument_node="">

</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">It is ridiculous to compare thawb with the dress of women. We are aware that in the subcontinent women wear something called salwar and kameez. This is something like a trousure and a long shirt. It is NOT considered haraam by anyone whosoever. BUT if they comeout of their homes like that with this beautiful dress, that is something scholars condemn.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The dress is zeenah in itself and thus abayah is used to cover it. (Read the conditions of hijaab I posted above). And there is EXPLIXIT mention of the ruling that the abayah or the hijaab SHOULD cover the feet and should be dragged on the ground as you can read in the hadith I have quoted above.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">If we do not know, we must not pass rulings because they may be used against us in the court of Allah. Because if we are wrong, then we would be misguiding thousands of people with our wrong words. So we must beware.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">We do not look at one hadith and declare something halaal but we look at all that exists for that case and then reconcile all of them. This is what scholars do and make rulings. The hadith of our mother Aaishah bint Abi Bakr is enough to say face and hands can be exempted but not to approve wearing trousures outside of her home.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">And another point: like what Shaikh ibn Uthaimin says, what is haraam in a Muslim country is haraam in non Muslim countries. One must have patience and obey Allah and His Rasool instead of doing haraam. And it is not the case that if a woman does not shake hands with a man in America she will lose her life. So brother, please do not challenge the deen and its rulings.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="872" instrument_node="">Abu Abdul Bari</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">

</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Salaams,</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Brother, I had no idea that salwar/kameez was not worn publicly in the subcontinent.  I'm serious. Here in the US, Muslim women wear them openly everywhere- we see this all the time at places like Walmart or even the halal markets. They even come to the masjid wearing only these colorful outfits. In fact, when I first converted I was given a bad of clothes as several of them were salwar/kameez and I wore them too like I saw everyone else doing. No one here in the US who may have never been to the subcontinent would've ever imagined that they didnt also dress this way publicly "back home". </span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">I mention that because that's why it seemed hypocritical for many brothers to come and ban the idea of pants, when practically every immigrant muslimah we are over here is wearing salwar/kameez out and about. To the observer- what's the difference? </span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">So if you hadn't mentioned that, we wouldn't have known that. And I can guarantee you that I'm probably not the only non-Indo/pak muslimah who understood it the way I had experienced it.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">This is why it's so important for us to share what living in our respective cultures is REALLY like. Here in US, all the salwar/kameez include a type of pants- and all the girls wear it, so how is it wrong? ----that's how we deduce it. Never would've guessed they put an abaya on over that there. I can tell you that in the US, women only wear abayas when it's cold, or as the dress itself if its not open in front- meaning there is nothing else underneath.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">So when people being their questions they are bringing everything they seen and observed and live with, and people are advising not understanding that. I myself used to do the same thing when I first came here before I understood things like moving in with the in laws over there. And I gave "solid Islamic advice" to some of those situations, but I later found out it probably wasn't helpful because I didn't understand the cultural differences. It's Islamic to tell a woman who is being beaten by her family to get out, but in the subcontinent this is so disgraceful to many it's not an option. If one can't appreciate that, then one can't help find a solution that really works.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">So I am just saying we need to ask about what is really going on, get a true understanding of the obstacles and special circumstances one is dealing with, before we can start giving advice. We can't just automatically start with the black and white because many people live with some gray. </span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">-Amy</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">
IslamicAnswers.com Editor</span></p><span data-dcnode-id="803" instrument_node="">

</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Salaams,</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Also just wanted to ask: if wearing salwar/kameez (with the pants) is OK as long as an abaya is worn, why is that not the advice given here? Instead of telling us NOT to wear the pants at all, why not say "sure it's fine so long as you wear an abaya over them?</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Is the technicality in actually wearing them at all? Or in merely being seen in them by non mahrem? Because if they actually cannot be worn, I would imagine that would include salwar/kameez with the abaya being irrelevant. It would also mean only wearing nightgowns to bed, right?</span></p><span data-dcnode-id="755" instrument_node="">

</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Wa Alaikum as Salam,</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="707" instrument_node="">I have read some scholars say that wearing trousures or not is irrelevant if abayah or hijaab is worn. And I knew that there are many women who walk in the west wearing salwar and kamees, without wearing abayah over it </span><img alt="🙂" class="emoji" data-dcnode-id="706" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">I never said wearing pants was haraam per se as you can read in my comments. But, only at her home.  Allah Orders her to conceal her zeenah, when He Says:</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="700" instrument_node="">ولا يبدين زينتهن</span><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">
And not expose their adornment (24:31)</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Culturally, what is Islamic, I have seen people condemn it. Women who drag their abaayah on the ground, I heard women say against them saying they were unclean or something. I told them that these women were actually acting upon the hadith of Rasoolullah Sallallahu Alaihi Wasallam.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">May Allah Help our sisters in the west obey Him and His Rasool more closely. I know they face difficulties. But they should strive to follow, insted of sufficing themselves with what is incomplete. As Allah Says:</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">فَاتَّقُوا اللَّهَ مَا اسْتَطَعْتُمْ وَاسْمَعُوا وَأَطِيعُوا وَأَنْفِقُوا خَيْرًا لِأَنْفُسِكُمْ ۗ وَمَنْ يُوقَ شُحَّ نَفْسِهِ فَأُولَٰئِكَ هُمُ الْمُفْلِحُونَ</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">So  fear Allah as  much  as  you  are  able  and  listen  and  obey  and  spend  [in  the  way  of Allah ];  it  is  better  for  your  selves.  And  whoever  is  protected  from  the  stinginess  of  his soul  -   it  is  those  who  will  be  the  successful.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="683" instrument_node="">Abu Abdul Bari</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
IslamicAnswers.com Editor</span></p><span data-dcnode-id="679" instrument_node="">

</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Dear Mawlana Abdul Bari,...</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">     #1 My challenge was not to Islam but to (in this case you) or anyone who says wearing trousers is haram,. And it seems it still stands. You can not find a hadith or ayat that says wearing trousers is haram.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">#2  You claim that scholars condemn woman who wear the "salwar" and "kamese" out in Public,. Yet you have quoted any of those scholars here ? why is that ?</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">#3 You claim that we do not look at one hadith and proclaim something halal or haram. (Quite right in your words) ,Yet you quote one hadith (that does NOT support your claim), that wearing trousers is haram ? At best may only INDICATE what Aisha and some of the woman sahaba did at the time the ayat of veiling was revealed but does not out line what is haram or halal or what is feminine or what is masculine. </span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">#4 The hadith you indicated also is neither an indication that female clothing is now then limited solely upon what those woman sahaba were wearing at that time.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="610" instrument_node="">#5 The aim of woman veiling is covering her ornaments meaning not revealing her beauty. So long as this condition is met then she is ok. The problem is many literalist only look at the letter of the law and not at what the law is saying. The Prophet sallallahu alayhi wa sallam saw that Asthma was wearing thin clothes hence he kindly advised her that when a woman who reach puberty should cover themselves.</span><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node="">
Again,. In America THOBES are no different then abayas . If you say then the abaya is different simply because of its design then I will tell you that there are many TROUSERS that are specifically designed for Muslim woman. And many Dresses specifically designed for men ? now what shall we do ?</span></p><span data-dcnode-id="606" instrument_node="">

</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">I would also like to point that the hadith "differences of my Ummah is Rahmah" is not Saheeh. I am not sure if it is da'eef or mawdoo' as I heard from the Ulama, but it certainly is not sound in its chain. The Ummah needs to unite, not differ.</span></p><span data-dcnode-id="445" instrument_node="">
