vg data-dcnode-id="2036" id="ellipsis-s" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 10a2 2 0 100-4 2 2 0 000 4zm-5.5 0a2 2 0 100-4 2 2 0 000 4zm11 0a2 2 0 100-4 2 2 0 000 4z" data-dcnode-id="2037" fill="inherit" fill-rule="evenodd" stroke="none"></path></svg></use></svg></button></div></div></nav><span data-dcnode-id="2027"><span data-dcnode-id="2028"><div aria-expanded="false" aria-haspopup="true" aria-hidden="true" class="nova-legacy-c-nav__plus-overflow-mount" data-dcnode-id="2029"></div></span></span></div><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-none" data-dcnode-id="791"><div class="lite-tabs__tab js-target-citations lite-page-visible" data-dcnode-id="1270"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-1-above publication-citations publication-citations--redesign" data-dcnode-id="1271"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-none publication-citations__container" data-dcnode-id="1272"><div class="js-target-citation" data-dcnode-id="1273" id="citations"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-m nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1275" type="bare"><div data-dcnode-id="1282"><div class="nova-legacy-o-stack__item publication-citations__item publication-citations__item--redesign" data-dcnode-id="1930"><div class="nova-legacy-v-citation-item" data-dcnode-id="1931"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1932"><div class="nova-legacy-o-stack__item" data-dcnode-id="1993"><div class="nova-legacy-c-tooltip nova-legacy-c-tooltip--position-above-left nova-legacy-c-tooltip--elevation-none nova-legacy-c-tooltip--color-white nova-legacy-c-tooltip--spacing-m nova-legacy-c-tooltip--luminosity-medium nova-legacy-v-citation-item__context" data-dcnode-id="1994"><div class="nova-legacy-c-tooltip__body" data-dcnode-id="1995"><div class="nova-legacy-c-tooltip__body-content" data-dcnode-id="1998"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1999"><div class="nova-legacy-o-stack__item" data-dcnode-id="2000"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2001"><div class="nova-legacy-o-stack__item" data-dcnode-id="2018"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2019"><div class="nova-legacy-o-stack__item" data-dcnode-id="2020"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="2021"><span data-dcnode-id="2025" instrument_node="">... A significant barrier, impeding the transmission of demands for the humanization of medicine to clinical practice that draw attention to the advantages resulting from taking into account the patient's perspective in diagnostic-therapeutic processes, is difficulties in the realistic translation of such directives into a language that could be understood and accepted by doctors, taking the realities of everyday medical practice into consideration. Among the doctors who try to show practical ways of the humanization of medicine, apart from George Libman Engel, professor of medicine and psychiatry, founder and promoter of the biopsychosocial model of health and illness [12,13], or Arthur Kleinman, U.S. psychiatrist and anthropologist, expert in the scientific and clinical problems of illness experience [14], is Rita Charon, U.S. professor of clinical medicine in internal diseases, literary critic and literature specialist, the founder and promoter of the concept of narrative medicine, which is the object of successful reception and is repeatedly discussed in prestigious medical journals [15]</span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">[16]</span></mark><span data-dcnode-id="2022" instrument_node="">[17][18]. Since the mid-1990s Rita Charon has implemented in New York's Columbia University College of Physicians and Surgeons an educational program intended to popularize narrative competencies in medical care (Program in Narrative Medicine) [19]: she is inspired by a conviction that if clinical practice is more open to patient narratives, this enhances the physician's therapeutic effectiveness.  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2010"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2011"><div class="nova-legacy-o-stack__item" data-dcnode-id="2012"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="2013"><span data-dcnode-id="2017" instrument_node="">... Narrative medicine has been designed as a humanized way of practicing EBM, characterized by stronger recognition of "active listening, close reading and narrative writing". Narrative medicine "considers the stories of patients and their caretakers as integral to the experience of ill health and healing" </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">[16]</span></mark><span data-dcnode-id="2014" instrument_node="">. Attention is focused here on the function of taking into broader account the narratives of patients, which consists in the humanization of biomedicine, with continuing emphasis being placed, however, on medical professionalism [16].  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2002"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2003"><div class="nova-legacy-o-stack__item" data-dcnode-id="2004"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node="">... Narrative medicine "considers the stories of patients and their caretakers as integral to the experience of ill health and healing" [16]. Attention is focused here on the function of taking into broader account the narratives of patients, which consists in the humanization of biomedicine, with continuing emphasis being placed, however, on medical professionalism </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">[16]</span></mark><span data-dcnode-id="2006" instrument_node="">. For that reason, Charon defines her model of humanized medicine as Narrative Evidence Based Medicine (NEBM) [36], firmly stressing the consistency between clinical practice and narrative medicine -"[…] you can practice narrative medicine and still be a doctor!" [19] -and even the complementary nature of the two approaches.  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1996"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1997"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1933"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1934"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item" data-dcnode-id="1935"><div class="nova-legacy-v-publication-item__body" data-dcnode-id="1950"><div class="nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m" data-dcnode-id="1951"><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1989"><div class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title" data-dcnode-id="1990"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/330506313_Rita_Charon%27s_concept_of_narrative_medicine_as_a_strategy_for_humanization_of_clinical_transplantology"><span data-dcnode-id="1992" instrument_node="">Rita Charon’s concept of narrative medicine as a strategy for humanization of clinical transplantology</span></a></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1976"><div class="nova-legacy-v-publication-item__meta" data-dcnode-id="1977"><div class="nova-legacy-v-publication-item__meta-left" data-dcnode-id="1986"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type" data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Article</span></span></div><div class="nova-legacy-v-publication-item__meta-left" data-dcnode-id="1983"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__fulltext" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Full-text available</span></span></div><div class="nova-legacy-v-publication-item__meta-right" data-dcnode-id="1978"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data" data-dcnode-id="1979"><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="1980"><span class="" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Jan 2016</span></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1956"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="1957"><li class="nova-legacy-e-list__item" data-dcnode-id="1967"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Michal-Skrzypek-2"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1969"><span class="lite-person-inline-item__image" data-dcnode-id="1972"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1973"><span data-dcnode-id="1975" instrument_node=""> </span><img alt="Michał Skrzypek" class="lite-image" data-dcnode-id="1974" data-src="https://i1.rgstatic.net/ii/profile.image/1112922726105088-1642352863398_Q64/Michal-Skrzypek-2.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Michał Skrzypek</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1958"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Katarzyna-Kowal-2"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1960"><span class="lite-person-inline-item__image" data-dcnode-id="1963"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1964"><span data-dcnode-id="1966" instrument_node=""> </span><img alt="Katarzyna Kowal" class="lite-image" data-dcnode-id="1965" data-src="https://i1.rgstatic.net/ii/profile.image/346036397723648-1459512914266_Q64/Katarzyna-Kowal-2.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Katarzyna Kowal</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1952"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1953"><span class="js-target-abstract-626c9cd2b817c lite-page-hidden" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">In the paradigm of Evidence-Based Medicine (EBM) the results of experimental randomized clinical trials (RCT) are shown as the basis for defining medical procedure standards, with a simultaneous reservation that medical decisions have to take into account the specificity of clinical situation and the patient's individual values and preferences. Rita Charon's concept of narrative medicine, which suggests the broad introduction of illness narratives into clinical practice, can be perceived as a realistic response to the postulate of the humanization of EBM, enabling clinicians not only to reveal the patients' highly-regarded values and preferences in order to take them into account in the decision-making process, but also allowing doctors to look into the non-medical problems of the patients. The possibilities of applying the approach in question in clinical medicine and the consequent benefits have been illustrated using the example of trials concerning the illness narratives of recipients of upper limb transplants.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1936"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1937"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1938"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1939"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1940"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1946"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1947" href="https://c gacy-c-tooltip__body-content" data-dcnode-id="1910"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1911"><div class="nova-legacy-o-stack__item" data-dcnode-id="1912"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1913"><div class="nova-legacy-o-stack__item" data-dcnode-id="1922"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1923"><div class="nova-legacy-o-stack__item" data-dcnode-id="1924"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">... Ponadto zaczęto dostrzegać ograniczenia nauk biomedycznych, a także konieczność poszukiwania różnorodnych metod radzenia sobie z chorobą [1]. Przyjęto, że doświadczenia pacjentów i ich bliskich stanowią integralny element zarówno utrzymania zdrowia, jak i reagowania na schorzenie czy niepełnosprawność </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">[4]</span></mark><span data-dcnode-id="1926" instrument_node="">.  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1914"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1915"><div class="nova-legacy-o-stack__item" data-dcnode-id="1916"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1917"><span data-dcnode-id="1921" instrument_node="">... Medycyna narracyjna opiera się na analizie wielu danych o charakterze jakościowym oraz wykorzystaniu zasobów medycyny opartej na dowodach (EBM, Evidence Base Medicine; EBNP, Evidence Based Nursing Practice) [11,12]. Podstawowym założeniem jej praktykowania jest połączenie historii pacjenta z opartą na faktach praktyką kliniczną, pozwala to na wzrost skuteczności terapeutycznej i opiekuńczej przy równoczesnym wzmocnieniu poczucia indywidualności pacjenta </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">[4,</span></mark><span data-dcnode-id="1918" instrument_node="">13,14]. Rita Charon proponuje stworzenie nowej koncepcji medycyny, którą określa jako Narrative Evidence-Based Medicine (NEBM), opartej na założeniu, że tradycyjne EBM i medycyna narracyjna wzajemnie się uzupełniają, przynosząc korzyści terapeutyczne. Otwartość na humanistyczne aspekty choroby oraz pozyskiwanie dzięki narracji wielu istotnych danych, które mogłyby zostać pominięte w tradycyjnym wywiadzie klinicznym, niejednokrotnie pozwalają na szybsze i właściwsze postawienie diagnozy [15].  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1908"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1909"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1865"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1866"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item" data-dcnode-id="1867"><div class="nova-legac .rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Kathy Day</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1803"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Avi-Parush"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1805"><span class="lite-person-inline-item__image" data-dcnode-id="1808"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1809"><span data-dcnode-id="1811" instrument_node=""> </span><img alt="Avi Parush" class="lite-image" data-dcnode-id="1810" data-src="https://i1.rgstatic.net/ii/profile.image/272459186307073-1441970740022_Q64/Avi-Parush.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Avi Parush</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1797"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1798"><span class="js-target-abstract-626c9cd2b8659 lite-page-hidden" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Background: 
Recent research has suggested that using electronic health records (EHRs) can negatively impact clinical reasoning (CR) and interprofessional collaborative practices (ICPs). Understanding the benefits and obstacles that EHR use introduces into clinical activities is essential for improving medical documentation, while also supporting CR and ICP.

Methods: 
This qualitative study was a longitudinal pre/post investigation of the impact of EHR implementation on CR and ICP at a large pediatric hospital. We collected data via observations, interviews, document analysis, and think-aloud/-after sessions. Using constructivist Grounded Theory's iterative cycles of data collection and analysis, we identified and explored an emerging theme that clinicians described as central to their CR and ICP activities: building the patient's story. We studied how building the patient's story was impacted by the introduction and implementation of an EHR.

Results: 
Clinicians described the patient's story as a cognitive awareness and overview understanding of the patient's (1) current status, (2) relevant history, (3) data patterns that emerged during care, and (4) the future-oriented care plan. Constructed by consolidating and interpreting a wide array of patient data, building the patient's story was described as a vitally important skill that was required to provide patient-centered care, within an interprofessional team, that safeguards patient safety and clinicians' professional credibility. Our data revealed that EHR use obstructed clinicians' ability to build the patient's story by fragmenting data interconnections. Further, the EHR limited the number and size of free-text spaces available for narrative notes. This constraint inhibited clinicians' ability to read the why and how interpretations of clinical activities from other team members. This resulted in the loss of shared interprofessional understanding of the patient's story, and the increased time required to build the patient's story.

Conclusions: 
We discuss these findings in relation to research on the role of narratives for enabling CR and ICP. We conclude that EHRs have yet to truly fulfill their promise to support clinicians in their patient care activities, including the essential work of building the patient's story.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1781"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1782"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1783"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1784"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1785"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1791"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/282451766_The_EHR_and_Building_the_Patient%27s_Story_A_Qualitative_Investigation_of_How_EHR_Use_Obstructs_a_Vital_Clinical_Activity"><span class="nova-legacy-c-button__label" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1786"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--wid pan class="nova-legacy-v-person-inline-item" data-dcnode-id="1727"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">J Donald Boudreau</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1720"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Yvonne-Steinert-38328040"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1722"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Yvonne Steinert</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1714"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1715"><span class="js-target-abstract-626c9cd2b8d3f lite-page-hidden" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Background: 
Narrative medicine is increasingly popular in undergraduate medical curricula. Moreover, although faculty are expected to use narrative approaches in teaching, few faculty development learning activities have been described. In addition, data on the impact of faculty development initiatives designed to teach narrative are limited, and there is a paucity of tools to assess their impact.

Aims: 
To assess the impact and outcomes of a faculty development workshop on narrative medicine.

Methods: 
Two groups of clinical teachers were studied; one group had already attended a half-day narrative medicine workshop (N = 10) while the other had not yet attended (N = 9). Both groups were interviewed about their uses of narrative in teaching and practice. Additionally, the understanding of a set of narrative skills was assessed by first viewing a video of a narrative-based teaching session followed by completion of an 18-item assessment tool.

Results: 
Both groups reported that they used narrative in both their teaching and clinical practice. Those who had attended the workshop articulated a more nuanced understanding of narrative terms compared to those who had not yet attended.

Conclusion: 
This study is one of the first to describe measureable impacts of a faculty development workshop on narrative medicine.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1698"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1699"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1700"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1701"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1702"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1708"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/230767399_Assessing_a_faculty_development_workshop_in_narrative_medicine"><span class="nova-legacy-c-button__label" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1703"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1704" type="button"><span class="nova-legacy-c-button__label" data-dcnode-id="1705"><span class="js-lite-click" data-dcnode-id="1706" data-lite="{&quot;clic n></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1618"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Carmi-Margolis"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1620"><span class="lite-person-inline-item__image" data-dcnode-id="1623"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1624"><span data-dcnode-id="1626" instrument_node=""> </span><img alt="Carmi Z Margolis" class="lite-image" data-dcnode-id="1625" data-src="https://i1.rgstatic.net/ii/profile.image/272717018562585-1442032212666_Q64/Carmi-Margolis.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Carmi Z Margolis</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1612"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1613"><span class="js-target-abstract-626c9cd2b8ea7 lite-page-hidden" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Global health education (GHE) at undergraduate medical institutions has expanded significantly over the last 30 years, but many questions remain regarding the best practices for the development and implementation of global health programs.
To identify key themes essential to the development of GHE programs.
We discuss five themes relevant to GHE in the context of existing literature and practice.
The following themes are essential to the development of GHE programs: the definition and scope of GHE, student competencies in global health, the challenges and opportunities associated with inter-institutional relationships, principles for GHE student placements, and the evaluation of GHE programs. We place these themes in the context of current literature and practice, and provide practical guidance on how these themes might be successfully implemented by institutions seeking to develop or refine GHE programs.
Institutions developing or evaluating GHE programs should focus on these themes as they build their global health curricula.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1596"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1597"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1598"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1599"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1600"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1606"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/230566455_Guiding_principles_for_the_development_of_global_health_education_curricula_in_undergraduate_medical_education"><span class="nova-legacy-c-button__label" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1601"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1602" type="button"><span class="nova-legacy-c-button__label" data-dcnode-id="1603"><span class="js-lit ine-item" data-dcnode-id="1550"><span class="lite-person-inline-item__image" data-dcnode-id="1553"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1554"><span data-dcnode-id="1556" instrument_node=""> </span><img alt="Jill Elizabeth Thistlethwaite" class="lite-image" data-dcnode-id="1555" data-src="https://i1.rgstatic.net/ii/profile.image/272482254979072-1441976240009_Q64/Jill-Thistlethwaite.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Jill Elizabeth Thistlethwaite</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1542"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1543"><span class="js-target-abstract-626c9cd2b80e6 lite-page-hidden" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Background: Empathy and compassion are important in healthcare delivery, and are necessary qualities in medical students.
Aims: To explore medical students', patients' and educators' perceptions of what affects empathy and the expression of compassion; and to address gaps in knowledge, attitudes and skills on how education affects empathy and the expression of compassion in medical students.
Methods: The seven steps by Noblit and Hare were used for this meta-ethnography. Databases were searched for studies in English, published from 2007 to 2017 with outcomes of empathy and compassion. Key themes and concepts were identified, and accounts from the studies were used to build interpretations.
Findings: Thirty-three qualitative studies were included and four main themes were derived: seeing the patient as a person; appreciating the elements of empathy and compassion; navigating in the training environment; and being guided by ideals. Interactions between the patient, the medical student and training environment which affect the development of empathy and compassion are illustrated in a conceptual model.
Conclusions: This meta-ethnography extends our understanding of how medical education affects the expression of empathy and compassion in medical students. The results provide important considerations for medical educators and faculty developers in further developing and improving medical curricula.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1526"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1527"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1528"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1529"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1530"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1536"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/335045325_How_does_medical_education_affect_empathy_and_compassion_in_medical_students_A_meta-ethnography_BEME_Guide_No_57"><span class="nova-legacy-c-button__label" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1531"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c- DUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Dominic Harmon</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1477"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1478"><span class="js-target-abstract-626c9cd2b8287 lite-page-hidden" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Background: 
More patients are surviving breast cancer; however, many complain of persistent pain, which significantly impacts on their lives. Studies have predominantly examined risk factors alone. This mixed methods study will systematically compare prospective and retrospective studies of chronic pain following breast cancer treatment. A wider scope than risk factors alone is included in a narrative review element.

Results: 
Common risk factors and themes were identified, and these were compared with some of the retrospective literature available. Several common themes arose in the literature such as common patient demographics, perioperative and postoperative management, treatment modalities and psychological factors. The variation in disease severity, treatment mode and symptom progression between participants in the studies made it difficult to draw conclusions from both the prospective and retrospective literature.

Conclusion: 
Chronic pain is common after breast cancer. The literature has focused predominantly on risk factors for the development of chronic pain. It may be more beneficial to focus on chronic pain mechanisms and to consider the patient's narrative and experience of their illness and how this has impacted on the perception and intensity of persistent pain. A shared understanding between the patient and professional is likely to have more beneficial outcomes.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1461"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1462"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1463"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1464"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1465"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1471"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/322938691_Breast_cancer_and_chronic_pain_a_mixed_methods_review"><span class="nova-legacy-c-button__label" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1466"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-b t_node="">Carla Mendes Pereira</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1370"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1371"><span class="js-target-abstract-626c9cd2b887f lite-page-hidden" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Background: 
Narrative reasoning has been presented as a core component of the health professionals' competencies.

Aim of the study: 
This study aimed to explore the students' perspectives about the contribution of a narrative reasoning course to promote patient-centred practice.

Methods: 
An interpretative phenomenological analysis (IPA) was undertaken through focus groups. Eighteen volunteer final year students participated in three focus groups. Data analysis followed the IPA principles.

Findings: 
Three themes emerged: (1) "developing distinctive competencies"; (2) "shifting students' focus" and (3) "challenging students' professional identity". In the first theme, students distinguished their capability to better understand patients' experiences and needs and to be aware of the importance of a collaborative therapeutic relationship. In the second theme, students emphasized a shift from themselves as clinicians towards their patients. Finally, in the third theme participants shared the perspective that they have developed a different clinical profile, and that their reasoning and clinical actions have changed.

Conclusions: 
Students recognized the contribution of the course in developing competencies to facilitate patient-centred practice. Future research is needed to inform lecturers on how to best integrate narrative reasoning within the physiotherapy undergraduate curricula.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1354"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1355"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1356"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1357"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1358"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1364"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/259292896_A_narrative_reasoning_course_to_promote_patient-centred_practice_in_a_physiotherapy_undergraduate_programme_A_qualitative_study_of_final_year_students"><span class="nova-legacy-c-button__label" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1359"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-butt span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">S. Caccia</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1305"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1306"><span class="js-target-abstract-626c9cd2b89f6 lite-page-hidden" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Medicine is a collection of science, technology and human values. Nowadays, the most modern paradigm of medicine is based on the combination of man's vulnerability and his need for healthcare, both in a technical-pharmacological sense, but more importantly, with regard to human relations. Of course, the solidarity perspective must represent the strong relational foundation of the doctor-patient relationship, considering that this perspective is now a clear indicator of the civilization level of a nation. The notion of healthcare must therefore be understood in its twofold and inseparable meaning: firstly, the act of "curing" and secondly, the act of "taking care of". In Italy, the term for both of these acts is unique ("curare" meaning to treat, to cure, to care for). However, it is necessary to encompass all meanings as they are inseparable. The responsibility of the doctor is, therefore, to treat, assist, understand and to be at the service of each human being in their interest and in their centrality.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1289"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1290"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-d 35"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="1036"><li class="nova-legacy-e-list__item" data-dcnode-id="1037"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Shmuel-Reis-2"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1039"><span class="lite-person-inline-item__image" data-dcnode-id="1042"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1043"><span data-dcnode-id="1045" instrument_node=""> </span><img alt="Shmuel Reis" class="lite-image" data-dcnode-id="1044" data-src="https://i1.rgstatic.net/ii/profile.image/278598968725523-1443434578732_Q64/Shmuel-Reis-2.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Shmuel Reis</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1031"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1032"><span class="js-target-abstract-626c9cd2b943f lite-page-hidden" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Evidence based medicine and narrative based medicine rarely meet, and they may conflict, 1 2 but in clinical care they are complementary.3–5 Some attempts to integrate the two approaches have not considered the doctor's story, which is often critical to understanding a case. 6 7

This paper tries to bridge gaps between a patient's and doctor's narratives and the evidence. It is the story of a patient in our practice (see box) who has produced written narratives about her illness and shared them with her family physician (SR). We use the narratives to decide on the best evidence based treatment for paroxysmal atrial fibrillation after corrected tetralogy of Fallot.

We searched Medline between December 1999 and May 2000 with the keywords atrial fibrillation (paroxysmal), tetralogy of Fallot, atrial arrhythmia, anticoagulation, primary care, family medicine, general practice, and ambulatory medicine. We also searched http://www.goldenhour.co.il/ (an Israeli website that includes evidence based medicine).

We found no important evidence on the treatment of paroxysmal atrial fibrillation plus tetralogy of Fallot. Our discussion is based on the evidence available on paroxysmal atrial fibrillation alone.

Risk factors for thromboembolism in paroxysmal atrial fibrillation are cumulative.8–13 In patients without risk factors who are not treated for thromboembolism, the annual risk of stroke is about 1%. For patients at low risk of thromboembolism, aspirin or no drug is recommended. 8 11–14 The presence of one risk factor puts patients at moderate risk of thromboembolism (2-5% annual risk of stroke), and the treatment recommendation is aspirin or warfarin. Patients at high risk—with a 6-12% annual risk of stroke—should be given warfarin. Articles based in primary care lean towards less aggressive diagnostic and therapeutic approaches.15–18

a-data" data-dcnode-id="952"><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="957"><span class="" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Jan 1993</span></span></li><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="953"><span class="" data-dcnode-id="954"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/journal/Family-Systems-Medicine-0736-1718"><span data-dcnode-id="956" instrument_node="">Fam Syst Med</span></a></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="942"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="943"><li class="nova-legacy-e-list__item" data-dcnode-id="944"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Johanna-Shapiro-2163492274"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="946"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Johanna Shapiro</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="938"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="939"><span class="js-target-abstract-626c9cd2b953f lite-page-hidden" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The classic example of narrative in medicine is the patient history or medical interview. Narratives have the power to restore personal harmony, reduce anxiety and guilt, and give a patient self-coherence. The 4 traditional elements of literature (character, plot, theme, and style) all have implications for the doctor's understanding of the patient. The healing goal of a narrative lies in the patient's shift from harmful to advanced and psychologically useful mythic structures. Sometimes there is a need to help the patient develop alternative stories that more accurately reflect his/her life. The doctor must evaluate the story in terms of its verisimilitude, narrative indeterminacy, narrative fidelity, usefulness to the patient, and empathic resonance. All levels of interpretation (literal, moral, allegorical, and anagogical) must be used to clarify the doctor–patient encounter. (PsycINFO Database Record (c) 2012 APA, all rights reserved)</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="922"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="923"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="924"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="925"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="926"><div class="nova-legacy-c-button-group__item" data-dcnode-id="932"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-pu gg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Shmuel Reis</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="833"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Jack-Medalie-2001745813"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="835"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Jack Medalie</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="827"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="828"><span class="js-target-abstract-626c9cd2b97e3 lite-page-hidden" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Despite the advances in technology, information transmission and evidence-based medicine, the role of the patient's story is still a key to effective medical care. This paper examines the roles of narrative in medicine with particular emphasis on the narrative world of the primary care provider. The focus of this article is on the transforming power of stories and their use in clinical work, teaching, research, and in physicians' personal and professional lives. An organizing model is proposed that utilizes a combination of individual patient narratives, best evidence, and provider narratives. Projections for future threats to narrative medicine and future developments in the field are formulated. (PsycINFO Database Record (c) 2012 APA, all rights reserved)</span></span>  nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Article</span></span></div><div class="nova-legacy-l-flex__item" data-dcnode-id="668"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Full-text available</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="664"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/221721081_Positive_Wrongdoings_Reading_Doctors%27_Narratives_on_Ordinary_Ethics"><span data-dcnode-id="666" instrument_node="">Positive Wrongdoings: Reading Doctors' Narratives on Ordinary Ethics</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="658"><span data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">September 2011</span></span><span data-dcnode-id="661" instrument_node=""> · </span><span data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Literature and Medicine</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="648"><li class="nova-legacy-e-list__item" data-dcnode-id="649"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="650"><span class="lite-person-inline-item__image" data-dcnode-id="654"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="655"><span data-dcnode-id="657" instrument_node=""> </span><img alt="Einat Avrahami" class="lite-image" data-dcnode-id="656" data-src="https://i1.rgstatic.net/ii/profile.image/278788047949827-1443479658413_Q64/Einat-Avrahami-2.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="651"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Einat-Avrahami-2"><span data-dcnode-id="653" instrument_node="">Einat Avrahami</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="642"><span data-dcnode-id="647" instrument_node="">The ethics of everyday life, the morality of the ordinary, is the ‘place’ in which medical ethics is enacted [. . .] The case studies filling ethics textbooks do not typically address the moral dynamics of the everyday care of patients. Extraordinary decisions are not routine. An ethics of the ordinary is also required.1
Doctors’ narratives about their experiences of “the morality of the </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="645" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626c9cd2b9df0&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="646" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626c9cd2b9df0" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node=""> ordinary” hit on major questions that have troubled ethicists in contemporary philosophy and ethical literary criticism in the last two decades and that deeply concern medical educators and practicing physicians in their endeavor to foster medical professionalism in the day-by-day care of patients. How can one accommodate moral ideals, understood here as the duties of medical professionalism, with the emotional messiness of ordinary living and the harried everyday reality of medical practitioners? Who has moral authority in the clinical setting? Indeed, what do we mean when we talk about caregivers’ moral authority and responsibilities? How can doctors best balance the principles of beneficence and patient autonomy in their relationships with patients? And what images of the “good doctor” does medical education conjure and hope to instill in the minds and hearts of young students and residents?
In their narrated accounts of ethical engagements, the doctors whose autobiographical stories I shall analyze in this essay place their moral choices in concrete, dense contexts that invoke what Martha Nussbaum calls “the indeterminacy, the sheer difficulty of actual human deliberation.”2 Because their narratives are more complex and more closely resemble the lived experience of practicing physicians than the usually terse “cases” in bioethics textbooks, those narrative can function as valuable contributors and mediators of shared moral language and practice toward the development of ordinary medical ethics. As Cheryl Mattingly recognized, caregivers’ narratives are more than a mode of structuring raw clinical experience “after-the-fact”: they are bound with experience “in a homologous relationship.”3 Further than that, these narratives not only depict instances of daily moral engagement but also embody a handier and more natural way to reflect upon and understand moral issues than the top-down models of formal deliberation promoted by the prevailing theoretical discourse of bioethical principles. Indeed, if these “ethics narratives” provide a process of clarification of and partial answers to the weighty questions mentioned above, they do so by inviting their audience to think with their stories rather than simply to think about them.4
The narratives I offer below, and my approach to reading them, are the product of years of engagement in narrative theory, research, and the pedagogy of narrative medicine.5 For the last seven years, I have enjoyed the great privilege of facilitating weekly, semester-long narrative medicine workshops and teaching courses in literature and medicine to different groups of healthcare professionals and learners, including family physicians and residents, nurses, medical students, and medical clowns, in various academic institutions in Israel. Like other literary critics who work with caregivers today in Europe, Canada, and the United States, I have benefited from stimulating interaction with the founders of the narrative medicine movement at Columbia University. Most pertinent to my teaching experience and to this discussion is Rita Charon’s model of attention-representation-affiliation, as discussed in chapter seven of her book, Narrative Medicine: Honoring the Stories of Illness.6 The model frames every course and individual conference workshop on narrative medicine that I facilitate and serves as a conceptual and pragmatic point of reference that anchors ongoing class exercises in close reading, narrative writing, and learning to respond to participants’ written accounts. While the readings and topics assigned to the classes do change, and the variety of participants and physicians who co-facilitate the workshops undoubtedly shapes the dynamics of and meanings that emerge in each class, we consistently try to fully attend to the demands of the narrative voices and forms by representing experience in writing and by accommodating our resources of autobiographical memory and other categories of emotional and professional affiliation.
Charon’s model is sturdy and sufficiently inclusive to support narrative therapy ideas such as the externalization of dominant “problem-saturated” descriptions or stories.7 It also serves to mobilize the literary critical practice of...</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/221721081_Positive_Wrongdoings_Reading_Doctors%27_Narratives_on_Ordinary_Ethics"><span data-dcnode-id="641" instrument_node="">View full-text</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="598"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="599"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="600"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="601"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="629"><div class="nova-legacy-l-flex__item" data-dcnode-id="633"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Article</span></span></div><div class="nova-legacy-l-flex__item" data-dcnode-id="630"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Full-text available</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="626"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/51493273_Illness_narratives_Reliability_authenticity_and_the_empathic_witness"><span data-dcnode-id="628" instrument_node="">Illness narratives: Reliability, authenticity and the empathic witness</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="620"><span data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">July 2011</span></span><span data-dcnode-id="623" instrument_node=""> · </span><span data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Medical Humanities</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="610"><li class="nova-legacy-e-list__item" data-dcnode-id="611"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="612"><span class="lite-person-inline-item__image" data-dcnode-id="616"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="617"><span data-dcnode-id="619" instrument_node=""> </span><img alt="Johanna Shapiro" class="lite-image" data-dcnode-id="618" data-src="https://i1.rgstatic.net/ii/profile.image/277753900355593-1443233098480_Q64/Johanna-Shapiro.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="613"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Johanna-Shapiro"><span data-dcnode-id="615" instrument_node="">Johanna Shapiro</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="604"><span data-dcnode-id="609" instrument_node="">Several scholarly trends, such as narrative medicine, patient-centered and relationship-centered care, have long advocated for the value of the patient's voice in the practice of medicine. As theories of textual analysis are applied to the understanding of stories of illness, doctors and scholars have the opportunity to develop more nuanced and multifaceted appreciation for these accounts. We </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="607" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626c9cd2b9fea&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="608" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626c9cd2b9fea" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node=""> realize, for example, that a patient's story is rarely "just a story," but is rather the conscious and unconscious representation and performance of intricate personal motives and dominant meta-narrative influences. Overall, this complexifying of narrative is beneficial as it reduces readers' and listeners' naïve assumptions about reliability and authenticity. However, the growing body of scholarship contesting various aspects of personal narratives may have the unintended effect of de-legitimizing the patient's voice because of concerns regarding its trustworthiness. Further, the academy's recent focus on transgressive, boundary-violating counternarratives, while meant to right the balance of what constitutes acceptable, even valuable stories in medicine, may inadvertently trivialize more conventional, conformist stories as inauthentic. While acknowledging the not inconsiderable pitfalls awaiting the interpreter of illness narratives, I argue that ultimately, physicians and scholars should approach patient stories with an attitude of narrative humility, despite inevitable limits on reliability and authenticity. While critical inquiry is an essential part of both good clinical practice and scholarship, first and foremost both types of professionals should respect that patients tell the stories they need to tell.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/51493273_Illness_narratives_Reliability_authenticity_and_the_empathic_witness"><span data-dcnode-id="603" instrument_node="">View full-text</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="564"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="5 class="lite-image" data-dcnode-id="526" data-src="https://i1.rgstatic.net/ii/profile.image/275160368414721-1442614752120_Q64/Ronald-Epstein.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="521"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Ronald-Epstein"><span data-dcnode-id="523" instrument_node="">Ronald M Epstein</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="512"><span data-dcnode-id="517" instrument_node="">Clinical clerkship directors and faculty undertake the challenge of teaching patient-centered communication to students who face the enormous doctor-centered task of learning diagnostic medicine. The authors examined students' written reactions to the narrative exercise, which, drawing from narrative medicine and narrative therapy, challenges students to be more patient-centered by writing a </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="515" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626c9cd2ba47e&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="516" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626c9cd2ba47e" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node=""> patient's life story and sharing it with that patient.
During one-half of an academic year (2008-2009), the authors used qualitative methods to explore the range of medical student experiences with the narrative exercise in the psychiatry clerkship.
During the study period, 46 medical students completed the exercise, and 44 (96%) submitted 367 comments for the research team to analyze. Four broad categories emerged: (1) communication, (2) insight, (3) hope, and (4) mixed or negative reactions. The most common theme was improved communication, which comprised the subcategories of enhanced active listening, opening up, and relationship building. Improved insights included student insights into their patients, as well as the facilitation of patient insights into themselves, especially regarding their own strengths and relationships. The exercise was well received by students: Only five comments were categorized as negative, and all of these related to difficulties selecting patients.
Students reported many examples of improved patient-centered communication facilitated by the exercise. The narrative exercise may also promote a greater understanding of patients as complete human beings rather than diagnostic entities. The approach may be useful in educational settings beyond the psychiatry clerkship.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/49630504_Qualitative_Analysis_of_Medical_Student_Impressions_of_a_Narrative_Exercise_in_the_Third-Year_Psychiatry_Clerkship"><span data-dcnode-id="511" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="474"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="475"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="476"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="477"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="499"><div class="nova-legacy-l-flex__item" data-dcnode-id="503"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="504"><span data-dcnode-id="505" in
