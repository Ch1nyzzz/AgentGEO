</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Additionally, the authors may have missed several useful opportunities to ask more detailed questions about client perceptions of externalizing conversations. Particularly in the case of the coded theme of developing personal agency, there are quotes that suggest the clients noticed the various ways the therapists and reflecting teams helped them assume responsibility in their lives. While the clients may not have spoken to it directly, or maybe the authors missed it, it has been this study’s observation that the narrative literature suggests that externalizing is a practice useful for, among other things, empowering clients with a heightened sense of personal agency. Assuming such externalizing practices were used during the course of this investigation, a major therapeutic aspect of externalizing practices may have been overlooked. Moreover, even if clients offered no comment in the interview on externalizing practices that aided in developing personal agency, this does not mean they were unaware of it. They simply might not have been asked the right question to elicit a response. Again, the authors designed the study to ask four broad questions about clients’ experience in narrative therapy, as well as “subsequent questions that could be used to facilitate a rich description of the experience” (O’Connor, Meakes, Pickering, &amp; Schuman, 1997, p.483). A suitable question might have better elicited clients’ experience of externalizing as part of the process of developing personal agency.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">O’Conner and associates published a later study evaluating therapists’ experience as part of a narrative therapy team (O’Connor, Davis, Meakes, Pickering, &amp; Schuman, 2004). The researchers this time sought to answer the question, “What are therapists’ experiences of narrative therapy?” The study’s purpose was to discover narrative therapists’ perceptions and meanings of their practice of therapy.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">As part of their literature review, the authors note that, “the literature on narrative therapy includes qualitative research, case studies, as well as personal and theoretical reflections. No quantitative studies were found” (O’Connor, Davis, Meakes, Pickering, &amp; Schuman, 2004, p.24).</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">The study was comprised of eight narrative therapists who belonged to a narrative team in an outpatient clinic. These therapists were observed and interviewed. Again, O’Conner and his associates utilized an ethnographic methodology. Interview sessions were audio recorded and the transcripts were coded and clustered according to agreed-upon themes and concepts. The themes include a sense of success in reducing the clients’ problems as well as some limitations of narrative therapy.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">This study did not discuss externalizing practices in a direct or thorough manner. However, externalizing conversations were mentioned under the larger themes of successfully reducing presenting problems and co-constructing alternative stories. The authors note that all eight participating therapists in the study found externalizing conversations helpful in their effort to co-construct alternative stories with their clients.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">What was particularly interesting was that all of the therapists discussed how externalizing conversations promoted personal agency among family members by situating the problem outside of the client/family. This is somewhat of a contrast to the findings of O’Conner et al. in their 1997 study (discussed earlier) on clients’ perceptions of therapy. In that study, the authors report that personal agency was mentioned more by the clients as an important aspect of the therapy than externalizing conversations. However, in the study of therapists’ experiences, externalizing appears to be given greater prominence for a therapeutic role. Why is this? Do therapists put more emphasis on the experience and effects of externalizing conversations? Do clients sometimes not perceive the effects of externalizing practices, even when they wholeheartedly engage in them? O’Conner et al. don’t address these questions. In fact, the discussion of externalizing practices in their study and findings is brief. Their study’s focus is a broader look at therapists’ perceptions and meanings of their experience. The authors concede in their conclusion that, “More research needs to be done, research that moves beyond the beginning stage” (O’Connor, Davis, Meakes, Pickering, &amp; Schuman, 2004, p.37).</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">In another study, Fristad, Gavazzi, and Soldano (1999) used a psychoeducational model of intervention with mood-disordered adolescents and their families. What was unique about this study was how the model of intervention incorporated methods of narrative-inspired externalizing practices. These practices were used to assist clients in differentiating the effects of a mood disorder diagnosis from their view of themselves, and to improve communication between clients and their families and between family members and therapists (Fristad, Gavazzi, &amp; Soldano, 1999).</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">While this study poses some exciting ideas about the uses of externalizing conversations, the research conducted by the authors is weak in its assessment of the helpful qualities of externalizing. They refer to prior research that suggests that psychoeducational programs are effective in working with mood disorders. But unfortunately, this prior research did not encompass the additional use of externalizing practices. The authors’ contention that incorporating externalizing was beneficial is based primarily on a limited set of family case studies (Fristad, Gavazzi, &amp; Soldano, 1999).</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Archer (1997) also uses a case study method to promote the use of externalizing practices with individuals who have experienced natural disasters. The author uses a case example of a child who experienced the effects of a tornado. The author contends that the creative process of externalizing helped the child reclaim a sense of competence and cope with loss and vulnerability. Archer also links the externalizing approach to the more researched trauma work of Critical Incident Stress Debriefing (CISD). He notes that CISD “utilizes a reevaluation and reviewing process not unlike Michael White’s externalization format” (p.80). Archer also makes the connection that, “In the treatment of trauma, particularly the victims of natural disasters, the relaxation of rigidified trauma presuppositions provided by the externalizing process allows for space into the healing world of alternative self views” (p.80). The author concludes by noting that further research is warranted into the use of externalization as a debriefing and therapy tool for survivors of natural disasters.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Besa (1994) conducted a study to assess the effectiveness of narrative therapy in reducing parent/child conflicts. Six families comprised the study. Each was screened for parent/child conflict. A single-case methodology was used that employed a treatment package strategy that allowed for outcomes to be measured (for instance, by measuring reductions in targeted behavior/symptoms). The results were evaluated using three multiple baseline designs. All families participated in a form of narrative-inspired therapy that shared common approaches including externalization, relative influence questions, identifying unique outcomes, and assigning between-session tasks. According to Besa, the study’s findings suggest that narrative therapy was effective in reducing parent/child conflict, and may therefore be applicable to families experiencing similar parent/child problems.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Besa mentions externalizing conversations as a prominent and unique component of narrative therapy. However, he doesn’t attempt to account for the therapeutic value or non-value these externalizing practices had on the therapy. As with other studies, he chose to evaluate collective common elements of narrative therapy rather than isolate the therapeutic effects of specific narrative practices. In his concluding remarks, the author offers that, “Another area of future research is modifying this design to discover the relative effectiveness of each narrative technique. This could result in refining narrative therapy so that a given problem could receive the optimum balance of interventions” (Besa, 1994, p.324). He further proposes that specific types of single-case research designs can accomplish such a task (Besa, 1994).</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">In another study involving the use of externalizing conversations, Knight et al. (2003) reported the qualitative research findings from a preliminary study of adolescents with type-1 diabetes. Twenty adolescents with poorly controlled diabetes were allocated to a six week / one hour per week group therapy regime. Therapy consisted of a combination of motivational interviewing and externalizing conversations. The participants completed semi-structured questionnaires assessing their perceptions and management of diabetes before, immediately following, and 6 months after the intervention. The questionnaires were analyzed using content analysis. Similar to other studies, the authors did not isolate the effects of externalizing conversations. They instead spoke more broadly how the combined treatment assisted the participants in dealing more openly with the effect of diabetes and how the condition became viewed as less restrictive on their lives. They tentatively concluded that their group intervention strategy of motivational interviewing and externalizing conversations “led to an adaptive shift in illness perception” (Knight et. al. 2003, p.149). Even at the 6 month follow-up, the participants reported that diabetes was having a less restrictive influence on their lifestyle and that self-care behaviors were more common than prior to group therapy.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Goddard, Lehr, and Lapadat (2000) conducted a study that utilized focus groups comprised of parents of children who had been diagnosed with disabilities. Stories were collected in open-ended focus groups using criteria derived from what they viewed as constructivist principles of narrative therapy. The authors audiotaped the focus group sessions and used a thematic analysis grounded in a critical constructivist perspective to analysis the transcripts. The authors concluded that constructivist principles implicit within narrative therapy were used by these parents in coming to terms with their beliefs and experiences of their children who had been labeled as disabled. Moreover, they believe that the theoretical orientation of narrative therapy is conducive to the counseling and support needs of parents of children labeled as disabled.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Oddly, the authors never mention externalizing conversations by name, but they refer directly to it. For example, they report that, “the ideas that problems are not within people, and that parents’ voices make key contribution to discourse on disability, are particularly relevant to working with parents of children with disabilities” (Goddard et. al. 2000, p. 286). These parents were using a form of externalizing conversations that helped them define problems in a preferred and more manageable way.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">In concluding this section, it is apparent that some qualitative research has been conducted that utilizes or at least mentions the effects of externalizing conversations. Analyzing the results of this body of research lends credence to the idea that externalizing practices do possess helpful qualities to clients.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">However, no research evidence was found that focuses predominately on externalizing practices and explores its therapeutic effects in a comprehensive manner that involves both participant and therapist interpretation. As such, robust claims about therapeutic attributes are lacking at this time. In light of this lack of evidence and in recognition of the compelling prospects that have been exposed by existing research, efforts toward a more comprehensive analysis of the useful qualities of externalizing conversations may be warranted.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">&nbsp;</span></p><span data-dcnode-id="819" instrument_node="">
</span><h3 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Chapter Four: Findings and Discussion</span></h3><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">The purpose of this chapter is to integrate the preceding literature review with this writer’s own observations. The first section addresses the narrative community’s efforts to present the uses and therapeutic qualities of externalizing practices. A subsequent section critiques the body of research that has been conducted on narrative therapy and externalizing practices, and makes recommendations for future research efforts.</span></p><span data-dcnode-id="813" instrument_node="">
</span><h4 data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Evaluation of Externalizing Practices</span></h4><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">While emerging as a focused approach less than 20 years ago, the narrative approach to therapy illustrated in this study has generated a considerable amount of scholarly and clinical interest in the psychological community. Although Michael White has been criticized for some of his interpretations of postmodern thinkers (see White, 1995), I believe the philosophical foundations he and David Epston (see White &amp; Epston, 1990) assembled into a practical form of therapeutic intervention have had profound effects both on people’s lives and within the mental health community. The efforts by these and other authors have developed the narrative approach into a comprehensive clinical model/orientation, as well as a worldview sensitive to sociocultural and political implication.</span></p><span data-dcnode-id="807" instrument_node="">
</span><h4 data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Clinical Implications of this Review</span></h4><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">This study has highlighted the use and value of externalizing conversations in narrative therapy – as outlined by those practitioners most committed to the practice. What is revealed is the extent to which externalizing conversations play a crucial part in many of the key practices of narrative therapy. Without this practice, many of the therapeutic aspects of narrative therapy would lose much of their potency. Many of the authors cited in this study go to exceeding lengths to describe the practice of externalizing and illustrate how it is incorporated into therapeutic discourse with clients.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Nevertheless, I believe it is also the case that the therapeutic qualities of externalizing conversations have yet to be adequately explicated. Externalizing is an intimate part of many narrative practices. Yet, no body of literature was found that systematically evaluates the relative importance of externalizing practices in light of outcome measures or on clients’ perceptions of the effectiveness of therapy. As this study advises, additional research into the usefulness and effects of externalizing conversations is indicated.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">This study is novel for its illumination of the purported impact of externalizing practices, as well as how narrative therapy intimately relies on externalizing for its therapeutic interventions. The goal has been to document this practice in one body of literature, thereby furthering the narrative and broader mental health community’s knowledge of the uses and value associated with externalizing conversations.</span></p><span data-dcnode-id="795" instrument_node="">
</span><h4 data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Conclusions about Externalizing Practices</span></h4><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">From a scholarly perspective, narrative therapy’s allegiance with social constructionist sensibilities about the importance of discourse is evident in the purposeful, creative and detailed manner in which narrative practices such as externalizing are described. Scrupulous attention is given in describing these practices, linking them to larger postmodern ideas, and detailing in a practical context their implications for clients and therapists alike. The result is a rich body of literary-based reporting of the therapeutic practices that have come to define narrative therapy.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Indeed, the eleven therapeutic qualities associated with externalizing practices that have been outlined in this study have all received considerable scholarly description and theoretical justification across various narrative-inspired authors. This rich and expanding literary enterprise presents like-minded practitioners with an assortment of resources from which to draw upon for their clinical practice. This project adds to that effort in some measure by combining many of these therapeutic descriptions into one study.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Outside of the theoretical work, specific clinical case examples are the typical means for depicting the therapeutic values of narrative practices such as externalizing. Again, these descriptions are richly detailed and harmonious with the theory behind narrative therapy, and are undoubtedly appealing to those practitioners who already espouse postmodern sensibilities. Moreover, the practice of working collaboratively with clients and consulting them about their experiences of the therapy process also has a powerful impact on the manner in which narrative practices are described and justified. Overall, externalizing practices are supported in the narrative literature on multiple fronts, including the following :</span></p><span data-dcnode-id="783" instrument_node="">
</span><ul data-dcnode-id="775"><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">As a practical therapeutic measure; e.g. speaking in a manner that externalizes the problem and reduces the effects of internalizing discourses that promote feelings of internal defectiveness. Externalizing allows blame to be removed from individuals and families, and creates space for the consideration of alternative choices. Informal feedback from clients often supports these therapeutic claims.</span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Theoretical justification; e.g. externalizing as an anti-language that stands in opposition to dominant forms of social discourse. Externalizing recognizes and makes room for the socially constructed nature of people’s experience. It also allows for conversations that track the history of problems and deconstruct underlying sociocultural and political forces.</span></li><span data-dcnode-id="776" instrument_node="">
</span></ul><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">However, scholarly work on narrative therapy has been heavily focused in the realm of subjective discussion; i.e. framing narrative practices in theory, therapist accounts of the therapeutic process, incorporation of informal client feedback, as well as the sociocultural and political implications of the narrative worldview. What has been neglected, often purposefully, is an engagement with wider practices within the mental health community to provide supportive (research based) evidence of therapeutic efficacy.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The broader mental health community is actively engaged in various methods of highlighting the efficacy of specific treatment approaches as well as the utility of counseling/psychotherapy in general. Yet, narrative therapy continues to be on the periphery of such efforts.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">As a comparison, consider cognitive based therapies for a moment. If therapeutic approaches can have a signature effect on the industry of therapy, that effect which belongs to cognitive based therapies is arguably the robust and systematic manner in which research data is generated and employed to advocate its helpful and functional qualities. Speaking broadly, books on cognitive therapy are also notable for the practical and concise language used to describe cognitive techniques. This is often followed up by an abundance of research data to support such techniques for specific therapeutic goals or with specific client populations.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">By contrast, I would argue that one of the hallmarks of narrative therapy has been the painstaking and careful use of postmodern and social constructionist metaphors to situate the narrative approach. The collaborative nature of narrative work and the incorporation of client feedback about therapy are also distinctive of narrative therapy. Yet, I contend that these practices are immediately drawn back into supporting the theory behind the narrative worldview. The result is that scholarly narrative work is a complete effort, but one that resides loyally within its own worldview; a worldview that is at the moment distinct from prevailing cultural practices and sensibilities (i.e. modernistic vs. postmodern).</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Whereas cognitive based therapies seem to be benefiting from their focus on specific techniques and utilization of fashionable (i.e. culturally accepted) research practices, narrative therapy remains a less fashionable outsider of sorts. This condition presents unique consequences for the practice of externalizing. Detailed literary accounts of its utility are abundant. Yet, validation of its purported effects and utility as a therapeutic practice are limited because its discussion has traditionally been intimately linked with the larger narrative therapy approach.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Nevertheless, as the axiom goes, the only thing that is certain is change. Indeed, cultural tastes and practices are continually changing. As this occurs, the field of psychology changes and adapts to these evolving sensibilities. It has yet to be determined if our culture will “grow” to accept more enthusiastically the postmodern and narrative therapy sensibilities that are so intimately intertwined. Alternatively, will those practitioners/researchers that advance narrative therapy make accommodations for prevailing mental health views in an effort to garner broader appeal? Those among the vanguard of the narrative approach seem unlikely to temper their political and social perspectives. Alternatively, a separate discussion of externalizing practices combined with concerted qualitative research to validate their utility could have unique appeal to a wider audience in the mental health community, especially in light of the current focus on evidence-based therapy.</span></p><span data-dcnode-id="756" instrument_node="">
</span><h4 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Where Would Narrative Therapy be Without Externalizing?</span></h4><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">In the introduction of this study, a quote from Michael White is used. In response to the question of where would his work be without externalizing discourse, he responded “nowhere!” In a more recent book, and maybe in light of his comment years prior, White (2004) has written that he often does not use externalizing questions in his work. While there has been a decade between these two comments, and certainly White’s therapeutic work has evolved over that time, what are practitioners to make of this seeming discrepancy?</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Indeed, at least one author has described White’s comment of “nowhere” as a “bit of an exaggeration” (O’Hanlon, 1993, p.178). O’Hanlon (1993) suggests that in some respects, externalizing is more of a means than an end in itself; a method for reducing blame and resisting pathologizing language. He notes that White and Epston would likely be helpful without externalizing. O’Hanlon (p.178) adds, “I consider externalizing interventions (discourses) to be, in part, an invitation from the therapist to clients to develop a different relationship to their concerns or their troubles.”</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">In attempting to find a reasonable solution to this question, this study has attempted to parse out externalizing practices (e.g. specific efforts to externalize problems) from the broader concept of externalizing conversations. As defined earlier, these conversations are intended to represent the therapeutic stance that maintains a constant discourse that views clients as distinct from their socially constructed identities, sense of reality, and troubles.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">In light of this distinction, it seems reasonable that White and others may conduct therapy without externalizing problems (i.e. engaging in the practice of externalizing). Yet, based on a review of the literature, the narrative stance that views people as distinct from their socially constructed world is not a feature that can be turned on or off. It’s not a technique or method. Rather, it is more precise to call it a worldview or attitude by which narrative-inspired therapists view the world. It is always in play in the therapeutic alliance between therapist and client. As such, externalizing has a special connection with narrative therapy; one that is deserving of this study to address its qualities and therapeutic effects.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">&nbsp;</span></p><span data-dcnode-id="738" instrument_node="">
</span><h4 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">ANALYSIS OF CURRENT RESEARCH</span></h4><span data-dcnode-id="735" instrument_node="">
</span><h4 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Summary</span></h4><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">It is my contention that the preceding review of the research on narrative therapy and externalizing practices leads to the following overall conclusions:</span></p><span data-dcnode-id="729" instrument_node="">
</span><ul data-dcnode-id="700"><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Research conducted on narrative therapy is qualitative or contains mixed methods in its methodology. No pure quantitative analyses were found among the circulating literature.</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Narrative therapy continues to receive limited attention among the research-oriented community.</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Much of the research that involves the use of narrative therapy is often combined with other forms of therapy; for instance motivational interviewing, or group therapy modalities. The result is that it is sometimes difficult to isolate and evaluate the effectiveness of the narrative therapy model.</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Few studies have been conducted that isolate the usefulness of particular narrative practices such as externalizing. However, the limited research conducted thus far on externalizing practices offers promising implications that deserve attention by narrative practitioners as well as the broader mental health community.</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Based on the lack of focused research on externalizing practices, it is difficult to parse out the specific therapeutic qualities of externalizing. The limited research and published case studies tend to focus on the effects of reducing blame, removing stigmatizing labels, and opening space for alternative interpretations of problems, events, constraints, etc. Additional focused research would likely shed more light on many of the more nuanced effects of externalizing practices.</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">An informal analysis of the current research suggests that clients may be receiving therapeutic value from externalizing conversations, but when asked, attribute this helpfulness to other therapeutic elements such as personal agency or the therapeutic alliance.</span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">It is not just narrative therapy’s purported constructivist or social constructionist principles that have created impediments to the approach being researched. The political and social sensibilities of narrative therapy have at times been in conflict with the goals of researchers.</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Recent movements within the narrative therapy community are attempting to bring together the narrative worldview with novel forms of qualitative research methodology that are in harmony with one another. The utilization of co-research principles is one such proposed methodology.</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Co-research relies on externalizing conversations as part of its process. Additionally, co-research would be an excellent component of a qualitative method for collaborating with clients to discuss the helpful properties of externalizing practices. Such a study has yet to be performed in a comprehensive manner.</span></li><span data-dcnode-id="701" instrument_node="">
</span></ul><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">&nbsp;</span></p><span data-dcnode-id="696" instrument_node="">
</span><h4 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Implications for the Future</span></h4><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">There is a strong argument to be made for future efforts into studying the helpful qualities of externalizing practices. Maione and Chenail (1999) point out that Common Factors research suggests that the specific techniques or applied therapy model is less important than other factors in the course of therapy . However, they concede that more research needs to be done on better understanding the interactions of Common Factors, and they also conclude that:</span></p><span data-dcnode-id="690" instrument_node="">
</span><blockquote data-dcnode-id="687"><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Although few clinical models have been studied to any great length, the research thus far supports the findings that therapist techniques and models play a role in the change process thus warranting further study. This further study will contribute to our knowledge on basic therapist communicative skills (p.78).</span></p></blockquote><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Further exploration into the therapeutic qualities of externalizing would do just that and more. As this paper discusses, externalizing is more than simply a technique. It is rather a purposeful frame of mind and deliberate method of discourse (communication) that invites people to think about their lives and problems in unique ways. Moreover, by studying specific practices such as externalizing more thoroughly, additional data may be generated to illustrate how clients may indeed benefit from specific techniques, but attribute the follow-on therapeutic effects to other broader factors such as the therapeutic relationship or the sense of personal agency. This research could then aid in facilitating understanding of the interactions among the Common Factors.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Specific externalizing practices may well bolster key common factors such as the therapeutic relationship in ways not yet adequately documented in the research; for instance, by making problems less deadly to discuss, reducing feelings of blame and defectiveness, and helping to build personal agency. Additionally, linking research efforts of specific narrative practices to Common Factors research would provide a platform for other mental health professionals to evaluate the therapeutic qualities of narrative therapy. As the name implies, Common Factors research encompasses many therapy modalities.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">It certainly appears that specific models of therapy have only been lightly discussed in the research literature (see Maione &amp; Chenail, 1999). In light of this, I propose there is a considerable need to evaluate the helpful qualities of externalizing and other practices associated with narrative therapy. Moreover, I recommend that evaluating externalizing practices would be the first logical step in any such effort for three main reasons. First, studies already exist that have, to various degrees, researched the use of narrative therapy. Second, several of these studies suggest that externalizing has useful therapeutic effects with particular issues and client populations. Third, it is my contention that externalizing is a uniquely important practice within the narrative therapy approach. As such, research highlighting its therapeutic qualities would be beneficial not only to refining the practice of externalizing, but it would have implications for the acceptance of narrative therapy in general. For instance, research on externalizing practices could shed light on the helpful qualities associated with the general externalizing way of thinking inherent to the narrative therapy approach.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">It is important to spend some effort separating out the specific practices of narrative therapy in order to accurately assess their therapeutic qualities. As this study has suggested, those research efforts that have only studied narrative as a general model, while useful, have typically failed to adequately discuss the qualities of the model that are helpful to people. It is time for a more thorough investigation into the therapeutic qualities of narrative therapy. A good place to begin such research is with a focus on the effects of externalizing conversations.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">&nbsp;</span></p><span data-dcnode-id="671" instrument_node="">
</span><h4 data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Future Research Methods</span></h4><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">As discussed earlier, elements of the narrative therapy worldview present unique obstacles to conducting research (see page 49). Yet, rather than becoming a deterrent, these obstacles can invite vigor as narrative-inspired researchers work to integrate narrative principles with evolving research methodology. Indeed, some are already attempting to do this (see Denborough, 2004; Gaddis, 2004; Redstone, 2004).</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">These efforts often involve explorations via co-research, such as that discussed by Epston (1999, 2004) and Maisel et. al. (2004). In addition, Madsen (1999) discusses how co-research projects can be fitted into a qualitative manner of outcome research that identifies the helpful themes or qualities in therapy. He notes that, “Emergent themes across interviews could be drawn out to develop grounded theory about contributions to positive outcome” (p.334). Other promising qualitative research methods include interpersonal process recall, comprehensive process analysis, ethnography, and discourse analysis. Indeed, the possibilities for making use of co-research in the construction of a research methodology have been addressed in the literature. It now simply needs to be acted upon in a thorough manner.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">While narrative practitioners often consult with clients about their impressions of therapy and specific practices, more work needs to be done in documenting these accounts in a methodological research format. It is my contention that such projects would benefit the field of narrative therapy by ensuring that practitioner theory does not supersede client accounts of what was helpful in the therapy process. There would also be useful ramifications for externalizing practices. The current research literature reveals that externalizing indeed creates some distinctive effects upon clients. Understanding these effects to a greater degree is a worthy research goal not only for narrative practitioners, but for all clinicians who wish to understand how the use of discourse with clients can affect the therapeutic process.</span></p><span data-dcnode-id="659" instrument_node="">
</span><h4 data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Proposals for Research</span></h4><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">In this section, I would like to offer two sketches for potential research projects that, (1) would honor narrative therapy sensibilities concerning the roles of the therapist and client, and (2) would be useful for examining the therapeutic qualities of narrative therapy practices.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">The first example is a research method premised on Comprehensive Process Analysis (CPA; Elliot &amp; Shapiro, 1992) that could also allow for the implementation of narrative-inspired co-research. CPA is a systemic, qualitative research procedure for analyzing significant events. It seeks to understand the following:</span></p><span data-dcnode-id="650" instrument_node="">
</span><blockquote data-dcnode-id="638"><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">(a) the context out of which significant events arise (e.g., client coping style, therapeutic alliance),</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">(b) the important features of the event itself (e.g., therapist interpretation, client expression of interpersonal fears), and</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">(c) the impacts of the event (e.g., insight, decreased depression)</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">(Elliot &amp; Shapiro, 1992, p.164-165).</span></p></blockquote><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">CPA utilizes a Brief Structured Recall procedure (BSR; Elliot &amp; Shapiro, 1992). This procedure is similar to interpersonal process recall (discussed earlier in this study) that has clients and therapists review audio or videotapes of entire sessions. The BSR procedure, however, only plays back those portions of the session identified by the client as important. The process of determining which events are important to the client can be accomplished either as a collaborative effort between the therapist and client, or determined by the client via the completion of a questionnaire following the session(s).</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">In the CPA method outlined by Elliot &amp; Shapiro (1992), a researcher then interviews the client and therapist separately about the selected events; asking about the context of the event, the event itself, and its impact. The process results in separate testimonies about how each party felt a particular event was therapeutic and useful in the session.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">A more narrative-inspired alternative would be a collaborative co-research session between the therapist and client, in which the selected events are discussed in a similar format. While this option may raise concerns such as possible therapist bias or clients saying things they think the therapist wishes to hear (social desirability bias), it does match more closely the spirit of narrative co-research. Therapist and client would be intimately involved in exploring those events in the session that were found to be therapeutic by the client. If this type of research is accumulated across many sessions and among various clients and therapists, common themes and therapeutic qualities can be identified and coded. This would be helpful in identifying specific therapeutic practices, their context, and the impact they have on clients.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">As a second example, co-research projects can also be an excellent method for evaluating with clients the helpful and unhelpful qualities of externalizing practices. Narrative-inspired practitioners have expressed concern that more traditional forms of research emphasize professional accounts of therapy over those of clients (see Gaddis, 2004). However, employing the collaborative spirit of co-research allows the therapist to both define a research question – in this case, exploring the helpful and unhelpful qualities of externalizing conversations – and work in conjunction with clients to address the question in a way that taps the local knowledge and experience of the client. See the figure on page 56 for an illustration of co-research as a research project. This approach would allow for focused co-research projects on the effects of externalizing discourse.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">This study has charted how the externalizing stance of narrative conversations is a pervasive feature of the narrative therapy model. As such, externalizing practices warrant specific investigation. By collecting co-researched accounts, identifying and codifying themes (again, possibly with client assistance), an accumulation of client-generated data on the therapeutic qualities of externalizing conversations would be made possible.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Co-research as a methodology is not without its limitations. Similar to that described above, the client or therapist may be led by ulterior motives to make claims or inquires that may not necessarily speak appropriately to the therapeutic process. Moreover, an approach that relies primarily on co-research may find a mixed reception among other in the mental health community. Only time and effort will tell if these or other methods prove useful in furthering clinicians understanding of what works and does not work for clients in therapy.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">&nbsp;</span></p><span data-dcnode-id="616" instrument_node="">

</span><h2 class="mbt-book-title widget-title" data-dcnode-id="233"><a data-dcnode-id="234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.narrativeapproaches.com/books/narrative-mediation-a-new-approach-to-conflict-resolution/"><span data-dcnode-id="235" instrument_node="">Narrative Mediation : A New Approach to Conflict Resolution</span></a></h2><span data-dcnode-id="232" instrument_node="">
</span><div class="mbt-book-images" data-dcnode-id="229"><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.narrativeapproaches.com/books/narrative-mediation-a-new-approach-to-conflict-resolution/"><img alt="Narrative Mediation : A New Approach to Conflict Resolution" class="large mbt-book-image" data-dcnode-id="231" itemprop="image" size="25vw" sizes="25vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.narrativeapproaches.com/wp-content/uploads/2013/06/Narrative-Mediation.jpg&amp;raw" srcset="http://www.narrativeapproaches.com/wp-content/uploads/2013/06/Narrative-Mediation.jpg 260w, http://www.narrativeapproaches.com/wp-content/uploads/2013/06/Narrative-Mediation-199x300.jpg 199w"></a></div><span data-dcnode-id="228" instrument_node="">
</span><div class="mbt-book-blurb" data-dcnode-id="224"><span data-dcnode-id="227" instrument_node="">In this groundbreaking book, John Winslade and Gerald Monk -- leaders in the narrative therapy movement-introduce an innovative conflict resolution paradigm that is a revolutionary departure from the traditional problem-solving, interest-based model of resolving disputes. The narrative mediation approach encourages the conflicting parties to tell their personal "story" of the conflict and reach resolution through a profound understanding of the context of their individual stories. The authors map out the theoretical foundations of this new approach to conflict resolution and show how to apply specific techniques for the practical application of narrative mediation to a wide-variety of conflict situations. </span><a class="mbt-read-more" data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.narrativeapproaches.com/books/narrative-mediation-a-new-approach-to-conflict-resolution/"><span data-dcnode-id="226" instrument_node="">More info →</span></a></div><span data-dcnode-id="223" instrument_node=""> </span><div class="mbt-book-buybuttons" data-dcnode-id="218"><div class="mbt-book-buybutton" data-dcnode-id="220"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0787941921%3Ftag%3Dnarrativeapproac-20" rel="nofollow" target="_blank"><img alt="Buy from Amazon" border="0" data-dcnode-id="222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.narrativeapproaches.com/wp-content/plugins/mybooktable/styles/silver/amazon_button.png&amp;raw"></a></div><div data-dcnode-id="219" style="clear:both;"></div></div><span data-dcnode-id="217" instrument_node=""> </span></div><span data-dcnode-id="215" instrument_node="">
