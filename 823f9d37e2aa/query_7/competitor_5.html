</span><h3 data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">ABSTRACT</span></h3><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">The narrative approach to therapy outlined by David Epston and Michael White is broadly premised on the assumption that people’s lives are socially constructed through the multiple stories they tell, and that these stories are colored by the cultural and historical contexts within which they occur. The process of externalizing is a narrative therapy practice that establishes a context where people experience themselves as separate from the problems in their lives. Such practices focus on the relationship between the person and the problem instead of upon a problem-person. The person is not the problem; rather the problem is the problem. More than a therapeutic technique, externalizing practices assist in exemplifying the social constructionist worldview of narrative therapy.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Accounts of the usefulness and therapeutic value of externalizing practices come from practitioner descriptions and anecdotal client accounts of the therapy process. Efforts to utilize methodological research for studying the therapeutic qualities of externalizing practices have been limited. Contributing factors to this dearth of data include the unique and sometimes complex social constructionist principles of narrative therapy, the political and social sensibilities of those among the narrative therapy vanguard, and researchers’ comparative lack of training in qualitative research methodology.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">There are recent signs within the narrative therapy community and the qualitative research field which suggest that novel forms of method-based research involving collaboration between researcher and participant can yield promising results. This study proposes that research methods that employ the narrative practice of co-research offer excellent opportunities to evaluate the therapeutic qualities of externalizing conversations.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1751" instrument_node="">
</span><h3 data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Chapter One: Study Formulation and Definition</span></h3><span data-dcnode-id="1748" instrument_node="">
</span><h4 data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Introduction</span></h4><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Narrative therapy is a relative newcomer to the field of talk therapy – having first taken form in the late 1980s. In fact, many different themes have been emphasized in what is understood as the narrative metaphor, including ways of understanding people’s identities and vantages from which to understand problems and their effects on people’s lives (Morgan, 2000). Narrative therapy can also refer to particular ways of talking to people about their lives, problems, constraints, and their reflections on social, cultural, and political contexts.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">The purview of this study is restricted to that version of narrative therapy chronicled by Michael White and David Epston. Their groundbreaking book, Narrative Means to Therapeutic Ends (1990), represents an initial comprehensive effort to illustrate their conceptualization of narrative therapy as well as the therapeutic effects of its operation. Since that time, a torrent of literature – by these and other practitioners; has continued to evolve our understanding of the meaning and uses for the narrative therapy which White and Epston are widely considered founders.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Grounded in postmodern and social constructionist modes of thinking about the world, the narrative approach or “stance” can be recognized by many of its characteristic qualities. One of its most pervasive and distinct qualities is the practice of externalizing . In stressing the point of its importance, consider Michael White’s response to a question posed to him regarding narrative therapy (Epston, 1993, p.161); “Michael, if you hadn’t invented that ‘talk’ we refer to as an externalizing discourse, where do you think your work would be today?” White’s reply was a conclusive, “Nowhere!”</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Externalizing practices create a context in which problems are treated as separate from people. People are invited to discuss problems and constraints in a manner that separates them from these issues. This process is quite unique within a Western culture that values a scientific medical model that situates problems within individuals’ biology and character. Problems are conceptualized from the narrative vantage point “as existing outside people as a linguistic device to reorganize our thinking in ways that counter shame and blame, minimize defensiveness, and promote client agency or the capacity to act on behalf of themselves in relation to problems” (Madsen, 1999, p. 169).</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">However, the process of externalizing is more than simply a stylish therapeutic technique for talking with clients about problems. Externalizing conversations are a hallmark of the theoretical and therapeutic foundation of the narrative approach. It is conceived as a philosophical way of thinking about people, their problems, and informs the attitude by which therapists continually engage clients in conversation. Consider the following observation offered by O’Hanlon (1994):</span></p><span data-dcnode-id="1730" instrument_node="">
</span><blockquote data-dcnode-id="1727"><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">I have to give you a warning; if externalization is approached purely as a technique, it will probably not produce profound effects. If you don’t believe, to the bottom of your soul, that people are not their problems and that their difficulties are social and personal constructions, then you won’t be seeing these transformations. When Epston or White are in action, you can tell they are absolutely convinced that people are not their problems. Their voices, their postures, their whole beings radiate possibility and hope (p.28).</span></p></blockquote><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Informed by philosophical ideas from writers such as Jacques Derrida and Michel Foucault, narrative therapy assumes a non-traditional stance where notions of reality are not rooted in positivist notions about the existence of “deep structures” to self-identity or “essential truths” about people. Such thinking is often referred to as structuralism.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Narrative therapy is, alternatively, informed by poststructuralist ideas. Poststructuralism refers to a movement away from the idea that there are deep or real structures in people; e.g. a real self, a true self, which can be discovered by experts. This outlook resists the search for essential truths about people and questions notions of therapist “objectivity” and “expertise” in therapeutic work.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Moreover, narrative therapy operates under the social constructionist assumption that “problems are anchored and supported by cultural discourses or taken-for-granted cultural prescriptions about how we should act” and make sense of our lives (Madsen, 1999 pg. 171). The way people understand themselves and their relationship to the world is developed and shaped by their interactions in the world.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Externalizing practices presuppose such ideas about culture and its influence on reality and self-identity, and actively seek to engage people in conversations that allow identified characteristics (particularly problems) to be seen as external to oneself. Externalizing discourse represents a manner of speaking that summons a social constructionist perspective and allows for the creation of alternative life narratives that open doors to an expanded array of choices in our lives.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">As narrative therapy becomes a more established therapeutic approach, an increasing body of literature seeks to address the therapeutic qualities of narrative practices. This study specifically seeks to draw attention to the purported therapeutic qualities of externalizing practices and to critique the nature and depth of research that has been conducted to date using such practices.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><h4 data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Problem Statement</span></h4><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Narrative therapy is reaching into its second decade on the scene of psychotherapy and its community of adherents is expanding. Moreover, narrative practitioners and writers regularly profess the therapeutic qualities of narrative practices such as externalizing.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Yet, how can these therapeutic qualities best be understood? How persuasive are the arguments concerning its effectiveness? What type of work is conducted with clients that conveys that such practices are indeed beneficial to people? And lastly, how solid is the narrative-inspired research (often called co-research) that makes use of externalizing practices?</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">As the body and breadth of narrative-based literature accumulates, there appears to be a growing emphasis on validating the therapeutic effectiveness of narrative practices (such as externalizing), particularly as they relate to certain types of problems people encounter in their lives (such as eating disorders, domestic violence, depression, etc.).</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">A distinctive quality of the therapeutic stance of narrative therapy lies in the manner in which it borrows from the postmodern philosophical tradition. Similarly, narrative-based research appears to be unique from other types of research in the mental health professions. Conventional forms of research often search for empirical conclusions (as with quantitative designs) and typically rely on the researcher’s expert role to collect, codify, and interpret data (as is the case with many forms of qualitative methodology). Narrative-inspired research, conversely, focuses on the subjective nature of experience and seeks to de-emphasize the therapist’s role as an expert. In particular, the narrative enterprise of co-research is often employed as a research method that is not only used to expound on the therapeutic qualities of the externalizing process, but is conducted with clients in an externalizing manner of speaking ( Epston, 1999).</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">But, does the unique style of narrative-inspired research support the therapeutic claims made by its adherents? Is the research compelling enough to draw the interest and respect of those in the mental health community not accustomed to the narrative tradition? Is there more conventional research literature that supports the therapeutic claims by narrative therapy? Should it even be a goal of narrative-based researchers to ground their research in widely accepted design methodology?</span></p><span data-dcnode-id="1693" instrument_node="">
</span><h4 data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Purpose Statement</span></h4><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">The purpose of this study is to take an in-depth critical look into the narrative practice of externalizing; focusing intimately on its various uses and purported therapeutic qualities.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">A considerable amount of literature exists on the various ways in which externalizing practices function. Much of the literature is sprinkled with various tantalizing therapeutic qualities attributed to externalizing practices, often within the context of how externalizing serves other narrative practices; such as deconstructive listening, relative influence questions, discovering unique outcomes, etc. An externalizing stance is additionally inherent to the narrative practice of co-research.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">However, the uniqueness of this study is in the singular manner in which it focuses on the various ways in which externalizing practices are employed within narrative therapy and the extent to which they are evaluated through research. With this aim, the study answers the following research questions:</span></p><span data-dcnode-id="1681" instrument_node="">
</span><ol data-dcnode-id="1673"><span data-dcnode-id="1680" instrument_node="">
</span><li data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">What does the narrative therapy literature maintain as the salient therapeutic qualities and values attributed to the practice of externalizing?</span></li><span data-dcnode-id="1677" instrument_node="">
</span><li data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">In what manner and depth has methodological research attempted to validate the therapeutic qualities of externalizing practices?</span></li><span data-dcnode-id="1674" instrument_node="">
</span></ol><span data-dcnode-id="1672" instrument_node="">
</span><h4 data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Significance and Clinical Rationale</span></h4><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Narrative therapy is an increasingly popular orientation within the field of psychotherapy; and while some practitioners in psychology seek to restrict the title of “theoretical orientation” to only a few approaches typically founded in the early 20th century, the narrative-inspired orientation arguably has a rich, albeit recent tradition grounded in social constructionist ideas about the human condition.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Narrative therapy proposes many innovative ideas and therapeutic practices. Key among them is the practice of engaging people in externalizing conversations. Sometimes viewed as simply a therapy technique, externalizing practices address wider implications about how clinicians view the world, understand clients’ problems, and by association, how clients view themselves and their ability to make changes in their lives.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">While narrative-inspired texts discuss externalizing practices to varying degrees, this study is distinguished by the manner in which it focuses singularly on the use of and therapeutic value associated with externalizing practices. By doing so, this study provides a richer understanding of the theory and practice of externalizing approaches to clinicians experienced in narrative work, as well as to those new to the narrative approach. It also offers an opportunity to explore in-depth the types of research behind narrative therapy and externalizing practices.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">An evolving body of narrative-inspired literature and research is being conducted that may assist in placing narrative therapy alongside other documented and researched therapeutic approaches. An objective of this study is to further that literary process, specifically as it relates to the practice of externalizing. This study’s uniqueness lies in the manner in which it focuses solely on the issues and therapeutic implications surrounding externalizing practices. By doing this, it represents novel work in the field of narrative therapy literature, and will assist in explaining a key narrative practice to the larger clinical psychology community.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1654" instrument_node="">
</span><h3 data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Chapter Two: Methodology</span></h3><span data-dcnode-id="1651" instrument_node="">
</span><h4 data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Summary of the Study</span></h4><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">This study assembles and illustrates the therapeutic qualities attributed to the narrative therapy practice of externalizing, reviews current research literature on narrative therapy and externalizing practices, and critically appraises the manner in which narrative-inspired research makes use of externalizing discourse . The overall effectiveness of this study derives from a comprehensive survey and critical analysis of the current literature.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><h4 data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Interpretive Process</span></h4><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">This study comprises a comprehensive survey of the existing literature on the narrative therapy practice of externalizing and provides a critical evaluation of the research literature conducted on narrative-inspired methods. A final chapter will combine viewpoints from existing literature, as well as my own clinical interpretation, concerning the effectiveness of the narrative community in sharing its research practices with the larger mental health community in a compelling manner.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><h4 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Literature Sources</span></h4><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">In following the approach outlined above, this study has drawn from a wide range of scholarly-based literature. Specific sources include the following:</span></p><span data-dcnode-id="1633" instrument_node="">
</span><ul data-dcnode-id="1619"><span data-dcnode-id="1632" instrument_node="">
</span><li data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The primary literary works of Michael White and David Epston.</span></li><span data-dcnode-id="1629" instrument_node="">
</span><li data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Literary text from other narrative and social constructionist-inspired writers and clinicians including, but not limited to Gene Combs, Jill Freedman, Victoria Dickerson, Jennifer Freeman, Richard Maisel, Gerald Monk, Alice Morgan, William Madsen, Karl Tomm, Jeffrey Zimmerman, etc.</span></li><span data-dcnode-id="1626" instrument_node="">
</span><li data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Databases used to acquire published psychological articles for this study include, PsychInfo, Proquest Direct, InfoTrac, and Digital Dissertations.</span></li><span data-dcnode-id="1623" instrument_node="">
</span><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Journal articles were also retrieved from various libraries including Argosy University and Alliant International University.</span></li><span data-dcnode-id="1620" instrument_node="">
</span></ul><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Key descriptor words for this study include, externalizing conversations/practices, narrative therapy, narrative therapy and research, and externalizing practices and research.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><h4 data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Definition of Key Terms</span></h4><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">The following are definitions to key terms used throughout this study. These definitions are also cited as footnotes in the text to assist the reader.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1605"><i data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Constructivism&nbsp;</span></i><span data-dcnode-id="1606" instrument_node="">; A term based on the idea that knowledge is constructed by a person’s prior knowledge as well as new personal experiences. Initially embraced by some in the therapy community, constructivism eventually was critiqued as being too relativistic and insufficiently attentive to the ways reality is also constructed through culture, class, race, etc.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1600"><i data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Discourse</span></i><span data-dcnode-id="1601" instrument_node="">&nbsp;– For the purposes of this study, the term will reflect that described by Hare-Mustin (1994, p.19-20), whereby discourse is “a system of statements, practices, and institutional structures that share common values…. The ways most people hold, talk about, and act on a common, shared viewpoint are part of and sustain the prevailing discourses.” Discourses have a powerful influence on how they allow for and shape people’s life stories, and they typically reflect established structures of social and power relationships. Examples of discourse include those about normative standards (body image, success, self worth, manhood, etc.), professionals’ role as experts, and discourses about pathology (Freedman &amp; Combs, 1996).</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1595"><i data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Ethnographic research</span></i><span data-dcnode-id="1596" instrument_node="">; Research relying on the notion that one can describe what people think by analyzing what they say (Fetterman, 1989). Ethnographic interviews are typically audiotaped, transcribed verbatim, and then analyzed to identify emergent themes and categories among the many words people use to describe a given experience. Within the narrative therapy application of ethnographic research, clients are actively engaged in the interpretive process of the meanings of their words and experiences of therapy.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1590"><i data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Externalizing conversations</span></i><span data-dcnode-id="1591" instrument_node="">&nbsp;; this term can refer to the practice of externalizing the problem. Yet, this study also uses the term to encompass the pervading narrative therapy stance held with clients that regards people’s sense of self, reality, and problems as socially constructed. This stance is a distinctive element of the narrative therapeutic alliance between therapist and client.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1585"><i data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Externalizing practices</span></i><span data-dcnode-id="1586" instrument_node="">; Those efforts by the therapist to engage a client in conversations that seek to separate a problem, constraint, or internalized quality from the client’s own identity. Such practices allow for the notion that “the person is not the problem, rather the problem is the problem.”</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1580"><i data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Grounded theory&nbsp;</span></i><span data-dcnode-id="1581" instrument_node="">– A methodology that attempts to develop theories that are grounded in the research participants’ own experiences. The role of the researcher is to reflect on the participants’ experiences in a manner that allows these experiences to be organized and categorized. The goal is to develop a coherent body of knowledge or theory that is derived from participant descriptions (Gaddis, 2004).</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1575"><i data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Qualitative research</span></i><span data-dcnode-id="1576" instrument_node="">&nbsp;– Qualitative research does not rely on statistics to show confidence in the results. Confident conclusions are based more on the findings and interpretations that are produced by rigorous and systematized observation and documentation of the particular phenomenon in question (Maione &amp; Chenail, 1999). Qualitative research is a general term used to describe a group of methodologies dedicated to the description and interpretation of social phenomena (Maione &amp; Chenail, 1999). Such methodologies include, but are not limited to, ethnography, discourse analysis, narrative analysis, grounded theory, phenomenology, frame analysis, hermeneutics, and conversation analysis.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1570"><i data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Quantitative research</span></i><span data-dcnode-id="1571" instrument_node="">&nbsp;– Research that focuses on measuring and counting facts and the relationships among variables, and that seeks to describe observations through statistical analysis of data. It includes experimental and non-experimental research and descriptive research ( i.e. research that attempts to describe the characteristics of a sample or population).</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1565"><i data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Social constructionism</span></i><span data-dcnode-id="1566" instrument_node="">&nbsp;; Refers to the notion that a person’s sense of reality is malleable, and shaped largely by social and cultural forces mediated by language. The focus is on the processes (i.e. discourses) by which people come to describe, explain, and account for the world and their position in it (Gergen, 2001).</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1560"><i data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Therapeutic</span></i><span data-dcnode-id="1561" instrument_node="">&nbsp;– The American Heritage Dictionary defines therapeutic as, “having healing or curative powers.” This study uses the word therapeutic in that context, and explores both the claims and research that speak to the “healing and curative powers” of externalizing conversations.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1555"><i data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Unique outcome&nbsp;</span></i><span data-dcnode-id="1556" instrument_node="">– Anything that does not fit with the dominant problem-saturated story. For example, if a client’s problem is social anxiety, a unique outcome could be an instance when the anxiety was overcome or simply didn’t present itself as a problem at that time. From a narrative perspective, it is important that the client perceive an incident as a unique outcome. If imposed by the therapist, the client may have misgivings about the incident truly being a unique outcome.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><h4 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Chapter Three: Literature Review</span></h4><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Please note that the literature review presented below is a curtailed version from the original presented to my dissertation committee.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">The goal of this portion of the chapter is to expand upon some of the operating assumptions regarding the therapeutic value of externalizing practices, and to critically review the manner in which narrative practices have been researched, with specific focus on externalizing conversations.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><h4 data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Therapeutic Assumptions of Externalizing</span></h4><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Certain assumptions or presuppositions are made within many intellectual enterprises in general and more specifically surrounding the artfulness and creativity of therapy and what may be considered therapeutic. A narrative therapist’s questions to a client often rest upon assumptions as to how both the question and answer will be useful to the client.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Therapists’ work with clients is driven by what is assumed to be therapeutic for a client at a given point in time. These therapeutic assumptions spring forth from a multitude of wellsprings; one’s past work with similar clients, information imparted by “experts” in the field, data borne from research, etc. The notion of what is therapeutic not only sustains the therapist during each session, but provides the lifeblood of the entire therapy enterprise in its continued refinement of “standard of care” and the evolution of the field.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Within the realm of narrative therapy, the implementation of externalizing conversations has taken a defining role. In fact, many of the major applications of narrative therapy; whether it be working with certain problems (such as eating disorders, depression, domestic violence, children acting out, etc.) or how to achieve specific results (such as discovering unique outcomes , deconstructing problem stories, or building alternative stories) involve the use of externalizing conversations. In many respects, the process of externalizing is the workhorse of narrative therapy.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">But, why and how does externalizing work? What aspects of externalizing conversations do clients of narrative therapy find useful and therapeutic? And how well has it been thought through by those who assert its therapeutic usefulness?</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">In relatively informal ways, many narrative-inspired practitioners have utilized feedback from clients. For example, White notes that when soliciting feedback from those who consult him about their experience in therapy, “very often it is the engagement with externalizing conversations that is identified as a turning point for them in their efforts to satisfactorily address their problems and concerns” (White, 2000, pp.3-4). Specifically, he mentions that externalizing conversations made it possible for people to “separate their sense of identity” from the previous problem-saturated accounts of themselves (White, 2000).</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">The remainder of this section explores in-depth several of key therapeutic assumptions and elements of the narrative practice of externalizing. They are presented as follows:</span></p><span data-dcnode-id="1524" instrument_node="">
</span><ol data-dcnode-id="1489"><span data-dcnode-id="1523" instrument_node="">
</span><li data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Externalizing problems</span></li><span data-dcnode-id="1520" instrument_node="">
</span><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Objectifying and personifying a problem</span></li><span data-dcnode-id="1517" instrument_node="">
</span><li data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Reducing blame for a problem’s existence</span></li><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Tracking the history of a problem</span></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Deconstructing sociocultural and political effects/assumptions</span></li><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Creating space to consider possible alternatives</span></li><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Allowing for the creation of alternative stories</span></li><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Building personal agency over preferred qualities</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Not assigning causation to problems</span></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Making deadly issues more discussable</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Acting as an oppositional language or anti-language</span></li><span data-dcnode-id="1490" instrument_node="">
</span></ol><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">While not an exhaustive list, these elements are among the most frequently cited by narrative-inspired authors as the therapeutic qualities that render externalizing conversations useful. These qualities are not characterized as occurring in isolation from one another, but are seen as intertwined and interdependent. This section illustrates these assumptions in detail. A subsequent section critiques the thoroughness to which these elements have been found to be useful in therapy.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><h4 data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Externalizing Problems</span></h4><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">When people turn to therapy for assistance, they have often reached a point where they believe there is something wrong with them; that they or something about them is problematic (Carey &amp; Russell, 2002). By this point, the problem has become internalized. People assume the problem is a facet of their nature or inner-self. The problem has become fused with the person’s identity.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The narrative stance assumes that people can most easily examine the effects of problem-saturated stories of their lives when a discussion is conducted via externalized conversations. Externalizing establishes a context where people experience themselves as separate from the problem. Such a conversation shifts the client’s relationship to problems, and shifts the conversation to a focus on the relationship between the person and the problem instead of a singular focus on a problem-person.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Much of the literature suggests that the first step in the externalization process is to use the client’s language to describe the problem, modifying it so that the problem is objectified, and then questioning the objectified problem about its intentions and goals for the client. This process allows the problem to become a separate entity and thus external to the person or relationship – decoupling the connectedness between the person(s) and the problem (White &amp; Epston, 1990).</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">This process often begins simply. For example, during an initial session a client may comment that he feels he has a problem with making major decisions in his life. The consulting therapist may ask externalizing questions such as: So, “indecision” has made it difficult for you to arrive at certain decisions in your life? Has long has “indecision” been influencing your life? What strategy does “indecision” employ to get you off-kilter and unable to make up your mind? The therapist in this example has used the term indecision in an externalized manner, and will determine if this or another term fits best for the client.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Clients often do not need a lengthy explanation of the externalizing process. Rather, the therapist simply engages the client in externalizing conversations in a comfortable and conversational manner. If the therapist maintains this linguistic stance during the consultation and asks externalizing- inspired questions, clients will begin to experience a difference between how the therapist is talking about the problem and how they have likely been thinking about the problem for a considerable time. As the therapist’s use of externalizing language takes hold with the client (which may take any number of sessions), the client may begin to think about his problem or constraint in a different fashion; one where he slowly becomes separate and distinct from the problem. Therapeutic opportunities now begin to emerge.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Michael White found the process of working with people to externalize their problems compelling in the way it helped in the struggle against these problems. In the landmark book co-authored with David Epston, he notes (White &amp; Epston, 1990, p. 39):</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">I have concluded that, among other things, this practice [externalizing the problem]:</span></p><span data-dcnode-id="1461" instrument_node="">
</span><ol data-dcnode-id="1441"><span data-dcnode-id="1460" instrument_node="">
</span><li data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Decreases unproductive conflict between persons, including those disputes over who is responsible for the problem;</span></li><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Undermines the sense of failure that has developed for many persons in response to the continuing existence of the problem despite their attempts to resolve it;</span></li><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Paves the way for persons to cooperate with each other, to unite in a struggle against the problem, and to escape its influence in their lives and relationships;</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Opens up new possibilities for persons to take action to retrieve their lives and relationships from the problem and its influence;</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Frees persons to take a lighter, more effective, and less stressed approach to “deadly serious” problems; and</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Presents options for dialogue, rather than monologue, about the problem.</span></li><span data-dcnode-id="1442" instrument_node="">
</span></ol><span data-dcnode-id="1440" instrument_node="">
</span><h4 data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Objectifying and Personifying a Problem</span></h4><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">The idea of personifying the problem is closely linked to the quality of creating space. Yet, it does deserve its own discussion. Narrative therapy is quite distinct from other modalities of treatment, such as psychodynamic therapy, in the manner in which it strives to create a therapeutic setting for clients where problems are indeed experienced as something external to them. Creating a conversation where the problem has its own persona can be vital to experiencing it as external. Clothed with a discrete set of intentions, beliefs, agendas, and expectations that may be distinct from those of the client, the problem suddenly begins to take on a life of its own. Freedman and Combs (1996) also note that as the problem becomes externalized, it begins to be the focus of objectification rather than the person.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">This process may indeed assist in creating space for experiencing new choices, but the narrative literature suggests that the therapeutic value of personification lies in how it assists a client in experiencing the problem as separate from her ; the realization that the problem may have beliefs and intentions that are not in the best interests of the client. Faced with this realization, she must decide how to respond.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Will the problem continue to make decisions for her or will she? Whose agenda is more important, hers or the problems? Has the problem lived up to its promises to her (if any where made)? What does the problem want for her in the future? What does she desire? How does the problem try to trick her into buying into its way of life rather than hers?</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Such questions as these are considered useful in helping to separate the person from the problem(s). What questions like these have in common is their personifying and objectifying attitude about the problem. The problem is brought to life by the implicit notion that it has its own consciousness and purpose.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><h4 data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Reducing Blame for a Problem’s Existence</span></h4><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">People who consult therapists often feel a sense of blame or shame for the problems they suffer. Indeed, many cultures hold value in people taking responsibility for their problems, and if a little blame and shame is felt along the way, that may be supported by many cultural conventions as well.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Narrative therapy takes a different tack. While certainly important for people to take responsibility for addressing problems in their lives, the narrative approach attempts to decouple the effects of blame and shame from the act of taking responsibility for one’s problems .</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Madsen (1999, p.179) comments that blaming clients for their problems “never seemed particularly helpful.” He further elaborates that,</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The process of externalization allows for the separation of blame and responsibility. By thinking of problems as external entities that invite, coach, or trick us into particular responses, we can remove blame from individuals. People are not to blame for their difficulties; problems are to blame for their difficulties. Problems can be seen as inviting particular ways of being. However, externalizing conversations also allow space for clients to consider whether they might want to decline such invitations. Questions can be asked that represent irresistible invitations to responsibility. We can promote responsibility by irresistibly inviting it rather than by demanding it. (p.179).</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">With blame and shame for a problem’s existence decoupled from the desire to take responsibility for one’s actions, the narrative literature maintains that therapeutic space is opened up whereby a person can feel more empowered to create and choose preferred ways of responding to the influence of a problem or constraint.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><h4 data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Tracking the History of a Problem</span></h4><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Tracking the history of a problem is also referred to as mapping the problems influence. Typically taking place within the initial session with a client, the process may also proceed throughout the course of the therapy as new experiences come to light. Tracking the problem’s history is often seen as a two-step process that lays the foundation for the discovery of unique outcomes and the co-construction of alternative life stories for the client.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Once a problem is named and separated (i.e. externalized) from the person, a narrative therapist may ask questions that inquire into the history of the identified problem. This history can include stories from the distant past, the last few months, or just a few hours prior. The goal is to establish a baseline for understanding the historical influence of the problem over the person’s life (Morgan, 2000).</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">It is important to maintain an externalizing stance when tracking the history of the problem. The nature of questions is such that the problem(s) remain separate from the person consulting the therapist. In addition, the conversation may use the identifying term for the problem (such as Self-Doubt or Imposed Silence). This way, the interaction between the person and the problem is more clearly visible. Such questions might include: When did you first notice the problem entering your life? At what point in the last year was the problem the strongest in your life? When the problem is influencing you, what are its requirements for how you should act or think?</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">When tracking the history of the problem in someone’s life, people often assume the problem maintains a static effect over time. Michael White developed the use of relative influence questions for assisting persons in externalizing the problem and tracking the history of the problem (White, 1986a). He often uses such questions during an initial interview to immediately engage the person in the activity of separating their lives and relationships from the problem(s).</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">An example of how relative influence questions operate is when a therapist asks a client to think about their life over the past year in terms of a percentage. The therapist may then ask: “Over the past year, what percentage of the time was negative thinking in charge of your life, and what percentage were you in charge?”</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Such questioning may inquire about last month, last week, or maybe just before the client entered the therapist’s office; basically anytime during the past. The intent is to get the client thinking about the times and the degree to which the problem was in control of the person, as well as those times when the problem’s influence on the person’s life was relatively weaker.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">When tracking the history of problems, White (1986a) posits that it is important to break relative influence questions into two modes of inquiry. The first type encourages people to map the influence of the problem in their lives and relationships. These questions aid people in identifying the problem’s sphere of influence across various interfaces; their behaviors, emotions, beliefs, attitudes, etc. When the problem’s influence is understood across multiple interfaces in one’s life, greater opportunities become available for discovering unique outcomes where the problem’s influence may be weak. These newly discovered areas can represent the framework for affirmative action and an increased sense of personal agency (White &amp; Epston, 1990).</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Once the influence of the problem has been identified, the stage is then set for the next mode of questioning – inviting invites clients to map their own influence in the life of the problem. These questions often bring forth information that challenges the prevailing problem-saturated story and assists people in discovering competences and skills that heretofore had been neglected under the duress of the problem.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">An example of this might be a discussion in which a person recalls an incident(s) where she overcame her “public speaking fear” and was able to stand up in class and present. Questions might be asked such as; What quality was it that forced the “speaking fear” to take a back seat and put you in charge of what you wanted to do? Why was it important for you to not let the “speaking fear” take charge during this particular incident(s)?</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Tracking the problem in a two-staged process affords the benefit of gathering a solid history about the problem as well as searching for clues to a person’s non-static relationship with and influence over the problem. The effect of these two modes of questioning is to encourage a person to move… out of a fixed and static world, a world of problems that are intrinsic to persons and relationships, and into a world of experience, a world of flux. In this world, persons find new possibilities for affirmative action, new opportunities to act flexibly (White &amp; Epston, 1990, p. 42).</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">The new information that may come from the above-described discussion often results in the discovery of “unique outcomes”; neglected moments where a person was in control of the problem or contexts where the problem was not present. These unique outcomes can then be used to piece together alternative stories that are less problem-saturated and represent new opportunities in people’s lives.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><h4 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Deconstructing Sociocultural and Political Effects/Assumptions</span></h4><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Earlier in this chapter, it was discussed how the narrative stance implicates cultural and historical influences in contributing to problems and constraints affecting people’s lives. By giving consideration to those cultural and political forces involved in shaping our identity, awareness can be gained about how life stories are shaped by broader cultural stories/traditions. As a consequence, new understandings of life that are influenced less by self-blame and internalized weaknesses can be constructed.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">A significant component of externalizing conversations is that considerations beyond the individual can be taken into account. People’s relationships with problems tend to be shaped by history and culture. Externalizing conversations can explore the broader implications of how gender, race, culture, sexuality, class, and other relations of power have influenced the construction of a problem(s) (Carey &amp; Russell, 2002).</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">In this context, externalizing allows for a deconstructive process that challenges those beliefs and ideas that maintain problems and are often viewed as taken-for-granted “truths” or cultural “common sense” knowledge. White (1995) states, “I believe that, although internalizing conversations obscure the politics of experience, externalizing conversations emphasize the politics of experience” (p. 24).</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">From a narrative stance, clients are invited to engage the therapist in conversations that unpack these stories and see them from different perspectives, so that the manner in which they have been constructed may be apparent (Freedman &amp; Combs, 1996). Attention is always paid to the context in which stories exist (particularly problem-dominated stories) and the ideas and beliefs that help maintain their influence.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Exposing the politics of how identity is formed, externalizing conversations are viewed as providing clients a language in which to protest the influence of broader cultural discourses. Carey and Russell (2004) and Madsen (1999) further this idea through their discussion of how externalized language is utilized in the narrative practice of re-authoring conversations. These conversations involve the co-construction (i.e. between therapist and client) of preferred narratives that assist in addressing those constraints that brought the client to seek counseling. An externalizing stance is maintained as the preferred story is re-authored.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">What do such questions look like? The conversations and particularly the deconstructive-inspired questions asked by narrative therapists have a distinct flavor. They are geared to assist the client in exposing the underlying cultural and political assumptions supporting dominant ways of thinking. The therapist listens for, and seeks to inquire about the assumptions that are suspected of serving the interests of the problem. Morgan (2000) offers some questions a narrative therapist might ponder and ask a client, including:</span></p><span data-dcnode-id="1350" instrument_node="">
</span><ul data-dcnode-id="1327"><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">What are the underlying assumptions that enable the problem story to make sense?</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">What are some of the taken-for-granted ways of thinking and acting that are assisting the life of the problem?</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">What are some of your beliefs about a parent’s role in raising children?</span></li><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">How did these ideas develop?</span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">How comfortable are you with these ideas that you inherited?</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Which of these ideas do you find helpful or possibly restrictive in the way you would like to see your relationship with your daughter?</span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Thinking about those ideas you find helpful, what would I have seen you doing in the past that would have told me that these ideas were important to you back then?</span></li><span data-dcnode-id="1328" instrument_node="">
</span></ul><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Thinking about and asking these questions set the stage for a deconstructing conversation about the effects and assumptions of culture and politics in the life of the problem. In addition, the externalizing stance is claimed to afford the client increased flexibility for experiencing new possibilities for acting in relation to the problem.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h4 data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Creating Space to Consider Possible Alternatives</span></h4><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Creating space via externalizing practices is one of the most universal therapeutic effects written about in the narrative-based literature (White &amp; Epston, 1990; White, 1995; Freedman &amp; Combs, 1996; Madsen, 1999; Maisel, Epston, &amp; Borden, 2004). Moreover, the sense that an opening is created between a person and his problems is often one of the initial effects first noticed when engaged in externalizing conversations.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">The idea behind the concept of creating space is that clients can gain room for the consideration of alternative stories and/or action (Morgan, 2000). Negative identities tend to have a fixed, unremitting quality to them; often leaving people little breathing space to view alternative stories and new courses of action. In such circumstances, externalizing conversations are used to help create space for the client to “experience an identity that is distinct or separate from the problem” (White, 1995, p. 23), as well as consider alternatives to the problem story.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Interestingly, when confronted by externalized questions, it often becomes evident that negative identity conclusions are only “thinly” developed (White, 1995, 2004). The social and cultural stories that perpetuate their troublesome existence often escape direct challenge. Externalizing conversations allow for the unpacking of these thin identity conclusions (White, 2004). In fact, White (2004) comments,</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">I believe that one of the primary achievements of externalizing conversations is this unpacking of the thin conclusions that people have about their own and about each other’s identity. In this activity, these conclusions are deprived of the truth status that has been assigned them; these conclusions cease to carry the authority that they did (p. 124).</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">A working assumption in much of the narrative-inspired literature is that people typically embrace this process and find it therapeutic by allowing them the space to think and act in more preferred ways. According to White, “In follow-up sessions, when we have discussed with persons their experience of the externalizing of the problem, many have remarked that it had the effect of ‘freeing’ them to act independently of the problem” (White &amp; Epston, 1990. p. 66).</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The literature also suggests that a common response to externalizing conversations has been a sense of relief; relief that a person is not the problem and that there are ways of getting more in touch with other, less problem-dominated narratives that speak about who he/she is (Carey &amp; Russell, 2002). The creation of therapeutic room to think and act contributes to shedding light on other aspects of a person’s life that the problem(s) had been historically obscuring.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><h4 data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Allowing for the Creation of Alternative Stories</span></h4><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Conventionally, experience is thought of as simply what happens, and people store experiences as they happen and retrieve them through memory. The narrative process, on the other hand, is informed by the notion that experience is colored and shaped by the meaning people assign to each experience and that it is attended to (or not) as it seems relevant to the stories people are living. As such, when narrative questions are asked, the assumption is not that people can retrieve particular experiences with particular predetermined meanings. Rather, narrative questions allow the therapist to co-author experience with the client. Narrative questions do place a “spin” on a client’s experiences – beginnings and endings of experiences are suggested or highlighted, and portions of experiences are expanded upon in great detail while other segments are given shorter shrift (Freedman &amp; Combs, 1996).</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">The intended goal is that listening with an externalizing attitude has a powerful deconstructive effect. From the therapist’s perspective, such a stance biases the therapist to interact differently with people than she would if she saw them as in possession of intrinsic characterological problems. An externalizing stance creates a different “receiving context” for the client’s stories, one in which the therapist can work with problems without viewing the client as pathological (Freedman &amp; Combs, 1996).</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">When one is working with alternative stories of people’s lives, if a client mentions a particular character trait as if it is inherent to them (e.g. It’s my determination that helped me get the job.), this then becomes an opportunity to invite the person into an externalizing conversation that can lead to a thicker, more developed description of this trait. Unpacking the trait of determination can aid in learning about its history and how it is linked to helpful personal skills and knowledges (Carey &amp; Russell, 2002). This unpacking can lead to further development of other preferred qualities, as well as enriching preferred stories in a person’s life.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><h4 data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Building Personal Agency over Preferred Qualities</span></h4><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">The narrative literature asserts that externalizing conversations don’t simply focus on de-labeling people and their problem(s). Such conversations also take place with regards to preferred qualities as well (such as competence or determination). However, just as competence is a cultural creation (from a poststructuralist perspective), it is possible for the narrative therapist to ask questions about how this quality came to exist, its effects, what it says about the person, what other personal qualities it is linked to, and where it is most and least prominent in the person’s life. This process can make qualities such as competence more meaningful and relevant in a person’s life (Carey &amp;Russell, 2002).</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">In addition, once a problem and its specific components have been externalized, clients can be invited to notice opportunities to take action against the externalized problem (Tomm, 1989). In an early paper by Michael White, he addressed the problem of schizophrenia with a client, asking the following narrative-inspired questions designed to internalize personal agency (White, 1987):</span></p><span data-dcnode-id="1281" instrument_node="">
</span><blockquote data-dcnode-id="1278"><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">If it was possible to do so, would you like to limit the influence that schizophrenia has been on your life?… Can you see how schizophrenia has been coaching you into withdrawing and avoiding people?… How did you manage to defy schizophrenia’s instructions to avoid people and come to this meeting today?… What do you imagine this might tell you about your ability that you might not otherwise have noticed?… In what other ways have you stood up for yourself and not let schizophrenia push you around?… How ready are you to take a further step against the withdrawal habit that has such a grip on you?… Would you prefer to be a weak person with a strong habit or a strong person with a weak habit?… When you submit to schizophrenia’s efforts to push you into an unreasonable position, how does this invite your parents to do all the reasoning for you? (p. 19)</span></p></blockquote><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Such a line of questioning is a dramatic departure from what might be considered more traditional ways of working with a schizophrenic client. The client is being challenged to think about his own relationship with schizophrenia; as if the disorder was something distinct or external to him. The aforementioned questions are designed to be reflexive; meaning they allow the listener to ponder her/his role in the meaning of the question. From a narrative stance, a therapeutic assumption is that the very nature of these questions infuses the notion that the client indeed has choices, and that the client is an active agent in the course of her own life; even when facing challenges such as those involving schizophrenia (Tomm, 1989).</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">When questions strike a meaningful chord with a client, the questions’ implied notion of individual choice is internalized as part of the patient’s evolving identity. This can also constitute a new and powerful experience which can be used as part of a burgeoning alternative story. Such therapeutic conversations are designed to foster personal empowerment and lead to a heightened sense of personal agency.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">In their article on exploring externalizing practices with families that have difficulty internalizing their own competencies, Kahle and Robbins (1998) illustrate how externalizing the success a family experiences can be useful in inviting the family to internalize their own competencies. They view the externalization of family successes as an additional use for externalized conversations; one less discussed in narrative literature. Whereas the process of externalizing the problem involves making the problem a separate entity from the client in order to depersonalize the problem, Kahle and Robbins (1998) suggest that,</span></p><span data-dcnode-id="1268" instrument_node="">
</span><blockquote data-dcnode-id="1265"><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Externalizing the success is an associated concept that is employed in order to counter another type of depersonalizing. Some families are not willing or able to take responsibility for victories over the problem. When asked questions designed to elicit the meaning that they have made about these victories, some families respond by providing explanations that negate their own involvement in these unique outcomes. In other words, the reasons the family provides for these unique outcomes are often externalized and, thus, depersonalized (p. 63).</span></p></blockquote><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Externalizing successes is seen as a supplement that can be useful to assist clients in the process of internalizing personal agency. It is not meant as a replacement for externalizing problems (Kahle and Robbins, 1998). Externalizing successes is illustrated in the following example:</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">A family consulting a narrative therapist about their problematic relationships with one another engages in externalizing conversations about the effects of anger and disapproval in their lives. As the effects of these problems are mapped out, the family discovers that there have been times when the problems have not been present or their influence has been minimized. In discussing why the problems are absent or reduced at certain times, the family may be reluctant or unable to articulate qualities within themselves that have assisted in overcoming the problems’ influence; instead attributing these unique events to chance or external events such as “It was a sunny day and we all felt happy”. At this point the therapist may believe the family members have depersonalized their victories over the problems. In response, the therapist might invite family members to entertain ideas of personal agency via a new externalizing conversation; one focusing on the qualities that led to the victory. Questions might be asked that get the family to ponder their behavior when the problems were absent; e.g. “Johnny, what did you notice about how you were feeling when the anger had less of a grip on you?” Johnny may respond, “I think I was being patient with my sister instead of reminding her of all the mistakes she usually makes.” If other family members agree on the role of patience in stemming the anger and disapproval, the therapist may chose to externalize the successful concept of patience in further discussions with the family. The therapist may ask, “What is happening when you are being patient? Where did this idea of patience come from?” and so on. The intention is to invite the family into externalizing conversations about the role and effects of the desired quality of patience so as to assist family members in the process of internalizing personal agency over the problems of anger and disapproval.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h4 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Not Assigning Causation to Problems</span></h4><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Externalizing conversations are typically thought of as benefiting the client. For instance, externalizing practices create a forum where people can become less identified with their problems or constraints, and alternative stories are allowed to take shape (Freedman &amp; Combs, 1996; Madsen, 1999). Yet, externalizing practices also provide a unique perspective on problems and opportunity for the therapist as well. Amundson, Webber, and Stewart (2000) point out that,</span></p><span data-dcnode-id="1252" instrument_node="">
</span><blockquote data-dcnode-id="1249"><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Externalization “passes over” having to ask a problem from where it comes, avoiding the investiture of a problem with too much theory or falling into the danger of “believing leading to seeing.” To speak of the problem as a thing in itself permits us the most powerful ethical position we [therapists] can assume: to not inadvertently cooperate with any definition of the Other, no matter what the psychological, sociological, or political correctness offered by a particular symptom or theoretical system happens to be (p.27).</span></p></blockquote><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The practice of psychology often lends itself to theorizing about the origins of clients’ problems; with or without their consent or agreement. For instance, systems theory may find causation within the family system; whereby the problem or symptom needs to exist in order to maintain the family homeostasis. In psychoanalysis, problem formulation is an essential part of the work. The problem may be interpreted as a symptom of an underlying characterological pathology that has its origins in repressed childhood experiences.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">However, externalizing conversations afford the narrative therapist a unique opportunity, “of not having to choose, not having to impose any single rendition, whether parent conflict, attention seeking, structural analysis, or psychological diagnosis” (Amundson, Webber, &amp; Stewart, 2000, p.27). Externalizing practices allow for a non-deciding stance on the part of the therapist. They can also disarm internalizing discourses that seek blame for the problem’s existence (Morgan, 2000). Meanwhile the vigor of the therapy is maintained by turning over to the client (typically through the use of narrative-inspired questions) the important task of making sense of the problem, bringing it to life, detailing its history, and eventually tailoring appropriate measures for responding to the problem or constraint.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Externalizing allows for “theoretical pluralism” in regards to a problem’s possible origins and permits the therapist to be a “theoretical conscientious objector” (Amundson, Webber, &amp; Stewart, 2000). In this way, the practice situates the therapist in a position that honors the poststructuralist perspective espoused by narrative therapy – whereby the myriad forces that shape the meanings we bestow our lives can be accounted for.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h4 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Making Deadly Issues More Discussable</span></h4><span data-dcnode-id="1236" instrument_node="">
