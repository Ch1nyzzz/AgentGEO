</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Problems often have a grim and oppressive quality to them. By the time a person or family has reached the point of seeking consultation, they may be immobilized in the face of the problem. The problem(s) may feel like the dominant force in their lives. From a narrative perspective, the therapist wishes to respect the seriousness of the problem, yet the oppression and the immobilization it tries to foster are forces that are sometimes best to counter.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">A narrative perspective often seeks to counter the oppressive nature of problems by employing externalizing practices in a way that reduces the deadly effect of the problem, thus reducing the grip it has on an individual or family and allowing for space to be created whereby changes can be made. This may mean using play, humor, irony, lightheartedness, etc. in the discussion of the problem or constraint.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Particularly in the narrative-based literature on working with families (e.g. Freedman, Epston, &amp; Lobovits , 1997; Selekman, 1997; Nylund, 2000) practitioners discuss the importance of playfulness and creativity in facing serious problems. Making deadly issues more discussable often surfaces with families due the presence of children in the family and their unique developmental stages and family roles.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">In fact, White (2000) notes that it was with children that he first began exploring the possibilities of externalizing conversations. Based on his sense of success with children, he expanded the practice to his work with adolescents and adults. Reflecting on children’s ability to engage in externalizing processes, White (2000) was struck by…their sheer delight in entering these more imaginative ways of speaking about what were so often considered to be deadly serious problems; and their joy in stepping into these conversations in ways that defied many a prediction about their continuing inability or powerlessness to address this predicament or that (p. 5).</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Provided an opportunity, many children prefer to interact in a playful manner (Freeman, Epston, &amp; Lobovits, 1997). Engaging children in a dialogue-saturated methodical and problem-solving manner often results in a child’s disengagement from the therapeutic process. Freeman, Epston, &amp; Lobovits (1997) address the need for playfulness and creativity when tackling deadly issues with families in the following way:</span></p><span data-dcnode-id="1221" instrument_node="">
</span><blockquote data-dcnode-id="1218"><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The price of choosing seriousness for us as therapists may be the dampening of our own resources, such as the ability to think laterally, remain curious, be lighthearted enough to engage playfully with a child, and have faith that the situation is resolvable. Lacking these, we may have our wits dulled, lose our appeal to kids, or become overwhelmed. Do we dare to be playfully creative in the face of worrisome problems? What happens when we engage our imagination, humor, and resourcefulness in opposition to the deadly seriousness of problems? We believe this leads to the rise of inspired problem-solving and the downfall of serious problems (p. 3).</span></p></blockquote><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Too serious an approach on the part of the therapist may work to the advantage of the problem, particularly if the risk is of excluding or alienating the children of families who are seeking assistance. Freedman, Epston, &amp; Lobovits (1997, p. 4) further suggest that, “When children and adults meet, play provides a common language to express the breadth and depth of thoughts, emotions, and experience; in this way, we share a lingua franca.”</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">While there are many approaches to making deadly issues more discussable, the use of externalizing conversations is widely discussed in the literature as a vehicle for making problems less serious, lighthearted, more discussable, and ultimately defeatable. As White (1989/1997, p. 6) has observed, externalizing conversations, “frees persons to take a lighter, more effective and less stressed approach to deadly serious problems.”</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The literature also discusses creative non-verbal methods of externalizing that involve tasks such as art and family activities. For example, Selekman (1997) points out that,</span></p><span data-dcnode-id="1208" instrument_node="">
</span><blockquote data-dcnode-id="1205"><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Having the child go to combat with his or her family against the problem in the form of a family ritual or externalize the presenting problem in the form of a drawing on paper taps into the child’s spirit of fun, which helps lead his or her family in the direction of change (p. 119).</span></p></blockquote><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Again, it is at the intersection of playfulness and creativity that the entire family can join together and constructively address the constraints they face. Moreover, such externalizing practices act to lift the weight of shame and blame off of both children and adults in a family.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><h4 data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Acting as an Oppositional or Anti-Language</span></h4><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The narrative stance is one that is situated in a social constructionist framework; i.e. that our sense of what is “real” in the world and who we are (as individuals and as a society), is constructed by the language we use and the stories made possible through the use of this language. An impetus of narrative therapy is to call into question (i.e. deconstruct) not only dominant stories we might subscribe to, but also the dominant forms of discourse used to construct these stories as well (White &amp; Epston, 1990; White, 1995; Freedman &amp; Combs, 1996; Maisel, Epston, Borden, 2004).</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">If externalizing conversations are a workhorse of narrative therapy, one of their most powerful utilities is the manner in which they operate as an oppositional language to dominant discourses (White &amp; Epston, 1990; White, 1995; Freedman &amp; Combs, 1996). White (1995) remarks that a key point about externalizing conversations is how they introduce novel ways of thinking and speaking about a given problem, as well as alternative ways of acting in relation to the problem or constraint. He goes on to suggest that, “In promoting these externalizing conversations, we are engaged in an activity that is not entirely a pro-cultural activity (White, 1995, p. 42). This activity challenges the taken-for-granted cultural-bound ways of speaking about people’s lives and relationships. Epston (2005) eloquently adds to this theme by succinctly proposing;</span></p><span data-dcnode-id="1192" instrument_node="">
</span><blockquote data-dcnode-id="1189"><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">As an anti-language its purpose is to make trouble for particular meanings, which have been disguised as universal, masqueraded as timeless, or taken on the guise of “nature” or naturalness. Another purpose is to challenge the guarantee of any structure of meaning; language, code, dialect; as being decisive and definitive (Epston private notes, 2005).</span></p></blockquote><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Externalizing conversations are a method for exposing that which is often hidden and presupposed in the taken-for-granted dominant language/discourse intertwined with our culture (White, 1995). The anti-language collides with the dominant language, exposing the hidden meanings, presenting a client with unmistakable juxtapositions by which to view the dominant language that has heretofore immersed their worldview. Externalizing conversations have been envisioned as a way to “exoticize the domestic” by inviting people to identify and unpack the cultural knowledges they live by (White, 1993, p.39).</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">The practices associated with externalizing problems are considered therapeutic counter-practices to the dominant culture. They engage people in a process with the intention of de-objectifying themselves and each other, and make room for the possibility for alternative life choices. As Pare and Lysack (2004) point out, “Externalizing talk is one example of the deliberate use of language as a “tool” or scaffold by which we [i.e. therapists] are acting into the conversation with the intention of inviting a person to entertain new possibilities.”</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The anti and the dominant discourses generate “colliding worldviews”, each fraught with its own implications, both contesting for the speaker’s adherence (Epston, 2005). From the clients’ perspective, what is presumed to arise from such a collision is a unique therapeutic opportunity to understand problems, realize that options exist, mount counterstrategies against said problems, and create new linguistic tools for constructing alternative meanings and stories.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Through engaging in an anti-dominant language discourse, people are more prepared to separate from and objectify the problem(s) and devise an anti-problem stance. This anti-problem stance is often overt and combative in the way it speaks against and opposes the dominate language, particularly when dealing with deadly problems such as anorexia/bulimia, alcoholism, domestic violence, etc. When discussing the oppositional language, Maisel, Epston, &amp; Borden (2004) stress that,</span></p><span data-dcnode-id="1176" instrument_node="">
</span><blockquote data-dcnode-id="1173"><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The main purpose of anti-a/b [anorexia/bulimia] language is the rolling back of the power of a/b, the re-voicing of the person, and the recreating of her world. Through this anti-a/b language, the person returns to the position of a critic of a/b and an advocate for herself and others who have been subjected to the abuses of a/b’s power (p.84).</span></p></blockquote><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">But in confronting the condemning and marginalizing discourse of the problem’s dominant language, externalizing conversations can have a surprising tone as they inquire in ways that seek to counter the effects of the problem discourse. As a practical example of externalizing conversations as an anti-language tool, consider Maisel’s comments on the ways in which challenging the rhetoric of anorexia/bulimia requires an anti-language:</span></p><span data-dcnode-id="1169" instrument_node="">
</span><blockquote data-dcnode-id="1166"><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">If a/b [anorexia/bulimia] speaks with arrogant authority, then Anti-anorexia speaks with humility, raising questions rather than issuing pronouncements. If a/b evaluates and degrades the person then an Anti-a/b language allows for the appreciation of the person and the critical scrutinizing of a/b. If a/b inscribes itself into the identity of the person, then Anti-a/b will expel anorexia from that identity and locate it in social and political contexts (Maisel, personal communication, May 24, 2005).</span></p></blockquote><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Lastly, while the anti-language must continually be constructed, it provides a “structure of resistance” that stands in opposition to the dominant structure (Epston, 2005). Condemnations and dead ends offered by the dominant discourse can be provided new, richer life-enhancing forms of expressions.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><h4 data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Researching the Narrative Therapy Approach</span></h4><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Art and science are not enemies. The painter operates within the bounds of physical laws; blue and yellow make green; when two objects occur in close juxtaposition, they appear related, and so on. The effective artist works within these laws to apply novel contexts and interpretations. In the same way, the effective [evidence based] therapist is more than a technician who applies sterile technologies to solve problems (Beutler, Bongar, &amp; Shurkin, 1998, p. 75).</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The above quote is an artful and in some ways hopeful interpretation of the relationship between practitioner and researching communities in psychology. But in practice, sometimes the rules of painting don’t adequately apply.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">This section seeks to explore the various ways and degree to which narrative therapy has been researched, with particular emphasis on externalizing practices when applicable. The results have implications on the manner in which the use of externalizing is understood, as well as wider inferences about the future relations between narrative and research practices.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Overall, compared to other therapy approaches, narrative therapy has been receiving only modest attention in the research. Research focusing extensively on externalizing practices is even slimmer, with many of the relevant studies either giving externalizing only a basic discussion or evaluating its usefulness in conjunction with other forms of treatment such as group therapy, psychoeducation, etc. Evidence of the usefulness of externalizing is mixed. Some studies suggest clients find it much less important than other identified aspects of therapy, while other research implies that it has notably useful and distinct effects that warrant further investigation.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><h4 data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Establishing a Narrative Perspective on Research</span></h4><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">The narrative tradition emphasizes a distinct set of values for both research and practice. A review of the literature reveals that a pivotal source of concern among narrative-inspired therapists has to do with how “traditional” research practices privilege professionals’ interpretations and understanding over those of clients (White, 1995; Epston, 2001; Gaddis, 2004).</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Therapeutic ideas and practices have historically been influenced and constructed primarily by professionals in the field; whereas those subject to this expanding therapy knowledge historically have had little voice over what has been helpful or hurtful (Gaddis, 2004). The narrative worldview actively takes a stand against this precedent. Gaddis (2004, p.38) stresses that his perception of a narrative worldview assumes that “clients do not make sense of therapy in the same way that I do.” Consequently, he situates his narrative stance in a way that never assumes he as a therapist knows what is most helpful for clients. Clients must be intimately involved in their own therapeutic construction (Gaddis, 2004).</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">The intimate involvement of both client and therapist has widely been referred to as co-research within the narrative community (for example, White, 1995; Epston, 2001; Maisel, Epston, &amp; Borden, 2004). This mode of working has an emerging tradition within the narrative community as both a research methodology and a therapeutically minded way of conducting therapy consultations.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h4 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Impact of the “Interpretive Turn.”</span></h4><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">The narrative therapy tradition ushered in by practitioners such as White and Epston was heavily influenced by developments in the field of cultural anthropology. For instance, in the 1970s and 80s a dramatic development known as the “Interpretive Turn” took shape in the field of cultural anthropology, which had subsequent repercussions in the development of social work and therapy (Denborough, 2004).</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">According to Denborough (2004), this movement was associated with cultural anthropologists Clifford Geertz (1983), Renato Rosaldo (1992), Edward Bruner (1986), Victor Turner (1986), and Barbara Meyerhoff (1982), among others. Questioning what had widely been accepted practice in anthropology, these authors proposed that it was impossible for anyone to have an objective view in their research. They showed how anthropologists subjectively shape their research and in turn influence the communities they seek to study (Denborough, 2004). They called into question the presumed objectivity of the anthropologist, and stressed that their field must acknowledge how their own cultural beliefs, practices, ethnicity, etc. influence their research.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">In response to the embedded interpretative nature of their work, these authors proposed an alternative form of research, a form of ethno-methodology that privileged the meanings and interpretations of the people being studied (Denborough, 2004). This ethnographic methodology called for inviting people of various cultures and groups to interpret and document their own lives and culture. Thus, the “subjects” were to become active research partners, and lend accountability to the research (Denborough, 2004). The narrative therapy concept of co-research has its origins in the Interpretive Turn movement. Co-research is discussed further in a subsequent section.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><h4 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Reconciling research with narrative values.</span></h4><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Earlier in this study, it was discussed how narrative therapy’s poststructuralist and social constructionist ideas seek to uncover taken-for-granted assumptions and respect how knowledge is subjectively constructed. This is in direct contrast to the positivist, scientific method that seeks to discover knowledge that is independent of socio-cultural and historical context. It is from this positivist tradition that psychological research has its roots.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">As mentioned earlier, the narrative worldview is one grounded in the idea that reality and truth are subjectively created constructs, not universal truths to be “discovered.” Observing the relative lack of research and empirical studies supporting narrative therapy, Etchison and Kleist (2000) note that this circumstance may be due to what they see as the constructivist orientation of narrative therapy, which is inconsistent with quantitative research methods . Research objectivity, which is adamantly denied by the constructivist perspective, remains a cornerstone of quantitative empiricism. Etchison and Kleist (2000, p.65) suggest that,</span></p><span data-dcnode-id="1114" instrument_node="">
</span><blockquote data-dcnode-id="1111"><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Constructivist approaches to researching therapy emphasize a qualitative understanding of one’s meaning given to experience (Nelson &amp; Poulin, 1997) in context, without imposing the requirement of researcher objectivity. Participants and researchers in qualitative inquiry are regarded as coresearchers (Gale, 1993) who together explore the meaning of experience. Constructivist-based research places importance on the interaction between participants and researcher as a necessary component for quality data gathering and analysis (Merchant, 1997).</span></p></blockquote><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Gaddis (2004) discusses both his passion for narrative therapy and his interest in formulating a method of research that is both faithful to the narrative worldview and useful for advancing professional therapy knowledges. He presents two qualitative research methods that he believes are in some ways concordant with narrative principles: interpersonal process recall interviews (Elliot, 1986) and grounded theory analysis (Strauss &amp; Corbin, 1990). He employed these methodologies in an earlier study of clients’ experiences of narrative therapy (Gaddis, 2002).</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Interpersonal process recall is a unique type of interview method that uses audio or videotapes to stimulate recollections of past experiences (Gaddis, 2004). Participants watch tapes of past events (i.e. therapy sessions) and describe the experience they recalled during those events. Gaddis (2004) stresses the importance of “de-centering” the researcher’s role in collecting this information. An important feature is to allow the client to reflect freely on their experience, without the researcher guiding or overly-interpreting their responses.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Grounded theory is a methodology that attempts to develop theories that are grounded in the research participants’ own experiences. The role of the researcher is to reflect on the participants’ experiences in a manner that allows these experiences to be organized and categorized. The goal is to develop a coherent body of knowledge or theory that is derived from participant descriptions (Gaddis, 2004). Gaddis found this methodology useful for smaller studies, but ultimately argues that grounded theory risks emphasizing the researcher’s construction of meaning over that of the client.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Muntigl (2004) is also interested in examining narrative therapy, specifically how it facilitates client change. He demonstrates how a linguistic-semiotic analysis of narrative therapy is useful in exposing how the therapist uses narrative practices to assist a client in scaffolding alternative meanings for acting in the world. However, unlike the collaborative approach between researcher and participant that Gaddis (2004) seeks, the approach outlined by Muntigl (2004) focuses on third party observation and analysis of the discourse between therapist and client.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Couture and Sutherland (2004) propose that the methodology of discourse analysis is compatible with postmodern therapies. They see it as interactive between therapist and client, with a focus on the construction of meaning in conversations. Discourse analysis “investigates the specifics of interaction between therapists and clients with the goal of identifying moments or events of change in these interactions” (p.12).</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Whereas Gaddis (2004) appears to be more of a practitioner seeking a research method that fits his view of narrative sensibilities, Couture and Sutherland (2004) appear to take the reverse approach; a research-oriented effort to address the unique sensibilities of postmodern therapy. These two sides may illustrate how some circles of practitioners and researchers are attempting to bridge the gap between the two camps in a way that benefits the lager mental health community.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Overall, while some researchers and practitioners appear to be seeking methodologies for researching narrative therapy, the volume of constructionist-focused qualitative research is modest compared with the much larger thrust of empirically-based research. Etchison and Kleist (2000) also note that only a minority of those seeking training in research methodologies and employed by major psychological journals are experienced in qualitative research methodologies. Consequently, there exists a gap of experience and occasional controversy over what types of research are deemed acceptable within given psychological communities. Michael White (1995) illustrated the perceived divergence between his role as a narrative-inspired practitioner and more formal research methodology in the following manner:</span></p><span data-dcnode-id="1089" instrument_node="">
</span><blockquote data-dcnode-id="1086"><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Those people who are practicing therapy, along with persons who seek therapy, are primary or basic researchers, and those people who collect data in a more formal way are the secondary or supportive researchers. I’ve always been interested in primary research, and find the continual demand from secondary researchers that primary researchers justify their existence to be quite tedious. If the secondary researchers in our field could go further in relinquishing the moral high ground… which would include the rendering transparent of the socially-constructed nature of their enterprise; then what secondary researchers do might become more relevant to what primary researchers do. I am sure they could have a very enriching collaboration (cited from Gaddis, 2004, p.47).</span></p></blockquote><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">As discussed in more detail later in this study, there is a growing body of qualitative research designed to evaluate the effects of narrative therapy practices with various populations. These studies appear to be conducted by people who have a basic understanding and respect for the narrative therapy approach. However, they may not operate as passionately within what may be termed the narrative worldview as other narrative-inspired practitioners in the field. Their aspirations may be more research-focused and less political and social. Those conducting the research do appear distinct from those writer/practitioners that are largely responsible for the accumulating body of theoretical and ideological literature that continues to outline the principles of narrative therapy. The impact of narrative’s political and social sensibilities upon its accommodation with research is also explored in further detail in a later section.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">It remains unclear the degree of acceptance the limited body of qualitative research has among those practitioners that have deep-rooted loyalty to key narrative principles such as the constructionist nature of research, locus of power away from the therapist/researcher, etc. In the quote above, White alludes to a promising collaboration between “primary” and “secondary” researchers. The degree to which each side has reached out to each other has historically been limited. Yet, the evidence cited earlier and in later sections suggests that the effort is gaining momentum.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">It is important to note that the defined purview for this study is not intended to fully explore the context of the relationship between narrative therapy and research methodology. But, some mention of it is helpful as it applies to understanding the practice of externalizing and the opportunities for researching its effects. A concluding section in this study will evaluate the degree to which the written-about claims of usefulness for externalizing practices are supported by some manner of organized research.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><h4 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The effects of political and social views about therapy.</span></h4><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">At this point it is useful to add a point of qualification onto the conclusions drawn by Etchison and Kleist (2000). These authors focus primarily on the manner in which the constructivist values of narrative therapy create trouble for its integration with various research practices. There is another factor at play that may also be an obstruction; namely, narrative therapy’s valuing of the social and political effects of its own practice. The effect of this concern can be illustrated by contrasting narrative therapy with solution-focused therapy. While narrative therapy has had a volatile relationship with research interest and practices, solution-focused therapy has a history of actively embracing various types of qualitative outcome research and actively uses this research to promote the use of solution-focused and brief therapy practices (Miller, Hubble, Duncan, 1996). Similarly, Maione and Chenail (1999) discuss that, “although there have been few qualitative studies that investigate specific therapy models, the solution focused model has been the subject of several studies” (p. 68).</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Solution-focused and narrative therapies share similar postmodern and poststructuralist assumptions about our sense of reality, the social constructionist nature of truth, and the primacy of the client’s involvement in identifying problems and their possible solutions (see de Shazer, 1988, 1993; Miller, Hubble, Duncan, 1996). However, solution-focused therapy appears to put less emphasis on the political and social effects of its practices, whereas loyal adherents to narrative therapy often pay close attention to the injustices and marginalizing qualities of social and political contexts (see Gaddis, 2004; Redstone, 2004). Narrative therapy rejects those culturally accepted research practices that are seen as supporting taken-for-granted cultural norms and that disregard marginalized accounts of ways of living. As such, narrative therapy reaches a philosophical impasse with research that solution-focused therapy may largely avoid.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><h4 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Influence of Narrative-Inspired Co-Research</span></h4><span data-dcnode-id="1064" instrument_node="">
</span><blockquote data-dcnode-id="1061"><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">I have always thought of myself as doing research, but on problems and the relationships that people have with problems, rather than on the people themselves. The structuring of narrative questions and interviews allow me and others to co-research problems and the alternative knowledges that are developed to address them (p.178).</span></p></blockquote><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">The above quote is how Epston (2001) described his interest in co-research. In fact, narrative-inspired co-research has been part of narrative practice since its popular inception (see White&amp; Epston, 1990). Moreover, Freedman and Combs (1996) convey that, “In a very real sense, all narrative therapy is co-research. When we listen carefully to people’s stories we are doing research. When we ask meaning questions and preference questions we are asking people to join us in research” (p.287).</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Epston (2004) has noted that he arrived at the term co-research around 1988-89 when he was working with family members afflicted with a rare skin disorder. He has been prolific in the area ever since; for instance, creating the Internet-based Archive of Resistance: Anti-anorexia/Anti-bulimia website (www.narrativeapproaches.com), and coauthoring a book exploring the use of co-research in assisting people in overcoming anorexia/bulimia (see Maisel, Epston, &amp; Borden, 2004). Indeed, co-research has become a therapeutic methodology to address anti-anorexic/bulimic practices (Epston, 2004). The formal manner in which therapists consult with people about the effects of particular practices on particular problems (Freedman &amp; Combs, 1996) may help to differentiate the look and feel of a co-research project. Another project involving co-research that is more in its beginning phase is the league of deconstructing addiction getting underway at the Dulwich Centre in Adeline, Australia (the website is http://www.dulwichcentre.com.au).</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Co-research is a highly collaborative effort between client and therapist to come to unique terms with a problem(s) faced by the client. What results is a “co-production of knowledge” between the therapist and client (Epston, 2004). This effort typically serves three major purposes. First, co-research assists people in discovering ways of identifying and managing problems, and constructing alternative stories in a fashion unique to each person. Secondly, the project involves documenting (with the person’s permission) the unique journey undergone in naming, addressing, managing, and overcoming the problem. This often takes the form of letters, documents, and posts on the Internet similar to Blogs that constitute what are called “insider knowledges.” Consultations can also take place between people who have experienced a success over a particular problem and those that are still struggling with a similar problem. Third, a co-research project often asks the client to intimately describe what was helpful and unhelpful in the therapeutic process. This information not only benefits the therapist and the wider narrative community, but also serves to level the power hierarchy between therapist and client; which possesses a therapeutic component in itself for the person being consulted. In describing part of the process, Epston (2004) reveals the following:</span></p><span data-dcnode-id="1051" instrument_node="">
</span><blockquote data-dcnode-id="1048"><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">When I first started meeting with these families we engaged in fairly thoroughgoing externalising conversations, in which the problem was a problem for everyone; and here I include myself. These conversations led to the co-production of certain knowledges about the problem, and ways of responding to it, that were of pragmatic value to the families (p.31).</span></p></blockquote><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Indeed, the work by Maisel, Epston, &amp; Borden (2004) is an exemplar of the type of co-research currently being conducted within the narrative community. The process outlined by the authors intimately involves clients in constructing their own experience with the issue of anorexia/bulimia and assists them in furnishing personal accounts of protest against the influence of anorexia/bulimia. This documented work (combining client and therapist accounts) also provides other narrative-inspired therapists with professional knowledges that were derived by client’s own accounts of what was helpful and unhelpful in the course of therapy. Thus, useful and practical knowledge is added to the body of narrative therapy literature in regards to therapeutic work with anorexia/bulimia. The authors’ approach also embodies the kind of research that adheres to narrative principles about the locus of power and professional versus insider knowledges.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Thus, narrative-inspired practitioners have written about the usefulness of co-research in evaluating what was helpful and unhelpful in the therapeutic conversations themselves. In some ways, this has been a part of narrative practice for some time. During narrative therapy sessions, questions are often asked to ensure that the conversation is being experienced by a client as relevant and helpful. At the completion of therapy, questions are also asked that have clients evaluate particular practices and lines of enquiry implemented by the therapist (Epston &amp; White, 1992; Morgan, 2000).</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Interestingly, some within the narrative community may be feeling an inclination to incorporate or construct more clear elements of client-focused research methodology into the narrative approach. Recent literature has been published that seems to join the basic ideas of co-research more intimately with how it might better inform, validate, and expand the professional knowledges and practices of narrative therapists (see Denborough, 2004; Gaddis, 2004; Maisel, Epston, &amp; Borden, 2004; Redstone, 2004; Clark et al., 2000). The intention is to further augment the claims made by narrative practitioners with clients’ documented reactions about the helpful and unhelpful aspects of their therapy experiences.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><h4 data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Reciprocal connection between therapy practice &amp; research methodology.</span></h4><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">As mentioned earlier, co-research has been a practice employed for some time, typically as a collaborative therapeutic effort for the benefit of clients struggling with particular issues. More recently, some narrative practitioners have been actively promoting its usefulness as a style of research that is commensurate with narrative principles of therapeutic change, useful in the construction of professional therapy knowledges, and also amenable to qualitative methods of analysis (see Gaddis, 2004; Clark et al., 2000; Madsen, 1999).</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">The narrative practice of co-research has in some ways become a political and philosophical statement amidst the pervasive traditional understanding of psychological research. For instance, Gaddis (2004) concedes that research is important in formulating therapists’ ideas, yet he expresses that, one of my greatest concerns has to do with how traditional research practices privilege professions’ interpretations and understandings over those of clients. I have attempted to re-consider therapy research so that its main purpose is to honor clients’ accounts of therapy. My hope is that this will enable us as therapists to be taught as much by clients as by other professionals (p. 37).</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Co-research embraces the narrative sensibility of placing therapeutic power in the hands of clients and allowing them to have ownership of how they make sense of and manage their lives. But, the approach outlined by Gaddis cannot help but be political as it actively seeks to hammer out an approach to psychological research that is in many ways distinct from traditional research methodologies, which locate interpretive and prescriptive power in the hands of professionals. If traditionally generated research knowledge seeks an elevated status when it comes to making claims about what is “true” (Gaddis, 2004), than the narrative enterprise of co-research makes an effort to deny that notion or at least to reduce the implicit hierarchies of power and knowledge (Clark, Jankowski, Margee, &amp; Springer, 2000).</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Clark et al. (2000) note that, “Despite the increase in alternative forms of participatory research, there is still no clear methodology for including participants as co-researchers in the interview analysis and interpretation process” (p.57). In response, the authors propose structuring a form of co-research into a model of qualitative research methodology that utilizes social constructionist ideas as a foundation. Similar in makeup to later efforts by Gaddis (2004), Redstone, (2004), and Maisel, Epston, &amp; Borden (2004), this method of analysis would go beyond more traditional forms of qualitative analysis by involving participants/clients more intimately in the coding and interpretation process of helpful and unhelpful qualities in the therapy experience. Informed by social constructionist theory, this research method brings together the subjective interpretation processes of both researcher and participant and transforms the research process into more of a relationship than a method. Note the following graphs that illustrate the difference between traditional forms of information analysis and validation, and that allowed under the method of co-research (Clark et. al. 2000).</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">In the traditional model, the principle investigator consults with participants about key themes. But, it is only the investigator that uses the text generated by the participants to determine the final makeup of the research codes and themes.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Within the co-research method, the roles of “expert” and “subject” become more blurred (Clark et. al. 2000). The subjective interpretation processes of researcher and participant are brought together to form a co-research group. The group works together to co-construct, codify, and validate the resulting themes.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Gaddis (2004) is also concerned for the durability of the narrative approach itself. He expresses concern at the large number of descriptive accounts of narrative therapy provided by professionals and the fact that fewer accounts are given by actual clients (Gaddis, 2004). He proposes that co-research, with its emphasis on clients’ accounts of what was beneficial in therapy, can be a research tool that strengthens the professional therapy knowledges within the narrative community in a way that is isomorphic with the community’s view of therapy. In other words, just as narrative therapy emphasizes clients’ construction of solutions to their own problems, so to should narrative-inspired research emphasize clients’ accounts of what is helpful and unhelpful during the process of therapy. Such practices will ensure that professional accounts of narrative theory do not usurp people’s subjective experience of the narrative therapy process.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Overall, co-research can be viewed as a form of research, in that it has a purpose of generating client-oriented accounts about what does and doesn’t work in therapy. This in turn, may be beneficial to professionals who are interested in finding creative solutions to various types of problems and constraints in people’s lives. Yet, its constructionist orientation and purposeful denial of the notion of researcher objectivity continue to place it in a marginalized grouping within the larger research community. In Epston’s discussion of co-research, his view on objectivity is clear. Epston (2004) remarks,</span></p><span data-dcnode-id="1011" instrument_node="">
</span><blockquote data-dcnode-id="1008"><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Unlike conventional research, the process of co-research does not claim to be objective, nor does it aspire to objectivity. The process itself is inextricably entwined with its purpose, which is to generate knowledge that can influence in preferred ways a person’s relationship with the particular issue for which they have sought counseling (p.31).</span></p></blockquote><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Indeed, the impetus behind co-research is often as a therapeutic tool with clients. Here as a final comment, it is worth noting a compelling reciprocal therapy/research characteristic of co-research practices. Some qualitative research suggests that involving clients in the research process as active co-participants produces a therapeutic effect of its own. Maione and Chenail (1999) cite several studies (including Gale, 1992; McNamee, 1988; Wright, 1990) that suggest the intimate and empowering process of researching clients’ perspectives about their therapy can have a therapeutic benefit on its own, even when intervention and change is not the intention of the researcher/interviewer.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">This might come as no surprise to some who practice narrative therapy. Indeed, early in their use of the narrative metaphor with clients, Epston and White (1992) noticed the therapeutic effects co-research had on people: “When persons are established as consultants to themselves, to others, and to the therapist, they experience themselves as more of an authority on their own lives, their problems, and the solution to these problems” (p.17).</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h4 data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The use of externalizing practices in co-research.</span></h4><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">A review of the literature reveals that the practice of co-research is intimately entwined with externalizing conversations. For instance, speaking about the co-research documents within the Archive of Resistance: Anti-anorexia/Anti-bulimia, Epston (1999) remarks that, “the archives can take many forms… but what is common to them all is their manner of speaking; anti-anorexia; an anti-language, a radical form of an externalizing conversation” (p.144).</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Externalizing conversations provide much of the therapeutic power behind co-research practices, particularly when metaphors of resistance are being addressed that allow a client to reverse the vocabulary of self-blame and internalization, and mount a decided protest against a newly objectified problem. Examples of this type of work include that conducted by Maisel, Epston, &amp; Borden, (2004) in the realm of anorexia/bulimia, Nylund (2000) in his work with children diagnosed with ADHD, and Freeman, Epston, and Lobovits (1997) in their creative accounts of working with difficult childhood problems.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Maisel et al. (2004) reveal that externalizing conversations allow for the creation of an anti-anorexia language. They note that:</span></p><span data-dcnode-id="989" instrument_node="">
</span><blockquote data-dcnode-id="986"><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">In order for anti-a/b (anorexia/bulimia) research to bring to light aspects of people’s experience that contradict a/b’s claims and generate meanings that legitimate a person’s own experience, this co-research relies upon the introduction of an anti-language. It is only by supplying an anti-a/b language that the meanings generated by a/b can be rendered controversial and contestable (p.84).</span></p></blockquote><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">It is important that this language is not imposed upon clients. That is where the uniqueness of co-research comes into play. Co-research allows for the active co-production of knowledge by clients and therapists (Epston, 1999). When working with anorexia/bulimia, Maisel et al. (2004) believe that, “the real experts on problems are those people who experience them first-hand” (p.81). Tapping into this experience through co-research allows for local or insider knowledges to be developed. These knowledges are regarded as more trustworthy and more valuable to the therapeutic process than systematized professional knowledges that typically speak for or about people but tend to place minimal value on people’s individualized experiences (Maisel, Epston, &amp; Borden, 2004).</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">In working with families with children diagnosed with attention deficit hyperactivity disorder (ADHD), Nyland (2000) uses a highly collaborative approach with clients similar to co-research. In some ways his approach does differ from that of Maisel et al. (2004) in that he also actively incorporates aspects of solution-focused and collaborate language systems approaches to therapy. Yet, the manner in which client experiences inform his distinctive approach is reminiscent of narrative-inspired co-research.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Nyland (2000) notes that engaging in externalizing conversations is a vital aspect to his collaborative work with families. From the initial session, he seeks to use externalizing language to explore with families their understanding of the identified problem(s) and to get their personal accounts. Each family interprets the diagnosis of ADHD differently, and Nyland (2000) stresses that before exploring a family’s unique resources for managing their lives, he must work collaboratively in defining and documenting the problem. His book provides a comprehensive account of his approach to working with those children and families living with an ADHD diagnosis. Similar to the work of Maisel et al. (2004), Nyland’s (2000) collaborative approach is propelled less by psychological theory and more by clients’ own accounts of their experiences.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The work by Freeman, Epston, and Lobovits (1997) emphasizes playful and creative methods of working with children and their families. It also represents another collaborative therapeutic effort between therapists and clients that is influenced by co-research. As with the narrative tradition, clients’ views of problems and distinctive solutions are solicited and encouraged. Externalizing conversations help bring to life the creative metaphors that allow these children and families to identify, track the effects of, and mange their relationships with problems in their lives.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Moreover, Freeman et al. (1997) discuss how they work with clients to document their accounts of reclaiming their lives from problems. As can occur in a co-research framework, children sometimes act as consultants (either in person or in writing) to other children and families suffering from similar issues. What results are accounts of what proved useful for particular people facing a range of issues. What is common among these accounts is the externalizing fashion in which families relate to the issues for which they sought assistance.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">As detailed above, externalizing conversations are integral to co-research practices. But, there is another aspect to this relationship. Co-research has also been used as a research methodology to explore and expand on the therapeutic uses of externalizing conversations.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">For example, Stacey and Hills (2001) employ co-research to investigate the helpful and unhelpful ways externalizing has been used during therapy sessions. Externalizing often employs the use of metaphors; for instance the metaphors of resisting, overcoming, protesting, battling, coming to terms with, or learning to live with a particular problem, constraint, or issue. The authors believe that some narrative therapists restrict themselves in the diversity of metaphors used with clients when defining a client’s relationship to a particular problem. They note the popular usage of the protest metaphor; the idea that person should protest the existence of a problem, stand up to it and seek to eradicate its presence (Stacey &amp; Hills, 2001).</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Through their co-research, they come to conclude that this metaphor alone does not adequately represent the breadth or creativeness of narrative work (Stacey &amp; Hills, 2001). Sometimes the protest metaphor is not the best fit with clients who seek alternative kinds of solutions to problems and issues. Co-research allowed therapist and client to work first-hand in developing an appropriate metaphor for their desired relationship with a problem. For instance, they discuss how the metaphor of balancing might be useful when a client seeks to confine a problem to the positive part it may play in their life. Balancing may prove useful in cases where the issue is something like altruism, over-responsibility, or worry (Stacey &amp; Hills, 2001).</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">A goal of the authors is to forward and enliven narrative ways of working while avoiding transforming narrative theory into an ideology. Joining with clients to produce both client-specific knowledges, but also wider professional knowledges that may educate other narrative therapists helps to keep the focus of the work on the client and less on what narrative or externalizing theory teaches.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">In a similar fashion, Freeman, Epston, and Lobovits (1997) warn that aggressive, “power over the problem” metaphors might be restrictive. Referring to aggressive and combative externalizing metaphors, the authors suggest, “They may also, through their heavy-handedness, discourage a lighter or more playful approach” (Freeman, Epston, &amp; Lobovits, 1997, p.62). Arriving at this conclusion, the authors recommend that it is important to collaboratively consult with clients about their preferred metaphors and how particular descriptions may be rooted in culture and gender (Freeman, Epston, &amp; Lobovits, 1997).</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">To conclude this section, it is worth mentioning a final relationship between externalizing practices and co-research. White and Epston (1990; Epston, 1999) suggest that the research process itself might create a form of externalization, particularly by having the problem and the experience of therapy be spoken about in an objectifying manner. An example might be when a family returns for a follow-up exploratory (co-research) session following the completion of therapy. The intention may be to gather first-hand client accounts of what was helpful and unhelpful during the therapy process. The act of and manner in which family members speak about the therapy experience, in itself, externalizes and objectifies that experience. They may speak about the experience as something external to them that had distinct effects; some helpful, others unhelpful. As part of this process, the problems and issues that brought the family to seek consultation in the first place are inclusively externalized since their presence was part of the therapy experience. Thus, the co-research process itself can reinforce the therapeutic value derived from the externalizing conversations that took place during and following therapy.</span></p><span data-dcnode-id="952" instrument_node="">
</span><h4 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Types of Research into Narrative Therapy</span></h4><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Since the early 1990s there has been a steady but limited effort to employ outcome research to evaluate the effectiveness and therapeutic qualities of narrative therapy. These efforts have typically included various forms of qualitative studies (particularly based on ethnographic and grounded theory approaches), and a limited number of mixed method studies utilizing a combination of quantitative and qualitative strategies. Small scale case studies (five or fewer participants) are also a popular approach to evaluating narrative therapy. In several case studies, narrative methods are mixed with other therapy approaches such as motivational interviewing (Cowley, Farley, &amp; Beamis, 2002), group therapy techniques, psychoeducation (Fristad, Gavazzi, &amp; Soldano, 1999), and even psychodynamic theory (Diamond, 2000). No pure quantitative studies were found.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">However, compared to the torrent of research that has been conducted over the last twenty years on cognitive based and other therapies (CBT, DBT, etc.), the amount focusing on narrative-inspired therapies is essentially a trickle. From a wider vantage, narrative therapy seems to be largely sitting on the shoreline operating within its own worldview as the stream of psychological research washes by. Certainly there exist (and this study has pointed out) fundamental narrative principles that often conflict with predominate styles of research methodology.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Five years since its publication, Etchison and Kleist’s (2000) article remains one of only a handful of scholarly articles to tackle the issue of research into the effectiveness of narrative therapy, and is regularly cited in dissertations and scholarly articles. As discussed earlier, the authors detail some of the values and ideas of narrative practice that are often at odds with research practices; for instance the fact that notions of empiricism are at odds with constructionist principles. Etchison and Kleist (2000) also suggest the paucity of research on narrative therapy is due to a lack of training in qualitative methodology among aspiring researchers.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">An overall conclusion by Etchison and Kleist (2000) is that, “support for the use of narrative approaches with families is at best tentative given the small number of clinical studies” (p.65) However, the authors also indicate, based on their own review of available research, “that narrative approaches to therapy have useful application when working with a variety of family therapy issues” (p. 65). They further propose that, “narrative therapy is based on principles that are congruent with context-sensitive research methodologies (e.g. ethnographic, grounded theory) that deemphasize generalizability” (p. 65). In other words, they see a fit for qualitative research with narrative principles, and they recommend that narrative practitioners be sensitive and flexible to the unique dynamics of each client or family.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">The enterprise of psychological research has indeed evolved over the last twenty years. Recent literature has explored ways of mending the gap between researcher and practitioner in regards to the use of postmodern therapies and research methodologies (see Clark et. al., 2000; Couture &amp; Sutherland, 2004; Hertlein, Lambert-Shute, &amp; Benson, 2004). Nevertheless, it is unclear to what extent such notions are accepted. The friction addressed by White (1995) between researcher and practitioner appears to remain in existence to varying degrees.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">This study proposes that the conditions outlined by Etchison and Kleist (2000) have likely only modestly changed. There still appears to be a dearth of qualitative research assessing the use of narrative therapy. Moreover, much of the qualitative work continues to be smaller scale efforts or case studies that provide less robust findings for others in the psychological field to examine. Those researchers that do incorporate narrative practices into qualitative or mixed methods studies often discuss and utilize narrative therapy more in the context of a set of techniques.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">This is in contrast, and in most respects contrary, to the beliefs of those practitioners that fashion narrative therapy within a larger worldview and reject the idea that narrative therapy can effectively be boiled down to a set of techniques (see White &amp; Epston, 1990; Freedman &amp; Combs, 1996; Gaddis, 2004; Redstone, 2004). Many of these practitioners are understood as the driving force behind the development of the narrative model of therapy. Similarly, their views have been among the most outspoken in how traditional and systematized research practices are in conflict with the social, political, and therapeutic principles of narrative therapy.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Thus to some extent, distinct communities are involved in the use of narrative therapy. The split is not simply between researcher and practitioner, but also between those practitioners who view narrative as a potentially useful set of techniques and those that embrace it for its larger philosophy and worldview. The current relationship between the various communities appears to be less an effort to reconcile differences, as Etchison and Kleist (2000) suggest is feasible. Instead, each community is using narrative therapy for their own pursuits; whether it is to generate mixed methods of outcome-based research or to broaden narrative’s application as a comprehensive approach and worldview.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Lastly, as mentioned earlier, there appears to be an invigorated effort within the narrative community to utilize co-research as a tool for building upon professional knowledges in a manner congruent with the narrative sensibilities (see Denborough, 2004; Gaddis, 2004; Maisel, Epston, &amp; Borden, 2004; Redstone, 2004; Clark, Jankowski, Margee, &amp; Springer, 2000). These efforts only partially fit with more commonly recognized qualitative research methodologies. Such work will certainly be of value to those already loyal to narrative principles, but it remains to be seen if such efforts grab hold of a larger audience beyond the narrative community.</span></p><span data-dcnode-id="922" instrument_node="">
</span><h4 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Evaluating narrative therapy in general versus specific practices.</span></h4><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Many of the available qualitative studies also tend to focus on the narrative approach in general, as it applies to specific problems or populations. Narrative therapy’s application in specific clinical environments may be useful, as Etchison and Kleist (2000) suggest that narrative therapy has the flexibility to be tailored to specific client needs. Thus, such studies allow for unique outcomes and descriptions of how narrative practices can inform therapists and assist clients and families.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">However, only broadly assessing the narrative approach, rather than expending some effort researching and documenting specific narrative practices, such as externalizing conversations, has limitations, and may have be doing a disservice to the narrative community. White &amp; Epston (1990) have consistently held that narrative ideas are not simply techniques. Rather, they represent an overall approach that embraces a particular worldview based on poststructuralist and social constructionist principles about our sense of reality, as well as concern over the social and political implications of such a worldview.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Nevertheless, an argument can be made that the various practices of narrative therapy can be broken down, discussed, and their effects evaluated; such as the focus of this study on the use of externalizing practices. By evaluating the therapeutic effects of various narrative practices (such as externalizing), the psychological community can have a greater understanding of, and appreciation for, the distinct qualities that comprise the narrative approach to therapy.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Indeed, it appears that those who engage in narrative-inspired co-research have made significant efforts to examine the effects of specific narrative practices with clients, often so therapists can face “the moral and ethical implications of their practices” (White, 1993, p.57). However, these results are not presented as a comprehensive manner of research into the effectiveness of particular practices. The work by Maisel et. al. (2004) with anorexia/bulimia appears to be the closest approximation of documenting a narrative-inspired style of research. Thus, it remains to be seen if this methodology can be further developed and become recognized by a larger psychological community. The friction between what White (1995) referred to as “primary” and “secondary” researchers may remain a serious obstacle.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h4 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Research on externalizing practices.</span></h4><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">No qualitative or quantitative research study was found that focused predominately on the practice of externalizing and its therapeutic effects. Nevertheless, an accumulating body of qualitative research has been conducted that include data on or discuss externalizing practices as part of larger studies and findings. Many of these studies examine narrative therapy in a more diffuse sense, where components of narrative such as externalizing, co-construction, and developing personal agency are mentioned as part of the approach, but not explicitly examined for their individual effects or contribution. Often, the studies are attempts at assessing (qualitatively) the effectiveness of using narrative approaches with specific kinds of problems or populations. The following is a review of several of these studies, with emphasis placed on findings related to externalizing practices.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">In one of the few more comprehensive qualitative studies that highlight clients’ experience of externalizing practices, O’Connor, Meakes, Pickering, and Schuman (1997) examined families’ perceptions and attributed meanings of their experience in narrative therapy. The study sought to discover what families found helpful (i.e. therapeutic) and unhelpful in their experience. The selected families presented with a host of problems including conduct disorders, family violence, school problems, grief associated with parental death or divorce, aggression towards siblings, etc. These families were selected because they were being seen in family screenings by the narrative team at a university hospital outpatient clinic. Each family was in various stages of treatment, covering a span of 6 to 16 sessions over the course of one year.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The researchers used an ethnographic design guided by the question, “What is the family’s experience of narrative therapy?” The authors decided on this design for three reasons (O’Connor, Meakes, Pickering, &amp; Schuman, 1997): (1) The research question required the possibility of a complexity of responses. Ethnographic research allows for such complexity. (2) The practice and process of narrative therapy has many similarities with an ethnographic interview. This type of qualitative research methodology is isomorphic with narrative practice. (3) Consistent with the role of clients in narrative therapy, ethnographic research allows for persons not to be regarded as subjects, but rather as participating co-researchers.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">The authors asked four general questions; designed to elicit rich descriptions from the clients about their experience in narrative therapy. The questions were, “1) What has been helpful in the therapy? 2) What has not been helpful in the therapy? 3) What is your overall experience of narrative therapy? 4) What is an image or symbol to describe your experience of therapy?” (O’Connor, Meakes, Pickering, &amp; Schuman, 1997, p.483). These primary questions included subsequent questions designed to facilitate enriched descriptions of the experience.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The data gathered from the audiotape interviews was coded using latent and manifest content analysis. The codes were developed using an inductive grounded-theory approach that examines written text and notes themes, commonalities, differences, and organizes them into common codes. The researchers then used a deductive method to measure the number of times each code appeared in the interview data.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Six major themes emerged from the data. They were: (1) externalizing conversations, (2) unique occurrence and alternate stories, (3) developing personal agency, (4) discussion of consulting and reflecting teams, (5) the narrative practice of audience;building, and (6) the helpful and unhelpful aspects of therapy.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Externalizing conversation was mentioned the least (15 times during the interviews). Developing personal agency and consulting/reflecting teams were mentioned the most (45 and 46 times, respectively).</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Overall, the authors conclude that the practice of narrative therapy provides an excellent context for the ideas and practices that empower personal agency in family members. All the families reported some reduction in the presenting problem. The authors also suggest that the ethnographic method is congruent with the narrative worldview. The client’s experience in evaluating effectiveness of therapy was the core of the research. They note that the data supports the practices of building personal agency, reflecting and consulting teams, and externalizing conversations. Clients cited these three elements the most times. Interestingly, the authors call attention to the following:</span></p><span data-dcnode-id="880" instrument_node="">
</span><blockquote data-dcnode-id="877"><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">The areas that clients notice the most in narrative therapy are personal agency and reflecting and consulting teams. The area they noticed the least is the externalizing conversation. What role does the externalizing conversation play in the therapy? Further research is needed (O’Connor, Meakes, Pickering, &amp; Schuman, 1997, p.492).</span></p></blockquote><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Regarding clients’ comments on externalizing conversations, the authors did not attempt to draw out the therapeutic qualities noticed by the clients. However, they make the tantalizing comment that, “the use of externalizing conversation in conversing about the problem often requires a cognitive shift for clients. Once the shift has occurred, there is often a great reduction in the problem” (O’Connor, Meakes, Pickering, &amp; Schuman, 1997, p.492). They suggest that externalizing aided in a cognitive therapeutic shift, yet they neglect to discuss the topic further.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">The authors did include numerous quoted examples of clients’ responses to each of the six coded themes. An examination of the included client quotes regarding externalizing conversations indicated that the major therapeutic themes seemed to be that externalizing helped to, 1) reduce blame for the problem, and 2) make the topic of the problem more discussable by reducing some of the emotional tension. Of course, this analysis of selected quotes is quite informal and limited. But, it possibly points to a useful methodology (ethnography) and data source for a more detailed examination of the therapeutic qualities of externalizing conversations.</span></p><span data-dcnode-id="870" instrument_node="">
