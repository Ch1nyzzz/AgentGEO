</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="456" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="465"><p data-dcnode-id="2773"><b data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Narrative paradigm</span></b><span data-dcnode-id="2804" instrument_node=""> is a communication theory conceptualized by 20th-century communication scholar </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Fisher_%28professor%29" title="Walter Fisher (professor)"><span data-dcnode-id="2803" instrument_node="">Walter Fisher</span></a><span data-dcnode-id="2801" instrument_node="">. The paradigm claims that all meaningful </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communication" title="Communication"><span data-dcnode-id="2800" instrument_node="">communication</span></a><span data-dcnode-id="2798" instrument_node=""> occurs via </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Storytelling" title="Storytelling"><span data-dcnode-id="2797" instrument_node="">storytelling</span></a><span data-dcnode-id="2795" instrument_node=""> or </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative" title="Narrative"><span data-dcnode-id="2794" instrument_node="">reporting of events</span></a><span data-dcnode-id="2792" instrument_node="">.</span><sup class="reference" data-dcnode-id="2789" id="cite_ref-ijea_1-0"><a data-dcnode-id="2790" href="#cite_note-ijea-1"><span data-dcnode-id="2791" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2788" instrument_node=""> Humans participate as storytellers and observers of narratives. This theory further claims that stories are more persuasive than arguments.</span><sup class="reference" data-dcnode-id="2785" id="cite_ref-2"><a data-dcnode-id="2786" href="#cite_note-2"><span data-dcnode-id="2787" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2782" id="cite_ref-3"><a data-dcnode-id="2783" href="#cite_note-3"><span data-dcnode-id="2784" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2781" instrument_node=""> Essentially the narrative paradigm helps us to explain how humans are able to understand complex information through </span><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative" title="Narrative"><span data-dcnode-id="2780" instrument_node="">narrative</span></a><span data-dcnode-id="2778" instrument_node="">.</span><sup class="reference" data-dcnode-id="2775" id="cite_ref-ijea_1-1"><a data-dcnode-id="2776" href="#cite_note-ijea-1"><span data-dcnode-id="2777" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2774" instrument_node="">
</span></p><span data-dcnode-id="2772" instrument_node="">

</span><h2 data-dcnode-id="2582"><span class="mw-headline" data-dcnode-id="2590" id="Background"><span data-dcnode-id="2591" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="2583"><span class="mw-editsection-bracket" data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">[</span></span><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="2587" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2580" instrument_node="">The Narrative Paradigm is a theory that suggests that human beings are natural storytellers and that a good story is more convincing than a good argument. Walter Fisher developed this theory as a solution making cohesive arguments. Fisher conceptualized the paradigm as a way to combat issues in the </span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_sphere" title="Public sphere"><span data-dcnode-id="2579" instrument_node="">public sphere</span></a><span data-dcnode-id="2577" instrument_node="">.</span><sup class="reference" data-dcnode-id="2574" id="cite_ref-:0_4-0"><a data-dcnode-id="2575" href="#cite_note-:0-4"><span data-dcnode-id="2576" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2573" instrument_node=""> The problem was that human beings were unable to make cohesive traditional arguments. At the time, the rational world paradigm was the theory used to satisfy public controversies. He believed that stories have the power to include a beginning, middle, and end of an argument and that the rational world paradigm fails to be effective in </span><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sensemaking" title="Sensemaking"><span data-dcnode-id="2572" instrument_node="">sensemaking</span></a><span data-dcnode-id="2570" instrument_node="">.</span><sup class="reference" data-dcnode-id="2567" id="cite_ref-Rowland_204–217_5-0"><a data-dcnode-id="2568" href="#cite_note-Rowland_204%E2%80%93217-5"><span data-dcnode-id="2569" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2566" instrument_node="">
</span></p><p data-dcnode-id="2553"><span data-dcnode-id="2564" instrument_node="">Fisher uses the term </span><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paradigm" title="Paradigm"><span data-dcnode-id="2563" instrument_node="">paradigm</span></a><span data-dcnode-id="2561" instrument_node=""> rather than </span><a data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theory" title="Theory"><span data-dcnode-id="2560" instrument_node="">theory</span></a><span data-dcnode-id="2558" instrument_node="">, meaning a paradigm is broader than a theory. Fisher stated, "There is no genre, including technical communication, that is not an episode in the story of life."</span><sup class="reference" data-dcnode-id="2555" id="cite_ref-6"><a data-dcnode-id="2556" href="#cite_note-6"><span data-dcnode-id="2557" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2554" instrument_node="">
</span></p><p data-dcnode-id="2548"><span data-dcnode-id="2552" instrument_node="">Fisher believed that humans are not rational and proposed that the narrative is the basis of communication. According to this viewpoint, people communicate by telling/observing a compelling story rather than by producing evidence or constructing a </span><a class="mw-redirect" data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logical" title="Logical"><span data-dcnode-id="2551" instrument_node="">logical</span></a><span data-dcnode-id="2549" instrument_node=""> argument. The narrative paradigm is purportedly all-encompassing, allowing all communication to be looked at as a narrative even though it may not conform to the traditional literary requirements of a narrative. He states:
</span></p><span data-dcnode-id="2547" instrument_node="">
</span><ul data-dcnode-id="2507"><li data-dcnode-id="2533"><span data-dcnode-id="2546" instrument_node="">Humans see the world as a set of stories. Each accepts stories that match his or her </span><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Value_%28semiotics%29" title="Value (semiotics)"><span data-dcnode-id="2545" instrument_node="">values</span></a><span data-dcnode-id="2543" instrument_node=""> and </span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belief" title="Belief"><span data-dcnode-id="2542" instrument_node="">beliefs</span></a><span data-dcnode-id="2540" instrument_node="">, understood as </span><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_sense" title="Common sense"><span data-dcnode-id="2539" instrument_node="">common sense</span></a><span data-dcnode-id="2537" instrument_node="">.</span><sup class="reference" data-dcnode-id="2534" id="cite_ref-FOOTNOTEJameson2001_7-0"><a data-dcnode-id="2535" href="#cite_note-FOOTNOTEJameson2001-7"><span data-dcnode-id="2536" instrument_node="">[7]</span></a></sup></li><span data-dcnode-id="2532" instrument_node="">
</span><li data-dcnode-id="2520"><span data-dcnode-id="2531" instrument_node="">Although people claim that their decisions are rational,</span><sup class="reference" data-dcnode-id="2528" id="cite_ref-FOOTNOTEJameson2001_7-1"><a data-dcnode-id="2529" href="#cite_note-FOOTNOTEJameson2001-7"><span data-dcnode-id="2530" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2527" instrument_node=""> incorporating </span><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History" title="History"><span data-dcnode-id="2526" instrument_node="">history</span></a><span data-dcnode-id="2524" instrument_node="">, </span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture" title="Culture"><span data-dcnode-id="2523" instrument_node="">culture</span></a><span data-dcnode-id="2521" instrument_node="">, and perceptions about the other people involved, all of these are subjective and incompletely understood.</span></li><span data-dcnode-id="2519" instrument_node="">
</span><li data-dcnode-id="2508"><span data-dcnode-id="2518" instrument_node="">Narrative rationality requires stories to be </span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Probability" title="Probability"><span data-dcnode-id="2517" instrument_node="">probable</span></a><span data-dcnode-id="2515" instrument_node="">, coherent and to exhibit </span><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fidelity" title="Fidelity"><span data-dcnode-id="2514" instrument_node="">fidelity</span></a><span data-dcnode-id="2512" instrument_node="">.</span><sup class="reference" data-dcnode-id="2509" id="cite_ref-Turner,_Lynn_H._2007_8-0"><a data-dcnode-id="2510" href="#cite_note-Turner,_Lynn_H._2007-8"><span data-dcnode-id="2511" instrument_node="">[8]</span></a></sup></li></ul><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2505" instrument_node="">Storytelling is one of the first language skills that children develop. It is universal across cultures and time.</span><sup class="reference" data-dcnode-id="2502" id="cite_ref-9"><a data-dcnode-id="2503" href="#cite_note-9"><span data-dcnode-id="2504" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2501" instrument_node="">
</span></p><span data-dcnode-id="2499" instrument_node="">
</span><h2 data-dcnode-id="2489"><span class="mw-headline" data-dcnode-id="2497" id="Rational_world_paradigm"><span data-dcnode-id="2498" instrument_node="">Rational world paradigm</span></span><span class="mw-editsection" data-dcnode-id="2490"><span class="mw-editsection-bracket" data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">[</span></span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D2" title="Edit section: Rational world paradigm"><span data-dcnode-id="2494" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2487" instrument_node="">Walter Fisher conceptualized the Narrative Paradigm in direct contrast to the Rational World Paradigm. "Fisher's interest in narrative developed out of his conclusion that the dominant model for explaining human communication—the rational-world paradigm—was inadequate."</span><sup class="reference" data-dcnode-id="2484" id="cite_ref-Rowland_204–217_5-1"><a data-dcnode-id="2485" href="#cite_note-Rowland_204%E2%80%93217-5"><span data-dcnode-id="2486" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2483" instrument_node=""> Rational World Paradigm suggest that an argument is most persuasive when it is logical. This theory is based on the teachings of </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plato" title="Plato"><span data-dcnode-id="2482" instrument_node="">Plato</span></a><span data-dcnode-id="2480" instrument_node=""> and </span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="2479" instrument_node="">Aristotle</span></a><span data-dcnode-id="2477" instrument_node="">.</span><sup class="reference" data-dcnode-id="2474" id="cite_ref-10"><a data-dcnode-id="2475" href="#cite_note-10"><span data-dcnode-id="2476" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="2471" id="cite_ref-ijea_1-2"><a data-dcnode-id="2472" href="#cite_note-ijea-1"><span data-dcnode-id="2473" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="2468" id="cite_ref-cinemateque_11-0"><a data-dcnode-id="2469" href="#cite_note-cinemateque-11"><span data-dcnode-id="2470" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2467" instrument_node="">
</span></p><span data-dcnode-id="2465" instrument_node="">
</span><span data-dcnode-id="2464" instrument_node="">

</span><table class="wikitable" data-dcnode-id="2412"><caption data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Comparison
</span></caption><tbody data-dcnode-id="2413"><tr data-dcnode-id="2454"><th data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Narrative paradigm
</span></th><th data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Rational world paradigm
</span></th></tr><tr data-dcnode-id="2446"><td data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">1. Humans are storytellers.
</span></td><td data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">1. Humans are rational.
</span></td></tr><tr data-dcnode-id="2438"><td data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">2. Decision making and communication are based on "good reasons".
</span></td><td data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">2. Decision making is based on arguments.
</span></td></tr><tr data-dcnode-id="2430"><td data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">3. Good reasons are determined by matters of history, biography, culture and character.
</span></td><td data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">3. Arguments adhere to specific criteria for soundness and logic.
</span></td></tr><tr data-dcnode-id="2422"><td data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">4. Rationality is based in people's awareness of internal consistency and resemblance to lived experience.
</span></td><td data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">4. Rationality is based on the quality of evidence and formal reasoning processes.
</span></td></tr><tr data-dcnode-id="2414"><td data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">5. We experience a world that is filled with stories, and we must choose among them.
</span></td><td data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">5. The world can be understood as a series of logical relationships that are uncovered through reasoning.
</span></td></tr></tbody></table><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">According to Aristotle, some statements are superior to others by virtue of their relationship to true knowledge. This view claims that:
</span></p><span data-dcnode-id="2408" instrument_node="">
</span><ul data-dcnode-id="2390"><li data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">People are essentially thinking beings, basing their knowledge on evidence-based reasoning.</span></li><span data-dcnode-id="2405" instrument_node="">
</span><li data-dcnode-id="2397"><span data-dcnode-id="2404" instrument_node="">Rational argument reflects </span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knowledge" title="Knowledge"><span data-dcnode-id="2403" instrument_node="">knowledge</span></a><span data-dcnode-id="2401" instrument_node=""> and </span><a data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Understanding" title="Understanding"><span data-dcnode-id="2400" instrument_node="">understanding</span></a><span data-dcnode-id="2398" instrument_node="">, and how the case is made. These qualities determine whether the argument is accepted, so long as the form matches the forum, which might be scientific, legal, philosophical, etc.</span></li><span data-dcnode-id="2396" instrument_node="">
</span><li data-dcnode-id="2391"><span data-dcnode-id="2395" instrument_node="">The world is a set of logical puzzles that can be solved through reason.</span><sup class="reference" data-dcnode-id="2392" id="cite_ref-12"><a data-dcnode-id="2393" href="#cite_note-12"><span data-dcnode-id="2394" instrument_node="">[12]</span></a></sup></li></ul><span data-dcnode-id="2389" instrument_node="">
</span><h2 data-dcnode-id="2379"><span class="mw-headline" data-dcnode-id="2387" id="Narrative_rationality"><span data-dcnode-id="2388" instrument_node="">Narrative rationality</span></span><span class="mw-editsection" data-dcnode-id="2380"><span class="mw-editsection-bracket" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">[</span></span><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D3" title="Edit section: Narrative rationality"><span data-dcnode-id="2384" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2377" instrument_node="">Narrative rationality requires coherence and fidelity, which contribute to judgments about reasons.</span><sup class="reference" data-dcnode-id="2374" id="cite_ref-13"><a data-dcnode-id="2375" href="#cite_note-13"><span data-dcnode-id="2376" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2373" instrument_node="">
</span></p><span data-dcnode-id="2371" instrument_node="">
</span><h3 data-dcnode-id="2361"><span class="mw-headline" data-dcnode-id="2369" id="Coherence"><span data-dcnode-id="2370" instrument_node="">Coherence</span></span><span class="mw-editsection" data-dcnode-id="2362"><span class="mw-editsection-bracket" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">[</span></span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D4" title="Edit section: Coherence"><span data-dcnode-id="2366" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2359" instrument_node="">Narrative coherence is the degree to which a story makes sense. Coherent stories are internally consistent, with sufficient detail, strong characters, and free of significant surprises. The ability to assess coherence is learned and improves with experience. Individuals assess a story's adherence by comparing it with similar stories. The ultimate test of narrative sense is whether the characters act reliably. If figures show continuity throughout their thoughts, motives, and actions, acceptance increases. However, characters behaving uncharacteristically destroy acceptance.</span><sup class="reference" data-dcnode-id="2356" id="cite_ref-FOOTNOTEGriffin2009_14-0"><a data-dcnode-id="2357" href="#cite_note-FOOTNOTEGriffin2009-14"><span data-dcnode-id="2358" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2355" instrument_node="">
</span></p><span data-dcnode-id="2353" instrument_node="">
</span><h3 data-dcnode-id="2343"><span class="mw-headline" data-dcnode-id="2351" id="Fidelity"><span data-dcnode-id="2352" instrument_node="">Fidelity</span></span><span class="mw-editsection" data-dcnode-id="2344"><span class="mw-editsection-bracket" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">[</span></span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D5" title="Edit section: Fidelity"><span data-dcnode-id="2348" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Narrative fidelity is the degree to which a story fits into the observer's experience with other accounts. How the experience of a story rings true with past stories they know to be true in their lives. Stories with fidelity may influence their beliefs and values.
</span></p><p data-dcnode-id="2334"><span data-dcnode-id="2339" instrument_node="">Fisher set five criteria that affect a story's narrative fidelity. The first of the requirements are the values which are embedded in the story. The second of the elements is the connection between the story and the espoused value. The third of the criteria is the possible outcomes that would accrue to people adhering to the espoused values. The last two are firstly the consistency of the narrative's values with the observer's values and lastly the extent to which the story’s values represent the highest values possible in human experience.</span><sup class="reference" data-dcnode-id="2336" id="cite_ref-15"><a data-dcnode-id="2337" href="#cite_note-15"><span data-dcnode-id="2338" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2335" instrument_node="">
</span></p><span data-dcnode-id="2333" instrument_node="">
</span><h2 data-dcnode-id="2323"><span class="mw-headline" data-dcnode-id="2331" id="Evaluation_of_reasoning_systems"><span data-dcnode-id="2332" instrument_node="">Evaluation of reasoning systems</span></span><span class="mw-editsection" data-dcnode-id="2324"><span class="mw-editsection-bracket" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">[</span></span><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D6" title="Edit section: Evaluation of reasoning systems"><span data-dcnode-id="2328" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2321" instrument_node="">Fisher's narrative paradigm offers an alternative to Aristotelian analysis, which dominates the field of rhetorical thinking. Narratives do not require training or expertise to evaluate. </span><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_sense" title="Common sense"><span data-dcnode-id="2320" instrument_node="">Common sense</span></a><span data-dcnode-id="2318" instrument_node=""> assesses narrative coherence and fidelity.</span><sup class="reference" data-dcnode-id="2315" id="cite_ref-FOOTNOTEGriffin2009305_16-0"><a data-dcnode-id="2316" href="#cite_note-FOOTNOTEGriffin2009305-16"><span data-dcnode-id="2317" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2314" instrument_node=""> Busselle and Bilandzic distinguish narrative rationality from realism, writing "It is remarkable that the power of narrative is not diminished by readers’ or viewers’ knowledge that the story is invented. On the contrary, successful stories—those that engage us most—often are both fictional and unrealistic."</span><sup class="reference" data-dcnode-id="2311" id="cite_ref-17"><a data-dcnode-id="2312" href="#cite_note-17"><span data-dcnode-id="2313" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2310" instrument_node="">
</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Alternatively, Foucault claimed that communications systems formed through the savoir and pouvoir (knowledge and power) of the hierarchies that control access to the discourses. Hence, criteria for assessing the reliability and completeness of evidence, and whether the pattern of reasoning is sound are not absolutes but defined over time by those in positions of authority. This is particularly significant when the process of thinking includes values and policy in addition to empirical data.
</span></p><p data-dcnode-id="2301"><span data-dcnode-id="2306" instrument_node="">The narrative paradigm instead asserts that any individual can judge a story's merits as a basis for belief and action.</span><sup class="reference" data-dcnode-id="2303" id="cite_ref-:0_4-1"><a data-dcnode-id="2304" href="#cite_note-:0-4"><span data-dcnode-id="2305" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2302" instrument_node="">
</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Narration affects every aspect of each individual's life in verbal and nonverbal bids for someone to believe or act in a certain way. Even when a message appears abstract—i.e., the language is literal and not figurative—it is narration. This is because it is embedded in the storyteller's ongoing story and it invites observers to assess its value for their own lives.
</span></p><p data-dcnode-id="2289"><span data-dcnode-id="2298" instrument_node="">Narrative rationality and narrative emotion are complementary within a narrative theory. The former considers how effectively the story conveys its meaning, as well as its implications. The latter considers the emotional reactions of the story's observers.</span><sup class="reference" data-dcnode-id="2295" id="cite_ref-Deslandes_335–372_18-0"><a data-dcnode-id="2296" href="#cite_note-Deslandes_335%E2%80%93372-18"><span data-dcnode-id="2297" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2294" instrument_node="">  Narrative emotion is an emotion felt for the sake of someone, or something, else.</span><sup class="reference" data-dcnode-id="2291" id="cite_ref-Deslandes_335–372_18-1"><a data-dcnode-id="2292" href="#cite_note-Deslandes_335%E2%80%93372-18"><span data-dcnode-id="2293" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2290" instrument_node="">
</span></p><span data-dcnode-id="2288" instrument_node="">
</span><h2 data-dcnode-id="2278"><span class="mw-headline" data-dcnode-id="2286" id="Applications"><span data-dcnode-id="2287" instrument_node="">Applications</span></span><span class="mw-editsection" data-dcnode-id="2279"><span class="mw-editsection-bracket" data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">[</span></span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D7" title="Edit section: Applications"><span data-dcnode-id="2283" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2263"><span data-dcnode-id="2276" instrument_node="">Narrative theory is an assessment framework within various fields of communication. Those who  use narrative theory within their research refer to it as a general way of viewing communication.</span><sup class="reference" data-dcnode-id="2273" id="cite_ref-cinemateque_11-1"><a data-dcnode-id="2274" href="#cite_note-cinemateque-11"><span data-dcnode-id="2275" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2272" instrument_node=""> The narrative paradigm is generally considered an interpretative theory of communication.</span><sup class="reference" data-dcnode-id="2269" id="cite_ref-19"><a data-dcnode-id="2270" href="#cite_note-19"><span data-dcnode-id="2271" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2268" instrument_node=""> It is an especially useful theory for teaching qualitative research methods.</span><sup class="reference" data-dcnode-id="2265" id="cite_ref-20"><a data-dcnode-id="2266" href="#cite_note-20"><span data-dcnode-id="2267" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2264" instrument_node="">
</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2262" instrument_node="">Fisher’s theory has been considered for domains ranging from organizational communication to family interaction, to racism, and to advertising. McNamara proposed that the narrative paradigm can be used with military storytelling to enhance the perception of the United States armed services.</span><sup class="reference" data-dcnode-id="2259" id="cite_ref-21"><a data-dcnode-id="2260" href="#cite_note-21"><span data-dcnode-id="2261" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2258" instrument_node=""> Stutts and Barker, of </span><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginia_Commonwealth_University" title="Virginia Commonwealth University"><span data-dcnode-id="2257" instrument_node="">Virginia Commonwealth University</span></a><span data-dcnode-id="2255" instrument_node="">, proposed that the Narrative Paradigm can be used to evaluate if a company's brand will be well received by consumers, by determining if the created narrative has coherence and fidelity.</span><sup class="reference" data-dcnode-id="2252" id="cite_ref-22"><a data-dcnode-id="2253" href="#cite_note-22"><span data-dcnode-id="2254" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2251" instrument_node=""> Other researchers proposed using the narrative paradigm to evaluate ethical standards in advertising.</span><sup class="reference" data-dcnode-id="2248" id="cite_ref-23"><a data-dcnode-id="2249" href="#cite_note-23"><span data-dcnode-id="2250" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2247" instrument_node=""> Roberts used the narrative paradigm as a way to better understand the use of narrative in folklore.</span><sup class="reference" data-dcnode-id="2244" id="cite_ref-24"><a data-dcnode-id="2245" href="#cite_note-24"><span data-dcnode-id="2246" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2243" instrument_node=""> Hobart proposed using narrative theory as a way to interpret urban legends and other kinds of hoaxes.</span><sup class="reference" data-dcnode-id="2240" id="cite_ref-25"><a data-dcnode-id="2241" href="#cite_note-25"><span data-dcnode-id="2242" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2239" instrument_node="">
</span></p><p data-dcnode-id="2232"><span data-dcnode-id="2237" instrument_node="">Narrative paradigm is also applicable when assessing multinational working relationships. Global interactions between groups with different backgrounds have the tendency to hinder group progress and building relationships. Over the past two decades, scholars conceptualize diversity in the workplace using several different theories. As companies continue to diversify, businesses look for communication models to help manage the complex structure of human relationships. Narrative paradigm serves as a communication technique that shows companies how the application of a good story could provide benefits in the workforce. Storytelling is a cross-cultural solution that establishes credibility and trust in relationships between workers.</span><sup class="reference" data-dcnode-id="2234" id="cite_ref-26"><a data-dcnode-id="2235" href="#cite_note-26"><span data-dcnode-id="2236" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2233" instrument_node="">
</span></p><span data-dcnode-id="2231" instrument_node="">
</span><h3 data-dcnode-id="2221"><span class="mw-headline" data-dcnode-id="2229" id="Narrative_and_politics"><span data-dcnode-id="2230" instrument_node="">Narrative and politics</span></span><span class="mw-editsection" data-dcnode-id="2222"><span class="mw-editsection-bracket" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">[</span></span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D8" title="Edit section: Narrative and politics"><span data-dcnode-id="2226" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2219" instrument_node="">Smith in 1984 conducted one example of a study that used narrative theory more directly. Smith looked at the fidelity and coherence of narratives presented as Republican and Democratic Party platforms in the United States and found that despite apparent differences, each party was able to maintain integrity and fidelity by remaining consistent in both structure and overarching party values.</span><sup class="reference" data-dcnode-id="2216" id="cite_ref-27"><a data-dcnode-id="2217" href="#cite_note-27"><span data-dcnode-id="2218" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2215" instrument_node="">
</span></p><span data-dcnode-id="2213" instrument_node="">
</span><h3 data-dcnode-id="2203"><span class="mw-headline" data-dcnode-id="2211" id="Narrative_and_health_communication"><span data-dcnode-id="2212" instrument_node="">Narrative and health communication</span></span><span class="mw-editsection" data-dcnode-id="2204"><span class="mw-editsection-bracket" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">[</span></span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D9" title="Edit section: Narrative and health communication"><span data-dcnode-id="2208" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2201" instrument_node="">A study claimed that narrative features could be strategically altered by health communicators to affect the reader's identification. It found that similarities between the reader and the narrative's protagonist, but not the narrator's point of view, has a direct impact on the narrative's persuasiveness.</span><sup class="reference" data-dcnode-id="2198" id="cite_ref-28"><a data-dcnode-id="2199" href="#cite_note-28"><span data-dcnode-id="2200" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2197" instrument_node="">
</span></p><span data-dcnode-id="2195" instrument_node="">
</span><h3 data-dcnode-id="2185"><span class="mw-headline" data-dcnode-id="2193" id="Narrative_and_branding"><span data-dcnode-id="2194" instrument_node="">Narrative and branding</span></span><span class="mw-editsection" data-dcnode-id="2186"><span class="mw-editsection-bracket" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">[</span></span><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D10" title="Edit section: Narrative and branding"><span data-dcnode-id="2190" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2183" instrument_node="">Narrative processing can create or enhance connections between a brand and an audience.</span><sup class="reference" data-dcnode-id="2180" id="cite_ref-29"><a data-dcnode-id="2181" href="#cite_note-29"><span data-dcnode-id="2182" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2179" instrument_node=""> Companies and business use stories or brands that suggest a story to produce </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brand_loyalty" title="Brand loyalty"><span data-dcnode-id="2178" instrument_node="">brand loyalty</span></a><span data-dcnode-id="2176" instrument_node="">. Businesses invest heavily in creating a good story through advertising and public relations.</span><sup class="reference" data-dcnode-id="2173" id="cite_ref-30"><a data-dcnode-id="2174" href="#cite_note-30"><span data-dcnode-id="2175" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2172" instrument_node=""> In brand development, many marketers focus on defining a brand </span><a class="mw-redirect" data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persona_%28marketing%29" title="Persona (marketing)"><span data-dcnode-id="2171" instrument_node="">persona</span></a><span data-dcnode-id="2169" instrument_node=""> (typical user) before constructing a narrative for that brand. Character traits such as honesty, curiosity, flexibility and determination become embedded in the persona. Commitment to the associated behavioral implications can help the brand maintain consistency with its narrative.</span><sup class="reference" data-dcnode-id="2166" id="cite_ref-31"><a data-dcnode-id="2167" href="#cite_note-31"><span data-dcnode-id="2168" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2165" instrument_node="">
</span></p><span data-dcnode-id="2163" instrument_node="">
</span><h3 data-dcnode-id="2153"><span class="mw-headline" data-dcnode-id="2161" id="Narrative_and_law"><span data-dcnode-id="2162" instrument_node="">Narrative and law</span></span><span class="mw-editsection" data-dcnode-id="2154"><span class="mw-editsection-bracket" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">[</span></span><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D11" title="Edit section: Narrative and law"><span data-dcnode-id="2158" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2151" instrument_node="">A growing number of legal scholars contend that narrative persuades in law. </span><sup class="reference" data-dcnode-id="2148" id="cite_ref-32"><a data-dcnode-id="2149" href="#cite_note-32"><span data-dcnode-id="2150" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2147" instrument_node=""> In one study, judges tended to prefer legal briefs taking a storytelling approach to those that do not. </span><sup class="reference" data-dcnode-id="2144" id="cite_ref-33"><a data-dcnode-id="2145" href="#cite_note-33"><span data-dcnode-id="2146" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2143" instrument_node=""> In response, legal scholars have applied narrative techniques to legal persuasion and even legal communication.</span><sup class="reference" data-dcnode-id="2140" id="cite_ref-34"><a data-dcnode-id="2141" href="#cite_note-34"><span data-dcnode-id="2142" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2139" instrument_node=""> Scholars in this area commonly refer to this application as "Applied Legal Storytelling."</span><sup class="reference" data-dcnode-id="2136" id="cite_ref-35"><a data-dcnode-id="2137" href="#cite_note-35"><span data-dcnode-id="2138" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2135" instrument_node="">
</span></p><span data-dcnode-id="2133" instrument_node="">
</span><h2 data-dcnode-id="2123"><span class="mw-headline" data-dcnode-id="2131" id="Criticism"><span data-dcnode-id="2132" instrument_node="">Criticism</span></span><span class="mw-editsection" data-dcnode-id="2124"><span class="mw-editsection-bracket" data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">[</span></span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D12" title="Edit section: Criticism"><span data-dcnode-id="2128" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2121" instrument_node="">Critics of the narrative paradigm mainly contend that it is not as universally applicable as Fisher suggests. For example, Rowland asserted that it should be applied strictly to communication that fits classic narrative patterns to avoid undermining its credibility.</span><sup class="reference" data-dcnode-id="2118" id="cite_ref-FOOTNOTERowland1989_36-0"><a data-dcnode-id="2119" href="#cite_note-FOOTNOTERowland1989-36"><span data-dcnode-id="2120" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2117" instrument_node="">
</span></p><p data-dcnode-id="2103"><span data-dcnode-id="2115" instrument_node="">Other critiques include issues of conservative bias. Kirkwood stated that Fisher's logic of good reasons focuses only on prevailing issues</span><sup class="reference" data-dcnode-id="2112" id="cite_ref-37"><a data-dcnode-id="2113" href="#cite_note-37"><span data-dcnode-id="2114" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2111" instrument_node=""> but does not see all the ways that stories can promote </span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_change" title="Social change"><span data-dcnode-id="2110" instrument_node="">social change</span></a><span data-dcnode-id="2108" instrument_node="">.</span><sup class="reference" data-dcnode-id="2105" id="cite_ref-Turner,_Lynn_H._2007_8-1"><a data-dcnode-id="2106" href="#cite_note-Turner,_Lynn_H._2007-8"><span data-dcnode-id="2107" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2104" instrument_node=""> In some ways, both Kirkwood and Fisher agree that this observation is more of an extension to the theory than a critique.
</span></p><p data-dcnode-id="2097"><span data-dcnode-id="2102" instrument_node="">Stroud considered "multivalent" narratives that include seemingly contradictory values or positions that force a reader to reconstruct their meaning, thereby enabling positive judgments of narrative fidelity and the adoption of new values.</span><sup class="reference" data-dcnode-id="2099" id="cite_ref-38"><a data-dcnode-id="2100" href="#cite_note-38"><span data-dcnode-id="2101" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2098" instrument_node="">
</span></p><p data-dcnode-id="2088"><span data-dcnode-id="2096" instrument_node="">Some forms of communication are not narrative in the way that Fisher maintains. Many </span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_fiction" title="Science fiction"><span data-dcnode-id="2095" instrument_node="">science fiction</span></a><span data-dcnode-id="2093" instrument_node=""> and fantasy novels/movies challenge rather than conform to common values.</span><sup class="reference" data-dcnode-id="2090" id="cite_ref-Turner,_Lynn_H._2007_8-2"><a data-dcnode-id="2091" href="#cite_note-Turner,_Lynn_H._2007-8"><span data-dcnode-id="2092" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2089" instrument_node="">
</span></p><p data-dcnode-id="2078"><span data-dcnode-id="2087" instrument_node="">The narrative approach does not provide a more democratic structure compared to the one imposed by the rational world paradigm. Nor does it offer a complete alternative to that paradigm.</span><sup class="reference" data-dcnode-id="2084" id="cite_ref-FOOTNOTERowland198939_39-0"><a data-dcnode-id="2085" href="#cite_note-FOOTNOTERowland198939-39"><span data-dcnode-id="2086" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2083" instrument_node="">
The narrative paradigm gained attention from poststructuralist education theorists for appealing to notions of truth.</span><sup class="reference" data-dcnode-id="2080" id="cite_ref-40"><a data-dcnode-id="2081" href="#cite_note-40"><span data-dcnode-id="2082" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2079" instrument_node="">
</span></p><span data-dcnode-id="2077" instrument_node="">
</span><h2 data-dcnode-id="2067"><span class="mw-headline" data-dcnode-id="2075" id="Related_theories"><span data-dcnode-id="2076" instrument_node="">Related theories</span></span><span class="mw-editsection" data-dcnode-id="2068"><span class="mw-editsection-bracket" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">[</span></span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D13" title="Edit section: Related theories"><span data-dcnode-id="2072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2066" instrument_node="">
</span><h3 data-dcnode-id="2056"><span class="mw-headline" data-dcnode-id="2064" id="Rhetoric_theory"><span data-dcnode-id="2065" instrument_node="">Rhetoric theory</span></span><span class="mw-editsection" data-dcnode-id="2057"><span class="mw-editsection-bracket" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">[</span></span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D14" title="Edit section: Rhetoric theory"><span data-dcnode-id="2061" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2054" instrument_node="">The narrative paradigm incorporates both the pathos and logos form of rhetoric theory. Rhetoric theory was formulated by Aristotle.</span><sup class="reference" data-dcnode-id="2051" id="cite_ref-41"><a data-dcnode-id="2052" href="#cite_note-41"><span data-dcnode-id="2053" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2050" instrument_node=""> He defines rhetoric as: the available means of persuasion.</span><sup class="reference" data-dcnode-id="2047" id="cite_ref-Turner,_Lynn_H._2007_8-3"><a data-dcnode-id="2048" href="#cite_note-Turner,_Lynn_H._2007-8"><span data-dcnode-id="2049" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2046" instrument_node=""> It includes two assumptions. Firstly that effective public speakers must consider their audience. Secondly that effective public speakers supply proofs.
</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Aristotle divided public speaking into three parts: the speaker, the subject and the audience. He considered the audience the most important, determining the speech’s end and object. Therefore, audience analysis, which is the process of evaluating an audience and its background is essential.
</span></p><p data-dcnode-id="2032"><span data-dcnode-id="2042" instrument_node="">In the second assumption, Aristotle’s proof refers to the means of persuasion. And these three proof types are </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethos" title="Ethos"><span data-dcnode-id="2041" instrument_node="">Ethos</span></a><span data-dcnode-id="2039" instrument_node="">, </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pathos" title="Pathos"><span data-dcnode-id="2038" instrument_node="">Pathos</span></a><span data-dcnode-id="2036" instrument_node="">, and </span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logos" title="Logos"><span data-dcnode-id="2035" instrument_node="">Logos</span></a><span data-dcnode-id="2033" instrument_node="">.
</span></p><span data-dcnode-id="2031" instrument_node="">
</span><ul data-dcnode-id="2022"><li data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Ethos: The perceived character, intelligence and goodwill of a speaker as they become revealed through his or her speech.</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Logos: The logic proof that speakers employ.</span></li><span data-dcnode-id="2025" instrument_node="">
</span><li data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Pathos: The emotions that are drawn out of listeners.</span></li></ul><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">There are three modes of ethos
</span></p><span data-dcnode-id="2018" instrument_node="">
</span><ul data-dcnode-id="2009"><li data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Phronesis: practical wisdom</span></li><span data-dcnode-id="2015" instrument_node="">
</span><li data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Arete: moral character</span></li><span data-dcnode-id="2012" instrument_node="">
</span><li data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Eunoia: goodwill</span></li></ul><span data-dcnode-id="2008" instrument_node="">
</span><h3 data-dcnode-id="1998"><span class="mw-headline" data-dcnode-id="2006" id="Situation_models"><span data-dcnode-id="2007" instrument_node="">Situation models</span></span><span class="mw-editsection" data-dcnode-id="1999"><span class="mw-editsection-bracket" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">[</span></span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D15" title="Edit section: Situation models"><span data-dcnode-id="2003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">When people experience a story, the comprehension phase is where they form a mental representation of the text. Such a mental image is called a situation model. Situation models are representations of the state of affairs described in a document rather than of the text itself. Much of the research suggests that observers behave as though they are in the story rather than outside of it. This supports Fisher’s model that narrative components backed by good reasons are related to elements in situation models.
</span></p><span data-dcnode-id="1994" instrument_node="">
</span><h4 data-dcnode-id="1984"><span class="mw-headline" data-dcnode-id="1992" id="Space"><span data-dcnode-id="1993" instrument_node="">Space</span></span><span class="mw-editsection" data-dcnode-id="1985"><span class="mw-editsection-bracket" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">[</span></span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D16" title="Edit section: Space"><span data-dcnode-id="1989" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1982" instrument_node="">Situation models represent relevant aspects of the narrative's environment. Objects that are spatially close to observers are generally more relevant than more distant objects. The same holds for situation models. Observers are similarly slower to recognize words denoting objects distant from a protagonist than those close to the protagonist.</span><sup class="reference" data-dcnode-id="1979" id="cite_ref-FOOTNOTEGlenbergMeyerLindem1987_42-0"><a data-dcnode-id="1980" href="#cite_note-FOOTNOTEGlenbergMeyerLindem1987-42"><span data-dcnode-id="1981" instrument_node="">[42]</span></a></sup><span data-dcnode-id="1978" instrument_node=""> When observers have extensive knowledge of the spatial layout of the story setting (e.g., a building), they update their representations according to the location and goals of the protagonist. They have the fastest mental access to the room that the protagonist is close to. For example, they can more readily say whether two objects are in the same room if the room mentioned is close to the protagonist. The interpretation of the meaning of a verb denoting the movement of people or objects in space, such as to approach, depends on their situation models. The interpretation of observers also depends on the size of the landmark and the speed of the figure. Observers behave as if they are actually present in the situation.</span><sup class="reference" data-dcnode-id="1975" id="cite_ref-43"><a data-dcnode-id="1976" href="#cite_note-43"><span data-dcnode-id="1977" instrument_node="">[43]</span></a></sup><span data-dcnode-id="1974" instrument_node="">
</span></p><span data-dcnode-id="1972" instrument_node="">
</span><h4 data-dcnode-id="1962"><span class="mw-headline" data-dcnode-id="1970" id="Goals_and_causation"><span data-dcnode-id="1971" instrument_node="">Goals and causation</span></span><span class="mw-editsection" data-dcnode-id="1963"><span class="mw-editsection-bracket" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">[</span></span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNarrative_paradigm%26action%3Dedit%26section%3D17" title="Edit section: Goals and causation"><span data-dcnode-id="1967" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1960" instrument_node="">In one study observers recognized goals yet to be accomplished by the protagonist more quickly than goals that had just been accomplished. When Keefe and McDaniel presented subjects with sentences such as "after standing through a 3-hour debate, the tired speaker walked over to his chair (and sat down)" and then with probe words (e.g., "sat").</span><sup class="reference" data-dcnode-id="1957" id="cite_ref-44"><a data-dcnode-id="1958" href="#cite_note-44"><span data-dcnode-id="1959" instrument_node="">[44]</span></a></sup><span data-dcnode-id="1956" instrument_node=""> Subjects took about the same amount of time to name sat when the clause about the speaker sitting down was omitted and when it was included. Moreover, naming times were significantly faster in both of these conditions than in a control condition, in which it was implied that the speaker remained standing.</span><sup class="reference" data-dcnode-id="1953" id="cite_ref-45"><a data-dcnode-id="1954" href="#cite_note-45"><span data-dcnode-id="1955" instrument_node="">[45]</span></a></sup><span data-dcnode-id="1952" instrument_node="">
</span></p><span data-dcnode-id="1950" instrument_node="">
