            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="1462"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body background="lgrey " data-dcnode-id="2" text="#000000"><span data-dcnode-id="1467" instrument_node="">
</span><span data-dcnode-id="1465" instrument_node="">
</span><title data-dcnode-id="1463">Narrative Theory - Title</title><span data-dcnode-id="1461" instrument_node="">
</span><span data-dcnode-id="1460" instrument_node="">

	To appear in special issue of </span><i data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">The Journal of Narrative and Life History</span></i><span data-dcnode-id="1457" instrument_node="">, 1997p&gt;
</span><i data-dcnode-id="1456"></i><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">
</span></p><h2 data-dcnode-id="1451"><center data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Some Further Steps in Narrative Analysis</span></center></h2><p data-dcnode-id="1448"><span data-dcnode-id="1450" instrument_node="">
</span><b data-dcnode-id="1449"></b></p><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">
</span></p><h3 data-dcnode-id="1442"><span data-dcnode-id="1445" instrument_node=""> </span><center data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">William Labov. University of Pennsylvania</span></center></h3><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">
</span></p><p data-dcnode-id="1439"></p><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">
	The first steps in narrative analysis taken by Joshua Waletzky and
myself were a by-product of the sociolinguistic field methods that had been
developed in the survey of the Lower East Side (Labov 1966) and in the work
that engaged us at the time -- the study of African American Vernacular English
in South Harlem (Labov, Cohen, Robins and Lewis 1968). We defined the
vernacular as the form of language first acquired, perfectly learned, and used
only among speakers of the same vernacular. The effort to observe how speakers
talked when they were not being observed created the Observer's Paradox. Among
the partial solutions to that paradox within the face-to-face interview, the
elicitation of narratives of personal experience proved to be the most
effective. We were therefore driven to understand as much as we could about the
structure of these narratives and how they were introduced into the every-day
conversation that our interviews simulated. Labov and Waletzky 1967 laid out  a
framework which has proved useful for narrative in general, as this volume
demonstrates. </span></p><p data-dcnode-id="1430"><span data-dcnode-id="1436" instrument_node="">
	Since that time I have published only a few studies of narrative (Labov 1972,
Labov and Fanshel 1977, Labov 1981). This is not because I have lost interest
in the subject, for I have written and delivered a great many unpublished
papers in the area.</span><a data-dcnode-id="1434" href="#fn0" name="fnB0"><span data-dcnode-id="1435" instrument_node="">[1]</span></a><span data-dcnode-id="1433" instrument_node=""> I may not have pursued
these papers into the domain of publication because the analysis of narrative
was competing with quantitative studies of language variation and change, where
cumulative theories can be built upon decisive answers to successively more
general questions. The discussion of narrative and other speech events at the
discourse level rarely allows us to prove anything. It is essentially a
hermeneutic study, where continual engagement with the discourse as it was
delivered gains entrance to the perspective of the speaker and the audience,
tracing the transfer of information and experience in a way that deepens our
own understandings of what language and social life are all about. The most
important data that I have gathered on narrative is not drawn from the
observation of speech production or controlled experiments, but from the
reactions of audiences to the narratives as I have retold them.  In a regular
and predictable fashion, certain narratives produce in the audience a profound
concentration of attention that creates uninterrupted silence and immobility,
an effect that continues long after the ending is reached. It is the effort to
understand the compelling power of such narratives that brings me to the
current essay, an abstract of a more extended treatment of narratives of
personal experience to follow.</span><a data-dcnode-id="1431" href="#fn1" name="fnB1"><span data-dcnode-id="1432" instrument_node="">[2]</span></a></p><p data-dcnode-id="1425"><span data-dcnode-id="1429" instrument_node="">
	Labov and Waletzky demonstrated that the effort to understand narrative is
amenable to a formal framework, particularly in the basic definition of
narrative as the choice of a specific linguistic technique to report past
events.  The L&amp;W framework developed for oral narratives of personal
experience proved to be useful in approaching a wide variety of narrative
situations and types, including oral memoirs, traditional folk tales, avant
garde novels, therapeutic interviews and most importantly, the banal narratives
of every-day life. It allowed us to understand pseudo-narratives like recipes,
apartment-house layouts, and other types of experience remodeled into narrative
form. It gradually appeared that narratives are privileged forms of discourse
which play a central role in almost every conversation.</span><a data-dcnode-id="1427" href="#fn2" name="fnB2"><span data-dcnode-id="1428" instrument_node="">[3]</span></a><span data-dcnode-id="1426" instrument_node="">  Our efforts to define other speech events with comparable
precision have shown us that narrative is the prototype, perhaps the only
example of a well formed speech event with a beginning, a middle, and an end.</span></p><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">
	Narrative and the broader field of story telling has become a keen focus of
attention in many academic and literary disciplines. Here the traditional
trajectory of the story-teller runs athwart the main focus of this article. The
classic image of the story-teller is someone who can make something out of
nothing, who can engage our attention with a fascinating elaboration of detail
that is entertaining, amusing and emotionally rewarding.  From the first lines
of such a narrative, we know that we are in the presence of a gifted user of
the language. Credibility is rarely an issue here. Tall tales, myths and
outright lies carry the day, and we normally do not know or care whether the
events as told were the personal experience of the story-teller or anyone else.
The narratives that are the central focus of my current work are altogether
different. The tellers were not known as gifted story tellers; people did not
gather to hear them speak. They were ordinary people in the deepest sense of
the word. They did not manufacture events or elaborate the experience of
others. Their narratives were an attempt to convey simply and seriously the
most important experiences of their own lives. Sometimes the stories had been
told many times, but very often they had not been, or were perhaps told for the
very first time. They deal with the major events of life and death, including
the sudden outbreak of violence; the near approach of death and the witness of
it; premonitions of the future, often through communication with the dead;
courage in the face of adversity and the struggle against overwhelming odds;
cowardice and the betrayal of trust.  I don't believe that this focus on
serious and momentous issues will limit the scope of the analysis. Rather, the
use of narrative to deal with issues of life and death will highlight the
abilities displayed in more casual, humorous or even trivial accounts. In the
less serious and more frequent deployment of narrative, techniques are
practised to perfection;  in  the more serious domain, they are put to the
test.</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">
	The narratives that form the focus of this work were normally told in the
course of a sociolinguistic interview, where the interviewer formed an ideal
audience: attentive, interested and responsive. Though they are fitted to some
extent to the situation and often to a question posed by the interviewer, they
are essentially monologues and show a degree of decontextualization. They
exhibit a generality that is not to be expected from narratives that subserve
an argumentative point in a highly interactive and competitive conversation.
Such narratives are often highly fragmented and may require a different
approach. Yet studies of spontaneous conversation also show a high frequency of
monologic narratives that command the attention of the audience as fully as the
narratives of the interview. The principles developed in this paper are
exemplified most clearly in narratives of this type.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">
	The issues that are raised here go beyond the analysis of L&amp;W, which dealt
with temporal organization and evaluation. The framework I will present begins
with these aspects of narrative, and then goes on to consider the further
issues of reportability, credibility, objectivity, causality, and the
assignment of praise and blame. </span></p><p data-dcnode-id="1415"><span data-dcnode-id="1418" instrument_node="">
	In this skeletal presentation, I will use one narrative to illustrate the
principles involved:</span><a data-dcnode-id="1416" href="#fn3" name="fnB3"><span data-dcnode-id="1417" instrument_node="">[4]</span></a></p><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">
</span></p><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">
(1) Harold Shambaugh, Tape A-304, Columbus, Ohio, 7/28/70</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">
</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">
</span></p><blockquote data-dcnode-id="1317"><span data-dcnode-id="1406" instrument_node="">
</span><span data-dcnode-id="1401" instrument_node="">
</span><span data-dcnode-id="1395" instrument_node="">
</span><span data-dcnode-id="1389" instrument_node="">
</span><span data-dcnode-id="1383" instrument_node="">
</span><span data-dcnode-id="1378" instrument_node="">
</span><span data-dcnode-id="1372" instrument_node="">
</span><span data-dcnode-id="1366" instrument_node="">
</span><span data-dcnode-id="1360" instrument_node="">
</span><span data-dcnode-id="1354" instrument_node="">
</span><span data-dcnode-id="1349" instrument_node="">
</span><span data-dcnode-id="1343" instrument_node="">
</span><span data-dcnode-id="1337" instrument_node="">
</span><span data-dcnode-id="1331" instrument_node="">
</span><span data-dcnode-id="1326" instrument_node="">
</span><span data-dcnode-id="1320" instrument_node="">
</span><table data-dcnode-id="1318"><tbody data-dcnode-id="1319"><tr data-dcnode-id="1402"><td data-dcnode-id="1405"></td><td data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">(What happened in South America?)</span></td></tr><tr data-dcnode-id="1396"><td data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">a</span></td><td data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">  Oh I  w's settin' at a table drinkin'</span></td></tr><tr data-dcnode-id="1390"><td data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">b </span></td><td data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node=""> And - this  Norwegian sailor come over</span></td></tr><tr data-dcnode-id="1384"><td data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">c </span></td><td data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">   an' kep' givin' me a bunch o' junk</span></td></tr><tr data-dcnode-id="1379"><td data-dcnode-id="1382"></td><td data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">about I  was  sittin'  with his woman.</span></td></tr><tr data-dcnode-id="1373"><td data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">d </span></td><td data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">   An' everybody sittin' at the table with me were my shipmates.</span></td></tr><tr data-dcnode-id="1367"><td data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">e</span></td><td data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">      So I jus' turn aroun'</span></td></tr><tr data-dcnode-id="1361"><td data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">f</span></td><td data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">      an' shoved `im,</span></td></tr><tr data-dcnode-id="1355"><td data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">g</span></td><td data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">      an' told `im, I said, </span></td></tr><tr data-dcnode-id="1350"><td data-dcnode-id="1353"></td><td data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">"Go  away,</span></td></tr><tr data-dcnode-id="1344"><td data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">h</span></td><td data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">           I  don't even wanna  fool  with ya."</span></td></tr><tr data-dcnode-id="1338"><td data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">i</span></td><td data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">    	An'  nex' thing I know I 'm layin' on the floor, blood all   over me,</span></td></tr><tr data-dcnode-id="1332"><td data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">j</span></td><td data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">	 An' a guy told me, says, </span></td></tr><tr data-dcnode-id="1327"><td data-dcnode-id="1330"></td><td data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">"Don't move your head.</span></td></tr><tr data-dcnode-id="1321"><td data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">k </span></td><td data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">	   Your throat's cut."</span></td></tr></tbody></table></blockquote><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">
This brief narrative has been proven to be paradigmatic in the ability to
transfer experience from narrator to the audience. The reader is invited to
commit these twelve lines to memory, and re-tell the story to an individual or
group of others. Many listeners report the experience of viewing in the scene
in a smoke-filled room in lines (a-h); that with lines (i-k) there is a sudden
change of perspective, looking up from below; and after (k), about one third of
the people in any audience make a sudden intake of breath, as if it were in
fact their throat that was in question.</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">
	Over the course of some twenty years, I have dealt with the question of how
this brief narrative commands attention and conveys experience as effectively
as it does. The following pages are an outline of my attempt to provide an
answer. The presentation is in the form of definitions; implications from those
definitions; empirical findings from the study of a larger body of narrative;
and theorems, which propose relations with emp;irical content that are more
problematic. The reader is asked to accept the validity of those findings
provisionally until a larger body of material can be presented.</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">
</span></p><p data-dcnode-id="1307"><span data-dcnode-id="1310" instrument_node="">
</span><b data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">0. Narratives of personal experience.</span></b></p><p data-dcnode-id="1304"><span data-dcnode-id="1306" instrument_node="">
</span><b data-dcnode-id="1305"></b></p><p data-dcnode-id="1297"><span data-dcnode-id="1303" instrument_node="">
</span><b data-dcnode-id="1302"></b><span data-dcnode-id="1301" instrument_node="">(0.1) Definition:  A </span><i data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">narrative of personal experience</span></i><span data-dcnode-id="1298" instrument_node=""> is a report
of a sequence of events that have entered into the biography of the speaker by
a sequence of clauses that correspond to the order of the original events.</span></p><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">
</span></p><p data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node="">
	This definition is based on the initial conception of L&amp;W;  a definition
that separates narrative in this sense from other means of telling a story or
recounting the past. It is an arbitrary segregation of one sense of narrative
for technical purposes, but it proves to be a useful one. By here specifying
that the experience must have </span><i data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">entered into the biography</span></i><span data-dcnode-id="1291" instrument_node=""> of the speaker,
I distinguish narrative from simple recounting of observations like the events
of a parade by a witness leaning out a window. It will turn out that events
that have entered into the speaker's biography are emotionally and socially
evaluated, and so transformed from raw experience.</span></p><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">
</span></p><p data-dcnode-id="1284"><span data-dcnode-id="1287" instrument_node="">
</span><b data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">1. The temporal organization of narrative.</span></b></p><p data-dcnode-id="1281"><span data-dcnode-id="1283" instrument_node="">
</span><b data-dcnode-id="1282"></b></p><p data-dcnode-id="1275"><span data-dcnode-id="1280" instrument_node="">
</span><b data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node=""> </span></b><span data-dcnode-id="1277" instrument_node="">This discussion of temporal organization includes a new piece of
terminology not present in L&amp;W, a "sequential clause."  </span><b data-dcnode-id="1276"></b></p><p data-dcnode-id="1272"><span data-dcnode-id="1274" instrument_node="">
</span><b data-dcnode-id="1273"></b></p><p data-dcnode-id="1267"><span data-dcnode-id="1271" instrument_node="">
(1.1) Definition: Two clauses are separated by a </span><i data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">temporal juncture</span></i><span data-dcnode-id="1268" instrument_node=""> if a
reversal of their order results in a change in the listener's interpretation of
the order of the events described.</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">
</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1264" instrument_node="">
Thus all the clauses in (1) are separated by temporal juncture with the
following exceptions:  (a) and (b) overlap so there is no juncture between
them, and (i) overlaps (j) and (k), so there is no juncture between (i) and
(j).</span><a data-dcnode-id="1262" href="#fn4" name="fnB4"><span data-dcnode-id="1263" instrument_node="">[5]</span></a></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">
</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">
</span></p><blockquote data-dcnode-id="1251"><span data-dcnode-id="1256" instrument_node=""> (1.1.1) Implication [and definition of a </span><i data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">minimal narrative</span></i><span data-dcnode-id="1253" instrument_node="">]: A narrative
must contain at least one temporal juncture.</span><p data-dcnode-id="1252"></p></blockquote><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">
As L&amp;W point out, stories can be told without any temporal juncture by
syntactic embedding, the use of the past perfect and other grammatical devices.
Temporal juncture is the simplest, most favored or unmarked way of recounting
the past.</span></p><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">
</span></p><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">
(1.2) Definition:  A </span><i data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">sequential clause</span></i><span data-dcnode-id="1242" instrument_node=""> is a clause that can be an
element of a temporal juncture.</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">
</span></p><p data-dcnode-id="1231"><span data-dcnode-id="1238" instrument_node="">
Any temporal relation of a subordinate clause to its matrix clause will be
indicated by its subordinate conjunction like </span><i data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">before, after</span></i><span data-dcnode-id="1235" instrument_node="">. Other
subordinate conjunctions like </span><i data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">about </span></i><span data-dcnode-id="1232" instrument_node="">in (1c) can only indicate
simultaneity.  Subordinate (i.e., dependent) clauses cannot therefore enter
into temporal juncture.</span></p><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">
</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">
</span></p><blockquote data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">(1.2.1) Implication: All sequential clauses are independent clauses (but not
all independent clauses are sequential clauses).</span></blockquote><span data-dcnode-id="1224" instrument_node=""> </span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">
</span></p><p data-dcnode-id="1218"><span data-dcnode-id="1221" instrument_node="">
For an independent clause to be a sequential clause, its head must include a
tense that is not only deictic, indicating a specific time domain, but identify
sequential time relations. The English past progressive designates a time
before the time of speaking but does not focus on the beginning or end points
of that time. Can the progressive function as the head of a sequential clause?
A number of cases like (1i) indicate that this is a possibility. The
progressive in (1i) is simultaneous with (j,k) but appears to be sequenced
after (h).</span><a data-dcnode-id="1219" href="#fn5" name="fnB5"><span data-dcnode-id="1220" instrument_node="">[6]</span></a></p><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">
</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">
</span></p><blockquote data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node=""> (1.2.2) Implication: [In English], sequential clauses are headed by verbs in
the preterit tense, past progressive,  or the present tense with the semantic
interpretation of a preterit (historical present).</span></blockquote><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">
</span></p><p data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">
Both the general definition of narrative and the definition of temporal
juncture demand that the reports be reports of real events. It follows that
modals, futures and negatives cannot serve as the heads of verb phrases which
enter into temporal juncture. In English, this function is reserved for the
indicative mood, which is our only </span><i data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">realis </span></i><span data-dcnode-id="1206" instrument_node="">mood.,</span></p><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">
</span></p><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">
</span></p><blockquote data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node=""> (1.2.3) Implication: All sequential clauses are in the </span><i data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">realis</span></i><span data-dcnode-id="1197" instrument_node=""> mood. </span></blockquote><span data-dcnode-id="1195" instrument_node=""> </span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">
</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">
(1.3) Definition: A </span><i data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">narrative clause </span></i><span data-dcnode-id="1189" instrument_node=""> consists of a sequential clause
[the head] with all subordinate clauses that are dependent upon it. </span></p><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">
</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1185" instrument_node="">
</span><b data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">2. Temporal types of narrative clauses.</span></b></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">
</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1179" instrument_node="">
We can now employ these definitions to give a simpler and clearer picture of
temporal ranges than L&amp;W provided. With the narrative clause defined on the
basis of sequential clauses -- clauses that </span><i data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">can</span></i><span data-dcnode-id="1176" instrument_node=""> have temporal juncture
--  it is possible to focus only upon temporal relations of the narrative
clauses, and exclude others.</span><a data-dcnode-id="1174" href="#fn6" name="fnB6"><span data-dcnode-id="1175" instrument_node="">[7]</span></a></p><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">
</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">
(2.1) Definition: The</span><i data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">range </span></i><span data-dcnode-id="1167" instrument_node=""> of a narrative clause is the set of
narrative clauses between the first preceding and next following temporal
juncture.</span></p><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">
</span></p><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">
In the transcription conventions followed here, the narrative range is
indicated by a left subscript indicating the number of preceding narrative
clauses the particular clause is simultaneous with, and the right subscript the
number of following clauses. The range is then the sum of the two.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">
</span></p><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">
(2.2) Definition: A </span><i data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">free clause</span></i><span data-dcnode-id="1156" instrument_node=""> is a clause which refers to a condition
that holds true during the entire narrative.</span></p><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">
</span></p><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">
A free clause is not then defined syntactically, but semantically. A past
progressive which serves as a restricted clause in one narrative may be a free
clause in another.</span></p><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">
</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">
</span></p><blockquote data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> (2.2.1) Implication:  A free clause cannot serve as a sequential clause in that
narrative in which it is free. </span></blockquote><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">
</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">
(2.3) Definition: A [temporally] </span><i data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">bound clause </span></i><span data-dcnode-id="1138" instrument_node="">is an independent clause
with a range of zero.</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">
</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">
	(2.3.1) Implication: All bound clauses are sequential clauses.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">
</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">
 (2.4) Definition: A narrative clause with a range greater than 0 is a
</span><i data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">restricted </span></i><span data-dcnode-id="1127" instrument_node="">clause. </span></p><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">
</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">
</span></p><blockquote data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node=""> (2.4.1) Implication: Narratives are sets of bound, restricted and free
clauses. </span></blockquote><span data-dcnode-id="1119" instrument_node=""> </span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">
</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">
We can then rewrite (1) with temporal ranges and classes of narrative clauses
indicated. Quotations with multiple clauses are resolved into individual
sequential actions.  In narrative, an important distinction between actions and
quotations is that the actions frequently overlap, while quotations rarely do
so. The rule that one person talks at a time is never flouted in personal
narrative.</span></p><p data-dcnode-id="966"><span data-dcnode-id="1114" instrument_node="">
(1')
</span><span data-dcnode-id="1113" instrument_node="">

</span><table data-dcnode-id="967"><tbody data-dcnode-id="968"><tr data-dcnode-id="1101"><td data-dcnode-id="1106"><sub data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">0</span></sub><span data-dcnode-id="1110" instrument_node="">a</span><sub data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">2</span></sub><span data-dcnode-id="1107" instrument_node=""> </span></td><td data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">restricted</span></td><td data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Oh I  w's settin' at a table drinkin'</span></td></tr><tr data-dcnode-id="1089"><td data-dcnode-id="1094"><sub data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">1</span></sub><span data-dcnode-id="1097" instrument_node="">b</span><sub data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">0</span></sub></td><td data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">restricted</span></td><td data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">And - this  Norwegian sailor come over</span></td></tr><tr data-dcnode-id="1077"><td data-dcnode-id="1082"><sub data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">0</span></sub><span data-dcnode-id="1085" instrument_node="">c</span><sub data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">0</span></sub></td><td data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">bound</span></td><td data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">an' kep' givin' me a bunch o' junk</span></td></tr><tr data-dcnode-id="1071"><td data-dcnode-id="1075"></td><td data-dcnode-id="1074"></td><td data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">about I  was  sittin'  with his woman.</span></td></tr><tr data-dcnode-id="1063"><td data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">d </span></td><td data-dcnode-id="1066"><spa away."</span></td></tr><tr data-dcnode-id="1013"><td data-dcnode-id="1018"><sub data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">0</span></sub><span data-dcnode-id="1022" instrument_node="">h</span><sub data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">0</span></sub><span data-dcnode-id="1019" instrument_node=""> </span></td><td data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">bound</span></td><td data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">[and I said]  "I  don't even wanna  fool with ya."</span></td></tr><tr data-dcnode-id="1002"><td data-dcnode-id="1006"><sub data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">0</span></sub><span data-dcnode-id="1009" instrument_node="">i</span><sub data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">2</span></sub></td><td data-dcnode-id="1005"></td><td data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">An'  nex' thing I know </span></td></tr><tr data-dcnode-id="995"><td data-dcnode-id="1000"></td><td data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">restricted</span></td><td data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">I 'm layin' on the floor, blood all   over me,</span></td></tr><tr data-dcnode-id="983"><td data-dcnode-id="988"><sub data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">1</span></sub><span data-dcnode-id="991" instrument_node="">j</span><sub data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">0</span></sub></td><td data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">restricted</span></td><td data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">An' a guy told me, says, "Don't move your
head."</span></td></tr><tr data-dcnode-id="970"><td data-dcnode-id="975"><sub data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">0</span></sub><span data-dcnode-id="979" instrument_node="">k</span><sub data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">0</span></sub><span data-dcnode-id="976" instrument_node=""> </span></td><td data-dcnode-id="973"><span data-dcnode-id="974" instrument_node=""> bound</span></td><td data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">[And he said,] Your throat's cut."</span></td></tr></tbody></table></p><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">
Here the subscripts for (a) indicate that (a) is not simultaneous with any
preceding events, but does overlap with the two following (and with the free
clause (d), which is not counted). But it is not simultaneous with (e), since
at that point Shambaugh is no longer simply  sitting at the table drinking. </span></p><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">
</span></p><p data-dcnode-id="958"><span data-dcnode-id="961" instrument_node="">
</span><b data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">3. Structural types of narrative clauses.</span></b></p><p data-dcnode-id="955"><span data-dcnode-id="957" instrument_node="">
</span><b data-dcnode-id="956"></b></p><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">
</span><b data-dcnode-id="953"></b><span data-dcnode-id="952" instrument_node="">We now consider the structural types of narrative clauses introduced by
L&amp;W. The chief addition to this part of the framework is that complicating
action clauses are necessarily sequential clauses, that is, they can
participate in temporal junctures; this is not true of abstracts, orientations
and codas. </span><b data-dcnode-id="951"></b></p><p data-dcnode-id="947"><span data-dcnode-id="949" instrument_node="">
</span><b data-dcnode-id="948"></b></p><p data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">
(3.1) Definition: An </span><i data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">abstract</span></i><span data-dcnode-id="943" instrument_node=""> is an initial clause in a narrative that
reports the entire sequence of events of the narrative.</span></p><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">
</span></p><p data-dcnode-id="932"><span data-dcnode-id="939" instrument_node="">
(3,2) Definition: An </span><i data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">orientation</span></i><span data-dcnode-id="936" instrument_node=""> </span><i data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">clause</span></i><span data-dcnode-id="933" instrument_node=""> gives information on the
time, place of the events of a narrative, the identities of the participants
and their initial behavior.</span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">
</span></p><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">
(3,3) Definition: A clause of </span><i data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">complicating action</span></i><span data-dcnode-id="926" instrument_node="">  is a sequential
clause that reports a next event in response to a potential question, "And what
happened [then]?"</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">
</span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">
</span></p><blockquote data-dcnode-id="916"><span data-dcnode-id="920" instrument_node=""> (3.3.1) Implication:  All sequential clauses are clauses of complicating action
and all clauses of complicating action are sequential clauses.</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">
</span></p><p data-dcnode-id="917"></p></blockquote><span data-dcnode-id="915" instrument_node="">
(3.4) Definition: A </span><i data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">coda</span></i><span data-dcnode-id="912" instrument_node=""> is a final clause which returns the narrative
to the time of speaking, precluding a potential question, "And what happened
then?"</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">
</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">
These are all qute self-explanatory, but also qite incomplete. Missing as yet
is the notion of a conclusion or resolution, which cannot be defined until the
concept of 'most reportable event' is introduced. More important is the fact
that many clauses in narratives do none of these things. The major thrust of
the L&amp;W analysis is to raise the question, "If a narrative is a report of
events that occurred, why do we find sentences headed by negatives, futures and
modals in narratives?" Or to put it another way, under what conditions is it
relevant to talk about what did not, but might have occurred? The primary
contribution of that paper was to link this structural question with the
socio-emotional concept of 'evaluation.'</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">
</span></p><p data-dcnode-id="902"><span data-dcnode-id="905" instrument_node="">
</span><b data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">4. Evaluation.</span></b></p><p data-dcnode-id="899"><span data-dcnode-id="901" instrument_node="">
</span><b data-dcnode-id="900"></b></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">
I begin here with a non-linguistic definition of this basic concept.</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">
</span></p><p data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">
(4.1) Definition: </span><i data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Evaluation</span></i><span data-dcnode-id="891" instrument_node=""> of a narrative event is information on the
consequences of the event for human needs and desires.</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">
</span></p><p data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">
(4.2) Definition: An </span><i data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">evaluative clause </span></i><span data-dcnode-id="884" instrument_node="">provides evaluation of a
narrative event.</span></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">
</span></p><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">
Though this is quite straightforward, it does not by itself relate to the
structural features of narrative in section 2.  L&amp;W discussed many types of
linguistic structures that served the function of evaluating narrative events,
including emphasis, parallel structures and comparatives. By far the most
important of these were the modals, negatives and futures that were questioned
above.  Our proposal that these references to events that did not occur, might
have occurred, or would occur served an evaluative purpose was the main
theoretical thrust of L&amp;W, and might be described as the:</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">
</span></p><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">
(4.3) L&amp;W Hypothesis 1: A narrative clause in an irrealis mood is an
</span><i data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">evaluative clause.</span></i><span data-dcnode-id="873" instrument_node="">.</span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">
</span></p><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">
More generally, looking at comparatives as well, we can advance this proposal
to the level of a theorem:</span></p><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">
</span></p><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">
(4.4) L&amp;W Theorem 1: A narrator evaluates events by comparing them with
events in an alternative reality that was not in fact realized.</span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">
</span></p><p data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">
From work that followed immediately after L&amp;W, we know that the frequency
of </span><i data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">irrealis </span></i><span data-dcnode-id="858" instrument_node="">clauses in narrative increases rapidly with age, as speakers
gain the ability to evaluate their experience (Labov 1972). </span></p><p data-dcnode-id="849"><span data-dcnode-id="856" instrument_node="">
	Finally, we have to distinguish between an evaluative </span><i data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">clause </span></i><span data-dcnode-id="853" instrument_node="">and an
</span><i data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">evaluation section</span></i><span data-dcnode-id="850" instrument_node="">.  Evaluative material is frequently spread throughout
a narrative, but more frequently it is concentrated in a way that suspends the
forward movement of the action. More generally, we define such sections:</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">
</span></p><p data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">
(4.5) Definition: A </span><i data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">section </span></i><span data-dcnode-id="843" instrument_node=""> of a narrative is a group of clauses of a
common functional type. </span></p><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">
</span></p><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">
and by this means re-state a second L&amp;W Theorem:</span></p><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">
</span></p><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">
(4.6) L&amp;W Theorem 2:  Evaluation is characteristically concentrated in an
evaluation section, placed  just before the most highly evaluated action, or
'point' of the narrative.</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">
</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">
The application of this conception of evaluation to (1) is straightforward
except for the problem of quotations. On the one hand, (1g) can be viewed as a
simple action which is a bound  event: Shambaugh said something to the
Norwegian sailor.  On the other hand, what was said represents two distinct
speech actions: a bare imperative which represents an unmitigated command; and
a negative scalar (='if I don't want to do a minimal action like fooling with
you, it follows that I don't want to do any more important action.')  From
everything we know about the connectivity of speech acts, the analysis must
ultimately rise to this more abstract level of action. Yet it is at the level
of sentence grammar that we find our most direct clues to evaluation. When an
actor in the narrative is animated to speak directly, no matter what the topic
or the addressee, the current situation  is open to evaluation. The use of
negatives, comparatives, modals or futures is therefore to be read as a form of
evaluation. In this sense, (1h) evaluates the narrative situation by comparing
it with one in which Shambaugh would want to fool with the other, and in (1j)
the other evaluates the situation in comparison with one where it would be safe
for Shambaugh to move his head. The assignment of structural categories to the
12 clauses is accordingly that of (1"). </span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">
</span></p><p data-dcnode-id="648"><span data-dcnode-id="827" instrument_node="">
