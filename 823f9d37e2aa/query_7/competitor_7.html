"732" instrument_node="">0</span></sub><span data-dcnode-id="730" instrument_node="">g</span><sub data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">0</span></sub></td><td data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">bound</span></td><td data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">an' told `im, I said, "Go  away,"</span></td></tr><tr data-dcnode-id="707"><td data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">EV</span></td><td data-dcnode-id="712"><sub data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">0</span></sub><span data-dcnode-id="716" instrument_node="">h</span><sub data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">0</span></sub><span data-dcnode-id="713" instrument_node=""> </span></td><td data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">bound   </span></td><td data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">[and I said,] " I  don't even wanna fool  with ya."</span></td></tr><tr data-dcnode-id="700"><td data-dcnode-id="705"></td><td data-dcnode-id="704"></td><td data-dcnode-id="703"></td><td data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">An'  nex' thing I know </span></td></tr><tr data-dcnode-id="685"><td data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">CA </span></td><td data-dcnode-id="691"><sub data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">0</span></sub><span data-dcnode-id="694" instrument_node="">i</span><sub data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">2</span></sub></td><td data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">restricted</span></td><td data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">I 'm layin' on the floor, blood all over me,</span></td></tr><tr data-dcnode-id="670"><td data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">EV</span></td><td data-dcnode-id="675"><span data-dcnode-id="681" instrument_node=""> </span><sub data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">1</span></sub><span data-dcnode-id="678" instrument_node="">j</span><sub data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">0</span></sub></td><td data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">restricted</span></td><td data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">An' a guy told me, says, "Don't move your head."</span></td></tr><tr data-dcnode-id="655"><td data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">CA </span></td><td data-dcnode-id="660"><sub data-dcnode-id="665"><span data-dcnode-id="666" instrument_node=""> 0</span></sub><span data-dcnode-id="664" instrument_node="">k</span><sub data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">0</span></sub><span data-dcnode-id="661" instrument_node=""> </span></td><td data-dcnode-id="658"><span data-dcnode-id="659" instrument_node=""> bound</span></td><td data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">[and he said], "Your throat's cut."</span></td></tr><tr data-dcnode-id="652"><td data-dcnode-id="653"></td></tr></tbody></table><span data-dcnode-id="649" instrument_node="">
</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">
</span></p><p data-dcnode-id="642"><span data-dcnode-id="645" instrument_node="">
</span><b data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">5. Reportability.</span></b></p><p data-dcnode-id="639"><span data-dcnode-id="641" instrument_node="">
</span><b data-dcnode-id="640"></b></p><p data-dcnode-id="631"><span data-dcnode-id="638" instrument_node="">
</span><b data-dcnode-id="636"><span data-dcnode-id="637" instrument_node=""> </span></b><span data-dcnode-id="635" instrument_node="">One of the most difficult yet essential concepts in narrative analysis
is </span><i data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">reportability</span></i><span data-dcnode-id="632" instrument_node="">. The original concept is that the telling a narrative
requires a person to occupy more social space than in other conversational
exchanges -- to hold the floor longer, and the narrative must carry enough
interest for the audience to justify this action. Otherwise, an implicit or
explicit "So what?" is in order, with the implication that the speaker has
violated social norms by making this unjustified claim. The difficulty is that
there is no absolute standard of inherent interest, and it has been proposed
that in some relaxed circumstances with no competing topics, a narrative can be
told that is thoroughly banal and ordinary. Given the difficulty of measuring
the interest of the narrative or the competing claims, this approach to
reportability is itself of limited interest. Yet the concept of "the most
reportable event" is central to the organizational structure of the narrative,
as we will see below.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">
	One approach to this problem is to turn to a more objective aspect of the
narrator's social situation, as developed in Sacks' approach to the insertion
of narrative into conversation (1992, Vol. 2, p. 3-5). In Sacks' approach, the
problem is not seen as one of "holding the floor," but rather of controlling
the assignment of speaker. For Sacks, a narrative is rarely told as a single
turn of talk, since the frequent back channel signals of the addressee are
themselves taken as turns of talk.  I summarize his discussion as:  </span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">
</span></p><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">
(5.1) Sacks Assignment Theorem:  In free conversation, speakers have no control
over the assignment of speaker in the second or third turn following their
turns, but the performance of the narrative is effectively a claim to return
the assignment of speakership to the narrator until the narrative is completed.
</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">
</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">
This Sacks principle has four implications that lead to a new definition of
reportability. </span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">
</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">
</span></p><blockquote data-dcnode-id="601"><span data-dcnode-id="616" instrument_node=""> (5.1.1) Implication 1: Since a narrative requires a series of narrative units
longer than the normal turn allows, the successful completion of the narrative
requires automatic re-assignment of speaker role to the narrator after the
following turn of talk if the narrative is not completed in that turn.</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">
</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">
(5.1.2) Implication 2: A narrative must be introduced by a speech act which
informs listener than automatic reassignment to the narrator will be required
if the narrative is not completed within that stream of speech.</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">
</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">
(5.1.3) Implication 3. Listeners have a reliable means of recognizing the ends
of narratives.</span></p><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">
</span></p><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">
(5.1.4) Implication 4: To be an acceptable social act, a narrative must be
accepted as justifying the automatic re-assignment of turns to the narrator. </span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">
</span></p></blockquote><span data-dcnode-id="600" instrument_node=""> </span><p data-dcnode-id="596"><span data-dcnode-id="599" instrument_node="">
We can now re-introduce a definition of reportability in terms not of the
general concept, but of a reportable event in the narrative</span><i data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">.</span></i></p><p data-dcnode-id="593"><span data-dcnode-id="595" instrument_node="">
</span><i data-dcnode-id="594"></i></p><p data-dcnode-id="586"><span data-dcnode-id="592" instrument_node="">
</span><i data-dcnode-id="591"></i><span data-dcnode-id="590" instrument_node="">(5.2) Definition:  A </span><i data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">reportable event</span></i><span data-dcnode-id="587" instrument_node=""> is one which justifies the
automatic reassignment of speaker role to the narrator.</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">
</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">
</span></p><blockquote data-dcnode-id="578"><span data-dcnode-id="581" instrument_node=""> (5.2.1) Implication: To be an acceptable social act, a narrative of personal
experience must contain at least one reportable event.</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">
</span></p></blockquote><span data-dcnode-id="577" instrument_node=""> </span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">
It is clear that the reportability of the same event will vary widely depending
on the age, experience, cultural patterns of the speakers, and even more
importantly, the immediate social context with its competing claims for
re-assignment of speakership.  The universal principles of interest which
underlie this approach to narrative dictate that certain events will almost
always carry a high degree of reportability: those dealing with death, sex and
moral indignation. Yet one step outside of these parameters leads us to a such
a high degree of contextualization of reportability that only a person
intimately acquainted with the audience and the recent history of the social
situation can be sure of not making a misstep in introducing a narrative. This
relativization of reportability does not however prevent us from recognizing
within a narrative degrees of reportability with some confidence. In fact, the
creation of a narrative and the ensuing narrative structures are dependent upon
the recognition of a unique event which is the 'most reportable.'</span></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">
</span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">
</span></p><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">
(5.3) Definition: A </span><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">most reportable event</span></i><span data-dcnode-id="567" instrument_node="">  is the event that is less
common than any other in the narrative and has the greatest effect upon the
needs and desires of the participants in the narrative [is evaluated most
strongly].</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">
</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">
A narrative of personal experience is essentially a narrative of the most
reportable event in it. This is normally reflected in the abstract, if there is
one. As we will see, the construction of narrative must logically and
existentially begin with the decision to report the most reportable event.
Narrative (1) is introduced as a narrative about a situation where Shambaugh
was close to dying. The most reportable event in it is that the Norwegian
sailor cut Shambaugh's throat. The problem of narrative construction is how to
construct a series of events which include in a logical and meaningful way this
most reportable event. But before considering how this is done, we must
recognize another dimension, orthogonal to that of reportability. Given the
constraints of social situations, and the pressure to assert claims to
speakership, it is normal for speakers to put forward narratives of the most
reportable event in their immediately relevant biography. It follows that:</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">
</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">
</span></p><blockquote data-dcnode-id="554"><span data-dcnode-id="557" instrument_node=""> (5.3.1)  Implication. The more reportable the most reportable event of a
narrative, the greater justification for the automatic reassignment of speaker
role to the narrator.</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">
</span></p></blockquote><span data-dcnode-id="553" instrument_node=""> </span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">
This creates the paradox of the next section.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">
</span></p><p data-dcnode-id="545"><span data-dcnode-id="548" instrument_node="">
</span><b data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">6. Credibility. </span></b></p><p data-dcnode-id="542"><span data-dcnode-id="544" instrument_node="">
</span><b data-dcnode-id="543"></b></p><p data-dcnode-id="533"><span data-dcnode-id="541" instrument_node="">
</span><b data-dcnode-id="539"><span data-dcnode-id="540" instrument_node=""> </span></b><span data-dcnode-id="538" instrument_node="">At the outset, it was pointed out that this approach to narrative is
based upon serious and straightforward accounts of events that are asserted to
have actually taken place, rather than jokes, tall tales, dreams or other
genres of a less serious nature.</span><a data-dcnode-id="536" href="#fn7" name="fnB7"><span data-dcnode-id="537" instrument_node="">[8]</span></a><span data-dcnode-id="535" instrument_node=""> The
narrative is then heard as an assertion that the events narrated did take
place, in roughly a forming corresponding to the verbal account. This
immediately involves the concept of the credibility of the narrative.</span><b data-dcnode-id="534"></b></p><p data-dcnode-id="530"><span data-dcnode-id="532" instrument_node="">
</span><b data-dcnode-id="531"></b></p><p data-dcnode-id="525"><span data-dcnode-id="529" instrument_node="">
(6.1) Definition:  The </span><i data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">credibility  </span></i><span data-dcnode-id="526" instrument_node="">of a narrative is the extent to
which listeners believe that the events described actually occurred in the form
described by the narrator.</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">
</span></p><p data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">
Remembering that the reportability of an event is related to its frequency, as
well as its effects upon the needs and desires of the actors, it follows almost
automatically that as reportability increases, credibility decreases. This in
fact may be termed the </span><i data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Reportability Paradox</span></i><span data-dcnode-id="519" instrument_node="">, which may be stated as a
theorem.</span></p><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">
</span></p><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">
(6.2) Theorem:  Reportability is inversely correlated with credibility.</span></p><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">
</span></p><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">
The further understanding of how narrators create narratives, and what
structures they erect as they produce them, depends upon an understanding of
this paradoxical relationship.  The next proposition is not an obvious
implication, but one that proceeds from the observation of social life. It is
limited to 'serious' narratives in the sense stated at the beginning of this
section, and may be relative to various social contexts.</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">
</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">
(6.3) Theorem: A serious narrative which fails to achieve credibility is
considered to have failed, and the narrators claim to re-assignment of
speakership will then be seen as invalid.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">
</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">
An "invalid claim to re-assignment" is a technical way of stating that the
narrator has suffered a loss of status which will affect future claims of this
sort as well as other social prerogatives. It is an outcome normally to be
avoided.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">
</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">
</span></p><blockquote data-dcnode-id="494"><span data-dcnode-id="497" instrument_node=""> (6.3.1) Implication:  The more reportable the events of a narrative, the more
effort the narrator must devote to establishing credibility.</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">
</span></p></blockquote><span data-dcnode-id="493" instrument_node=""> </span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">
The nature of that effort must now command our attention.</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">
</span></p><p data-dcnode-id="485"><span data-dcnode-id="488" instrument_node="">
</span><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">7. Causality.</span></b></p><p data-dcnode-id="482"><span data-dcnode-id="484" instrument_node="">
</span><b data-dcnode-id="483"></b></p><p data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">
</span><b data-dcnode-id="479"><span data-dcnode-id="480" instrument_node=""> </span></b><span data-dcnode-id="478" instrument_node="">Given the fact that the narrator has decided to produce a narrative
about the most reportable event, considerations of credibility lead logically
and inevitably to the following mechanism of narrative construction:</span></p><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">
</span></p><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">
(7.1) Theorem: Narrative construction requires a personal theory of
causality.</span></p><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">
</span></p><p data-dcnode-id="466"><span data-dcnode-id="470" instrument_node="">
1. The narrator first selects a most reportable event e</span><sub data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">0</span></sub><span data-dcnode-id="467" instrument_node="">, which the
narrative is going to be about.</span></p><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">
</span></p><p data-dcnode-id="453"><span data-dcnode-id="463" instrument_node="">
2. The narrator then selects a prior event e</span><sub data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">-1</span></sub><span data-dcnode-id="460" instrument_node=""> which is the
efficient cause of e</span><sub data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">0</span></sub><span data-dcnode-id="457" instrument_node="">, that is answers the question about
e</span><sub data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">0</span></sub><span data-dcnode-id="454" instrument_node="">, "How did that happen?" </span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">
</span></p><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">
3. The narrator continues the process of step 2, recursively, until an event
e</span><sub data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">-n</span></sub><span data-dcnode-id="447" instrument_node=""> is reached for which the question of step 2 is not
appropriate.</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">
</span></p><p data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">
The question "How did that happen?" is not appropriate when the answer is,
"Because that's the kind of thing we always (usually) do." Event e</span><sub data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">-n</span></sub><span data-dcnode-id="440" instrument_node="">
is the Orientation or the narrative, more specifically, the  behavioral context
of the Orientation. In (1), such orientation is provided by (a). Shambaugh need
not explain why it came about that he and his shipmates were sitting around a
bar drinking: this is the kind of thing that they always do in port, and the
listener is understood to know this.</span></p><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">
	We have no direct evidence of the actual sequence of steps 1...3; the view of
narrative as a folk theory of causality does not rest upon observation. It is a
necessary implication of all the definitions and implications of sections 5 and
6.  There are many intricacies and complications in the full description of the
options open to the narrator in constructing this causal theory. In the case of
narrative (1), the causal sequence of events reconstructable from the form of
Shambaugh's account may be given as follows:</span></p><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">
</span></p><p data-dcnode-id="389"><span data-dcnode-id="434" instrument_node="">
(7.2)
</span><span data-dcnode-id="433" instrument_node="">
</span><span data-dcnode-id="425" instrument_node="">
</span><span data-dcnode-id="417" instrument_node="">
</span><span data-dcnode-id="409" instrument_node="">
</span><span data-dcnode-id="401" instrument_node="">
</span><span data-dcnode-id="393" instrument_node="">
</span><table data-dcnode-id="391"><tbody data-dcnode-id="392"><tr data-dcnode-id="426"><td data-dcnode-id="429"><span data-dcnode-id="432" instrument_node="">e</span><sub data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">4</span></sub></td><td data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Orientation: Shambaugh and his shipmates were sitting at a
table drinking.</span></td></tr><tr data-dcnode-id="418"><td data-dcnode-id="421"><span data-dcnode-id="424" instrument_node="">e</span><sub data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">3</span></sub></td><td data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">[For no known reason,] a Norwegian sailor came to complain to
Shambaugh about a non-existent condition.</span></td></tr><tr data-dcnode-id="410"><td data-dcnode-id="413"><span data-dcnode-id="416" instrument_node="">e</span><sub data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">2</span></sub></td><td data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">[Because there was no basis for the complaint,] Shambaugh
rejected the complaint.</span></td></tr><tr data-dcnode-id="402"><td data-dcnode-id="405"><span data-dcnode-id="408" instrument_node="">e</span><sub data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">1</span></sub></td><td data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">[Because there was nothing further to be said,] Shambaugh
turned his back on the sailor.</span></td></tr><tr data-dcnode-id="394"><td data-dcnode-id="397"><span data-dcnode-id="400" instrument_node="">e</span><sub data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">0</span></sub></td><td data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">[Because Shambaugh had turned his back to the sailor,] the
sailor 	was able to cut Shambaugh's throat.</span></td></tr></tbody></table><span data-dcnode-id="390" instrument_node="">
</span></p><p data-dcnode-id="372"><span data-dcnode-id="388" instrument_node="">
The causal relationships are not given as explicitly in the narrative as in
(7.2). The causal basis of e</span><sub data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">2</span></sub><span data-dcnode-id="385" instrument_node=""> is given in the word </span><i data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">junk</span></i><span data-dcnode-id="382" instrument_node=""> of
(1c) and (1d). e</span><sub data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">1</span></sub><span data-dcnode-id="379" instrument_node=""> is implied but not stated. The causal link between
e</span><sub data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">1</span></sub><span data-dcnode-id="376" instrument_node=""> and e</span><sub data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">0</span></sub><span data-dcnode-id="373" instrument_node=""> is actually given by Shambaugh in a discussion
that followed the narrative. The moral he drew from the story is that the next
time he shoves someone he will stand up and hit him. Shambaugh's theory of the
events is therefore that he got his throat cut because he turned his back on
someone who was behaving in an incomprehensible way.</span></p><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">
	There are many intricate and difficult issues in the reduction of a narrative
statement to a causal one, and undoubtedly there will be wide variations in
such acts of interpretation. The essential construction is that there is a
proposed chain of events linking the orientation to the most reportable event.
It will turn out eventually that the selection of the Orientation is a crucial
act of interpretation of the stream of events, and a necessary step in the next
aspect of narrative, the assignment of praise and blame.</span></p><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">
</span></p><p data-dcnode-id="364"><span data-dcnode-id="367" instrument_node="">
</span><b data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">8. The assignment of praise and blame.</span></b></p><p data-dcnode-id="360"><span data-dcnode-id="363" instrument_node="">
</span><b data-dcnode-id="361"><span data-dcnode-id="362" instrument_node=""> </span></b></p><p data-dcnode-id="349"><span data-dcnode-id="359" instrument_node="">
	In section 7, narrative construction is equivalent to assigning a theory of
causality. In accounts of conflict between human actors, or the struggle of
human actors against natural forces, the narrator and the audience inevitably
assign praise and blame to the actors for the actions involved. The ways in
which this is done are too varied to be reduced to a simple set of
propositions. They include the use of linguistic devices of mood, factivity and
causativity,  evaluative lexicon, the insertion of "pseudo-events,"</span><a data-dcnode-id="357" href="#fn8" name="fnB8"><span data-dcnode-id="358" instrument_node="">[9]</span></a><span data-dcnode-id="356" instrument_node=""> and the wholesale omission of events.
Narratives may be </span><i data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">polarizing</span></i><span data-dcnode-id="353" instrument_node="">, where the antagonist is viewed as
maximally violating social norms, and the protagonist maximally conforming to
them; or they may be </span><i data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">integrating</span></i><span data-dcnode-id="350" instrument_node="">, where blame is set aside or passed
over by a variety of devices. The study of how narrators assign praise and
blame is a major aspect of narrative analysis, which lies beyond the scope of
the present article.</span></p><p data-dcnode-id="344"><span data-dcnode-id="348" instrument_node="">
	It may enough at the moment to see that in (1) the antagonist is assigned to a
</span><i data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">social type </span></i><span data-dcnode-id="345" instrument_node=""> conventionally associated with Scandinavian sailors in
port:  a large, violent, drunken and irrational person (see O'Neill 1956).
Shambaugh views himself as a rational being who made a mistake in
underestimating the extent of the irrationality of the other.</span></p><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">
	An understanding of how the underlying events are presented can be obtained
from a broader view of the most likely cause of the events involved.  The scene
in the bar in Buenos Aires reflects a common source of violence in working
class society, reflected in many narratives gathered over the years. The
situation is most clearly analyzed in the following extract from an interview
with Joe Dignall, 20, of Liverpool:</span></p><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">
</span></p><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">
</span></p><blockquote data-dcnode-id="328"><span data-dcnode-id="337" instrument_node=""> A lot of fellas, if they're with a gang, they let their birds sit with their
mates, while he stands at the bar with his mates, talkin' about things. And you
could go up, start chattin' this bird up, an' next thing--y'know, you're none
the wiser. An' she's edgin' yer on, on, you're a nice fella, you've got a few
bob. Great! And--you're chattin' it up there, you're buyin' her a few shorts. .
. Nex' thing, eh, a fella comin' there over there, "Eh ay lads. . . what are ya
doin'?" Well </span><u data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">you</span></u><span data-dcnode-id="334" instrument_node=""> don't know he's goin' with her, so you tell </span><u data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">him</span></u><span data-dcnode-id="331" instrument_node="">
to push off. Nex' thing he's got his friends--his mates on to you, an' uh. . .
you're in lumber! You've either got to run, or fight!</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">
</span></p></blockquote><span data-dcnode-id="327" instrument_node=""> </span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">
	Thus one can see behind these events the possibility that there was in fact a
woman sitting at the table who had originally come with or been with the
Norwegian sailor; that she had joined Shambaugh's group, or that his group had
joined her, seeing no connection between her and the Norwegian sailor; that she
had stayed to pick up a few drinks or customers; and that the Norwegian sailor
had in his own eyes a legitimate complaint.  The sequence of causal factors
from the point of view of the Norwegian sailor would be quite different, and
the motivation for his behavior might be less incomprehensible. This is not our
problem here, however. It is sufficient to see that Shambaugh has presented a
causal sequence beginning with the Orientation (1a) which implements his own
causal theory. It is equally clear that if the story had been presented from
the viewpoint of the Norwegian sailor, a different orientation would have been
selected, one considerably earlier in the sequence of events.</span></p><p data-dcnode-id="322"><span data-dcnode-id="324" instrument_node="">
	The assignment of praise or blame certainly reflects the point of view of the
narrator. But it is not usually a conscious part of the information conveyed by
the narrator to the audience; it is rather the ideological framework within
which events are viewed. By making that ideology overt, we are departing from
the dramatic mechanism that is the essence of the narrative speech event: the
transfer of experience from the narrator to the audience. That experience is
certainly colored by the moral stance taken by the narrator. One might think
that those who take the same moral stance will be more impressed by the
narrative than those who do not, and therefore find it more credible as well as
more interesting and engaging. So far, it appears that this is true only to a
limited extent. Shambaugh's narrative appears to have an equal impact on those
who accept his point of view and those who find him insensitive to the social
reality around him. The effect of the narrative in transferring experience is
relatively independent of the narrator's assignment of praise and blame.
Through one means or another, the narrator induces the audience to see the
world through the narrator's eyes. </span><b data-dcnode-id="323"></b></p><p data-dcnode-id="319"><span data-dcnode-id="321" instrument_node="">
</span><b data-dcnode-id="320"></b></p><p data-dcnode-id="315"><span data-dcnode-id="318" instrument_node="">
</span><b data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">9. Viewpoint.</span></b></p><p data-dcnode-id="311"><span data-dcnode-id="314" instrument_node="">
</span><b data-dcnode-id="312"><span data-dcnode-id="313" instrument_node=""> </span></b></p><p data-dcnode-id="305"><span data-dcnode-id="310" instrument_node="">
</span><b data-dcnode-id="308"><span data-dcnode-id="309" instrument_node=""> </span></b><span data-dcnode-id="307" instrument_node="">In trying to understand how experience is transferred from the narrator
to the audience, we encounter the most characteristic feature of narratives of
personal experience, the particular point of view or viewpoint from which the
action is seen.</span><b data-dcnode-id="306"></b></p><p data-dcnode-id="302"><span data-dcnode-id="304" instrument_node="">
</span><b data-dcnode-id="303"></b></p><p data-dcnode-id="295"><span data-dcnode-id="301" instrument_node="">
</span><b data-dcnode-id="300"></b><span data-dcnode-id="299" instrument_node="">(9.1) Definition:  The </span><i data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">viewpoint </span></i><span data-dcnode-id="296" instrument_node="">of a narrative clause is the
spatio-temporal domain from which the information conveyed by the clause could
be obtained by an observer.</span></p><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">
</span></p><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">
One feature of oral narratives of personal experience that distinguishes them
most sharply from literary narrative is that in literature, one can switch
viewpoints, take an impersonal viewpoint, and enter into the consciousness of
any or all of the actors. In oral narratives of personal experience, there is
only one option. The events are seen through the eyes of the narrator.</span></p><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">
</span></p><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">
(9.2) Finding:  The viewpoint in oral narratives of personal experience is that
of the narrator at the time of the events referred to.</span></p><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">
</span></p><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">
This finding applies consistently to all the narrative and free clauses in the
narrative. It applies to all of the clauses of the narrative (1), which are
consistently an account of events as they become known to Shambaugh.</span></p><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">
</span></p><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">
(9.2.1) Implication: The temporal sequence of events in oral narratives of
personal experience follows the order in which the events became known to the
narrator.</span></p><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">
</span></p><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">
In literary narrative, it is not uncommon for the viewpoint to shift to give
information about events that occurred at an earlier point in time.
Classically, this is expressed as a flash-back: "Meanwhile, back at the
farm..." It is an empirical findings of some weight that flashbacks are not
used in the type of narrative that we are dealing with here.</span></p><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">
</span></p><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">
</span></p><blockquote data-dcnode-id="267"><span data-dcnode-id="270" instrument_node=""> (9.2.2) Finding:  There are no flashbacks in oral narratives of personal
experience.</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">
</span></p></blockquote><span data-dcnode-id="266" instrument_node=""> </span><p data-dcnode-id="261"><span data-dcnode-id="265" instrument_node="">
The </span><i data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">no flash-back </span></i><span data-dcnode-id="262" instrument_node="">condition holds for a very large number of narratives
of personal experience that have been collected and studied over the years. In
narrative (1), Shambaugh's throat is cut without him realizing it. We do not
learn that this has happened until Shambaugh learns of it. One can easily
construct a plausible narrative in which the opposite technique is used. For
example, "The next thing I know I'm lying on the floor, blood all over me. He
had pulled a knife and cut me before I knew what happened. A guy told me,
says...." Yet no such examples have been found. The past perfect is used, but
only to report events that the narrator knew at the time they are reported.
Perhaps examples will be found if the search continues long enough, but at this
time it seems to be an empirical fact that the no flashback condition is
binding on oral narratives of personal experience.</span></p><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">
</span></p><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">
</span></p><p data-dcnode-id="252"><span data-dcnode-id="256" instrument_node="">
</span><b data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">10. Objectivity</span></b><span data-dcnode-id="253" instrument_node="">.</span></p><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">
</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">
	Among the thousands of personal narratives that have been recorded and studied
over the past few decades, we find a great deal of variability in the degree of
objectivity. L&amp;W presented a scale of the objectivity of evaluative
statements which range from reports of internal emotions to observations of
material objects and events.  </span></p><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">
	In general, we find that narratives of upper middle class, university-educated
speakers tend to report on the narrators' emotions.  In contrast, many working
class narrators are sparing in their reporting of subjective feelings. It was
somewhat surprising to me to find that the "subjectivity"characteristic of
middle class speakers is considered a positive quality by therapeutically
oriented writers, and people who do not report their emotions in narratives of
bereavement, for example, are considered to be suffering from an impairment of
normal and desirable abilities. My own experience in retelling narratives to
various experiences indicates a somewhat different scale of values. Those
narratives that have the greatest impact upon audiences in the sense outlined
above -- which seize the attention of listeners  and allow them to share the
experience of the narrator -- are those that the use the most objective means
of expression. To follow this argument more exactly, some definitions are
required. </span></p><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">
</span></p><p data-dcnode-id="236"><span data-dcnode-id="243" instrument_node="">
(10.1) Definition: An </span><i data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">objective event</span></i><span data-dcnode-id="240" instrument_node=""> is one that became known to the
narrator through sense experience. A </span><i data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">subjective event </span></i><span data-dcnode-id="237" instrument_node="">is one that the
narrator became aware of through memory, emotional reaction or internal
sensation.</span></p><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">
</span></p><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">
The general observation that narratives that report experience objectively are
more effective than those that report subjectively is not a strongly
evidentiary statement; no hard data supports it. Nevertheless, some
experimental evidence supports the belief that objectivity increases
credibility.</span></p><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">
</span></p><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">
(10.2) Theorem: Since it is generally agreed that the narrators' observations
can be affected by their internal states, reports of objective events are more
credible than reports of subjective events.</span></p><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">
</span></p><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">
To exlore the many ways in which objective and subjective approaches to
narrative differ would go beyond the scope of this brief summary. The clauses
of narrative (1) are entirely objective. At no point are there any statements
that describe how the actors feel. We are told what they said and what they
did. The concluding statements of (1j,k) are those of a third person witness to
the events, more objective than any statements of the main actors. It is
proposed here that this objectivity is a necessary condition for the capacity
of narratives like (1) to transmit experience to the audience. To develop this
point clearly, a further implication may be drawn from finding (9.2):</span></p><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">
</span></p><p data-dcnode-id="217"><span data-dcnode-id="221" instrument_node="">
(10.3) Theorem: The transfer of experience of an event to listeners occurs to
the extent that they become aware of it </span><i data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">as if </span></i><span data-dcnode-id="218" instrument_node="">it were their own
experience.</span></p><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">
</span></p><p data-dcnode-id="210"><span data-dcnode-id="214" instrument_node="">
The </span><i data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">as if </span></i><span data-dcnode-id="211" instrument_node="">condition may be expanded to mean that listeners achieve
awareness of the event in the same way that the narrator became aware of it.
The essential No Flash-Back condition follows immediately from this condition.
If theorem (10.3) holds, two consequences immediately follow to mark the limits
of the transfer of experience in personal narrative. </span></p><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">
</span></p><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">
</span></p><blockquote data-dcnode-id="187"><span data-dcnode-id="205" instrument_node=""> (10.3.1) Implication: The transfer of experience from narrator to audience is
limited, since the verbal account gives only a small fraction of the
information that that the narrator received through sight, sound and other
senses.</span><a data-dcnode-id="203" href="#fn9" name="fnB9"><span data-dcnode-id="204" instrument_node="">[10]</span></a><span data-dcnode-id="202" instrument_node=""> </span><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">
</span></p><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">
(10.3.2) Implication: To the extent that narrators add subjective reports of
their emotions to the description of an objective event, listeners become aware
of that event as if it were the narrator's experience.</span></p><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">
</span></p><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">
These two implications lead to a further proposition that is more than an
implication. It combines the experience derived from re-telling stories and
observations of social class differences in narrative structure with the logic
of 10.3.1-2 to derive the following theorem:</span></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">
</span></p><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">
(10.3.3). Theorem: The objectivity of the description of an event is a
necessary condition for the transfer of experience in personal narrative.</span></p><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">
</span></p></blockquote><span data-dcnode-id="186" instrument_node=""> </span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">
There is more than a hint of a paradox here. The transfer of experience is a
subjective phenomenon, which is not easy to observe or measure. The theorem
argues that this subjective experience is obtainable only through the objective
presentation of events.</span></p><p data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">
</span></p><p data-dcnode-id="178"><span data-dcnode-id="181" instrument_node="">
</span><b data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">11. Resolution.</span></b></p><p data-dcnode-id="175"><span data-dcnode-id="177" instrument_node="">
</span><b data-dcnode-id="176"></b></p><p data-dcnode-id="167"><span data-dcnode-id="174" instrument_node="">
</span><b data-dcnode-id="172"><span data-dcnode-id="173" instrument_node=""> </span></b><span data-dcnode-id="171" instrument_node="">In the L&amp;W treatment, the resolution of a narrative was simply the
ending or outcome; there was no very precise way of distinguishing it from the
last complicating action. But this situation is sharply altered with the
introduction of the most reportable action as a structural unit in section 5.
The resolution can be seen to be logically the series of complicating actions
that follow rather than precede e</span><sub data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">0</span></sub><span data-dcnode-id="168" instrument_node="">. </span></p><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">
</span></p><p data-dcnode-id="160"><span data-dcnode-id="164" instrument_node="">
(11.1) Definition: The </span><i data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">resolution</span></i><span data-dcnode-id="161" instrument_node=""> of a personal narrative is the set of
complicating actions that follow the most reportable event.</span></p><p data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">
</span></p><p data-dcnode-id="153"><span data-dcnode-id="157" instrument_node="">
In narrative (1), there appears to be no distinct resolution section. At first
glance, the narrative ends with the most reportable event, so that the
resolution coincides with the e</span><sub data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">0</span></sub><span data-dcnode-id="154" instrument_node="">.  Yet closer examination shows that
(1j,k) is not the most reportable event, but a report of the most reportable
event, which itself is implied rather than reported. Is it then a resolution?</span></p><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">
	L&amp;W defined the coda as a the clause or clauses that bring the narrative
back to the time of telling, so that the question "What happened then?" is no
longer appropriate. This does not mean that the listener is automatically
satisfied with all of the information given on the outcome of the most
reportable event. If a resolution is not satisfactory in this respect, the
listener will have the impression that the narrative is incomplete. I have
probed a number of audiences for their reaction to narrative (1) on this point,
and the consensus seems to be that the narrative does come to an end. Shambaugh
paused at this point long enough for me to ask a question, and in a series of
exchanges I learned that the Norwegian sailor's knife had cut his throat but
missed the jugular vein; that Shambaugh in fact had the knife upstairs in his
room; that one of his friends had hit the Norwegian sailor with a chair; and
that the blow had killed him. These facts are interesting, and their absence
from the narrative throws light on Shambaugh's approach to the matter. But they
do not form part of the narrative as it is now constituted, and we must infer
that (1j,k) is indeed its resolution.</span></p><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">
</span></p><p data-dcnode-id="145"><span data-dcnode-id="148" instrument_node="">
</span><b data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">12. Conclusion.</span></b></p><p data-dcnode-id="141"><span data-dcnode-id="144" instrument_node="">
</span><b data-dcnode-id="142"><span data-dcnode-id="143" instrument_node=""> </span></b></p><p data-dcnode-id="136"><span data-dcnode-id="140" instrument_node="">
</span><b data-dcnode-id="138"><span data-dcnode-id="139" instrument_node=""> </span></b><span data-dcnode-id="137" instrument_node="">The L&amp;W analysis introduced the definition of narrative as a
technique of reporting past events through temporal juncture, and established a
basis for the understanding of the temporal organization and evaluation of
narrative. This contribution has explored further the concept of reportability,
arguing that the most reportable event is the semantic and structural pivot on
which the narrative is organized. Given an initial inverse relation between
credibility and reportability, it follows that narrators who command the
attention and interest of their audience will normally maximize credibility by
the objective reporting of events. </span></p><p data-dcnode-id="133"><span data-dcnode-id="135" instrument_node="">
	The second half of this contribution focuses upon the capacity of a narrative
to transfer the experience of the narrator to the audience. This capacity is
seen to depend upon the unique and defining property of personal narrative that
events are experienced as they first became known to the narrator. It is
proposed that the transfer of experience of an event to listeners occurs to the
extent that they become aware of it as if it were their own experience. It
follows that this is only possible if the narrator reports events as objective
experience without reference to the narrator's emotional reactions.</span><b data-dcnode-id="134"></b></p><p data-dcnode-id="129"><span data-dcnode-id="132" instrument_node="">
</span><b data-dcnode-id="131"></b><span data-dcnode-id="130" instrument_node="">	It is also proposed that a narrative can be viewed as a theory of the
causes of the most reportable event, so that the crucial interpretive act is
the location of the orientation as the situation that does not require an
explicit cause. The chain of causal events selected in the narrative is
intimately linked with the assignment of praise and blame for the actions
reported. This view of narrative as a theory of moral behavior and the narrator
as an exponent of cultural norms will be pursued in later publications.</span></p><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">
</span></p><p data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">
