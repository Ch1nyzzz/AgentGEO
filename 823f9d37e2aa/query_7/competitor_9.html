</span><div class="thumb tright" data-dcnode-id="5893"><div class="thumbinner" data-dcnode-id="5894" style="width:252px;"><a class="image" data-dcnode-id="5905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAdam_and_Eve_by_Lucas_Cranach_%28I%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5906" data-file-height="700" data-file-width="965" decoding="async" height="181" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Adam_and_Eve_by_Lucas_Cranach_%2528I%2529.jpg/250px-Adam_and_Eve_by_Lucas_Cranach_%2528I%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Adam_and_Eve_by_Lucas_Cranach_%28I%29.jpg/375px-Adam_and_Eve_by_Lucas_Cranach_%28I%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Adam_and_Eve_by_Lucas_Cranach_%28I%29.jpg/500px-Adam_and_Eve_by_Lucas_Cranach_%28I%29.jpg 2x" width="250"></a><span data-dcnode-id="5904" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5895"><div class="magnify" data-dcnode-id="5902"><a class="internal" data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAdam_and_Eve_by_Lucas_Cranach_%28I%29.jpg" title="Enlarge"></a></div><i data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">Eden</span></i><span data-dcnode-id="5899" instrument_node=""> (</span><a data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucas_Cranach_the_Elder" title="Lucas Cranach the Elder"><span data-dcnode-id="5898" instrument_node="">Lucas Cranach the Elder</span></a><span data-dcnode-id="5896" instrument_node="">, 1472–1553)</span></div></div></div><span data-dcnode-id="5892" instrument_node="">
</span><p data-dcnode-id="5845"><span data-dcnode-id="5891" instrument_node="">The meaning to be derived from the Genesis creation narrative will depend on the reader's understanding of its </span><a data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literary_genre" title="Literary genre"><span data-dcnode-id="5890" instrument_node=""> genre</span></a><span data-dcnode-id="5888" instrument_node="">, the literary "type" to which it belongs (e.g., scientific cosmology, creation myth, or historical saga).</span><sup class="reference" data-dcnode-id="5885" id="cite_ref-FOOTNOTEWood1990323–24_92-0"><a data-dcnode-id="5886" href="#cite_note-FOOTNOTEWood1990323%E2%80%9324-92"><span data-dcnode-id="5887" instrument_node="">[91]</span></a></sup><span data-dcnode-id="5884" instrument_node=""> According to Biblical scholar </span><a data-dcnode-id="5882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Andersen" title="Francis Andersen"><span data-dcnode-id="5883" instrument_node="">Francis Andersen</span></a><span data-dcnode-id="5881" instrument_node="">, misunderstanding the genre of the text—meaning the intention of the author(s) and the culture within which they wrote—will result in a misreading.</span><sup class="reference" data-dcnode-id="5878" id="cite_ref-FOOTNOTEAndersen1987142_93-0"><a data-dcnode-id="5879" href="#cite_note-FOOTNOTEAndersen1987142-93"><span data-dcnode-id="5880" instrument_node="">[92]</span></a></sup><span data-dcnode-id="5877" instrument_node=""> </span><a data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calvinism" title="Calvinism"><span data-dcnode-id="5876" instrument_node="">Reformed</span></a><span data-dcnode-id="5874" instrument_node=""> </span><a data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evangelicalism" title="Evangelicalism"><span data-dcnode-id="5873" instrument_node="">evangelical</span></a><span data-dcnode-id="5871" instrument_node=""> scholar </span><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruce_Waltke" title="Bruce Waltke"><span data-dcnode-id="5870" instrument_node="">Bruce Waltke</span></a><span data-dcnode-id="5868" instrument_node=""> cautions against one such misreading: the "woodenly literal" approach, which leads to "</span><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Creation_science" title="Creation science"><span data-dcnode-id="5867" instrument_node="">creation science</span></a><span data-dcnode-id="5865" instrument_node="">", but also to such "implausible interpretations" as the "</span><a class="mw-redirect" data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gap_theory" title="Gap theory"><span data-dcnode-id="5864" instrument_node="">gap theory</span></a><span data-dcnode-id="5862" instrument_node="">", the presumption of a "</span><a class="mw-redirect" data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young_earth" title="Young earth"><span data-dcnode-id="5861" instrument_node="">young earth</span></a><span data-dcnode-id="5859" instrument_node="">", and the denial of </span><a data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evolution" title="Evolution"><span data-dcnode-id="5858" instrument_node="">evolution</span></a><span data-dcnode-id="5856" instrument_node="">.</span><sup class="reference" data-dcnode-id="5853" id="cite_ref-FOOTNOTEWaltke19916–9_8-1"><a data-dcnode-id="5854" href="#cite_note-FOOTNOTEWaltke19916%E2%80%939-8"><span data-dcnode-id="5855" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5852" instrument_node=""> As scholar of </span><a data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_studies" title="Jewish studies"><span data-dcnode-id="5851" instrument_node="">Jewish studies</span></a><span data-dcnode-id="5849" instrument_node="">, </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jon_D._Levenson" title="Jon D. Levenson"><span data-dcnode-id="5848" instrument_node="">Jon D. Levenson</span></a><span data-dcnode-id="5846" instrument_node="">, puts it:
</span></p><span data-dcnode-id="5844" instrument_node="">
</span><link data-dcnode-id="5843" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5837"><p data-dcnode-id="5838"><span data-dcnode-id="5842" instrument_node="">How much history lies behind the story of Genesis? Because the action of the primeval story is not represented as taking place on the plane of ordinary human history and has so many affinities with ancient mythology, it is very far-fetched to speak of its narratives as historical at all."</span><sup class="reference" data-dcnode-id="5839" id="cite_ref-FOOTNOTELevenson200411_94-0"><a data-dcnode-id="5840" href="#cite_note-FOOTNOTELevenson200411-94"><span data-dcnode-id="5841" instrument_node="">[93]</span></a></sup></p></blockquote><span data-dcnode-id="5836" instrument_node="">
</span><p data-dcnode-id="5824"><span data-dcnode-id="5835" instrument_node="">Another scholar, </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conrad_Hyers" title="Conrad Hyers"><span data-dcnode-id="5834" instrument_node="">Conrad Hyers</span></a><span data-dcnode-id="5832" instrument_node="">, summed up the same thought by writing, "A </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_literalism" title="Biblical literalism"><span data-dcnode-id="5831" instrument_node=""> literalist</span></a><span data-dcnode-id="5829" instrument_node=""> interpretation of the Genesis accounts is inappropriate, misleading, and unworkable [because] it presupposes and insists upon a kind of literature and intention that is not there."</span><sup class="reference" data-dcnode-id="5826" id="cite_ref-FOOTNOTEHyers198428_95-0"><a data-dcnode-id="5827" href="#cite_note-FOOTNOTEHyers198428-95"><span data-dcnode-id="5828" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5825" instrument_node="">
</span></p><p data-dcnode-id="5803"><span data-dcnode-id="5823" instrument_node="">Whatever else it may be, Genesis 1 is "story", since it features character and characterization, a narrator, and dramatic tension expressed through a series of incidents arranged in time.</span><sup class="reference" data-dcnode-id="5820" id="cite_ref-FOOTNOTECotter20035–9_96-0"><a data-dcnode-id="5821" href="#cite_note-FOOTNOTECotter20035%E2%80%939-96"><span data-dcnode-id="5822" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5819" instrument_node=""> The Priestly author of Genesis 1 had to confront two major difficulties. First, there is the fact that since only God exists at this point, no-one was available to be the narrator; the storyteller solved this by introducing an unobtrusive "third person narrator".</span><sup class="reference" data-dcnode-id="5816" id="cite_ref-FOOTNOTECotter20037_97-0"><a data-dcnode-id="5817" href="#cite_note-FOOTNOTECotter20037-97"><span data-dcnode-id="5818" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5815" instrument_node=""> Second, there was the problem of conflict: conflict is necessary to arouse the reader's interest in the story, yet with nothing else existing, neither a chaos-monster nor another god, there cannot be any conflict. This was solved by creating a very minimal tension: God is opposed by nothingness itself, the blank of the world "without form and void."</span><sup class="reference" data-dcnode-id="5812" id="cite_ref-FOOTNOTECotter20037_97-1"><a data-dcnode-id="5813" href="#cite_note-FOOTNOTECotter20037-97"><span data-dcnode-id="5814" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5811" instrument_node=""> Telling the story in this way was a deliberate choice: there are a number of creation stories in the Bible, but they tend to be told in the first person, by Wisdom, the instrument by which God created the world; the choice of an </span><a class="mw-redirect" data-dcnode-id="5809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative_mode%23Third-person%2C_omniscient" title="Narrative mode"><span data-dcnode-id="5810" instrument_node=""> omniscient third-person narrator</span></a><span data-dcnode-id="5808" instrument_node=""> in the Genesis narrative allows the storyteller to create the impression that everything is being told and nothing held back.</span><sup class="reference" data-dcnode-id="5805" id="cite_ref-FOOTNOTECotter20038_98-0"><a data-dcnode-id="5806" href="#cite_note-FOOTNOTECotter20038-98"><span data-dcnode-id="5807" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5804" instrument_node="">
</span></p><p data-dcnode-id="5790"><span data-dcnode-id="5802" instrument_node="">One can also regard Genesis as "historylike", "part of a broader spectrum of originally anonymous, history-like ancient Near Eastern narratives."</span><sup class="reference" data-dcnode-id="5799" id="cite_ref-FOOTNOTECarr199621._99-0"><a data-dcnode-id="5800" href="#cite_note-FOOTNOTECarr199621.-99"><span data-dcnode-id="5801" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5798" instrument_node=""> Scholarly writings frequently refer to Genesis as myth, but there is no agreement on how to define "myth", and so while </span><a data-dcnode-id="5796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brevard_Childs" title="Brevard Childs"><span data-dcnode-id="5797" instrument_node="">Brevard Childs</span></a><span data-dcnode-id="5795" instrument_node=""> famously suggested that the author of Genesis 1–11 "demythologised" his narrative, meaning that he removed from his sources (the Babylonian myths) those elements which did not fit with his own faith, others can say it is entirely mythical.</span><sup class="reference" data-dcnode-id="5792" id="cite_ref-FOOTNOTEHamilton199057–58_9-1"><a data-dcnode-id="5793" href="#cite_note-FOOTNOTEHamilton199057%E2%80%9358-9"><span data-dcnode-id="5794" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5791" instrument_node="">
</span></p><p data-dcnode-id="5726"><span data-dcnode-id="5789" instrument_node="">Genesis 1–2 reflects ancient ideas about science: in the words of </span><a class="mw-redirect" data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E.A._Speiser" title="E.A. Speiser"><span data-dcnode-id="5788" instrument_node="">E.A. Speiser</span></a><span data-dcnode-id="5786" instrument_node="">, "on the subject of creation biblical tradition aligned itself with the traditional tenets of Babylonian science."</span><sup class="reference" data-dcnode-id="5783" id="cite_ref-FOOTNOTESeidman2010166_100-0"><a data-dcnode-id="5784" href="#cite_note-FOOTNOTESeidman2010166-100"><span data-dcnode-id="5785" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5782" instrument_node=""> The opening words of Genesis 1, "In the beginning God created the heavens and the earth", sum up the author(s) belief that </span><a data-dcnode-id="5780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="5781" instrument_node="">Yahweh</span></a><span data-dcnode-id="5779" instrument_node="">, the god of Israel, was solely responsible for creation and had no rivals.</span><sup class="reference" data-dcnode-id="5776" id="cite_ref-FOOTNOTEWright200253_101-0"><a data-dcnode-id="5777" href="#cite_note-FOOTNOTEWright200253-101"><span data-dcnode-id="5778" instrument_node="">[100]</span></a></sup><span data-dcnode-id="5775" instrument_node=""> Later Jewish thinkers, adopting ideas from Greek philosophy, concluded that </span><a class="mw-redirect" data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wisdom_of_God" title="Wisdom of God"><span data-dcnode-id="5774" instrument_node="">God's Wisdom</span></a><span data-dcnode-id="5772" instrument_node="">, </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logos" title="Logos"><span data-dcnode-id="5771" instrument_node="">Word</span></a><span data-dcnode-id="5769" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Spirit_%28Judaism%29" title="Holy Spirit (Judaism)"><span data-dcnode-id="5768" instrument_node="">Spirit</span></a><span data-dcnode-id="5766" instrument_node=""> penetrated all things and gave them unity.</span><sup class="reference" data-dcnode-id="5763" id="cite_ref-FOOTNOTEKaiser199728_102-0"><a data-dcnode-id="5764" href="#cite_note-FOOTNOTEKaiser199728-102"><span data-dcnode-id="5765" instrument_node="">[101]</span></a></sup><span data-dcnode-id="5762" instrument_node="">  Christianity in turn adopted these ideas and identified </span><a data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="5761" instrument_node="">Jesus</span></a><span data-dcnode-id="5759" instrument_node=""> with the </span><a data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logos_%28Christianity%29" title="Logos (Christianity)"><span data-dcnode-id="5758" instrument_node="">creative word</span></a><span data-dcnode-id="5756" instrument_node="">: "In the beginning was the Word, and the Word was with God, and the Word was God" (</span><a data-dcnode-id="5754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_1%3A1" title="John 1:1"><span data-dcnode-id="5755" instrument_node="">John 1:1</span></a><span data-dcnode-id="5753" instrument_node="">).</span><sup class="reference" data-dcnode-id="5750" id="cite_ref-FOOTNOTEParrish1990183–84_103-0"><a data-dcnode-id="5751" href="#cite_note-FOOTNOTEParrish1990183%E2%80%9384-103"><span data-dcnode-id="5752" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5749" instrument_node=""> When the Jews came into contact with Greek thought, there followed a major reinterpretation of the underlying cosmology of the Genesis narrative. The biblical authors conceived the cosmos as a flat disc-shaped Earth in the centre, an underworld for the dead below, and heaven above.</span><sup class="reference" data-dcnode-id="5746" id="cite_ref-FOOTNOTEAune2003119_104-0"><a data-dcnode-id="5747" href="#cite_note-FOOTNOTEAune2003119-104"><span data-dcnode-id="5748" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5745" instrument_node=""> Below the Earth were the "waters of chaos", the cosmic sea, home to mythic monsters defeated and slain by God; in Exodus 20:4, God warns against making an image "of anything that is in the waters under the earth".</span><sup class="reference" data-dcnode-id="5742" id="cite_ref-FOOTNOTEWright200253_101-1"><a data-dcnode-id="5743" href="#cite_note-FOOTNOTEWright200253-101"><span data-dcnode-id="5744" instrument_node="">[100]</span></a></sup><span data-dcnode-id="5741" instrument_node=""> There were also waters above the Earth, and so the </span><i data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node="">raqia</span></i><span data-dcnode-id="5738" instrument_node=""> (</span><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firmament" title="Firmament"><span data-dcnode-id="5737" instrument_node="">firmament</span></a><span data-dcnode-id="5735" instrument_node="">), a solid bowl, was necessary to keep them from flooding the world.</span><sup class="reference" data-dcnode-id="5732" id="cite_ref-105"><a data-dcnode-id="5733" href="#cite_note-105"><span data-dcnode-id="5734" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5731" instrument_node=""> During the Hellenistic period this was largely replaced by a more "scientific" model as imagined by Greek philosophers, according to which the Earth was a sphere at the centre of concentric shells of celestial spheres containing the Sun, Moon, stars and planets.</span><sup class="reference" data-dcnode-id="5728" id="cite_ref-FOOTNOTEAune2003119_104-1"><a data-dcnode-id="5729" href="#cite_note-FOOTNOTEAune2003119-104"><span data-dcnode-id="5730" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5727" instrument_node="">
</span></p><p data-dcnode-id="5697"><span data-dcnode-id="5725" instrument_node="">The idea that God created the world out of nothing (</span><i data-dcnode-id="5721"><span data-dcnode-id="5724" instrument_node="">creatio </span><a class="mw-redirect" data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ex_nihilo" title="Ex nihilo"><span data-dcnode-id="5723" instrument_node="">ex nihilo</span></a></i><span data-dcnode-id="5720" instrument_node="">) has become central today to Islam, Christianity, and Judaism – indeed, the medieval Jewish philosopher </span><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="5719" instrument_node="">Maimonides</span></a><span data-dcnode-id="5717" instrument_node=""> felt it was the only concept that the three religions shared</span><sup class="reference" data-dcnode-id="5714" id="cite_ref-FOOTNOTESoskice201024_106-0"><a data-dcnode-id="5715" href="#cite_note-FOOTNOTESoskice201024-106"><span data-dcnode-id="5716" instrument_node="">[105]</span></a></sup><span data-dcnode-id="5713" instrument_node=""> – yet it is not found directly in Genesis, nor in the entire Hebrew Bible.</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-FOOTNOTENebe2002119_107-0"><a data-dcnode-id="5711" href="#cite_note-FOOTNOTENebe2002119-107"><span data-dcnode-id="5712" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5709" instrument_node=""> The Priestly authors of Genesis 1 were concerned not with the origins of matter (the material which God formed into the habitable cosmos), but with assigning roles so that the Cosmos should function.</span><sup class="reference" data-dcnode-id="5706" id="cite_ref-FOOTNOTEWalton2006183_32-2"><a data-dcnode-id="5707" href="#cite_note-FOOTNOTEWalton2006183-32"><span data-dcnode-id="5708" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5705" instrument_node=""> This was still the situation in the early 2nd century AD, although early Christian scholars were beginning to see a tension between the idea of world-formation and the omnipotence of God; by the beginning of the 3rd century this tension was resolved, world-formation was overcome, and creation </span><i data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">ex nihilo</span></i><span data-dcnode-id="5702" instrument_node=""> had become a fundamental tenet of Christian theology.</span><sup class="reference" data-dcnode-id="5699" id="cite_ref-FOOTNOTEMay2004179_108-0"><a data-dcnode-id="5700" href="#cite_note-FOOTNOTEMay2004179-108"><span data-dcnode-id="5701" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5698" instrument_node="">
</span></p><span data-dcnode-id="5696" instrument_node="">

</span><li data-dcnode-id="5528" id="cite_note-1"><span class="mw-cite-backlink" data-dcnode-id="5540"><b data-dcnode-id="5541"><a aria-label="Jump up" data-dcnode-id="5542" href="#cite_ref-1" title="Jump up"><span data-dcnode-id="5543" instrument_node="">^</span></a></b></span><span data-dcnode-id="5539" instrument_node=""> </span><span class="reference-text" data-dcnode-id="5530"><span data-dcnode-id="5538" instrument_node="">The term </span><i data-dcnode-id="5535"><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myth" title="Myth"><span data-dcnode-id="5537" instrument_node="">myth</span></a></i><span data-dcnode-id="5534" instrument_node=""> is used here in its academic sense, meaning "a traditional story consisting of events that are ostensibly historical, though often supernatural, explaining the origins of a cultural practice or natural phenomenon." It is </span><i data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">not</span></i><span data-dcnode-id="5531" instrument_node=""> being used to mean "something that is false".</span></span><span data-dcnode-id="5529" instrument_node="">
