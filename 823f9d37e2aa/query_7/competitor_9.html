</span><h3 data-dcnode-id="6854"><span data-dcnode-id="6864" id="Six_days_of_Creation:_Genesis_1:3.E2.80.932:3"></span><span class="mw-headline" data-dcnode-id="6862" id="Six_days_of_Creation:_Genesis_1:3–2:3"><span data-dcnode-id="6863" instrument_node="">Six days of Creation: Genesis 1:3–2:3</span></span><span class="mw-editsection" data-dcnode-id="6855"><span class="mw-editsection-bracket" data-dcnode-id="6860"><span data-dcnode-id="6861" instrument_node="">[</span></span><a data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D9" title="Edit section: Six days of Creation: Genesis 1:3–2:3"><span data-dcnode-id="6859" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6853" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6841"><div class="thumbinner" data-dcnode-id="6842" style="width:222px;"><a class="image" data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Creation_-_Bible_Historiale_%28c.1411%29%2C_vol.1%2C_f.3_-_BL_Royal_MS_19_D_III.jpg"><img alt="" class="thumbimage" data-dcnode-id="6852" data-file-height="1435" data-file-width="1067" decoding="async" height="296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/13/The_Creation_-_Bible_Historiale_%2528c.1411%2529%252C_vol.1%252C_f.3_-_BL_Royal_MS_19_D_III.jpg/220px-The_Creation_-_Bible_Historiale_%2528c.1411%2529%252C_vol.1%252C_f.3_-_BL_Royal_MS_19_D_III.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/13/The_Creation_-_Bible_Historiale_%28c.1411%29%2C_vol.1%2C_f.3_-_BL_Royal_MS_19_D_III.jpg/330px-The_Creation_-_Bible_Historiale_%28c.1411%29%2C_vol.1%2C_f.3_-_BL_Royal_MS_19_D_III.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/13/The_Creation_-_Bible_Historiale_%28c.1411%29%2C_vol.1%2C_f.3_-_BL_Royal_MS_19_D_III.jpg/440px-The_Creation_-_Bible_Historiale_%28c.1411%29%2C_vol.1%2C_f.3_-_BL_Royal_MS_19_D_III.jpg 2x" width="220"></a><span data-dcnode-id="6850" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6843"><div class="magnify" data-dcnode-id="6848"><a class="internal" data-dcnode-id="6849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Creation_-_Bible_Historiale_%28c.1411%29%2C_vol.1%2C_f.3_-_BL_Royal_MS_19_D_III.jpg" title="Enlarge"></a></div><span data-dcnode-id="6847" instrument_node="">The Creation – </span><a data-dcnode-id="6845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bible_Historiale" title="Bible Historiale"><span data-dcnode-id="6846" instrument_node="">Bible Historiale</span></a><span data-dcnode-id="6844" instrument_node=""> (c. 1411)</span></div></div></div><span data-dcnode-id="6840" instrument_node="">
</span><p data-dcnode-id="6827"><span data-dcnode-id="6839" instrument_node="">God's first act was the creation of undifferentiated light; dark and light were then separated into night and day, their order (evening before morning) signifying that this was the liturgical day; and then the Sun, Moon and stars were created to mark the proper times for the festivals of the week and year. Only when this is done does God create man and woman and the means to sustain them (plants and animals). At the end of the sixth day, when creation is complete, the world is a cosmic temple in which the role of humanity is the worship of God. This parallels Mesopotamian myth (the </span><i data-dcnode-id="6836"><a data-dcnode-id="6837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/En%25C5%25ABma_Eli%25C5%25A1" title="Enūma Eliš"><span data-dcnode-id="6838" instrument_node="">Enuma Elish</span></a></i><span data-dcnode-id="6835" instrument_node="">) and also echoes chapter 38 of the </span><a data-dcnode-id="6833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Job" title="Book of Job"><span data-dcnode-id="6834" instrument_node="">Book of Job</span></a><span data-dcnode-id="6832" instrument_node="">, where God recalls how the stars, the "sons of God", sang when the corner-stone of creation was laid.</span><sup class="reference" data-dcnode-id="6829" id="cite_ref-FOOTNOTEBlenkinsopp201121–22_45-0"><a data-dcnode-id="6830" href="#cite_note-FOOTNOTEBlenkinsopp201121%E2%80%9322-45"><span data-dcnode-id="6831" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6828" instrument_node="">
</span></p><span data-dcnode-id="6826" instrument_node="">
</span><h4 data-dcnode-id="6816"><span class="mw-headline" data-dcnode-id="6824" id="First_day"><span data-dcnode-id="6825" instrument_node="">First day</span></span><span class="mw-editsection" data-dcnode-id="6817"><span class="mw-editsection-bracket" data-dcnode-id="6822"><span data-dcnode-id="6823" instrument_node="">[</span></span><a data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D10" title="Edit section: First day"><span data-dcnode-id="6821" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6815" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="6807"><p data-dcnode-id="6808"><span data-dcnode-id="6812" instrument_node="">
3 And God said: 'Let there be light.' And there was light. 4 And God saw the light, that it was good; and God divided the light from the darkness. 5 And God called the light Day, and the darkness He called Night. And there was evening and there was morning, one day.</span><sup class="reference" data-dcnode-id="6809" id="cite_ref-46"><a data-dcnode-id="6810" href="#cite_note-46"><span data-dcnode-id="6811" instrument_node="">[45]</span></a></sup></p></blockquote><span data-dcnode-id="6806" instrument_node="">
</span><p data-dcnode-id="6793"><span data-dcnode-id="6805" instrument_node="">Day 1 begins with the creation of light. God creates by spoken command and names the elements of the world as he creates them. In the ancient Near East the act of naming was bound up with the act of creating: thus in Egyptian literature the creator god pronounced the names of everything, and the </span><a class="mw-redirect" data-dcnode-id="6803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/En%25C3%25BBma_Elish" title="Enûma Elish"><span data-dcnode-id="6804" instrument_node="">Enûma Elish</span></a><span data-dcnode-id="6802" instrument_node=""> begins at the point where nothing has yet been named.</span><sup class="reference" data-dcnode-id="6799" id="cite_ref-FOOTNOTEWalton2003158_47-0"><a data-dcnode-id="6800" href="#cite_note-FOOTNOTEWalton2003158-47"><span data-dcnode-id="6801" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6798" instrument_node=""> God's creation by speech also suggests that he is being compared to a king, who has merely to speak for things to happen.</span><sup class="reference" data-dcnode-id="6795" id="cite_ref-FOOTNOTEBandstra200839_48-0"><a data-dcnode-id="6796" href="#cite_note-FOOTNOTEBandstra200839-48"><span data-dcnode-id="6797" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6794" instrument_node="">
</span></p><span data-dcnode-id="6792" instrument_node="">
</span><h4 data-dcnode-id="6782"><span class="mw-headline" data-dcnode-id="6790" id="Second_day"><span data-dcnode-id="6791" instrument_node="">Second day</span></span><span class="mw-editsection" data-dcnode-id="6783"><span class="mw-editsection-bracket" data-dcnode-id="6788"><span data-dcnode-id="6789" instrument_node="">[</span></span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D11" title="Edit section: Second day"><span data-dcnode-id="6787" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6781" instrument_node="">
</span><link data-dcnode-id="6780" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6774"><p data-dcnode-id="6775"><span data-dcnode-id="6779" instrument_node="">
6 And God said: 'Let there be a firmament in the midst of the waters, and let it divide the waters from the waters.' 7 And God made the firmament, and divided the waters which were under the firmament from the waters which were above the firmament; and it was so. 8 And God called the firmament Heaven. And there was evening and there was morning, a second day.</span><sup class="reference" data-dcnode-id="6776" id="cite_ref-49"><a data-dcnode-id="6777" href="#cite_note-49"><span data-dcnode-id="6778" instrument_node="">[48]</span></a></sup></p></blockquote><span data-dcnode-id="6773" instrument_node="">
</span><p data-dcnode-id="6748"><i data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">Rāqîa</span></i><span data-dcnode-id="6770" instrument_node="">, the word translated as </span><a data-dcnode-id="6768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firmament" title="Firmament"><span data-dcnode-id="6769" instrument_node="">firmament</span></a><span data-dcnode-id="6767" instrument_node="">, is from </span><i data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">rāqa',</span></i><span data-dcnode-id="6764" instrument_node=""> the verb used for the act of beating metal into thin plates.</span><sup class="reference" data-dcnode-id="6761" id="cite_ref-FOOTNOTEHamilton1990122_50-0"><a data-dcnode-id="6762" href="#cite_note-FOOTNOTEHamilton1990122-50"><span data-dcnode-id="6763" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6760" instrument_node=""> Created on the second day of creation and populated by luminaries on the fourth, it is a solid dome which separates the Earth below from the heavens and their waters above, as in Egyptian and Mesopotamian belief of the same time.</span><sup class="reference" data-dcnode-id="6757" id="cite_ref-FOOTNOTESeeley1991227_51-0"><a data-dcnode-id="6758" href="#cite_note-FOOTNOTESeeley1991227-51"><span data-dcnode-id="6759" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6756" instrument_node=""> In Genesis 1:17 the stars are set in the </span><i data-dcnode-id="6754"><span data-dcnode-id="6755" instrument_node="">raqia'</span></i><span data-dcnode-id="6753" instrument_node="">; in Babylonian myth the heavens were made of various precious stones (compare Exodus 24:10 where the elders of Israel see God on the sapphire floor of heaven), with the stars engraved in their surface.</span><sup class="reference" data-dcnode-id="6750" id="cite_ref-FOOTNOTEWalton2003158–59_52-0"><a data-dcnode-id="6751" href="#cite_note-FOOTNOTEWalton2003158%E2%80%9359-52"><span data-dcnode-id="6752" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6749" instrument_node="">
</span></p><span data-dcnode-id="6747" instrument_node="">
</span><h4 data-dcnode-id="6737"><span class="mw-headline" data-dcnode-id="6745" id="Third_day"><span data-dcnode-id="6746" instrument_node="">Third day</span></span><span class="mw-editsection" data-dcnode-id="6738"><span class="mw-editsection-bracket" data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">[</span></span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D12" title="Edit section: Third day"><span data-dcnode-id="6742" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6739"><span data-dcnode-id="6740" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6736" instrument_node="">
</span><link data-dcnode-id="6735" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6729"><p data-dcnode-id="6730"><span data-dcnode-id="6734" instrument_node="">
And God said: 'Let the waters under the heaven be gathered together unto one place, and let the dry land appear.' And it was so. 10 And God called the dry land Earth, and the gathering together of the waters called He Seas; and God saw that it was good. 11 And God said: 'Let the earth put forth grass, herb yielding seed, and fruit-tree bearing fruit after its kind, wherein is the seed thereof, upon the earth.' And it was so. 12 And the earth brought forth grass, herb yielding seed after its kind, and tree bearing fruit, wherein is the seed thereof, after its kind; and God saw that it was good. 13 And there was evening and there was morning, a third day.</span><sup class="reference" data-dcnode-id="6731" id="cite_ref-53"><a data-dcnode-id="6732" href="#cite_note-53"><span data-dcnode-id="6733" instrument_node="">[52]</span></a></sup></p></blockquote><span data-dcnode-id="6728" instrument_node="">
</span><p data-dcnode-id="6715"><span data-dcnode-id="6727" instrument_node="">On the third day, the waters withdraw, creating a ring of ocean surrounding a </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flat_Earth" title="Flat Earth"><span data-dcnode-id="6726" instrument_node="">single circular continent</span></a><span data-dcnode-id="6724" instrument_node="">.</span><sup class="reference" data-dcnode-id="6721" id="cite_ref-FOOTNOTESeeley1997236_54-0"><a data-dcnode-id="6722" href="#cite_note-FOOTNOTESeeley1997236-54"><span data-dcnode-id="6723" instrument_node="">[53]</span></a></sup><span data-dcnode-id="6720" instrument_node=""> By the end of the third day God has created a foundational environment of light, heavens, seas and earth.</span><sup class="reference" data-dcnode-id="6717" id="cite_ref-FOOTNOTEBandstra200841_55-0"><a data-dcnode-id="6718" href="#cite_note-FOOTNOTEBandstra200841-55"><span data-dcnode-id="6719" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6716" instrument_node=""> The three levels of the cosmos are next populated in the same order in which they were created – heavens, sea, earth.
</span></p><p data-dcnode-id="6709"><span data-dcnode-id="6714" instrument_node="">God does not create or make trees and plants, but instead commands the earth to produce them. The underlying theological meaning seems to be that God has given the previously barren earth the ability to produce vegetation, and it now does so at his command. "According to (one's) kind" appears to look forward to the laws found later in the Pentateuch, which lay great stress on holiness through separation.</span><sup class="reference" data-dcnode-id="6711" id="cite_ref-FOOTNOTEKissling2004106_56-0"><a data-dcnode-id="6712" href="#cite_note-FOOTNOTEKissling2004106-56"><span data-dcnode-id="6713" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6710" instrument_node="">
</span></p><span data-dcnode-id="6708" instrument_node="">
</span><h4 data-dcnode-id="6698"><span class="mw-headline" data-dcnode-id="6706" id="Fourth_day"><span data-dcnode-id="6707" instrument_node="">Fourth day</span></span><span class="mw-editsection" data-dcnode-id="6699"><span class="mw-editsection-bracket" data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">[</span></span><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D13" title="Edit section: Fourth day"><span data-dcnode-id="6703" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6697" instrument_node="">
</span><link data-dcnode-id="6696" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6690"><p data-dcnode-id="6691"><span data-dcnode-id="6695" instrument_node="">
14 And God said: 'Let there be lights in the firmament of the heaven to divide the day from the night; and let them be for signs, and for seasons, and for days and years; 15 and let them be for lights in the firmament of the heaven to give light upon the earth.' And it was so. 16 And God made the two great lights: the greater light to rule the day, and the lesser light to rule the night; and the stars. 17 And God set them in the firmament of the heaven to give light upon the earth, 18 and to rule over the day and over the night, and to divide the light from the darkness; and God saw that it was good. 19 And there was evening and there was morning, a fourth day.</span><sup class="reference" data-dcnode-id="6692" id="cite_ref-57"><a data-dcnode-id="6693" href="#cite_note-57"><span data-dcnode-id="6694" instrument_node="">[56]</span></a></sup></p></blockquote><span data-dcnode-id="6689" instrument_node="">
</span><p data-dcnode-id="6669"><span data-dcnode-id="6688" instrument_node="">On Day Four the language of "ruling" is introduced: the heavenly bodies will "govern" day and night and mark seasons and years and days (a matter of crucial importance to the Priestly authors, as the </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_Pilgrimage_Festivals" title="Three Pilgrimage Festivals"><span data-dcnode-id="6687" instrument_node="">three pilgrimage festivals</span></a><span data-dcnode-id="6685" instrument_node=""> were organised around the cycles of both the Sun and Moon, in a </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunisolar_calendar" title="Lunisolar calendar"><span data-dcnode-id="6684" instrument_node="">lunisolar calendar</span></a><span data-dcnode-id="6682" instrument_node=""> that could have either 12 or 13 months.);</span><sup class="reference" data-dcnode-id="6679" id="cite_ref-FOOTNOTEBandstra200841–42_58-0"><a data-dcnode-id="6680" href="#cite_note-FOOTNOTEBandstra200841%E2%80%9342-58"><span data-dcnode-id="6681" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6678" instrument_node=""> later, man will be created to rule over the whole of creation as God's regent. God puts "lights" in the firmament to "rule over" the day and the night.</span><sup class="reference" data-dcnode-id="6675" id="cite_ref-FOOTNOTEWalsh200137_(fn.5)_59-0"><a data-dcnode-id="6676" href="#cite_note-FOOTNOTEWalsh200137_(fn.5)-59"><span data-dcnode-id="6677" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6674" instrument_node="">  Specifically, God creates the "greater light," the "lesser light," and the stars.  According to Victor Hamilton, most scholars agree that the choice of "greater light" and "lesser light", rather than the more explicit "Sun" and "Moon", is anti-mythological rhetoric intended to contradict widespread contemporary beliefs that the Sun and the Moon were deities themselves.</span><sup class="reference" data-dcnode-id="6671" id="cite_ref-FOOTNOTEHamilton1990127_60-0"><a data-dcnode-id="6672" href="#cite_note-FOOTNOTEHamilton1990127-60"><span data-dcnode-id="6673" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6670" instrument_node="">
</span></p><span data-dcnode-id="6668" instrument_node="">
</span><h4 data-dcnode-id="6658"><span class="mw-headline" data-dcnode-id="6666" id="Fifth_day"><span data-dcnode-id="6667" instrument_node="">Fifth day</span></span><span class="mw-editsection" data-dcnode-id="6659"><span class="mw-editsection-bracket" data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">[</span></span><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D14" title="Edit section: Fifth day"><span data-dcnode-id="6663" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6660"><span data-dcnode-id="6661" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6657" instrument_node="">
</span><link data-dcnode-id="6656" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6650"><p data-dcnode-id="6651"><span data-dcnode-id="6655" instrument_node="">And God said: 'Let the waters swarm with swarms of living creatures, and let fowl fly above the earth in the open firmament of heaven.' 21 And God created the great sea-monsters, and every living creature that creepeth, wherewith the waters swarmed, after its kind, and every winged fowl after its kind; and God saw that it was good. 22 And God blessed them, saying: 'Be fruitful, and multiply, and fill the waters in the seas, and let fowl multiply in the earth.' 23 And there was evening and there was morning, a fifth day.</span><sup class="reference" data-dcnode-id="6652" id="cite_ref-61"><a data-dcnode-id="6653" href="#cite_note-61"><span data-dcnode-id="6654" instrument_node="">[60]</span></a></sup></p></blockquote><span data-dcnode-id="6649" instrument_node="">
</span><p data-dcnode-id="6625"><span data-dcnode-id="6648" instrument_node="">In the Egyptian and Mesopotamian mythologies, the creator-god has to do battle with the sea-monsters before he can make heaven and earth; in Genesis 1:21, the word </span><i data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">tannin</span></i><span data-dcnode-id="6645" instrument_node="">, sometimes translated as "sea monsters" or "great creatures", parallels the named </span><a data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos_%28cosmogony%29%23Chaoskampf" title="Chaos (cosmogony)"><span data-dcnode-id="6644" instrument_node="">chaos-monsters</span></a><span data-dcnode-id="6642" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rahab_%28Egypt%29" title="Rahab (Egypt)"><span data-dcnode-id="6641" instrument_node="">Rahab</span></a><span data-dcnode-id="6639" instrument_node=""> and </span><a data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviathan" title="Leviathan"><span data-dcnode-id="6638" instrument_node="">Leviathan</span></a><span data-dcnode-id="6636" instrument_node=""> from Psalm 74:13, and Isaiah 27:1, and Isaiah 51:9, but there is no hint (in </span><a data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Genesis" title="Book of Genesis"><span data-dcnode-id="6635" instrument_node="">Genesis</span></a><span data-dcnode-id="6633" instrument_node="">) of combat, and the </span><i data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">tannin</span></i><span data-dcnode-id="6630" instrument_node=""> are simply creatures created by God.</span><sup class="reference" data-dcnode-id="6627" id="cite_ref-FOOTNOTEWalton2003160_62-0"><a data-dcnode-id="6628" href="#cite_note-FOOTNOTEWalton2003160-62"><span data-dcnode-id="6629" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6626" instrument_node="">
</span></p><span data-dcnode-id="6624" instrument_node="">
</span><h4 data-dcnode-id="6614"><span class="mw-headline" data-dcnode-id="6622" id="Sixth_day"><span data-dcnode-id="6623" instrument_node="">Sixth day</span></span><span class="mw-editsection" data-dcnode-id="6615"><span class="mw-editsection-bracket" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">[</span></span><a data-dcnode-id="6618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D15" title="Edit section: Sixth day"><span data-dcnode-id="6619" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6616"><span data-dcnode-id="6617" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6613" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6600"><div class="thumbinner" data-dcnode-id="6601" style="width:222px;"><a class="image" data-dcnode-id="6611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACria%25C3%25A7%25C3%25A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png"><img alt="" class="thumbimage" data-dcnode-id="6612" data-file-height="978" data-file-width="493" decoding="async" height="436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Cria%25C3%25A7%25C3%25A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png/220px-Cria%25C3%25A7%25C3%25A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Cria%C3%A7%C3%A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png/330px-Cria%C3%A7%C3%A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Cria%C3%A7%C3%A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png/440px-Cria%C3%A7%C3%A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png 2x" width="220"></a><span data-dcnode-id="6610" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6602"><div class="magnify" data-dcnode-id="6608"><a class="internal" data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACria%25C3%25A7%25C3%25A3o_dos_Animais_%281506-11%29_-_Vasco_Fernandes_%28Museu_de_Lamego%29.png" title="Enlarge"></a></div><i data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">The Creation of the Animals</span></i><span data-dcnode-id="6605" instrument_node=""> (1506–1511), by </span><a data-dcnode-id="6603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gr%25C3%25A3o_Vasco" title="Grão Vasco"><span data-dcnode-id="6604" instrument_node="">Grão Vasco</span></a></div></div></div><span data-dcnode-id="6599" instrument_node="">
</span><link data-dcnode-id="6598" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6589"><span data-dcnode-id="6597" instrument_node="">
</span><p data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">24 And God said: 'Let the earth bring forth the living creature after its kind, cattle, and creeping thing, and beast of the earth after its kind.' And it was so. 25 And God made the beast of the earth after its kind, and the cattle after their kind, and every thing that creepeth upon the ground after its kind; and God saw that it was good.
</span></p><p data-dcnode-id="6590"><span data-dcnode-id="6594" instrument_node="">
26 And God said: 'Let us make man in our image, after our likeness; and let them have dominion over the fish of the sea, and over the fowl of the air, and over the cattle, and over all the earth, and over every creeping thing that creepeth upon the earth.' 27 And God created man in His own image, in the image of God created He him; male and female created He them. 28 And God blessed them; and God said unto them: 'Be fruitful, and multiply, and replenish the earth, and subdue it; and have dominion over the fish of the sea, and over the fowl of the air, and over every living thing that creepeth upon the earth.' 29 And God said: 'Behold, I have given you every herb yielding seed, which is upon the face of all the earth, and every tree, in which is the fruit of a tree yielding seed--to you it shall be for food; 30 and to every beast of the earth, and to every fowl of the air, and to every thing that creepeth upon the earth, wherein there is a living soul, [I have given] every green herb for food.' And it was so.31 And God saw every thing that He had made, and, behold, it was very good. And there was evening and there was morning, the sixth day.</span><sup class="reference" data-dcnode-id="6591" id="cite_ref-63"><a data-dcnode-id="6592" href="#cite_note-63"><span data-dcnode-id="6593" instrument_node="">[62]</span></a></sup></p></blockquote><span data-dcnode-id="6588" instrument_node="">
</span><p data-dcnode-id="6573"><span data-dcnode-id="6587" instrument_node="">When in Genesis 1:26 God says "Let us make man", the Hebrew word used is </span><i data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">adam</span></i><span data-dcnode-id="6584" instrument_node="">; in this form it is a generic noun, "mankind", and does not imply that this creation is male. After this first mention the word always appears as </span><i data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">ha-adam</span></i><span data-dcnode-id="6581" instrument_node="">, "the man", but as Genesis 1:27 shows ("So God created man in his </span><i data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">[own]</span></i><span data-dcnode-id="6578" instrument_node=""> image, in the image of God created he him; male and female created he them."), the word is still not exclusively male.</span><sup class="reference" data-dcnode-id="6575" id="cite_ref-FOOTNOTEAlter200418–19,_21_64-0"><a data-dcnode-id="6576" href="#cite_note-FOOTNOTEAlter200418%E2%80%9319,_21-64"><span data-dcnode-id="6577" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6574" instrument_node="">
</span></p><p data-dcnode-id="6568"><span data-dcnode-id="6572" instrument_node="">Man was created in the "</span><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Image_of_God" title="Image of God"><span data-dcnode-id="6571" instrument_node="">image of God</span></a><span data-dcnode-id="6569" instrument_node="">". The meaning of this is unclear: suggestions include:
</span></p><span data-dcnode-id="6567" instrument_node="">
</span><ol data-dcnode-id="6546"><li data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">Having the spiritual qualities of God such as intellect, will, etc.;</span></li><span data-dcnode-id="6564" instrument_node="">
</span><li data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">Having the physical form of God;</span></li><span data-dcnode-id="6561" instrument_node="">
</span><li data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">A combination of these two;</span></li><span data-dcnode-id="6558" instrument_node="">
</span><li data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">Being God's counterpart on Earth and able to enter into a relationship with him;</span></li><span data-dcnode-id="6555" instrument_node="">
</span><li data-dcnode-id="6547"><span data-dcnode-id="6554" instrument_node="">Being God's representative or </span><a data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viceroy" title="Viceroy"><span data-dcnode-id="6553" instrument_node="">viceroy</span></a><span data-dcnode-id="6551" instrument_node=""> on Earth.</span><sup class="reference" data-dcnode-id="6548" id="cite_ref-FOOTNOTEKvam_et_al._199924_65-0"><a data-dcnode-id="6549" href="#cite_note-FOOTNOTEKvam_et_al._199924-65"><span data-dcnode-id="6550" instrument_node="">[64]</span></a></sup></li></ol><span data-dcnode-id="6545" instrument_node="">
</span><p data-dcnode-id="6526"><span data-dcnode-id="6544" instrument_node="">The fact that God says "Let </span><i data-dcnode-id="6542"><span data-dcnode-id="6543" instrument_node="">us</span></i><span data-dcnode-id="6541" instrument_node=""> make man..." has given rise to several theories, of which the two most important are that "us" is </span><a class="mw-redirect" data-dcnode-id="6539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Majestic_plural" title="Majestic plural"><span data-dcnode-id="6540" instrument_node="">majestic plural</span></a><span data-dcnode-id="6538" instrument_node="">,</span><sup class="reference" data-dcnode-id="6535" id="cite_ref-FOOTNOTEDavidson197324_66-0"><a data-dcnode-id="6536" href="#cite_note-FOOTNOTEDavidson197324-66"><span data-dcnode-id="6537" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6534" instrument_node=""> or that it reflects a setting in a </span><a data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Divine_Council%23Hebrew" title="Divine Council"><span data-dcnode-id="6533" instrument_node="">divine council</span></a><span data-dcnode-id="6531" instrument_node=""> with God enthroned as king and proposing the creation of mankind to the lesser divine beings.</span><sup class="reference" data-dcnode-id="6528" id="cite_ref-FOOTNOTELevenson200414_67-0"><a data-dcnode-id="6529" href="#cite_note-FOOTNOTELevenson200414-67"><span data-dcnode-id="6530" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6527" instrument_node="">
</span></p><p data-dcnode-id="6514"><span data-dcnode-id="6525" instrument_node="">God tells the animals and humans that he has given them "the green plants for food"&nbsp;–  creation is to be </span><a class="mw-redirect" data-dcnode-id="6523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vegetarian" title="Vegetarian"><span data-dcnode-id="6524" instrument_node="">vegetarian</span></a><span data-dcnode-id="6522" instrument_node="">. Only later, after the Flood, is man given permission to eat flesh. The Priestly author of Genesis appears to look back to an ideal past in which mankind lived at peace both with itself and with the animal kingdom, and which could be re-achieved through a proper sacrificial life in </span><a data-dcnode-id="6520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-established_harmony" title="Pre-established harmony"><span data-dcnode-id="6521" instrument_node="">harmony with God</span></a><span data-dcnode-id="6519" instrument_node="">.</span><sup class="reference" data-dcnode-id="6516" id="cite_ref-FOOTNOTERogerson199119ff_68-0"><a data-dcnode-id="6517" href="#cite_note-FOOTNOTERogerson199119ff-68"><span data-dcnode-id="6518" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6515" instrument_node="">
</span></p><p data-dcnode-id="6491"><span data-dcnode-id="6513" instrument_node="">Upon completion, God sees that "every thing that He had made ... was very good" (</span><a class="external text" data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0101.htm%2331" rel="nofollow"><span data-dcnode-id="6512" instrument_node="">Genesis 1:31</span></a><span data-dcnode-id="6510" instrument_node="">). This implies that the materials that existed before the Creation ("</span><i data-dcnode-id="6507"><a data-dcnode-id="6508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tohu_wa-bohu" title="Tohu wa-bohu"><span data-dcnode-id="6509" instrument_node="">tohu wa-bohu</span></a></i><span data-dcnode-id="6506" instrument_node="">," "darkness," "</span><i data-dcnode-id="6503"><a data-dcnode-id="6504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tehom" title="Tehom"><span data-dcnode-id="6505" instrument_node="">tehom</span></a></i><span data-dcnode-id="6502" instrument_node="">") were not "very good." </span><a data-dcnode-id="6500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_Knohl" title="Israel Knohl"><span data-dcnode-id="6501" instrument_node="">Israel Knohl</span></a><span data-dcnode-id="6499" instrument_node=""> hypothesized that the Priestly source set up this dichotomy to mitigate </span><a class="mw-redirect" data-dcnode-id="6497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_problem_of_evil" title="The problem of evil"><span data-dcnode-id="6498" instrument_node="">the problem of evil</span></a><span data-dcnode-id="6496" instrument_node="">.</span><sup class="reference" data-dcnode-id="6493" id="cite_ref-FOOTNOTEKnohl200313_69-0"><a data-dcnode-id="6494" href="#cite_note-FOOTNOTEKnohl200313-69"><span data-dcnode-id="6495" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6492" instrument_node="">
</span></p><span data-dcnode-id="6490" instrument_node="">
</span><h3 data-dcnode-id="6480"><span class="mw-headline" data-dcnode-id="6488" id="Seventh_day:_divine_rest"><span data-dcnode-id="6489" instrument_node="">Seventh day: divine rest</span></span><span class="mw-editsection" data-dcnode-id="6481"><span class="mw-editsection-bracket" data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">[</span></span><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D16" title="Edit section: Seventh day: divine rest"><span data-dcnode-id="6485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6479" instrument_node="">
</span><link data-dcnode-id="6478" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6472"><p data-dcnode-id="6473"><span data-dcnode-id="6477" instrument_node="">
And the heaven and the earth were finished, and all the host of them. 2 And on the seventh day God finished His work which He had made; and He rested on the seventh day from all His work which He had made. 3 And God blessed the seventh day, and hallowed it; because that in it He rested from all His work which God in creating had made.</span><sup class="reference" data-dcnode-id="6474" id="cite_ref-70"><a data-dcnode-id="6475" href="#cite_note-70"><span data-dcnode-id="6476" instrument_node="">[69]</span></a></sup></p></blockquote><span data-dcnode-id="6471" instrument_node="">
</span><p data-dcnode-id="6453"><span data-dcnode-id="6470" instrument_node="">Creation is followed by rest. In ancient Near Eastern literature the divine rest is achieved in a temple as a result of having brought order to chaos. Rest is both disengagement, as the work of creation is finished, but also engagement, as the deity is now present in his temple to maintain a secure and ordered cosmos.</span><sup class="reference" data-dcnode-id="6467" id="cite_ref-FOOTNOTEWalton2006157–58_71-0"><a data-dcnode-id="6468" href="#cite_note-FOOTNOTEWalton2006157%E2%80%9358-71"><span data-dcnode-id="6469" instrument_node="">[70]</span></a></sup><span data-dcnode-id="6466" instrument_node=""> Compare with Exodus 20:8–20:11: "Remember the sabbath day, to keep it holy. Six days shalt thou labour, and do all thy work; but the seventh day is a sabbath unto the L</span><span class="smallcaps" data-dcnode-id="6464" style="font-size:83%"><span data-dcnode-id="6465" instrument_node="">ORD</span></span><span data-dcnode-id="6463" instrument_node=""> thy G</span><span class="smallcaps" data-dcnode-id="6461" style="font-size:83%"><span data-dcnode-id="6462" instrument_node="">OD</span></span><span data-dcnode-id="6460" instrument_node="">, in it thou shalt not do any manner of work, thou, nor thy son, nor thy daughter, nor thy man-servant, nor thy maid-servant, nor thy cattle, nor thy stranger that is within thy gates; for in six days the L</span><span class="smallcaps" data-dcnode-id="6458" style="font-size:83%"><span data-dcnode-id="6459" instrument_node="">ORD</span></span><span data-dcnode-id="6457" instrument_node=""> made heaven and earth, the sea, and all that in them is, and rested on the seventh day; wherefore the L</span><span class="smallcaps" data-dcnode-id="6455" style="font-size:83%"><span data-dcnode-id="6456" instrument_node="">ORD</span></span><span data-dcnode-id="6454" instrument_node=""> blessed the sabbath day, and hallowed it."
</span></p><span data-dcnode-id="6452" instrument_node="">
</span><h2 data-dcnode-id="6441"><span data-dcnode-id="6451" id="Second_narrative:_Genesis_2:4.E2.80.932:25"></span><span class="mw-headline" data-dcnode-id="6449" id="Second_narrative:_Genesis_2:4–2:25"><span data-dcnode-id="6450" instrument_node="">Second narrative: Genesis 2:4–2:25</span></span><span class="mw-editsection" data-dcnode-id="6442"><span class="mw-editsection-bracket" data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">[</span></span><a data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D17" title="Edit section: Second narrative: Genesis 2:4–2:25"><span data-dcnode-id="6446" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6440" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6423"><div class="thumbinner" data-dcnode-id="6424" style="width:202px;"><a class="image" data-dcnode-id="6438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANuremberg_chronicles_-_f_5v.png"><img alt="" class="thumbimage" data-dcnode-id="6439" data-file-height="1116" data-file-width="904" decoding="async" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Nuremberg_chronicles_-_f_5v.png/200px-Nuremberg_chronicles_-_f_5v.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Nuremberg_chronicles_-_f_5v.png/300px-Nuremberg_chronicles_-_f_5v.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Nuremberg_chronicles_-_f_5v.png/400px-Nuremberg_chronicles_-_f_5v.png 2x" width="200"></a><span data-dcnode-id="6437" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6425"><div class="magnify" data-dcnode-id="6435"><a class="internal" data-dcnode-id="6436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANuremberg_chronicles_-_f_5v.png" title="Enlarge"></a></div><i data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">Seventh Day of Creation</span></i><span data-dcnode-id="6432" instrument_node="">, from the 1493 </span><i data-dcnode-id="6429"><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuremberg_Chronicle" title="Nuremberg Chronicle"><span data-dcnode-id="6431" instrument_node="">Nuremberg Chronicle</span></a></i><span data-dcnode-id="6428" instrument_node=""> by </span><a data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hartmann_Schedel" title="Hartmann Schedel"><span data-dcnode-id="6427" instrument_node="">Hartmann Schedel</span></a></div></div></div><span data-dcnode-id="6422" instrument_node="">
</span><p data-dcnode-id="6384"><span data-dcnode-id="6421" instrument_node="">Genesis 2–3, the </span><a data-dcnode-id="6419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garden_of_Eden" title="Garden of Eden"><span data-dcnode-id="6420" instrument_node="">Garden of Eden</span></a><span data-dcnode-id="6418" instrument_node=""> story, was probably authored around 500 BCE as "a discourse on ideals in life, the danger in human glory, and the fundamentally ambiguous nature of humanity – especially human mental faculties".</span><sup class="reference" data-dcnode-id="6415" id="cite_ref-FOOTNOTEStordalen2000473–74_72-0"><a data-dcnode-id="6416" href="#cite_note-FOOTNOTEStordalen2000473%E2%80%9374-72"><span data-dcnode-id="6417" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6414" instrument_node=""> The Garden in which the action takes place lies on the mythological border between the human and the divine worlds, probably on the far side of the </span><a data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_ocean" title="Cosmic ocean"><span data-dcnode-id="6413" instrument_node="">cosmic ocean</span></a><span data-dcnode-id="6411" instrument_node=""> near the rim of the world; following a conventional ancient Near Eastern concept, the Eden river first forms that ocean and then divides into four rivers which run from the four corners of the earth towards its centre.</span><sup class="reference" data-dcnode-id="6408" id="cite_ref-FOOTNOTEStordalen2000473–74_72-1"><a data-dcnode-id="6409" href="#cite_note-FOOTNOTEStordalen2000473%E2%80%9374-72"><span data-dcnode-id="6410" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6407" instrument_node="">
It opens "in the day that the L</span><span class="smallcaps" data-dcnode-id="6405" style="font-size:83%"><span data-dcnode-id="6406" instrument_node="">ORD</span></span><span data-dcnode-id="6404" instrument_node=""> God made the earth and the heavens", a set introduction similar to those found in Babylonian myths.</span><sup class="reference" data-dcnode-id="6401" id="cite_ref-FOOTNOTEVan_Seters199822_73-0"><a data-dcnode-id="6402" href="#cite_note-FOOTNOTEVan_Seters199822-73"><span data-dcnode-id="6403" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6400" instrument_node=""> Before the man is created the earth is a barren waste watered by an </span><i data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">’êḏ</span></i><span data-dcnode-id="6397" instrument_node=""> (</span><span class="script-hebrew" data-dcnode-id="6393" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6394" instrument_node="">אד</span></span><span data-dcnode-id="6392" instrument_node="">‎); Genesis 2:6 the </span><a data-dcnode-id="6390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_James_Version" title="King James Version"><span data-dcnode-id="6391" instrument_node="">King James Version</span></a><span data-dcnode-id="6389" instrument_node=""> translated this as "mist", following Jewish practice, but since the mid-20th century Hebraists have generally accepted that the real meaning is "spring of underground water".</span><sup class="reference" data-dcnode-id="6386" id="cite_ref-FOOTNOTEAndersen1987137–40_74-0"><a data-dcnode-id="6387" href="#cite_note-FOOTNOTEAndersen1987137%E2%80%9340-74"><span data-dcnode-id="6388" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6385" instrument_node="">
</span></p><p data-dcnode-id="6350"><span data-dcnode-id="6383" instrument_node="">In Genesis 1 the characteristic word for God's activity is </span><i data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">bara</span></i><span data-dcnode-id="6380" instrument_node="">, "created"; in Genesis 2 the word used when he creates the man is </span><i data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">yatsar</span></i><span data-dcnode-id="6377" instrument_node=""> (</span><link data-dcnode-id="6376" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6374" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6375" instrument_node="">ייצר</span></span><span data-dcnode-id="6373" instrument_node="">‎ </span><i data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">yîṣer</span></i><span data-dcnode-id="6370" instrument_node="">), meaning "fashioned", a word used in contexts such as a potter fashioning a pot from clay.</span><sup class="reference" data-dcnode-id="6367" id="cite_ref-FOOTNOTEAlter200420,_22_75-0"><a data-dcnode-id="6368" href="#cite_note-FOOTNOTEAlter200420,_22-75"><span data-dcnode-id="6369" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6366" instrument_node=""> God breathes his own breath into the clay and it becomes </span><i data-dcnode-id="6363"><a data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nephesh" title="Nephesh"><span data-dcnode-id="6365" instrument_node="">nephesh</span></a></i><span data-dcnode-id="6362" instrument_node="">  (</span><link data-dcnode-id="6361" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6359" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6360" instrument_node="">נֶ֫פֶשׁ</span></span><span data-dcnode-id="6358" instrument_node="">‎), a word meaning "life", "vitality", "the living personality"; man shares </span><i data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">nephesh</span></i><span data-dcnode-id="6355" instrument_node=""> with all creatures, but the text describes this life-giving act by God only in relation to man.</span><sup class="reference" data-dcnode-id="6352" id="cite_ref-FOOTNOTEDavidson197331_76-0"><a data-dcnode-id="6353" href="#cite_note-FOOTNOTEDavidson197331-76"><span data-dcnode-id="6354" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6351" instrument_node="">
</span></p><p data-dcnode-id="6325"><span data-dcnode-id="6349" instrument_node="">Eden, where God puts his Garden of Eden, comes from a root meaning "fertility": the first man is to work in God's miraculously fertile garden.</span><sup class="reference" data-dcnode-id="6346" id="cite_ref-FOOTNOTELevenson200415_77-0"><a data-dcnode-id="6347" href="#cite_note-FOOTNOTELevenson200415-77"><span data-dcnode-id="6348" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6345" instrument_node=""> The "tree of life" is a motif from Mesopotamian myth: in the </span><i data-dcnode-id="6342"><a data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epic_of_Gilgamesh" title="Epic of Gilgamesh"><span data-dcnode-id="6344" instrument_node="">Epic of Gilgamesh</span></a></i><span data-dcnode-id="6341" instrument_node=""> (c. 1800 BCE) the hero is given a plant whose name is "man becomes young in old age", but a serpent steals the plant from him.</span><sup class="reference" data-dcnode-id="6338" id="cite_ref-FOOTNOTEDavidson197329_78-0"><a data-dcnode-id="6339" href="#cite_note-FOOTNOTEDavidson197329-78"><span data-dcnode-id="6340" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="6335" id="cite_ref-79"><a data-dcnode-id="6336" href="#cite_note-79"><span data-dcnode-id="6337" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6334" instrument_node=""> There has been much scholarly discussion about the type of knowledge given by the second tree. Suggestions include: human qualities, sexual consciousness, ethical knowledge, or universal knowledge; with the last being the most widely accepted.</span><sup class="reference" data-dcnode-id="6331" id="cite_ref-FOOTNOTEKooij201017_80-0"><a data-dcnode-id="6332" href="#cite_note-FOOTNOTEKooij201017-80"><span data-dcnode-id="6333" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6330" instrument_node=""> In Eden, mankind has a choice between wisdom and life, and chooses the first, although God intended them for the second.</span><sup class="reference" data-dcnode-id="6327" id="cite_ref-FOOTNOTEPropp1990193_81-0"><a data-dcnode-id="6328" href="#cite_note-FOOTNOTEPropp1990193-81"><span data-dcnode-id="6329" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6326" instrument_node="">
</span></p><p data-dcnode-id="6303"><span data-dcnode-id="6324" instrument_node="">The mythic Eden and its rivers may represent the real Jerusalem, the </span><a class="mw-redirect" data-dcnode-id="6322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_of_Solomon" title="Temple of Solomon"><span data-dcnode-id="6323" instrument_node="">Temple</span></a><span data-dcnode-id="6321" instrument_node=""> and the Promised Land. Eden may represent the divine garden on </span><a data-dcnode-id="6319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zion" title="Zion"><span data-dcnode-id="6320" instrument_node="">Zion</span></a><span data-dcnode-id="6318" instrument_node="">, the mountain of God, which was also Jerusalem; while the real </span><a data-dcnode-id="6316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gihon" title="Gihon"><span data-dcnode-id="6317" instrument_node="">Gihon</span></a><span data-dcnode-id="6315" instrument_node=""> was a spring outside the city (mirroring the spring which waters Eden); and the imagery of the Garden, with its serpent and cherubs, has been seen as a reflection of the real images of the Solomonic Temple with its copper serpent (the </span><a data-dcnode-id="6313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nehushtan" title="Nehushtan"><span data-dcnode-id="6314" instrument_node="">nehushtan</span></a><span data-dcnode-id="6312" instrument_node="">) and guardian cherubs.</span><sup class="reference" data-dcnode-id="6309" id="cite_ref-FOOTNOTEStordalen2000307–10_82-0"><a data-dcnode-id="6310" href="#cite_note-FOOTNOTEStordalen2000307%E2%80%9310-82"><span data-dcnode-id="6311" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6308" instrument_node=""> Genesis 2 is the only place in the Bible where Eden appears as a geographic location: elsewhere (notably in the Book of Ezekiel) it is a mythological place located on the holy Mountain of God, with echoes of a Mesopotamian myth of the king as a primordial man placed in a divine garden to guard the tree of life.</span><sup class="reference" data-dcnode-id="6305" id="cite_ref-FOOTNOTEDavidson197333_83-0"><a data-dcnode-id="6306" href="#cite_note-FOOTNOTEDavidson197333-83"><span data-dcnode-id="6307" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6304" instrument_node="">
</span></p><p data-dcnode-id="6291"><span data-dcnode-id="6302" instrument_node="">"</span><a data-dcnode-id="6300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Good_and_evil" title="Good and evil"><span data-dcnode-id="6301" instrument_node="">Good and evil</span></a><span data-dcnode-id="6299" instrument_node="">" is a </span><a data-dcnode-id="6297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merism" title="Merism"><span data-dcnode-id="6298" instrument_node="">merism</span></a><span data-dcnode-id="6296" instrument_node="">, in this case meaning simply "everything", but it may also have a moral connotation. When God forbids the man to eat from the tree of knowledge he says that if he does so he is "doomed to die": the Hebrew behind this is in the form used in the Bible for issuing death sentences.</span><sup class="reference" data-dcnode-id="6293" id="cite_ref-FOOTNOTEAlter200421_84-0"><a data-dcnode-id="6294" href="#cite_note-FOOTNOTEAlter200421-84"><span data-dcnode-id="6295" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6292" instrument_node="">
</span></p><span data-dcnode-id="6290" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6276"><div class="thumbinner" data-dcnode-id="6277" style="width:222px;"><a class="image" data-dcnode-id="6288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACreation-Luther-Bible-1534.jpg"><img alt="" class="thumbimage" data-dcnode-id="6289" data-file-height="1600" data-file-width="1084" decoding="async" height="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Creation-Luther-Bible-1534.jpg/220px-Creation-Luther-Bible-1534.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Creation-Luther-Bible-1534.jpg/330px-Creation-Luther-Bible-1534.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Creation-Luther-Bible-1534.jpg/440px-Creation-Luther-Bible-1534.jpg 2x" width="220"></a><span data-dcnode-id="6287" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6278"><div class="magnify" data-dcnode-id="6285"><a class="internal" data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACreation-Luther-Bible-1534.jpg" title="Enlarge"></a></div><i data-dcnode-id="6283"><span data-dcnode-id="6284" instrument_node="">The Creation</span></i><span data-dcnode-id="6282" instrument_node=""> by </span><a class="mw-redirect" data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucas_Cranach" title="Lucas Cranach"><span data-dcnode-id="6281" instrument_node="">Lucas Cranach</span></a><span data-dcnode-id="6279" instrument_node="">, 1534</span></div></div></div><span data-dcnode-id="6275" instrument_node="">
</span><p data-dcnode-id="6239"><span data-dcnode-id="6274" instrument_node="">The first woman is created out of one of Adam's </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rib" title="Rib"><span data-dcnode-id="6273" instrument_node="">ribs</span></a><span data-dcnode-id="6271" instrument_node=""> to be </span><i data-dcnode-id="6269"><span data-dcnode-id="6270" instrument_node="">ezer kenegdo</span></i><span data-dcnode-id="6268" instrument_node=""> (</span><link data-dcnode-id="6267" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6265" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6266" instrument_node="">עזר כנגדו</span></span><span data-dcnode-id="6264" instrument_node="">‎ </span><i data-dcnode-id="6262"><span data-dcnode-id="6263" instrument_node="">‘êzer kəneḡdō</span></i><span data-dcnode-id="6261" instrument_node="">)</span><sup class="reference" data-dcnode-id="6258" id="cite_ref-FOOTNOTEGalambush2000436_85-0"><a data-dcnode-id="6259" href="#cite_note-FOOTNOTEGalambush2000436-85"><span data-dcnode-id="6260" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6257" instrument_node=""> – a term notably difficult to translate – to the man. </span><i data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">Kəneḡdō</span></i><span data-dcnode-id="6254" instrument_node=""> means "alongside, opposite, a counterpart to him", and </span><i data-dcnode-id="6252"><span data-dcnode-id="6253" instrument_node="">‘êzer</span></i><span data-dcnode-id="6251" instrument_node=""> means active intervention on behalf of the other person.</span><sup class="reference" data-dcnode-id="6248" id="cite_ref-FOOTNOTEAlter200422_86-0"><a data-dcnode-id="6249" href="#cite_note-FOOTNOTEAlter200422-86"><span data-dcnode-id="6250" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6247" instrument_node=""> God's naming of the elements of the cosmos in Genesis 1 illustrated his </span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Divinity" title="Divinity"><span data-dcnode-id="6246" instrument_node="">authority over creation</span></a><span data-dcnode-id="6244" instrument_node="">; now the man's naming of the animals (and of Woman) illustrates Adam's authority within creation.</span><sup class="reference" data-dcnode-id="6241" id="cite_ref-FOOTNOTETurner200920_87-0"><a data-dcnode-id="6242" href="#cite_note-FOOTNOTETurner200920-87"><span data-dcnode-id="6243" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6240" instrument_node="">
</span></p><p data-dcnode-id="6166"><span data-dcnode-id="6238" instrument_node="">The woman is called </span><i data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">ishah</span></i><span data-dcnode-id="6235" instrument_node=""> (</span><link data-dcnode-id="6234" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6232" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6233" instrument_node="">אשה</span></span><span data-dcnode-id="6231" instrument_node="">‎ </span><i data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">’iš-šāh</span></i><span data-dcnode-id="6228" instrument_node="">), "Woman", with an explanation that this is because she was taken from </span><i data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">ish</span></i><span data-dcnode-id="6225" instrument_node=""> (</span><link data-dcnode-id="6224" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6222" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6223" instrument_node="">אִישׁ</span></span><span data-dcnode-id="6221" instrument_node="">‎ </span><i data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">’îš</span></i><span data-dcnode-id="6218" instrument_node="">), meaning "man";</span><sup class="reference" data-dcnode-id="6215" id="cite_ref-FOOTNOTEGalambush2000436_85-1"><a data-dcnode-id="6216" href="#cite_note-FOOTNOTEGalambush2000436-85"><span data-dcnode-id="6217" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6214" instrument_node=""> the two words are not in fact connected.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6207" style="white-space:nowrap;"><span data-dcnode-id="6213" instrument_node="">[</span><i data-dcnode-id="6209"><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6211" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="6212" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6208" instrument_node="">]</span></sup><span data-dcnode-id="6206" instrument_node=""> Later, after the story of the Garden is complete, she receives a name: </span><i data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">Ḥawwāh</span></i><span data-dcnode-id="6203" instrument_node=""> (</span><link data-dcnode-id="6202" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6200" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6201" instrument_node="">חוה </span></span><span data-dcnode-id="6199" instrument_node="">‎, Eve). This means "living" in Hebrew, from a root that can also mean "snake".</span><sup class="reference" data-dcnode-id="6196" id="cite_ref-FOOTNOTEHastings2003607_88-0"><a data-dcnode-id="6197" href="#cite_note-FOOTNOTEHastings2003607-88"><span data-dcnode-id="6198" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6195" instrument_node=""> Assyriologist </span><a data-dcnode-id="6193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Noah_Kramer" title="Samuel Noah Kramer"><span data-dcnode-id="6194" instrument_node="">Samuel Noah Kramer</span></a><span data-dcnode-id="6192" instrument_node=""> connects Eve's creation to the ancient Sumerian myth of </span><a data-dcnode-id="6190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enki" title="Enki"><span data-dcnode-id="6191" instrument_node="">Enki</span></a><span data-dcnode-id="6189" instrument_node="">, who was healed by the goddess </span><a class="mw-redirect" data-dcnode-id="6187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nin-ti" title="Nin-ti"><span data-dcnode-id="6188" instrument_node="">Nin-ti</span></a><span data-dcnode-id="6186" instrument_node="">, "the Lady of the rib"; this became "the Lady who makes live" via a </span><a data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pun" title="Pun"><span data-dcnode-id="6185" instrument_node="">pun</span></a><span data-dcnode-id="6183" instrument_node=""> on the word </span><span data-dcnode-id="6180" title="Sumerian-language text"><i data-dcnode-id="6181" lang="sux"><span data-dcnode-id="6182" instrument_node="">ti</span></i></span><span data-dcnode-id="6179" instrument_node="">, which means both "rib" and "to make live" in Sumerian.</span><sup class="reference" data-dcnode-id="6176" id="cite_ref-FOOTNOTEKramer1963149_89-0"><a data-dcnode-id="6177" href="#cite_note-FOOTNOTEKramer1963149-89"><span data-dcnode-id="6178" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6175" instrument_node=""> The Hebrew word traditionally translated "rib" in English can also mean "side", "chamber", or "beam".</span><sup class="reference" data-dcnode-id="6172" id="cite_ref-FOOTNOTEJacobs200737_90-0"><a data-dcnode-id="6173" href="#cite_note-FOOTNOTEJacobs200737-90"><span data-dcnode-id="6174" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6171" instrument_node=""> A long-standing exegetical tradition holds that the use of a rib from man's side emphasizes that both man and woman have equal dignity, for woman was created from the same material as man, shaped and given life by the same processes.</span><sup class="reference" data-dcnode-id="6168" id="cite_ref-FOOTNOTEHugenberger1988184_91-0"><a data-dcnode-id="6169" href="#cite_note-FOOTNOTEHugenberger1988184-91"><span data-dcnode-id="6170" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6167" instrument_node="">
</span></p><span data-dcnode-id="6165" instrument_node="">
