noir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3ABible_sidebar" title="Template talk:Bible sidebar"><abbr data-dcnode-id="7948" title="Discuss this template"><span data-dcnode-id="7949" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="7942"><a class="external text" data-dcnode-id="7943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ABible_sidebar%26action%3Dedit"><abbr data-dcnode-id="7944" title="Edit this template"><span data-dcnode-id="7945" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="7935" instrument_node="">
</span><p data-dcnode-id="7887"><span data-dcnode-id="7934" instrument_node="">The </span><b data-dcnode-id="7932"><span data-dcnode-id="7933" instrument_node="">Genesis creation narrative</span></b><span data-dcnode-id="7931" instrument_node=""> is the </span><a data-dcnode-id="7929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Creation_myth" title="Creation myth"><span data-dcnode-id="7930" instrument_node="">creation myth</span></a><sup class="reference" data-dcnode-id="7926" id="cite_ref-1"><a data-dcnode-id="7927" href="#cite_note-1"><span data-dcnode-id="7928" instrument_node="">[a]</span></a></sup><span data-dcnode-id="7925" instrument_node=""> of both </span><a data-dcnode-id="7923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="7924" instrument_node="">Judaism</span></a><span data-dcnode-id="7922" instrument_node=""> and </span><a data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity" title="Christianity"><span data-dcnode-id="7921" instrument_node="">Christianity</span></a><span data-dcnode-id="7919" instrument_node="">.</span><sup class="reference" data-dcnode-id="7916" id="cite_ref-FOOTNOTELeemingLeeming2004113_2-0"><a data-dcnode-id="7917" href="#cite_note-FOOTNOTELeemingLeeming2004113-2"><span data-dcnode-id="7918" instrument_node="">[1]</span></a></sup><span data-dcnode-id="7915" instrument_node=""> The </span><a data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative" title="Narrative"><span data-dcnode-id="7914" instrument_node="">narrative</span></a><span data-dcnode-id="7912" instrument_node=""> is made up of two stories, roughly equivalent to the first two chapters of the </span><a data-dcnode-id="7910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Genesis" title="Book of Genesis"><span data-dcnode-id="7911" instrument_node="">Book of Genesis</span></a><span data-dcnode-id="7909" instrument_node="">. In the first, </span><a data-dcnode-id="7907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elohim" title="Elohim"><span data-dcnode-id="7908" instrument_node="">Elohim</span></a><span data-dcnode-id="7906" instrument_node=""> (the Hebrew generic word for </span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/God" title="God"><span data-dcnode-id="7905" instrument_node="">God</span></a><span data-dcnode-id="7903" instrument_node="">) creates the heavens and the Earth in six days, then rests on, blesses and sanctifies the seventh (i.e. the </span><a data-dcnode-id="7901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Sabbath" title="Biblical Sabbath"><span data-dcnode-id="7902" instrument_node="">Biblical Sabbath</span></a><span data-dcnode-id="7900" instrument_node="">). In the second story, God, now referred to by the personal name </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="7899" instrument_node="">Yahweh</span></a><span data-dcnode-id="7897" instrument_node="">, creates </span><a data-dcnode-id="7895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam" title="Adam"><span data-dcnode-id="7896" instrument_node="">Adam</span></a><span data-dcnode-id="7894" instrument_node="">, the first man, from dust and places him in the </span><a data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garden_of_Eden" title="Garden of Eden"><span data-dcnode-id="7893" instrument_node="">Garden of Eden</span></a><span data-dcnode-id="7891" instrument_node="">, where he is given dominion over the animals. </span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eve" title="Eve"><span data-dcnode-id="7890" instrument_node="">Eve</span></a><span data-dcnode-id="7888" instrument_node="">, the first woman, is created from Adam as his companion.
</span></p><p data-dcnode-id="7832"><span data-dcnode-id="7886" instrument_node="">It expounds themes parallel to those in </span><a class="mw-redirect" data-dcnode-id="7884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamian_mythology" title="Mesopotamian mythology"><span data-dcnode-id="7885" instrument_node="">Mesopotamian mythology</span></a><span data-dcnode-id="7883" instrument_node="">, emphasizing the </span><a data-dcnode-id="7881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israelites" title="Israelites"><span data-dcnode-id="7882" instrument_node="">Israelite</span></a><span data-dcnode-id="7880" instrument_node=""> people's </span><a data-dcnode-id="7878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monotheism" title="Monotheism"><span data-dcnode-id="7879" instrument_node="">belief in one God</span></a><span data-dcnode-id="7877" instrument_node="">.</span><sup class="reference" data-dcnode-id="7874" id="cite_ref-FOOTNOTESarna199750_3-0"><a data-dcnode-id="7875" href="#cite_note-FOOTNOTESarna199750-3"><span data-dcnode-id="7876" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7873" instrument_node=""> The first major comprehensive draft of the </span><a class="mw-redirect" data-dcnode-id="7871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pentateuch" title="Pentateuch"><span data-dcnode-id="7872" instrument_node="">Pentateuch</span></a><span data-dcnode-id="7870" instrument_node=""> (the series of five books which begins with Genesis and ends with </span><a class="mw-redirect" data-dcnode-id="7868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deuteronomy" title="Deuteronomy"><span data-dcnode-id="7869" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="7867" instrument_node="">) was composed in the late 7th or the 6th century BCE (the </span><a data-dcnode-id="7865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jahwist" title="Jahwist"><span data-dcnode-id="7866" instrument_node="">Jahwist</span></a><span data-dcnode-id="7864" instrument_node=""> source) and was later expanded by other authors (the </span><a data-dcnode-id="7862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priestly_source" title="Priestly source"><span data-dcnode-id="7863" instrument_node="">Priestly source</span></a><span data-dcnode-id="7861" instrument_node="">) into a work very like Genesis as known today.</span><sup class="reference" data-dcnode-id="7858" id="cite_ref-FOOTNOTEDavies200737_4-0"><a data-dcnode-id="7859" href="#cite_note-FOOTNOTEDavies200737-4"><span data-dcnode-id="7860" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7857" instrument_node=""> The two sources can be identified in the creation narrative: Priestly and Jahwistic.</span><sup class="reference" data-dcnode-id="7854" id="cite_ref-FOOTNOTEBandstra200837_5-0"><a data-dcnode-id="7855" href="#cite_note-FOOTNOTEBandstra200837-5"><span data-dcnode-id="7856" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7853" instrument_node=""> The combined narrative is a critique of the </span><a data-dcnode-id="7851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Mesopotamian_religion" title="Ancient Mesopotamian religion"><span data-dcnode-id="7852" instrument_node="">Mesopotamian theology</span></a><span data-dcnode-id="7850" instrument_node=""> of creation: Genesis affirms </span><a data-dcnode-id="7848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monotheism" title="Monotheism"><span data-dcnode-id="7849" instrument_node="">monotheism</span></a><span data-dcnode-id="7847" instrument_node=""> and denies </span><a data-dcnode-id="7845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polytheism" title="Polytheism"><span data-dcnode-id="7846" instrument_node="">polytheism</span></a><span data-dcnode-id="7844" instrument_node="">.</span><sup class="reference" data-dcnode-id="7841" id="cite_ref-FOOTNOTEWenham2003b37_6-0"><a data-dcnode-id="7842" href="#cite_note-FOOTNOTEWenham2003b37-6"><span data-dcnode-id="7843" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7840" instrument_node=""> </span><a data-dcnode-id="7838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Alter" title="Robert Alter"><span data-dcnode-id="7839" instrument_node="">Robert Alter</span></a><span data-dcnode-id="7837" instrument_node=""> described the combined narrative as "compelling in its archetypal character, its adaptation of myth to monotheistic ends".</span><sup class="reference" data-dcnode-id="7834" id="cite_ref-FOOTNOTEAlter2004xii_7-0"><a data-dcnode-id="7835" href="#cite_note-FOOTNOTEAlter2004xii-7"><span data-dcnode-id="7836" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7833" instrument_node="">
</span></p><p data-dcnode-id="7807"><span data-dcnode-id="7831" instrument_node="">The scholar </span><a data-dcnode-id="7829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruce_Waltke" title="Bruce Waltke"><span data-dcnode-id="7830" instrument_node="">Bruce Waltke</span></a><span data-dcnode-id="7828" instrument_node=""> cautions against the "woodenly literal" reading of the first two chapters of Genesis which leads to "</span><a data-dcnode-id="7826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Creation_science" title="Creation science"><span data-dcnode-id="7827" instrument_node="">creation science</span></a><span data-dcnode-id="7825" instrument_node="">" and to such "implausible interpretations" as the "</span><a class="mw-redirect" data-dcnode-id="7823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gap_theory" title="Gap theory"><span data-dcnode-id="7824" instrument_node="">gap theory</span></a><span data-dcnode-id="7822" instrument_node="">", the presumption of a "</span><a class="mw-redirect" data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young_earth" title="Young earth"><span data-dcnode-id="7821" instrument_node="">young earth</span></a><span data-dcnode-id="7819" instrument_node="">", and the denial of </span><a data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evolution" title="Evolution"><span data-dcnode-id="7818" instrument_node="">evolution</span></a><span data-dcnode-id="7816" instrument_node="">.</span><sup class="reference" data-dcnode-id="7813" id="cite_ref-FOOTNOTEWaltke19916–9_8-0"><a data-dcnode-id="7814" href="#cite_note-FOOTNOTEWaltke19916%E2%80%939-8"><span data-dcnode-id="7815" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7812" instrument_node=""> Scholarly writings frequently refer to Genesis as myth, for while the author of Genesis 1–11 "demythologised" his narrative by removing the Babylonian myths those elements which did not fit with his own faith, it remains a myth in the sense of being a story of origins.</span><sup class="reference" data-dcnode-id="7809" id="cite_ref-FOOTNOTEHamilton199057–58_9-0"><a data-dcnode-id="7810" href="#cite_note-FOOTNOTEHamilton199057%E2%80%9358-9"><span data-dcnode-id="7811" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7808" instrument_node="">
</span></p><span data-dcnode-id="7806" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="7543"><div class="thumbinner" data-dcnode-id="7544" style="width:202px;"><a class="image" data-dcnode-id="7557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABm-epic-g.jpg"><img alt="" class="thumbimage" data-dcnode-id="7558" data-file-height="1101" data-file-width="933" decoding="async" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Bm-epic-g.jpg/200px-Bm-epic-g.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Bm-epic-g.jpg/300px-Bm-epic-g.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/39/Bm-epic-g.jpg/400px-Bm-epic-g.jpg 2x" width="200"></a><span data-dcnode-id="7556" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7545"><div class="magnify" data-dcnode-id="7554"><a class="internal" data-dcnode-id="7555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABm-epic-g.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="7552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuneiform_script" title="Cuneiform script"><span data-dcnode-id="7553" instrument_node="">Cuneiform</span></a><span data-dcnode-id="7551" instrument_node=""> tablet with the </span><a data-dcnode-id="7549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atra-Hasis" title="Atra-Hasis"><span data-dcnode-id="7550" instrument_node="">Atra-Hasis Epic</span></a><span data-dcnode-id="7548" instrument_node=""> in the </span><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Museum" title="British Museum"><span data-dcnode-id="7547" instrument_node="">British Museum</span></a></div></div></div><span data-dcnode-id="7542" instrument_node="">
</span><h3 data-dcnode-id="7532"><span class="mw-headline" data-dcnode-id="7540" id="Sources"><span data-dcnode-id="7541" instrument_node="">Sources</span></span><span class="mw-editsection" data-dcnode-id="7533"><span class="mw-editsection-bracket" data-dcnode-id="7538"><span data-dcnode-id="7539" instrument_node="">[</span></span><a data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D2" title="Edit section: Sources"><span data-dcnode-id="7537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7534"><span data-dcnode-id="7535" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7531" instrument_node="">
</span><link data-dcnode-id="7530" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7526" role="note"><span data-dcnode-id="7529" instrument_node="">See also: </span><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Documentary_hypothesis" title="Documentary hypothesis"><span data-dcnode-id="7528" instrument_node="">Documentary hypothesis</span></a></div><span data-dcnode-id="7525" instrument_node="">
</span><p data-dcnode-id="7503"><span data-dcnode-id="7524" instrument_node="">Although tradition attributes Genesis to </span><a data-dcnode-id="7522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="7523" instrument_node="">Moses</span></a><span data-dcnode-id="7521" instrument_node="">, biblical scholars hold that it, together with the following four books (making up what Jews call the </span><a data-dcnode-id="7519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="7520" instrument_node="">Torah</span></a><span data-dcnode-id="7518" instrument_node=""> and biblical scholars call the Pentateuch), is "a composite work, the product of many hands and periods."</span><sup class="reference" data-dcnode-id="7515" id="cite_ref-FOOTNOTESpeiser1964xxi_10-0"><a data-dcnode-id="7516" href="#cite_note-FOOTNOTESpeiser1964xxi-10"><span data-dcnode-id="7517" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7514" instrument_node=""> A common hypothesis among biblical scholars today is that the first major comprehensive draft of the Pentateuch was composed in the late 7th or the 6th century BCE (the </span><a data-dcnode-id="7512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jahwist" title="Jahwist"><span data-dcnode-id="7513" instrument_node="">Jahwist</span></a><span data-dcnode-id="7511" instrument_node=""> source), and that this was later expanded by the addition of various narratives and laws (the </span><a data-dcnode-id="7509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priestly_source" title="Priestly source"><span data-dcnode-id="7510" instrument_node="">Priestly source</span></a><span data-dcnode-id="7508" instrument_node="">) into a work very like the one existing today.</span><sup class="reference" data-dcnode-id="7505" id="cite_ref-FOOTNOTEDavies200737_4-1"><a data-dcnode-id="7506" href="#cite_note-FOOTNOTEDavies200737-4"><span data-dcnode-id="7507" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7504" instrument_node="">
</span></p><p data-dcnode-id="7488"><span data-dcnode-id="7502" instrument_node="">As for the historical background which led to the creation of the narrative itself, a theory which has gained considerable interest, although still controversial, is "Persian imperial authorisation". This proposes that the </span><a data-dcnode-id="7500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persians" title="Persians"><span data-dcnode-id="7501" instrument_node="">Persians</span></a><span data-dcnode-id="7499" instrument_node="">, after their </span><a data-dcnode-id="7497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylon%23Persia_captures_Babylon" title="Babylon"><span data-dcnode-id="7498" instrument_node="">conquest of Babylon</span></a><span data-dcnode-id="7496" instrument_node=""> in 538 BCE, agreed to grant Jerusalem a large measure of local autonomy within the empire, but required the local authorities to produce a single </span><a data-dcnode-id="7494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_ancient_legal_codes" title="List of ancient legal codes"><span data-dcnode-id="7495" instrument_node="">law code</span></a><span data-dcnode-id="7493" instrument_node=""> accepted by the entire community. It further proposes that there were two powerful groups in the community – the priestly families who controlled the Temple, and the landowning families who made up the "elders" – and that these two groups were in conflict over many issues, and that each had its own "history of origins", but the Persian promise of greatly increased local autonomy for all provided a powerful incentive to cooperate in producing a single text.</span><sup class="reference" data-dcnode-id="7490" id="cite_ref-FOOTNOTESka2006169,_217–18_11-0"><a data-dcnode-id="7491" href="#cite_note-FOOTNOTESka2006169,_217%E2%80%9318-11"><span data-dcnode-id="7492" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7489" instrument_node="">
</span></p><span data-dcnode-id="7487" instrument_node="">
</span><h3 data-dcnode-id="7477"><span class="mw-headline" data-dcnode-id="7485" id="Structure"><span data-dcnode-id="7486" instrument_node="">Structure</span></span><span class="mw-editsection" data-dcnode-id="7478"><span class="mw-editsection-bracket" data-dcnode-id="7483"><span data-dcnode-id="7484" instrument_node="">[</span></span><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D3" title="Edit section: Structure"><span data-dcnode-id="7482" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7479"><span data-dcnode-id="7480" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7476" instrument_node="">
</span><p data-dcnode-id="7450"><span data-dcnode-id="7475" instrument_node="">The creation narrative is made up of two stories, roughly equivalent to the two first chapters of the </span><a data-dcnode-id="7473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Genesis" title="Book of Genesis"><span data-dcnode-id="7474" instrument_node="">Book of Genesis</span></a><sup class="reference" data-dcnode-id="7470" id="cite_ref-FOOTNOTEAlter1981141_12-0"><a data-dcnode-id="7471" href="#cite_note-FOOTNOTEAlter1981141-12"><span data-dcnode-id="7472" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7469" instrument_node=""> (there are no chapter divisions in the original Hebrew text; see </span><a data-dcnode-id="7467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chapters_and_verses_of_the_Bible" title="Chapters and verses of the Bible"><span data-dcnode-id="7468" instrument_node="">Chapters and verses of the Bible</span></a><span data-dcnode-id="7466" instrument_node="">). The first account (</span><a class="external text" data-dcnode-id="7464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25201%3A1%25E2%2580%25932%3A3%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7465" instrument_node="">Genesis 1:1–2:3</span></a><span data-dcnode-id="7463" instrument_node="">) employs a repetitious structure of divine fiat and fulfillment, then the statement "And there was evening and there was morning, the [</span><i data-dcnode-id="7461"><span data-dcnode-id="7462" instrument_node="">x</span></i><sup data-dcnode-id="7459"><span data-dcnode-id="7460" instrument_node="">th</span></sup><span data-dcnode-id="7458" instrument_node="">] day," for each of the six days of creation. In each of the first three days there is an act of division: day one divides the </span><a class="mw-redirect" data-dcnode-id="7456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_versus_darkness" title="Light versus darkness"><span data-dcnode-id="7457" instrument_node="">darkness from light</span></a><span data-dcnode-id="7455" instrument_node="">, day two the "waters above" from the "waters below", and day three the sea from the land. In each of the next three days these divisions are populated: day four populates the darkness and light with Sun, Moon and stars; day five populates seas and skies with fish and fowl; and finally land-based creatures and mankind populate the land.</span><sup class="reference" data-dcnode-id="7452" id="cite_ref-FOOTNOTERuiten20009–10_13-0"><a data-dcnode-id="7453" href="#cite_note-FOOTNOTERuiten20009%E2%80%9310-13"><span data-dcnode-id="7454" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7451" instrument_node="">
</span></p><p data-dcnode-id="7422"><span data-dcnode-id="7449" instrument_node="">Consistency was evidently not seen as essential to storytelling in ancient Near Eastern literature.</span><sup class="reference" data-dcnode-id="7446" id="cite_ref-14"><a data-dcnode-id="7447" href="#cite_note-14"><span data-dcnode-id="7448" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7445" instrument_node=""> The overlapping stories of Genesis 1 and 2 are contradictory but also complementary, with the first (the Priestly story) concerned with the creation of the entire </span><a data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmos" title="Cosmos"><span data-dcnode-id="7444" instrument_node="">cosmos</span></a><span data-dcnode-id="7442" instrument_node=""> while the second (the Yahwist story) focuses on man as moral agent and cultivator of his environment.</span><sup class="reference" data-dcnode-id="7439" id="cite_ref-FOOTNOTEAlter1981141_12-1"><a data-dcnode-id="7440" href="#cite_note-FOOTNOTEAlter1981141-12"><span data-dcnode-id="7441" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7438" instrument_node=""> The highly regimented seven-day narrative of Genesis 1 features an </span><a data-dcnode-id="7436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Omnipotence" title="Omnipotence"><span data-dcnode-id="7437" instrument_node="">omnipotent</span></a><span data-dcnode-id="7435" instrument_node=""> God who creates a god-like humanity, while the one-day creation of Genesis 2 uses a simple linear narrative, a God who can fail as well as succeed, and a humanity which is not god-like but is punished for acts which would lead to their becoming god-like.</span><sup class="reference" data-dcnode-id="7432" id="cite_ref-FOOTNOTECarr199662–64_15-0"><a data-dcnode-id="7433" href="#cite_note-FOOTNOTECarr199662%E2%80%9364-15"><span data-dcnode-id="7434" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7431" instrument_node=""> Even the order and method of creation differs.</span><sup class="reference" data-dcnode-id="7428" id="cite_ref-FOOTNOTECarr199662–64_15-1"><a data-dcnode-id="7429" href="#cite_note-FOOTNOTECarr199662%E2%80%9364-15"><span data-dcnode-id="7430" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7427" instrument_node=""> "Together, this combination of parallel character and contrasting profile point to the different origin of materials in Genesis 1 and Genesis 2, however elegantly they have now been combined."</span><sup class="reference" data-dcnode-id="7424" id="cite_ref-FOOTNOTECarr199664_16-0"><a data-dcnode-id="7425" href="#cite_note-FOOTNOTECarr199664-16"><span data-dcnode-id="7426" instrument_node="">[15]</span></a></sup><span data-dcnode-id="7423" instrument_node="">
</span></p><p data-dcnode-id="7394"><span data-dcnode-id="7421" instrument_node="">The primary accounts in each chapter are joined by a literary bridge at </span><a class="external text" data-dcnode-id="7419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25202%3A4%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7420" instrument_node="">Genesis 2:4</span></a><span data-dcnode-id="7418" instrument_node="">, "These are the generations of the heavens and of the earth when they were created." This echoes the first line of Genesis 1, "In the beginning God created the heaven and the earth", and is reversed in the next phrase, "...in the day that the L</span><span class="smallcaps" data-dcnode-id="7416" style="font-size:83%"><span data-dcnode-id="7417" instrument_node="">ORD</span></span><span data-dcnode-id="7415" instrument_node=""> God made the earth and the heavens". This verse is one of ten "generations" (</span><a data-dcnode-id="7413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="7414" instrument_node="">Hebrew</span></a><span data-dcnode-id="7412" instrument_node="">: </span><span data-dcnode-id="7410" dir="rtl" lang="he"><span data-dcnode-id="7411" instrument_node="">תולדות</span></span><span data-dcnode-id="7409" instrument_node=""> </span><i data-dcnode-id="7404"><span data-dcnode-id="7405" title="Hebrew-language romanization"><i data-dcnode-id="7406" lang="he-Latn"><a data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toledot" title="Toledot"><span data-dcnode-id="7408" instrument_node="">toledot</span></a></i></span></i><span data-dcnode-id="7403" instrument_node="">) phrases used throughout Genesis, which provide a literary structure to the book.</span><sup class="reference" data-dcnode-id="7400" id="cite_ref-FOOTNOTECross1973301ff_17-0"><a data-dcnode-id="7401" href="#cite_note-FOOTNOTECross1973301ff-17"><span data-dcnode-id="7402" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7399" instrument_node=""> They normally function as headings to what comes after, but the position of this, the first of the series, has been the subject of much debate.</span><sup class="reference" data-dcnode-id="7396" id="cite_ref-FOOTNOTEThomas201127–28_18-0"><a data-dcnode-id="7397" href="#cite_note-FOOTNOTEThomas201127%E2%80%9328-18"><span data-dcnode-id="7398" instrument_node="">[17]</span></a></sup><span data-dcnode-id="7395" instrument_node="">
</span></p><span data-dcnode-id="7393" instrument_node="">
</span><h3 data-dcnode-id="7383"><span class="mw-headline" data-dcnode-id="7391" id="Mesopotamian_influence"><span data-dcnode-id="7392" instrument_node="">Mesopotamian influence</span></span><span class="mw-editsection" data-dcnode-id="7384"><span class="mw-editsection-bracket" data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">[</span></span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D4" title="Edit section: Mesopotamian influence"><span data-dcnode-id="7388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7382" instrument_node="">
</span><link data-dcnode-id="7381" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7377" role="note"><span data-dcnode-id="7380" instrument_node="">See also: </span><a data-dcnode-id="7378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panbabylonism" title="Panbabylonism"><span data-dcnode-id="7379" instrument_node="">Panbabylonism</span></a></div><span data-dcnode-id="7376" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7360"><div class="thumbinner" data-dcnode-id="7361" style="width:222px;"><a class="image" data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMarduk_and_the_Dragon.jpg"><img alt="" class="thumbimage" data-dcnode-id="7375" data-file-height="416" data-file-width="579" decoding="async" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Marduk_and_the_Dragon.jpg/220px-Marduk_and_the_Dragon.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Marduk_and_the_Dragon.jpg/330px-Marduk_and_the_Dragon.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Marduk_and_the_Dragon.jpg/440px-Marduk_and_the_Dragon.jpg 2x" width="220"></a><span data-dcnode-id="7373" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7362"><div class="magnify" data-dcnode-id="7371"><a class="internal" data-dcnode-id="7372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMarduk_and_the_Dragon.jpg" title="Enlarge"></a></div><a data-dcnode-id="7369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marduk" title="Marduk"><span data-dcnode-id="7370" instrument_node="">Marduk</span></a><span data-dcnode-id="7368" instrument_node="">, god of Babylon, destroying </span><a data-dcnode-id="7366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiamat" title="Tiamat"><span data-dcnode-id="7367" instrument_node="">Tiamat</span></a><span data-dcnode-id="7365" instrument_node="">, the dragon of </span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos_%28cosmogony%29" title="Chaos (cosmogony)"><span data-dcnode-id="7364" instrument_node="">primeval chaos</span></a></div></div></div><span data-dcnode-id="7359" instrument_node="">
</span><p data-dcnode-id="7325"><a data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comparative_mythology" title="Comparative mythology"><span data-dcnode-id="7358" instrument_node="">Comparative mythology</span></a><span data-dcnode-id="7356" instrument_node=""> provides historical and cross-cultural perspectives for </span><a data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_mythology" title="Jewish mythology"><span data-dcnode-id="7355" instrument_node="">Jewish mythology</span></a><span data-dcnode-id="7353" instrument_node="">. Both sources behind the Genesis creation narrative borrowed themes from </span><a class="mw-redirect" data-dcnode-id="7351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamian_mythology" title="Mesopotamian mythology"><span data-dcnode-id="7352" instrument_node="">Mesopotamian mythology</span></a><span data-dcnode-id="7350" instrument_node="">,</span><sup class="reference" data-dcnode-id="7347" id="cite_ref-FOOTNOTELambert_1965_19-0"><a data-dcnode-id="7348" href="#cite_note-FOOTNOTELambert_1965-19"><span data-dcnode-id="7349" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="7344" id="cite_ref-FOOTNOTELevenson20049_20-0"><a data-dcnode-id="7345" href="#cite_note-FOOTNOTELevenson20049-20"><span data-dcnode-id="7346" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7343" instrument_node=""> but adapted them to </span><a data-dcnode-id="7341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/God_in_Judaism" title="God in Judaism"><span data-dcnode-id="7342" instrument_node="">their belief in one God</span></a><span data-dcnode-id="7340" instrument_node="">,</span><sup class="reference" data-dcnode-id="7337" id="cite_ref-FOOTNOTESarna199750_3-1"><a data-dcnode-id="7338" href="#cite_note-FOOTNOTESarna199750-3"><span data-dcnode-id="7339" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7336" instrument_node=""> establishing a monotheistic creation in opposition to the polytheistic creation myth of </span><a data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_ancient_Israel_and_Judah" title="History of ancient Israel and Judah"><span data-dcnode-id="7335" instrument_node="">ancient Israel's</span></a><span data-dcnode-id="7333" instrument_node=""> neighbors.</span><sup class="reference" data-dcnode-id="7330" id="cite_ref-FOOTNOTELeeming2004_21-0"><a data-dcnode-id="7331" href="#cite_note-FOOTNOTELeeming2004-21"><span data-dcnode-id="7332" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="7327" id="cite_ref-FOOTNOTESmith2001_22-0"><a data-dcnode-id="7328" href="#cite_note-FOOTNOTESmith2001-22"><span data-dcnode-id="7329" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7326" instrument_node="">
</span></p><p data-dcnode-id="7277"><a class="external text" data-dcnode-id="7323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25201%25E2%2580%259311%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7324" instrument_node="">Genesis 1–11</span></a><span data-dcnode-id="7322" instrument_node=""> as a whole is imbued with Mesopotamian myths.</span><sup class="reference" data-dcnode-id="7319" id="cite_ref-FOOTNOTELambert_1965_19-1"><a data-dcnode-id="7320" href="#cite_note-FOOTNOTELambert_1965-19"><span data-dcnode-id="7321" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="7316" id="cite_ref-FOOTNOTEKutsko200062,_quoting_[[J._Maxwell_Miller_(biblical_scholar)|J._Maxwell_Miller]]_23-0"><a data-dcnode-id="7317" href="#cite_note-FOOTNOTEKutsko200062,_quoting_%5B%5BJ._Maxwell_Miller_(biblical_scholar)%7CJ._Maxwell_Miller%5D%5D-23"><span data-dcnode-id="7318" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7315" instrument_node="">  Genesis 1 bears both striking differences from and striking similarities to </span><a class="mw-redirect" data-dcnode-id="7313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonian_mythology" title="Babylonian mythology"><span data-dcnode-id="7314" instrument_node="">Babylon's national creation myth</span></a><span data-dcnode-id="7312" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enuma_Elish" title="Enuma Elish"><span data-dcnode-id="7311" instrument_node="">Enuma Elish</span></a><span data-dcnode-id="7309" instrument_node="">.</span><sup class="reference" data-dcnode-id="7306" id="cite_ref-FOOTNOTELevenson20049_20-1"><a data-dcnode-id="7307" href="#cite_note-FOOTNOTELevenson20049-20"><span data-dcnode-id="7308" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7305" instrument_node=""> On the side of similarities, both begin from a stage of chaotic waters before anything is created, in both a fixed dome-shaped "firmament" divides these waters from the habitable Earth, and both conclude with the creation of a human called "man" and the building of a temple for the god (in Genesis 1, this temple is the entire cosmos).</span><sup class="reference" data-dcnode-id="7302" id="cite_ref-FOOTNOTEMcDermott200225–27_24-0"><a data-dcnode-id="7303" href="#cite_note-FOOTNOTEMcDermott200225%E2%80%9327-24"><span data-dcnode-id="7304" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7301" instrument_node="">  On the side of contrasts, Genesis 1 is monotheistic; it makes </span><a data-dcnode-id="7299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theogony" title="Theogony"><span data-dcnode-id="7300" instrument_node="">no attempt to account for the origins of God</span></a><span data-dcnode-id="7298" instrument_node="">, and there is no trace of the resistance to the reduction of </span><a data-dcnode-id="7296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos_%28cosmogony%29" title="Chaos (cosmogony)"><span data-dcnode-id="7297" instrument_node="">chaos</span></a><span data-dcnode-id="7295" instrument_node=""> to order (Greek: </span><a data-dcnode-id="7293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theomachy" title="Theomachy"><span data-dcnode-id="7294" instrument_node="">theomachy</span></a><span data-dcnode-id="7292" instrument_node="">, lit. "God-fighting"), all of which mark the Mesopotamian creation accounts.</span><sup class="reference" data-dcnode-id="7289" id="cite_ref-FOOTNOTESarna199750_3-2"><a data-dcnode-id="7290" href="#cite_note-FOOTNOTESarna199750-3"><span data-dcnode-id="7291" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7288" instrument_node=""> Still, Genesis 1 bears similarities to the </span><a data-dcnode-id="7286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baal_Cycle" title="Baal Cycle"><span data-dcnode-id="7287" instrument_node="">Baal Cycle</span></a><span data-dcnode-id="7285" instrument_node=""> of Israel's neighbor, </span><a data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ugarit" title="Ugarit"><span data-dcnode-id="7284" instrument_node="">Ugarit</span></a><span data-dcnode-id="7282" instrument_node="">.</span><sup class="reference" data-dcnode-id="7279" id="cite_ref-SmithPitard2008_25-0"><a data-dcnode-id="7280" href="#cite_note-SmithPitard2008-25"><span data-dcnode-id="7281" instrument_node="">[24]</span></a></sup><span data-dcnode-id="7278" instrument_node="">
</span></p><p data-dcnode-id="7262"><span data-dcnode-id="7276" instrument_node="">The Enuma Elish has also left traces on Genesis 2. Both begin with a series of statements of what did not exist at the moment when creation began; the Enuma Elish has a spring (in the sea) as the point where creation begins, paralleling the spring (on the land – Genesis 2 is notable for being a "dry" creation story) in </span><a class="external text" data-dcnode-id="7274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25202%3A6%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7275" instrument_node="">Genesis 2:6</span></a><span data-dcnode-id="7273" instrument_node=""> that "watered the whole face of the ground"; in both myths, Yahweh/the gods first create a man to serve him/them, then animals and vegetation. At the same time, and as with Genesis 1, the Jewish version has drastically changed its Babylonian model: Eve, for example, seems to fill the role of a </span><a data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mother_goddess" title="Mother goddess"><span data-dcnode-id="7272" instrument_node="">mother goddess</span></a><span data-dcnode-id="7270" instrument_node=""> when, in </span><a class="external text" data-dcnode-id="7268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25204%3A1%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7269" instrument_node="">Genesis 4:1</span></a><span data-dcnode-id="7267" instrument_node="">, she says that she has "created a man with Yahweh", but she is not a divine being like her Babylonian counterpart.</span><sup class="reference" data-dcnode-id="7264" id="cite_ref-FOOTNOTEVan_Seters1992122–24_26-0"><a data-dcnode-id="7265" href="#cite_note-FOOTNOTEVan_Seters1992122%E2%80%9324-26"><span data-dcnode-id="7266" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7263" instrument_node="">
</span></p><p data-dcnode-id="7247"><span data-dcnode-id="7261" instrument_node="">Genesis 2 has close parallels with a second Mesopotamian myth, the </span><a data-dcnode-id="7259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atra-Hasis" title="Atra-Hasis"><span data-dcnode-id="7260" instrument_node="">Atra-Hasis</span></a><span data-dcnode-id="7258" instrument_node=""> epic – parallels that in fact extend throughout </span><a class="external text" data-dcnode-id="7256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25202%25E2%2580%259311%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7257" instrument_node="">Genesis 2–11</span></a><span data-dcnode-id="7255" instrument_node="">, from the Creation to the </span><a class="mw-redirect" data-dcnode-id="7253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noah%2527s_ark" title="Noah's ark"><span data-dcnode-id="7254" instrument_node="">Flood</span></a><span data-dcnode-id="7252" instrument_node=""> and its aftermath. The two share numerous plot-details (e.g. the divine garden and the role of the first man in the garden, the creation of the man from a mixture of earth and divine substance, the chance of immortality, etc.), and have a similar overall theme: the gradual clarification of man's relationship with God(s) and animals.</span><sup class="reference" data-dcnode-id="7249" id="cite_ref-FOOTNOTECarr1996242-248_27-0"><a data-dcnode-id="7250" href="#cite_note-FOOTNOTECarr1996242-248-27"><span data-dcnode-id="7251" instrument_node="">[26]</span></a></sup><span data-dcnode-id="7248" instrument_node="">
</span></p><span data-dcnode-id="7246" instrument_node="">
</span><h3 data-dcnode-id="7236"><span class="mw-headline" data-dcnode-id="7244" id="Creation_by_word_and_creation_by_combat"><span data-dcnode-id="7245" instrument_node="">Creation by word and creation by combat</span></span><span class="mw-editsection" data-dcnode-id="7237"><span class="mw-editsection-bracket" data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node="">[</span></span><a data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D5" title="Edit section: Creation by word and creation by combat"><span data-dcnode-id="7241" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7238"><span data-dcnode-id="7239" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7235" instrument_node="">
</span><p data-dcnode-id="7209"><span data-dcnode-id="7234" instrument_node="">The narratives in Genesis 1 and 2 were not the only creation myths in ancient Israel, and the complete biblical evidence suggests two contrasting models.</span><sup class="reference" data-dcnode-id="7231" id="cite_ref-FOOTNOTEDolansky2016_28-0"><a data-dcnode-id="7232" href="#cite_note-FOOTNOTEDolansky2016-28"><span data-dcnode-id="7233" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7230" instrument_node=""> The first is the "</span><a data-dcnode-id="7228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logos" title="Logos"><span data-dcnode-id="7229" instrument_node="">logos</span></a><span data-dcnode-id="7227" instrument_node="">" (meaning speech) model, where a supreme God "speaks" dormant matter into existence. The second is the "</span><a data-dcnode-id="7225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agon" title="Agon"><span data-dcnode-id="7226" instrument_node="">agon</span></a><span data-dcnode-id="7224" instrument_node="">" (meaning struggle or combat) model, in which it is God's victory in battle over the monsters of the sea that mark his sovereignty and might.</span><sup class="reference" data-dcnode-id="7221" id="cite_ref-FOOTNOTEFishbane200334–35_29-0"><a data-dcnode-id="7222" href="#cite_note-FOOTNOTEFishbane200334%E2%80%9335-29"><span data-dcnode-id="7223" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7220" instrument_node=""> Genesis 1 is an example of creation by speech, while </span><a data-dcnode-id="7218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psalm_74" title="Psalm 74"><span data-dcnode-id="7219" instrument_node="">Psalm 74</span></a><span data-dcnode-id="7217" instrument_node=""> and </span><a data-dcnode-id="7215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaiah_51" title="Isaiah 51"><span data-dcnode-id="7216" instrument_node="">Isaiah 51</span></a><span data-dcnode-id="7214" instrument_node=""> are examples of the "agon" mythology, recalling a Canaanite myth in which God creates the world by vanquishing the water deities: "Awake, awake! ... It was you that hacked Rahab in pieces, that pierced the Dragon! It was you that dried up the Sea, the waters of the great Deep, that made the abysses of the Sea a road that the redeemed might walk..."</span><sup class="reference" data-dcnode-id="7211" id="cite_ref-FOOTNOTEHutton2007274_30-0"><a data-dcnode-id="7212" href="#cite_note-FOOTNOTEHutton2007274-30"><span data-dcnode-id="7213" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7210" instrument_node="">
</span></p><span data-dcnode-id="7208" instrument_node="">
</span><h2 data-dcnode-id="7197"><span data-dcnode-id="7207" id="First_narrative:_Genesis_1:1.E2.80.932:3"></span><span class="mw-headline" data-dcnode-id="7205" id="First_narrative:_Genesis_1:1–2:3"><span data-dcnode-id="7206" instrument_node="">First narrative: Genesis 1:1–2:3</span></span><span class="mw-editsection" data-dcnode-id="7198"><span class="mw-editsection-bracket" data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">[</span></span><a data-dcnode-id="7201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D6" title="Edit section: First narrative: Genesis 1:1–2:3"><span data-dcnode-id="7202" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7199"><span data-dcnode-id="7200" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7196" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7181"><div class="thumbinner" data-dcnode-id="7182" style="width:202px;"><a class="image" data-dcnode-id="7194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEurope_a_Prophecy%2C_copy_D%2C_object_1_%28Bentley_1%2C_Erdman_i%2C_Keynes_i%29_British_Museum.jpg"><img alt="" class="thumbimage" data-dcnode-id="7195" data-file-height="4109" data-file-width="2975" decoding="async" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Europe_a_Prophecy%252C_copy_D%252C_object_1_%2528Bentley_1%252C_Erdman_i%252C_Keynes_i%2529_British_Museum.jpg/200px-Europe_a_Prophecy%252C_copy_D%252C_object_1_%2528Bentley_1%252C_Erdman_i%252C_Keynes_i%2529_British_Museum.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Europe_a_Prophecy%2C_copy_D%2C_object_1_%28Bentley_1%2C_Erdman_i%2C_Keynes_i%29_British_Museum.jpg/300px-Europe_a_Prophecy%2C_copy_D%2C_object_1_%28Bentley_1%2C_Erdman_i%2C_Keynes_i%29_British_Museum.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Europe_a_Prophecy%2C_copy_D%2C_object_1_%28Bentley_1%2C_Erdman_i%2C_Keynes_i%29_British_Museum.jpg/400px-Europe_a_Prophecy%2C_copy_D%2C_object_1_%28Bentley_1%2C_Erdman_i%2C_Keynes_i%29_British_Museum.jpg 2x" width="200"></a><span data-dcnode-id="7193" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7183"><div class="magnify" data-dcnode-id="7191"><a class="internal" data-dcnode-id="7192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEurope_a_Prophecy%2C_copy_D%2C_object_1_%28Bentley_1%2C_Erdman_i%2C_Keynes_i%29_British_Museum.jpg" title="Enlarge"></a></div><i data-dcnode-id="7188"><a data-dcnode-id="7189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ancient_of_Days" title="The Ancient of Days"><span data-dcnode-id="7190" instrument_node="">The Ancient of Days</span></a></i><span data-dcnode-id="7187" instrument_node=""> by </span><a data-dcnode-id="7185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Blake" title="William Blake"><span data-dcnode-id="7186" instrument_node="">William Blake</span></a><span data-dcnode-id="7184" instrument_node=""> (Copy D, 1794)</span></div></div></div><span data-dcnode-id="7180" instrument_node="">
</span><h3 data-dcnode-id="7170"><span class="mw-headline" data-dcnode-id="7178" id="Background"><span data-dcnode-id="7179" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="7171"><span class="mw-editsection-bracket" data-dcnode-id="7176"><span data-dcnode-id="7177" instrument_node="">[</span></span><a data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D7" title="Edit section: Background"><span data-dcnode-id="7175" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7172"><span data-dcnode-id="7173" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7169" instrument_node="">
</span><link data-dcnode-id="7168" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7164" role="note"><span data-dcnode-id="7167" instrument_node="">See also: </span><a data-dcnode-id="7165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Creatio_ex_nihilo" title="Creatio ex nihilo"><span data-dcnode-id="7166" instrument_node="">Creatio ex nihilo</span></a></div><span data-dcnode-id="7163" instrument_node="">
</span><p data-dcnode-id="7145"><span data-dcnode-id="7162" instrument_node="">The cosmos created in Genesis 1 bears a striking resemblance to the </span><a data-dcnode-id="7160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabernacle" title="Tabernacle"><span data-dcnode-id="7161" instrument_node="">Tabernacle</span></a><span data-dcnode-id="7159" instrument_node=""> in </span><a class="external text" data-dcnode-id="7157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0235.htm%231" rel="nofollow"><span data-dcnode-id="7158" instrument_node="">Exodus 35–40</span></a><span data-dcnode-id="7156" instrument_node="">, which was the prototype of the </span><a data-dcnode-id="7154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_in_Jerusalem" title="Temple in Jerusalem"><span data-dcnode-id="7155" instrument_node="">Temple in Jerusalem</span></a><span data-dcnode-id="7153" instrument_node=""> and the focus of priestly worship of </span><a data-dcnode-id="7151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="7152" instrument_node="">Yahweh</span></a><span data-dcnode-id="7150" instrument_node="">; for this reason, and because other Middle Eastern creation stories also climax with the construction of a temple/house for the creator-god, Genesis 1 can be interpreted as a description of the construction of the cosmos as God's house, for which the Temple in Jerusalem served as the earthly representative.</span><sup class="reference" data-dcnode-id="7147" id="cite_ref-FOOTNOTELevenson200413_31-0"><a data-dcnode-id="7148" href="#cite_note-FOOTNOTELevenson200413-31"><span data-dcnode-id="7149" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7146" instrument_node="">
</span></p><p data-dcnode-id="7127"><span data-dcnode-id="7144" instrument_node="">The word </span><i data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">bara</span></i><span data-dcnode-id="7141" instrument_node=""> is translated as "created" in English, but the concept it embodied was not the same as the modern term: in the world of the </span><a data-dcnode-id="7139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Near_East" title="Ancient Near East"><span data-dcnode-id="7140" instrument_node="">ancient Near East</span></a><span data-dcnode-id="7138" instrument_node="">, the gods demonstrated their power over the world not by creating matter but by fixing destinies, so that the essence of the </span><i data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node="">bara</span></i><span data-dcnode-id="7135" instrument_node=""> which God performs in Genesis concerns bringing "heaven and earth" (a </span><a data-dcnode-id="7133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merism" title="Merism"><span data-dcnode-id="7134" instrument_node="">set phrase</span></a><span data-dcnode-id="7132" instrument_node=""> meaning "everything") into existence by organising and assigning roles and functions.</span><sup class="reference" data-dcnode-id="7129" id="cite_ref-FOOTNOTEWalton2006183_32-0"><a data-dcnode-id="7130" href="#cite_note-FOOTNOTEWalton2006183-32"><span data-dcnode-id="7131" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7128" instrument_node="">
</span></p><p data-dcnode-id="7114"><span data-dcnode-id="7126" instrument_node="">The use of numbers in ancient texts was often </span><a data-dcnode-id="7124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Significance_of_numbers_in_Judaism" title="Significance of numbers in Judaism"><span data-dcnode-id="7125" instrument_node="">numerological</span></a><span data-dcnode-id="7123" instrument_node=""> rather than factual – that is, the numbers were used because they held some symbolic value to the author.</span><sup class="reference" data-dcnode-id="7120" id="cite_ref-FOOTNOTEHyers198474_33-0"><a data-dcnode-id="7121" href="#cite_note-FOOTNOTEHyers198474-33"><span data-dcnode-id="7122" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7119" instrument_node=""> The number seven, denoting divine completion, permeates Genesis 1: verse 1:1 consists of seven words, verse 1:2 of fourteen, and 2:1–3 has 35 words (5×7); Elohim is mentioned 35 times, "heaven/firmament" and "earth" 21 times each, and the phrases "and it was so" and "God saw that it was good" occur 7 times each.</span><sup class="reference" data-dcnode-id="7116" id="cite_ref-FOOTNOTEWenham19876_34-0"><a data-dcnode-id="7117" href="#cite_note-FOOTNOTEWenham19876-34"><span data-dcnode-id="7118" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7115" instrument_node="">
</span></p><p data-dcnode-id="7104"><span data-dcnode-id="7113" instrument_node="">Among commentators, symbolic interpretation of the numbers may coexist with factual interpretations.</span><sup class="reference" data-dcnode-id="7110" id="cite_ref-FOOTNOTEOvern2017119_35-0"><a data-dcnode-id="7111" href="#cite_note-FOOTNOTEOvern2017119-35"><span data-dcnode-id="7112" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7109" instrument_node=""> Numerologically significant patterns of repeated words and phrases are termed "Hebraic meter". They begin in the creation narrative and continue through the book of Genesis.</span><sup class="reference" data-dcnode-id="7106" id="cite_ref-FOOTNOTEOvern2017119_35-1"><a data-dcnode-id="7107" href="#cite_note-FOOTNOTEOvern2017119-35"><span data-dcnode-id="7108" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7105" instrument_node="">
</span></p><span data-dcnode-id="7103" instrument_node="">
</span><h3 data-dcnode-id="7092"><span data-dcnode-id="7102" id="Pre-creation:_Genesis_1:1.E2.80.932"></span><span class="mw-headline" data-dcnode-id="7100" id="Pre-creation:_Genesis_1:1–2"><span data-dcnode-id="7101" instrument_node="">Pre-creation: Genesis 1:1–2</span></span><span class="mw-editsection" data-dcnode-id="7093"><span class="mw-editsection-bracket" data-dcnode-id="7098"><span data-dcnode-id="7099" instrument_node="">[</span></span><a data-dcnode-id="7096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGenesis_creation_narrative%26action%3Dedit%26section%3D8" title="Edit section: Pre-creation: Genesis 1:1–2"><span data-dcnode-id="7097" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7094"><span data-dcnode-id="7095" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7091" instrument_node="">
</span><dl data-dcnode-id="7079"><dd data-dcnode-id="7089"><span data-dcnode-id="7090" instrument_node="">1 In the beginning God created the heaven and the earth.</span></dd><span data-dcnode-id="7088" instrument_node="">
</span><dd data-dcnode-id="7080"><span data-dcnode-id="7087" instrument_node="">2 And the earth was without form, and void; and darkness </span><i data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">[was]</span></i><span data-dcnode-id="7084" instrument_node=""> upon the face of the deep. And the Spirit of God moved upon the face of the waters.</span><sup class="reference" data-dcnode-id="7081" id="cite_ref-36"><a data-dcnode-id="7082" href="#cite_note-36"><span data-dcnode-id="7083" instrument_node="">[35]</span></a></sup></dd></dl><span data-dcnode-id="7078" instrument_node="">
</span><p data-dcnode-id="7070"><span data-dcnode-id="7077" instrument_node="">Although the opening phrase of </span><a data-dcnode-id="7075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genesis_1%3A1" title="Genesis 1:1"><span data-dcnode-id="7076" instrument_node="">Genesis 1:1</span></a><span data-dcnode-id="7074" instrument_node=""> is commonly translated in English as above, the Hebrew is </span><a class="mw-redirect" data-dcnode-id="7072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ambiguous" title="Ambiguous"><span data-dcnode-id="7073" instrument_node="">ambiguous</span></a><span data-dcnode-id="7071" instrument_node="">, and can be translated at least three ways:
</span></p><span data-dcnode-id="7069" instrument_node="">
</span><ol data-dcnode-id="7054"><li data-dcnode-id="7064"><span data-dcnode-id="7068" instrument_node="">as a statement that the </span><a data-dcnode-id="7066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmos" title="Cosmos"><span data-dcnode-id="7067" instrument_node="">cosmos</span></a><span data-dcnode-id="7065" instrument_node=""> had an absolute beginning ("In the beginning God created the heaven and the earth.");</span></li><span data-dcnode-id="7063" instrument_node="">
</span><li data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">as a statement describing the condition of the world when God began creating ("When in the beginning God created the heavens and the earth, the earth was untamed and shapeless."); and</span></li><span data-dcnode-id="7060" instrument_node="">
</span><li data-dcnode-id="7055"><span data-dcnode-id="7059" instrument_node="">essentially similar to the second version but taking all of Genesis 1:2 as background information ("When in the beginning God created the heavens and the earth – the earth being untamed and shapeless... – God said, Let there be light!").</span><sup class="reference" data-dcnode-id="7056" id="cite_ref-FOOTNOTEBandstra200838–39_37-0"><a data-dcnode-id="7057" href="#cite_note-FOOTNOTEBandstra200838%E2%80%9339-37"><span data-dcnode-id="7058" instrument_node="">[36]</span></a></sup></li></ol><span data-dcnode-id="7053" instrument_node="">
</span><p data-dcnode-id="7032"><span data-dcnode-id="7052" instrument_node="">The second seems to be the meaning intended by the original Priestly author: the verb </span><i data-dcnode-id="7050"><span data-dcnode-id="7051" instrument_node="">bara</span></i><span data-dcnode-id="7049" instrument_node=""> is used only of God (people do not engage in </span><i data-dcnode-id="7047"><span data-dcnode-id="7048" instrument_node="">bara</span></i><span data-dcnode-id="7046" instrument_node="">), and it concerns the assignment of roles, as in the creation of the first people as "</span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Male" title="Male"><span data-dcnode-id="7045" instrument_node="">male</span></a><span data-dcnode-id="7043" instrument_node=""> and </span><a data-dcnode-id="7041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Female" title="Female"><span data-dcnode-id="7042" instrument_node="">female</span></a><span data-dcnode-id="7040" instrument_node="">" (i.e., it allocates them </span><a class="mw-redirect" data-dcnode-id="7038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexes" title="Sexes"><span data-dcnode-id="7039" instrument_node="">sexes</span></a><span data-dcnode-id="7037" instrument_node="">): in other words, the power of God is being shown not by the creation of matter but by the fixing of destinies.</span><sup class="reference" data-dcnode-id="7034" id="cite_ref-FOOTNOTEWalton2006183_32-1"><a data-dcnode-id="7035" href="#cite_note-FOOTNOTEWalton2006183-32"><span data-dcnode-id="7036" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7033" instrument_node="">
</span></p><p data-dcnode-id="6995"><i data-dcnode-id="7030"><span data-dcnode-id="7031" instrument_node="">The heavens and the earth</span></i><span data-dcnode-id="7029" instrument_node=""> is a </span><a class="mw-redirect" data-dcnode-id="7027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Set_phrase" title="Set phrase"><span data-dcnode-id="7028" instrument_node="">set phrase</span></a><span data-dcnode-id="7026" instrument_node=""> meaning "</span><a data-dcnode-id="7024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Everything" title="Everything"><span data-dcnode-id="7025" instrument_node="">everything</span></a><span data-dcnode-id="7023" instrument_node="">", i.e., the </span><a data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmos" title="Cosmos"><span data-dcnode-id="7022" instrument_node="">cosmos</span></a><span data-dcnode-id="7020" instrument_node="">. This was made up of three levels, the habitable earth in the middle, the heavens above, and an </span><a data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Underworld" title="Underworld"><span data-dcnode-id="7019" instrument_node="">underworld</span></a><span data-dcnode-id="7017" instrument_node=""> below, all </span><a data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_ocean" title="Cosmic ocean"><span data-dcnode-id="7016" instrument_node="">surrounded by a watery "ocean" of chaos</span></a><span data-dcnode-id="7014" instrument_node=""> as the Babylonian </span><i data-dcnode-id="7011"><a data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiamat" title="Tiamat"><span data-dcnode-id="7013" instrument_node="">Tiamat</span></a></i><span data-dcnode-id="7010" instrument_node="">.</span><sup class="reference" data-dcnode-id="7007" id="cite_ref-FOOTNOTESpence201072_38-0"><a data-dcnode-id="7008" href="#cite_note-FOOTNOTESpence201072-38"><span data-dcnode-id="7009" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7006" instrument_node=""> The Earth itself was a flat disc, surrounded by mountains or sea. Above it was the </span><a data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firmament" title="Firmament"><span data-dcnode-id="7005" instrument_node="">firmament</span></a><span data-dcnode-id="7003" instrument_node="">, a transparent but solid dome resting on the mountains, allowing men to see the blue of the waters above, with "windows" to allow the rain to enter, and containing the Sun, Moon and stars. The waters extended below the Earth, which rested on pillars sunk in the waters, and in the underworld was </span><a data-dcnode-id="7001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheol" title="Sheol"><span data-dcnode-id="7002" instrument_node="">Sheol</span></a><span data-dcnode-id="7000" instrument_node="">, the abode of the dead.</span><sup class="reference" data-dcnode-id="6997" id="cite_ref-FOOTNOTEKnight1990175–76_39-0"><a data-dcnode-id="6998" href="#cite_note-FOOTNOTEKnight1990175%E2%80%9376-39"><span data-dcnode-id="6999" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6996" instrument_node="">
</span></p><p data-dcnode-id="6954"><span data-dcnode-id="6994" instrument_node="">The opening of </span><a class="mw-redirect" data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genesis_1" title="Genesis 1"><span data-dcnode-id="6993" instrument_node="">Genesis 1</span></a><span data-dcnode-id="6991" instrument_node=""> continues: "And the earth was formless and void..." The phrase "formless and void" is a translation of the Hebrew </span><i data-dcnode-id="6986"><span data-dcnode-id="6987" title="Hebrew-language romanization"><i data-dcnode-id="6988" lang="he-Latn"><a data-dcnode-id="6989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tohu_wa-bohu" title="Tohu wa-bohu"><span data-dcnode-id="6990" instrument_node="">tohu wa-bohu</span></a></i></span></i><span data-dcnode-id="6985" instrument_node="">, (</span><a data-dcnode-id="6983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="6984" instrument_node="">Hebrew</span></a><span data-dcnode-id="6982" instrument_node="">: </span><span data-dcnode-id="6980" dir="rtl" lang="he"><span data-dcnode-id="6981" instrument_node="">תֹהוּ וָבֹהוּ</span></span><span data-dcnode-id="6979" instrument_node="">), chaos, the condition that </span><i data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">bara</span></i><span data-dcnode-id="6976" instrument_node="">, ordering, remedies.</span><sup class="reference" data-dcnode-id="6973" id="cite_ref-FOOTNOTEWalton2001_40-0"><a data-dcnode-id="6974" href="#cite_note-FOOTNOTEWalton2001-40"><span data-dcnode-id="6975" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6972" instrument_node=""> </span><i data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">Tohu</span></i><span data-dcnode-id="6969" instrument_node=""> by itself means "emptiness, futility"; it is used to describe the desert wilderness; </span><i data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">bohu</span></i><span data-dcnode-id="6966" instrument_node=""> has no known meaning and was apparently coined to rhyme with and reinforce </span><i data-dcnode-id="6964"><span data-dcnode-id="6965" instrument_node="">tohu</span></i><span data-dcnode-id="6963" instrument_node="">.</span><sup class="reference" data-dcnode-id="6960" id="cite_ref-FOOTNOTEAlter200417_41-0"><a data-dcnode-id="6961" href="#cite_note-FOOTNOTEAlter200417-41"><span data-dcnode-id="6962" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6959" instrument_node=""> The phrase appears also in Jeremiah 4:23 where the prophet warns Israel that rebellion against God will lead to the return of darkness and chaos, "as if the earth had been 'uncreated'".</span><sup class="reference" data-dcnode-id="6956" id="cite_ref-FOOTNOTEThompson1980230_42-0"><a data-dcnode-id="6957" href="#cite_note-FOOTNOTEThompson1980230-42"><span data-dcnode-id="6958" instrument_node="">[41]</span></a></sup><span data-dcnode-id="6955" instrument_node="">
</span></p><p data-dcnode-id="6899"><span data-dcnode-id="6953" instrument_node="">The opening of Genesis 1 concludes with a statement that "</span><i data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">darkness</span></i><span data-dcnode-id="6950" instrument_node=""> was on the face of the </span><i data-dcnode-id="6948"><span data-dcnode-id="6949" instrument_node="">deep</span></i><span data-dcnode-id="6947" instrument_node="">" (</span><a data-dcnode-id="6945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="6946" instrument_node="">Hebrew</span></a><span data-dcnode-id="6944" instrument_node="">: </span><span data-dcnode-id="6942" dir="rtl" lang="he"><span data-dcnode-id="6943" instrument_node="">תְהוֹם</span></span><span data-dcnode-id="6941" instrument_node=""> </span><i data-dcnode-id="6933"><span data-dcnode-id="6934" title="Hebrew-language romanization"><i data-dcnode-id="6935" lang="he-Latn"><a data-dcnode-id="6936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tehom" title="Tehom"><span data-dcnode-id="6940" instrument_node="">t</span><sup data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">e</span></sup><span data-dcnode-id="6937" instrument_node="">hôm</span></a></i></span></i><span data-dcnode-id="6932" instrument_node="">), [the] "darkness" and the "deep" being two of the three elements of the </span><a data-dcnode-id="6930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos_%28cosmogony%29" title="Chaos (cosmogony)"><span data-dcnode-id="6931" instrument_node="">chaos</span></a><span data-dcnode-id="6929" instrument_node=""> represented in </span><i data-dcnode-id="6924"><span data-dcnode-id="6925" title="Hebrew-language romanization"><i data-dcnode-id="6926" lang="he-Latn"><a data-dcnode-id="6927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tohu_wa-bohu" title="Tohu wa-bohu"><span data-dcnode-id="6928" instrument_node="">tohu wa-bohu</span></a></i></span></i><span data-dcnode-id="6923" instrument_node=""> (the third is the "formless earth"). In the </span><a class="mw-redirect" data-dcnode-id="6921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enuma_Elish" title="Enuma Elish"><span data-dcnode-id="6922" instrument_node="">Enuma Elish</span></a><span data-dcnode-id="6920" instrument_node="">, the "deep" is personified as the goddess </span><a data-dcnode-id="6918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiamat" title="Tiamat"><span data-dcnode-id="6919" instrument_node="">Tiamat</span></a><span data-dcnode-id="6917" instrument_node="">, the enemy of </span><a data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marduk" title="Marduk"><span data-dcnode-id="6916" instrument_node="">Marduk</span></a><span data-dcnode-id="6914" instrument_node="">;</span><sup class="reference" data-dcnode-id="6911" id="cite_ref-FOOTNOTEWalton2001_40-1"><a data-dcnode-id="6912" href="#cite_note-FOOTNOTEWalton2001-40"><span data-dcnode-id="6913" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6910" instrument_node=""> here it is the </span><i data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">formless body of primeval water surrounding the habitable world</span></i><span data-dcnode-id="6907" instrument_node="">, later to be released during the </span><a class="mw-redirect" data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deluge_myth" title="Deluge myth"><span data-dcnode-id="6906" instrument_node="">Deluge</span></a><span data-dcnode-id="6904" instrument_node="">, when "all the fountains of the great deep burst forth" from the waters beneath the earth and from the "windows" of the sky.</span><sup class="reference" data-dcnode-id="6901" id="cite_ref-FOOTNOTEWenham2003a29_43-0"><a data-dcnode-id="6902" href="#cite_note-FOOTNOTEWenham2003a29-43"><span data-dcnode-id="6903" instrument_node="">[42]</span></a></sup><span data-dcnode-id="6900" instrument_node="">
</span></p><p data-dcnode-id="6869"><span data-dcnode-id="6898" instrument_node="">The </span><i data-dcnode-id="6895"><a class="mw-redirect" data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruach" title="Ruach"><span data-dcnode-id="6897" instrument_node="">ruach</span></a></i><span data-dcnode-id="6894" instrument_node=""> of God moves over the face of the </span><i data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">deep</span></i><span data-dcnode-id="6891" instrument_node=""> before creation begins. </span><i data-dcnode-id="6889"><span data-dcnode-id="6890" instrument_node="">Ruach</span></i><span data-dcnode-id="6888" instrument_node=""> (</span><span data-dcnode-id="6885" title="Hebrew-language text"><span data-dcnode-id="6886" dir="rtl" lang="he"><span data-dcnode-id="6887" instrument_node="">רוּחַ</span></span></span><span data-dcnode-id="6884" instrument_node="">) has the meanings "wind, spirit, breath", and </span><i data-dcnode-id="6880"><span data-dcnode-id="6881" title="Hebrew-language romanization"><i data-dcnode-id="6882" lang="he-Latn"><span data-dcnode-id="6883" instrument_node="">elohim</span></i></span></i><span data-dcnode-id="6879" instrument_node=""> can mean "great" as well as "god": the </span><i data-dcnode-id="6875"><span data-dcnode-id="6876" title="Hebrew-language romanization"><i data-dcnode-id="6877" lang="he-Latn"><span data-dcnode-id="6878" instrument_node="">ruach elohim</span></i></span></i><span data-dcnode-id="6874" instrument_node="">  may therefore mean the "wind/breath of God" (the storm-wind is God's breath in Psalms 18:16 and elsewhere, and the wind of God returns in the Flood story as the means by which God restores the Earth), or God's "spirit", a concept which is somewhat vague in the Hebrew Bible, or it may simply signify a great storm-wind.</span><sup class="reference" data-dcnode-id="6871" id="cite_ref-FOOTNOTEBlenkinsopp201133–34_44-0"><a data-dcnode-id="6872" href="#cite_note-FOOTNOTEBlenkinsopp201133%E2%80%9334-44"><span data-dcnode-id="6873" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6870" instrument_node="">
</span></p><p data-dcnode-id="6866"><span class="anchor" data-dcnode-id="6868" id="The_six_days_of_Creation:_Genesis_1:3-2:3"></span><span data-dcnode-id="6867" instrument_node="">
</span></p><span data-dcnode-id="6865" instrument_node="">
