                   Current thinking on other organizational structures

                  The organizational structures described above are still common. However, the phenomenon
                  of globalization has brought about the appearance of new organizational forms or adapta-
                  tions of existing forms to keep pace with economic reality.


                  Network structure
                  This form of organizational structure has gained considerable favour, thanks mainly to
                  developments in technology and a network’s apparent ability to deal more effectively with
                  global competition. Rather than being a pyramid hierarchical structure, a network has
                  company units with a horizontal system of communication. This implies that responsibility
                  and decision-making is dispersed to local subsidiaries and alliances (Deresky, 2003).
                     Network structures also have to do with managing the cross-cultural transfer of know-
                  ledge. Holden (2002) considers networking as an activity of cross-cultural exchanges of
                  knowledge. This activity has the shape of a negotiation involving interlocutors being chosen
                  and, at the same time, allowing access to the resources of organizations that are culturally or
                  geographically different.
                     The practice of networking facilitates organizational learning and is the essential
                  characteristic of a ‘learning organization’ (see Concept 8.1 for a definition). Networking
                  uses ‘socio-interactive communication’ to support the strategy and the mission of the organ-
                  ization. This network is indispensable for companies needing to learn about the rapidly
                  changing business environment in which they are involved.

Transnational structure
Bartlett and Ghoshal (1989: 59) were among the first to propose a new structure that
corresponded more effectively to the strategy of internationalization among companies:
the transnational structure. They argue that international enterprises must adopt a multi-
faceted strategy to respond to the complex environment within which they operate. In
other words, they must opt at the same time for international, multinational and global
strategies to become what the authors call a ‘transnational company’. In such a company
‘innovations are regarded as an outcome of a larger process of organizational learning that
encompasses every member of the company’.
   Such a company has the following characteristics:
●   It is dispersed, interdependent and specialized.
●   National units make differentiated contributions to integrated worldwide operations.
●   Knowledge is developed jointly and shared worldwide.
   Fifteen years after the emergence of the transnational organization, the authors asked
themselves about the future of this model: How must the transnational model evolve to
respond to the needs of the future? (Bartlett et al., 2004: 756). This question addressed
predictions that the end of large worldwide companies was in sight, to be replaced by
either more flexible small companies, or by ‘virtual corporations’ thanks to the evolution
of technology. While maintaining the concept of the ‘transnational company’, the authors
suggested that ‘large companies’ should no longer be described in terms of a formal
structure divided into business, geographic and functional units, but in terms of processes.
This description reflects more accurately a style of business management that involves the
entrepreneurial process, the integration process and the renewal process. The influence of
culture is to be found not only in the choice of structure, but also in the sum of processes
occurring within the organization. This implies that the managers have to adapt their
attitudes and skills to their new roles.


Cultural diversity and organizational structure

In this sphere of internationalization, relations between people from various cultural
backgrounds are increasing and companies have to manage these differences. How does the
organizational structure affect these differences? To what extent is cultural diversity reflected
in organizations? Furthermore, how does cultural diversity affect a firm’s strategy?
    To address these questions, we can refer to the work done by Adler with Gundersen
(2008, 2002). They investigated the impact of national culture and cultural diversity on
organizations and the stages that organizations need to go through before they can call
themselves global. One of the key observations they made was that, in present-day business,
‘firms frequently skip phases in order to more rapidly position themselves to maximize
their global competitive advantage’ (Adler with Gundersen, 2008: 9).
    They describe four kinds of organizations not only as an independent structure, but
also as a part of the phases of development in going global. In addition, they give the result
of their investigation on the importance of cultural diversity in these organizations. The
order of the phases can vary from country to country; that given below represents the most
common evolution of North American firms:

                  1. Domestic structure.
                  Up to now, most firms with this structure have offered their products or services almost
                  exclusively to the domestic market. If they sell their products abroad, it is because foreign
                  customers want to buy their products. Such firms can therefore be said to have an ethnocentric
                  perspective where no sensitivity towards cultural differences is apparent: ‘Worldwide cul-
                  tural diversity traditionally has not affected domestic firms’ internal organizational culture’
                  (Adler with Gundersen, 2008: 128).
                  2. Multidomestic structure.
                  The organization is presented as a set of subunits in several countries which operate
                  autonomously. Unlike those with a domestic structure, each of these firms must take into
                  account the particularities of the local market in which it is operating. Sensitivity towards
                  cultural differences is therefore important when the implementation of corporate strategy
                  is being considered. ‘Cultural diversity strongly affects relationships external to the organ-
                  ization, given that it has both clients and employees in other countries’ (2008: 128).
                  3. Multinational structure.
                  Owing to the geographical spread of this structure, diversity is inherent to the organization
                  concerned. Unlike a multidomestic firm, a company with a multinational structure has an
                  internal organization whose culture is affected by the cultural diversity present. That is why
                  these companies attach great importance to managing multinational diversity within the
                  firm rather than to managing cultural differences external to the firm.
                  4. The transnational (or global) structure.
                  Although many present-day companies may consider the multinational phase to be the
                  final phase of development, and so continue operating according to its norms, there is a
                  fourth phase into which competitive companies are moving. This final type of structure –
                  the transnational structure, as described by Bartlett and Ghoshal (1989) – gives enterprises
                  their ‘global’ status. This structure differs from the others through the fact that it generates
                  its own evolution without having to rely on forces outside the enterprise. Heterogeneity,
                  and all the probl</span><span data-dcnode-id="132" instrument_node="">ems it may bring, is indispensable. In this structure the global strategies of
                  human resources become essential and the diversity present allows mutually beneficial
                  relations to be created.

Concept 7.2 Corporate cultures

           Concept 7.2 discusses models proposed by various writers that allow national culture to be
           given shape. It also examines the place national culture occupies in the notion of corporate
           culture. The focus is on the ‘corporate’ element of culture and on two key criteria: the
           business environment and the national cultural setting.
              According to Deal and Kennedy (2000: 13), ‘The business environment is the single
           greatest influence in shaping a corporate culture.’ In other words, the types of industry
           in question, as well as the type of product and the markets involved, play an important
           role.
              The national cultural setting also has an influence on how companies manage their
           business. The cultural assumptions with regard to the relations between employees and
           their organization, the hierarchical system in place, the company’s mission and aims,
           all these elements have an influence on the preference for a particular organizational
           culture.


            Corporate culture and management

           Most domains of management use the concept of culture. For strategy, culture is a
           diagnostic element and also acts as a framework of reference for instigating strategy. It is
           also a framework of reference in human resource management for the implementation
           of change and the involvement of the people in the process. Marketing has to do with
           the commercial culture of the firm and even finance shows the relation between cultural
           values and accounting systems. However, according to Thévenet (1999), it is still not clear
           whether the implicit values inherent in every management system are the same as those
           of the corporate culture.
               If management is defined as an activity based on three aspects – action, the manage-
           ment of people, and the achievement of objectives – to what extent does culture affect
           management?
               First, culture is of interest to management if it offers the possibility of increasing
           efficiency at various levels. If culture is taken into account, then the potential for analysis is
           greater and this allows the manager to explain how an organization works before deciding
           whether it needs to be changed.

                     Second, culture helps to understand the organization as an entity, as a collection of
                  individuals who have together created a heritage of references based on the experience
                  of the group. This serves as a framework of reference for situations in the future.
                     Finally, the company has a raison d’être: it is there to achieve certain objectives, to reach
                  certain targets. It is management’s task to achieve these by looking for behaviours that
                  allow the best performance. Culture is also a source of behaviour and therefore a source
                  of performance.


                   Levels of corporate culture

                  To define ‘corporate culture’, Schein (1999, 2009) starts with his general definition of culture
                  and its three layers. According to him: ‘The levels of culture go from the very visible to the
                  very tacit and invisible’ (2009: 21). He calls the first level ‘artefacts’, i.e. everything visible
                  in an organization: the structure, the way the offices are arranged, the office doors (are
                  they open or closed?), the frequency of meetings, the way people dress. However, what is
                  easily visible or observable does not always explain why things are as they are. Answers
                  to questions such as ‘why do they do what they do’ allow people to gain only a certain
                  understanding about the ‘artefacts’ and behaviour patterns. ‘The first things you learn when
                  you start asking questions is that the organization has certain values that are supposed
                  to create an image of the organization.’ (2009: 23). It is the second level, ‘espoused values’,
                  that reveals the strategies, objectives and philosophies of the organization.
                     Still, according to Schein, it could be that two organizations share certain values such as
                  integrity, teamwork, customer orientation and product quality, without having the same
                  visible behaviour. This shows there is a deeper level of thought and perception driving the
                  overt behaviour. This is the third level, ‘shared tacit assumptions’. The history of the com-
                  pany, all the values, beliefs and assumptions of its founder(s) and ‘key leaders’, as well as
                  certain individuals or small teams who have made the company successful, all these elements
                  form the culture of an organization. If the organization continues to perform well, then
                  these beliefs and values are shared with newcomers and, through ‘a joint learning process’,
                  they become tacit assumptions about the nature of the world and how to succeed in it.
                     In conclusion, Schein (2009) insists that cultural assumptions consist not only of the
                  internal workings of a company, but also above all how an organization sees itself in rela-
                  tion to its environment. This forms the culture content of the organization, which must:
                  ●   Survive in the external environment (mission, strategy, structure, processes . . . );
                  ●   integrate human aspects (common language, relationships . . . ); and
                  ●   take account of the national culture in which it is operating.


                  Corporate values
                  Other writers stress the importance of values. Deal and Kennedy, for example (2000: 21)
                  consider that values – which they define as being ‘the basic concepts and beliefs of an
                  organization’ – form the basis of corporate culture: ‘Values provide a sense of common
                  direction for all employees and guidelines for their day-to-day behaviour.’ They add that
                  ‘rational’ managers show little concern for the system of values of an organization; they are
                  more interested in its structure, policies and procedures, strategies or budgets. This lack of

everyday business environment, however, requires that choices be made and values are an
indispensable guide for making such choices.

1. The organizations have an explicit philosophy as to why they are conducting business.
2. The management places great importance on communicating the values that shape the

3. These values are shared at all levels of the organization, from the shop floor to the board

Identifying corporate cultures
Deal and Kennedy (2000: 15–16) are among the first to examine in detail the phenomenon
of corporate culture. Their book is intended primarily to serve as a primer on cultural
management for business leaders. Using concrete examples taken from companies that,
according to them, know how to manage their culture, they examine the role of the leader
as a ‘mediator of behaviour’ and the positive effects of building culture. The main belief is
that a company is not only a place where things are produced, but also an institution whose
principal resources are people. And it is these people who manage themselves by using ‘the
subtle cues of a culture’. A strong culture – which they see ‘as a system of informal rules that
spells out how people are to behave most of the time’ – allows the behaviour of people to
be guided and to ‘feel better about what they do, so they are more likely to work harder’.
   As stated in the introduction to this concept, the business environment in which a
company operates has a considerable influence on the culture of the company. That is why
Deal and Kennedy (2000) present a classification of the types of cultures on the basis of
a study they made of various firms and their business environment. Using two factors –
how much risk is involved in the firm’s activities, and how much time is needed before
a company and its employees know how successful their decisions or strategies have been
– they distinguish four categories of culture. These categories provide a useful framework
for classifying organizational cultures.
●   The tough-guy, macho culture. This culture takes a lot of risks and quickly finds out
    whether its actions have been successful. A police force or a hospital can be seen as
    representatives of this type of culture. The construction or cosmetics industries, or even
    management consulting and the whole entertainment industry, are other examples,
    particularly since they have to deal with a lot of internal competition. This type of culture
    puts great emphasis on youth and speed. Decisions must be made quickly, even if there
    is a risk that they may not be the right ones.
●   Work hard/play hard culture. This is a ‘fun’ and action culture with a tendency to pursue
    low-risk activities that give quick feedback. This culture is to be found in the sales
    department of a company or in a factory. The feedback is gained rapidly and everyone
    knows whether or not the work has been carried out according to the rules. There is a
    strict control system preventing big risks. This culture attaches particular importance to
    consumers and their needs. In contrast to the ‘tough-guy’ culture, which is ‘find a mountain
    and climb it’, the ‘the work hard/play hard’ culture rests on ‘find a need and fill it’.

                  ●   Bet-your-company culture. This form favours high risk, but in an environment where

                   Stereotyping corporate culture

                  The classification model just described, whereby organizational culture is divided into
                  four groups, has been taken up by other writers. Other criteria, however, have been used
                  for the classification. Trompenaars and Woolliams (2003: 101) dedicate a whole chapter
                  of their book Business Across Cultures to corporate culture. They describe it as the ‘driver’ of
                  the organization: ‘ “Management of culture” is now about creating a corporate culture in
                  which people will work together to achieve the organization’s goals, reconciling dilemmas
                  that originate from issues of corporate culture.’
                      Just as in a society, an organization is composed of individuals with different personal-
                  ities who form and share a culture. Trompenaars and Woolliams (2003: 106–111) put
                  forward a model based on ‘organizational relationships’ – those between employees, between
                  employees and their superiors and the relations within the group as a whole. By using a
                  model that combines two dimensions – task or person (high versus low formalization),

●   The Incubator is like a team without a leader. Its main characteristics are that it is
    person-oriented and focused on self-realization, commitment to oneself and profes-
    sional recognition.
●   The Guided Missile has a low degree of centralization and a high degree of formalization.

    of knowledge/expertise, commitment to tasks and pay for performance.
●   The Family culture is characterized by a high degree of centralization and a low
    degree of formalization. It is power-oriented, with a stress on personal relationships

●   The Eiffel Tower has a high degree of formalization together with a high degree of central-
    ization. It is role-oriented, with power attached to the position or role. The formality is
    reflected in the importance given to job descriptions and evaluations, rules and procedures,
    order and predictability.
    To conclude this concept, Delavallée’s standpoint (2002) appears correct, in that global-
ization of trade, identical management and production techniques have narrowed the
differences between companies. What remains different is the culture of each company.
That culture exists in its own right and, being the result of the company’s history, belongs
to it alone. Unlike a production method, a corporate culture cannot be copied. That culture
is a way a company can differentiate itself from its global competitors. Therefore, if the com-
pany has adapted to the demands of its environment, culture remains the most effective
way of maintaining a lasting competitive advantage.
    This chapter has presented two ways of categorizing companies according to their
structure or culture. It would be worthwhile investigating a possible correlation between
the two to see if certain types of organization are more suited than others to developing
specific corporate values inherent to a particular type of culture.



    Conclusion

According to this chapter, to analyse the culture of an organization, it is necessary to
take into account its structure. There are many organizational structures, ranging from
geographical and matrix structures through to network and transnational structures. The
last two seem to be the most suitable for the globalization of business. The choice of
structure depends on the strategy and the mission of the organization, as well as its
cultural diversity. While cultural diversity has little impact on national organizations, it can
affect structure at all levels in international organizations.
However, an organization is not only characterized by its structure, but also by its specific
corporate culture. Deal and Kennedy (2000) show that the culture of a company is strongly
influenced by its history, by the people who compose it, and also by its attitude towards
the business environment. Therefore, the corporate culture of a company – even if it is
classified somehow – has unique characteristics that differentiate it from others.

Bad blood
Our group, the Venture Group – a mother company in India, with as branch head, Mr. Soota – received

the process of negotiating the contract.
   DXB-Al Fayed was a partner in the business because it had managed to negotiate and win a favourable
contract with the government for the purchase of the plastic tubes. The Saudi Arabian company was in a very

by virtue of its good contacts with the Saudi government and its in-depth knowledge of the local market.

   The next day, however, we received a call from the Saudi party. They informed us that they were not

Mr. Habib commented on the phone: ‘I am sure that we can work with you, but Mr. Zankyl and Mr. Kirchdorfer

            The previous chapter examined types of company structure and the range of corporate
            cultures to be found within them. By gaining insight into a company’s culture, managers

            It is this role of management in the cultural context that Chapter 8 will examine in detail.

            Learning outcomes
            After reading this chapter, you will gain an understanding of:

            ●   Evolving ideas with regard to leadership, particularly those Western ideas influenced by

Concept 8.1 Different conceptions of leadership

            Before examining the role of leader, it is necessary to look at the concept of leader. A
            number of theories about leadership have been devised over the years, most of which
            emanate from the US and Europe. They contain many definitions of the term in the
            business context, but most assume that leadership has to do with an individual intention-
            ally exerting influence on others to structure the relationships in an organization. Where
            definitions differ is with regard to how the influence is exerted and the outcome of the
            attempt to influence.


            The first leader

            The prototype leader in a business context is the entrepreneur who founds a company. That
            person will have a strong influence from the start. He/she will determine the mission of
            the company and the environmental context in which it operates. Schein (2004) describes

corporate culture:
●   What the leader considers important and pays attention to, what must be measured and
    controlled. This has considerable influence on people in the working environment.
●   The way a leader reacts to difficult situations and crises. This shows others within the
    company how they should react in similar situations.
●   The priorities a leader sets when allocating resources.
●   The examples set by a leader. These teach and reinforce desired values and behaviours.
●   The criteria a leader uses to allocate rewards and status as well as to reinforce desired

●   The criteria used for recruitment, selection, promotion and dismissal.
   However, as many entrepreneurs have discovered, once they stand back from the com-
pany they started, the company culture takes on a life of its own. The leader’s pioneering
work may have resulted in the establishment of routines in all aspects of the company’s
operations. Such routines/habits may, however, be difficult to break if there is felt to be
need for change in response to a dynamic environment. The increasing size of a successful
company and the consequent decentralization of its operations may water down the power
and influence exerted by those who have replaced the leader. This management team may
not recognize the need for change when the company undergoes some sort of decline and
may instead cling to power, preferring to keep things going as they have always done
and blaming the environment for the change in its fortunes. Then it is up to the leader to
re-assert his position and to instigate changes to revitalize the company. Or hand over the
reins to a successor or new leader from the management team.
   In recent history, it is the industrial revolution that spawned the founder/leader as well
as the study of organizations. The next section will give a brief account of the development
of organization theory with emphasis on the role of the leader/manager.


The theories evolving around the leader

Research on organizations and the decision-makers focused originally on the organization
of work systems. The production process, including the increasing specialization and
division of labour emerging from the industrial revolution, was the focus of attention.
What was the best way for a leader to get the job done in the most efficient way possible?
This led to the development of principles of scientific leadership, whereby the questions
of planning, organizing, leading and controlling a group of employees were approached
in a scientific way. Standard methods for doing a job were developed – the worker was not
required to think, only the leader. Chapter 6 touched on these issues when examining
cultural elements relating to the tasks of the manager.
   Bureaucratic organizations were the eventual product of this approach to managing
production processes, particularly as a response to much larger companies. In such bureau-
cracies the leader heads a carefully designed hierarchy of authority, where responsibilities
are clearly defined. Functions within the organization become specialized, information-
and control-centralized. The totally rational approach of this model is emphasized by the
uniform application of standard rules and procedures. All employees play a role in this

                  Examples of bureaucracies include not only government departments, the police and

                     Alongside these process-focused theories emerged ideas about the ideal leader. The first
                  clearly definable trend was the trait approach, which took many ideas from historians,
                  psychologists and sociologists. The theory was developed that some people have traits –
                  and skills – which will make them seek out and reach positions of leadership and be effective

                  ●   high intelligence;
                  ●   considerable verbal fluency;
                  ●   overall knowledge;
                  ●   considerable initiative involving energy, ambition and persistence;
                  ●   height: tallness implies authority!
                  The question of human relations within organizations only began to achieve prominence
                  as a result of research carried out in the late 1920s and early 1930s. Attempts were also
                  made to marry the scientific and human approaches by focusing on the role of the decision-
                  makers. If they are to operate successfully, they need to find a compromise between rational,
                  goal-oriented behaviour and non-rational behaviour among an organization’s employees.


                   Task orientation versus relationship orientation

                  With the shift to the human factor came a shift in emphasis with regard to the recipe for
                  leadership success. The style of leadership behaviour became the base for analysis, particu-
                  larly as to how leaders interacted with groups under various conditions. While a leader
                  needs to remain task-oriented to ensure effective performance of the organization, he has
                  to be a relationship-oriented leader to ensure greater satisfaction among subordinates. The
                  successful leader, it was maintained, managed to balance both task and relationship concerns.
                  Maintaining this balance was necessary to ensure the effectiveness of the group.
                      The X and Y theory of McGregor (1960) gave a startling contrast between the task-oriented
                  view and human-oriented view. The message accompanying this theory was that managers
                  should take a more positive approach toward employees, delegate authority, making jobs more
                  challenging, providing rewards for superior performance, and treating workers with respect.
                      Theory X is based on a pessimistic assumption that people have an inherent dislike of
                  work and will do a lot to avoid it. They generally lack ambition, avoid responsibility and
                  seek security in the workplace, lack imagination, creativity and initiative. The theory X
                  manager is results-driven, demands rather than asks, has little interest in human issues,
                  and shows little concern for the morale of the workforce. The X manager does not listen to
                  suggestions for improvement, sees criticism as threatening, holds responsibility but is the
                  first to hold subordinates accountable for failures.
                      Theory Y is based on an optimistic approach and assumes that people actually like
                  working under suitable conditions; they are self-starters, willing to accept responsibility, are

creative and imaginative. The Y manager believes people, under the right conditions, want
to learn to accept and to seek responsibility. The Y manager wants employees to participate
in decision-making and problem-solving – people’s creativity can be used to solve problems
and further the organization’s success.
    One drawback to this approach was that it gave little consideration to the influence of
different situations in which a leader may operate and how these affect the effectiveness of the
leader. Theories were developed to try to establish the factors determining an appropriate
match between leadership style and demands of the situation. The implication of this approach
is that there is no universal answer as to what makes an effective leader. If there is one answer
that can be given, it is ‘it depends . . .’
    Therefore, in the search of leadership effectiveness, the focus of the research being done
in North America shifted from the person to the context in which leadership takes place.
Fiedler (1967) established a new perspective on the study of leadership, and many studies
since have adopted a similar approach.
    Fiedler’s The contingency theory considers how performance of the workers in an
organization is the result of the interaction of two factors: leadership style and situational
favourableness. Leadership effectiveness is the result of interaction between the style of
the leader and the characteristics of the environment in which the leader works. This
environment is characterized by three factors:
●   Leader–member relationship: the degree of confidence, trust and respect.
●   Task-structure: the extent to which it is necessary to spell out the goals, procedure and
    guidelines to the workers.
●   Position power: the extent to which the leader or the group holds the power. The leader’s
    power may be boosted by the expertise shown and the authority to reward or punish.
Fiedler (1967) presents two extreme situations, describing all the contingent factors:
●   A highly favourable situation in which everyone gets along well, the task performed
    is clear and the leader enjoys considerable power. In this situation, all that is needed is
    someone to take charge and show direction.
●   A highly unfavourable situation in which the leader has a battle of wills with the workforce
    and the task is not clearly structured. The leader needs to be strong to counterbalance
    the power of the workforce and to show direction in an ambiguous environment.
   Fiedler’s theory is implicitly related to leadership in North America: no mention is made
of cultural impediments to improving the leader’s situation (see Concept 8.2). The context
within which the contingency theory was developed was that of (North American) com-
panies running bureaucratic systems whereby the core functions of planning, organizing
and controlling workforces could be exercised efficiently to ensure maximum economies
of scale and increased output.
   This way of functioning had indeed appeared to be working well: the growth and
profitability of the US economy had soared during the 1950s, 1960s and most of the 1970s.
By that time, however, the increasing presence of Japanese products in the US domestic
market was beginning to take its toll. The car and electronics sectors in particular were being
hit hard by innovative, well-made and well-priced products from Japan. The attention of
researchers in management inevitably turned increasingly to the Japanese way of doing
business and their approach to management.

                   The Z theory

                  Reference has been made in Chapter 4 to the Japanese concept of wa. This is the notion of
                  harmony, reflected in the considerable degree of collaborative behaviour and consensus-
                  building within an organization. This is in turn reflected in the Z theory, developed and
                  introduced by Ouchi (1981). He describes the basic elements of the Japanese management
                  approach and explains what US business people can learn from their Japanese counterparts.
                     Theory Z can be seen as an extension of McGregor’s X and Y theory in that it combines
                  elements of theory Y with features of modern Japanese management. Ouchi’s theory assumes
                  that employees are disciplined, have a strong moral obligation to work hard and want
                  to establish close, co-operative working relations with their colleagues as well as those for
                  whom they are working. They can be trusted to work hard as long as management can be
                  trusted to give them maximum support and to show concern for their well-being. This
                  entails the organization giving consideration to the workers’ families and traditions since
                  these are as important as work itself.
                     Management’s job is to ensure that employees increase their knowledge of the com-
                  pany through training and job rotation. Rather than becoming specialists, the employees
                  develop a range of skills that can be applied in many parts of the company’s operations.
                  Through gaining considerable familiarity with these operations while being trained to
                  develop their skills and decision-making competence, the workers are expected to develop
                  a loyalty to the company and to devote themselves to it for their working life. If they are
                  eventually promoted to a high managerial position, they will be very knowledgeable about
                  the company and the way it operates and will in turn be in a position to use the manage-
                  ment Z approach with new employees.
                     This theory moves on from theories X and Y in that it focuses less on management and
                  motivation from the manager’s viewpoint, and more on the attitudes and responsibilities of
                  subordinates. It reflects the fundamental concept found in Japan, and one which managers
                  there have as their starting-point, that all employees share a collective responsibility for the
                  fate of their company. To that end, individuals are encouraged to develop their potential
                  within the company. Rather than being tied to one position, they are expected, with train-
                  ing, to function in different positions.
                     This approach was very different to that taken in North America, where the principles
                  of scientific management still tended to predominate, even though they had been softened
                  to some extent by a greater emphasis on human relations. Nevertheless, the Z theory has
                  had an enormous effect on management in the US. Its many advocates point out that
                  ‘type Z’ companies are among the most successful and fast-growing types of businesses
                  in the US.

                  The role of the leader in a ‘learning organization’
                  The type Z theory heralded the concept of the learning organization, which itself was
                  a response to the increasing uncertainty and complexity of global business. Peter Senge,

                  offer organizations an immense, sustainable advantage in a world where competition is
                  becoming increasingly stronger. In his seminal work, The Fifth Discipline, Senge (1990: 3)
                  defines learning organizations as:

                     . . . organizations where people continually expand their capacity to create the results
                     they truly desire, where new and expansive patterns of thinking are nurtured, where
                     collective aspiration is set free, and where people are continually learning to see the
                     whole together.

                     Organizations are not, in his opinion, structured to allow people to reflect on what they
                  are doing or to become engaged in their work. People need tools and guiding ideas to cope
                  with and give real meaning to the situations they face. Senge (1990) advocates the mastery

                  see themselves not as powerless figures in the corporate landscape but as participants who
                  shape that very landscape. Rather than just coping with the present they are also helping
                  to create the future. Rather than being traditional heroes who charismatically rescue their
                  organization from a crisis, leaders of learning organizations have a more important, if less
                  flamboyant, role to play. They are essentially responsible for learning in the organization:
                  they design the learning processes, create, foster and manage a shared vision, and help

The session ‘Define your leader’, 29 January 2001, at the annual meeting of the World Economic Forum started with

●   are creatively crazy;
●   can identify people who can replace you;

Warren Bennis, professor of business administration and founding chairman of the Leadership Institute at Marshall

Concept 8.2 Leadership in an international context

                    This concept will first consider the extent to which aspects of culture can influence
                    ‘Western’ ideas of leadership before examining the question of whether there are attributes
                    of leadership that can be found in all cultures.


                     Cultural contingency factors
                    As mentioned earlier, Fiedler (1967) has had a considerable influence on leadership theory.
                    The idea that leadership effectiveness is the result of interaction between the style of the
                    leader and the characteristics of the environment is seductive.
                        However, if culture is taken explicitly into account, leaders may not be able to exercise
                    all the variables that Fiedler describes because of cultural constraints. Instead of being in a
                    position to influence the workforce and the dominant culture, they may be forced to alter
                    their own leadership behaviour to conform to the cultural realities they face. Managers
                    working in an international environment may need to take account of cultural differences
                    and adapt their style of leadership accordingly.
                        Two areas where cultural attitudes and values can obviously have a big effect on styles
                    of leadership have already been touched upon in Part One: the wielding of power and the
                    handling of uncertainty.
                        In those societies where power is more evenly distributed among the members, the differ-
                    ence between the more powerful members and the least powerful members is small. In those
                    societies where there is a wide variation in power distribution, the difference between the most
                    powerful and least powerful is large. Here, large differences in power are legitimate and accept-
                    able. Should an attempt be made to reduce the distance between the leader and the workforce
                    by increasing accessibility between the two and attempting to engender a friendly interaction,
                    the subordinates concerned may well feel uncomfortable with these changes and may indeed
                    attribute some sinister motive to the actions. In such an environment, subordinates’ expecta-
                    tions have a considerable influence on whether certain leadership behaviours are feasible. In
                    cultures where there is a large power distance, an ideal leader may well be expected to dis-
                    play great authority, but to do so to the benefit of those being led. A benevolent autocrat or
                    paternalist is not expected to ingratiate himself gratuitously with his subjects. Age, experience
                    and accumulated wisdom will account for more than the actual ability to do the job.
                        The second factor is to do with the way cultures handle uncertainty. This ties in with the
                    question of task structure as a contingency factor raised by Fiedler (1967). Cultures with strong
                    uncertainty avoidance are unwilling to take risks and to assume heavy responsibilities. In
                    the workplace they prefer to work by the book, to rely on rules, regulations and instructions.
                    They avoid ambiguities in their tasks and prefer to be told how to carry out their tasks. In
                    Fiedler’s terms, therefore, the leader may well need to show direction and make sure that
                    tasks are unambiguous and well structured.
                        What Fiedler does not address in his contingency theory is the nature of the leader who
                    is making decisions as to how best to lead. Is his own cultural profile not a contingency
                    factor that has to be taken account of? If he is himself risk-averse by nature, can he be
                    expected to lead a company to success in a competitive environment, particularly if the
                    employees in that company are similarly risk-averse?

   Inevitably, discussion turns to an individual leader in a particular company in a particu-
lar cultural context. By doing so, the focus is less on the general tendencies displayed by
a certain culture, its companies and its representatives and more on particular examples.
Evans et al. (2002) rightly warn their readers of applying a cultural perspective that only
takes account of ‘central tendencies’. The variance within a culture can, they maintain, be
as great as the variation of means across cultures. Although the authors acknowledge that
the cultural perspective offers considerable insights into attitudes towards power and
uncertainty, they recognize that culture may be used as an excuse for not trying to make
changes to ensure a company’s success. Indeed, increased sensitivity to cultural differences
may discourage attempts to get people to adapt to practices (if not values) used in other
cultures. Moreover, cultural factors do not stand alone when a company’s fortunes are
being considered. Others factors – including economic ones – need to be considered when

are considerable variations between societies with regard to their perceived effectiveness.
Using GLOBE’s country-specific investigations, Brodbeck et al. (2008) detail key differ-

  a) as an opposition to non-participative, autocratic or directive leadership (e.g. Finland,
     Argentina, France)
  b) as a legal principle to organize interactions at work between labour and capital (or
     management) manifest in societal and organizational cultural practices and values
     (e.g. Austria and other Germanic countries)
  c) as a set of personal characteristics in modern North American leadership conduct that
     surface, for example, in treating others as equals, being informal and not preoccupied

  d) as a set of communication behaviours like listening and inviting suggestions from others

  a) as a set of values and behaviours that espouse equanimity, egalitarianism and not

  b) as friendly, open, generous interpersonal conduct; in times of crisis direct and clear (in

  c) as a Confucian principle of moderation and maintaining harmonious social relationships

  d) as a traditional principle of humanity reposing faith and confidence in followers, giving

                      One question that remains when examining leadership dimensions across cultures
                  has essentially to do with the meaning of the terms used to describe aspects of leadership.
                  House et al. (2004: 727) address this issue succinctly by referring to the term ‘integrity’,
                  an attribute that is considered desirable in all the cultures studied:
                     . . . does it mean the same thing to a Chinese as it does to an American. How do people in
                     different cultures conceptualize, perceive and exhibit behaviour that reflects integrity?

                      These thoughts echo those of Bass (1997) who proposed that transformational/charismatic
                  leadership may be universal, but this does not exclude the possibility that the way trans-
                  formational attributes are expressed may differ between cultures. The concept of charisma,
                  for example, may well be shared among all cultures, but what each culture perceives as
                  charismatic behaviour may differ.
                      A further issue with regard to universal attributes of leadership is that of gender: are
                  some universal attributes more prevalent among male or female leaders?
                      One starting-point is to try to determine whether there actually are gender differences
                  in leadership. The literature on leadership and gender is mainly US-oriented and frequently
                  examines the influence gender has on aspects of leadership. Feminine leadership styles are
                  generalized as being concerned for the welfare of others, democratic and charismatic. These
                  features are related to the stereotype view of women as being warm, sensitive, considerate and
                  expressive. Masculine leadership styles are generalized as being less interpersonal-oriented
                  and more focused on the task. The stereotypical traits related include decisiveness, aggression,
                  independence and objectivity.
                      One theory frequently put forward in the literature to account for these differences is
                  based on the division of labour in the home: qualities required for domestic activities, of
                  which women take the major share, are to do with rearing children and maintaining family
                  cohesion. Men, the theory maintains, perform more tasks outside the home and require
                  qualities that enable them to survive and even thrive in a competitive environment.
                      If feminine leadership styles are different to male-oriented ones, the matter of their effec-
                  tiveness brings up the question of contingency. So many factors within an organization need
                  to be considered when determining which style of leadership is appropriate. Task-oriented
                  behaviour (as evident in transactional leadership) may be more appropriate at times, and
                  relation-oriented behaviour (as evident in transformational leadership) more appropriate
                  at others. In the same way that male leaders may need to pay more attention to interpersonal
                  skills alongside their ‘natural’ authoritative, decisive behaviour, female leaders may see
                  themselves compelled at times to perform in a task-oriented way while still practising their
                  ‘natural’ intuitive, empathic skills.
                      Gender can be regarded as just one of many social differences that play an important
                  role in the development of leadership styles. Developing an appropriate, effective style of
                  leadership may be hampered by gender stereotypes clouding the perception subordinates
                  have of what makes a successful leader. Overcoming these stereotypes, while focusing on
                  the characteristics appropriate to the position, remains key for any candidate for leadership,
                  whether male or female.

                  in the East. Different cultures, it seems, can generate similar perceptions of leadership, even
                  if the contexts within which leadership is affected are very different.



                    Conclusion

                  The concept of leadership in the West has evolved. Based originally on scientific principles,
                  it has taken on a much more human orientation, reflecting the influence of the way leaders
                  behave in Asia. There now appears to be a consensus across cultures as to what makes
                  an effective leader (including integrity, charisma, decisiveness and being team-oriented).
                  However, the way in which these attributes are expressed in actual behaviour can vary
                  considerably from culture to culture. The same applies in a way to the question of gender
                  and leadership: the differences in leadership style between males and females observed
                  in one country are also seen in other countries, but the ways in which behaviour tends to
                  reflect these differences is based more on culture than gender.

ACTIVITY 8.2

In his article entitled ‘Six country comparisons’ in Cross Cultural Management: An International
Journal (2(4): 15–23), Tony Morden (1995) compared six countries in terms of their national and
business cultures, as well as their working practices and management style. Below is a summary
of the sections devoted to each country’s management style, where reference is made specifically
to the X, Y and Z theories mentioned in Concept 8.1. Read the summary, then answer the questions
that follow.


Management styles in six countries
The Netherlands
Decision-making within a Dutch company is ‘slow, formal and deliberate’. The approach is a rational, analytical
one, whereby all those involved, including managers who are senior in rank, work together to achieve the
most effective outcome.
   The need to build consensus is uppermost. The actual formal meetings where the decisions are taken
are usually preceded by informal consultation, referred to by Morden as ‘management by walking around’
(MBWA). This reflects the emphasis on Theory Y and Z, as does the decentralized and autonomous approach
to getting the task done. Rather than being someone who prescribes action, the manager is seen as facilitat-
ing and co-ordinating action agreed upon through consensus.

Brazil
A typical organization has a strong hierarchy with control enforced from the top. Theory X is reflected
in the way that managers exercise authority and direct subordinates. Here, MBWA is used to check
that underlings are doing what they are told to do and at the same time to give fatherly reassurance.
With improved education and a developing economy, Theory Y is being applied which entails increased
responsibility.
   However, decision-making still tends to be centralized and done so on a short-term basis since economic
conditions (especially inflation rates and high dependence on global commodity markets) discourage longer
term planning.

Germany
German managers see their company as a ‘community of individual people working together’. This view is
reflected in a participative style of management that reflects the notions in Theory Z. This means that time
is needed to make decisions: procedures must be followed scrupulously and comprehensive information
gathered.
   Although consensus is regarded as important, managers are expected to ‘lead by example’. They are
expected to be decisive while drawing upon the expertise and experience of the team they are leading.
When managers delegate authority, they do so in a clearly defined manner, reflecting their own managerial
skills as well as their concern for the development of their subordinates as contributors to the organiza-
tion’s development.




                                                                                                           193
fChapter 8 Culture and leadership

Japan
Maintaining harmony within the company at all levels is reflected in the way that all those who will be
involved in implementing a decision are involved in the making of it. A proposal is circulated which is added
to and/or amended by those involved. The final version is then passed up to senior management who decide
whether or not to implement the proposal.
   Management style is ‘beyond Theory Z’. Even though hierarchy is important (and essentially based
on age and seniority), deference to it is subservient to maintaining harmony and meeting production and
quality targets. Everyone working in the company shares a communal responsibility for ensuring that the
best decisions are made and goals attained. Employees work together and each work-group is responsible
for maintaining their performance and for meeting the standards required.

South Korea
The chief executive heads a hierarchical and disciplined organization and is usually a strong figure who com-
mands great respect and wields considerable power. Such leaders are often charismatic, deeply involved in
the company as well as in civic affairs.
   Employees are regarded as a valuable asset in an environment where the chaebol are competing with
each other. Training is regarded as an integral part of business activity and required of all large companies.
   Managers need to be competitive and risk-oriented and ready to take bold decisions, but only after carefully
analysing all the relevant issues and alternatives. Approval from the top is usually required and once gained
will allow a carefully organized implementation.
   Theory X predominates through the need for authority, discipline and order.

Spain
Strategic decisions and business plans generally tend to be formulated at the top. The boss is regarded
more as the benevolent autocrat, bold in his actions while showing concern for the interest and security of
his family of employees.
   Middle managers are not involved in decision-making, not even when they have to implement what
has been decided. Meetings tend to be used more as a tool of management control rather than of com-
munication and consultation. If there is delegation, then this done for a short time-frame and with clear
instructions.
   The boss will, however, make informal use of personal contacts within the company, people who can be
trusted and who can deliver useful input.
   Theory X therefore tends to predominate, despite the personalized and humanistic facets displayed.

               Culture and corporate strategy



           Strategy is not only an element of managing organizations, it is found in all areas of man-
           agement, from marketing through human resources to communication. This chapter takes
           the concept of strategy as it is used generally in business and addresses the relationship
           – if one exists – between strategy and culture.
           Concept 9.1 addresses this issue, while Concept 9.2 attempts to explain the influence of
           culture – whether organizational or national – in strategic applications such as mergers
           and acquisitions.


           Learning outcomes
           After reading this chapter you will gain an understanding of:
           ●   The relationship between strategy and culture.
           ●   The role of national culture in the formation of company strategy.
           ●   The effect of strategy on international mergers and acquisitions.




Concept 9.1 Cultural view of strategy

           Since the 1960s, companies have been looking for strategies to use in their competitive
           environment and so help realize their objectives. The question is: what link, if any, can be
           made between strategy and culture?


            Strategy and corporate culture
           Is culture used to formulate strategy, or is it just a component of strategy? According to
           Schoenberger (1997), the relationship between company culture and strategy is closer than
           would appear. Strategy can be seen as less to do with making decisions and more to do
           with knowledge, i.e. what the organization knows or what it thinks it knows. This know-
           ledge also includes the way it interprets the world and its position in it. It is the company’s
           imagination that determines how this world could or should be. This means strategy
           undergoes the influence of culture since it is through its culture that a company creates an
           understanding of itself as well as an interpretation of the world. When this world presents
           new problems or changes, then culture devises a company’s strategic response to them.

                     If it is examined from this standpoint, strategy is a product of culture. At the same time,
                  however, since the strategic orientation of the company has in the past moulded specific
                  practices, relations and ideas, culture is also a product of strategy. Culture and strategy
                  are therefore inextricably connected. What companies need to resolve, says Schoenberger
                  (1997: 14), ‘. . . is not so much how to adapt the corporate culture to a new strategy as to
                  understand how culture produces strategy’.
                     Schneider and Barsoux (2003) also underline the relationship between culture and
                  strategy. They argue that their definition of culture – a solution to the problems of external
                  adaptation and internal integration – could also be used as the definition of strategy. The
                  process is the same: strategic decisions are made to adapt to the environment and these are
                  implanted and integrated within the company by means of human resources. The actual
                  departments where strategic plans are made, the tools, models and jargon used are simply
                  cultural artefacts. The application by management of the strategies chosen have created
                  beliefs and values, and behind these managerial practices are assumptions. But do these
                  assumptions have the same meaning in different cultures?


                   Cultural models of strategy

                  Deresky (2003) argues that most companies use strategic planning to evaluate their future
                  prospects and so decide on strategies to be taken to accomplish their objectives in the long
                  term. Although the strategic planning process is an ideal way for doing so, this does not
                  prevent decisions being influenced by the personal judgement, experience and motivation
                  of the managers who make them. This implies that a change in management can radically
                  change the eventual strategy of the company. This is what Schneider and Barsoux (2003: 122)
                  emphasize when they say:
                      Assumptions regarding internal integration are relevant to questions such as who is
                      involved and who takes the decision.

                     Furthermore, when it comes to strategic management, Schneider and Barsoux (2003)
                  divide management from different countries into two types according to their behaviours,
                  values and assumptions (concerning uncertainty, control, power, human activity and time):
                  ●   Controlling model: the departments responsible establish strategic plans and present them
                      to top management or to the board for their consideration. The company’s reports are
                      the main source of information about its environment, and these are fairly quantitative
                      and objective in nature.
                  ●   Adapting model: responsibility for strategic decisions lies with all levels of the organiza-
                      tion. The information obtained is qualitative and subjective in nature because it comes
                      from personal sources, friends and colleagues.


                   Cultural factors of strategy

                  Following the same line as the previous authors, Fatehi (1996) adds that formulating strategy
                  is not just a question of collecting information, but also deciding what is to be done with
                  it. Such decisions are in no way ‘free of human biases’ and in fact the whole process of

collecting and examining information is a perceptual one based on culture. If this is so, in
what way is the formulation of strategy affected by cultural differences?
   Fatehi (1996) suggests that two areas in particular are influenced by culture.


Relationship with the environment
To illustrate cultural differences in this area, Fatehi (1996) uses what he refers to as the
‘mental framework’ of two types of person. The first is ‘engineering-oriented’ and goes
looking for information to support a strategy (change) whereby the environment can be
altered to the benefit of the company. This orientation rests on the belief that humans
can control their surroundings. The second is ‘symbiotic-oriented’, believes in close ties
with nature and therefore looks for another, non-destructive strategy for dealing with the
environment. Fatehi (1996) refers to the fatalist beliefs of Buddhists and the conviction
amongst Muslims that events are predetermined. Both recognize the limits humans have
when trying to control their environment.


Relationships among people
Fatehi also distinguishes differences in the question of interpersonal relationships within
a company. Formulating strategy is just one of the functions of management involving
a predictable pattern of relationships. Within a certain hierarchy the reaction of a sub-
ordinate to the order of a superior will be in line with expected modes of behaviour. To show
differences in attitude among employees towards a company’s strategy, Fatehi contrasts US
and Japanese companies. The former consider possibilities of success as ‘environmental
opportunities’. They formulate their strategies in such a way that they do not have to
demand individual sacrifice of their employees. Japanese companies, on the other hand,
may demand a number of strategic choices, of which one or more could involve personal
sacrifice from their personnel. The individual employee, however, does not see this demand
as a self sacrifice since it is made for the benefit of the company.
   Trice and Beyer (1993) also take up the question of the role played by cultural factors in
corporate strategy. They too dwell on the differences between US and Japanese companies.
Although there is intense competition between the two, the way they compete is shaped by
cultural differences. Competition is inherent to US culture: companies in the US compete
fiercely for market domination. Neither the laws in place nor the managers and their way
of thinking make it easy for companies from different sectors to co-operate with each other,
not even outside the US. The Japanese culture, however, is more to do with co-operation
and harmonious relations – as was described in Part One. Nevertheless, they can be as
competitive as their US counterparts. The difference is that Japanese companies practise
competition to achieve collective goals against ‘outsiders’. This type of competition preserves
internal harmony and benefits the country as a whole.


The effect of national culture on strategy

In what way can national culture affect strategy? Not only on the choice of strategy but also
on the way it is realized. So, this is about leadership and the decision-making process. Tayeb
(2003) describes how, for example, Swedish managers spend more time making decisions

                  than their British counterparts. The British, on the other hand, require more interaction and
                  consultation with experts. Schneider and Barsoux (2003) also refer to the cultural elements
                  of decision-making: who makes the decisions, who is involved, where the decisions are taken
                  (in a formal meeting, or elsewhere). Nor should the matter of time be forgotten: how quickly
                  the decisions are made. The whole process reflects different cultural assumptions.
                      Tayeb (2003) mentions another area where national culture impinges on strategy: the pro-
                  duct and services sectors. Consumer demand for certain products will differ from country to
                  country, from region to region, and this will influence the different markets. The needs and
                  preferences of the consumers need to be taken into account when analysing the resources
                  and capacities of the organization, particularly when business overseas is concerned.
                      Finally, the question of national culture comes to the fore when a multinational has to
                  make strategic decisions about the maintenance – or otherwise – of the national culture in
                  its local subsidiaries. As Bartlett et al. (2003: 672) indicate, if a corporate strategy is used,
                  managers at headquarters will not necessarily have a clear insight into the business environ-
                  ment and the cultural differences at play in the foreign markets where the multinational
                  operates. They underline the importance of the role of the country manager in the imple-
                  mentation of company strategy. This manager is at the centre of the strategic tension between
                  defending the company’s market positions against global competitors on the one hand, and
                  satisfying the demands of the local subsidiary on the other. These demands usually include
                  meeting the requirements set by the host government, responding to the specific needs of
                  local consumers and reinforcing the company’s competitive position with local (potential)
                  resources. The country manager assumes the role of ‘cultural interpreter’ who is expected
                  to be able to give information about the national situation to ‘those whose perceptions
                  may be obscured by ethnocentric biases’. In short, it is necessary to understand the national
                  culture of the host country, to respect the local cultural norms and, at the same time, to
                  understand the corporate goals, strategies and values and communicate them effectively
                  to the local employees.


                  Implications for international managers
                  Why is it that one company succeeds in the global market and not another? Some analysts
                  claim that success is due to strategy, others say it is as a result of structure or technological
                  innovation. Black et al. (1999) argue that the key to success is the people involved. It is they
                  who formulate the strategy and implement it, it is they who create and shape the organiza-
                  tional structures and it is they who invent and use the technology.
                     In this regard, global assignments can be very important strategically for the company.
                  The managers sent from headquarters to the subsidiary abroad can not only concentrate
                  on the specific needs of the local market but can also analyse the tendencies in the global
                  market for the benefit of the whole company. By going on an international assignment, the
                  managers involved can also develop their individual knowledge and competencies, particu-
                  larly since they need to understand and work with people from another culture. As Black

Merging cultures

As Delavallée (2002) points out, an alliance between companies – whether through a
merger or a takeover – is one area where the most serious cultural problems arise. Only
a major organizational change within a company causes a similar amount of anguish
and conflict. The success or failure of an alliance is down to the human factor, not the
bottom line.
   And the human factor is all to do with how people come to terms with each other, how
the employees of two companies work together to help realize the goals of the alliance: the
cultural dimension, therefore. However, as Delavallée (2002) stresses, this is often ignored
or forgotten about. The systems that make up the organization of the two companies that
are coming together must harmonize, if not become one. The merger process involves
making a coherent whole out of the subsystems of the organization of each partner-to-be.
These subsystems comprise goals, structures, techniques and culture. The merger process,
therefore, has three levels: strategic, organizational and human.
   On the strategic level, Delavallée (2002) uses the work of Cartwright and Cooper (1993)
to explain the strategies used during company mergers. According to them, there is not just
one merger strategy but four: assimilation, deculturalization, separation and integration.
The type of merger strategy used depends on:
●   how strong the influence is of the buyer on the culture of the company being absorbed;
    and
●   the degree to which the company to be absorbed is bound to its own culture.
   Compatibility between cultures is rarely taken into account while the merger process is
under way. When the two sides are highly incompatible – a discovery often made months
later when people actually start working together – the shock can be overwhelming.
   If a merger between two national companies can lead to a culture shock when the
two teams have to work together, what can be expected when there is a merger between
companies from different countries or cultures? Furthermore, what will happen when a
manager is sent on an international assignment?


Culture shock
The notion of ‘culture shock’ refers generally to the unpleasant experience that can be
had when coming into contact with other cultures. Marx (1999) has developed a model to
describe this notion, one adapted from that of the anthropologist Oberg (1960). According
to Marx, international managers experience culture shock psychologically at three levels.
She uses what she calls the ‘culture shock triangle’ to describe these levels (Figure 9.1).
   Marx (1999) insists on the fact that the culture shock phase is an integral part of the
adaptation phase and, as such, should have no negative connotations. This is a normal
reaction of people who confront the strange, the unknown, the foreign, but who have no
indication of future success.
   However, the success – or otherwise – of a merger between companies at international
level depends not only on managers who are well prepared for this culture shock and who
have the interpersonal skills necessary. Success depends also on the motives and strategies
of the companies wishing to co-operate with or take over another firm.

marketing or on human resources?
    The merger of two companies presupposes a change of ‘culture’ in the new organization.
If, in addition, the companies are established in two different countries, the complexity
of the exchanges, of the interactions between cultures increases and gives rise to other
problems than those in a merger between two national companies. What can be observed
is an organizational situation being transformed, along with all the accompanying elements
of cultural change. A merger is by no means a simple process but a complex evolutionary
process due to the inevitable change of culture(s) involved.

Mergers and acquisitions: a strategic or cultural issue?
In this area of mergers and acquisitions, the company becomes integrated into the manage-
ment’s process of globalization and internationalization. Therefore, as Pierre (2001: 141),
emphasizes, this requires ‘a permanent adaptation of the manager’ because ‘the environ-
ment is in perpetual change and the international executives appear continuously “under
construction” through a never-ending professional maturation’.
   What are the reasons compelling companies to seek an alliance? According to the pro-
tagonists the reason is purely economic, particularly financial, whatever the sector.
   ‘Ahold looks for takeovers after 2006. Company directs focus on Europe,’ is a headline
from a financial newspaper (Het Financiele Dagblad, 1 June 2004). The article explains: ‘the
objective of the current takeovers is to reduce the imbalance in income’. Others have acted
similarly: ‘Scottish Bank makes large takeover in US. Royal Bank of Scotland (RBOS) buys
the American bank Carter One for $10.5 billion in cash. This makes RBOS the seventh-
largest American bank’ (Het Financiele Dagblad, 6 April 2004).
   What role does the cultural element play in these forms of cross-border alliance? As
mentioned before, this element is usually completely ignored when plans are being drawn
up for a merger, as well as at the start of the alliance. When KLM and Air France had just
completed their merger (to create for themselves a stronger position in the market), cultural
issues were far from their minds. This was suggested in their reactions to a question con-
cerning Easyjet’s latest results:
  Without saying it aloud, the disappointing results of Easyjet are for both parties the proof
  that they were right about their plans to merge. Problems for Easyjet? ‘We have our own
  problems to solve’, they both said, laughing.

                     It is often the case that cultural factors come to the fore only when mergers and acquisi-
                  tions do not meet strategic expectations, or necessitate a change of strategy. Even then,
                  cultural factors may not be explicitly referred to:
                     The board of directors of the British–Dutch steel company Corus has to offer, at short
