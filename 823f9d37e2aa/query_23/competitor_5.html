                     it becomes possible to reconcile differences. Why do this? Because business people aim
                     to create wealth and value, not just for themselves, but also for those who live in different
                     cultural worlds. People need to share the value of buying, selling, of joint venturing, of
                     working in partnership.

                     How does reconciliation work?
                     In essence, the process of reconciliation leads to a dynamic equilibrium between seemingly
                     opposed values, which make up a dilemma. In fact, reconciliation results in the integration
                     of values through synergy. There are many ways of achieving synergy. The first one is
                     processing, the activity in which a dilemma is made into two processes. So if the dilemma
                     is central versus decentral it has to be turned into centralizing versus decentralizing. It is
                     easier to reconcile verbs than nouns.
                         The second approach is called contextualizing. Here, one has to decide what is text
                     and what is context. For example, compare the names of two luxury hotels located in
                     Amsterdam:

                                    Le Meridien                                    AMSTEL HOTEL
                                    Apollo Hotel                                   InterContinental

                     The Apollo Hotel is a member of the Le Meridien hotel group and uses the group’s name as
                     its main logo. The Amstel Hotel uses its name in capital letters, and shows its membership
                     of the InterContinental hotels group after its name. Text and context change.

108
f                                                          Concept 5.2 Reconciling cultural dilemmas

      A third option is sequencing. You can first centralize and later decentralize. Every pro-
   cess of reconciliation is also a sequence. Finally, the process of synergizing is a way
   to reconcile. Synergizing is best explained by adding the word ‘through’ between the two
   opposite orientations. It is the answer to the question: ‘How can we increase the quality
   of our central offerings through better learning from our decentralized operations?’
      Reconciliation is preferred over other methods for dealing with cultural differences such
   as conflict, in which both parties may not benefit. Even compromise has its problems, because
   in a compromise both parties may still not get what they expected. Reconciliation permits
   both parties to maintain what is important to them, yet recognize the needs of the other.
                                                         Source: adapted from Trompenaars, 2000: 29–33.



The reconciliation process
Marion Estienne (1997) see five stages to the reconciliation process as developed by
Trompenaars. These are given in Table 5.4, as well as the methods she proposes for moving
from one stage to the next. The first mandatory stage involves the relevant parties showing
their commitment to developing their relationship. There then follows a rigorous search
for clear difference and similarities among the parties during which dialogue plays a key
role. Those involved discuss openly not only the conflict itself but also their relationship.
   The skills mentioned in Table 5.4 will be elaborated upon in later chapters, particularly
in Part Three, but these go hand-in-hand with knowledge of the cultures involved.
   As Estienne (1997) indicates, going through these stages is itself a way of developing
skills for global business. Those involved need to maintain a rapport despite all the cultural
differences encountered. The focus needs to be not on getting things done, but rather
on developing and maintaining a rapport, despite the tensions involved, which eventually
enables effective action to be undertaken by the parties involved.

fChapter 5 Cultural dimensions and dilemmas

                     The reconciliation approach opens the door to a third dimension, unblocks in some way
                  the duality of the dilemma. In an intercultural business context, recourse to reconciliation
                  may well avoid a situation ending in an impasse. Getting to know the cultural framework
                  of reference of one’s interlocutors seems to be the best way of adapting to their culture(s)
                  and their way of working. Chapter 6 offers an instrument to assist in this exploration.



                   Conclusion

                  This chapter has outlined the cultural dimensions devised by Trompenaars. These allow
                  cultures to be classified according to certain values, as expressed in the way they confront
                  dilemmas. These dimensions reflect the value-orientation concept proposed by Kluckholn
                  and Strodtbeck since they take into account the relations with others, with nature and with
                  the environment. These dimensions serve not only to distinguish national cultures, but
                  also to show how the values they reflect can affect relations in business and management.

                  The cross-cultural manager has to face dilemmas. Dilemmas are universal, but the way they
                  are resolved is determined culturally. Chapter 5 gives examples to demonstrate this point
                  as well as the means to resolve them through the principle of reconciliation. The approach
                  to dilemmas by means of reconciliation remains an interesting approach, especially since
                  it takes into account the dynamics of cultures, i.e. the interaction between the interlocutors.
                  Rather than the dimensions themselves, it is the model of reconciliation that distinguishes
                  the work of Trompenaars and Hampden-Turner from that of Hofstede.



                   Points for reflection

                  1. Many researchers in the area of cross-cultural management refer to authors whose
                     disciplines are in the field of social sciences. These researchers appear to rely more on
                     cultural theory than theories of management.
                     Why do you think this is the case?

                  2. In their response to Hofstede, Trompenaars and Hampden-Turner consider their dimen-
                     sions to be essentially ‘heuristic devices’ or speculative formulations that serve as a
                     guide for investigations into ‘family resemblances’ between cultures when faced with
                     dilemmas. Their perception of dimensions contrasts with what they term the linear nature
                     of Hofstede’s dimensions.
                     In what other ways do the two sets of dimensions differ? To what extent do they
                     resemble each other?

                  3. For cultural dilemmas in business, Trompenaars proposes the reconciliation method
                     as a way of dealing with opposing values. If the definition of ‘dilemma’ is taken as ‘a
                     situation that requires a choice between options that are or seem equally unfavourable
                     or mutually exclusive’ (www.thefreedictionary.com/dilemma), to what extent do you
                     believe the reconciliation method can be used to resolve all dilemmas?

ACTIVITY 5.1

Individual and group bonus plans: a case for reconciliation
The dilemma below explores the issue of reconciling a cultural dilemma in a business environment
(adapted from Trompenaars, 2000: 31–32).
Jeff Mate was the human resources director of an Australian company in household appliances. In the last
couple of years, Matehold had internationalized its operations. First, some activities had been transferred
to the Mid-West of the USA and some research and development work was being done in the UK because of
its excellent education system. Sales were promising, especially in the Pacific Rim markets. A subsidiary had
been set up in Japan to develop operations there.
    During an international human resources meeting, Jeff raised the question of the need for greater con-
sistency among his colleagues. In the past, the Japanese had worked in Japan and the Americans had worked
in the US. Now, however, multicultural teams were slowly being formed, with US, British, Japanese and Australian
employees working together. The US HR manager and Jeff proposed an individual incentive system worldwide
that would increase the staff’s productivity. Mr Kataki from Japan saw big difficulties in implementing the
individualized bonus system in the light of the predominantly team-oriented value system of the Japanese.
This led to a heated discussion involving all the HR directors present.
    In the evening, Jeff was asked to make a decision that would be respected by all.

Question
What would you do if you were in Jeff’s position? Choose one of the options given below. Check
your answer with your instructor.
1. I would implement the individual incentive programme. After all, everyone responds to
   individualized monetary rewards. The programme would be based on the success of the Australian
   employees who produced more effort since they had been recognized for their individual work.
   And it would improve consistency between the international operations.
2. a) I would recognize that the individual incentive programme alone would not be effective, given the
      communitarian orientation of some Asian staff.
  b) I would allow the company employees in Asia to choose a group-oriented incentive system in
     Asia and those working in the more individualistic parts of the world to choose a system based
     on individual incentives.
3. I would discuss the idea further with the HR staff, asking them to tell me what aspects of the incentive
   programme they thought would be worthwhile. I would then implement a worldwide programme in
   which one of the major individual incentives is based on how people support the group.
4. I would introduce a consistent plan worldwide that rewards the group, but which makes the team
   responsible for looking after individuals either who do not optimally support the group’s production
   goals or who support individual inventiveness.

Expatriate’s first job in Switzerland
Marcus, an American whose parents had been born in India, arrived in Zurich with his Swiss wife. They were
both excited about starting a new chapter in their life together. After spending four years in San Diego, they
were keen for a change, although Marcus had mixed feelings about job prospects for himself in Switzerland.
Four months into their new environment they were elated when Marcus found a challenging new position
at Kraft Jacobs Suchard, managing its international assignments programme.
    Though this was now a US company (Jacobs Suchard having been acquired three years before) and quite
a few expatriates of varying backgrounds worked in the Zurich regional head office where Marcus was
posted, there were nevertheless some strong Swiss work attitudes that pervaded the work environment,
much to the confusion and chagrin of Marcus.
    One area of confusion and some conflict had to do with teamwork and the boundaries of job descriptions.
A newcomer to a function or a department, as Marcus was, will have a rather steep learning curve for the
first few months on the job. From this perspective, Marcus presumed that his new Swiss colleague Heidi
would help with the vast amount of learning that he faced, particularly as there was no formal training
for this posting. This was a natural assumption given that this is what he had experienced in various jobs
in the US.
    However, this was not to be the case in Zurich. Although Heidi did lend some assistance to Marcus (by
telling him, for instance, when she normally had lunch), she made it plain that she considered giving any
sort of training to Marcus to be beyond her job description. And she stuck to this position adamantly. This
left Marcus in a quandary. How could he gain the knowledge he needed to be effective in this new job?
    Another point of contention was overtime. Since the Zurich regional head office was in frequent contact
with the head office in New York, Zurich staff had to stay later because of the time difference (Zurich is
seven hours ahead of New York). During Marcus’ interviews for the position, it was made clear that overtime
would be required because of this time difference. Marcus did not feel this was unusual for someone in a
salaried position, particularly since he had had similar experience dealing with different time zones when
working in the US. Heidi, however, did not feel the same way. Her work responsibilities, she felt, ended at 5pm,
prompt. Naturally, this left Marcus having to deal most evenings with the less uptight (relatively speaking of
course) New Yorkers.
    But was this fair? And how could Marcus achieve a more equitable work balance while at the same time
build a working relationship with Heidi, whose knowledge he needed to become proficient in his job?

           In this chapter cultural values are presented that have been extracted from the dimensions
           examined in earlier chapters. These values are each characterized in bipolar terms and
           their influence on everyday business activities discussed.

           The cultural values are presented as a model of culture that the reader will be asked to

           Learning outcomes
           After reading this chapter you should:

           ●   Gain a clearer appreciation of the effect cultural values have on the way managers work.
           ●   Understand how a number of management practices are shaped according to the

Concept 6.1 Management tasks and cultural values

           There are many managerial activities performed across all societies on which cultural
           values have a considerable effect. The activities chosen below will be discussed in the light
           of cultural values.


           Management tasks

           The following management tasks and Table 6.1 to 6.8 are based on material in the participant
           workbook of Doing Business Internationally (1992):
           1. Planning. This has to do with how the goals and objectives of a company or department
              are established, as well as determining what actions are needed to achieve them.
           2. Organizing. This is a big responsibility of managers. They need to decide how the work
              involved is to be divided up and how it is to be co-ordinated. The use of the resources
              involved also requires careful organization to ensure effectiveness and efficiency.

3. Staffing. The task of allocating employees to particular positions within a company is
   demanding, is hiring suitable employees for particular responsibilities. Consideration
   must also be given to they show for enabling people to fulfil their potential within the
   company.
4. Directing. This has to do with leading the organization and its employees towards its
   goals. How do managers relate to the employees, how they do they communicate with

5. Controlling. Monitoring the performance of a company or department is a task for

of other scholars, Hall in particular, whose ideas on time, space and communication have

                  1. Time focus (monochronic and polychronic)
                  Time is related to the rhythm of nature. Different cultures have different perceptions of
                  time according to their environment, history, traditions and general practices. Time, there-
                  fore, is one of the fundamentals on which all cultures rest and around which all activities
                  revolve.
                     Hall and Hall (1990) analyse differences in time systems among cultures. These authors
                  distinguish two prominent time systems of particular relevance to management: monochronic
                  and polychronic. In cultures where a monochronic perception of time prevails, time is
                  experienced and used in a linear way. People tend to do one activity at a time and dislike
                  having to move away from a schedule. They are more focused on information than people,
                  and their relations with others may suffer because they do not fit into the schedule of
                  things to be done. In cultures where polychronic time is preferred, people tend to focus on
                  several tasks and are less dependent on detailed information when performing these tasks.
                  Schedules, if kept, are much more approximate and may be changed at any time. What is
                  more important is involvement with other people – they take priority over schedules. That
                  explains why polychronic cultures may well have problems respecting timings within the
                  working environment.

2. Time orientation (past, present and future)
Cultures focused on the past value the upholding of tradition. Changes and plans are made
according to whether or not they are in line with the history of the company and the way
it usually does things. Those cultures concerned with the present are out for quick results
and short-term gain. Those with a view towards the future are more likely to give up short-
term gains when there is the prospect of more substantial long-term benefits. Any changes
or plans are therefore assessed in the light of expected future benefit.

                     Hall and Hall (1990) emphasize the importance of knowing which parts of the time
                  frame are given prominence in which areas of the world. They see that countries in the Far
                  East, as well as India and Iran, have cultures oriented towards the past. On the American
                  continent, however, they consider the culture of the urban US to be more oriented towards
                  the present and short-term future, while the cultures of Latin America, are both past and
                  present-oriented.
                     These differences in values (Table 6.2) can be perceived in many activities, particu-
                  larly when it comes to negotiations. Those who are ‘past-oriented’ may be more intent
                  on compensating for previous losses or regaining past successes rather than aiming for
                  a resolution that all those involved find acceptable. Plans for the future will tend to be
                  based on past experiences rather than expectations whereby employees are entrusted with
                  responsibility for what happens in the future.

                  3. Power (hierarchy and equality)
                  The power value orientation is to do with the extent to which the less powerful members
                  of a society expect and accept that power is distributed unequally. As Mead indicates
                  (1994: 66) it is in this area that a culture shows the extent to which it ‘tolerates and fosters
                  pecking orders, and how actively members try to reduce them’.
                     In some cultures, inequality is a given and no attempt is made to make any compensa-
                  tions on a socio-economic level for intellectual or physical inequalities. In other cultures,
                  inequality is regarded as undesirable, necessitating some form of correction through legal,
                  political and economic means.

5. Action (activity: doing and being)
Kluckholn and Strodtbeck (1961) place ‘activity’ in their value orientation system
because they consider this to be one of the universal human problems. They see every
method of human expression as resulting in some form of activity (not in the active or
passive sense) which, in turn, shows a preference towards a ‘being’ or ‘doing’ orientation
(Table 6.5).
   If the orientation is towards being, then this is ‘a spontaneous expression of what is
conceived to be “given” in the human personality’. The ‘doing’ orientation, on the other
hand, prefers ‘a kind of activity which results in accomplishments that are measurable by
standards conceived to be external to the acting individual’.
   The stress in ‘doing’ cultures is placed on action and achieving personal goals. Prime
motivators are recognition of achievement and promotion. In ‘being’ cultures, the stress
is placed on working for the moment and living the experience rather than achievement
itself. The prime motivator is the promise of future rewards while maintaining social
harmony.

8. Structure (individualism and collectivism)
The term ‘structure’ refers to a social structure or, in business terms, an organizational
structure, which allows management to distinguish uncertain situations, ambiguity, stress
and risk (Table 6.8). This particular value orientation concerns the relation between the
individual and the group.
    According to Kluckholn and Strodtbeck (1961), individualism shows the extent to which
cultures elevate the role of the individual over the role of the group. When individualism
is valued, the ‘I’ predominates over the ‘We’. Individual goals, initiative and achievement are
most important and people are encouraged to be independent and self-reliant. There is less
need to conform to a group and less distinction made between in-groups and out-groups.
Individuals frequently acquire and change their friends and do not hesitate to establish pre-
ferred relationships among family relatives.
    Collectivism shows the extent to which the interests of the group prevail over individual
interests. Each person in a collectivist society is encouraged to conform, to do what is best
for the group and to avoid expressing opinions or beliefs that go against it. Reluctance to
co-operate within the group or eagerness to stand out is frowned upon. Clearer distinctions
are made between in-groups and out-groups. Relationships are more constant both within
and outside the family.

Concept 6.2 Other views on values

                   The previous concept outlined the cultural values and the way they are reflected in
                   management. Values are what people essentially share in a particular culture, what helps
                   them co-exist. Hofstede (1991) emphasizes their durability, as does Trompenaars. The
                   latter’s dilemma approach, however, acknowledges that in dealing with foreign cultures
                   it may be necessary to talk of reconciliation whereby the parties involved recognize each
                   other’s needs while maintaining their own values. As seen in Chapter 5, this process may,
                   according to Trompenaars, entail the development of a third dimension in which the
                   values of the parties concerned are integrated through close synergy. This is a much more
                   productive way of addressing the either/or nature of a cultural dilemma than trying to
                   resolve it through making weak compromises.
                      This idea of integrating values is much less clear-cut in nature than that of trying to
                   find a trade-off of values during cultural collisions. The complex and unpredictable nature
                   of this integration process, however, seems to reflect much more faithfully the nature of
                   present-day international business and the increasing interdependence between countries
                   and business sectors across the globe.
                      This interdependence between cultures has led some cross-cultural scholars to question
                   the stability of cultures generally and cultural values in particular. Søderberg and Holden

(2002), for example, refer to a recent dynamic approach to the way culture is conceptualized
in terms of relations between people rather than in terms of stable sets of values. The cultural
identity of people is determined by the context:

   This relational approach to culture and to cultural complexity and the idea of cultural
   complexity suggest that every individual embodies a unique combination of personal, cul-
   tural and social experiences, and thus that ultimately any communication and negotiation
   is intercultural.
                                                             Søderberg and Holden, 2002: 112

The consequence of this standpoint is that making a standard cultural profile is impos-
sible because it ultimately reflects only constructs based on ‘the practitioners’ and the
researchers’ own cultural thought patterns, and the concepts and categories to which they
are socialized.
   Increasing consideration is therefore being given to the notion of culture as a sharing
of ‘patterns of meaning and interpretation’ (Søderberg and Holden, 2002: 112) resulting
from interaction with others. Rather than there being stable cultural communities, there
are groups sharing such patterns who, when interacting with others whose patterns they
can identify with, may take them on board, be it in adapted form, and/or negotiate a shared
meaning and interpretation.
   Managers who are involved in globalization may relate to this concept much more
readily than to the fixed dimensions of culture as described in Part One. They will see
their role as more to do with ensuring that the interaction within multicultural teams
is effective and reaping synergetic rewards. Rather than being a matter of dealing with
cultures in isolation, their work is ‘the management of multiple cultures’ (Søderberg and
Holden, 2002: 110), thereby ensuring that ‘knowledge, values and experience are trans-
ferred into multicultural domains of implementation’ (page 113).
   Earley (2006) is another scholar who sees the concept of culture as being related to the
context, to interaction with others. He is adamant about wanting to avoid what he calls
the ‘cultural quagmire’ of the cultural dimension construct whereby cultural values are an
aggregate of individual perceptions and therefore contradict the construct itself (page 924).
‘Culture’, Earley claims, ‘is not a value or set of values; culture is the meaning which we
attach to aspects of the world around us’ (page 925). Values as culture remains what Earley
calls the ‘obsession’ of cross-cultural research. They should, he maintains, be more focused
on meaning as culture. Values are only one element allowing meaning to be attached to
the environment. Rather than developing even more value-based classifications on a grand
scale, he proposes (more) research based on the concept of culture as a psychological
construct whereby an individual is subject to a number of influences. Earley shows how
this ties in with a definition of culture made by Rohner (1984: 119–120):

   The totality of equivalent and complementary learned meanings maintained by a human
   population, or by identifiable segments of the population, and transmitted from one
   generation to the next.

   What is needed, Earley says, is the development of theories and framework that ‘link
culture to action’, which can be used to understand ‘the linkage among cultures, percep-
tions, actions, organizations, structures, etc.’ (Earley, 2006: 928). At the heart of this lies
the individual, not societies and their ‘average tendencies’ (the term used by Hofstede to
describe the nature of cultural dimension scores).

                   Conclusion

                  This chapter has shown the link between theory and practice. Definitions based on research
                  in the field of culture and management have enabled a model of culture to be developed.
                  This model has been applied to the world of international business and the daily tasks of
                  a manager examined in terms of cultural values. The assumption underlying this study is
                  that an individual’s framework of cultural preferences influences the way in which their
                  tasks are executed. The case given in Activity 6.1 will demonstrate this influence.
                  Such cultural models, however, may well be too constrictive in nature, particularly when
                  applied to management. By giving the viewpoints of several writers who question the
                  validity of such models, this chapter has given its readers food for thought concerning
                  the application of cultural values to management behaviour, particularly since they do not
                  take account of what may happen when (different) cultures interact.

ACTIVITY 6.1

Read the case study below, based on the experiences of Larry Zeenny in the Lebanon. It concerns a
football agent’s attempt to make a deal for his client. When you have read it, answer the questions
that follow.

An own goal
The taxi arrived at the impressive mansion in Faqra and I made my way through the blistering sun towards
the entrance. I was met by two servants and directed to Mr. Haider’s room. He had faxed me a contract, the
terms of which were ridiculously low, and I was determined to get a better deal for my client.
    A peek at my watch revealed it was 11.30. I’d arrived just in time, despite the flight delays at Frankfurt and
the queues at Beirut airport. In front of Haider’s door I cleared my throat, tightened my tie, gathered all
my courage and entered the room. ‘Mr. Haider, I am delighted to meet you’, I said, rather too exuberantly.
‘Ahlan Wilhelm, welcome my friend,’ said Haider. ‘I just have to say goodbye to my important visitors. Please
make yourself at home while you’re waiting.’
    A servant led me to a large room where there were two men and, in the far corner, a beautiful oriental
woman. I sat down in a chair and waited for Mr. Haider. An elaborate clock chimed twelve, but there was still
no sign of him. By now the other three were thoroughly enjoying their lunch, which I had refused out of
politeness. To keep my nerves steady I had only accepted a glass of arak. By 12.15 my patience had started
to desert me. I was going to be too late for my next meeting. How could I trust Mr. Haider if he had already
broken his promise beforehand?
    Eventually, at 12.30, Mr. Haider entered the room. He looked extremely relaxed in his traditional dress and
I jumped up to greet him. Before approaching me he first kissed both men and had a brief conversation with
the woman. I had prepared myself well for this moment. I gave him a firm handshake and seated myself.
    ‘Ahlan Wilhelm, welcome to Lebanon,’ he said. Looking at the table, he added: ‘I hope you enjoyed your
delicious lunch with my beloved sons, Alain and Elie, and of course with my habibi, Charlotte.’
    ‘Mr. Haider,’ I replied, ‘Thank you for your warm reception, but I ate on the plane. My client is extremely
pleased about your interest and he is looking forward to playing for such an illustrious club as Al Ansar. Shall
we come to terms as quickly as possible so we can finalize this matter in the best interest of both parties?’
    ‘Shouf Wilhelm,’ he retorted. ‘Please call me Hashem. But why the rush? We have the time for business
until the sun walks out on us! When will your client arrive?’
    I told him that my client, a goalkeeper who had played for German, Italian and British teams, as well as
for his home country, Denmark, would be unable to attend the negotiations. ‘The thing is . . .’ (I hesitated: how
could I call him by his first name and show my total respect?) ‘It’s usual for a player to leave such dealings
to his agent.’
    Mr. Haider seemed disgruntled, but agreed to talk. He called his two sons over while his wife quietly

The role of the manager
André Laurent (1983) carried out investigations into the attitudes of managers in several countries towards
their organization. A series of studies he made concerning national differences in concepts of management
produced interesting results. Over a period of two years, questions were put to experienced international
managers attending executive programmes at an international business school. The findings showed clear
differences between countries with regard to the perception of organizations as political systems, authority
systems, role-formalization systems and hierarchical relationship systems.
   The study was replicated among much younger and less experienced MBA students and, in two multi-
national companies, one being a US-based chemical firm with subsidiaries in France, Germany and Great
Britain, and later in amended form to another multinational. The results from the replications were essentially
the same as those from the first survey among executive programme participants. Although it might have
been expected for those working in multinationals to have undergone some kind of homogenizing effect in
terms of managerial concepts, the results showed a surprising stability. Moreover, the results from the first
multinational surveyed showed respondents’ concepts to be even more entrenched.

Developing cross-cultural effectiveness
The concepts presented in Part One have allowed a framework of reflection and knowledge to be developed
about national cultures and businesses cultures. Part One has also shown how close the relations are
between culture and management.

Such insights are essential for working and succeeding in an environment different to one’s own. However,
it is not enough to learn the different styles of doing business inherent to certain culture(s). International
managers also need to develop personal capabilities, particularly cultural analysis skills which will enable
them to operate effectively in a variety of cultural contexts.


Learning outcomes
After completing this activity, you will be able to:

●   Analyse the effect of cultural variables in business and management practices.
●   Adapt business skills to work across different cultures.


INTRODUCTION
There are three steps in developing cross-cultural effectiveness (Doing Business Internationally, 1992: 2.32):

●   Step one: Self-awareness: gaining insight into your own culture. It is necessary to analyse yourself, to
    discover your own style with respect to the eight cultural variables in Chapter 6, Figure 6.1: A model of
    culture.
●   Step two: Cross-cultural understanding: understanding the culture of others. Acquiring knowledge and
    understanding of the national culture and the business culture of the society or country in question is a
    requirement, as is insight into its preferences in terms of the cultural variables given in ‘A model of culture’
    (Figure 6.1).
●   Step three: Adapting your professional skills to the culture and working style of the society or country in
    question. Account needs to be taken of both the preferences within each cultural variable and the effect
    of these variables on working styles. Furthermore, strategies need to be established to enable a manager
    to succeed in the country in question.

Before doing Step three, read the example below. This text explains differences between the Netherlands
and Japan in terms of cultural values regarding management tasks (1) and the strategies needed (2) for the
launching of a new product.

Planning
1 Differences in cultural values regarding management tasks
Japanese customer relationships are based on trust and long-term perspectives. When the introduction of
a product in this market is being planned, it is necessary to exercise patience: time is needed to build rela-
tionships and this has to be taken into account when sales targets and market share objectives are being
established. The marketing plan needs to emphasize long-term relationship building. The planning should
be schedule-driven, but not with too many detailed instructions. On the other hand, the goals and objectives
set should be very detailed and quantifiable, and accepted as a shared objective by all involved.




                                                                                                            137
fPart One Final activity A1.1

2 Management strategies
As manager, one should have concrete ideas on what the plan has to be. Top-down planning is expected.
Plans should be challenging to motivate sales people. If the Dutch approach was used, and employees were
allowed the room to discuss and participate in the planning, the Japanese would set very conservative goals
to avoid risk. The initiative clearly has to come from the manager.

Organizing
1 Differences in cultural values regarding management tasks
Once staff have been hired, they need to be organized: tasks need to be allocated, geographical areas assigned
and a reporting structure put in place. Japanese people are used to a relatively strong hierarchical structure.
Since informal and casual management communication is characteristic of the Dutch, the expected flexibility
in an organization will therefore be lacking. Procedures and protocols will need to be followed if goals are
to be achieved in the long run.
   In contrast to the focused, step-by-step approach to planning, where adherence to time schedules is very
important, the task does not need to be specified in such great detail. Relationships rather than detailed plans
are more important for selling the product. Tasks will nevertheless need to be clearly assigned to a specific
person or a team. If there is any ambiguity, people will react defensively.

2 Management strategies
The assignment of specific customers to specific, reliable salespeople could be of crucial importance. Each
salesperson or sales-team needs to be the right ‘fit’ for the customers concerned, so that the best possible
relationships can be built.

Staffing
1 Differences in cultural values regarding management tasks
Bearing in mind the above-mentioned emphasis on building long-term relationships, people should be hired
who have the social skills required. For a product launch in Japan to be successful, local sales and marketing
people who are reliable and trustworthy need to be recruited.

2 Management strategies
To motivate employees, a manager should show that he takes care of their interests. To ensure their
co-operation, he needs to apply a system of seniority that employees will accept. Salaries can be lower
than in the Netherlands (owing to differences in Japanese living standards), but achievements should be
rewarded with bonuses. Training is to be initiated by the manager although the score on competitiveness
would suggest differently.

Directing (Leading)
1 Differences in cultural values regarding management tasks
Japanese sales employees are used to strong directive control and detailed instructions on how to proceed.
Absence of this directive attitude or a sudden casual form of management can confuse employees, cause
uncertainty and lead to undesirable behaviour.
   Marketing people familiar with the local market can avoid cultural mistakes in communication about the
product. However, since the Japanese are not used to participative management, they should be instructed
carefully as to the expectations of the Dutch management. If an idea is put forward, it may well be accepted
because the Japanese are reluctant to show their disagreement and cause possible conflict. As a result, the
wrong ideas can end up being taken on board.

2 Management strategies
Group coherence is very important in the Japanese culture and therefore the best results probably will be
achieved if this value is applied. This can be done, for example, by making the group responsible for meeting
sales targets.
   Again, time based management is expected and therefore the Dutch manager should adapt his directives
accordingly.

Controlling
1 Differences in cultural values regarding management tasks
Conflicts must be resolved before work can progress. That means that, whenever a deviation to the plan
has been observed, the feedback given should be carefully communicated, preferably in an indirect way.
Japanese people are used to security in their job through lifetime employment. Any corrective measures
should therefore be carefully considered.

2 Management strategies
Strategies should involve building good relationships with employees.

Galderma – a case study
An empirical study of cross-cultural relations between French, German and British
managers in an international company

By M.-J. Browaeys, R.L. Price and C.R. Seifert
Working paper, Nyenrode University Press

1. INTRODUCTION
In the light of continuing European integration – economic and otherwise – the aim of the investigation was to gain insight into
how three dominant members of the present-day European Union – the German, French and British – cope with each other’s
cultural differences when working together. The starting-point was one company in which the three cultures mentioned
were working together, and had been doing so since the company came into being. It was hoped that the results of the
investigations, outlined below, would lead to a framework that could be used when examining other companies operating
internationally.

140
f                                                                                               Part One Final activity A1.2

2. GALDERMA INTERNATIONAL
Galderma International is the first co-operative venture between L’Oréal and Nestlé. Started in 1981, it is an international
company selling skin preparations and products to dermatologists on the world market. The company’s initial range of
products consisted of those produced by Alcon, Nestlé’s US subsidiary, and those developed by L’Oréal. As well as having
research and development centres in France, the US and Japan, Galderma produces products at its plants in France and
Canada. Galderma’s parent company is in Switzerland, with corporate services in Paris. Galderma employs 2,300 people
in 33 fully owned subsidiaries worldwide. Among its European subsidiaries are those in France, Germany and the UK.
    The management of the holding company is staffed by several nationalities, as is the laboratory. The interviews
carried out by the researchers (who each represented one of the three cultures under investigation) took place at the
Paris headquarters, at the R&amp;D Centre at the technology park of Sophia Antipolis near Nice in southern France, and at
the German subsidiary. In Paris, the chief executive (président-directeur général) of the company was interviewed, as well
as all members of the board of management. In Nice, all those people in managerial positions were interviewed, with one
exception; in Germany, the director and product portfolio manager. In total, thirteen managers were interviewed.


3. INTERVIEW METHOD
The interviews revolved around open-ended questions about how the managers in question interacted with managers
from other nations within their specific working environment. In particular, they were asked to give their perceptions of
the two other cultures involved in the research and to give their own perceptions of their own cultures in the eyes of the
other cultures.
    The interviewees were not asked a standard list of questions, although a number of basic questions were composed
beforehand to serve as a framework for each interview. The interviews were carried out in the interviewee’s native tongue
in such a way that the experiences of the subjects were drawn upon to a maximum, with minimum influence from the
interviewers as to the nature of the answers given.
    The responses were then considered, reflected upon and analysed by the interviewers, each of whom represented one
of the three cultures in question. During this stage of the research, the interaction of the differing perceptions relating
to the researchers’ cultural backgrounds acted as a control on the subjectivity of the final analysis.


4. THE MANAGERS IN QUESTION

4.1. Their background
All the managers interviewed had undergone a university education in science and/or management studies, part or all of
which had been taken abroad. They had all worked outside their home country before coming to work at Galderma. The
majority of them had worked in two foreign countries, one of which was the US, one in Europe. All had English as their
native or second tongue.


4.2. Their perception of other cultures
During the interviews the various nationalities present in the managers’ working environment came up for discussion. The
comments that the interviewees made are given below, arranged in terms of the particular cultural aspects touched upon.

a) The French view of the British
All the French managers interviewed in the company commented on how the British communicate. The comments ranged
from ‘their soft expression’ through ‘they don’t always say what they mean’ to ‘you have to decode what they say’. These
comments applied to situations where the code of communication was English or French. Some remarks focused specifically
on the communicative behaviour of the British when operating in English. One particular comment reflects the tenor of
others given: ‘They tend to bring considerable nuance to their expression, which frequently begs the question: “What are
you trying to say exactly?” ’
    This behaviour led one of the French interviewees to say that it was sometimes necessary to treat the British in a
gingerly fashion, to use kid gloves, to be less direct in communication with them than they would wish. If criticism had to
be given or disagreement expressed, the interviewee felt obliged to be very careful in finding a form that would not cause
the British to feel too offended.

                                                                                                                        141
fPart One Final activity A1.2

    Another interviewee concluded that there was a general lack of understanding between the two nations. Deep in the
collective unconsciousness of the French, he said, there was an incomprehension of the British that has to do with
the feeling that they still remain the traditional enemy of the French, despite ‘ententes cordiales’, ‘rapprochement’ and
other diplomatic manoeuvres.
    Most interviewees commented on the need for the British to make their presence felt, to be regarded as important
within the company. ‘They enjoy a position of power and enjoy reminding others of the power they possess,’ was one
typical comment. One interviewee talked of their wish to ‘recreate the world’, i.e. the tendency to fantasize about how
the department/company/country/world would be like if they had total control. This was something they tended to do
in the company of other Anglo-Saxons when drinking in a lo</span><span data-dcnode-id="133" instrument_node="">cal bar after finishing work. Several interviewees described
the behaviour of the British in the company as fanfaron, which implies that they display a certain boastfulness when talk-
ing of their role in the company.
    As for their general effectiveness in the company’s operations, the general impression drawn from the interviews was
not positive. Several informants made the point that, although they may be effective in helping to determine policies,
they lack effectiveness when carrying them out. One person talked of how her English colleague preferred to delegate
implementation of a policy if it was likely to meet resistance among members of the department. Another talked of a lack
of courage in seeing matters through. He talked of a lack of rigueur – the British being ‘wishy-washy’, either because they
did not know what they really wanted, or because they were afraid to commit themselves to an action or decision that
might later rebound on them. Another interviewee went further by saying that the British were known to have gone back
on decisions they made or supported earlier. This view was contested by another informant who maintained that if the
Brits made a ‘gentleman’s agreement’, they always stuck to it.
    Comments made by three interviewees on the British attitude to work shed further light on the question of the general
effectiveness of the British in the company. One said bluntly: ‘They don’t work’; another said they were not travailleur;
another: ‘They stop work at 4pm’ (the French tendency being to work until 6–7pm). All three were positive about the
essential friendliness of their British colleagues, but essentially wished they would talk less and work more.
    Another aspect concerning working with colleagues is highlighted by two comments on the difficulty the British have in
dealing with female colleagues. The Brits, they maintained, were not used to dealing with women who occupied a similar
position to themselves in the hierarchy, and have even greater problems with women who are above them.
    One interviewee summed up his experiences with the British by saying that they were not international, but rather
members of an exotic island race that just went its own way – on the left-hand side of the road!

b) The British view of the French
A common thread in all the comments given by the British interlocutors was the bureaucratic administration of the French.
The headquarters of Galderma as well as the laboratory are situated in France, and both are subject to French law. The
criticisms relate to the bureaucratic nature of public employees in civil administration and the health sector in particular.
    For one informant, the battle with French bureaucracy is the focus of his activities with the company, although he is
rarely in face-to-face contact with the bureaucrats themselves. Instead, he devises strategies to outsmart his adversaries,
and uses French nationals to carry them out. A number of informants referred to their experiences with bureaucracy
elsewhere in the world and conceded that the problems they had undergone or were undergoing in France caused no
particular irritations.
    In relation to the above, one informant talked of the ‘bloody-mindedness’ of the French, another of their individualistic
nature. The former explained that this had to do with excelling within a very rigid hierarchical system; the latter explained
that working together with others was not a particular strength of the French. He attributed this to the fact that, unlike
the British, the French did not have sport as part of their school curriculum. ‘Sport encourages team-play,’ he added, ‘and
this is something which the British are good at doing.’
    The same two informants talked about dealing with the French at meetings. Although both considered themselves
proficient in the French language, there were times, they admitted, when it was more convenient for them to go into Eng-

the English language was something only native speakers of English could use, and something the French colleagues
could neither use nor appreciate. The result was, they admitted, occasional miscommunication and misunderstanding.
    A further informant, who said he made a point of speaking in French at all times, found that the French could display
strong emotions at such meetings: one moment they were ‘up in the air’, the next they were calm. This ‘roller-coaster’ of

c) How the British think the French see them – and vice versa
Not all respondents were able to deal with this area, preferring instead to talk in terms of personalities. One manager,
however, did make remarks concerning the French view of the British. The French, he said, tend to think of the British
as being rather pragmatic in their ideas – they prefer the concrete to the ‘airy-fairy’. This point was pursued by another

French a much more suitable language for discussing more abstract matters than English. A third manager thought
his French colleagues found him rather phlegmatic. While they expressed their opinions/feelings in no uncertain terms,
he tended to hold himself back.

of Britain in the EU. ‘They were scandalized by my open criticism,’ he said, adding that he felt the British thought he was
being much too outspoken. Moving on, he talked of certain prejudices the British have towards the French – ‘a certain
envy’ was how he put it, particularly of the lifestyle they lead.

d) The French view of the Germans
Two contrasting views appeared to predominate in the company, one based on the stereotype image of the Germans, the
other on the presence of one German manager who was seen as the very opposite.
    The stereotype image is reflected in comments such as ‘their authoritarian character’, ‘their pride in themselves’, ‘their
rigidity’, ‘their imperious nature’, ‘their monolithic presence’. Despite these remarks, there was a general feeling, expressed
and implied, that working with the Germans was not too unpleasant an experience. This is based on comments such as ‘they
may be somewhat rule-bound, but at least they are easier to understand (than the British)’, ‘You can count on them, even if
they are rather direct’. ‘My contacts with the Germans may not have been very warm, but at least they get things done.’
    Several respondents raised the matter of lack of warmth in day-to-day contact. One manager commented on the tone
of voice used by the Germans as being sometimes unpleasant. She referred in particular to requests which a German
manager makes in French on the phone. These tended to sound more like orders, particularly with the more direct modal
forms being used. The same respondent said this would be bearable were it not for the lack of ‘chit-chat’ preceding the
request. The expectation on the French side is therefore that the channel of communication be carefully prepared. If not,
the imperative nature of the request is all the stronger.
    One particular feature of the Germans that received some attention in the interviews was their very careful approach
to business, careful both in the sense of being very precise and accurate, as well as in the sense of being conservative,
reluctant to take risks. One interviewee gave a concrete example of this behaviour in relation to the sales forecasts of the
German subsidiary for one particular product. He said the subsidiary had been told to sell this product, although the Germans
had doubts about its potential success as a result of their own marketing research. Their reservations were clearly expressed
in the low sales forecast for this product they sent to headquarters. ‘When actual sales turned out to be ten times the
number forecast,’ he added, ‘the Germans were delighted and proud to have achieved such wonderful sales figures!’
    The interviewee in question called such conservative forecasting ‘sandbagging’, thus implying that the Germans were
prepared for the worst by presenting such modest sales forecasts. This sort of behaviour naturally put the Germans in a
good light, he said somewhat scornfully, when the estimated and actual sales were compared at headquarters. The down-
side, however, was the fact that the German subsidiary ran out of stock after a while, and could not meet demand.
    This essential prudence, as it was called, contrasted strongly with what the same informant called the French pre-
ference for ‘bold strokes’. Several other managers talked admiringly about the German ‘Gründlichkeit’, but at the same

family-oriented makes it difficult to integrate. The less disciplined ways of the French were also commented on – the lack
of punctuality was appealing to one, more of an irritation to another. One German commented on the influential role of
the French Grandes Ecoles and the preponderance of their graduates in top management not so much on the basis
of merit, more as a result of their simply being graduates of these schools.

f) The British view of the Germans
The views expressed by the French on the contrasting German images were frequently reflected in the observations made
by the British managers. One manager, when talking about his German colleague said: ‘X is the exception to the rule’ –
and went on to give the stereotype image of the Germans as portrayed by John Cleese, the British comedy actor who has
portrayed the Germans as goose-stepping, authoritarian, Hitleresque figures. Other descriptions of the typical German
were: ‘the regimented, inflexible type’, ‘the worker who goes by the book – if it’s not in there, he doesn’t know what to do’.
    In line with the French observations made earlier, two managers talked of the immense effort made by the Germans
to integrate. One said that despite all these efforts, X is still perceived as being Germanic in character; the other said that
Y was pursuing with some success an ‘affiliatory style of management’.
    One gut reaction made to the question concerning Germans and their colleagues in general was: ‘The French do not
like the Germans.’

g) The German view of the British
One interviewee expressed exasperation with the British. They were seen as great fun to be with – their social lifestyle and
sense of humour being very enjoyable. They were masters of communication in their own tongue, and it was fascinating
to see how they used their language to such great effect. On the other hand, on the basis of experiences with the British
subsidiary, it was not always possible to rely on them. The managers there, he remarked, were extremely co-operative
and ‘promised you heaven’, but the realization of these promises depended on others who lacked the same commitment.
Promises were therefore not always kept. Moreover, their skill in English was frequently used to conceal their real thoughts, so
it was occasionally necessary to read between the lines to get at what they were really thinking. A very difficult task.


5. PERCEPTIONS OF THE MANAGERS: SOME CONCLUSIONS

5.1. The cultures remain
The responses to the questions and reflections upon them lead to a conclusion that, whatever insights they have dis-
played concerning themselves and their international colleagues, the interviewees remain essentially French, German
and British.
   This is an obvious conclusion, perhaps, but one that counters the comments of a number of those interviewed.
One proclaimed: ‘I’m a European’; another (French) interviewee stated: ‘There are no French’; a third remarked: ‘There
are no differences between cultures; it’s only a question of personality.’ Such comments are not necessarily a denial of
the culture in question, but more, we believe, a wish to show that the interviewee is able to exist, even flourish, in another
culture and is not being dragged down by the ballast of his/her own culture.

5.2. Cultural sensitivity

●   to what extent is the interviewee aware of the cultural background of the colleagues with whom (s)he is dealing?
●   to what extent is the interviewee aware of his/her own cultural background?

7. THE FOUR CATEGORIES
7.1. Definitions and comments
The four categories defined below correspond to the four quadrants on the graph in Figure A1.2.2.

Category 1
   People who have given little or no reflection to their own culture and therefore have minimal knowledge or aware-
   ness of it. The question of cultural differences has not occurred to them.

This category accounts for those who display a minimal degree of cross-cultural awareness. Such people have never con-
sidered what it is to be a member of a culture, are unable to describe what being French, German or British is all about.
The fact that their culture may be different from others is not something they have ever had to deal with.
   We encountered few representatives of this category during our interviews. This is not surprising bearing in mind
that we were dealing with a collection of managers who had all had experience of living and working abroad. We would,
however, expect to find many more representatives of this category in national companies with international ambitions.

Category 2
   People who have some knowledge of their own culture, but who have little or no awareness of the other culture(s)
   in question. They tend to be judgemental when there are cross-cultural differences.

A person belonging to this category is usually able to make general comments about his/her own culture and can refer to
what (s)he considers to be typical features of the behaviour displayed. As for the other culture(s), the person in question
is aware that (s)he is dealing with someone from a different cultural background, is familiar with some of the features of
that background. When it comes to working with representatives of the culture(s) in question, the person is not aware of the
influence that his/her cultural background has on their working together. Instead, the person tends to make judgemental
remarks and opinionated comments on the other culture(s) without showing understanding of them.
    Although only one respondent is clearly placed in this category, we would expect to come across many more repre-
sentatives of this category in other companies.

Category 3
   People who are trying to adapt fully to the other culture, but do not reflect on their own culture while doing so.

The people in question here have clearly gained insight into the cultural background of the people with whom they are
working. Their comments are perceptive and non-judgemental. They have adapted to their working environment. However,
they have not gained insight into their own cultural background, have not perceived how the other cultures perceive them.
Interaction with other cultures is perceived by their standpoint only, no account is taken of the other culture’s perception
of themselves and the reasons for this.

Category 4
   These people adapt consciously to the other culture(s) while reflecting critically on the culture(s). They can function
   effectively in the other culture(s) while reflecting critically on their own.

A person in this category has reflected on both his/her own culture and the culture(s) encountered. A degree of awareness
has been reached which enables questions to be asked such as:

   ‘Why is X reacting that way?’
   ‘Why is X causing me to react in this way?’

On the one hand, the person is attempting to account for what (s)he may consider to be abnormal behaviour in terms of
the other’s cultural background. This implies relating such behaviour to what may be ‘normal’ for the culture in question.
On the other hand (s)he is also attempting to consider why (s)he considers this behaviour abnormal anyway. This therefore
implies that the person is trying to elicit what (s)he considers to be ‘normal’ behaviour, i.e. behaviour that corresponds
to his/her cultural norm.

                                                                                                                         147
fPart One Final activity A1.2

    This does not imply that such questions can be answered, but the fact that they are asked shows that the person
is busy reflecting on his/her situation, on the interaction with those around. This very attitude puts that person in a
position where (s)he is taking stock, coming to terms with the culture(s) in question and adapting where possible. If
this is not possible, the person can ask ‘Why cannot I adapt?’ This critical reflection and further experience with(in) the
culture in question may lead to an enhanced understanding of the person’s own culture and the other culture. In short,
one can talk of the person moving along a spiral of experiential learning, referring constantly to the person’s own culture
and that of the other(s).


7.2. Some reservations
The problem with such a categorization is, of course, its seductive simplicity. People are forever attempting to characterize
facets of human behaviour, and this could be seen as another vain attempt. Moreover, these categories of cultural awareness
cannot adequately deal with the process each individual undergoes when dealing with other cultures. The interviewers
themselves recognize the complex nature of this process, one which involves posing questions about one’s own culture
as well as about the other(s), coming up with hypothetical answers to these questions, trying them out, finding other
answers if the original answers do not appear to be valid, trying these out and so on. Gaining awareness, then, is an erratic
to-and-fro between one’s perception of one’s own culture and the other culture, during which differences are determined,
reflected upon and in some way accounted for.
    Nevertheless, the categorization does give some indicators of what the interviewers believe to be the degree of
sensitivity attained by the subjects questioned. Moreover, this categorization can be used as a somewhat primitive instrument
with which to examine the degree of cross-cultural awareness of individual managers as well as the composition of a
management team when other companies active in international business are being investigated.

A small case study for starters

An appropriate way of starting the examination of managerial competence within a context
of cultural diversity is to consider the case of Mr Takahashi and the perfume.


    Mr Takahashi and the perfume
    Lekan, a large wholesaler specializing in interior furnishings, needed to boost its sales. Its
    domestic market was stagnant and its export sales, although increasing gradually, were not
    delivering the anticipated volume. The company desperately needed to make a large deal,
    preferably in the expanding Asian market.
       After intensive efforts by its marketing department, Lekan was eventually contacted by a
    Japanese company, Ligato, which was interested in purchasing floor coverings. The two companies
    met on several occasions in Tokyo and a large deal was finally made. A dinner was arranged to
    celebrate the successful conclusion of business.
       Mr Roberts, the senior sales manager who had headed the Lekan team of negotiators, had
    brought along gifts for Mr Takahashi, his Japanese counterpart. With heartfelt expressions of
    gratitude, Mr Roberts handed over a bottle of 25-year-old malt whisky and then Chanel perfume
    which, he said, was intended for Mrs Takahashi.
       Mr Takahashi did his best to conceal his anger and disappointment. He left the celebrations,
    however, without signing the contract.




Why did Mr Takahashi react the way he did?
It was not the malt whisky that upset Mr Takahashi, but the present for his wife. In Japan
it is not done to buy perfume for a woman because it implies that she has an unpleasant
odour. Mr Roberts’ present had been unintentionally insulting. Had he known how the
Japanese perceived such a gift, then the deal could have been signed and sealed. Before we
ask ourselves how best to prepare for this kind of situation we need to look more closely at
the context of cultural diversity and cultural competence.

                   The context in which a manager operates
                   It has been known for some time that the process of globalization is a reality for business.
                   The same is true of cultural diversity. People from different cultures interact with each
                   other more and more frequently, not only on an international level, but also nationally and
                   at local level.
                       Bearing this continuing globalization in mind, Bartlett and Ghoshal (1989) came up with
                   a model for the organization of the future: the transnational organization. As Concept 12.1
                   will describe in detail, this model has both the managers at company headquarters but also
                   those in charge of the subsidiaries abroad being responsible for the co-ordination of units
                   within the whole organization. The transnational company, which combines the abilities
                   of the multinational, global and international firm, now represents the territory of the
                   modern manager.
                       Managers and professionals in such an organization perceive the cultural diversity present
                   as an opportunity, as long as they are able to handle it. This means that they need to learn
                   about the methods and tools that will help them to optimize their skills. In this way they
                   can eventually adopt the most appropriate attitude in a specific cross-cultural context. This
                   acquired complex of skills is referred to as ‘transcultural’ competence.

managerial know-how when he is interacting with his counterpart, Mr Roberts will then
modify his behaviour according to the situation, especially since knowledge itself entails
learning from experience.


Learning about cultures
An effective way of learning from experience is by studying examples. Just as in medicine
and in human sciences, the objective of case studies is, in the first place, the development of
the capacity to reason and not the achievement of a precise solution. Bearing this in mind,
the primary function of the case study method is to learn how to deal with complex and
non-structured problems. After an analysis of the situation, the effect can then be imagined
of different actions in line with one’s own experience in comparable situations.
   The case study approach is directed at the development of cognitive abilities of an
individual such as structuring knowledge, reasoning and problem-solving, as well as the
learning process itself. The most important factor, however, is ‘memory’ because it provides
individuals with the ability to store information. All situations heard, read or studied, put
together in the form of case studies, will find a place within a database. This database will
form the knowledge of an individual. Know-how is all about calling on the right know-
ledge at the right moment to identify a problem.
   This implies that the competence of a transnational manager will involve possession
not only of the knowledge or experience in the field of cross-cultural relations, but also the
development of a ‘memory of cases’. A manager will draw on this memory to adopt the
appropriate attitude in a given situation. This will eventually permit individuals to act at
the right moment without thinking.
   A special form of case study is the ‘critical incident’, such as the one given at the start
of this introduction. Here, there is no need for a comprehensive case analysis. Instead, the
reader is confronted with a specific situation, in a context with its own particular dynamics
whereby the interaction between the people concerned is unique.
   As Bosche (1993) remarked, we learn much more about culturally different people in
the dynamics of their interaction than by learning about their cultural backgrounds; it is
this interaction that is the motor of learning. Critical incidents are therefore particularly
suitable for learning about cultures and, just as in Part One, will continue to be present in
the activities of this part of the book.

           This chapter describes the relation to be found between the structure and the culture of
           an organization. This relation is a very close one because structure is not independent
           of culture but an element of the organization’s culture. To gain a better understanding of
           this relation, structure and culture have been separated into two concepts.

           Concept 7.1 focuses on the forms of organizational structure and how these have evolved.
           This is because models change or adapt in line with new forms of organization that emerge
           over time according to the context and influence of cultural differences.

           Concept 7.2 refers to the classifications of corporate culture proposed by experts in the
           area of organizational culture. Such classifications are useful, although different forms
           should be put forward to reflect the different facets of an organization’s culture. It is this
           range of ideas that gives particular interest to this concept.


           Learning outcomes
           After reading this chapter you will gain an understanding of:

           ●   The relation between the structure and the culture of an organization.
           ●   Forms of organizational structure.
           ●   The levels and values of corporate cultures.




Concept 7.1 Organizational structures

           The term ‘organizational structure’ describes the way an institution is organized to carry
           out its objectives and pursue its projects. It allows relations within the organization to
           be formalized by describing the tasks, jobs and positions of its personnel, as well as the
           limits and responsibilities of the work units. It also indicates the kind of hierarchy within
           the organization, the levels of authority and power as well as the formal lines of com-
           munication between the employees. In short, organizational structure forms the frame of
           the organization’s culture. That is why the structure of an organization is used to analyse
           its culture.
               Several variables influence the structure of an organization. Size is one: if a company
           is small, it can be flexible and engage the whole staff in a range of activities. The business

fChapter 7 Culture and corporate structures

                  environment is another: the structure of a large-scale organization, for example, will
                  need to be more decentralized if it sells its products in many markets, whether they be
                  regional or international. Another important variable is the influence internal and external
                  factors can have on the organizational structure. Fatehi (1996) makes a distinction between
                  internal requirements (the choice of technology, the type of activity being undertaken, the
                  particular strategy pursued) and the external environment (external forces such as economic
                  conditions, host governments and product-market characteristics) that influence an organ-
                  ization’s fate. The way internal and external forces are combined gives each enterprise a
                  different structure, one that allows it to realize its particular goals.
                     Fatehi (1996), however, does not see any fundamental differences between multinational
                  organizations and domestic ones, apart from the fact that multinationals need to take account
                  of factors such as the physical distance between headquarters and the subsidiaries, their
                  mutual relations and the legislation of the countries where the subsidiaries operate. The fact
                  that multinationals operate across national borders means that the need for co-ordination
                  and integration will be greater than in domestic organizations.


                   Forms of organizational structure

                  Generally speaking, two main types of organizational structures can be distinguished: a tradi-
                  tional hierarchical structure and a structure with several lines of reporting. In the former, the
                  staff is divided up according to function, product, service or location; in the latter, the struc-
                  ture takes the form of a project team or assumes a matrix structure. For several years now,
                  another form of structure has been making its appearance, one that has assumed increasing
                  importance – the network structure. This form facilitates partnerships between organizations.
                     According to Fatehi (1996: 104): ‘Functions, products and geographic areas remain the
                  three basic models of organizational structure.’ Bearing in mind these domains, he puts
                  forward a detailed classification of five organizational structures which he defines as follows:
                  1. Geographic structure. In this structure, employees are grouped according to region in
                     the broad sense (or country/continent if they are multinationals). At the head of each
                     division there is a senior-level executive who shares responsibility for the area with the
                     human resources manager. Headquarters maintains control of ‘strategic planning’ as
                     well as control of the operations of each company. A number of regional divisions may
                     retain the possibility of producing and selling according to local needs.
                  2. Functional structure. Here, responsibilities are arranged according to functional areas:
                     at the head of each function – marketing, finance, research and development, etc. – is a
                     senior manager who reports directly to the company’s chief executive. Where a company
                     has several product lines, the ‘functional managers’ do not always have the same objec-
                     tives. These differences of opinion may be passed to headquarters, where executives
                     could spend more time resolving such conflicts than they do making strategic decisions.
                  3. Product structure. The organizations using this model organize their staff according to
                     product lines, which are in turn grouped according to product divisions. All the functions
                     relating to the product being sold and the market being served are controlled by the
                     divisions. This structure allows a product to be launched simply through the creation of
                     a new division. Although the rest of the company may be less destabilized as a result,
                     such autonomous units can pose problems relating to control and co-ordination.

5. Matrix structure. A matrix organization does not follow the traditional hierarchy since
   it does not respect the principle that each employee has just one superior. Moreover, the
   management of this type of organization acknowledges a lateral authority. The two ‘lines’
   – functional and project – share responsibility. In general, this system facilitates the
   co-ordination and integration of projects, but it also has the disadvantage of relying on
   more managers (thus increasing costs) and of possibly increasing internal competition.
   This may, in turn, create conflict among people in the organization.
