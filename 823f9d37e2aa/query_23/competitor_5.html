    Introduction to Part One


Setting the scene

This introductory chapter will give an outline of the research in the field of culture and
management, which in turn serves as a framework for Part One.


The concept of culture
Many experts in their fields have wracked their brains to come up with what they consider
to be their concept of ‘culture’. Those working in the field of cultural anthropology, alone,
for example, have come up with a long list of definitions of the concept, based on their
analysis of ethnological, social, psychological and linguistic data. The attempt made by
Bodley (1994) to summarize these (Table I.1) gives an idea of all the facets of culture that
need to be taken into account from an anthropological perspective.
   Although acknowledging the multiplicity of cultures, the authors of this book consider
that the fundamental aspect of culture is that it is something all humans learn in one way or
another. It is not something people inherit, but rather a code of attitudes, norms and values,
a way of thinking that is learnt within a social environment. Family, the social environ-
ment, school, friends, work – all these help to form this code and determine how people see
themselves and the world. The national culture and the particular region which people live
in also help to shape a person’s cultural profile.
   Although culture is reflected in individual behaviour, it is a way of thinking shared by
individuals in a particular society that makes culture what it is.


Table I.1 Diverse definitions of culture

 Topical           Culture consists of everything on a list of topics, or categories, such as social
                   organization, religion and economy

 Historical        Culture is social heritage, or tradition, that is passed on to future generations

 Behavioural       Culture is shared, learned human behaviour; a way of life

 Normative         Culture is ideals, values, or rules for living

 Functional        Culture is the way humans solve problems of adapting to the environment or
                   living together

 Mental            Culture is a complex of ideas, or learned habits, that inhibit impulses and
                   distinguish people from animals

 Structural        Culture consists of patterned and interrelated ideas, symbols, or behaviours

 Symbolic          Culture is based on arbitrarily assigned meanings that are shared by a society

Source: Bodley (1994): 9.

                   Culture operates on three levels
                   Culture operates on three levels, the first being on a level where it is observable and tangible.
                   Here, artefacts and attitudes can be observed in terms of architecture, rituals, dress codes,
                   making contact, contracts, language, eating and so on. Operating at a second level, culture
                   is to do with norms and values. Beliefs – or norms – are statements of fact about the way things
                   are. These are the cultural rules, as it were, which explain what is happening at level one
                   and determine what is right or wrong. Values are to do with general preferences as to what
                   is good or bad, how things should be. The third – and deepest level – has to do with basic
                   assumptions. This level is difficult to explore and what lies there can only be construed through
                   interpretation of what is happening at the other levels. Interpretation involves trying to
                   explain why we act according to particular rules or in line with particular values. It is to do
                   with the question ‘Why?’ and the attempt to answer it with more than just a ‘Because!’
                       Figure I.1, based on one devised by Schneider and Barsoux (2003), gives a visual inter-
                   pretation of these levels of culture and the ways they can be investigated. Exploring culture can
                   be compared with exploring the ocean. On the surface, artefacts, rituals and behaviour
                   can be seen. These give an idea of what may be below. The underlying norms and values can
                   be ascertained through interviews and surveys. The assumptions lying at the very bottom
                   can only be inferred through interpretation.


                   Giving dimensions to culture
                   Assumptions in the exploration of culture – the key dimensions – can be ascertained
                   from the work of the anthropologists Kluckholn and Strodtbeck. In 1961, they developed
                   a comparative model with six cultural orientations:

                    Chapter and concept overview

                   Chapter 1 Determinants of culture
                   Chapter 1 examines the very concept of culture, its facets as well as the role of norms and
                   values. The levels at which culture operates – from family through organization to society
                   – are also described. The chapter is divided into two concepts:
                   ●   Concept 1.1 Facets of culture. After giving a short definition of the word ‘culture’ and
                       its various ‘layers’, the concept will analyse the meaning of value systems for societies.
                   ●   Concept 1.2 Levels of cultures. This concept considers the levels of cultures ranging
                       from national to organizational level and examines those elements that define them.


                   Chapter 2 Dimensions of culture in business
                   Chapter 2 explores cultural dimensions in the business context with particular reference to

                   Effectiveness), an ongoing research project. It also puts forward criticisms concerning the
                   cultural dimension construct, particularly that devised by Hofstede.

                   ●   Concept 2.1 National cultural dimensions in the business context. The five dimensions
                       developed by Hofstede are explained, and the extremes of each characterized in terms of
                       management and business.

               Determinants of culture



           Culture is an integral part of all human societies. With the advent of globalization, the
           notion of culture has taken on a broader meaning and has come to be an important element
           of organizations. These two aspects of culture will be developed in this chapter.

           Concept 1.1 will explore the notion of culture in society, while Concept 1.2 will consider the
           influence of culture on socio-economic realities such as the management of companies.


           Learning outcomes
           After reading this chapter, you will gain an understanding of:

           ●   The concept of culture and the role of norms and values in determining culture.
           ●   The relationship between culture, organizations and management.
           ●   The concept of culture at various levels, both national and organizational.




Concept 1.1 Facets of culture

           According to Fleury (2002), a society is an organized group of individuals who share
           functional relations. The complexity of present-day societies is increasing the roles for an
           individual and is, at the same time, diversifying the ways these roles can be interpreted.
           These roles are determined by culture. Each society defines its own norms and the ways in
           which they are realized. It can therefore be said that culture is a structure that gives form
           to behaviour and fixes the framework of exchanges between the people of this group. The
           function of culture is integration, adaptation, communication and expression. Societies are
           organized politically into nations, but within this national unity subcultures may exist with
           specific cultural characteristics. These groups use the society in which they are embedded
           as their framework of reference, and share their nationality, language and institutions, while
           being delineated by their socio-economic, historic or geographic characteristics.


           What does culture really mean?

           One can never use the word ‘culture’ without being obliged to give a range of definitions that
           contradict each other! Even if this term had only one meaning, irrespective of whether it

                  was aesthetic, philosophical, national, organizational or managerial, it would only be a form
                  of individual or collective representation. Genelot (1998: 195) stresses that ‘men are products
                  of their culture: their representations, their visions of what is good and what is wrong, their
                  behaviour at work, their concepts of organizations are the fruit of the representations carried
                  by their ancestors’. Can one therefore state that a change of culture would only be a change
                  in representations? Anthropologists, sociologists, historians and philosophers have all put
                  forward their definitions, but none of them seems to be sufficiently precise or inclusive.
                     Rather than look for an exact definition, it may be preferable to look for a meaning
                  that is blurred but which somehow addresses the rather abstract idea of culture. Hofstede
                  (1980: 25) refers to culture as ‘the collective programming of the mind which distinguishes
                  the members of one human group from another’. When elaborating on his definition, he says:
                  ‘Culture, in this sense, includes systems of values; and values are among the building blocks
                  of culture.’ This definition is frequently referred to in cross-cultural literature, probably
                  because it is blurry enough to encompass other definitions, but sharp enough to reflect key
                  elements of a culture.
                     Consider the implications of Hofstede’s definition. Collective programming of the mind
                  implies that members of a group are programmed by that group to perceive the world in a
                  certain way, themselves and others included. In other words, the group shares meanings
                  that hold them together. Furthermore, this definition implies that the group’s culture is
                  somehow learned rather than being innate. It is passed down from generation to genera-
                  tion and is the basis of the socialization process in childhood when the norms of behaviour
                  and the values on which these norms are based are learned. Finally, culture is to be seen
                  as relative: no cultural group is ‘better’ in any absolute sense. There is no cultural standard
                  whereby one group’s perception of the world is intrinsically superior to another’s.
                     The building blocks referred to earlier need to be examined more closely: the values that
                  cultural groupings share and the resulting norms of behaviour.


                   Norms and values

                  Each culture can be seen as having three layers. The first, outer layer is the ‘behavioural’
                  or ‘explicit’ level. It is what you notice immediately when you go abroad for the first time:
                  the language, the food, the architecture, the houses, the buildings and so on. But it is also the
                  communication style: Latin cultures, for example, use exuberant body language and facial
                  expressions. Other, less exuberant cultures, such as those in Nordic Europe consider this
                  sort of behaviour to be ‘over the top’, but it is really just a matter of comparing the com-
                  munication styles of one culture with those of another.
                      The second layer contains the ‘norms and values’. Every culture has its own system of
                  norms and values. Together, these form the national characteristics of a culture, and act as
                  its framework of reference. Although norms and values are generally presented as a unit,
                  a distinction must be made between the two. Norms are the rules of a society, determin-
                  ing what is good or bad with regard to behaviour. People are, however, allowed a certain
                  individual freedom of choice between what ‘you should always do’ and what ‘you should
                  never do’. Norms are the written and unwritten rules of a society. Values are what is con-
                  sidered important or unimportant, beautiful or not beautiful, right or wrong. A value is
                  something experienced inwardly and which is not up for discussion. The preference or
                  aversion it contains is taken for granted by its bearers.

   The third and innermost layer, and which lies at the core of ‘culture’ contains its assump-
tions and beliefs. These are difficult to describe or explain. When you are asked to justify
why you do this or say that, the answer is often: ‘I don’t know.’ Why, for example, do people
eat with a knife and fork or with chopsticks? Well, that’s the way people eat . . .
   The system of values and norms not only varies from culture to culture, but also from
one part of a society to another. Not every individual ‘operates’ from the same basis, nor do
subcultures within a society. Moreover, a culture is never static, because norms and values
are always changing. However, since every culture is so deep-rooted, the changes are never
sudden or extreme and a certain constancy is maintained.
   Sociologists who have compared the value systems of countries in terms of the way in which
norms and values have developed in society, have concluded that there are four categories
(Ruano-Borbalan, 2002: 339):

  1. Traditional society, in which religion plays an important role . . . large families are
     encouraged, conformity is rewarded and individualism rejected. This is, for example,
     the case in many Arab countries.
  2. Rational society, in which the interests of the individual come first, birth control
     is encouraged and the authority of the state is recognized. Germany . . . is a typical
     example.
  3. A society in which survival is the primary concern, where the people are not happy
     and rather intolerant, where equality between the sexes has little chance . . . where
     materialism is predominant. . . . This is often the situation in ex-communist countries.
  4. Post-modern society . . . tolerant and democratic, such as those in Scandinavia and the
     Netherlands.


Politics and norms and values
The influence of politics on norms and values is obvious when it comes to bringing global
unity to humanitarian norms and values. These are formally laid down in the ‘Universal
Declaration of Human Rights’. In a number of countries, however, politics also has a say in
education, dress, manners and many other aspects of daily life. Recent reports from Iran,
for example, show the degree of political interference in people’s lives there. Students from
Iranian universities heavily criticized their highest political leaders and the government’s
vice squad for persistently prescribing how Iranians should dress, how they should do their
hair and how they should enjoy themselves.
   Conversely, there are degrees of acceptance with regard to what politicians in each country
may or may not do; what constitutes a scandal – and what does not. In Nordic Europe,
for example, it is acknowledged that there is corruption in political life now and again, but
in no way is it regarded as acceptable. If caught out, a politician must resign. In southern
Europe, however, involvement in a corruption scandal does not necessarily mean the end
of a politician’s career. A politician may be involved for several years in corruption proceed-
ings but stay in his/her post, despite being investigated for embezzlement for example. In
Surinam, where corruption is regarded as an unavoidable evil, certain limits are neverthe-
less placed on wayward behaviour. Anyone who attempts to launch a coup d’état there, for
example, will be severely punished.
   The freedoms a politician may enjoy in his/her private life are also different according
to country. When an affair came to light between a US president and an intern working

                  his relationship with the intern during a formal investigation. The impeachment process

                  France, however, sex scandals of this nature do not happen. ‘Insiders’ may have been aware
                  of the double life being led by their country’s president (an illegitimate daughter of his
                  eventually emerged at his funeral) but, at the time, his extramarital relationship was regarded
                  as a private matter. Homosexual politicians may not be accepted in many countries, but in
                  the Netherlands, for example, a country where marriage between homosexuals is allowed
                  by law, their sexual orientation is again regarded as a private matter.
                      Where a certain degree of economic, political and social integration is taking place
                  between countries, can one talk of a movement towards a shared system of norms and
                  values? Referring to the possibility of European countries sharing such a system, the French
                  philosopher Edgar Morin (1987), declared that the creation of a European culture had
                  nothing to do with dominant basic ideas (such as Christianity, humanism, rationalism, or
                  science). It had to do instead with the opposition between ideas. Put another way, what
                  is important in the forming process of European culture is the meeting of diversity, of
                  opposite poles, the complementarity of ideas. This is what Morin calls ‘dialogique’: the union
                  of two forms of logic, of two different principles, without their duality being lost. The
                  association of contradictory terms or concepts can form one complex phenomenon. He
                  takes mankind as an example: a human is both entirely determined biologically as well as
                  culturally. This ‘dialogique’ can be found in every culture, but is particularly intensive within
                  the European culture where there is an enormous amount of interaction and interference
                  within areas to do with values, e.g. religion/rationality, mythical thought/critical thought,
                  and humanism/science.


                   Cultural assumptions in management

                  After social norms and values comes the third layer of culture: assumptions. This layer is
                  also referred to by Schein when identifying organizational culture. His work is a useful guide
                  in the examination of cultural assumptions in a managerial context, and offers insights into
                  the question of managing relationships. He defines culture as:
                      a set of basic assumptions – shared solutions to universal problems of external adaptation
                      (how to survive) and internal integration (how to stay together) – which have evolved over
                      time and are handed down from one generation to the next.
                                                                                                Schein, 2004: 14

                     In terms of external adaptation, this means, for example, asking: to what extent does
                  management within a culture assume that it can control nature or to what extent is it con-
                  trolled by nature? This question is allied to that of the nature of human activity: is doing
                  more important than being, acting more important than reflecting? In terms of internal
                  integration, this means asking a question such as: ‘Are humans basically assumed to be
                  good or evil’, or trying to determine whether relationships at work are more important
                  than the task itself.
                     The questions raised by Schein on cultural assumptions of organizations imply that
                  management in an international context has not only to take account of the norms and
                  values of the specific culture of a company, but also of its cultural assumptions.

Concept 1.2 Levels of cultures

           According to Schein (1999), a culture starts developing in a context where a group of
           people have a shared experience. Members of a family, for example, share a life together and
           develop a certain togetherness through undergoing experiences inside and outside the home.
           Small groups without blood relations can develop the same closeness through sharing a
           pastime, a hobby or occupation; the experience they share may be rich enough to allow
           a culture to be formed.
              In a business context, culture can develop at different levels – within a department or at
           the various ranks of a hierarchy. A company or organization can develop its own culture,
           provided that it has what Schein calls ‘sufficient shared history’ (1999). This applies also for
           a collection of companies within a particular business or sector, or for organizations in,
           say, the public sector. This collective experience can be related to regions of a country, or
           regions across countries, or a grouping of nations themselves when they share a common
           experience, be it language, religion, ethnic origins or a shared historical experience in their
           development. In this concept we will try to distinguish levels at which cultures develop.


            Culture and nation

           When cross-cultural matters are under discussion, the terms ‘culture’ and ‘nation’ should
           be carefully distinguished, as Tayeb (2003) makes clear. She takes as an example the Kurds.
           Although they are a people with a distinctive cultural identity, they nevertheless live in
           three nation states – Turkey, Iraq and Iran. This is an obvious example of one culture
           straddling the political boundaries of two or more nation states.
              This culture/nation distinction can, as Tayeb points out, have a bearing on the way
           organizations operate. If ‘culture’ is defined as a set of historically evolved, learned and
           shared values, attitudes and meanings, then this has an influence on organizations at both
           macro and micro level.
              At the macro level, the nation, in terms of its laws and ec</span><span data-dcnode-id="140" instrument_node="">onomic institutions, must be
           taken into account by organizations going about their business. They have to consider the
           measures taken by the state to protect its interests and those of its inhabitants. These can
           range from specific employment laws and safety legislation to general economic and social
           policies. These macro level considerations are not only subject to change through political
           changes in government, but also through the desire of the nation’s rulers to share legislation
           at social and economic level with other nations within some kind of association.
              At the micro level, the organization is influenced by cultural elements relating to employer–
           employee relationships and to behaviour among employees. Those wishing to introduce
           any changes with a view to improving management effectiveness or increasing productivity
           must take account of these elements when implementing such changes.


            National culture

           Although cultural make-up has many facets reflecting experience in life and member-
           ship of different groupings at different times in various environments, there is, as Tayeb

                  (2003: 13) says, ‘a constant thread . . . through our lives which makes us distinguishable
                  from others, especially those in other countries: this thread is our national culture’. This
                  national culture may be heterogeneous in nature, but it will contain enough elements
                  which together enable a national culture to be created.
                     Tayeb (2003) gives a list of these elements and considers their effect at both micro and
                  macro level. She starts with two elements that contribute to the building of a nation and the
                  creation of a national culture:
                  ●   the physical environment;
                  ●   the history the nation has undergone.
                  She then refers to ‘institutions’ that contribute to the establishment of a national culture:
                  a) Family. The basic social unit where ‘acculturation’ takes place, where the culture of a
                     particular environment is instilled in a human from infancy.
                  b) Religion. Religious beliefs can have a significant effect on a person’s view of the world.
                     This does not mean that people need to ‘believe’, but religion has helped in all sorts of
                     direct and indirect ways to shape the environment in which people live.
                  c) Education. The value system on which education is based and the choices it makes
                     in terms of the curriculum both help in the formation of a culture, particularly where
                     educational institutions are well developed. At the micro level, the teaching approach
                     used and the manner of learning can also affect future learning. This, in turn, can deter-
                     mine the quality and versatility of human resources in the labour market.
                  d) Mass communication media. Tayeb pays particular attention to the effect of recent
                     advances in communication on the development of culture. The ever-increasing
                     presence of mass media has given a new meaning to shared experience: newspapers,
                     magazines, television and radio, ‘bring people closer together irrespective of their geo-
                     graphical locations, but also in terms of spreading values, attitudes, tastes, meanings
                     and vocabulary – in short, culture’ (Tayeb, 2003: 20). She does not, however, regard this
                     as being a threat to the distinctive cultural characteristics of a nation. Instead, the mass
                     media have created a new common dimension in which people can share experiences
                     if they choose to.
                  e) The multinational company. This is a powerful culture-building institution, whose pro-
                     ducts and services can influence the way people live, whose operations can affect how
                     and where they work. However, the multinational is also influenced by the preferences
                     at national level with regard to product taste and form and the promotion of its goods
                     and services.


                   Organizational culture

                  Edgar Schein (1999) refers to the power of culture on account of the extent to which it
                  determines our behaviour individually and collectively. In organizational terms he remarks
                  on how cultural elements affect the way strategy is determined, goals are established and
                  how the organization operates. Furthermore, the key personnel involved are influenced
                  by their own cultural backgrounds and shared experience since these have helped shape
                  their own values and perceptions.

  Schein (1990: 111) develops his definition of culture when defining organizational culture:
  (a) a pattern of basic assumptions, (b) invented, discovered, or developed by a given group,
  (c) as it learns to cope with its problems of external adaptation and internal integration,
  (d) that has worked well enough to be considered valid and, therefore (e) is to be taught
  to new members as the (f) correct way to perceive, think, and feel in relation to chosen
  problems.

   Drawing on this definition, we can say that organizational culture is the acceptance – in
a tacit or formal way – of norms of specific behaviour by the members of an organization.

Corporate culture

The term ‘corporate culture’ takes the question of organizational culture a step further.
As Meschi and Roger (1994) point out, if an organization develops into a multinational
conglomerate, the culture at headquarters may influence that of subsidiaries abroad. In
the same way, a firm involved in a joint venture with a company from another country
may well find that the presence of the ‘foreign’ partners influences the underlying culture
of the firm. What evolves over time in terms of ‘corporate culture’ can have as its basis
the ‘original’ organizational culture, or the national/regional culture – or a combination
of the two.

                  Some regard a clearly defined corporate culture as key to a (multi-)national company’s

                  extent of cultural control, through company goals, manuals, instructions and the presence

Professional culture

The nature of the line of business the company is in may have an important influence on
the corporate culture as well as the professional culture attached to key positions within the
organization. Professional culture is essentially to do with the set of values shared by people
working together professionally. Schein (1996: 237) talks of three professional cultures in
management. First, there are the ‘operators’ who are directly involved in production of goods
or the provision of services. Second, there are the ‘engineers’, the people who design and
monitor the technology behind the production and/or provision of services. Those who
share this culture tend to show a preference for solutions where systems rather than people are
involved. Third, there are the ‘executives’, the senior managers who share tacit assumptions
regarding ‘the daily realities of their status and role’.
   The question of how these professional cultures co-exist within an organization preoccupies
many scholars. How do the executives handle the ‘operators’ and ‘engineers’? How best to
manage conflict constructively? To what extent is delegation and empowerment desirable?
What styles of management are appropriate?


Culture and management

At the basis of all the cultures mentioned lies the individual’s culture. It is individuals who
ultimately form the culture of an organization. The values they embody as members of an
organization are formed partially through the family, social and national environment, and
partially through the professional, organizational and corporate culture.
   It is up to management to take into account the diversity of people in an organization
and to manage their cultural differences. In an international context, however, what does
cross-cultural management mean?

                      Nancy Adler (2002: 11) gives a definition of what cross-cultural management is about:
                      Cross-cultural management explains the behavior of people in organizations around the
                      world and shows people how to work in organizations with employees and client populations
                      from many different cultures. Cross-cultural management describes organizational behavior
                      within countries and cultures; compares organizational behavior across countries and
                      cultures: and, perhaps most important, seeks to understand and improve the interaction
                      of co-workers, managers, executives, clients, suppliers, and alliance partners from countries
                      and cultures around the world.

                     The importance of cross-cultural management is evident in a world where all kinds of
                  co-operation between companies in many countries is on the increase. Whether these are
                  mergers, takeovers, partnerships or strategic alliances, they all need to be analysed in cultural
                  terms, not only to determine where benefit can be gained, but also where difficulties may
                  be encountered when companies are working together.
                     This chapter has given a brief overview of the levels at which culture operates. These will
                  be dealt with in more detail in Chapter 2, particularly in Concept 2.2, which examines the
                  influence of national culture on organizational culture. The question of business culture
                  will be addressed in Chapters 3 and 4.



                    Conclusion

                  Chapter 1 has shown how difficult it is to give a definition of the word ‘culture’. Apart from
                  the multitude of definitions, culture can also be considered at various levels, the deepest
                  of which, according to Edgar Schein contains ‘assumptions’. This level, according to Schein,
                  can also be found in the culture of an organization.

                  This chapter also shows that the individuals in a group form a culture that can be national,
                  organizational or professional. This implies that cross-cultural management has to take
                  into account all of these contexts, not only within organizations, but also in relations with
                  companies of different countries.

    Dimensions of culture in business



This chapter explores the conceptualization of culture in terms of ‘dimensions’. These are
concepts that allow variations between the attributes of cultures to be quantified. Attention
will be given to the reflection of these cultural dimensions in the business environment.

Concept 2.1 will first outline a model of value orientations drawn from social anthropology
that has proved to be influential in the development of a dimensional approach to cross-
cultural comparisons. It will then summarize the dimensions developed by Geert Hofstede,
paying particular attention to the fifth dimension (short-term/long-term orientation). The
concept will finally pinpoint some criticisms of Hofstede’s model.

Concept 2.2 takes the notion of cultural dimensions a stage further by considering the
more recent projection of cultural dimensions developed by the GLOBE project, as well as
the methods used in the research to determine values and practices at both organizational
and societal level. The concept gives particular attention to GLOBE’s findings with regard
to the ‘Power Distance’ dimension. The notion of culture clusters is introduced, using the
metaconfiguration proposed by the GLOBE project.


Learning outcomes
After reading this chapter you will:

●   Understand the concept of cultural dimensions.
●   Be familiar, in particular, with the five-dimensional model developed by Hofstede as well
    as the culture construct definitions of more recent research by the GLOBE project.
●   Be acquainted with criticisms of Hofstede’s concept.
●   Have some insight into the relationship between societal values and practices and the
    culture of organizations working within a society.
●   Become familiar with the idea of clustering cultures according to their similarities,
    particularly the metaconfiguration of clusters devised by the GLOBE project.

                   One important hypothesis underlying much research into culture is the stability of a culture’s
                   characteristics. Although cultural groupings all undergo change over time according to
                   the ways they deal with the challenges laid down by their environment, they each remain
                   constant in the sense that they maintain certain notions about the world and attitudes
                   towards their fellow humans.
                      The characteristics that define each cultural group can offer international managers
                   considerable insights when it comes, for example, to co-operating with companies from
                   other cultural backgrounds. If awareness of cultural differences is consciously raised, then
                   the ability to analyse the effectiveness of employing business policies in differing cultural
                   environments is considerably improved.

Concept 2.1 National cultural dimensions in the business context

            Hofstede’s dimensions

           Geert Hofstede’s research in the area of culture and management is known worldwide.
           His theories are not only frequently quoted and applied in cross-cultural research, but also
           used (often indiscriminately) in prescriptive works on dealing with other cultures. Despite,
           or maybe because of, its prominence, his work has provoked much criticism from theorists
           and practitioners alike, as we will see later. Nevertheless, consideration of Hofstede’s work
           is indispensable to any study on culture and management.
               Hofstede developed a dimensional approach to cross-cultural comparisons through his
           pioneering studies into how management is affected by differences between cultural groupings.
           He conducted extensive studies into national cultural differences, the first being across
           employees working in subsidiaries of a multinational corporation (IBM) in 64 countries.
           Hofstede, who had founded and managed the personnel research department of IBM
           Europe, took a database of scores resulting from attitude surveys among IBM employees
           worldwide and re-analysed the figures. The surveys had been developed as a management
           tool to examine issues relating to the work situation (determined beforehand through
           interviews with personnel). The original respondents in these surveys were matched groups
           (Hofstede, 1980) in seven occupational categories, five of them being non-managerial and
           two managerial.
               The research set-up, as well as the statistical methods used by Hofstede, was applied by
           other researchers to other groups, including students in 23 countries, commercial airline
           pilots in 23 countries and civil service managers in 14 countries. These studies together
           identified and validated the first four dimensions of national culture differences described
           in this concept. Hofstede later developed a fifth dimension to account for value orientations
           that emerged from research carried out from a Chinese perspective.
               Hofstede used the results of his research to produce a comparison between cultures on
           four and eventually five dimensions:
           ●   Power distance (high/low): attitudes to authority, the distance between individuals in a
               hierarchy.
           ●   Uncertainty avoidance (high/low): the degree of tolerance for uncertainty or instability.
           ●   Individual versus group orientation: independence and interdependence, the loyalty
               towards oneself and towards a group.
           ●   Masculine versus feminine orientation: importance of work goals (earnings, advancement)
               compared with personal goals (co-operation, relationships).
           ●   Short-term versus long-term orientation: fostering virtues related to the past and present
               or virtues related to the future.
           It should be stressed that these dimensions form a general model and are not necessarily
           applicable in specific circumstances. They describe tendencies within a certain cultural
           grouping; they present orientations adopted by the majority of members of a cultural group-
           ing in normal situations. They do not account for cultural differences in absolute terms but
           in relative terms.

                      In the second edition of his publication Cultures and Organizations (2005), which he
                   wrote with his son, Hofstede examines differences between cultures not only at society
                   level, but also in terms of the family, education and the workplace. When examining these
                   cultural dimensions this book will focus on the workplace, i.e. the business context.


                   Low/high power distance
                   ‘Power distance’ refers to the extent to which members of a culture expect and accept that
                   power is unequally distributed in society. It was developed by Hofstede on the basis of earlier
                   research concerning preferences for power among different cultures and, in particular, on
                   research identifying centralization as a characteristic of organizations (Pugh, 1976).
                      As the Hofstedes’ book says: ‘Power and inequality, of course, are fundamental facts of
                   any society and anybody with some international experience will be aware that all societies
                   are unequal, but some are more unequal than others’ (Hofstede and Hofstede, 2005: 137).
                   Essentially, this dimension reflects how a culture relates to authority of one form or another.
                   In relational terms, the comparisons made between cultures on this dimension convey the
                   extent to which subordinates are dependent on their bosses. The extremes of this cultural
                   dimension are characterized in Table 2.2.
                      How subordinates view their superiors depends on a combination of factors, and this
                   combination can vary considerably from one culture to another. In some cultures the
                   status of superiors is important: their position in the hierarchy, their age, their family and
                   their connections. In others, greater importance is attached to a person’s competence
                   and experience. In short, it may be that who you are is more important than what you do
                   – or vice versa.
                      This leads to the question of how subordinates deal with their superiors, regardless of
                   how the latter are chosen. If they show great respect for status and life experience, they
                   may be reluctant to show initiative and prefer to be given instructions instead, which are
                   then accepted without question. If they consider their superior to be more of a first among
                   equals, they will consider that person’s judgements, decisions and instructions to be subject
                   to discussion and may even challenge them.

   In high power distance cultures, effective managers are essentially benevolent autocrats
who are focused on the task. They are inaccessible and enjoy privileges their power gives
them. If things go wrong, the subordinates – who are dependent on their superiors – are
usually to blame. In low power distance cultures, on the other hand, effective managers
are more oriented towards the people in an organization and allow them to participate
more in making decisions. The relations between subordinates and superiors are more
horizontal than vertical: superiors are accessible and try to make out they are less powerful
than they are. If anything goes wrong, the system is more to blame rather than the indi-
viduals involved.


Individualism/collectivism
This dimension concerns itself with the relationship between the individual and the
group. To what extent are individuals in society autonomous and to what extent are they
embedded in the group? This particular construct, apparent in ancient civilizations and
to be found at the heart of much philosophical thought about the nature of the state
and the individual, continues to be given much attention in many disciplines, particularly
sociology, anthropology and psychology. It was Hofstede who subjected this construct to
empirical investigation on a large scale and eventually produced a ranking of societies in
individualistic/collectivistic terms.
   The extremes of this dimension are characterized in Table 2.3.
   This dimension is essentially about the importance that a cultural grouping attaches to
relationships. Some cultures place more importance on personal relationships rather than
the task to be performed or the deal to be completed. These relationships may well be within
an extended family, so that blood-ties guarantee trust and loyalty. Relations outside the
family need to be built on face-to-face social encounters. Loyalty to those within the circle
of relations and friends is considered essential and is rewarded in many ways. Collective
achievement is the focus, rather than the attainment of individual goals and careers. Indeed,
some form of personal sacrifice may be necessary for the sake of the common good. In
individualist cultures, the focus is more on rights and the achievements of the individual.
Individuals are expected to achieve their own goals and to do so are willing, if necessary,
to undergo contractual obligations. Managers expect employees to fulfil the terms of a con-
tract and vice versa. Close ties may develop between the two, but this does not diminish

Uncertainty avoidance
This fourth dimension measures the extent to which people in a certain culture avoid
uncertainty. To what extent do they feel threatened by ambiguous, risky situations? To what
extent do they prefer predictability in their lives, clearly prescribed rules and procedures in
their work? Uncertainty-avoiding cultures perceive life as a battle against anxiety and stress.
They may be willing to accept familiar risks but not the danger of the unknown. To that
end they tend to resist innovation or anything that deviates from the known. They appre-
ciate authorities who have the ‘right’ answers, who lay down rules to prevent ambiguities.
Cultures with low uncertainty avoidance are not disconcerted by ambiguity, and tolerate
differences generally. They perceive that there are not always answers to problems and that
laws are not always effective or necessary in dealing with deviation – they may be changed
if deemed ineffective.
    The two extremes of this dimension are characterized in Table 2.5.
    Managers in uncertainty-avoiding cultures would be expected to maintain the rules
and regulations of an organization, to have precise answers to questions and to give exact
instructions. Managers in cultures with low uncertainty avoidance would be expected to
uphold or establish rules only as absolutely necessary (most problems can be resolved with-
out strict rules anyway); managers cannot possibly be the source of all wisdom and may
need to draw others into their decision-making who are more competent.
    Hofstede’s initial four dimensions have had an enormous influence on the development
of management theories in many management areas, particularly those focusing on relations
between the leader and the led. Two dimensions, power distance and uncertainty avoidance,
are particularly important in this respect. As Hofstede and Hofstede themselves say:
  Both dimensions help answer two fundamental questions:
  Who should have the power to decide what?
  What rules or procedures should be followed in order to attain the desired ends?

                   The fifth dimension: short-term versus long-term orientation
                   The dimensions outlined above were supplemented by this, fifth, dimension. Hofstede (2001)
                   maintains that this dimension was not found in the data used to determine the original
                   dimensions because the questions used in the surveys were designed by Westerners. Only
                   when an investigation was made into values suggested by researchers with what Hofstede
                   calls ‘Eastern minds’ did this additional dimension come to the fore.

   This fifth dimension emerged from a survey, carried out around 1985, among students
from 23 countries. This was initiated by Michael Bond and associates who were attempt-
ing to measure value orientations from a Chinese perspective. The instrument which they
developed – the Chinese Values Survey (CVS) – contained an element called the Confucian
dynamism scale, reflecting those values upheld by Confucius and his followers.
   Confucius, born in 551 bc in the province of Lu, China, was a political figure, educator
and philosopher. He lived during a time when China was divided into small states locked
in endless conflicts and power struggles. He spent many years travelling from state to
state, speaking for peace and universal love among humankind. His teachings, preserved by
his followers, form the basis of subsequent Chinese thought on how the ideal man should
live and interact, as well as how society and government should be formed. Humans,
Confucius believed, could eventually reach a state of perfectibility through learning from
the Chinese past and attain a state of orderliness and peace by adopting the traditional
values of their forefathers. It was these forefathers who had a perfect understanding of
the order in heaven and on earth: by following their rituals, humans could create within
themselves the same wisdom.
   The principles of Confucian teaching are summarized by Hofstede (2001: 354) as
follows:

  1. The stability of society is based on unequal relationships between people.
  2. The family is the prototype of all social organizations. A person is not primarily an
     individual; rather, he or she is a member of a family.
  3. Virtuous behaviour towards others consists of not treating others as one would not like
     to be treated oneself (the Chinese golden rule is negatively phrased!).
  4. Virtue with regard to one’s tasks in life consists of trying to acquire skills and education,
     working hard, not spending more than necessary, being patient and persevering.

   The fifth dimension from Bond’s studies is defined by Hofstede as the short-term
versus long-term orientation. Although all the values to be found along the dimension are
taken from the teachings of Confucius, those deemed short-term in nature are oriented
towards the past and present and are more static; whereas those deemed to be long-term
are oriented towards the future and are more dynamic. It should be noted that one end of
the dimension is not to be considered better or worse than the other – they are simply
orientations towards life.
   A short-term orientation includes fostering virtues related to past and present, especially
respect for tradition, preservation of face and fulfilling social obligations. A long-term
orientation includes fostering virtues oriented towards the future, especially perseverance
and thrift, ordering relationships by status, and having a sense of shame.
   In relation to the business context, this dimension can be characterized as in Table 2.7.
   In his study of overseas Chinese, Gordon Redding (1990) shows how Confucian
dynamism works and how the values in this continuum are reflected in the way the
Chinese run their businesses outside China. The companies are owned by the family and
usually run by one dominant family member. They are kept small to enable this family
control to persist since non-family employees are unlikely to have the necessary loyalty to the
enterprise. If such companies decide to co-operate with other companies they do so through
a network of personal relations based on (extended) family members, village, clan or ethnic
group within the Chinese population. The Confucian virtues of thrift and persistence are

                   Criticism of Hofstede’s model

                   The very simplicity of Hofstede’s framework of analysis is seductive: he has come up with
                   a minimum number of dimensions to enable cultural observers and analysts to pinpoint
                   features to which they and their readers can relate. The fact that the results of replicated
                   research often reflect those of Hofstede’s original research has helped to increase his stature
                   in the field.
                       However, since the publication in 1980 of his major work, Culture’s Consequences,
                   Hofstede has been subject to criticism from fellow researchers and from humble mortals
                   who are wrestling with day-to-day problems arising from cross-cultural co-operation in
                   an increasingly global world. As</span><span data-dcnode-id="139" instrument_node=""> criticism has grown, so has the robustness of Hofstede’s
                   reactions to them, aided and abetted by the results of many follow-up research projects and
                   the employment of facts and figures produced by economic institutions to back up his
                   findings. Possibly tired of the occasional but persistent criticism of his work, Hofstede even
                   lists a number of the reservations made about his work in the second edition of Culture’s
                   Consequences in 2001. These deal with the criticism that using surveys to measure culture
                   is unsuitable, that using nations as units of analysis is not the most appropriate, that using
                   only surveys at one company – IBM – as the basis of his research cannot yield information
                   about entire national cultures. Finally, he responds to the reproach made that culture cannot
                   be boiled down to so few dimensions.

32
f                                  Concept 2.1 National cultural dimensions in the business context

   Hofstede counters these criticisms with authority. Surveys are suitable, he maintains, but
should not be the only method used. He agrees that nations are not always appropriate
units of analysis, but they are the only sort of unit available. When it comes to the criticism
concerning the use of data from IBM, he reminds his critics of the detailed and thorough
research methods used, the well-matched samples obtained and the correlations with other
data, including many replications of his research. As for the reproach made that his five
dimensions cannot possibly tell the whole story, his reaction is, basically: if others can find
more dimensions that are independent of those he has devised and which can be validated
– fine. As he puts it: ‘Candidates are welcome to apply’ (Hofstede, 2001: 73).
   Doubts remain, however, concerning a number of aspects of Hofstede’s research in terms
of reliability and validity. A number of critics point out that the respondents could not be
called representative because they were taken from only one location in each country and
from only one company (IBM) and its carefully selected employees. Hofstede, however,
considered this to be an advantage to his research because the company is homogeneous in
nature, and this allowed a comparison to be made of cultural values across the subsidiaries.
By ensuring that respondents to his questionnaires shared one organizational culture as
well as one occupational culture (if their responses were matched), Hofstede believed he
had been able to isolate nationality:
   The only thing that can account for systematic and consistent differences between national
   groups within such a homogeneous multinational population is nationality itself . . .
                                                                           Hofstede, 1991: 252

To make the assumption that there is homogeneity within IBM is, for many critics, a
questionable one, particularly if, as Hofstede maintains, you can separate its organizational
and occupational cultures from the national cultures present. Can one really talk of one
organizational culture at IBM? Hofstede had not investigated this question carefully and
acknowledged in his later work that organizations could contain different types of organ-
izational culture. Even if the idea is accepted of one organizational culture within IBM, is
such a culture, as Hofstede maintains, to do with perceived common practices rather than
the values of the employees concerned? (This issue is discussed further in Concept 2.2.)
Even if Hofstede has matched the results of the survey at IBM on an occupational basis,
can one talk of a homogeneic occupational culture in the company?
   McSweeney is one of Hofstede’s staunchest critics. Pursuing Hofstede’s notion that
‘occupational values . . . are learned through socialization at school or university’ (Hofstede,
1991: 182), McSweeney wonders whether employees from different nations who share
the same occupation can really be said to share uniformity of culture: courses purporting
to deliver similar qualifications can differ considerably between countries as well as within
a country. As for someone in marketing at IBM, McSweeney (2002: 98) remarks that that
person ‘was just as likely to have studied zoology, or anthropology, or French, as “marketing”
itself ’.
   As for cultural homogeneity, McSweeney argues that if it is important for there to be
a sameness in organizational and occupational terms, then the national culture should
display a similar homogeneity. However, the results of the surveys show considerable
variation within the samples in each country. Therefore, according to McSweeney, rather
than talking of cultural uniformity whereby each inhabitant of a nation embodies the
same cultural values, Hofstede can only resort to using cultural average tendencies when
comparing nations.

           (the Flemish region of Belgium) or Wallonia (the French-speaking region) actually declared
           independence from the rest of Belgium (see Spotlight 2.1)?
              In short, the validity and applicability of Hofstede’s model is called into question by
           a number of critics, not only by scholars, but also by practitioners in the field of cross-
           cultural management training who feel uneasy when applying Hofstede’s dimensions to
           ‘the real world’.
              We will return to criticism of Hofstede’s work in Chapter 5 when comparing Hofstede’s
           dimensions with those devised by Trompenaars.




Concept 2.2 Cultural dimensions according to GLOBE

           Many of Hofstede’s findings have been confirmed by those of the Global Leadership and
           Organizational Behaviour Effectiveness research programme, in short, the GLOBE project.
           GLOBE is a long-term programme designed to conceptualize, operationalize, test and
           validate a cross-level integrated theory of the relationship between culture and societal,
           organizational and leadership effectiveness. The first two phases of the project are described
           in House et al. (2004).


            Dimensions of societal cultural variation

           During the first phase of the project, the investigators developed a range of dimensions
           of societal cultural variation, a number of which have their origins in those identified by
           Hofstede. The nine dimensions which GLOBE developed are given in the first column of
           Table 2.8, along with the definition of each. The dimensions were used to examine the
           practices/values construct at industrial, organizational and societal level. This was done by
           asking respondents questions as given in the second column of Table 2.8. These questions
           were first phrased in terms of ‘is’ and ‘are’, so that the responses would indicate actual
           practice, i.e. ‘the way we do things’. The same questions were later rephrased using ‘should’
           and put to the respondents at a later stage to enable a response that indicated the value(s)
           held by each respondent (i.e. ‘the ideal way of doing things’).

                    Conclusion

                   This chapter has explained the cultural dimensions of Hofstede and the relationship between
                   national cultural values and those of organizational cultures. It has also outlined the many
                   criticisms of Hofstede’s research method, particularly the reliability and applicability of
                   the findings. The chapter has also explained how the researchers involved in the GLOBE
                   project have expanded this five-dimension model to eighteen and used a survey method
                   which allows for a better understanding of the relations between organizational practices
                   and social values.

                   The significance of Hofstede’s fifth dimension – short-term and long-term orientation – has
                   also been described. This dimension is of special significance bearing in mind the increasing
                   importance in current business of the relations between the Western countries and those
                   in the East, especially China.

Ants, those masters of collaboration, have made their species some of the most successful on the planet.
In contrast, tigers walk alone, and are in grave danger of extinction. The message for business is this: in the
modern world, we must collaborate or die.
   Too often, however, in many UK companies, successful collaboration – both internal and external – happens
by accident rather than design, contrasting vividly with many overseas rivals.
   There are good reasons why effective collaboration is growing rapidly. Business operations are becoming
steadily more flexible at every level of the organization. Non-core activities are outsourced, and procurement
has become a worldwide activity centred on China. Satisfying customers at home demands an unprecedented
level of co-operation unimpeded by rigid hierarchies and departmental boundaries.
   Flatter organizations depend not on authority but on teamwork for effective action, and networks of indi-
viduals may stretch halfway round the globe and connect only electronically. The truly multinational executive,
able to work effectively anywhere in the world with any nationality, remains a rare beast, and ordinary staff
therefore need to understand and learn from different cultures to achieve the right level of collaboration.
   A foreign joint venture or alliance, for example, may be agreed in Mumbai with great enthusiasm at board
level, but the hoped-for results will only materialize if operating staff at all levels in Birmingham are ready
and able to work with their opposite numbers.
   Nationality, religion or corporate culture may be the big hurdle, but it is important to also realize that even
within the same organization wider cultural gaps can exist between, say, R&amp;D and finance as between the R&amp;D
teams of two partners. Wherever it occurs, the failure to understand can be disastrous. Rover is a tragic example.
Back in the 1980s, when shop-floor collaboration in the UK car industry was near zero, Rover nonetheless
managed to form a partnership with the Japanese group Honda to fill its vital new model programme.
   But the arrogance of the Rover managers and the lack of a learning culture prevented them from obtain-
ing the real benefits of the relationship, according to Professor Lord Bhattacharyya, head of the Warwick
Manufacturing Group. Later, in 1992, when BMW bought the Rover business, communication with the German
managers was even worse (exacerbated by political infighting on the German side).
   Failure was the inevitable and bitter result. No doubt, ex-Rover patriots today will see the somewhat similar
collapse of the DaimlerChrysler link as salve for wounded pride. Rather like Rover, DaimlerChrysler was dogged
by poor collaboration and infighting, which stemmed in part from national cultural differences and traditions
between German and US managers.

   The outcome in both cases will have come as no surprise to Professor Geert Hofstede, who 30 years ago
pioneered the study of cultural diversity in 56 countries using IBM’s worldwide database. He has since been
joined by others, notably a fellow Dutchman, Fons Trompenaars, and the American Craig Storti.
   Interest in their work is currently reviving after some big companies, including IBM, found that trying to
impose a single corporate culture around the globe did not lead to better collaboration.
   Two of the five ‘cultural dimensions’ that Prof Hofstede derived from his database go some way to explain-

numbers at Rover and Chrysler respectively.
   One is individualism, defined as the degree to which ties between individuals – family as well as business
colleagues – are loose or tight. The UK score as assessed by Prof Hofstede is 89 out of a possible 100,

European average at 67, but Japan scores 46.

unstructured environments – the Japanese score 92, the Germans 65, the Americans 46 and the Brits 35.
In real terms, the lack of precise rules and procedures at Longbridge, Rover’s main factory, may have made
the BMW team uncomfortable from the outset.
   The cultural guru’s great contribution may lie less in detailed analysis of deeply held cultural attitudes and
more in helping companies anticipate and understand behaviour patterns that their foreign managers may
display in their home territory, and the different patterns that they display when transferred to the UK.
   As immigration grows, and London expands even further as an international financial centre, it becomes
an important skill to be able to work effectively with and through executives of widely different backgrounds.

Concept 3.1 European cultures

           Europe is generally considered to be a community that is neither racially nor linguistically
           based but rather one founded on the events of history. French historian Jean-Baptiste Doroselle
           (1990) states succinctly : ‘History has created a real Europe’.

 46
f                                                                                  Concept 3.1 European cultures

                   Although traditionally designated as one of the world’s seven continents, its identity has
                never been clearly established either culturally, politically or geographically. As this chapter
                will show, Europe’s eastern borders in particular remain somewhat arbitrary. Not having
                ever been a stable, autonomous entity, Europe has been portrayed in many different ways
                down the ages according to the cultural and political relations prevailing.
                   The most recent development in terms of relations within Europe is the European Union.
                Originating as a common economic market that allowed a number of (West) European
                countries to trade fairly, it has developed into a body with common institutions at economic,
                socio-cultural, and political levels to which the member countries have delegated some of
                their sovereignty.

    Despite the domination of Rome and the predomination of Christianity over centuries,
despite increased co-ordination and co-operation between European countries, and despite
shared representation and legislation, cultural differences between regions and countries
have not been eradicated. Cultural values of a society are still being handed down from
generation to generation in the same way as those of an individual. Some shifts may occur
over time, but clear cultural differences still survive. Indeed, the case can be put forward
that as a result of its increasing membership, the EU is becoming more heterogeneous.
    Some historians have maintained that a much more united Europe existed in the early
Middle Ages (from around the fifth to tenth centuries) when a number of its countries shared
common features of a feudal society. With no strong central authority, political power was
dispersed among lords who in turn granted vassals authority over particular lands. Those
peasants who tended particular landholdings were obliged to supply the lord with labour
and/or part of the land’s output. This was a system essentially based on man-to-man relations,
the one depending on the other, in an agrarian economy with limited money exchange.
    As Morin (1987) declares, the political and cultural Europe of today is the result of the
disruption of this feudal system and the ensuing conflict. This, as well as its Greek, Roman
and Judeo-Christian streams in its culture, is what makes Europe unique.
    The regional differences mentioned earlier have a lot to do with the influences that
events in history brought to daily life. The Roman Empire with its strict hierarchies and
its codified system of laws was one; the invasion of the Vikings who maintained local,
largely independent communities with their own laws and hierarchies was another.
These two influences will be the starting-point of an overview of the differences between
European clusters.


Latin, Northern and Western Europe

Latin Europe
Managing and organizing in societies characterized by Romance languages close to Latin,
by Roman-style legal systems and strong Roman Catholic churches still differs from other
societies where the Romans held little or no sway. The Roman Empire had the greatest effect
on countries below the river Rhine. In Latin Europe, there is a more personal approach to
managing and organizing. There may be a highly developed bureaucracy present in Latin
countries, but the layers of hierarchy and the procedures involved in getting things done
are so formalized that working round them is quicker and in the end more efficient. That
is why there is a reliance on family and personal relationships and connections to work
around the system, to bend the rules.
   Nevertheless, the boss is the boss, and the authority of that person rests on the need
of a country’s people for strong rule. There is often a tension between this dependency on
and loyalty towards authoritarian figures and a distrust of authoritarian systems in general.
Prominent figures may exploit this tension by showing their ability as leaders to impose
their stamp, their will on unwieldy closed hierarchies.
   As Boisot indicates (1993: 222) in his article on management in Spain:
  The need for a strong leader and a hierarchical leader, however, does not necessarily
  give the enterprise manager the kind of mandate that would allow him to play a proper
  co-ordinating role.

                       Managers lack the legitimacy to perform their role effectively and can be perceived as
                   devious exploiters of the economic system. This problem of managerial legitimacy is one,
                   he believes, prevalent in Latin culture because the economic dimension is perceived to be
                   little more than an expression of the political culture.
                       In her book on Italian management, Vidal (1992) distinguishes two types of business
                   leaders in Italy. A company is run by two people, a couple as it were, who share each other’s
                   confidence and complement each other. The one plays the role of leader and spends most of
                   his time with external contacts in search of information that will allow him to adjust com-
                   pany objectives. While doing so, he keeps an eye on what is happening inside the company.
                   The other assumes the role of manager in the traditional sense, focusing his attention on
                   what is happening within the company while still keeping an eye on the world outside.
                       A leader in France, however, is alone at the top. Such power involves not only fulfilling
                   contractual obligations, but also preserving the status of the position. If he is not moderate
                   when enacting his power, if he lacks breadth of vision or is seen as mean-minded, then he
                   is seen to belong to what Segal (d’Iribarne et al., 1998) calls the category of ‘little bosses’.
                       Unlike the other countries in Latin Europe, France was formed by a wide range of peoples,
                   consisting at the start mainly of Celts (the Gauls), Romans and Germans (the Franks). The
                   country came into being after the separation of Francia Occidentalis (the West Frankish
                   kingdom, now France) from Francia Orientalis (the East Frankish kingdom, now Germany).
                   In the eighteenth century, France became the model of European culture, not only through
                   the dissemination of the universal values – liberty, equality and fraternity – proclaimed
                   during the French Revolution, but also through its language. It is perhaps the historical
                   role of France as the upholder of universal cultural values that has made it reluctant to
                   envisage a plurality of cultures, or to talk of one culture for one people. Nevertheless, the
                   term ‘culture’ in France is applied to the description of customs relating to certain profes-
                   sional, social or regional categories. Even the French talk, for example, of ‘French-style’
                   bureaucracy when describing the friction between two professional categories within a
                   state-owned enterprise.
                       In short, the French idea of universal culture and its concept of a unity of cultural com-
                   munities within French society, contrasts strongly with the notion held in other European
                   countries of a national culture essentially based on compromise (d’Iribarne et al., 1998).
                       Examined in terms of the cultural dimensions put forward by House et al. (2004), the
                   Latin European cluster is characterized as being low in terms of humane orientation practices,
                   although humane orientation scores in terms of values more closely resemble those of
                   other European clusters. This humane orientation construct addresses the degree of con-
                   cern, tolerance and support extended to others. As a cluster with low humane orientation
                   practices, self-interest is high, as is lack of consideration for others. However, in terms of
                   consideration for family, the countries concerned are collectively inclined, showing greater
                   loyalty and cohesiveness to their family. As will be seen later in this chapter, when looking
                   at Latin America, the family concern is even more in evidence in the Latin countries of the
                   New World.


                   Nordic Europe
                   The presence of the Vikings who swept down from Scandinavia and occupied parts of
                   northern Europe is still felt. They helped to reinforce the contrast between the cultural
                   characteristics of the Northerners and those of the Roman Empire. They had no over-riding

hierarchy, no elaborate systems of control. Instead, they maintained large independent
communities, each with its own laws and governing bodies.
   The Viking heritage of self-sufficiency, fairness, egalitarianism and democracy is reflected
in the way present-day business is carried out in Scandinavian countries, i.e. in Norway,
Sweden, Finland and Denmark. In most companies, bosses are seen more as team leaders
and group facilitators as opposed to being decision-makers who delegate tasks to others.
As such, employees are often encouraged to express their opinions freely at meetings and
everyone’s opinion is given consideration when making decisions. However, the final decision
often lies in the hands of the team leader.
   The countries of Nordic Europe share one distinctive feature – their approach to authority.
Their inhabitants do not regard those in authority as remote persons whose word is to
be accepted unquestioningly. They face up to them, question their decisions and expect
to be consulted on issues affecting them. Those managing and being managed are less
far apart socially than in Latin Europe, with more emphasis put on the job being done
than the position in the hierarchy. Managers are not regarded as being expert in all matters
but are expected to make effective use of the expertise among their co-workers. These
characterizations are reflected in the position of Nordic European countries on the cultural
dimensions relating to power distance as devised by both Hofstede (1993) and the GLOBE
project (as described in Chapter 2).
