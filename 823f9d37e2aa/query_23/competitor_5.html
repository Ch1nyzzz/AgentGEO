                     Nevertheless, as Thévenet (1999: 10) remarks, the cultural element in companies is to
                  be found everywhere: ‘In all our investigations, not one company has ever showed itself
                  to be interested in culture per se, but everybody works on culture to resolve concrete
                  problems: problems of strategy, mergers, mobilization of the staff, reorganization, even
                  communication.’ This explicit attention to culture is all the greater when a company is
                  operating across borders.
                     This does not necessarily mean, however, that the cultural problems occurring in
                  mergers are related solely to national cultures. This is confirmed by Trompenaars (2004)
                  when describing the Sony/Philips alliance: the problems that had arisen were less to do
                  with differences in national culture and more to do with the strong market orientation of
                  Sony coming up against the technical orientation of Philips.

204
f                                                            Conclusion and Points for reflection

   Nevertheless, it remains obvious that those advocating a merger of some kind often
underestimate the differences in the local cultures that have been brought together under
one roof. Moreover, they tend to ignore the cultural confrontations that take place and which,
in many cases, provoke resistance to any changes on both sides. This resistance is often the
manifestation of collective fears intrinsic to the merger or takeover. These fears are often
justified, because not only does the organizational culture change, but also the company’s
strategy. That is why any change needs to be managed carefully in such a way that the fears
can be identified and monitored. The phenomenon of change in relation to culture will be
developed in the next chapter.



 Conclusion

This chapter has dealt with the close relationship between the organizational culture and
the corporate strategy of a company. The organizational culture is actually a part of the
strategy in the sense that it influences not only the formulation of a strategy, but also the
way it is implemented in the company. Furthermore, as Schneider and Barsoux point out,
in the process of strategy development lie the same levels as in culture: artefacts, values
and assumptions.

This relation is particularly obvious in mergers and cross-borders acquisitions since both
involve not only the companies themselves, but also their cultures. Companies may well
believe that such actions offer a strategic way of dealing with globalization, but more often
than not fail to take into account the cultural problems inherent in the emergence of a new
culture in the new organization.



 Points for reflection

1. Strategy is often linked to change. Globalization compels companies to internationalize,
   so they must choose a strategy that enables them to remain competitive in the global
   market. Strategy is also linked to the future. It is a question of choosing strategies
   appropriate for enabling them to achieve long-term objectives. Having to face an
   environment often perceived as hostile and unstable, a company needs to redefine its
   strategy, to give it a new orientation.
  Are these attitudes towards strategy common to all companies?
  What role can culture play in defining strategy?

2. What is important in the process of creating a global culture is dealing with diversity,
   opposite poles and the complementarity of ideas. This means that the creation of a
   global culture in cross-border organizations has to do with the opposition between ideas.
  The question therefore arises: how can the local cultures of two organizations with
  their different forms of logic and principles be united while ensuring that their duality
  is maintained?

ACTIVITY 9.1

Shell’s reorganization
In 2005, two companies, Royal Dutch Petroleum Company and Shell Transport and Trading Company
merged to form one company: Royal Dutch Shell plc.

Read the two articles below. These describe the developments in the organization of Shell. Then
answer the questions that follow.


Our strategy in action: Creating the culture and organization to deliver
We have made significant progress in changing our culture and organization to ensure that we can deliver
our strategy. The unification of the parent companies under Royal Dutch Shell plc in 2005 has provided us
with a clearer, simpler, more efficient and accountable form of governance.
   The chief executive now reports to a single board comprising 10 non-executive directors and five
executive directors and a key advantage of this single, smaller board is that it provides a very clear and
direct line of accountability to shareholders. Royal Dutch Shell now has a single headquarters in The Hague
(the Netherlands). The centralization of a number of activities in the headquarters is helping to reduce
duplication and helping us to operate in a more streamlined and efficient way.
   The structural changes are also helping to reinforce our work to simplify and standardize many of our
business processes. In particular, the integration of the oil products and chemicals businesses into one down-
stream organization has so far been very successful in creating a more dynamic, responsive and effective
organization. We have seen particular benefits at sites which contain both refineries and chemicals manu-
facturing plants.
   By sharing services and integrating their activities we can operate much more efficiently. It also means
we have been able to share and adopt best practice more quickly and so improve operational performance.
                                                Source: Royal Dutch Shell 2005 annual report, www.shell.com/annualreports.



Marriage after a century of cohabitation: Shell prepares for the                                                    FT
next merger round
On the top floor of London’s towering Shell Centre, a cavernous boardroom looms over the Houses of
Parliament, filled with high-backed chairs and rows of angled microphones. For decades, British and Dutch
directors from two separate companies have held eight ‘conferences’ a year, alternating between there and
the Netherlands, to decide on the business of Royal Dutch/Shell Group. But if shareholders today approve
the most radical restructuring in its history, the London room will fall into disuse. Instead, board members
will assemble each time in the more intimate surroundings of a gabled building topped by a clock tower in
The Hague.

                                                                                                                    207
fChapter 9 Culture and corporate strategy

   After nearly a century of quirky cohabitation, shareholders of Royal Dutch Petroleum and Shell Transport
and Trading will today be asked to approve the formal marriage of the two, which together make up the
world’s biggest publicly traded oil company after Exxon-Mobil and BP.
   The union will put the relationship on a new footing and fundamentally alter the way the company is
governed. Shell’s eccentric corporate governance structure – long a source of befuddlement to outsiders –
will be scrapped in favour of a modern, ‘Anglo-Saxon-style’ system designed to bring it into line with Exxon
and BP, its more successful rivals.
   Executives say the shift represents a dramatic transformation of the company’s conservative and
consensus-driven culture – changes they say are badly needed if it is to compete in a rapidly changing oil
industry. But critics ask why it took them so long to accept the need for change and why Shell had to be
forced into it by shareholders following a scandal last year in which the group was forced to slash what it
had recorded as proved reserves of oil and gas no fewer than five times. That reduced the level of reserves
by one-third, led to a boardroom purge and brought $150m in fines imposed by US and British regulators.
Investors question whether the merger will do enough to alter the ponderous way in which the group
operates.
   ‘We changed a lot of the culture of this company,’ insists Jeroen Van der Veer, appointed as Shell’s first-ever
chief executive following the reserves scandal and the decision to streamline the group. A soft-spoken Dutchman
with a kindly manner, Mr. Van der Veer – still eager to show that he and the other executives have taken a
firm grip following one of the worst crises in its history – adds: ‘We were very much a “bottom-up” company.
Now there is certainly more direction from the top. I try to give very high clarity on where to go.’
   He makes it clear that the direction the group is headed will include takeovers. Shell had missed out
on the wave of mega-mergers in the late 1990s that saw Exxon merge with Mobil and BP buy Amoco.
The failure to participate was prompted largely by a prediction that oil prices would remain low – at about
$10 a barrel instead of the $60 seen today. But Shell’s dual structure also meant it would have been hard
for the group to use its stock as currency to finance takeovers, as its rivals were doing.
   With today’s high oil price, the cost of any deals is much higher. But Mr. Van der Veer says the company
must be ready for the next wave of consolidation in the industry. ‘If you study – and I do that fairly regularly
– the last 100 years of the oil industry, it is one long story of consolidation,’ he says. ‘So you [had] better
[be] prepared. You must have the tools in your toolkit.’
   The necessary tools were absent when the reserves crisis hit. Shell seemed paralyzed. It took some measures
to improve the way in which it booked reserves and addressed other compliance issues. But investors were
unhappy about the speed at which it was moving after Mr. Van der Veer and his new team took over in March
last year. Advisers intervened on behalf of large institutional investors to try to press their views about the
need for a thorough overhaul of the company’s structure. Shareholders wanted an end to the company’s
dual-board system which, they maintained, hamstrung the company with a cumbersome decision-making
process and obstructed accountability.
   At first, the group resisted the calls. ‘They thought the structure was doing well and when the reserves
debacle hit, to some extent they were in denial,’ says one senior adviser to the company. ‘They quickly went
away from that into a phase where I quite frankly realized they didn’t know what to do.’
   Shell had periodically considered altering its structure, most recently during the 1990s. At that time, the
company was doing well and there was little support for change. But things had now changed and reformers
saw their opportunity.
   Two broad options were on the table. The first was to create a single unified board while maintaining
separate Dutch and British companies – a so-called ‘dual-header’ company such as Rio Tinto or BHP Billiton.
This choice represented a tidying-up of the existing arrangement and had the advantage of being easier
to do. But the big-bang approach of a full merger had the virtue of simplicity and would do away with the
complex corporate structure that so bothered investors.

208
f                                                                                                                     Activity 9.1

    Any changes also had the potential to upset the delicate balance of power within the group that had existed
for 98 years. Royal Dutch was in the ascendant when they joined forces in 1907. The then troubled Shell side was
forced to join up with Royal Dutch on somewhat humiliating terms – a 60/40 split in the Dutch company’s favour.
    Under the new plan, however, the merged company will be incorporated in Britain and listed on the London
Stock Exchange. ‘For some people in the Netherlands, seeing by far the largest company in the Netherlands
become a plc with its primary listing in London is quite a difficult issue,’ says one director.
    To offset the perception that it is becoming too British, the company will be headquartered in The Hague
and will be a tax resident of the Netherlands. The 60/40 split will also be maintained. A senior adviser to
the company says: ‘The idea was to try to preserve the Anglo-Dutch heritage in as many ways as possible.
There was a tax advantage to having the headquarters in The Hague, which made no sense to give up. To
the extent that you needed to pacify political interests in the Netherlands, that clearly served the purpose.
Equally, having a UK listing played to the UK gallery.’
    Shell executives insist the changes are not cosmetic. Mr. Routs, head of downstream operations, says he
is already seeing tangible benefits. ‘If I compare differences in the team in terms of operating, it is night and
day,’ he says. ‘We are now a more transparent, supportive, action-orientated executive team that makes things
happen. There is not a lot of consensus-seeking in the old way of expressing it. We come to conclusions
faster. We come to deals faster.’
    The reorganization of the company would not have happened without the reserves crisis, many believe. But
Shell still does not accept that the reserves crisis was a result of its management structure. That has left investors
baffled. If there is no connection between the reserves crisis and the structure, then why change at all? Conversely,
if much of what is proposed is ‘common sense’, as Mr. Routs now says, then why was it not done sooner?
    Some believe that the directors of Royal Dutch/Shell agreed to the restructuring not because they really
believed in it but as a sop to disgruntled investors. As a senior adviser to the company says: ‘The reserves
debacle had seriously dented shareholder confidence and I suppose [the big-bang approach] was ultimately
also a way of demonstrating to shareholders that we can deliver.’
    At the height of the scandal last summer over the level of oil reserves it had booked, Jeroen Van der Veer,
the group’s lead executive, held a number of meetings with shareholders in the US, The Hague and the City
of London. The discussions centred on investor demand for a structure that would foster accountability and
transparency in decision-making.
    Investors say it took several meetings for Shell executives to accept that the status quo was not an option.
A year on, investors hope the combined structure will help prevent any future scandal. Few are entirely
satisfied, though, and remain watchful lest Shell slip back into its secretive previous ways.
