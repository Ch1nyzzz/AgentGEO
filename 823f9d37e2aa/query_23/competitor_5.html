                   The Anglos
                   The term ‘Anglo’ is an abbreviation for ‘Anglo-Saxon’, which is used to describe people
                   from the British Isles as well as those who emigrated to North America and Australasia.
                   The latter will be dealt with once the Anglos have been characterized in the European
                   context.
                      It was Anglo-Saxon tribes – the Angles, Saxons and Jutes – who, along with other tribes
                   from Northern Europe, settled in large numbers in ‘Britannia’, the province that the Romans
                   had established on the lowlands of the British mainland and later abandoned. With the
                   eventual consolidation of the various settlements and kingdoms, this area became known
                   as England. England eventually became the dominant part of a larger political entity, now
                   known as the United Kingdom of Great Britain and Northern Ireland, which includes
                   Wales, Scotland and Northern Ireland. The use of the term ‘British’ reflects the union of
                   these peoples and the amalgam of elements that constitute their culture.
                      Using Hofstede’s cultural dimensions, the British can be characterized as having less
                   power distance and lower uncertainty avoidance than their European neighbours, while at
                   the same time being more individualistic and more ambitious/aggressive than their counter-
                   parts on the continent.
                      The relaxed British approach to management contrasts strongly with the Latin and
                   Nordic approach. Although bureaucracy is the most common form of organization, and
                   instrumental in creating Britain’s economic success in the nineteenth century, the British
                   handle it in a very pragmatic way. As Hickson and Pugh (2001: 50) indicate:

                      Characteristically, they balance its potential rigidities by day-to-day pragmatism, working
                      things out as they go along, rather than taking bureaucratic prescription too far. They do
                      not try to manage uncertainty by issuing regulations and declarations, of which they are
                      sceptical. Hence it has been said that the British see an organization as a ‘market’ in
                      which people negotiate what has to be done.

                      This ties in with the very individually oriented nature of the British. The job is a job,
                   regarded as separate from one’s personal life, a task to be performed impersonally. This can
                   be seen in the way personnel are selected. Although the selection process may appear the
                   same across European countries, the emphasis in Anglo-Saxon cultures, as Hoecklin (1995)
                   notes, is on the extent to which the individual concerned can contribute to the tasks of the
                   organization. That is why, according to her, it is normal for intelligence and skills to be
                   measured and assessment centres to be employed.
                      Compared to other European countries generally, Britain is reluctant to invest in training
                   for the longer term. The very nature of its deregulated liberal market economy, where the
                   goal is maximization of profit in a relatively short time, entails less consideration being
                   given to the employment needs in the longer term.

Anglosaxonization
This focus on short-term profit in a deregulated environment, prevalent in Anglo-Saxon
countries, including the USA, is deplored by many countries in present-day Europe.
Political leaders of some EU countries often use the term ‘Anglo-Saxon’ when referring
to the increasing commitment among the newer members of the EU to profits and free
markets at the expense of social responsibility. These leaders are afraid that the social
fabric of their countries will crumble through the increasing predominance of market
forces. This anxiety reflects the wish of some of them for the EU to develop into a tight
body of nations with a serious political commitment, rather than just being a sophisticated
free trade area with an unambiguous legal and financial framework.
   The different attitudes to the EU as reflected in economic policy reflect explicitly or
otherwise, cultural norms and values. To what extent, for example, can those countries that
prefer state institutions to have significant influence on their economy work together with
countries that prefer minimum state interference in the workings of the market? So-called
rational arguments used in policy discussions are often based on the distinct preferences
shared by the inhabitants of a country, preferences which may or may not be shared with
other countries. This applies also to the future expansion of the EU. Fear has often been
expressed of a ‘watering down’ of cultural identities as the EU expands further east, and this
in turn has raised the matter of whether Europe itself has a cultural identity that must be
preserved or protected.

Eastern Europe
A big influence on East European cultures has been the Russian Empire and the Soviet
hegemony. The post-revolution regimes in particular had a profound effect on Eastern
European countries. Before the Iron Curtain eventually fell, countries under Soviet sway
were characterized by highly autocratic, centralized organizations with many bureaucratic
levels, reflecting the presence of a dual hierarchy (politics and business worked hand-in-hand)
and an obsession with state planning. The legacy of the communist system of administration
is what the societies of East and Central Europe have had to contend with since the early
1990s, when Western political and economic practices were introduced. The transformation
of highly bureaucratic and centralized economies has taken much longer than anticipated. The
withdrawal of centralized control has increased feelings of uncertainty and helplessness.
Individuals and companies can no longer rely on the ‘system’ to help them out; instead they
must battle their own way through, develop self-confidence and learn how to deal with
a more open, less merciful environment. This transition has, however, caused considerable
unrest, and there is still a longing for how things used to be among those unwilling to adapt
to the new environment. As Schneider and Barsoux (1997: 101) report:
  Despite the prevailing wisdom that organizations need to be less hierarchical and more
  flexible, some [eastern European] managers argue that faced with competitive threats and
  conditions of economic decline or instability, greater centralization and stronger controls
  are needed.

    The opportunity to take on roles and responsibilities similar to those of their Western
neighbours is still seen as a threat, especially by those who grew up and worked under the
old regimes.
    With the political collapse of the Soviet Union, 15 republics emerged, of which Russia
is the largest. This ‘new’ country, which spans Europe and Asia, has also been struggling
since 1991 to replace the social, political and economic features of the Communist era with
a more democratic political system and a market-oriented economy. Close association with
the EU is seen as an important way of developing the Russian economy, but membership
is a step too far for many Russians who fear their independence being swallowed up in a
greater Europe. Furthermore, the same question arises which is troubling those dealing
with Turkey’s potential membership of the EU (see Mini-case 3.1): is the country really
a European nation? If, in geographic terms, the border of Europe is considered to be the
Urals mountain range, can that part of Russia to the west of the Urals, and where most
of the population is centred, be considered as ‘European Russia’? Mikhail Gorbachev, who
as president of the USSR set many of the reforms in motion that led to the dismantling
of the country, pleaded for the building of a ‘common European house’. Although the

  A tale of two Russian factories
  It takes less than 10 minutes to drive from Avtovaz, maker of Lada cars, to its joint venture with
  General Motors. But to make the journey feels like crossing the border between the Soviet Union
  and the West 20 years ago.
       On one side are grey and crumbling concrete factories, military-style security and unsmil-
  ing workers. An office block towers over the plant, with a top-floor restaurant reserved for
  managers.
       On the other is a modern-looking factory, with low-key security, welcoming workers in blue
  overalls and a canteen where managers and workers eat at the same tables.
       Workers in both places are Russian and live in the same city. But one factory is stuck in the
  Soviet era while the other is part of the modern world.
       Inside, the differences do not lie in technology: Avtovaz has a new assembly line, equipped
  with the latest German and Italian machinery, to produce its slick-looking Kalina model. But as
  one foreign executive puts it: ‘What these guys do not understand is that it is not about a car,
  it is about people. Spending $5bn or even $10bn in the same environment will not make a good
  carmaker.’
       The real distinctions between Avtovaz and its joint venture lie in management approaches
  and relations between managers and workers. ‘Here everything is different: the work culture, the
  discipline, the attitude,’ says Evgeny Berezin, assembly manager at GM-Avtovaz. ‘You can build
  the same factory as the one here, but it is all in the mind,’ he adds.

Concept 3.2 American and Australian cultures

                    The previous concept referred to ‘Anglosaxonization’, the increasing focus within the EU
                    on profits and free markets, and the concern that such a development was diminishing
                    the sense of social responsibility inherent in many European countries. This concept will
                    examine the Anglo-Saxon approach to business outside Europe, in the US, Canada and
                    Australasia areas of the world, where large numbers of immigrants from the British Isles
                    (including Ireland), as well as other west European countries such as France and Italy, set up
                    home and business. The strong common values of the Latin cluster will also be described,
                    as well as the profound social change which Latin America is undergoing as a result of the
                    influence of industrialization on these values.

                    Anglo-America
                    The term White Anglo-Saxon Protestants or WASPs is the term often used in North America
                    to describe the people who made up most of the population of the USA when the country
                    was still in its infancy. The values which these people took along when they emigrated have
                    had a significant influence on the shape of US culture.
                       The original settlers in North America brought with them what Max Weber referred to
                    as the Protestant work ethic. In his influential book The Protestant Ethic and the Spirit of
                    Capitalism, first published in German in 1905 and translated into English in 1930, Weber
                    studied the psychological conditions underpinning the development of capitalist civilization.
                    He argued that modern capitalism was born from the spirit of Christian asceticism in its speci-
                    fically Protestant form. He saw a link between the self-denying ethos of the Protestant sects and
                    the behaviour patterns associated with capitalism, above all those to do with hard work.
                       Although this work ethic is considered by some observers to be dying a slow death in
                    Europe, it is still regarded as being a driving force within US business. The many immigrants
                    who followed the early settlers were not all in any sense Protestant in their religious beliefs,
                    but they adopted the ethic. They too became intent on achievement and improvement, on
                    realizing the ‘American Dream’. This explicit determination to build a society on such ide-
                    als reflects the comment made by Margaret Thatcher, UK Prime Minister from 1979 to
                    1990, that ‘Europe was created by history. America was created by philosophy.’
                       The parameters for realizing such a dream were consciously developed by the US founding
                    fathers when they were deciding on how society was to be organized. Rejecting the privileges
                    from which many of the immigrants had wished to escape, they adopted the principle of
                    equality, as reflected in a number of institutions which checked and balanced each other.
                    The president was to check the power of Congress and Congress to check the power of
                    the president, and the Supreme Court to check the power of both by referring to the rule-
                    book of the Constitution. These rules must also be applied in the same way to the drive
                    for individual achievement, the competitive and aggressive will to succeed in business. The
                    US constitution, as interpreted by the Supreme Court, guards the rights of the citizen,
                    determines whether businesses are operating against the interests of the individual. As the
                    reporter and broadcaster Alistair Cooke (1973: 145) pointed out:
                       [The justices of the Supreme Court] . . . look at the old stately document and decide whether
                       you can, say, run an undertaker’s firm and also hold stock in an insurance company . . .
                       whether a public bus company can compel you to listen to piped music . . .

    Within companies themselves there are strict rules and procedures to be followed. The
‘impersonal organization’ is predominant, just as in other Anglo countries, with a clearly
defined hierarchy. This is not to be seen as inflexible, however. Just as the constitution can
be ‘interpreted’, so can the rules and regulations. A common sense, pragmatic approach is
needed to deal with uncertainty. Hickson and Pugh (2001) refer to the US organization as
a ‘negotiated order’. There may be a clearly defined hierarchy with explicit responsibilities
for all concerned, but those higher on the ladder can be addressed by those on the lower
ranks and the rules questioned. After all, the overriding concern is the advancement of the
company; without it, self-advancement is itself in danger.
    A strong, shared commitment among a company’s employees allows for considerable
delegation and decentralization to be established more easily. This makes it easier for a
company to contend with uncertainty and allows for an attitude towards the vicissitudes of
the market that is more relaxed than in other ‘Anglo’ organizations. Thriving on competition
is a feature: strong competition keeps a company on its toes and encourages innovation.
    A vital indicator of success for US businesses is the ‘bottom-line’. Although financial
results are crucial to all Anglos, Americans are much more concerned about the bottom-line
in the short term. This attitude engenders considerable criticism, especially among those who
believe that investments of whatever kind often need time to bear fruit. On the other hand,
US companies are continually aware of the interests of shareholders. Money engenders
money, and time is the key instrument. Time must be harnessed as effectively as possible
to enable progress, advancement and continuing commitment to the company.
    One clear difference that is frequently referred to when British and American businesses
are being compared is the way they look at the future. The general optimism prevalent in
US business concerning the future – and future success – is said to contrast strongly with
the more nuanced view of British business about future developments.

Canada
Canada, originally the territory of the Indians and Inuit, was first explored by the French
who set up their first colony around Quebec. The British also set up colonies and it was
they who eventually took control of Canada through settlement and warfare.
   Canada became independent in 1867, but still maintains within its borders clear French
Canadian and Anglo-Canadian identities. This has frequently led to political clashes between
the two communities. Although French and English are the two official languages of Canada,
the province of Quebec has the majority of French speakers and it is they who almost
succeeded in getting the province separated from the rest of Canada in 1995.
   Anglo-Canadian society, i.e. Canadians who are not French-speaking, comprises not
only those of British origin, but also many continental Europeans and Asians, particularly
Chinese. However, their ways are Anglo, including the way they manage. Despite what many
Canadians consider to be the overbearing presence of the US their style of management is
more British in the sense that it is less formalized, less driven by individual goals and more
aware of society as a whole. This is particularly important in a country that is proud of
being a ‘mosaic’, in which different cultural groups tend to be socially intact and maintain
their cultural identities, rather than being a ‘melting-pot’ as the US claims to be.
   Two multicultural tests that Anglo-Canadian business people undergo relate to getting
on with the neighbours. Dealing with French Canadians entails coming to terms with
Latin attitudes to management, to a world where schedules, memos and agendas are less
adhered to, where conviviality and connections are more important than time-planning

Australasia
Australia and New Zealand were both colonies of the UK. Britain claimed Australia as a colony
in 1788 and New Zealand became a separate UK colony in 1840 after first being administered
by the Australian state of New South Wales. The lives of the early inhabitants of this remote
part of the world, the Australian Aborigines and the New Zealand Maoris, were irrevocably
changed by the European settlers. In Australia these were first convicts from the UK and later
free immigrants. In New Zealand these were predominantly UK whalers and traders.
   When both countries became independent of the UK, they still retained their essential
Anglo-Saxon identity. Further waves of British migrants were welcomed with open arms,
while other Europeans of non-British origin were expected to shed their particular cultural
identities and integrate with the host population. Australia, however, has been the first to
acknowledge the increasing ethnic diversity created by more recent waves of immigration
from other non-European countries, particularly from countries in South-East Asia. The
country now sees multiculturalism as being at the heart of its society. The Australian govern-
ment states explicitly on its website:
   Australia accepts and respects the right of all Australians to express and share their
   individual cultural heritage within an overriding commitment to Australia’s democratic
   foundations and to English as the national language.
                     www.dfat.gov.au/facts/culturally_diverse.html, accessed 1 September 2010

   New Zealand now has a predominantly European population, although immigration
policy has focused more on the micro-states of the South Pacific and, most recently, on
migration flows of professionally qualified South Africans and East Asians. A prerequisite
for selection for immigration is still proficiency in English.
   The business culture in Australia and New Zealand remains very much Anglo-Saxon in
nature. However, the work environment tends to be more collaborative than in the UK or US,
which means decision-making can be rather slow and drawn-out. The typical hierarchies are
in place in most organizations, but since there is a general distrust of authority, particularly
of people who tend to ‘flaunt’ it, a modest, egalitarian approach is preferred when colleagues

Latin America
The Latin American cluster lies next to the Latin European cluster in the GLOBE clusters
of cultures in Chapter 2 (Figure 2.2). As happened with the Anglos emigrating to America
and Australasia, the arrival of conquistadores/colonists from Spain and Portugal, and to a
smaller extent from France, brought their cultures to Central and Southern America, and
implanted them in foreign soil. The common linguistic, cultural and religious heritage is still
strong and is seen in the many activities shared between the ‘mother country’ Spain and its
former colonies, ranging from intensive trade to football tournaments. Similar cultural ties
are also to be found between Portugal and Brazil, which was a Portuguese colony before
being given independence in the nineteenth century. Portuguese is the official language,
and economic, social and cultural ties with the European ex-ruler are still strong.
   The term ‘Latin’ is believed to have been devised by the French in the nineteenth century
to reflect the difference between Anglo-Saxon North America and Spanish/Portuguese South
America. The term allowed for France, also a Latin country, to claim a role in the develop-
ment of a continent where a number of countries were demanding independence from
their Spanish masters.
   This other America, the first rich America, is a deeply divided continent that has not
been able to emulate its northern neighbours. Although recent attempts to create some
sort of unity at trading level have apparently been successful, conflicts between the many
countries of the continent are still prevalent. Furthermore, conflicts within some of these
countries, often arising from clashes of interest between the indigenous and ‘Hispanic’
parts of society, have prevented countries developing economically and socially in the way
they would prefer.

   The patron exerts considerable power in all aspects of daily life, whether it be in politics,
the church, agriculture or business generally. With his high status he can command
unquestioning loyalty from those beneath him. Authoritarian behaviour is expected and
respect shown.
   In those countries, however, where the middle class has grown in line with successful
industrialization, such authoritarian behaviour is becoming less prevalent. Harris and Moran
(1996) give Mexico as an example of a country undergoing profound social change. Its
middle classes are asserting themselves more and more, and this in turn causes tensions
between them and the underprivileged as well as revolutionary elements within the country.
Just as with other Latin Americans, however, their warm, person-oriented engagement
with others is a feature of doing business. Although the country still retains its orientation
towards the family, social mobility has increased, and there is now a rapidly expanding
middle class which is asserting its power through hard work.



 Conclusion

This chapter has examined some of the characteristics that bring together a number of
European countries as well as other countries in the world which are historically linked
to Europe. It has also shown that countries which may share certain similarities do not
necessarily enjoy a harmonious co-existence.

The first concept of this chapter considered culture clusters in Europe, including East Europe.
It gave examples of the cultural features that countries within each cluster share. It showed
how the European clusters in question, although aligned within European institutions,
remain ambivalent concerning the extent to which countries within the clusters should
strive for some kind of unity. The difficulties involved in drawing Europe’s boundaries were
also addressed, particularly with regard to countries such as Russia and Turkey. The second
concept of this chapter showed the influence of European business cultures worldwide,
including Australasia and the Americas.

One of the causes of the delay in the production of the A380 was the design of the complex wiring system
for the aircraft. This extract from a web log by Sam Davis on Electronic Design’s Power Management website,
gives an insight into co-ordination problems:
   Engineering design of a superjumbo jet aircraft is anything but easy; the Airbus A380 aircraft designers can attest
   to that. You wouldn’t expect a wiring problem to delay delivery of an airplane, but that is what has happened. Planes
   scheduled for delivery in 2006 may be up to two years late – some airlines have already cancelled their orders.
       To understand why wiring is critical, you have to know that there are almost 1,200 functions to control the plane,
   which takes 98,000 wires and 40,000 connectors. The digital design system has 500,000 models, and all those must
   be kept in sync by mismatched computer-design systems in different countries.
       Further complicating aircraft design – nose sections are built in France, fuselages in Germany, wings in Great Britain
   and tails in Spain, Airbus’ A380 aircraft sections will be transported on a special ship from sites in Broughton (UK),
   Hamburg (Germany), Puerto Real (Spain) and St. Nazaire (France) for final assembly in Toulouse (France).
       As reported in the January 2007 IEEE Spectrum article ‘Manufacturing mayday,’ by Alexander Hellemans, designing

Why financial scandals differ in the US and Europe                                                       FT
By Michael Skapinker

‘Does Europe hate us?’ Thomas Friedman, the New York Times columnist, asked in a documentary on the
Discovery Channel last week. The answer, he concluded after pottering around the Continent looking increas-
ingly worried, was ‘yes’.
   From the war on terror to attitudes to maternity leave, Mr. Friedman’s film made it plain that Europeans
inhabited a different world from Americans. When it came to business, he portrayed a Europe whose
bureaucrats plotted endlessly to make life difficult for US companies. Brussels was banning pharmaceutical
ingredients regarded as perfectly safe in the US. European competition authorities had stamped on the
ambitions of US companies from Microsoft to Coca-Cola.
   His narrative punctuated by the sort of menacing soundtrack film-makers reserve for those moments
before dad opens the door to discover that his family has been murdered by machete-wielding maniacs,
Mr. Friedman asked: ‘Is this the end of the west?’
   Quite possibly – and it gets worse. According to a recent paper by John Coffee of Columbia law school,
the US and Europe are so far apart that they even suffer from fundamentally different corporate scandals.*
   Take two emblematic examples: Enron in the US and Parmalat in Europe. The Enron misdeeds were aimed
at boosting and maintaining the energy trader’s share price. At Parmalat, the dairy group, by contrast,
money appears to have been siphoned off for the benefit of particular individuals.
   The divergence reflects underlying differences in the way US and European companies are organized,
Prof Coffee argues. In the US, the typical company’s shareholders are a widely dispersed group. Being too
fragmented to exercise day-to-day control over executives, they attempted to align top managers’ interests
with theirs by granting them share options.
   In 1990, the average chief executive of an S&amp;P 500 Industrial company earned $1.25m (£660,000), of
which 92 per cent was in cash and 8 per cent in equity. By 2001, the average chief executive was earning more
than $6m, of which 66 per cent was in equity.
   The prevalence of share options substantially changed US chief executives’ attitudes to presentation of
their companies’ earnings. ‘During early periods, US managements famously employed “rainy day reserves”
to hold back the recognition of income that was in excess of the market’s expectation in order to defer it
until some later quarter when there had been a shortfall in expected earnings,’ Prof Coffee writes.
   ‘Managers engaged in income smoothing, rolling the peaks in one period over into the valley of the next
period. This traditional form of earnings management was intended to mask the volatility of earnings and
reassure investors who might have been alarmed by rapid fluctuations.’
   By the late 1990s, chief executives, stuffed with share options, were doing something different: ‘stealing’
earnings from future periods to create an ‘earnings spike’ to meet market expectations and prevent the
share price from taking a dive.
   ‘Although such spikes may not be sustainable, corporate managers possess asymmetric information and,
anticipating their inability to maintain earnings growth, they can exercise their options and bail out,’ Prof
Coffee writes. He cites studies demonstrating a relationship between how extensively companies use options
and the likelihood of their falling victim to fraud.


*John Coffee, ‘A theory of corporate scandals: why the US and Europe differ’,
http://papers.ssrn.com/sol3/papers.cfm?abstract_id=694581

   European companies, on the other hand, often have controlling shareholders or groups of shareholders,
who do not need indirect mechanisms such as share options to control management. They can simply tell
them what to do. European chief executives have less freedom to manipulate their earnings. But they also
have less incentive to do so.
   Fraud still occurs in Europe, but it is a different sort of fraud and different people perpetrate it. Instead
of executives manipulating earnings, dominant shareholders use their control to help themselves to the
company’s assets.
   Because European and US companies are vulnerable to different types of fraud, they should adopt dif-
ferent ways of preventing it. While US corporate governance reforms have concentrated, for example, on
ensuring that independent audit committees deal with the auditors, this might be less effective in Europe
where the board struggles to escape the controlling shareholder’s influence.
   ‘Although diligent auditors could have presumably detected the fraud at Parmalat . . . one suspects that
they would have likely been dismissed at the point at which they began to monitor earnestly,’ Prof Coffee says.
   He confesses he does not have a simple suggestion on how to prevent European-style frauds. Regulators
could require auditors to report to minority shareholders, he says, but he appears to accept this is unlikely
to have many takers.
   A second objection to his argument that European fraud is different from the American variety is that
there are prominent exceptions. What about Ahold and Vivendi? Were not these European companies
whose scandals involved earnings manipulation? They were, Prof Coffee says, but that manipulation either
happened in their US subsidiaries or in companies such as Vivendi that turned themselves into US-style con-
glomerates and therefore took an American form.
   What of Tyco, a US company where the top managers allegedly appropriated assets for themselves?
Prof Coffee acknowledges that the differences between US and European companies are overall tendencies
rather than iron-clad rules.
   In the polarized world described by Mr. Friedman, I suppose we should take some comfort from the small
number of Europeans and Americans imitating one another’s misbehaviour.

To Russia with love
Jan de Rover sat back in his chair, his feet resting on the piles of paperwork on his desk. He watched a jet
flying low over the greenhouses as it came in to land at Amsterdam airport. He was thinking about his next
trip to Moscow, where he was trying to sell flowers, which his company grew under glass. ‘I’m not looking

gets up to. Their tentacles are everywhere. And you never know where you are with them, they’re so unpre-
dictable. Do you know there was a shooting incident last week – about flowers, would you believe it!’
   Jan’s company is all about flowers – acres of greenhouses, a dozen trucks to transport the flowers to the
flower auction just round the corner, two hundred employees, including seasonal workers, and the office
building where everything is managed. He exports 120 million flowers to all parts of the world, including
Eastern and Southern Europe, North and South America. Forty dozen flowers are sent to Russia each week.
The time factor plays an important role here since flowers will not survive any long transport delay.
   The prices of flowers sent to Russia are automatically set 30 per cent higher. The difference in price
is given to the mafia, otherwise the flowers would never arrive at their destination on time. For Jan this is
the only way to overcome the problems caused by the poor infrastructure. Bribes are the only way, for
example, to make sure that the flowers get loaded on to local transport before they start wilting. Even then,
however, as Jan explains to his financial director, you never know beforehand whether they’re going to
accept the bribe.
   Rob is not happy with these ‘facilitation payments’ either. Nor is he happy about the fact that the eventual
payments for the flowers take ages to reach Holland. In some cases it has taken over a year before the money
has been transferred – and then without any excuse or apology. If this happened in his own country, the
company would stop any further deliveries. ‘If you ask me,’ said Rob to his boss, ‘I reckon the Russians and
the mafia are in it together.’ Jan nodded his head in reluctant agreement.

Two Americas
Brazil and the United States have more in common than they seem to

Living in Brazil, it is easy to imagine that you have been transported into one of those novels with alternative
endings – in this instance, about how the United States might have developed if a few things had turned out
differently. Both are continent-sized countries in the western hemisphere with federal democracies in which
state governments have considerable power. Both were colonized by small European seafaring nations before
gaining independence within 50 years of each other. Their populations are made up of the descendants of
their original inhabitants, early colonists and African slaves, topped up later by European and then Asian
migrants. A recent influx from neighbouring countries completes the mix. Brazil’s melting-pot is, if anything,
even more successful than America’s. There is no such thing as a hyphenated Brazilian.
   Both countries seem surprisingly religious to European eyes, with different Christian sects competing
vigorously for believers. The most successful Brazilian multinational of all may be the Universal Church of
the Kingdom of God, a Pentecostal outfit that keeps being investigated for overenthusiastic marketing and

are good. Brazil has a culture all of its own, but it looks for inspiration to America more than it does to its

A place of paradoxes
And yet the differences are stark. America is rich, Brazil poor. Brazil is more left-wing. America fights wars,
Brazil does not. America likes its capitalism as unbridled as possible, Brazil prefers its markets with a strong
government presence.
   Look more closely, though, and some of these distinctions become blurred. Brazil is more left-wing in
theory than in practice. Next year’s presidential election is likely to come down to a choice between a
candidate from the left-wing Workers’ Party and the centre-left Party of Brazilian Social Democracy. Even
so, most of the money the government spends goes to people who are comparatively wealthy. The biggest
single reason for the difference in income distribution between Brazil and America is more regressive
public spending in Brazil. ‘We live in a paradoxical situation of a government that spends a lot and benefits
a few,’ said Antonio Palocci on becoming finance minister in 2003.
   Brazilians also have a more American approach to capitalism and free markets than they might appear
to at first sight. Many of their country’s success stories of the past 15 years, from the free-floating real and
the autonomous central bank to the privatization of state-controlled firms that have since flourished, are
products of a similar way of thinking about what economic arrangements work best. To his credit, President
Lula has not reversed these changes, as many feared he might.
   The clash between a growing middle class and a government that often seems to be blocking its aspira-
tions is creating a rather American story about the determined little guy being constantly pulled back by
the dead hand of bureaucracy. Many of the younger businessmen and bankers in Brazil have postgraduate
qualifications from American business schools. Quite a few hold views that would not be out of place at the
American Enterprise Institute or other free-market think-tanks.
   If America’s doubts about free markets and Brazil’s confidence in them both continue to grow, the two
may shortly meet. Even President Lula now denounces protectionism, though many foreign governments,
noting Brazil’s still fairly high import taxes, are unconvinced. Brazil’s imports and exports taken together
were equivalent to 22 per cent of its GDP in 2007, compared with 23 per cent for America. Above all, Brazil
now seems confident that a more open economy will not condemn it to a role as coffee-maker to richer
countries.
   Like America, Brazil is so big and varied that it often seems to contain at least two separate countries.
One of these is a place with ten land borders and no wars where people speak a single language in com-
pressed time zones; where there is no religious conflict; and where three-quarters of the population turns
out to vote, with election results announced the following day. This country has sophisticated economic
policymaking and financial markets, as well as a growing collection of world-beating companies. It runs on
sushi and is usually suntanned.

Concept 4.1 Asian cultures

           This first concept will examine the two Asian clusters featuring in the GLOBE configuration:
           Confucian Asia and Southern Asia. According to Chhokar et al. (2008), a clear distinction needs
           to be made between these two clusters. The Confucian Asia cluster, as its name implies, has
           undergone the influence of Confucian ideology. The Southern Asia cluster, on the other hand,
           contains many different religions and ethnic groups which live in peaceful co-existence.
              There is, however, one feature which both clusters share and that is to do with the way
           relationships are managed. Unlike the West, business in Asian countries is as much to do with
           the relationship between the parties concerned as the actual transaction itself. This entails
           paying considerable attention to building trust and establishing respect while displaying
           the utmost courtesy, particularly towards those in senior positions. Harmony between
           the participants of any meeting is required, so everything must be done in a courteous,

Confucian Asia

The Chinese and guanxi
Relationships in China are the key to business success. Building up a strong network of
such relationships, referred to as guanxi, is the preoccupation of Chinese businessmen.
Trust and confidence are vital elements of such relationships, so that transactions made
between people in close relationship do not need to be made in contractual form. In fact,
guanxi goes much further than an elaborate network of relationships. Those in the network
both grant favours and expect eventually to receive favours in return. As Westerners have
discovered, it can be difficult setting up relationships without using others who are them-
selves owed favours. When guanxi with someone has been achieved, then the business of
penetrating the Chinese market is made easier.
   Such a network is indispensable as a source of information and expertise, as a way
of developing new relationships, finding business partners and eventually new deals. Its
origins are disputed, although it does reflect many of the features of traditional village life
in China. It appears to have developed on a large scale as a way of dealing with the state
bureaucracy, and to have flourished during the recent opening up of China and consequent
economic development.
   Those Western companies in business in China are aware of the continual need to
develop and maintain these special relationships and will pay them explicit attention in the
organization of their activities. A member of staff or whole department will be concerned
with guanxi or public relations administration. This entails maintaining good relations not
just with customers and suppliers, but also with local authorities, financial institutions and
tax offices (Burns, 1998).

The Japanese and wa
Harmony is also a term that can be applied to the culture of Japanese society. The
concept of wa, the spirit of harmony, is a principle of Japanese thought, one applied to all

   Apart from India, Thailand also has a business culture that embraces the principles of

The Indians and family
India’s culture, while displaying many of the features shared in Asia, places particular emphasis
on the family. Every company employee works for the family to maintain and enhance
its fortunes. Loyalty to the (extended) family takes priority over loyalty to the company,
although here, too, a strong loyalty may develop towards the professional group involved.
Loyalty to both family and group can become entwined: success in your profession will give
your family added status. This goes, of course, particularly for those who are engaged in
a family business.
    It is in the family business environment that the hard-working nature of Indians is
particularly evident. Material success is important, not so much for the individual, but
more for the sake of maintaining the family’s honour and ensuring a sound future for
the family’s offspring. To be successful involves not just working long hours but also
being creative, coming up with new ideas and trying them out with panache. There may be
failures but this is less to do with personal competence, more to do with fate. The Hindu
religion, shared by three-quarters of the population, has engrained a deep sense of fatalism
into its followers, and as Lewis notes (1996), this removes any stigma attached to failure.
This attitude is reflected in business where, generally speaking, Indians are not reluctant
to take risks.
    The phenomenon of family businesses is one that India shares with the other Asian
cultures. Whether you are in India, in Malaysia or in Indonesia, you will find the same
preponderance of family firms, and this holds true in all the economic sectors. However,
this does not mean that these companies are not without their problems, especially when
they break with tradition.

Concept 4.2 African and Middle East cultures

                    For the purposes of this concept, we will consider Africa in terms of Sub-Sahara Africa,
                    including South Africa. This has been done because North Africa is seen as closer culturally
                    to the Middle East.


                     Africa

                    The countries in all of Africa had their frontiers defined by West European colonists who
                    divided the continent between themselves at the start of the nineteenth century. Ethnic
                    groupings, or tribes, found themselves divided by political boundaries drawn on a map.
                    National identities are difficult to pinpoint, with various tribes inhabiting one arbitrarily
                    defined country.


                    Sub-Sahara Africa
                    Africa’s inhabitants are diverse in every way – languages, religions, dwellings and economic
                    activities. They live in a wide range of societies, some archaic, others advanced.
                       The majority of its peoples live outside towns and cities in primitive cultures where archaic,
                    animist religions determine the social order. This organization is based on the patriarchal
                    family following a strict hierarchy in which the patriarch has absolute authority over the
                    whole community of the lineage or clan. This authority is generally handed down through
                    the lineage of the patriarch (Braudel, 1987).
                       With increasing economic activity and improved local transportation, people migrated
                    to towns from the country to get work and to support their families back in the countryside.
                    Education, imported Christian religions and Islam have often supplanted animist religions
                    in developing urban areas. Despite this increased mobility there is still identification with
                    tribes, although this is weakening over time.
                       Europeans to some extent developed the lands they colonized, but since moving to
                    independence the dictatorships that arose in individual countries have nullified most of the
                    economic advantages created by development. Only recently has the continent started to make
                    the transition to democratically elected governments and privatized businesses (Spotlight 4.6).
                       An example of a country that has recently been undergoing rapid business development
                    is Nigeria. Here a Western-style ‘professional’ order has been imposed on relations between
                    co-workers in companies. The workers have responded positively to the hierarchical
                    organization, which runs parallel to the hierarchy within their family. Despite their flexible,
                    easy-going attitude to time they are also responding to the need for regularity and punctuality
                    in work routine.

                    The Middle East

                   The Middle East, stretching from Iraq through the Arabian peninsula and along the north
                   coast of Africa, has for centuries been the crossroads where West and East have met. Here,
                   the Arabs have successfully traded between the two, buying and selling the goods from
                   other countries, as well as their own.
                      Figure 4.1 shows the countries of the Middle East along with countries in North Africa. Five
                   of these – Morocco, Algeria, Tunisia, Libya and Mauritania – are often referred to collectively
                   by the Arab word Maghreb. All the countries are often clustered together because of the many
                   cultural features they share. We will focus specifically on the Arabs of the Middle East, the geo-
                   graphical term created in the West to describe the group of countries in this part of the world.
                      Language and culture are unifying factors, with the Islam religion providing an over-
                   arching body of belief and a strong sense of identity and community. Islam spread in the
                   seventh century and along with it the Arab language, which had once been a tribal language
                   in the Arab peninsula. The present Arab states were formed following the break-up of the
                   Ottoman Empire during the First World War (1914–18).
                      The family remains at the basis of Arab social structure. As already witnessed in Asia,
                   this means the broader notion of family, a kin group or clan involving several households
                   and cousins on the father’s side. The welfare of the family is of primary concern. Family ties
                   bring security but also commitments. These can over-ride the interests of close members
                   in favour of nephews or cousins if the interests of the clan as a whole are better served.
                      The family is run in a disciplined way by an authoritarian father. The head of the family
                   clan is usually the oldest, competent member of the grouping and runs the clan in an equally

authoritarian way. A large proportion of Arab businesses are family-owned and discipline
is maintained by a leader having strong central control and a strict hierarchy.
    The considerable awareness that Arabs have of their social and economic environment
is a noticeable feature of their business culture. They are highly sensitive towards traders
and may turn down a lucrative business deal because they dislike the people they are
dealing with, particularly if these people do not enhance their personal reputation. This
is of utmost importance, since damage to one member of the family damages the whole
family. It is often contended that when a family concern has to deal with the government
it is more often than not a question of two family businesses coming to terms with each
other. For, in the government, it is members of the ruler’s family who are most likely to
hold all the main government posts; outsiders, however talented, are put in less important
positions.
    The phrase ‘Inshalah’, often translated as ‘God willing’ or ‘if Allah so wishes’, is one often used
in everyday conversation and reflects deep-rooted beliefs in pre-destination and fatalism. Its
use also emphasizes the extreme sensitivity shown to the context of any discussion. Its exact
meaning depends on the subject in hand, the particular purpose of the discussion, and the
relationships between the individuals involved. On some occasions it can mean ‘yes’, on
others ‘no’; sometimes it can mean ‘I’ll arrange it’, other times ‘Don’t discuss this further’.
Communication can therefore be a hazardous affair for not only outsiders but also for any
translators involved, particularly because they must also take account of the intonation and
body language used.
    Keeping face is often referred to with regard to Arab society and is related to this
question of reputation. Admiration and respect are sought after as much as, if not more
than, financial success. And this prestige is not for the individual concerned, but for the
family to whom the individual belongs. The face or image conveyed to others, especially
in public, is therefore given considerable attention, even when this involves dealing with
relative strangers. The Arabs are renowned for their generosity and hospitality, but these
‘duties’ may also be a prelude to seeking some kind of commitment or request.
    These comments on family and face highlight a paradox which Hickson and Pugh
(2001: 221) refer to when discussing the Arab model of management:
   Arabs are disposed to handle authority centrally with high power distance, yet at the
   same time they aspire to an ‘open door’ for all comers, high or low, and to consultation in
   the manner of the sheikhs.

The door is now wide open in many parts of the Middle East, and aspects of Western culture
have made their way into many Arab countries. More and more Middle Easterners are also
participating in management education programmes in the West and applying the knowledge
and skills to their native business environment. This process, however, is being controlled
not only by those implementing changes, but also by the guardians of Arab society who wish
to prevent its norms and values, as enshrined in civil and religious law, from being abused.
In short, we can say that Arabic companies are facing a dilemma that brings the globaliza-
tion of the economy into conflict with affection for cultural values of the past.
   However, a middle class is becoming apparent which is trying to reconcile the process
of economic modernization with the development of new values, such as tolerance, indi-
vidualism and concern for the future.
   The changes happening in the Gulf emirate of Qatar, as shown in the following text,
exemplify this process.

  A strange kind of revolution is taking place in the tiny, energy-rich Gulf emirate of Qatar. Until relatively recently

  change, the transformations under way in Qatar have been engineered not so much by its population as by Sheikh
  Hamad bin Khalifa al-Thani, the absolute ruler.
      In Doha, the foot soldiers of change are a different breed from those crowding other Arab capitals. They are more
  likely to be from public relations firms and management consultancies, hired from abroad to help promote and develop
  the emir’s ‘vision’. Slogans such as ‘modernisation without westernisation’, or ‘modern but Muslim’ emerge from
  PowerPoint presentations rather than street pamphlets or radical preachers. ‘His highness,’ explains one enthusiastic
  subject from Qatar’s academic community, ‘is way ahead of his society. He is trying to position us to benefit from the
  changes in the world. What’s good for the world is also good for Qatar. We are not some kind of freak nation.’
      By the standards of the conservative autocracies of the Gulf, Qatar is, however, becoming distinct in more ways
  than one even if it shares many of the same challenges. The emir says he wants to build a nation rich in human as
  well as natural resources, strategically positioned for its service industries, as well as its energy wealth. To achieve
  this, he is not just changing the skyline in Doha. He is also attempting to remould the mindset of its inhabitants. In
  the first 24 years of independence from Britain, when other oil rich Gulf societies were assembling the trappings of
  modernity, Qatar remained a comparative backwater.
      From the smallest financial sector in the immediate vicinity, Qatar wants to develop the region’s preferred bank-

My negotiating dilemma
One of my clients was a South Korean company established in the Netherlands. The sales targets they had
been given by the headquarters in Seoul were very high. To help them reach these targets they hired an
advertising agency. The agency went to work and came up with a total media campaign which the South
Korean company accepted and allowed to be set in motion. One ingredient of the campaign was a simple
but innovative slogan that quickly caught on.
    The advertising agency continued the campaign, which appeared to maintain its success. The initial
euphoria within the company had, however, evaporated. Its managers thought the agency’s bills were too
high, not only because the agency had been working with them for two years, but also because they were
suspicious about the actual hours that the agency was spending on producing the advertising. They knew
it was difficult to check on the time needed to come up with brilliant ideas, but still they felt that the Dutch
were taking advantage of the situation. As I discovered later, a comment which was frequently heard at the
top of the company was: ‘You have to be careful with those Dutch.’
    The Korean company started to withhold payments. The director of the Dutch agency saw this as a
typical tactic of the Koreans to get lower prices. He shared the view held by some businesses that Koreans
easily breach contracts, a perception that usually comes about because people are generally unaware of
how Koreans interpret the word ‘trust’. Having tried to explain this to him, it was not really a surprise to hear
from the Koreans that they intended to break their contract with the agency. I told them it could damage
their name in the market if they did so, and reminded them that all the slogans used to promote their products
remained the (intellectual) property of the advertising agency.
    Well, the agency threatened to take the Korean company to court to recover the money it was owed. They
did so, despite being eager to continue with the contract. Losing it would mean disaster for a company that
had only started up a few months before getting the Korean contract.
    A meeting took place between the two sides without my presence. During it the Koreans made it clear
that they were not going to pay. The young manager representing the agency told the Koreans that they
would not be allowed to use the slogans any more if the contract was terminated.
    The Korean management called me in and asked me to help.

A new generation of family firm                                                                           FT

All happy families are the same, to paraphrase Leo Tolstoy. But even unhappy ones are not bad for business.

   The US experience is similar. Small wonder that several US companies, including the retailer Gap, are going

   Asia, of course, never gave up on family businesses. Mainland entities aside, family-owned companies

of heir apparent Jeffrey Koo junior. Even Singapore, whose corporate landscape is partly in government
hands, has family empires.
   Does that mean Asian investors have more chance of outperforming benchmarks? Sadly, Credit Suisse
has not developed an Asian version of its index.
   However, consistent out-performance does not apply to all the region’s best-known family companies.
Korea’s Samsung Electronics underperformed its benchmark in two of the past four years, while Hutchison
lagged behind every year. In Singapore, state-controlled DBS outperformed its family-owned banking peers.
Other Asian dynasties move in lockstep with their peers – a reflection of the fact that many are rooted in
cyclical industries such as property development.
   But there are plenty of stars in the family-controlled universe. Henry Yeung Wai-Cheung, an associate
professor at the National University of Singapore who has researched Asian family businesses, sees grounds
for optimism. Corporate governance and transparency – once conspicuous by their absence – have improved,
he says, along with greater globalisation of operations.
   Younger generations are moving family businesses into different areas. ‘This new phenomenon is leading
to a new kind of family firm, more driven by emerging operations, especially in technology,’ he says. ‘That’s
a good development – extracting more from the existing franchise.’
   And what of the unhappy families? The spat in India between Reliance’s Ambani brothers, who engaged
in a power struggle when their father died, briefly sent Reliance shares tumbling. But it did shareholders a
favour in the long run – the subsequent division of the company unlocked value and pushed both brothers
into expansion mode.

           Figure I.2 in the introduction to Part One mentioned the names of two social scientists,
           Kluckholn and Strodtbeck. Their book, Variations in Value Orientations (1961), has served
           as a primary source of reference for many researchers into culture and management,
           including Schein, Adler, Hall, Hofstede and Trompenaars. These researchers developed
           cultural value orientations when investigating the phenomenon of culture and developed
           cross-cultural management models for a business context.

           Some insight was given in Chapter 2 into the relationship between national cultural values
           and management. Trompenaars also developed dimensions to measure cultural differences
           and gain further understanding about cultural diversity in business. What is particularly
           original about his work is that he presents opposing cultural values in the form of dilemmas.

           Concept 5.1 gives an overview of Trompenaars’ dimensions and the ensuing dilemmas
           which a manager may encounter in an intercultural environment. It also highlights some
           of the differences between Trompenaars’ and Hofstede’s dimensions.

           Concept 5.2 explains the method and the process for reconciling the dilemmas outlined
           in Concept 5.1.

Concept 5.1 Value orientations and dimensions

           The concepts of cultural theory have inspired researchers, particularly those relating culture
           to management, to examine the effect of the norms and values of a society on the individual.
              Parsons, an American sociologist who attempted to integrate all the social sciences into
           a science of human action, argued in his ground-breaking work, The Structure of Social
           Action (1937), that the action of the individual is totally integrated into a social system.

                                                                                                     99
fChapter 5 Cultural dimensions and dilemmas

                  Individuals passively follow the rules of conduct of the specific society in which they are
                  living. The norms of the society are institutionalized and internalized by the individuals
                  in it through a process of socialization. These norms steer their actions and subordinate
                  individuals to the social order, reducing the uncertainty they experience when interacting.
                  Without this social mechanism, interaction would be much less predictable, the motives
                  and reactions of those involved much less certain.


                  The value-orientation concept

                  Kluckholn and Strodtbeck (1961: 4) define value orientations as being complex principles
                  that are the result of interaction between three elements: the cognitive, the affective and the
                  directive. This final element is of particular interest since it orders and conducts human
                  thoughts and actions ‘as these relate to the solution of “common human” problems’.
                     They put forward a classification of the universal components of value orientations,
                  including some intra-cultural variations. To enable this classification to be made, Kluckholn
                  and Strodtbeck (1961: 10) formulate three assumptions:
                  1. ‘There are a limited number of common human problems for which all peoples at all times
                     must find some solution’. This forms the essentially universal nature of value orientations.
                  2. There are many ways of solving problems.
                  3. Societies have different preferences when it comes to choosing solutions.
                     These assumptions allow them to determine five problems common to all human groupings.
                  On the basis of these problems they established the variations in five orientations, which have
                  been integrated into the concept in Chapter 6 dealing with cultural values in management.
                     To enable a clearer understanding of these value orientations, Kluckholn and Strodtbeck
                  (1961: 11–20) illustrate their definitions with examples, many of which relate to the culture
                  prevailing in the US.
                  1. Human nature orientation (goodness or badness of human nature): ‘Some in the United
                     States today incline to the view that human nature is a mixture of Good and Evil. These
                     would say that although control and effort are certainly needed, lapses can be under-
                     stood and need not always be severely condemned’ (page 12).
                  2. Man–nature orientation (harmony-with-nature and mastery-over-nature): ‘In the
                     conceptualization of the man–nature relationship is that of harmony; there is no real
                     separation of man, nature and supra-nature . . . The mastery-over-nature position is the
                     first-order (that is, the dominant orientation) of most Americans. Natural forces of all
                     kinds are to be overcome and put to the use of human beings’ (page 13).
                  3. Time orientation (past, present and future): ‘Americans place an emphasis upon the future
                     – a future which is anticipated to be bigger and better . . . The ways of the past are not
                     considered good just because they are past, and truly dominant . . . Americans are seldom
                     content with the present. This view results in a high evaluation of change, providing the
                     change does not threaten the existing value order – the American way of life’ (page 15).
                  4. Activity orientation (being, being-in-becoming and doing): ‘The doing orientation is so
                     characteristically the dominant one in American society . . . “Getting things done” and
                     “Let’s do something about it” are stock American phrases’ (page 17).

   Trompenaars follows the same line of reasoning as Kluckhohn and Strodtbeck by
proposing dimensions based, in particular, on the orientation of societies with regard to
their relations with other people, with time and with nature. However, he goes beyond the
framework of anthropology and sociology to show how these dimensions also affect the
process of managing across cultures.


Trompenaars’ seven dimensions
The standpoint of Fons Trompenaars is that each culture has its own specific solutions for
universal problems. In his surveys he presented his respondents with a number of dilemmas
and asked them to choose one of a number of solutions. In the first edition of his book,
Riding the Waves of Culture (1993), Trompenaars attempts to show the effects of culture on
management by describing different cultural orientations based on academic and field
research carried out in several countries. He rejects the notion that there is one ‘best way’
of doing business and advocates a better understanding of the cultural dilemmas faced by
international companies. Furthermore, if there is a large number of products and services
on world markets, attention should be given to ‘what they mean to the people in each
culture’ (1993: 3). Trompenaars examines culture within seven dimensions divided into
three main categories: people, time and environment. Some of the dimensions produced
reflect those of the authors mentioned above – Parsons (1951), Kluckhohn and Strodtbeck
– and these are relevant to business.

Waves of Culture are outlined in Table 5.1. This first set of dimensions is based on the five
relational orientations borrowed from Parsons which describe ‘the ways in which human
beings deal with each other’ (Trompenaars, 1993: 8).

   Although it is important to know the dimensions based on value differences in societies
to compare cultures, it is nevertheless necessary for management to define what these

A framework for the new millennium manager
These seven dimensions were essentially the result of Trompenaars’ research based on the
question ‘Where are you coming from?’ Are the value-systems of a person predominantly
universalistic or particularistic; is that person an individualist or communitarian person?
Does the status of that person derive from what (s)he does or who (s)he is? This approach:
   helps to identify and model the source of not only national cultural differences, but related
   issues of corporate culture as well as dealing with a diverse work force. This has served
   to help managers structure their real world experiences. The Trompenaars’ database of
   50,000 managers worldwide continues to be a rich source of social constructs for iden-
   tifying and explaining and predicting culture clash.

Table 5.3 A framework for the ‘millennium manager’

 1. Universalism-particularism

 A high-performing manager recognizes, respects and reconciles allegiance to rule-bound activity or unique
 circumstances.
 In practice, dilemmas are typically between:
 ●   Legal contracts and loose interpretations;
 ●   Emphasis on globalism or localism;
 ●   Human rights or special relationships;
 ●   Low-cost strategies or premium strategy; and
 ●   Extending rules or discovering exceptions.
 Thus, effective management lies not in the values of rule-making or exception-finding, but between these. How else
 can the rules be improved except by noting each exception and revising the rules accordingly? In complementarity,
 how else can exceptional abilities be developed than by noting the highest defined standards and exceeding them?
 To their annoyance, managers promulgate a rule only to discover an exception. A scientist would believe he had failed.
 A boss would feel defied. A moralist would be against the sinfulness of it all. A ‘millennium manager’ would learn from it!

 2. Individualism-communitarianism (collectivism)

 A high-performing manager recognizes, respects and reconciles the individual employee’s development, enrichment
 and fulfilment or the extent to which the corporation and customers should be the beneficiaries of personal efforts.
 In practice, dilemmas are typically between:
 ●   Profit or market share strategy;
 ●   Rights or duties;
 ●   Egoism or altruism;
 ●   Responsibility for self or others; and
 ●   Originating ideas or refining useful products.

 3. Neutral or affectivity

 A high-performing manager recognizes, respects and reconciles the legitimacy of showing or controlling emotions.
 Dilemmas can arise from:
 ●   Being detached or enthusiastic;
 ●   Long pauses or frequent interruptions; and
 ●   Being professional or engaged.

 4. Specific-diffuse

 A high-performing manager recognizes, respects and reconciles the tendency to analyse and break down the field
 of experience or to synthesize, augment and construct the experience.
 Dilemmas can arise from:
 ●   The bottom line or general good will;
 ●   Data and codification or concepts and models;
 ●   Being results-oriented or process-oriented; and
 ●   Facts or relationships.

                  Trompenaars’ dimensions versus Hofstede’s dimensions

                  Fons Trompenaars, a compatriot of Geert Hofstede’s – but with a French mother – has on
                  several occasions acknowledged his indebtedness to Hofstede. The seven dimensions he has
                  developed may, at first glance, even look as if they are ‘more of the same’. However, as this
                  concept has shown, the nature of these dimensions is different and reflects irreconcilable
                  differences in approach between these two Dutch stalwarts. This is very clear from the response
                  which Trompenaars and co-author Charles Hampden-Turner (1997) gave to the review
                  made by Hofstede (1996) of Trompenaars’ model of national culture differences.
                     Having carried out an empirical analysis of Trompenaars’ own data, Hofstede (1996)
                  comes to the conclusion that the questionnaire used by Trompenaars is essentially measur-
                  ing Hofstede’s own individualism dimension by using dimensions that are interrelated.
                  Hofstede questions Trompenaars’ research method, claiming among other things that
                  the latter had started his research using preconceived notions taken from mid-twentieth
                  century US literature and had not changed these concepts using the database Trompenaars
                  compiled. Hofstede had concluded his review by implying that Trompenaars was less
                  interested in scholarship, more in commerce: ‘He tunes his messages to what he thinks the
                  customer likes to hear.’
                     In their measured response to Hofstede’s review, Hampden-Turner and Trompenaars
                  (1997) concede that Hofstede has taught them a lot and that they basically respect the results
                  of his research. They staunchly defend their approach by giving a detailed account of the
                  statistical methods used and which, they say, Hofstede should consider more carefully. They
                  insist that he does not have the right when assessing their results to view his ‘independent
                  variables’ as sovereign and to claim that other cultural concepts are derived from them.
                  As for the question of ‘preconceived notions’ and implied lack of rigour, Hampden-Turner
                  and Trompenaars strongly defend the US research literature, rejecting the idea that the
                  many researchers whose work they drew on did no empirical research. If anything, it is con-
                  tinental Europe that is more concerned with ‘an excess of rationalism and grand theories’.
                  They then turn to the questions Hofstede himself uses in his questionnaires: these are, they
                  argue, borrowed from (or disguised versions of ) questions used in various psychological
                  profile tests used during the 1950s and 1960s in the US, a time when personality research
                  was extremely popular.
                     As for the dimensions themselves, they consider Hofstede’s pursuit of the least number
                  of dimensions to account for observed differences to be ‘one dimensional thinking’ (1997:
                  158). Hampden-Turner and Trompenaars see cultures as ‘dancing’ from one preferred end of
                  a dimension to another when encountering various dilemmas. In that sense, cultures are more
                  like circles with ‘preferred arcs joined together’ rather than being Hofstede’s linear forms
                  where cultures are positioned high or low or in the middle. Faced with dilemmas, they argue,
                  cultures attempt to integrate and reconcile values to come up with a satisfactory response.
                  Their dimensions, they believe, are essentially ‘heuristic devices’ or speculative formulations
                  that serve as a guide when investigations are being made into ‘family resemblances’ between
                  cultures when they are faced with dilemmas.
                     Rather than being ‘the perfect model’, which Hofstede is still seeking, Hampden-Turner
                  and Trompenaars see theirs as a ‘model-to-learn-with’. They can learn from their respondents
                  – and vice-versa. Hofstede’s search for perfection has, they maintain, slowed his learning
                  and hindered renewal. Hampden-Turner and Trompenaars say they have moved on, as can

            Reconciling dilemmas
            The dilemmas outlined in Trompenaars’ seven-dimensional model of culture, require some
            kind of resolution. Hampden-Turner has explored and conceived a methodology which
            aims to reconcile what appear to be opposing values within each of the dimensions. This
            will be explained in the next concept of this chapter.




Concept 5.2 Reconciling cultural dilemmas

            In his article, ‘The practice of reconciliation’, Trompenaars (2000: 29–33) gives more
            consideration to the question of cultural dilemmas in the business context. He proposes a
            model that can be used to reconcile what appear to be values that conflict with each other:

              A model of reconciliation
              When businesses cross cultures there are many potential situations in which the reconcilia-
              tion of differences may be both desirable and necessary. The success of the business being
              conducted may depend on it. Reconciliation is part of building transcultural competence.
              There are three essential components of transcultural competence: awareness, respect
              and reconciling cultural differences.
                  Especially important are the processes of reconciliation. Without the confidence that
              reconciliation is possible, awareness can bring pain and frustration can emerge from respect.
              However, awareness and respect are necessary foundations for reconciling cultural differ-
              ences. If people lack sufficient awareness of the differences that may exist between cultures,
              they may easily damage a relationship without intending to do so.
                  Cultural awareness is understanding states of mind, your own and the person being
              encountered. You can never be fully informed, since the permutations of options are
              countless. The seven-dimensional model of culture provides with frames of reference for
              analyzing ways in which people attribute meaning to the world.
                  Respect is most effectively developed once people recognize that most cultural differ-
              ences are in themselves, but they have not recognized most of them. One could say that
              Westerners think the Japanese are mystics, at times even unreliable. It is difficult to know
              what they feel or think, they always say ‘yes’, even in cases where they might feel or think
              negatively about it. Yet, consider the case where a child has given a nervous and halting
              performance in her first solo in a school concert. She must go on again after the interval.
              Might her father not say ‘Wonderful, darling’ to give her confidence, although he did not
              actually believe her performance was good?
                  To sum up, both awareness and respect are necessary steps toward developing tran-
              scultural competence. But even their combined powers may not always suffice. People
              often ask questions such as: ‘Why should only we respect and adapt to the other culture?
              Why don’t they respect and adapt to ours?’ Another, perhaps more interesting problem
              is that of mutual empathy (Bennett, 1979). What happens when one person attempts to
              shift to another culture’s perspective when at the same time the other person is trying
              to do the same thing?

                     However, foreign cultures have integrity, which only some of its members will abandon.
