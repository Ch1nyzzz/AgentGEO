</span><b data-dcnode-id="8819"><span data-dcnode-id="8820" instrument_node="">Societal and cultural aspects of autism</span></b><span data-dcnode-id="8818" instrument_node=""> or </span><b data-dcnode-id="8816"><span data-dcnode-id="8817" instrument_node="">sociology of autism</span></b><sup class="reference" data-dcnode-id="8813" id="cite_ref-1"><a data-dcnode-id="8814" href="#cite_note-1"><span data-dcnode-id="8815" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8812" instrument_node=""> come into play with recognition of </span><a data-dcnode-id="8810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_spectrum" title="Autism spectrum"><span data-dcnode-id="8811" instrument_node="">autism</span></a><span data-dcnode-id="8809" instrument_node="">, approaches to its support services and therapies, and how autism affects the definition of </span><a data-dcnode-id="8807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Personhood" title="Personhood"><span data-dcnode-id="8808" instrument_node="">personhood</span></a><span data-dcnode-id="8806" instrument_node="">.</span><sup class="reference" data-dcnode-id="8803" id="cite_ref-Silverman_2-0"><a data-dcnode-id="8804" href="#cite_note-Silverman-2"><span data-dcnode-id="8805" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8802" instrument_node=""> The autistic community is divided primarily into two camps; the </span><a data-dcnode-id="8800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_rights_movement" title="Autism rights movement"><span data-dcnode-id="8801" instrument_node="">neurodiversity movement</span></a><span data-dcnode-id="8799" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="8797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medical_model_of_autism" title="Medical model of autism"><span data-dcnode-id="8798" instrument_node="">Pathology paradigm</span></a><span data-dcnode-id="8796" instrument_node="">. The pathology paradigm advocates for supporting research into therapies, treatments, and/or a cure to help minimize or remove autistic traits, seeing treatment as vital to help individuals with autism, while the neurodiversity movement believes autism should be seen as a different way of being and advocates against treatments, therapies or a cure, seeing it as trying to exterminate autistic people and their individuality.</span><sup class="reference" data-dcnode-id="8793" id="cite_ref-Harmon_3-0"><a data-dcnode-id="8794" href="#cite_note-Harmon-3"><span data-dcnode-id="8795" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8790" id="cite_ref-Solomon3_4-0"><a data-dcnode-id="8791" href="#cite_note-Solomon3-4"><span data-dcnode-id="8792" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8789" instrument_node=""> Both are controversial in autism communities and advocacy which has led to significant infighting between these two camps.</span><sup class="reference" data-dcnode-id="8786" id="cite_ref-Solomon2_5-0"><a data-dcnode-id="8787" href="#cite_note-Solomon2-5"><span data-dcnode-id="8788" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="8783" id="cite_ref-:10_6-0"><a data-dcnode-id="8784" href="#cite_note-:10-6"><span data-dcnode-id="8785" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="8780" id="cite_ref-:11_7-0"><a data-dcnode-id="8781" href="#cite_note-:11-7"><span data-dcnode-id="8782" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="8777" id="cite_ref-:12_8-0"><a data-dcnode-id="8778" href="#cite_note-:12-8"><span data-dcnode-id="8779" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8776" instrument_node=""> While the dominant </span><a data-dcnode-id="8774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paradigm" title="Paradigm"><span data-dcnode-id="8775" instrument_node="">paradigm</span></a><span data-dcnode-id="8773" instrument_node=""> is the pathology paradigm and is followed largely by autism research and scientific communities, the neurodiversity movement is highly popular within autism advocacy and autism rights organizations.</span><sup class="reference" data-dcnode-id="8770" id="cite_ref-9"><a data-dcnode-id="8771" href="#cite_note-9"><span data-dcnode-id="8772" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8769" instrument_node="">
</span></p><p data-dcnode-id="8753"><span data-dcnode-id="8767" instrument_node="">There are many autism-related events and celebrations; including </span><a data-dcnode-id="8765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Autism_Awareness_Day" title="World Autism Awareness Day"><span data-dcnode-id="8766" instrument_node="">World Autism Awareness Day</span></a><span data-dcnode-id="8764" instrument_node="">, </span><a data-dcnode-id="8762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_Sunday" title="Autism Sunday"><span data-dcnode-id="8763" instrument_node="">Autism Sunday</span></a><span data-dcnode-id="8761" instrument_node=""> and </span><a data-dcnode-id="8759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autistic_Pride_Day" title="Autistic Pride Day"><span data-dcnode-id="8760" instrument_node="">Autistic Pride Day</span></a><span data-dcnode-id="8758" instrument_node="">, and notable people have spoken about being autistic or are thought to be or have been autistic. Autism is diagnosed more frequently in males than in females.</span><sup class="reference" data-dcnode-id="8755" id="cite_ref-BazelonGirls_10-0"><a data-dcnode-id="8756" href="#cite_note-BazelonGirls-10"><span data-dcnode-id="8757" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8754" instrument_node="">

</span><h2 data-dcnode-id="8438"><span class="mw-headline" data-dcnode-id="8446" id="Terminology"><span data-dcnode-id="8447" instrument_node="">Terminology</span></span><span class="mw-editsection" data-dcnode-id="8439"><span class="mw-editsection-bracket" data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">[</span></span><a data-dcnode-id="8442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D1" title="Edit section: Terminology"><span data-dcnode-id="8443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8440"><span data-dcnode-id="8441" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8437" instrument_node="">
</span><p data-dcnode-id="8412"><span data-dcnode-id="8436" instrument_node="">Although some prefer to use the </span><a data-dcnode-id="8434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People-first_language" title="People-first language"><span data-dcnode-id="8435" instrument_node="">person-first terminology</span></a><span data-dcnode-id="8433" instrument_node=""> </span><i data-dcnode-id="8431"><span data-dcnode-id="8432" instrument_node="">person with autism</span></i><span data-dcnode-id="8430" instrument_node="">, other members of the autistic community prefer identity-first terminology, such as </span><i data-dcnode-id="8428"><span data-dcnode-id="8429" instrument_node="">autistic person</span></i><span data-dcnode-id="8427" instrument_node=""> or </span><i data-dcnode-id="8425"><span data-dcnode-id="8426" instrument_node="">autistic</span></i><span data-dcnode-id="8424" instrument_node=""> in formal English, to stress that autism is a part of their identity rather than a disease they have.</span><sup class="reference" data-dcnode-id="8421" id="cite_ref-Harmon_3-1"><a data-dcnode-id="8422" href="#cite_note-Harmon-3"><span data-dcnode-id="8423" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8420" instrument_node=""> In addition, phrases like </span><i data-dcnode-id="8418"><span data-dcnode-id="8419" instrument_node="">suffers from autism</span></i><span data-dcnode-id="8417" instrument_node=""> are objectionable to many people.</span><sup class="reference" data-dcnode-id="8414" id="cite_ref-Harmon_3-2"><a data-dcnode-id="8415" href="#cite_note-Harmon-3"><span data-dcnode-id="8416" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8413" instrument_node="">
</span></p><p data-dcnode-id="8410"><span data-dcnode-id="8411" instrument_node="">The autistic community has developed abbreviations for commonly used terms, such as:
</span></p><span data-dcnode-id="8409" instrument_node="">
</span><ul data-dcnode-id="8329"><li data-dcnode-id="8399"><i data-dcnode-id="8407"><span data-dcnode-id="8408" instrument_node="">Aspie</span></i><span data-dcnode-id="8406" instrument_node=""> – a person with </span><a data-dcnode-id="8404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asperger_syndrome" title="Asperger syndrome"><span data-dcnode-id="8405" instrument_node="">Asperger syndrome</span></a><span data-dcnode-id="8403" instrument_node="">.</span><sup class="reference" data-dcnode-id="8400" id="cite_ref-SanerDisease_11-0"><a data-dcnode-id="8401" href="#cite_note-SanerDisease-11"><span data-dcnode-id="8402" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="8398" instrument_node="">
</span><li data-dcnode-id="8385"><i data-dcnode-id="8396"><span data-dcnode-id="8397" instrument_node="">Autie</span></i><span data-dcnode-id="8395" instrument_node=""> – an autistic person. It can be contrasted with </span><i data-dcnode-id="8393"><span data-dcnode-id="8394" instrument_node="">aspie</span></i><span data-dcnode-id="8392" instrument_node=""> to refer to those specifically diagnosed with </span><a data-dcnode-id="8390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism" title="Autism"><span data-dcnode-id="8391" instrument_node="">classic autism</span></a><span data-dcnode-id="8389" instrument_node=""> or another autism spectrum disorder.</span><sup class="reference" data-dcnode-id="8386" id="cite_ref-Mitchell_12-0"><a data-dcnode-id="8387" href="#cite_note-Mitchell-12"><span data-dcnode-id="8388" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="8384" instrument_node="">
</span><li data-dcnode-id="8377"><i data-dcnode-id="8382"><span data-dcnode-id="8383" instrument_node="">Autistics and Cousins</span></i><span data-dcnode-id="8381" instrument_node=""> (AC) – a cover term including aspies, auties, and their "cousins", i.e. people with some autistic traits but no formal diagnosis.</span><sup class="reference" data-dcnode-id="8378" id="cite_ref-13"><a data-dcnode-id="8379" href="#cite_note-13"><span data-dcnode-id="8380" instrument_node="">[13]</span></a></sup></li><span data-dcnode-id="8376" instrument_node="">
</span><li data-dcnode-id="8366"><i data-dcnode-id="8374"><span data-dcnode-id="8375" instrument_node="">Curebie</span></i><span data-dcnode-id="8373" instrument_node=""> – a person with the desire to </span><a data-dcnode-id="8371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_therapies" title="Autism therapies"><span data-dcnode-id="8372" instrument_node="">cure autism</span></a><span data-dcnode-id="8370" instrument_node="">. This term is highly derogatory.</span><sup class="reference" data-dcnode-id="8367" id="cite_ref-Harmon_3-3"><a data-dcnode-id="8368" href="#cite_note-Harmon-3"><span data-dcnode-id="8369" instrument_node="">[3]</span></a></sup></li><span data-dcnode-id="8365" instrument_node="">
</span><li data-dcnode-id="8354"><i data-dcnode-id="8362"><a data-dcnode-id="8363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neurodiversity" title="Neurodiversity"><span data-dcnode-id="8364" instrument_node="">Neurodiversity</span></a></i><span data-dcnode-id="8361" instrument_node=""> – tolerance of people regardless of </span><a data-dcnode-id="8359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neurology" title="Neurology"><span data-dcnode-id="8360" instrument_node="">neurological</span></a><span data-dcnode-id="8358" instrument_node=""> makeup.</span><sup class="reference" data-dcnode-id="8355" id="cite_ref-BlumeAtlantic_14-0"><a data-dcnode-id="8356" href="#cite_note-BlumeAtlantic-14"><span data-dcnode-id="8357" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="8353" instrument_node="">
</span><li data-dcnode-id="8345"><i data-dcnode-id="8350"><a data-dcnode-id="8351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neurotypical" title="Neurotypical"><span data-dcnode-id="8352" instrument_node="">Neurotypical</span></a></i><span data-dcnode-id="8349" instrument_node=""> (</span><i data-dcnode-id="8347"><span data-dcnode-id="8348" instrument_node="">NT</span></i><span data-dcnode-id="8346" instrument_node="">) – a person who does not have any developmental or neurological disorders. Often used to describe an individual who is not on the autism spectrum.</span></li><span data-dcnode-id="8344" instrument_node="">
</span><li data-dcnode-id="8330"><i data-dcnode-id="8342"><span data-dcnode-id="8343" instrument_node="">Allistic</span></i><span data-dcnode-id="8341" instrument_node=""> – a person who is not autistic but may or may not be neurodivergent in other ways, for example, a dyslexic person, or someone with ADHD.</span><sup class="reference" data-dcnode-id="8338" id="cite_ref-15"><a data-dcnode-id="8339" href="#cite_note-15"><span data-dcnode-id="8340" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="8335" id="cite_ref-16"><a data-dcnode-id="8336" href="#cite_note-16"><span data-dcnode-id="8337" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8334" instrument_node=""> Originally and commonly, however, it is used satirically to describe those without autism.</span><sup class="reference" data-dcnode-id="8331" id="cite_ref-17"><a data-dcnode-id="8332" href="#cite_note-17"><span data-dcnode-id="8333" instrument_node="">[17]</span></a></sup></li></ul><span data-dcnode-id="8328" instrument_node="">
</span><p data-dcnode-id="8323"><span data-dcnode-id="8327" instrument_node="">Autism spectrum disorders; DSM-V; Diagnostic criteria-Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition (</span><a data-dcnode-id="8325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DSM-5" title="DSM-5"><span data-dcnode-id="8326" instrument_node="">DSM-5</span></a><span data-dcnode-id="8324" instrument_node="">) is the 2013 update to the American Psychiatric Association's (APA) classification and diagnostic tool. In the United States, the DSM serves as a universal authority for psychiatric diagnosis.
</span></p><span data-dcnode-id="8322" instrument_node="">
</span><h2 data-dcnode-id="8312"><span class="mw-headline" data-dcnode-id="8320" id="Overview"><span data-dcnode-id="8321" instrument_node="">Overview</span></span><span class="mw-editsection" data-dcnode-id="8313"><span class="mw-editsection-bracket" data-dcnode-id="8318"><span data-dcnode-id="8319" instrument_node="">[</span></span><a data-dcnode-id="8316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D2" title="Edit section: Overview"><span data-dcnode-id="8317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8314"><span data-dcnode-id="8315" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8311" instrument_node="">
</span><h3 data-dcnode-id="8301"><span class="mw-headline" data-dcnode-id="8309" id="Autistic_adults"><span data-dcnode-id="8310" instrument_node="">Autistic adults</span></span><span class="mw-editsection" data-dcnode-id="8302"><span class="mw-editsection-bracket" data-dcnode-id="8307"><span data-dcnode-id="8308" instrument_node="">[</span></span><a data-dcnode-id="8305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D3" title="Edit section: Autistic adults"><span data-dcnode-id="8306" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8303"><span data-dcnode-id="8304" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8300" instrument_node="">
</span><p data-dcnode-id="8290"><span data-dcnode-id="8299" instrument_node="">Communication and social problems often cause difficulties in many areas of an autistic adult's life.</span><sup class="reference" data-dcnode-id="8296" id="cite_ref-18"><a data-dcnode-id="8297" href="#cite_note-18"><span data-dcnode-id="8298" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8295" instrument_node=""> A 2008 study found that adults with ASD commonly experience difficulty starting social interactions, a longing for greater intimacy, a profound sense of isolation, and effort to develop greater social or self-awareness.</span><sup class="reference" data-dcnode-id="8292" id="cite_ref-19"><a data-dcnode-id="8293" href="#cite_note-19"><span data-dcnode-id="8294" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8291" instrument_node="">
</span></p><p data-dcnode-id="8273"><span data-dcnode-id="8289" instrument_node="">A much smaller proportion of adult autistics marry than the general population.</span><sup class="reference" data-dcnode-id="8286" id="cite_ref-Tsatsanis_20-0"><a data-dcnode-id="8287" href="#cite_note-Tsatsanis-20"><span data-dcnode-id="8288" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8285" instrument_node=""> It has been hypothesized that autistic people are subject to </span><a data-dcnode-id="8283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assortative_mating" title="Assortative mating"><span data-dcnode-id="8284" instrument_node="">assortative mating</span></a><span data-dcnode-id="8282" instrument_node="">; they tend to pair with each other and raise autistic offspring.</span><sup class="reference" data-dcnode-id="8279" id="cite_ref-21"><a data-dcnode-id="8280" href="#cite_note-21"><span data-dcnode-id="8281" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8278" instrument_node=""> This hypothesis has been publicized in the popular press,</span><sup class="reference" data-dcnode-id="8275" id="cite_ref-Silberman_22-0"><a data-dcnode-id="8276" href="#cite_note-Silberman-22"><span data-dcnode-id="8277" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8274" instrument_node=""> but has not been empirically tested.
</span></p><p data-dcnode-id="8264"><span data-dcnode-id="8272" instrument_node="">British psychologist </span><a data-dcnode-id="8270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simon_Baron-Cohen" title="Simon Baron-Cohen"><span data-dcnode-id="8271" instrument_node="">Simon Baron-Cohen</span></a><span data-dcnode-id="8269" instrument_node=""> said that an increasingly technological society has opened up niches for people with Asperger syndrome, who may choose fields that are "highly systematised and predictable." People with AS could do well in workplace roles that are "system-centered, and connect with the nitty-gritty detail of the product or the system."</span><sup class="reference" data-dcnode-id="8266" id="cite_ref-ElseDifferent_23-0"><a data-dcnode-id="8267" href="#cite_note-ElseDifferent-23"><span data-dcnode-id="8268" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8265" instrument_node="">
</span></p><span data-dcnode-id="8263" instrument_node="">
</span><h3 data-dcnode-id="8253"><span class="mw-headline" data-dcnode-id="8261" id="Autistic_savants"><span data-dcnode-id="8262" instrument_node="">Autistic savants</span></span><span class="mw-editsection" data-dcnode-id="8254"><span class="mw-editsection-bracket" data-dcnode-id="8259"><span data-dcnode-id="8260" instrument_node="">[</span></span><a data-dcnode-id="8257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D4" title="Edit section: Autistic savants"><span data-dcnode-id="8258" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8255"><span data-dcnode-id="8256" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8252" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="8246" role="note"><span data-dcnode-id="8249" instrument_node="">Further information: </span><a data-dcnode-id="8247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savant_syndrome" title="Savant syndrome"><span data-dcnode-id="8248" instrument_node="">Savant syndrome</span></a></div><span data-dcnode-id="8245" instrument_node="">
</span><p data-dcnode-id="8223"><span data-dcnode-id="8244" instrument_node="">An </span><i data-dcnode-id="8242"><span data-dcnode-id="8243" instrument_node="">autistic savant</span></i><span data-dcnode-id="8241" instrument_node=""> is an autistic person with extreme talent in one or more areas of study. Although there is a common association between </span><a data-dcnode-id="8239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savant_syndrome" title="Savant syndrome"><span data-dcnode-id="8240" instrument_node="">savant syndrome</span></a><span data-dcnode-id="8238" instrument_node=""> and autism (an association made popular by the 1988 film </span><i data-dcnode-id="8235"><a data-dcnode-id="8236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rain_Man" title="Rain Man"><span data-dcnode-id="8237" instrument_node="">Rain Man</span></a></i><span data-dcnode-id="8234" instrument_node="">), most autistic people are not savants and savantism is not unique to autistic people, though there does seem to be some relation. One in ten autistic people may have notable abilities, but prodigious </span><a data-dcnode-id="8232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savant_syndrome" title="Savant syndrome"><span data-dcnode-id="8233" instrument_node="">savants</span></a><span data-dcnode-id="8231" instrument_node=""> like </span><a data-dcnode-id="8229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Wiltshire" title="Stephen Wiltshire"><span data-dcnode-id="8230" instrument_node="">Stephen Wiltshire</span></a><span data-dcnode-id="8228" instrument_node=""> are very rare; only about 100 such people have been described/identified in the century since savants were first identified, and there are only about 25 living identified prodigious savants worldwide.</span><sup class="reference" data-dcnode-id="8225" id="cite_ref-24"><a data-dcnode-id="8226" href="#cite_note-24"><span data-dcnode-id="8227" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8224" instrument_node="">
</span></p><span data-dcnode-id="8222" instrument_node="">
</span><h3 data-dcnode-id="8212"><span class="mw-headline" data-dcnode-id="8220" id="Gender_aspects"><span data-dcnode-id="8221" instrument_node="">Gender aspects</span></span><span class="mw-editsection" data-dcnode-id="8213"><span class="mw-editsection-bracket" data-dcnode-id="8218"><span data-dcnode-id="8219" instrument_node="">[</span></span><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D5" title="Edit section: Gender aspects"><span data-dcnode-id="8217" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8214"><span data-dcnode-id="8215" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8211" instrument_node="">
</span><h4 data-dcnode-id="8201"><span class="mw-headline" data-dcnode-id="8209" id="Autistic_women"><span data-dcnode-id="8210" instrument_node="">Autistic women</span></span><span class="mw-editsection" data-dcnode-id="8202"><span class="mw-editsection-bracket" data-dcnode-id="8207"><span data-dcnode-id="8208" instrument_node="">[</span></span><a data-dcnode-id="8205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D6" title="Edit section: Autistic women"><span data-dcnode-id="8206" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8203"><span data-dcnode-id="8204" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8200" instrument_node="">
</span><p data-dcnode-id="8177"><span data-dcnode-id="8199" instrument_node="">Autism is thought of as a condition mostly affecting males, with males up to four times more likely than females to be </span><a data-dcnode-id="8197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism%23Epidemiology" title="Autism"><span data-dcnode-id="8198" instrument_node="">diagnosed as autistic</span></a><span data-dcnode-id="8196" instrument_node=""> and among those with </span><a data-dcnode-id="8194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asperger_syndrome%23Epidemiology" title="Asperger syndrome"><span data-dcnode-id="8195" instrument_node="">Asperger syndrome</span></a><span data-dcnode-id="8193" instrument_node=""> or </span><a data-dcnode-id="8191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High-functioning_autism" title="High-functioning autism"><span data-dcnode-id="8192" instrument_node="">"high functioning autism"</span></a><span data-dcnode-id="8190" instrument_node="">, males are up to ten times more likely to be diagnosed.</span><sup class="reference" data-dcnode-id="8187" id="cite_ref-25"><a data-dcnode-id="8188" href="#cite_note-25"><span data-dcnode-id="8189" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8186" instrument_node=""> This may be due to the fact that many of the diagnostic tools used to diagnose autism have been crafted through the observation of males on the autism spectrum and are therefore more likely to identify men and boys with autism than their female counterparts.</span><sup class="reference" data-dcnode-id="8183" id="cite_ref-:03_26-0"><a data-dcnode-id="8184" href="#cite_note-:03-26"><span data-dcnode-id="8185" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8182" instrument_node=""> To date, the research and support surrounding autistic people has been male-centric, women and non-binary people are seriously underrepresented.</span><sup class="reference" data-dcnode-id="8179" id="cite_ref-27"><a data-dcnode-id="8180" href="#cite_note-27"><span data-dcnode-id="8181" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8178" instrument_node="">
</span></p><p data-dcnode-id="8167"><span data-dcnode-id="8176" instrument_node="">For many autistic females the lack of diagnosis or a late diagnosis results in them missing out on supports and interventions that are most valuable when implemented at a younger age.</span><sup class="reference" data-dcnode-id="8173" id="cite_ref-28"><a data-dcnode-id="8174" href="#cite_note-28"><span data-dcnode-id="8175" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8172" instrument_node=""> For those females who do receive a diagnosis and are provided with those supports, often have to face the many of them have been created with males in mind and may not acknowledge the physical, psychological and societal differences that females face.</span><sup class="reference" data-dcnode-id="8169" id="cite_ref-29"><a data-dcnode-id="8170" href="#cite_note-29"><span data-dcnode-id="8171" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8168" instrument_node="">
</span></p><p data-dcnode-id="8128"><span data-dcnode-id="8166" instrument_node="">Some autistic women find themselves misdiagnosed with </span><a data-dcnode-id="8164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Personality_disorder" title="Personality disorder"><span data-dcnode-id="8165" instrument_node="">personality disorders</span></a><span data-dcnode-id="8163" instrument_node="">, such as </span><a data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Borderline_personality_disorder" title="Borderline personality disorder"><span data-dcnode-id="8162" instrument_node="">borderline personality disorder</span></a><span data-dcnode-id="8160" instrument_node="">, </span><a data-dcnode-id="8158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avoidant_personality_disorder" title="Avoidant personality disorder"><span data-dcnode-id="8159" instrument_node="">avoidant personality disorder</span></a><span data-dcnode-id="8157" instrument_node=""> and </span><a data-dcnode-id="8155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schizoid_personality_disorder" title="Schizoid personality disorder"><span data-dcnode-id="8156" instrument_node="">schizoid personality disorder</span></a><span data-dcnode-id="8154" instrument_node="">. Autistic females are "research orphans" according to Yale's </span><a data-dcnode-id="8152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ami_Klin" title="Ami Klin"><span data-dcnode-id="8153" instrument_node="">Ami Klin</span></a><span data-dcnode-id="8151" instrument_node="">; some drugs used to treat </span><a data-dcnode-id="8149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anxiety" title="Anxiety"><span data-dcnode-id="8150" instrument_node="">anxiety</span></a><span data-dcnode-id="8148" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="8146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attention-deficit_hyperactivity_disorder" title="Attention-deficit hyperactivity disorder"><span data-dcnode-id="8147" instrument_node="">hyperactivity</span></a><span data-dcnode-id="8145" instrument_node=""> that may accompany autism are rarely tested on autistic females.</span><sup class="reference" data-dcnode-id="8142" id="cite_ref-BazelonGirls_10-1"><a data-dcnode-id="8143" href="#cite_note-BazelonGirls-10"><span data-dcnode-id="8144" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8141" instrument_node=""> Autism may express differently in the sexes, with many females on the spectrum presenting more subtly than males and may be more adept at developing more sophisticated social masking behaviours, as such females with more prominent difficulties are more likely to be diagnosed than those who present differently.</span><sup class="reference" data-dcnode-id="8138" id="cite_ref-:03_26-1"><a data-dcnode-id="8139" href="#cite_note-:03-26"><span data-dcnode-id="8140" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8137" instrument_node=""> Autistic females are more likely to develop a more sophisticated social camouflage for a variety of reasons.</span><sup class="reference" data-dcnode-id="8134" id="cite_ref-:03_26-2"><a data-dcnode-id="8135" href="#cite_note-:03-26"><span data-dcnode-id="8136" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8133" instrument_node=""> One theory as to why is that women as a whole face more complex social expectations than men, creating a greater need to "prepare more thoroughly for social situations, or risk ostracism".</span><sup class="reference" data-dcnode-id="8130" id="cite_ref-:03_26-3"><a data-dcnode-id="8131" href="#cite_note-:03-26"><span data-dcnode-id="8132" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8129" instrument_node="">
</span></p><p data-dcnode-id="8103"><span data-dcnode-id="8127" instrument_node="">Another theory suggests that women on the spectrum have a more inborn need for social interaction than their male counterparts, leading many women and girls to be more invested in creating social camouflage strategies.</span><sup class="reference" data-dcnode-id="8124" id="cite_ref-:03_26-4"><a data-dcnode-id="8125" href="#cite_note-:03-26"><span data-dcnode-id="8126" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8123" instrument_node=""> These strategies are developed in a variety of ways such as, observing and copying the social interactions of those around them as well as creating strategies to attempt to "go undetected". These coping mechanisms can take an immense amount of time and energy to learn and practice and can as Dr. Shana Nicols states "more often than not lead to exhaustion, withdrawal, anxiety, selective mutism and depression".</span><sup class="reference" data-dcnode-id="8120" id="cite_ref-:13_30-0"><a data-dcnode-id="8121" href="#cite_note-:13-30"><span data-dcnode-id="8122" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8119" instrument_node="">  Females may be more concerned with how they are viewed by peers and the failure to connect with people outside of their immediate family could lead to severe anxiety or </span><a class="mw-redirect" data-dcnode-id="8117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clinical_depression" title="Clinical depression"><span data-dcnode-id="8118" instrument_node="">clinical depression</span></a><span data-dcnode-id="8116" instrument_node="">.</span><sup class="reference" data-dcnode-id="8113" id="cite_ref-BazelonGirls_10-2"><a data-dcnode-id="8114" href="#cite_note-BazelonGirls-10"><span data-dcnode-id="8115" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8112" instrument_node=""> Autistic girls who have "normal" intelligence may be more socially disadvantaged than males because of the "rising level of social interaction that comes in middle school," when girls' "friendships often hinge on attention to feelings and lots of rapid and nuanced communication."</span><sup class="noprint Inline-Template" data-dcnode-id="8105" style="white-space:nowrap;"><span data-dcnode-id="8111" instrument_node="">[</span><i data-dcnode-id="8107"><a data-dcnode-id="8108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AInline_citation%23When_you_must_use_inline_citations" title="Wikipedia:Inline citation"><span data-dcnode-id="8109" title="The text near this tag needs a citation. (September 2021)"><span data-dcnode-id="8110" instrument_node="">This quote needs a citation</span></span></a></i><span data-dcnode-id="8106" instrument_node="">]</span></sup><span data-dcnode-id="8104" instrument_node="">
</span></p><p data-dcnode-id="8069"><span data-dcnode-id="8102" instrument_node="">Autistic girls may suffer additionally by being placed in specialized educational programs, where they will be surrounded by males and further isolated from female social contacts.</span><sup class="reference" data-dcnode-id="8099" id="cite_ref-BazelonGirls_10-3"><a data-dcnode-id="8100" href="#cite_note-BazelonGirls-10"><span data-dcnode-id="8101" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8098" instrument_node=""> Females on the autism spectrum often "internalize feelings of frustration and failure"</span><sup class="reference" data-dcnode-id="8095" id="cite_ref-:13_30-1"><a data-dcnode-id="8096" href="#cite_note-:13-30"><span data-dcnode-id="8097" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8094" instrument_node=""> and are believed to have higher rates of certain </span><a data-dcnode-id="8092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comorbidity" title="Comorbidity"><span data-dcnode-id="8093" instrument_node="">comorbidities</span></a><span data-dcnode-id="8091" instrument_node=""> such as </span><a data-dcnode-id="8089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anxiety" title="Anxiety"><span data-dcnode-id="8090" instrument_node="">anxiety</span></a><span data-dcnode-id="8088" instrument_node=""> and </span><a data-dcnode-id="8086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depression_%28mood%29" title="Depression (mood)"><span data-dcnode-id="8087" instrument_node="">depression</span></a><span data-dcnode-id="8085" instrument_node=""> (36 and 34 percent respectively),</span><sup class="reference" data-dcnode-id="8082" id="cite_ref-:13_30-2"><a data-dcnode-id="8083" href="#cite_note-:13-30"><span data-dcnode-id="8084" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8081" instrument_node=""> due in large part to the desire for along with the difficulties in finding social inclusion along with other social and sensory challenges. Lack of diagnosis can also lead autistic females to have higher rates of depression, anxiety and </span><a data-dcnode-id="8079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-esteem" title="Self-esteem"><span data-dcnode-id="8080" instrument_node="">self-esteem</span></a><span data-dcnode-id="8078" instrument_node=""> issues as they are left without a clear understanding as to why they do not "fit in" with their peers.</span><sup class="reference" data-dcnode-id="8075" id="cite_ref-31"><a data-dcnode-id="8076" href="#cite_note-31"><span data-dcnode-id="8077" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8074" instrument_node=""> Females on the spectrum also seem to have higher rates of eating disorders, such as anorexia, than other females. This may be related to social isolation and elevated levels of anxiety along with a need to control their environment more fully.</span><sup class="reference" data-dcnode-id="8071" id="cite_ref-:03_26-5"><a data-dcnode-id="8072" href="#cite_note-:03-26"><span data-dcnode-id="8073" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8070" instrument_node="">
</span></p><p data-dcnode-id="8052"><span data-dcnode-id="8068" instrument_node="">Although both males and females on the spectrum have a higher risk of experiencing bullying, these experiences often present differently based on gender.</span><sup class="reference" data-dcnode-id="8065" id="cite_ref-:13_30-3"><a data-dcnode-id="8066" href="#cite_note-:13-30"><span data-dcnode-id="8067" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8064" instrument_node="">  Although sample sizes are too small to draw firm conclusions, one study suggests that autistic women are less likely than males over the long term to marry, have families, go to college, have careers and live independently. An intense interest in specific topics plays a significant factor in the lives of those on the </span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_spectrum" title="Autism spectrum"><span data-dcnode-id="8063" instrument_node="">autism spectrum</span></a><span data-dcnode-id="8061" instrument_node=""> of both genders. Females on the spectrum may focus on different topics than their male counterparts; autistic females rarely have interests in numbers or have stores of specialized knowledge,</span><sup class="reference" data-dcnode-id="8058" id="cite_ref-BazelonGirls_10-4"><a data-dcnode-id="8059" href="#cite_note-BazelonGirls-10"><span data-dcnode-id="8060" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8057" instrument_node=""> the intense interests of autistic females can be overlooked as they are often seen to be more applicable to a broader section of society.</span><sup class="reference" data-dcnode-id="8054" id="cite_ref-32"><a data-dcnode-id="8055" href="#cite_note-32"><span data-dcnode-id="8056" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8053" instrument_node="">
</span></p><p data-dcnode-id="8043"><span data-dcnode-id="8051" instrument_node="">Both males and females with </span><a data-dcnode-id="8049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism" title="Autism"><span data-dcnode-id="8050" instrument_node="">autism</span></a><span data-dcnode-id="8048" instrument_node=""> deal with the same core symptom, but when those symptoms are mixed with ideas of gender, they can offer very different lived experiences for females than their male counterparts. The profile of autism may change as more is understood about females, whose autism may go undiagnosed.</span><sup class="reference" data-dcnode-id="8045" id="cite_ref-BazelonGirls_10-5"><a data-dcnode-id="8046" href="#cite_note-BazelonGirls-10"><span data-dcnode-id="8047" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8044" instrument_node="">
</span></p><span data-dcnode-id="8042" instrument_node="">
</span><h3 data-dcnode-id="8032"><span class="mw-headline" data-dcnode-id="8040" id="Gender_identity_and_sexual_orientation"><span data-dcnode-id="8041" instrument_node="">Gender identity and sexual orientation</span></span><span class="mw-editsection" data-dcnode-id="8033"><span class="mw-editsection-bracket" data-dcnode-id="8038"><span data-dcnode-id="8039" instrument_node="">[</span></span><a data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D7" title="Edit section: Gender identity and sexual orientation"><span data-dcnode-id="8037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8034"><span data-dcnode-id="8035" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8031" instrument_node="">
</span><link data-dcnode-id="8030" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8026" role="note"><span data-dcnode-id="8029" instrument_node="">Main article: </span><a data-dcnode-id="8027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_and_LGBT_identities" title="Autism and LGBT identities"><span data-dcnode-id="8028" instrument_node="">Autism and LGBT identities</span></a></div><span data-dcnode-id="8025" instrument_node="">
</span><p data-dcnode-id="7989"><span data-dcnode-id="8024" instrument_node="">In recent years, some people have suggested overlap between people with autism and a non-</span><a class="mw-redirect" data-dcnode-id="8022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heterosexual" title="Heterosexual"><span data-dcnode-id="8023" instrument_node="">heterosexual</span></a><span data-dcnode-id="8021" instrument_node=""> identity (with autistic people more likely to be identified as </span><a data-dcnode-id="8019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gay" title="Gay"><span data-dcnode-id="8020" instrument_node="">gay</span></a><span data-dcnode-id="8018" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bisexual" title="Bisexual"><span data-dcnode-id="8017" instrument_node="">bisexual</span></a><span data-dcnode-id="8015" instrument_node=""> or </span><a data-dcnode-id="8013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asexuality" title="Asexuality"><span data-dcnode-id="8014" instrument_node="">asexual</span></a><span data-dcnode-id="8012" instrument_node="">)</span><sup class="reference" data-dcnode-id="8009" id="cite_ref-33"><a data-dcnode-id="8010" href="#cite_note-33"><span data-dcnode-id="8011" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8008" instrument_node=""> as well as an overlap with a </span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transgender" title="Transgender"><span data-dcnode-id="8007" instrument_node="">transgender</span></a><span data-dcnode-id="8005" instrument_node=""> identity.</span><sup class="reference" data-dcnode-id="8002" id="cite_ref-34"><a data-dcnode-id="8003" href="#cite_note-34"><span data-dcnode-id="8004" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="7999" id="cite_ref-35"><a data-dcnode-id="8000" href="#cite_note-35"><span data-dcnode-id="8001" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7998" instrument_node=""> This issue has not been without controversy, as the issue is open to confusion; it is currently unclear whether this correlation exists due to any innate characteristic of autism that may also cause unusual discrepancies in sex or gender,</span><sup class="reference" data-dcnode-id="7995" id="cite_ref-36"><a data-dcnode-id="7996" href="#cite_note-36"><span data-dcnode-id="7997" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7994" instrument_node=""> or whether it is the result of exposing a group of people who experience difficulty in abiding by social norms, including those related to gender, to sexism and gender stereotypes.</span><sup class="reference" data-dcnode-id="7991" id="cite_ref-37"><a data-dcnode-id="7992" href="#cite_note-37"><span data-dcnode-id="7993" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7990" instrument_node="">
</span></p><span data-dcnode-id="7988" instrument_node="">
</span><h3 data-dcnode-id="7978"><span class="mw-headline" data-dcnode-id="7986" id="Relationships_with_animals"><span data-dcnode-id="7987" instrument_node="">Relationships with animals</span></span><span class="mw-editsection" data-dcnode-id="7979"><span class="mw-editsection-bracket" data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">[</span></span><a data-dcnode-id="7982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D8" title="Edit section: Relationships with animals"><span data-dcnode-id="7983" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7980"><span data-dcnode-id="7981" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7977" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7968"><div class="thumbinner" data-dcnode-id="7969" style="width:152px;"><a class="image" data-dcnode-id="7975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATempleGrandin.jpg"><img alt="" class="thumbimage" data-dcnode-id="7976" data-file-height="2955" data-file-width="2110" decoding="async" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/47/TempleGrandin.jpg/150px-TempleGrandin.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/47/TempleGrandin.jpg/225px-TempleGrandin.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/47/TempleGrandin.jpg/300px-TempleGrandin.jpg 2x" width="150"></a><span data-dcnode-id="7974" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7970"><div class="magnify" data-dcnode-id="7972"><a class="internal" data-dcnode-id="7973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATempleGrandin.jpg" title="Enlarge"></a></div><span data-dcnode-id="7971" instrument_node="">Temple Grandin</span></div></div></div><span data-dcnode-id="7967" instrument_node="">
</span><p data-dcnode-id="7945"><a data-dcnode-id="7965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_Grandin" title="Temple Grandin"><span data-dcnode-id="7966" instrument_node="">Temple Grandin</span></a><span data-dcnode-id="7964" instrument_node="">, autistic designer of cattle handling systems, said that one reason she can easily figure out how a cow would react is because autistic people can easily "think the way that animals think."</span><sup class="reference" data-dcnode-id="7961" id="cite_ref-GeorgeAnimals_38-0"><a data-dcnode-id="7962" href="#cite_note-GeorgeAnimals-38"><span data-dcnode-id="7963" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7960" instrument_node=""> According to Grandin, animals do not have "complex emotions such as </span><a data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shame" title="Shame"><span data-dcnode-id="7959" instrument_node="">shame</span></a><span data-dcnode-id="7957" instrument_node=""> or </span><a data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guilt_%28emotion%29" title="Guilt (emotion)"><span data-dcnode-id="7956" instrument_node="">guilt</span></a><span data-dcnode-id="7954" instrument_node="">" and they do not think in language. She says that, although not everything about animals is like an autistic person, the similarity is that they think visually and without language. She says people do not make this connection because the study of autism and the study of animal behavior are parallel disciplines involving different individuals.</span><sup class="reference" data-dcnode-id="7951" id="cite_ref-GeorgeAnimals_38-1"><a data-dcnode-id="7952" href="#cite_note-GeorgeAnimals-38"><span data-dcnode-id="7953" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7950" instrument_node=""> Despite these similarities, the degree to which autistic individuals can be said to think like animals remains undetermined; non-human animals, as well as humans, have evolved cognitive specializations that may or may not share characteristics with other species.</span><sup class="reference" data-dcnode-id="7947" id="cite_ref-39"><a data-dcnode-id="7948" href="#cite_note-39"><span data-dcnode-id="7949" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7946" instrument_node="">
</span></p><p data-dcnode-id="7934"><a data-dcnode-id="7943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawn_Prince-Hughes" title="Dawn Prince-Hughes"><span data-dcnode-id="7944" instrument_node="">Dawn Prince-Hughes</span></a><span data-dcnode-id="7942" instrument_node="">, diagnosed with Asperger's, describes her observations of gorillas in </span><i data-dcnode-id="7940"><span data-dcnode-id="7941" instrument_node="">Songs of the Gorilla Nation</span></i><span data-dcnode-id="7939" instrument_node="">.</span><sup class="reference" data-dcnode-id="7936" id="cite_ref-40"><a data-dcnode-id="7937" href="#cite_note-40"><span data-dcnode-id="7938" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7935" instrument_node="">
</span></p><span data-dcnode-id="7933" instrument_node="">
</span><h2 data-dcnode-id="7922"><span class="mw-headline" data-dcnode-id="7930" id="Asperger_syndrome_and_interpersonal_relationships"><span class="anchor" data-dcnode-id="7932" id="Asperger_syndrome_and_relationships"></span><span data-dcnode-id="7931" instrument_node=""> Asperger syndrome and interpersonal relationships</span></span><span class="mw-editsection" data-dcnode-id="7923"><span class="mw-editsection-bracket" data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">[</span></span><a data-dcnode-id="7926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D9" title="Edit section: Asperger syndrome and interpersonal relationships"><span data-dcnode-id="7927" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7924"><span data-dcnode-id="7925" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7921" instrument_node="">
</span><p data-dcnode-id="7913"><span data-dcnode-id="7920" instrument_node="">Individuals with </span><a data-dcnode-id="7918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asperger_syndrome" title="Asperger syndrome"><span data-dcnode-id="7919" instrument_node="">Asperger syndrome</span></a><span data-dcnode-id="7917" instrument_node=""> (AS) may develop problems in their abilities to engage successfully in </span><a data-dcnode-id="7915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interpersonal_relationship" title="Interpersonal relationship"><span data-dcnode-id="7916" instrument_node="">interpersonal relationships</span></a><span data-dcnode-id="7914" instrument_node="">.
</span></p><span data-dcnode-id="7912" instrument_node="">
</span><h3 data-dcnode-id="7902"><span class="mw-headline" data-dcnode-id="7910" id="Social_impact"><span data-dcnode-id="7911" instrument_node="">Social impact</span></span><span class="mw-editsection" data-dcnode-id="7903"><span class="mw-editsection-bracket" data-dcnode-id="7908"><span data-dcnode-id="7909" instrument_node="">[</span></span><a data-dcnode-id="7906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D10" title="Edit section: Social impact"><span data-dcnode-id="7907" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7904"><span data-dcnode-id="7905" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7901" instrument_node="">
</span><p data-dcnode-id="7871"><span data-dcnode-id="7900" instrument_node="">Asperger syndrome may lead to problems in </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_skills" title="Social skills"><span data-dcnode-id="7899" instrument_node="">social interaction</span></a><span data-dcnode-id="7897" instrument_node=""> with peers. These problems can be severe or mild depending on the individual. People with AS are often the target of bullying behavior. Children with AS are often the target of </span><a data-dcnode-id="7895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullying" title="Bullying"><span data-dcnode-id="7896" instrument_node="">bullying</span></a><span data-dcnode-id="7894" instrument_node=""> at school due to their </span><a data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idiosyncrasy" title="Idiosyncrasy"><span data-dcnode-id="7893" instrument_node="">idiosyncratic</span></a><span data-dcnode-id="7891" instrument_node=""> behavior, precise language, unusual interests, and impaired ability to perceive and respond in socially expected ways to </span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonverbal_communication" title="Nonverbal communication"><span data-dcnode-id="7890" instrument_node="">nonverbal</span></a><span data-dcnode-id="7888" instrument_node=""> cues, particularly in interpersonal conflict, which results in them being sought out by classmates and </span><a data-dcnode-id="7886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_rejection" title="Social rejection"><span data-dcnode-id="7887" instrument_node="">rejected</span></a><span data-dcnode-id="7885" instrument_node="">. People with AS may be overly literal and may have difficulty interpreting and responding to </span><a data-dcnode-id="7883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarcasm" title="Sarcasm"><span data-dcnode-id="7884" instrument_node="">sarcasm</span></a><span data-dcnode-id="7882" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banter" title="Banter"><span data-dcnode-id="7881" instrument_node="">banter</span></a><span data-dcnode-id="7879" instrument_node="">, or </span><a data-dcnode-id="7877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metaphor" title="Metaphor"><span data-dcnode-id="7878" instrument_node="">metaphorical</span></a><span data-dcnode-id="7876" instrument_node=""> speech. Difficulties with social interaction may also manifest in a lack of play with other children.</span><sup class="reference" data-dcnode-id="7873" id="cite_ref-Attwood-p58_41-0"><a data-dcnode-id="7874" href="#cite_note-Attwood-p58-41"><span data-dcnode-id="7875" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7872" instrument_node="">
</span></p><p data-dcnode-id="7855"><span data-dcnode-id="7870" instrument_node="">The above problems can even arise in the family; given an unfavorable family environment, the child may be subject to </span><a data-dcnode-id="7868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_abuse" title="Psychological abuse"><span data-dcnode-id="7869" instrument_node="">emotional abuse</span></a><span data-dcnode-id="7867" instrument_node="">. A child, teen, or adult with AS is often puzzled by this mistreatment, unaware of what has been done incorrectly. Unlike with other </span><a data-dcnode-id="7865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pervasive_developmental_disorder" title="Pervasive developmental disorder"><span data-dcnode-id="7866" instrument_node="">pervasive development disorders</span></a><span data-dcnode-id="7864" instrument_node="">, most persons with AS want to be social, but fail to socialize successfully, which can lead to later withdrawal and asocial behavior, especially in adolescence.</span><sup class="reference" data-dcnode-id="7861" id="cite_ref-42"><a data-dcnode-id="7862" href="#cite_note-42"><span data-dcnode-id="7863" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7860" instrument_node=""> At this stage of life especially, they risk being drawn into unsuitable and inappropriate friendships and social groups. People with AS often interact better with those considerably older or younger than themselves, rather than those within their own age group.</span><sup class="reference" data-dcnode-id="7857" id="cite_ref-Attwood-p58_41-1"><a data-dcnode-id="7858" href="#cite_note-Attwood-p58-41"><span data-dcnode-id="7859" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7856" instrument_node="">
</span></p><p data-dcnode-id="7825"><span data-dcnode-id="7854" instrument_node="">Children with AS often display advanced abilities for their age in language, </span><a data-dcnode-id="7852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reading" title="Reading"><span data-dcnode-id="7853" instrument_node="">reading</span></a><span data-dcnode-id="7851" instrument_node="">, </span><a data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathematics" title="Mathematics"><span data-dcnode-id="7850" instrument_node="">mathematics</span></a><span data-dcnode-id="7848" instrument_node="">, </span><a data-dcnode-id="7846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space" title="Space"><span data-dcnode-id="7847" instrument_node="">spatial skills</span></a><span data-dcnode-id="7845" instrument_node="">, or music—sometimes into the "gifted" range—but this may be counterbalanced by considerable delays in other developmental areas, like </span><a data-dcnode-id="7843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communication" title="Communication"><span data-dcnode-id="7844" instrument_node="">verbal</span></a><span data-dcnode-id="7842" instrument_node=""> and </span><a data-dcnode-id="7840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonverbal_communication" title="Nonverbal communication"><span data-dcnode-id="7841" instrument_node="">nonverbal communication</span></a><span data-dcnode-id="7839" instrument_node=""> or some lack of </span><a data-dcnode-id="7837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motor_coordination" title="Motor coordination"><span data-dcnode-id="7838" instrument_node="">motor coordination</span></a><span data-dcnode-id="7836" instrument_node="">. This combination of traits can lead to problems with teachers and other </span><a data-dcnode-id="7834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authority" title="Authority"><span data-dcnode-id="7835" instrument_node="">authority figures</span></a><span data-dcnode-id="7833" instrument_node="">. A child with AS might be regarded by teachers as a "problem child" or a "poor performer". The child's extremely low tolerance for what they perceive to be ordinary and mundane tasks, such as typical homework assignments, can easily become frustrating; a teacher may well consider the child arrogant, spiteful, and </span><a data-dcnode-id="7831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insubordination" title="Insubordination"><span data-dcnode-id="7832" instrument_node="">insubordinate</span></a><span data-dcnode-id="7830" instrument_node="">. Lack of support and understanding, in combination with the child's anxieties, can result in problematic behavior (such as severe tantrums, violent and angry outbursts, and withdrawal).</span><sup class="reference" data-dcnode-id="7827" id="cite_ref-43"><a data-dcnode-id="7828" href="#cite_note-43"><span data-dcnode-id="7829" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7826" instrument_node="">
</span></p><p data-dcnode-id="7812"><span data-dcnode-id="7824" instrument_node="">Employment for those with AS may be difficult. The impaired social skills can be likely to interfere with the interview process—and people with often superior skills can be passed over due to these conflicts with interviewers. Once hired, people with AS may continue to have difficulty with interpersonal communications.</span><sup class="reference" data-dcnode-id="7821" id="cite_ref-Mawhood,_Lynn_1999_pp._229_44-0"><a data-dcnode-id="7822" href="#cite_note-Mawhood,_Lynn_1999_pp._229-44"><span data-dcnode-id="7823" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7820" instrument_node=""> </span><a data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homelessness" title="Homelessness"><span data-dcnode-id="7819" instrument_node="">Homelessness</span></a><span data-dcnode-id="7817" instrument_node=""> is very common among people with AS.</span><sup class="reference" data-dcnode-id="7814" id="cite_ref-Mawhood,_Lynn_1999_pp._229_44-1"><a data-dcnode-id="7815" href="#cite_note-Mawhood,_Lynn_1999_pp._229-44"><span data-dcnode-id="7816" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7813" instrument_node="">
</span></p><p data-dcnode-id="7806"><span data-dcnode-id="7811" instrument_node="">While some researchers have suggested that autistic individuals are less likely to self-enhance their reputation compared to those without autism, others argue that autistic individuals do not have less of a desire for self-enhancement than non-autistic individuals.</span><sup class="reference" data-dcnode-id="7808" id="cite_ref-45"><a data-dcnode-id="7809" href="#cite_note-45"><span data-dcnode-id="7810" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7807" instrument_node="">
</span></p><span data-dcnode-id="7805" instrument_node="">
</span><h3 data-dcnode-id="7795"><span class="mw-headline" data-dcnode-id="7803" id="Difficulties_in_relationships"><span data-dcnode-id="7804" instrument_node="">Difficulties in relationships</span></span><span class="mw-editsection" data-dcnode-id="7796"><span class="mw-editsection-bracket" data-dcnode-id="7801"><span data-dcnode-id="7802" instrument_node="">[</span></span><a data-dcnode-id="7799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D11" title="Edit section: Difficulties in relationships"><span data-dcnode-id="7800" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7797"><span data-dcnode-id="7798" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7794" instrument_node="">
</span><p data-dcnode-id="7762"><span data-dcnode-id="7793" instrument_node="">Two traits sometimes found in AS individuals are </span><a data-dcnode-id="7791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mind-blindness" title="Mind-blindness"><span data-dcnode-id="7792" instrument_node="">mind-blindness</span></a><span data-dcnode-id="7790" instrument_node=""> (the inability to predict the beliefs and intentions of others) and </span><a data-dcnode-id="7788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexithymia" title="Alexithymia"><span data-dcnode-id="7789" instrument_node="">alexithymia</span></a><span data-dcnode-id="7787" instrument_node=""> (the inability to identify and interpret emotional signals in oneself or others), which reduce the ability to be empathetically attuned to others.</span><sup class="reference" data-dcnode-id="7784" id="cite_ref-cc_46-0"><a data-dcnode-id="7785" href="#cite_note-cc-46"><span data-dcnode-id="7786" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="7781" id="cite_ref-fmri_47-0"><a data-dcnode-id="7782" href="#cite_note-fmri-47"><span data-dcnode-id="7783" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7780" instrument_node=""> Alexithymia in AS functions as an independent variable relying on different neural networks than those implicated in </span><a data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theory_of_mind" title="Theory of mind"><span data-dcnode-id="7779" instrument_node="">theory of mind</span></a><span data-dcnode-id="7777" instrument_node=""> (ToM).</span><sup class="reference" data-dcnode-id="7774" id="cite_ref-cc_46-1"><a data-dcnode-id="7775" href="#cite_note-cc-46"><span data-dcnode-id="7776" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="7771" id="cite_ref-fmri_47-1"><a data-dcnode-id="7772" href="#cite_note-fmri-47"><span data-dcnode-id="7773" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7770" instrument_node=""> In fact, a lack of ToM in AS may be a result of a lack of information available to the mind due to the operation of the alexithymic deficit.</span><sup class="reference" data-dcnode-id="7767" id="cite_ref-cc_46-2"><a data-dcnode-id="7768" href="#cite_note-cc-46"><span data-dcnode-id="7769" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="7764" id="cite_ref-fmri_47-2"><a data-dcnode-id="7765" href="#cite_note-fmri-47"><span data-dcnode-id="7766" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7763" instrument_node="">
</span></p><p data-dcnode-id="7743"><span data-dcnode-id="7761" instrument_node="">A second issue related to alexithymia involves the inability to identify and modulate strong emotions such as sadness or anger, which leaves the individual prone to "sudden affective outbursts such as crying or rage".</span><sup class="reference" data-dcnode-id="7758" id="cite_ref-48"><a data-dcnode-id="7759" href="#cite_note-48"><span data-dcnode-id="7760" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="7755" id="cite_ref-49"><a data-dcnode-id="7756" href="#cite_note-49"><span data-dcnode-id="7757" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="7752" id="cite_ref-50"><a data-dcnode-id="7753" href="#cite_note-50"><span data-dcnode-id="7754" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7751" instrument_node=""> According to </span><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Attwood" title="Tony Attwood"><span data-dcnode-id="7750" instrument_node="">Tony Attwood</span></a><span data-dcnode-id="7748" instrument_node="">, the inability to express feelings using words may also predispose the individual to use physical acts to articulate the mood and release the emotional energy.</span><sup class="reference" data-dcnode-id="7745" id="cite_ref-51"><a data-dcnode-id="7746" href="#cite_note-51"><span data-dcnode-id="7747" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7744" instrument_node="">
</span></p><p data-dcnode-id="7714"><span data-dcnode-id="7742" instrument_node="">People with AS report a feeling of being detached against their will from the world around them ("on the outside looking in"). They may have difficulty finding a life partner or getting married due to poor social skills.</span><sup class="reference" data-dcnode-id="7739" id="cite_ref-Tsatsanis_20-1"><a data-dcnode-id="7740" href="#cite_note-Tsatsanis-20"><span data-dcnode-id="7741" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7738" instrument_node=""> The complexity and inconsistency of the social world can pose an extreme challenge for individuals with AS. In the UK Asperger's is covered by the Disability Discrimination Act; those with AS who get treated badly because of it may have some redress. The first case was </span><i data-dcnode-id="7736"><span data-dcnode-id="7737" instrument_node="">Hewett v Motorola 2004</span></i><sup class="reference" data-dcnode-id="7733" id="cite_ref-52"><a data-dcnode-id="7734" href="#cite_note-52"><span data-dcnode-id="7735" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7732" instrument_node=""> (sometimes referred to as Hewitt) and the second was </span><i data-dcnode-id="7730"><span data-dcnode-id="7731" instrument_node="">Isles v Ealing Council</span></i><span data-dcnode-id="7729" instrument_node="">.</span><sup class="reference" data-dcnode-id="7726" id="cite_ref-53"><a data-dcnode-id="7727" href="#cite_note-53"><span data-dcnode-id="7728" instrument_node="">[53]</span></a></sup><span data-dcnode-id="7725" instrument_node=""> The same applies in the United States with the </span><a data-dcnode-id="7723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans_with_Disabilities_Act_of_1990" title="Americans with Disabilities Act of 1990"><span data-dcnode-id="7724" instrument_node="">Americans with Disabilities Act</span></a><span data-dcnode-id="7722" instrument_node="">, </span><a data-dcnode-id="7720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ADA_Amendments_Act_of_2008" title="ADA Amendments Act of 2008"><span data-dcnode-id="7721" instrument_node="">amended in 2008</span></a><span data-dcnode-id="7719" instrument_node=""> to include autism spectrum disorders.</span><sup class="reference" data-dcnode-id="7716" id="cite_ref-54"><a data-dcnode-id="7717" href="#cite_note-54"><span data-dcnode-id="7718" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7715" instrument_node="">
</span></p><p data-dcnode-id="7708"><span data-dcnode-id="7713" instrument_node="">The intense focus and tendency to work things out logically often grants people with AS a high level of ability in their field of interest. When these special interests coincide with a materially or socially useful task, the person with AS can lead a profitable career and a fulfilled life. The child obsessed with a specific area may succeed in employment related to that area.</span><sup class="reference" data-dcnode-id="7710" id="cite_ref-55"><a data-dcnode-id="7711" href="#cite_note-55"><span data-dcnode-id="7712" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7709" instrument_node="">
</span></p><p data-dcnode-id="7695"><span data-dcnode-id="7707" instrument_node="">According to Elizabeth Fein, the dynamic of </span><a data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Role-playing_game" title="Role-playing game"><span data-dcnode-id="7706" instrument_node="">role-playing games</span></a><span data-dcnode-id="7704" instrument_node=""> is especially positive and attractive to people on the autism spectrum.</span><sup class="reference" data-dcnode-id="7701" id="cite_ref-56"><a data-dcnode-id="7702" href="#cite_note-56"><span data-dcnode-id="7703" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7700" instrument_node=""> The social information exchanged in these games are explicit, top-down and systematic and they follow a set of shared abstract rules. Baez and Rattazzi showed that interpreting the implicit social information of daily life is difficult for autistics.</span><sup class="reference" data-dcnode-id="7697" id="cite_ref-57"><a data-dcnode-id="7698" href="#cite_note-57"><span data-dcnode-id="7699" instrument_node="">[57]</span></a></sup><span data-dcnode-id="7696" instrument_node="">
</span></p><p data-dcnode-id="7669"><span data-dcnode-id="7694" instrument_node="">Despite the fact that AS individuals are commonly known to lack ToM, recent research has suggested that ToM may be not only present in AS individuals but also act differently compared to neurotypicals as suggested in the </span><a data-dcnode-id="7692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Double_empathy_problem" title="Double empathy problem"><span data-dcnode-id="7693" instrument_node="">double empathy problem</span></a><span data-dcnode-id="7691" instrument_node="">.</span><sup class="reference" data-dcnode-id="7688" id="cite_ref-58"><a data-dcnode-id="7689" href="#cite_note-58"><span data-dcnode-id="7690" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="7685" id="cite_ref-59"><a data-dcnode-id="7686" href="#cite_note-59"><span data-dcnode-id="7687" instrument_node="">[59]</span></a></sup><span data-dcnode-id="7684" instrument_node=""> Autistic ToM is simply based on the use of rules and </span><a data-dcnode-id="7682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logic" title="Logic"><span data-dcnode-id="7683" instrument_node="">logic</span></a><span data-dcnode-id="7681" instrument_node="">.</span><sup class="reference" data-dcnode-id="7678" id="cite_ref-60"><a data-dcnode-id="7679" href="#cite_note-60"><span data-dcnode-id="7680" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7677" instrument_node=""> It is also suggested that people on the autism spectrum can understand and predict the thoughts and motivations of each other better than neurotypicals can, and autistic interactions may display even greater social signals of shared enjoyment, ease, and rapport when interacting.</span><sup class="reference" data-dcnode-id="7674" id="cite_ref-61"><a data-dcnode-id="7675" href="#cite_note-61"><span data-dcnode-id="7676" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="7671" id="cite_ref-62"><a data-dcnode-id="7672" href="#cite_note-62"><span data-dcnode-id="7673" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7670" instrument_node=""> This means AS individuals present mind-blindness and alexithymia towards neurotypicals and vice versa due to bidirectional differences in communication style as well as a reciprocal lack of understanding since the two neurotypes clash.
</span></p><span data-dcnode-id="7668" instrument_node="">
</span><h2 data-dcnode-id="7658"><span class="mw-headline" data-dcnode-id="7666" id="Autism_rights_movement"><span data-dcnode-id="7667" instrument_node="">Autism rights movement</span></span><span class="mw-editsection" data-dcnode-id="7659"><span class="mw-editsection-bracket" data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">[</span></span><a data-dcnode-id="7662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D12" title="Edit section: Autism rights movement"><span data-dcnode-id="7663" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7660"><span data-dcnode-id="7661" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7657" instrument_node="">

</span><li data-dcnode-id="7262"><a data-dcnode-id="7263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jonathan_Mitchell_%28writer%29" title="Jonathan Mitchell (writer)"><span data-dcnode-id="7264" instrument_node="">Jonathan Mitchell</span></a></li><span data-dcnode-id="7261" instrument_node="">
</span><li data-dcnode-id="7258"><a data-dcnode-id="7259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jonathan_Shestack" title="Jonathan Shestack"><span data-dcnode-id="7260" instrument_node="">Jonathan Shestack</span></a></li><span data-dcnode-id="7257" instrument_node="">
</span><li data-dcnode-id="7254"><a data-dcnode-id="7255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alison_Singer" title="Alison Singer"><span data-dcnode-id="7256" instrument_node="">Alison Singer</span></a></li></ul><span data-dcnode-id="7252" instrument_node="">
