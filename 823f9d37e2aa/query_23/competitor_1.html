</span><p data-dcnode-id="6347"><span data-dcnode-id="6390" instrument_node="">Some notable figures like American food animal handling systems designer and author </span><a data-dcnode-id="6388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_Grandin" title="Temple Grandin"><span data-dcnode-id="6389" instrument_node="">Temple Grandin</span></a><span data-dcnode-id="6387" instrument_node="">,</span><sup class="reference" data-dcnode-id="6384" id="cite_ref-119"><a data-dcnode-id="6385" href="#cite_note-119"><span data-dcnode-id="6386" instrument_node="">[119]</span></a></sup><span data-dcnode-id="6383" instrument_node=""> American </span><a data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize" title="Pulitzer Prize"><span data-dcnode-id="6382" instrument_node="">Pulitzer Prize</span></a><span data-dcnode-id="6380" instrument_node="">-winning music critic and author </span><a data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tim_Page_%28music_critic%29" title="Tim Page (music critic)"><span data-dcnode-id="6379" instrument_node="">Tim Page</span></a><span data-dcnode-id="6377" instrument_node="">,</span><sup class="reference" data-dcnode-id="6374" id="cite_ref-120"><a data-dcnode-id="6375" href="#cite_note-120"><span data-dcnode-id="6376" instrument_node="">[120]</span></a></sup><sup class="reference" data-dcnode-id="6371" id="cite_ref-121"><a data-dcnode-id="6372" href="#cite_note-121"><span data-dcnode-id="6373" instrument_node="">[121]</span></a></sup><span data-dcnode-id="6370" instrument_node=""> Australian musician, lead singer and only constant member of rock band </span><a data-dcnode-id="6368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Vines_%28band%29" title="The Vines (band)"><span data-dcnode-id="6369" instrument_node="">the Vines</span></a><span data-dcnode-id="6367" instrument_node=""> </span><a data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Craig_Nicholls" title="Craig Nicholls"><span data-dcnode-id="6366" instrument_node="">Craig Nicholls</span></a><span data-dcnode-id="6364" instrument_node="">,</span><sup class="reference" data-dcnode-id="6361" id="cite_ref-122"><a data-dcnode-id="6362" href="#cite_note-122"><span data-dcnode-id="6363" instrument_node="">[122]</span></a></sup><span data-dcnode-id="6360" instrument_node=""> English actor and filmmaker </span><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paddy_Considine" title="Paddy Considine"><span data-dcnode-id="6359" instrument_node="">Paddy Considine</span></a><sup class="reference" data-dcnode-id="6355" id="cite_ref-Lockyer_123-0"><a data-dcnode-id="6356" href="#cite_note-Lockyer-123"><span data-dcnode-id="6357" instrument_node="">[123]</span></a></sup><sup class="reference" data-dcnode-id="6352" id="cite_ref-124"><a data-dcnode-id="6353" href="#cite_note-124"><span data-dcnode-id="6354" instrument_node="">[124]</span></a></sup><span data-dcnode-id="6351" instrument_node=""> and Swedish environmental activist </span><a data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greta_Thunberg" title="Greta Thunberg"><span data-dcnode-id="6350" instrument_node="">Greta Thunberg</span></a><span data-dcnode-id="6348" instrument_node=""> are autistic.
</span></p><p data-dcnode-id="6323"><span data-dcnode-id="6346" instrument_node="">
Thunberg, who in August 2018 started the "</span><a class="mw-redirect" data-dcnode-id="6344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/School_strike_for_climate" title="School strike for climate"><span data-dcnode-id="6345" instrument_node="">School strike for climate</span></a><span data-dcnode-id="6343" instrument_node="">" movement, has explained how the "gift" of living with Asperger syndrome helps her "see things from outside the box" when it comes to </span><a data-dcnode-id="6341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="6342" instrument_node="">climate change</span></a><span data-dcnode-id="6340" instrument_node="">.</span><sup class="reference" data-dcnode-id="6337" id="cite_ref-125"><a data-dcnode-id="6338" href="#cite_note-125"><span data-dcnode-id="6339" instrument_node="">[125]</span></a></sup><span data-dcnode-id="6336" instrument_node=""> In an interview with presenter </span><a data-dcnode-id="6334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nick_Robinson_%28journalist%29" title="Nick Robinson (journalist)"><span data-dcnode-id="6335" instrument_node="">Nick Robinson</span></a><span data-dcnode-id="6333" instrument_node=""> on BBC Radio 4's </span><i data-dcnode-id="6330"><a class="mw-redirect" data-dcnode-id="6331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Today_programme" title="Today programme"><span data-dcnode-id="6332" instrument_node="">Today</span></a></i><span data-dcnode-id="6329" instrument_node="">, the then-16-year-old activist said that autism helps her see things in "black and white". She went on to say:</span><sup class="reference" data-dcnode-id="6326" id="cite_ref-Thunberg_126-0"><a data-dcnode-id="6327" href="#cite_note-Thunberg-126"><span data-dcnode-id="6328" instrument_node="">[126]</span></a></sup></p><blockquote class="templatequote" data-dcnode-id="6320"><p data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node="">It makes me different, and being different is a gift, I would say. It also makes me see things from outside the box. I don't easily fall for lies, I can see through things. I don't think I would be interested in the climate at all, if I had been like everyone else. Many people say that it doesn't matter, you can cheat sometimes. But I can't do that. You can't be a little bit sustainable. Either you're sustainable, or not sustainable. For way too long the politicians and people in power have got away with not doing anything at all to fight the climate crisis and ecological crisis, but we will make sure that they will not get away with it any longer.</span></p></blockquote><span data-dcnode-id="6319" instrument_node="">
</span><p data-dcnode-id="6211"><span data-dcnode-id="6318" instrument_node="">Scottish singer </span><a data-dcnode-id="6316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susan_Boyle" title="Susan Boyle"><span data-dcnode-id="6317" instrument_node="">Susan Boyle</span></a><span data-dcnode-id="6315" instrument_node=""> was diagnosed with Aspergers at the age of 51.</span><sup class="reference" data-dcnode-id="6312" id="cite_ref-:2_127-0"><a data-dcnode-id="6313" href="#cite_note-:2-127"><span data-dcnode-id="6314" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6311" instrument_node=""> Boyle was originally believed to have had slight brain damage at birth.</span><sup class="reference" data-dcnode-id="6308" id="cite_ref-128"><a data-dcnode-id="6309" href="#cite_note-128"><span data-dcnode-id="6310" instrument_node="">[128]</span></a></sup><span data-dcnode-id="6307" instrument_node=""> Boyle rose to fame after appearing on the talent show </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Britain%2527s_Got_Talent" title="Britain's Got Talent"><span data-dcnode-id="6306" instrument_node="">Britain's Got Talent</span></a><span data-dcnode-id="6304" instrument_node=""> in 2009.</span><sup class="reference" data-dcnode-id="6301" id="cite_ref-129"><a data-dcnode-id="6302" href="#cite_note-129"><span data-dcnode-id="6303" instrument_node="">[129]</span></a></sup><span data-dcnode-id="6300" instrument_node=""> Her debut album </span><a data-dcnode-id="6297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I_Dreamed_a_Dream_%28album%29" title="I Dreamed a Dream (album)"><i data-dcnode-id="6298"><span data-dcnode-id="6299" instrument_node="">I Dreamed a Dream</span></i></a><span data-dcnode-id="6296" instrument_node="">, released in 2009, became the fastest selling debut by a UK artist of all time.</span><sup class="reference" data-dcnode-id="6293" id="cite_ref-:2_127-1"><a data-dcnode-id="6294" href="#cite_note-:2-127"><span data-dcnode-id="6295" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6292" instrument_node=""> American actress </span><a data-dcnode-id="6290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daryl_Hannah" title="Daryl Hannah"><span data-dcnode-id="6291" instrument_node="">Daryl Hannah</span></a><span data-dcnode-id="6289" instrument_node="">, star of movies such as </span><i data-dcnode-id="6283"><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Splash_%28film%29" title="Splash (film)"><span data-dcnode-id="6288" instrument_node="">Splash</span></a><span data-dcnode-id="6286" instrument_node="">, </span><a data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steel_Magnolias" title="Steel Magnolias"><span data-dcnode-id="6285" instrument_node="">Steel Magnolias</span></a></i><span data-dcnode-id="6282" instrument_node=""> and </span><i data-dcnode-id="6278"><a data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wall_Street_%281987_film%29" title="Wall Street (1987 film)"><span data-dcnode-id="6281" instrument_node="">Wall Street</span></a><span data-dcnode-id="6279" instrument_node="">,</span></i><span data-dcnode-id="6277" instrument_node=""> was diagnosed as being on the autism spectrum as a child.</span><sup class="reference" data-dcnode-id="6274" id="cite_ref-130"><a data-dcnode-id="6275" href="#cite_note-130"><span data-dcnode-id="6276" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6273" instrument_node=""> Diagnosed at fifteen, </span><a data-dcnode-id="6271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heather_Kuzmich" title="Heather Kuzmich"><span data-dcnode-id="6272" instrument_node="">Heather Kuzmich</span></a><span data-dcnode-id="6270" instrument_node=""> appeared on </span><i data-dcnode-id="6267"><a data-dcnode-id="6268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/America%2527s_Next_Top_Model" title="America's Next Top Model"><span data-dcnode-id="6269" instrument_node="">America's Next Top Model</span></a></i><span data-dcnode-id="6266" instrument_node=""> in 2007.</span><sup class="reference" data-dcnode-id="6263" id="cite_ref-:2_127-2"><a data-dcnode-id="6264" href="#cite_note-:2-127"><span data-dcnode-id="6265" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6262" instrument_node=""> Although she did not win the competition, Kuzmich was voted the viewers' favourite eight weeks in a row.</span><sup class="reference" data-dcnode-id="6259" id="cite_ref-131"><a data-dcnode-id="6260" href="#cite_note-131"><span data-dcnode-id="6261" instrument_node="">[131]</span></a></sup><span data-dcnode-id="6258" instrument_node=""> She has since been signed to </span><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elite_Model_Management" title="Elite Model Management"><span data-dcnode-id="6257" instrument_node="">Elite Model Management</span></a><span data-dcnode-id="6255" instrument_node="">.</span><sup class="reference" data-dcnode-id="6252" id="cite_ref-:2_127-3"><a data-dcnode-id="6253" href="#cite_note-:2-127"><span data-dcnode-id="6254" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6251" instrument_node=""> </span><a data-dcnode-id="6249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="6250" instrument_node="">New Zealand</span></a><span data-dcnode-id="6248" instrument_node="">-born musician </span><a data-dcnode-id="6246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ladyhawke_%28musician%29" title="Ladyhawke (musician)"><span data-dcnode-id="6247" instrument_node="">Ladyhawke</span></a><span data-dcnode-id="6245" instrument_node=""> and gold medal-winning British </span><a data-dcnode-id="6243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paralympic_Games" title="Paralympic Games"><span data-dcnode-id="6244" instrument_node="">Paralympic</span></a><span data-dcnode-id="6242" instrument_node=""> swimmer </span><a data-dcnode-id="6240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jessica-Jane_Applegate" title="Jessica-Jane Applegate"><span data-dcnode-id="6241" instrument_node="">Jessica-Jane Applegate</span></a><span data-dcnode-id="6239" instrument_node=""> are also autistic.</span><sup class="reference" data-dcnode-id="6236" id="cite_ref-132"><a data-dcnode-id="6237" href="#cite_note-132"><span data-dcnode-id="6238" instrument_node="">[132]</span></a></sup><sup class="reference" data-dcnode-id="6233" id="cite_ref-133"><a data-dcnode-id="6234" href="#cite_note-133"><span data-dcnode-id="6235" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6232" instrument_node=""> In June 2021, autistic Scottish strongman </span><a data-dcnode-id="6230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Stoltman" title="Tom Stoltman"><span data-dcnode-id="6231" instrument_node="">Tom Stoltman</span></a><span data-dcnode-id="6229" instrument_node=""> won the </span><a data-dcnode-id="6227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World%2527s_Strongest_Man" title="World's Strongest Man"><span data-dcnode-id="6228" instrument_node="">World's Strongest Man</span></a><span data-dcnode-id="6226" instrument_node=""> competition.</span><sup class="reference" data-dcnode-id="6223" id="cite_ref-134"><a data-dcnode-id="6224" href="#cite_note-134"><span data-dcnode-id="6225" instrument_node="">[134]</span></a></sup><span data-dcnode-id="6222" instrument_node=""> Welsh actor </span><a data-dcnode-id="6220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Hopkins" title="Anthony Hopkins"><span data-dcnode-id="6221" instrument_node="">Anthony Hopkins</span></a><span data-dcnode-id="6219" instrument_node=""> is the first openly autistic actor to win an </span><a data-dcnode-id="6217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_Awards" title="Academy Awards"><span data-dcnode-id="6218" instrument_node="">Academy Award</span></a><span data-dcnode-id="6216" instrument_node="">.</span><sup class="reference" data-dcnode-id="6213" id="cite_ref-135"><a data-dcnode-id="6214" href="#cite_note-135"><span data-dcnode-id="6215" instrument_node="">[135]</span></a></sup><span data-dcnode-id="6212" instrument_node="">
</span></p><p data-dcnode-id="6169"><span data-dcnode-id="6210" instrument_node="">Additionally, media speculation of contemporary figures as being on the autism spectrum has become popular in recent times. </span><a data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_%28magazine%29" title="New York (magazine)"><i data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">New York</span></i><span data-dcnode-id="6207" instrument_node=""> magazine</span></a><span data-dcnode-id="6205" instrument_node=""> reported some examples, which included that </span><a data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_%28magazine%29" title="Time (magazine)"><i data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">Time</span></i><span data-dcnode-id="6202" instrument_node=""> magazine</span></a><span data-dcnode-id="6200" instrument_node=""> suggested that </span><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Gates" title="Bill Gates"><span data-dcnode-id="6199" instrument_node="">Bill Gates</span></a><span data-dcnode-id="6197" instrument_node=""> is autistic, and that a biographer of </span><a data-dcnode-id="6195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warren_Buffett" title="Warren Buffett"><span data-dcnode-id="6196" instrument_node="">Warren Buffett</span></a><span data-dcnode-id="6194" instrument_node=""> wrote that his prodigious memory and "fascination with numbers" give him "a vaguely autistic aura." The magazine also reported that on </span><i data-dcnode-id="6191"><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Celebrity_Rehab_with_Dr._Drew" title="Celebrity Rehab with Dr. Drew"><span data-dcnode-id="6193" instrument_node="">Celebrity Rehab</span></a></i><span data-dcnode-id="6190" instrument_node="">, Dr. Drew Pinsky deemed basketball player </span><a data-dcnode-id="6188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dennis_Rodman" title="Dennis Rodman"><span data-dcnode-id="6189" instrument_node="">Dennis Rodman</span></a><span data-dcnode-id="6187" instrument_node=""> a candidate for an Asperger's diagnosis, and the </span><a data-dcnode-id="6185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_California%2C_Los_Angeles" title="University of California, Los Angeles"><span data-dcnode-id="6186" instrument_node="">UCLA</span></a><span data-dcnode-id="6184" instrument_node=""> specialist consulted "seemed to concur". </span><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nora_Ephron" title="Nora Ephron"><span data-dcnode-id="6183" instrument_node="">Nora Ephron</span></a><span data-dcnode-id="6181" instrument_node=""> criticized these conclusions, writing that popular speculative diagnoses suggest autism is "an epidemic, or else a wildly over-diagnosed thing that there used to be other words for."</span><sup class="reference" data-dcnode-id="6178" id="cite_ref-nymag_136-0"><a data-dcnode-id="6179" href="#cite_note-nymag-136"><span data-dcnode-id="6180" instrument_node="">[136]</span></a></sup><span data-dcnode-id="6177" instrument_node=""> The practice of diagnosing autism in these cases is controversial.</span><sup class="reference" data-dcnode-id="6174" id="cite_ref-sowell_137-0"><a data-dcnode-id="6175" href="#cite_note-sowell-137"><span data-dcnode-id="6176" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="6171" id="cite_ref-138"><a data-dcnode-id="6172" href="#cite_note-138"><span data-dcnode-id="6173" instrument_node="">[138]</span></a></sup><span data-dcnode-id="6170" instrument_node="">
</span></p><p data-dcnode-id="6160"><span data-dcnode-id="6168" instrument_node="">Some historical personalities are also the subject of speculation about being autistic, e.g. </span><a data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michelangelo" title="Michelangelo"><span data-dcnode-id="6167" instrument_node="">Michelangelo</span></a><span data-dcnode-id="6165" instrument_node="">.</span><sup class="reference" data-dcnode-id="6162" id="cite_ref-139"><a data-dcnode-id="6163" href="#cite_note-139"><span data-dcnode-id="6164" instrument_node="">[139]</span></a></sup><span data-dcnode-id="6161" instrument_node="">
</span></p><span data-dcnode-id="6159" instrument_node="">
