</span></div></div></div></td></tr><tr data-dcnode-id="7229"><td class="sidebar-navbar" data-dcnode-id="7230"><link data-dcnode-id="7245" href="mw-data:TemplateStyles:r1063604349" rel="mw-deduplicated-inline-style"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="7231"><ul data-dcnode-id="7232"><li class="nv-view" data-dcnode-id="7241"><a data-dcnode-id="7242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3AAutism_rights_movement" title="Template:Autism rights movement"><abbr data-dcnode-id="7243" title="View this template"><span data-dcnode-id="7244" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="7237"><a data-dcnode-id="7238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3AAutism_rights_movement" title="Template talk:Autism rights movement"><abbr data-dcnode-id="7239" title="Discuss this template"><span data-dcnode-id="7240" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="7233"><a class="external text" data-dcnode-id="7234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AAutism_rights_movement%26action%3Dedit"><abbr data-dcnode-id="7235" title="Edit this template"><span data-dcnode-id="7236" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="7226" instrument_node="">
</span><link data-dcnode-id="7225" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7221" role="note"><span data-dcnode-id="7224" instrument_node="">Main article: </span><a data-dcnode-id="7222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_rights_movement" title="Autism rights movement"><span data-dcnode-id="7223" instrument_node="">Autism rights movement</span></a></div><span data-dcnode-id="7220" instrument_node="">
</span><p data-dcnode-id="7177"><span data-dcnode-id="7219" instrument_node="">The autism rights movement is a </span><a data-dcnode-id="7217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_movement" title="Social movement"><span data-dcnode-id="7218" instrument_node="">social movement</span></a><span data-dcnode-id="7216" instrument_node=""> within the context of </span><a data-dcnode-id="7214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disability_rights_movement" title="Disability rights movement"><span data-dcnode-id="7215" instrument_node="">disability rights</span></a><span data-dcnode-id="7213" instrument_node=""> that emphasizes the concept of </span><a data-dcnode-id="7211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neurodiversity" title="Neurodiversity"><span data-dcnode-id="7212" instrument_node="">neurodiversity</span></a><span data-dcnode-id="7210" instrument_node="">, viewing the </span><a data-dcnode-id="7208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_spectrum" title="Autism spectrum"><span data-dcnode-id="7209" instrument_node="">autism spectrum</span></a><span data-dcnode-id="7207" instrument_node=""> as a result of natural variations in the </span><a data-dcnode-id="7205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_brain" title="Human brain"><span data-dcnode-id="7206" instrument_node="">human brain</span></a><span data-dcnode-id="7204" instrument_node=""> rather than a disorder to be cured.</span><sup class="reference" data-dcnode-id="7201" id="cite_ref-Solomon_64-0"><a data-dcnode-id="7202" href="#cite_note-Solomon-64"><span data-dcnode-id="7203" instrument_node="">[64]</span></a></sup><span data-dcnode-id="7200" instrument_node=""> The ARM advocates a variety of goals, including greater acceptance of autistic behaviors;</span><sup class="reference" data-dcnode-id="7197" id="cite_ref-AAP_65-0"><a data-dcnode-id="7198" href="#cite_note-AAP-65"><span data-dcnode-id="7199" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7196" instrument_node=""> therapies that focus on coping skills rather than imitating the behaviors of </span><a data-dcnode-id="7194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neurotypical" title="Neurotypical"><span data-dcnode-id="7195" instrument_node="">neurotypical</span></a><span data-dcnode-id="7193" instrument_node=""> peers;</span><sup class="reference" data-dcnode-id="7190" id="cite_ref-AFF_66-0"><a data-dcnode-id="7191" href="#cite_note-AFF-66"><span data-dcnode-id="7192" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7189" instrument_node=""> the creation of social networks and events that allow autistic people to socialize on their own terms;</span><sup class="reference" data-dcnode-id="7186" id="cite_ref-Autreat_67-0"><a data-dcnode-id="7187" href="#cite_note-Autreat-67"><span data-dcnode-id="7188" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7185" instrument_node=""> and the recognition of the autistic community as a </span><a data-dcnode-id="7183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minority_group" title="Minority group"><span data-dcnode-id="7184" instrument_node="">minority group</span></a><span data-dcnode-id="7182" instrument_node="">.</span><sup class="reference" data-dcnode-id="7179" id="cite_ref-UN_68-0"><a data-dcnode-id="7180" href="#cite_note-UN-68"><span data-dcnode-id="7181" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7178" instrument_node="">
</span></p><p data-dcnode-id="7159"><span data-dcnode-id="7176" instrument_node="">Autism rights or neurodiversity advocates believe that the autism spectrum is genetic and should be accepted as a natural expression of the </span><a data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_genome" title="Human genome"><span data-dcnode-id="7175" instrument_node="">human genome</span></a><span data-dcnode-id="7173" instrument_node="">. This perspective is distinct from two other likewise distinct views: the medical perspective, that autism is caused by a genetic defect and should be addressed by targeting the autism gene(s), and the </span><a data-dcnode-id="7171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fringe_theory" title="Fringe theory"><span data-dcnode-id="7172" instrument_node="">fringe theory</span></a><span data-dcnode-id="7170" instrument_node=""> that autism is caused by environmental factors like </span><a data-dcnode-id="7168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaccine" title="Vaccine"><span data-dcnode-id="7169" instrument_node="">vaccines</span></a><span data-dcnode-id="7167" instrument_node=""> and </span><a data-dcnode-id="7165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pollution" title="Pollution"><span data-dcnode-id="7166" instrument_node="">pollution</span></a><span data-dcnode-id="7164" instrument_node=""> and could be cured by addressing environmental causes.</span><sup class="reference" data-dcnode-id="7161" id="cite_ref-Solomon_64-1"><a data-dcnode-id="7162" href="#cite_note-Solomon-64"><span data-dcnode-id="7163" instrument_node="">[64]</span></a></sup><span data-dcnode-id="7160" instrument_node="">
</span></p><p data-dcnode-id="7144"><span data-dcnode-id="7158" instrument_node="">The movement is controversial. There are a wide variety of both supportive and critical opinions about the movement among people who are autistic or associated with autistic people. A common criticism leveled against autistic activists is that the majority of them are "</span><a data-dcnode-id="7156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High-functioning_autism" title="High-functioning autism"><span data-dcnode-id="7157" instrument_node="">high-functioning</span></a><span data-dcnode-id="7155" instrument_node="">" or have </span><a data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asperger_syndrome" title="Asperger syndrome"><span data-dcnode-id="7154" instrument_node="">Asperger syndrome</span></a><span data-dcnode-id="7152" instrument_node=""> and do not represent the views of "</span><a data-dcnode-id="7150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Low-functioning_autism" title="Low-functioning autism"><span data-dcnode-id="7151" instrument_node="">low-functioning</span></a><span data-dcnode-id="7149" instrument_node="">" autistic people.</span><sup class="reference" data-dcnode-id="7146" id="cite_ref-Synapse_69-0"><a data-dcnode-id="7147" href="#cite_note-Synapse-69"><span data-dcnode-id="7148" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7145" instrument_node="">
</span></p><span data-dcnode-id="7143" instrument_node="">
</span><h3 data-dcnode-id="7133"><span class="mw-headline" data-dcnode-id="7141" id="Autistic_pride"><span data-dcnode-id="7142" instrument_node="">Autistic pride</span></span><span class="mw-editsection" data-dcnode-id="7134"><span class="mw-editsection-bracket" data-dcnode-id="7139"><span data-dcnode-id="7140" instrument_node="">[</span></span><a data-dcnode-id="7137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D13" title="Edit section: Autistic pride"><span data-dcnode-id="7138" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7135"><span data-dcnode-id="7136" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7132" instrument_node="">
</span><link data-dcnode-id="7131" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7127" role="note"><span data-dcnode-id="7130" instrument_node="">Further information: </span><a data-dcnode-id="7128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autistic_Pride_Day" title="Autistic Pride Day"><span data-dcnode-id="7129" instrument_node="">Autistic Pride Day</span></a></div><span data-dcnode-id="7126" instrument_node="">
</span><p data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">Autistic pride refers to pride in autism and shifting views of autism from "disease" to "difference." Autistic pride emphasizes the innate potential in all human phenotypic expressions and celebrates the diversity various neurological types express.
</span></p><p data-dcnode-id="7112"><span data-dcnode-id="7123" instrument_node="">Autistic pride asserts that autistic people are not impaired or damaged; rather, they have a unique set of characteristics that provide them many rewards and challenges, not unlike their non-autistic peers.</span><sup class="reference" data-dcnode-id="7120" id="cite_ref-SanerDisease_11-1"><a data-dcnode-id="7121" href="#cite_note-SanerDisease-11"><span data-dcnode-id="7122" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="7117" id="cite_ref-NPRAutism_70-0"><a data-dcnode-id="7118" href="#cite_note-NPRAutism-70"><span data-dcnode-id="7119" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="7114" id="cite_ref-INTO_71-0"><a data-dcnode-id="7115" href="#cite_note-INTO-71"><span data-dcnode-id="7116" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7113" instrument_node="">
</span></p><p data-dcnode-id="7080"><a data-dcnode-id="7110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_therapies" title="Autism therapies"><span data-dcnode-id="7111" instrument_node="">Curing autism</span></a><span data-dcnode-id="7109" instrument_node=""> is a </span><a class="mw-redirect" data-dcnode-id="7107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethical_challenges_to_autism_treatment" title="Ethical challenges to autism treatment"><span data-dcnode-id="7108" instrument_node="">controversial</span></a><span data-dcnode-id="7106" instrument_node=""> and politicized issue. The "autistic community" can be divided into several groups. Some seek a cure for autism—sometimes dubbed as </span><i data-dcnode-id="7104"><span data-dcnode-id="7105" instrument_node="">pro-cure</span></i><span data-dcnode-id="7103" instrument_node="">—while others consider a cure unnecessary or unethical,</span><sup class="reference" data-dcnode-id="7100" id="cite_ref-Harmon_3-4"><a data-dcnode-id="7101" href="#cite_note-Harmon-3"><span data-dcnode-id="7102" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7097" id="cite_ref-SanerDisease_11-2"><a data-dcnode-id="7098" href="#cite_note-SanerDisease-11"><span data-dcnode-id="7099" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="7094" id="cite_ref-72"><a data-dcnode-id="7095" href="#cite_note-72"><span data-dcnode-id="7096" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7093" instrument_node=""> or feel that autism conditions are not harmful or detrimental.</span><sup class="reference" data-dcnode-id="7090" id="cite_ref-Harmon_3-5"><a data-dcnode-id="7091" href="#cite_note-Harmon-3"><span data-dcnode-id="7092" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7089" instrument_node=""> For example, it may be seen as an evolutionary adaptation to an ecological niche by some environmentalists</span><sup class="noprint Inline-Template" data-dcnode-id="7082" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="7088" instrument_node="">[</span><i data-dcnode-id="7084"><a data-dcnode-id="7085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="7086" title="The text near this tag may need clarification or removal of jargon. (October 2017)"><span data-dcnode-id="7087" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="7083" instrument_node="">]</span></sup><span data-dcnode-id="7081" instrument_node=""> and the more radical autism rights campaigners.
</span></p><span data-dcnode-id="7079" instrument_node="">
</span><h3 data-dcnode-id="7069"><span class="mw-headline" data-dcnode-id="7077" id="Autistic_culture_and_community"><span data-dcnode-id="7078" instrument_node="">Autistic culture and community</span></span><span class="mw-editsection" data-dcnode-id="7070"><span class="mw-editsection-bracket" data-dcnode-id="7075"><span data-dcnode-id="7076" instrument_node="">[</span></span><a data-dcnode-id="7073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D14" title="Edit section: Autistic culture and community"><span data-dcnode-id="7074" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7068" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7053"><div class="thumbinner" data-dcnode-id="7054" style="width:222px;"><span class="mw-tmh-player audio" data-dcnode-id="7062" style="width:220px;"><audio class="thumbimage" data-dcnode-id="7067" data-durationhint="389" data-mwprovider="wikimediacommons" data-mwtitle="Bookbits_-_2011-05-03_John_Elder_Robison-Be_Different.vorb.oga" disabled="disabled" id="mwe_player_0_placeholder" preload="none" style="width:220px;" tabindex="-1" width="220"></audio><a class="mw-tmh-play" data-dcnode-id="7065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABookbits_-_2011-05-03_John_Elder_Robison-Be_Different.vorb.oga" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="7066"></span></a><span aria-label="6 minutes and 29 seconds" class="mw-tmh-duration mw-tmh-label" data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">6:29</span></span></span><span data-dcnode-id="7061" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7055"><div class="magnify" data-dcnode-id="7059"><a class="internal" data-dcnode-id="7060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABookbits_-_2011-05-03_John_Elder_Robison-Be_Different.vorb.oga" title="Enlarge"></a></div><a data-dcnode-id="7057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Elder_Robison" title="John Elder Robison"><span data-dcnode-id="7058" instrument_node="">John Elder Robison</span></a><span data-dcnode-id="7056" instrument_node=""> talks about Be Different on Bookbits radio</span></div></div></div><span data-dcnode-id="7052" instrument_node="">
</span><p data-dcnode-id="7027"><span data-dcnode-id="7051" instrument_node="">With the recent increases in autism recognition and new approaches to educating and socializing autistics, an autistic culture has begun to develop. Autistic culture is based on a belief that autism is a unique way of being and not a disorder to be cured.</span><sup class="reference" data-dcnode-id="7048" id="cite_ref-Harmon_3-6"><a data-dcnode-id="7049" href="#cite_note-Harmon-3"><span data-dcnode-id="7050" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7047" instrument_node=""> The </span><i data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">Aspie world</span></i><span data-dcnode-id="7044" instrument_node="">, as it is sometimes called, contains people with </span><a data-dcnode-id="7042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asperger_syndrome" title="Asperger syndrome"><span data-dcnode-id="7043" instrument_node="">Asperger syndrome</span></a><span data-dcnode-id="7041" instrument_node=""> (AS) and </span><a class="mw-redirect" data-dcnode-id="7039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_functioning_autism" title="High functioning autism"><span data-dcnode-id="7040" instrument_node="">high functioning autism</span></a><span data-dcnode-id="7038" instrument_node=""> (HFA), and can be linked to three historical trends: the emergence of AS and HFA as labels, the emergence of the </span><a data-dcnode-id="7036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disability_rights_movement" title="Disability rights movement"><span data-dcnode-id="7037" instrument_node="">disability rights movement</span></a><span data-dcnode-id="7035" instrument_node="">, and the rise of the </span><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="7034" instrument_node="">Internet</span></a><span data-dcnode-id="7032" instrument_node="">. Autistic communities exist both online and offline; many people use these for support and communication with others like themselves, as the social limitations of autism sometimes make it difficult to make friends, to establish support within general society, and to construct an identity within society.</span><sup class="reference" data-dcnode-id="7029" id="cite_ref-73"><a data-dcnode-id="7030" href="#cite_note-73"><span data-dcnode-id="7031" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7028" instrument_node="">
</span></p><p data-dcnode-id="7001"><span data-dcnode-id="7026" instrument_node="">Because many autistics find it easier to communicate online than in person, a large number of online resources are available.</span><sup class="reference" data-dcnode-id="7023" id="cite_ref-NPRAutism_70-1"><a data-dcnode-id="7024" href="#cite_note-NPRAutism-70"><span data-dcnode-id="7025" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7022" instrument_node=""> Some autistic individuals learn </span><a data-dcnode-id="7020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sign_language" title="Sign language"><span data-dcnode-id="7021" instrument_node="">sign language</span></a><span data-dcnode-id="7019" instrument_node="">, participate in online </span><a data-dcnode-id="7017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chat_room" title="Chat room"><span data-dcnode-id="7018" instrument_node="">chat rooms</span></a><span data-dcnode-id="7016" instrument_node="">, discussion boards, and websites, or use communication devices at autism-community social events such as </span><a data-dcnode-id="7014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_Network_International" title="Autism Network International"><span data-dcnode-id="7015" instrument_node="">Autreat</span></a><span data-dcnode-id="7013" instrument_node="">. The Internet helps bypass non-verbal cues and emotional sharing that some autistics tend to have difficulty with.</span><sup class="reference" data-dcnode-id="7010" id="cite_ref-BlumeNYT_74-0"><a data-dcnode-id="7011" href="#cite_note-BlumeNYT-74"><span data-dcnode-id="7012" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="7007" id="cite_ref-BlumeMIT_75-0"><a data-dcnode-id="7008" href="#cite_note-BlumeMIT-75"><span data-dcnode-id="7009" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7006" instrument_node=""> It gives autistic individuals a way to communicate and form online communities.</span><sup class="reference" data-dcnode-id="7003" id="cite_ref-76"><a data-dcnode-id="7004" href="#cite_note-76"><span data-dcnode-id="7005" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7002" instrument_node="">
</span></p><p data-dcnode-id="6988"><span data-dcnode-id="7000" instrument_node="">Conducting work, conversation and interviews online in chat rooms, rather than via phone calls or personal contact, help level the playing field for many autistics.</span><sup class="reference" data-dcnode-id="6997" id="cite_ref-TrivediProud_77-0"><a data-dcnode-id="6998" href="#cite_note-TrivediProud-77"><span data-dcnode-id="6999" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6996" instrument_node=""> A </span><i data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">New York Times</span></i><span data-dcnode-id="6993" instrument_node=""> article said "the impact of the Internet on autistics may one day be compared in magnitude to the spread of sign language among the deaf" because it opens new opportunities for communication by filtering out "sensory overload that impedes communication among autistics."</span><sup class="reference" data-dcnode-id="6990" id="cite_ref-BlumeNYT_74-1"><a data-dcnode-id="6991" href="#cite_note-BlumeNYT-74"><span data-dcnode-id="6992" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6989" instrument_node="">
</span></p><span data-dcnode-id="6987" instrument_node="">
</span><h3 data-dcnode-id="6977"><span class="mw-headline" data-dcnode-id="6985" id="Globally"><span data-dcnode-id="6986" instrument_node="">Globally</span></span><span class="mw-editsection" data-dcnode-id="6978"><span class="mw-editsection-bracket" data-dcnode-id="6983"><span data-dcnode-id="6984" instrument_node="">[</span></span><a data-dcnode-id="6981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D15" title="Edit section: Globally"><span data-dcnode-id="6982" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6979"><span data-dcnode-id="6980" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6976" instrument_node="">
</span><link data-dcnode-id="6975" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6971" role="note"><span data-dcnode-id="6974" instrument_node="">Main article: </span><a data-dcnode-id="6972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_perceptions_of_autism" title="Global perceptions of autism"><span data-dcnode-id="6973" instrument_node="">Global perceptions of autism</span></a></div><span data-dcnode-id="6970" instrument_node="">
</span><p data-dcnode-id="6957"><span data-dcnode-id="6969" instrument_node="">Autistic people may be perceived differently from country to country. For example, many Africans have spiritual beliefs about psychiatric disorders, which extends into perceived causes of autism.</span><sup class="reference" data-dcnode-id="6966" id="cite_ref-hughes2012_78-0"><a data-dcnode-id="6967" href="#cite_note-hughes2012-78"><span data-dcnode-id="6968" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6965" instrument_node=""> In one survey of </span><a data-dcnode-id="6963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigeria" title="Nigeria"><span data-dcnode-id="6964" instrument_node="">Nigerian</span></a><span data-dcnode-id="6962" instrument_node=""> pediatric or psychiatric nurses, 40% cited preternatural causes of autism such as ancestral spirits or the action of the devil.</span><sup class="reference" data-dcnode-id="6959" id="cite_ref-hughes2012_78-1"><a data-dcnode-id="6960" href="#cite_note-hughes2012-78"><span data-dcnode-id="6961" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6958" instrument_node="">
</span></p><span data-dcnode-id="6956" instrument_node="">
</span><h2 data-dcnode-id="6946"><span class="mw-headline" data-dcnode-id="6954" id="Events_and_public_recognition"><span data-dcnode-id="6955" instrument_node="">Events and public recognition</span></span><span class="mw-editsection" data-dcnode-id="6947"><span class="mw-editsection-bracket" data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">[</span></span><a data-dcnode-id="6950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D16" title="Edit section: Events and public recognition"><span data-dcnode-id="6951" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6948"><span data-dcnode-id="6949" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6945" instrument_node="">
</span><h3 data-dcnode-id="6935"><span class="mw-headline" data-dcnode-id="6943" id="World_Autism_Day"><span data-dcnode-id="6944" instrument_node="">World Autism Day</span></span><span class="mw-editsection" data-dcnode-id="6936"><span class="mw-editsection-bracket" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">[</span></span><a data-dcnode-id="6939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D17" title="Edit section: World Autism Day"><span data-dcnode-id="6940" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6934" instrument_node="">
</span><link data-dcnode-id="6933" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6929" role="note"><span data-dcnode-id="6932" instrument_node="">Main article: </span><a data-dcnode-id="6930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Autism_Awareness_Day" title="World Autism Awareness Day"><span data-dcnode-id="6931" instrument_node="">World Autism Awareness Day</span></a></div><span data-dcnode-id="6928" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6916"><div class="thumbinner" data-dcnode-id="6917" style="width:222px;"><a class="image" data-dcnode-id="6926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALight_it_Up_Blue_-_World_Autism_Awareness_Day_%288613785933%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6927" data-file-height="2000" data-file-width="3000" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/11/Light_it_Up_Blue_-_World_Autism_Awareness_Day_%25288613785933%2529.jpg/220px-Light_it_Up_Blue_-_World_Autism_Awareness_Day_%25288613785933%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/11/Light_it_Up_Blue_-_World_Autism_Awareness_Day_%288613785933%29.jpg/330px-Light_it_Up_Blue_-_World_Autism_Awareness_Day_%288613785933%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/11/Light_it_Up_Blue_-_World_Autism_Awareness_Day_%288613785933%29.jpg/440px-Light_it_Up_Blue_-_World_Autism_Awareness_Day_%288613785933%29.jpg 2x" width="220"></a><span data-dcnode-id="6925" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6918"><div class="magnify" data-dcnode-id="6923"><a class="internal" data-dcnode-id="6924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALight_it_Up_Blue_-_World_Autism_Awareness_Day_%288613785933%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6922" instrument_node="">Minnesota governor </span><a data-dcnode-id="6920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mark_Dayton" title="Mark Dayton"><span data-dcnode-id="6921" instrument_node="">Mark Dayton</span></a><span data-dcnode-id="6919" instrument_node=""> declared the World Autism Awareness Day on 2 April 2013</span></div></div></div><span data-dcnode-id="6915" instrument_node="">
</span><p data-dcnode-id="6889"><span data-dcnode-id="6914" instrument_node="">World Autism Day, also called </span><a data-dcnode-id="6912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Autism_Awareness_Day" title="World Autism Awareness Day"><span data-dcnode-id="6913" instrument_node="">World Autism Awareness Day</span></a><span data-dcnode-id="6911" instrument_node="">, is marked on 2 April. It was designated by the </span><a data-dcnode-id="6909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_General_Assembly" title="United Nations General Assembly"><span data-dcnode-id="6910" instrument_node="">United Nations General Assembly</span></a><span data-dcnode-id="6908" instrument_node=""> at the end of 2007.</span><sup class="reference" data-dcnode-id="6905" id="cite_ref-79"><a data-dcnode-id="6906" href="#cite_note-79"><span data-dcnode-id="6907" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6904" instrument_node=""> On 2 April 2009, activists left 150 strollers near </span><a data-dcnode-id="6902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Park" title="Central Park"><span data-dcnode-id="6903" instrument_node="">Central Park</span></a><span data-dcnode-id="6901" instrument_node=""> in New York City to raise awareness that one in 150 children is estimated to be autistic.</span><sup class="reference" data-dcnode-id="6898" id="cite_ref-80"><a data-dcnode-id="6899" href="#cite_note-80"><span data-dcnode-id="6900" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6897" instrument_node="">
There are many celebration activities all over the world on 2 April—World Autism Day. "Autism knows no geographic boundaries—it affects individuals and families on every continent and in every country," said Suzanne Wright, co-founder of the group </span><a data-dcnode-id="6895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_Speaks" title="Autism Speaks"><span data-dcnode-id="6896" instrument_node="">Autism Speaks</span></a><span data-dcnode-id="6894" instrument_node="">. "The celebration of World Autism Awareness Day is an important way to help the world better understand the scope of this health crisis and the need for compassion and acceptance for those living with autism. This remarkable day—the first of many to come—promises to be a time of great hope and happiness as we work to build a global autism community."</span><sup class="reference" data-dcnode-id="6891" id="cite_ref-81"><a data-dcnode-id="6892" href="#cite_note-81"><span data-dcnode-id="6893" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6890" instrument_node="">
</span></p><span data-dcnode-id="6888" instrument_node="">
</span><h3 data-dcnode-id="6878"><span class="mw-headline" data-dcnode-id="6886" id="Light_It_Up_Blue"><span data-dcnode-id="6887" instrument_node="">Light It Up Blue</span></span><span class="mw-editsection" data-dcnode-id="6879"><span class="mw-editsection-bracket" data-dcnode-id="6884"><span data-dcnode-id="6885" instrument_node="">[</span></span><a data-dcnode-id="6882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D18" title="Edit section: Light It Up Blue"><span data-dcnode-id="6883" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6877" instrument_node="">
</span><p data-dcnode-id="6851"><span data-dcnode-id="6876" instrument_node="">In 2010, </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_Speaks" title="Autism Speaks"><span data-dcnode-id="6875" instrument_node="">Autism Speaks</span></a><span data-dcnode-id="6873" instrument_node=""> launched the </span><a class="mw-redirect" data-dcnode-id="6871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_It_Up_Blue" title="Light It Up Blue"><span data-dcnode-id="6872" instrument_node="">Light It Up Blue</span></a><span data-dcnode-id="6870" instrument_node=""> initiative.</span><sup class="reference" data-dcnode-id="6867" id="cite_ref-82"><a data-dcnode-id="6868" href="#cite_note-82"><span data-dcnode-id="6869" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6866" instrument_node=""> Light It Up Blue sees prominent buildings across the world—including the </span><a data-dcnode-id="6864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_State_Building" title="Empire State Building"><span data-dcnode-id="6865" instrument_node="">Empire State Building</span></a><span data-dcnode-id="6863" instrument_node=""> in New York City and the </span><a data-dcnode-id="6861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CN_Tower" title="CN Tower"><span data-dcnode-id="6862" instrument_node="">CN Tower</span></a><span data-dcnode-id="6860" instrument_node=""> in Toronto, Ontario, Canada—turn their lights blue to raise awareness for autism and to commemorate World Autism Awareness Day.</span><sup class="reference" data-dcnode-id="6857" id="cite_ref-83"><a data-dcnode-id="6858" href="#cite_note-83"><span data-dcnode-id="6859" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6856" instrument_node=""> However, the Autism Speaks group is not well received by most autism rights activists, due to their lack of incorporation of perspectives of actual autistic people in their work, and their focus on searching for a 'cure'.</span><sup class="reference" data-dcnode-id="6853" id="cite_ref-Willlingham_2013_84-0"><a data-dcnode-id="6854" href="#cite_note-Willlingham_2013-84"><span data-dcnode-id="6855" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6852" instrument_node="">
</span></p><span data-dcnode-id="6850" instrument_node="">
</span><h3 data-dcnode-id="6840"><span class="mw-headline" data-dcnode-id="6848" id="Autism_Sunday"><span data-dcnode-id="6849" instrument_node="">Autism Sunday</span></span><span class="mw-editsection" data-dcnode-id="6841"><span class="mw-editsection-bracket" data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">[</span></span><a data-dcnode-id="6844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D19" title="Edit section: Autism Sunday"><span data-dcnode-id="6845" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6839" instrument_node="">
</span><link data-dcnode-id="6838" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6834" role="note"><span data-dcnode-id="6837" instrument_node="">Main article: </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_Sunday" title="Autism Sunday"><span data-dcnode-id="6836" instrument_node="">Autism Sunday</span></a></div><span data-dcnode-id="6833" instrument_node="">
</span><p data-dcnode-id="6827"><span data-dcnode-id="6832" instrument_node="">Autism Sunday is a global Christian event, observed on the second Sunday of February. It is supported by church leaders and organisations around the world. The event started as a small idea in the front room of British autism campaigners, Ivan and Charika Corea. It is now a huge event celebrated in many countries. Autism Sunday was launched in London in 2002 with a historic service at St. Paul's Cathedral.</span><sup class="reference" data-dcnode-id="6829" id="cite_ref-85"><a data-dcnode-id="6830" href="#cite_note-85"><span data-dcnode-id="6831" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6828" instrument_node="">
</span></p><span data-dcnode-id="6826" instrument_node="">
</span><h3 data-dcnode-id="6816"><span class="mw-headline" data-dcnode-id="6824" id="Autism_Awareness_Year"><span data-dcnode-id="6825" instrument_node="">Autism Awareness Year</span></span><span class="mw-editsection" data-dcnode-id="6817"><span class="mw-editsection-bracket" data-dcnode-id="6822"><span data-dcnode-id="6823" instrument_node="">[</span></span><a data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D20" title="Edit section: Autism Awareness Year"><span data-dcnode-id="6821" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6815" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6803"><div class="thumbinner" data-dcnode-id="6804" style="width:96px;"><a class="image" data-dcnode-id="6813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAutism_awareness_ribbon-20051114.png"><img alt="" class="thumbimage" data-dcnode-id="6814" data-file-height="163" data-file-width="94" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/7/78/Autism_awareness_ribbon-20051114.png&amp;raw" width="94"></a><span data-dcnode-id="6812" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6805"><div class="magnify" data-dcnode-id="6810"><a class="internal" data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAutism_awareness_ribbon-20051114.png" title="Enlarge"></a></div><span data-dcnode-id="6809" instrument_node="">Autism awareness ribbon - not supported by many autistic people.</span><sup class="reference" data-dcnode-id="6806" id="cite_ref-86"><a data-dcnode-id="6807" href="#cite_note-86"><span data-dcnode-id="6808" instrument_node="">[86]</span></a></sup></div></div></div><span data-dcnode-id="6802" instrument_node="">
</span><p data-dcnode-id="6766"><span data-dcnode-id="6801" instrument_node="">The year 2002 was declared Autism Awareness Year in the </span><a data-dcnode-id="6799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="6800" instrument_node="">United Kingdom</span></a><span data-dcnode-id="6798" instrument_node="">—this idea was initiated by </span><a data-dcnode-id="6796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_Awareness_Campaign_UK" title="Autism Awareness Campaign UK"><span data-dcnode-id="6797" instrument_node="">Ivan and Charika Corea</span></a><span data-dcnode-id="6795" instrument_node="">, parents of an autistic child, Charin.</span><sup class="reference" data-dcnode-id="6792" id="cite_ref-87"><a data-dcnode-id="6793" href="#cite_note-87"><span data-dcnode-id="6794" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6791" instrument_node=""> Autism Awareness Year was led by the British Institute of Brain Injured Children, Disabilities Trust, The Shirley Foundation, </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Autistic_Society" title="National Autistic Society"><span data-dcnode-id="6790" instrument_node="">National Autistic Society</span></a><span data-dcnode-id="6788" instrument_node="">, Autism London and 800 organizations in the United Kingdom. It had the personal backing of British Prime Minister </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Blair" title="Tony Blair"><span data-dcnode-id="6787" instrument_node="">Tony Blair</span></a><span data-dcnode-id="6785" instrument_node="">.</span><sup class="reference" data-dcnode-id="6782" id="cite_ref-88"><a data-dcnode-id="6783" href="#cite_note-88"><span data-dcnode-id="6784" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6781" instrument_node=""> This was the first ever occasion of partnership working on autism on such a huge scale. 2002 Autism Awareness Year helped raise awareness of the serious issues concerning autism and Asperger's Syndrome across the United Kingdom.</span><sup class="reference" data-dcnode-id="6778" id="cite_ref-89"><a data-dcnode-id="6779" href="#cite_note-89"><span data-dcnode-id="6780" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6777" instrument_node=""> A major conference, Autism 2002 was held at the King's Fund in London with debates in the </span><a data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Commons_of_the_United_Kingdom" title="House of Commons of the United Kingdom"><span data-dcnode-id="6776" instrument_node="">House of Commons</span></a><span data-dcnode-id="6774" instrument_node=""> and the </span><a data-dcnode-id="6772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords" title="House of Lords"><span data-dcnode-id="6773" instrument_node="">House of Lords</span></a><span data-dcnode-id="6771" instrument_node=""> in Westminster. Autism awareness ribbons were worn to mark the year.</span><sup class="reference" data-dcnode-id="6768" id="cite_ref-90"><a data-dcnode-id="6769" href="#cite_note-90"><span data-dcnode-id="6770" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6767" instrument_node="">
</span></p><p data-dcnode-id="6756"><span data-dcnode-id="6765" instrument_node="">British autism advocates want autistic people acknowledged as a minority rather than as disabled, because they say that "disability discrimination laws don't protect those who are not disabled but who 'still have something that makes them look or act differently from other people.'"</span><sup class="reference" data-dcnode-id="6762" id="cite_ref-SanerDisease_11-3"><a data-dcnode-id="6763" href="#cite_note-SanerDisease-11"><span data-dcnode-id="6764" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6761" instrument_node=""> But the autism community is split over this issue, and some view this notion as radical.</span><sup class="reference" data-dcnode-id="6758" id="cite_ref-SanerDisease_11-4"><a data-dcnode-id="6759" href="#cite_note-SanerDisease-11"><span data-dcnode-id="6760" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6757" instrument_node="">
</span></p><span data-dcnode-id="6755" instrument_node="">
</span><h3 data-dcnode-id="6745"><span class="mw-headline" data-dcnode-id="6753" id="Autistic_Pride_Day"><span data-dcnode-id="6754" instrument_node="">Autistic Pride Day</span></span><span class="mw-editsection" data-dcnode-id="6746"><span class="mw-editsection-bracket" data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">[</span></span><a data-dcnode-id="6749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D21" title="Edit section: Autistic Pride Day"><span data-dcnode-id="6750" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6744" instrument_node="">
</span><link data-dcnode-id="6743" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6739" role="note"><span data-dcnode-id="6742" instrument_node="">Main article: </span><a data-dcnode-id="6740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autistic_Pride_Day" title="Autistic Pride Day"><span data-dcnode-id="6741" instrument_node="">Autistic Pride Day</span></a></div><span data-dcnode-id="6738" instrument_node="">
</span><p data-dcnode-id="6712"><a data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autistic_Pride_Day" title="Autistic Pride Day"><span data-dcnode-id="6737" instrument_node="">Autistic Pride Day</span></a><span data-dcnode-id="6735" instrument_node=""> is an </span><a data-dcnode-id="6733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aspies_For_Freedom" title="Aspies For Freedom"><span data-dcnode-id="6734" instrument_node="">Aspies For Freedom</span></a><span data-dcnode-id="6732" instrument_node=""> initiative celebrated on 18 June each year. It is a day for celebrating the neurodiversity of autistic people. Modeled after </span><a data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gay_pride" title="Gay pride"><span data-dcnode-id="6731" instrument_node="">gay pride</span></a><span data-dcnode-id="6729" instrument_node=""> events, they often compare their efforts to the </span><a data-dcnode-id="6727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="6728" instrument_node="">civil rights</span></a><span data-dcnode-id="6726" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT_social_movements" title="LGBT social movements"><span data-dcnode-id="6725" instrument_node="">LGBT social movements</span></a><span data-dcnode-id="6723" instrument_node="">.</span><sup class="reference" data-dcnode-id="6720" id="cite_ref-SanerDisease_11-5"><a data-dcnode-id="6721" href="#cite_note-SanerDisease-11"><span data-dcnode-id="6722" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="6717" id="cite_ref-91"><a data-dcnode-id="6718" href="#cite_note-91"><span data-dcnode-id="6719" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="6714" id="cite_ref-92"><a data-dcnode-id="6715" href="#cite_note-92"><span data-dcnode-id="6716" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6713" instrument_node="">
</span></p><span data-dcnode-id="6711" instrument_node="">
</span><h3 data-dcnode-id="6701"><span class="mw-headline" data-dcnode-id="6709" id="Autistics_Speaking_Day"><span data-dcnode-id="6710" instrument_node="">Autistics Speaking Day</span></span><span class="mw-editsection" data-dcnode-id="6702"><span class="mw-editsection-bracket" data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">[</span></span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D22" title="Edit section: Autistics Speaking Day"><span data-dcnode-id="6706" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6700" instrument_node="">
</span><p data-dcnode-id="6681"><a class="mw-redirect" data-dcnode-id="6698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autistics_Speaking_Day" title="Autistics Speaking Day"><span data-dcnode-id="6699" instrument_node="">Autistics Speaking Day</span></a><span data-dcnode-id="6697" instrument_node=""> (ASDay), 1 November, is a self-advocacy campaign run by autistic people to raise awareness and challenge negative stereotypes about autism by speaking for themselves and sharing their stories. The first one was held in 2010.</span><sup class="reference" data-dcnode-id="6694" id="cite_ref-93"><a data-dcnode-id="6695" href="#cite_note-93"><span data-dcnode-id="6696" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6693" instrument_node=""> According to one of the founders, Corina Becker, the main goal of ASDay is "to acknowledge our difficulties while sharing our strengths, passions, and interests."</span><sup class="reference" data-dcnode-id="6690" id="cite_ref-94"><a data-dcnode-id="6691" href="#cite_note-94"><span data-dcnode-id="6692" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6689" instrument_node=""> The idea for the event developed out of opposition to a "Communication Shutdown" fundraising campaign led by Autism Speaks that year, which had asked for participants to "simulate" having autism by staying away from all forms of online communication for one day.</span><sup class="reference" data-dcnode-id="6686" id="cite_ref-95"><a data-dcnode-id="6687" href="#cite_note-95"><span data-dcnode-id="6688" instrument_node="">[95]</span></a></sup><sup class="reference" data-dcnode-id="6683" id="cite_ref-96"><a data-dcnode-id="6684" href="#cite_note-96"><span data-dcnode-id="6685" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6682" instrument_node="">
</span></p><span data-dcnode-id="6680" instrument_node="">
</span><h3 data-dcnode-id="6670"><span class="mw-headline" data-dcnode-id="6678" id="Autism_Acceptance_Project"><span data-dcnode-id="6679" instrument_node="">Autism Acceptance Project</span></span><span class="mw-editsection" data-dcnode-id="6671"><span class="mw-editsection-bracket" data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">[</span></span><a data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D23" title="Edit section: Autism Acceptance Project"><span data-dcnode-id="6675" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6669" instrument_node="">
</span><p data-dcnode-id="6659"><span data-dcnode-id="6668" instrument_node="">In 2006 the Autism Acceptance Project was founded by Estée Klar, the mother of an autistic child, with help from an autistic advisory and board.</span><sup class="reference" data-dcnode-id="6665" id="cite_ref-:0_97-0"><a data-dcnode-id="6666" href="#cite_note-:0-97"><span data-dcnode-id="6667" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6664" instrument_node=""> The project's mission statement is, "The Autism Acceptance Project is dedicated to promoting acceptance of and accommodations for autistic people in society." The project is primarily supported by autistic people and their supporters. The goal is to create a positive perspective of autism and to accept autism as a part of life with its trials and tribulations. The project is also working to enable autistic people to gain the right to advocate for themselves (along with their supporters) in all policy decision formats from government to a general committee. By providing an abundance of resources, the project is able to reach a multitude of audiences using a Web site along with lectures and exhibitions.</span><sup class="reference" data-dcnode-id="6661" id="cite_ref-:0_97-1"><a data-dcnode-id="6662" href="#cite_note-:0-97"><span data-dcnode-id="6663" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6660" instrument_node="">
</span></p><span data-dcnode-id="6658" instrument_node="">
</span><h3 data-dcnode-id="6648"><span class="mw-headline" data-dcnode-id="6656" id="Autism_Acceptance_Day"><span data-dcnode-id="6657" instrument_node="">Autism Acceptance Day</span></span><span class="mw-editsection" data-dcnode-id="6649"><span class="mw-editsection-bracket" data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">[</span></span><a data-dcnode-id="6652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D24" title="Edit section: Autism Acceptance Day"><span data-dcnode-id="6653" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6647" instrument_node="">
</span><p data-dcnode-id="6630"><span data-dcnode-id="6646" instrument_node="">In 2011, the first Autism Acceptance Day celebrations were organized by Paula Durbin Westby, as a response to traditional "Autism Awareness" campaigns which the Autistic community found harmful and insufficient.</span><sup class="reference" data-dcnode-id="6643" id="cite_ref-autismacceptancemonth1_98-0"><a data-dcnode-id="6644" href="#cite_note-autismacceptancemonth1-98"><span data-dcnode-id="6645" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="6640" id="cite_ref-99"><a data-dcnode-id="6641" href="#cite_note-99"><span data-dcnode-id="6642" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6639" instrument_node=""> Autism Acceptance Day is now held every April.</span><sup class="reference" data-dcnode-id="6636" id="cite_ref-autismacceptancemonth1_98-1"><a data-dcnode-id="6637" href="#cite_note-autismacceptancemonth1-98"><span data-dcnode-id="6638" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6635" instrument_node=""> "Awareness" focuses on informing others of the existence of autism while "acceptance" pushes towards validating and honoring the autism community. By providing tools and educational material, people are encouraged to embrace the challenges autistic people face and celebrate their strengths. Rather than making autism into a crippling disability, acceptance integrates those on the autistic spectrum into everyday society. Instead of encouraging people to wear blue as Autism Awareness Day does, Autism Acceptance Day encourages people to wear red.</span><sup class="reference" data-dcnode-id="6632" id="cite_ref-100"><a data-dcnode-id="6633" href="#cite_note-100"><span data-dcnode-id="6634" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6631" instrument_node="">
</span></p><span data-dcnode-id="6629" instrument_node="">
</span><h3 data-dcnode-id="6619"><span class="mw-headline" data-dcnode-id="6627" id="Autreat"><span data-dcnode-id="6628" instrument_node="">Autreat</span></span><span class="mw-editsection" data-dcnode-id="6620"><span class="mw-editsection-bracket" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">[</span></span><a data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D25" title="Edit section: Autreat"><span data-dcnode-id="6624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6618" instrument_node="">
</span><p data-dcnode-id="6605"><span data-dcnode-id="6617" instrument_node="">At </span><a class="mw-redirect" data-dcnode-id="6615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autreat" title="Autreat"><span data-dcnode-id="6616" instrument_node="">Autreat</span></a><span data-dcnode-id="6614" instrument_node="">—an annual autistic gathering—participants compared their movement to gay rights activists, or the Deaf culture, where sign language is preferred over surgery that might restore hearing.</span><sup class="reference" data-dcnode-id="6611" id="cite_ref-Harmon_3-7"><a data-dcnode-id="6612" href="#cite_note-Harmon-3"><span data-dcnode-id="6613" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6610" instrument_node=""> Other local organizations have also arisen: for example, a European counterpart, Autscape, was created around 2005.</span><sup class="reference" data-dcnode-id="6607" id="cite_ref-Gal_101-0"><a data-dcnode-id="6608" href="#cite_note-Gal-101"><span data-dcnode-id="6609" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6606" instrument_node="">
</span></p><span data-dcnode-id="6604" instrument_node="">
</span><h3 data-dcnode-id="6594"><span class="mw-headline" data-dcnode-id="6602" id="Twainbow"><span data-dcnode-id="6603" instrument_node="">Twainbow</span></span><span class="mw-editsection" data-dcnode-id="6595"><span class="mw-editsection-bracket" data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">[</span></span><a data-dcnode-id="6598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D26" title="Edit section: Twainbow"><span data-dcnode-id="6599" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6596"><span data-dcnode-id="6597" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6593" instrument_node="">
</span><p data-dcnode-id="6574"><span data-dcnode-id="6592" instrument_node="">Twainbow is an advocacy organization that provides awareness, education, and support for autistic people who identify as lesbian/gay/bisexual/transgender (</span><a data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT" title="LGBT"><span data-dcnode-id="6591" instrument_node="">LGBT</span></a><span data-dcnode-id="6589" instrument_node="">).</span><sup class="reference" data-dcnode-id="6586" id="cite_ref-102"><a data-dcnode-id="6587" href="#cite_note-102"><span data-dcnode-id="6588" instrument_node="">[102]</span></a></sup><span data-dcnode-id="6585" instrument_node=""> According to its founder, "Twainbow is a portmanteau of 'twain' (meaning 'two') and 'rainbow.' Those who are both LGBT and autistic live under two rainbows—the rainbow flag and the autism spectrum." The company also introduced an LGBT-autism </span><a data-dcnode-id="6583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gay_pride" title="Gay pride"><span data-dcnode-id="6584" instrument_node="">Gay Pride</span></a><span data-dcnode-id="6582" instrument_node=""> flag representing the population.</span><sup class="reference" data-dcnode-id="6579" id="cite_ref-103"><a data-dcnode-id="6580" href="#cite_note-103"><span data-dcnode-id="6581" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="6576" id="cite_ref-104"><a data-dcnode-id="6577" href="#cite_note-104"><span data-dcnode-id="6578" instrument_node="">[104]</span></a></sup><span data-dcnode-id="6575" instrument_node="">
</span></p><span data-dcnode-id="6573" instrument_node="">
</span><h2 data-dcnode-id="6563"><span class="mw-headline" data-dcnode-id="6571" id="History"><span data-dcnode-id="6572" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="6564"><span class="mw-editsection-bracket" data-dcnode-id="6569"><span data-dcnode-id="6570" instrument_node="">[</span></span><a data-dcnode-id="6567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D27" title="Edit section: History"><span data-dcnode-id="6568" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6562" instrument_node="">
</span><p data-dcnode-id="6543"><a data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Triplett" title="Donald Triplett"><span data-dcnode-id="6561" instrument_node="">Donald Triplett</span></a><span data-dcnode-id="6559" instrument_node=""> was the first person diagnosed with autism.</span><sup class="reference" data-dcnode-id="6556" id="cite_ref-Britannica_105-0"><a data-dcnode-id="6557" href="#cite_note-Britannica-105"><span data-dcnode-id="6558" instrument_node="">[105]</span></a></sup><span data-dcnode-id="6555" instrument_node=""> He was diagnosed by Kanner after being first examined in 1938, and was labeled as "case 1".</span><sup class="reference" data-dcnode-id="6552" id="cite_ref-Britannica_105-1"><a data-dcnode-id="6553" href="#cite_note-Britannica-105"><span data-dcnode-id="6554" instrument_node="">[105]</span></a></sup><span data-dcnode-id="6551" instrument_node=""> Triplett was noted for his savant abilities, particularly being able to name musical notes played on a piano and to mentally multiply numbers. His father, Oliver, described him as socially withdrawn but interested in number patterns, music notes, letters of the alphabet, and U.S. president pictures. By the age of two, he had the ability to recite the 23rd Psalm and memorized 25 questions and answers from the Presbyterian </span><a data-dcnode-id="6549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism" title="Catechism"><span data-dcnode-id="6550" instrument_node="">catechism</span></a><span data-dcnode-id="6548" instrument_node="">. He was also interested in creating musical chords.</span><sup class="reference" data-dcnode-id="6545" id="cite_ref-Atlantic_106-0"><a data-dcnode-id="6546" href="#cite_note-Atlantic-106"><span data-dcnode-id="6547" instrument_node="">[106]</span></a></sup><span data-dcnode-id="6544" instrument_node="">
</span></p><span data-dcnode-id="6542" instrument_node="">
</span><h2 data-dcnode-id="6532"><span class="mw-headline" data-dcnode-id="6540" id="Scholarship"><span data-dcnode-id="6541" instrument_node="">Scholarship</span></span><span class="mw-editsection" data-dcnode-id="6533"><span class="mw-editsection-bracket" data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">[</span></span><a data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D28" title="Edit section: Scholarship"><span data-dcnode-id="6537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6534"><span data-dcnode-id="6535" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6531" instrument_node="">
</span><p data-dcnode-id="6518"><span data-dcnode-id="6530" instrument_node="">Autism spectrum disorders received increasing attention from </span><a data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_science" title="Social science"><span data-dcnode-id="6529" instrument_node="">social-science</span></a><span data-dcnode-id="6527" instrument_node=""> scholars in the early 2000s, with the goals of improving support services and therapies, arguing that autism should be tolerated as a difference not a disorder, and by how autism affects the definition of personhood and identity.</span><sup class="reference" data-dcnode-id="6524" id="cite_ref-Silverman_2-1"><a data-dcnode-id="6525" href="#cite_note-Silverman-2"><span data-dcnode-id="6526" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6523" instrument_node=""> Sociological research has also investigated how social institutions, particularly families, cope with the challenges associated with autism.</span><sup class="reference" data-dcnode-id="6520" id="cite_ref-107"><a data-dcnode-id="6521" href="#cite_note-107"><span data-dcnode-id="6522" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6519" instrument_node="">
</span></p><span data-dcnode-id="6517" instrument_node="">
</span><h2 data-dcnode-id="6507"><span class="mw-headline" data-dcnode-id="6515" id="Media_portrayals"><span data-dcnode-id="6516" instrument_node="">Media portrayals</span></span><span class="mw-editsection" data-dcnode-id="6508"><span class="mw-editsection-bracket" data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">[</span></span><a data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D29" title="Edit section: Media portrayals"><span data-dcnode-id="6512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6509"><span data-dcnode-id="6510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6506" instrument_node="">
</span><link data-dcnode-id="6505" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6501" role="note"><span data-dcnode-id="6504" instrument_node="">See also: </span><a data-dcnode-id="6502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autism_spectrum_disorders_in_the_media" title="Autism spectrum disorders in the media"><span data-dcnode-id="6503" instrument_node="">Autism spectrum disorders in the media</span></a></div><span data-dcnode-id="6500" instrument_node="">
</span><p data-dcnode-id="6480"><span data-dcnode-id="6499" instrument_node="">Much of the public perception of autism is based on its portrayals in biographies, movies, novels, and TV series. Many of these portrayals have been inaccurate, and have contributed to a divergence between public perception and the clinical reality of autism.</span><sup class="reference" data-dcnode-id="6496" id="cite_ref-Trapped_108-0"><a data-dcnode-id="6497" href="#cite_note-Trapped-108"><span data-dcnode-id="6498" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6495" instrument_node=""> For example, in the movie </span><i data-dcnode-id="6492"><a data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mozart_and_the_Whale" title="Mozart and the Whale"><span data-dcnode-id="6494" instrument_node="">Mozart and the Whale</span></a></i><span data-dcnode-id="6491" instrument_node=""> (2005), the opening scene gives four clues that a leading character has </span><a data-dcnode-id="6489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asperger_syndrome" title="Asperger syndrome"><span data-dcnode-id="6490" instrument_node="">Asperger syndrome</span></a><span data-dcnode-id="6488" instrument_node="">, and two of these clues are </span><a data-dcnode-id="6486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savant_syndrome" title="Savant syndrome"><span data-dcnode-id="6487" instrument_node="">extraordinary savant</span></a><span data-dcnode-id="6485" instrument_node=""> skills. The savant skills are not needed in the film, but in the movies savant skills have become a stereotype for the autism spectrum, because of the incorrect assertion that most autistic people are savants.</span><sup class="reference" data-dcnode-id="6482" id="cite_ref-Draaisma_109-0"><a data-dcnode-id="6483" href="#cite_note-Draaisma-109"><span data-dcnode-id="6484" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6481" instrument_node="">
</span></p><p data-dcnode-id="6459"><span data-dcnode-id="6479" instrument_node="">Some works from the 1970s have autistic characters,</span><sup class="noprint Inline-Template" data-dcnode-id="6472" style="white-space:nowrap;"><span data-dcnode-id="6478" instrument_node="">[</span><i data-dcnode-id="6474"><a class="mw-redirect" data-dcnode-id="6475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="6476" title="The material near this tag possibly uses too vague attribution or weasel words. (May 2016)"><span data-dcnode-id="6477" instrument_node="">which?</span></span></a></i><span data-dcnode-id="6473" instrument_node="">]</span></sup><span data-dcnode-id="6471" instrument_node=""> who are rarely labeled.</span><sup class="reference" data-dcnode-id="6468" id="cite_ref-Murray_110-0"><a data-dcnode-id="6469" href="#cite_note-Murray-110"><span data-dcnode-id="6470" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6467" instrument_node=""> In contrast, in the </span><a data-dcnode-id="6465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC_Two" title="BBC Two"><span data-dcnode-id="6466" instrument_node="">BBC2</span></a><span data-dcnode-id="6464" instrument_node=""> television miniseries </span><i data-dcnode-id="6461"><a data-dcnode-id="6462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Politician%2527s_Husband" title="The Politician's Husband"><span data-dcnode-id="6463" instrument_node="">The Politician's Husband</span></a></i><span data-dcnode-id="6460" instrument_node=""> (2013), the impact of Noah Hoynes' Aspergers on the boy's behavior and on his family, and steps Noah's loved ones take to accommodate and address it, are prominent plot points in all three episodes.
</span></p><p data-dcnode-id="6430"><span data-dcnode-id="6458" instrument_node="">Popular media have depicted special talents of some autistic people, including </span><a data-dcnode-id="6456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Splinter_skill" title="Splinter skill"><span data-dcnode-id="6457" instrument_node="">exceptional abilities</span></a><span data-dcnode-id="6455" instrument_node=""> as seen in the 1988 movie </span><i data-dcnode-id="6452"><a data-dcnode-id="6453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rain_Man" title="Rain Man"><span data-dcnode-id="6454" instrument_node="">Rain Man</span></a></i><span data-dcnode-id="6451" instrument_node="">.</span><sup class="reference" data-dcnode-id="6448" id="cite_ref-111"><a data-dcnode-id="6449" href="#cite_note-111"><span data-dcnode-id="6450" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6447" instrument_node=""> Such portrayals have been criticized by both scientific studies and media analysts over the years for fostering a pigeonholing image of autism that leads to false expectations about real-life autistic individuals, with </span><i data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">Rain Man</span></i><span data-dcnode-id="6444" instrument_node=""> being singled out for popularizing it.</span><sup class="reference" data-dcnode-id="6441" id="cite_ref-Draaisma_(2009)_112-0"><a data-dcnode-id="6442" href="#cite_note-Draaisma_(2009)-112"><span data-dcnode-id="6443" instrument_node="">[112]</span></a></sup><sup class="reference" data-dcnode-id="6438" id="cite_ref-Knights_(2018)_113-0"><a data-dcnode-id="6439" href="#cite_note-Knights_(2018)-113"><span data-dcnode-id="6440" instrument_node="">[113]</span></a></sup><sup class="reference" data-dcnode-id="6435" id="cite_ref-McCarthy_(2018)_114-0"><a data-dcnode-id="6436" href="#cite_note-McCarthy_(2018)-114"><span data-dcnode-id="6437" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="6432" id="cite_ref-Bradley_(2017)_115-0"><a data-dcnode-id="6433" href="#cite_note-Bradley_(2017)-115"><span data-dcnode-id="6434" instrument_node="">[115]</span></a></sup><span data-dcnode-id="6431" instrument_node="">
</span></p><p data-dcnode-id="6409"><span data-dcnode-id="6429" instrument_node="">Since the 1970s, fictional portrayals of autistic people, Asperger syndrome, and other ASCs have become more frequent.</span><sup class="reference" data-dcnode-id="6426" id="cite_ref-Murray_110-1"><a data-dcnode-id="6427" href="#cite_note-Murray-110"><span data-dcnode-id="6428" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6425" instrument_node=""> Public perception of autism is often based on these fictional portrayals in novels, biographies, movies, and TV series. These depictions of autism in media today are often made in a way that brings pity to the public and their concern of the topic, because their viewpoint is never actually shown, leaving the public without knowledge of autism and its diagnosis.</span><sup class="reference" data-dcnode-id="6422" id="cite_ref-116"><a data-dcnode-id="6423" href="#cite_note-116"><span data-dcnode-id="6424" instrument_node="">[116]</span></a></sup><sup class="reference" data-dcnode-id="6419" id="cite_ref-Draaisma_109-1"><a data-dcnode-id="6420" href="#cite_note-Draaisma-109"><span data-dcnode-id="6421" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6418" instrument_node=""> Portrayals in the media of characters with atypical abilities (for example, the ability to multiply large numbers without a calculator) may be misinterpreted by viewers as accurate portrayals of all autistic people and of autism itself.</span><sup class="reference" data-dcnode-id="6415" id="cite_ref-AutisticLicence_117-0"><a data-dcnode-id="6416" href="#cite_note-AutisticLicence-117"><span data-dcnode-id="6417" instrument_node="">[117]</span></a></sup><span data-dcnode-id="6414" instrument_node=""> Additionally, the media frequently depicts autism as only affecting children, which promotes the misconception that autism does not affect adults.</span><sup class="reference" data-dcnode-id="6411" id="cite_ref-:1_118-0"><a data-dcnode-id="6412" href="#cite_note-:1-118"><span data-dcnode-id="6413" instrument_node="">[118]</span></a></sup><span data-dcnode-id="6410" instrument_node="">
</span></p><span data-dcnode-id="6408" instrument_node="">
</span><h2 data-dcnode-id="6398"><span class="mw-headline" data-dcnode-id="6406" id="Notable_individuals"><span data-dcnode-id="6407" instrument_node="">Notable individuals</span></span><span class="mw-editsection" data-dcnode-id="6399"><span class="mw-editsection-bracket" data-dcnode-id="6404"><span data-dcnode-id="6405" instrument_node="">[</span></span><a data-dcnode-id="6402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocietal_and_cultural_aspects_of_autism%26action%3Dedit%26section%3D30" title="Edit section: Notable individuals"><span data-dcnode-id="6403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6397" instrument_node="">
</span><link data-dcnode-id="6396" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6392" role="note"><span data-dcnode-id="6395" instrument_node="">See also: </span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retrospective_diagnosis%23Retrospective_diagnoses_of_autism" title="Retrospective diagnosis"><span data-dcnode-id="6394" instrument_node="">Retrospective diagnosis §&nbsp;Retrospective diagnoses of autism</span></a></div><span data-dcnode-id="6391" instrument_node="">
