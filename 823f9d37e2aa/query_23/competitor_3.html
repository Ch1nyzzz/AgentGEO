0052"><span data-dcnode-id="3357" instrument_node="">The European response to dominant American and Chinese-owned cloud providers involves guiding principles for the data economy that are both economically motivated to achieve growth and politically or socially motivated to support European public values. The success of GAIA-X and other European policies (including antitrust measures) in addressing the asymmetrical power between foreign-owned and domestic cloud platforms in a way that enables competing values to be balanced is speculative at the time of writing. The outcome will depend on policy makers’ enforcement capacity. These guiding principles may be actualized only as performative discourse that is not carried through in the practices of the companies (</span><a class="workspace-trigger" data-dcnode-id="3355" href="#bib0060" name="bbib0060"><span data-dcnode-id="3356" instrument_node="">Helm &amp; Seubert,&nbsp;2020</span></a><span data-dcnode-id="3354" instrument_node="">, p. 193). Harmful behaviors may go undetected due to the complexity of the digital system and the challenges of producing evidence to hold the companies to account. The commercial cloud providers are unlikely to forego opportunities to reap financial rewards from the monetization of personal and non-personal data if they can innovate to create novel ways of collecting and processing data that circumvent the policies that are put in place.</span></p></section><section data-dcnode-id="3239" id="sec0006"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3348" id="cesectitle0010"><span data-dcnode-id="3351" instrument_node="">3.3</span><span data-dcnode-id="3350" instrument_node="">. </span><span data-dcnode-id="3349" instrument_node="">Taxation adjustments</span></h3><p data-dcnode-id="3328" id="para0053"><span data-dcnode-id="3343"><span data-dcnode-id="3347" instrument_node="">Paradigm change is accompanied by changes in areas of the societal system less directly connected with choices about technical standards and regulatory regimes for digital services. Consistent with the need for institutional adjustments, international taxation rules have been under discussion as the ICT paradigm has enabled the global supply of services. The centrality of commercial datafication strategies and the dominance of very large foreign-owned digital platform companies are presenting challenges to the sustainability of the </span><a class="topic-link" data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/taxation-procedure" title="Learn more about tax base from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3346" instrument_node="">tax base</span></a><span data-dcnode-id="3344" instrument_node="">.</span></span><a class="workspace-trigger" data-dcnode-id="3340" href="#cit_15" name="bcit_15"><sup data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">15</span></sup></a><span data-dcnode-id="3339" instrument_node=""> By market capitalization and by value of digital transactions, the dominant companies generate very substantial revenues and, in most cases, group profits (</span><a class="workspace-trigger" data-dcnode-id="3337" href="#bib0009" name="bbib0009"><span data-dcnode-id="3338" instrument_node="">CEPS,&nbsp;2019</span></a><span data-dcnode-id="3336" instrument_node="">). It is claimed that digital platforms pay substantially less than they should in the countries in which they operate (</span><a class="workspace-trigger" data-dcnode-id="3334" href="#bib0054" name="bbib0054"><span data-dcnode-id="3335" instrument_node="">Freuler,&nbsp;2020</span></a><span data-dcnode-id="3329"><span data-dcnode-id="3333" instrument_node="">) and the international taxation regime is depicted as unfairly enabling tax avoidance and facilitating a path towards </span><a class="topic-link" data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/inequality" title="Learn more about inequality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3332" instrument_node="">inequality</span></a><span data-dcnode-id="3330" instrument_node="">.</span></span></p><p data-dcnode-id="3316" id="para0055"><span data-dcnode-id="3327" instrument_node="">In response to arguments favoring adjustment to this regime to better sustain government support for public services, investment in infrastructure and to avert social disorder resulting from rising socio-economic inequalities in the mid 1990s, a ‘bit tax’ was proposed to collect revenues from the transmission of information by electronic means (</span><a class="workspace-trigger" data-dcnode-id="3325" href="#bib0062" name="bbib0062"><span data-dcnode-id="3326" instrument_node="">HLEG,&nbsp;1997</span></a><span data-dcnode-id="3324" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3322" href="#bib0095" name="bbib0095"><span data-dcnode-id="3323" instrument_node="">Soete &amp; Kamp,&nbsp;1996</span></a><span data-dcnode-id="3317"><span data-dcnode-id="3321" instrument_node="">). Criticized at the time for the potential impact of such a tax on the rate of innovation in digital technology and services, in 1998 the </span><a class="topic-link" data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/world-trade-organization" title="Learn more about World Trade Organization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3320" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="3318" instrument_node=""> imposed a moratorium on taxing services provided using the internet. The expected benefits of digitally-driven innovation for economic growth received a privileged position as compared to arguments about the need to sustain public welfare. With human populations facing health, unemployment and environmental crises, the urgency of a response to the rise of ‘big tech’ platforms and the need to ensure that countries have a sustainable tax base is increasing. There is movement as well towards taxes specifically targeting the large digital platform companies with a view to sustaining public interest journalism and media as they have become dependent on platform services to distribute their content. Ambivalence about which values should receive priority has created institutional rigidity and it has not so far been politically feasible to agree guiding principles for international taxation in the digital era.</span></span></p><p data-dcnode-id="3288" id="para0056"><span data-dcnode-id="3315" instrument_node="">In the pre-internet era, the existing international taxation principles were regarded as common sense.</span><a class="workspace-trigger" data-dcnode-id="3312" href="#cit_16" name="bcit_16"><sup data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">16</span></sup></a><span data-dcnode-id="3307"><span data-dcnode-id="3311" instrument_node=""> Taxes are levied against revenues (e.g. value added tax) or profits (e.g. corporate profit taxes) in the country where a company is legally established. However, digital services offered online do not necessarily require a physical presence and the billing for these services or the international allocation of costs of producing them may be arranged to reduce these taxes. The OECD and </span><a class="topic-link" data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/g20-countries" title="Learn more about G20 countries from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3310" instrument_node="">G20 countries</span></a><span data-dcnode-id="3308" instrument_node=""> have been seeking to change the international tax rules to enable countries to tax revenues or profits where value creation occurs using a new concept, ‘significant economic presence’. For example, a platform with a local warehouse and employees supporting the sale of goods online could provide a basis for taxation if the tax regime were to be changed (</span></span><a class="workspace-trigger" data-dcnode-id="3305" href="#bib0084" name="bbib0084"><span data-dcnode-id="3306" instrument_node="">OECD 2015</span></a><span data-dcnode-id="3304" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3302" href="#bib0086" name="bbib0086"><span data-dcnode-id="3303" instrument_node="">OECD, 2019b</span></a><span data-dcnode-id="3301" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3299" href="#bib0087" name="bbib0087"><span data-dcnode-id="3300" instrument_node="">OECD 2019c</span></a><span data-dcnode-id="3298" instrument_node="">). As the G7 says, these countries are working ‘to enable our economies and communities to </span><em data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">adjust</span></em><span data-dcnode-id="3295" instrument_node=""> to the pace of change today, so that the global economy works for everyone’ (emphasis added) (</span><a class="workspace-trigger" data-dcnode-id="3293" href="#bib0057" name="bbib0057"><span data-dcnode-id="3294" instrument_node="">G7, 2017</span></a><span data-dcnode-id="3292" instrument_node="">, p. 2). The G7 and OECD proposals met resistance during the Trump Administration. At this writing in early 2021 there is renewed momentum towards a shift in the priorities and values underpinning the international tax rules to create a fairer regime. It is also argued, however, that a change in taxation is unnecessary because economic value is created by platform companies, not by their users and it is unfair to target large (foreign) companies (</span><a class="workspace-trigger" data-dcnode-id="3290" href="#bib0065" name="bbib0065"><span data-dcnode-id="3291" instrument_node="">Kennedy,&nbsp;2019</span></a><span data-dcnode-id="3289" instrument_node="">). Thus, it is not clear whether a global agreement will be achieved.</span></p><p data-dcnode-id="3276" id="para0058"><span data-dcnode-id="3287" instrument_node="">Regionally and nationally, nevertheless, there have been signs of change. The European Commission has recognized that:</span></p><blockquote data-dcnode-id="3277"><p data-dcnode-id="3278" id="spara004"><span data-dcnode-id="3282"><span data-dcnode-id="3286" instrument_node="">‘digital business have different characteristics than traditional ones in terms of how value is created, due to their ability to conduct activities remotely, the contribution of end-users in their value creation, the importance of </span><a class="topic-link" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intangible-assets" title="Learn more about intangible assets from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3285" instrument_node="">intangible assets</span></a><span data-dcnode-id="3283" instrument_node="">, as well as a tendency towards winner-takes-most market structures rooted in the strong presence of network effects and the value of big data’ (</span></span><a class="workspace-trigger" data-dcnode-id="3280" href="#bib0018" name="bbib0018"><span data-dcnode-id="3281" instrument_node="">EC,&nbsp;2018</span></a><span data-dcnode-id="3279" instrument_node="">, p. 2).</span></p></blockquote><p></p><p data-dcnode-id="3248" id="para0061"><span data-dcnode-id="3275" instrument_node="">The Commission proposed that tax be collected where a human user of large digital platforms is involved (not machine-to-machine communication) and when data collection is for monetization purposes. In the absence of agreement on the Commission's proposals, member states have been unilaterally introducing digital taxes, generally on revenues, not profits. France, Germany, Italy, Spain and the United Kingdom are among those introducing national digital taxes, with France observing that ‘economic efficiency is at stake, as well as tax fairness and sovereignty’ (</span><a class="workspace-trigger" data-dcnode-id="3270" href="#bib0068" name="bbib0068"><span data-dcnode-id="3274" instrument_node="">Le&nbsp;Maire </span><em data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">et al.</span></em><span data-dcnode-id="3271" instrument_node="">, 2017</span></a><span data-dcnode-id="3269" instrument_node="">, p. np). Even if a tax (2 percent on revenues in the United Kingdom) is passed on by charging an additional fee to the digital platforms’ advertising clients or to those who sell their products using a platform, the intention is to enhance the fairness of taxation, albeit currently raising relatively small amounts of revenue for the tax base.</span><a class="workspace-trigger" data-dcnode-id="3266" href="#cit_17" name="bcit_17"><sup data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">17</span></sup></a><span data-dcnode-id="3261"><span data-dcnode-id="3265" instrument_node=""> The United States government has responded to these moves by insisting that the imposition of national digital taxes is a nontariff </span><a class="topic-link" data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/trade-barriers" title="Learn more about trade barrier from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3264" instrument_node="">trade barrier</span></a><span data-dcnode-id="3262" instrument_node=""> and that the digital platform companies might reduce or withdraw their services or pass the costs onto users. The United States has introduced retaliatory measures in the form of trade sanctions against countries implementing a digital services tax based on the results of US Trade Representative investigations under section 301 of the US Trade Act (1974) (</span></span><a class="workspace-trigger" data-dcnode-id="3256" href="#bib0029" name="bbib0029"><span data-dcnode-id="3260" instrument_node="">Fleming </span><em data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">et&nbsp;al.</span></em><span data-dcnode-id="3257" instrument_node="">, 2020</span></a><span data-dcnode-id="3255" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3253" href="#bib0102" name="bbib0102"><span data-dcnode-id="3254" instrument_node="">US,&nbsp;1974</span></a><span data-dcnode-id="3252" instrument_node="">; VAT </span><a class="workspace-trigger" data-dcnode-id="3250" href="#bib0108" name="bbib0108"><span data-dcnode-id="3251" instrument_node="">Update,&nbsp;2020</span></a><span data-dcnode-id="3249" instrument_node="">). Confronted with the Covid-19 pandemic, the G20 countries postponed their efforts to reach agreement on new international tax principles and the United States has not implemented its trade sanctions during the pandemic crisis but may do so if ongoing negotiations fail.</span></p><p data-dcnode-id="3240" id="para0063"><span data-dcnode-id="3247" instrument_node="">Before the pandemic, there also were concerns about whether developments within the ICT paradigm are leading to automation-induced unemployment without the creation of compensating jobs for workers and about the precarious working conditions in the face of flexible contracting in the ‘gig’ economy. A change in taxation principles cannot be expected to address this and other harms associated with the ICT paradigm directly. It might, however, provide a potentially stronger buffer for those disadvantaged by the social costs of adjustment to changes in the paradigm as is implied by Sennett's (</span><a class="workspace-trigger" data-dcnode-id="3245" href="#bib0093" name="bbib0093"><span data-dcnode-id="3246" instrument_node="">2019</span></a><span data-dcnode-id="3244" instrument_node="">, p. np) observation that in today's technology-enabled world, ‘a specter of uselessness hangs over people – a sense of bareness’. Freeman took the view that we should not look to ICTs (even if universally available) to stabilize economies and societies when they are facing destabilizing technological change (</span><a class="workspace-trigger" data-dcnode-id="3242" href="#bib0042" name="bbib0042"><span data-dcnode-id="3243" instrument_node="">Freeman,&nbsp;2001a</span></a><span data-dcnode-id="3241" instrument_node="">). A consideration of the need for politically-inspired interventions to address the social costs of adjustments to new digital technologies and assure that public values are upheld was certainly a prominent feature in in his work.</span></p></section></section><section data-dcnode-id="3157" id="sec0007"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3234" id="cesectitle0011"><span data-dcnode-id="3237" instrument_node="">4</span><span data-dcnode-id="3236" instrument_node="">. </span><span data-dcnode-id="3235" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3205" id="para0064"><span data-dcnode-id="3233" instrument_node="">Digital technology innovation – a major part of the 4</span><sup data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">th</span></sup><span data-dcnode-id="3226"><span data-dcnode-id="3230" instrument_node=""> Industrial Revolution – involving advances in AI and </span><a class="topic-link" data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/data-analytics" title="Learn more about data analytics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3229" instrument_node="">data analytics</span></a><span data-dcnode-id="3227" instrument_node=""> and ever ‘smarter’ networks, is often depicted as the pathway for averting or mitigating economic and social crises, albeit with policy or regulatory adjustments (</span></span><a class="workspace-trigger" data-dcnode-id="3224" href="#bib0092" name="bbib0092"><span data-dcnode-id="3225" instrument_node="">Schwab,&nbsp;2017</span></a><span data-dcnode-id="3223" instrument_node="">; United </span><a class="workspace-trigger" data-dcnode-id="3221" href="#bib0101" name="bbib0101"><span data-dcnode-id="3222" instrument_node="">Nations,&nbsp;2019</span></a><span data-dcnode-id="3212"><span data-dcnode-id="3220" instrument_node="">). In welcoming evidenced-based debate on the contemporary path of innovation, Freeman also would likely have cautioned against a narrow focus on technology and the digital market. While many scholars working in the critical traditions of the social sciences (e.g. science and technologies studies, critical approaches in communication studies and other disciplines) have long heeded this advice, there is still within the </span><a class="topic-link" data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/neoclassical-economics" title="Learn more about neoclassical economics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3219" instrument_node="">neoclassical economics</span></a><span data-dcnode-id="3213"><span data-dcnode-id="3217" instrument_node=""> and the economics of technological innovation fields, a prominent overemphasis on research focusing primarily on market dynamics – the monetization of data – with the expectation that technology-induced change will lead to an optimization of market outcomes with benefits for all. While Freeman regarded capitalism and its institutions as the ‘most effective in human history in stimulating a flow of technical and </span><a class="topic-link" data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/organisational-innovation" title="Learn more about organizational innovations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3216" instrument_node="">organizational innovations</span></a><span data-dcnode-id="3214" instrument_node=""> and diffusing them through the production system’ (</span></span></span><a class="workspace-trigger" data-dcnode-id="3210" href="#bib0038" name="bbib0038"><span data-dcnode-id="3211" instrument_node="">Freeman,&nbsp;1992c</span></a><span data-dcnode-id="3209" instrument_node="">, p. 216), he also argued that there may be circumstances in which certain technical innovations should not be deployed. Further, that when they are deployed, there must be an effort to ‘humanize’ technology as distinct from focusing principally on profit and economic growth (</span><a class="workspace-trigger" data-dcnode-id="3207" href="#bib0039" name="bbib0039"><span data-dcnode-id="3208" instrument_node="">Freeman,&nbsp;1994</span></a><span data-dcnode-id="3206" instrument_node="">, p. 11).</span></p><p data-dcnode-id="3203" id="para0065"><span data-dcnode-id="3204" instrument_node="">The three themes – ambiguity, guiding principles and politics – are among many that might have been selected from Freeman's work on paradigmatic techno-economic change to inform the discussion in the preceding section. These themes are helpful, however, because they encourage a researcher to distinguish between taken-for-granted principles and practices and potential alternatives that could yield outcomes that are fairer and more equitable. Alternative standards that better secure privacy in 5G networks, privacy enhancing legislation for the deployment of AIaaS, and revised choices about tax rules and the distribution of public revenues are examples of such potential alternatives.</span></p><p data-dcnode-id="3192" id="para0066"><span data-dcnode-id="3202" instrument_node="">Freeman ventured considerably beyond the limiting assumptions of neoclassical economic theory. For him, ambiguous outcomes – benefits and harms – of the innovation process were empirical problems for investigation. His recognition of the need for political interventions in the market is evident in his observations about the need for government funding of redistribution policies and the ‘need for a strong ethos of solidarity’ (</span><a class="workspace-trigger" data-dcnode-id="3200" href="#bib0053" name="bbib0053"><span data-dcnode-id="3201" instrument_node="">Freeman &amp; Soete,&nbsp;2005</span></a><span data-dcnode-id="3199" instrument_node="">, p. 350). He was concerned about concentrations of political and economic power (</span><a class="workspace-trigger" data-dcnode-id="3197" href="#bib0038" name="bbib0038"><span data-dcnode-id="3198" instrument_node="">Freeman,&nbsp;1992c</span></a><span data-dcnode-id="3196" instrument_node="">), commenting that their consequences in the form of ‘extreme disparities of wealth and income not only jeopardize civil liberty and inhibit technological choice, they also endanger industrial and national security and are offensive to common decency’ (</span><a class="workspace-trigger" data-dcnode-id="3194" href="#bib0038" name="bbib0038"><span data-dcnode-id="3195" instrument_node="">Freeman,&nbsp;1992c</span></a><span data-dcnode-id="3193" instrument_node="">, p. 226).</span></p><p data-dcnode-id="3178" id="para0067"><span data-dcnode-id="3191" instrument_node="">There is no indication that Freeman expected the dominance of large firms to be eroded by advances in digital technology (</span><a class="workspace-trigger" data-dcnode-id="3189" href="#bib0044" name="bbib0044"><span data-dcnode-id="3190" instrument_node="">Freeman,&nbsp;2007</span></a><span data-dcnode-id="3188" instrument_node="">). For instance, he signaled that upholding the right to freedom of speech would be crucial to limit abuses of power by dominant companies (and states), commenting that when this right is not upheld ‘talk of freedom of choice is often empty air’ (</span><a class="workspace-trigger" data-dcnode-id="3186" href="#bib0038" name="bbib0038"><span data-dcnode-id="3187" instrument_node="">Freeman,&nbsp;1992c</span></a><span data-dcnode-id="3185" instrument_node="">, p. 223). Freeman's work was prescient. In a period of dominant digital platforms and advancing commercial datafication, which until quite recently was widely treated as an exemplary pattern of techno-economic change - broadly consistent with beneficial outcomes for society, his work serves as an important guide for investigations of the harmful consequences of these developments. These include the massive scaling up of platforms leading to entrenched corporate control structures, hyperactive financial capital delinked from the ‘real’ economy and the invisible nudging of human behavior (</span><a class="workspace-trigger" data-dcnode-id="3183" href="#bib0074" name="bbib0074"><span data-dcnode-id="3184" instrument_node="">Mansell &amp; Steinmueller,&nbsp;2020</span></a><span data-dcnode-id="3182" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3180" href="#bib0112" name="bbib0112"><span data-dcnode-id="3181" instrument_node="">Zuboff,&nbsp;2019</span></a><span data-dcnode-id="3179" instrument_node="">).</span></p><p data-dcnode-id="3173" id="para0068"><span data-dcnode-id="3177" instrument_node="">Steps are being taken in countries in the West, the East and the global South to regulate dominant digital platforms and their practices. These include measures to achieve data privacy protection, to strengthen competition policy and introduce accountability for the content hosted by these companies, plus changes in taxation rules. These are likely to moderate some features of digital companies’ business strategies that are inconsistent with public values but struggles to uphold these values by adopting commonsense principles that enable, rather than disable, individual and collective wellbeing are ongoing. Freeman's emphasis on reimagining the future and on resisting technological innovation pathways that perpetuate power asymmetries and produce social and economic </span><a class="topic-link" data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/inequality" title="Learn more about inequalities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3176" instrument_node="">inequalities</span></a><span data-dcnode-id="3174" instrument_node=""> is salutary. It continues to inspire scholarly research on techno-economic and socio-technical change which insists that monetizing digital information for commercial gain is not the only way to design and operate digital technologies in support of individuals and their societies.</span></p><p data-dcnode-id="3158" id="para0069"><span data-dcnode-id="3168"><span data-dcnode-id="3172" instrument_node="">Like many researchers who undertake critical </span><a class="topic-link" data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/higher-education-finance" title="Learn more about scholarship from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3171" instrument_node="">scholarship</span></a><span data-dcnode-id="3169" instrument_node=""> on the complex determinants of our digitized future (</span></span><a class="workspace-trigger" data-dcnode-id="3166" href="#bib0010" name="bbib0010"><span data-dcnode-id="3167" instrument_node="">Couldry &amp; Mejias,&nbsp;2019</span></a><span data-dcnode-id="3165" instrument_node="">; van D Dijck et&nbsp;al., 2018; Mansell, </span><a class="workspace-trigger" data-dcnode-id="3163" href="#bib0075" name="bbib0075"><span data-dcnode-id="3164" instrument_node="">2021</span></a><span data-dcnode-id="3162" instrument_node=""> In Press; </span><a class="workspace-trigger" data-dcnode-id="3160" href="#bib0112" name="bbib0112"><span data-dcnode-id="3161" instrument_node="">Zuboff,&nbsp;2019</span></a><span data-dcnode-id="3159" instrument_node="">), Freeman, no doubt would have championed research aimed at evidencing the multiple causes and consequences of contemporary digital technology designs and data ownership and control arrangements. His insistence on a ‘economics of hope’ might have oriented him, not only to explaining and resisting harmful and exploitative outcomes, but to actively engaging with policy making to help shape expectations and to mobilize the features of changes in the techno-economic ICT paradigm ‘for good’. In line with Freeman's insights, proposals for alternative innovation choices are essential, with pathways evaluated not solely by the narrow metrics of economic analysis, but by using a broader analytical framing encompassing the political, the social and the cultural.</span></p></section><section data-dcnode-id="3152" id="sec0008"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3155" id="cesectitle0012"><span data-dcnode-id="3156" instrument_node="">Credit Author Statement</span></h2><p data-dcnode-id="3153" id="para0070"><span data-dcnode-id="3154" instrument_node="">This paper is entirely the author's own work.</span></p></section></div><section data-dcnode-id="3146" id="coi0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3149" id="cesectitle0014"><span data-dcnode-id="3150" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="3147" id="para0072"><span data-dcnode-id="3148" instrument_node="">The author has no conflicts of interest to declare.</span></p></section><section data-dcnode-id="3141" id="ack0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3144" id="cese lantic Council Scowcroft Center for Strategy and Security, Washington, DC, 4 Mar. https://www.atlanticcouncil.org/in-depth-research-reports/report/a-framework-for-an-open-trusted-and-resilient-5g-global-telecommunications-network/(Accessed 13 April 2021).</span></span><div class="ReferenceLinks u-font-sans" data-dcnode-id="546"><a class="link" data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DWatts%2C%2520J.T.%25202020.%2520A%2520Framework%2520for%2520an%2520Open%2C%2520Trusted%2C%2520and%2520Resilient%25205G%2520Global%2520Telecommunications%2520Network.%2520Atlantic%2520Council%2520Scowcroft%2520Center%2520for%2520Strategy%2520and%2520Security%2C%2520Washington%2C%2520DC%2C%25204%2520Mar.%2520https%3Awww.atlanticcouncil.orgin-depth-research-reportsreporta-framework-for-an-open-trusted-and-resilient-5g-global-telecommunications-network." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="548" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="542"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="543" href="#bbib0111" id="ref-id-bib0111"><span data-dcnode-id="544" instrument_node="">WHO 2020</span></a></dt><dd class="reference" data-dcnode-id="536" id="sbref0111"><span data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">WHO. 2020. ‘Radiation: 5G Mobile Networks and Health’, 27 Feb. https://www.who.int/news-room/q-a-detail/radiation-5g-mobile-networks-and-health (Accessed 13 April 2021).</span></span><div class="ReferenceLinks u-font-sans" data-dcnode-id="537"><a class="link" data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DWHO.%25202020.%2520Radiation%3A%25205G%2520Mobile%2520Networks%2520and%2520Health%2C%252027%2520Feb.%2520https%3Awww.who.intnews-roomq-a-detailradiation-5g-mobile-networks-and-health%2520." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="539" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="533"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="534" href="#bbib0112" id="ref-id-bib0112"><span data-dcnode-id="535" instrument_node="">Zuboff, 2019</span></a></dt><dd class="reference" data-dcnode-id="507" id="sbref0112"><div class="contribution" data-dcnode-id="524"><span data-dcnode-id="532" instrument_node="">S.</span><span data-dcnode-id="530" instrument_node=""> </span><span data-dcnode-id="528" instrument_node="">Zuboff</span><div data-dcnode-id="525" id="ref-id-sbref0112"><strong class="title" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The Age of Surveillance Capitalism: The Fight for a Human Future at the New Frontier of Power</span></strong></div></div><div class="host" data-dcnode-id="512"><span data-dcnode-id="523" instrument_node="">Profile Books</span><span data-dcnode-id="521" instrument_node="">, </span><span data-dcnode-id="519" instrument_node="">London</span><span data-dcnode-id="517" instrument_node=""> (</span><span data-dcnode-id="515" instrument_node="">2019</span><span data-dcnode-id="513" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="508"><span data-dcnode-id="511" instrument_node=""></span><a aria-describedby="ref-id-sbref0112" class="link" data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DThe%2520Age%2520of%2520Surveillance%2520Capitalism%253A%2520The%2520Fight%2520for%2520a%2520Human%2520Future%2520at%2520the%2520New%2520Frontier%2520of%2520Power%26publication_year%3D2019%26author%3DS.%2520Zuboff" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="510" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="465" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="466"><div class="PageDivider" data-dcnode-id="503"></div><header data-dcnode-id="500" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Cited by (2)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="467"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="468"><ul data-dcnode-id="470"><li class="ListArticleItem" data-dcnode-id="482"><div class="sub-heading" data-dcnode-id="494"><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0308596122000301" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="498" id="citing-articles-article0-title"><span data-dcnode-id="499" instrument_node="">The rise of 5G technologies and systems: A quantitative analysis of knowledge production</span></h3></a><div class="article-source ellipsis" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">2022, Telecommunications Policy</span></div></div><div class="buttons" data-dcnode-id="488"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="489" type="button"><span class="button-link-text" data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="490" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="491"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="483"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="484" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="485"><p data-dcnode-id="486" id="abspara0010"><span data-dcnode-id="487" instrument_node="">The advent of a new generation of wireless communications has punctuated the dawn of every decade in recent times. Upgrades to mobile electronic systems represent faster and more robust capabilities of data transfer but bring with it a wide set of complementary changes as they are underpinned by harmonised specific spectrum bands, fresh international technical standards, new network operation requirements, innovative cellular devices as well as new services and a broader array of potential commercial use applications. This paper presents a systematic outline of the development of 5G-related research until 2020 as revealed by over 10,000 science and technology publications. The exercise addresses the emergence, growth, and impact of this body of work and offers insights regarding disciplinary distribution, international performance, and historical dynamics. Findings reveal the progressive growth of the 5G research over the years after original contributions in 2010 and point to a “take-off” around 2014. A set of stylised facts regarding this technology since its infancy are of interest to engineers, regulators and innovation strategists and policy-makers.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="471"><div class="sub-heading" data-dcnode-id="476"><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1109/CMI53512.2021.9663764" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="480" id="citing-articles-article1-title"><span data-dcnode-id="481" instrument_node="">Societal security and trust in digital societies: A socio-technical perspective</span></h3></a><div class="article-source ellipsis" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">2021, 14th CMI International Conference - Critical ICT Infrastructures and Platforms, CMI 2021 - Proceedings</span></div></div><div class="buttons" data-dcnode-id="475"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="472"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="473" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="474"></div></div></div></li></ul><span data-dcnode-id="469" instrument_node=""></span></div></div></section></div><div class="Footnotes" data-dcnode-id="256"><dl class="footnote" data-dcnode-id="448"><dt class="footnote-label" data-dcnode-id="461"><sup data-dcnode-id="462"><a data-dcnode-id="463" href="#bcit_1"><span data-dcnode-id="464" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="449"><p data-dcnode-id="450" id="notep0001"><span data-dcnode-id="460" instrument_node="">Freeman rarely used the term ‘rules’. This terminology is present in contemporary studies of socio-technical transitions (</span><a class="workspace-trigger" data-dcnode-id="458" href="#bib0090" name="bbib0090"><span data-dcnode-id="459" instrument_node="">Schot &amp; Kanger,&nbsp;2018</span></a><span data-dcnode-id="457" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="455" href="#bib0091" name="bbib0091"><span data-dcnode-id="456" instrument_node="">Schot &amp; Steinmueller,&nbsp;2018</span></a><span data-dcnode-id="454" instrument_node="">) and it frequently appears in institutional economic traditions applied to examine digital technology innovation processes (</span><a class="workspace-trigger" data-dcnode-id="452" href="#bib0074" name="bbib0074"><span data-dcnode-id="453" instrument_node="">Mansell &amp; Steinmueller,&nbsp;2020</span></a><span data-dcnode-id="451" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="419"><dt class="footnote-label" data-dcnode-id="444"><sup data-dcnode-id="445"><a data-dcnode-id="446" href="#bcit_2"><span data-dcnode-id="447" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="420"><p data-dcnode-id="421" id="notep0002"><span data-dcnode-id="443" instrument_node="">Freeman's work on ICT paradigm guiding principles was influenced by his association with SPRU colleagues with training in numerous social sciences disciplines beyond economics and by a similarly interdisciplinary network of research centres under the ESRC's Programme on Information and Communication Technologies, e.g., </span><a class="workspace-trigger" data-dcnode-id="441" href="#bib0013" name="bbib0013"><span data-dcnode-id="442" instrument_node="">Dutton (1999</span></a><span data-dcnode-id="440" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="438" href="#bib0014" name="bbib0014"><span data-dcnode-id="439" instrument_node="">1996</span></a><span data-dcnode-id="437" instrument_node="">); </span><a class="workspace-trigger" data-dcnode-id="435" href="#bib0071" name="bbib0071"><span data-dcnode-id="436" instrument_node="">Mansell&nbsp;(1994)</span></a><span data-dcnode-id="434" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="432" href="#bib0080" name="bbib0080"><span data-dcnode-id="433" instrument_node="">Miles&nbsp;(1988)</span></a><span data-dcnode-id="431" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="429" href="#bib0100" name="bbib0100"><span data-dcnode-id="430" instrument_node="">Thomas &amp; Miles&nbsp;(1990)</span></a><span data-dcnode-id="428" instrument_node=""> and see </span><a class="workspace-trigger" data-dcnode-id="426" href="#bib0072" name="bbib0072"><span data-dcnode-id="427" instrument_node="">Mansell (2002</span></a><span data-dcnode-id="425" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="423" href="#bib0070" name="bbib0070"><span data-dcnode-id="424" instrument_node="">2012</span></a><span data-dcnode-id="422" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="408"><dt class="footnote-label" data-dcnode-id="415"><sup data-dcnode-id="416"><a data-dcnode-id="417" href="#bcit_3"><span data-dcnode-id="418" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="409"><p data-dcnode-id="410" id="notep0003"><span data-dcnode-id="414" instrument_node="">See 3GPP: A Global Initiative, https://www.3gpp.org/about-3gpp/about-3gpp. For a review of mobile service history, see </span><a class="workspace-trigger" data-dcnode-id="412" href="#bib0069" name="bbib0069"><span data-dcnode-id="413" instrument_node="">Lemstra&nbsp;(2018)</span></a><span data-dcnode-id="411" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="400"><dt class="footnote-label" data-dcnode-id="404"><sup data-dcnode-id="405"><a data-dcnode-id="406" href="#bcit_4"><span data-dcnode-id="407" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="401"><p data-dcnode-id="402" id="notep0004"><span data-dcnode-id="403" instrument_node="">5G uses higher radio spectrum frequencies than earlier wireless mobiles services similar to those used in airport body scanners. Standards set by the International Commission on Non-Ionizing Radiation Protection and the IEEE International Committee on Electromagnetic Safety regulate maximum exposure. The WHO is studying whether the specific 5G exposure levels are likely to exceed safety levels and is expected to report in 2022, but no harms are anticipated.</span></p></dd></dl><dl class="footnote" data-dcnode-id="392"><dt class="footnote-label" data-dcnode-id="396"><sup data-dcnode-id="397"><a data-dcnode-id="398" href="#bcit_5"><span data-dcnode-id="399" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="393"><p data-dcnode-id="394" id="notep0005"><span data-dcnode-id="395" instrument_node="">Companies involved in OpenRAN initiatives include NEC and many US companies that currently do not hold global leadership positions in the supply of 5G hardware or software. Some companies such as Cisco (US), Nokia (Finland) and Ericsson (Sweden) are developing open and proprietary approaches, the latter two having strong market positions in the RAN equipment market and mobile technology generally.</span></p></dd></dl><dl class="footnote" data-dcnode-id="378"><dt class="footnote-label" data-dcnode-id="388"><sup data-dcnode-id="389"><a data-dcnode-id="390" href="#bcit_6"><span data-dcnode-id="391" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="379"><p data-dcnode-id="380" id="notep0006"><span data-dcnode-id="387" instrument_node="">International standards in this area include, for example, a standard for lawful interception (</span><a class="workspace-trigger" data-dcnode-id="385" href="#bib0023" name="bbib0023"><span data-dcnode-id="386" instrument_node="">ETSI,&nbsp;2019b</span></a><span data-dcnode-id="384" instrument_node="">) and technical specifications for the interception architecture and functions and delivery of required information to law enforcement monitoring facilities (</span><a class="workspace-trigger" data-dcnode-id="382" href="#bib0022" name="bbib0022"><span data-dcnode-id="383" instrument_node="">ETSI,&nbsp;2019a</span></a><span data-dcnode-id="381" instrument_node="">,b).</span></p></dd></dl><dl class="footnote" data-dcnode-id="361"><dt class="footnote-label" data-dcnode-id="374"><sup data-dcnode-id="375"><a data-dcnode-id="376" href="#bcit_7"><span data-dcnode-id="377" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="362"><p data-dcnode-id="363" id="notep0007"><span data-dcnode-id="373" instrument_node="">The </span><a class="workspace-trigger" data-dcnode-id="371" href="#bib0103" name="bbib0103"><span data-dcnode-id="372" instrument_node="">US&nbsp;1994</span></a><span data-dcnode-id="370" instrument_node=""> Communications Assistance for Law Enforcement Act (CALEA) (</span><a class="workspace-trigger" data-dcnode-id="368" href="#bib0103" name="bbib0103"><span data-dcnode-id="369" instrument_node="">US,&nbsp;1994</span></a><span data-dcnode-id="367" instrument_node="">) enables the government to impose requirements on equipment manufacturers and network operators to enable lawful communications interception and to make certain customer data available to law enforcement agencies. In 2019 the Federal Communications Commission named Huawei and ZTE as companies without protections against unauthorised surveillance and indicated that US-owned companies cannot operate in the United States or overseas using their equipment (</span><a class="workspace-trigger" data-dcnode-id="365" href="#bib0027" name="bbib0027"><span data-dcnode-id="366" instrument_node="">FCC,&nbsp;2019</span></a><span data-dcnode-id="364" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="353"><dt class="footnote-label" data-dcnode-id="357"><sup data-dcnode-id="358"><a data-dcnode-id="359" href="#bcit_8"><span data-dcnode-id="360" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="354"><p data-dcnode-id="355" id="notep0008"><span data-dcnode-id="356" instrument_node="">This is changing with the 5G software distributed network which enables data to be stored on devices at the edges of networks.</span></p></dd></dl><dl class="footnote" data-dcnode-id="339"><dt class="footnote-label" data-dcnode-id="349"><sup data-dcnode-id="350"><a data-dcnode-id="351" href="#bcit_9"><span data-dcnode-id="352" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="340"><p data-dcnode-id="341" id="notep0009"><span data-dcnode-id="348" instrument_node="">See Statista (</span><a class="workspace-trigger" data-dcnode-id="346" href="#bib0096" name="bbib0096"><span data-dcnode-id="347" instrument_node="">2020</span></a><span data-dcnode-id="345" instrument_node="">) which includes platform-as-a-service and infrastructure-as-a-service and hosted private cloud services, and see software-as-a-service </span><a class="workspace-trigger" data-dcnode-id="343" href="#bib0063" name="bbib0063"><span data-dcnode-id="344" instrument_node="">Holst&nbsp;(2020)</span></a><span data-dcnode-id="342" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="328"><dt class="footnote-label" data-dcnode-id="335"><sup data-dcnode-id="336"><a data-dcnode-id="337" href="#bcit_10"><span data-dcnode-id="338" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="329"><p data-dcnode-id="330" id="notep0010"><span data-dcnode-id="334" instrument_node="">See SAP (</span><a class="workspace-trigger" data-dcnode-id="332" href="#bib0089" name="bbib0089"><span data-dcnode-id="333" instrument_node="">2020</span></a><span data-dcnode-id="331" instrument_node="">), 1,187 companies.</span></p></dd></dl><dl class="footnote" data-dcnode-id="320"><dt class="footnote-label" data-dcnode-id="324"><sup data-dcnode-id="325"><a data-dcnode-id="326" href="#bcit_11"><span data-dcnode-id="327" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="321"><p data-dcnode-id="322" id="notep0011"><span data-dcnode-id="323" instrument_node="">Both supervised AI for classification and statistical analysis of large data sets and unsupervised AI relying on deep learning to generate predictive patterns.</span></p></dd></dl><dl class="footnote" data-dcnode-id="309"><dt class="footnote-label" data-dcnode-id="316"><sup data-dcnode-id="317"><a data-dcnode-id="318" href="#bcit_12"><span data-dcnode-id="319" instrument_node="">12</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="310"><p data-dcnode-id="311" id="notep0012"><span data-dcnode-id="315" instrument_node="">The European Union sees itself as being well-positioned for global leadership in the AI field having influenced the OECD's (</span><a class="workspace-trigger" data-dcnode-id="313" href="#bib0085" name="bbib0085"><span data-dcnode-id="314" instrument_node="">2019a</span></a><span data-dcnode-id="312" instrument_node="">) ethical principles and the G20’s endorsement of these principles.</span></p></dd></dl><dl class="footnote" data-dcnode-id="295"><dt class="footnote-label" data-dcnode-id="305"><sup data-dcnode-id="306"><a data-dcnode-id="307" href="#bcit_13"><span data-dcnode-id="308" instrument_node="">13</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="296"><p data-dcnode-id="297" id="notep0013"><span data-dcnode-id="304" instrument_node="">The Court found that, ‘unless there is a valid Commission adequacy decision, … competent supervisory authorities are required to suspend or prohibit a transfer of personal data to a third country where they take the view, in the light of all the circumstances of that transfer, that the standard data protection clauses are not or cannot be complied with in that country’ (</span><a class="workspace-trigger" data-dcnode-id="302" href="#bib0025" name="bbib0025"><span data-dcnode-id="303" instrument_node="">EU,&nbsp;2020a</span></a><span data-dcnode-id="301" instrument_node="">: np, </span><a class="workspace-trigger" data-dcnode-id="299" href="#bib0025" name="bbib0025"><span data-dcnode-id="300" instrument_node="">2020</span></a><span data-dcnode-id="298" instrument_node="">b).</span></p></dd></dl><dl class="footnote" data-dcnode-id="287"><dt class="footnote-label" data-dcnode-id="291"><sup data-dcnode-id="292"><a data-dcnode-id="293" href="#bcit_14"><span data-dcnode-id="294" instrument_node="">14</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="288"><p data-dcnode-id="289" id="notep0014"><span data-dcnode-id="290" instrument_node="">GAIA-X was established in mid-2020 as a not-for-profit company with an initial annual budget of €1.5m.</span></p></dd></dl><dl class="footnote" data-dcnode-id="273"><dt class="footnote-label" data-dcnode-id="283"><sup data-dcnode-id="284"><a data-dcnode-id="285" href="#bcit_15"><span data-dcnode-id="286" instrument_node="">15</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="274"><p data-dcnode-id="275" id="notep0015"><span data-dcnode-id="282" instrument_node="">The purpose of this section is not to detail the complex stipulations under existing international, national or within country, tax law. Despite a United States government commitment to a permanent moratorium on taxes on internet access and on internet-only services under the US Trade Facilitation and Trade Enforcement Act of 2015 (incorporating the Internet Tax Freedom Act, 1998, (</span><a class="workspace-trigger" data-dcnode-id="280" href="#bib0104" name="bbib0104"><span data-dcnode-id="281" instrument_node="">US. 1998</span></a><span data-dcnode-id="279" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="277" href="#bib0105" name="bbib0105"><span data-dcnode-id="278" instrument_node="">US 2016</span></a><span data-dcnode-id="276" instrument_node="">), more than half the American states levy some form of tax on digital products (mostly downloads) at a rate of 1 to 7 percent.</span></p></dd></dl><dl class="footnote" data-dcnode-id="265"><dt class="footnote-label" data-dcnode-id="269"><sup data-dcnode-id="270"><a data-dcnode-id="271" href="#bcit_16"><span data-dcnode-id="272" instrument_node="">16</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="266"><p data-dcnode-id="267" id="notep0016"><span data-dcnode-id="268" instrument_node="">One key area nevertheless of ambiguity was international transfer pricing which enabled companies to reap profits in the jurisdiction of their choice.</span></p></dd></dl><dl class="footnote" data-dcnode-id="257"><dt class="footnote-label" data-dcnode-id="261"><sup data-dcnode-id="262"><a data-dcnode-id="263" href="#bcit_17"><span data-dcnode-id="264" instrument_node="">17</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="258"><p data-dcnode-id="259" id="notep0017"><span data-dcnode-id="260" instrument_node="">The amounts of tax revenue are tiny compared to billions in state expenditure associated with national Covid-19 responses.</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="253"><span class="copyright-line" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Crown Copyright © 2021 Published by Elsevier B.V.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SpecialIssueArticles" data-dcnode-id="236" id="virtual-special-issue"><div class="part-of-issue u-padding-s-bottom" data-dcnode-id="237"><h2 class="part-of-issue-text u-h4" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Part of special issue:</span></h2><div data-dcnode-id="244"><a class="anchor part-of-issue-title" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/00487333/vsi/10P3WB67SNZ"><span class="anchor-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">SI: Freeman Centenary</span></span></a><span class="part-of-issue-editors" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Edited by Ed Steinmueller, Raphael Kaplinsky</span></span></div><div class="u-padding-s-bottom" data-dcnode-id="238"><a class="anchor download-virtual-special-issue anchor-has-inherit-color" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/00487333/vsi/10P3WB67SNZ"><svg class="icon icon-navigate-right" data-dcnode-id="242" focusable="false" height="24" viewBox="0 0 54 128" width="10.125"><path d="m1 99l38-38-38-38 7-7 45
