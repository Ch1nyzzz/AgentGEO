</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0002&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abss0002&quot;><p id=&quot;spara002&quot;>Innovation in digital technologies is central to contemporary debates about the need for policy and regulatory adjustment in response to the consequences of the centrality of these technologies in contemporary societies. Christopher Freeman&amp;#x27;s research in relation to changes in techno-economic paradigm and, specifically, in relation to the information and communication technology (ICT) paradigm, cautioned that assessments of these changes needed to go beyond market dynamics to examine social, cultural and political issues. In this paper several predominant themes in his work are foregrounded – the ambiguity of changes within the ICT paradigm; the role of guiding principles in influencing expectations about societal outcomes; and the importance of political factors in shaping the consequences of technological innovation. These three themes are then deployed in a discussion of recent innovations – two technical (5G mobile networks and artificial intelligence-as-a-service) and one institutional (proposals for changes in the international taxation regime in response to claims that the existing regime is inappropriate in the face of global online service provision). In each instance, the aim is to illustrate how following Freeman by giving attention to the themes operates as an important guide to analysis of adjustments to novel deployments of digital technology. The conclusion emphasizes the value of Freeman&amp;#x27;s contributions to shaping research agendas that acknowledge the need to humanize technology, to consider alternatives to taken-for-granted principles and practices, and to take into account the role of political power in tandem with concentrated economic power.</p></div></div></div>" data-dcnode-id="4512" lang="en" name="citation_abstract"><span data-dcnode-id="4511" instrument_node="">

"">•</span></dt><dd class="list-description" data-dcnode-id="3941"><p data-dcnode-id="3942" id="para0002"><span data-dcnode-id="3943" instrument_node="">Three themes– ambiguity, guiding principles and political factors – in Freeman's work are discussed as central to the analytics of technology innovation.</span></p></dd><dt class="list-label" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3936"><p data-dcnode-id="3937" id="para0003"><span data-dcnode-id="3938" instrument_node="">The themes guide an analysis of 5G and Algorithm-as-a-Service cloud-based innovations and changes the international taxation regime responding to global digitalization.</span></p></dd><dt class="list-label" data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3931"><p data-dcnode-id="3932" id="para0004"><span data-dcnode-id="3933" instrument_node="">Factors contributing to harmful commercial datafication strategies are discussed.</span></p></dd><dt class="list-label" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3926"><p data-dcnode-id="3927" id="para0005"><span data-dcnode-id="3928" instrument_node="">The analysis of ICT Paradigm change foregrounds Freeman's contribution to reimagining the digitalized future.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="3913" id="abs0002"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Abstract</span></h2><div data-dcnode-id="3914" id="abss0002"><p data-dcnode-id="3915" id="spara002"><span data-dcnode-id="3919" instrument_node="">Innovation in digital technologies is central to contemporary debates about the need for policy and regulatory adjustment in response to the consequences of the centrality of these technologies in contemporary societies. Christopher Freeman's research in relation to changes in techno-economic paradigm and, specifically, in relation to the information and communication technology (ICT) paradigm, cautioned that assessments of these changes needed to go beyond market dynamics to examine social, cultural and political issues. In this paper several predominant themes in his work are foregrounded – the ambiguity of changes within the ICT paradigm; the role of guiding principles in influencing expectations about societal outcomes; and the importance of political factors in shaping the consequences of technological innovation. These three themes are then deployed in a discussion of recent innovations – two technical (5G mobile networks and artificial intelligence-as-a-service) and one institutional (proposals for changes in the international taxation regime in response to claims that the existing regime is inappropriate in the face of global </span><a class="topic-link" data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/digital-goods" title="Learn more about online service from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3918" instrument_node="">online service</span></a><span data-dcnode-id="3916" instrument_node=""> provision). In each instance, the aim is to illustrate how following Freeman by giving attention to the themes operates as an important guide to analysis of adjustments to novel deployments of digital technology. The conclusion emphasizes the value of Freeman's contributions to shaping research agendas that acknowledge the need to humanize technology, to consider alternatives to taken-for-granted principles and practices, and to take into account the role of political power in tandem with concentrated economic power.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="3889" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="3901"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048733321000949"><svg class="icon icon-navigate-left" data-dcnode-id="3910" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="3911"></path></svg><span class="button-alternative-text" data-dcnode-id="3903"><strong data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="3890"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048733321001232"><span class="button-alternative-text" data-dcnode-id="3894"><strong data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="3892" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="3893"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="3846"><div class="keywords-section" data-dcnode-id="3868" id="keys0001"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="3884" id="key0001"><span data-dcnode-id="3885" id="cetext0002"><span data-dcnode-id="3886" instrument_node="">ICT paradigm</span></span></div><div class="keyword" data-dcnode-id="3881" id="key0002"><span data-dcnode-id="3882" id="cetext0003"><span data-dcnode-id="3883" instrument_node="">Innovation</span></span></div><div class="keyword" data-dcnode-id="3878" id="key0003"><span data-dcnode-id="3879" id="cetext0004"><span data-dcnode-id="3880" instrument_node="">Datafication</span></span></div><div class="keyword" data-dcnode-id="3875" id="key0004"><span data-dcnode-id="3876" id="cetext0005"><span data-dcnode-id="3877" instrument_node="">5G network</span></span></div><div class="keyword" data-dcnode-id="3872" id="key0005"><span data-dcnode-id="3873" id="cetext0006"><span data-dcnode-id="3874" instrument_node="">Artificial intelligence</span></span></div><div class="keyword" data-dcnode-id="3869" id="key0006"><span data-dcnode-id="3870" id="cetext0007"><span data-dcnode-id="3871" instrument_node="">Taxation</span></span></div></div><div class="keywords-section" data-dcnode-id="3847" id="keys0002"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">JEL codes</span></h2><div class="keyword" data-dcnode-id="3863" id="key0007"><span data-dcnode-id="3864" id="cetext0008"><span data-dcnode-id="3865" instrument_node="">H0</span></span></div><div class="keyword" data-dcnode-id="3860" id="key0008"><span data-dcnode-id="3861" id="cetext0009"><span data-dcnode-id="3862" instrument_node="">K24</span></span></div><div class="keyword" data-dcnode-id="3857" id="key0009"><span data-dcnode-id="3858" id="cetext0010"><span data-dcnode-id="3859" instrument_node="">L1</span></span></div><div class="keyword" data-dcnode-id="3854" id="key0010"><span data-dcnode-id="3855" id="cetext0011"><span data-dcnode-id="3856" instrument_node="">L5</span></span></div><div class="keyword" data-dcnode-id="3851" id="key0011"><span data-dcnode-id="3852" id="cetext0012"><span data-dcnode-id="3853" instrument_node="">O3</span></span></div><div class="keyword" data-dcnode-id="3848" id="key0012"><span data-dcnode-id="3849" id="cetext0013"><span data-dcnode-id="3850" instrument_node="">P16</span></span></div></div></div><span data-dcnode-id="3845" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3140" id="body"><div data-dcnode-id="3151"><section data-dcnode-id="3777" id="sec0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3843" id="cesectitle0005"><span data-dcnode-id="3844" instrument_node="">Introduction</span></h2><p data-dcnode-id="3834" id="para0006"><span data-dcnode-id="3842" instrument_node="">In the third decade of the 21</span><sup data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">st</span></sup><span data-dcnode-id="3835"><span data-dcnode-id="3839" instrument_node=""> Century digitalization and online connectivity (when accessible and affordable) support services yielding enormous quantities of data. Companies are appropriating these data for monetization purposes. Governments are seeking access to them in support of public services. And artificial intelligence (AI), machine learning techniques and </span><a class="topic-link" data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/data-analytics" title="Learn more about data analytics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3838" instrument_node="">data analytics</span></a><span data-dcnode-id="3836" instrument_node=""> are permeating decision making. Commercial datafication practices are being employed by a small number of dominant digital platform companies originating in the United States or China. Accompanying these developments is debate about the societal benefits, the harmful consequences and the appropriate policy responses.</span></span></p><p data-dcnode-id="3823" id="para0007"><span data-dcnode-id="3833" instrument_node="">One view of these developments is that if adjustment to these changes is sufficiently rapid, destabilizations in the economy and harms to the polity will be mitigated as the economy returns to equilibrium following the shock of rapid digital technology innovation. This, it is argued, will ensure that benefits for all are maximized to yield valued societal outcomes. A different view is that the application of these technologies for commercial purposes is producing multiple social and political harms. These include the proliferation of mis- or dis-information, hate speech and an overreliance on algorithm-derived biased information as a result of behavioral surveillance (</span><a class="workspace-trigger" data-dcnode-id="3831" href="#bib0078" name="bbib0078"><span data-dcnode-id="3832" instrument_node="">Mayer-Schönberger &amp; Cukier,&nbsp;2013</span></a><span data-dcnode-id="3830" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3825" href="#bib0107" name="bbib0107"><span data-dcnode-id="3829" instrument_node="">Van&nbsp;Dijck </span><em data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">et al.</span></em><span data-dcnode-id="3826" instrument_node="">, 2018</span></a><span data-dcnode-id="3824" instrument_node="">). In this view, the harms of ubiquitous digital services cannot be mitigated without policy intervention. This is because the outcomes of datafication as practiced especially by the largest digital platforms are deemed to jeopardize public values including rights to privacy protection, non-discrimination and equitable treatment of citizens and consumers.</span></p><p data-dcnode-id="3803" id="para0008"><span data-dcnode-id="3822" instrument_node="">The study of how innovation has produced the microelectronics-based information and communication technology (ICT) paradigm is at the heart of Christopher Freeman's work (</span><a class="workspace-trigger" data-dcnode-id="3820" href="#bib0044" name="bbib0044"><span data-dcnode-id="3821" instrument_node="">Freeman,&nbsp;2007</span></a><span data-dcnode-id="3819" instrument_node="">). At the time he was writing, these developments were captured under the label information society revolution. They are more likely now to be characterized as the 4</span><sup data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">th</span></sup><span data-dcnode-id="3816" instrument_node=""> Industrial Revolution (</span><a class="workspace-trigger" data-dcnode-id="3814" href="#bib0092" name="bbib0092"><span data-dcnode-id="3815" instrument_node="">Schwab,&nbsp;2017</span></a><span data-dcnode-id="3813" instrument_node="">) or, critically, as ‘data colonialism’ (</span><a class="workspace-trigger" data-dcnode-id="3811" href="#bib0010" name="bbib0010"><span data-dcnode-id="3812" instrument_node="">Couldry &amp; Mejias,&nbsp;2019</span></a><span data-dcnode-id="3810" instrument_node="">). In this view, the principal ambition of continuous innovation within the ICT paradigm – and now an AI-inspired paradigm – is a logic of accumulation based on the extraction of economic value from data with returns accruing disproportionately to the owners of digital systems located in the global North. The outcome of this market dynamic is seen as presenting multiple challenges for the future of human autonomy and welfare in the wake of computerized operations generating ‘behavioral surplus’ for the benefit of ‘surveillance capitalism’ (</span><a class="workspace-trigger" data-dcnode-id="3808" href="#bib0112" name="bbib0112"><span data-dcnode-id="3809" instrument_node="">Zuboff,&nbsp;2019</span></a><span data-dcnode-id="3807" instrument_node="">). Notwithstanding criticism of the business models of the ‘big tech’ and many other companies that apply digital technologies and services and policy debates about how datafication activities should be regulated, citizens and consumers are persistently exhorted to adjust to the shocks of technological change in the digital infrastructure (the internet, fixed and mobile communication) and in service applications (social media, electronic commerce, search engines and data analytics) (</span><a class="workspace-trigger" data-dcnode-id="3805" href="#bib0074" name="bbib0074"><span data-dcnode-id="3806" instrument_node="">Mansell &amp; Steinmueller,&nbsp;2020</span></a><span data-dcnode-id="3804" instrument_node="">).</span></p><p data-dcnode-id="3789" id="para0009"><span data-dcnode-id="3802" instrument_node="">In much of his work in the systems of innovation tradition (</span><a class="workspace-trigger" data-dcnode-id="3800" href="#bib0007" name="bbib0007"><span data-dcnode-id="3801" instrument_node="">Borrás &amp; Edquist,&nbsp;2019</span></a><span data-dcnode-id="3799" instrument_node="">), Freeman focused on the R&amp;D system, on firm-level innovation and on policy designed to influence firm-level innovation. However, especially in his work on the determinants of the ICT paradigm, he frequently encouraged research intended to answer questions about why and how new technologies, institutions and practices come into being with the aim of investigating their broader consequences for society (</span><a class="workspace-trigger" data-dcnode-id="3797" href="#bib0039" name="bbib0039"><span data-dcnode-id="3798" instrument_node="">Freeman,&nbsp;1994</span></a><span data-dcnode-id="3796" instrument_node="">). He insisted, with Carlota Perez, that the societal adjustments needed to benefit from or mitigate harms accompanying the ICT paradigm are hard to achieve (</span><a class="workspace-trigger" data-dcnode-id="3794" href="#bib0049" name="bbib0049"><span data-dcnode-id="3795" instrument_node="">Freeman &amp; Perez,&nbsp;1988</span></a><span data-dcnode-id="3793" instrument_node="">) and that they emerge from ‘experiments, enthusiasms, theories, beliefs and interests’ of multiple actors (</span><a class="workspace-trigger" data-dcnode-id="3791" href="#bib0039" name="bbib0039"><span data-dcnode-id="3792" instrument_node="">Freeman,&nbsp;1994</span></a><span data-dcnode-id="3790" instrument_node="">, p. 11). He was clear that benefits and harms linked to the ICT paradigm cannot be assessed adequately when analysis is restricted to technology-driven shocks to the economic system, and he often commented upon the importance of cultural, social and political factors.</span></p><p data-dcnode-id="3778" id="para0010"><span data-dcnode-id="3788" instrument_node="">Of numerous prominent themes in Freeman's work signaling the complexity of ICT paradigm-related adjustment, three are selected for consideration in </span><a class="workspace-trigger" data-dcnode-id="3786" href="#sec0002" name="bsec0002"><span data-dcnode-id="3787" instrument_node="">section&nbsp;2</span></a><span data-dcnode-id="3785" instrument_node=""> to highlight the attention he gave to determinants of change beyond the economic analysis of market dynamics. A first theme is the attention Freeman gave to the ambiguity of technological innovation outcomes. A second theme is the need to understand the principles that become embodied in institutionalized norms and how these condition expectations in relation to the design and use of ICTs. The third theme is the importance of politics in the innovation process and, particularly, the interpenetration of political and economic power. These themes are used as a guide in </span><a class="workspace-trigger" data-dcnode-id="3783" href="#sec0003" name="bsec0003"><span data-dcnode-id="3784" instrument_node="">section&nbsp;3</span></a><span data-dcnode-id="3782" instrument_node=""> for an examination of contemporary developments in the ICT paradigm (5G mobile networks, artificial intelligence-as-a-service (AIaaS) and taxation policy). These are selected not only because of their topicality at the time of writing, but because each is the focus of contentious debates in areas that go beyond innovation policy. The first two exemplify novel digital systems that are accompanied by high expectations of benefit and of harm. The third, taxation, is an area of policy that is being destabilized by the ICT paradigm. Each is an instance where analysis emphasizing these themes helps to clarify that there is always a potential for alternative choices to be taken about the technology innovation pathway. This is especially so when it is recognized that such choices are informed by values in addition to economic valuations (</span><a class="workspace-trigger" data-dcnode-id="3780" href="#bib0046" name="bbib0046"><span data-dcnode-id="3781" instrument_node="">Freeman &amp; Louça,&nbsp;2001</span></a><span data-dcnode-id="3779" instrument_node="">).</span></p></section><section data-dcnode-id="3617" id="sec0002"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3773" id="cesectitle0006"><span data-dcnode-id="3776" instrument_node="">2</span><span data-dcnode-id="3775" instrument_node="">. </span><span data-dcnode-id="3774" instrument_node="">Ambiguity, principles and the political as paradigm adjustment themes</span></h2><p data-dcnode-id="3761" id="para0011"><span data-dcnode-id="3772" instrument_node="">Adjustments to changes in any techno-economic paradigm are understood to be uncertain and to give rise to ambiguous outcomes in Freeman's work. Outcomes are treated as a result of multiple interconnected causes, be they cultural, economic, political, scientific or technological (</span><a class="workspace-trigger" data-dcnode-id="3770" href="#bib0046" name="bbib0046"><span data-dcnode-id="3771" instrument_node="">Freeman &amp; Louça,&nbsp;2001</span></a><span data-dcnode-id="3769" instrument_node="">). In the face of a multiplicity of causes, the analysis of paradigm adjustment for Freeman required a shift ‘from market economics to political and social economy’ (</span><a class="workspace-trigger" data-dcnode-id="3767" href="#bib0052" name="bbib0052"><span data-dcnode-id="3768" instrument_node="">Freeman &amp; Soete,&nbsp;1997</span></a><span data-dcnode-id="3766" instrument_node="">, p. 411). This shift then encouraged him to emphasize the importance of changes in regulatory regimes, ideas and customs; that is, the rules</span><a class="workspace-trigger" data-dcnode-id="3763" href="#cit_1" name="bcit_1"><sup data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">1</span></sup></a><span data-dcnode-id="3762" instrument_node=""> that condition technological and societal transformation. An analytical move beyond economic analysis of market dynamics towards additional facets of techno-economic and socio-technical transformation necessarily adds to the complexity of research. For Freeman, it meant acknowledging that the outcomes of ICT-inspired change may be positive or negative for different groups.</span></p><p data-dcnode-id="3747" id="para0013"><span data-dcnode-id="3760" instrument_node="">If ambiguity is unavoidable in the face of complexity, then analysis must depart from relatively constrained theoretical models that assume linearity between cause and effect. Ambiguity, the first theme highlighted here in Freeman's assessments of the ICT paradigm is illustrated, on the one hand, by optimism when he argued, for example, that ideas, ideals and foresight alongside technologies might help to avert ‘gloom and doom’ scenarios as suggested by models of human survival and human freedoms in the face of population growth (</span><a class="workspace-trigger" data-dcnode-id="3758" href="#bib0033" name="bbib0033"><span data-dcnode-id="3759" instrument_node="">Freeman,&nbsp;1974</span></a><span data-dcnode-id="3757" instrument_node="">, p. 451; </span><a class="workspace-trigger" data-dcnode-id="3755" href="#bib0059" name="bbib0059"><span data-dcnode-id="3756" instrument_node="">Heilbroner,&nbsp;1974</span></a><span data-dcnode-id="3754" instrument_node="">). He would be similarly optimistic decades later about the benefits of technological innovation: ‘the economics of technical change still demonstrate the possibility of a bright future for human beings’ (</span><a class="workspace-trigger" data-dcnode-id="3752" href="#bib0037" name="bbib0037"><span data-dcnode-id="3753" instrument_node="">Freeman,&nbsp;1992b</span></a><span data-dcnode-id="3751" instrument_node="">, p. xii). On the other hand, Freeman's assessments of technological change were tinged by pessimism. In the early 1970s, for instance, he argued for ‘social techniques’ of policy making because ‘the bias in the world research-innovation system is so great as to constitute a danger to the future of human society’ (</span><a class="workspace-trigger" data-dcnode-id="3749" href="#bib0047" name="bbib0047"><span data-dcnode-id="3750" instrument_node="">Freeman&nbsp;et&nbsp;al., 1971</span></a><span data-dcnode-id="3748" instrument_node="">, p. 382).</span></p><p data-dcnode-id="3721" id="para0014"><span data-dcnode-id="3746" instrument_node="">He read J D Bernal's (</span><a class="workspace-trigger" data-dcnode-id="3744" href="#bib0006" name="bbib0006"><span data-dcnode-id="3745" instrument_node="">1929</span></a><span data-dcnode-id="3743" instrument_node="">/</span><a class="workspace-trigger" data-dcnode-id="3741" href="#bib0006" name="bbib0006"><span data-dcnode-id="3742" instrument_node="">1970</span></a><span data-dcnode-id="3740" instrument_node="">) utopian imaginaries of a future in which compound synthetic brains might be interconnected to guide choices that would overcome poverty with interest (</span><a class="workspace-trigger" data-dcnode-id="3738" href="#bib0036" name="bbib0036"><span data-dcnode-id="3739" instrument_node="">Freeman,&nbsp;1992a</span></a><span data-dcnode-id="3737" instrument_node="">). When it came to assessing innovations in computational power, however, he signaled that these might be dangerous if they were to encourage a substitution of ‘mathematics for knowledge and computation for understanding’ (</span><a class="workspace-trigger" data-dcnode-id="3735" href="#bib0032" name="bbib0032"><span data-dcnode-id="3736" instrument_node="">Freeman,&nbsp;1973</span></a><span data-dcnode-id="3734" instrument_node="">, p. 12-13). He identified problems if computer power and networks for monitoring behavior were to be used ‘in the style of “1984”’ to control populations (</span><a class="workspace-trigger" data-dcnode-id="3732" href="#bib0050" name="bbib0050"><span data-dcnode-id="3733" instrument_node="">Freeman &amp; Soete,&nbsp;1987</span></a><span data-dcnode-id="3731" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3729" href="#bib0053" name="bbib0053"><span data-dcnode-id="3730" instrument_node="">2005</span></a><span data-dcnode-id="3728" instrument_node="">, p. 351). He also noted that invasive ICT systems could result in ‘reductions in social solidarity’ (</span><a class="workspace-trigger" data-dcnode-id="3726" href="#bib0053" name="bbib0053"><span data-dcnode-id="3727" instrument_node="">Freeman &amp; Soete,&nbsp;2005</span></a><span data-dcnode-id="3725" instrument_node="">, p. 351). Thus, despite his hope that adjustments accompanying the ICTs paradigm might result in a better world, Freeman's work displays a commitment to upholding fundamental human rights and social solidarity in the face of technological innovation. With his colleagues, he emphasized that neither technology nor innovation policies alone would solve social, political and economic problems (</span><a class="workspace-trigger" data-dcnode-id="3723" href="#bib0045" name="bbib0045"><span data-dcnode-id="3724" instrument_node="">Freeman&nbsp;et&nbsp;al., 1982</span></a><span data-dcnode-id="3722" instrument_node="">, p. 200).</span></p><p data-dcnode-id="3704" id="para0015"><span data-dcnode-id="3720" instrument_node="">A second theme prominent in Freeman's work is his attention to ‘guiding principles’ or ‘commonsense practices’ associated with techno-economic paradigms (</span><a class="workspace-trigger" data-dcnode-id="3718" href="#bib0037" name="bbib0037"><span data-dcnode-id="3719" instrument_node="">Freeman,&nbsp;1992b</span></a><span data-dcnode-id="3717" instrument_node="">). Emerging prevailing principles and practices were treated not simply as ‘an adjustment to transformations brought about by causes outside that system. Societies have, in other words, a say in the shape technology is likely to take’ (</span><a class="workspace-trigger" data-dcnode-id="3715" href="#bib0052" name="bbib0052"><span data-dcnode-id="3716" instrument_node="">Freeman &amp; Soete,&nbsp;1997</span></a><span data-dcnode-id="3714" instrument_node="">, p. 429). He insisted that technical innovation ‘first takes place in the minds of imaginative people’ (</span><a class="workspace-trigger" data-dcnode-id="3712" href="#bib0034" name="bbib0034"><span data-dcnode-id="3713" instrument_node="">Freeman,&nbsp;1979</span></a><span data-dcnode-id="3711" instrument_node="">, p. 211) and he emphasized the importance of examining mental models and biases arising from experiences that shape decisions about the design and deployment of new technologies (</span><a class="workspace-trigger" data-dcnode-id="3709" href="#bib0032" name="bbib0032"><span data-dcnode-id="3710" instrument_node="">Freeman,&nbsp;1973</span></a><span data-dcnode-id="3708" instrument_node="">). Here his treatment of systems of innovation was informed by those who worked alongside him with training in sociology, psychology and political economy. Their work emphasized social and political determinants of changes in socio-technical paradigms and how ideas, values and norms come to infuse imaginaries or expectations in society. Freeman understood that some of these become dominant, shaping the moral order and what is regarded as beneficial or harmful.</span><a class="workspace-trigger" data-dcnode-id="3705" href="#cit_2" name="bcit_2"><sup data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">2</span></sup></a></p><p data-dcnode-id="3690" id="para0017"><span data-dcnode-id="3703" instrument_node="">Freeman commented that ‘neither economists, nor sociologists, nor political scientists have satisfactory theories of social change’, and he called upon academics to abandon their ‘jealously guarded kingdoms’ (</span><a class="workspace-trigger" data-dcnode-id="3701" href="#bib0032" name="bbib0032"><span data-dcnode-id="3702" instrument_node="">Freeman,&nbsp;1973</span></a><span data-dcnode-id="3700" instrument_node="">, p. 6). In this way, interdisciplinary engagement might encourage a better understanding of prevailing mental models and principles and how they are implicated in harms such as social exclusion and the emergence of a ‘large underclass’ (</span><a class="workspace-trigger" data-dcnode-id="3698" href="#bib0052" name="bbib0052"><span data-dcnode-id="3699" instrument_node="">Freeman &amp; Soete,&nbsp;1997</span></a><span data-dcnode-id="3697" instrument_node="">). He emphasized that new ideas – guiding principles and practices – need to be tested against evidence through recourse to ‘fact, experiment, experience and logical argument’, not simply assumed to be beneficial for society (</span><a class="workspace-trigger" data-dcnode-id="3695" href="#bib0036" name="bbib0036"><span data-dcnode-id="3696" instrument_node="">Freeman,&nbsp;1992a</span></a><span data-dcnode-id="3694" instrument_node="">, p. 29). In this context, he called for ‘pluralistic political and social arrangements which deliberately tolerate organized criticism and opposition and the expression of alternative approaches’ (</span><a class="workspace-trigger" data-dcnode-id="3692" href="#bib0036" name="bbib0036"><span data-dcnode-id="3693" instrument_node="">Freeman,&nbsp;1992a</span></a><span data-dcnode-id="3691" instrument_node="">, p. 29). Otherwise, he suggested, alternative pathways for technological innovation would be unlikely to be discovered or taken up because of the dominance of prevailing guiding principles.</span></p><p data-dcnode-id="3673" id="para0018"><span data-dcnode-id="3689" instrument_node="">In his assessments of technological change and, specifically, the ICT paradigm, a third prominent theme in Freeman's work is the salience of political power and values. As he put it, it is ‘essential to look at the political bias and the values implicitly or explicitly present in any study of social systems’ (</span><a class="workspace-trigger" data-dcnode-id="3687" href="#bib0032" name="bbib0032"><span data-dcnode-id="3688" instrument_node="">Freeman,&nbsp;1973</span></a><span data-dcnode-id="3686" instrument_node="">, p. 12-13). He expected the outcomes of techno-economic change to vary in relation to the politics of ‘regimes of regulation’ (</span><a class="workspace-trigger" data-dcnode-id="3684" href="#bib0035" name="bbib0035"><span data-dcnode-id="3685" instrument_node="">Freeman,&nbsp;1989</span></a><span data-dcnode-id="3683" instrument_node="">) and with the ‘uneven and varied response of governments, firms and industries’ (</span><a class="workspace-trigger" data-dcnode-id="3681" href="#bib0049" name="bbib0049"><span data-dcnode-id="3682" instrument_node="">Freeman &amp; Perez,&nbsp;1988</span></a><span data-dcnode-id="3680" instrument_node="">, p. 64), and, of course, also consumers and citizens. He also noted the inertia of institutions in response to harms or threats and ‘the political power of established interest groups’ (</span><a class="workspace-trigger" data-dcnode-id="3678" href="#bib0050" name="bbib0050"><span data-dcnode-id="3679" instrument_node="">Freeman &amp; Soete,&nbsp;1987</span></a><span data-dcnode-id="3677" instrument_node="">, p. 58). For example, in contrast to those who imagined a potential for a horizontalization of power relations in the wake of digital networks and their applications, he observed that these developments did not ‘dispose of the question of power within networks’ (</span><a class="workspace-trigger" data-dcnode-id="3675" href="#bib0041" name="bbib0041"><span data-dcnode-id="3676" instrument_node="">Freeman,&nbsp;1998</span></a><span data-dcnode-id="3674" instrument_node="">, p. 464-465).</span></p><p data-dcnode-id="3650" id="para0019"><span data-dcnode-id="3672" instrument_node="">Freeman's observations about asymmetrical power relations and their potentially harmful consequences were informed by a departure from the theoretical assumption that private individual interests tend to coincide with social interests, and he cited Keynes approvingly:</span></p><blockquote data-dcnode-id="3651"><p data-dcnode-id="3652" id="spara003"><span data-dcnode-id="3671" instrument_node="">‘the World is </span><em data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">not</span></em><span data-dcnode-id="3668" instrument_node=""> so governed from above that private and social interests always coincide. It is </span><em data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">not</span></em><span data-dcnode-id="3665" instrument_node=""> so managed here below that in practice they coincide. It is </span><em data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">not</span></em><span data-dcnode-id="3662" instrument_node=""> a correct deduction from the Principles of Economics that enlightened self-interest generally </span><em data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">is</span></em><span data-dcnode-id="3659" instrument_node=""> enlightened …” (</span><a class="workspace-trigger" data-dcnode-id="3657" href="#bib0048" name="bbib0048"><span data-dcnode-id="3658" instrument_node="">Freeman &amp; Oldham,&nbsp;1991</span></a><span data-dcnode-id="3656" instrument_node="">, p. 4, emphasis in original) citing (</span><a class="workspace-trigger" data-dcnode-id="3654" href="#bib0066" name="bbib0066"><span data-dcnode-id="3655" instrument_node="">Keynes,&nbsp;1926/2010</span></a><span data-dcnode-id="3653" instrument_node="">, p. 288).</span></p></blockquote><p></p><p data-dcnode-id="3623" id="para0022"><span data-dcnode-id="3645"><span data-dcnode-id="3649" instrument_node="">He was clear that when a prevailing set of guiding principles overemphasizes individual and corporate interests, this can contribute to wealth and income </span><a class="topic-link" data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/inequality" title="Learn more about inequalities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3648" instrument_node="">inequalities</span></a><span data-dcnode-id="3646" instrument_node=""> and other social harms. For example, it can threaten civil liberties, endanger industrial and national security, and limit the scope for technological choices and alternatives (</span></span><a class="workspace-trigger" data-dcnode-id="3643" href="#bib0038" name="bbib0038"><span data-dcnode-id="3644" instrument_node="">Freeman,&nbsp;1992c</span></a><span data-dcnode-id="3642" instrument_node="">). With regard to the governance of powerful corporate actors, he suggested that ‘the world is ready for a “Global New Deal” and no longer trusts neo-liberal solutions’ (</span><a class="workspace-trigger" data-dcnode-id="3640" href="#bib0043" name="bbib0043"><span data-dcnode-id="3641" instrument_node="">Freeman,&nbsp;2001b</span></a><span data-dcnode-id="3639" instrument_node="">, p. 477). This implied that ‘market demand is not necessarily the sole, or even the principal, determinant of the scale and direction of inventive and innovative activity - still less of scientific activity’ (</span><a class="workspace-trigger" data-dcnode-id="3637" href="#bib0034" name="bbib0034"><span data-dcnode-id="3638" instrument_node="">Freeman,&nbsp;1979</span></a><span data-dcnode-id="3636" instrument_node="">, p. 206). Political and economic power are treated in Freeman's work as interdependent and this was especially evident when he turned to technological unemployment and its links to human immiseration ((</span><a class="workspace-trigger" data-dcnode-id="3634" href="#bib0039" name="bbib0039"><span data-dcnode-id="3635" instrument_node="">Freeman,&nbsp;1994</span></a><span data-dcnode-id="3633" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3631" href="#bib0051" name="bbib0051"><span data-dcnode-id="3632" instrument_node="">Freeman &amp; Soete,&nbsp;1994</span></a><span data-dcnode-id="3630" instrument_node="">); see also (</span><a class="workspace-trigger" data-dcnode-id="3628" href="#bib0055" name="bbib0055"><span data-dcnode-id="3629" instrument_node="">Frey,&nbsp;2019</span></a><span data-dcnode-id="3627" instrument_node="">)). He recognized that there are always alternatives, inspired by contending ideas, values and norms that may help to avert harm. As he put it, although it is ‘impossible to foresee the future precisely’, it is possible to take action to support outcomes ‘which seem desirable and profitable, or prevent those which seem dangerous, unwelcome or damaging’ (</span><a class="workspace-trigger" data-dcnode-id="3625" href="#bib0040" name="bbib0040"><span data-dcnode-id="3626" instrument_node="">Freeman,&nbsp;1995</span></a><span data-dcnode-id="3624" instrument_node="">, p. 3).</span></p><p data-dcnode-id="3618" id="para0023"><span data-dcnode-id="3622" instrument_node="">In summary, using an analytical approach embracing ambiguity, an understanding of emerging principles that shape expectations, and a consideration of the politics of innovation alongside its economics, Freeman concluded that ‘there would have to be a massive change in social justice on a global scale’ if a ‘golden age’ is to emerge from the ICT paradigm (</span><a class="workspace-trigger" data-dcnode-id="3620" href="#bib0044" name="bbib0044"><span data-dcnode-id="3621" instrument_node="">Freeman,&nbsp;2007</span></a><span data-dcnode-id="3619" instrument_node="">, p. 50). This conclusion was informed by his assessment of the prevailing values and practices associated with progressive shifts within an ICT paradigm. He noted that where such shifts were inconsistent with rights such as privacy protection, the equitable treatment of human beings and the implications for social solidarity and democracy, action would be necessary. The next section employs the three themes discussed here to developments in the ICT paradigm where societal benefits and harms and appropriate adjustment responses are disputed.</span></p></section><section data-dcnode-id="3238" id="sec0003"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3613" id="cesectitle0007"><span data-dcnode-id="3616" instrument_node="">3</span><span data-dcnode-id="3615" instrument_node="">. </span><span data-dcnode-id="3614" instrument_node="">Contentions in contemporary paradigm adjustment processes</span></h2><p data-dcnode-id="3611" id="para0024"><span data-dcnode-id="3612" instrument_node="">If techno-economic and socio-technical change are continuous within the ICT paradigm – not shocks requiring mechanistic market adjustments – analytic attention to the themes discussed in the preceding section sensitizes research to benefits and harms, to the need for an assessment of likely outcomes and the necessity of policy responses. As we have seen, Freeman cautioned against mono-causal explanations of ICT paradigm change, its origins and its consequences. By focusing analytically on the themes - ambiguity, guiding principles and political power – in an examination of components of the ICT system - 5G mobile, AIaaS and the operation of the taxation regime – issues come to light that would go unnoticed or be underplayed if analysis were to focus mainly on market dynamics. In these examples, consistent with Freeman's emphasis on the themes, it is not assumed that private (marketized) interests always coincide with broad and often conflicting societal interests.</span></p><section data-dcnode-id="3471" id="sec0004"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3607" id="cesectitle0008"><span data-dcnode-id="3610" instrument_node="">3.1</span><span data-dcnode-id="3609" instrument_node="">. </span><span data-dcnode-id="3608" instrument_node="">5G innovation adjustments</span></h3><p data-dcnode-id="3605" id="para0025"><span data-dcnode-id="3606" instrument_node="">5G mobile networks are set to become the communication infrastructure upon which government and industry depend and wireless connectivity is now a vital feature in many consumer and citizen lives. 5G deployment is estimated to generate some USD 250bn in revenue by 2025, providing a major boost to the data economy. 5G networks can support person-to-machine and machine-to-machine communication (the Internet of Things) with multiple applications envisaged across and within vertical sectors of the economy (transport, logistics, automotive and other manufacturing, media and entertainment) and within the public sector.</span></p><p data-dcnode-id="3581" id="para0026"><span data-dcnode-id="3604" instrument_node="">5G uses a new network architecture with software-defined virtualization techniques and proprietary and / or open interface standards. The technical standards for 5G have been evolving for some time with the International Telecommunication Union (ITU) publishing its </span><em data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">IMT for 2020 and Beyond</span></em><span data-dcnode-id="3601" instrument_node=""> vision for 5G in 2015 (</span><a class="workspace-trigger" data-dcnode-id="3599" href="#bib0064" name="bbib0064"><span data-dcnode-id="3600" instrument_node="">ITU,&nbsp;2015</span></a><span data-dcnode-id="3598" instrument_node="">). Standardization work has coalesced internationally around a global partnership uniting numerous standards development organizations.</span><a class="workspace-trigger" data-dcnode-id="3595" href="#cit_3" name="bcit_3"><sup data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">3</span></sup></a><span data-dcnode-id="3594" instrument_node=""> 5G is sometimes depicted as ‘the realization of a datafied dreamworld’ (</span><a class="workspace-trigger" data-dcnode-id="3592" href="#bib0077" name="bbib0077"><span data-dcnode-id="3593" instrument_node="">Mattern,&nbsp;2019</span></a><span data-dcnode-id="3591" instrument_node="">, p. np) with improved data security, resilience and reliability and multiple benefits for industry, consumers and citizens (</span><a class="workspace-trigger" data-dcnode-id="3589" href="#bib0015" name="bbib0015"><span data-dcnode-id="3590" instrument_node="">EC,&nbsp;2016a</span></a><span data-dcnode-id="3588" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3586" href="#bib0064" name="bbib0064"><span data-dcnode-id="3587" instrument_node="">ITU,&nbsp;2015</span></a><span data-dcnode-id="3585" instrument_node="">). But 5G is also linked to intense concern about harms in relation to data protection, privacy and surveillance (</span><a class="workspace-trigger" data-dcnode-id="3583" href="#bib0073" name="bbib0073"><span data-dcnode-id="3584" instrument_node="">Mansell &amp; Plantin,&nbsp;2020</span></a><span data-dcnode-id="3582" instrument_node="">). Ambivalence about the outcomes of 5G for society depends upon which analytical lens – market economics or political and social economics – is used to assess the impacts of this change in network design within the ICT paradigm.</span></p><p data-dcnode-id="3569" id="para0028"><span data-dcnode-id="3576"><span data-dcnode-id="3580" instrument_node="">In some instances, it is assumed that the commonsense principles guiding the 5G innovation pathway are such that this new technical system will be designed and implemented to balance public values (privacy, data protection and safety) with economic values (stimulating global </span><a class="topic-link" data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/competitiveness" title="Learn more about competitiveness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3579" instrument_node="">competitiveness</span></a><span data-dcnode-id="3577" instrument_node=""> of hardware manufacturers and software developers). While it is recognized that ‘technology is a manifestation of the values of those who design it’ in much of the promotional 5G literature (</span></span><a class="workspace-trigger" data-dcnode-id="3574" href="#bib0110" name="bbib0110"><span data-dcnode-id="3575" instrument_node="">Watts,&nbsp;2020</span></a><span data-dcnode-id="3573" instrument_node="">, p. 18), it is also often argued by observers in the Western democracies that authoritarian states will ‘take advantage of preferred relationships with technology firms to build backdoors for government access that allow them to surveil the private lives of citizens and political opponents at home and abroad’ (</span><a class="workspace-trigger" data-dcnode-id="3571" href="#bib0011" name="bbib0011"><span data-dcnode-id="3572" instrument_node="">Cyberspace&nbsp;Solarium Commission,&nbsp;2020,</span></a><span data-dcnode-id="3570" instrument_node=""> p. 17). Assessments of benefits and harms of 5G deployment are politicized around conflicting values and there are substantial uncertainties with very little public domain evidence that can be used to verify claims about harms such as threats to privacy or national security.</span></p><p data-dcnode-id="3551" id="para0029"><span data-dcnode-id="3568" instrument_node="">Freeman's emphasis on a wider analytical lens beyond the economic, also helps to direct attention to social and cultural issues such as resistance to the roll out of 5G due to claims about harms to health. Unverified claims, often circulated by celebrities, concerning harms linked to electromagnetic field exposure or radiation have circulated with previous generations of mobile services, but as 5G trials began there have been attacks on 5G equipment installations and on workers (some of these targeted 4G technology, not new 5G equipment) (</span><a class="workspace-trigger" data-dcnode-id="3566" href="#bib0109" name="bbib0109"><span data-dcnode-id="3567" instrument_node="">Waterson,&nbsp;2020</span></a><span data-dcnode-id="3565" instrument_node="">). The role of social media in amplifying the circulation of inaccurate information about potential health threats quickly was linked to conspiracy theories spread by QAnon and others, fomenting political dissension and becoming entangled with origin claims about the Covid-19 pandemic, notwithstanding the World Health Organization's insistence that there is no health effect causally linked to exposure to 5G or other wireless systems (</span><a class="workspace-trigger" data-dcnode-id="3563" href="#bib0111" name="bbib0111"><span data-dcnode-id="3564" instrument_node="">WHO,&nbsp;2020</span></a><span data-dcnode-id="3562" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3559" href="#cit_4" name="bcit_4"><sup data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">4</span></sup></a><span data-dcnode-id="3558" instrument_node=""> This is a clear case in which geopolitical, economic and social interests become entwined with decisions concerning investment in a new digital technology architecture and the commonsense principles that should inform corporate and government policy action (</span><a class="workspace-trigger" data-dcnode-id="3556" href="#bib0073" name="bbib0073"><span data-dcnode-id="3557" instrument_node="">Mansell &amp; Plantin,&nbsp;2020</span></a><span data-dcnode-id="3555" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3553" href="#bib0079" name="bbib0079"><span data-dcnode-id="3554" instrument_node="">Meese&nbsp;et&nbsp;al., 2020</span></a><span data-dcnode-id="3552" instrument_node="">).</span></p><p data-dcnode-id="3522" id="para0031"><span data-dcnode-id="3550" instrument_node="">Different views about the outcomes associated with 5G permeate conflicts among government and industry advocates of 5G standards. Their ideas and values influence whether open standards (e.g., for the 5G radio access network (RAN)) are preferred over proprietary standards. Open standards, according to some, are expected to facilitate competition among equipment suppliers, boosting efforts to reduce reliance of mobile service operators on one of the most prominent leaders in the 5G equipment market, the Chinese-owned company, Huawei (</span><a class="workspace-trigger" data-dcnode-id="3548" href="#bib0056" name="bbib0056"><span data-dcnode-id="3549" instrument_node="">Fried,&nbsp;2020</span></a><span data-dcnode-id="3547" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3544" href="#cit_5" name="bcit_5"><sup data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">5</span></sup></a><span data-dcnode-id="3539"><span data-dcnode-id="3543" instrument_node=""> Equipment manufacturers, service providers and government representatives have been developing consensus-based 5G standards for some time. The standards relating to </span><a class="topic-link" data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/cybersecurity" title="Learn more about cybersecurity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3542" instrument_node="">cybersecurity</span></a><span data-dcnode-id="3540" instrument_node=""> are being agreed internationally recognizing that the 5G virtualized service architecture presents risks to privacy and security for any country that deploys this new technology system (</span></span><a class="workspace-trigger" data-dcnode-id="3537" href="#bib0028" name="bbib0028"><span data-dcnode-id="3538" instrument_node="">FCC,&nbsp;2020</span></a><span data-dcnode-id="3536" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3533" href="#cit_6" name="bcit_6"><sup data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">6</span></sup></a><span data-dcnode-id="3532" instrument_node=""> China was an early active contributor to a TDD (time division duplex) standard (reducing interference between radio base stations) which is central for 5G, while the United States and Europe focused their efforts on FDD (frequency division duplex) for earlier generation mobile architectures. As a result, Huawei and the Chinese Institute of Telecommunications Research established a leadership position in international standardization activities, including standards for data protection and privacy in relation to the 5G architecture and then in equipment production (</span><a class="workspace-trigger" data-dcnode-id="3530" href="#bib0024" name="bbib0024"><span data-dcnode-id="3531" instrument_node="">ETSI,&nbsp;2020</span></a><span data-dcnode-id="3529" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3527" href="#bib0031" name="bbib0031"><span data-dcnode-id="3528" instrument_node="">Forge&nbsp;et&nbsp;al., 2019</span></a><span data-dcnode-id="3526" instrument_node="">). In contrast, the United States government's participation in international 5G standards setting regarding security standards has involved limited observer participation in recent years. In relation to 5G standards Rutkowski notes that ‘Washington's biggest cybersecurity challenge is itself. It exists in a bubble of non-stop, self-similar chat-boxes that have minimal knowledge or apparent interest in the history, the actual underlying technologies and ongoing [international] activities, or its own culpabilities in the global cybersecurity ecosystem’ (</span><a class="workspace-trigger" data-dcnode-id="3524" href="#bib0088" name="bbib0088"><span data-dcnode-id="3525" instrument_node="">Rutkowski,&nbsp;2020</span></a><span data-dcnode-id="3523" instrument_node="">, p. np).</span></p><p data-dcnode-id="3511" id="para0034"><span data-dcnode-id="3521" instrument_node="">Despite the expectation of benefits of 5G services, there is uncertainty about how consumer and citizen interests in privacy and data protection will be addressed. Much will depend upon the policies and practices that become embedded in regulatory regimes. In the United States, the aim is to ensure that the government sets ‘the path connecting cybersecurity with profitability’ for US-owned companies in the 5G market (</span><a class="workspace-trigger" data-dcnode-id="3519" href="#bib0011" name="bbib0011"><span data-dcnode-id="3520" instrument_node="">Cyberspace&nbsp;Solarium Commission,&nbsp;2020,</span></a><span data-dcnode-id="3518" instrument_node=""> p. 74) and 5G deployment is caught up in a United States – China ‘trade war’ initiated by the Trump Administration. This is justified by data security concerns, but also by a competitiveness challenge and, typically less prominently, by China's human rights record. In the United States the expectation is that ‘5G infrastructure will be an attractive target for criminals and foreign adversaries due to the large volume of data it transmits and processes as well as the support that 5G will provide to critical infrastructure’ (The White </span><a class="workspace-trigger" data-dcnode-id="3516" href="#bib0099" name="bbib0099"><span data-dcnode-id="3517" instrument_node="">House,&nbsp;2020</span></a><span data-dcnode-id="3515" instrument_node="">, p. 1). In invoking national security threats, the use of Chinese technology in 5G networks in the United States has been banned and, claiming risks to the Five Eyes security alliance, the United States government has sought to influence the technology choices of other countries.</span><a class="workspace-trigger" data-dcnode-id="3512" href="#cit_7" name="bcit_7"><sup data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">7</span></sup></a></p><p data-dcnode-id="3491" id="para0036"><span data-dcnode-id="3510" instrument_node="">The United States government has lobbied to bring its Western allies into line with its geopolitical strategy, sometimes described as ‘techno-nationalism’. For example, its national security adviser, Robert O'Brian, said, ‘they [Chinese companies] are just going to steal wholesale state secrets, whether they are the UK's nuclear secrets or secrets from MI6 or MI5’ (</span><a class="workspace-trigger" data-dcnode-id="3508" href="#bib0094" name="bbib0094"><span data-dcnode-id="3509" instrument_node="">Sevastopulo,&nbsp;2019</span></a><span data-dcnode-id="3507" instrument_node="">, p. np). In early 2020, the United Kingdom's government sought a compromise with a parliamentary decision to approve limited use of Huawei's equipment in non-core parts of its 5G network (antennas and base stations) (</span><a class="workspace-trigger" data-dcnode-id="3505" href="#bib0008" name="bbib0008"><span data-dcnode-id="3506" instrument_node="">Burgess,&nbsp;2020</span></a><span data-dcnode-id="3504" instrument_node="">). This was informed by its National Cyber Security Centre's assessment that security risks were manageable (</span><a class="workspace-trigger" data-dcnode-id="3502" href="#bib0083" name="bbib0083"><span data-dcnode-id="3503" instrument_node="">NCSC,&nbsp;2020</span></a><span data-dcnode-id="3501" instrument_node="">). The vote was controversial: former Conservative leader, Sir Iain Duncan Smith, characterized the use of Huawei equipment as being like using a Nazi firm to develop Britain's radar system in 1939 (Sparrow, </span><a class="workspace-trigger" data-dcnode-id="3499" href="#bib0098" name="bbib0098"><span data-dcnode-id="3500" instrument_node="">2020</span></a><span data-dcnode-id="3498" instrument_node="">). By July 2020 the British government had reversed its position, ordering mobile network operators to remove all Huawei equipment from their 5G (and earlier generation) networks. European-owned companies (Nokia and Ericsson) have since bid successfully to provide the necessary 5G equipment (</span><a class="workspace-trigger" data-dcnode-id="3496" href="#bib0004" name="bbib0004"><span data-dcnode-id="3497" instrument_node="">BBC,&nbsp;2020</span></a><span data-dcnode-id="3495" instrument_node="">). Other countries including Australia have decided to ban or much reduce their reliance on equipment supplied by Chinese-owned companies, while others, such as Japan, resisted pressure. China meanwhile has published a security framework calling on countries to ‘stand against ICT activities that impair or steal important data of other States' critical infrastructure, or use the data to conduct activities that undermine other States' national security and public interests’ (</span><a class="workspace-trigger" data-dcnode-id="3493" href="#bib0081" name="bbib0081"><span data-dcnode-id="3494" instrument_node="">Ministry&nbsp;of Foreign Affairs,&nbsp;2020</span></a><span data-dcnode-id="3492" instrument_node="">, p. np). Huawei and government officials maintain that Chinese technology is no riskier than that supplied by non-Chinese owned companies.</span></p><p data-dcnode-id="3474" id="para0037"><span data-dcnode-id="3490" instrument_node="">It is also claimed that the Chinese state unfairly subsidizes Huawei and other Chinese-owned companies’ development of 5G technology and that this presents a threat to the bidding prospects of companies based in other countries. Yet the United States is considering financial support for American-owned 5G equipment manufacturers and mobile service operators (</span><a class="workspace-trigger" data-dcnode-id="3488" href="#bib0097" name="bbib0097"><span data-dcnode-id="3489" instrument_node="">The Economist, 2020</span></a><span data-dcnode-id="3487" instrument_node="">) and the United Kingdom government is providing funds to support companies undertaking 5G use case trials and early network roll outs. Domestically, there is evidence that China is ramping up its deployment of surveillance technologies, e.g., facial recognition and data collection about its citizens as part of its datafication strategy (</span><a class="workspace-trigger" data-dcnode-id="3485" href="#bib0003" name="bbib0003"><span data-dcnode-id="3486" instrument_node="">Batke,&nbsp;2020</span></a><span data-dcnode-id="3484" instrument_node="">), but this does not constitute evidence that Chinese companies will be forced by the Chinese government to reveal data generated in their external markets (</span><a class="workspace-trigger" data-dcnode-id="3482" href="#bib0027" name="bbib0027"><span data-dcnode-id="3483" instrument_node="">FCC,&nbsp;2019</span></a><span data-dcnode-id="3481" instrument_node="">). In this conflicted geopolitical context, to protect against 5G-related cybersecurity risks the United States is seeking to develop its own alternative standards (</span><a class="workspace-trigger" data-dcnode-id="3479" href="#bib0088" name="bbib0088"><span data-dcnode-id="3480" instrument_node="">Rutkowski,&nbsp;2020</span></a><span data-dcnode-id="3478" instrument_node="">). As Mueller says, however, ‘one is tempted to ask what would happen if the Microsoft or Android operating systems were exposed to the same level of scrutiny as Huawei’ for security purposes (</span><a class="workspace-trigger" data-dcnode-id="3476" href="#bib0082" name="bbib0082"><span data-dcnode-id="3477" instrument_node="">Mueller,&nbsp;2019</span></a><span data-dcnode-id="3475" instrument_node="">, p. np).</span></p><p data-dcnode-id="3472" id="para0038"><span data-dcnode-id="3473" instrument_node="">In the case of 5G innovation we see the clear interdependence of political and economic power. The expectations underpinning claims and counterclaims about national security threats, 5G network vulnerabilities and state subsidies are difficult to resolve empirically because much information is subject to national security protections. There are consequences for society, nonetheless. Whatever the guiding principles that will prevail and influence 5G standards and practices, by focusing debate on China and its companies, the United States (and other countries) suggest that Western 5G implementations are safe from the point of view of national security and consumer and citizen privacy concerns. The exercise of political and economic power (through trade sanctions and bans on equipment), achieves a naturalization of the 5G architecture as an inevitable (positive) next step in technological innovation. Yet this architecture has the potential for a step shift in the capacity for commercial datafication. It presents new risks to citizen privacy and to regulatory regimes for data protection insofar as the deployment of 5G by any country will confront policy makers with a very substantial expansion in the availability of both personal and non-personal data for monetization controlled by larger and smaller companies. This outcome receives far less attention when the focus in 5G research is predominantly on market expansion prospects.</span></p></section><section data-dcnode-id="3352" id="sec0005"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3467" id="cesectitle0009"><span data-dcnode-id="3470" instrument_node="">3.2</span><span data-dcnode-id="3469" instrument_node="">. </span><span data-dcnode-id="3468" instrument_node="">Cloud innovation adjustments</span></h3><p data-dcnode-id="3443" id="para0039"><span data-dcnode-id="3466" instrument_node="">Digital services in the cloud are an increasingly debated facet of contemporary change in the ICT paradigm. Data generated online are stored and processed in cloud infrastructures offering infrastructure, platform and software ‘as-a-service’.</span><a class="workspace-trigger" data-dcnode-id="3463" href="#cit_8" name="bcit_8"><sup data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">8</span></sup></a><span data-dcnode-id="3458"><span data-dcnode-id="3462" instrument_node=""> The cloud industry is dominated by a small number of American-owned companies, the largest by revenue being Amazon </span><a class="topic-link" data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/web-based-service" title="Learn more about Web Services from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3461" instrument_node="">Web Services</span></a><span data-dcnode-id="3459" instrument_node="">, Microsoft Azure and Google Cloud. Others, including Chinese-owned companies such as Alibaba and Tencent Cloud command a sizeable market share.</span></span><a class="workspace-trigger" data-dcnode-id="3455" href="#cit_9" name="bcit_9"><sup data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">9</span></sup></a><span data-dcnode-id="3454" instrument_node=""> In the European Union there are more than 1,000 European-headquartered cloud service companies,</span><a class="workspace-trigger" data-dcnode-id="3451" href="#cit_10" name="bcit_10"><sup data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">10</span></sup></a><span data-dcnode-id="3450" instrument_node=""> with European-owned providers taking a small share of the market. The value of the data economy in the European Union 27 countries is expected to reach €829bn by 2025 or 5.8 percent of GDP and to provide many opportunities for skilled employment (</span><a class="workspace-trigger" data-dcnode-id="3448" href="#bib0020" name="bbib0020"><span data-dcnode-id="3449" instrument_node="">EC,&nbsp;2020b</span></a><span data-dcnode-id="3447" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3445" href="#bib0001" name="bbib0001"><span data-dcnode-id="3446" instrument_node="">Alemanno,&nbsp;2020</span></a><span data-dcnode-id="3444" instrument_node="">).</span></p><p data-dcnode-id="3428" id="para0043"><span data-dcnode-id="3442" instrument_node="">An addition to these services is AIaaS (AI as a Service) which enables the monetizing of data using AI-driven algorithms.</span><a class="workspace-trigger" data-dcnode-id="3439" href="#cit_11" name="bcit_11"><sup data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">11</span></sup></a><span data-dcnode-id="3438" instrument_node=""> This service is marketed as a cost-reducing on-demand service option that can scale to meet customer requirements and as providing benefits in the form of personalized health care, improved policy decision making and opportunities to boost the data economy (</span><a class="workspace-trigger" data-dcnode-id="3436" href="#bib0017" name="bbib0017"><span data-dcnode-id="3437" instrument_node="">EC,&nbsp;2017</span></a><span data-dcnode-id="3435" instrument_node="">). These services also are accompanied by acknowledged data security risks, harms associated with biased discriminatory outcomes in decision making, and threats to personal data and privacy protection (EC, </span><a class="workspace-trigger" data-dcnode-id="3433" href="#bib0019" name="bbib0019"><span data-dcnode-id="3434" instrument_node="">2020</span></a><span data-dcnode-id="3432" instrument_node="">c). In Europe, the policy goal is to promote a common European data space governed to secure both European public values and to promote a ‘data-agile’ economy (</span><a class="workspace-trigger" data-dcnode-id="3430" href="#bib0020" name="bbib0020"><span data-dcnode-id="3431" instrument_node="">EC,&nbsp;2020b</span></a><span data-dcnode-id="3429" instrument_node="">). And in this region, the prominent guiding principle or expectation is that public values such as the rights to individual privacy and to non-discriminatory treatment of consumers and citizens as a result of algorithm-based decisions will be balanced with corporate and state interests in economic value.</span></p><p data-dcnode-id="3413" id="para0045"><span data-dcnode-id="3427" instrument_node="">The European response to the foreign-owned platform supply of AIaaS confirms that there is scope to pursue alternative pathways within the ICT paradigm; that is, departures from the approaches taken by the dominant cloud service providers. The guiding principles in Europe for the provision of AIaaS stress the retention of human agency and oversight of AI/algorithm-based decision making, safety, privacy assurances and non-discrimination. Ethical principles and legislation requiring transparency, accountability and privacy protection are being developed to pursue a European alternative (</span><a class="workspace-trigger" data-dcnode-id="3425" href="#bib0021" name="bbib0021"><span data-dcnode-id="3426" instrument_node="">EC,&nbsp;2020c</span></a><span data-dcnode-id="3424" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3421" href="#cit_12" name="bcit_12"><sup data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">12</span></sup></a><span data-dcnode-id="3420" instrument_node=""> As the French Minister for the Economy put it, ‘we are not China, we are not the United States — we are European countries with our own values and our own European interests that we want to defend’ (</span><a class="workspace-trigger" data-dcnode-id="3418" href="#bib0012" name="bbib0012"><span data-dcnode-id="3419" instrument_node="">Delcker &amp; Heikkila,&nbsp;2020</span></a><span data-dcnode-id="3417" instrument_node="">, p. np). A European Data Strategy is being put in place to ensure that Europe is ‘a leading role model for a society empowered by data to make better decisions – in business and the public sector’ (</span><a class="workspace-trigger" data-dcnode-id="3415" href="#bib0020" name="bbib0020"><span data-dcnode-id="3416" instrument_node="">EC,&nbsp;2020b</span></a><span data-dcnode-id="3414" instrument_node="">, p. 1).</span></p><p data-dcnode-id="3392" id="para0047"><span data-dcnode-id="3412" instrument_node="">Privacy legislation sets the regulatory regime for AIaaS and other services provided by digital platform companies in Europe. Since the dominant cloud providers are headquartered outside the European Union, they host data beyond European boundaries. The General Data Protection Regulation (GDPR) (</span><a class="workspace-trigger" data-dcnode-id="3410" href="#bib0016" name="bbib0016"><span data-dcnode-id="3411" instrument_node="">EC,&nbsp;2016b</span></a><span data-dcnode-id="3409" instrument_node="">) sets rules for commercial transfers of personal data outside the European Union and there are efforts to establish ‘data sovereignty’ to ensure that European public values are secured. Questions may be raised about how effective this legislation is in protecting citizens’ personal data, but regarding data transfer outside the European Union, a European Court of Justice decision has confirmed that Europe's privacy legislation holds when data are transferred to another country, even for defense or state security reasons (</span><a class="workspace-trigger" data-dcnode-id="3407" href="#bib0026" name="bbib0026"><span data-dcnode-id="3408" instrument_node="">EU,&nbsp;2020b</span></a><span data-dcnode-id="3406" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3403" href="#cit_13" name="bcit_13"><sup data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">13</span></sup></a><span data-dcnode-id="3402" instrument_node=""> This legal interpretation has brought Europe into conflict with the data protections available to citizens in the United States. Under the US Cloud Act (</span><a class="workspace-trigger" data-dcnode-id="3400" href="#bib0106" name="bbib0106"><span data-dcnode-id="3401" instrument_node="">US,&nbsp;2018</span></a><span data-dcnode-id="3399" instrument_node="">), cloud provider companies can enter agreements with other countries for data access, but they are required to release data to United States authorities for criminal prosecution without informing data subjects. There is disagreement concerning what Europe's legal interpretation will mean in practice, but it is indicative of a move towards ‘data sovereignty’. The cloud companies are likely to have stronger incentives to store personal data within the European Union especially if European authorities are ‘particularly vigilant to protect and assert the rights, obligations and interests of Europeans and companies’ (</span><a class="workspace-trigger" data-dcnode-id="3397" href="#bib0020" name="bbib0020"><span data-dcnode-id="3398" instrument_node="">EC,&nbsp;2020b</span></a><span data-dcnode-id="3396" instrument_node="">: 23). These and other guiding principles are being incorporated within a new legislative package – the Digital Services Act and the Digital Markets Act (</span><a class="workspace-trigger" data-dcnode-id="3394" href="#bib0019" name="bbib0019"><span data-dcnode-id="3395" instrument_node="">EC,&nbsp;2020a</span></a><span data-dcnode-id="3393" instrument_node="">).</span></p><p data-dcnode-id="3372" id="para0049"><span data-dcnode-id="3391" instrument_node="">The perception that the European data market does not favor the growth of European-owned cloud companies due to the dominance of foreign-owned platforms, combined with ambitions for data sovereignty, have yielded an alternative cloud architecture, GAIA-X. Its development was led initially by the German and French governments to counter foreign dominance in the AIaaS market (GAIA-X, </span><a class="workspace-trigger" data-dcnode-id="3389" href="#bib0058" name="bbib0058"><span data-dcnode-id="3390" instrument_node="">2020</span></a><span data-dcnode-id="3388" instrument_node="">). It aims to create a competitive set of standards and procedures that will incentivize European companies to store their data under conditions where the user ‘can be sure that European law is applied, and the providers know about the security and the GDPR readiness of their offerings and the payment conditions’ (</span><a class="workspace-trigger" data-dcnode-id="3386" href="#bib0067" name="bbib0067"><span data-dcnode-id="3387" instrument_node="">Ksoll,&nbsp;nd, p. np</span></a><span data-dcnode-id="3385" instrument_node="">). Offering a directory of service providers, identity management standards and quality monitoring guidance, it will establish an open data infrastructure with common minimum standards for security- and privacy-by-design. GAIA-X operates as a layer above the platforms of both dominant foreign and European companies, with the former joining if they commit to GAIA-X's values and standards (</span><a class="workspace-trigger" data-dcnode-id="3383" href="#bib0002" name="bbib0002"><span data-dcnode-id="3384" instrument_node="">Amaro,&nbsp;2020</span></a><span data-dcnode-id="3382" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3380" href="#bib0005" name="bbib0005"><span data-dcnode-id="3381" instrument_node="">Bedingfield,&nbsp;2020</span></a><span data-dcnode-id="3379" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3377" href="#bib0012" name="bbib0012"><span data-dcnode-id="3378" instrument_node="">Delcker &amp; Heikkila,&nbsp;2020</span></a><span data-dcnode-id="3376" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3373" href="#cit_14" name="bcit_14"><sup data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">14</span></sup></a></p><p data-dcnode-id="3358" id="para0051"><span data-dcnode-id="3371" instrument_node="">Adjustment to the ICT paradigm in this instance involves an </span><em data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">ex ante</span></em><span data-dcnode-id="3368" instrument_node=""> data protection regime and a concerted effort to mitigate the risk of harms to consumers and citizens in relation to data privacy. Yet it does little to alter the core AIaaS guiding principle of the dominant cloud providers’ business model. This requires end-user consumers to opt out of the data economy or to use privacy protection technologies requiring relatively high levels of data literacy if they want to maximize their individual data protection. For some analysts, this approach sustains the prevailing commonsense principles that ‘perpetuate neoliberal regimes of responsibilization’ (</span><a class="workspace-trigger" data-dcnode-id="3366" href="#bib0030" name="bbib0030"><span data-dcnode-id="3367" instrument_node="">Flyverbom&nbsp;et&nbsp;al., 2017</span></a><span data-dcnode-id="3365" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3363" href="#bib0076" name="bbib0076"><span data-dcnode-id="3364" instrument_node="">Martin &amp; Nissenbaum,&nbsp;2020</span></a><span data-dcnode-id="3362" instrument_node="">, p. 193), shifting responsibility disproportionately to individuals to secure their rights. For instance, auto-deletion of users’ location data limits Google's accumulation of users’ online data, but users must change their settings manually to opt out. This allows Google to claim that it performs privacy protection assurance that meets the required standards (</span><a class="workspace-trigger" data-dcnode-id="3360" href="#bib0061" name="bbib0061"><span data-dcnode-id="3361" instrument_node="">Hern,&nbsp;2019</span></a><span data-dcnode-id="3359" instrument_node="">), even if data are not held within the European Union's cloud infrastructure.</span></p><p data-dcnode-id="3353" id="para
