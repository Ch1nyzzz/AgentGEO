 data-dcnode-id="4872"><section class="title" data-dcnode-id="4888"><h1 class="" data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">How Much Did A New Ford Cost In 1940?</span></h1></section><div class="byline" data-dcnode-id="4875"><div class="author-image" data-dcnode-id="4882"><div aria-hidden="true" class="icon-user" data-dcnode-id="4887"></div><figure class="frameme frame-loaded" data-dcnode-id="4883"><a class="theframe" data-dcnode-id="4884" data-image="//townsquare.media/site/76/files/2014/09/Jaclyn-Cupcake-Pic.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wbkr.com/author/jaclyn/" rel="author" style="background-image: url(&quot;//townsquare.media/site/76/files/2014/09/Jaclyn-Cupcake-Pic.jpg?w=300&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">Jaclyn Graves</span></figcaption></a></figure></div><div class="not-author-image-stuff" data-dcnode-id="4876"><div class="not-author-image-stuff-row" data-dcnode-id="4877"><a class="author-name" data-dcnode-id="4880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wbkr.com/author/jaclyn/" rel="author"><span data-dcnode-id="4881" instrument_node="">Jaclyn Graves</span></a><time data-dcnode-id="4878" datetime="2013-09-23 02:35:20 +0000"><span data-dcnode-id="4879" instrument_node="">Published: September 22, 2013</span></time></div></div></div><figcaption data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">WBKR</span></figcaption></div></div></div></div><div class="content-wrap" data-dcnode-id="214"><div class="social-share bignsexy" data-dcnode-id="4856"><div class="social-bar social-icons" data-dcnode-id="4857"><ul data-dcnode-id="4858"><li data-dcnode-id="4864"><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer.php%3Fu%3Dhttp%253A%252F%252Fwbkr.com%252Fhow-much-did-a-new-ford-cost-in-1940%252F%253Ftrackback%253Dfbshare_mobile" target="_blank" title="Share on Facebook"><span class="social-icon icon-facebook fb" data-dcnode-id="4866"><span class="share-title" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Share on Facebook</span></span></span></a></li><li data-dcnode-id="4859"><a data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/intent/tweet%3Ftext%3DHow%2520Much%2520Did%2520A%2520New%2520Ford%2520Cost%2520In%25201940%253F%2520http%253A%252F%252Fwbkr.com%252Fhow-much-did-a-new-ford-cost-in-1940%252F%253Ftrackback%253Dtwitter_mobile%2520%2540WBKR" target="_blank" title="Share on Twitter"><span class="social-icon icon-twitter tw" data-dcnode-id="4861"><span class="share-title" data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">Share on Twitter</span></span></span></a></li></ul></div></div><div class="content" data-dcnode-id="364"><div class="pod-content" data-dcnode-id="365"><p data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">I've been to BF Evans Ford dozens of times. Heck, I've probably even walked past this sign dozens of times before, but only this past Friday did I take the time to read it.</span></p><p data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">It was a vehicle price chart from 1940! Yes, BF Evans Ford was kickin' in 1940, ha!</span></p><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">So, how much did vehicles cost back then? Take a look and see!</span></p><div class="in-article-oop-container sharethrough-container" data-dcnode-id="4843"><div aria-label="advertisement" class="tsm-ad tsm-ad-oop" data-dcnode-id="4847"><div data-dcnode-id="4848" id="tsm-ad-in-article-oop-1"></div></div><div aria-label="advertisement" class="tsm-ad tsm-ad-1x1 tsm-ad-oop" data-dcnode-id="4844"><div data-dcnode-id="4845" id="tsm-ad-in-article-pixel-1"></div></div></div><div class="single-post-image" data-dcnode-id="4835"><figure class="img-tag frame-loaded has-sizer aligncenter" data-dcnode-id="4837" style="max-width:472px"><div class="frame-sizer" data-dcnode-id="4842" style="padding-top:133.47457627118644%"></div><div class="theframe" data-dcnode-id="4840" data-image="https://townsquare.media/site/76/files/2013/09/013-472x630.jpg" rel=""><img alt="WBKR" data-dcnode-id="4841" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//townsquare.media/site/76/files/2013/09/013-472x630.jpg%3Fw%3D472%26h%3D630%26q%3D75&amp;raw"></div><figcaption data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">WBKR</span></figcaption></figure><div data-dcnode-id="4836"></div></div><div class="in-view-sentinel-wrapper" data-dcnode-id="2173"><div class="in-view-sentinel in-view-sentinel-top" data-cbid="0" data-dcnode-id="4834"></div><div class="in-view-sentinel in-view-sentinel-bottom" data-cbid="1" data-dcnode-id="4833"></div><div class="photogallery-wrapper blog-photogallery" data-dcnode-id="2174"><h2 class="photogallery-title" data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">KEEP READING: What were the most popular baby names from the past 100 years?</span></h2><div class="photogallery-container" data-dcnode-id="2175" id="photogallery-76-255581-0" style="padding-top: 0px; padding-bottom: 0px;"><div class="photogallery-item" data-dcnode-id="4807" data-index="0"><figure class="frameme frame-loaded" data-dcnode-id="4828"><div class="theframe" data-dcnode-id="4829" data-image="//townsquare.media/site/341/files/2020/05/03.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/03.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4830"></figcaption></div></figure><div class="item-meta" data-dcnode-id="4808"><p class="caption" data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">Dasha Muller // Shutterstock</span></p><span data-dcnode-id="4825" instrument_node=""></span><div class="item-description" data-dcnode-id="4809"><span data-dcnode-id="4824" instrument_node="">Certain name trends have withstood the test of time. Stacker has combed through </span><a data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/oact/babynames/index.html" target="_blank"><span data-dcnode-id="4823" instrument_node="">Social Security Administration</span></a><span data-dcnode-id="4821" instrument_node=""> data, examining births from 1918 to 2017, and the corresponding names given to newborns. All names are from Social Security card applications for births within the U.S., and the top 50 for each gender are ranked according to their popularity within the total births over the past 100 years.

Read on to find out which names qualify as the most popular. Spoiler alert: </span><a data-dcnode-id="4819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//content.time.com/time/magazine/article/0%2C9171%2C915817%2C00.html" target="_blank"><span data-dcnode-id="4820" instrument_node="">1069 not included</span></a><span data-dcnode-id="4818" instrument_node="">.

</span><b data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">By:</span></b><span data-dcnode-id="4815" instrument_node=""> Sophia Crisafulli
</span><b data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">From:</span></b><span data-dcnode-id="4812" instrument_node=""> </span><a data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/2069/most-popular-baby-names-past-100-years" target="_blank"><span data-dcnode-id="4811" instrument_node="">Most popular baby names in the past 100 years</span></a></div></div></div><div class="photogallery-item" data-dcnode-id="4781" data-index="1"><figure class="frameme frame-loaded" data-dcnode-id="4803"><div class="theframe" data-dcnode-id="4804" data-image="//townsquare.media/site/341/files/2020/05/114.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/114.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">#50. Jerry (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4782"><p class="caption" data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">STANZI // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">#50. Jerry (boys)</span></h2><div class="item-description" data-dcnode-id="4783"><p data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">Total babies born in last 100 years: 603,690</span></p><p data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">Rank in 2017: #556</span></p><p data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">Total babies born in 2017: 488</span></p><p data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="4786"><span data-dcnode-id="4790" instrument_node="">Perhaps the multitude of famous Jerrys, from Seinfeld to </span><a data-dcnode-id="4788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hypebeast.com/2016/8/tom-and-jerry-history" target="_blank"><span data-dcnode-id="4789" instrument_node="">a certain mischievous mouse</span></a><span data-dcnode-id="4787" instrument_node="">, have contributed to the popularity of this beloved name. Jerry has somewhat fallen from grace—there were more than 17,000 baby Jerrys in 1943, and only 488 in 2017. However, hope of a comeback is never fully lost.</span></p><p data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4755" data-index="2"><figure class="frameme frame-loaded" data-dcnode-id="4777"><div class="theframe" data-dcnode-id="4778" data-image="//townsquare.media/site/341/files/2020/05/214.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/214.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">#50. Emma (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4756"><p class="caption" data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">Oleggg // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">#50. Emma (girls)</span></h2><div class="item-description" data-dcnode-id="4757"><p data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">Total babies born in last 100 years: 544,181</span></p><p data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">Rank in 2017: #1</span></p><p data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">Total babies born in 2017: 19,738</span></p><p data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">Peak year: 2003</span></p><p data-dcnode-id="4760"><span data-dcnode-id="4764" instrument_node="">Though the origin of the name Emma dates back earlier than the 18th century, the rise of its popularity may be connected to the </span><a data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/emma" target="_blank"><span data-dcnode-id="4763" instrument_node="">1709 Matthew Prior poem</span></a><span data-dcnode-id="4761" instrument_node="">, “Henry and Emma." Of course, Jane Austen's “Emma," published in 1815, probably didn't hurt either. Both of these literary works helped bring the name into a more public light, and in 2017, Emma ranked as the #1 name choice for girls.</span></p><p data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4754"></div><div class="photogallery-item" data-dcnode-id="4728" data-index="4"><figure class="frameme frame-loaded" data-dcnode-id="4750"><div class="theframe" data-dcnode-id="4751" data-image="//townsquare.media/site/341/files/2020/05/315.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/315.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">#49. Dennis (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4729"><p class="caption" data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Anna Grigorjeva // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4746"><span data-dcnode-id="4747" instrument_node="">#49. Dennis (boys)</span></h2><div class="item-description" data-dcnode-id="4730"><p data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">Total babies born in last 100 years: 611,483</span></p><p data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Rank in 2017: #544</span></p><p data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">Total babies born in 2017: 510</span></p><p data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">Peak year: 1952</span></p><p data-dcnode-id="4733"><span data-dcnode-id="4737" instrument_node="">Modern day Dennises have </span><a data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancestry.com/name-origin%3Fsurname%3Ddennis" target="_blank"><span data-dcnode-id="4736" instrument_node="">a vast legacy</span></a><span data-dcnode-id="4734" instrument_node="">. The name's Greek origin is “Dionysios," which refers to a follower of the god of wine and revelry, Dionysos. The name is also connected to St. Denis, a third century martyr. From martyrdom to debaucherous revelry, Dennis has it covered.</span></p><p data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4705" data-index="5"><figure class="frameme frame-loaded" data-dcnode-id="4724"><div class="theframe" data-dcnode-id="4725" data-image="//townsquare.media/site/341/files/2020/05/416.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/416.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">#49. Carolyn (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4706"><p class="caption" data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">fufu10 // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">#49. Carolyn (girls)</span></h2><div class="item-description" data-dcnode-id="4707"><p data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">Total babies born in last 100 years: 544,283</span></p><p data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">Rank in 2017: #841</span></p><p data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">Total babies born in 2017: 321</span></p><p data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">The popularity of Carolyn steadily increased throughout the 1930s, rocketing from the #41 spot in girl baby names in 1933, to #10 in 1942. From there, however, its cache began to decrease once again. Carolyn was ranked as 841st in 2017, and only 321 Carolyns were born into the United States last year.</span></p><p data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4680" data-index="6"><figure class="frameme frame-loaded" data-dcnode-id="4701"><div class="theframe" data-dcnode-id="4702" data-image="//townsquare.media/site/341/files/2020/05/510.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/510.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">#48. Jack (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4681"><p class="caption" data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">Minnikova Mariia // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">#48. Jack (boys)</span></h2><div class="item-description" data-dcnode-id="4682"><p data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">Total babies born in last 100 years: 635,553</span></p><p data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">Rank in 2017: #35</span></p><p data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">Total babies born in 2017: 8,419</span></p><p data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">Peak year: 1927</span></p><p data-dcnode-id="4685"><a data-dcnode-id="4687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/lifeandstyle/2008/dec/20/boys-names-jack-origins" target="_blank"><span data-dcnode-id="4688" instrument_node="">Historically and in folklore</span></a><span data-dcnode-id="4686" instrument_node="">, Jack is often used to represent a charming, clever, if not slightly off-kilter character—there's Jack Frost, Jack of “Jack and Jill," Jack with his infamous beanstalk, and even Captain Jack Sparrow. The name tends to represent the success of the common man, although of course has been lent to some darker figures, like Jack the Ripper, as well.</span></p><p data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4679"></div><div class="photogallery-item" data-dcnode-id="4650" data-index="8"><figure class="frameme frame-loaded" data-dcnode-id="4675"><div class="theframe" data-dcnode-id="4676" data-image="//townsquare.media/site/341/files/2020/05/610.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/610.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">#48. Janet (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4651"><p class="caption" data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">Zdenka Darula // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">#48. Janet (girls)</span></h2><div class="item-description" data-dcnode-id="4652"><p data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">Total babies born in last 100 years: 544,939</span></p><p data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">Rank in 2017: not in top 1000</span></p><p data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">Peak year: 1954</span></p><p data-dcnode-id="4655"><span data-dcnode-id="4662" instrument_node="">The name Janet was originally inspired by a shorter version of the name Jane, which itself comes from </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/baby-name/girl/jane" target="_blank"><span data-dcnode-id="4661" instrument_node="">the French for Jehanne.</span></a><span data-dcnode-id="4659" instrument_node=""> Although data for new baby Janets are not available for the past few years, perhaps the popularity of a certain Janet (</span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/2018/9/15/17857998/janet-the-good-place-darcy-carden-interview-podcast" target="_blank"><span data-dcnode-id="4658" instrument_node="">both good and bad</span></a><span data-dcnode-id="4656" instrument_node="">) will help bring this name back into fashion.</span></p><p data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4624" data-index="9"><figure class="frameme frame-loaded" data-dcnode-id="4646"><div class="theframe" data-dcnode-id="4647" data-image="//townsquare.media/site/341/files/2020/05/710.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/05/710.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">#47. Alexander (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4625"><p class="caption" data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Anna Grigorjeva // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">#47. Alexander (boys)</span></h2><div class="item-description" data-dcnode-id="4626"><p data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">Total babies born in last 100 years: 646,339</span></p><p data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">Rank in 2017: #13</span></p><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">Total babies born in 2017: 12,467</span></p><p data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">Peak year: 1993</span></p><p data-dcnode-id="4629"><span data-dcnode-id="4633" instrument_node="">Early popularity of Alexander can almost certainly be traced back to </span><a data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/ancient-history/alexander-the-great%23section_1" target="_blank"><span data-dcnode-id="4632" instrument_node="">Alexander the Great,</span></a><span data-dcnode-id="4630" instrument_node=""> the Macedonian ruler who established one of the largest empires of the ancient world. Clearly the name remains beloved and for several years throughout the 1990s, nearly one percent of male babies took the name Alexander. In 2017, the name did not crack the top 10, but was still a common enough choice.</span></p><p data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4595" data-index="10"><figure class="frameme" data-cbid="118" data-dcnode-id="4620"><div class="theframe" data-dcnode-id="4621" data-image="//townsquare.media/site/341/files/2020/05/810.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">#47. Rachel (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4596"><p class="caption" data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">photoDiod // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">#47. Rachel (girls)</span></h2><div class="item-description" data-dcnode-id="4597"><p data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">Total babies born in last 100 years: 546,090</span></p><p data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Rank in 2017: #195</span></p><p data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">Total babies born in 2017: 1,591</span></p><p data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Peak year: 1985</span></p><p data-dcnode-id="4600"><span data-dcnode-id="4607" instrument_node="">A name is truly part of the cultural zeitgeist when it's linked to a </span><a data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hellogiggles.com/news/what-is-the-rachel/" target="_blank"><span data-dcnode-id="4606" instrument_node="">particular hairstyle</span></a><span data-dcnode-id="4604" instrument_node="">, but the name Rachel far out-dates Jennifer Aniston's lovely locks on “Friends." Rachel was </span><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancestry.com/name-origin%3Fsurname%3Drachel" target="_blank"><span data-dcnode-id="4603" instrument_node="">a biblical figure</span></a><span data-dcnode-id="4601" instrument_node="">, appearing in Genesis&nbsp;as the wife of Jacob, and mother of Joseph and Benjamin.</span></p><p data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4594"></div><div class="photogallery-item" data-dcnode-id="4568" data-index="12"><figure class="frameme" data-cbid="119" data-dcnode-id="4590"><div class="theframe" data-dcnode-id="4591" data-image="//townsquare.media/site/341/files/2020/05/910.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">#46. Patrick (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4569"><p class="caption" data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">Oksana Kuzmina // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">#46. Patrick (boys)</span></h2><div class="item-description" data-dcnode-id="4570"><p data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">Total babies born in last 100 years: 661,324</span></p><p data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">Rank in 2017: #171</span></p><p data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Total babies born in 2017: 2,283</span></p><p data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">Peak year: 1964</span></p><p data-dcnode-id="4573"><span data-dcnode-id="4577" instrument_node="">While St. Patrick's Day for many in the United States is primarily an excuse to drink, drink, and then drink some more, Saint Patrick himself was vastly responsible for both the Christianization of Ireland, and bringing the name Patrick into vogue. However, the name was not used much on the Emerald Isle before the 17th century, as it was seen “</span><a data-dcnode-id="4575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/patrick" target="_blank"><span data-dcnode-id="4576" instrument_node="">too sacred for everyday use.</span></a><span data-dcnode-id="4574" instrument_node="">”</span></p><p data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4542" data-index="13"><figure class="frameme" data-cbid="120" data-dcnode-id="4564"><div class="theframe" data-dcnode-id="4565" data-image="//townsquare.media/site/341/files/2020/05/103.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">#46. Debra (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4543"><p class="caption" data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">Monkey Business Images // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">#46. Debra (girls)</span></h2><div class="item-description" data-dcnode-id="4544"><p data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Total babies born in last 100 years: 548,265</span></p><p data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">Rank in 2017: not in top 1000</span></p><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Peak year: 1955</span></p><p data-dcnode-id="4547"><span data-dcnode-id="4551" instrument_node="">Debra, a variant of the name Deborah, </span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/deborah" target="_blank"><span data-dcnode-id="4550" instrument_node="">has strong Jewish origins</span></a><span data-dcnode-id="4548" instrument_node="">. In Hebrew, “devorah" translates to “bee," and Deborah is also the name of a Book of Judges figure in the Old Testament, who leads the Israelites to safety away from the Canaanites. Deborah was later adopted by the English.</span></p><p data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4516" data-index="14"><figure class="frameme" data-cbid="121" data-dcnode-id="4538"><div class="theframe" data-dcnode-id="4539" data-image="//townsquare.media/site/341/files/2020/05/115.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">#45. Samuel (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4517"><p class="caption" data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">FamVeld // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">#45. Samuel (boys)</span></h2><div class="item-description" data-dcnode-id="4518"><p data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">Total babies born in last 100 years: 699,786</span></p><p data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Rank in 2017: #21</span></p><p data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">Total babies born in 2017: 10,323</span></p><p data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Peak year: 2001</span></p><p data-dcnode-id="4521"><span data-dcnode-id="4525" instrument_node="">Samuel, a name with extensive historical origins, has consistently ranked in the 21st century as one of the most favored name choices for baby boys. Samuel is&nbsp;</span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britishbabynames.com/blog/2013/10/samuel.html" target="_blank"><span data-dcnode-id="4524" instrument_node="">originally derived</span></a><span data-dcnode-id="4522" instrument_node=""> from the Hebrew name Shemuel. Important historical figures bearing this name include Samuel the Prophet, a revered figure in Judaism.</span></p><p data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4515"></div><div class="photogallery-item" data-dcnode-id="4489" data-index="16"><figure class="frameme" data-cbid="122" data-dcnode-id="4511"><div class="theframe" data-dcnode-id="4512" data-image="//townsquare.media/site/341/files/2020/05/123.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">#45. Virginia (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4490"><p class="caption" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Oksana Kuzmina // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">#45. Virginia (girls)</span></h2><div class="item-description" data-dcnode-id="4491"><p data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Total babies born in last 100 years: 562,766</span></p><p data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">Rank in 2017: #514</span></p><p data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Total babies born in 2017: 608</span></p><p data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Peak year: 1922</span></p><p data-dcnode-id="4494"><span data-dcnode-id="4498" instrument_node="">Perhaps the popularity of the name Virginia is linked to the state's </span><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britishbabynames.com/blog/2013/10/samuel.html" target="_blank"><span data-dcnode-id="4497" instrument_node="">crucial role in American history</span></a><span data-dcnode-id="4495" instrument_node="">. When the English began to colonize North America in the late 16th century, Virginia covered more area than the state's modern boundaries, and was named such in honor of “The Virgin Queen," Elizabeth I of England.</span></p><p data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4464" data-index="17"><figure class="frameme" data-cbid="123" data-dcnode-id="4485"><div class="theframe" data-dcnode-id="4486" data-image="//townsquare.media/site/341/files/2020/05/133.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">#44. Raymond (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4465"><p class="caption" data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">Voiceboks // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">#44. Raymond (boys)</span></h2><div class="item-description" data-dcnode-id="4466"><p data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">Total babies born in last 100 years: 700,610</span></p><p data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Rank in 2017: #293</span></p><p data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">Total babies born in 2017: 1,192</span></p><p data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">Peak year: 1924</span></p><p data-dcnode-id="4469"><span data-dcnode-id="4472" instrument_node="">Though there are still new Raymonds being brought into the U.S. (1,192 of them in 2017, to be precise), the name reached its height of popularity several decades ago. It was the 15th most popular baby name in 1918, and held a ranking close to that for several years. By 1949, Raymond was ranked #30 for boy's names, and generally continued to fall from there. Things aren't all bad, though, considering that </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0115167/" target="_blank"><span data-dcnode-id="4471" instrument_node="">“Everybody Loves Raymond.”</span></a></p><p data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4438" data-index="18"><figure class="frameme" data-cbid="124" data-dcnode-id="4460"><div class="theframe" data-dcnode-id="4461" data-image="//townsquare.media/site/341/files/2020/05/143.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">#44. Catherine (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4439"><p class="caption" data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">Coy_Creek // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">#44. Catherine (girls)</span></h2><div class="item-description" data-dcnode-id="4440"><p data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Total babies born in last 100 years: 564,774</span></p><p data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Rank in 2017: #198</span></p><p data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Total babies born in 2017: 1,573</span></p><p data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">Peak year: 1956</span></p><p data-dcnode-id="4443"><span data-dcnode-id="4447" instrument_node="">Catherine has lost popularity, by a slim margin, to a very similar looking cousin—Katherine, which is ranked #41 on this very list. However, Catherines everywhere can take solace in the fact that they have more than one legendary figure among their group—for example, Catherine of Aragon and </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/catherine-ii-9241622" target="_blank"><span data-dcnode-id="4446" instrument_node="">Catherine the Great</span></a><span data-dcnode-id="4444" instrument_node="">. While the latter Russian empress is often remembered for her romantic activity, she also organized the coup that brought her to power.</span></p><p data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4437"></div><div class="photogallery-item" data-dcnode-id="4408" data-index="20"><figure class="frameme" data-cbid="125" data-dcnode-id="4433"><div class="theframe" data-dcnode-id="4434" data-image="//townsquare.media/site/341/files/2020/05/153.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">#43. Gregory (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4409"><p class="caption" data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">#43. Gregory (boys)</span></h2><div class="item-description" data-dcnode-id="4410"><p data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">Total babies born in last 100 years: 705,726</span></p><p data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">Rank in 2017: #375</span></p><p data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">Total babies born in 2017: 881</span></p><p data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">Peak year: 1962</span></p><p data-dcnode-id="4413"><span data-dcnode-id="4420" instrument_node="">Gregory stems back to Greek roots, with the name itself </span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottishboysnames.co.uk/gregory/" target="_blank"><span data-dcnode-id="4419" instrument_node="">indicating watchfulness.</span></a><span data-dcnode-id="4417" instrument_node=""> The name has also belonged to many a pope, beginning with Gregory I, who was commonly known as Saint Gregory the Great and is considered a</span><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/St-Gregory-the-Great" target="_blank"><span data-dcnode-id="4416" instrument_node="">&nbsp; ounding figure of the medieval papacy</span></a><span data-dcnode-id="4414" instrument_node="">. While Gregs are not necessarily near the top of the heap today (only ranking #375 in 2017), the name's historical popularity bodes well for future baby boys.</span></p><p data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4382" data-index="21"><figure class="frameme" data-cbid="126" data-dcnode-id="4404"><div class="theframe" data-dcnode-id="4405" data-image="//townsquare.media/site/341/files/2020/05/163.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">#43. Christine (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4383"><p class="caption" data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">FamVeld // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">#43. Christine (girls)</span></h2><div class="item-description" data-dcnode-id="4384"><p data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Total babies born in last 100 years: 566,855</span></p><p data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">Rank in 2017: #786</span></p><p data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">Total babies born in 2017: 346</span></p><p data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Peak year: 1952</span></p><p data-dcnode-id="4387"><span data-dcnode-id="4391" instrument_node="">It likely comes as no surprise that Christine comes from Christian origins. The name's meaning, with Latin roots, is commonly understood as “</span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.babycenter.com/baby-names-christine-1010.htm" target="_blank"><span data-dcnode-id="4390" instrument_node="">follower of Christ</span></a><span data-dcnode-id="4388" instrument_node="">." The popularity of this name was highest in 1952, but has fallen since then—in fact, while Christine ranked as #786 for girls names in 2017, the variation Christina landed much higher as #424.</span></p><p data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4356" data-index="22"><figure class="frameme" data-cbid="127" data-dcnode-id="4378"><div class="theframe" data-dcnode-id="4379" data-image="//townsquare.media/site/341/files/2020/05/173.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">#42. Benjamin (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4357"><p class="caption" data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">#42. Benjamin (boys)</span></h2><div class="item-description" data-dcnode-id="4358"><p data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Total babies born in last 100 years: 708,339</span></p><p data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Rank in 2017: #6</span></p><p data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Total babies born in 2017: 13,733</span></p><p data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Peak year: 1989</span></p><p data-dcnode-id="4361"><span data-dcnode-id="4365" instrument_node="">Benajamins have made a strong showing in recent years, increasing in popularity from the #22 most popular baby name in 2010, to #6 in 2017. Perhaps this is due to the multitude of potential nicknames—Ben, Benny, Benji. However, the name also has moribund history. In the Bible, Benjamin's mother Rachel </span><a data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Rachel-biblical-figure" target="_blank"><span data-dcnode-id="4364" instrument_node="">died during childbirth</span></a><span data-dcnode-id="4362" instrument_node="">.</span></p><p data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4355"></div><div class="photogallery-item" data-dcnode-id="4326" data-index="24"><figure class="frameme" data-cbid="128" data-dcnode-id="4351"><div class="theframe" data-dcnode-id="4352" data-image="//townsquare.media/site/341/files/2020/05/183.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">#42. Samantha (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4327"><p class="caption" data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">Flashon Studio // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">#42. Samantha (girls)</span></h2><div class="item-description" data-dcnode-id="4328"><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">Total babies born in last 100 years: 568,619</span></p><p data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">Rank in 2017: #54</span></p><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Total babies born in 2017: 4,303</span></p><p data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Peak year: 1990</span></p><p data-dcnode-id="4331"><span data-dcnode-id="4338" instrument_node="">From 2000 to 2017, Samantha fell from #7 to #54 on the list of most popular girl baby names in the U.S. Could this have something to do with the fact that during that time, not one, but two famous Samanthas retired from the spotlight? Samantha of immense American Girl Doll fame was taken </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/business/currency/our-dolls-ourselves" target="_blank"><span data-dcnode-id="4337" instrument_node="">out of circulation in 2009,</span></a><span data-dcnode-id="4335" instrument_node=""> and “Sex and the City" character </span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0159206/" target="_blank"><span data-dcnode-id="4334" instrument_node="">Samantha Jones</span></a><span data-dcnode-id="4332" instrument_node=""> left television screens in 2004.</span></p><p data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4300" data-index="25"><figure class="frameme" data-cbid="129" data-dcnode-id="4322"><div class="theframe" data-dcnode-id="4323" data-image="//townsquare.media/site/341/files/2020/05/193.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">#41. Frank (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4301"><p class="caption" data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">#41. Frank (boys)</span></h2><div class="item-description" data-dcnode-id="4302"><p data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Total babies born in last 100 years: 738,280</span></p><p data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Rank in 2017: #373</span></p><p data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Total babies born in 2017: 881</span></p><p data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Peak year: 1918</span></p><p data-dcnode-id="4305"><span data-dcnode-id="4309" instrument_node="">Frank most certainly falls into the category of simple, classic boys names that once experienced a boom but have taken a dive in popularity in recent years. However, there's a chance that Frank could come back in a slightly different form. According to </span><a data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.today.com/parents/these-are-most-popular-baby-names-coming-2018-t120116https%3A//www.today.com/parents/these-are-most-popular-baby-names-coming-2018-t120116" target="_blank"><span data-dcnode-id="4308" instrument_node="">Today</span></a><span data-dcnode-id="4306" instrument_node="">, the newest naming trend for girls involves using boyish nicknames—for instance, Frankie.</span></p><p data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4275" data-index="26"><figure class="frameme" data-cbid="130" data-dcnode-id="4296"><div class="theframe" data-dcnode-id="4297" data-image="//townsquare.media/site/341/files/2020/05/203.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">#41. Katherine (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4276"><p class="caption" data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">Blend Images // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">#41. Katherine (girls)</span></h2><div class="item-description" data-dcnode-id="4277"><p data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">Total babies born in last 100 years: 579,712</span></p><p data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Rank in 2017: #105</span></p><p data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">Total babies born in 2017: 2,833</span></p><p data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">Peak year: 1990</span></p><p data-dcnode-id="4280"><span data-dcnode-id="4283" instrument_node="">Beating out her sister Catherine, the K-version just missed making the top 100 in 2017. However, even Katherines with a “K" are experiencing some hard times—the name dropped 70 spots in popularity from 2010. Important Katherines, both real and otherwise, include Katherine of</span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.folger.edu/taming-of-the-shrew" target="_blank"><span data-dcnode-id="4282" instrument_node=""> Shakespeare's “Taming of the Shrew.”</span></a></p><p data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4274"></div><div class="photogallery-item" data-dcnode-id="4248" data-index="28"><figure class="frameme" data-cbid="131" data-dcnode-id="4270"><div class="theframe" data-dcnode-id="4271" data-image="//townsquare.media/site/341/files/2020/05/215.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">#40. Brandon (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4249"><p class="caption" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">#40. Brandon (boys)</span></h2><div class="item-description" data-dcnode-id="4250"><p data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">Total babies born in last 100 years: 753,123</span></p><p data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">Rank in 2017: #114</span></p><p data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Total babies born in 2017: 3,474</span></p><p data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Peak year: 1992</span></p><p data-dcnode-id="4253"><span data-dcnode-id="4257" instrument_node="">Throughout England, Brandon is the name of several small towns and parishes. There are Brandons located in Warwickshire, Suffolk, and elsewhere, making it a popular choice for not just humans, but geographic locations. The meaning, derived from the Old English “brom"and “dun,"&nbsp;</span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3DtXucAQAAQBAJ%26pg%3DPA72%26lpg%3DPA72%26dq%3Dbrom%2Bdun%26source%3Dbl%26ots%3DD2mea1xtDK%26sig%3DWcYdznhOIb5FEAaT-NzaCuwIW2Y%26hl%3Den%26sa%3DX%26ved%3D2ahUKEwi73eHE7sLeAhVDZN8KHTq9ApoQ6AEwB3oECAYQAQ%23v%3Donepage%26q%3Dbrom%2520dun%26f%3Dfalse" target="_blank"><span data-dcnode-id="4256" instrument_node="">translates closely to</span></a><span data-dcnode-id="4254" instrument_node=""> “the hill where broom grows.”</span></p><p data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4225" data-index="29"><figure class="frameme" data-cbid="132" data-dcnode-id="4244"><div class="theframe" data-dcnode-id="4245" data-image="//townsquare.media/site/341/files/2020/05/223.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">#40. Nicole (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4226"><p class="caption" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Samuel Borges Photography // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">#40. Nicole (girls)</span></h2><div class="item-description" data-dcnode-id="4227"><p data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">Total babies born in last 100 years: 585,381</span></p><p data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Rank in 2017: #183</span></p><p data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">Total babies born in 2017: 1,654</span></p><p data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Peak year: 1985</span></p><p data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Like neon spandex and big, permed hair, Nicole goes hand-in-hand with the 1980s. The name remained close to the top 10 most popular girl names from 1978 to 1988. During the absolute peak of Nicole mania, more than 1% of female babies born were given the name.</span></p><p data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4199" data-index="30"><figure class="frameme" data-cbid="133" data-dcnode-id="4221"><div class="theframe" data-dcnode-id="4222" data-image="//townsquare.media/site/341/files/2020/05/233.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">#39. Scott (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4200"><p class="caption" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">#39. Scott (boys)</span></h2><div class="item-description" data-dcnode-id="4201"><p data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">Total babies born in last 100 years: 768,971</span></p><p data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Rank in 2017: #484</span></p><p data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">Total babies born in 2017: 602</span></p><p data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">Peak year: 1971</span></p><p data-dcnode-id="4204"><span data-dcnode-id="4208" instrument_node="">The name Scott, unsurprisingly, has a centuries long Scottish history. </span><a data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surnamedb.com/Surname/scott" target="_blank"><span data-dcnode-id="4207" instrument_node="">Early records of Scott </span></a><span data-dcnode-id="4205" instrument_node="">as a last name date back to the 12th century in Roxburgh, Scotland. However, there is also evidence of the Old English word “scotti" denoting Gaels whose conquered land (in the fifth century and earlier) later became Scotland.</span></p><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4198"></div><div class="photogallery-item" data-dcnode-id="4173" data-index="32"><figure class="frameme" data-cbid="134" data-dcnode-id="4194"><div class="theframe" data-dcnode-id="4195" data-image="//townsquare.media/site/341/files/2020/05/243.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">#39. Pamela (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4174"><p class="caption" data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">In Green // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">#39. Pamela (girls)</span></h2><div class="item-description" data-dcnode-id="4175"><p data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Total babies born in last 100 years: 592,689</span></p><p data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">Rank in 2017: not in top 1000</span></p><p data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Peak year: 1954</span></p><p data-dcnode-id="4178"><span data-dcnode-id="4181" instrument_node="">The U.S. Social Security website's records of Pamela stop in 2011, during which there were only 266 little Pams brought into the world. However, during the 1950s, Pamela was quite a popular name. One of the earliest usages of the name occurred in the 16th century, in </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britishbabynames.com/blog/2016/03/pamela.html" target="_blank"><span data-dcnode-id="4180" instrument_node="">Sir Philip Sidney's “The Countess of Pembroke's Arcadia.”</span></a></p><p data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4150" data-index="33"><figure class="frameme" data-cbid="135" data-dcnode-id="4169"><div class="theframe" data-dcnode-id="4170" data-image="//townsquare.media/site/341/files/2020/05/253.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">#38. Justin (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4151"><p class="caption" data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">#38. Justin (boys)</span></h2><div class="item-description" data-dcnode-id="4152"><p data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">Total babies born in last 100 years: 772,077</span></p><p data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">Rank in 2017: #126</span></p><p data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Total babies born in 2017: 3,121</span></p><p data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Peak year: 1988</span></p><p data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Between 1971 and 1972, the name Justin saw a massive increase in popularity amongst baby boys, climbing from #103 to #60. Though the best year for Justin was 1988, in which it was the 17th most popular boys name, Justin was solidly in the top 100 boys names every single year from 1972 to 2014. Of course, two of the most prominent Justins today were born within this time frame—Justin Bieber, in 1994, and Justin Timberlake, in 1981.</span></p><p data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4120" data-index="34"><figure class="frameme" data-cbid="136" data-dcnode-id="4146"><div class="theframe" data-dcnode-id="4147" data-image="//townsquare.media/site/341/files/2020/05/263.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">#38. Brenda (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4121"><p class="caption" data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Monkey Business Images // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">#38. Brenda (girls)</span></h2><div class="item-description" data-dcnode-id="4122"><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Total babies born in last 100 years: 606,252</span></p><p data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">Rank in 2017: #915</span></p><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">Total babies born in 2017: 290</span></p><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">Peak year: 1957</span></p><p data-dcnode-id="4126"><span data-dcnode-id="4133" instrument_node="">Brenda saw&nbsp;</span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/cgi-bin/babyname.cgi" target="_blank"><span data-dcnode-id="4132" instrument_node="">sustained popularity</span></a><span data-dcnode-id="4130" instrument_node="">&nbsp;throughout the mid-20th century, when the name skyrocketed from #42 to #11 among the most popular baby names for girls. Though the exact origin of this name is up for speculation, some guess it may be linked to the </span><a data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/brenda" target="_blank"><span data-dcnode-id="4129" instrument_node="">Old Norse word “brandr,”</span></a><span data-dcnode-id="4127" instrument_node="">&nbsp;meaning “sword.”</span></p><p data-dcnode-id="4123"><br data-dcnode-id="4125"><span data-dcnode-id="4124" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4119"></div><div class="photogallery-item" data-dcnode-id="4093" data-index="36"><figure class="frameme" data-cbid="137" data-dcnode-id="4115"><div class="theframe" data-dcnode-id="4116" data-image="//townsquare.media/site/341/files/2020/05/273.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">#37. Larry (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4094"><p class="caption" data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">#37. Larry (boys)</span></h2><div class="item-description" data-dcnode-id="4095"><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Total babies born in last 100 years: 802,463</span></p><p data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Rank in 2017: #629</span></p><p data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Total babies born in 2017: 411</span></p><p data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="4098"><span data-dcnode-id="4102" instrument_node="">Larry was originally shorthand for Lawrence or Laurence. Larry reached its height of popularity in the 1940s, and was most popular in 1947. Judging by the prevalence of the expression “</span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phrases.org.uk/meanings/as-happy-as-larry.html" target="_blank"><span data-dcnode-id="4101" instrument_node="">as happy as Larry</span></a><span data-dcnode-id="4099" instrument_node="">," the 411 Larry's born in 2017 should be some pretty easy-going guys.</span></p><p data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4067" data-index="37"><figure class="frameme" data-cbid="138" data-dcnode-id="4089"><div class="theframe" data-dcnode-id="4090" data-image="//townsquare.media/site/341/files/2020/05/283.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">#37. Ruth (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4068"><p class="caption" data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">Alena Ozerova // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">#37. Ruth (girls)</span></h2><div class="item-description" data-dcnode-id="4069"><p data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Total babies born in last 100 years: 610,771</span></p><p data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">Rank in 2017: #265</span></p><p data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">Total babies born in 2017: 1,194</span></p><p data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Peak year: 1920</span></p><p data-dcnode-id="4070"><span data-dcnode-id="4076" instrument_node="">Ruth has one of the earliest peak years of any name on this list, having reached its apex in 1920. However, there have </span><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/baby-name-trends-next-year-2017-12" target="_blank"><span data-dcnode-id="4075" instrument_node="">apparently been studies</span></a><span data-dcnode-id="4073" instrument_node=""> indicating that a serious female name, such as Ruth, is linked with higher chances of attending a prestigious university. Maybe this means there are more baby Ruths to come, and not just in candy bar form.</span><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="4041" data-index="38"><figure class="frameme" data-cbid="139" data-dcnode-id="4063"><div class="theframe" data-dcnode-id="4064" data-image="//townsquare.media/site/341/files/2020/05/293.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">#36. Jonathan (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4042"><p class="caption" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">#36. Jonathan (boys)</span></h2><div class="item-description" data-dcnode-id="4043"><p data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Total babies born in last 100 years: 832,815</span></p><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Rank in 2017: #55</span></p><p data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Total babies born in 2017: 6,471</span></p><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Peak year: 1988</span></p><p data-dcnode-id="4046"><span data-dcnode-id="4050" instrument_node="">Jonathans have maintained their place in the top 100 most popular boys names every year from 1962 to 2017, coming in at #55 last year. </span><a data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/jonathan" target="_blank"><span data-dcnode-id="4049" instrument_node="">Originally derived from a Hebrew name</span></a><span data-dcnode-id="4047" instrument_node=""> pronounced “Yonatan," meaning “Yahweh has given," Jonathan is recognizable from the Old Testament.</span></p><p data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="4040"></div><div class="photogallery-item" data-dcnode-id="4014" data-index="40"><figure class="frameme" data-cbid="140" data-dcnode-id="4036"><div class="theframe" data-dcnode-id="4037" data-image="//townsquare.media/site/341/files/2020/05/303.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">#36. Anna (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="4015"><p class="caption" data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Darren Brode // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">#36. Anna (girls)</span></h2><div class="item-description" data-dcnode-id="4016"><p data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">Total babies born in last 100 years: 651,229</span></p><p data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">Rank in 2017: #53</span></p><p data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Total babies born in 2017: 4,520</span></p><p data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Peak year: 1918</span></p><p data-dcnode-id="4019"><span data-dcnode-id="4023" instrument_node="">Anna has been one of the most consistently well-liked names of the past century. In 1900, Anna was the third most popular baby girl name in the country, and the </span><a data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/cgi-bin/babyname.cgi" target="_blank"><span data-dcnode-id="4022" instrument_node="">lowest it ever dipped</span></a><span data-dcnode-id="4020" instrument_node="">&nbsp;since then was to 106th place, in 1971. Though Anna currently sits at #53 in popularity rankings, there's little doubt she'll climb back to the top, as she always does.</span></p><p data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3988" data-index="41"><figure class="frameme" data-cbid="141" data-dcnode-id="4010"><div class="theframe" data-dcnode-id="4011" data-image="//townsquare.media/site/341/files/2020/05/314.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">#35. Stephen (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3989"><p class="caption" data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">#35. Stephen (boys)</span></h2><div class="item-description" data-dcnode-id="3990"><p data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Total babies born in last 100 years: 841,093</span></p><p data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">Rank in 2017: #271</span></p><p data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Total babies born in 2017: 1,321</span></p><p data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Peak year: 1952</span></p><p data-dcnode-id="3993"><span data-dcnode-id="3997" instrument_node="">Like another pair on this list (Catherine and Katherine), Stephen and Steven are in a bit of a battle. Unfortunately for the “p" contingent nationwide, it's the other spelling that has maintained a little more consistent popularity. But it's not all bad news—Stephen was popular throughout the middle of the 20th century, and gets to claim&nbsp;</span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.listchallenges.com/famous-people-named-stephen-steven" target="_blank"><span data-dcnode-id="3996" instrument_node="">quite a few famous namesakes</span></a><span data-dcnode-id="3994" instrument_node="">.</span></p><p data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3959" data-index="42"><figure class="frameme" data-cbid="142" data-dcnode-id="3984"><div class="theframe" data-dcnode-id="3985" data-image="//townsquare.media/site/341/files/2020/05/323.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">#35. Angela (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3960"><p class="caption" data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">Oleksiy Avtomonov // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">#35. Angela (girls)</span></h2><div class="item-description" data-dcnode-id="3961"><p data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">Total babies born in last 100 years: 657,218</span></p><p data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">Rank in 2017: #234</span></p><p data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Total babies born in 2017: 1,344</span></p><p data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">Peak year: 1971</span></p><p data-dcnode-id="3964"><span data-dcnode-id="3971" instrument_node="">Angela from “The Office" infamously wore American Girl doll clothes made for “</span><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/samstryker/the-women-of-the-office-nbc" target="_blank"><span data-dcnode-id="3970" instrument_node="">large colonial dolls</span></a><span data-dcnode-id="3968" instrument_node="">," but not all Angelas are quite so eccentric. The name Angela has a rich history, perhaps the most exciting part of which is the name's link to, </span><a data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/baby-name/girl/angela" target="_blank"><span data-dcnode-id="3967" instrument_node="">you guessed it, angels</span></a><span data-dcnode-id="3965" instrument_node="">.</span></p><p data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3958"></div><div class="photogallery-item" data-dcnode-id="3929" data-index="44"><figure class="frameme" data-cbid="143" data-dcnode-id="3954"><div class="theframe" data-dcnode-id="3955" data-image="//townsquare.media/site/341/files/2020/05/333.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">#34. Eric (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3930"><p class="caption" data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">#34. Eric (boys)</span></h2><div class="item-description" data-dcnode-id="3931"><p data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Total babies born in last 100 years: 873,225</span></p><p data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Rank in 2017: #143</span></p><p data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Total babies born in 2017: 2,757</span></p><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Peak year: 1970</span></p><p data-dcnode-id="3934"><span data-dcnode-id="3941" instrument_node="">Eric, derived from </span><a data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nameberry.com/babyname/Eric" target="_blank"><span data-dcnode-id="3940" instrument_node="">Old Norse origins,</span></a><span data-dcnode-id="3938" instrument_node=""> is said to mean “eternal ruler." Perhaps most importantly, Eric is one of few names with the distinct honor of being linked to a Disney Prince (although there are some who contend that Prince Eric was, well, </span><a data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bustle.com/articles/104856-5-reasons-prince-eric-from-the-little-mermaid-was-actually-the-worst" target="_blank"><span data-dcnode-id="3937" instrument_node="">not exactly the best</span></a><span data-dcnode-id="3935" instrument_node="">.)</span></p><p data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3903" data-index="45"><figure class="frameme" data-cbid="144" data-dcnode-id="3925"><div class="theframe" data-dcnode-id="3926" data-image="//townsquare.media/site/341/files/2020/05/343.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">#34. Shirley (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3904"><p class="caption" data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">#34. Shirley (girls)</span></h2><div class="item-description" data-dcnode-id="3905"><p data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Total babies born in last 100 years: 673,922</span></p><p data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">Rank in 2017: not in top 1,000</span></p><p data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">Peak year: 1935</span></p><p data-dcnode-id="3908"><span data-dcnode-id="3912" instrument_node="">A name has reached great heights when it's linked to both a delicious beverage and a loved&nbsp;child actress. In fact, </span><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000073/" target="_blank"><span data-dcnode-id="3911" instrument_node="">Shirley Temple</span></a><span data-dcnode-id="3909" instrument_node=""> (the person, not the drink), can perhaps be thanked for this name's 1935 popularity peak, as some of her early hit films, like “Curly Top," were released around this time.</span></p><p data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3874" data-index="46"><figure class="frameme" data-cbid="145" data-dcnode-id="3899"><div class="theframe" data-dcnode-id="3900" data-image="//townsquare.media/site/341/files/2020/05/353.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">#33. Nicholas (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3875"><p class="caption" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">#33. Nicholas (boys)</span></h2><div class="item-description" data-dcnode-id="3876"><p data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Total babies born in last 100 years: 884,993</span></p><p data-dcnode-id="3891"><span d
