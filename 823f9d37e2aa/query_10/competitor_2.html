ata-dcnode-id="3892" instrument_node="">Rank in 2017: #68</span></p><p data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">Total babies born in 2017: 5,321</span></p><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Peak year: 1995</span></p><p data-dcnode-id="3877"><span data-dcnode-id="3886" instrument_node="">Nicholas is a 1990s mainstay through and through. The name remained in the top 10 for most popular baby names for boys throughout most of that decade and into the early 2000s, but has taken a fall since then. Nicholas is </span><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/first-name-meanings-2014-7" target="_blank"><span data-dcnode-id="3885" instrument_node="">derived from “nike,"meaning “victory,”</span></a><span data-dcnode-id="3883" instrument_node="">&nbsp;which explains why such a prominent sneaker company chose this term as their brand name (although apparently there was </span><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/how-nike-got-its-name-2016-1" target="_blank"><span data-dcnode-id="3882" instrument_node="">some initial hesitation</span></a><span data-dcnode-id="3880" instrument_node=""> over this choice.)</span><br data-dcnode-id="3879"><span data-dcnode-id="3878" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3873"></div><div class="photogallery-item" data-dcnode-id="3847" data-index="48"><figure class="frameme" data-cbid="146" data-dcnode-id="3869"><div class="theframe" data-dcnode-id="3870" data-image="//townsquare.media/site/341/files/2020/05/363.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">#33. Amy (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3848"><p class="caption" data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">#33. Amy (girls)</span></h2><div class="item-description" data-dcnode-id="3849"><p data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Total babies born in last 100 years: 678,839</span></p><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Rank in 2017: #174</span></p><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Total babies born in 2017: 1,724</span></p><p data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Peak year: 1975</span></p><p data-dcnode-id="3850"><span data-dcnode-id="3856" instrument_node="">Amy wasn't just popular in the 1970s; it was a smash hit, cracking the top two most popular girl baby names four years in a row. Interestingly, the name seems to have </span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/livebirths/datasets/babynamesenglandandwalesbabynamesstatisticsgirls" target="_blank"><span data-dcnode-id="3855" instrument_node="">caught on in the U.K. slightly later.</span></a><span data-dcnode-id="3853" instrument_node=""> Amy was the 23rd most popular girls name in England in 2007&nbsp;while it only landed at #119 that same year in the U.S.</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3821" data-index="49"><figure class="frameme" data-cbid="147" data-dcnode-id="3843"><div class="theframe" data-dcnode-id="3844" data-image="//townsquare.media/site/341/files/2020/05/373.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">#32. Gary (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3822"><p class="caption" data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">#32. Gary (boys)</span></h2><div class="item-description" data-dcnode-id="3823"><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Total babies born in last 100 years: 899,224</span></p><p data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Rank in 2017: #637</span></p><p data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Total babies born in 2017: 403</span></p><p data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Peak year: 1952</span></p><p data-dcnode-id="3826"><span data-dcnode-id="3830" instrument_node="">Gary. Jerry. Larry. The folks of “Parks and Recreation" may have struggled with this </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/entertainment/archive/2015/02/and-the-meek-shall-inherit-pawnee/385985/" target="_blank"><span data-dcnode-id="3829" instrument_node="">downtrodden and lovable character's name</span></a><span data-dcnode-id="3827" instrument_node="">, but not all Garys have such burdens. Though the name is not immensely common amongst babies today, it did see an impressive span of high popularity. Gary began to gain popularity in the early 1930s, and maintained a spot in the top 30 boy names from 1937 all the way to 1966.</span></p><p data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3795" data-index="50"><figure class="frameme" data-cbid="148" data-dcnode-id="3817"><div class="theframe" data-dcnode-id="3818" data-image="//townsquare.media/site/341/files/2020/05/383.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">#32. Kathleen (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3796"><p class="caption" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">#32. Kathleen (girls)</span></h2><div class="item-description" data-dcnode-id="3797"><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Total babies born in last 100 years: 693,971</span></p><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Rank in 2017: #871</span></p><p data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">Total babies born in 2017: 310</span></p><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Peak year: 1951</span></p><p data-dcnode-id="3800"><span data-dcnode-id="3804" instrument_node="">Kathleen has a mighty impressive record. The name remained among the top 100 baby names for girls for seven decades, all the way from 1920 to 1990. Kathleen is </span><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/kathleen" target="_blank"><span data-dcnode-id="3803" instrument_node="">of Irish origin,</span></a><span data-dcnode-id="3801" instrument_node=""> as an alteration on the name Caitlin.</span></p><p data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3794"></div><div class="photogallery-item" data-dcnode-id="3768" data-index="52"><figure class="frameme" data-cbid="149" data-dcnode-id="3790"><div class="theframe" data-dcnode-id="3791" data-image="//townsquare.media/site/341/files/2020/05/393.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">#31. Jacob (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3769"><p class="caption" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">Rowena of the Rants // Flickr</span></p><h2 class="item-title" data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">#31. Jacob (boys)</span></h2><div class="item-description" data-dcnode-id="3770"><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">Total babies born in last 100 years: 904,527</span></p><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Rank in 2017: #10</span></p><p data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Total babies born in 2017: 13,106</span></p><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Peak year: 1998</span></p><p data-dcnode-id="3773"><span data-dcnode-id="3777" instrument_node="">Like many other names on this list, Jacob can be </span><a data-dcnode-id="3775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Jacob-Hebrew-patriarch" target="_blank"><span data-dcnode-id="3776" instrument_node="">traced back to biblical roots</span></a><span data-dcnode-id="3774" instrument_node="">. Jacob, the Hebrew patriarch, serves as the traditional ancestor for the people of Israel. According to Genesis, Jacob was incredibly cunning and quick-witted, and eventually fathered 13 children.</span></p><p data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3742" data-index="53"><figure class="frameme" data-cbid="150" data-dcnode-id="3764"><div class="theframe" data-dcnode-id="3765" data-image="//townsquare.media/site/341/files/2020/05/403.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">#31. Cynthia (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3743"><p class="caption" data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">#31. Cynthia (girls)</span></h2><div class="item-description" data-dcnode-id="3744"><p data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">Total babies born in last 100 years: 705,396</span></p><p data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Rank in 2017: #637</span></p><p data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Total babies born in 2017: 460</span></p><p data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">Peak year: 1957</span></p><p data-dcnode-id="3747"><span data-dcnode-id="3751" instrument_node="">Though some have contested that the name Cynthia has long lived “</span><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//upswingbabynames.com/2012/05/unfairly-dated-names-cynthia/" target="_blank"><span data-dcnode-id="3750" instrument_node="">in the shadow</span></a><span data-dcnode-id="3748" instrument_node="">" of its assumed nickname, Cindy, it has still found plenty of time to stand on its own. Cynthia was extremely popular through much of the 1950s and 1960s, and here's hoping it rises again.</span></p><p data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3719" data-index="54"><figure class="frameme" data-cbid="151" data-dcnode-id="3738"><div class="theframe" data-dcnode-id="3739" data-image="//townsquare.media/site/341/files/2020/05/415.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">#30. Ryan (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3720"><p class="caption" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Public Domain Pictures</span></p><h2 class="item-title" data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">#30. Ryan (boys)</span></h2><div class="item-description" data-dcnode-id="3721"><p data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Total babies born in last 100 years: 924,353</span></p><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">Rank in 2017: #43</span></p><p data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">Total babies born in 2017: 7,652</span></p><p data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Peak year: 1985</span></p><p data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">Ryan is a newcomer in the name game. According to SSA data, there's no record of the name, or the amount was negligible in the U.S. prior to 1946. Ryan then made a giant leap in popularity from 1970 to 1971, moving from #139 to #51 on the list of most popular boys names. Ryan remained extremely popular for the next 30 years.</span></p><p data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3718"></div><div class="photogallery-item" data-dcnode-id="3693" data-index="56"><figure class="frameme" data-cbid="152" data-dcnode-id="3714"><div class="theframe" data-dcnode-id="3715" data-image="//townsquare.media/site/341/files/2020/05/423.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">#30. Sharon (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3694"><p class="caption" data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">#30. Sharon (girls)</span></h2><div class="item-description" data-dcnode-id="3695"><p data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Total babies born in last 100 years: 720,788</span></p><p data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Rank in 2017: not in top 1000</span></p><p data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="3698"><span data-dcnode-id="3701" instrument_node="">The 1940s were a time for Sharons, the peak being 1947. However, since then, Sharon has taken an extremely sharp turn in terms of popularity. The name did not crack the top 1,000 in 2017. Sharon is referenced as far back as the Song of Solomon, a book of the Old Testament, in the phrase: </span><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/first-name-meanings-2014-7" target="_blank"><span data-dcnode-id="3700" instrument_node="">“I am the rose of Sharon, and the lily of the valleys.”</span></a></p><p data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3667" data-index="57"><figure class="frameme" data-cbid="153" data-dcnode-id="3689"><div class="theframe" data-dcnode-id="3690" data-image="//townsquare.media/site/341/files/2020/05/433.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">#29. Jeffrey (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3668"><p class="caption" data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">#29. Jeffrey (boys)</span></h2><div class="item-description" data-dcnode-id="3669"><p data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Total babies born in last 100 years: 973,193</span></p><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Rank in 2017: #323</span></p><p data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Total babies born in 2017: 1,049</span></p><p data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Peak year: 1962</span></p><p data-dcnode-id="3670"><span data-dcnode-id="3676" instrument_node="">Jeffrey saw is heyday during the 1960s. The name remained in the top 15 throughout that decade, and even into the early 1970s. Geoffrey, a version of this name that was once popular (for instance, belonging to one of the </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Geoffrey-Chaucer" target="_blank"><span data-dcnode-id="3675" instrument_node="">most influential English writers of all time</span></a><span data-dcnode-id="3673" instrument_node="">), has become so uncommon that the SSA has no data on babies given this name since 2005.</span><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3638" data-index="58"><figure class="frameme" data-cbid="154" data-dcnode-id="3663"><div class="theframe" data-dcnode-id="3664" data-image="//townsquare.media/site/341/files/2020/05/443.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">#29. Helen (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3639"><p class="caption" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">#29. Helen (girls)</span></h2><div class="item-description" data-dcnode-id="3640"><p data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">Total babies born in last 100 years: 721,248</span></p><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Rank in 2017: #418</span></p><p data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">Total babies born in 2017: 758</span></p><p data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Peak year: 1918</span></p><p data-dcnode-id="3643"><span data-dcnode-id="3650" instrument_node="">While the name Helen peaked in American popularity a full century ago, there are quite a few famous or influential Helens to keep its legacy alive. Between mythological figure Helen of Troy, </span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.afb.org/info/about-us/helen-keller/biography-and-chronology/biography/1235" target="_blank"><span data-dcnode-id="3649" instrument_node="">the incredible Helen Keller</span></a><span data-dcnode-id="3647" instrument_node="">, and </span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allure.com/story/helen-mirren-cover-story-september-2017%3Fverso%3Dtrue" target="_blank"><span data-dcnode-id="3646" instrument_node="">the iconic Helen Mirren</span></a><span data-dcnode-id="3644" instrument_node="">, the name Helen will certainly remain on peoples' lips.</span></p><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3637"></div><div class="photogallery-item" data-dcnode-id="3611" data-index="60"><figure class="frameme" data-cbid="155" data-dcnode-id="3633"><div class="theframe" data-dcnode-id="3634" data-image="//townsquare.media/site/341/files/2020/05/453.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">#28. Jason (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3612"><p class="caption" data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">#28. Jason (boys)</span></h2><div class="item-description" data-dcnode-id="3613"><p data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Total babies born in last 100 years: 1,027,857</span></p><p data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Rank in 2017: #92</span></p><p data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Total babies born in 2017: 4,221</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Peak year: 1977</span></p><p data-dcnode-id="3616"><span data-dcnode-id="3620" instrument_node="">The most famous bearer of the name Jason my well be he </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Jason-Greek-mythology" target="_blank"><span data-dcnode-id="3619" instrument_node="">of Greek mythology</span></a><span data-dcnode-id="3617" instrument_node="">. Jason was the leader of the Argonauts, the seeker of the Golden Fleece, and the central figure in a lengthy stream of adventures. Within the past century in the U.S., Jason's height of popularity took place during the 1970s (reaching the top two multiple years in a row), and has remained within the top 100 boys names since then.</span></p><p data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3586" data-index="61"><figure class="frameme" data-cbid="156" data-dcnode-id="3607"><div class="theframe" data-dcnode-id="3608" data-image="//townsquare.media/site/341/files/2020/05/463.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">#28. Laura (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3587"><p class="caption" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">#28. Laura (girls)</span></h2><div class="item-description" data-dcnode-id="3588"><p data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Total babies born in last 100 years: 727,036</span></p><p data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Rank in 2017: #340</span></p><p data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">Total babies born in 2017: 939</span></p><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Peak year: 1964</span></p><p data-dcnode-id="3591"><span data-dcnode-id="3594" instrument_node="">Though Laura is not quite as popular today as it once was among baby girls, the name did pull off the impressive feat of remaining within the top 100 names for nearly six decades, from the 1940s through the early 2000s. Perhaps its drop off in recent years is due to the fact that current parents seem to be favoring names that are </span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/future/story/20161221-why-millennials-are-choosing-strange-baby-names" target="_blank"><span data-dcnode-id="3593" instrument_node="">a little more unusual.</span></a></p><p data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3560" data-index="62"><figure class="frameme" data-cbid="157" data-dcnode-id="3582"><div class="theframe" data-dcnode-id="3583" data-image="//townsquare.media/site/341/files/2020/05/473.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">#27. Timothy (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3561"><p class="caption" data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">Thomas // Flickr</span></p><h2 class="item-title" data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">#27. Timothy (boys)</span></h2><div class="item-description" data-dcnode-id="3562"><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Total babies born in last 100 years: 1,065,147</span></p><p data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">Rank in 2017: #164</span></p><p data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">Total babies born in 2017: 2,393</span></p><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">Peak year: 1959</span></p><p data-dcnode-id="3565"><span data-dcnode-id="3569" instrument_node="">Timothy has been at least in the top 400 baby names for boys since 1918, and reached its apex in the late 1950s and early 1960s. Perhaps the phenomenon that is </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/hollywood/2017/12/timothee-chalamet-call-me-by-your-name-breakout-star" target="_blank"><span data-dcnode-id="3568" instrument_node="">a certain young actor</span></a><span data-dcnode-id="3566" instrument_node=""> will bring this name back to the top of the charts, but with a French spin to the spelling.</span></p><p data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3559"></div><div class="photogallery-item" data-dcnode-id="3530" data-index="64"><figure class="frameme" data-cbid="158" data-dcnode-id="3555"><div class="theframe" data-dcnode-id="3556" data-image="//townsquare.media/site/341/files/2020/05/483.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">#27. Rebecca (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3531"><p class="caption" data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">#27. Rebecca (girls)</span></h2><div class="item-description" data-dcnode-id="3532"><p data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Total babies born in last 100 years: 729,359</span></p><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">Rank in 2017: #216</span></p><p data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Total babies born in 2017: 1,416</span></p><p data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Peak year: 1981</span></p><p data-dcnode-id="3533"><span data-dcnode-id="3542" instrument_node="">Rebecca is a name with </span><a data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/baby-name/girl/rebecca" target="_blank"><span data-dcnode-id="3541" instrument_node="">Hebrew origins</span></a><span data-dcnode-id="3539" instrument_node=""> and remained in the top 50 most popular for baby girls in the U.S. from 1948 all the way to 2001. Rebecca also has the distinct honor of being the title of a </span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2018/feb/23/olivia-laing-on-daphne-du-mauriers-rebecca-80-years-on" target="_blank"><span data-dcnode-id="3538" instrument_node="">best-selling novel</span></a><span data-dcnode-id="3536" instrument_node=""> (a Gothic work by Dame Daphne du Maurier), which is still remembered and widely referenced decades after its publication in 1938.</span><br data-dcnode-id="3535"><span data-dcnode-id="3534" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3504" data-index="65"><figure class="frameme" data-cbid="159" data-dcnode-id="3526"><div class="theframe" data-dcnode-id="3527" data-image="//townsquare.media/site/341/files/2020/05/493.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">#26. Ronald (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3505"><p class="caption" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">#26. Ronald (boys)</span></h2><div class="item-description" data-dcnode-id="3506"><p data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">Total babies born in last 100 years: 1,073,315</span></p><p data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Rank in 2017: #460</span></p><p data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">Total babies born in 2017: 655</span></p><p data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="3507"><span data-dcnode-id="3513" instrument_node="">Peaking in the 1940s, the name Ronald was quite common from the 1930s all the way through the early 1980s. Ronalds find themselves in the unique position of having a name that has belonged to both a former president, and the </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/ronald-mcdonald-facts-2014-3" target="_blank"><span data-dcnode-id="3512" instrument_node="">mascot of one of the world's biggest fast food chains</span></a><span data-dcnode-id="3510" instrument_node="">.</span><br data-dcnode-id="3509"><span data-dcnode-id="3508" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3479" data-index="66"><figure class="frameme" data-cbid="160" data-dcnode-id="3500"><div class="theframe" data-dcnode-id="3501" data-image="//townsquare.media/site/341/files/2020/05/502.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">#26. Stephanie (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3480"><p class="caption" data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Good Free Photos</span></p><h2 class="item-title" data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">#26. Stephanie (girls)</span></h2><div class="item-description" data-dcnode-id="3481"><p data-dcnode-id="3494" dir="ltr"><span data-dcnode-id="3495" instrument_node="">Total babies born in last 100 years: 736,830</span></p><p data-dcnode-id="3492" dir="ltr"><span data-dcnode-id="3493" instrument_node="">Rank in 2017: #287</span></p><p data-dcnode-id="3490" dir="ltr"><span data-dcnode-id="3491" instrument_node="">Total babies born in 2017: 1,126</span></p><p data-dcnode-id="3488" dir="ltr"><span data-dcnode-id="3489" instrument_node="">Peak year: 1990</span></p><p data-dcnode-id="3484" dir="ltr"><span data-dcnode-id="3487" instrument_node="">Stephanie was a regular in the top 100 names for baby girls for nearly 50 years, from the early 1960s into the 2000s. During this time, the name cracked the top 10&nbsp;on more than one occasion. Stephanie is derived from the </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sheknows.com/baby-names/name/stephanie" target="_blank"><span data-dcnode-id="3486" instrument_node="">ancient Greek world for “crown.”</span></a></p><p data-dcnode-id="3482" dir="ltr"><span data-dcnode-id="3483" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3478"></div><div class="photogallery-item" data-dcnode-id="3452" data-index="68"><figure class="frameme" data-cbid="161" data-dcnode-id="3474"><div class="theframe" data-dcnode-id="3475" data-image="//townsquare.media/site/341/files/2020/05/512.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">#25. Edward (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3453"><p class="caption" data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">#25. Edward (boys)</span></h2><div class="item-description" data-dcnode-id="3454"><p data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Total babies born in last 100 years: 1,131,355</span></p><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Rank in 2017: #169</span></p><p data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">Total babies born in 2017: 2,309</span></p><p data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Peak year: 1924</span></p><p data-dcnode-id="3457"><span data-dcnode-id="3461" instrument_node="">Edward has been one of the most consistently popular names of the past 100 years, and even before that. In fact, between 1900 and 1990, the name never dipped below 70th place in popularity for baby boy names. The name has a lengthy history in the United Kingdom as well, having belonged to many kings </span><a data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/edward-viii-abdicates" target="_blank"><span data-dcnode-id="3460" instrument_node="">including Edward VIII</span></a><span data-dcnode-id="3458" instrument_node="">, who was forced to abdicate the throne due to his desire to marry the divorcee Wallis Warfield Simpson.</span></p><p data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3429" data-index="69"><figure class="frameme" data-cbid="162" data-dcnode-id="3448"><div class="theframe" data-dcnode-id="3449" data-image="//townsquare.media/site/341/files/2020/05/521.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">#25. Deborah (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3430"><p class="caption" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Pxhere</span></p><h2 class="item-title" data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">#25. Deborah (girls)</span></h2><div class="item-description" data-dcnode-id="3431"><p data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">Total babies born in last 100 years: 739,319</span></p><p data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Rank in 2017: #774</span></p><p data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Total babies born in 2017: 353</span></p><p data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">Peak year: 1954</span></p><p data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Deborah has seen some extreme fluctuation in popularity over the years. Between 1918 and 1954, the name jumped more than 700 spots, from 744th to a stint in the top three. The name has since fallen to a similar ranking as that of 1918, sitting in the 774th spot in 2017.</span></p><p data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3401" data-index="70"><figure class="frameme" data-cbid="163" data-dcnode-id="3425"><div class="theframe" data-dcnode-id="3426" data-image="//townsquare.media/site/341/files/2020/05/53.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">#24. Brian (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3402"><p class="caption" data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">#24. Brian (boys)</span></h2><div class="item-description" data-dcnode-id="3403"><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Total babies born in last 100 years: 1,163,672</span></p><p data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Rank in 2017: #217</span></p><p data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">Total babies born in 2017: 1,763</span></p><p data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Peak year: 1972</span></p><p data-dcnode-id="3404"><span data-dcnode-id="3412" instrument_node="">Not all Brians have the fortune (or misfortune) of being </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0079470/" target="_blank"><span data-dcnode-id="3411" instrument_node="">mistaken for the Messiah</span></a><span data-dcnode-id="3409" instrument_node="">, but they do share the history that comes with the name. Brian likely comes from Irish roots, and the famous Irish high king of the 10th century was called </span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historytoday.com/richard-cavendish/brian-boru-high-king-ireland-killed" target="_blank"><span data-dcnode-id="3408" instrument_node="">Brian Boru.</span></a><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3400"></div><div class="photogallery-item" data-dcnode-id="3375" data-index="72"><figure class="frameme" data-cbid="164" data-dcnode-id="3396"><div class="theframe" data-dcnode-id="3397" data-image="//townsquare.media/site/341/files/2020/05/54.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">#24. Melissa (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3376"><p class="caption" data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Public Domain Pictures</span></p><h2 class="item-title" data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">#24. Melissa (girls)</span></h2><div class="item-description" data-dcnode-id="3377"><p data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Total babies born in last 100 years: 751,135</span></p><p data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Rank in 2017: #273</span></p><p data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Total babies born in 2017: 1,168</span></p><p data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Peak year: 1979</span></p><p data-dcnode-id="3380"><span data-dcnode-id="3383" instrument_node="">Between 1961 and 1968, Melissa went from being the 95th most popular name for baby girls to the #5. By 1978, the name was the second most popular, and held this spot for several years. Melissa, stemming from Greek roots, is </span><a data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nameberry.com/babyname/Melissa" target="_blank"><span data-dcnode-id="3382" instrument_node="">said to mean “honeybee.”</span></a></p><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3349" data-index="73"><figure class="frameme" data-cbid="165" data-dcnode-id="3371"><div class="theframe" data-dcnode-id="3372" data-image="//townsquare.media/site/341/files/2020/05/55.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">#23. Kevin (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3350"><p class="caption" data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">#23. Kevin (boys)</span></h2><div class="item-description" data-dcnode-id="3351"><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Total babies born in last 100 years: 1,166,548</span></p><p data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Rank in 2017: #101</span></p><p data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Total babies born in 2017: 3,805</span></p><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Peak year: 1963</span></p><p data-dcnode-id="3352"><span data-dcnode-id="3358" instrument_node="">Kevin is an anglicized version of Caoimhín, or Caomghin, meaning “</span><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/baby-name/boy/kevin" target="_blank"><span data-dcnode-id="3357" instrument_node="">handsome, or noble, birth</span></a><span data-dcnode-id="3355" instrument_node="">." Kevin peaked in popularity as a boys name in 1963, and 2017 marked the first time since the 1940s that the name was not in the top 100.</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3323" data-index="74"><figure class="frameme" data-cbid="166" data-dcnode-id="3345"><div class="theframe" data-dcnode-id="3346" data-image="//townsquare.media/site/341/files/2020/05/56.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">#23. Amanda (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3324"><p class="caption" data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Pxhere</span></p><h2 class="item-title" data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">#23. Amanda (girls)</span></h2><div class="item-description" data-dcnode-id="3325"><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Total babies born in last 100 years: 771,905</span></p><p data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Rank in 2017: #334</span></p><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Total babies born in 2017: 954</span></p><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Peak year: 1987</span></p><p data-dcnode-id="3328"><span data-dcnode-id="3332" instrument_node="">Amanda remained in the top 10 most popular girl names for nearly 20 years, from the mid-1970s to the mid-1990s. The name was brought into circulation after the Middle Ages, by poets who used it as a direct reference to the Latin word amanda, </span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/amanda" target="_blank"><span data-dcnode-id="3331" instrument_node="">meaning “worthy of love.”</span></a><span data-dcnode-id="3329" instrument_node=""> Amanda became more commonly used during the 19th century.</span></p><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3322"></div><div class="photogallery-item" data-dcnode-id="3295" data-index="76"><figure class="frameme" data-cbid="167" data-dcnode-id="3318"><div class="theframe" data-dcnode-id="3319" data-image="//townsquare.media/site/341/files/2020/05/57.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">#22. Joshua (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3296"><p class="caption" data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">#22. Joshua (boys)</span></h2><div class="item-description" data-dcnode-id="3297"><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Total babies born in last 100 years: 1,200,627</span></p><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Rank in 2017: #39</span></p><p data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">Total babies born in 2017: 8,239</span></p><p data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Peak year: 1989</span></p><p data-dcnode-id="3298"><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bustle.com/articles/47280-an-official-ranking-of-every-boyfriend-rachel-had-on-friends" target="_blank"><span data-dcnode-id="3305" instrument_node="">Rachel Green</span></a><span data-dcnode-id="3303" instrument_node=""> isn't the only one who has fawned over this name. Joshua was in the top five baby names for boys 25 years in a row, from the 1983 to 2008. As of 2017, the name sits comfortably in 39th place. In Hebrew, the name Joshua </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/first-name-meanings-2014-7" target="_blank"><span data-dcnode-id="3302" instrument_node="">means “God is salvation.”</span></a><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3269" data-index="77"><figure class="frameme" data-cbid="168" data-dcnode-id="3291"><div class="theframe" data-dcnode-id="3292" data-image="//townsquare.media/site/341/files/2020/05/58.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">#22. Michelle (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3270"><p class="caption" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Pxhere</span></p><h2 class="item-title" data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">#22. Michelle (girls)</span></h2><div class="item-description" data-dcnode-id="3271"><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Total babies born in last 100 years: 808,936</span></p><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Rank in 2017: #214</span></p><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Total babies born in 2017: 1,421</span></p><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Peak year: 1969</span></p><p data-dcnode-id="3272"><span data-dcnode-id="3278" instrument_node="">The SSA has no data for Michelles born prior to 1938, but since the name burst onto the scene around World War II, it has maintained fairly solid popularity. Originally a feminine version of the </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/baby-name/girl/michelle" target="_blank"><span data-dcnode-id="3277" instrument_node="">French male name Michel,</span></a><span data-dcnode-id="3275" instrument_node=""> Michelle was most popular for baby girls in the late 1960s, but remained within the top 25 all the way from 1964 to 1992.</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3243" data-index="78"><figure class="frameme" data-cbid="169" data-dcnode-id="3265"><div class="theframe" data-dcnode-id="3266" data-image="//townsquare.media/site/341/files/2020/05/59.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">#21. George (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3244"><p class="caption" data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">#21. George (boys)</span></h2><div class="item-description" data-dcnode-id="3245"><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Total babies born in last 100 years: 1,204,432</span></p><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Rank in 2017: #124</span></p><p data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Total babies born in 2017: 3,151</span></p><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Peak year: 1921</span></p><p data-dcnode-id="3248"><span data-dcnode-id="3252" instrument_node="">George is derived from the Greek word for farmer and became a personal name in classical times, in junction with a widespread </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancestry.com/name-origin%3Fsurname%3Dgeorge" target="_blank"><span data-dcnode-id="3251" instrument_node="">passion for pastoral poetry</span></a><span data-dcnode-id="3249" instrument_node="">. According to legend, the saint that shares this name, St. George, was both a martyr and a dragon slayer, and is honored as the patron saint of England.</span></p><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3242"></div><div class="photogallery-item" data-dcnode-id="3216" data-index="80"><figure class="frameme" data-cbid="170" data-dcnode-id="3238"><div class="theframe" data-dcnode-id="3239" data-image="//townsquare.media/site/341/files/2020/05/60.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">#21. Carol (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3217"><p class="caption" data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">#21. Carol (girls)</span></h2><div class="item-description" data-dcnode-id="3218"><p data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Total babies born in last 100 years: 809,234</span></p><p data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">Rank in 2017: not in top 1000</span></p><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Peak year: 1946</span></p><p data-dcnode-id="3221"><span data-dcnode-id="3225" instrument_node="">An </span><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houseofnames.com/carol-family-crest" target="_blank"><span data-dcnode-id="3224" instrument_node="">early Gaelic version of the name</span></a><span data-dcnode-id="3222" instrument_node=""> Carol appears as Cearbhaill, which is derived from a name belonging to, amongst others, the Lord of Ely, who helped Brian Boru achieve an Irish victory in 1014. Now a traditional woman's name, Carol maxed its popularity in 1946, and is no longer within the top 1,000 most popular baby names for girls as of 2017.</span></p><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3187" data-index="81"><figure class="frameme" data-cbid="171" data-dcnode-id="3212"><div class="theframe" data-dcnode-id="3213" data-image="//townsquare.media/site/341/files/2020/05/611.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">#20. Kenneth (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3188"><p class="caption" data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">Donnie Ray Jones // Flickr</span></p><h2 class="item-title" data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">#20. Kenneth (boys)</span></h2><div class="item-description" data-dcnode-id="3189"><p data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Total babies born in last 100 years: 1,236,719</span></p><p data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Rank in 2017: #218</span></p><p data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Total babies born in 2017: 1,751</span></p><p data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Peak year: 1957</span></p><p data-dcnode-id="3192"><span data-dcnode-id="3199" instrument_node="">The contemporary name Kenneth is an </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/kenneth" target="_blank"><span data-dcnode-id="3198" instrument_node="">anglicized version</span></a><span data-dcnode-id="3196" instrument_node=""> of both Cinaed and Coinneach. Scottish kings have shared the name with slightly less imposing, but equally famous figures like </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm1442113/" target="_blank"><span data-dcnode-id="3195" instrument_node="">Kenneth the page</span></a><span data-dcnode-id="3193" instrument_node="">.</span></p><p data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3161" data-index="82"><figure class="frameme" data-cbid="172" data-dcnode-id="3183"><div class="theframe" data-dcnode-id="3184" data-image="//townsquare.media/site/341/files/2020/05/621.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">#20. Emily (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3162"><p class="caption" data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">#20. Emily (girls)</span></h2><div class="item-description" data-dcnode-id="3163"><p data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Total babies born in last 100 years: 813,736</span></p><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Rank in 2017: #12</span></p><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Total babies born in 2017: 9,746</span></p><p data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Peak year: 1999</span></p><p data-dcnode-id="3166"><span data-dcnode-id="3170" instrument_node="">Back in 1928, Emily was the 105th most popular baby name for girls. In 2017, she ranked at #12. The name has seen some fluctuation over the past century (for example, it wasn't big during the 1950s), but by the late 1990s Emily was more popular than ever. Originally, Emily </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenamemeaning.com/emily/" target="_blank"><span data-dcnode-id="3169" instrument_node="">came from the Latin Aemilia</span></a><span data-dcnode-id="3167" instrument_node="">, and now possesses a degree of literary association due to impactful writers Emily Dickinson and Emily Bronte.</span></p><p data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3160"></div><div class="photogallery-item" data-dcnode-id="3137" data-index="84"><figure class="frameme" data-cbid="173" data-dcnode-id="3156"><div class="theframe" data-dcnode-id="3157" data-image="//townsquare.media/site/341/files/2020/05/63.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">#19. Andrew (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3138"><p class="caption" data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">#19. Andrew (boys)</span></h2><div class="item-description" data-dcnode-id="3139"><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Total babies born in last 100 years: 1,245,585</span></p><p data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">Rank in 2017: #40</span></p><p data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Total babies born in 2017: 8,215</span></p><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Peak year: 1987</span></p><p data-dcnode-id="3140"><span data-dcnode-id="3143" instrument_node="">In 2017, more than 8,200 new baby boy Andrews entered the world. That may seem like a lot—and it's certainly nothing to scoff at—but the real height of Andrew insanity was the late 1980s and early 1990s. The name entered the top five most popular boys names more than once during this period, peaking in 1987.</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3111" data-index="85"><figure class="frameme" data-cbid="174" data-dcnode-id="3133"><div class="theframe" data-dcnode-id="3134" data-image="//townsquare.media/site/341/files/2020/05/64.jpg" rel="" style="background-size: contain;"><figcaption class="visually-hidden" data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">#19. Donna (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3112"><p class="caption" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">Weird Beard // Wikicommons</span></p><h2 class="item-title" data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">#19. Donna (girls)</span></h2><div class="item-description" data-dcnode-id="3113"><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Total babies born in last 100 years: 824,779</span></p><p data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">Rank in 2017: not in top 1,000</span></p><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Peak year: 1959</span></p><p data-dcnode-id="3114"><span data-dcnode-id="3120" instrument_node="">According to the SSA, there were 243 little Donnas born in 1918; in 2017, there were too few Donnas to be counted amongst the the top 1,000 baby girl names. While her glory days might be over, in 1959, Donna reigned supreme, boasting a top five ranking. </span><a data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/donna" target="_blank"><span data-dcnode-id="3119" instrument_node="">In Italian, the word donna</span></a><span data-dcnode-id="3117" instrument_node=""> translates to “lady" or “woman," especially a woman of high rank.</span><br data-dcnode-id="3116"><span data-dcnode-id="3115" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3082" data-index="86"><figure class="frameme" data-cbid="175" data-dcnode-id="3107"><div class="theframe" data-dcnode-id="3108" data-image="//townsquare.media/site/341/files/2020/05/65.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">#18. Steven (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3083"><p class="caption" data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">#18. Steven (boys)</span></h2><div class="item-description" data-dcnode-id="3084"><p data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Total babies born in last 100 years: 1,277,979</span></p><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Rank in 2017: #182</span></p><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Total babies born in 2017: 2,148</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Peak year: 1956</span></p><p data-dcnode-id="3087"><span data-dcnode-id="3094" instrument_node="">The list of notable Stevens is truly endless, ranging from Spielberg to Tyler, all the way back to the </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/st-stephen-9493800" target="_blank"><span data-dcnode-id="3093" instrument_node="">first martyr in Christian theology (albeit with a different spelling).</span></a><span data-dcnode-id="3091" instrument_node=""> Steven has </span><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancestry.com/name-origin%3Fsurname%3Dsteven" target="_blank"><span data-dcnode-id="3090" instrument_node="">Greek and Latin roots</span></a><span data-dcnode-id="3088" instrument_node="">, tracing back to the word “stephanos,"meaning “crown." As is clear from this list, the variation Stephen is also quite popular.</span></p><p data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3081"></div><div class="photogallery-item" data-dcnode-id="3052" data-index="88"><figure class="frameme" data-cbid="176" data-dcnode-id="3077"><div class="theframe" data-dcnode-id="3078" data-image="//townsquare.media/site/341/files/2020/05/66.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">#18. Kimberly (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3053"><p class="caption" data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">#18. Kimberly (girls)</span></h2><div class="item-description" data-dcnode-id="3054"><p data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Total babies born in last 100 years: 834,952</span></p><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Rank in 2017: #164</span></p><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Total babies born in 2017: 1,823</span></p><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">Peak year: 1970</span></p><p data-dcnode-id="3057"><span data-dcnode-id="3064" instrument_node="">In 1970, Kimberly was the third most popular name for baby girls in the United States. It was popular through the decade, but has since fallen somewhat, despite the ubiquity of </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkardashianwest.com/" target="_blank"><span data-dcnode-id="3063" instrument_node="">a certain Kim</span></a><span data-dcnode-id="3061" instrument_node=""> and her squad. Kimberley (a slightly different spelling than the name ranked here) is also the name of </span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Kimberley-South-Africa" target="_blank"><span data-dcnode-id="3060" instrument_node="">a place in South Africa</span></a><span data-dcnode-id="3058" instrument_node="">, which was besieged for many months during the South African War.</span></p><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3028" data-index="89"><figure class="frameme" data-cbid="177" data-dcnode-id="3048"><div class="theframe" data-dcnode-id="3049" data-image="//townsquare.media/site/341/files/2020/05/67.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">#17. Paul (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3029"><p class="caption" data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Public Domain Pictures</span></p><h2 class="item-title" data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">#17. Paul (boys)</span></h2><div class="item-description" data-dcnode-id="3030"><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Total babies born in last 100 years: 1,306,625</span></p><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Rank in 2017: #225</span></p><p data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Total babies born in 2017: 1,684</span></p><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Peak year: 1957</span></p><p data-dcnode-id="3031"><span data-dcnode-id="3035" instrument_node="">Like many names on this list, Paul is </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/religion/religions/christianity/history/paul_1.shtml" target="_blank"><span data-dcnode-id="3034" instrument_node="">steeped in religious history</span></a><span data-dcnode-id="3032" instrument_node="">. Saint Paul, the apostle, famously converted to Christianity on the road to Damascus; he then travelled extensively spreading the message of his new religion. In more recent history, while Paul has remained a popular name, its height of commonality was surprisingly 1957.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="3002" data-index="90"><figure class="frameme" data-cbid="178" data-dcnode-id="3024"><div class="theframe" data-dcnode-id="3025" data-image="//townsquare.media/site/341/files/2020/05/68.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">#17. Ashley (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="3003"><p class="caption" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">#17. Ashley (girls)</span></h2><div class="item-description" data-dcnode-id="3004"><p data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Total babies born in last 100 years: 843,112</span></p><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Rank in 2017: #122</span></p><p data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">Total babies born in 2017: 2,517</span></p><p data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Peak year: 1987</span></p><p data-dcnode-id="3005"><span data-dcnode-id="3011" instrument_node="">The </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/oact/babynames/decades/names1980s.html" target="_blank"><span data-dcnode-id="3010" instrument_node="">popular names of the 1980s</span></a><span data-dcnode-id="3008" instrument_node=""> can easily be discovered based on the celebrities who were born in this decade and reached immense fame in the early 2000's. There's Jessica (Simpson), Amanda (Bynes), Nicole (Richie), and of course, Ashley (Tisdale, Olsen, take your pick). But like acid-wash jeans, Ashleys peaked in popularity in 1987.</span><br data-dcnode-id="3007"><span data-dcnode-id="3006" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="3001"></div><div class="photogallery-item" data-dcnode-id="2975" data-index="92"><figure class="frameme" data-cbid="179" data-dcnode-id="2997"><div class="theframe" data-dcnode-id="2998" data-image="//townsquare.media/site/341/files/2020/05/69.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">#16. Mark (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2976"><p class="caption" data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">#16. Mark (boys)</span></h2><div class="item-description" data-dcnode-id="2977"><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Total babies born in last 100 years: 1,344,090</span></p><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">Rank in 2017: #203</span></p><p data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Total babies born in 2017: 1,936</span></p><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Peak year: 1960</span></p><p data-dcnode-id="2978"><span data-dcnode-id="2984" instrument_node="">There's some contention over the exact history of the name Mark, though some believed it comes from </span><a data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.babynamewizard.com/baby-name/boy/mark" target="_blank"><span data-dcnode-id="2983" instrument_node="">Mars, the Roman god of war</span></a><span data-dcnode-id="2981" instrument_node="">. Whatever the name's origin, it has generally stood the test of time, and was most popular in 1960.</span><br data-dcnode-id="2980"><span data-dcnode-id="2979" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2949" data-index="93"><figure class="frameme" data-cbid="180" data-dcnode-id="2971"><div class="theframe" data-dcnode-id="2972" data-image="//townsquare.media/site/341/files/2020/05/70.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">#16. Sandra (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2950"><p class="caption" data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">peasap // Flickr</span></p><h2 class="item-title" data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">#16. Sandra (girls)</span></h2><div class="item-description" data-dcnode-id="2951"><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Total babies born in last 100 years: 873,163</span></p><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Rank in 2017: #894</span></p><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Total babies born in 2017: 299</span></p><p data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2954"><span data-dcnode-id="2958" instrument_node="">One of the most well-known Sandras may be Sandra Dee, thanks to her </span><a data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.metrolyrics.com/look-at-me-im-sandra-dee-lyrics-grease.html" target="_blank"><span data-dcnode-id="2957" instrument_node="">iconic number in “Grease.”</span></a><span data-dcnode-id="2955" instrument_node=""> Dee was born in 1942, five years prior to the name's ultimate peak of popularity. Of course, there have been a few other famous&nbsp;Sandras over time; for instance, Sandra Day O'Connor was the first woman to serve on the U.S. Supreme Court.</span></p><p data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2923" data-index="94"><figure class="frameme" data-cbid="181" data-dcnode-id="2945"><div class="theframe" data-dcnode-id="2946" data-image="//townsquare.media/site/341/files/2020/05/711.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">#15. Donald (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2924"><p class="caption" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">#15. Donald (boys)</span></h2><div class="item-description" data-dcnode-id="2925"><p data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Total babies born in last 100 years: 1,366,872</span></p><p data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Rank in 2017: #488</span></p><p data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Total babies born in 2017: 594</span></p><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Peak year: 1934</span></p><p data-dcnode-id="2928"><span data-dcnode-id="2932" instrument_node="">The Gaelic version of and predecessor to the name Donald </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/donald" target="_blank"><span data-dcnode-id="2931" instrument_node="">is “Domhnall.”</span></a><span data-dcnode-id="2929" instrument_node=""> The name had long been popular in Scotland, before it gained notoriety in the rest of the English-speaking world. While Donald is no longer a very popular choice for baby boys born in the U.S., it had a long run, with the height of its popularity being 1934.</span></p><p data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2922"></div><div class="photogallery-item" data-dcnode-id="2899" data-index="96"><figure class="frameme" data-cbid="182" data-dcnode-id="2918"><div class="theframe" data-dcnode-id="2919" data-image="//townsquare.media/site/341/files/2020/05/721.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">#15. Dorothy (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2900"><p class="caption" data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Pxhere</span></p><h2 class="item-title" data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">#15. Dorothy (girls)</span></h2><div class="item-description" data-dcnode-id="2901"><p data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Total babies born in last 100 years: 910,113</span></p><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Rank in 2017: #601</span></p><p data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Total babies born in 2017: 498</span></p><p data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Peak year: 1924</span></p><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Throughout the 1920s, Dorothy maintained a steady run as one of the top choices for baby girl names, and it remained among the top three names for over a decade. Dorothy has steadily decreased in popularity since then, and as of 2017, is the 601st most popular girl's name.</span></p><p data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2873" data-index="97"><figure class="frameme" data-cbid="183" data-dcnode-id="2895"><div class="theframe" data-dcnode-id="2896" data-image="//townsquare.media/site/341/files/2020/05/73.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">#14. Anthony (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2874"><p class="caption" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">#14. Anthony (boys)</span></h2><div class="item-description" data-dcnode-id="2875"><p data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Total babies born in last 100 years: 1,397,798</span></p><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Rank in 2017: #32</span></p><p data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Total babies born in 2017: 8,802</span></p><p data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Peak year: 1990</span></p><p data-dcnode-id="2876"><span data-dcnode-id="2882" instrument_node="">Anthony comes from the Latin family name “Antonius." Perhaps the most famous figure to bear this name is&nbsp;</span><a data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/ancient-history/mark-antony" target="_blank"><span data-dcnode-id="2881" instrument_node="">Marcus Antonius</span></a><span data-dcnode-id="2879" instrument_node=""> (commonly known as Marc Antony), the Roman politician and general. Anthony was a fairly popular name a century ago, and after a brief period of decline, became even more popular in the 1990s and early 2000s.</span><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2844" data-index="98"><figure class="frameme" data-cbid="184" data-dcnode-id="2869"><div class="theframe" data-dcnode-id="2870" data-image="//townsquare.media/site/341/files/2020/05/74.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">#14. Betty (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2845"><p class="caption" data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">#14. Betty (girls)</span></h2><div class="item-description" data-dcnode-id="2846"><p data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Total babies born in last 100 years: 957,491</span></p><p data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Rank in 2017: not in top 1000</span></p><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Total babies born in 2017: data not available</span></p><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Peak year: 1930</span></p><p data-dcnode-id="2849"><span data-dcnode-id="2856" instrument_node="">One half of the duo famous for fighting over a </span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smithsonianmag.com/arts-culture/betty-veronica-real-stars-riverdale-180959498/" target="_blank"><span data-dcnode-id="2855" instrument_node="">well-known redhead</span></a><span data-dcnode-id="2853" instrument_node=""> (a pair that has since been given a modern twist via the TV series “Riverdale”), Betty saw a long reign as a popular name for girls. Betty was even used as slang (</span><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mentalfloss.com/article/66181/15-phat-pieces-clueless-slang" target="_blank"><span data-dcnode-id="2852" instrument_node="">as seen in the movie “Clueless”</span></a><span data-dcnode-id="2850" instrument_node="">) to mean a beautiful woman.</span></p><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placehol
