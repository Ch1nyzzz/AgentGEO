der" data-dcnode-id="2843"></div><div class="photogallery-item" data-dcnode-id="2817" data-index="100"><figure class="frameme" data-cbid="185" data-dcnode-id="2839"><div class="theframe" data-dcnode-id="2840" data-image="//townsquare.media/site/341/files/2020/05/75.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">#13. Matthew (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2818"><p class="caption" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Public Domain Pictures</span></p><h2 class="item-title" data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">#13. Matthew (boys)</span></h2><div class="item-description" data-dcnode-id="2819"><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Total babies born in last 100 years: 1,582,548</span></p><p data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Rank in 2017: #16</span></p><p data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Total babies born in 2017: 11,611</span></p><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Peak year: 1983</span></p><p data-dcnode-id="2822"><span data-dcnode-id="2826" instrument_node="">Matthew was in the top three most popular boys names for most of the 1980s and 1990s. Unlike some names that see a brief spike and then fade back to obscurity, Matthew remains in the top 20. But this kind of love is </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/perpetua/matthew-or-matt-but-not-matty" target="_blank"><span data-dcnode-id="2825" instrument_node="">a double-edged sword</span></a><span data-dcnode-id="2823" instrument_node=""> for many bearing the name.</span></p><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2788" data-index="101"><figure class="frameme" data-cbid="186" data-dcnode-id="2813"><div class="theframe" data-dcnode-id="2814" data-image="//townsquare.media/site/341/files/2020/05/76.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">#13. Lisa (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2789"><p class="caption" data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">#13. Lisa (girls)</span></h2><div class="item-description" data-dcnode-id="2790"><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Total babies born in last 100 years: 964,404</span></p><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Rank in 2017: #884</span></p><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Total babies born in 2017: 305</span></p><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Peak year: 1965</span></p><p data-dcnode-id="2793"><span data-dcnode-id="2800" instrument_node="">Lisa belongs to one of the most </span><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/hollywood/2018/02/why-lisa-simpson-matters" target="_blank"><span data-dcnode-id="2799" instrument_node="">iconic cartoon characters</span></a><span data-dcnode-id="2797" instrument_node=""> of all time, as well as a&nbsp;</span><a data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leonardodavinci.net/the-mona-lisa.jsp" target="_blank"><span data-dcnode-id="2796" instrument_node="">well-known painting</span></a><span data-dcnode-id="2794" instrument_node="">. Not all Lisas have such a&nbsp;famous smile, but they did have a peak year in 1965. As of 2017, Lisa has dropped to #884 in terms of popularity.</span></p><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2762" data-index="102"><figure class="frameme" data-cbid="187" data-dcnode-id="2784"><div class="theframe" data-dcnode-id="2785" data-image="//townsquare.media/site/341/files/2020/05/77.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">#12. Daniel (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2763"><p class="caption" data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">#12. Daniel (boys)</span></h2><div class="item-description" data-dcnode-id="2764"><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Total babies born in last 100 years: 1,874,515</span></p><p data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Rank in 2017: #15</span></p><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Total babies born in 2017: 11,640</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Peak year: 1985</span></p><p data-dcnode-id="2767"><span data-dcnode-id="2771" instrument_node="">Daniel comes from the Hebrew name </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/daniel" target="_blank"><span data-dcnode-id="2770" instrument_node="">Daniyyel, meaning “God is my judge.”</span></a><span data-dcnode-id="2768" instrument_node=""> The name came into popularity in England around the Middle Ages, but didn't see its day in the U.S. until 1985. Today, Daniel remains in the top 20 most popular boy's names.</span></p><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2761"></div><div class="photogallery-item" data-dcnode-id="2735" data-index="104"><figure class="frameme" data-cbid="188" data-dcnode-id="2757"><div class="theframe" data-dcnode-id="2758" data-image="//townsquare.media/site/341/files/2020/05/78.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">#12. Nancy (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2736"><p class="caption" data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">tiarescott // Flickr</span></p><h2 class="item-title" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">#12. Nancy (girls)</span></h2><div class="item-description" data-dcnode-id="2737"><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Total babies born in last 100 years: 973,962</span></p><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Rank in 2017: #878</span></p><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Total babies born in 2017: 308</span></p><p data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2738"><span data-dcnode-id="2744" instrument_node="">Is it coincidence that Nancy became popular around when the first </span><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguinrandomhouse.com/series/NAD/nancy-drew" target="_blank"><span data-dcnode-id="2743" instrument_node="">“Nancy Drew" novels</span></a><span data-dcnode-id="2741" instrument_node=""> entered circulation in 1930? There's little evidence to support a connection, but it seems to make sense that the name Nancy would rise as a fictional Nancy rocketed to success. The name remained popular for a short stretch, cracking the top 10 through the 1940s and early 1950s.</span><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2709" data-index="105"><figure class="frameme" data-cbid="189" data-dcnode-id="2731"><div class="theframe" data-dcnode-id="2732" data-image="//townsquare.media/site/341/files/2020/05/79.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">#11. Christopher (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2710"><p class="caption" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Pixnio</span></p><h2 class="item-title" data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">#11. Christopher (boys)</span></h2><div class="item-description" data-dcnode-id="2711"><p data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Total babies born in last 100 years: 2,018,780</span></p><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Rank in 2017: #38</span></p><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Total babies born in 2017: 8,255</span></p><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Peak year: 1984</span></p><p data-dcnode-id="2714"><span data-dcnode-id="2718" instrument_node="">Christopher was once a metaphorical name </span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/christopher" target="_blank"><span data-dcnode-id="2717" instrument_node="">used by early Christians</span></a><span data-dcnode-id="2715" instrument_node=""> to signify that they bore Christ in their hearts. Today, it's an incredibly popular choice used widely throughout the country. Christopher was in the top three most popular boys names throughout much of the 1970s and 1980s.</span></p><p data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2683" data-index="106"><figure class="frameme" data-cbid="190" data-dcnode-id="2705"><div class="theframe" data-dcnode-id="2706" data-image="//townsquare.media/site/341/files/2020/05/80.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">#11. Karen (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2684"><p class="caption" data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">#11. Karen (girls)</span></h2><div class="item-description" data-dcnode-id="2685"><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Total babies born in last 100 years: 984,886</span></p><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Rank in 2017: #556</span></p><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Total babies born in 2017: 552</span></p><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Peak year: 1957</span></p><p data-dcnode-id="2688"><span data-dcnode-id="2692" instrument_node="">Throughout the late 1950s and 1960s, Karen was one of the most popular girls' names in the country. Somewhere along the way, however, the name </span><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polygon.com/2016/10/25/13403924/nintendo-switch-karen-meme-reveal-video" target="_blank"><span data-dcnode-id="2691" instrument_node="">became a running joke</span></a><span data-dcnode-id="2689" instrument_node="">, and the internet became peppered with Karen-centric memes. Apologies to Karens everywhere.</span></p><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2682"></div><div class="photogallery-item" data-dcnode-id="2653" data-index="108"><figure class="frameme" data-cbid="191" data-dcnode-id="2678"><div class="theframe" data-dcnode-id="2679" data-image="//townsquare.media/site/341/files/2020/05/811.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">#10. Charles (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2654"><p class="caption" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">#10. Charles (boys)</span></h2><div class="item-description" data-dcnode-id="2655"><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Total babies born in last 100 years: 2,144,823</span></p><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Rank in 2017: #49</span></p><p data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Total babies born in 2017: 7,130</span></p><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2658"><span data-dcnode-id="2665" instrument_node="">Charlie, Chuck, Chip—Charles may well be the</span><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node=""> </span></em><span data-dcnode-id="2662" instrument_node="">name of nicknames, though </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rottentomatoes.com/franchise/chucky/" target="_blank"><span data-dcnode-id="2661" instrument_node="">Chucky may be one worth avoiding</span></a><span data-dcnode-id="2659" instrument_node="">. Charles is a name belonging to kings, popular dog breeds, and many, many men in the United States. Decades after its peak popularity, Charles remains within the top 50 most common names for boys born in 2017.</span></p><p data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2630" data-index="109"><figure class="frameme" data-cbid="192" data-dcnode-id="2649"><div class="theframe" data-dcnode-id="2650" data-image="//townsquare.media/site/341/files/2020/05/821.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">#10. Margaret (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2631"><p class="caption" data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Public Domain Pictures</span></p><h2 class="item-title" data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">#10. Margaret (girls)</span></h2><div class="item-description" data-dcnode-id="2632"><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Total babies born in last 100 years: 993,115</span></p><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Rank in 2017: #132</span></p><p data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Total babies born in 2017: 2,242</span></p><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Peak year: 1921</span></p><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">The height of popularity may have been nearly a century ago, but Margarets need not fear that their name is falling entirely out of fashion. Maybe it's the plethora of nicknames attached (Maggie, Meg, Peggy), but Margaret has begun to slowly increase in popularity in recent years.</span></p><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2604" data-index="110"><figure class="frameme" data-cbid="193" data-dcnode-id="2626"><div class="theframe" data-dcnode-id="2627" data-image="//townsquare.media/site/341/files/2020/05/83.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">#9. Thomas (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2605"><p class="caption" data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">#9. Thomas (boys)</span></h2><div class="item-description" data-dcnode-id="2606"><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Total babies born in last 100 years: 2,173,965</span></p><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Rank in 2017: #48</span></p><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Total babies born in 2017: 7,131</span></p><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Peak year: 1952</span></p><p data-dcnode-id="2609"><span data-dcnode-id="2613" instrument_node="">You know a name is top of the heap when it's featured on </span><a data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bonappetit.com/story/thomas-english-muffin-flavors-taste-test" target="_blank"><span data-dcnode-id="2612" instrument_node="">the definitive English muffin</span></a><span data-dcnode-id="2610" instrument_node="">. Sure, there's also Thomas Jefferson and Tom Hanks, but it doesn't get much better than a buttery breakfast treat. The name Thomas is still among the 50 most popular for boys.</span></p><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2603"></div><div class="photogallery-item" data-dcnode-id="2577" data-index="112"><figure class="frameme" data-cbid="194" data-dcnode-id="2599"><div class="theframe" data-dcnode-id="2600" data-image="//townsquare.media/site/341/files/2020/05/84.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">#9. Sarah (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2578"><p class="caption" data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">#9. Sarah (girls)</span></h2><div class="item-description" data-dcnode-id="2579"><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Total babies born in last 100 years: 996,442</span></p><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Rank in 2017: #62</span></p><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Total babies born in 2017: 3,986</span></p><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Peak year: 1982</span></p><p data-dcnode-id="2580"><span data-dcnode-id="2586" instrument_node="">All Sarahs understand the great “h" or “no h" debate, as well as </span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/sarahaspler/sarah" target="_blank"><span data-dcnode-id="2585" instrument_node="">the other struggles</span></a><span data-dcnode-id="2583" instrument_node=""> that come along with having such a popular name. Sarah was close to the top 50 most popular girls names 100 years ago, and then took a dip in the middle of the century. But it returned with strength in the early 1980s, and remains relatively popular today.</span><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2551" data-index="113"><figure class="frameme" data-cbid="195" data-dcnode-id="2573"><div class="theframe" data-dcnode-id="2574" data-image="//townsquare.media/site/341/files/2020/05/85.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">#8. Joseph (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2552"><p class="caption" data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">#8. Joseph (boys)</span></h2><div class="item-description" data-dcnode-id="2553"><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Total babies born in last 100 years: 2,383,976</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Rank in 2017: #19</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Total babies born in 2017: 10,360</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Peak year: 1956</span></p><p data-dcnode-id="2554"><span data-dcnode-id="2560" instrument_node="">Joseph was a biblical figure, but his story is often told with a little extra flair (and a lot more dancing), via the musical “</span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themusicalcompany.com/show/joseph/full-synopsis/" target="_blank"><span data-dcnode-id="2559" instrument_node="">Joseph and the Amazing Technicolor Dreamcoat</span></a><span data-dcnode-id="2557" instrument_node="">."&nbsp;The name has been consistently popular throughout the last century, remaining in the top 20 names for boys as of 2017.</span><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2528" data-index="114"><figure class="frameme" data-cbid="196" data-dcnode-id="2547"><div class="theframe" data-dcnode-id="2548" data-image="//townsquare.media/site/341/files/2020/05/86.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">#8. Jessica (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2529"><p class="caption" data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">#8. Jessica (girls)</span></h2><div class="item-description" data-dcnode-id="2530"><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Total babies born in last 100 years: 1,043,393</span></p><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Rank in 2017: #248</span></p><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Total babies born in 2017: 1,271</span></p><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Peak year: 1987</span></p><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">In 1918, Jessica ranked as the 963rd most popular girls name, barely scratching the top 1,000. The name certainly made up for lost time over the next 60 years. By 1980, Jessica was the third most popular name for baby girls, and held this spot or higher for nearly twenty years.</span></p><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2527"></div><div class="photogallery-item" data-dcnode-id="2501" data-index="116"><figure class="frameme" data-cbid="197" data-dcnode-id="2523"><div class="theframe" data-dcnode-id="2524" data-image="//townsquare.media/site/341/files/2020/05/87.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">#7. Richard (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2502"><p class="caption" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">PxHere</span></p><h2 class="item-title" data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">#7. Richard (boys)</span></h2><div class="item-description" data-dcnode-id="2503"><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Total babies born in last 100 years: 2,487,942</span></p><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Rank in 2017: #175</span></p><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Total babies born in 2017: 2,269</span></p><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Peak year: 1946</span></p><p data-dcnode-id="2506"><span data-dcnode-id="2510" instrument_node="">How did the name Richard </span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mentalfloss.com/article/24761/origins-10-nicknames" target="_blank"><span data-dcnode-id="2509" instrument_node="">give way to the nickname “Dick”</span></a><span data-dcnode-id="2507" instrument_node="">? Supposedly, there were so many Richards during the Middle Ages that the name was shortened to Rick when written, which eventually led to the rhyming variation, Dick. The name remained so common that the phrase “every Tom, Dick, and Harry" came to mean, simply, “everyone.”</span></p><p data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2475" data-index="117"><figure class="frameme" data-cbid="198" data-dcnode-id="2497"><div class="theframe" data-dcnode-id="2498" data-image="//townsquare.media/site/341/files/2020/05/88.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">#7. Susan (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2476"><p class="caption" data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Impact Photography // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">#7. Susan (girls)</span></h2><div class="item-description" data-dcnode-id="2477"><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Total babies born in last 100 years: 1,106,049</span></p><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Rank in 2017: #963</span></p><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Total babies born in 2017: 272</span></p><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Peak year: 1955</span></p><p data-dcnode-id="2480"><span data-dcnode-id="2484" instrument_node="">Susan is seen today as somewhat old fashioned, barely cracking the top 1,000 most popular girls names in 2017. However, Susan saw a lengthy run of success a few decades ago, particularly throughout the 1950s and 1960s. Though Susan's&nbsp;heyday may be over, there is always </span><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nameberry.com/babyname/Susan" target="_blank"><span data-dcnode-id="2483" instrument_node="">hope of a grand return</span></a><span data-dcnode-id="2481" instrument_node="">.</span></p><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2449" data-index="118"><figure class="frameme" data-cbid="199" data-dcnode-id="2471"><div class="theframe" data-dcnode-id="2472" data-image="//townsquare.media/site/341/files/2020/05/89.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">#6. David (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2450"><p class="caption" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">#6. David (boys)</span></h2><div class="item-description" data-dcnode-id="2451"><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Total babies born in last 100 years: 3,557,118</span></p><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Rank in 2017: #23</span></p><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Total babies born in 2017: 10,124</span></p><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Peak year: 1955</span></p><p data-dcnode-id="2454"><span data-dcnode-id="2458" instrument_node="">There have been more than 3 million Davids born in the past century, 10,000&nbsp;of them alone in 2017. However, long before, Davids held a few rather impressive titles, including King of Israel, and the esteemed </span><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.accademia.org/explore-museum/artworks/michelangelos-david/" target="_blank"><span data-dcnode-id="2457" instrument_node="">marble masterpiece</span></a><span data-dcnode-id="2455" instrument_node="">.</span></p><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2448"></div><div class="photogallery-item" data-dcnode-id="2422" data-index="120"><figure class="frameme" data-cbid="200" data-dcnode-id="2444"><div class="theframe" data-dcnode-id="2445" data-image="//townsquare.media/site/341/files/2020/05/90.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">#6. Barbara (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2423"><p class="caption" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Oksana Kuzmina // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">#6. Barbara (girls)</span></h2><div class="item-description" data-dcnode-id="2424"><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Total babies born in last 100 years: 1,410,018</span></p><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Rank in 2017: #908</span></p><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Total babies born in 2017: 292</span></p><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2425"><span data-dcnode-id="2431" instrument_node="">The name Barbara was within the top 10 most popular names for girls for much of the first half of the 20th century. It is no longer considered quite as modern, but that certainly does not mean Barbara is gone for good—especially not with a particular </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/hollywood/2017/10/stranger-things-season-2-barb-story-justice-for-barb-what-happened-to-barb" target="_blank"><span data-dcnode-id="2430" instrument_node="">“Barb" obsession</span></a><span data-dcnode-id="2428" instrument_node=""> running strong.</span><br data-dcnode-id="2427"><span data-dcnode-id="2426" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2396" data-index="121"><figure class="frameme" data-cbid="201" data-dcnode-id="2418"><div class="theframe" data-dcnode-id="2419" data-image="//townsquare.media/site/341/files/2020/05/911.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">#5. William (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2397"><p class="caption" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">#5. William (boys)</span></h2><div class="item-description" data-dcnode-id="2398"><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Total babies born in last 100 years: 3,662,222</span></p><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Rank in 2017: #3</span></p><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Total babies born in 2017: 14,904</span></p><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2401"><span data-dcnode-id="2405" instrument_node="">To all those still mourning the fact that both&nbsp;</span><a data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/style/2018/11/prince-charles-documentary-details" target="_blank"><span data-dcnode-id="2404" instrument_node="">Prince William</span></a><span data-dcnode-id="2402" instrument_node=""> is unavailable for marriage, sincere apologies. Maybe it's some kind of consolation that there are many other Williams out there. In fact, the name William has been immensely popular for decades; it was the second most popular boys name in 1918, and 100 years later remains just as desirable.</span></p><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2370" data-index="122"><figure class="frameme" data-cbid="202" data-dcnode-id="2392"><div class="theframe" data-dcnode-id="2393" data-image="//townsquare.media/site/341/files/2020/05/921.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">#5. Elizabeth (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2371"><p class="caption" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">George Rudy // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">#5. Elizabeth (girls)</span></h2><div class="item-description" data-dcnode-id="2372"><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Total babies born in last 100 years: 1,443,262</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Rank in 2017: #13</span></p><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Total babies born in 2017: 8,915</span></p><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Peak year: 1990</span></p><p data-dcnode-id="2375"><span data-dcnode-id="2379" instrument_node="">Another name, another foray into royalty. </span><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.royal.uk/elizabeth-i" target="_blank"><span data-dcnode-id="2378" instrument_node="">Elizabeth I was the last Tudor monarch</span></a><span data-dcnode-id="2376" instrument_node="">, and of course Queen Elizabeth II is very much in charge today. Elizabeth has seen immense swells of popularity as a name, and close to 9,000 new little Elizabeths were born into the United States in 2017.</span></p><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2369"></div><div class="photogallery-item" data-dcnode-id="2343" data-index="124"><figure class="frameme" data-cbid="203" data-dcnode-id="2365"><div class="theframe" data-dcnode-id="2366" data-image="//townsquare.media/site/341/files/2020/05/93.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">#4. Michael (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2344"><p class="caption" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Michael Beck // Flickr</span></p><h2 class="item-title" data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">#4. Michael (boys)</span></h2><div class="item-description" data-dcnode-id="2345"><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Total babies born in last 100 years: 4,315,359</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Rank in 2017: #12</span></p><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Total babies born in 2017: 12,579</span></p><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Peak year: 1957</span></p><p data-dcnode-id="2348"><span data-dcnode-id="2352" instrument_node="">The name Michael literally translates in Hebrew to the rhetorical question </span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/michael" target="_blank"><span data-dcnode-id="2351" instrument_node="">“who is like God?”</span></a><span data-dcnode-id="2349" instrument_node=""> The question is meant to imply that, in fact, no one is like God. Still, there are many people that like the name Michael—in fact, this name was the 12th most popular name in 2017.</span></p><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2319" data-index="125"><figure class="frameme" data-cbid="204" data-dcnode-id="2339"><div class="theframe" data-dcnode-id="2340" data-image="//townsquare.media/site/341/files/2020/05/94.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">#4. Linda (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2320"><p class="caption" data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Ivanna-Ivashka // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">#4. Linda (girls)</span></h2><div class="item-description" data-dcnode-id="2321"><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Total babies born in last 100 years: 1,448,059</span></p><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Rank in 2017: #708</span></p><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Total babies born in 2017: 404</span></p><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2322"><span data-dcnode-id="2326" instrument_node="">Like Karen, the name Linda comes along with certain connotations (see short-lived Fox comedy </span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvline.com/2017/05/23/linda-from-hr-cancelled-fox-pilot-lauren-graham/" target="_blank"><span data-dcnode-id="2325" instrument_node="">“Linda From HR.”</span></a><span data-dcnode-id="2323" instrument_node="">) At certain points, however, Linda was at the top of the heap for baby names. Through the 1940s, Linda was one of the most popular girls names in the country.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2295" data-index="126"><figure class="frameme" data-cbid="205" data-dcnode-id="2315"><div class="theframe" data-dcnode-id="2316" data-image="//townsquare.media/site/341/files/2020/05/95.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">#3. Robert (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2296"><p class="caption" data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">#3. Robert (boys)</span></h2><div class="item-description" data-dcnode-id="2297"><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Total babies born in last 100 years: 4,571,072</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Rank in 2017: #65</span></p><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Total babies born in 2017: 5,507</span></p><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">One hundred years ago, Robert was the fourth most popular name for baby boys. As of 2017, this Robert appreciation has waned slightly, but the name still remains amongst the top 100 as of 2017. Fun fact: Rob as a nickname for Robert was once rivaled by variations such as&nbsp;</span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behindthename.com/name/bob" target="_blank"><span data-dcnode-id="2301" instrument_node="">Dob and Hob</span></a><span data-dcnode-id="2299" instrument_node="">.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2294"></div><div class="photogallery-item" data-dcnode-id="2266" data-index="128"><figure class="frameme" data-cbid="206" data-dcnode-id="2290"><div class="theframe" data-dcnode-id="2291" data-image="//townsquare.media/site/341/files/2020/05/96.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">#3. Jennifer (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2267"><p class="caption" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">pixelheadphoto digitalskillet // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">#3. Jennifer (girls)</span></h2><div class="item-description" data-dcnode-id="2268"><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Total babies born in last 100 years: 1,465,932</span></p><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Rank in 2017: #310</span></p><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Total babies born in 2017: 1,042</span></p><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Peak year: 1972</span></p><p data-dcnode-id="2271"><span data-dcnode-id="2277" instrument_node="">Today, some Jennifers </span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/jenniferabidor/17-things-only-people-named-jennifer-will-understand" target="_blank"><span data-dcnode-id="2276" instrument_node="">may be insecure</span></a><span data-dcnode-id="2274" instrument_node=""> that their once massively dominant name has been overtaken by others in recent years. In 2017, Jennifer ranked as #310 for baby girl names. However, Jens should take comfort in the fact that their name at various points has been so insanely popular,&nbsp;</span><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalpost.com/news/the-jennifer-epidemic-how-the-spiking-popularity-of-different-baby-names-cycle-like-genetic-drift" target="_blank"><span data-dcnode-id="2273" instrument_node="">it was referred to as an “epidemic.”</span></a></p><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2240" data-index="129"><figure class="frameme" data-cbid="207" data-dcnode-id="2262"><div class="theframe" data-dcnode-id="2263" data-image="//townsquare.media/site/341/files/2020/05/97.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">#2. John (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2241"><p class="caption" data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Max Pixel</span></p><h2 class="item-title" data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">#2. John (boys)</span></h2><div class="item-description" data-dcnode-id="2242"><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Total babies born in last 100 years: 4,593,824</span></p><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Rank in 2017: #27</span></p><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Total babies born in 2017: 9,434</span></p><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Peak year: 1947</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2249" instrument_node="">John's high ranking should not come as a surprise to most—it's literally </span><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mentalfloss.com/article/29996/why-are-unidentified-people-called-john-or-jane-doe" target="_blank"><span data-dcnode-id="2248" instrument_node="">the name given to people</span></a><span data-dcnode-id="2246" instrument_node=""> whose names are unknown or withheld in particular circumstances. John was the top name for boys in 1918, and remains quite popular a full century later.</span><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node="">&nbsp;</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2214" data-index="130"><figure class="frameme" data-cbid="208" data-dcnode-id="2236"><div class="theframe" data-dcnode-id="2237" data-image="//townsquare.media/site/341/files/2020/05/98.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">#2. Patricia (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2215"><p class="caption" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">CroMary // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">#2. Patricia (girls)</span></h2><div class="item-description" data-dcnode-id="2216"><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Total babies born in last 100 years: 1,564,152</span></p><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Rank in 2017: #889</span></p><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Total babies born in 2017: 302</span></p><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Peak year: 1951</span></p><p data-dcnode-id="2219"><span data-dcnode-id="2223" instrument_node="">Hats off to Patricia. This name, the popularity of which peaked in 1951, remained within the top 10 baby names for girls for nearly three decades. Patricia is </span><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nameberry.com/babyname/Patricia" target="_blank"><span data-dcnode-id="2222" instrument_node="">derived from the Latin word patrician</span></a><span data-dcnode-id="2220" instrument_node="">, meaning noble.</span></p><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">&nbsp;</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2213"></div><div class="photogallery-item" data-dcnode-id="2202" data-index="132"><figure class="frameme" data-cbid="209" data-dcnode-id="2209"><div class="theframe" data-dcnode-id="2210" data-image="//townsquare.media/site/341/files/2020/05/99.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">#1. James (boys)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2203"><p class="caption" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Pexels</span></p><h2 class="item-title" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">#1. James (boys)</span></h2><span data-dcnode-id="2204" instrument_node=""></span></div></div><div class="photogallery-item" data-dcnode-id="2176" data-index="133"><figure class="frameme" data-cbid="210" data-dcnode-id="2198"><div class="theframe" data-dcnode-id="2199" data-image="//townsquare.media/site/341/files/2020/05/100.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">#1. Mary (girls)</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2177"><p class="caption" data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">izzet ugutmen // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">#1. Mary (girls)</span></h2><div class="item-description" data-dcnode-id="2178"><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Total babies born in last 100 years: 3,393,328</span></p><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Rank in 2017: #126</span></p><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Total babies born in 2017: 2,381</span></p><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Peak year: 1921</span></p><p data-dcnode-id="2179"><span data-dcnode-id="2185" instrument_node="">Mary was the top girls name in the country in 1918, which certainly proves that this name stands the test of time. Not only has the name remained a favored choice throughout the century, it actually held that top spot from 1918 all the way through 1946. Though there have been many influential Marys throughout the years, the best known is likely </span><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Mary-mother-of-Jesus" target="_blank"><span data-dcnode-id="2184" instrument_node="">the Virgin Mary, mother of Jesus Christ.</span></a><br data-dcnode-id="2182"><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">&nbsp;</span></p></div></div></div></div></div></div><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">&nbsp;</span></p><div class="in-view-sentinel-wrapper" data-dcnode-id="366"><div class="in-view-sentinel in-view-sentinel-top" data-cbid="2" data-dcnode-id="2170"></div><div class="in-view-sentinel in-view-sentinel-bottom" data-cbid="3" data-dcnode-id="2169"></div><div class="photogallery-wrapper blog-photogallery" data-dcnode-id="367"><h2 class="photogallery-title" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">KEEP READING: Scroll to see what the big headlines were the year you were born</span></h2><div class="photogallery-container" data-dcnode-id="368" id="photogallery-76-255126-0" style="padding-top: 0px; padding-bottom: 0px;"><div class="photogallery-item" data-dcnode-id="2132" data-index="0"><figure class="frameme frame-loaded" data-dcnode-id="2163"><div class="theframe" data-dcnode-id="2164" data-image="//townsquare.media/site/341/files/2020/04/05.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/05.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Major newspaper headlines from the year you were born</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2133"><p class="caption" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Mick Baker // Flickr</span></p><h2 class="item-title" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Major newspaper headlines from the year you were born</span></h2><div class="item-description" data-dcnode-id="2134"><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Greener's Law states, "Never pick a fight with a man who buys ink by the barrel," a sentiment designed to convey the sheer power of publishing. Newspapers have brought down corrupt presidents, exposed malfeasance during wartime, and crushed the presumption of benevolence associated with powerful religious institutions. They've also connected generations of average people to the larger world around them and provided critical information the public wouldn't have otherwise had.</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">From World Series victories to epic naval battles, pop-culture revolutions to actual revolutions, the events that shape the world have long been told through newspaper articles—and the main point of entry to every article is the headline. Great headlines speak for themselves, and long before online clickbait bloggers rendered the headline more important than the actual article itself, carefully chosen words written in the active voice and printed in large, boldface type, compelled the reader to keep reading.</span></p><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">The day of the local newsboy shouting "Extra! Extra!" to passersby eager to gobble up the latest information is in the past, yet the classic newspaper continues to stain fingers every morning across the country and the world. Likewise, the stories editors select for front-page, above-the-fold, bold-type headline coverage continue to drive the news cycle.</span></p><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Here's a look at the headlines that captured the moment, spread the word, and helped shape public opinion over the last 100 years.</span></p><p data-dcnode-id="2145"><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">You may also like:</span></strong><span data-dcnode-id="2148" instrument_node=""> </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3498/what-marriage-was-year-you-were-born" target="_blank"><span data-dcnode-id="2147" instrument_node="">What marriage was like the year you were born</span></a></p><p data-dcnode-id="2135"><b data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">By:</span></b><span data-dcnode-id="2142" instrument_node=""> Andrew Lisa</span><br data-dcnode-id="2141"><b data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">From:</span></b><span data-dcnode-id="2138" instrument_node=""> </span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/2616/major-newspaper-headlines-year-you-were-born" target="_blank"><span data-dcnode-id="2137" instrument_node="">Major newspaper headlines from the year you were born</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="2116" data-index="1"><figure class="frameme frame-loaded" data-dcnode-id="2128"><div class="theframe" data-dcnode-id="2129" data-image="//townsquare.media/site/341/files/2020/04/120.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/120.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">1920: 'U.S. WOMEN GET VOTE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2117"><p class="caption" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Harris &amp; Ewing Collection // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">1920: 'U.S. WOMEN GET VOTE'</span></h2><div class="item-description" data-dcnode-id="2118"><p data-dcnode-id="2119"><span data-dcnode-id="2123" instrument_node="">On Aug. 18, 1920, The San Francisco Call summed up the spirit of the </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ourdocuments.gov/doc.php%3Fflash%3Dfalse%26doc%3D63" target="_blank"><span data-dcnode-id="2122" instrument_node="">Nineteenth Amendment</span></a><span data-dcnode-id="2120" instrument_node=""> with a single headline. More than 40 years after it was introduced in 1878, the amendment granted women's suffrage in one of the most significant expansions of the voting franchise in American history.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2097" data-index="2"><figure class="frameme frame-loaded" data-dcnode-id="2112"><div class="theframe" data-dcnode-id="2113" data-image="//townsquare.media/site/341/files/2020/04/220.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/220.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">1921: 'LOOT, ARSON, MURDER!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2098"><p class="caption" data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">1921: 'LOOT, ARSON, MURDER!'</span></h2><div class="item-description" data-dcnode-id="2099"><p data-dcnode-id="2100"><span data-dcnode-id="2107" instrument_node="">On June 10, 1921, The Black Dispatch of Oklahoma City </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gateway.okhistory.org/ark%3A/67531/metadc152336/m1/1/" target="_blank"><span data-dcnode-id="2106" instrument_node="">reported on what would go down as one of the most significant instances of racial terror</span></a><span data-dcnode-id="2104" instrument_node=""> in American history: the Tulsa race riots. Perhaps more fittingly described by the Tulsa Historical Society &amp; Museum as the </span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tulsahistory.org/exhibit/1921-tulsa-race-massacre/" target="_blank"><span data-dcnode-id="2103" instrument_node="">Tulsa Race Massacre</span></a><span data-dcnode-id="2101" instrument_node="">, the blaring headline reflected the fear and confusion felt in Oklahoma's black community when a massive and enraged white mob looted, burned, and destroyed the affluent African American town of Greenwood, killing hundreds along the way.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2096"></div><div class="photogallery-item" data-dcnode-id="2080" data-index="4"><figure class="frameme frame-loaded" data-dcnode-id="2092"><div class="theframe" data-dcnode-id="2093" data-image="//townsquare.media/site/341/files/2020/04/316.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/316.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">1922: 'EINSTEIN GETS NOBEL PHYSICS PRIZE FOR 1921'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2081"><p class="caption" data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">1922: 'EINSTEIN GETS NOBEL PHYSICS PRIZE FOR 1921'</span></h2><div class="item-description" data-dcnode-id="2082"><p data-dcnode-id="2083"><span data-dcnode-id="2087" instrument_node="">If you were reading the New York Herald on Nov. 10, 1922, you might have missed this small headline </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newspapers.com/clip/20907006/albert_einstein_is_awarded_the_nobel/" target="_blank"><span data-dcnode-id="2086" instrument_node="">buried on page 11</span></a><span data-dcnode-id="2084" instrument_node="">, but the seemingly insignificant article detailed one of the biggest moments in the history of science. Although physicist Albert Einstein was most famous for his theory of relativity, that work never earned him a Nobel Prize. What did, however, was his work explaining the science behind the photoelectric effect, which deals with the transfer of electricity through light. It is the science that drives today's solar-powered energy.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2064" data-index="5"><figure class="frameme frame-loaded" data-dcnode-id="2076"><div class="theframe" data-dcnode-id="2077" data-image="//townsquare.media/site/341/files/2020/04/417.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/417.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">1923: 'PRESIDENT HARDING DEAD END CAME VERY SUDDENLY'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2065"><p class="caption" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">National Photo Company // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">1923: 'PRESIDENT HARDING DEAD END CAME VERY SUDDENLY'</span></h2><div class="item-description" data-dcnode-id="2066"><p data-dcnode-id="2067"><span data-dcnode-id="2071" instrument_node="">On Aug. 3, 1923, The Boston Post rolled out a blaring headline that reflected the shock of the nation at the sudden </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/blog/after-90-years-president-warren-hardings-death-still-unsettled" target="_blank"><span data-dcnode-id="2070" instrument_node="">death of President Warren G. Harding</span></a><span data-dcnode-id="2068" instrument_node="">. It's widely accepted now that Harding died of a heart attack, but at the time, public curiosity, misinformation, and rampant rumors fueled a whirlwind of speculation and conspiracy theories that would endure for decades.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2042" data-index="6"><figure class="frameme frame-loaded" data-dcnode-id="2060"><div class="theframe" data-dcnode-id="2061" data-image="//townsquare.media/site/341/files/2020/04/514.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/514.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">1924: 'LEOPOLD AND LOEB GET LIFE SENTENCE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2043"><p class="caption" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">1924: 'LEOPOLD AND LOEB GET LIFE SENTENCE'</span></h2><div class="item-description" data-dcnode-id="2044"><p data-dcnode-id="2051"><span data-dcnode-id="2055" instrument_node="">Before there was O.J. there were Nathan Leopold and Richard Loeb, </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//content.time.com/time/specials/packages/article/0%2C28804%2C1900368_1900369_1900324%2C00.html" target="_blank"><span data-dcnode-id="2054" instrument_node="">a pair of privileged, rich, successful young men</span></a><span data-dcnode-id="2052" instrument_node=""> who murdered a 14-year-old boy named Bobby Franks merely for the thrill and to see if they could pull it off. Dubbed the "crime of the century" in media outlets across the country, the story was a national sensation. Famed attorney Clarence Darrow was hired to plead their case, but Darrow proved less capable than O.J.'s dream team—the pair was convicted and sentenced to life, as reported by The Omaha Evening Bee on Sept. 10, 1924.</span></p><p data-dcnode-id="2045"><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">You may also like: </span></strong><span data-dcnode-id="2048" instrument_node=""> </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3386/oldest-cities-america%234" target="_blank"><span data-dcnode-id="2047" instrument_node="">Oldest cities in America</span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="2041"></div><div class="photogallery-item" data-dcnode-id="2025" data-index="8"><figure class="frameme frame-loaded" data-dcnode-id="2037"><div class="theframe" data-dcnode-id="2038" data-image="//townsquare.media/site/341/files/2020/04/614.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/614.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">1925: 'SCOPES “GUILTY” IN APE CASE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2026"><p class="caption" data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Hulton Archive // Getty Images</span></p><h2 class="item-title" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">1925: 'SCOPES “GUILTY” IN APE CASE'</span></h2><div class="item-description" data-dcnode-id="2027"><p data-dcnode-id="2028"><span data-dcnode-id="2032" instrument_node="">On July 21, 1925, The Chicago Daily News reported on the outcome of the </span><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ushistory.org/us/47b.asp" target="_blank"><span data-dcnode-id="2031" instrument_node="">Scopes "monkey trial"</span></a><span data-dcnode-id="2029" instrument_node="">—which it referred to as the "ape case"—chronicled in the 1960 movie "Inherit the Wind." A little more than 65 years after Charles Darwin published his Theory of Evolution in 1859, a Dayton, Tenn. science teacher named John Scopes was arrested, tried, and convicted for teaching evolution, which was against the law in Tennessee. The sensational trial pitted famed lawyers Clarence Darrow and William Jennings Bryan against each other in a contest that captivated the nation and highlighted an American religious divide that continues to this day.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="2009" data-index="9"><figure class="frameme frame-loaded" data-dcnode-id="2021"><div class="theframe" data-dcnode-id="2022" data-image="//townsquare.media/site/341/files/2020/04/714.jpg" rel="" style="background-image: url(&quot;//townsquare.media/site/341/files/2020/04/714.jpg?w=980&amp;q=75&quot;);"><figcaption class="visually-hidden" data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">1926: '2000 DEATHS IN HURRICANE; LOSSES REACH $250,000,000'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="2010"><p class="caption" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Topical Press Agency // Getty Images</span></p><h2 class="item-title" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">1926: '2000 DEATHS IN HURRICANE; LOSSES REACH $250,000,000'</span></h2><div class="item-description" data-dcnode-id="2011"><p data-dcnode-id="2012"><span data-dcnode-id="2016" instrument_node="">By 1926, Southern Florida was booming, but the growing population was dangerously naive to the danger they faced from serious hurricanes in the bustling resort destination. That naivete was shattered when, without warning, a category 4 storm </span><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weather.gov/mfl/miami_hurricane" target="_blank"><span data-dcnode-id="2015" instrument_node="">known as the Great Miami Hurricane</span></a><span data-dcnode-id="2013" instrument_node=""> tore through the Caribbean and crashed into southern Florida, killing hundreds. The lack of hurricane knowledge compelled many to head out of their shelters when the eye of the storm passed over the region because they wrongly believed that the storm was over. Like so many papers during the catastrophe, the San Francisco Chronicle relied on early, unconfirmed reports that exaggerated the death toll.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1993" data-index="10"><figure class="frameme" data-cbid="17" data-dcnode-id="2005"><div class="theframe" data-dcnode-id="2006" data-image="//townsquare.media/site/341/files/2020/04/810.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">1927: 'LINDBERGH LANDS IN PARIS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1994"><p class="caption" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Central Press // Getty Images</span></p><h2 class="item-title" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">1927: 'LINDBERGH LANDS IN PARIS'</span></h2><div class="item-description" data-dcnode-id="1995"><p data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node="">On May 22, 1927, the Chicago Sunday Tribune </span><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.pinimg.com/originals/99/d4/9b/99d49b3d7e6896c50b35d7f639e6ef1e.png" target="_blank"><span data-dcnode-id="1999" instrument_node="">printed news of one of the greatest accomplishments in aviation history</span></a><span data-dcnode-id="1997" instrument_node="">. On May 20, famed pilot Charles Lindbergh took off from Roosevelt Field in Long Island in the Spirit of St. Louis. About 33.5 hours and 3,600 miles later, he landed safely in Paris after completing the first solo, nonstop trans-Atlantic flight in world history.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1992"></div><div class="photogallery-item" data-dcnode-id="1976" data-index="12"><figure class="frameme" data-cbid="18" data-dcnode-id="1988"><div class="theframe" data-dcnode-id="1989" data-image="//townsquare.media/site/341/files/2020/04/910.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">1928: 'YANK GIRL FLIES ATLANTIC'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1977"><p class="caption" data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">SDASM Archives // flickr</span></p><h2 class="item-title" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">1928: 'YANK GIRL FLIES ATLANTIC'</span></h2><div class="item-description" data-dcnode-id="1978"><p data-dcnode-id="1979"><span data-dcnode-id="1983" instrument_node="">A little more than a year after Charles Lindbergh raised the bar for aviators everywhere, </span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americaslibrary.gov/aa/earhart/aa_earhart_atlantic_1.html" target="_blank"><span data-dcnode-id="1982" instrument_node="">Amelia Earhart earned international headlines</span></a><span data-dcnode-id="1980" instrument_node=""> of her own when she became the first woman in history to cross the Atlantic Ocean in an airplane. On June 18, 1928, the Wisconsin News summed up the event with a headline that would likely be chided as condescending in modern times.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1954" data-index="13"><figure class="frameme" data-cbid="19" data-dcnode-id="1972"><div class="theframe" data-dcnode-id="1973" data-image="//townsquare.media/site/341/files/2020/04/104.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">1929: 'WALL ST. IN PANIC AS STOCKS CRASH'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1955"><p class="caption" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">1929: 'WALL ST. IN PANIC AS STOCKS CRASH'</span></h2><div class="item-description" data-dcnode-id="1956"><p data-dcnode-id="1963"><span data-dcnode-id="1967" instrument_node="">The Great Depression started on Oct. 24, 1929, when panic selling led to a major stock market crash on what is now known as Black Thursday. By Monday, the market had dropped another 13% and suffered roughly the same losses the next day, known as Black Monday and Black Tuesday. The roaring '20s were over, and across the water from Wall Street in the borough of Brooklyn, the Brooklyn Daily Eagle </span><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/news/2017/10/23/day-1929-wall-street-crash-begins-wiping-billions-stock-markets/" target="_blank"><span data-dcnode-id="1966" instrument_node="">cooked up a headline</span></a><span data-dcnode-id="1964" instrument_node=""> that summarized the darkening national mood.</span></p><p data-dcnode-id="1957"><strong data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1960" instrument_node=""> </span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3245/most-and-least-popular-senators-america" target="_blank"><span data-dcnode-id="1959" instrument_node="">Most and least popular senators in America</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1938" data-index="14"><figure class="frameme" data-cbid="20" data-dcnode-id="1950"><div class="theframe" data-dcnode-id="1951" data-image="//townsquare.media/site/341/files/2020/04/119.jpg" rel="" style="background-size: contain;"><figcaption class="visually-hidden" data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">1930: 'SEE ANOTHER WORLD IN THE SKY'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1939"><p class="caption" data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Justin Cowart // flickr</span></p><h2 class="item-title" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">1930: 'SEE ANOTHER WORLD IN THE SKY'</span></h2><div class="item-description" data-dcnode-id="1940"><p data-dcnode-id="1941"><span data-dcnode-id="1945" instrument_node="">On Friday, March 14, a headline in the Chicago Daily Tribune </span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mitchellarchives.com/the-discovery-of-pluto.htm" target="_blank"><span data-dcnode-id="1944" instrument_node="">summed up the wonderment of the world</span></a><span data-dcnode-id="1942" instrument_node="">, which had just learned it had another, albeit very distant, neighbor. That neighbor was tiny, remote, and frozen Pluto, an object that astronomers had been hunting for a quarter-century. Little was known about Pluto other than that the orb existed at the fringes of our Solar System. Early reports suggested the planet-not-planet was bigger than Earth—or even Jupiter.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1937"></div><div class="photogallery-item" data-dcnode-id="1921" data-index="16"><figure class="frameme" data-cbid="21" data-dcnode-id="1933"><div class="theframe" data-dcnode-id="1934" data-image="//townsquare.media/site/341/files/2020/04/125.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">1931: 'EMPIRE STATE TOWER, TALLEST IN WORLD, IS OPENED BY HOOVER'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1922"><p class="caption" data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Hulton Archive // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">1931: 'EMPIRE STATE TOWER, TALLEST IN WORLD, IS OPENED BY HOOVER'</span></h2><div class="item-description" data-dcnode-id="1923"><p data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">By 1931, the country was gripped in the throes of the Great Depression, but in New York City, engineers and builders had scraped the sky. The Saturday, May 28 edition of The New York Times </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1931/05/02/archives/empire-state-tower-tallest-in-world-is-opened-by-hoover-the-highest.html" target="_blank"><span data-dcnode-id="1927" instrument_node="">reported on the opening of the Empire State Building</span></a><span data-dcnode-id="1925" instrument_node="">, then the tallest—and still one of the grandest and most iconic—building on Earth.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1905" data-index="17"><figure class="frameme" data-cbid="22" data-dcnode-id="1917"><div class="theframe" data-dcnode-id="1918" data-image="//townsquare.media/site/341/files/2020/04/135.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">1932: 'ROOSEVELT WINS!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1906"><p class="caption" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Edward H. Gooch/Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">1932: 'ROOSEVELT WINS!'</span></h2><div class="item-description" data-dcnode-id="1907"><p data-dcnode-id="1908"><span data-dcnode-id="1912" instrument_node="">The </span><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/about-the-white-house/presidents/franklin-d-roosevelt/" target="_blank"><span data-dcnode-id="1911" instrument_node="">election of Franklin D. Roosevelt</span></a><span data-dcnode-id="1909" instrument_node=""> signaled the start of one of the most transformative eras in American history. Elected on the promise of financial and social reform, FDR would go on to become the longest-serving president in history, the architect of the New Deal, the founder of America's social safety net, and the man who would lead the country out of the Great Depression and through World War II. On Nov. 9, the Greensboro Daily News reported on the excitement surrounding Roosevelt's landslide victory.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1889" data-index="18"><figure class="frameme" data-cbid="23" data-dcnode-id="1901"><div class="theframe" data-dcnode-id="1902" data-image="//townsquare.media/site/341/files/2020/04/145.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">1933: 'PROHIBITION ENDS AT LAST!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1890"><p class="caption" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Thomas Cizauskas // Flickr</span></p><h2 class="item-title" data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">1933: 'PROHIBITION ENDS AT LAST!'</span></h2><div class="item-description" data-dcnode-id="1891"><p data-dcnode-id="1892"><span data-dcnode-id="1896" instrument_node="">On Dec. 6, 1933, The New York Times summed up the national sentiment when it reported on the </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/film/2012/aug/26/lawless-prohibition-gangsters-speakeasies" target="_blank"><span data-dcnode-id="1895" instrument_node="">end of Prohibition</span></a><span data-dcnode-id="1893" instrument_node="">. The failed experiment, which started in 1920, gave rise to a black market that spawned the most sop
