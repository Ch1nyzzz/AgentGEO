Sun-Times used just two words to announce the </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.u-s-history.com/pages/h910.html" target="_blank"><span data-dcnode-id="1120" instrument_node="">election of Jimmy Carter</span></a><span data-dcnode-id="1118" instrument_node="">. The Democrat was elected largely in response to Watergate, which forced the resignation of Richard Nixon and installed Gerald Ford as president after Nixon's vice president, Spiro Agnew, was forced from office on unrelated charges. Ford wasn't implicated in the scandal, but he did pardon Nixon, and the Republican brand was tainted.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1098" data-index="78"><figure class="frameme" data-cbid="68" data-dcnode-id="1110"><div class="theframe" data-dcnode-id="1111" data-image="//townsquare.media/site/341/files/2020/04/591.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">1978: 'MASS SUICIDES IN GUYANA CULT'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1099"><p class="caption" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Nancy Wong // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">1978: 'MASS SUICIDES IN GUYANA CULT'</span></h2><div class="item-description" data-dcnode-id="1100"><p data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">A little less than a decade after the infamous Manson Family killings introduced America to the concept of murderous cults, the New York Daily News </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-history.com/jonestown/" target="_blank"><span data-dcnode-id="1104" instrument_node="">reported on another episode of West Coast counterculture</span></a><span data-dcnode-id="1102" instrument_node=""> gone wrong—one that gave rise to the phrase "drink the Kool-Aid." In the largest incident of mass suicide in American history, 900 people died after the followers of messianic cult leader Jim Jones drank—and forced their own children to drink—poisoned fruit punch in their South American jungle refuge.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1097"></div><div class="photogallery-item" data-dcnode-id="1075" data-index="80"><figure class="frameme" data-cbid="69" data-dcnode-id="1093"><div class="theframe" data-dcnode-id="1094" data-image="//townsquare.media/site/341/files/2020/04/601.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">1979: 'ARMED IRANIANS RUSH U.S. EMBASSY'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1076"><p class="caption" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">1979: 'ARMED IRANIANS RUSH U.S. EMBASSY'</span></h2><div class="item-description" data-dcnode-id="1077"><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">On Feb. 15, 1979, The New York Times </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1979/02/15/archives/armed-iranians-rush-us-embassy-khomeinis-forces-free-staff-of-100-a.html" target="_blank"><span data-dcnode-id="1087" instrument_node="">reported on an event that forever changed American foreign policy</span></a><span data-dcnode-id="1085" instrument_node=""> and still reverberates to this day. Misguided American foreign policy in Iran collided with an uprising of Islamic fundamentalism when followers of Ayatollah Khomeini stormed the American Embassy, took 52 American hostages, and held them for 444 days.</span></p><p data-dcnode-id="1078"><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1081" instrument_node=""> </span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3451/25-terms-you-should-know-understand-gun-control-debate" target="_blank"><span data-dcnode-id="1080" instrument_node="">25 terms you should know to understand the gun control debate</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1059" data-index="81"><figure class="frameme" data-cbid="70" data-dcnode-id="1071"><div class="theframe" data-dcnode-id="1072" data-image="//townsquare.media/site/341/files/2020/04/613.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">1980: 'DEATH OF A HERO'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1060"><p class="caption" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Fox Photos/Hulton Archive // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">1980: 'DEATH OF A HERO'</span></h2><div class="item-description" data-dcnode-id="1061"><p data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">On Dec. 8, 1980, peace activist, counterculture hero, and music icon John Lennon was shot to death in New York City. The Daily Mirror's headline </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.pinimg.com/originals/0f/1b/bf/0f1bbfbc05543cf4aea53d78b46da7d5.jpg" target="_blank"><span data-dcnode-id="1065" instrument_node="">called Lennon a hero</span></a><span data-dcnode-id="1063" instrument_node="">, which he was to his throngs of fans, many of whom continue to this day to flock to his Strawberry Fields memorial in Central Park on the anniversary of his death.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1040" data-index="82"><figure class="frameme" data-cbid="71" data-dcnode-id="1055"><div class="theframe" data-dcnode-id="1056" data-image="//townsquare.media/site/341/files/2020/04/622.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">1981: 'RARE CANCER SEEN IN 41 HOMOSEXUALS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1041"><p class="caption" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">LightfieldStudios // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">1981: 'RARE CANCER SEEN IN 41 HOMOSEXUALS'</span></h2><div class="item-description" data-dcnode-id="1042"><p data-dcnode-id="1043"><span data-dcnode-id="1050" instrument_node="">In 1981, medical professionals were beginning to notice a pattern of deaths among gay men who were succumbing to an otherwise extremely rare cancer called Kaposi's sarcoma. Although the disease had not yet been named or identified, it was the dawn of the AIDS crisis, one of the most terrifying and destructive pandemics in modern world history. </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1981/07/03/us/rare-cancer-seen-in-41-homosexuals.html" target="_blank"><span data-dcnode-id="1049" instrument_node="">The New York Times' headline</span></a><span data-dcnode-id="1047" instrument_node=""> topped the </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smithsonianmag.com/smart-news/was-first-major-news-article-hivaids-180963913/" target="_blank"><span data-dcnode-id="1046" instrument_node="">first article ever written</span></a><span data-dcnode-id="1044" instrument_node=""> about the frightening and perplexing disease.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1039"></div><div class="photogallery-item" data-dcnode-id="1023" data-index="84"><figure class="frameme" data-cbid="72" data-dcnode-id="1035"><div class="theframe" data-dcnode-id="1036" data-image="//townsquare.media/site/341/files/2020/04/631.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">1982: '5 DEAD AFTER TAKING TYLENOL CAPSULES FILLED WITH CYANIDE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1024"><p class="caption" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Colin // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">1982: '5 DEAD AFTER TAKING TYLENOL CAPSULES FILLED WITH CYANIDE'</span></h2><div class="item-description" data-dcnode-id="1025"><p data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">In 1982, America was in a panic over a string of deaths that would be traced to Tylenol capsules intentionally laced with deadly cyanide poison. The Daily Herald </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prev.dailyherald.com/pdf/tylenolpdfs/images/october1.1982.pdf" target="_blank"><span data-dcnode-id="1029" instrument_node="">reported as the death toll rose to five</span></a><span data-dcnode-id="1027" instrument_node="">, but seven would die in total, and several others would fall victim to copycat poisonings. The shockingly random crime, which has still never been solved, triggered waves of consumer-protection regulations and voluntary corporate changes, including tamper-evident packaging.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1007" data-index="85"><figure class="frameme" data-cbid="73" data-dcnode-id="1019"><div class="theframe" data-dcnode-id="1020" data-image="//townsquare.media/site/341/files/2020/04/641.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">1983: 'BEIRUT DEATH TOLL AT 161 AMERICANS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1008"><p class="caption" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">NABIL ISMAIL/AFP/Getty Images</span></p><h2 class="item-title" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">1983: 'BEIRUT DEATH TOLL AT 161 AMERICANS'</span></h2><div class="item-description" data-dcnode-id="1009"><p data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">On Oct. 23, 1983, Middle Eastern terrorism was once again dominating the headlines, </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1983/10/24/world/beirut-death-toll-161-americans-french-casualties-rise-bombings-reagan-insists.html" target="_blank"><span data-dcnode-id="1013" instrument_node="">like this one written by The New York Times</span></a><span data-dcnode-id="1011" instrument_node="">. That day, a suicide bomber detonated a truck bomb that killed 307 people, including 241 Americans, at a U.S. Marines barrack in Beirut. Earlier in the year, another terrorist killed 63 people with a bomb at the U.S. Embassy in Beirut, making the Lebanese city a worldwide symbol of Middle Eastern Islamic terrorism, which was now openly targeting U.S. interests worldwide.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="985" data-index="86"><figure class="frameme" data-cbid="74" data-dcnode-id="1003"><div class="theframe" data-dcnode-id="1004" data-image="//townsquare.media/site/341/files/2020/04/652.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">1984: 'WILL THEY EVER GET THERE?'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="986"><p class="caption" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">FINN FRANDSEN/AFP // Getty Images</span></p><h2 class="item-title" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">1984: 'WILL THEY EVER GET THERE?'</span></h2><div class="item-description" data-dcnode-id="987"><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">In 1984, the Daily Mail </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-3526234/El-Ni-o-gives-Ethiopia-worst-drought-1980s.html" target="_blank"><span data-dcnode-id="997" instrument_node="">reported on a widespread drought and famine</span></a><span data-dcnode-id="995" instrument_node=""> in Ethiopia, which resulted in a seemingly endless stream of heartbreaking images that galvanized global sympathy and support. The next year, Live Aid launched a series of charity concerts for famine relief that drew the biggest acts in music.</span></p><p data-dcnode-id="988"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">You may also like: </span></strong><span data-dcnode-id="991" instrument_node=""> </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3285/how-americans-use-internet-today-numbers" target="_blank"><span data-dcnode-id="990" instrument_node="">How Americans use the internet today, by the numbers</span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="984"></div><div class="photogallery-item" data-dcnode-id="968" data-index="88"><figure class="frameme" data-cbid="75" data-dcnode-id="980"><div class="theframe" data-dcnode-id="981" data-image="//townsquare.media/site/341/files/2020/04/661.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">1985: 'PALESTINIANS SEIZE ITALIAN CRUISE SHIP'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="969"><p class="caption" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Mike Nelson/AFP // Getty Images</span></p><h2 class="item-title" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">1985: 'PALESTINIANS SEIZE ITALIAN CRUISE SHIP'</span></h2><div class="item-description" data-dcnode-id="970"><p data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">By 1985, the threat of Middle Eastern terrorism never seemed far off, but that year, The Plain Dealer reported on a particularly gruesome event. Palestinian </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/palestinian-terrorists-hijack-an-italian-cruise-ship" target="_blank"><span data-dcnode-id="974" instrument_node="">terrorists hijacked the Achille Lauro</span></a><span data-dcnode-id="972" instrument_node=""> passenger cruise ship and murdered Leon Klinghoffer, a wheelchair-bound, 69-year-old Jewish-American man whom the terrorists threw overboard. Three years later in 1983, Libyan terrorists bombed Pan Am Flight 103 over Lockerbie, Scotland.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="952" data-index="89"><figure class="frameme" data-cbid="76" data-dcnode-id="964"><div class="theframe" data-dcnode-id="965" data-image="//townsquare.media/site/341/files/2020/04/671.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">1986: 'SHUTTLE TRAGEDY STUNS NATION'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="953"><p class="caption" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Kennedy Space Center // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">1986: 'SHUTTLE TRAGEDY STUNS NATION'</span></h2><div class="item-description" data-dcnode-id="954"><p data-dcnode-id="955"><span data-dcnode-id="959" instrument_node="">This Chicago Tribune </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newspapers.com/clip/10920774/chicago_tribune/" target="_blank"><span data-dcnode-id="958" instrument_node="">headline summed up the sentiment</span></a><span data-dcnode-id="956" instrument_node=""> in America when the Challenger space shuttle exploded shortly after takeoff. The shuttle's crew included a teacher named Christa McAuliffe, who would have been the first civilian in space. McAuliffe's presence among the crew made the launch a widely followed media event, with nearly 1 in 5 Americans watching the event live, including legions of schoolchildren.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="936" data-index="90"><figure class="frameme" data-cbid="77" data-dcnode-id="948"><div class="theframe" data-dcnode-id="949" data-image="//townsquare.media/site/341/files/2020/04/681.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">1987: 'A CRACK PLAGUE IN QUEENS BRINGS VIOLENCE AND FEAR'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="937"><p class="caption" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Spencer Platt // Getty Images</span></p><h2 class="item-title" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">1987: 'A CRACK PLAGUE IN QUEENS BRINGS VIOLENCE AND FEAR'</span></h2><div class="item-description" data-dcnode-id="938"><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">By 1987, a decades-long decline in urban America relegated vast swaths of the country's biggest cities to wastelands of crime, poverty, blight, and fear, much of which was fueled by the drug trade. One drug, however, stood out among them all. Cheap, powerful, and readily available, the arrival of crack cocaine in the mid-1980s resulted in a surge of social ills, including violence and family breakdown as well as a shift in drug policy toward police militarization and crushing prison sentences for even minor offenses. The New York Times headline </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1987/10/19/nyregion/a-crack-plague-in-queens-brings-violence-and-fear.html" target="_blank"><span data-dcnode-id="942" instrument_node="">was written about a neighborhood</span></a><span data-dcnode-id="940" instrument_node=""> in the borough of Queens, but similar stories were replayed daily in every city in America.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="935"></div><div class="photogallery-item" data-dcnode-id="919" data-index="92"><figure class="frameme" data-cbid="78" data-dcnode-id="931"><div class="theframe" data-dcnode-id="932" data-image="//townsquare.media/site/341/files/2020/04/691.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">1988: '10 YEARS IN AFGHANISTAN: THE SOVIET VIETNAM'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="920"><p class="caption" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">SSGT SCOTT T. STURKOL/U.S. Air Force // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">1988: '10 YEARS IN AFGHANISTAN: THE SOVIET VIETNAM'</span></h2><div class="item-description" data-dcnode-id="921"><p data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">In 1988, the Soviet Union began withdrawing its forces from Afghanistan after a decade of brutal conflict. The New York Times </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1988/04/15/world/10-years-in-afghanistan-the-soviet-vietnam.html" target="_blank"><span data-dcnode-id="925" instrument_node="">compared the saga</span></a><span data-dcnode-id="923" instrument_node="">, which bled Soviet resources while stoking massive upheaval at home, to America's war in Vietnam. Perhaps more consequentially, Russia's failure in Afghanistan hastened the fall of the Soviet Union.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="897" data-index="93"><figure class="frameme" data-cbid="79" data-dcnode-id="915"><div class="theframe" data-dcnode-id="916" data-image="//townsquare.media/site/341/files/2020/04/701.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">1989: 'FREEDOM!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="898"><p class="caption" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Department of Defense</span></p><h2 class="item-title" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">1989: 'FREEDOM!'</span></h2><div class="item-description" data-dcnode-id="899"><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">The Berlin Wall, erected in 1961 at the height of the Cold War, was the physical embodiment of the political division between the East and the West, the United States and the Soviet Union. Two of the most famous presidential speeches of the Cold War—"Ich bin ein Berliner" by John F. Kennedy and "Tear Down This Wall" by Ronald Reagan—were made there. Although the wall was a symbolic representation of an ideological divide, it was also a fortified concrete barrier manned by guards with guns ordered to shoot anyone trying to escape the clutches of the Eastern Bloc for the comparative freedom of the West. In 1989, both the symbolism and the concrete came tumbling down when the Berlin Wall fell, as reported in </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.ie/detail/news-photo/daily-news-front-page-november-10-headline-freedom-twilight-news-photo/97295724" target="_blank"><span data-dcnode-id="909" instrument_node="">this one-word exclamation headline</span></a><span data-dcnode-id="907" instrument_node=""> by the New York Daily News.</span></p><p data-dcnode-id="900"><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">You may also like: </span></strong><span data-dcnode-id="903" instrument_node=""> </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3201/how-top-democratic-candidates-compare-major-issues" target="_blank"><span data-dcnode-id="902" instrument_node="">How top Democratic candidates compare on major issues</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="881" data-index="94"><figure class="frameme" data-cbid="80" data-dcnode-id="893"><div class="theframe" data-dcnode-id="894" data-image="//townsquare.media/site/341/files/2020/04/713.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">1990: 'IRAQI TROOPS INVADE, SEIZE PARTS OF KUWAIT'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="882"><p class="caption" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Photographer's Mate 1st Class Michael Larson/U.S. Navy // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">1990: 'IRAQI TROOPS INVADE, SEIZE PARTS OF KUWAIT'</span></h2><div class="item-description" data-dcnode-id="883"><p data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">In 1990, The Dallas Morning News reported on new trouble in a region that had become synonymous with violence, terrorism, political instability, and religious fanaticism—the Middle East. This time, Iraqi President Saddam Hussein—a U.S. ally during the Iran-Iraq War—</span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/iraq-invades-kuwait" target="_blank"><span data-dcnode-id="887" instrument_node="">invaded neighboring Kuwait</span></a><span data-dcnode-id="885" instrument_node="">, a tiny, oil-rich nation that had friendly ties with the United States. In a move with consequences that continue to reverberate today, the United States would organize an impressive global alliance to drive the Iraqis out of Kuwait in a war that lasted just 100 hours, but would ultimately leave Hussein in power.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="880"></div><div class="photogallery-item" data-dcnode-id="864" data-index="96"><figure class="frameme" data-cbid="81" data-dcnode-id="876"><div class="theframe" data-dcnode-id="877" data-image="//townsquare.media/site/341/files/2020/04/722.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">1991: 'U.S. JURY INDICTS 4 POLICE OFFICERS IN KING BEATING'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="865"><p class="caption" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Hal Garb/AFP // Getty Images</span></p><h2 class="item-title" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">1991: 'U.S. JURY INDICTS 4 POLICE OFFICERS IN KING BEATING'</span></h2><div class="item-description" data-dcnode-id="866"><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">In 1991, the world saw irrefutable video evidence of the kind of police brutality that poor minority communities had been clamoring about for generations when a bystander recorded four Los Angeles Police officers ruthlessly beating motorist Rodney King after a car chase. The officers were indicted, as </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1992/08/06/us/us-jury-indicts-4-police-officers-in-king-beating.html" target="_blank"><span data-dcnode-id="870" instrument_node="">reported in this headline</span></a><span data-dcnode-id="868" instrument_node=""> by The New York Times, but were acquitted a year later. The verdict sparked the 1992 L.A. Riots, a nearly weeklong orgy of violence, mayhem, looting, and arson that ended with 63 deaths and $1 billion in property damage.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="848" data-index="97"><figure class="frameme" data-cbid="82" data-dcnode-id="860"><div class="theframe" data-dcnode-id="861" data-image="//townsquare.media/site/341/files/2020/04/731.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">1992: 'CLINTON WINS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="849"><p class="caption" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Timothy A. Clary/AFP/Getty Images</span></p><h2 class="item-title" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">1992: 'CLINTON WINS'</span></h2><div class="item-description" data-dcnode-id="850"><p data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">On Nov. 4, 1992, the Arkansas Democrat-Gazette </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rarenewspapers.com/view/630834" target="_blank"><span data-dcnode-id="854" instrument_node="">reported on the ascent of one of the state's native sons</span></a><span data-dcnode-id="852" instrument_node=""> to the Oval Office. Former Gov. Bill Clinton had been elected president, relegating George H.W. Bush to a single term in office and closing the book on 12 years of Republican White House domination.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="832" data-index="98"><figure class="frameme" data-cbid="83" data-dcnode-id="844"><div class="theframe" data-dcnode-id="845" data-image="//townsquare.media/site/341/files/2020/04/741.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">1993: 'NEW YORK'S DAY OF TERROR'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="833"><p class="caption" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">TIMOTHY A. CLARY/AFP // GettyImages</span></p><h2 class="item-title" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">1993: 'NEW YORK'S DAY OF TERROR'</span></h2><div class="item-description" data-dcnode-id="834"><p data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">On Feb. 27, a New York Daily News headline </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1360kktx.iheart.com/content/2018-02-27-new-yorks-day-of-terror/" target="_blank"><span data-dcnode-id="838" instrument_node="">summed up the events of the day before</span></a><span data-dcnode-id="836" instrument_node="">, when Muslim terrorists detonated a truck bomb beneath the World Trade Center, a juicy target for both its sheer size and symbolic representation of America's wealth and global influence. The terrorists killed six people, but fell short of their goal to topple one World Trade Center tower over onto the other. Organized by Ramzi Yousef, the nephew of 9/11 mastermind Khalid Sheikh Mohammed, the bombing revealed that an organized network of bold and sophisticated Middle Eastern terrorists was traveling freely to and from the United States and operating out of American mosques. It was a harbinger of things to come.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="831"></div><div class="photogallery-item" data-dcnode-id="809" data-index="100"><figure class="frameme" data-cbid="84" data-dcnode-id="827"><div class="theframe" data-dcnode-id="828" data-image="//townsquare.media/site/341/files/2020/04/751.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">1994: 'SURRENDER'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="810"><p class="caption" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Mike Nelson/AFP // Getty Images</span></p><h2 class="item-title" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">1994: 'SURRENDER'</span></h2><div class="item-description" data-dcnode-id="811"><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">On June 17, 1994, America watched with wonder as O.J. Simpson—an amicable football hero, comedic actor, and television personality—led Los Angeles police on a low-speed chase in a now-famous white Bronco. After his surrender, which the New York Daily News </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/news/crime/o-simpson-apprehended-police-chase-1994-article-1.2253270" target="_blank"><span data-dcnode-id="821" instrument_node="">reflected in its front-page headline</span></a><span data-dcnode-id="819" instrument_node="">, the world was immersed in an avalanche of media coverage detailing the scandalous details of the gruesome double murder he was accused of committing. The case had everything headline writers dream of: celebrity, race, wealth, sports, sex, adultery, police misconduct, and murder. In October 1995, O.J. would be acquitted in the so-called trial of the century.</span></p><p data-dcnode-id="812"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">You may also like: </span></strong><span data-dcnode-id="815" instrument_node=""> </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3185/libertarian-gerrymandering-and-50-other-political-terms-you-should-know" target="_blank"><span data-dcnode-id="814" instrument_node="">Libertarian, gerrymandering, and 50 other political terms you should know</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="793" data-index="101"><figure class="frameme" data-cbid="85" data-dcnode-id="805"><div class="theframe" data-dcnode-id="806" data-image="//townsquare.media/site/341/files/2020/04/761.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">1995: 'MORNING OF TERROR'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="794"><p class="caption" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">usacetulsa // flickr</span></p><h2 class="item-title" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">1995: 'MORNING OF TERROR'</span></h2><div class="item-description" data-dcnode-id="795"><p data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">On April 19, 1995, terrorism came to Middle America with the bombing of the Alfred P. Murrah building in Oklahoma City. The mastermind was not a Middle Eastern Muslim with an unfamiliar-sounding name, but a white, Christian military veteran named Timothy McVeigh. Radicalized into America's growing right-wing, anti-government militia movement, McVeigh was executed for planting the bomb which killed 168 people, including 19 children. The Daily Oklahoman </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newsok.com/article/5411116/day-1-how-the-oklahoman-covered-the-bombing-april-19-1995" target="_blank"><span data-dcnode-id="799" instrument_node="">led with this succinct headline</span></a><span data-dcnode-id="797" instrument_node=""> the morning following the bombing.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="777" data-index="102"><figure class="frameme" data-cbid="86" data-dcnode-id="789"><div class="theframe" data-dcnode-id="790" data-image="//townsquare.media/site/341/files/2020/04/771.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">1996: 'CLONE SHOCK/CLONE SHOCK'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="778"><p class="caption" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Mike McBey // flickr</span></p><h2 class="item-title" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">1996: 'CLONE SHOCK/CLONE SHOCK'</span></h2><div class="item-description" data-dcnode-id="779"><p data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">In 1996, global debate about the ethics of biological science was ignited when Roslin Institute scientists cloned a large, sophisticated, intelligent animal: a sheep named Dolly. The Sun </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/news/hold-ye-front-page/1977351/the-birth-of-dolly-the-sheep-the-first-ever-clone-of-an-adult-animal-was-an-astonishing-leap-forward-in-genetics-but-triggered-a-huge-ethical-debate/" target="_blank"><span data-dcnode-id="783" instrument_node="">responded with a brilliant headline</span></a><span data-dcnode-id="781" instrument_node=""> that duplicated itself on the front page.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="776"></div><div class="photogallery-item" data-dcnode-id="760" data-index="104"><figure class="frameme" data-cbid="87" data-dcnode-id="772"><div class="theframe" data-dcnode-id="773" data-image="//townsquare.media/site/341/files/2020/04/781.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">1997: 'DIANA DEAD'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="761"><p class="caption" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">John MacIntyre // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">1997: 'DIANA DEAD'</span></h2><div class="item-description" data-dcnode-id="762"><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">New York Daily News </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/news/princess-diana-death-back-headlines-shook-world-gallery-1.1148281" target="_blank"><span data-dcnode-id="766" instrument_node="">pulled no punches</span></a><span data-dcnode-id="764" instrument_node=""> when the paper reported news that would become one of the most widely publicized events in history: the death of Princess Diana. In the early morning hours of Aug. 31, 1997, the beloved so-called People's Princess and her boyfriend were killed when their intoxicated driver crashed their Mercedes-Benz in Paris. The world mourned, and 2.5 billion people tuned in to watch her funeral.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="744" data-index="105"><figure class="frameme" data-cbid="88" data-dcnode-id="756"><div class="theframe" data-dcnode-id="757" data-image="//townsquare.media/site/341/files/2020/04/791.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">1998: 'CLINTON IMPEACHED'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="745"><p class="caption" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Clinton White House // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">1998: 'CLINTON IMPEACHED'</span></h2><div class="item-description" data-dcnode-id="746"><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">Although </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/nytarchives/status/810840124531572736" target="_blank"><span data-dcnode-id="750" instrument_node="">this headline is taken from The New York Times</span></a><span data-dcnode-id="748" instrument_node="">, headlines consisting of the same two words graced the front pages of the Philadelphia Inquirer, The Washington Post, The Columbus Dispatch, and countless other major newspapers around the country in 1998. After a long-running scandal surrounding a salacious affair with 22-year-old intern Monica Lewinsky came crashing down on the White House, Bill Clinton joined Andrew Johnson as the only other president ever impeached in American history. He was acquitted by the Senate two months later.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="722" data-index="106"><figure class="frameme" data-cbid="89" data-dcnode-id="740"><div class="theframe" data-dcnode-id="741" data-image="//townsquare.media/site/341/files/2020/04/801.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">1999: 'JANUARY 1, 2000: THE DAY THE EARTH WILL STAND STILL!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="723"><p class="caption" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">paal // flickr</span></p><h2 class="item-title" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">1999: 'JANUARY 1, 2000: THE DAY THE EARTH WILL STAND STILL!'</span></h2><div class="item-description" data-dcnode-id="724"><p data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">In a parody of an old science-fiction movie, a 1999 Weekly World News headline </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/myklroventine/2070724932" target="_blank"><span data-dcnode-id="734" instrument_node="">conveyed the world's trepidation</span></a><span data-dcnode-id="732" instrument_node=""> over the coming turn of the millennium. The headline referred to Y2K, a worldwide digital calamity that never was. The panic was based on the idea that computers were programmed to process four-digit years as two-digit codes to save memory space. When those two digits became "00" instead of "98" or "99," the world's computer networks and all the information they contained were supposed to simultaneously crash, but they never did, and Jan. 1, 2000 was a day like any other.</span></p><p data-dcnode-id="725"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">You may also like: </span></strong><span data-dcnode-id="728" instrument_node=""> </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3422/i-have-dream-and-rest-greatest-speeches-20th-century" target="_blank"><span data-dcnode-id="727" instrument_node="">"I have a dream" and the rest of the greatest speeches of the 20th Century</span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="721"></div><div class="photogallery-item" data-dcnode-id="705" data-index="108"><figure class="frameme" data-cbid="90" data-dcnode-id="717"><div class="theframe" data-dcnode-id="718" data-image="//townsquare.media/site/341/files/2020/04/812.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">2000: 'BUSH VICTORIOUS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="706"><p class="caption" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">PAUL J. RICHARDS/AFP // Getty Images</span></p><h2 class="item-title" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">2000: 'BUSH VICTORIOUS'</span></h2><div class="item-description" data-dcnode-id="707"><p data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">In 2000, George W. Bush defeated Al Gore in the closest and most controversial election in modern history. Although Bush lost the popular vote, Electoral College rules meant that the contest would go to whoever won Florida, where Bush was ahead by a razor-thin margin of just a few hundred votes. In a 5-4 decision, the Supreme Court voted to stop a recount that was still being conducted, awarding Bush the presidency which made him and President George H.W. Bush the only father-son presidential duo since the time of the Adams' at the dawn of the Republic. The Los Angeles Times </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//articles.latimes.com/2000/dec/14/news/mn-65528" target="_blank"><span data-dcnode-id="711" instrument_node="">delivered the news</span></a><span data-dcnode-id="709" instrument_node=""> with this direct, poignant headline.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="689" data-index="109"><figure class="frameme" data-cbid="91" data-dcnode-id="701"><div class="theframe" data-dcnode-id="702" data-image="//townsquare.media/site/341/files/2020/04/821.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">2001: 'BASTARDS!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="690"><p class="caption" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Alex Wong // Getty Images</span></p><h2 class="item-title" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">2001: 'BASTARDS!'</span></h2><div class="item-description" data-dcnode-id="691"><p data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">On Sept. 12, 2001, a crude but effective headline from The San Francisco Examiner </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//editdesk.wordpress.com/2009/05/18/memorable-headlines-bastards/" target="_blank"><span data-dcnode-id="695" instrument_node="">summed up the national sentiment</span></a><span data-dcnode-id="693" instrument_node=""> in the wake of the events from the day before. On Sept. 12, America woke up to a new reality that would shape world events through the present and divide modern American history into the time before that day and the time after. Just like with the JFK assassination a generation before, virtually every American would forever remember where they were on Sept. 11, 2001.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="673" data-index="110"><figure class="frameme" data-cbid="92" data-dcnode-id="685"><div class="theframe" data-dcnode-id="686" data-image="//townsquare.media/site/341/files/2020/04/831.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">2002: 'GEORGE BUSH AND THE AXIS OF EVIL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="674"><p class="caption" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Pablo Martinez Monsivais-Pool // Getty Images</span></p><h2 class="item-title" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">2002: 'GEORGE BUSH AND THE AXIS OF EVIL'</span></h2><div class="item-description" data-dcnode-id="675"><p data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">On Jan. 31, 2002, The Economist </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/leaders/2002/01/31/george-bush-and-the-axis-of-evil" target="_blank"><span data-dcnode-id="679" instrument_node="">examined George W. Bush's State of the Union address</span></a><span data-dcnode-id="677" instrument_node=""> from two nights earlier. The article's headline was complemented with a prophetic subhead: "America is set on a brave but hazardous course." The statement was made in reference to Bush's debut of a phrase that hearkened back to Ronald Reagan's labeling of the Soviet Union as the "Evil Empire." In his speech, Bush declared that Iran, North Korea, and Iraq represented an "axis of evil" and that the countries were arming themselves with weapons of mass destruction, a phrase that would soon become a rallying cry for preemptive war.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="672"></div><div class="photogallery-item" data-dcnode-id="656" data-index="112"><figure class="frameme" data-cbid="93" data-dcnode-id="668"><div class="theframe" data-dcnode-id="669" data-image="//townsquare.media/site/341/files/2020/04/841.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">2003: 'U.S. ATTACKS IRAQ'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="657"><p class="caption" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Lance Cpl. Brian L. Wickliffe // U.S. Marine Corps</span></p><h2 class="item-title" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">2003: 'U.S. ATTACKS IRAQ'</span></h2><div class="item-description" data-dcnode-id="658"><p data-dcnode-id="659"><span data-dcnode-id="663" instrument_node="">On March 21, 2003, a Los Angeles Times headline </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/world/la-fg-iraq03202003-archiveb-story.html" target="_blank"><span data-dcnode-id="662" instrument_node="">detailed the simple truth</span></a><span data-dcnode-id="660" instrument_node=""> of the events of the day. Using what proved to be dubious and cherry-picked intelligence, the Bush administration—and its bipartisan enablers in Congress—ordered the invasion and occupation of Iraq. The mission was carried out under the guise of preventing an imminent attack from Iraq's weapons of mass destruction, which it did not possess, and that Saddam Hussein was involved in the Sept. 11 attacks, which he was not.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="634" data-index="113"><figure class="frameme" data-cbid="94" data-dcnode-id="652"><div class="theframe" data-dcnode-id="653" data-image="//townsquare.media/site/341/files/2020/04/851.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">2004: 'THE NIGHTMARE AT ABU GHRAIB'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="635"><p class="caption" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Tech. Sgt. Jerry Morrison Jr. // U.S. Air Force</span></p><h2 class="item-title" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">2004: 'THE NIGHTMARE AT ABU GHRAIB'</span></h2><div class="item-description" data-dcnode-id="636"><p data-dcnode-id="643"><span data-dcnode-id="647" instrument_node="">On May 3, 2004, a New York Times piece </span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2004/05/03/opinion/the-nightmare-at-abu-ghraib.html" target="_blank"><span data-dcnode-id="646" instrument_node="">examined the fallout</span></a><span data-dcnode-id="644" instrument_node=""> from a series of shocking photos of American troops torturing, humiliating, and terrorizing Iraqi prisoners in one of Saddam Hussein's most notorious torture chambers: Abu Ghraib prison. By that time, Hussein had been captured, but national sentiment had begun to sour on the war as the search for weapons of mass destruction proved fruitless, President Bush's "mission accomplished" declaration proved premature, and growing popular resistance to the invasion among Iraqis made the Bush administration's liberator narrative appear naive. The nightmare at Abu Ghraib, as the Times called it, would be a turning point for American antiwar sentiment.</span></p><p data-dcnode-id="637"><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">You may also like: </span></strong><span data-dcnode-id="640" instrument_node=""> </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3371/timeline-wwii-most-devastating-conflict-world-history" target="_blank"><span data-dcnode-id="639" instrument_node="">A timeline of WWII, the most devastating conflict in history</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="618" data-index="114"><figure class="frameme" data-cbid="95" data-dcnode-id="630"><div class="theframe" data-dcnode-id="631" data-image="//townsquare.media/site/341/files/2020/04/86.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">2005: 'HELP US, PLEASE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="619"><p class="caption" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Master Sgt. Bill Huntington // U.S. Air Force</span></p><h2 class="item-title" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">2005: 'HELP US, PLEASE'</span></h2><div class="item-description" data-dcnode-id="620"><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">2005 was a record-breaking year for hurricanes, and the third major storm of the season would prove to be one of the costliest and deadliest natural disasters in American history. Hurricane Katrina crashed into the Gulf Coast on Aug. 29, devastating the region in general and New Orleans in particular as biblical flooding swamped the region when the area's flawed and dated levee systems failed. The Times-Picayune headline </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nola.com/katrina/2005/09/help_us_please.html" target="_blank"><span data-dcnode-id="624" instrument_node="">summed up the desperation</span></a><span data-dcnode-id="622" instrument_node=""> of the people trapped in the deadly aftermath, which was exacerbated by an impotent, delayed, and disorganized official response, particularly at the federal level.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="617"></div><div class="photogallery-item" data-dcnode-id="601" data-index="116"><figure class="frameme" data-cbid="96" data-dcnode-id="613"><div class="theframe" data-dcnode-id="614" data-image="//townsquare.media/site/341/files/2020/04/87.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">2006: 'EXECUTED AT DAWN'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="602"><p class="caption" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Chris Hondros/Getty Images</span></p><h2 class="item-title" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">2006: 'EXECUTED AT DAWN'</span></h2><div class="item-description" data-dcnode-id="603"><p data-dcnode-id="604"><span data-dcnode-id="608" instrument_node="">A long and dreary chapter in Middle East history ended on Dec. 30, 2006, with the execution of Saddam Hussein, which video footage widely viewed on the internet revealed to be more of a lynching. U.S. forces handed the ruthless Iraqi dictator over to his own enraged countrymen to be hanged for crimes he committed over a 25-year reign of terror, which The Sunday Mail </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.poynter.org/wp-content/uploads/2011/08/12-31-06-AUS_CM-Brisbane-Australia-2.jpg" target="_blank"><span data-dcnode-id="607" instrument_node="">reported taking place</span></a><span data-dcnode-id="605" instrument_node=""> at the traditional hanging time of dawn. Saddam Hussein's reign was over, but the war in the country he long terrorized would continue to rage on.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="585" data-index="117"><figure class="frameme" data-cbid="97" data-dcnode-id="597"><div class="theframe" data-dcnode-id="598" data-image="//townsquare.media/site/341/files/2020/04/88.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">2007: 'JUBILANT DEMOCRATS ASSUME CONTRO ON CAPITOL HILL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="586"><p class="caption" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Mark Wilson // Getty Images</span></p><h2 class="item-title" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">2007: 'JUBILANT DEMOCRATS ASSUME CONTRO ON CAPITOL HILL'</span></h2><div class="item-description" data-dcnode-id="587"><p data-dcnode-id="588"><span data-dcnode-id="592" instrument_node="">In 2006, </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2007/01/05/washington/05cong.html" target="_blank"><span data-dcnode-id="591" instrument_node="">Democrats walloped their Republican opponents</span></a><span data-dcnode-id="589" instrument_node=""> and gained control of both the House and Senate in the critical midterm elections. George W. Bush now had to contend with a Congress controlled by the opposition party, but a far more monumental event had taken place in the mix. In 2007, Calif. Rep. Nancy Pelosi was chosen as the first female Speaker of the House, as reported by The New York Times. The phrase "Madam Speaker" was now part of the American lexicon.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="569" data-index="118"><figure class="frameme" data-cbid="98" data-dcnode-id="581"><div class="theframe" data-dcnode-id="582" data-image="//townsquare.media/site/341/files/2020/04/89.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">2008: 'CRISIS ON WALL STREET AS LEHMAN TOTTERS, MERRILL IS SOLD, AIG SEEKS TO RAISE CASH'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="570"><p class="caption" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Fibonacci Blue // fickr</span></p><h2 class="item-title" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">2008: 'CRISIS ON WALL STREET AS LEHMAN TOTTERS, MERRILL IS SOLD, AIG SEEKS TO RAISE CASH'</span></h2><div class="item-description" data-dcnode-id="571"><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">On Sept. 15, 2008, an alarming Wall Street Journal headline </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/SB122139688846233147" target="_blank"><span data-dcnode-id="575" instrument_node="">documented the shift</span></a><span data-dcnode-id="573" instrument_node=""> of a growing financial downturn into full-scale crisis when the housing market collapsed and the Great Recession swept America and the world. Lax lending practices, a lack of oversight and regulation, and widespread corporate malfeasance led to double-digit unemployment rates, a collapse in home prices, the evaporation of more than half the stock market's value, and the disappearance of nearly $15 trillion in household wealth. It was the worst financial crisis since the Great Depression.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="568"></div><div class="photogallery-item" data-dcnode-id="546" data-index="120"><figure class="frameme" data-cbid="99" data-dcnode-id="564"><div class="theframe" data-dcnode-id="565" data-image="//townsquare.media/site/341/files/2020/04/90.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">2009: 'PRESIDENT OBAMA'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="547"><p class="caption" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Ron Sachs-Pool // Getty Images</span></p><h2 class="item-title" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">2009: 'PRESIDENT OBAMA'</span></h2><div class="item-description" data-dcnode-id="548"><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">On Jan. 21, 2009, a Washington Post headline used just two words to summarize the seismic shift in American culture and history that had just taken place. Barack Obama—who would not have been allowed to eat lunch next to white people in much of the country less than half a century before—was </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/barack-obama-is-inaugurated" target="_blank"><span data-dcnode-id="558" instrument_node="">inaugurated as president of the United States.</span></a><span data-dcnode-id="556" instrument_node=""> A black man was in the White House serving in the highest position in the land.</span></p><p data-dcnode-id="549"><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">You may also like: </span></strong><span data-dcnode-id="552" instrument_node=""> </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3260/youngest-and-oldest-presidents-us-history" target="_blank"><span data-dcnode-id="551" instrument_node="">Youngest and oldest presidents in U.S. history</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="530" data-index="121"><figure class="frameme" data-cbid="100" data-dcnode-id="542"><div class="theframe" data-dcnode-id="543" data-image="//townsquare.media/site/341/files/2020/04/911.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">2010: 'WAVES OF OIL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="531"><p class="caption" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">2010: 'WAVES OF OIL'</span></h2><div class="item-description" data-dcnode-id="532"><p data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">In April 2010, the world watched as a flood of oil gushed nonstop, day and night, from an underwater rupture in what was the Deepwater Horizon. The enormous offshore oil rig was located in the Gulf of Mexico when a catastrophic failure caused a massive explosion and a raging, inextinguishable fire that eventually sunk the rig. The result was the largest oil spill in U.S. history and, </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pbrla.blogspot.com/2010/06/gulf-coast-oil-spill-lessons-from-front.html" target="_blank"><span data-dcnode-id="536" instrument_node="">as reported by the Press-Register of Southern Alabama,</span></a><span data-dcnode-id="534" instrument_node=""> literal waves of oil.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="514" data-index="122"><figure class="frameme" data-cbid="101" data-dcnode-id="526"><div class="theframe" data-dcnode-id="527" data-image="//townsquare.media/site/341/files/2020/04/921.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">2011: 'DEAD'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="515"><p class="caption" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">William West/AFP/Getty Images</span></p><h2 class="item-title" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">2011: 'DEAD'</span></h2><div class="item-description" data-dcnode-id="516"><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">Osama bin Laden achieved mythical status among the hunters who considered him a terrorist and his supporters who considered him a prophet. Not only did the 9/11 mastermind strike the greatest blow against the United States in history, but he managed to time and again give his pursuers the slip during a decade-long manhunt as the most wanted man on the planet. That all ended on May 2, 2011, when operators from the vaunted Seal Team 6 raided his secret compound in Pakistan and rendered the founder of al-Qaida, in the </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.ca/pin/545146729866266796/" target="_blank"><span data-dcnode-id="520" instrument_node="">words of the St. Petersburg Times</span></a><span data-dcnode-id="518" instrument_node="">, dead.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="513"></div><div class="photogallery-item" data-dcnode-id="497" data-index="124"><figure class="frameme" data-cbid="102" data-dcnode-id="509"><div class="theframe" data-dcnode-id="510" data-image="//townsquare.media/site/341/files/2020/04/931.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">2012: 'THE WIKILEAKS SIEGE FIASCO'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="498"><p class="caption" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Elekhh // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">2012: 'THE WIKILEAKS SIEGE FIASCO'</span></h2><div class="item-description" data-dcnode-id="499"><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">By 2012, the world was learning about shadowy online whistleblower organizations that engaged in high-stakes games of informational warfare by intentionally leaking the deepest secrets of powerful world governments and officials. The biggest and best known of them all was Wikileaks, founded by a mysterious figure named Julian Assange, who Ecuador granted asylum in 2012 despite the protests of Great Britain, </span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-2189515/The-WikiLeaks-siege-fiasco-As-tiny-Ecuador-saves-Assange-extradition-granting-asylum-40-police-surround-embassy--steps-outside-ll-pounce.html" target="_blank"><span data-dcnode-id="503" instrument_node="">as reported here by the Daily Mail</span></a><span data-dcnode-id="501" instrument_node="">. Wikileaks would emerge as a major force in American and global politics as it exerted influence over presidential elections and steered the public's perception of massive government surveillance programs that would come to define the 2010s.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="481" data-index="125"><figure class="frameme" data-cbid="103" data-dcnode-id="493"><div class="theframe" data-dcnode-id="494" data-image="//townsquare.media/site/341/files/2020/04/94.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">2013: 'MARATHON TERROR'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="482"><p class="caption" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Aaron Tang // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">2013: 'MARATHON TERROR'</span></h2><div class="item-description" data-dcnode-id="483"><p data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">On April 15, 2015, a series of explosions rocked the Boston Marathon while the nation watched in horror as the news media played images of runners attacked near the finish line. A headline in The Boston Globe </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mashable.com/2013/04/23/boston-globe-boston-bombings/%23YuQaqdV7GZqV" target="_blank"><span data-dcnode-id="487" instrument_node="">captured the public sentiment</span></a><span data-dcnode-id="485" instrument_node=""> as authorities spent the next few days piecing together a picture of two brothers radicalized by fundamentalist Islam. An unprecedented manhunt unfolded on live TV as police pursued the brothers, who engaged them in a wild shootout and several escapes before one was killed and the other was captured.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="459" data-index="126"><figure class="frameme" data-cbid="104" data-dcnode-id="477"><div class="theframe" data-dcnode-id="478" data-image="//townsquare.media/site/341/files/2020/04/95.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">2014: 'STREETS OF RAGE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="460"><p class="caption" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Loavesofbread // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">2014: 'STREETS OF RAGE'</span></h2><div class="item-description" data-dcnode-id="461"><p data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">In 2014, a grand jury failed to indict the police officer who killed an unarmed teenager named Michael Brown in Ferguson, Mo., touching off sometimes-violent protests both in the poor Missouri town itself and across the country, </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/newspaper-front-pages-covering-ferguson-missouri-today-2014-11" target="_blank"><span data-dcnode-id="471" instrument_node="">as illustrated by this New York Post headline</span></a><span data-dcnode-id="469" instrument_node="">. The incident, as reported by the New York Post, caused outrage not only because it was yet another in a long line of police killings of black men that went unpunished, but because of the police response to civilian protests. The Black Lives Matter movement gained strength as the country debated the militarization of even the smallest American police forces and learned about the policy of policing for profit that was and is widespread in poor, minority communities.</span></p><p data-dcnode-id="462"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">You may also like: </span></strong><span data-dcnode-id="465" instrument_node=""> </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3220/stonewall-today-50-years-modern-lgbtq-history%231" target="_blank"><span data-dcnode-id="464" instrument_node="">From Stonewall to today: 50 years of modern LGBTQ+ history</span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="458"></div><div class="photogallery-item" data-dcnode-id="442" data-index="128"><figure class="frameme" data-cbid="105" data-dcnode-id="454"><div class="theframe" data-dcnode-id="455" data-image="//townsquare.media/site/341/files/2020/04/96.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">2015: 'WE DO'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="443"><p class="caption" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Ted Eytan // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">2015: 'WE DO'</span></h2><div class="item-description" data-dcnode-id="444"><p data-dcnode-id="445"><span data-dcnode-id="449" instrument_node="">In 2015, the San Francisco Chronicle </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfchronicle.com/opinion/letterstoeditor/article/Letters-to-the-Editor-June-29-6352552.php" target="_blank"><span data-dcnode-id="448" instrument_node="">used two words</span></a><span data-dcnode-id="446" instrument_node=""> to capture the sentiments of the paper's home city—long a bastion of gay culture—in response to the Obergefell v. Hodges Supreme Court decision. The landmark civil rights case determined that states may not deny same-sex couples the right to get married. It was the capstone achievement of a movement that began with the Stonewall Riots nearly half a century earlier in 1969.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="426" data-index="129"><figure class="frameme" data-cbid="106" data-dcnode-id="438"><div class="theframe" data-dcnode-id="439" data-image="//townsquare.media/site/341/files/2020/04/97.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">2016: 'TRUMP TRIUMPHS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="427"><p class="caption" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">VOA News // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">2016: 'TRUMP TRIUMPHS'</span></h2><div class="item-description" data-dcnode-id="428"><p data-dcnode-id="429"><span data-dcnode-id="433" instrument_node="">In 2016, Donald Trump stunned the American electorate and the entire world when he first defeated a robust and crowded field of Republican primary candidates and eventually, Democrat Hillary Clinton in the general election. A political outsider with a long and scandalous public life, Trump defied conventional wisdom and beat one of the most formidable political machines ever assembled. As </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/images/2016/11/09/nytfrontpage/scan.pdf" target="_blank"><span data-dcnode-id="432" instrument_node="">The New York Times reported</span></a><span data-dcnode-id="430" instrument_node="">, Donald Trump was elected president despite—or perhaps because of—his refusal to conform to longstanding political norms and etiquettes.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="410" data-index="130"><figure class="frameme" data-cbid="107" data-dcnode-id="422"><div class="theframe" data-dcnode-id="423" data-image="//townsquare.media/site/341/files/2020/04/98.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">2017: 'PURE EVIL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="411"><p class="caption" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Usa-Pyon // Shutterstock</span></p><h2 class="item-title" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">2017: 'PURE EVIL'</span></h2><div class="item-description" data-dcnode-id="412"><p data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">Mass shootings have been a standard part of the American experience since the Columbine High School massacre in 1999, with mass murders regularly taking place at schools, malls, movie theaters, offices, stores, nightclubs, and every other conceivable public space. The worst of them all at that point, however, took place on Oct. 1, 2017, when a gunman opened fire on a crowd of Las Vegas concertgoers from an elevated position with a rifle modified for automatic fire in an act the Miami Herald referred to as </span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cjr.org/united_states_project/las-vegas-shooting-headlines.php" target="_blank"><span data-dcnode-id="416" instrument_node="">“pure evil.”</span></a><span data-dcnode-id="414" instrument_node=""> The modification device, called a bump stock, was perfectly legal to buy and own.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="409"></div><div class="photogallery-item" data-dcnode-id="393" data-index="132"><figure class="frameme" data-cbid="108" data-dcnode-id="405"><div class="theframe" data-dcnode-id="406" data-image="//townsquare.media/site/341/files/2020/04/99.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">2018: '#METOO MOVEMENT BROUGHT DOWN 201 POWERFUL MEN, NEARLY HALF OF THEIR REPLACEMENTS ARE WOMEN'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="394"><p class="caption" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Pixabay</span></p><h2 class="item-title" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">2018: '#METOO MOVEMENT BROUGHT DOWN 201 POWERFUL MEN, NEARLY HALF OF THEIR REPLACEMENTS ARE WOMEN'</span></h2><div class="item-description" data-dcnode-id="395"><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">From entertainers to media moguls, executives to military officers, hundreds of men learned through the #MeToo movement that women would no longer succumb to being commoditized perks of wealth and power, as they had been for time immemorial. The New York Times </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/interactive/2018/10/23/us/metoo-replacements.html" target="_blank"><span data-dcnode-id="399" instrument_node="">reported that the movement</span></a><span data-dcnode-id="397" instrument_node=""> had felled more than 200 powerful men at the highest reaches of their industries—and nearly half had been replaced by women.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="369" data-index="133"><figure class="frameme" data-cbid="109" data-dcnode-id="389"><div class="theframe" data-dcnode-id="390" data-image="//townsquare.media/site/341/files/2020/04/100.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">2019: 'IMPEACHMENT INQUIRY BEGINS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="370"><p class="caption" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">The Wall Street Journal</span></p><h2 class="item-title" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">2019: 'IMPEACHMENT INQUIRY BEGINS'</span></h2><div class="item-description" data-dcnode-id="371"><p data-dcnode-id="380"><span data-dcnode-id="384" instrument_node="">Speaker Nancy Pelosi on Sept. 24 announced the House of Representatives was launching an official impeachment inquiry into President Donald Trump. That inquiry came on the heels of </span><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/1342/whats-happening-timeline-muellers-investigation" target="_blank"><span data-dcnode-id="383" instrument_node="">Robert Mueller's investigation into collusion with Russia in the lead-up to the 2016 presidential elections</span></a><span data-dcnode-id="381" instrument_node="">&nbsp;and obstruction of justice by Trump in regard to potential collusion. That investigation did not find sufficient evidence of collusion nor reach a determination about whether President Donald Trump committed obstruction of justice.</span></p><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">The impeachment inquiry was announced in light of a whistleblower complaint that President Trump, in a July 25 phone call with Ukraine President Volodymyr Zelensky, abused his power by applying pressuring on Zelensky to investigate his political rival, former Vice President Joe Biden. The whistleblower further alleged White House officials tried to obscure records of that phone call.&nbsp;</span></p><p data-dcnode-id="372"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">You may also like:</span></strong><span data-dcnode-id="375" instrument_node=""> </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3498/what-marriage-was-year-you-were-born" target="_blank"><span data-dcnode-id="374" instrument_node="">What marriage was like the year you were born</span></a></p></div></div></div></div></div></div></div></div><div class="content-footer" data-dcnode-id="215"><span data-dcnode-id="363" instrument_node=""></span><div class="tags-lines" data-dcnode-id="353"><div class="wrapper categories" data-dcnode-id="354"><span data-dcnode-id="359"><span data-dcnode-id="362" instrument_node="">Categories</span><span data-dcnode-id="360" instrument_node="">: </span></span><span data-dcnode-id="355"><span data-dcnode-id="358" instrument_node=""></span><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wbkr.com/category/whats-new/"><span data-dcnode-id="357" instrument_node="">What's New</span></a></span></div></div><div class="comments-wrapper" data-dcnode-id="345"><div class="comments" data-dcnode-id="346"><div data-dcnode-id="349"><i data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Comments</span></i><span aria-hidden="true" class="icon-triangle-down" data-dcnode-id="350"></span></div><div class="cto" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Leave A Comment</span></div></div></div><div class="zergnet-widget zergnet-widget-84358 widget-loaded" data-dcnode-id="220" data-zerg-widget-id="84358"><div class="zerghead" data-dcnode-id="340"><span class="zergheader" data-dcnode-id="343"><span data-dcnode-id="344" ins
