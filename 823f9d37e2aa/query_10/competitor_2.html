histicated and violent gangster culture in the world and cost countless lives and millions of dollars, all without denting the very real problem of alcoholism.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1888"></div><div class="photogallery-item" data-dcnode-id="1866" data-index="20"><figure class="frameme" data-cbid="24" data-dcnode-id="1884"><div class="theframe" data-dcnode-id="1885" data-image="//townsquare.media/site/341/files/2020/04/156.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">1934: 'MIDWEST DUST STORM MOVES TO EAST COAST'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1867"><p class="caption" data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">U.S. Departmnet of Agriculture // flickr</span></p><h2 class="item-title" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">1934: 'MIDWEST DUST STORM MOVES TO EAST COAST'</span></h2><div class="item-description" data-dcnode-id="1868"><p data-dcnode-id="1875"><span data-dcnode-id="1879" instrument_node="">The financial catastrophe that was the Great Depression was magnified by the simultaneous environmental </span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/this-day-in-history/dust-storm-sweeps-from-great-plains-across-eastern-states" target="_blank"><span data-dcnode-id="1878" instrument_node="">catastrophe of the Dust Bowl</span></a><span data-dcnode-id="1876" instrument_node="">. Widespread drought and irresponsible farming practices turned millions of tons of once-fertile topsoil into dust, which was sent airborne in massive dust storms that blackened out the sky and buried entire farms across the Midwest. By 1934, the catastrophe was no longer regional as the winds carried hundreds of millions of tons of dust from the Great Plains all the way to the East Coast, blanketing New York City and Washington D.C. In between was Bethlehem, Pa., where the Centre Daily Times reported on the darkening skies on May 11, 1934.</span></p><p data-dcnode-id="1869"><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1872" instrument_node=""> </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3198/counties-highest-rate-food-insecure-children" target="_blank"><span data-dcnode-id="1871" instrument_node="">Counties with the highest rate of food insecure children</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1850" data-index="21"><figure class="frameme" data-cbid="25" data-dcnode-id="1862"><div class="theframe" data-dcnode-id="1863" data-image="//townsquare.media/site/341/files/2020/04/166.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">1935: 'SENATE PASSES SECURITY BILL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1851"><p class="caption" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Social Security Online // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">1935: 'SENATE PASSES SECURITY BILL'</span></h2><div class="item-description" data-dcnode-id="1852"><p data-dcnode-id="1853"><span data-dcnode-id="1857" instrument_node="">On June 20, 1935, The Atlanta Georgian reported on the passage of what just might be the most important piece of legislation ever passed in American history: the </span><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ourdocuments.gov/doc.php%3Fflash%3Dfalse%26doc%3D68" target="_blank"><span data-dcnode-id="1856" instrument_node="">Social Security Act</span></a><span data-dcnode-id="1854" instrument_node="">. The cornerstone of FDR's reform package, Social Security offered Americans something no generation had ever experienced before—a guarantee. Prior to 1935, providing for the elderly was left to communities, charities, churches, and families. Social Security would take contributions from taxes to establish a fund to provide relief for Americans who had passed their income-earning years—it remains the bedrock of America's social safety net.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1834" data-index="22"><figure class="frameme" data-cbid="26" data-dcnode-id="1846"><div class="theframe" data-dcnode-id="1847" data-image="//townsquare.media/site/341/files/2020/04/174.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">1936: 'HITLER HOSTS OLYMPICS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1835"><p class="caption" data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">A. Frankl // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">1936: 'HITLER HOSTS OLYMPICS'</span></h2><div class="item-description" data-dcnode-id="1836"><p data-dcnode-id="1837"><span data-dcnode-id="1841" instrument_node="">By 1936, storm clouds were brewing over Europe, where fascism, authoritarianism, and anti-Semitism were fueling a lurch toward global conflict, already evident in the outbreak of the Spanish Civil War. The </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olympic.org/berlin-1936" target="_blank"><span data-dcnode-id="1840" instrument_node="">Olympic Games that year</span></a><span data-dcnode-id="1838" instrument_node=""> offered a respite—even though they were held in Berlin under the watchful eye of none other than Adolf Hitler—which The News-Chronicle reported with a bland, but telling headline. That year, an African American man named Jesse Owens won four gold medals and struck a blow not only against racism in his own country, but against Hitler's ignorant insistence that his Aryan athletes were representatives of the so-called master race.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1833"></div><div class="photogallery-item" data-dcnode-id="1817" data-index="24"><figure class="frameme" data-cbid="27" data-dcnode-id="1829"><div class="theframe" data-dcnode-id="1830" data-image="//townsquare.media/site/341/files/2020/04/185.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">1937: 'HINDENBURG EXPLODES!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1818"><p class="caption" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Gus Pasquarella // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">1937: 'HINDENBURG EXPLODES!'</span></h2><div class="item-description" data-dcnode-id="1819"><p data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">The phrase "Oh, the humanity!" was seared into the American consciousness on May 6, 1937, when the Hindenburg, a German Zeppelin airship, exploded over Lakehurst, N.J. It's still unclear what exactly </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smithsonianmag.com/smithsonian-institution/80th-anniversary-hindenburg-disaster-mysteries-remain-180963107/" target="_blank"><span data-dcnode-id="1823" instrument_node="">doomed the massive Hindenburg</span></a><span data-dcnode-id="1821" instrument_node="">, which was about the size of the Titanic, but its destruction signaled the end of the era of the rigid passenger airship. The New York Daily News was among the first to report on the disaster, which would soon dominate headlines and newsreels across the world.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1801" data-index="25"><figure class="frameme" data-cbid="28" data-dcnode-id="1813"><div class="theframe" data-dcnode-id="1814" data-image="//townsquare.media/site/341/files/2020/04/195.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">1938: 'PEACE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1802"><p class="caption" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">London Express // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">1938: 'PEACE'</span></h2><div class="item-description" data-dcnode-id="1803"><p data-dcnode-id="1804"><span data-dcnode-id="1808" instrument_node="">On Sept. 30, 1938, the Daily Express printed one of the most misguided and short-sighted headlines in history when it ran a single word in boldface, all-caps type: "PEACE." The headline was supposed to be a summary of the disastrous </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Munich-Agreement" target="_blank"><span data-dcnode-id="1807" instrument_node="">Munich Agreement</span></a><span data-dcnode-id="1805" instrument_node="">, the most significant and regrettable appeasement in a series of Allied capitulations to Adolf Hitler, which emboldened the Nazi dictator to pursue his goal of world domination. A year later, a more fitting headline would sum up the real consequences of the Munich agreement and other weak-kneed Allied appeasements.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1777" data-index="26"><figure class="frameme" data-cbid="29" data-dcnode-id="1797"><div class="theframe" data-dcnode-id="1798" data-image="//townsquare.media/site/341/files/2020/04/204.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">1939: 'WAR!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1778"><p class="caption" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">FPG/Hulton Archive // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">1939: 'WAR!'</span></h2><div class="item-description" data-dcnode-id="1779"><p data-dcnode-id="1788"><span data-dcnode-id="1792" instrument_node="">On Sept. 1, in a 9 a.m. extra edition, the Los Angeles Times reported on the </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//encyclopedia.ushmm.org/content/en/article/invasion-of-poland-fall-1939" target="_blank"><span data-dcnode-id="1791" instrument_node="">end of the so-called peace</span></a><span data-dcnode-id="1789" instrument_node=""> forged by the Munich Agreement a year earlier. The headline's subheads told the tale:</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">"German troops invade Poland." "Nazis bomb Warsaw." World War II, the greatest catastrophe in human history, had begun.</span></p><p data-dcnode-id="1780"><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1783" instrument_node=""> </span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3360/original-woodstock-numbers" target="_blank"><span data-dcnode-id="1782" instrument_node="">The original Woodstock, by the numbers</span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1776"></div><div class="photogallery-item" data-dcnode-id="1760" data-index="28"><figure class="frameme" data-cbid="30" data-dcnode-id="1772"><div class="theframe" data-dcnode-id="1773" data-image="//townsquare.media/site/341/files/2020/04/2110.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">1940: 'PARIS HAS FALLEN'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1761"><p class="caption" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">1940: 'PARIS HAS FALLEN'</span></h2><div class="item-description" data-dcnode-id="1762"><p data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">In 1940, the war in the East still felt far away to many in Western Europe, but that false sense of security was shattered on June 14. The New York World-Telegram echoed the shock felt across the Western world when what had been an unthinkable event unfolded in real time. After just six weeks of fighting, </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/history/worldwars/wwtwo/fall_france_01.shtml" target="_blank"><span data-dcnode-id="1766" instrument_node="">France fell to Nazi Germany</span></a><span data-dcnode-id="1764" instrument_node=""> and Hitler's forces occupied Paris.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1744" data-index="29"><figure class="frameme" data-cbid="31" data-dcnode-id="1756"><div class="theframe" data-dcnode-id="1757" data-image="//townsquare.media/site/341/files/2020/04/226.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">1941: 'WAR! OAHU BOMBED BY JAPANESE PLANES'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1745"><p class="caption" data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">U.S. Air Force</span></p><h2 class="item-title" data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">1941: 'WAR! OAHU BOMBED BY JAPANESE PLANES'</span></h2><div class="item-description" data-dcnode-id="1746"><p data-dcnode-id="1747"><span data-dcnode-id="1751" instrument_node="">Dec. 7, 1941, is, in the words of President Roosevelt, a date which will live in infamy. That day, the </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americaslibrary.gov/jb/wwii/jb_wwii_pearlhar_1.html" target="_blank"><span data-dcnode-id="1750" instrument_node="">Japanese launched a surprise attack</span></a><span data-dcnode-id="1748" instrument_node=""> on the United States Naval Base at Pearl Harbor, Hawaii, killing 2,300 Americans and destroying much of the Pacific Fleet. The Honolulu Star-Bulletin 1st Extra edition trumpeted the news, which it led with the exclamation "War!" The editor was right—neutrality was no longer an option for the United States, which was now a central player in what had become a global war.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1728" data-index="30"><figure class="frameme" data-cbid="32" data-dcnode-id="1740"><div class="theframe" data-dcnode-id="1741" data-image="//townsquare.media/site/341/files/2020/04/235.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">1942: 'JAPANESE BEGIN EVACUATION TREK'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1729"><p class="caption" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">U.S. Army Signal Corps // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">1942: 'JAPANESE BEGIN EVACUATION TREK'</span></h2><div class="item-description" data-dcnode-id="1730"><p data-dcnode-id="1731"><span data-dcnode-id="1735" instrument_node="">The Americans at Pearl Harbor weren't the only victims of the Japanese attack. On March 24, 1942, The New York Times </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1942/03/24/archives/japanese-begin-evacuation-trek-first-caravan-of-350-cars-with-1000.html" target="_blank"><span data-dcnode-id="1734" instrument_node="">reported on the start of one of the most shameful eras</span></a><span data-dcnode-id="1732" instrument_node=""> in American history, the forced internment of Japanese-Americans, many of whom fought for America in World War I and had never even been to Japan. Guilty of nothing other than being born the wrong race—unlike the legions of German- and Italian-Americans who openly supported Mussolini and Hitler—more than 127,000 American citizens were presumed to be loyal to the enemy without any evidence presented to support that claim.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1727"></div><div class="photogallery-item" data-dcnode-id="1711" data-index="32"><figure class="frameme" data-cbid="33" data-dcnode-id="1723"><div class="theframe" data-dcnode-id="1724" data-image="//townsquare.media/site/341/files/2020/04/246.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">1943: 'STALINGRAD ARMY WIPED OUT'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1712"><p class="caption" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">1943: 'STALINGRAD ARMY WIPED OUT'</span></h2><div class="item-description" data-dcnode-id="1713"><p data-dcnode-id="1714"><span data-dcnode-id="1718" instrument_node="">Before 1943, Hitler and his marauding Nazi troops seemed invincible. The tide turned, however, with the most epic fight in the history of the world: the </span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/world-war-ii/battle-of-stalingrad" target="_blank"><span data-dcnode-id="1717" instrument_node="">Battle of Stalingrad</span></a><span data-dcnode-id="1715" instrument_node="">. On Feb. 1, the Daily Mail reported on the end of the mayhem, which pitted 2 million troops against each other in the largest and bloodiest conflict in history, which consisted of ferocious fighting during a brutal Russian winter in a starving city devastated by warfare and filled with stranded civilians. When the dust settled, the Germans had suffered a crushing defeat, and the Nazis would remain on the defensive for the rest of World War II.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1689" data-index="33"><figure class="frameme" data-cbid="34" data-dcnode-id="1707"><div class="theframe" data-dcnode-id="1708" data-image="//townsquare.media/site/341/files/2020/04/255.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">1944: 'FRANCE INVADED'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1690"><p class="caption" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">1944: 'FRANCE INVADED'</span></h2><div class="item-description" data-dcnode-id="1691"><p data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">On June 6, 1944—four years after the fall of Paris—The Philadelphia Inquirer </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clickamericana.com/topics/war-topics/wwii-newspaper-headlines-d-day-invasion-france-1944" target="_blank"><span data-dcnode-id="1701" instrument_node="">reported on another invasion of France</span></a><span data-dcnode-id="1699" instrument_node="">, this time by the country's allies on the beaches of Normandy. Known as D-Day, Normandy was the largest seaborne invasion in history. The Allies suffered heavy losses but eventually prevailed, liberating France from Nazi occupation and establishing a beachhead in mainland Europe for an eventual march on Germany.</span></p><p data-dcnode-id="1692"><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1695" instrument_node=""> </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/2583/how-well-do-you-remember-1969" target="_blank"><span data-dcnode-id="1694" instrument_node="">How well do you remember 1969?</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1673" data-index="34"><figure class="frameme" data-cbid="35" data-dcnode-id="1685"><div class="theframe" data-dcnode-id="1686" data-image="//townsquare.media/site/341/files/2020/04/263.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">1945: 'ATOM BOMB ROCKS JAPS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1674"><p class="caption" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">509th Operations Group // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">1945: 'ATOM BOMB ROCKS JAPS'</span></h2><div class="item-description" data-dcnode-id="1675"><p data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">On Aug. 6, 1945, the United States war machine </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osti.gov/opennet/manhattan-project-history/Events/1945/hiroshima.htm" target="_blank"><span data-dcnode-id="1679" instrument_node="">unleashed a secret weapon</span></a><span data-dcnode-id="1677" instrument_node=""> it had been developing for years when a B-29 bomber called the Enola Gay dropped a single, oddly shaped bomb called Little Boy over Hiroshima, Japan. Little Boy was a 9,700-pound uranium bomb, the first of its kind ever dropped in war—an event the New York Daily News reported on Aug. 7. Shortly after, another bomb, Fat Boy, would fall on Nagasaki, forcing Japan to surrender. World War II was over, but the nuclear age had just begun.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1672"></div><div class="photogallery-item" data-dcnode-id="1656" data-index="36"><figure class="frameme" data-cbid="36" data-dcnode-id="1668"><div class="theframe" data-dcnode-id="1669" data-image="//townsquare.media/site/341/files/2020/04/274.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">1946: 'GOERING &amp; CO. TO BE HANGED'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1657"><p class="caption" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Keystone/Getty Images</span></p><h2 class="item-title" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">1946: 'GOERING &amp; CO. TO BE HANGED'</span></h2><div class="item-description" data-dcnode-id="1658"><p data-dcnode-id="1659"><span data-dcnode-id="1663" instrument_node="">As the full scope of the Nazi's crimes began to come to light, some of Hitler's most senior henchmen were put on trial at the Nuremberg tribunals, dubbed by the media as "the greatest trial in history." A dozen of the worst Nazi criminals were </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2009/sep/11/nazis-nuremberg-executed-hermann-goring" target="_blank"><span data-dcnode-id="1662" instrument_node="">sentenced to die by hanging</span></a><span data-dcnode-id="1660" instrument_node="">, but the most senior of them all, Hermann Göring, committed suicide in a final act of defiance just hours before he was set to be hanged, a fact the Washington Daily News couldn't have known when it ran this headline.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1640" data-index="37"><figure class="frameme" data-cbid="37" data-dcnode-id="1652"><div class="theframe" data-dcnode-id="1653" data-image="//townsquare.media/site/341/files/2020/04/284.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">1947: 'DODGERS PURCHASE ROBINSON, FIRST NEGRO IN MODERN MAJOR LEAGUE BASEBALL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1641"><p class="caption" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Bob Sandberg // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">1947: 'DODGERS PURCHASE ROBINSON, FIRST NEGRO IN MODERN MAJOR LEAGUE BASEBALL'</span></h2><div class="item-description" data-dcnode-id="1642"><p data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">On April 11, 1947, The New York Times used an unfortunate choice of verbs </span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//movies2.nytimes.com/learning/general/onthisday/big/0410.html%23article" target="_blank"><span data-dcnode-id="1646" instrument_node="">to report a monumental event</span></a><span data-dcnode-id="1644" instrument_node=""> both for America's pastime and America itself. The Brooklyn Dodgers integrated baseball when the team signed Jackie Robinson, a Hall of Famer who will forever be known as the man who broke the color barrier.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1624" data-index="38"><figure class="frameme" data-cbid="38" data-dcnode-id="1636"><div class="theframe" data-dcnode-id="1637" data-image="//townsquare.media/site/341/files/2020/04/294.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">1948: 'STATE OF ISRAEL IS BORN'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1625"><p class="caption" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">The Palestine Post // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">1948: 'STATE OF ISRAEL IS BORN'</span></h2><div class="item-description" data-dcnode-id="1626"><p data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">In 1948, The Palestine Post reported on one of the most controversial and consequential events in world history, </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/milestones/1945-1952/creation-israel" target="_blank"><span data-dcnode-id="1630" instrument_node="">the founding of Israel</span></a><span data-dcnode-id="1628" instrument_node="">. Scattered across the world for centuries, brutalized, persecuted, and nearly wiped from the Earth by the Nazis, the world's Jews now had a homeland of their own. However, there were already hundreds of thousands of Palestinian Arabs living in that homeland, and they either fled, were killed, or were forcibly removed to make way for the thousands—and then millions—of future Israelis who would flock there. The issue remains among the most contentious in world politics, and the region remains among the most volatile and violent in the world.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1623"></div><div class="photogallery-item" data-dcnode-id="1601" data-index="40"><figure class="frameme" data-cbid="39" data-dcnode-id="1619"><div class="theframe" data-dcnode-id="1620" data-image="//townsquare.media/site/341/files/2020/04/305.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">1949: 'ATLANTIC PACT REVEALED'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1602"><p class="caption" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Abbie Rowe // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">1949: 'ATLANTIC PACT REVEALED'</span></h2><div class="item-description" data-dcnode-id="1603"><p data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node="">On March 18, 1949, The Detroit News reported on a pact that would, less than a month later, lead to the creation of a new world order: the </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/milestones/1945-1952/nato" target="_blank"><span data-dcnode-id="1613" instrument_node="">formation of the North Atlantic Treaty Organization</span></a><span data-dcnode-id="1611" instrument_node=""> (NATO). The organization was formed in response to World War II as a mutual-defense alliance by North America and European allies. If the next Hitler attacked any one of them, the pact members promised, the others would be compelled to come to that country's defense.</span></p><p data-dcnode-id="1604"><strong data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1607" instrument_node=""> </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/1066/defining-historical-moments-year-you-were-born" target="_blank"><span data-dcnode-id="1606" instrument_node="">Defining historical moments from the year you were born</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1585" data-index="41"><figure class="frameme" data-cbid="40" data-dcnode-id="1597"><div class="theframe" data-dcnode-id="1598" data-image="//townsquare.media/site/341/files/2020/04/315.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">1950: 'N. KOREA REDS DECLARE WAR'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1586"><p class="caption" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">1950: 'N. KOREA REDS DECLARE WAR'</span></h2><div class="item-description" data-dcnode-id="1587"><p data-dcnode-id="1588"><span data-dcnode-id="1592" instrument_node="">A scant five years after the end of World War II, the New York Herald Tribune was reporting on yet another far-away conflict that would soon draw millions of American troops into its vortex. With fascism defeated, America's communist friends had turned into foes. The expansion of communism and America's obsession with preventing it would be the justification for </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2013/06/28/world/asia/korean-war-fast-facts/index.html" target="_blank"><span data-dcnode-id="1591" instrument_node="">war in Korea</span></a><span data-dcnode-id="1589" instrument_node="">—a war to which a formal end has yet to be declared.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1569" data-index="42"><figure class="frameme" data-cbid="41" data-dcnode-id="1581"><div class="theframe" data-dcnode-id="1582" data-image="//townsquare.media/site/341/files/2020/04/324.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">1951: 'ATOM SPY COUPLE SENTENCED TO DIE; AIDE GETS 30 YEARS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1570"><p class="caption" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">1951: 'ATOM SPY COUPLE SENTENCED TO DIE; AIDE GETS 30 YEARS'</span></h2><div class="item-description" data-dcnode-id="1571"><p data-dcnode-id="1572"><span data-dcnode-id="1576" instrument_node="">On April 6, 1951, The New York Times </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.nytimes.com/www.nytimes.com/learning/general/onthisday/big/0405.html" target="_blank"><span data-dcnode-id="1575" instrument_node="">reported on the outcome of a trial</span></a><span data-dcnode-id="1573" instrument_node=""> that embodied the early days of the Cold War and the mentality of 1950s Red Scare America. Julius and Ethel Rosenberg were convicted and sentenced to die for passing America's most closely guarded nuclear secrets to the Soviets, who prosecutors alleged developed a bomb of their own with help from the Rosenberg's information. Nearly 20 years later the trial remains controversial, with many believing that it wasn't actual evidence, but the Rosenberg's affiliation with socialist and communist groups that led to their convictions. They were executed by electric chair two years later.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1568"></div><div class="photogallery-item" data-dcnode-id="1552" data-index="44"><figure class="frameme" data-cbid="42" data-dcnode-id="1564"><div class="theframe" data-dcnode-id="1565" data-image="//townsquare.media/site/341/files/2020/04/334.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">1952: 'IKE WINS IN LANDSLIDE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1553"><p class="caption" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Dwight D. Eisenhower Library // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">1952: 'IKE WINS IN LANDSLIDE'</span></h2><div class="item-description" data-dcnode-id="1554"><p data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node="">In 1952, the Truman era ended, McCarthyism was raging full force and the post-war baby boom economy was roaring. The man who embodied it all was </span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-presidents/dwight-d-eisenhower" target="_blank"><span data-dcnode-id="1558" instrument_node="">Dwight D. Eisenhower</span></a><span data-dcnode-id="1556" instrument_node="">, a hero general of World War II, who was, as The Des Moines Register pointed out, elected in a landslide.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1536" data-index="45"><figure class="frameme" data-cbid="43" data-dcnode-id="1548"><div class="theframe" data-dcnode-id="1549" data-image="//townsquare.media/site/341/files/2020/04/344.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">1953: 'SALK'S VACCINE WORKS!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1537"><p class="caption" data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">March of Dimes // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">1953: 'SALK'S VACCINE WORKS!'</span></h2><div class="item-description" data-dcnode-id="1538"><p data-dcnode-id="1539"><span data-dcnode-id="1543" instrument_node="">On April 12, 1953, the New York Journal-American proved that newspapers don't only deliver bad news. Since the first epidemic in 1894, the crippling and </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyofvaccines.org/timeline%23EVT_100323" target="_blank"><span data-dcnode-id="1542" instrument_node="">highly contagious polio virus</span></a><span data-dcnode-id="1540" instrument_node=""> had been paralyzing children and terrorizing their parents—it's hard to imagine that by the mid-1950s there was a mother in America who didn't think of polio every time her children got sick. Then, Americans began hearing about a medical researcher named Jonas Salk who had been experimenting with a cure. The country's optimism proved warranted in 1953 when Salk successfully tested his experimental vaccine on himself and his own family.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1514" data-index="46"><figure class="frameme" data-cbid="44" data-dcnode-id="1532"><div class="theframe" data-dcnode-id="1533" data-image="//townsquare.media/site/341/files/2020/04/352.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">1954: 'SCHOOL SEGREGATION BANNED'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1515"><p class="caption" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">U.S. Army // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">1954: 'SCHOOL SEGREGATION BANNED'</span></h2><div class="item-description" data-dcnode-id="1516"><p data-dcnode-id="1523"><span data-dcnode-id="1527" instrument_node="">In 1954, the </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.loc.gov/exhibits/brown/brown-brown.html" target="_blank"><span data-dcnode-id="1526" instrument_node="">Brown v. Board of Education of Topeka</span></a><span data-dcnode-id="1524" instrument_node=""> Supreme Court decision smashed a giant crack into the wall of segregation that civil rights activists had been chipping away at since the end of Reconstruction. On May 17, The Topeka State Journal reported on the decision, which signaled the beginning of the end for racial segregation and the Jim Crow era—but it would also trigger a new and vicious wave of racial violence.</span></p><p data-dcnode-id="1517"><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1520" instrument_node=""> </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3043/can-you-answer-these-real-jeopardy-questions-about-politics" target="_blank"><span data-dcnode-id="1519" instrument_node="">Can you answer these real Jeopardy! questions about politics?</span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1513"></div><div class="photogallery-item" data-dcnode-id="1497" data-index="48"><figure class="frameme" data-cbid="45" data-dcnode-id="1509"><div class="theframe" data-dcnode-id="1510" data-image="//townsquare.media/site/341/files/2020/04/364.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">1955: 'NATION SHOCKED, VOW ACTION IN LYNCHING OF CHICAGO YOUTH'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1498"><p class="caption" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Scott Olson // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">1955: 'NATION SHOCKED, VOW ACTION IN LYNCHING OF CHICAGO YOUTH'</span></h2><div class="item-description" data-dcnode-id="1499"><p data-dcnode-id="1500"><span data-dcnode-id="1504" instrument_node="">In the summer of 1955, A 14-year-old Chicago teenager named Emmett Till was brutally murdered while visiting family in Mississippi in response to a perceived insult to a white woman. Unlike the thousands of lynchings and acts of terrorism that went unanswered in previous decades, Till's murder caused public outcry—as </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blackquotidian.com/anvc/black-quotidian/media/CD%25209-10-55%2520-%2520Till.pdf" target="_blank"><span data-dcnode-id="1503" instrument_node="">reflected in The Chicago Defender headline</span></a><span data-dcnode-id="1501" instrument_node="">—in part because of the determination of his mother to publicize his death with an open-casket funeral that put his mutilated corpse on display for the world to see. It was a defining moment and year for the Civil Rights movement—three days after Till's body was pulled from the Tallahatchie River, the Montgomery bus boycott began in the wake of the Rosa Parks incident.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1481" data-index="49"><figure class="frameme" data-cbid="46" data-dcnode-id="1493"><div class="theframe" data-dcnode-id="1494" data-image="//townsquare.media/site/341/files/2020/04/373.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">1956: 'ENGLAND, FRANCE INVADE EGYPT'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1482"><p class="caption" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Royal Navy // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">1956: 'ENGLAND, FRANCE INVADE EGYPT'</span></h2><div class="item-description" data-dcnode-id="1483"><p data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">In 1956, The Daily Mirror reported on the </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/cold-war/suez-crisis" target="_blank"><span data-dcnode-id="1487" instrument_node="">Suez Canal crisis</span></a><span data-dcnode-id="1485" instrument_node="">, a dramatic series of events that ignited the tinder box that was the Middle East in the late 1950s. Israel invaded Egypt in response to President Gamal Abdel Nasser's nationalization of the strategically critical Suez Canal. Although hostilities ended that same year, yet another world war seemed possible as France and Britain joined the fray, while Russia postured as if it were poised to do the same.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1465" data-index="50"><figure class="frameme" data-cbid="47" data-dcnode-id="1477"><div class="theframe" data-dcnode-id="1478" data-image="//townsquare.media/site/341/files/2020/04/383.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">1957: 'RUSSIANS LAUNCH FIRST ARTIFICIAL MOON'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1466"><p class="caption" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Asif A. Siddiqi // NASA</span></p><h2 class="item-title" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">1957: 'RUSSIANS LAUNCH FIRST ARTIFICIAL MOON'</span></h2><div class="item-description" data-dcnode-id="1467"><p data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node="">On Oct. 4, 1957, the Soviet Union emerged as the most technologically advanced nation in the world when it successfully </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.nasa.gov/sputnik/" target="_blank"><span data-dcnode-id="1471" instrument_node="">launched Sputnik 1</span></a><span data-dcnode-id="1469" instrument_node="">, the first satellite to orbit the Earth. The event, documented here by the Wilmington Morning News, triggered panic in the United States and much of the West, as Russia shocked the world with how far ahead it was in terms of technological prowess, and more importantly, by proving that it could now land its intercontinental ballistic missiles anywhere on Earth. The moment would lead to the creation of NASA and signal the start of the Space Race.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1464"></div><div class="photogallery-item" data-dcnode-id="1448" data-index="52"><figure class="frameme" data-cbid="48" data-dcnode-id="1460"><div class="theframe" data-dcnode-id="1461" data-image="//townsquare.media/site/341/files/2020/04/393.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">1958: 'DIG THIS GIRLS, ARMY'S SENDING ELVIS TO TEXAS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1449"><p class="caption" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Associated Press/Standard-Sentinel // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">1958: 'DIG THIS GIRLS, ARMY'S SENDING ELVIS TO TEXAS'</span></h2><div class="item-description" data-dcnode-id="1450"><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">By 1958, Elvis Presley was the King, but he was also a private. Patriotic, pre-Vietnam America swooned over the news of Elvis joining the Army, particularly the fact that the King opted for the regular service of a common soldier as opposed to a cushier gig as an entertainer or recruitment model. On March 27, the San Antonio Express </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newspapers.com/clip/1772159/elvis_to_be_sent_to_ft_hood/" target="_blank"><span data-dcnode-id="1454" instrument_node="">informed Presley's throngs of admirers</span></a><span data-dcnode-id="1452" instrument_node=""> that the King would soon be stationed at Fort Hood.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1426" data-index="53"><figure class="frameme" data-cbid="49" data-dcnode-id="1444"><div class="theframe" data-dcnode-id="1445" data-image="//townsquare.media/site/341/files/2020/04/403.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">1959: 'BATISTA FLEES CUBA; CASTRO IN CONTROL'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1427"><p class="caption" data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">1959: 'BATISTA FLEES CUBA; CASTRO IN CONTROL'</span></h2><div class="item-description" data-dcnode-id="1428"><p data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">Havana had long been a Caribbean playground for the world's rich, famous, and elite. As the New York Daily News reported on Jan. 1, 1959, however, all that changed when Cuba's corrupt, U.S.-backed leader, </span><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/1959/jan/02/cuba1" target="_blank"><span data-dcnode-id="1438" instrument_node="">Fulgencio Batista, quickly and unexpectedly abdicated power</span></a><span data-dcnode-id="1436" instrument_node=""> on New Year's Eve 1958 and fled the country. Cuba was now in control of communist forces led by Fidel Castro. A new chapter in Cold War history had begun, one that was dangerous, volatile—and 90 miles from American soil.</span></p><p data-dcnode-id="1429"><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1432" instrument_node=""> </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3405/oldest-national-parks-america" target="_blank"><span data-dcnode-id="1431" instrument_node="">Oldest national parks in America</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1410" data-index="54"><figure class="frameme" data-cbid="50" data-dcnode-id="1422"><div class="theframe" data-dcnode-id="1423" data-image="//townsquare.media/site/341/files/2020/04/416.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">1960: 'KENNEDY WINS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1411"><p class="caption" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">US Information Service/US Information Agency // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">1960: 'KENNEDY WINS'</span></h2><div class="item-description" data-dcnode-id="1412"><p data-dcnode-id="1413"><span data-dcnode-id="1417" instrument_node="">After using his youth and good looks to his advantage during the world's first televised presidential debate, </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jfklibrary.org/visit-museum/exhibits/permanent-exhibits/1960-presidential-election" target="_blank"><span data-dcnode-id="1416" instrument_node="">John F. Kennedy was elected president</span></a><span data-dcnode-id="1414" instrument_node="">, as reported on Nov. 9 by the San Jose Mercury, in one of the closest elections in U.S. history. A symbol of youthful vigor in a changing world, JFK was the youngest president in history and the first Catholic president ever elected.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1409"></div><div class="photogallery-item" data-dcnode-id="1393" data-index="56"><figure class="frameme" data-cbid="51" data-dcnode-id="1405"><div class="theframe" data-dcnode-id="1406" data-image="//townsquare.media/site/341/files/2020/04/424.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">1961: 'REBEL FORCE INVADES CUBA'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1394"><p class="caption" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">MIGUEL VINAS // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">1961: 'REBEL FORCE INVADES CUBA'</span></h2><div class="item-description" data-dcnode-id="1395"><p data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node="">In 1961, Newsday was one of the many outlets to report that "rebel" forces had invaded Cuba. Those rebels were a CIA-backed paramilitary organization executing a plan developed during the Eisenhower administration. The strategy banked on Cuban locals joining the uprising against Castro. They did not. The </span><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jfklibrary.org/learn/about-jfk/jfk-in-history/the-bay-of-pigs" target="_blank"><span data-dcnode-id="1399" instrument_node="">Bay of Pigs Invasion</span></a><span data-dcnode-id="1397" instrument_node="">, as it was called, was an unmitigated disaster that served as a stinging humiliation for JFK while elevating Fidel Castro to hero status in Cuba.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1377" data-index="57"><figure class="frameme" data-cbid="52" data-dcnode-id="1389"><div class="theframe" data-dcnode-id="1390" data-image="//townsquare.media/site/341/files/2020/04/432.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">1962: 'MARILYN MONROE FOUND DEAD'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1378"><p class="caption" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">1962: 'MARILYN MONROE FOUND DEAD'</span></h2><div class="item-description" data-dcnode-id="1379"><p data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">Marilyn Monroe was arguably the biggest movie star of all time and perhaps the most enduring sex symbol in history. In 1962, the </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/culture/2010/11/marilyn-monroe-201011" target="_blank"><span data-dcnode-id="1383" instrument_node="">troubled icon was found dead</span></a><span data-dcnode-id="1381" instrument_node=""> from an overdose. The news shocked the world, launched countless conspiracy theories based on her cozy connections with the likes of JFK and Joe DiMaggio, and signaled an end to the idealistic innocence of the 1950s. The Los Angeles Times was among the first to report on the death of the American pinup icon.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1361" data-index="58"><figure class="frameme" data-cbid="53" data-dcnode-id="1373"><div class="theframe" data-dcnode-id="1374" data-image="//townsquare.media/site/341/files/2020/04/444.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">1963: 'KENNEDY SLAIN ON DALLAS STREET'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1362"><p class="caption" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">1963: 'KENNEDY SLAIN ON DALLAS STREET'</span></h2><div class="item-description" data-dcnode-id="1363"><p data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node="">If you were alive on Nov. 22, 1963, chances are good you remember where you were when you heard that </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/jfk-assassination-newspaper-front-pages-2017-10%23the-dallas-times-herald-5" target="_blank"><span data-dcnode-id="1367" instrument_node="">John F. Kennedy was assassinated</span></a><span data-dcnode-id="1365" instrument_node="">. The Dallas Morning News reported on the world-changing event, which shattered America's sense of security and signaled the start of one of the most turbulent eras in the country's history.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1360"></div><div class="photogallery-item" data-dcnode-id="1338" data-index="60"><figure class="frameme" data-cbid="54" data-dcnode-id="1356"><div class="theframe" data-dcnode-id="1357" data-image="//townsquare.media/site/341/files/2020/04/454.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">1964: ''Beatlemania' SWEEPS U.S.'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1339"><p class="caption" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">William Lovelace // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">1964: ''Beatlemania' SWEEPS U.S.'</span></h2><div class="item-description" data-dcnode-id="1340"><p data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">In the decades leading up to 1964, there was no shortage of news articles about invasions involving Britain, but this time, the invaders landed not with guns and tanks, but with guitars and mop-top haircuts. The National Record News used the term Beatlemania to describe the so-called </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rollingstone.com/music/music-news/the-british-invasion-from-the-beatles-to-the-stones-the-sixties-belonged-to-britain-244870/" target="_blank"><span data-dcnode-id="1350" instrument_node="">British Invasion of English rock-and-roll giants</span></a><span data-dcnode-id="1348" instrument_node=""> who would forever change American music and culture. The world had officially met John, Paul, George, and Ringo.</span></p><p data-dcnode-id="1341"><strong data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1344" instrument_node=""> </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/702/states-have-taken-most-refugees-past-decade" target="_blank"><span data-dcnode-id="1343" instrument_node="">States that have accepted the most refugees in the past decade</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1322" data-index="61"><figure class="frameme" data-cbid="55" data-dcnode-id="1334"><div class="theframe" data-dcnode-id="1335" data-image="//townsquare.media/site/341/files/2020/04/463.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">1965: 'ALABAMA NEGRO MARCH EXPLODES INTO BLOODY VIOLENCE WITH POLICE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1323"><p class="caption" data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">AFP/Getty Images</span></p><h2 class="item-title" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">1965: 'ALABAMA NEGRO MARCH EXPLODES INTO BLOODY VIOLENCE WITH POLICE'</span></h2><div class="item-description" data-dcnode-id="1324"><p data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node="">A year after President Lyndon B. Johnson signed the Civil Rights Act of 1964, the Fitchburg Sentinel of Massachusetts </span><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rarenewspapers.com/view/618073" target="_blank"><span data-dcnode-id="1328" instrument_node="">reported on what would come to be known as Bloody Sunday</span></a><span data-dcnode-id="1326" instrument_node="">. Civil rights activists marching from Selma to Montgomery, Ala., in pursuit of voting rights were confronted and brutalized on the Edmund Pettus Bridge by armored police wielding clubs, dogs, tear gas, and bull whips. National TV news reporters beamed the dramatic images to televisions across America, and the event galvanized both politicians and regular citizens to finally take a stand against the situation in the South. A few months later, Johnson signed the 1965 Voting Rights Act.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1306" data-index="62"><figure class="frameme" data-cbid="56" data-dcnode-id="1318"><div class="theframe" data-dcnode-id="1319" data-image="//townsquare.media/site/341/files/2020/04/474.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">1966: 'U.S. BOMBS OIL DUMPS CLOSE TO HANOI'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1307"><p class="caption" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">U.S. Air Force</span></p><h2 class="item-title" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">1966: 'U.S. BOMBS OIL DUMPS CLOSE TO HANOI'</span></h2><div class="item-description" data-dcnode-id="1308"><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">The bombing an oil depot is fairly run-of-the-mill news during wartime, but the </span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newspaperarchive.com/beckley-raleigh-register-dec-19-1966-p-1/" target="_blank"><span data-dcnode-id="1312" instrument_node="">events reported by the Raleigh Register</span></a><span data-dcnode-id="1310" instrument_node=""> on Dec. 10, 1966, were anything but. It was the first time U.S. forces bombed the North Vietnamese capital of Hanoi, and as the bombs fell, so, too, did any hopes for a quick resolution to the growing war in Vietnam.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1305"></div><div class="photogallery-item" data-dcnode-id="1289" data-index="64"><figure class="frameme" data-cbid="57" data-dcnode-id="1301"><div class="theframe" data-dcnode-id="1302" data-image="//townsquare.media/site/341/files/2020/04/482.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">1967: 'JEWS, ARABS WAR!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1290"><p class="caption" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Tal Shabtai // Wikimedia Commons</span></p><h2 class="item-title" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">1967: 'JEWS, ARABS WAR!'</span></h2><div class="item-description" data-dcnode-id="1291"><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">By 1967, tensions in the Middle East were dangerously high, and Israel and its Arab neighbors once again found themselves embroiled in a bloody and controversial war. Although they were outnumbered and surrounded, Israeli forces proved ferocious and effective. The Jewish state quickly prevailed in what came to be known as the Six-Day War. The </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trtworld.com/mea/the-six-day-war-as-told-through-headlines-7641" target="_blank"><span data-dcnode-id="1295" instrument_node="">three-word headline</span></a><span data-dcnode-id="1293" instrument_node=""> on the June 5, 1967 edition of the Chicago Tribune left little to the imagination as to the nature of the conflict, which resulted in Israel expanding its territory and establishing itself as a true world power.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1273" data-index="65"><figure class="frameme" data-cbid="58" data-dcnode-id="1285"><div class="theframe" data-dcnode-id="1286" data-image="//townsquare.media/site/341/files/2020/04/492.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">1968: 'KING ASSASSINATED IN MEMPHIS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1274"><p class="caption" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">1968: 'KING ASSASSINATED IN MEMPHIS'</span></h2><div class="item-description" data-dcnode-id="1275"><p data-dcnode-id="1276"><span data-dcnode-id="1280" instrument_node="">Arguably the most consequential year in post-World War II history, 1968 seemed to deliver a new Earth-shattering headline every week. The one that defined the hopes, losses, turmoil, and violence of the year most completely, however, ran on April 5 in The Washington Post. A gunman had </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/US/assassination-martin-luther-king-jr/story%3Fid%3D54095424" target="_blank"><span data-dcnode-id="1279" instrument_node="">murdered Dr. Martin Luther King</span></a><span data-dcnode-id="1277" instrument_node="">. Almost exactly two months later, similar headlines would tell the same tale about Robert Kennedy.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1251" data-index="66"><figure class="frameme" data-cbid="59" data-dcnode-id="1269"><div class="theframe" data-dcnode-id="1270" data-image="//townsquare.media/site/341/files/2020/04/503.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">1969: 'MEN WALK ON MOON'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1252"><p class="caption" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">NASA / Neil A. Armstrong</span></p><h2 class="item-title" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">1969: 'MEN WALK ON MOON'</span></h2><div class="item-description" data-dcnode-id="1253"><p data-dcnode-id="1260"><span data-dcnode-id="1264" instrument_node="">The shocking Sputnik launch more than a decade earlier had galvanized America to concentrate its wealth, military might, manufacturing prowess, and best and brightest minds into winning the Space Race. The New York Times </span><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.nytimes.com/www.nytimes.com/learning/general/onthisday/big/0720.html%3Fref%3Dspace" target="_blank"><span data-dcnode-id="1263" instrument_node="">reported on July 21, 1969, that those efforts had come to fruition</span></a><span data-dcnode-id="1261" instrument_node=""> as two human beings named Neil Armstrong and Buzz Aldrin walked on the surface of the moon while a captivated world watched in real time. If the Soviets weren't sure what the moment signified, the astronauts planted an American flag before returning home.</span></p><p data-dcnode-id="1254"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1257" instrument_node=""> </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3230/how-america-has-changed-first-census-1790" target="_blank"><span data-dcnode-id="1256" instrument_node="">How America has changed since the first Census in 1790 </span></a></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1250"></div><div class="photogallery-item" data-dcnode-id="1234" data-index="68"><figure class="frameme" data-cbid="60" data-dcnode-id="1246"><div class="theframe" data-dcnode-id="1247" data-image="//townsquare.media/site/341/files/2020/04/513.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">1970: '4 STUDENTS SLAIN'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1235"><p class="caption" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Cliff // flickr</span></p><h2 class="item-title" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">1970: '4 STUDENTS SLAIN'</span></h2><div class="item-description" data-dcnode-id="1236"><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">College campuses represented the heart and soul of the anti-war protest movement, and the students who staged those protests became the bane of Richard Nixon's administration. On May 5, 1970, readers of the Los Angeles Times learned that the day before, soldiers of the Ohio National Guard </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//graphics.latimes.com/latimes130/%2318" target="_blank"><span data-dcnode-id="1240" instrument_node="">had opened fire</span></a><span data-dcnode-id="1238" instrument_node=""> with live ammunition into a crowd of protestors at Kent State University, killing four students and wounding nine others. While the war raged in Vietnam, American troops had killed American civilians on American soil.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1218" data-index="69"><figure class="frameme" data-cbid="61" data-dcnode-id="1230"><div class="theframe" data-dcnode-id="1231" data-image="//townsquare.media/site/341/files/2020/04/521.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">1971: 'COURT RULES FOR NEWSPAPERS, 6-3'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1219"><p class="caption" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Rory Finneren // flickr</span></p><h2 class="item-title" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">1971: 'COURT RULES FOR NEWSPAPERS, 6-3'</span></h2><div class="item-description" data-dcnode-id="1220"><p data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">By 1971, much of the country no longer blindly trusted its government and other major institutions the way it had a decade earlier. For many, that cynicism was cemented with the release of the </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archives.gov/research/pentagon-papers" target="_blank"><span data-dcnode-id="1224" instrument_node="">Pentagon Papers</span></a><span data-dcnode-id="1222" instrument_node="">, a series of leaked classified documents that revealed a pattern of intentional deception perpetrated by several consecutive presidential administrations and organized at the highest levels of government. On July 1, 1971, The Washington Post headline informed the world that a landmark Supreme Court case gave The New York Times and The Washington Post the right to print the material without fear of government retribution. President Nixon demonized the media as unpatriotic, a sentiment that remains central to conservative orthodoxy today.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1202" data-index="70"><figure class="frameme" data-cbid="62" data-dcnode-id="1214"><div class="theframe" data-dcnode-id="1215" data-image="//townsquare.media/site/341/files/2020/04/531.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">1972: 'MASSACRE AT THE GAMES'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1203"><p class="caption" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">sassik // flickr</span></p><h2 class="item-title" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">1972: 'MASSACRE AT THE GAMES'</span></h2><div class="item-description" data-dcnode-id="1204"><p data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">The 1936 Berlin Olympics offered the world an escape and distraction from disturbing global events. In 1972 in a different German city, the Olympic Games became one. The Sun's headline that year </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/news/worldnews/middleeast/israel/12028765/Horrific-new-details-emerge-about-the-1972-Munich-Olympics-massacre.html" target="_blank"><span data-dcnode-id="1208" instrument_node="">referred to the kidnapping, torture, and murder</span></a><span data-dcnode-id="1206" instrument_node=""> of 11 Israeli athletes and a West German police officer by Palestinian terrorists at the Munich Olympics. The conflict in the Middle East was no longer contained to the Middle East, and terrorism was now a global export.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1201"></div><div class="photogallery-item" data-dcnode-id="1185" data-index="72"><figure class="frameme" data-cbid="63" data-dcnode-id="1197"><div class="theframe" data-dcnode-id="1198" data-image="//townsquare.media/site/341/files/2020/04/541.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">1973: 'TOP COURT THROWS OUT ABORTION BANS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1186"><p class="caption" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Peter Keegan // Keystone // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">1973: 'TOP COURT THROWS OUT ABORTION BANS'</span></h2><div class="item-description" data-dcnode-id="1187"><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">Abortion is probably the most divisive and emotional issue in American politics and has been for nearly a half century. In 1973, headlines like this one in the New York Daily News </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/news/national/supreme-court-rules-roe-v-wade-1973-article-1.2068726" target="_blank"><span data-dcnode-id="1191" instrument_node="">informed America that the Supreme Court had ruled in favor of Jane Roe</span></a><span data-dcnode-id="1189" instrument_node="">, an unwed mother who filed suit after seeking an abortion in Texas, which was a felony in that state and many others. The Roe v. Wade ruling determined that abortion bans violate a woman's First, Fourth, Fifth, Ninth, and Fourteenth Amendment rights to privacy and personal choice.</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1163" data-index="73"><figure class="frameme" data-cbid="64" data-dcnode-id="1181"><div class="theframe" data-dcnode-id="1182" data-image="//townsquare.media/site/341/files/2020/04/551.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">1974: 'NIXON RESIGNS'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1164"><p class="caption" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Ken Mayer // flickr</span></p><h2 class="item-title" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">1974: 'NIXON RESIGNS'</span></h2><div class="item-description" data-dcnode-id="1165"><p data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node="">By 1974, the Watergate scandal had consumed Richard Nixon's presidency and The Washington Post had become his arch nemesis. The paper, however, emerged victorious when it </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/wp-srv/national/longterm/watergate/articles/080974-3.htm" target="_blank"><span data-dcnode-id="1175" instrument_node="">published two simple, yet Earth-shattering words</span></a><span data-dcnode-id="1173" instrument_node=""> on Aug. 9. Nixon resigned in disgrace after realizing he no longer had the political support in Congress to avoid impeachment and removal, which by that point were all but certain. No president before or since has ever done the same.</span></p><p data-dcnode-id="1166"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">You may also like: </span></strong><span data-dcnode-id="1169" instrument_node=""> </span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3453/25-terms-you-should-know-understand-climate-change-conversation" target="_blank"><span data-dcnode-id="1168" instrument_node="">25 terms you should know to understand the climate change conversation</span></a></p></div></div></div><div class="photogallery-item" data-dcnode-id="1147" data-index="74"><figure class="frameme" data-cbid="65" data-dcnode-id="1159"><div class="theframe" data-dcnode-id="1160" data-image="//townsquare.media/site/341/files/2020/04/561.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">1975: 'SURRENDER!'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1148"><p class="caption" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">manhhai // flickr</span></p><h2 class="item-title" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">1975: 'SURRENDER!'</span></h2><div class="item-description" data-dcnode-id="1149"><p data-dcnode-id="1150"><span data-dcnode-id="1154" instrument_node="">In 1975, America's misadventure in </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newseum.org/2015/04/30/reporting-vietnam-fall-of-saigon/%23slideshow-1/0/Exhibits_Upcoming_Vietnam_FallofSaigon_DailyNews.jpg" target="_blank"><span data-dcnode-id="1153" instrument_node="">Vietnam finally came to an end</span></a><span data-dcnode-id="1151" instrument_node=""> with a sad and chaotic scene in the South Vietnamese capital city of Saigon, a moment the New York Daily News summed up with a single word. The Americans abandoned the city, along with most of its terrified residents, to the approaching caravans of North Vietnamese communist forces. Scenes of impromptu airlifts, helicopters being dumped over the sides of aircraft carriers, and frantic civilians begging for evacuation from the U.S. Embassy were seared into the American mind as symbols of the consequences of misplaced military force.</span></p></div></div></div><div class="lazyload-placeholder gallery-ad-lazyload-placeholder" data-dcnode-id="1146"></div><div class="photogallery-item" data-dcnode-id="1130" data-index="76"><figure class="frameme" data-cbid="66" data-dcnode-id="1142"><div class="theframe" data-dcnode-id="1143" data-image="//townsquare.media/site/341/files/2020/04/571.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">1976: 'LIFE AND TIMES UNDER KHMER ROUGE'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1131"><p class="caption" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">CLAUDE JUVENAL/AFP/Getty Images</span></p><h2 class="item-title" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">1976: 'LIFE AND TIMES UNDER KHMER ROUGE'</span></h2><div class="item-description" data-dcnode-id="1132"><p data-dcnode-id="1133"><span data-dcnode-id="1137" instrument_node="">In 1976, The Guardian </span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/news/blog/2009/feb/16/cambodia-khmer-rouge" target="_blank"><span data-dcnode-id="1136" instrument_node="">reported on worrisome happenings in a remote and obscure country</span></a><span data-dcnode-id="1134" instrument_node=""> that would likely have been unknown to most Americans were it not a neighbor of Vietnam. The year before, a radical communist political group called the Khmer Rouge took over Cambodia and immediately instituted draconian measures designed to empty the cities and create a utopian collective agrarian society. All citizens suffered, but urbanites, professionals, intellectuals, and other perceived enemies of the state were specifically targeted. Displacement, torture, starvation, disease, forced labor, and executions resulted in the deaths of up to 3 million people—as many as 1 in 4 Cambodians—in a reign of genocidal terror portrayed in the 1984 movie "The Killing Fields."</span></p></div></div></div><div class="photogallery-item" data-dcnode-id="1114" data-index="77"><figure class="frameme" data-cbid="67" data-dcnode-id="1126"><div class="theframe" data-dcnode-id="1127" data-image="//townsquare.media/site/341/files/2020/04/581.jpg" rel=""><figcaption class="visually-hidden" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">1977: 'IT'S CARTER'</span></figcaption></div></figure><div class="item-meta" data-dcnode-id="1115"><p class="caption" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Hilaria McCarthy // Getty Images</span></p><h2 class="item-title" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">1977: 'IT'S CARTER'</span></h2><div class="item-description" data-dcnode-id="1116"><p data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">In 1977, the Chicago
