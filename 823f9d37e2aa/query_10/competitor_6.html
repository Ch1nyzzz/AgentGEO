//www.amazon.com/dp/B07X7KX2N4?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Add to library</span></span><span data-dcnode-id="1859" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1855"><svg data-dcnode-id="1856" viewBox="0 0 16 16"><g data-dcnode-id="1857" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1858" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1851" instrument_node=""> </span><div class="blurb" data-dcnode-id="1838"><p data-dcnode-id="1846"><span data-dcnode-id="1850" instrument_node="">This </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-books-to-read-in-a-lifetime" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1849" instrument_node="">classic</span></a><span data-dcnode-id="1847" instrument_node=""> needs no introduction, but we’ll give you a brief synopsis anyway. Scarlett O’Hara, daughter to a wealthy plantation-owning couple in 19th-century Georgia, USA, is raised in luxury, but she finds herself in hardship as an adult. Widowed at a young age, she raises her child as a single parent while the American Civil War wages. As she struggles for survival in a land ravaged by warfare, disease, and famine, she continuously encounters Rhett Butler — a pompous opportunist with whom she maintains a love-hate relationship.&nbsp;</span></p><span data-dcnode-id="1845" instrument_node=""> </span><p data-dcnode-id="1839"><span data-dcnode-id="1844" instrument_node="">While some are tempted to call </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B084WQ2QJ6%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Gone With the Wind</span></em></a><span data-dcnode-id="1840" instrument_node=""> a romance, Margaret Mitchell’s only published work has long been considered a historical masterpiece — though its regressive, period-appropriate view of race can be painful to read today. Spanning the whole war, this epic takes you through the horrors that armed conflicts inflict upon civilians. And while it focuses only on the perspective of slaveholders, it provides a vivid insight into a defining moment in American history.</span></p></div></div><p data-dcnode-id="1836"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Cold Mountain: A Novel','slug':'cold-mountain-a-novel-charles-frazier','synopsis':'','url':'https://www.amazon.com/dp/B0038JCYRW?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41-F8aIf5zL.jpg','small':'https://m.media-amazon.com/images/I/41-F8aIf5zL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1800" data-url="https://www.amazon.com/dp/B0038JCYRW?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="1833"><source data-dcnode-id="1835" data-srcset="https://m.media-amazon.com/images/I/41-F8aIf5zL.jpg" height="308" media="(min-width: 480px)" width="198"><img alt="Cold Mountain: A Novel" data-dcnode-id="1834" data-srcset="https://m.media-amazon.com/images/I/41-F8aIf5zL._SL160_.jpg" draggable="false" height="186" width="120"></picture><div class="title" data-dcnode-id="1827"><h3 data-dcnode-id="1828"><span data-dcnode-id="1832" instrument_node="">34. </span><em data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Cold Mountain</span></em><span data-dcnode-id="1829" instrument_node=""> by Charles Frazier</span></h3></div><span data-dcnode-id="1826" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1814"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0038JCYRW%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1825" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1815"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1816" data-slug="cold-mountain-a-novel-charles-frazier" data-url="https://www.amazon.com/dp/B0038JCYRW?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Add to library</span></span><span data-dcnode-id="1821" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1817"><svg data-dcnode-id="1818" viewBox="0 0 16 16"><g data-dcnode-id="1819" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1820" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1813" instrument_node=""> </span><div class="blurb" data-dcnode-id="1801"><p data-dcnode-id="1808"><span data-dcnode-id="1812" instrument_node="">Going back to the period of the American Civil War, we meet W. P. Inman and Ada Monroe in </span><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Cold Mountain</span></em><span data-dcnode-id="1809" instrument_node="">. Inman is a soldier with no interest in the war, and he’s now deserting to return to his lover, whom he hopes remains in their hometown of Cold Mountain, North Carolina. Meanwhile, Ada, said lover, has been struggling to survive in an economy broken by war, on a patch of land left to her by a wealthy father. Circumstances forced her to travel to find work, not knowing whether Inman was alive.</span></p><span data-dcnode-id="1807" instrument_node=""> </span><p data-dcnode-id="1802"><span data-dcnode-id="1806" instrument_node="">From the battlefield to the home front, </span><em data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Cold Mountain</span></em><span data-dcnode-id="1803" instrument_node=""> covers the many facets of the Civil War. Throughout it all, the loyal love of the two protagonists for one another acts as a guiding light.</span></p></div></div><p data-dcnode-id="1799"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'March','slug':'march-geraldine-brooks','synopsis':'','url':'https://www.amazon.com/dp/B0029WILXU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41HlujFTqgL.jpg','small':'https://m.media-amazon.com/images/I/41HlujFTqgL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1761" data-url="https://www.amazon.com/March-Geraldine-Brooks-ebook/dp/B0029WILXU/ref=sr_1_5?dchild=1&amp;keywords=march&amp;qid=1594319410&amp;sr=8-5" draggable="false"><picture data-dcnode-id="1796"><source data-dcnode-id="1798" data-srcset="https://m.media-amazon.com/images/I/41HlujFTqgL.jpg" height="303" media="(min-width: 480px)" width="198"><img alt="March" data-dcnode-id="1797" data-srcset="https://m.media-amazon.com/images/I/41HlujFTqgL._SL160_.jpg" draggable="false" height="184" width="120"></picture><div class="title" data-dcnode-id="1790"><h3 data-dcnode-id="1791"><span data-dcnode-id="1795" instrument_node="">35. </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">March</span></em><span data-dcnode-id="1792" instrument_node=""> by Geraldine Brooks</span></h3></div><span data-dcnode-id="1789" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1777"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0029WILXU%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1788" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1778"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1779" data-slug="march-geraldine-brooks" data-url="https://www.amazon.com/dp/B0029WILXU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Add to library</span></span><span data-dcnode-id="1784" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1780"><svg data-dcnode-id="1781" viewBox="0 0 16 16"><g data-dcnode-id="1782" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1783" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1776" instrument_node=""> </span><div class="blurb" data-dcnode-id="1762"><p data-dcnode-id="1766"><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Little Women</span></em><span data-dcnode-id="1773" instrument_node=""> might be one of the </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-childrens-books" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1772" instrument_node="">best children’s books of all time</span></a><span data-dcnode-id="1770" instrument_node="">, but its nuanced take on war, family, and sacrifice make it an absorbing read for grown-ups too. If you want to immerse yourself in the classic’s more mature themes, head on over to Geraldine Brooks’s </span><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">March</span></em><span data-dcnode-id="1767" instrument_node="">. Experience this well-loved story from the perspective of the absent March father, whose “little women” hold down the fort at home while he’s off on the front lines of the Civil War.</span></p><span data-dcnode-id="1765" instrument_node=""> </span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">A staunch abolitionist with an unshakable religious faith, Mr. March feels compelled by his conscience to serve the Union Army as a chaplain. As the soldiers under his care clash with the Confederate troops, he writes letters back home that conceal the true depth of the suffering all around him.</span></p></div></div><p data-dcnode-id="1760"></p><h2 data-dcnode-id="1757"><strong data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Early 20th Century</span></strong></h2><p data-dcnode-id="1756"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Arthur and George','slug':'arthur-and-george-julian-barnes','synopsis':'','url':'https://www.amazon.com/dp/B000FCKPQ2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51M49F2om6L.jpg','small':'https://m.media-amazon.com/images/I/51M49F2om6L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1720" data-url="https://www.amazon.com/dp/B000FCKPQ2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="1753"><source data-dcnode-id="1755" data-srcset="https://m.media-amazon.com/images/I/51M49F2om6L.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="Arthur and George" data-dcnode-id="1754" data-srcset="https://m.media-amazon.com/images/I/51M49F2om6L._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="1747"><h3 data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">36. </span><em data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Arthur and George</span></em><span data-dcnode-id="1749" instrument_node=""> by Julian Barnes</span></h3></div><span data-dcnode-id="1746" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1734"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000FCKPQ2%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1745" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1735"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1736" data-slug="arthur-and-george-julian-barnes" data-url="https://www.amazon.com/dp/B000FCKPQ2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Add to library</span></span><span data-dcnode-id="1741" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1737"><svg data-dcnode-id="1738" viewBox="0 0 16 16"><g data-dcnode-id="1739" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1740" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1733" instrument_node=""> </span><div class="blurb" data-dcnode-id="1721"><p data-dcnode-id="1728"><span data-dcnode-id="1732" instrument_node="">The titular Arthur is the famous creator of </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/sherlock-holmes-books" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1731" instrument_node="">Sherlock Holmes</span></a><span data-dcnode-id="1729" instrument_node="">, Sir Arthur Conan Doyle, while George is George Edalji, a half-Indian lawyer falsely imprisoned for a crime he didn’t commit. The two knew each other as children but fell out of touch as adults — that is until George faces carceral injustice. In his time of need, Arthur comes to his aid. Using his skills as the crafter of ingenious detective stories, Arthur tries to find the true culprit and get his friend acquitted.</span></p><span data-dcnode-id="1727" instrument_node=""> </span><p data-dcnode-id="1722"><span data-dcnode-id="1726" instrument_node="">While the author warns that this account of Sir Arthur Conan Doyle’s life should not be taken as factual, plenty of research went into the&nbsp; well-crafted Victorian world of </span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Arthur and George</span></em><span data-dcnode-id="1723" instrument_node="">.</span></p></div></div><p data-dcnode-id="1719"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Pachinko (National Book Award Finalist)','slug':'pachinko-national-book-award-finalist-min-jin-lee-a956e7f4-63dd-400a-814a-d6fd6b758a0e','synopsis':'','url':'https://www.amazon.com/dp/B01GZY28JA?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/518GQ9aPgVL.jpg','small':'https://m.media-amazon.com/images/I/518GQ9aPgVL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1684" data-url="https://www.amazon.com/Pachinko-National-Book-Award-Finalist-ebook/dp/B01GZY28JA/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1716"><source data-dcnode-id="1718" data-srcset="https://m.media-amazon.com/images/I/518GQ9aPgVL.jpg" height="300" media="(min-width: 480px)" width="198"><img alt="Pachinko (National Book Award Finalist)" data-dcnode-id="1717" data-srcset="https://m.media-amazon.com/images/I/518GQ9aPgVL._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="1710"><h3 data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">37. </span><em data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Pachinko</span></em><span data-dcnode-id="1712" instrument_node=""> by Min Jin Lee</span></h3></div><span data-dcnode-id="1709" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1697"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01GZY28JA%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1708" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1698"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1699" data-slug="pachinko-national-book-award-finalist-min-jin-lee-a956e7f4-63dd-400a-814a-d6fd6b758a0e" data-url="https://www.amazon.com/dp/B01GZY28JA?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Add to library</span></span><span data-dcnode-id="1704" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1700"><svg data-dcnode-id="1701" viewBox="0 0 16 16"><g data-dcnode-id="1702" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1703" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1696" instrument_node=""> </span><div class="blurb" data-dcnode-id="1685"><p data-dcnode-id="1691"><span data-dcnode-id="1695" instrument_node="">If you think that racial and ethnic discrimination exists only in terms of skin color, read </span><em data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Pachinko</span></em><span data-dcnode-id="1692" instrument_node=""> to learn how incomplete that perception is. The story starts in the early 1900s with Sunja, a young Korean farmer’s daughter, who is courted by the wealthy fisherman, Hansu. By the time she learns that he’s married to someone else, she’s already carrying his child. But instead of becoming his second wife, Sunja chooses to marry an ailing minister and follow him to Japan. There is where the trouble begins, as Sunja and her children face discrimination by the Japanese for being Korean. The Korean descendants go on to work all kinds of odd jobs, from kimchi-making to running Pachinko parlors — popular arcades which can also function as casinos — to survive the highly competitive environment of Japan.&nbsp;</span></p><span data-dcnode-id="1690" instrument_node=""> </span><p data-dcnode-id="1686"><em data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Pachinko</span></em><span data-dcnode-id="1687" instrument_node=""> is as riveting as it is eye-opening. It’s a must-read for historical fiction fans who want to broaden their understanding about ethnic diversity and international migration.</span></p></div></div><p data-dcnode-id="1683"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Remains of the Day (Vintage International)','slug':'the-remains-of-the-day-vintage-international-kazuo-ishiguro','synopsis':'','url':'https://www.amazon.com/dp/B003VPWX6K?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51JKMSMnS9L.jpg','small':'https://m.media-amazon.com/images/I/51JKMSMnS9L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1647" data-url="https://www.amazon.com/Remains-Day-Vintage-International-ebook/dp/B003VPWX6K/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1680"><source data-dcnode-id="1682" data-srcset="https://m.media-amazon.com/images/I/51JKMSMnS9L.jpg" height="304" media="(min-width: 480px)" width="198"><img alt="The Remains of the Day (Vintage International)" data-dcnode-id="1681" data-srcset="https://m.media-amazon.com/images/I/51JKMSMnS9L._SL160_.jpg" draggable="false" height="184" width="120"></picture><div class="title" data-dcnode-id="1674"><h3 data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">38. </span><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The Remains of the Day</span></em><span data-dcnode-id="1676" instrument_node=""> by Kazuo Ishiguro</span></h3></div><span data-dcnode-id="1673" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1661"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B003VPWX6K%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1672" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1662"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1663" data-slug="the-remains-of-the-day-vintage-international-kazuo-ishiguro" data-url="https://www.amazon.com/dp/B003VPWX6K?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Add to library</span></span><span data-dcnode-id="1668" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1664"><svg data-dcnode-id="1665" viewBox="0 0 16 16"><g data-dcnode-id="1666" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1667" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1660" instrument_node=""> </span><div class="blurb" data-dcnode-id="1648"><p data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">Considered one of the best books of all time, </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">The Remains of the Day</span></em><span data-dcnode-id="1656" instrument_node=""> is a dazzling account of the life of Stevens, an English butler working in the early 20th century. Stevens visits an old colleague in 1956 and is reminded of his time serving with her in a nobleman’s mansion. For thirty years, he worked for Lord Darlington, devoting himself loyally to the lord, his exploits, and his reputation — as was his duty. And yet, all wasn’t as perfect as it seemed, and now, as butler to a new gentleman, Stevens finds himself questioning his purpose.</span></p><span data-dcnode-id="1654" instrument_node=""> </span><p data-dcnode-id="1649"><span data-dcnode-id="1653" instrument_node="">British aristocracy never fails to intrigue, and it’s even more fascinating to watch as their way of life slowly crumbles. </span><em data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">The Remains of the Day</span></em><span data-dcnode-id="1650" instrument_node=""> satisfies our curiosity by letting us into the minds of thoughtful characters who are learning to let go of a receding era.</span></p></div></div><p data-dcnode-id="1646"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Fingersmith','slug':'fingersmith-sarah-waters','synopsis':'','url':'https://www.amazon.com/dp/B0026NBZDU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41SWP08EYTL.jpg','small':'https://m.media-amazon.com/images/I/41SWP08EYTL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1607" data-url="https://www.amazon.com/Fingersmith-Sarah-Waters-ebook/dp/B0026NBZDU/ref=sr_1_1?keywords=fingersmith&amp;qid=1594836063&amp;s=books&amp;sr=1-1" draggable="false"><picture data-dcnode-id="1643"><source data-dcnode-id="1645" data-srcset="https://m.media-amazon.com/images/I/41SWP08EYTL.jpg" height="309" media="(min-width: 480px)" width="198"><img alt="Fingersmith" data-dcnode-id="1644" data-srcset="https://m.media-amazon.com/images/I/41SWP08EYTL._SL160_.jpg" draggable="false" height="187" width="120"></picture><div class="title" data-dcnode-id="1637"><h3 data-dcnode-id="1638"><span data-dcnode-id="1642" instrument_node="">39. </span><em data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Fingersmith</span></em><span data-dcnode-id="1639" instrument_node=""> by Sarah Waters</span></h3></div><span data-dcnode-id="1636" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1624"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0026NBZDU%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1635" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1625"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1626" data-slug="fingersmith-sarah-waters" data-url="https://www.amazon.com/dp/B0026NBZDU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Add to library</span></span><span data-dcnode-id="1631" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1627"><svg data-dcnode-id="1628" viewBox="0 0 16 16"><g data-dcnode-id="1629" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1630" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1623" instrument_node=""> </span><div class="blurb" data-dcnode-id="1608"><p data-dcnode-id="1612"><span data-dcnode-id="1622" instrument_node="">If you’ve encountered </span><em data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Fingersmith</span></em><span data-dcnode-id="1619" instrument_node="">, it’s probably through </span><em data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">The Handmaiden</span></em><span data-dcnode-id="1616" instrument_node="">, the sensual, darkly funny South Korean film that reimagines Sarah Waters’ crime story in Japanese-occupied Korea. The original novel moves through the same narrative beats: two women running elaborate cons on each other end up falling in love and teaming up against </span><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">other</span></em><span data-dcnode-id="1613" instrument_node=""> grifters. But unlike the movie, Waters’s book is set in Victorian Britain.</span></p><span data-dcnode-id="1611" instrument_node=""> </span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Sue Trinder, an orphan, was raised among thieves. Maud Lilly — also an orphan — was taken in by her wealthy uncle, an amateur scholar who forces her to assist him on a mysterious bibliographical project. The two meet thanks to a conman known as Gentleman, who hatches a scheme to seduce Maud for her considerable inheritance — with Sue’s help. His scheme hits a roadblock when the two women realize exactly how much they have in common.</span></p></div></div><p data-dcnode-id="1606"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Buddha in the Attic','slug':'the-buddha-in-the-attic-julie-otsuka','synopsis':'','url':'https://www.amazon.com/dp/B004J4X7EO?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41B77ZdAZQL.jpg','small':'https://m.media-amazon.com/images/I/41B77ZdAZQL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1570" data-url="https://www.amazon.com/Buddha-Attic-Julie-Otsuka-ebook/dp/B004J4X7EO/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1603"><source data-dcnode-id="1605" data-srcset="https://m.media-amazon.com/images/I/41B77ZdAZQL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The Buddha in the Attic" data-dcnode-id="1604" data-srcset="https://m.media-amazon.com/images/I/41B77ZdAZQL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="1597"><h3 data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">40. </span><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">The Buddha in the Attic</span></em><span data-dcnode-id="1599" instrument_node=""> by Julie Otsuka</span></h3></div><span data-dcnode-id="1596" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1584"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B004J4X7EO%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1595" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1585"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1586" data-slug="the-buddha-in-the-attic-julie-otsuka" data-url="https://www.amazon.com/dp/B004J4X7EO?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Add to library</span></span><span data-dcnode-id="1591" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1587"><svg data-dcnode-id="1588" viewBox="0 0 16 16"><g data-dcnode-id="1589" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1590" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1583" instrument_node=""> </span><div class="blurb" data-dcnode-id="1571"><p data-dcnode-id="1578"><span data-dcnode-id="1582" instrument_node="">In </span><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">The Buddha in the Attic</span></em><span data-dcnode-id="1579" instrument_node="">, Japanese-American author Julie Otsuka tackles the phenomenon of “picture brides,” young women who immigrated from Japan to California to marry men they knew only from photographs. Spare and evocative in its prose, this National Book Award winner features a startlingly unusual narrative choice: it’s told entirely in the first person plural. The resulting text reads like a poem backed by the rigor of historical research, at once lyrical and incisive.</span></p><span data-dcnode-id="1577" instrument_node=""> </span><p data-dcnode-id="1572"><span data-dcnode-id="1576" instrument_node="">This hauntingly poetic book resists summarization. Instead of plot points, Otsuka fashions </span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">moods</span></em><span data-dcnode-id="1573" instrument_node=""> — starting with the picture brides’ trepidation as they prepare to meet their fates, battling homesickness as well as seasickness on the long journey across the Pacific.</span></p></div></div><p data-dcnode-id="1569"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'A Gentleman in Moscow: A Novel','slug':'a-gentleman-in-moscow-a-novel-amor-towles','synopsis':'','url':'https://www.amazon.com/dp/B01COJUEZ0?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51T7zMDV9xL.jpg','small':'https://m.media-amazon.com/images/I/51T7zMDV9xL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1531" data-url="https://www.amazon.com/dp/B01COJUEZ0?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="1566"><source data-dcnode-id="1568" data-srcset="https://m.media-amazon.com/images/I/51T7zMDV9xL.jpg" height="303" media="(min-width: 480px)" width="198"><img alt="A Gentleman in Moscow: A Novel" data-dcnode-id="1567" data-srcset="https://m.media-amazon.com/images/I/51T7zMDV9xL._SL160_.jpg" draggable="false" height="184" width="120"></picture><div class="title" data-dcnode-id="1560"><h3 data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node="">41. </span><em data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">A Gentleman in Moscow</span></em><span data-dcnode-id="1562" instrument_node=""> by Amor Towles</span></h3></div><span data-dcnode-id="1559" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1547"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01COJUEZ0%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1558" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1548"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1549" data-slug="a-gentleman-in-moscow-a-novel-amor-towles" data-url="https://www.amazon.com/dp/B01COJUEZ0?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Add to library</span></span><span data-dcnode-id="1554" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1550"><svg data-dcnode-id="1551" viewBox="0 0 16 16"><g data-dcnode-id="1552" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1553" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1546" instrument_node=""> </span><div class="blurb" data-dcnode-id="1532"><p data-dcnode-id="1538"><span data-dcnode-id="1545" instrument_node="">If you’re looking for a historical novel to move you to tears, </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">A Gentleman in Moscow</span></em><span data-dcnode-id="1542" instrument_node=""> is the one for you. Famously </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatesnotes.com/Books/A-Gentleman-in-Moscow" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1541" instrument_node="">recommended by Bill Gates</span></a><span data-dcnode-id="1539" instrument_node="">, this elegantly written novel follows Count Alexander Ilyich Rostov, a good-natured gentleman whose birth status makes him a target of the new regime installed in 1922. He’s moved to the luxury Metropol Hotel opposite the Kremlin, where he watches as his whole&nbsp; way of life crumbles under the pressure of the Bolshevik Revolution.&nbsp;</span></p><span data-dcnode-id="1537" instrument_node=""> </span><p data-dcnode-id="1533"><em data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">A Gentleman in Moscow </span></em><span data-dcnode-id="1534" instrument_node="">is a story about a revolutionary era that defined international history for decades to come, but it’s also a timeless tale of a man searching for meaning in an ever-changing world.</span></p></div></div><p data-dcnode-id="1530"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Historian','slug':'the-historian-elizabeth-kostova-2478d362-6e84-492f-91ac-c84942444aae','synopsis':'','url':'https://www.amazon.com/dp/B000FCK6EI?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/414oYBMsX4L.jpg','small':'https://m.media-amazon.com/images/I/414oYBMsX4L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1498" data-url="https://www.amazon.com/dp/B000FCK6EI?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="1527"><source data-dcnode-id="1529" data-srcset="https://m.media-amazon.com/images/I/414oYBMsX4L.jpg" height="354" media="(min-width: 480px)" width="198"><img alt="The Historian" data-dcnode-id="1528" data-srcset="https://m.media-amazon.com/images/I/414oYBMsX4L._SL160_.jpg" draggable="false" height="215" width="120"></picture><div class="title" data-dcnode-id="1521"><h3 data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">42. </span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The Historian</span></em><span data-dcnode-id="1523" instrument_node=""> by Elizabeth Kostova</span></h3></div><span data-dcnode-id="1520" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1508"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000FCK6EI%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1519" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1509"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1510" data-slug="the-historian-elizabeth-kostova-2478d362-6e84-492f-91ac-c84942444aae" data-url="https://www.amazon.com/dp/B000FCK6EI?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Add to library</span></span><span data-dcnode-id="1515" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1511"><svg data-dcnode-id="1512" viewBox="0 0 16 16"><g data-dcnode-id="1513" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1514" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1507" instrument_node=""> </span><div class="blurb" data-dcnode-id="1499"><p data-dcnode-id="1503"><em data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">The Historian</span></em><span data-dcnode-id="1504" instrument_node=""> combines a lot of narrative threads: it’s an epistolary novel detailing the Gothic mysteries surrounding the myth of Dracula and the history of Vlad the Impaler. The story features three generations of researchers — the unnamed narrator, her father Paul, and his mentor, Professor Bartholomew Rossi — who documented their journeys through Eastern Europe in search of the truth behind vampire legends.</span></p><span data-dcnode-id="1502" instrument_node=""> </span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">From secret codes in medieval texts to hidden tombs, expect to be sucked into a spine-tingling adventure in which the line between myth and history blurs.</span></p></div></div><p data-dcnode-id="1497"></p><h2 data-dcnode-id="1494"><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">World War II</span></strong></h2><p data-dcnode-id="1493"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'All the Light We Cannot See: A Novel','slug':'all-the-light-we-cannot-see-a-novel-anthony-doerr','synopsis':'','url':'https://www.amazon.com/dp/B00DPM7TIG?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51tjJGTkUhL.jpg','small':'https://m.media-amazon.com/images/I/51tjJGTkUhL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1457" data-url="https://www.amazon.com/All-Light-We-Cannot-See-ebook/dp/B00DPM7TIG/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1490"><source data-dcnode-id="1492" data-srcset="https://m.media-amazon.com/images/I/51tjJGTkUhL.jpg" height="301" media="(min-width: 480px)" width="198"><img alt="All the Light We Cannot See: A Novel" data-dcnode-id="1491" data-srcset="https://m.media-amazon.com/images/I/51tjJGTkUhL._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="1484"><h3 data-dcnode-id="1485"><span data-dcnode-id="1489" instrument_node="">43. </span><em data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">All the Light We Cannot See</span></em><span data-dcnode-id="1486" instrument_node=""> by Anthony Doerr</span></h3></div><span data-dcnode-id="1483" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1471"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00DPM7TIG%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1482" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1472"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1473" data-slug="all-the-light-we-cannot-see-a-novel-anthony-doerr" data-url="https://www.amazon.com/dp/B00DPM7TIG?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Add to library</span></span><span data-dcnode-id="1478" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1474"><svg data-dcnode-id="1475" viewBox="0 0 16 16"><g data-dcnode-id="1476" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1477" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1470" instrument_node=""> </span><div class="blurb" data-dcnode-id="1458"><p data-dcnode-id="1462"><span data-dcnode-id="1469" instrument_node="">There’s no shortage of </span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/world-war-ii-books-by-female-authors" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1468" instrument_node="">World War II novels</span></a><span data-dcnode-id="1466" instrument_node="">, even on this list. But in this crowded corner of historical fiction, Anthony Doerr’s stunning, stylish epic manages to stand out. In </span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">All the Light We Cannot See</span></em><span data-dcnode-id="1463" instrument_node="">, he uses wartime strife to deepen and enrich a story that comes down, in the end, to two unforgettable characters.</span></p><span data-dcnode-id="1461" instrument_node=""> </span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Marie-Laure, the blind daughter of a museum locksmith, flees Nazi-occupied Paris with her father. With them, they carry a priceless jewel salvaged from the collections they left behind. Meanwhile, the brilliant German orphan Werner Pfennig is forced to join the Hitler Youth — and then sent out to track down enemy radio signals.</span></p></div></div><p data-dcnode-id="1456"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Atonement: A Novel','slug':'atonement-a-novel-ian-mcewan-32fcfcaf-c27e-49b2-a837-2d1b49333d83','synopsis':'','url':'https://www.amazon.com/dp/B000QCQ9O8?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51FnlWuoYsL.jpg','small':'https://m.media-amazon.com/images/I/51FnlWuoYsL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1421" data-url="https://www.amazon.com/Atonement-Novel-Ian-McEwan-ebook/dp/B000QCQ9O8/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1453"><source data-dcnode-id="1455" data-srcset="https://m.media-amazon.com/images/I/51FnlWuoYsL.jpg" height="306" media="(min-width: 480px)" width="198"><img alt="Atonement: A Novel" data-dcnode-id="1454" data-srcset="https://m.media-amazon.com/images/I/51FnlWuoYsL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="1447"><h3 data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">44. </span><em data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Atonement</span></em><span data-dcnode-id="1449" instrument_node=""> by Ian McEwan</span></h3></div><span data-dcnode-id="1446" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1434"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000QCQ9O8%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1445" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1435"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1436" data-slug="atonement-a-novel-ian-mcewan-32fcfcaf-c27e-49b2-a837-2d1b49333d83" data-url="https://www.amazon.com/dp/B000QCQ9O8?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Add to library</span></span><span data-dcnode-id="1441" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1437"><svg data-dcnode-id="1438" viewBox="0 0 16 16"><g data-dcnode-id="1439" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1440" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1433" instrument_node=""> </span><div class="blurb" data-dcnode-id="1422"><p data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">Perhaps you already know the story from the movie — </span><em data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Atonement</span></em><span data-dcnode-id="1429" instrument_node=""> stars Briony Tallis, a budding writer who misinterpreted the relationship between her sister Cecilia and their housekeeper’s son, Robbie. Her innocent mistake caused her to make unfounded accusations against Robbie&nbsp; — leading the sisters to become estranged. World War II comes and takes Robbie away to France, leaving Briony with her own guilt. Now that she’s matured and understands the rippling consequences of her actions, and she’s left with little chance to make up for it.&nbsp;</span></p><span data-dcnode-id="1427" instrument_node=""> </span><p data-dcnode-id="1423"><em data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Atonement</span></em><span data-dcnode-id="1424" instrument_node=""> is a beautiful novel in many ways. One of its key strengths is its poignant representation of the conscripted soldier’s experiences in a foreign land, fighting a seemingly losing battle far from home.</span></p></div></div><p data-dcnode-id="1420"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Book Thief','slug':'the-book-thief-markus-zusak-8b606aed-4908-4d72-8d27-74273e828e2c','synopsis':'','url':'https://www.amazon.com/dp/B000XUBFE2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/512cmz6v-IL.jpg','small':'https://m.media-amazon.com/images/I/512cmz6v-IL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1387" data-url="https://www.amazon.com/Book-Thief-Markus-Zusak-ebook/dp/B000XUBFE2/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1417"><source data-dcnode-id="1419" data-srcset="https://m.media-amazon.com/images/I/512cmz6v-IL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The Book Thief" data-dcnode-id="1418" data-srcset="https://m.media-amazon.com/images/I/512cmz6v-IL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="1411"><h3 data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">45. </span><em data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">The Book Thief</span></em><span data-dcnode-id="1413" instrument_node=""> by Markus Zusak</span></h3></div><span data-dcnode-id="1410" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1398"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000XUBFE2%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1409" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1399"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1400" data-slug="the-book-thief-markus-zusak-8b606aed-4908-4d72-8d27-74273e828e2c" data-url="https://www.amazon.com/dp/B000XUBFE2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Add to library</span></span><span data-dcnode-id="1405" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1401"><svg data-dcnode-id="1402" viewBox="0 0 16 16"><g data-dcnode-id="1403" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1404" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1397" instrument_node=""> </span><div class="blurb" data-dcnode-id="1388"><p data-dcnode-id="1392"><span data-dcnode-id="1396" instrument_node="">While this is yet another book about World War II, </span><em data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">The Book Thief</span></em><span data-dcnode-id="1393" instrument_node="">’s unique narrator sets it apart. Readers accompany Death during a busy period in his career as one young girl — heartbreakingly separated from her mother and sick brother while evacuating the war zone — catches his attention. The girl, Liesel, moves into the home of Hans and Rosa Hubermann, a weary but kind-hearted couple who is sheltering a Jewish man in their basement. Hans teaches his new daughter how to read in an effort to help her recover from the trauma of losing her family, and Liesel begins to steal books that are being burned by the Nazis. Despite how low the Hubermanns try to lay, trouble is just around the corner under this vicious authoritarian regime…&nbsp;</span></p><span data-dcnode-id="1391" instrument_node=""> </span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The unusual curiosity that Death has about Liesel’s life makes this story both beautiful and harrowing: it highlights the depravity and inhumanity of the force that took over much of Europe in the 1940s.</span></p></div></div><p data-dcnode-id="1386"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The English Patient (Vintage International)','slug':'the-english-patient-vintage-international-michael-ondaatje','synopsis':'','url':'https://www.amazon.com/dp/B004JHYRYU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41AkGAhWThL.jpg','small':'https://m.media-amazon.com/images/I/41AkGAhWThL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1353" data-url="https://www.amazon.com/English-Patient-Vintage-International-ebook/dp/B004JHYRYU/ref=sr_1_2?dchild=1&amp;keywords=the+english+patient&amp;qid=1595008477&amp;s=digital-text&amp;sr=1-2" draggable="false"><picture data-dcnode-id="1383"><source data-dcnode-id="1385" data-srcset="https://m.media-amazon.com/images/I/41AkGAhWThL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The English Patient (Vintage International)" data-dcnode-id="1384" data-srcset="https://m.media-amazon.com/images/I/41AkGAhWThL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="1377"><h3 data-dcnode-id="1378"><span data-dcnode-id="1382" instrument_node="">46. </span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">The English Patien</span></em><span data-dcnode-id="1379" instrument_node="">t by Michael Ondaatjie</span></h3></div><span data-dcnode-id="1376" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1364"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1374" href="https://chatnoir-webc
