the end of World War II: a Canadian Army nurse, a heavily injured, supposedly English man, a British combat engineer of Indian origin, and a Italian-Canadian spy. While each has their own tasks and goals, they begin to share their traumatic experiences of the war — and their mutual desire to survive.</span></p><span data-dcnode-id="1360" instrument_node=""> </span><p data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">Ondaatjie’s </span><em data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">The English Patient</span></em><span data-dcnode-id="1356" instrument_node=""> is unique in the way it treats this global conflict: it focuses on the many cultures involved, as well as on how the differences between them can’t outweigh people’s shared humanity and longing for normalcy.</span></p></div></div><p data-dcnode-id="1352"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Guernsey Literary and Potato Peel Pie Society: A Novel','slug':'the-guernsey-literary-and-potato-peel-pie-society-a-novel-mary-ann-shaffer','synopsis':'','url':'https://www.amazon.com/dp/B0015DWJX2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51y8spbkFZL.jpg','small':'https://m.media-amazon.com/images/I/51y8spbkFZL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1316" data-url="https://www.amazon.com/Guernsey-Literary-Potato-Peel-Society-ebook/dp/B0015DWJX2/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1349"><source data-dcnode-id="1351" data-srcset="https://m.media-amazon.com/images/I/51y8spbkFZL.jpg" height="306" media="(min-width: 480px)" width="198"><img alt="The Guernsey Literary and Potato Peel Pie Society: A Novel" data-dcnode-id="1350" data-srcset="https://m.media-amazon.com/images/I/51y8spbkFZL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="1343"><h3 data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">47. </span><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">The Guernsey Literary and Potato Peel Pie Society</span></em><span data-dcnode-id="1345" instrument_node=""> by Maria Ann Schaffre and Annie Barrows</span></h3></div><span data-dcnode-id="1342" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1330"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0015DWJX2%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1341" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1331"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1332" data-slug="the-guernsey-literary-and-potato-peel-pie-society-a-novel-mary-ann-shaffer" data-url="https://www.amazon.com/dp/B0015DWJX2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Add to library</span></span><span data-dcnode-id="1337" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1333"><svg data-dcnode-id="1334" viewBox="0 0 16 16"><g data-dcnode-id="1335" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1336" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1329" instrument_node=""> </span><div class="blurb" data-dcnode-id="1317"><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">Through a series of letters between comedic writer Julie Ashton and book-lover Dawsy Adams, the story of </span><em data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The Guernsey Literary and Potato Peel Pie Society</span></em><span data-dcnode-id="1325" instrument_node=""> is told. Julie is a rising author who recounted her experience of World War II and is now in search of a new topic to treat. Dawsy lives in Guernsey and is a member of the strangely specific society in the novel’s title, which appears to be a little book club. Through their exchanges, Julie learns about the German wartime occupation of the island — and, more importantly, the origin of the society’s peculiar name, which prompts her to visit it.</span></p><span data-dcnode-id="1323" instrument_node=""> </span><p data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">Full of quippy correspondence and humorous circumstances, </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">The Guernsey Literary and Potato Peel Pie Society</span></em><span data-dcnode-id="1319" instrument_node=""> avoids being overly heavy, and yet still manages to present readers with another facet of life during the deadliest conflict in history.</span></p></div></div><p data-dcnode-id="1315"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Half-Blood Blues: A Novel','slug':'half-blood-blues-a-novel-esi-edugyan','synopsis':'','url':'https://www.amazon.com/dp/B006JJTB0G?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51UEnGDQFqL.jpg','small':'https://m.media-amazon.com/images/I/51UEnGDQFqL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1282" data-url="https://www.amazon.com/Half-Blood-Blues-Novel-Esi-Edugyan-ebook/dp/B006JJTB0G/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1312"><source data-dcnode-id="1314" data-srcset="https://m.media-amazon.com/images/I/51UEnGDQFqL.jpg" height="292" media="(min-width: 480px)" width="198"><img alt="Half-Blood Blues: A Novel" data-dcnode-id="1313" data-srcset="https://m.media-amazon.com/images/I/51UEnGDQFqL._SL160_.jpg" draggable="false" height="176" width="120"></picture><div class="title" data-dcnode-id="1306"><h3 data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">48. </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Half-Blood Blues</span></em><span data-dcnode-id="1308" instrument_node=""> by Esi Edugyan</span></h3></div><span data-dcnode-id="1305" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1293"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B006JJTB0G%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1304" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1294"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1295" data-slug="half-blood-blues-a-novel-esi-edugyan" data-url="https://www.amazon.com/dp/B006JJTB0G?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Add to library</span></span><span data-dcnode-id="1300" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1296"><svg data-dcnode-id="1297" viewBox="0 0 16 16"><g data-dcnode-id="1298" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1299" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1292" instrument_node=""> </span><div class="blurb" data-dcnode-id="1283"><p data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node="">With its lilting, musical prose, </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Half-Blood Blues</span></em><span data-dcnode-id="1288" instrument_node=""> accomplishes many things at once. It’s a gripping mystery tale and also a love letter to jazz. But above all, it tells the story of a community that gets overshadowed in conventional World War II stories: the Afro-Germans persecuted by the Nazi regime.</span></p><span data-dcnode-id="1286" instrument_node=""> </span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Hieronymus Falk is a gifted jazz musician: though only twenty years old, he’s already been hailed as a master trumpeter by Louis Armstrong himself. But it’s 1940, and Hiero’s genius can’t save him from the Nazi Party’s stranglehold over his native Germany. Half-black and a purveyor of “degenerate” music to boot, he’s soon arrested and silenced. The bassist Sidney Griffiths is the last person to see him before he’s taken away. Fifty years later, with documentary retrospectives on Hiero starting to air, Sid still can’t let go of what happened to his bandmate.</span></p></div></div><p data-dcnode-id="1281"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Human Voices','slug':'human-voices-penelope-fitzgerald','synopsis':'','url':'https://www.amazon.com/dp/B00DAJ4Y28?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51YRwdsbUNL.jpg','small':'https://m.media-amazon.com/images/I/51YRwdsbUNL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1245" data-url="https://www.amazon.com/Human-Voices-Penelope-Fitzgerald-ebook/dp/B00DAJ4Y28/ref=sr_1_1?dchild=1&amp;keywords=human+voices&amp;qid=1594834044&amp;s=books&amp;sr=1-1" draggable="false"><picture data-dcnode-id="1278"><source data-dcnode-id="1280" data-srcset="https://m.media-amazon.com/images/I/51YRwdsbUNL.jpg" height="307" media="(min-width: 480px)" width="198"><img alt="Human Voices" data-dcnode-id="1279" data-srcset="https://m.media-amazon.com/images/I/51YRwdsbUNL._SL160_.jpg" draggable="false" height="186" width="120"></picture><div class="title" data-dcnode-id="1272"><h3 data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node="">49. </span><em data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Human Voices</span></em><span data-dcnode-id="1274" instrument_node=""> by Penelope Fitzgerald</span></h3></div><span data-dcnode-id="1271" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1259"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00DAJ4Y28%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1270" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1260"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1261" data-slug="human-voices-penelope-fitzgerald" data-url="https://www.amazon.com/dp/B00DAJ4Y28?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Add to library</span></span><span data-dcnode-id="1266" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1262"><svg data-dcnode-id="1263" viewBox="0 0 16 16"><g data-dcnode-id="1264" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1265" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1258" instrument_node=""> </span><div class="blurb" data-dcnode-id="1246"><p data-dcnode-id="1253"><span data-dcnode-id="1257" instrument_node="">As World War II rages and German bombs rain down on London, a group of radio employees hunker down in Broadcasting House. The city might go to rubble outside, but nothing’s going to stop them from delivering the Nine O’Clock News. After all, they </span><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">are</span></em><span data-dcnode-id="1254" instrument_node=""> the BBC.</span></p><span data-dcnode-id="1252" instrument_node=""> </span><p data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node="">Penelope Fitzgerald’s moving — and sharply funny — </span><em data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Human Voices</span></em><span data-dcnode-id="1248" instrument_node=""> shows a group of flawed human beings doing their best to bear up under an unwanted historical mandate. Sam Brooks, the Recorded Programme Director, might be a selfish, neurotic manager. And Annie Asra, his&nbsp;assistant, might have a less than prudent attachment to her boss. But together, they’ll do their best to insure the nation’s never at a loss for radio programming.</span></p></div></div><p data-dcnode-id="1244"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Night Watch','slug':'the-night-watch-sarah-waters','synopsis':'','url':'https://www.amazon.com/dp/B000OI1AAC?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51d+O33s3AL.jpg','small':'https://m.media-amazon.com/images/I/51d+O33s3AL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1209" data-url="https://www.amazon.com/dp/B000OI1AAC?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="1241"><source data-dcnode-id="1243" data-srcset="https://m.media-amazon.com/images/I/51d+O33s3AL.jpg" height="264" media="(min-width: 480px)" width="198"><img alt="The Night Watch" data-dcnode-id="1242" data-srcset="https://m.media-amazon.com/images/I/51d+O33s3AL._SL160_.jpg" draggable="false" height="160" width="120"></picture><div class="title" data-dcnode-id="1235"><h3 data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">50. </span><em data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">The Night Watch</span></em><span data-dcnode-id="1237" instrument_node=""> by Sarah Waters</span></h3></div><span data-dcnode-id="1234" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1222"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000OI1AAC%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1233" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1223"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1224" data-slug="the-night-watch-sarah-waters" data-url="https://www.amazon.com/dp/B000OI1AAC?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Add to library</span></span><span data-dcnode-id="1229" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1225"><svg data-dcnode-id="1226" viewBox="0 0 16 16"><g data-dcnode-id="1227" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1228" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1221" instrument_node=""> </span><div class="blurb" data-dcnode-id="1210"><p data-dcnode-id="1214"><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The Night Watch</span></em><span data-dcnode-id="1218" instrument_node=""> </span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">literally </span></em><span data-dcnode-id="1215" instrument_node="">takes you back in time — it opens in 1947 and closes in 1941. Diving into the midst of World War II and its aftermath, Waters weaves together the lives of four different people: Kay, Helen, Viv, and Duncan. Some of them barely knew each other, but they’re united by their experiences of the war, their participation in national mobilization, and the strangeness of having to find new meaning after peace is achieved.</span></p><span data-dcnode-id="1213" instrument_node=""> </span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">This is more than a novel about war: it’s a story of love and loss in an incredibly uncertain and extraordinary period when life swung rapidly from one emotional extreme to another. </span></p></div></div><p data-dcnode-id="1208"></p><h2 data-dcnode-id="1205"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Post-War Era</span></strong></h2><p data-dcnode-id="1204"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Sophie's Choice: A Novel','slug':'sophie-s-choice-a-novel-william-styron','synopsis':'','url':'https://www.amazon.com/dp/B003JBFCEQ?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51BLx9TYYhL.jpg','small':'https://m.media-amazon.com/images/I/51BLx9TYYhL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1171" data-url="https://www.amazon.com/Sophies-Choice-Novel-Open-Road-ebook/dp/B003JBFCEQ/ref=sr_1_1?dchild=1&amp;keywords=sophie%27s+choice&amp;qid=1594837025&amp;s=books&amp;sr=1-1" draggable="false"><picture data-dcnode-id="1201"><source data-dcnode-id="1203" data-srcset="https://m.media-amazon.com/images/I/51BLx9TYYhL.jpg" height="301" media="(min-width: 480px)" width="198"><img alt="Sophie's Choice: A Novel" data-dcnode-id="1202" data-srcset="https://m.media-amazon.com/images/I/51BLx9TYYhL._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="1195"><h3 data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">51. </span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Sophie's Choice</span></em><span data-dcnode-id="1197" instrument_node=""> by William Styron</span></h3></div><span data-dcnode-id="1194" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1182"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B003JBFCEQ%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1193" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1183"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1184" data-slug="sophie-s-choice-a-novel-william-styron" data-url="https://www.amazon.com/dp/B003JBFCEQ?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Add to library</span></span><span data-dcnode-id="1189" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1185"><svg data-dcnode-id="1186" viewBox="0 0 16 16"><g data-dcnode-id="1187" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1188" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1181" instrument_node=""> </span><div class="blurb" data-dcnode-id="1172"><p data-dcnode-id="1176"><span data-dcnode-id="1180" instrument_node="">Thanks to William Styron’s searing, thought-provoking novel, the phrase “Sophie’s choice” has entered the popular lexicon, denoting an impossible decision where every possible outcome horrifies the chooser. In </span><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Sophie’s Choice</span></em><span data-dcnode-id="1177" instrument_node="">, the titular Sophie — a Polish-Catholic concentration camp survivor — was forced to decide which of her two children to spare from the gas chambers.</span></p><span data-dcnode-id="1175" instrument_node=""> </span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">The story kicks off years after Sophie made her choice. In a Brooklyn boardinghouse, she shares her harrowing personal history with the young writer Stingo. But their blossoming friendship inspires the jealousy of Sophie’s lover, Nathan, a  brilliant Jewish-American scientist with an undiagnosed case of schizophrenia. As the three of them draw ever closer in a dark, psychosexual dance, Sophie’s past continues to haunt her.</span></p></div></div><p data-dcnode-id="1170"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'My Brilliant Friend (Neapolitan Novels Book 1)','slug':'my-brilliant-friend-neapolitan-novels-book-1-elena-ferrante','synopsis':'','url':'https://www.amazon.com/dp/B079MGWXK6?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51zBR7LZJ0L.jpg','small':'https://m.media-amazon.com/images/I/51zBR7LZJ0L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1137" data-url="https://www.amazon.com/My-Brilliant-Friend-Neapolitan-Novels-ebook/dp/B079MGWXK6/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=1594660549&amp;sr=1-2" draggable="false"><picture data-dcnode-id="1167"><source data-dcnode-id="1169" data-srcset="https://m.media-amazon.com/images/I/51zBR7LZJ0L.jpg" height="307" media="(min-width: 480px)" width="198"><img alt="My Brilliant Friend (Neapolitan Novels Book 1)" data-dcnode-id="1168" data-srcset="https://m.media-amazon.com/images/I/51zBR7LZJ0L._SL160_.jpg" draggable="false" height="186" width="120"></picture><div class="title" data-dcnode-id="1161"><h3 data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">52. </span><em data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">My Brilliant Friend</span></em><span data-dcnode-id="1163" instrument_node=""> by Elena Ferrante</span></h3></div><span data-dcnode-id="1160" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1148"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B079MGWXK6%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1159" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1149"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1150" data-slug="my-brilliant-friend-neapolitan-novels-book-1-elena-ferrante" data-url="https://www.amazon.com/dp/B079MGWXK6?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Add to library</span></span><span data-dcnode-id="1155" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1151"><svg data-dcnode-id="1152" viewBox="0 0 16 16"><g data-dcnode-id="1153" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1154" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1147" instrument_node=""> </span><div class="blurb" data-dcnode-id="1138"><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Elena Ferrante is arguably the most successful historical fiction writer working today — and almost no one even knows her real name. Her wildly successful Neapolitan Novels proved you don’t need a cult of personality to sell books. Even without any author photos on their covers, these novels managed to enchant readers with their subtle, exacting depictions of female friendship and ambition in a turbulent era.&nbsp;</span></p><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">The series’ first installment, </span><em data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">My Brilliant Friend</span></em><span data-dcnode-id="1140" instrument_node="">, offers a richly textured look at 1950s Naples, in a neighborhood where gangsters have a hand in every business and the specter of poverty haunts every home. Friends Elena and Lila grow up together among workaday crime and domestic strife. They dream of escape, and school seems to offer a way out. But while the diligent Elena manages to claw her way up the educational ladder, the rebellious prodigy Lila is kept from further study by her own parents.</span></p></div></div><p data-dcnode-id="1136"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Night Watchman','slug':'the-night-watchman-louise-erdrich-6af8a568-1e1a-47ab-84f3-d21afb0df62d','synopsis':'','url':'https://www.amazon.com/dp/B07SKWFVYW?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41r3ymNjZ3L.jpg','small':'https://m.media-amazon.com/images/I/41r3ymNjZ3L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1103" data-url="https://www.amazon.com/Night-Watchman-Louise-Erdrich-ebook/dp/B07SKWFVYW/ref=sr_1_2?crid=3CLKZQ69KTOEN&amp;dchild=1&amp;keywords=the+night+watchman+louise+erdrich&amp;qid=1594831392&amp;s=books&amp;sprefix=the+night+watchma%2Cstripbooks%2C275&amp;sr=1-2" draggable="false"><picture data-dcnode-id="1133"><source data-dcnode-id="1135" data-srcset="https://m.media-amazon.com/images/I/41r3ymNjZ3L.jpg" height="299" media="(min-width: 480px)" width="198"><img alt="The Nigh 590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1120" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1113" instrument_node=""> </span><div class="blurb" data-dcnode-id="1104"><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">Chippewa novelist Louise Erdrich based </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The Night Watchman</span></em><span data-dcnode-id="1109" instrument_node=""> on her own grandfather’s story: he fought the US government’s efforts to seize Native land in the 1950s. In Erdrich’s reimagining, this real-life activist becomes Thomas Wazhashk, a Chippewa Council member who works as a night watchman at a factory near North Dakota’s Turtle Mountain Reservation.</span></p><span data-dcnode-id="1107" instrument_node=""> </span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Congress is set to vote on a bill that threatens the Chippewas’ rights to their own land — all under the guise of “emancipating” them. Alarmed, Thomas finds himself drawn into the fray on behalf of his entire community.</span></p></div></div><p data-dcnode-id="1102"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Poisonwood Bible: A Novel','slug':'the-poisonwood-bible-a-novel-barbara-kingsolver','synopsis':'','url':'https://www.amazon.com/dp/B000QTE9WU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51d1HWBZjWL.jpg','small':'https://m.media-amazon.com/images/I/51d1HWBZjWL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1069" data-url="https://www.amazon.com/Poisonwood-Bible-Novel-Barbara-Kingsolver-ebook/dp/B000QTE9WU/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=1594756615&amp;sr=1-2" draggable="false"><picture data-dcnode-id="1099"><source data-dcnode-id="1101" data-srcset="https://m.media-amazon.com/images/I/51d1HWBZjWL.jpg" height="299" media="(min-width: 480px)" width="198"><img alt="The Poisonwood Bible: A Novel" data-dcnode-id="1100" data-srcset="https://m.media-amazon.com/images/I/51d1HWBZjWL._SL160_.jpg" draggable="false" height="181" width="120"></picture><div class="title" data-dcnode-id="1093"><h3 data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">54. </span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">The Poisonwood Bible</span></em><span data-dcnode-id="1095" instrument_node=""> by Barbara Kingsolver</span></h3></div><span data-dcnode-id="1092" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1080"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000QTE9WU%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1091" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1081"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1082" data-slug="the-poisonwood-bible-a-novel-barbara-kingsolver" data-url="https://www.amazon.com/dp/B000QTE9WU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Add to library</span></span><span data-dcnode-id="1087" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1083"><svg data-dcnode-id="1084" viewBox le.</span></p></div></div><p data-dcnode-id="1068"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Sympathizer: A Novel (Pulitzer Prize for Fiction)','slug':'the-sympathizer-a-novel-pulitzer-prize-for-fiction-viet-thanh-nguyen','synopsis':'','url':'https://www.amazon.com/dp/B00PSSG4MM?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51+U33Tf8NL.jpg','small':'https://m.media-amazon.com/images/I/51+U33Tf8NL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1035" data-url="https://www.amazon.com/dp/B00PSSG4MM?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="1065"><source data-dcnode-id="1067" data-srcset="https://m.media-amazon.com/images/I/51+U33Tf8NL.jpg" height="299" media="(min-width: 480px)" width="198"><img alt="The Sympathizer: A Novel (Pulitzer Prize for Fiction)" data-dcnode-id="1066" data-srcset="https://m.media-amazon.com/images/I/51+U33Tf8NL._SL160_.jpg" draggable="false" height="181" width="120"></picture><div class="title" data-dcnode-id="1059"><h3 data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">55. </span><em data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">The Sympathize</span></em><span data-dcnode-id="1061" instrument_node="">r by Viet Thanh Nguyen</span></h3></div><span data-dcnode-id="1058" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1046"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00PSSG4MM%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1057" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1047"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1048" data-slug="the-sympathizer-a-novel-pulitzer-prize-for-fiction-viet-thanh-nguyen" data-url="https://www.amazon.com/dp/B00PSSG4MM?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Add to library</span></span><span data-dcnode-id="1053" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1049"><svg data-dcnode-id="1050" viewBox="0 0 16 16"><g data-dcnode-id="1051" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1052" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1045" instrument_node=""> </span><div class="blurb" data-dcnode-id="1036"><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">Viet Thanh Nguyen’s Pulitzer prize-winning novel, </span><em data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The Sympathizer</span></em><span data-dcnode-id="1041" instrument_node="">, is the account of an undercover agent’s confession of espionage during the war between North and South Vietnam. The unnamed protagonist retells his climb up the command chain in Saigon and his eventual flight to the US, all the while reporting to his comrades in North Vietnam. And yet his story isn’t the simple tale of a loyal communist — he forges genuine friendships with the Southern generals and agents, who had been with him through life-and-death situations.</span></p><span data-dcnode-id="1039" instrument_node=""> </span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Beyond reflecting various perspectives on this controversial war, Nguyen novel is also an ode to humanity — something that’s so often pushed to the side by political conflict.</span></p></div></div><p data-dcnode-id="1034"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'A Thousand Splendid Suns','slug':'a-thousand-splendid-suns-khaled-hosseini-a93a93c7-f616-4aff-b235-e4fd45b1a4ad','synopsis':'','url':'https://www.amazon.com/dp/B000SCHC0Q?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51jvFsiV8aL.jpg','small':'https://m.media-amazon.com/images/I/51jvFsiV8aL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1001" data-url="https://www.amazon.com/Thousand-Splendid-Suns-Khaled-Hosseini-ebook/dp/B000SCHC0Q/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1031"><source data-dcnode-id="1033" data-srcset="https://m.media-amazon.com/images/I/51jvFsiV8aL.jpg" height="308" media="(min-width: 480px)" width="198"><img alt="A Thousand Splendid Suns" data-dcnode-id="1032" data-srcset="https://m.media-amazon.com/images/I/51jvFsiV8aL._SL160_.jpg" draggable="false" height="186" width="120"></picture><div class="title" data-dcnode-id="1025"><h3 data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">56. </span><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">A Thousand Splendid Suns</span></em><span data-dcnode-id="1027" instrument_node=""> by Khaled Hosseini</span></h3></div><span data-dcnode-id="1024" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1012"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000SCHC0Q%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1023" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1013"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1014" data-slug="a-thousand-splendid-suns-khaled-hosseini-a93a93c7-f616-4aff-b235-e4fd45b1a4ad" data-url="https://www.amazon.com/dp/B000SCHC0Q?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Add to library</span></span><span data-dcnode-id="1019" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1015"><svg data-dcnode-id="1016" viewBox="0 0 16 16"><g data-dcnode-id="1017" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1018" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1011" instrument_node=""> </span><div class="blurb" data-dcnode-id="1002"><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Let us go now to 1970s Afghanistan, where Mariam and Laila, born a generation apart from one another, are forced to marry the same man. As expected, the relationship between them starts out cold — both are trying to determine their position within the marriage. But the longer they stay with each other, the more they realize they have in common. Thus begins the sisterhood between the two. Together, Mariam and Laila help each other survive the increasingly harsh conditions that women have to live through as the Taliban gain influence and start implementing drastic measures to strip away their rights.</span></p><span data-dcnode-id="1008" instrument_node=""> </span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Soulfully written, </span><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">A Thousand Splendid Suns</span></em><span data-dcnode-id="1004" instrument_node=""> explores not only the difficulties that many women still face today in Afghanistan, but also the indestructible strength and solidarity they draw on to overcome those difficulties — for themselves and for their families.</span></p></div></div><p data-dcnode-id="1000"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Human Acts: A Novel','slug':'human-acts-a-novel-han-kang','synopsis':'','url':'https://www.amazon.com/dp/B01EQ2S3J2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41or-b7BTNL.jpg','small':'https://m.media-amazon.com/images/I/41or-b7BTNL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="964" data-url="https://www.amazon.com/Human-Acts-Novel-Han-Kang-ebook/dp/B01EQ2S3J2/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="997"><source data-dcnode-id="999" data-srcset="https://m.media-amazon.com/images/I/41or-b7BTNL.jpg" height="290" media="(min-width: 480px)" width="198"><img alt="Human Acts: A Novel" data-dcnode-id="998" data-srcset="https://m.media-amazon.com/images/I/41or-b7BTNL._SL160_.jpg" draggable="false" height="175" width="120"></picture><div class="title" data-dcnode-id="991"><h3 data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">57. </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Human Acts</span></em><span data-dcnode-id="993" instrument_node=""> by Han Kang</span></h3></div><span data-dcnode-id="990" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="978"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01EQ2S3J2%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="989" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="979"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="980" data-slug="human-acts-a-novel-han-kang" data-url="https://www.amazon.com/dp/B01EQ2S3J2?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Add to library</span></span><span data-dcnode-id="985" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="981"><svg data-dcnode-id="982" viewBox="0 0 16 16"><g data-dcnode-id="983" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="984" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="977" instrument_node=""> </span><div class="blurb" data-dcnode-id="965"><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">It’s 1980. Park Chung-hee, the dictatorial ruler of South Korea, was assassinated just last year. Now pro-democracy activists are rising up, demanding political power, a free press, and an end to martial law. In the city of Gwangju, demonstrators and soldiers clash — until paratroopers open fire on protesting students. By the time the rubble settles, around 2,000 citizens are dead.</span></p><span data-dcnode-id="974" instrument_node=""> </span><p data-dcnode-id="966"><span data-dcnode-id="973" instrument_node="">The Gwangju Uprisings form the harrowing backdrop to </span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Human Acts</span></em><span data-dcnode-id="970" instrument_node="">, written by acclaimed South Korean novelist Han Kong and </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/book-translator/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="969" instrument_node="">translated with remarkable sensitivity</span></a><span data-dcnode-id="967" instrument_node=""> by Deborah Smith. Weaving together fiction, history, and even memoir, this difficult but brilliant book gives a voice to both those who survived and those who didn’t.</span></p></div></div><p data-dcnode-id="963"></p><h2 data-dcnode-id="960"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Postcolonial History</span></strong></h2><p data-dcnode-id="959"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The God of Small Things: A Novel','slug':'the-god-of-small-things-a-novel-arundhati-roy','synopsis':'','url':'https://www.amazon.com/dp/B001NBEWN6?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41HGHniGFjL.jpg','small':'https://m.media-amazon.com/images/I/41HGHniGFjL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="926" data-url="https://www.amazon.com/God-Small-Things-Novel-ebook/dp/B001NBEWN6/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=1594999856&amp;sr=1-2" draggable="false"><picture data-dcnode-id="956"><source data-dcnode-id="958" data-srcset="https://m.media-amazon.com/images/I/41HGHniGFjL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The God of Small Things: A Novel" data-dcnode-id="957" data-srcset="https://m.media-amazon.com/images/I/41HGHniGFjL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="950"><h3 data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">58. </span><em data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">The God of Small Things</span></em><span data-dcnode-id="952" instrument_node=""> by Arundhati Roy</span></h3></div><span data-dcnode-id="949" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="937"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B001NBEWN6%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="948" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="938"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="939" data-slug="the-god-of-small-things-a-novel-arundhati-roy" data-url="https://www.amazon.com/dp/B001NBEWN6?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Add to library</span></span><span data-dcnode-id="944" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="940"><svg data-dcnode-id="941" viewBox="0 0 16 16"><g data-dcnode-id="942" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="943" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="936" instrument_node=""> </span><div class="blurb" data-dcnode-id="927"><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Arundhati Roy’s first novel packs a punch — it’s the story of a pair of twins, brother and sister, growing up in politically unstable postcolonial India. Between the pull of tradition and an unclear national future, between the ingrained caste system and new possibilities in foreign lands, Estha and Rahel can only hold onto each other for support as the world around them changes.</span></p><span data-dcnode-id="933" instrument_node=""> </span><p data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">Roy reflects boldly on the messiness of a period in Indian history that’s often glorified. Her brave exploration of previously unexamined themes made </span><em data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">The God of Small Things</span></em><span data-dcnode-id="929" instrument_node=""> controversial when it was published in 1997. However, it’s those exact same things that make this book so important to read.</span></p></div></div><p data-dcnode-id="925"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Half of a Yellow Sun','slug':'half-of-a-yellow-sun-chimamanda-ngozi-adichie-cc710c26-3c2e-43e8-af61-ffbef499055e','synopsis':'','url':'https://www.amazon.com/dp/B001L83PLQ?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51AjvsbdLjL.jpg','small':'https://m.media-amazon.com/images/I/51AjvsbdLjL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="889" data-url="https://www.amazon.com/dp/B001L83PLQ?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="922"><source data-dcnode-id="924" data-srcset="https://m.media-amazon.com/images/I/51AjvsbdLjL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="Half of a Yellow Sun" data-dcnode-id="923" data-srcset="https://m.media-amazon.com/images/I/51AjvsbdLjL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="916"><h3 data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">59. </span><em data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Half of a Yellow Sun</span></em><span data-dcnode-id="918" instrument_node=""> by Chimamanda Ngozi Adichie</span></h3></div><span data-dcnode-id="915" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="903"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B001L83PLQ%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="914" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="904"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="905" data-slug="half-of-a-yellow-sun-chimamanda-ngozi-adichie-cc710c26-3c2e-43e8-af61-ffbef499055e" data-url="https://www.amazon.com/dp/B001L83PLQ?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Add to library</span></span><span data-dcnode-id="910" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="906"><svg data-dcnode-id="907" viewBox="0 0 16 16"><g data-dcnode-id="908" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="909" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="902" instrument_node=""> </span><div class="blurb" data-dcnode-id="890"><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">The titular symbol of </span><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Half of a Yellow Sun</span></em><span data-dcnode-id="898" instrument_node=""> is the emblem adorning the flag of Biafra, a nation that briefly seceded from Nigeria in the late 1960s. Chimamanda Ngozi Adichie’s story revolves around this short-lived nation. As the Igbo people of Southern Nigeria declare their independence from a state that wasn’t built to represent them, civil war breaks out. University professor Odenigbo, a Biafran nationalist, struggles to keep his young family not only alive, but also in a position to fight for their culture and communal identity.&nbsp;</span></p><span data-dcnode-id="896" instrument_node=""> </span><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">The legacy of colonialism in Africa is harrowing and powerful, particularly when it comes to the arbitrary borders that bound conflicting peoples under one nation not of their choosing. One book can never cover everything, but </span><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Half of a Yellow Sun</span></em><span data-dcnode-id="892" instrument_node=""> provides a poetic portal into this turbulent era.</span></p></div></div><p data-dcnode-id="888"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The House of the Spirits: A Novel','slug':'the-house-of-the-spirits-a-novel-isabel-allende-7a60a669-6a57-40c7-abaa-45cebc9e2d7c','synopsis':'','url':'https://www.amazon.com/dp/1501117017?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/61AH4BDnENL.jpg','small':'https://m.media-amazon.com/images/I/61AH4BDnENL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="852" data-url="https://www.amazon.com/House-Spirits-Novel-Isabel-Allende/dp/1501117017" draggable="false"><picture data-dcnode-id="885"><source data-dcnode-id="887" data-srcset="https://m.media-amazon.com/images/I/61AH4BDnENL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The House of the Spirits: A Novel" data-dcnode-id="886" data-srcset="https://m.media-amazon.com/images/I/61AH4BDnENL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="879"><h3 data-dcnode-id="880"><span data-dcnode-id="884" instrument_node="">60. </span><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">The House of the Spirits</span></em><span data-dcnode-id="881" instrument_node=""> by Isabel Allende</span></h3></div><span data-dcnode-id="878" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="866"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1501117017%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="877" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="867"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="868" data-slug="the-house-of-the-spirits-a-novel-isabel-allende-7a60a669-6a57-40c7-abaa-45cebc9e2d7c" data-url="https://www.amazon.com/dp/1501117017?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Add to library</span></span><span data-dcnode-id="873" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="869"><svg data-dcnode-id="870" viewBox="0 0 16 16"><g data-dcnode-id="871" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="872" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="865" instrument_node=""> </span><div class="blurb" data-dcnode-id="853"><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">If you’re unsure whether historical fiction and magical realism mix well, give Isabel Allende a chance to change your mind with her debut novel. </span><em data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">The House of the Spirits</span></em><span data-dcnode-id="861" instrument_node=""> features Clara del Valle and her uncanny ability to predict life events, from sudden deaths to inevitable marriages. Following her intuition, she marries Esteban Trueba, a formerly impoverished, now ruthless plantation owner and politician. In the years that follow, as postcolonial Chile undergoes massive political changes, the Trueba family also face its internal challenges — the younger generations start to rebel against their predecessors.</span></p><span data-dcnode-id="859" instrument_node=""> </span><p data-dcnode-id="854"><span data-dcnode-id="858" instrument_node="">Subtly fantastical and wholly passionate, </span><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The House of the Spirits</span></em><span data-dcnode-id="855" instrument_node=""> b
