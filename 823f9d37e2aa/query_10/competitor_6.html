.</span></p></div></div><p data-dcnode-id="2325"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Snow Flower and the Secret Fan: A Novel','slug':'snow-flower-and-the-secret-fan-a-novel-lisa-see','synopsis':'','url':'https://www.amazon.com/dp/B000FCK71U?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51ITwipHQQL.jpg','small':'https://m.media-amazon.com/images/I/51ITwipHQQL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2289" data-url="https://www.amazon.com/dp/B000FCK71U?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2322"><source data-dcnode-id="2324" data-srcset="https://m.media-amazon.com/images/I/51ITwipHQQL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="Snow Flower and the Secret Fan: A Novel" data-dcnode-id="2323" data-srcset="https://m.media-amazon.com/images/I/51ITwipHQQL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="2316"><h3 data-dcnode-id="2317"><span data-dcnode-id="2321" instrument_node="">21. </span><em data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Snow Flower and the Secret Fan</span></em><span data-dcnode-id="2318" instrument_node=""> by Lisa See</span></h3></div><span data-dcnode-id="2315" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2303"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000FCK71U%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2314" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2304"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2305" data-slug="snow-flower-and-the-secret-fan-a-novel-lisa-see" data-url="https://www.amazon.com/dp/B000FCK71U?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Add to library</span></span><span data-dcnode-id="2310" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2306"><svg data-dcnode-id="2307" viewBox="0 0 16 16"><g data-dcnode-id="2308" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2309" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2302" instrument_node=""> </span><div class="blurb" data-dcnode-id="2290"><p data-dcnode-id="2297"><span data-dcnode-id="2301" instrument_node="">If you’re a fan of late imperial Chinese history, you should definitely give </span><em data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Snow Flower and the Secret Fan</span></em><span data-dcnode-id="2298" instrument_node=""> a read. Set in the final decades of the last dynasty in China, the story follows two women, Lily and Snow Flower, who accompany one another through various rites of passage. As they suffer and grow together —&nbsp; exchanging letters and poetry when they’re not face to face — both come to terms with the societal expectations restricting them as women.&nbsp;</span></p><span data-dcnode-id="2296" instrument_node=""> </span><p data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">Elegantly written, </span><em data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Snow Flower and the Secret Fan</span></em><span data-dcnode-id="2292" instrument_node=""> brings its readers back in time and presents to them a realistic image of what it was like to be a woman in late imperial China. It’s brilliance lies in its account of women’s ingenuity and the agency they seize despite the limitations imposed on them.</span></p></div></div><p data-dcnode-id="2288"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Homegoing: A novel','slug':'homegoing-a-novel-yaa-gyasi','synopsis':'','url':'https://www.amazon.com/dp/B015VACH4U?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41otqMcqCjL.jpg','small':'https://m.media-amazon.com/images/I/41otqMcqCjL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2253" data-url="https://www.amazon.com/dp/B015VACH4U?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2285"><source data-dcnode-id="2287" data-srcset="https://m.media-amazon.com/images/I/41otqMcqCjL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="Homegoing: A novel" data-dcnode-id="2286" data-srcset="https://m.media-amazon.com/images/I/41otqMcqCjL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="2279"><h3 data-dcnode-id="2280"><span data-dcnode-id="2284" instrument_node="">22. </span><em data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Homegoing</span></em><span data-dcnode-id="2281" instrument_node=""> by Yaa Gyasi</span></h3></div><span data-dcnode-id="2278" instrument_node=""> < class="blurb" data-dcnode-id="2254"><p data-dcnode-id="2258"><em data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Homegoing</span></em><span data-dcnode-id="2262" instrument_node=""> can be described as an interlinked series of </span><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-short-stories" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2261" instrument_node="">short stories</span></a><span data-dcnode-id="2259" instrument_node=""> following the lives and descendants of two Ghanaian sisters. One got married off to a slave trader, and the other got traded to America. The chapters alternate between them, switching back and forth between Africa and America and illustrating the lives of Black people through slavery and colonialism, civil rights movements and nationalist uprisings.</span></p><span data-dcnode-id="2257" instrument_node=""> </span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">The chapters don’t give readers the complete knowledge of each generation’s experience, but they do offer an emotional and comprehensive picture of the African diaspora, unpacking historical circumstances that continue to affect millions of people today.</span></p></div></div><p data-dcnode-id="2252"></p><h2 data-dcnode-id="2249"><strong data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">19th Century</span></strong></h2><p data-dcnode-id="2248"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'War and Peace (Vintage Classics)','slug':'war-and-peace-vintage-classics-leo-tolstoy','synopsis':'','url':'https://www.amazon.com/dp/1400079985?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51J1nb00FLL.jpg','small':'https://m.media-amazon.com/images/I/51J1nb00FLL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2215" data-url="https://www.amazon.com/dp/1400079985?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2245"><source data-dcnode-id="2247" data-srcset="https://m.media-amazon.com/images/I/51J1nb00FLL.jpg" height="298" media="(min-width: 480px)" width="198"><img alt="War and Peace (Vintage Classics)" data-dcnode-id="2246" data-srcset="https://m.media-amazon.com/images/I/51J1nb00FLL._SL160_.jpg" draggable="false" height="180" width="120"></picture><div class="title" data-dcnode-id="2239"><h3 data-dcnode-id="2240"><span data-dcnode-id="2244" instrument_node="">23. </span><em data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">War and Peace</span></em><span data-dcnode-id="2241" instrument_node=""> by Leo Tolstoy</span></h3></div><span data-dcnode-id="2238" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2226"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1400079985%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2237" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2227"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2228" data-slug="war-and-peace-vintage-classics-leo-tolstoy" data-url="https://www.amazon.com/dp/1400079985?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Add to library</span></span><span data-dcnode-id="2233" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2229"><svg data-dcnode-id="2230" viewBox="0 0 16 16"><g data-dcnode-id="2231" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2232" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2225" instrument_node=""> </span><div class="blurb" data-dcnode-id="2216"><p data-dcnode-id="2220"><span data-dcnode-id="2224" instrument_node="">You’ve very likely heard of this historical epic&nbsp; — Leo Tolstoy’s </span><em data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">War and Peace</span></em><span data-dcnode-id="2221" instrument_node=""> is a pillar of classic literature that’s known and studied all across the world. Set in a Tsarist Russia under attack by Napoleon and his mighty army, the book follows a cast of characters from all walks of life. There’s Pierre Bezukhov, the bastard son of a famous count, who struggling to understand his position in society; Natasha Rostova, the romantic and vivacious countess who lives in the moment; and Andrei Bolkonsky, the high-born prince who rejects the safety provided by his status to join the war effort against the French.</span></p><span data-dcnode-id="2219" instrument_node=""> </span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">No one is spared from the suffering caused by a war that’s focused on protecting the empire and not its people — a poignant reflection that comes through thanks to Tolstoy’s thorough research of the period. This colossal masterpiece is no easy read, but it’s a gem that history buffs should not skip over.</span></p></div></div><p data-dcnode-id="2214"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'How Much of These Hills Is Gold: A Novel','slug':'how-much-of-these-hills-is-gold-a-novel-c-pam-zhang','synopsis':'','url':'https://www.amazon.com/dp/0525537201?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/5143vcyFLOL.jpg','small':'https://m.media-amazon.com/images/I/5143vcyFLOL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2182" data-url="https://www.amazon.com/How-Much-These-Hills-Gold/dp/0525537201" draggable="false"><picture data-dcnode-id="2211"><source data-dcnode-id="2213" data-srcset="https://m.media-amazon.com/images/I/5143vcyFLOL.jpg" height="299" media="(min-width: 480px)" width="198"><img alt="How Much of These Hills Is Gold: A Novel" data-dcnode-id="2212" data-srcset="https://m.media-amazon.com/images/I/5143vcyFLOL._SL160_.jpg" draggable="false" height="181" width="120"></picture><div class="title" data-dcnode-id="2205"><h3 data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">24. </span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">How Much of These Hills Is Gold</span></em><span data-dcnode-id="2207" instrument_node=""> by C. Pam Zhang</span></h3></div><span data-dcnode-id="2204" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2192"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0525537201%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2203" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapp e.</span></p><span data-dcnode-id="2188" instrument_node=""> </span><p data-dcnode-id="2184"><em data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">How Much of These Hills Is Gold</span></em><span data-dcnode-id="2185" instrument_node=""> centers on Sam and Lucy’s quest to give their father a proper burial. This isn’t an easy book to read: after all, we’re tracking two children, neither of them into their teens, as they drag a corpse around a desert landscape teeming with threats. But thanks to C. Pam Zhang’s lovely narrative style, this novel rewards as much as it devastates.</span></p></div></div><p data-dcnode-id="2181"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Alias Grace: A Novel','slug':'alias-grace-a-novel-margaret-atwood','synopsis':'','url':'https://www.amazon.com/dp/B00513F9PM?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41EOaTk61BL.jpg','small':'https://m.media-amazon.com/images/I/41EOaTk61BL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2146" data-url="https://www.amazon.com/dp/B00513F9PM?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2178"><source data-dcnode-id="2180" data-srcset="https://m.media-amazon.com/images/I/41EOaTk61BL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="Alias Grace: A Novel" data-dcnode-id="2179" data-srcset="https://m.media-amazon.com/images/I/41EOaTk61BL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="2172"><h3 data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">25. </span><em data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Alias Grace</span></em><span data-dcnode-id="2174" instrument_node=""> by Margaret Atwood</span></h3></div><span data-dcnode-id="2171" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2159"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00513F9PM%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2170" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2160"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2161" data-slug="alias-grace-a-novel-margaret-atwood" data-url="https://www.amazon.com/dp/B00513F9PM?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Add to library</span></span><span data-dcnode-id="2166" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2162"><svg data-dcnode-id="2163" viewBox="0 0 16 16"><g data-dcnode-id="2164" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2165" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2158" instrument_node=""> </span><div class="blurb" data-dcnode-id="2147"><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">It’s 1843 in Canada, and Grace Marks has been convicted of murdering her employer, even though she has no memory of the event. She’s sentenced to lifelong imprisonment, although a young doctor, Simon Jordan, proposes that he study her psyche and memory some more to uncover the mystery behind her apparent amnesia.&nbsp;</span></p><span data-dcnode-id="2155" instrument_node=""> </span><p data-dcnode-id="2148"><em data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Alias Grace</span></em><span data-dcnode-id="2152" instrument_node=""> is a historical fiction novel for lovers of </span><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/psychological-thrillers" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2151" instrument_node="">psychological thriller</span></a><span data-dcnode-id="2149" instrument_node="">. The fact that it’s based on a true event and set in the grimy early modern era only enhances the mysterious mood of this suspenseful novel.</span></p></div></div><p data-dcnode-id="2145"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Luminaries: A Novel (Man Booker Prize)','slug':'the-luminaries-a-novel-man-booker-prize-eleanor-catton','synopsis':'','url':'https://www.amazon.com/dp/B00BAXFAJC?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51LSmZWntfL.jpg','small':'https://m.media-amazon.com/images/I/51LSmZWntfL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2112" data-url="https://www.amazon.com/Luminaries-Man-Booker-Prize-ebook/dp/B00BAXFAJC/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="2142"><source data-dcnode-id="2144" data-srcset="https://m.media-amazon.com/images/I/51LSmZWntfL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The Luminaries: A Novel (Man Booker Prize)" data-dcnode-id="2143" data-srcset="https://m.media-amazon.com/images/I/51LSmZWntfL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="2136"><h3 data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">26. </span><em data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">The Luminaries</span></em><span data-dcnode-id="2138" instrument_node=""> by Eleanor Catton</span></h3></div><span data-dcnode-id="2135" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2123"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00BAXFAJC%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2134" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2124"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2125" data-slug="the-luminaries-a-novel-man-booker-prize-eleanor-catton" data-url="https://www.amazon.com/dp/B00BAXFAJC?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Add to library</span></span><span data-dcnode-id="2130" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2126"><svg data-dcnode-id="2127" viewBox="0 0 16 16"><g data-dcnode-id="2128" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2129" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2122" instrument_node=""> </span><div class="blurb" data-dcnode-id="2113"><p data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">This sprawling 800-pager made 28-year-old Eleanor Catton the youngest-ever winner of the prestigious Booker Prize. Remarkable for its intricate plot as well as its prodigious length, </span><em data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">The Luminaries</span></em><span data-dcnode-id="2118" instrument_node=""> takes inspiration from an unlikely pair of sources: the New Zealand gold rush of the 1860s and the zodiac.&nbsp;</span></p><span data-dcnode-id="2116" instrument_node=""> </span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">A Scottish lawyer driven by dreams of gold, Walter Moody is ready to make his fortune from the mines of Hokitika. But then he stumbles into a strange meeting in a hotel lobby. From Maori hunter to Danish merchant, Chinese goldsmith to French clerk, twelve odd odd bedfellows have gathered to discuss a mysterious death. Each member of Catton’s fascinating ensemble cast corresponds to a zodiac sign or an astronomical body. Watching their paths converge and diverge in enigmatic patterns makes this book’s central mystery all the more enthralling.</span></p></div></div><p data-dcnode-id="2111"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Underground Railroad (Pulitzer Prize Winner) (National Book Award Winner) (Oprah's Book Club): A Novel','slug':'the-underground-railroad-pulitzer-prize-winner-national-book-award-winner-oprah-s-book-club-a-novel-colson-whitehead','synopsis':'','url':'https://www.amazon.com/dp/B01A4ATV0A?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51jisd0-MtL.jpg','small':'https://m.media-amazon.com/images/I/51jisd0-MtL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2069" data-url="https://www.amazon.com/Underground-Railroad-Pulitzer-Winner-National-ebook/dp/B01A4ATV0A/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=1594660580&amp;sr=1-2" draggable="false"><picture data-dcnode-id="2108"><source data-dcnode-id="2110" data-srcset="https://m.media-amazon.com/images/I/51jisd0-MtL.jpg" height="305" media="(min-width: 480px)" width="198"><img alt="The Underground Railroad (Pulitzer Prize Winner) (National Book Award Winner) (Oprah's Book Club): A Novel" data-dcnode-id="2109" data-srcset="https://m.media-amazon.com/images/I/51jisd0-MtL._SL160_.jpg" draggable="false" height="185" width="120"></picture><div class="title" data-dcnode-id="2102"><h3 data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">27. </span><em data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">The Underground Railroad</span></em><span data-dcnode-id="2104" instrument_node=""> by Colson Whitehead</span></h3></div><span data-dcnode-id="2101" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2089"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01A4ATV0A%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2100" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2090"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2091" data-slug="the-underground-railroad-pulitzer-prize-winner-national-book-award-winner-oprah-s-book-club-a-novel-colson-whitehead" data-url="https://www.amazon.com/dp/B01A4ATV0A?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Add to library</span></span><span data-dcnode-id="2096" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2092"><svg data-dcnode-id="2093" viewBox="0 0 16 16"><g data-dcnode-id="2094" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2095" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2088" instrument_node=""> </span><div class="blurb" data-dcnode-id="2070"><p data-dcnode-id="2077"><span data-dcnode-id="2087" instrument_node="">You might say </span><em data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">The Underground Railroad</span></em><span data-dcnode-id="2084" instrument_node=""> was </span><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">the</span></em><span data-dcnode-id="2081" instrument_node=""> book of 2016. A cerebral, sardonic alternate history — with an emphasis on the “history” — it swept the full slate of literary prizes, from the National Book Award to the Pulitzer. The </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/african-american-literature" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2080" instrument_node="">celebrated Black author</span></a><span data-dcnode-id="2078" instrument_node=""> Colson Whitehead, famed for the irony lacing his prose, tackles slavery with his trademark ingenuity and wit. The result is an unsentimental, yet deeply affecting, look at a violent and far-reaching institution.</span></p><span data-dcnode-id="2076" instrument_node=""> </span><p data-dcnode-id="2071"><span data-dcnode-id="2075" instrument_node="">Cora, a slave on a Georgia plantation, gets the chance to escape when new arrival Caesar tells her about the Underground Railroad. Faced with the prospect of freedom, Cora feels torn — her own mother fled the plantation some time ago, leaving her to suffer alone. Still, she and Caesar ultimately decide to take flight. Together, they must make their way to the Underground Railroad which, in Whitehead’s reimagining, becomes a </span><em data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">literal </span></em><span data-dcnode-id="2072" instrument_node="">railroad, complete with conductors, tunnels, and tracks.</span></p></div></div><p data-dcnode-id="2068"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Twelve Rooms of the Nile','slug':'the-twelve-rooms-of-the-nile-enid-shomer-ff23a42c-b8eb-4394-8d82-b5dc79022639','synopsis':'','url':'https://www.amazon.com/dp/B006NZ6VB8?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51hi--7lQ-L.jpg','small':'https://m.media-amazon.com/images/I/51hi--7lQ-L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2029" data-url="https://www.amazon.com/Twelve-Rooms-Nile-Enid-Shomer-ebook/dp/B006NZ6VB8/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=1594748699&amp;sr=1-1" draggable="false"><picture data-dcnode-id="2065"><source data-dcnode-id="2067" data-srcset="https://m.media-amazon.com/images/I/51hi--7lQ-L.jpg" height="301" media="(min-width: 480px)" width="198"><img alt="The Twelve Rooms of the Nile" data-dcnode-id="2066" data-srcset="https://m.media-amazon.com/images/I/51hi--7lQ-L._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="2059"><h3 data-dcnode-id="2060"><span data-dcnode-id="2064" instrument_node="">28. </span><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">The Twelve Rooms of the Nile</span></em><span data-dcnode-id="2061" instrument_node=""> by Enid Shomer</span></h3></div><span data-dcnode-id="2058" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2046"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B006NZ6VB8%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2057" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2047"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2048" data-slug="the-twelve-rooms-of-the-nile-enid-shomer-ff23a42c-b8eb-4394-8d82-b5dc79022639" data-url="https://www.amazon.com/dp/B006NZ6VB8?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Add to library</span></span><span data-dcnode-id="2053" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2049"><svg data-dcnode-id="2050" viewBox="0 0 16 16"><g data-dcnode-id="2051" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2052" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2045" instrument_node=""> </span><div class="blurb" data-dcnode-id="2030"><p data-dcnode-id="2037"><span data-dcnode-id="2044" instrument_node="">She invented a discipline that changed medicine forever. He wrote one of the </span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-books-of-all-time" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2043" instrument_node="">finest novels</span></a><span data-dcnode-id="2041" instrument_node=""> in&nbsp; history. And now, the Fates have brought them to the same place, at the same time. This might sound like the premise of a charmingly kooky romance between made-up characters, but it actually describes two real-life historical icons: Florence Nightingale, the mother of modern nursing, and Gustave Flaubert, the author of </span><em data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Madame Bovary</span></em><span data-dcnode-id="2038" instrument_node="">. For a while, in 1850, both happened to be sailing up the Nile.</span></p><span data-dcnode-id="2036" instrument_node=""> </span><p data-dcnode-id="2031"><span data-dcnode-id="2035" instrument_node="">In reality, Nightingale and Flaubert didn’t seem to have bumped into each other at all on their Egyptian treks. But </span><em data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">The Twelve Rooms of the Nile</span></em><span data-dcnode-id="2032" instrument_node=""> envisages what might have happened if they had. In Shomer’s dazzling imagination, no-nonsense Florence and hedonistic, womanizing Gustave strike up the unlikeliest of friendships.</span></p></div></div><p data-dcnode-id="2028"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Measuring the World: A Novel','slug':'measuring-the-world-a-novel-daniel-kehlmann-176a7985-9b8a-4ab6-9c39-6526b14d2610','synopsis':'','url':'https://www.amazon.com/dp/B000WJSC2C?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51-7pOYYgJL.jpg','small':'https://m.media-amazon.com/images/I/51-7pOYYgJL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1995" data-url="https://www.amazon.com/Measuring-World-Novel-Daniel-Kehlmann-ebook/dp/B000WJSC2C/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="2025"><source data-dcnode-id="2027" data-srcset="https://m.media-amazon.com/images/I/51-7pOYYgJL.jpg" height="309" media="(min-width: 480px)" width="198"><img alt="Measuring the World: A Novel" data-dcnode-id="2026" data-srcset="https://m.media-amazon.com/images/I/51-7pOYYgJL._SL160_.jpg" draggable="false" height="187" width="120"></picture><div class="title" data-dcnode-id="2019"><h3 data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node="">29. </span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Measuring the World</span></em><span data-dcnode-id="2021" instrument_node=""> by Daniel Kehlmann</span></h3></div><span data-dcnode-id="2018" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2006"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000WJSC2C%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2017" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2007"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2008" data-slug="measuring-the-world-a-novel-daniel-kehlmann-176a7985-9b8a-4ab6-9c39-6526b14d2610" data-url="https://www.amazon.com/dp/B000WJSC2C?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Add to library</span></span><span data-dcnode-id="2013" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2009"><svg data-dcnode-id="2010" viewBox="0 0 16 16"><g data-dcnode-id="2011" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2012" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2005" instrument_node=""> </span><div class="blurb" data-dcnode-id="1996"><p data-dcnode-id="2000"><span data-dcnode-id="2004" instrument_node="">The science of measurement might not sound like the most exciting subject for a work of historical fiction, but Austrian author Daniel Kehlmann pulls it off with wit and aplomb. In </span><em data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Measuring the World</span></em><span data-dcnode-id="2001" instrument_node="">, two German geniuses, intoxicated by the promise of the Enlightenment, set out to change the world by, well, measuring it.</span></p><span data-dcnode-id="1999" instrument_node=""> </span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">In 1828, at a convention for scientists, Alexander von Humboldt meets Carl Friedrich Gauss. Humbolt, a polymathic adventurer from a family of landed gentry, has already plumbed the depths of South America. The homebody Gauss, meanwhile, is rapidly developing a reputation as a once-in-a-century mathematical mind — he can map the world through number theory without leaving his home. Kehlmann’s account of their meeting  is cerebral, fast-paced, and gently funny, </span></p></div></div><p data-dcnode-id="1994"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Marriage of Opposites','slug':'the-marriage-of-opposites-alice-hoffman','synopsis':'','url':'https://www.amazon.com/dp/B00P434ELO?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51h6y4nC1pL.jpg','small':'https://m.media-amazon.com/images/I/51h6y4nC1pL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1955" data-url="https://www.amazon.com/Marriage-Opposites-Alice-Hoffman-ebook/dp/B00P434ELO/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="1991"><source data-dcnode-id="1993" data-srcset="https://m.media-amazon.com/images/I/51h6y4nC1pL.jpg" height="301" media="(min-width: 480px)" width="198"><img alt="The Marriage of Opposites" data-dcnode-id="1992" data-srcset="https://m.media-amazon.com/images/I/51h6y4nC1pL._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="1985"><h3 data-dcnode-id="1986"><span data-dcnode-id="1990" instrument_node="">30. </span><em data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">The Marriage of Opposites</span></em><span data-dcnode-id="1987" instrument_node=""> by Alice Hoffmann</span></h3></div><span data-dcnode-id="1984" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1972"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00P434ELO%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1983" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1973"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1974" data-slug="the-marriage-of-opposites-alice-hoffman" data-url="https://www.amazon.com/dp/B00P434ELO?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Add to library</span></span><span data-dcnode-id="1979" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1975"><svg data-dcnode-id="1976" viewBox="0 0 16 16"><g data-dcnode-id="1977" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1978" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1971" instrument_node=""> </span><div class="blurb" data-dcnode-id="1956"><p data-dcnode-id="1960"><span data-dcnode-id="1970" instrument_node="">From the author of </span><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">The Dovekeepers</span></em><span data-dcnode-id="1967" instrument_node=""> comes this story of transcendent beauty and forbidden love in 19th-century Paris. Camille Pissarro, the father of French Impressionism, produced a new way of looking at the world: a light-drenched, expressive style that makes staid scenes look alive with movement. </span><em data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">The Marriage of Opposites</span></em><span data-dcnode-id="1964" instrument_node="">, however, takes a look at the extraordinary relationship that produced </span><em data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">him</span></em><span data-dcnode-id="1961" instrument_node=""> — a love affair that changed the shape of art.</span></p><span data-dcnode-id="1959" instrument_node=""> </span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Rachel, then a spirited French-Jewish girl and not yet Pissarro’s mother, is married off to an aging widower in a last-ditch effort to save her family’s business. But then her husband dies, and she finds herself in the unexpected — an inexorably charming — company of his nephew, a young man seven years her junior.</span></p></div></div><p data-dcnode-id="1954"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Master: A Novel','slug':'the-master-a-novel-colm-toibin','synopsis':'','url':'https://www.amazon.com/dp/0743250419?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/5186karDemL.jpg','small':'https://m.media-amazon.com/images/I/5186karDemL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1912" data-url="https://www.amazon.com/Master-Novel-Colm-Toibin/dp/0743250419/ref=sr_1_1?dchild=1&amp;keywords=colm+tobin&amp;qid=1594840600&amp;s=books&amp;sr=1-1" draggable="false"><picture data-dcnode-id="1951"><source data-dcnode-id="1953" data-srcset="https://m.media-amazon.com/images/I/5186karDemL.jpg" height="300" media="(min-width: 480px)" width="198"><img alt="The Master: A Novel" data-dcnode-id="1952" data-srcset="https://m.media-amazon.com/images/I/5186karDemL._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="1945"><h3 data-dcnode-id="1946"><span data-dcnode-id="1950" instrument_node="">31. </span><em data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">The Master</span></em><span data-dcnode-id="1947" instrument_node=""> by Colm Tóibín</span></h3></div><span data-dcnode-id="1944" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1932"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0743250419%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1943" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1933"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1934" data-slug="the-master-a-novel-colm-toibin" data-url="https://www.amazon.com/dp/0743250419?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Add to library</span></span><span data-dcnode-id="1939" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1935"><svg data-dcnode-id="1936" viewBox="0 0 16 16"><g data-dcnode-id="1937" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1938" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1931" instrument_node=""> </span><div class="blurb" data-dcnode-id="1913"><p data-dcnode-id="1917"><span data-dcnode-id="1930" instrument_node="">A master of </span><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/gothic-literature" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1929" instrument_node="">Gothic literature</span></a><span data-dcnode-id="1927" instrument_node="">, the English novelist Henry James made an indelible impression with the haunting characters in his fiction, from the sinister twins in </span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">The Turn of the Screw</span></em><span data-dcnode-id="1924" instrument_node=""> to the high-spirited socialite in </span><em data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The Portrait of a Lady</span></em><span data-dcnode-id="1921" instrument_node="">. In </span><em data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">The Master</span></em><span data-dcnode-id="1918" instrument_node="">, however, James himself becomes a character. Colm Tóibín’s subtle, psychologically incisive novel excavates the great novelist’s inner life — and casts his extraordinary output in a new light.&nbsp;</span></p><span data-dcnode-id="1916" instrument_node=""> </span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">It takes guts to ventriloquize one of the greatest writers in Anglophone history, but Tóibín pulls it off with an exacting thoughtfulness: his James emerges on the page as both a literary giant and a flawed, vulnerable human being.</span></p></div></div><p data-dcnode-id="1911"></p><h2 data-dcnode-id="1908"><strong data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Civil War</span></strong></h2><p data-dcnode-id="1907"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Lincoln in the Bardo: A Novel','slug':'lincoln-in-the-bardo-a-novel-george-saunders','synopsis':'','url':'https://www.amazon.com/dp/0812995341?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/610oL94w5HL.jpg','small':'https://m.media-amazon.com/images/I/610oL94w5HL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="1875" data-url="https://www.amazon.com/Lincoln-Bardo-Novel-George-Saunders-ebook/dp/B01FPH2N0C/ref=sr_1_2?crid=39RCYC6K6ATCW&amp;dchild=1&amp;keywords=lincoln+in+the+bardo&amp;qid=1594743496&amp;s=digital-text&amp;sprefix=lincoln+in+the+bardo%2Cdigital-text%2C191&amp;sr=1-2" draggable="false"><picture data-dcnode-id="1904"><source data-dcnode-id="1906" data-srcset="https://m.media-amazon.com/images/I/610oL94w5HL.jpg" height="292" media="(min-width: 480px)" width="198"><img alt="Lincoln in the Bardo: A Novel" data-dcnode-id="1905" data-srcset="https://m.media-amazon.com/images/I/610oL94w5HL._SL160_.jpg" draggable="false" height="176" width="120"></picture><div class="title" data-dcnode-id="1898"><h3 data-dcnode-id="1899"><span data-dcnode-id="1903" instrument_node="">32. </span><em data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Lincoln in the Bardo</span></em><span data-dcnode-id="1900" instrument_node=""> by George Saunders</span></h3></div><span data-dcnode-id="1897" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="1885"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0812995341%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="1896" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="1886"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="1887" data-slug="lincoln-in-the-bardo-a-novel-george-saunders" data-url="https://www.amazon.com/dp/0812995341?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Add to library</span></span><span data-dcnode-id="1892" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="1888"><svg data-dcnode-id="1889" viewBox="0 0 16 16"><g data-dcnode-id="1890" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="1891" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="1884" instrument_node=""> </span><div class="blurb" data-dcnode-id="1876"><p data-dcnode-id="1880"><em data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Lincoln in the Bardo</span></em><span data-dcnode-id="1881" instrument_node=""> might be George Saunders’s first novel, but he had a long and vibrant writing career before it ever went to press: he racked up National Magazine awards for his short fiction and was even named a MacArthur genius. In this Booker Prize-winning tour de force, you see the luminous style and emotional sensitivity that made him such a compelling voice in short fiction.</span></p><span data-dcnode-id="1879" instrument_node=""> </span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">The Civil War is already raging when President Lincoln’s son dies. Only eleven years old, Willie Lincoln finds himself in the “bardo,” the Tibetan word for the liminal space between this life and the next. There, the ghosts of men and children swirl around him— some of them cut down by the war that will consume his father’s presidency.</span></p></div></div><p data-dcnode-id="1874"></p><div class="book-blot" contenteditable="false" data-book-i
