            60 Best Historical Fiction Novels of All Time
          </span></h1><span data-dcnode-id="3102" instrument_node=""> </span><img alt="60 Best Historical Fiction Novels of All Time" class="book-cover visible-until-sm space-top-2em space-bottom-2em" data-dcnode-id="3101" height="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-cdn.reedsy.com/discovery/post/116/featured_image/medium_bc3dee00d18848641682125aa44aeade00a1db96.jpg&amp;raw" width="512"><span data-dcnode-id="3100" instrument_node=""> </span><p data-dcnode-id="3099"></p><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Is time travel impossible? For theoretical physicists, the jury’s still out, but book lovers can answer with a resounding “no”. Whether you’re keen to visit biblical Judaea or feel like living through the chaos of World War II, historical fiction can make you feel immersed in the colors and textures of the distant — or recent — past. If you’re feeling just a little sick of the present, look no further: here are the 60 best historical fiction novels to bring you back in time.</span></p><p data-dcnode-id="3096"></p><p data-dcnode-id="3091"><strong data-dcnode-id="3093"><em data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">If you're feeling overwhelmed by the number of great historical fiction novels out there, you can also take our 30-second quiz below to narrow it down quickly and get a personalized historical fiction recommendation&nbsp;</span></em></strong><span data-dcnode-id="3092" instrument_node="">😉</span></p><p data-dcnode-id="3090"></p><div class="typeform panel" data-dcnode-id="3077"><div class="panel-body text-center" data-dcnode-id="3078"><p class="h1 space-bottom-xs" data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">

m button-yellow buy-button space-right-2em" data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0312427298%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="3059" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="3049"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="3050" data-slug="the-red-tent-20th-anniversary-edition-a-novel-anita-diamant" data-url="https://www.amazon.com/dp/0312427298?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Add to library</span></span><span data-dcnode-id="3055" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="3051"><svg data-dcnode-id="3052" viewBox="0 0 16 16"><g data-dcnode-id="3053" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="3054" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="3047" instrument_node=""> </span><div class="blurb" data-dcnode-id="3039"><p data-dcnode-id="3043"><em data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">The Red Tent</span></em><span data-dcnode-id="3044" instrument_node=""> is narrated by Dinah, the daughter of Jacob — the patriarch of the Israelites in the Old Testament. While not prominently featured in the Bible, Dinah is given the spotlight in this novel: she gets to speak about her experience as a woman in the early days of humanity.</span></p><span data-dcnode-id="3042" instrument_node=""> </span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">When they menstruate, the women in Dinah’s family stay in a red tent together, where&nbsp; they discuss all sorts of local events. Diamant admits that there is no concrete evidence for this practice in ancient Israel, but it was common across many early civilizations. Her novel brings biblical history to life, and more importantly, gives voice to a crucial half of the human population, a group too often disregarded.&nbsp;</span></p></div></div><p data-dcnode-id="3037"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Lavinia','slug':'lavinia-ursula-k-le-guin','synopsis':'','url':'https://www.amazon.com/dp/0156033682?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41qcZRfKZbL.jpg','small':'https://m.media-amazon.com/images/I/41qcZRfKZbL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2998" data-url="https://www.amazon.com/Lavinia-Ursula-K-Guin/dp/0156033682/ref=sr_1_1?dchild=1&amp;keywords=lavinia&amp;qid=1594658972&amp;s=books&amp;sr=1-1" draggable="false"><picture data-dcnode-id="3034"><source class="entered" data-dcnode-id="3036" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/41qcZRfKZbL.jpg" height="298" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/41qcZRfKZbL.jpg" width="198"><img alt="Lavinia" class="entered loaded" data-dcnode-id="3035" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/41qcZRfKZbL._SL160_.jpg" draggable="false" height="180" srcset="https://m.media-amazon.com/images/I/41qcZRfKZbL._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="3028"><h3 data-dcnode-id="3029"><span data-dcnode-id="3033" instrument_node="">2. </span><em data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Lavinia</span></em><span data-dcnode-id="3030" instrument_node=""> by Ursula K. Le Guin</span></h3></div><span data-dcnode-id="3027" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="3015"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="3025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0156033682%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="3026" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="3016"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="3017" data-slug="lavinia-ursula-k-le-guin" data-url="https://www.amazon.com/dp/0156033682?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Add to library</span></span><span data-dcnode-id="3022" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="3018"><svg data-dcnode-id="3019" viewBox="0 0 16 16"><g data-dcnode-id="3020" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="3021" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="3014" instrument_node=""> </span><div class="blurb" data-dcnode-id="2999"><p data-dcnode-id="3006"><span data-dcnode-id="3013" instrument_node="">Ursula K. Le Guin is best known for her pioneering work in fantasy, but </span><em data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Lavinia</span></em><span data-dcnode-id="3010" instrument_node=""> proves she’s a master of historical fiction too. In this gorgeous retelling of the Trojan War and Rome’s subsequent founding, Le Guin draws on Virgil’s </span><em data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Aeneid</span></em><span data-dcnode-id="3007" instrument_node=""> to tell a moving, feminist story of war, family, and political destiny.</span></p><span data-dcnode-id="3005" instrument_node=""> </span><p data-dcnode-id="3000"><span data-dcnode-id="3004" instrument_node="">In the </span><em data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Aeneid</span></em><span data-dcnode-id="3001" instrument_node="">, Lavinia is a silent figure, more chess piece than character — a princess fated to marry the hero Aeneas and stand by his side as he forges an empire. Le Guin, however, invests her with a rich inner life and a canny awareness of the tricks played by historical memory. In the book that bears her name, Lavinia converses with the shade of Virgil himself, wresting the narrative out of his control to rewrite it herself.</span></p></div></div><p data-dcnode-id="2997"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'I, Claudius','slug':'i-claudius-robert-graves','synopsis':'','url':'https://www.amazon.com/dp/B07NMNS2NY?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51QNKRCFamL.jpg','small':'https://m.media-amazon.com/images/I/51QNKRCFamL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2958" data-url="https://www.amazon.com/dp/B07NMNS2NY?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2994"><source class="entered" data-dcnode-id="2996" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51QNKRCFamL.jpg" height="264" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/51QNKRCFamL.jpg" width="198"><img alt="I, Claudius" class="entered loaded" data-dcnode-id="2995" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/51QNKRCFamL._SL160_.jpg" draggable="false" height="160" srcset="https://m.media-amazon.com/images/I/51QNKRCFamL._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="2988"><h3 data-dcnode-id="2989"><span data-dcnode-id="2993" instrument_node="">3. </span><em data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">I, Claudius</span></em><span data-dcnode-id="2990" instrument_node=""> by Robert Graves</span></h3></div><span data-dcnode-id="2987" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2975"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B07NMNS2NY%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2986" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2976"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2977" data-slug="i-claudius-robert-graves" data-url="https://www.amazon.com/dp/B07NMNS2NY?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">Add to library</span></span><span data-dcnode-id="2982" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2978"><svg data-dcnode-id="2979" viewBox="0 0 16 16"><g data-dcnode-id="2980" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2981" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2974" instrument_node=""> </span><div class="blurb" data-dcnode-id="2959"><p data-dcnode-id="2963"><span data-dcnode-id="2973" instrument_node="">When you hear about Roman emperors, you typically think of Augustus or Nero — few actually remember Claudius. But if you </span><em data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">are</span></em><span data-dcnode-id="2970" instrument_node=""> well-versed in </span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-books-on-roman-history" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2969" instrument_node="">Roman history</span></a><span data-dcnode-id="2967" instrument_node="">, you probably remember Claudius as a physically weak, stuttering historian, an unlikely candidate for the position of Emperor. Yet the novel </span><em data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">I, Claudius</span></em><span data-dcnode-id="2964" instrument_node=""> makes the case for his subdued existence being the driving force behind his ascension.</span></p><span data-dcnode-id="2962" instrument_node=""> </span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">A fictionalized autobiography of Claudius, this pioneering piece of historical fiction offers his own documentation of his family and the political intrigue that happens within it. Through detailed observations recited in an incredibly orderly fashion, Claudius, the disdainful scholar, transports you into his mind and to the center of elite life in ancient Rome.</span></p></div></div><p data-dcnode-id="2957"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Book of Longings: A Novel','slug':'the-book-of-longings-a-novel-sue-monk-kidd-a36e3db8-762c-4367-9e62-80e0e6042de6','synopsis':'','url':'https://www.amazon.com/dp/052542976X?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51JZHMzi7xL.jpg','small':'https://m.media-amazon.com/images/I/51JZHMzi7xL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2924" data-url="https://www.amazon.com/Book-Longings-Sue-Monk-Kidd/dp/052542976X/ref=sr_1_2?dchild=1&amp;keywords=the+book+of+longings&amp;qid=1594827997&amp;s=books&amp;sr=1-2" draggable="false"><picture data-dcnode-id="2954"><source class="entered" data-dcnode-id="2956" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51JZHMzi7xL.jpg" height="300" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/51JZHMzi7xL.jpg" width="198"><img alt="The Book of Longings: A Novel" class="entered loaded" data-dcnode-id="2955" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/51JZHMzi7xL._SL160_.jpg" draggable="false" height="182" srcset="https://m.media-amazon.com/images/I/51JZHMzi7xL._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="2948"><h3 data-dcnode-id="2949"><span data-dcnode-id="2953" instrument_node="">4. </span><em data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">The Book of Longings</span></em><span data-dcnode-id="2950" instrument_node=""> by Sue Monk Kidd</span></h3></div><span data-dcnode-id="2947" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2935"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/052542976X%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2946" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2936"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2937" data-slug="the-book-of-longings-a-novel-sue-monk-kidd-a36e3db8-762c-4367-9e62-80e0e6042de6" data-url="https://www.amazon.com/dp/052542976X?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Add to library</span></span><span data-dcnode-id="2942" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2938"><svg data-dcnode-id="2939" viewBox="0 0 16 16"><g data-dcnode-id="2940" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2941" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2934" instrument_node=""> </span><div class="blurb" data-dcnode-id="2925"><p data-dcnode-id="2929"><span data-dcnode-id="2933" instrument_node="">At once painstakingly researched and painfully human, </span><em data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">The Book of Longings</span></em><span data-dcnode-id="2930" instrument_node=""> tackles a provocative subject with a sensitive, lyrical touch: the hypothetical marriage of Jesus Christ. But you don’t have to be a regular Gospel reader to appreciate this touching, feminist-inflected story.</span></p><span data-dcnode-id="2928" instrument_node=""> </span><p data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Born to a well-heeled family in first-century Galilee, Ana is brilliant — and bored. She’s expected to be silent and yielding, but she spends her hours writing in secret, longing for something to do with all her unappreciated talent. That’s when she meets Jesus, an eighteen-year-old with big ideas. The young rabbi with the revolutionary spirit shakes up Ana’s staid world for good — and steals her heart in the process.</span></p></div></div><p data-dcnode-id="2923"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Dovekeepers: A Novel','slug':'the-dovekeepers-a-n ce-hoffman" data-url="https://www.amazon.com/dp/1451617488?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Add to library</span></span><span data-dcnode-id="2908" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2904"><svg data-dcnode-id="2905" viewBox="0 0 16 16"><g data-dcnode-id="2906" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2907" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2900" instrument_node=""> </span><div class="blurb" data-dcnode-id="2891"><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">In 73 CE, a Roman legion laid siege to the mountain fortress of Masada, where a group of Jewish rebels had taken shelter. Completely entrapped, with the Roman battering ram closing in, the rebels chose to die instead of submitting. To avoid breaking the religious taboo against suicide, they drew lots and killed one another. Still, two women and five children survived the tragedy by hiding inside a cistern.</span></p><span data-dcnode-id="2897" instrument_node=""> </span><p data-dcnode-id="2892"><span data-dcnode-id="2896" instrument_node="">The siege of Masada, recorded by the Jewish historian Josephus, forms the backdrop for </span><em data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">The Dovekeepers</span></em><span data-dcnode-id="2893" instrument_node="">, which fills in the gaps left by Josephus’ account. Alice Hoffman breathes life into the women of Masada, who support the mountainside community by raising doves. </span></p></div></div><p data-dcnode-id="2889"></p><h2 data-dcnode-id="2886"><strong data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Medieval History</span></strong></h2><p data-dcnode-id="2885"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Winter King: A Novel of Arthur (The Warlord Chronicles Book 1)','slug':'the-winter-king-a-novel-of-arthur-the-warlord-chronicles-book-1-bernard-cornwell','synopsis':'','url':'https://www.amazon.com/dp/B006WOVK52?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51VVn5e7fDL.jpg','small':'https://m.media-amazon.com/images/I/51VVn5e7fDL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2849" data-url="https://www.amazon.com/Winter-King-Arthur-Warlord-Chronicles-ebook/dp/B006WOVK52/ref=tmm_kin_swatch_0?_encoding=UTF8&amp;qid=&amp;sr=" draggable="false"><picture data-dcnode-id="2882"><source class="entered" data-dcnode-id="2884" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51VVn5e7fDL.jpg" height="297" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/51VVn5e7fDL.jpg" width="198"><img alt="The Winter King: A Novel of Arthur (The Warlord Chronicles Book 1)" class="entered loaded" data-dcnode-id="2883" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/51VVn5e7fDL._SL160_.jpg" draggable="false" height="180" srcset="https://m.media-amazon.com/images/I/51VVn5e7fDL._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="2876"><h3 data-dcnode-id="2877"><span data-dcnode-id="2881" instrument_node="">6. </span><em data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">The Winter King</span></em><span data-dcnode-id="2878" instrument_node=""> by Bernard Cornwell</span></h3></div><span data-dcnode-id="2875" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2863"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B006WOVK52%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2874" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2864"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2865" data-slug="the-winter-king-a-novel-of-arthur-the-warlord-chronicles-book-1-bernard-cornwell" data-url="https://www.amazon.com/dp/B006WOVK52?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Add to library</span></span><span data-dcnode-id="2870" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2866"><svg data-dcnode-id="2867" viewBox="0 0 16 16"><g data-dcnode-id="2868" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2869" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2862" instrument_node=""> </span><div class="blurb" data-dcnode-id="2850"><p data-dcnode-id="2857"><span data-dcnode-id="2861" instrument_node="">Historical fiction writer Bernard Cornwell has built a career off vivid, richly detailed reimaginings of the English past. In </span><em data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">The Winter King</span></em><span data-dcnode-id="2858" instrument_node=""> and its sequels, Cornwell centers his narrative on the most iconic Brit of all: King Arthur. But his grounded take on the legend removes the magic — without making Arthur’s story any less interesting. </span></p><span data-dcnode-id="2856" instrument_node=""> </span><p data-dcnode-id="2851"><span data-dcnode-id="2855" instrument_node="">Cornwell’s Arthur isn’t a </span><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-fantasy-books" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2854" instrument_node="">fantasy protagonist</span></a><span data-dcnode-id="2852" instrument_node="">, a Chosen One shielded by powerful enchantments. He’s just a warlord, forced to protect a kingdom gone to chaos. The illegitimate son of High King Uther Pendragon, Arthur is a prince without a title. But now his father is dead, and the new ruler, the infant Mordred, is too young to hold the kingdom together. With the Saxons poised to attack, can Arthur save his homeland from ruin?</span></p></div></div><p data-dcnode-id="2848"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Pillars of the Earth: A Novel (Kingsbridge Book 1)','slug':'the-pillars-of-the-earth-a-novel-kingsbridge-book-1-ken-follett','synopsis':'','url':'https://www.amazon.com/dp/B003TO5GXU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51qloCoA06L.jpg','small':'https://m.media-amazon.com/images/I/51qloCoA06L._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2813" data-url="https://www.amazon.com/dp/B003TO5GXU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2845"><source class="entered" data-dcnode-id="2847" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51qloCoA06L.jpg" height="297" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/51qloCoA06L.jpg" width="198"><img alt="The Pillars of the Earth: A Novel (Kingsbridge Book 1)" class="entered loaded" data-dcnode-id="2846" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/51qloCoA06L._SL160_.jpg" draggable="false" height="180" srcset="https://m.media-amazon.com/images/I/51qloCoA06L._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="2839"><h3 data-dcnode-id="2840"><span data-dcnode-id="2844" instrument_node="">7. </span><em data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">The Pillars of the Eart</span></em><span data-dcnode-id="2841" instrument_node="">h by Ken Follett</span></h3></div><span data-dcnode-id="2838" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2826"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B003TO5GXU%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2837" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2827"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2828" data-slug="the-pillars-of-the-earth-a-novel-kingsbridge-book-1-ken-follett" data-url="https://www.amazon.com/dp/B003TO5GXU?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Add to library</span></span><span data-dcnode-id="2833" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2829"><svg data-dcnode-id="2830" viewBox="0 0 16 16"><g data-dcnode-id="2831" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2832" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2825" instrument_node=""> </span><div class="blurb" data-dcnode-id="2814"><p data-dcnode-id="2820"><span data-dcnode-id="2824" instrument_node="">When Ken Follett took a sharp turn from </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-suspense-books" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2823" instrument_node="">suspenseful spy novels</span></a><span data-dcnode-id="2821" instrument_node=""> to historical fiction, readers didn’t know what to expect. Little did they know that this twelfth-century adventure featuring a down-to-earth mason, an outlawed witch, and a warm-hearted priest would become one of Follett’s bestselling novels.&nbsp;</span></p><span data-dcnode-id="2819" instrument_node=""> </span><p data-dcnode-id="2815"><em data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">The Pillars of the Earth</span></em><span data-dcnode-id="2816" instrument_node=""> opens with said mason — Tom Builder — searching for a job to sustain his family only to fall in love with the outlawed witch. Eventually, Tom is employed by the priest to build a cathedral, but all doesn’t go smoothly, thanks to a villainous earl and archdeacon who fear they’ll lose their clout if said cathedral gets built. From impressive word-pictures of majestic architecture to dramatic sieges, this novel gives you everything you need to feel like you’ve travelled to medieval England.</span></p></div></div><p data-dcnode-id="2812"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Kristin Lavransdatter I: The Wreath (Penguin Classics)','slug':'kristin-lavransdatter-i-the-wreath-penguin-classics-sigrid-undset','synopsis':'','url':'https://www.amazon.com/dp/0141180412?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51wfFE1rIKL.jpg','small':'https://m.media-amazon.com/images/I/51wfFE1rIKL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2776" data-url="https://www.amazon.com/Kristin-Lavransdatter-Wreath-Penguin-Classics/dp/0141180412/ref=sr_1_2?dchild=1&amp;keywords=the+wreath&amp;qid=1594825567&amp;s=books&amp;sr=1-2" draggable="false"><picture data-dcnode-id="2809"><source class="entered" data-dcnode-id="2811" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51wfFE1rIKL.jpg" height="303" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/51wfFE1rIKL.jpg" width="198"><img alt="Kristin Lavransdatter I: The Wreath (Penguin Classics)" class="entered loaded" data-dcnode-id="2810" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/51wfFE1rIKL._SL160_.jpg" draggable="false" height="184" srcset="https://m.media-amazon.com/images/I/51wfFE1rIKL._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="2803"><h3 data-dcnode-id="2804"><span data-dcnode-id="2808" instrument_node="">8. </span><em data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">The Wreath</span></em><span data-dcnode-id="2805" instrument_node=""> by Sigrid Undset</span></h3></div><span data-dcnode-id="2802" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2790"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0141180412%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2801" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2791"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2792" data-slug="kristin-lavransdatter-i-the-wreath-penguin-classics-sigrid-undset" data-url="https://www.amazon.com/dp/0141180412?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Add to library</span></span><span data-dcnode-id="2797" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2793"><svg data-dcnode-id="2794" viewBox="0 0 16 16"><g data-dcnode-id="2795" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2796" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2789" instrument_node=""> </span><div class="blurb" data-dcnode-id="2777"><p data-dcnode-id="2781"><span data-dcnode-id="2788" instrument_node="">As far as Nobel laureates in literature go, Sigrid Undset has slightly less name recognition than Bob Dylan. After all, no one can reflexively sing out lines from </span><em data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Kristin Lavransdatter</span></em><span data-dcnode-id="2785" instrument_node="">, the historical fiction trilogy that netted her the book world’s biggest lifetime achievement award. Still, this masterful exploration of life in 14th-century Norway deserves a place on your bookshelf. Though the first installment, </span><em data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">The Wreath</span></em><span data-dcnode-id="2782" instrument_node="">, was published in 1920, it makes for a spellbinding read even today. Sexy, yet exhaustively researched, it’s sure to change your view of the Middle Ages.</span></p><span data-dcnode-id="2780" instrument_node=""> </span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">The child of a wealthy landowner, Kristin Lavransdatter (the surname literally translates to “Lavran’s daughter”) grows up happily enough, taking solace in the Catholic faith she learned from her mother. But when she survives a rape attempt, she’s sent of to faraway Oslo, to live in a Benedictine convent. There, Kristin falls in love with a man who was excommunicated for raising children with someone else’s wife. As her exposure to the wider world challenges her faith, how will her conservative family respond?</span></p></div></div><p data-dcnode-id="2775"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Name of the Rose','slug':'the-name-of-the-rose-umberto-eco-113e6150-df20-4d25-a14e-d524f085b91e','synopsis':'','url':'https://www.amazon.com/dp/0544176561?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51tLTqCGjzL.jpg','small':'https://m.media-amazon.com/images/I/51tLTqCGjzL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2739" data-url="https://www.amazon.com/dp/0544176561?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2772"><source class="entered" data-dcnode-id="2774" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51tLTqCGjzL.jpg" height="301" media="(min-width: 480px)" srcset="https://m.media-amazon.com/images/I/51tLTqCGjzL.jpg" width="198"><img alt="The Name of the Rose" class="entered loaded" data-dcnode-id="2773" data-ll-status="loaded" data-srcset="https://m.media-amazon.com/images/I/51tLTqCGjzL._SL160_.jpg" draggable="false" height="182" srcset="https://m.media-amazon.com/images/I/51tLTqCGjzL._SL160_.jpg" width="120"></picture><div class="title" data-dcnode-id="2766"><h3 data-dcnode-id="2767"><span data-dcnode-id="2771" instrument_node="">9. </span><em data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">The Name of the Ros</span></em><span data-dcnode-id="2768" instrument_node="">e by Umberto Eco</span></h3></div><span data-dcnode-id="2765" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2753"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0544176561%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2764" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2754"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2755" data-slug="the-name-of-the-rose-umberto-eco-113e6150-df20-4d25-a14e-d524f085b91e" data-url="https://www.amazon.com/dp/0544176561?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Add to library</span></span><span data-dcnode-id="2760" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2756"><svg data-dcnode-id="2757" viewBox="0 0 16 16"><g data-dcnode-id="2758" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2759" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2752" instrument_node=""> </span><div class="blurb" data-dcnode-id="2740"><p data-dcnode-id="2747"><span data-dcnode-id="2751" instrument_node="">Imagine a Dan Brown novel — an action-packed race to solve a serial murder mystery that can only be unraveled by decoding ancient manuscripts and artistic clues. </span><em data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">The Name of the Rose</span></em><span data-dcnode-id="2748" instrument_node=""> is all that, but it’s set in a prestigious monastery in 14th-century Italy. A young monk by the name of William arrives at this monastery right as the killings begin, and he is asked to take on the task of uncovering the truth behind them. As William dives deeper into the clues embedded in the texts and the architecture of the grounds, the other monks become embroiled in a battle of accusations.&nbsp;</span></p><span data-dcnode-id="2746" instrument_node=""> </span><p data-dcnode-id="2741"><span data-dcnode-id="2745" instrument_node="">Drawing from his well of knowledge on semiotics and ancient literature, Umberto Eco crafted a complex and enticing novel that’s difficult to put down. Though it’s his debut novel, </span><em data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">The Name of the Rose</span></em><span data-dcnode-id="2742" instrument_node=""> is one of the best-selling books ever published.</span></p></div></div><p data-dcnode-id="2738"></p><p data-dcnode-id="2737"></p><p data-dcnode-id="2736"></p><h2 data-dcnode-id="2733"><strong data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Renaissance and Early Modern Europe</span></strong></h2><p data-dcnode-id="2732"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Wolf Hall','slug':'wolf-hall-hilary-mantel','synopsis':'','url':'https://www.amazon.com/dp/0312429983?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51sVglTpzKL.jpg','small':'https://m.media-amazon.com/images/I/51sVglTpzKL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2693" data-url="https://www.amazon.com/Wolf-Hall-Hilary-Mantel/dp/0312429983" draggable="false"><picture data-dcnode-id="2729"><source class="entered exited" data-dcnode-id="2731" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/51sVglTpzKL.jpg" height="297" media="(min-width: 480px)" width="198"><img alt="Wolf Hall" class="entered exited" data-dcnode-id="2730" data-srcset="https://m.media-amazon.com/images/I/51sVglTpzKL._SL160_.jpg" draggable="false" height="180" width="120"></picture><div class="title" data-dcnode-id="2723"><h3 data-dcnode-id="2724"><span data-dcnode-id="2728" instrument_node="">10. </span><em data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Wolf Hall</span></em><span data-dcnode-id="2725" instrument_node=""> by Hilary Mantel</span></h3></div><span data-dcnode-id="2722" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2710"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0312429983%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2721" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2711"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2712" data-slug="wolf-hall-hilary-mantel" data-url="https://www.amazon.com/dp/0312429983?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Add to library</span></span><span data-dcnode-id="2717" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2713"><svg data-dcnode-id="2714" viewBox="0 0 16 16"><g data-dcnode-id="2715" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2716" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2709" instrument_node=""> </span><div class="blurb" data-dcnode-id="2694"><p data-dcnode-id="2704"><span data-dcnode-id="2708" instrument_node="">Perhaps it’s because we grow up with stories of castles and kings, but historical fiction tends to be most exciting when it features Tudor England. Hilary Mantel’s </span><em data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Wolf Hall</span></em><span data-dcnode-id="2705" instrument_node=""> will take us through the most scandalous years of the dynasty —&nbsp; the reign of Henry VIII, the English king who broke away from the Catholic Church in order to marry a new wife (the first among many). Thomas Cromwell was the man who made this unorthodox move possible, and who rose to power because of it. This story follows his ascension to the top.&nbsp;</span></p><span data-dcnode-id="2703" instrument_node=""> </span><p data-dcnode-id="2695"><span data-dcnode-id="2702" instrument_node="">Well-researched and&nbsp; ingeniously written in modern English and the present tense, </span><em data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Wolf Hall</span></em><span data-dcnode-id="2699" instrument_node=""> pulls readers into the elite world of 1500s England almost instantly. But be prepared before diving into this one — you’ll probably want to jump to the next volume in Mantel’s </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/how-to-write-a-trilogy/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2698" instrument_node="">trilogy</span></a><span data-dcnode-id="2696" instrument_node=""> the moment you finish this first installment.&nbsp;</span></p></div></div><p data-dcnode-id="2692"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Other Boleyn Girl (The Plantagenet and Tudor Novels Book 1)','slug':'the-other-boleyn-girl-the-plantagenet-and-tudor-novels-book-1-philippa-gregory','synopsis':'','url':'https://www.amazon.com/dp/B000FC2MDG?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/61qwnuOC0KL.jpg','small':'https://m.media-amazon.com/images/I/61qwnuOC0KL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2647" data-url="https://www.amazon.com/dp/B000FC2MDG?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2689"><source class="entered exited" data-dcnode-id="2691" data-ll-status="entered" data-srcset="https://m.media-amazon.com/images/I/61qwnuOC0KL.jpg" height="301" media="(min-width: 480px)" width="198"><img alt="The Other Boleyn Girl (The Plantagenet and Tudor Novels Book 1)" class="entered exited" data-dcnode-id="2690" data-srcset="https://m.media-amazon.com/images/I/61qwnuOC0KL._SL160_.jpg" draggable="false" height="182" width="120"></picture><div class="title" data-dcnode-id="2683"><h3 data-dcnode-id="2684"><span data-dcnode-id="2688" instrument_node="">11. </span><em data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">The Other Boleyn Girl</span></em><span data-dcnode-id="2685" instrument_node=""> by Philippa Gregory</span></h3></div><span data-dcnode-id="2682" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2670"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000FC2MDG%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2681" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2671"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2672" data-slug="the-other-boleyn-girl-the-plantagenet-and-tudor-novels-book-1-philippa-gregory" data-url="https://www.amazon.com/dp/B000FC2MDG?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Add to library</span></span><span data-dcnode-id="2677" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2673"><svg data-dcnode-id="2674" viewBox="0 0 16 16"><g data-dcnode-id="2675" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2676" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2669" instrument_node=""> </span><div class="blurb" data-dcnode-id="2648"><p data-dcnode-id="2661"><span data-dcnode-id="2668" instrument_node="">In </span><em data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Wolf Hall</span></em><span data-dcnode-id="2665" instrument_node="">, you get to see the scandalous marital life of King Henry VIII through the eyes of his trusted lawyer; in </span><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">The Other Boleyn Girl</span></em><span data-dcnode-id="2662" instrument_node="">, you’ll get to watch how the story unravels from the perspective of Anne Boleyn’s sister, Mary. After he gets his marriage to Catherine of Aragon annulled, Henry VIII marries Anne — although rumor has it that he previously had his eyes on Mary.</span></p><span data-dcnode-id="2660" instrument_node=""> </span><p data-dcnode-id="2649"><span data-dcnode-id="2659" instrument_node="">While the facts are unclear, Philippa Gregory’s dramatic novel picks up on traces of what might have happened and presents a breathtaking picture of the intrigue and betrayal at works behind these supposed affairs. If you enjoy </span><em data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">A Song of Ice and Fire</span></em><span data-dcnode-id="2656" instrument_node=""> and are (still) waiting for the next book, </span><em data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">The Other Boleyn Girl</span></em><span data-dcnode-id="2653" instrument_node=""> might be a good stand-in. In any case, you’ll get to immerse yourself in the </span><em data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">almost</span></em><span data-dcnode-id="2650" instrument_node="">-magical world of castles and knights in Tudor England.</span></p></div></div><p data-dcnode-id="2646"></p><div 626" data-slug="as-meat-loves-salt-maria-mccann" data-url="https://www.amazon.com/dp/B004Z5PNHG?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Add to library</span></span><span data-dcnode-id="2631" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2627"><svg data-dcnode-id="2628" viewBox="0 0 16 16"><g data-dcnode-id="2629" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2630" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2623" instrument_node=""> </span><div class="blurb" data-dcnode-id="2611"><p data-dcnode-id="2618"><span data-dcnode-id="2622" instrument_node="">The English Revolution has never been quite so sexy. In </span><em data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">As Meat Loves Salt</span></em><span data-dcnode-id="2619" instrument_node="">, the hot-tempered Jacob Cullen joins his friend Christopher Ferris in the army, fleeing a troubled marriage — and a potential murder charge. But there’s something more between them than comradely affection, and 17th-century England isn’t the safest place for two men in love.</span></p><span data-dcnode-id="2617" instrument_node=""> </span><p data-dcnode-id="2612"><span data-dcnode-id="2616" instrument_node="">As rich in historical detail as it is steeped in sensuality, this moody historical romance doesn’t shy away from depicting the horrors of war. Be forewarned: Jacob, with his violent rages and checkered past, isn’t the cuddliest of protagonists. His brooding, anti-heroic bent lands this book firmly in </span><a data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/grimdark-books" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2615" instrument_node="">grimdark</span></a><span data-dcnode-id="2613" instrument_node=""> territory.</span></p></div></div><p data-dcnode-id="2609"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Girl with a Pearl Earring: A Novel','slug':'girl-with-a-pearl-earring-a-novel-tracy-chevalier','synopsis':'','url':'https://www.amazon.com/dp/0452282152?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/513hNCva+LL.jpg','small':'https://m.media-amazon.com/images/I/513hNCva+LL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2576" data-url="https://www.amazon.com/Girl-Pearl-Earring-Tracy-Chevalier/dp/0452282152/ref=sr_1_2?dchild=1&amp;keywords=girl+with+a+pearl+earring&amp;qid=1594317233&amp;sr=8-2" draggable="false"><picture data-dcnode-id="2606"><source data-dcnode-id="2608" data-srcset="https://m.media-amazon.com/images/I/513hNCva+LL.jpg" height="304" media="(min-width: 480px)" width="198"><img alt="Girl with a Pearl Earring: A Novel" data-dcnode-id="2607" data-srcset="https://m.media-amazon.com/images/I/513hNCva+LL._SL160_.jpg" draggable="false" height="184" width="120"></picture><div class="title" data-dcnode-id="2600"><h3 data-dcnode-id="2601"><span data-dcnode-id="2605" instrument_node="">13. </span><em data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Girl with a Pearl Earring</span></em><span data-dcnode-id="2602" instrument_node=""> by Tracy Chevalier</span></h3></div><span data-dcnode-id="2599" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2587"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0452282152%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2598" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2588"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2589" data-slug="girl-with-a-pearl-earring-a-novel-tracy-chevalier" data-url="https://www.amazon.com/dp/0452282152?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Add to library</span></span><span data-dcnode-id="2594" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2590"><svg data-dcnode-id="2591" viewBox="0 0 16 16"><g data-dcnode-id="2592" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2593" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2586" instrument_node=""> </span><div class="blurb" data-dcnode-id="2577"><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Even if you’re not an art history buff, you’ve probably seen Dutch master Johannes Vermeer’s most famous painting. Next to the Mona Lisa, the so-called Girl with a Pearl Earring just might be the Western world’s most famous two-dimensional lady. She’s been enchanting viewers with her wistful gaze (and tasteful accessorizing) since the 17th century, but no one knows much about her — not even her name.</span></p><span data-dcnode-id="2583" instrument_node=""> </span><p data-dcnode-id="2578"><span data-dcnode-id="2582" instrument_node="">In </span><em data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Girl with a Pearl Earring</span></em><span data-dcnode-id="2579" instrument_node="">, Tracy Chevalier fills in the gaps, giving Vermeer’s anonymous model a rich inner life. Sixteen-year-old Griet joins the Vermeer household as a maid. Soon enough, the great painter himself takes notice of her sharp eye and artistic temperament. But, as Griet comes to find, life as a muse comes with its share of unexpected dangers.</span></p></div></div><p data-dcnode-id="2575"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Abundance, A Novel of Marie Antoinette (P.S.)','slug':'abundance-a-novel-of-marie-antoinette-p-s-sena-jeter-naslund','synopsis':'','url':'https://www.amazon.com/dp/0060825405?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51NKN5+-JRL.jpg','small':'https://m.media-amazon.com/images/I/51NKN5+-JRL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2536" data-url="https://www.amazon.com/Abundance-Novel-Marie-Antoinette-P-S/dp/0060825405/ref=sr_1_4?dchild=1&amp;keywords=abundance&amp;qid=1594749533&amp;s=books&amp;sr=1-4" draggable="false"><picture data-dcnode-id="2572"><source data-dcnode-id="2574" data-srcset="https://m.media-amazon.com/images/I/51NKN5+-JRL.jpg" height="297" media="(min-width: 480px)" width="198"><img alt="Abundance, A Novel of Marie Antoinette (P.S.)" data-dcnode-id="2573" data-srcset="https://m.media-amazon.com/images/I/51NKN5+-JRL._SL160_.jpg" draggable="false" height="180" width="120"></picture><div class="title" data-dcnode-id="2566"><h3 data-dcnode-id="2567"><span data-dcnode-id="2571" instrument_node="">14. </span><em data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Abundance</span></em><span data-dcnode-id="2568" instrument_node=""> by Sena Jeter Naslund</span></h3></div><span data-dcnode-id="2565" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2553"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0060825405%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2564" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2554"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2555" data-slug="abundance-a-novel-of-marie-antoinette-p-s-sena-jeter-naslund" data-url="https://www.amazon.com/dp/0060825405?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Add to library</span></span><span data-dcnode-id="2560" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2556"><svg data-dcnode-id="2557" viewBox="0 0 16 16"><g data-dcnode-id="2558" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2559" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2552" instrument_node=""> </span><div class="blurb" data-dcnode-id="2537"><p data-dcnode-id="2547"><span data-dcnode-id="2551" instrument_node="">First of all, let’s get one thing straight: she probably didn’t tell them to eat cake. Since the revolutionaries led her to the guillotine in 1793, Marie Antoinette has suffered something of a bad rap. The silly queen, with her wigs skimming the chandeliers and her panniers stretching from wall to wall, was held to represent the worst of the </span><em data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">ancien régime</span></em><span data-dcnode-id="2548" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2546" instrument_node=""> </span><p data-dcnode-id="2538"><span data-dcnode-id="2545" instrument_node="">In </span><em data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Abundance</span></em><span data-dcnode-id="2542" instrument_node="">, however, Sena Jeter Naslund shows us the woman underneath all that silk and powder. Only fourteen when she leaves Austria, Maria Antonia — as she was born — crosses the threshold into her new homeland naked and alone. Forced to shed her Austrian clothing </span><em data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">and</span></em><span data-dcnode-id="2539" instrument_node=""> her Austrian name to be remade as a princess of France, Marie must find her place in a cold and isolating court. </span></p></div></div><p data-dcnode-id="2535"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'A Tale of Two Cities','slug':'a-tale-of-two-cities-charles-dickens-b37e31de-706d-4a38-8e55-ecba35b1eba5','synopsis':'','url':'https://www.amazon.com/dp/B07F87KQ9F?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51OfxSN93oL.jpg','small':'https://m.media-amazon.com/images/I/51OfxSN93oL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2502" data-url="https://www.amazon.com/dp/B07F87KQ9F?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2532"><source data-dcnode-id="2534" data-srcset="https://m.media-amazon.com/images/I/51OfxSN93oL.jpg" height="307" media="(min-width: 480px)" width="198"><img alt="A Tale of Two Cities" data-dcnode-id="2533" data-srcset="https://m.media-amazon.com/images/I/51OfxSN93oL._SL160_.jpg" draggable="false" height="186" width="120"></picture><div class="title" data-dcnode-id="2526"><h3 data-dcnode-id="2527"><span data-dcnode-id="2531" instrument_node="">15. </span><em data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">A Tale of Two Cities</span></em><span data-dcnode-id="2528" instrument_node=""> by Charles Dickens</span></h3></div><span data-dcnode-id="2525" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2513"><a class="button button-sm button-yellow buy-button space-right-2em" data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B07F87KQ9F%3Ftag%3Dreedwebs-20%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><span data-dcnode-id="2524" instrument_node="">Buy on Amazon</span></a><div class="add-to-library-wrapper" data-dcnode-id="2514"><button class="button button-sm button-white-bordered add-to-library-button" data-dcnode-id="2515" data-slug="a-tale-of-two-cities-charles-dickens-b37e31de-706d-4a38-8e55-ecba35b1eba5" data-url="https://www.amazon.com/dp/B07F87KQ9F?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1"><span class="valign-middle space-right-1em" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Add to library</span></span><span data-dcnode-id="2520" instrument_node=""> </span><span class="dui-icon icon-sm" data-dcnode-id="2516"><svg data-dcnode-id="2517" viewBox="0 0 16 16"><g data-dcnode-id="2518" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M9.33333333,9.33333333 L9.33333333,14.680572 C9.33333333,15.4092719 8.74260528,16 8.01390529,16 L7.98609471,16 C7.25739472,16 6.66666667,15.4092719 6.66666667,14.680572 L6.66666667,9.33333333 L1.31942805,9.33333333 C0.590728057,9.33333333 0,8.74260528 0,8.01390529 L0,7.98609471 C0,7.25739472 0.590728057,6.66666667 1.31942805,6.66666667 L6.66666667,6.66666667 L6.66666667,1.31942805 C6.66666667,0.590728057 7.25739472,0 7.98609471,0 L8.01390529,0 C8.74260528,0 9.33333333,0.590728057 9.33333333,1.31942805 L9.33333333,6.66666667 L14.680572,6.66666667 C15.4092719,6.66666667 16,7.25739472 16,7.98609471 L16,8.01390529 C16,8.74260528 15.4092719,9.33333333 14.680572,9.33333333 L9.33333333,9.33333333 Z" data-dcnode-id="2519" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2512" instrument_node=""> </span><div class="blurb" data-dcnode-id="2503"><p data-dcnode-id="2507"><span data-dcnode-id="2511" instrument_node="">First published chapter by chapter in Dickens’s literary periodical, </span><em data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">A Tale of Two Cities</span></em><span data-dcnode-id="2508" instrument_node=""> is set during the French Revolution. It follows the various people in Lucie Manette’s life: her previously imprisoned revolutionary father, her exiled aristocratic suitor, Charles Darnay, and his romantic rival , Sydney Carton — a smart but failing English lawyer.</span></p><span data-dcnode-id="2506" instrument_node=""> </span><p data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">The mid to late nineteenth century was a chaotic time for Europe, as modernization heightened&nbsp; the ugly disparity between the rich and the poor across the nations. Darnay’s disavowal of his family and Carton’s determination to address injustices emerge as heroic acts that only highlight the horrific inequality of the time.</span></p></div></div><p data-dcnode-id="2501"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Outlander: A Novel (Outlander, Book 1)','slug':'outlander-a-novel-outlander-book-1-diana-gabaldon','synopsis':'','url':'https://www.amazon.com/dp/B000FC2L1O?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51PrW27sXWL.jpg','small':'https://m.media-amazon.com/images/I/51PrW27sXWL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2466" data-url="https://www.amazon.com/dp/B000FC2L1O?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2498"><source data-dcnode-id="2500" data-srcset="https://m.media-amazon.com/images/I/51PrW27sXWL.jpg" height="299" media="(min-width: 480px)" width="198"><img alt="Outlander: A Novel (Outlander, Book 1)" data-dcnode-id="2499" data-srcset="https://m.media-amazon.com/images/I/51PrW27sXWL._SL160_.jpg" draggable="false" height="181" width="120"></picture><div class="title" data-dcnode-id="2492"><h3 data-dcnode-id="2493"><span data-dcnode-id="2497" instrument_node="">16. </span><em data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Outlander</s 33 Z" data-dcnode-id="2485" fill="#FFFFFF" id="icon-fill"></path></g></svg></span></button></div></div><span data-dcnode-id="2478" instrument_node=""> </span><div class="blurb" data-dcnode-id="2467"><p data-dcnode-id="2473"><span data-dcnode-id="2477" instrument_node="">Interested in the nationalistic history of Scotland? You can live it all via </span><em data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Outlander</span></em><span data-dcnode-id="2474" instrument_node="">. Tag along with English nurse Claire Randall as she gets lost in time while exploring the wilderness of the Scottish Highlands on her second honeymoon. Starting out in 1946, she is transported back to 1743, right as the tension between Scotland and England is mounting. Finding a way home takes the backseat as she finds herself having to seek help from either a brutal and domineering English captain or a sceptical but good-natured Scottish clansman in order to survive. As she becomes embroiled in a conflict that she’s only ever heard about in her 20th-century life, Claire begins to find a place for herself in this unfamiliar setting.&nbsp;</span></p><span data-dcnode-id="2472" instrument_node=""> </span><p data-dcnode-id="2468"><em data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Outlander</span></em><span data-dcnode-id="2469" instrument_node=""> is the first instalment of Diana Gabaldon’s eight-book series of the same name, which is considered one of the most successful series ever written.</span></p></div></div><p data-dcnode-id="2465"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Perfume: The Story of a Murderer (Vintage International)','slug':'perfume-the-story-of-a-murderer-vintage-international-patrick-suskind','synopsis':'','url':'https://www.amazon.com/dp/B00JTCJE52?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/41XLsbuJldL.jpg','small':'https://m.media-amazon. lent catches the attention of a top perfumer, who takes him on as an apprentice. But as he masters the techniques for crafting perfume, Grenouille becomes haunted by the most alluring fragrance of all — the scent of a beautiful virgin, that can only be captured in death.</span></p></div></div><p data-dcnode-id="2431"></p><h2 data-dcnode-id="2428"><strong data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Global Early Modern</span></strong></h2><p data-dcnode-id="2427"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'Silence: A Novel (Picador Classics)','slug':'silence-a-novel-picador-classics-shusaku-endo','synopsis':'','url':'https://www.amazon.com/dp/1250082242?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51J-iv6PQUL.jpg','small':'https://m.media-amazon.com/images/I/51J-iv6PQUL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2394" data-url="https://www.amazon.com/Silence-Picador-Classics-Shusaku-Endo/dp/1250082242/ref=sr_1_2?dchild=1&amp;keywords=silence&amp;qid=1594754679&amp;rnid=2941120011&amp;s=books&amp;sr=1-2" draggable="false"><picture data-dcnode-id="2424"><source data-dcnode-id="2426" data-srcset="https://m.media-amazon.com/images/I/51J-iv6PQUL.jpg" height="297" media="(min-width: 480px)" width="198"><img alt="Silence: A Novel (Picador Classics)" data-dcnode-id="2425" data-srcset="https://m.media-amazon.com/images/I/51J-iv6PQUL._SL160_.jpg" draggable="false" height="180" width="120"></picture><div class="title" data-dcnode-id="2418"><h3 data-dcnode-id="2419"><span data-dcnode-id="2423" instrument_node="">18. </span><em data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Silence</span></em><span data-dcnode-id="2420" instrument_node=""> by Shusaku Endo</span></h3></div><span data-dcnode-id="2417" instrument_node=""> </span><div class="grid-flex grid-shrink grid-no-response buttons-wrapper" data-dcnode-id="2405"><a class="button ment_node="">In 1637, a group of masterless samurai took up arms against the Tokugawa shogunate, aided by the mostly Catholic peasantry who farmed tJapan’s Shimabara Peninsula. The shogun cracked down hard on the rebels, leaving more than 27,000 dead. In the aftermath, Japan’s Catholics went underground, worshipping their God in secret.</span></p><span data-dcnode-id="2401" instrument_node=""> </span><p data-dcnode-id="2396"><span data-dcnode-id="2400" instrument_node="">The submerged history of the Kakure Kirishitan, or “hidden Christians,” forms the backdrop to Shusaku Endo’s </span><em data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Silence</span></em><span data-dcnode-id="2397" instrument_node="">. The Portuguese Jesuit Sebastião Rodrigues arrives in Japan looking for a senior colleague who’s rumored to have turned his back on the church. He’s greeted by an atmosphere of dread: Tokugawa officials, determined to enforce a state ban on Christianity, roam the countryside looking for followers of the forbidden religion.</span></p></div></div><p data-dcnode-id="2393"></p><div class="book-blot" contenteditable="false" data-book-info="{'title':'The Twentieth Wife: A Novel','slug':'the-twentieth-wife-a-novel-indu-sundaresan','synopsis':'','url':'https://www.amazon.com/dp/B000FC0VXE?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1','covers':{'large':'https://m.media-amazon.com/images/I/51-8q9PM8DL.jpg','small':'https://m.media-amazon.com/images/I/51-8q9PM8DL._SL160_.jpg'},'provider':'amazon'}" data-dcnode-id="2363" data-url="https://www.amazon.com/dp/B000FC0VXE?tag=reedwebs-20&amp;linkCode=ogi&amp;th=1&amp;psc=1" draggable="false"><picture data-dcnode-id="2390"><source data-dcnode-id="2392" data-srcset="https://m.media-amazon.com/images/I/51-8q9PM8DL.jpg" height="307" media="(min-width: 480px)" width="198"><img alt="The Twentieth Wife: A Novel" data-dcnode-id="2391" data-srcset="https://m.media-amazon.com/images/I/51-8q9PM8DL._SL160_.jpg" draggabl
