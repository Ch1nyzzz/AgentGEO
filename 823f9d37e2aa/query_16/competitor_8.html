</span><span data-dcnode-id="1213" id="freeText7385273565412006413" style="display:none"><span data-dcnode-id="1214" instrument_node="">Very clearly written and humanizing portrayal of the pioneering and courageous philosopher. Enjoyed the vivid and nuanced description of the philosophical/religious/political climate of the time and where the boundaries were being pushed by Spinoza and those who came before notably Hobbes’ Leviathan. Goes into just enough detail I thought about among other things: the revolutionary implications of debunking the notion of miracles, Spinoza’s implicit substitution of Nature for God, the relative freedom present in the Dutch Republic compared to other societies of the mid-17th century but the fact that consequences of violating rules about blasphemy could still be extremely harsh with imprisonment and death a distinct possibility. He talks about and explains Spinoza’s differing approaches to the Old &amp; New Testament and the relatively less dismissive reading of the latter. I think the author was very even handed and convincing in his evidence that it was not that Spinoza as an excommunicated Jew was in any way “turning Christian”. Spinoza looked upon Jesus as the epitome of someone who practiced the moral biblical dictates to the highest level of perfection but not in any supernatural manner. Enjoyed the story of the publisher and the various methods used to subvert the censors. Well told and interesting.</span></span><span data-dcnode-id="1212" instrument_node="">

</span><span data-dcnode-id="1141" id="freeTextContainer16028084872879356102"><span data-dcnode-id="1142" instrument_node="">This is a biography of a book: Tractatus Theologico-Politicus. It briefly covers some of the important aspects of Spinoza's life and the intellectual and political environment surrounding Spinoza. The title is taking from a note that referred to the book as "forged in hell by the apostate Jew working together with the devil." Because of some court cases, and the sale of his library at the end of his life, and his correspondence we can know a lot about Spinoza and Nadler has devoted a large part </span></span><span data-dcnode-id="1140" instrument_node="">
</span><span data-dcnode-id="1128" id="freeText16028084872879356102" style="display:none"><span data-dcnode-id="1139" instrument_node="">This is a biography of a book: Tractatus Theologico-Politicus. It briefly covers some of the important aspects of Spinoza's life and the intellectual and political environment surrounding Spinoza. The title is taking from a note that referred to the book as "forged in hell by the apostate Jew working together with the devil." Because of some court cases, and the sale of his library at the end of his life, and his correspondence we can know a lot about Spinoza and Nadler has devoted a large part of his career to Spinoza. </span><br data-dcnode-id="1138"><br data-dcnode-id="1137"><span data-dcnode-id="1136" instrument_node="">What is interesting is the book, how it was circulated, who read it, and why it was written. The notes on the publisher and the bibliographical history are fascinating, as everyone knew it was controversial and many attempts were made to disguise the book so that it could be circulated and sold. </span><br data-dcnode-id="1135"><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">Spinoza's claims, that the bible was written by human beings, that the way to interpret the Bible is to read and understand the text, etc. contradict many accepted and established views. </span><br data-dcnode-id="1132"><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node=""> I was unaware of how much Spinoza was influenced by Maimonides, Ibn Ezra, Hobbes, and perhaps even Machiavelli. It is clear that this book influenced many philosophers. It was definitely read by Leibniz and Hobbes. Spinoza arguably still influences more contemporary philosophy; notable Leo Straus and some schools of European left-wing/communist philosophers. </span><br data-dcnode-id="1129"></span><span data-dcnode-id="1127" instrument_node="">

</span><span data-dcnode-id="1033" id="freeText1073990262514244164" style="display:none"><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">Well researched, comprehensive intro to Spinoza’s work. </span><br data-dcnode-id="1045"><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">I read a lot of contemporary Philosophy and have often come across references to the influence of Spinoza’s writing. It has always struck me though, that he is not often ranked among the top tier of European thinkers, while he is becoming more noticed recently.</span><br data-dcnode-id="1042"><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">Reading Nadler’s book, I think I understand that while his work was virtually suppressed by the Religious powers of his time, his demand for freedom of thought, unbound by obeisance to Sacred Texts whether Jewish or Christian, is far more likely to be respected in our more Secular Age. His approach to Philosophic issues was obviously far ahead of his time, a dangerous stance in the Seventeenth Century.</span><br data-dcnode-id="1039"><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">Nadler does a good job of staying out of the weeds, presenting the source documents when necessary, but relating Spinoza’s principles in terms understandable to the laymen of our time.</span><br data-dcnode-id="1036"><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">A clear and pleasant read of the work of a powerful, often overlooked Mind. Four Stars. ****</span></span><span data-dcnode-id="1032" instrument_node="">

</span><span data-dcnode-id="952" id="freeText7771736372898873456" style="display:none"><span data-dcnode-id="953" instrument_node="">Baruch Spinoza's 'Theological-Political Treatise' was considered the most dangerous book ever published when it appeared in 1670. It's not surprising though, considering that in it Spinoza denied the divinity of the Bible, ruled out the possibility of miracles, equated God with the laws of nature, minimized the revelations of the prophets, and reduced religion to a simple moral code. However, Spinoza also advocated for the freedom of religious belief, freedom to worship and the freedom to express oneself. As noted by the author, Spinoza's book contributed to modern liberal, secular and democratic thinking as much as the Declaration of Independence or Thomas Paine's 'Common Sense.' Nadler's 'A Book Forged in Hell' is a terrific introduction to Spinoza's thinking and the book that helped to usher in the secular age. Highly recommended.</span></span><span data-dcnode-id="951" instrument_node="">
