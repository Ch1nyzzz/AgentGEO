</span><span data-dcnode-id="4532" id="freeTextContainer2495155397815490518"><span data-dcnode-id="4536" instrument_node="">When it appeared in 1670, Baruch Spinoza's </span><em data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">Theological-Political Treatise</span></em><span data-dcnode-id="4533" instrument_node=""> was denounced as the most dangerous book ever published--"godless," "full of abominations," "a book forged in hell . . . by the devil himself." Religious and secular authorities saw it as a threat to faith, social and political harmony, and everyday morality, and its author was almost universally reg</span></span><span data-dcnode-id="4531" instrument_node="">
</span><span data-dcnode-id="4508" id="freeText2495155397815490518" style="display:none"><span data-dcnode-id="4530" instrument_node="">When it appeared in 1670, Baruch Spinoza's </span><em data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">Theological-Political Treatise</span></em><span data-dcnode-id="4527" instrument_node=""> was denounced as the most dangerous book ever published--"godless," "full of abominations," "a book forged in hell . . . by the devil himself." Religious and secular authorities saw it as a threat to faith, social and political harmony, and everyday morality, and its author was almost universally regarded as a religious subversive and political radical who sought to spread atheism throughout Europe. Yet Spinoza's book has contributed as much as the Declaration of Independence or Thomas Paine's </span><em data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">Common Sense</span></em><span data-dcnode-id="4524" instrument_node=""> to modern liberal, secular, and democratic thinking. In </span><em data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">A Book Forged in Hell</span></em><span data-dcnode-id="4521" instrument_node="">, Steven Nadler tells the fascinating story of this extraordinary book: its radical claims and their background in the philosophical, religious, and political tensions of the Dutch Golden Age, as well as the vitriolic reaction these ideas inspired.</span><br data-dcnode-id="4520"><br data-dcnode-id="4519"><span data-dcnode-id="4518" instrument_node="">It is not hard to see why Spinoza's </span><em data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">Treatise</span></em><span data-dcnode-id="4515" instrument_node=""> was so important or so controversial, or why the uproar it caused is one of the most significant events in European intellectual history. In the book, Spinoza became the first to argue that the Bible is not literally the word of God but rather a work of human literature; that true religion has nothing to do with theology, liturgical ceremonies, or sectarian dogma; and that religious authorities should have no role in governing a modern state. He also denied the reality of miracles and divine providence, reinterpreted the nature of prophecy, and made an eloquent plea for toleration and democracy.</span><br data-dcnode-id="4514"><br data-dcnode-id="4513"><span data-dcnode-id="4512" instrument_node="">A vivid story of incendiary ideas and vicious backlash, </span><em data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">A Book Forged in Hell</span></em><span data-dcnode-id="4509" instrument_node=""> will interest anyone who is curious about the origin of some of our most cherished modern beliefs.</span></span><span data-dcnode-id="4507" instrument_node="">

</span><span class="expandableContainer" data-dcnode-id="4167"><span class="truncatedContent" data-dcnode-id="4172"><span data-dcnode-id="4175" instrument_node="">This book is not an analysis of Spinoza's philosophy or writings, so it's not necessary for Nadler to be more critical of Spinoza. Nadler describes th</span><a class="jsShow showAction" data-dcnode-id="4173" href="#"><span data-dcnode-id="4174" instrument_node="">…more</span></a></span><span class="fullContent" data-dcnode-id="4168"><span data-dcnode-id="4171" instrument_node="">This book is not an analysis of Spinoza's philosophy or writings, so it's not necessary for Nadler to be more critical of Spinoza. Nadler describes the Dutch intellectual, religious, and political environment, what Spinoza wrote, and why that got him into trouble. Nadler, or anyone who studies philosophy, could be more critical of Spinoza (that is an element of philosophical debates, isn't it?), not just of his writings but what he could or should have done to stay out of trouble, but that Is out of place for this book. I think it would weaken this book.</span><a class="jsHide hideAction" data-dcnode-id="4169" href="#"><span data-dcnode-id="4170" instrument_node="">(less)</span></a></span></span><span data-dcnode-id="4166" instrument_node="">

</span><span data-dcnode-id="3742" id="freeTextContainer13253415124094688204"><span data-dcnode-id="3746" instrument_node="">“Spinoza was the first to argue that the Bible is not literally the word of God but rather a work of human literature; that “true religion” has nothing to do with theology, liturgical ceremonies, or sectarian dogma but consists only in a simple moral rule: love your neighbor; and that ecclesiastic authorities should have no role whatsoever in the governance of a modern state.”</span><br data-dcnode-id="3745"><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">On July 27, 1656, at the tender age of twenty three, before Baruch de Spinoza had ever published a single page of anythin</span></span><span data-dcnode-id="3741" instrument_node="">
</span><span data-dcnode-id="3723" id="freeText13253415124094688204" style="display:none"><span data-dcnode-id="3740" instrument_node="">“Spinoza was the first to argue that the Bible is not literally the word of God but rather a work of human literature; that “true religion” has nothing to do with theology, liturgical ceremonies, or sectarian dogma but consists only in a simple moral rule: love your neighbor; and that ecclesiastic authorities should have no role whatsoever in the governance of a modern state.”</span><br data-dcnode-id="3739"><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">On July 27, 1656, at the tender age of twenty three, before Baruch de Spinoza had ever published a single page of anything at all, he was cast out of the Talmud Torah congregation, the most prominent Portuguese Jewish community in Amsterdam, with a vengeance.</span><br data-dcnode-id="3736"><br data-dcnode-id="3735"><span data-dcnode-id="3734" instrument_node="">“By decree of the angels and by the command of the holy men, we excommunicate, expel, curse, and damn Baruch de Espinoza, with the consent of God… Cursed be he by day and cursed be he by night; cursed be he when he lies down and cursed be he when he rises up. Cursed be he when he goes out and cursed be he when he comes in. The Lord will not spare him, but then the anger of the Lord shall smoke against that man, and all the curses that are written in this book shall lie upon him, and the Lord shall blot out his name from under heaven.”</span><br data-dcnode-id="3733"><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">Damn. They didn’t just want him out of their synagogue, they wanted him to suffer, to have a bad and highly intolerable existence, to be tormented like an ant under a magnifying glass on a hot August day in Oklahoma. The proclamation goes on to say that no one was to speak to Spinoza, to write letters to him, to show him any kindness, to be under the same roof, to read anything he has written, or to step within “four cubits” (roughly six feet) of him. </span><br data-dcnode-id="3730"><br data-dcnode-id="3729"><span data-dcnode-id="3728" instrument_node="">Damn. This was the most extreme excommunication ever handed down to a Jew in Holland. Ever. And we don’t really know why. The herem doesn’t say. As far as anyone knows he hadn’t penned a word of his treatise yet, or of ‘Ethics’ (his philosophical masterpiece). Whatever it was that he said or wrote he received the full attention of Polish rabbinical authority. And it was unforgivable. </span><br data-dcnode-id="3727"><br data-dcnode-id="3726"><span data-dcnode-id="3725" instrument_node="">If this alone doesn’t make you want to get better acquainted with Baruch Spinoza and his philosophies, to read and savor every word of Steven Nadler’s richly informative ‘A Book Forged in Hell,’ I don’t think I want to know you. Stay four cubits away from me. </span><br data-dcnode-id="3724"></span><span data-dcnode-id="3722" instrument_node="">

</span><span data-dcnode-id="3602" id="freeText5122975317981084956" style="display:none"><span data-dcnode-id="3633" instrument_node="">Spinoza's Scandalous Treatise</span><br data-dcnode-id="3632"><br data-dcnode-id="3631"><span data-dcnode-id="3630" instrument_node="">About 25 years ago, I was engaged in serious graduate study in philosophy and preparing to write a dissertation on Spinoza's "Theological-Political Treatise" (1670). I have had a lifelong interest in Spinoza and was interested in the Treatise because of the questions of how to interpret texts it raises in terms of its treatment of the Bible. Also, at the time, the Treatise was receiving far less attention than Spinoza's most famous work, the "Ethics". I never completed the dissertation but retained my interest in Spinoza and the Treatise.</span><br data-dcnode-id="3629"><br data-dcnode-id="3628"><span data-dcnode-id="3627" instrument_node="">The Treatise has received substantial attention since the time I was closely engaged with it. Historian Jonathan Israel has written a trilogy of lengthy, difficult books showing the great influence of Spinoza and the Treatise on Enlightenment thought and on the French and American Revolutions. "Radical Enlightenment: Philosophy and the Making of Modernity 1650-1750", "Enlightenment Contested: Philosophy, Modernity, and the Emancipation of Man 1670-1752", "Democratic Enlightenment: Philosophy, Revolution, and Human Rights, 1750-1790". Steven Nadler's new study, "A Book Forged in Hell: Spinoza's Scandalous Treatise and the Birth of the Secular Age" (2011) is much more accessible than Israel's studies and has a different focus. Nadler's aim is to offer a study of the Treatise to a general readership rather than simply to an academic audience in order to explain the book, its teachings, and its significance. Nadler is the William H. Hay II Professor of Philosophy at the University of Wisconsin -- Madison. He is the author of many books on Spinoza including a biography,"Spinoza: A Life", a study of Spinoza's excommunication, , and a study of Spinoza's Ethics,"Spinoza's 'Ethics': An Introduction". </span><br data-dcnode-id="3626"><br data-dcnode-id="3625"><span data-dcnode-id="3624" instrument_node="">Nadler quite properly emphasizes the radical revolutionary character of Spinoza's Treatise. The title of Nadler's book derives from one of the many criticisms leveled at the Treatise shortly after its publication. One Willem van Blijenburgh, who had been a correspondent of Spinoza's, wrote a lengthy book refuting the Treatise in which he said: "This atheistic book is full of studious abominations and an accumulation of opinions which have been forged in hell, which every reasonable person, indeed every Christian, should find abhorrent." Nadler documents many similar comments about the book as well as the events which led to the ban on the book two years after its publication. More importantly, Nadler explains what it was in Spinoza's Treatise that so disturbed its contemporary readers.</span><br data-dcnode-id="3623"><br data-dcnode-id="3622"><span data-dcnode-id="3621" instrument_node="">The Treatise concerns the relationship between religion and government and between religion and philosophy, broadly construed to include all forms of intellectual inquiry. Spinoza was concerned with religious wars, limitations on thought, and clerics influence on civil government. In a way that manages to be both cautious and bold, the Treatise takes a naturalistic view of God and prophecy, denies the existence of miracles, and takes a historical approach to the composition and interpretation of Scripture. Spinoza finds the Bible the work of human beings writing at particular times. Religion's goals are ethical in that it teaches people to be kind to one another, but it does not have further cognitive or doctrinal teachings. In a free society, for Spinoza, people should be free to believe as they wish. As Nadler quotes the basic teaching of the Treatise: "The state can pursue no safer course than to regard piety and religion as consisting solely in the exercise of charity and just dealing, and that the right of the sovereign, both in religious and secular spheres, should be restricted to men's actions, with everyone being allowed to think what he will and to say what he thinks." </span><br data-dcnode-id="3620"><br data-dcnode-id="3619"><span data-dcnode-id="3618" instrument_node="">Nadler's book begins with some brief biographical information about Spinoza and about his famous excommunication from the Amsterdam Jewish community. He also gives some important historical information about the Netherlands in Spinoza's day. Although there was in fact a larger degree of religious toleration in the Netherlands than in any other European community at the time, it was precarious and threatened by conflicts between monarchists and ecclesiastics on one hand and dissenting sects on the other hand. Spinoza wrote against a backdrop which thus contained both elements of liberty and the threat of repression. His aim was to increase the former. While there are universal lessons to be drawn from the Treatise, Nadler emphasizes that the book is also the product of a particular time and place. (For example, he writes: Moreover, while the Treatise remains of great relevance today, it is also a response to very particular and very complex historical exigencies, and we do not do it justice by trying to make it fit some transhistorical category of theories."</span><br data-dcnode-id="3617"><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">Most of the book consists of Nadler's close reading and exposition of Spinoza's text on the nature of god and prophecy, miracles, Scriptural interpretation and authorship, and political philosophy. Nadler ties the teachings of the Treatise to the teachings of Spinoza's much more obscure "Ethics". Nadler also draws important parallels between Spinoza and other thinkers. Thomas Hobbes receives attention throughout, both in the way Spinoza followed and the way he differed from him. Nadler also pays attention to the great medieval Jewish thinker Maimonides and offers his views on what Spinoza learned from Maimonides and where he disagreed. Nadler compares Spinoza's treatment of miracles in the Treatise with the famous work on the subject by a subsequent philosopher, David Hume, as well as with medieval Jewish and Christian understandings of miracles. Spinoza's views on tolerance and free speech are compared and contrasted with the views of John Locke, John Milton, and of the First Amendment to the United States constitution. The book considers Spinoza's alleged role as the first "secular Jew" (which Nadler rejects) and Spinoza's role as the founder of a philosophy of secularism and of secular government (which Nadler accepts.)</span><br data-dcnode-id="3614"><br data-dcnode-id="3613"><span data-dcnode-id="3612" instrument_node="">Although long relegated to obscurity, the Treatise has been a book of pervasive and lasting influence. As Nadler concludes: </span><br data-dcnode-id="3611"><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">"Without a doubt, the Theological-Political Treatise is one of the most important and influential books in the history of philosophy, in religious and political thought, and even in Bible studies. More than any other work, it laid the foundation for modern critical and historical approaches to the Bible. And while often overlooked in books on the history of political thought, the Treatise also has a proud and well-deserved place in the rise of democratic theory, civil liberties, and political liberalism. The ideas of the Treatise inspired republican revolutionaries in England, America, and France, and it encouraged early modern anticlerical and antisectarian movements."</span><br data-dcnode-id="3608"><br data-dcnode-id="3607"><span data-dcnode-id="3606" instrument_node="">I enjoyed revisiting the Treatise and thinking about it again through reading Nadler's study. Readers with a broad interest in philosophy and in ideas will benefit from Nadler's book and perhaps receive encouragement to read Spinoza's own book for themselves.</span><br data-dcnode-id="3605"><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">Robin Friedman</span></span><span data-dcnode-id="3601" instrument_node="">

</span><span data-dcnode-id="3505" id="freeTextContainer1733224574848234757"><span data-dcnode-id="3506" instrument_node="">My interest in philosophy started only a little over half a year ago; I read Durant's History of Philosophy and I've slowly read more in the months after. From Durant's book the philosopher I've been most interested in is Spinoza. Here was this renegade Jew whom questioned the bible and the faith of his fathers only to be excommunicated and later wrote a few political and religious texts. Eventually I'm going to attempt to tackle his Ethics, but the geometric style sort of scares me (furthermore</span></span><span data-dcnode-id="3504" instrument_node="">
</span><span data-dcnode-id="3490" id="freeText1733224574848234757" style="display:none"><span data-dcnode-id="3503" instrument_node="">My interest in philosophy started only a little over half a year ago; I read Durant's History of Philosophy and I've slowly read more in the months after. From Durant's book the philosopher I've been most interested in is Spinoza. Here was this renegade Jew whom questioned the bible and the faith of his fathers only to be excommunicated and later wrote a few political and religious texts. Eventually I'm going to attempt to tackle his Ethics, but the geometric style sort of scares me (furthermore I have absolutely no training in philosophy). In the mean time I'm going to read his more accessible Theological-Political Treatise (referred to in early criticisms as a 'book forged in hell'); this lead me to this excellent introduction from Nadler. </span><br data-dcnode-id="3502"><br data-dcnode-id="3501"><span data-dcnode-id="3500" instrument_node="">This book covers a brief history of Spinoza, the environment he lived in, the events leading up to his publishing of TPT, and the aftermath of the book. Here you have the common stories such as Spinoza developing the ideas of his version of God which got him excommunicated from the Jewish community, the death of his friend for publishing a book questioning the rationality of religion, Spinoza wanting to publish The Ethics only to decide to write TPT in order to prove that he wasn't an atheist and to better get the public ready for his ideas which would be in the later published book (only to have this backfire when most who read his book labeled him as an atheist). It doesn't cover all of Spinoza's life and death, although Nadler has written a comprehensive biography on Spinoza (one which I plan to read). </span><br data-dcnode-id="3499"><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">The bulk of the book covers themes and ideas in TPT along with comparisons to the works which inspired Spinoza. It seems that the major influences on TPT are Hobbes's Leviathan and Maimonides's Guide to the Perplexed. For someone like myself who is interested in religious texts, the TPT sounds very interesting. Written at a time when the majority of the public considered the bible as almost directly dictated by god (similar to the modern Islamic view of the Quran), Spinoza attempted to question that notion and prove that not only is the bible a man made book, but that the common assumptions such as those like authorship of it were wrong (for example Moses didn't author the Torah), and he supported the redactor view that Ezra was likely the later compiler/editor of the Hebrew bible and Ezra was rushed, which explains the sometimes contradictory nature of it (ie compare Genesis 1 with 2-3). The influence of this early criticism is still felt today, with this book leading the way to later higher and historical criticisms of the bible. </span><br data-dcnode-id="3496"><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">Moving away from the religious themes, the TPT also presents one of the earliest major philosophic arguments for democracy. He highly supports religious freedom and freedom to philosophize (one of the major reasons for attacking the scriptures was to lessen religious constraints). One of the things I did find odd though was that apparently Spinoza supported a state religion, I guess he wants the average man to follow these teachings (while still allowing complete freedom for religious toleration). </span><br data-dcnode-id="3493"><br data-dcnode-id="3492"><span data-dcnode-id="3491" instrument_node="">Overall this book was excellent, in the past few weeks I've read a few popular accounts of Spinoza and I liked this one the best. Nadler's book was accessible and did the best job explaining the philosophy (although I he did have the benefit of not getting far into the more complicated philosophy of The Ethics). I feel ready to finally tackle my first Spinoza the TPT. When I finally feel ready to read The Ethics, I'll be sure to first pick up Nadler's introduction. </span></span><span data-dcnode-id="3489" instrument_node="">

</span><span data-dcnode-id="3414" id="freeTextContainer8598803454968347477"><span data-dcnode-id="3415" instrument_node="">One time for Christmas, I used my credit card points to get Erin jewelry for Christmas. Full of joy that Xmas morning, I handed her my thoughtful gift with a twinkle in my eye and love in my heart. She opened the small box and her eyes lit up and her mouth fell agape. "Gross!" she gagged. I told her that if she just tried the necklace and earrings on, maybe she'd like them. "If I put that on, I think I'll puke," she replied. From that day forth, I have sworn to never again order jewelry off of t</span></span><span data-dcnode-id="3413" instrument_node="">
</span><span data-dcnode-id="3389" id="freeText8598803454968347477" style="display:none"><span data-dcnode-id="3412" instrument_node="">One time for Christmas, I used my credit card points to get Erin jewelry for Christmas. Full of joy that Xmas morning, I handed her my thoughtful gift with a twinkle in my eye and love in my heart. She opened the small box and her eyes lit up and her mouth fell agape. "Gross!" she gagged. I told her that if she just tried the necklace and earrings on, maybe she'd like them. "If I put that on, I think I'll puke," she replied. From that day forth, I have sworn to never again order jewelry off of the internet (credit card points or no).</span><br data-dcnode-id="3411"><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">There's a parable in there. I always get excited by a new book about, for lack of better words, how religion is stupid and nonsensical. However, whenever I order said book and begin to read, I realize that I'm really wasting my time. These books usually make very logical arguments about how Scripture is not divine law, how religion was/is a socio-political tool, how miracles are ways of stupid people explaining things they don't understand, etc. ad nauseam. Because I've mulled all these ideas over myself and come to pretty concrete personal conclusions, I don't need to read pages upon pages of logical refutation of religions' quackeries. I'm on board. I've had these ideas--sure, not expressed nearly as coherently or articulately, but the central argument is one that I have exhausted myself. So I swear that I won't buy another book like this; I won't waste my money. Aaaaand...just as sure as Erin is getting internet jewelry this Christmas, I end up buying another about how religion is stupid and nonsensical.</span><br data-dcnode-id="3408"><br data-dcnode-id="3407"><span data-dcnode-id="3406" instrument_node="">As is typical, this book has some great passages--passages that distill some of my central beliefs into pithily worded quotations. But for the most part it's freakin' </span><i data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">dry</span></i><span data-dcnode-id="3403" instrument_node="">. Boring history; boring summaries (oft repeated) of Spinoza's other seminal work; boring meanderings that stray from Spinoza's actual treatise. Still, I'll admit that my dissatisfaction is mostly my fault. If I had wanted to read Spinoza's treatise, I should have read Spinoza's treatise, not a book promising to give history, summary, and contextual meanderings. Nevertheless, I would still say this book is not intended for a general public readership. </span><br data-dcnode-id="3402"><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node="">Finally, I must admit that if I had a bookshelf marked "started but did not finish," then this would be one of the only a handful of books on it. I tried to finish it, I really did. But a smart man knows when it's time to </span><br data-dcnode-id="3399"><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node=""> </span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="3396" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1380395511ra/761801.gif&amp;raw" width="250"><span data-dcnode-id="3395" instrument_node=""> </span><br data-dcnode-id="3394"><br data-dcnode-id="3393"><br data-dcnode-id="3392"><br data-dcnode-id="3391"><span data-dcnode-id="3390" instrument_node="">New Year's Resolutions: No more books about religion no matter how sensational the title and no more internet jewelry...maybe.</span></span><span data-dcnode-id="3388" instrument_node="">

</span><span data-dcnode-id="3301" id="freeTextContainer10139104658561045974"><span data-dcnode-id="3305" instrument_node="">Baruch Spinoza (1632-77) is regarded as one of the most original thinkers in western philosophy. A BOOK FORGED IN HELL is Stephen Nadler's account of Spinoza's TRACTATUS THEOLOGICO-POLITICUS (the 'Treatise'), which was published in 1670. </span><br data-dcnode-id="3304"><br data-dcnode-id="3303"><span data-dcnode-id="3302" instrument_node="">The Treatise was motivated by politics. Spinoza hoped to persuade influential people in the Dutch Republic to support greater freedom for the pursuit of philosophy and science. The Treatise failed to accomplish Spinoza's goal and instead provoked a backlash from</span></span><span data-dcnode-id="3300" instrument_node="">
</span><span data-dcnode-id="3271" id="freeText10139104658561045974" style="display:none"><span data-dcnode-id="3299" instrument_node="">Baruch Spinoza (1632-77) is regarded as one of the most original thinkers in western philosophy. A BOOK FORGED IN HELL is Stephen Nadler's account of Spinoza's TRACTATUS THEOLOGICO-POLITICUS (the 'Treatise'), which was published in 1670. </span><br data-dcnode-id="3298"><br data-dcnode-id="3297"><span data-dcnode-id="3296" instrument_node="">The Treatise was motivated by politics. Spinoza hoped to persuade influential people in the Dutch Republic to support greater freedom for the pursuit of philosophy and science. The Treatise failed to accomplish Spinoza's goal and instead provoked a backlash from religious authorities that resulted in the book being banned across Europe. </span><br data-dcnode-id="3295"><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">I read Nadler's book out of curiosity. I have been a casual reader of philosophy since undergraduate days. Despite reading widely, I have not read anything by Spinoza except a few random excerpts here and there. Nor have I read another philosopher (save one) who acknowledged any intellectual debt to Spinoza. Yet, everyone seems to agree that he was highly influential. I hoped Nadler would help me to understand his influence. </span><br data-dcnode-id="3292"><br data-dcnode-id="3291"><span data-dcnode-id="3290" instrument_node="">Let me begin with where I am aware of Spinoza's influence. Leo Strauss, the 20th century political philosopher, acknowledged the influence of Spinoza in his own writings. One area where Spinoza seems to have influenced Strauss is in the way that Strauss understood the difference between revelation and knowledge. </span><br data-dcnode-id="3289"><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">In Spinoza's time, one of the great controversies was between the 'dogmatics' who believed that when science contradicted scripture, then scripture should be read metaphorically to resolve the conflict, and 'skeptics' who doubted the authority of science and believed that, in cases of conflict, scripture always trumps science. Spinoza tried to bridge this controversy by showing that science and scripture are compatible. </span><br data-dcnode-id="3286"><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">Spinoza's attempt at reconciliation was not fully satisfactory. But it may have opened the door for Strauss' great insight that religious revelation and scientific knowledge are two separate and distinct things that do not conform to the same rules and cannot contradict one another. As I understand Strauss, revelation is not logical. It is not verifiable rationally or empirically. It is revealed to the believer through an unexplained agency. Knowledge, on the other hand, must conform to the rules of logic and can be verified rationally or empirically. Because revelation and knowledge exist in two different spheres with no rules in common, they cannot be cited against one another. One cannot refute the other. </span><br data-dcnode-id="3283"><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">Nadler tackles the question whether Spinoza was secretly converted to Christianity. This question has its roots in three facts. First, Spinoza was expelled from Judeaism as a young man for heretical views. Second, after his expulsion, most of his friends seem to have been free thinking Christians. Third, in the Treatise, Spinoza writes more approvingly of Christianity than of Judeaism, though he generally disapproves of all sectarian religions. </span><br data-dcnode-id="3280"><br data-dcnode-id="3279"><span data-dcnode-id="3278" instrument_node="">Nadler debunks Spinoza's supposed Christianity convincingly. Strauss considered Spinoza's gentleness in criticizing Christian dogma to be an example of 'esoteric' writing. But Nadler offers a more straightforward explanation. Spinoza wanted to persuade Christian intellectuals to join him in advocating for greater freedom to do science. He could not succeed if he alienated his audience by attacking their religion. But that does not require us to conclude that Spinoza had embraced Christianity. </span><br data-dcnode-id="3277"><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">On the contrary, Spinoza's views on the nature of God in his Treatise and more fully in his ETHICS published after his death, make it clear that he was no Christian. Rather, Spinoza seems to have been a pantheist of sorts. He equated God with nature and nature with God. They are co-extensive. This means that miracles, including prophecy, are not possible. The laws of nature are the very essence of God. God cannot work miracles because to do so would contravene his own essence. That makes the divinity of Christ, the virgin birth, the miracle of the Eucharist and the resurrection all impossibilities. Though Spinoza admired the moral teachings of the Christian bible, he certainly was no Christian. </span><br data-dcnode-id="3274"><br data-dcnode-id="3273"><span data-dcnode-id="3272" instrument_node="">So what was Spinoza's influence? Nadler seems to think that it was pervasive in the flourishing of secularism in the century following his death. Nadler may be right. But I cannot tell from his account. I am inclined to think that the seeds of the secularism that flourished in the 18th century were planted by Hobbes, Spinoza's older contemporary, who did not write as boldly as Spinoza in denying miracles, prophecy and the authority of scripture, but who wrote more subversively. Hobbes did not openly deny the truth of religious doctrine. He redefined the question of religion so that its truth no longer matters. After Hobbes, what matters is how religion makes us feel and behave, not whether it saves us.</span></span><span data-dcnode-id="3270" instrument_node="">

</span><span data-dcnode-id="3141" id="freeText1302209403916300254" style="display:none"><span data-dcnode-id="3157" instrument_node="">Baruch Spinoza is my favorite philosopher whom I have barely read. I’ve read much about him and his thought, but his original writings are incredibly opaque to anyone not a trained philosopher. My training stopped with a few undergraduate courses, so while I have the interest, I don’t always have the tools to fully understand dense, technical philosophic works. </span><br data-dcnode-id="3156"><br data-dcnode-id="3155"><span data-dcnode-id="3154" instrument_node="">A Theologico-Political Treatise is sole work of Spinoza’s that I’ve read. While it is slightly more accessible than his masterwork, The Ethics, it is still a difficult book. I could follow its gist, comprehend some of his larger points, but I often was lost both in his opaque language, and in the screen of pious lip serves that he included to soften his more radical ideas about religion from the wrath of the orthodox religionists of his time. </span><br data-dcnode-id="3153"><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node="">So that makes me the intended audience for Steven Nadler’s book A Book Forged In Hell. It is written precisely to make The Theologico-Political Treaties accessible to a general audience. He accomplishes this task remarkably well. </span><br data-dcnode-id="3150"><br data-dcnode-id="3149"><span data-dcnode-id="3148" instrument_node="">The book does several things. Foremost, it tackles the original book, section by section, and explains in clear, modern language the salient points Spinoza was making. This alone makes the book invaluable, for Spinoza was doing important work here. He was demystifying the Bible, laying the groundwork for studying it as a historical document rather than Divine Revelation, and anticipating the Higher Criticism by over a century. Together with this, he was attacking the very idea of clerical authority over the state, becoming the grandfather of secular society and laying the first bricks in the Wall of Separation between church and state. </span><br data-dcnode-id="3147"><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node="">But beyond just making Spinoza’s work accessible, Nadler also provides important context. He explains Spinoza’s personal history. He explains the political and religious situation of the Dutch State where Spinoza lived and wrote. He gives details of other contemporary philosophical works, such as Hobbes Leviathan, how it may have influenced Spinoza, and how the works differed. He explains how the medieval Jewish philosopher Maimonides influenced Spinoza’s thinking and where they differed. And he explains the reception and reaction that Spinoza’s contemporaries gave to his work. </span><br data-dcnode-id="3144"><br data-dcnode-id="3143"><span data-dcnode-id="3142" instrument_node="">You could read this book by itself and gain a sufficient understanding of Spinoza’s book that is a building block of our modern, secular society. Or, you could read it together with Spinoza’s original to gain better insight into it. Either way, this is an excellent work for anyone with an interest in these important subjects.</span></span><span data-dcnode-id="3140" instrument_node="">

</span><span data-dcnode-id="3059" id="freeTextContainer4328260968570522965"><span data-dcnode-id="3066" instrument_node="">Imagine a world where there is only one reality (</span><i data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">substance</span></i><span data-dcnode-id="3063" instrument_node="">) with an infinite number of </span><i data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">attributes</span></i><span data-dcnode-id="3060" instrument_node=""> and any digression from that agreed upon reality from the stifling suffocating consensus based on foundationless authority can lead to punishment by death or imprisonment. That’s the world Spinoza was thrown into and in some ways it’s not that much different from our current world with the MAGA hat hate spewing fanatics replacing the stifling suffocating consensus keeping fanatics from Spinoza's tim</span></span><span data-dcnode-id="3058" instrument_node="">
</span><span data-dcnode-id="3019" id="freeText4328260968570522965" style="display:none"><span data-dcnode-id="3057" instrument_node="">Imagine a world where there is only one reality (</span><i data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">substance</span></i><span data-dcnode-id="3054" instrument_node="">) with an infinite number of </span><i data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">attributes</span></i><span data-dcnode-id="3051" instrument_node=""> and any digression from that agreed upon reality from the stifling suffocating consensus based on foundationless authority can lead to punishment by death or imprisonment. That’s the world Spinoza was thrown into and in some ways it’s not that much different from our current world with the MAGA hat hate spewing fanatics replacing the stifling suffocating consensus keeping fanatics from Spinoza's time. (In Texas today (9/2021) they will arrest you for thinking of having an abortion or aiding such a person and they will shame you for wearing a mask or getting a vaccine against Covid. The world is just as fucked up today as it was in Spinoza’s time). </span><br data-dcnode-id="3050"><br data-dcnode-id="3049"><span data-dcnode-id="3048" instrument_node="">Spinoza realizes that the reality that is given by his contemporaries is full of mischief and uses their assumptions, relationships, and context that they embrace while overturning their deviously perverted system by using their own paradigms. Biblical exegesis with no </span><i data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">special pleading</span></i><span data-dcnode-id="3045" instrument_node=""> and a firm commitment to </span><i data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">ratio</span></i><span data-dcnode-id="3042" instrument_node=""> (rational thought with causal relationships leading to reason) while always respecting the traditions of the believers gives a world-shattering interpretation and results in one of the most important books ever written, the </span><i data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node=""> Theological-Political Treatise</span></i><span data-dcnode-id="3039" instrument_node="">. </span><br data-dcnode-id="3038"><br data-dcnode-id="3037"><br data-dcnode-id="3036"><span data-dcnode-id="3035" instrument_node="">For those who have not read Spinoza’s two great works, the </span><i data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Ethics</span></i><span data-dcnode-id="3032" instrument_node="">, or his </span><i data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">TTP</span></i><span data-dcnode-id="3029" instrument_node=""> or have not read Maimonides’ </span><i data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Guide for the Perplex</span></i><span data-dcnode-id="3026" instrument_node=""> or Hobbes’ </span><i data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Leviathan</span></i><span data-dcnode-id="3023" instrument_node=""> or Jonathan Israel’s </span><i data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Radical Enlightenment</span></i><span data-dcnode-id="3020" instrument_node=""> I would highly recommend this book, but, for me, I have read those books and found this book to be mostly a re-working of things I already have read and I would heartily recommend it for those who are not familiar with those other sources since this book is at an introductory level and quotes often from those sources.</span></span><span data-dcnode-id="3018" instrument_node="">

</span><span data-dcnode-id="2940" id="freeTextContainer14927423371124185452"><span data-dcnode-id="2944" instrument_node="">I have to dissent from other Goodreads reviewers of this book, I suppose partly because I was misled by the provocative title into thinking that it would be similar to the recent semi-bestseller </span><i data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">The Swerve</span></i><span data-dcnode-id="2941" instrument_node="">, by Stephen Greenblatt. But it is definitely not for the general reader: it is a scholarly book for a relatively narrow audience, lightly edited to make it seem more relevant to general interests. Spinoza's scandalous treatise was widely condemned for declaring that the Bible is not literally </span></span><span data-dcnode-id="2939" instrument_node="">
</span><span data-dcnode-id="2930" id="freeText14927423371124185452" style="display:none"><span data-dcnode-id="2938" instrument_node="">I have to dissent from other Goodreads reviewers of this book, I suppose partly because I was misled by the provocative title into thinking that it would be similar to the recent semi-bestseller </span><i data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">The Swerve</span></i><span data-dcnode-id="2935" instrument_node="">, by Stephen Greenblatt. But it is definitely not for the general reader: it is a scholarly book for a relatively narrow audience, lightly edited to make it seem more relevant to general interests. Spinoza's scandalous treatise was widely condemned for declaring that the Bible is not literally the word of God, but is a work of literature by men; that sectarian dogma is not the same thing as religion; and that states should not be governed by religious authorities. This was interesting to me, since I just finished a book on the philosophy of Pascal, who died just eight years before the publication of Spinoza's treatise, and who would have been one of the people most scandalized by it. This is a useful reminder of how far independent philosophical thought had come by 1670. Otherwise there was little here to intrigue me. Here is Nadler's concluding paragraph, attempting to make the case for general interest:</span><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">"To the extent that we are committed to the ideal of a secular society free of ecclesiastic influence and governed by toleration, liberty, and a conception of civic virtue; and insofar as we think of true religious piety as consisting in treating other human beings with dignity and respect, and regard the Bible simply as a profound work of human literature with a universal moral message, we are the heirs of Spinoza's scandalous treatise."</span><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">OK. Some of us might think that "true religious piety" might include rather more than that, but otherwise not a very arguable conclusion. Or a very compelling one.</span></span><span data-dcnode-id="2929" instrument_node="">

</span><span data-dcnode-id="2836" id="freeTextContainer16423609925878336483"><span data-dcnode-id="2840" instrument_node="">The title makes it sound like Spinoza once played drums for Spinal Tap: </span><i data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Direct from Hell, it's the Tractatus Theologico-Politicus!</span></i><span data-dcnode-id="2837" instrument_node="">, but the book itself is bound to disappoint those looking for a salacious story of Satan at the forge. Spinoza was a mundane character with a mundane point of view, which in a way is what caused all the fuss: he denied the historical reality of miracles in the Bible, and he suggested that Biblical stories should not be taken literally. That point of view still raises</span></span><span data-dcnode-id="2835" instrument_node="">
</span><span data-dcnode-id="2827" id="freeText16423609925878336483" style="display:none"><span data-dcnode-id="2834" instrument_node="">The title makes it sound like Spinoza once played drums for Spinal Tap: </span><i data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Direct from Hell, it's the Tractatus Theologico-Politicus!</span></i><span data-dcnode-id="2831" instrument_node="">, but the book itself is bound to disappoint those looking for a salacious story of Satan at the forge. Spinoza was a mundane character with a mundane point of view, which in a way is what caused all the fuss: he denied the historical reality of miracles in the Bible, and he suggested that Biblical stories should not be taken literally. That point of view still raises hackles in some segments of society, but in the 17th century it was indeed scandalous, even in the fairly tolerant Dutch Republic. </span><br data-dcnode-id="2830"><br data-dcnode-id="2829"><span data-dcnode-id="2828" instrument_node="">Nadler's approach is serious and scholarly, and it focuses more on Spinoza's philosophy and life than on the "scandal", though that is part of the story as well. It serves best as an introduction to the thought of Spinoza as evinced in the Theological-Political Treatise, and to Spinoza's interpretation of religion in general. Nadler's detailed forays into 17th century Dutch politics are less than riveting, but historical context matters. I was hoping at the end that Spinoza would evaporate in a spontaneous explosion, but apparently he died the death of a typical mortal and went to heaven like all good philosophers. </span></span><span data-dcnode-id="2826" instrument_node="">

</span><span data-dcnode-id="2742" id="freeTextContainer4177405182375988921"><span data-dcnode-id="2746" instrument_node="">This book is well done, clearly written, and the author does a great job explaining Spinoza's ideas, which are clearly very important in the history of philosophy. He also does a great job putting Spinoza in context, which was my favorite aspect of the book. However, (and this is not Nadler's fault), I just don't care all that much about the metaphysical and religious aspects of Spinoza's thought, which are very abstract to me, so I found some sections of the book a little dull.</span><br data-dcnode-id="2745"><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">Here's why Spinoz</span></span><span data-dcnode-id="2741" instrument_node="">
</span><span data-dcnode-id="2730" id="freeText4177405182375988921" style="display:none"><span data-dcnode-id="2740" instrument_node="">This book is well done, clearly written, and the author does a great job explaining Spinoza's ideas, which are clearly very important in the history of philosophy. He also does a great job putting Spinoza in context, which was my favorite aspect of the book. However, (and this is not Nadler's fault), I just don't care all that much about the metaphysical and religious aspects of Spinoza's thought, which are very abstract to me, so I found some sections of the book a little dull.</span><br data-dcnode-id="2739"><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">Here's why Spinoza matters: he argued for a naturalistic form of religion that privileged morality over doctrine, mythology, and the supernatural. He said that nature is essentially God, and that its rules are never broken, which means that in a sense the supernatural does not exist, meaning no miracles, of course. He views God in a sort of deist way, as in God created the universe and its laws but has not human traits, emotions, desires, etc and does not intervene in human affairs. He argued for religious freedom much more than pretty much anyone of his time, but he also thought that the state, for the sake of domestic harmony and unity, should endorse a general religion with rites, ceremonies, and so on. This reflects the elitism of Spinoza's thought: he believed that ordinary people needed order, ceremony, mythology, and other elaborate things to remain moral and restrained. I think this was the biggest weakness of Spinoza's thought: on one hand he believes that most of religion is an attempt to mystify the ordinary people while taking their freedom and dominating them, but he then endorses doing a form of that to the "ordinary" folks, whom he sees as simplistic and emotional. Thus, Spinoza endorses one form of morality and social contract for elites like himself and a totally different one for the common people. I may be misreading him here, but this is why I was skeptical that he should be counted as a "democratic" thinker. I suppose he is liberal in a broad sense, and he certainly took a big step toward modern secularism.</span><br data-dcnode-id="2736"><br data-dcnode-id="2735"><span data-dcnode-id="2734" instrument_node="">However, I found Spinoza's political thought in general to be a bit confusing. He's sort of a Hobbesian in that he believes people form social contract and grant power to an executive to keep the peace. However, he's much more of a democrat than Hobbes, although he still had a very expansive view of executive power, in contrast to a more restrictive thinker like Locke. I think he could best be described as a defender of private autonomy and belief who still believed in a more authoritarian public sphere. I'm not sure he or Nadler worked out those tensions, and Nadler indeed refers to these tensions throughout the book.</span><br data-dcnode-id="2733"><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">Nadler does a great job with the history here, but some of the philosophy I just didn't find that interesting. I don't find metaphysics, epistemology, or debates about the nature of God very interesting (particularly because I don't believe in God), and that's a big chunk of this book. I like political and ethical thought, so I enjoyed those sections. I guess you could say that I'm standing on the shoulders of giants like Spinoza who paved much of the path to my secular, liberal worldview, but that doesn't mean I'm interested in the rehashing of all of those debates. Still, this is a good intro to Spinoza's thought and to the intellectual and political world of the Netherlands in the mid-17th century.</span></span><span data-dcnode-id="2729" instrument_node="">

</span><span data-dcnode-id="2556" id="freeText17152369131500993520" style="display:none"><span data-dcnode-id="2575" instrument_node="">I think what I enjoyed most about this book is how well Nadler describes the context for Spinoza's philosophy: the liberal (but not always) state in Amsertdam; Hobbes and Descartes shaking up thought at the time; the conservatism and resistance of religious dogma; and so on.</span><br data-dcnode-id="2574"><br data-dcnode-id="2573"><span data-dcnode-id="2572" instrument_node="">That much of Spinoza's works were a response to the times and those that resisted his philosophy was very interesting, as I often read works like these disembedded from the context.</span><br data-dcnode-id="2571"><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">The author suggests that it is the message of tolerance that best represents Spinoza's </span><i data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Treatise</span></i><span data-dcnode-id="2566" instrument_node="">:</span><br data-dcnode-id="2565"><br data-dcnode-id="2564"><span data-dcnode-id="2563" instrument_node="">“The state can pursue no safer course than to regard piety and religion as consisting solely in the exercise of charity and just dealing, and that the right of the sovereign, both in religious and secular spheres, should be restricted to men’s actions, with everyone being allowed to think what he will and to say what he thinks.” </span><br data-dcnode-id="2562"><br data-dcnode-id="2561"><span data-dcnode-id="2560" instrument_node="">But I very much like his argument to conflate the idea of God with Nature:</span><br data-dcnode-id="2559"><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node="">“God created Nature so ineffective and prescribed for her laws and rules so barren that he is often constrained to come once more to her rescue if he wants her to be preserved, and the course of events to be as he desires. This I consider to be utterly divorced from reason.” [Spinoza]</span></span><span data-dcnode-id="2555" instrument_node="">

</span><span data-dcnode-id="2468" id="freeText261321886140056298" style="display:none"><span data-dcnode-id="2475" instrument_node="">A fine little heresy.</span><br data-dcnode-id="2474"><br data-dcnode-id="2473"><span data-dcnode-id="2472" instrument_node="">Spinoza's 1670 "Theological-Political Treatise" took the view that the Bible (primarily the Old Testament) could not be taken literally and should instead be read as a more literary/metaphorical text for to do otherwise would be to limit God to our own anthropomorphic emotions and tendencies and also as a way to counter the abuse of the clerisy across most aspects of society. Diving a hard liune between philosophy and theology, and never the twain shall meet, Spinoza challenged the orthodox views of prophecy, ceremony, and even the divine provenance of miracles. Suffice it to say, he was not the most popular guy at church parties. </span><br data-dcnode-id="2471"><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node="">Nadler's 2011 "A Book Forged in Hell" (a description given to Spinoza's Treatise at the time) walks the reader through Spinoza's thinking and how his Treatise came to be written (for a general audience while his "Ethics" was a more analytic and less accessible work espousing his overall philosophy). Just as much a work of religious philosophy as it was a political response to what Spinoza saw as the corrupting influence of the clerical class, Nadler expertly helps the reader understand the multiple threads Spinoza was working with as well as the institutional reactions thereto. A solid and enlightening look at a seminal philosophical work.</span></span><span data-dcnode-id="2467" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2390" title="liked it"><span class="staticStar p10" data-dcnode-id="2395" size="15x15"><span data-dcnode-id="2396" instrument_node="">liked it</span></span><span class="staticStar p10" data-dcnode-id="2394" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2393" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2392" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2391" size="15x15"></span></span><span data-dcnode-id="2389" instrument_node="">

</span><span class="readable" data-dcnode-id="2352" id="reviewTextContainer4672386798"><span data-dcnode-id="2385" instrument_node="">
</span><span data-dcnode-id="2378" id="freeTextContainer15775770972298949614"><i data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">“The more a government strives to curtail freedom of speech, the more obstinately is it resisted; not indeed by the avaricious… but by those whom good education, sound morality, and virtue have rendered more free.”</span></i><span data-dcnode-id="2382" instrument_node=""> – Spinoza</span><br data-dcnode-id="2381"><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">The great works of philosophy all have at least one thing in common; they are all disruptive. Like a sudden unruly star plunging through some unsuspecting solar system, they sweep the planets from their usual orbits and cast them aside in trembling chaos. Of course, it has to</span></span><span data-dcnode-id="2377" instrument_node="">
</span><span data-dcnode-id="2357" id="freeText15775770972298949614" style="display:none"><i data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">“The more a government strives to curtail freedom of speech, the more obstinately is it resisted; not indeed by the avaricious… but by those whom good education, sound morality, and virtue have rendered more free.”</span></i><span data-dcnode-id="2374" instrument_node=""> – Spinoza</span><br data-dcnode-id="2373"><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">The great works of philosophy all have at least one thing in common; they are all disruptive. Like a sudden unruly star plunging through some unsuspecting solar system, they sweep the planets from their usual orbits and cast them aside in trembling chaos. Of course, it has to be that way. Progress comes from overcoming entrenched falsehoods, so any revolutionary insight will inevitably introduce radical upheaval into the existing state of affairs. And, to a certain extent, a work’s historical impact can be measured by its seismic consequences.</span><br data-dcnode-id="2370"><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">Which is not to say that the value of a book can be easily correlated with its status at any given time. Some works, like those of John Donne, receive initial acclaim but fall out of appreciation and are only later reaffirmed in their greatness. Others are ignored to begin with but then slowly rise in public estimation. And then another kind is immediately condemned, reviled even, but outlives the convictions of those who once degraded it; in this third group Spinoza’s Tractatus Theologico-Politicus stands as one of history’s most notable examples. Although Spinoza’s political ideas haven’t traditionally been those for which he’s most well-known, his pantheism being the main focal point of his reputation, it could be argued that his work in proselytizing for religious neutrality in civil society and for the pre-eminence of reason in assessing any doctrine, including religious ones, was in the end his most impactful contribution. Even Einstein, the most distinguished Spinozist of the 20th century, owed as much to the famous philosopher’s societal teachings as he did to Spinoza’s cosmological ones. </span><br data-dcnode-id="2367"><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">And still there is a curious void in the public discourse when it comes to Spinoza. Especially in politics. Despite being maybe the most eloquent defender of a modern style republic for his time, his political contributions aren’t even acknowledged in the ways that Locke’s and Hobbes’ are; and of course philosophers aren’t cited that much anyways. Here however, Steven Nadler stepped in to offer a work that feels like an earnest attempt at historical correction; to rectify the oversight that’s occurred in relation to one of the most controversial books to ever be published. One gets the sense that the author is embarking on a personal mission and there are mild didactic undertones throughout but, overall, the book is successful at what it sets out to do; highlight the immense importance of a philosophical classic.</span><br data-dcnode-id="2364"><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">The title of the book however does it a bit of a disservice by misdirection. Although there are a few sections of the narrative where the reader gets to experience something of the thrill and intrigue of the Dutch Golden Age, this book is more often than not a careful professorial survey of the Tractatus Theologico-Politicus’ primary claims. Something much dryer then than the title, probably chosen by the publisher, would lead one to believe. And, to be perfectly honest, the book sags somewhat in the middle; I doubt the average reader will be much more interested in Spinoza’s disproof of miracles than I was, either because they’re already firmly convinced of their non-existence or because their convictions run the other way and Spinoza’s arguments here are fairly conventional for contemporary readers. But this rough patch aside, the book does much better in its beginning and ending thirds; also, the only really objectionable part I found in the book was its repeating of the Galileo myth (Yes, science has its own myths too) that portrays Galileo as a passive victim of persecution. No. He was absolutely right, sure, but insulting the Pope the way he did was itself hubris and stupidity. </span><br data-dcnode-id="2361"><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">Spinoza conversely receives his just dues as a martyr for the truth here; not quite at the level of Socrates or Bruno but movingly nonetheless. I wasn’t aware of the role that a friend of Spinoza’s being persecuted to death played in the writing of his book either and even more of an emphasis on those kinds of things would have been welcome. As it is though, the book was enjoyable and provides a good companion volume to a work that did as much as any to liberate the human mind.</span><br data-dcnode-id="2358"></span><span data-dcnode-id="2356" instrument_node="">

</span><span data-dcnode-id="2281" id="freeTextContainer13688589249851176661"><span data-dcnode-id="2282" instrument_node="">Spinoza was surely one of the bravest philosophers, swimming conscientiously against the tides of religious and ideological intolerance roiling the Netherlands in the mid to late sixteenth century. Expelled from the community of Jewish traders he grew up in for his heretical views (termed "monstrous" by local rabbis) Spinoza lived a simple, solitary life while building a systematic view of religion, politics and ethics that challenged the powers of his times and influenced the course of philosop</span></span><span data-dcnode-id="2280" instrument_node="">
</span><span data-dcnode-id="2278" id="freeText13688589249851176661" style="display:none"><span data-dcnode-id="2279" instrument_node="">Spinoza was surely one of the bravest philosophers, swimming conscientiously against the tides of religious and ideological intolerance roiling the Netherlands in the mid to late sixteenth century. Expelled from the community of Jewish traders he grew up in for his heretical views (termed "monstrous" by local rabbis) Spinoza lived a simple, solitary life while building a systematic view of religion, politics and ethics that challenged the powers of his times and influenced the course of philosophy to this day. Many of his insights, such as the identification of God with nature, may seem acceptable and moderate to us today but in his times such views were considered blasphemous and seditious. The "Book Forged in Hell" was the term given specifically to Spinoza's Theological Political Treatise by Dutch theologians and political leaders (often the same people) after it was published in the 1670s. The book argued for a surgical separation of church and state and freedom to philosophize. It also argued for the merits democracy and the rule of law over ecclesiastical or hereditary powers. Steven Nadler is steeped in the writing and times of Spinoza and I believe is a trustworthy interpreter of his life. The book is well written, comprehensive in its treatment of the Treatise and engaging but perhaps the language does not sparkle so that is why I only rated it three stars. However, I will go on to read Nadler's biography of Spinoza. A closing comment from the book which summarizes the ground covered by Spinoza's thought - "To the extent that we are committed to an ideal of a secular society free of ecclesiastic influence and governed by toleration, liberty and a conception of civic virtue; and insofar as we think of true religious piety as consisting in treating other human beings with dignity and respect and regard the bible simply as a profound work of human literature with a universal moral message, we are all heirs to Spinoza's scandalous treatise". </span></span><span data-dcnode-id="2277" instrument_node="">

</span><span data-dcnode-id="2184" id="freeTextContainer15293987828049528570"><span data-dcnode-id="2185" instrument_node="">A Book Forged in Hell is a book written by Steven Nadler. It discusses the critical response to Baruch Spinoza’s 1670 book called Theological-Political Treatise. Although I have read Ethics which was also authored by Spinoza, this particular book is more accessible to the mainstream person. This is also what made it far more dangerous to the ecclesiastical synods and other things. The Ethics of Baruch Spinoza is quite technical and filled with abstruse language, making it impenetrable to the com</span></span><span data-dcnode-id="2183" instrument_node="">
</span><span data-dcnode-id="2172" id="freeText15293987828049528570" style="display:none"><span data-dcnode-id="2182" instrument_node="">A Book Forged in Hell is a book written by Steven Nadler. It discusses the critical response to Baruch Spinoza’s 1670 book called Theological-Political Treatise. Although I have read Ethics which was also authored by Spinoza, this particular book is more accessible to the mainstream person. This is also what made it far more dangerous to the ecclesiastical synods and other things. The Ethics of Baruch Spinoza is quite technical and filled with abstruse language, making it impenetrable to the common reader.</span><br data-dcnode-id="2181"><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">The book talks about the political, religious, and philosophical history behind the decisions to eventually ban the Theological-Political Treatise in the Dutch confederation and all across the world. The book is marvelously well-done and researched quite thoroughly. Given what the book actually said in print, I am astonished that it was even printed in the first place. Other books discussed this topic of miracles not being real and the Bible having a historical basis, not a divine one. However, Spinoza went too far in some cases, especially considering the sensibilities of the time.</span><br data-dcnode-id="2178"><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">Nadler’s main idea is that without Spinoza to blaze the trail, we might not have reached the Secular Age, or so I suppose. I assume that even without Spinoza the world would eventually have turned out the way it did; it just might have taken longer to accomplish.</span><br data-dcnode-id="2175"><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">I really enjoyed this book; it was difficult to put down and very informative.</span></span><span data-dcnode-id="2171" instrument_node="">

</span><span data-dcnode-id="1836" id="freeText2059762726440851201" style="display:none"><span data-dcnode-id="1837" instrument_node="">First off, I'm not a big fan of pure philosophy, which oftentimes boils down to arguing about the semantics of words. I chose this initially because of the title. And it wasn't too thick. Turns out it was pretty good. I'm not going to quibble about Spinoza's philosophy. I mean he's writing from the 1600's so what do you expect. What this book really delivers is a clear explanation of what Spinoza was proposing. And a shocking proposal it must have been at the time too; that God isn't some being with thoughts, emotions and volition, but instead nothing less than the entire universe with us in it. Pretty bold, Spinoza. And the Old Testament, the New Testament, or the Koran? Historical literature written by humans from a bygone age and copied over the centuries with less than a perfect eye towards fidelity. Wow. That position might even get you beat up in 2014 in some parts of the world. There's a message here that plenty of people don't want to hear even today because it's pretty obviously true. Like how the scriptures are used to justify what are opinions and customs of men rather than dictates from some God being. What Spinoza says is that the plain message of the Bible that no reasonable person can deny is to love God (love knowledge of the universe and its natural law) and to love your neighbor as yourself. Any other commandment is human artifice. Nicely done Spinoza. I agree.</span></span><span data-dcnode-id="1835" instrument_node="">

</span><span class="readable" data-dcnode-id="1395" id="reviewTextContainer3161182692"><span data-dcnode-id="1416" instrument_node="">
</span><span data-dcnode-id="1414" id="freeTextContainer9540464927332629843"><span data-dcnode-id="1415" instrument_node="">A Book Forged in Hell by Steven Nadler would be disturbing to believers of the monotheistic faith traditions. Nadler wrote the 17th century Jewish philosopher of Dutch origin Baruch Spinoza viewed religion in Theological-Political Treatise as superstitious. Nature as God is ubiquitous. It encompasses all things and was considered Providence. Every aspect of this essence is reflected in the good and bad people experience. Miracles that are described in the monotheistic faiths of Judaism, Christia</span></span><span data-dcnode-id="1413" instrument_node="">
</span><span data-dcnode-id="1400" id="freeText9540464927332629843" style="display:none"><span data-dcnode-id="1412" instrument_node="">A Book Forged in Hell by Steven Nadler would be disturbing to believers of the monotheistic faith traditions. Nadler wrote the 17th century Jewish philosopher of Dutch origin Baruch Spinoza viewed religion in Theological-Political Treatise as superstitious. Nature as God is ubiquitous. It encompasses all things and was considered Providence. Every aspect of this essence is reflected in the good and bad people experience. Miracles that are described in the monotheistic faiths of Judaism, Christianity, and Islam could be explained through the varieties of ever-changing nature. These are natural occurrences that surprise people when they appear not to have an explanation why such a phenomenon occurs. The first rainbow that mankind saw struck them as a miracle, but as science later showed this resulted from scientific evidence.</span><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">Prophecy could also be viewed as another phenomenon. Prophets in ancient times were uneducated, had vivid imaginations, and were motivated by dreams, and visions. In modern times these men and women would be considered as having psychotic episodes. But their accounts of revelations to the Israelites were filled with images of a Creator being like a human being. However it would be wrong to personalize God, for according to Spinoza “God is Nature.” Nature is therefore all things that are good and bad which exist in the Universe. It’s more realistic to think about God as Nature by an objective analysis.</span><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">This concept inevitably leads individuals to recognize that sin is non-existent, and a human construct. This idea in the monotheistic faiths grew out of the notion of God being like a human being. But God as Nature is material and immaterial. God as Nature doesn’t have human characteristics that are often in sacred texts. This spiritual essence couldn’t be described or understood. But God as Nature’s essence is universal and governs all things. Putting a human face on God as Nature is therefore an error that equates this primal essence with humankind. </span><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">Spinoza also believed in freedom of speech, and viewed it to be the underpinnings of a democratic society. His belief focused on his belief that this was the best form of government. In a democratic society he saw people as sovereign in this social contract that benefits all citizens. Left to their own will to do as they please, Spinoza envisioned people to act in their own self-interest. So it’s only through a democratic government that people would be able to promote what’s best for its citizenry. However Spinoza felt that in a democracy there should be a limit on speech, and it shouldn’t be seditious. Nadler wrote that Spinoza’s reasoning about sedition wasn’t exactly clear. Namely, when was speech to be classified as being seditious? Did Spinoza mean speech threatening the overthrow of government? Or, could it also be statements that were construed as anti-government?</span><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">Spinoza’s Treatise was eventually banned and attacked by conservatives and liberals. Yet his works have resurfaced in publications in the Netherlands, England, France, Germany, and America. In the 20th century Spinoza’s Treatise and Ethics are hailed as visionary in democratic societies where free speech is a hallmark. </span><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node=""> </span><br data-dcnode-id="1401"></span><span data-dcnode-id="1399" instrument_node="">

</span><span data-dcnode-id="1318" id="freeTextContainer3979318229309239760"><span data-dcnode-id="1329" instrument_node="">An excellent discussion of some of the earliest and most radical thinking on freedom of thought, freedom from religion, and freedom of speech. In his </span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Theological-Political Treatise</span></i><span data-dcnode-id="1326" instrument_node="">, Spinoza basically denies the divinity of the Bible, rules out the possibility of miracles, identifies God’s providence with the laws of nature, deflates the revelations of the prophets, and reduces religion </span><br data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node="">to a simple moral code. No wonder it caused such a stir in 17th century Holland. </span><br data-dcnode-id="1323"><br data-dcnode-id="1322"><span data-dcnode-id="1321" instrument_node="">Main take-aways:</span><br data-dcnode-id="1320"><span data-dcnode-id="1319" instrument_node="">1. The Treatis</span></span><span data-dcnode-id="1317" instrument_node="">
</span><span data-dcnode-id="1294" id="freeText3979318229309239760" style="display:none"><span data-dcnode-id="1316" instrument_node="">An excellent discussion of some of the earliest and most radical thinking on freedom of thought, freedom from religion, and freedom of speech. In his </span><i data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Theological-Political Treatise</span></i><span data-dcnode-id="1313" instrument_node="">, Spinoza basically denies the divinity of the Bible, rules out the possibility of miracles, identifies God’s providence with the laws of nature, deflates the revelations of the prophets, and reduces religion </span><br data-dcnode-id="1312"><span data-dcnode-id="1311" instrument_node="">to a simple moral code. No wonder it caused such a stir in 17th century Holland. </span><br data-dcnode-id="1310"><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">Main take-aways:</span><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">1. The Treatise is an extended argument for freedom of thought and expression in the modern state, especially freedom of philosophizing, as well as for the separation of philosophy and religion.</span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">2. His boldest and most ground-breaking argument is that the Bible is nothing but a work of human literature, composed over time by many authors, who often disagreed with one another. He still argues that it carries a divine message. I suspect it was this work which laid the foundation for modern critical and historical approaches to the Bible.</span><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">3. The ancient prophets were not especially learned or gifted individuals, and certainly not philosophers. They were nothing more than charismatic figures with particularly vivid imaginations who were capable of inspiring others with their moral messages.</span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">4. Spinoza's stated objective is to liberate the minds of individuals from superstition and the lives of citizens from ecclesiastic authority. His goal is a tolerant democratic society of individuals whose deeds are guided by the true (moral) religion. Replace the politics of hope (for eternal reward) and fear (of eternal punishment) with a politics of reason, virtue, freedom, and moral behavior.</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">5. Miracle stories are convenient tools long used by ecclesiastics to manipulate the credulity of the masses. Holding up Scripture—with its tales of parting seas, talking donkeys, and the dead being brought back to life—to bolster their authority. Miracles in the traditional sense, are an “absurdity” and the belief in them sheer “folly.” Not only are they unnecessary for, even contrary to, real piety, but they are inconsistent with the true nature of God.</span><br data-dcnode-id="1297"><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">In Book XVI, he builds on Hobbe's concept of the sovereign, and argues that a democracy is a much better form of government than a monarchy because the greater stability of democracy stems from the fact that it is, of all the forms of government, the least likely to behave unreasonably and alienate its citizens, “for it is practically impossible for the majority of a single assembly, if it is of some size, to agree on the same piece of folly.” Spinoza assumes that the irrational ideas of individuals will, in a democratic assembly, fall out of contention and the resulting “will” of the assembly will reflect a consensus that has as its object the rational well-being of the community. I wonder what he would say after watching democracy in action in the 21st century.</span></span><span data-dcnode-id="1293" instrument_node="">
