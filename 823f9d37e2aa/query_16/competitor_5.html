</span><h1 class="entry-title" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">50 Cunning Facts About The Borgias, Italy’s Most Scandalous Family</span></h1><span data-dcnode-id="2134" instrument_node="">
</span></div><span data-dcnode-id="2132" instrument_node="">
</span><div class="inner_content_wrapper inner_content" data-dcnode-id="971"><span data-dcnode-id="2131" instrument_node="">
</span><div class="entry-content" data-dcnode-id="973" itemprop="articleBody"><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2119"><strong data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">The name Borgia is synonymous in history with treachery, hedonism, and scandal.</span></strong><span data-dcnode-id="2127" instrument_node=""> Along with the equally infamous </span><a data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/42-sinister-facts-medici-dynasty/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2126" instrument_node="">Medicis</span></a><span data-dcnode-id="2124" instrument_node="">, they were one of the most powerful families in Renaissance Italy. From lusty popes to poison plots, the members of House Borgia made </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/40-firey-facts-game-thrones/" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Game of Thrones</span></em></a><span data-dcnode-id="2120" instrument_node=""> look like child’s play.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Watch your back to these cunning facts about the Borgias.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><hr data-dcnode-id="2114"><span data-dcnode-id="2113" instrument_node="">
</span><h1 data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">The Borgias Facts</span></h1><span data-dcnode-id="2110" instrument_node="">
</span><h2 data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">1. A Man of God</span></h2><div class="partial_slot" data-dcnode-id="2107" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2105" instrument_node="">The conniving Borgias we think of today are the tight-knit brood of Rodrigo Borgia and his chief mistress, the beautiful Vannozza dei Cattanei. Also, while this whole “chief mistress” thing might be scandalous enough,</span><strong data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node=""> it gets worse.</span></strong><span data-dcnode-id="2102" instrument_node="">&nbsp;Rodrigo was actually the&nbsp;Pope, and he was supposed to be devoting his life to God, not </span><strong data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">busty bedroom romps.</span></strong></p><span data-dcnode-id="2098" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2090" style="width: 5184px"><div class="media-credit-container aligncenter" data-dcnode-id="2091" style="width: 5184px"><img alt="Borgias Facts" class="size-full wp-image-217132 lazy-loaded" data-dcnode-id="2097" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_.jpg" data-srcset="" height="3456" sizes="(max-width: 5184px) 100vw, 5184px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_.jpg 5184w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-360x240.jpg 360w" width="5184"><noscript data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">&lt;img class="size-full wp-image-217132" src="https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_.jpg" alt="Borgias Facts" width="5184" height="3456" srcset="https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_.jpg 5184w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/architecture-building-religion-church-cathedral-chapel-1268959-pxhere.com_-360x240.jpg 360w" sizes="(max-width: 5184px) 100vw, 5184px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2092"><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pxhere.com/"><span data-dcnode-id="2094" instrument_node="">Pxhere</span></a></span></div></figure><span data-dcnode-id="2089" instrument_node="">
</span><h2 data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">2. We Take Care of Our Own</span></h2><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2085" instrument_node="">It’s worth noting that at this time in Italy, religious leaders were&nbsp;</span><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">the</span></em><span data-dcnode-id="2082" instrument_node=""> most powerful people. </span><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">They had the ability to bestow riches, grant incredible wishes, and brutally ruin&nbsp;people’s lives whenever they wanted.</span></strong><span data-dcnode-id="2079" instrument_node=""> For a time, the Borgias had an iron grip on this power. Not only was Rodrgio named Pope Alexander VI, his own uncle had been Pope before him.</span></p><span data-dcnode-id="2077" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="2069" style="width: 1870px"><div class="media-credit-container aligncenter" data-dcnode-id="2070" style="width: 1870px"><img alt="Borgias Facts" class="size-full wp-image-216983 lazy-loaded" data-dcnode-id="2076" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3.jpg" data-srcset="" height="1524" loading="lazy" sizes="(max-width: 1870px) 100vw, 1870px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3.jpg 1870w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3-768x626.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3-1024x835.jpg 1024w" width="1870"><noscript data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-216983" src="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3.jpg" alt="Borgias Facts" width="1870" height="1524" srcset="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3.jpg 1870w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3-300x244.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3-768x626.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-6-3-1024x835.jpg 1024w" sizes="(max-width: 1870px) 100vw, 1870px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2071"><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ca.wikipedia.org/wiki/Fitxer%3ARetrat_dAlfons_de_Borja_com_a_Calixt_III%2C_Joan_de_Joanes.JPG"><span data-dcnode-id="2073" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2068" instrument_node="">
</span><h2 data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">3. I’m Not a Regular Pope, I’m a Cool Pope</span></h2><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2061"><strong data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Rodrigo Borgia wasn’t your mother’s Pope, to say the least.</span></strong><span data-dcnode-id="2062" instrument_node=""> He loved spending the Catholic Church’s money on all manner of trinkets, luxuries, and spectacles, and&nbsp;Vannozza dei Cattanei was far from his only good time gal. Following his predecessors, Rodrigo also had no problem handing out high-ranking offices to his friends and family.</span></p><span data-dcnode-id="2060" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2052" style="width: 800px"><div class="media-credit-container alignnone" data-dcnode-id="2053" style="width: 800px"><img alt="Cesare Borgia Facts" class="size-full wp-image-251707" data-dcnode-id="2059" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13.jpg" data-srcset="" height="756" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13.jpg 800w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13-300x284.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13-768x726.jpg 768w" width="800"><noscript data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251707" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13.jpg" alt="Cesare Borgia Facts" width="800" height="756" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13.jpg 800w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13-300x284.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-2-13-768x726.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2054"><a data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/Giovanni_Borgia_%28Infans_Romanus%29"><span data-dcnode-id="2056" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2051" instrument_node="">
</span><h2 data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">4. The Borgia Brood</span></h2><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2047" instrument_node="">With his lusty, illicit lady Vannozza, Rodrigo had four children: Giovanni, Cesare, Lucrezia, and Gioffre. Of course, since his name was “Rodrigo Borgia,” </span><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">he also had numerous children with countless other mistresses.</span></strong><span data-dcnode-id="2044" instrument_node=""> It was these four Borgias, though—particularly Cesare and Lucrezia—</span><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">who would soon go down in infamy.</span></strong></p><span data-dcnode-id="2040" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2032" style="width: 3040px"><div class="media-credit-container alignnone" data-dcnode-id="2033" style="width: 3040px"><img alt="Cesare Borgia Facts" class="size-full wp-image-251718 lazy-loaded" data-dcnode-id="2039" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10.jpg" data-srcset="" height="2597" loading="lazy" sizes="(max-width: 3040px) 100vw, 3040px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10.jpg 3040w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-300x256.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-768x656.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-1024x875.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-120x102.jpg 120w" width="3040"><noscript data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251718" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10.jpg" alt="Cesare Borgia Facts" width="3040" height="2597" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10.jpg 3040w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-300x256.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-768x656.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-1024x875.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-5-10-120x102.jpg 120w" sizes="(max-width: 3040px) 100vw, 3040px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2034"><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ACesare_Borgia%2C_Duke_of_Valentinois.jpg"><span data-dcnode-id="2036" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="2031" instrument_node="">
</span><div class="advertisment_notice" data-dcnode-id="2026" style="min-height: 120px;"><div data-dcnode-id="2027"><span data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Advertisement</span></span><div data-dcnode-id="2028" id="div-gpt-ad-3568692-15"></div></div></div><h2 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">5. Lean in, Girl</span></h2><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">Vannozza gave it as good as she got, and Rodrigo wasn’t the only one running around Rome after hours. It was widely accepted that&nbsp;Vannozza also had a fling with Cardinal Giuliano della Rovere, who would himself become Pope Julius II. </span><strong data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Vannozza knew power when she saw it, and she didn’t mind taking some for herself,</span></strong><span data-dcnode-id="2019" instrument_node=""> thank you very much.</span></p><span data-dcnode-id="2017" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2009" style="width: 2024px"><div class="media-credit-container alignnone" data-dcnode-id="2010" style="width: 2024px"><img alt="" class="size-full wp-image-217060" data-dcnode-id="2016" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092.jpg" data-srcset="" height="2473" loading="lazy" sizes="(max-width: 2024px) 100vw, 2024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2017/01/Raffael_092.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092.jpg 2024w, https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092-246x300.jpg 246w, https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092-768x938.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092-838x1024.jpg 838w" width="2024"><noscript data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217060" src="https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092.jpg" alt="" width="2024" height="2473" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092.jpg 2024w, https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092-246x300.jpg 246w, https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092-768x938.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Raffael_092-838x1024.jpg 838w" sizes="(max-width: 2024px) 100vw, 2024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="2011"><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Fichier%3ARaffael_092.jpg"><span data-dcnode-id="2013" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="2008" instrument_node="">
</span><h2 data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">6. Are You My Daddy?</span></h2><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2004" instrument_node="">While Rodrigo was campaigning to become the new pope, </span><strong data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">he refused to acknowledge Vanozza’s children as his own.</span></strong><span data-dcnode-id="2001" instrument_node=""> Instead, he claimed he was their uncle, and distanced himself from the family. Despite this denial, however, Rodrigo doted on his children, bestowing gifts on them and treating them like his own.</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1998" instrument_node="">After he was elected Pope, Rodrigo acknowledged his children, and was&nbsp;</span><strong data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">the first pope to ever do so in history.</span></strong><span data-dcnode-id="1995" instrument_node=""> Naturally, this was highly controversial and only added to the infamy of the Borgias.</span></p><span data-dcnode-id="1993" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1985" style="width: 780px"><div class="media-credit-container alignnone" data-dcnode-id="1986" style="width: 780px"><img alt="Cesare Borgia Facts" class="size-full wp-image-251703" data-dcnode-id="1992" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25.jpg" data-srcset="" height="676" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/FotoJet-25.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25.jpg 780w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25-768x666.jpg 768w" width="780"><noscript data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251703" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25.jpg" alt="Cesare Borgia Facts" width="780" height="676" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25.jpg 780w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-25-768x666.jpg 768w" sizes="(max-width: 780px) 100vw, 780px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1987"><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APope_Alexander_Vi.jpg"><span data-dcnode-id="1989" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1984" instrument_node="">
</span><h2 data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">7. The Young Pope</span></h2><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1980" instrument_node="">From a young age, </span><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-cesare-borgia/"><span data-dcnode-id="1979" instrument_node="">Cesare Borgia</span></a><span data-dcnode-id="1977" instrument_node=""> was groomed to follow in his father’s footsteps as a religious leader.&nbsp;</span><strong data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Incredibly, Cesare was only 15 years old when he became the Bishop of Pamplona.</span></strong><span data-dcnode-id="1974" instrument_node=""> Two years later, he was made the archbishop of Valencia. No word on how his subordinates felt about having a snotty teenaged boy as a boss.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1964" style="width: 750px"><div class="media-credit-container alignnone" data-dcnode-id="1965" style="width: 750px"><img alt="Cesare Borgia Facts" class="size-full wp-image-251714" data-dcnode-id="1971" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11.jpg" data-srcset="" height="687" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11.jpg 750w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11-300x275.jpg 300w" width="750"><noscript data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251714" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11.jpg" alt="Cesare Borgia Facts" width="750" height="687" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11.jpg 750w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-11-300x275.jpg 300w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1966"><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/File%3ACesare_Borgia_as_child.jpg"><span data-dcnode-id="1968" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1963" instrument_node="">
</span><h2 data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">8. You Look Familiar</span></h2><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1959" instrument_node="">Cesare was a </span><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">very handsome man</span></strong><span data-dcnode-id="1956" instrument_node="">. There are even claims that European depictions of Jesus Christ are based off of his&nbsp;face.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1946" style="width: 2966px"><div class="media-credit-container alignnone" data-dcnode-id="1947" style="width: 2966px"><img alt="" class="size-full wp-image-217129 lazy-loaded" data-dcnode-id="1953" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail.jpg" data-srcset="" height="1977" loading="lazy" sizes="(max-width: 2966px) 100vw, 2966px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail.jpg 2966w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-360x240.jpg 360w" width="2966"><noscript data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217129" src="https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail.jpg" alt="" width="2966" height="1977" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail.jpg 2966w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Jesus_Christ_German_steel_engraving_detail-360x240.jpg 360w" sizes="(max-width: 2966px) 100vw, 2966px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1948"><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJesus_Christ_%28German_steel_engraving%29_detail.jpg"><span data-dcnode-id="1950" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1945" instrument_node="">
</span><h2 data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">9.&nbsp;Axe to Grind</span></h2><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">Don’t let his beautiful, messiah-like looks fool you.&nbsp;</span><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Cesare was also said to be the most barbaric member of the utterly ruthless Borgia clan.</span></strong><span data-dcnode-id="1938" instrument_node=""> Just a small example of his bloody hobbies? In the year 1499 alone, Cesare ordered the executions of&nbsp;a Spanish constable, a soldier-captain, and a bishop, among others.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1928" style="width: 4928px"><div class="media-credit-container alignnone" data-dcnode-id="1929" style="width: 4928px"><img alt="" class="lazy-hidden size-full wp-image-217109" data-dcnode-id="1935" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_.jpg 4928w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_-768x509.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_-1024x678.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_-340x225.jpg 340w" height="3264" loading="lazy" sizes="(max-width: 4928px) 100vw, 4928px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4928"><noscript data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217109" src="https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_.jpg" alt="" width="4928" height="3264" srcset="https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_.jpg 4928w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood-tool-weapon-axe-841976-pxhere.com_-768x509.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/sharp-wing-wood </span></div><h2 data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">10. Married for Money</span></h2><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node="">On May 10, 1499, a 23-year-old Cesare married Charlotte of Albret. </span><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">While she may have been beautiful, Charlotte had an even better asset. </span></strong><span data-dcnode-id="1867" instrument_node="">She&nbsp;was the sister of King John III of Navarre. Sadly, it was a loveless marriage; the Borgia family just wanted to secure powerful connections so they could keep their hold on Italy.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1857" style="width: 1576px"><div class="media-credit-container alignnone" data-dcnode-id="1858" style="width: 1576px"><img alt="Cesare Borgia Facts" class="size-full wp-image-251837 lazy-loaded" data-dcnode-id="1864" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1.png" data-srcset="" height="888" loading="lazy" sizes="(max-width: 1576px) 100vw, 1576px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1.png&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1.png 1576w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-300x169.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-768x433.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-1024x577.png 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-328x186.png 328w" width="1576"><noscript data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251837" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1.png" alt="Cesare Borgia Facts" width="1576" height="888" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1.png 1576w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-300x169.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-768x433.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-1024x577.png 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-7-1-328x186.png 328w" sizes="(max-width: 1576px) 100vw, 1576px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1859"><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sho.com/"><span data-dcnode-id="1861" instrument_node="">The Borgias, Showtime Networks</span></a></span></div></figure><span data-dcnode-id="1856" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1855" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF2" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF3"></div><h2 data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">11. Out of Wedlock</span></h2><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1851" instrument_node="">Like father, like son. A decadent, impulsive man, Cesare was known to have had </span><strong data-dcnode-id="1847"><em data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">at least</span></em><span data-dcnode-id="1848" instrument_node=""> 11 illegitimate children</span></strong><span data-dcnode-id="1846" instrument_node=""> outside of his dull marriage to Charlotte. In contrast, he and Charlotte only had a single daughter together, Louisa.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1836" style="width: 1280px"><div class="media-credit-container alignnone" data-dcnode-id="1837" style="width: 1280px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251834" data-dcnode-id="1843" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole-300x180.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole-768x460.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole-1024x613.jpg 1024w" height="766" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1280"><noscript data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251834" src="https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole.jpg" alt="Cesare Borgia Facts" width="1280" height="766" srcset="https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole.jpg 1280w, https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole-300x180.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole-768x460.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/1280px-Lucrezia-Borgia-with-son-Ercole-1024x613.jpg 1024w" sizes="(max-width: 1280px) 100vw, 1280px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1838"><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALucrezia-Borgia-with-son-Ercole.jpg"><span data-dcnode-id="1840" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1835" instrument_node="">
</span><h2 data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">12. Turn of the Tide</span></h2><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">In the summer of 1503, both Cesare and his father Rodrigo were</span><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node=""> struck down by a terrifying and mysterious wasting illness.</span></strong><span data-dcnode-id="1828" instrument_node=""> The two powerful Borgia men were both bedridden and feverish, though the exact cause of their ailment has never been confirmed. While Cesare survived, however, his father tragically did not.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1818" style="width: 1325px"><div class="media-credit-container alignnone" data-dcnode-id="1819" style="width: 1325px"><img alt="" class="lazy-hidden size-full wp-image-251761" data-dcnode-id="1825" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1.png 1325w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1-300x204.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1-768x523.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1-1024x697.png 1024w" height="902" loading="lazy" sizes="(max-width: 1325px) 100vw, 1325px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1325"><noscript data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251761" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1.png" alt="" width="1325" height="902" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1.png 1325w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1-300x204.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1-768x523.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-1-1024x697.png 1024w" sizes="(max-width: 1325px) 100vw, 1325px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1820"><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sho.com/"><span data-dcnode-id="1822" instrument_node="">The Borgias, Showtime Networks</span></a></span></div></figure><span data-dcnode-id="1817" instrument_node="">
</span><h2 data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">13. Make War, Not Love</span></h2><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1813" instrument_node="">Though he was originally groomed for a life of God and even rose to the rank of Cardinal, Cesare eventually decided that a pious existence just wasn’t for him. Instead, he wanted to make war. In 1498, Cesare became</span><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node=""> the first man in history to resign his position as a cardinal,</span></strong><span data-dcnode-id="1810" instrument_node=""> and became more involved in the&nbsp;military.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1800" style="width: 840px"><div class="media-credit-container alignnone" data-dcnode-id="1801" style="width: 840px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251818" data-dcnode-id="1807" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4.jpg 840w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4-768x667.jpg 768w" height="729" loading="lazy" sizes="(max-width: 840px) 100vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="840"><noscript data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251818" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4.jpg" alt="Cesare Borgia Facts" width="840" height="729" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4.jpg 840w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4-300x260.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-14-4-768x667.jpg 768w" sizes="(max-width: 840px) 100vw, 840px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1802"><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/hinkelstone/38111166521"><span data-dcnode-id="1804" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1799" instrument_node="">
</span><h2 data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">14. A Prince Among Men</span></h2><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1795" instrument_node="">Niccolo Machiavelli’s notorious work&nbsp;</span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">The Prince </span></em><span data-dcnode-id="1792" instrument_node="">is reportedly about Cesare Borgia; Machiavelli stayed with the Borgias for a time. The book discusses how best to manipulate your enemies and gain more power. Though some see it as applauding Cesare’s machinations, most interpret it as </span><strong data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">a sarcastic and scathing criticism of a darkly corrupted man.</span></strong></p><span data-dcnode-id="1788" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1780" style="width: 1024px"><div class="media-credit-container alignnone" data-dcnode-id="1781" style="width: 1024px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251796" data-dcnode-id="1787" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b-360x240.jpg 360w" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1024"><noscript data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251796" src="https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b.jpg" alt="Cesare Borgia Facts" width="1024" height="683" srcset="https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/10843539995_f03da09706_b-360x240.jpg 360w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1782"><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/italianembassy/10843539995"><span data-dcnode-id="1784" instrument_node="">Flickr</span></a></span></div></figure><span data-dcnode-id="1779" instrument_node="">
</span><h2 data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">15. Saving Face</span></h2><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1775" instrument_node="">It was said that for a time near the end of his life, </span><strong data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Borgia covered half his face with a mask made out of leather.</span></strong><span data-dcnode-id="1772" instrument_node=""> It’s unknown why he did this, but a likely explanation is that syphilis scarred his once-beautiful face. It seemed as though all his years of wild, late-night carousing had finally caught up with him.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1762" style="width: 960px"><div class="media-credit-container alignnone" data-dcnode-id="1763" style="width: 960px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251804" data-dcnode-id="1769" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670.jpg 960w, https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670-360x240.jpg 360w" height="640" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251804" src="https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670.jpg" alt="Cesare Borgia Facts" width="960" height="640" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670.jpg 960w, https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/Mens-Costume-Hat-Italy-Mask-Venice-Carnival-279670-360x240.jpg 360w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1764"><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maxpixel.net/"><span data-dcnode-id="1766" instrument_node="">Max Pixel</span></a></span></div></figure><span data-dcnode-id="1761" instrument_node="">
</span><h2 data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">16. An Undignified Death</span></h2><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1757" instrument_node="">In the end, the great Cesare Borgia died a brutal and undignified death. As his life wore on, he was eventually pushed out of power and increasingly despised. In 1507, he was fighting in a military campaign when&nbsp;a group of knights tried to escape the castle during a storm, only to be chased by a furious Cesare. </span><strong data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">This was fatal mistake.&nbsp;</span></strong></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1752" instrument_node="">Cesare’s temper got the better of him, and he ran far from the safety of his own army, leaving him vulnerable. The knights he was chasing realized this and quickly turned on him, stabbing him to death and stripping him of his opulent jewelry and fine clothing. Once a highly feared and hated leader, </span><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Cesare was left a cold, naked corpse in the middle of a violent storm.</span></strong></p><span data-dcnode-id="1748" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1740" style="width: 1097px"><div class="media-credit-container alignnone" data-dcnode-id="1741" style="width: 1097px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251846" data-dcnode-id="1747" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4.jpg 1097w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-300x255.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-768x653.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-1024x871.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-120x102.jpg 120w" height="933" loading="lazy" sizes="(max-width: 1097px) 100vw, 1097px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1097"><noscript data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251846" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4.jpg" alt="Cesare Borgia Facts" width="1097" height="933" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4.jpg 1097w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-300x255.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-768x653.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-1024x871.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-15-4-120x102.jpg 120w" sizes="(max-width: 1097px) 100vw, 1097px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1742"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARitratto_di_Cesare_Borgia%2C_Sebastiano_del_Piombo.jpg"><span data-dcnode-id="1744" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1739" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1738" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF3" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF4"></div><h2 data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">17. Gender Equality</span></h2><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1734" instrument_node="">Lucrezia Borgia, the middle child and the only girl of the four Borgia siblings, didn’t let her brothers have all the fun. In fact, </span><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Lucrezia</span></strong><span data-dcnode-id="1731" instrument_node="">&nbsp;</span><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">was just as lustful and murderous as the rest of the Borgias.</span></strong></p><span data-dcnode-id="1727" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1719" style="width: 4272px"><div class="media-credit-container aligncenter" data-dcnode-id="1720" style="width: 4272px"><img alt="Borgias Facts" class="lazy-hidden size-full wp-image-328215" data-dcnode-id="1726" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-360x240.jpg 360w" height="2848" loading="lazy" sizes="(max-width: 4272px) 100vw, 4272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4272"><noscript data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-328215" src="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia.jpg" alt="Borgias Facts" width="4272" height="2848" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-360x240.jpg 360w" sizes="(max-width: 4272px) 100vw, 4272px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1721"><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/"><span data-dcnode-id="1723" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1718" instrument_node="">
</span><h2 data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">18. A Florence 10</span></h2><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1708"><strong data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Lucrezia was a renowned beauty.</span></strong><span data-dcnode-id="1712" instrument_node=""> Observers described her long, thick blonde hair down to her knees, her smooth skin, and her hazel eyes. She was also said to be, er, very </span><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">well-endowed in the cleavage department</span></strong><span data-dcnode-id="1709" instrument_node="">, and she apparently carried herself with a natural elegance that made her look like she could “walk on air.”</span></p><span data-dcnode-id="1707" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1699" style="width: 4272px"><div class="media-credit-container aligncenter" data-dcnode-id="1700" style="width: 4272px"><img alt="Borgias Facts" class="lazy-hidden size-full wp-image-328248" data-dcnode-id="1706" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-360x240.jpg 360w" height="2848" loading="lazy" sizes="(max-width: 4272px) 100vw, 4272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4272"><noscript data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-328248" src="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3.jpg" alt="Borgias Facts" width="4272" height="2848" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-3-360x240.jpg 360w" sizes="(max-width: 4272px) 100vw, 4272px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1701"><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/"><span data-dcnode-id="1703" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1698" instrument_node="">
</span><h2 data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">19. The Go-Between</span></h2><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1694" instrument_node="">Smart, well-educated, and breathtakingly beautiful, even as a girl Lucrezia was often used as a family bargaining chip. Her father and brothers sought out the most advantageous matches for her—that is, the political alliances that would most benefit their</span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node=""> own</span></em><span data-dcnode-id="1691" instrument_node=""> ploys for power. </span><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">She was married three times throughout her life.</span></strong></p><span data-dcnode-id="1687" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1679" style="width: 4272px"><div class="media-credit-container aligncenter" data-dcnode-id="1680" style="width: 4272px"><img alt="Borgias Facts" class="lazy-hidden size-full wp-image-328218" data-dcnode-id="1686" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-360x240.jpg 360w" height="2848" loading="lazy" sizes="(max-width: 4272px) 100vw, 4272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4272"><noscript data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-328218" src="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2.jpg" alt="Borgias Facts" width="4272" height="2848" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Lucrezia-Borgia-2-360x240.jpg 360w" sizes="(max-width: 4272px) 100vw, 4272px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1681"><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/"><span data-dcnode-id="1683" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1678" instrument_node="">
</span><h2 data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">20. A Little Knowledge Is a Dangerous Thing</span></h2><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1674" instrument_node="">Little Lucrezia was given the best Humanist education available at the time, but </span><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">this was actually incredibly scandalous.</span></strong><span data-dcnode-id="1671" instrument_node=""> Girls of her era were usually dependent on convents to give them their education, and the nuns would generally emphasize piety and godly obedience. Lucrezia’s schooling in language, poetry, and oration was considered </span><strong data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">radical and even degenerate.</span></strong></p><span data-dcnode-id="1667" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1659" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="1660" style="width: 1000px"><img alt="Whole Class Laughed Facts" class="lazy-hidden size-full wp-image-310862" data-dcnode-id="1666" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-360x240.jpg 360w" height="664" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-310862" src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227.jpg" alt="Whole Class Laughed Facts" width="1000" height="664" srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_95453227-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1663" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1658" instrument_node="">
</span><h2 data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">21. Who Run the World?</span></h2><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">Whatever her contemporaries thought, Lucrezia’s education </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">turned her into a powerhouse.</span></strong><span data-dcnode-id="1651" instrument_node=""> She was an excellent administrator as an adult and, thanks in part to her family’s deep-rooted nepotism, she reigned as the Governor of Spoleto all on her own. This lofty position had previously only been granted to (male) cardinals of the Church.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1641" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="1642" style="width: 1200px"><img alt="Margaret Tudor Facts" class="lazy-hidden size-full wp-image-282805" data-dcnode-id="1648" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt-1024x535.jpg 1024w" height="627" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-282805" src="https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt.jpg" alt="Margaret Tudor Facts" width="1200" height="627" srcset="https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt.jpg 1200w, https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt-300x157.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt-768x401.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/fb-twitter-1-alt-1024x535.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1643"><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="1645" instrument_node="">Getty Images</span></a></span></div></figure><span data-dcnode-id="1640" instrument_node="">
</span><h2 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">22. Pick Your Poison</span></h2><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node="">Though Cesare preferred blood and beatings, Lucrezia’s weapon of choice was reportedly poison. Some said that one of her favorite rings was actually hollowed out in the middle,&nbsp;and that </span><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">she used it to slip a little poison into the drinks of unsuspecting guests.</span></strong><span data-dcnode-id="1633" instrument_node=""> Given her upbringing, we wouldn’t put it past her…</span></p><span data-dcnode-id="1631" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1623" style="width: 4982px"><div class="media-credit-container alignnone" data-dcnode-id="1624" style="width: 4982px"><img alt="" class="lazy-hidden size-full wp-image-217122" data-dcnode-id="1630" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225.jpg 4982w, https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225-300x131.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225-768x335.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225-1024x446.jpg 1024w" height="2172" loading="lazy" sizes="(max-width: 4982px) 100vw, 4982px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4982"><noscript data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217122" src="https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225.jpg" alt="" width="4982" height="2172" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225.jpg 4982w, https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225-300x131.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225-768x335.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Gold_ring_with_container_Swiss._Wellcome_M0013225-1024x446.jpg 1024w" sizes="(max-width: 4982px) 100vw, 4982px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1625"><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AGold_ring_with_container%3B_Swiss._Wellcome_M0013225.jpg"><span data-dcnode-id="1627" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1622" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1621" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF4" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF5"></div><h2 data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">23. Third Time’s the Charm</span></h2><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">As a (very) young, eligible bachelorette, </span><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Lucrezia’s family spent a lot of time finding her the right (first) husband.</span></strong><span data-dcnode-id="1614" instrument_node=""> Her first “matrimonial arrangement” never left the bureaucratic stages, and her father Rodrigo called it off after only two months. Her next arrangement was also canceled after Rodrigo became Pope and Lucrezia’s prospects moved up even further in the world.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1611" instrument_node="">Finally, in 1493, the Borgias found a perfect match for their little 13-year-old girl: Giovanni Sforza. He was a Count and an illegitimate son of their powerful rivals in the Sforza clan.</span><strong data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node=""> It was not true love, and it had a tragic end.</span></strong></p><span data-dcnode-id="1607" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1599" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="1600" style="width: 1000px"><img alt="Usurpers Facts" class="lazy-hidden size-full wp-image-311376" data-dcnode-id="1606" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-360x240.jpg 360w" height="665" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-311376" src="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960.jpg" alt="Usurpers Facts" width="1000" height="665" srcset="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-768x511.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_318578960-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1601"><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1603" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1598" instrument_node="">
</span><h2 data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">24. Every Family Has Them…</span></h2><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1594" instrument_node="">The Borgias stuck together, but that didn’t mean there weren’t </span><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">bloody secrets and plots within the family.</span></strong><span data-dcnode-id="1591" instrument_node=""> In fact, Lucrezia’s brother Cesare reportedly once tried (and failed) to assassinate his own brother-in-law, Giovanni Sforza. Cesare was unhappy that the marriage wasn’t so politically useful for the family anymore.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Giovanni fled to Rome to escape an attack, and the Borgias pressured him into an annulment instead.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1578" style="width: 1632px"><div class="media-credit-container alignnone" data-dcnode-id="1579" style="width: 1632px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251755" data-dcnode-id="1585" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2.png 1632w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2-300x166.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2-768x424.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2-1024x566.png 1024w" height="902" loading="lazy" sizes="(max-width: 1632px) 100vw, 1632px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1632"><noscript data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251755" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2.png" alt="Cesare Borgia Facts" width="1632" height="902" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2.png 1632w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2-300x166.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2-768x424.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-3-2-1024x566.png 1024w" sizes="(max-width: 1632px) 100vw, 1632px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1580"><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atlantique-productions.fr/"><span data-dcnode-id="1582" instrument_node="">Borgia, Atlantique Productions </span></a></span></div></figure><span data-dcnode-id="1577" instrument_node="">
</span><h2 data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">25. Baby Mama Drama</span></h2><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1570"><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Lucrezia may have had a secret, illicit love child.</span></strong><span data-dcnode-id="1571" instrument_node=""> During the long process of annulling her marriage to Giovanni, some say she started having an affair with a handsome man named Pedro Calderon. Though there is little proof, she did suspiciously enter a convent, a common move of pregnant women who wanted to have their babies in a cloister to hide their “sin.”</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1565"><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Then the story gets even more scandalous.&nbsp;</span></strong><span data-dcnode-id="1566" instrument_node="">Around this time, Pedro Calderon’s body was found in the Tiber river along with a chambermaid. Sounds like somebody was tying up loose ends…</span></p><span data-dcnode-id="1564" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1556" style="width: 960px"><div class="media-credit-container aligncenter" data-dcnode-id="1557" style="width: 960px"><img alt="Steve Irwin Quiz" class="lazy-hidden size-full wp-image-234499" data-dcnode-id="1563" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969.jpg 960w, https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969-300x181.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969-768x464.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969-845x510.jpg 845w" height="580" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-234499" src="https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969.jpg" alt="Steve Irwin Quiz" width="960" height="580" srcset="https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969.jpg 960w, https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969-300x181.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969-768x464.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/Chalk-Board-Think-Question-Mark-Solution-Hand-Drawn-2123969-845x510.jpg 845w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1558"><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maxpixel.net/"><span data-dcnode-id="1560" instrument_node="">Max Pixel</span></a></span></div></figure><span data-dcnode-id="1555" instrument_node="">
</span><h2 data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">26. The Second Husbands Club</span></h2><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1551" instrument_node="">With Giovanni Sforza behind her, Lucrezia was single and ready to mingle. Her family quickly married her off to Duke Alfonso of Aragon in 1498, even as the ink was still drying on her annulment. As it turned out, this second marriage was even shorter than her union with Sforza—</span><strong data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">and</span></strong><span data-dcnode-id="1548" instrument_node="">&nbsp;</span><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">ten times more violent and tragic.&nbsp;</span></strong></p><span data-dcnode-id="1544" instrument_node="">
