</span><figure class="wp-caption aligncenter" data-dcnode-id="1536" style="width: 1920px"><div class="media-credit-container aligncenter" data-dcnode-id="1537" style="width: 1920px"><img alt="Luck Was On Their Side facts" class="lazy-hidden size-full wp-image-304129" data-dcnode-id="1543" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-328x186.jpg 328w" height="1080" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1920"><noscript data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-304129" src="https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920.jpg" alt="Luck Was On Their Side facts" width="1920" height="1080" srcset="https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920.jpg 1920w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-300x169.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-768x432.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-1024x576.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/05/engagement-ring-2093824_1920-328x186.jpg 328w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1538"><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/"><span data-dcnode-id="1540" instrument_node="">Pixabay </span></a></span></div></figure><span data-dcnode-id="1535" instrument_node="">
</span><h2 data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">27. Quicker Than a Divorce</span></h2><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1531" instrument_node="">Eventually when you go around trying to assassinate people willy nilly, you’ll finally get lucky. Soon after their wedding, Cesare Borgia may have succeeded in murdering Lucrezia’s second husband&nbsp;Alfonso of Aragon. In July 1500, just as Alfonso’s&nbsp;use to the Borgia family was also waning, </span><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">a horrific and unforgivable crime took place.</span></strong></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">On the top steps of St. Peter’s Basilica in Vatican City, hired killers attacked Alfonso and stabbed him multiple times. Miraculously, he survived the initial ambush—</span><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">but the worst was yet to come.</span></strong><span data-dcnode-id="1523" instrument_node=""> As he was recovering a few days later, another group of armed men burst into his room and strangled the invalid to death.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1520" instrument_node="">After the dust settled, many whispered that Cesare Borgia was behind the hit. </span><strong data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">After all, Lucrezia was now free to make another advantageous marriage…</span></strong></p><span data-dcnode-id="1516" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1508" style="width: 930px"><div class="media-credit-container alignnone" data-dcnode-id="1509" style="width: 930px"><img alt="" class="lazy-hidden size-full wp-image-217120" data-dcnode-id="1515" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2.jpg 930w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2-768x519.jpg 768w" height="628" loading="lazy" sizes="(max-width: 930px) 100vw, 930px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="930"><noscript data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217120" src="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2.jpg" alt="" width="930" height="628" srcset="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2.jpg 930w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2-300x203.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-9-2-768x519.jpg 768w" sizes="(max-width: 930px) 100vw, 930px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1510"><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.m.wikipedia.org/wiki/Fichier%3AAlfonso_V_rey_de_Aragn.jpg"><span data-dcnode-id="1512" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1507" instrument_node="">
</span><h2 data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">28. My First Duchess</span></h2><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1497"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">In 1502, Lucrezia finally found her one and only</span></strong><span data-dcnode-id="1501" instrument_node="">—or at least a man who was useful enough to her family that they didn’t have him </span><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">brutally murdered</span></strong><span data-dcnode-id="1498" instrument_node=""> shortly after the marriage. That year, she married Alfonso I d’Este, the Duke of Ferrara. Lucrezia gave birth to eight children during their union, and enjoyed the lavish life of a Duchess.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1488" style="width: 4272px"><div class="media-credit-container aligncenter" data-dcnode-id="1489" style="width: 4272px"><img alt="Borgias Facts" class="lazy-hidden size-full wp-image-328238" data-dcnode-id="1495" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-360x240.jpg 360w" height="2848" loading="lazy" sizes="(max-width: 4272px) 100vw, 4272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4272"><noscript data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-328238" src="https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este.jpg" alt="Borgias Facts" width="4272" height="2848" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este.jpg 4272w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Alfonso-este-360x240.jpg 360w" sizes="(max-width: 4272px) 100vw, 4272px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1490"><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/"><span data-dcnode-id="1492" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1487" instrument_node="">
</span><h2 data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">29. The Winner Takes It All</span></h2><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">During this time, Lucrezia tried to shake off</span><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node=""> the dark reputation that had followed her family for decades.&nbsp;</span></strong><span data-dcnode-id="1480" instrument_node="">After the death of her father Rodrigo and her brother Cesare—tragedies that hastened the fall of the Borgia clan—Lucrezia still somehow managed to maintain a lavish, cushy position in aristocratic Italian society.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1470" style="width: 900px"><div class="media-credit-container alignnone" data-dcnode-id="1471" style="width: 900px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251829" data-dcnode-id="1477" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri-300x223.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri-768x572.jpg 768w" height="670" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="900"><noscript data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251829" src="https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri.jpg" alt="Cesare Borgia Facts" width="900" height="670" srcset="https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri.jpg 900w, https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri-300x223.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/Cesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri-768x572.jpg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1472"><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/File%3ACesare-borgia-leaving-the-vatican-giuseppe-lorenzo-gatteri.jpg"><span data-dcnode-id="1474" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">30. Cougar on the Loose</span></h2><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">However, Lucrezia didn’t let the joys of motherhood and matrimony stop her from having</span><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node=""> a series of lusty, steamy affairs</span></strong><span data-dcnode-id="1462" instrument_node="">. Her most passionate tryst was with her own brother-in-law, Francesco II Gonzaga. The two wrote each other a stream of feverish letters where they spent more time praising each other’s bodies than discussing any notions of true love.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1452" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="1453" style="width: 1000px"><img alt="H.P. Lovecraft facts" class="lazy-hidden size-full wp-image-319909" data-dcnode-id="1459" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-319909" src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003.jpg" alt="H.P. Lovecraft facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_288806003-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1454"><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1456" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1451" instrument_node="">
</span><h2 data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">31. Frenemies 101</span></h2><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1444"><strong data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Lucrezia’s affair with Francesco may have been motivated by revenge as much as by lust.</span></strong><span data-dcnode-id="1445" instrument_node=""> Francesco’s wife was the elegant, cultured, and intelligent Isabella d’Este, who Lucrezia had previously tried to befriend as an intellectual equal. When Isabella scornfully turned Lucrezia down as a pal, Lucrezia “coincidentally” ended up in her husband’s bed soon after.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1435" style="width: 5500px"><div class="media-credit-container aligncenter" data-dcnode-id="1436" style="width: 5500px"><img alt="Secrets Not Supposed to Know facts" class="lazy-hidden size-full wp-image-300478" data-dcnode-id="1442" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738.jpg 5500w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-360x240.jpg 360w" height="3667" loading="lazy" sizes="(max-width: 5500px) 100vw, 5500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5500"><noscript data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-300478" src="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738.jpg" alt="Secrets Not Supposed to Know facts" width="5500" height="3667" srcset="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738.jpg 5500w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_1345190738-360x240.jpg 360w" sizes="(max-width: 5500px) 100vw, 5500px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1437"><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1439" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1434" instrument_node="">
</span><h2 data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">32. The Poets Dreamed</span></h2><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">One of Lucrezia’s other notable affairs (yeah, she got around) was with famed poet Pietro Bembo. Unlike her animalistic letters to Franceso, </span><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">the love letters the two exchanged are legendarily moving.</span></strong><span data-dcnode-id="1427" instrument_node=""> In one, the poet writes, “Often I find myself recalling, and with what ease, certain words spoken to me, some on the balcony with the moon as witness.”</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1424" instrument_node="">The poet </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/facts-lord-byron/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1423" instrument_node="">Lord Byron</span></a><span data-dcnode-id="1421" instrument_node=""> later called them </span><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">“The prettiest love letters in the world.”</span></strong></p><span data-dcnode-id="1417" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1409" style="width: 1200px"><div class="media-credit-container aligncenter" data-dcnode-id="1410" style="width: 1200px"><img alt="George R.R. Martin Facts" class="lazy-hidden size-full wp-image-324027" data-dcnode-id="1416" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659.jpg 1200w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-1024x680.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-360x240.jpg 360w" height="797" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-324027" src="https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659.jpg" alt="George R.R. Martin Facts" width="1200" height="797" srcset="https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659.jpg 1200w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-300x199.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-768x510.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-1024x680.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/12/fountain_pen_ink_pen_business_document_writing_office_signature-673659-360x240.jpg 360w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1411"><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pxhere.com/"><span data-dcnode-id="1413" instrument_node="">PxHere</span></a></span></div></figure><span data-dcnode-id="1408" instrument_node="">
</span><h2 data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">33. No Parent Should Survive Their Child</span></h2><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">The Borgia matriach Vannozza dei Cattanei managed to outlive all her sons. Only her Lucrezia would live long enough to bury Vannozza after her death in November 1518.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1394" style="width: 732px"><div class="media-credit-container alignnone" data-dcnode-id="1395" style="width: 732px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251820" data-dcnode-id="1401" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-16.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-16.jpg 732w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-16-300x244.jpg 300w" height="596" loading="lazy" sizes="(max-width: 732px) 100vw, 732px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="732"><noscript data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251820" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-16.jpg" alt="Cesare Borgia Facts" width="732" height="596" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-16.jpg 732w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-1-16-300x244.jpg 300w" sizes="(max-width: 732px) 100vw, 732px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1396"><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AVannozza_Cattanei.jpg"><span data-dcnode-id="1398" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1393" instrument_node="">
</span><h2 data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">34. A Mother’s Worst Nightmare</span></h2><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1389" instrument_node="">Though Lucrezia had many children with the Duke of Ferrara, she often suffered miscarriages, even once giving birth to a </span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">stillborn child.</span></strong></p><span data-dcnode-id="1385" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1377" style="width: 4896px"><div class="media-credit-container aligncenter" data-dcnode-id="1378" style="width: 4896px"><img alt="Hardest News They’ve Had To Break facts" class="lazy-hidden size-full wp-image-309104" data-dcnode-id="1384" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349.jpg 4896w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349-768x580.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349-1024x773.jpg 1024w" height="3695" loading="lazy" sizes="(max-width: 4896px) 100vw, 4896px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4896"><noscript data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-309104" src="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349.jpg" alt="Hardest News They’ve Had To Break facts" width="4896" height="3695" srcset="https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349.jpg 4896w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349-300x226.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349-768x580.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/06/shutterstock_96603349-1024x773.jpg 1024w" sizes="(max-width: 4896px) 100vw, 4896px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1379"><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1381" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1376" instrument_node="">
</span><h2 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">35. A Close Call</span></h2><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1372" instrument_node="">In 1519, Lucrezia was pregnant again, and gave birth to a living little girl named Isabella that June. But the child was sickly, and her parents were terrified that she would die unbaptized. Luckily, Alfonso got her blessed as soon as possible and even named her grandparents before the baby died later that day. </span><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Yet sadly, even more tragedy was lurking.</span></strong></p><span data-dcnode-id="1368" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1360" style="width: 2250px"><div class="media-credit-container aligncenter" data-dcnode-id="1361" style="width: 2250px"><img alt="Weirdest Rule Facts" class="lazy-hidden size-full wp-image-306693" data-dcnode-id="1367" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716.jpeg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716.jpeg 2250w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-300x200.jpeg 300w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-768x512.jpeg 768w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-1024x683.jpeg 1024w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-360x240.jpeg 360w" height="1500" loading="lazy" sizes="(max-width: 2250px) 100vw, 2250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2250"><noscript data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-306693" src="https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716.jpeg" alt="Weirdest Rule Facts" width="2250" height="1500" srcset="https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716.jpeg 2250w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-300x200.jpeg 300w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-768x512.jpeg 768w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-1024x683.jpeg 1024w, https://www.factinate.com/wp-content/uploads/2019/06/pexels-photo-839716-360x240.jpeg 360w" sizes="(max-width: 2250px) 100vw, 2250px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1362"><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/"><span data-dcnode-id="1364" instrument_node="">Pexels</span></a></span></div></figure><span data-dcnode-id="1359" instrument_node="">
</span><h2 data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">36. Rest in Peace</span></h2><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">The 39-year-old Lucrezia had been dangerously unhealthy throughout her late-in-life pregnancy, and she became very ill after the birth. Alfonso tried to nurse his wife back to health, and after two days of recovery, she seemed to be doing better. </span><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">It was a false hope.</span></strong><span data-dcnode-id="1352" instrument_node=""> Lucrezia Borgia died just 10 days after little Isabella on June 24th.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1342" style="width: 1000px"><div class="media-credit-container aligncenter" data-dcnode-id="1343" style="width: 1000px"><img alt="Brandon Lee Facts" class="lazy-hidden size-full wp-image-299526" data-dcnode-id="1349" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-299526" src="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011.jpg" alt="Brandon Lee Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/05/shutterstock_751496011-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1344"><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1346" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1341" instrument_node="">
</span><h2 data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">37. Haters Gonna Hate</span></h2><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">It was a little ironic to some that two of the Borgias would become Pope, and multiple others cardinals. According to several rumors, the Borgias were in fact Jewish. Still, that&nbsp;was probably&nbsp;the haterade talking.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1327" style="width: 960px"><div class="media-credit-container alignnone" data-dcnode-id="1328" style="width: 960px"><img alt="" class="lazy-hidden size-full wp-image-217019" data-dcnode-id="1334" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720.jpg 960w, https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720-768x576.jpg 768w" height="720" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="960"><noscript data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217019" src="https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720.jpg" alt="" width="960" height="720" srcset="https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720.jpg 960w, https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/flag-21096_960_720-768x576.jpg 768w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1329"><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pixabay.com/"><span data-dcnode-id="1331" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="1326" instrument_node="">
</span><h2 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">38. Caught in a Lie</span></h2><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">The Borgias didn’t exactly help these rumors, however. </span><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Several dubious claims cloud their geneaology. </span></strong><span data-dcnode-id="1319" instrument_node="">Perhaps the worst one was their claim to be linked&nbsp;to a man who, in fact, had no children.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1309" style="width: 5616px"><div class="media-credit-container aligncenter" data-dcnode-id="1310" style="width: 5616px"><img alt="Kit Harington facts" class="lazy-hidden size-full wp-image-322010" data-dcnode-id="1316" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360.jpg 5616w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-360x240.jpg 360w" height="3744" loading="lazy" sizes="(max-width: 5616px) 100vw, 5616px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="5616"><noscript data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-322010" src="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360.jpg" alt="Kit Harington facts" width="5616" height="3744" srcset="https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360.jpg 5616w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/07/shutterstock_540580360-360x240.jpg 360w" sizes="(max-width: 5616px) 100vw, 5616px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1311"><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1313" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1308" instrument_node="">
</span><h2 data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">39. Rivalries</span></h2><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1304" instrument_node="">Politically ambitious and not above lies and treachery, it wasn’t long before the Borgias ran afoul of Italy’s other noble families. These included the Medici, as well as the della Rovere and Sforza families. These movers and shakers of Renaissance Italy were </span><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">constantly vying with—and killing—each other just to gain another small shred of power.</span></strong></p><span data-dcnode-id="1300" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1292" style="width: 733px"><div class="media-credit-container aligncenter" data-dcnode-id="1293" style="width: 733px"><img alt="Diane de Poitiers Facts" class="lazy-hidden size-full wp-image-311765" data-dcnode-id="1299" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/06/Selection_172.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/06/Selection_172.png 733w, https://www.factinate.com/wp-content/uploads/2019/06/Selection_172-300x286.png 300w" height="699" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="733"><noscript data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-311765" src="https://www.factinate.com/wp-content/uploads/2019/06/Selection_172.png" alt="Diane de Poitiers Facts" width="733" height="699" srcset="https://www.factinate.com/wp-content/uploads/2019/06/Selection_172.png 733w, https://www.factinate.com/wp-content/uploads/2019/06/Selection_172-300x286.png 300w" sizes="(max-width: 733px) 100vw, 733px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1294"><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AKatharinavonMedici.jpg"><span data-dcnode-id="1296" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1291" instrument_node="">
</span><h2 data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">40. Media Stars</span></h2><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1287" instrument_node="">The Borgias remain fixed in our cultural memory. They have appeared as characters in dozens—if not hundreds—of novels, films, television programs, and comic books. They even have a prominent place in the</span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node=""> Assassin’s Creed</span></em><span data-dcnode-id="1284" instrument_node=""> video games—bet the first Borgias never saw that coming,</span><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node=""> no matter how lofty their ambitions were.</span></strong></p><span data-dcnode-id="1280" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1272" style="width: 3216px"><div class="media-credit-container alignnone" data-dcnode-id="1273" style="width: 3216px"><img alt="" class="lazy-hidden size-full wp-image-217125" data-dcnode-id="1279" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias.jpg 3216w, https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias-768x573.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias-1024x764.jpg 1024w" height="2400" loading="lazy" sizes="(max-width: 3216px) 100vw, 3216px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="3216"><noscript data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217125" src="https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias.jpg" alt="" width="3216" height="2400" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias.jpg 3216w, https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias-300x224.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias-768x573.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Os_borgias-1024x764.jpg 1024w" sizes="(max-width: 3216px) 100vw, 3216px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1274"><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pt.wikipedia.org/wiki/Ficheiro%3AOs_borgias.jpg"><span data-dcnode-id="1276" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1271" instrument_node="">
</span><h2 data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">41. Patron of the Arts</span></h2><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1267" instrument_node="">Cesare Borgia was well-connected among the artists of the Renaissance, and</span><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node=""> he had good taste.</span></strong><span data-dcnode-id="1264" instrument_node=""> He even hired the genius </span><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/people/42-inventive-facts-leonardo-da-vinci/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1263" instrument_node="">Leonardo da Vinci</span></a><span data-dcnode-id="1261" instrument_node=""> to be his military architect and engineer in 1502. While under Cesare’s employ, da Vinci had total freedom to inspect and direct any construction project in any lands under Cesare’s control.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1251" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1252" style="width: 1000px"><img alt="Famous Last Words Facts" class="lazy-hidden size-full wp-image-243726" data-dcnode-id="1258" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243726" src="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349.jpg" alt="Famous Last Words Facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349.jpg 1000w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/11/shutterstock_1213566349-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1253"><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1255" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1250" instrument_node="">
</span><h2 data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">42. Image Problems</span></h2><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">The Borgias’ reputation for evil and deception survived long after their influence declined.</span></strong><span data-dcnode-id="1244" instrument_node=""> In 1893, the artist John Collier painted Cesare, Lucrezia, and their father seated around a banquet table. Cesare offers a cup of wine to an unknown young man who refuses—wisely perhaps, given the Borgias’ supposed penchant for poison.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1234" style="width: 2043px"><div class="media-credit-container alignnone" data-dcnode-id="1235" style="width: 2043px"><img alt="" class="lazy-hidden size-full wp-image-217027" data-dcnode-id="1241" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier.jpg 2043w, https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier-768x643.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier-1024x857.jpg 1024w" height="1710" loading="lazy" sizes="(max-width: 2043px) 100vw, 2043px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="2043"><noscript data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217027" src="https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier.jpg" alt="" width="2043" height="1710" srcset="https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier.jpg 2043w, https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier-300x251.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier-768x643.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/A_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier-1024x857.jpg 1024w" sizes="(max-width: 2043px) 100vw, 2043px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1236"><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AA_Glass_of_Wine_with_Caesar_Borgia_-_John_Collier.jpg"><span data-dcnode-id="1238" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1233" instrument_node="">
</span><h2 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">43. Unfair Image</span></h2><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1229" instrument_node="">While there are certainly enough stories to paint the Borgias as great villains of history, there are some who argue their reputation isn’t entirely fair. Modern historians now point out that many of the stories surrounding the Borgias come from a small handful of contemporary chroniclers and the Borgias’ many enemies. </span><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Still, it’s pretty hard to make some of this up….</span></strong></p><span data-dcnode-id="1225" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1217" style="width: 1440px"><div class="media-credit-container alignnone" data-dcnode-id="1218" style="width: 1440px"><img alt="" class="lazy-hidden size-full wp-image-217157" data-dcnode-id="1224" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13.jpg 1440w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13-300x291.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13-768x746.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13-1024x994.jpg 1024w" height="1398" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1440"><noscript data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217157" src="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13.jpg" alt="" width="1440" height="1398" srcset="https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13.jpg 1440w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13-300x291.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13-768x746.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/FotoJet-13-1024x994.jpg 1024w" sizes="(max-width: 1440px) 100vw, 1440px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1219"><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pixabay.com/"><span data-dcnode-id="1221" instrument_node="">Pixabay</span></a></span></div></figure><span data-dcnode-id="1216" instrument_node="">
</span><h2 data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">44. She Had a Type</span></h2><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1212" instrument_node="">The baby of the Borgia family was Gioffre, but they made sure to take good care of him. In 1494, daddy Rodrigo arranged to marry Gioffre to the beautiful and powerful Princess Sancha of Aragon, who was the daughter of the King of Naples. It might have been a match made in heaven—</span><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">except it was an absolute living nightmare.&nbsp;</span></strong></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">Seductive Sancha allegedly had affairs with&nbsp;</span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">both</span></em><span data-dcnode-id="1204" instrument_node=""> of Gioffre’s brothers, Cesare and Giovanni.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1194" style="width: 700px"><div class="media-credit-container alignnone" data-dcnode-id="1195" style="width: 700px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251716" data-dcnode-id="1201" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-11.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-11.jpg 700w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-11-300x215.jpg 300w" height="502" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="700"><noscript data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251716" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-11.jpg" alt="Cesare Borgia Facts" width="700" height="502" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-11.jpg 700w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-4-11-300x215.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1196"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mk.wikipedia.org/wiki/%3ASancha_jofre_borgia.jpg"><span data-dcnode-id="1198" instrument_node="">Wikipedia</span></a></span></div></figure><span data-dcnode-id="1193" instrument_node="">
</span><h2 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">45. O Brother, Who Killed Thou?</span></h2><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1189" instrument_node="">On June 14, 1497, </span><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">a tragedy and an enduring mystery struck the Borgia clan.&nbsp;</span></strong><span data-dcnode-id="1186" instrument_node="">On this date, Giovanni Borgia was brutally murdered under suspicious and vastly uncertain circumstances. He&nbsp;was last seen with Cesare and the rest of his siblings in their mother’s home. When Giovanni left the house, he was never seen alive again.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">Instead, in the dawn light of the next morning, </span><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Giovanni’s horse returned home riderless.</span></strong><span data-dcnode-id="1180" instrument_node=""> His body was later found in the Tiber river with his throat slit and nine stab wounds in his chest.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1170" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1171" style="width: 1000px"><img alt="Russian Empire quiz" class="lazy-hidden size-full wp-image-249244" data-dcnode-id="1177" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-249244" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965.jpg" alt="Russian Empire quiz" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_418181965-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1172"><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1174" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1169" instrument_node="">
</span><h2 data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">46. Father Knows Best</span></h2><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1165" instrument_node="">In the aftermath of his son’s murder, patriarch Rodrigo Borgia was devastated, and he insisted on a thorough investigation. </span><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">However, just a week into the case, he suddenly called the whole thing off.</span></strong></p><span data-dcnode-id="1161" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1153" style="width: 1000px"><div class="media-credit-container alignnone" data-dcnode-id="1154" style="width: 1000px"><img alt="Richard Neville facts" class="lazy-hidden size-full wp-image-243334" data-dcnode-id="1160" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955-360x240.jpg 360w" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1000"><noscript data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-243334" src="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955.jpg" alt="Richard Neville facts" width="1000" height="667" srcset="https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955.jpg 1000w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/01/shutterstock_573264955-360x240.jpg 360w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1155"><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="1157" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1152" instrument_node="">
</span><h2 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">47. Keeping It in the Family</span></h2><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1148" instrument_node="">The reasons behind Rodrigo’s decision will always be a mystery, as will the answers to Giovanni’s death. However, we do have some clues. </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Both Giovanni’s brothers are suspects in his murder.&nbsp;</span></strong><span data-dcnode-id="1145" instrument_node="">Giovanni was taking on more responsibility and power in the family, which may have sent Cesare into a jealous rage. As for Gioffre? Well, Giovanni&nbsp;</span><em data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">was</span></em><span data-dcnode-id="1142" instrument_node=""> having an affair with his wife.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Given these circumstances, perhaps Rodrigo wanted to avoid pointing the finger at his own beloved sons.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1129" style="width: 4752px"><div class="media-credit-container alignnone" data-dcnode-id="1130" style="width: 4752px"><img alt="Thomas Seymour facts" class="lazy-hidden size-full wp-image-232234" data-dcnode-id="1136" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999.jpg 4752w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-360x240.jpg 360w" height="3168" loading="lazy" sizes="(max-width: 4752px) 100vw, 4752px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="4752"><noscript data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-232234" src="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999.jpg" alt="Thomas Seymour facts" width="4752" height="3168" srcset="https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999.jpg 4752w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-768x512.jpg 768w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2018/12/shutterstock_86779999-360x240.jpg 360w" sizes="(max-width: 4752px) 100vw, 4752px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1131"><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/home"><span data-dcnode-id="1133" instrument_node="">Shutterstock</span></a></span></div></figure><span data-dcnode-id="1128" instrument_node="">
</span><h2 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">48. Where’s My Invite?</span></h2><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">The Borgias were notorious for their hedonism, decadence, and even their penchant for orgies, but </span><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">one of their bacchanals was so depraved, it went down in history.&nbsp;</span></strong><span data-dcnode-id="1121" instrument_node="">The “Banquet of Chestnuts” took place in October 1501 at Cesare Borgia’s chambers in the heart of the Vatican—but there wasn’t much praying going on that night.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">One diarist claimed there were “fifty honest prostitutes” in attendance, and that </span><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">the gala boasted not only a massive feast but also a salacious sexual marathon.</span></strong><span data-dcnode-id="1115" instrument_node=""> The holy Pope himself, Rodrigo Borgia, was said to be in attendance, and prizes were given to those who could “perform the act most often with the courtesans.” Parties: they don’t make ’em like they used to.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1105" style="width: 1183px"><div class="media-credit-container alignnone" data-dcnode-id="1106" style="width: 1183px"><img alt="" class="lazy-hidden size-full wp-image-217183" data-dcnode-id="1112" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano.jpg 1183w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-1024x675.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-960x634.jpg 960w" height="780" loading="lazy" sizes="(max-width: 1183px) 100vw, 1183px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1183"><noscript data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-217183" src="https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano.jpg" alt="" width="1183" height="780" srcset="https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano.jpg 1183w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-300x198.jpg 300w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-768x506.jpg 768w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-1024x675.jpg 1024w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-340x225.jpg 340w, https://www.factinate.com/wp-content/uploads/2017/01/Banquet_of_Amor_and_Psyche_by_Giulio_Romano-960x634.jpg 960w" sizes="(max-width: 1183px) 100vw, 1183px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1107"><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABanquet_of_Amor_and_Psyche_by_Giulio_Romano.jpg"><span data-dcnode-id="1109" instrument_node="">Wikimedia Commons</span></a></span></div></figure><span data-dcnode-id="1104" instrument_node="">
</span><h2 data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">49. Kissing Siblings</span></h2><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">The lives of the Borgias were filled with intrigue, murder, and scandal—but nothing beats what might have been </span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">their absolute darkest secret.</span></strong><span data-dcnode-id="1097" instrument_node=""> For centuries now, there have been rumors that Cesare Borgia and his poison-happy sister Lucrezia were actually involved in an passionate, incestuous relationship with each other.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">While many of these rumors came from their enemies, it would certainly help explain Cesare’s </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">murderous intentions</span></strong><span data-dcnode-id="1091" instrument_node=""> with Lucrezia’s husbands.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1081" style="width: 1416px"><div class="media-credit-container alignnone" data-dcnode-id="1082" style="width: 1416px"><img alt="Cesare Borgia Facts" class="lazy-hidden size-full wp-image-251824" data-dcnode-id="1088" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1.png" data-srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1.png 1416w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1-300x201.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1-768x516.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1-1024x688.png 1024w" height="951" loading="lazy" sizes="(max-width: 1416px) 100vw, 1416px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1416"><noscript data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-251824" src="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1.png" alt="Cesare Borgia Facts" width="1416" height="951" srcset="https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1.png 1416w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1-300x201.png 300w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1-768x516.png 768w, https://www.factinate.com/wp-content/uploads/2019/01/FotoJet-6-1-1024x688.png 1024w" sizes="(max-width: 1416px) 100vw, 1416px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1083"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sho.com/"><span data-dcnode-id="1085" instrument_node="">The Borgias, Showtime Networks</span></a></span></div></figure><span data-dcnode-id="1080" instrument_node="">
</span><h2 data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">50. A Borgia Always Pays His Debts</span></h2><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1076" instrument_node="">George R.R. Martin’s </span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">A Song of Ice and Fire</span></em><span data-dcnode-id="1073" instrument_node=""> series (also known as the inspiration for HBO’s </span><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Game of Thrones</span></em><span data-dcnode-id="1070" instrument_node="">) has famously been inspired by the </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/43-grim-facts-wars-roses/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1069" instrument_node="">Wars of the Roses</span></a><span data-dcnode-id="1067" instrument_node=""> in England and the houses of Lancaster and York.&nbsp;</span><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">However, a very strong case has been made that the Lannisters bear stronger similarities to the Borgia family.</span></strong></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Murder, incest, and military might. Yeah, that sounds like the Lannisters.</span></p><span data-dcnode-id="1060" instrument_node="">
