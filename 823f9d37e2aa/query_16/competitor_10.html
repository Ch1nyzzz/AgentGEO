</span><a class="title" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2436613/"><span data-dcnode-id="1432" instrument_node=""> Magical, challenging and difficult not to become caught up in; Weerasethakul's latest in free and sweeping cinema is something to see.
</span></a><span data-dcnode-id="1430" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1422"><span data-dcnode-id="1429" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1426"><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur0855231/"><span data-dcnode-id="1428" instrument_node="">johnnyboyz</span></a></span><span class="review-date" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">31 May 2011</span></span><span data-dcnode-id="1423" instrument_node="">
</span></div><span data-dcnode-id="1421" instrument_node="">
</span><div class="content" data-dcnode-id="1400"><span data-dcnode-id="1420" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1403"><span data-dcnode-id="1419" instrument_node="">I suppose the closest we ever get to any sort stone wall narrative form in this, Apichatpong Weerasethakul's quite audacious and quite breathtaking film, happens rather simplistically in the opening exchanges before being put out to pasture by a very deliberate, very obvious installation of Weerasethakul's then-on presence as a director. When we begin on a lone ox tied to a tree in the Thai jungle, the film establishes a 'character' occupying a world and living a lifestyle it seems disenchanted with in its moaning and yearning. Then, it breaks free – a fleeting shot of some nearby humans pausing for a rest the establishment of those whom not only imprison, but informing us of what's at stake if this bovine should fail. The ox runs off, trudging through the jungle as best it can attempting to escape its captors, although is out done by those men, before at last it is defeated and returned back to the makeshift camp.</span><br data-dcnode-id="1418"><br data-dcnode-id="1417"><span data-dcnode-id="1416" instrument_node="">On an elemental level, the film here adheres to a very basic; very primitive narrative. A protagonist is in a situation and has an opinion on their surroundings before instigating a catalyst; taking off on what is a crude example of a crucible journeying away from these surroundings before a resolution to proceedings sees things lead onto a new order, which happens to be the sad old one. As the episode comes to an end, Weerasethakul implements his own presence on proceedings; a rejection of such narratively imbued conventions in his providing us with a lingering shot on a beastly looking figure breaking the fourth wall and harbouring bright red eyes. The director has arrived, he identifies mythical story telling in its most basic of forms and will now proceed to entirely reject it via the arrival of this uncanny presence we did not at all expect to see.</span><br data-dcnode-id="1415"><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">His film, Uncle Boonmee Who Can Remember His Past Lives, is more a mediation on death and the afterlife with some funny moments; the odd dramatic one and a whole bunch of other stuff so rich in symbolism that one could watch it several times and either come up with a different meaning each occasion or just remain dumb-founded, than it is something depicting characters and telling stories operating with genres. The film's rejection of most of the above arrives under a number of different guises, ranging from the seemingly innocuous title of the company funding the project in the form of "Kick the Machine Productions" (a seemingly slight reference to the "Hollywood machine" most people refer to such a thing as), to the stark photographic image of the young boy clad in some very obvious American linked; American orientated Levi clothing throwing stones, and therefore turning away, Weerasethakul's vision or ideas or presence as was previously established when the intended target is revealed as that of the off-screen beastly red eyed being.</span><br data-dcnode-id="1412"><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">At a remote Thai fruit and honey plantation, the titular Boonmee (Saisaymar) is visited by his sister and a few other family members after a long car journey. Boonmee, despite the verbal hopes that he'll be perfectly fine, is on the way to death's door; this coming together a sweet enough way to spend time together as a family unit until tragedy strikes. From a simple enough premise, during which the standard Weerasethakul practises of drawn out takes during the car journey and unbroken dialogue sequences on anything at all make themselves known, the extraordinary and the unfathomable are implemented; most of what happens literally impossible in any sort of 'real' sense but played out with degrees of interest and relying solely on one's ability to foresee into the various depths of symbolism that are on show.</span><br data-dcnode-id="1409"><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">Whilst at the plantation, Boonmee's long since dead son shows up in a different guise and is revealed as the monstrous, red-eyed presence. His death was more broadly linked to that of going too far in trying figure out what it is he saw in a two dimensional image; the reading into, and getting to the bottom of, what he saw but could not understand having taken a photograph in some dense jungle of an odd animal in the trees, syncing up with our own task in having to read into the images Weerasethakul places on screen in front of us so as to demythify. On two other occasions on seemingly disconnected strands, a princess will speak of how ugly she perceives herself to be beside a lagoon housing a smooth-talking catfish; itself a non-dualism alluding to the ugly/beautiful transition the princess wishes to undertake – her venturing into the watery lagoon to change her characteristics a literal cleansing via the water as she removes various garments thus stripping herself of a prior 'type' in order to become another. This presence of water as a means of cleanliness to shift personas later transpires in a rundown apartment when a young monk has fled his monastery to go home, a shower with the emphasis on some blank white tiles during this process, as he comes out afterwards dressed casually and out of his monk clothing, another visual clue to a notion of purifying oneself of prior preconceptions and into something new.</span><br data-dcnode-id="1406"><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">At the film's core is a thoroughly enjoyable series of episodes, all of them wholly imbued with a sense of iconography and deeper meaning taking centre stage. They arrive with this well timed sense of theological comedy peppering proceedings, something which suggests Weerasethakul is a grounded enough man not unable to execute what it is he makes without a light hearted attitude, thus keeping him well away from any accusations of pomposity or pretentiousness. The film is a grandeur, cascading experience unlike most things that are currently out there without Weerasethakul's name already on it and a mediative experience; the likes of which ought really be tracked down if only for the varying insights and observing of a man with immense confidence in his craft.</span></div><span data-dcnode-id="1402" instrument_node="">
</span><span data-dcnode-id="1401" instrument_node="">

</span></a><span data-dcnode-id="1330" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1322"><span data-dcnode-id="1329" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1326"><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur19227097/"><span data-dcnode-id="1328" instrument_node="">RichardSRussell-1</span></a></span><span class="review-date" data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">8 February 2012</span></span><span data-dcnode-id="1323" instrument_node="">
</span></div><span data-dcnode-id="1321" instrument_node="">
</span><div class="content" data-dcnode-id="1294"><span data-dcnode-id="1320" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1297"><span data-dcnode-id="1319" instrument_node="">Uncle Boonmee Who Can Recall His Past Lives (1:54, NR) — fantasy: supernatural, bargain basement, original</span><br data-dcnode-id="1318"><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">I didn't see this movie in a theater, but it had been getting good buzz, so I tracked it down on DVD. Some good came out of this, as I am now able to warn everybody else away from it.</span><br data-dcnode-id="1315"><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">I've got to give the film-makers credit for daring in being able to cram 20 minutes of what passes for plot into nearly 2 hours of running time. About half an hour in, I hit "fast forward" and watched the rest of the movie at double speed. AFAICT it didn't detract a bit from the story. Due to the exceedingly languid pace of absolutely everything, I was easily able to keep up with the sparse and lingering subtitles (except when, maddeningly, they committed the cardinal sin of continuing to use all-white lettering over a light-colored background).</span><br data-dcnode-id="1312"><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">Everybody in the movie seems to have ODed on Prozac. Nobody has any facial expression or (during the time when I had the original sound on) vocal inflection. There are vast amounts of standing around, interrupted only occasionally by vast amounts of sitting around and lying around. There are extended (2-8 minute) scenes of a guy taking a shower, 3 people reclining on a bed watching TV (which isn't visible to us), people sitting on the floor of a cave, people riding in a car, bubbles rising thru turbid water, and an escaped ox walking thru the forest. During none of these is a single word spoken. In all of them combined, the camera moves maybe 5 times. Nor does it feel compelled to switch (via either cut or zoom) from listeners to speakers. And, in case I hadn't stressed it adequately, the listeners show absolutely no facial reaction whatsoever to what's being said. None. It's as if they also had massive injections of Botox to go with their Prozac.</span><br data-dcnode-id="1309"><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node="">There is a single action scene. A princess (otherwise completely unrelated to the rest of the story) wades into a pond, discarding jewelry and clothing as she goes, does a back float, and allows a big catfish to have carnal knowledge of her. The princess is as soporific as all the other humans, but at least the fish seemed to be having a good time. More than I can say for me.</span><br data-dcnode-id="1306"><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">You remember how everybody smirked at the rubber-suited critters in the early Godzilla movies, or the other el cheapo creature features of the 1950s? Those guys would get Academy Awards for costuming compared to the dollar-store discards here.</span><br data-dcnode-id="1303"><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">I was half expecting to see Mickey Rooney and Judy Garland jump out at the end and say "Hey, kids, we've been putting on a show, with people who have never seen a show before and have no idea how to do one. Hasn't this been fun?"</span><br data-dcnode-id="1300"><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">No. No, it hasn't. Please don't ever do this again.</span></div><span data-dcnode-id="1296" instrument_node="">
</span><span data-dcnode-id="1295" instrument_node="">

</span><a class="title" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2382362/"><span data-dcnode-id="1226" instrument_node=""> Something very different
</span></a><span data-dcnode-id="1224" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1216"><span data-dcnode-id="1223" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1220"><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur4995240/"><span data-dcnode-id="1222" instrument_node="">come2whereimfrom</span></a></span><span class="review-date" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">8 February 2011</span></span><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span><div class="content" data-dcnode-id="1209"><span data-dcnode-id="1214" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Uncle Boonmee is more than a film, it's a visual poem, it's a celluloid meditation and more importantly it's a Palme d'Or winning film that has split the audiences right down the middle. After its win the Cannes panel headed by Tim Burton had to explain/justify why they had chosen the film, the first time this has ever happened. The thing is the film isn't a straightforward story, you won't be spoon fed the plot and it's easy to see why people won't get along with it. It's a stunning collection of breathtaking set pieces interlaced with mythical stories, transcendental characters and Buddhist philosophies. From Uncle Boonmee himself to the ghost monkeys and with the constant sound of the countryside ringing around the auditorium the film creates an atmosphere that immerses the viewer, from the story of the queen to the stunning last resting cave, you travel on a journey through the movie finding as you go more hidden depths. Uncle Boonmee is one of those films that people will either love or hate and it will for years to come provoke discussion and debate. Almost Malick like in its poetic direction but with Thai sensibilities it is also not afraid to use humour and be light-hearted when dealing with deep and meaningful subjects such as love, loss, death and karma. But whatever is on the screen it will draw you in if you let it and it will stay with you long after.</span></div><span data-dcnode-id="1211" instrument_node="">

</span><path d="M10.197 0L6 4.304 1.803 0 0 1.85 6 8l6-6.15" data-dcnode-id="1109" fill="#2572B3" fill-rule="evenodd"></path><span data-dcnode-id="1108" instrument_node="">

</span></div><span data-dcnode-id="1100" instrument_node="">
</span><div class="content" data-dcnode-id="1094"><span data-dcnode-id="1099" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Uncle Boonmee is dying from a kidney disease and decides to return to  countryside to prepare for his death. With him are his nephew and  sister in law and his Laotian carer. Over dinner one night the ghost of  Boonmee's wife appears who thanks her sister for looking after her  husband and tells him he has nothing to fear. The surrealism continues  as an ominous dark creature with bright vivid red eyes appears and  enters the room startling the group, but this 'monkey ghost' is  actually the missing son of Boonmee.  The film's story changes suddenly as we see a princess ashamed of her  looks bath in a pool where she offers jewels to a catfish in the hope  she will become beautiful and the catfish commits oral sex on the  princess. We are then back with Boonmee as wife's ghost leads them  through the jungle into a cave where Boonmee declares he was born. They  fall asleep and when they awake Boonmee is dead. A Buddhist funeral  follows and then the nephew, niece and sister in law sit in a hotel  room contemplating life after the death of their loved one.  This Thai film won the Palme D'Or at Cannes in 2010 and has divided  audiences ever since. The film is a reflection on life and death and  has many hidden meanings which for those of Buddhist mind may  understand more than others. it starts very conventionally, even if a  long languid scene of a cow seems irrelevant, but perhaps the cow is on  of Boonmee's past lives. Beautifully shot, the lush of the natural  surrounds are complemented by outstanding performances from the Thai  cast with their softly spoken rhythmic language. When ghosts and monkey  ghosts appear things becomes surreal and amusing; the reactions of the  family are priceless, with the sister in law questioning why the son  (the monkey ghost) has grown his hair so long, received one of the  bigger laughs. Yet among the surrealism there are moments of pure  beauty, such as when they eat the honey from the bee hive.  The shift in story to the princess, seems to break the flow of the  film, it perhaps suggests this is Boonmee recalling one of his past  lives, but it does so ambiguously, perhaps he was the princess or  perhaps he was the catfish. When we return to Boonmee, his time is  limited and yet there is no sadness and if anything his death is  expected making the event less than tragic.  Hints at racism (the sister in law's dislike and fear of Laotian's) as  well as the tragedy of war (Boonmee recalling fighting against the  communists) suggests that beneath the surface there are deeper elements  waiting to be discovered should the audience want to delve in deeper.  But even if you don't this is a very well made, albeit ultimately  art-house cinema, that as much entertains as it does confound.</span></div><span data-dcnode-id="1096" instrument_node="">

</span><a class="title" data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw3129506/"><span data-dcnode-id="1061" instrument_node=""> Light on story, high on contemplative surrealism.
</span></a><span data-dcnode-id="1059" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1051"><span data-dcnode-id="1058" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1055"><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur56677665/"><span data-dcnode-id="1057" instrument_node="">garcalej</span></a></span><span class="review-date" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">23 November 2014</span></span><span data-dcnode-id="1052" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">
</span><div class="content" data-dcnode-id="1035"><span data-dcnode-id="1049" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1038"><span data-dcnode-id="1048" instrument_node="">I'll be frank. Whether or not you enjoy this movie will depend largely on whether or not you are a die hard film buff or a casual movie goer looking for a story. If you are the later, then aside from the eerie sight of the red eyed Monkey Spirits, you will come away disappointed.</span><br data-dcnode-id="1047"><br data-dcnode-id="1046"><span data-dcnode-id="1045" instrument_node="">That said, there is much in Uncle Boonmee to like, but like the Buddhist aesthetic the film is steeped in, you have to be ready for it. Because this is one film that demands a lot of patience of the viewer.</span><br data-dcnode-id="1044"><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">Set in rural Isan Province, Thailand, the story follows the last days of a well to-do farmer, the titular Boonmee, who is dying of a terminal illness. Like all dying men, Boonmee can't help but wax philosophic, both on the nature of death itself and on his own past mistakes, and one night while eating with his family is suddenly and abruptly joined by two spirits, the first of his dead wife, Huay, the second that of his missing son, Boonsong, who has inexplicably been transformed into a black monkey. Anyone even remotely familiar with the prior work of Director Weerasethakul (try saying that with a mouthful of marbles), particularly Tropical Malady, will know that such surrealism is a common theme in his films, with its signature mix of traditional Thai Buddhism and animist lore. As in Tropical Malady, the day belongs to the living and the mundane, but night brings on ghosts, animal spirits, the shades of ancestors, and the inner musings and anxieties of Weerasethakul's characters.</span><br data-dcnode-id="1041"><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">The film itself feels much like a Buddhist temple; with its long uninterrupted and unadorned shots, and its devotion to capturing trivial moments, it is not so much a vehicle for storytelling as contemplation. The last film to be shot with celluloid as opposed to digital, it is the director's self-admitted funerary ode to a dying medium.</span></div><span data-dcnode-id="1037" instrument_node="">
