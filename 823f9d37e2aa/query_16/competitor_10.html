</span><span class="display-name-link" data-dcnode-id="3341"><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur0482513/"><span data-dcnode-id="3343" instrument_node="">Leofwine_draca</span></a></span><span class="review-date" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">2 March 2015</span></span><span data-dcnode-id="3338" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="3327"><span data-dcnode-id="3334" instrument_node="">I've been watching a fair few art house movies recently, and I've found that they tend to fall into a love/hate camp; there's little middle ground in this genre. UNCLE BOONMEE WHO CAN RECALL HIS PAST LIVES is a meditative Thai exploration of Buddhism that wastes its early promise by falling into a pit of endless boredom.</span><br data-dcnode-id="3333"><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">The story begins promisingly enough, a tale of magic realism with some decidedly odd and unique offerings: the introduction of a primate from the jungle and an apparition at the dinner table set this up to be something really special. Unfortunately, after this point it feels like the writer gives up, and very little happens from this point in.</span><br data-dcnode-id="3330"><br data-dcnode-id="3329"><span data-dcnode-id="3328" instrument_node="">Viewers are treated to an interminable scene of characters wandering through a cave and a head-scratching climax which the writer doesn't bother attempting to explain. It's all very frustrating, with much head-scratching and dull interludes, long segments that tell obvious stories and a cast who give anything but impressive performances. The characters remain cold throughout, as indeed my heart remained cold to this film's intentions.</span></div><span data-dcnode-id="3326" instrument_node="">

</span></a><span data-dcnode-id="3254" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3246"><span data-dcnode-id="3253" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3250"><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur10963001/"><span data-dcnode-id="3252" instrument_node="">Ore-Sama</span></a></span><span class="review-date" data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">22 February 2015</span></span><span data-dcnode-id="3247" instrument_node="">
</span></div><span data-dcnode-id="3245" instrument_node="">
</span><div class="content" data-dcnode-id="3227"><span data-dcnode-id="3244" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3230"><span data-dcnode-id="3243" instrument_node="">When it comes to art films, there's always been a divide. More casual viewers are more likely to dismiss a lot of them as pretentious and stupid, film buffs are more likely to find them beautiful and above anything you'll spend ten to fifteen to watch in a multiplex today. "Uncle Boonmee Who Can Recall His Past Lives" is one of those films, however, that even divides film buffs amongst themselves. Despite winning Palme D'or, the film has many detractors, and a 6.6 on this site(as of this review). 6.6 isn't bad but far below what you would expect given some of the praise. So, what IS this film exactly?</span><br data-dcnode-id="3242"><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">The title character is a man who is slowly dying, living out with his family for his remaining days. Those days become consumed by flashbacks to past lives (though it's not always clear what that life is or how it relates), being visited by the ghost of his wife, and trying to plan for his after life. The film has a very loose structure. Many people find the pace unbearably slow, I think in part because the film doesn't really build up to anything. To call this film meditative would not be a hyperbole, it's a mellow kind of movie. After watching it, I felt different, like I had been given the world's greatest massage, my muscles loosened up and everything, it's not like anything I've gotten from a movie before. This is helped by the beautiful scenery and cinematography. This is a movie that, if you can't watch it on a big screen with loud speakers, should at least be watched in a dark room with headphones if watching on a laptop/desktop. There's little in way of soundtrack (except for one beautiful song later in the film), but the sounds of nature are beautifully captured.</span><br data-dcnode-id="3239"><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">The actual narrative is composed of many smaller stories, all of which connect with Boonmee. All of them work on their own level, and together do create a low key but very, very touching film. the scene where Boonmee talks to the spirit of his wife about the anxiety he used to have giving speeches may be the highlight there, though the princess story and the final flashback are also up there.</span><br data-dcnode-id="3236"><br data-dcnode-id="3235"><span data-dcnode-id="3234" instrument_node="">This is a film you have to watch on it's terms. You have to be willing to watch it as a more meditative kind of experience, to simply enjoy it the way one might enjoy a hike in the woods of a car ride. If that's not what you want out of a film, avoid this at all costs.</span><br data-dcnode-id="3233"><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">For me, personally, I was a little hesitant going in, given how divided opinion was, but I'm glad I did, and will certainly watch again. It's a powerful film. It won't necessarily leave you in tears, but it will likely leave an impression on those who gravitate towards things like this.</span></div><span data-dcnode-id="3229" instrument_node="">

</span><a class="title" data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2313873/"><span data-dcnode-id="3159" instrument_node=""> Hard to judge - easy to love or hate with passion
</span></a><span data-dcnode-id="3157" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3149"><span data-dcnode-id="3156" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3153"><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur3807099/"><span data-dcnode-id="3155" instrument_node="">K2nsl3r</span></a></span><span class="review-date" data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">21 September 2010</span></span><span data-dcnode-id="3150" instrument_node="">
</span></div><span data-dcnode-id="3148" instrument_node="">
</span><div class="content" data-dcnode-id="3118"><span data-dcnode-id="3147" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3121"><span data-dcnode-id="3146" instrument_node="">This was a hard film to rate. It pains me not to have fallen in love with it. Here, then, are some scattered thoughts of my failed romance. </span><br data-dcnode-id="3145"><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">It started with a very sour first date. It also ended there.</span><br data-dcnode-id="3142"><br data-dcnode-id="3141"><span data-dcnode-id="3140" instrument_node="">I went in looking to see a film that won the Golden Palm at Cannes 2010. Knowing this fact, and having seen the trailer, I went to the theater expecting to see an art house piece with Oriental metaphysical overtones. What I saw was, to be sure, a decisively original and at times hauntingly beautiful film, but one that I found an absolute bore: a film that, to me, seemed a tiresome, dysfunctional, inchoate potpourri of disjunct elements that never quite flowed together.</span><br data-dcnode-id="3139"><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">Perhaps false expectations can ruin a movie. Or, perhaps, let me hazard the unlikely suggestion, there is nothing here to salvage? For let me be clear: I wanted to like this film, I really did. It is important to reward originality and craftsmanship, always. And I respect the film (or at least its intentions). But the fact remains (here comes the unavoidable, brutal, decisive fact), I didn't like it. I only liked a few scenes here and there. Some parts I hated, absolutely loathed. Despite a few glimmerings of genius - and an undoubted air of originality - it seems to be that Uncle Boonmee is a needlessly difficult, slow-paced and ultimately unsuccessful film... despite the fact that it gets to a great start and carries a lot of potential all the time. Perhaps the "elusive" quality mentioned by the high-praise reviewers is a mask behind which there is no greater coherence to be found. Perhaps the inchoate structure and the belaboured pacing are not marks of genius but amateurish vices committed in the name of some grand vision that shall forever remain out of our material reach. I fault this film not because of its weird themes or its occasional dream logic. On the contrary, I think that it may even be that the film wasn't weird enough or dreamy enough; perhaps this film's use of "magic realism" is a kind of materialistic trap that forces the movie into long, never-ending sequences of absolutely no consequence. The main vice of the film is its unadventurous reliance on fixed camera frames and boring, dragging shots. Editing between the scenes is tortuously snail-paced and almost morphine-mimicking in its soporific entailments.</span><br data-dcnode-id="3136"><br data-dcnode-id="3135"><span data-dcnode-id="3134" instrument_node="">Whatever the reason, the film feels too much jumbled together, like some heavy stone stuck in a spiritual limbo, or a unicorn eating a burger, or some such nonsense. Ironically, the main stumbling block for the film, if you ask me, is not its "artsiness", but its clumsy down-to-Earthness. The film seems to be grasping for some supreme realism and materialism underneath its spiritual, religious and metaphysical surface. But the result is a kind of Ken Loach of Buddhism: a boring materialism under the guise of animistic spiritualism. Just plain realism without a purpose: people doing boring stuff for boring reasons.</span><br data-dcnode-id="3133"><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">Or perhaps all this is wrong; perhaps all this analysis is useless. Perhaps we are back to false expectations again: I expected one thing and saw another. But who cares WHY I didn't like it? Surely all this is uninteresting? Well, perhaps, but let me say that my personal dilemma - how I wanted to love this film so much but ended up almost hating it - is an interesting story to tell, because this film has the potential to divide audiences totally, into "haters" and "praisers" - and very few lukewarm receivers in between. I definitely recommend this film to be seen, but I am not going to play the art house card, the usual cop-out: "I'm sure it's a masterpiece, I just didn't get it", and then give it a score of 8 or 9 despite having hated it myself, out of some duty-bound, deranged, depersonalized sense of professional duty or peer pressure to agree with everybody else, or - worse yet - pretend to love the film because of some unhealthy respect for the jury at Cannes or the snidely snobbish world film press. No, this would be a scandalous road to take. One must stand by one's convictions, and it is my personal conviction, based on one viewing, that here we have an ultimately pretty bad film: a failed exercise at grafting something sublime. Despite its undoubtedly pure and original intentions and beginnings, this film remains an overrated (soon to be over-venerated), perplexing, highly original turd - interesting but ultimately vacuous, like some of Buñuel's lesser works, or like Andy Warhol's art.</span><br data-dcnode-id="3130"><br data-dcnode-id="3129"><span data-dcnode-id="3128" instrument_node="">Whether I change my opinion after a second, or third, viewing remains to be seen. So, despite my dislike of the film's overall structure, I feel that this is an important film, and I can easily recommend it to all movie lovers. Everyone remotely interested in film should go and see, form their OWN opinion, of such a remarkable cinematic piece: a film that, despite its flaws and vices, is undoubtedly a creation of unique character and visionary qualities. Weerasethakul's directorial voice is loud and persistent, and its echo will surely be heard for many years to come across the lands - and cinema screens - the world over.</span><br data-dcnode-id="3127"><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">Now, let him only refine his voice a bit and convince us skeptics. </span><br data-dcnode-id="3124"><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">Whether my love for this film will grow, who knows. I'm preparing for the inevitable "second date" - the future second attempt at falling in love - with a strange expectation of more melancholy moods.</span></div><span data-dcnode-id="3120" instrument_node="">
</span><span data-dcnode-id="3119" instrument_node="">

</span><a class="title" data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2365268/"><span data-dcnode-id="3050" instrument_node=""> Buddha, Barthes, and Boonmee
</span></a><span data-dcnode-id="3048" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3040"><span data-dcnode-id="3047" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3044"><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur23560669/"><span data-dcnode-id="3046" instrument_node="">wasan_s2000</span></a></span><span class="review-date" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">6 January 2011</span></span><span data-dcnode-id="3041" instrument_node="">
</span></div><span data-dcnode-id="3039" instrument_node="">
</span><div class="content" data-dcnode-id="2985"><span data-dcnode-id="3038" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2988"><span data-dcnode-id="3037" instrument_node="">In order to appreciates the film, you have to understand that this movie is not just a normal film where you can expects classical narrative and plot. the directer not only have Buddhism as a philosophical point of view but he also put a little bit of Thai historical and political aspects in to the film.</span><br data-dcnode-id="3036"><br data-dcnode-id="3035"><span data-dcnode-id="3034" instrument_node="">In my opinion, the theme of this film is the man's struggle from human condition and transformation.</span><br data-dcnode-id="3033"><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">here are some few points I'd like to make concerning the film:</span><br data-dcnode-id="3030"><br data-dcnode-id="3029"><span data-dcnode-id="3028" instrument_node="">1. Man and Illusion</span><br data-dcnode-id="3027"><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">Before humankind, there was nature, which is pure and true. there are trees and wind and animals and so on. then there are man, which is basically another living specie. both animal and human have the same drive (sex, food, shelter etc.) the only different between man and animal is the ability to understand "sign" (read semiotic for more understanding) thus, human being created language, painting and symbol and so on. in other word, because our brain can perceived sign, so we can created ART. Art was created by man since the days of the cave man i.e. cave painting in Lascaux, France. (did you noticed that there are also cave paintings in the film?) </span><br data-dcnode-id="3024"><br data-dcnode-id="3023"><span data-dcnode-id="3022" instrument_node="">Man are proud that we are the only specie that can create and appreciate art, but what we didn't realized is that we are also the only specie that have the ability the created the illusion/lie/falsehood. Because of evolution, our unique brain can store memories and emotion, mix it up, and then created stuffs from it. because of this, the more time pass, the more we are far away from the truth; culture, law, politic, social status etc. are all MAN-MADE ILLUSION</span><br data-dcnode-id="3021"><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">2. Illusion of Dualism</span><br data-dcnode-id="3018"><br data-dcnode-id="3017"><span data-dcnode-id="3016" instrument_node="">It's seems like our perceived reality of "duality in nature" is embedded in our brain. we separated things into yin/yang mentality: day/night, good/bad, man/woman, live/death. one scene in particular shows how Boonmee kill the worms in his tamarind tree because "it's pest". then the next scene he show his sister the bee hive and seems very protective of it (he explain to his sister to avoid the larvae area on the plate). When he told his sister that his condition is the result of his karma from killing COMMUNIST and PEST, his sister replied "it's alright because you have good intention". When did killing other being can become good intention? Aren't communist human too? Aren't pests and bees are both insects?</span><br data-dcnode-id="3015"><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">3. The role of photography/Film, Memories, and Reality</span><br data-dcnode-id="3012"><br data-dcnode-id="3011"><span data-dcnode-id="3010" instrument_node="">Roland Barthes, in his book "Camera Lucinda", explained that a picture creates a falseness in the illusion of 'what is', where 'what was' would be a more accurate description. We can see a lot of scene involved photography; from the photos Boonmee shows to his dead wife as a proof of her funeral, the obsession of his son before he became a monkey, the final scene which Boonmee told the story about his dream etc. (this is an important scene, we will talk about it later)</span><br data-dcnode-id="3009"><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node="">4. In the playground, we created the rules, then we fought each other</span><br data-dcnode-id="3006"><br data-dcnode-id="3005"><span data-dcnode-id="3004" instrument_node="">In the film, we see peoples who of separated by this so-called man-made illusion, for example, different nationalities and spoken languages (Thai vs Laos), (Laos vs French) (Isan vs. Central Thai) etc. If you know little bit about Thai history, you will understand that the director also talk about the official vs the people / communism vs democracy(?).</span><br data-dcnode-id="3003"><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">in the final scene where Boonmee told the story about his dream, we see people wearing uniform. They are obviously appointed as "Soldier/Army". Then in the next photo we saw these soldiers captured the Monkeys Ghost. If you watch the film until this point, by now you should realized that the Monkey ghost is the allegory of the Communist.</span><br data-dcnode-id="3000"><br data-dcnode-id="2999"><span data-dcnode-id="2998" instrument_node="">then in the next photo, we saw that the soldier now taking their clothes off and play other kind of war game (throwing rock). The most funny thing is in the last photo, we saw 2 circles draw on the ground. In my opinion, the director suggest that countries, border dispute and war are nothing but a child's game.</span><br data-dcnode-id="2997"><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">5. Jāti: literally birth, but life is understood as starting at conception</span><br data-dcnode-id="2994"><br data-dcnode-id="2993"><span data-dcnode-id="2992" instrument_node="">the word "ชาติ" in Thai word derived from Sanskrit "Jāti", when translated to English it simply means "live". hence the name of the film "Uncle Boonmee who can recall his past lives" but in fact, the word Jati is the term in Buddhism which is not simply translate as "live" but have a lot more profound meaning. </span><br data-dcnode-id="2991"><br data-dcnode-id="2990"><span data-dcnode-id="2989" instrument_node="">By the way, I have the same feeling watching this film and Kubrick's 2001: Space Odyssey. Maybe because it also dealt with the theme of human condition and transformation, but this film is from the Eastern Philosophy point of view, of course.</span></div><span data-dcnode-id="2987" instrument_node="">

</span></a><span data-dcnode-id="2915" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2907"><span data-dcnode-id="2914" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2911"><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur1902636/"><span data-dcnode-id="2913" instrument_node="">oOgiandujaOo_and_Eddy_Merckx</span></a></span><span class="review-date" data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">20 October 2010</span></span><span data-dcnode-id="2908" instrument_node="">
</span></div><span data-dcnode-id="2906" instrument_node="">
</span><div class="content" data-dcnode-id="2891"><span data-dcnode-id="2905" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2894"><span data-dcnode-id="2904" instrument_node="">"Facing the jungle, the hills and vales, my past lives as an animal and other beings rise up before me." This quote appears on the screen at the start of the film and is indicative of what we'll see. Uncle Boonmee is a farm owner in rural Thailand, up in the hills, and is dying of kidney disease. In this period of his life visions of past incarnations and other supernatural visions will appear to him. The movie is staggeringly and outrageously beautiful, whether it's the way light is falling on coloured mosquito nets in a darkened room or its fractured scatter on a quartz cavern, or a vision of a palanquined princess seen through veils, being carried through a susurrating forest on a narrow track.</span><br data-dcnode-id="2903"><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">Apitchatpong "Joe" Weerasethakul's profound respect for life comes through well in the film. A recurring theme in his films are medical scenes with the long term ill. This is apparently because he grew up in a hospital, both his parents being doctors, and so he was very used to seeing sick people. The scenes where Boonmee requires dialysis are therefore very easy and compassionate. The whole movie has a great gentleness as regards mise-en-scene. You just can't get enough of this stuff, simple human scenes where people cuddle and care for one another. I like also how darker things are dealt with elliptically, for example a water buffalo at the start which breaks free of it's tether, but realises after wandering in the forest that it has nowhere to go and no role to play out. Docile it returns with the farmer who has gone out looking for it. I take that as being allegorical, with the dark hulk representing a human spirit in anguish, though the straight up incarnation viewpoint is obviously affecting too. One thing Joe said in his Q&amp;A after the film is that he's very keen on individual interpretations of the film, of which he has seen many types, so come prepared and be a creative watcher! Boonmee believes he is ill because he killed too many communists and also too many bugs on his farm (via the use of chemical pesticides). So the idea of karma runs through the movie as well. A spirit in the movie talks about heaven and says that it's overrated, and that nothing ever happens there. I found that quite funny (the movie is frequently amusing), because I've always thought of the view of heaven by the Abrahamic religions as quite problematic, that none of them can really make sense of it, of how to frame life once life is gone, once the struggle is over.</span><br data-dcnode-id="2900"><br data-dcnode-id="2899"><span data-dcnode-id="2898" instrument_node="">There's homage in the film to the movies that Apitchatpong grew up watching, and understanding that this is intentional may help to explain some rather odd special effects. I think as well is helps to have a knowledge of Thai current events and a little history, especially with the final scenes.</span><br data-dcnode-id="2897"><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">Quite incredibly special, like Katie, who this is for.</span></div><span data-dcnode-id="2893" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2794"><span data-dcnode-id="2810" instrument_node="">For those who have not heard of Thai filmmaker and artist Apichatpong Weerasethakul, I guess you must have heard of his latest film Uncle Boonmee Who Can Recall His Past Lives, winning the Palme d'Or at last year's Cannes Film Festival, and being the first Southeast Asian director to do so. That should interest you to take that leap of faith to experience the coming of Uncle Boonmee yourself, and that feeling of being frustrated yet enthralled, fascinated yet perplexed, all at the same time, fighting to stay engaged, and making sense of the visuals flitting around dreamscapes.</span><br data-dcnode-id="2809"><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">This film is like a diamond with many different cuts made to make it shine, each representing a facet from which you can choose to look at, or interpret from. Like a prism which dissipates light shone on it, your take on this film will likely be entirely different from mine, and what more, you'll probably have different takes on each of the different aspects of the film, since the scenes that make it up are as disparate as can be. It makes the film going experience a little more interesting since it's open, and never crystal clear given the takeaways for one based on one's journey in life thus far.</span><br data-dcnode-id="2806"><br data-dcnode-id="2805"><span data-dcnode-id="2804" instrument_node="">At its crux, the story is exactly that of its title, where we see Uncle Boonmee (Thanapat Saisaymar) living the last days of his life with kidney failure, choosing like most Asians do with the preference to live out the last days at the comfort of one's home, rather than at a sterile hospital. It is said that those on the death bed will see their life flash pass their eyes, but for Uncle Boonmee, his plodding walk toward the light at the end of the tunnel, means giving the film a lot more exploratory path to tread on, with a look at what his past lives were as well, ranging from the suggested buffalo, to even a member of the aristocracy (and that much talked about scene with the catfish. Hmm... maybe he could be the catfish too!)</span><br data-dcnode-id="2803"><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">Things get a lot stranger of course, even as it seems that Boonmee can remember his previous lives before reincarnation. As far as my limited grasp of that process goes, one has to drink up a liquid that will make you forget what you've gone through, and one's karma accumulation has bearings on what next you'll be incarnated, with the human form being quite OK, rather than an animal. I suppose Boonmee in his previous life did OK to be reincarnated as a human in this life, and in his last days get visited by his late wife (Natthakarn Aphaiwonk) with whom he shares a poignant, heart-wrenching scene with, and also a visit from his son (Geerasak Kulhong behind heavy makeup), whom you'd have already have an idea of from the various promotional material, and no, he's not captured in a picture just because the camera did not have an anti-red eye function.</span><br data-dcnode-id="2800"><br data-dcnode-id="2799"><span data-dcnode-id="2798" instrument_node="">Don't be shy if you don't understand the film. For starters, I suppose any film based on dreams and fantasy opens itself up to a lot of leeway in interpretation, and not taking everything verbatim, verbose or literal. Even the auteur himself has said that you "don't need to understand everything" in an interview with The Guardian, probably a relief for those like me who emerged from the screening with more questions than to know where to begin asking them. Like most art films, this one moves at a leisurely pace, and is filled with plenty of art house sensibilities and techniques, and while I won't say will reward the patient viewer, it will challenge you to think through about what you've just seen, and I felt it was easier to make sense of individual scenes, than as a whole when trying to fit the jigsaw in a coherent fashion.</span><br data-dcnode-id="2797"><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">To paraphrase Bruce Lee, this film is like water, having no form of its own, yet taking up form based on the viewer's individual experience and interpretation. I guess that's what makes Uncle Boonmee unique, coming from a filmmaker who's bold to conceptualize this piece of art that works itself through different strokes for different folks.</span></div><span data-dcnode-id="2793" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="2717"><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur22722270/"><span data-dcnode-id="2719" instrument_node="">JoshuaDysart</span></a></span><span class="review-date" data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">17 March 2011</span></span><span data-dcnode-id="2714" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2697"><span data-dcnode-id="2710" instrument_node="">In a spirit haunted primordial jungle a joyful man is quietly, harmlessly dying, though there is never less than a smile on his face.</span><br data-dcnode-id="2709"><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">The phases of his life play out before him. He is a farmer, a soldier, teller of myths, a husband, a father, an uncle. All these things quietly take their place in the narrative until the time when he must enter the underworld and pass on, guided by those who love him, both living and dead.</span><br data-dcnode-id="2706"><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">As Boonmee reflects on his life the arc of Thailand plays out as well. From contemplative agrarian past, through the time of fables, to the war with the communist and on into the disaffected, modernist future where we see ourselves seeing ourselves seeing ourselves.</span><br data-dcnode-id="2703"><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">All told with a minimal amount of fuss and effects, sewn together with threads of human intimacy, small gestures, a little sly humor and an over all meditative, knowing, measured rhythm.</span><br data-dcnode-id="2700"><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">There was another movie out last year that claimed it was about dreams... an American film. It made a lot of money but felt false and boisterous. Nothing about it felt like dreaming to me at all. This movie IS a dream. Everything about it feels like a dream. The difference between the two is the difference between spectacle and ritual. Uncle Boonmee is ritualized cinema in its purest form, ancient in its wisdom and avant-garde in its form.</span></div><span data-dcnode-id="2696" instrument_node="">

</span><a class="title" data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2399958/"><span data-dcnode-id="2626" instrument_node=""> These Hybrid Moments
</span></a><span data-dcnode-id="2624" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2616"><span data-dcnode-id="2623" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2620"><a data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur15982856/"><span data-dcnode-id="2622" instrument_node="">loganx-2</span></a></span><span class="review-date" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">16 March 2011</span></span><span data-dcnode-id="2617" instrument_node="">
</span></div><span data-dcnode-id="2615" instrument_node="">
</span><div class="content" data-dcnode-id="2588"><span data-dcnode-id="2614" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2591"><span data-dcnode-id="2613" instrument_node="">This years Palme d'Or winner at the Cannes Film Festival, "Uncle Boonme Who Can Recall His Past Lives" is the story of a man who is dying, and as result recalls his past lives and is visited by ghosts and spirits.</span><br data-dcnode-id="2612"><br data-dcnode-id="2611"><span data-dcnode-id="2610" instrument_node="">There are ape spirit creatures who lives in the forest attracted by his sickness, he remembers being an ox and a princess, we watch a nurse drain some device the ailing Boonme wears fixed to his abdomen.</span><br data-dcnode-id="2609"><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">This was the first film I watched at 2010's AFI Film Festival in Los Angeles, and it was a start that was not followed easily. The film is strange but the words which feel most appropriate to the film are "gentle" and "mysterious".</span><br data-dcnode-id="2606"><br data-dcnode-id="2605"><span data-dcnode-id="2604" instrument_node="">Boonme's final days are spent with his sister and a nurse and their various supernatural guests. They eat dinner, watch films, look at photo albums, life unfolds but with an awareness of a mysterious shift coming. As death approaches, past lives and those human, animal, or other appear ever-shifting and inter connected, foreign but also familiar, like relatives returned after a long absence."Uncle Boonme" is the final part of a multi-platform project featuring art installations and short films called "The Primitive Installation", about Nabua, Thailand a region heavily occupied by the Thai army from the 60's to the 80's. "Uncle Boonme" believes his karma is the result of the part he played in the violence of the past.Director Apichatpong Weerasethakul ("Joe" for short) has created a landscape of shadowy jungles, intimate bedroom lighting, a haunting, funny, dreamy, and wise, rhythmic lamentation about modern life, it's "primitive" counter points, death, change, spirit-monkeys and all that good stuff. </span><br data-dcnode-id="2603"><br data-dcnode-id="2602"><span data-dcnode-id="2601" instrument_node="">Uncle Boonme is a fantasy as epic as Souleymane Cisse's "Yeelen", one luminous to look at and visually wander through, with several of "Tropical Malady's"' most hallucinatory moments, appearing strong early in it's opening movements and closing out on notes as elliptical as those of "Syndromes And A Century", and then there's the final scene compressed into a wonderful kind of epilogue involving a monk, that's the most audacious, fascinating, and best of it's sort since Wes Anderson's "Hotel Chevalier"."</span><br data-dcnode-id="2600"><br data-dcnode-id="2599"><span data-dcnode-id="2598" instrument_node="">Transformations and contrasts between the ancient and the modern flow into one another from electronic bug zappers to sex with talking cat- fish, primordial caves to karaoke bars. Dual and multiple-roles and states within a single whole, are a recurring theme in the film, so multiple meanings and readings being generated is little surprise. But though these thoughts rise up haunting us after viewing, the images of movement through Nabua's phantom jungles and Boonme's warm goodbyes are what we are left feeling and reeling with.</span><br data-dcnode-id="2597"><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">All modern worlds are built on ancient ones, all new things have within them older forms. "Uncle Boonme" is more informed by Buddhist notions of reincarnation, the idiosyncratic personality of it's creator and the psycho-geography of it's location, more than normal concerns about dramatic and character arc. In simpler words...an old man who is dying can recall his past lives. </span><br data-dcnode-id="2594"><br data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node="">The film is a matter of perception as complex and post- modernist/globalized as any experimental narrative in avant-garde-dom or as mystical and "primitive" as any ancient Sutra, based on the cultural inclinations and presuppositions you bring to the film. In any event, is to Joe's continued success and cinemas continued fortune that he so playfully and beautifully can challenge and delight these hybrid perceptions of ours as he does.</span></div><span data-dcnode-id="2590" instrument_node="">

</span><div class="lister-item-content" data-dcnode-id="2509"><span data-dcnode-id="2541" instrument_node="">
</span><a class="title" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2371708/"><span data-dcnode-id="2540" instrument_node=""> A state of concentration..
</span></a><span data-dcnode-id="2538" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2530"><span data-dcnode-id="2537" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2534"><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur17699578/"><span data-dcnode-id="2536" instrument_node="">chaos-rampant</span></a></span><span class="review-date" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">18 January 2011</span></span><span data-dcnode-id="2531" instrument_node="">
</span></div><span data-dcnode-id="2529" instrument_node="">
</span><div class="content" data-dcnode-id="2511"><span data-dcnode-id="2528" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2514"><span data-dcnode-id="2527" instrument_node="">This movie is meditation, a state of concentration. I only wish I wasn't tired when I saw it last night because my concentration waned, I could feel the movie slipping between my fingers and trying to wilfully sustain the experience can't work. This is a Buddhist film, but it's Thai Buddhist (the form they practice in Thailand came from Sri Lanka and is from the earliest strata of Buddhism), it's spiritual but it's not esoteric in the manner of the Tibetans, ancient but not arcane. It's not Buddhist because Boonmee may or may not be recalling on his deathbed his past and future lives, or because there are ghosts and demons and a talking catfish, this is colorful lore, the illusory flowers of mind. It's Buddhist because it's aware of the moment. Not so strangely, it's the fantastical bits that seem to make the film watchable for most people, yet if we come to this film to satisfy our need for something to happen, we break the spell. The spell here for me is the awareness of life as is, the clear vision of a heaven in the present world.</span><br data-dcnode-id="2526"><br data-dcnode-id="2525"><span data-dcnode-id="2524" instrument_node="">Here's a camera that doesn't describe a world, it allows it to emerge in its own time. Sometimes this tests my patience but I appreciate that it doesn't make amends and concessions. Cessation, stillness of mind, true perception, these are all vital and desirable here, and they can only happen in their own time, they can't be forced. I appreciate that and I appreciate the limitations of my own viewing. In those moments that my eyes and the movie adjust, I am blissful. Two moments exemplify this, the one is a table out in the verandah by night, insects buzzing around a light and everything is quiet, this is the summer night for me. The other is Uncle Boonmee lying down on a bed in his honeykeeping shed, it's noon and crickets are humming from the trees, this is the summer day. It reminds me of the remembrance of spring in Kiarostami's The Wind Will Carry Us.</span><br data-dcnode-id="2523"><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">The finale is rather interesting, despite the above. A lot of viewers seem to regard it as Weeresethakul's comment on the alienation fostered by the niceties of modern society. It is its own comment on the place of Buddhism in one such society, where the garments of the monk mean nothing, but instead of inferring that a day's hard work out in the open is preferable to watching TV Weeresethakul could have not made a movie to begin with (that calls for us to sit alone from one another in a dark room where flickering lights are projected). </span><br data-dcnode-id="2520"><br data-dcnode-id="2519"><span data-dcnode-id="2518" instrument_node="">But I don't think that such a simple conclusion was what was intended. I see vision that wants to encompass the world of ambiguities. The family may be sitting in the silent, staring at a box, but I got the sense of quiet warmth coming from the simple togetherness, a certain soothing affect that is possible only in people who can sit together without a need for words. Who can relax simply in the presence of each other.</span><br data-dcnode-id="2517"><br data-dcnode-id="2516"><span data-dcnode-id="2515" instrument_node="">This is valuable work, and I believe it will be cherished by viewers who feel the chakras of cinema should be purified and set ablaze now and then.</span></div><span data-dcnode-id="2513" instrument_node="">

</span></a><span data-dcnode-id="2441" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2433"><span data-dcnode-id="2440" instrument_node="">

</span><path d="M10.197 0L6 4.304 1.803 0 0 1.85 6 8l6-6.15" data-dcnode-id="2411" fill="#2572B3" fill-rule="evenodd"></path><span data-dcnode-id="2410" instrument_node="">

</span><div class="content" data-dcnode-id="2369"><span data-dcnode-id="2401" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="2372"><span data-dcnode-id="2400" instrument_node="">If I didn't read Wikipedia, I wouldn't have known that "Uncle Boonme who can recall his past lives" was the final installment of a "multi-platform art project" called 'Primitive'. I also had no idea (until I read the Wikipedia article) that a good part of the film was shot in the northeast Isan region of Thailand, close to the Laotian border. Director Apichatpong Weerasethakul has indicated the film echoes other works in the 'Primitive' project which focus on the brutal history of Isan (particularly a 1965 crackdown on Communist sympathizers by the Thai Army). But Weerasethakul makes it clear that his primary intent is not to make a political statement.</span><br data-dcnode-id="2399"><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">Before understanding what 'Uncle Boonme' is, one must examine where director Weerasethakul is coming from. He's really one of these guys who has a penchant for nostalgia. If he was an American filmmaker, he probably would be extolling the 'beauty' and 'originality' of old TV shows like 'Ozzie and Harriet'. That's why he shot 'Boonme' in 16 millimeter and wistfully bemoans the use of digital, which in his mind has led to the possible "extinction" of "cinema itself". He likes the old Thai TV shows, also shot in 16 millimeter, where the "lines were whispered to the actors, who mechanically repeated them". He also admires (believe it or not) the old movies where monsters were filmed in the dark so the audience can't see the 'cheaply made costumes'. Finally (and this is something I did not pick up at all in the theater), the film consists of six reels shot in six different cinematic styles. For example, one sequence features "the stiff acting and classical staging" of old Thai cinema.</span><br data-dcnode-id="2396"><br data-dcnode-id="2395"><span data-dcnode-id="2394" instrument_node="">Another penchant Weerasethakul owns up to is that he enjoys long takes. This was perhaps one of the most maddening aspects of Weerasethakul's film. Is it really necessary to hold the camera on a water buffalo, or someone driving a car or taking a shower for minutes on end? In essence, the director is more interested in indulging his own puerile whim than giving his audience a break.</span><br data-dcnode-id="2393"><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">As for the Boonme storyline, it's a meandering tale that lacks the basic ingredient of good drama: conflict! We're introduced to Boonme, an ex-soldier in the Thai army, who lives on a farm in the countryside, is on dialysis and dying of kidney failure. His sister-in-law, Auntie Jen, along with Tong, a nephew (one reviewer stated he was Boonme's cousin) come to visit. Bigoted Auntie Jen derides Boonme's housekeeper, Jai, for being an illegal immigrant from Laos but Boonme defends him, as he has been very helpful around the house, especially in regards to helping a dying ex-soldier.</span><br data-dcnode-id="2390"><br data-dcnode-id="2389"><span data-dcnode-id="2388" instrument_node="">While having dinner on the porch, the ghost of Boonme's deceased wife, Huay, makes an appearance and actually has a conversation with the three living family members. The presence of the unreal Huay undercuts the naturalistic scenes of Boonme coping with a terminal illness. Even more weird is the appearance of Boonme's son, Boonsong, now transformed into a 'ghost monkey' after running away from his family years ago and mating with a simian female. Boonsong is covered in monkey hair and also sports malevolent looking red eyes (reminiscent of Michael Jackson's red eyes in his classic video, 'Thriller').</span><br data-dcnode-id="2387"><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">Not much happens after the extraordinary appearance of Huay and Birdsong. There is a strange scene where an aging princess (with a complexion that looks like a bad case of acne) sees the reflection of herself as a beautiful woman in her younger days, in a pool of water. She's serenaded by a catfish while she floats in the water and she tells him that she realizes the younger image is only an illusion. The catfish (who is looking more and more like a stand-in for Uncle Boonme), tells her that he's convinced she's the same woman he loved in the past. The woman (who may represent Huay), insists the catfish's past love is also an illusion. Uncle Boonme has been redirected away from his past materialistic existence to accepting the idea that life is an illusion and one should accept death without fighting it.</span><br data-dcnode-id="2384"><br data-dcnode-id="2383"><span data-dcnode-id="2382" instrument_node="">Jen, Tong and Uncle Boonme make a trek to a cave where the uncle claims this is where he is born. He's now in full acceptance of death mode—he declares he's neither human or animal, man or woman. Boonme dies in the cave and we're treated to an exotic Buddhist funeral. </span><br data-dcnode-id="2381"><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">The epilogue finds us back in the material world. Jen and her younger friend, Roong, are counting funeral contributions in what appears to be a hotel room as a newscast blares on the TV. Tong is now doing service as a monk but has no qualms about taking a shower as Auntie Jen scolds him for leaving the monastery and turning his back on his spiritual commitments.</span><br data-dcnode-id="2378"><br data-dcnode-id="2377"><span data-dcnode-id="2376" instrument_node="">Weerasethakul is a frustrating character. Despite being a well-meaning fellow, he is also self-indulgent. Not everyone will share his love for the creepy conventions of comic books and old Thai TV shows. What's more, when one strips away all the hocus-pocus, Weerasethakul's story is simply about a man who comes to realize that his illness was brought on by living a false life but now can accept death as he is now more attuned to the unending cycles of nature.</span><br data-dcnode-id="2375"><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node="">For me, Boonme is only worth watching to catch a glimpse of the natural wonders of Thailand and its vibrant culture. For others, since 'Uncle Boombe' has a mystical veneer, its simplistic message is mistaken for something much more profound. As a result, accolades are heaped upon it, including the Palme d'Or. Until the judges stop conning themselves, a teenage sensibility will reign supreme at such venerable film festivals as Cannes, for many years into the future.</span></div><span data-dcnode-id="2371" instrument_node="">

</span><a class="title" data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2290326/"><span data-dcnode-id="2336" instrument_node=""> Not a movie, an experience.
</span></a><span data-dcnode-id="2334" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2326"><span data-dcnode-id="2333" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2330"><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur5633386/"><span data-dcnode-id="2332" instrument_node="">crappydoo</span></a></span><span class="review-date" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">4 August 2010</span></span><span data-dcnode-id="2327" instrument_node="">
</span></div><span data-dcnode-id="2325" instrument_node="">
</span><div class="content" data-dcnode-id="2307"><span data-dcnode-id="2324" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2310"><span data-dcnode-id="2323" instrument_node="">This is one of the finest films I have seen all year and I am certain that this film will stay with you for a long, long time. </span><br data-dcnode-id="2322"><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">Uncle Boonmee belongs to a category of films that harks back to the days of the invention of the moving image; when audience members were stunned in disbelief to see pictures and images in motion. The dawn of cinema came about as an experience and a work of art, much like a painting that people could experience and interpret how they liked. It is great to see film makers in todays commercial age still holding on to that vision and delivering the same.</span><br data-dcnode-id="2319"><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">The story, if there is one, is about the protagonist Boonmee who, close to the end of his current life, recollects how this one went by, with the help of ghosts and spirits of the forest where he lives. He has the ability to go back and forth into his past and future lives and relate his memories.</span><br data-dcnode-id="2316"><br data-dcnode-id="2315"><span data-dcnode-id="2314" instrument_node="">The movie, like other mood-pieces, can be fairly divisive with its audience. People who are not prepared for it will be left confounded whereas a small minority for whom the movie is made will leave the cinema stunned at the experience of it all. Therefore, this movie should rather be called an experience instead of a movie.</span><br data-dcnode-id="2313"><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">It is a little surprising that it won the Palm D'Or at Cannes, but not because it does not deserve it, but because it surprises me that the judges actually saw the beauty behind it. I say this one deserves the award more than the others did.</span></div><span data-dcnode-id="2309" instrument_node="">

</span></a><span data-dcnode-id="2237" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2229"><span data-dcnode-id="2236" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2233"><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur7006919/"><span data-dcnode-id="2235" instrument_node="">jaychou_21</span></a></span><span class="review-date" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">27 September 2011</span></span><span data-dcnode-id="2230" instrument_node="">
</span></div><span data-dcnode-id="2228" instrument_node="">
</span><div class="content" data-dcnode-id="2207"><span data-dcnode-id="2227" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2210"><span data-dcnode-id="2226" instrument_node="">Incoherent, unpredictable, mystical, yet undoubtedly original, "Uncle Boonmee Who Call Recall His Past Lives" is a pseudo-profound cinematic venture that reeks with allegory and mythical undertones. After watching this film, I've come to a conclusion that it is certainly not for everyone.</span><br data-dcnode-id="2225"><br data-dcnode-id="2224"><span data-dcnode-id="2223" instrument_node="">Despite its strange recurring themes about supernatural beings, spirits, Buddhist philosophy, karma, and reincarnation, it will bathe you with its gentleness and natural ornateness. It is intimate and surprisingly elegant, though not without its flaws.</span><br data-dcnode-id="2222"><br data-dcnode-id="2221"><span data-dcnode-id="2220" instrument_node="">Much like Terrence Malick's "Tree of Life," this motion picture lacks a linear narrative. It doesn't have what most of us would require from a movie: a plot. It heavily relies on hypnotic images captured into still wide frames that often drag longer than the easily-bored viewer can bear. </span><br data-dcnode-id="2219"><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node="">Then there's the noticeable absence of a musical score. You never get to hear music until the last few minutes of the film; all you'll hear besides the dialogues are crickets, the rustling of leaves, a water buffalo, the sound of an electric fly swatter zapping flying bugs, footsteps, a waterfall, and a talking catfish that made love to a disfigured princess.</span><br data-dcnode-id="2216"><br data-dcnode-id="2215"><span data-dcnode-id="2214" instrument_node="">Simple and ambitious; primitive and modern; eerie and comforting; senseless and driven; and dull and brilliant, this Thai film gives you a one-of-a-kind viewing experience. If you are into esoteric art films, this is something I would highly recommend. If you loathe movies that seem to have no meaning, then this is not for you.</span><br data-dcnode-id="2213"><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">Confounding as it is, "Uncle Boonmee..." is a film that doesn't need to be understood; it simply has to be FELT.</span></div><span data-dcnode-id="2209" instrument_node="">
</span><span data-dcnode-id="2208" instrument_node="">

</span></a><span data-dcnode-id="2052" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2044"><span data-dcnode-id="2051" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2048"><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur13977076/"><span data-dcnode-id="2050" instrument_node="">Tweekums</span></a></span><span class="review-date" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">27 October 2019</span></span><span data-dcnode-id="2045" instrument_node="">
</span></div><span data-dcnode-id="2043" instrument_node="">
</span><div class="content" data-dcnode-id="2034"><span data-dcnode-id="2042" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2037"><span data-dcnode-id="2041" instrument_node="">Uncle Boonmee is nearing the end of his life and has decided to spend his final days with loved ones at a remote farm near the Laotian border. Here he is joined by his late wife and the son who when missing years before and is no longer human. He then contemplates his life and whether his actions in previous lives have led to his current suffering.</span><br data-dcnode-id="2040"><br data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">This is a very different film. There isn't a plot to speak of; it is more a succession of scenes. It must be said that the setting is beautiful; a heavily forested area with an almost timeless feel to it. Instead of the usual background music we only have the natural sounds of the jungle. Unfortunately it is also glacially slow at times. I really wanted to enjoy this and early on as we were introduced to Boonmee and his family I thought I wasn't going to be disappointed; but later I found my mind wandering and was a little unsure about just what was happening. After watching I learnt that this was the final segment of an 'art project'; perhaps the problem was that I'd no knowledge of what was in the previous parts or perhaps it was just my lack of knowledge of Thai cinema outside the action genres. Overall I'm not sure I'd recommend this unless you really want to see something different.</span></div><span data-dcnode-id="2036" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">I really do wish I could like this. As it is, I think it has some dazzling sequences, and some really atmospheric and hypnotizing scenes. For the most part though, it didn't amount to much for me, and that's because I was just really bored by a lot of it. This really just comes down to whether one is hypnotized or bored by it, and unfortunately for me it was the latter. That doesn't mean that it's an awful film, it has way too much originality in what I saw to label it as such (and whether it has anything to really say is anyone's guess). Still, I wouldn't recommend this to most people, simply because it's so hard to get into. Not recommended.</span></div><span data-dcnode-id="1971" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1848"><span data-dcnode-id="1858" instrument_node="">I watched this film today during its initial run at SFX Cinema Emporium, Bangkok. The Thai film rating is 15+.</span><br data-dcnode-id="1857"><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node="">Rural North-East Thailand. Uncle Boonmee is dying. The film follows him for the last few days of his life. Between the time the audience first meets him and his death in a cave that seems to be full of stars, the ghosts of his wife and long lost son appear, the protagonists talk about life and love and many things in-between and a disfigured princess has an erotic encounter with a catfish. Long, drawn out scenes abound. The surround sound keeps you in the middle of rural Thailand.</span><br data-dcnode-id="1854"><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">Apichatpong Weerasethakul tells a story that doesn't ask or need to be understood. "Uncle Boonmee..." is an art film par excellence. Make what you want of it or don't. It does help if you are familiar with Thai customs and legends.</span><br data-dcnode-id="1851"><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">I wasn't bored for one minute. If you love art films this is essential viewing.</span></div><span data-dcnode-id="1847" instrument_node="">

</span><path d="M10.197 0L6 4.304 1.803 0 0 1.85 6 8l6-6.15" data-dcnode-id="1780" fill="#2572B3" fill-rule="evenodd"></path><span data-dcnode-id="1779" instrument_node="">

</span><div class="content" data-dcnode-id="1747"><span data-dcnode-id="1770" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="1750"><span data-dcnode-id="1769" instrument_node="">"The most beautiful thing we can experience is the mysterious." - Albert Einstein </span><br data-dcnode-id="1768"><br data-dcnode-id="1767"><span data-dcnode-id="1766" instrument_node="">Set in the dense Nabua region of Thailand, Thai director Apichatpong Weerasethakul's masterly Uncle Boonmee Who Can Recall His Past Lives is a film about myths and memories and images that evoke the thin line between the world of reality and the world of spirit. Winner of the Palme D'or at the Cannes Film Festival, it is not a film that can be approached in the normal way we view films - looking for a coherent narrative, and then following a plot until its resolution. Inspired by the abbot Phra Sripariyattiwetti's 1983 book, A Man Who Can Recall Past Lives, Uncle Boonmee is like a dream that is real when you are dreaming but illogical when you wake up, a series of images, some dark, some beautiful, but most that can be experienced but not explained. It is a challenging and often impenetrable film that divides audiences into, in the director's expression, "very like" and "very don't like.'' There seems to be no middle ground.</span><br data-dcnode-id="1765"><br data-dcnode-id="1764"><span data-dcnode-id="1763" instrument_node="">Boonmee (first-time actor Thanapat Saisaymar), a man dying of kidney failure on his fruit and honey farm, is surrounded by his sister-in-law Jen (Jenjira Pongpas), who has come to help out, his nephew Tong (Sakda Kaewbuadee) and his helper, Laotian Jaai (Samud Kugasang), possibly an illegal immigrant, who regularly changes Boonmee's dialysis equipment. As he approaches his final days, Boonmee begins to see the ghosts and images from his present and past lives. His long dead wife Huay (Natthakarn Aphaiwonk) appears followed by his son Boonsong (Geerasak Kulhong) who disappeared thirteen years ago and has mated with a "monkey ghost". Appearing in non-human form, with his long hair and glowing red eyes, he resembles a hairy Sasquatch. Amusingly, someone asks him, "Why did you grow your hair so long?" </span><br data-dcnode-id="1762"><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node="">Boonmee asks Huay how he will find her when he gets to heaven. To that she answers, "Heaven is over-rated, there's nothing there. And anyway", she explains, "ghosts don't associate with places, they associate with people. We'll find each other." For me, the implication is that heaven is not a place or location but the experience of enduring connection. Boonmee wonders if his illness is his karma brought on by killing too many bugs or too many communists in northeast Thailand, but Jen denies this, telling him that he did it only for the good of his country. Although the film stays away from any overt political commentary, a political element is expressed in photographs of monkey ghosts chained by soldiers and led to torture, allowing us to consider how communist prisoners suffered the same fate in real life. Weerasethakul has said that state censorship prohibits Thai filmmakers from making overtly political movies or anything considered a threat to national security.</span><br data-dcnode-id="1759"><br data-dcnode-id="1758"><span data-dcnode-id="1757" instrument_node="">In a gorgeous middle sequence which may be the film's high point, an ancient princess (Wallapa Mongkolprasert) wearing bracelets and necklaces is carried on a covered conveyance on the shoulders of four men to a waterfall. Rejecting the love of one her soldiers (Sumit Suebsee), she is startled to see her younger face, reflected in the water, and it brings tears to her eyes. She is reassured, however, by an erotic talking catfish. "Deep down," she says, "I know that reflection is an illusion"; the catfish/Boonmee responds, "I know that you're the same person I loved"; she answers, "That's an illusion too."</span><br data-dcnode-id="1756"><br data-dcnode-id="1755"><span data-dcnode-id="1754" instrument_node="">As he awaits his death, Boonmee, Huay, Jen, and Tong visit a cave with white sand floors where Boonmee reveals that this was the place he was first born and that, at his genesis, he was "neither human nor animal, neither man nor woman." Following a stately Buddhist funeral, the scene shifts to an ordinary looking room where Jen and Roong (Kanokporn Thongaram) begin to add up funeral contributions when a saffron monk who looks like Tong enters and asks if he can take a shower. Filmed in 16mm as a tribute to the format of films from the director's childhood, the scene has hints of a parallel universe.</span><br data-dcnode-id="1753"><br data-dcnode-id="1752"><span data-dcnode-id="1751" instrument_node="">Uncle Boonmee is a personal and heartfelt film from the director who has given us such masterpieces as Syndromes and a Century, Tropical Malady, and Blissfully Yours. It is a haunting and hypnotic experience but it can be very challenging because of the slowness of its pace and the fact that it engages the senses more than the emotions. The type of spirituality the film depicts may be vastly different from Western ideas, yet the film's notion that nothing is separate from anything else, that every living thing is part of the divine whether it is an insect, an animal, or a human being speaks to me of a world where nature has purpose and intelligence. Similarly, in the enduring relationship between Boonmee and Huay, and the picture of a dying man comforted by family and friends, the film offers an experience of the permanence of love.</span></div><span data-dcnode-id="1749" instrument_node="">

</span></a><span data-dcnode-id="1712" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1704"><span data-dcnode-id="1711" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1708"><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur9028759/"><span data-dcnode-id="1710" instrument_node="">YourMovieSucksDOTorg</span></a></span><span class="review-date" data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">8 November 2010</span></span><span data-dcnode-id="1705" instrument_node="">
</span></div><span data-dcnode-id="1703" instrument_node="">
</span><div class="content" data-dcnode-id="1682"><span data-dcnode-id="1702" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1685"><span data-dcnode-id="1701" instrument_node="">I just finished watching this movie for the second time. I saw it twice because I was torn between making the decision of whether it was absolute garbage, or a work of genius. It's pretty much garbage. Sorry.</span><br data-dcnode-id="1700"><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">Picture this: you download some pictures of Thai forests and caves from National Geographic. You then download "Forest Sounds Vol. 2". You play a slide-show of these pictures whilst listening to the ominous and atmospheric sounds of the jungle. After about 10 minutes, you stop what you're doing and sit in a corner for an hour and a half. Then, you go back to your slide-show and sound effects for another 10 minutes. This is the movie in a nutshell.</span><br data-dcnode-id="1697"><br data-dcnode-id="1696"><span data-dcnode-id="1695" instrument_node="">There are some beautiful shots within the movie, and it's obvious there was some talent because they make a point to keep these still shots on the screen for as long as possible. The background sounds add a lot to the movie as well, but everything else was just plain bad. All of the acting was quiet and monotonous, and it didn't make it seem more natural at all.</span><br data-dcnode-id="1694"><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">The dialogue was terrible. Nothing made sense. As much as I would love to be even more pretentious about movies than I already am, and rave about how people don't understand this movie, there actually is really nothing to understand. All of the characters were the same. Any subtleties within them are just projections of the viewer filling in the blanks, and believe me, they are blank. </span><br data-dcnode-id="1691"><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">The majority of the movie was filler. </span><br data-dcnode-id="1688"><br data-dcnode-id="1687"><span data-dcnode-id="1686" instrument_node="">Garbage.</span></div><span data-dcnode-id="1684" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Viewed at the Festival du Film, Cannes 2010  I saw this film with two friends at the evening, red carpet screening  in Cannes. Lucky us, right? Well, no. The walk-outs began about six  minutes in and continued unabated. My two companions both fell asleep!  I managed to stay awake, although I tried otherwise, and when A and B  both woke some 45 minutes later, we also joined the line for the exit.  I realise a film is always a personal experience, but there is  absolutely no story on show here, no character establishment or  development. The camera lingers and busks to the point that you are  mentally screaming "CUT!! CUT!!"! Whole interminable scenes do nothing  to drive a non-existent narrative forwards.   Visually, it often looks like it was shot on mini-DV and mastered  through an unwashed milk bottle. As for the characters, especially  Uncle Boonmee, do we get to know him? What do you think? Do we even  care? What do you think again?  The best thing about this film is, I kid you not, an electric fly  swatter! Now that's something I want!  It won the Palme D'Or, of course.</span></div><span data-dcnode-id="1599" instrument_node="">

</span><a class="title" data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw3609172/"><span data-dcnode-id="1529" instrument_node=""> To the Images Themselves
</span></a><span data-dcnode-id="1527" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1519"><span data-dcnode-id="1526" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1523"><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur20117949/"><span data-dcnode-id="1525" instrument_node="">ilpohirvonen</span></a></span><span class="review-date" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">30 December 2016</span></span><span data-dcnode-id="1520" instrument_node="">
</span></div><span data-dcnode-id="1518" instrument_node="">
</span><div class="content" data-dcnode-id="1500"><span data-dcnode-id="1517" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1503"><span data-dcnode-id="1516" instrument_node="">"You don't have to understand everything," explains Apichatpong Weerasethakul about his Palm d'Or winning, enigmatic and ambiguous "Uncle Boonmee Who Can Recall His Past Lives" (2010) in a 2010 interview with The Guardian. This remark by the author of the film is very simple but even more relevant as such since it is, I believe, precisely the unconscious demand for clarity and unity, a rational need to understand which leads many spectators astray when it comes to Weerasethakul's cinema. The torment of understanding is what ruins the viewing experience for far too many, making it harder for them to see the simple beauty of films like "Uncle Boonmee".</span><br data-dcnode-id="1515"><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">In all its simplicity, "Uncle Boonmee" is a story about a dying man. His family and other close ones take care of him as he requires daily doses of dialysis. On one night, his dead wife appears as a ghost to chat with him and his caretakers at a serene veranda only to be followed by the unexpected arrival of his long lost son who has now turned into an ape with glaring red eyes. A surprisingly calm discussion between those involved takes place, including a few flashback sequences, which slowly lead the way to a new day, a journey to a cave, and finally a detachment from this story to another.</span><br data-dcnode-id="1512"><br data-dcnode-id="1511"><span data-dcnode-id="1510" instrument_node="">There are no spoilers here because they do not exist in the Weerasethakul canon. His films are less about stories and more about images. The gulf between those who love Weerasethakul and those who despise him begins in this division: one tries to find a coherent and consistent story in the images, explaining objects in the screen space as symbols for something much clearer and less vague, while the other tries to embrace the images themselves not as symbols but as what they are, images. One could think of it as cinematic music, a peculiar language of the rhythm which does not call for conceptual understanding but a pre-reflective reception.</span><br data-dcnode-id="1509"><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">In addition to Weerasethakul's style, consisting of long takes, slow editing rhythm, large shot scales, lack of non-diegetic music, and a relentless use of ellipsis, which might create discontent in some spectators, there is also a more thematic, or "content-oriented," explanation for this discontent. "Uncle Boonmee" is about crossing boundaries. Halfway into the film, one is ready to accept a dialogue between people and ghosts as natural or a sexual encounter between a princess and a fish as nothing out of the ordinary. Conceptual distinctions into categories such as past and present, man and woman, animal and human, nature and culture, reason and emotion, dream and reality coalesce and disappear. This is why they will not serve a spectator trying to find a conceptually understandable story in the pervasiveness of the images. One could see the circularity of the narrative as a reflection of reincarnation, but even this seems too categorical. To me, there is only a fragmented narrative without clear boundaries unfolding like a beautiful poem without the burden of words.</span><br data-dcnode-id="1506"><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">Hopefully this has not come off as an attack. The foregoing discussion has been nothing but a modest attempt to open streams of curiosity. I have tried to explain the division between those who admire and those who despise "Uncle Boonmee". I have located the latter's discontent in Weerasethakul's unique style (using slowness and serenity to create cinematic lyricism which challenges our conceptual understanding) and the film's thematic treatise on crossed boundaries (combining purported conceptual distinctions into one to create a non-linear narrative which challenges our conceptual understanding). Clearly this is not everything, but it is "everything" in less than one thousand words. To Weerasethakul, the discontent of some means nothing but the success of his cinema: "if I make a film that divides the audience, I feel like that's a certain level of success," Weerasethakul tells The Guardian. In the spirit of this remark, there is nothing left to say other than a request to give Weerasethakul's cinema a chance rather than condemning it on the basis of one's own purported categorical distinctions. Like in the films of Ozu or Bresson, the objects in the screen space are not symbolic; the images themselves are what count -- and it is those images where Weerasethakul's cinema returns to.</span></div><span data-dcnode-id="1502" instrument_node="">
