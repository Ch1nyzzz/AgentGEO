</span><article class="post-3665 post type-post status-publish format-standard has-post-thumbnail hentry category-collections category-dighum18 category-women tag-digital-humanities tag-gender tag-poetry" data-dcnode-id="165" id="post-3665"><span data-dcnode-id="273" instrument_node="">
</span><header class="entry-header" data-dcnode-id="245"><span data-dcnode-id="272" instrument_node="">
</span><a class="entry-title" data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/open-access-anne-finch-digital-archive/" rel="bookmark" title="Permalink to Open-Access Anne Finch Digital Archive"><h1 data-dcnode-id="268"><span data-dcnode-id="271" instrument_node="">Open-Access </span><em data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Anne Finch Digital Archive</span></em></h1></a><span data-dcnode-id="266" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="247"><span data-dcnode-id="265" instrument_node="">
</span><a class="author url fn" data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/jennifer-keith/" rel="author" title="Posts by Jennifer Keith"><span data-dcnode-id="264" instrument_node="">Jennifer Keith</span></a><span class="sep" data-dcnode-id="260"><br data-dcnode-id="262"><span data-dcnode-id="261" instrument_node="">Posted on </span></span><a data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/open-access-anne-finch-digital-archive/" rel="bookmark" title="8:00 am"><time class="entry-date" data-dcnode-id="258" datetime="2016-06-28T08:00:31-04:00" pubdate=""><span data-dcnode-id="259" instrument_node="">June 28, 2016</span></time></a><span class="byline" data-dcnode-id="249"><span data-dcnode-id="256" instrument_node=""> </span><span class="sep" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node=""> by </span></span><span data-dcnode-id="253" instrument_node=""> </span><span class="author vcard" data-dcnode-id="250"><a class="url fn n" data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Jennifer Keith"><span data-dcnode-id="252" instrument_node="">Jennifer Keith</span></a></span></span><span data-dcnode-id="248" instrument_node=""> </span></div><span data-dcnode-id="246" instrument_node="">
</span></header><span data-dcnode-id="244" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="207"><span data-dcnode-id="243" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="238" id="attachment_3759" style="width: 310px"><img alt="Anne Finch Digital Archive" aria-describedby="caption-attachment-3759" class="wp-image-3759 size-medium" data-dcnode-id="242" height="233" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2016/06/finch-300x233.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2016/06/finch-300x233.jpg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2016/06/finch-150x117.jpg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2016/06/finch-768x597.jpg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2016/06/finch.jpg 981w" width="300"><p class="wp-caption-text" data-dcnode-id="239" id="caption-attachment-3759"><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//library.uncg.edu/dp/annefinch/"><span data-dcnode-id="241" instrument_node="">The Anne Finch Digital Archive</span></a></p></div><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="236" instrument_node="">Readers of early British poetry and early women writers will soon be able to discover all of Anne Finch’s poems and plays in the first scholarly edition of her work:&nbsp; </span><em data-dcnode-id="233"><a data-dcnode-id="234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cambridge.org/us/academic/subjects/literature/renaissance-and-early-modern-literature/cambridge-edition-works-anne-finch-countess-winchilsea-volume-1%3Fformat%3DHB"><span data-dcnode-id="235" instrument_node="">The Cambridge Edition of the Works of Anne Finch, Countess of Winchilsea</span></a></em><span data-dcnode-id="232" instrument_node="">, general editor, Jennifer Keith:&nbsp; Volume 1:&nbsp; Early Manuscript Books, edited by Jennifer Keith and Claudia Thomas Kairoff, associate editor Jean I. Marsden; and Volume 2:&nbsp; Later Collections, Print and Manuscript, edited by Jennifer Keith and Claudia Thomas Kairoff. The print edition establishes for the first time an accurate record of all known work by Finch that has survived:&nbsp; more than 230 poems (the number varies depending on how one enumerates different versions of some poems), two plays, and letters.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="229" instrument_node="">Already available is the open-access </span><em data-dcnode-id="226"><a data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//library.uncg.edu/dp/annefinch/"><span data-dcnode-id="228" instrument_node="">Anne Finch Digital Archive</span></a></em><span data-dcnode-id="225" instrument_node="">, which complements the print edition.&nbsp; Materials on the open-access </span><em data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Anne Finch Digital Archive</span></em><span data-dcnode-id="222" instrument_node=""> enable users to explore the archival elements of Finch’s texts.&nbsp; The </span><a data-dcnode-id="220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//library.uncg.edu/dp/annefinch/itemlist.aspx"><span data-dcnode-id="221" instrument_node="">featured poems</span></a><span data-dcnode-id="219" instrument_node=""> on this site have been selected from a great number in Finch’s œuvre to illustrate her work in different poetic kinds, including song, fable, biblical paraphrase, translation, verse epistle, and devotional poetry.&nbsp; For every featured poem, the site includes commentary with embedded links to illustrations, information about composition and printing dates and sources, </span><a data-dcnode-id="217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//library.uncg.edu/dp/annefinch/adm/works/182/182%2520Tis%2520strange%2520dig%2520ed%2520text/editedText.mp3"><span data-dcnode-id="218" instrument_node="">audio files of the poem read aloud</span></a><span data-dcnode-id="216" instrument_node="">, and source copies showing authorized manuscript and print texts with transcriptions.&nbsp; We will continue to add resources to the site, including recordings of musical performances of the songs featured.&nbsp; The multimedia elements of this site reflect the various ways that Finch’s work engaged her contemporary readers and listeners, who knew her work in manuscript, print, or performance, or in all of these forms.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Writing in an era known for the overtly public and political poetry of John Dryden, Jonathan Swift, and Alexander Pope, Anne Finch, Countess of Winchilsea (1661-1720), articulated a different literary and political authority.&nbsp; From her position as a female aristocrat, once at the center of the court and then for many years a political internal exile, Finch explored the individual’s spiritual condition as inextricable from social and political phenomena.&nbsp; Her interest in affairs of state frequently informed her exposure of patriarchy’s constraints on women and men.&nbsp; Finch’s work participates in the strategies of her contemporaries such as Dryden and Pope—the public speaker who sought to influence state politics, the renovator of classical mythology and pastoral who exposed contemporary mores, the fabulist who satirized state and society, the friend who used the couplet for conversation and exchange, and the wit who made discernment a moral good.&nbsp; But Finch both furthers and deviates from these practices.&nbsp; Readers will discover her innovative use of form and genre to explore a wide range of themes and her complex use of tone to enlist the reader’s discernment and develop a poetics of intimacy.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">The edition has received generous support from the National Endowment for the Humanities, the Folger Shakespeare Library, the Women’s Caucus of the American Society for Eighteenth-Century Studies, the William Andrews Clark Memorial Library, the University of North Carolina at Greensboro, and Wake Forest University. </span></p><span data-dcnode-id="208" instrument_node="">
</span></div><span data-dcnode-id="206" instrument_node="">
