</span><article class="post-5764 post type-post status-publish format-standard has-post-thumbnail hentry category-announcements category-jane-austen category-women tag-gender tag-jane-austen tag-lady-susan tag-menopause tag-middle-age tag-mrs-bennet tag-pride-and-prejudice" data-dcnode-id="2127" id="post-5764"><span data-dcnode-id="2365" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2339"><span data-dcnode-id="2364" instrument_node="">
</span><a class="entry-title" data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/my-poor-nerves/" rel="bookmark" title="Permalink to “My Poor Nerves”:  Women of a Certain Age on the Page"><h1 data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">“My Poor Nerves”: Women of a Certain Age on the Page</span></h1></a><span data-dcnode-id="2360" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2341"><span data-dcnode-id="2359" instrument_node="">
</span><a class="author url fn" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/shea-stuart/" rel="author" title="Posts by Shea Stuart"><span data-dcnode-id="2358" instrument_node="">Shea Stuart</span></a><span class="sep" data-dcnode-id="2354"><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">Posted on </span></span><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/my-poor-nerves/" rel="bookmark" title="9:49 pm"><time class="entry-date" data-dcnode-id="2352" datetime="2019-06-05T21:49:51-04:00" pubdate=""><span data-dcnode-id="2353" instrument_node="">June 5, 2019</span></time></a><span class="byline" data-dcnode-id="2343"><span data-dcnode-id="2350" instrument_node=""> </span><span class="sep" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node=""> by </span></span><span data-dcnode-id="2347" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2344"><a class="url fn n" data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Shea Stuart"><span data-dcnode-id="2346" instrument_node="">Shea Stuart</span></a></span></span><span data-dcnode-id="2342" instrument_node=""> </span></div><span data-dcnode-id="2340" instrument_node="">
</span></header><span data-dcnode-id="2338" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="2174"><span data-dcnode-id="2337" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2333" id="attachment_5768" style="width: 260px"><img alt="" aria-describedby="caption-attachment-5768" class="size-medium wp-image-5768" data-dcnode-id="2336" height="300" loading="lazy" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2019/05/2-250x300.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2019/05/2-250x300.jpg 250w, https://www.18thcenturycommon.org/wp-content/uploads/2019/05/2-125x150.jpg 125w, https://www.18thcenturycommon.org/wp-content/uploads/2019/05/2.jpg 400w" width="250"><p class="wp-caption-text" data-dcnode-id="2334" id="caption-attachment-5768"><span data-dcnode-id="2335" instrument_node="">Portrait of a Lady (1768), John Russell, 1745–1806, British. Oil on Canvas. Yale Center for British Art, Bequest of John N. and Dorothy C. Estabrook.</span></p></div><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2331" instrument_node="">When Mrs. Bennet complains of her “poor nerves” and her husband sardonically replies that he is long acquainted with them, we as readers of Jane Austen’s </span><em data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Pride and Prejudice </span></em><span data-dcnode-id="2328" instrument_node="">are to laugh.&nbsp; The laughter may die into an awkward chuckle when the reader is a 40ish-year-old woman and realizes that most likely Mrs. Bennet is as well.&nbsp; While her daughters come of age and dance at balls and flirt with officers, Mrs. Bennet is perhaps experiencing perimenopause or menopause and the end of one stage of a woman’s life.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">When women’s lives are divided into maid, mother, crone, it is easy to overlook the moment between early motherhood and old age.&nbsp; How did (and how do) women deal with life in their forties when their children are entering that “most interesting” and “most trying” times of their lives while they themselves are in “the most dangerous”?&nbsp; Are they objects of ridicule?&nbsp; Paragons of wisdom?&nbsp; Are they even visible at all?</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2320"><em data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Menopause in Early Modern England (and Now)</span></em></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">As a 43 -year-old woman, I am finding that perimenopause, like greatness, is something that one finds thrust upon you.&nbsp; It is also something that people do not discuss much even in 2019.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2312"><a data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/deannaraybourn/status/1083035259162292227"><span data-dcnode-id="2315" instrument_node="">When Deanna Raybourn pronounced herself a “crone” on Twitter</span></a><span data-dcnode-id="2313" instrument_node=""> and welcomed questions about her newly menopausal state, numerous women responded.&nbsp; Here at last was someone opening up in a public way about what has been considered a private milestone and offering to give advice to others in the process.&nbsp; It was an act of bravery and of generosity and a welcome opening for people to talk more publicly about their bodies.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Menopause was a rarely spoken and private subject in the eighteenth century as well.&nbsp; In the late eighteenth century (that conduct book loving age), the “first popular guidebooks for the menopausal woman appeared, some of which were reportedly sold out in a few months” (Stolberg 412).&nbsp; Laura Gowing finds that “[i]t is still hard to recover women’s knowledge and interpretations of the body” (10), and most discussions of menopause are to be found in medical journals but not in women’s diaries or letters.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Then, as now, menopause generally arrived at age 50 but a woman was not considered old until 60 when it was certain she could no longer conceive.&nbsp; Menopause was called “the cessation of terms” or “flowers” or “courses” (Read 37).&nbsp; As Gowing notes, “Much vernacular printed discussion of the female body was specifically aimed at helping women conceive.&nbsp; Sexual difference was discussed not in abstract terms but as the basis for heterosexual sex and conception” (19).&nbsp; This means that when women are no longer fertile, their bodies are no longer objects of medical interest.</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">However, some historians see menopause as a “socially induced set of symptoms” and suggest that “modern physicians may have created a problem of personal identity” (Crawford 25).&nbsp; Women most likely experienced actual symptoms–medical records show complaints of “flashings”–but those symptoms were subsumed in general ideas of old age.&nbsp; Michael Stolberg explains that “[a]round 1740, an anonymous English practitioner marketed his secret purgatives and uterine drops against the disorders ‘that most women labor under, when being between forty and fifty years’” (422).&nbsp; With no medical cure for the symptoms of perimenopause and menopause, some women relied on quack cures for help.&nbsp; Even now in the twenty-first century no real relief exists and women are told to take herbal supplements, exercise, do yoga, and eat right.&nbsp; Turning to doctors for symptom alleviation was and is a fruitless endeavor.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2299"><em data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Mrs. Bennet</span></em></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Mr. and Mrs. Bennet have been married for 23 years (Austen 5) when the novel opens.&nbsp; Even if she married at 25, she’d be 48 at the oldest.&nbsp; Most likely she was married at a younger age–Mr. Bennet, “captivated by youth and beauty, and that appearance of good humour,–that youth and beauty generally give, had married a woman whose weak understanding and illiberal mind, had very early in their marriage put an end to real affection for her” (152).&nbsp; This implies a younger woman, perhaps in her teens.&nbsp; If she married at 18, she is 41 at the novel’s open.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Austen tells us that the Bennets expected an heir for “many years after Lydia’s birth” (197), but if “marital fertility had frequently concluded by age 40” (Botelho 53), this explains the lack of a pregnancy even in a youngish woman.&nbsp; “Reproduction was a public business and women’s bodies a public domain” (Botelho 57), and Mrs. Bennet, who is unable to produce an heir to end the entail, finds her body’s failure to be public indeed.&nbsp; For women who have exchange value as marriagable virgins and use value as fertile wives, their value and their identities had to be in flux in the time between motherhood and grandparenthood.&nbsp; As Patricia Crawford notes, “After her child bearing was over, a woman was no longer powerful and less feared” (32).&nbsp; Mrs. Bennet simply becomes ridiculous.</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Her public and ridiculous body becomes symbolic of her failures as a mother.&nbsp; “The female body was a public affair, the target of official regulation, informal surveillance, and regular, intimate touch by women and men,” writes Laura Gowing (16).&nbsp; After Lydia elopes with Wickham, the spectacle of Mrs. Bennet’s hysterical but non-sexual body replaces the spectacle of Lydia’s sexualized body in her home.&nbsp; The family is afraid of Mrs. Bennet’s loud cries and talk with Hill, but Hill and the other servants would know the bodies of all the women in the household well.&nbsp; Women’s bodies may be considered private but “most houses were built around shared space” (Gowing 23), and five menstruating daughters produced a lot of linen.&nbsp; What is happening in Mrs. Bennet’s body and, by proxy, the public sexualization of Lydia’s body, has been old news with any of the women scrubbing sheets.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2288" instrument_node="">The focus of </span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Pride and Prejudice</span></em><span data-dcnode-id="2285" instrument_node=""> is on young women’s bodies, on “the most trying age” and “most interesting time” of their lives.&nbsp; Lois Banner quotes one woman’s description of menopause as “the dangerous age”:&nbsp; “between 40 and 50” “‘we are all more or less mad’” (Banner 273).&nbsp; The Bennet household is in a dangerous age–the daughters must be married before their father dies and the entail takes effect, and Mrs. Bennet feels this necessity both in a financial and biological sense.&nbsp; There is no heir.&nbsp; Time has run out.&nbsp; “You do not know what I suffer” (4) and “nobody can tell what I suffer” (76), Mrs. Bennet tells her family.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">She also practices old age.&nbsp; “At our time of life”(6), she often says of herself and Mr. Bennet.&nbsp; “It was so pleasant at her time of life to consign her single daughters to the care of their sister, that she might not be obliged to go into company more than she liked,” writes Austen (67).&nbsp; She is trying on cronehood, but in true middle-age fashion, she cannot help but see herself as still young.&nbsp; Mr. Bennet tells her she is as handsome as her daughters, and she does not deny it.&nbsp; She “still loves a red coat in [her] heart” (21).&nbsp; Despite these occasional forays into youth, she seems very aware that menopausal women should shift into being grandmothers which, with the entail, could illuminate her desperation to make five single daughters into five married mothers.</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2279" instrument_node="">Film adaptations of </span><em data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Pride and Prejudice</span></em><span data-dcnode-id="2276" instrument_node=""> tend to portray Mrs. Bennet as an older woman even if the actress portraying her is in her 40s.&nbsp; Allison Steadman was 49 when she played Mrs. Bennet in the 1995 BBC </span><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Pride and Prejudice</span></em><span data-dcnode-id="2273" instrument_node="">.&nbsp; Brenda Blethyn was 59 in the 2005 </span><em data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Pride &amp; Prejudice</span></em><span data-dcnode-id="2270" instrument_node="">.&nbsp; Sally Phillips is the closest in age to the novel version of Mrs. Bennet at 46 in the 2016 </span><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Pride and Prejudice and Zombies </span></em><span data-dcnode-id="2267" instrument_node="">(IMDB).&nbsp; Movie shorthand for a mother of grown daughters is a woman in her 50s or 60s, which is how Mrs. Bennet is visually constructed.&nbsp; The liminal age of the young women between parents and husbands that is the subject of the films is easily rendered visual:&nbsp; the Bennet sisters are young and beautiful and capless.&nbsp; The liminal age of perimenopause is invisible and elided.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2262"><em data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Lady Susan</span></em></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2260" instrument_node="">We often to look to Austen for the romcom pattern, for stories about young people growing up, learning about life, and finding love.&nbsp; However, her middle-aged women are just as fascinating.&nbsp; Mrs. Bennet, Miss Bates, Lady Catherine, Lady Russell–and Lady Susan.&nbsp; In </span><em data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Lady Susan</span></em><span data-dcnode-id="2257" instrument_node="">, Austen’s 1794 (?) novel, we see an almost middle-aged woman attempting to seduce a younger man who could be her daughter’s suitor.&nbsp; Lady Susan is 35-years-old and a widow but not past childbearing age which makes her both marriageable and dangerous, for as Gowing explains, “Sexually experienced and past the age of child-bearing, imagined as both lustful and undesirable, their [middle-aged women’s] ventures into sexual talk, still less sexual acts, could scarcely be contemplated with equanimity” (22).</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">“I have seldom seen so lovely a woman as Lady Susan,” writes one character, “and from her appearance one would not suppose her more than five and twenty, though she must be in fact ten years older” (143).&nbsp; Lady Susan flirts with Reginald, a young heir loved by her daughter, and he falls in love with her.&nbsp; When his father hears of a potential marriage with Lady Susan, he writes a warning to Reginald, saying her age is a “material objection,” but her conduct is so egregious that “the difference of even twelve years becomes in comparison of small account” (152).&nbsp; Lady Susan is fleeing a friend’s home after she seduced her friend’s husband, and she takes full advantage of her relatively free position as a widow to indulge her sexual desires.&nbsp; She could be the cliche of the lusty widow but is drawn so well by Austen that the reader can’t help but fall in love with her as well.&nbsp; Lady Susan is a complicated character, a villain as well as a likable protagonist.&nbsp; Her age is made clear in the novel and is a factor within the plot.&nbsp; It is interesting that Austen made a middle-aged women between husbands the main character of a novel in her juvenilia but did not again dwell so closely on older women in her later novels.&nbsp; The adult Austen chose to write about women who were marketable.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2249"><em data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Conclusion</span></em></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">As women now talk more about menopause and about the transitions of the 40s, perhaps we can extend those conversations to the middle-aged women on the pages of the novels we read and teach and study.&nbsp; Instead of seeing these women as “old,” we need to recognize that they are in flux and, like their marriageable daughters, their identities are shifting.&nbsp; This dangerous time can be just as interesting as the trying time.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2242"><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Works Cited</span></strong></p><span data-dcnode-id="2241" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2099"><span data-dcnode-id="2124" instrument_node="">
</span><a class="entry-title" data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/reframing-the-pregnancy-story-on-literature-stitching-and-lost-narratives/" rel="bookmark" title="Permalink to Reframing the Pregnancy Story:  On Literature, Stitching, and Lost Narratives"><h1 data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Reframing the Pregnancy Story: On Literature, Stitching, and Lost Narratives</span></h1></a><span data-dcnode-id="2120" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2101"><span data-dcnode-id="2119" instrument_node="">
</span><a class="author url fn" data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/alicia-kerfoot/" rel="author" title="Posts by Alicia Kerfoot"><span data-dcnode-id="2118" instrument_node="">Alicia Kerfoot</span></a><span class="sep" data-dcnode-id="2114"><br data-dcnode-id="2116"><span data-dcnode-id="2115" instrument_node="">Posted on </span></span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/reframing-the-pregnancy-story-on-literature-stitching-and-lost-narratives/" rel="bookmark" title="8:00 am"><time class="entry-date" data-dcnode-id="2112" datetime="2018-11-12T08:00:09-05:00" pubdate=""><span data-dcnode-id="2113" instrument_node="">November 12, 2018</span></time></a><span class="byline" data-dcnode-id="2103"><span data-dcnode-id="2110" instrument_node=""> </span><span class="sep" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node=""> by </span></span><span data-dcnode-id="2107" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2104"><a class="url fn n" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Alicia Kerfoot"><span data-dcnode-id="2106" instrument_node="">Alicia Kerfoot</span></a></span></span><span data-dcnode-id="2102" instrument_node=""> </span></div><span data-dcnode-id="2100" instrument_node="">
</span></header><span data-dcnode-id="2098" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="1848"><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2091"><em data-dcnode-id="2092"><span data-dcnode-id="2096" instrument_node="">This essay is republished with permission from </span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nursingclio.org/2018/10/25/reframing-the-pregnancy-story-on-literature-stitching-and-lost-narratives/"><span data-dcnode-id="2095" instrument_node="">Nursing Clio</span></a><span data-dcnode-id="2093" instrument_node="">, where it first appeared.</span></em></p><span data-dcnode-id="2090" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2083" id="attachment_5523" style="width: 310px"><img alt="" aria-describedby="caption-attachment-5523" class="size-medium wp-image-5523" data-dcnode-id="2089" height="213" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/11/Margaret-Ten-Eyck-needlework-mourning-picture-1805-Winterthur-Museum-300x213.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Margaret-Ten-Eyck-needlework-mourning-picture-1805-Winterthur-Museum-300x213.jpg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Margaret-Ten-Eyck-needlework-mourning-picture-1805-Winterthur-Museum-150x106.jpg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Margaret-Ten-Eyck-needlework-mourning-picture-1805-Winterthur-Museum-768x545.jpg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Margaret-Ten-Eyck-needlework-mourning-picture-1805-Winterthur-Museum.jpg 1024w" width="300"><p class="wp-caption-text" data-dcnode-id="2084" id="caption-attachment-5523"><span data-dcnode-id="2088" instrument_node="">An 1805 needlework mourning picture with two embroidered inscriptions that read:&nbsp; “In Memory / of / Henry Ten Eyck / obit 1st July 1794 / AEt: 8 Yrs &amp; 5 Mths” and “In Memory of / Catharine Ten Eyck / Obit:25th. Aug: 1797 / AEt: 18 Months.”&nbsp; (</span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//museumcollection.winterthur.org/single-record.php%3Fresultsperpage%3D20%26view%3Dcatalog%26srchtype%3Dadvanced%26hasImage%3D%26ObjObjectName%3D%26CreOrigin%3D%26Earliest%3D%26Latest%3D%26CreCreatorLocal_tab%3D%26materialsearch%3D%26ObjObjectID%3D%26ObjCategory%3D%26DesMaterial_tab%3D%26DesTechnique_tab%3D%26AccCreditLineLocal%3D%26CreMarkSignature%3D%26recid%3D1958.2877%2520A%26srchfld%3D%26srchtxt%3Dmourning%2Bpicture%26id%3Dcd03%26rownum%3D1%26version%3D100%26src%3Dresults-imagelink-only%23.W-nMy5NKg2y"><span data-dcnode-id="2087" instrument_node="">Margaret Ten Eyck/Winterthur Museum, Garden &amp; Library</span></a><span data-dcnode-id="2085" instrument_node="">)</span></p></div><span data-dcnode-id="2082" instrument_node="">
</span><h3 data-dcnode-id="2080" id="my-story"><span data-dcnode-id="2081" instrument_node="">My Story</span></h3><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">When I found out I was pregnant on July 1, 2016, I thought it was the beginning of a story to which I knew the ending.&nbsp; My partner, Carter, and I had only just decided to try to become pregnant.&nbsp; It was our first attempt, and it was a success!&nbsp; What a wonderful, happy story.&nbsp; One month later, several of our close friends and most family knew our news.&nbsp; But when we went for our first ultrasound on August 5, we were devastated.&nbsp; There was no heartbeat.&nbsp; The technician went to get the doctor, who told us how common miscarriages were and how many times he gave this bad news in a day.&nbsp; I learned that what I had experienced was a&nbsp;</span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/ency/article/001488.htm"><span data-dcnode-id="2077" instrument_node="">missed miscarriage</span></a><span data-dcnode-id="2075" instrument_node="">—the pregnancy had ended, probably around week 6 or 7, the heart had failed to beat, but my body hadn’t reacted.&nbsp; I held myself together until we left the building, and then the loss overwhelmed me.&nbsp; I wept uncontrollably in the car and started messaging all of our friends and family.&nbsp; “There is no heartbeat, I lost the pregnancy.”</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">More than anything, I felt how I had lost a story of the future that I had built up in my mind.&nbsp; We had been discussing names, thinking about how to arrange our lives around a baby.&nbsp; About what it would be like to have a child, a family together.&nbsp; What has followed in the last two years has been even more difficult than I could have imagined and has required many alterations to our pregnancy story.&nbsp; The loss of the expected narrative and the discovery of new narratives is what I want to focus on here.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">When I lost my pregnancy, I started to feel like everything else in my life was also “miscarrying,” especially my work.&nbsp; I’m a professor of eighteenth-century literature, and I was about to go up for tenure in the year following my loss.&nbsp; I had to prepare a summary of my work for the university to review, and I felt like a failure:&nbsp; I focused on rejections and questioned my productivity.&nbsp; But over the course of the past two years (and, I should say, with the help of psychotherapy) I have started to revise that narrative and to become more confident.&nbsp; I also began to see pregnancy and child loss in the literature I study and love, and this discovery led to acts of commemoration for me.</span></p><span data-dcnode-id="2067" instrument_node="">
</span><h3 data-dcnode-id="2065" id="mourning-pregnancy-and-infant-loss-in-the-eighteenth-century"><span data-dcnode-id="2066" instrument_node="">Mourning Pregnancy and Infant Loss in the Eighteenth Century</span></h3><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">My experiences with pregnancy, loss, and infertility have made me think about how similar losses would have felt in the eighteenth century.&nbsp; Britain’s Queen Anne (1665-1714) had seventeen pregnancies, only three of which resulted in live births [1].&nbsp; Anne’s biographer, Anne Somerset, notes that even though “inconsolable sorrow could be condemned as impious or even sinful, it proved difficult for Anne to endure her tribulations with fortitude” [2].&nbsp; The idea that too much grief was unchristian was common in the eighteenth century, and women were often blamed not only for the impact they might have on their fetus but also for excessive grieving after the loss of a pregnancy or child [3].</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2060" instrument_node="">Nicole Garret has noted the tendency for male advice writers to downplay child loss and “impose a rationale of consolation” on women [4].&nbsp; But women weren’t so easily convinced.&nbsp; Lady Frances Norton “spent years stitching original poetry about her dead daughter upon covers, stools, and chairs”[5].&nbsp; Women also wrote poetry to their unborn fetuses that focused on “the burden of pregnancy and the fear of injury to either the mother or to the foetus” [6].&nbsp; Mothers who left their children at London’s Foundling Hospital also left&nbsp;</span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foundlingmuseum.org.uk/events/threads-of-feeling/"><span data-dcnode-id="2059" instrument_node="">textile tokens</span></a><span data-dcnode-id="2057" instrument_node="">&nbsp;sometimes personalized with embroidery.&nbsp; The token was meant to help identify the child if the mother could later come back and claim them [7].</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2054" instrument_node="">One fictional scene of maternal grief inspired my own research and became therapeutic for me [8].&nbsp; In her 1814 novel,&nbsp;</span><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">The Wanderer</span></em><span data-dcnode-id="2051" instrument_node="">, Frances Burney describes a scene reminiscent of those reproduced in&nbsp;</span><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//museumcollection.winterthur.org/single-record.php%3Fresultsperpage%3D20%26view%3Dcatalog%26srchtype%3Dadvanced%26hasImage%3D%26ObjObjectName%3D%26CreOrigin%3D%26Earliest%3D%26Latest%3D%26CreCreatorLocal_tab%3D%26materialsearch%3D%26ObjObjectID%3D%26ObjCategory%3D%26DesMaterial_tab%3D%26DesTechnique_tab%3D%26AccCreditLineLocal%3D%26CreMarkSignature%3D%26recid%3D1958.2877%2520A%26srchfld%3D%26srchtxt%3Dmourning%2Bpicture%26id%3Dd9f0%26rownum%3D1%26version%3D100%26src%3Dresults-imagelink-only"><span data-dcnode-id="2050" instrument_node="">embroidered mourning pieces of the era</span></a><span data-dcnode-id="2048" instrument_node="">.&nbsp; The heroine of the novel, Juliet, and her friend Gabriella stand over the grave of Gabriella’s young son.&nbsp; They are in a “church-yard upon [a] hill” and with a “full view of the wide spreading ocean” when Juliet sees her friend “bend over a small elevation of earth,” and Juliet responds by “leaning over a monument” while she bathes herself in tears at the grief of her friend [9].&nbsp; Before Gabriella recognizes Juliet, she assumes she is a fellow-mourner and asks:&nbsp; “Alas, Madam! are you, also, deploring the loss of a child?”&nbsp; The two grieve together so earnestly “that neither of them seemed to have any sensation left of self, from excess of solicitude for the other” [10].</span></p><span data-dcnode-id="2046" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2042" id="attachment_5521" style="width: 235px"><img alt="" aria-describedby="caption-attachment-5521" class="size-medium wp-image-5521" data-dcnode-id="2045" height="300" loading="lazy" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/11/Kerfoot1-225x300.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Kerfoot1-225x300.jpg 225w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Kerfoot1-112x150.jpg 112w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/Kerfoot1.jpg 542w" width="225"><p class="wp-caption-text" data-dcnode-id="2043" id="caption-attachment-5521"><span data-dcnode-id="2044" instrument_node="">My embroidered mourning piece based on Frances Burney’s The Wanderer (1814).&nbsp; (Alicia Kerfoot/Nursing Clio)</span></p></div><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2040" instrument_node="">After reading this scene and looking at surviving examples of mourning pictures, I began my own embroidered mourning picture.&nbsp; I wanted to make material not only my grief but also my research.&nbsp; I sketched an interpretation of the scene from&nbsp;</span><em data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">The Wanderer</span></em><span data-dcnode-id="2037" instrument_node="">&nbsp;and included the traditional elements of a mourning piece.&nbsp; When I’m finished, I’ll write the names of the family members I’ve lost over the past two years on the tombstones.&nbsp; I’ll also write “angel child” on one of the tombstones, which is what Gabriella calls her son.&nbsp; The mourning picture often depicted national or communal grief and was meant as an exercise in needlework for young women; it especially flourished in America after the death of George Washington [11].&nbsp; In this scene from&nbsp;</span><em data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">The Wanderer</span></em><span data-dcnode-id="2034" instrument_node="">&nbsp;and in the embroidered mourning pieces of the era, the public or communal fuse with the personal.&nbsp; One example from the Winterthur Museum (the headline image of this article) includes inscriptions to two children:&nbsp; one aged 8 years and one aged 18 months.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">My embroidery is a memorial to my lost pregnancy and a work of hope that the narrative will change soon.&nbsp; When I embroider, I can control the stitches and the appearance of my work; I can see it progress, stitch-by-stitch, and it gives me satisfaction.&nbsp; Bridget Long notes that in the eighteenth century, “needlework acted as a distraction while women pondered personal concerns” [12].&nbsp; It has certainly worked that way for me.</span></p><span data-dcnode-id="2029" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2025" id="attachment_5522" style="width: 235px"><img alt="" aria-describedby="caption-attachment-5522" class="size-medium wp-image-5522" data-dcnode-id="2028" height="300" loading="lazy" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/11/kerfoot2-225x300.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/11/kerfoot2-225x300.jpg 225w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/kerfoot2-112x150.jpg 112w, https://www.18thcenturycommon.org/wp-content/uploads/2018/11/kerfoot2.jpg 542w" width="225"><p class="wp-caption-text" data-dcnode-id="2026" id="caption-attachment-5522"><span data-dcnode-id="2027" instrument_node="">My personal copy of a first Canadian edition of Anne’s House of Dreams (1917).&nbsp; (Alicia Kerfoot/Nursing Clio)</span></p></div><span data-dcnode-id="2024" instrument_node="">
</span><h3 data-dcnode-id="2019" id="another-queen-anne-infant-loss-in-l.-m.-montgomerys-annes-house-of-dreams"><strong data-dcnode-id="2020"><span data-dcnode-id="2023" instrument_node="">Another Queen Anne:&nbsp; Infant Loss in L. M. Montgomery’s&nbsp;</span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Anne’s House of Dreams</span></em></strong></h3><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2008"><em data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Anne’s House of Dreams</span></em><span data-dcnode-id="2015" instrument_node="">&nbsp;does the same kind of commemorative work as a mourning piece.&nbsp; In August 1914, the same week that WWI began, L. M. Montgomery lost her infant,&nbsp;</span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.findagrave.com/memorial/81249886/hugh-alexander-macdonald"><span data-dcnode-id="2014" instrument_node="">Hugh Alexander</span></a><span data-dcnode-id="2012" instrument_node="">, at birth.&nbsp; Montgomery was in the middle of writing&nbsp;</span><em data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Anne of the Island</span></em><span data-dcnode-id="2009" instrument_node="">&nbsp;(1914) and dedicated herself to finishing the novel, despite “a lethargic depression.”&nbsp; She wrote:&nbsp; “never did I write a book under greater stress” [13].</span></p><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2000"><em data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Anne’s House of Dreams,</span></em><span data-dcnode-id="2004" instrument_node="">&nbsp;which was published in 1917, was the novel that materialized this grief.&nbsp; In the novel, Anne and Gilbert settle into their “house of dreams” on Prince Edward Island.&nbsp; The book focuses on Anne’s friendship with her neighbor, Leslie Moore.&nbsp; Leslie is trapped in an unhappy and difficult marriage and often envies Anne’s happiness.&nbsp; When Anne tells her she is pregnant with her first child, Leslie responds “so you are to have&nbsp;</span><em data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">that</span></em><span data-dcnode-id="2001" instrument_node="">, too,” though later she stitches “a tiny white dress of exquisite workmanship” with “delicate embroidery” as a show of her love [14].&nbsp; When Anne’s baby, a girl named Joyce, dies shortly after birth, she is dressed “in the beautiful dress Leslie had made” [15].</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1998" instrument_node="">In the novel, Anne downplays her talent as a writer, saying, “Oh, I do little things for children.&nbsp; I haven’t done much since I was married.&nbsp; And I have no designs on a great Canadian novel . . . that is quite beyond me” [16].&nbsp; </span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sarahemsley.com/2015/09/29/annes-house-of-dreams-and-the-great-canadian-novel/"><span data-dcnode-id="1997" instrument_node="">Sarah Emsley connects this attitude</span></a><span data-dcnode-id="1995" instrument_node="">&nbsp;to how Montgomery’s work was being classified as children’s literature at the time, even though Montgomery didn’t imagine it to be so [17].&nbsp; In response to a letter from a reader who “thought her characters were unrealistic” Montgomery wrote, “Do you think&nbsp;</span><em data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Anne</span></em><span data-dcnode-id="1992" instrument_node="">&nbsp;was happy when her baby died—when her sons went to the war—when one was killed?” [18].&nbsp; She linked the death of Anne’s baby to losses she would experience during the war, and all in response to a suggestion that Montgomery’s own writing was idealistic rather than serious.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">I think that in&nbsp;</span><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Anne’s House of Dreams</span></em><span data-dcnode-id="1986" instrument_node="">&nbsp;Montgomery aligned Anne’s lost infant with the lost voices of woman writers.&nbsp; That her first child is a girl who dies at birth, and her second is a healthy boy of “ten pounds,” seems to parallel the way that Anne hands over the writing of the “great Canadian novel” to Owen Ford, a male journalist from Toronto.&nbsp; What Anne does end up writing is a new narrative that imagines what Joy would have looked like if she had lived:&nbsp; “she would have been over a year old.&nbsp; She would have been toddling around on her tiny feet and lisping a few words.&nbsp; I can see her so plainly” [19].&nbsp; She keeps Joy alive in her mind and writes a narrative for her.&nbsp; It isn’t the one she expected, but it’s one in which Joy gets to have a voice, “lisping a few words.”</span></p><span data-dcnode-id="1984" instrument_node="">
</span><h3 data-dcnode-id="1982" id="new-narratives"><span data-dcnode-id="1983" instrument_node="">New Narratives</span></h3><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node="">Though L. M. Montgomery experienced the loss of an infant, some of what she had Anne give voice to resonates with my experience of pregnancy loss and infertility.&nbsp; So many times these past two years, I have thought about what might have been and what might be.&nbsp; I have connected my own struggles to write with my inability to become pregnant.&nbsp; And now I have been thinking about a new narrative:&nbsp; that of being the parent of a child conceived with a&nbsp;</span><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.centerforhumanreprod.com/egg-donation/how-it-works/"><span data-dcnode-id="1979" instrument_node="">donor egg</span></a><span data-dcnode-id="1977" instrument_node="">.&nbsp; I think about the community of women stitching together, mourning together, and writing new narratives of loss and hope together in the fiction that I love, and it makes me grateful for what I’ve experienced.&nbsp; It has been difficult, but it’s given me empathy and made me attend to the losses of those around me.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1974" instrument_node="">Carter and I have also been overwhelmed by how many people have shared their stories with us.&nbsp; Not long after my miscarriage, a friend started&nbsp;</span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pregnantwithpause.wordpress.com/"><span data-dcnode-id="1973" instrument_node="">a blog on the complexity of pregnancy loss</span></a><span data-dcnode-id="1971" instrument_node="">.&nbsp; More recently, I was moved by a post by&nbsp;</span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sophiecoulombeau.wordpress.com/2018/07/27/suboptimal-a-little-common-story/"><span data-dcnode-id="1970" instrument_node="">Sophie Coulombeau</span></a><span data-dcnode-id="1968" instrument_node="">&nbsp;on the devastating but so common story of such losses.&nbsp; Friends, family, and acquaintances have offered support. It is thanks to their generosity that we can afford the donor egg process and are ready to begin it, but how this part of the story will end, I have no idea.</span></p><span data-dcnode-id="1966" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1785"><span data-dcnode-id="1810" instrument_node="">
</span><a class="entry-title" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/elizmarsh/" rel="bookmark" title="Permalink to The Life Writing of Elizabeth Marsh, an Eighteenth-Century Global Woman"><h1 data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">The Life Writing of Elizabeth Marsh, an Eighteenth-Century Global Woman</span></h1></a><span data-dcnode-id="1806" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1787"><span data-dcnode-id="1805" instrument_node="">
</span><a class="author url fn" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/julie-park/" rel="author" title="Posts by Julie Park"><span data-dcnode-id="1804" instrument_node="">Julie Park</span></a><span class="sep" data-dcnode-id="1800"><br data-dcnode-id="1802"><span data-dcnode-id="1801" instrument_node="">Posted on </span></span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/elizmarsh/" rel="bookmark" title="8:00 am"><time class="entry-date" data-dcnode-id="1798" datetime="2018-06-06T08:00:12-04:00" pubdate=""><span data-dcnode-id="1799" instrument_node="">June 6, 2018</span></time></a><span class="byline" data-dcnode-id="1789"><span data-dcnode-id="1796" instrument_node=""> </span><span class="sep" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node=""> by </span></span><span data-dcnode-id="1793" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1790"><a class="url fn n" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Julie Park"><span data-dcnode-id="1792" instrument_node="">Julie Park</span></a></span></span><span data-dcnode-id="1788" instrument_node=""> </span></div><span data-dcnode-id="1786" instrument_node="">
</span></header><span data-dcnode-id="1784" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="1659"><span data-dcnode-id="1783" instrument_node="">
</span><blockquote data-dcnode-id="1776"><p data-dcnode-id="1780"><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">As I found it in vain to contend, I had a trunk opened, and they fixed the cloaths I was to put on, which were very new; but I wrapped up my head in a night cap…as I was told they did not intend to let me wear a hat. When I was ornamented, as they imagined, instead of being placed, as before, on my own mule, I was seated before Mr Crisp on his; and at the same time, one of the guards pulled off his hat and carried it away with him, which treatment amazed us extremely. But our astonishment increased when our fellow sufferers were made to dismount, and walk two and two, bareheaded, the sun being hotter than I had ever felt it.&nbsp; &nbsp;</span></em></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">–Elizabeth Marsh on being prepared by her Moroccan captors to enter their country after being abducted on a ship in 1756.</span></p></blockquote><span data-dcnode-id="1775" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1771" id="attachment_5488" style="width: 310px"><img alt="" aria-describedby="caption-attachment-5488" class="wp-image-5488 size-medium" data-dcnode-id="1774" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/06/marsh1-300x225.png&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/06/marsh1-300x225.png 300w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/marsh1-150x113.png 150w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/marsh1-768x576.png 768w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/marsh1.png 800w" width="300"><p class="wp-caption-text" data-dcnode-id="1772" id="caption-attachment-5488"><span data-dcnode-id="1773" instrument_node="">An exhibit of Elizabeth Marsh materials at UCLA Library Special Collections, May 2018</span></p></div><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">The twentieth year of Elizabeth Marsh’s life can hardly be said to have been uneventful. In July 1756, while traveling alone to England, Marsh, an English woman, was captured by corsairs (pirates) off the coast of North Africa on her way to England, and taken by force to Barbary, now known as Morocco. There, she was nearly turned into the sexual slave of Sidi Muhammed, the acting sultan, but was saved by both her firm resistance and James Crisp, a fellow captive pretending to be her husband.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Close to two decades later, when she was nearly forty years old, she defied social custom by traveling alone again, this time as a wife (now married to Crisp in reality) and mother, on an overland journey by palanquin throughout East India. During this journey, which involved seeing many local sights as well as dancing, singing, and drinking tea with her company, she escaped abduction but kept a diary.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Marsh lived from 1735 to 1785. Born in Portsmouth, England she was conceived in Kingston, Jamaica. Her father was a ship’s carpenter and dockyard official for the Royal Navy. These bare details appear mundane at first, yet the cosmopolitan significance of these places in the eighteenth century and of her father’s naval career intimates the extraordinary richness that a fuller account reveals of this headstrong and independent woman’s life. Filled with severe shocks, pains, and turns of fortune, Marsh’s life was profoundly shaped by the dramatic changes taking place in the world at large in the eighteenth century, including those brought on by England’s global commerce and expansion, increased opportunities for travel, and economic mobility for the English, as well as different wars, including the Seven Years’ War and American War of Independence.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1751"><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.library.ucla.edu/"><span data-dcnode-id="1760" instrument_node="">UCLA’s</span></a><span data-dcnode-id="1758" instrument_node=""> </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.library.ucla.edu/yrl"><span data-dcnode-id="1757" instrument_node="">Charles E. Young Research Library’s</span></a><span data-dcnode-id="1755" instrument_node=""> </span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.library.ucla.edu/special-collections"><span data-dcnode-id="1754" instrument_node="">Special Collections</span></a><span data-dcnode-id="1752" instrument_node=""> holds a bound manuscript volume of Marsh’s written accounts of the two noteworthy episodes in her life as a traveler, mentioned above. In addition to the stories they tell, the accounts are notable for their ethnographic details, and their view of eighteenth-century culture, including the role of women in this time period, as well as British imperialism and race relations. Material culture scholars might be interested in Marsh’s descriptions of Moroccan and Indian landscapes and gardens, architecture, interior décor, household objects, and food, in addition to the dress of native inhabitants.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Marsh also describes the different states of horror, melancholy, grief, joy, and boredom that accompanied her experiences, which in Morocco were especially turbulent, and in India reminiscent of the eighteenth-century social worlds depicted in the novels of Frances Burney and Jane Austen. Throughout, she records the physical experiences of extreme climates, including her acute thirst and fatigue when taken captive by Moroccans and forced to ride for hundreds of miles on a mule, and of being unable to lie on her sleeping mat in India because the ground was so hot.</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1744"><img alt="" class="alignleft size-medium wp-image-5489" data-dcnode-id="1746" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/06/03_Elizabeth-Marsh-Diary-Page--300x300.png&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_Elizabeth-Marsh-Diary-Page--300x300.png 300w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_Elizabeth-Marsh-Diary-Page--150x150.png 150w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_Elizabeth-Marsh-Diary-Page--768x768.png 768w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_Elizabeth-Marsh-Diary-Page-.png 800w" width="300"><span data-dcnode-id="1745" instrument_node="">As material documents, the manuscripts indicate the different processes involved in recording and creating the memories of Marsh’s experiences on paper and make them available for posterity. The two—Marsh’s Moroccan captivity memoir and her East Indian tour diary—were bound together by John Marsh, her brother, in red leather. A bookplate bears his name, and notes inserted by him introduce the memoir and the diary, placing them in the context of her life. The memoir appears to be written in John’s neat hand and the diary in Elizabeth’s own, which he explains was given to him by her daughter, Elizabeth.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741"><img alt="" class="alignleft size-medium wp-image-5490" data-dcnode-id="1742" height="215" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/06/03_01_elizabeth-marsh-memoir-pages-300x215.png&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_01_elizabeth-marsh-memoir-pages-300x215.png 300w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_01_elizabeth-marsh-memoir-pages-150x107.png 150w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_01_elizabeth-marsh-memoir-pages-768x549.png 768w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/03_01_elizabeth-marsh-memoir-pages.png 899w" width="300"></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">Because there was no way for Marsh to keep a diary during her Moroccan captivity, she was compelled to record the experience several years later. The smoothing effects of temporal distance and a text already written can be detected in the memoir’s even and regular hand—obviously written with the convenience of a steady, dedicated writing surface and setting. At the same time, the narrative itself is smooth, unbroken by the unit of individual days that divide diary writing, and aware of its own narrative arc. Marsh eventually turned her memoir into a published narrative—as a way to make money after her husband’s business dealings foundered—that appeared anonymously in London in 1769 under the title&nbsp;</span><em data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">The Female Captive</span></em><span data-dcnode-id="1736" instrument_node="">.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1732"><img alt="" class="alignleft size-medium wp-image-5491" data-dcnode-id="1733" height="220" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2018/06/02_Elizabeth-Marsh-Memoir-Pages-300x220.png&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2018/06/02_Elizabeth-Marsh-Memoir-Pages-300x220.png 300w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/02_Elizabeth-Marsh-Memoir-Pages-150x110.png 150w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/02_Elizabeth-Marsh-Memoir-Pages-768x564.png 768w, https://www.18thcenturycommon.org/wp-content/uploads/2018/06/02_Elizabeth-Marsh-Memoir-Pages.png 800w" width="300"></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">The diary’s handwriting, less smooth and regular than the memoir’s, reveals the instability of the circumstances in which it was written as well as the immediacy of the impressions described. With each entry, knowledge of what will happen next, as well as the end of the journey, remains unknown. Marsh only knows how each day she describes ends. The same can be said of the reader’s own initial encounter with this and other archival material, as only acts of further research can provide the information needed to understand the greater context of Marsh’s diary and the events described, as well as the end of her story, which runs well beyond the pages of the diary.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">She eventually died in 1785 in Calcutta of breast cancer at the age of forty-nine after undergoing a mastectomy without anesthesia a few months earlier. The extracted tumor was said by her uncle George Marsh to have weighed five pounds. In its very fragmentariness, the diary manuscript offers direct contact with the vital impulse that led Marsh to exert her own hand in shaping what she must have known were remarkable circumstances at the time—a woman traveling without her family in a remote country—by documenting them in writing. In doing so, she has left a precious record of her life as an eighteenth-century woman who inscribed her own way into the history of the modern, globalizing world.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1719"><em data-dcnode-id="1720"><span data-dcnode-id="1724" instrument_node="">This post originally appeared at the UCLA Library </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.library.ucla.edu/blog/special/2018/05/09/the-life-writing-of-elizabeth-marsh-an-eighteenthcentury-global-woman-"><span data-dcnode-id="1723" instrument_node="">Special Collections Blog</span></a><span data-dcnode-id="1721" instrument_node=""> and is reposted with permission of the author.</span></em></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Items on exhibit at UCLA Library Special Collections through May 2018:</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">1. Elizabeth Crisp (née Marsh).&nbsp;</span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oac.cdlib.org/findaid/ark%3A/13030/kt538nb916/dsc/%3Fquery%3Dcrisp%3Bdsc.position%3D1%23hitNum1" rel="noopener" target="_blank"><span data-dcnode-id="1713" instrument_node="">Journal of a Voyage by Sea from Calcutta to Madras, and of a Journal from there back to Dacca; Narrative of her Captivity in Barbary (1756)</span></a><span data-dcnode-id="1711" instrument_node="">. December 13, 1774-June 20, 1775. YRL Special Collections 170/604.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1708" instrument_node="">2. Thomas Pellow.&nbsp;</span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.library.ucla.edu/vwebv/holdingsInfo%3FbibId%3D2733360" rel="noopener" target="_blank"><em data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">The History of the Long Captivity and Adventures of Thomas Pellow, in South-Barbary.</span></em></a><span data-dcnode-id="1704" instrument_node="">&nbsp;Written by Himself. London: R. Goadby, 1740? YRL Special Collections DT 308.P36h</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1701" instrument_node="">Marsh was one of several thousands of European travelers abducted by Moroccan corsairs throughout the early modern period. Pellow’s account of his experience precedes Marsh’s. The title of his narrative suggests the popular influence of such fictional travel narratives as Daniel Defoe’s&nbsp;</span><em data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">The Life and Strange Surprizing Adventures of Robinson Crusoe, of York, Mariner</span></em><span data-dcnode-id="1698" instrument_node="">&nbsp;(1719).</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1695" instrument_node="">3. Linda Colley.&nbsp;</span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.library.ucla.edu/vwebv/holdingsInfo%3FbibId%3D6912217" rel="noopener" target="_blank"><em data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">The Ordeal of Elizabeth Marsh: A Woman in World History</span></em><span data-dcnode-id="1692" instrument_node="">.</span></a><span data-dcnode-id="1690" instrument_node="">&nbsp;Anchor Books: New York, 2007. College Lib. CT 788 M2187C65 2008</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1687" instrument_node="">The life of Elizabeth Marsh was made more widely known over a decade ago by the publication of Linda Colley’s gripping biography, which was named one of the top ten books of 2007 by&nbsp;</span><em data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">The New York Times</span></em><span data-dcnode-id="1684" instrument_node="">. Her book contributes greatly to the understanding that the events in Marsh’s apparently inconsequential life were direct functions of the sweeping changes taking place in world history during her lifetime.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1681" instrument_node="">4. Eliza Bradley.&nbsp;</span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.library.ucla.edu/vwebv/holdingsInfo%3FbibId%3D636376" rel="noopener" target="_blank"><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">An Authentic Narrative of the Shipwreck and Sufferings of Mrs. Eliza Bradley, the Wife of Capt. James Bradley, of Liverpool, Commander of the Ship Sally, Which was Wrecked on the Coast of Barbary, in June 1812</span></em><span data-dcnode-id="1678" instrument_node="">.</span></a><span data-dcnode-id="1676" instrument_node="">&nbsp;Written by Herself. Boston: James Walden, 1820. YRL Special Collections G 530.B72a 1820</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Marsh’s experience as a female taken captive off the Moroccan coast is highly unusual. Bradley’s story of her captivity by Arabs, fifty-six years later, provides her with company as another narrative of female captivity (though there is no documentation of her existence in England, from which she alleges to be). Like Marsh, Bradley describes having her hat taken away by her captors, a situation that also left her extremely vulnerable. She reports “since my captivity, I had many times begged of my master that he would return me my bonnet, as the only means by which he could expect to preserve my life.”</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1670" instrument_node="">5. Joseph Morgan.&nbsp;</span><a data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.library.ucla.edu/vwebv/holdingsInfo%3FbibId%3D2349257" rel="noopener" target="_blank"><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Complete History of Algiers. To which is prefixed, an epitome of the general history of Barbary, from the earliest times: interspersed with many curio</span></em><span data-dcnode-id="1667" instrument_node="">.</span></a><span data-dcnode-id="1665" instrument_node="">&nbsp;London: J. Bettenham, 1731 YRL Special Collections 284.M822c 1731</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">The English people during Marsh’s lifetime became acquainted with the culture and history of Morocco through books such as Morgan’s. The author, an English man who claims to have been a long-time inhabitant of Morocco, states in the preface that he hopes to disabuse readers with his book of the “misinformation” that “those who vilify” Moroccans rely on when “judg[ing]” them “wrongly.” </span></p><span data-dcnode-id="1660" instrument_node="">
</span></div><span data-dcnode-id="1658" instrument_node="">

p;url=https%3A//www.18thcenturycommon.org/tags/travel-writing/" rel="tag"><span data-dcnode-id="1622" instrument_node="">Travel Writing</span></a><span data-dcnode-id="1620" instrument_node=""> </span></span><span data-dcnode-id="1618" instrument_node="">
