</span><header class="entry-header" data-dcnode-id="2926"><span data-dcnode-id="2951" instrument_node="">
</span><a class="entry-title" data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/blackportraiture/" rel="bookmark" title="Permalink to Heterogeneous Blackness: Peter Brathwaite’s Eighteenth-Century Re-portraits"><h1 data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Heterogeneous Blackness: Peter Brathwaite’s Eighteenth-Century Re-portraits</span></h1></a><span data-dcnode-id="2947" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2928"><span data-dcnode-id="2946" instrument_node="">
</span><a class="author url fn" data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/kerry-sinanan/" rel="author" title="Posts by Kerry Sinanan"><span data-dcnode-id="2945" instrument_node="">Kerry Sinanan</span></a><span class="sep" data-dcnode-id="2941"><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node="">Posted on </span></span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/blackportraiture/" rel="bookmark" title="9:42 pm"><time class="entry-date" data-dcnode-id="2939" datetime="2020-07-13T21:42:29-04:00" pubdate=""><span data-dcnode-id="2940" instrument_node="">July 13, 2020</span></time></a><span class="byline" data-dcnode-id="2930"><span data-dcnode-id="2937" instrument_node=""> </span><span class="sep" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node=""> by </span></span><span data-dcnode-id="2934" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2931"><a class="url fn n" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Kerry Sinanan"><span data-dcnode-id="2933" instrument_node="">Kerry Sinanan</span></a></span></span><span data-dcnode-id="2929" instrument_node=""> </span></div><span data-dcnode-id="2927" instrument_node="">
</span></header><span data-dcnode-id="2925" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="2402"><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2910"><em data-dcnode-id="2919"><span data-dcnode-id="2923" instrument_node="">This is a collaborative piece that has emerged out of interviews between </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//peterbrathwaitebaritone.com/"><span data-dcnode-id="2922" instrument_node="">Peter Brathwaite</span></a><span data-dcnode-id="2920" instrument_node=""> and Kerry Sinanan in response to Brathwaite’s </span></em><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//peterbrathwaitebaritone.com/rediscoveringblackportraiture"><span data-dcnode-id="2918" instrument_node="">Rediscovering Black Portraiture</span></a><span data-dcnode-id="2916" instrument_node=""> </span><em data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">project, 2020.</span></em><span data-dcnode-id="2913" instrument_node=""> </span><a data-dcnode-id="2911" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="2912" instrument_node="">[1]</span></a></p><span data-dcnode-id="2909" instrument_node="">
</span><blockquote data-dcnode-id="2891"><p data-dcnode-id="2892"><strong data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2906" instrument_node="">. . . (</span><em data-dcnode-id="2902"><span data-dcnode-id="2905" instrument_node="">And whose boy am I, and what is</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">
my name?</span></em><span data-dcnode-id="2901" instrument_node="">). Black erasing blackness,</span><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">
body and backdrop: you are not permitted to enter</span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">
the question light asks of his skin as if it were</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">
a field, a mind, a word inclined to be</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">
entered.</span></p></blockquote><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2886"><span data-dcnode-id="2889" instrument_node="">–From “Vanitas with Negro Boy”, Rickey Laurentiis</span><a data-dcnode-id="2887" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="2888" instrument_node="">[2]</span></a></p><span data-dcnode-id="2885" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2881" id="attachment_5829" style="width: 310px"><img alt="" aria-describedby="caption-attachment-5829" class="size-medium wp-image-5829" data-dcnode-id="2884" height="184" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant-300x184.jpeg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant-300x184.jpeg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant-1024x627.jpeg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant-150x92.jpeg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant-768x470.jpeg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant-1536x940.jpeg 1536w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Black-Servant.jpeg 2048w" width="300"><p class="wp-caption-text" data-dcnode-id="2882" id="caption-attachment-5829"><span data-dcnode-id="2883" instrument_node="">Black Servant, England. Unknown artist (1760-1770).</span></p></div><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2879" instrument_node="">In 10 April 2020, in response to the </span><a data-dcnode-id="2877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.getty.edu/iris/rediscovering-black-portraiture-through-the-getty-museum-challenge/"><span data-dcnode-id="2878" instrument_node="">Getty Museum Challenge</span></a><span data-dcnode-id="2876" instrument_node=""> to recreate famous works of art on social media during COVID lockdown, </span><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//peterbrathwaitebaritone.com/action/u7waom92kf8dmtxk4wjjfnmxndszw5"><span data-dcnode-id="2875" instrument_node="">Peter Brathwaite</span></a><span data-dcnode-id="2873" instrument_node="">, the internationally renowned opera singer, offered Twitter what he thought would be a sole contribution to the project, namely a reworking of an anonymous and not very well-known portrait, </span><em data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Black Servant</span></em><span data-dcnode-id="2870" instrument_node="">, ca. 1760-1770.</span><a data-dcnode-id="2868" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="2869" instrument_node="">[3]</span></a><span data-dcnode-id="2867" instrument_node=""> On 29 May, Brathwaite reached 50 reworkings and is continuing now with the work in order, as he says, to “amplify marginalized voices” from the past. In this first painting a smiling Black boy holds aloft a large glass in one hand, and a silver charger in the other, with a small spaniel looking up at him adoringly. This is a classic eighteenth-century scene: enslavement is veiled with civility, materially by the boy’s white shirt and genteel clothes, and ideologically by the presentation of this as a somehow “natural”, unquestioned scene of servitude. The coupling of the Black boy with a pet is common for the period, as Catherine Molineaux writes: “acquiring pets, black slaves and fashionable animals became a form of social currency; they became objects consumed and displayed in a semiotic system of status”.</span><a data-dcnode-id="2865" href="#_ftn4" name="_ftnref4"><span data-dcnode-id="2866" instrument_node="">[4]</span></a><span data-dcnode-id="2864" instrument_node=""> In this system of displayed “objects” the roemer glass, prized for its greenish tint, is notably large and copiously filled, and, alongside the enslaved boy and silverware, works to construct a politeness that is both British and white. As Sinanan has recently argued, displaying glass objects alongside enslaved people is central to the construction of politeness. Many eighteenth-century paintings juxtapose blackness with more modern, transparent, lead glass to do this work in an even more explicit way: “blackness, alongside . . . glass that is prized for its ‘purity,’ intensifies the rhetorical construction of whiteness”.</span><a data-dcnode-id="2862" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="2863" instrument_node="">[5]</span></a><span data-dcnode-id="2861" instrument_node=""> In this image, though, whiteness is constructed through a painterly focus on colour: the boy’s blackness becomes fetishized beside the tints of the wine, the greenish glass and the silver. The boy’s “colour”, rather than his personhood, makes him suitable as an artistic subject. As the eighteenth-century aesthetic theorist, Uvedale Price writes in his </span><em data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Dialogue on the Distinct Characters of the Picturesque and the Beautiful</span></em><span data-dcnode-id="2858" instrument_node=""> (1801), “blackness . . . has a richness, which, in the painter’s eye, may compensate its comparative monotony, and may, therefore . . . be called beautiful”. Price continues to discuss Joshua Reynold’s painting of Samuel Johnson’s servant, Francis Barber, to emphasize the focus on blackness as being on “tint”, “tone” and “colouring”.</span><a data-dcnode-id="2856" href="#_ftn6" name="_ftnref6"><span data-dcnode-id="2857" instrument_node="">[6]</span></a><span data-dcnode-id="2855" instrument_node=""> While we see a Black servant smiling, he is the subject of a portrait composed by white ideals of the picturesque that racialized skin tone to present the boy for a white gaze.</span></p><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2852" instrument_node="">In Brathwaite’s re-presentation, though, we do not see this portrait alone: alongside it is Brathwaite’s reworking that immediately challenges the eighteenth-century dynamics at work. Brathwaite’s emphasis of the boy’s smile, a more open and slightly freer expression, highlights what is already apparent: this Black boy is a person, not merely a subject of artistic interest, with a real history and life, but one that is erased and not accessible beyond the frame of the painting. The re-portrait prompts questions we may not as readily ask of an artefact located at an historical distance. A free Black man, now, joining his own history and personhood to the boy’s through this reworking, disrupts the naturalization of the eighteenth-century composition to reveal the picturesque scene, using colour, tint, and servitude to forge politeness, as in fact comprising oppression and barbarity. That such a corrective is needed is evidenced by the description of the painting in the Philip Mould </span><em data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Historical Portraits Image Gallery</span></em><span data-dcnode-id="2849" instrument_node=""> which currently describes the boy as being “a favoured companion” with an “intimate position in his master or more probably mistress’s household . . .trusted and loved by their lapdog”.</span><a data-dcnode-id="2847" href="#_ftn7" name="_ftnref7"><span data-dcnode-id="2848" instrument_node="">[7]</span></a><span data-dcnode-id="2846" instrument_node=""> Such a reading accepts as natural the racialized hierarchies of the boy’s position, and dismisses the realities of Black servitude and enslavement in Britain and its colonies in the mid-eighteenth century to prioritize white affection. As Peter Erickson asserts, “Inclusion of the black servant does not represent benign inclusiveness but is rather keyed to incorporation into a visual regime structured in white dominance”.</span><a data-dcnode-id="2844" href="#_ftn8" name="_ftnref8"><span data-dcnode-id="2845" instrument_node="">[8]</span></a><span data-dcnode-id="2843" instrument_node=""> While in the original portrait the Black boy already disrupts the desired display of objects for consumption with his inevitable personhood, this is much more forcefully felt in the re-portrait. Brathwaite’s free, Black, present personhood, combined with his satire of the spaniel with a stuffed sheep, emphasizes the violence of fetishization and objectification required by eighteenth-century white politeness to construct itself. 250 years after the original portrait, Brathwaite’s re-portrait, with his free smile, offers a “subversive” judgement on the consuming vulgarity of a declined slave-owning culture.</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2840" instrument_node="">Such a reading – more attentive to the sacrifices required of Black people to make whiteness – has become impossible to avoid in the present context of COVID in which we see significantly higher rates of death and infection among </span><a data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historicalportraits.com/Gallery.asp%3FPage%3DItem%26ItemID%3D618%26Desc%3DA-Servant-%257C-Colonial-School"><span data-dcnode-id="2839" instrument_node="">Black people</span></a><span data-dcnode-id="2837" instrument_node=""> both in the </span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/isabeltogoh/2020/05/07/black-people-are-four-times-more-likely-to-die-from-coronavirus-uk-statistics-show/%23334d2a9724fd"><span data-dcnode-id="2836" instrument_node="">UK</span></a><span data-dcnode-id="2834" instrument_node=""> and in the US. Since March it has become clear that COVID is wreaking disaster on Black people precisely because systemic racism has left them most vulnerable to its ravages.</span><a data-dcnode-id="2832" href="#_ftn9" name="_ftnref9"><span data-dcnode-id="2833" instrument_node="">[9]</span></a><span data-dcnode-id="2831" instrument_node=""> And within this context, Brathwaite’s portraits give life to figures from the long eighteenth century whose histories and identities were seized by the racist forces that defined the period.</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2828" instrument_node="">The new venue for their viewing is Twitter, which allows Brathwaite to present both the original painting and his own reworking </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/PeterBrathwaite/status/1248580849731284998"><span data-dcnode-id="2827" instrument_node="">simultaneously in a Tweet</span></a><span data-dcnode-id="2825" instrument_node=""> thus visually embedding the latter’s disruptive reworking in the former. Brathwaite names his acts of re-creation as “re-imaginings, disruptions and a re-empowering” and describes his research to find portraits as an “archaeology” a “digging things up”: we are presented with what has been occluded by white canons of art and asked to look at these images in a radical new way. The term “re-portrait” describes the complete image created by Brathwaite that captures both the original painting or photograph, and his own reworking simultaneously, with the hyphen registering both the splice and join of the new image allowed for by social media.</span><a data-dcnode-id="2823" href="#_ftn10" name="_ftnref10"><span data-dcnode-id="2824" instrument_node="">[10]</span></a><span data-dcnode-id="2822" instrument_node=""> The reaction that Brathwaite received to this first re-portrait spurred him on to do more as he realized the “open-ended, wide platform” offered for this vital work of curation and re-creation. The urgency of such a project is even more clear during the rise of BLM 2020 which, in response to the murders of Breonna Taylor, Nina Pop, Ahmaud Arbery, George Floyd, and, during the period of protest itself, of Tony McDade, David McAtee, and Rayshard Brooks, has become a global movement for Black liberation. At the time of writing, the protests are in their sixth week and continue to take place all over the world: tragically, so do police brutality and </span><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.democracynow.org/2020/6/22/us_public_hangings_lynching_history"><span data-dcnode-id="2821" instrument_node="">hate crimes</span></a><span data-dcnode-id="2819" instrument_node=""> against Black people. In this context, Brathwaite’s re-imaginings inevitably become another crucial way to assert, not just the importance of Black life, but the vitality, creative energy, variety, and resistant thriving of it in the face of overwhelming odds.</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2816" instrument_node="">In </span><em data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Aberrations in Black: Toward a Queer of Color Critique</span></em><span data-dcnode-id="2813" instrument_node="">, Roderick Ferguson emphasizes the “social heterogeneity that characterizes African American culture” due to its inherent queerness which, he argues, is embodied in the “estrangements” of the Black drag-queen prostitute. This figure, Ferguson argues, “allegorizes and symbolizes” how</span></p><span data-dcnode-id="2811" instrument_node="">
</span><blockquote data-dcnode-id="2806"><p data-dcnode-id="2807"><span data-dcnode-id="2810" instrument_node="">African American culture indexes a social heterogeneity that oversteps the boundaries of gender propriety and sexual normativity. That social heterogeneity also indexes formations that are seemingly outside the spatial and temporal bounds of African American culture.</span><a data-dcnode-id="2808" href="#_ftn11" name="_ftnref11"><span data-dcnode-id="2809" instrument_node="">[11]</span></a></p></blockquote><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2804" instrument_node="">Brathwaite’s work produces beyondness and extraneousness that, interfusing with Brathwaite’s own Bajan roots, presents us with a global sense of Black heterogeneity across centuries, disrupting the raced and gendered norms that encoded Black enslavement and servitude. Encompassing artworks from the 15</span><sup data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">th</span></sup><span data-dcnode-id="2801" instrument_node=""> century to the present day, Brathwaite has curated portraits of </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//peterbrathwaitebaritone.com/rediscoveringblackportraiture"><span data-dcnode-id="2800" instrument_node="">gondoliers, ambassadors</span></a><span data-dcnode-id="2798" instrument_node="">, menagerie keepers, flower sellers, street artists, chimney sweeps, soldiers, actors, noble women and more. These figures cross gender, class, and national boundaries, creating a powerful representation of global, heterogeneous Blackness that exceeds the static, foundational image of the enchained Black person as chattel, while also disrupting the libidinal economies of slave culture. As James Edward Ford asserts, “Whiteness takes shape partly through financial economy and partly through libidinal economy”.</span><a data-dcnode-id="2796" href="#_ftn12" name="_ftnref12"><span data-dcnode-id="2797" instrument_node="">[12]</span></a><span data-dcnode-id="2795" instrument_node=""> Brathwaite’s mode of re-portrait on the Twitter platform wrests the Black subject from white libidinal framing to re-present it in Black repossession, creativity and ownership: his re-portraits are forged by a Black gaze. As an opera singer, Brathwaite also regards each re-portrait as a performance complete with set, costume, and his embodiment of the person whom he is re-presenting. In many of the re-portraits Brathwaite uses personal belongings and artefacts of his Bajan culture and such heterogenous, Caribbean Blackness presents a powerful riposte to slavery’s legacy of racist violence.</span></p><span data-dcnode-id="2793" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2789" id="attachment_5825" style="width: 310px"><img alt="Brathwaite's re-portrait of Dido; Dido Elizabeth Belle" aria-describedby="caption-attachment-5825" class="size-medium wp-image-5825" data-dcnode-id="2792" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido-300x225.jpeg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido-300x225.jpeg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido-1024x768.jpeg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido-150x113.jpeg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido-768x576.jpeg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido-1536x1152.jpeg 1536w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Dido.jpeg 2048w" width="300"><p class="wp-caption-text" data-dcnode-id="2790" id="caption-attachment-5825"><span data-dcnode-id="2791" instrument_node="">Dido Elizabeth Belle and Elizabeth Murray, by David Martin (c.1778)</span></p></div><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2787" instrument_node="">We can see such heterogeneity in one of the most striking 18</span><sup data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">th</span></sup><span data-dcnode-id="2784" instrument_node="">-century images in his curation, that of </span><em data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">Portrait of Dido Elizabeth Belle (1761-1804) and her cousin Elizabeth Murray (1760-1825)</span></em><span data-dcnode-id="2781" instrument_node="">, by David Martin (ca. 1778).</span><a data-dcnode-id="2779" href="#_ftn13" name="_ftnref13"><span data-dcnode-id="2780" instrument_node="">[13]</span></a><span data-dcnode-id="2778" instrument_node=""> In his re-portrait, the original double portrait is cropped, taking Elizabeth Murray out and leaving only Dido. In this powerful move, Brathwaite reverses the dynamics of racist exclusion to center Dido as the main figure alongside his reinterpretation. While most of the re-portraits Brathwaite has made are of men and boys, here, we clearly see the relevance of Ferguson’s idea of Black culture as figured by the heterogeneity of drag. Brathwaite did not explicitly have this idea in mind when he produced his Dido, but acknowledges the potential for radical heterogeneity in his “cross-dressing” image. This particular representation of Blackness, already transgressive in Martin’s painting, is accentuated by Brathwaite “to subvert” as the re-portrait crosses gender and raced norms. Arguably, Brathwaite’s beard is not the most disruptive aspect of the re-portrait: rather it is his smile and, as he asserts, the “cheeky expression” he deliberately creates to accentuate his Dido’s freedom and independence. Brathwaite consciously infuses his performance and posing for the reworkings with new, subtle interpretations of the figures’ looks, postures and positions that force questions about the dynamics of oppression and emancipation at work. Here, Brathwaite reads the original painting of Elizabeth Murray’s hand on Dido as perhaps “a push” away, out of the space and thus in the re-portrait the hand is more of a grip, either of welcome or of possession, registering the libidinal economies of white/Black relations.</span></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2775" instrument_node="">As Gretchen H. Gerzina discusses, how to read the women’s poses in the original double portrait remains contested and she argues that “the two cousins exhibit a closeness and ease”, “like sisters”, that they are comfortable to express to the painter.</span><a data-dcnode-id="2773" href="#_ftn14" name="_ftnref14"><span data-dcnode-id="2774" instrument_node="">[14]</span></a><span data-dcnode-id="2772" instrument_node=""> Yet, such sisterliness cannot transcend the raced dynamics within the portrait as we read the contrast of Dido’s white silk dress against her skin and the luminous whiteness of Elizabeth’s body. Elizabeth is to the fore, albeit the running Dido somewhat decenters her. The bond the women had cannot escape these dynamics, imbricated, as it was, materially in the fact that Dido’s own mother was an enslaved woman and in the fact of Dido’s blackness.</span><a data-dcnode-id="2770" href="#_ftn15" name="_ftnref15"><span data-dcnode-id="2771" instrument_node="">[15]</span></a><span data-dcnode-id="2769" instrument_node=""> Reading intimacies within such economies is fraught. In his reworking, Brathwaite deliberately presents Dido as “delighting” in her movement away, and as more mischievously rejecting the claim of whiteness upon her as she runs into the light, refusing her role as “bearer” even to a loving cousin. While these disruptions are apparent in the original painting, the drag dynamic of Brathwaite’s re-portrait registers the productive heterogeneity of Dido and accentuates the emancipatory potential to make Dido both “more comfortable and powerful”, and, crucially, uncoupled from the white femininity of her cousin.</span></p><span data-dcnode-id="2767" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2763" id="attachment_5830" style="width: 310px"><img alt="" aria-describedby="caption-attachment-5830" class="size-medium wp-image-5830" data-dcnode-id="2766" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson-300x300.jpeg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson-300x300.jpeg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson-1024x1024.jpeg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson-150x150.jpeg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson-768x768.jpeg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson-1536x1536.jpeg 1536w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Joseph-Johnson.jpeg 2048w" width="300"><p class="wp-caption-text" data-dcnode-id="2764" id="caption-attachment-5830"><span data-dcnode-id="2765" instrument_node="">Joseph Johnson, by John Thomas Smith (1815).</span></p></div><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2754"><span data-dcnode-id="2761" instrument_node="">Brathwaite’s re-portraits also present Black heterogeneity in terms of class. On the point of completing fifty re-portraits, Brathwaite launched an online vote for the public’s favourite and an image from the long eighteenth century won, an etching of Joseph Johnson by John Thomas Smith (1815). Johnson was a former Merchant Navy seaman who had been reduced to homelessness in London after the Napoleonic Wars. He devised an act of street art in which he built and wore a large wooden model of the HMS </span><em data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Nelson </span></em><span data-dcnode-id="2758" instrument_node="">to busk for money. On a very basic level, it is remarkable that Brathwaite’s work has brought this image of a free but poor Black man in nineteenth-century Britain to public attention, especially in the current moment. The original print first appeared in a set, originally entitled, </span><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Etchings of Remarkable Beggars, Itinerant Traders and&nbsp;Other Persons of Notoriety In London and Its Environs</span></em><span data-dcnode-id="2755" instrument_node=""> (1815). As Eddie Chambers writes:</span></p><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2752" instrument_node="">Within a year or so, the prints appeared in book form, the publication having been given the equally extravagant title </span><em data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Vagabondiana or, Anecdotes of Mendicant Wanderers&nbsp;through the Streets of London; with Portraits of the Most Remarkable, Drawn&nbsp;From the Life by John Thomas </span></em><em data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Smith</span></em><span data-dcnode-id="2747" instrument_node=""> (Keeper of the Prints in the British Museum) produced etchings that were amongst the earliest attempts to depict the poor of London in ways that sought to avoid caricature, and relied to some extent on the artist’s quest to capture the personalities of his subjects as well as the hardships they reflected.</span><a data-dcnode-id="2745" href="#_ftn16" name="_ftnref16"><span data-dcnode-id="2746" instrument_node="">[16]</span></a></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2742" instrument_node="">Chambers’ detailed account of Johnson emphasizes how he was able to create a novel and effective act of street art to survive. The subversive potential of Johnson’s act was considerable: his choice of the </span><em data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Nelson</span></em><span data-dcnode-id="2739" instrument_node=""> immediately located him in a British narrative of heroism, the Battle of Trafalgar, familiar to all, to counteract his precarious status. Johnson’s act affirms that he, too, is a Briton. Chambers asserts that this print is also “one of the first documented examples of a Black-British artist (in this case a sculptor) in London”.</span><a data-dcnode-id="2737" href="#_ftn17" name="_ftnref17"><span data-dcnode-id="2738" instrument_node="">[17]</span></a><span data-dcnode-id="2736" instrument_node=""> The original print certainly registers the carnivalesque potential of Johnson, further accentuated by Brathwaite’s re-portrait which displays the multi-faceted skill it would have taken accomplish such an act from sculpting to busking. As we think of Brathwaite preparing for his performance, we simultaneously think of Johnson preparing for his and become more aware of the artistry involved. Brathwaite’s crafting of his ship from cardboard highlights the self-made aspect of Johnson’s much more accomplished sculpture, and Brathwaite’s outfit and selected props all intensify the deliberate performance elements of Johnson, showing him to be in charge of his own art as protest. As Brathwaite notes on his online gallery, the sight of a ship on a Black man’s head would also have likely reminded his audience and passers-by of the slave ship: Johnson is physically “below deck” having placed the ship on his own head but now as a free man who has reinterpreted the ship as a sign, not just of white liberty, but of Black emancipation. While the transatlantic slave trade had been abolished in 1807, emancipation was still a long way off.&nbsp; Johnson’s performance was also, then, an anti-slavery disruption of the libidinal economies of consuming sugar and other goods from the Caribbean, redirecting pleasure into subversive laughter. The sense of the Black person as “carrying” a culture dependent on slavery is captured by Brathwaite’s re-portrait in which his more serious expression as he looks up at this ship, registers a sense of judgement and weariness. That the public on Twitter selected Johnson as their favourite re-portrait speaks to the current rise in an awareness of transatlantic slavery’s role in the present and of how this re-portrait has reframed Johnson as an abolitionist precursor to Black Lives Matter protest in the eighteenth century.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2730" id="attachment_5831" style="width: 217px"><img alt="" aria-describedby="caption-attachment-5831" class="wp-image-5831 size-medium" data-dcnode-id="2733" height="300" loading="lazy" sizes="(max-width: 207px) 100vw, 207px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot-207x300.jpeg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot-207x300.jpeg 207w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot-708x1024.jpeg 708w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot-104x150.jpeg 104w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot-768x1111.jpeg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot-1062x1536.jpeg 1062w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Moor-and-Parrot.jpeg 1416w" width="207"><p class="wp-caption-text" data-dcnode-id="2731" id="caption-attachment-5831"><span data-dcnode-id="2732" instrument_node="">Still Life with Moor and Parrot by Jan Davidz. de Heem (1641).</span></p></div><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2728" instrument_node="">The heterogeneity of global Blackness is visible in the props Brathwaite uses to replace objects in the original paintings. Thus, in Jan Davidsz De Heem, </span><em data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Still life with Moor and Parrot</span></em><span data-dcnode-id="2725" instrument_node=""> (1641), Brathwaite replaces the mirror, a sign of vanity, with an African print, and the luxurious lobster with Caribbean saltfish and pepper sauce. The props of white power, already critiqued in the original vanitas genre, are now replaced by productive Black lives and cultures that have survived enslavement. These supplantings are also critiques, mocking the object-fixation that drove consumption in the long eighteenth century. That this consumption depended on the subjugation of colonized others is made clear by the Black boy to the right, peeking in on this display of artefacts, to become another “object” in the display. However, in Brathwaite’s re-portrait, the figure’s gaze falls mockingly on a copy of Richard Ligon’s </span><em data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">A True and Exact History of the Island of Barbadoes</span></em><span data-dcnode-id="2722" instrument_node=""> (1657), instead of on the monkey he is visually twinned with in the original. As Molineaux argues, the “association of blacks and monkeys as common products of the African continent” was prevalent in the period that regarded both as exotic accoutrements of fashionable life.</span><a data-dcnode-id="2720" href="#_ftn18" name="_ftnref18"><span data-dcnode-id="2721" instrument_node="">[18]</span></a><span data-dcnode-id="2719" instrument_node=""> Ligon could simply not have imagined the Black lives that would emerge from the practices of plantation slavery that he witnessed being tried and tested in mid 17</span><sup data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">th</span></sup><span data-dcnode-id="2716" instrument_node="">-century Barbados: in Brathwaite’s display Ligon’s </span><em data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">History</span></em><span data-dcnode-id="2713" instrument_node="">, in which enslaved people are listed as “stock” along with “Horses, Cattle, Camels” becomes a piece of old bric à brac, debunked and looked on with appropriate mockery.</span><a data-dcnode-id="2711" href="#_ftn19" name="_ftnref19"><span data-dcnode-id="2712" instrument_node="">[19]</span></a></p><span data-dcnode-id="2709" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2705" id="attachment_5832" style="width: 310px"><img alt="" aria-describedby="caption-attachment-5832" class="size-medium wp-image-5832" data-dcnode-id="2708" height="150" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas-300x150.jpeg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas-300x150.jpeg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas-1024x512.jpeg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas-150x75.jpeg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas-768x384.jpeg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas-1536x768.jpeg 1536w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Bailly-Vanitas.jpeg 2048w" width="300"><p class="wp-caption-text" data-dcnode-id="2706" id="caption-attachment-5832"><span data-dcnode-id="2707" instrument_node="">Vanitas with Negro Boy by David Bailly (1650).</span></p></div><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2703" instrument_node="">The challenge to white patriarchal slave culture is challenged in many re-portraits. In his reworking of David Bailly’s </span><em data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Vanitas with Negro Boy</span></em><span data-dcnode-id="2700" instrument_node=""> (ca.1650), Brathwaite replaces the miniature portrait of the white patron held by the Black boy, with “a picture of my ancestor Miles Brathwaite and the will of a Planter great-grandfather”. At the other end of slavery’s long history, the manumission papers of Brathwaite’s great, great, great, great-grandmother, Peggy, are held by him in his re-portrait of H.L. Stephens’ </span><em data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Man Reading Headline: Presidential Proclamation, Slavery</span></em><span data-dcnode-id="2697" instrument_node=""> (1863). Working with a researcher, and in the Barbados archives, Brathwaite was able to recover these vital documents of his own family’s emancipation on his mother’s side. As Hortense Spillers tells us, the scene of slavery’s capture of African people, “marked a </span><em data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">theft</span></em><span data-dcnode-id="2694" instrument_node=""> of the body—a willful and violent (and unimaginable from this distance), severing of the captive body from its motive will, its active desire”. This captive body, separated from a more liberated pre-captive flesh, is for Spillers “as a category of otherness . . . embodies sheer physical powerlessness that slides into a more general ‘powerlessness,’ resonating through various centers of human and social meaning”.</span><a data-dcnode-id="2692" href="#_ftn20" name="_ftnref20"><span data-dcnode-id="2693" instrument_node="">[20]</span></a><span data-dcnode-id="2691" instrument_node=""> Brathwaite’s re-portraits seize Black people from the art of the long 18</span><sup data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">th</span></sup><span data-dcnode-id="2688" instrument_node="">-century in which they have been objectified as bodies. In Brathwaite’s re-portrait Peggy’s papers, held in the hands of her descendant smiling with glee, symbolically moves Peggy back into the flesh and blood of her free grandson. He holds her physically in his radical act of curation. Brathwaite’s Caribbean and Black British artefacts, along with his body that is able to perform and recreate these many moments, are signs of a global Black resistance movement for emancipation which, while still not fulfilled, remains a creative site of persistence.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Brathwaite’s grandmother’s Bajan quilt hangs in many of the re-portraits as perhaps the most visually striking creative artefact, representing a new Caribbean culture of matriarchal materiality that replaces the materiality of patriarchal white power in the originals. This representation of Bajan folk art is vital for Brathwaite, not just as a riposte to the past, but also as a critique of current cultures of consumption in present-day tourism. Barbados remains in the British imagination as “Little England”, and British tourism a form of neo-colonial possession. In this economy of tourism in which Caribbean culture is commodified, as Brathwaite notes, older, Bajan “folk songs are now a dying culture”. Brathwaite places a book of Bajan folk songs in several re-portraits as he feels “an urgency to preserve them”.</span></p><span data-dcnode-id="2683" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="2679" id="attachment_5833" style="width: 310px"><img alt="" aria-describedby="caption-attachment-5833" class="wp-image-5833 size-medium" data-dcnode-id="2682" height="150" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure-300x150.jpeg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure-300x150.jpeg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure-1024x512.jpeg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure-150x75.jpeg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure-768x384.jpeg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure-1536x768.jpeg 1536w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/Paston-Treasure.jpeg 2048w" width="300"><p class="wp-caption-text" data-dcnode-id="2680" id="caption-attachment-5833"><span data-dcnode-id="2681" instrument_node="">The Paston Treasure, by unknown painter (1665).</span></p></div><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2677" instrument_node="">In the painting, </span><em data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">The Paston Treasure</span></em><span data-dcnode-id="2674" instrument_node=""> (ca. 1663) commissioned either by Sir William or his son Robert Paston, the plush red velvet hanging backdrop to the dizzying display of luxurious objects is replaced by his grandmother’s quilt, alongside a large swathe of fabric printed with repeating Union Jack flags. The drapings fuse Caribbean and Black Britishness, which claims the Union Jack, to represent the people who came to post-war Britain at the government’s invitation, to help rebuild the country. Brathwaite’s mother came to England from Barbados in the wake of the Windrush generation as a nurse and so both drapings can be read as matriarchal reclamations of the middle passage: the voyage of Caribbean people undertaken in the push for a better life, a self-determined step along the path to emancipation. Such a statement at a time when the British government continues its </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2020/feb/10/windrush-deporting-people"><span data-dcnode-id="2673" instrument_node="">illegal deporting</span></a><span data-dcnode-id="2671" instrument_node=""> of Windrush generation British citizens to the Caribbean is even more vital. The quilt and the Union Jack, both repositioned and displayed in Brathwaite’s re-portrait, offer a powerful corrective to the histories of Black people in Britain as projected by colonial power.</span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2668" instrument_node="">In his reworking of </span><em data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">The Paston Treasure</span></em><span data-dcnode-id="2665" instrument_node="">, Brathwaite’s smiling figure replaces the Black boy as he looks up, once more, at a toy, stuffed-monkey. In the original, the racist twinning of the monkey on the boy’s shoulder again signifies the semiotic association in the long eighteenth century of monkeys with Black people, both reduced to consumable, exotic objects in this world of material wealth. Brathwaite’s figure, clothed in Côte d’Ivoire prints, has been reclaimed by African culture and sits among a range of Black cultural products that are not for white consumption. Brathwaite feels that such “standing in” for the original Black people in the paintings is a powerful act of curation which brings them back into Black ownership and into our present line of vision. That such a correction is vital is evidenced by the fact that a collaborative project on the painting in 2018 between </span><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//britishart.yale.edu/exhibitions/paston-treasure-microcosm-known-world"><span data-dcnode-id="2664" instrument_node="">Yale Center for British Art</span></a><span data-dcnode-id="2662" instrument_node=""> and </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitnorfolk.co.uk/inspire/Paston-Treasure-comes-to-Norwich.aspx"><span data-dcnode-id="2661" instrument_node="">Norwich Castle</span></a><span data-dcnode-id="2659" instrument_node=""> focuses on the painting as an object and on the history of the Paston family. In the specially commissioned </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//britishart.yale.edu/multimedia-video/316/6516"><span data-dcnode-id="2658" instrument_node="">short film</span></a><span data-dcnode-id="2656" instrument_node=""> about it, </span><em data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">A Painting Like No Other,</span></em><span data-dcnode-id="2653" instrument_node=""> narrated by Stephen Fry, he describes the glittering objects and the painterly techniques that created them. The dimmed colours around the boy are noted: the “dazzling yellows have now faded to muted brown and the vibrant reds, are now grey”, Fry tells us. In contrast, Brathwaite’s re-presencing of the boy makes </span><em data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">him</span></em><span data-dcnode-id="2650" instrument_node=""> the most notable aspect of the re-portrait which, while it imbues the original person with respect and visibility, also offers an important perspective on both a past and present fascination with material culture and its shiny things that can often obscure Black people, their lives, and their labour.</span><a data-dcnode-id="2648" href="#_ftn21" name="_ftnref21"><span data-dcnode-id="2649" instrument_node="">[21]</span></a><span data-dcnode-id="2647" instrument_node=""> We see Brathwaite himself as an descendant of the boy, free and able to re-make </span><em data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">The Paston Treasure</span></em><span data-dcnode-id="2644" instrument_node=""> with his perspective and creativity. Brathwaite displaces the objects in the vanitas, signs of dissolution and corrupt indulgence, with his and his family’s belongings, as the re-portrait title lists: “Reworked with – Afro hair products, Côte d’Ivoire prints, granny’s patchwork, Jessye Norman, Leontyne Price and family luggage from their arrival in the UK”. This is the new bric-à-brac, a living, creative culture of exchange, created by those who have come after the boy in the painting.</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">In his Nobel Prize for literature speech, ‘The Antilles: Fragments of Epic Memory’, Derek Walcott describes Antillean culture as comprised of “shards” and “pieces”:</span></p><span data-dcnode-id="2639" instrument_node="">
</span><blockquote data-dcnode-id="2634"><p data-dcnode-id="2635"><span data-dcnode-id="2638" instrument_node="">Break a vase, and the love that reassembles the fragments is stronger than that love which took its symmetry for granted when it was whole. The glue that fits the pieces is the sealing of its original shape. It is such a love that reassembles our African and Asiatic fragments, the cracked heirlooms whose restoration shows its white scars. This gathering of broken pieces is the care and pain of the Antilles, and if the pieces are disparate, ill-fitting, they contain more pain than their original sculpture, those icons and sacred vessels taken for granted in their ancestral places. Antillean art is this restoration of our shattered histories, our shards of vocabulary, our archipelago becoming a synonym for pieces broken off from the original continent.</span><a data-dcnode-id="2636" href="#_ftn22" name="_ftnref22"><span data-dcnode-id="2637" instrument_node="">[22]</span></a></p></blockquote><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Brathwaite’s Black re-portraiture, like his grandmother’s colourful quilt, is composed of such lovingly gathered pieces, “restored” to presence in his new images. The word “curation” has its etymological roots in the word “cura”, meaning “to take care of”, and Brathwaite has taken great care to rediscover these paintings and images and refocus on the forgotten Black people within them. The “white scars” are visible in the spliced frames that both join and separate the pieces of the new work of art, like a quilt. His grandmother’s quilt, too, comprises gathered and kept “shards” of fabric, crafting the worn textiles into something vibrant to be passed on in an act of matrilinear continuity to heal the fragmentation of Antillean history that was underpinned by the separation of mothers from their children. In her essay “Odes to the Mountains of Jamaica”, Jacqueline Bishop writes about her Jamaican great grandmother and her last visit to her “maternal ancestral home”, Nonsuch, Portland. During her visit, Bishop ponders the quilts her great grandmother has made that she will inherit:</span></p><span data-dcnode-id="2630" instrument_node="">
</span><blockquote data-dcnode-id="2625"><p data-dcnode-id="2626"><span data-dcnode-id="2629" instrument_node="">Spectacular quilts. Bold in colour, composition and design. . . I loved the piecing of things together, of trying to make something whole out of pieces, of something old taking on new life, of one thing becoming another; of making so much beauty out of the scraps of life.</span><a data-dcnode-id="2627" href="#_ftn23" name="_ftnref23"><span data-dcnode-id="2628" instrument_node="">[23]</span></a></p></blockquote><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Like the quilts of Caribbean women, Brathwaite’s re-portraits gather and relocate eighteenth-century Black people into a new, Antillean art, rescuing them, reclaiming them from the possession of white culture back into the presence of Black inheritance.</span></p><span data-dcnode-id="2621" instrument_node="">
</span><hr data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2616"><img alt="" class="size-medium wp-image-5840" data-dcnode-id="2618" height="175" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-300x175.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-300x175.jpg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-1024x598.jpg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-150x88.jpg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-768x449.jpg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-1536x897.jpg 1536w, https://www.18thcenturycommon.org/wp-content/uploads/2020/07/PeterBrathwaite-2048x1196.jpg 2048w" width="300"><span data-dcnode-id="2617" instrument_node="">Peter Brathwaite is a British opera singer. After his degree at Newcastle University he trained at the Royal College of Music, London and Flanders Opera Studio, Belgium. Recent and future engagements include performances with the Royal Opera House, English National Opera, Glyndebourne, La Monnaie, Nederlandse Reisopera, Opéra de Lyon and Opera North. He has written for The Guardian and The Independent. Documentary work includes BBC Radio 4’s Black Music in Europe 2, presented by Clarke Peters. He currently writes and presents features for BBC Radio 3’s Essential Classics. Peter is a Churchill Fellow, Fellow of the Royal Society of Arts, and a Trustee of the Gate Theatre, London.</span></p><span data-dcnode-id="2615" instrument_node="">

</span><p data-dcnode-id="2551"><a data-dcnode-id="2559" href="#_ftnref6" name="_ftn6"><span data-dcnode-id="2560" instrument_node="">[6]</span></a><span data-dcnode-id="2558" instrument_node=""> Uvedale Price, </span><em data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">A Dialogue on the Distinct Characters of the Picturesque and the Beautiful, in Answer to the Objections of Mr Knight. Prefaced by an Introductory Essay on Beauty; with Remarks on the Ideas of Sir Joshua Reynolds and Mr Burke Upon the Subject </span></em><span data-dcnode-id="2555" instrument_node="">(London: J. Robson, 1801), 53. See Joshua Reynolds, </span><em data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Portrait of a Man, probably Francis Barber</span></em><span data-dcnode-id="2552" instrument_node="">, ca. 1770.</span></p><span data-dcnode-id="2550" instrument_node="">

</span><p data-dcnode-id="2535"><a data-dcnode-id="2540" href="#_ftnref8" name="_ftn8"><span data-dcnode-id="2541" instrument_node="">[8]</span></a><span data-dcnode-id="2539" instrument_node=""> Peter Erickson, ‘Invisibility Speaks: Servants and Portraits in Early Modern Visual Culture’. </span><em data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Journal for Early Modern Cultural Studies, Spring-Summer, </span></em><span data-dcnode-id="2536" instrument_node="">2009, Vol. 9, No, 1, pp. 23-61. 34.</span></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2521"><a data-dcnode-id="2532" href="#_ftnref9" name="_ftn9"><span data-dcnode-id="2533" instrument_node="">[9]</span></a><span data-dcnode-id="2531" instrument_node=""> See Orlando Patterson’s definition of slavery as ‘social death’ , now part of Afropessimism. See Orlando Patterson, </span><em data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Slavery and Social Death: A Comparative Study</span></em><span data-dcnode-id="2528" instrument_node=""> (Cambridge, Mass.: Harvard University Press, 1982).&nbsp;And, Frank Wilderson, </span><em data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Red, White, and Black: Cinema and the Structure of U.S. Antagonisms</span></em><span data-dcnode-id="2525" instrument_node=""> (Durham, N.C.: Duke University Press, 2010). And, Joy James, “Black Suffering in Search of the ‘Beloved Community’: Political Imprisonment and Self-Defence.” </span><em data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Trans-scripts: An Intersdisciplinary Online Journal in the Humanities and Social Sciences at UC Irvine</span></em><span data-dcnode-id="2522" instrument_node=""> 1 (2011).</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2513"><a data-dcnode-id="2518" href="#_ftnref10" name="_ftn10"><span data-dcnode-id="2519" instrument_node="">[10]</span></a><span data-dcnode-id="2517" instrument_node=""> Brathwaite’s re-portraits can be viewed as part of a larger Caribbean culture of writing back, often undertaken by those in exile. Writers and poets including Louise Bennet, Jean Rhys, Derek Walcott, Kamau Brathwaite, George Lamming and Sam Selvon participate in this intertextual, corrective approach to Western literature. Alison Donnell describes this as ‘a counter-discursive (writing back) approach’. See, Alison Donnell and Sarah Lawson Welsh eds., </span><em data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">The Routledge Reader in Caribbean Literature</span></em><span data-dcnode-id="2514" instrument_node=""> (London and New York:&nbsp;Routledge,&nbsp;1996), 116.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2505"><a data-dcnode-id="2510" href="#_ftnref11" name="_ftn11"><span data-dcnode-id="2511" instrument_node="">[11]</span></a><span data-dcnode-id="2509" instrument_node=""> Roderick Ferguson, </span><em data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Aberrations in Black: Toward a Queer of Color Critique</span></em><span data-dcnode-id="2506" instrument_node=""> (London and Minneapolis: University of Minnesota Press, 2013), 2-3. Ferguson mobilizes the figure of the Black drag queen prostitute to point out the ways in which she challenges the fixed categories of “identity” and difference, produced by sociology, that work to conceal intersectionality. His queer of colour critique offers ways to disrupt categories of racialized and sexualized difference to enable a more heterogeneous mode of critique that avoids curtailing disruptive, emancipatory cultural possibilities.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2494"><a data-dcnode-id="2502" href="#_ftnref12" name="_ftn12"><span data-dcnode-id="2503" instrument_node="">[12]</span></a><span data-dcnode-id="2501" instrument_node=""> James Edward Ford, </span><em data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Thinking through Crisis: Depression-Era Black Literature, Theory, and Politics</span></em><span data-dcnode-id="2498" instrument_node=""> (Fordham University Press, 2019), 183. Understanding the libidinal as interwoven with the material economies of slavery is fundamental to Afropessimism. As Frank B. Wilderson notes: “Jared Sexton describes libidinal economy as ‘the economy, or distribution and arrangement, of desire and identification (their condensation and displacement), and the complex relationship between sexuality and the unconscious.’ Needless to say, libidinal economy functions variously across scales and is as ‘objective’ as political economy. Importantly, it is linked not only to forms of attraction, affection and alliance, but also to aggression, destruction, and the violence of lethal consumption. Sexton emphasizes that it is ‘the whole structure of psychic and emotional life,’ something more than, but inclusive of or traversed by, what Gramsci and other Marxists call a ‘structure of feeling’; it is ‘a dispensation of energies, concerns, points of attention, anxieties, pleasures, appetites, revulsions, and phobias capable of both great mobility and tenacious fixation.’” In </span><em data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Red, White and Black. Cinema and the Structure of U.S. Antagonism</span></em><span data-dcnode-id="2495" instrument_node=""> (Durham: Duke University Press, 2010), 7.</span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2486"><a data-dcnode-id="2491" href="#_ftnref13" name="_ftn13"><span data-dcnode-id="2492" instrument_node="">[13]</span></a><span data-dcnode-id="2490" instrument_node=""> As Gretchen H. Gerzina tells us, the attribution of the original double portrait has been contested. “Although long attributed to Johann Zoffany, there are now a number of reasons to suspect that the double portrait was painted by someone else. . . Most recent attributions settle upon David Martin, a fellow Sot who had painted the magnificent portrait of Lord Mansfield in his robes and was a protégé of the famous painter Allan Ramsay.” 171. Gerzina seems persuaded by the idea that both painters ‘had a hand in the painting’”. ‘The Georgian Life and Modern Afterlife of Dido Elizabeth Belle’. In </span><em data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Britain’s Black Past </span></em><span data-dcnode-id="2487" instrument_node="">ed. Gretchen H. Gerzina (Liverpool: Liverpool University Press, 2020), 172. The painting is now at Scone Palace, Perth, Scotland.</span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2481"><a data-dcnode-id="2483" href="#_ftnref14" name="_ftn14"><span data-dcnode-id="2484" instrument_node="">[14]</span></a><span data-dcnode-id="2482" instrument_node=""> Gerzina, 172.</span></p><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2471"><a data-dcnode-id="2478" href="#_ftnref15" name="_ftn15"><span data-dcnode-id="2479" instrument_node="">[15]</span></a><span data-dcnode-id="2477" instrument_node=""> Gerzina’s work on Dido Belle is also based on the archival research undertaken by Sarah Murden and Joanne Major in their Blopost, </span><em data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">All Things Georgian</span></em><span data-dcnode-id="2474" instrument_node="">. See, “Dido Elizabeth Belle”, Joanne Major, June 26 2018. </span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//georgianera.wordpress.com/2018/06/26/revealing-new-information-about-dido-elizabeth-belles-siblings/"><span data-dcnode-id="2473" instrument_node="">https://georgianera.wordpress.com/2018/06/26/revealing-new-information-about-dido-elizabeth-belles-siblings/?fbclid=IwAR3fcUm6bi2D_FIVaT2Ts1KIxXWr0C2yvIT3AXVUW1-K3j623Lv4VbJAcy4</span></a></p><span data-dcnode-id="2470" instrument_node="">
