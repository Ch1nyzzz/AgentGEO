</span><article class="post-4933 post type-post status-publish format-standard has-post-thumbnail hentry category-women tag-celebrity-culture tag-fashion tag-gender tag-history-of-fashion tag-mary-robinson tag-material-culture" data-dcnode-id="839" id="post-4933"><span data-dcnode-id="1123" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1097"><span data-dcnode-id="1122" instrument_node="">
</span><a class="entry-title" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/robinson-and-celebrity-couture/" rel="bookmark" title="Permalink to Celebrity Couture:  A New Trend?  Fashionista Mary Robinson Led the Way – Over 230 Years Ago"><h1 data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Celebrity Couture: A New Trend? Fashionista Mary Robinson Led the Way – Over 230 Years Ago</span></h1></a><span data-dcnode-id="1118" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1099"><span data-dcnode-id="1117" instrument_node="">
</span><a class="author url fn" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/terry-f-robinson/" rel="author" title="Posts by Terry F. Robinson"><span data-dcnode-id="1116" instrument_node="">Terry F. Robinson</span></a><span class="sep" data-dcnode-id="1112"><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">Posted on </span></span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/robinson-and-celebrity-couture/" rel="bookmark" title="11:47 am"><time class="entry-date" data-dcnode-id="1110" datetime="2017-08-01T11:47:19-04:00" pubdate=""><span data-dcnode-id="1111" instrument_node="">August 1, 2017</span></time></a><span class="byline" data-dcnode-id="1101"><span data-dcnode-id="1108" instrument_node=""> </span><span class="sep" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node=""> by </span></span><span data-dcnode-id="1105" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1102"><a class="url fn n" data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Terry F. Robinson"><span data-dcnode-id="1104" instrument_node="">Terry F. Robinson</span></a></span></span><span data-dcnode-id="1100" instrument_node=""> </span></div><span data-dcnode-id="1098" instrument_node="">
</span></header><span data-dcnode-id="1096" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="884"><span data-dcnode-id="1095" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1085" id="attachment_4936" style="width: 255px"><img alt="" aria-describedby="caption-attachment-4936" class="size-medium wp-image-4936" data-dcnode-id="1094" height="300" loading="lazy" sizes="(max-width: 245px) 100vw, 245px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2017/08/HMP_CH_207-245x300.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2017/08/HMP_CH_207-245x300.jpg 245w, https://www.18thcenturycommon.org/wp-content/uploads/2017/08/HMP_CH_207-123x150.jpg 123w, https://www.18thcenturycommon.org/wp-content/uploads/2017/08/HMP_CH_207-768x940.jpg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2017/08/HMP_CH_207.jpg 771w" width="245"><p class="wp-caption-text" data-dcnode-id="1086" id="caption-attachment-4936"><span data-dcnode-id="1093" instrument_node="">Figure 1. &nbsp;John Hoppner, </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Mary Robinson</span></em><span data-dcnode-id="1090" instrument_node=""> </span><em data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">as Perdita</span></em><span data-dcnode-id="1087" instrument_node=""> (1782), Chawton House Library.</span></p></div><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1083" instrument_node="">Sean John, DASH, Material Girl, William Rast, OVO, House of Harlow, Yeezy, Paper Crown, the Jessica Simpson Collection, Rocawear, The Row, Twenty8Twelve. &nbsp;Celebrity fashion labels are flooding the marketplace, and the phenomenon shows no sign of stopping. &nbsp;Rihanna recently announced a collaboration with Chopard for a joint collection of jewelry, combining “urban chic and classic glamour.”</span><a data-dcnode-id="1081" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="1082" instrument_node="">[1]</span></a><span data-dcnode-id="1080" instrument_node="">&nbsp; And this coming October, Sarah Jessica Parker will launch her new SJP footwear collection on the Internet behemoth Amazon, featuring the exclusive designs “Dash,” “Flirt,” and “Wink.”</span><a data-dcnode-id="1078" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="1079" instrument_node="">[2]</span></a><span data-dcnode-id="1077" instrument_node="">&nbsp;&nbsp;</span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">InStyle.co.uk</span></em><span data-dcnode-id="1074" instrument_node=""> broadcasted the affair with the texty title “OMG! &nbsp;Soon You’ll Be Able to Shop SJP’s Shoes On Amazon.”</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">Not everyone, however, is a fan of the pop-up celebrity designer. &nbsp;Upon receiving the Couture Council’s Award for Artistry in 2012, the late Oscar de la Renta spoke out against the trend: &nbsp;“Today, if you play tennis, you can be a really good designer,” he said, “Or, if you’re an actress, you can be a designer. &nbsp;I’ve been at it for 45 years and I’m still learning my craft.”</span><a data-dcnode-id="1069" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="1070" instrument_node="">[3]</span></a><span data-dcnode-id="1068" instrument_node="">&nbsp; In addition to suggesting that upstarts are infiltrating the fashion world, de la Renta’s statement imagines a time—his time—when the art of fashion recognized quality design that bespoke training, skill, and experience, rather than sheer fame.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Elegiac musings may have their appeal, but do they reflect reality? &nbsp;There’s no question that celebrity style has long had an impact on the fashion world—think Beau Brummell, Lillie Langtry, Jean Harlow, Katherine Hepburn. &nbsp;The question is how new is the celebrity-cum-couturier? &nbsp;The life of the British actress Mary Robinson (1757?-1800) (Figure 1) would suggest that celebrity clothing and accessory lines are, in fact, nothing new.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1062" instrument_node="">Mary Robinson’s meteoric rise to fame began in 1776 with her dazzling performance on the London stage as Juliet, and in 1779 with her spirited rendering of Perdita in David Garrick’s adaptation of Shakespeare’s </span><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">The Winter’s Tale</span></em><span data-dcnode-id="1059" instrument_node="">. &nbsp;The latter representation captivated the Prince of Wales (the future George IV), and an infamous romance between the newly styled “Perdita” and “Florizel” ensued.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Like many starlets today, her love life became a source of scandal and intrigue. &nbsp;When the Prince’s affection waned, Robinson left the stage and travelled to France. &nbsp;She befriended Marie Antoinette and was courted by the wealthiest man in Europe, the Duke de Chartres. &nbsp;In 1782, after her return from the Continent, Robinson indulged in romances with the dashing young dragoon Colonel Banastre Tarleton, a leading commander of British troops in the war against the American colonies, and Charles James Fox, the charismatic leader of the Whig party.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1053" instrument_node="">Robinson’s stage career, though brief (she retired from the boards at the close of the 1779-1780 season), was a tour de force. Her performances—both as an actress and a mistress—earned her widespread acclaim and notoriety. &nbsp;In the manner of magazines such as </span><em data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Hello! </span></em><span data-dcnode-id="1050" instrument_node="">or </span><em data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">People</span></em><span data-dcnode-id="1047" instrument_node="">, the newspapers reported continually on her whereabouts. &nbsp;And while paparazzi did not yet exist, painters did. &nbsp;Top artists of the day, Thomas Gainsborough, John Hoppner, Joshua Reynolds, and George Romney, all painted portraits of her.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1044" instrument_node="">Robinson’s acting and amours sparked her popularity, but it was her fashion sense and style that kept the flame ablaze. &nbsp;By decorating herself in stunning confections known as the “</span><em data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Perdita </span></em><span data-dcnode-id="1041" instrument_node="">Hood,” the “</span><em data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Robinson</span></em><span data-dcnode-id="1038" instrument_node=""> hat for Ranelagh,” the “</span><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Perdita </span></em><span data-dcnode-id="1035" instrument_node="">handkerchief,” and the “</span><em data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Robinson</span></em><span data-dcnode-id="1032" instrument_node=""> gown,” she transformed herself into one of the foremost fashion icons of her day and sent the stylish set into a frenzy.</span><a data-dcnode-id="1030" href="#_ftn4" name="_ftnref4"><span data-dcnode-id="1031" instrument_node="">[4]</span></a></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1027" instrument_node="">Her most voguish look was the 1782 “Perdita chemise,” a hoop-free muslin tube cinched at the waist and styled after Marie Antoinette’s version of the gown: &nbsp;the Chémise à la Reine (Figure 2). &nbsp;This design—later promoted in England in a different form by the Duchess of Devonshire (remember Keira Knightley in </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The Duchess</span></em><span data-dcnode-id="1024" instrument_node="">?)—paved the way for the neoclassical gowns of the 1790s and early 1800s. &nbsp;According to one London newspaper, Robinson’s trend-setting styles “set the whole world ‘a madding.’”</span><a data-dcnode-id="1022" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="1023" instrument_node="">[5]</span></a><span data-dcnode-id="1021" instrument_node="">&nbsp; Women eager to appear </span><em data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">à la mode</span></em><span data-dcnode-id="1018" instrument_node=""> began adorning themselves in her sartorial creations.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1015"></p><div class="wp-caption alignleft" data-dcnode-id="1011" id="attachment_4938" style="width: 250px"><img alt="" aria-describedby="caption-attachment-4938" class="size-medium wp-image-4938" data-dcnode-id="1014" height="300" loading="lazy" sizes="(max-width: 240px) 100vw, 240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2017/08/IA-042NEW.B8250o.RRVB_-240x300.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2017/08/IA-042NEW.B8250o.RRVB_-240x300.jpg 240w, https://www.18thcenturycommon.org/wp-content/uploads/2017/08/IA-042NEW.B8250o.RRVB_-120x150.jpg 120w, https://www.18thcenturycommon.org/wp-content/uploads/2017/08/IA-042NEW.B8250o.RRVB_.jpg 500w" width="240"><p class="wp-caption-text" data-dcnode-id="1012" id="caption-attachment-4938"><span data-dcnode-id="1013" instrument_node="">Figure 2. &nbsp;Élisabeth Vigée Le Brun, Marie Antoinette in a Chemise Dress (1783), Hessische Hausstiftung [The Hessian House Foundation], Kronberg.</span></p></div><span data-dcnode-id="1010" instrument_node="">Robinson’s fashions attest to her desire to ensure unending media buzz. &nbsp;But they also demonstrate the fact that she literally made a name for herself in the world of fashion. &nbsp;Her signature designs were both recognizable and reproducible. &nbsp;They were, after all, labeled “the Perdita” or “the Robinson”—a form of proto-celebrity branding.</span><p data-dcnode-id="1009"></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">Unlike modern celebrities, Robinson did not profit financially from her designs. &nbsp;Yet her savvy marketing of them ensured her decisive impact on contemporary couture. &nbsp;Robinson made her mark in other artistic circles as well, becoming one of the top authors of her day—a playwright, a novelist, and a poet. &nbsp;Samuel Taylor Coleridge deemed her a woman of “undoubted Genius.”</span><a data-dcnode-id="1005" href="#_ftn6" name="_ftnref6"><span data-dcnode-id="1006" instrument_node="">[6]</span></a><span data-dcnode-id="1004" instrument_node="">&nbsp; Ultimately, Robinson ensured her legacy in the world of fashion </span><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">and</span></em><span data-dcnode-id="1001" instrument_node=""> in the world of letters. &nbsp;Victoria Beckham—eat your heart out.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="990"><a data-dcnode-id="997" href="#_ftnref1" name="_ftn1"><span data-dcnode-id="998" instrument_node="">[1]</span></a><span data-dcnode-id="996" instrument_node=""> Erica Gonzales, “Rihanna is Designing a New Jewelry Collection,” </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Bazaar</span></em><span data-dcnode-id="993" instrument_node=""> (7 April 2017) </span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.harpersbazaar.com/fashion/designers/news/a21876/rihanna-collaborates-with-chopard/"><span data-dcnode-id="992" instrument_node="">http://www.harpersbazaar.com/fashion/designers/news/a21876/rihanna-collaborates-with-chopard/</span></a></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="980"><a data-dcnode-id="987" href="#_ftnref2" name="_ftn2"><span data-dcnode-id="988" instrument_node="">[2]</span></a><span data-dcnode-id="986" instrument_node=""> Chloe Mac Donnell, “OMG! &nbsp;Soon You’ll Be Able to Shop SJP’s Shoes On Amazon,” </span><em data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">InStyle.co.uk</span></em><span data-dcnode-id="983" instrument_node=""> (18 July 2017) </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.instyle.co.uk/news/youll-soon-be-able-shop-sjps-shoe-collection-amazon-fashion%239ClsHusWo6Kqg9iC.99"><span data-dcnode-id="982" instrument_node="">http://www.instyle.co.uk/news/youll-soon-be-able-shop-sjps-shoe-collection-amazon-fashion#9ClsHusWo6Kqg9iC.99</span></a></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="970"><a data-dcnode-id="977" href="#_ftnref3" name="_ftn3"><span data-dcnode-id="978" instrument_node="">[3]</span></a><span data-dcnode-id="976" instrument_node=""> Ella Alexander, “Oscar de la Renta Honored,” </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Vogue </span></em><span data-dcnode-id="973" instrument_node="">(6 Sept. 2012) </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vogue.co.uk/article/oscar-de-la-renta-receives-couture-council-artistry-award"><span data-dcnode-id="972" instrument_node="">http://www.vogue.co.uk/article/oscar-de-la-renta-receives-couture-council-artistry-award</span></a></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="959"><a data-dcnode-id="967" href="#_ftnref4" name="_ftn4"><span data-dcnode-id="968" instrument_node="">[4]</span></a><span data-dcnode-id="966" instrument_node=""> The </span><em data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Lady’s Magazine</span></em><span data-dcnode-id="963" instrument_node=""> began reporting on Robinson in 1780 and continued throughout the decade. &nbsp;For coverage of Robinson’s fashions during the 1782-1783 season, see the </span><em data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Lady’s Magazine, or Entertaining Companion for the Fair Sex</span></em><span data-dcnode-id="960" instrument_node=""> 14 (1783): &nbsp;187, 268, 331, 650-651.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="894"><a data-dcnode-id="956" href="#_ftnref5" name="_ftn5"><span data-dcnode-id="957" instrument_node="">[5]</span></a><span data-dcnode-id="955" instrument_node=""> </span><em data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Morning Herald</span></em><span data-dcnode-id="952" instrument_node=""> (17 December 1781), p. 2. &nbsp;Additionally, on 15 October 1782, the&nbsp;</span><i data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Morning Herald&nbsp;</span></i><span data-dcnode-id="949" instrument_node="">reported, “An&nbsp;</span><i data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">amateur&nbsp;</span></i><span data-dcnode-id="946" instrument_node="">of the Cyprian Corps recommends to our fair countrywomen a total abolition of the&nbsp;</span><i data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">large hoop</span></i><span data-dcnode-id="943" instrument_node="">&nbsp;and&nbsp;</span><i data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">long petticoat</span></i><span data-dcnode-id="940" instrument_node="">, and to adopt the&nbsp;</span><i data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">PERDITA</span></i><span data-dcnode-id="937" instrument_node="">, a system of elegant&nbsp;</span><i data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">simplicity&nbsp;</span></i><span data-dcnode-id="934" instrument_node="">and&nbsp;</span><i data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">neatness</span></i><span data-dcnode-id="931" instrument_node="">, which has ever so conspicuously marked the dress of that celebrated&nbsp;</span><i data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">leader&nbsp;</span></i><span data-dcnode-id="928" instrument_node="">of the&nbsp;</span><i data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">wantons&nbsp;</span></i><span data-dcnode-id="925" instrument_node="">of the age!”. &nbsp;Just&nbsp;</span><span class="aBn" data-dcnode-id="922" data-term="goog_879121299" tabindex="0"><span class="aQJ" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">one month later</span></span></span><span data-dcnode-id="921" instrument_node="">, the same newspaper was predicting the pervasiveness of Robinson’s fashion trend: &nbsp;“</span><span class="m_3592870694646302562apple-style-span" data-dcnode-id="908"><span data-dcnode-id="920" instrument_node="">The&nbsp;</span><i data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Chemise de la Reine</span></i><span data-dcnode-id="917" instrument_node="">, in which Mrs Robinson appeared at the Opera, is expected to become a favourite&nbsp;</span><i data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">undress</span></i><span data-dcnode-id="914" instrument_node="">&nbsp;among the fashionable women” (</span><i data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Morning Herald</span></i><span data-dcnode-id="911" instrument_node="">,</span><i data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">&nbsp;</span></i></span><span data-dcnode-id="907" instrument_node="">20 November 1782).</span><span class="m_3592870694646302562apple-style-span" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="904" instrument_node="">Georgiana, the Duchess of Devonshire was also instrumental in popularizing the chemise in England. &nbsp;In 1784, she reported having gone “to a concert in one of the muslin chemises with fine lace that the Queen of France gave me”; qtd.&nbsp;</span><i data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Georgiana: &nbsp;Extracts from the Correspondence of Georgiana, Duchess of Devonshire</span></i><span data-dcnode-id="901" instrument_node="">, ed. Earl of Bessborough (London, 1955), 91. &nbsp;In 1786, Angelica Kauffman painted Lady Elizabeth Foster, a close friend of the Duchess, in a version of the chemise with a double falling collar. &nbsp;By 1787 the&nbsp;</span><i data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Lady’s Magazine&nbsp;</span></i><span data-dcnode-id="898" instrument_node="">reported that “all the Sex now . . . appear in their white muslin frocks with broad sashes”; see the&nbsp;</span><i data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Lady’s Magazine</span></i><span data-dcnode-id="895" instrument_node="">&nbsp;(London, 1787), 331.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="886"><a data-dcnode-id="891" href="#_ftnref6" name="_ftn6"><span data-dcnode-id="892" instrument_node="">[6]</span></a><span data-dcnode-id="890" instrument_node=""> Samuel Taylor Coleridge to Robert Southey (25 Jan. 1800), </span><em data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">The Collected Letters of Samuel Taylor Coleridge.</span></em><span data-dcnode-id="887" instrument_node="">&nbsp; Ed. Earl Leslie Griggs. &nbsp;6 vols. &nbsp;(Oxford: &nbsp;Clarendon Press, 1956). &nbsp;1: &nbsp;562-564. </span></p><span data-dcnode-id="885" instrument_node="">

</span><div class="wp-caption alignleft" data-dcnode-id="803" id="attachment_4773" style="width: 310px"><img alt="" aria-describedby="caption-attachment-4773" class="size-medium wp-image-4773" data-dcnode-id="806" height="188" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2017/05/3-300x188.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2017/05/3-300x188.jpg 300w, https://www.18thcenturycommon.org/wp-content/uploads/2017/05/3-150x94.jpg 150w, https://www.18thcenturycommon.org/wp-content/uploads/2017/05/3-768x482.jpg 768w, https://www.18thcenturycommon.org/wp-content/uploads/2017/05/3-1024x643.jpg 1024w, https://www.18thcenturycommon.org/wp-content/uploads/2017/05/3.jpg 1920w" width="300"><p class="wp-caption-text" data-dcnode-id="804" id="caption-attachment-4773"><span data-dcnode-id="805" instrument_node="">“Duvaucel’s Squirrel” (ca. 1837) by Charles Hamilton Smith (1776–1859). Yale Center for British Art, Paul Mellon Collection.</span></p></div><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="801" instrument_node="">Scholarship concerning Eliza Haywood overwhelmingly bends towards misogyny and dismissal.&nbsp; Since the publication of Kathryn King’s herculean </span><em data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Political Biography of Eliza Haywood </span></em><span data-dcnode-id="798" instrument_node="">(2012), scholars and students alike have begun to shift those decidedly problematic stances towards an appreciation of Eliza Haywood as an author integral to our understanding of eighteenth-century literature.&nbsp; This still-emerging narrative runs counter to attempts to understand Haywood on a pre- and post-</span><em data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Dunciad</span></em><span data-dcnode-id="795" instrument_node="">, Alexander-Pope-defined timeline that has been cemented by centuries of conjectural scholarship and, at times, </span><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">ad hominem</span></em><span data-dcnode-id="792" instrument_node=""> attacks on Haywood’s person and supposedly lewd amatory writing.</span><a data-dcnode-id="790" href="#_edn1" name="_ednref1"><span data-dcnode-id="791" instrument_node="">[i]</span></a><span data-dcnode-id="789" instrument_node="">&nbsp; The assumption that Pope’s petty insults against Haywood caused a period of unproductive reclusion followed by a conservative reformation of her writing occlude and foreclose potential readings of Haywood’s writing which might prove liberating, progressive, or which simply object to the perpetuated fiction that Haywood was a hack, an amatory novelist turned moralist writer.&nbsp; What follows, then, is an attempt to assist in curving Haywood’s critical arc and to continue the project of cataloguing the concerns present in her prose which make her a “slippery, fluid, multifarious, strategic, opportunistic, [and] chameleon-like writer” (King 195).</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="786" instrument_node="">Haywood’s </span><em data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">The History of Miss Betsy Thoughtless</span></em><span data-dcnode-id="783" instrument_node=""> (1751) follows the emotional maturation–a Bildungsroman with a British lilt–of the titular Betsy Thoughtless.&nbsp; During the novel, between a parade of potential husbands and the interloping of her two brothers, Betsy receives a small pet squirrel from Mr. Trueworth, one of her many suitors.&nbsp; This squirrel, Betsy’s beloved pet, becomes a focalizing object through which Haywood raises and explores the subjects of male aggression, women’s personal rights, and the value placed on animal life.&nbsp; By examining the tenderness with which Trueworth crafts his gift and the economics associated with eighteenth-century pet ownership, we can better understand how Haywood intentionally frames the animal abuse perpetrated by Betsy’s first husband, Mr. Munden, against her pet squirrel as one motivated by Munden’s anxieties about both the state of his household economy and his wife’s undivided attention.&nbsp; Furthermore, by contextualizing Betsy’s overt concern for the well-being of her pet within the anti-cruelty movement of late eighteenth-century Britain, we can begin to see the complexity with which Haywood positions Betsy’s modes of self-activism relative to the legislation that would follow the novel’s publication some decades later.&nbsp; While John Richetti cites much of the same evidence found in this analysis, such as the economic importance of the squirrel and the shocking realism with which Haywood writes Munden’s “male rage,” in his chapter comparing the histories of Fielding and Haywood, Richetti wields these examples to a decidedly more trivializing end (“Histories” 256).</span><a data-dcnode-id="781" href="#_edn2" name="_ednref2"><span data-dcnode-id="782" instrument_node="">[ii]</span></a></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="778" instrument_node="">Writing in 1791, Ralph Beilby broadly waxes about squirrels, “This beautiful little animal is equally admirable for the neatness and elegance of its formation, as for its liveliness and activity” (352).&nbsp; Though written after the publication of </span><em data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Betsy Thoughtless</span></em><span data-dcnode-id="775" instrument_node="">, this brief entry on squirrels illuminates the popular attitude toward the rodent and helps explain why Betsy is smitten with the squirrel Trueworth sends to her as a gift.&nbsp; In the letter that accompanies the squirrel, Trueworth recalls Betsy’s delight at the sight of “the pretty tricks of a squirrel, which a lady in the company [at Oxford] had on her arm” (</span><em data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Thoughtless</span></em><span data-dcnode-id="772" instrument_node=""> 137).&nbsp; Trueworth downplays both the romantic and monetary significance of his gift calling it “so trifling an offering” (</span><em data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Thoughtless</span></em><span data-dcnode-id="769" instrument_node=""> 137).&nbsp; Trueworth’s self-deprecation and downplaying of his gift to Betsy is indicative of his overall disposition:&nbsp; polite and mostly inoffensive.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="766" instrument_node="">As Betsy and the women in her company examine the squirrel, they begin to recognize that the gift is a significant gesture on Trueworth’s part.&nbsp; The narrator describes the squirrel as “doubtless, the most beautiful creature of its kind, that could be purchased” with a “chain . . . [of] gold, the links [of which were] very thick, and curiously wrought” (</span><em data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Thoughtless</span></em><span data-dcnode-id="763" instrument_node=""> 138).&nbsp; The trappings of the pet squirrel come to represent several desirable qualities found in Trueworth’s character.&nbsp; As Ingrid Tague argues, “Collars, like human clothing, could be the sites of luxurious display, sentimental attachment, or modest utility” (41).&nbsp; Aside from its practicality, the leash and collar of the squirrel simultaneously displayed “the elegance of the donor’s taste . . . [and his] respectful passion” while also conspicuously displaying Trueworth’s economic prosperity (</span><em data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Thoughtless</span></em><span data-dcnode-id="760" instrument_node=""> 138).</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="757" instrument_node="">Haywood’s preoccupation with the description of the squirrel and its accessories is indicative of a larger trend of fashionable pet keeping during the eighteenth century.&nbsp; As Tague notes, “On some level . . . pets were fashionable consumer goods” at that time (92).</span><a data-dcnode-id="755" href="#_edn3" name="_ednref3"><span data-dcnode-id="756" instrument_node="">[iii]</span></a><span data-dcnode-id="754" instrument_node="">&nbsp; English pet shops began selling more exotic species while also appealing to less adventurous consumers with commonplace animals like squirrels, whose appeal stems from their “attractive characteristics as small, clever, and fairly clean animals” (Tague 92). The squirrel becomes a token, not only of the attention that Trueworth pays to Betsy’s desires but also his ability to financially support those desires.&nbsp; Despite the implications of Trueworth’s gift, Betsy later marries “a gentleman named Mr. Munden,” a lover initially described as “soft and complaisant” (</span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Thoughtless</span></em><span data-dcnode-id="751" instrument_node=""> 295, 486).&nbsp; His courting of Betsy does not involve the extravagant gift giving that characterized her relationship with Trueworth.&nbsp; Rather, Munden conducts his courtship as shrewdly as possible and “with less love, perhaps, than many, who had addressed her” (</span><em data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Thoughtless</span></em><span data-dcnode-id="748" instrument_node=""> 296).&nbsp; At the incessant badgering of her older brothers, Betsy acquiesces to marry Munden, not for his displays of passion or affection, but because she has “gone too far with Mr. Munden to be able to go back with honour” (</span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Thoughtless</span></em><span data-dcnode-id="745" instrument_node=""> 484).&nbsp; The timbre of Betsy’s engagement, then, is not wonder, as she felt at the sight of Trueworth’s gift, but tolerable consolation for having toyed with Munden for too long.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="742" instrument_node="">Soon, however, a “darkening gloom” overtakes their relationship, as Munden realizes that he cannot financially support Betsy’s lifestyle (</span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Thoughtless </span></em><span data-dcnode-id="739" instrument_node="">498).&nbsp; Munden becomes “excessively parsimonious at home” and reduces Betsy’s pin money to such an inadequate sum that she is “without means to support her character” (</span><em data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Thoughtless</span></em><span data-dcnode-id="736" instrument_node=""> 499).&nbsp; This tension erupts in a series of arguments concerning Betsy’s spending and personal funds.&nbsp; With a “surly look,” Munden expresses to Betsy his fear that “she [is] a bad economist” (</span><em data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Haywood</span></em><span data-dcnode-id="733" instrument_node=""> 499).&nbsp; By all accounts, Munden’s temper surprises Betsy who finds his demeanor “cold and indifferent” (</span><em data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Thoughtless</span></em><span data-dcnode-id="730" instrument_node=""> 501).&nbsp; The omniscient narrator details Munden’s belief that “a wife [is] no more than an upper servant, bound to study and obey,” and because Betsy’s objections to her pin money allotment threatens his control over her, Munden “fixe[s] his resolution to render himself absolute master” (</span><em data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Thoughtless</span></em><span data-dcnode-id="727" instrument_node=""> 507).&nbsp; Munden’s character, by this point, is diametrically opposed to Trueworth’s.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="724" instrument_node="">As Munden is “ready to burst with an inward malice,” the narrator reminds us of the gift Trueworth had made to Betsy, “a present of a squirrel . . . [her] first token of love” (</span><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Thoughtless</span></em><span data-dcnode-id="721" instrument_node=""> 507).&nbsp; The care she pays to the squirrel makes it the target of Munden’s wrath.&nbsp; Whereas, Trueworth provided the squirrel, Munden acts to take it away permanently.&nbsp; Munden grabs the squirrel “by the neck, and throw[s] it with his whole force against the carved work of the marble chimney” where the rodent’s “tender frame [is] dashed to pieces” (</span><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Thoughtless</span></em><span data-dcnode-id="718" instrument_node=""> 507).&nbsp; During this disturbing act of animal abuse, Munden delights in his destruction, “Here is one domestic, at least, that may be spared” (</span><em data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Thoughtless</span></em><span data-dcnode-id="715" instrument_node=""> 507).&nbsp; Munden betrays one of the specific reasons he killed the squirrel—to ease the household debt by ridding it of at least one expense.&nbsp; As Tague notes, “pets embodied the worst excess of fashionable consumption, thanks to the fact that in addition to their status as fashionable goods, they were also literally consumers, draining resources” (94).&nbsp; Betsy is deeply troubled by Munden’s action, “the massacre of so unhurtful a little creature” (</span><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Thoughtless </span></em><span data-dcnode-id="712" instrument_node="">509).</span><a data-dcnode-id="710" href="#_edn4" name="_ednref4"><span data-dcnode-id="711" instrument_node="">[iv]</span></a><span data-dcnode-id="709" instrument_node="">&nbsp; It is not Trueworth’s connection to Betsy and the squirrel that causes Munden to kill it but, rather, the perceived overabundance of attention with which Betsy lavishes it–the pet she “always cherished”–and the cost of its maintenance (</span><em data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Thoughtless </span></em><span data-dcnode-id="706" instrument_node="">507).</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="703" instrument_node="">Despite the “splenetic and barbarous” nature of the murder drawing the righteous indignation of Betsy and potentially disturbing the modern reader, the social company that Munden and Betsy keep do not overtly condemn or vilify his actions (</span><em data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Thoughtless </span></em><span data-dcnode-id="700" instrument_node="">509).&nbsp; Even after Betsy tells Lady Trusty, a confidant, about the incident and suggests pursuing a legal separation from Munden, Lady Trusty impresses upon Betsy the “absolute necessity for a reconciliation” as “all you [Betsy] can accuse him of will not amount to a separation” (</span><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Thoughtless</span></em><span data-dcnode-id="697" instrument_node=""> 511).&nbsp; Because Munden views both his wife and her pet as his personal property, he believes that he is well within his legal rights to act against them as he sees fit, and to no small degree, he is correct.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="694" instrument_node="">Efforts to legislate animal abuse began to shift public sentiment concerning the well-being of non-human species at the end of the eighteenth-century, decades after the publication of </span><em data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Betsy Thoughtless</span></em><span data-dcnode-id="691" instrument_node="">.&nbsp; These anticruelty movements were limited, though, and only “focused on working animals” and livestock (Tague 157).&nbsp; David Perkins notes that while, for example, the reformation of prison conditions was championed by John Howard leading up to 1774, the “cause of animals did not enlist comparably dedicated persons” (44).</span><a data-dcnode-id="689" href="#_edn5" name="_ednref5"><span data-dcnode-id="690" instrument_node="">[v]</span></a><span data-dcnode-id="688" instrument_node="">&nbsp; Outrage over the abuse of domesticated pets “was still far in the future . . . for anticruelty advocates” and as Tague points out, “it would be reasonable . . . to envision the eighteenth-century as very distant from our own pet-loving culture” (157).&nbsp; Rob Boddice highlights the laxity with which early anti-cruelty legislation was formulated claiming that “Very occasionally, the charge of cruelty had in mind the consequences done to specific animals” (15).</span><a data-dcnode-id="686" href="#_edn6" name="_ednref6"><span data-dcnode-id="687" instrument_node="">[vi]</span></a><span data-dcnode-id="685" instrument_node="">&nbsp; This is a significant part of Lady Trusty’s argument against separation; Betsy’s case against Munden rests on no real legal ground, as Munden did not actually break any contemporary law when he killed the squirrel.&nbsp; According to Lady Trusty, attempting to separate from Munden would prove fruitless and potentially cause Betsy further harm.&nbsp; Betsy’s concern and attempt to correct the abuse committed against her pet, however, is particularly uncharacteristic of the period.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="682" instrument_node="">While Haywood writes about pet keeping at other times, she does not write as frankly about the inhumanity of animal cruelty elsewhere in her bibliography.&nbsp; In her novel, </span><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The History of Jemmy and Jenny Jessamy </span></em><span data-dcnode-id="679" instrument_node="">(1753), Lady Speck dismisses the loss of a womanizer and “coxcomb,” Celadine, as akin to “the loss of a squirrel or monkey who has diverted one with its tricks” (208).&nbsp; Here, the squirrel is dismissed as a mere bauble, easily forgotten once lost.&nbsp; In the </span><em data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Epistles for the Ladies</span></em><span data-dcnode-id="676" instrument_node=""> (1748), Hillaria writes to Clio, two eidolons Haywood assumes, asking whether or not a “Person, whose Pleasure is in the Company of a Dog, a Monkey, a Parrot, a Cat, a Horse, or any other Species of the Brute Creation, [can] be imagined to have Taste for the Conversation of Cherubs, Seraphs, and the rest of the Angelic Throng” (293-4).</span><a data-dcnode-id="674" href="#_edn7" name="_ednref7"><span data-dcnode-id="675" instrument_node="">[vii]</span></a><span data-dcnode-id="673" instrument_node="">&nbsp; While dismissive of those fashionable individuals that keep pets, Hillaria makes sure to clarify that she did not mean to offend Clio, who keeps “</span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Tib</span></em><span data-dcnode-id="670" instrument_node="">, your little favourite Squirrel” for a pet (</span><em data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Epistles </span></em><span data-dcnode-id="667" instrument_node="">294-5).&nbsp; Hillaria appears to hold a similar view of pet keeping to that of Lady Speck and goes as far as to associate a lack of religiosity with those who excessively fawn and dote over pets.&nbsp; An exception is made, however, for Clio’s squirrel, which Hillaria deems one of the “harmless Animals,” though, this does little to alter the overall tone of the letter which condescends greatly toward pet owners (</span><em data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Epistles</span></em><span data-dcnode-id="664" instrument_node=""> 295).&nbsp; While these figures do not abuse animals, they certainly share Munden’s belief that the attention given to animals, their lives, and their loss are ultimately inconsequential.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="661" instrument_node="">While writing </span><em data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">The Wife </span></em><span data-dcnode-id="658" instrument_node="">(1755) as Mira, one of Haywood’s better known eidolons of </span><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">The Female Spectator</span></em><span data-dcnode-id="655" instrument_node="">, we learn that “Among all the various foibles of which the softer sex are but too justly accus’d, I [Mira] know of none more preposterous than the immoderate fondness” given to pets of all varieties (96).</span><a data-dcnode-id="653" href="#_edn8" name="_ednref8"><span data-dcnode-id="654" instrument_node="">[viii]</span></a><span data-dcnode-id="652" instrument_node="">&nbsp; Mira then begins the first of several anecdotes that concern a wife who “is all the time playing with her lap-dog,” causing her to ignore her husband (</span><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Wife </span></em><span data-dcnode-id="649" instrument_node="">96).&nbsp; Mira quips that a man who endures this behavior is either “quite a fool, or endued with an uncommon share of philosophy and fortitude” and “if the latter, nothing but the most low contempt could restrain him from giving her some marks of his resentment, and throwing her favourite dog out of the window” (</span><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Wife </span></em><span data-dcnode-id="646" instrument_node="">96).&nbsp; While this story is likely meant to take advantage of an eighteenth-century “satirical convention of representing women taking personal offence at any perceived mistreatment of their pets,” as Theresa Braunschneider claims, there is little similarity between the reactions of the women in Mira’s anonymous stories and Betsy’s reaction to the deeply personal affront committed by Munden (43).</span><a data-dcnode-id="644" href="#_edn9" name="_ednref9"><span data-dcnode-id="645" instrument_node="">[ix]</span></a></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="641" instrument_node="">As they far better resemble Munden’s character, the men of Mira’s story do provide clearer insight into the reactionary nature of his animal abuse.&nbsp; If one were to swap the dog for a squirrel, Mira would, in fact, describe the precise situation in which Betsy finds herself and, using the example given by Mira, we might better understand Munden’s intention when he murders Betsy’s squirrel.&nbsp; Because Betsy pays, what Munden deems, a frivolous amount of money on and attention to the squirrel, he abuses her pet in lieu of physically harming Betsy and further reducing her pin money allowance.&nbsp; The squirrel, thus, mediates the physical and economic harm done by Munden against Betsy.&nbsp; Through the examples of animal abuse committed by the unnamed husband of Mira’s anecdote and Munden, Haywood convincingly frames marital aggression against animals as not only an exclusively male attack on a wife’s personal and economic autonomy but also a means of mediating a husband’s desire to physically assault his wife.&nbsp; To return to the language of the text, if Munden continues to find Betsy’s spending excessive, she might easily become yet another “domestic . . . spared” (</span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Thoughtless</span></em><span data-dcnode-id="638" instrument_node=""> 507).</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="635" instrument_node="">While Haywood’s depictions of pet keeping and animal cruelty vary from overwhelming dismissal to sincere concern, the latter impresses upon modern readers the potentially progressive nature of Haywood’s writing.&nbsp; Betsy’s attempt to rectify her husband’s animal abuse and economic stricture through legal separation, though ultimately unsuccessful, as well as Haywood’s poetic </span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">deus ex</span></em><span data-dcnode-id="632" instrument_node=""> that releases Betsy from her marriage through Munden’s death to seek out the newly widowed Trueworth, predate most historical attempts to condemn harm towards household pets.&nbsp; Ultimately, if we are to begin bending Haywood’s critical arc towards an end which positions her as a “mistress of multiplicity,” we must embrace the contradictory viewpoints Haywood confronts in her writing as indicative, though not necessarily reflective, of her own complicated subject position as a female writer in the eighteenth century (King 195).</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="629" instrument_node="">As Alexander Pettit notes in his introduction to </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">The Wife</span></em><span data-dcnode-id="626" instrument_node="">, Haywood approaches the issue of wifehood through diverse means in equally diverse genres.&nbsp; According to Pettit, such “Juxtapositions . . . suggest that although Haywood may have chosen to entertain certain socio-generic fantasies in her novels, she did not do so naively” (</span><em data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Works</span></em><span data-dcnode-id="623" instrument_node=""> I.III 3).&nbsp; Haywood’s writing is anything but linear or formulaic, and, as Pettit acknowledges, we must assume that Haywood did not include various depictions of pet keeping, as she did with marriage, without a reason for presenting these multiple subjectivities, fictional and practical alike.</span><a data-dcnode-id="621" href="#_edn10" name="_ednref10"><span data-dcnode-id="622" instrument_node="">[x]</span></a><span data-dcnode-id="620" instrument_node="">&nbsp; Thus, because writers were “denied the luxury of politically pure positions,” Haywood’s various writings on pet keeping across several genres sought to appeal to the multifaceted and multimodal audiences that consumed her writing (King 27).&nbsp; Haywood’s distinct depictions of attitudes concerning pet keeping and animal abuse suggest that, rather than composing with a rote amatory method, she created narrative voices that were often at odds with one another to confront looming questions concerning the fragility and aggressivity of the male ego, the prospect of personal and economic autonomy for women, and the value of animal life in the eighteenth century.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="615" style="text-align: center;"><a data-dcnode-id="617" href="#_ednref1" name="_edn1"></a><span data-dcnode-id="616" instrument_node="">Notes</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">[i] See James Sutherland’s edition of Alexander Pope’s </span><em data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Dunciad</span></em><span data-dcnode-id="610" instrument_node=""> (Book II, lines 149-156) for this reference to Eliza Haywood.&nbsp; I suggest Sutherland’s edition because he claims that “Pope’s satire [of Haywood] was merciless, but not undeserved” (443).&nbsp; Much of the scholarship concerning Haywood presumes the purportedly devastating ramifications of these lines.&nbsp; This is a relatively invariable trend in Pope scholarship.&nbsp; However, King deftly rebuts scholarly work that relies heavily on Pope’s attack on Haywood as it “rests to an uncomfortable extent on readings of her life filtered through the detractions of her enemies as they are betted by present-day desires to give her an appealingly unconventional history” and relies heavily on “details drawn from the well-stocked cabinet of misogynistic satiric conventions” (5-6).</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="601"><a data-dcnode-id="606" href="#_ednref2" name="_edn2"><span data-dcnode-id="607" instrument_node="">[ii]</span></a><span data-dcnode-id="605" instrument_node=""> While Richetti certainly notes the “significant domestic realism” of the scene in “Histories by Eliza Haywood and Henry Fielding:&nbsp; Imitation and Adaptation,” he places her work at odds with the writing of Henry Fielding, claiming that “Haywood’s interesting . . . exposure of ideological contradiction[s]” are the result of an imperfect imitation of Henry Fielding’s histories (255).&nbsp; Richetti’s reading of Haywood is yet another example of scholarship undermining the importance of Haywood’s work through comparative, deprecating, and, misogynistic criticism. Ultimately, Richetti concludes that the squirrel “is nothing more nor less than an interesting prop” and that Haywood’s </span><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Betsy Thoughtless</span></em><span data-dcnode-id="602" instrument_node="">, like the animal abuse scene, is “loose and opportunistic, [a] stringing together [of] striking scenes” which “Fielding doubtless would have disdained as literal-minded and vulgar, lacking true inventiveness” (“Histories” 258).&nbsp; By contextualizing Haywood, not against the work or presumed opinions of her contemporaries, but against the craft and views of her own works, the conclusion of this analysis reveals the incredible wit and flexibility with which Haywood considered marriage and pet keeping–rather than deeming Haywood’s writing a defense of “a conventional bourgeois ideology of female subordination and sexual suppression” (“Histories” 255).</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="593"><a data-dcnode-id="598" href="#_ednref3" name="_edn3"><span data-dcnode-id="599" instrument_node="">[iii]</span></a><span data-dcnode-id="597" instrument_node=""> As Keith Thomas notes in </span><em data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Man and the Natural World:&nbsp; A History of the Modern Sensibility</span></em><span data-dcnode-id="594" instrument_node="">, “By 1700 all of the symptoms of obsessive pet-keeping were in evidence [in Britain].&nbsp; Pets were often fed better than the servants.&nbsp; They were adorned with rings, ribbons, feathers and bells; and they became an increasingly regular feature of painted family groups” (117).&nbsp; The ubiquity of pet keeping in the eighteenth century cannot be understated.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="585"><a data-dcnode-id="590" href="#_ednref4" name="_edn4"><span data-dcnode-id="591" instrument_node="">[iv]</span></a><span data-dcnode-id="589" instrument_node=""> While the actions of Munden may come as a surprise to both Betsy and the modern reader, Erin Mackie claims in </span><em data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Rakes, Highwaymen, and Pirates:&nbsp; The Making of the Modern Gentleman in the Eighteenth Century</span></em><span data-dcnode-id="586" instrument_node=""> that the identified social class Munden inhabits–the gentleman–is one steeped in a history of criminality and skullduggery associated with rakes, highwaymen, and pirates.&nbsp; Mackie notes that “especially in the case of the rake and the highwayman, unauthorized types often forward a claim to those very characteristics of gentility which the modern gentleman would monopolize” (4).&nbsp; While not legally considered a criminal for his actions, the history that Mackie traces proves helpful when attempting to explain Munden’s cruelty towards Betsy and her pet.&nbsp; Likewise, though Trueworth is deemed a gentleman, Mackie argues for an understanding of masculinity’s role in criminality and gentlemanliness which is by no means an assurance that every gentleman would act as Munden does in the text.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="577"><a data-dcnode-id="582" href="#_ednref5" name="_edn5"><span data-dcnode-id="583" instrument_node="">[v]</span></a><span data-dcnode-id="581" instrument_node=""> Perkins similarly notes that the cause of anti-cruelty “was an effort that one might take up occasionally, episodically, among other projects, paying for a sermon on the subject, giving one, or getting up a petition, or introducing a bill in Parliament.&nbsp; And then, in most cases, you went on to matter that concerned you more” (44).&nbsp; Perkins identifies William Cowper’s 1774 poem </span><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">The Task</span></em><span data-dcnode-id="578" instrument_node="">, which “strongly urged compassion for animals, weaving this virtue into [Cowper’s] powerful image of the good person and the good life,” as one of the later catalysts for the increased awareness of the anti-cruelty movement (45).</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="572"><a data-dcnode-id="574" href="#_ednref6" name="_edn6"><span data-dcnode-id="575" instrument_node="">[vi]</span></a><span data-dcnode-id="573" instrument_node=""> Boddice defines more clearly the charge of cruelty as one “of unmanliness, a charge of callousness, a charge of being uncivilized, on the one hand; cruelty was a masquerade for class interests, a vehicle for social control, an abhorrence of tradition or custom, on the other” (15).</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="561"><a data-dcnode-id="569" href="#_ednref7" name="_edn7"><span data-dcnode-id="570" instrument_node="">[vii]</span></a><span data-dcnode-id="568" instrument_node=""> </span><em data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">The Epistles for the Ladies </span></em><span data-dcnode-id="565" instrument_node="">appears in the </span><em data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Selected Works of Eliza Haywood I, Vol. 2</span></em><span data-dcnode-id="562" instrument_node="">.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="538"><a data-dcnode-id="558" href="#_ednref8" name="_edn8"><span data-dcnode-id="559" instrument_node="">[viii]</span></a><span data-dcnode-id="557" instrument_node=""> </span><em data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">The Wife </span></em><span data-dcnode-id="554" instrument_node="">appears in the </span><em data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Selected Works of Eliza Haywood I, Vol. 3</span></em><span data-dcnode-id="551" instrument_node="">.&nbsp; For more information concerning the role Mira plays in Haywood’s periodical </span><em data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">The Female Spectator </span></em><span data-dcnode-id="548" instrument_node="">and female subjectivity in periodical culture, see Manushag Powell’s </span><em data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">Performing Authorship in 18</span><sup data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">th</span></sup><span data-dcnode-id="544" instrument_node="">-Century English Periodicals</span></em><span data-dcnode-id="542" instrument_node="">.&nbsp; Powell claims that Haywood’s eidolons in </span><em data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The Female Spectator </span></em><span data-dcnode-id="539" instrument_node="">try “to make use of the traits any woman might use in navigating the social world . . . to educate by pleasing” (152).&nbsp; One of these traits is, no doubt, the ability to learn from the mistakes of others.&nbsp; Thus, Mira’s use of absurd and anecdotal tales of female pet keeping folly in Haywood’s conduct literature is both sadistically humorous and didactic.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="533"><a data-dcnode-id="535" href="#_ednref9" name="_edn9"><span data-dcnode-id="536" instrument_node="">[ix]</span></a><span data-dcnode-id="534" instrument_node=""> Braunschneider elaborates further and in agreement with numerous other sources used here which claim that a woman’s pet was “an extension of its owner’s self . . . satirical depictions of women of fashion intimate that such narcissistic consumption could be the inevitable result of British involvement in world trade and cultural exchange” (43).</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="528"><a data-dcnode-id="530" href="#_ednref10" name="_edn10"><span data-dcnode-id="531" instrument_node="">[x]</span></a><span data-dcnode-id="529" instrument_node=""> While Haywood certainly leaned on a stock set of tropes for her writing, she did so no more frequently than her contemporaries.&nbsp; The degree to which Haywood relies on stock figures and conceits is vastly overstated in lieu of properly examining the multiplicities of expression found in Haywood’s writing.&nbsp; For an example of this maligned argument concerning Haywood’s allegedly formulaic style, see Richetti’s chapter “Popular Narrative in the Early Eighteenth Century:&nbsp; Formats and Formulas” in which he claims, “Haywood produced a highly successful imitation of Manley’s secret history,” but dismisses Haywood as a non-political writer (a claim which King’s biography more than adequately proves false) whose “tremendous output of popular narrative during the 1720s repeats tirelessly the formulas of the amatory novella, occasionally extend to novel length” (“Formulas” 83).&nbsp; Unable to admit that Haywood might be contributing to a literary tradition rather than simply poorly mimicking it, Richetti compartmentalizes and condescends, designating this form of amatory writing, “Haywoodian” (“Formulas” 91).</span></p><span data-dcnode-id="527" instrument_node="">

</span><header class="entry-header" data-dcnode-id="356"><span data-dcnode-id="382" instrument_node="">
</span><a class="entry-title" data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/veiled-intent-dissenting-womens-aesthetic-approach-biblical-interpretation/" rel="bookmark" title="Permalink to Veiled Intent: Dissenting Women’s Aesthetic Approach to Biblical Interpretation"><h1 data-dcnode-id="379"><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Veiled Intent: Dissenting Women’s Aesthetic Approach to Biblical Interpretation</span></em></h1></a><span data-dcnode-id="377" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="358"><span data-dcnode-id="376" instrument_node="">
</span><a class="author url fn" data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/author/natasha-duquette/" rel="author" title="Posts by Natasha Duquette"><span data-dcnode-id="375" instrument_node="">Natasha Duquette</span></a><span class="sep" data-dcnode-id="371"><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">Posted on </span></span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/veiled-intent-dissenting-womens-aesthetic-approach-biblical-interpretation/" rel="bookmark" title="11:59 am"><time class="entry-date" data-dcnode-id="369" datetime="2016-09-07T11:59:51-04:00" pubdate=""><span data-dcnode-id="370" instrument_node="">September 7, 2016</span></time></a><span class="byline" data-dcnode-id="360"><span data-dcnode-id="367" instrument_node=""> </span><span class="sep" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node=""> by </span></span><span data-dcnode-id="364" instrument_node=""> </span><span class="author vcard" data-dcnode-id="361"><a class="url fn n" data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/categories/collections/women" rel="author" title="View all posts by Natasha Duquette"><span data-dcnode-id="363" instrument_node="">Natasha Duquette</span></a></span></span><span data-dcnode-id="359" instrument_node=""> </span></div><span data-dcnode-id="357" instrument_node="">
</span></header><span data-dcnode-id="355" instrument_node="">
</span><div class="entry-content post_content" data-dcnode-id="317"><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="351"><img alt="veiledintent" class="alignleft size-medium wp-image-4210" data-dcnode-id="353" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.18thcenturycommon.org/wp-content/uploads/2016/09/veiledintent-200x300.jpg&amp;raw" srcset="https://www.18thcenturycommon.org/wp-content/uploads/2016/09/veiledintent-200x300.jpg 200w, https://www.18thcenturycommon.org/wp-content/uploads/2016/09/veiledintent-100x150.jpg 100w, https://www.18thcenturycommon.org/wp-content/uploads/2016/09/veiledintent.jpg 333w" width="200"><span data-dcnode-id="352" instrument_node="">In the long eighteenth century, attitudes towards a woman lifting her voice within the religious public sphere varied denominationally.&nbsp; In differentiation from Anglican and Presbyterian communities, Quakers accepted the idea of women preaching from the mid-seventeenth century onwards.&nbsp; The process in the Methodist church was more gradual.&nbsp; Though female Methodists were preaching by 1787, at first they could only share their personal conversion narrative or give an “exhortation” as long as they avoided the “taking of a text.”&nbsp; In other words, a woman could lead through public speech, as long as she did not quote from the Bible.&nbsp; Little wonder women needed to veil their biblical interpretation in forms viewed as acceptably feminine when writing for print.&nbsp; Within Presbyterian and Congregationalist communities women were not engaged in public speaking at all, which is perhaps why they channeled their biblical interpretation so powerfully into poetry, hymns, plays, letters, and even novels, as well as essays on taste and aesthetics.&nbsp; Extremely learned women in these Dissenting communities deployed their significant knowledge of Hebrew, Greek, and theology in composing book-length works containing substantial biblical hermeneutics written from a female standpoint.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="349" instrument_node="">These women Dissenters focused on biblical content often overlooked by male biblical commentators.&nbsp; Phillis Wheatley and Mary Anne Schimmelpenninck analyzed biblical stories of the weak overcoming the strong (e.g., David and Goliath) as a veiled analogy for women’s fight against systemic oppression.&nbsp; Presbyterians Anna Barbauld, Helen Maria Williams, and Joanna Baillie explored biblical birth and mothering metaphors for God’s omnipotence, contra Edmund’s Burke’s focus on divine wrath.&nbsp; Women cloaked their substantial biblical exegesis in works such as </span><em data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Poems on Various Subjects:&nbsp; Religious and Moral </span></em><span data-dcnode-id="346" instrument_node="">(Phillis Wheatley, 1773), </span><em data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Hymns in Prose for Children </span></em><span data-dcnode-id="343" instrument_node="">(Anna Barbauld, 1781), </span><em data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">A Poem on the Bill Lately Passed for Regulating the Slave Trade </span></em><span data-dcnode-id="340" instrument_node="">(Helen Maria Williams, 1788), and </span><em data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Poems, Wherein it is Attempted to Describe Certain Views of Nature and Rustic Manners </span></em><span data-dcnode-id="337" instrument_node="">(Joanna Baillie, 1790).&nbsp; If modern readers pay careful attention, they will hear these women preaching through their printed works.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">Mary Anne Schimmelpenninck, one of the first women to publish a comprehensive work of biblical interpretation in English, witnessed the empowerment of women’s voices within eighteenth-century Quaker and Methodist communities before eventually becoming a Moravian.&nbsp; The Moravians were a somewhat experimental spiritual community to which William Blake’s mother – Catherine Wright Armitage Blake – belonged.&nbsp; Schimmelpenninck was an anti-slavery activist and philosopher who referenced the work of Anna Barbauld and Joanna Baillie repeatedly in her prose.&nbsp; Her modestly titled book </span><em data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Biblical Fragments </span></em><span data-dcnode-id="331" instrument_node="">(1826) draws on the church fathers and cites passages of the Old Testament in Hebrew to contest the King James translation.&nbsp; Schimmelpenninck also boldly transcends historical divides between Protestants and Catholics by praising the biblical interpretation of seventeenth-century French nuns.&nbsp; Her ground breaking ecumenical work has been undervalued in histories of Dissenting women’s social activism and the scriptural engagement that undergirded it.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="328" instrument_node="">My book&nbsp;</span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wipfandstock.com/veiled-intent.html"><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Veiled Intent: Dissenting Women’s Aesthetic Approach to Biblical Interpretation</span></em><span data-dcnode-id="325" instrument_node="">&nbsp;</span></a><span data-dcnode-id="323" instrument_node="">asks how eighteenth-century dissenting women writers were able to ensure their unique biblical interpretation was preserved for posterity.&nbsp; And how did their careful yet shrewd tactics spur early nineteenth-century women writers into vigorous theological debate?&nbsp; Why did the biblical engagement of such women prompt their commitment to causes such as the antislavery movement?&nbsp; </span><i data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Veiled Intent</span></i><span data-dcnode-id="320" instrument_node=""> traces the pattern of tactical moves and counter-moves deployed by Anna Barbauld, Phillis Wheatley, Helen Maria Williams, Joanna Baillie, and Mary Anne Schimmelpenninck.&nbsp; These female poets and philosophers veiled provocative hermeneutical claims and calls for social action within aesthetic forms of discourse viewed as more acceptably feminine forms of expression.&nbsp; In between the lines of their published hymns, sonnets, devotional texts for children, and works of aesthetic theory, the perceptive reader finds striking theological insights shared from a particularly female perspective.&nbsp; These women were not only courageously interjecting their individual viewpoints into a predominantly male domain of formal study–biblical hermeneutics–but also intentionally supporting each other in doing so.&nbsp; Their publications reveal that they were drawn to biblical imagery of embodiment and birth, to stories of the apparently weak vanquishing the tyrannical on behalf of the oppressed, and to the metaphor of Christ as strengthening rock. </span></p><span data-dcnode-id="318" instrument_node="">
</span></div><span data-dcnode-id="316" instrument_node="">
</span><footer class="entry-meta" data-dcnode-id="277"><span data-dcnode-id="315" instrument_node="">
