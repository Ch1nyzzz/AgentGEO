</span><span data-dcnode-id="4153" id="freeText2866584869100119857" style="display:none"><span data-dcnode-id="4160" instrument_node="">At the turn of the twentieth century, American women began to reject Victorian propriety in favor of passion and livelihood outside the home. This alarmed authorities, who feared certain "over-sexed" women could destroy civilization if allowed to reproduce and pass on their defects. Set against this backdrop, </span><i data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">The Unfit Heiress&nbsp;</span></i><span data-dcnode-id="4157" instrument_node="">chronicles the fight for inheritance, both genetic and monetary, between Ann Cooper Hewitt and her mother Maryon.</span><br data-dcnode-id="4156"><br data-dcnode-id="4155"><span data-dcnode-id="4154" instrument_node="">In 1934, aided by a California eugenics law, the socialite Maryon Cooper Hewitt had her "promiscuous" daughter declared feebleminded and sterilized without her knowledge. She did this to deprive Ann of millions of dollars from her father's estate, which contained a child-bearing stipulation. When a sensational court case ensued, the American public was captivated. So were eugenicists, who saw an opportunity to restrict reproductive rights in America for decades to come.</span></span><span data-dcnode-id="4152" instrument_node="">

</span><span data-dcnode-id="3564" id="freeTextContainer8106994069390773748"><span data-dcnode-id="3573" instrument_node="">The Unfit Heiress: The Tragic Life and Scandalous Sterilization of Ann Cooper Hewitt</span><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">by Audrey Clare Farley</span><br data-dcnode-id="3570"><br data-dcnode-id="3569"><span data-dcnode-id="3568" instrument_node="">I want to thank the publisher and NetGalley for this very informative and emotional book! The review is all my own opinion. </span><br data-dcnode-id="3567"><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">This book really showed that a lot of research went into this! It is very informative, very frustrating, agitating, and emotional. It not only tells the story about Ann Cooper Hewitt, her horrid mother, her inventive father, but the deliberate laws to make America a whi</span></span><span data-dcnode-id="3563" instrument_node="">
</span><span data-dcnode-id="3528" id="freeText8106994069390773748" style="display:none"><span data-dcnode-id="3562" instrument_node="">The Unfit Heiress: The Tragic Life and Scandalous Sterilization of Ann Cooper Hewitt</span><br data-dcnode-id="3561"><span data-dcnode-id="3560" instrument_node="">by Audrey Clare Farley</span><br data-dcnode-id="3559"><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">I want to thank the publisher and NetGalley for this very informative and emotional book! The review is all my own opinion. </span><br data-dcnode-id="3556"><br data-dcnode-id="3555"><span data-dcnode-id="3554" instrument_node="">This book really showed that a lot of research went into this! It is very informative, very frustrating, agitating, and emotional. It not only tells the story about Ann Cooper Hewitt, her horrid mother, her inventive father, but the deliberate laws to make America a white only population! </span><br data-dcnode-id="3553"><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node="">I would never have guessed that legal laws were on the books to sterilize minorities, "imbeciles", epileptics, rape victims, and the poor. The upper middle class white and rich could also have their children sterilized if they were one of the undesirable.</span><br data-dcnode-id="3550"><br data-dcnode-id="3549"><span data-dcnode-id="3548" instrument_node="">"Why did the Pilgrims come to America? What is the duration of a presidential term? What is the longest river in the United States? When was the Battle of Hastings fought?"</span><br data-dcnode-id="3547"><span data-dcnode-id="3546" instrument_node="">If you couldn't answer these questions, regardless of age, education, language, disability, well you are an " imbecile " and could be sterilized without your consent. Hundreds of thousands were. These were some of the questions asked to Ann who was not in school often.</span><br data-dcnode-id="3545"><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">The book briefly touches on a couple of other cases to make a few points. One case involved a girl of 18 in foster care which only had a 6th grade education because the foster family took her out of school and made her work the fields. The nephew of the foster family raped the girl and got her pregnant. She was deemed oversexed ( because she was raped), imbecile (because she didn't pass the tests because she wasn't educated enough), and untruthful (probably told about the rape which the foster family was hiding the nephew). The attorney for both sides felt she needed the sterilization! Even her own attorney was against her.</span><br data-dcnode-id="3542"><br data-dcnode-id="3541"><span data-dcnode-id="3540" instrument_node="">Later, 1940's- 1960's, pressure was put on white women to reproduce. Thus, the baby boom. The sterilization keep going on the undesirables! </span><br data-dcnode-id="3539"><br data-dcnode-id="3538"><span data-dcnode-id="3537" instrument_node="">Ann Cooper Hewitt was born to a female con artist that was pretty, Maryon. Maryon wanted material things and power. She went through several husbands to get it. Ann was a mistake to Maryon. She didn't want her and let her know constantly. I won't tell you about it except to say she did as the title of the book says, arranged for Ann to be sterilized. The will left by her husband said Maryon gets all the money if Ann is childless. Read the evidence for yourself and decide. </span><br data-dcnode-id="3536"><br data-dcnode-id="3535"><span data-dcnode-id="3534" instrument_node="">It also goes through a very through look a Maryon's life and Ann's life separately. Each one is extremely sad and pitiful. It seems to me that Maryon was seeking material and Ann was seeking someone just to love her.</span><br data-dcnode-id="3533"><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">In a strange way, Ann's case reminds me of the young Kennedy girl's case. Lobotomy to correct a mental embarrassment to the famous father. A socially excepted thing to do with your undesirables at the time. So sad! What has society turned us into?</span><br data-dcnode-id="3530"><span data-dcnode-id="3529" instrument_node=""> </span></span><span data-dcnode-id="3527" instrument_node="">

</span><span data-dcnode-id="3323" id="freeTextContainer588873202484390534"><span data-dcnode-id="3330" instrument_node="">The Unfit Heiress: The Tragic Life and Scandalous Sterilization of Ann Cooper Hewitt by Audrey Clare Farley. Published 2021 by Grand Central Publishing. Hardcover, 304 pages.</span><br data-dcnode-id="3329"><br data-dcnode-id="3328"><span data-dcnode-id="3327" instrument_node="">4 well deserved stars, hands down.</span><br data-dcnode-id="3326"><br data-dcnode-id="3325"><span data-dcnode-id="3324" instrument_node="">I learned a lot from Farley's work of creative fiction (meaning that the primary events, data, and attributed media quotes are factual). I found that the author serves a family size portion of the history of reproductive rights and justice with an emphasis on the case of the Ann Cooper Hewit</span></span><span data-dcnode-id="3322" instrument_node="">
</span><span data-dcnode-id="3305" id="freeText588873202484390534" style="display:none"><span data-dcnode-id="3321" instrument_node="">The Unfit Heiress: The Tragic Life and Scandalous Sterilization of Ann Cooper Hewitt by Audrey Clare Farley. Published 2021 by Grand Central Publishing. Hardcover, 304 pages.</span><br data-dcnode-id="3320"><br data-dcnode-id="3319"><span data-dcnode-id="3318" instrument_node="">4 well deserved stars, hands down.</span><br data-dcnode-id="3317"><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">I learned a lot from Farley's work of creative fiction (meaning that the primary events, data, and attributed media quotes are factual). I found that the author serves a family size portion of the history of reproductive rights and justice with an emphasis on the case of the Ann Cooper Hewitt sterilization. Ann's mother had her minor daughter sterilized because she deemed the girl feebleminded with a questionable assessment determining that she possessed a substandard intellect and was 'oversexed'. The only evidence of the latter being that the girl discovered masturbation at a very early age and became quite fond of it. Additionally, Ann was distressed that her daughter did not aspire to high social status and was attracted to men in lower class positions.</span><br data-dcnode-id="3314"><br data-dcnode-id="3313"><span data-dcnode-id="3312" instrument_node="">Maryon (Ann's mother) was born in 1881 in rural Alabama. She became of age at a time when women did not have many paths open to them if they wanted to advance socially. She had three things going for her - she was white, she was attractive, and she had a way with men. She reminded me a little of Moll Flanders who had aspirations to advance her social position, but embraced very limited skills to help her achieve them. Maryon chose to assert that she was born into a wealthy blueblood Baltimore family in an attempt to propel herself into an upper class society which would open more doors to marry into an aristocratic family. Let's just say she had a highly successful way with men. The early pages of this book illustrate what appeared to me as Maryon's narcissistic psychopathy - she demonstrated a high level of emotional detachment despite appearing otherwise. Her social standing advanced with each successive relationship and marriage, but these relationships were shallow and doomed. Her third relationship was with Peter Cooper Hewitt, a renowned scientist and inventor and represented the station in society to which Maryon aspired. Peter was shocked when he learned that Maryon was pregnant and tried to hide this secret for as long as possible. [Ann was born to Maryon Andrews Bruguiere and Peter Cooper Hewitt out of wedlock on or about 7/31/1914. Peter married Maryon on 12/21/1918 and he died on 8/25/1921.] He was enamored with the child and did what he could to nurture his daughter while Maryon distanced her self physically (through the use of staff) and emotionally from the child. Ann was seven years old when her father died. Maryon never demonstrated an emotional attachment to the child and pawned her off to staff, sanitariums, and residential schools for the remainder of the child's formative years.</span><br data-dcnode-id="3311"><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node="">In 1936 Ann sued her mother for $500,000, alleging that her mother conspired with Ann’s doctors to have her sterilized during a scheduled appendectomy in order to deprive Ann of her inheritance since Peter’s will stipulated that Ann’s share of his estate would revert back to her mother if Ann died childless. The trial made national news. You'll have to read the book for the outcome, but let me say that the court implicitly sided with those claiming that the purpose of sexuality was pleasure, not reproduction.</span><br data-dcnode-id="3308"><br data-dcnode-id="3307"><span data-dcnode-id="3306" instrument_node="">There is a lot more to the book than the Ann Cooper Hewitt case - I had been unaware of the extent to which sterilization had been used in lockstep with Eugenics to 'control' population growth. I recommend this book to those interested in reproductive rights and feminist issues in general.</span></span><span data-dcnode-id="3304" instrument_node="">

</span><span data-dcnode-id="3217" id="freeText8503767843383590051" style="display:none"><span data-dcnode-id="3218" instrument_node="">I was utterly blown away by this book. The amount of information that Audrey Farley has been able to fit into one book is a feat unto itself. I was so frustrating reading about what happened to Ann, but even more frustrated when i realized that we are largely still having a very similar argument over 100 years later, regarding women's reproductive rights and autonomy to their bodies. There is certainly a gossipy/taudry angle to this story, but more importantly, I think it's a very important insight into US politics and the influence it has no world social issues, even to this day. I had no idea that California, the state in which I live, was the leader in the eugenics movement, and actually assisted in providing studies and theories to the Nazis! This book had my attention right until the end when it got into the men's politics of business, which I think it could have done without. Let this one be about the ladies. I will absolutely recommend this book, but I also want to recommend that it be taught in schools. There is a perspective here that I have never seen anywhere else. I applaud Audrey Clare Farley for digging it up and making it so palatable.</span></span><span data-dcnode-id="3216" instrument_node="">

</span><span data-dcnode-id="3135" id="freeText10747069178586282398" style="display:none"><span data-dcnode-id="3139" instrument_node="">If you've never read about the history of sterilization in the US, then there is lots to learn here. If, however, you have already read the same books that Farley did in order to write this one, then there is not a lot new. The central story--about Ann Cooper Hewitt--is certainly interesting, but it's also possible it could have remained the original article upon which the book was based. There is a good deal of filler halfway through that doubles back to explore Hewitt's father's life that felt unnecessary. </span><br data-dcnode-id="3138"><br data-dcnode-id="3137"><span data-dcnode-id="3136" instrument_node="">Also, as a historian I just can't get behind the author's invention of dialogue and her imputing certain thoughts and feelings to figures in the book when the evidence doesn't really exist to support the claims. And, given that nothing is actually footnoted, one doesn't know which parts are invented and which reflect the historical record. </span></span><span data-dcnode-id="3134" instrument_node="">

</span><span data-dcnode-id="3030" id="freeText13814097663785569302" style="display:none"><span data-dcnode-id="3045" instrument_node="">This is a shocking story to start with about a mother, Maryon Cooper Hewitt, who had her daughter, Ann Cooper Hewitt, sterilized without her consent or knowledge for an inheritance. It gives you the story of Maryon and Ann along with the court case that followed when Ann realized what had been done to her. But the book has a much wider and horrifying scope because laws that allowed this to happen are still in place and still function to control mostly people with uteruses by controlling their reproductive rights. Think of Britney Spears saying in court that she’s being forced to keep an IUD (it is worth the time to read the New York article Britney Spears’s Conservatorship Nightmare) and women coming forward last year to say hysterectomies were performed on them while in immigration custody.</span><br data-dcnode-id="3044"><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node="">The book takes a dive into the history of eugenics and how these laws were devised, the tests used to determine who was “unfit” to have children, and how certain communities—including disabled people and people of color—were targeted because white wealthy women went from having six children to three. This is not a history that we’re far removed from, this is a horrifying and terrifying practice in the here and now.</span><br data-dcnode-id="3041"><br data-dcnode-id="3040"><span data-dcnode-id="3039" instrument_node="">(TW child abuse/ suicide, detail/ attempted suicide treated as criminal case/ ableism/ eugenics–racism, misogyny, homophobia)</span><br data-dcnode-id="3038"><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node="">--from </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookriot.com/newsletter/unusual-suspects/" rel="nofollow noopener"><span data-dcnode- </span><span data-dcnode-id="2948" id="freeTextContainer3837470176153931797"><span data-dcnode-id="2955" instrument_node="">Detailed, fascinating, and shocking!</span><br data-dcnode-id="2954"><br data-dcnode-id="2953"><span data-dcnode-id="2952" instrument_node="">The Unfit Heiress is the candid, expository tale of Ann Cooper Hewitt, a young woman who sued her mother in 1936 for involuntarily having her sterilized in order to acquire her inheritance, as well as an inside look into her infamous parent’s history and relationship, and the horrifying practice of forced sterilization.</span><br data-dcnode-id="2951"><br data-dcnode-id="2950"><span data-dcnode-id="2949" instrument_node="">The writing is intensive and insightful. And the novel is an intriguing tale of one woman’s personal experiences, legal battles, and struggles </span></span><span data-dcnode-id="2947" instrument_node="">
</span><span data-dcnode-id="2933" id="freeText3837470176153931797" style="display:none"><span data-dcnode-id="2946" instrument_node="">Detailed, fascinating, and shocking!</span><br data-dcnode-id="2945"><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">The Unfit Heiress is the candid, expository tale of Ann Cooper Hewitt, a young woman who sued her mother in 1936 for involuntarily having her sterilized in order to acquire her inheritance, as well as an inside look into her infamous parent’s history and relationship, and the horrifying practice of forced sterilization.</span><br data-dcnode-id="2942"><br data-dcnode-id="2941"><span data-dcnode-id="2940" instrument_node="">The writing is intensive and insightful. And the novel is an intriguing tale of one woman’s personal experiences, legal battles, and struggles to find compensation, justice, love and happiness.</span><br data-dcnode-id="2939"><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">Overall, The Unfit Heiress is a thought-provoking, comprehensive debut by Audrey Clare Farley that does a remarkable job of highlighting her incredible knowledge and research into this monumental case, the eugenics movement, and the evolution of society’s perception and acceptance of women’s sexuality.</span><br data-dcnode-id="2936"><br data-dcnode-id="2935"><span data-dcnode-id="2934" instrument_node="">Thank you to Grand Central Publishing for providing me with a copy in exchange for an honest review.</span></span><span data-dcnode-id="2932" instrument_node="">

</span><span data-dcnode-id="2833" id="freeTextContainer2062485354748831663"><span data-dcnode-id="2837" instrument_node="">The case of heiress Ann Cooper Hewitt </span><br data-dcnode-id="2836"><br data-dcnode-id="2835"><span data-dcnode-id="2834" instrument_node="">This book narrates the sad tale of Ann Cooper Hewitt, the daughter of famed engineer and inventor Peter Cooper Hewitt, and how her case about eugenics, arranging human reproduction to increase the occurrence of heritable characteristics regarded as desirable. This was not only common but widely accepted in the United States and it targeted poor women and racial minorities. When Ann was caught with her hands down her under-garment by her mother Maryon Hewitt,</span></span><span data-dcnode-id="2832" instrument_node="">
</span><span data-dcnode-id="2817" id="freeText2062485354748831663" style="display:none"><span data-dcnode-id="2831" instrument_node="">The case of heiress Ann Cooper Hewitt </span><br data-dcnode-id="2830"><br data-dcnode-id="2829"><span data-dcnode-id="2828" instrument_node="">This book narrates the sad tale of Ann Cooper Hewitt, the daughter of famed engineer and inventor Peter Cooper Hewitt, and how her case about eugenics, arranging human reproduction to increase the occurrence of heritable characteristics regarded as desirable. This was not only common but widely accepted in the United States and it targeted poor women and racial minorities. When Ann was caught with her hands down her under-garment by her mother Maryon Hewitt, she 3 years old girl. Her mother became overly concerned that her little girl has inherent deformities that may lead to promiscuity. The doctors back in 1920 confirmed the anxiety of her mother and later sterilized without the knowledge of Ann Hewitt. Much of the book discusses the legal and medical scholarship that worked to expose the inequities in the system regarding eugenics.</span><br data-dcnode-id="2827"><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">When Peter Cooper Hewitt died in 1921, his estate was worth over $4 million, the future equivalent of about $200 billion in 2021, compounded at 4% interest rate. According to his will, Ann would receive two-thirds of this amount, and her mother would receive one-third. A caveat, however, stipulated that should Ann die childless, her share would revert to her mother. At this time forced sterilizations was widely accepted. Involuntary sterilization of poor, disabled, and wayward individuals gained quick acceptance to reduce the number of unsound people in the population. Ann’s mother Maryon Hewitt was first charged with “mayhem” in 1936 for her daughter’s sterilization, but charges were dropped, and Ann filed the civil suit against her mother for $500,000 in January 1936, alleging that she paid the doctors to remove her fallopian tubes without Ann’s knowledge. Soon after, the San Francisco district attorney charged Maryon and both doctors with “mayhem,” a rare charge that was reserved for cases involving the act of disabling or disfiguring an individual. </span><br data-dcnode-id="2824"><br data-dcnode-id="2823"><span data-dcnode-id="2822" instrument_node="">Judge Tuttle dismissed the case against her mother and declared. “The prosecution has completely failed to make a case against the defendants, mother Maryon and the two doctors. According to the judge, sterilization in California was not a crime; therefore, mayhem had not been committed, and there had been no conspiracy to commit it. The judge disagreed with the prosecution that the timing of Ann’s sterilization (occurring within a year of her 21st birthday) was meaningful. He claimed, “The law makes no distinction between a case where the minor is 19 years of age and where the minor is five years of age.” From a legal perspective, “both are under the identical disability so far as consent to an operation is concerned, and the parents or guardian have the same power to consent in each case.” If this reality leads to situations that are unjust, “then the remedy is with the legislature and not the courts.” At that time, there was not a single protest, riot or even op-ed written to criticize the decision, recalls author Audrey Farley. In doing so, the ruling lessened the burden of proof to demonstrate a woman’s unfitness for motherhood. Also, in denying that mayhem had been committed, the case might have affirmed individuals’ right to sexual pleasure. Prior to 1936, legal scholars had struggled to apply the definition of mayhem (the “unlawful and malicious removal of a member of a human being or the disabling or disfiguring thereof or rendering it useless”) in sterilization cases because they couldn’t pinpoint the primary purpose of the female sex organs. If the organs’ primary purpose was reproduction, these scholars reasoned, then a case of mayhem could indeed be made. However, if the organs’ primary purpose was gratification of sexual desires, then there was no case for mayhem. Which was it? The defense suggested that pleasure was a right of all women, but procreation is a privilege of the certain few that hurt Mexican Americans in California who were branded as reckless breeders. This meant that now more than ever, eugenicists needed to emphasize societal interests over individual ones. Rather than simply claiming that sterilization was protective or even curative, they needed to stress the impact to society when defective individuals reproduced.</span><br data-dcnode-id="2821"><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">Author Farley offers a fascinating discussion of medical ethics and legal responsibilities of the legislatures and judicial systems. This exposes the hypocrisy that existed 100 years ago when it was believed that upper class and wealthy have more rights with regards to reproduction because they have healthy hereditable characteristics. </span><br data-dcnode-id="2818"></span><span data-dcnode-id="2816" instrument_node="">

</span><span data-dcnode-id="2653" id="freeTextContainer10901664734939059308"><span data-dcnode-id="2657" instrument_node="">"The Unfit Heiress: The Tragic Life and Scandalous Sterilization of Ann Cooper Hewitt" is, at least for the first first half to two-thirds of its pages, an immersive and intriguingly written work of creative nonfiction that explores eugenics and women's reproductive rights framed by the then sordid court battle between heiress Ann Cooper Hewitt and her socialite mother. </span><br data-dcnode-id="2656"><br data-dcnode-id="2655"><span data-dcnode-id="2654" instrument_node="">It's only when "The Unfit Heiress" deviates from this framework, and it does so especially toward its anti-climactic chapters, </span></span><span data-dcnode-id="2652" instrument_node="">
</span><span data-dcnode-id="2617" id="freeText10901664734939059308" style="display:none"><span data-dcnode-id="2651" instrument_node="">"The Unfit Heiress: The Tragic Life and Scandalous Sterilization of Ann Cooper Hewitt" is, at least for the first first half to two-thirds of its pages, an immersive and intriguingly written work of creative nonfiction that explores eugenics and women's reproductive rights framed by the then sordid court battle between heiress Ann Cooper Hewitt and her socialite mother. </span><br data-dcnode-id="2650"><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">It's only when "The Unfit Heiress" deviates from this framework, and it does so especially toward its anti-climactic chapters, that it begins to falter as author Audrey Clare Farley's fact-finding can't replace early immersion into Hewitt's life and a retro-style of writing that fits perfectly within a story timed within the early 20th century and the early years of America's legalized journey into eugenics. </span><br data-dcnode-id="2647"><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">As noted, "The Unfit Heiress" is set at the turn of the 20th century, a time when Victorian values and traditional gender roles were giving way to women seeking passion and livelihood outside the home. Authorities, and society at large really, began to be alarmed at this development and the potential for "over-sexed" women to taint society by reproducing. Against this backdrop, socialite Maryon Cooper Hewitt had her "promiscuous" daughter Ann declared feebleminded and sterilized without her knowledge. </span><br data-dcnode-id="2644"><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">Many argued the choice was justified, though it would eventually be learned that she did so just shy of Ann's coming of age and reaching a point where she could potentially acquire millions of dollars left to her by her inventor father who had left her this money dependent upon her eventually bearing children. It was 1934 and Maryon had seen the California eugenics laws as a way to preserve her own inheritance while eugenicists saw it as a way to boost their already floundering movement. The court case that would eventually follow captivated the American public and media at the time. </span><br data-dcnode-id="2641"><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node="">For a good majority of "The Unfit Heiress," Farley captures this remarkable story with a mix of engaging writing, brilliant research, and a way of structuring story that weaves together elements of fact with her creative nonfiction storytelling. As an adult with a disability whose life has been at least modestly influenced by Indiana's own eugenics laws, I found myself most captivated by the exploration of eugenics laws and some of the key players at the time along with Farley's exploration of the attitudes of the time even from those whose very job it is to protect us. </span><br data-dcnode-id="2638"><br data-dcnode-id="2637"><span data-dcnode-id="2636" instrument_node="">It's worth noting that "The Unfit Heiress" is, in fact, about much more than Hewitt herself as Farley devotes at times entire chapters to other key players in the story including Hewitt's father, Maryon, key players within eugenics, and even other eugenics cases toward the end of the book that help to illustrate how the Hewitt case would eventually influence the future and eventual relative demise of eugenics as a movement. </span><br data-dcnode-id="2635"><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">Trust me, it's still alive just in different forms. </span><br data-dcnode-id="2632"><br data-dcnode-id="2631"><span data-dcnode-id="2630" instrument_node="">The court battle itself is portrayed rather quickly, though perhaps this is inevitable considering its rather anti-climactic facts and the almost surprisingly timid way in which it transpired. To her credit, Farley doesn't sugarcoat the story or try to turn Hewitt into something she wasn't. The simple truth here is that "The Unfit Heiress" risks coming off as sympathetic in telling its story because Hewitt wasn't exactly a crown jewel of humanity and one could say that she shared with her mother a decided lack of maternal instinct. I'd dare say that more than a few people will read "The Unfit Heiress" and decide that Hewitt experienced the right outcome. </span><br data-dcnode-id="2629"><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">Read deeper. </span><br data-dcnode-id="2626"><br data-dcnode-id="2625"><span data-dcnode-id="2624" instrument_node="">The closing chapters, largely centered around subsequent eugenics-tinged court cases, are intriguing yet lack the style of cohesion of the earlier chapters of "The Unfit Heiress" and while containing valuable material lead to a weird lack of resolution as the book winds down. It's a modestly disappointing end to an otherwise compelling literary journey. </span><br data-dcnode-id="2623"><br data-dcnode-id="2622"><span data-dcnode-id="2621" instrument_node="">If I could, I'd like go 3.5 stars here but I can't and I found myself engaged, educated, and even entertained by so much of "The Unfit Heiress" that I'm deferring upwards as I can easily recommend the book for those attracted to its story and subject matter. </span><br data-dcnode-id="2620"><br data-dcnode-id="2619"><span data-dcnode-id="2618" instrument_node="">"The Unfit Heiress" will be released by Grand Central Publishing in April 2021. </span></span><span data-dcnode-id="2616" instrument_node="">

</span><span data-dcnode-id="2538" id="freeTextContainer16774856761456303305"><span data-dcnode-id="2542" instrument_node="">3.5 stars and has included research. Sad tales all around upon sterilizations and in this particular case done on a woman without her own knowledge that it will occur. She thought she was having her appendix removed. </span><br data-dcnode-id="2541"><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">I couldn't round it up because of what was NOT included in this book. And that is the wide spread of other eugenics theory and practice at the times of these centuries. It includes several, maybe all, that back one slanted (IMHO) theory (2020/21 era perceptions)to the role eugenics </span></span><span data-dcnode-id="2537" instrument_node="">
</span><span data-dcnode-id="2526" id="freeText16774856761456303305" style="display:none"><span data-dcnode-id="2536" instrument_node="">3.5 stars and has included research. Sad tales all around upon sterilizations and in this particular case done on a woman without her own knowledge that it will occur. She thought she was having her appendix removed. </span><br data-dcnode-id="2535"><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">I couldn't round it up because of what was NOT included in this book. And that is the wide spread of other eugenics theory and practice at the times of these centuries. It includes several, maybe all, that back one slanted (IMHO) theory (2020/21 era perceptions)to the role eugenics played without giving you the wider medical practice states and picture of the reality of those times. Also it rather conflates the issue to bad/bad in one sense and "not so bad" in the others as to birth control and abortion. Which mostly arising from eugenics enthusiasts and movements such as Sanger led. And how that plays out now with the racial balance of aborted babies in 2021 so skewed too. That reality of data is very relevant to this topic. Essentially so.</span><br data-dcnode-id="2532"><br data-dcnode-id="2531"><span data-dcnode-id="2530" instrument_node="">What about how /why/ for most entire medical practices of all kinds- were doctors given authority to operate? I believe in this guise you need to relate that wider context. Doctors had far more leeway in all kinds of life altering treatments then, not just on the OB/GYN. All practice pressured or performed at these times is assumed by the author to be race or class based or for convenience of the family person in power (like that gold digger mother). It wasn't. And even in my own lifetime it was common practice not to tell a patient the most dire news they could hear. So many, many scenarios played out in treatments and in placements that were NOT of the patient choice or knowledge. Most cancer deaths I knew before I was 40 years old myself- those people were never told they had cancer.</span><br data-dcnode-id="2529"><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node="">Mental illness operations and "cures" etc. etc. Yes, eugenics also focused on going "toward" a better supposed future, but it also was done with supposedly empathetic and supportive "feeling" proponents. This doesn't give enough sense and nuance to how the "help" so guised in glory, like Sanger and other "liberators" really were not so compassionate at all. </span></span><span data-dcnode-id="2525" instrument_node="">

</span><span data-dcnode-id="2382" id="freeTextContainer15101387998305513553"><span data-dcnode-id="2386" instrument_node=""> There are moments in your life where you hear something and simply can't believe it's true. For me, that is usually related to women's issues. Today's topic of 'Please No' is: forced sterilization. I know, hardly the happiest of topics and yet so important to read about, think about, and die mad about. Thanks to Grand Central Publishing and NetGalley for providing me with a copy of this book in exchange for an honest review.</span><br data-dcnode-id="2385"><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">The Eugenics movement is at the root of a lot of the evil we've seen in</span></span><span data-dcnode-id="2381" instrument_node="">
</span><span data-dcnode-id="2362" id="freeText15101387998305513553" style="display:none"><span data-dcnode-id="2380" instrument_node=""> There are moments in your life where you hear something and simply can't believe it's true. For me, that is usually related to women's issues. Today's topic of 'Please No' is: forced sterilization. I know, hardly the happiest of topics and yet so important to read about, think about, and die mad about. Thanks to Grand Central Publishing and NetGalley for providing me with a copy of this book in exchange for an honest review.</span><br data-dcnode-id="2379"><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">The Eugenics movement is at the root of a lot of the evil we've seen in the last and the current century. At its most basic, the Eugenics movement advocates for the improvement of the human race by eliminating "unwanted" hereditary traits. Although the argues mission behind this is to eliminate human suffering, it (almost) always turns out racist, ableist and sexist. Eugenics meant encouraging desirables to breed and "dissuade" undesirables from the same. The Eugenics movement in the US was a big inspiration for the Nazis in Germany and informed their attacks on Jewish people and the mentally handicapped. These attacks often took the form of forced sterilization and this is something we still see. We see this thought pattern appear in many things we might consider everyday. Looking into the history of the SATs, for example, shows how deeply rooted their creation was in Eugenic and racist thought. Farley does her best to cover these historic aspects in The Unfit Heiress, shining a light not just on Ann Cooper Hewitt's story, but also the story of the people who most often fall victim to forced sterilization: women of colour.</span><br data-dcnode-id="2376"><br data-dcnode-id="2375"><span data-dcnode-id="2374" instrument_node="">Ann Cooper Hewitt was a young heiress and her mother thought her promiscuous and had her declared feebleminded. When she went to the hospital for what she was told was appendicitis, she came out sterilized. Farley starts The Unfit Heiress with what comes next, Ann's press conference and the beginning of her lawsuit against her mother and the accompanying doctors who sterilized her. From here, Farley unravels the stories of Ann and her mother, Maryon, while also covering the lives and stories of the people around them. We get an insight into the way America's view of young women evolved. We get an idea of the mindset of the cultural elites. We come to understand, slowly but surely, the amount of crimes that have been committed agains women's bodies, especially the bodies of women of colour. As Farley details the later life of Ann, we come to understand she was a traumatized woman, but also a wealthy, white woman. From here, the narrative moves away from Ann which I understood. While Ann's story is important, it is also a gateway to other people's stories who have been kept quiet. For some readers this may fall flat, as the first half of the book is a great biographic effort. But for me, I felt that The Unfit Heiress really hit its stride once it began addressing the current struggles women still face when it comes to controlling their own bodies.</span><br data-dcnode-id="2373"><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">Audrey Clare Farley is a great writer. In The Unfit Heiress she combines biographic detail with detailed research, adding in touches of fictional story telling to elevate the emotions and themes she is working with. It is a brilliant combination and the fact that it works is really all due to Farley. I found myself very engaged with Ann and her story, moving between pity and abhorrence at what is happening to her. I was glad, however, as I mentioned above, that Farley threw her net wider and looked beyond just Ann. These last few chapters might not fit as cohesively to the rest of the narrative but they are crucial to contextualizing the issue and making readers realize this isn't something we left behind at the turn of the century. Many of these antiquated attitudes continue to exist and Eugenicist thought leaders remain behind many current movements, so it is important we keep being reminded about them. I will definitely be keeping an eye out for other books by Farley as I loved her writing style and her approach to this difficult topic.</span><br data-dcnode-id="2370"><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">The Unfit Heiress was a fascinating read, a book that gripped me almost from the very start. With comprehensive research, Farley presents not just Ann's story but also the story of many other women who were forcibly sterilized. </span><br data-dcnode-id="2367"><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">URL: </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//universeinwords.blogspot.com/2021/04/review-unfit-heiress-tragic-life-and.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2364" instrument_node="">https://universeinwords.blogspot.com/...</span></a></span><span data-dcnode-id="2361" instrument_node="">

</span><span data-dcnode-id="2277" id="freeText43968672880898002" style="display:none"><span data-dcnode-id="2284" instrument_node="">If you think eugenics are a thing of the past, this book will horrify you in how wrong you are. Meticulously researched, compellingly written, Audrey Clare Farley tells the tragic story of Ann Cooper Hewitt's involuntary sterilization. Ann Cooper Hewitt and her mother, Maryon, were like the Kardashians of the 20s and 30s, and Maryon scheming to sterilize her daughter in order to secure an inheritance shocked the nation. The court cases that followed became not just a verdict on Ann's medical abuse but the justification of eugenics more broadly. </span><br data-dcnode-id="2283"><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">Farley weaves in the story of the larger eugenics movement (including how Hitler's eugenic plan was based on California's eugenic programs!). While Ann's treatment by her mother, by the courts and doctors, and the press was heartbreaking, what actually kept me up at night was Farley's superb work showing how Ann's case continues to be used to justify the forced sterilization of women deemed unfit to be mothers (Latinx women, women inmates, disabled women, poor women, Indigenous women, and more). This is still happening today! </span><br data-dcnode-id="2280"><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">I usually don't read nonfiction outside of work, but I know Audrey and I'm interested in the topic, so I decided to give this book a try. The storytelling and the fullness of the people profiled hooked me instantly, and I'm hoping to assign this book in my future classes on gender and disability.</span></span><span data-dcnode-id="2276" instrument_node="">

</span><span data-dcnode-id="1660" id="freeText4420438045060074553" style="display:none"><span data-dcnode-id="1661" instrument_node="">This book was a bit of a mess of organization, I think. It jumped back and forth in Ann’s life and her mother’s and then her father’s and then back to Ann and it became a confusing jumble that could have been presented more linearly and not lost anything. Also, this book was more about reproductive rights and sterilization than it let on. The last part of the book focused more on the changes in the reproductive rights movement and tried (weakly) to tie it back to Ann’s court case. Of course, I do not want to detract from the importance of this story. Ann was subjected to a horrible procedure that changed her life completely without her consent. So did the hundreds of thousands of women of color throughout this time period. It was utterly horrifying to read about how deeply insidious the eugenics movement was in American history and catastrophically impinged on the lives and rights of people of color in the country. One thing that stuck out to me was how some doctors would obtain “consent” for sterilization from Spanish-speaking patients by simply asking “más niños? (More children?) and waiting for the patient to say no so that they could perform what they often misrepresented as a reversible procedure. Anyway, this history is extremely important and ended up playing a large part of this book even though it wasn’t necessarily billed as such. So, while the book was a bit of an organized mess, I appreciated the thorough introduction to this terrifying part of American history that, as the end of the book showed, isn’t entirely in the past just yet either.</span></span><span data-dcnode-id="1659" instrument_node="">

</span><span data-dcnode-id="1413" id="freeTextContainer14080613924240199174"><i data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">I received a copy of this book from the publisher in exchange for an honest review.</span></i><br data-dcnode-id="1431"><br data-dcnode-id="1430"><img class="gr-hostedUserImg" data-dcnode-id="1429" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1625916596i/31614983._SY540_.jpg&amp;raw"><br data-dcnode-id="1428"><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node="">The Unfit Heiress by Audrey Clare Farley paired perfectly with Million Dollar Ravioli Casserole from Plain Chicken</span><br data-dcnode-id="1425"><br data-dcnode-id="1424"><br data-dcnode-id="1423"><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">Are you pissed about Britney not having reproductive freedom? </span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">Are you pissed that her parent is controlling that aspect of her life in order to continually profit?</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">Then you need to meet Ann Cooper Hewitt and her mother Maryon. </span><br data-dcnode-id="1416"><br data-dcnode-id="1415"><span data-dcnode-id="1414" instrument_node="">As you can see from the summary above, there are some striking similarities. </span></span><span data-dcnode-id="1412" instrument_node="">
</span><span data-dcnode-id="1370" id="freeText14080613924240199174" style="display:none"><i data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">I received a copy of this book from the publisher in exchange for an honest review.</span></i><br data-dcnode-id="1409"><br data-dcnode-id="1408"><img class="gr-hostedUserImg" data-dcnode-id="1407" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1625916596i/31614983._SY540_.jpg&amp;raw"><br data-dcnode-id="1406"><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">The Unfit Heiress by Audrey Clare Farley paired perfectly with Million Dollar Ravioli Casserole from Plain Chicken</span><br data-dcnode-id="1403"><br data-dcnode-id="1402"><br data-dcnode-id="1401"><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">Are you pissed about Britney not having reproductive freedom? </span><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">Are you pissed that her parent is controlling that aspect of her life in order to continually profit?</span><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">Then you need to meet Ann Cooper Hewitt and her mother Maryon. </span><br data-dcnode-id="1394"><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">As you can see from the summary above, there are some striking similarities. In addition to learning the continually scandalous details of these women's lives (Maryon's much more so than her daughter's,) I also learned so much about the shocking history of American eugenics. I think #1 for me was that California's sterilization practices were held as models for the Nazi regime. Here are a few more statistics and points of note (there are so many that I could go on and on, but I feel like these really show a timeline.) It is estimated that over 60,000 people (most of them women) were sterilized against their will following the 1927 Buck v Bell Supreme Court ruling (a legal precedent allowing states to sterilize inmates of public institutions.) Between 1997 and 2010 more than 1,400 women were sterilized in California prisons and as recent as last year, unnecessary hysterectomies were being performed on immigrants in custody at an ICE detention center in Georgia.</span><br data-dcnode-id="1391"><br data-dcnode-id="1390"><span data-dcnode-id="1389" instrument_node="">This is one of the best nonfiction books I've read this year and is now at the top of my all-time best list, too. A necessary read for anyone interested in reproductive freedoms and/or 1930's American tabloid backstories. </span><br data-dcnode-id="1388"><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node="">**note: while this book did not delve into the full scope of those affected by forcible/coerced sterilizations, it is important to note that Latina, Black, and Native American women have been disproportionately affected. </span><br data-dcnode-id="1385"><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">Come chat with me about books here, too: </span><br data-dcnode-id="1382"><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ivoryowlreviews.blogspot.com/" rel="nofollow noopener"><span data-dcnode-id="1381" instrument_node="">Blog</span></a><span data-dcnode-id="1379" instrument_node=""> | </span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/writerrhiannon/" rel="nofollow noopener"><span data-dcnode-id="1378" instrument_node=""> Instagram</span></a><span data-dcnode-id="1376" instrument_node=""> | </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/IvoryOwlReviews" rel="nofollow noopener"><span data-dcnode-id="1375" instrument_node=""> Twitter</span></a><s </span><span data-dcnode-id="1153" id="freeText16220569600829512643" style="display:none"><span data-dcnode-id="1169" instrument_node="">If you want to read a nonfiction book that will have you wanting to throw the book or your phone when you listen to an audiobook, please pick this one up. I personally picked this one up after a friend mentioned it to me after we discussed what exactly is going on with Britney Spears (Free Britney btw).</span><br data-dcnode-id="1168"><br data-dcnode-id="1167"><span data-dcnode-id="1166" instrument_node="">This was extremely frustrating in the sense that once again, I am learning historical information about the United States from a book. Facts that will probably never be taught in school. Who know President Harding was a proponent of eugenics and sterilization? I sure didn't - take him off your list of favorite presidents (I sure hope he wasn't but take him off). </span><br data-dcnode-id="1165"><br data-dcnode-id="1164"><span data-dcnode-id="1163" instrument_node="">This tragic story follows Ann Cooper Hewitt and her fight against her mother in court after her mother has her sterilized right before Ann turns 21 plus the history of the Cooper Hewitt family and Ann's mother's dalliances (of which there are many).</span><br data-dcnode-id="1162"><br data-dcnode-id="1161"><span data-dcnode-id="1160" instrument_node="">We also got information on the history of eugenics and sterilization in both the United States and Europe (including who exactly did Hitler and the Nazis get inspiration from for their disgusting and deplorable eugenics).</span><br data-dcnode-id="1159"><br data-dcnode-id="1158"><span data-dcnode-id="1157" instrument_node="">I’m giving this 4 out of 5 stars because I feel like some of the chapters could’ve been put in a different order in order for this to flow better.</span><br data-dcnode-id="1156"><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">Definitely recommend!</span></span><span data-dcnode-id="1152" instrument_node="">

</span><span data-dcnode-id="1074" id="freeText2368938522031307688" style="display:none"><span data-dcnode-id="1075" instrument_node="">Historian Audrey Clare Farley's book about Ann Cooper Hewitt is comprehensive and well written. Hewitt's life was unfortunately during the time before women had rights over their own bodies, and also at a time when, at the smallest of defiant gestures or shows of moving toward independence, women were labeled as something deviant. In 1936, Ann Cooper Hewitt, only 22 years old, sued her mother in court for having her sterilized. Physicians had removed Ann's fallopian tubes during an appendectomy, rendering her unable to bear children. The disputed part of the case was the reason why: her mother claimed Ann was oversexed and mentally challenged but Ann and her supporters claimed Ann's mother's real reason was that Ann's fortune reverted to her mother if Ann did not have children. A fascinating real life story that deals with morality, ethics, the eugenics movement, and civil rights. I recommend it.</span></span><span data-dcnode-id="1073" instrument_node="">
