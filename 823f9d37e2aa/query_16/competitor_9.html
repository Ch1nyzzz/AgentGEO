</span><span data-dcnode-id="3668" id="freeText11734422024758209093" style="display:none"><span data-dcnode-id="3675" instrument_node="">Stories about the Ideal Maternity Home in East Chester, Nova Scotia have been the subject of public trials and private whisperings for half a century. Now, after three years of research and scores of interviews from coast to coast, author Bette Cahill reveals the truth about the Home, its owners, the babies who were born there, and those who died there.</span><br data-dcnode-id="3674"><br data-dcnode-id="3673"><span data-dcnode-id="3672" instrument_node="">It is a truth that will horrify and enrage, for in these pages Cahill charges that the children of unwed mothers born in the Ideal Maternity Home were offered for adoption in a manner that amounted to little more than baby farming for profit. We also learn that most of the natural parents had no knowledge of these practices. The babies placed in new homes were the lucky ones. Was the high infant mortality rate at the Home coincidence, neglect, accident, or economics?</span><br data-dcnode-id="3671"><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node="">Butterbox Babies is a story of greed, hypocrisy, and justice. It is also the moving story of children who survived the Ideal Maternity Home and their search for a past. Bette Cahill traces their lives today as their search leads them from disappointment to rejection and in some cases the joy of reunion with the parents they never knew.</span></span><span data-dcnode-id="3667" instrument_node="">

</span><span data-dcnode-id="3077" id="freeText14309514359041977317" style="display:none"><span data-dcnode-id="3080" instrument_node="">As an adoptive parent in Canada, albeit Ontario versus Nova Scotia, I found this book very informative. Given the opportunist abuses that occurred in Nova </span><br data-dcnode-id="3079"><span data-dcnode-id="3078" instrument_node="">Scotia's ironically named " Ideal" Maternity Home, this book reinforces the need for governmental controls related to adoption. The process for adopting a child is indeed an invasive, emotional and lengthy one. However, this book makes it abundantly clear to readers and prospective adoptive parents that the children's interests must always be paramount, justifying the "process". The used copy of this book that I bought in Orillia, Ontario includes handwritten notes in the pages that tell the story of Kate Davidson and Sharon Lehmann in Chapter 20. Sharon's name is underlined 3x, as is the reference to "Timberlea, N.S." and "barn fire". The name "Eldred" is penned in. I don't know if this is meaningful to anyone looking for lost relatives but thought I would share just in case. </span></span><span data-dcnode-id="3076" instrument_node="">

</span><span data-dcnode-id="2995" id="freeText17922198983364345792" style="display:none"><span data-dcnode-id="2999" instrument_node="">Excellent in-depth, detailed research job presenting an important and fascinating history. I learned a lot reading this book, about a place and time, a specific (and particularly bad) example of a "home for unwed mothers," and a particular phenomena (women shamed and bullied into having and giving up their babies, paying fortunes to do so, all to sell babies to other desperate families). Also presents really interesting context on social work in Nova Scotia, and the wild west of adoption (non)regulation up to the 40s or so. </span><br data-dcnode-id="2998"><br data-dcnode-id="2997"><span data-dcnode-id="2996" instrument_node="">It would have also been really interesting to provide more contextual analysis--why so many women were driven by shame in that era, how it has changed and what hasn't, what the implications are today. I was surprised how rarely abortion is mentioned in the book. Also that the later, echoing phenomenon of the sixties scoop wasn't mentioned at all. </span></span><span data-dcnode-id="2994" instrument_node="">

</span><span data-dcnode-id="2664" id="freeTextContainer13474548373954778908"><span data-dcnode-id="2667" instrument_node="">This is a tough one. I put off reading this until I noticed wanted it and decided to read it so I could send it to her. I've read some great books at perfect times to send to friends. It always seems to work out.</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">I'll start with something seemingly unimportant - the title. Why do authors, especially true crime authors, feel the need to disrespect the victims, usually babies, with these horrid titles? If my son or daughter had been the victim of these monsters I wouldn't want him or her called a "</span></span><span data-dcnode-id="2663" instrument_node="">
</span><span data-dcnode-id="2629" id="freeText13474548373954778908" style="display:none"><span data-dcnode-id="2662" instrument_node="">This is a tough one. I put off reading this until I noticed wanted it and decided to read it so I could send it to her. I've read some great books at perfect times to send to friends. It always seems to work out.</span><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">I'll start with something seemingly unimportant - the title. Why do authors, especially true crime authors, feel the need to disrespect the victims, usually babies, with these horrid titles? If my son or daughter had been the victim of these monsters I wouldn't want him or her called a "butterbox baby" due to a detail from the crime. This has bothered me with more than a few t.c.'s, most recently </span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/61158.Diane_Fanning" rel="nofollow noopener" title="Diane Fanning"><span data-dcnode-id="2659" instrument_node="">Diane Fanning</span></a><span data-dcnode-id="2657" instrument_node="">'s book on Caylee Anthony which blares out the most horrible title imaginable, </span><a data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/7815268.Mommy_s_Little_Girl" rel="nofollow noopener" title="Mommy's Little Girl by Diane Fanning"><span data-dcnode-id="2656" instrument_node="">Mommy's Little Girl</span></a><span data-dcnode-id="2654" instrument_node="">. If that's not enough to make you sick I don't know what is.</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">Beyond that though, the story is really written a lot better than I thought. For some unknown reason I expected a sort of journalistic approach to the facts and details and it didn't read like that at all. There are some photos included so we get to see the two monsters who thought this scheme up and set out to make it work for two decades.</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">It's really hard to read how useless the authorities in Nova Scotia were at this time. They were thwarted in every single way whenever they tried to help. That's not to say they always tried to help - some were more concerned with their political careers (the Young's had a lot of in-town support from citizens because of the money they put into the stores) and some just looked the other way.</span><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">It's hard to understand how anyone who worked there was able to do so without killing themselves. Then I try to remember this was a very different time. And then again I remember that it wasn't so different in some ways. Some of the people who </span><i data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">did</span></i><span data-dcnode-id="2645" instrument_node=""> work there ran out and never came back after seeing certain things. So why didn't the others? Why were some able to deal with these babies being starved and neglected? How can someone take a box with a baby in it and bury it in a hole in a field? How does one go about that exactly?</span><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node="">One of Lila and William Young's daughters made some statements near the end of the book that really upset me. I should probably note my feelings on family in general real fast. I love my family. I will back my family in whatever they do and always be there for them regardless. </span><i data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">If they act like family.</span></i><span data-dcnode-id="2640" instrument_node=""> I have, at this moment in time, two cousins and one aunt that I don't so much as claim as blood to me. They're disgusting, useless human beings. The blood running through our veins means nothing when the person doesn't act like family. IMO. I'm not the sort of person that will dismiss a persons actions because "they're family". You only get that respect if you continue to earn it.</span><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">So I have a hard time with Joy, a daughter of theirs, says how upset it made her to have her mother's grave shown on the news on t.v. (This was in relation to the entire story - the news story on the home.) Joy said this was "disturbing her rest". That's some ballsy shit right there. How about the hundreds upon hundreds of tiny little babies who have gotten no "rest" because of </span><i data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">her</span></i><span data-dcnode-id="2635" instrument_node=""> mother? Do they count? Nope. They're not </span><i data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">family</span></i><span data-dcnode-id="2632" instrument_node="">.</span><br data-dcnode-id="2631"><span data-dcnode-id="2630" instrument_node="">She mentions worrying about how long her own children will have to deal with this. I can understand that fully. It would be a serious concern of mine as well. But she never mentions the mothers who had their babies stolen or killed. The babies who grew to be adults and couldn't even find the most simple medical information because of her mother's lack of record keeping which was in effort to hide her actions from the authorities. It's all me, me, me, us, us, us. Screw all of you who had things happen to them no human being should ever have to deal with. IMO Joy is one a quarter of a step up from her parents. One little sliver and she's just as disgusting in my mind. It breaks my heart that women is raising/has raised children. Imagine that being your mother. That being your grandmother. That being your grandfather. I shudder to think about it.</span></span><span data-dcnode-id="2628" instrument_node="">

</span><span data-dcnode-id="2532" id="freeText8212572542344702769" style="display:none"><span data-dcnode-id="2536" instrument_node="">Butterbox Babies is a story about the Ideal Maternity Home in Nova Scotia, Canada and its owners Lila and William Young from around 1925 to 1945. Initially this home was a place pregnant unwed mothers and sometimes married women whose husband was away, could go to to have their babies in total secrecy. As the cost for going to this place was high many women had to work off their debt. Many babies died and were buried in unmarked mass graves in butterboxes or other small wooden crates. Many babies were adopted out illegally.</span><br data-dcnode-id="2535"><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">This story is about the Young's greed and the justice that prevailed. There were also stories of adopted children who searched for their roots with some having happy reunions with parents they never knew and others in great disappointment. Its an interesting story of baby farming for profit. </span></span><span data-dcnode-id="2531" instrument_node="">

</span><span data-dcnode-id="2453" id="freeTextContainer2560479367905470326"><span data-dcnode-id="2457" instrument_node="">A tragic tale, very, very sad. It is outrageous how people can be so focused on monetary gain as to disregard mother-baby bonding and sell babies for profit. Next to this, the fraud charges that Lila and William Young faced pale in comparison. The fact that so many babies remained lost without a paper trail and that so many people (the few still alive) are still looking for answers is truly heartbreaking.</span><br data-dcnode-id="2456"><br data-dcnode-id="2455"><span data-dcnode-id="2454" instrument_node="">I realize it must be hard to write a book like this, keeping only to the facts (and rumors) </span></span><span data-dcnode-id="2452" instrument_node="">
