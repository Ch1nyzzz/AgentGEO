</span><span data-dcnode-id="4272" id="freeText10690681546540027075" style="display:none"><span data-dcnode-id="4281" instrument_node="">The biography of Jane Digby, an ‘enthralling tale of a nineteenth-century beauty whose heart – and hormones – ruled her head.’ Harpers and Queen</span><br data-dcnode-id="4280"><br data-dcnode-id="4279"><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">A celebrated aristocratic beauty, Jane Digby married Lord Ellenborough at seventeen. Their divorce a few years later was one of England s most scandalous at that time. In her quest for passionate fulfilment she had lovers which included an Austrian prince, King Ludvig I of Bavaria, and a Greek count whose infidelities drove her to the Orient. In Syria, she found the love of her life, a Bedouin nobleman, Sheikh Medjuel el Mezrab who was twenty years her junior.</span><br data-dcnode-id="4276"><br data-dcnode-id="4275"><br data-dcnode-id="4274"><span data-dcnode-id="4273" instrument_node="">Bestselling biographer Mary Lovell has produced from Jane Digby’s diaries not only a sympathetic and dramatic portrait of a rare woman, but a fascinating glimpse into the centuries-old Bedouin tradition that is now almost lost.</span></span><span data-dcnode-id="4271" instrument_node="">

</span><div class="uitext greyText bookshelves" data-dcnode-id="3680"><span data-dcnode-id="3690" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/1424908-map%3Fshelf%3Dnon-fiction"><span data-dcnode-id="3689" instrument_node="">non-fiction</span></a><span data-dcnode-id="3687" instrument_node="">,

</span><span class="readable" data-dcnode-id="3647" id="reviewTextContainer174185324"><span data-dcnode-id="3675" instrument_node="">
</span><span data-dcnode-id="3670" id="freeTextContainer14448968465292930891"><span data-dcnode-id="3674" instrument_node="">IT'S FINALLY OVER! This book should be outlawed by the Geneva Convention as a torture device. Geez. Where to begin?</span><br data-dcnode-id="3673"><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">The subject: Jane Digby is presented by the author and by others as a feminist icon - a woman who was sexually free, an adventurer, and open to new experiences and ideas that most women in her age wouldn't even dream of. The problem with that is it's all a complete lie. Yes, Jane Digby had sex. With a lot of men. But here's the pattern of the first 40 years of her life: Find a man t</span></span><span data-dcnode-id="3669" instrument_node="">
</span><span data-dcnode-id="3652" id="freeText14448968465292930891" style="display:none"><span data-dcnode-id="3668" instrument_node="">IT'S FINALLY OVER! This book should be outlawed by the Geneva Convention as a torture device. Geez. Where to begin?</span><br data-dcnode-id="3667"><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node="">The subject: Jane Digby is presented by the author and by others as a feminist icon - a woman who was sexually free, an adventurer, and open to new experiences and ideas that most women in her age wouldn't even dream of. The problem with that is it's all a complete lie. Yes, Jane Digby had sex. With a lot of men. But here's the pattern of the first 40 years of her life: Find a man that adores her. They have wild passionate romance and sex. They probably have a kid. Their passion (or his passion) dulls. She feels lonely. She finds someone new. They have wild passionate romance and sex. They probably have a kid. Man #1 says "hey, wait a minute!" so she packs up and leaves, happily abandoning her marriage/romance, child, country, religion, name, home, whatever she can think of, to be with man #2. Eventually man #2's passion fades, and so on about 14 times. I don't know about you, but a woman who is so desperately needy to be with a man that loves her that she literally abandons EVERYTHING to be with him -- and that she does this SEVERAL TIMES throughout her twenties and thirties, is NOT my feminist hero. She's the high school girl I watched flinging herself at the cars of ex-boyfriends, sobbing and begging them to take her back, and went "Ugh."</span><br data-dcnode-id="3664"><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">Jane does eventually make her way to the middle east, where she marries Sheikh Medjuel, a man 20 years younger than her. Despite the fact that she now lives the freaking desert with a Bedouin tribe, this does not make the book more interesting (more on that below). The one honorable, courageous thing we see Jane do during these years is help people affected by a massacre in Damascus...EXCEPT we have no information on this first hand from Jane (Jane kept extensive and painfully boring diaries, all of which are quoted liberally in this book). All we know are rumors that reached one of her ex-husbands. Except the author already showed us earlier in the book that many of the rumors he heard weren't remotely founded in truth. Therefore, although the author does not take Jane's heroic acts with a grain of salt, I do.</span><br data-dcnode-id="3661"><br data-dcnode-id="3660"><span data-dcnode-id="3659" instrument_node="">The writing: Even with a completely unsympathetic heroine, I'm sure that with all the things Jane went through, this still could have been an exciting book. Too bad it wasn't. Even when we hit Damascus and she's married to a man who goes on MONTHS LONG DESERT RAID BATTLES WITH OTHER TRIBES it's boring boring boring. The author sees no reason to follow anyone who's not Jane, even for a paragraph, and Jane spends most of her time not out in the desert with her husband but in a house in Damascus. So while her husband is off doing awesome, romance-hero shit, we're stuck listening to Jane complain about the housekeeper. When we do hear about his stuff, it's usually in quotes from Jane's diaries, who writes about them like business transactions and squabbles. And while I'm sure that ultimately that's what they were her husband is MAKING WAR AND RAIDING OTHER TRIBES IN 140 DEGREE WEATHER OMG and do we get to have fun? No. The author does a similar thing when discussing the Turkish harems -- Jane is apparently one of the only European women in the 19th century to have a real understanding of these harems, but do we get to hear anything about what these Turkish harems are like? No. All we hear about is how Jane pitied them, and thought they were sexual slaves, and would listen to the girls' worries sometimes. I DON'T WANT JANE'S OPINION, I WANT TO KNOW ABOUT HAREMS. </span><br data-dcnode-id="3658"><br data-dcnode-id="3657"><span data-dcnode-id="3656" instrument_node="">Basically, the first half of Jane Digby's life was spent hurling herself at whatever man would have her next, and then abandoning everything to hurl herself at the next one, and the second half of her life was spent living something right out of The Sheik, if the heroine in The Sheik had spent most of her time in a comfy house in Damascus ordering around gardeners, arranging dinners, and bickering with her housekeeper.</span><br data-dcnode-id="3655"><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">Booooooooooo.</span></span><span data-dcnode-id="3651" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3574" title="really liked it"><span class="staticStar p10" data-dcnode-id="3579" size="15x15"><span data-dcnode-id="3580" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="3578" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3577" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3576" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3575" size="15x15"></span></span><span data-dcnode-id="3573" instrument_node="">

</span><span data-dcnode-id="3561" id="freeTextContainer13305946363180001099"><span data-dcnode-id="3568" instrument_node="">This is one of those books where I have to give the biographers a good rating for writing a competent biography, but wish I could give her subject two stars for a poorly conducted life.</span><br data-dcnode-id="3567"><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">As other reviewers here have noted Jane Digby was anything but a feminist role model. I have rarely read of someone whose entire life was so dominated by sexual desire and who was as willing to sacrifice anyone who stood in the way of its gratification.</span><br data-dcnode-id="3564"><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">Though Lovell quotes others as saying the Digby was intelligen</span></span><span data-dcnode-id="3560" instrument_node="">
</span><span data-dcnode-id="3543" id="freeText13305946363180001099" style="display:none"><span data-dcnode-id="3559" instrument_node="">This is one of those books where I have to give the biographers a good rating for writing a competent biography, but wish I could give her subject two stars for a poorly conducted life.</span><br data-dcnode-id="3558"><br data-dcnode-id="3557"><span data-dcnode-id="3556" instrument_node="">As other reviewers here have noted Jane Digby was anything but a feminist role model. I have rarely read of someone whose entire life was so dominated by sexual desire and who was as willing to sacrifice anyone who stood in the way of its gratification.</span><br data-dcnode-id="3555"><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">Though Lovell quotes others as saying the Digby was intelligent and charming, this doesn't come across in any of her diary entries or letters, which are paraphrased throughout the biography and give the narrative of its second half a telltale overwrought Victorian tone. Instead Digby comes across as a spoiled, rich woman whose emotional life had never moved past the stage most of us grow out of by the age of 16. She falls in love with man after man, apparently learning nothing from the painful rejections that follow. They follow so consistently, one assumes that once men got over the thrill of boinking A Beauty, she didn't have much else going for her that would keep them around. If she was half as selfish as she comes across one can understand the objects of her obsessions' characteristic flight. </span><br data-dcnode-id="3552"><br data-dcnode-id="3551"><span data-dcnode-id="3550" instrument_node="">Because the way she treated other people was appalling. She abandoned the children her neglect didn't kill, and showed zero interest in them as they grew up, allowing one daughter to grow up not even knowing who her mother was. She married a man she didn't love and abandoned him and their joint children without a backward look and save for an occasional letter had no contact with those children, one of whom became severely mentally ill. </span><br data-dcnode-id="3549"><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">She encouraged the Bedouin love of her life to divorce the mother of his two children and another wife later and rejoiced when hearing of his other wives' deaths. Her sexuality rather than appearing liberated comes across as pathological. I wonder if her relationship, with the Bedouin Medjuel, lasted as long as it did because neither partner could look behind the stereotypical roles they were playing and because the language barrier probably kept them from understanding each other all that well. </span><br data-dcnode-id="3546"><br data-dcnode-id="3545"><span data-dcnode-id="3544" instrument_node="">I'm always interested in stories of women who have successful long-term relationships with men much younger than themselves, having done just that myself for many years. But I came away unimpressed with this relationship which, reading between the lines appears to have been largely a fantasy on Digby's part that ignored the reality that her husband spent much of the year off in distant places without her and most likely with other wives that she was kept, most of the time, from knowing about. Her wealth attracted men who exploited her as she grew older, and though we mostly see her marriage to Medjuel through her diary entries, which paint him as Mr. Perfect to a cloying and unbelievable extent, one suspects that Jane created a pleasing fantasy of love for herself as she aged past menopause and the fires cooled, which was much easier to maintain without the frequent presence of her husband. </span></span><span data-dcnode-id="3542" instrument_node="">

</span><span data-dcnode-id="3455" id="freeTextContainer10577278409333211698"><span data-dcnode-id="3459" instrument_node="">This was recommended to me, and I am SOOOO glad it was. </span><br data-dcnode-id="3458"><br data-dcnode-id="3457"><span data-dcnode-id="3456" instrument_node="">One of the things that I find difficult to take as an author is when a reviewer tells me that what I've written for a 19th Century heroine is unbelievable. What Jane Digby did in her real lifetime makes my heroines seem incredibly tame by comparison, and I'm never going to feel like I've stretched the boundaries again. Married at 17, divorced at 22, she included several noblement, a king, a prince, a Greek bandit and most notable a Bedouin </span></span><span data-dcnode-id="3454" instrument_node="">
</span><span data-dcnode-id="3446" id="freeText10577278409333211698" style="display:none"><span data-dcnode-id="3453" instrument_node="">This was recommended to me, and I am SOOOO glad it was. </span><br data-dcnode-id="3452"><br data-dcnode-id="3451"><span data-dcnode-id="3450" instrument_node="">One of the things that I find difficult to take as an author is when a reviewer tells me that what I've written for a 19th Century heroine is unbelievable. What Jane Digby did in her real lifetime makes my heroines seem incredibly tame by comparison, and I'm never going to feel like I've stretched the boundaries again. Married at 17, divorced at 22, she included several noblement, a king, a prince, a Greek bandit and most notable a Bedouin sheikh in her list of lovers and husbands. In an age where gently-born women by and large lived in the shadow of their fathers or husbands, Jane was fiercely independent, spoke at least 6 languages fluently, designed and built homes in Germany, Greece and Syria, travelled into the wilds of the desert and lived a determinedly 'alternative' life, yet for those who knew her intimately, she was charming, intelligent and unassuming. </span><br data-dcnode-id="3449"><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">Mary Lovell writes beautifully, and her research is obviously thorough, though she doesn't overwhelm you with it. She doesn't make a saint of her subject, which I appreciated, because there were times when I did begin to think that Jane must have been a bit of a diva, but she does paint a very well-rounded picture. She informes and guides but doesn't beat you up with her opinions either, and is happy to put alternative interpretations on some of the more dubious and less well-documented aspects of the life she is writing. I have never come across such a very colourful character, I've been inspired to write another sheikh story myself now, and I will definitely be looking for more of Ms Lovell's biographies. </span></span><span data-dcnode-id="3445" instrument_node="">

</span><span data-dcnode-id="3248" id="freeTextContainer9647747619852610983"><span data-dcnode-id="3255" instrument_node="">A HIGH- SOCIETY GYPSY</span><br data-dcnode-id="3254"><br data-dcnode-id="3253"><span data-dcnode-id="3252" instrument_node="">PS 2020 - I have reread the book four years later and I confess to be absolutely in love with Jane Digby. What a Woman! What a life! What a freedom to be who you really are!!!!</span><br data-dcnode-id="3251"><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">2016 - I have a love-hate relationship with the subject of this exceptionally well-written and researched biography. She was willing to sacrifice anyone, including her six children, when called by her sexual whims. But her never-ceasing energy and interest in life can not leave one indifferent. Of cour</span></span><span data-dcnode-id="3247" instrument_node="">
</span><span data-dcnode-id="3227" id="freeText9647747619852610983" style="display:none"><span data-dcnode-id="3246" instrument_node="">A HIGH- SOCIETY GYPSY</span><br data-dcnode-id="3245"><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">PS 2020 - I have reread the book four years later and I confess to be absolutely in love with Jane Digby. What a Woman! What a life! What a freedom to be who you really are!!!!</span><br data-dcnode-id="3242"><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">2016 - I have a love-hate relationship with the subject of this exceptionally well-written and researched biography. She was willing to sacrifice anyone, including her six children, when called by her sexual whims. But her never-ceasing energy and interest in life can not leave one indifferent. Of course, if she wasn't showered with money both by her first husband and her father, she would had never been able to pursue her many passions. </span><br data-dcnode-id="3239"><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">When you start to compromise your values and believes your self-worth, pride and integrity is falling; you are willingly breaking down the fibers that hold the good character and values in the Light. Jane had it all and willingly threw it away, gaining what her soul most desired: freedom, passion, and constant challenge. She broke many hearts on the way to the desert life. She broke a few hearts in the desert as well: her Muslim husband, 20 years her junior, while being lawfully able to have four wives, divorced his only one at the time, the mother of his two sons, in order to possess Jane on her terms. She was born an English rose and died a desert matriarch while being a high-society gypsy in between. </span><br data-dcnode-id="3236"><br data-dcnode-id="3235"><span data-dcnode-id="3234" instrument_node="">By the end of life she was doing a lot of charity, which speaks well of her character, tamed by years. But until the last breath, despite Medjuel's tenderness, she was tortured by jealousy. What a price to pay for having a young husband!</span><br data-dcnode-id="3233"><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">I am not sure if I admire Jane Digby for her strength, energy and following her call for happiness or belittle her for the greatest lack of responsibility and respect to herself as a Woman. Read this exceptional biography of an exceptional woman to find out for yourself. </span><br data-dcnode-id="3230"><br data-dcnode-id="3229"><span data-dcnode-id="3228" instrument_node="">Victoria Evangelina</span></span><span data-dcnode-id="3226" instrument_node="">

</span><span data-dcnode-id="3136" id="freeTextContainer8665885739735628092"><span data-dcnode-id="3140" instrument_node="">An amazing book about an amazing woman. Considering I had never heard of Jane Digby before I read this, and even had to Google her first to decide if I even wanted to read this book, I was absolutely fascinated by her. By the time this book ended with her death I was completely enthralled by her life and felt quite bereft to come to the end.</span><br data-dcnode-id="3139"><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">Jane was born into a rich Georgian family, renowned as a great beauty, married a well-known lord and politician when she was still a teenager, and was no mor</span></span><span data-dcnode-id="3135" instrument_node="">
</span><span data-dcnode-id="3114" id="freeText8665885739735628092" style="display:none"><span data-dcnode-id="3134" instrument_node="">An amazing book about an amazing woman. Considering I had never heard of Jane Digby before I read this, and even had to Google her first to decide if I even wanted to read this book, I was absolutely fascinated by her. By the time this book ended with her death I was completely enthralled by her life and felt quite bereft to come to the end.</span><br data-dcnode-id="3133"><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">Jane was born into a rich Georgian family, renowned as a great beauty, married a well-known lord and politician when she was still a teenager, and was no more than a few years into her marriage when she caused scandal by eloping with an Austrian prince. She divorced her husband in a case that shocked the entire British establishment, moved to Germany and became the lover of the Bavarian King after her prince abandoned her. She then married a Bavarian baron before embarking on an affair with a Greek count. The baron and the count fought a duel over her, before the baron let her go, and they remained friends to the end of their lives.</span><br data-dcnode-id="3130"><br data-dcnode-id="3129"><span data-dcnode-id="3128" instrument_node="">Jane then later divorced her Greek count, had an affair with the Greek king (who was the son of the Bavarian king she had earlier had an affair with), took up with a Thessalian bandit general, left him when he was unfaithful to her with her maid - and ran away to Syria, with the maid still in service. Because men come and go, but a good lady's maid is forever, right?</span><br data-dcnode-id="3127"><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">Then whilst travelling in the Middle East she fell in love with a Bedouin Sheik half her age, married him and lived with him to the end of her days, passionately in love, half the year living in goats-hair tents in the desert and half in a palatial villa in Damascus. She was fluent in nine languages, lived as an independent wealthy woman, beholden to no-one, and flaunted the values of society with impunity - and not one of the men she was involved with seemed to think of her with anything less than affection, even after she'd loved 'em and left 'em.</span><br data-dcnode-id="3124"><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">Jane was a woman before her time - independent, intelligent, in control of her own life, unashamed of her own sexuality. In an era where women were expected to sit quietly and look pretty, where love was not expected in marriage and women had few rights, Jane chose to follow her heart wherever it led. She comes across as a unabashed romantic, searching for that one grand passion that would fulfil her, and she finally found it with a Bedouin sheikh in the deserts of Syria.</span><br data-dcnode-id="3121"><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">Just...damn. What a woman. What a story.</span><br data-dcnode-id="3118"><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">This is an excellent biography. Lovell presents Jane just as she is, with no moral whitewashing or condemnation, and her admiration for Jane's strength of character and determination comes across on every page. Jane seems very much a modern woman, streets ahead of her time, and it's all but impossible to fall in love with her, as indeed so many in her own lifetime seemed to do.</span><br data-dcnode-id="3115"></span><span data-dcnode-id="3113" instrument_node="">

</span><span class="readable" data-dcnode-id="3000" id="reviewTextContainer998945789"><span data-dcnode-id="3028" instrument_node="">
</span><span data-dcnode-id="3020" id="freeTextContainer3972837609014275198"><span data-dcnode-id="3027" instrument_node="">Lovell as a biographer has a strength which is also a weakness. She only writes about people she loves. </span><br data-dcnode-id="3026"><br data-dcnode-id="3025"><span data-dcnode-id="3024" instrument_node="">Generally I admire that and take her words with a grain of salt. It makes for pleasant reading. However, in the case of Jane Digby she has found someone who sounds interesting in summary but the reality is much duller. </span><br data-dcnode-id="3023"><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">Digby was not the modern independent woman Lovell wishes to portray. She was a very beautiful, somewhat spoilt, and extremely romantic woman who moved from man to man seeking so</span></span><span data-dcnode-id="3019" instrument_node="">
</span><span data-dcnode-id="3005" id="freeText3972837609014275198" style="display:none"><span data-dcnode-id="3018" instrument_node="">Lovell as a biographer has a strength which is also a weakness. She only writes about people she loves. </span><br data-dcnode-id="3017"><br data-dcnode-id="3016"><span data-dcnode-id="3015" instrument_node="">Generally I admire that and take her words with a grain of salt. It makes for pleasant reading. However, in the case of Jane Digby she has found someone who sounds interesting in summary but the reality is much duller. </span><br data-dcnode-id="3014"><br data-dcnode-id="3013"><span data-dcnode-id="3012" instrument_node="">Digby was not the modern independent woman Lovell wishes to portray. She was a very beautiful, somewhat spoilt, and extremely romantic woman who moved from man to man seeking someone she was attracted to who would also give her his complete attention. Quite a few tried. It was not an easy task. By the end of the novel I was wondering if she was bipolar. She was extremely impulsive and greatly enjoyed the attention of the honeymoon phase of a relationship. She demanded that total attention as time went on. Sometimes she seemed a bit manic, rushing between romantic highs and post-relationship depression. </span><br data-dcnode-id="3011"><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">Her final marriage was not the romance Lovell makes it out to be in summary. She was a rich European woman who made a good connection for a Bedouin tribe. She was supplying their guns and ammunition and negotiation with the European powers. Medjuel, her final husband, was observant and attentive, but most of their great love was in Digby's own mind. Medjuel lasted long because he could spend half the year (or more) in the desert with his tribe. And still, there is chapter after chapter of Digby chasing him into the desert because she is jealous of this ex-wife (she made him divorce his previous wives to marry her) or that possible new wife. By the end she comes off as unstable. </span><br data-dcnode-id="3008"><br data-dcnode-id="3007"><span data-dcnode-id="3006" instrument_node="">The author spends half of the book in Damascus and the desert. Frankly, there is not enough interesting material for this section and I am very interested in Bedouin culture. The problem is that after Digby's initial travels through Syria the book focuses more on her life at home in Damascus, great Europeans who visit her, her intense jealousy of Medjuel's possible loves. It is her story, but this long tract of Digby's domesticity only serves to make her difficult personality more obvious.</span></span><span data-dcnode-id="3004" instrument_node="">

</span><span data-dcnode-id="2905" id="freeTextContainer2419914912176865460"><span data-dcnode-id="2909" instrument_node="">What a life! The key word in the title is </span><i data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">scandalous</span></i><span data-dcnode-id="2906" instrument_node="">, and Jane Digby was just that - a well-born Victorian lady who was married no fewer than four times (and that's no counting the lovers she never got around to marrying). It would be too easy to dislike Jane Digby, as she seems to have been a foolishly enslaved by notions of romantic love, but she's too riveting to become seriously annoyed with, not to mention that at the time there were few other ways for her to channel her astonishing energy </span></span><span data-dcnode-id="2904" instrument_node="">
</span><span data-dcnode-id="2884" id="freeText2419914912176865460" style="display:none"><span data-dcnode-id="2903" instrument_node="">What a life! The key word in the title is </span><i data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">scandalous</span></i><span data-dcnode-id="2900" instrument_node="">, and Jane Digby was just that - a well-born Victorian lady who was married no fewer than four times (and that's no counting the lovers she never got around to marrying). It would be too easy to dislike Jane Digby, as she seems to have been a foolishly enslaved by notions of romantic love, but she's too riveting to become seriously annoyed with, not to mention that at the time there were few other ways for her to channel her astonishing energy and ambition. Digby did finally get around to becoming more a mature, likeable person, settling finally in Palmyra with her much-younger fourth husband, a Bedouin sheikh. </span><br data-dcnode-id="2899"><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">The scope of Digby's life is enthralling -- it spanned all of Europe and a good part of the Middle East, not to mention many of the prominent people of the time. She was married off quite young to a much older man, and had she been able to simply settle into the role that had been carefully prepared for her by society, no more would have been heard of her.</span><br data-dcnode-id="2896"><br data-dcnode-id="2895"><span data-dcnode-id="2894" instrument_node="">But, happily, she wasn't able to adapt. Her quest for freedom (for I think it is this she sought, really, and not just a search for romantic love) played itself out over multiple relationships and continents. I did tire a little of her continual bedding-and-wedding, but the final chapter of her life was so admirable that it's hard to imagine even a fictional life ending with more poetic resonance and redemption.</span><br data-dcnode-id="2893"><br data-dcnode-id="2892"><span data-dcnode-id="2891" instrument_node="">Lovell has written several other well received biographies of iconoclastic women, among them Beryl Markham, Amelia Earhardt, Isabel Burton, and the Mitford sisters. I wish she'd undertake a biography of African explorer Mary Kingsley or perhaps courtesan/hellion Lola Montez -- speaking of the latter, now </span><i data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">there</span></i><span data-dcnode-id="2888" instrument_node=""> was a scandalous life! </span><br data-dcnode-id="2887"><br data-dcnode-id="2886"><br data-dcnode-id="2885"></span><span data-dcnode-id="2883" instrument_node="">

</span><span data-dcnode-id="2544" id="freeText7342426958779233952" style="display:none"><span data-dcnode-id="2548" instrument_node="">Born into nobility, Jane Digby was raised to be a lady but ended up living a life full of adventure, love, and scandal for the 1800s public. Her name was one that became legendary, synonymous with scandal and breaking the rules of society. Married as a teenager, her husband was too busy for her resulting in her finding love elsewhere. This search for love would be a lifetime adventure that would lead from England, to France, Germany, Italy, and finally Damascus. The lover of lords, barons, kings, and sheiks among others hers was a life about love, desire, and fulfillment. </span><br data-dcnode-id="2547"><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">Mary Lovell has thoroughly researched Ms Digby's life - calling on her surviving relatives for access to Jane's diaries, letters, paintings, and sketches. In the bits and pieces that have been left behind for posterity, Ms Lovell has succeeded in writing a fascinating account of a life lived outside of society's boundaries. Her writing is enthralling and this biography was not only a page turner but one of real-life adventure.</span></span><span data-dcnode-id="2543" instrument_node="">

</span><span data-dcnode-id="2456" id="freeText5753307006853171343" style="display:none"><span data-dcnode-id="2457" instrument_node="">An account that was just a little too dry to read for my taste. Certainly well researched, and avoiding the pitfalls of adding fantasy. So it's not historical fiction, which could perhaps be written in a more entertaining style, but it's rather closely based on historical facts from a mound of surviving papers. Jane seemed to be drifting emotionally until she found a suitable family in her later years, but never lost her emotional dependence. I found it interesting that Jane's jealousy kept burning well into old age. I read the fascinating biography of Gertrude Bell, another lady who travelled into the desert, but who had a lot more to offer than just a string of lovers and building sites. Jane's story gives a good insight into the playground of the upper class rich aristocrats of her time. She was a kind of accidental rebel who pushed the limits of social norms and values. It seems that she was no hypocrite. I am glad that at least she gained some achievement and recognition in the tribe she joined.</span></span><span data-dcnode-id="2455" instrument_node="">

</span><span data-dcnode-id="2377" id="freeText5372386423178958046" style="display:none"><span data-dcnode-id="2378" instrument_node="">The biography of Jane Digby reads like the best of fiction. It is difficult to believe that this aristocratic woman with all the wealth of her class and the predictable future, managed to live a life so unexpected, so unconventional, full of adventures, with complete disregard to traditions. She always followed her heart, changing husbands and lovers, did not attach herself to her children, having many, was a close friend and confidant of kings and diplomats and spent the happiest last 25 years of her life living in the Orient, being a wife of the desert sheikh 20 years her younger. She became a legend during her lifetime, her life was reflected into numerous biographies, where the truth very often hidden under the surface of gossips and rumours. She was an explorer, lived in the desert for months, sharing the life with the Bedouins of her tribe. At the time of Queen Victoria, when woman was expected to be only a mother and a good wife, Jane Digby was unique. </span></span><span data-dcnode-id="2376" instrument_node="">

</span></blockquote><span data-dcnode-id="2186" instrument_node="">Without a doubt, </span><b data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Jane Digby had unusual and fascinating life</span></b><span data-dcnode-id="2183" instrument_node="">. From a delicately nurtured English lady, through a few other European countries (and men), to a wife of an Arab chief. Her biography could make a great movie (even better, TV series).</span><br data-dcnode-id="2182"><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">Mary S. Lovell was as historically accurate as was possible. We (as always in such cases) have blank pages, but what we have is enough to create Jane's portrait and to try to understand her. Yes, the main sources were Jane's letters and her diary (those parts that survived), but still, (like in the case of </span><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/23856.The_Sisters_The_Saga_of_the_Mitford_Family" rel="nofollow noopener" title="The Sisters The Saga of the Mitford Family by Mary S. Lovell"><span data-dcnode-id="2179" instrument_node="">The Sisters: The Saga of the Mitford Family</span></a><span data-dcnode-id="2177" instrument_node="">) it was really well researched.</span><br data-dcnode-id="2176"><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">But, the style in which the story was told made the book boring too often. Too many fragments of letters, sometimes too much about some topic or people. Although I must stress out, there were very interesting and informative fragments too.</span><br data-dcnode-id="2173"><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">It was definitely worth reading because of Jane Digby's story. When you read (like me) many books about (or taking place) in XIX century England, you should know about one of the biggest "scandalous women" at that time. </span><b data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Nonetheless, reading it felt like going through not enjoyable surroundings in search of some precious pieces of information. I value those pieces but reading the book not as much.</span></b></span><span data-dcnode-id="2167" instrument_node="">

</span><span data-dcnode-id="2079" id="freeText17502524328809755649" style="display:none"><span data-dcnode-id="2087" instrument_node="">Lady Jane Digby really had a scandalous life, even for our modern standards. Married three times, divorced two, with many lovers in between, she led an unapologetic life, doing things her own way, even if it meant being rejected by polite society. In her forties, she fell in love with the Middle East and a Bedouin sheik, spending the last twenty years of her life as a wanderer in Syria.</span><br data-dcnode-id="2086"><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">Although a biography, this book reads like a fiction novel, with a good pace, tension, intrigue and, of course, passionate love stories. In fact, it is curious to note that, despite her adventures and impulsive decisions, Jane Digby was not a “modern woman”. She was driven by love and could not imagine a life without a man by her side. </span><br data-dcnode-id="2083"><br data-dcnode-id="2082"><span data-dcnode-id="2081" instrument_node="">A truly remarkable woman!</span><br data-dcnode-id="2080"></span><span data-dcnode-id="2078" instrument_node="">

</span><span data-dcnode-id="1843" id="freeTextContainer1398527864582381606"><span data-dcnode-id="1846" instrument_node="">Although Jane Digby was born during the Regency Period of England, Jane Austin she isn’t.</span><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">The Regency period is known for the excesses of its aristocracy. Jane Digby’s upbringing and her adult years through the waning of this period certainly influenced her choices. She indulges in a hedonistic lifestyle, never adjusting her moral values to the Victorian standard. During her youthful first marriage Jane's family (and it seems the author) blame her self-indulgence on hanging around with the wrong </span></span><span data-dcnode-id="1842" instrument_node="">
</span><span data-dcnode-id="1826" id="freeText1398527864582381606" style="display:none"><span data-dcnode-id="1841" instrument_node="">Although Jane Digby was born during the Regency Period of England, Jane Austin she isn’t.</span><br data-dcnode-id="1840"><span data-dcnode-id="1839" instrument_node="">The Regency period is known for the excesses of its aristocracy. Jane Digby’s upbringing and her adult years through the waning of this period certainly influenced her choices. She indulges in a hedonistic lifestyle, never adjusting her moral values to the Victorian standard. During her youthful first marriage Jane's family (and it seems the author) blame her self-indulgence on hanging around with the wrong crowd and the inattention of her older then-husband. Jane's behavior afterward proves them wrong.</span><br data-dcnode-id="1838"><span data-dcnode-id="1837" instrument_node="">Her story is told using letters, her own diary entries and other documentation giving authenticity to her story. However, I thought the author's approach much to sympathetic toward her subject. Even with that slant Jane's narcissism is evident. For instance this passage from her diary when she is over 50 years old describing a celebration of the Bedouins, “the sword dance where men and women joined…I knew that if I chose I could surpass them all in fire and agility.” Really? </span><br data-dcnode-id="1836"><span data-dcnode-id="1835" instrument_node="">Much is said throughout the book of her beauty, charm, artist talent, intelligence and courage. She did seem to have these characteristics; she just didn’t channel them into really making something of her life until she is almost 60 years old. Even at this age she is still moaning for her Sheik during his absence, despairing in petty jealousy and consumed with building/maintaining elaborate homes and gardens. She regularly enlists the long suffering family of her ignominy back in England to buy fashionable clothing, books, plants and other niceties and send them in “crates” to her. She lived off what would now be called spousal support from her first husband of only two years,(she married twice afterward)in addition to other money given and invested for her. She does nothing for her three children. Instead she covets her stepson to be her own child by birth.</span><br data-dcnode-id="1834"><span data-dcnode-id="1833" instrument_node="">I also think the author wrote assuming all her readers are British or know the English class structure. It's safe to say most Americans don't, so a cursory explanation somewhere would have helped. Since about half of the book is devoted to Jane's life after leaving Europe, a map detailing Syria where she spent the remaining years of her life would have been useful. The book and the reader suffer a little from poor proof reading. There is a very obvious misprint early in the book giving the year as 1926, rather than 1826, to cite just one example. </span><br data-dcnode-id="1832"><span data-dcnode-id="1831" instrument_node="">Overall, The Biography of Jane Digby a Scandalous Life by Mary S. Lowell is an absorbing story of an unusual woman, well researched.</span><br data-dcnode-id="1830"><br data-dcnode-id="1829"><span data-dcnode-id="1828" instrument_node="">While I’m at it, I heartily recommend reading the biography of Gertrude Bell, Queen of the Desert, Shaper of Nations by Georgina Howell. She too is a most extraordinary, courageous, intelligent English woman. Although born 61 years later than Digby, she also lived among the tribes of what is now the Middle East but she was no where as juicily scandalous as Jane Digby. </span><br data-dcnode-id="1827"></span><span data-dcnode-id="1825" instrument_node="">

</span><span data-dcnode-id="1741" id="freeText4444298763357441323" style="display:none"><span data-dcnode-id="1742" instrument_node="">Jane Digby lived a very unconventional life spanning multiple continents, husbands and lovers from her birth in 1807 until she died in 1881. As a pampered English aristocrat, her first wedding was fairly typical of the time with a young debutante marrying an older English peer. She didn't settle into that wedding, winding up divorced after an affair, and headed on to liaisons and marriages. She met the love of her life in the desert and married a much younger Bedouin sheik. She spend part of each year in the desert with him and part in Damascus, with an ongoing love of the culture, the horses and the man, despite the religious and racial barriers that her background and peers seemed to feel was too extreme to be crossed. Her knowledge of the Arabian culture and her pride in the horses and her husband were ongoing and shared with those who visited in her country, with her accompanying visitors into the desert even past age 70. The story is told without a lot of psychobabble and appears to cite multiple source materials written by Jane Digby and her family, with letters from family and official documents cited for background. This book did take a much longer amount of time to read that is normal for me, with breaks for lighter reading after every couple of chapters, but it did give a good feel for what my history teacher called "the temper of the times". The costs of departing from the norm were definitely experienced by Jane Digby, but she lived a very singular life and left it on her terms. </span></span><span data-dcnode-id="1740" instrument_node="">

</span><span data-dcnode-id="1639" id="freeText6419982966367966688" style="display:none"><span data-dcnode-id="1657" instrument_node="">The heroine of this story kicks ass in the most old fashioned way. And when I say old fashioned I'm not referring to the fact she's from the 1800s.</span><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">She kicks off when she's only 16, emerging from the family mansion in the country, to take London by storm and marry a rich, powerful man, twice her age.</span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">Lady Jane Digby is something else, though. For her the most powerful impulse in the world is falling in love. And she falls in love, again, and again and again, and each time leaving the previous love behind. She moves across Europe, leaving a trail of lovesick Kings and Princes, and one Blakan robber chief. Also - and not so romantic - she leaves a trail of children, to be brought up by fathers, aunts, or convents and never meet their mother.</span><br data-dcnode-id="1650"><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">She winds up in Syria, age 50, in love with a Bedouin sheikh 20 years younger than her, and then her story is only just beginning.</span><br data-dcnode-id="1647"><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">This story is awesome with a compelling, larger than life heroine. Which is ironic, because Lady Jane Digby was exactly life sized, as a genuine, historical person. This is biography, not fiction, and all the more amazing for it...</span><br data-dcnode-id="1644"><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node="">For more of my opinion on the book and some cool associated youtubery, check out my post here... </span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jdfield.blogspot.com/2 </span><span data-dcnode-id="1560" id="freeText7576450490598956770" style="display:none"><span data-dcnode-id="1561" instrument_node="">Mary S LOVELL is an amazing author, beginning her working life as an accountant but with wide interests from aviation to horses. In her biography of Jane DIGBY, she takes us through a scandalous English 1800s divorce after marrying at seventeen an English Lord. From an Austrian Prince, to an intimate relationship with King Ludwig 1 of Bavaria whilst married to a German baron, it reads like a novel, but Mary has researched her subject well and keeps us both informed and entertained as Jane next falls for a Greek count. However, she discovers his unfaithfulness, simultaneously losing a six year old son and she begins an unsettled period, often traveling alone (not done!!) in the middle east. Again she falls in love this time with an Albanian General riding Arab horses and sleeping in caves! However, he too proves unfaithful. In her middle age, she is still a beauty but has done with men and settles in Syria where she meets and marries a Bedouin nobleman, living six months of each year in a Damascus palace and the other six in a goat-hair tent of Arabia..... From intensive study of Jane's diaries, letters and family/friends interviews, Mary has compiled a stunning understanding and very readable story of Jane's life. 353 pages, indexed.</span></span><span data-dcnode-id="1559" instrument_node="">

</span><span data-dcnode-id="1337" id="freeTextContainer7420448398185414298"><span data-dcnode-id="1341" instrument_node="">I re-read this book every year. I think it's that good!</span><br data-dcnode-id="1340"><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="">Lady Jane Digby was the daughter of one of England's peers and married the nam who was arguably the catch of the season, Lord Ellenborough. Unfortunately for Jane's happiness, it wasn't a love match from his POV and fairly impestuously, she threw herself into an affair. Not very discretely, either. Their marriage ended in one of the first recorded divorces, humiliating for both families, but Jane still refused to bow down to societies' whims</span></span><span data-dcnode-id="1336" instrument_node="">
</span><span data-dcnode-id="1325" id="freeText7420448398185414298" style="display:none"><span data-dcnode-id="1335" instrument_node="">I re-read this book every year. I think it's that good!</span><br data-dcnode-id="1334"><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">Lady Jane Digby was the daughter of one of England's peers and married the nam who was arguably the catch of the season, Lord Ellenborough. Unfortunately for Jane's happiness, it wasn't a love match from his POV and fairly impestuously, she threw herself into an affair. Not very discretely, either. Their marriage ended in one of the first recorded divorces, humiliating for both families, but Jane still refused to bow down to societies' whims and rules, and went on to live a fantastic, altho scandalous life.</span><br data-dcnode-id="1331"><br data-dcnode-id="1330"><span data-dcnode-id="1329" instrument_node="">She travelled thru Europe, married and divorced again, spending time with Kings and time with peasants until at last she found her home. The story of what happened between England and the Middle East is fascinating - how many men had travelled as Jane did (few!) and almost no women (with the exceptions of Isabel Burton &amp; Hester Stanhope) and the hardships she overcome. </span><br data-dcnode-id="1328"><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">Its a fascinating read that should hold your interest until the last page.</span></span><span data-dcnode-id="1324" instrument_node="">

</span><span data-dcnode-id="1240" id="freeText8380437552971778909" style="display:none"><span data-dcnode-id="1241" instrument_node="">Mary Lovell presents the scandalous life of Jane Digby in a detailed yet respectful way. She had access to family papers, so we get the inside personal view that her letters and journals provide, not the scandals and gossip of the press. It is a fascinating life for a 19th century British woman. At 17 she marries a wealthy but unloving husband, only to leave him when she falls in love with another man. After a divorce she is abandoned by her lover who cannot marry a divorced woman. She proceeds through continental Europe making a few more attempts at finding a place to call home. Always her famous beauty and outstanding personality wins her the devotion of men she doesn't love while the men she loves cannot provide her the legitimacy of marriage. Jane finally goes to Syria and marries a desert nomad half her age, living a strange double life as a muslim wife and an English lady expat spending months at a time in desert tents, but having houses in Damascus and Homs, places known to us today from news reports of the violent civil war.</span></span><span data-dcnode-id="1239" instrument_node="">

</span><span data-dcnode-id="879" id="freeText10566435025228744904" style="display:none"><span data-dcnode-id="886" instrument_node="">I picked up this book because I was interested in learning more about the infamous Jane Digsby. She was a remarkable women who was brought up in the 1800's as an Elite English women... She was scandalous because she divorced many men (during a time when divorce was not allowed) and she lived around the world... I was interested because she spent the latter part of her life married to a Bedouin in Syria. </span><br data-dcnode-id="885"><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">It was an interesting book but written in biographical form so it was a lot to take in. The author should've included a tree of the characters because it is easy to get them confused... At times I was tempted to give up reading the book but continued through because I always finish books... </span><br data-dcnode-id="882"><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">Overall, an interesting read but not something I would highly recommend </span></span><span data-dcnode-id="878" instrument_node="">
