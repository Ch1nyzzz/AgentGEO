</span><p class="clay-paragraph" data-dcnode-id="4769" data-editable="text" data-uri="www.thecut.com/_components/clay-paragraph/instances/ambrose-2182c174f6e5eda44502b6a721b5053b-0-0-0@published" data-word-count="89"><span data-dcnode-id="4770" instrument_node="">The right dress can make a career. The wrong one can make headlines. But a scandalous dress can do both. Whether dating from Genesis, the Belle Époque, or the infancy of MTV, these 50 scandalous looks pushed boundaries, sparked controversy, and shifted the public’s eye. (Full disclosure: There are also some trousers, jackets, and T-shirts in here — sometimes, creating a stir means flaunting the rules.) They prove that there’s often more to scandal than sex — and that there’s more than one way to leave a lasting impression.</span></p><span data-dcnode-id="4768" instrument_node="">

</span><span class="full" data-dcnode-id="4657"><strong data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">Eve’s fig leaves, Genesis 3:7, 3:21, and 3:22</span></strong><span data-dcnode-id="4660" instrument_node="">&nbsp;From the very beginning, dress and scandal have been inextricably linked. Once Adam and Eve ate from the Tree of Knowledge, they recognized their nakedness and hid their shame with fig leaves. And later, when God outfitted them with “coats of skins” (fur coats!), he decreed: “Behold, the man is become as one of us, to know good and evil.” Self-awareness, morality, and clothing — that unholy trinity has been exploited by every scandalous dress since. 
 </span><span class="credit" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">Photo: Imagno/Austrian Archives/Getty Images</span></span></span><span data-dcnode-id="4656" instrument_node="">

</span><span class="full" data-dcnode-id="4605"><strong data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Lady Gaga’s meat dress, Franc Fernandez and Haus of Gaga, MTV Video Music Awards, 2010</span></strong><span data-dcnode-id="4611" instrument_node="">&nbsp;In the first (and hopefully last) appearance of raw meat on the red carpet, Lady Gaga’s 2010 VMA dress had animal-rights activists and vegetarian groups seeing red. While shocking, the flank-steak gown was not technically an original; it borrowed heavily from Canadian artist Jana Sterbak’s 1987 installation </span><i data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">Vanitas: Flesh Dress for an Albino Anorectic. </span></i><span data-dcnode-id="4608" instrument_node="">When Ellen DeGeneres later asked Gaga about the dress’s message, Gaga explained that it was about “standing up for what we believe in … pretty soon we're going to have as much rights as the meat on our own bones.” Furthermore, said Gaga, “I am not a piece of meat."
 </span><span class="credit" data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">Photo: Kevin Winter/Getty Images</span></span></span><span data-dcnode-id="4604" instrument_node="">

</span><span class="full" data-dcnode-id="4397"><strong data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">Wallis, Duchess of Windsor’s Mainbocher wedding dress worn at the Château de Candé, June 3, 1937</span></strong><span data-dcnode-id="4400" instrument_node="">&nbsp;In December of 1936, King Edward VIII abdicated the throne to marry Wallis Warfield, “the woman [he] love[d].” The bride wore Mainbocher — a floor-length fluted column dress and fitted jacket with a delicately shirred heart-shaped bodice. Cut of “Wallis blue” silk crêpe, the gown matched the duchess’s eyes and her Van Cleef &amp; Arpels sapphires. Its conservative silhouette exemplified the austere style favored by the American divorcée, and it lent a sobriety to the scandalous union. Within weeks of their June 1937 vows, copies of the dress appeared in New York department stores. </span><span class="credit" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Photo: Central Press/Central Press/Getty Images</span></span></span><span data-dcnode-id="4396" instrument_node="">

</span><i data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">La Folie du Jour</span></i><span data-dcnode-id="4084" instrument_node="">, Folies Bergère, 1926</span></strong><span data-dcnode-id="4082" instrument_node="">&nbsp;“Since I personified the savage on stage, I tried to be as civilized as possible in daily life.”&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; —Josephine Baker 
By donning a skirt of rubber bananas at Paris’s Folies Bergère, the American-born black cabaret sensation Josephine Baker — whom reviewers at the time described as “savage” and “primitive” — exploited colonial fantasies of racial and sexual difference and claimed her body’s power as her own.&nbsp;  </span><span class="credit" data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">Photo: Jerry Tavin/Everett Collection</span></span></span><span data-dcnode-id="4078" instrument_node="">

</span><span class="full" data-dcnode-id="3969"><strong data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">Marie Antoinette at the guillotine, October 16, 1793</span></strong><span data-dcnode-id="3972" instrument_node="">&nbsp;“Marie Antoinette wore a white gown, a white handkerchief covered her shoulders, a white cap her hair; a black ribbon bound this cap round her temples ... ” 
—Charles Lacretelle (1766-1855) 
In 1793, when France’s queen was taken to the guillotine, she was dressed in a simple white chemise, her shorn hair tucked under a plain cap. Far from the deficit-inducing gowns and three-foot pouf that had contributed to her fame, her final outfit nonetheless showed her talent for manipulating her own image.  </span><span class="credit" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Photo: Corbis</span></span></span><span data-dcnode-id="3968" instrument_node="">

&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; —Marchesa Luisa Casati 
In a dazzling confection of diamond net and silver fringe, Italy’s wealthiest heiress, Marchesa Luisa Casati, personified “light” at a fancy-dress ball in 1890. Her ensemble, a collaboration with couturier Charles Frederick Worth, was completed with a giant corona of golden feathers, a towering diamond tiara, and a swarm of embroidered stars. It’s hardly surprising that the marchesa has since become one of fashion’s favorite muses — inspiring Dior’s 1998 spring couture collection, Chanel’s 2010 resort collection, and Georgina Chapman and Keren Craig’s label.&nbsp; </span></span><span data-dcnode-id="3921" instrument_node="">

&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; —Christian Dior 
Inspired by flower shapes — and dubbed the “New Look” by </span><i data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">Harper’s Bazaar</span></i><span data-dcnode-id="3863" instrument_node=""> editor Carmel Snow — Christian Dior’s first couture collection marked the return of a strict hourglass silhouette. After years of wartime rationing in Europe, the wasp-waisted corsets and extravagant use of fabric were initially met with resistance. In Montmartre, street vendors attacked Dior-clad models during a photo shoot and anti–New Look clubs sprang up across America. By the next year, however, stylish women on both continents had succumbed to Dior’s charms.

</span><span class="full" data-dcnode-id="3631"><strong data-dcnode-id="3644"><i data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">Portrait of Madame X </span></i><span data-dcnode-id="3645" instrument_node="">(Madame Pierre Gautreau), John Singer Sargent, 1884</span></strong><span data-dcnode-id="3643" instrument_node="">&nbsp;When John Singer Sargent exhibited his </span><i data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Portrait of Madame X</span></i><span data-dcnode-id="3640" instrument_node=""> at the Paris Salon of 1884, he shocked </span><i data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">le tout Paris</span></i><span data-dcnode-id="3637" instrument_node="">. Crowds jeered and jabbed at it with their umbrellas, while critics decried the “indecency” of the famous beauty’s costume, which featured a deeply plunging neckline and a pair of jeweled straps — one slipping off her shoulder.

</span><span class="full" data-dcnode-id="3481"><strong data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Jacqueline Bouvier Kennedy’s pink suit, Chanel and Chez Ninon 1961, worn November 22, 1963.</span></strong><span data-dcnode-id="3484" instrument_node="">&nbsp;“Oh no … I want them to see what they have done to Jack.” 
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; —Jacqueline Kennedy 
Jacqueline Kennedy had worn the pink bouclé&nbsp;suit numerous times before that fateful day in Dallas. First shown in Chanel’s fall-winter 1961 collection, the suit is thought to be an authorized copy built by Chez Ninon from original Chanel fabric and trim. After John F. Kennedy was shot, the First Lady could not be persuaded to remove her blood-stained ensemble, wearing it to the hospital and onboard Air Force One as Lyndon Johnson was sworn in. The outfit was preserved with the stains intact and is held by the National Archives in an undisclosed location in Maryland. </span><span class="credit" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Photo: Art Rickerby/Time &amp; Life Pictures/Getty Images</span></span></span><span data-dcnode-id="3480" instrument_node="">

</span><span class="full" data-dcnode-id="3218"><strong data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">CK Jeans campaign, Calvin Klein, 1995</span></strong><span data-dcnode-id="3221" instrument_node="">&nbsp;“You’ve got a real nice look. How old are you? ... Are you strong? You think you could rip that shirt off of you? … That’s a nice body. Do you work out? … Yeah, I can tell.” 
Two years after the Obsession ads, Klein pushed the envelope yet again with a series of ads for CK Jeans. In the 1995 campaign, shot by Steven Meisel, an off-camera voice quizzes scantily clad teenage models in a wood-paneled rec room. The commercials, which closely resembled soft-core screen tests, led to charges of child pornography. Parent groups and retailers threatened a boycott, and the Department of Justice launched an investigation into the models’ ages. Klein ended up pulling the controversial campaign.&nbsp;&nbsp; &nbsp; </span><span class="credit" data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Photo: The Advertising Archives</span></span></span><span data-dcnode-id="3217" instrument_node="">

</span><span class="full" data-dcnode-id="3004"><strong data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Michaele Salahi’s red Lehenga-Style sari and choli, White House State Dinner, November 24, 2009</span></strong><span data-dcnode-id="3016" instrument_node="">&nbsp;She certainly looked the part. A striking blonde in a red sari, Michaele Salahi and her husband, Tareq, made their way past multiple security checkpoints and into the White House for a state dinner honoring the Indian prime minister — without an official invitation. Exploiting what the Washington</span><i data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node=""> Post</span></i><span data-dcnode-id="3013" instrument_node="">’s Robin Givhan described as a “cultural blind spot,” Salahi (who, it turned out, was a cast member of the as yet unannounced </span><i data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">The</span></i><span data-dcnode-id="3010" instrument_node=""> </span><i data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Real Housewives of D.C.</span></i><span data-dcnode-id="3007" instrument_node="">) bluffed her way past the gates by letting her sari do the talking. In the aftermath, the Salahis were subpoenaed to appear before the U.S. House Committee on Homeland Security, where they proceeded to invoke the Fifth Amendment 32 times.

</span><span class="full" data-dcnode-id="2955"><strong data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Michelle Obama’s custom Naeem Khan gown, White House State Dinner for Indian Prime Minister Manmohan Singh, November 24, 2009</span></strong><span data-dcnode-id="2958" instrument_node="">&nbsp;On the same night as the Salahi sari scandal, the First Lady inadvertently created a fashion controversy of her own. As an homage to the guest of honor, Mrs. Obama selected Indian-American designer Naeem Khan to design her gown. Described by Khan himself as a “sterling-silver sequin, abstract floral, nude strapless gown” and by the Associated Press as “flesh”-colored, the dress sparked an intense debate about the political correctness of “fashionspeak” and who exactly gets to define the color of flesh.

</span><span class="full" data-dcnode-id="2906"><strong data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Yves St. Laurent versus Ralph Lauren, halter-neck tuxedo-style gowns, 1992/1994</span></strong><span data-dcnode-id="2909" instrument_node="">&nbsp;It was an odd venue for a fashion show, but in 1994, French judge Madelaine Cotelle ordered that two halter-neck tuxedo-style evening gowns be modeled in her courtroom. Entered into evidence were YSL’s $15,000 lightweight wool dress with wide lapels and gilt buttons and Ralph Lauren’s $1,000 silk dress, featuring narrower lapels and black buttons. The French court ruled in favor of YSL, who had pioneered the design in 1970, and fined Lauren $395,090 for “counterfeiting and disloyal competition.” The decision was the first time a designer’s work was acknowledged as intellectual property.

</span><span class="full" data-dcnode-id="2848"><strong data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Black Hole collection, Viktor &amp; Rolf, fall 2001</span></strong><span data-dcnode-id="2860" instrument_node="">&nbsp;Is blackface the new black? Karl Lagerfeld shot Claudia Schiffer in dark makeup and an Afro wig in 2008; Steven Meisel lensed a blackened Lara Stone for </span><i data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Vogue</span></i><span data-dcnode-id="2857" instrument_node=""> Paris in October 2009; and Beyoncé’s face was darkened in an </span><i data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">African Queen</span></i><span data-dcnode-id="2854" instrument_node="">–inspired editorial in March 2011’s </span><i data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">L’Officiel de la Mode</span></i><span data-dcnode-id="2851" instrument_node="">. But Dutch duo Viktor &amp; Rolf may have kicked off the controversial trend back in 2001, when their all-black collection was shown on models whose faces, limbs, and hair were covered with soot. While admirers of the images claim post-racial multiculturalism and artistic license, others have decried the noir makeup as a moral gray area.  </span><span class="credit" data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Photo: Reuters/Corbis</span></span></span><span data-dcnode-id="2847" instrument_node="">

</span><span class="full" data-dcnode-id="2533"><strong data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Political slogan T-shirts, Katharine Hamnett, 1983</span></strong><span data-dcnode-id="2536" instrument_node="">&nbsp;In 1983, Katharine Hamnett did something deceptively simple: She printed words on a T-shirt. Hamnett’s oversize tops screened with slogans such as “Choose Life,” “Worldwide Nuclear Ban Now,” and “Save the World” turned political statements into fashion statements. At the height of her fame, the designer wore her own “58% Don’t Want Pershing” T-shirt — a reference to the public’s opposition to Pershing missiles — to a meeting with Prime Minister Margaret Thatcher.

</span><span class="full" data-dcnode-id="2365"><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Monokini, Rudi Gernreich, 1964</span></strong><span data-dcnode-id="2368" instrument_node="">&nbsp;&nbsp;In 1964, Rudi Gernreich made a splash with his topless bathing suit — the monokini. Gernreich’s daring design (of which he sold 3,000 at $24 a pop) was denounced by the pope and cited by the Soviets as evidence of capitalist depravity. “Baring these breasts seemed logical in a period of freer attitudes, freer minds [and] the emancipation of women,” said the designer, a left-leaning political activist who also invented the “No-Bra” bra (a foundation garment without underwire or fasteners), the pubikini (a bikini cut low enough to display the pubic hair), and the thong.

</span><span class="full" data-dcnode-id="2264"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Tears dress, The Circus collection, Elsa Schiaparelli and Salvador Dalí, 1938</span></strong><span data-dcnode-id="2270" instrument_node="">&nbsp;Dalí painted three canvases in 1936 depicting figures in slashed, skintight garments; the rips in their clothing and the tears in their flesh were virtually indistinguishable. In 1938, Elsa Schiaparelli (who owned one of the paintings), collaborated with the artist on an evening dress and veil with a </span><i data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">trompe l’oeil</span></i><span data-dcnode-id="2267" instrument_node=""> print imitating flayed skin. The Tears dress suggested the fragility of the body and poetically evoked the horrors of the Spanish Civil War. </span><span class="credit" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Photo: Victoria and Albert Museum, London</span></span></span><span data-dcnode-id="2263" instrument_node="">

</span><i data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Daily Mirror</span></i><span data-dcnode-id="2113" instrument_node="">, September 15, 2005/Hologram Kate, Alexander McQueen, fall 2006, Widows of Culloden</span></strong><span data-dcnode-id="2111" instrument_node="">&nbsp;It was a tale of two videos. On September 15, 2005, the </span><i data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Daily Mirror</span></i><span data-dcnode-id="2108" instrument_node=""> published stills from a grainy video taken of Kate Moss snorting lines of a white powder. The model immediately lost lucrative contracts and checked into rehab. But six months later, Moss reappeared in another video. At the end of Alexander McQueen’s fall 2006 show, the lights dimmed and a puff of white smoke appeared inside a glass pyramid on stage. The cloud gradually assumed the form of the troubled model in a swirling organza dress. Recalling a nineteenth-century device used to create the illusion of a spiritual visitation during a séance, McQueen’s hologram of Moss helped resuscitate her career.  </span><span class="credit" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Photo: Courtesy of The Daily Mirror, Catwalking</span></span></span><span data-dcnode-id="2104" instrument_node="">

Andrej Pejic is an androgynous male model from Melbourne who has walked both the men’s and women’s shows for </span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nymag.com/fashion/fashionshows/designers/bios/jeanpaulgaultier/"><span data-dcnode-id="2058" instrument_node="">Jean Paul Gaultier</span></a><span data-dcnode-id="2056" instrument_node=""> and had a magazine cover wrapped in opaque plastic by Barnes &amp; Noble so he wouldn’t be mistaken for a topless female. Lea T is a transgendered Brazilian model and Riccardo Tisci muse who made her post-op runway debut in São Paulo this January after undergoing gender reassignment surgery. Both are subverting conventional notions of gender and redefining the industry’s definition of beauty by staying true to themselves.  </span><span class="credit" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Photo: Courtesy of Dossier</span></span></span><span data-dcnode-id="2052" instrument_node="">
