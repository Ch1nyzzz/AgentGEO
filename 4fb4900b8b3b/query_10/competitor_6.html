</span><h1 data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_text" data-dcnode-id="822" data-hs-cos-general-type="meta_field" data-hs-cos-type="text" id="hs_cos_wrapper_name" style=""><span data-dcnode-id="823" instrument_node="">Socio-Cultural Aspect of Language Learning</span></span><span data-dcnode-id="821" instrument_node="">
</span></h1><span data-dcnode-id="819" instrument_node="">
					On the 15th of April we celebrate the Universal Day of Culture which was proposed by the Russian artist Nicholas Roerich. Nobody would argue that culture is the basis of all human activity, which e…

					</span><div class="blog-post-hero--date" data-dcnode-id="803"><span data-dcnode-id="818" instrument_node="">
						April 14 2016 
						</span><span data-dcnode-id="816" instrument_node="">
</span><span data-dcnode-id="805"><span data-dcnode-id="815" instrument_node="">
</span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.memrise.com/blog/tag/guest-post"><span data-dcnode-id="814" instrument_node="">Guest Post</span></a><span data-dcnode-id="812" instrument_node="">
</span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.memrise.com/blog/tag/the-joy-of-languages"><span data-dcnode-id="811" instrument_node="">The joy of languages</span></a><span data-dcnode-id="809" instrument_node="">
</span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.memrise.com/blog/tag/culture-around-the-world"><span data-dcnode-id="808" instrument_node="">Culture around the world</span></a><span data-dcnode-id="806" instrument_node="">

</span><div class="row-fluid-wrapper row-depth-1 row-number-2" data-dcnode-id="514"><span data-dcnode-id="781" instrument_node="">
</span><div class="row-fluid" data-dcnode-id="517"><span data-dcnode-id="780" instrument_node="">
</span><div class="span12 widget-span widget-type-custom_widget" data-dcnode-id="520" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="779" instrument_node="">
</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module widget-type-blog_content" data-dcnode-id="522" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_151388194052436" style=""><span data-dcnode-id="778" instrument_node="">
</span><div class="blog-section" data-dcnode-id="524"><span data-dcnode-id="777" instrument_node="">
</span><div class="blog-post-wrapper cell-wrapper" data-dcnode-id="526"><span data-dcnode-id="776" instrument_node="">
</span><div class="container" data-dcnode-id="530"><span data-dcnode-id="775" instrument_node="">
</span><div class="section post-body" data-dcnode-id="532"><span data-dcnode-id="774" instrument_node="">
</span><div class="post-body--row" data-dcnode-id="534"><span data-dcnode-id="773" instrument_node="">
</span><div class="post-body--col post-body--content" data-dcnode-id="605"><span data-dcnode-id="772" instrument_node="">
</span><span data-dcnode-id="770" instrument_node="">
</span><div class="blog-section" data-dcnode-id="609"><span data-dcnode-id="769" instrument_node="">
</span><div class="blog-post-wrapper cell-wrapper" data-dcnode-id="611"><span data-dcnode-id="768" instrument_node="">
</span><div class="section post-body rich-text-wrapper" data-dcnode-id="613"><span data-dcnode-id="767" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="615" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="760"><span data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">On the 15th of April we celebrate&nbsp;</span></span><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">the Universal Day of Culture</span></strong><span data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&nbsp;which was proposed by the Russian artist Nicholas Roerich. Nobody would argue that culture is the basis of all human activity, which explains a large part of our behaviour. Nowadays the relevance of cultural issues has become extremely topical. In recent years, global social, political and economic upheavals have led to unprecedented migration of people. Their relocation and resettlement, of course, leads to the conflict of cultures.</span></span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">At the same time, scientists and representatives of a progressive-minded society are looking for new opportunities and forms of communication to ensure better mutual understanding, effective intercultural dialogue, tolerance and respect for different cultures. All this has led to the fact that people are now paying more attention to intercultural dialogue during their linguistic studies. I would like to expand on the importance of learning not only the language, but also the culture of a country, and the impact of this knowledge on the quality of your language studies.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="752"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">How are culture and language related?</span></strong></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">In fact, how can we ever separate language from the culture of the country? If not the foundation stone, language is, without a doubt, an integral part of any culture and one of the most significant conditions of its existence. Various aspects of cultures, such as mentality, lifestyle, beliefs and values, play a huge role in the field of intercultural communication. However, whilst the language barrier is obvious to us, the culture barrier becomes evident only in case of a collision of our native culture with the one of other people. Besides, cultural mistakes have a more powerful impact on us than linguistic ones. That’s why, I find it indispensable to learn languages through the prism of their countries’ cultures and social specifics.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">How can this socio-cultural knowledge help me?</span></strong></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Paying more attention to the cultural aspect of the country the language of which you are learning may contribute to the quality of your studies in many ways. Socio-cultural competence is a complex notion. However, knowing the ins-and-outs of it will help you feel confident when communicating with a native speaker, give you a sense of belonging to their culture and society, and minimize the possibility of making cultural mistakes and offending your interlocutor in some way.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Besides, socio-cultural knowledge increases the speed of language learning. We all know that learning a foreign language is much easier when you are in the environment where most of the people are speaking it, that’s to say, in its country of origin. Why is it so? Probably, because you are provided with all the required material for developing all of the above-mentioned skills without having the need to gather any information. So, it is obvious that if you have no opportunity to learn a language this way, studying the country’s culture by doing your own research is the best way out.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">I also stick to an opinion that it is almost impossible to learn a language properly if you don’t find the country’s culture appealing to you. Based on my experience, I get really engaged in learning a foreign language only after I find something interesting in the cultures of the countries it is spoken in. The desire to read literature in its original language, watch movies without dubbing or understand what inspiring, powerful people are saying surely motivates you to study harder. As a result, the more you learn about the specifics of the country’s culture, the closer you are to being able to get all the linguistic particularities and, in the end, to literally think in this language.</span></span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="731"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Where do I start</span></strong></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">We found out that loving and embracing the culture of the country is essential for successful language learning. Every culture is unique, all cultures are different, they may seem fascinating or shocking to you, but every culture has something that might deeply interest you. Find this thing and become obsessed with it.</span></span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">So, how exactly can we enhance our knowledge of a foreign language from a cultural perspective. Here are some useful tips for a start. Some of them I find extremely necessary as they helped me much in my studies of different foreign languages.</span></span></p><span data-dcnode-id="722" instrument_node="">
</span><ul data-dcnode-id="716"><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="718"><span data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Learn as many idiomatic expressions as possible and use them in your speech. It is a part of a language that reflects peculiarities of a country’s culture the best way you can imagine. Native speakers will identify you as a member of their community.</span></span></li><span data-dcnode-id="717" instrument_node="">
</span></ul><span data-dcnode-id="715" instrument_node="">
</span><ul data-dcnode-id="709"><span data-dcnode-id="714" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Find out about the customs and traditions of the country. For example, whether it is appropriate to be late, what distance you should keep between your interlocutor and yourself in a face-to-face dialogue just to name a few. This will facilitate oral communication.</span></span></li><span data-dcnode-id="710" instrument_node="">
</span></ul><span data-dcnode-id="708" instrument_node="">
</span><ul data-dcnode-id="702"><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="704"><span data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Contemporary art can be very insightful, so explore it! They reflect current issues in the country.</span></span></li><span data-dcnode-id="703" instrument_node="">
</span></ul><span data-dcnode-id="701" instrument_node="">
</span><ul data-dcnode-id="695"><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="697"><span data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Plunge into cinematography. In this case, it is more useful to study old movies, as nowadays, all industries are trying to copy Hollywood. Check out national festivals to discover art-house movies.</span></span></li><span data-dcnode-id="696" instrument_node="">
</span></ul><span data-dcnode-id="694" instrument_node="">
</span><ul data-dcnode-id="688"><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Literature is of utmost importance. I would recommend finding out about the literature curriculum in the country’s high schools and read those books. In some countries, like Russia, literature is the foundation of culture; people use many expressions that are impossible to understand not having read the books.</span></span></li><span data-dcnode-id="689" instrument_node="">
</span></ul><span data-dcnode-id="687" instrument_node="">
</span><ul data-dcnode-id="681"><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="683"><span data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Today slang is an important part of the communication culture, that’s why it’s useful to learn it too. Furthermore, huge amounts of dialects exist in each country. It can be beneficial to explore the various expressions of different regions.</span></span></li><span data-dcnode-id="682" instrument_node="">
</span></ul><span data-dcnode-id="680" instrument_node="">
</span><ul data-dcnode-id="674"><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Find out which websites are the most popular in the country. Explore and engage in conversation.</span></span></li><span data-dcnode-id="675" instrument_node="">
</span></ul><span data-dcnode-id="673" instrument_node="">
</span><ul data-dcnode-id="667"><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Listen to podcasts that deal with the cultural and social aspects of the country. It will help you deepen your knowledge of current social issues and cultural peculiarities.</span></span></li><span data-dcnode-id="668" instrument_node="">
</span></ul><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Of course, there are other ways of enriching your socio-cultural knowledge, but these ideas are a great start.</span></span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">To conclude, culture is fundamental, there is no escape from it when learning a language, and paying more attention to it can benefit you in many ways. So, go ahead, explore and widen your horizons. Good luck with your studies!</span></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="654"><strong data-dcnode-id="655"><i data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Yelizaveta Kozina</span></i></strong></p><span data-dcnode-id="653" instrument_node="">

</span><p data-dcnode-id="641"><span data-dcnode-id="642"><strong data-dcnode-id="643"><img alt="1" data-dcnode-id="644" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.memrise.com/hs-fs/hubfs/Memrise%2520Blog/Socio-Cultural%2520Aspect%2520of%2520Language%2520Learning/1.jpg%3Fwidth%3D300%26name%3D1.jpg&amp;raw" srcset="https://www.memrise.com/hs-fs/hubfs/Memrise%20Blog/Socio-Cultural%20Aspect%20of%20Language%20Learning/1.jpg?width=150&amp;name=1.jpg 150w, https://www.memrise.com/hs-fs/hubfs/Memrise%20Blog/Socio-Cultural%20Aspect%20of%20Language%20Learning/1.jpg?width=300&amp;name=1.jpg 300w, https://www.memrise.com/hs-fs/hubfs/Memrise%20Blog/Socio-Cultural%20Aspect%20of%20Language%20Learning/1.jpg?width=450&amp;name=1.jpg 450w, https://www.memrise.com/hs-fs/hubfs/Memrise%20Blog/Socio-Cultural%20Aspect%20of%20Language%20Learning/1.jpg?width=600&amp;name=1.jpg 600w, https://www.memrise.com/hs-fs/hubfs/Memrise%20Blog/Socio-Cultural%20Aspect%20of%20Language%20Learning/1.jpg?width=750&amp;name=1.jpg 750w, https://www.memrise.com/hs-fs/hubfs/Memrise%20Blog/Socio-Cultural%20Aspect%20of%20Language%20Learning/1.jpg?width=900&amp;name=1.jpg 900w" style="width: 300px; float: left; margin: 0px 20px 10px 0px;" width="300"></strong></span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="637"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Liza&nbsp;describes&nbsp;herself in 3 hashtags as&nbsp;</span></strong></span><span data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">#sincere #creative #notcourageousenough</span></span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="632" instrument_node="">She’s currently</span><span data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">&nbsp;</span></span><span data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">studying PR and Advertising in&nbsp;Moscow, alongside working in a creative agency specialising in digital communication.&nbsp;</span></span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">“I’ve always been amazed by foreigners who learn to&nbsp;speak Russian. In my mind, it’s one of the most difficult languages. I know how complicated this language is, that’s why I find it truly fascinating that foreigners succeed in learning it.</span></span><span data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">&nbsp;So I thought that I’d love to help them a little bit. I think enriching a vocabulary of a foreign language is a bit difficult and the process is quite slow, so I thought that following a tumblr blog and getting one new word a day to learn is a very simple yet entertaining way to enrich your vocabulary,” she told me when I asked about her tumblr account.&nbsp;</span></span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="619" instrument_node="">Follow her&nbsp;</span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rashn.tumblr.com/"><span data-dcnode-id="618" instrument_node="">on Tumblr!</span></a></p></span><span data-dcnode-id="614" instrument_node="">
