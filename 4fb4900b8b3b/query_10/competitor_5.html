        A Brief Overview On Idiomatic Translation


        </span></font></h4><span data-dcnode-id="1551" instrument_node="">
</span><p align="center" class="byline" data-dcnode-id="1538"><span data-dcnode-id="1550" instrument_node=""> 



        By Negar Eftekhari,</span><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">
A Post-Graduate Student ,</span><br data-dcnode-id="1547"><span data-dcnode-id="1546" instrument_node="">
at the University of Isfahan, Iran,</span><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">
</span><br data-dcnode-id="1543"><span data-dcnode-id="1542" instrument_node="">
</span><font color="blue" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">negar . eftekhari at gmail  com</span></font><span data-dcnode-id="1539" instrument_node="">
</span></p><span data-dcnode-id="1537" instrument_node="">
</span><br data-dcnode-id="1536"><span data-dcnode-id="1535" instrument_node="">
</span><p align="center" data-dcnode-id="1528"><span data-dcnode-id="1534" instrument_node="">
</span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.translationdirectory.com/membership.php"><font color="#CE0000" data-dcnode-id="1530" face="Verdana" size="4"><b data-dcnode-id="1531"><u data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Become a member of TranslationDirectory.com at just 

$8 per month (paid per year)</span></u></b></font></a></p><span data-dcnode-id="1527" instrument_node="">
</span><hr color="#cfcfcf" data-dcnode-id="1526" size="1"><span data-dcnode-id="1525" instrument_node="">
</span><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node=""> </span><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node="">
</span><div class="Section1" data-dcnode-id="1416" dir="RTL"><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1516" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="1517"><span data-dcnode-id="1518" lang="EN-US"><span data-dcnode-id="1519" instrument_node="">Introduction</span></span></b></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1510" dir="LTR"><span data-dcnode-id="1513" lang="EN-US"><span data-dcnode-id="1514" instrument_node="">T</span></span><span data-dcnode-id="1511" lang="EN-US"><span data-dcnode-id="1512" instrument_node="">ranslation typically has been used to transfer written or spoken SL 
                        texts to equivalent written or spoken TL texts. In general, 
                        the purpose of translation is to reproduce various kinds 
                        of texts—including religious, literary, scientific, and 
                        philosophical texts—in another language and thus making 
                        them available to wider readers.</span></span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1506" dir="LTR"><span data-dcnode-id="1507" lang="EN-US"><span data-dcnode-id="1508" instrument_node="">If language were just a classification 
                        for a set of general or universal concepts, it would be 
                        easy to translate from an SL to a TL; furthermore, under 
                        the circumstances the process of learning an L2 would 
                        be much easier than it actually is. In this regard, Culler 
                        (1976) believes that languages are not nomenclatures and 
                        the concepts of one language may differ radically from 
                        those of another, since each language articulates or organizes 
                        the world differently, and languages do not simply name 
                        categories; they articulate their own (p.21-2). The conclusion 
                        likely to be drawn from what Culler (1976) writes is that 
                        one of the troublesome problems of translation is the 
                        disparity among languages. The bigger the gap between 
                        the SL and the TL, the more difficult the transfer of 
                        message from the former to the latter will be.</span></span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1502" dir="LTR"><span data-dcnode-id="1503" lang="EN-US"><span data-dcnode-id="1504" instrument_node="">The difference between an 
                        SL and a TL and the variation in their cultures make the 
                        process of translating a real challenge. Among the problematic 
                        factors involved in translation such as form, meaning, 
                        style, proverbs, idioms, etc., the present paper is going 
                        to concentrate mainly on the procedures of translating 
                        CSCs in general and on the strategies of rendering allusions 
                        in particular. </span></span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1497" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><b data-dcnode-id="1498"><span data-dcnode-id="1499" lang="EN-US"><span data-dcnode-id="1500" instrument_node="">Problems of equivalence</span></span></b></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1493" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1494" lang="EN-US"><span data-dcnode-id="1495" instrument_node="">The translation of idioms 
                        takes us a stage further in considering the question of 
                        meaning and translation, for idioms, like puns, are culture 
                        bound. When two languages have corresponding idiomatic 
                        expressions that render the idea of prevarication, and 
                        so in the process of interlingual translation one idiom 
                        is substituted for another. That substitution is made 
                        not on the basis of the linguistic elements in the phrase, 
                        nor on the basis of a corresponding or similar image contained 
                        in the phrase, but on the function of the idiom. The SL 
                        phrase is replaced by a TL phrase that serves the same 
                        purpose in the TL culture, and the process involves the 
                        substitution of SL sign for TL sign.</span></span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1489" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1490" lang="EN-US"><span data-dcnode-id="1491" instrument_node="">Dagut's distinction between 'translation' and 'reproduction', 
                        like Catford's distinction between 'literal' and 'free' 
                        translation does not take into account the view that sees 
                        translation as semiotic transformation. In his definition 
                        of translation equivalence, Popovic distinguishes four 
                        types:</span></span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1482" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1483" lang="EN-US"><span data-dcnode-id="1487" instrument_node="">(1) </span><i data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Linguistic equivalence, </span></i><span data-dcnode-id="1484" instrument_node="">where there is homogeneity 
                        on the linguistic level of both SL and TL texts, i.e. 
                        word for word translation.</span></span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1475" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1476" lang="EN-US"><span data-dcnode-id="1480" instrument_node="">(2) </span><i data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Paradigmatic equivalence, </span></i><span data-dcnode-id="1477" instrument_node="">where there is equivalence 
                        of 'the elements of a paradigmatic expressive axis', i.e. 
                        elements of grammar, which Popovic sees as being a higher 
                        category than lexical equivalence.</span></span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1468" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1469" lang="EN-US"><span data-dcnode-id="1473" instrument_node="">(3) </span><i data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Stylistic (translational) equivalence, </span></i><span data-dcnode-id="1470" instrument_node="">where 
                        there is 'functional equivalence of elements in both original 
                        and translation aiming at an expressive identity with 
                        an invariant of identical meaning'.</span></span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1461" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1462" lang="EN-US"><span data-dcnode-id="1466" instrument_node="">(4) </span><i data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Textual (syntagmatic) equivalence, </span></i><span data-dcnode-id="1463" instrument_node="">where there 
                        is equivalence of the syntagmatic structuring of a text, 
                        i.e. equivalence of form and shape.</span></span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1457" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1458" lang="EN-US"><span data-dcnode-id="1459" instrument_node=""> Translation involves far more than replacement of lexical 
                        and grammatical items between languages and, as can be 
                        seen in the translation of idioms, the process may involve 
                        discarding the basic linguistic elements of the SL text 
                        so as to achieve Popovic's goal of 'expressive identity' 
                        between the SL and TL texts. But once the translator moves 
                        away from close linguistic equivalence, the problems of 
                        determining the exact nature of the level of equivalence 
                        aimed for begin to emerge.</span></span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1447" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1448" lang="EN-US"><span data-dcnode-id="1455" instrument_node="">Albrecht Neubert, whose work on translation is unfortunately 
                        not available to English readers, distinguishes between 
                        the study of translation as a </span><i data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">process</span></i><span data-dcnode-id="1452" instrument_node=""> and as a 
                        </span><i data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">product. </span></i><span data-dcnode-id="1449" instrument_node="">He states bluntly that: 'the "missing 
                        link" between both components of a complete theory 
                        of translations appears to be the theory of equivalence 
                        relations that can be conceived for both the dynamic and 
                        the static model. The problem of equivalence, a much-used 
                        and abused term in Translation Studies, is of central 
                        importance, and although Neubert is right when he stresses 
                        the need for a theory of equivalence relations, Raymond 
                        van den Broeck is also right when he challenges the excessive 
                        use of the term in Translation Studies and claims that 
                        the precise definition of equivalence in mathematics is 
                        a serious obstacle to its use in translation theory.</span></span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1428" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1429" lang="EN-US"><span data-dcnode-id="1445" instrument_node="">Generally speaking, collocations 
                        are fairly flexible patterns of language which allow several 
                        variations in form. For example, </span><i data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">deliver a letter, 
                        delivery of a letter, a letter has been delivered, </span></i><span data-dcnode-id="1442" instrument_node="">and 
                        </span><i data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">having delivered a letter </span></i><span data-dcnode-id="1439" instrument_node="">are all acceptable collocations. 
                        In addition, although the meaning of a word often depends 
                        on what other words it occurs with, we can still say that 
                        the word in question has an individual meaning in a given 
                        collocation. Thus, </span><i data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">dry cow</span></i><span data-dcnode-id="1436" instrument_node=""> means a cow which does 
                        not produce milk. We can still identify a particular meaning 
                        associated with the word </span><i data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">dry</span></i><span data-dcnode-id="1433" instrument_node=""> in this collocation, 
                        and, of course, </span><i data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">cow </span></i><span data-dcnode-id="1430" instrument_node="">still retains its familiar 
                        meaning of 'a farm animal kept for its milk'. Idioms and 
                        fixed expressions are at the extreme end of the scale 
                        from collocations in one or both of these areas: flexibility 
                        of patterning and transparency of meaning. They are frozen 
                        patterns of language which allow little or no variation 
                        in form and, in the case of idioms, often carry meanings 
                        which cannot be deduced from their individual components.</span></span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1418" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1419" lang="EN-US"><span data-dcnode-id="1426" instrument_node="">In other words, one class 
                        of figurative expressions which occurs in all expressions 
                        of "at least two words which cannot be understood 
                        literally and which function as a unit semantically" 
                        (Beekman and Callow 1974: 121). An idiom such as </span><i data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">bury 
                        the hatchet </span></i><span data-dcnode-id="1423" instrument_node="">('to become friendly again after a disagreement 
                        or a quarrel') or </span><i data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">the long and the short of it </span></i><span data-dcnode-id="1420" instrument_node="">('the 
                        basic facts of the situation') allows no variation in 
                        form under normal circumstances. Unless s/he is consciously 
                        making a joke or attempting a play on words, a speaker 
                        or writer cannot normally do any of the following with 
                        an idiom:</span></span></p><span data-dcnode-id="1417" instrument_node="">
</span></div><span data-dcnode-id="1415" instrument_node="">
</span><blockquote data-dcnode-id="1369"><span data-dcnode-id="1414" instrument_node="">
</span><div class="Section1" data-dcnode-id="1398" dir="LTR" style="text-align:justify;direction:ltr;unicode-bidi:
embed"><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" lang="EN-US"><span data-dcnode-id="1412" instrument_node="">1. change the order of the words 
                          in it (e.g. *'the </span><i data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">short</span></i><span data-dcnode-id="1409" instrument_node=""> and the </span><i data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">long</span></i><span data-dcnode-id="1406" instrument_node=""> of 
                          it');</span></span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" lang="EN-US"><span data-dcnode-id="1402" instrument_node="">2. delete a word from it (e.g. *'spill 
                          beans');</span></span></p><span data-dcnode-id="1399" instrument_node="">
</span></div><span data-dcnode-id="1397" instrument_node="">
</span><div class="Section1" data-dcnode-id="1371" dir="LTR" style="text-align:justify;direction:ltr;unicode-bidi:
embed"><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" lang="EN-US"><span data-dcnode-id="1395" instrument_node="">3. add a word to it (e.g. *'the </span><i data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">very</span></i><span data-dcnode-id="1392" instrument_node=""> 
                          long and short of it'; *'face the </span><i data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">classical </span></i><span data-dcnode-id="1389" instrument_node="">music');</span></span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" lang="EN-US"><span data-dcnode-id="1385" instrument_node="">4. replace a word with another (e.g. 
                          *'the </span><i data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">tall </span></i><span data-dcnode-id="1382" instrument_node="">and the short of it'; *'bury </span><i data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">a</span></i><span data-dcnode-id="1379" instrument_node=""> 
                          hatchet');</span></span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" lang="EN-US"><span data-dcnode-id="1375" instrument_node="">5. change its grammatical structure 
                          (e.g. *'the music was faced').</span></span></p><span data-dcnode-id="1372" instrument_node="">
</span></div><span data-dcnode-id="1370" instrument_node="">
</span></blockquote><span data-dcnode-id="1368" instrument_node="">
</span><div class="Section1" data-dcnode-id="752" dir="RTL"><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1337" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1338" lang="EN-US"><span data-dcnode-id="1366" instrument_node="">As their name suggests, fixed 
                        expressions such as </span><i data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">having said that, as a matter of 
                        fact, ladies and gentlemen, </span></i><span data-dcnode-id="1363" instrument_node="">and </span><i data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">all the best,</span></i><span data-dcnode-id="1360" instrument_node=""> 
                        as well as proverbs such as </span><i data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">practice what you preach 
                        </span></i><span data-dcnode-id="1357" instrument_node="">and </span><i data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">waste not want not, </span></i><span data-dcnode-id="1354" instrument_node="">allow little or no 
                        variation in form. In this respect, they behave very much 
                        like idioms. Unlike idioms, however, fixed expressions 
                        and proverbs often have fairly transparent meanings. The 
                        meaning of </span><i data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">as a matter of fact </span></i><span data-dcnode-id="1351" instrument_node="">can easily be deduced 
                        from the meanings of the words which constitute it, unlike 
                        the meaning of an idiom such as </span><i data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">pull a fast one </span></i><span data-dcnode-id="1348" instrument_node="">or 
                        </span><i data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">fill the bill. </span></i><span data-dcnode-id="1345" instrument_node="">But in spite of its transparency, 
                        the meaning of a fixed expression or proverb is somewhat 
                        more than the sum meanings of its words; the expression 
                        has to be taken as one unit to establish meaning. This 
                        is true of any fixed, recurring pattern of the language. 
                        Encountering any fixed expression conjures up in the mind 
                        of the reader or hearer all the aspects of experience 
                        which are associated with the typical contexts in which 
                        the expression is used. It is precisely this feature which 
                        lies behind the widespread use of fixed and semi-fixed 
                        expressions in any language. They encapsulate all the 
                        stereotyped aspects of experience and therefore perform 
                        a stabilizing function in communication. Situation- or 
                        register- specific formulae such as </span><i data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Mary happy returns, 
                        Merry Christmas, Further to your letter of …, </span></i><span data-dcnode-id="1342" instrument_node="">and 
                        </span><i data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Yours sincerely </span></i><span data-dcnode-id="1339" instrument_node="">are particularly good examples 
                        of the stabilizing role and the special status that a 
                        fixed expression can assume in communication.</span></span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1333" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1334" lang="EN-US"><span data-dcnode-id="1335" instrument_node="">Examples are given below by 
                        giving a very literal translation in the first column 
                        and an idiomatic English equivalent in the second column 
                        (Ham 1956: 2).</span></span></p><span data-dcnode-id="1332" instrument_node="">
</span><span data-dcnode-id="1331" instrument_node="">
</span><span data-dcnode-id="1330" instrument_node="">
</span><span data-dcnode-id="1324" instrument_node="">
</span><span data-dcnode-id="1318" instrument_node="">
</span><span data-dcnode-id="1316" instrument_node="">
</span><span data-dcnode-id="1315" instrument_node="">
</span><span data-dcnode-id="1310" instrument_node="">
</span><span data-dcnode-id="1305" instrument_node="">
</span><span data-dcnode-id="1303" instrument_node="">

                              English</span></span></strong></div></td></tr><tr data-dcnode-id="1304"><td data-dcnode-id="1311"><i data-dcnode-id="1312"><span data-dcnode-id="1313" lang="EN-US"><span data-dcnode-id="1314" instrument_node="">I don't have my eye on you.</span></span></i></td><td data-dcnode-id="1306"><i data-dcnode-id="1307"><span data-dcnode-id="1308" lang="EN-US"><span data-dcnode-id="1309" instrument_node="">I don't remember you.</span></span></i></td></tr><tr data-dcnode-id="1291"><td data-dcnode-id="1298"><i data-dcnode-id="1299"><span data-dcnode-id="1300" lang="EN-US"><span data-dcnode-id="1301" instrument_node="">I've already buried my eye.</span></span></i></td><td data-dcnode-id="1293"><i data-dcnode-id="1294"><span data-dcnode-id="1295" lang="EN-US"><span data-dcnode-id="1296" instrument_node="">I'm already ready to go.</span></span></i></td></tr><tr data-dcnode-id="1278"><td data-dcnode-id="1285"><i data-dcnode-id="1286"><span data-dcnode-id="1287" lang="EN-US"><span data-dcnode-id="1288" instrument_node="">I'll pull your eyelid.</span></span></i></td><td data-dcnode-id="1280"><i data-dcnode-id="1281"><span data-dcnode-id="1282" lang="EN-US"><span data-dcnode-id="1283" instrument_node="">I'll ask a favor of you.</span></span></i></td></tr><tr data-dcnode-id="1265"><td data-dcnode-id="1272"><i data-dcnode-id="1273"><span data-dcnode-id="1274" lang="EN-US"><span data-dcnode-id="1275" instrument_node="">My eye is hard on you.</span></span></i></td><td data-dcnode-id="1267"><i data-dcnode-id="1268"><span data-dcnode-id="1269" lang="EN-US"><span data-dcnode-id="1270" instrument_node="">I remember you.</span></span></i></td></tr><tr data-dcnode-id="1252"><td data-dcnode-id="1259"><i data-dcnode-id="1260"><span data-dcnode-id="1261" lang="EN-US"><span data-dcnode-id="1262" instrument_node="">My head is strong.</span></span></i></td><td data-dcnode-id="1254"><i data-dcnode-id="1255"><span data-dcnode-id="1256" lang="EN-US"><span data-dcnode-id="1257" instrument_node="">I'm stubborn, insistent.</span></span></i></td></tr><tr data-dcnode-id="1239"><td data-dcnode-id="1246"><i data-dcnode-id="1247"><span data-dcnode-id="1248" lang="EN-US"><span data-dcnode-id="1249" instrument_node="">I'll do it with my head.</span></span></i></td><td data-dcnode-id="1241"><i data-dcnode-id="1242"><span data-dcnode-id="1243" lang="EN-US"><span data-dcnode-id="1244" instrument_node="">I'll do it the way I think it should be done.</span></span></i></td></tr><tr data-dcnode-id="1226"><td data-dcnode-id="1233"><i data-dcnode-id="1234"><span data-dcnode-id="1235" lang="EN-US"><span data-dcnode-id="1236" instrument_node="">His ear is rotten.</span></span></i></td><td data-dcnode-id="1228"><i data-dcnode-id="1229"><span data-dcnode-id="1230" lang="EN-US"><span data-dcnode-id="1231" instrument_node="">He is spoiled.</span></span></i></td></tr><tr data-dcnode-id="1213"><td data-dcnode-id="1220"><i data-dcnode-id="1221"><span data-dcnode-id="1222" lang="EN-US"><span data-dcnode-id="1223" instrument_node="">I ate in your tooth cavity.</span></span></i></td><td data-dcnode-id="1215"><i data-dcnode-id="1216"><span data-dcnode-id="1217" lang="EN-US"><span data-dcnode-id="1218" instrument_node="">I ate in your absence.</span></span></i></td></tr></tbody></table><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1203" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1204" lang="EN-US"><span data-dcnode-id="1208" instrument_node="">The same translation principles 
                        apply for </span><b data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">idioms </span></b><span data-dcnode-id="1205" instrument_node="">as for other figures of speech. 
                        Sometimes it will be necessary to translate with a nonfigurative 
                        expression, but sometimes a good receptor language idiom 
                        may be used. The translator needs to learn to recognize 
                        the idioms and other figures of speech of the source text. 
                        The real danger comes in translating an idiom literally, 
                        since the result will usually be nonsense in the receptor 
                        language.</span></span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1193" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1194" lang="EN-US"><span data-dcnode-id="1201" instrument_node="">The translator also needs 
                        to develop a sensitivity to the use of idioms in the receptor 
                        language and use them naturally to make the translation 
                        lively and keep the style of the source language. There 
                        will often be words in the source language which are not 
                        idioms, but are best translated with an idiom. For example, 
                        the word </span><i data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">peace</span></i><span data-dcnode-id="1198" instrument_node=""> is often translated with the idiom 
                        </span><i data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">to sit down in the heart </span></i><span data-dcnode-id="1195" instrument_node="">in Africa (Nida and Taber 
                        1969: 106).</span></span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1188" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="1189"><span data-dcnode-id="1190" lang="EN-US"><span data-dcnode-id="1191" instrument_node="">Idioms, fixed expressions, and the direction of translation</span></span></b></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1184" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1185" lang="EN-US"><span data-dcnode-id="1186" instrument_node="">Although most idioms resist variation in form, some are 
                        more flexible than others. A person's competence in actively 
                        using the idioms and fixed expressions of a foreign language 
                        hardly ever matches that of a native speaker. The majority 
                        of translators working into a&nbsp;foreign language cannot 
                        hope to achieve the same sensitivity that native speakers 
                        seem to have for judging when and how an idiom can be 
                        manipulated. This lends support to the argument that translators 
                        should only work into their language of habitual use or 
                        mother tongue. </span></span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1180" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1181" lang="EN-US"><span data-dcnode-id="1182" instrument_node="">Assuming that a professional translator would, under 
                        normal circumstances, work only into his/her language 
                        of habitual use, the difficulties associated with being 
                        able to use idioms and fixed expressions correctly in 
                        a foreign language need not be addressed here. The main 
                        problems that idiomatic and fixed expressions pose in 
                        translation relate to two main areas: the ability to recognize 
                        and interpret an idiom correctly; and the difficulties 
                        involved in rendering the various aspects of meaning that 
                        an idiom or a fixed expression conveys into the target 
                        language. These difficulties are much more pronounced 
                        in the case of idioms than they are in the case of fixed 
                        expressions.</span></span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="1176"><span data-dcnode-id="1177" lang="EN-US"><span data-dcnode-id="1178" instrument_node="">The interpretation of idioms</span></span></b></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1150" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1151" lang="EN-US"><span data-dcnode-id="1173" instrument_node="">As far as idioms are concerned, the first difficulty 
                        that a translator comes across is being able to recognize 
                        that s/he is dealing with an idiomatic expression. This 
                        is not always so obvious. There are various types of idioms, 
                        some more easily recognizable than others. Those which 
                        are easily recognizable include expressions which violate 
                        truth conditions, such as </span><i data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">It's raining cats and dogs, 
                        throw caution to the winds, storm in a tea cup, jump down 
                        someone's throat, </span></i><span data-dcnode-id="1170" instrument_node="">and </span><i data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">food for thought. </span></i><span data-dcnode-id="1167" instrument_node="">They 
                        also include expressions which seem ill-formed because 
                        they do not follow the grammatical rules of the language, 
                        for example </span><i data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">trip the light fantastic, blow someone 
                        to kingdom come, put paid to, the powers that be, by and 
                        large, </span></i><span data-dcnode-id="1164" instrument_node="">and </span><i data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">the world and his friend. </span></i><span data-dcnode-id="1161" instrument_node="">Expressions 
                        which start with </span><i data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">like </span></i><span data-dcnode-id="1158" instrument_node="">(simile-like structures) 
                        also tend to suggest that they should not be interpreted 
                        literally. These include idioms such as </span><i data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">like a bat 
                        out of hell </span></i><span data-dcnode-id="1155" instrument_node="">and </span><i data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">like water off a duck's back. </span></i><span data-dcnode-id="1152" instrument_node="">Generally 
                        speaking, the more difficult an expression is to understand 
                        and the less sense it makes in a given context, the more 
                        likely a translator will recognize it as an idiom. Because 
                        they do not following text are easy to recognize as idioms 
                        (assuming one is not already familiar with them).</span></span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1146" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1147" lang="EN-US"><span data-dcnode-id="1148" instrument_node=""> Provided a translator has access to good references 
                        works and monolingual dictionaries of idioms, or, better 
                        still, is able to consult native speakers of the language, 
                        opaque idioms which do not make sense for one reason or 
                        another can actually be a blessing in disguise. The very 
                        fact that s/he cannot make sense of an expression in a 
                        particular context will alert the translator to the presence 
                        of an idiom of some sort.</span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1142" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1143" lang="EN-US"><span data-dcnode-id="1144" instrument_node="">There are two cases in which an idiom can be easily misinterpreted 
                        if one is not already familiar with it.</span></span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1122" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1131" lang="EN-US"><span data-dcnode-id="1140" instrument_node="">a) Some idioms are 'misleading'; they seem transparent 
                        because they offer a reasonable literal interpretation 
                        and their idiomatic meanings are not necessarily signaled 
                        in the surrounding text. A large number of idioms in English, 
                        and probably all languages, have both a literal and an 
                        idiomatic meaning, for example </span><i data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">go out with </span></i><span data-dcnode-id="1137" instrument_node="">('have 
                        a romantic or sexual relationship with someone') and </span><i data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">take 
                        someone for a ride </span></i><span data-dcnode-id="1134" instrument_node="">('deceive or cheat someone in some 
                        way'). Such idioms lend themselves easily to manipulation 
                        by speakers and writers who will sometimes play on both 
                        their literal and idiomatic meanings. In this case, a 
                        translator who is not familiar with the idiom in question 
                        may easily accept the literal interpretation and miss 
                        the play on idiom. In Farsi we have such idioms like</span><i data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">: 
                        </span></i></span><i data-dcnode-id="1128"><span data-dcnode-id="1129" dir="RTL" lang="FA"><span data-dcnode-id="1130" instrument_node="">بازی در آورده 
                        ، به درد من 
                        نمی خورد</span></span></i><span data-dcnode-id="1127" dir="LTR"></span><i data-dcnode-id="1123"><span data-dcnode-id="1124" lang="EN-US"><span data-dcnode-id="1126" dir="LTR"></span><span data-dcnode-id="1125" instrument_node=""> .</span></span></i></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1115" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1116" lang="EN-US"><span data-dcnode-id="1120" instrument_node="">b) An idiom in the source language may have a very close 
                        counterpart in the target language which looks similar 
                        on the surface but has a totally or partially different 
                        meaning. For example, the idiomatic question </span><i data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Has the 
                        cat had/got your tongue? </span></i><span data-dcnode-id="1117" instrument_node="">is used in English to urge 
                        someone to answer a question or contribute to a conversation, 
                        particularly when their failure to do so becomes annoying. 
                        Instances of superficially identical or similar idioms 
                        which have different meanings in the source and target 
                        languages lay easy traps for the unwary translator who 
                        is not familiar with the source-language idiom and who 
                        may be tempted simply to impose a target-language interpretation 
                        on it.</span></span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1082" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1091" lang="EN-US"><span data-dcnode-id="1113" instrument_node=""> Apart from being alert to the way speakers and writers 
                        manipulate certain features of idioms and to the possible 
                        confusion which could arise from similarities in form 
                        between source and target expressions, a translator must 
                        also consider the collocational environment which surrounds 
                        any expression whose meaning is not readily accessible. 
                        Idiomatic and fixed expressions have individual collocational 
                        patterns. They form collocations with other items in the 
                        text as single units and enter into lexical sets which 
                        are different from those of their individual words. Take, 
                        for instance, the idiom </span><i data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">to have cold feet. Cold </span></i><span data-dcnode-id="1110" instrument_node="">as 
                        a separate item may collocate with words like </span><i data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">weather, 
                        winter, feel, </span></i><span data-dcnode-id="1107" instrument_node="">or </span><i data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">country. Feet </span></i><span data-dcnode-id="1104" instrument_node="">on its own will 
                        perhaps collocate with </span><i data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">socks, chilblain, smelly, </span></i><span data-dcnode-id="1101" instrument_node="">etc. 
                        however, </span><i data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">having cold feet, </span></i><span data-dcnode-id="1098" instrument_node="">in its idiomatic use, 
                        has nothing necessarily to do with </span><i data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">winter, feet, </span></i><span data-dcnode-id="1095" instrument_node="">or 
                        </span><i data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">chilblains</span></i><span data-dcnode-id="1092" instrument_node=""> and will therefore generally be used 
                        with a different set of collocates. In Farsi there are 
                        many idioms like that: </span></span><i data-dcnode-id="1088"><span data-dcnode-id="1089" dir="RTL" lang="FA"><span data-dcnode-id="1090" instrument_node="">خم 
                        به ابرو نیاوردن 
                        ، دل به دریا 
                        زدن ، سوهان 
                        روح بودن </span></span></i><span data-dcnode-id="1087" dir="LTR"></span><i data-dcnode-id="1083"><span data-dcnode-id="1084" lang="EN-US"><span data-dcnode-id="1086" dir="LTR"></span><span data-dcnode-id="1085" instrument_node="">&nbsp;.</span></span></i></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1078" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1079" lang="EN-US"><span data-dcnode-id="1080" instrument_node=""> The ability to distinguish senses by collocation is 
                        an invaluable asset to a translator working form a foreign 
                        language. It is often subsumed under the general umbrella 
                        of 'relying on the context to disambiguate meanings', 
                        which, among other things, means using our knowledge of 
                        collocational patterns to decode the meaning of a word 
                        or a stretch of language. Using our knowledge of collocational 
                        patterns may not always tell us what an idiom means but 
                        it could easily help us in many cases to recognize an 
                        idiom, particularly one which has a literal as well as 
                        a non-literal meaning.</span></span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1073" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="1074"><span data-dcnode-id="1075" lang="EN-US"><span data-dcnode-id="1076" instrument_node="">The translation of idioms: difficulties</span></span></b></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1069" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1070" lang="EN-US"><span data-dcnode-id="1071" instrument_node="">Once an idiom or fixed expression has been recognized 
                        and interpreted correctly, the next step is to decide 
                        how to translate it into the target language. The difficulties 
                        involved in translating an idiom are totally different 
                        from those involved in interpreting it. Here, the question 
                        is not whether a given idiom is transparent, opaque, or 
                        misleading. An opaque expression may be easier to translate 
                        than a transparent one. The main difficulties involved 
                        in translating idioms and fixed expressions may be summarized 
                        as follows:</span></span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1065" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1066" lang="EN-US"><span data-dcnode-id="1067" instrument_node="">a) An idiom or fixed expression may have no equivalent 
                        in the target language. The way a language chooses to 
                        express, or not express, various meanings cannot be predicted 
                        and only occasionally matches the way another language 
                        chooses to express the same meanings. One language may 
                        express a given meaning by means of a single word, another 
                        may express it by means of a transparent fixed expression, 
                        a third may express it by means of an idiom, and so on. 
                        It is therefore unrealistic to expect to find equivalent 
                        idioms and expressions in the target languages as matter 
                        of course.</span></span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1052" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1053" lang="EN-US"><span data-dcnode-id="1063" instrument_node="">Like single words, idioms and fixed expressions may be 
                        culture-specific. Formulae such as </span><i data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Merry Christmas 
                        </span></i><span data-dcnode-id="1060" instrument_node="">and </span><i data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">say when </span></i><span data-dcnode-id="1057" instrument_node="">which relate to specific social 
                        or religious occasions provide good examples. Basnett-McGuire 
                        (1980: 21) explains that the expression </span><i data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">say when </span></i><span data-dcnode-id="1054" instrument_node="">'is… 
                        directly linked to English social behavioral patterns' 
                        and suggests that 'the translator putting the phrase into 
                        French or German has to contend with the problem of the 
                        non-existence of a similar convention in either TL culture'. 
                        </span></span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1035" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="1046" lang="EN-US"><span data-dcnode-id="1050" instrument_node="">Idioms and fixed expressions which contain culture-specific 
                        items are not necessarily untranslatable. It is not the 
                        specific items an expression contains but rather the meaning 
                        it conveys and its association with culture-specific contexts 
                        which can make it untranslatable or difficult to translate. 
                        It is not the specific items an expression contains but 
                        rather the meaning it conveys and its association with 
                        culture-specific contexts which can make it untranslatable 
                        or difficult to translate. For example, the English expression 
                        </span><i data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">he doesn't care a fig, </span></i><span data-dcnode-id="1047" instrument_node="">is nevertheless closely 
                        paralleled in Farsi by </span></span><i data-dcnode-id="1043"><span data-dcnode-id="1044" dir="RTL" lang="FA"><span data-dcnode-id="1045" instrument_node="">ککش هم نمی گزد 
                        </span></span></i><span data-dcnode-id="1042" dir="LTR"></span><span data-dcnode-id="1039" lang="EN-US"><span data-dcnode-id="1041" dir="LTR"></span><span data-dcnode-id="1040" instrument_node="">. Both expressions convey 
                        the same meaning. We have many others in Farsi like: </span></span><i data-dcnode-id="1036"><span data-dcnode-id="1037" dir="RTL" lang="FA"><span data-dcnode-id="1038" instrument_node="">تشریف نداشتید 
                        ، چشم شما روشن 
                        ، دست شما درد 
                        نکند.</span></span></i></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="995" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="1029" lang="EN-US"><span data-dcnode-id="1033" instrument_node="">b) An idiom or fixed expression 
                        may have a similar counterpart in the target language, 
                        but its context of use may be different; the two expressions 
                        may have different connotations, for instance, or they 
                        may not be pragmatically transferable. </span><i data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">To sing a different 
                        tune </span></i><span data-dcnode-id="1030" instrument_node="">is an English idiom which means to say or do 
                        something that signals a change in opinion because it 
                        contradicts what one has said or done before. In Farsi 
                        </span></span><i data-dcnode-id="1026"><span data-dcnode-id="1027" dir="RTL" lang="FA"><span data-dcnode-id="1028" instrument_node="">زدن</span></span></i><span data-dcnode-id="1025" dir="LTR"></span><i data-dcnode-id="1021"><span data-dcnode-id="1022" lang="FA"><span data-dcnode-id="1024" dir="LTR"></span><span data-dcnode-id="1023" instrument_node=""> </span></span></i><i data-dcnode-id="1018"><span data-dcnode-id="1019" dir="RTL" lang="FA"><span data-dcnode-id="1020" instrument_node="">مخالف</span></span></i><span data-dcnode-id="1017" dir="LTR"></span><i data-dcnode-id="1013"><span data-dcnode-id="1014" lang="FA"><span data-dcnode-id="1016" dir="LTR"></span><span data-dcnode-id="1015" instrument_node=""> </span></span></i><i data-dcnode-id="1010"><span data-dcnode-id="1011" dir="RTL" lang="FA"><span data-dcnode-id="1012" instrument_node="">ساز</span></span></i><span data-dcnode-id="1009" dir="LTR"></span><span data-dcnode-id="1006" lang="EN-US"><span data-dcnode-id="1008" dir="LTR"></span><span data-dcnode-id="1007" instrument_node=""> also normally refers to 
                        contradictory points of view, but has quite a different 
                        usage. (Or: </span></span><i data-dcnode-id="1003"><span data-dcnode-id="1004" dir="RTL" lang="FA"><span data-dcnode-id="1005" instrument_node="">حالش جا آمد</span></span></i><span data-dcnode-id="1002" dir="LTR"></span><i data-dcnode-id="998"><span data-dcnode-id="999" lang="FA"><span data-dcnode-id="1001" dir="LTR"></span><span data-dcnode-id="1000" instrument_node=""> </span></span></i><span data-dcnode-id="996" lang="EN-US"><span data-dcnode-id="997" instrument_node="">in Farsi).</span></span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="972" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="983" lang="EN-US"><span data-dcnode-id="993" instrument_node="">c) An idiom may be used in 
                        the source text in both its literal and idiomatic senses 
                        at the same time. Unless the target-language idiom corresponds 
                        to the source-language idiom both in form and in meaning, 
                        the play on idiom cannot be successfully reproduced in 
                        the target text. E.g. </span><i data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">He was deaf to his father's</span></i><span data-dcnode-id="990" instrument_node="">
</span><i data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">advice</span></i><span data-dcnode-id="987" instrument_node="">. Or: </span><i data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">I ran short of money last week</span></i><span data-dcnode-id="984" instrument_node="">. 
                        Or: </span></span><i data-dcnode-id="980"><span data-dcnode-id="981" dir="RTL" lang="FA"><span data-dcnode-id="982" instrument_node="">باورداشتن</span></span></i><span data-dcnode-id="979" dir="LTR"></span><span data-dcnode-id="973" lang="EN-US"><span data-dcnode-id="978" dir="LTR"></span><span data-dcnode-id="977" instrument_node=""> ; </span><i data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">give credit to</span></i><span data-dcnode-id="974" instrument_node="">.</span></span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="955" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="969" lang="EN-US"><span data-dcnode-id="970" instrument_node="">d) The very convention of 
                        using idioms in written discourse, the contexts in which 
                        they can be used, and their frequency of use may be different 
                        in the source and target languages. English uses idioms 
                        in many types of text, though not in all. E.g. take no 
                        thought for tomorrow; </span></span><i data-dcnode-id="966"><span data-dcnode-id="967" dir="RTL" lang="FA"><span data-dcnode-id="968" instrument_node="">چوفردا 
                        شود فکرفردا 
                        کنیم</span></span></i><span data-dcnode-id="965" dir="LTR"></span><span data-dcnode-id="956" lang="EN-US"><span data-dcnode-id="964" dir="LTR"></span><span data-dcnode-id="963" instrument_node=""> . Or: </span><i data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">stick to</span></i><span data-dcnode-id="960" instrument_node=""> </span><i data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">your guns</span></i><span data-dcnode-id="957" instrument_node="">.</span></span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="951" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="952" lang="EN-US"><span data-dcnode-id="953" instrument_node="">Fernando and Flavell (1981: 85) discuss the difference 
                        in rhetorical effect of using idioms in general and of 
                        using specific types of idiom in the source and target 
                        languages and quite rightly conclude that 'Translation 
                        is an exacting art. Idiom more than any other feature 
                        of language demands that the translator be not only accurate 
                        but highly sensitive to the rhetorical nuances of the 
                        language.'</span></span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="946" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="947"><span data-dcnode-id="948" lang="EN-US"><span data-dcnode-id="949" instrument_node="">The translation of idioms: strategies</span></span></b></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="943" lang="EN-US"><span data-dcnode-id="944" instrument_node="">The way in which an idiom or a fixed expression can be 
                        translated into another language depends on many factors. 
                        It is not only a question of whether an idiom with a similar 
                        meaning is available in the target language. Other factors 
                        include, for example, the significance of the specific 
                        lexical items which constitute the idiom, i.e. whether 
                        they are manipulated elsewhere in the source text, as 
                        well as the appropriateness or inappropriateness of using 
                        idiomatic language in a given register in the target language. 
                        The acceptability or non-acceptability of using any of 
                        the strategies described below will therefore depend on 
                        the context in which a given idiom is translated. The 
                        first strategy described, that of finding an idiom of 
                        similar meaning and similar form in the target language, 
                        may seem to offer the ideal solution, but that is not 
                        necessarily always the case. Questions of style, register, 
                        and rhetorical effect must also be taken into consideration. 
                        Fernando and Flavell are correct in warning us against 
                        the 'strong unconscious urge in most translators to search 
                        hard for an idiom in the receptor-language, however inappropriate 
                        it may be' (1981, 82).</span></span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="937" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="938"><span data-dcnode-id="939" lang="EN-US"><span data-dcnode-id="940" instrument_node="">1) Using an idiom of similar meaning and form</span></span></b></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="907" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="932" lang="EN-US"><span data-dcnode-id="935" instrument_node="">This strategy involves using an idiom in the target language 
                        which conveys roughly the same meaning as that of the 
                        source-language idiom and, in addition, consists of equivalent 
                        lexical items. This kind of match can only occasionally 
                        be achieved. For example, </span><i data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">step by step </span></i></span><i data-dcnode-id="929"><span data-dcnode-id="930" dir="RTL" lang="FA"><span data-dcnode-id="931" instrument_node="">قدم 
                        به قدم</span></span></i><span data-dcnode-id="928" dir="LTR"></span><i data-dcnode-id="924"><span data-dcnode-id="925" lang="EN-US"><span data-dcnode-id="927" dir="LTR"></span><span data-dcnode-id="926" instrument_node=""> , break someone's heart </span></span></i><i data-dcnode-id="921"><span data-dcnode-id="922" dir="RTL" lang="FA"><span data-dcnode-id="923" instrument_node="">قلب کسی را شکستن 
                        </span></span></i><span data-dcnode-id="920" dir="LTR"></span><i data-dcnode-id="916"><span data-dcnode-id="917" lang="EN-US"><span data-dcnode-id="919" dir="LTR"></span><span data-dcnode-id="918" instrument_node="">&nbsp;, face to face </span></span></i><i data-dcnode-id="913"><span data-dcnode-id="914" dir="RTL" lang="FA"><span data-dcnode-id="915" instrument_node="">رودررو </span></span></i><span data-dcnode-id="912" dir="LTR"></span><i data-dcnode-id="908"><span data-dcnode-id="909" lang="EN-US"><span data-dcnode-id="911" dir="LTR"></span><span data-dcnode-id="910" instrument_node="">&nbsp;
                        .</span></span></i></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="902" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="903"><span data-dcnode-id="904" lang="EN-US"><span data-dcnode-id="905" instrument_node="">2) Using an idiom of similar meaning but dissimilar 
                        form</span></span></b></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="872" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="897" lang="EN-US"><span data-dcnode-id="900" instrument_node="">It is often possible to find an idiom or fixed expression 
                        in the target language which has a meaning similar to 
                        that of the source idiom or expression, but which consists 
                        of different lexical items. For example</span><i data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">, He did not 
                        turn a hair </span></i></span><i data-dcnode-id="894"><span data-dcnode-id="895" dir="RTL" lang="FA"><span data-dcnode-id="896" instrument_node="">خم به ابرو نیاوردن 
                        </span></span></i><span data-dcnode-id="893" dir="LTR"></span><i data-dcnode-id="889"><span data-dcnode-id="890" lang="EN-US"><span data-dcnode-id="892" dir="LTR"></span><span data-dcnode-id="891" instrument_node="">&nbsp;, He is Jack-of-all- trades </span></span></i><i data-dcnode-id="886"><span data-dcnode-id="887" dir="RTL" lang="FA"><span data-dcnode-id="888" instrument_node="">همه کاره وهیچ 
                        کاره </span></span></i><span data-dcnode-id="885" dir="LTR"></span><i data-dcnode-id="881"><span data-dcnode-id="882" lang="EN-US"><span data-dcnode-id="884" dir="LTR"></span><span data-dcnode-id="883" instrument_node="">&nbsp;, I've learnt it by fits and starts </span></span></i><i data-dcnode-id="878"><span data-dcnode-id="879" dir="RTL" lang="FA"><span data-dcnode-id="880" instrument_node="">جسته گریخته 
                        یاد گرفته 
                        ام</span></span></i><span data-dcnode-id="877" dir="LTR"></span><i data-dcnode-id="873"><span data-dcnode-id="874" lang="EN-US"><span data-dcnode-id="876" dir="LTR"></span><span data-dcnode-id="875" instrument_node=""> .</span></span></i></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="867" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="868"><span data-dcnode-id="869" lang="EN-US"><span data-dcnode-id="870" instrument_node="">3) Translation by paraphrase</span></span></b></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="844" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="852" lang="EN-US"><span data-dcnode-id="865" instrument_node="">This is by far the most common way of translating idioms 
                        when a match cannot be found in the target language or 
                        when it seems inappropriate to use idiomatic language 
                        in the target text because of differences in stylistic 
                        preferences of the source and target languages. For example, 
                        </span><i data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">prepare the</span></i><span data-dcnode-id="862" instrument_node=""> </span><i data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">ground</span></i><span data-dcnode-id="859" instrument_node="">; create a good/suitable 
                        situation for something to take place. Or: </span><i data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">for the</span></i><span data-dcnode-id="856" instrument_node="">
</span><i data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">best</span></i><span data-dcnode-id="853" instrument_node="">; unpleasant now but will turn out well in 
                        the future. In Farsi we have some expressions like: </span></span><i data-dcnode-id="849"><span data-dcnode-id="850" dir="RTL" lang="FA"><span data-dcnode-id="851" instrument_node="">کار 
                        از کار گذشته 
                        است ، با رئیس 
                        چپ افتاده 
                        است ، توی خط 
                        این چیزها 
                        نیست </span></span></i><span data-dcnode-id="848" dir="LTR"></span><span data-dcnode-id="845" lang="EN-US"><span data-dcnode-id="847" dir="LTR"></span><span data-dcnode-id="846" instrument_node="">&nbsp;which need to be paraphrased.</span></span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="839" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="840"><span data-dcnode-id="841" lang="EN-US"><span data-dcnode-id="842" instrument_node="">4) Translation by omission</span></span></b></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="835" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="836" lang="EN-US"><span data-dcnode-id="837" instrument_node="">As with single words, an idiom may sometimes be omitted 
                        altogether in the target text. This may be because it 
                        has no close match in the target language, its meaning 
                        cannot be easily paraphrased, or for stylistic reasons.</span></span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="830" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><b data-dcnode-id="831"><span data-dcnode-id="832" lang="EN-US"><span data-dcnode-id="833" instrument_node="">5) Strategy of compensation</span></span></b></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="826" dir="LTR" direction:ltr;unicode-bidi:embed&#39;="" style="'text-align:justify;"><span data-dcnode-id="827" lang="EN-US"><span data-dcnode-id="828" instrument_node="">One strategy which cannot 
                        be adequately illustrated, simply because it would take 
                        up a considerable amount of space, is the strategy of 
                        compensation. Briefly, this means that one may either 
                        omit or play down a feature such as idiomaticity at the 
                        point where it occurs in the source text and introduce 
                        it elsewhere in the target text. This strategy is not 
                        restricted to idiomaticity or fixed expressions and may 
                        be used to make up for any loss or meaning, emotional 
                        force, or stylistic effect which may not be possible to 
                        reproduce directly at a given point in the target text. 
                        </span></span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="822" dir="LTR" embed&#39;="" style="'text-align:justify;direction:ltr;unicode-bidi:"><span data-dcnode-id="823" lang="EN-US"><span data-dcnode-id="824" instrument_node="">Using the typical phraseology of the target language- 
                        its natural collocations, its own fixed and semi-fixed 
                        expressions, the right level of idiomaticity, and so on- 
                        will greatly enhance the readability of your translations. 
                        Getting this level right means that your target text will 
                        feel less 'foreign' and, other factors being equal, may 
                        even pass for an original. But naturalness and readability 
                        are also affected by other linguistic features. </span></span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817" dir="LTR"><b data-dcnode-id="818"><span data-dcnode-id="819" lang="EN-US"><span data-dcnode-id="820" instrument_node="">Conclusion </span></span></b></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="813" dir="LTR"><span data-dcnode-id="814" lang="EN-US"><span data-dcnode-id="815" instrument_node="">Although some stylists consider 
                        translation "sprinkled with footnotes" undesirable, 
                        their uses can assist the TT readers to make better judgment 
                        of the ST contents. In general, it seems that the procedures 
                        'functional equivalent' and 'notes' would have a higher 
                        potential for conveying the concepts underlying the culture-specific 
                        concepts embedded in a text; moreover, it can be claimed 
                        that a combination of these strategies would result in 
                        a more accurate understanding of the culture-specific 
                        concepts than other procedures.</span></span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="809" dir="LTR"><span data-dcnode-id="810" lang="EN-US"><span data-dcnode-id="811" instrument_node="">Various strategies opted for 
                        by translators in rendering idioms seem to play a crucial 
                        role in recognition and perception of connotations carried 
                        by them. If a novice translator renders a literary text 
                        without paying adequate attention to the idioms, the connotations 
                        are likely not to be transferred as a result of the translator's 
                        failure to acknowledge them. They will be entirely lost 
                        to the majority of the TL readers; consequently, the translation 
                        will be ineffective.</span></span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="805" dir="LTR"><span data-dcnode-id="806" lang="EN-US"><span data-dcnode-id="807" instrument_node="">It seems necessary for an acceptable 
                        translation to produce the same (or at least similar) 
                        effects on the TT readers as those created by the original 
                        work on its readers. A translator does not appear to be 
                        successful in his challenging task of efficiently rendering 
                        the culture-specific concepts and figurative language 
                        when he sacrifices, or at least minimizes, the effect 
                        of idioms in favor of preserving graphical or lexical 
                        forms of source language. In other words, a competent 
                        translator is well-advised not to deprive the TL reader 
                        of enjoying, or even recognizing, the idioms either in 
                        the name of fidelity or brevity. </span></span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="801" dir="LTR"><span data-dcnode-id="802" lang="EN-US"><span data-dcnode-id="803" instrument_node="">It can be claimed that the 
                        best translation method seem to be the one which allows 
                        translator to utilize 'notes.' Furthermore, employing 
                        'notes' in the translation, both as a translation strategy 
                        and a translation procedure, seems to be indispensable 
                        so that the foreign language readership could benefit 
                        from the text as much as the ST readers do. </span></span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="796" dir="LTR"><b data-dcnode-id="797"><span data-dcnode-id="798" lang="EN-US"><span data-dcnode-id="799" instrument_node="">References</span></span></b></p><span data-dcnode-id="795" instrument_node="">

                        </span></i><span data-dcnode-id="791" instrument_node="">London and New York: Routledge, 1992.</span></span></p><span data-dcnode-id="788" instrument_node="">
