rument_node=""> </span><p data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Free on web, Android and iOS. Pro subscription at $8.99/month gives you access to an extra set of learning games and includes downloads of any courses for offline use.</span></p><span data-dcnode-id="3017" instrument_node=""> </span><p data-dcnode-id="3013"><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.memrise.com/" rel="noreferrer noopener" target="_blank" title="Go to website memrise.com"><span data-dcnode-id="3016" instrument_node="">Memrise</span></a><span data-dcnode-id="3014" instrument_node=""> is a free learning platform which has all sorts of courses. It includes 200+ language courses and many other topics too.</span></p><span data-dcnode-id="3012" instrument_node=""> </span><h3 data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">How it works</span></h3><span data-dcnode-id="3009" instrument_node=""> </span><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">The platform uses a gamified flashcard approach and adaptive spaced repetition learning technology. Users are awarded points and reputations as they learn, and they can also compete against other users. Memrise uses the metaphor of a garden – words that you learn are planted as seeds, then they are grown in your short-term memory until they stick. Later they are regularly reviewed in your long-term memory.</span></p><span data-dcnode-id="3006" instrument_node=""> </span><p data-dcnode-id="3001"><span data-dcnode-id="3005" instrument_node="">You learn new words in bite-sized and easy lessons and then practice with games models that boost different aspects of your memory. You can choose or create your own mems – mnemonics that help you to associate words with something memorable, like a picture, a sample sentence, its etymology, something funny etc. This approach promotes mental connections, which helps to create stronger memorization. Find out more about </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/benefits-of-learning-a-second-language" rel="noreferrer noopener" target="_blank" title="34 Unobvious Benefits of Learning a Second Language"><span data-dcnode-id="3004" instrument_node="">benefits of second language learning </span></a><span data-dcnode-id="3002" instrument_node="">from our article.</span></p><div class="partner-banner d-print-none" data-dcnode-id="2966"><a class="partner-banner__link" data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/%3Fet%3Da1056o6p95%26discount_code%3Dwelcome20%26referrer%3Dhttps%3A//custom-writing.org/blog/best-free-language-learning-websites-apps" rel="noopener" target="_blank" title="Learn More"><span data-dcnode-id="3000" instrument_node=""> </span><div class="partner-banner__wrapper text-sm-left partner-banner__wrapper--in-post" data-dcnode-id="2969"><span data-dcnode-id="2999" instrument_node=""> </span><div class="partner-banner__text" data-dcnode-id="2986"><span data-dcnode-id="2998" instrument_node=""> </span><p class="mb-0" data-dcnode-id="2988"><span data-dcnode-id="2997" instrument_node="">We will write a </span><strong data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">custom essay specifically for you</span></strong><span data-dcnode-id="2994" instrument_node=""> for only </span><span class="line-through" data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">$16.05</span></span><span data-dcnode-id="2991" instrument_node=""> </span><span class="text-color-red-600 font-weight-bold" data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">$11/page</span></span></p><span data-dcnode-id="2987" instrument_node=""> </span></div><span data-dcnode-id="2985" instrument_node=""> </span><div class="btn btn--lg btn--orange btn--animation partner-banner__btn" data-dcnode-id="2971"><span data-dcnode-id="2984" instrument_node=""> </span><span class="partner-banner__btn-text text-capitalize" data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Learn More</span></span><span data-dcnode-id="2981" instrument_node=""> </span><svg aria-hidden="true" class="partner-banner__btn-icon" data-dcnode-id="2973" focusable="false" height="16" width="16"></svg><span data-dcnode-id="2980" instrument_node=""> </span><use data-dcnode-id="2975" xlink:href="#arrow-right-long"><svg data-dcnode-id="2976" id="arrow-right-long" viewBox="0 0 16 16"></svg><span data-dcnode-id="2979" instrument_node="">
</span><path clip-rule="evenodd" d="M8.543 3.457a1 1 0 011.414-1.414l5.25 5.25.707.707-.707.707-5.25 5.25a1 1 0 11-1.414-1.415L12.085 9H1a1 1 0 010-2h11.086L8.543 3.457z" data-dcnode-id="2978" fill="currentColor" fill-rule="evenodd"></path><span data-dcnode-id="2977" instrument_node="">
</span></use><span data-dcnode-id="2974" instrument_node=""> </span><span data-dcnode-id="2972" instrument_node=""> </span></div><span data-dcnode-id="2970" instrument_node=""> </span></div><span data-dcnode-id="2968" instrument_node=""> </span></a></div><span data-dcnode-id="2965" instrument_node=""> </span><p data-dcnode-id="2962"><strong data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2961" instrument_node=""> </span><ul data-dcnode-id="2951"><li data-dcnode-id="2958"><div class="list-content" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Memrise offers a large variety of courses and vocabularies.</span></div></li><li data-dcnode-id="2955"><div class="list-content" data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">It has a friendly interface and an extensive flashcard library.</span></div></li><li data-dcnode-id="2952"><div class="list-content" data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">There are forums for many languages, where you can communicate with fellow learners and seek (or offer) help and advice.</span></div></li></ul><span data-dcnode-id="2950" instrument_node=""> </span><p data-dcnode-id="2947"><strong data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2946" instrument_node=""> </span><ul data-dcnode-id="2942"><li data-dcnode-id="2943"><div class="list-content" data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">As the content is entirely user-generated, the quality may vary, so you have to make sure you find a great course.</span></div></li></ul><span data-dcnode-id="2941" instrument_node=""> </span><p data-dcnode-id="2937"><strong data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Best for</span></strong><span data-dcnode-id="2938" instrument_node="">: Memrise is good for visual learners and can be used as an effective language learning tool to add to your vocabulary.</span></p><span data-dcnode-id="2936" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2934"><img alt="Anki - Best Memorizing APP." class="wp-image-2710" data-dcnode-id="2935" height="330" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/uploads/2020/12/3ankisrs.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/3ankisrs.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/3ankisrs-300x155.png 300w" style="" width="640"></figure><span data-dcnode-id="2933" instrument_node=""> </span><h2 data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">3. Anki</span></h2><span data-dcnode-id="2930" instrument_node=""> </span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Free on Android, iOS, Linux, OSX, Windows and web.</span></p><span data-dcnode-id="2927" instrument_node=""> </span><p data-dcnode-id="2923"><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.ankiweb.net/" rel="noreferrer noopener" target="_blank" title="Go to website apps.ankiweb.net"><span data-dcnode-id="2926" instrument_node="">Anki</span></a><span data-dcnode-id="2924" instrument_node=""> is a free cross-platform flashcard program and one of the best when it comes to language learning software. You can also use it for memorizing equations, diagrams, names and faces, and more. It is content-agnostic and supports images, audio, video and scientific markup. There are a lot of shared decks available in the app that you can download and start memorizing, or you can build your own.</span></p><span data-dcnode-id="2922" instrument_node=""> </span><p data-dcnode-id="2918"><strong data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">Languages</span></strong><span data-dcnode-id="2919" instrument_node="">: Arabic, Chinese, English, French, German, Hebrew, Japanese, Korean, Russian, Spanish</span></p><span data-dcnode-id="2917" instrument_node=""> </span><h3 data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">How it works</span></h3><span data-dcnode-id="2914" instrument_node=""> </span><p data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Anki uses the spaced repetition system to predict when you are about to forget what you are learning, and remind you just before your memory fades completely.  It can handle decks of more than 100,000 cards. The program will display a word, phrase or image, and then let you make the connection, repeat it, interpret it and memorize it. By default it introduces 20 new cards per day, but you can adjust this number. Cards will pop up again later on a schedule you can customize.</span></p><span data-dcnode-id="2911" instrument_node=""> </span><p data-dcnode-id="2908"><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2907" instrument_node=""> </span><ul data-dcnode-id="2900"><li data-dcnode-id="2904"><div class="list-content" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Lots of complete flashcard sets, called shared decks.</span></div></li><li data-dcnode-id="2901"><div class="list-content" data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">You can customize many of the options, from layout to review timing, and develop your own decks, tailored to your personal needs.</span></div></li></ul><span data-dcnode-id="2899" instrument_node=""> </span><p data-dcnode-id="2896"><strong data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2895" instrument_node=""> </span><ul data-dcnode-id="2888"><li data-dcnode-id="2892"><div class="list-content" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">The user interface can be overwhelming at first.</span></div></li><li data-dcnode-id="2889"><div class="list-content" data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">This kind of tool cannot be used alone, since learning long lists of words won’t teach you a language. You should learn the words in context so you can actually use them.</span></div></li></ul><span data-dcnode-id="2887" instrument_node=""> </span><p data-dcnode-id="2883"><strong data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Best for</span></strong><span data-dcnode-id="2884" instrument_node="">: Anki is a useful supplement to other language learning tools.</span></p><span data-dcnode-id="2882" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2880"><img alt="Clozemaster is a gamified language learning tool." class="wp-image-2711" data-dcnode-id="2881" height="238" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/uploads/2020/12/4clozemaster.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/4clozemaster.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/4clozemaster-300x112.png 300w" style="" width="640"></figure><span data-dcnode-id="2879" instrument_node=""> </span><h2 data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">4. Clozemaster</span></h2><span data-dcnode-id="2876" instrument_node=""> </span><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Free on Android, iOs and web. Clozemaster Pro is available for $8/month.</span></p><span data-dcnode-id="2873" instrument_node=""> </span><p data-dcnode-id="2869"><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clozemaster.com/about" rel="noreferrer noopener" target="_blank" title="Go to website clozemaster.com"><span data-dcnode-id="2872" instrument_node="">Clozemaster</span></a><span data-dcnode-id="2870" instrument_node=""> is a gamified language learning tool for learning new vocabulary in context. It provides a sentence-based and contextual learning experience to complement other language learning apps like Memrise and Anki.</span></p><span data-dcnode-id="2868" instrument_node=""> </span><p data-dcnode-id="2864"><strong data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Languages</span></strong><span data-dcnode-id="2865" instrument_node="">: More than 100 language pairings are available, and more are being added all the time.</span></p><span data-dcnode-id="2863" instrument_node=""> </span><h3 data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">How it works</span></h3><span data-dcnode-id="2860" instrument_node=""> </span><p data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Learners can undertake Clozemaster cloze deletion tests, where they replace the missing words in the sentence prompts. There are two options to supply the answers: multiple choice questions and text input (fill in the blanks). The missing word is the least common word in the sentence, from 10,000 of the most common words in the language being studied. In this way, the vocabulary you learn via Clozemaster is the most difficult of the most common. Sentences are reviewed according to spaced repetition intervals, based on how many times you answer correctly in a row.</span></p><span data-dcnode-id="2857" instrument_node=""> </span><p data-dcnode-id="2852"><span data-dcnode-id="2856" instrument_node="">You can use this tool without signing up, but the sentences for each round will be selected randomly and your progress will not be saved. You have to sign up to track your progress and level up. Check our article about </span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/100-best-online-dictionaries-stock-up-on-new-words-today" rel="noreferrer noopener" target="_blank" title="A List of 92 Best Online Dictionaries: Stock up on New Words! "><span data-dcnode-id="2855" instrument_node="">online dictionaries</span></a><span data-dcnode-id="2853" instrument_node=""> that will help you to boost your vocabulary.</span></p><span data-dcnode-id="2851" instrument_node=""> </span><p data-dcnode-id="2848"><strong data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2847" instrument_node=""> </span><ul data-dcnode-id="2837"><li data-dcnode-id="2844"><div class="list-content" data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">You can adjust game settings (switch between multiple choice and text input, hide the translation, turn text-to-speech on or off etc.)</span></div></li><li data-dcnode-id="2841"><div class="list-content" data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">It’s free to play and you can use this tool without signing up or signing in.</span></div></li><li data-dcnode-id="2838"><div class="list-content" data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">It offers lots of repetition.</span></div></li></ul><span data-dcnode-id="2836" instrument_node=""> </span><p data-dcnode-id="2833"><strong data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2832" instrument_node=""> </span><ul data-dcnode-id="2828"><li data-dcnode-id="2829"><div class="list-content" data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">It’s not for beginners. It’s difficult to learn a language with this gamification language learning app if you’re a complete beginner.</span></div></li></ul><span data-dcnode-id="2827" instrument_node=""> </span><p data-dcnode-id="2823"><strong data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Best for</span></strong><span data-dcnode-id="2824" instrument_node="">: Clozemaster is a great language learning tool that can help you to master more advanced vocabulary in sentence context. It can be a good complement to language learning at any stage.</span></p><span data-dcnode-id="2822" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2820"><img alt="Lingq screenshot." class="wp-image-2712" data-dcnode-id="2821" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/5lingq.jpg" height="945" loading="lazy" sizes="(max-width: 1324px) 100vw, 1324px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/5lingq.jpg 1324w, https://custom-writing.org/blog/wp-content/uploads/2020/12/5lingq-300x214.jpg 300w, https://custom-writing.org/blog/wp-content/uploads/2020/12/5lingq-1024x731.jpg 1024w, https://custom-writing.org/blog/wp-content/uploads/2020/12/5lingq-768x548.jpg 768w" style="height: 0px; padding-bottom: 414.687px;" width="1324"></figure><span data-dcnode-id="2819" instrument_node=""> </span><h2 data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">5. LingQ</span></h2><span data-dcnode-id="2816" instrument_node=""> </span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Available for free on web, Android, iPhone. The unlimited access subscription costs $12.99/month.</span></p><span data-dcnode-id="2813" instrument_node=""> </span><p data-dcnode-id="2809"><strong data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Languages</span></strong><span data-dcnode-id="2810" instrument_node="">: French, Spanish, Japanese, Italian, German, Russian, Chinese, Portuguese, Swedish, Korean, Dutch, Polish, Greek, Finnish, Norwegian, Czech, Arabic, Hebrew, Turkish, Latin, Romanian, Esperanto, Ukrainian.</span></p><span data-dcnode-id="2808" instrument_node=""> </span><h3 data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">How it works</span></h3><span data-dcnode-id="2805" instrument_node=""> </span><p data-dcnode-id="2801"><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lingq.com/en/" rel="noreferrer noopener" target="_blank" title="Go to website lingq.com"><span data-dcnode-id="2804" instrument_node="">LingQ</span></a><span data-dcnode-id="2802" instrument_node=""> is an easy and fun way to practice vocabulary in context. After you register, choose the language you want to learn and your level, the app will pick audio and video lessons for you. Also, you can choose books and short stories.</span></p><span data-dcnode-id="2800" instrument_node=""> </span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Listen, read, and enhance your vocabulary with this app.</span></p><span data-dcnode-id="2797" instrument_node=""> </span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">It provides an immersive experience by allowing you to read online articles on a topic of your choice. While reading, you select every word you don’t understand, and the app translates and pronounces it for you. The language learning program remembers all the words you select. There is also available a forum for learners, where you can chat with other LingQ members and get answers for your questions.</span></p><span data-dcnode-id="2794" instrument_node=""> </span><p data-dcnode-id="2791"><strong data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2790" instrument_node=""> </span><ul data-dcnode-id="2777"><li data-dcnode-id="2787"><div class="list-content" data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">You decide what you learn by choosing the articles, audio, and video.</span></div></li><li data-dcnode-id="2784"><div class="list-content" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">The app suggests materials that are on your level.</span></div></li><li data-dcnode-id="2781"><div class="list-content" data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">The app keeps track of the points you earn, the words you learn and the progress you make.</span></div></li><li data-dcnode-id="2778"><div class="list-content" data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">You can study at your own pace.</span></div></li></ul><span data-dcnode-id="2776" instrument_node=""> </span><p data-dcnode-id="2773"><strong data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2772" instrument_node=""> </span><ul data-dcnode-id="2768"><li data-dcnode-id="2769"><div class="list-content" data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">The program may have trouble translating idiomatic expressions, translating them word for word.</span></div></li></ul><span data-dcnode-id="2767" instrument_node=""> </span><p data-dcnode-id="2763"><strong data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Best for</span></strong><span data-dcnode-id="2764" instrument_node="">: LingQ is a great language learning tool for independent language learners who want to improve their reading skills and expand their vocabulary.</span></p><span data-dcnode-id="2762" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2760"><img alt="Readlang is a language learning app that allows you to read any foreign language text." class="wp-image-2713" data-dcnode-id="2761" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/6readlangcom.png" height="263" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/6readlangcom.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/6readlangcom-300x123.png 300w" style="height: 0px; padding-bottom: 238.755px;" width="640"></figure><span data-dcnode-id="2759" instrument_node=""> </span><h2 data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">6. Readlang</span></h2><span data-dcnode-id="2756" instrument_node=""> </span><p data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Two pricing options: Free and Premium ($5/month). There isn’t a native Readlang Android or iOS app, but the Readlang web app works on any device.</span></p><span data-dcnode-id="2753" instrument_node=""> </span><p data-dcnode-id="2749"><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//readlang.com/" rel="noreferrer noopener" target="_blank" title="Go to website readlang.com"><span data-dcnode-id="2752" instrument_node="">Readlang</span></a><span data-dcnode-id="2750" instrument_node=""> is a language learning app that allows you to read any foreign language text. It provides you with an immediate translation of the word you don’t know.</span></p><span data-dcnode-id="2748" instrument_node=""> </span><p data-dcnode-id="2744"><strong data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Languages</span></strong><span data-dcnode-id="2745" instrument_node="">: Spanish, German, French, English, Russian, Italian and 40 more</span></p><span data-dcnode-id="2743" instrument_node=""> </span><h3 data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">How it works</span></h3><span data-dcnode-id="2740" instrument_node=""> </span><p data-dcnode-id="2735"><span data-dcnode-id="2739" instrument_node="">You can use browser extension to use Readlang on any webpage, or you can import or copy and paste any text into the Readlang website. Click any word you don’t know to translate it. The program keeps track of the words you have translated and creates flashcards (with a spaced repetition algorithm and frequency parameter) and word lists for you to practice. You can also customize a dictionary and synchronize YouTube videos to transcriptions. Get more from language learning with our list of </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/esl-resources-for-students" rel="noreferrer noopener" target="_blank" title="48 ESL Resources for Students: ESL Writing, Listening, Grammar"><span data-dcnode-id="2738" instrument_node="">48 ESL resources for students</span></a><span data-dcnode-id="2736" instrument_node="">.</span></p><span data-dcnode-id="2734" instrument_node=""> </span><p data-dcnode-id="2731"><strong data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2730" instrument_node=""> </span><ul data-dcnode-id="2723"><li data-dcnode-id="2727"><div class="list-content" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Read any content in your target language using browser extension and quickly translate words you don’t know.</span></div></li><li data-dcnode-id="2724"><div class="list-content" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">An impressive review system. The system uses a spaced repetition algorithm and prioritizes words based on their frequency in the language under study.</span></div></li></ul><span data-dcnode-id="2722" instrument_node=""> </span><p data-dcnode-id="2719"><strong data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2718" instrument_node=""> </span><ul data-dcnode-id="2714"><li data-dcnode-id="2715"><div class="list-content" data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">This is not a standard language learning website. It doesn’t offer structured courses or tutorials.</span></div></li></ul><span data-dcnode-id="2713" instrument_node=""> </span><p data-dcnode-id="2709"><strong data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Best for</span></strong><span data-dcnode-id="2710" instrument_node="">: Readlang is a great tool to practice reading in your target language and to help you learn new vocabulary.</span></p><span data-dcnode-id="2708" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2706"><img alt="Busuu.com - free lessons and language learning app." class="wp-image-2714" data-dcnode-id="2707" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/7bunguucom.png" height="251" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/7bunguucom.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/7bunguucom-300x118.png 300w" style="height: 0px; padding-bottom: 227.861px;" width="640"></figure><span data-dcnode-id="2705" instrument_node=""> </span><h2 data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">7. Busuu</span></h2><span data-dcnode-id="2702" instrument_node=""> </span><p data-dcnode-id="2697"><span data-dcnode-id="2701" instrument_node="">Only some of the </span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.busuu.com/en/" rel="noreferrer noopener" target="_blank" title="Go to website busuu.com"><span data-dcnode-id="2700" instrument_node="">Busuu</span></a><span data-dcnode-id="2698" instrument_node=""> features are free on the web, but free lessons are available on the go via Busuu apps for Android and iOS.</span></p><span data-dcnode-id="2696" instrument_node=""> </span><p data-dcnode-id="2692"><strong data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Languages</span></strong><span data-dcnode-id="2693" instrument_node="">: English, Spanish, Italian, French, Portuguese, Turkish, Arabic, Polish, German, Russian, Japanese, Chinese</span></p><span data-dcnode-id="2691" instrument_node=""> </span><h3 data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">How it works</span></h3><span data-dcnode-id="2688" instrument_node=""> </span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Busuu is a global online language learning community of 60 million users worldwide and relies heavily on its users’ efforts to help teach one another. It offers the opportunity to learn reading, writing, speaking and listening, and to network with other learners. Beginners can use flashcards to learn new vocabulary, but lessons for advance learners involve writing and answering questions that will be corrected by native speakers on the site. Users can interact via a chat window, an audio connection or a webcam connection.</span></p><span data-dcnode-id="2685" instrument_node=""> </span><p data-dcnode-id="2682"><strong data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2681" instrument_node=""> </span><ul data-dcnode-id="2671"><li data-dcnode-id="2678"><div class="list-content" data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">The site offers well-developed courses with a rounded approach to language learning.</span></div></li><li data-dcnode-id="2675"><div class="list-content" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">The site provides learners with personalized feedback via an integrated chat feature.</span></div></li><li data-dcnode-id="2672"><div class="list-content" data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Conversation practice with Busuu learners is invaluable.</span></div></li></ul><span data-dcnode-id="2670" instrument_node=""> </span><p data-dcnode-id="2667"><strong data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2666" instrument_node=""> </span><ul data-dcnode-id="2662"><li data-dcnode-id="2663"><div class="list-content" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Dialogues, writing exercises and audio recordings are free, but grammar-focused lessons, video units and printable PDFs are only available for Premium members. Still, there is a 7-day free trial membership after registration on the site.</span></div></li></ul><span data-dcnode-id="2661" instrument_node=""> </span><p data-dcnode-id="2657"><strong data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Best for</span></strong><span data-dcnode-id="2658" instrument_node="">: With Busuu courses you will be able to practice every aspect of your target language. This language exchange website is good for learners who consider themselves social people.</span></p><span data-dcnode-id="2656" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2654"><img alt="Babbel is an online language learning program." class="wp-image-2715" data-dcnode-id="2655" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/8babbelcom.png" height="238" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/8babbelcom.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/8babbelcom-300x112.png 300w" style="height: 0px; padding-bottom: 216.059px;" width="640"></figure><span data-dcnode-id="2653" instrument_node=""> </span><h2 data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">8. Babbel</span></h2><span data-dcnode-id="2650" instrument_node=""> </span><p data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">From $12.95/month for subscription on Android, iOs and web.</span></p><span data-dcnode-id="2647" instrument_node=""> </span><p data-dcnode-id="2643"><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.babbel.com/" rel="noreferrer noopener" target="_blank" title="Go to website babbel.com"><span data-dcnode-id="2646" instrument_node="">Babbel</span></a><span data-dcnode-id="2644" instrument_node=""> is an online language learning program that costs more than many of its competitors listed here, but it delivers high-quality courses.</span></p><span data-dcnode-id="2642" instrument_node=""> </span><p data-dcnode-id="2638"><strong data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Languages</span></strong><span data-dcnode-id="2639" instrument_node="">: Spanish, French, German, Italian, Brazilian Portuguese, Russian, Turkish, Polish, English, Indonesian, Dutch, Danish, Swedish, Norwegian</span></p><span data-dcnode-id="2637" instrument_node=""> </span><h3 data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">How it works</span></h3><span data-dcnode-id="2634" instrument_node=""> </span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Babbel is a traditional online language learning course and offers a wide range of learning materials. The main advantage of the program is its visual vocabulary, divided by thematic lessons. Each lesson is made up of vocabulary, dialogue, grammar and review parts. Babbel focuses on building basic conversational skills, so learners start speaking from the first lesson. The integrated speech recognition tool can test and grade on pronunciation. The program keeps track of which lessons you have completed.</span></p><span data-dcnode-id="2631" instrument_node=""> </span><p data-dcnode-id="2628"><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2627" instrument_node=""> </span><ul data-dcnode-id="2620"><li data-dcnode-id="2624"><div class="list-content" data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Equal focus on all aspects of language learning: reading, writing, listening, speaking.</span></div></li><li data-dcnode-id="2621"><div class="list-content" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Content is precise, with wonderful examples and clear explanations of the grammatical structure of the languages.</span></div></li></ul><span data-dcnode-id="2619" instrument_node=""> </span><p data-dcnode-id="2616"><strong data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2615" instrument_node=""> </span><ul data-dcnode-id="2605"><li data-dcnode-id="2612"><div class="list-content" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Babbel lacks the trendy gamification element of other great language learning websites.</span></div></li><li data-dcnode-id="2609"><div class="list-content" data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">The complete courses are not free.</span></div></li><li data-dcnode-id="2606"><div class="list-content" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Some languages are not covered as in-depth as others.</span></div></li></ul><span data-dcnode-id="2604" instrument_node=""> </span><p data-dcnode-id="2600"><strong data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Best for</span></strong><span data-dcnode-id="2601" instrument_node="">: Babbel is a great choice for comprehensive training.</span></p><span data-dcnode-id="2599" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2597"><img alt="Byki mobile." class="wp-image-2716" data-dcnode-id="2598" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/9byki-mobile.jpg" height="502" loading="lazy" sizes="(max-width: 991px) 100vw, 991px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/9byki-mobile.jpg 991w, https://custom-writing.org/blog/wp-content/uploads/2020/12/9byki-mobile-300x152.jpg 300w, https://custom-writing.org/blog/wp-content/uploads/2020/12/9byki-mobile-768x389.jpg 768w" style="height: 0px; padding-bottom: 294.311px;" width="991"></figure><span data-dcnode-id="2596" instrument_node=""> </span><h2 data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">9. Byki Mobile</span></h2><span data-dcnode-id="2593" instrument_node=""> </span><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Byki Mobile free to download for Android and iOS with in-app purchase $7.99 for each language.</span></p><span data-dcnode-id="2590" instrument_node=""> </span><p data-dcnode-id="2586"><a data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transparent.com/mobile/" rel="noreferrer noopener" target="_blank" title="Go to website transparent.com"><span data-dcnode-id="2589" instrument_node="">Byki</span></a><span data-dcnode-id="2587" instrument_node=""> is a language learning program from Transparent Languages. It’s designed primarily for learning languages. There are available 80 languages.</span></p><span data-dcnode-id="2585" instrument_node=""> </span><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">The app comes with a free limited access to three vocabulary lists for each language. To get the access to the full content, users should make in-app purchase ($7.99 for each language). The full access includes over 1,000 words and phrases that are critical for language learning.</span></p><span data-dcnode-id="2582" instrument_node=""> </span><p data-dcnode-id="2578"><strong data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Languages</span></strong><span data-dcnode-id="2579" instrument_node="">: 80 languages, including Chinese, Danish, Dutch, Arabic, French, German, Greek, Italian, Portuguese, Russian and Spanish</span></p><span data-dcnode-id="2577" instrument_node=""> </span><h3 data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">How it works</span></h3><span data-dcnode-id="2574" instrument_node=""> </span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Byki uses a declarative approach to language learning as its pedagogical basis. It leverages the fact that adults learn foreign languages by collecting words and phrases in their memory, like items in a basket. The more items you have, the more able you are to use your target language.</span></p><span data-dcnode-id="2571" instrument_node=""> </span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">The program has word lists with audio organized by topics. The program tracks everything you learn and presents the appropriate material at just the right intervals.</span></p><span data-dcnode-id="2568" instrument_node=""> </span><p data-dcnode-id="2565"><strong data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2564" instrument_node=""> </span><ul data-dcnode-id="2554"><li data-dcnode-id="2561"><div class="list-content" data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">All the words are pronounced by native speakers.</span></div></li><li data-dcnode-id="2558"><div class="list-content" data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Learning progress tracking is available.</span></div></li><li data-dcnode-id="2555"><div class="list-content" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Quizzes to self-control of learned material.</span></div></li></ul><span data-dcnode-id="2553" instrument_node=""> </span><p data-dcnode-id="2550"><strong data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2549" instrument_node=""> </span><ul data-dcnode-id="2545"><li data-dcnode-id="2546"><div class="list-content" data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">The free version of Byki Mobile is limited to only 3 lists and has limited features.</span></div></li></ul><span data-dcnode-id="2544" instrument_node=""> </span><p data-dcnode-id="2540"><strong data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Best for</span></strong><span data-dcnode-id="2541" instrument_node="">: Byki can be a great addition to almost any other language learning method.</span></p><span data-dcnode-id="2539" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2537"><img alt="Forvo is a free language learning website and app that provides pronunciation assistance." class="wp-image-2717" data-dcnode-id="2538" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/10forvo.png" height="280" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/10forvo.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/10forvo-300x131.png 300w" style="height: 0px; padding-bottom: 254.188px;" width="640"></figure><span data-dcnode-id="2536" instrument_node=""> </span><h2 data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">10. Forvo</span></h2><span data-dcnode-id="2533" instrument_node=""> </span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Free on web and Android, and $2.99 on iOS.</span></p><span data-dcnode-id="2530" instrument_node=""> </span><p data-dcnode-id="2526"><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forvo.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2529" instrument_node="">Forvo</span></a><span data-dcnode-id="2527" instrument_node=""> is a free language learning website and app that provides pronunciation assistance.</span></p><span data-dcnode-id="2525" instrument_node=""> </span><p data-dcnode-id="2521"><strong data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Languages</span></strong><span data-dcnode-id="2522" instrument_node="">: At the time of writing, Forvo boasted more than 4 million pronunciations in 335 languages.</span></p><span data-dcnode-id="2520" instrument_node=""> </span><h3 data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">How it works</span></h3><span data-dcnode-id="2517" instrument_node=""> </span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Once you sign up to Forvo, you can ask for a word and another user will pronounce it for you. Or you can search for a word in the database and listen to its pronunciation. You can also help by providing pronunciation of requested words in your own native language. If you create a personal account, you can save pronunciations you have listened to, create your own lists of pronunciations, download mp3 versions of pronunciations, and interact with other users by voting for and commenting on their pronunciations.</span></p><span data-dcnode-id="2514" instrument_node=""> </span><p data-dcnode-id="2511"><strong data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2510" instrument_node=""> </span><ul data-dcnode-id="2503"><li data-dcnode-id="2507"><div class="list-content" data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">All words are recorded by native speakers.</span></div></li><li data-dcnode-id="2504"><div class="list-content" data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Forvo lists words in categories, which makes it easier to find the words you are looking for.</span></div></li></ul><span data-dcnode-id="2502" instrument_node=""> </span><p data-dcnode-id="2499"><strong data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2498" instrument_node=""> </span><ul data-dcnode-id="2488"><li data-dcnode-id="2495"><div class="list-content" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">You need to register to access the full site content.</span></div></li><li data-dcnode-id="2492"><div class="list-content" data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">The recordings are reviewed, but sometimes they are not perfect.</span></div></li><li data-dcnode-id="2489"><div class="list-content" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">It’s good in assisting with pronunciation, but that’s all that the site offers.</span></div></li></ul><span data-dcnode-id="2487" instrument_node=""> </span><p data-dcnode-id="2483"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Best for</span></strong><span data-dcnode-id="2484" instrument_node="">: Forvo is a great tool to learn pronunciation and is good for quick reference, as it has an enormous database.</span></p><span data-dcnode-id="2482" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2480"><img alt="RhinoSpike is a free language learning tool. Foreign language Audio on Demand." class="wp-image-2718" data-dcnode-id="2481" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/11rhinospike.png" height="228" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/11rhinospike.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/11rhinospike-300x107.png 300w" style="height: 0px; padding-bottom: 206.981px;" width="640"></figure><span data-dcnode-id="2479" instrument_node=""> </span><h2 data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">11. RhinoSpike</span></h2><span data-dcnode-id="2476" instrument_node=""> </span><p data-dcnode-id="2472"><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rhinospike.com/" rel="noreferrer noopener" target="_blank" title="Go to website rhinospike.com"><span data-dcnode-id="2475" instrument_node="">RhinoSpike</span></a><span data-dcnode-id="2473" instrument_node=""> is a free language learning tool that connects you with native speakers to exchange foreign language audio files.</span></p><span data-dcnode-id="2471" instrument_node=""> </span><p data-dcnode-id="2467"><strong data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Languages</span></strong><span data-dcnode-id="2468" instrument_node="">: At the time of writing, RhinoSpike boasted 47,603 recordings in 72 languages.</span></p><span data-dcnode-id="2466" instrument_node=""> </span><h3 data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">How it works</span></h3><span data-dcnode-id="2463" instrument_node=""> </span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">RhinoSpike allows you to submit a text in a foreign language and request it to be read by a native speaker. In exchange for these audio files, you have to record your voice for an audio request in your native language. In this way you can “bump” your submission ahead in the queue. You can download the audio file to your mobile device or add it to your favorite SRS/flashcard program and practice it.</span></p><span data-dcnode-id="2460" instrument_node=""> </span><p data-dcnode-id="2457"><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2456" instrument_node=""> </span><ul data-dcnode-id="2449"><li data-dcnode-id="2453"><div class="list-content" data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">RhinoSpike allows you to request anything from a word to a block of text (a letter, conversation, short story, article etc.) to be recorded for you by a native speaker of your target language.</span></div></li><li data-dcnode-id="2450"><div class="list-content" data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">One great option is the ability to request a transcription of an audio file or YouTube video.</span></div></li></ul><span data-dcnode-id="2448" instrument_node=""> </span><p data-dcnode-id="2445"><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2444" instrument_node=""> </span><ul data-dcnode-id="2440"><li data-dcnode-id="2441"><div class="list-content" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">You have to wait in a queue for your text to be recorded, and it may take some time.</span></div></li></ul><span data-dcnode-id="2439" instrument_node=""> </span><p data-dcnode-id="2435"><strong data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Best for</span></strong><span data-dcnode-id="2436" instrument_node="">: RhinoSpike is a good tool for practicing reading and listening at the same time. It’s a good way of making sure you pronounce everything correctly.</span></p><span data-dcnode-id="2434" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2432"><img alt="Hello Talk is the global language and cultural exchange community." class="wp-image-2719" data-dcnode-id="2433" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/12hellotalk.png" height="262" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/12hellotalk.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/12hellotalk-300x123.png 300w" style="height: 0px; padding-bottom: 237.847px;" width="640"></figure><span data-dcnode-id="2431" instrument_node=""> </span><h2 data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">12. Hello Talk</span></h2><span data-dcnode-id="2428" instrument_node=""> </span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Free on Android, iOS and web. There is a paid pro option ($0.99/month) which gives you unlimited translation, transliteration and transcription. You can also see your chat history and chat with groups of up to 50 members.</span></p><span data-dcnode-id="2425" instrument_node=""> </span><p data-dcnode-id="2421"><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hellotalk.com/Index/index/lan/en/hellotalk.html" rel="noreferrer noopener" target="_blank" title="Go to website hellotalk.com"><span data-dcnode-id="2424" instrument_node="">Hello Talk</span></a><span data-dcnode-id="2422" instrument_node=""> is the global language and cultural exchange community that connects you with native speakers of other languages.</span></p><span data-dcnode-id="2420" instrument_node=""> </span><p data-dcnode-id="2416"><strong data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Languages</span></strong><span data-dcnode-id="2417" instrument_node="">: More than 100 languages</span></p><span data-dcnode-id="2415" instrument_node=""> </span><h3 data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">How it works</span></h3><span data-dcnode-id="2412" instrument_node=""> </span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Search for native speakers of your target language whose needs match yours and practice your new language via text/audio messages. You can use tools like translation, transliteration, grammar correction, text-to-voice and voice recognition to improve your writing/speaking skills.</span></p><span data-dcnode-id="2409" instrument_node=""> </span><p data-dcnode-id="2406"><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2405" instrument_node=""> </span><ul data-dcnode-id="2395"><li data-dcnode-id="2402"><div class="list-content" data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Learn a foreign language with real people and immerse yourself in a different culture.</span></div></li><li data-dcnode-id="2399"><div class="list-content" data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">There is no curriculum, you have no homework and you’re having fun while learning a new language.</span></div></li><li data-dcnode-id="2396"><div class="list-content" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Learn the language in the way it is really spoken.</span></div></li></ul><span data-dcnode-id="2394" instrument_node=""> </span><p data-dcnode-id="2391"><strong data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2390" instrument_node=""> </span><ul data-dcnode-id="2383"><li data-dcnode-id="2387"><div class="list-content" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">You are limited to just one language if you have a free account.</span></div></li><li data-dcnode-id="2384"><div class="list-content" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Translation and transliteration are also limited with the free account.</span></div></li></ul><span data-dcnode-id="2382" instrument_node=""> </span><p data-dcnode-id="2378"><strong data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Best for</span></strong><span data-dcnode-id="2379" instrument_node="">: Hello Talk is a great tool for finding a language exchange partner.</span></p><span data-dcnode-id="2377" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2375"><img alt="Lang-8 is language learning platform where native speakers correct what you write." class="wp-image-2720" data-dcnode-id="2376" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/13lang8.png" height="313" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/13lang8.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/13lang8-300x147.png 300w" style="height: 0px; padding-bottom: 284.145px;" width="640"></figure><span data-dcnode-id="2374" instrument_node=""> </span><h2 data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">13. Lang-8</span></h2><span data-dcnode-id="2371" instrument_node=""> </span><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">The main features are free on the web. The premium account is $7/month.</span></p><span data-dcnode-id="2368" instrument_node=""> </span><p data-dcnode-id="2364"><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lang-8.com/" rel="noreferrer noopener" target="_blank" title="Go to website lang-8.com"><span data-dcnode-id="2367" instrument_node="">Lang-8</span></a><span data-dcnode-id="2365" instrument_node=""> is language learning platform where native speakers correct what you write. To join the community you have to create an account or sign up with Twitter or Facebook.</span></p><span data-dcnode-id="2363" instrument_node=""> </span><p data-dcnode-id="2359"><strong data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Languages</span></strong><span data-dcnode-id="2360" instrument_node="">: There are native speakers from more than 190 countries, and you can find a language exchange partner to study 90 languages.</span></p><span data-dcnode-id="2358" instrument_node=""> </span><h3 data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">How it works</span></h3><span data-dcnode-id="2355" instrument_node=""> </span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Write a text in your target language and a native speaker will correct your writing. Help others to learn your native language by correcting their writing.</span></p><span data-dcnode-id="2352" instrument_node=""> </span><p data-dcnode-id="2349"><strong data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2348" instrument_node=""> </span><ul data-dcnode-id="2338"><li data-dcnode-id="2345"><div class="list-content" data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Improve your writing by having it corrected.</span></div></li><li data-dcnode-id="2342"><div class="list-content" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Make friends after sharing your diaries with them.</span></div></li><li data-dcnode-id="2339"><div class="list-content" data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Write whatever you want, from a sentence to an essay.</span></div></li></ul><span data-dcnode-id="2337" instrument_node=""> </span><p data-dcnode-id="2334"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2333" instrument_node=""> </span><ul data-dcnode-id="2326"><li data-dcnode-id="2330"><div class="list-content" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Free members are limited to learning only two languages.</span></div></li><li data-dcnode-id="2327"><div class="list-content" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">You always see advertisements if you have a free account, which can be quite annoying.</span></div></li></ul><span data-dcnode-id="2325" instrument_node=""> </span><p data-dcnode-id="2321"><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Best for</span></strong><span data-dcnode-id="2322" instrument_node="">: An ideal service for grammar fans and intermediate speakers who want to improve their writing skills.</span></p><span data-dcnode-id="2320" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2318"><img alt="HiNative - app for language learning where you can ask questions to native speakers." class="wp-image-2721" data-dcnode-id="2319" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/14hinative.png" height="334" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/14hinative.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/14hinative-300x157.png 300w" style="height: 0px; padding-bottom: 303.209px;" width="640"></figure><span data-dcnode-id="2317" instrument_node=""> </span><h2 data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">14. HiNative</span></h2><span data-dcnode-id="2314" instrument_node=""> </span><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Free on web, iPhone and Android. Premium subscription is available for $9.99/month.</span></p><span data-dcnode-id="2311" instrument_node=""> </span><p data-dcnode-id="2307"><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hinative.com/en-US/" rel="noreferrer noopener" target="_blank" title="Go to website hinative.com"><span data-dcnode-id="2310" instrument_node="">HiNative</span></a><span data-dcnode-id="2308" instrument_node=""> is a Q&amp;A app for language learners where you can ask native speakers language and culture questions.</span></p><span data-dcnode-id="2306" instrument_node=""> </span><p data-dcnode-id="2302"><strong data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Languages</span></strong><span data-dcnode-id="2303" instrument_node="">: At the time of writing, HiNative boasted support for 110 languages from native speakers from 170 countries.</span></p><span data-dcnode-id="2301" instrument_node=""> </span><h3 data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">How it works</span></h3><span data-dcnode-id="2298" instrument_node=""> </span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">When you create an account or sign up with Twitter, Facebook or Lang-8, you can ask questions about any language and get answers from real native speakers. You can also post voice questions and answers via a simple app interface.</span></p><span data-dcnode-id="2295" instrument_node=""> </span><p data-dcnode-id="2292"><strong data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2291" instrument_node=""> </span><ul data-dcnode-id="2284"><li data-dcnode-id="2288"><div class="list-content" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">The interface is simple in design and easy to use.</span></div></li><li data-dcnode-id="2285"><div class="list-content" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">You can ask practically any question about a language/culture and get it answered quickly.</span></div></li></ul><span data-dcnode-id="2283" instrument_node=""> </span><p data-dcnode-id="2280"><strong data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2279" instrument_node=""> </span><ul data-dcnode-id="2275"><li data-dcnode-id="2276"><div class="list-content" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Not all features are available for free members.</span></div></li></ul><span data-dcnode-id="2274" instrument_node=""> </span><p data-dcnode-id="2270"><strong data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Best for</span></strong><span data-dcnode-id="2271" instrument_node="">: HiNative is good for language learners who want help with the basics of their target language and for people who are interested in different cultures.</span></p><span data-dcnode-id="2269" instrument_node=""> </span><figure class="wp-block-image size-full" data-dcnode-id="2267"><img alt="Polyglot Club - language exchange social network." class="wp-image-2722" data-dcnode-id="2268" data-image="https://custom-writing.org/blog/wp-content/uploads/2020/12/15polyglotclub.png" height="249" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/wp-content/themes/custom-writing.org/images/e.png&amp;raw" srcset="https://custom-writing.org/blog/wp-content/uploads/2020/12/15polyglotclub.png 640w, https://custom-writing.org/blog/wp-content/uploads/2020/12/15polyglotclub-300x117.png 300w" style="height: 0px; padding-bottom: 226.045px;" width="640"></figure><span data-dcnode-id="2266" instrument_node=""> </span><h2 data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">15. Polyglot Club</span></h2><span data-dcnode-id="2263" instrument_node=""> </span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">A language exchange community website. Registration is free.</span></p><span data-dcnode-id="2260" instrument_node=""> </span><p data-dcnode-id="2256"><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//polyglotclub.com/" rel="noreferrer noopener" target="_blank" title="Go to website polyglotclub.com"><span data-dcnode-id="2259" instrument_node="">Polyglot Club</span></a><span data-dcnode-id="2257" instrument_node=""> is a language exchange social network where you can connect with native speakers of your target language to practice different languages online and offline, while you make friends and discover cultures.</span></p><span data-dcnode-id="2255" instrument_node=""> </span><p data-dcnode-id="2251"><strong data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Languages</span></strong><span data-dcnode-id="2252" instrument_node="">: At the time of writing, there were 631,695 registered members from more than 150 countries, so you can learn practically any language.</span></p><span data-dcnode-id="2250" instrument_node=""> </span><h3 data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">How it works</span></h3><span data-dcnode-id="2247" instrument_node=""> </span><p data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">Find language exchange partners, submit written text for correction, watch language learning videos shared by community members, hang out in chat rooms, and even attend the club’s language exchange events and meet-ups to connect with more learners. Get the most from your studies with our selection of </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/36-best-websites" rel="noreferrer noopener" target="_blank" title="34 Best Websites for Full-Fledged Learning"><span data-dcnode-id="2245" instrument_node="">websites for full-fledged learning</span></a><span data-dcnode-id="2243" instrument_node="">.</span></p><span data-dcnode-id="2241" instrument_node=""> </span><p data-dcnode-id="2238"><strong data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Pros</span></strong></p><span data-dcnode-id="2237" instrument_node=""> </span><ul data-dcnode-id="2233"><li data-dcnode-id="2234"><div class="list-content" data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Meet community members at classes, courses, workshops, language exchange meetings, polyglot cafes, international parties and other events held around the world.</span></div></li></ul><span data-dcnode-id="2232" instrument_node=""> </span><p data-dcnode-id="2229"><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Cons</span></strong></p><span data-dcnode-id="2228" instrument_node=""> </span><ul data-dcnode-id="2224"><li data-dcnode-id="2225"><div class="list-content" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Finding someone for a long-term language exchange can be tricky, just like in real life.</span></div></li></ul><span data-dcnode-id="2223" instrument_node=""> </span><p data-dcnode-id="2219"><strong data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Best for</span></strong><span data-dcnode-id="2220" instrument_node="">: It’s a great place for students, travelers and anyone who is interested in learning new languages and about different cultures, and who likes meeting new people.</span></p><span data-dcnode-id="2218" instrument_node=""> </span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">What language learning websites and apps would you add to this list?</span></p><span data-dcnode-id="2215" instrument_node=""> </span><p data-dcnode-id="2212"><strong data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Further reading:</span></strong></p><span data-dcnode-id="2211" instrument_node=""> </span><ul data-dcnode-id="2186"><li data-dcnode-id="2207"><div class="list-content" data-dcnode-id="2208"><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-writing.org/blog/esl-resources
