</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1316" id="mntl-sc-block_1-0"><span data-dcnode-id="1327" instrument_node="">
The French word&nbsp;</span><em data-dcnode-id="1324"><a data-component="link" data-dcnode-id="1325" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/because-in-french-1368823"><span data-dcnode-id="1326" instrument_node="">comme</span></a></em><span data-dcnode-id="1323" instrument_node=""> means "like," "as" or "since" and is used in a large number of idiomatic expressions. Learn how to say soaking wet, knee-high to a grasshopper, so-so and more with this list of French expressions that use&nbsp;</span><em data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">comme</span></em><span data-dcnode-id="1320" instrument_node="">. Other cultures have found French expressions useful and have assimilated them into their languages. C</span><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">omme ci, comme ça, for instance,&nbsp;</span></em><span data-dcnode-id="1317" instrument_node="">is used in English and several other languages to mean so-so, fair, or just okay.
</span></p><span data-dcnode-id="1315" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1304" id="mntl-sc-block_1-0-1"><div class="comp mntl-block" data-dcnode-id="1305" id="mntl-block_4-0"><span data-dcnode-id="1314" instrument_node="">

The word&nbsp;</span><em data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">comme, </span></em><span data-dcnode-id="1299" instrument_node="">one of the most common and versatile in French,&nbsp;can be a conjunction, adverb, or part of an adverbial phrase.&nbsp;Like the </span><a data-component="link" data-dcnode-id="1297" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/because-in-french-1368823"><span data-dcnode-id="1298" instrument_node="">French&nbsp;conjunctions</span></a><span data-dcnode-id="1296" instrument_node=""> </span><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">parce que</span></em><span data-dcnode-id="1293" instrument_node="">, </span><em data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">car and</span></em><span data-dcnode-id="1290" instrument_node="">&nbsp;</span><em data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">puisque</span></em><span data-dcnode-id="1287" instrument_node="">, </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">comme</span></em><span data-dcnode-id="1284" instrument_node="">&nbsp;is commonly used to draw conclusions or otherwise relate a cause or explanation with a result or conclusion. For example,&nbsp;</span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Comme je lis le plus vite, j'ai déjà fini&nbsp;</span></em><span data-dcnode-id="1281" instrument_node="">means&nbsp;"Since I read the fastest, I've already finished."
</span></p><span data-dcnode-id="1279" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1001" id="mntl-sc-block_1-0-3"><div class="comp mntl-block" data-dcnode-id="1002" id="mntl-block_5-0"><span data-dcnode-id="1278" instrument_node="">
