t+across"><span data-dcnode-id="843" instrument_node="">cut across</span></a></li><li data-dcnode-id="838"><a data-dcnode-id="839" href="file://www.thefreedictionary.com/drop+by"><span data-dcnode-id="840" instrument_node="">drop by</span></a></li><li data-dcnode-id="835"><a data-dcnode-id="836" href="file://www.thefreedictionary.com/drop+in"><span data-dcnode-id="837" instrument_node="">drop in</span></a></li><li data-dcnode-id="832"><a data-dcnode-id="833" href="file://www.thefreedictionary.com/drop+off"><span data-dcnode-id="834" instrument_node="">drop off</span></a></li><li data-dcnode-id="829"><a data-dcnode-id="830" href="file://www.thefreedictionary.com/get"><span data-dcnode-id="831" instrument_node="">get</span></a></li><li data-dcnode-id="826"><a data-dcnode-id="827" href="file://www.thefreedictionary.com/get+about"><span data-dcnode-id="828" instrument_node="">get about</span></a></li><li data-dcnode-id="823"><a data-dcnode-id="824" href="file://www.thefreedictionary.com/get+across"><span data-dcnode-id="825" instrument_node="">get across</span></a></li><li data-dcnode-id="820"><a data-dcnode-id="821" href="file://www.thefreedictionary.com/get+ahead"><span data-dcnode-id="822" instrument_node="">get ahead</span></a></li></ul><span data-dcnode-id="818" instrument_node="">

</span><a class="link" data-dcnode-id="807" href="file://www.thefreedictionary.com/_/help/help3.htm%23325"><span data-dcnode-id="808" instrument_node="">?</span></a><span data-dcnode-id="806" instrument_node="">

</span><div class="lit" data-dcnode-id="795"><span data-dcnode-id="802" instrument_node="">"We now keep our fingers crossed and wait." As I was deciphering his </span><span class="highlight" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="799" instrument_node="">, he added.</span><div class="lit_links" data-dcnode-id="796"><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Dr%2BJoshipura%253A%2BThe%2Bhumble%2Bhero%2Bwho%2Bhelped%2Bme%2Bnavigate%2Bmy%2Bfirst%2Bdays%2Bin...-a0588268695"><span data-dcnode-id="798" instrument_node="">Dr Joshipura: The humble hero who helped me navigate my first days in the UK easily</span></a></div></div><div class="lit" data-dcnode-id="787"><span data-dcnode-id="794" instrument_node="">Rather, in both cases, ribu is part of an </span><span class="highlight" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="791" instrument_node=""> which has a set meaning as a whole and is not specific to ribu.</span><div class="lit_links" data-dcnode-id="788"><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Samely%252C%2BU.B.%252C%2Band%2BR.H.%2BBarnes%253A%2BA%2BDictionary%2Bof%2Bthe%2BKedang%2BLanguage....-a0423048741"><span data-dcnode-id="790" instrument_node="">Samely, U.B., and R.H. Barnes: A Dictionary of the Kedang Language. Kedang-Indonesian-English</span></a></div></div><div class="lit" data-dcnode-id="779"><span data-dcnode-id="786" instrument_node="">Eve Kosofky Sedgwick, in her book Epistemology of the Closet, talks about the eunuchs vis-a-vis an </span><span class="highlight" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="783" instrument_node=""> i.e.</span><div class="lit_links" data-dcnode-id="780"><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Breaking%2Bthe%2BStereotypes-a0386040641"><span data-dcnode-id="782" instrument_node="">Breaking the Stereotypes</span></a></div></div><div class="lit" data-dcnode-id="771"><span data-dcnode-id="778" instrument_node="">One </span><span class="highlight" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="775" instrument_node=""> that she uses quite often throughout the book is having been put "on the shelf--a phrase that she also describes as similar to "put out to pasture, eased off into the sunset, written off." Putting it more precisely, she defines it as "how a reluctantly unemployed [person] ...</span><div class="lit_links" data-dcnode-id="772"><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/A%2Bworking%2Bwe%2Bwill%2Bgo%253A%2Bprofessional%2Bwomen%2Bover%2B60%2Band%2Bstill%2Bworking-a0349488853"><span data-dcnode-id="774" instrument_node="">A working we will go: professional women over 60 and still working</span></a></div></div><div class="lit" data-dcnode-id="760"><span data-dcnode-id="770" instrument_node="">(14) Likewise, one may speak of the sense 'to be respected' that is expressed by the </span><span class="highlight" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="767" instrument_node=""> to save one's FACE (15) Finally, there is the sense 'to be insincere' expressed, for example, by the phraseological formation to carry/bear two FACES in one hood, and the sense 'to lose respect' that emerges from the </span><span class="highlight" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="764" instrument_node=""> to lose one's FACE.</span><div class="lit_links" data-dcnode-id="761"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/The%2Bpolitics%2Bof%2Bbody-part%2Bterminology%253A%2Bon%2Bthe%2Bconceptual%2Baffiliation...-a0330005475"><span data-dcnode-id="763" instrument_node="">The politics of body-part terminology: on the conceptual affiliation of the lexical item face</span></a></div></div><div class="lit" data-dcnode-id="752"><span data-dcnode-id="759" instrument_node="">"The elephant in the room" is an </span><span class="highlight" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="756" instrument_node=""> that does not accrue in meaning by the Principle of Compositionality (attributed first to the mathematician Frege, but about which many scholars of logic, philosophy, and linguistics have written, and is basically the idea that vocabulary--agreed upon as well as personal--matters and so does syntax, and that you can break a sentence down to its component parts, its rules becoming evident even if the speaker isn't fully aware of the rules they were employing).</span><div class="lit_links" data-dcnode-id="753"><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Climbing%2Bthe%2BTree%2Bof%2BKnowledge%2Bwith%2Ba%2BCheetah%2Bon%2BHis%2BAss%253A%2BA...-a0261152647"><span data-dcnode-id="755" instrument_node="">Climbing the Tree of Knowledge with a Cheetah on His Ass: A Quasi-Psycholinguistic Reading of Bob Hicok's Words for Empty and Words for Full</span></a></div></div><div class="lit" data-dcnode-id="744"><span data-dcnode-id="751" instrument_node="">They matched all phrases for length and familiarity, but the students still took longer to associate an </span><span class="highlight" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="748" instrument_node=""> with a linked word than to associate a literal phrase with its linked word.</span><div class="lit_links" data-dcnode-id="745"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/We%2Buse%2Bboth%2Bsides%2Bof%2Bour%2Bbrains%2Bto%2Bunderstand%2Bidioms-a0207850284"><span data-dcnode-id="747" instrument_node="">We use both sides of our brains to understand idioms</span></a></div></div><div class="lit" data-dcnode-id="736"><span data-dcnode-id="743" instrument_node="">Thus, the phrase "His arm is short" becomes a "pun" (alternatively, the meaning of the </span><span class="highlight" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="740" instrument_node=""> is realised), so that the two meanings compel the reader to attend back to the verbal signifier.</span><div class="lit_links" data-dcnode-id="737"><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Two%2BMedieval%2BHebrew%2Bdevotional%2Bpoems%2Bconvention%252C%2Bevaluation%252C%2Band...-a0178617009"><span data-dcnode-id="739" instrument_node="">Two Medieval Hebrew devotional poems convention, evaluation, and "platonic" vs "metaphysical" poetry</span></a></div></div><div class="lit" data-dcnode-id="728"><span data-dcnode-id="735" instrument_node="">The first lapsus appears already in the subtitle: the </span><span class="highlight" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="732" instrument_node=""> "im Spiegel von" is normally combined with an abstract expression, not with a person's name.</span><div class="lit_links" data-dcnode-id="729"><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Horatius%2BAquisgranensis%253A%2BAachen%2Bim%2BSpiegel%2Bdes%2Bneulateinischen...-a0158525717"><span data-dcnode-id="731" instrument_node="">Horatius Aquisgranensis: Aachen im Spiegel des neulateinischen Dichters Johann Gerhard Joseph von Asten (1765-1831)</span></a></div></div><div class="lit" data-dcnode-id="720"><span data-dcnode-id="727" instrument_node="">I also am reminded of an </span><span class="highlight" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="724" instrument_node=""> I encountered while traveling abroad: value-added tax.</span><div class="lit_links" data-dcnode-id="721"><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Adjusting%2Bin%2BEarnest-a0109024118"><span data-dcnode-id="723" instrument_node="">Adjusting in Earnest</span></a></div></div><div class="lit" data-dcnode-id="712"><span data-dcnode-id="719" instrument_node="">Compiled by a team of researchers headed by Professor Werner Welzig, President of the Austrian Academy of Sciences, this sample of the seemingly endless stylistic innovation of the 22,586 pages of Karl Kraus's Die Fackel is not merely quantitatively substantial; its 930-page core consists of 144 articles documenting all instances of a particular </span><span class="highlight" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="716" instrument_node="">. With its alphabetical structure, it aspires to being a compendium of and stimulus for modern German usage, not least because, as the editor reminds us, the raw material of Kraus's hypersensitive language satire over four decades comprised the widest range of everyday discourse, whether the Viennese vernacular of 'da gibt's keine Wurschteln', folklore like 'alles gerettet!', or catchphrases and neologisms.</span><div class="lit_links" data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Worterbuch%2Bder%2BRedensarten%2Bzu%2Bder%2Bvon%2BKarl%2BKraus%2B1899%2Bbis%2B1936...-a0100148367"><span data-dcnode-id="715" instrument_node="">Worterbuch der Redensarten zu der von Karl Kraus 1899 bis 1936 herausgegebenen Zeitschrift 'Die Fackel.'(Book Review)</span></a></div></div><div class="lit" data-dcnode-id="704"><span data-dcnode-id="711" instrument_node="">The play of language here has little to do with the shallow form of irony according to which an </span><span class="highlight" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">idiomatic phrase</span></span><span data-dcnode-id="708" instrument_node=""> or cliche is used in order to reveal its inappropriateness or inadequacy.</span><div class="lit_links" data-dcnode-id="705"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Bob%2BDylan%2Band%2Bthe%2Btone%2Bbehind%2Bthe%2Blanguage-a084054423"><span data-dcnode-id="707" instrument_node="">Bob Dylan and the tone behind the language</span></a></div></div><div data-dcnode-id="700" data-periodicals="0"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/_/search/Search.aspx%3FBy%3D0%26SearchBy%3D0%26q%3DIdiomatic%2520phrase" rel="nofollow" style="margin-top:12px;float:right"><b data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">More results ►</span></b></a></div><span data-dcnode-id="699" instrument_node="">
