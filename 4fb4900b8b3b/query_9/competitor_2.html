</span><div data-dcnode-id="595" id="lit-term-content"><span data-dcnode-id="1082" instrument_node=""> </span><h2 data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Idiom Definition</span></h2><span data-dcnode-id="1079" instrument_node=""> </span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">What is an idiom? Here’s a quick and simple definition:</span></p><span data-dcnode-id="1076" instrument_node=""> </span><blockquote class="definition" data-dcnode-id="1068"><span data-dcnode-id="1075" instrument_node=""> </span><p data-dcnode-id="1070"><span data-dcnode-id="1074" instrument_node="">An idiom is a phrase that conveys a </span><a class="lit-term" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/literary-devices-and-terms/figurative-language"><span data-dcnode-id="1073" instrument_node="">figurative</span></a><span data-dcnode-id="1071" instrument_node=""> meaning that is difficult or impossible to understand based solely on a literal interpretation of the words in the phrase. For example, saying that something is "beyond the pale" is an idiomatic way of saying that it is improper or "over the line," but you would only know that if someone had explained it to you, or if you had been able to infer its meaning based on context.</span></p><span data-dcnode-id="1069" instrument_node=""> </span></blockquote><span data-dcnode-id="1067" instrument_node=""> </span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Some additional key details about idioms:</span></p><span data-dcnode-id="1064" instrument_node=""> </span><ul data-dcnode-id="1050"><span data-dcnode-id="1063" instrument_node=""> </span><li data-dcnode-id="1058"><span data-dcnode-id="1062" instrument_node="">Idioms are usually specific to a particular region, culture, language, or </span><span class="missing-lit-term-link" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">dialect</span></span><span data-dcnode-id="1059" instrument_node="">, and they are often difficult to translate from one language or culture to another.</span></li><span data-dcnode-id="1057" instrument_node=""> </span><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Although many idioms are widely understood by people within the region, culture, or language where they are used, some idioms are less commonly used than others, and therefore would not make sense to someone who hadn't heard the idiom used frequently, or who hadn't has the meaning explained to them.</span></li><span data-dcnode-id="1054" instrument_node=""> </span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Idioms become popularized through everyday spoken language, but they are widely used in writing and literature, too. Writers often use idioms in dialogue in order to create realistic voices for their characters, and using idioms can also more generally make writing seem down-to-earth and accessible.</span></li><span data-dcnode-id="1051" instrument_node=""> </span></ul><span data-dcnode-id="1049" instrument_node=""> </span><h3 data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">How to Pronounce Idiom</span></h3><span data-dcnode-id="1046" instrument_node=""> </span><p data-dcnode-id="1041"><span data-dcnode-id="1045" instrument_node="">Here's how to pronounce idiom: </span><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">ih</span></strong><span data-dcnode-id="1042" instrument_node="">-dee-um</span></p><span data-dcnode-id="1040" instrument_node=""> </span><h3 data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Understanding Idioms</span></h3><span data-dcnode-id="1037" instrument_node=""> </span><p data-dcnode-id="1032"><span data-dcnode-id="1036" instrument_node="">Idioms are groups of words that only make sense when they are interpreted </span><a class="lit-term" data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/literary-devices-and-terms/figurative-language"><span data-dcnode-id="1035" instrument_node="">figuratively</span></a><span data-dcnode-id="1033" instrument_node=""> rather than literally. For example, if you were waiting in line at the DMV to renew your driver's license and suddenly realized you'd forgotten to bring all the right documents, you might complain about all the "red tape" preventing people from renewing your license. But if the person standing in line next to you had never heard this idiom and interpreted your words literally, they would probably be confused, because they wouldn't see any red tape anywhere. However, someone who knows the idiom would understand that by "red tape" you simply mean "unnecessary bureaucratic regulations." Similarly, if someone were to say, "I can't believe I have to jump through all of these hoops to get my license," they wouldn't literally mean that the DMV requires them to jump through hoops—they're simply complaining that they need to fulfill so many different requirements in order to get their license.</span></p><span data-dcnode-id="1031" instrument_node=""> </span><h4 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Where Idioms Come From</span></h4><span data-dcnode-id="1028" instrument_node=""> </span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">The majority of idioms originated as phrases with literal meanings, and only later came to have a figurative and more widely-known meaning. "Red tape" is one such idiom: in England, the government used to use red ribbon to bind packets of legal documents together, so red tape came to be associated with bureaucracy and legal regulations. But the phrase continued to be used long after legal documents ceased to be tied with red ribbon, and today "red tape" is an idiom that is used exclusively as a figurative expression.</span></p><span data-dcnode-id="1025" instrument_node=""> </span><h4 data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Idioms Are Set Phrases</span></h4><span data-dcnode-id="1022" instrument_node=""> </span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Idioms are said to be "set phrases," meaning that they only make sense if you use them exactly. For instance, if instead of using the term "red tape" when complaining about all the bureaucracy at the DMV you instead complained about all of the "crimson ribbon," no one would have any idea what you're talking about. Idioms are almost set phrases, in that they only make sense when they aren't modified.</span></p><span data-dcnode-id="1019" instrument_node=""> </span><h3 data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Idioms, Colloquialisms, and Euphemisms</span></h3><span data-dcnode-id="1016" instrument_node=""> </span><p data-dcnode-id="1008"><span data-dcnode-id="1015" instrument_node="">Idioms are related to and sometimes confused with two other literary terms: </span><a class="lit-term" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/literary-devices-and-terms/colloquialism"><span data-dcnode-id="1014" instrument_node="">colloquialisms</span></a><span data-dcnode-id="1012" instrument_node=""> and </span><span class="missing-lit-term-link" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">euphemisms</span></span><span data-dcnode-id="1009" instrument_node="">.</span></p><span data-dcnode-id="1007" instrument_node=""> </span><h4 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Colloquialisms vs. Idioms</span></h4><span data-dcnode-id="1004" instrument_node=""> </span><p data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">Colloquialisms are informal words or phrases in writing or speech that only make sense to people of a particular community. Such communities are usually defined in geographical terms, meaning that colloquialisms are often delineated by their use within a </span><span class="missing-lit-term-link" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">dialect</span></span><span data-dcnode-id="1000" instrument_node="">, a regionally-defined variant of a larger language. Colloquialisms differ from idioms in two ways:</span></p><span data-dcnode-id="998" instrument_node=""> </span><ul data-dcnode-id="984"><span data-dcnode-id="997" instrument_node=""> </span><li data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">
</span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Figurative vs non-figurative:</span></strong><span data-dcnode-id="993" instrument_node=""> Colloquialisms can be either figurative or literal, while idioms must be figurative.</span></li><span data-dcnode-id="991" instrument_node=""> </span><li data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">
</span><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Length:</span></strong><span data-dcnode-id="987" instrument_node=""> A colloquialism can be one or more words, while an idiom is always a set phrase of two or more words.</span></li><span data-dcnode-id="985" instrument_node=""> </span></ul><span data-dcnode-id="983" instrument_node=""> </span><p data-dcnode-id="975"><span data-dcnode-id="982" instrument_node="">Idioms are a subset of colloquialisms: all idioms are colloquialisms, but not all colloquialisms are idioms. Colloquialisms can be idioms, but they can also be </span><a class="lit-term" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/literary-devices-and-terms/aphorism"><span data-dcnode-id="981" instrument_node="">aphorisms</span></a><span data-dcnode-id="979" instrument_node="">, terminology, or even profanity. For instance, the terms "pop," "coke," and "soda," are all different colloquialisms used in different parts of the United States to mean "bubbly sugar water." These colloquialisms are </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">not</span></em><span data-dcnode-id="976" instrument_node=""> idioms, though, because they aren't figurative and they're single words.</span></p><span data-dcnode-id="974" instrument_node=""> </span><h4 data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Euphemisms vs. Idioms</span></h4><span data-dcnode-id="971" instrument_node=""> </span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Euphemisms are mild, indirect, or gentle words or phrases substituted for other words or phrases that are considered to be too embarrassing, unpleasant, offensive, or harsh to use in formal settings or in polite conversation. When we say that someone "passed away" instead of saying that they died, we are using a phrase that is both an idiom and a euphemism: the phrase is a figurative way of saying in an unoffensive way that someone died.</span></p><span data-dcnode-id="968" instrument_node=""> </span><p data-dcnode-id="960"><span data-dcnode-id="967" instrument_node="">However, not </span><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">all</span></em><span data-dcnode-id="964" instrument_node=""> idioms are euphemisms, because not all idioms are designed to avoid having to state something uncomfortable directly. Similarly, not all euphemisms are idioms, because not all euphemisms are "set phrases," as an idiom must be. For example, when it was discovered in 2013 that former director of national intelligence, James Clapper, had lied to the US Senate, Clapper explained that he had responded in "the least untruthful manner" possible. Because it is not a widely used set phrase with a figurative meaning, "the least untruthful manner" is not an idiom, but it </span><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">is</span></em><span data-dcnode-id="961" instrument_node=""> a euphemism because it is meant to soften the uncomfortable reality of Clapper's lie.</span></p><span data-dcnode-id="959" instrument_node=""> </span><h2 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Idiom Examples</span></h2><span data-dcnode-id="956" instrument_node=""> </span><h3 data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Examples of Idioms in Everyday Speech</span></h3><span data-dcnode-id="953" instrument_node=""> </span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Idioms are such a central part of ordinary speech that people often use them without thinking about the fact that they're employing a form of figurative language.</span></p><span data-dcnode-id="950" instrument_node=""> </span><h4 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Idioms and Death</span></h4><span data-dcnode-id="947" instrument_node=""> </span><ul data-dcnode-id="892"><span data-dcnode-id="946" instrument_node=""> </span><li data-dcnode-id="940"><span data-dcnode-id="945" instrument_node="">If you want to inoffensively state that a person has died, you might say that they </span><strong data-dcnode-id="942"><em data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">passed away</span></em></strong><span data-dcnode-id="941" instrument_node="">. This idiom is also a euphemism.</span></li><span data-dcnode-id="939" instrument_node=""> </span><li data-dcnode-id="926"><span data-dcnode-id="938" instrument_node="">You could also say that someone </span><strong data-dcnode-id="935"><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">bit the dust</span></em></strong><span data-dcnode-id="934" instrument_node=""> or </span><strong data-dcnode-id="931"><em data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">kicked the bucket</span></em></strong><span data-dcnode-id="930" instrument_node="">—but these idioms are considered crude and insensitive, and therefore are </span><em data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">not</span></em><span data-dcnode-id="927" instrument_node=""> euphemisms.</span></li><span data-dcnode-id="925" instrument_node=""> </span><li data-dcnode-id="911"><span data-dcnode-id="924" instrument_node="">The idiom </span><em data-dcnode-id="921"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">bucket list</span></strong></em><span data-dcnode-id="920" instrument_node=""> is related to the idiom </span><em data-dcnode-id="916"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">kicked the bucket</span></strong><span data-dcnode-id="917" instrument_node="">—</span></em><span data-dcnode-id="915" instrument_node="">it's not a list of buckets, but a list of things you want to do </span><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">before</span></em><span data-dcnode-id="912" instrument_node=""> you "kick the bucket."</span></li><span data-dcnode-id="910" instrument_node=""> </span><li data-dcnode-id="904"><span data-dcnode-id="909" instrument_node="">Again, if you're not worried about being polite, you might say that a person who is dead and buried is </span><strong data-dcnode-id="906"><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">pushing up daisies</span></em></strong><span data-dcnode-id="905" instrument_node="">.</span></li><span data-dcnode-id="903" instrument_node=""> </span><li data-dcnode-id="894"><span data-dcnode-id="902" instrument_node="">And if you say that someone is </span><em data-dcnode-id="899"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">sleeping with the fishes,</span></strong></em><span data-dcnode-id="898" instrument_node=""> it means they've been killed and disposed of in some body of water. (This particular idiom originated in the film </span><em data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The Godfather</span></em><span data-dcnode-id="895" instrument_node="">.)</span></li><span data-dcnode-id="893" instrument_node=""> </span></ul><span data-dcnode-id="891" instrument_node=""> </span><h4 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Idioms and Sleep</span></h4><span data-dcnode-id="888" instrument_node=""> </span><ul data-dcnode-id="854"><span data-dcnode-id="887" instrument_node=""> </span><li data-dcnode-id="877"><span data-dcnode-id="886" instrument_node="">If you're about to go to bed, you might announce that you're planning to </span><strong data-dcnode-id="883"><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">hit the hay</span></em></strong><span data-dcnode-id="882" instrument_node=""> or </span><em data-dcnode-id="879"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">hit the sack</span></strong></em><span data-dcnode-id="878" instrument_node="">.</span></li><span data-dcnode-id="876" instrument_node=""> </span><li data-dcnode-id="870"><span data-dcnode-id="875" instrument_node="">If you want to get some sleep, you could say you want to </span><strong data-dcnode-id="872"><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">catch some shut-eye</span></em></strong><span data-dcnode-id="871" instrument_node="">.</span></li><span data-dcnode-id="869" instrument_node=""> </span><li data-dcnode-id="863"><span data-dcnode-id="868" instrument_node="">And if a person sleeps so soundly that it is difficult to wake them, you could say they </span><strong data-dcnode-id="865"><em data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">sleep like a log</span></em></strong><span data-dcnode-id="864" instrument_node="">.</span></li><span data-dcnode-id="862" instrument_node=""> </span><li data-dcnode-id="856"><span data-dcnode-id="861" instrument_node="">A </span><em data-dcnode-id="858"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">cat nap </span></strong></em><span data-dcnode-id="857" instrument_node="">is a particularly short nap, usually in the middle of the day.</span></li><span data-dcnode-id="855" instrument_node=""> </span></ul><span data-dcnode-id="853" instrument_node=""> </span><h4 data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Idioms and Body Parts</span></h4><span data-dcnode-id="850" instrument_node=""> </span><ul data-dcnode-id="813"><span data-dcnode-id="849" instrument_node=""> </span><li data-dcnode-id="843"><span data-dcnode-id="848" instrument_node="">A person who is very busy might say, </span><em data-dcnode-id="845"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">"I have my hands full."</span></strong></em><span data-dcnode-id="844" instrument_node="">
</span></li><span data-dcnode-id="842" instrument_node=""> </span><li data-dcnode-id="836"><span data-dcnode-id="841" instrument_node="">Someone who is prepared to listen attentively might tell you, </span><strong data-dcnode-id="838"><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">"I'm all ears!"</span></em></strong><span data-dcnode-id="837" instrument_node="">
</span></li><span data-dcnode-id="835" instrument_node=""> </span><li data-dcnode-id="829"><span data-dcnode-id="834" instrument_node="">If someone guesses what you are thinking, you could tell them, </span><strong data-dcnode-id="831"><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">"You read my mind!"</span></em></strong><span data-dcnode-id="830" instrument_node="">
</span></li><span data-dcnode-id="828" instrument_node=""> </span><li data-dcnode-id="822"><span data-dcnode-id="827" instrument_node="">To wish an actor luck, people often tell them, </span><em data-dcnode-id="824"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">"Break a leg!"</span></strong></em><span data-dcnode-id="823" instrument_node="">
</span></li><span data-dcnode-id="821" instrument_node=""> </span><li data-dcnode-id="815"><span data-dcnode-id="820" instrument_node="">If you plan to watch someone closely, you might say, "I'm going to </span><em data-dcnode-id="817"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">keep an eye on </span></strong></em><span data-dcnode-id="816" instrument_node="">them."</span></li><span data-dcnode-id="814" instrument_node=""> </span></ul><span data-dcnode-id="812" instrument_node=""> </span><h3 data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Examples of Idioms in Literature</span></h3><span data-dcnode-id="809" instrument_node=""> </span><h4 data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">
</span><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Much Ado About Nothing</span></em><span data-dcnode-id="805" instrument_node=""> by William Shakespeare</span></h4><span data-dcnode-id="803" instrument_node=""> </span><p data-dcnode-id="793"><span data-dcnode-id="802" instrument_node="">In </span><a class="book-link" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/lit/much-ado-about-nothing"><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Much Ado About Nothin</span></em></a><em data-dcnode-id="795"><a class="book-link" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/lit/much-ado-about-nothing"><span data-dcnode-id="798" instrument_node="">g,</span></a><span data-dcnode-id="796" instrument_node=""> </span></em><span data-dcnode-id="794" instrument_node="">the character Antonio says of his brother Leonato:</span></p><span data-dcnode-id="792" instrument_node=""> </span><blockquote data-dcnode-id="785"><span data-dcnode-id="791" instrument_node=""> </span><p data-dcnode-id="787"><span data-dcnode-id="790" instrument_node="">If he could right himself with quarreling,</span><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">  some of us would lie low.</span></p><span data-dcnode-id="786" instrument_node=""> </span></blockquote><span data-dcnode-id="784" instrument_node=""> </span><p data-dcnode-id="776"><span data-dcnode-id="783" instrument_node="">In this scene, Antonio muses that, if his brother could fight, his enemies would do well to hide from him—implying that they'd surely be defeated. The idiom "to lie low," which means to hide oneself or to remain hidden in order to avoid notice, was already in common usage when Shakespeare wrote </span><em data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Much Ado About Nothing </span></em><span data-dcnode-id="780" instrument_node="">(though Shakespeare is known not only for using many idioms, but for coining (or inventing) original figurative expressions that over time have </span><em data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">become</span></em><span data-dcnode-id="777" instrument_node=""> widely used idioms.)</span></p><span data-dcnode-id="775" instrument_node=""> </span><h4 data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">
</span><em data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The Adventures of Tom Sawyer</span></em><span data-dcnode-id="771" instrument_node=""> by Mark Twain</span></h4><span data-dcnode-id="769" instrument_node=""> </span><p data-dcnode-id="763"><span data-dcnode-id="768" instrument_node="">In the opening chapter </span><a class="book-link" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/lit/the-adventures-of-tom-sawyer"><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The Adventures of Tom Sawyer</span></em></a><span data-dcnode-id="764" instrument_node="">, Tom, the novel's protagonist and title character, plays a trick on his Aunt Polly. Uncertain if she should laugh or reprimand him, she says:</span></p><span data-dcnode-id="762" instrument_node=""> </span><blockquote data-dcnode-id="757"><span data-dcnode-id="761" instrument_node=""> </span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Can't learn an old dog new tricks, as the saying is. But my goodness, he never plays them alike, two days, and how is a body to know what's coming? He 'pears to know just how long he can torment me before I get my dander up, and he knows if he can make out to put me off for a minute or make me laugh, it's all down again and I can't hit him a lick.</span></p><span data-dcnode-id="758" instrument_node=""> </span></blockquote><span data-dcnode-id="756" instrument_node=""> </span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">This passage is full of idioms. To "get one's dander up" is an idiom meaning to arouse one's anger; and "to put someone off" is to delay, discourage, or dissuade them. Aunt Polly uses these two idioms together to express that Tom always teases her just enough to momentarily anger her before making her laugh and persuading her to forgive him. Twain is known for using idioms and colloquial language in his writing, and this passage is an excellent example of how writers can use idioms in dialogue to give their characters distinct, lifelike voices.</span></p><span data-dcnode-id="753" instrument_node=""> </span><h4 data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">
</span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">As I Lay Dying</span></em><span data-dcnode-id="749" instrument_node=""> by William Faulkner</span></h4><span data-dcnode-id="747" instrument_node=""> </span><p data-dcnode-id="741"><span data-dcnode-id="746" instrument_node="">In </span><a class="book-link" data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/lit/as-i-lay-dying"><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">As I Lay Dying</span></em></a><span data-dcnode-id="742" instrument_node="">, Addie Bundren's husband, Anse, announces that after Addie dies, the family will have to take her body to be buried in Jefferson. Even though the trip will be a difficult one, he says they must go because:</span></p><span data-dcnode-id="740" instrument_node=""> </span><blockquote data-dcnode-id="735"><span data-dcnode-id="739" instrument_node=""> </span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Her mind is set on it.</span></p><span data-dcnode-id="736" instrument_node=""> </span></blockquote><span data-dcnode-id="734" instrument_node=""> </span><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">The idiom "to have one's mind set on something" means to be determined to do something, or to be determined that something will happen. </span><em data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">As I Lay Dying </span></em><span data-dcnode-id="730" instrument_node="">is narrated by 15 different characters, and Faulkner gives each of them their own distinctive voice. One of the ways he does this is by having characters speak using idioms and colloquial language.</span></p><span data-dcnode-id="728" instrument_node=""> </span><h4 data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">
</span><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Everything I Never Told You </span></em><span data-dcnode-id="724" instrument_node="">by Celeste Ng</span></h4><span data-dcnode-id="722" instrument_node=""> </span><p data-dcnode-id="716"><span data-dcnode-id="721" instrument_node="">In this passage in </span><a class="book-link" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/lit/everything-i-never-told-you"><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Everything I Never Told You</span></em></a><span data-dcnode-id="717" instrument_node="">, the character Marilyn thinks about her mother, Doris Walker, who is a home economics teacher:</span></p><span data-dcnode-id="715" instrument_node=""> </span><blockquote data-dcnode-id="710"><span data-dcnode-id="714" instrument_node=""> </span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Newcomers to the school district assumed Mrs. Walker was a widow. Her mother herself never mentioned it. She still powdered her nose after cooking and before eating she still put on lipstick before coming downstairs to make breakfast. So they called it keeping house for a reason, Marilyn thought. Sometimes it did run away.</span></p><span data-dcnode-id="711" instrument_node=""> </span></blockquote><span data-dcnode-id="709" instrument_node=""> </span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Here, Marilyn contemplates the idiom "keeping house," which means to take care of a household by cooking, cleaning, and so on. Marilyn's observation that "sometimes [houses] did run away" rests on her literal interpretation of the word "keep," which implies that one could lose a house if they don't "keep" it.</span></p><span data-dcnode-id="706" instrument_node=""> </span><h3 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Examples of Idioms in Pop Music</span></h3><span data-dcnode-id="703" instrument_node=""> </span><h4 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Idiom in "We Are Never Getting Back Together" by Taylor Swift</span></h4><span data-dcnode-id="700" instrument_node=""> </span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">In the song "We Are Never Getting Back Together," Taylor Swift uses two idioms to describe her decision to end a romantic relationship:</span></p><span data-dcnode-id="697" instrument_node=""> </span><blockquote data-dcnode-id="688"><span data-dcnode-id="696" instrument_node=""> </span><p data-dcnode-id="690"><span data-dcnode-id="695" instrument_node="">Ooh, we called it off again last night</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">  But ooh, this time I'm telling you, I'm telling you</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">  We are never ever ever getting back together</span></p><span data-dcnode-id="689" instrument_node=""> </span></blockquote><span data-dcnode-id="687" instrument_node=""> </span><p data-dcnode-id="676"><span data-dcnode-id="686" instrument_node="">When Swift sings that she and her partner "called it off," she employs an idiom that means</span><em data-dcnode-id="684"><span data-dcnode-id="685" instrument_node=""> to cancel something</span></em><span data-dcnode-id="683" instrument_node="">—and in this case, the thing that they are canceling is their relationship. When she says, "We are never getting back together," she is using another idiom: to </span><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">get together</span></em><span data-dcnode-id="680" instrument_node=""> can either mean to begin dating, or alternatively it can be a </span><span class="missing-lit-term-link" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">euphemistic</span></span><span data-dcnode-id="677" instrument_node=""> idiom for being physically intimate with someone.</span></p><span data-dcnode-id="675" instrument_node=""> </span><h2 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Why Do Writers Use Idioms?</span></h2><span data-dcnode-id="672" instrument_node=""> </span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Writers use idioms for many of the same reasons people use idioms in everyday speech: these pithy, "set phrases" of figurative language convey ideas in a neat and easily recognizable way. Often, people use idioms without thinking much about it (for many, it's just as natural to say that they'll "give it a shot" as it is to say they'll try something, and simpler to say that they're "getting in the holiday spirit" than it is to say that they're in the mood to participate in seasonal festivities). Here are some of the other reasons a writer might choose to use an idiom rather than saying something without the use of figurative language:</span></p><span data-dcnode-id="669" instrument_node=""> </span><ul data-dcnode-id="637"><span data-dcnode-id="668" instrument_node=""> </span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Writers often use idioms to create a distinctive voice for their narrators or other characters.</span></li><span data-dcnode-id="665" instrument_node=""> </span><li data-dcnode-id="651"><span data-dcnode-id="664" instrument_node="">It's particularly common to see idioms in dialogue because writers want their characters to sound like real people, and real people use idioms all the time. Writers can use idioms to convey a character's tone and emotions, too.   </span><ul data-dcnode-id="653"><span data-dcnode-id="663" instrument_node=""> </span><li data-dcnode-id="655"><span data-dcnode-id="662" instrument_node="">When, in </span><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">The Adventures of Tom Sawyer</span></em><span data-dcnode-id="659" instrument_node="">, Aunt Polly says that Tom knows how to </span><em data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">get her dander up, </span></em><span data-dcnode-id="656" instrument_node="">readers can infer that Tom is annoying or angering her, but the silly-sounding idiom creates a more lighthearted and humorous tone than if she were to say that Tom knows how to torment and infuriate her.</span></li><span data-dcnode-id="654" instrument_node=""> </span></ul><span data-dcnode-id="652" instrument_node=""> </span></li><span data-dcnode-id="650" instrument_node=""> </span><li data-dcnode-id="639"><span data-dcnode-id="649" instrument_node="">Writers may choose different idioms to express the same thing depending on the context, since different idioms carry different </span><a class="lit-term" data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.litcharts.com/literary-devices-and-terms/connotation"><span data-dcnode-id="648" instrument_node="">connotations</span></a><span data-dcnode-id="646" instrument_node="">.   </span><ul data-dcnode-id="641"><span data-dcnode-id="645" instrument_node=""> </span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">For instance, it creates a very different impression for a character to say that a deceased person "passed away" than if they were to say that the person "kicked the bucket."</span></li><span data-dcnode-id="642" instrument_node=""> </span></ul><span data-dcnode-id="640" instrument_node=""> </span></li><span data-dcnode-id="638" instrument_node=""> </span></ul><span data-dcnode-id="636" instrument_node=""> </span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Writers, of course, have linguistic habits just like everyone else, and they sometimes use an idiom simply because it feels like the best or most natural way to communicate an idea.</span></p><span data-dcnode-id="633" instrument_node=""> </span><h2 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Other Helpful Idiom Resources</span></h2><span data-dcnode-id="630" instrument_node=""> </span><ul data-dcnode-id="597"><span data-dcnode-id="629" instrument_node=""> </span><li data-dcnode-id="623"><span data-dcnode-id="628" instrument_node="">
</span><strong data-dcnode-id="625"><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idiom"><span data-dcnode-id="627" instrument_node="">The Wikipedia Page on Idioms:</span></a></strong><span data-dcnode-id="624" instrument_node=""> A helpful but somewhat technical overview of the term.</span></li><span data-dcnode-id="622" instrument_node=""> </span><li data-dcnode-id="615"><span data-dcnode-id="621" instrument_node="">
</span><strong data-dcnode-id="617"><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWW5FDhsHkUg"><span data-dcnode-id="620" instrument_node="">42 Idiom Origins</span></a><span data-dcnode-id="618" instrument_node="">:</span></strong><span data-dcnode-id="616" instrument_node=""> In this short video, author and vlogger John Green discusses the origins of 42 idioms.</span></li><span data-dcnode-id="614" instrument_node=""> </span><li data-dcnode-id="607"><span data-dcnode-id="613" instrument_node="">
</span><strong data-dcnode-id="609"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mentalfloss.com/article/60264/21-phrases-you-use-without-realizing-youre-quoting-shakespeare"><span data-dcnode-id="612" instrument_node="">Idioms from Shakespeare</span></a><span data-dcnode-id="610" instrument_node="">: </span></strong><span data-dcnode-id="608" instrument_node="">This Mental Floss article lists widely-used phrases that originated in Shakespeare's plays.</span></li><span data-dcnode-id="606" instrument_node=""> </span><li data-dcnode-id="599"><span data-dcnode-id="605" instrument_node="">
</span><strong data-dcnode-id="601"><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/huge-list-of-idiom-examples/"><span data-dcnode-id="604" instrument_node="">The Huge List of Idioms</span></a><span data-dcnode-id="602" instrument_node="">:</span></strong><span data-dcnode-id="600" instrument_node=""> If you're looking for even more examples of idioms, check out this resource!</span></li><span data-dcnode-id="598" instrument_node=""> </span></ul><span data-dcnode-id="596" instrument_node=""> </span></div><span data-dcnode-id="594" instrument_node="">
