</span><h2 data-dcnode-id="1943"><a data-dcnode-id="1945" name="00"></a><span data-dcnode-id="1944" instrument_node="">How to Teach English – the 10 Most Helpful Pieces of Advice</span></h2><span data-dcnode-id="1942" instrument_node="">

If
you have studied an ESL teaching course you were probably given a lot
of advice on how to teach English by tutors, and by well-meaning
friends, colleagues or strangers. Sometimes it's too much to take in so
here is what I have found useful.</span><br data-dcnode-id="1941"><span data-dcnode-id="1940" instrument_node="">
</span><br data-dcnode-id="1939"><span data-dcnode-id="1938" instrument_node="">

The 10 most helpful "How to teach English" pieces of advice:</span><br data-dcnode-id="1937"><span data-dcnode-id="1936" instrument_node="">
</span><h3 data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">1. You don't need to stick to a lesson plan. </span></h3><span data-dcnode-id="1933" instrument_node="">

This
may come as a shock, but things will happen in your classes that you
don't expect! Students will finish some activities too soon and take
longer on others. Some things will be easy for them, and others that
you expect them to understand quickly will be tougher. It is more
important to be flexible than stick rigidly to something that isn't
working.</span><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">
</span><h3 data-dcnode-id="1928"><br data-dcnode-id="1930"><span data-dcnode-id="1929" instrument_node="">

2. &nbsp;You don't need to know all the answers.&nbsp; </span></h3><span data-dcnode-id="1927" instrument_node="">

Another
shock? I taught some classes where they asked me questions I couldn't
answer right then. I told them I would find out for them, and I did. As
long as you are honest, say you don't know, and then give the answers
later, that's fine.</span><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">
</span><h3 data-dcnode-id="1922"><br data-dcnode-id="1924"><span data-dcnode-id="1923" instrument_node="">

3. Every student is different. </span></h3><span data-dcnode-id="1921" instrument_node="">

Now,
that may be obvious, but so many teachers forget this when they are
teaching and treat each student in the same way. That won't work. Get
to know your students, their learning styles and their strengths and
weaknesses. If possible, create a variety of tasks to suit different
students in the class.</span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">
</span><h3 data-dcnode-id="1916"><br data-dcnode-id="1918"><span data-dcnode-id="1917" instrument_node="">

4. You can't force students to learn, nor should you. </span></h3><span data-dcnode-id="1915" instrument_node="">

Teachers
often feel responsible if their students don't progress. You can give
them the tools for learning and inspire them to want to learn, but then
it becomes the individual student's responsibility to learn, not only
yours.</span><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">
</span><h3 data-dcnode-id="1910"><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node="">

5. &nbsp;Have a personality. </span></h3><span data-dcnode-id="1909" instrument_node="">

Be yourself. Let
the students see you're a human being and not a teaching machine. Laugh
at yourself if you make mistakes. Bring humor into the classroom.</span><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node="">
</span><h3 data-dcnode-id="1904"><br data-dcnode-id="1906"><span data-dcnode-id="1905" instrument_node="">

6. Be encouraging. </span></h3><span data-dcnode-id="1903" instrument_node="">

Error
correction is essential in the right circumstances, but if you correct
every mistake then you can easily destroy a student's confidence. </span><span data-dcnode-id="1901" style="font-weight: bold;"><span data-dcnode-id="1902" instrument_node="">Praise good</span></span><span data-dcnode-id="1900" instrument_node=""> </span><span data-dcnode-id="1898" style="font-weight: bold;"><span data-dcnode-id="1899" instrument_node="">work</span></span><span data-dcnode-id="1897" instrument_node=""> and never tell students they are stupid. Students who think they are stupid lose motivation.</span><br data-dcnode-id="1896"><span data-dcnode-id="1895" instrument_node="">
</span><h3 data-dcnode-id="1892"><br data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node="">

7. Balance your lessons between different skills. </span></h3><span data-dcnode-id="1891" instrument_node="">

A
teacher who teaches 90% grammar is not helping the students.
Communication skills, reading, writing, and vocabulary building are all
as important as grammar. Possibly even more important than grammar!</span><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node="">
</span><h3 data-dcnode-id="1886"><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node="">

8. Keep an emergency resources box. </span></h3><span data-dcnode-id="1885" instrument_node="">

Include
games, paper, colored pencils, extra worksheets, magazines etc. This
will be invaluable if you need to add a new activity into the lesson or
to extend something the students are working on.</span><br data-dcnode-id="1884"><span data-dcnode-id="1883" instrument_node="">
</span><h3 data-dcnode-id="1880"><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node="">

9. &nbsp;Give homework. </span></h3><span data-dcnode-id="1879" instrument_node="">

This
is controversial! You can't force students to do homework, but if you
give them the choice then they will feel encouraged and they can take
responsibility for their learning. It is really important to mark the
homework if you do give it, and not leave it on your desk for weeks.</span><br data-dcnode-id="1878"><span data-dcnode-id="1877" instrument_node="">
</span><h3 data-dcnode-id="1874"><br data-dcnode-id="1876"><span data-dcnode-id="1875" instrument_node="">

10. &nbsp;Have fun! </span></h3><span data-dcnode-id="1873" instrument_node="">

If you enjoy your lessons, then your students will too.</span><br data-dcnode-id="1872"><span data-dcnode-id="1871" instrument_node="">
</span><br data-dcnode-id="1870"><span data-dcnode-id="1869" instrument_node="">

These are the pieces of advice that helped me learn how to teach English and I'm sure they will help you too!</span><br data-dcnode-id="1868"><span data-dcnode-id="1867" instrument_node="">
