</span><header data-dcnode-id="4566"><span data-dcnode-id="4592" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">Overusing lambda expressions in Python</span></h1><span data-dcnode-id="4589" instrument_node="">
</span><p class="meta" data-dcnode-id="4568"><span data-dcnode-id="4588" instrument_node="">
</span><time class="entry-date" data-dcnode-id="4573" datetime="2018-09-27T07:30:00-07:00"><span class="date" data-dcnode-id="4577"><span class="date-month" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Sep</span></span><span data-dcnode-id="4585" instrument_node=""> </span><span class="date-day" data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">27</span></span><span class="date-suffix" data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">th</span></span><span data-dcnode-id="4580" instrument_node="">, </span><span class="date-year" data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">2018</span></span></span><span data-dcnode-id="4576" instrument_node=""> </span><span class="time" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">7:30 am</span></span></time><span data-dcnode-id="4572" instrument_node="">
        
           | </span><a data-dcnode-id="4570" data-disqus-identifier="https://treyhunner.com" href="#disqus_thread"><span data-dcnode-id="4571" instrument_node="">Comments</span></a><span data-dcnode-id="4569" instrument_node="">
</span></p><span data-dcnode-id="4567" instrument_node="">
</span></header><span data-dcnode-id="4565" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1243"><p data-dcnode-id="4561"><strong data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">Note</span></strong><span data-dcnode-id="4562" instrument_node="">: This post was originally titled “Stop writing lambda expressions in Python” but I’ve changed the title after deciding that it was a little too extreme.</span></p><span data-dcnode-id="4560" instrument_node="">
</span><p data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">It’s hard for me to teach an in-depth Python class without discussing lambda expressions.
I almost always get questions about them.
My students tend to see them in code on StackOverflow or they see them in a coworker’s code (which, realistically, may have also come from StackOverflow).</span></p><span data-dcnode-id="4557" instrument_node="">
</span><p data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">I get a lot of questions about lambda, I’m hesitant to recommend my students embrace Python’s lambda expressions.
I have had an aversion to lambda expressions for many years, and since I started teaching Python more regularly a few years ago, my aversion to lambda expressions has only grown stronger.</span></p><span data-dcnode-id="4554" instrument_node="">
</span><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">I’m going to explain how I see lambda expressions and why I tend to recommend my students avoid using them.</span></p><span data-dcnode-id="4551" instrument_node="">
</span><ul data-dcnode-id="4511" data-toc=".entry-content"><li data-dcnode-id="4548"><a data-dcnode-id="4549" href="#Lambda_expressions_in_Python:_what_are_they?"><span data-dcnode-id="4550" instrument_node="">Lambda expressions in Python: what are they?</span></a></li><li data-dcnode-id="4545"><a data-dcnode-id="4546" href="#Where_they%E2%80%99re_usually_used"><span data-dcnode-id="4547" instrument_node="">Where they’re usually used</span></a></li><li data-dcnode-id="4542"><a data-dcnode-id="4543" href="#The_pros_and_cons_of_lambda"><span data-dcnode-id="4544" instrument_node="">The pros and cons of lambda</span></a></li><li data-dcnode-id="4539"><a data-dcnode-id="4540" href="#Lambda_is_both_misused_and_overused"><span data-dcnode-id="4541" instrument_node="">Lambda is both misused and overused</span></a></li><li data-dcnode-id="4536"><a data-dcnode-id="4537" href="#Misuse:_naming_lambda_expressions"><span data-dcnode-id="4538" instrument_node="">Misuse: naming lambda expressions</span></a></li><li data-dcnode-id="4533"><a data-dcnode-id="4534" href="#Misuse:_needless_function_calls"><span data-dcnode-id="4535" instrument_node="">Misuse: needless function calls</span></a></li><li data-dcnode-id="4530"><a data-dcnode-id="4531" href="#Overuse:_simple,_but_non-trivial_functions"><span data-dcnode-id="4532" instrument_node="">Overuse: simple, but non-trivial functions</span></a></li><li data-dcnode-id="4527"><a data-dcnode-id="4528" href="#Overuse:_when_multiple_lines_would_help"><span data-dcnode-id="4529" instrument_node="">Overuse: when multiple lines would help</span></a></li><li data-dcnode-id="4524"><a data-dcnode-id="4525" href="#Overuse:_lambda_with_map_and_filter"><span data-dcnode-id="4526" instrument_node="">Overuse: lambda with map and filter</span></a></li><li data-dcnode-id="4521"><a data-dcnode-id="4522" href="#Misuse:_sometimes_you_don%E2%80%99t_even_need_to_pass_a_function"><span data-dcnode-id="4523" instrument_node="">Misuse: sometimes you don’t even need to pass a function</span></a></li><li data-dcnode-id="4518"><a data-dcnode-id="4519" href="#Overuse:_using_lambda_for_very_simple_operations"><span data-dcnode-id="4520" instrument_node="">Overuse: using lambda for very simple operations</span></a></li><li data-dcnode-id="4515"><a data-dcnode-id="4516" href="#Overuse:_when_higher_order_functions_add_confusion"><span data-dcnode-id="4517" instrument_node="">Overuse: when higher order functions add confusion</span></a></li><li data-dcnode-id="4512"><a data-dcnode-id="4513" href="#Should_you_ever_use_lambda_expressions?"><span data-dcnode-id="4514" instrument_node="">Should you ever use lambda expressions?</span></a></li></ul><span data-dcnode-id="4510" instrument_node="">
</span><h2 data-dcnode-id="4508" id="Lambda_expressions_in_Python:_what_are_they?"><span data-dcnode-id="4509" instrument_node="">Lambda expressions in Python: what are they?</span></h2><span data-dcnode-id="4507" instrument_node="">
</span><p data-dcnode-id="4493"><span data-dcnode-id="4506" instrument_node="">Lambda expressions a special syntax in Python for creating </span><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anonymous_function"><span data-dcnode-id="4505" instrument_node="">anonymous functions</span></a><span data-dcnode-id="4503" instrument_node="">.

</span><p data-dcnode-id="4264"><span data-dcnode-id="4271" instrument_node="">The inherent limitations of lambda expressions are actually part of their appeal.

</span><h2 data-dcnode-id="4101" id="The_pros_and_cons_of_lambda"><span data-dcnode-id="4102" instrument_node="">The pros and cons of lambda</span></h2><span data-dcnode-id="4100" instrument_node="">
</span><p data-dcnode-id="4095"><span data-dcnode-id="4099" instrument_node="">I frame my thinking around lambda expressions as a constant comparison to using </span><code data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">def</span></code><span data-dcnode-id="4096" instrument_node=""> to define functions.
Both of these tools give us functions, but they each have different limitations and use a different syntax.</span></p><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4089"><span data-dcnode-id="4093" instrument_node="">The main ways lambda expressions are different from </span><code data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">def</span></code><span data-dcnode-id="4090" instrument_node="">:</span></p><span data-dcnode-id="4088" instrument_node="">
</span><ol data-dcnode-id="4071"><span data-dcnode-id="4087" instrument_node="">
</span><li data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">They can be immediately passed around (no variable needed)</span></li><span data-dcnode-id="4084" instrument_node="">
</span><li data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">They can only have a single line of code within them</span></li><span data-dcnode-id="4081" instrument_node="">
</span><li data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">They return automatically</span></li><span data-dcnode-id="4078" instrument_node="">
</span><li data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">They can’t have a docstring and they don’t have a name</span></li><span data-dcnode-id="4075" instrument_node="">
</span><li data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">They use a different and unfamiliar syntax</span></li><span data-dcnode-id="4072" instrument_node="">
</span></ol><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">The fact that lambda expressions can be passed around is their biggest benefit.  Returning automatically is neat but not a big benefit in my mind.  I find the “single line of code” limitation is neither good nor bad overall.  The fact that lambda functions can’t have docstrings and don’t have a name is unfortunate and their unfamiliar syntax can be troublesome for newer Pythonistas.</span></p><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">Overall I feel the cons slightly outweigh the pros of lambda expressions, but my biggest complaint about them is that I find that they tend to be both misused and overused.</span></p><span data-dcnode-id="4064" instrument_node="">
</span><h2 data-dcnode-id="4062" id="Lambda_is_both_misused_and_overused"><span data-dcnode-id="4063" instrument_node="">Lambda is both misused and overused</span></h2><span data-dcnode-id="4061" instrument_node="">
</span><p data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">When I see a lambda expression in unfamiliar code I immediately become skeptical.
When I encounter a lambda expression in the wild, I often find that removing it improves code readability.</span></p><span data-dcnode-id="4058" instrument_node="">
</span><p data-dcnode-id="4050"><span data-dcnode-id="4057" instrument_node="">Sometimes the issue is that lambda expressions are being misused, meaning they’re </span><strong data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">used in a way that is nearly always unideal</span></strong><span data-dcnode-id="4054" instrument_node="">.
Other times lambda expressions are simply being overused, meaning they’re acceptable but I’d personally </span><strong data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">prefer to see the code written a different way</span></strong><span data-dcnode-id="4051" instrument_node="">.</span></p><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Let’s take a look at the various ways lambda expressions are misused and overused.</span></p><span data-dcnode-id="4046" instrument_node="">
</span><h2 data-dcnode-id="4044" id="Misuse:_naming_lambda_expressions"><span data-dcnode-id="4045" instrument_node="">Misuse: naming lambda expressions</span></h2><span data-dcnode-id="4043" instrument_node="">
</span><p data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">PEP8, the official Python style guide, advises never to write code like this:</span></p><span data-dcnode-id="4040" instrument_node="">
</span><figure class="code" data-dcnode-id="4001"><figcaption data-dcnode-id="4038"><span data-dcnode-id="4039"></span></figcaption><div class="highlight" data-dcnode-id="4002"><table data-dcnode-id="4003"><tbody data-dcnode-id="4004"><tr data-dcnode-id="4005"><td class="gutter" data-dcnode-id="4033"><pre class="line-numbers" data-dcnode-id="4034"><span class="line-number" data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">1</span></span><span data-dcnode-id="4035" instrument_node="">
</span></pre></td><td class="code" data-dcnode-id="4006"><pre data-dcnode-id="4007"><code class="python" data-dcnode-id="4008"><span class="line" data-dcnode-id="4009"><span class="n" data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">normalize_case</span></span><span data-dcnode-id="4030" instrument_node=""> </span><span class="o" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">=</span></span><span data-dcnode-id="4027" instrument_node=""> </span><span class="k" data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">lambda</span></span><span data-dcnode-id="4024" instrument_node=""> </span><span class="n" data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">s</span></span><span class="p" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">:</span></span><span data-dcnode-id="4019" instrument_node=""> </span><span class="n" data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">s</span></span><span class="o" data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">.</span></span><span class="n" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">casefold</span></span><span class="p" data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">()</span></span><span data-dcnode-id="4010" instrument_node="">
</span></span></code></pre></td></tr></tbody></table></div></figure><span data-dcnode-id="4000" instrument_node="">
</span><p data-dcnode-id="3995"><span data-dcnode-id="3999" instrument_node="">The above statement makes an anonymous function and then assigns it to a variable.
The above code ignores the reason lambda functions are useful: </span><strong data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">lambda functions can be passed around without needing to be assigned to a variable first</span></strong><span data-dcnode-id="3996" instrument_node="">.</span></p><span data-dcnode-id="3994" instrument_node="">
</span><p data-dcnode-id="3989"><span data-dcnode-id="3993" instrument_node="">If you want to create a one-liner function and store it in a variable, you should use </span><code data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">def</span></code><span data-dcnode-id="3990" instrument_node=""> instead:</span></p><span data-dcnode-id="3988" instrument_node="">
</span><figure class="code" data-dcnode-id="3948"><figcaption data-dcnode-id="3986"><span data-dcnode-id="3987"></span></figcaption><div class="highlight" data-dcnode-id="3949"><table data-dcnode-id="3950"><tbody data-dcnode-id="3951"><tr data-dcnode-id="3952"><td class="gutter" data-dcnode-id="3981"><pre class="line-numbers" data-dcnode-id="3982"><span class="line-number" data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">1</span></span><span data-dcnode-id="3983" instrument_node="">
</span></pre></td><td class="code" data-dcnode-id="3953"><pre data-dcnode-id="3954"><code class="python" data-dcnode-id="3955"><span class="line" data-dcnode-id="3956"><span class="k" data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">def</span></span><span data-dcnode-id="3978" instrument_node=""> </span><span class="nf" data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">normalize_case</span></span><span class="p" data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">(</span></span><span class="n" data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">s</span></span><span class="p" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">):</span></span><span data-dcnode-id="3969" instrument_node=""> </span><span class="k" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">return</span></span><span data-dcnode-id="3966" instrument_node=""> </span><span class="n" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">s</span></span><span class="o" data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">.</span></span><span class="n" data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">casefold</span></span><span class="p" data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">()</span></span><span data-dcnode-id="3957" instrument_node="">
</span></span></code></pre></td></tr></tbody></table></div></figure><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3939"><span data-dcnode-id="3946" instrument_node="">PEP8 recommends this because named functions are a common and easily understood thing.
This also has the benefit of giving our function a proper name, which could make debugging easier.
Unlike functions defined with </span><code data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">def</span></code><span data-dcnode-id="3943" instrument_node="">, lambda functions never have a name (it’s always </span><code data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">&lt;lambda&gt;</span></code><span data-dcnode-id="3940" instrument_node="">):</span></p><span data-dcnode-id="3938" instrument_node="">
</span><figure class="code" data-dcnode-id="3794"><figcaption data-dcnode-id="3936"><span data-dcnode-id="3937"></span></figcaption><div class="highlight" data-dcnode-id="3795"><table data-dcnode-id="3796"><tbody data-dcnode-id="3797"><tr data-dcnode-id="3798"><td class="gutter" data-dcnode-id="3913"><pre class="line-numbers" data-dcnode-id="3914"><span class="line-number" data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">1</span></span><span data-dcnode-id="3933" instrument_node="">

</span></pre></td><td class="code" data-dcnode-id="3799"><pre data-dcnode-id="3800"><code class="python" data-dcnode-id="3801"><span class="line" data-dcnode-id="3886"><span class="o" data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">&gt;&gt;&gt;</span></span><span data-dcnode-id="3910" instrument_node=""> </span><span class="n" data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">normalize_case</span></span><span data-dcnode-id="3907" instrument_node=""> </span><span class="o" data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">=</span></span><span data-dcnode-id="3904" instrument_node=""> </span><span class="k" data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">lambda</span></span><span data-dcnode-id="3901" instrument_node=""> </span><span class="n" data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">s</span></span><span class="p" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">:</span></span><span data-dcnode-id="3896" instrument_node=""> </span><span class="n" data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">s</span></span><span class="o" data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">.</span></span><span class="n" data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">casefold</span></span><span class="p" data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">()</span></span><span data-dcnode-id="3887" instrument_node="">
</span></span><span class="line" data-dcnode-id="3879"><span class="o" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">&gt;&gt;&gt;</span></span><span data-dcnode-id="3883" instrument_node=""> </span><span class="n" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">normalize_case</span></span><span data-dcnode-id="3880" instrument_node="">
</span></span><span class="line" data-dcnode-id="3858"><span class="o" data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">&lt;</span></span><span class="n" data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">function</span></span><span data-dcnode-id="3874" instrument_node=""> </span><span class="o" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">&lt;</span></span><span class="k" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">lambda</span></span><span class="o" data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">&gt;</span></span><span data-dcnode-id="3867" instrument_node=""> </span><span class="n" data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">at</span></span><span data-dcnode-id="3864" instrument_node=""> </span><span class="mh" data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">0x7f264d5b91e0</span></span><span class="o" data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">&gt;</span></span><span data-dcnode-id="3859" instrument_node="">
</span></span><span class="line" data-dcnode-id="3830"><span class="o" data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">&gt;&gt;&gt;</span></span><span data-dcnode-id="3855" instrument_node=""> </span><span class="k" data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">def</span></span><span data-dcnode-id="3852" instrument_node=""> </span><span class="nf" data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">normalize_case</span></span><span class="p" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">(</span></span><span class="n" data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">s</span></span><span class="p" data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">):</span></span><span data-dcnode-id="3843" instrument_node=""> </span><span class="k" data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">return</span></span><span data-dcnode-id="3840" instrument_node=""> </span><span class="n" data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">s</span></span><span class="o" data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">.</span></span><span class="n" data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">casefold</span></span><span class="p" data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">()</span></span><span data-dcnode-id="3831" instrument_node="">
</span></span><span class="line" data-dcnode-id="3826"><span class="o" data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">...</span></span><span data-dcnode-id="3827" instrument_node="">
</span></span><span class="line" data-dcnode-id="3819"><span class="o" data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">&gt;&gt;&gt;</span></span><span data-dcnode-id="3823" instrument_node=""> </span><span class="n" data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">normalize_case</span></span><span data-dcnode-id="3820" instrument_node="">
</span></span><span class="line" data-dcnode-id="3802"><span class="o" data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">&lt;</span></span><span class="n" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">function</span></span><span data-dcnode-id="3814" instrument_node=""> </span><span class="n" data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">normalize_case</span></span><span data-dcnode-id="3811" instrument_node=""> </span><span class="n" data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">at</span></span><span data-dcnode-id="3808" instrument_node=""> </span><span class="mh" data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">0x7f247f68fea0</span></span><span class="o" data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">&gt;</span></span><span data-dcnode-id="3803" instrument_node="">
</span></span></code></pre></td></tr></tbody></table></div></figure><span data-dcnode-id="3793" instrument_node="">
</span><p data-dcnode-id="3784"><strong data-dcnode-id="3789"><span data-dcnode-id="3792" instrument_node="">If you want to create a function and store it in a variable, define your function using </span><code data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">def</span></code></strong><span data-dcnode-id="3788" instrument_node="">.
That’s exactly what it’s for.
It doesn’t matter if your function is a single line of code or if you’re defining a function inside of another function, </span><code data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">def</span></code><span data-dcnode-id="3785" instrument_node=""> works just fine for those use cases.</span></p><span data-dcnode-id="3783" instrument_node="">
</span><h2 data-dcnode-id="3781" id="Misuse:_needless_function_calls"><span data-dcnode-id="3782" instrument_node="">Misuse: needless function calls</span></h2><span data-dcnode-id="3780" instrument_node="">
</span><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">I frequently see lambda expressions used to wrap around a function that was already appropriate for the problem at hand.</span></p><span data-dcnode-id="3777" instrument_node="">
</span><p data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">For example take this code:</span></p><span data-dcnode-id="3774" instrument_node="">
</span><figure class="code" data-dcnode-id="3722"><figcaption data-dcnode-id="3772"><span data-dcnode-id="3773"></span></figcaption><div class="highlight" data-dcnode-id="3723"><table data-dcnode-id="3724"><tbody data-dcnode-id="3725"><tr data-dcnode-id="3726"><td class="gutter" data-dcnode-id="3767"><pre class="line-numbers" data-dcnode-id="3768"><span class="line-number" data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">1</span></span><span data-dcnode-id="3769" instrument_node="">
</span></pre></td><td class="code" data-dcnode-id="3727"><pre data-dcnode-id="3728"><code class="python" data-dcnode-id="3729"><span class="line" data-dcnode-id="3730"><span class="n" data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">sorted_numbers</span></span><span data-dcnode-id="3764" instrument_node=""> </span><span class="o" data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">=</span></span><span data-dcnode-id="3761" instrument_node=""> </span><span class="nb" data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">sorted</span></span><span class="p" data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">(</span></span><span class="n" data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">numbers</span></span><span class="p" data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">,</span></span><span data-dcnode-id="3752" instrument_node=""> </span><span class="n" data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">key</span></span><span class="o" data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">=</span></span><span class="k" data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">lambda</span></span><span data-dcnode-id="3745" instrument_node=""> </span><span class="n" data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">n</span></span><span class="p" data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">:</span></span><span data-dcnode-id="3740" instrument_node=""> </span><span class="nb" data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">abs</span></span><span class="p" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">(</span></span><span class="n" data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">n</span></span><span class="p" data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">))</span></span><span data-dcnode-id="3731" instrument_node="">
</span></span></code></pre></td></tr></tbody></table></div></figure><span data-dcnode-id="3721" instrument_node="">
</span><p data-dcnode-id="3716"><span data-dcnode-id="3720" instrument_node="">The person who wrote this code likely learned that lambda expressions are used for making a function that can be passed around.
But they missed out on a slightly bigger picture idea: </span><strong data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">all functions in Python (not just lambda functions) can be passed around</span></strong><span data-dcnode-id="3717" instrument_node="">.</span></p><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3710"><span data-dcnode-id="3714" instrument_node="">Since </span><code data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">abs</span></code><span data-dcnode-id="3711" instrument_node=""> (which returns the absolute value of a number) is a function and all functions can be passed around, we could actually have written the above code like this:</span></p><span data-dcnode-id="3709" instrument_node="">
</span><figure class="code" data-dcnode-id="3669"><figcaption data-dcnode-id="3707"><span data-dcnode-id="3708"></span></figcaption><div class="highlight" data-dcnode-id="3670"><table data-dcnode-id="3671"><tbody data-dcnode-id="3672"><tr data-dcnode-id="3673"><td class="gutter" data-dcnode-id="3702"><pre class="line-numbers" data-dcnode-id="3703"><span class="line-number" data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">1</span></span><span data-dcnode-id="3704" instrument_node="">
</span></pre></td><td class="code" data-dcnode-id="3674"><pre data-dcnode-id="3675"><code class="python" data-dcnode-id="3676"><span class="line" data-dcnode-id="3677"><span class="n" data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">sorted_numbers</span></span><span data-dcnode-id="3699" instrument_node=""> </span><span class="o" data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">=</span></span><span data-dcnode-id="3696" instrument_node=""> </span><span class="nb" data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">sorted</span></span><span class="p" data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">(</span></span><span class="n" data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">numbers</span></span><span class="p" data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">,</span></span><span data-dcnode-id="3687" instrument_node=""> </span><span class="n" data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">key</span></span><span class="o" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">=</span></span><span class="nb" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">abs</span></span><span class="p" data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">)</span></span><span data-dcnode-id="3678" instrument_node="">

</span><p data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node="">A function that accepts a function as an argument is called a </span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Higher-order_function"><span data-dcnode-id="1635" instrument_node="">higher order function</span></a><span data-dcnode-id="1633" instrument_node="">.  Higher order functions are the kinds of functions that we tend to pass lambda functions to.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">The use of higher order functions is common when practicing functional programming.  Functional programming isn’t the only way to use Python though: Python is a multi-paradigm language so we can mix and match coding disciplines to make our code more readable.</span></p><span data-dcnode-id="1628" instrument_node="">

</span><p data-dcnode-id="1313"><span data-dcnode-id="1323" instrument_node="">Anyone who has gone through one of my Python training courses can probably understand what that </span><code data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">multiply_all</span></code><span data-dcnode-id="1320" instrument_node=""> function does, whereas that </span><code data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">reduce</span></code><span data-dcnode-id="1317" instrument_node="">/</span><code data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">lambda</span></code><span data-dcnode-id="1314" instrument_node=""> combination is likely a bit more cryptic for many Python programmers.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">In general, </span><strong data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">passing one function into another function, tends to make code more complex, which can hurt readability</span></strong><span data-dcnode-id="1308" instrument_node="">.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><h2 data-dcnode-id="1304" id="Should_you_ever_use_lambda_expressions?"><span data-dcnode-id="1305" instrument_node="">Should you ever use lambda expressions?</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">So I find the use of lambda expressions problematic because:</span></p><span data-dcnode-id="1300" instrument_node="">
</span><ul data-dcnode-id="1286"><span data-dcnode-id="1299" instrument_node="">
</span><li data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">lambda expressions are an odd and unfamiliar syntax to many Python programmers</span></li><span data-dcnode-id="1296" instrument_node="">
</span><li data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">lambda functions inherently lack a name or documentation, meaning reading their code is the only way to figure out what they do</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">lambda expressions can have only one statement in them so certain language features that improve readability, like tuple unpacking, can’t be used with them</span></li><span data-dcnode-id="1290" instrument_node="">
</span><li data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">lambda functions can often be replaced with already existing functions in the standard library or built-in to Python</span></li><span data-dcnode-id="1287" instrument_node="">
</span></ul><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1284" instrument_node="">Lambda expressions are rarely more immediately readable than a well-named function.
While a </span><code data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">def</span></code><span data-dcnode-id="1281" instrument_node=""> statement is often more understandable, </span><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Python also has a number of features that can be used to replace lambda expressions</span></strong><span data-dcnode-id="1278" instrument_node="">, including special syntaxes (comprehensions), built-in functions (sum), and standard library functions (in the </span><code data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">operators</span></code><span data-dcnode-id="1275" instrument_node=""> module).</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">I’d say that using lambda expressions is acceptable only if your situation meets all four of these criteria:</span></p><span data-dcnode-id="1270" instrument_node="">
</span><ol data-dcnode-id="1256"><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">The operation you’re doing is trivial: the function doesn’t deserve a name</span></li><span data-dcnode-id="1266" instrument_node="">
</span><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Having a lambda expression makes your code more understandable than the function names you can think of</span></li><span data-dcnode-id="1263" instrument_node="">
</span><li data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">You’re pretty sure there’s not already a function that does what you’re looking for</span></li><span data-dcnode-id="1260" instrument_node="">
</span><li data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Everyone on your team understands lambda expressions and you’ve all agreed to use them</span></li><span data-dcnode-id="1257" instrument_node="">
</span></ol><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1254" instrument_node="">If any of those four statements don’t fit your situation, I’d recommend </span><strong data-dcnode-id="1250"><span data-dcnode-id="1253" instrument_node="">writing a new function using </span><code data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">def</span></code></strong><span data-dcnode-id="1249" instrument_node=""> and (whenever possible) </span><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">embracing a function that already exists within Python</span></strong><span data-dcnode-id="1246" instrument_node=""> that already does what you’re looking for.</span></p><span data-dcnode-id="1244" instrument_node="">
</span></div><span data-dcnode-id="1242" instrument_node="">

        </span></div><div class="comment__content" data-dcnode-id="703"><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">1. Great reminder to me, to make better use generators.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">2  I tend to favor simple lambda functions over `operators` functions, but this post will make me change course...</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Thanks for this!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="684"><div class="comment__name clearfix" data-dcnode-id="696"><img class="comment__avatar" data-dcnode-id="701" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="698"><a data-dcnode-id="699" href=""><span data-dcnode-id="700" instrument_node="">Bartek</span></a></strong><span data-dcnode-id="697" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="685"><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">While some statements make sense, overall an opinionated and also partially incorrect article. The example with sorting list by a min value does not even interpret, as lambdas (just like def functions) do not unpack their arguments, so `lambda x, y: x + y` does not work on a tuple of (x, y), but on two arguments. I don't know where you found that code, but that's just wrong and will confuse beginners.</span></p><p data-dcnode-id="688"><span data-dcnode-id="693" instrument_node="">Now my opinionated part:</span><br data-dcnode-id="692"/><span data-dcnode-id="691" instrument_node="">I've never seen anyone use `methodcaller` or `attrgetter` and by no means I find them anyhow more explicit than `lambda p: p.myattr`. I, for sure, wouldn't call it "pythonic" to do it this way.</span><br data-dcnode-id="690"/><span data-dcnode-id="689" instrument_node="">While I am not a fan of `reduce`, saying that "let's rewrite it to for-loop because Python programmers do not know functional programming" is ridiculous.</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">I see from other articles that this is blog is probably intended to teach people with no knowledge of programming whatsoever, but I would at least point out which things are commonly accepted statements (like pep8 guidelines) and which are just your opinion. I wouldn't recommend learning from your blog if other articles are written in the same manner.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="666"><div class="comment__name clearfix" data-dcnode-id="678"><img class="comment__avatar" data-dcnode-id="683" height="32" src="https://c.disquscdn.com/uploads/users/1896/8854/avatar92.jpg?1646963421" width="32"/><strong data-dcnode-id="680"><a data-dcnode-id="681" href=""><span data-dcnode-id="682" instrument_node="">Trey Hunner</span></a></strong><span data-dcnode-id="679" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="667"><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Good point on the min issue. The min built-in can be used with two arguments or with a single iterable argument and I sloppily called it the wrong way with that sorted key lambda. Just fixed it. 👍</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">For others coming here later it was:</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">sorted_by_smallest = sorted(pairs, key=lambda x, y: min(x, y))</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">And should have been:</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">sorted_by_smallest = sorted(pairs, key=lambda items: min(items))</span></p></div></div><div class="comment__wrapper" data-dcnode-id="646"><div class="comment__name clearfix" data-dcnode-id="660"><img class="comment__avatar" data-dcnode-id="665" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="662"><a data-dcnode-id="663" href=""><span data-dcnode-id="664" instrument_node="">Arne Babenhauserheide</span></a></strong><span data-dcnode-id="661" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="647"><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">The examples you show are where other languages use lambda a lot. I agree that many of these examples are not necessary and that most of your solutions make the code readable. Especially list/dict comprehensions are a clear win.</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Except for attrgetter/methodcaller, that looks weird by using a string to select the function, which kills any possibility of your editor helping you. There the lambda is a clear win.</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Examples:</span></p><p data-dcnode-id="650"><span data-dcnode-id="653" instrument_node="">- In Java lambda functions as comparators make sorting much, much nicer.</span><br data-dcnode-id="652"/><span data-dcnode-id="651" instrument_node="">- In Scheme, map with λ is conventional code.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The direct assignment example look weird to me: a = lambda x: x ; I have never seen this and never thought of doing this in 10 years of Python.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="632"><div class="comment__name clearfix" data-dcnode-id="640"><img class="comment__avatar" data-dcnode-id="645" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="642"><a data-dcnode-id="643" href=""><span data-dcnode-id="644" instrument_node="">JIm Anderson</span></a></strong><span data-dcnode-id="641" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="633"><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Thanks for the thought-provoking article!  While I can see that the folks coming from an FP or mathematical background find lambdas a 'more natural' way to express a solution, I'll admit that, coming from an assembly/C background, your arguments match my thinking.</span></p><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">It's interesting (and, frankly) impressive how many different methodologies and problem domains Python has grown into.</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">thanks again!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="619"><div class="comment__name clearfix" data-dcnode-id="626"><img class="comment__avatar" data-dcnode-id="631" height="32" src="https://c.disquscdn.com/uploads/users/62/3272/avatar92.jpg?1390768542" width="32"/><strong data-dcnode-id="628"><a data-dcnode-id="629" href=""><span data-dcnode-id="630" instrument_node="">smitty</span></a></strong><span data-dcnode-id="627" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="620"><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">The mighty Stephen Lott shows some extended pro/con situations in Functional Python Programming 2e. Not to diminish Trey's overarching point, but lambda gives some handy shims at times. Probably like salt in the food: don't over-do it.</span></p><p data-dcnode-id="621"><a data-dcnode-id="622" href="https://disq.us/url?url=https%3A%2F%2Fwww.amazon.com%2FFunctional-Python-Programming-programming-built-ebook%2Fdp%2FB0788WZRKZ%2Fref%3Dsr_1_fkmr0_1%3Fie%3DUTF8%26qid%3D1538666444%26sr%3D8-1-fkmr0%26keywords%3Dstephen%2Blott%2Bfunctional%2Bpython%3ATfu7sM8KJozgEuXw0FJg9S2kggY&amp;cuid=1123831" rel="nofollow noopener" title="https://www.amazon.com/Functional-Python-Programming-programming-built-ebook/dp/B0788WZRKZ/ref=sr_1_fkmr0_1?ie=UTF8&amp;qid=1538666444&amp;sr=8-1-fkmr0&amp;keywords=stephen+lott+functional+python"><span data-dcnode-id="623" instrument_node="">https://www.amazon.com/Func...</span></a></p></div></div><div class="comment__wrapper" data-dcnode-id="609"><div class="comment__name clearfix" data-dcnode-id="613"><img class="comment__avatar" data-dcnode-id="618" height="32" src="https://c.disquscdn.com/uploads/users/1896/8854/avatar92.jpg?1646963421" width="32"/><strong data-dcnode-id="615"><a data-dcnode-id="616" href=""><span data-dcnode-id="617" instrument_node="">Trey Hunner</span></a></strong><span data-dcnode-id="614" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="610"><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Thanks for the recommendation! I'll have to give it a read sometime.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="567"><div class="comment__name clearfix" data-dcnode-id="603"><img class="comment__avatar" data-dcnode-id="608" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="605"><a data-dcnode-id="606" href=""><span data-dcnode-id="607" instrument_node="">osayamen omigie</span></a></strong><span data-dcnode-id="604" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="568"><p data-dcnode-id="599"><span data-dcnode-id="602" instrument_node="">While i agree with most of what you wrote and that lambda expression do not help write expressive codes, it exits as part of functional programming construct in python. i think its major advantage is that been constrained to use it in programming constructs like reduce helps eliminates side effects and mutation which is a major requirement for functional programming.</span><br data-dcnode-id="601"/><span data-dcnode-id="600" instrument_node="">Like your example on comparing</span></p><p data-dcnode-id="587"><span data-dcnode-id="598" instrument_node="">   def multiply_all(numbers):</span><br data-dcnode-id="597"/><span data-dcnode-id="596" instrument_node="">       """Return the product of the given numbers."""</span><br data-dcnode-id="595"/><span data-dcnode-id="594" instrument_node="">       product = 1</span><br data-dcnode-id="593"/><span data-dcnode-id="592" instrument_node="">       for n in numbers:</span><br data-dcnode-id="591"/><span data-dcnode-id="590" instrument_node="">           product *= n</span><br data-dcnode-id="589"/><span data-dcnode-id="588" instrument_node="">       return product</span></p><p data-dcnode-id="583"><span data-dcnode-id="586" instrument_node="">   numbers = [2, 1, 3, 4, 7, 11, 18]</span><br data-dcnode-id="585"/><span data-dcnode-id="584" instrument_node="">   product = multiply_all(numbers)</span></p><p data-dcnode-id="575"><span data-dcnode-id="582" instrument_node="">With:</span><br data-dcnode-id="581"/><span data-dcnode-id="580" instrument_node="">   from functools import reduce</span><br data-dcnode-id="579"/><span data-dcnode-id="578" instrument_node="">   numbers = [2, 1, 3, 4, 7, 11, 18]</span><br data-dcnode-id="577"/><span data-dcnode-id="576" instrument_node="">   product = reduce(lambda x, y: x * y, numbers, 1)</span></p><p data-dcnode-id="569"><span data-dcnode-id="574" instrument_node="">shows the exact situation where a lambda function (or a named function) is needed as a functional programming construct. </span><br data-dcnode-id="573"/><span data-dcnode-id="572" instrument_node="">This two example although the do the same things, they dont do it in the same way from a functional programming perspective. the named function solution although more readable is mutating the variable called product . compared to the lambda function and reduce construct there is no mutation.</span><br data-dcnode-id="571"/><span data-dcnode-id="570" instrument_node="">My point here is that the use of lambda functions is deeply rooted in functional programming and you should explore its  advantages with respect to functional programming.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="557"><div class="comment__name clearfix" data-dcnode-id="561"><img class="comment__avatar" data-dcnode-id="566" height="32" src="https://c.disquscdn.com/uploads/users/166/387/avatar92.jpg?1578419522" width="32"/><strong data-dcnode-id="563"><a data-dcnode-id="564" href=""><span data-dcnode-id="565" instrument_node="">1jpablo1</span></a></strong><span data-dcnode-id="562" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="558"><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">I guess that's why FP hasn't really caught up in Python. Oh, and, you know... the fact that there's only one type available.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="547"><div class="comment__name clearfix" data-dcnode-id="551"><img class="comment__avatar" data-dcnode-id="556" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="553"><a data-dcnode-id="554" href=""><span data-dcnode-id="555" instrument_node="">Craig</span></a></strong><span data-dcnode-id="552" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="548"><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">That's odd.  The language says there's more than one type.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="537"><div class="comment__name clearfix" data-dcnode-id="541"><img class="comment__avatar" data-dcnode-id="546" height="32" src="https://c.disquscdn.com/uploads/users/166/387/avatar92.jpg?1578419522" width="32"/><strong data-dcnode-id="543"><a data-dcnode-id="544" href=""><span data-dcnode-id="545" instrument_node="">1jpablo1</span></a></strong><span data-dcnode-id="542" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="538"><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">I meant a “static” type as opposed to a runtime “type”. Dynamic languages only have one static type (dynamic).</span></p></div></div><div class="comment__wrapper" data-dcnode-id="527"><div class="comment__name clearfix" data-dcnode-id="531"><img class="comment__avatar" data-dcnode-id="536" height="32" src="https://c.disquscdn.com/uploads/users/5310/3206/avatar92.jpg?1647398205" width="32"/><strong data-dcnode-id="533"><a data-dcnode-id="534" href=""><span data-dcnode-id="535" instrument_node="">Alexis Rodriguez</span></a></strong><span data-dcnode-id="532" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="528"><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Unless you use mypy.  Yeah, but if you edit your program while its still running (REPL driven development) or write doctests you can catch type errors, and doctests can catch errors that could require dependent types not just simple type errors.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="517"><div class="comment__name clearfix" data-dcnode-id="521"><img class="comment__avatar" data-dcnode-id="526" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="523"><a data-dcnode-id="524" href=""><span data-dcnode-id="525" instrument_node="">Craig</span></a></strong><span data-dcnode-id="522" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="518"><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">I was going to make the same comment.  Immutability should be promoted, not mutability.  Under the hood reduce may be mutating, but it may be executing recursively, avoiding mutability even there.  But keeping mutability out of the code base is a useful goal.  Even in single-threaded applications it's useful because it keeps the practice for when it's necessary.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="505"><div class="comment__name clearfix" data-dcnode-id="511"><img class="comment__avatar" data-dcnode-id="516" height="32" src="https://c.disquscdn.com/uploads/users/6552/1839/avatar92.jpg?1538699075" width="32"/><strong data-dcnode-id="513"><a data-dcnode-id="514" href=""><span data-dcnode-id="515" instrument_node="">Pradeep Reddy Raamana</span></a></strong><span data-dcnode-id="512" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="506"><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Great and useful post!</span></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">PS: for all the talk of best practices, you are using single letter variable names ;)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="495"><div class="comment__name clearfix" data-dcnode-id="499"><img class="comment__avatar" data-dcnode-id="504" height="32" src="https://c.disquscdn.com/uploads/users/28804/6493/avatar92.jpg?1526738487" width="32"/><strong data-dcnode-id="501"><a data-dcnode-id="502" href=""><span data-dcnode-id="503" instrument_node="">Konrad Kocik</span></a></strong><span data-dcnode-id="500" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="496"><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">I think that single letter names are ok when used in (very) local scope i.e. in loops and, as here, in lambdas.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="485"><div class="comment__name clearfix" data-dcnode-id="489"><img class="comment__avatar" data-dcnode-id="494" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="491"><a data-dcnode-id="492" href=""><span data-dcnode-id="493" instrument_node="">Richard Larkin</span></a></strong><span data-dcnode-id="490" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="486"><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">It's pointless using longer variable names when the variable ARE meaningless and used only to illustrate a point. Good variable names apply in the real world, but only obscure the purpose of example code.....</span></p></div></div><div class="comment__wrapper" data-dcnode-id="475"><div class="comment__name clearfix" data-dcnode-id="479"><img class="comment__avatar" data-dcnode-id="484" height="32" src="https://c.disquscdn.com/uploads/users/92/7745/avatar92.jpg?1647246055" width="32"/><strong data-dcnode-id="481"><a data-dcnode-id="482" href=""><span data-dcnode-id="483" instrument_node="">gamesbook</span></a></strong><span data-dcnode-id="480" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="476"><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">I think using good variable names is good practice *anywhere* (and they do not have to be long to be good).  Just my 2c :)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="462"><div class="comment__name clearfix" data-dcnode-id="469"><img class="comment__avatar" data-dcnode-id="474" height="32" src="https://c.disquscdn.com/uploads/users/12405/4191/avatar92.jpg?1618789705" width="32"/><strong data-dcnode-id="471"><a data-dcnode-id="472" href=""><span data-dcnode-id="473" instrument_node="">Charles Whittington</span></a></strong><span data-dcnode-id="470" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="463"><p data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">Thank you for this article! It might be worth including a note that, in Python &gt;= 3.8, there is in fact a </span><a data-dcnode-id="466" href="http://disq.us/url?url=http%3A%2F%2Fmath.prod%3Aapgc1yVU9t45KHsRjc8n7IHSiNE&amp;cuid=1123831" rel="nofollow noopener" title="math.prod"><span data-dcnode-id="467" instrument_node="">math.prod</span></a><span data-dcnode-id="465" instrument_node="">() function that works like sum().</span></p></div></div><div class="comment__wrapper" data-dcnode-id="440"><div class="comment__name clearfix" data-dcnode-id="456"><img class="comment__avatar" data-dcnode-id="461" height="32" src="https://c.disquscdn.com/uploads/users/10565/1822/avatar92.jpg?1612095353" width="32"/><strong data-dcnode-id="458"><a data-dcnode-id="459" href=""><span data-dcnode-id="460" instrument_node="">Nicolas Bousquet</span></a></strong><span data-dcnode-id="457" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="441"><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">I understand that generators are more pythonic, and that if you are not versed in imperative, code you may prefer dedicated functions &amp; for loops.</span></p><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Still, overall map/filter/reduce and lambda are a very powerful combination in functional programming. I find it more clear honestly than the list comprehension or for loops. Why because it actually clearly communicate the intent: I want to transform element by element, I want to filter elements, I want to perform a reduction.</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">And with argumentation, I would more or less, conclude that your article is wrong.</span></p><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">But that would miss the point. What is more intuitive is dependant of the background and context and also programming language. And this is where you have a point. Lambda are not so great in python. A bit too limited... Like you can't pass * or + but only mul. You are limited to single line lambda too.</span></p><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">And there the call to use list/set/dict comprehensions or generators instead. They are more pythonic and prefered.</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">But let's face it, if you come from the functional world, it is bit annoying that comprehensions can replace for loops for filter &amp; map but can't replace reduce... It is not fully satisfactory.</span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">And for me functional programming shall not be dismissed completely neither. It much more clear to have a groupby/flatmap function than a for loop or comprehension because the name communicate the intent. It also allow for nice concepts like combining comparators, partial function applications and so on...</span></p></div></div><div class="comment__wrapper" data-dcnode-id="430"><div class="comment__name clearfix" data-dcnode-id="434"><img class="comment__avatar" data-dcnode-id="439" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="436"><a data-dcnode-id="437" href=""><span data-dcnode-id="438" instrument_node="">Clifford Ireland</span></a></strong><span data-dcnode-id="435" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="431"><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Python's use of lambda introduces a second separate function definition, which is not consistent with the first definition.  Python could have used only one as Lisp does as Python already provides the internals for a function.  Further, Lisp code does not need return; that difference alone causes confusion.  The design may have intended to prevent overuse; still, I believe that it should not be in the language in its current form.  lambda also shows up to prevent evaluation until a later time in tkinter, which led to extensive discussions that appear in Lutz' "Programming Python."  Instead, using a form of Curried function works better, in part because partial evaluation occurs when you want it.  So Curry(lambda x,y: x+y)(1,2)() works.  I'll send Curry and the corresponding class Curried in a separate note to you.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="420"><div class="comment__name clearfix" data-dcnode-id="424"><img class="comment__avatar" data-dcnode-id="429" height="32" src="https://c.disquscdn.com/uploads/users/5310/3206/avatar92.jpg?1647398205" width="32"/><strong data-dcnode-id="426"><a data-dcnode-id="427" href=""><span data-dcnode-id="428" instrument_node="">Alexis Rodriguez</span></a></strong><span data-dcnode-id="425" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="421"><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">You can use functools.partial</span></p></div></div><div class="comment__wrapper" data-dcnode-id="402"><div class="comment__name clearfix" data-dcnode-id="414"><img class="comment__avatar" data-dcnode-id="419" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="416"><a data-dcnode-id="417" href=""><span data-dcnode-id="418" instrument_node="">Navneeth</span></a></strong><span data-dcnode-id="415" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="403"><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">A couple of comments:</span></p><p data-dcnode-id="406"><span data-dcnode-id="411" instrument_node="">1. Although it's your article, it would be better titled along the lines of 'Mistakes to Avoid While Using a Lambda Expression', as I feel that the current one is a bit extreme. :) The lambda expression is a standard feature of the </span><br data-dcnode-id="410"/><span data-dcnode-id="409" instrument_node="">language and it is to be *expected* that someone new to the language or programming will misuse it in one way or another, or perhaps not be familiar with all the features available at their disposal which could make a lambda unnecessary. It is only with the experience (including reading helpful articles such as yours) will they be </span><br data-dcnode-id="408"/><span data-dcnode-id="407" instrument_node="">able to acquire good practices.</span></p><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">2. It would have been more helpful if you had included some sample data with the examples on the operator module.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="390"><div class="comment__name clearfix" data-dcnode-id="396"><img class="comment__avatar" data-dcnode-id="401" height="32" src="https://c.disquscdn.com/uploads/users/166/387/avatar92.jpg?1578419522" width="32"/><strong data-dcnode-id="398"><a data-dcnode-id="399" href=""><span data-dcnode-id="400" instrument_node="">1jpablo1</span></a></strong><span data-dcnode-id="397" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="391"><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Is your hesitation regarding lambdas/map/filter exclusive to Python? or would you also feel like in other languages.</span></p><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">I'm asking because I find myself seldom using lambdas in Python, mostly because of the awkward syntax. OTOH I use them all the time in other langs.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="378"><div class="comment__name clearfix" data-dcnode-id="384"><img class="comment__avatar" data-dcnode-id="389" height="32" src="https://c.disquscdn.com/uploads/users/1896/8854/avatar92.jpg?1646963421" width="32"/><strong data-dcnode-id="386"><a data-dcnode-id="387" href=""><span data-dcnode-id="388" instrument_node="">Trey Hunner</span></a></strong><span data-dcnode-id="385" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="379"><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">This is specific to Python. I have very little problem with anonymous functions in general. In fact languages like JavaScript even allow named functions to be passed around in-place, so there's really no reason *not* to give a function a name.</span></p><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">This post is about Python's lambda statement specifically.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="362"><div class="comment__name clearfix" data-dcnode-id="372"><img class="comment__avatar" data-dcnode-id="377" height="32" src="https://c.disquscdn.com/uploads/users/6272/2403/avatar92.jpg?1642091450" width="32"/><strong data-dcnode-id="374"><a data-dcnode-id="375" href=""><span data-dcnode-id="376" instrument_node="">Carlo DiCelico</span></a></strong><span data-dcnode-id="373" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="363"><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Lots of great points, many of the examples I would completely agree are spurious uses of lambda! But lambdas are NOT just a matter of code style, they're a fundamental mathematical building block, and the 3 real benefits of lambdas are not mentioned at all!</span></p><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">1) The reason being able to pass an anonymous function into another function as an argument matters is because it lets you do partial application, which lets you do function composition. 2) The reason being able to invoke an anonymous function inside another function is important is because it allows you to create and return a dynamic value based on input inside of a function without leaking it and without creating a named function (if you don't want to) by enclosing the lambda in its lexical scope (a closure), which is basically how decorators work, even if you would normally use a named function. And 3), although you mention that lambdas are useful for passing into functions that accept functions as arguments, you didn't mention that this includes callbacks (e.g., asyncio), which are often a great place to use a lambda. Together with recursion, these three techniques *alone* allow you to write some incredibly powerful, flexible code, and even moreso when combined with python's data model, collections, and itertools/functools/operator.</span></p><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">I agree that comps should be used over map in simple cases, but if a comprehension is overly nested (maybe 3 or more levels), I'd probably break that up into multiple processing steps and effectively pipeline them. Also, it's perhaps somewhat useless to just use map or reduce by themselves—usually, you'd want to map -&gt; filter -&gt; reduce as a complete pipeline, typically for some data task (not for side effects). Doing that via comps is possible, but probably cryptic. The other great thing about lambdas is that because they're so compact, they're easy to turn into generators, just wrap them in parens! The bigger, imperative code would take a *little* more refactoring, admittedly, not much 🤓</span></p><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">On a more philosophical note, I don't think the solution to beginners being confused by a more mathematical way of thinking or writing code is to insulate them from it, but to zero in on why it's confusing and help them get better at mathematical thinking. After all, no matter how much python wants to be plain English, it's always going to be describing problems that are fundamentally mathematical in nature! Plus, it'll help them write better software in the long run, IMO.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="350"><div class="comment__name clearfix" data-dcnode-id="356"><img class="comment__avatar" data-dcnode-id="361" height="32" src="https://c.disquscdn.com/uploads/users/1896/8854/avatar92.jpg?1646963421" width="32"/><strong data-dcnode-id="358"><a data-dcnode-id="359" href=""><span data-dcnode-id="360" instrument_node="">Trey Hunner</span></a></strong><span data-dcnode-id="357" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="351"><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">All three of your points about anonymous functions apply to named functions as well. I agree that creating higher order functions (functions that accept functions as arguments or create functions on the fly, sometimes acting as a sort of partially evaluated function) are a lovely language feature. That's inherent to functions though. The lambda syntax is just one way to do it and I very frequently find it less readable than the alternative (naming a function and passing it into another function).</span></p><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">So I agree with your points, but I disagree with lambda being the typical syntax of choice for these cases.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="340"><div class="comment__name clearfix" data-dcnode-id="344"><img class="comment__avatar" data-dcnode-id="349" height="32" src="https://c.disquscdn.com/uploads/users/6272/2403/avatar92.jpg?1642091450" width="32"/><strong data-dcnode-id="346"><a data-dcnode-id="347" href=""><span data-dcnode-id="348" instrument_node="">Carlo DiCelico</span></a></strong><span data-dcnode-id="345" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="341"><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">True! But even though these things are inherent to all functions, they can be used in named functions because lambda functions exist. Historically, all of these techniques came from lambda calculus, so I'd personally argue that a) lambda expressions are the *original* and *truest* way to do these things (except that they're intentionally hamstrung in python), and b) functions derive their "functionality" 😅from lambda expressions, not the other way around. But 100% agree that they're often abused in Python and even more often confuse people, and that the vast majority of the time, they're not actually necessary. Great post! 👍</span></p></div></div><div class="comment__wrapper" data-dcnode-id="330"><div class="comment__name clearfix" data-dcnode-id="334"><img class="comment__avatar" data-dcnode-id="339" height="32" src="https://c.disquscdn.com/uploads/users/92/7745/avatar92.jpg?1647246055" width="32"/><strong data-dcnode-id="336"><a data-dcnode-id="337" href=""><span data-dcnode-id="338" instrument_node="">gamesbook</span></a></strong><span data-dcnode-id="335" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="331"><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">"they're intentionally hamstrung in python" - can you expand on this, explain why you think it has happened and give some examples?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="320"><div class="comment__name clearfix" data-dcnode-id="324"><img class="comment__avatar" data-dcnode-id="329" height="32" src="https://c.disquscdn.com/uploads/users/19362/2819/avatar92.jpg?1559350783" width="32"/><strong data-dcnode-id="326"><a data-dcnode-id="327" href=""><span data-dcnode-id="328" instrument_node="">Steve Henty</span></a></strong><span data-dcnode-id="325" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="321"><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Here, here!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="310"><div class="comment__name clearfix" data-dcnode-id="314"><img class="comment__avatar" data-dcnode-id="319" height="32" src="https://c.disquscdn.com/uploads/users/5298/5283/avatar92.jpg?1538139712" width="32"/><strong data-dcnode-id="316"><a data-dcnode-id="317" href=""><span data-dcnode-id="318" instrument_node="">Demetrius Albuquerque</span></a></strong><span data-dcnode-id="315" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="311"><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">I have a little question about this. We working with pyspark and I see lambda everywhere. Do you know if can I have the same approach in this framework?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="300"><div class="comment__name clearfix" data-dcnode-id="304"><img class="comment__avatar" data-dcnode-id="309" height="32" src="https://c.disquscdn.com/uploads/users/6272/2403/avatar92.jpg?1642091450" width="32"/><strong data-dcnode-id="306"><a data-dcnode-id="307" href=""><span data-dcnode-id="308" instrument_node="">Carlo DiCelico</span></a></strong><span data-dcnode-id="305" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="301"><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">That actually makes a lot of sense. Spark is a perfect use of lambdas because you want to create anonymous functions on the fly that can be thrown away and don't exist outside the context of that procedure, since you're doing parallel data processing. I'd say, in your case, embrace the lambda! 👍</span></p></div></div><div class="comment__wrapper" data-dcnode-id="290"><div class="comment__name clearfix" data-dcnode-id="294"><img class="comment__avatar" data-dcnode-id="299" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="296"><a data-dcnode-id="297" href=""><span data-dcnode-id="298" instrument_node="">nosknut</span></a></strong><span data-dcnode-id="295" instrument_node=""> • 7 months ago
        </span></div><div class="comment__content" data-dcnode-id="291"><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">I haven't used python much aside from a 500 line chart generator from csv and some beginner tutorials, but the more I learn the more I find the choice of indentation instead of braces as a pour choice. Braces makes code no less readable, however it means the compiler and debugger has something explicit to go by. The result of using indentation as a way to define what the code structure is, something that honestly should like every other language just be for readability, is complications like the lambda. This is a core functionality in modern functional programming, and should be a trivial task to solve. Python has itself to thank for the issues this gives rise to. Aside from using lambdas where a normal function could be defined, which i agree makes the code less understandable and likely slower, most of these issues would be solved by not religiously sticking to "The Pythonic way". Anonymous functions are used everywhere by everyone because when used correctly they make code considerably more readable. The uses are endless and for such a fundamental and simple feature to not exist due to a matter of principle seems like a typical pitfall. If your paradigm doesn't work, admit and address it. Coming up with a broken solution, and then criticizing the result won't change the fact that it is a bad solution.</span></p></div></div></div><span data-dcnode-id="288" instrument_node="">
