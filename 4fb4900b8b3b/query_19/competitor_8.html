</span><figure class="post__feature_image" data-dcnode-id="1237"><img alt="blog-how-to-teach-vocabulary" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="1238" height="600" loading="lazy" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-homepages-learning.3plearning.net/wp-content/uploads/2019/11/blog-how-to-teach-vocabulary.png&amp;raw" srcset="https://assets-homepages-learning.3plearning.net/wp-content/uploads/2019/11/blog-how-to-teach-vocabulary.png 770w, https://assets-homepages-learning.3plearning.net/wp-content/uploads/2019/11/blog-how-to-teach-vocabulary-340x265.png 340w, https://assets-homepages-learning.3plearning.net/wp-content/uploads/2019/11/blog-how-to-teach-vocabulary-768x598.png 768w" width="770"></figure><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1233" style="text-align: center;"><em data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">“Vocabulary size is a convenient proxy for a whole range of educational attainments and abilities – not just skill in reading, writing, listening, and speaking, but also general knowledge of science, history, and the arts.”</span></em></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1229" style="text-align: center;"><em data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">A wealth of words, by E. D. Hirsch Jr</span></em></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node="">Vocabulary is something we continue to learn and develop throughout our entire lives – an </span><em data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">unconstrained skill</span></em><span data-dcnode-id="1224" instrument_node="">. While some vocabulary is acquired implicitly through everyday interactions, it’s important to teach more complex and technical vocabulary explicitly. We can’t rely on fate, osmosis and exposure for students to learn the 50,000+ words they need to thrive in school and beyond.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Further, vocabulary is becoming more important in a world of digital dependency. Autocorrect may have a chance of picking up incorrect spelling, but it can’t be relied on to help you choose the word with the right meaning.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1218" instrument_node="">Teaching vocabulary is about </span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">context </span></em><span data-dcnode-id="1215" instrument_node="">and </span><i data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">repetition</span></i><span data-dcnode-id="1212" instrument_node="">– what they need to know about the words they’re using, and using them multiple times.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">But before we get onto that, here are some key things we have to understand to teach vocabulary:</span></p><span data-dcnode-id="1207" instrument_node="">
</span><h2 data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">The three tiers of vocabulary</span></h2><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">For the past two decades, it has been acknowledged that there are three broad tiers of vocabulary. An awareness of these tiers is critical to assist teachers in selecting the right words to teach explicitly in their classrooms – from the first day of school to the last.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><h3 data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Tier 1</span></h3><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">These are basic words of everyday language – high frequency words. With around 8000 word families in Tier 1, including words like ‘dog’, ‘good’, ‘phone’ and ‘happy’, these words do not generally require explicit teaching for the majority of students. However, explicit teaching is required to make the most of this level of vocabulary particularly for homophones and words with more than one meaning.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Tier 2</span></h3><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Tier 2 words are the words needed to understand and express complex ideas in an academic context. Tier 2 includes words like ‘formulate’, ‘specificity’, ‘calibrate’ and ‘hypothesis’. These words are useful across multiple topics and subject areas and effective use can reflect a mature understanding of academic language.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h3 data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Tier 3</span></h3><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Tier 3 words aren’t used often and are normally reserved for specific topics or subjects – words like ‘orthography’, ‘morphology’ and ‘etymology’ in the field of linguistics, or ‘isosceles’, ‘circumference’ and ‘quantum’ for the world of mathematics and physics. Some of these words may also exist as a Tier 1 or 2 word but have a particular use and purpose as a Tier 2 word, such as ‘substitute’, ‘similarity’ and ‘expression’ in a mathematical context. These words must be taught explicitly in the context of their meaning and purpose in a particular unit of study.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><div class="cta cta__basic" data-dcnode-id="1174"><div data-dcnode-id="1175"><div class="cta__wrap" data-dcnode-id="1176"><div class="content" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Download a free, editable vocabulary lesson plan</span></div><div class="link" data-dcnode-id="1177"><span class="button__wrapper" data-dcnode-id="1178"><a class="button" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.3plearning.com/resources/vocabulary-lesson-plan/%3Futm_source%3Dblog%26utm_medium%3Dwebsite%26" target="_self"><span data-dcnode-id="1180" instrument_node="">Download now</span></a></span></div></div></div></div><span data-dcnode-id="1173" instrument_node="">
</span><h2 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Vocabulary development by age</span></h2><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Students’ communication abilities, including their vocabulary, can vary immensely. However, there are certain milestones we can expect children to reach before starting formal schooling:</span></p><span data-dcnode-id="1167" instrument_node="">
</span><ul data-dcnode-id="1144"><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">12 months: 2 words plus mummy/mommy and daddy (or equivalent in languages other than English)</span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">18 months: 10-50 words</span></li><span data-dcnode-id="1160" instrument_node="">
</span><li data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">2 years: 300 words</span></li><span data-dcnode-id="1157" instrument_node="">
</span><li data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">5 years: 450 words</span></li><span data-dcnode-id="1154" instrument_node="">
</span><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">3 years: 1000 words</span></li><span data-dcnode-id="1151" instrument_node="">
</span><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">4 years: 2000 words</span></li><span data-dcnode-id="1148" instrument_node="">
</span><li data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">5 years: 5000 plus words</span></li><span data-dcnode-id="1145" instrument_node="">
</span></ul><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">This early language acquisition is an essential platform for future learning. There is a huge body of evidence suggesting that deficient early vocabulary development is a strong marker for a continued difficulty in all aspects of schooling.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">During the school years, vocabulary size must grow at a rapid pace in order to equip students for everyday, as well as academic, communication. By the age of 17, students are expected to know between 36 000 to 136 000 words.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">So just what is it that allows some students to learn a staggering 100 000 more words than their peers?</span></p><span data-dcnode-id="1134" instrument_node="">
</span><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Teaching vocabulary</span></h2><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">Effective vocabulary instruction within the </span><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">6M Learning Framework</span></em><span data-dcnode-id="1127" instrument_node=""> includes opportunities to motivate, model, master, magnify and maintain vocabulary knowledge with meaningful feedback guiding the sequence of learning.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h3 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Motivate</span></h3><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Students need to understand the benefits of a rich vocabulary knowledge. As with all teaching, some students may be naturally curious, while others will need to be coaxed into the journey. Some tips and tools for enhancing motivation are:</span></p><span data-dcnode-id="1119" instrument_node="">
</span><ul data-dcnode-id="1102"><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Take the time to demonstrate the value of a rich vocabulary knowledge</span></li><span data-dcnode-id="1115" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Make word exploration an integral part of classroom culture</span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Create a word-rich environment</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Find puns, jokes and other comedic devices to add engagement to word studies, especially those that humorously interchange multiple meanings</span></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Designate a word of the week with a challenge to use it creatively in that week’s work</span></li><span data-dcnode-id="1103" instrument_node="">
</span></ul><span data-dcnode-id="1101" instrument_node="">
</span><h3 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Model</span></h3><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">In an explicit approach to vocabulary instruction, teachers should</span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node=""> model</span></strong><span data-dcnode-id="1094" instrument_node=""> the skills and understanding required to develop a rich vocabulary knowledge.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Say</span></strong><span data-dcnode-id="1089" instrument_node=""> the word carefully. Pronunciation is critical to allow students to make strong connections between written and spoken language. Use syllabification to assist in articulating each part of the word.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1083"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Write</span></strong><span data-dcnode-id="1084" instrument_node=""> the word. There is a strong correlation between spelling and vocabulary. To allow students to access their vocabulary in both passive and active contexts, they must be equipped to spell new vocabulary.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1081" instrument_node="">Give a student-friendly </span><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">definition</span></strong><span data-dcnode-id="1078" instrument_node="">. The concise nature of dictionaries means they require significant vocabulary knowledge to interpret. Simply providing students access to dictionaries and thesauruses will not necessarily give them the information they need to understand the meaning of the word. Provide a definition that is meaningful for students, their experiences and their existing vocabulary knowledge.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1075" instrument_node="">Give multiple meaningful </span><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">examples</span></strong><span data-dcnode-id="1072" instrument_node="">. Use the word in sentences and contexts that are meaningful to students. But don’t stop at one! Provide a wide range of examples to allow everyone to connect and relate to the word.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1069" instrument_node="">Ask for </span><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">student examples</span></strong><span data-dcnode-id="1066" instrument_node="">. It may be valuable to have students attempt to articulate their own examples of the word in context. By including this in the explicit teaching phase, there are opportunities to clarify understanding when words have </span><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">multiple meanings</span></strong><span data-dcnode-id="1063" instrument_node=""> and deal with any </span><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">misconceptions</span></strong><span data-dcnode-id="1060" instrument_node="">.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><h3 data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Master</span></h3><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">Provide opportunities for students to</span><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node=""> master</span></strong><span data-dcnode-id="1051" instrument_node=""> an&nbsp;understanding of new vocabulary in context through hearing, saying, reading and writing.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Using words is the best way to remember them. The following methods can help learners to consolidate their vocabulary knowledge:</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1043"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Show students how to recognise new words</span></strong></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The best way to help students to remember and retain the new words they’re introduced to is to connect it with an object in the real world. Pictures and flashcards are good, but real-world items are even better. This can get difficult with more abstract words, but by dedicating more time and thought, the image or object used, and your explanation of it, will help build students understanding.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1036"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Reinforce their remember new words</span></strong></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">After a word has been introduced, we want students to see it at least 10 more times so it sticks. Activities like ‘fill in the blank’ and ‘word bingo’ help students make strong connections between the introduced words.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1029"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Have them use their new words</span></strong></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">After new words have been introduced, students are ready to find the ways they can use these words to make meaning. Activities like using the word in a sentence, mind maps, fill in the blanks (with no options) develop students’ use of words as tools for meaning and communication.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1022"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Graphics organisers</span></strong></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">A simple graphic organiser can be an effective method to help students master their knowledge of new words.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><figure data-dcnode-id="1015"><img alt="" data-dcnode-id="1017" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-homepages-learning.3plearning.net/wp-content/uploads/2020/10/Word-fact-card-1.jpg&amp;raw"><img alt="" data-dcnode-id="1016" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-homepages-learning.3plearning.net/wp-content/uploads/2020/10/Word-fact-card-2.jpg&amp;raw"></figure><span data-dcnode-id="1014" instrument_node="">
</span><h3 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Magnify</span></h3><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1007"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Magnify</span></strong><span data-dcnode-id="1008" instrument_node=""> vocabulary understanding through a word rich environment. Create a classroom where words are valued. Provide continued opportunities to explore words at a deep level.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><ol data-dcnode-id="994"><span data-dcnode-id="1005" instrument_node="">
</span><li data-dcnode-id="996"><strong data-dcnode-id="1001"><span data-dcnode-id="1004" instrument_node="">Explore word origins</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
</span></strong><span data-dcnode-id="1000" instrument_node="">Investigate the </span><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">etymology</span></strong><span data-dcnode-id="997" instrument_node=""> of words and help students make connections within and between words. Understanding of common word parts helps learners to grasp meanings, even of words they have not encountered before.Create word families based on a particular etymological feature. For example, find words with ‘aqua’ or ‘hydra/o’ in their spelling – both referring to water. Predict the meanings of these words based on their smaller parts.</span></li><span data-dcnode-id="995" instrument_node="">
</span></ol><span data-dcnode-id="993" instrument_node="">
</span><ol data-dcnode-id="981" start="2"><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="983"><strong data-dcnode-id="988"><span data-dcnode-id="991" instrument_node="">Explain the word’s connotation</span><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">
</span></strong><span data-dcnode-id="987" instrument_node="">This is the relationship between the word and the feelings about it, whether positive, neutral or negative. Understanding how words can be interpreted enables students to use them with greater precision.Try compiling a </span><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">word scale</span></em><span data-dcnode-id="984" instrument_node="">. Place a word on one end of the scale and a word with opposite meaning or intensity at the other. For example, if students are struggling to use words instead of ‘said’, place the word ‘whisper’ at the lower end and ‘bellow’ at the higher end. Students work together to build the scale, searching for synonyms like ‘shout’, ‘yell’, ‘plead’, ‘intone’ and placing them at appropriate points on the scale.</span></li><span data-dcnode-id="982" instrument_node="">
</span></ol><span data-dcnode-id="980" instrument_node="">
</span><ol data-dcnode-id="968" start="3"><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="970"><strong data-dcnode-id="975"><span data-dcnode-id="978" instrument_node="">Explaining where and when the word is or isn’t used</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">
</span></strong><span data-dcnode-id="974" instrument_node="">This can be anything from a word’s formality to its datedness. You might use ‘loo’ at home, ‘toilet’ in public or ‘lavatory’ at the Mayor’s Ball, and ‘ball’ would be outdated. This helps students understand how words can make people </span><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">sound</span></em><span data-dcnode-id="971" instrument_node="">. Try demonstrating this by writing an inappropriately informal text to highlight the importance of word choice. Alternatively, write an overly formal text to convey a simple, friendly message.</span></li><span data-dcnode-id="969" instrument_node="">
</span></ol><span data-dcnode-id="967" instrument_node="">
</span><ol data-dcnode-id="958" start="4"><span data-dcnode-id="966" instrument_node="">
</span><li data-dcnode-id="960"><strong data-dcnode-id="962"><span data-dcnode-id="965" instrument_node="">Building the relationship from words to other words</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">
</span></strong><span data-dcnode-id="961" instrument_node="">This is how students understand what words have the same, similar, opposite or related meanings. Taking them through words synonyms, antonyms and words or concept that build off words helps them develop their lexical stores. Set aside time for word study. Provide graphic organisers to assist learners to make comparisons and build connections.</span></li><span data-dcnode-id="959" instrument_node="">
</span></ol><span data-dcnode-id="957" instrument_node="">
</span><ol data-dcnode-id="948" start="5"><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="950"><strong data-dcnode-id="952"><span data-dcnode-id="955" instrument_node="">Showing what words occur together</span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">
</span></strong><span data-dcnode-id="951" instrument_node="">This is called ‘collocation’ – it’s why we say ‘see the big picture’ instead of ‘see the tall picture’ or 10 apples is fewer than 15 apples rather than less. Collocation must occur in context, so shared reading is an excellent forum for this sort of word study. But also have a bit of fun by using synonyms to create ‘nearly but not quite’ versions of well-known sayings.</span></li><span data-dcnode-id="949" instrument_node="">
</span></ol><span data-dcnode-id="947" instrument_node="">
</span><ol data-dcnode-id="938" start="6"><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="940"><strong data-dcnode-id="942"><span data-dcnode-id="945" instrument_node="">How affixes change meaning</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
</span></strong><span data-dcnode-id="941" instrument_node="">Most words can be changed by adding affixes – prefixes before the word and suffixes after the word. But a rich vocabulary can be developed by understanding the purpose of prefixes and suffixes and how they impact part of speech and inform meaning.To help students get to grips with affixes and how they can change meaning, select a ‘friendly’ root word and explore all of the word building creations that are possible. For example, the word ‘social’ can be added to create: socialise, socially, unsocial, antisocial, unsociable, etc.</span></li><span data-dcnode-id="939" instrument_node="">
</span></ol><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Maintain</span></h3><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="930"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Maintain</span></strong><span data-dcnode-id="931" instrument_node=""> learning through repeated practice and revision.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">There are many great game ideas to help you find creative ways to revisit learning after one day, one week and one month.</span></p><span data-dcnode-id="926" instrument_node="">
</span><h2 data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">3 bonus strategies for teaching vocabulary</span></h2><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="920"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Word of the day</span></strong></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Create a daily roster for students to share a newly discovered or unusual word with the class. They can get creative with the definition too by acting it out, giving synonyms, or doing a Pictionary style drawing on the board.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="913"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Creative writing</span></strong></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Compile the week’s ‘words of the day’ and task students with writing a story that uses as many of them as possible. They’ll learn how to use their new vocabulary in context.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Class glossary</span></strong></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Build up a list of unfamiliar words the class encounters when reading a text or studying a topic. Each student can choose a word and create a glossary page for it, complete with a definition, pronunciation guide, sentence example, mnemonic (memory aid), and an image that sums up its meaning.[/fusion_text][fusion_text]</span></p><span data-dcnode-id="902" instrument_node="">
</span><h2 data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">The challenges of teaching vocabulary</span></h2><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Explicit teaching of vocabulary is frequently overlooked in the busyness of the typical classroom.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Many teachers believe that vocabulary can be acquired without the need to provide targeted instruction. Others teachers are unaware of the need to teach vocabulary explicitly. Some lack the training or understanding of the skills involved. And some are simply overwhelmed by the competing voices of education priorities.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">In a world where information is always available, some teachers simply provide access to the resources that students can use to build their vocabulary independently – such as dictionaries, thesauruses and online tools.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">And while the end goal is autonomous and independent learners, students already struggling with a low vocabulary need significant support and explicit teaching to use these tools effectively.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The complexity of the English language presents homophones, homographs, polysemous words (words with multiple meanings) as well as the confusion of everyday words being used in idiomatic and figurative contexts.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">It is essential for teachers to support students in their acquisition of a growing vocabulary. But to do so, they must themselves be equipped with a rich vocabulary and a deep understanding of the richness and value of words.</span></p><span data-dcnode-id="881" instrument_node="">
