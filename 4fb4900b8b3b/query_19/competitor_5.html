 alt="Grammar" title="Grammar"&gt;</span></noscript></a><a class="sie-sidebar_39 se" data-dcnode-id="805" data-sid="sidebar_39" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/category/ela-skills/" target="_self"><div class="se-img se-gr slzy" data-dcnode-id="808" data-img="sidebar_39" style="width:100%;height:100%;"></div><noscript data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">&lt;img src="//static.showit.co/200/sXlC54zTSMe7_AJ-5CIQkQ/85405/ela_skills_and_standards.png" class="se-img" alt="ELA Skills and Standards" title="ELA Skills and Standards"&gt;</span></noscript></a><a class="sie-sidebar_40 se" data-dcnode-id="801" data-sid="sidebar_40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/category/reading/" target="_self"><div class="se-img se-gr slzy" data-dcnode-id="804" data-img="sidebar_40" style="width:100%;height:100%;"></div><noscript data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&lt;img src="//static.showit.co/200/7GS1P16RSfS-XCa32Qqyyw/85405/reading.png" class="se-img" alt="Reading" title="Reading"&gt;</span></noscript></a><a class="sie-sidebar_41 se" data-dcnode-id="797" data-sid="sidebar_41" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/category/class-community/" target="_self"><div class="se-img se-gr slzy" data-dcnode-id="800" data-img="sidebar_41" style="width:100%;height:100%;"></div><noscript data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">&lt;img src="//static.showit.co/200/VOyspbbURD6iSzquw-saeg/85405/classroom_community.png" class="se-img" alt="Classroom Community" title="Classroom Community"&gt;</span></noscript></a><a class="sie-sidebar_42 se" data-dcnode-id="793" data-sid="sidebar_42" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/category/teaching-tips/" target="_self"><div class="se-img se-gr slzy" data-dcnode-id="796" data-img="sidebar_42" style="width:100%;height:100%;"></div><noscript data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">&lt;img src="//static.showit.co/200/yruM3xQoTwOdU_UXbGdPnQ/85405/teaching_strategies.png" class="se-img" alt="Teaching Strategies" title="Teaching Strategies"&gt;</span></noscript></a></div></div></div><div data-dcnode-id="778" id="postloopcontainer"><div class="sb sib-new-canvas-1 sb-nm-dH sb-nd-dH" data-bid="new-canvas-1" data-dcnode-id="779" id="new-canvas-1(1)"><div class="ss-s ss-bg" data-dcnode-id="780"><div class="sc" data-dcnode-id="781" style="width:1200px;"><div class="sie-new-canvas-1_0 se" data-dcnode-id="787" data-sid="new-canvas-1_0"><div class="se-img" data-dcnode-id="788" data-img="new-canvas-1_0" style="width:100%;height:100%;"><img alt="" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="789" height="1216" loading="lazy" sizes="(max-width: 1212px) 100vw, 1212px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-activities.png&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-activities.png 1212w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-activities-300x300.png 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-activities-1021x1024.png 1021w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-activities-150x150.png 150w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-activities-768x771.png 768w" width="1212"></div></div><div class="sie-new-canvas-1_1 se" data-dcnode-id="785" data-sid="new-canvas-1_1"><div class="se-simple" data-dcnode-id="786"></div></div><div class="sie-new-canvas-1_2 se" data-dcnode-id="782" data-sid="new-canvas-1_2"><h1 class="se-t sie-new-canvas-1_2-text st-m-title st-d-title se-wpt" data-dcnode-id="783" data-secn="d"><span data-dcnode-id="784" instrument_node="">7 Creative Activities to Teach Idioms</span></h1></div></div></div></div></div><div class="sb sib-new-canvas-2 sb-nm-dH sb-nd-dH sb-ps" data-bid="new-canvas-2" data-dcnode-id="492" id="new-canvas-2"><div class="ss-s ss-bg" data-dcnode-id="493"><div class="sc" data-dcnode-id="494" style="width:1200px;"><div class="sie-new-canvas-2_0 se" data-dcnode-id="495" data-sid="new-canvas-2_0"><div class="se-t sie-new-canvas-2_0-text st-m-paragraph st-d-paragraph se-wpt se-rc se-wpt-pc" data-dcnode-id="496"><p data-dcnode-id="775"><span data-dcnode-id="776" style="font-weight: 400"><span data-dcnode-id="777" instrument_node="">Teaching idioms is an essential element of any ELA classroom. &nbsp;It provides important support for second language learners, but it also helps native speakers add more interest and color to their writing. &nbsp;</span></span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" style="font-weight: 400"><span data-dcnode-id="773" instrument_node="">I started my teaching career in Beijing China at an international school. It didn’t take me long to realize that my second language speakers would often be confused by the multitude of idiomatic expressions I incorporated into my daily teaching. In fact, to my surprise, even my English as a first language speakers struggled with understanding these expressions!</span></span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" style="font-weight: 400"><span data-dcnode-id="769" instrument_node="">I knew I had to come up with some creative ways of teaching idioms into my classroom.&nbsp; Below are some of my favorite strategies to help students learn, practice, and use idioms effectively and correctly in their conversation and writing.</span></span></p><span data-dcnode-id="766" instrument_node="">
</span><h3 data-dcnode-id="763"><span data-dcnode-id="764" style="font-weight: 400"><span data-dcnode-id="765" instrument_node="">1. Incorporate Idioms into the Classroom Decor</span></span></h3><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" style="font-weight: 400"><span data-dcnode-id="761" instrument_node="">Set up an Interactive bulletin board in your classroom to expose students to a variety of idiomatic expressions they may encounter. One way to do this is to have an </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-OF-THE-WEEK-VOLUME-2-3638554" rel="noopener" target="_blank"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">idiom of the week</span></strong></a><span data-dcnode-id="757" instrument_node=""> board. Each week swap out the idiom and present it to the class by providing the definition, a picture, and an example of it in use. You might also share a story from your own life that incorporates the idiom to make it more memorable. &nbsp;Encourage your students to use that particular idiom during the week and provide a small incentive for when a student uses it properly in their writing or in conversation.</span></span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="751"><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-OF-THE-WEEK-VOLUME-2-3638554" rel="noopener noreferrer" target="_blank"><img alt="Idiom of the Week" class="aligncenter wp-image-1821 size-full" data-dcnode-id="753" height="3498" loading="lazy" sizes="(max-width: 2303px) 100vw, 2303px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-of-the-Week.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-of-the-Week.jpg 2303w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-of-the-Week-198x300.jpg 198w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-of-the-Week-768x1167.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-of-the-Week-674x1024.jpg 674w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-of-the-Week-1053x1600.jpg 1053w" width="2303"></a></p><span data-dcnode-id="750" instrument_node="">
</span><h3 data-dcnode-id="747"><span data-dcnode-id="748" style="font-weight: 400"><span data-dcnode-id="749" instrument_node="">2. Examine idioms in text conversations</span></span></h3><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" style="font-weight: 400"><span data-dcnode-id="745" instrument_node="">Instead of providing definitions and examples for idioms, try giving students the opportunity to guess the meaning of an idiom based on its use in context. One way I love to do this is through text message conversations and song lyrics.</span></span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" style="font-weight: 400"><span data-dcnode-id="741" instrument_node="">I would provide students with </span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ACTIVITY-IDIOM-TEXT-MESSAGES-2247282" rel="noopener" target="_blank"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">text message conversations</span></strong></a><span data-dcnode-id="737" instrument_node=""> for teens that seamlessly incorporate idiomatic expressions within the conversation. &nbsp;I had students attempt to infer the meaning of the idiom based on how it was used in the conversation. It’s amazing how much more they will retain when you start by having them determine the meaning rather than the opposite (where you provide the definition in advance). &nbsp;</span></span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" style="font-weight: 400"><span data-dcnode-id="733" instrument_node="">I also would have students attempt to write their own text message conversations, so they could apply what they learned to different situations.</span></span></p><span data-dcnode-id="730" instrument_node="">
</span><h3 data-dcnode-id="725"><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ACTIVITY-IDIOM-TEXT-MESSAGES-2247282" rel="noopener noreferrer" target="_blank"><img alt="Idiom Text Messages" class="aligncenter wp-image-1822 size-full" data-dcnode-id="729" height="3850" loading="lazy" sizes="(max-width: 3024px) 100vw, 3024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Text-Messages.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Text-Messages.jpg 3024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Text-Messages-236x300.jpg 236w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Text-Messages-768x978.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Text-Messages-804x1024.jpg 804w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Text-Messages-1257x1600.jpg 1257w" width="3024"></a><span data-dcnode-id="726" style="font-weight: 400"><span data-dcnode-id="727" instrument_node="">3. Use idiom discussion starters </span></span></h3><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" style="font-weight: 400"><span data-dcnode-id="723" instrument_node="">Idioms are an easy way to spark discussion. &nbsp;I use </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-PROMPTS-FOR-WRITING-OR-DISCUSSION-3649270" rel="noopener" target="_blank"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">printable cards</span></strong></a><span data-dcnode-id="719" instrument_node=""> with different discussion prompts or writing prompts. Each prompt contains an English idiom, so students will learn the meaning of the idiom through writing or speaking! &nbsp;Some examples of the prompts include:</span></span></p><span data-dcnode-id="716" instrument_node="">
</span><ul data-dcnode-id="704"><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="712"><span data-dcnode-id="713" style="font-weight: 400"><span data-dcnode-id="714" instrument_node=""> Are you someone who usually jumps on the bandwagon?</span></span></li><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Describe a time when you had to burn the midnight oil.</span></li><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">What is something that gets under your skin?</span></li><span data-dcnode-id="705" instrument_node="">
</span></ul><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" style="font-weight: 400"><span data-dcnode-id="702" instrument_node="">Students need to have an understanding of the idiom in order to have the conversation or start writing!</span></span></p><span data-dcnode-id="699" instrument_node="">
</span><h3 data-dcnode-id="694"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-PROMPTS-FOR-WRITING-OR-DISCUSSION-3649270" rel="noopener noreferrer" target="_blank"><img alt="Idiom Discussion Cards" class="aligncenter wp-image-1815" data-dcnode-id="698" height="805" loading="lazy" sizes="(max-width: 907px) 100vw, 907px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Discussion-Cards.png&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Discussion-Cards.png 714w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Discussion-Cards-300x266.png 300w" width="907"></a><span data-dcnode-id="695" style="font-weight: 400"><span data-dcnode-id="696" instrument_node="">4. Use idioms to give advice</span></span></h3><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" style="font-weight: 400"><span data-dcnode-id="692" instrument_node="">Idioms are often used to give useful and practical advice. &nbsp;I compiled my favorite idioms that give advice and I love to share them with students. &nbsp;For every 10 </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ACTIVITIES-POSTERS-IDIOM-ADVICE-2803682"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">advice idioms</span></strong></a><span data-dcnode-id="688" instrument_node=""> I share, I also have students complete an assignment where they read scenarios and input which idiom would be appropriate advice for that particular situation. Some advice idioms include: </span></span></p><span data-dcnode-id="685" instrument_node="">
</span><ul data-dcnode-id="667"><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="681" style="font-weight: 400"><span data-dcnode-id="682" style="font-weight: 400"><span data-dcnode-id="683" instrument_node="">Don’t be a doubting Thomas. </span></span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="677" style="font-weight: 400"><span data-dcnode-id="678" style="font-weight: 400"><span data-dcnode-id="679" instrument_node="">Take what someone says with a grain of salt.</span></span></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="673" style="font-weight: 400"><span data-dcnode-id="674" style="font-weight: 400"><span data-dcnode-id="675" instrument_node="">You catch more flies with honey than vinegar. </span></span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="669" style="font-weight: 400"><span data-dcnode-id="670" style="font-weight: 400"><span data-dcnode-id="671" instrument_node="">Don’t look a gift horse in the mouth.</span></span></li><span data-dcnode-id="668" instrument_node="">
</span></ul><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ACTIVITIES-POSTERS-IDIOM-ADVICE-2803682" rel="noopener noreferrer" target="_blank"><img alt="Idiom Advice Activity" class="alignleft wp-image-1818 size-full" data-dcnode-id="665" height="3024" loading="lazy" sizes="(max-width: 4032px) 100vw, 4032px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Activity.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Activity.jpg 4032w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Activity-300x225.jpg 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Activity-768x576.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Activity-1024x768.jpg 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Activity-1600x1200.jpg 1600w" width="4032"></a></p><span data-dcnode-id="662" instrument_node="">
</span><h3 data-dcnode-id="659" style="text-align: left"><span data-dcnode-id="660" style="font-weight: 400"><span data-dcnode-id="661" instrument_node="">5. Bring idioms into lessons during holidays</span></span></h3><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" style="font-weight: 400"><span data-dcnode-id="657" instrument_node="">The holidays are my favorite time to bring idioms into the classroom because students can use the expressions in a timely way. &nbsp;For example, around </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/VALENTINES-DAY-IDIOMS-PRESENTATION-AND-ACTIVITY-1071355"><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Valentine’s Day</span></strong></a><span data-dcnode-id="653" instrument_node="">, you might share with students different expressions related to love and heartbreak. Here are a few examples:</span></span></p><span data-dcnode-id="650" instrument_node="">
</span><ul data-dcnode-id="636"><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="646" style="font-weight: 400"><span data-dcnode-id="647" style="font-weight: 400"><span data-dcnode-id="648" instrument_node="">Going dutch</span></span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="642" style="font-weight: 400"><span data-dcnode-id="643" style="font-weight: 400"><span data-dcnode-id="644" instrument_node="">Have a crush on someone</span></span></li><span data-dcnode-id="641" instrument_node="">
</span><li data-dcnode-id="638" style="font-weight: 400"><span data-dcnode-id="639" style="font-weight: 400"><span data-dcnode-id="640" instrument_node="">To pop the question</span></span></li><span data-dcnode-id="637" instrument_node="">
</span></ul><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632"><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/VALENTINES-DAY-IDIOMS-PRESENTATION-AND-ACTIVITY-1071355" rel="noopener noreferrer" target="_blank"><img alt="Teaching Valentines Day Idioms" class="alignleft wp-image-1579 size-full" data-dcnode-id="634" height="2556" loading="lazy" sizes="(max-width: 3761px) 100vw, 3761px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2017/01/Valentines-Day-Idioms.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2017/01/Valentines-Day-Idioms.jpg 3761w, https://prestoplans.com/wp-content/uploads/sites/7221/2017/01/Valentines-Day-Idioms-300x204.jpg 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2017/01/Valentines-Day-Idioms-768x522.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2017/01/Valentines-Day-Idioms-1024x696.jpg 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2017/01/Valentines-Day-Idioms-1600x1087.jpg 1600w" width="3761"></a></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" style="font-weight: 400"><span data-dcnode-id="630" instrument_node="">At Christmas time, you can share expressions about gift-giving, decorating, or snowy weather. &nbsp;I like to share </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/CHRISTMAS-IDIOMS-POSTERS-ACTIVITY-1598221" rel="noopener" target="_blank"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">the 12 Days of Idioms</span></strong></a><span data-dcnode-id="626" instrument_node=""> leading up to the holiday break. </span></span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" style="font-weight: 400"><span data-dcnode-id="622" instrument_node="">For example, some I might share include: </span></span></p><span data-dcnode-id="619" instrument_node="">
</span><ul data-dcnode-id="605"><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="615" style="font-weight: 400"><span data-dcnode-id="616" style="font-weight: 400"><span data-dcnode-id="617" instrument_node="">Trim the tree </span></span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="611" style="font-weight: 400"><span data-dcnode-id="612" style="font-weight: 400"><span data-dcnode-id="613" instrument_node="">Snowbirds </span></span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="607" style="font-weight: 400"><span data-dcnode-id="608" style="font-weight: 400"><span data-dcnode-id="609" instrument_node="">Snowball effect</span></span></li><span data-dcnode-id="606" instrument_node="">
</span></ul><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="601"><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/CHRISTMAS-IDIOMS-POSTERS-ACTIVITY-1598221" rel="noopener noreferrer" target="_blank"><img alt="Teaching Christmas Idioms" class="alignleft wp-image-1816 size-full" data-dcnode-id="603" height="3003" loading="lazy" sizes="(max-width: 3003px) 100vw, 3003px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms.jpg 3003w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms-150x150.jpg 150w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms-300x300.jpg 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms-768x768.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms-1024x1024.jpg 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Christmas-Idioms-1600x1600.jpg 1600w" width="3003"></a></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" style="font-weight: 400"><span data-dcnode-id="599" instrument_node="">And, at </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/HALLOWEEN-IDIOMS-PRESENTATION-ACTIVITY-2847457" rel="noopener" target="_blank"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Halloween</span></strong></a><span data-dcnode-id="595" instrument_node="">, you can teach students spooky and creepy idiomatic expressions like: </span></span></p><span data-dcnode-id="592" instrument_node="">
</span><ul data-dcnode-id="578"><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="588" style="font-weight: 400"><span data-dcnode-id="589" style="font-weight: 400"><span data-dcnode-id="590" instrument_node="">Having skeletons in the closet </span></span></li><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="584" style="font-weight: 400"><span data-dcnode-id="585" style="font-weight: 400"><span data-dcnode-id="586" instrument_node="">Stab someone in the back </span></span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="580" style="font-weight: 400"><span data-dcnode-id="581" style="font-weight: 400"><span data-dcnode-id="582" instrument_node="">Digging your own grave</span></span></li><span data-dcnode-id="579" instrument_node="">
</span></ul><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="574"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/HALLOWEEN-IDIOMS-PRESENTATION-ACTIVITY-2847457" rel="noopener noreferrer" target="_blank"><img alt="Halloween Idioms" class="alignleft wp-image-1817 size-full" data-dcnode-id="576" height="3225" loading="lazy" sizes="(max-width: 3024px) 100vw, 3024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Halloween-Idioms.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Halloween-Idioms.jpg 3024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Halloween-Idioms-281x300.jpg 281w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Halloween-Idioms-768x819.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Halloween-Idioms-960x1024.jpg 960w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Halloween-Idioms-1500x1600.jpg 1500w" width="3024"></a></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" style="font-weight: 400"><span data-dcnode-id="572" instrument_node="">Holidays aren’t the only time you can organize your idiom instruction by topic. Consider using a theme like the weather, the body, or animals and teaching a few idioms related to that particular topic.</span></span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="566"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOMS-ACTIVITIES-ASSIGNMENTS-POSTERS-TASK-CARDS-AWARDS-BUNDLE-2803906" rel="noopener" target="_blank"><img alt="Idiom Resource Bundle" class="wp-image-2930 size-full aligncenter" data-dcnode-id="568" height="681" loading="lazy" sizes="(max-width: 1394px) 100vw, 1394px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Resource-Bundle.png&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Resource-Bundle.png 1394w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Resource-Bundle-300x147.png 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Resource-Bundle-1024x500.png 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Resource-Bundle-768x375.png 768w" width="1394"></a></p><span data-dcnode-id="565" instrument_node="">
</span><h3 data-dcnode-id="562" style="text-align: left"><span data-dcnode-id="563" style="font-weight: 400"><span data-dcnode-id="564" instrument_node="">6. Practice idioms with games + immersive activities&nbsp;</span></span></h3><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" style="font-weight: 400"><span data-dcnode-id="560" instrument_node="">One of my favorite activities to do with idioms is an </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ESCAPE-ROOM-ACTIVITY-3723102" rel="noopener" target="_blank"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">escape room</span></strong></a><span data-dcnode-id="556" instrument_node="">! Students work in groups to circulate the room and problem-solve different puzzles, games, and activities related to idioms. This is usually a big challenge, but it is a fun way to expose students to new idioms and also tests and practices their understanding of the idioms they learned throughout the year!&nbsp;&nbsp;</span></span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="550"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ESCAPE-ROOM-ACTIVITY-3723102" rel="noopener noreferrer" target="_blank"><img alt="Idiom Escape Room" class="alignleft wp-image-1820 size-full" data-dcnode-id="552" height="2173" loading="lazy" sizes="(max-width: 3572px) 100vw, 3572px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Escape-Room-1.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Escape-Room-1.jpg 3572w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Escape-Room-1-300x183.jpg 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Escape-Room-1-768x467.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Escape-Room-1-1024x623.jpg 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/Idiom-Escape-Room-1-1600x973.jpg 1600w" width="3572"></a></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" style="font-weight: 400"><span data-dcnode-id="548" instrument_node="">Another fun idiom-related game is holding an </span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ACTIVITY-PAPER-FORTUNE-TELLER-2794382" rel="noopener" target="_blank"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">idiom paper fortune teller</span></strong></a><span data-dcnode-id="544" instrument_node="">. &nbsp;These are just fun to have in your classroom as an early finisher activity or as a brain break where students attempt to guess the meaning of 8 new idioms.</span></span></p><span data-dcnode-id="541" instrument_node="">
</span><h3 data-dcnode-id="538"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOM-ACTIVITY-PAPER-FORTUNE-TELLER-2794382" rel="noopener noreferrer" target="_blank"><img alt="Fortune Teller for Teaching Idioms" class="alignleft wp-image-1823 size-full" data-dcnode-id="540" height="2305" loading="lazy" sizes="(max-width: 2635px) 100vw, 2635px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-fortune-teller.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-fortune-teller.jpg 2635w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-fortune-teller-300x262.jpg 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-fortune-teller-768x672.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-fortune-teller-1024x896.jpg 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/04/idiom-fortune-teller-1600x1400.jpg 1600w" width="2635"></a></h3><span data-dcnode-id="537" instrument_node="">
</span><h3 data-dcnode-id="534"><span data-dcnode-id="535" style="font-weight: 400"><span data-dcnode-id="536" instrument_node="">7. Celebrate students with idiom awards </span></span></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" style="font-weight: 400"><span data-dcnode-id="532" instrument_node="">Consider hosting an awards ceremony where </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/END-OF-THE-YEAR-AWARDS-IDIOM-EDITION-2545951" rel="noopener" target="_blank"><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">each of the awards</span></strong></a><span data-dcnode-id="528" instrument_node=""> relates an idiom to the personality of your students. &nbsp;For example, a student may receive the Eagle Eye award for their attention to detail, or the Heart on Your Sleeve award for someone who expresses their emotions freely and openly, or the Big Cheese award to a leader. &nbsp;This is an easy way to make students feel special, but it also allows students to retain a stronger understanding of each of the expressions.</span></span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="522"><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/END-OF-THE-YEAR-AWARDS-IDIOM-EDITION-2545951" rel="noopener noreferrer" target="_blank"><img alt="Idiom Awards" class="aligncenter wp-image-1629 size-full" data-dcnode-id="524" height="2841" loading="lazy" sizes="(max-width: 2841px) 100vw, 2841px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy.jpg&amp;raw" srcset="https://prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy.jpg 2841w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy-150x150.jpg 150w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy-300x300.jpg 300w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy-768x768.jpg 768w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy-1024x1024.jpg 1024w, https://prestoplans.com/wp-content/uploads/sites/7221/2019/03/IMG_1507copy-1600x1600.jpg 1600w" width="2841"></a></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Idioms are part of everyday speech, but by intentionally devoting time to teaching them into our classroom, we can better equip our second language speakers and also make native English speakers more confident to use these expressions in their own writing and speech.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="517" instrument_node="">If you liked these creative idiom activities, many of them are included in my </span><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/IDIOMS-ACTIVITIES-ASSIGNMENTS-POSTERS-TASK-CARDS-AWARDS-BUNDLE-2803906" rel="noopener" target="_blank"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Idiom Resource Bundle</span></strong></a><span data-dcnode-id="513" instrument_node="">.&nbsp;</span><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Please note:</span></strong><span data-dcnode-id="510" instrument_node="">&nbsp;Not all the resources mentioned in this post are in the bundle. Please read the description of the bundle carefully before grabbing it.</span></p><span data-dcnode-id="508" instrument_node="">
