</span><div class="wysiwyg-content" data-dcnode-id="1931"><span data-dcnode-id="3225" instrument_node="">
</span><p data-dcnode-id="3222"><img alt="What is Self-Expression and How to Foster It? (20 Activities + Examples)" class="no-lazy alignright wp-image-22859" data-dcnode-id="3224" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positive.b-cdn.net/wp-content/uploads/self-expression1.jpg&amp;raw" srcset="https://positive.b-cdn.net/wp-content/uploads/self-expression1.jpg 800w, https://positive.b-cdn.net/wp-content/uploads/self-expression1-300x150.jpg 300w, https://positive.b-cdn.net/wp-content/uploads/self-expression1-768x384.jpg 768w, https://positive.b-cdn.net/wp-content/uploads/self-expression1-100x50.jpg 100w, https://positive.b-cdn.net/wp-content/uploads/self-expression1-510x255.jpg 510w" title="Self-Expression" width="300"><span data-dcnode-id="3223" instrument_node="">Do you ever stop to think about how you share yourself with others?</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">We all have our own unique quirks and traits, and we all have our own preferences and style for sharing pieces of ourselves with those around us.</span></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">You likely have a different level of sharing comfort with each person in your life—like a sort of security clearance in which those closest to you have a “Level 5” clearance while acquaintances have a “Level 1” clearance.</span></p><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">How we share and express ourselves to others forms the basis of our personality, as understood by everyone but us, and sets the tone for our entire lives. It’s a vital aspect of life to pay attention to, especially if you want to feel more understood and more in tune with the people you care about.</span></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">The way that we share ourselves is known as self-expression, and it turns out there are a lot of ways to do it. There are few “wrong” ways of expressing yourself, but there are some things you can do that give you a better chance of hearing and being heard than others.</span></p><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Read on to learn how to more effectively express yourself to others, get in touch with your authentic self, and enhance your self-expression skills.</span></p><span data-dcnode-id="3206" instrument_node="">
</span><p data-dcnode-id="3199"><span data-dcnode-id="3205" instrument_node="">Before you read on, we thought you might like to </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/self-compassion-pack" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3204" instrument_node="">download our 3 Self-Compassion Exercises for free</span></a><b data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">. </span></b><span data-dcnode-id="3200" instrument_node="">These detailed, science-based exercises will not only help you increase the compassion and kindness you show yourself but will also give you the tools to help your clients, students or employees show more compassion to themselves.</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3193"><span data-dcnode-id="3197" instrument_node="">You can download the free PDF </span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/self-compassion-pack" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3196" instrument_node="">here</span></a><span data-dcnode-id="3194" instrument_node="">.</span></p><span data-dcnode-id="3192" instrument_node="">

</span><p data-dcnode-id="3121"><a data-dcnode-id="3122" name="meaning-self-expression"></a></p><span data-dcnode-id="3120" instrument_node="">
</span><h2 data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">What is the Meaning of Self-Expression? A Definition</span></h2><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">I think we all have a pretty good handle on what self-expression is, but let’s see how the experts define it:</span></p><span data-dcnode-id="3114" instrument_node="">
</span><blockquote data-dcnode-id="3111"><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">“We define self-expression as expressing one’s thoughts and feelings, and these expressions can be accomplished through words, choices or actions.”</span></p></blockquote><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108" style="text-align: right;"><span data-dcnode-id="3109" instrument_node="">(Kim &amp; Ko, 2007).</span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3106" instrument_node="">This is an intuitive definition—self-expression is, at its core, the action of expressing yourself, and it can take a wide variety of forms. You can use your words, your facial expressions, your body, your movements, clothing, actions, and possessions to express your </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/dabrowskis-positive-disintegration/"><span data-dcnode-id="3105" instrument_node="">authentic inner self</span></a><span data-dcnode-id="3103" instrument_node="">.</span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Although the idea is simple, it seems that few fully grasp the importance of self-expression. We are all so bogged down with messages about how we should look, think, speak, and act; what we should eat and drink and study and do for fun; who we should associate with and who we should love or despise; and, indeed, who we should be deep down.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">These constant missives about what we ought to do and who we ought to be can make it difficult to let go of expectations and simply be ourselves.</span></p><span data-dcnode-id="3095" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">The last paragraph may have resonated with you—as it resonates with me—but as we’ll see later, the value we have for self-expression is not a universally shared value.</span></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3090"><a data-dcnode-id="3091" name="theory-self-expression"></a></p><span data-dcnode-id="3089" instrument_node="">
</span><h2 data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Self-Expression Theory in Psychology</span></h2><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">There is no one single theory of self-expression in psychology, but there are several explorations and hypotheses surrounding this subject in the literature.</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3082" instrument_node="">For example, Kim and Ko (2007) note that self-expression is one of the most highly-regarded and venerated </span><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/values-clarification/"><span data-dcnode-id="3081" instrument_node="">values</span></a><span data-dcnode-id="3079" instrument_node=""> in Western civilization due to the near-deification of “the individual” in our society. Not only is self-expression a vital practice of Western culture, it is also baked into the very roots of psychology. After all, psychology is all about the study of the mind, including the self, others, and groups of people.</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">The way we learn about the mind is through the expression of individuals—verbally or otherwise (Kim &amp; Ko, 2007).</span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">While those of us in the West have embraced individualistic norms and practices, including self-expression, other cultures have upheld collectivist values and—in some cases—placed little to no value on individualism. For instance, the Arab world is less prone to individualistic views and more likely to value tradition, religion, and authority (Inglehart et al., 2014).</span></p><span data-dcnode-id="3071" instrument_node="">
</span><h3 data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Self-Expression Values</span></h3><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">The differences across cultures and countries in the values they hold are fascinating; as noted above, countries in the Middle East are generally at the opposite end of the spectrum from Western countries on the two major axes of values:</span></p><span data-dcnode-id="3065" instrument_node="">
</span><ol data-dcnode-id="3057"><span data-dcnode-id="3064" instrument_node="">
</span><li data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">Traditional versus secular-rational values</span></li><span data-dcnode-id="3061" instrument_node="">
</span><li data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Survival values versus self-expression values (Inglehart et al., 2014)</span></li><span data-dcnode-id="3058" instrument_node="">
</span></ol><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Countries in North America and Western Europe generally fall on the secular-rational end (although the US and Ireland are two outliers when it comes to religion and tradition) and the self-expression end of the spectrums.</span></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">This indicates that Western countries tend to place less importance on traditional family values, religion, and obedience and more importance on environmental protection, social justice, and tolerance of different viewpoints and was of life (Inglehart et al., 2014).</span></p><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">East Asia countries generally fall in the secular-rational/survival values section (as seen below), meaning they do not place as much importance on tradition and religion, but they place great value on economic and physical security.</span></p><span data-dcnode-id="3047" instrument_node="">
</span><figure aria-describedby="caption-attachment-22856" class="wp-caption aligncenter" data-dcnode-id="3041" id="attachment_22856" style="width: 600px"><img alt="secular-rational/survival values section " class="wp-image-22856 size-full" data-dcnode-id="3046" data-lazy-src="https://positive.b-cdn.net/wp-content/uploads/self-expression-min.png" height="486" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20486'%3E%3C/svg%3E" title="world values " width="600"><noscript data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">&lt;img class="wp-image-22856 size-full" title="world values " src="https://positive.b-cdn.net/wp-content/uploads/self-expression-min.png" alt="secular-rational/survival values section " width="600" height="486" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3042" id="caption-attachment-22856"><span data-dcnode-id="3043" instrument_node="">Retrieved from http://www.worldvaluessurvey.org/WVSContents.jsp?CMSID=Findingsz</span></figcaption></figure><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">In some places, self-expression values might be considered “indicative of egoism and weak social capital” instead of the key to happiness and actualization that many Western countries consider them to be (Welzel, 2010). Needless to say, the value placed on self-expression varies widely across cultures and countries.</span></p><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Not only are the differences in self-expression values interesting, they raise a good point: can there be a comprehensive theory of self-expression that encompasses and explains self-expression across the globe?</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Any Western-centric theory of self-expression will likely propose that a good dose of self-expression is not only healthy but necessary for fulfillment; on the other hand, a theory from an Asian or Middle Eastern country will likely place little importance on individual self-expression and may even see it as a deviant behavior!</span></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><a data-dcnode-id="3027" name="importance-self-expression"></a></p><span data-dcnode-id="3025" instrument_node="">
</span><h2 data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">The Importance of Self-Expression</span></h2><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Related to our discussion above, the importance of self-expression will vary depending on your location and the culture you are steeped in. As the World Values Survey showed, individualism is not highly valued in many countries. This fact makes the sentence below—a pretty tame idea by Western standards—anything from mildly strange to outright laughable in another context.</span></p><span data-dcnode-id="3019" instrument_node="">
</span><blockquote data-dcnode-id="3016"><p data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">“The journey of self-discovery is the most important journey we can take”</span></p></blockquote><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3013" style="text-align: right;"><span data-dcnode-id="3014" instrument_node="">(De la Huerta, 2014).</span></p><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">In many cultures, a journey of self-discovery would be considered odd, unusual, a waste of time, or even selfish; the people might say something like, “Why spend your time and effort on getting to know yourself? Just ask your family—they’ll tell you exactly who you are!”</span></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">However, given the largely Western audience of positive psychology, we’ll focus on the importance of self-expression in this context.</span></p><span data-dcnode-id="3006" instrument_node="">
</span><p data-dcnode-id="3001"><span data-dcnode-id="3005" instrument_node="">De la Huerta’s (2014) article provides a good brief overview of why self-expression is so important in our society. He argues that self-expression is a vital piece of the puzzle that is </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/life-satisfaction/"><span data-dcnode-id="3004" instrument_node="">fulfillment in life</span></a><span data-dcnode-id="3002" instrument_node="">; it allows us to be our best selves, reach our full potential, and make valuable contributions to the world we live in.</span></p><span data-dcnode-id="3000" instrument_node="">
</span><p data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Authentic self-expression is how we embrace who we are, all the way from the positive traits and acts we keep on the surface to the darker and less valued pieces of ourselves that we bury deep down.</span></p><span data-dcnode-id="2997" instrument_node="">
</span><blockquote data-dcnode-id="2994"><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">“Neuroscience is teaching us that ‘self-expression’ might be one – if not the most important ways for people to connect, navigate and grow with each other.”</span></p></blockquote><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991" style="text-align: right;"><span data-dcnode-id="2992" instrument_node="">Judith Glaser</span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Research Judith Glaser agrees on the importance of self-expression; she notes that authentic self-expression not only encourages us to be the best we can be, it allows us to work effectively with others. When we open up and express ourselves, we move from what she calls a state of protection (coddling our ego and manning our inner walls to protect ourselves) to a state of partnering (being open to sharing yourself with others and vice versa).</span></p><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">According to Glaser, this state is where we get our best and most innovative work done. Acting in alignment with our authentic selves activates our prefrontal cortex, giving us greater access to our higher-order abilities like creative and innovative thinking, problem-solving, and planning.</span></p><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Two artists and educators, Jay M. Hanes and Eleanor Weisman, agree that self-expression is not only important for our relationship with ourselves and our relationships with others, it’s also vital for our work. They propose that we learn about ourselves through expressing ourselves, reflecting on our core self and engaging in creative learning that will benefit us in all walks of life and all disciplines and industries (Hanes &amp; Weisman, 2016).</span></p><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><a data-dcnode-id="2980" name="examples-self-expression"></a></p><span data-dcnode-id="2978" instrument_node="">
</span><h2 data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Examples of Self-Expression</span></h2><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Everywhere you look you can see examples of self-expression. This may sound like an exaggeration, but it’s not—people around you are expressing themselves every day in many ways, all you need to do is look for it.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Common ways that people in your life might express themselves include:</span></p><span data-dcnode-id="2969" instrument_node="">
</span><ul data-dcnode-id="2952"><span data-dcnode-id="2968" instrument_node="">
</span><li data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Sharing details about their day and how it made them feel.</span></li><span data-dcnode-id="2965" instrument_node="">
</span><li data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Wearing an off-trend or outdated item of clothing, not to be cool and unique, but just because they like it.</span></li><span data-dcnode-id="2962" instrument_node="">
</span><li data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Playing guitar on the street without a hat, cup, or other container set up to take donations.</span></li><span data-dcnode-id="2959" instrument_node="">
</span><li data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Yelling to express their frustration about traffic or other hindrances to getting from A to B.</span></li><span data-dcnode-id="2956" instrument_node="">
</span><li data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">Employing body language (either consciously or unconsciously) that tells you exactly how someone feels about him- or her-self, whether it’s tall and proud, slumped and defeated, or anywhere in between.</span></li><span data-dcnode-id="2953" instrument_node="">
</span></ul><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">If you were so inclined, I’m sure you could come up with a list of 100 acts of expression that you saw in the last week alone. That’s probably not necessary—I’m sure you have a good grasp on what self-expression is—but it’s important to be reminded how often people share themselves with us and how often we have the opportunity to share ourselves with others in our daily lives.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><a data-dcnode-id="2947" name="improve-self-expression"></a></p><span data-dcnode-id="2945" instrument_node="">
</span><h2 data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">How to Improve Self-Expression Skills</span></h2><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2937"><img alt="Techniques for Developing Self-Expression + Examples" class="alignright wp-image-22861" data-dcnode-id="2941" data-lazy-src="https://positive.b-cdn.net/wp-content/uploads/self-expression3.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20150'%3E%3C/svg%3E" title="self-expression examples" width="300"><noscript data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">&lt;img width="300" height="150" class="alignright wp-image-22861" title="self-expression examples" src="https://positive.b-cdn.net/wp-content/uploads/self-expression3.jpg" alt="Techniques for Developing Self-Expression + Examples" /&gt;</span></noscript><span data-dcnode-id="2938" instrument_node="">As with most skills, the best way to improve your self-expression skills is to practice them! Self-expression skills include—but are not limited to—the following:</span></p><span data-dcnode-id="2936" instrument_node="">
</span><ul data-dcnode-id="2922"><span data-dcnode-id="2935" instrument_node="">
</span><li data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Speaking</span></li><span data-dcnode-id="2932" instrument_node="">
</span><li data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">Writing</span></li><span data-dcnode-id="2929" instrument_node="">
</span><li data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Body language</span></li><span data-dcnode-id="2926" instrument_node="">
</span><li data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Artistic endeavors (creating music, dancing, etc.)</span></li><span data-dcnode-id="2923" instrument_node="">
</span></ul><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Author and student learning guru John Ramos agrees; in an answer to the question-and-answer forum Quora, he provides the following pieces of advice (2016):</span></p><span data-dcnode-id="2918" instrument_node="">
</span><ol data-dcnode-id="2904"><span data-dcnode-id="2917" instrument_node="">
</span><li data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Write (almost) everyday… It forces you to find the right words and expressions to convey your message.</span></li><span data-dcnode-id="2914" instrument_node="">
</span><li data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Emulate your favorite authors’ styles. (Note: you could also emulate your favorite poets, dancers, orators, musicians, etc.).</span></li><span data-dcnode-id="2911" instrument_node="">
</span><li data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Never lose a chance to speak in public.</span></li><span data-dcnode-id="2908" instrument_node="">
</span><li data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Apply winning formulas (particularly for public speaking, as there are many tricks and “secret weapons” to help you succeed).</span></li><span data-dcnode-id="2905" instrument_node="">
</span></ol><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">All of the exercises, techniques, activities, and strategies listed below will give you great opportunities to practice your own self-expression skills!</span></p><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><a data-dcnode-id="2899" name="techniques-self-expression"></a></p><span data-dcnode-id="2897" instrument_node="">
</span><h2 data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Techniques for Developing Self-Expression</span></h2><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">If you’re looking for ways to boost children’s self-expression skills, there are a lot of engaging and seemingly indirect ways to familiarize themselves with expressing themselves and understanding others. Peggy Schmidt from Scholastic Parents proposes the following 7 strategies (and several techniques to implement these strategies) to encourage a child to build their self-expression skills:</span></p><span data-dcnode-id="2891" instrument_node="">
</span><ol data-dcnode-id="2824"><span data-dcnode-id="2890" instrument_node="">
</span><li data-dcnode-id="2880"><span data-dcnode-id="2889" instrument_node="">Teach your child to interpret spoken and body language.</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">
a. Look at photographs of people expressing different emotions and discuss them.</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">
b. Cut out a cardboard frame to act as a “mirror” and have your child(ren) mimic your expression and identify it.</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">
c. Use everyday situations in your home to reinforce these lessons.</span><br data-dcnode-id="2882"><span data-dcnode-id="2881" instrument_node="">
d. Make a game of identifying the emotions that go with a particular tone of voice.</span></li><span data-dcnode-id="2879" instrument_node="">
</span><li data-dcnode-id="2869"><span data-dcnode-id="2878" instrument_node="">Reinforce the concept of “personal space” by encouraging your child to:</span><br data-dcnode-id="2877"><span data-dcnode-id="2876" instrument_node="">
a. Stay at arm’s length when he or she is talking to someone.</span><br data-dcnode-id="2875"><span data-dcnode-id="2874" instrument_node="">
b. Make sure there’s space between him or her and other children when sitting together.</span><br data-dcnode-id="2873"><span data-dcnode-id="2872" instrument_node="">
c. Avoid hugging someone he or she doesn’t know well.</span><br data-dcnode-id="2871"><span data-dcnode-id="2870" instrument_node="">
d. Refrain from intruding on another child’s space by touching, pinching, or physically annoying him or her.</span></li><span data-dcnode-id="2868" instrument_node="">
</span><li data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Explain the meaning of idiomatic expressions (explain jokes, idioms, puns, “turns of phrases,” etc.).</span></li><span data-dcnode-id="2865" instrument_node="">
</span><li data-dcnode-id="2849"><span data-dcnode-id="2864" instrument_node="">Work on the art of conversation.</span><br data-dcnode-id="2863"><span data-dcnode-id="2862" instrument_node="">
a. Initiate conversations with your child, particularly when there are no salient distractions around.</span><br data-dcnode-id="2861"><span data-dcnode-id="2860" instrument_node="">
b. When you don’t understand something your child says, ask your child what he or she means.</span><br data-dcnode-id="2859"><span data-dcnode-id="2858" instrument_node="">
c. Encourage your child to ask you questions and respond attentively to them.</span><br data-dcnode-id="2857"><span data-dcnode-id="2856" instrument_node="">
d. Make good eye contact and ask your child to do the same.</span><br data-dcnode-id="2855"><span data-dcnode-id="2854" instrument_node="">
e. Encourage your child to stay in control of his or her body when he is talking—no fidgeting or squirming!</span><br data-dcnode-id="2853"><span data-dcnode-id="2852" instrument_node="">
f. Work at having successively longer conversations as he or she gets better at self-expression.</span><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">
g. Have conversations with your child about things beyond routine, everyday stuff.</span></li><span data-dcnode-id="2848" instrument_node="">
</span><li data-dcnode-id="2840"><span data-dcnode-id="2847" instrument_node="">Model behavior that teaches the smart way to ask for help or a favor.</span><br data-dcnode-id="2846"><span data-dcnode-id="2845" instrument_node="">
a. Explain what the favor is.</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">
b. Rehearse what you’re going to say when you ask for the favor.</span><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">
c. Have your child listen to your conversation.</span></li><span data-dcnode-id="2839" instrument_node="">
</span><li data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Demonstrate the power of “please” and “thank you” as more than just good manners, but excellent tools.</span></li><span data-dcnode-id="2836" instrument_node="">
</span><li data-dcnode-id="2826"><span data-dcnode-id="2835" instrument_node="">Teach your child how to listen and follow directions.</span><br data-dcnode-id="2834"><span data-dcnode-id="2833" instrument_node="">
a. Get his or her attention through touch as well as your voice.</span><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">
b. Be specific about what you want him or her to do.</span><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">
c. Check for understanding when you ask your child to do something.</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">
d. Compliment your child on following the directions and successfully completing the task (Schmidt, 2001).</span></li><span data-dcnode-id="2825" instrument_node="">
</span></ol><span data-dcnode-id="2823" instrument_node="">
</span><p data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">With pre-teens and teens, you may want to upgrade your techniques and make things more organic. Follow these 10 tips from the Scholastic Parents Staff to encourage self-expression in your pre-teens and teens:</span></p><span data-dcnode-id="2820" instrument_node="">
</span><ol data-dcnode-id="2785"><span data-dcnode-id="2819" instrument_node="">
</span><li data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">Encourage your child to dance to express him- or herself (a dance-focused video game might be helpful here).</span></li><span data-dcnode-id="2816" instrument_node="">
</span><li data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Help your child design a website or blog to share his or her thoughts and feelings with family and friends, or include your child in the process of writing a family newsletter.</span></li><span data-dcnode-id="2813" instrument_node="">
</span><li data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Do a creative and expressive craft with your child, like creating jewelry or painting something without any constraints.</span></li><span data-dcnode-id="2810" instrument_node="">
</span><li data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Celebrate your child’s style by allowing him or her to dress however they’d like (given that it’s age-appropriate).</span></li><span data-dcnode-id="2807" instrument_node="">
</span><li data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Support your child engaging in sports, whether solo sports, team sports, or both.</span></li><span data-dcnode-id="2804" instrument_node="">
</span><li data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Encourage your child to mentor younger children to practice their own skills and do a good deed.</span></li><span data-dcnode-id="2801" instrument_node="">
</span><li data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Give your child a camera and let him or her snap away!</span></li><span data-dcnode-id="2798" instrument_node="">
</span><li data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Get outdoors and do a nature-oriented activity together (e.g., take a walk, go for a hike, do some gardening).</span></li><span data-dcnode-id="2795" instrument_node="">
</span><li data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Ask your child to take you on a guided tour of his or her classroom, the library, or somewhere else he or she spends a lot of time.</span></li><span data-dcnode-id="2792" instrument_node="">
</span><li data-dcnode-id="2787"><span data-dcnode-id="2791" instrument_node="">Help your child make a video documentary about him- or herself, including their current likes and dislikes, </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-are-your-strengths/"><span data-dcnode-id="2790" instrument_node="">strengths</span></a><span data-dcnode-id="2788" instrument_node="">, interests, and passions (Eulberg, n.d.).</span></li><span data-dcnode-id="2786" instrument_node="">
</span></ol><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">If you’re looking for techniques to enhance your own self-expression skills, there are some helpful general tips that can give you some guidance. Give these six tips a try:</span></p><span data-dcnode-id="2781" instrument_node="">
</span><ul data-dcnode-id="2758"><span data-dcnode-id="2780" instrument_node="">
</span><li data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">Speak your truth in the moment. Instead of looking back on a conversation and wishing you had been more honest and authentic, commit to being more honest and authentic in the moment. Promise yourself to speak your truth when the opportunity arises, but make sure to speak it with love and </span><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/kindness-activities-empathy-worksheets/"><span data-dcnode-id="2778" instrument_node="">kindness</span></a><span data-dcnode-id="2776" instrument_node="">.</span></li><span data-dcnode-id="2774" instrument_node="">
</span><li data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Widely define yourself. As psychiatrist Thomas Szasz notes, “…the self is not something that one finds. It is something that one creates.” Make sure that your definitions aren’t overly narrow or limiting and keep yourself open to new experiences, talents, interests, passions, and opportunities.</span></li><span data-dcnode-id="2771" instrument_node="">
</span><li data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Engage in creative techniques. Use techniques that harness your creativity to expand your potential and enhance your life. Try keeping a daily journal in which you write about whatever comes to mind, keeping an idea book that you carry with you all the time, creating mind maps to help you problem-solve, practicing brainstorming, and creating vision boards to motivate you to follow your dreams.</span></li><span data-dcnode-id="2768" instrument_node="">
</span><li data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Acquire self-knowledge – Know who you are. Don’t let yourself get too caught up in all of life’s little worries; take a break from your daily grind once in a while and assess your life and your feelings about it. Use introspection and reflection to make sure you never become a stranger to yourself.</span></li><span data-dcnode-id="2765" instrument_node="">
</span><li data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Pursue wants and passions voraciously. If your passions and dreams have become victims to the day-to-day stressors, dedicate yourself to keeping them off the metaphorical “back burner.” Make time to pursue your dreams and feed your passions—you won’t regret it!</span></li><span data-dcnode-id="2762" instrument_node="">
</span><li data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Develop a keen sense of reality. Your head may venture into the clouds, but your feet should stay firmly on the ground; keep in touch with reality and face your disappointments, setbacks, and unpleasant experiences head-on (“How to Live with Full Self-Expression”, n.d.).</span></li><span data-dcnode-id="2759" instrument_node="">
</span></ul><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">These are somewhat general tips, but truly committing to them will help you become the master of your own self-expression. For some more specific, practical ideas on improving your self-expression, read on.</span></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><a data-dcnode-id="2753" name="activities-self-expression"></a></p><span data-dcnode-id="2751" instrument_node="">
</span><h2 data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Activities to Increase Self-Expression for Adults</span></h2><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2743"><img alt="two colleagues - self-expression in the workplace " class="alignright wp-image-22862" data-dcnode-id="2747" data-lazy-src="https://positive.b-cdn.net/wp-content/uploads/self-expression4.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20150'%3E%3C/svg%3E" title="self-expression activities " width="300"><noscript data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">&lt;img width="300" height="150" class="alignright wp-image-22862" title="self-expression activities " src="https://positive.b-cdn.net/wp-content/uploads/self-expression4.jpg" alt="two colleagues - self-expression in the workplace " /&gt;</span></noscript><span data-dcnode-id="2744" instrument_node="">Aside from trying some of the suggestions and techniques listed above, you may want to try some exercises and activities designed to enhance your self-expressiveness.</span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">This section includes 15 activities that you may find useful (plus a link to 70 more!).</span></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">To work on improving your capacity for self-expression and encourage your practice of being authentically you, you may find </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.expressivetherapist.com/group-activities.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2737" instrument_node="">this impressively long list of 75 group activities</span></a><span data-dcnode-id="2735" instrument_node=""> from the Expressive Therapist website helpful. It includes activities like:</span></p><span data-dcnode-id="2733" instrument_node="">
</span><ul data-dcnode-id="2701"><span data-dcnode-id="2732" instrument_node="">
</span><li data-dcnode-id="2728"><em data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Inner Child</span></em><span data-dcnode-id="2729" instrument_node="">: Draw yourself as a child on your paper. Add images and words to give this child everything that it needs, including a supportive nurturing parent.</span></li><span data-dcnode-id="2727" instrument_node="">
</span><li data-dcnode-id="2723"><em data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Inside – Outside Bags/Boxes</span></em><span data-dcnode-id="2724" instrument_node="">: Decorate a bag or box with images and words on the outside to represent the qualities you show to the world. Decorate the inside of the bag or box with images and words that represent the inner qualities that are hidden to most people.</span></li><span data-dcnode-id="2722" instrument_node="">
</span><li data-dcnode-id="2715"><em data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Inspired Poem</span></em><span data-dcnode-id="2719" instrument_node="">: Think of a quote that is meaningful to you and write it at the top of a piece of paper. (A list can be found at </span><a data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/quotes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2718" instrument_node="">http://www.goodreads.com/quotes</span></a><span data-dcnode-id="2716" instrument_node="">) Add your own lines below it that expand on the quote in the way you understand it – continue for the rest of the page. Find someone in the group to read your poem for you as you use movement or gesture to express the meaning of your poem.</span></li><span data-dcnode-id="2714" instrument_node="">
</span><li data-dcnode-id="2708"><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Four Elements of You</span></em><span data-dcnode-id="2711" instrument_node="">: Discussion: Passion gives us the will to live and gives shape to our lives.</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">
Fold your paper into four sections. Label each section, The Earth of Me, The Air of Me, The Fire of Me, and The Water of Me. Use image and color to express your passion in life as symbolized by the four elements.</span></li><span data-dcnode-id="2707" instrument_node="">
</span><li data-dcnode-id="2703"><em data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Bardic Circle</span></em><span data-dcnode-id="2704" instrument_node="">: Sitting in a circle, everyone takes a turn sharing something with the group, such as performing a song, a dance, a poem, a joke, or an interesting fact, or teaching a new skill. Everyone is encouraged to be supportive and attentive when others share.</span></li><span data-dcnode-id="2702" instrument_node="">
</span></ul><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2699" instrument_node="">If you’re working your way through addiction, rehabilitation, recovery, or perhaps even striving towards </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/post-traumatic-growth/"><span data-dcnode-id="2698" instrument_node="">post-traumatic growth</span></a><span data-dcnode-id="2696" instrument_node="">, these activities from Summit Behavioral Health (2015) might help:</span></p><span data-dcnode-id="2694" instrument_node="">
</span><ol data-dcnode-id="2677"><span data-dcnode-id="2693" instrument_node="">
</span><li data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Listen to music to help you identify your feelings; if you are in a group, share out what you learned.</span></li><span data-dcnode-id="2690" instrument_node="">
</span><li data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Take a mindful walk (stay aware of yourself and your surroundings, make observations about your environment, and avoid judgment as much as possible).</span></li><span data-dcnode-id="2687" instrument_node="">
</span><li data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Write a new ending to a previous event, particularly an event that involved conflict, bad decisions, or mistakes on your part. This will help you learn how to make better choices and stay more optimistic.</span></li><span data-dcnode-id="2684" instrument_node="">
</span><li data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Build, create, or restore something to encourage yourself on your own journey toward a healthier, happier you.</span></li><span data-dcnode-id="2681" instrument_node="">
</span><li data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Create a visual journal using signs, symbols, drawings, or anything else to express your feelings aside from words.</span></li><span data-dcnode-id="2678" instrument_node="">
</span></ol><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2675" instrument_node="">If you’re interested in enhancing your self-expression specifically in the </span><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-relationships-workplace/"><span data-dcnode-id="2674" instrument_node="">workplace</span></a><span data-dcnode-id="2672" instrument_node="">, Judith Glaser has some great suggestions (2016):</span></p><span data-dcnode-id="2670" instrument_node="">
</span><ol data-dcnode-id="2653"><span data-dcnode-id="2669" instrument_node="">
</span><li data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Consider taking on a project like Glaser’s Children’s World, in which she and her team collected stories and pictures from schoolchildren, compiled them into a book, and actually published it (side note: it included material from over 500 students!).</span></li><span data-dcnode-id="2666" instrument_node="">
</span><li data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Kick off a meeting by asking people to share a recent personal story and a business story that they are enthusiastic or excited about.</span></li><span data-dcnode-id="2663" instrument_node="">
</span><li data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Complete the “What I Respect About You and What I Need From You” exercise to get to know your team better and identify strengths, needs, likes and dislikes, and how to avoid certain pitfalls with your colleagues.</span></li><span data-dcnode-id="2660" instrument_node="">
</span><li data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Collect your team’s success stories and publish them in a book, pamphlet, or brochure.</span></li><span data-dcnode-id="2657" instrument_node="">
</span><li data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">Publish your organization’s success stories on your company intranet and solicit advice and suggestions from your organization’s members on how to achieve future success.</span></li><span data-dcnode-id="2654" instrument_node="">
</span></ol><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2650"><a data-dcnode-id="2651" name="worksheets-self-expression"></a></p><span data-dcnode-id="2649" instrument_node="">
</span><h2 data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Project Ideas and Worksheets (PDF)</span></h2><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Those fond of making lists, checking boxes, drawing things out, and any other form of expression that involves using a pen and paper might find these projects and worksheets especially useful. There are also a few worksheets that you can use with your child to encourage their own capacity for self-expression. Read on to get some ideas!</span></p><span data-dcnode-id="2643" instrument_node="">
</span><h3 data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Your Pet Worksheet</span></h3><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">This worksheet encourages kids to think about how they express their thoughts and ideas. It can be used to encourage them to consider what details are important and which are superfluous, help them figure out how to best get the words into their head onto paper, and show them how to tie it all together into a clear, comprehensive narrative.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">First, your child can fill in the “Main Idea” bubble in the center, writing about their pet, noting what kind of pet they have and what is most important to know about that pet.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Next, they can work on filling in the supportive details. The prompts can help them figure out what they should be writing and help them comes up with more ideas; these prompts include:</span></p><span data-dcnode-id="2631" instrument_node="">
</span><ul data-dcnode-id="2617"><span data-dcnode-id="2630" instrument_node="">
</span><li data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">How long have you had your pet?</span></li><span data-dcnode-id="2627" instrument_node="">
</span><li data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">What is your pet’s name?</span></li><span data-dcnode-id="2624" instrument_node="">
</span><li data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Describe your pet’s personality—playful, loving, quiet, funny, loyal?</span></li><span data-dcnode-id="2621" instrument_node="">
</span><li data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">What does your pet look like? Describe your pet.</span></li><span data-dcnode-id="2618" instrument_node="">
</span></ul><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2615" instrument_node="">Click </span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.education.com/worksheet/article/write-about-your-pet/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2614" instrument_node="">here</span></a><span data-dcnode-id="2612" instrument_node=""> to read more about this worksheet or download it for your child (please note that a free account with Education.com is required to download some of their free resources).</span></p><span data-dcnode-id="2610" instrument_node="">
</span><h3 data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">All About Me Worksheet</span></h3><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">This is another worksheet for kids that is simple, easy to complete, but helpful for your child’s writing and self-expression skills. It can also be helpful for handwriting practice, engaging in creative thinking, and breaking the ice with a new classmate.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">First, the worksheet asks for just the basics:</span></p><span data-dcnode-id="2601" instrument_node="">
</span><ul data-dcnode-id="2593"><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">The child’s name</span></li><span data-dcnode-id="2597" instrument_node="">
</span><li data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">The child’s place of birth</span></li><span data-dcnode-id="2594" instrument_node="">
</span></ul><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Next, the worksheet moves on to the more individual aspects of preferences and interests:</span></p><span data-dcnode-id="2589" instrument_node="">
</span><ul data-dcnode-id="2572"><span data-dcnode-id="2588" instrument_node="">
</span><li data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Favorite colors</span></li><span data-dcnode-id="2585" instrument_node="">
</span><li data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Favorite hobbies</span></li><span data-dcnode-id="2582" instrument_node="">
</span><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Favorite foods to eat</span></li><span data-dcnode-id="2579" instrument_node="">
</span><li data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Favorite place to visit</span></li><span data-dcnode-id="2576" instrument_node="">
</span><li data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Favorite movie</span></li><span data-dcnode-id="2573" instrument_node="">
</span></ul><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Finally, the last three prompts are where your child can really get thoughtful, creative, and personal:</span></p><span data-dcnode-id="2568" instrument_node="">
</span><ul data-dcnode-id="2557"><span data-dcnode-id="2567" instrument_node="">
</span><li data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">“I laugh and smile when…”</span></li><span data-dcnode-id="2564" instrument_node="">
</span><li data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">“I will make the world a better place by…”</span></li><span data-dcnode-id="2561" instrument_node="">
</span><li data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">“My dream is to…”</span></li><span data-dcnode-id="2558" instrument_node="">
</span></ul><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2555" instrument_node="">To download this worksheet for use with your own child, click </span><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.education.com/worksheet/article/all-about-me-1/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2554" instrument_node="">here</span></a><span data-dcnode-id="2552" instrument_node=""> (this worksheet is hosted on Education.com, which requires a free membership for the use of some of their resources).</span></p><span data-dcnode-id="2550" instrument_node="">
</span><h3 data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">What Makes Us Alike &amp; Different</span></h3><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">A final worksheet for kids focuses on similarities and differences between the child and others. Completing this worksheet can help your child not only learn more about other people, other cultures, and other ways of life, but it can also help him get to know himself better.</span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">First, the worksheet explains that there are tons of people in the world, but we’re all different. We might come from different cultures, countries, or backgrounds, but we all have at least a few things in common.</span></p><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Next, the child is instructed to compare him- or herself to a friend or family member and consider these questions:</span></p><span data-dcnode-id="2538" instrument_node="">
</span><ol data-dcnode-id="2530"><span data-dcnode-id="2537" instrument_node="">
</span><li data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">What makes you alike?</span></li><span data-dcnode-id="2534" instrument_node="">
</span><li data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">What makes you different?</span></li><span data-dcnode-id="2531" instrument_node="">
</span></ol><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">In the space below these instructions is a table split into three columns, one with each of the following headings:</span></p><span data-dcnode-id="2526" instrument_node="">
</span><ul data-dcnode-id="2515"><span data-dcnode-id="2525" instrument_node="">
</span><li data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">What makes you different?</span></li><span data-dcnode-id="2522" instrument_node="">
</span><li data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">How you are alike</span></li><span data-dcnode-id="2519" instrument_node="">
</span><li data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">What makes your friend different?</span></li><span data-dcnode-id="2516" instrument_node="">
</span></ul><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">For each column, your child should think of some things that apply. How is she different from her friend? Where do the differences come from? Are they superficial, or pretty big differences?</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Next, she can think about how she and her friend are alike. What do they have in common? What can they agree on or relate to one another about?</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">When your child has completed this worksheet, he will be more knowledgeable about different cultures, backgrounds, and lifestyles than before, and hopefully on his way to being tolerant and friendly to all.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2504" instrument_node="">Click </span><a data-dcnode-id="2502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.education.com/worksheet/article/alike-and-different/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2503" instrument_node="">here</span></a><span data-dcnode-id="2501" instrument_node=""> to download this worksheet from Education.com as well (like the previous worksheets, it requires a free membership to download).</span></p><span data-dcnode-id="2499" instrument_node="">
</span><h3 data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Self-Expression Worksheet</span></h3><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">This worksheet comes from SpiritSpring Coaching and offers you an opportunity to learn more about self-expression, get some suggestions on how to practice it more often, and work on engaging your self-expression muscles, so to speak. It references religion since SpiritSpring is a religious organization, but the activity itself does not require faith in any religion or spiritual being to successfully complete it.</span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">First, you will respond to 10 statements about your current self-expression on a 3-point scale (seldom true, sometimes true, and often true). These statements are:</span></p><span data-dcnode-id="2490" instrument_node="">
</span><ul data-dcnode-id="2458"><span data-dcnode-id="2489" instrument_node="">
</span><li data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">I am inspired by and through authentic self-expression.</span></li><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">I communicate what is in my heart.</span></li><span data-dcnode-id="2483" instrument_node="">
</span><li data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">I express wholeness; there is no part of me or my life that is not fully embraced.</span></li><span data-dcnode-id="2480" instrument_node="">
</span><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">My own words and actions reflect consciousness and clarity.</span></li><span data-dcnode-id="2477" instrument_node="">
</span><li data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">My communication is honest, timely, and complete. I do not deceive, delay, or diminish when I speak my truth.</span></li><span data-dcnode-id="2474" instrument_node="">
</span><li data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">I know when I am expressing myself authentically and when I’m not.</span></li><span data-dcnode-id="2471" instrument_node="">
</span><li data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">I invite honesty and truth-telling.</span></li><span data-dcnode-id="2468" instrument_node="">
</span><li data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">I am aware of the impact of my words and actions.</span></li><span data-dcnode-id="2465" instrument_node="">
</span><li data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">My words and actions contribute in a positive way to myself and others.</span></li><span data-dcnode-id="2462" instrument_node="">
</span><li data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">There is integrity between who I am, what I say and how I act.</span></li><span data-dcnode-id="2459" instrument_node="">
</span></ul><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">For each statement, you will pick a response on the scale mentioned above and also provide an example of the statement in action in your life.</span></p><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Next, you will answer some questions and respond to some prompts to help you get even more in touch with yourself and how you generally express yourself. These questions and prompts are:</span></p><span data-dcnode-id="2451" instrument_node="">
</span><ol data-dcnode-id="2434"><span data-dcnode-id="2450" instrument_node="">
</span><li data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Describe a current situation in your life where you are being real.</span></li><span data-dcnode-id="2447" instrument_node="">
</span><li data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">What’s at stake in that situation or relationship? What could you gain or lose?</span></li><span data-dcnode-id="2444" instrument_node="">
</span><li data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Describe a current situation where you have not been being real?</span></li><span data-dcnode-id="2441" instrument_node="">
</span><li data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">What’s at stake in that situation? What could you gain or lose?</span></li><span data-dcnode-id="2438" instrument_node="">
</span><li data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">What could you do to turn the second situation around, so that you’re being real?</span></li><span data-dcnode-id="2435" instrument_node="">
</span></ol><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">By completing this worksheet, you will have discovered your approximate level of skill and practice in self-expression, identified an area in which you are best at expressing yourself and an area in which you are lagging in self-expression and come up with a plan to work on your weaknesses when it comes to expressing yourself. That’s a lot of punch to pack into one worksheet!</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node="">To give it a try, click </span><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//i.b5z.net/i/u/1643467/h/Freebies/Self_Expression_1.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2428" instrument_node="">here</span></a><span data-dcnode-id="2426" instrument_node=""> (clicking the link will begin a download of the worksheet).</span></p><span data-dcnode-id="2424" instrument_node="">
</span><h3 data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">The Five Messages Worksheet for Self-Expression and Self-Inquiry</span></h3><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Finally, this worksheet from The Seven Challenges Workbook is a great way to work on your self-expression skills. It covers the five main “messages” or elements of self-expression and guides you through identifying and considering each one.</span></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">The idea is that there are five “I messages” that correspond to five elements of experiencing and communicate different things to those around you.</span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">The five elements and messages are:</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2411" instrument_node="">1. “What actions, events, and/or sensations am I seeing, hearing, doing, remembering or otherwise sensing (the facts without evaluation)?”</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">
As I (or when I) see (hear, remember, take action about)…</span></p><span data-dcnode-id="2407" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2406" instrument_node="">2. “What basic emotions am I feeling (glad, sad, mad, delighted, frustrated, proud, sorry, ashamed, grateful, etc.) about those actions/events?</span><br data-dcnode-id="2405"><span data-dcnode-id="2404" instrument_node="">
…I feel (or felt)…</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2401" instrument_node="">3. “What interpretations, evaluations, wants, hopes, needs, and/or dreams of mine help to evoke and support my feelings?”</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">
…because I…</span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2396" instrument_node="">4. “What action, information, discussion, help, or commitment do I want, would I like, and/or do I want to request now?”</span><br data-dcnode-id="2395"><span data-dcnode-id="2394" instrument_node="">
…and now I want (want to request)… [Something doable]</span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2391" instrument_node="">5. “What positive results or personal fulfilment do I envision that action, discussion, information, or commitment leading to?”</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">
…so that I can / so that we can / in order for me or us to…</span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Filling in the blanks on this worksheet will help you take a peek into your inner experience and understand it better in addition to expressing it better. At the end, you’ll have a sort of sentence describing your experience. It will look something like this, although customized to your situation:</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">“As I see [element 1]… I feel [element 2]… because I [element 3]… and now I want [element 4]… so that I can [element 5].”</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">This exercise is a great way to get in touch with your inner self and figure out what you want, what you value, your thought patterns and emotional tendencies, and discover how you can move forward.</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2377" instrument_node="">Click </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newconversations.net/pdf/five_messages_worksheet_for_self_expression_2009.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2376" instrument_node="">here</span></a><span data-dcnode-id="2374" instrument_node=""> to download the worksheet (an automatic download will initiate when you click the link).</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><a data-dcnode-id="2371" name="art-self-expression"></a></p><span data-dcnode-id="2369" instrument_node="">
</span><h2 data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Self-Expression Through Photography, Art, Music, Dance, Fashion and Poetry</span></h2><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">As you probably already picked up through this piece, self-expression can be practised in many different ways. We often think of self-expression as involving speech and perhaps some actions as well—provided they are creative.</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">People have found wonderful outlets for self-expression through speaking and writing prose, but also through practicing photography, creating art, creating or sharing music, choreographing a dance routine (or coming up with some moves on the spot!), creating and/or wearing pieces that reflect your inner self, and crafting meaningful poems.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">It’s true that creative activities are often a great way to express yourself, but don’t forget about the many other ways available to you! In truth, anytime you are behaving in accordance with your true, authentic self and doing anything other than sitting still, you are likely engaging in self-expression—although performance artists have certainly been able to express their thoughts and ideas through the act of simply sitting!</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">You might be thinking of another pretty obvious method we all have of expressing ourselves: social media. It is indeed one of our many options, but it could prove to be a double-edged sword.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><a data-dcnode-id="2353" name="social-media-self-expression"></a></p><span data-dcnode-id="2351" instrument_node="">
</span><h2 data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Does Social Media Promote Self-Expression?</span></h2><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2343"><img alt="guy with phone in hands - self-expression and social media " class="alignright wp-image-22860" data-dcnode-id="2347" data-lazy-src="https://positive.b-cdn.net/wp-content/uploads/self-expression2.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20150'%3E%3C/svg%3E" title="self-expression social media" width="300"><noscript data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">&lt;img width="300" height="150" class="alignright wp-image-22860" title="self-expression social media" src="https://positive.b-cdn.net/wp-content/uploads/self-expression2.jpg" alt="guy with phone in hands - self-expression and social media " /&gt;</span></noscript><span data-dcnode-id="2344" instrument_node="">That’s a good question, and a straight answer doesn’t really exist. There’s some debate about that, with persuasive arguments both for and against.</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">This subject was discussed on the website debate.org, and there are a few good points made for each side.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">First, points that support the idea that social media does promote self-expression:</span></p><span data-dcnode-id="2336" instrument_node="">
</span><ol data-dcnode-id="2325"><span data-dcnode-id="2335" instrument_node="">
</span><li data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Social networking gives people a chance to express themselves to their online network, something they may not be able to do without this tool.</span></li><span data-dcnode-id="2332" instrument_node="">
</span><li data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Social media is about sharing our lives with others and connecting with others who think like us.</span></li><span data-dcnode-id="2329" instrument_node="">
</span><li data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">It’s the ultimate form of self-expression in that each post or Tweet you send is either an original idea or a meme, picture, or other shareable bits of information that inspires, motivates, or excites you.</span></li><span data-dcnode-id="2326" instrument_node="">
</span></ol><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">On the other hand, there are also some good points to support the idea that social media does NOT promote self-expression:</span></p><span data-dcnode-id="2321" instrument_node="">
</span><ol data-dcnode-id="2313"><span data-dcnode-id="2320" instrument_node="">
</span><li data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Many people begin to express themselves online and become adept at doing so, but lose their skills of self-expression in the non-digital world.</span></li><span data-dcnode-id="2317" instrument_node="">
</span><li data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Social media may be helpful for some people, but practical concerns like security, privacy, and employers (both present and future) checking your profile keeps many from truly expressing themselves.</span></li><span data-dcnode-id="2314" instrument_node="">
</span></ol><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2311" instrument_node="">Click </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.debate.org/opinions/does-social-networking-encourage-self-expression" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2310" instrument_node="">here</span></a><span data-dcnode-id="2308" instrument_node=""> to read these arguments in their entirety on debate.org. There is no set consensus, but it looks like there are some persuasive arguments for each side of this debate.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2305" instrument_node="">As far as research goes, researchers have studied the relationship between </span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-esteem-worksheets/"><span data-dcnode-id="2304" instrument_node="">self-esteem</span></a><span data-dcnode-id="2302" instrument_node="">, self-expression, and usage of the popular social media site Facebook, and found that social media may be seen as a valuable tool for expressing oneself for those with low self-esteem and/or </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/anxiety-worksheets/"><span data-dcnode-id="2301" instrument_node="">social anxiety</span></a><span data-dcnode-id="2299" instrument_node=""> (Leighton, Legate, Lepine, Anderson, &amp; Grahe, 2018).</span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">However, as rapidly as social media changes, so too does our understanding of its effects on us; by 2016, social media users were likely to report that Instagram and Snapchat were useful tools for self-expression, but Facebook and Twitter were not (Leighton et al., 2018).</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">The bottom line? Social media certainly facilitates expression! But how much of that expression is an authentic expression of our true selves? That question has yet to be answered.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><a data-dcnode-id="2290" name="songs-self-expression"></a></p><span data-dcnode-id="2288" instrument_node="">
</span><h2 data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">13 Songs About Self-Expression</span></h2><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Songs are extremely subjective—which is my way of saying this list may be a bust for you—but there are some empowerment and expression anthems that a good many people tend to find encouraging of self-expression. If you don’t find meaning or enjoyment in any of these songs, feel free to come up with your own playlist!</span></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Popular songs that focus on self-expression and being your authentic self include:</span></p><span data-dcnode-id="2279" instrument_node="">
</span><ul data-dcnode-id="2238"><span data-dcnode-id="2278" instrument_node="">
