</span><li data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">“Born This Way” by Lady Gaga</span></li><span data-dcnode-id="2272" instrument_node="">

</span><li data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">“Titanium” by David Guetta featuring Sia</span></li><span data-dcnode-id="2266" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">“If You Want to Sing Out, Sing Out” by Cat Stevens</span></li><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">“Roar” by Katy Perry</span></li><span data-dcnode-id="2260" instrument_node="">
</span><li data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">“Garden Party” by Rick Nelson</span></li><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">“I’ve Gotta Be Me” by Sammy Davis, Jr.</span></li><span data-dcnode-id="2254" instrument_node="">
</span><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">“Unwritten” by Natasha Bedingfield</span></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">“Be Yourself” by Audioslave</span></li><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">“I Don’t Want To Be” by Gavin DeGraw</span></li><span data-dcnode-id="2245" instrument_node="">
</span><li data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">“My Life” by Billy Joel</span></li><span data-dcnode-id="2242" instrument_node="">
</span><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">“We Weren’t Born to Follow” by Bon Jovi</span></li><span data-dcnode-id="2239" instrument_node="">
</span></ul><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><a data-dcnode-id="2236" name="books-self-expression"></a></p><span data-dcnode-id="2234" instrument_node="">

</span><p data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">If you’re intrigued by self-expression or want to learn more about how to boost your own capacity for self-expression, you might benefit from some further reading. Take a look at these 9 books on the subject and see if any of them catch your fancy:</span></p><span data-dcnode-id="2228" instrument_node="">

</span><p data-dcnode-id="2151"><a data-dcnode-id="2152" name="quotes-self-expression"></a></p><span data-dcnode-id="2150" instrument_node="">
</span><h2 data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">13 Self-Expression Quotes</span></h2><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">To get motivated, inspired, or in touch with your authentic self, sometimes a good quote can help. Check out these 13 quotes below.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><blockquote data-dcnode-id="2141"><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">“Good things will come from self-expression.”</span></p></blockquote><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138" style="padding-left: 40px; text-align: right;"><span data-dcnode-id="2139" instrument_node="">John Cho</span></p><span data-dcnode-id="2137" instrument_node="">
</span><blockquote data-dcnode-id="2134"><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">“If you have the words, there’s always a chance that you’ll find the way.”</span></p></blockquote><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131" style="text-align: right;"><span data-dcnode-id="2132" instrument_node="">Seamus Heaney</span></p><span data-dcnode-id="2130" instrument_node="">
</span><blockquote data-dcnode-id="2127"><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">“Everybody is talented because everybody who is human has something to express.”</span></p></blockquote><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124" style="text-align: right;"><span data-dcnode-id="2125" instrument_node="">Brenda Ueland</span></p><span data-dcnode-id="2123" instrument_node="">
</span><blockquote data-dcnode-id="2120"><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">“If there’s one theme in all my work, it’s about authenticity and self-expression. It’s the idea that some things are, in some real sense, really you—or express what you and others aren’t.”</span></p></blockquote><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117" style="text-align: right;"><span data-dcnode-id="2118" instrument_node="">Bernard Williams</span></p><span data-dcnode-id="2116" instrument_node="">
</span><blockquote data-dcnode-id="2113"><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">“There is a vitality, a life force, an energy, a quickening that is translated through you into action, and because there is only one of you in all time, this expression is unique. And if you block it, it will never exist through any other medium and will be lost.”</span></p></blockquote><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110" style="text-align: right;"><span data-dcnode-id="2111" instrument_node="">Martha Graham</span></p><span data-dcnode-id="2109" instrument_node="">
</span><blockquote data-dcnode-id="2103"><p data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">“No man has the right to dictate what other men should perceive, create or produce, but all should be encouraged to reveal themselves, their perceptions and emotions, and to </span><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-confidence-self-belief/"><span data-dcnode-id="2107" instrument_node="">build confidence</span></a><span data-dcnode-id="2105" instrument_node=""> in the creative spirit.”</span></p></blockquote><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100" style="text-align: right;"><span data-dcnode-id="2101" instrument_node="">Ansel Adams</span></p><span data-dcnode-id="2099" instrument_node="">
</span><blockquote data-dcnode-id="2096"><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">“Self-expression should not be a challenge that demands extraordinary talent but should be a right accessible to all.”</span></p></blockquote><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093" style="text-align: right;"><span data-dcnode-id="2094" instrument_node="">Deeyah Khan</span></p><span data-dcnode-id="2092" instrument_node="">
</span><blockquote data-dcnode-id="2089"><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">“Self-expression is always a right, but it’s still not there to be abused.”</span></p></blockquote><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086" style="text-align: right;"><span data-dcnode-id="2087" instrument_node="">Isaac Hayes</span></p><span data-dcnode-id="2085" instrument_node="">
</span><blockquote data-dcnode-id="2082"><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">“If we don’t believe in freedom of expression for people we despise, we don’t believe in it at all.”</span></p></blockquote><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079" style="text-align: right;"><span data-dcnode-id="2080" instrument_node="">Noam Chomsky</span></p><span data-dcnode-id="2078" instrument_node="">
</span><blockquote data-dcnode-id="2075"><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">“Everyone has their own ways of expression. I believe we all have a lot to say, but finding ways to say it is more than half the battle.”</span></p></blockquote><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072" style="text-align: right;"><span data-dcnode-id="2073" instrument_node="">Criss Jami</span></p><span data-dcnode-id="2071" instrument_node="">
</span><blockquote data-dcnode-id="2068"><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">“To the poet fated to be a poet, self-expression is as natural and as involuntary as breathing is to us ordinary mortals.”</span></p></blockquote><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065" style="text-align: right;"><span data-dcnode-id="2066" instrument_node="">Octavio Paz</span></p><span data-dcnode-id="2064" instrument_node="">
</span><blockquote data-dcnode-id="2061"><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">“If you copy then it is not self-expression.”</span></p></blockquote><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058" style="text-align: right;"><span data-dcnode-id="2059" instrument_node="">Michael Schenker</span></p><span data-dcnode-id="2057" instrument_node="">
</span><blockquote data-dcnode-id="2054"><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">“I want freedom for the full expression of my personality.”</span></p></blockquote><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051" style="text-align: right;"><span data-dcnode-id="2052" instrument_node="">Mahatma Gandhi</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><a data-dcnode-id="2049" name="home"></a></p><span data-dcnode-id="2047" instrument_node="">
</span><h2 data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">I hope you found this piece helpful and informative, and I hope that I successfully expressed myself and my thoughts on this subject.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">If you leave with one takeaway, let it be this: there is no downside to furthering your ability to express yourself, but there are tons of potential benefits. Learning to understand yourself and more effectively share that understanding with others is a fundamental part of being human, and we’re so lucky that we have so much influence over how that process unfolds!</span></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Take advantage of that fact and you will avoid looking back with regret when you think about all the things you should have said.</span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">What are your thoughts on self-expression? Do you think it’s one of the most important values in our society? Is it one of the most important values to you? How do you like to express yourself? Let us know in the comments!</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Thanks for reading, and best of luck in enhancing your capacity for self-expression!</span></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2028" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/self-compassion-pack" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2027" instrument_node="">download our 3 Self Compassion Exercises for free</span></a><span data-dcnode-id="2025" instrument_node="">.</span></p><span data-dcnode-id="2023" instrument_node="">
