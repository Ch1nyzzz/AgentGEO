</span><h3 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Idiom Introduction</span></h3><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">To introduce the topic of idioms to your students, lead a class discussion about the way people talk.</span></strong><span data-dcnode-id="560" instrument_node=""> Explain that </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//busyteacher.org/classroom_activities-vocabulary/idioms-worksheets/" target="_blank" title="idiom worksheets"><span data-dcnode-id="559" instrument_node="">idioms</span></a><span data-dcnode-id="557" instrument_node=""> are phrases that have a meaning different from their literal meaning. Ask students to volunteer any such phrases they have heard. Then give them a few examples to cement the understanding of idioms in their minds. Have groups of students work together to list as many idioms as they can think of.</span></p><span data-dcnode-id="555" instrument_node="">
</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="552" instrument_node="">
</span><div class="stepnum" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">2</span></div><span data-dcnode-id="549" instrument_node="">
</span><h3 data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Idiom Research</span></h3><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="542"><strong data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Give groups of three students a set of four or five idioms to research.</span></strong><span data-dcnode-id="543" instrument_node=""> For each idiom, they should find a definition (available online), give an example of the idiom in context and explain its origin (if possible). The group should then use this set of idioms in a dialogue they write together. Once all groups have finished, have each group share its dialogue with the rest of the class.</span></p><span data-dcnode-id="541" instrument_node="">
</span></li><span data-dcnode-id="539" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="538" instrument_node="">
</span><div class="stepnum" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">3</span></div><span data-dcnode-id="535" instrument_node="">
</span><h3 data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Literature’s Idioms</span></h3><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="528"><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Choose a reading selection for your students that is sprinkled with idioms.</span></strong><span data-dcnode-id="529" instrument_node=""> If you are not already working with such a text, try ‘My Momma Likes to Say’ or ‘Even More Parts’ or other similar idiom based picture books. Then, have groups of three or four students read the texts and locate any idioms within it. The groups should then discuss those idioms and try to determine their meanings based on the context. Have each group work with one book each day until every group has dissected each literature selection.</span></p><span data-dcnode-id="527" instrument_node="">
</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="524" instrument_node="">
</span><div class="stepnum" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">4</span></div><span data-dcnode-id="521" instrument_node="">
</span><h3 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Mixed Up Idioms</span></h3><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="514"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Write some original sentences that use unusual or interesting idioms.</span></strong><span data-dcnode-id="515" instrument_node=""> Transfer the sentence to index cards one word per card. Give pairs of students one set of cards and see if they can unscramble the sentences and guess the meaning of the idiom in that sentence. Have pairs of students write their own sentences on index cards, also including idioms, and exchange with a partner. Students then try to unscramble those sentences as well.</span></p><span data-dcnode-id="513" instrument_node="">
</span></li><span data-dcnode-id="511" instrument_node="">
</span><li data-dcnode-id="495"><span data-dcnode-id="510" instrument_node="">
</span><div class="stepnum" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">5</span></div><span data-dcnode-id="507" instrument_node="">
</span><h3 data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Photo Finishes</span></h3><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="497"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Give groups of four to five students an unfamiliar idiom along with two pictures.</span></strong><span data-dcnode-id="501" instrument_node=""> One picture should be the literal representation of the idiom. (Do an image search at </span><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.google.com/" rel="nofollow" target="_blank" title="http://images.google.com"><span data-dcnode-id="500" instrument_node="">google.com</span></a><span data-dcnode-id="498" instrument_node=""> to find these.) The second picture should be the nonliteral meaning of the idiom. The groups should look at these pictures and work together to interpret the meaning of the idiom. Once they have figured it out and checked their answer with you, have them share their interpretation (and pictures) with the class.</span></p><span data-dcnode-id="496" instrument_node="">
</span></li><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="481"><span data-dcnode-id="493" instrument_node="">
</span><div class="stepnum" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">6</span></div><span data-dcnode-id="490" instrument_node="">
</span><h3 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Idiomatic Culture</span></h3><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="483"><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Give your student a list of common U.S. English idioms and challenge groups of about three students to make conclusions about U.S. culture based on the idioms.</span></strong><span data-dcnode-id="484" instrument_node=""> Then, give those same groups a list of British idioms and ask them to do the same.</span></p><span data-dcnode-id="482" instrument_node="">
</span></li><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="479" instrument_node="">
</span><div class="stepnum" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">7</span></div><span data-dcnode-id="476" instrument_node="">
</span><h3 data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Idiom Interviews</span></h3><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="469"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Have students interview each other on the topic of idioms.</span></strong><span data-dcnode-id="470" instrument_node=""> Students should ask for information on what idioms have given their fellow students trouble in English and why they think learning idioms is or isn’t important. Then, ask each person in your class to do a second interview, this time with a native English speaker. These interview questions should elicit the native speaker’s opinion on learning idioms. Is it important for ESL students? What advice would the native speaker give an ESL student who is trying to learn idioms? What idioms do they think are the most important for ESL students to learn?</span></p><span data-dcnode-id="468" instrument_node="">
</span></li><span data-dcnode-id="466" instrument_node="">
</span></ol></div><span data-dcnode-id="463" instrument_node="">
