</span></ul></div></nav><div class="site-inner" data-dcnode-id="211"><div class="content-sidebar-wrap" data-dcnode-id="212"><main class="content" data-dcnode-id="461"><article aria-label="Idiom Activity for ESL Students | English Idioms" class="post-76 post type-post status-publish format-standard has-post-thumbnail category-icebreakers-warm-ups category-speaking category-writing tag-4-skills-esl-activity tag-esl-speaking tag-esl-warm-up entry" data-dcnode-id="524"><header class="entry-header" data-dcnode-id="1343"><p class="entry-meta" data-dcnode-id="1347"><span class="entry-categories" data-dcnode-id="1348"><span data-dcnode-id="1357" instrument_node="">in </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eslactivity.org/category/icebreakers-warm-ups/" rel="category tag"><span data-dcnode-id="1356" instrument_node="">Icebreakers + Warm-Ups</span></a><span data-dcnode-id="1354" instrument_node="">· </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eslactivity.org/category/speaking/" rel="category tag"><span data-dcnode-id="1353" instrument_node="">Speaking</span></a><span data-dcnode-id="1351" instrument_node="">· </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eslactivity.org/category/writing/" rel="category tag"><span data-dcnode-id="1350" instrument_node="">Writing</span></a></span></p><h1 class="entry-title" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Idiom Activity for ESL Students | English Idioms</span></h1><span data-dcnode-id="1344" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="526"><p data-dcnode-id="1333"><span data-dcnode-id="1342" instrument_node="">Idioms are one of those things that can be really fun to teach your students, both children, </span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eslactivity.org/top-10-esl-activities-teenagers/"><strong data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">teenagers</span></strong></a><span data-dcnode-id="1338" instrument_node=""> as well as adults. Here’s an ESL Idiom activity to help you do it in style! It lends itself well as a </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eslactivity.org/39-esl-warm-ups/"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">warm-up activity</span></strong></a><span data-dcnode-id="1334" instrument_node=""> before diving into the heart of your lesson.</span></p><div data-dcnode-id="1332" data-inserter-version="2" id="ezoic-pub-ad-placeholder-620"></div><span data-dcnode-id="1331" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1327" id="attachment_77" style="width: 414px"><img alt="Idiom-esl-activity" aria-describedby="caption-attachment-77" class="wp-image-77 size-full" data-dcnode-id="1330" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eslactivity.org/wp-content/uploads/2015/09/8724405.gif&amp;raw" width="404"><p class="wp-caption-text" data-dcnode-id="1328" id="caption-attachment-77"><span data-dcnode-id="1329" instrument_node="">ESL idiom activity</span></p></div><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1325" instrument_node="">Keep on reading to learn more about this Idiom Activity for </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eslactivity.org/speaking-english-tips-esl-learners/"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">English learners</span></strong></a><span data-dcnode-id="1321" instrument_node="">, along with some other idiom activities for English language learners.</span></p><div data-dcnode-id="1319" data-inserter-version="2" id="ezoic-pub-ad-placeholder-628"></div><span data-dcnode-id="1318" instrument_node="">
</span><h2 data-dcnode-id="1315"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Idiom Activity for ESL Students</span></strong></h2><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1310"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Age</span></strong><span data-dcnode-id="1311" instrument_node="">: 10+</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Materials Required</span></strong><span data-dcnode-id="1306" instrument_node="">: Picture/PowerPoint</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1300"><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Student Level:</span></strong><span data-dcnode-id="1301" instrument_node=""> Beginner to Advanced</span></p><div data-dcnode-id="1299" data-inserter-version="2" id="ezoic-pub-ad-placeholder-629"></div><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1294"><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Time Required</span></strong><span data-dcnode-id="1295" instrument_node="">: 5-10 Minutes</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1289"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Skills:</span></strong><span data-dcnode-id="1290" instrument_node=""> Speaking, Writing</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">This activity for English students is an excellent warm-up activity to get your classes started off in style.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Show students a picture with a literal representation of a common idiom. Give them several minutes to discuss the possible meaning of the idiom in pairs. Finish by giving them the actual meaning and several example sentences to write in their notebooks.</span></p><div data-dcnode-id="1282" data-inserter-version="2" id="ezoic-pub-ad-placeholder-630"></div><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">It can often work quite well to have 4 pictures on the PowerPoint so that faster groups can have something to do while waiting for the slower groups.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">In particular, kids love this one and it’ll feel kind of like they’re playing with English, when in fact, they’re actually learning.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Of course, remember that it’s most important to understand the meaning so that your students can actually use them again in real life. This point may seem obvious, but it is worth mentioning here.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><img alt="esl-idiom-activity" class="aligncenter wp-image-4286" data-dcnode-id="1271" height="600" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eslactivity.org/wp-content/uploads/2020/03/esl-idiom-activity-683x1024.jpg&amp;raw" srcset="https://www.eslactivity.org/wp-content/uploads/2020/03/esl-idiom-activity-683x1024.jpg 683w, https://www.eslactivity.org/wp-content/uploads/2020/03/esl-idiom-activity-200x300.jpg 200w, https://www.eslactivity.org/wp-content/uploads/2020/03/esl-idiom-activity-400x600.jpg 400w, https://www.eslactivity.org/wp-content/uploads/2020/03/esl-idiom-activity.jpg 735w" width="400"></p><div data-dcnode-id="1269" data-inserter-version="2" id="ezoic-pub-ad-placeholder-631"></div><span data-dcnode-id="1268" instrument_node="">
</span><h3 data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Procedure for Teaching Idioms to EFL Students:</span></h3><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">1. In advance, prepare a PowerPoint image or picture large enough for the class to easily see.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">2. Divide students into pairs or small groups and give them 3 minutes to discuss the meaning of the picture. Add a bit more time if you have more than 1 picture.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">3. Elicit guesses about what the idiom may mean before telling students the actual meaning.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">4. Finish the activity by giving students several example sentences or scenarios using the idiom for them to write in their notebooks.</span></p><div data-dcnode-id="1253" data-inserter-version="2" id="ezoic-pub-ad-placeholder-632"></div><span data-dcnode-id="1252" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1248" id="attachment_1042" style="width: 410px"><img alt="esl-idiom-activity" aria-describedby="caption-attachment-1042" class="size-full wp-image-1042" data-dcnode-id="1251" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eslactivity.org/wp-content/uploads/2018/09/esl-idiom-activity-e1557274408727.jpg&amp;raw" width="400"><p class="wp-caption-text" data-dcnode-id="1249" id="caption-attachment-1042"><span data-dcnode-id="1250" instrument_node="">How to help ESL students learn idioms</span></p></div><span data-dcnode-id="1247" instrument_node="">
</span><h2 data-dcnode-id="1244"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Activities for Teaching English Idioms</span></strong></h2><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">There are a few other things you can do in your ESL classroom to help you students learn English idioms. It’s certainly a good use of time because if students can master idioms, they’ll be pros at speaking and writing in no time! Plus, they’re fun too!</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Here are a few of my favourite ideas:</span></p><span data-dcnode-id="1237" instrument_node="">
</span><ul data-dcnode-id="1214"><span data-dcnode-id="1236" instrument_node="">
</span><li data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Keep a list idioms on a sheet of poster paper in your classroom. Once you run across a new one, add it to the list. Maybe keep it in the hallway at school for other students to be curious about.</span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">See who can use the most idioms in your class. During casual conversation or activities, reward students for using an idiom correctly. Have a prize for the highest total at the end of the month.</span></li><span data-dcnode-id="1230" instrument_node="">
</span><li data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Randomly choose an idiom of the day that you’ve discussed in class. Students have to make a little dialogue with it (pairs or small groups works well) as a warm-up or filler activity.</span></li><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Matching worksheets. Have idioms and then the literal meetings on a worksheet. Students have to match them up. Or, cut them out and place them face down. Then, have students play a memory game with them.</span></li><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">If students encounter a new idiom while reading, have them guess the meaning from the context first instead of just telling them what it means.</span></li><span data-dcnode-id="1221" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Make the figurative literal to spice things up in your class a little bit.</span></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Have students create a journal where they keep new vocabulary words and phrases to study later. Many idioms will probably naturally fit into them quite easily so give students time in class to do this. This is one of the best ways to learn a language. Plus, it’s basically free!</span></li><span data-dcnode-id="1215" instrument_node="">
</span></ul><span data-dcnode-id="1213" instrument_node="">
</span><h2 data-dcnode-id="1210"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Did you Like this Idea for Teaching Idioms ESL?&nbsp;</span></strong></h2><span data-dcnode-id="1209" instrument_node="">
