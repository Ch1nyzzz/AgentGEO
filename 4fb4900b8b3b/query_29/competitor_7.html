</span><img alt="Three idioms on a teal background." class="attachment-full size-full wp-post-image" data-dcnode-id="1101" height="450" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms.jpg&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms.jpg 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-400x225.jpg 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-272x153.jpg 272w, https://s18670.pcdn.co/wp-content/uploads/Idioms-768x432.jpg 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-217x122.jpg 217w, https://s18670.pcdn.co/wp-content/uploads/Idioms-490x275.jpg 490w, https://s18670.pcdn.co/wp-content/uploads/Idioms-556x312.jpg 556w, https://s18670.pcdn.co/wp-content/uploads/Idioms-388x218.jpg 388w, https://s18670.pcdn.co/wp-content/uploads/Idioms-258x145.jpg 258w, https://s18670.pcdn.co/wp-content/uploads/Idioms-660x370.jpg 660w, https://s18670.pcdn.co/wp-content/uploads/Idioms-300x169.jpg 300w" width="800"><span data-dcnode-id="1100" instrument_node=""> </span><div class="articleBody" data-dcnode-id="451"><span data-dcnode-id="1099" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="1098" data-url="https://www.weareteachers.com/idiom-of-the-day/"></div><div class="boldgrid-section" data-dcnode-id="463"><span data-dcnode-id="1097" instrument_node="">
</span><div class="container-fluid" data-dcnode-id="465"><span data-dcnode-id="1096" instrument_node="">
</span><div class="row" data-dcnode-id="467"><span data-dcnode-id="1095" instrument_node="">
</span><div class="col-md-12 col-xs-12 col-sm-12" data-dcnode-id="469"><span data-dcnode-id="1094" instrument_node="">
</span><p class="" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Every language has idioms, expressions that have a meaning that isn’t immediately obvious from the words themselves. Over time, we become so used to these phrases and expressions that we don’t even notice them. But young students and those who are learning English as a second language often find idioms confusing. Trying “Idiom of the Day” lessons with your class will build their comfort level.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p class="" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">We’ve put together a list of some of the most common English idioms, complete with meanings and examples. Share these images with your students to deepen their understanding and use of American English idioms in no time flat!</span></p><span data-dcnode-id="1088" instrument_node="">
</span><h2 data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Idiom Examples to Use in Idiom of the Day Lessons</span></h2><span data-dcnode-id="1085" instrument_node="">
</span><h2 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">1. A fish out of water</span></h2><span data-dcnode-id="1082" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1080"><img alt="A fish out of water" class="alignnone size-large wp-image-1417078" data-dcnode-id="1081" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-1-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-1-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-1.png 1080w" width="800"></p><span data-dcnode-id="1079" instrument_node="">
</span><p class="" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Meaning: Someone in an uncomfortable position or situation</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p class="" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Example: It was Allison’s first day at her new school, and she felt like a fish out of water.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><h2 class="" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">2. Add insult to injury</span></h2><span data-dcnode-id="1070" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1068"><img alt="Add insult to injury--idioms of the day" class="alignnone size-large wp-image-1417079" data-dcnode-id="1069" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-2-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-2-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-2.png 1080w" width="800"></p><span data-dcnode-id="1067" instrument_node="">
</span><p class="" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Meaning: Do something to make a bad situation worse</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p class="" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Example: Learning she failed her science test on the same day her best friend moved away added insult to injury.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><h2 class="" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">3. Anything but</span></h2><span data-dcnode-id="1058" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1056"><img alt="Anything but" class="alignnone size-large wp-image-1417080" data-dcnode-id="1057" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-3-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-3-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-3.png 1080w" width="800"></p><span data-dcnode-id="1055" instrument_node="">
</span><p class="" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Meaning: Not at all</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p class="" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Example: When they heard about the pop quiz, the students were anything but excited.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h2 class="" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">4. Barking up the wrong tree</span></h2><span data-dcnode-id="1046" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1044"><img alt="Barking up the wrong tree--idioms of the day" class="alignnone size-large wp-image-1417081" data-dcnode-id="1045" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-4-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-4-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-4.png 1080w" width="800"></p><span data-dcnode-id="1043" instrument_node="">
</span><p class="" data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Meaning: To be looking for answers in the wrong place</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p class="" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Example: James thought Christopher was the one who broke the vase, but he was barking up the wrong tree.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><h2 class="" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">5. Beat around the bush</span></h2><span data-dcnode-id="1034" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1032"><img alt="Beat around the bush idioms examples" class="alignnone size-large wp-image-1417082" data-dcnode-id="1033" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-5-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-5-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-5.png 1080w" width="800"></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Meaning: To avoid saying what you mean, often because it would be difficult or uncomfortable</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p class="" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Example: Don’t beat around the bush. Just tell me why you can’t come to my birthday party on Friday.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><h2 class="" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">6. Bite the bullet</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1020"><img alt="Bite the bullet idioms examples" class="alignnone size-large wp-image-1417083" data-dcnode-id="1021" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-6-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-6-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-6.png 1080w" width="800"></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Meaning: To do something that’s uncomfortable or not fun and get it over with</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p class="" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Example: After putting it off for several days, Alex decided to bite the bullet and start work on the history project.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><h2 class="" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">7. Break a leg</span></h2><span data-dcnode-id="1010" instrument_node="">
</span><p class="no-underline" data-dcnode-id="1008"><img alt="Break a leg" class="alignnone size-large wp-image-1417084" data-dcnode-id="1009" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-7-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-7-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-7.png 1080w" width="800"></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Meaning: Good luck! Often used in the theater before a play or performance</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Example: Is your piano recital tonight? Well, break a leg!</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h2 class="" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">8. Break the ice</span></h2><span data-dcnode-id="998" instrument_node="">
</span><p class="no-underline" data-dcnode-id="996"><img alt="Break the ice" class="alignnone size-large wp-image-1417160" data-dcnode-id="997" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-8_v2.png 1080w" width="800"></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Meaning: To do or say something that will make people feel more comfortable</span></p><span data-dcnode-id="992" instrument_node="">
</span><p class="" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Example: “OK, since none of us have met before, let’s introduce ourselves and break the ice by sharing our favorite ice cream flavor.”</span></p><span data-dcnode-id="989" instrument_node="">
</span><h2 class="" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">9. Call it a day</span></h2><span data-dcnode-id="986" instrument_node="">
</span><p class="no-underline" data-dcnode-id="984"><img alt="Call it a day" class="alignnone size-large wp-image-1417086" data-dcnode-id="985" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-9-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-9-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-9.png 1080w" width="800"></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Meaning: To stop working on something and plan to pick it up again later</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Example: After working for three hours on her science fair project, Sofia decided to call it a day.</span></p><span data-dcnode-id="977" instrument_node="">
</span><h2 class="" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">10. Costs an arm and a leg</span></h2><span data-dcnode-id="974" instrument_node="">
</span><p class="no-underline" data-dcnode-id="972"><img alt="Costs an arm and a leg" class="alignnone size-large wp-image-1417087" data-dcnode-id="973" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-10-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-10-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-10.png 1080w" width="800"></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Meaning: To describe something that is very expensive</span></p><span data-dcnode-id="968" instrument_node="">
</span><p class="" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Example: A new Playstation costs an arm and a leg, so you’d better start saving now if you want to buy one.</span></p><span data-dcnode-id="965" instrument_node="">
</span><h2 class="" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">11. Cut somebody some slack</span></h2><span data-dcnode-id="962" instrument_node="">
</span><p class="no-underline" data-dcnode-id="960"><img alt="Cut somebody some slack" class="alignnone size-large wp-image-1417088" data-dcnode-id="961" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-11-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-11-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-11.png 1080w" width="800"></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Meaning: To ease up on someone, to allow them some leeway or another chance</span></p><span data-dcnode-id="956" instrument_node="">
</span><p class="" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Example: Even though Jake was late with his English essay, Ms. Davis decided to cut him some slack since she knew he’d had the stomach flu.</span></p><span data-dcnode-id="953" instrument_node="">
</span><h2 class="" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">12. Cutting corners</span></h2><span data-dcnode-id="950" instrument_node="">
</span><p class="no-underline" data-dcnode-id="948"><img alt="Cutting corners" class="alignnone size-large wp-image-1417104" data-dcnode-id="949" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-12-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-12-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-12.png 1080w" width="800"></p><span data-dcnode-id="947" instrument_node="">
</span><p class="" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Meaning: To do something quickly and badly in order to save time or money</span></p><span data-dcnode-id="944" instrument_node="">
</span><p class="" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Example: Liza cut corners on her math homework so she could watch TV, and ended up getting most of the answers wrong.</span></p><span data-dcnode-id="941" instrument_node="">
</span><h2 class="" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">13. Don’t count your chickens before they hatch</span></h2><span data-dcnode-id="938" instrument_node="">
</span><p class="no-underline" data-dcnode-id="936"><img alt="Don't count your chickens before they hatch" class="alignnone size-large wp-image-1417091" data-dcnode-id="937" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-13-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-13-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-13.png 1080w" width="800"></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Meaning: Don’t depend on something before it’s happened</span></p><span data-dcnode-id="932" instrument_node="">
</span><p class="" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Example: I know you’re sure you’re going to get the lead in the spring play, but don’t count your chickens before they hatch.</span></p><span data-dcnode-id="929" instrument_node="">
</span><h2 class="" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">14. Every cloud has a silver lining</span></h2><span data-dcnode-id="926" instrument_node="">
</span><p class="no-underline" data-dcnode-id="924"><img alt="Every cloud has a silver lining" class="alignnone size-large wp-image-1417162" data-dcnode-id="925" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-14_v2.png 1080w" width="800"></p><span data-dcnode-id="923" instrument_node="">
</span><p class="" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Meaning: No matter how bad something seems, there’s usually a good side to it as well</span></p><span data-dcnode-id="920" instrument_node="">
</span><p class="" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Example: Jamal was disappointed that his soccer game was canceled, but it gave him time to go the movies with his friends, and his mom pointed out that every cloud has a silver lining.</span></p><span data-dcnode-id="917" instrument_node="">
</span><h2 class="" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">15. Get out of hand</span></h2><span data-dcnode-id="914" instrument_node="">
</span><p class="no-underline" data-dcnode-id="912"><img alt="Get out of hand" class="alignnone size-large wp-image-1417093" data-dcnode-id="913" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-15-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-15-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-15.png 1080w" width="800"></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Meaning: To become difficult to control</span></p><span data-dcnode-id="908" instrument_node="">
</span><p class="" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Example: Ms. Rodriguez told her students they could chat while they worked, as long as the noise level didn’t get out of hand.</span></p><span data-dcnode-id="905" instrument_node="">
</span><h2 class="" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">16. Get something out of your system</span></h2><span data-dcnode-id="902" instrument_node="">
</span><p class="no-underline" data-dcnode-id="900"><img alt="Get something out of your system" class="alignnone size-large wp-image-1417094" data-dcnode-id="901" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-16-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-16-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-16.png 1080w" width="800"></p><span data-dcnode-id="899" instrument_node="">
</span><p class="" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Meaning: Do the thing you’ve been wanting to do so you can move on</span></p><span data-dcnode-id="896" instrument_node="">
</span><p class="" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Example: Mr. Patel knew his students were eager to try out the new playground equipment, so he told them to go ahead and get it out of their system before they started class.</span></p><span data-dcnode-id="893" instrument_node="">
</span><h2 class="" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">17. Get your act together</span></h2><span data-dcnode-id="890" instrument_node="">
</span><p class="no-underline" data-dcnode-id="888"><img alt="Get your act together" class="alignnone size-large wp-image-1417095" data-dcnode-id="889" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-17-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-17-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-17.png 1080w" width="800"></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Meaning: Behave properly, or organize your thoughts so you can do something successfully</span></p><span data-dcnode-id="884" instrument_node="">
</span><p class="" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Example: After the third time he was late to class, Connor’s teacher told him he needed to get his act together and start showing up on time.</span></p><span data-dcnode-id="881" instrument_node="">
</span><h2 class="" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">18. Give someone the benefit of the doubt</span></h2><span data-dcnode-id="878" instrument_node="">
</span><p class="no-underline" data-dcnode-id="876"><img alt="Give someone the benefit of the doubt" class="alignnone size-large wp-image-1417096" data-dcnode-id="877" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-18-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-18-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-18.png 1080w" width="800"></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Meaning: To trust what someone says, even if you’re not entirely sure what they’re saying is true</span></p><span data-dcnode-id="872" instrument_node="">
</span><p class="" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Example: Charlotte wasn’t sure Amelia was really late because she missed the bus, but decided to give her the benefit of the doubt.</span></p><span data-dcnode-id="869" instrument_node="">
</span><h2 class="" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">19. Give someone the cold shoulder</span></h2><span data-dcnode-id="866" instrument_node="">
</span><p class="no-underline" data-dcnode-id="864"><img alt="Give someone the cold shoulder" class="alignnone size-large wp-image-1417097" data-dcnode-id="865" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-19-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-19-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-19.png 1080w" width="800"></p><span data-dcnode-id="863" instrument_node="">
</span><p class="" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Meaning: To ignore someone, usually because you’re upset or angry with them</span></p><span data-dcnode-id="860" instrument_node="">
</span><p class="" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Example: Will and Jessica were mad at Emma, so they decided to give her the cold shoulder until she apologized.</span></p><span data-dcnode-id="857" instrument_node="">
</span><h2 class="" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">20. Go back to the drawing board</span></h2><span data-dcnode-id="854" instrument_node="">
</span><p class="no-underline" data-dcnode-id="852"><img alt="Go back to the drawing board" class="alignnone size-large wp-image-1417098" data-dcnode-id="853" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-20-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-20-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-20.png 1080w" width="800"></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Meaning: To start something over again with a completely new idea</span></p><span data-dcnode-id="848" instrument_node="">
</span><p class="" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Example: When her science experiment failed completely, Hailey knew it was time to go back to the drawing board.</span></p><span data-dcnode-id="845" instrument_node="">
</span><h2 class="" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">21. Hang in there</span></h2><span data-dcnode-id="842" instrument_node="">
</span><p class="no-underline" data-dcnode-id="840"><img alt="Hang in there" class="alignnone size-large wp-image-1417099" data-dcnode-id="841" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-21-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-21-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-21.png 1080w" width="800"></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Meaning: Don’t give up, keep on trying</span></p><span data-dcnode-id="836" instrument_node="">
</span><p class="" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Example: “I’m sorry you’re having a rough day,” Lucas told Olivia. “Hang in there. I’m sure things will be better tomorrow.”</span></p><span data-dcnode-id="833" instrument_node="">
</span><h2 class="" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">22. Hit-or-miss</span></h2><span data-dcnode-id="830" instrument_node="">
</span><p class="no-underline" data-dcnode-id="828"><img alt="Hit-or-miss" class="alignnone size-large wp-image-1417100" data-dcnode-id="829" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-22-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-22-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-22.png 1080w" width="800"></p><span data-dcnode-id="827" instrument_node="">
</span><p class="" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Meaning: Something that might be good sometimes and bad other times</span></p><span data-dcnode-id="824" instrument_node="">
</span><p class="" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Example: Anna was a bit hit-or-miss when it came to remembering to take out the trash on Thursdays.</span></p><span data-dcnode-id="821" instrument_node="">
</span><h2 class="" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">23. Hit the sack/Hit the hay</span></h2><span data-dcnode-id="818" instrument_node="">
</span><p class="no-underline" data-dcnode-id="816"><img alt="Hit the sack idioms examples" class="alignnone size-large wp-image-1417101" data-dcnode-id="817" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-23-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-23-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-23.png 1080w" width="800"></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Meaning: To go to bed</span></p><span data-dcnode-id="812" instrument_node="">
</span><p class="" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Example: “Nine o’clock!” said Mia’s dad. “It’s time to turn off the TV and hit the sack.”</span></p><span data-dcnode-id="809" instrument_node="">
</span><h2 class="" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">24. It’s not rocket science</span></h2><span data-dcnode-id="806" instrument_node="">
</span><p class="no-underline" data-dcnode-id="804"><img alt="It's not rocket science idioms examples" class="alignnone size-large wp-image-1417102" data-dcnode-id="805" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-24-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-24-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-24.png 1080w" width="800"></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Meaning: Used to describe something that isn’t complicated or difficult</span></p><span data-dcnode-id="800" instrument_node="">
</span><p class="" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Example: All you have to do is put the books back on the right shelf. It’s not rocket science!</span></p><span data-dcnode-id="797" instrument_node="">
</span><h2 class="" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">25. It’s raining cats and dogs</span></h2><span data-dcnode-id="794" instrument_node="">
</span><p class="no-underline" data-dcnode-id="792"><img alt="It's raining cats and dogs" class="alignnone size-large wp-image-1417103" data-dcnode-id="793" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-25-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-25-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-25.png 1080w" width="800"></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Meaning: To rain very hard</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Example: I hope you brought your umbrella. It’s raining cats and dogs out there!</span></p><span data-dcnode-id="785" instrument_node="">
</span><h2 class="" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">26. Let someone off the hook</span></h2><span data-dcnode-id="782" instrument_node="">
</span><p class="no-underline" data-dcnode-id="780"><img alt="Let someone off the hook" class="alignnone size-large wp-image-1417106" data-dcnode-id="781" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-26-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-26-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-26.png 1080w" width="800"></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Meaning: To not hold someone responsible for something</span></p><span data-dcnode-id="776" instrument_node="">
</span><p class="" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Example: Logan was caught running in the hallway, but Ms. Walker let him off the hook because she knew he was late for the bus.</span></p><span data-dcnode-id="773" instrument_node="">
</span><h2 data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">27. Miss the boat</span></h2><span data-dcnode-id="770" instrument_node="">
</span><p class="no-underline" data-dcnode-id="768"><img alt="Miss the boat" class="alignnone size-large wp-image-1417107" data-dcnode-id="769" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-27-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-27-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-27.png 1080w" width="800"></p><span data-dcnode-id="767" instrument_node="">
</span><p class="" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Meaning: To be too late for something that’s already started or is over</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Example: Sarah wanted to join the lacrosse team, but she was too late to sign up and missed the boat.</span></p><span data-dcnode-id="761" instrument_node="">
</span><h2 class="" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">28. On the ball</span></h2><span data-dcnode-id="758" instrument_node="">
</span><p class="no-underline" data-dcnode-id="756"><img alt="On the ball" class="alignnone size-large wp-image-1417108" data-dcnode-id="757" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-28-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-28-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-28.png 1080w" width="800"></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Meaning: To be quick and alert, dealing with things right away</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Example: Alice got all her homework done and practiced her clarinet before dinner. She’s really on the ball today!</span></p><span data-dcnode-id="749" instrument_node="">
</span><h2 class="" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">29. On cloud nine</span></h2><span data-dcnode-id="746" instrument_node="">
</span><p class="no-underline" data-dcnode-id="744"><img alt="On cloud nine" class="alignnone size-large wp-image-1417109" data-dcnode-id="745" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-29-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-29-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-29.png 1080w" width="800"></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Meaning: Extremely happy about something</span></p><span data-dcnode-id="740" instrument_node="">
</span><p class="" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Example: When Wyatt learned he’d gotten a perfect score on both his math and science tests, he was on cloud nine for the rest of the day.</span></p><span data-dcnode-id="737" instrument_node="">
</span><h2 class="" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">30. On thin ice</span></h2><span data-dcnode-id="734" instrument_node="">
</span><p class="no-underline" data-dcnode-id="732"><img alt="On thin ice" class="alignnone size-large wp-image-1417110" data-dcnode-id="733" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-30-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-30-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-30.png 1080w" width="800"></p><span data-dcnode-id="731" instrument_node="">
</span><p class="" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Meaning: In a risky situation or position</span></p><span data-dcnode-id="728" instrument_node="">
</span><p class="" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Example: When Mrs. Chen had to ask Ava and Noah to stop talking for the fourth time that day, she warned them both that they were on thin ice.</span></p><span data-dcnode-id="725" instrument_node="">
</span><h2 class="" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">31. Pull someone’s leg</span></h2><span data-dcnode-id="722" instrument_node="">
</span><p class="no-underline" data-dcnode-id="720"><img alt="Pull someone's leg" class="alignnone size-large wp-image-1417111" data-dcnode-id="721" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-31-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-31-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-31.png 1080w" width="800"></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Meaning: To tease someone or try to fool them</span></p><span data-dcnode-id="716" instrument_node="">
</span><p class="" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Example: No, the cafeteria isn’t really giving away free ice cream. I was just pulling your leg!</span></p><span data-dcnode-id="713" instrument_node="">
</span><h2 class="" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">32. Pull yourself together</span></h2><span data-dcnode-id="710" instrument_node="">
</span><p class="no-underline" data-dcnode-id="708"><img alt="Pull yourself together" class="alignnone size-large wp-image-1417112" data-dcnode-id="709" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-32-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-32-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-32.png 1080w" width="800"></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Meaning: To calm yourself down when you’re very upset</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Example: I know you’re upset that your team lost the game, but you need to pull yourself together and go congratulate the winners.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h2 class="" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">33. Second wind</span></h2><span data-dcnode-id="698" instrument_node="">
</span><p class="no-underline" data-dcnode-id="696"><img alt="Second wind" class="alignnone size-large wp-image-1417113" data-dcnode-id="697" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-33-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-33-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-33.png 1080w" width="800"></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Meaning: A fresh burst of energy</span></p><span data-dcnode-id="692" instrument_node="">
</span><p class="" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Example: Quinn thought she was too tired to go to the party after playing soccer all afternoon, but then she got a second wind.</span></p><span data-dcnode-id="689" instrument_node="">
</span><h2 class="" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">34. Spill the beans</span></h2><span data-dcnode-id="686" instrument_node="">
</span><p class="no-underline" data-dcnode-id="684"><img alt="Spill the beans" class="alignnone size-large wp-image-1417114" data-dcnode-id="685" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-34-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-34-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-34.png 1080w" width="800"></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Meaning: To give away a secret</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Example: Isabella’s surprise party was ruined when Sarah spilled the beans a few days before.</span></p><span data-dcnode-id="677" instrument_node="">
</span><h2 class="" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">35. Take a rain check</span></h2><span data-dcnode-id="674" instrument_node="">
</span><p class="no-underline" data-dcnode-id="672"><img alt="Take a rain check" class="alignnone size-large wp-image-1417115" data-dcnode-id="673" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-35-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-35-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-35.png 1080w" width="800"></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Meaning: To postpone a plan until another time</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Example: I’d love to play basketball after school, but I’ve got to go home to mow the lawn. Can I take a rain check?</span></p><span data-dcnode-id="665" instrument_node="">
</span><h2 class="" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">36. The ball is in your court</span></h2><span data-dcnode-id="662" instrument_node="">
</span><p class="no-underline" data-dcnode-id="660"><img alt="The ball is in your court" class="alignnone size-large wp-image-1417116" data-dcnode-id="661" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-36-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-36-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-36.png 1080w" width="800"></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Meaning: The decision or next step is up to you</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Example: Nick’s mom told him he could either join the basketball team or sign up for karate class, so he had to choose one. “The ball is in your court,” she said.</span></p><span data-dcnode-id="653" instrument_node="">
</span><h2 class="" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">37. The early bird gets the worm</span></h2><span data-dcnode-id="650" instrument_node="">
</span><p class="no-underline" data-dcnode-id="648"><img alt="The early bird gets the worm" class="alignnone size-large wp-image-1417117" data-dcnode-id="649" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-37-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-37-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-37.png 1080w" width="800"></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Meaning: Those who arrive first have the best chance for success or receive the best things</span></p><span data-dcnode-id="644" instrument_node="">
</span><p class="" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Example: Grayson and Jayden showed up to find the best seats in the room already taken. “The early bird gets the worm!” said Maya with a grin.</span></p><span data-dcnode-id="641" instrument_node="">
</span><h2 class="" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">38. The elephant in the room</span></h2><span data-dcnode-id="638" instrument_node="">
</span><p class="no-underline" data-dcnode-id="636"><img alt="The elephant in the room" class="alignnone size-large wp-image-1417118" data-dcnode-id="637" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-38-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-38-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-38.png 1080w" width="800"></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Meaning: A large, obvious issue or problem that people are avoiding mentioning or dealing with</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Example: After waiting for Joseph to explain his bright green hair all through dinner, his mom finally decided it was time to address the elephant in the room.</span></p><span data-dcnode-id="629" instrument_node="">
</span><h2 class="" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">39. The icing on the cake</span></h2><span data-dcnode-id="626" instrument_node="">
</span><p class="no-underline" data-dcnode-id="624"><img alt="The icing on the cake" class="alignnone size-large wp-image-1417119" data-dcnode-id="625" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-39-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-39-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-39.png 1080w" width="800"></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Meaning: Something that makes a good situation even better</span></p><span data-dcnode-id="620" instrument_node="">
</span><p class="" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Example: The band was excited to learn they’d earned a place in the regional competition. Finding out it would take place at Disney World was the icing on the cake.</span></p><span data-dcnode-id="617" instrument_node="">
</span><h2 class="" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">40. The last straw</span></h2><span data-dcnode-id="614" instrument_node="">
</span><p class="no-underline" data-dcnode-id="612"><img alt="The last straw idioms examples" class="alignnone size-large wp-image-1417120" data-dcnode-id="613" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-40-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-40-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-40.png 1080w" width="800"></p><span data-dcnode-id="611" instrument_node="">
</span><p class="" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Meaning: The last in a series of events that causes someone to run out of patience</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Example: “That’s the last straw!” said Elena after her little brother’s ball landed in her cereal bowl. “Go play outside!”</span></p><span data-dcnode-id="605" instrument_node="">
</span><h2 class="" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">41. The whole nine yards</span></h2><span data-dcnode-id="602" instrument_node="">
</span><p class="no-underline" data-dcnode-id="600"><img alt="The whole nine yards" class="alignnone size-large wp-image-1417121" data-dcnode-id="601" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-41-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-41-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-41.png 1080w" width="800"></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Meaning: Everything, all the way</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Example: Grace and Nora went the whole nine yards to make sure Hannah’s birthday party was really special.</span></p><span data-dcnode-id="593" instrument_node="">
</span><h2 class="" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">42. Through thick and thin</span></h2><span data-dcnode-id="590" instrument_node="">
</span><p class="no-underline" data-dcnode-id="588"><img alt="Through thick and thin" class="alignnone size-large wp-image-1417122" data-dcnode-id="589" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-42-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-42-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-42.png 1080w" width="800"></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Meaning: When things are good and also when they’re bad</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Example: Sophie and Chloe had been best friends since first grade, sticking together through thick and thin.</span></p><span data-dcnode-id="581" instrument_node="">
</span><h2 class="" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">43. Time flies when you’re having fun</span></h2><span data-dcnode-id="578" instrument_node="">
</span><p class="" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">&lt;img class="alignnone size-large wp-image-1417123" src="https://www.weareteachers.com/wp-content/uploads/Idioms-43-800×800.png" alt="Time flies when you're having fun</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Meaning: When you’re having a good time, you don’t notice how quickly the time is passing</span></p><span data-dcnode-id="572" instrument_node="">
</span><p class="" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Example: “Recess is over already?” said Ben. “I guess time flies when you’re having fun!”</span></p><span data-dcnode-id="569" instrument_node="">
</span><h2 class="" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">44. To get bent out of shape</span></h2><span data-dcnode-id="566" instrument_node="">
</span><p class="no-underline" data-dcnode-id="564"><img alt="To get bent out of shape" class="alignnone size-large wp-image-1417124" data-dcnode-id="565" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-44-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-44-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-44.png 1080w" width="800"></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Meaning: To get upset about something</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Example: I didn’t mean to step on your foot—there’s no need to get bent out of shape about it.</span></p><span data-dcnode-id="557" instrument_node="">
</span><h2 class="" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">45. To make a long story short</span></h2><span data-dcnode-id="554" instrument_node="">
</span><p class="no-underline" data-dcnode-id="552"><img alt="To make a long story short" class="alignnone size-large wp-image-1417125" data-dcnode-id="553" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-45-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-45-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-45.png 1080w" width="800"></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Meaning: To give the basic facts about something instead of a long explanation</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Example: To make a long story short, Liam tripped over his shoelace and that’s how he broke his wrist.</span></p><span data-dcnode-id="545" instrument_node="">
</span><h2 class="" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">46. Under the weather</span></h2><span data-dcnode-id="542" instrument_node="">
</span><p class="no-underline" data-dcnode-id="540"><img alt="Under the weather idioms examples" class="alignnone size-large wp-image-1417126" data-dcnode-id="541" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-46-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-46-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-46.png 1080w" width="800"></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Meaning: To be sick</span></p><span data-dcnode-id="536" instrument_node="">
</span><p class="" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Example: Miguel won’t be at the scout meeting today because he’s feeling a little under the weather.</span></p><span data-dcnode-id="533" instrument_node="">
</span><h2 class="" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">47. We’ll cross that bridge when we come to it</span></h2><span data-dcnode-id="530" instrument_node="">
</span><p class="no-underline" data-dcnode-id="528"><img alt="We'll cross that bridge when we come to it" class="alignnone size-large wp-image-1417127" data-dcnode-id="529" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-47-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-47-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-47.png 1080w" width="800"></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Meaning: If that problem comes up, we’ll deal with it then, not right now</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Example: We might have a snow day on Monday, but we’ll cross that bridge when we come to it.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h2 class="" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">48. Wrap your head around something</span></h2><span data-dcnode-id="518" instrument_node="">
</span><p class="no-underline" data-dcnode-id="516"><img alt="Wrap your head around something" class="alignnone size-large wp-image-1417128" data-dcnode-id="517" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-48-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-48-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-48.png 1080w" width="800"></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Meaning: To understand something complicated or surprising</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Example: It’s hard to wrap your head around just how big the universe is.</span></p><span data-dcnode-id="509" instrument_node="">
</span><h2 class="" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">49. You can say that again</span></h2><span data-dcnode-id="506" instrument_node="">
</span><p class="no-underline" data-dcnode-id="504"><img alt="You can say that again" class="alignnone size-large wp-image-1417129" data-dcnode-id="505" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-49-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-49-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-49.png 1080w" width="800"></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Meaning: I completely agree with what you just said</span></p><span data-dcnode-id="500" instrument_node="">
</span><p class="" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Example: “This pizza is best food I ever ate!” exclaimed Mateo. “You can say that again!” Dylan agreed.</span></p><span data-dcnode-id="497" instrument_node="">
</span><h2 class="" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">50. Your guess is as good as mine</span></h2><span data-dcnode-id="494" instrument_node="">
</span><p class="no-underline" data-dcnode-id="492"><img alt="Your guess is as good as mine" class="alignnone size-large wp-image-1417130" data-dcnode-id="493" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s18670.pcdn.co/wp-content/uploads/Idioms-50-800x800.png&amp;raw" srcset="https://s18670.pcdn.co/wp-content/uploads/Idioms-50-800x800.png 800w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50-400x400.png 400w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50-768x768.png 768w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50-122x122.png 122w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50-65x65.png 65w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50-50x50.png 50w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50-300x300.png 300w, https://s18670.pcdn.co/wp-content/uploads/Idioms-50.png 1080w" width="800"></p><span data-dcnode-id="491" instrument_node="">
</span><p class="" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Meaning: When you have no idea what the answer is to a question or problem</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Example: “Do you know how to solve number four in our math homework?” Maria asked. “Your guess is as good as mine,” David replied, shrugging his shoulders.</span></p><span data-dcnode-id="485" instrument_node="">
