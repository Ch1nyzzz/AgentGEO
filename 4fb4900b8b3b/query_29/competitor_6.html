</span><h1 class="text-24 lg:text-36 mb-4 md:mb-8" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">10 English Idioms  ESL Students Need to Know</span></h1><span data-dcnode-id="760" instrument_node="">
</span><div data-dcnode-id="755"><span data-dcnode-id="759" instrument_node="">
</span><p class="text-14" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">
                                    By
                                    VIPKid                                    &nbsp;|&nbsp;
                                    January 21, 2020                                   
                                </span></p><span data-dcnode-id="756" instrument_node="">
</span></div><span data-dcnode-id="754" instrument_node="">
</span></div><span data-dcnode-id="752" instrument_node="">
</span></div><span data-dcnode-id="750" instrument_node="">
</span></div><span data-dcnode-id="748" instrument_node="">
</span><div class="content-body mb-16 md:px-0 overflow-auto" data-dcnode-id="620"><span data-dcnode-id="747" instrument_node="">
</span><div class="floatcta" data-dcnode-id="736"><span data-dcnode-id="746" instrument_node="">
</span><div class="hideme" data-dcnode-id="738"><span data-dcnode-id="745" instrument_node="">
</span><h4 data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Ready to start teaching English online?</span></h4><span data-dcnode-id="742" instrument_node="">
</span><a class="btn btn-float" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vipkid.com/teach%3Futm_source%3Dblog%26utm__medium%3Dblog_cta%26utm_campaign%3Dfloating_sign_up%26utm_content%3D2021%26partnerId%3D15506473"><span data-dcnode-id="741" instrument_node="">
			Teach with VIPKid
		</span></a><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Idioms can be found in every language, with each figure of speech having origins from various practices and phenomena throughout history. But what may be surprising for your ESL students is how often these figurative expressions are used in everyday conversations for English speakers. By teaching English idioms to your students, they will gain a greater mastery of English communication as well as showcase their ability to use figures of speech when appropriate. And it’s not only important for your students to learn English idioms–it’s also fun! There are so many idioms to teach, so listed below are some of the most common ones to show up in conversations. Stay tuned for more idioms in another blog post!</span></p><span data-dcnode-id="728" instrument_node="">
</span><h2 data-dcnode-id="725"><b data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Cat got your tongue?</span></b></h2><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Meaning: To be unable to speak, to be silent, or to be at a loss for words</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">This idiom depicts a rather amusing image! When at least two people are conversing but one is hardly talking, the other can say this idiom to point out how quiet the person is.</span></p><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="715"><b data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Hold your horses</span></b></h2><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Meaning: To be patient and wait</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Alluding back to when horses were used for transportation, riders would pull back the reins on a horse to stop their movement. Your students can say this to ask someone to slow down and wait.</span></p><span data-dcnode-id="708" instrument_node="">
</span><h2 data-dcnode-id="705"><b data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Under the weather</span></b></h2><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Meaning: To feel sickly and unwell</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">This idiom has nautical origins for when sailors felt sick while out on sea. This is one of the most widely used figures of speech for English speakers and your students should know that everyone will use it when they feel sick.</span></p><span data-dcnode-id="698" instrument_node="">
</span><h2 data-dcnode-id="695"><b data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Raining cats and dogs</span></b></h2><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Meaning: When it is raining heavily</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">An idiom used exclusively for when it rains heavily, it calls back to Victorian years when the public drainage was terrible and the flooding in the streets during rainfall caused cats and dogs to drown.</span></p><span data-dcnode-id="688" instrument_node="">
</span><h2 data-dcnode-id="685"><b data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">When pigs fly</span></b></h2><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Meaning: An occurrence that is impossible to happen</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Do your ESL students expect pigs to fly anytime soon? If they do, then you praise them for their creativity and insight of evolution. Jokes aside, it’s important that your students understand that they should use this idiom in response to a statement they think is unachievable.</span></p><span data-dcnode-id="678" instrument_node="">
</span><h2 data-dcnode-id="675"><b data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Elephant in the room</span></b></h2><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Meaning: A major issue that everyone is aware of but it is never brought up in conversations</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">This idiom is not only a strong image, it comes with strong feelings attached. Although this idiom is very familiar to many, it is often unsaid but understood and reserved for private conversations. Your students must first recognize when people avoid touching on an issue that everyone is aware of to use this idiom.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="665"><b data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Take it with a grain of salt</span></b></h2><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Meaning: To interpret something with some doubt</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Sometimes, it is wise to listen and understand things with some skepticism. In ancient Roman times, a little bit of salt was an antidote for poison. In a way, a little bit of doubt will help a person avoid being misinformed. Your ESL students can use this when they know they’re about to say something they aren’t sure is accurate.</span></p><span data-dcnode-id="658" instrument_node="">
</span><h2 data-dcnode-id="655"><b data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Piece of cake</span></b></h2><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Meaning: Something that is quite easy to do</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">In nineteenth-century America, cake was given as a prize for winning a competition. So this idiom is usually said when a person easily and successfully completes a task or action.</span></p><span data-dcnode-id="648" instrument_node="">
</span><h2 data-dcnode-id="645"><b data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Turn a blind eye</span></b></h2><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Meaning: To disregard reality and facts</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">If your students notice a person blatantly ignore facts after being told said facts, they can use this idiom to describe that person’s forced ignorance. Although this idiom sounds like it has a negative connotation, it depends on the context.</span></p><span data-dcnode-id="638" instrument_node="">
</span><h2 data-dcnode-id="635"><b data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Give a cold shoulder</span></b></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Meaning: To ignore someone purposely</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Over 200 years ago, party hosts would give cold shoulder cuts of meats to guests that weren’t welcomed to the party. Although no one is giving literal cold meat shoulders to people they don’t want to talk to, you can explain to your students why a person may be giving a figurative “cold shoulder” to someone.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">These are just a few of the common idioms that English speakers will say offhandedly. Explore your favorite idioms with your ESL students and roleplay when to say these idioms.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="622"><a aria-label="undefined (opens in a new tab)" data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vipkid.com/teach" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="624" instrument_node="">Enjoyed this and want to teach with VIPKid? Sign up today!</span></a></p><span data-dcnode-id="621" instrument_node="">
