</span><div data-dcnode-id="336" id="single"><div class="blog-post" data-dcnode-id="337"><div class="cover" data-dcnode-id="866"><div class="blur" data-dcnode-id="871"></div><span data-dcnode-id="870" instrument_node=""> </span><div class="header" data-dcnode-id="867"><h1 data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">How To Teach Idioms to your ESL students</span></h1></div></div><span data-dcnode-id="865" instrument_node=""> </span><div class="container pt-5" data-dcnode-id="338"><div class="row" data-dcnode-id="339"><div class="body col-md-8" data-dcnode-id="387"><div data-dcnode-id="796" id="content-holder"><h2 data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">Over the years, I’ve often debated whether to </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.off2class.com/teacher/%23idioms"><span data-dcnode-id="863" instrument_node="">teach idioms</span></a><span data-dcnode-id="861" instrument_node=""> to my ESL students…</span></h2><span data-dcnode-id="859" instrument_node=""> </span><p data-dcnode-id="849"><span data-dcnode-id="858" instrument_node="">On the one hand, idioms are an ever-changing, regionally variable and downright tricky part of the English language. On the other hand, Idioms are very common in spoken (and increasingly) written English. To achieve natural fluency (especially spoken), they are required. I’ve come to the conclusion that Idioms are a worthwhile teaching endeavour, but only to my </span><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Upper-Intermediate</span></em><span data-dcnode-id="855" instrument_node=""> and </span><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Advanced</span></em><span data-dcnode-id="852" instrument_node=""> students.</span><br data-dcnode-id="851"><span data-dcnode-id="850" instrument_node="">
There are a vast number of idioms in English used in so many different contexts (e.g. shopping, workplace, sports) that tackling the category with your students can be daunting. Here are some of my suggestions for teaching idioms to your ESL students.</span></p><span data-dcnode-id="848" instrument_node=""> </span><h4 data-dcnode-id="845"><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.off2class.com/teacher/%23idioms"><span data-dcnode-id="847" instrument_node="">Introduce Idioms Thematically</span></a></h4><span data-dcnode-id="844" instrument_node=""> </span><p data-dcnode-id="826"><span data-dcnode-id="843" instrument_node="">Most idioms in English fall into a thematic group (e.g. Idioms describing food, Idioms that use weather vocabulary). It’s best to organize your idioms lessons around one specific thematic group. Idioms are complex and they can also be difficult to explain to your ESL students. Remember the link between their literal meanings and their current use is not always clear (e.g. the origins of&nbsp;</span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">bite off more than you can chew</span></em><span data-dcnode-id="840" instrument_node=""> may be easier to rationalize to your student than </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">cold feet</span></em><span data-dcnode-id="837" instrument_node="">). &nbsp;For these reasons, I avoid&nbsp;introducing more than 8 to 10 idioms in one given thematic lesson.</span><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node=""> </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide08.jpg"><img alt="idioms" class="lazy alignnone wp-image-58239 size-medium" data-dcnode-id="834" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://www.off2class.com/wp-content/uploads/2015/06/Slide08-300x225.jpg" data-lazy-srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide08-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide08.jpg 720w" data-lazy-type="image" height="225" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide08-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide08-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide08.jpg 720w" width="300"><noscript data-dcnode-id="832"><img alt="idioms" class="alignnone wp-image-58239 size-medium" data-dcnode-id="833" height="225" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide08-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide08-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide08.jpg 720w" width="300"></noscript></a><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide06.jpg"><img alt="idioms" class="lazy alignnone wp-image-58240 size-medium" data-dcnode-id="830" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://www.off2class.com/wp-content/uploads/2015/06/Slide06-300x225.jpg" data-lazy-srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide06-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide06.jpg 720w" data-lazy-type="image" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide06-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide06-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide06.jpg 720w" width="300"><noscript data-dcnode-id="828"><img alt="idioms" class="alignnone wp-image-58240 size-medium" data-dcnode-id="829" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide06-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide06-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide06.jpg 720w" width="300"></noscript></a></p><span data-dcnode-id="825" instrument_node=""> </span><h4 data-dcnode-id="822"><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.off2class.com/teacher/%23idioms"><span data-dcnode-id="824" instrument_node="">Teach Idioms in Context</span></a></h4><span data-dcnode-id="821" instrument_node=""> </span><p data-dcnode-id="809"><span data-dcnode-id="820" instrument_node="">Some ESL teachers will go over a list of idioms with their ESL students. I don’t recommend this approach! It will be very difficult for your students to retain the meaning and use of idioms without discovering their context first. Ask students to guess the meaning of idioms, then introduce them in context:</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node=""> </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide03.jpg"><img alt="idioms" class="lazy alignnone size-medium wp-image-58241" data-dcnode-id="817" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://www.off2class.com/wp-content/uploads/2015/06/Slide03-300x225.jpg" data-lazy-srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide03-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide03.jpg 720w" data-lazy-type="image" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide03-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide03-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide03.jpg 720w" width="300"><noscript data-dcnode-id="815"><img alt="idioms" class="alignnone size-medium wp-image-58241" data-dcnode-id="816" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide03-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide03-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide03.jpg 720w" width="300"></noscript></a><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide04.jpg"><img alt="idioms" class="lazy alignnone size-medium wp-image-58242" data-dcnode-id="813" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://www.off2class.com/wp-content/uploads/2015/06/Slide04-300x225.jpg" data-lazy-srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide04-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide04.jpg 720w" data-lazy-type="image" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide04-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide04-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide04.jpg 720w" width="300"><noscript data-dcnode-id="811"><img alt="idioms" class="alignnone size-medium wp-image-58242" data-dcnode-id="812" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off2class.com/wp-content/uploads/2015/06/Slide04-300x225.jpg&amp;raw" srcset="https://www.off2class.com/wp-content/uploads/2015/06/Slide04-300x225.jpg 300w, https://www.off2class.com/wp-content/uploads/2015/06/Slide04.jpg 720w" width="300"></noscript></a></p><span data-dcnode-id="808" instrument_node=""> </span><h4 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Make sure that your students are ready!</span></h4><span data-dcnode-id="805" instrument_node=""> </span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Your students need to be very comfortable with the individual vocabulary that makes up an idiom before you teach them the idiom in whole. Make sure your ESL students are at an Upper Intermediate level or above before embarking on idioms lessons.</span></p><span data-dcnode-id="802" instrument_node=""> </span><h4 data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">If you need resources to teach idioms to your ESL students, I’ve released </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.off2class.com/teacher/%23idioms"><span data-dcnode-id="800" instrument_node="">30 lessons</span></a><span data-dcnode-id="798" instrument_node="">&nbsp;to help you teach idioms to your students. So far the reaction to the lesson content has been very positive!</span></h4></div><span data-dcnode-id="795" instrument_node=""> </span><hr class="post-separator" data-dcnode-id="794"><span data-dcnode-id="793" instrument_node=""> </span><div class="post-comments" data-dcnode-id="450" id="comments"><div class="comments-number" data-dcnode-id="451"><h4 data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">13 Comments        </span></h4><span data-dcnode-id="790" instrument_node=""> </span><ul class="comments unstyled" data-dcnode-id="452"><li data-dcnode-i
