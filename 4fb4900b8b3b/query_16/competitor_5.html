</span><h3 data-dcnode-id="327"><span class="ez-toc-section" data-dcnode-id="330" id="98_To_Pig_Out"></span><span data-dcnode-id="329" instrument_node="">98. To Pig Out </span><span class="ez-toc-section-end" data-dcnode-id="328"></span></h3><span data-dcnode-id="326" instrument_node="">
</span><ul data-dcnode-id="317"><li data-dcnode-id="322"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Meaning</span></strong><span data-dcnode-id="323" instrument_node="">: To eat a lot of something or to eat too much of something.</span></li><li data-dcnode-id="318"><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="319" instrument_node="">: I think Steve is going to pig out on pizza. Normally his mom doesn’t let him have pizza. She says that it isn’t very healthy.</span></li></ul><span data-dcnode-id="316" instrument_node="">
</span><h3 data-dcnode-id="312"><span class="ez-toc-section" data-dcnode-id="315" id="99_A_Teachers_Pet"></span><span data-dcnode-id="314" instrument_node="">99. A Teacher’s Pet</span><span class="ez-toc-section-end" data-dcnode-id="313"></span></h3><span data-dcnode-id="311" instrument_node="">
</span><ul data-dcnode-id="302"><li data-dcnode-id="307"><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Meaning</span></strong><span data-dcnode-id="308" instrument_node="">: The teacher’s favorite student.</span></li><li data-dcnode-id="303"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="304" instrument_node="">: Julie is such a teacher’s pet. She always does what the teacher says.</span></li></ul><span data-dcnode-id="301" instrument_node="">
</span><h3 data-dcnode-id="297"><span class="ez-toc-section" data-dcnode-id="300" id="100_As_Cool_As_A_Cucumber"></span><span data-dcnode-id="299" instrument_node="">100. As Cool As A Cucumber</span><span class="ez-toc-section-end" data-dcnode-id="298"></span></h3><span data-dcnode-id="296" instrument_node="">
</span><ul data-dcnode-id="287"><li data-dcnode-id="292"><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Meaning</span></strong><span data-dcnode-id="293" instrument_node="">: a person who is calm and composed especially during a stressful time.</span></li><li data-dcnode-id="288"><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="289" instrument_node="">: I don’t think Matt is nervous for the school play. He is always as cool as a cucumber.</span></li></ul><span data-dcnode-id="286" instrument_node="">
</span><h3 data-dcnode-id="282"><span class="ez-toc-section" data-dcnode-id="285" id="101_Doggy_Bag"></span><span data-dcnode-id="284" instrument_node="">101. Doggy Bag</span><span class="ez-toc-section-end" data-dcnode-id="283"></span></h3><span data-dcnode-id="281" instrument_node="">
</span><ul data-dcnode-id="272"><li data-dcnode-id="277"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Meaning</span></strong><span data-dcnode-id="278" instrument_node="">: a bag supplied by a restaurant which is used to take home leftovers.</span></li><li data-dcnode-id="273"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="274" instrument_node="">: Could I have a doggy bag? I don’t think I can finish this spaghetti.</span></li></ul><span data-dcnode-id="271" instrument_node="">
</span><h3 data-dcnode-id="267"><span class="ez-toc-section" data-dcnode-id="270" id="102_To_Be_In_The_Bag"></span><span data-dcnode-id="269" instrument_node="">102. To Be In The Bag</span><span class="ez-toc-section-end" data-dcnode-id="268"></span></h3><span data-dcnode-id="266" instrument_node="">
</span><ul data-dcnode-id="257"><li data-dcnode-id="262"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Meaning</span></strong><span data-dcnode-id="263" instrument_node="">: To be certain that you are going to win or achieve something.</span></li><li data-dcnode-id="258"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="259" instrument_node="">: I thought we had the basketball game in the bag, but then the other team came out of nowhere to beat us.</span></li></ul><span data-dcnode-id="256" instrument_node="">
</span><h3 data-dcnode-id="252"><span class="ez-toc-section" data-dcnode-id="255" id="103_To_Be_Pooped"></span><span data-dcnode-id="254" instrument_node="">103. To Be Pooped</span><span class="ez-toc-section-end" data-dcnode-id="253"></span></h3><span data-dcnode-id="251" instrument_node="">
</span><ul data-dcnode-id="242"><li data-dcnode-id="247"><strong data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Meaning</span></strong><span data-dcnode-id="248" instrument_node="">: to be very tired. </span></li><li data-dcnode-id="243"><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="244" instrument_node="">: After running the mile in gym class, I am pooped.</span></li></ul><span data-dcnode-id="241" instrument_node="">
</span><h3 data-dcnode-id="237"><span class="ez-toc-section" data-dcnode-id="240" id="104_To_Be_As_Happy_As_A_Clam"></span><span data-dcnode-id="239" instrument_node="">104. To Be As Happy As A Clam</span><span class="ez-toc-section-end" data-dcnode-id="238"></span></h3><span data-dcnode-id="236" instrument_node="">
</span><ul data-dcnode-id="227"><li data-dcnode-id="232"><strong data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Meaning</span></strong><span data-dcnode-id="233" instrument_node="">: to be really happy.</span></li><li data-dcnode-id="228"><strong data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="229" instrument_node="">: Jake was as happy as a clam to have a chance to play on the basketball team.</span></li></ul><span data-dcnode-id="226" instrument_node="">
</span><h3 data-dcnode-id="222"><span class="ez-toc-section" data-dcnode-id="225" id="105_Dont_Have_A_Cow"></span><span data-dcnode-id="224" instrument_node="">105. Don’t Have A Cow</span><span class="ez-toc-section-end" data-dcnode-id="223"></span></h3><span data-dcnode-id="221" instrument_node="">
</span><ul data-dcnode-id="212"><li data-dcnode-id="217"><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Meaning</span></strong><span data-dcnode-id="218" instrument_node="">: another way to say, don’t get upset.</span></li><li data-dcnode-id="213"><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="214" instrument_node="">: Calm down! Don’t have a cow! Mom is going to find out.</span></li></ul><span data-dcnode-id="211" instrument_node="">
</span><h3 data-dcnode-id="207"><span class="ez-toc-section" data-dcnode-id="210" id="106_To_Fight_Like_A_Lion"></span><span data-dcnode-id="209" instrument_node="">106. To Fight Like A Lion</span><span class="ez-toc-section-end" data-dcnode-id="208"></span></h3><span data-dcnode-id="206" instrument_node="">
</span><ul data-dcnode-id="197"><li data-dcnode-id="202"><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Meaning</span></strong><span data-dcnode-id="203" instrument_node="">: to fight with courage.</span></li><li data-dcnode-id="198"><strong data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="199" instrument_node="">: She would fight like a lion to protect her family from harm.</span></li></ul><span data-dcnode-id="196" instrument_node="">
</span><h3 data-dcnode-id="192"><span class="ez-toc-section" data-dcnode-id="195" id="107_The_Last_Straw"></span><span data-dcnode-id="194" instrument_node="">107. The Last Straw</span><span class="ez-toc-section-end" data-dcnode-id="193"></span></h3><span data-dcnode-id="191" instrument_node="">
</span><ul data-dcnode-id="182"><li data-dcnode-id="187"><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Meaning:</span></strong><span data-dcnode-id="188" instrument_node=""> the final irritation that causes a person to lose one’s patience and become very upset.</span></li><li data-dcnode-id="183"><strong data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="184" instrument_node="">: Ok, that’s it! That’s the last straw! I can’t take this anymore! I told you to stop fighting, but now I am going to turn this car around and we are going home.</span></li></ul><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">There you have it, 107 idioms for children. Did we miss one? If so, please let us know in the comments below.</span></p><span data-dcnode-id="178" instrument_node="">
