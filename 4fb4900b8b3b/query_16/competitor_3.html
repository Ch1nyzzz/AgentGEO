</span><h3 data-dcnode-id="363"><span class="ez-toc-section" data-dcnode-id="366" id="16_To_Be_Bull-Headed"></span><span data-dcnode-id="365" instrument_node="">16. To Be Bull-Headed</span><span class="ez-toc-section-end" data-dcnode-id="364"></span></h3><span data-dcnode-id="362" instrument_node="">
</span><ul data-dcnode-id="353"><li data-dcnode-id="358"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Meaning</span></strong><span data-dcnode-id="359" instrument_node="">: to be very stubborn.</span></li><li data-dcnode-id="354"><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="355" instrument_node="">: Can you go talk to him? He won’t listen to me. He is so bull-headed.</span></li></ul><span data-dcnode-id="352" instrument_node="">
</span><h3 data-dcnode-id="348"><span class="ez-toc-section" data-dcnode-id="351" id="17_Cow_Juice"></span><span data-dcnode-id="350" instrument_node="">17. Cow Juice</span><span class="ez-toc-section-end" data-dcnode-id="349"></span></h3><span data-dcnode-id="347" instrument_node="">
</span><ul data-dcnode-id="338"><li data-dcnode-id="343"><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Meaning</span></strong><span data-dcnode-id="344" instrument_node="">: slang for cow milk.</span></li><li data-dcnode-id="339"><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="340" instrument_node="">: Can you pick up a couple gallons of cow juice at the supermarket.</span></li></ul><span data-dcnode-id="337" instrument_node="">

</span><ul data-dcnode-id="323"><li data-dcnode-id="328"><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Meaning</span></strong><span data-dcnode-id="329" instrument_node="">: used to describe very intense rain.</span></li><li data-dcnode-id="324"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="325" instrument_node="">: Why are you soaking wet? It is raining like a cow peeing on a flat rock.</span></li></ul><span data-dcnode-id="322" instrument_node="">
</span><h3 data-dcnode-id="318"><span class="ez-toc-section" data-dcnode-id="321" id="19_Sacred_Cow"></span><span data-dcnode-id="320" instrument_node="">19. Sacred Cow</span><span class="ez-toc-section-end" data-dcnode-id="319"></span></h3><span data-dcnode-id="317" instrument_node="">
</span><ul data-dcnode-id="308"><li data-dcnode-id="313"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Meaning</span></strong><span data-dcnode-id="314" instrument_node="">: something that is considered so sacred or special that it shouldn’t be criticized.</span></li><li data-dcnode-id="309"><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="310" instrument_node="">: Whatever you do, don’t say anything bad about sports to Jerry. They are a sacred cow to him and he tends to take any remarks personally.</span></li></ul><span data-dcnode-id="307" instrument_node="">
</span><h3 data-dcnode-id="303"><span class="ez-toc-section" data-dcnode-id="306" id="20_Cow_Chips"></span><span data-dcnode-id="305" instrument_node="">20. Cow Chips</span><span class="ez-toc-section-end" data-dcnode-id="304"></span></h3><span data-dcnode-id="302" instrument_node="">
</span><ul data-dcnode-id="293"><li data-dcnode-id="298"><strong data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Meaning</span></strong><span data-dcnode-id="299" instrument_node="">: pieces of cow manure.</span></li><li data-dcnode-id="294"><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Use In A Sentence</span></strong><span data-dcnode-id="295" instrument_node="">: Look out for those cow chips!</span></li></ul><span data-dcnode-id="292" instrument_node="">
</span><h3 data-dcnode-id="288"><span class="ez-toc-section" data-dcnode-id="291" id="21_Moo_Juice"></span><span data-dcnode-id="290" instrument_node="">21. Moo Juice</span><span class="ez-toc-section-end" data-dcnode-id="289"></span></h3><span data-dcnode-id="287" instrument_node="">

</span><h3 data-dcnode-id="237"><span class="ez-toc-section" data-dcnode-id="240" id="24_Cow_Paste"></span><span data-dcnode-id="239" instrument_node="">24. Cow Paste</span><span class="ez-toc-section-end" data-dcnode-id="238"></span></h3><span data-dcnode-id="236" instrument_node="">
