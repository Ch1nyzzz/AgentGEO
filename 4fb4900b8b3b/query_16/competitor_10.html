</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">These cooking idioms are often used in everyday conversational English. Learning and using them will make you sound more natural when speaking English.</span></p><p data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">An idiom is a fixed phrase that doesn't change. It's meaning is metaphorical rather than literal so you cannot usually understand it from the individual words. I have created several&nbsp;</span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oysterenglish.com/idiom-site.html"><span data-dcnode-id="488" instrument_node="">different lists of idioms</span></a><span data-dcnode-id="486" instrument_node="">&nbsp;and infographics to help you as study English idioms.</span></p><p data-dcnode-id="483"><br data-dcnode-id="484"></p><span data-dcnode-id="482" instrument_node="">

</span><h2 data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">More examples of cooking idioms</span></h2><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Here are a few more examples to help make the meaning of these cooking idioms even clearer. I've also added a couple more cooking idioms that aren't in the infographic:</span></p><p data-dcnode-id="465"><br data-dcnode-id="466"></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="460"><b data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">turn up the heat</span></b><span data-dcnode-id="461" instrument_node="">:&nbsp; To intensify criticism or pressure on someone.</span></p><ul data-dcnode-id="442"><li data-dcnode-id="454"><span data-dcnode-id="455" style="font-family: opensans, arial, helvetica, sans-serif;"><span data-dcnode-id="459" instrument_node="">My girlfriend is </span><b data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">turning up the heat</span></b><span data-dcnode-id="456" instrument_node=""> for me to propose but I'm really not ready to get married and start a family.</span></span></li><li data-dcnode-id="448"><span data-dcnode-id="453" instrument_node="">I think it's time to </span><b data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">turn up the heat</span></b><span data-dcnode-id="450" instrument_node=""> and try to close the sale or we won't make our sales quota this month.</span><br data-dcnode-id="449"></li><li data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">My parents are </span><b data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">turning up the heat</span></b><span data-dcnode-id="444" instrument_node=""> on me to move back home so I really need to find a job soon or I won't have any choice.</span></li></ul><p data-dcnode-id="440"><br data-dcnode-id="441"></p><p data-dcnode-id="435"><b data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">half-baked ideas:</span></b><span data-dcnode-id="437" instrument_node="">&nbsp; Ideas which have not been thought out very well.</span><br data-dcnode-id="436"></p><ul data-dcnode-id="424"><li data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">My assistant usually has </span><b data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">half-baked ideas</span></b><span data-dcnode-id="431" instrument_node=""> but I never discourage her because once in a while she thinks of something brilliant.</span></li><li data-dcnode-id="425"><span data-dcnode-id="429" instrument_node="">I have to admit my suggestion was a </span><b data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">half-baked idea</span></b><span data-dcnode-id="426" instrument_node="">. I didn't think of the complications or downsides and it's cost me a lot of headaches and money.</span></li></ul><p data-dcnode-id="422"><br data-dcnode-id="423"></p><p data-dcnode-id="418"><b data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">simmer down:&nbsp;</span></b><span data-dcnode-id="419" instrument_node="">&nbsp;To become less angry and agitated; to become calm and quiet after being angry.</span></p><ul data-dcnode-id="400"><li data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">Kids if you don't </span><b data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">simmer down</span></b><span data-dcnode-id="414" instrument_node=""> and be nice to each other I'm going to take the game away from you.</span></li><li data-dcnode-id="407"><span data-dcnode-id="412" instrument_node="">Take a walk and </span><b data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">simmer down</span></b><span data-dcnode-id="409" instrument_node="">. We'll talk when you're calmer. I'm not in the mood to fight.</span><br data-dcnode-id="408"></li><li data-dcnode-id="401"><span data-dcnode-id="406" instrument_node="">My husband </span><b data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">simmered down</span></b><span data-dcnode-id="403" instrument_node=""> after he found out I gave our daughter permission to stay out late last night.</span><br data-dcnode-id="402"></li></ul><p data-dcnode-id="398"><br data-dcnode-id="399"></p><p data-dcnode-id="393"><b data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">stir the pot</span></b><span data-dcnode-id="395" instrument_node="">:&nbsp; To deliberately try to make a situation/people more tense and upset.</span><br data-dcnode-id="394"></p><ul data-dcnode-id="377"><li data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">My old girlfriend was always trying to </span><b data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">stir the pot</span></b><span data-dcnode-id="389" instrument_node=""> and I really hated the drama.</span></li><li data-dcnode-id="383"><span data-dcnode-id="387" instrument_node="">I look fat in these jeans? Wow, you're really trying to </span><b data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">stir the pot</span></b><span data-dcnode-id="384" instrument_node="">.</span></li><li data-dcnode-id="378"><span data-dcnode-id="382" instrument_node="">Please don't invite the marketing director to this meeting. He's very critical and always tries to </span><b data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">stir the pot</span></b><span data-dcnode-id="379" instrument_node="">.</span></li></ul><p data-dcnode-id="375"><br data-dcnode-id="376"></p><p data-dcnode-id="371"><b data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">cook the books</span></b><span data-dcnode-id="372" instrument_node="">:&nbsp; To falsify the financial figures of a company's accounting books.</span></p><ul data-dcnode-id="357"><li data-dcnode-id="367"><span data-dcnode-id="370" instrument_node="">She used to work in our finance department but she was convicted of fraud and </span><b data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">cooking the books.</span></b></li><li data-dcnode-id="363"><span data-dcnode-id="366" instrument_node="">I think our company is being investigated for </span><b data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">cooking the books.</span></b></li><li data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">Believe me, if you </span><b data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">cook the books</span></b><span data-dcnode-id="359" instrument_node=""> it will only get worse later on.</span></li></ul><p data-dcnode-id="355"><br data-dcnode-id="356"></p><p data-dcnode-id="351"><b data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">whip something up</span></b><span data-dcnode-id="352" instrument_node="">:&nbsp; To quickly prepare some food.</span></p><ul data-dcnode-id="335"><li data-dcnode-id="346"><span data-dcnode-id="350" instrument_node="">How did you </span><b data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">whip up dinner</span></b><span data-dcnode-id="347" instrument_node=""> so quickly?</span></li><li data-dcnode-id="341"><span data-dcnode-id="345" instrument_node="">I'd rather stay home and </span><b data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">whip up a simple meal</span></b><span data-dcnode-id="342" instrument_node=""> than waste money eating out again.</span></li><li data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">I'll meet you at the movies in 30 minutes.&nbsp; I'll just go home and </span><b data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">whip up a sandwich</span></b><span data-dcnode-id="337" instrument_node=""> and change clothes.</span></li></ul><p data-dcnode-id="333"><br data-dcnode-id="334"></p><p data-dcnode-id="329"><b data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">from scratch</span></b><span data-dcnode-id="330" instrument_node="">:&nbsp; To make something from basic ingredients.</span></p><ul data-dcnode-id="313"><li data-dcnode-id="324"><span data-dcnode-id="328" instrument_node="">I never have time to cook anything </span><b data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">from scratch</span></b><span data-dcnode-id="325" instrument_node=""> anymore—I just buy everything pre-made from the grocery store.</span></li><li data-dcnode-id="319"><span data-dcnode-id="323" instrument_node="">My date pretended that she made dinner </span><b data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">from scratch</span></b><span data-dcnode-id="320" instrument_node=""> but I saw the empty food containers in the trash can.</span></li><li data-dcnode-id="314"><span data-dcnode-id="318" instrument_node="">My children are always really happy when I bake cakes </span><b data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">from scratch</span></b><span data-dcnode-id="315" instrument_node="">. They definitely taste better than store-bought cakes.</span></li></ul><p data-dcnode-id="311"><br data-dcnode-id="312"></p><p data-dcnode-id="307"><b data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">butter someone up</span></b><span data-dcnode-id="308" instrument_node="">:&nbsp; To praise, flatter or be very nice to someone so they will do something you want.</span></p><ul data-dcnode-id="292"><li data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">Stop trying to </span><b data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">butter me up</span></b><span data-dcnode-id="303" instrument_node="">. I already told you that I'm not buying you a new iPhone.</span></li><li data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">It's embarrassing how Sandra keeps trying to </span><b data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">butter up our boss</span></b><span data-dcnode-id="298" instrument_node="">.&nbsp; She would be better off if she just did her work.</span></li><li data-dcnode-id="293"><span data-dcnode-id="296" instrument_node="">I have to admit I love it when my boyfriend </span><b data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">butters me up.</span></b></li></ul><p data-dcnode-id="290"><br data-dcnode-id="291"></p><p data-dcnode-id="286"><b data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">what's cooking/cookin'?</span></b><span data-dcnode-id="287" instrument_node="">:&nbsp; What's happening, what's new, what's going on?</span></p><p data-dcnode-id="282"><u data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Note</span></u><span data-dcnode-id="283" instrument_node="">: this is a very informal idiom and the final "g"&nbsp; is normally not pronounced ("cookin').</span></p><ul data-dcnode-id="267"><li data-dcnode-id="277"><span data-dcnode-id="281" instrument_node="">It's been so long since I've seen you! </span><b data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">What's cookin'</span></b><span data-dcnode-id="278" instrument_node="">?</span></li><li data-dcnode-id="273"><b data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">What's cooking</span></b><span data-dcnode-id="274" instrument_node="">&nbsp;tonight? Are we going to the club?</span></li><li data-dcnode-id="268"><span data-dcnode-id="272" instrument_node="">Welcome, come on in guys. </span><b data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">What's cooking</span></b><span data-dcnode-id="269" instrument_node="">?</span></li></ul><p data-dcnode-id="265"><br data-dcnode-id="266"></p><p data-dcnode-id="261"><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">cook up a storm</span></b><span data-dcnode-id="262" instrument_node="">:&nbsp; To enthusiastically and energetically cook a large amount of food</span></p><ul data-dcnode-id="245"><li data-dcnode-id="256"><span data-dcnode-id="260" instrument_node="">My husband's </span><b data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">cooking up a storm</span></b><span data-dcnode-id="257" instrument_node=""> again. Although I love it when he cooks, he makes a complete mess of the kitchen.</span></li><li data-dcnode-id="251"><span data-dcnode-id="255" instrument_node="">I hope you'll join us for the barbecue this weekend. My colleagues and I plan to </span><b data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">cook up a storm</span></b><span data-dcnode-id="252" instrument_node="">.</span></li><li data-dcnode-id="246"><span data-dcnode-id="250" instrument_node="">I'm exhausted after </span><b data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">cooking up a storm</span></b><span data-dcnode-id="247" instrument_node=""> all week for my relatives who were in town.</span></li></ul><p data-dcnode-id="243"><br data-dcnode-id="244"></p><p data-dcnode-id="237"><b data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">grill someone</span></b><span data-dcnode-id="239" style="font-weight: normal;"><span data-dcnode-id="240" instrument_node="">:</span></span><span data-dcnode-id="238" instrument_node="">&nbsp; To interrogate or intensely question someone in order to try to get a confession or answers.</span></p><ul data-dcnode-id="221"><li data-dcnode-id="232"><span data-dcnode-id="236" instrument_node="">My parents </span><b data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">keep grilling me</span></b><span data-dcnode-id="233" instrument_node=""> about what we did Saturday night but I keep telling them that we stayed at your house and watched movies.</span></li><li data-dcnode-id="227"><span data-dcnode-id="231" instrument_node="">Doesn't it annoy you that your boyfriend is always </span><b data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">grilling you</span></b><span data-dcnode-id="228" instrument_node=""> about what you do when you're apart?</span></li><li data-dcnode-id="222"><span data-dcnode-id="226" instrument_node="">The principal tried to </span><b data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">grill my son</span></b><span data-dcnode-id="223" instrument_node=""> about which students painted graffiti on the school's front door but my son would rather get expelled than lose his friends.</span></li></ul><p data-dcnode-id="219"><br data-dcnode-id="220"></p><span data-dcnode-id="218" instrument_node="">
