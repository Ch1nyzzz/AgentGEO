</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">These medical health idioms are popular English expressions used in everyday conversation. Before we get into the definitions and examples, let's review exactly what an idiom is:</span></p><p data-dcnode-id="449"><span data-dcnode-id="456" instrument_node="">An&nbsp;</span><b data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">idiom</span></b><span data-dcnode-id="453" instrument_node="">&nbsp;is a </span><b data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">group of words</span></b><span data-dcnode-id="450" instrument_node=""> that have a fixed meaning that is different than if you looked up the words separately in the dictionary.&nbsp;</span></p><span data-dcnode-id="448" instrument_node="">

</span><h2 data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">More sentence examples</span></h2><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Let's look at additional sentence examples which will help you more easily remember these idioms. You can write your own sentence examples in the comments below for practice.</span></p><p data-dcnode-id="431"><br data-dcnode-id="432"></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="426"><b data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">go under the knife:</span></b><span data-dcnode-id="427" instrument_node="">&nbsp; to have a surgical operation.</span></p><p data-dcnode-id="418"><span data-dcnode-id="425" instrument_node="">—&nbsp;</span><span data-dcnode-id="423" style="background-color: initial;"><span data-dcnode-id="424" instrument_node="">Your grandfather is </span></span><b data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">going under the knife</span></b><span data-dcnode-id="419" style="background-color: initial;"><span data-dcnode-id="420" instrument_node=""> tomorrow so we all need to be at the hospital to support your grandmother.</span></span></p><p data-dcnode-id="410"><span data-dcnode-id="417" instrument_node="">—&nbsp;</span><span data-dcnode-id="415" style="background-color: initial;"><span data-dcnode-id="416" instrument_node="">I don't understand how people </span></span><b data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">go under the knife</span></b><span data-dcnode-id="411" style="background-color: initial;"><span data-dcnode-id="412" instrument_node=""> for really risky cosmetic procedures.</span></span></p><p data-dcnode-id="402"><span data-dcnode-id="409" instrument_node="">—&nbsp;</span><span data-dcnode-id="407" style="background-color: initial;"><span data-dcnode-id="408" instrument_node="">I'm going to age gracefully with wrinkles and moles rather than </span></span><b data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">go under the knife</span></b><span data-dcnode-id="403" style="background-color: initial;"><span data-dcnode-id="404" instrument_node="">.</span></span></p><br data-dcnode-id="401"><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="396"><b data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">at death's door:</span></b><span data-dcnode-id="397" instrument_node="">&nbsp; to be very close to death.</span></p><p data-dcnode-id="388"><span data-dcnode-id="395" instrument_node="">—&nbsp;</span><span data-dcnode-id="393" style="background-color: initial;"><span data-dcnode-id="394" instrument_node="">I arrived at the scene of the crash just at the time my brother was&nbsp;</span></span><b data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">at death's door</span></b><span data-dcnode-id="389" style="background-color: initial;"><span data-dcnode-id="390" instrument_node="">&nbsp;and held his hand and prayed with him before he passed away.</span></span></p><p data-dcnode-id="380"><span data-dcnode-id="387" instrument_node="">—&nbsp;</span><span data-dcnode-id="385" style="background-color: initial;"><span data-dcnode-id="386" instrument_node="">It was miraculous that the little girl fully recovered because she was&nbsp;</span></span><b data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">at death's door</span></b><span data-dcnode-id="381" style="background-color: initial;"><span data-dcnode-id="382" instrument_node="">&nbsp;with sepsis and pneumonia.</span></span></p><p data-dcnode-id="372"><span data-dcnode-id="379" instrument_node="">—&nbsp;</span><span data-dcnode-id="377" style="background-color: initial;"><span data-dcnode-id="378" instrument_node="">Please call for the priest. My husband is&nbsp;</span></span><b data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">at death's door</span></b><span data-dcnode-id="373" style="background-color: initial;"><span data-dcnode-id="374" instrument_node="">.</span></span></p><p data-dcnode-id="370"><br data-dcnode-id="371"></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="365"><b data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">a taste of one's own medicine:</span></b><span data-dcnode-id="366" instrument_node="">&nbsp; the same unpleasant, unkind or harmful treatment that one's given to others.</span></p><p data-dcnode-id="357"><span data-dcnode-id="364" instrument_node="">—&nbsp;</span><span data-dcnode-id="362" style="background-color: initial;"><span data-dcnode-id="363" instrument_node="">She's so slow working at the post office.&nbsp; Having to wait in line in immigration will give her&nbsp;</span></span><b data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">a taste of her own medicine</span></b><span data-dcnode-id="358" style="background-color: initial;"><span data-dcnode-id="359" instrument_node="">.</span></span></p><p data-dcnode-id="349"><span data-dcnode-id="356" instrument_node="">—&nbsp;</span><span data-dcnode-id="354" style="background-color: initial;"><span data-dcnode-id="355" instrument_node="">She always teases everyone and now that her father is in jail she's getting&nbsp;</span></span><b data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">a taste of her own medicine</span></b><span data-dcnode-id="350" style="background-color: initial;"><span data-dcnode-id="351" instrument_node="">.</span></span></p><p data-dcnode-id="341"><span data-dcnode-id="348" instrument_node="">—&nbsp;</span><span data-dcnode-id="346" style="background-color: initial;"><span data-dcnode-id="347" instrument_node="">I used to write rude comments on Instagram but I got&nbsp;</span></span><b data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">a taste of my own medicine</span></b><span data-dcnode-id="342" style="background-color: initial;"><span data-dcnode-id="343" instrument_node="">&nbsp;when I created my own account and strangers criticized me.</span></span></p><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="335"><b data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">just what the doctor ordered:</span></b><span data-dcnode-id="336" instrument_node="">&nbsp; exactly what is wanted or needed to improve a situation.</span></p><p data-dcnode-id="327"><span data-dcnode-id="334" instrument_node="">—&nbsp;</span><span data-dcnode-id="332" style="background-color: initial;"><span data-dcnode-id="333" instrument_node="">Thanks so much for this cold beer—</span></span><b data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">it's just what the doctor ordered</span></b><span data-dcnode-id="328" style="background-color: initial;"><span data-dcnode-id="329" instrument_node="">.</span></span></p><p data-dcnode-id="319"><span data-dcnode-id="326" instrument_node="">—&nbsp;</span><span data-dcnode-id="324" style="background-color: initial;"><span data-dcnode-id="325" instrument_node="">My kids just left for three weeks of camp and </span></span><b data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">it's just what the doctor ordered</span></b><span data-dcnode-id="320" style="background-color: initial;"><span data-dcnode-id="321" instrument_node="">.</span></span></p><p data-dcnode-id="311"><span data-dcnode-id="318" instrument_node="">—&nbsp;</span><span data-dcnode-id="316" style="background-color: initial;"><span data-dcnode-id="317" instrument_node="">This beach vacation is </span></span><b data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">just what the doctor ordered</span></b><span data-dcnode-id="312" style="background-color: initial;"><span data-dcnode-id="313" instrument_node="">.</span></span></p><br data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="305"><b data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">take a turn for the worse:</span></b><span data-dcnode-id="306" instrument_node="">&nbsp; to get worse (sicker), often suddenly.</span></p><p data-dcnode-id="297"><span data-dcnode-id="304" instrument_node="">—&nbsp;</span><span data-dcnode-id="302" style="background-color: initial;"><span data-dcnode-id="303" instrument_node="">Unfortunately, I had to put my dog to sleep because he&nbsp;</span></span><b data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">took a turn for the worse</span></b><span data-dcnode-id="298" style="background-color: initial;"><span data-dcnode-id="299" instrument_node="">&nbsp;and I didn't want him to suffer anymore.</span></span></p><p data-dcnode-id="289"><span data-dcnode-id="296" instrument_node="">—&nbsp;</span><span data-dcnode-id="294" style="background-color: initial;"><span data-dcnode-id="295" instrument_node="">My uncle&nbsp;</span></span><b data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">took a turn for the worse</span></b><span data-dcnode-id="290" style="background-color: initial;"><span data-dcnode-id="291" instrument_node="">&nbsp;last night so we're headed to the hospital to see him.</span></span></p><p data-dcnode-id="281"><span data-dcnode-id="288" instrument_node="">—&nbsp;</span><span data-dcnode-id="286" style="background-color: initial;"><span data-dcnode-id="287" instrument_node="">Even when you&nbsp;</span></span><b data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">took a turn for the worse</span></b><span data-dcnode-id="282" style="background-color: initial;"><span data-dcnode-id="283" instrument_node="">&nbsp;and went into a coma, I never lost hope you'd fully recover one day.</span></span></p><br data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="275"><b data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">on the mend:</span></b><span data-dcnode-id="276" instrument_node="">&nbsp; in the process of healing and becoming well again.</span></p><p data-dcnode-id="267"><span data-dcnode-id="274" instrument_node="">—&nbsp;</span><span data-dcnode-id="272" style="background-color: initial;"><span data-dcnode-id="273" instrument_node="">I'm finally in physical therapy and </span></span><b data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">on the mend</span></b><span data-dcnode-id="268" style="background-color: initial;"><span data-dcnode-id="269" instrument_node="">.</span></span></p><p data-dcnode-id="259"><span data-dcnode-id="266" instrument_node="">—&nbsp;</span><span data-dcnode-id="264" style="background-color: initial;"><span data-dcnode-id="265" instrument_node="">We were so happy to hear that your father is back home now and </span></span><b data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">on the mend</span></b><span data-dcnode-id="260" style="background-color: initial;"><span data-dcnode-id="261" instrument_node="">.</span></span></p><p data-dcnode-id="251"><span data-dcnode-id="258" instrument_node="">—&nbsp;</span><span data-dcnode-id="256" style="background-color: initial;"><span data-dcnode-id="257" instrument_node="">Don't worry.&nbsp; It's a minor procedure and you'll be </span></span><b data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">on the mend</span></b><span data-dcnode-id="252" style="background-color: initial;"><span data-dcnode-id="253" instrument_node=""> within a week.</span></span></p><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">
