</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">These driving idioms are frequently used in informal English. Learning them will help your English sound more natural too. Let's first review what an idiom is:&nbsp; Idioms are fixed phrases—that means you can't change or substitute other words—and the meaning is metaphorical rather than literal.&nbsp;</span></p><p data-dcnode-id="537"><br data-dcnode-id="538"></p><span data-dcnode-id="536" instrument_node="">

</span><h2 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">More examples of these driving idioms</span></h2><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="522" instrument_node="">Here are a few more examples to help make the meaning of these driving idioms even clearer:</span><br data-dcnode-id="521"></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="513"><b data-dcnode-id="515"><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oysterenglish.com/idiom-in-the-drivers-seat.html"><span data-dcnode-id="518" instrument_node="">in the driver's seat</span></a><span data-dcnode-id="516" instrument_node="">:&nbsp;&nbsp;</span></b><span data-dcnode-id="514" instrument_node="">in control or in charge of a situation</span></p><p data-dcnode-id="505"><span data-dcnode-id="512" instrument_node="">—&nbsp;</span><span data-dcnode-id="510" style="background-color: initial;"><span data-dcnode-id="511" instrument_node="">You always want to be&nbsp;</span></span><b data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">in the driver's sea</span></b><span data-dcnode-id="506" style="background-color: initial;"><span data-dcnode-id="507" instrument_node="">t in this marriage and what you don't understand is that we should be more like copilots in a partnership.</span></span></p><p data-dcnode-id="497"><span data-dcnode-id="504" instrument_node="">—&nbsp;</span><span data-dcnode-id="502" style="background-color: initial;"><span data-dcnode-id="503" instrument_node="">Who's overseeing this project? Everyone can't be&nbsp;</span></span><b data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">in the driver's seat</span></b><span data-dcnode-id="498" style="background-color: initial;"><span data-dcnode-id="499" instrument_node="">&nbsp;at the same time.</span></span></p><p data-dcnode-id="495"><br data-dcnode-id="496"></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="487"><b data-dcnode-id="491"><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oysterenglish.com/idiom-drive-yourself-into-the-ground.html"><span data-dcnode-id="493" instrument_node="">drive yourself into the ground:</span></a></b><span data-dcnode-id="489" style="background-color: initial;"><span data-dcnode-id="490" instrument_node="">&nbsp; to work so hard that you become sick or exhausted.</span></span><br data-dcnode-id="488"></p><p data-dcnode-id="479"><span data-dcnode-id="486" instrument_node="">—&nbsp;</span><span data-dcnode-id="484" style="background-color: initial;"><span data-dcnode-id="485" instrument_node="">If you keep working so much overtime you're going to&nbsp;</span></span><b data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">drive yourself into the ground</span></b><span data-dcnode-id="480" style="background-color: initial;"><span data-dcnode-id="481" instrument_node="">.</span></span></p><p data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">—&nbsp;</span><span data-dcnode-id="476" style="background-color: initial;"><span data-dcnode-id="477" instrument_node="">I'm really worried about my father. The last time he&nbsp;</span></span><b data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">drove himself into the ground</span></b><span data-dcnode-id="472" style="background-color: initial;"><span data-dcnode-id="473" instrument_node="">&nbsp;he had a heart attack.</span></span></p><p data-dcnode-id="463"><span data-dcnode-id="470" instrument_node="">—&nbsp;</span><span data-dcnode-id="468" style="background-color: initial;"><span data-dcnode-id="469" instrument_node="">You're sick so often because you continue to&nbsp;</span></span><b data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">drive yourself into the ground</span></b><span data-dcnode-id="464" style="background-color: initial;"><span data-dcnode-id="465" instrument_node="">&nbsp;with all this volunteer work. You really need to get more sleep.</span></span></p><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="457"><b data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">shift gears:</span></b><span data-dcnode-id="458" instrument_node="">&nbsp; to quickly or suddenly change what you're doing or thinking (often when handling a challenge a problem)</span></p><p data-dcnode-id="449"><span data-dcnode-id="456" instrument_node="">—&nbsp;</span><span data-dcnode-id="454" style="background-color: initial;"><span data-dcnode-id="455" instrument_node="">This afternoon we'll&nbsp;</span></span><b data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">switch gears</span></b><span data-dcnode-id="450" style="background-color: initial;"><span data-dcnode-id="451" instrument_node="">&nbsp;and break into small groups to discuss how to implement these proposals.</span></span></p><p data-dcnode-id="441"><span data-dcnode-id="448" instrument_node="">—&nbsp;</span><span data-dcnode-id="446" style="background-color: initial;"><span data-dcnode-id="447" instrument_node="">The beginning of the book is a bit boring but the story&nbsp;</span></span><b data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">shift gears</span></b><span data-dcnode-id="442" style="background-color: initial;"><span data-dcnode-id="443" instrument_node="">&nbsp;in the third chapter and gets really interesting when the main character loses her job and travels to Africa.</span></span></p><p data-dcnode-id="439"><br data-dcnode-id="440"></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430"><b data-dcnode-id="434"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oysterenglish.com/idiom-drive-someone-crazy.html"><span data-dcnode-id="437" instrument_node="">drive (someone) crazy</span></a><span data-dcnode-id="435" instrument_node="">:</span></b><span data-dcnode-id="432" style="background-color: initial;"><span data-dcnode-id="433" instrument_node="">&nbsp; to greatly annoy or irritate someone.</span></span><br data-dcnode-id="431"></p><p data-dcnode-id="422"><span data-dcnode-id="429" instrument_node="">—&nbsp;</span><span data-dcnode-id="427" style="background-color: initial;"><span data-dcnode-id="428" instrument_node="">These commercials are&nbsp;</span></span><b data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">driving me crazy</span></b><span data-dcnode-id="423" style="background-color: initial;"><span data-dcnode-id="424" instrument_node="">. I wish I could watch the game without interruptions every two minutes.</span></span></p><p data-dcnode-id="414"><span data-dcnode-id="421" instrument_node="">—&nbsp;</span><span data-dcnode-id="419" style="background-color: initial;"><span data-dcnode-id="420" instrument_node="">What are our neighbors doing upstairs? The noise is&nbsp;</span></span><b data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">driving me crazy</span></b><span data-dcnode-id="415" style="background-color: initial;"><span data-dcnode-id="416" instrument_node="">.</span></span></p><p data-dcnode-id="412"><br data-dcnode-id="413"></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="407"><b data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">asleep at the wheel:</span></b><span data-dcnode-id="408" instrument_node="">&nbsp; not doing or paying attention to problems or something that's important.</span></p><p data-dcnode-id="399"><span data-dcnode-id="406" instrument_node="">—&nbsp;</span><span data-dcnode-id="404" style="background-color: initial;"><span data-dcnode-id="405" instrument_node="">We're out of photocopier toner and paper and I need to print a report. Whoever's ordering office supplies is&nbsp;</span></span><b data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">asleep at the wheel</span></b><span data-dcnode-id="400" style="background-color: initial;"><span data-dcnode-id="401" instrument_node="">&nbsp;again.</span></span></p><p data-dcnode-id="391"><span data-dcnode-id="398" instrument_node="">—&nbsp;</span><span data-dcnode-id="396" style="background-color: initial;"><span data-dcnode-id="397" instrument_node="">I fired my secretary because she&nbsp;</span></span><b data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">fell asleep at the wheel</span></b><span data-dcnode-id="392" style="background-color: initial;"><span data-dcnode-id="393" instrument_node="">&nbsp;and forgot to purchase my ticket to Friday's conference so I had to buy one at the last minute for $3,500.</span></span></p><br data-dcnode-id="390"><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="383"><b data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">drive to distraction:&nbsp;</span></b><span data-dcnode-id="385" style="background-color: initial;"><span data-dcnode-id="386" instrument_node="">&nbsp;to confuse or distract someone so they can't focus; to greatly annoy or frustrate someone.</span></span><br data-dcnode-id="384"></p><p data-dcnode-id="375"><span data-dcnode-id="382" instrument_node="">—&nbsp;</span><span data-dcnode-id="380" style="background-color: initial;"><span data-dcnode-id="381" instrument_node="">This construction is&nbsp;</span></span><b data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">driving me to distraction</span></b><span data-dcnode-id="376" style="background-color: initial;"><span data-dcnode-id="377" instrument_node="">. I'm going to work at the café for a while.&nbsp;</span></span></p><p data-dcnode-id="367"><span data-dcnode-id="374" instrument_node="">—&nbsp;</span><span data-dcnode-id="372" style="background-color: initial;"><span data-dcnode-id="373" instrument_node="">There's a beautiful girl in our chemistry class and she's&nbsp;</span></span><b data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">driving everyone to distraction</span></b><span data-dcnode-id="368" style="background-color: initial;"><span data-dcnode-id="369" instrument_node="">.</span></span></p><p data-dcnode-id="359"><span data-dcnode-id="366" instrument_node="">—&nbsp;</span><span data-dcnode-id="364" style="background-color: initial;"><span data-dcnode-id="365" instrument_node="">I hate it when people wear perfume to the theater—it honestly&nbsp;</span></span><b data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">drives me to distraction</span></b><span data-dcnode-id="360" style="background-color: initial;"><span data-dcnode-id="361" instrument_node="">.</span></span></p><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="351"><b data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">drive at something</span></b><span data-dcnode-id="353" style="background-color: initial;"><span data-dcnode-id="354" instrument_node="">:&nbsp; what someone is really trying to say or suggest</span></span><br data-dcnode-id="352"></p><p data-dcnode-id="343"><span data-dcnode-id="350" instrument_node="">—&nbsp;</span><span data-dcnode-id="348" style="background-color: initial;"><span data-dcnode-id="349" instrument_node="">Did you notice what her mother was&nbsp;</span></span><b data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">driving at</span></b><span data-dcnode-id="344" style="background-color: initial;"><span data-dcnode-id="345" instrument_node="">&nbsp;when she asked where your father graduated from school?</span></span></p><p data-dcnode-id="335"><span data-dcnode-id="342" instrument_node="">—&nbsp;</span><span data-dcnode-id="340" style="background-color: initial;"><span data-dcnode-id="341" instrument_node="">I have no idea what the district manager was&nbsp;</span></span><b data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">driving at</span></b><span data-dcnode-id="336" style="background-color: initial;"><span data-dcnode-id="337" instrument_node="">&nbsp;this morning at the sales meeting. Do you?</span></span></p><p data-dcnode-id="327"><span data-dcnode-id="334" instrument_node="">—&nbsp;</span><span data-dcnode-id="332" style="background-color: initial;"><span data-dcnode-id="333" instrument_node="">What we're&nbsp;</span></span><b data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">driving at</span></b><span data-dcnode-id="328" style="background-color: initial;"><span data-dcnode-id="329" instrument_node="">&nbsp;is that we prefer a more classic and traditional style.</span></span></p><br data-dcnode-id="326"><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="319"><b data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">middle of the road:&nbsp;</span></b><span data-dcnode-id="321" style="background-color: initial;"><span data-dcnode-id="322" instrument_node="">&nbsp;not controversial, moderate, liked by most people</span></span><br data-dcnode-id="320"></p><p data-dcnode-id="311"><span data-dcnode-id="318" instrument_node="">—&nbsp;</span><span data-dcnode-id="316" style="background-color: initial;"><span data-dcnode-id="317" instrument_node="">My youngest daughter never does anything&nbsp;</span></span><b data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">middle of the road</span></b><span data-dcnode-id="312" style="background-color: initial;"><span data-dcnode-id="313" instrument_node="">&nbsp;so I'm not surprised you were shocked when you met her.</span></span></p><p data-dcnode-id="303"><span data-dcnode-id="310" instrument_node="">—&nbsp;</span><span data-dcnode-id="308" style="background-color: initial;"><span data-dcnode-id="309" instrument_node="">I really need to get back to New York City where there's some excitement; living in the suburbs is so&nbsp;</span></span><b data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">middle of the road</span></b><span data-dcnode-id="304" style="background-color: initial;"><span data-dcnode-id="305" instrument_node="">.</span></span></p><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="295"><b data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">third wheel:&nbsp;</span></b><span data-dcnode-id="297" style="background-color: initial;"><span data-dcnode-id="298" instrument_node="">&nbsp;someone who tags along with a couple</span></span><br data-dcnode-id="296"></p><p data-dcnode-id="291"><span data-dcnode-id="294" instrument_node="">—&nbsp;</span><span data-dcnode-id="292" style="background-color: initial;"><span data-dcnode-id="293" instrument_node="">Is there any way we can go out alone tonight?</span></span></p><p data-dcnode-id="283"><span data-dcnode-id="290" instrument_node="">—&nbsp;</span><span data-dcnode-id="288" style="background-color: initial;"><span data-dcnode-id="289" instrument_node="">I'm tired of your little brother always being the&nbsp;</span></span><b data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">third wheel</span></b><span data-dcnode-id="284" style="background-color: initial;"><span data-dcnode-id="285" instrument_node="">.&nbsp;</span></span></p><p data-dcnode-id="275"><span data-dcnode-id="282" instrument_node="">—&nbsp;</span><span data-dcnode-id="280" style="background-color: initial;"><span data-dcnode-id="281" instrument_node="">I really hate being the&nbsp;</span></span><b data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">third wheel</span></b><span data-dcnode-id="276" style="background-color: initial;"><span data-dcnode-id="277" instrument_node="">&nbsp;but it's better than staying alone at home every weekend.</span></span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="268"><b data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">my way or the highway:&nbsp;</span></b><span data-dcnode-id="270" style="background-color: initial;"><span data-dcnode-id="271" instrument_node="">&nbsp;used to say someone else has to agree with you (or leave) because there's no other choice</span></span><br data-dcnode-id="269"></p><p data-dcnode-id="260"><span data-dcnode-id="267" instrument_node="">—&nbsp;</span><span data-dcnode-id="265" style="background-color: initial;"><span data-dcnode-id="266" instrument_node="">I'm sorry that you don't like doing chores but until you turn 18 and move out of the house it's </span></span><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">my way or the highway</span></b><span data-dcnode-id="261" style="background-color: initial;"><span data-dcnode-id="262" instrument_node="">.</span></span></p><p data-dcnode-id="252"><span data-dcnode-id="259" instrument_node="">—&nbsp;</span><span data-dcnode-id="257" style="background-color: initial;"><span data-dcnode-id="258" instrument_node="">I told my wife that I'm willing to compromise on a lot of things but for our next vacation it's going to be </span></span><b data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">my way or the highway</span></b><span data-dcnode-id="253" style="background-color: initial;"><span data-dcnode-id="254" instrument_node="">.</span></span></p><p data-dcnode-id="250"><br data-dcnode-id="251"></p><span data-dcnode-id="249" instrument_node="">
