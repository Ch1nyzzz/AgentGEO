</span><article class="post-19020 post type-post status-publish format-standard has-post-thumbnail hentry category-flower-facts tag-language-of-flowers" data-dcnode-id="658" id="post-19020"><span data-dcnode-id="927" instrument_node="">
</span><span data-dcnode-id="924" instrument_node="">
</span><div class="post-header" data-dcnode-id="912"><span data-dcnode-id="923" instrument_node="">
</span><span class="cat" data-dcnode-id="920"><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.1800flowers.com/blog/flower-facts/" title="View all posts in Fun Flower Facts"><span data-dcnode-id="922" instrument_node="">Fun Flower Facts</span></a></span><span data-dcnode-id="919" instrument_node="">
</span><h1 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Flower Idioms: The Meaning Behind Our Favorite Floral Phrases and Sayings</span></h1><span data-dcnode-id="916" instrument_node="">
</span><span class="date" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">August 3, 2021</span></span><span data-dcnode-id="913" instrument_node="">
</span></div><span data-dcnode-id="911" instrument_node="">
</span><div class="post-entry" data-dcnode-id="806"><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">From tulips to chrysanthemums, our series “The Language of Flowers” explores everything from flower care tips to flower symbolism and meaning.</span></em></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">When it comes to phrases that live at the tip of our tongues, we’re sure you’ve got some personal favorites that are the bee knees and sound as pretty as a peach. But being florists and all, we’re pretty partial to floral phrases — can you blame us? This season, why not add some of our favorite phrases and sayings into your vocabulary?</span></p><span data-dcnode-id="903" instrument_node="">
</span><h3 data-dcnode-id="901" id="h-stop-and-smell-the-roses"><span data-dcnode-id="902" instrument_node="">“Stop and smell the roses”</span></h3><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Feeling overwhelmed? Stressed? Overworked? If so, it may be time to “stop and smell the </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.1800flowers.com/roses" rel="noopener" target="_blank" title="Send roses from 1800flowers.com"><span data-dcnode-id="898" instrument_node="">roses</span></a><span data-dcnode-id="896" instrument_node="">.” This means it’s time to break away from your hectic schedule and take a minute to enjoy the little things in life and the beauty of nature. And while there’s no denying that we love the expression, studies show there is some scientific truth behind it! Spending time outdoors among nature has been shown to reduce anxiety and depression.</span></p><div class="wp-block-image" data-dcnode-id="890"><figure class="aligncenter size-full" data-dcnode-id="891"><img alt="" class="wp-image-19114 entered error" data-dcnode-id="894" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose.jpg" data-lazy-srcset="https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose.jpg 900w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-300x200.jpg 300w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-768x512.jpg 768w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-440x294.jpg 440w" data-ll-status="error" height="600" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose.jpg&amp;raw" srcset="https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose.jpg 900w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-300x200.jpg 300w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-768x512.jpg 768w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-440x294.jpg 440w" width="900"><noscript data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">&lt;img width="900" height="600" src="https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose.jpg" alt="" class="wp-image-19114" srcset="https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose.jpg 900w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-300x200.jpg 300w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-768x512.jpg 768w, https://www.1800flowers.com/blog/wp-content/uploads/2018/03/smell-a-rose-440x294.jpg 440w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></figure></div><h3 data-dcnode-id="888" id="h-coming-up-roses"><span data-dcnode-id="889" instrument_node="">“Coming up roses”</span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">If everything in your life is “coming up roses,” count your lucky stars because things are going pretty well for you! Though the exact origin of the phrase is still unknown, it became popular in the 1950s after being </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lyrics.com/lyric/15049470/Rosemary%2BClooney/Everything%2527s%2BComing%2BUp%2BRoses%2B%255BFrom%2BGypsy%255D%255B%252A%255D" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="885" instrument_node="">used in a song</span></a><span data-dcnode-id="883" instrument_node=""> from the musical Gypsy. One line of the song reads, “Things look swell, things look great, Gonna have the whole world on a plate. Starting here, starting now. Honey, everything’s coming up roses.”</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="879" id="h-ups-a-daisy"><span data-dcnode-id="880" instrument_node="">“Ups-a-Daisy”</span></h3><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">Though most of us today would say “whoops-a-</span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.1800flowers.com/daisies" rel="noopener" target="_blank" title="Send daisies from 1800flowers.com"><span data-dcnode-id="876" instrument_node="">daisy</span></a><span data-dcnode-id="874" instrument_node="">” or “oopsy daisy” the phrase was originally “ups-a-daisy” and was used in the 1800s to encourage little ones to get up after they had fallen.</span></p><span data-dcnode-id="872" instrument_node="">
</span><h3 data-dcnode-id="870" id="h-pushing-daisies"><span data-dcnode-id="871" instrument_node="">“Pushing daisies”</span></h3><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">Though much more somber than many other expressions on our list, “pushing daisies” usually refers to a person who has passed away. Though it’s not certain that this is where the phrase originated from, it’s believed to have at least gained its popularity from a </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.poetryfoundation.org/poems/57284/a-terre" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="867" instrument_node="">World War I poem, titled, A Terre</span></a><span data-dcnode-id="865" instrument_node="">. Below is a passage from the poem:</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="862" instrument_node="">Certainly</span><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node=""> flowers have the easiest time on earth.</span></em><br data-dcnode-id="859"><em data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">“I shall be one with nature, herb, and stone.”</span></em><br data-dcnode-id="856"><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Shelley would tell me. Shelley would be stunned;</span></em><br data-dcnode-id="853"><em data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">The dullest Tommy hugs that fancy now.</span></em><br data-dcnode-id="850"><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">“Pushing up daisies,” is their creed, you know.</span></em><br data-dcnode-id="847"><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">To grain, then, go my fat, to buds my sap,</span></em><br data-dcnode-id="844"><em data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">For all the usefulness there is in soap.</span></em></p><span data-dcnode-id="840" instrument_node="">
</span><h3 data-dcnode-id="838" id="h-fresh-as-a-daisy"><span data-dcnode-id="839" instrument_node="">“Fresh as a daisy”</span></h3><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">If someone tells you you’re looking “fresh as a daisy,” it’s a high compliment and means you’re looking very good that day. The expression stems from the Old English word for daisies which was “day’s eye.” At night, the petals of a daisy would close over its yellow “eye” and then re-open in the morning once the sun was out. So when someone says you look “fresh as a daisy” they’re implying that it looks like you got a good night’s sleep.</span></p><span data-dcnode-id="834" instrument_node="">
</span><h3 data-dcnode-id="832" id="h-nip-it-in-the-bud"><span data-dcnode-id="833" instrument_node="">“Nip it in the bud”</span></h3><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Do you bite your nails, chew with your mouth open, or love drinking soda? If so, you may want to nip those bad habits in the bud before they get out of control. While most of us use the expression in the context of ending bad habits, it literally means to end something at an early stage. If you remove, or “nip,” a bud from a plant, it prevents the flower from blooming.</span></p><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="826" id="h-every-rose-has-its-thorns"><span data-dcnode-id="827" instrument_node="">“Every Rose has its Thorns”</span></h3><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Though made famous by the band Poison in 1988, the phrase “every rose has its thorns” is an ancient proverb with no known origin. In general, it means that even someone as beautiful and seemingly perfect as a rose is not without their flaws.</span></p><span data-dcnode-id="822" instrument_node="">
