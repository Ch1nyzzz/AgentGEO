graphy-displayBlock" data-dcnode-id="678" title="Examples of Idioms"><span data-dcnode-id="679" instrument_node="">Examples of Idioms</span></span></div></a><a class="MuiListItem-root MuiListItem-gutters" data-dcnode-id="672" href="#why-writers-use-idioms"><div class="MuiListItemText-root jss490" data-dcnode-id="673"><span class="MuiTypography-root MuiListItemText-primary MuiTypography-body2 MuiTypography-colorTextSecondary MuiTypography-noWrap MuiTypography-displayBlock" data-dcnode-id="674" title="Why Writers Use Idioms"><span data-dcnode-id="675" instrument_node="">Why Writers Use Idioms</span></span></div></a><a class="MuiListItem-root MuiListItem-gutters" data-dcnode-id="668" href="#idioms-nbsp-and-other-literary-devices"><div class="MuiListItemText-root jss490" data-dcnode-id="669"><span class="MuiTypography-root MuiListItemText-primary MuiTypography-body2 MuiTypography-colorTextSecondary MuiTypography-noWrap MuiTypography-displayBlock" data-dcnode-id="670" title="Idioms&amp;nbsp;and Other Literary Devices"><span data-dcnode-id="671" instrument_node="">Idioms&amp;nbsp;and Other Literary Devices</span></span></div></a><a class="MuiListItem-root MuiListItem-gutters" data-dcnode-id="664" href="#examples-in-literature"><div class="MuiListItemText-root jss490" data-dcnode-id="665"><span class="MuiTypography-root MuiListItemText-primary MuiTypography-body2 MuiTypography-colorTextSecondary MuiTypography-noWrap MuiTypography-displayBlock" data-dcnode-id="666" title="Examples in Literature"><span data-dcnode-id="667" instrument_node="">Examples in Literature</span></span></div></a><a class="MuiListItem-root MuiListItem-gutters" data-dcnode-id="660" href="#further-resources-on-idioms"><div class="MuiListItemText-root jss490" data-dcnode-id="661"><span class="MuiTypography-root MuiListItemText-primary MuiTypography-body2 MuiTypography-colorTextSecondary MuiTypography-noWrap MuiTypography-displayBlock" data-dcnode-id="662" title="Further Resources on Idioms"><span data-dcnode-id="663" instrument_node="">Further Resources on Idioms</span></span></div></a><a class="MuiListItem-root MuiListItem-gutters" data-dcnode-id="656" href="#related-terms"><div class="MuiListItemText-root jss490" data-dcnode-id="657"><span class="MuiTypography-root MuiListItemText-primary MuiTypography-body2 MuiTypography-colorTextSecondary MuiTypography-noWrap MuiTypography-displayBlock" data-dcnode-id="658" title="Related Terms"><span data-dcnode-id="659" instrument_node="">Related Terms</span></span></div></a></div></div><div class="MuiGrid-root jss483 css-xg50o9 MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-8" data-dcnode-id="97"><div data-dcnode-id="613" id="idiom-definition"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="614"><h2 data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Idiom Definition</span></h2><p data-dcnode-id="650"><br data-dcnode-id="651"></p><p data-dcnode-id="642"><span data-dcnode-id="649" instrument_node="">An&nbsp;</span><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">idiom</span></em><span data-dcnode-id="646" instrument_node="">&nbsp;(ID-ee-uhm) is an expression with a figurative or metaphorical meaning that differs from its literal meaning. Put another way, idioms don’t mean exactly what they say. The phrase&nbsp;</span><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">turn over a new leaf</span></em><span data-dcnode-id="643" instrument_node="">&nbsp;has nothing to do with flipping leaves; it means starting over, adopting a new attitude or behavior.</span></p><p data-dcnode-id="640"><br data-dcnode-id="641"></p><p data-dcnode-id="632"><span data-dcnode-id="639" instrument_node="">Idioms tend to be specific to a region, culture, or language. Understanding idioms from another country often requires familiarity with that culture. You can translate a French idiom to English, but literal translation can’t convey the figurative expression.</span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">&nbsp;La moutarde lui monte au nez</span></em><span data-dcnode-id="636" instrument_node="">&nbsp;is a common French idiom that means “mustard goes up his nose”—which doesn’t mean much to an American. An equivalent English idiom would be&nbsp;</span><em data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">blow a fuse</span></em><span data-dcnode-id="633" instrument_node="">, which means to lose your temper.</span></p><p data-dcnode-id="621"><span data-dcnode-id="631" instrument_node="">The word&nbsp;</span><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">idiom</span></em><span data-dcnode-id="628" instrument_node="">&nbsp;stems from the Latin&nbsp;</span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">idioma</span></em><span data-dcnode-id="625" instrument_node="">, meaning “a peculiarity in language,” and the Greek&nbsp;</span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">idiōma</span></em><span data-dcnode-id="622" instrument_node="">, meaning “peculiar phraseology.”</span></p><p data-dcnode-id="619"><br data-dcnode-id="620"></p><p data-dcnode-id="617"><br data-dcnode-id="618"></p><p data-dcnode-id="615"><br data-dcnode-id="616"></p></div></div><div data-dcnode-id="518" id="examples-of-idioms"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="519"><h2 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Examples of Idioms</span></h2><p data-dcnode-id="609"><br data-dcnode-id="610"></p><p data-dcnode-id="604"><span data-dcnode-id="608" instrument_node="">Idioms are as a subset of&nbsp;</span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/colloquialism/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="607" instrument_node="">colloquialism</span></a><span data-dcnode-id="605" instrument_node="">, which is an informal or conversational style of language that characterizes verbal speech. They are fixed phrases made of up two or more words. Idioms have very exact phrasing to achieve the intended effect; changed or modified idioms lose their inherent meaning.</span></p><p data-dcnode-id="602"><br data-dcnode-id="603"></p><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">There are thousands of idioms in the English language. These are some of the most common, used in context.</span></p><p data-dcnode-id="598"><br data-dcnode-id="599"></p><p data-dcnode-id="596"><br data-dcnode-id="597"></p><p data-dcnode-id="594"><br data-dcnode-id="595"></p><ul data-dcnode-id="553"><li data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">“Researchers had to&nbsp;</span><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">jump through hoops</span></strong><span data-dcnode-id="590" instrument_node="">&nbsp;to earn the grant.”</span></li><li data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">“Corner coffee shops are a&nbsp;</span><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">dime a dozen</span></strong><span data-dcnode-id="585" instrument_node="">.”</span></li><li data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">“The old man was&nbsp;</span><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">fit as a fiddle</span></strong><span data-dcnode-id="580" instrument_node="">.”</span></li><li data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">“The test was&nbsp;</span><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">a piece of cake</span></strong><span data-dcnode-id="575" instrument_node="">.”</span></li><li data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">“People with lactose intolerance might eat dairy&nbsp;</span><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">once in a blue moon</span></strong><span data-dcnode-id="570" instrument_node="">.”</span></li><li data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">“He eyed the stack of files, worried he’d&nbsp;</span><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">bitten off more than he could chew</span></strong><span data-dcnode-id="565" instrument_node="">.”</span></li><li data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">“The two girls got along&nbsp;</span><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">like a house on fire</span></strong><span data-dcnode-id="560" instrument_node="">.”</span></li><li data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">“‘</span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Break a leg</span></strong><span data-dcnode-id="555" instrument_node="">!’” she said before the group took the stage.”</span></li></ul><p data-dcnode-id="551"><br data-dcnode-id="552"></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">A single concept can often be expressed with several idioms. Consider the phrases below, which are all idioms for death, and their different connotations:</span></p><p data-dcnode-id="547"><br data-dcnode-id="548"></p><p data-dcnode-id="545"><br data-dcnode-id="546"></p><p data-dcnode-id="543"><br data-dcnode-id="544"></p><ul data-dcnode-id="524"><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Kick the bucket</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Bite the dust</span></li><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Pull the plug</span></li><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Bought the farm</span></li><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The ultimate sacrifice</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Food for worms</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Beyond the veil</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Pushing up daisies</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Passed away</span></li></ul><p data-dcnode-id="522"><br data-dcnode-id="523"></p><p data-dcnode-id="520"><br data-dcnode-id="521"></p></div></div><div data-dcnode-id="450" id="why-writers-use-idioms"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="451"><h2 data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Why Writers Use Idioms</span></h2><p data-dcnode-id="514"><br data-dcnode-id="515"></p><p data-dcnode-id="506"><span data-dcnode-id="513" instrument_node="">Idioms are a powerful type of&nbsp;</span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/figurative-language/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="512" instrument_node="">figurative language</span></a><span data-dcnode-id="510" instrument_node="">. As such, there are many reasons why writers include them in their&nbsp;</span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/prose/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="509" instrument_node="">prose</span></a><span data-dcnode-id="507" instrument_node="">&nbsp;or dialogue. For example:</span></p><p data-dcnode-id="504"><br data-dcnode-id="505"></p><p data-dcnode-id="502"><br data-dcnode-id="503"></p><ul data-dcnode-id="458"><li data-dcnode-id="498"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Express an idea or concept</span></strong><span data-dcnode-id="499" instrument_node="">:&nbsp;Idioms can make something complex or abstract easily accessible with a few choice words. For instance, if someone can’t be fooled by a dishonest character’s manipulations, they might say, “I’ve got your number” or “I see right through you.”</span></li><li data-dcnode-id="485"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Establish character and setting</span></strong><span data-dcnode-id="495" instrument_node="">:&nbsp;Idioms are often specific to their culture, meaning writers can use them to quickly establish an authentic setting. These&nbsp;</span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/figure-of-speech/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="494" instrument_node="">figures of speech</span></a><span data-dcnode-id="492" instrument_node="">&nbsp;can establish&nbsp;</span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/characterization/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="491" instrument_node="">characterization</span></a><span data-dcnode-id="489" instrument_node="">&nbsp;in much the same way. For example, if a character says&nbsp;</span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">down yonder</span></em><span data-dcnode-id="486" instrument_node="">, they’re probably from the South.</span></li><li data-dcnode-id="472"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Convey a&nbsp;</span></strong><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/point-of-view/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">point of view</span></strong></a><span data-dcnode-id="479" instrument_node="">: Because there are often several idioms to describe a single common idea, each with its own connotation, writers can use them to convey a specific attitude. Saying someone&nbsp;</span><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">kicked the bucket</span></em><span data-dcnode-id="476" instrument_node="">&nbsp;is a slightly irreverent and even humorous way of saying the person has died. On the other hand, saying that person&nbsp;</span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">passed away</span></em><span data-dcnode-id="473" instrument_node="">&nbsp;is more delicate and respectful.</span></li><li data-dcnode-id="459"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Engage readers more fully</span></strong><span data-dcnode-id="469" instrument_node="">: Idioms’&nbsp;</span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/metaphor/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="468" instrument_node="">metaphorical</span></a><span data-dcnode-id="466" instrument_node="">&nbsp;or figurative meanings require readers to shift from literal to abstract thought. This keeps their attention focused on the text as they attempt to decipher what is being said. Idioms can evoke specific visual&nbsp;</span><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/imagery/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="465" instrument_node="">imagery</span></a><span data-dcnode-id="463" instrument_node="">, and they’re often humorous—both attributes that help readers envision a scene and relate to a&nbsp;</span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/narrative/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="462" instrument_node="">narrative</span></a><span data-dcnode-id="460" instrument_node="">.</span></li></ul><p data-dcnode-id="456"><br data-dcnode-id="457"></p><p data-dcnode-id="454"><br data-dcnode-id="455"></p><p data-dcnode-id="452"><br data-dcnode-id="453"></p></div></div><div data-dcnode-id="386" id="idioms-nbsp-and-other-literary-devices"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="387"><h2 data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Idioms&nbsp;and Other Literary Devices</span></h2><p data-dcnode-id="446"><br data-dcnode-id="447"></p><p data-dcnode-id="443"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Idioms vs. Colloquialisms</span></strong></p><p data-dcnode-id="441"><br data-dcnode-id="442"></p><p data-dcnode-id="427"><span data-dcnode-id="440" instrument_node="">Colloquial language is conversational language, an informal style of speech used in casual contexts. This linguistic style is generally relaxed and less bound by the strictures of formal speech or writing. While all idioms are colloquialisms, the reverse is not true. Idioms are figurative phrases comprised of two or more words. Colloquialisms, however, can be figurative or literal, one word or many. Writers often use colloquial language to approximate natural, realistic dialogue and develop&nbsp;</span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/setting/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="439" instrument_node="">setting</span></a><span data-dcnode-id="437" instrument_node="">&nbsp;and characterization.&nbsp;</span><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Y’all</span></em><span data-dcnode-id="434" instrument_node="">,&nbsp;</span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">hoagies</span></em><span data-dcnode-id="431" instrument_node="">, and&nbsp;</span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">conniption</span></em><span data-dcnode-id="428" instrument_node="">&nbsp;are examples of common American colloquialisms.</span></p><p data-dcnode-id="425"><br data-dcnode-id="426"></p><p data-dcnode-id="422"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Idioms vs. Euphemisms</span></strong></p><p data-dcnode-id="420"><br data-dcnode-id="421"></p><p data-dcnode-id="416"><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/euphemism/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="419" instrument_node="">Euphemisms</span></a><span data-dcnode-id="417" instrument_node="">&nbsp;are idiomatic expressions used to discuss offensive, blunt, or delicate subject matter in a polite or respectful manner. People use euphemisms to amuse, avoid embarrassment or negativity, and downplay severity. Where writers often use idioms to enrich imagery, express an idea, or approximate everyday speech, they use euphemisms to acceptably speak about taboos and difficult topics.</span></p><p data-dcnode-id="414"><br data-dcnode-id="415"></p><p data-dcnode-id="394"><span data-dcnode-id="413" instrument_node="">A corporation might use the euphemism&nbsp;</span><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">downsizing</span></em><span data-dcnode-id="410" instrument_node="">&nbsp;when referring to employee layoffs or budget cuts. Adults often say&nbsp;</span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">the birds and the bees</span></em><span data-dcnode-id="407" instrument_node="">&nbsp;to avoid saying&nbsp;</span><em data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">sex</span></em><span data-dcnode-id="404" instrument_node="">&nbsp;in front of impressionable children. In fact,&nbsp;</span><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">passed away</span></em><span data-dcnode-id="401" instrument_node="">,&nbsp;</span><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">kicked the bucket</span></em><span data-dcnode-id="398" instrument_node="">,&nbsp;</span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">the ultimate sacrifice</span></em><span data-dcnode-id="395" instrument_node="">, and all the aforementioned death-related idioms common euphemisms meant to ease the blunt reality of death and dying.</span></p><p data-dcnode-id="392"><br data-dcnode-id="393"></p><p data-dcnode-id="390"><br data-dcnode-id="391"></p><p data-dcnode-id="388"><br data-dcnode-id="389"></p></div></div><div data-dcnode-id="156" id="examples-in-literature"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="157"><h2 data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Examples in Literature</span></h2><p data-dcnode-id="382"><br data-dcnode-id="383"></p><p data-dcnode-id="375"><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">1. Geoffrey Chaucer,&nbsp;</span></strong><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/the-canterbury-tales/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="377"><em data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">The Canterbury Tales</span></em></strong></a></p><p data-dcnode-id="373"><br data-dcnode-id="374"></p><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">Chaucer frames his&nbsp;</span><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Tales</span></em><span data-dcnode-id="369" instrument_node="">&nbsp;as a storytelling contest between a group of travelers on a pilgrimage to Canterbury. This selection comes from “The Merchant’s Tale,” when protagonist January finally chooses his bride:</span></p><p data-dcnode-id="366"><br data-dcnode-id="367"></p><p data-dcnode-id="364"><br data-dcnode-id="365"></p><p data-dcnode-id="362"><br data-dcnode-id="363"></p><blockquote data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">He at the last appointed him on one,</span></blockquote><blockquote data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">And let all others from his hearte gon,</span></blockquote><blockquote data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">And chose her of his own authority;</span></blockquote><blockquote data-dcnode-id="351"><span data-dcnode-id="355" instrument_node="">For&nbsp;</span><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">love is blind</span></strong><span data-dcnode-id="352" instrument_node="">&nbsp;all day, and may not see.</span></blockquote><p data-dcnode-id="340"><span data-dcnode-id="350" instrument_node="">Writers from Plato to&nbsp;</span><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com//shakespeare-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="349" instrument_node="">Shakespeare</span></a><span data-dcnode-id="347" instrument_node="">&nbsp;have used&nbsp;</span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">love is blind</span></em><span data-dcnode-id="344" instrument_node="">&nbsp;to describe the tendency to ignore a loved one’s imperfections. “The Merchant’s Tale” is a tale of duplicity, as January’s infatuation with his bride keeps him from acknowledging her infidelity. Though Shakespeare’s (regular) use of the idiom is perhaps more famous, this example marks its first appearance in the English language (</span><em data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">The Canterbury Tales</span></em><span data-dcnode-id="341" instrument_node="">&nbsp;was published in 1476, more than 80 years before Shakespeare’s birth).</span></p><p data-dcnode-id="338"><br data-dcnode-id="339"></p><p data-dcnode-id="331"><strong data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">2. Zora Neale Hurston,&nbsp;</span></strong><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/their-eyes-were-watching-god/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="333"><em data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Their Eyes Were Watching God</span></em></strong></a></p><p data-dcnode-id="329"><br data-dcnode-id="330"></p><p data-dcnode-id="324"><span data-dcnode-id="328" instrument_node="">This&nbsp;</span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/roaring-twenties/harlem-renaissance" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="327" instrument_node="">Harlem Renaissance</span></a><span data-dcnode-id="325" instrument_node="">&nbsp;classic begins with protagonist Janie Crawford recounting her life story to her friend Pheoby:</span></p><p data-dcnode-id="322"><br data-dcnode-id="323"></p><p data-dcnode-id="320"><br data-dcnode-id="321"></p><p data-dcnode-id="318"><br data-dcnode-id="319"></p><blockquote data-dcnode-id="313"><span data-dcnode-id="317" instrument_node="">Pheoby, we been&nbsp;</span><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">kissin’-friends</span></strong><span data-dcnode-id="314" instrument_node="">&nbsp;for twenty years, so Ah depend on your for a good thought. And Ah’m talking to you from dat standpoint.</span></blockquote><p data-dcnode-id="311"><br data-dcnode-id="312"></p><p data-dcnode-id="307"><em data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Kissin’-friends</span></em><span data-dcnode-id="308" instrument_node="">&nbsp;is an idiomatic expression for “best friends.” Here, it implies that Janie and Pheoby share a deep and intimate friendship, one built on mutual trust and respect.</span></p><p data-dcnode-id="305"><br data-dcnode-id="306"></p><p data-dcnode-id="298"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">3. Charles Dickens,&nbsp;</span></strong><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/a-christmas-carol/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="300"><em data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">A Christmas Carol</span></em></strong></a></p><p data-dcnode-id="296"><br data-dcnode-id="297"></p><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">This novel chronicles Ebenezer Scrooge’s encounters with the ghosts of Christmas Past, Present, and Yet to Come. Before any of that, Scrooge is visited by the ghost of his long-dead business partner, Jacob Marley. The narrator explains Scrooge’s disbelief:</span></p><p data-dcnode-id="292"><br data-dcnode-id="293"></p><p data-dcnode-id="290"><br data-dcnode-id="291"></p><p data-dcnode-id="288"><br data-dcnode-id="289"></p><blockquote data-dcnode-id="283"><span data-dcnode-id="287" instrument_node="">Marley was dead: to begin with. There is no doubt whatever about that. The register of his burial was signed by the clergyman, the clerk, the undertaker, and the chief mourner. Scrooge signed it. And Scrooge’s name was good upon ‘Change, for anything he chose to put his hand to. Old Marley was as&nbsp;</span><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">dead as a doornail</span></strong><span data-dcnode-id="284" instrument_node="">.</span></blockquote><p data-dcnode-id="281"><br data-dcnode-id="282"></p><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">The narrator’s use of&nbsp;</span><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">dead as a doornail</span></em><span data-dcnode-id="277" instrument_node="">&nbsp;accomplishes two things. It evokes the image of a metal nail—gray and lifeless—to confirm that Jacob Marley is truly dead, and it establishes Scrooge’s personality as rigid, cold, and cynical. Scrooge denies Marley’s presence despite it literally being right before his eyes because it challenges his conception of death and reality.</span></p><p data-dcnode-id="274"><br data-dcnode-id="275"></p><p data-dcnode-id="271"><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">4. Shakespeare, Multiple Works</span></strong></p><p data-dcnode-id="269"><br data-dcnode-id="270"></p><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Shakespeare coined many a word and turn of phrase—including the following famous expressions.</span></p><p data-dcnode-id="262"><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/romeo-and-juliet/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="264"><em data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Romeo and Juliet</span></em></strong></a></p><p data-dcnode-id="260"><br data-dcnode-id="261"></p><p data-dcnode-id="258"><br data-dcnode-id="259"></p><p data-dcnode-id="256"><br data-dcnode-id="257"></p><blockquote data-dcnode-id="251"><span data-dcnode-id="255" instrument_node="">MERCUTIO: Nay, if our wits run the&nbsp;</span><strong data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">wild-goose chase</span></strong><span data-dcnode-id="252" instrument_node="">, I am done, for thou hast more of the wild-goose in one of thy wits than, I am sure, I have in my whole five.</span></blockquote><p data-dcnode-id="249"><br data-dcnode-id="250"></p><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">A wild goose chase is a pointless, fruitless activity. In Shakespeare’s day, this idiom does not literally reference geese. Instead, it is inspired by a sport in which a line of horseback riders tried to follow a leader—looking very much like geese in flight.</span></p><p data-dcnode-id="245"><br data-dcnode-id="246"></p><p data-dcnode-id="240"><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/taming-of-the-shrew/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="242"><em data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">The Taming of the Shrew</span></em></strong></a></p><p data-dcnode-id="238"><br data-dcnode-id="239"></p><p data-dcnode-id="236"><br data-dcnode-id="237"></p><p data-dcnode-id="234"><br data-dcnode-id="235"></p><blockquote data-dcnode-id="229"><span data-dcnode-id="233" instrument_node="">PETRUCHIO: This is a way to&nbsp;</span><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">kill a wife with kindness</span></strong><span data-dcnode-id="230" instrument_node="">, and thus I’ll curb her mad and headstrong humor.</span></blockquote><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Killing someone with kindness means being as nice as possible to someone, despite their rude or insulting behavior. The metaphorical killer hopes to elicit a certain response or make the antagonistic figure feel awkward or uncomfortable.</span></p><p data-dcnode-id="225"><br data-dcnode-id="226"></p><p data-dcnode-id="220"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/othello/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="222"><em data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Othello</span></em></strong></a></p><p data-dcnode-id="218"><br data-dcnode-id="219"></p><p data-dcnode-id="216"><br data-dcnode-id="217"></p><p data-dcnode-id="214"><br data-dcnode-id="215"></p><blockquote data-dcnode-id="209"><span data-dcnode-id="213" instrument_node="">IAGO: O, beware, my lord, of jealousy! It is the&nbsp;</span><strong data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">green-eyed monster</span></strong><span data-dcnode-id="210" instrument_node="">, which doth mock the meat it feeds on.</span></blockquote><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Jealousy is often personified as the green-eyed monster, calling to mind the image of a mean and ferocious beast that often attacks out of insecurity or fear.</span></p><p data-dcnode-id="205"><br data-dcnode-id="206"></p><p data-dcnode-id="200"><a data-dcnode-id="201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/julius-caesar/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="202"><em data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Julius Caesar</span></em></strong></a></p><p data-dcnode-id="198"><br data-dcnode-id="199"></p><p data-dcnode-id="196"><br data-dcnode-id="197"></p><p data-dcnode-id="194"><br data-dcnode-id="195"></p><blockquote data-dcnode-id="189"><span data-dcnode-id="193" instrument_node="">CASCA: Nay, an I tell you that, Ill ne’er look you i’ the face again: but those that understood him smiled at one another and shook their heads; but, for mine own part,&nbsp;</span><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">it was Greek to me</span></strong><span data-dcnode-id="190" instrument_node="">.</span></blockquote><p data-dcnode-id="184"><span data-dcnode-id="188" instrument_node="">If something’s&nbsp;</span><em data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">all Greek</span></em><span data-dcnode-id="185" instrument_node="">&nbsp;to you, that means you can’t understand it. This idiom is commonly used to describe new or foreign ideas.</span></p><p data-dcnode-id="182"><br data-dcnode-id="183"></p><p data-dcnode-id="177"><a data-dcnode-id="178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/henry-v/summary/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="179"><em data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Henry V</span></em></strong></a></p><p data-dcnode-id="175"><br data-dcnode-id="176"></p><p data-dcnode-id="173"><br data-dcnode-id="174"></p><p data-dcnode-id="171"><br data-dcnode-id="172"></p><blockquote data-dcnode-id="166"><span data-dcnode-id="170" instrument_node="">PISTOL: The king’s a bawcock, and a&nbsp;</span><strong data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">heart of gold</span></strong><span data-dcnode-id="167" instrument_node="">, a lad of life, an imp of fame, of parents good, of fist most valiant.</span></blockquote><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Someone with a heart of gold has a very kind and good-natured disposition.</span></p><p data-dcnode-id="162"><br data-dcnode-id="163"></p><p data-dcnode-id="160"><br data-dcnode-id="161"></p><p data-dcnode-id="158"><br data-dcnode-id="159"></p></div></div><div data-dcnode-id="127" id="further-resources-on-idioms"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="128"><h2 data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Further Resources on Idioms</span></h2><p data-dcnode-id="152"><br data-dcnode-id="153"></p><p data-dcnode-id="146"><span data-dcnode-id="151" instrument_node="">The&nbsp;</span><a data-dcnode-id="148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Thesaurus-English-Idioms-George-Nagy/dp/9637094466/" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Thesaurus of English Idioms</span></em></a><span data-dcnode-id="147" instrument_node="">&nbsp;contains 21,500 entries and includes explanations, cross-references, example sentences, and more. It’s perfect for writers, students, teachers, and language enthusiasts.</span></p><p data-dcnode-id="144"><br data-dcnode-id="145"></p><p data-dcnode-id="139"><span data-dcnode-id="143" instrument_node="">Kaplan lists&nbsp;</span><a data-dcnode-id="141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kaplaninternational.com/blog/shakespeare-idioms" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="142" instrument_node="">10 famous idioms coined by William Shakespeare</span></a><span data-dcnode-id="140" instrument_node="">. The article also includes a quiz to test your understanding.</span></p><p data-dcnode-id="135"><a data-dcnode-id="137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kaplaninternational.com/blog/shakespeare-idioms" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="138" instrument_node="">This TEDBlog post</span></a><span data-dcnode-id="136" instrument_node="">&nbsp;translates and defines 40 idioms from around the world.</span></p><p data-dcnode-id="133"><br data-dcnode-id="134"></p><p data-dcnode-id="131"><br data-dcnode-id="132"></p><p data-dcnode-id="129"><br data-dcnode-id="130"></p></div></div><div data-dcnode-id="98" id="related-terms"><div class="MuiTypography-root richText ql-editor MuiTypography-subtitle1 MuiTypography-colorTextSecondary" data-dcnode-id="99"><h2 data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Related Terms</span></h2><p data-dcnode-id="123"><br data-dcnode-id="124"></p><p data-dcnode-id="121"><br data-dcnode-id="122"></p><p data-dcnode-id="119"><br data-dcnode-id="120"></p><ul data-dcnode-id="100"><li data-dcnode-id="116"><a data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supersummary.com/colloquialism/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="118" instr
