ponent" data-dcnode-id="2776"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="2777" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="2778"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="2779"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2309"><h1 data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">TI-JEAN AND HIS BROTHERS</span></h1><p data-dcnode-id="2771"></p><h2 data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">(SUMMARY AND ANALYSIS)</span></h2><p data-dcnode-id="2768"></p><p data-dcnode-id="2760"><span data-dcnode-id="2767" instrument_node=""> “Ti-Jean and his Brothers" is a Caribbean folktale by Derek Walcott written in 1958. The</span><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">protagonist Ti-Jean, short for Tiny Jean, is the youngest of three brothers, each of which</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">challenges Papa Bois/the planter/the devil, the antagonist of this play. The play takes place on</span><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">the island of Trinidad near a forest.</span></p><p data-dcnode-id="2752"><span data-dcnode-id="2759" instrument_node="">The Prologue of the play provides background information about the characters and introduces</span><br data-dcnode-id="2758"><span data-dcnode-id="2757" instrument_node="">the main source of conflict in the play. The play is about three boys who lived with their mother</span><br data-dcnode-id="2756"><span data-dcnode-id="2755" instrument_node="">in abject (miserable/hopeless) poverty in a hut on the fringes of a magical forest. Mother looks</span><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">after her three sons:</span></p><p data-dcnode-id="2736"><span data-dcnode-id="2751" instrument_node="">   -     Gros Jean or big Jean is eldest who has the gift of physical strength. He is a woodsman.</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">   -     Mi-Jean or middle Jean, the middle child, is a fisherman only “half as dumb’’. He has the</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">         gift of intelligence from 'book smarts'.</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">   -     Ti-Jean or tiny Jean, is the youngest, good-natured who has yet to test himself out in the</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">         world. He has the good sense (common sense) to ask his mother AND the forest animals</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">         for advice; something his older brothers didn't think, or didn't care to do. (His brothers</span><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node="">         actually blatantly snubbed the forest creatures) Ti-Jean's humbleness and down-to-earth</span><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">         personality won his family riches and saved his own life.</span></p><p data-dcnode-id="2724"><span data-dcnode-id="2735" instrument_node="">Each boy makes an attempt to take up the Devil’s challenge and use the gifts each possesses to</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">defeat him. The arrival of one Bolom, a spookily shrouded (cloaked) “child of the devil’’ bears</span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">this challenge, sending them out to seek their fortune. If any human can make him (the devil) feel</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">“anger, rage, and human emotion,’’ she promises the reward will be “a shower of sovereigns . . .</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">fulfillment, wealth, peace.’’ On the other hand, their failure to achieve this will lead to the boys’</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">death.</span></p><p data-dcnode-id="2714"><span data-dcnode-id="2723" instrument_node="">1|Page</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">fThe Devil is described in awesome terms. He has dead eyes; his skin is as white as a leper’s. He is</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">also the owner of half of the world and the master of intrigue, evil and destruction. In the play, he</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">appears in the guise (appearance) of the Papa Bois, the owner of the forest, white planter and</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">colonialist. He has wreaked havoc on the entire world.</span></p><p data-dcnode-id="2704"><span data-dcnode-id="2713" instrument_node="">   -   He lures blacks into his plantation, exploits, outwits and finally eliminates them.</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">   -   By doing this, the Devil keeps the blacks perpetually in bondage.</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">   -   He has disregard and disrespect for the identity of the blacks. This is seen when he calls</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">       Gros-Jean everything except his real name. By imposing a name on somebody or</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">       something, one distorts that person’s or thing’s identity to suit one’s own purpose.</span></p><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">THE BROTHERS</span></p><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Gros-Jean</span></p><p data-dcnode-id="2682"><span data-dcnode-id="2699" instrument_node="">The eldest son is described as being very stupid despite his immense strength. He is full of his</span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">self-importance and has boundless confidence in himself. To him, physical strength is the key to</span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">success. Gros-Jean refuses to accept his mother’s advice, yet foolishly, later accepts the advice of</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">the old man of the forest whom he does not know. He ignores his mother’s injunction that he</span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">should identify with the other inhabitants of the forest, i.e., the bird, the frogs and the insects, and</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">rather, acts very disrespectfully and aggressively towards them. As a result, when he later</span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">requires their help, they desert him. Gros-Jean’s belief in the strength of his arm is no match for</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">the white planter’s cunning ways. The planter (the Devil) succeeds in irritating Gros-Jean to the</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">point of anger and frustration and then devours him.</span></p><p data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Mi-Jean</span></p><p data-dcnode-id="2679"></p><h2 data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">He is described as being only half as stupid as Gros-Jean. He is a fisherman with intellectual</span></h2><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">potentials and his ambition to rise from being a poor fisherman to becoming a ship captain and</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">later, a lawyer. While this shows Mi-Jean’s intellectual ability, it also reveals to us his slim</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">chances of outwitting the Devil.</span><p data-dcnode-id="2670"></p><p data-dcnode-id="2666"><span data-dcnode-id="2669" instrument_node="">Mi-Jean feels that in his encounter with the Devil, he is protected by his decision not to be</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">aggravated into speech. His guiding principle is:</span></p><p data-dcnode-id="2658"><span data-dcnode-id="2665" instrument_node="">2|Page</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">f                                 Debate is just a hook</span><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node="">                                 Open your mouth, the bait in!</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">                                 And is you they going to juck.</span></p><p data-dcnode-id="2654"><span data-dcnode-id="2657" instrument_node="">Yet, it is Mi-Jean’s love for debate on philosophical and legal matters that is his undoing/causes</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">his downfall. So, the Devil easily outwits and devours him.</span></p><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Ti- Jean</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2651" instrument_node="">Ti-Jean is vastly different from his brothers. He is described as the man in the moon. His strategy</span><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">to defeat the Devil is greatly different from that of his brothers. Ti-Jean seeks and receives his</span><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">mother’s advice and blessing. On the strength of this, he is friendly with the forest creatures and</span><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">in return, they help him in his duel with the Devil. Ti-Jean refuses to obey the Devil and rather</span><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node="">goes on the offensive and creates his own rules which undermine the Devil’s authority and in the</span><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node="">end, provokes the devil to the point of showing anger. Ti-Jean’s guiding principle in this</span><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node="">confrontation is to trust his instincts and show rank (vigorous) disobedience towards any</span><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node="">oppressive and evil authority because as he says: “Who with the Devil tries to play fair, Weaves the</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">net of his own despair.”</span></p><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">The Bolom</span></p><p data-dcnode-id="2622"><span data-dcnode-id="2631" instrument_node="">The Bolom is an unborn foetus which is the twilight zone of life. How can the Bolom can free itself</span><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">from the Devil and achieve life? The outcome of the brothers’ struggle to outsmart the Devil will</span><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">decide the Bolom’s fate of life or death. So, this confrontation between the Jean Brothers and the</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">Devil is of very important to the Bolom. The Bolom is described in the play as: “The Shriek Of a</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">child which was strangled, Who never saw the earth light Through the hinge of the womb”.</span></p><p data-dcnode-id="2618"><span data-dcnode-id="2621" instrument_node="">3|Page</span><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">f                                     THEME: Good versus Evil</span></p><p data-dcnode-id="2608"><span data-dcnode-id="2617" instrument_node="">The theme of "Ti-Jean and his Brothers" is an ancient one, good triumphing over evil, but also</span><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">common sense triumphing over 'brute/dumb' strength and even fancy 'book' intellect. There are</span><br data-dcnode-id="2614"><span data-dcnode-id="2613" instrument_node="">many levels of the conflict between good and evil. In this play, the devil, the orchestrator of evil,</span><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">is a master of disguises. Therefore, the conflict between good and evil is most obvious in the</span><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node="">encounters between the three brothers and the devil (in his various manifestations/forms).</span></p><p data-dcnode-id="2607"></p><h2 data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">SAMPLE ESSAY TYPE QUESTION AND RESPONSE</span></h2><p data-dcnode-id="2604"></p><p data-dcnode-id="2603"></p><h2 data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">“A dominant theme in Ti -Jean and His Brothers is good versus evil.”</span></h2><p data-dcnode-id="2600"></p><p data-dcnode-id="2582"><span data-dcnode-id="2599" instrument_node="">In an ESSAY</span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">   a. Describe TWO incidents in which the conflict between good and evil is presented.</span><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">Any two of the three encounters are appropriate for discussion.</span><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">   -   The first encounter portrays Gros Jean, the oldest son. His mother warns him against evil</span><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">       and the various faces of evil: “The Devil can hide in several features…” But being</span><br data-dcnode-id="2590"><span data-dcnode-id="2589" instrument_node="">       overconfident in his physical strength, he misses the subtlety of the devil. Gros Jean is</span><br data-dcnode-id="2588"><span data-dcnode-id="2587" instrument_node="">       impatient and relies solely on his physical prowess. His impatience is his undoing as the</span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">       devil/old man masquerading as the planter (his new boss) goads him into losing his</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">       temper and consequently, his life.</span></p><p data-dcnode-id="2572"><span data-dcnode-id="2581" instrument_node="">   -   Mi Jean is the next to meet the devil. His mother also warns him (‘no one can know what</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">       the Devil wears’). Ironically, when he does meet the devil, he miscalculates, thinking that</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">       he (the devil) would not reveal himself so soon. Relying on his ‘book’ knowledge and his</span><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node="">       strategy of silence, Mi Jean pits himself against the devil. His many attempts to ‘fix’ the goat</span><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node="">       and keep his temper intact prove too much and he too, falls victim to the wiles of the devil.</span></p><p data-dcnode-id="2564"><span data-dcnode-id="2571" instrument_node="">   -   Accepting his mother’s teaching that “our life is God’s own” and asking for her prayer and</span><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">       assuming the mantra of David (“I go bring down, bring down Goliath”), Ti Jean enters the</span><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node="">       forest. Outwitting the devil (confirming his cloven hoofs and tail) Ti Jean further demands</span><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node="">       his confession (the unmasking to reveal the devil’s face). Eventually, it is the devil who</span></p><p data-dcnode-id="2558"><span data-dcnode-id="2563" instrument_node="">4|Page</span><br data-dcnode-id="2562"><span data-dcnode-id="2561" instrument_node="">f       loses his temper as Ti Jean outwits him (neutering the goat and burning down the cane</span><br data-dcnode-id="2560"><span data-dcnode-id="2559" instrument_node="">       fields and house).</span></p><p data-dcnode-id="2542"><span data-dcnode-id="2557" instrument_node="">   b. Discuss how the MAIN characters are affected in ONE of the incidents</span><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node="">Although they take different turns, the encounters between Gros Jean, Mi Jean and the devil have</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">similar results, in that both brothers succumb (submit) to the wiles of the devil, who is the</span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">personification of/represents evil. Both fail to ‘see’ evil even though they were warned by their</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">mother about guises/disguises. In both instances, the brothers lose the verbal, intellectual and</span><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">psychological battle with the devil. Whether their demise was in the form of physical death or</span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">not, both brothers fared badly because they did not appreciate the strength of their mother</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">(symbol of spirituality) or the value of folk wisdom (embodied in the creatures in the forest).</span></p><p data-dcnode-id="2528"><span data-dcnode-id="2541" instrument_node="">Ti Jean enters the forest armed to meet and win the devil at his game. He asks for his mother’s</span><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">blessing and heeds her advice. He endears himself to the creatures of the forest and they</span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">reciprocate by assisting him in getting the better of the devil. He has no airs, sees himself as the</span><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">underdog (the David facing Goliath) and puts his problem-solving skills to work. His victory is</span><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">predicted in the prologue, “God put him in that height/to be the sun’s right hand/And light the</span><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">evil dark…” a tale of how an unassuming lad outwits the devil. Since evil cannot be ‘killed’, the</span><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node="">devil is last seen warning Ti Jean that they will meet again.</span></p><p data-dcnode-id="2524"><span data-dcnode-id="2527" instrument_node="">   c. Examine ONE technique that Walcott uses to present the theme of good versus evil</span><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">       in the play.</span></p><p data-dcnode-id="2523"></p><h2 data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Choose ONE of the following.</span></h2><br data-dcnode-id="2520"><span data-dcnode-id="2519" instrument_node="">   -   The play can be seen as an allegory (symbol) and to some degree, a fable. In many</span><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">       instances, the story is an ‘old’ one, in its presentation of good versus evil. What makes it</span><br data-dcnode-id="2516"><span data-dcnode-id="2515" instrument_node="">       nuanced is its ‘Caribbeanness’— elements of folklore, history and language/diction. The</span><br data-dcnode-id="2514"><span data-dcnode-id="2513" instrument_node="">       three brothers and their fate speak to both extremes on the one hand, with the third</span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">       brother having the ‘right fit’ (Ti Jean). The play also has some characteristics of a fairy tale,</span><br data-dcnode-id="2510"><span data-dcnode-id="2509" instrument_node="">       with the typical hero and ogre. What makes this tale different and real is that although evil</span><p data-dcnode-id="2508"></p><p data-dcnode-id="2502"><span data-dcnode-id="2507" instrument_node="">5|Page</span><br data-dcnode-id="2506"><span data-dcnode-id="2505" instrument_node="">f      is confronted and ‘managed’, it is not destroyed. Consequently, the ‘happily ever after’ idea</span><br data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node="">      is challenged.</span></p><p data-dcnode-id="2492"><span data-dcnode-id="2501" instrument_node="">  -   Verbal exchanges underlie the presentation of good and evil. The language is such that</span><br data-dcnode-id="2500"><span data-dcnode-id="2499" instrument_node="">      much of the conversation between the devil and the brothers is one of repartee (word</span><br data-dcnode-id="2498"><span data-dcnode-id="2497" instrument_node="">      play/banter). Mi Jean’s half-baked intellect gets the brunt of the devil’s ridicule as well.</span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node="">      Humour (from the subtlest word play to the more obvious) not only generates interest but</span><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">      reinforces the theme.</span></p><p data-dcnode-id="2476"><span data-dcnode-id="2491" instrument_node="">  -   Caribbean folklore and story-telling: from the opening “Krik? Krak!’’ (“Ready?’’ “Yes!’’ —</span><br data-dcnode-id="2490"><span data-dcnode-id="2489" instrument_node="">      the traditional Haitian prelude to storytelling), a chorus of woodland creatures — Frog,</span><br data-dcnode-id="2488"><span data-dcnode-id="2487" instrument_node="">      Cricket, Bird, and Firefly — provide background and running commentary. They also</span><br data-dcnode-id="2486"><span data-dcnode-id="2485" instrument_node="">      serve as something of a jury, because, in keeping with fairy tales the world over, the way</span><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">      the brothers treat these lowly creatures may well determine their fates/outcomes. Music</span><br data-dcnode-id="2482"><span data-dcnode-id="2481" instrument_node="">      (the drums, the flute, the onomatopoeic sounds of the creatures, chants) contributes to the</span><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">      setting and mood and helps in defining characters. The story-telling medium; the call and</span><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">      response and idiomatic expressions engage the audience in the thematic presentation.</span></p><p data-dcnode-id="2468"><span data-dcnode-id="2475" instrument_node="">  -   History is used to enhance the play and strengthen the theme of good versus evil.</span><br data-dcnode-id="2474"><span data-dcnode-id="2473" instrument_node="">      Refernces to the “white planter”, “white house”, “estate”, “sugar-cane fields”, “tobacco”, all</span><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">      remind us of the experiences of slavery and colonialism. It is not by chance that the Devil</span><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node="">      easily transitions (changes) from “planter” to the “devil” self.</span></p><p data-dcnode-id="2464"><span data-dcnode-id="2467" instrument_node="">6|Page</span><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">f                                     THE PLAY AS A COMEDY</span></p><p data-dcnode-id="2444"><span data-dcnode-id="2463" instrument_node="">The comical aspects of the play permeate the entire story. The comedy mainly comes into play</span><br data-dcnode-id="2462"><span data-dcnode-id="2461" instrument_node="">during the interaction between the Devil and each of the three brothers. When Gros Jean is</span><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">working for the planter the Devil, as the Planter, deliberately goads Gros jean by calling him by all</span><br data-dcnode-id="2458"><span data-dcnode-id="2457" instrument_node="">sorts of names except his own. Soon after the Planter enters he says : "Thats right Gros Chien,</span><br data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node="">Gros Jean, Gros Jean, Sorry". The Planter goes from calling Gros Jean, Joe, to Mac, to Gros Chien, to</span><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">Charley, back to Mac, then to Horace and then Francis, Joe again, Henry and ends with Benton</span><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">then Mervin near the end of the scene. "You're worth more to me, Benton than fifty men. So you</span><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">should smoke, after all. And such a pleasant disposition, always smiling. Just Like a skull. But</span><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">Remember Mervin, I'd like you to try and finish this, you see I have a contract and the harder you</span><br data-dcnode-id="2446"><span data-dcnode-id="2445" instrument_node="">work the more I . . . ".</span></p><p data-dcnode-id="2434"><span data-dcnode-id="2443" instrument_node="">The humour would be more apparent if one was actually visualising the way it would be acted on</span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">stage. The Planter would probably say the different names in an absent minded fashion while</span><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">Gros Jean gets more and more frustrated. Gros Jean would probably feel as if his identity was in</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">jeopardy. Identity is very important to Gros Jean, this is illustrated by the various references he</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">makes to his strength, something he considers integral to his identity.</span></p><p data-dcnode-id="2428"><span data-dcnode-id="2433" instrument_node=""> Unlike Gros Jean, Mi Jean is not worried so much about the questioning of his identity as he is</span><br data-dcnode-id="2432"><span data-dcnode-id="2431" instrument_node="">about the questioning of his learning. The author, Derek Walcott, uses the pompous, self-</span><br data-dcnode-id="2430"><span data-dcnode-id="2429" instrument_node="">important attitude Mi Jean has towards his learning to create comedy.</span></p><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">ADDITIONAL TECHNIQUES</span></p><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Chorus: Acts as narrators. Introduces the central characters. Comments on the action</span></p><p data-dcnode-id="2418"><span data-dcnode-id="2423" instrument_node="">Stage Directions:The opening stage directions reveal the setting of the play (location, time of</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">day, weather),&nbsp;introduce the chorus and the mother (characters) and hints at the theme of</span><br data-dcnode-id="2420"><span data-dcnode-id="2419" instrument_node="">poverty.</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Stage directions add to characterization: how&nbsp;Gros&nbsp;Jean walks, how the creatures react, etc.</span></p><p data-dcnode-id="2415"></p><h2 data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Show how props and sound effects/music are used.</span></h2><p data-dcnode-id="2412"></p><p data-dcnode-id="2408"><span data-dcnode-id="2411" instrument_node="">Props: Related to poverty – empty bowl, bare table. Props are used to indicate the brothers’ jobs</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">(faggots and fishing line) and also interest (books)</span></p><p data-dcnode-id="2407"></p><h2 data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Music: Characterization:&nbsp;Gros&nbsp;Jean performs an exaggerated march to music.</span></h2><p data-dcnode-id="2404"></p><p data-dcnode-id="2394"><span data-dcnode-id="2403" instrument_node="">A drum roll and comic&nbsp;quatro&nbsp;introduce Mi-Jean, and the mother is introduced with “sad music</span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">on flute.”</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">7|Page</span><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">fThe mood and music change again with the entrance of the devil and his servants: cymbals,</span><br data-dcnode-id="2396"><span data-dcnode-id="2395" instrument_node="">shrieks, thunder.</span></p><p data-dcnode-id="2393"></p><h2 data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Bolom&nbsp;enters with the sound of wind, rain and insects.</span></h2><p data-dcnode-id="2390"></p><p data-dcnode-id="2389"></p><h2 data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Bolom&nbsp;later imitates the crying of a child.</span></h2><p data-dcnode-id="2386"></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Lighting: It is a dark rainy evening - Red for the devil. - Blue for&nbsp;Bolom.</span></p><p data-dcnode-id="2383"></p><h2 data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">                           THE PROLOGUE AND ITS SIGNIFICANCE</span></h2><p data-dcnode-id="2380"></p><p data-dcnode-id="2376"><span data-dcnode-id="2379" instrument_node="">In the prologue of the play ‘Ti-Jean and His Brothers’, Derek Walcott broadens the reader’s</span><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">understanding of the plot, its characters and setting.</span></p><p data-dcnode-id="2364"><span data-dcnode-id="2375" instrument_node="">Firstly, the Prologue of the play introduces the characters to the reader and gives</span><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node="">background information about them. The reader learns of the three boys, Gros-Jean, Mi-</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">Jean and Ti-Jean who live with their mother in hopeless poverty in a hut on the fringes of</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">the forest. The Devil is also introduced as a character, described as having “dead eyes”</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">and “skin as white as leper”. Other characters include the forest creatures such as the</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">cricket, frog and fireflies, all of which provide an audience for the story to unfold.</span></p><p data-dcnode-id="2354"><span data-dcnode-id="2363" instrument_node="">The Prologue of Walcott’s play also introduces to the reader the main source of conflict in</span><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node="">the play. Through the use of the Bolom, the Devil sets about to challenge each brother to</span><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">seek his fortune, whereby should any of them make him feel “anger, hurt or human</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">emotion,” he would be rewarded with “a shower of sovereigns . . . fulfillment, wealth,</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">peace.’’ On the other hand, their failure to achieve this will lead to the boys’ death.</span></p><p data-dcnode-id="2344"><span data-dcnode-id="2353" instrument_node="">In addition, Walcott uses the prologue to further develop the conflict in which it</span><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">summarises the basic qualities that each brother possesses – that which would be used in</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">their struggle with the Devil – and which the Devil would eventually use to defeat two of</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">them. For example, Gros-Jean is described as stupid despite his immense strength. He is</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">full of self – importance and confidence, refusing his mother’s advice. Similarly, Mi-Jean,</span></p><p data-dcnode-id="2338"><span data-dcnode-id="2343" instrument_node="">8|Page</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">fthough smarter also refuses his mother’s advice thinking that his intellect could outwit the</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">Devil. They both fail.</span></p><p data-dcnode-id="2320"><span data-dcnode-id="2337" instrument_node="">Finally, the Prologue is also used to give details about the setting of the play. When the</span><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">story is introduced the opening stage directions give details of the setting, time of day,</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">location and weather (say what these are specifically – I cannot find my book). It also</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">gives some insight into the theme of the play, poverty, through the use of the props like</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">the empty bowl and bare table. The props are also used to give hints to the jobs that the</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">brothers do, the faggots and fishing line and therefore help with characterization. Added</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">to this, the changing music helps to set the mood of the play. For instance the music</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">changes from the sad tones when the mother is introduced to a racket of “cymbals, shrieks</span><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">and thunder” to herald the introduction of the Devil and his servants.</span></p><p data-dcnode-id="2312"><span data-dcnode-id="2319" instrument_node="">Thus, it is clear that Derek Walcott’s Prologue in the play ‘Ti-Jean and his Brothers’ is more</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">than just a prelude to the story. Rather, it provides the reader with layers of information</span><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">about the characters, setting and general plot while presenting an entertaining tale about</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node="">poverty and greed.</span></p><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">9|Page</span></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="2295"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="2296"><h2 class="title" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="2297"><li class="link_wrapper" data-dcnode-id="2304"><a class="interest_link link" data-category_id="11617" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Devil/explore"><span data-dcnode-id="2306" instrument_node="">Devil</span></a></li><li class="link_wrapper" data-dcnode-id="2301"><a class="interest_link link" data-category_id="10202" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Storytelling/explore"><span data-dcnode-id="2303" instrument_node="">Storytelling</span></a></li><li class="link_wrapper" data-dcnode-id="2298"><a class="interest_link link" data-category_id="11062" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Anger/explore"><span data-dcnode-id="2300" instrument_node="">Anger</span></a></li></ul></div></div><footer class="_2DwxLE" data-dcnode-id="1771" id="global_footer"><h2 class="visually_hidden" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Footer menu</span></h2><div class="_3hm-Hf" data-dcnode-id="1772"><div class="_2rJ4qn" data-dcnode-id="2288"><div class="_3hfhEZ _2DwvY9 _3_wz8S _1HnxF9 _13Nd7L _2wGr9s _2U0YHD" data-dcnode-id="2289"><div class="VKZOcn visually_hidden" data-dcnode-id="2290"><a class="_1AoUI5" data-dcnode-id="2291" data-e2e="back-to-top-link" href="#global_header"><span data-dcnode-id="2292" instrument_node="">Back to top</span></a></div></div
