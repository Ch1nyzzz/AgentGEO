                                                                       p
                                                            Prólogo



       Este libro tiene su origen en la necesidad de acercar a nues-
tros alumnos de Práctica Educativa II, Didáctica Especial de la Len-
gua Inglesa y Residencia en Primaria las bases teóricas y propuestas
didácticas para una mejor formación y para que logren desarrollar una
práctica áulica efectiva destinada a un grupo etario con características y
necesidades particulares.
       El área de enseñanza de Inglés específica para niños pequeños
es relativamente nueva y ha recibido aportes desde la psicología del
desarrollo y cognitiva, y de los estudios de adquisición del lenguaje.
Ese corpus teórico da pautas para la práctica, que indica que los niños
aprenden haciendo cosas con el lenguaje, y focalizándose en los signifi-
cados provistos por un contexto significativo. La enseñanza de Inglés a
niños pequeños debe incluir entonces literatura infantil, teatralización,
narrativa oral, proyectos educativos interdisciplinarios, uso de la tec-
nología para desarrollar múltiples actividades dentro y fuera del aula.
      Este libro no aspira a la originalidad absoluta, sino a sistematizar
aspectos novedosos informados por marcos teóricos y demostrados
desde la práctica áulica.
       Nuestro interés en la didáctica específica de Inglés para niños
pequeños nos llevó a participar en el año 2008 de la beca Hornby Re-
gional Summer School Argentina, otorgada por el British Council, donde
el tema central fue la enseñanza del Inglés para Escuelas Primarias en
Latinoamérica y el Caribe. El intercambio con docentes de Argentina,
Gran Bretaña, Cuba, Chile, Colombia, Venezuela, México y Brasil con
los cuales compartimos experiencias y abordajes interdisciplinarios fue
sumamente enriquecedor.
      Para compartir esa experiencia presentamos al Ministerio de
Educación de la provincia de La Pampa un Proyecto de Capacitación
para los docentes de Inglés en ejercicio en escuelas primarias, que
llevamos a cabo durante 2008-2009 coordinando la cooperación de

                                                                        |7
fdocentes del Departamento de Lenguas Extranjeras de la Facultad de
Ciencias Humanas, UNLPam, en el marco de convenios existentes de
cooperación entre nuestra Universidad y el MCE. La Subsecretaría de
Coordinación, desde el Área de Desarrollo Curricular nos permitió
invitar a prestigiosos profesores de Metodología y Didáctica Específica
del Inglés de Argentina quienes asistieron en calidad de talleristas.
       Los docentes que iniciaron la capacitación fueron cincuenta y
la propuesta incluyó en su diseño de evaluación la elaboración de un
portafolio con secuencias didácticas incluyendo variados proyectos
que, basados en el marco teórico provisto por la capacitación, pudie-
ron desarrollar en las escuelas primarias donde se desempeñan. Por tal
razón, creemos que esta obra también será de interés para maestros
de Inglés en ejercicio por la especificidad de las propuestas didácticas
presentadas.
       Los artículos que aquí se ofrecen fueron escritos a partir de esa
experiencia de capacitación y abarcan diferentes áreas que hacen a la
didáctica específica para el nivel: estudios de adquisición del lenguaje,
enseñanza de la fonología, literatura infantil y narrativa oral incorporadas
a la enseñanza del Inglés en Primaria, integración de la enseñanza del
ingles a otros saberes del currículo, el uso de la tecnología en el aula
de lengua extranjera y una síntesis de los cambios que esta didáctica
específica ha incorporado en los últimos años. Esperamos que los dis-
fruten tanto como nosotros apreciamos el desarrollo de esa capaci-
tación.

             Estela Nélida Braun

                                                                        1

      Teaching English, Learning English, Educating through
      English
      Human beings cannot but learn. To what extent is this
      seen in children learning English?
      Leonor Corradi



      Introduction

       The field of Teaching English to Young Learners (TEYL), as
any other field in teaching, has developed from a traditional view of
teaching and learning, often referred to as the teaching/learning pro-
cess – as if they were two different ends of the same continuum. For
a long time, in our context, the teaching of English to young learners
was in the hands of secondary school teachers, and it seemed to be
the shared view that teaching young learners was the same as teaching
older learners, with the only difference that teachers would have to
progress at a slower pace.
       When asked what characteristics make a good teacher, people
from different fields may give different answers, very often depen-
ding on their own experience as learners. However, there is one key
characteristic in common in all the answers: apart from the bond that
the teacher can create between him or her and the learners, personal
characteristics, degree of commitment, and many others, the quality of
a teacher is defined in terms of how much learning he/she can help
learners construct. Hence, teaching has to start from learning, from
focusing on how children learn.
       It is outside the purpose and focus of this paper to describe the
many theories and studies that deal with accounting for how children

                                                                       | 11
fLeonor CORRADI



learn, yet a brief account will be included on three main researchers
who have had enormous influence on education and whose theories
seem to be of particular relevance to teachers of foreign languages.



         Learning

       One of the first and most influential theorists in developmen-
tal psychology to try to work out how children thought was Piaget
(Brewster, Ellis and Girard 2002, Cameron 2001). His main assump-
tion was that children actively construct knowledge from experience
and from what they already know. Despite the criticism that his word
raised, especially because the role of language in children’s develop-
ment did not form part of his theory, his ideas changed the way many
teachers felt about children learning.
       The central role of language in children’s cognitive development
was discussed by Vygotsky (1978) and later by Bruner (1983, 1990).
They both shared the view that instruction, provided it was meaningful
to the child, helped children learn and develop. Vygotsky further devel-
oped it by describing how an adult, or a more able peer, could help the
child develop his or her potential by giving him/her support. This is
known as the zone of proximal development, whereby what a child can
do today with the help of an adult, he/she will be able to do on his/her
own tomorrow. Bruner himself also built on this thought by describing
the cognitive support, known as scaffolding, that an adult or more able
peer can give to a child so that he/she should develop and grow.



         From learning to acquiring a language

       In the same way that a human being cannot but learn, he/she
cannot but acquire language. This viewpoint is developed by Innatists,
who believe that learning is innate, and therefore universal (Lightbown
&amp; Spada 1999). A foreign language teacher needs to be acquainted
with theories that account for language acquisition, both L1 and L2 –
whether second or foreign – to be able to make informed pedagogical
decisions in class.

      From learning a language to teaching a language

         Once teachers deeply understand how learning develops in a
child on the one hand, and how a child acquires language on the other,
they are in a position to make informed decisions concerning what they
need to do as regards teaching so as to facilitate learning in children.
         This viewpoint places the teacher in a different position in the
classroom, whereby he/she is not the centre any more, the one with all
the knowledge who has to instil it on to learners. Some researchers and
educators feel that in this light, the teacher is no longer at the centre of
the teaching and learning situation, which entails teachers relinquishing
power. Quite the opposite. The view is that still, the teacher’s role is key
to learning since teachers are the ones who can create the opportuni-
ties in class for children to learn. However, this new role does not place
them at the centre, this being equivalent to being the most important
person in class. This standpoint gives the role of the teacher a new
dimension in that the teacher is seen as a professional responsible for
creating the learning opportunities which each child in each context
needs for learning to take place.
         This approach to teaching does not favour any given teaching
method for the focus would be placed on teaching instead of learning.
Nevertheless, this is far from promoting an eclectic approach which
is still as inflexible as any given method (Richards &amp; Renandya 2002).
What is favoured is an approach based on principles – a principled ap-
proach – which is basically dynamic and which is open to a teacher’s
constructed experience on the one hand, and new findings in pedagogy
and second language acquisition on the other hand.



      From learning and teaching to educating through
      English

       The field of English Language Teaching (ELT) has moved from
an original approach of teaching about the language, namely its tenses
and structures and vocabulary, to teaching the language, whose main
aim is to develop communicative competence in learners. In this view,
English has instrumental value. It allows learners to use the language
to enjoy themselves, to understand the lyrics of a song or to chat with
peers from all over the world. Language is no longer used to show

                                                                        | 13
fLeonor CORRADI



that patterns have been acquired. Language is used as a means to an
end, as a tool to construct and understand meanings. This instrumental
aspect is an integral part to learning and teaching English, but does
not include as its aims the aim of schooling and education: to help
children grow into active participants in society, who have the tools to
learn autonomously. These aims are reflected in the educational value
that the teaching of English – and any other foreign language – has
(Corradi et. al. 2000). As such, English should not be seen as a subject
within a curriculum, but as forming part of a much wider educational
project that transcends communicative competence to include literacy
– which, in Freire’s terms would mean read the word and the world
(Freire &amp; Macedo 1987) – and intercultural competence, whereby lan-
guage teaching is regarded as a social activity of major significance in
the contemporary world.



         Educating in English: a Project

       The philosophy briefly described in the previous section has
been put into practice since 2001. In that year, the City of Buenos
Aires created the Plurilingual Schools, which are based on three pillars:
social, educational and linguistic, each with its own aims (Corradi in
Moon et. al. 2009).
       The aims of the social domain are inclusion, acceptance of di-
versity, socialisation and the use of language to communicate. Within
the educational aspect, divided into two cycles, the aims grow together
with learners. The objectives of the first cycle, three of which are ac-
ceptance of rules, space management and tidiness habits, develop into
organisation habits, conflict resolution and group awareness. New ob-
jectives for the second cycle include the use of resources, awareness of
learning and autonomy and independent learning. These educational
objectives do not constitute a separate set of activities carried out in
the classroom, but form an integral part of the teaching and learning
of English. The belief is held that language cannot and should not be
separated from education.
       The linguistic pillar has as its main objectives developing in
learners awareness of how English works – which awareness goes be-
yond English into awareness of their L1 – and helping learners become
aware of the main purpose of language, as described before: language
is a means of constructing and understanding meanings.

      In order to achieve these objectives, a principled approach is fol-
lowed whose settings tend to be natural in the first cycle, with teachers
providing plenty of opportunities for children to acquire the language,
while in the second one, elements from instructional settings are in-
corporated to help learners become aware of how English works (Ellis
1994, Lightbown and Spada op cit).



      Educating in English: teachers and materials

        Methodologies are traditionally associated with approaches in
textbooks, those which follow a communicative approach – sometimes
referred to as the communicative approach – others portraying the three
p’s model, to mention but a few. The focus in the approach proposed is
not what materials are used but rather, how teachers mediate between
the materials of their choice and the learners. Materials are one of the
three elements in the triad of education, together with the teacher and
learners. Learning should be built in the triad as a result of the interac-
tion of the three elements.
        The teacher’s role, again, is central for it is teachers who can me-
diate between learners and materials since they know what situations
can be meaningful to their learners.
        Grammar is still dealt with, as is vocabulary, functions and other
areas of language teaching. What changes is the starting point. Teach-
ers need to think of situations in which language is used communica-
tively, that is, as a means and not as an end. The focus for learners is
that of solving the situation that they are presented with. Meaning at
four levels –phonemic, syntactic, textual and pragmatic – is of para-
mount importance in every activity carried out in class. What children
learn is first, that languages are a means to construct and understand
meanings; that communication is organised so that it should be suc-
cessful (both at written and spoken levels); that English has a particular
way of working, which, at times, may be similar or different to their L1.
Within the educational aspect, learners are helped to see how respect
to others is shown, how different opinions and viewpoints co-exist,
and that even if a viewpoint has been proved wrong, it can give rise to
further learning.
        The teaching cycle includes instances of planning and teaching,
and a key stage: reflecting on what goes on in class, on how each class

fLeonor CORRADI


contributes to students learning, what connections exist between plans,
the aims of the course and what actually happens in class. Critical re-
flection on practice, a key element in professional development is at the
heart of teaching in this meaningful approach.
       When educated in this approach, students tend to show a more
positive and open attitude towards English and a high level of aware-
ness, which they can transfer to other learning instances. They know
what languages are used for and they know what strategies to use to put
meaning across: linguistic, metacognitive and social. They can become
aware of what life skills they have acquired and are in the process of
acquiring. Most importantly, they enjoy learning.

    Teaching Literature in the Classroom:
    Fostering Communicative Competence, Intercultural
Awareness and Critical Thinking in Young Learners
    Griselda Beacon y Ana María Cendoya

       Introduction


      The use of literature in the ELT classroom is enjoying a revival
after several decades of oblivion. Having been part of traditional
language teaching approaches, literature became less popular when in
the 1960s and 1970s language teaching and learning started to focus on
the functional use of language. However, the role of literature in the
ELT classroom has been re-evaluated and many teachers of foreign
languages view literary texts as providing rich linguistic input, a trigger
for the development of intercultural competence, effective stimuli for
students to express themselves in other languages and a potential source
of learner motivation. Because of these reasons most new curriculum
designs applied in many Argentinian provinces stress and recommend
the use of literature in English classes.

        In this chapter our aim is to discuss the reasons that make literature
a powerful resource to be used in ELT classes as well as describe the
characteristics which make a literary text suitable for young learners. We
also intend to discuss the concept of culture since teaching a language
inevitably means exposing learners to culture which is reflected in the
language taught. Finally, we will show how literature may help students
develop communicative competence, intercultural awareness and
critical thinking strategies by means of teaching sequences designed to
work with stories, poems and songs.

         Theoretical Framework

        This revival of literature in the classroom, particularly in primary
school, has taken place as a result of a radical change in the view
of what literary texts to include in our syllabuses as well as in what
methodology to use to make the best out of it with young learners.
In this context, John McRae (1994) raises this issue and questions the
canon by pointing out the difference between literature with a capital L
- the classical texts e.g. Shakespeare, Dickens - and literature with a small
l, which refers to texts that are not part of the traditional literary canon
- popular fiction, fables and songs are within its scope. Consequently,
the literature used in ELT classrooms today is no longer restricted to
classical –and canonical- texts from certain countries e.g. UK, USA, but
it includes the work of writers from a diverse range of countries and
cultures which use different varieties of English/es. Needless to say,
these texts provide an opportunity for the development of intercultural
competence since, as literature is also the route to understand the way
of life of the country it portrays, it may increase the foreign learner’s
insight into the country’s cultural values through the learning of its
language. This interaction fosters cultural enrichment. At the same
time, many of these texts are accompanied by audio-texts, music, CDs,
clips, podcasts, all of which enhance the richness of the sensory input
and provide multi-sensorial classroom experiences that may appeal to
students with different learning styles.

       Lazar (1999), for example, states that the use of literature leads
to different kinds of enrichment. First, as it is not necessarily created
for the purpose of teaching a foreign language, literary texts offer a
great variety of genres and expose learners to the specific language
used in each one of them. Learners have access to poems, fables, folk
and fairy tales, short stories and/or plays, among many other textual
forms, which contribute to develop a familiarity with a use of language
that goes beyond the literal level of words to enter into the realm of
the figurative and allow learners to start understanding how metaphors,
images, allegories and personification, among others, work in the text.
This approach to the literary text helps learners to make inferences and
to deduce meaning from context. Second, the focus on meaning helps
readers to divert their attention from the mechanical aspects of the
language system to concentrate on what the text is about and what s/
he infers or interprets. Lazar also elaborates upon the role of literature
in developing students’ imagination and creativity which, through this

creative relationship with the text, allows for textual intervention to
transform the texts in many different ways, from media transfer to
expansion or reduction.

       Finally, within the wide scope of Literature, stories have achieved
a position of relevance since, quoting Ghosn (2002), they provide “a
motivating, meaningful context for language learning since children are
naturally drawn to stories.” Furthermore, stories are multi-purposeful
since they motivate and engage learners and also help children to develop
their cognitive skills. As we can see, literature is a very helpful resource
to use in our language classes since it contributes to develop literacy,
thinking skills, emotional growth, positive interpersonal attitudes and
intercultural competence.




      Literature and the Development of Cognitive Skills

       The advantages of the use of Literature in the classroom are
also emphasized in the field of cognitive psychology as well as in
approaches which focus on the natural way the human mind develops
and understands.“All evidence from neurology and psychology leads to
the conclusion that we humans think in narrative structures. Concepts
conveyed in story form – more than ideas explained with logic and
analysis – imprint themselves naturally into human minds. Stories
define who we are. Our sense of identity is forged by the stories we
tell ourselves, the ones we come to believe in and those we choose
to dismiss. Moreover, stories build and preserve a group´s sense of
community” (Roche &amp; Sadowsky, 2003)
       Kieran Eagan in his book An Imaginative Approach to Teaching
argues that a solution to many of the present educational problems
is to use and develop a set of what he calls cognitive tools as these
enhance students´ understanding and literacy skills. He explains that
even though each person has a brain which is unique, our brains are
made of shared experiences which are the result of having lived and
learnt in a community. We learn from our community first “to speak,
then to write and finally to think using theoretic abstractions”. He calls
these three kinds of learning “the most potent tool kits available from

                                                                        | 21
fGriselda BEACON - Ana María CENDOYA



our cultural storehouse”. Eagan states that these tools are crucial to
the stimulation and development of the imagination. He defines an
imaginative approach to education as the one which is focused on the
acquisition of the main cognitive tools since they connect students´
imagination with the knowledge in the curriculum. According to this
author “the aim of imaginative education is much more knowledgeable
students who can think creatively and flexibly about the knowledge
they gain about the world and experience.”

       A brief reference to Eagan´s set of cognitive tools shows why
the use of literature with children may certainly foster cognitive skills.
In fact, most of the tools he mentions are literary devices present in
stories, poems, chants, and songs. They are the following: Story, Binary
Opposites, Humour, Gossip, Play, Rhyme, Rhythm and Pattern, Mental
Imagery, Mystery, Metaphor and Embryonic Roots of Literacy.

       Egan describes story as “the most powerful tool to develop
imagination” since stories can shape the real world as well as the
fictional one. Consequently, teachers should be very careful when
they select stories to work with children and should take into account
several aspects such as students´ preferences, age and context so as not
to spoil the potential of the chosen text.
      Egan states that mental imagery has emotional importance
and a more memorable force than the word. Thus, it should play an
important role in teaching and learning as well as metaphor, the tool
which enables us to see one thing in terms of another and is at the
heart of human creativity. These last two cognitive tools –mental
imagery and metaphors – together with mystery are literary devices
that help children to “read” what is beyond their everyday life and
become interested in discovering what remains hidden, undiscovered.
      Gossip is said to be the most basic form or social interaction
which again is fully exploited in literature as stories usually feature
balance between dialogue and narrative. Some poems are also written
in two voices which enables learners to read them interactively.
        Play is pointed out to be of outmost importance because through
it children, at an e</span><span data-dcnode-id="135" instrument_node="">arly age, understand that rules exist not only in play
but also in real life. This understanding helps them develop self control.
Both poems and stories engage readers in play which involves words,
ideas, images or may trigger output which involves playing games.

       Binary opposites are described as a way to categorize knowledge,
the way children organize the world according to the culture they belong
to and to their communal values. Most stories and poems present
oppositions such as good/bad, dangerous / safe, friendly/ hostile,
young/ old, opposites that children recognize easily since they are part
of their schema of the genre. To work with opposites, we would like to
suggest that teachers develop activities that help children identify these
opposites and go beyond the dichotomy to deconstruct the binary. These
types of activities are necessary to develop intercultural competence
since they help children to learn to accept other cosmovisions.

       According to Egan, rhyme, rhythm and pattern give memorable,
meaningful and attractive shape to content. These tools engage
imagination in learning patterns of language and all forms of knowledge
and pave the way to the development of embryonic tools of literacy
which are learned while students use the tools of oral language.
Poetry, for example, is very helpful in order to foster literacy since it
connects reading and writing, it leads students to come to terms with
the importance of word order and word choice. Furthermore, poetry
may work as an invitation to writing as well as reading. Students are
attracted to its short lines, repetition and rhyme. They can produce a
complete written piece in one lesson which may certainly boost their
self esteem. Finally, many of the literary devices used in poems and
stories such as alliteration, repetition, assonance and onomatopoeia
also help to memorize chunks of language, structures, words and their
spelling, which also contribute to the development of literacy skills.




      Literature and the Development of Intercultural
      Competence



      The learning of a foreign language invariably puts learners in
contact with an/other culture/s since languages develop within cultural
parameters that shape meaning. Moreover, the very same language
may develop differently in diverse cultural contexts. Such is the case
with English or Spanish, in which cases the same language varies to
such a degree from one region to another that very often speakers of

                                                                       | 23
fGriselda BEACON - Ana María CENDOYA




that language as a mother tongue may find it difficult to understand
expressions that are culturally specific. Consequently, the teaching of a
foreign language today requires the inclusion of a cultural dimension.

        Culture can be defined in many different ways; we adhere to
Thisted’s definition that sees culture as a dynamic process of symbolic
production that characterizes the representations and the practices of
social groups. The latest curriculum designs in Argentina have included
this new cultural dimension. In 2006 the curriculum design for first
year secondary school of the province of Buenos Aires states: “Ayudar
a reflexionar sobre los códigos de la propia lengua; conocer otras culturas y ampliar
la propia visión del mundo.” In the same way, in 2008 the curriculum design
for fourth, fifth and sixth forms primary schools of the same province
includes: “Promover el desarrollo de la competencia intercultural y el fortalecimiento
de la propia identidad cultural favoreciendo los procesos de integración social.” In
both examples the learning of English as a foreign language contributes
to developing cultural awareness both of the other culture/s as well as
of the learner’s. The second quotation, however, goes a step further
and expands on culture towards the development of an intercultural
competence.

       Michael Byram (2008), one of the most important theorists in
interculturality, defines it as the ability to effectively interact with people
from other cultures that we acknowledge as different from our own. In
this context, effective interaction through cultures means to negotiate
among people in a context of mutual respect for everybody’s benefit. In
other words, the intercultural speaker mediates among diverse cultures
and negotiates between his/her own cultural representations and those
of others by resorting to critical reflection. Moreover, he stresses the
need to develop a positive attitude towards otherness:
         Attitudes of curiosity and openness, or readiness to suspend
disbelief and judgement with respect to others’ meanings, beliefs and
behaviours.
         A willingness to suspend belief in one’s own meanings and
behaviours, and to analyse them from the viewpoint of the others with
whom one is engaged.
         A need to learn to relativise, to interrogate our beliefs, to
become sensitive and tolerant to others.
       Within this new approach to teaching and learning foreign
languages, literature becomes a resourceful material to exploit the

cultural elements since literary texts introduce readers to different
worlds with diverse cultural representations. The fact that literary texts
allow learners to develop empathy for the literary world helps them
to put themselves in the position of the other and see the world from
that perspective. It is the role of the teacher to take advantage of that
material and develop a series of activities / tasks that help learners
make the best of that reading experience. The given answers may also
vary, from a more formal written report to more informal non verbal
responses which may include body language, drawings, collage, etc. Any
form of response is welcome and will greatly depend on the language
level of the learners, their age and social context.



      Working with Short Stories in the Classroom

       As an example on how to work with short stories in the
classroom, we designed the following teaching sequence based on the
children’s book Little Quack´s Bedtime. All the activities proposed are
thought of alternatives that teachers may use or not depending on their
teaching context. As a preparation task the teacher introduces the topic
of fears and asks students questions such as “What are you afraid of ?
She models the language by talking about herself saying “I am afraid
of bats, snakes, etc”. The purpose of such a preparation task is that
students provide different answers like, ghosts, the darkness, the rain,
the wind; activate their background knowledge of the topic and realize
the topic is familiar to them and common among human beings.
       As a second step in this preparation task the teacher may ask
if animals have fears too. For example she may ask them “What are
cats afraid of ?” and students may produce answers such as: cat-dog;
mouse-cat; elephant-mouse and the like.
       Then the teacher could start working with the extralinguistic
features such as the book cover to make students either express their
opinions of the illustrations shown or describe them. In the following
stage, she tries to elicit topic vocabulary related to the genre like the
words characters (family of ducks), setting (pond, river, night time)
and conflict. By doing what they are asked, students will not only be
activating previous knowledge and schema, they will also be supporting
their answers. Such a task leads children to argumentative discourse as
they are asked to provide logical support to their answers.

                                                                       | 25
fGriselda BEACON - Ana María CENDOYA



       As the core task the teacher reads the story first showing the
pictures, changing voices as she reads what characters say, acting out
actions, making gestures and interacting with the students to focus
their attention on new words. She then reads the story again and
invites students to repeat parts of the dialogue between Mama Duck
and ducklings. Eg:”Look/Listen, Mama, look/listen. What´s…in the
dark?”
       One of the characteristics of this story is that there is rhyme and
repetition throughout. This makes the story really appealing to children
because the question-answer pattern allows their active participation
since they can read the story with the teacher interactively. Its content
engages students due to its clear conflict and outcome: children can
anticipate / predict what may follow. Despite this, at other times the
story presents gaps of information which add mystery to it. An example
of these gaps is the absence of the father figure or where the characters
are coming from at the beginning of the story. Provided that children
are properly guided, these mysterious gaps may interest them, foster
their imagination, and lead them to critical reasoning. All these features
contribute to the acquisition of new vocabulary, the memorization of
the pattern repeated and the onomatopoeia presented and, above all,
to their intellectual and linguistic development.
       As a follow up task, the following activities are suggested:
      a. The teacher may ask students to draw the part that they
enjoyed most/ liked best and write an associated word under it.
      b. Teacher shows children different pictures which they should
order and then retell the story using their own words.
       c. Teacher divides class in two groups. One should write a line
about the story and read it aloud. The other group has pictures from
the story so they need to pick up and show the picture that corresponds
to the line read.
      d. Teacher gives students two lists: in one there are onomatopeias
and in the other nouns. They should match the noun with the sound it
makes. Eg; reeds swish; tree sway.
       e. What else could Little Quack be afraid of ? What other animals
or noises may scare him? Teacher elicits ideas such as: frogs jumping
into the pond, frogs croaking. She teaches them vocabulary such as:
splash, croak, etc and then asks children to write a new scene for the
story, draw a picture for it and finally rehearse it to act it out.

      f. Teacher tells the children that Little Quack talks with his
friends the following morning. Imagine what he tells them about the
previous night.
        The above teaching sequence is based on a story that may certainly
fit children classes because of the following reasons. It presents a topic
children may feel identified with, there is balance between dialogue
and narrative which facilitates their comprehension and there is also
rhyme, alliteration, repetition which contribute to their memorization
of important events in it. Another important element is that the story
conveys a positive message: both humans and animals have fears which
can be overcome. It has a clear beginning, conflict and outcome and
finally there is rich, appealing paratextual support which invites children
to participate and interact.
        The story will certainly help to develop the cognitive tools
framed by Egan. First of all, the genre used is a story, the cognitive
tool which the author considers one of the most powerful to develop
imagination. Secondly, there are binary opposites which, although not
explicitly expressed, can be easily inferred by students: light-darkness,
day-night, safety-danger, known-unknown. The mysterious quality of
the night and unknown sounds may also trigger students´ imagination.
Finally, the rhythmic patterns and rhyme, repetition and onomatopoeia
featured in the story can be easily remembered. Consequently, the story
can be a rich resource to foster students´ literacy skills, cognitive tools
and critical thinking.



      Working with Poems in the Classroom

       Bringing poetry to the classroom is very refreshing and
inspirational. Poems allow for interaction with other text forms that
are not regularly part of our teaching practices and motivate children to
play with the language through rhyme, imagery and musicality helping
them to practice and develop their oral skills, enhance their creativity
and learn about themselves and others.
         Poetry offers a myriad of teaching alternatives. Children
connect with poems on an emotional level, allowing for identification.
This helps children to get to know other cultures and explore their own.
In this way, poems contribute to developing intercultural competence
since they trigger reflection upon other cultures and the children’s own

                                                                       | 27
fGriselda BEACON - Ana María CENDOYA




world. Many poems for children are very playful and young learners enjoy
working with them in activities that are innovative in our classrooms.
Within the scope of poetry, the ones that are particularly suitable for
young learners are concrete or shape poems and list poems.
        Concrete or shape poems play with form introducing lexical
items in very original ways. They describe an object and are written
in the shape of that object, making the familiar strange. “Concrete
Cat” by Dorthi Charles, for example, describes the different parts
of a cat in the very shape of a cat. These kinds of poems are very
playful and motivate children to try and write the same types of poems
themselves. Children can be asked to write their own “Concrete Cat”
describing other animals, and by so doing, they play at drawing while
they are learning the vocabulary to describe animals. The same activity
can have an intercultural dimension if children are asked to introduce
the animals of their regional context to children from other regions.
In this way, they have to look around and identify which animals are
local and possibly unknown by others. The reflection that springs
from this activity helps children to see their ordinary context with
intercultural glasses and discover that the ordinary can be extraordinary
for somebody else. “Short Story” by David R. Morgan is a poem that
tells a story in only fourteen words: The child tells his/her mum that
s/he wrote a great story at school and that it was 60 centimeters long.
The poem has a gap of information since the content of the short
story the child wrote at school is unknown. Exploiting these gaps with
children triggers their imagination since there is an authentic gap to fill
in and everything can be possible. There is no good or bad answer to
that. Consequently, they can be asked to imagine what the short story
was about and write it in a similar poetic form. This activity makes
them imagine possible stories, share them with others, practice other
text forms in writing, in this case poetry, and gives children a sense of
fulfillment since every story they create can be possible. At the same
time, they learn to respect other views which can be as valid as theirs.
“The Computer’s First Christmas Card” by Edwin Morgan is a poem
that plays with sounds and absurd combination of words. The poem
is about a computer that writes its own Christmas card without really
knowing what Christmas means as a cultural landmark in our context.
Consequently, even though it uses expressions that are appropriate for
the occasion, the combinations it makes are absurd. Children can be
asked to read this poem aloud with a partner to practise certain sounds
(clusters, plosives, etc.) that may be difficult for Spanish speakers. At

28   |
f              Hacia una didáctica del inglés para niños en Escuelas Primarias



the same time, by making the familiar strange, in this case Christmas,
this poem can be used to reflect upon and learn about other cultures
and their celebrations.
        As we can see, shape poems make something ordinary look
extraordinary. This new light to the everyday can be exploited in many
different ways. At a linguistic level, they help to introduce vocabulary,
idiomatic expressions and other related language items in a very
appealing way, offering variety to our teaching routines. At a cultural
level, they help to look at cultural practices from a different perspective,
allowing us to learn from other cultures and rediscover our own.
        List poems are generally short and very easy to read and write.
They are just a list of objects, of pieces of advice, of dislikes, of likes,
of anything we can think of. Interestingly, these “lists” tell a story we
can trace and very often every line in written in the same way, using the
same syntactic structure, which in turns gives coherence to the whole
poem. A repeated syntax has the cohesive function that rhyme has in
other poems. These poems allow for a great variety of activities, in
particular the ones that involve textual intervention. List poems can be
expanded or shortened. They can also be drawn and mimicked. A good
example is the poem “Ten Things Found in a Shipwrecked Sailor’s
Pocket” by Ian McMillan. As an activity before reading the poem, the
children can be asked to make a list of objects they imagine they may
find in that pocket. The list is written on the board to be contrasted
with the actual objects found in the text. While reading/listening to
the poem, the children are asked to check whether their guesses were
right or wrong and they can expand the poem by adding those objects
they thought of but were not included. In the case of this particular
poem, it has several gaps of information that allow for intervention.
Among the objects found, there is a chart showing dangerous rocks, a
photograph of a young girl and a letter of a mermaid. Children could
imagine what relationship this little girl had with the sailor and what
phrase she could have written at the back of the picture. At the same
time, they could write the letter of the mermaid or draw the map.
        To conclude, poetry in the classroom is fun and creates an
atmosphere that motivates teachers and children to play with the
language in a variety of word games, to let their imagination expand to
unknown worlds, to share their achievements as amateur poets and to
develop intercultural competence.

        Story-telling in the EFL Classroom
        María Mercedes Pérez Berbain y Andrea Blawdziewicz de Caillón


         This article describes the compelling power of stories and argues that their use
in the EFL classroom can be a very effective way of starting off the students’ learning
cycle, namely offering students a meaningful anchor from which to build linguistic and
non-linguistic knowledge.


       ‘Stories provide models of the world’ (Bruner, 2002:
       25)

      Storytelling brings us back to days immemorial, when stories were
passed on by word of mouth from generation to generation to tell human
matters of popular concern, a practice which to this day continues to
touch us deeply. And so it is with our students. Stories make a strong
impact, both their sound and their significance. Stories – from the Greek
word eidenai, which means ‘to know’- are told to understand and give
meaning to our lives.



        How the story is told says as much as what is said

       ‘The intense electricity that language carries’ (Bordelois, 2010) taps
into each participant in a unique way. Story-telling is more than an oral
version of a written story; it is our interpretation, our own construction of
what we were told or what we read; our reasons for having chosen the story,
our own message dressed up as characters on a certain setting performing

                                                                                   | 35
fMaría Mercedes PÉREZ BERBAIN- Andrea BLAWDZIEWICZ DE CAILLÓN



a certain plot, the way of structuring it and leading the audience by the
hand, the choice of words, the dance of our face and body, the glint in our
eye, the choice we make of pitch and mouth movement, the way we reach
out with our breath, in other words, our very selves.


         Telling our story

       There is no best way of telling a story just as there is no definition
of a good story-teller. We simply recognise expertise when we see it. We
are into a good story without much ado, as in most delightful moments.
Having said that, what follows are some of the techniques which good
story-tellers have been found to use.

         S how with gestures before or while saying
         T rigger students’ imagination
         O ffer consistent characters
         R ead their faces and adjust your language
         Y our story is now theirs

         T rust yourself
         E njoy the story, the audience and yourself
         L ook into their eyes
         L eave room for imagination
         I mprovise and dance your story
         N o rush, pace your rhythm
         G ive students’ time to savour, sink in and be silent at the end


         A Story for each

       Stories once told have a life of their own; they may come to the
rescue when summoned, they may add meaning to a situation, they may
come in as illustrations or metaphors in everyday speech, they have a way
of winging their way around. They tap into people in diverse ways and for
different reasons. Each story whispers a special message into each person’s
ears, producing a unique reaction.

       Why use stories?

       They can provide the right exposure to students
       They can give excellent contextualisation for language
       They offer opportunities for skill development: language skills and
cognitive skills
       They can help to suspend students’ disbelief
       They are varied and can be told in many different ways
       They invite participation from students
       They provide a shared experience with our class
       They offer great opportunities for cultural input
       They are memorable especially if there is repetition
       They highlight the musicality of the language especially if there is
onomatopoeia
       They appeal to all our senses
       They can be used with different age and level groups and for
different purposes
       Good stories are highly motivating for students and teachers!
                                                     (Annie Hughes, 2006)



       Stories are just the starting point: much needs to be
       done especially in an EFL classroom


        However compelling stories might be, their impact yields a kind
of growth which is rather intangible. As we know, learning which comes
from stories is shown in mysterious ways and may take a long time to
materialise. However, when stories are told in the FL classroom, teachers
want to see their initial sprouts fairly soon. ‘What is the story about?’; ‘Let
us role play the story’, we hear the language teacher say, as the story, just
told, is finding its way into each person’s system, tapping some fibres in
some and others in others.

       Just like what happens with any new experience we perceive, which
needs to find its internal processing, story-telling needs lots of time to
sink in, to dawn on us, to become part of our flesh, as it were, and find its
own prose and voice. Yet, this natural process cannot find teachers sitting
around. Much needs to be done, especially in an EFL classroom, if we

fMaría Mercedes PÉREZ BERBAIN- Andrea BLAWDZIEWICZ DE CAILLÓN



want the experience of story-telling to yield linguistic and non-linguistic
results in students.



         Teaching from Stories: from perception to processing

        The fact that children can easily find personal meaning in stories
and feel akin to their characters is already a promising starting point.
Meaningfulness is an indispensable component in everything we do and
in classroom activities all the more. An array of activities needs to give
children the opportunity of processing the new experience, namely the
story from the linguistic point of view: its grammar, its vocabulary and its
sounds and intonation patterns and from its non-linguistic point of view:
life-skills and knowledge of themselves and the world.

        As we all know, children process while doing. So discussions and
reflections as such are adult activities, which find their place child-likely
while children are putting the story in order, for instance, or sorting out
linguistic elements, or drawing a certain part of the story. Such activities
are called recognition activities: they invite children to recognise the target
language, to process the new exposure comfortably in their own time.
They do not pose a linguistic pressure on children, rather they call for a
reaction which will imply their engagement with linguistic elements they
already possess and will offer further and more fine-tuned exposure to the
new linguistic elements.


       Examples of recognition activities to be carried out after telling
a story are:


          Putting the story in order
          Illustrating the story or part of it
          Sketching the structure of the story
          Mapping the story
          Sequencing key lines
         matching key lines to the characters

        Gradually we need to invite children to tell the story using its

          Memo test: one set containing main characters and the other one
  main actions, so children need to find a match and tell the line of the
  story (e.g. Meg – finds: child says something like ‘Meg finds a button on
  the floor’)

       Matching characters, actions and after-actions elements which are
  meaningful parts of the story. (e.g. Meg – throws – the button in the
  air)

           Playing with key words, verbally and non-verbally, and gradually
  telling the story from those key words, which will act like buoys in the river
  when sailing in the art of telling a story. (Example of key words to tell
  ‘Button Soup’: beggar – asks for – give – button – idea – crazy – help –

      See Appendix 3 for sample worksheets done after playing the

       In due time, after having processed exposure by means of activities,
stories are in children’s bones, together with the target language and are due
to be part of their spontaneous speech in dramatisations, written pieces,
poems, invented songs and in any other meaningful activity; something
which would have been unthinkable to take place right after exposing
children to the story.



       What’s his story?

         Just like what happens when we plant seeds in the ground, there is a
lot to be done for a story seed to germinate; its initial telling is planting the
seed and finding fertile soil, so that children perceive the new information.
Then we need to ensure an array of seed-care actions, processing the
information, namely recognition activities which will allow the child to take
it all in and embody the knowledge. Once the first sprout of knowledge
is out we arrange for opportunities for that knowledge to see the light

                                                                            | 39
fMaría Mercedes PÉREZ BERBAIN- Andrea BLAWDZIEWICZ DE CAILLÓN




and become as ‘tall’ as possible, with production activities, which foster self
expression and integrate as much knowledge as the child has, to make the
plant as strong as ever.
        And then once the plant of the story has lived for a while, displaying
its talent, it will inevitably wither, fall down and its seeds will become part
of its birth soil again, expecting to be tapped again into a new story plant,
the one every child is capable of telling if given the opportunity to learn.



         Stories as bridges

       As EFL teachers, whose main concern differs in nature with that of
story-tellers, let us remind ourselves that no matter how much we like the
stories we choose to tell and no matter how much we love telling stories,
stories are mere bridges, powerful, witty, succinct, meaningful; yet, we do
not teach stories, we teach children.

      Content and Language Integrated Learning (CLIL)
      Implementation at Primary School Level.
      Estela Nélida Braun y Romina Cheme Arriaga



      Introduction:

       CLIL (Content and Language Integrated Learning) programmes
are being successfully implemented in Europe and North America. In
Europe, they are aimed at helping immigrants achieve a high command
of the target language, taught as a foreign language, whereas in the USA
they are linked to immersion or bilingual programmes designed to teach
English as a second language.
        In this article we analyze its rationale and the possibilities of
implementation in the context of state primary schools taking into account
the fact that English is taught as a foreign language, with fewer instances
of exposure if compared with European countries or North America.
       The approach as such is not new, and it is embedded in the long-
standing methodological tradition that promotes content-based work in
the classroom. According to Brinton, Snow and Wesche (1989) as cited in
Brown (2000:49) content-based instruction is “the integration of content
learning with language teaching aims”. Language becomes the medium to
understand content of other disciplines in the school curriculum, and in
this way it becomes relevant and meaningful to the students.


      Theoretical Framework: Rationale.

      CLIL involves students learning different subjects such as science

                                                                       | 49
fEstela Nélida BRAUN - Romina CHEME ARRIAGA



or geography through the medium of a foreign language. Related terms
include “Content-based instruction”, “English across the Curriculum”,
and “Bilingual Education”. Marsh (2004) defines it as dual-focused
education because it has two main aims, one related to a particular subject
or topic and one linked to the foreign language.
       There are underlying assumptions based on empirical and theoretical
research on CLIL programmes. As regards comprehensible input, Krashen
and Biber (1988) state that subject matter teaching in the L1 provides
background knowledge that will make English input more comprehensible.
In other words, the literacy development in the first language will transfer
to the second or foreign language.
       Within CLIL, English is not taught in isolation so students can
promptly see the usefulness of the object of learning as the foreign
language builds on contents related to the rest of the school curriculum,
and thus it is viewed as authentic, because it is learnt in real contexts as
opposed to artificial situations.
       CLIL follows basic insights into foreign language acquisition
by young children, namely that children can develop the use of two
languages simultaneously until the age when lateralization occurs. They
have an enormous potential for cognitive and social development and they
learn the language by talking about present objects and solving concrete
problems.
       According to Marsh (2004:3) “a language classroom where learners
go through the often difficult process of sorting out sounds, structures,
grammar or vocabulary is rarely natural”. With CLIL they will learn how to
use the language by focusing on a topic that interests them; moreover, they
will be able to enhance their thinking processes as they will be provided
with situations in which the learning of another subject could even be
more successful because of the effort of decoding it and thinking about it
in the foreign language. This naturalness provided by similar contents will
help YLE pick up the foreign language more easily, and thus will enhance
the acquisition process.
        It is our belief that certain subjects such as Physical Education,
Biology or Geography can be taught through English even if the students’
level of linguistic competence is elementary. For example, simple gym
exercises can be taught and followed through the use of the imperative
for instructions. In a similar way, the process by which a seed grows, the
water cycle, the description of geographical features of the students’ own
place or characteristics of the weather do not demand a high level of
proficiency to be introduced in the foreign language class.

f              Hacia una didáctica del inglés para niños en Escuelas Primarias



       A further advantage of CLIL classes is that they cater for different
learning styles through project work, and task based projects where
cooperation and collaboration will be needed to solve the problems
presented.
       Through this approach children learn by doing, which is a key
factor for the primary school learners. Within a content-based approach,
Williams (1997: 208) presents a summary to design activities that should
consider the need to arouse students’ interest by providing them with
challenging activities that have a clear purpose and which are within the
conceptual ability of the students. By developing cross-curricular themes
and projects in English, pupils need to decode oral or written input and use
the language productively to solve meaningful and authentic activities.



      CLIL and developmental Psychology:

        When we teach young learners (YLE) we must apply the findings
of developmental psychology if we want our classes to be truly learner-
centered. CLIL makes use of Piaget’s concern of the child as an active
learner, who makes sense of language through his/her involvement and
interaction with objects used through the development of tasks and
activities. Learning to do things can be helped by interaction with expert
adults (Vygotky, 1972), and teacher intervention through the design
of CLIL tasks will allow students to think about contents through the
medium of L2 language, and in that way they will be helped to internalize
new language. Children will be able to move from intrapersonal to
interpersonal skills, as they have to make use of cooperative and team
work to solve tasks, and then they must share them with the rest of their
classmates or other courses at school. But perhaps it is Bruner’s (1983)
concept of scaffolding the one that is more developed in CLIL activities.
        Teachers build on the students’ prior knowledge of other subjects,
and help them to present information with the foreign language they have
learnt. Students are engaged in critical thinking, and different learning
styles are integrated through group work as they solve CLIL projects and
show their outcomes to the whole class.
        Techniques that teachers may use in scaffolding students’ work
may include brainstorming sessions about a new topic to activate prior
knowledge, making students aware of the text type involved (expository,
descriptive, narrative), use of visual organizers such as webs, diamond

                                                                        | 51
fEstela Nélida BRAUN - Romina CHEME ARRIAGA


frameworks or fishbone graphic organizers that will allow the students to
classify, categorize or summarize the information provided. By dividing
long texts into chunks of meaningful information we favor understanding
by our students.



         The four C’s: Cognition, Community, Content and
         Communication.

       Mehisto, Marsh &amp; Frigols (2008) developed these concepts as building
blocks of the CLIL approach. Cognition is developed through the interplay
of content, language and learning skills used by students. Students will be
asked to use higher-order thinking skills such as synthesizing, evaluating
and applying knowledge acquired in other subjects or researched for a
project. They develop a sense of learning community and integrate content
from various subjects. Communication is enhanced through rich patterns of
interaction provided by the tasks.



         The development of creative and critical thinking in
         the classroom:

        To foster critical thinking is an important goal for all subjects, as
students may transfer these skills to most kinds of learning situations.
According to David Moseley (2005), students’ cognitive performance
can be improved if students are helped to use productive thinking when
gathering information and as they build understanding of that new info.
Higher-order thinking is needed for different subject areas as well as for
solving real-life problems. Following Bloom’s taxonomy about knowledge
and comprehension as cited by Mehisto et al. teachers may also exercise the
skill of recalling information by students, but this is a lower-order thinking
skill. Higher-order skills, in contrast, imply being able to restructure new
info into an existing schema (Gagne, 1985). Williams (1972), as cited by
Moseley, states that “creativity is a complex mental process that is difficult
to define or measure”. But creativity employs cognitive as well as affective
skills explained as fluency (ability to generate ideas), flexibility (ability to
change categories), originality (being able to come up with a unique idea),
and elaboration (expanding on one’s idea). Basically, teacher’s intervention

is needed to help students achieve these intellectual processes of observing,
interpreting, comparing, classifying, generalizing, inferring, analyzing,
synthesizing, making predictions and evaluating outcomes. In this way the
teacher will be a guide who will support learner’s critical thinking and who
will help them develop their creativity.



      Assessment:

       Assessment of CLIL projects will be mainly formative and can
be carried out through the use of portfolios where students may collect
all the projects carried out during the year. The use of technology is
welcome and they can show their outcomes by means of power point
presentations, participation in blogs or production of films. As group
work is used extensively, it is important to assess not only language usage,
content relevance and learning skills but also cooperative efforts such as
responsibility during group work, effort, level of engagement, cooperation
in oral and written presentations and other aspects that teachers may
consider valuable. They could be presented as grids to be filled in by both
teachers and students within the group. This type of assessment could be
complementary to the traditional summative assessment needed to satisfy
school regulations.



      The challenge of implementing CLIL:

        The challenge of implementing it in the primary school classroom
is twofold: first, team teaching is needed with the EFL teacher and maybe
the Science teacher or the PE teacher will have to work together. This may
become a difficulty in many state schools if there are scarce extra hours to
be devoted to team project work.
        Another difficulty is posed by the need to implement strategies
that can help students process the input in order to prepare them to
develop higher-level thinking skills in the subject areas taught. According
to Numrich (1989) there are five basic classroom strategies that may help
students learn English and also prepare them for higher-level thinking
skills in the subjects areas: a) predicting on the basis of prior knowledge,
b) anticipating what will be read next, c) checking comprehension of the

                                                                        | 53
fEstela Nélida BRAUN - Romina CHEME ARRIAGA



text while reading, d) analyzing text organization and e) classifying to
facilitate comprehension of similarities and differences.
           Teachers will need to be aware of the need to present new
information by using appropriate strategies such as demonstrating,
using visuals, building redundancy, rephrasing, scaffolding, linking new
information to learners’ previous knowledge in order to make input
comprehensible and context embedded (Navés, T &amp; Muñoz, C, 1999).
Some researchers such as Coonan (2003) argue that for CLIL teaching to
be successful, professional development courses are needed to prepare
both teachers, the EFL teacher and the subject teacher as well.
        Another aspect that has to be taken into account is the development
of a useful package of materials for a CLIL course that will have to take
into account the particular needs of the students, as well as the local and
school context, and curriculum demands.

of social and economic positioning the opportunity to acquire and learn
languages in a meaningful way and prepare them for a plurilingual world.

      Teaching English Pronunciation at Primary Schools
      Lilián I. Ariztimuño y Mauro A. Cóccaro


      Introduction

       English as a subject taught at primary schools has gained more and
more place and importance in the teaching syllabus. According to the ar-
ticle Nº 27 of the Ley de Educación Nacional Nº 26.206, Argentinean
primary schools have to guarantee their students equal opportunities and
access to meaningful knowledge and learning experiences. Communica-
tion and foreign languages are among the areas of study prioritised for the
teaching instruction in the primary school classrooms. This could be due
to the fact that theories of language acquisition have favoured exposure
to an L2 at an early age. This factor has been especially highlighted when
considering the teaching and acquisition of L2 pronunciation. Despite the
existence of a vast number of descriptions of the English phonological
system, the place of phonology in the general language syllabus needs to
be looked at with a critical eye. Even though teachers are currently aware
of the communicative value of phonology when teaching English as an
EFL, it still continues to be a challenging area in the classroom.
       This chapter contains a description of some of the most repre-
sentative approaches dealing with the acquisition of the phonology of
a foreign language. Our aim is to outline how these theories depict the
importance of the teaching of pronunciation within the early stages of
learning. Pronunciation teaching can be a huge universe where it is very
easy to get lost when setting the priorities as to what to teach, when and
how. This is why this chapter will also present a set of priorities proposed
by some of the most important authors of the area. Finally, once teachers
have made up their minds as to what to teach, they need to decide how

                                                                        | 63
fLilián I. ARIZTIMUÑO - Mauro A. CÓCCARO



to do it. Phonology may be dealt with different kinds of exercises and
activities. Some ideas and techniques taken from our own experience as
teachers of English and from colleagues as well will be shared as a way of
example.



         Foreign language acquisition theories:

        Many studies have been carried out in relation to the acquisition of
pronunciation. The biological factors affecting this process have led to the
development of different studies. Much of what has been said and devel-
oped in theory in the area of phonology supports the view that prepubes-
cent children with adequate exposure to a foreign language can attain per-
fect or near perfect pronunciation with relative ease. Penfield and Roberts
(1959) and Lenneberg (1967) were the pioneers who formulated the idea
that posits the advantage of the acquisition of phonology at an early age.
Penfield and Roberts (1959) claimed that an innate, biological clock for lan-
guage learning allowed direct learning from the input until approximately
the age of 9, with later ages of learning resulting in progressively poorer
attainment levels (Escudero, P. in Pennington M. 2007). This line of in-
quiry supports the claim of a period occurring around puberty in which
brain lateralization is completed. Once the left and right hemispheres of
the brain have been assigned certain functions - hemispheric lateralization-
the critical period is over. According to Lenneberg the critical period for
language acquisition extends over the age of two until puberty. Based on
this idea he formulated the critical period hypothesis claiming that lan-
guage acquisition takes place mainly from mere exposure to the linguistic
input when this occurs before puberty.
        This claim is important in foreign language acquisition due to the
fact that once lateralization occurs the maximal conditions for language
learning diminish. Scovel (1969) and Krashen (1973) stated that after the
critical period comes a loss of brain plasticity which results in the indi-
vidual being incapable of achieving nativelike pronunciation. Even though
these theories have been downplayed by different studies which quote
cases of adults performing competently in a new sound system, there is
still ground not to disregard these theories completely. Overall, the criti-
cal period hypothesis sets a context which favours the exposure of young
children attending primary schools to English as a foreign language.
        The age factor as a biological feature also encourages the

64   |
f              Hacia una didáctica del inglés para niños en Escuelas Primarias



teaching of foreign languages at early stages of life on the basis of the
flexibility available for the articulation of new sounds. Brown (1994) would
place psychomotor concerns into the frame explaining, as Celce-Murcia
states in her book (1996), that “while native like command of morphol-
ogy and syntax in a second language may be the result of brain plasticity
in the central nervous system, the command of second language phonol-
ogy also involves the neuromuscular realm”. This plasticity and flexibility
that children possess at the moment of adding to their schemata speech
sounds which they have never uttered before is of paramount importance.
Within foreign language phonology, a number of studies support the ar-
gument that perception precedes production. Adult perception is highly
constrained by conscious linguistic experience, by the sounds and percep-
tual processes of the native language. Children are less aware of their L1
phonological system and thus their perception of the new system is less
biased than that of adults.
         Theories supporting the teaching of foreign languages at an early
age because of biological or neurological factors are not the only advocates
for the inclusion of English in primary schools. Psychological and personality,
sociocultural and input aspects are correlated with the observed decline in
language acquisition capabilities as time goes by.
         The way we speak is an expression of our identity. We express our-
selves and relate to others, either consciously or unconsciously, establish-
ing our individuality by means of language. As Porter and Garvin (in Dal-
ton and Seidlhofer, 1994) put it in a rather categorical way:
                    “…A person’s pronunciation is one expression of that
            person’s self-image.
                    To seek to change someone’s pronunciation –whether of
            the L1 or of an
                    L2—is to tamper with their self-image, and is thus uneth-
            ical—morally wrong.”
         In other words, as we get used to expressing ourselves by means
of a certain linguistic code, </span><span data-dcnode-id="134" instrument_node="">our identity fixes in relation to that linguis-
tic expression. At the same time, our flexibility decreases making it more
difficult for ourselves to think, feel and evoke these emotions by means
of another code. Children attending primary schools are more open to a
foreign language influence than adolescents and adults as they are not so
constrained by psycho-sociological factors. Schumann’s (1975) affective
theory stresses the notion of individuals as social beings, and states that
children’s personalities are more permeable allowing new experiences to
shape their identities. This author adds that our ‘language ego’ becomes

                                                                          | 65
fLilián I. ARIZTIMUÑO - Mauro A. CÓCCARO



less flexible as we get older. Therefore, we could conclude that both, af-
fective theory and ego-permeability, back up from a theoretical point the
inclusion of English in the school syllabus at an early stage of life.
        Highly related to the psychosocial factors we could also mention
some sociocultural aspects. Even though individuals may learn languages
successfully under sociocultural conditions that are not favourable; learn-
ers will acquire the target language to the degree that they acculturate.
Children are endowed with a greater degree of freedom as regards cultural
prejudice and show less resistance to acculturation than individuals who
have been in contact with a culture for longer periods of time. This idea
also supports the benefits of early exposure to a foreign language.
        As regards input, we are sometimes tempted to forget that prior
exposure to the language might result in either an advantage or a disad-
vantage when dealing with the area of pronunciation. Learners acquire
language mainly from the input they receive, and they must be exposed to
great amounts of comprehensible input before they are asked to speak.
It could be said to be a benefit if students have been exposed to a model
which approximates to the target pronunciation (RP in most cases) giving
teachers ground on which to continue building the phonological knowl-
edge. In the case of primary school teaching, we assume that students
have not had a great amount of previous input at least during the first aca-
demic years. This scenario leads us to conclude that we will not be facing
problems such as fossilised pronunciation mistakes or deep faulty habits.
However, it might also represent a downside if our students have been
instructed by teachers whose own oral production differed markedly from
the target norm. In EFL settings, the teachers are responsible for provid-
ing their students with an adequate model of the target language. Children
are somehow ‘sponges’ as they have a natural predisposition to absorb and
imitate the input they receive. This leaves teachers with a great responsi-
bility towards not only the data they choose to present in the classroom
but also to their own continuing professional development and updating
especially in the phonological area.



         Priorities:

      Language is not simply a formal system but also a functional sys-
tem which exists to satisfy the communicative needs of its users. With
the advent of communicative language teaching in the late 1960s (Rich-
ards and Rodgers, 1986), and the later growing development of the

66   |
f              Hacia una didáctica del inglés para niños en Escuelas Primarias



communicative approach in the 1980s, language as a means of communication
became of paramount importance in all classroom language instruction.
Within this view of language, pronunciation in the same way as grammar,
syntax and discourse organization helps to communicate the speaker’s
message. What is more, as Gilbert (1995:1) believes, the skills of listening
comprehension and pronunciation are interdependent, i.e. learners who
have difficulties understanding spoken discourse will probably have even
more problems when uttering their own production.
       A growing body of literature supports this idea that perception
is the cornerstone for production in both L1 and L2. In the acquisition
of phonology perception precedes production chronologically and is
a prerequisite for the development of productive control of individual
sounds.

          Moreover, Barry (1989) and Grasseger (1991) re-
          ported that learners who had “well-established per-
          ceptual categories” also showed accurate production
          of L2 sounds, concluding that accurate perception
          needs to be established before accurate production
          takes place and, further, suggesting that perceptual
          tests can predict difficulties in L2 production.(Escu-
          dero, P. in Pennington M. 2007: 110).

       As we stated before, teachers are the closest model of English avail-
able to the students. In Argentina most teachers of English have Spanish
as a native language. The fact that these two languages possess two very
different phonological systems makes teachers’ pronunciation awareness
and self-monitoring a basic requirement for English teaching. Students’
perception and production of sounds will be mainly affected by their
teachers’ own perception and production of English. Therefore one of
the priorities for the teaching and learning of pronunciation lies on the
teachers’ own self monitoring and their ability to recognize salient mis-
takes in their students’ oral performances which deviate from the model
aimed at.
       Argentina has traditionally followed RP (Received Pronunciation)
as a pronunciation model. Thus most graduate teachers from tertiary or
university level have been trained in this British variety of English. Tak-
ing this into account, we need to set priorities for English as a subject of
primary school education within RP parameters. This does not mean that
we will expect our students to attain RP pronunciation which would be an
unrealistic goal.

           Kenworthy’s view and advocates that the goal of

        Influenced by the notions stated above, we are in favour of both a
choice of a native-speaker accent –RP in our case- and an intelligible ac-
cent to aim at. While teachers should try to keep their RP accent updated,
pronunciation teaching at primary schools should prioritise aspects point-
ing at English as a lingua franca as a first step from which to move on to
a more native-like accent.
         “The acquisition of phonological competence and discourse com-
petence go hand-in-hand” (Pennington, 1990 in Pennington 1994). The
reasons why pronunciation has to be included in the syllabus are nowadays
unquestionable; the question today is: What to teach within the vast field of this
science? Aiming at what Cruttenden calls high acceptability, i.e. a speech per-
formance which the native listener may not identify as non-native, would
be unreasonable considering the amount of time devoted to the teach-
ing of English at primary school level. Instead, a more sensible proposal
would seek to achieve what he also labels as minimal general intelligibility:
        …one which possesses a set of distinctive elements which corre-
spond in some measure to the inventory of the RP phonemic system and
which is capable of conveying a message efficiently from a native English
listener’s stand point, given that the context of the message is known and
that the listener has had time to ‘tune in’ to the speaker’s pronunciation.
(Cruttenden, 2001: 298-299)
        Stress, rhythm and intonation are considered to be the key fea-
tures for successful communication. Young learners being less analytically
minded are happy starting with suprasegmental aspects. English and Span-
ish do not differ significantly as regards intonation; thus this facet of the
language could be left for later levels of proficiency aiming at high ac-
ceptability standards. Stress and rhythm are closely intertwined in English.
Nevertheless, for pedagogical purposes it is advisable to tackle these areas
separately.
