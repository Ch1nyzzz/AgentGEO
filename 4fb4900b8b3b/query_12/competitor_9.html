        Stress is a large topic and despite the fact that it has been exten-
sively studied for a very long time there remain many areas of disagree-
ment or lack of understanding. To begin with a basic point, it is almost
certainly true that in all languages some syllables are in some sense stron-
ger than others; these are syllables that have the potential to be described
as stressed. It is also probably true that the difference between strong and
weak syllables is of some linguistic importance in every language - strong
and weak syllables do not occur at random. However, languages differ
in the linguistic function of such differences: in English, the position of
stress can change the meaning of a word, as in the case of ‘import’ (noun)
and ‘import’ (verb), and so forms part of the phonological composition
of the word. In terms of its linguistic function, stress is often treated un-
der two different headings: word stress and sentence stress (Roach, 2002). As
regards word stress it is important to bear in mind that it belongs to our
mental lexicon and thus it is stored in our mind as part of the word entry
together with a pattern of sounds. When teaching vocabulary we should
not forget that stress plays a significant role for the identity of words. Very
often this feature is left aside believing that students will acquire it uncon-
sciously due to the audibility of the sounds in the stressed syllables.
        However, stresses in words do not guarantee that the word will be
stressed in any given context. According to Ortiz-Lira (1998) sentence
stress – what he calls accent – depends on different factors:
        The rhythmic structure of the utterance which in itself is also constrained
        by the language rhythm.
        Pragmatic-discoursal principles such as:
           Word categories: in English nouns, adjectives, verbs and ad-
           verbs, i.e. content words, are more accentable than prepositions,
           auxiliary verbs, determiners, pronouns and all the other words
           which fall into the category of structural or functional words.
           The information load that words carry in an utterance in a
           particular context. New information is usually highlighted by
           means of stress so as to focus the listener’s attention on that
           portion of speech and at the same time obscure the given or old
           information.
           Rules which are language dependent as in the case of favouring
           the accentuation of nouns over verbs, e.g. the baby’s crying.
        As stated above, if we are positioned on a communicative ap-
proach, language will be dealt with in context. This drives us to place sen-
tence stress as a main feature for the teaching of English pronunciation.
While all the words assigned stress in an utterance or intonation-group are

                                                                              | 69
fLilián I. ARIZTIMUÑO - Mauro A. CÓCCARO



important for the meaning of the message we want to convey, the last
stress finishes the focus of information and thus represents the most
meaningful choice on the part of the speaker. In Ortiz-Lira’s words, sen-
tence accent, the last accent in the intonation-group, is a key factor to
convey meaning and because there are important differences in the way
English and Spanish assign the location of this accent it should be given a
central place in the teaching of English.
        Languages differ in their characteristic rhythmic structure and this
aspect is one of the most difficult areas to acquire. In Brown’s words
(1990) “the rhythm is part of the general look of how the speakers of
their language speak it”. In a sense, when we speak, our bodies move in
a certain way which signals us as belonging to a particular language, even
when the words we are saying cannot be heard. In English conversational
speech rhythm is based on the contrast of stressed and unstressed syl-
lables. An extreme view (though a quite common one) is that English
speech has a rhythm that allows us to divide it up into more or less equal
intervals of time called feet, each of which begins with a stressed syllable:
this is called the stress-timed rhythm hypothesis. Spanish, however, belongs to
a group of languages called syllable-timed where the length of each syllable
remains more or less the same as that of its neighbours whether or not it
is stressed. Most evidence from the study of real speech suggests that such
rhythms only exist in very careful, controlled speaking, but it appears from
psychological research that listeners’ brains tend to hear timing regularities
even where there is little or no physical regularity.
        English and Spanish, as stated before, are usually defined as two
end-points of a continuum. However, recent research suggests that one
the main differences between languages is the degree to which they exploit
the tendency to reduce unstressed syllables. On the one hand, English
vowels tend to be reduced in both duration and quality showing a tenden-
cy towards the neutral /@/ (schwa). On the other hand, Spanish vowels
tend to be reduced in duration but not to be changed in quality. If we take
a word like ‘banana’ which exists in both languages with the same lexical
item, we will notice that their pronunciation varies mainly in the quality of
the first and last syllables, i.e. /b@ nA:n@/ in English vs. /ba na:na/ in
Spanish. Together with vowel reduction, consonants also suffer changes
in their production in unstressed syllables, for example English voiceless
plosives will be weakly articulated in unstressed position while they will
be followed by aspiration in stressed position (Brown, 1990, Dalton and
Seidlhofer, 1994). In Dalton and Seidlhofer’s words, “‘stress-timed’ lan-
guages maximize the difference between stressed and unstressed syllables,
while ‘syllable-timed’ languages do not”.

        In English, rhythm communicates emphasis so that listeners can
understand the speaker’s meaning. Unfortunately, as students grow more
conscious of grammar, vocabulary, and other aspects of language, they
are often thinking about avoiding mistakes in these areas instead of think-
ing about how to help their listeners follow their meaning. Dealing with
rhythm as part of syllabus of English from the very beginning, might
help children acquire it in a playful but conscious way. As Gilbert (2008)
states:

          Children learn the rhythm of their L1 very early
          in life. By the time they reach the age of one, that
          rhythm is deeply familiar to them, and they will
          unconsciously apply it to any L2 that they learn
          (Aoyama et al. 2007). Since English learners will
          be predisposed to use the rhythm of their L1, it
          is highly important that they be made consciously
          aware of the English system of rhythm. (Gilbert,

segments. Of these, twenty are vowels (twelve pure vowels and eight diph-

tion of the English segmental phonological system. According to Dalton
and Seidlhofer (1994), the selection and sequencing of sounds could be
established with a possible criteria based on two main factors. Firstly, we
could consider the frequency of occurrence that sounds have in the language
and their functional load, i.e. the distinctive function the sounds may have
when distinguishing lexical and grammatical meaning. And secondly, a con-
trastive analysis based on the differences existing between the L1 and L2
phonological systems to help predict problem areas for the acquisition of
the sounds which are dissimilar or inexistent in the student’s L1.

          person. A Spanish speaker facing this same utterance will have
          a tendency to give nuclear accent to me in all contexts. This fact
          might be due to the Spanish tendency to stress final words in
          the utterance. Lack of training on the correct pronunciation of
          schwa in relation to stress might result in some serious problems
          in understanding.
       As Joan Morley (1994) states the major shifts in instructional focus
in pronunciation include a movement towards placing the domain of voice
features and articulatory settings as high priorities for the achievement of
meaning. Paralinguistic features are essential to express and understand
emotions which in some cases are language dependant. As teachers we
need to add these factors as a general priority so as to be able to guide our
students to a meaningful expression in English. (Brown, 1990)



         Teaching approaches and methodology:

        The renewed professional support to enable learners to be effective
and efficient speakers of English as a foreign language has brought pro-
nunciation into the spotlight. Many studies have been performed in order
to try out different approaches and methodology in search of a successful
model for learning and teaching pronunciation.
        Two opposite approaches regarding phonology are the ‘bottom-up
approach’ and the ‘top-down approach’. The former suggests beginning
with the articulation of individual sounds or phonemes in the first place
to continue building up towards suprasegmental features such as stress,
rhythm and intonation. The latter, however, takes as a starting point pat-
terns of intonation or rhythm and brings separate sounds or phonemes
into sharper focus when required. According to Dalton and Seidlhofer
(1994), the ‘bottom-up approach’ is based on the idea that if segmen-
tal features are dealt with in the first place, the suprasegmentals of the
language will subsequently be acquired without the need of formal in-
struction. The ‘top-down approach’ rests on the assumption that once the
suprasegmental features are in place, the necessary segmental discrimina-
tions will follow accordingly. (Maniruzzaman, 2008).
        At the moment of deciding what approach to follow in primary
school lessons, existing studies would suggest that the top-down approach

74   |
f              Hacia una didáctica del inglés para niños en Escuelas Primarias



appears to be more effective in teaching L2 or foreign pronunciation. Old-
er speakers may prefer sounds to be dealt with initially due to their more
analytical minds. Segmental features are more readily perceived, a more
‘tangible’ aspect of pronunciation (Dalton and Seidlhoffer, 1994). Never-
theless, our target students represent a less linguistically conscious group
which could take advantage of the many findings supporting the impor-
tance of prosodic instruction as a starting point. In 2003, Derwing and
Rossiter conducted a study on the effects of different types of English
pronunciation instruction. A group of students was instructed starting
with segmentals; they were taught to distinguish between English sounds
and produce these sounds as accurately as possible. Another group was
primarily taught the prosodic features of English. They practised using
the prosodic signals that native speakers use to guide their listeners. Their
findings led them to conclude:


          We do not advocate eliminating segment-based instruction
          altogether, but, if the goal of pronunciation teaching is to help
          students become more understandable, then this study suggests
          that it should include a stronger emphasis on prosody. (2003:
          14, in Gilbert, 2008:6)

        All the previously mentioned priorities involve the development of
both segmental and suprasegmental skills. We believe that the most appro-
priate way to handle them is to combine their treatment. In this way, we
will be helping our students to become aware of the fact that pronuncia-
tion is formed by a complex set of factors which are very closely related;
but which can be isolated for the treatment of some specific problems
without losing the idea of the whole. Primary school teachers need to
consider which of these features will be teachable in an overt instruction
and which will be constantly present without actually mentioning them.
         As Kelly (2000) states in his book How to teach pronunciation? in-
tegrating pronunciation teaching fully to the study of grammatical and
lexical features brings about an incremental benefit for our students which
will render in determining successful communication. Teachers’ planning
is an essential choice for the systematic inclusion of phonology in the
syllabus. Once teachers have decided on what to teach, another question
postulated by many teachers and researches before arises: How to actually
handle pronunciation issues in the classroom? Three main types of activities can
be suggested:

fLilián I. ARIZTIMUÑO - Mauro A. CÓCCARO



           Integrated activities in which pronunciation is an integral part
           of the lesson together with grammar and lexis.
           Remedial activities which deal with pronunciation problems
           happening spontaneously during the lesson.
           Practice activities which include the set of phonological features
           considered as priorities by the teacher and tackled with specific
           practice material.
       From the set priorities mentioned above, paralinguistic features and
rhythm would be best treated in a covert way. The teacher would be pro-
viding exercises pointing at acquiring these areas but without instructing
the students overtly on those topics. Examples of these kinds of activi-
ties are suggested by Laroy (1995) among other authors. Two appealing
exercises created by the author are worth mention and explanation as they
deal with gestures as a paralinguistic feature and rhythm: The Ventriloquist
(1995: 33) and Talking Hands (1995: 54).
       The Ventriloquist encourages students to use gestures which are char-
acteristic of English native speakers. It points out the fact that British
speakers tend not to move their mouths much when articulating. The use
of a puppet, keeping the upper lip as still as possible, might help students
realize how speakers of different languages use their faces. English and
Spanish could be said to be at opposite ends as regards facial expression.
Spanish speakers have a tendency to gesticulate greatly whereas English
speakers do not do it to the same extent. We believe that this kind of ex-
ercise tackles pronunciation at the same time it highlights gestures as an
important paralinguistic feature (Laroy, 1995: 33).

       Talking hands is a game which aims at helping students recognize
and internalize the rhythm of the English in connection with meaning.
The teacher writes down a number of phrases on the board, such as:
What’s your name? Where do you live? Good morning, etc. and demon-
strates how to clap the different rhythms. Tapping on the desks can also
be useful to show rhythmical patterns. The teacher checks that students
understand which phrase he/she claps by asking them to write it down.
After demonstration the different steps of the game with the class as a
whole, the teacher divides students into two groups. Each group has a
number of ‘drummers’(students in charge of clapping/tapping) and two
spokespersons. One of the latter tells the first drummer to transmit a
message that should reach the second spokesperson at the other end of
the line. The message is passed on from one drummer to another. Once
the message reaches the second spokesperson, he/she has to say out loud

what he understands is the message. If it is correct, all drummers clap
‘Correct!’, if the message is not right all drummers clap ‘Try again’(Laroy,
1995: 54). This fun exercise is an example of many more which could be
put in practice by teachers to work with the rhythm of English. Our next
suggestion is an exercise dealing with schwa. Gilbert (2008: 18) quotes the
following words of a Japanese teacher, Kondo, as background to an activ-
ity aiming at a physical representation of the different vowel qualities and
how stress affects them:

          [Schwa] is the most elusive, selfless and yielding vowel
          of all. Teaching schwa is almost like teaching “noth-
          ingness.” Schwa is in the path from the previous seg-
          ment to the next segment without having its own
          identity . . . acquiring schwa means the acquisition of
          the co-articulatory pattern of English, and it seems to
          greatly improve the level of pronunciation. (Kondo,
          2001: 182)


        This exercise is an example of the TPR (Total Physical Response)
approach. By using their bodies students are asked to perform movements
that link a physical representation to the differences in vowel quality they
hear. In order to help students grasp the essence of the exercise, the teach-
er might suggest a movement for three distinct vowel qualities: Stressed,
Unstressed and Reduced (Gilbert, 2008: 18). The class agrees on a set of
body movements associated to the three categories. In this way, students
are encouraged to relate an acoustic representation to a physical experi-
ence, thus making an abstract concept a bit more tangible.

          Segments can be worked with either in isolation like the case of
          /dZ/ or in minimal pair contrasts like for /b, v/. A bingo played
          using words or pictures that demonstrate a particular sound(s)
          could be a fun way of practising pronunciation. Creating dia-
          logues (once the level of language is higher) in order to give a
          context to contrastive minimal pairs cooperates with the view
          of language for communicative purposes.

       Stories are an excellent aid for practice activities aiming at one
particular phonological target with a context to help teachers focus also
on paralinguistic features. Young learners enjoy listening, reading and

performing classic tales which they probably know in their own language.
A possible resource from where to download simple plays based on all-
time favourites could be www.oup.com.



         Conclusion:

       Early exposure to English as part of the primary school curriculum
is one way to profit from all the benefits that young learners possess for
the acquisition of phonology. In her second language research, Jenifer
Larson-Hall found that

           With evidence of even modest benefits to a younger
           start for foreign language it then seems worthwhile
           to include this subject in the curriculum, especially as
           most studies concur that positive attitudes towards
           language learning develop with an early start. (Larson-
           Hall, 2008: 59)

Moreover, students count with the possibility of receiving a great
amount of language input even when the actual number of hours of
instruction per week is only minimal.
       Teachers should handle the time available for the teaching of EFL
pronunciation in the same way as they do other skills of the language like
vocabulary and grammar. Even though pronunciation has been treated as
the “Cinderella” of language by many authors, its importance for com-
munication does not cease to increase. Therefore, teachers’ training and
later professional development should keep incorporating pronunciation
as part of the syllabus and thus classroom activities helping the learner
acquire intelligible pronunciation highlighting its communicative value.

      Introduction

     Many nations all over the world are increasing their investments
in incorporating new technologies in different levels and fields of
instruction. This is also the case of our country which is trying to keep
updated with the last technological equipments supported in many cases
by international organisms and policy makers from each province. Yet,
many teacher training programs tend to ignore training in the use of new
technologies or deliver ready-made courses designed by technicians and
university professors which tend to be distant from teachers’ realities.
     Computers, the Internet, blogs and wikis to mention some have
become part of our students’ daily lives. More and more students are eager
to use these tools and we, teachers, cannot turn a blind eye to this. On the
contrary, we must try to incorporate new technologies to our curriculum
and make the best use of it. It is the aim of this chapter to explore the
advantages of integrating new technologies in the classroom and start
implementing some computer and Internet based activities which will
enhance learning in the EFL classroom and get students more interested
in learning a foreign language.




                                                                        | 83
fMaría Laura GARCÍA



         Where do you stand?

     Attitudes towards technology vary from teacher to teacher. Some
of them are considered digital immigrants because, as Marc Prensky
(2001) suggests in his article Digital natives, digital immigrants, they always
retain their foot in the past. That is, they need to print out a document
instead of reading or editing it on the screen; they turn to the Internet to
look for information as a second option after trying a manual, a book or
a magazine first; they prefer using a bulletin board to posting messages
instead of twitter or they print out photos apart from uploading them in
facebook. Do you belong to this group?
     Some other teachers are more reluctant to the use of new technologies
and they just avoid using them at all. This group is called the technophobes
and they prefer using the textbook and the CD to running the CD ROM
which comes with the textbook; they write most of their handouts instead
of typing them or they just fear to touch new equipment such as the
Interactive Whiteboard. Are you a technophobe?
     Our students and future teachers fall in another group. They are called
digital natives because they speak a language that most teachers do not:
the language of computers, video games and the Internet. They were
born in a digital world and they are more skillful and knowledgeable than
us when they use new technologies. Do all your students belong to this
group?
     As language teachers, we must keep updated and accept that we are
living in a new era. We must experience a shift in the way we teach and
learn languages in order to prepare the future generations for the new
competing demands of a changing world.

         Internet based activities in the EFL classroom

         How to evaluate a website

        Much has been written and said about the potential benefits of
using the Internet in education. However, it is also important to consider
how to select a website and how to plan an internet based activity.
        Think about any topic and you will find plenty of websites related to
it but only some of them will be appropriate and useful for your students.
First of all, you must bear in mind the objectives of your lesson, the age
of your students and their language level. Then, you need to check the
accuracy of the website. Some of them are written by non experts which
means that their content is not reliable. After that, you must also consider
if that content is updated and interesting for the activity you are planning
to carry out. Sometimes websites are addressed to adults and not to
young learners or teenagers. Finally, make sure that the selected website is
working properly and that you can follow the links without getting lost.
        Before carrying out the internet based activity, take into account the
following suggestions:

           Visit the website on the same day you are planning to give your
lesson or some days before so as to check its availability and whether it is
updated or not.
           It will be highly recommended that you adapt the way activities
are to be conducted depending on the number of students and computers
in the classroom.
           It is advisable for you to be aware of the existence of blocking
software to protect your students against undesirable material they may
encounter on the net.
           Save the website in the hard disk of the computer in case the
connection is not working well the day you want to use it.
           Save the website as FAVOURITE so that your students go
directly to it.
           Monitor your students’ work while they are surfing.

      Introduction

       The cognitivist view of language acquisition, of which Dan Slobin
is one of the leading exponents, assumes the position that the inborn
rich cognitive endowment of human beings underlies their acquisition of
language. As early as 1973 Slobin proposed an alternative conception of
language acquisition in which cognitive principles play a key role. These
cognitive assumptions are not abstract syntactic principles, but concrete
perceptual and cognitive principles that are relevant in many instances
beyond language.
       Later on, Slobin (1985) developed his theory of the operating prin-
ciples in language capacity and since then there have been a number of
proposals from other psycholinguists (Schlesinger 1982; Bruner 1983;
Karmiloff-Smith 1992; Braine 1992, 1994; and Tomasello 2003) along
similar lines. Basically, these authors agreed upon the following precondi-
tions to language learning:

          a. There exist a cognitive architecture for an initial learning
          mechanism for concepts and relations.
          b. The kind of input delivered by sensory systems to the learn-
          ing mechanism is crucial during the first stages of language ac-
          quisition.
          c. There exists “ontological categories” such as object, place, and

                                                                        | 97
fSonia SUÁREZ CEPEDA



          event, “predicates” which express relations, and “arguments”
          which describe the entities or concepts that are related

         The first two preconditions refer to general cognitive processes
whereas the third one explains the system for mental representation that
human beings have. The notions of “object”, “place” and “event” are no-
tions that help us represent and express the world that surrounds us. Of
particular importance is the idea that objects and their properties and ob-
jects and the relations among them are represented in terms of predicates
(properties, relations) and arguments (objects) (Braine 1992, 1994). This
initial cognitive endowment of human beings has a “natural logic” and is a
fundamental component of human cognitive processes in many domains.
Bruner (1983) has emphasized that human infants are capable of highly
focused analysis and reasoning in abstract domains and are also strongly
predisposed to goal-directed activity, especially in communicative social
interaction with other humans. Tomasello (2003) argues that the desire to
manipulate others’ attention is a powerful motivation for infants to learn
to communicate and to master language.
          When we refer to language acquisition, we have in mind a pro-
cess, that, as Slobin described it, accounts for the “emergence of lan-
guage” which is actually a grammar –the mental system that allows people
to speak and understand a language. Which are the basic requisites or
underlying conditions that a child needs to acquire in order to become
a speaker of a language? First of all, they need to acquire a grammar of
the language, that is, an internalized system of rules and constraints that
allows him to encode and decode information. Secondly, these rules pro-
vide clues that the child can use to predict what is acceptable and what
is not valid within a given grammatical system or grammar. To study the
emergence of this grammar, linguistic and psycholinguistic studies have
to focus on the components of this system, that is, phonology, syntax, se-
mantics and morphology. For the purpose of this chapter, our analysis will
refer briefly to the developmental sequences observed in the acquisition
of English as a first language (L1), which involve semantic and morpho-
syntactic processes. We will refer to the notion of chunking as a cognitive
process in acquiring a first and second language (L2). In the last section
we will relate the notions of implicit and explicit knowledge to chunking,
providing evidence of the role of these processes in the design of tests for
young learners.

       1. Vocabulary development

       1.1 Picking up meaning from context

        A good deal of recent research (Bowerman 1985; Slobin 1985;
Clark 2001) has shown the relationship between language acquisition and
the type of speech that is typically addressed to young learners, which
has received the name of motherese (Pinker 1994). Some of the features
observed in English caregiver speech shows carefully articulated speech,
with simple structures, simplified semantic and lexical items and marked
intonation contours that make it easier for children to pick up meanings.
Intonation contours help children parse continuous streams of speech
into meaningful units. Moreover, the acquisition of meaning is facilitated
by the fact that maternal speech in related to the child’s now-and-here im-
mediate experience, their surroundings, activities and needs. Exposure to
language of this type makes it easier for children to match morphemes,
words and phrases into meaningful units –a significant process in the
acquisition of a language .
        Though it has been suggested that parents should provide children
with direct linguistic training by correcting ill-formed utterances, research
on actual oral interactions between children and parents has highlighted
the relevance of developmental patterns in acquisition. Recasting and
feedback have not proved successful strategies when children’s cogni-
tive maturity interferes with the comprehension of the correction itself.
Though recasting provides children with useful information –for example,
adding a missing verb, or changing the form of the pronoun- there is no
reliable conclusion so far as to the positive effect o</span><span data-dcnode-id="133" instrument_node="">f this strategy in L1
acquisition. Some results point to the fact that there is no relation be-
tween frequency of recast and the rate of improved production.1 On the
other hand, in an experiment with four and five year olds with nonsense
verbs and regular and irregular past forms children managed to predict
the regular forms when hearing the “-ing forms” of the novel verbs after
only one recasting in most cases. This result seems to suggest that a single
recasting or feedback of this type proved useful to learn the correct form
(Saxton 1997).

          1.2 Cognitive development and first language acquisi-
          tion

        There is a well studied correlation between language acquisition and
cognitive development. (Johnston 1985 ; Ingram 1989). During the first
years of life, several cognitive advances facilitate acquisition. One of these
is the development of the notion of object permanence, and the children’s
ability to recognize that objects exist independently of one’s interaction
with them (Piaget et al 1956). Children start to learn the name of objects
and there is an explosion in the vocabulary items (Bruner 1983). A second
developmental sequence refers to their ability to organize items in decreas-
ing or increasing order, or to describe objects in terms of their perceptual
properties. For example, size, length, width, etc. These cognitive develop-
ments, among others, influence their language acquisition giving way to
the emergence of new linguistic skills and more complex reasoning. It is
also conceivable that these emerging properties may draw children’s atten-
tion to other conceptual distinctions that, without this contextual stimula-
tion, may develop much later. For example, children at the age of five are
capable of establishing comparisons among different items and start using
comparative terms such as longer, shorter in a productive way.



          1.3 The acquisition of word meaning

     When confronted with the real world experience, children seem to
draw on special strategies when trying to determine the meaning of new
words. Markman (1996) points to three strategies based on cognitive stra-
tegies for learning the meaning of new words in young children. These
cognitive strategies are the result of more complex discriminating opera-
tions that the child puts into play when learning new vocabulary2.

             1) The Whole object assumption: For example, observing a
             sheep, someone names the object as sheep. As a result, the
             child assumes that the new word refers to the whole object, not
             to any of its parts.

         What factors determine the order of acquisition of these devel-
opmental categories? An interesting feature of these sequences is that
their order of occurrence is not related to the frequency of use. For ex-
ample, the determiners a/the are highly frequent in adult speech. How-
ever, they are acquired later than other less frequent forms, such as pos-
sessives. Brown (1973) points out that there are cognitive, morphological
and intonational factors that determine this developmental order . Some
of them are:


       1. Salience in final position: It refers to the frequency of occurrence
of certain items in sentence final position auxiliary that makes them more
noticeable than those in middle position. For example, the occurrence of
the verb “to be” in the middle of a sentence, as main verb occupies a 7th
position in Table 3, in contrast to the “-ing “form rated in the 1st. posi-
tion.

tend to be recalled much more easily than those made up of only one let-
ter, such as “-ing” form (1st. position) vs “-s” or possessive “-’s” (3rd. and
6th. Position)

        3. Absence of homophony: Words that sound the same but have
different morphological functions (e.g. the suffix “s” that marks plural
forms as well as possessive form) make it difficult for children to relate
form and function. As a result, they are acquired later than those that have
a distinct morphological and semantic function.

       4. Exceptions in the way it is used: The existence of exceptions
between the form and the function of certain morphemes may lead to
confusion. One example are the regular and irregular forms of past tense
that hinder the acquisition of the verb inflection.

        5. Allomorphic invariance: It refers to differences in the pronuncia-
tion of certain affixes that make the acquisition of these variations dif-
ficult. For example, the variations in the pronunciation of the suffix “-s”
for plural forms, or the allopmorphic variation of the suffix “-ed” pro-
nounced as [-id], [-t] or [-d] depending on the phonological context

       2. Second language learning
       2.1 Chunking and implicit and explicit learning

         Chunking has been analyzed as a form of “formulaic speech” or
“routines” that have the function of simplifying language processing by
allowing learners to process complex information into partially unana-
lyzed units of meaning (Hakuta 1976) or as “memorized sequences of
lexicalized meaning”, such as the ones conveyed by the complex expres-
sions of social rituals. Expressions such as I’m sorry to keep you waiting em-
body social and pragmatic knowledge that is shared by the speakers’ com-
munity. Native speakers resort to them to save processing time, as “islands

fSonia SUÁREZ CEPEDA



of reliability” that allow them time for planning more complex utterances.
Krashen (1982) claims that this formulaic speech occurs when learners are
forced to speak before they are ready, and that if they had the chance, they
would remain silent.
         To what extent do these chunks or formulaic speech facilitate or
hinder the acquisition of a language? Some researchers believe that relying
on these formulaic expressions lessens the processing load of new infor-
mation and allows learners to have more time to be creative.. For example,
Clark (1974, cited in Ellis 1994)) found that learners create new structures
by juxtaposing one or more routines, as shown in (1 a,b,c)
         (1)
                            a. I don’t know
                            b. That one I don’t know
                            c. I don’t know what’s this

         Most second language (L2) learners use formulaic speech or
chunks because they tend to construct sentences based on their commu-
nicational needs. They follow the same rules, semantic redundancy and
strategy of native speakers, preferring simplification to complex struc-
tures, even in those linguistic contexts where both languages (i.e. L1 and
L2) share similar patterns. They also produce developmental sequences
similar to those of a native speaker described in 1.3, overgeneralizing lexi-
cal and morphological rules and combining semantic, syntactic and prag-
matic information (McLaughlin 1987; Ervin-Tripp 1974)
         Provided the L2 learner is exposed to a meaningful input that al-
lows him to build linguistic routines to express himself, chunking may oc-
cur in a formal, institutional learning context. Bialystock (1994) analyzed
the nature of L2 learning and distinguished the categories of implicit and
explicit knowledge. Explicit knowledge is available to the learner as a
conscious representation which allows him/her to self-correct his/her
production based on learned rules. Explicit knowledge is learned by heart,
memorizing the rules and systematizing the language properties into a
formal system. Implicit knowledge, on the other hand, is the result of the
unconscious internalization of knowledge, which is accessed by means
of intuitions or perceptual processing. Implicit knowledge is developed
through exposure to communicative instances and is facilitated by the
strategy or “functional practicing” (Bialystock 1994). Explicit knowledge
arises when the learner focuses on the language code, and involves “for-
mal practicing”, that is, the conscious study of rules.
         The question we pose refers to the interface between these two

systems. Is it possible that explicit, formally learned knowledge becomes
implicit, automatized knowledge? Different positions have been held in
the last few years, and most of them have not reached a conclusive answer.
However, recent studies in the field of neurolinguistic science have shown
evidence of differences in the cortical areas involved in L1 and L2 lan-
guage processing that may account for these two types of knowledge. The
works by Kim et al (1997), and Ullman (2001) have shown that there are
two distinct but adjacent centers of neuronal activation for L2 learners,
especially for those who acquire the language at a later stage in life. Ull-
man reports two types of memories: 1) procedural memory and 2) lexical
memory. The former is related to knowledge that is unconscious, implicit
and systematized as a routine, whereas the second involves a knowledge
that is conscious, explicit and liable to being updated constantly. When
learning an L1, both systems interact in a continuum, allowing the learn-
er to acquire the linguistic system as an internalized process. In the case
of an L2, however, the learner relies more on the formal, more explicit
memory and tends to “learn” the language instead of “acquiring” it. That
is, linguistic processing becomes more dependent on memorization and
practice than on unconscious, automatized acquisition.
          How do these neurological findings relate to implicit and explicit
knowledge and the classroom environment? Explicit knowledge can be
understood as a facilitator in the learning process. It is available to the
learner through explanations, involves conscious study and arises when
the learner focuses on the linguistic code. Formal practice (i.e. classroom
practice) enables explicit knowledge to become automatized. The learner
becomes aware, through reanalysis of the language phenomena, of the
possibilities of use. In this way she is able to build the mental representa-
tions of the language that would be later developed into more internal-
ized, less conscious linguistic expressions similar to the formulaic speech
or routines already described. Implicit knowledge, on the other hand, can
be developed through the exposure to communicative language use, being
facilitated by functional practicing, that is, the learner’s need to communi-
cate meaningfully in context.
          Though both processes are the result of different cognitive strat-
egies, both interact as a continuum in L2 learning due to the role of the
learner as the “creator” of her own learning path. In any communicative
context, learners “select” items of the input by focusing on communica-
tive needs. This learning process results in the association of linguistic
items and communicative intentions, creating a fostering context for the
development of “meaningful learning” that can later become an internal-

fSonia SUÁREZ CEPEDA



ized form or implicit learning. This process will give way to formulaic
speech, or chunks or routines. An example is the use of classrooms greet-
ing routines, or polite formulae in the classroom such as Howd’you do?
May I …? Can I …? Would you mind…?
          Learned chunks can later become linguistic knowledge available
for conscious consideration. The learner may retrieve these routines and
start using them in a functional form. That is, by understanding the in-
ternal structure of the chunk, she becomes more creative in the use of
language. In this way, a greeting routine such as How d’you do? can give
origin to other linguistic forms such as D’you ….? How are…? I don’t
do…. You do…
         As a closing remark, we would like to point out that the interface
explicit/implicit knowledge is motivated by the learner’s conscious notic-
ing during all the stages. Noticing, that is “paying attention to what is
new or different” is crucial to account for the features of the input that
would eventually become part of the learner’ intake, i.e. what has actually
been acquired. For the noticed input to become acquired input or intake
learners need to activate higher cognitive processes such as comparison,
inferences, deductions in order to be able to start using the language cre-
atively.

reading task




(Adapted sample from Handbooks for Teachers, Cambridge ESOL, 2008)

Reading tasks based on the selection of a suitable option demand strate-
gies for information decoding and selection. Testing is aimed at evaluat-
ing learners’ competence on solving chunking , i.e. syntactic-semantic
units of meaning.

    1. In Reading tasks the underlying assumption is that at this instance
       of the learning process children are more exposed to oral input
       than to written. Instances of oral language in written form are
       more frequent.
    2. Children need to retain information as they proceed in their read-
       ing. The role of short term memory, retention of previous infor-
       mation and integration are crucial for processing and solving the
       exercise.
    3. The role of pragmatics is also crucial as children need to rely on
       their “situational knowledge” to infer meaning.

cLoze tests


                                      Cloze tests involve parsing, i.e. how
                                      we process the distribution of
                                      information in a language. Word
                                      order and distribution of constituents
                                      (i.e. words) is crucial to understand
                                      what follows after each item:
                                        Syntax is the skeleton that binds
                                      words in any language.
                                        Words are “placed” in specific slots
                                      and their distribution is determined
                                      by its relation to other words, e.g.:

                                      He’s dressed _in__ black.
                                      (Él) está vestido de negro.

                                      The use of in in English and de in
                                      Spanish are language specific
                                      constraints that learners need to
                                      know.
