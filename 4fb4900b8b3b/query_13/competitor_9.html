</span><div class="lit" data-dcnode-id="821"><span data-dcnode-id="828" instrument_node="">For a clearer interpretation of these examples it would be better to add the introductory negation: Syr.: la ella 'ammek(y) nezal "no, rather we will go with you" "Literal" Arab.: kalla bal ma'aki nantaliqu "certainly not, rather we will leave with you" "</span><span class="highlight" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Idiomatic</span></span><span data-dcnode-id="825" instrument_node="">" Arab.: kalla ma nansarifu wa-lakin nantaliqu ma'aki "certainly not, we will not turn away but leave with you"</span><div class="lit_links" data-dcnode-id="822"><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Translation%2BTechniques%2Bin%2BTwo%2BSyro-Arabic%2BVersions%2Bof%2BRuth-a0208288492"><span data-dcnode-id="824" instrument_node="">Translation Techniques in Two Syro-Arabic Versions of Ruth</span></a></div></div><div class="lit" data-dcnode-id="813"><span data-dcnode-id="820" instrument_node="">* The American Heritage Dictionary of Idioms is an excellent resource for editors and writers who want to make sure they're using </span><span class="highlight" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">idiomatic</span></span><span data-dcnode-id="817" instrument_node=""> expressions correctly.</span><div class="lit_links" data-dcnode-id="814"><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/I%2Bhear%2Bwhat%2Byou%2527re%2Bsaying%253A%2Bsometimes%2Bwhat%2Bwe%2Bhear%2Band%2Bwhat%2Bwe%2Bput%2Bon...-a0156483162"><span data-dcnode-id="816" instrument_node="">I hear what you're saying: sometimes what we hear and what we put on paper are entirely different things</span></a></div></div><div class="lit" data-dcnode-id="805"><span data-dcnode-id="812" instrument_node="">By choosing this course, McKay effectively decided against producing vernacular poetry at a time when versifying black </span><span class="highlight" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">idiomatic</span></span><span data-dcnode-id="809" instrument_node=""> language and the folk fable was so much in vogue: the New Negro Renaissance.</span><div class="lit_links" data-dcnode-id="806"><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Claude%2BMcKay.%2BComplete%2BPoems-a0152934696"><span data-dcnode-id="808" instrument_node="">Claude McKay. Complete Poems</span></a></div></div><div class="lit" data-dcnode-id="797"><span data-dcnode-id="804" instrument_node="">Other services offered by XeLDA include the segmentation of text into sentences and the split of text into basic lexical units (tokenisation), morphological text analysis and recognition of </span><span class="highlight" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">idiomatic</span></span><span data-dcnode-id="801" instrument_node=""> expressions.</span><div class="lit_links" data-dcnode-id="798"><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Convera%2Bsigns%2Btechnology%2Btransfer%2Bagreement%2Bwith%2BTEMIS-a0144407484"><span data-dcnode-id="800" instrument_node="">Convera signs technology transfer agreement with TEMIS</span></a></div></div><div class="lit" data-dcnode-id="789"><span data-dcnode-id="796" instrument_node="">It can serve either as a communication tool, illustrating how the architectural idea has been fixed back to an authoritative typology, </span><span class="highlight" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">idiomatic</span></span><span data-dcnode-id="793" instrument_node=""> device, or an informational tool for the author of the drawing, where intellectual comfort can be obtained by introducing a successful historical model.</span><div class="lit_links" data-dcnode-id="790"><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Lines%2Bof%2Binquiry%253A%2Bdiagrams%252C%2Bin%2Bwhatever%2Bvisual%2Bform%2Bthey%2Btake%252C...-a0141875015"><span data-dcnode-id="792" instrument_node="">Lines of inquiry: diagrams, in whatever visual form they take, represent a threshold moment in the creation of successful architecture, argues Alan Phillips</span></a></div></div><div class="lit" data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">The examples from published translations of Tolkien's The Lord of the Rings highlight instances where translators, in giving </span><span class="highlight" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">idiomatic</span></span><span data-dcnode-id="785" instrument_node=""> renderings of the source text, have introduced anachronisms into the carefully constructed text-world.</span><div class="lit_links" data-dcnode-id="782"><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Translation%2Band%2Bcriticism%253A%2Bthe%2Bstylistic%2Bmirror-a0142923849"><span data-dcnode-id="784" instrument_node="">Translation and criticism: the stylistic mirror</span></a></div></div><div class="lit" data-dcnode-id="773"><span data-dcnode-id="780" instrument_node="">This, however, is not true for </span><span class="highlight" data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">idiomatic</span></span><span data-dcnode-id="777" instrument_node=""> constructions.</span><div class="lit_links" data-dcnode-id="774"><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Occasional%2Badnominal%2Bidiom%2Bmodification--a%2Bcognitive%2Blinguistic...-a0208536003"><span data-dcnode-id="776" instrument_node="">Occasional adnominal idiom modification--a cognitive linguistic approach</span></a></div></div><div class="lit" data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">Each row seems to function like a definition that offers </span><span class="highlight" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">idiomatic</span></span><span data-dcnode-id="769" instrument_node=""> expressions while tracing the etymology of Bik Van der Pol's own interventions.</span><div class="lit_links" data-dcnode-id="766"><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Bik%2BVan%2Bder%2BPol%253A%2BRec-a0140145902"><span data-dcnode-id="768" instrument_node="">Bik Van der Pol: Rec</span></a></div></div><div class="lit" data-dcnode-id="757"><span data-dcnode-id="764" instrument_node="">By model and practice, families nested children in webs of relationships, sanctified through kin or kin-like (</span><span class="highlight" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">idiomatic</span></span><span data-dcnode-id="761" instrument_node=""> kin) moralities.</span><div class="lit_links" data-dcnode-id="758"><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Teaching%2Brights%2Band%2Bresponsibilities%253A%2Bparadoxes%2Bof%2Bglobalization%2Band...-a0133934742"><span data-dcnode-id="760" instrument_node="">Teaching rights and responsibilities: paradoxes of globalization and children's citizenship in Lebanon</span></a></div></div><div class="lit" data-dcnode-id="749"><span data-dcnode-id="756" instrument_node="">Harmony, in particular, is one of the most intriguing elements in Constantinidis's music, not only because it is a uniquely </span><span class="highlight" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">idiomatic</span></span><span data-dcnode-id="753" instrument_node=""> stylistic element, but also because it offers a compelling resolution to one of the most tantalizing controversies within the circles of the Greek National School: how does one harmonize a melody of undisputed monophonic ancestry, whose pitch structure, more than often, eschews interpretations of tonal functionality?</span><div class="lit_links" data-dcnode-id="750"><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/44%2BChildren%2527s%2BPieces%2Bon%2BGreek%2BMelodies%2Bby%2BYannis%2BConstantinidis%253A%2Ba...-a0133411676"><span data-dcnode-id="752" instrument_node="">44 Children's Pieces on Greek Melodies by Yannis Constantinidis: a Masterpiece of Mikrokosmic proportions</span></a></div></div><div class="lit" data-dcnode-id="741"><span data-dcnode-id="748" instrument_node="">Many of these large-scale tests use complex or </span><span class="highlight" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">idiomatic</span></span><span data-dcnode-id="745" instrument_node=""> language in the instructions and items, so ELLs might have problems understanding the language of the test or it may take them longer to understand it (Garcia &amp; Pearson, 1994).</span><div class="lit_links" data-dcnode-id="742"><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Assessment%2Bof%2BEnglish%2Blanguage%2Blearners-a0126683344"><span data-dcnode-id="744" instrument_node="">Assessment of English language learners</span></a></div></div><div class="lit" data-dcnode-id="733"><span data-dcnode-id="740" instrument_node="">It may also be worth noting the human imprint of the outpouring of </span><span class="highlight" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">idiomatic</span></span><span data-dcnode-id="737" instrument_node=""> speech that follows.</span><div class="lit_links" data-dcnode-id="734"><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/The%2BDay%2Bof%2BPentecost%253A%2BMay%2B30%252C%2B2004-a0115966565"><span data-dcnode-id="736" instrument_node="">The Day of Pentecost: May 30, 2004</span></a></div></div><div class="lit" data-dcnode-id="725"><span data-dcnode-id="732" instrument_node="">"A THOROUGH KNOWLEDGE OF THE TARGET CULTURE, INCLUDING THE USE OF </span><span class="highlight" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">IDIOMATIC</span></span><span data-dcnode-id="729" instrument_node=""> EXPRESSIONS, IS THE ONLY WAY FOR COMPANIES TO EFFECTIVELY GET THEIR MESSAGE ACROSS."</span><div class="lit_links" data-dcnode-id="726"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Lost%2Bin%2Btranslation-a0112801523"><span data-dcnode-id="728" instrument_node="">Lost in translation</span></a></div></div><div class="lit" data-dcnode-id="717"><span data-dcnode-id="724" instrument_node="">This book on Italian and European </span><span class="highlight" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">idiomatic</span></span><span data-dcnode-id="721" instrument_node=""> expressions is a treasure trove in which the reader makes numerous discoveries.</span><div class="lit_links" data-dcnode-id="718"><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Ottavio%2BLurati.%2BPer%2Bmodo%2Bdi%2Bdire....%2BStoria%2Bdella%2Blingua%2Be...-a0113804939"><span data-dcnode-id="720" instrument_node="">Ottavio Lurati. Per modo di dire.... Storia della lingua e antropologia nelle locuzioni italiane ed europee</span></a></div></div><div class="lit" data-dcnode-id="709"><span data-dcnode-id="716" instrument_node="">The translation, which faces the Latin text in the first volume, reads well, but in some places, where a more literal or </span><span class="highlight" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">idiomatic</span></span><span data-dcnode-id="713" instrument_node=""> rendering would be appropriate, I would quibble with it.</span><div class="lit_links" data-dcnode-id="710"><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Harm-Jan%2Bvan%2BDam%252C%2Btrans.%2BHugo%2BGrotius%253A%2BDe%2Bimperio%2Bsummarum%2Bpotestatum...-a0110027466"><span data-dcnode-id="712" instrument_node="">Harm-Jan van Dam, trans. Hugo Grotius: De imperio summarum potestatum circa sacra</span></a></div></div><div data-dcnode-id="705" data-periodicals="0"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/_/search/Search.aspx%3FBy%3D0%26SearchBy%3D0%26q%3Didiomatic" rel="nofollow" style="margin-top:12px;float:right"><b data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">More results ►</span></b></a></div><span data-dcnode-id="704" instrument_node="">
