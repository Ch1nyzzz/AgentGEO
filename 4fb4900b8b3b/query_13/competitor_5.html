</span><span data-dcnode-id="710" instrument_node="">
</span><h2 class="gb-single-title" data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">
</span><a data-dcnode-id="707" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greekboston.com/category/learn-speak/" rel="tag"><span data-dcnode-id="708" instrument_node="">Learn How to Speak Basic Greek</span></a><span data-dcnode-id="706" instrument_node=""> </span></h2><span data-dcnode-id="704" instrument_node="">
</span><span data-dcnode-id="702" instrument_node="">
</span><article class="post-74963 post type-post status-publish format-standard has-post-thumbnail hentry category-learn-speak" data-dcnode-id="490" id="post-74963"><span data-dcnode-id="701" instrument_node="">
</span><span data-dcnode-id="699" instrument_node="">
</span><h1 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">
                        Idiomatic Expressions to Know in Greek                    </span></h1><span data-dcnode-id="696" instrument_node="">
</span><span data-dcnode-id="694" instrument_node="">
</span><div class="breadcrumbs" data-dcnode-id="684"><span data-dcnode-id="693" instrument_node="">
</span><span data-dcnode-id="691" instrument_node="">
</span><a class="home" data-dcnode-id="689" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greekboston.com/" title="Go to ."><span data-dcnode-id="690" instrument_node="">Home</span></a><span data-dcnode-id="688" instrument_node=""> &gt; </span><a class="taxonomy category" data-dcnode-id="686" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greekboston.com/category/learn-speak/" title="Go to the Learn How to Speak Basic Greek category archives."><span data-dcnode-id="687" instrument_node="">Learn How to Speak Basic Greek</span></a><span data-dcnode-id="685" instrument_node=""> &gt; Idiomatic Expressions to Know in Greek                    </span></div><span data-dcnode-id="683" instrument_node="">
</span><div class="bottom-share" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="661"><span class="date" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node=""> </span></span><span data-dcnode-id="675" instrument_node="">
</span><span class="author" data-dcnode-id="668"><span data-dcnode-id="674" instrument_node="">Written by </span><a data-dcnode-id="672" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greekboston.com/author/greekboston-com/" rel="author" title="Posts by GreekBoston.com"><span data-dcnode-id="673" instrument_node="">GreekBoston.com</span></a><span data-dcnode-id="671" instrument_node=""> in </span><a data-dcnode-id="669" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greekboston.com/category/learn-speak/" rel="tag"><span data-dcnode-id="670" instrument_node="">Learn How to Speak Basic Greek</span></a></span><span data-dcnode-id="667" instrument_node="">
</span><span class="comments" data-dcnode-id="662"><span data-dcnode-id="663"><span data-dcnode-id="666" instrument_node="">Comments Off</span><span class="screen-reader-text" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node=""> on Idiomatic Expressions to Know in Greek</span></span></span></span></p><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="658" instrument_node="">
</span><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="651"><img alt="" class="alignright wp-image-74964" data-dcnode-id="653" height="177" sizes="(max-width: 266px) 100vw, 266px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greekboston.com/wp-content/uploads/2018/12/Idiomatic-Expressions-Greek-720x480.jpg&amp;raw" srcset="https://www.greekboston.com/wp-content/uploads/2018/12/Idiomatic-Expressions-Greek-720x480.jpg 720w, https://www.greekboston.com/wp-content/uploads/2018/12/Idiomatic-Expressions-Greek-768x512.jpg 768w, https://www.greekboston.com/wp-content/uploads/2018/12/Idiomatic-Expressions-Greek-900x600.jpg 900w, https://www.greekboston.com/wp-content/uploads/2018/12/Idiomatic-Expressions-Greek-250x167.jpg 250w" width="266"><span data-dcnode-id="652" instrument_node="">In every language, there are certain expressions and phrases that can’t be directly translated from one language to another because the meaning is different than what it appears. For example, an idiomatic expression in English is, “What’s up?” We aren’t actually asking about what is literally above our heads. We want to know how the person is doing. There are expressions like this in Greek, as well, and it is worth becoming familiar with them.</span></p><span data-dcnode-id="650" instrument_node="">
</span><h3 data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Idiomatic Expressions in the Greek Language</span></h3><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">According to&nbsp;</span><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Webster’s Dictionary</span></em><span data-dcnode-id="643" instrument_node="">, a idiom is, “an expression that cannot be understood from the meanings of its separate words but must be learned as a whole The expression “give up,” meaning “surrender,” is an idiom.” Greece has plenty of them! Here’s a look at some of them:</span></p><div class="ntyzYaN6" data-dcnode-id="633" style="clear:both;float:left;width:100%;margin:0 0 20px 0;"><span data-dcnode-id="640" instrument_node="">
</span><span data-dcnode-id="638" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1522593806433134" data-ad-slot="7358078404" data-dcnode-id="637" style="display:inline-block;width:300px;height:250px"></ins><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span><ul data-dcnode-id="570"><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="627"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">μπαίνω στον κόπο</span></strong><span data-dcnode-id="628" instrument_node=""> – bano ston kopo – to get into trouble</span></li><span data-dcnode-id="626" instrument_node="">
</span><li data-dcnode-id="622"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">μου ανέβηκε το αίμα στο κεφάλι</span></strong><span data-dcnode-id="623" instrument_node="">&nbsp;– mou anevike to ema sto kefali – it made my blood boil (literally, it made the blood go up into my head)</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="617"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">τα κάνω άνω κάτω&nbsp;</span></strong><span data-dcnode-id="618" instrument_node="">–&nbsp;ta kano ano kato – to make a mess (literally, to make them upside down)</span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="612"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">κάτσε στ’αβγά σο</span></strong><span data-dcnode-id="613" instrument_node="">&nbsp;– katse stavga so – to stay put, to stay uninvolved (literally, to sit on your eggs)</span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="607"><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">έγινε άλλος άνθρωπος&nbsp;</span></strong><span data-dcnode-id="608" instrument_node="">– eyine allos anthropos – to become another person (used when someone changes a lot, as would be the case if someone had a makeover)</span></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="602"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">κάνει τη πάπια</span></strong><span data-dcnode-id="603" instrument_node=""> – kanei ti papia – to not mention something to avoid getting in trouble for it (literally, to do the duck)</span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="597"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">βγήκα απ’τα ρούχα μου</span></strong><span data-dcnode-id="598" instrument_node=""> – vika apta rouha mou – to become enraged (literally, to come out of my clothes)</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="592"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">βρέχει καρεκλοπόδαρα</span></strong><span data-dcnode-id="593" instrument_node=""> – vrfehei kareklopothara – the equivalent of the English expression, “it’s raining cats and dogs” (literally, it is raining chair legs)</span></li><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="587"><strong data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">είμαι ανοιχτό βιβλίο</span></strong><span data-dcnode-id="588" instrument_node=""> – eimai anihto vivlio – I am an open book (literal), I wear my hear on my sleeve (similar meaning and usage as in English)</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="582"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">μαύρη μέρα κι άραχνη</span></strong><span data-dcnode-id="583" instrument_node=""> – mavri mera ki arahni – to have a bad day (literally, black day and spidery)</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="577"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">δεν ξέρω την τύφλα μου</span></strong><span data-dcnode-id="578" instrument_node=""> – then xero tin tiffla moo – to be clueless (literally, to not know my blindness)</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="572"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">μου έφαγες τα αυτιά</span></strong><span data-dcnode-id="573" instrument_node=""> – moo efayes ta aftia – you are talking too much (literally, you ate my ears)</span></li><span data-dcnode-id="571" instrument_node="">
</span></ul><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">As you can see, the literal meanings of the expressions is also included besides the actual meaning or use of the expression. It is a good idea to get as familiar with these as possible so when you encounter it when you are working in the Greek language, you will know how that you can’t translate it literally.</span></p><span data-dcnode-id="566" instrument_node="">
</span><hr data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">
