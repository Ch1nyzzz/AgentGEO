</span><meta content="
	Non-native speakers of English are found in different parts of the world. The usage of Idiomatic expressions by those speakers is considered as an important issue and is regarded as an essential part of the English Language competence. It is a necessity that all speakers of the English Language become aware and proficient in using English idiomatic expressions. It is essential and is considered a big part of English language proficiency to be able to use idiomatic expression when communicating in the English Language. However, many English learners, especially those of Arabic origin, lack the competence to use English idiomatic expressions adequately. This paper aims to discuss the importance of idiomatic expressions to English language learners. In this paper, personal suggestions have been reached for better idiomatic comprehension and acquisition. Contributions have been made by the author regarding the importance of understanding and how to better use idioms.

	&amp;nbsp;

	Key words: Idiomatic expressions, native speakers, non-native speakers, linguistics.

</span><div class="col-lg-9" data-dcnode-id="513"><span data-dcnode-id="1222" instrument_node="">
</span><div class="articles abstract_details" data-dcnode-id="545"><span data-dcnode-id="1221" instrument_node="">
</span><div class="article_images" data-dcnode-id="547"><span data-dcnode-id="1220" instrument_node="">
</span><p class="heading" data-dcnode-id="1216" id="ABSTRACT"><span data-dcnode-id="1219" instrument_node="">
&nbsp;</span><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">ABSTRACT</span></strong></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1214"></p><p data-dcnode-id="1212" style="text-align: justify;"><span data-dcnode-id="1213" instrument_node="">
Non-native speakers of English are found in different parts of the world. The usage of Idiomatic expressions by those speakers is considered as an important issue and is regarded as an essential part of the English Language competence. It is a necessity that all speakers of the English Language become aware and proficient in using English idiomatic expressions. It is essential and is considered a big part of English language proficiency to be able to use idiomatic expression when communicating in the English Language. However, many English learners, especially those of Arabic origin, lack the competence to use English idiomatic expressions adequately. This paper aims to discuss the importance of idiomatic expressions to English language learners. In this paper, personal suggestions have been reached for better idiomatic comprehension and acquisition. Contributions have been made by the author regarding the importance of understanding and how to better use idioms.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209" style="text-align: justify;"><span data-dcnode-id="1210" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1203" style="text-align: justify;"><span data-dcnode-id="1207" instrument_node="">
</span><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Key words:</span></strong><span data-dcnode-id="1204" instrument_node=""> Idiomatic expressions, native speakers, non-native speakers, linguistics.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1201"></p><span data-dcnode-id="1200" instrument_node="">
</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="1190"><span data-dcnode-id="1197" instrument_node="">
</span><p class="heading" data-dcnode-id="1192" id="INTRODUCTION"><span data-dcnode-id="1196" instrument_node="">
&nbsp;</span><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">INTRODUCTION</span></strong><span data-dcnode-id="1193" instrument_node="">
</span></p><span data-dcnode-id="1191" instrument_node="">
</span></div><span data-dcnode-id="1189" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="1147"><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">
</span></p><div data-dcnode-id="1175"><span data-dcnode-id="1185" instrument_node="">
</span><div data-dcnode-id="1183" style="text-align: justify;"><span data-dcnode-id="1184" instrument_node="">
Idiomatic expressions are part of every language. According to Boers (2008) in MED Magazine, all languages have idioms and are full of them. Native speakers tend to use idiomatic expressions spontaneously without thinking of the figurative meaning. It is natural that non-native speakers find idioms difficult to understand because they do not know what the image of the idiomatic expression is based on. For example, if non-native speakers of English Language come across the expression that exams are part of a "carrot and stick" method, they will find it difficult to process. Non-native speakers will find it uneasy because they are unable to realize that it is based on the image &nbsp;of &nbsp;a &nbsp;donkey &nbsp;that &nbsp;is encouraged to move forward by dangling a carrot in front of it or by hitting it with a stick.</span></div><span data-dcnode-id="1182" instrument_node="">
</span><div data-dcnode-id="1180" style="text-align: justify;"><span data-dcnode-id="1181" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1179" instrument_node="">
</span><div data-dcnode-id="1177" style="text-align: justify;"><span data-dcnode-id="1178" instrument_node="">
Thus, it is almost impossible for a non-native speaker who is unfamiliar with this idiom to imagine that such an idiom is used to describe any event which involves rewards ( a carrot) and threats (the stick). If a non-native speaker is unfamiliar with the idiom "show you the ropes" and comes across such an expression, he or she will find it difficult to immediately understand. As such, they will find it difficult to realize that this expression proposes to teach one how a certain job is done. If these non-native speakers were told that such an idiomatic expression is used in a sailing context &nbsp;in &nbsp;which &nbsp;experienced &nbsp;sailors</span></div><span data-dcnode-id="1176" instrument_node="">
</span></div><span data-dcnode-id="1174" instrument_node="">
</span><div data-dcnode-id="1172" style="text-align: justify;"><span data-dcnode-id="1173" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1171" instrument_node="">
</span><div data-dcnode-id="1169" style="text-align: justify;"><span data-dcnode-id="1170" instrument_node="">
teach a novice how to handle the ropes on a boat, this may help them to understand and realize its meaning. Consequently, realizing the image that the idiom is based on and the origin of the idiom could help in resolving the figurative meaning of that particular idiom. Using the idiom in a certain context rather than using it alone may also help non-natives who are unfamiliar with that idiom to realize and figure out the metaphorical meaning.</span></div><span data-dcnode-id="1168" instrument_node="">
</span><div data-dcnode-id="1166" style="text-align: justify;"><span data-dcnode-id="1167" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1165" instrument_node="">
</span><div data-dcnode-id="1163" style="text-align: justify;"><span data-dcnode-id="1164" instrument_node="">
In Linguistics, idioms are defined as fixed expressions that are typically used in a figurative sense and they have arbitrary meanings. That is, Idiomatic expressions make their meaning by coincidence and by chance. Students are taught that there is no link between an idiom and its meaning and that idioms have to be learned by heart. However, recent research has shown otherwise; it has shown a link between idiomatic expressions and their meanings. The link between an idiom and its meaning could be based on physical experiences, which are universally shared or based on specific domains, which are culturally specific. Realizing the origin of the idiom and what it is based on help in realizing the idiom's metaphorical meaning. These findings will be presented and explained in this paper.</span></div><span data-dcnode-id="1162" instrument_node="">
</span><div data-dcnode-id="1160" style="text-align: justify;"><span data-dcnode-id="1161" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1159" instrument_node="">
</span><div data-dcnode-id="1157" style="text-align: justify;"><span data-dcnode-id="1158" instrument_node="">
In the English language, idiomatic expressions are spontaneously used by native speakers daily. It is an essential part of the English language lexicon and vocabulary. Idiomatic expressions are, therefore, considered inevitable for non-native speakers of English. As a result, Non-native speakers of English should get accustomed to using these expressions. Non-native speakers of English need to learn idiomatic expressions and practice how to use them, parallel to native speakers. As such, it is a requirement to include idiomatic expressions in English as a second language (ESL) and English as a foreign language (EFL) classrooms and in their teaching materials.</span></div><span data-dcnode-id="1156" instrument_node="">
</span><div data-dcnode-id="1154" style="text-align: justify;"><span data-dcnode-id="1155" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1153" instrument_node="">
</span><div data-dcnode-id="1151" style="text-align: justify;"><span data-dcnode-id="1152" instrument_node="">
The Literature Review section will present and explain such issues and will present previous linguistic studies as well as recent research in the area of idiomatic expressions. It will also explain the link between idiomatic expressions and their meanings. The differences between native and non-native speakers in the area of understanding English idioms will also be clarified. Personal experiences as an English Language learner, teacher and researcher will be mentioned and listed. Results and findings will be stated and summarized to support the fact that idioms are a necessity. The use of figurative expressions and metaphorical speech is essential and indispensable in EFL/ESL environments in order to reach a more native-like language proficiency and knowledge.</span></div><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1149"></p><span data-dcnode-id="1148" instrument_node="">
</span></div><span data-dcnode-id="1146" instrument_node="">
</span><br data-dcnode-id="1145"><span data-dcnode-id="1144" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="1136"><span data-dcnode-id="1143" instrument_node="">
</span><p class="heading" data-dcnode-id="1138" id="LITERATURE REVIEW"><span data-dcnode-id="1142" instrument_node="">
&nbsp;</span><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">LITERATURE REVIEW</span></strong><span data-dcnode-id="1139" instrument_node="">
</span></p><span data-dcnode-id="1137" instrument_node="">
</span></div><span data-dcnode-id="1135" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="1078"><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">
</span></p><div data-dcnode-id="1130" style="text-align: justify;"><span data-dcnode-id="1131" instrument_node="">
Idiomatic expressions, also known as idioms, are numerous and repeatedly occur in the English language.</span></div><span data-dcnode-id="1129" instrument_node="">
</span><div data-dcnode-id="1127" style="text-align: justify;"><span data-dcnode-id="1128" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1126" instrument_node="">
</span><div data-dcnode-id="1124" style="text-align: justify;"><span data-dcnode-id="1125" instrument_node="">
It is estimated that the English language contains at least 25,000 idiomatic expressions (Idiomatic Expression, 2014). English idiomatic expressions are used in both formal and informal communications (Laflin, 1996). However, Non-native speakers of English have been found incapable of using Idiomatic expressions. Unlike native speakers of English, non-native speakers lack the ability to use Idiomatic expressions and to understand their meanings adequately. This presents a problem in non-native speakers' knowledge and proficiency of the English language and is considered a gap in their language learning process. Ambrose (2008) opines that understanding the lexicon of English demands more than knowing the denotative meaning of words. It requires its speakers to have connotative word comprehension and an understanding of figurative language, and idioms fall into this final category.</span></div><span data-dcnode-id="1123" instrument_node="">
</span><div data-dcnode-id="1121" style="text-align: justify;"><span data-dcnode-id="1122" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1120" instrument_node="">
</span><div data-dcnode-id="1118" style="text-align: justify;"><span data-dcnode-id="1119" instrument_node="">
Idiomatic Expressions are defined as an expression whose meanings cannot be inferred from the meanings of the words that make it up (Idiomatic Expression, 2014). On the other hand, it is also defined as an expression, word, or phrase that has a figurative meaning conventionally understood by native speakers. This meaning is different from the literal meaning of the idiom's individual elements. In other words, idioms don't mean exactly what the words say. They have, however, hidden meanings (Idiomatic Expressions, 2015). For example, the idiomatic expression "to kick the bucket" has nothing to do with the physical action of kicking a bucket with your legs, which is part of your body. The idiom "to kick the bucket" means "to die". So, an idiomatic expression carries a figurative meaning, not a literal one. That is, it carries a meaning that cannot be understood just by the literal meanings of the words that make it up. Another example is "to spill the beans", which also has nothing to do with the actual physical action of spilling or dropping a can or plate of beans. What it actually mean "to spill the beans" is to "tell a secret". As can be seen, this previous idiomatic expression carries a meaning that is figurative, not literal (Cowie et al., 1983). As a result, idiomatic expressions in linguistics are said to be figures of speech (figurative language) (Lyons, 1997). Thus, in linguistics, idiomatic expressions oppose the principle of compositionality, which states that the meaning of a whole should be constructed from the meanings of the parts that make up the whole. In other words, one should be in a position to understand the whole if one understands the meanings of each of the parts that make up the whole. (Wikipedia, 2015).</span></div><span data-dcnode-id="1117" instrument_node="">
</span><div data-dcnode-id="1115" style="text-align: justify;"><span data-dcnode-id="1116" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1114" instrument_node="">
</span><div data-dcnode-id="1112" style="text-align: justify;"><span data-dcnode-id="1113" instrument_node="">
Thus, for example, the idiomatic expression "to pull someone's leg" means to fool them by telling them something untrue. The idiomatic expression "it is raining cats and dogs" means that it is raining heavily. Another example of an idiomatic expression and how it carries a whole meaning that is different from the literal meaning of its parts is, "it is not rocket science" which means that it is not difficult (Ibid).</span></div><span data-dcnode-id="1111" instrument_node="">
</span><div data-dcnode-id="1109" style="text-align: justify;"><span data-dcnode-id="1110" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1108" instrument_node="">
</span><div data-dcnode-id="1106" style="text-align: justify;"><span data-dcnode-id="1107" instrument_node="">
In Linguistics, it is known that idiomatic expressions carry arbitrary meanings. That is, idioms mean what they mean for no reason other than coincidence.&nbsp; Idiomatic expressions in linguistics are said to randomly carry the meanings that they do (Boers, 2008). However, it has been found by recent research, that many idioms are explainable and carry non-arbitrary meanings. Idiomatic expressions are found to carry meanings due to reasonable causes. Recent research tells us that idioms are non-arbitrary features of a language. Fortunately, teaching students that idioms carry non-arbitrary meanings help them to realize their meanings and memorize them. So, instead of teaching students to memorize idioms by heart, which is difficult, idioms can be taught in a systematic way. In such a way, idiomatic expressions become much easier to understand and remember (Ibid).</span></div><span data-dcnode-id="1105" instrument_node="">
</span><div data-dcnode-id="1103" style="text-align: justify;"><span data-dcnode-id="1104" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1102" instrument_node="">
</span><div data-dcnode-id="1100" style="text-align: justify;"><span data-dcnode-id="1101" instrument_node="">
Idioms mean what they mean for a reason. For example, idiomatic expressions such as "hot under the collar", "breathe fire", and "let off steam" refer to being angry. These three idioms carry the meaning that they do because anger is processed through the image of something hot inside. By being angry, one's body temperature is raised and that is why many people get red in the face when angry. Also, for instance, the idiomatic expressions "lend someone a hand", "try your hand at something" and "have your hands tied" all refer to the meaning of performing an action.&nbsp; These idioms carry this meaning based on the image that we use our hands usually to perform most activities. Nevertheless, many other types of idioms are derived from specific domains and specific areas of experience. For example, the idiom "clear the decks" which means “to finish a job completely"; the idiom "a leading light" which means "a good example to follow"; and the idiom "be on an even keel" which means "to make steady progress" are all derived from "sailing". Idioms such as "stick to your guns", which means "to refuse to change your opinion"; "fight a losing battle", which means "to be unlikely to succeed"; and "be in the front line", meaning "to have an important role" are all derived from the domain of "war". Other idioms are derived from other experience domains, such as entertainment, cooking or sports. Even though some of these domains may no longer exist and are uncommon today, learning the original context the idiom was derived from and the original image the idiom is based on will help in understanding its meaning. So, if one recognizes the origin of the idiom, one will be able to work out its meaning. As a result, idioms carry their meanings not by coincidence or chance and not for unexplainable reasons (Ibid).</span></div><span data-dcnode-id="1099" instrument_node="">
</span><div data-dcnode-id="1097" style="text-align: justify;"><span data-dcnode-id="1098" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1096" instrument_node="">
</span><div data-dcnode-id="1094" style="text-align: justify;"><span data-dcnode-id="1095" instrument_node="">
Despite the difficulty that non-native speakers of English Language might face in realizing and understating the meaning of idioms, understanding idioms and knowing their actual meaning is a necessity. Idiomatic expressions are used in both formal and informal communications. Native speakers of English use idiomatic expressions daily, naturally and spontaneously, unlike non-native speakers of English who lack this very essential language skill. Non-native speakers of English, from various backgrounds, are found incapable of using idiomatic expressions when communicating in English Language and are found incompetent to understand their meanings.&nbsp; It might not be a piece of cake for non-natives to use idioms but it is considered a vital part of the English Language. As mentioned, idiomatic expressions are used in formal and informal speech. They are part of the standard business, media, and everyday life, talking about written or spoken English. Thus, non-native speakers of English should learn idiomatic expressions in order to be able to communicate effectively and sound more natural and native-like. It could be said that the more a non-native speaker is capable of understanding and using idiomatic expressions, the closer he or she is to the native proficiency of the English language (Teaching Idiomatic Expressions, 2015).</span></div><span data-dcnode-id="1093" instrument_node="">
</span><div data-dcnode-id="1091" style="text-align: justify;"><span data-dcnode-id="1092" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1090" instrument_node="">
</span><div data-dcnode-id="1088" style="text-align: justify;"><span data-dcnode-id="1089" instrument_node="">
Furthermore, idiomatic expressions are found to be culture-based. That is, idiomatic expressions carry within them the history, heritage, culture and customs of its native users (Rizq, 2015). It can be said that idioms that are derived from physical human experiences are, in general, culturally equal. That is, idioms that are based on physical human experiences, such as anger being associated with heat are easier to recognize and understand by non-natives. Due to the strong similarities across different cultures in basic physical experiences such as, being sick or well, hot or cold, idioms that are derived from such images are often the same and fairly easy to understand (Boers, 2008). However, idioms that are derived from specific domains are usually different across cultures, because these domains are not equally important across cultures. For instance, many idiomatic expressions in the English language are derived from sailing because of England's history as a seafaring country. English Language, for example, has many idioms such as "neck and neck" meaning “it is hard to say who will win”; "win hands down" meaning "to win easily"; and "go off the rails" meaning "to go wrong or out of control". These three idioms are derived from horse racing due to the popularity of horse racing as a sport in England. So, as mentioned, specific domains are not equally shared and are not equally important across cultures. As such, idioms derived from such domains are more difficult to realize and understand by non-native speakers of the English Language. Unlike idioms derived from physical experiences which are universal, it has been found that idiomatic expressions that are derived from specific domains may not be culturally shared and therefore harder to grasp and understand (Ibid).</span></div><span data-dcnode-id="1087" instrument_node="">
</span><div data-dcnode-id="1085" style="text-align: justify;"><span data-dcnode-id="1086" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1084" instrument_node="">
</span><div data-dcnode-id="1082" style="text-align: justify;"><span data-dcnode-id="1083" instrument_node="">
Thus, learning idiomatic expressions also teaches non-native speakers of a language the culture of its people (Ovando and Collier, 1985). As a result, the more the learner of English is aware of idioms and their meanings, the better knowledge that learner carries of the English culture.&nbsp;</span></div><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1080"></p><span data-dcnode-id="1079" instrument_node="">
</span></div><span data-dcnode-id="1077" instrument_node="">
</span><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node="">
</span><p class="heading" data-dcnode-id="1069" id="METHODOLOGY"><span data-dcnode-id="1073" instrument_node="">
&nbsp;</span><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">METHODOLOGY</span></strong><span data-dcnode-id="1070" instrument_node="">
</span></p><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="1051"><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">
</span></p><div data-dcnode-id="1061" style="text-align: justify;"><span data-dcnode-id="1062" instrument_node="">
As an English language learner, teacher, and researcher, it has been noticed by the author of this paper that there are noticeable differences between professors, native and non-native, in their use of idiomatic expressions. It has been observed that native English speaking professors used idiomatic expressions when communicating in EFL/ESL classrooms. Nevertheless, non-native English speaking teachers used them scarcely or rarely despite the fact that many of them attained their M.A. and Ph.D. from native English speaking countries and from prestigious universities. This indeed has an impact on academic performance and thus, lead&nbsp; the author to investigate in this area and to emphasize the importance of teaching idioms in EFL/ESL classrooms It is needed that more emphasis should be on idiomatic knowledge in EFL/ESL environments and materials. Lack of knowledge in idiom is a lack of one's English language knowledge in general because idioms are used in both spoken and written English and are very common.</span></div><span data-dcnode-id="1060" instrument_node="">
</span><div data-dcnode-id="1058" style="text-align: justify;"><span data-dcnode-id="1059" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1057" instrument_node="">
</span><div data-dcnode-id="1055" style="text-align: justify;"><span data-dcnode-id="1056" instrument_node="">
The qualitative approach was used as the methodology of this work, relying on the analysis and description of previous researches and studies of idiomatic expressions and their importance. This paper relies on analysis of previous evidence and case studies. By analyzing and studying such data, results and data are collected. Also, several studies regarding idiomatic expressions, how to improve their acquisition and how to better teach them have been studied, compared and summarized. Results have been reached and stated based on such findings.</span></div><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1053"></p><span data-dcnode-id="1052" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">
</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="1040"><span data-dcnode-id="1047" instrument_node="">
</span><p class="heading" data-dcnode-id="1042" id="RESULTS"><span data-dcnode-id="1046" instrument_node="">
&nbsp;</span><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">RESULTS</span></strong><span data-dcnode-id="1043" instrument_node="">
</span></p><span data-dcnode-id="1041" instrument_node="">
</span></div><span data-dcnode-id="1039" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="1024"><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">
</span></p><div data-dcnode-id="1034" style="text-align: justify;"><span data-dcnode-id="1035" instrument_node="">
Teaching idiomatic expressions in EFL/ESL environments and classrooms is a necessity. Nevertheless, most importantly is that non-native speakers should practice how to use idiomatic expressions. The more a non-native speaker of English is capable of using idiomatic expressions, the closer he or she is to English Language competence. Using idiomatic expressions in an adequate amount, parallel to native speakers brings the non-native speaker closer to English Language proficiency. Lack of idiomatic use and knowledge by non-native speakers equates their lack of English language competence.</span></div><span data-dcnode-id="1033" instrument_node="">
</span><div data-dcnode-id="1031" style="text-align: justify;"><span data-dcnode-id="1032" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1030" instrument_node="">
</span><div data-dcnode-id="1028" style="text-align: justify;"><span data-dcnode-id="1029" instrument_node="">
Idiomatic use and knowledge is not an easy task. That is, learning idioms, their meanings and the ability to use them copiously is not easily attainable. Nevertheless, this is not to be taken as a motive to disregard them. Idiomatic expressions must be included in English Language learning environments, materials, and EFL/ESL classrooms. Teachers of English must inspire their students to become aware of idiomatic expressions. They should point out to their students the importance of the knowledge and usage of idioms, in order to be in a parallel position to native speakers. Teachers of English should not neglect such an important skill and should make their students realize it.</span></div><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1026"></p><span data-dcnode-id="1025" instrument_node="">
</span></div><span data-dcnode-id="1023" instrument_node="">
</span><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="1013"><span data-dcnode-id="1020" instrument_node="">
</span><p class="heading" data-dcnode-id="1015" id="DISCUSSION"><span data-dcnode-id="1019" instrument_node="">
&nbsp;</span><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">DISCUSSION</span></strong><span data-dcnode-id="1016" instrument_node="">
</span></p><span data-dcnode-id="1014" instrument_node="">
</span></div><span data-dcnode-id="1012" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="961"><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">
</span></p><div data-dcnode-id="1007" style="text-align: justify;"><span data-dcnode-id="1008" instrument_node="">
Here, it is suggested that it &nbsp;is best &nbsp;to teach frequently used idiomatic expressions that one might come across when watching television programs, reading books, listening to music and when communicating with native speakers. Teachers may ask their students to write down idiomatic expressions they come across when using English Language (Cooper, 1999).&nbsp; Finding the meaning of idiomatic expressions may not be as easy as one might think. For instance, the meaning of an idiomatic expression is not always included in the dictionary. Actually, the dictionary may give you the literal meaning of the words composing an idiomatic expression.&nbsp; As mentioned by Jacqueline Ambros, ideally vocabulary shouldn’t be learned in a vacuum, and this especially is true for idioms. There are a variety of idiom dictionaries for those who wish to learn more about idioms. Newspapers and magazines, radio programs, television shows and films are also sources of idioms. Roleplaying, writing and interactive activities such as matching the parts of idioms are some activities that can help second language (L2) speakers expand their knowledge and use of idioms. (Ambrose, 2015).</span></div><span data-dcnode-id="1006" instrument_node="">
</span><div data-dcnode-id="1004" style="text-align: justify;"><span data-dcnode-id="1005" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="1003" instrument_node="">
</span><div data-dcnode-id="1001" style="text-align: justify;"><span data-dcnode-id="1002" instrument_node="">
Therefore, using special dictionaries that explain idiomatic expressions and their meanings is needed. One may also search the internet in order to find the meaning of an idiomatic expression (Teaching Idiomatic Expressions, 2015). According to Rodriguez and Winnberg (2013) there are multiple methods that can be used in EFL/ESL classroom for the purpose of teaching idiomatic expressions. Learners are unique and each individual learns in a way that differs from another. Nevertheless, generalizations could be made and used when planning lessons in the aim of improving the acquisition of idioms by students.</span></div><span data-dcnode-id="1000" instrument_node="">
</span><div data-dcnode-id="998" style="text-align: justify;"><span data-dcnode-id="999" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="997" instrument_node="">
</span><div data-dcnode-id="995" style="text-align: justify;"><span data-dcnode-id="996" instrument_node="">
As stated by Nation (2001), idioms are to be taught based on frequency and range of occurrence. The more frequent the idiom occurs, the more important it is to be taught in ESL/EFL environments. In this way, idioms are dealt with as if they were single words and a part of everyday vocabulary. Here, it is suggested that such items be learned deliberately and explicitly. So, in this way idioms are not to be taught by incidental learning, despite the fact that incidental learning is more effective and easy. Learning incidentally is more gradual, slower and lacks the focused attention of explicit learning. As a result, it is suggested that learning idioms should be similar to learning individual words. Therefore, idiomatic expressions should be learned unambiguously. This method of teaching idioms supports the use of repetition when teaching idiomatic expressions (Ibid).</span></div><span data-dcnode-id="994" instrument_node="">
</span><div data-dcnode-id="992" style="text-align: justify;"><span data-dcnode-id="993" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="991" instrument_node="">
</span><div data-dcnode-id="989" style="text-align: justify;"><span data-dcnode-id="990" instrument_node="">
It is also suggested that the learners of English should take responsibility for their own learning. They should try to speak the language in order to become aware of their language weaknesses and the parts that need improvement. The more they speak the language, the more they may realize their gaps in the language. This is also a strategy that needs to be considered as regard idiom &nbsp;learning &nbsp;(Ibid). &nbsp;Other &nbsp;strategies &nbsp;regarding &nbsp;idiom teaching and learning focus attention on the importance of age in regard to correct interpretation of the metaphorical meaning. That is, a child should be of a certain age to acquire certain knowledge. It is suggested that children at the age of nine years interpret idioms literally and thus learners have to reach a certain age before being exposed to idiomatic expressions (Ibid). Also, idioms that occur in context are easier to interpret, because there is more information that the listener can rely on in order to realize the meaning (Ibid:17).</span></div><span data-dcnode-id="988" instrument_node="">
</span><div data-dcnode-id="986" style="text-align: justify;"><span data-dcnode-id="987" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="985" instrument_node="">
</span><div data-dcnode-id="983" style="text-align: justify;"><span data-dcnode-id="984" instrument_node="">
Furthermore, idiomatic expressions that occur in both the learners first and target language are easier to remember and interpret, despite some interference. It has been found that idiomatic expressions that completely differ from the learners' native language are harder and more difficult to process and understand (Ibid). Additionally, as mentioned earlier in this paper, many idiomatic expressions are based on images, for example, "I'm so hungry I could eat a horse", is used to show the listener just how hungry the speaker is. Also, most idiomatic expressions carry non-arbitrary meanings, which mean that there is a link between an idiom and its meaning. Being aware of these links, the origin of the idiom and the image that the idiomatic expression is based on is one way to better help students learn and remember idioms. Teachers of English Language should be trained to be aware of the origin of idioms; so that they in turn can improve their students understanding of idioms and help them to remember.</span></div><span data-dcnode-id="982" instrument_node="">
</span><div data-dcnode-id="980" style="text-align: justify;"><span data-dcnode-id="981" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="979" instrument_node="">
</span><div data-dcnode-id="977" style="text-align: justify;"><span data-dcnode-id="978" instrument_node="">
It is suggested in this paper that the English language teachers should be aware of idioms and their origins and they should in turn explain to their students. Teaching such information will help learners better understand and remember idioms. Explaining the images that an idiom is based on simplifies the learners acquisition of that idiom and helps the learner remember the idiom more effectively.&nbsp; The teacher should also allow the learners to communicate using idioms in classrooms and ESL/EFL environments. Moreover, teachers should encourage their students to apply this new knowledge outside classrooms and to learn more in their spare time. Learners should be encouraged to listen to news, watch television programs and read materials that include idioms and idiomatic expressions (Chen and Lai 2013).</span></div><span data-dcnode-id="976" instrument_node="">
</span><div data-dcnode-id="974" style="text-align: justify;"><span data-dcnode-id="975" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="973" instrument_node="">
</span><div data-dcnode-id="971" style="text-align: justify;"><span data-dcnode-id="972" instrument_node="">
Idiomatic expressions are an essential part of every language and are built upon the history, heritage, customs and culture of a nation. Therein, learning the idiomatic expressions of a certain language helps one become more knowledgeable about the history, and social norms of the native speakers of that particular language. According to Ambrose (2008), idioms share cultural and historical information and broadens people’s understanding and manipulation of a language. Native English speakers grow up using idiomatic expressions on a daily basis. This is because they are raised listening to idioms and using them almost every day. Consequently, it might seem a challenge for non-native speakers of English to learn idiomatic expressions, similar to &nbsp;natives, but they can be learned with time and practice (Ambrose, 2008).</span></div><span data-dcnode-id="970" instrument_node="">
</span><div data-dcnode-id="968" style="text-align: justify;"><span data-dcnode-id="969" instrument_node="">
&nbsp;</span></div><span data-dcnode-id="967" instrument_node="">
</span><div data-dcnode-id="965" style="text-align: justify;"><span data-dcnode-id="966" instrument_node="">
As mentioned above, idiomatic expressions are culture bound and they carry the cultural beliefs and customs of their native language users. As such, non-native users of English Language may be influenced by his or her culture regarding their realization of the meaning of their idiomatic expressions. Nevertheless, learning idiomatic expressions will enable the English Language learner to become more knowledgeable and better aware of the English culture and customs (Fromkin et al., 2003). The importance of idiomatic Expressions also lies in the fact that it is an everyday routine of the native English speakers' language. Learning idiomatic expressions by non-natives leads them to better English proficiency, help their second or foreign language seem more native-like, and more creative. Thus, learning English idiomatic expressions improves one's second or foreign language skills; helps non-native speakers of a language understand that target language better and therefore should not be taken for granted (Yule, 2006). According to Maisa and Karunakaran (2013) No translator or language teacher can afford to ignore idioms if a natural use of the target language is an aim.</span></div><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="963"></p><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="950"><span data-dcnode-id="957" instrument_node="">
</span><p class="heading" data-dcnode-id="952" id="CONCLUSIONS"><span data-dcnode-id="956" instrument_node="">
&nbsp;</span><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">CONCLUSIONS</span></strong><span data-dcnode-id="953" instrument_node="">
</span></p><span data-dcnode-id="951" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="940"><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">
</span></p><div data-dcnode-id="944" style="text-align: justify;"><span data-dcnode-id="945" instrument_node="">
Idiomatic expressions or idioms should not be neglected and should not be taken for granted. Idioms are used daily and repeatedly by native speakers of English Language. Idiomatic expressions are a part of every language's vocabulary and are based on that language history, heritage, and culture. Learning idiomatic expressions helps non-native speakers of a language become more fluent, and sound more native-like. Learning idiomatic expressions increases the vocabulary and lexicon of the English Language learner. Moreover, idiomatic knowledge leads to a better understanding of the culture and customs of that particular language. English language teachers should teach idiomatic language to their students and not overlook such a vital issue because becoming more native-like in English Language is by learning idiomatic expressions, understanding their meanings and using them frequently parallel to English Language native speakers.</span></div><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="942"></p><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
</span><div class="enforceHead" data-dcnode-id="929"><span data-dcnode-id="936" instrument_node="">
</span><p class="heading" data-dcnode-id="931" id="CONFLICT OF INTERESTS"><span data-dcnode-id="935" instrument_node="">
&nbsp;</span><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">CONFLICT OF INTERESTS</span></strong><span data-dcnode-id="932" instrument_node="">
</span></p><span data-dcnode-id="930" instrument_node="">
</span></div><span data-dcnode-id="928" instrument_node="">
</span><div class="enforceBody" data-dcnode-id="919"><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">
</span></p><div data-dcnode-id="923" style="text-align: justify;"><span data-dcnode-id="924" instrument_node="">

</span><p data-dcnode-id="921"></p><span data-dcnode-id="920" instrument_node="">
</span></div><span data-dcnode-id="918" instrument_node="">
</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
</span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
</span><p class="heading" data-dcnode-id="910" id="REFERENCES"><span data-dcnode-id="913" instrument_node="">
&nbsp;</span><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">REFERENCES</span></strong></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="908"></p><span data-dcnode-id="907" instrument_node="">
</span><span data-dcnode-id="906" instrument_node="">
</span><span data-dcnode-id="905" instrument_node="">
</span><span data-dcnode-id="899" instrument_node="">
</span><span data-dcnode-id="897" instrument_node="">
</span><span data-dcnode-id="896" instrument_node="">
