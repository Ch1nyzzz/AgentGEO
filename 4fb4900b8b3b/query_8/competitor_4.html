</span><h2 data-dcnode-id="2019" style="text-align: center;"><span data-dcnode-id="2020" instrument_node="">English is so much more than just grammar and words</span></h2><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Don’t you think? It is about different cultural expressions, expressions that sometimes are only used in specific states or small towns. Sometimes it is temporary expressions, it comes and goes when we least expect. Learning expressions and idioms are so important! Today with social media playing such an important role in pretty much everyone’s life, you gotta stay sharp! So how about learning a different expression with me? Don’t forget to leave me a comment after you finish reading this article. I really need your support, so let me know what you think about this article, ok?</span></p><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Look at these phrases below. You can also listen to all of the examples!</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2008"><strong data-dcnode-id="2009"><em data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">I hope this new album is as good as people are saying and lives up to the hype.</span></em></strong></p><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2003"><strong data-dcnode-id="2004"><em data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">The second movie in the Matrix trilogy lived up to the hype. People all over the world can’t stop talking about it!</span></em></strong></p><span data-dcnode-id="2002" instrument_node="">

loaded" data-dcnode-id="1962"></span><span class="mejs-time-current" data-dcnode-id="1961"></span><span class="mejs-time-hovered no-hover" data-dcnode-id="1960"></span><span class="mejs-time-handle" data-dcnode-id="1958"><span class="mejs-time-handle-content" data-dcnode-id="1959"></span></span><span class="mejs-time-float" data-dcnode-id="1954"><span class="mejs-time-float-current" data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">00:00</span></span><span class="mejs-time-float-corner" data-dcnode-id="1955"></span></span></span></div><div class="mejs-time mejs-duration-container" data-dcnode-id="1949"><span class="mejs-duration" data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">00:00</span></span></div><div class="mejs-button mejs-volume-button mejs-mute" data-dcnode-id="1941"><button aria-controls="mep_0" aria-label="Mute" data-dcnode-id="1948" tabindex="0" title="Mute" type="button"></button><a aria-label="Volume Slider" aria-orientation="vertical" aria-valuemax="100" aria-valuemin="0" class="mejs-volume-slider" data-dcnode-id="1942" href="javascript:void(0);" role="slider"><span class="mejs-offscreen" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Use Up/Down Arrow keys to increase or decrease volume.</span></span><div class="mejs-volume-total" data-dcnode-id="1943"><div class="mejs-volume-current" data-dcnode-id="1945" style="bottom: 0px; height: 100%;"></div><div class="mejs-volume-handle" data-dcnode-id="1944" style="bottom: 100%; margin-bottom: -3px;"></div></div></a></div><div class="mejs-button mejs-fullscreen-button" data-dcnode-id="1939"><button aria-controls="mep_0" aria-label="Fullscreen" data-dcnode-id="1940" tabindex="0" title="Fullscreen" type="button"></button></div></div></div></div></div><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1927"><strong data-dcnode-id="1928"><em data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">First Lady Michelle Obama said: Now, I know you all have had a busy, packed, full day — very inspiring, right? &nbsp;&nbsp;And hopefully, our conversation will live up to the hype. &nbsp;</span></em></strong></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1923" instrument_node="">
</span><figure aria-describedby="caption-attachment-565" class="wp-caption alignright" data-dcnode-id="1919" id="attachment_565" style="width: 300px"><img alt="" class="wp-image-565 size-medium" data-dcnode-id="1922" height="221" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherprix.com/wp-content/uploads/2017/06/obama-and-dog-300x221.png&amp;raw" srcset="https://blog.teacherprix.com/wp-content/uploads/2017/06/obama-and-dog-300x221.png 300w, https://blog.teacherprix.com/wp-content/uploads/2017/06/obama-and-dog.png 364w" width="300"><figcaption class="wp-caption-text" data-dcnode-id="1920" id="caption-attachment-565"><span data-dcnode-id="1921" instrument_node="">Ex-president Obama having fun with his dog</span></figcaption></figure><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1915"><em data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Isn’t Michelle great? Ok, totally personal here. I love the Obamas. They are so charismatic and hardworking</span></em></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1907"><em data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Now, let’s try to understand this expression. </span></em><span data-dcnode-id="1908" instrument_node="">what do you think this expression means?</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Hype means exaggerated publicity.&nbsp; The verb in this phrase is a phrasal verb. To live up to. (if you want to know more about this phrasal verb, go to the phrasal verbs section)</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Live up to basically means to fulfill expectations, when something is what you expected it to be.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">In this case, live up to the hype means that something is/was as good as expected, as anticipated by the public.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">For example, in Michelle Obama’s case: she was going to have a conversation with Oprah. People were expecting this conversation to be amazing, to be great. So Michelle starts by saying that she hopes that such conversation fulfills people’s expectations.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Shall we see more examples?</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1885"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Scientists believe this new treatment will not live up to the hype.</span></strong></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">In this case,&nbsp;I’m saying that scientists&nbsp;don’t feel that the new treatment is going to be as good as people expect of anticipate.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1878"><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Adele’s live concert did not live up to the hype and people were pretty upset because of all the technical issues during the show.</span></strong></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">In this case, I’m talking about Adele’s show which was not as good as people imagined it would be, as people thought it would be, as people expected it would be.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Now, the three first examples I gave you have the same idea:</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><strong data-dcnode-id="1868"><em data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">I hope this new album is as good as people are saying and lives up to the hype. </span></em></strong><span data-dcnode-id="1867" instrument_node="">&nbsp;I’m probably talking about a band and their new album which I hope is as good as people are saying it is.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1860"><strong data-dcnode-id="1862"><em data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">The second movie in the Matrix trilogy lived up to the hype. People all over the world can’t stop talking about it! </span></em></strong><span data-dcnode-id="1861" instrument_node="">&nbsp;I’m saying the very same about the movie, but in this, I don’t hope, the movie really was great and people cannot stop talking about it. (Seriously guys, you have to watch this movie, it was great)</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1852"><strong data-dcnode-id="1856"><em data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">The new diet has lived up to the hype. People from everywhere are showing pictures of before and after and the results are amazing. </span></em></strong><em data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1853" instrument_node="">Here I’m talking about a diet which has been proven to be as good as people are saying. People are even sharing before and after pictures to prove the diet works.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Now, how about answering the following questions?</span></p><span data-dcnode-id="1845" instrument_node="">
</span><ol data-dcnode-id="1837"><span data-dcnode-id="1844" instrument_node="">
</span><li data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">How do you feel when a movie you really wanted to watch doesn’t live up to the hype and turns out to be a horrible movie?</span></li><span data-dcnode-id="1841" instrument_node="">
</span><li data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Do you think you favorite singer’s newest album has lived up to the hype?</span></li><span data-dcnode-id="1838" instrument_node="">
</span></ol><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1832" instrument_node="">Don’t forget to leave your message in the comments and answer the questions as well. You know your answer means the world to me </span><img alt="😀" class="emoji" data-dcnode-id="1831" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f600.svg&amp;raw"></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Thanks guys!</span></p><span data-dcnode-id="1826" instrument_node="">
