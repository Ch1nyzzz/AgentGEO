</span><div class="main-content lit-style" data-dcnode-id="552" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><div class="meta-content fm-sec" data-dcnode-id="764"><h1 data-dcnode-id="765" id="_NBK248426_"><span class="label" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Appendix E</span></span><span class="title" data-dcnode-id="766" itemprop="name"><span data-dcnode-id="767" instrument_node="">Cultural Formulation in Diagnosis and Cultural Concepts of Distress</span></span></h1></div><div class="jig-ncbiinpagenav body-content whole_rhythm" data-dcnode-id="553" data-jigconfig="allHeadingLevels: ['h2'],smoothScroll: false" id="ui-ncbiinpagenav-7" itemprop="text"><div data-dcnode-id="702" id="appe.s1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="760"><span data-dcnode-id="761" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="762" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="763" instrument_node="">Go to:</span></a></span></div><h2 class="ui-helper-clearfix" data-dcnode-id="758" id="_appe_s1_"><span data-dcnode-id="759" instrument_node="">Cultural Formulation in Diagnosis</span></h2><p data-dcnode-id="744"><span data-dcnode-id="757" instrument_node="">Clinicians need to consider the effects of </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/tip59/appg/def-item/appg.gl1-d15/" role="button"><span data-dcnode-id="756" instrument_node="">culture</span></a><span data-dcnode-id="754" instrument_node=""> when diagnosing clients. The following cultural formulation adopted by the American Psychiatric Association (APA) in the </span><i data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Diagnostic and Statistical Manual of Mental Disorders</span></i><span data-dcnode-id="751" instrument_node="">, Fifth Edition (DSM-5; 2013, pp. 749–759) provides a systematic outline for incorporating culturally relevant information when conducting a multiaxial diagnostic assessment. Whether or not they are credentialed to diagnose disorders, counselors and other clinical staff can use the main content areas listed below to guide the interview, initial intake, and treatment planning processes. (For review, see </span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="/books/n/tip59/appa/#appa.r660" data-bk-pop-others="" data-bk-pop-rid="/books/n/tip59/appa/def-item/appa.r660/" data-dcnode-id="749" href="#" role="button"><span data-dcnode-id="750" instrument_node="">Mezzich and Caracci 2008</span></a><span data-dcnode-id="748" instrument_node="">; for Native American application, specifically Lakota, refer to </span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="/books/n/tip59/appa/#appa.r141" data-bk-pop-others="" data-bk-pop-rid="/books/n/tip59/appa/def-item/appa.r141/" data-dcnode-id="746" href="#" role="button"><span data-dcnode-id="747" instrument_node="">Brave Heart 2001</span></a><span data-dcnode-id="745" instrument_node="">.)</span></p><ol data-dcnode-id="703"><li class="half_rhythm" data-dcnode-id="733"><div data-dcnode-id="734"><b data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Cultural identity of the person</span></b><span data-dcnode-id="741" instrument_node="">. Note the person's ethnic or cultural reference groups. For immigrants and ethnic minorities, also note degree of involvement with </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/tip59/appg/def-item/appg.gl1-d15/" role="button"><span data-dcnode-id="740" instrument_node="">culture</span></a><span data-dcnode-id="738" instrument_node=""> of origin and host culture (where applicable). Also note </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/tip59/appg/def-item/appg.gl1-d24/" role="button"><span data-dcnode-id="737" instrument_node="">language</span></a><span data-dcnode-id="735" instrument_node=""> ability, use, and preference (including multilingualism).</span></div></li><li class="half_rhythm" data-dcnode-id="725"><div data-dcnode-id="726"><b data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Cultural explanations of the person's illness</span></b><span data-dcnode-id="730" instrument_node="">. Identify the following: the predominant idioms of distress through which symptoms or the need for social support are communicated (e.g., “nerves,” possessing spirits, somatic complaints, inexplicable misfortune), the meaning and perceived severity of the individual's symptoms in relation to norms of the cultural reference group, any local illness category used by the individual's family and community to identify a condition (see the “</span><a data-dcnode-id="728" href="#appe.s2"><span data-dcnode-id="729" instrument_node="">Cultural Concepts of Distress</span></a><span data-dcnode-id="727" instrument_node="">” section of this appendix), the perceived causes or explanatory models that the individual and the reference group use to explain the illness, and current preferences for and past experiences with professional and popular sources of care.</span></div></li><li class="half_rhythm" data-dcnode-id="720"><div data-dcnode-id="721"><b data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Cultural factors related to psychosocial environment and level of functioning</span></b><span data-dcnode-id="722" instrument_node="">. Note culturally relevant interpretations of social stressors, available social supports, and levels of functioning and disability, including stresses in the local social environment and the role of religion and kin networks in providing emotional, instrumental, and informational support.</span></div></li><li class="half_rhythm" data-dcnode-id="709"><div data-dcnode-id="710"><b data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Cultural elements of the relationship between client and clinician</span></b><span data-dcnode-id="717" instrument_node="">. Indicate differences in </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/tip59/appg/def-item/appg.gl1-d15/" role="button"><span data-dcnode-id="716" instrument_node="">culture</span></a><span data-dcnode-id="714" instrument_node=""> and social status between client and clinician, as well as any problems these differences may cause in diagnosis and treatment (e.g., difficulty communicating in the client's first </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/tip59/appg/def-item/appg.gl1-d24/" role="button"><span data-dcnode-id="713" instrument_node="">language</span></a><span data-dcnode-id="711" instrument_node="">, eliciting symptoms or understanding their cultural significance, negotiating an appropriate relationship or level of intimacy, determining whether a behavior is normative or pathological).</span></div></li><li class="half_rhythm" data-dcnode-id="704"><div data-dcnode-id="705"><b data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Overall cultural assessment for diagnosis and care</span></b><span data-dcnode-id="706" instrument_node="">. Conclude cultural formulation by discussing how cultural considerations specifically influence comprehensive diagnosis and care.</span></div></li></ol></div><div data-dcnode-id="563" id="appe.s2"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="699"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="700" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="701" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="697" id="_appe_s2_"><span data-dcnode-id="698" instrument_node="">Cultural Concepts of Distress</span></h2><p data-dcnode-id="686"><span data-dcnode-id="696" instrument_node="">Just as standard screening instruments can sometimes be of limited use with culturally diverse populations, so too are standard diagnoses. Expressions of psychological problems are, in part, culturally specific, and behavior that is aberrant in one </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/tip59/appg/def-item/appg.gl1-d15/" role="button"><span data-dcnode-id="695" instrument_node="">culture</span></a><span data-dcnode-id="693" instrument_node=""> can be standard in another. For example, seemingly paranoid thoughts are to be expected in clients who have migrated from countries with oppressive governments. Culture plays a large role in understanding phenomena that might be construed as mental illnesses in Western medicine. These cultural concepts of distress may or may not be linked to particular DSM-5 diagnostic criteria (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="/books/n/tip59/appa/#appa.r45" data-bk-pop-others="" data-bk-pop-rid="/books/n/tip59/appa/def-item/appa.r45/" data-dcnode-id="691" href="#" role="button"><span data-dcnode-id="692" instrument_node="">APA 2013</span></a><span data-dcnode-id="690" instrument_node="">). The table that follows lists </span><a class="figpopup" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK248426/table/appe.t1/%3Freport%3Dobjectonly" rid-figpopup="figappet1" rid-ob="figobappet1" target="object"><span data-dcnode-id="689" instrument_node="">DSM-5 cultural concepts of distress</span></a><span data-dcnode-id="687" instrument_node="">; other concepts exist that are not recognized in DSM-5.</span></p><div class="table" data-dcnode-id="564" id="appe.t1"><h3 data-dcnode-id="683"><span class="title" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">DSM-5 Cultural Concepts of Distress</span></span></h3><p class="large-table-link" data-dcnode-id="679" style="display:none"><span class="right" data-dcnode-id="680"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK248426/table/appe.t1/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="682" instrument_node="">View in own window</span></a></span></p><div class="large_tbl" data-dcnode-id="576" id="__appe.t1_lrgtbl__" style="width: auto; height: auto; overflow: visible;"><table class="no_margin" data-dcnode-id="577"><thead data-dcnode-id="671"><tr data-dcnode-id="672"><th colspan="1" data-dcnode-id="677" id="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:top;"><span data-dcnode-id="678" instrument_node="">Syndrome</span></th><th colspan="1" data-dcnode-id="675" id="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:center;vertical-align:top;"><span data-dcnode-id="676" instrument_node="">Description</span></th><th colspan="1" data-dcnode-id="673" id="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:center;vertical-align:top;"><span data-dcnode-id="674" instrument_node="">Populations</span></th></tr></thead><tbody data-dcnode-id="578"><tr data-dcnode-id="663"><td colspan="1" data-dcnode-id="668" headers="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><b data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Ataque de nervios</span></b></td><td colspan="1" data-dcnode-id="666" headers="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="667" instrument_node="">Commonly reported symptoms include uncontrollable shouting, attacks of crying, trembling, heat in the chest rising into the head, and verbal or physical aggression. Dissociative experiences, seizurelike or fainting episodes, and suicidal gestures are prominent in some attacks but absent in others. A general feature of an ataque de nervios is a sense of being out of control. Ataques de nervios frequently occur as a direct result of a stressful event relating to the family (e.g., death of a close relative, separation or divorce from a spouse, conflict with spouse or children, or witnessing an accident involving a family member). People can experience amnesia for what occurred during the ataque de nervios, but they otherwise return rapidly to their usual level of functioning. Although descriptions of some ataques de nervios most closely fit with the DSM-IV description of panic attacks, the association of most ataques with a precipitating event and the frequent absence of the hallmark symptoms of acute fear or apprehension distinguish them from panic disorder. Ataques range from normal expressions of distress not associated with a mental disorder to symptom presentations associated with anxiety, mood dissociative, or somatoform disorders.</span></td><td colspan="1" data-dcnode-id="664" headers="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="665" instrument_node="">Caribbean, Latin American, Latin Mediterranean</span></td></tr><tr data-dcnode-id="644"><td colspan="1" data-dcnode-id="649" headers="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><b data-dcnode-id="660"><i data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Dhat</span></i></b><span data-dcnode-id="659" instrument_node="">
</span><i data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">(jiryan</span></i><span data-dcnode-id="656" instrument_node=""> in India, </span><i data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">skra prameha</span></i><span data-dcnode-id="653" instrument_node=""> in Sri Lanka, </span><i data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">shen-k'uei</span></i><span data-dcnode-id="650" instrument_node=""> in China)</span></td><td colspan="1" data-dcnode-id="647" headers="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="648" instrument_node="">A folk diagnosis for severe anxiety and hypochondriacal concerns associated with the discharge of semen, whitish discoloration of the urine, weakness, and exhaustion.</span></td><td colspan="1" data-dcnode-id="645" headers="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="646" instrument_node="">Asian Indian</span></td></tr><tr data-dcnode-id="623"><td colspan="1" data-dcnode-id="640" headers="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><b data-dcnode-id="641"><i data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Nervios</span></i></b></td><td colspan="1" data-dcnode-id="626" headers="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="639" instrument_node="">Refers both to a general state of vulnerability to stress and to a syndrome evoked by difficult life circumstances. </span><i data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Nervios</span></i><span data-dcnode-id="636" instrument_node=""> includes a wide range of symptoms of emotional distress, somatic disturbance, and inability to function. Common symptoms include headaches and “brain aches,” irritability, stomach disturbances, sleep difficulties, nervousness, tearfulness, inability to concentrate, trembling, tingling sensations, and </span><i data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">mareos</span></i><span data-dcnode-id="633" instrument_node=""> (dizziness with occasional vertigo-like exacerbations). </span><i data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Nervios</span></i><span data-dcnode-id="630" instrument_node=""> tends to be an ongoing problem, although it is variable in the degree of disability manifested. </span><i data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Nervios</span></i><span data-dcnode-id="627" instrument_node=""> is a broad syndrome that ranges from cases free of a mental disorder to presentations resembling adjustment, anxiety, depressive, dissociative, somatoform, or psychotic disorders. Differential diagnosis depends on the constellation of symptoms, the kind of social events associated with onset and progress, and the level of disability experienced.</span></td><td colspan="1" data-dcnode-id="624" headers="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="625" instrument_node="">Latin American</span></td></tr><tr data-dcnode-id="614"><td colspan="1" data-dcnode-id="619" headers="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><b data-dcnode-id="620"><i data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Shenjing shuairuo</span></i></b></td><td colspan="1" data-dcnode-id="617" headers="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="618" instrument_node="">A condition characterized by physical and mental fatigue, headaches, difficulty concentrating, dizziness, sleep disturbance, and memory loss. Other symptoms include gastrointestinal problems, sexual dysfunction, irritability, excitability, and autonomic nervous system disturbances.</span></td><td colspan="1" data-dcnode-id="615" headers="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="616" instrument_node="">Chinese</span></td></tr><tr data-dcnode-id="587"><td colspan="1" data-dcnode-id="604" headers="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><b data-dcnode-id="611"><i data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Susto</span></i></b><span data-dcnode-id="610" instrument_node="">
</span><i data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">(espanto, pasmo, tripa ida, perdida del alma</span></i><span data-dcnode-id="607" instrument_node="">, or </span><i data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">chibih)</span></i></td><td colspan="1" data-dcnode-id="590" headers="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="603" instrument_node="">An illness attributed to a frightening event that causes the soul to leave the body and results in unhappiness and sickness. Individuals with </span><i data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">susto</span></i><span data-dcnode-id="600" instrument_node=""> also experience significant strains in key social roles. Symptoms can appear days or years after the fright is experienced. In extreme cases, </span><i data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">susto</span></i><span data-dcnode-id="597" instrument_node=""> can result in death. Typical symptoms include appetite disturbances, inadequate or excessive sleep, troubled sleep or dreams, sadness, lack of motivation, and feelings of low self-worth or dirtiness. Somatic symptoms accompanying </span><i data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">susto</span></i><span data-dcnode-id="594" instrument_node=""> include muscle aches and pains, headache, stomachache, and diarrhea. Ritual healings focus on calling the soul back to the body and cleansing the person to restore bodily and spiritual balance. </span><i data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Susto</span></i><span data-dcnode-id="591" instrument_node=""> can be related to major depressive disorder, posttraumatic stress disorder, and somatoform disorders. Similar etiological beliefs and symptom configurations are found in many parts of the world.</span></td><td colspan="1" data-dcnode-id="588" headers="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="589" instrument_node="">Latino American, Mexican, Central and South American</span></td></tr><tr data-dcnode-id="579"><td colspan="1" data-dcnode-id="584" headers="hd_h_appe.t1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><b data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Taijin kyofusho</span></b></td><td colspan="1" data-dcnode-id="582" headers="hd_h_appe.t1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="583" instrument_node="">This syndrome refers to an individual's intense fear that his or her body, its parts, or its functions displease, embarrass, or are offensive to other people in appearance, odor, facial expressions, or movement. This syndrome is included in the official Japanese diagnostic system for mental disorders.</span></td><td colspan="1" data-dcnode-id="580" headers="hd_h_appe.t1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="581" instrument_node="">Japanese</span></td></tr></tbody></table></div><div data-dcnode-id="565"><div data-dcnode-id="566"><dl class="temp-labeled-list small" data-dcnode-id="567"><dt data-dcnode-id="575"></dt><dd data-dcnode-id="568"><div data-dcnode-id="569" id="appe.tfn1"><p class="no_margin" data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Source: </span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="/books/n/tip59/appa/#appa.r45" data-bk-pop-others="" data-bk-pop-rid="/books/n/tip59/appa/def-item/appa.r45/" data-dcnode-id="572" href="#" role="button"><span data-dcnode-id="573" instrument_node="">APA 2013</span></a><span data-dcnode-id="571" instrument_node="">. Used with permission.</span></p></div></dd></dl></div></div></div></div><div data-dcnode-id="562" id="bk_toc_contnr"></div><div aria-hidden="true" aria-live="assertive" class="ui-helper-reset ui-ncbipopper-wrapper ui-ncbilinksmenu" data-dcnode-id="554" style="display: none; width: 200px; top: -100px; left: -100px;"><ul data-dcnode-id="555" id="ui-ncbiinpagenav-8"><li data-dcnode-id="559"><a data-dcnode-id="560" href="#_appe_s1_"><span data-dcnode-id="561" instrument_node="">Cultural Formulation in Diagnosis</span></a></li><li data-dcnode-id="556"><a data-dcnode-id="557" href="#_appe_s2_"><span data-dcnode-id="558" instrument_node="">Cultural Concepts of Distress</span></a></li></ul></div></div></div><span data-dcnode-id="551" instrument_node="">
