</span><p data-dcnode-id="1198"><span data-dcnode-id="1201" instrument_node="">Words alone do not have a definite meaning. It is necessary to make the sentences engaging. The best examples of these are idioms.</span><br data-dcnode-id="1200"><span data-dcnode-id="1199" instrument_node="">This article will tell you more about commonly used idioms in daily lives. </span></p><div class="wp-block-ht-block-toc is-style-outline htoc htoc--position-wide toc-list-style-bulleted" data-dcnode-id="1154" data-htoc-state="expanded"><span class="htoc__title" data-dcnode-id="1190"><span class="ht_toc_title" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Jump to Section</span></span><span class="htoc__toggle" data-dcnode-id="1191"><svg data-dcnode-id="1192" height="16" width="16" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1193" fill="#444"><path d="M15 7H1c-.6 0-1 .4-1 1s.4 1 1 1h14c.6 0 1-.4 1-1s-.4-1-1-1z" data-dcnode-id="1195"></path><path d="M15 1H1c-.6 0-1 .4-1 1s.4 1 1 1h14c.6 0 1-.4 1-1s-.4-1-1-1zM15 13H1c-.6 0-1 .4-1 1s.4 1 1 1h14c.6 0 1-.4 1-1s-.4-1-1-1z" data-dcnode-id="1194"></path></g></svg></span></span><div class="htoc__itemswrap" data-dcnode-id="1155"><ul class="ht_toc_list" data-dcnode-id="1156"><li class="" data-dcnode-id="1187"><a data-dcnode-id="1188" href="#What-is-a-phrase?"><span data-dcnode-id="1189" instrument_node="">What is a Phrase?</span></a></li><li class="" data-dcnode-id="1184"><a data-dcnode-id="1185" href="#What-is-an-idiom?"><span data-dcnode-id="1186" instrument_node="">What is an Idiom?</span></a></li><li class="" data-dcnode-id="1180"><a data-dcnode-id="1182" href="#Difference-between-idioms-and-phrases"><span data-dcnode-id="1183" instrument_node="">Difference between Idioms and Phrases</span></a><ul class="ht_toc_child_list" data-dcnode-id="1181"></ul></li><li class="" data-dcnode-id="1177"><a data-dcnode-id="1178" href="#Why-do-you-use-idioms?-"><span data-dcnode-id="1179" instrument_node="">Why do you use Idioms?&nbsp;</span></a></li><li class="" data-dcnode-id="1174"><a data-dcnode-id="1175" href="#How-should-you-use-idioms?"><span data-dcnode-id="1176" instrument_node="">How should you use Idioms?</span></a></li><li class="" data-dcnode-id="1171"><a data-dcnode-id="1172" href="#When-do-you-use-idioms?"><span data-dcnode-id="1173" instrument_node="">When do you use Idioms?</span></a></li><li class="" data-dcnode-id="1168"><a data-dcnode-id="1169" href="#The-importance-of-using-idioms"><span data-dcnode-id="1170" instrument_node="">The importance of using Idioms</span></a></li><li class="" data-dcnode-id="1164"><a data-dcnode-id="1166" href="#25-commonly-used-idioms-and-their-origins"><span data-dcnode-id="1167" instrument_node="">25 Commonly used Idioms and their Origins</span></a><ul class="ht_toc_child_list" data-dcnode-id="1165"></ul></li><li class="" data-dcnode-id="1161"><a data-dcnode-id="1162" href="#Conclusion"><span data-dcnode-id="1163" instrument_node="">Conclusion</span></a></li><li class="" data-dcnode-id="1157"><a data-dcnode-id="1159" href="#FAQs"><span data-dcnode-id="1160" instrument_node="">FAQs</span></a><ul class="ht_toc_child_list" data-dcnode-id="1158"></ul></li></ul></div></div><h2 data-dcnode-id="1151" id="What-is-a-phrase?"><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">What is a Phrase?</span></strong></h2><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Firstly, let’s talk about a phrase.&nbsp;</span></p><p data-dcnode-id="1141"><span data-dcnode-id="1148" instrument_node="">A&nbsp;</span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phrase" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1147" instrument_node="">phrase</span></a><span data-dcnode-id="1145" instrument_node="">&nbsp;is a set of words that act as a unit. Phrases consist of a single word/several words in a&nbsp;</span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.podium.school/english/types-of-sentences-and-best-places-to-use-them/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1144" instrument_node="">sentence.</span></a><span data-dcnode-id="1142" instrument_node="">&nbsp;There are different types of phrases. For example – noun phrase, adjective phrase, prepositional phrase, the gerund phrase, infinitive phrase etc.&nbsp;</span></p><h2 data-dcnode-id="1138" id="What-is-an-idiom?"><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">What is an Idiom?</span></strong></h2><figure class="wp-block-embed aligncenter is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1126"><div class="wp-block-embed__wrapper" data-dcnode-id="1129"><div class="rll-youtube-player" data-dcnode-id="1132" data-id="jUT_WSavAC8" data-query="feature=oembed" data-src="https://www.youtube.com/embed/jUT_WSavAC8"><div data-dcnode-id="1133" data-id="jUT_WSavAC8" data-query="feature=oembed" data-src="https://www.youtube.com/embed/jUT_WSavAC8"><img alt="" class="entered lazyloaded" data-dcnode-id="1137" data-lazy-src="https://i.ytimg.com/vi/jUT_WSavAC8/hqdefault.jpg" data-ll-status="loaded" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/jUT_WSavAC8/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="1134"></button></div></div><noscript data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">&lt;iframe title="Idioms | Award Winning Teaching Video | What Is An Idiom? | Figurative Language" width="640" height="360" src="https://www.youtube.com/embed/jUT_WSavAC8?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><figcaption data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">What is an Idiom?</span></figcaption></figure><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">In English, idioms are a type of figurative language. You can not rely only on the words to tell you what they mean, because generally, they have a meaning different from the literal meaning of the individual words.&nbsp;</span></p><h2 data-dcnode-id="1121" id="Difference-between-idioms-and-phrases"><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Difference between Idioms and Phrases</span></strong></h2><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">People generally confuse the two terms. Before you start learning how to use idioms, it is essential to understand the difference between the two.</span></p><ol data-dcnode-id="1112"><li data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">In grammatical terms, a phrase is a group of words having a definite meaning. An idiom is an expression of words that mean something completely different from the literal saying.</span></li><li data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Furthermore, unlike idioms, phrases can be taken literally. The meaning of idioms is figurative. Idioms are also known as colloquial metaphors.</span></li><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Another noteworthy difference is that the words in a phrase collectively act as a single unit of speech.</span></li></ol><h3 data-dcnode-id="1109" id="Comparison-Table-Between-Phrase-and-Idiom"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Comparison Table Between Phrase and Idiom</span></strong></h3><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Parameters of Comparison Phrase Idiom</span></p><figure class="wp-block-table" data-dcnode-id="1064"><table data-dcnode-id="1065"><tbody data-dcnode-id="1066"><tr data-dcnode-id="1095"><td data-dcnode-id="1104"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Parameters of Comparison</span></strong></td><td data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node=""> </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Idiom</span></strong><span data-dcnode-id="1100" instrument_node=""> </span></td><td data-dcnode-id="1096"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Phrase</span></strong></td></tr><tr data-dcnode-id="1088"><td data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Definition</span></td><td data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node=""> Set of words or a word  </span></td><td data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Set of words</span></td></tr><tr data-dcnode-id="1081"><td data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Meanings</span></td><td data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node=""> Figurative in meaning </span></td><td data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Literal in meaning</span></td></tr><tr data-dcnode-id="1074"><td data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Interchangeability</span></td><td data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node=""> All Idioms are phrases </span></td><td data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">All phrases are not idioms</span></td></tr><tr data-dcnode-id="1067"><td data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Examples</span></td><td data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node=""> Burn the midnight oil </span></td><td data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">The glass was on the table</span></td></tr></tbody></table></figure><h2 data-dcnode-id="1061" id="Why-do-you-use-idioms?-"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Why do you use Idioms?&nbsp;</span></strong></h2><p data-dcnode-id="1057"><span data-dcnode-id="1060" instrument_node="">A question for all of you. Why do logical humans use idioms? Why do we use words that mean something different from their literal meaning?</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">Experts suggest that instead of only using logical words and phrases. Humans also use expressions as they like to paint a picture with our words. It creates vivid mental images that make it easier to convey ideas and thoughts. Therefore, our language and communication becomes more robust and may last longer in a person’s mind.</span></p><h2 data-dcnode-id="1054" id="How-should-you-use-idioms?"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">How should you use Idioms?</span></strong></h2><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Idioms can be a powerful device when used correctly. They effortlessly make your writing sound more conversational. Furthermore, they can also help add emphasis to vital points.&nbsp;</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">If you struggle with creating blog posts or writing less technical emails, all you need to do is throw in an idiom or two. They can also add emphasis to essential points. Fiction writers use idioms to add personality to a characters’ voice.&nbsp;</span></p><h2 data-dcnode-id="1047" id="When-do-you-use-idioms?"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">When do you use Idioms?</span></strong></h2><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">1. Avoid idioms in technical or formal writing, as they are not precise and leave a lot of room for misunderstandings.&nbsp;</span></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">2. Unlike metaphors, analogies or proverbs, idioms have less literal or easy to deduce meaning.&nbsp;</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">3. Euphemisms, a type of idiom are used to address more sensitive or taboo topics. Thus, they are not used in general conversation.&nbsp;</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">4. Lastly, idioms can become clichés if they are overused. Therefore, use idioms sparingly but effectively in your writing.</span></p><h2 data-dcnode-id="1036" id="The-importance-of-using-idioms"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The importance of using Idioms</span></strong></h2><p data-dcnode-id="1032"><span data-dcnode-id="1035" instrument_node="">1.</span><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&nbsp;Idioms provide you with a way to express yourself.</span></strong></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Idioms give people a great way to convey their thoughts in a specific context. For example, when someone says ‘break a leg’, they do not mean it literally. Instead, it is said to wish someone good luck.&nbsp;</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1029" instrument_node="">2.&nbsp;</span><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Idioms can he</span></strong><span data-dcnode-id="1026" instrument_node="">l</span><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">p people in ESL schools express themselves more creatively during a conversation</span></strong></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">For people whose first language is not English, idioms provide a new and creative way to express themself. Furthermore, idioms can also be quite humorous. Thus, you can use them efficiently to show your personality and sense of humour.&nbsp;</span></p><p data-dcnode-id="1016"><span data-dcnode-id="1020" instrument_node="">3.&nbsp;</span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Understanding and using idioms can help boost conversational skills</span></strong><span data-dcnode-id="1017" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Idioms help improve conversational skills as an individual can prove to the native speakers that you understand the cultural meaning and context. Thus, you may feel more confident and comfortable during conversations. Additionally, you will also sound more like a native speaker. In addition, learning idioms will help you gain a deeper understanding of the language in a more meaningful way.</span></p><h2 data-dcnode-id="1011" id="25-commonly-used-idioms-and-their-origins"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">25 Commonly used Idioms and their Origins</span></strong></h2><h3 data-dcnode-id="1008" id="htoc-1-white-elephant"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">1. White Elephant</span></strong></h3><p data-dcnode-id="1005"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">A term that means something that is not quite useful and often has a very high cost of maintenance.</span></p><p data-dcnode-id="1000"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">In the ancient kingdom of Siam or modern-day Thailand, the King would give white elephants to people who he disliked. Although this gift seems kind, in actuality it was expensive and difficult to take care of.&nbsp;</span></p><h3 data-dcnode-id="995" id="htoc-2-fly-off-the-handle"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">2. Fly off the handle</span></strong></h3><div class="wp-block-image" data-dcnode-id="988"><figure class="aligncenter is-resized" data-dcnode-id="989"><img alt="Fly off the handle - Openclipart" class="entered error" data-dcnode-id="994" data-lazy-src="https://openclipart.org/image/800px/304456" data-ll-status="error" height="559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openclipart.org/image/800px/304456&amp;raw" width="504"><noscript data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">&lt;img src="https://openclipart.org/image/800px/304456" alt="Fly off the handle - Openclipart" width="504" height="559"/&gt;</span></noscript><figcaption data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Fly off the handle</span></figcaption></figure></div><p data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">This idiom means to lose one’s temper unexpectedly.</span></p><p data-dcnode-id="980"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">The phrase was first utilized in the early 1800s. It refers to the uncontrolled way a loose axehead would fly off of its handle when swung.</span></p><h3 data-dcnode-id="976" id="htoc-3-close-but-no-cigar"><span data-dcnode-id="977" instrument_node="">3. Close but no cigar</span></h3><p data-dcnode-id="973"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">This term means someone/something that has fallen just short of a successful outcome.</span></p><p data-dcnode-id="968"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">The idiom arose from the carnival games at American fairgrounds. These games would have cigars as prizes and when someone lost by a close margin, they would be close but not get a cigar.</span></p><h3 data-dcnode-id="964" id="htoc-4-give-the-cold-shoulder"><span data-dcnode-id="965" instrument_node="">4. Give the cold shoulder</span></h3><div class="wp-block-image" data-dcnode-id="957"><figure class="aligncenter" data-dcnode-id="958"><img alt="Cold Shoulder Quotes. QuotesGram" class="entered lazyloaded" data-dcnode-id="963" data-lazy-src="https://cdn.quotesgram.com/small/67/71/1505216435-Cold_shoulder1.jpg" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.quotesgram.com/small/67/71/1505216435-Cold_shoulder1.jpg&amp;raw"><noscript data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">&lt;img src="https://cdn.quotesgram.com/small/67/71/1505216435-Cold_shoulder1.jpg" alt="Cold Shoulder Quotes. QuotesGram"/&gt;</span></noscript><figcaption data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Give the cold shoulder</span></figcaption></figure></div><p data-dcnode-id="954"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">This commonly used idiom means to ignore someone. People generally use it to make it clear that the person is not welcome.</span></p><p data-dcnode-id="949"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">In medieval England, dinner hosts gave guests a piece of cold shoulder meat to indicate that it was time to leave.&nbsp;</span></p><h3 data-dcnode-id="945" id="htoc-5-let-the-cat-out-of-the-bag"><span data-dcnode-id="946" instrument_node="">5. Let the cat out of the bag</span></h3><div class="wp-block-image" data-dcnode-id="938"><figure class="aligncenter is-resized" data-dcnode-id="939"><img alt="Idiom: Let the cat out of the bag – Serena's blog" data-dcnode-id="944" data-lazy-src="https://blogdeserena.files.wordpress.com/2018/07/cat-out-of-the-bag.jpg" height="693" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20659%20693'%3E%3C/svg%3E" width="659"><noscript data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">&lt;img src="https://blogdeserena.files.wordpress.com/2018/07/cat-out-of-the-bag.jpg" alt="Idiom: Let the cat out of the bag – Serena's blog" width="659" height="693"/&gt;</span></noscript><figcaption data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Let the cat out of the bag</span></figcaption></figure></div><p data-dcnode-id="935"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">To reveal a secret.</span></p><p data-dcnode-id="930"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">This one came from centuries ago when street vendors use to sell piglets in bags. However, sometimes they would deceive the customer and replace the piglet with a cat. The buyer wouldn’t know about this till the purchase was complete and the secret was out.&nbsp;</span></p><h3 data-dcnode-id="926" id="htoc-6-heard-it-through-the-grapevine"><span data-dcnode-id="927" instrument_node="">6. Heard it through the grapevine</span></h3><p data-dcnode-id="922"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Meaning</span></strong><span data-dcnode-id="923" instrument_node="">:</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Another commonly used idiom. This means to hear or learn something new.</span></p><p data-dcnode-id="917"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The origin of this idiom dates back to the time of telegraphs. Many people thought that the wires of a telegraph resembled a grapevine, thus, whenever they received a new message, they would say that they heard it through the grapevine.&nbsp;</span></p><h3 data-dcnode-id="913" id="htoc-7-an-arm-and-a-leg"><span data-dcnode-id="914" instrument_node="">7. An arm and a leg</span></h3><p data-dcnode-id="910"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">This phrase refers to spending an amount of money on something.&nbsp;</span></p><p data-dcnode-id="905"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">the origin of this idiom is uncertain. Experts are unsure of whether it arose when soldiers were losing limbs defending their country in WWI and WWII, or during the time when oil paintings were popular. Oil painters charged based on the size of the painting, thus it was more expensive to include your arms and legs. Therefore, most people preferred to include just their heads and shoulders.&nbsp;</span></p><h3 data-dcnode-id="901" id="htoc-8-hands-down"><span data-dcnode-id="902" instrument_node="">8. Hands down</span></h3><p data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">This term means decisively or easily without question.&nbsp;&nbsp;</span></p><p data-dcnode-id="893"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">This one comes from horse racing and refers to the hold a jockey has on the horse’s reins. If the horse is far ahead, thus first in the race, the jockey can loosen his grip on the reins, therefore winning ‘hands down’.</span></p><h3 data-dcnode-id="889" id="htoc-9-riding-shotgun"><span data-dcnode-id="890" instrument_node="">9. Riding shotgun</span></h3><div class="wp-block-image" data-dcnode-id="882"><figure class="aligncenter" data-dcnode-id="883"><img alt="ride shotgun" data-dcnode-id="888" data-lazy-src="http://www.idioms4you.com/img/angif-ride-shotgun-scen02.PNG" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">&lt;img src="http://www.idioms4you.com/img/angif-ride-shotgun-scen02.PNG" alt="ride shotgun"/&gt;</span></noscript><figcaption data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Riding Shotgun</span></figcaption></figure></div><p data-dcnode-id="879"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">This is a phrase known to us all. If you have ever yelled ‘shotgun’ while approaching a car then you probably already know what this means. Riding shotgun refers to riding in the civeted front seat, right next to the driver.</span></p><p data-dcnode-id="874"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">The origin of this idiom is not as fun and happy as its meaning. It refers to the position next to a stagecoach driver, where a guard armed with a shotgun sat to ward off bandits.&nbsp;</span></p><h3 data-dcnode-id="870" id="htoc-10-bite-the-bullet"><span data-dcnode-id="871" instrument_node="">10. Bite the bullet</span></h3><div class="wp-block-image" data-dcnode-id="863"><figure class="aligncenter is-resized" data-dcnode-id="864"><img alt="Bite The Bullet by Tiffany Tan on Dribbble" data-dcnode-id="869" data-lazy-src="https://cdn.dribbble.com/users/2066523/screenshots/4892455/bite_the_bullet.jpg" height="534" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20712%20534'%3E%3C/svg%3E" width="712"><noscript data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">&lt;img src="https://cdn.dribbble.com/users/2066523/screenshots/4892455/bite_the_bullet.jpg" alt="Bite The Bullet by Tiffany Tan on Dribbble" width="712" height="534"/&gt;</span></noscript><figcaption data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Bite the bullet</span></figcaption></figure></div><p data-dcnode-id="860"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The phrase means to decide to do something unpleasant or difficult that you have been putting off.&nbsp;</span></p><p data-dcnode-id="855"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">During the war, injured soldiers would bite down on a bullet before surgery or amputation to keep themselves from biting their tounges.&nbsp;</span></p><h3 data-dcnode-id="851" id="htoc-11-cut-to-the-chase"><span data-dcnode-id="852" instrument_node="">11. Cut to the chase</span></h3><p data-dcnode-id="848"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">This idiom is used when you want someone to get to the point.</span></p><p data-dcnode-id="843"><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">In the early days of silent film, the most enjoyable parts were those that had a chase, whether on foot or horseback. Another interesting scene was one showing the deception of some sort. Cut to the chase was used by the filmmakers when they wanted to hear or see the more interesting parts of a movie.&nbsp;</span></p><h3 data-dcnode-id="839" id="htoc-12-pass-with-flying-colours"><span data-dcnode-id="840" instrument_node="">12. Pass with flying colours</span></h3><div class="wp-block-image" data-dcnode-id="832"><figure class="aligncenter size-full" data-dcnode-id="833"><img alt="" class="wp-image-43301" data-dcnode-id="838" data-lazy-sizes="(max-width: 310px) 100vw, 310px" data-lazy-src="https://learn.podium.school/wp-content/uploads/2021/12/image-37.jpeg" data-lazy-srcset="https://learn.podium.school/wp-content/uploads/2021/12/image-37.jpeg 310w, https://learn.podium.school/wp-content/uploads/2021/12/image-37-300x157.jpeg 300w" height="162" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20310%20162'%3E%3C/svg%3E" width="310"><noscript data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">&lt;img width="310" height="162" src="https://learn.podium.school/wp-content/uploads/2021/12/image-37.jpeg" alt="" class="wp-image-43301" srcset="https://learn.podium.school/wp-content/uploads/2021/12/image-37.jpeg 310w, https://learn.podium.school/wp-content/uploads/2021/12/image-37-300x157.jpeg 300w" sizes="(max-width: 310px) 100vw, 310px"/&gt;</span></noscript><figcaption data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Pass with flying colours</span></figcaption></figure></div><p data-dcnode-id="829"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">To succeed at a difficult task with ease.</span></p><p data-dcnode-id="824"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The idiom arose after warships in the 1600s flew coloured flags after victory. Thus, people always knew that the ship won a battle at sea when they saw the coloured flag.&nbsp;</span></p><h3 data-dcnode-id="820" id="htoc-13-learn-the-ropes"><span data-dcnode-id="821" instrument_node="">13. Learn the ropes</span></h3><div class="wp-block-image" data-dcnode-id="813"><figure class="aligncenter" data-dcnode-id="814"><img alt="Learn the Ropes Phrase | Ginger Software" data-dcnode-id="819" data-lazy-src="https://www.gingersoftware.com/wp-content/uploads/Learn_the_ropes_POD-.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">&lt;img src="https://www.gingersoftware.com/wp-content/uploads/Learn_the_ropes_POD-.jpg" alt="Learn the Ropes Phrase | Ginger Software"/&gt;</span></noscript><figcaption data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Learn the ropes</span></figcaption></figure></div><p data-dcnode-id="810"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">People use the phrase when someone is trained or is learning to do a particular task or job.</span></p><p data-dcnode-id="805"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">This is another one that has a nautical reference. New recruits on 17th-century ships had to learn how to move the sails using a rope.</span></p><h3 data-dcnode-id="801" id="htoc-14-barking-up-the-wrong-tree"><span data-dcnode-id="802" instrument_node="">14. Barking up the wrong tree</span></h3><p data-dcnode-id="798"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">This refers to pursuing a mistaken line of thought or action.</span></p><p data-dcnode-id="793"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">In the early days, hunting with packs of dogs was very common. These dogs often chased small animals up trees. However, they would not realize that the animals had jumped over to the next tree. Thus, they found themselves barking up the wrong tree.&nbsp;</span></p><h3 data-dcnode-id="789" id="htoc-15-steal-someone-s-thunder"><span data-dcnode-id="790" instrument_node="">15. Steal someone’s thunder</span></h3><p data-dcnode-id="786"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">To upstage someone and grab the attention or praise from them.</span></p><p data-dcnode-id="781"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Origin:</span></strong></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">This idiom originated due to the actions surrounding the playwright John Dennis. In the early 1700s, he invented a new method for reproducing the sound of thunder for his new production. However, his play failed and was cancelled. Later, Dennis found out that his sound was used in the play, Macbeth. The outraged playwright then said “Damn them! They will not let my play run, but they steal my thunder.”</span></p><h3 data-dcnode-id="777" id="htoc-16-straight-from-the-horse-s-mouth"><span data-dcnode-id="778" instrument_node="">16. Straight from the horse’s mouth</span></h3><p data-dcnode-id="774"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The idiom refers to someone getting information straight from the most trustworthy source</span></p><p data-dcnode-id="768"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Origin:</span></strong><span data-dcnode-id="769" instrument_node="">&nbsp;</span></p><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">This one comes from the 1900s, from when buyers would estimate the age of a horse by looking at its teeth. This is also where the idiom “look a gift horse in the mouth,” arose from as it was considered bad etiquette to inspect a gift.&nbsp;</span></p><h3 data-dcnode-id="764" id="htoc-17-butter-someone-up"><span data-dcnode-id="765" instrument_node="">17. Butter someone up</span></h3><p data-dcnode-id="761"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Meaning:&nbsp;</span></strong></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">To flatter someone to gain a favour</span></p><p data-dcnode-id="756"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Origin:&nbsp;</span></strong></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">India has a custom that involves throwing butter balls at the statues of gods to gain their favour and seek good fortune.&nbsp;</span></p><h3 data-dcnode-id="752" id="htoc-18-wolf-in-sheep-s-clothing"><span data-dcnode-id="753" instrument_node="">18. Wolf in sheep’s clothing</span></h3><div class="wp-block-image" data-dcnode-id="745"><figure class="aligncenter" data-dcnode-id="746"><img alt="24 Wolf In Sheeps Clothing Illustrations &amp; Clip Art - iStock" data-dcnode-id="751" data-lazy-src="https://media.istockphoto.com/vectors/wolf-in-sheeps-clothing-cartoon-vector-id476958697?k=20&amp;m=476958697&amp;s=612x612&amp;w=0&amp;h=hwGmd8PVU4uIUJFBPE4G_XQcHOTf771nhqiLVDDi5EA=" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">&lt;img src="https://media.istockphoto.com/vectors/wolf-in-sheeps-clothing-cartoon-vector-id476958697?k=20&amp;amp;m=476958697&amp;amp;s=612x612&amp;amp;w=0&amp;amp;h=hwGmd8PVU4uIUJFBPE4G_XQcHOTf771nhqiLVDDi5EA=" alt="24 Wolf In Sheeps Clothing Illustrations &amp;amp; Clip Art - iStock"/&gt;</span></noscript><figcaption data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Wolf in Sheep’s clothing</span></figcaption></figure></div><p data-dcnode-id="742"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Meaning:&nbsp;</span></strong></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">This phrase refers to someone who is pretending to be something they are not.&nbsp;</span></p><p data-dcnode-id="737"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Origin:&nbsp;</span></strong></p><p data-dcnode-id="729"><span data-dcnode-id="736" instrument_node="">The idiom came from the Bible verse </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_7%3A15%23%3A~%3Atext%3DBeware%2520of%2520false%2520prophets%252C%2520which%2Cwho%2520come%2520to%2520you%2520in" rel="nofollow"><span data-dcnode-id="735" instrument_node="">Matthew 7:15</span></a><span data-dcnode-id="733" instrument_node="">. The Bible also gave us ‘seeing eye to eye’ from the verse Isaiah 62:8, ‘rise and shine’ from Isaiah 60:1, as well as a ‘broken heart’, which is from </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DPsalm%252069%253A20%26version%3DNIV" rel="nofollow"><span data-dcnode-id="732" instrument_node="">Psalm 69:20</span></a><span data-dcnode-id="730" instrument_node="">.</span></p><h3 data-dcnode-id="727" id="htoc-19-dish-fit-for-the-gods"><span data-dcnode-id="728" instrument_node="">19. Dish fit for the gods</span></h3><p data-dcnode-id="723"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Meaning:</span></strong><span data-dcnode-id="724" instrument_node="">&nbsp;</span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The term means a very scrumptious meal</span></p><p data-dcnode-id="717"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Origin:</span></strong><span data-dcnode-id="718" instrument_node="">&nbsp;</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Shakespear is the one that came up with this expression. He used it in Julius Caesar. In addition to this idiom, he also gave us ‘hot blooded’, ‘foaming at the mouth’, ‘in stitches’, ‘wearing your heart on your sleeve’, ‘green-eyed monster’, and ‘one fell swoop.’</span></p><h3 data-dcnode-id="713" id="htoc-20-don-t-throw-the-baby-out-with-the-bathwater"><span data-dcnode-id="714" instrument_node="">20. Don’t throw the baby out with the bathwater</span></h3><div class="wp-block-image" data-dcnode-id="706"><figure class="aligncenter" data-dcnode-id="707"><img alt="Meaning of 'Don't Throw the Baby Out With the Bathwater' | Motivation" data-dcnode-id="712" data-lazy-src="https://res.cloudinary.com/jerrick/image/upload/f_jpg,fl_progressive,q_auto,w_1024/5e96746e9671a2001cc585a7.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">&lt;img src="https://res.cloudinary.com/jerrick/image/upload/f_jpg,fl_progressive,q_auto,w_1024/5e96746e9671a2001cc585a7.jpg" alt="Meaning of 'Don't Throw the Baby Out With the Bathwater' | Motivation"/&gt;</span></noscript><figcaption data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Dont throw the baby out with the bathwater</span></figcaption></figure></div><p data-dcnode-id="703"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Meaning:</span></strong></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">The idiom means to look for errors in a task so that you do not have to remove something good with the bad.&nbsp;</span></p><p data-dcnode-id="697"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Origin:</span></strong><span data-dcnode-id="698" instrument_node="">&nbsp;</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">This idiom comes from a time when the entire family bathed in the same water. Firstly, the lord would bathe, then other men in the family, the lady, other women in the family, the children, and lastly the babies last. In the end, the bathwater is said to have been so dirty that there was the risk of throwing the baby along the water once done.&nbsp;</span></p><h3 data-dcnode-id="693" id="htoc-21-jump-the-shark"><span data-dcnode-id="694" instrument_node="">21. Jump the shark</span></h3><p data-dcnode-id="689"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Meaning:</span></strong><span data-dcnode-id="690" instrument_node="">&nbsp;</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">This refers to the moment when a play, tv show or other form of entertainment reaches a decline in quality due to the use of gimmicks to maintain the audience’s interest.&nbsp;</span></p><p data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Origin:</span></strong><span data-dcnode-id="684" instrument_node="">&nbsp;</span></p><p data-dcnode-id="678"><span data-dcnode-id="682" instrument_node="">In the show&nbsp;</span><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Happy Days,&nbsp;</span></em><span data-dcnode-id="679" instrument_node="">Fonzie jumps over a shark while water skiing. Following this, radio personality Jon Hein popularized the phrase “jump the shark” to depict the downfall of the show.</span></p><h3 data-dcnode-id="676" id="htoc-22-minding-your-ps-and-qs"><span data-dcnode-id="677" instrument_node="">22. Minding your Ps and Qs</span></h3><p data-dcnode-id="672"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Meaning:</span></strong><span data-dcnode-id="673" instrument_node="">&nbsp;</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Refers to being on your best behaviour</span></p><p data-dcnode-id="666"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Origin:</span></strong><span data-dcnode-id="667" instrument_node="">&nbsp;</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">There are several origin stories for this one. The most interesting one is when bartenders would use P and Q to keep track of the pints and quarts consumed.&nbsp;</span></p><h3 data-dcnode-id="662" id="htoc-23-turn-a-blind-eye"><span data-dcnode-id="663" instrument_node="">23. Turn a blind eye</span></h3><div class="wp-block-image" data-dcnode-id="655"><figure class="aligncenter" data-dcnode-id="656"><img alt="14 Turn A Blind Eye Illustrations &amp; Clip Art - iStock" data-dcnode-id="661" data-lazy-src="https://media.istockphoto.com/vectors/vector-illustration-of-monkey-dont-see-because-wearing-virtual-on-vector-id1144132809?k=20&amp;m=1144132809&amp;s=612x612&amp;w=0&amp;h=D5YSAwa0LTNEfZRki4bl7i3uk0ODTsOOKlkcjghaWRI=" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">&lt;img src="https://media.istockphoto.com/vectors/vector-illustration-of-monkey-dont-see-because-wearing-virtual-on-vector-id1144132809?k=20&amp;amp;m=1144132809&amp;amp;s=612x612&amp;amp;w=0&amp;amp;h=D5YSAwa0LTNEfZRki4bl7i3uk0ODTsOOKlkcjghaWRI=" alt="14 Turn A Blind Eye Illustrations &amp;amp; Clip Art - iStock"/&gt;</span></noscript><figcaption data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Turn a blind eye</span></figcaption></figure></div><p data-dcnode-id="651"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Meaning:</span></strong><span data-dcnode-id="652" instrument_node="">&nbsp;</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">The phrase means to consciously ignore undesirable information</span></p><p data-dcnode-id="645"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Origin:</span></strong><span data-dcnode-id="646" instrument_node="">&nbsp;</span></p><p data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">The phrase originated with Admiral Horatio Nelson, who looked through his telescope using his blind eye to avoid signs from his superior&nbsp;</span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxford-royale.co.uk/articles/bizarre-english-idioms-meaning-origins.html" rel="nofollow"><span data-dcnode-id="643" instrument_node="">telling him to withdraw from battle</span></a><span data-dcnode-id="641" instrument_node="">.</span></p><h3 data-dcnode-id="638" id="htoc-24-armed-to-the-teeth"><span data-dcnode-id="639" instrument_node="">24. Armed to the teeth</span></h3><p data-dcnode-id="634"><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Meaning:</span></strong><span data-dcnode-id="635" instrument_node="">&nbsp;</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">This idiom means to be extremely well equipped</span></p><p data-dcnode-id="628"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Origin:</span></strong><span data-dcnode-id="629" instrument_node="">&nbsp;</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">The idiom comes from when a weapon wielder would carry the maximum number of weapons. Thus, they would be forced to carry some between the teeth.</span></p><h3 data-dcnode-id="624" id="htoc-25-get-one-s-goat"><span data-dcnode-id="625" instrument_node="">25. Get one’s goat</span></h3><p data-dcnode-id="620"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Meaning:</span></strong><span data-dcnode-id="621" instrument_node="">&nbsp;</span></p><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Means to irritate or annoy someone</span></p><p data-dcnode-id="614"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Origin:</span></strong><span data-dcnode-id="615" instrument_node="">&nbsp;</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Another one comes from horseback riding. Jockeys kept goats in the stables with their horses as it was said to relax them. However, competitors would steal the goats of their rivals to spook their horses, thus hoping they would lose the race.</span></p><h2 data-dcnode-id="610" id="Conclusion"><span data-dcnode-id="611" instrument_node="">Conclusion</span></h2><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">English idioms are an essential part of everyday communication. They come up all the time in both spoken as well as written English. As idioms don’t have a literal meaning, you will need to acquaint yourself with the meaning and usage of each idiom. Although it may feel like a lot of work, learning idioms is actually quite fun.</span></p><h2 data-dcnode-id="606" id="FAQs"><span data-dcnode-id="607" instrument_node="">FAQs</span></h2><h3 data-dcnode-id="604" id="htoc-1-is-copycat-an-idiom"><span data-dcnode-id="605" instrument_node="">1. Is copycat an idiom?</span></h3><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Yes, a copycat is an idiom. It means a person who copies or impersonates someone else. A copycat may copy the words, actions or behaviour of another.</span></p><h3 data-dcnode-id="600" id="htoc-2-how-are-idioms-created"><span data-dcnode-id="601" instrument_node="">2. How are idioms created?</span></h3><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Idioms have several origin stories, but the biggest contributor is figurative language, particularly metaphors. When a metaphor was first used, people found it fresh and vivid. Similarly, people were excited to use idioms as they had to think through the image to appreciate what it conveys.</span></p><h3 data-dcnode-id="593" id="htoc-3-how-do-you-recognise-an-idiomatic-expression"><span data-dcnode-id="597" instrument_node="">3. How do you recognise an </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.english-grammar-revolution.com/idiomatic-expressions.html" rel="nofollow"><span data-dcnode-id="596" instrument_node="">idiomatic expression</span></a><span data-dcnode-id="594" instrument_node="">?</span></h3><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">An idiomatic expression is an informal language with meaning different from that of the rest of the words in the expression. For example, the expression ‘Hold your tongue’ doesn’t mean that you grab a hold of your tongue. Instead, it means to remain silent.</span></p><h3 data-dcnode-id="589" id="htoc-4-what-are-the-different-types-of-idioms"><span data-dcnode-id="590" instrument_node="">4. What are the different types of idioms?</span></h3><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">According to Palmer’s Semantic: A New Outline published in 1976, idioms could be divided into three types. Firstly, phrasal verbs, secondly prepositional verbs, and lastly partial idiom.</span></p><h3 data-dcnode-id="585" id="htoc-5-what-are-the-characteristics-of-idioms"><span data-dcnode-id="586" instrument_node="">5. What are the characteristics of idioms?</span></h3><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">An idiom is a phrase that presents a figurative, non-literal meaning. In addition, an idiom’s figurative meaning is different from its literal one.</span></p><h3 data-dcnode-id="581" id="htoc-6-are-idioms-the-same-as-proverbs"><span data-dcnode-id="582" instrument_node="">6. Are idioms the same as Proverbs?</span></h3><figure class="wp-block-embed aligncenter is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="569"><div class="wp-block-embed__wrapper" data-dcnode-id="572"><div class="rll-youtube-player" data-dcnode-id="575" data-id="4JJg_FWMlNg" data-query="feature=oembed" data-src="https://www.youtube.com/embed/4JJg_FWMlNg"><div data-dcnode-id="576" data-id="4JJg_FWMlNg" data-query="feature=oembed" data-src="https://www.youtube.com/embed/4JJg_FWMlNg"><img alt="" data-dcnode-id="580" data-lazy-src="https://i.ytimg.com/vi/4JJg_FWMlNg/hqdefault.jpg" height="360" width="480"><noscript data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="577"></button></div></div><noscript data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">&lt;iframe title="Simile vs metaphor vs idiom vs proverb vs expression - What&amp;#039;s the difference?" width="640" height="360" src="https://www.youtube.com/embed/4JJg_FWMlNg?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><figcaption data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Simile vs Metaphor vs Idiom vs proverb</span></figcaption></figure><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">No idioms and proverbs are not the same. Given below are the differences between them.</span></p><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">1. An idiom is a phrase that contains a non-literal meaning that can not be understood in layman’s language. A proverb on the other hand is defined as a well-known sentence used to advise another person. Additionally, a proverb has a literal meaning that applies in different stages of life.</span></p><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">3. Idioms are mainly used in poetry, while proverbs are used in daily lives.</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">4. Idioms express an idea or thought. People use proverbs to give suggestions to other people.</span></p><h3 data-dcnode-id="559" id="htoc-7-how-are-an-idiom-and-a-metaphor-different"><span data-dcnode-id="560" instrument_node="">7. How are an idiom and a metaphor different?</span></h3><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">A metaphor refers to a word or phrase applied to an object, but that is not literally applicable. The difference between the two lies in the fact that an idiom is a phrase used to describe a situation, while a metaphor is an indirect comparison to describe something. A</span></p><h3 data-dcnode-id="555" id="htoc-8-what-is-the-difference-between-an-idiom-and-hyperbole"><span data-dcnode-id="556" instrument_node="">8. What is the difference between an idiom and hyperbole?</span></h3><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Hyperboles are exaggerated statements made by the author not meant to be understood literally, whereas idioms are popular phrases that do not have a literal meaning</span></p><h3 data-dcnode-id="551" id="htoc-9-is-it-s-raining-cats-and-dogs-an-idiom-or-hyperbole"><span data-dcnode-id="552" instrument_node="">9. Is it’s ‘raining cats and dogs’ an idiom or hyperbole?</span></h3><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">“It’s raining cats and dogs” is not hyperbole. Instead, it is an idiomatic expression.</span></p><h3 data-dcnode-id="547" id="htoc-10-what-idiom-is-given-for-heart"><span data-dcnode-id="548" instrument_node="">10. What idiom is given for heart?</span></h3><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The idiom ‘Cross One’s Heart and Hope to Die,’ is commonly used by children. It means to promise someone that what they are saying is true.</span></p><h3 data-dcnode-id="543" id="htoc-11-what-are-the-type-of-phrases-with-examples"><span data-dcnode-id="544" instrument_node="">11. What are the type of phrases (with examples)?</span></h3><p data-dcnode-id="538"><strong data-dcnode-id="539"><span data-dcnode-id="542" instrument_node="">1. </span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noun_phrase%23%3A~%3Atext%3DA%2520noun%2520phrase%252C%2520or%2520nominal%2Cgrammatical%2520function%2520as%2520a%2520noun.%26text%3DNoun%2520phrases%2520often%2520function%2520as%2Cas%2520the%2520complements%2520of%2520prepositions." rel="nofollow"><span data-dcnode-id="541" instrument_node="">Noun Phrase</span></a></strong></p><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">A noun phrase functions just like any other noun in the sentence. All other determiners modify that particular noun phrase.&nbsp;</span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">For example, ‘Friday became a cool, wet afternoon.’</span></p><p data-dcnode-id="529"><strong data-dcnode-id="530"><span data-dcnode-id="533" instrument_node="">2.</span><a class="broken_link" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglish.britishcouncil.org/grammar/english-grammar-reference/verb-phrases" rel="nofollow"><span data-dcnode-id="532" instrument_node=""> Verb phrase</span></a></strong></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">A verb phrase contains at least one verb and its dependents, including complements, objects and modifiers. However, it does not always include a subject.&nbsp;</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">for example, ‘Mary might have been waiting outside for you’.</span></p><p data-dcnode-id="519"><strong data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">3. </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grammarly.com/blog/gerund-phrase/%23%3A~%3Atext%3DA%2520gerund%2520phrase%2520is%2520a%2Cobject%252C%2520or%2520a%2520predicate%2520nominative." rel="nofollow"><span data-dcnode-id="523" instrument_node="">Gerund phrase</span></a><span data-dcnode-id="521" instrument_node="">&nbsp;</span></strong></p><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">For example, ‘Eating ice cream during a heatwave can be a good way to cool off.’</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">A gerund phrase contains a gerund or other modifiers as well as objects associated with it.&nbsp;</span></p><p data-dcnode-id="510"><strong data-dcnode-id="511"><span data-dcnode-id="514" instrument_node="">4. </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishsentences.com/infinitive-phrase/%23%3A~%3Atext%3DAn%2520infinitive%2520phrase%2520is%2520a%2Cnoun%252C%2520adjective%252C%2520or%2520adverb." rel="nofollow"><span data-dcnode-id="513" instrument_node="">Infinitive phrase</span></a></strong></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">This refers to a group of words that uses an infinitive, that is, ‘to’+verb.&nbsp;</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">For example, ‘She helped to construct the roof.’</span></p><p data-dcnode-id="501"><strong data-dcnode-id="502"><span data-dcnode-id="505" instrument_node="">5. </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/prepositional%2520phrase%23%3A~%3Atext%3DDefinition%2520of%2520prepositional%2520phrase%26text%3D%253A%2520a%2520phrase%2520that%2520begins%2520with%2CRussia%2522%2520is%2520a%2520prepositional%2520phrase." rel="nofollow"><span data-dcnode-id="504" instrument_node="">Prepositional phrase</span></a></strong></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">A phrase that begins with a preposition and ends in a noun, noun phrase or pronoun is called a prepositional phrase.&nbsp;</span></p><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">For example, ‘In the kitchen, you will find my mom.’</span></p><div class="crp_related" data-dcnode-id="444"><h3 data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">People who read this also read:</span></h3><ul data-dcnode-id="446"><li data-dcnode-id="487"><a class="crp_link post-19757" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.podium.school/english/storytelling/"><figure data-dcnode-id="491"><img alt="Storytelling: How To Master The Art Of  Storytelling?" class="crp_thumb crp_first" data-dcnode-id="494" data-lazy-src="https://learn.podium.school/wp-content/uploads/2021/12/what-is-storytelling-1024x1024.jpg" height="300" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20300'%3E%3C/svg%3E" title="Storytelling: How To Master The
