2 0 1021.25 36.81m27.87-37.08a22 22 0 1017.51 39.32m31.62-39.53a22 22 0 1013.43 41.33m35.71-41.48a22 22 0 109.1 42.8m40.05-42.89a22 22 0 104.59 43.7M3624 2a22 22 0 100 44m49.15-43.97a22 22 0 00-4.59 43.7m53.74-43.61a22 22 0 00-9.1 42.8m58.24-42.65a22 22 0 00-13.43 41.33m62.56-41.12a22 22 0 00-17.51 39.32m66.63-39.05a22 22 0 00-21.25 36.81m70.36-36.48a22 22 0 00-24.6 33.85m73.68-33.47a22 22 0 00-27.49 30.53m76.56-30.09a22 22 0 00-29.87 26.9m78.91-26.4a22 22 0 00-31.72 23.04M4115 4.95A22 22 0 004082 24m81.98-18.45a22 22 0 00-33.71 15.01m82.66-14.36a22 22 0 00-33.85 11m82.77-10.3a22 22 0 00-33.45 7.11m82.32-6.36a22 22 0 00-32.52 3.42" data-dcnode-id="375" fill="none"></path></svg></div></div></div></div></amp-ad></div></div><span data-dcnode-id="366" instrument_node=""> </span></div><span data-dcnode-id="364" instrument_node=""> </span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Idiomatic expressions are not just limited to one language as every other language actually has one thought they could be difficult to understand, less one happens to be proficient enough in that particular language. An idiom also happens to influenced by the culture from where it came from. So being familiar with a culture does help in trying to understand the meaning behind them, and they are not all too difficult to understand is; quite simple as to what most people would normally believe them to be. So for this article, we listed down about 10 idiomatic expressions and explained each one of them for your convenience.</span></p><h2 data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">At the drop of a hat</span></h2><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">What this idiomatic expression means is that people&nbsp;did or will do things instantly and without hesitation. The term&nbsp;originated most likely in the 19th century where it was occasionally the practice in the United States to signal the start of a fight or a race by dropping a hat or sweeping it downward while holding it in the hand. The quick response to the signal found its way into the language for any action that begins quickly without much need for prompting.</span></p><h2 data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Back to the Drawing Board</span></h2><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">This means that they have just failed and must start all over again from square one.&nbsp;The saying is attributed to an American artist named Peter Arno, who published his cartoons in the New Yorker. In a comic strip from 1941, we see a man in a fancy suit, carrying a bunch of rolled up papers assumed to be mechanical drawings of an aircraft, walking away from a crashed plane. In the bubble above his head, we read “Well, back to the drawing board.”</span></p><h2 data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Once in a blue moon</span></h2><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">This idiom means that something is or has happened but it is something that happens very rarely. One factor that&nbsp;could attribute to the origin of this idiom is that very occasionally, the moon actually does appear to be blue. This sometimes occurs after a volcanic eruption. Dust particles in the atmosphere are normally of a certain size that is enough to diffract blue light, making the moon appear reddish at sunset. Larger volcanic dust particles diffract red light, making the moon appear bluish.</span></p><h2 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Piece of Cake</span></h2><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">This means something that can be done very easily. The origin of this would be that there was a tradition in the US slavery states where slaves would circle around a cake at a gathering. The most “graceful” pair would win the cake in the middle. From this, the term “cakewalk” and “piece of cake” came into being, both meaning that something was easy to accomplish.</span></p><h2 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">See eye to eye</span></h2><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">This means to view something in the same capacity as that of others. The origin of this is quite old and comes from the bible.&nbsp;In Isaiah 52:8, we read “The voice of your watchmen—they lift up their voice; together they sing for joy; for eye to eye they see the return of the Lord to Zion.”</span></p><h2 data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Let the cat out of the bag</span></h2><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">The meaning of this would be to let out secrets that were not meant to be disclosed.&nbsp;The first recorded use of this phrase comes from a book review in a 1760 edition of&nbsp;London Magazine. The reviewer complains that, “We could have wished that the author had not let the cat out of the bag.”</span></p><h2 data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">In the heat of the moment</span></h2><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">The idiom means that you have said or done something&nbsp;because you were either angry or excited. The idiom became popular in the late 20th century&nbsp;and its origin is unknown.</span></p><h2 data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Kill two birds with one stone</span></h2><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">This idiom means that you can accomplish&nbsp;two things through one means. A possible origin story for this would be&nbsp;in the Greek Mythology tale of Daedalus and Icarus. Daedalus is held captive by King Minos on Crete in a high tower. All he is able to see are high walls around him and large birds overhead awaiting his and his son, Icarus’ demise. Daedalus devises a plan to throw stones at the birds in the hope of fashioning artificial wings to enable the pair to fly home. He finds, with his stone through a clever throwing motion, that he is able to strike one bird with the ricochet hitting a second bird, thus killing two birds with one stone. The rest is history.</span></p><h2 data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">It takes two to tango</span></h2><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">This means that in order to do something, two people are required to execute it.&nbsp;The origin story for this comes&nbsp;in the form of a song, Takes Two to Tango, which was written and composed in 1952 by Al Hoffman and Dick Manning. The lyrics and melody were popularized by singer Pearl Bailey’s 1952 recording. The phrase became famous when&nbsp;Ronald Reagan used it when he was talking about the Russian-American relations during a 1982 presidential news conference. Since then, the phrase was used a lot&nbsp;by the press and has now become a saying.</span></p><h2 data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Every cloud has a silver lining</span></h2><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">The meaning of this idiom is that&nbsp;there will always be something that will come out of every misfortune that has befallen.&nbsp;The origin of the idiom is most likely traceable to the year 1634 when John Milton Penned his masque Comus.&nbsp;There is a quote within it that says “Was I deceived or did a sable cloud Turn forth her silver lining on the night?” </span></p></div><span data-dcnode-id="320" instrument_node=""> </span><div data-dcnode-id="190" id="sidebar_out"><span data-dcnode-id="319" instrument_node=""> </span><aside class="sidebar" data-dcnode-id="192" id="sidebar"><span data-dcnode-id="318" instrument_node=""> </span><div class="related-post" data-dcnode-id="267"><span data-dcnode-id="317" instrument_node=""> </span><ul data-dcnode-id="269"><span data-dcnod
