</span><h2 data-dcnode-id="1570"><span data-dcnode-id="1571" style="color:#0000ff;"><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Introduction</span></strong></span></h2><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Intercultural or interpersonal communication may be defined as a continuous occurrence for mutual transfer of information resulting from happenings in the past and the past actions of the concerned parties.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Intercultural communication arises when different groups of varied cultures gather and convey information correctly and skillfully in a manner acceptable to the group’s diverse opinions.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Also read:</span></p><span data-dcnode-id="1560" instrument_node="">

</span><li data-dcnode-id="1548"><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuemath.com/learn/multicultural-education/" target="_blank"><span data-dcnode-id="1550" instrument_node="">What is Multicultural Education? How to adopt them in classroom?</span></a></li><span data-dcnode-id="1547" instrument_node="">

</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Intercultural communication offers the ability to deal across cultures, which is increasingly important, as the world gets smaller. Getting smaller doesn't mean the world is becoming identical, it means having more and more contact with people who are culturally different.&nbsp;The importance of intercultural communication is&nbsp;mentioned below in the Downloadable PDF.</span></p><span data-dcnode-id="1533" instrument_node="">

</span><p data-dcnode-id="1519" style="text-align: center;"><strong data-dcnode-id="1520"><a class="cta-button" data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuemath.com/parent/signup/%3Fnext_url%3D/learn/parenting/intercultural-communication/%253Fdownload_pdf%253Dtrue%2526dwnld_index%253D0%2526group%253D%26page_topic%3DLearn%26intent%3Dparent-signup-seo%26source%3DResource%2520Download" style="display: inline-grid"><span data-dcnode-id="1522" instrument_node="">Download</span></a></strong></p><span data-dcnode-id="1518" instrument_node="">

</span><h2 data-dcnode-id="1503"><strong data-dcnode-id="1504"><span data-dcnode-id="1505" style="color:#0000ff;"><span data-dcnode-id="1506" instrument_node="">Definitions</span></span></strong></h2><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1496"><strong data-dcnode-id="1498"><span data-dcnode-id="1500" style="color:#9b59b6;"><span data-dcnode-id="1501" instrument_node="">International communication</span></span><span data-dcnode-id="1499" instrument_node=""> </span></strong><span data-dcnode-id="1497" instrument_node="">is the transfer of information between one government to another government mutually.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1489"><strong data-dcnode-id="1491"><span data-dcnode-id="1493" style="color:#9b59b6;"><span data-dcnode-id="1494" instrument_node="">Intracultural communication</span></span><span data-dcnode-id="1492" instrument_node=""> </span></strong><span data-dcnode-id="1490" instrument_node="">is that which occurs within the same cultural group.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1482"><strong data-dcnode-id="1484"><span data-dcnode-id="1486" style="color:#9b59b6;"><span data-dcnode-id="1487" instrument_node="">Intercultural business communication</span></span><span data-dcnode-id="1485" instrument_node=""> </span></strong><span data-dcnode-id="1483" instrument_node="">takes place within a business group or among many business concerns, both having people of diverse cultures.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479" style="text-align: center;"><img alt="Intercultural business communication" data-dcnode-id="1480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture4-1601033429.png&amp;raw" style="max-width: 100%;width: 400px; height: 210px;"></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">In intercultural communication, people of one culture try to know the information conveyed to them by other cultures. For example, in a hotel establishment, the hoteliers assess their customers’ requirements, tastes, and provide services accordingly. The customers also inform the hoteliers of their needs.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1471"><strong data-dcnode-id="1472"><span data-dcnode-id="1473" style="color:#ff9933;"><span data-dcnode-id="1474" instrument_node="">Distinct cultures arise from:</span></span></strong></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Nations, races, religions, managers, workers, linguistics, philosophical beliefs, commerce, officers, genders, etc.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">To share information and ideas among cultures, it is necessary to know one’s own culture, cultures of other surrounding groups, the dominating group’s culture and co-cultures of gender, religion or age group, etc.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><h3 data-dcnode-id="1460"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" style="color:#ff9933;"><span data-dcnode-id="1463" instrument_node="">What is interpersonal communication?</span></span></strong></h3><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">In interpersonal communication, both verbal (oral) and non – verbal modes exist.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">The non-verbal mode is silent, exhibiting body language using eye contact, hand movements, facial expressions, and other body gestures.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451" style="text-align: center;"><img alt="interpersonal communication, both verbal (oral) and non – verbal" data-dcnode-id="1452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture5-1601033483.png&amp;raw" style="max-width: 100%;width: 300px; height: 210px;"></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Non-verbal behavior is preferred and adopted more by females than males.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">White people give more importance to non-verbal behavior.</span></p><span data-dcnode-id="1444" instrument_node="">
</span></div><span data-dcnode-id="1442" instrument_node="">
</span><hr data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">
</span><div data-dcnode-id="1385" id="P003"><span data-dcnode-id="1439" instrument_node="">
</span><h2 data-dcnode-id="1435"><span data-dcnode-id="1436" style="color:#0000ff;"><strong data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Types of Intercultural Communication (IC) skills</span></strong></span></h2><span data-dcnode-id="1434" instrument_node="">
</span><h3 data-dcnode-id="1430"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" style="color:#ff9933;"><span data-dcnode-id="1433" instrument_node="">There are 4 types of IC skills as below:</span></span></strong></h3><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1425" style="margin-left: 40px;"><span data-dcnode-id="1426" style="color:#000000;"><strong data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">1.&nbsp; Personal character like communication ability is not limited to the recipient, situation, and time.</span></strong></span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1420" style="margin-left: 40px;"><span data-dcnode-id="1421" style="color:#000000;"><strong data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">2.&nbsp; Communication skills suitable to situations independent of the receiver or receivers.</span></strong></span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1416" style="margin-left: 80px;"><span data-dcnode-id="1417" style="color:#9b59b6;"><span data-dcnode-id="1418" instrument_node="">Examples: public speaking, group meetings and job interviews.</span></span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1412" style="margin-left: 80px; text-align: center;"><span data-dcnode-id="1413" style="color:#9b59b6;"><img alt="public speaking, group meetings and job interviews" data-dcnode-id="1414" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture6-1601033537.png&amp;raw" style="max-width: 100%;width: 241px; height: 202px;"></span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1408" style="margin-left: 40px;"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">3. Communication based on the audience, single or many receivers.</span></strong></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1404" style="margin-left: 80px;"><span data-dcnode-id="1405" style="color:#9b59b6;"><span data-dcnode-id="1406" instrument_node="">Examples: stranger, superiors.</span></span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1400" style="margin-left: 80px; text-align: center;"><span data-dcnode-id="1401" style="color:#9b59b6;"><img alt="Examples: stranger, superiors" data-dcnode-id="1402" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture7-1601033583.png&amp;raw" style="max-width: 100%;width: 250px; height: 130px;"></span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1395" style="margin-left: 40px;"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" style="color:#000000;"><span data-dcnode-id="1398" instrument_node="">4. Communication with a receiver about specific situations while being constrained by time.</span></span></strong></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1391" style="margin-left: 80px;"><span data-dcnode-id="1392" style="color:#9b59b6;"><span data-dcnode-id="1393" instrument_node="">Examples: with superior in their office.</span></span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1387" style="margin-left: 80px; text-align: center;"><span data-dcnode-id="1388" style="color:#9b59b6;"><img alt="Communication with superior in their office" data-dcnode-id="1389" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture8-1601033647.png&amp;raw" style="max-width: 100%;width: 250px; height: 91px;"></span></p><span data-dcnode-id="1386" instrument_node="">
</span></div><span data-dcnode-id="1384" instrument_node="">
</span><hr data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
</span><div data-dcnode-id="1344" id="P004"><span data-dcnode-id="1381" instrument_node="">
</span><h2 data-dcnode-id="1377"><span data-dcnode-id="1378" style="color:#0000ff;"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Examples on Intercultural communication</span></strong></span></h2><span data-dcnode-id="1376" instrument_node="">
</span><ul data-dcnode-id="1362"><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">A Christian converses with a Muslim.</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">A woman receives an order from a man.</span></li><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">An American and African share their views.</span></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">A Chinese politician’s discussion with an American leader.</span></li><span data-dcnode-id="1363" instrument_node="">
</span></ul><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" style="color:#9b59b6;"><span data-dcnode-id="1360" instrument_node="">Things to be avoided in IC</span></span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355" style="margin-left: 40px;"><span data-dcnode-id="1356" instrument_node="">i)&nbsp; Abusing the traditions.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352" style="margin-left: 40px;"><span data-dcnode-id="1353" instrument_node="">ii)&nbsp; Slangs, idioms, and other regional sayings.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349" style="margin-left: 40px;"><span data-dcnode-id="1350" instrument_node="">iii)&nbsp; Insensitivity and unempathetic to other cultures and habits.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346" style="margin-left: 40px;"><span data-dcnode-id="1347" instrument_node="">iv)&nbsp; Not giving due consideration for language barriers.</span></p><span data-dcnode-id="1345" instrument_node="">
</span></div><span data-dcnode-id="1343" instrument_node="">
</span><hr data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">
</span><div data-dcnode-id="1299" id="P005"><span data-dcnode-id="1340" instrument_node="">
</span><h2 data-dcnode-id="1336"><span data-dcnode-id="1337" style="color:#0000ff;"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">The importance of Intercultural communication</span></strong></span></h2><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Interested academics and academics have researched the different intercultural communication aspects. Such studies are being used in business concerns, management, advertising, commercial establishments, website design, etc.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330" style="text-align: center;"><img alt="importance of Intercultural communication" data-dcnode-id="1331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture9-1601033749.png&amp;raw" style="max-width: 100%;width: 250px; height: 187px;"></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">These uses have become global as these establishments have wide networks all over the world. For them, IC is essential for the enlargement of their business and maximization of their profits by better managing their staff and understanding their consumer’s needs. Intercultural theories are now widely used in education, health care, and other public services. Such developments have been necessitated due to ever-increasing multicultural groups of the population.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">As we are not alone, we need to move in society. For this, the sharing of information, thoughts, and ideas are necessary. It is called communication, and via communication, we express our views, make others aware of our presence, and participate in every activity. Thus, avoiding separation from society, fulfilling our ambitions to achieve our aim, educating the people, etc. are the purposes of intercultural communication.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h3 data-dcnode-id="1319"><span data-dcnode-id="1320" style="color:#ff9933;"><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Education and intercultural communication</span></strong></span></h3><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The students in school are from diverse cultural groups of society. It is useful to spread knowledge among the students by properly utilizing intercultural communication.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Intercultural communication has different features:</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310" style="margin-left: 40px;"><span data-dcnode-id="1311" instrument_node="">i) Diverse groups express their thoughts in various ways.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307" style="margin-left: 40px; text-align: center;"><img alt="Education and intercultural communication" data-dcnode-id="1308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture10-1601033794.png&amp;raw" style="max-width: 100%;width: 250px; height: 119px;"></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304" style="margin-left: 40px;"><span data-dcnode-id="1305" instrument_node="">ii) Silent communication is sometimes more effective than an oral one. i.e., by eyes, touch, and other body language gestures. They should be correctly interpreted.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301" style="margin-left: 40px; text-align: center;"><img alt="Silent communication is sometimes more effective than an oral one" data-dcnode-id="1302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/screenshot-1-1601034073.png&amp;raw" style="max-width: 100%;width: 312px; height: 106px;"></p><span data-dcnode-id="1300" instrument_node="">
</span></div><span data-dcnode-id="1298" instrument_node="">
</span><hr data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">
</span><div data-dcnode-id="1273" id="P006"><span data-dcnode-id="1295" instrument_node="">
</span><h2 data-dcnode-id="1291"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" style="color:#0000ff;"><span data-dcnode-id="1294" instrument_node="">Summary:</span></span></strong></h2><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1287" style="text-align: justify;"><em data-dcnode-id="1288"><img alt="Communication is vital for us to live in a society" data-dcnode-id="1289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture12-1601034153.png&amp;raw" style="max-width: 100%; width: 240px; height: 250px; margin: 2px 12px; float: left;"></em></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284" style="text-align: justify;"><span data-dcnode-id="1285" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1280" style="text-align: justify;"><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Communication is vital for us to live in a society. Communication has developed vastly today from intrapersonal, through interpersonal, intercultural and intracultural stages. Messages can be communicated from person to person, person to small and large gatherings. The audience may be of the same kind of group or diverse kinds of political groups, ruling people, scientists, doctors and professionals. Intercultural communication is necessarily global today to address the needs of the various groups of people in every nation, race, religion, culture, professions, and politics. Today we are covered by the global economy, interdependent situation, intercultural communication is to be utilized beneficially. </span></em></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1275" style="text-align: right;"><em data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Written by P. Reeta Percy Malathi, Cuemath Teacher</span></em><span data-dcnode-id="1276" instrument_node="">.</span></p><span data-dcnode-id="1274" instrument_node="">
</span></div><span data-dcnode-id="1272" instrument_node="">
</span><hr data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">
</span><div data-dcnode-id="1152" id="faqs"><span data-dcnode-id="1269" instrument_node="">
</span><h2 data-dcnode-id="1265"><span data-dcnode-id="1266" style="color:null;"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Frequently Asked Questions (FAQs)</span></strong></span></h2><span data-dcnode-id="1264" instrument_node="">
</span><div data-dcnode-id="1219"><span data-dcnode-id="1263" instrument_node="">
</span><h2 data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">What is interpersonal communication?</span></h2><span data-dcnode-id="1260" instrument_node="">
</span><div class="collapsible-area" data-dcnode-id="1221"><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">In interpersonal communication, both verbal (oral) and non – verbal modes exist.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The non- verbal mode is silent, exhibiting body language using eye contact, hand movements, facial expressions, and other body gestures. The non – verbal behavior is preferred and adopted more by females than males.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">White people prefer non – verbal behavior. Serious partners preferred and worked on non – verbal communication than casual partners.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1247"><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Types of interpersonal communication</span></strong></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">I. oral (through speech)</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241" style="padding-left: 30px;"><span data-dcnode-id="1242" instrument_node="">i) Between two people(telephone).</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238" style="padding-left: 30px; text-align: center;"><img alt="Between two people(telephone)" data-dcnode-id="1239" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture13-1601035171.png&amp;raw" style="max-width: 100%;width: 211px; height: 149px;"></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235" style="padding-left: 30px;"><span data-dcnode-id="1236" instrument_node="">ii) Public speeches</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232" style="padding-left: 30px; text-align: center;"><img alt="Public speeches" data-dcnode-id="1233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture14-1601035249.png&amp;raw" style="max-width: 100%;width: 182px; height: 98px;"></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229" style="padding-left: 30px;"><span data-dcnode-id="1230" instrument_node="">iii) Small group communication.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">II. Non-verbal</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223" style="padding-left: 60px;"><span data-dcnode-id="1224" instrument_node="">-Through body language.</span></p><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span></div><span data-dcnode-id="1218" instrument_node="">
</span><div data-dcnode-id="1187"><span data-dcnode-id="1217" instrument_node="">
</span><h2 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">What is the nature of interpersonal communication?</span></h2><span data-dcnode-id="1214" instrument_node="">
</span><div class="collapsible-area" data-dcnode-id="1189"><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" style="color:#ff9933;"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Nature of interpersonal communication (IPC):</span></strong></span></p><span data-dcnode-id="1208" instrument_node="">
</span><ul data-dcnode-id="1191"><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">It is for independent individuals.</span></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">It is both verbal and body language messages.</span></li><span data-dcnode-id="1201" instrument_node="">
</span><li data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">It exists in various forms.</span></li><span data-dcnode-id="1198" instrument_node="">
</span><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">IPC is relational naturally.</span></li><span data-dcnode-id="1195" instrument_node="">
</span><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">It has a continuously rising trend.</span></li><span data-dcnode-id="1192" instrument_node="">
</span></ul><span data-dcnode-id="1190" instrument_node="">
</span></div><span data-dcnode-id="1188" instrument_node="">
</span></div><span data-dcnode-id="1186" instrument_node="">
</span><div data-dcnode-id="1169"><span data-dcnode-id="1185" instrument_node="">
</span><h2 data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">What is intrapersonal communication?</span></h2><span data-dcnode-id="1182" instrument_node="">
</span><div class="collapsible-area" data-dcnode-id="1171"><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Intrapersonal communication is a person’s communication with himself. It is an internal thinking activity and silent dialogue, rarely loud.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176" style="text-align: center;"><img alt="Intrapersonal communication is a person’s communication with himself" data-dcnode-id="1177" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture15-1601035318.png&amp;raw" style="max-width: 100%;width: 203px; height: 154px;"></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Thus, it is self-talk before we act. The sender and receiver of the message are the same people, the message being our thought. Intrapersonal communication is perpetual.</span></p><span data-dcnode-id="1172" instrument_node="">
</span></div><span data-dcnode-id="1170" instrument_node="">
</span></div><span data-dcnode-id="1168" instrument_node="">
</span><div data-dcnode-id="1154"><span data-dcnode-id="1167" instrument_node="">
</span><h2 data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">What is the purpose of intercultural communication?</span></h2><span data-dcnode-id="1164" instrument_node="">
</span><div class="collapsible-area" data-dcnode-id="1156"><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Sharing information, thoughts, and ideas is necessary. It is called communication and by communication, we express our views. We make others aware of our presence and participate in any activity. Thus, avoiding separation from society, fulfilling our ambitions to achieve our aim, educating the people, etc. are the purposes of intercultural communication.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158" style="text-align: center;"><img alt="purpose of intercultural communication" data-dcnode-id="1159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d138zd1ktt9iqe.cloudfront.net/media/seo_landing_files/picture16-1601035384.png&amp;raw" style="max-width: 100%;width: 220px; height: 111px;"></p><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">
</span></div><span data-dcnode-id="1153" instrument_node="">
</span></div><span data-dcnode-id="1151" instrument_node="">
</span></div></div><div class="separator-sc-gf6uv9-0 fiuksB" data-dcnode-id="1148"></div></div></div></div></div><div class="separator-sc-gf6uv9-0 fiuksB" data-dcnode-id="1143"></div><div class="bundle__FlexView-sc-czofrr-4 blog-type-v1__RowWrapper-sc-3xu672-0 iKcsp" data-dcnode-id="1140"><div class="bundle__FlexView-sc-czofrr-4 blog-type-v1__TemplateWrapper-sc-3xu672-1 vjShl" data-dcnode-id="1141" width="676px"><div class="bundle__FlexView-sc-czofrr-4 eTQClf" data-dcnode-id="1142"></div></div></div><hr class="blog-type-v1__Ruler-sc-3xu672-11 gJQNqO" data-dcnode-id="1139"><div class="bundle__FlexView-sc-czofrr-4 blog-type-v1__RowWrapper-sc-3xu672-0 iKcsp" data-dcnode-id="1126"><div class="bundle__FlexView-sc-czofrr-4 blog-type-v1__TemplateWrapper-sc-3xu672-1 vjShl" data-dcnode-id="1127" width="676px"><div class="bundle__FlexView-sc-czofrr-4 eTQClf" data-dcnode-id="1128"><div class="blog-type-v1__SharingLinksWrapper-sc-3xu672-12 ZZBro" data-dcnode-id="1129"><div class="sharing-links__Container-sc-wqkauu-1 jQijft" data-dcnode-id="1130"><a class="sharing-links__SocialLink-sc-wqkauu-2 iaRZFn" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.cuemath.com/learn/parenting/intercultural-communication/" rel="noopener noreferrer" target="_blank"><div alt="Facebook" class="image__PlaceholderImage-sc-14o5d8f-1 bzLOzT sharing-links__IconWrapper-sc-wqkauu-0 bxukxa" data-dcnode-id="1138"></div></a><a class="sharing-links__SocialLink-sc-wqkauu-2 iaRZFn" data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3Dhttps%3A//www.cuemath.com/learn/parenting/intercultural-communication/" rel="noopener noreferrer" target="_blank"><div alt="Twitter" class="image__PlaceholderImage-sc-14o5d8f-1 bzLOzT sharing-links__IconWrapper-sc-wqkauu-0 bxukxa" data-dcnode-id="1136"></div></a><a class="sharing-links__SocialLink-sc-wqkau
