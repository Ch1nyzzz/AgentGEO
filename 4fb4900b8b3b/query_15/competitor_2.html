</span><br data-dcnode-id="1031"><a class="button text-m dark-green-bg" data-dcnode-id="1029" href="#" id="btnWtng" rel="nofollow"><span data-dcnode-id="1030" instrument_node="">Check Writing Quality</span></a></div><span data-dcnode-id="1027" instrument_node="">
</span><span class="document__preview" data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">The growing number of idioms in Dictionary of American Idioms shows the fundamental role idioms play in daily language use (Bortfeld, 2003). In this regard, Moreno (2011) explains three principal reasons why it is so important to teach idioms. Moreno (2011) argues that because of high frequency of idioms, special attention should be paid to them and </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cram.com/subjects/language" style="color:#3174a3"><span data-dcnode-id="1025" instrument_node="">language</span></a><span data-dcnode-id="1023" instrument_node=""> instructors should not relegate them to a secondary state in the curriculum. According to Moreno (2011), the three principal reasons why it is so important to teach idioms are as follow: First, repeatedly use of idioms change language learners into fluent speakers, and figurative competence in a foreign language is an indication of communicative competence. Furthermore, idiomatic</span></span><span data-dcnode-id="1021" instrument_node="">
</span><a class="document__middle cursor-pointer" data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cram.com/document/FJSHVTMTUU" onclick="saveredirect(this.href);return false;" rel="nofollow" role="button" style="color: #3174a3;"><i data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">…show more content…</span></i></a><span data-dcnode-id="1017" instrument_node="">
</span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">
</span><span class="document__preview" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">In order to understand their underlying nature, we have to utilize cultural factors and choose a diachronic view of the language. Dastjerdi and Alipour (2010), in describing the significance of idioms, pointed out that non- native learners would seem abnormal if their speech lacks idiomatic language. Moreover, Irujo, (1986) argues that idioms are frequently utilized in everyday language. Hence, L2 learners are required to meet the challenge of learning idioms sooner or later. Viteli (1989) also believes learning idioms is absolutely necessary. Viteli (1989) adds English is very strong in idiomatic expressions, since it is too hard to speak or write English without noticing idioms. Viteli (1989) also pointed out that “A native speaker does not know that he is using an idiom; it is possible that he is not aware that the idiom is difficult to understand for non- native speaker. A non- native speaker attempt to use the idioms correctly, but the fact is that some idioms are grammatically or semantically incorrect and it can lead to some difficulties”</span></span><span data-dcnode-id="1012" instrument_node="">
</span><a class="document__middle cursor-pointer" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cram.com/document/FJSHVTMTUU" onclick="saveredirect(this.href);return false;" rel="nofollow" role="button" style="color: #3174a3;"><i data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">…show more content…</span></i></a><span data-dcnode-id="1008" instrument_node="">
</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">
</span><span class="document__preview" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">They pointed out that idiomatic expressions are used in all shapes of discourse, such as in conversations, talks, films, radio broadcasts, TV programs, and etc. Therefore, in Fotovatnia and Khaki’s (2012) view, in the process of learning a foreign language, learning idiomatic expressions is absolutely necessary.  Fotovatnia and Khaki’s (2012) add idiomatic expressions are very frequent in English but the problem is that using them appropriately by second language learners seems very difficult. Therefore, learning English idioms is absolutely essential for second language learners, and every second language learner is required to prepare himself or herself to face with these challenges (Irujo, 1986).  As Boers (1992) pointed out, native speakers frequently use idiomatic expressions. Hence, non-native speakers need to collect some kinds of knowledge with idiomatic expressions to understand their meaning and communicate</span></span><span data-dcnode-id="1003" instrument_node="">
</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">

</span><p class="text-m break-word word-break text-ellipsis-after" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Many factors will determine which words are selected by the learners to be inferred. Paribakht and Wesche (1999) argue that the three main important factors that influence the learner’s decision in the selection of what unknown words to infer are the importance of the unknown word to text comprehension, its part of speech, and the learner’s perception of its general importance. There is no guarantee that the meaning of all these unknown words will be guessed correctly as inferencing the meaning of unknown words is a multidimensional task and dependent on various factors. Learners’ reading proficiency has been referred by many researchers as a main factor which influences the outcome of lexical inferencing and is in turn influenced by learners’ ability in lexical inferencing. Paribakht and Bengelei (2004) conducted a study to investigate the relationship between reading proficiency and EFL university learners’ lexical inferencing ability.…</span></p><span data-dcnode-id="426" instrument_node="">
