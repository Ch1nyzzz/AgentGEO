ges/seo-templates/copy.png&amp;raw"></div></div><div data-dcnode-id="575"><div class="topicPage_leftSection__2WOwK" data-dcnode-id="576" id="leftSection"><div class="AdBanner_bannerContainer__2AsLX" data-dcnode-id="948" id="AdBannerCont"><img alt="Vedantu Pro courses" data-dcnode-id="949" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seo-manager.s3.ap-southeast-1.amazonaws.com/prod/public/seo/add_banner/abf5071d-17f4-49b3-921c-b8a392780bfb&amp;raw"></div><div class="HeadSection_HeadDescriptionWrapper__1hWNB" data-dcnode-id="930" id="headWrapper"><div class="HeadSection_subTitleWrapper__3nNuF" data-dcnode-id="945"><h2 class="HeadSection_subTitleSection__iv2iB" data-dcnode-id="946" id="#undefined" itemprop="name"><span data-dcnode-id="947" instrument_node="">Types of Communication - Importance</span></h2></div><div data-dcnode-id="931" id="TopicFeedback"><div class="false TopicFeedback_TopicFeedbackWrapper__3cPAr" data-dcnode-id="932" id="TopicFeedbackWrapper"><div class="LikesComponent_likesContainer__1Xkc- TopicFeedback_topicLike__3fIGz" data-dcnode-id="938"><div class="LikesComponent_wrapperViewLikes__yuVOw" data-dcnode-id="939"><div class="LikesComponent_likesDislikescontainer__SZG-e" data-dcnode-id="940"><div class="LikesComponent_likesCount__1F27H" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Is this page helpful?</span></div><img class="LikesComponent_upVoteFalseButton__1-WeJ" data-dcnode-id="942" id="likeContainer"><img class="LikesComponent_downVoteFalseButton__1R7KV" data-dcnode-id="941" id="dislikeContainer"></div></div></div><div class="CommentIcon_CommentIcon__GdlFw" data-dcnode-id="937"></div><div data-dcnode-id="935" id="bookmark"><div class="BookmarkIcon_topicBookMarkOutline__1eOa3" data-dcnode-id="936" height="20" style="cursor: pointer;" width="15"></div></div><div class="TopicFeedback_moreOptions__18Wsa" data-dcnode-id="933"><div class="TopicFeedback_dotsSection__15PI5" data-dcnode-id="934"></div></div></div></div></div><div data-dcnode-id="929" id="mainModuleContainerWrapper"></div><div class="uploadDocument_documentWrapper__37fC4" data-dcnode-id="716"><div data-dcnode-id="731"><div class="uploadDocument_parsedHtml__1mS12" data-dcnode-id="732" id="parsed-html-holder"><p data-dcnode-id="924" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="927" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="928" instrument_node="">Definition:</span></span><span data-dcnode-id="925" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="926" instrument_node=""> Communication is a two-way process in which people exchange information, ideas, opinions, emotions, feelings, and other feelings through symbols and semiotic conventions that are mutually understood (signs and symbols)</span></span></p><p data-dcnode-id="920"><span data-dcnode-id="921" id="docs-internal-guid-b9d12cbf-7fff-9afe-2445-fd3f8fd6eede"><br data-dcnode-id="922"></span></p><p data-dcnode-id="917" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="918" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="919" instrument_node="">Communication is fundamental to the survival of man as well as to an organization. It is a two-way process where a piece of information is coded to form a message and sent by a sender. The message is transmitted through a medium and received and decoded by a recipient. Based on the success of decoding the message, the recipient (or decision-maker) takes an action or sends feedback to the sender.</span></span></p><p data-dcnode-id="915"><br data-dcnode-id="916"></p><p data-dcnode-id="912" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="913" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="914" instrument_node="">Effective and efficient communication is a must for any situation or program to be a complete success. If Communication is not clear, the instructions given out may create confusion among the receivers or even worse, the Communication may remain incomplete. Thus, it is important to communicate effectively in order to make a venture successful.&nbsp;</span></span></p><p data-dcnode-id="910"><br data-dcnode-id="911"></p><h3 data-dcnode-id="907" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="908" style="font-size: 14pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="909" instrument_node="">Importance of Communication Skills</span></span></h3><p data-dcnode-id="904" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="905" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="906" instrument_node="">In the case of business operations, communication skills are of utmost importance. One's Communication skill determines one's style of communicating with others. There can be several methods or ways to deliver a particular message. The skill of Communication sets apart an individual from others in his way of delivering a message successfully.</span></span></p><p data-dcnode-id="902"><br data-dcnode-id="903"></p><h3 data-dcnode-id="899" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="900" style="font-size: 14pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="901" instrument_node="">Types of Communication</span></span></h3><p data-dcnode-id="896" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="897" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="898" instrument_node="">Broadly Communication can be divided into three categories- verbal, non-verbal and visual. The following sections will give details of each of these types and their sub-types.</span></span></p><p data-dcnode-id="894"><br data-dcnode-id="895"></p><p data-dcnode-id="891" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="892" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="893" instrument_node="">1. Verbal Communication</span></span></p><p data-dcnode-id="888" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="889" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="890" instrument_node="">This refers to Communication using spoken words of the language. But in the broader sense, the written form of information is also a part of this. The word "verbal Communication" refers to a sort of Communication in which a message is delivered orally, and it encompasses both oral and written Communication. The goal of any Communication is for people to understand what we're trying to express. The following categories are used to categorize verbal Communication:</span></span></p><ul data-dcnode-id="879" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="884" dir="ltr" style="list-style-type: disc; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre; margin-left: 36pt;"><p data-dcnode-id="885" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="886" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="887" instrument_node="">Oral Communication</span></span></p></li><li aria-level="1" data-dcnode-id="880" dir="ltr" style="list-style-type: disc; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre; margin-left: 36pt;"><p data-dcnode-id="881" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="882" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="883" instrument_node="">Written Communication</span></span></p></li></ul><ol data-dcnode-id="874" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="875" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre;"><p data-dcnode-id="876" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="877" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="878" instrument_node="">Oral Communication&nbsp;</span></span></p></li></ol><p data-dcnode-id="871" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="872" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="873" instrument_node="">Communication using spoken word through a channel or media in direct or indirect form; the information here is passed only in the form of sound. The conversation is an oral mode of Communication which can take place. face-to-face, over the phone or via voice messages. In oral Communication, spoken words are used. Examples include face-to-face Communication, speech, telephonic Communication, video, radio, television, and voice over the internet. Oral Communication is influenced by pitch, loudness, tempo, and clarity of speech.</span></span></p><ol data-dcnode-id="866" start="2" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="867" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre;"><p data-dcnode-id="868" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="869" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="870" instrument_node="">Written Communication</span></span></p></li></ol><p data-dcnode-id="863" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="864" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="865" instrument_node="">When information is delivered in the written form; letters, e-mails, texts, research reports, handbooks or posters, even flyers or posts on social media are also considered Communication. In written Communication, written signs or symbols are used to transmit information. A handwritten message might be typed or handwritten. Messages can be sent via email, letter, report, note, and other kinds of written Communication. The message in written Communication is influenced by the vocabulary and grammar used, as well as the writing style, precision, and clarity of the language used. The most popular mode of corporate Communication is written Communication. As a result, it's considered one of the most valuable commercial talents.</span></span></p><p data-dcnode-id="861"><br data-dcnode-id="862"></p><p data-dcnode-id="858" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="859" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="860" instrument_node="">2. Non-Verbal Communication&nbsp;</span></span></p><p data-dcnode-id="855" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="856" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="857" instrument_node="">Here the Communication is wordless and mainly facilitates verbal Communication. Facial expressions, body language, signs and symbols, gestures, etc fall under this category. Your expression often shows how you associate with the message. If these non-verbal expressions are under control, Communication can be regulated too. There are several types of it. Nonverbal Communication refers to the sending and receiving of nonverbal messages. We can say that Communication other than oral and written, such as gestures, body language, posture, tone of voice or facial expressions, is called nonverbal Communication. The most significant part of nonverbal Communication is the speaker's body language. The receiver's interpretation of the message is aided by nonverbal Communication. Nonverbal cues generally represent the situation more accurately than verbal cues. Sometimes nonverbal response contradicts verbal Communication and hence affects the effectiveness of the message&nbsp;</span></span></p><p data-dcnode-id="853"><br data-dcnode-id="854"></p><p data-dcnode-id="850" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="851" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="852" instrument_node="">Nonverbal Communication has the following three elements:</span></span></p><p data-dcnode-id="845" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="848" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="849" instrument_node="">Appearance:</span></span><span data-dcnode-id="846" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="847" instrument_node="">The speaker's appearance includes his or her clothing, hairstyle, neatness, and cosmetic application.</span></span></p><p data-dcnode-id="840" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="843" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="844" instrument_node="">Body Language:</span></span><span data-dcnode-id="841" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="842" instrument_node=""> facial expressions, gestures, postures</span></span></p><p data-dcnode-id="835" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="838" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="839" instrument_node="">Sounds: </span></span><span data-dcnode-id="836" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="837" instrument_node="">Voice Tone, Volume, and Speech rate.</span></span></p><ol data-dcnode-id="830" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="831" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre;"><p data-dcnode-id="832" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="833" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="834" instrument_node="">Physical Non-Verbal Communication</span></span></p></li></ol><p data-dcnode-id="827" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="828" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="829" instrument_node="">Anything that is physically observable falls under this head. Body movements, body language, hand gestures, posture, touch and stance, facial expressions etc are its examples. Daily, as researchers</span></span></p><p data-dcnode-id="824" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="825" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="826" instrument_node="">suggest, we use about 55% non-verbal or physical Communication method to convey our message. If one's shoulders are drooped and he sits with his face in his hand, it can be assumed that he is in despair or distress. Thus, biological reactions and emotional situations are integral.</span></span></p><ol data-dcnode-id="819" start="2" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="820" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre;"><p data-dcnode-id="821" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="822" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="823" instrument_node="">Paralanguage</span></span></p></li></ol><p data-dcnode-id="816" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="817" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="818" instrument_node="">This is simply to understand the implied meaning in addition to the explicitly stated one. 38% of daily Communication is thus. Style of delivering a message, tonal quality of voice, intonations, emotions and stress all indicate the inner meaning of what is being said and one can thus read between the lines,</span></span></p><ol data-dcnode-id="811" start="3" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="812" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre;"><p data-dcnode-id="813" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="814" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="815" instrument_node="">Aesthetic Communication&nbsp;</span></span></p></li></ol><p data-dcnode-id="808" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="809" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="810" instrument_node="">This is how artists convey messages through art. Since historical times, art has been in use as a mode of non-verbal Communication to date.</span></span></p><ol data-dcnode-id="803" start="4" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="804" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre;"><p data-dcnode-id="805" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="806" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="807" instrument_node="">Appearance</span></span></p></li></ol><p data-dcnode-id="800" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="801" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="802" instrument_node="">Appearance creates the first impression of an individual. One's choice of attire, the fabric of the cloth, the colour choice all determine what the audience thinks about the deliverer.</span></span></p><p data-dcnode-id="798"><br data-dcnode-id="799"></p><p data-dcnode-id="795" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="796" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="797" instrument_node="">3. Visual Communication&nbsp;</span></span></p><p data-dcnode-id="792" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="793" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="794" instrument_node="">Using tools that involve visual aids like drawing diagrams, graphical representations and illustrations, etc are modes of visual communication. These also aid verbal communication and bring out a greater impact.</span></span></p><p data-dcnode-id="790"><br data-dcnode-id="791"></p><h3 data-dcnode-id="787" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="788" style="font-size: 14pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="789" instrument_node="">Other Types of Communication</span></span></h3><p data-dcnode-id="784" dir="ltr" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="785" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="786" instrument_node="">There are two more types of Communication- Formal and informal Communication are two types of Communication that might exist inside an organization.</span></span></p><ol data-dcnode-id="777" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="778" dir="ltr" style="list-style-type: decimal; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre; margin-left: -4.5pt;"><p data-dcnode-id="779" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="782" style="font-size: 13pt;  background-color: transparent; font-weight: 400; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="783" instrument_node="">&nbsp;</span></span><span data-dcnode-id="780" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="781" instrument_node="">Formal Communication</span></span></p></li></ol><p data-dcnode-id="774" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="775" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="776" instrument_node="">This occurs when there is a formal relationship between the deliverer(s) and the audience such as in a business setup. Formal Communication in a company refers to Communication that occurs through official channels. Communication between managers or employees in the same cadre, as well as between superior and subordinate and vice versa, occurs.This can again be of three types:&nbsp;</span></span></p><ol data-dcnode-id="761" style="margin-bottom: 0px; padding-inline-start: 48px;"><li aria-level="1" data-dcnode-id="770" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre; margin-left: 36pt;"><p data-dcnode-id="771" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="772" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="773" instrument_node="">Vertical, where the flow of information is along with the organisational structure (both up and down)&nbsp;</span></span></p></li><li aria-level="1" data-dcnode-id="766" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre; margin-left: 36pt;"><p data-dcnode-id="767" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="768" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="769" instrument_node="">Horizontal, where Communication happens between organisations of similar levels</span></span></p></li><li aria-level="1" data-dcnode-id="762" dir="ltr" style="list-style-type: lower-alpha; font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre; margin-left: 36pt;"><p data-dcnode-id="763" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="764" style="font-size: 13pt;  background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="765" instrument_node="">Diagonal, where Communication occurs across the employees of different departments</span></span></p></li></ol><p data-dcnode-id="754" dir="ltr" style="line-height:1.38;margin-left: -18pt;text-indent: 36pt;text-align: justify;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="759" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="760" instrument_node="">2. </span></span><span data-dcnode-id="757" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="758" instrument_node="">&nbsp;&nbsp;</span></span><span data-dcnode-id="755" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-weight: 700; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="756" instrument_node="">Informal Communication</span></span></p><p data-dcnode-id="751" dir="ltr" style="line-height:1.38;margin-left: 36pt;text-align: justify;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="752" style="font-size: 13pt;  color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; vertical-align: baseline; white-space: pre-wrap;"><span data-dcnode-id="753" instrument_node="">The extremely general Communication without any hint of formality among any random people is termed as informal Communication. It is surprising that contrary to the popular belief, it is the non-verbal mode that completes most of the Communication, almost 55% of it. Thus, the flow of information is higher in this mode. Knowing the types and acquiring the right Communication skill can ensure success in any venture one partakes in. This type of Communication spreads swiftly and is difficult to track down the source. Sometimes, such Communication leads to rumors and thus creates confusion in the organization.</span></span></p></div></div><div data-dcnode-id="717" id="TopicFeedbackParsed"><div class="false TopicFeedback_TopicFeedbackWrapper__3cPAr" data-dcnode-id="718" id="TopicFeedbackWrapper"><div class="LikesComponent_likesContainer__1Xkc- TopicFeedback_topicLike__3fIGz" data-dcnode-id="724"><div class="LikesComponent_wrapperViewLikes__yuVOw" data-dcnode-id="725"><div class="LikesComponent_likesDislikescontainer__SZG-e" data-dcnode-id="726"><div class="LikesComponent_likesCount__1F27H" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Is this page helpful?</span></div><img class="LikesComponent_upVoteFalseButton__1-WeJ" data-dcnode-id="728" id="likeContainer"><img class="LikesComponent_downVoteFalseButton_ node-id="568" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">1. What are the types of communication-based?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="564"><span class="FAQReadMore_arrowDown__3Odsr" data-dcnode-id="565"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="533"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="535"><p data-dcnode-id="560" dir="ltr" style="text-align: justify;"><span data-dcnode-id="561" style="color: #000000;background-color: transparent;"><span data-dcnode-id="562" instrument_node="">Words are used to communicate. We engage in verbal Communication when we converse with others.</span></span></p><p data-dcnode-id="556"><span data-dcnode-id="558" id="docs-internal-guid-cb36a667-7fff-99f1-b361-d8162734a66d"></span></p><ul data-dcnode-id="551"><li data-dcnode-id="552" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="553" dir="ltr" style="text-align: justify;"><span data-dcnode-id="554" style="color: #000000;background-color: transparent;"><span data-dcnode-id="555" instrument_node="">Non-Verbal Communication: When we speak, what we do often transmits more information than what we say.</span></span></p></li></ul><ul data-dcnode-id="546"><li data-dcnode-id="547" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="548" dir="ltr" style="text-align: justify;"><span data-dcnode-id="549" style="color: #000000;background-color: transparent;"><span data-dcnode-id="550" instrument_node="">​Written Communication</span></span></p></li></ul><ul data-dcnode-id="541"><li data-dcnode-id="542" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="543" dir="ltr" style="text-align: justify;"><span data-dcnode-id="544" style="color: #000000;background-color: transparent;"><span data-dcnode-id="545" instrument_node="">Listening</span></span></p></li></ul><ul data-dcnode-id="536"><li data-dcnode-id="537" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="538" dir="ltr" style="text-align: justify;"><span data-dcnode-id="539" style="color: #000000;background-color: transparent;"><span data-dcnode-id="540" instrument_node="">Visual Communication</span></span></p></li></ul></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="534"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="488"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="524"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="527"><p data-dcnode-id="528" dir="ltr" style="text-align: justify;"><span data-dcnode-id="529" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">2. What are the three most common communication methods?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="525"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="526"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="489"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="491"><p data-dcnode-id="521" dir="ltr" style="text-align: justify;"><span data-dcnode-id="522" style="color: #000000;background-color: transparent;"><span data-dcnode-id="523" instrument_node="">People typically communicate in one of three ways: audibly, nonverbally, or visually. It's easy to take Communication for granted. People who interact often exchange information, meaning that they are constantly receiving or sending data.</span></span></p><p data-dcnode-id="517"><span data-dcnode-id="518" id="docs-internal-guid-85630045-7fff-0c2e-842f-2f545ac367ad"><br data-dcnode-id="519"></span></p><p data-dcnode-id="513" dir="ltr" style="text-align: justify;"><span data-dcnode-id="514" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Verbal Communication</span></b></span></p><p data-dcnode-id="510" dir="ltr" style="text-align: justify;"><span data-dcnode-id="511" style="color: rgb(0, 0, 0);background-color: transparent;"><span data-dcnode-id="512" instrument_node="">Verbal Communication appears to be the most obvious of the several types of Communication. It relies on verbal Communication, whether in person or over the phone.</span></span></p><p data-dcnode-id="508"><br data-dcnode-id="509"></p><p data-dcnode-id="504" dir="ltr" style="text-align: justify;"><span data-dcnode-id="505" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Non verbal Communication</span></b></span></p><p data-dcnode-id="501" dir="ltr" style="text-align: justify;"><span data-dcnode-id="502" style="color: rgb(0, 0, 0);background-color: transparent;"><span data-dcnode-id="503" instrument_node="">Nonverbal Communication is when people communicate without saying anything by using gestures, tone of voice, body language, and facial expressions.</span></span></p><p data-dcnode-id="499"><br data-dcnode-id="500"></p><p data-dcnode-id="495" dir="ltr" style="text-align: justify;"><span data-dcnode-id="496" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Visual Communication&nbsp;</span></b></span></p><p data-dcnode-id="492" dir="ltr" style="text-align: justify;"><span data-dcnode-id="493" style="color: rgb(0, 0, 0);background-color: transparent;"><span data-dcnode-id="494" instrument_node="">In visual Communication, graphs, charts, photographs, maps, and logos are used to convey information</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="490"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="449"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="480"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="483"><p data-dcnode-id="484" dir="ltr" style="text-align: justify;"><span data-dcnode-id="485" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">3. What is Communication and what are different types of Communication?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="481"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="482"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="450"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="452"><p data-dcnode-id="477" dir="ltr" style="text-align: justify;"><span data-dcnode-id="478" style="color: #000000;background-color: transparent;"><span data-dcnode-id="479" instrument_node="">Communication is a process that involves sending and receiving messages through the verbal and non-verbal methods.Communication is a two-way exchange of information in the form of thoughts, views, and ideas between two or more people with the objective of better understanding. The types of Communication are:</span></span></p><p data-dcnode-id="473"><span data-dcnode-id="475" id="docs-internal-guid-6ea5ec77-7fff-9fb5-59ed-2f9d0c5ff080"></span></p><ul data-dcnode-id="468"><li data-dcnode-id="469" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="470" dir="ltr" style="text-align: justify;"><span data-dcnode-id="471" style="color: #000000;background-color: transparent;"><span data-dcnode-id="472" instrument_node="">Verbal</span></span></p></li></ul><ul data-dcnode-id="463"><li data-dcnode-id="464" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="465" dir="ltr" style="text-align: justify;"><span data-dcnode-id="466" style="color: #000000;background-color: transparent;"><span data-dcnode-id="467" instrument_node="">Nonverbal</span></span></p></li></ul><ul data-dcnode-id="458"><li data-dcnode-id="459" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="460" dir="ltr" style="text-align: justify;"><span data-dcnode-id="461" style="color: #000000;background-color: transparent;"><span data-dcnode-id="462" instrument_node="">Written</span></span></p></li></ul><ul data-dcnode-id="453"><li data-dcnode-id="454" dir="ltr" style="color: #000000;background-color: transparent;"><p data-dcnode-id="455" dir="ltr" style="text-align: justify;"><span data-dcnode-id="456" style="color: #000000;background-color: transparent;"><span data-dcnode-id="457" instrument_node="">Visual</span></span></p></li></ul></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="451"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="434"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="441"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="444"><p data-dcnode-id="445" dir="ltr" style="text-align: justify;"><span data-dcnode-id="446" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">4. Write a short essay on communication?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="442"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="443"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="435"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="437"><p data-dcnode-id="438" dir="ltr" style="text-align: justify;"><span data-dcnode-id="439" style="color: #000000;background-color: transparent;"><span data-dcnode-id="440" instrument_node="">Communication is a two way process. It involves a sender and a receiver. The sender or receiver could be an individual or a group. Every kind of Communication sends a message to the recipient. A message can be conveyed using information, a direction, an inquiry, a feeling, an opinion, an idea, or any other form of Communication. Communication can only take place when the sender and recipient have a common understanding. Commonalities include things like shared culture, language, and habitat. Words, phrases, idioms, proverbs, gestures, and expressions are deeply cultured and possess the high communicative potential for people from similar backgrounds.</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="436"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="419"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="426"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="429"><p data-dcnode-id="430" dir="ltr" style="text-align: justify;"><span data-dcnode-id="431" style="color: rgb(0, 0, 0);background-color: transparent;"><b data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">5. What is the importance of communication?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="427"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="428"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="420"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="422"><p data-dcnode-id="423" dir="ltr" style="text-align: justify;"><span data-dcnode-id="424" style="color: #000000;background-color: transparent;"><span data-dcnode-id="425" instrument_node="">Communication is the process of passing information from one person to another. The goal of Communication is to understand information. Whatever one says to someone should be clearly understood by him as the very purpose of Communication would be defeated. Communication does help understand people better, removing misunderstanding and creating clarity of thought and expression. It also educates people. The Communication may be written oral or verbal.</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="421"></div></div></div></div></div></div></div></div><div class="Comments_CommentsWrappe
