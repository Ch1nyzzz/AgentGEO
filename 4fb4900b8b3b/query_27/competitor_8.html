</span><h3 data-dcnode-id="6187" id="section---FirstHalfSecondHalf"><span data-dcnode-id="6188" instrument_node=""> First Half / Second Half</span></h3><p data-dcnode-id="6182"><span data-dcnode-id="6186" instrument_node="">Begin telling a story to the class, then right after you get to the climax of the story, let the students write the story's resolution and ending. Encourage them to be creative and bold in their choices! Invite some students to share their endings with the class. Have them watch the lesson on </span><a class="external" data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/what-is-creative-writing-definition-types-examples.html"><span data-dcnode-id="6185" instrument_node="">creative writing</span></a><span data-dcnode-id="6183" instrument_node=""> to help get their creative juices flowing! </span></p><h3 data-dcnode-id="6180" id="section---OneSentenceStory"><span data-dcnode-id="6181" instrument_node=""> One Sentence Story</span></h3><p data-dcnode-id="6175"><span data-dcnode-id="6179" instrument_node="">Gather students together to sit in a circle. Beginning with one student, have them each participate in telling a story one sentence at a time, finishing the story after one rotation around the circle. Use this game to highlight the importance of using each sentence to creating a coherent story structure. Share the history of </span><a class="external" data-dcnode-id="6177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/oral-tradition-of-storytelling-definition-history-examples.html"><span data-dcnode-id="6178" instrument_node="">oral storytelling</span></a><span data-dcnode-id="6176" instrument_node=""> with the class once the game is done. </span></p><h3 data-dcnode-id="6173" id="section---CombineTheFairyTales"><span data-dcnode-id="6174" instrument_node=""> Combine the Fairy Tales</span></h3><p data-dcnode-id="6168"><span data-dcnode-id="6172" instrument_node="">Have each student choose two well-known fairy tales. Then, it's time to get creative! Ask students to combine the two stories into one super fairy tale that includes the key aspects from each fairy tale, but tells a new narrative. Use the lesson on the </span><a class="external" data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/elements-of-a-short-story.html"><span data-dcnode-id="6171" instrument_node="">elements of a short story</span></a><span data-dcnode-id="6169" instrument_node=""> to help students identify key components to take from each tale. </span></p><h3 data-dcnode-id="6166" id="section---ANormalDayBut..."><span data-dcnode-id="6167" instrument_node=""> A Normal Day But...</span></h3><p data-dcnode-id="6161"><span data-dcnode-id="6165" instrument_node="">Start by having every student write down a wild and crazy event from their imagination or that's actually happened to them. Collect all the students' events and put them in a container. Have every student write a paragraph or two about the beginning of a regular day. Pass out the events or have each student draw from the container, and finish their stories by incorporating the event on their piece of paper. Watch the lesson on </span><a class="external" data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/rising-action-in-a-story-definition-examples-quiz.html"><span data-dcnode-id="6164" instrument_node="">rising action</span></a><span data-dcnode-id="6162" instrument_node=""> in class to teach students how to build a transition between their everyday to an exciting event. </span></p><span data-dcnode-id="6160" instrument_node="">
</span><h3 data-dcnode-id="6158" id="section---ShareAPictureTellAStory"><span data-dcnode-id="6159" instrument_node=""> Share a Picture, Tell A Story</span></h3><p data-dcnode-id="6153"><span data-dcnode-id="6157" instrument_node="">Divide students into pairs. Have each pair of students begin by drawing a picture that incorporates some sort of action. Next, ask students to exchange drawings and write a story that translates the picture they've just received into words. Use the lesson on </span><a class="external" data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/cave-painting-history-pictures-lesson.html"><span data-dcnode-id="6156" instrument_node="">cave painting</span></a><span data-dcnode-id="6154" instrument_node=""> and bring in some photos of cave paintings to show how stories were told through pictures in ancient times. </span></p><h2 data-dcnode-id="6151" id="section---EarlyLiteracyAndWritingResources"><span data-dcnode-id="6152" instrument_node=""> Early Literacy and Writing Resources</span></h2><p data-dcnode-id="6149"><span data-dcnode-id="6150" instrument_node="">Whether you're teaching or learning, Study.com has resources to help you review, refresh and improve. Check out the resources below for helpful lessons and quizzes all about literacy, writing and storytelling! </span></p><h3 data-dcnode-id="6147" id="section---ForTeachers"><span data-dcnode-id="6148" instrument_node="">For Teachers</span></h3><ul data-dcnode-id="6133"><span data-dcnode-id="6146" instrument_node="">
</span><li data-dcnode-id="6141"><span data-dcnode-id="6145" instrument_node="">Look over these lessons on </span><a class="external" data-dcnode-id="6143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/topic/aepa-reading-k-8-effective-literacy-instruction.html"><span data-dcnode-id="6144" instrument_node="">effective literacy instruction</span></a><span data-dcnode-id="6142" instrument_node=""> for tips on engaging teaching techniques and strategies for teaching literacy to different learning styles. </span></li><span data-dcnode-id="6140" instrument_node="">
</span><li data-dcnode-id="6135"><span data-dcnode-id="6139" instrument_node="">The lessons on </span><a class="external" data-dcnode-id="6137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/topic/instructional-pedagogy.html"><span data-dcnode-id="6138" instrument_node="">instructional pedagogy</span></a><span data-dcnode-id="6136" instrument_node=""> offer ideas and teaching strategies specifically for language arts and literacy. </span></li><span data-dcnode-id="6134" instrument_node="">
</span></ul><h3 data-dcnode-id="6131" id="section---ForStudents"><span data-dcnode-id="6132" instrument_node="">For Students</span></h3><ul data-dcnode-id="6114"><span data-dcnode-id="6130" instrument_node="">
</span><li data-dcnode-id="6125"><span data-dcnode-id="6129" instrument_node="">Have your kids learn key writing and storytelling concepts, such as reading comprehension, grammar and literary styles, by using the lessons in this </span><a class="external" data-dcnode-id="6127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/course/english-language-arts-for-kids.html"><span data-dcnode-id="6128" instrument_node="">Elementary Language Arts</span></a><span data-dcnode-id="6126" instrument_node=""> course. </span></li><span data-dcnode-id="6124" instrument_node="">
</span><li data-dcnode-id="6116"><span data-dcnode-id="6123" instrument_node="">Let your students watch lessons on </span><a class="external" data-dcnode-id="6121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/short-stories-definition-characteristics-examples.html"><span data-dcnode-id="6122" instrument_node="">short stories</span></a><span data-dcnode-id="6120" instrument_node=""> and the use of </span><a class="external" data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/how-to-use-descriptive-details-sensory-language-in-your-writing.html"><span data-dcnode-id="6119" instrument_node="">details and sensory language in storytelling</span></a><span data-dcnode-id="6117" instrument_node=""> before or after each game.</span></li><span data-dcnode-id="6115" instrument_node="">
</span></ul><span data-dcnode-id="6113" instrument_node="">
