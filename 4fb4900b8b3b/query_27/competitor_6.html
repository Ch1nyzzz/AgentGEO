</span></ul></div></nav><div class="site-inner" data-dcnode-id="545"><div class="content-sidebar-wrap" data-dcnode-id="546"><main class="content" data-dcnode-id="1986"><img alt="the art of storytelling" class="attachment-home-top size-home-top wp-post-image" data-dcnode-id="2973" data-lazy-type="image" data-src="https://writers.com/wp-content/uploads/2021/09/nong-vang-9pw4TKvT3po-unsplash-750x420.jpg" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/wp-content/uploads/2021/09/nong-vang-9pw4TKvT3po-unsplash-750x420.jpg&amp;raw" width="750"><noscript data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">&lt;img width="750" height="420" src="https://writers.com/wp-content/uploads/2021/09/nong-vang-9pw4TKvT3po-unsplash-750x420.jpg" class="attachment-home-top size-home-top wp-post-image" alt="the art of storytelling" /&gt;</span></noscript><article class="post-11008 post type-post status-publish format-standard has-post-thumbnail category-creative-nonfiction category-fiction category-memoir category-novel category-personal-essay category-poetry category-short-story category-stage-and-broadcast series-fundamentals-of-storytelling entry" data-dcnode-id="2142"><header class="entry-header" data-dcnode-id="2954"><h1 class="entry-title" data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Capturing the Art of Storytelling: Techniques &amp; Tips</span></h1><span data-dcnode-id="2968" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2955"><time class="entry-time" data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">September 14, 2021</span></time><span data-dcnode-id="2965" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2961"><a class="entry-author-link" data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/author/sean" rel="author"><span class="entry-author-name" data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Sean Glatch</span></span></a></span><span data-dcnode-id="2960" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2957"><a data-dcnode-id="2958" href="#comments"><span data-dcnode-id="2959" instrument_node="">2 Comments</span></a></span><span data-dcnode-id="2956" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="2171"><p data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">It is hard to measure the art of storytelling, but you know it when you see it. You read a passage of prose and it raises your arm hairs, makes your blood tingle, gets your heart racing; suddenly you’re swept up in the experience of beautiful writing.</span></p><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Indeed, writers seem to possess a certain magic of storytelling—but anyone can learn the tricks of the trade. From story structures to style advice, this article covers the storytelling techniques that make readers laugh, weep, gasp, and stay up past their bedtimes.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Along the way, we discuss the key elements of storytelling, and we answer the question “Why is storytelling important?” But first, let’s dissect the art of storytelling itself. How do writers tell great stories?</span></p><span data-dcnode-id="2945" instrument_node="">
</span><h2 data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Storytelling Definition</span></h2><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2941" instrument_node="">What is storytelling? It depends on whom you ask. A sociologist will tell you it’s mankind’s way of preserving history and identity; an anthropologist will say that it’s </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homo_narrans"><span data-dcnode-id="2940" instrument_node="">what distinguishes man</span></a><span data-dcnode-id="2938" instrument_node=""> from the rest of the animal kingdom.</span></p><span data-dcnode-id="2936" instrument_node="">
</span><blockquote data-dcnode-id="2933"><p data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Storytelling is the process of weaving language into a concrete narrative, with the purpose of creating rich, believable experiences.</span></p></blockquote><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">For writers, storytelling is the process of weaving language into a concrete narrative, with the purpose of creating rich, believable experiences. To do this, storytellers tie together character and plot, resulting in stories that act as metaphors for the human experience.</span></p><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2925"><span data-dcnode-id="2928" instrument_node="">In other words, storytellers don’t just relay facts: they use words in a way that the reader or listener can sit inside the story itself </span><em data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">as though they were really there.</span></em></p><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2923" instrument_node="">This is true regardless of genre—writers of sci-fi, fantasy, and horror create stories just as believable as writers of </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/literary-fiction-vs-genre-fiction"><span data-dcnode-id="2922" instrument_node="">literary fiction</span></a><span data-dcnode-id="2920" instrument_node="">. Nonfiction authors and poets also demonstrate mastery over the art of storytelling, though they may use different storytelling techniques.</span></p><span data-dcnode-id="2918" instrument_node="">
</span><blockquote data-dcnode-id="2915"><p data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">The reader can sit inside the story itself as though they were really there.</span></p></blockquote><span data-dcnode-id="2914" instrument_node="">
</span><h3 data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Story Versus Situation</span></h3><span data-dcnode-id="2911" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">The magic of storytelling is found in the power of stories themselves. Many writers, however, confuse “story” with “situation,” having not been taught the difference between these two concepts.</span></p><span data-dcnode-id="2908" instrument_node="">
</span><p data-dcnode-id="2903"><span data-dcnode-id="2907" instrument_node="">Here’s a breakdown of the difference between storytelling and situation-telling, as explained by our instructor </span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/jeff-lyons"><span data-dcnode-id="2906" instrument_node="">Jeff Lyons</span></a><span data-dcnode-id="2904" instrument_node="">.</span></p><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2899"><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/stories-vs-situations-how-to-know-your-story-will-work-in-any-genre"><span data-dcnode-id="2901" instrument_node="">https://writers.com/stories-vs-situations-how-to-know-your-story-will-work-in-any-genre</span></a></p><span data-dcnode-id="2898" instrument_node="">
</span><h2 data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">7 Elements of Storytelling</span></h2><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">No matter the tale, every work of prose (and many poems) rely on these 7 elements of storytelling.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><h3 data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">1. Plot</span></h3><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Plot is the skeleton of storytelling. You can have a gorgeous prose style with deeply relatable characters, but without a logical flow of events, your story will confuse the reader. For a story to emulate real life, it needs to follow a real-life series of plot points.</span></p><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Now, this doesn’t mean that your story needs to follow chronological order. Many stories experiment with the order of events, or they jump over decades of time, or they weave together the present with the past. There’s no need to stick to one timeline: time is a thread, and can be interwoven to create rich tapestries.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><blockquote data-dcnode-id="2880"><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Your characters write your plot; your plot doesn’t write your characters.</span></p></blockquote><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Nonetheless, your reader needs to follow the plot to understand your story. And remember: your characters write your plot; your plot doesn’t write your characters.</span></p><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">For more advice on crafting effective plots, take a look at these articles on:</span></p><span data-dcnode-id="2873" instrument_node="">
</span><ul data-dcnode-id="2863"><span data-dcnode-id="2872" instrument_node="">
</span><li data-dcnode-id="2869"><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/freytags-pyramid"><span data-dcnode-id="2871" instrument_node="">Freytag’s Pyramid</span></a></li><span data-dcnode-id="2868" instrument_node="">
</span><li data-dcnode-id="2865"><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/how-to-write-story-outline"><span data-dcnode-id="2867" instrument_node="">How to Write a Story Outline</span></a></li><span data-dcnode-id="2864" instrument_node="">
</span></ul><span data-dcnode-id="2862" instrument_node="">
</span><h3 data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">2. Character</span></h3><span data-dcnode-id="2859" instrument_node="">
</span><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Equally important to the art of storytelling is the characters that populate your work. Every event that takes place in your story is defined by your characters’ thoughts, feelings, and actions. Although some plot points are outside of their control, it’s your characters’ responses to conflict that make a story worth reading.</span></p><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Writers must consider how the reader will connect with the story’s characters. If those characters have depth, understandable motives, and relatable flaws, the reader will feel much more engrossed in the story. Stephen King sums this up nicely when he writes:</span></p><span data-dcnode-id="2853" instrument_node="">
</span><blockquote data-dcnode-id="2850"><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">“I try to create sympathy for my characters, then turn the monsters loose.” —Stephen King</span></p></blockquote><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Once we relate to the story’s characters, we care about what happens to them, and we’re willing to follow them along their personal journeys. Each character of your story—including your protagonist, antagonist, secondary and tertiary characters—should feel like real, flesh-and-blood human beings.</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">For more advice on writing realistic characters, take a look at these articles:</span></p><span data-dcnode-id="2843" instrument_node="">
</span><ul data-dcnode-id="2821"><span data-dcnode-id="2842" instrument_node="">
</span><li data-dcnode-id="2839"><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/character-development-definition"><span data-dcnode-id="2841" instrument_node="">Character Development Definition, Questions, &amp; 40 Character Traits</span></a></li><span data-dcnode-id="2838" instrument_node="">
</span><li data-dcnode-id="2835"><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/character-development-advice"><span data-dcnode-id="2837" instrument_node="">Character Development Advice</span></a></li><span data-dcnode-id="2834" instrument_node="">
</span><li data-dcnode-id="2831"><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/how-to-write-dialogue"><span data-dcnode-id="2833" instrument_node="">How to Write Dialogue</span></a></li><span data-dcnode-id="2830" instrument_node="">
</span><li data-dcnode-id="2827"><a data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/protagonist-definition"><span data-dcnode-id="2829" instrument_node="">Crafting Your Protagonist</span></a></li><span data-dcnode-id="2826" instrument_node="">
</span><li data-dcnode-id="2823"><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/antagonist-definition"><span data-dcnode-id="2825" instrument_node="">Writing An Antagonist</span></a></li><span data-dcnode-id="2822" instrument_node="">
</span></ul><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2819" instrument_node="">You might also benefit from this </span><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/wp-content/uploads/2020/04/Character_Development_from_Fundamentals_to_Flesh_and_Bone_Writers.com_.pdf"><span data-dcnode-id="2818" instrument_node="">Character Development PDF</span></a><span data-dcnode-id="2816" instrument_node="">.</span></p><span data-dcnode-id="2814" instrument_node="">
</span><h3 data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">3. Point-of-View</span></h3><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2810" instrument_node="">Point-of-View (POV) defines </span><em data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">who is communicating to the reader</span></em><span data-dcnode-id="2807" instrument_node="">, and from what vantage point. The story’s narrator influences how the story is told and what information the reader has access to.</span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Writers have 5 points of view to choose from:</span></p><span data-dcnode-id="2802" instrument_node="">
</span><ul data-dcnode-id="2779"><span data-dcnode-id="2801" instrument_node="">
</span><li data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">First Person (“I”): The narrator is the protagonist, and we view the story from their perspective. This is generally the most intimate storytelling POV.</span></li><span data-dcnode-id="2798" instrument_node="">
</span><li data-dcnode-id="2793"><span data-dcnode-id="2797" instrument_node="">First Person Peripheral (“I”): The narrator is a close acquaintance of the protagonist, and we view the story from their perspective. An example of this is Nick Carraway, narrator of </span><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">The Great Gatsby</span></em><span data-dcnode-id="2794" instrument_node="">.</span></li><span data-dcnode-id="2792" instrument_node="">
</span><li data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Second Person (“You”): The narrator casts the reader as the story’s protagonist. This is a way to make the reader intimate with the story’s events, but it’s a hard sell—stories are rarely written in the 2nd person.</span></li><span data-dcnode-id="2789" instrument_node="">
</span><li data-dcnode-id="2784"><span data-dcnode-id="2788" instrument_node="">Third Person Limited (“He/She/They”): The narrator tells the story from the vantage point of one or a few protagonists. The narrator </span><em data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">only knows</span></em><span data-dcnode-id="2785" instrument_node=""> what the protagonist also knows.</span></li><span data-dcnode-id="2783" instrument_node="">
</span><li data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Third Person Omniscient (“He/She/They”): The narrator tells the story from multiple vantage points. The narrator knows more than any character in the story knows, and the narrator often weaves this knowledge together to craft a deeper, more holistic story.</span></li><span data-dcnode-id="2780" instrument_node="">
</span></ul><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2773"><span data-dcnode-id="2777" instrument_node="">A story’s point of view will affect the storytelling techniques and strategies that the author uses. Bear in mind, too, that a story can switch between different POVs. Learn more about POV at our article </span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/point-of-view"><span data-dcnode-id="2776" instrument_node="">What is Point of View in Literature</span></a><span data-dcnode-id="2774" instrument_node="">?</span></p><span data-dcnode-id="2772" instrument_node="">
</span><h3 data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">4. Setting</span></h3><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">At its most basic, setting is where your story takes place, but setting can serve many more functions than just this. The relationship that your characters have to their setting influences the story’s pace, plot, conflict, and even its themes.</span></p><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">Your characters will, in some way or another, be defined by their setting. The personality of someone from Cheyenne, Wyoming will differ greatly from a character who grew up in Hell’s Kitchen, New York City, and both of these people will experience the world differently than someone who grew up in Seoul, South Korea. Setting implies culture, worldview, and language, even if your character tries to push back against their upbringing.</span></p><span data-dcnode-id="2763" instrument_node="">
</span><blockquote data-dcnode-id="2760"><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Your characters will, in some way or another, be defined by their setting.</span></p></blockquote><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Setting also influences dialogue and action. An argument at the dinner table will (probably) sound different than an argument in a restaurant; a fist fight in a parking lot will go a different route than a fist fight in an office.</span></p><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Finally, setting can build symbolism. If your protagonist lives in a rundown, ramshackle house, this house can represent his ramshackle life; a character that lives in a gentrified apartment building in an otherwise poor neighborhood might be equally ritzy and oblivious to the world around her.</span></p><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2752" instrument_node="">Just be careful not to stereotype—setting is just one of many influences on a character’s psyche and worldview. For more advice on writing setting, take a look at our article </span><a data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/what-is-the-setting-of-a-story"><span data-dcnode-id="2751" instrument_node="">What is the Setting of a Story?</span></a></p><span data-dcnode-id="2748" instrument_node="">
</span><h3 data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">5. Style &amp; Word Choice</span></h3><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">One of the more intangible elements of storytelling, style refers to the unique way that an author tells their story.</span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Style occurs at both a line-level and a global level. At the line-level, style is influenced by a story’s word choice, syntax, sentence structure, sentence length, and the observational details that the author includes.</span></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">At the global level, style is influenced by the story’s pacing, the way the story presents information, the length of scenes and chapters, and the author’s own literary influences.</span></p><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">All of these things culminate in the author’s thumbprint. There’s no singular reason why a novel by Haruki Murakami is so vividly distinct from a novel by Margaret Atwood. All of the aforementioned elements coalesce into something unique and intangible, but nonetheless present in the atmosphere of the author’s work.</span></p><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Style isn’t forced: it develops naturally as the author grows into their storytelling role. For advice on honing your style, read our articles:</span></p><span data-dcnode-id="2730" instrument_node="">
</span><ul data-dcnode-id="2712"><span data-dcnode-id="2729" instrument_node="">
</span><li data-dcnode-id="2726"><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/word-choice-in-writing"><span data-dcnode-id="2728" instrument_node="">The Importance of Word Choice in Writing</span></a></li><span data-dcnode-id="2725" instrument_node="">
</span><li data-dcnode-id="2722"><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/how-to-write-a-compelling-story"><span data-dcnode-id="2724" instrument_node="">How to Write a Compelling Story</span></a></li><span data-dcnode-id="2721" instrument_node="">
</span><li data-dcnode-id="2718"><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/what-is-tone-in-literature"><span data-dcnode-id="2720" instrument_node="">What is Tone in Literature?</span></a></li><span data-dcnode-id="2717" instrument_node="">
</span><li data-dcnode-id="2714"><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/how-to-avoid-cliches-in-writing"><span data-dcnode-id="2716" instrument_node="">How to Avoid Cliches in Writing</span></a></li><span data-dcnode-id="2713" instrument_node="">
</span></ul><span data-dcnode-id="2711" instrument_node="">
</span><h3 data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">6. Conflict</span></h3><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Every story has conflict. Conflict is the lifeblood of storytelling: without it, your characters don’t undergo any growth or finish any journey.</span></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Conflict can manifest itself in many ways. The protagonist wants something, but has to overcome certain obstacles to get it; or they want something, but an antagonist stands in the way; or an antagonist uproots the protagonist’s life; or the protagonist seeks a life of their own, but doesn’t know how to build one.</span></p><span data-dcnode-id="2702" instrument_node="">
</span><blockquote data-dcnode-id="2699"><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">The road to resolving conflict is never easy, but that’s what makes great stories!</span></p></blockquote><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">In any case, conflict has to do with the protagonist having certain needs, desires, or struggles. Great stories involve the protagonist having to undergo personal journeys in order to get what they need. The road to resolving conflict is never easy, but that’s what makes great stories!</span></p><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2694" instrument_node="">For more on conflict, take a look at our article </span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/story-writing-exercise-what-does-your-character-want"><span data-dcnode-id="2693" instrument_node="">What Does Your Character Want?</span></a><span data-dcnode-id="2691" instrument_node=""> Conflict is closely related to theme, which we discuss below.</span></p><span data-dcnode-id="2689" instrument_node="">
</span><h3 data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">7. Theme</span></h3><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">The aforementioned elements of storytelling culminate in theme. At its simplest, theme answers the question “What is this story about?”</span></p><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2682" instrument_node="">The story’s plot, characters, and conflicts revolve around certain abstract issues. </span><em data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Romeo &amp; Juliet</span></em><span data-dcnode-id="2679" instrument_node="">, for example, revolves around the themes of love, fate, and family; </span><em data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">A Tale of Two Cities</span></em><span data-dcnode-id="2676" instrument_node=""> has themes of war, revolution, justice, and power &amp; corruption.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">In other words, theme describes the central ideas that a piece of writing explores. And, because a story is propelled by conflict, theme and conflict are closely intertwined. If the protagonist’s needs are jeopardized because of the government, the theme might be “justice” or “power &amp; corruption.” Or, if the protagonist’s needs aren’t being met because they’ve just survived an apocalypse, the theme might be “the environment” or “man vs. nature.”</span></p><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">The job of the storyteller isn’t to resolve those themes: themes should be open-ended, debatable, and thought-provoking. Two readers may have vastly different, yet equally defensible, interpretations of a theme. Rather, the storyteller’s job is to present clear conflicts, flawed characters, and navigable plots; theme, often, follows on its own accord.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2664"><span data-dcnode-id="2667" instrument_node="">To learn more about theme and read some theme examples, read our article </span><a data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/common-themes-in-literature"><span data-dcnode-id="2666" instrument_node="">What is Theme?</span></a></p><span data-dcnode-id="2663" instrument_node="">
</span><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">In addition to these elements of storytelling, writers use the following storytelling techniques to craft engaging, compelling stories.</span></p><span data-dcnode-id="2660" instrument_node="">
</span><h2 data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Storytelling Techniques</span></h2><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">The elements of storytelling answer what storytellers do at a global level. But when it comes to actually crafting the story—stringing one word after another to move the reader along—what do storytellers do?</span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Below are some tried-and-true methods of telling engaging stories. Note that this list is not exhaustive: us writers have been refining the art of storytelling for millennia, and this is just a sample of the many tools at our disposal.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><h3 data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">20 Storytelling Techniques</span></h3><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2645"><strong data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Backstory</span></strong></p><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Backstory describes the history of a character or setting. By providing relevant historical detail, the author gives contexts for certain conflicts and relationships that exist within the main narrative.</span></p><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">The relationship between backstory and narration can be difficult to refine, because too much backstory will slow down the pace of the work at large. Like most storytelling techniques, be economical—you shouldn’t provide more backstory than necessary.</span></p><span data-dcnode-id="2638" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">That said, backstory can span chapters of the text, if needed. By providing valuable insight into a character’s psyche and motives, backstory helps the reader understand the decisions that character makes and the problems they face.</span></p><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2632"><strong data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Deus Ex Machina</span></strong></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Deus Ex Machina is a plot device where something outside of the protagonist’s control interferes with the story, usually resolving the story’s conflict. This term comes from the Latin for “God from the machine,” and it refers to a convention of Ancient Greek plays in which an actor, playing as a god, was mechanically lowered onto the stage.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Deus Ex Machina can take many forms. Perhaps a natural disaster kills the antagonist, or two friends discover they’re actually long lost sisters, or an actual god intervenes on the protagonist’s behalf. In any case, Deus Ex Machinas never occur by the protagonist’s own volition.</span></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2624" instrument_node="">Generally, Deus Ex Machina is frowned upon as an easy way out of conflict. Rather than giving the protagonist agency, the author has decided to interrupt the protagonist’s journey and personal growth. At the same time, Deus Ex Machina can create new artistic possibilities, especially if the author is writing in genres like absurdism, surrealism, or </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/what-is-magical-realism-in-literature"><span data-dcnode-id="2623" instrument_node="">magical realism</span></a><span data-dcnode-id="2621" instrument_node="">.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2616"><strong data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Ethos</span></strong></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Ethos, pathos, and logos are three storytelling strategies often associated with rhetoric, but they apply just as readily to the art of storytelling.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">In creative writing, Ethos describes the author’s credibility as a storyteller. Ethos is built from both the author’s reputation and from their ability to relay facts accurately, without harmful bias or intentionally misleading the reader.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2608" instrument_node="">Now, authors need to have a credible ethos, but narrators don’t. Remember that Point of View is one of the essential elements of storytelling. One way that writers can twist Ethos is by writing an </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/unreliable-narrator/"><span data-dcnode-id="2607" instrument_node="">unreliable narrator</span></a><span data-dcnode-id="2605" instrument_node="">—someone who distorts facts, misleads the reader, and creates their own reality. Pulling off an effective unreliable narrator can prove difficult, but it can also create some very entertaining twists in the story.</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2600"><strong data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Foreshadowing</span></strong></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2595"><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/foreshadowing"><span data-dcnode-id="2598" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="2596" instrument_node=""> refers to moments in the story that predict later events. When the narrator foreshadows, they usually hint at the story’s climax, but any future plot point is fair game for foreshadowing.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2593" instrument_node="">The best foreshadowing is memorable, but subtle enough that you don’t realize it’s foreshadowing until later. For example, in </span><em data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">The Great Gatsby </span></em><span data-dcnode-id="2590" instrument_node="">by F. Scott Fitzgerald, the drunk Miss Baedeker foreshadows Gatsby’s death when she complains of getting her “head stuck in a pool.”</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">A more ostensible example is Gatsby’s relationship to the green light on Daisy’s property. He reaches out to the green light but can never hold it, much like he reaches out to Daisy but can never hold her. You may note that this is also an example of symbolism, and indeed, foreshadowing can coincide with many other literary devices.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2582"><strong data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">In Media Res</span></strong></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">*Record Scratch* “Yep, that’s me. You’re probably wondering how I got here.”</span></p><span data-dcnode-id="2578" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">In Media Res (Latin: in the middle of things) is a plot device in which the story begins in the middle, rather than at the beginning. By doing this, the author throws the reader directly into the story’s conflict. Eventually, the inciting incident and character backstories are provided.</span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">The In Media Res strategy helps generate intrigue for the story, its plot, and its characters. Rather than set up the conflict in chapters of exposition, we are launched directly into the drama.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2571" instrument_node="">Some famous stories that begin In Media Res include </span><em data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">The Odyssey </span></em><span data-dcnode-id="2568" instrument_node="">by Homer, </span><em data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">The Gambler</span></em><span data-dcnode-id="2565" instrument_node=""> by Fyodor Dostoevsky, </span><em data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">The Handmaid’s Tale</span></em><span data-dcnode-id="2562" instrument_node=""> by Margaret Atwood, and </span><em data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Wuthering Heights</span></em><span data-dcnode-id="2559" instrument_node=""> by Emily Brontë.</span></p><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2554"><strong data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Literary Devices</span></strong></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2552" instrument_node="">Literary devices are methods of creating deeper meanings within a text. By harnessing the power of comparison, connection, and sound, writers use literary devices to take their work </span><em data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">beyond a literal meaning</span></em><span data-dcnode-id="2549" instrument_node="">. Literary devices create nuance and depth, making them essential to the art of storytelling.</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Try your hand at different literary devices from this article.</span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2541"><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/common-literary-devices"><span data-dcnode-id="2543" instrument_node="">https://writers.com/common-literary-devices</span></a></p><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2537"><strong data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Logos</span></strong></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Logos is the use of logic and reasoning to persuade the reader. While Logos most commonly presents itself in rhetorical essays and arguments, it also has its place in creative writing.</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2532" instrument_node="">Authors will most often use logos in relation to the story’s themes. For example, the novel </span><em data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">To Kill a Mockingbird</span></em><span data-dcnode-id="2529" instrument_node=""> by Harper Lee is about racial justice in the United States. When lawyer Atticus Finch defends the wrongfully accused Tom Robinson, he uses logos to appeal to the courts that Tom is innocent.</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">But Atticus’ logical appeal isn’t just to the courts, it’s to the readers themselves. When Tom is convicted anyway and later killed, the reader understands exactly how society disregards Logos when it comes to the plight of black men. Through these plot points, the novel intricately examines its themes of justice, and how justice is not evenly distributed in American society.</span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2521"><strong data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">MacGuffin</span></strong></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">A MacGuffin describes a character’s motives. Every character is chasing something in particular, whether that be a physical object or an abstract concept. Items like The Holy Grail or the Rings of Power are MacGuffins, and so are ideas like love, revenge, and stability.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2516" instrument_node="">MacGuffins are one of the most open-ended storytelling techniques, because a character’s motives can be virtually anything. Additionally, a MacGuffin can be both openly stated or obscure. In </span><em data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Pulp Fiction</span></em><span data-dcnode-id="2513" instrument_node="">, for example, the movie’s MacGuffin is a briefcase, but the contents of that briefcase are never revealed, highlighting the movie’s senseless violence in the pursuit of nothing.</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">If the story’s MacGuffin is a physical object, that object often symbolizes something deeper for the main characters. Nonetheless, your characters can pursue whatever they want, just as people in real life pursue their own mysterious MacGuffins.</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2505"><strong data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Mythology</span></strong></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Mythology provides a powerful reservoir of storytelling for modern day authors. By “mythology,” we’re referring to any set of stories, narratives, folklore, poems, and epics particular to a certain culture, with the intent of relating that culture’s religious and moral beliefs.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">References to ancient myth abound in both classic and contemporary literature. This is for three reasons:</span></p><span data-dcnode-id="2498" instrument_node="">
</span><ul data-dcnode-id="2484"><span data-dcnode-id="2497" instrument_node="">
</span><li data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">First, mythologies are commonly read stories. You can connect with the reader using myth as a stepping stone, especially if that myth is widely familiar.</span></li><span data-dcnode-id="2494" instrument_node="">
</span><li data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Second, myths act as their own symbols. If you reference the story of Icarus, your reader will know you are referencing the tragedy of Hubris.</span></li><span data-dcnode-id="2491" instrument_node="">
</span><li data-dcnode-id="2486"><span data-dcnode-id="2490" instrument_node="">Third, mythology allows the reader to create relevant cultural contexts. Haruki Murakami often incorporates Japanese folklore into his work, and the novel </span><em data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Beauty is a Wound</span></em><span data-dcnode-id="2487" instrument_node=""> by Eka Kurniawan relies heavily on Indonesian mythology.</span></li><span data-dcnode-id="2485" instrument_node="">
</span></ul><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2480"><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Pathos</span></strong></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Pathos is an appeal to the reader’s emotions. Because the experience of reading relies so much on the reader’s own empathy, harnessing the power of pathos is key to the art of storytelling.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Storytellers generate pathos simply by writing relatable characters. When the reader connects with a character as if they were a real human being, the reader also feels that character’s pain, struggles, and triumphs. Always assume that your reader wants to connect with your characters, that they want to feel your story pour salt in the wound. This is equally true for your antagonist, assuming that antagonist is also a human being.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Think about the things that everyday, ordinary people yearn for. Maybe it’s stability, love, a sense of belonging; maybe they relate to stories of natural disaster, unrequited love, or being a misfit. Consider your reader and what they might connect with, and make Pathos your doorway into the reader’s heart.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2467"><strong data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Quibbles</span></strong></p><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">A quibble is a technicality that, though minor, often resolves the plot in a major way.</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2458"><span data-dcnode-id="2462" instrument_node="">Let’s say your protagonist makes a bet with someone, and they lose that bet. The price they pay for that bet is death. Your protagonist may save their own life by arguing that the bet should follow </span><em data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">the exact verbal agreement</span></em><span data-dcnode-id="2459" instrument_node=""> that they made—and by invoking this technicality, your protagonist manages to evade death entirely.</span></p><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2456" instrument_node="">Of course, quibbles can go against the protagonist’s wishes, too. In </span><em data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Macbeth</span></em><span data-dcnode-id="2453" instrument_node="">, the Three Witches tell Macbeth that “none of woman born” can kill him. Macbeth assumes this to mean he is invincible, but he is later killed by Macduff, who was C-sectioned rather than “born from” a woman.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">If written haphazardly, a quibble can be just as convenient as a Deus Ex Machina. Nonetheless, quibbles often surprise the reader, as they chip at the seeming absoluteness of fate.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2445"><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Red Herrings</span></strong></p><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">In both rhetoric and literature, a red herring is something that distracts the reader. You will most often see red herrings in mystery novels, as the novelist is trying to prevent the reader from solving the mystery until the very end.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Red herrings are one of the more versatile storytelling techniques, as they take many different forms. A red herring can be a clue falsely pinned to an innocent person; it can be a forced confession, or an unreliable narrator falsifying the past, or even a coincidence that the writer didn’t intend.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Although red herrings are a fun twist to the art of storytelling, use them sparingly. As an author, you have an implicit contract with the reader to tell your story faithfully; too many distractions and misleading elements will make the reader lose faith in your storytelling.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2432"><strong data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Rhetorical Questions</span></strong></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">A rhetorical question is a question that’s posed for the sake of asking, rather than the sake of being answered. In other words, it’s a question meant to provoke the reader.</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Rhetorical questions are often open-ended. While a narrator can pose rhetorical questions, they usually come from a character in the story.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2424" instrument_node="">A famous example of this is in Shakespeare’s </span><em data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Julius Caesar</span></em><span data-dcnode-id="2421" instrument_node="">, when Caesar asks Brutus “Et tu, Brute?” This question has no answer—after all, Caesar is about to die—but it prompts the reader to think about Brutus’ betrayal of trust and friendship.</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">In everyday speech, we use rhetorical questions all the time. Who knows? Why not? Is the sky blue? Rhetorical questions can help make your dialogue seem more human, and it can also provoke your reader’s thoughts and emotions.</span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2413"><strong data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Rule of Threes</span></strong></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">The Rule of Threes states that readers best respond to information that’s presented in lists of three. This applies to everything, from basic descriptions to global, structural elements in a story.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2408" instrument_node="">The Rule of Threes happens at the line level, especially with description. If I tell you my cat is “young, fluffy, and orange,” those three images give you a solid description. If I tell you my cat is “young, fluffy, loud, stubborn, fast, destructive, capricious, and orange,” I’ve overloaded my description with adjectives, and you won’t know what part of that information is </span><em data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">essential</span></em><span data-dcnode-id="2405" instrument_node="">.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">The Rule of Threes also applies to story structures. Many stories have, at most, three main characters. Many plots have three main events: an inciting incident, a climax, and a falling action (or response to the climax). If a novel has sections, it often has three sections; if a style has multiple settings, it usually has three main ones.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">This is not a hard and fast rule—in fact, most rules in writing are suggestions. Nonetheless, your writing will lose the reader’s attention and brainspace if it presents too much information. The Rule of Threes is not immutable, and you don’t need 3 of everything.</span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">But, when it comes to the central elements of your work, try to keep it to three discrete items. Otherwise, you might lose your grip on the magic of storytelling.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2391"><strong data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Show, Don’t Tell</span></strong></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">What is storytelling without the show, don’t tell rule? “Show, don’t tell” is a way of using imagery to relay an experience to the reader, rather than spoon feeding that experience through literal description. The effect is that your reader becomes immersed in the story, perceiving everything that your characters perceive as though they were really there.</span></p><span data-dcnode-id="2387" instrument_node="">
</span><blockquote data-dcnode-id="2384"><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">“Don’t tell me the moon is shining; show me the glint of light on broken glass.” —Anton Chekhov</span></p></blockquote><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">To master the show, don’t tell rule, read through our in-depth article.</span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2377"><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/show-dont-tell-writing"><span data-dcnode-id="2379" instrument_node="">https://writers.com/show-dont-tell-writing</span></a></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2373"><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Stream of Consciousness</span></strong></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2368"><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/stream-of-consciousness/"><span data-dcnode-id="2371" instrument_node="">Stream of Consciousness</span></a><span data-dcnode-id="2369" instrument_node=""> is a writing technique in which a character’s thoughts are written directly onto the page, without any filter or editing. The author, assuming the persona of their character, observes their thoughts and impartially transcribes those thoughts into narration and internal dialogue.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Because stream of consciousness attempts to capture the idiosyncrasies of human thought, the prose itself can be difficult to follow. Authors may write using free association, frequent repetition, disjointed imagery, and a keen focus on senses and emotions. The prose often follows a nonlinear fashion, it may use punctuation frenetically, and it certainly won’t have the polished, edited feel of a typical manuscript.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">To be clear: this is perhaps the most difficult of storytelling techniques to master. If you want to write stream of consciousness, start by simply keeping a personal journal, observing the nature of your own thoughts as they flow onto the page. It’s also worth reading the masters of the technique, like James Joyce, William Faulkner, and Virginia Woolf.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2358"><strong data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">The Everyday</span></strong></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Even characters in sci-fi, fantasy, and thriller novels have quotidian, everyday lives. Providing a glimpse into their everyday lives helps make the story more accessible to the reader.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">What do those everyday details look like? A daily commute, a morning shower, a stop at the grocery store after work. It can also be everyday annoyances: swatting at mosquitoes in the evening, holding your breath when you walk past a sewer grate, forgetting not to scratch at the rash on your wrist, etc.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node="">What do these boring, everyday tasks do? One, they humanize your characters, giving them relatable behaviors that act as windows to their worlds. Two, these tasks show the reader what everyday life looks like </span><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">before the inciting incident</span></em><span data-dcnode-id="2347" instrument_node="">. Once the protagonist’s life becomes upended by something major, we now relate to the character on a personal level and want them to succeed on their journey.</span></p><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Just be careful not to provide too many everyday details that your story loses sight of its plot. The reader doesn’t need to see every moment in a typical day of your protagonist’s life—and, unless it’s extremely relevant, don’t start your story with your protagonist waking up, as this is an overdone cliché.</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2339"><strong data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Tropes</span></strong></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">A trope is a theme or archetype that shows up regularly in a genre of work. Tropes give structure to a story, providing a kind of scaffolding that the author can manipulate and build from, creating a story both fresh and readable. In genre fiction, tropes are essential to the art of storytelling.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Tropes are commonly misconstrued as clichés, but that’s not the case. For example, a trope in the romance genre is the “meet-cute,” where two soon-to-be-lovers meet each other in a unique and adorable situation. While this trope recurs throughout romance fiction, writers are free to experiment with the meet-cute in their own original ways.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2331" instrument_node="">If you intend to write genre fiction, or even to pull from different genres in your own literary work, it’s important to familiarize yourself with that genre’s tropes. The wiki </span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/"><span data-dcnode-id="2330" instrument_node="">TV Tropes</span></a><span data-dcnode-id="2328" instrument_node=""> is a fantastic resource for this, covering tropes in both film and literature.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2323"><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Vernacular</span></strong></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Vernacular refers to regional dialects. Like “the everyday,” vernacular helps humanize your characters, while also establishing a sense of place in your story.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2318" instrument_node="">If your characters are strongly immersed in the culture of their upbringing, </span><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lithub.com/how-an-irish-syntactical-peculiarity-helped-me-find-my-protagonists-voice/"><span data-dcnode-id="2317" instrument_node="">do some research</span></a><span data-dcnode-id="2315" instrument_node=""> on the vernacular of that place. For example, a character who grew up in Wisconsin should say “bubbler,” not “water fountain.”</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Language, and even just the English language, is fantastically diverse. Using vernacular in your characters’ dialogue makes them feel more flesh-and-blood, and it also provides some entertaining moments in language and storytelling.</span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2307"><strong data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Wordplay</span></strong></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Wordplay makes for enjoyable, engaging storytelling. Twists of phrase create memorable moments of narration and dialogue, keeping the reader glued to the page.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">Wordplay comes in many different forms. Puns, malapropisms, neologisms, oxymorons, kennings, onomatopoeias, portmanteaus, zeugmas, and contronyms are just </span><em data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">some</span></em><span data-dcnode-id="2299" instrument_node=""> of the ways that writers have fun with language.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node="">Additionally, </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/literary-devices-in-poetry"><span data-dcnode-id="2295" instrument_node="">sound devices</span></a><span data-dcnode-id="2293" instrument_node=""> like alliteration and rhyme also create memorable, meaningful moments in language.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Way before the printing press and the invention of modern prose, storytellers told their tales orally and entirely in verse. The epic poem was a way of sharing stories, and because pencil and paper were scarce in antiquity, storytellers had to memorize their work. These wordplay devices were ways of memorizing stories, allowing the storyteller to move through the plot while keeping the listener entertained.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Thus, these tools are freely at the writer’s disposal, and storytellers are encouraged to use them. Wordplay is essential to the magic of storytelling, so harness the magic of words!</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2284" instrument_node="">To learn more about wordplay, check out our article: </span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/word-play"><span data-dcnode-id="2283" instrument_node="">Word Play: Examples of a Play on Words</span></a></p><span data-dcnode-id="2280" instrument_node="">
</span><h2 data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Why is Storytelling Important?</span></h2><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">The above elements and techniques coalesce into the power of storytelling. But, why is storytelling important?</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">In short, storytelling is the closest that writers come to creating real worlds, characters, and events. When a story is told well and meaningfully, the reader is transported into a world of the writer’s own making—a world with its own rules, laws, physics, relationships, and ideas. In this world, the writer can twist emotions, make powerful statements, and entertain the reader in beautiful ways.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">But for the reader to access this world, the writer needs to use storytelling techniques. Storytelling is a portal into a different dimension, or a doorway into an unexplored house, or a bridge across a river, or a rocketship to different planets.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><blockquote data-dcnode-id="2265"><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">You must transport your reader if you want to persuade, inspire, or provoke them.</span></p></blockquote><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Whatever the metaphor, you must transport your reader if you want to persuade, inspire, or provoke them. This is what makes writers both fantastically powerful and fantastically human.</span></p><span data-dcnode-id="2261" instrument_node="">
</span><h2 data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Wield the Art of Storytelling at Writers.com</span></h2><span data-dcnode-id="2258" instrument_node="">
