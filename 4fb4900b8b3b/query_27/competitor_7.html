</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">In order to have students thinking about the structure and literary qualities of the novel from the beginning, I also assign each small group a writing style and a theme, motif, or symbol to trace within the chapter. The students must provide two examples of each, think about its significance, and present it to the class. The pairings I have are: nature and flashback; iron and stream of consciousness; bestiality and repetition; home and Gothic Romanticism; memory and magical realism (bildungsroman isn't evident yet).</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Another useful activity that requires students to think critically is to have them create their own questions. This works best when you can divide the class in half and then put each half into small groups of 3-4. Side A will create questions for chapters 11-12 and side B will create questions for chapters 13-14. Once they have crafted their questions, they must switch and answer the questions created by the other half. This also cleverly serves to have students review a large section of text because they must think carefully during both parts of the activity. In order to ensure the students are creating quality questions, I assess the questions and not the answers, though they count for participation. Also, I have found that giving the students question stems/verbs based on Howard Bloom's taxonomy of higher order thinking skills leads them to create stronger questions. Students must create five questions; two may be comprehension (knowledge or comprehension in Bloom's language) and three should be interpretation or analysis (analysis, synthesis, or evaluation).</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Finally, one of the most useful activities is the timeline. This is best done after chapter 18, at the end of part I. I made some changes for my own classes, but the original idea comes from Teachit, a copyright-protected website originally created for British teachers, but which has many valuable resources for the literature classroom. I strongly encourage teachers to visit the website (www.teachit.co.uk) and evaluate the materials for themselves.</span></p><span data-dcnode-id="644" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="642" href="#top"><img alt="to top" border="0" data-dcnode-id="643" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="640" id="h1num-7"><span data-dcnode-id="641" instrument_node="">Conclusion</span></h1><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="635"><i data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Beloved</span></i><span data-dcnode-id="636" instrument_node=""> is a novel that has been and will continue to be a central piece of literature in the literature classroom for so many reasons. This curriculum unit is just a small window into some of its elements; there were many times during the writing when I thought I could not possibly do justice to the complexity of the text in the time and space allowed. However, the theme of storytelling has allowed me to center the focus on ways in which the incredibly powerful story gets revealed to the audience. While I was aware of the importance of the African American experience in the novel, examining it as storytelling has only magnified that significance—especially since I researched the particular modes of African American storytelling that inform the text. I now have a renewed respect and passion for this novel, and see myself teaching and learning it for a long time to come. My goal here is to provide teachers with a pathway into analysis that doesn't come from a summary-based perspective, and I hope that is useful.</span></p><span data-dcnode-id="634" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="632" href="#top"><img alt="to top" border="0" data-dcnode-id="633" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="630" id="h1num-8"><span data-dcnode-id="631" instrument_node="">Appendix: Margaret Garner Activity</span></h1><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="626"><small data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Read the following historical account on which Sethe is based and respond on a separate sheet of paper to the following questions; it should be about a page.</span></small></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="622"><small data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Paragraph 1: What similarities are present between Margaret and Sethe? Does reading this change your opinion of Sethe at all?</span></small></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="618"><small data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Paragraph 2: How do you personally deal with the situation in ch. 16, morally and/or ethically. (Philosophically, 'morality' speaks to the character, actions, and/or values of an individual; 'ethics' is the set of standards that governs a particular group.)</span></small></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="612"><small data-dcnode-id="613"><span data-dcnode-id="616" instrument_node="">The Story of Margaret Garner from Levi Coffin's </span><i data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Reminiscences</span></i></small></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="606"><small data-dcnode-id="607"><i data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Levi Coffin was born in Guilford County, North Carolina, in 1798; he moved to Cincinnati, Ohio, as a young man. He was a Quaker and abolitionist, and is called "the President of the Underground Railroad" for his efforts to save thousands from the institution of slavery. He wrote his autobiography in 1876 and died in 1877.</span></i><span data-dcnode-id="608" instrument_node=""> </span></small></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="602"><small data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Perhaps no case that came under my notice, while engaged in aiding fugitive slaves, attracted more attention and aroused deeper interest and sympathy than the case of Margaret Garner, the slave mother who killed her child rather than see it taken back to slavery. This happened in the latter part of January, 1856. The Ohio River was frozen over at the time, and the opportunity thus offered for escaping to a free State was embraced by a number of slaves living in Kentucky, several miles back from the river. A party of seventeen, belonging to different masters in the same neighborhood, made arrangements to escape together. There was snow on the ground and the roads were smooth, so the plan of going to the river on a sled naturally suggested itself. The time fixed for their flight was Sabbath night, and having managed to get a large sled and two good horses, belonging to one of their masters, the party of seventeen crowded into the sled and started on their hazardous journey in the latter part of the night. They drove the horses at full speed, and at daylight reached the River below Covington, opposite Wester Row. They left the sled and horses here, and as quickly as possible crossed the river on foot. It was now broad daylight, and people were beginning to pass about the streets and the fugitives divided their company that they might not attract so much notice.</span></small></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="598"><small data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">An old slave named Simon and his wife Mary, together with their son Robert and his wife Margaret Garner and four children, made their way to the house of a colored man named Kite, who had formerly lived in their neighborhood and had been purchased from slavery by his father, Joe Kite. They had to make several inquiries in order to find Kite's house, which was below Mill Creek, in the lower part of the city. This afterward led to their discovery; they had been seen by a number of persons on their way to Kite's, and were easily traced by pursuers. The other nine fugitives were more fortunate. They made their way up town and found friends who conducted them to safe hiding places, where they remained until night. They were put on the Underground Railroad, and went safely through to Canada....</span></small></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594"><small data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">In a few minutes...[Kite's] house was surrounded by pursuers—the masters of the fugitives, with officers and a posse of men. The door and windows were barred, and those inside refused to give admittance. The fugitives were determined to fight, and to die, rather than to be taken back to slavery. Margaret, the mother of the four children, declared that she would kill herself and her children before she would return to bondage. The slave men were armed and fought bravely. The window was first battered down with a stick of wood, and one of the deputy marshals attempted to enter, but a pistol shot from within made a flesh wound on his arm and caused him to abandon the attempt. The pursuers then battered down the door with some timber and rushed in. The husband of Margaret fired several shots, and wounded one of the officers, but was soon overpowered and dragged out of the house. At this moment, Margaret Garner, seeing that their hopes of freedom were in vain, seized a butcher knife that lay on the table, and with one stroke cut the throat of her little daughter, whom she probably loved the best. She then attempted to take the life of the other children and to kill herself, but she was overpowered and hampered before she could complete her desperate work. The whole party was then arrested and lodged in jail.</span></small></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="590"><small data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The trial lasted two weeks, drawing crowds to the courtroom every day....The counsel for the defense brought witnesses to prove that the fugitives had been permitted to visit the city at various times previously. It was claimed that Margaret Garner had been brought here by her owners a number of years before, to act as nurse girl, and according to the law which liberated slaves who were brought into free States by the consent of their masters, she had been free from that time, and her children, all of whom had been born since then—following the condition of the mother—were likewise free.</span></small></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="586"><small data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">The Commissioner decided that a voluntary return to slavery, after a visit to a free State, reattached the conditions of slavery, and that the fugitives were legally slaves at the time of their escape....</span></small></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="582"><small data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">But in spite of touching appeals, of eloquent pleadings, the Commissioner remanded the fugitives back to slavery. He said that it was not a question of feeling to be decided by the chance current of his sympathies; the law of Kentucky and the United States made it a question of property.</span></small></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="576"><small data-dcnode-id="577"><i data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">After being remanded to her owner, William Garrison's newspaper The Liberator reported that she and her youngest child were sold and were traveling by riverboat to Arkansas when their boat collided with another. Both Garner and her child were thrown overboard; the child drowned, and Garner expressed pleasure that her child died. She was sold again and moved to New Orleans, where she died of typhoid fever in 1858.</span></i><span data-dcnode-id="578" instrument_node=""> </span></small></p><span data-dcnode-id="575" instrument_node="">
</span></main><span data-dcnode-id="573" instrument_node="">

</span><p data-dcnode-id="457"><small data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Implementing District Standards</span></small></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="453"><small data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">My district—and state, for that matter—has just transitioned to the Common Core State Standards, which represents a nationwide effort to provide high quality and engaging classroom practices for all students. The English Language Arts Common Core is delineated in five key standards, or strands: reading, writing, speaking and listening, language, and media and technology. The Common Core represents a shift in expectations, because all students are to meet the rigorous standards as outlined in 2012-2013.</span></small></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="449"><small data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">This unit meets the criteria for a strong Common Core unit in several ways. For example, according to expectations from the Reading strand, students should "read closely to determine what the text says explicitly and to make logical inferences from it; cite specific textual evidence when writing or speaking to support conclusions drawn from the text." This is an essential part of this curriculum unit because students must be able not only to comprehend the plot of the text, but to engage in class discussions with both small and large groups, which will be based on providing textual support for their opinions and explaining their interpretations and conclusions. Students will also "assess how point of view or purpose shapes the content and style of a text," which is another foundational element of this unit, especially due to the theme of storytelling which shapes the interpretation and analysis of the novel.</span></small></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="445"><small data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">This unit was also designed for an Advanced Placement class, which must also adhere to rigorous nationwide standards. AP classes are designed to provide a college-level course experience in a high school setting; students are introduced to demanding critical thinking and interpretation skills and are expected to apply them to their literature study. An AP English Literature and Composition course includes expectations like "students reflect on the social and historical values it reflects and embodies. Careful attention to both textual detail and historical context provides a foundation for interpretation." As stated, this unit will include biographical, social, and cultural background so that students will understand and appreciate the context that plays an important role in the novel. The College Board also notes that "the approach to analyzing and interpreting the material involves students in learning how to make careful observations of textual detail, establish connections among their observations, and draw from those connections a series of inferences leading to an interpretive conclusion about the meaning and value of a piece of writing." This is a necessary component of the unit because students are expected to note details that occur throughout the text, creating a cumulative interpretation that must be open to change as the novel progresses.</span></small></p><span data-dcnode-id="444" instrument_node="">
