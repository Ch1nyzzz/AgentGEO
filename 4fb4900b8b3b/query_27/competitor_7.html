</span><h1 data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Beloved: A Case Study in Storytelling Analysis</span></h1><span class="cuAuthor" data-dcnode-id="1162"><span data-dcnode-id="1165" instrument_node="">by</span><span class="cuAuthorName" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Tiffany DiMatteo</span></span></span><span data-dcnode-id="1161" instrument_node=""> </span></header><nav data-dcnode-id="1119"><a class="pageSupportButton" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/curriculum/viewer/initiative_12.02.08_g"><img alt="" data-dcnode-id="1159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-guide.png&amp;raw"><label data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">To Guide Entry</span></label></a><span data-dcnode-id="1155" instrument_node=""> </span><a class="pageSupportButton" data-dcnode-id="1151" href="#comment" id="cuSendCommentButton"><img alt="" data-dcnode-id="1154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-comment.png&amp;raw"><label data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Send / Read Comments</span></label></a><ul data-dcnode-id="1120" id="cuTOC"><li data-dcnode-id="1148"><a data-dcnode-id="1149" href="#h1num-1"><span data-dcnode-id="1150" instrument_node="">Introduction</span></a></li><li data-dcnode-id="1145"><a data-dcnode-id="1146" href="#h1num-2"><span data-dcnode-id="1147" instrument_node="">Curricular Context and Rationale</span></a></li><li data-dcnode-id="1142"><a data-dcnode-id="1143" href="#h1num-3"><span data-dcnode-id="1144" instrument_node="">Objectives</span></a></li><li data-dcnode-id="1139"><a data-dcnode-id="1140" href="#h1num-4"><span data-dcnode-id="1141" instrument_node="">Background Information</span></a></li><li data-dcnode-id="1136"><a data-dcnode-id="1137" href="#h1num-5"><span data-dcnode-id="1138" instrument_node="">Analysis of Storytelling</span></a></li><li data-dcnode-id="1133"><a data-dcnode-id="1134" href="#h1num-6"><span data-dcnode-id="1135" instrument_node="">Strategies and Activities</span></a></li><li data-dcnode-id="1130"><a data-dcnode-id="1131" href="#h1num-7"><span data-dcnode-id="1132" instrument_node="">Conclusion</span></a></li><li data-dcnode-id="1127"><a data-dcnode-id="1128" href="#h1num-8"><span data-dcnode-id="1129" instrument_node="">Appendix: Margaret Garner Activity</span></a></li><li data-dcnode-id="1124"><a data-dcnode-id="1125" href="#h1num-9"><span data-dcnode-id="1126" instrument_node="">Bibliography</span></a></li><li data-dcnode-id="1121"><a data-dcnode-id="1122" href="#h1num-10"><span data-dcnode-id="1123" instrument_node="">Endnotes</span></a></li></ul></nav><main data-dcnode-id="574"><span data-dcnode-id="1118" instrument_node="">
</span><blockquote data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">
    "It was not a story to pass on." </span><i data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Beloved</span></i><span data-dcnode-id="1114" instrument_node="">
</span></blockquote><span data-dcnode-id="1112" instrument_node="">
</span><h1 data-dcnode-id="1110" id="h1num-1"><span data-dcnode-id="1111" instrument_node="">Introduction</span></h1><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">I originally encountered the novel </span><i data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Beloved</span></i><span data-dcnode-id="1105" instrument_node=""> about a month before I was to teach it to an International Baccalaureate English 12 class eight years ago. When I read it for the first time, I was instantly struck by the power of the narrative, the complexity of Morrison's style, and absolute fear that I did not understand the novel well enough to teach it. I understood the basic plot ideas: murdered child returns in the flesh to haunt mother and family while they, the living, are attempting to walk a fine line between past, present, and future that will allow them to move forward. However, I needed help in understanding what the subtleties of Morrison's language, symbols, and narrative structure signified and how best to illuminate that for my students. Despite several fevered searches of both internet and library, I struggled to find appropriate strategies and activities for an upper-level high school classroom. This novel has invited many scholarly interpretations; there are also no shortage of summaries aimed at students, like Sparknotes—the bane of every teacher who attempts to encourage students to wrestle with a text independently. However, for a high school teacher working through the many different elements and attempting to convey those elements to my students, I felt the resources available were lacking. I put forth a brave face and a humble attitude and we slogged through the novel as neophytes together, united in our lack of understanding. Since then, I have read and taught this novel several times, increasing my comfort level as the facilitator and providing students with a deeper understanding of its many facets.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node="">Great literature should always include an engaging plot and an innovative approach to literary elements; </span><i data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Beloved</span></i><span data-dcnode-id="1099" instrument_node=""> offers both, and upon every reading of the novel, I find something new that I did not see previously. I am also certain to tell my students this nugget of wisdom, many of whom would rather pull out their own teeth than reread a text. There are so many different lenses that one can use to interpret and critique the novel, which is one small part of its brilliance. There is no question why Morrison won the 1988 Pulitzer Prize in Fiction for </span><i data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Beloved</span></i><span data-dcnode-id="1096" instrument_node="">, followed by a Nobel Prize for Literature in 1993. It sparks a passionate level of interest for me as both a reader and a teacher, and I know that my students sense my excitement when we delve into the text together. While students don't always love the novel with the same near-fanaticism that I have, (almost) all of them come to respect and appreciate the novel for its literary value. Approaching the novel from the vantage point of storytelling encouraged me to bring a fresh eye to the text and to reevaluate my understanding of the story it ultimately tells the reader and the ways in which it does so.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="1092" href="#top"><img alt="to top" border="0" data-dcnode-id="1093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="1090" id="h1num-2"><span data-dcnode-id="1091" instrument_node="">Curricular Context and Rationale</span></h1><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1088" instrument_node="">For the last two decades, this novel has consistently been one of the most frequently taught on college campuses. As a teacher for both the Advanced Placement (AP) or International Baccalaureate (IB) programs, I know that practically all of these students are college-bound and are voluntarily enrolling in an academically challenging and rigorous course that will prepare them for higher education. Additionally, both programs require that students move beyond comprehension and be able to interpret and analyze rhetorical and thematic elements of writing, also valued skills at the university level. </span><i data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Beloved</span></i><span data-dcnode-id="1085" instrument_node=""> provides ample opportunity for this; it is an appropriate challenge because of the sophisticated writing style, symbolism, and motifs. When students are given parameters for understanding a difficult text like </span><i data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Beloved</span></i><span data-dcnode-id="1082" instrument_node="">, it can lead to stimulating classroom discussion and the application of significant analysis. I usually approach this novel in second semester for two reasons: it builds up to this novel's difficulty through other works in first semester and because students find this novel incredibly useful as an exemplary text for their exams, which occur in May.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">AP English Literature and Composition is traditionally taught in the twelfth grade and is designed for students to think critically about literature and develop analytical skills equivalent to an undergraduate literature course. The students are generally high-achieving, goal-oriented students who are accustomed to being successful at school. The College Board must approve the syllabus of the course, and students are expected to take the AP exam in May; a successful score is one that will gain college credit, typically a 4 or 5 (on a 5 point scale). The exam incorporates a multiple choice section with several fiction-based passages and questions that I have categorized as comprehension, interpretation, analysis, and technical or literary vocabulary. Students also write three essays in two hours; two essays are based on previously unseen literary passages chosen by the College Board, and the third essay is an open-ended question that they will answer and support based on a text read during that year. This is where </span><i data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Beloved</span></i><span data-dcnode-id="1076" instrument_node="">'s usefulness truly becomes evident, because it is a text that can be applied in so many different ways.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">The International Baccalaureate Diploma Program takes place during eleventh and twelfth grades. It is a rigorous curriculum that takes a more holistic approach to education; in addition to core academic classes, IB students are required to take Theory of Knowledge, a course designed to evaluate learning processes and illustrate connections amongst disciplines. IB students must also complete an Extended Essay of four thousand words and community service hours in the categories of creativity, action, and service (CAS). In English A1 HL (IB-speak for 12 </span><sup data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">th</span></sup><span data-dcnode-id="1070" instrument_node=""> grade literature, read in English), students are required to examine multiple genres of literature from different cultures, and each work is studied in-depth for a number of weeks. Choosing particularly rich texts that can be critiqued from a variety of stances is an important requisite factor for being placed on the syllabus. In May, IB students take an essay-based exam and received a score of 0-7; when combined with their other IB scores, they may receive an IB diploma or certificates for completed courses.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="1066" href="#top"><img alt="to top" border="0" data-dcnode-id="1067" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="1064" id="h1num-3"><span data-dcnode-id="1065" instrument_node="">Objectives</span></h1><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">By the end of a four-week unit for a class that meets every other day for ninety minutes, students will have read the novel in its entirety, discussed their evolving understanding of the plot and character development, established an understanding of the non-linear chronology of events, analyzed the significance of storytelling in its multiple meanings, and showcased their ability to critically analyze the novel from various points of view.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">My goal as an educator, and particularly as an English teacher, is for students to learn to think critically and to apply those analytical skills throughout their lives. Often students think that all we do in class is read and discuss novels, and they don't see the benefits that the critical thinking and analysis skills they have learned and applied in my class can have in multiple areas of their academic lives and beyond. I know I have been successful, however, when a student tells me that she never thought of something in that way before, or that he brought up our reading or discussion in another class or at home. That shows that the boundaries of the physical classroom have been broken, which is exactly what I want. </span><i data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Beloved</span></i><span data-dcnode-id="1056" instrument_node=""> is the type of novel that encourages this boundary-breaking; I have eavesdropped on students in the hallway arguing over the morality of Sethe's decision and I have been told from other teachers that the students frequently tie in the reading to their other coursework—sometimes to that teacher's chagrin because of a perceived slight to their own classwork, or ignorance about the novel itself. I, however, am delighted that students are making connections.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">By the end of this unit, students will have a different concept of the word 'storytelling.' Using the word in a high school setting is tricky because it is associated with much younger children: as in, "story hour" or "tell me a story." There's also a cultural connotation that to "tell stories" is to be lying, and that only leads to trouble and punishment. In the context of this novel, however, storytelling takes on multiple levels of significance that relate to but also diverge from standard associations with the word. In any literary work, there is a narrator telling a story to the reader. In this novel, that is accomplished by an omniscient third person perspective, but there are important moments when the novel's narration is entrusted to its characters—not only through dialogue, but also from a first person point of view. There are also the stories that the characters tell each other—personal stories of physical and psychological trauma that raise the question, what stories should be told, and who decides when, how, or why they are told?</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The very idea of storytelling is rooted in the historical and cultural reality of the novel in two ways, and this will be explored in the curriculum unit. First, the oral tradition of storytelling, a key component of sharing and maintaining African and African-American history and identity at the time of the novel's setting, is a key element in the relationships that exist among the characters. This is further complicated by the idea of oral versus written storytelling, when a newspaper clipping shown to an illiterate man becomes a revelatory and symbolic plot device. Second, the central conflict of the novel is based on a historically true event, which circles back to and questions the idea that storytelling must be fictitious. Punishment in the novel comes from historical truth—the institution of slavery is the root of all pain and each character has suffered from it in some way. Even though the novel is a work of fiction, the emotions that are characterized are realistic. Storytelling is a way of processing and making real that pain and punishment; it also encourages an emotional reaction from the reader. All of these different elements of storytelling will be outlined in the discussion below.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">In this unit, students will recognize and analyze the different writing styles and narrative techniques that comprise the storytelling structure of </span><i data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Beloved</span></i><span data-dcnode-id="1044" instrument_node="">. The novel is considered a cornerstone of postmodernism because of the way that it fuses so many styles that have come before, including stream of consciousness, magical realism, flashback, and the bildungsroman. Evaluating setting and chronology are important when considering the structure as it relates to and impacts storytelling. The novel shifts in both place and time with minimal cues, creating a beautiful fluidity to the narrative but also potential frustration, as it can be easy to lose the when and where of the plot.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">To meet these objectives, reading and discussing the novel should take some time, which is why four weeks for the unit is strongly recommended. I have made the mistake of expecting students to move too quickly through the text, and they end up frustrated and confused. This is especially true for high school students encountering the text for the first time, for whom this may well be the most complex piece of literature they have ever read. By breaking the novel into purposeful sections and working through it as a class, the students are allowed time to process the text, to discuss it with their peers, and to approach and work through its most powerful moments together (my chunking suggestions are in the Strategies and Activities section below).</span></p><span data-dcnode-id="1039" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="1037" href="#top"><img alt="to top" border="0" data-dcnode-id="1038" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="1035" id="h1num-4"><span data-dcnode-id="1036" instrument_node="">Background Information</span></h1><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">There are many resources available for a standard biography of Toni Morrison, so this short section will focus on the pertinent parts of her background that specifically inform the creation of this novel. As the focus of this curriculum unit is the theme of storytelling, that idea will also serve as the central touchstone biographically.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1030" instrument_node="">Toni Morrison, a pen name, was born as Chloe Anthony Wofford in 1931 in Lorain, Ohio; the year of her birth is an important fact because "Morrison was twenty-three years old when the 1954 school desegregation decision in </span><i data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Brown v. Board of Education</span></i><span data-dcnode-id="1027" instrument_node=""> was handed down; she was thirty-seven...when the Civil Rights Act was passed. Thus, the activism, violence, and radical changes of the civil rights era formed the backdrop of almost her entire young adulthood." </span><sup data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">1</span></sup><span data-dcnode-id="1024" instrument_node=""> This history could not fail to inform her writing and, indeed, her novels grapple with many different aspects of the African American experience, even those that she did not personally live through, like the Middle Passage and slavery in </span><i data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Beloved</span></i><span data-dcnode-id="1021" instrument_node="">. One critic claims that "Morrison's most revolutionary—and most defining—act has been to write for black readers about black people...[S]he has credited the complexity and originality of African American life by working within its intricate and rich system of meaning, language, and art." </span><sup data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">2</span></sup><span data-dcnode-id="1018" instrument_node=""> She achieves this through the representation of dialect, symbols, and a sense of authenticity in her fiction.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1015" instrument_node="">Morrison's grandparents were sharecroppers in Alabama; they became part of the Great Migration of African Americans from the South to the North when they moved first to Kentucky, and then settled in Ohio. They brought with them not only their personal experiences, but also the oral tradition of storytelling or "the black vernacular tradition," which was passed down to their children and grandchildren. </span><sup data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">3</span></sup><span data-dcnode-id="1012" instrument_node=""> Morrison has repeatedly highlighted the importance of these stories, most recently in an April 2012 article: "At night her parents told R-rated ghost stories, like one about a murdered wife who returned home holding her own severed head. The following evening, the kids had to retell the tales with variations: Maybe it was snowing, or there was blood dripping from the head." </span><sup data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">4</span></sup><span data-dcnode-id="1009" instrument_node=""> This immediately brings to mind the passage in </span><i data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Beloved</span></i><span data-dcnode-id="1006" instrument_node=""> of the childish but disturbing stories that Sethe's children tell each other about their own mother, from Denver's point of view: "[S]he remembered...the pleasure they had sitting clustered on the white stairs—she between the knees of Howard or Buglar—while they made up die-witch! stories with proven ways of killing [Sethe] dead." </span><sup data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">5</span></sup><span data-dcnode-id="1003" instrument_node=""> This presents an interesting contrast of familial comfort, found in the physical closeness of the siblings and the unity resulting from the storytelling, and the unsettling plotline of murdering their mother. At this point in the novel, the reader is unaware why making up stories of Sethe's death would bring "pleasure" to the children, although there is an interesting connection to the idea of "proven ways of killing her dead." The children are aware they live with the ghost of their murdered sister, so death itself is not an end but simply a different kind of existence. The specific phrasing calls to mind the idea of ending a person in both body and spirit—when they "kill" Sethe in these stories, she cannot return to haunt them.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="1000" instrument_node="">Morrison was in a unique position to marry the oral tradition of stories with the canon of Western literature because of her family's decision to move north in order to provide her with better access to education and, historically speaking, the increase in available avenues for black writers as the twentieth century progressed. "[F]rom a very early age, she had a deep connection to the Western literary tradition even while she maintained her grounding in the black vernacular tradition." </span><sup data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">6</span></sup><span data-dcnode-id="997" instrument_node=""> She went on to graduate from both Howard and Cornell and says she became a writer when "I realized there was a book that I wanted very much to read that really hadn't been written." </span><sup data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">7</span></sup><span data-dcnode-id="994" instrument_node=""> This is a powerful statement in context of the novel </span><i data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Beloved</span></i><span data-dcnode-id="991" instrument_node=""> because I am not aware of a work that approaches its handling of morality, trauma, and the dangers of memory in such an eloquent and literary manner, while still being accessible to students.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="988" instrument_node="">In the quarter-century since the publication of </span><i data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Beloved</span></i><span data-dcnode-id="985" instrument_node="">, the novel has developed its own story to tell. While the novel won the Pulitzer Prize in Fiction in 1988, it was not without controversy. The novel failed to win the National Book Award for that year, prompting a large group of renowned, self-identified "black writers" to publish a protest in the </span><i data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">New York Times Book Review</span></i><span data-dcnode-id="982" instrument_node="">. This group, including such figures as Maya Angelou, Lucille Clifton, and Henry Louis Gates, Jr., "here assert ourselves against such oversight and harmful whimsy" and claim that "the legitimate need for our own critical voice in relation to our own literature...no longer be denied." </span><sup data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">8</span></sup><span data-dcnode-id="979" instrument_node=""> In 2006, a group of writers and critics polled by the </span><i data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">New York Times</span></i><span data-dcnode-id="976" instrument_node=""> voted that </span><i data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Beloved</span></i><span data-dcnode-id="973" instrument_node=""> was the best work of literature of the last twenty-five years. </span><sup data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">9</span></sup></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="968" instrument_node="">Finally, the novel has a story to tell as a banned or challenged text and a teacher should be aware of that history before assigning it in the classroom. The same year that Morrison's novel was voted to be the best work of fiction, it was also on the top of the American Library Association's list of most challenged books for "complaints [of] offensive language, sexual content, [and] unsuited to age group." </span><sup data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">10</span></sup><span data-dcnode-id="965" instrument_node=""> Having taught the novel, I know from experience that there are sections that must be handled cautiously. Prior to any classroom discussion of a delicate passage—for example, the references to human-bestial intercourse in the first chapter—I remind my students that the novel contains adult themes that require us to be sophisticated, mature readers, and that our language and tone must reflect that. </span><sup data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">11</span></sup></p><span data-dcnode-id="961" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="959" href="#top"><img alt="to top" border="0" data-dcnode-id="960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="957" id="h1num-5"><span data-dcnode-id="958" instrument_node="">Analysis of Storytelling</span></h1><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">There are myriad ways to critique, analyze, and interpret this novel, and there is no shortage of academic resources to look at for inspiration. My goal here is to provide high school literature teachers with a departure point for analyzing the novel based on the concept of storytelling, and the following analysis will be broken into "Structure and Culture" and "Narrative Truth, Historical Truth." The categories are neither superficial nor definitive; rather, they provide me with broad parameters in order to guide my students through the novel.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">I have structured these sections in a way that will allow teachers to see how the novel can be interpreted in the classroom. Creating day-by-day lesson plans is not the most effective introduction to this analysis because, as is evident upon reading this unit, teachers will benefit most from having all of these elements in mind when beginning the novel with students.</span></p><span data-dcnode-id="950" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="948" href="#top"><img alt="to top" border="0" data-dcnode-id="949" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Structure and Culture</span></h2><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><i data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Oral Tradition</span></i></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="940" instrument_node="">There is a beautiful complexity to the novel that is revealed each and every time it is read, but it can certainly be intimidating to a reader of any age. In addition to the specific literary techniques that Morrison weaves throughout are the overarching styles of writing that coalesce and make it such an engaging and challenging read. The modes of storytelling must be examined so that students can comprehend, break apart, and interpret the text in a meaningful way. This is not a novel that can be read just for plot or character or structure because of the way that the elements have been woven together. I will not divorce the author from a text, thus the cultural perspective of African Americans necessarily informs the structure. For example, one notices the use of parallel structure and repetition almost immediately; the first sentence of each of the three parts of the novel are "124 was spiteful," "124 was loud," and "124 was quiet." </span><sup data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">12</span></sup><span data-dcnode-id="937" instrument_node=""> However, when one recognizes that Morrison embeds the black vernacular tradition into the structure, we see how it contributes strongly to the story that the novel tells and the way that it is revealed. "The vernacular is a complex oral discourse characterized by such tropes as call and response and signifying (a means of repetition and revision)." </span><sup data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">13</span></sup><span data-dcnode-id="934" instrument_node=""> In literary terms, we tend to call this repetition or parallelism, but specifically naming it within the African American tradition brings with it the cultural weight and significance that it deserves.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="931" instrument_node="">The character of Baby Suggs exemplifies the oral traditions of African Americans. Several of the terms used above, like call and response and signifying, along with witnessing, are directly connected to religious practices. We discover in chapter 9 that after she was purchased from slavery by her son Halle, "she became an unchurched preacher...uncalled, unrobed, unanointed". </span><sup data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">14</span></sup><span data-dcnode-id="928" instrument_node=""> After Paul D tells Sethe that Halle lost his mind after seeing her violated, Sethe aches for the support that Baby Suggs would have provided and she hears the voice of Baby Suggs saying, "Lay em down, Sethe. Sword and shield. Down. Down. Both of em down. Down by the riverside. Sword and shield. Don't study war no more. Lay all that mess down. Sword and shield." </span><sup data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">15</span></sup><span data-dcnode-id="925" instrument_node=""> There are several techniques at work in this passage and it is a worthwhile exercise to have students identify them and examine how they work together. First, the characterization of Baby Suggs is as a soothing source of comfort for Sethe, placing Baby Suggs in the mold of a mother figure. The use of dialect reveals class and status, but it also makes her seem approachable and human. This passage serves to connect the techniques of parallelism and repetition to the culturally-rooted terms of witnessing and signifying (defined in the paragraph above). Even though Baby Suggs' comments are just for Sethe, they could easily be used in one of her sermons—the "sword and shield" has biblical connotations—that she delivers in the Clearing to other escaped and former slaves and their children. The imagery, repetition, and structure also create a melodic flow that seems to envelope Sethe and the reader, similar to repeating a mantra or prayer can induce a calming effect.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">The story begins </span><i data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">in medias res</span></i><span data-dcnode-id="919" instrument_node="">, but it quickly establishes the main characters and setting within the first paragraph. Reading this passage aloud is an excellent way of introducing the novel and allowing students the time to process the text and ask questions (not that they will all be answered). Some examples of useful analysis that can be performed on the first paragraph begin with the first sentence: "124 was spiteful." The house has already achieved its own significance by virtue of opening the novel and being personified, and "spiteful" is a loaded word worthy of a brief discussion of connotation and association. The second sentence, a fragment really, "Full of a baby's venom," contrasts that idea of personification. It opens with an angry house and follows with the image of a dangerous, bestial baby, purportedly the most innocent of all creatures.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">I would also ask students to think carefully about the specific number of the house. This is a good time to point out that nothing in the novel is accidental, so why the sequence 124? They will typically point out that the number three is missing, which is a powerful symbol as one continues to read—Beloved, the murdered daughter, being the third of Sethe's children. When asked what the sum of 1+2+4 is, they quickly and proudly shout out "Seven!" The follow-up is, what does the number seven symbolize, particularly in a biblical sense? Some students will point out that God created the world in seven days, which means the number seven is symbolic of completion. This then prompts the final question of, how can the sequence be symbolically complete when it is so clearly missing a component? Revisiting this question at the end of the novel, students recognize that the family is complete without Beloved; she does not belong. Additionally, the numbers may come to symbolize the three characters that can make a new family—Sethe, Denver, and Paul D—by the end of the novel.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="910"><i data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Flashback and Time Shifts</span></i><span data-dcnode-id="911" instrument_node=""> </span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="908" instrument_node="">That the novel will shift quickly in time is established in the fifth sentence, "The grandmother, Baby Suggs, was dead, and the sons, Howard and Buglar, had run away by the time there were thirteen years old—as soon as merely looking in a mirror shattered it (that was it for Buglar); as soon as two tiny hand prints appeared in the cake (that was it for Howard)." While the third sentence states the present time as 1873, the reader is quickly alerted that events of the past will frequently collide with the present. (One of the most useful activities in the classroom is to have students create a chronological timeline of events; this is elaborated in the "Activities" section.) The teacher can point out cues to the students that a time shift is going to occur in order to give them confidence. A strong example for this is found in the extract: "'No more powerful than the way I loved her,' Sethe answered and there it was again. The welcoming cool of unchiseled headstones...". </span><sup data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">16</span></sup><span data-dcnode-id="905" instrument_node=""> Through the phrasing, "and there it was again," a careful reader will recognize that as a cue that we are entering a flashback, and those verbal signs are important in identifying moments of time shift.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="902" instrument_node="">Flashback has its own narrative significance in the novel, clearly demonstrating the power of the past on the present. "[T]he leveling out of different time frames enable[s] the novel to mimic and reflect the process of memory: the actual act of remembering as well as the incorporation of told memories into the oral tradition." </span><sup data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">17</span></sup><span data-dcnode-id="899" instrument_node=""> This connection does not just provide background for the novel's events, but is a powerful reminder that past events create memories and memory can be dangerous. Sethe admits that "she worked hard to remember as close to nothing as was safe," indicating a tenuous relationship between remembering, forgetting, and deliberate memory suppression. </span><sup data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">18</span></sup><span data-dcnode-id="896" instrument_node=""> The danger of forgetting is exemplified for Sethe on the following page as she describes a moment of walking home: "Nothing else would be in her mind...and suddenly there was Sweet Home rolling, rolling, rolling out before her eyes, and although there was not a leaf on that farm that did not make her want to scream, it rolled itself out before her in shameless beauty. It never looked as terrible as it was and it made her wonder if hell was a pretty place too." </span><sup data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">19</span></sup><span data-dcnode-id="893" instrument_node=""> This is one of my favorite passages to examine and analyze with a class because there is so much power in the use of figurative language, repetition, and allusion, which connects to the characterization of Sethe and the theme of memory.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Breaking down these early passages in the classroom is an important and valid use of time because it shows the students the depth of analysis that is possible while also giving them the benefit of working through it together, even when following a teacher's modeling. It is critical that students understand the importance of flashback as more than just a literary device, but a stylistic element that informs the structure, characterization, and meaning of the novel as a whole.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="885"><i data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Magical Realism</span></i></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="883" instrument_node="">In addition to the subtle flashback, the fifth sentence of the novel also sets up one of the key writing styles, magical realism. "Magic realist novels and stories have, typically, a strong narrative drive, in which the recognizably realistic merges with the unexpected and the inexplicable and in which elements of dreams, fairy story, or mythology combine with the everyday, often in a mosaic or kaleidoscopic pattern of refraction and recurrence." </span><sup data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">20</span></sup><span data-dcnode-id="880" instrument_node=""> It becomes clear in the fifth sentence from the text that while the house is the vessel for supernatural occurrences, the creator of the disturbances is the venomous baby, as displayed through the disconcerting image of the "two tiny hand prints...in the cake." This style is reinforced on the following page when "Sethe and Denver decided to end the persecution by calling forth the ghost that tried them so. Perhaps a conversation, they thought, an exchange of views or something would help. So they held hands and said, 'Come on. Come on. You may as well just come on.' The sideboard took a step forward but nothing else did." </span><sup data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">21</span></sup><span data-dcnode-id="877" instrument_node=""> In this passage, the two characters make a conscious decision to communicate with the spirit that they believe is causing "the outrageous behavior of that place," and it is treated matter-of-factly, without any special introduction. "When Morrison recreates these elements in her art, she purposely departs from consensus reality, not to foreground the supernatural as a unique expression of the black community, but as a way to signify the difference between culturally imposed ways of seeing. Morrison's assumption in her writing, her consensus reality, is very different...because the supernatural does exist [and] presumes a truth that is unassailable." </span><sup data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">22</span></sup><span data-dcnode-id="874" instrument_node=""> Morrison is not asking the reader to suspend his disbelief; trust in supernatural occurrences is a cultural truth in the African American community and she will not explain or apologize for it.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">It can sometimes be a challenge for students to treat magical realism in the commonplace manner that the author intends; teenagers, not surprisingly, are prone to dramatic interpretations. However, because Morrison has embedded the supernatural from the very first sentence and makes it a common, if complicated, part of the characters' lives, the students are much more likely to develop a way of seeing the supernatural in the way it is meant to be treated. The definition quoted above names "recurrence" as an important element of this style as a way of normalizing it. This is specifically reinforced in this passage in a subtle way, but one that demonstrates Morrison's craft as a writer.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="868" instrument_node="">At the beginning of chapter 8, Denver is basking in the joy that Beloved is exuding. Beloved seems to be delighted to have a physical body and performing with it: "Beloved put her fists on her hips and commenced to skip on bare feet. Denver laughed. 'Now you. Come on,' said Beloved. 'You may as well just come on.'" </span><sup data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">23</span></sup><span data-dcnode-id="865" instrument_node=""> The spoken language here doesn't quite fit, but nor does it stick out as being particularly wrong. The reader has noticed Beloved's language skills developing and the first two fragments seem appropriate, but the last sentence is a developed thought that seems more advanced. In class, I would ask the students about Beloved's use of language here and then point them back to the beginning of chapter 1 and give them the open-ended direction of finding the connection to this extract. Thankfully, the passage appears on the second page, so it doesn't take long for them to find Sethe's original invitation to the ghost form of Beloved (referenced in the paragraph above). The next question is obviously, what does this mean about Beloved and her consciousness? Students then realize that when Beloved's presence in 124 was spiritual, not physical, this proves that she could hear the family and her form of participation was through making objects move or presenting herself as "a pool of red and undulating light." </span><sup data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">24</span></sup><span data-dcnode-id="862" instrument_node=""> It also demonstrates how purposeful Beloved's physical presence is. She does not feel the need to present herself tangibly until Paul D arrives, creates a sense of intimacy with Sethe, fights back against "the screaming house," and gets "rid of the only other company [Denver] had." </span><sup data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">25</span></sup></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="855"><i data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Stream of Consciousness</span></i></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="853" instrument_node="">The technique of entering a character's unfiltered thoughts and following wherever s/he may lead is one of the cornerstones of Modernist and postmodernist literature. My students have already encountered </span><i data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">A Portrait of the Artist as a Young Man</span></i><span data-dcnode-id="850" instrument_node=""> by James Joyce and are usually adept at identifying stream of consciousness passages in </span><i data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Beloved</span></i><span data-dcnode-id="847" instrument_node="">. There are short examples of this throughout the text but the most significant and difficult are the chapters that are from the points of view of Sethe, Denver, and Beloved respectively, and then the chapter that is the marriage of all three voices. One of my favorite aspects of the novel is the way that Morrison prepares the reader for what will happen next, and this is achieved in the final sentence of the nineteenth chapter: "Mixed in with the voices surrounding the house, recognizable but undecipherable to Stamp Paid, were the thoughts of the women of 124, unspeakable thoughts, unspoken." </span><sup data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">26</span></sup><span data-dcnode-id="844" instrument_node=""> At this moment the reader may not exactly know what the next few chapters will hold, but the first line of chapter twenty, "Beloved, she my daughter," does not come as a surprise, and clearly defines Sethe as the speaker. The following chapter belongs to Denver as established through its opening sentence, "Beloved is my sister," a parallel to Sethe's. Students usually do not struggle with these two chapters, but it is chapters 22 that tends to need thorough class discussion and analysis.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="841" instrument_node="">The first sentence of chapter 22 provides some comfort—it creates a parallel to Sethe and Denver and ends in traditional punctuation—but, alas, it is the only such sentence in the chapter. I will now take this opportunity to freely admit that given the chance, I would ask Toni Morrison to explain every word in this chapter. Short of that, however, I begin by reminding students that this is the strongest example of stream of consciousness in the novel for multiple reasons. First, Beloved still speaks like a child; we have seen many examples of this through the text. Children tend to describe things as literally as possible and she wrestles with her lack of language: "how can I say things that are pictures". </span><sup data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">27</span></sup><span data-dcnode-id="838" instrument_node=""> Second, we know that Beloved has a divided consciousness. She is here physically, but having come from the other side, part of her self is still connected to the non-physical world. Beloved laments, "there is no one to want me to say me my name I wait on the bridge because she is under it there is night and there is day". </span><sup data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">28</span></sup><span data-dcnode-id="835" instrument_node=""> Understandably, the "she" that Beloved wants so desperately is Sethe, and this is confirmed through the imagery of Sethe's earrings that she dangled for the baby and that Beloved asks her about in chapter six: "Tell me your diamonds." </span><sup data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">29</span></sup></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">One strategy to increase student confidence in their understanding of the chapter is to ask them to find examples of imagery that they recognize and to establish its context in the stream of consciousness narrative. There are several examples of repetitive imagery from within the chapter, but none is as dominant as "a hot thing," repeated ten times in five pages. It is always its own complete thought, an image connected to but separate from what is around it. Considering Beloved's lack of vocabulary, "a hot thing" strikes me as something dangerous, requiring caution. It seems, though, that the most common reference surrounding "a hot thing" is Sethe—Beloved's mother, a source of love. For example: "her face is my own and I want to be there in the place where her face is and to be looking at it too a hot thing"; "she wants her earrings she wants her round basket I want her face a hot thing"; and perhaps most conclusively, "Sethe's is the face that left me Sethe sees me see her and I see the smile her smiling face is the place for me it is the face I lost she is my face smiling at me doing it at last a hot thing now we can join a hot thing". </span><sup data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">30</span></sup><span data-dcnode-id="827" instrument_node=""> Students want a definitive answer: "What is the hot thing??" I have been accosted at my door, in the hallway, and even while getting out of my car after assigning this chapter.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">One of the best methods I have found for dealing with this difficult passage is structured small group discussion. Offering students some comprehension-based questions, like the imagery that they recognized from earlier in the novel, gives them a boost of confidence. In regards to "a hot thing," I tell them that my teacher's edition of </span><i data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Beloved</span></i><span data-dcnode-id="821" instrument_node=""> just has all of these notes in the margins, and none of them define what "a hot thing" is (the notes, of course, being my own annotations). I admit to having my own theory, but I would like to hear theirs before revealing my own. Despite the lack of a concrete answer, this makes students more comfortable in their own suppositions about the chapter. When they assign meaning to "a hot thing," they must defend their response based on textual support and interpretation, and I have heard some interesting theories. At the end of class, if no one has landed on it, I share my own thoughts: that "a hot thing" is the emotion or relationship that exists between Beloved and Sethe. It is rooted in love, a "hot," powerful, passionate sensation, but it is also tainted with Beloved's anger that Sethe abandoned her. There is a sense of desperation, longing, and control in the image itself and in its repetition.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="816"><i data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Bildungsroman</span></i></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Beloved may seem the obvious choice as the character for whom the novel is a bildungsroman, or coming-of-age novel, but it is actually Denver who rapidly matures and becomes an adult in the year that the text covers (in present tense, spring 1873 to spring 1874). It is a worthwhile activity to have students trace specific moments that showcase Denver's maturation throughout the novel, and what follows is an example of guiding them.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="811" instrument_node="">Morrison does not hide the fact that Denver is practically a woman in the first chapter; we know that it has been eighteen years since Paul D saw Sethe and, he says to Denver, "Last time I saw your mama, you were pushing out the front of her dress," a reference to Sethe's pregnancy. </span><sup data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">31</span></sup><span data-dcnode-id="808" instrument_node=""> It is, however, remarks like Sethe's response that lead the reader to forget Denver's age: "Still is, provided she can get in it." The students I teach are seventeen to eighteen years old, about to enter the world of independence; they cannot imagine either themselves or a peer wanting to crawl into a parent's lap or re-enter the womb. Denver is consistently characterized as being exceptionally childish, even from the first moment she arrives: "the girl who walked down...was round and brown with the face of an alert doll." </span><sup data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">32</span></sup><span data-dcnode-id="805" instrument_node=""> She is also quite jealous of the relationship between Paul D and Sethe, particularly because it creates an intimacy of which she is not a part. Students tend to perceive this as an immature, childish need for attention. Additionally, there is her emotional and seemingly unprovoked outburst that begins with an impudent retort and ends with her "shaking now and sobbing so she could not speak," and lashing out at her mother: "It's not the house! It's us! And it's you!" </span><sup data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">33</span></sup><span data-dcnode-id="802" instrument_node=""> The idea of fighting with a parent is much more realistic to students, but the way in which Denver handles her emotions seems to infantilize her. Sethe's treatment of Denver encourages the reader's interpretation of Denver's immaturity, as well: "Grown don't mean nothing to a mother. A child is a child. They get bigger, older, but grown? What's that supposed to mean? In my heart it don't mean a thing." </span><sup data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">34</span></sup><span data-dcnode-id="799" instrument_node=""> Denver is the only child of four that Sethe has left, so it makes sense that she wants her to stay a child so that she will not leave like her brothers.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="796" instrument_node="">The moment Denver begins to mature hinges on the arrival of the physical Beloved. Denver has been desperate for a companion, especially since Paul D has taken her mother's attention. Once the family takes in this stranger, "Denver tended her, watched her sound sleep, listened to her labored breathing and, out of love and a breakneck possessiveness that charged her, hid like a personal blemish Beloved's incontinence." </span><sup data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">35</span></sup><span data-dcnode-id="793" instrument_node=""> Denver realizes long before Sethe exactly who Beloved is. Once Denver has set boundaries with her mother—"Leave us alone, Ma'am. I'm taking care of her"—Sethe casually wonders where their dog Here Boy is. "'He won't be back,' said Denver. 'How you know?' 'I just know.'" </span><sup data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">36</span></sup><span data-dcnode-id="790" instrument_node=""> The dog has refused to enter the house since the description in the first chapter when Beloved's spirit "picked up Here Boy and slammed him into wall hard enough to break two of his legs and dislocate his eye". </span><sup data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">37</span></sup><span data-dcnode-id="787" instrument_node=""> Denver's mysterious declaration is a good moment to ask students what she knows, and many animal lovers hold a serious grudge against the ghost for harming the dog and quickly remember that painful description in chapter 1. This moment is a strong indication that Denver knows Beloved's true identity and that she is beginning to act her age. Despite the fact that Beloved is technically older than she is (twenty to her eighteen), she senses that Beloved is developmentally the age she was at her death. This allows Denver to care for and protect Beloved, though still in an immature, possessive way.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="784" instrument_node="">Denver's final test of maturity comes in part three of the novel. Once Sethe realizes that Beloved is her child returned to her, "the two of them cut Denver out of the games." </span><sup data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">38</span></sup><span data-dcnode-id="781" instrument_node=""> Sethe is consumed with pleasing Beloved and Beloved refuses to be pleased. The relationship between them becomes dangerous and Denver realizes that "[s]he would have to leave the yard; step off the edge of the world, leave the two behind and go ask somebody for help." </span><sup data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">39</span></sup><span data-dcnode-id="778" instrument_node=""> Asking students why the language in this quotation is so powerful is a good strategy for understanding Denver's characterization and maturity. 124 has been her world because it has been her insulation from the judgment of others about her family, but for the first time, she is not concerned with herself. She is worried about her mother and her sister and is willing to put her own desire, to stay in the confines of the world she knows, aside so that she can save them all. Denver leaves the house and goes to the one person she knows outside of 124: her former teacher, Lady Jones. Denver admits she is seeking work because her mother is ill. "'Oh, baby,' said Mrs. Jones. 'Oh, baby.' She did not know it then, but it was the word 'baby,' said softly and with such kindness, that inaugurated her life in the world as a woman." </span><sup data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">40</span></sup><span data-dcnode-id="775" instrument_node=""> Students usually recognize the significance of this moment and I like to ask about the juxtaposition of word choice and impact. Why does the word "baby" make Denver a woman? Is it simply for irony's sake? Rather than the word itself, it is the tone of sympathy that accompanies it that leads Denver to maturity.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">Denver's childish loneliness and possessiveness are swept away in this moment, and she realizes that she does not have to be alone in this struggle. The welcoming and support of the women in her community, by way of Mrs. Jones, are what allows her to achieve womanhood. She displays her maturity for Paul D once Beloved is gone. In a conversation about who or what Beloved really was, she proclaims "I have my own" opinion, and Paul D acknowledges that Denver can no longer be treated like a child. It is her final words to him, however, that have the strongest impact: "Paul D, you don't have to stay 'way, but be careful how you talk to my ma'am, hear?" </span><sup data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">41</span></sup><span data-dcnode-id="769" instrument_node=""> Denver clearly establishes that she is responsible for her mother, reversing the care relationship that has been the basis of the novel. She lets Paul D know that he is welcome as long as he is cautious, making Sethe the child that needs comfort. That Denver is now capable of unselfishly caring for another is strong evidence that her journey into womanhood is complete.</span></p><span data-dcnode-id="767" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="765" href="#top"><img alt="to top" border="0" data-dcnode-id="766" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Narrative Truth, Historical Truth</span></h2><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">Storytelling is supposed to be fictional, creative, and fantastical. Morrison begins her Nobel Prize lecture with the following: "Narrative has never been merely entertainment for me. It is, I believe, one of the principal ways in which we absorb knowledge. I hope you will understand, then, why I begin these remarks with the opening phrase of what must be the oldest sentence in the world, and the earliest one we remember from childhood: "Once upon a time...". </span><sup data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">42</span></sup><span data-dcnode-id="758" instrument_node=""> Those last four words are the cue that we are about to enter a world of fantasy, simultaneously connected to and removed from reality. There must be, however, some form of personal or universal truth to give a story its power and credibility. The characters and world of 124 Bluestone Road are entirely fictional but are rooted in multiple types of historical truth that command the reader to engage and wrestle with the repercussions of the stories that have been told to and about them, and which they tell to each other and to the reader.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="755" instrument_node="">Slavery and its horrors have been well-documented, even prior to its legal end in the United States a century and a half ago. There are firsthand accounts from Frederick Douglass and Linda Brent (AKA Harriet Jacobs) that speak to the violence and fear that slaves experienced even while seeking to find ways to free themselves from their bondage. Slavery has been reimagined in a variety of fictional works throughout the twentieth century; </span><i data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">The Known World</span></i><span data-dcnode-id="752" instrument_node=""> by Edward P. Jones is a recent addition to the canon that adds a unique perspective—the little-acknowledged fact that some blacks owned slaves. Part of the powerful narrative truth in </span><i data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Beloved</span></i><span data-dcnode-id="749" instrument_node=""> stems from the historical truth of slavery, and in particular, the memory of and psychological trauma inflicted by slavery. I should acknowledge my teaching context: I am from and teach in the South (North Carolina). Despite the long separation of years and generations, there continues to be a different treatment of the history of slavery in states that fought against the Federal Army in the Civil War. I believe this to be true based on conversations with colleagues who were raised in Massachusetts or Indiana. Some students that I teach acknowledge coming from families that owned slaves. Even now, this is delicate territory.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">I have found one of the novel's strengths to be the focus on the psychological, rather than physical, scars left on the characters. A strong example to use with students that iterates the dominance of the psychological over the physical is in the first chapter as Sethe explains to Paul D what she means when she says, "I got a tree on my back." </span><sup data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">43</span></sup><span data-dcnode-id="743" instrument_node=""> This off-hand remark intrigues Paul D, but for Sethe, the real story is what came prior to the whipping that produced the tree-like scar. Sethe tells him that she was still nursing her third child while pregnant with the fourth and that "those boys came in there and took my milk. Held me down and took it." This is a physical desecration on par with rape—to be restrained and suckled like an animal—but for Sethe, it violates her ability to be a mother to her child and that is what continues to haunt her. She tells her mistress what happened and while the white owner's "eyes rolled out tears, [t]hem boys found out I told em. Schoolteacher made one open up my back and when it closed it made a tree." As Paul D hears the story, he cannot believe that a pregnant woman was whipped: "They used cowhide on you? They beat you and you was pregnant?" Sethe repeats, "And they took my milk!" Many students will react similarly to Paul D; they will not fail to recognize the physical and even emotional toll that this event has on Sethe, but a teacher's guidance through the psychological territory will help them understand the heavy maternal burden that she continues to carry.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="740" instrument_node="">Perhaps the most significant historical reality in the novel is not addressed until the sixteenth chapter, in which the reader finally learns how Sethe's two year old child was killed. The background of the murder is now one of the more famous historical connections in modern literature. As Morrison writes in the foreword to </span><i data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Beloved</span></i><span data-dcnode-id="737" instrument_node="">, "A newspaper clipping in </span><i data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The Black Book</span></i><span data-dcnode-id="734" instrument_node=""> (one of the books I had published back when I had a job) summarized the story of Margaret Garner, a young mother who, having escaped slavery, was arrested for killing one of her children (and trying to kill the others) rather than let them be returned to the owner's plantation." </span><sup data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">44</span></sup><span data-dcnode-id="731" instrument_node=""> While Margaret Garner's story was sensationalized and well-known at the time, it was forgotten over the years. When I first read the novel, I had no idea of the historical reality or the parallels that Morrison built into the narrative.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="728" instrument_node="">It is of particular interest from a writer's perspective that, in the foreword, Morrison goes on to say, "The historical Margaret Garner is fascinating, but, to a novelist, confining...So I would invent her thoughts, plumb them for a subtext that was historically true in essence, but not strictly factual." Morrison, however, embeds several historical truths from Margaret Garner's story in the novel that lend a tone of gravity. Sethe and Denver do not reveal last names, but Paul D introduces himself as "Paul D Garner," after the masters at Sweet Home. </span><sup data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">45</span></sup><span data-dcnode-id="725" instrument_node=""> In Levi Coffin's autobiography, published in 1876, the man hailed as the "President of the Underground Railroad" wrote that "no case...attracted more attention and aroused deeper interest and sympathy that the case of Margaret Garner." </span><sup data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">46</span></sup><span data-dcnode-id="722" instrument_node=""> He goes on to give details about the escape, including the fact that the slaves were "living in Kentucky, several miles back from the [Ohio R]iver" and that they planned to escape to a free state, which would be Ohio. Sweet Home is in Kentucky and Sethe gives birth to Denver on the banks of the Ohio River before being ferried across by Stamp Paid, where she is reunited with her three other children, who are already with Baby Suggs. Once "the fugitives were surrounded by pursuers, Margaret Garner, seeing that their hopes of freedom were in vain, seized a butcher knife that lay on the table, and with one stroke cut the throat of her little daughter, whom she probably loved the best." </span><sup data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">47</span></sup><span data-dcnode-id="719" instrument_node=""> There is no exact parallel of language in Morrison's novel, but when the slavecatchers enter the woodshed, Sethe is "holding a blood-soaked child to her chest" so "her head wouldn't fall off." </span><sup data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">48</span></sup><span data-dcnode-id="716" instrument_node=""> At the end of the novel when Beloved has disappeared again and Sethe has taken to her bed, much like Baby Suggs, she says, "[Beloved] was my best thing." </span><sup data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">49</span></sup></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">These are all powerful connections that students are fully capable of perceiving, and it truly deepens the significance of the novel. The historical truth is so strongly intertwined with the narrative truth that the impact is compounded, not in any way lessened, because it is a work of fiction. After students have read this chapter, they come into class, expecting an immediate discussion. Many of them have clearly formed judgments about the justice of Sethe's decision. As students walk through the door, I hand them the passage from </span><i data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Reminiscences</span></i><span data-dcnode-id="708" instrument_node=""> with directions to read the selection and write a response to two questions prior to discussion: Paragraph 1) What similarities are present between Margaret and Sethe? Does reading this change your opinion of Sethe at all?</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">Paragraph 2) How do you personally deal with the situation in ch. 16, morally and/or ethically. (Philosophically, 'morality' speaks to the character, actions, and/or values of an individual; 'ethics' is the set of standards that governs a particular group.) The discussion that follows is more serious and grounded in the text, which respects the historical reality of the situation (see the Appendix for the text from </span><i data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Reminiscences</span></i><span data-dcnode-id="702" instrument_node="">).</span></p><span data-dcnode-id="700" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="698" href="#top"><img alt="to top" border="0" data-dcnode-id="699" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="696" id="h1num-6"><span data-dcnode-id="697" instrument_node="">Strategies and Activities</span></h1><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The reading pace of the novel is, I believe, critical to guiding students and keeping them engaged. I generally expect my students to read at least 25 pages a night, but a text this dense requires a bit more time. There are important moments that students need to read about prior to one class period and there are others that necessitate a bit of time and space between them. My chapter-chunking suggestions for a class that meets every other day are as follows: 1; 2-3; 4-7; 8-9; 10-12; 13-15; 16-18; 19; 20-23; 24-25; 26-28.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Teachers have developed many different methods for checking that students have read and tried to understand the text. While many upper-level teachers check text annotations, I ask students to create a reader's journal. For the journal, students must pull a designated number of quotations from the chapters assigned and respond to them. The quotations that they choose should illuminate some significant element: plot development, symbol, characterization, motif/theme, writing technique/style, etc. They are reminded that their responses are NOT a summary or paraphrase but an explication of meaning. Below is the example that I give to my students:</span></p><span data-dcnode-id="689" instrument_node="">
</span><ul class="cuOld" data-dcnode-id="678"><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">QUOTE: "The plash of water, the sight of her shoes and stocking awry on the path where she had flung them; or Here Boy lapping in the puddle near her feet, and suddenly there was Sweet Home rolling, rolling, rolling out before her eyes, and although there was not a leaf on that farm that did not make her want to scream, it rolled itself out before her in shameless beauty. It never looked as terrible as it was and it made her wonder if hell was a pretty place too." (7)</span></li><span data-dcnode-id="685" instrument_node="">
</span><li data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">RESPONSE: The string of clauses at the beginning of this long sentence reinforces the idea that </span><i data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">anything</span></i><span data-dcnode-id="681" instrument_node=""> can trigger a painful flashback to the plantation where Sethe was a slave; the length of the sentence also shows how her present life is inextricably linked to her past. The repetition of the word "rolling" seems to emphasize how unstoppable a force memory is—like a bulldozer. There's also obvious irony in the name "Sweet Home;" while it was beautiful, just the memory of the sight causes her pain and invokes an allusion to hell. While most people think of "home sweet home" as a tired but accurate cliché, this is obviously an example of harsh discrepancy between naming and reality, an important theme. I wonder what other elements in the novel are not what they seem?</span></li><span data-dcnode-id="679" instrument_node="">
</span></ul><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">I have tried to embed analytical modeling in the previous pages as a primary strategy of working through the text. In addition, however, small group work can be extremely effective in working through multiple chapters, improving comprehension, and encouraging students to think independently about interpretation and analysis.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Below are questions that students address in small groups regarding chapter one. The questions are a mix of comprehension and interpretation, and students must provide evidence for all of their answers, which requires them to interact closely with the text.</span></p><span data-dcnode-id="671" instrument_node="">
</span><ol class="cuOld" data-dcnode-id="654"><span data-dcnode-id="670" instrument_node="">
</span><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Who took the iron from Sethe's eyes? How is that character associated with the tree on her back?</span></li><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">What makes Sethe choose Halle over the other Sweet Home men?</span></li><span data-dcnode-id="664" instrument_node="">
</span><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">What does the passage on p. 14 add to Sethe's characterization? From whose perspective is it?</span></li><span data-dcnode-id="661" instrument_node="">
</span><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">What does the audience learn about the ghost in this chapter, and what is each person's relationship to the ghost (Sethe, Denver, Paul D)?</span></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">How does Denver feel when meeting Paul D? What makes her feel this way? Interpret the following: "Denver burst in from the keeping room, terror in her eyes, a vague smile on her lips" (21).</span></li><span data-dcnode-id="655" instrument_node="">
</span></ol><span data-dcnode-id="653" instrument_node="">
