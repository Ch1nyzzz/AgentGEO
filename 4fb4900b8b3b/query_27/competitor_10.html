</span><div class="post-content" data-dcnode-id="367"><span data-dcnode-id="613" instrument_node="">
</span><div class="fusion-fullwidth fullwidth-box fusion-builder-row-1 hundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="369" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;margin-bottom: 0px;margin-top: 0px;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row" data-dcnode-id="370"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-0 fusion_builder_column_1_6 1_6 fusion-one-sixth fusion-column-first" data-dcnode-id="610" style="width:16.666666666667%;width:calc(16.666666666667% - ( ( 4% + 4% ) * 0.16666666666667 ) );margin-right: 4%;margin-top:0px;margin-bottom:20px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="611" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-clearfix" data-dcnode-id="612"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-1 fusion_builder_column_2_3 2_3 fusion-two-third" data-dcnode-id="374" style="width:66.666666666667%;width:calc(66.666666666667% - ( ( 4% + 4% ) * 0.66666666666667 ) );margin-right: 4%;margin-top:-18%;margin-bottom:50px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="375" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;background-color:#ffffff;padding: 5% 8% 5% 8%;"><div class="fusion-sep-clear" data-dcnode-id="609"></div><div class="fusion-separator fusion-full-width-sep" data-dcnode-id="608" style="margin-left: auto;margin-right: auto;margin-top:20px;margin-bottom:10px;width:100%;"></div><div class="fusion-sep-clear" data-dcnode-id="607"></div><div class="fusion-text fusion-text-1" data-dcnode-id="600"><p data-dcnode-id="605" style="text-align: center; font-size: 15px;"><span data-dcnode-id="606" instrument_node="">Michelle Simmons | January 2019</span></p><span data-dcnode-id="604" instrument_node="">
</span><h1 data-dcnode-id="602" style="text-align: center; font-family: EB Garamond; font-size: 72px; text-transform: none;"><span data-dcnode-id="603" instrument_node="">African Storytelling</span></h1><span data-dcnode-id="601" instrument_node="">
</span></div><div class="fusion-sep-clear" data-dcnode-id="599"></div><div class="fusion-separator" data-dcnode-id="597" style="margin-left: auto;margin-right: auto;margin-top:-5%;margin-bottom:50px;width:100%;max-width:8%;"><div class="fusion-separator-border sep-single sep-solid" data-dcnode-id="598" style="border-color:#000000;border-top-width:3px;"></div></div><div class="fusion-sep-clear" data-dcnode-id="596"></div><div class="fusion-text fusion-text-2" data-dcnode-id="428" style="text-transform:none;"><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Recently, my class read and discussed a text that I felt had so many Arts Integration possibilities. My brain was brewing with ideas as the week progressed. Unfortunately, due to pacing, there was no way for me to extend this lesson further. I cannot wait to redo this lesson next year and incorporate these ideas. However, it could be the perfect addition to your classroom next month during Black History Month.</span></p><span data-dcnode-id="593" instrument_node="">
</span><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">African Storytelling</span></h3><span data-dcnode-id="590" instrument_node="">
</span><ul data-dcnode-id="541"><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="588" instrument_node="">Text: </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Time-Drums-Kim-L-Siegelson/dp/1620143097/ref%3Dsr_1_1%3Fie%3DUTF8%26qid%3D1541812394%26sr%3D8-1%26keywords%3Din%2Bthe%2Btime%2Bof%2Bthe%2Bdrums"><em data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">In the Time of the Drums </span></em><span data-dcnode-id="585" instrument_node="">by Kim L. Siegelson</span></a><span data-dcnode-id="583" instrument_node="">
</span><ul data-dcnode-id="545"><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="559"><span data-dcnode-id="581" instrument_node="">Supplemental Text Ideas:
</span><ul data-dcnode-id="561"><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="566"><span data-dcnode-id="579" instrument_node="">Nonfiction texts
</span><ul data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">early African slave trade from Europe</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">importance of storytelling in these African cultures</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Ibo tribe in Africa</span></li><span data-dcnode-id="569" instrument_node="">
</span></ul><span data-dcnode-id="567" instrument_node="">
</span></li><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">My school’s book series had a wonderful nonfiction article called “Storytelling in the Time of Slavery”</span></li><span data-dcnode-id="562" instrument_node="">
</span></ul><span data-dcnode-id="560" instrument_node="">
</span></li><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="550"><span data-dcnode-id="557" instrument_node="">Age: 4</span><sup data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">th</span></sup><span data-dcnode-id="554" instrument_node=""> Grade – 6</span><sup data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">th</span></sup><span data-dcnode-id="551" instrument_node=""> Grade</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">ELA Standards Addressed: Theme, Inference, Figurative Language, Character Traits/Actions</span></li><span data-dcnode-id="546" instrument_node="">
</span></ul><span data-dcnode-id="544" instrument_node="">
</span></li><span data-dcnode-id="542" instrument_node="">
</span></ul><span data-dcnode-id="540" instrument_node="">
</span><h3 data-dcnode-id="537"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Building Background</span></strong></h3><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="535" instrument_node="">Students should have some basic knowledge of slavery and its place in the south. While my students were familiar with slavery, many were unaware of the fact that Europeans first transported enslaved people to the Americas when first settling. So, we spent some time discussing how the Columbian Exchange brought trade to and from Europe and the Americas. This trade included enslaved Africans. </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.khanacademy.org/humanities/us-history/precontact-and-early-colonial-era/old-and-new-worlds-collide/v/the-columbian-exchange"><span data-dcnode-id="534" instrument_node="">(Khan Academy has a helpful resource on the Columbian Exchange.)</span></a></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="530" instrument_node="">We also spent time discussing the different types of folktales that were told by enslaved people. Such folktales included trickster tales and freedom tales. My students loved hearing the </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3De0Oq8F77pT8"><span data-dcnode-id="529" instrument_node="">Brer Rabbit story</span></a><span data-dcnode-id="527" instrument_node=""> which is a popular trickster style folktale! Anansi the Spider is also a very popular folklore character. </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DaPjlpAPdNzY"><span data-dcnode-id="526" instrument_node="">The People Could Fly</span></a><span data-dcnode-id="524" instrument_node=""> is a wonderful example of a freedom tale.</span></p><div class="advads-post-content" data-dcnode-id="519" id="advads-1991340389"><div data-dcnode-id="520" id="advads-741601709" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 20px; margin-bottom: 40px; "><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artsintegration.com/accelerator"><img alt="" class="lazyautosizes lazyloaded" data-dcnode-id="522" data-orig-sizes="(max-width: 828px) 100vw, 828px" data-orig-src="https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER.jpg" data-sizes="auto" data-srcset="https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-200x76.jpg 200w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-300x114.jpg 300w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-400x152.jpg 400w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-600x228.jpg 600w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-768x292.jpg 768w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-800x304.jpg 800w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER.jpg 828w" height="315" sizes="497px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER.jpg&amp;raw" srcset="https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-200x76.jpg 200w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-300x114.jpg 300w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-400x152.jpg 400w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-600x228.jpg 600w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-768x292.jpg 768w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER-800x304.jpg 800w, https://artsintegration.com/wp-content/uploads/2018/08/ACCELERATOR-BANNER.jpg 828w" style="display: inline-block;" width="828"></a></div></div><span data-dcnode-id="518" instrument_node="">
</span><h3 data-dcnode-id="515"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Let’s begin</span></strong></h3><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">To begin this lesson, I read the story aloud to students. I have them write questions down as I read the text. These questions can be anything that confuses the students or they want to know more about. The students then all read their questions and we divide them into categories: Inference, In the Text, and Look it Up.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">After we divide our questions. I choose the questions that will lead to the best discussion. The students use the text to give me text evidence even for their inferences. We have built on this Socratic style seminar all year and my students have become pros at it.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">They can help each other with their thinking, build on thoughts, and piggyback questions. The questions and discussions this story brought out were astounding to me. I teach a very low achieving inclusion classroom, but my students were questioning and debating motives of characters and theme.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">The next day as we read the story, the students had to mark where Mentu, the main character, was strong versus where he was not strong. This led the student deeper into character analysis and the theme.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">As we continued our discussions and journaling throughout the week I couldn’t help but feel this lesson was screaming for Arts Integration. Below are the ideas I will incorporate next year.</span></p><span data-dcnode-id="499" instrument_node="">
</span><div data-dcnode-id="498" id="om-sik66zceqrjeklyeamiu-holder"></div><span data-dcnode-id="497" instrument_node="">
</span><span data-dcnode-id="494" instrument_node="">
</span><h3 data-dcnode-id="491"><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Arts Integration Incorporation</span></strong></h3><span data-dcnode-id="490" instrument_node="">
</span><h4 data-dcnode-id="487"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Visual Art</span></strong></h4><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="485" instrument_node="">One of the things I love about African culture is the art that this group of people produces. It is some of the most vibrant and beautiful in the world. </span><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">In the Time of the Drums</span></em><span data-dcnode-id="482" instrument_node=""> has magnificent artwork by Brian Pinkney. These illustrations are hauntingly beautiful and tell a story on their own. This leaves you room for further discussion on how the pictures impact the story.</span></p><span data-dcnode-id="480" instrument_node="">
</span><ul data-dcnode-id="472"><span data-dcnode-id="479" instrument_node="">
</span><li data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">Another visual art direction I want to take is studying African Masks, specifically those of the Ibo people. African masks should be relevant to students now thanks to the </span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Black Panther</span></em><span data-dcnode-id="475" instrument_node=""> Students could create their own masks. This would also be a place where you could tie in math curriculum. Symmetry and geometry could be blended to create masks with interesting shapes and design. Colors could be used to show mood. The possibilities are limitless.</span></li><span data-dcnode-id="473" instrument_node="">
</span></ul><span data-dcnode-id="471" instrument_node="">
</span><h4 data-dcnode-id="468"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Drama</span></strong></h4><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Storytelling is a beautiful, often forgotten, art. This story focuses so much on the importance of oral tradition and carrying on culture that it is really a shame I did not have time to do it justice.</span></p><span data-dcnode-id="464" instrument_node="">
</span><ul data-dcnode-id="453"><span data-dcnode-id="463" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="462" instrument_node="">The ArtsIntegration.com site has so many resources on storytelling, all it takes is a simple </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artsintegration.com/%3Fs%3Dstorytelling"><span data-dcnode-id="461" instrument_node="">search</span></a><span data-dcnode-id="459" instrument_node="">.</span></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Use the above videos of the folktales to show examples of how a good storyteller incorporates fluency, inflection, and prosody.</span></li><span data-dcnode-id="454" instrument_node="">
</span></ul><span data-dcnode-id="452" instrument_node="">
</span><h4 data-dcnode-id="449"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Music</span></strong></h4><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">In the story, the people communicated with drums. This is the perfect segue way into a music unit on African drums.</span></p><span data-dcnode-id="445" instrument_node="">
</span><ul data-dcnode-id="433"><span data-dcnode-id="444" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="443" instrument_node="">Check out this past lesson: </span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artsintegration.com/2015/10/27/west-african-drumming-for-elementary-classroom-teachers/"><span data-dcnode-id="442" instrument_node="">West African Drumming for Elementary Classroom Teachers</span></a></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="435"><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.commonlit.org/"><span data-dcnode-id="438" instrument_node="">Commonlit.org</span></a><span data-dcnode-id="436" instrument_node=""> has a wonderful article titled “Move to the Beat” that talks about the importance of drumming in Africa. This would be a great way to build background on the topic.</span></li><span data-dcnode-id="434" instrument_node="">
</span></ul><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The African culture, especially the stories, are ones that need to be cherished and passed on. My kids fell in love with Mentu and Twi and I know yours will too! Plan accordingly so that you can do this story and culture justice!</span></p><span data-dcnode-id="429" instrument_node="">
</span></div><div class="fusion-sep-clear" data-dcnode-id="427"></div><div class="fusion-separator fusion-full-width-sep" data-dcnode-id="426" style="margin-left: auto;margin-right: auto;margin-top:20px;margin-bottom:20px;width:100%;"></div><div class="fusion-sep-clear" data-dcnode-id="425"></div><div class="fusion-text fusion-text-3" data-dcnode-id="415"><p data-dcnode-id="423" style="text-align: center;"><span data-dcnode-id="424" instrument_node="">
</span></p><div data-dcnode-id="422" id="om-gcgbjkvurdlotlpcvd0r-holder"></div><span data-dcnode-id="421" instrument_node="">
</span><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="417"></p><span data-dcnode-id="416" instrument_node="">
</span></div><div class="fusion-sep-clear" data-dcnode-id="414"></div><div class="fusion-separator fusion-full-width-sep" data-dcnode-id="413" style="margin-left: auto;margin-right: auto;margin-top:20px;margin-bottom:20px;width:100%;"></div><div class="fusion-sep-clear" data-dcnode-id="412"></div><div class="fusion-sep-clear" data-dcnode-id="411"></div><div class="fusion-separator fusion-full-width-sep" data-dcnode-id="409" style="margin-left: auto;margin-right: auto;margin-top:20px;margin-bottom:20px;width:100%;"><div class="fusion-separator-border sep-single sep-solid" data-dcnode-id="410" style="border-color:#919191;border-top-width:1px;"></div></div><div class="fusion-sep-clear" data-dcnode-id="408"></div><div class="fusion-widget-area fusion-widget-area-1 fusion-content-widget-area" data-dcnode-id="377"><div class="widget fusion-author-widget" data-dcnode-id="379" id="fusion_author-widget-2"><div class="heading" data-dcnode-id="403"><h4 class="widget-title" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">About the Author</span></h4></div><span data-dcnode-id="402" instrument_node=""> </span><div class="fusion-author-widget-content" data-dcnode-id="381"><span data-dcnode-id="401" instrument_node="">
