div class="css-15ma02v e5gjibv1" data-dcnode-id="1592"><span class="css-v2qkib e5gjibv3" data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Meet Grammar Coach</span></span><a data-dcnode-id="1597" data-ensure-webtrack="true" data-linkid="hcgfa1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/grammarcoach%3Futm_source%3Ddictionary%26utm_medium%3Dreferral%26utm_campaign%3Ddserp"><img alt="Write or paste your essay, email, or story into Grammar Coach and get grammar help" class="css-s68mbi e5gjibv4" data-dcnode-id="1598" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/assets/grammar-coach-ad-mobile-a128a04f44d64344c602abb573ebcf5e.png&amp;raw"></a><a class="css-5ino4p e1bz1yeo0" data-dcnode-id="1593" data-ensure-webtrack="true" data-linkid="x15n6h" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/grammarcoach%3Futm_source%3Ddictionary%26utm_medium%3Dreferral%26utm_campaign%3Ddserp"><span data-dcnode-id="1596" instrument_node="">Improve Your Writing</span><span data-dcnode-id="1594" instrument_node=""> </span></a></div><div class="css-10s0txy e5gjibv0" data-dcnode-id="1582"><div class="css-1gtk57n e5gjibv2" data-dcnode-id="1585"><span class="css-v2qkib e5gjibv3" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Meet Grammar Coach</span></span><a class="css-5ino4p e1bz1yeo0" data-dcnode-id="1586" data-ensure-webtrack="true" data-linkid="x15n6h" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/grammarcoach%3Futm_source%3Ddictionary%26utm_medium%3Dreferral%26utm_campaign%3Ddserp"><span data-dcnode-id="1589" instrument_node="">Improve Your Writing</span><span data-dcnode-id="1587" instrument_node=""> </span></a></div><a data-dcnode-id="1583" data-ensure-webtrack="true" data-linkid="hcgfa1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/grammarcoach%3Futm_source%3Ddictionary%26utm_medium%3Dreferral%26utm_campaign%3Ddserp"><img alt="Write or paste your essay, email, or story into Grammar Coach and get grammar help" class="css-s68mbi e5gjibv4" data-dcnode-id="1584" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/assets/grammar-coach-ad-desktop-d581d346a326fb2fb4bdb16af8853045.png&amp;raw"></a></div></section><div data-dcnode-id="1580" data-wknd-infeed-div="true"></div><section class="css-1gd5wt3 e9x2bts1" data-dcnode-id="1577"><div data-dcnode-id="1579" data-wknd-infeed-div="true"></div><div data-dcnode-id="1578" data-wknd-infeed-div="true"></div></section><div class="css-1avshm7 e16867sm0" data-dcnode-id="1539"><h2 class="css-wkbkqh e1cxe2lc0" data-dcnode-id="1573"><span data-dcnode-id="1576" instrument_node="">Words nearby </span><span class="css-1yi3rlr e14wda90" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">figurative language</span></span></h2><div class="css-1qy26rb e14wda93" data-dcnode-id="1540"><a class="css-11g4mt0 e14wda91" data-dcnode-id="1571" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figurante"><span data-dcnode-id="1572" instrument_node="">figurante</span></a><span data-dcnode-id="1570" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1568" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figurate"><span data-dcnode-id="1569" instrument_node="">figurate</span></a><span data-dcnode-id="1567" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1565" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figurate-number"><span data-dcnode-id="1566" instrument_node="">figurate number</span></a><span data-dcnode-id="1564" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1562" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figuration"><span data-dcnode-id="1563" instrument_node="">figuration</span></a><span data-dcnode-id="1561" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1559" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figurative"><span data-dcnode-id="1560" instrument_node="">figurative</span></a><span data-dcnode-id="1558" instrument_node="">, </span><span class="css-4czqee e14wda92" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">figurative language</span></span><span data-dcnode-id="1555" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1553" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figuratively"><span data-dcnode-id="1554" instrument_node="">figuratively</span></a><span data-dcnode-id="1552" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1550" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figure"><span data-dcnode-id="1551" instrument_node="">figure</span></a><span data-dcnode-id="1549" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1547" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figure-and-ground"><span data-dcnode-id="1548" instrument_node="">figure and ground</span></a><span data-dcnode-id="1546" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1544" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figured"><span data-dcnode-id="1545" instrument_node="">figured</span></a><span data-dcnode-id="1543" instrument_node="">, </span><a class="css-11g4mt0 e14wda91" data-dcnode-id="1541" data-linkid="lno2pu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figured-bass"><span data-dcnode-id="1542" instrument_node="">figured bass</span></a></div></div><div data-dcnode-id="1538" data-wknd-infeed-div="true"></div><div class="css-k6l28 ejtq9h60" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Dictionary.com Unabridged
Based on the Random House Unabridged Dictionary, © Random House, Inc. 2022</span></div><section class="css-8qz8ia e1md2px10" data-dcnode-id="441"><div class="css-1avshm7 e16867sm0" data-dcnode-id="672" id="editors-notes-section-0"><section data-dcnode-id="673"><div class="css-1jca34l e16ok0li0" data-dcnode-id="1534"><span class="css-kz42jn eij7bpl0" color="#FFFFFF" data-dcnode-id="1535"></span></div><div class="css-1emz62z e16ok0li1" data-dcnode-id="1530"><div class="css-1yvsuaf e1mx64vy0" data-dcnode-id="1531"><h2 class="css-7yvrdt" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">MORE ABOUT FIGURATIVE LANGUAGE</span></h2></div></div><div class="css-157n90t emmt3bm1" data-accordion="true" data-dcnode-id="1453" data-expanded="true"><div class="css-16t89lr emmt3bm0" data-dcnode-id="1518"><h2 class="e16ok0li2 css-moprp6" data-dcnode-id="1521"><span data-dcnode-id="1522"><span data-dcnode-id="1529" instrument_node="">What does&nbsp;</span><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">figurative</span></em><span data-dcnode-id="1526" instrument_node="">&nbsp;</span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">language</span></em><span data-dcnode-id="1523" instrument_node=""> mean?</span></span></h2><button class="css-16wonnu emmt3bm2" data-accordion-button="true" data-ci-target="editornotes-accordion" data-dcnode-id="1519" type="button"><span class="css-5mye9p eij7bpl0" data-dcnode-id="1520"></span></button></div><div data-accordion-content="true" data-dcnode-id="1454"><p class="css-u2dcbh e12tjd8f0" data-dcnode-id="1517" style="font-size:16px;padding-right:24px"></p><p data-dcnode-id="1510"><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Figurative language</span></em><span data-dcnode-id="1514" instrument_node=""> is language that’s intended to create an image, association, or other effect in the mind of the listener or reader that goes beyond the </span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/literal"><span data-dcnode-id="1513" instrument_node="">literal</span></a><span data-dcnode-id="1511" instrument_node=""> meaning or expected use of the words involved.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1508" instrument_node="">For this reason, the word </span><em data-dcnode-id="1505"><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figurative"><span data-dcnode-id="1507" instrument_node="">figurative</span></a></em><span data-dcnode-id="1504" instrument_node=""> is often thought of as the opposite of </span><em data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">literal</span></em><span data-dcnode-id="1501" instrument_node="">, which refers to the strict meaning of words. For example, the literal meaning of </span><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">it stinks</span></em><span data-dcnode-id="1498" instrument_node=""> is “it smells bad.” The </span><em data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">figurative</span></em><span data-dcnode-id="1495" instrument_node=""> meaning of </span><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">it stinks</span></em><span data-dcnode-id="1492" instrument_node=""> is “it’s terrible.”</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1465"><em data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Figurative language</span></em><span data-dcnode-id="1487" instrument_node=""> uses </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/figure-of-speech"><span data-dcnode-id="1486" instrument_node="">figures of speech</span></a><span data-dcnode-id="1484" instrument_node="">, which are expressions like </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/metaphor"><span data-dcnode-id="1483" instrument_node="">metaphors</span></a><span data-dcnode-id="1481" instrument_node="">, </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/simile"><span data-dcnode-id="1480" instrument_node="">similes</span></a><span data-dcnode-id="1478" instrument_node="">, </span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/idiom"><span data-dcnode-id="1477" instrument_node="">idioms</span></a><span data-dcnode-id="1475" instrument_node="">, and </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/personification"><span data-dcnode-id="1474" instrument_node="">personification</span></a><span data-dcnode-id="1472" instrument_node="">, among many others. You know what </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/special-effect"><span data-dcnode-id="1471" instrument_node="">special effects</span></a><span data-dcnode-id="1469" instrument_node=""> are in movies, right? Well, </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">figurative language</span></em><span data-dcnode-id="1466" instrument_node=""> is like the special effects of words. (By the way, that last sentence was a simile—but more about that later.)</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1457"><em data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Figurative language</span></em><span data-dcnode-id="1461" instrument_node=""> is used all the time: in poetry and literature for sure, but also in nonfiction writing and everyday speech—just about everywhere words are used. Using </span><em data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">figurative language</span></em><span data-dcnode-id="1458" instrument_node=""> makes the things we say more expressive and more engaging. That’s because it gives us so many ways to express things that we wouldn’t otherwise be able to if we only used words literally.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1455"></p></div></div><div class="css-157n90t emmt3bm1" data-accordion="true" data-dcnode-id="1346" data-expanded="false"><div class="css-16t89lr emmt3bm0" data-dcnode-id="1444"><h2 class="e16ok0li2 css-moprp6" data-dcnode-id="1447"><span data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">Why is&nbsp;</span><em data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">figurative language</span></em><span data-dcnode-id="1449" instrument_node=""> important?</span></span></h2><button class="css-16wonnu emmt3bm2" data-accordion-button="true" data-ci-target="editornotes-accordion" data-dcnode-id="1445" type="button"><span class="css-5mye9p eij7bpl0" data-dcnode-id="1446"></span></button></div><div data-accordion-content="true" data-dcnode-id="1347"><p class="css-u2dcbh e12tjd8f0" data-dcnode-id="1443" style="font-size:16px;padding-right:24px"></p><p data-dcnode-id="1435"><span data-dcnode-id="1442" instrument_node="">It would be hard to get through a day without using </span><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">figurative language.</span></em><span data-dcnode-id="1439" instrument_node=""> We might think about metaphors when we’re writing a story or analyzing a novel, but most of the time we don’t even realize we’re using figures of speech. But we do—a lot, and for good reason. </span><em data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Figurative language</span></em><span data-dcnode-id="1436" instrument_node=""> gets ideas across in ways that wouldn’t otherwise be possible.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node="">Many forms of </span><em data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">figurative language</span></em><span data-dcnode-id="1430" instrument_node=""> connect two separate ideas or things to express a similarity. Others use words in unexpected ways. Here are some of the most common ones:</span></p><span data-dcnode-id="1428" instrument_node="">
</span><ul data-dcnode-id="1383"><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1421"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Metaphor:</span></strong><span data-dcnode-id="1424" instrument_node=""> The applying of a word or phrase to something that’s not literally related in order to suggest a resemblance, as in </span><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">This day is a dumpster fire.&nbsp;</span></em></li><span data-dcnode-id="1420" instrument_node="">
</span><li data-dcnode-id="1408"><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Simile:</span></strong><span data-dcnode-id="1417" instrument_node=""> Like a metaphor, but it spells out the comparison, typically by using the words </span><em data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">like</span></em><span data-dcnode-id="1414" instrument_node=""> or </span><em data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">as</span></em><span data-dcnode-id="1411" instrument_node="">, as in </span><em data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">His arm is like a tree trunk!&nbsp;</span></em></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1401"><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Idiom:</span></strong><span data-dcnode-id="1404" instrument_node=""> An expression whose meaning can’t be understood from the literal meanings of the words that make it up, as in </span><em data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">raining cats and dogs.&nbsp;</span></em></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1394"><strong data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Personification:</span></strong><span data-dcnode-id="1397" instrument_node=""> The applying of human qualities to an animal or object, as in </span><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">My car just screamed in pain.</span></em></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1385"><strong data-dcnode-id="1389"><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/hyperbole"><span data-dcnode-id="1392" instrument_node="">Hyperbole</span></a><span data-dcnode-id="1390" instrument_node="">:</span></strong><span data-dcnode-id="1388" instrument_node=""> An exaggeration used for emphasis, as in </span><em data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">We waited for an eternity.&nbsp;</span></em></li><span data-dcnode-id="1384" instrument_node="">
</span></ul><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1381" instrument_node="">Some </span><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">figurative language</span></em><span data-dcnode-id="1378" instrument_node=""> plays with how certain words or phrases sound. </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/alliteration"><span data-dcnode-id="1377" instrument_node="">Alliteration</span></a><span data-dcnode-id="1375" instrument_node=""> is the repetition of sounds at the beginning of the words in a sequence, as in </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">What wonderful words we wizards wield!</span></em><span data-dcnode-id="1372" instrument_node=""> Sometimes, the sound effect is baked into the word itself. </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/onomatopoeia%3Fs%3Dt"><span data-dcnode-id="1371" instrument_node="">Onomatopoeia</span></a><span data-dcnode-id="1369" instrument_node=""> is the formation of a word that imitates the sound of the thing it refers to, like how </span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">buzz</span></em><span data-dcnode-id="1366" instrument_node=""> sounds like the sound of a bee buzzing.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1363" instrument_node="">These are some of the most commonly used forms of </span><em data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">figurative</span></em><span data-dcnode-id="1360" instrument_node=""> </span><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">language</span></em><span data-dcnode-id="1357" instrument_node="">, but there are many more. And not all forms of </span><em data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">figurative language</span></em><span data-dcnode-id="1354" instrument_node=""> have formal names—there are endless possibilities for using language in creative ways to make it express what you want to express. </span><em data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Figurative language</span></em><span data-dcnode-id="1351" instrument_node=""> isn’t just for literature class. The more ways we can think up to express our ideas, the better.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1348"></p></div></div><div class="css-157n90t emmt3bm1" data-accordion="true" data-dcnode-id="1327" data-expanded="false"><div class="css-16t89lr emmt3bm0" data-dcnode-id="1340"><h2 class="e16ok0li2 css-moprp6" data-dcnode-id="1343"><span data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Did you know ... ?</span></span></h2><button class="css-16wonnu emmt3bm2" data-accordion-button="true" data-ci-target="editornotes-accordion" data-dcnode-id="1341" type="button"><span class="css-5mye9p eij7bpl0" data-dcnode-id="1342"></span></button></div><div data-accordion-content="true" data-dcnode-id="1328"><p class="css-u2dcbh e12tjd8f0" data-dcnode-id="1339" style="font-size:16px;padding-right:24px"></p><p data-dcnode-id="1331"><span data-dcnode-id="1338" instrument_node="">One figure of speech with a fun name is a </span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/synecdoche"><span data-dcnode-id="1337" instrument_node="">synecdoche</span></a><span data-dcnode-id="1335" instrument_node="">. Sometimes, synecdoches use part of something or its material to represent the whole, like when the word </span><em data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">steel</span></em><span data-dcnode-id="1332" instrument_node=""> is used to refer to a sword. They can also use the whole to represent the part, something general to represent something specific, or something specific to represent something general.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1329"></p></div></div><div class="css-157n90t emmt3bm1" data-accordion="true" data-dcnode-id="761" data-expanded="false"><div class="css-16t89lr emmt3bm0" data-dcnode-id="1318"><h2 class="e16ok0li2 css-moprp6" data-dcnode-id="1321"><span data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">What are real-life examples of </span><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">figurative language</span></em><span data-dcnode-id="1323" instrument_node="">?</span></span></h2><button class="css-16wonnu emmt3bm2" data-accordion-button="true" data-ci-target="editornotes-accordion" data-dcnode-id="1319" type="button"><span class="css-5mye9p eij7bpl0" data-dcnode-id="1320"></span></button></div><div data-accordion-content="true" data-dcnode-id="762"><p class="css-u2dcbh e12tjd8f0" data-dcnode-id="1317" style="font-size:16px;padding-right:24px"></p><p data-dcnode-id="1313"><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Figurative language</span></em><span data-dcnode-id="1314" instrument_node=""> is very common in fictional writing, but it’s used all the time in all types of writing and in everyday conversation.</span></p><span data-dcnode-id="1312" instrument_node="">
