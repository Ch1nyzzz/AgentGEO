</span><strong data-dcnode-id="747"><span data-dcnode-id="754" instrument_node="">Figurative language in the bible is very close to what we use in our every day conversations, usually not even realizing it. &nbsp;Figures of speech are not to conceal, they are used to make things clearer, and in some cases express things that are impossible to say with literal language.</span><br data-dcnode-id="753"><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">Click to the right for specific figures.</span><br data-dcnode-id="750"><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">Below is a more comprehensive overview.&nbsp;</span></strong><span data-dcnode-id="746" instrument_node="">
</span></span></p><span data-dcnode-id="743" instrument_node="">

</span><div class="paragraph" data-dcnode-id="700" style="text-align:left;"><span data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">﻿</span></span><em data-dcnode-id="701"><font color="#000000" data-dcnode-id="702"><span data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">﻿</span></span><font data-dcnode-id="705" size="4"><span data-dcnode-id="706" instrument_node="">Thank you for making this page one of the favorite and most visited on BibleThought.net. &nbsp;We will try to add more to it as time goes on. &nbsp;Please sign up for our weekly mail out and we will let you know when we make significant upgrades to this page. &nbsp;It is hard to go two or three verses without some figurative language popping up, and our understanding the various figures of speech can help our understanding tremendously, and also refute those who would try to deceive by taking obviously figurative language and interpreting it literally.</span></font><span data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">﻿</span></span></font></em></div><span data-dcnode-id="699" instrument_node="">
</span><h2 class="wsite-content-title" data-dcnode-id="668" style="text-align:left;"><strong data-dcnode-id="696"><font data-dcnode-id="697" size="6"><span data-dcnode-id="698" instrument_node="">Figurative and Symbolic Language (Figures of Speech)</span></font></strong><br data-dcnode-id="695"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">by Dave Brown&nbsp;</span></strong><br data-dcnode-id="692"><strong data-dcnode-id="687"><font data-dcnode-id="688" size="4"><u data-dcnode-id="689"><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/understanding.html"><span data-dcnode-id="691" instrument_node="">Return to Understanding landing page</span></a></u></font></strong><br data-dcnode-id="686"><br data-dcnode-id="685"><strong data-dcnode-id="671"><font data-dcnode-id="683" size="5"><span data-dcnode-id="684" instrument_node="">Other Figures of Speech Pages:</span></font><br data-dcnode-id="682"><u data-dcnode-id="672"><font data-dcnode-id="673" size="4"><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/non-identical-metaphor.html"><span data-dcnode-id="681" instrument_node="">Non-Identical Metaphor</span></a><br data-dcnode-id="679"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/synecdoche.html"><span data-dcnode-id="678" instrument_node="">Synecdoche</span></a><br data-dcnode-id="676"><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/the-not--but--construct.html"><span data-dcnode-id="675" instrument_node="">Not-But Construct</span></a></font></u></strong><br data-dcnode-id="670"><br data-dcnode-id="669"></h2><span data-dcnode-id="667" instrument_node="">
</span><div class="paragraph" data-dcnode-id="73" style="text-align:left;"><font data-dcnode-id="665" size="4"><span data-dcnode-id="666" instrument_node="">Note: those figures of speech that are underlined in the part definitions have additional articles associated with them. &nbsp;It is our goal to elaborate more fully on many of them as time goes by. &nbsp;An appendix of a &nbsp;small fraction of the additional scriptural references that contain figurative language according to the various figures of speech is given at the end of this article. &nbsp;Its primary objective is to demonstrate how much figurative language is in the bible by a small sampling. &nbsp;Indeed, for someone to think that anyone could "take everything in the bible literally" shows gross ignorance of the intent of the writers and the Holy Spirit. &nbsp;Indeed, many passages would be either unintelligible or utterly&nbsp;ridiculous&nbsp;if someone insisted on this rule of exegesis. &nbsp;</span></font><br data-dcnode-id="664"><br data-dcnode-id="663"><strong data-dcnode-id="658"><font data-dcnode-id="659" size="6"><span data-dcnode-id="662" instrument_node="">PART 1 -- simile, metaphor, parable, personification,</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">not... but..., allegory, and euphemism</span></font></strong><span data-dcnode-id="657" instrument_node="">&nbsp;</span><br data-dcnode-id="656"><br data-dcnode-id="655"><font data-dcnode-id="650" size="4"><span data-dcnode-id="654" instrument_node="">Quite often those who believe that the bible is the authoritative word of God are accused of "taking everything literally." &nbsp;The implication is that our problem is that we do not understand that the bible is largely figurative in its language. &nbsp;It is difficult for us to see how anyone could take </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">all</span></em><span data-dcnode-id="651" instrument_node=""> of the figurative language in the bible literally without becoming a "Gracie Allen." &nbsp;If you ever get the chance to see an old "George Burns and Gracie Allen" rerun, please avail yourself of the opportunity. &nbsp;She took everything literally, and the humor that came from that is something that has never been replicated to this day. &nbsp;What we are saying is that it is absurd to say that anyone would or could "take everything literally." &nbsp;This article will briefly review 14 different figures of speech that are both common to our language today and used hundreds of times throughout the New Testament. Because of its length, we will subdivide it into two parts.</span></font><br data-dcnode-id="649"><br data-dcnode-id="648"><font data-dcnode-id="644" size="4"><span data-dcnode-id="647" instrument_node="">The failure to recognize figures of speech in the bible has been exploited by those who teach error. &nbsp;We might be tempted to say that they do not understand and properly apply the knowledge of these figures, but that would be inexcusable in those who claim to be teachers of God's word. &nbsp;At the other extreme are those who supposedly "don't take anything literally." &nbsp;Their guide is their feelings since to them the bible is incapable of saying anything authoritatively. &nbsp;</span><span data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Judges 21:25: "</span></span></font><font data-dcnode-id="642" size="4"><span data-dcnode-id="643" instrument_node="">In those days there was no king in Israel: every man did that which was right in his own eyes." &nbsp;Our King today is Jesus Christ (Acts 2:32-37), and He expects us to use the bible in order that we understand the truth and are united in practicing it to the glory of God (John 17:20-23).</span></font><br data-dcnode-id="641"><br data-dcnode-id="640"><font data-dcnode-id="631" size="4"><span data-dcnode-id="639" instrument_node="">Let us also preface this study by saying that figures of speech are NOT used to obscure truth and make it only understood by some clergy class who have some special gift from God. &nbsp;Again, this is the ploy that false teachers use to convince others that they have some special key to the scriptures that only a select God-chosen group has. &nbsp;Nothing is more foreign to the truth of the gospel of Jesus Christ -- it is for everyone and it was written to be </span><u data-dcnode-id="636"><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/can-we-understand-the-bible.html"><span data-dcnode-id="638" instrument_node="">understood</span></a></u><span data-dcnode-id="635" instrument_node="">! &nbsp;Contrary to this false assumption, figurative language is used in the bible to </span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">reveal</span></em><span data-dcnode-id="632" instrument_node="">, not to conceal. The bible is written in words that the Spirit gave (1 Cor. 2:11-16), and these words were calculated to communicate God's will to each of us as effectively as possible. &nbsp;So when we see figurative language used we should understand that there is no better way that the truth of a given passage could possibly be expressed. &nbsp;In some cases it is hard to even think of an alternative literal way to say the same thing.</span></font><br data-dcnode-id="630"><br data-dcnode-id="629"><font data-dcnode-id="627" size="4"><span data-dcnode-id="628" instrument_node="">With that, we want to briefly present the definition of each of the many figures of speech that are used in the bible (concentrating on the New Testament), and then give a few examples of each from the New Testament. We will begin with those that are the simplest and most common and work toward those that are not as familiar to most people. &nbsp;</span></font><br data-dcnode-id="626"><br data-dcnode-id="625"><font data-dcnode-id="620" size="4"><span data-dcnode-id="624" instrument_node="">All definitions (given&nbsp;</span><em data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">in italics</span></em><span data-dcnode-id="621" instrument_node="">) are from the Farlex free online dictionary:&nbsp;</span></font><span data-dcnode-id="613"><font data-dcnode-id="614" size="4"><span data-dcnode-id="619" instrument_node="">&nbsp; </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thefreedictionary.com/" target="_blank"><u data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">http://www.thefreedictionary.com/</span></u><span data-dcnode-id="616" instrument_node=""> </span></a></font></span><span data-dcnode-id="609"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thefreedictionary.com/" target="_blank"><span data-dcnode-id="612" instrument_node="">&nbsp;</span></a><span data-dcnode-id="610" instrument_node=""> &nbsp;</span></span><br data-dcnode-id="608"><br data-dcnode-id="607"><font data-dcnode-id="581" size="4"><span data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Simile.</span></strong><span data-dcnode-id="604" instrument_node=""> &nbsp;</span></span><span data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">A figure of speech in which two essentially unlike things are compared, often in a phrase introduced by </span></span><span data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">like</span></span><span data-dcnode-id="597"><span data-dcnode-id="598" instrument_node=""> or </span></span><span data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">as</span></span><span data-dcnode-id="591"><em data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">. </span></em><span data-dcnode-id="592" instrument_node="">&nbsp;Obviously, the key to recognizing this figure of speech is the the words LIKE or AS. &nbsp;Jesus concluded the sermon on the mount with one;&nbsp;</span></span><span data-dcnode-id="590" instrument_node="">Mt. 7:24:&nbsp;"Every one therefore that heareth these words of mine, and doeth them, shall be likened unto a wise man, who built his house upon the rock: ..." &nbsp;In this passage and many others, the figure is explained further. &nbsp;Stop here now and review this figure and ask yourself, could this truth have been expressed more effectively in literal language? &nbsp;And so it is with all figurative language in the bible. There are probably hundreds of similes in the New Testament; here are some other examples: Mt. chapters 13 and 20; Eph. 5:25, 28; James 1:6,23; 1 Pet. 5:8; 2 Pet. 2:2; Isa. 40:31. &nbsp;Look for more -- they are almost on every page.</span><br data-dcnode-id="589"><br data-dcnode-id="588"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Metaphor.</span></strong><span data-dcnode-id="585" instrument_node=""> &nbsp; </span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">A figure of speech in which a word or phrase that ordinarily designates one thing is used to designate another, thus making an implicit comparison, as in "A sea of troubles" or "All the world's a stage" (Shakespeare).</span></em><span data-dcnode-id="582" instrument_node="">&nbsp; This figure is essentially the same as the simile, but worded to exclude the words "like" or "as."</span></font><br data-dcnode-id="580"><font data-dcnode-id="570" size="4"><span data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">An example of Jesus is given in Luke 13:31-32:&nbsp;"In that very hour there came certain Pharisees, saying to him, Get thee out, and go hence: for Herod would fain kill thee.&nbsp;&nbsp;And he said unto them, Go and say to that fox , Behold, I cast out demons and perform cures today and tomorrow, and the third (day) I am perfected." &nbsp;Those who do not accept figurative language would have to say that Jesus said that Herod was literally a fox. &nbsp;Note how much figurative language is ingrained in our communications. &nbsp;We would be at a loss to express ourselves without it, and so would the bible. &nbsp;Metaphores are by far the most prolific of the figures found by the author. Here are some of them (in no special order): Phil. 2:17; Rom. 7; Heb. 5:12; Mt. 13:2; 2 Tim. 4:3; Mt. 11:28; Jn. 14:2-9; 1 Tim. 6:9-10; Mt. 5:13-16; Mt. 20:22; Mt. 7:13; 1 Cor. 12:13;Eph. 1 :22-23; 1 Cor. 3:10-11; Heb. 6:6; Eph 6:10-20;2 Pet. 2:18f; Mt. 5:29; Mt; 6; Prov. 11:29; Heb. 10:1; 9:9. &nbsp;Notice others as you continue your bible studies. &nbsp;A special use of the&nbsp;</span></span><span data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">metaphor</span></span><span data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">&nbsp;is what we call the </span><u data-dcnode-id="572"><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/non-identical-metaphor.html"><span data-dcnode-id="574" instrument_node="">Non-Identical Metaphor.</span></a></u></span></font><br data-dcnode-id="569"><br data-dcnode-id="568"><font data-dcnode-id="557" size="4"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Parable (aka Analogy).</span></strong><span data-dcnode-id="565" instrument_node="">&nbsp; </span><em data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">A short story that uses familiar events to illustrate a religious or ethical point.</span></em><span data-dcnode-id="562" instrument_node="">&nbsp; The word parable itself literally means to throw alongside of, so the story is told along side of reality so that the listener can be see the truth illustrated by their similarities. &nbsp;The story tells it better than it can be explained in an abstract way (which might be close to impossible). &nbsp;The story itself is not literal in that it may never have happened (although that possibility is certainly not excluded). &nbsp;Parables are most often identified as such, as in the case of&nbsp;Luke 12:16-21: &nbsp;"And he spake a parable unto them, saying, The ground of a certain rich man brought forth plentifully:&nbsp;and he reasoned within himself, saying, What shall I do, because I have not where to bestow my fruits?&nbsp;&nbsp;And he said, This will I do: I will pull down my barns, and build greater; and there will I bestow all my grain and my goods. &nbsp;And I will say to my soul, Soul, thou hast much goods laid up for many years; take thine ease, eat, drink, be merry.&nbsp;&nbsp;But God said unto him, Thou foolish one, this night is thy soul required of thee; and the things which thou hast prepared, whose shall they be?&nbsp;&nbsp;So is he that lays up treasure for himself, and is not rich toward God." &nbsp;Several other examples of parables are in Matthew 13, 20 and 22, many introduced with similes. &nbsp;The fact that a passage is a parable makes the message in it no less true. &nbsp;When using the story of Lazarus and the Rich Man given in Luke 16:20-31 to demonstrate the nature of our consciousness after death, we have heard the response: "that is only a parable." &nbsp;We do not believe it is a parable ... there is nothing in the context to indicate that this series of events did not actually happen. &nbsp;But what is if WAS a parable? &nbsp;Would this change the truth that is being expressed by it in any way? &nbsp;The burden of proof is upon someone who says: "this is just a parable" to explain the meaning of the alleged parable and how it would be any different from the literal event actually happening. &nbsp;Parables are analogies, and while they model reality in certain points they are not to be taken beyond (extrapolated) beyond the intended points that they are illustrating. &nbsp;We often hear the expression: "the analogy breaks down at this point" to indicate that the analogy is being taken well beyond the truths that it is intended to illustrate.</span><br data-dcnode-id="561"><br data-dcnode-id="560"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Personification and&nbsp;</span></strong></font><strong data-dcnode-id="554"><font data-dcnode-id="555" size="4"><span data-dcnode-id="556" instrument_node="">anthropomorphism</span></font></strong><font data-dcnode-id="543" size="4"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">.</span></strong><span data-dcnode-id="551" instrument_node="">&nbsp; &nbsp; </span><em data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">A figure of speech in which inanimate objects or abstractions are endowed with human qualities or are represented as possessing human form, as in "Hunger sat shivering on the road" or "Flowers danced about the lawn."</span></em><span data-dcnode-id="548" instrument_node="">&nbsp; Of course, we readily understand that flowers do not dance, although &nbsp;no doubt blowing in the wind they appeared to.&nbsp; A</span><font color="#070000" data-dcnode-id="544"><span data-dcnode-id="547" instrument_node="">nthropomorphism has a shade of difference in that it gives human characteristics to things that are not human; for example,&nbsp;</span><span data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">"the long arm of the law," and "the face of America."&nbsp;</span></span></font></font><br data-dcnode-id="542"><br data-dcnode-id="541"><font data-dcnode-id="535" size="4"><font color="#020000" data-dcnode-id="536"><span data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Consider Acts 4:29-30:&nbsp;"And now, Lord, look upon their&nbsp;threatening</span></span><span data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">: and grant unto thy servants to speak thy word with all&nbsp;boldness,&nbsp;while you stretch forth your hand to heal; and that signs and wonders may be done through the name of thy holy Servant Jesus." &nbsp;Does this mean that God has a hand? Assigning human physical attributes to God is something done throughout the bible (e.g., 1 Chron. 29:12; Isa. 14:27). &nbsp;Other things, both good and evil are also personified in this way. &nbsp;For example, wisdom is personified in the first four chapters of Proverbs. &nbsp;No reasonable person would conclude that the bible is teaching that what is being personified is literal.</span></span></font></font><br data-dcnode-id="534"><br data-dcnode-id="533"><font data-dcnode-id="514" size="4"><strong data-dcnode-id="527"><u data-dcnode-id="530"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/the-not--but--construct.html"><span data-dcnode-id="532" instrument_node="">Not ... But ...</span></a></u><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/the-not--but--construct.html"><span data-dcnode-id="529" instrument_node=""> &nbsp;</span></a></strong><span data-dcnode-id="526" instrument_node="">This is a construct used throughout the New Testament especially to create a contrast. &nbsp;No hard and fast rule can be given for all Not-But occurrences, but generally speaking it can lead to error to </span><em data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">always</span></em><span data-dcnode-id="523" instrument_node=""> take the NOT portion of the statement literally. &nbsp;John 6:27 illustrates this point:&nbsp;"Work not for the food which perishes, but for the food which abides unto eternal life, which the Son of man shall give unto you: for him the Father, even God, hath sealed." &nbsp;Surely Jesus is not saying that we should quit our jobs. &nbsp;It is equally clear that he is stating that the importance of our eternal destiny is far more important than anything in this life. &nbsp;Whenever a Not-But construct is identified the reasonableness of taking the not portion of it literally should be considered in light of the context. &nbsp;Here are a few of the many examples that illustrate this point:</span><br data-dcnode-id="522"><span data-dcnode-id="515"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Rom 4:5</span></strong><span data-dcnode-id="519" instrument_node="">&nbsp; “But to the one who does not work, but believes in Him who justifies the ungodly, his faith is reckoned as righteousness, ...”&nbsp; This one is used as a proof text by people inclined to teach “faith only.”&nbsp; Obviously it does not contain the word "only." &nbsp;It teaches that trusting (faith) in God is far more important than trusting in our own righteousness (works). &nbsp;If taken literally, </span><em data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">all acts of obedience would be sinful,</span></em><span data-dcnode-id="516" instrument_node=""> assuming that we could have faith and not do any works (which is an error in itself -- see James 2). &nbsp;</span></span></font><br data-dcnode-id="513"><br data-dcnode-id="512"><font data-dcnode-id="474" size="4"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Example of often miss-used passage: 1 Cor 1:17</span></strong><span data-dcnode-id="509" instrument_node="">&nbsp; “For Christ did not send me to baptize, but to preach the gospel, not in cleverness of speech, that the cross of Christ should not be made void.” &nbsp;This is another passage used to teach false doctrine. &nbsp;Paul baptized many people during his missionary journeys, since he was obeying the same Great Commission (Mt. 28:18-19), as all Christians are supposed to obey. &nbsp;It is just that preaching the gospel was his primary mission as opposed to being the specific person who performed the baptism. &nbsp;The passage clearly teaches that baptism does not have to be done by someone who has been ordained with some ecclesiastically-approved authority. &nbsp;Other examples of the Not-But construct include: Mt. 6:19-20; Rom. 2:28-29; Rom 9:16;&nbsp;Rom 14:13; 1 Cor. 2:4; 1 Tim. 1:9. &nbsp;We must add that there are some Not-But expressions in the bible where the “not” part is absolute.&nbsp; The context and a comparison with other scriptures is the key to resolving the meaning accurately.&nbsp; It is not difficult if we are willing to dedicate a little time to study the context and the overall subject </span><u data-dcnode-id="506"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/comprehensive-study-techniques.html"><span data-dcnode-id="508" instrument_node="">comprehensively</span></a></u><span data-dcnode-id="505" instrument_node=""> (2 Tim. 2:15). &nbsp;</span><span data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">For a more detailed discussion of the Not-But construct,</span></span><span data-dcnode-id="502" instrument_node=""> </span><u data-dcnode-id="499"><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/the-not--but--construct.html"><span data-dcnode-id="501" instrument_node="">click here</span></a></u><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/the-not--but--construct.html"><span data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">.</span></span></a><br data-dcnode-id="495"><br data-dcnode-id="494"><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Alegory.</span></strong><span data-dcnode-id="491" instrument_node=""> &nbsp;</span><em data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">A symbolic representation: The blindfolded figure with scales is an allegory of justice.</span></em><span data-dcnode-id="488" instrument_node="">&nbsp; This is a very general term and we only bring it up because it is used in Galatians (Gal. 4:23-26):&nbsp;"Howbeit the (son) by the handmaid is born after the flesh; but the (son) by the freewoman (is born) through promise.&nbsp; Which things contain an allegory: for these (women) are two covenants; one from mount Sinai, bearing children unto bondage, which is Hagar.&nbsp;&nbsp;Now this Hagar is mount Sinai in Arabia and answereth to the Jerusalem that now is: for she is in bondage with her children.&nbsp;&nbsp;But the Jerusalem that is above is free, which is our mother."</span><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node="">We will not get into the details of the &nbsp;meaning, but are referencing it to demonstrate that God intends us to understand some things through the use of figurative language. &nbsp;Note the intensive use of metaphors. &nbsp;Another example is the use of the word "shadow" in the book of Hebrews (8:5 and 10:1) allegorically to indicate that all of the Old Testament ritualistic structure was not "the real thing" but was only a vague image of what is now true spiritual reality (the gospel of Jesus Christ).</span><br data-dcnode-id="485"><br data-dcnode-id="484"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Euphemism.</span></strong><span data-dcnode-id="481" instrument_node=""> &nbsp;</span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">The act or an example of substituting a mild, indirect, or vague term for one considered harsh, blunt, or offensive: "Euphemisms such as 'slumber room' . . . abound in the funeral business" (Jessica Mitford).</span></em><span data-dcnode-id="478" instrument_node="">&nbsp; We often say that a person has "passed away," which is a common euphemism today. &nbsp;The New Testament uses the euphemism "sleep" for death (Acts 7:60; 1 Cor. 11:30; 1 Thes 4:13). &nbsp;The following present additional examples (with our opinion as to their interpretation): Luke 2:5 "with child" (pregnant);&nbsp;Luke 23:46: "breathed his last" (died); Acts 1:25 "went to his own place" (went to hell);</span><strong data-dcnode-id="475"><font data-dcnode-id="476" size="3"><span data-dcnode-id="477" instrument_node="">&nbsp;</span></font></strong></font><strong data-dcnode-id="470"><font data-dcnode-id="471" size="3"><span data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Acts 2:39 "those that are far off" (Gentiles); Acts 22:22 "take this person away from the earth" (kill him); 1 Cor 7:1 "touch not a woman" (have no sexual relations); 1 Cor. 7:5 "come together again" (resume normal sexual relations with one's spouse); Phil. 1:23 "depart" (die); 1 Tim. 5:17 "honor" (support financially); Heb. 13:4 "marriage bed" (sexual relations); 2 Pet. 2:17 "blackness of darkness" (hell); Jude 7 "strange flesh" (homosexual partners -- partners itself being a euphemism). &nbsp;</span></span></font></strong><br data-dcnode-id="469"><br data-dcnode-id="468"><strong data-dcnode-id="462"><font data-dcnode-id="463" size="4"><u data-dcnode-id="465"><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/gods-plan.html"><span data-dcnode-id="467" instrument_node="">What are the conditions of salvation given by Jesus</span></a></u><span data-dcnode-id="464" instrument_node="">?</span></font></strong><br data-dcnode-id="461"><br data-dcnode-id="460"><font data-dcnode-id="455" size="6"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">PART 2 -- hyperbole, sarcasm, synecdoche,&nbsp;</span></strong><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">&nbsp;metonomy, idiom, incipit and accomodative language</span></strong></font><br data-dcnode-id="454"><br data-dcnode-id="453"><font data-dcnode-id="446" size="4"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Hyperbole.</span></strong><span data-dcnode-id="450" instrument_node=""> &nbsp;</span><em data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">A figure of speech in which</span></em><span data-dcnode-id="447" instrument_node=""> [extreme] </span></font><em data-dcnode-id="443"><font data-dcnode-id="444" size="4"><span data-dcnode-id="445" instrument_node="">exaggeration is used for emphasis or effect, as in "I could sleep for a year" or "This book weighs a ton." or&nbsp;</span></font></em><em data-dcnode-id="440"><font data-dcnode-id="441" size="4"><span data-dcnode-id="442" instrument_node="">"I'm starving to death," or "I could eat a horse."&nbsp;</span></font></em><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">&nbsp;&nbsp;</span></em><font data-dcnode-id="436" size="4"><span data-dcnode-id="437" instrument_node="">We have inserted the word "extreme" in this definition to distinguish between normal exaggeration and hyperbole. However, generally there is a big difference between exaggeration and hyperbole in that hyperbole can rarely if ever be taken literally without it being absurd; i.e.,</span></font><font data-dcnode-id="428" size="4"><span data-dcnode-id="435" instrument_node="">&nbsp;no reasonable person would take it literally. &nbsp;Obviously the book does not weigh a ton, and you could not sleep for a year. &nbsp;So there is no chance of deceit in these statements. &nbsp;Not so with ordinary exaggeration which, if it is not explained, could be a complete lie. &nbsp;To say that the fish weighed 12 pounds when in fact it only weighed 10 is both an exaggeration and a lie. &nbsp;</span><em data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">But there is no intent to&nbsp;deceive&nbsp;in the use of hyperbole.</span></em><span data-dcnode-id="432" instrument_node=""> &nbsp;It is so "over the top," as we&nbsp;say today, that no reasonable person could take it literally. &nbsp;However we use it all the time to make our points. &nbsp;(Did you notice its use in the previous sentence?) &nbsp;An obvious example is in 1 Cor 6:12:&nbsp;"All things are lawful for me; but not all things are expedient. &nbsp;All things are lawful for me; but I will not be brought under the power of any." &nbsp;Obviously murder, fornication, covetousness, etc. were not lawful for Paul. &nbsp;But there were some at Corinth that were arguing that it was lawful for them to eat meat sacrificed to idols and perhaps do many other things that </span><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">in and of themselves were not wrong.</span></em><span data-dcnode-id="429" instrument_node=""> &nbsp;These are the "all things" that Paul is talking about. &nbsp;To take this verse out of context conveys something just the opposite of the truth -- i.e., that God has not law whatsoever for us today. Other examples are in Mt. 5:29; 11:23; 23:25 ("straining the gnat and swallowing the camel -- also involves metaphor); Luke 14:26; John 12:19; and 1 Tim. 6:4.</span></font><br data-dcnode-id="427"><br data-dcnode-id="426"><strong data-dcnode-id="422"><font data-dcnode-id="424" size="4"><span data-dcnode-id="425" instrument_node="">Sarcasm.</span></font><span data-dcnode-id="423" instrument_node=""> </span></strong><font data-dcnode-id="420" size="4"><span data-dcnode-id="421" instrument_node="">&nbsp;The definitions of sarcasm that we found from other sources do not reflect the reality of what it really is. &nbsp;For example: &nbsp;</span></font><font data-dcnode-id="418" size="4"><span data-dcnode-id="419" instrument_node="">"</span></font><em data-dcnode-id="415"><font data-dcnode-id="416" size="4"><span data-dcnode-id="417" instrument_node="">A cutting, often ironic remark intended to wound."&nbsp;</span></font></em><font data-dcnode-id="410" size="4"><span data-dcnode-id="414" instrument_node="">&nbsp;We do not argue that this describes it, but it hardly defines it. &nbsp;Sarcasm is the statement of a fact that the orator believes to be untrue; but it is stated in such a way that the listener can tell that the statement (and perhaps the listener) is being mocked. &nbsp;For example, the simple statement "yea, sure" can be quite affirmative and agreeable; &nbsp;But we all know that with the right voice inflection it becomes a mockery of what the other person just said. &nbsp;No need for further definition, we have all used it, and we have all felt the brunt of it. &nbsp;The problem with it in writing is that the reader cannot hear the voice. Thus, the statement made, if sarcasm is intended, </span><em data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">is just the OPPOSITE of what the literal meaning is.</span></em><span data-dcnode-id="411" instrument_node=""> &nbsp;This is why we classify it as a figure of speech. &nbsp;It is not just figurative of something else, it is figurative of the direct opposite of what is stated. &nbsp;Many writers on the Internet have discovered to their distress that their sarcasm was taken literally and this has caused them major issues. &nbsp;For us, writing sarcasm is just not wise -- people cannot hear how you are thinking. &nbsp;</span></font><br data-dcnode-id="409"><br data-dcnode-id="408"><font data-dcnode-id="406" size="4"><span data-dcnode-id="407" instrument_node="">In order to identify sarcasm in the bible the reader must be totally familiar with the context, the writer and the intended audience. &nbsp;Let us consider one example in detail, 2 Cor 10:1-2: "Now I Paul myself entreat you by the meekness and gentleness of Christ, I who in your presence am lowly among you, but being absent am of good courage toward you:&nbsp;yea, I beseech you, that I may not when present show courage with the confidence wherewith I count to be bold against some, who count of us as if we walked according to the flesh." &nbsp;The first verse is sarcasm. &nbsp;We know from 2 Cor. 10:10 and 1 Cor. 2 that there were some accusing Paul of being weak while he was with them. &nbsp;And he goes on to deny this accusation. &nbsp;So we can conclude definitively that this is an example of sarcasm. &nbsp;Paul uses sarcasm throughout 2 Corinthians chapters 10-12. &nbsp;If we are looking for it, we can see that it had to be extremely effective in getting the message across. &nbsp;An obvious case is 2 Cor. 12:13. &nbsp;Let us not belabor the point; this is one of the most difficult figures to identify, and it requires some intensive study to validate it usage. &nbsp;Here are two other potential times it was used: (1)&nbsp;</span></font><span data-dcnode-id="402"><font data-dcnode-id="404" size="4"><span data-dcnode-id="405" instrument_node="">Mk. 7:25-32 (the theory is that Jesus was not calling the woman a dog, but mocking the Pharisees who expressed that attitude in the context); and (2) John 4:17-18 (we should not think that Jesus was in agreement with the woman's past behavior). </span></font><span data-dcnode-id="403" instrument_node="">&nbsp;</span></span><font data-dcnode-id="400" size="4"><span data-dcnode-id="401" instrument_node="">In several cases in the Old Testament is was obvious that the speaker had animus against the one spoken to and so any positive statement commending them is obviously sarcasm (e.g., Ex. 14:11; 2 Sam. 6 :20; 1 Kings 18:27).</span></font><br data-dcnode-id="399"><br data-dcnode-id="398"><strong data-dcnode-id="392"><font data-dcnode-id="393" size="4"><u data-dcnode-id="395"><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/synecdoche.html"><span data-dcnode-id="397" instrument_node="">Synecdoche</span></a></u><span data-dcnode-id="394" instrument_node="">&nbsp;</span></font></strong><font data-dcnode-id="342" size="4"><span data-dcnode-id="391" instrument_node="">(pronounced sin-</span><strong data-dcnode-id="388"><u data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">neck</span></u></strong><span data-dcnode-id="387" instrument_node="">-doll-kee).</span><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">&nbsp;&nbsp;</span></strong><em data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">A figure of speech in which a part is used for the whole (as hand for sailor), the whole for a part (as the law for police officer), the specific for the general (as cutthroat for assassin), the general for the specific (as thief for pickpocket), or the material for the thing made from it (as steel for sword). &nbsp;</span></em><span data-dcnode-id="382" instrument_node="">These examples show that this is a common figure of speech in our language as we would expect it to be in most other languages as well. &nbsp;We use it often without being aware of its figurative aspects. As and example, James 1:27 states that "Pure religion and undefiled before our God and Father is this, to visit the fatherless and widows in their affliction, (and) to keep oneself unspotted from the world." &nbsp;Surely true religion is not JUST these things. &nbsp;However the assumption is that if your life is&nbsp;attuned&nbsp;to doing these and similar things, you will be practicing all that God expects. &nbsp;In&nbsp;almost all of his letters Paul gives lists of good things and evil things, and these lists are never totally exhaustive. &nbsp;He is using this figure of speech to get the message across without having to repeat everything that is involved, which would be extremely tedious. &nbsp;So it is with the word faith -- it is most often used in the New Testament to refer to the entire plan of salvation, i.e., all that true and living faith entails (Hebrews 11; James 2). &nbsp;It would be impossible for the biblical writers to include all of these lists every time they wanted to refer to all of it, so the word </span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">faith </span></em><span data-dcnode-id="379" instrument_node="">is used to encapsulate it all. &nbsp;This is validated by the definition of faith Romans 1:16-17, which essentially says that faith includes not only a </span><em data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">belief of,</span></em><span data-dcnode-id="376" instrument_node=""> but a </span><em data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">living out</span></em><span data-dcnode-id="373" instrument_node=""> of the </span><em data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">entire </span></em><span data-dcnode-id="370" instrument_node="">gospel of Jesus Christ.</span><br data-dcnode-id="369"><br data-dcnode-id="368"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Metonomy.</span></strong><span data-dcnode-id="365" instrument_node=""> &nbsp;</span><em data-dcnode-id="350"><span data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">A figure of speech in which one word or phrase is substituted for another with which it is closely associated, as in the use of "</span></span><span data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Washington"</span></span><span data-dcnode-id="359"><span data-dcnode-id="360" instrument_node=""> for </span></span><span data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">the United States government</span></span><span data-dcnode-id="355"><span data-dcnode-id="356" instrument_node=""> or of </span></span><span data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">the "sword"</span></span><span data-dcnode-id="351"><span data-dcnode-id="352" instrument_node=""> for </span></span></em><em data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">military power. </span></em><span data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">&nbsp; An example of this is found in Romans</span></span><span data-dcnode-id="345" instrument_node="">&nbsp;13:3-4: "For rulers are not a terror to the good work, but to the evil. And would you have no fear of the power? do that which is good, and thou shalt have praise from the same:&nbsp;for he is a minister of God to thee for good. But if thou do that which is evil, be afraid; for he bears not the sword in vain: for he is a minister of God, an avenger for wrath to him that does evil." &nbsp;Similarly&nbsp;Matt 10:34</span><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node="">"Think not that I came to send peace on the earth: I came not to send peace, but a sword." &nbsp;But the sword here is a metaphor for contention, not warfare. &nbsp;This statement of Jesus uses the figures of metaphor, metonomy and hyperbole. &nbsp;</span></font><br data-dcnode-id="341"><br data-dcnode-id="340"><font data-dcnode-id="324" size="4"><span data-dcnode-id="339" instrument_node="">The understanding of metonomy avoids the error of placing undue&nbsp;emphasis&nbsp;upon the "cup" in 1 Cor 11:23-25: "For I received of the Lord that which also I delivered unto you, that the Lord Jesus in the night in which he was betrayed took bread;&nbsp;and when he had given thanks, he brake it, and said, This is my body, which is for you: this do in remembrance of me.&nbsp;&nbsp;In like manner also the cup, after supper, saying, This cup is the new covenant in my blood: this do, as often as ye drink (it), in remembrance of me." &nbsp;Is he talking about the cup or the contents of the cup? &nbsp;The gospel accounts of the Lord's Supper clarify that Jesus was talking about the fruit of the vine and that its container was inconsequential. &nbsp;[In this passage, "This is my body" is a metaphor -- obviously Jesus was not giving them his physical body to eat, nor is this the case in our taking the Lord's Supper today -- they could (and we can) determine this with our physical senses. &nbsp;Bread is bread, and human flesh is human flesh. &nbsp;Jesus did not say that either one was the other. &nbsp;In initiating and commanding the Lord's Supper He was indicating that when they saw, felt and tasted the bread in the Supper, they were to see in their minds His body on the cross as &nbsp;it was given for us. &nbsp;See the additional article on the </span><u data-dcnode-id="336"><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/non-identical-metaphor.html"><span data-dcnode-id="338" instrument_node="">non-identical metaphor</span></a></u><span data-dcnode-id="335" instrument_node="">.] &nbsp;</span><br data-dcnode-id="334"><br data-dcnode-id="333"><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Idiom.</span></strong><span data-dcnode-id="330" instrument_node="">&nbsp; </span><em data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">A speech form or an expression of a given language that is peculiar to itself grammatically or cannot be understood from the individual meanings of its elements, as in "</span></em><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">keep tabs on."&nbsp;</span></em><span data-dcnode-id="325" instrument_node="">&nbsp;Ones that we use quite often are "keep an eye on something" and "keep your eyes peeled." &nbsp;Imagine that someone of a different language and culture would think of the literal meaning of these idioms. &nbsp;So we can see a real danger of misinterpretation here, and it surely does not hurt for us to consult with those scholars who are familiar with the first century Hebrew and Greek idioms in obtaining more accurate translations. &nbsp;One idiom that seems not to have been translated is the word "hate," found as a Hebrew idiom in Malachi 1 and Genesis 29:30, and also by Jesus in Matthew 10:37. &nbsp;To us this word has an absolute meaning, but in its original context it was a relative term, probably best literally translated "to love less" as opposed to the direct opposite of love, which is the meaning that it has in our culture today. &nbsp;</span></font><br data-dcnode-id="323"><br data-dcnode-id="322"><font data-dcnode-id="320" size="4"><span data-dcnode-id="321" instrument_node="">Similarly, an interesting non-translation of the phrase "set his face to go to ..." in Luke 9:51 occurs in most of our modern translations as: "</span></font><font data-dcnode-id="318" size="4"><span data-dcnode-id="319" instrument_node="">And it came to pass, when the days were well-nigh come that he should be received up, he stedfastly set his face to go to Jerusalem, ... (</span></font><span data-dcnode-id="314"><font data-dcnode-id="316" size="4"><span data-dcnode-id="317" instrument_node="">ASV, and similarly in the KJV and NKJV). &nbsp;The idiom "set his face to go" would intuitively be thought as one of setting a course. &nbsp;But there is much more involved in the meaning of this idiom than moving in a general direction. &nbsp;The New American Standard Version captures the meaning as:</span></font><span data-dcnode-id="315" instrument_node=""> </span></span><font data-dcnode-id="309" size="4"><span data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">"</span></span><span data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">When the days were approaching for His ascension, He was determined to go to Jerusalem." &nbsp;The idiom has more to do with a resolve or determination than with a mere setting of a course. &nbsp;In our English today "to set one's face" has no common &nbsp;meaning. &nbsp;But reverse-engineering it, we can see that there are certain facial expressions that demonstrate determination, especially when there is conflict involved.&nbsp;</span></span></font><br data-dcnode-id="308"><br data-dcnode-id="307"><font data-dcnode-id="276" size="4"><span data-dcnode-id="306" instrument_node="">Fortunately, these are exceptions, and</span><span data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">&nbsp; all scholarly translations have created the equivalent English meaning for most of the idioms that would not make sense when translated literally, and we know of no idioms that have ever caused doctrinal issues. &nbsp;However, it is good to be aware of their existence and to realize that a one-to-one conversion of words from Hebrew (or Greek) to English may not be sufficient to properly convey the meaning of idiomatic expressions. &nbsp;This is the reason that experienced translation scholars must be well schooled in the culture of the writers in their time, as well as with the technical aspects of the language itself. </span></span><span data-dcnode-id="300"><span data-dcnode-id="303" instrument_node="">For a list of Old Testament idioms and their meanings, see:</span><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span></span><u data-dcnode-id="295"><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mayimhayim.org/Hebrew%2520Perspectives/Biblical%2520Idioms.RX5.htm" target="_blank"><span data-dcnode-id="299" instrument_node="">http://www.mayimhayim.org/Hebrew%20Perspectives/Biblical%20Idioms.RX5.htm</span></a><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mayimhayim.org/Hebrew%2520Perspectives/Biblical%2520Idioms.RX5.htm" target="_blank"><span data-dcnode-id="297" instrument_node="">&nbsp;</span></a></u><br data-dcnode-id="294"><br data-dcnode-id="293"><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Incipit.</span></strong><span data-dcnode-id="290" instrument_node=""> &nbsp;</span><em data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">The beginning or opening words of the text of a medieval manuscript or early printed book.</span></em><span data-dcnode-id="287" instrument_node=""> &nbsp;In this case, of course, the bible. &nbsp;Recognize that the book chapters and verses of our bibles are of relatively recent origin. &nbsp;Thus the typical way for referencing a scroll or part of the Old Testament was by citing the incipit -- the first verse in the section of concern, perhaps of the chapter or scroll. &nbsp;Many scholars believe that Mark 15:34, "my God, my God, why hast thou forsaken me?" is an incipit reference to Psalms 22. &nbsp;This conclusion is hard to avoid when we see so many of the details of the crucifixion in Psalms 22. &nbsp;The passage in Psalms actually turns out quite positive indicating that the conventional belief that God forsook Jesus on the cross is not true. &nbsp;Other fairly clear incipit references are 2 Cor. 6:2 to Isa. 49:8, and Romans 1:16-17 to Habakkuk 2:4. &nbsp;We say this because of the very brief references as opposed to the richness of the content of the passage referenced. &nbsp;In other words, it is clear that the New Testament writer did not want to cite just a single part of a verse, but rather wanted the reader to go to the Old Testament and reference the subject matter of the entire passage (assuming that the reader was not already familiar with it). &nbsp;Habakkuk, for example was urging the people of his day not to just talk about their faith, but to live it out. &nbsp;There is no reason to think that Paul would have any other motive than this for citing it, since this was&nbsp;Habakkuk's&nbsp;motive in writing it originally. &nbsp;It is easy to generalize these thoughts&nbsp;and see that a very large proportion of the Old Testament quotations given in the New Testament may be familiar incipits to passages, since no doubt an understanding of that Old Testament context would certainly improve their (and our) understanding of the New Testament passage that makes the reference.&nbsp;</span><br data-dcnode-id="286"><br data-dcnode-id="285"><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Accommodative Language</span></strong><span data-dcnode-id="282" instrument_node=""> -- the use of words that get the primary message across without regard to stretched literal detail. &nbsp;It is usually &nbsp;possible to parse any statement (combination</span><font color="#000000" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">&nbsp;of words) well beyond their original intent. The goal of the writer is to get the message across effectively. &nbsp;</span></font><span data-dcnode-id="277"><font color="#000000" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">As an example in the New Testament,&nbsp;Phil. 4:6: "In nothing be anxious; but in everything by prayer and supplication with thanksgiving let your requests be made known unto God." &nbsp;But does not God already know our requests before they are spoken or thought (Matthew 6:8)? &nbsp;Of course, but this is not the subject, nor is it a contradiction of that truth. &nbsp;The writer did not have the subject of God's omniscience&nbsp; in mind; he&nbsp;only wanted to urge us to pray. &nbsp;So he uses the term "make known unto God" accomodatively to express this. &nbsp;(Note that Phil. 4:6 is also a Not-But statement, indicating the&nbsp;possibility&nbsp;that some anxiety&nbsp;might be of value at times, but that our lives should be spent in prayer as opposed to angst.)</span></font></span></font><br data-dcnode-id="275"><br data-dcnode-id="274"><font data-dcnode-id="268" size="4"><font color="#000000" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Consider&nbsp;Acts 24:24:&nbsp;"But after certain days, Felix came with D</span></font><span data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">﻿</span></span><span data-dcnode-id="269" instrument_node="">rusilla, his wife, who was a Jewess, and sent for Paul, and heard him concerning the faith in Christ Jesus." &nbsp;Extremely reliable history tells us that Drusilla was technically the wife of another man at this time (i.e., she was not scripturally divorced). &nbsp;Does the fact that Luke calls her Felix's wife give legitimacy to their relationship? &nbsp;Of course not. &nbsp;He is speaking in terms that most people would use and is not in a discussion of marriage, divorce and re-marriage. &nbsp;To stretch this to address that issue is just out of order. &nbsp;How would Luke have better stated it without opening a can of worms? &nbsp;(Note the metaphor.) &nbsp; The bible writers could not anticipate every miss-use that would possibly be made of their writings, and the Holy Spirit that inspired them expected us to use our intelligence in this regard.</span></font><br data-dcnode-id="267"><br data-dcnode-id="266"><font data-dcnode-id="262" size="4"><span data-dcnode-id="265" instrument_node="">The example in Acts 27:31 is a bit more complex. &nbsp;In Acts 27:23-24 Paul had already told the passengers that an angel had informed him that no life would be lost in the shipwreck. &nbsp;But when the sailors seek to abandon the ship in Acts 27:31:&nbsp;"Paul said to the centurion and to the soldiers, Except these abide in the ship, ye cannot be saved." &nbsp;But wait -- did Paul not say that they would be saved? &nbsp;The&nbsp;question&nbsp;of a contradiction can be resolved by&nbsp;recognizing that Paul was using accommodative language. &nbsp;Think about how how Paul would have stated it while at the same time incorporating his former statement. &nbsp;I think we can all agree that if he did say something of that complexity, not only would he not have been understood, but by the time that he got done speaking the crew would have been long gone (and perhaps themselves killed). &nbsp;(This is a very interesting study in the sovereignty of God and how He sets conditions on outcomes, and yet may well know beforehand how those conditions will be observed. &nbsp;Paul's statement was, in fact, the truth; but it was known that they would properly respond. &nbsp;I apologize for getting way off the subject of figurative language.) &nbsp;</span><span data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Most language is accommodative to some extent, and when pressed to its literal limit would probably come up less than totally accurate in some aspect. &nbsp;It is important for us to focus on the subject at hand and try not to squeeze meanings out of biblical statements that have nothing to do with the obvious truths being revealed regarding the subject of concern.</span></span></font><br data-dcnode-id="261"><font data-dcnode-id="249" size="4"><span data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">﻿</span></span><br data-dcnode-id="258"><span data-dcnode-id="257" instrument_node="">Consider Romans 4:4: "Now to him that works, the reward is not reckoned as of grace, but as of debt." &nbsp;Works here is being used as a shortcut for those who were attempting to be saved by keeping the Old Testament laws; </span><u data-dcnode-id="254"><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/romans-1-5.html"><span data-dcnode-id="256" instrument_node="">see commentary on Romans 1-5.</span></a></u><span data-dcnode-id="253" instrument_node="">&nbsp; If we did not allow that the word works here is being used&nbsp;accommodatively, then there would be a strong inference that a man could obtain salvation by works. &nbsp;Yet we know that this is just the opposite of what Paul was trying to communicate. &nbsp;Like hyperbole, when a statement made is so obviously counter to the intent of the author, then we know that figurative language is being used.&nbsp;</span><br data-dcnode-id="252"><br data-dcnode-id="251"><span data-dcnode-id="250" instrument_node="">Another excellent example of accommodative language is in Galatians 1:6 where Paul uses the term "another gospel" to refer to false teaching, and then quickly explains that it really is not another legitimate gospel (i.e., good news) at all.&nbsp;</span></font><br data-dcnode-id="248"><br data-dcnode-id="247"><font data-dcnode-id="245" size="4"><span data-dcnode-id="246" instrument_node="">In assessing whether something is being used accommodatively, we need to ask: how could this be said if accommodative language were not used. &nbsp;In many cases the wording would border on the&nbsp;ridiculous&nbsp;and the intent of the&nbsp;writer would be obscured. &nbsp;Accommodative language is extremely common in our communications today -- to see that all we need to do is to look for it.</span></font><br data-dcnode-id="244"><br data-dcnode-id="243"><br data-dcnode-id="242"><strong data-dcnode-id="236"><font data-dcnode-id="237" size="4"><u data-dcnode-id="239"><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/gods-plan.html"><span data-dcnode-id="241" instrument_node="">What are the conditions of salvation given by Jesus</span></a></u><span data-dcnode-id="238" instrument_node="">?</span></font></strong><br data-dcnode-id="235"><br data-dcnode-id="234"><span data-dcnode-id="230"><strong data-dcnode-id="231"><font data-dcnode-id="232" size="6"><span data-dcnode-id="233" instrument_node="">Appendix - Additional Examples Figurative Language</span></font></strong></span><br data-dcnode-id="229"><br data-dcnode-id="228"><font data-dcnode-id="86" size="4"><span data-dcnode-id="227" instrument_node="">Ordered by book, chapter and verse within the figures, which are listed alphabetically. &nbsp;This is not at all an exhaustive list -- some have compiled hundreds for several of these categories. &nbsp;However, this list does demonstrate how extensive the use of figurative language is in the bible, and if we are to attain to the proper understanding of the passages in which these figures occur, we will need to have some familiarity with the various figures of speech.</span><br data-dcnode-id="226"><br data-dcnode-id="225"><strong data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Accommodative Language</span></strong><br data-dcnode-id="222"><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">Eccl. 1:5; Ps. 19:6; 58:8; Amos 9:2; Mt. 5:45; Acts 24:24; 27:31; [1 Cor. 1:12-13; 4:6; 2 Cor. 11:13];&nbsp;Rev. 20:8; 21:8</span><br data-dcnode-id="219"><br data-dcnode-id="218"><strong data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Allegory (Including Types and&nbsp;Anti-types)</span></strong><br data-dcnode-id="215"><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">2 Sam. 12:1-8;&nbsp;Isa. 5:1-6 ; Ezek. 17:1-24; 24:3-14; Dan. 2:31-45; 4:10-33; 7:1-28; 8:1-27;&nbsp;1 Cor. 10:1-11; 15:45 (first and second Adam); Gal. 4:24 (Gen. 16:1-6); Eph. 5:31-32; Heb. 5 (Melchizedek and Christ); 8-9 (tabernacle and&nbsp;church); 11:19; Rev. 12:1-6</span><br data-dcnode-id="212"><br data-dcnode-id="211"><strong data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Euphemism</span></strong><br data-dcnode-id="208"><br data-dcnode-id="207"><span data-dcnode-id="206" instrument_node="">Gen. 2:24; 4:1; 26:8; 31:35; Lev. 18:22;&nbsp;Judg. 3:24; </span><span data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">1</span></span><span data-dcnode-id="203" instrument_node="">&nbsp;Sam. 24:3</span><span data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">;</span></span><span data-dcnode-id="200" instrument_node="">&nbsp;25:22 (and several other places);&nbsp;1 Kings 2:2, 10; Job 16:22; Prov. 30:20;&nbsp;Ecc. 12:5-7; Mt. 1:19;&nbsp;Mk. 6:24; 1 Thes. 4:13; Rom. 1:27; 13:13; 1 Cor. 12:15-24; Jude 7</span><br data-dcnode-id="199"><br data-dcnode-id="198"><strong data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Hyperbole</span></strong><br data-dcnode-id="195"><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">Ps. 1:2; Mt. 5:29; Mk. 10:25; Lk. 14:26; 1 Cor. 8:8; 2 Cor, 11:8; Phil. 4:6; 1 Tim. 6:4</span><br data-dcnode-id="192"><br data-dcnode-id="191"><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Idiom</span></strong><br data-dcnode-id="188"><br data-dcnode-id="187"><span data-dcnode-id="186" instrument_node="">Deut. 8:14 (pride); 15:17 (selfish); Job 1:6; 2:1 (angels); Ps. 7:9 (thoughts and emotions); 11:6 (their destiny); 75:5 (defy God); Prov. 24:20;&nbsp;</span><span data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Luke 13:34-35;&nbsp;</span></span><span data-dcnode-id="183" instrument_node="">Luke 22:15 (celebrate the passover -- it cannot be literally eaten, although the passover lamb was eaten);</span><span data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">&nbsp;[all in all: 1 Cor. 12:6; 15:28; Eph. 1:23; Col. 3:11]; [walk = behavior&nbsp;</span></span><span data-dcnode-id="180" instrument_node="">Mark 7:5; Col. 2:6; similarly , live Rom. 1:17]</span><br data-dcnode-id="179"><span data-dcnode-id="178" instrument_node="">&nbsp;</span><br data-dcnode-id="177"><strong data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Incipit</span></strong><br data-dcnode-id="174"><br data-dcnode-id="173"><span data-dcnode-id="172" instrument_node="">Mt. 22:44 (Ps. 110); Mt. 27:46 and Mk.15:34 (Ps. 22); Mk. 12:36 (Ps. 110); Lk. 6:24 (Amos 6); Lk. 7:27 (Mal. 3); Jn. 7:38 (Isa. 55); Jn. 12:38 (Isa. 53); Acts 2:34 (Ps. 110); Acts 4:25 (Ps. 2); Acts 7:3 (Gen. 12); Rom. 3:18 (Ps. 36); Rom. 4:7 (Ps. 32); Rom. 9:13 (Mal. 1); Rom. 10:16 (Isa. 53); Rom. 10:20 (Isa. 65); Rom. 15:11 (Ps. 117); Rom. 15:12 (Isa. 11); 1 Cor. 10:26 (Ps. 24); Gal. 4:27 (Isa. 54); Rev. 12:7 (Dan. 12);&nbsp;</span><br data-dcnode-id="171"><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/study/misc/quotes04.cfm" target="_blank"><span data-dcnode-id="170" instrument_node="">https://www.blueletterbible.org/study/misc/quotes04.cfm</span></a><span data-dcnode-id="168" instrument_node="">&nbsp;</span><br data-dcnode-id="167"><br data-dcnode-id="166"><strong data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Metaphor</span></strong><br data-dcnode-id="163"><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">Deut. 33:27; Ps. 91:4; 119:28; Prov. 4:14; 11:29; 14:26; Mt. 5:13-16; 29; 6; 7:13; 11:7, 28; 13; 15:7-8; 20:22; 23; 26:39; Lk. 1:17; 3:7-15; 24:49; Jn. 1:29-30; 6:35, 58, 63; 8:12; 9:5; 12; 12:46; 14:2, 6, 9; Rom. 7; 1; 8:35ff; Cor. 3:10-11; 5:6; 12:13; Gal. 2:20; 5:15, 24; Phil. 2:17; 4:1, 18; Eph. 1:22-23; 4: 14;24; 5:1; 6:10-20; 1 Thes. 3:8; 1 Tim. 1:19; 2:8; 6:9-10; 2 Tim. 2:1; 4:3; James 3; Heb. 4:12; 5:12; 6:6, 19; 9:9; 10:1; 12:1, 29; 1 Pet. 5:5; 2 Pet. 2:18f; Rev. 5</span><br data-dcnode-id="160"><br data-dcnode-id="159"><strong data-dcnode-id="154"><u data-dcnode-id="156"><a data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/non-identical-metaphor.html"><span data-dcnode-id="158" instrument_node="">Metaphor of type "X is Y" and "I am X"</span></a></u><span data-dcnode-id="155" instrument_node=""> (click for article)</span></strong><br data-dcnode-id="153"><br data-dcnode-id="152"><span data-dcnode-id="151" instrument_node="">Mk. 14:22-24; Jn. 4:24; 6:51; 8:12; 9:5; 10:7, 9, 11, 30 (see 17:22); 11:25; 14:6; 15:1; 1 Cor. 6 (body == temple); Eph. 1:22-23; 1 Jn. 1:5; 4:8, 16;&nbsp;</span><br data-dcnode-id="150"><br data-dcnode-id="149"><strong data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Metonymy (Note that&nbsp;</span></strong><strong data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Synecdoche is a Type of Metonymy</span></strong><strong data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">)</span></strong><br data-dcnode-id="142"><br data-dcnode-id="141"><span data-dcnode-id="140" instrument_node="">Prov. 2:1;&nbsp;Mt. 5:37;&nbsp;&nbsp;6:19; 10:34; 18:9; 1 Cor. 16:20; 2 Cor. 3:15; Phil. 3:19; Col. 4:11; James 1:27;</span><br data-dcnode-id="139"><br data-dcnode-id="138"><strong data-dcnode-id="134"><u data-dcnode-id="135"><a data-dcnode-id="136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/the-not--but--construct.html"><span data-dcnode-id="137" instrument_node="">Not... But ...</span></a></u></strong><strong data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">&nbsp;(click for examples given within the article)</span></strong><br data-dcnode-id="131"><br data-dcnode-id="130"><strong data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Parable</span></strong><br data-dcnode-id="127"><br data-dcnode-id="126"><span data-dcnode-id="125" instrument_node="">Mt. 13:18, 24, 31, 33; 21:33; 24:32 (and comparable parallel passages in Mark and Luke); Jn 10:1-6.</span><br data-dcnode-id="124"><br data-dcnode-id="123"><strong data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Personification (aka A</span></strong><strong data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">nthropomorphism)</span></strong><br data-dcnode-id="118"><br data-dcnode-id="117"><span data-dcnode-id="116" instrument_node="">Ex. 31:18; Numbers 11:2; Deut. 8:3; 11:12; 1 Chron. 29:12; Job 13:24; 19:21; 40:9; Ps. 36:7; 130:2; Prov. 1-5; 6:17-18; 25; 15:31; Isa. 1:15; 14:27; 53:1; Mt. 4:4; Acts 4:30; 11:21; 1 Cor. 13 (of Love); 2 Thes. 3:1;James 1:15; 1 Pet. 3:12</span><br data-dcnode-id="115"><br data-dcnode-id="114"><span data-dcnode-id="113" instrument_node="">Human emotions or modes of thinking: Gen. 6:6; 22:12; 1 Sam. 15:35 (We are only posing this as a possibility; not asserting that these are necessarily figurative.)</span><br data-dcnode-id="112"><br data-dcnode-id="111"><strong data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Simile</span></strong><br data-dcnode-id="108"><br data-dcnode-id="107"><span data-dcnode-id="106" instrument_node="">Ps. 1:1-3; Isa. 40:31; Mt. 20; Mt. 7:24; Lk. 22:44; Eph. 5:1, 22, 25, 28; 1 Pet. 1:24-2:2; 1 Pet. 5:8; 2 Pet. 2</span><br data-dcnode-id="105"><br data-dcnode-id="104"><strong data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Sarcasm</span></strong><br data-dcnode-id="101"><br data-dcnode-id="100"><span data-dcnode-id="99" instrument_node="">Gen. 4:9: 2 Sam. 16:20; 1 Kings 18:27; 22:15; Isa. 40:19-20, Jer. 46:11; Mk. 7:9; 25-30; Jn. 4:17;&nbsp;1 Cor. 4:8-13; 2 Cor. 10:1; 12:13;&nbsp;</span><br data-dcnode-id="98"><br data-dcnode-id="97"><strong data-dcnode-id="92"><u data-dcnode-id="94"><a data-dcnode-id="95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/synecdoche.html"><span data-dcnode-id="96" instrument_node="">Synecdoche</span></a></u><span data-dcnode-id="93" instrument_node=""> (a form of metonymy - click for article)&nbsp;</span></strong><br data-dcnode-id="91"><br data-dcnode-id="90"><span data-dcnode-id="89" instrument_node="">Ps. 18:20; 25:3; 119:48; Prov. 6:16-19; Mt. 22; Rom. 12:9-13; Rom. 14:17; 1 Tim. 2:8; 3:1ff; Tit. 1:3; James 1:27; 4:8; 1:Cor. 13 (love); Gal. 6:2; Col. 3:18f;&nbsp;</span><br data-dcnode-id="88"><span data-dcnode-id="87" instrument_node="">Note that most lists given in the New Testament of either good or bad things are not exhaustive (and thus are synecdoches) -- they exemplify all good things or all bad things and they are not to be viewed as being a complete and exhaustive list.</span></font><br data-dcnode-id="85"><br data-dcnode-id="84"><br data-dcnode-id="83"><strong data-dcnode-id="77"><font data-dcnode-id="78" size="4"><u data-dcnode-id="80"><a data-dcnode-id="81" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblethought.net/gods-plan.html"><span data-dcnode-id="82" instrument_node="">What are the conditions of salvation given by Jesus</span></a></u><span data-dcnode-id="79" instrument_node="">?</span></font></strong><br data-dcnode-id="76"><br data-dcnode-id="75"><br data-dcnode-id="74"></div><span data-dcnode-id="72" instrument_node="">
