</span><main class="site-main" data-dcnode-id="247" id="main"><hr class="post-divider" data-dcnode-id="1165" data-post-id="85609" data-title="What Is Figurative Language? Explained" data-url="https://becomeawritertoday.com/what-is-figurative-language/" style="height: 0"><span data-dcnode-id="1164" instrument_node="">
</span><article class="post-85609 post type-post status-publish format-standard has-post-thumbnail hentry category-writing-advice tag-what-is-figurative-language ast-article-single" data-dcnode-id="715" id="post-85609" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1163" instrument_node="">
</span><div class="ast-post-format- single-layout-1 ast-no-date-box" data-dcnode-id="717"><span data-dcnode-id="1162" instrument_node="">
</span><header class="entry-header ast-no-thumbnail" data-dcnode-id="1141"><span data-dcnode-id="1161" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="1143"><span data-dcnode-id="1160" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1159" id="what-is-figurative-language-explained"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1158" id="what-is-figurative-language-explained"></span><h1 class="entry-title" data-dcnode-id="1156" itemprop="headline"><span data-dcnode-id="1157" instrument_node="">What Is Figurative Language? Explained</span></h1><div class="entry-meta" data-dcnode-id="1145"><span data-dcnode-id="1155" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="1147" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="1154" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/author/lara-stewart/" itemprop="url" rel="author" title="View all posts by Lara Stewart"><span data-dcnode-id="1153" instrument_node="">
</span><span class="author-name" data-dcnode-id="1151" itemprop="name"><span data-dcnode-id="1152" instrument_node="">Lara Stewart</span></span><span data-dcnode-id="1150" instrument_node="">
</span></a><span data-dcnode-id="1148" instrument_node="">
</span></span><span data-dcnode-id="1146" instrument_node="">
</span></div><span data-dcnode-id="1144" instrument_node=""> </span></div><span data-dcnode-id="1142" instrument_node="">
</span></header><span data-dcnode-id="1139" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="720" itemprop="text"><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1135"><em data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">What is figurative language? In the simplest terms is writing that is not to be taken literally.&nbsp;Learn more about it in this article.</span></em></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">It’s likely that you already use&nbsp;figurative language&nbsp;all the time. When you say “this conference room is an icebox,” you’re comparing it metaphorically to a freezer. </span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Likewise, you probably use&nbsp;hyperbole,&nbsp;personification, and other figurative languages&nbsp;when working to paint a more vivid picture and help people understand what you mean. Read over the&nbsp;types of&nbsp;figurative language&nbsp;below to get a better understanding of these tools and to use them more purposefully in your writing.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1128" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1127" instrument_node="">
</span><div class="toc_white no_bullets contracted" data-dcnode-id="1099" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1119"><span data-dcnode-id="1126" instrument_node="">Contents</span><span data-dcnode-id="1125" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">[</span><a data-dcnode-id="1122" href="#"><span data-dcnode-id="1123" instrument_node="">show</span></a><span data-dcnode-id="1121" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1100" style="display: none;"><li data-dcnode-id="1116"><a data-dcnode-id="1117" href="#What_DoesnbspFigurative_LanguagenbspMean"><span data-dcnode-id="1118" instrument_node="">What Does&nbsp;Figurative Language&nbsp;Mean?</span></a></li><li data-dcnode-id="1113"><a data-dcnode-id="1114" href="#Why_We_Use_ThesenbspLiterary_Devices"><span data-dcnode-id="1115" instrument_node="">Why We Use These&nbsp;Literary Devices</span></a></li><li data-dcnode-id="1110"><a data-dcnode-id="1111" href="#CommonnbspTypes_ofnbspFigurative_Language"><span data-dcnode-id="1112" instrument_node="">Common&nbsp;Types of&nbsp;Figurative Language</span></a></li><li data-dcnode-id="1107"><a data-dcnode-id="1108" href="#The_Final_Word_on_What_IsnbspFigurative_Language"><span data-dcnode-id="1109" instrument_node="">The Final Word on What Is&nbsp;Figurative Language</span></a></li><li data-dcnode-id="1104"><a data-dcnode-id="1105" href="#FAQs_About_What_IsnbspFigurative_Language"><span data-dcnode-id="1106" instrument_node="">FAQs About What Is&nbsp;Figurative Language</span></a></li><li data-dcnode-id="1101"><a data-dcnode-id="1102" href="#Author"><span data-dcnode-id="1103" instrument_node="">Author</span></a></li></ul></div><span data-dcnode-id="1098" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1097" id="what-doesfigurative-languagemean"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1096" id="what-doesfigurative-languagemean"></span><h2 data-dcnode-id="1093"><span data-dcnode-id="1094" id="What_DoesnbspFigurative_LanguagenbspMean"><span data-dcnode-id="1095" instrument_node="">What Does&nbsp;Figurative Language&nbsp;Mean?</span></span></h2><span data-dcnode-id="1092" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1090"><img alt="What is figurative language?" class="wp-image-94465" data-dcnode-id="1091" data-src="https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-1024x614.pngw3.webp" data-srcset="https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-1024x614.pngw3.webp 1024w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-300x180.pngw3.webp 300w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-768x461.pngw3.webp 768w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-595xh.pngw3.webp 595w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-275x165.pngw3.webp 275w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language.pngw3.webp 1200w" height="614" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-1024x614.pngw3.webp&amp;raw" srcset="https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-1024x614.pngw3.webp 1024w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-300x180.pngw3.webp 300w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-768x461.pngw3.webp 768w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-595xh.pngw3.webp 595w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language-275x165.pngw3.webp 275w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2022/01/What-Is-Figurative-Language.pngw3.webp 1200w" width="1024"></figure><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Figurative language&nbsp;refers to words and phrases whose meaning is not completely congruent with their&nbsp;literal meanings. A person might be imbued with&nbsp;non-human&nbsp;characteristics, such as describing them as being as sleek as a cat. By the same token, we may assign an animal or object&nbsp;human qualities&nbsp;in&nbsp;examples of&nbsp;personification.</span></p><div class="adthrive" data-dcnode-id="1085" id="cls-video-container-iv6YAsPm" style="min-height: 381.375px;"><div data-dcnode-id="1086"></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1084" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">As a reader and a writer, an appreciation of these tools can deepen your understanding and your ability to communicate.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1079" id="why-we-use-theseliterary-devices"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1078" id="why-we-use-theseliterary-devices"></span><h2 data-dcnode-id="1075"><span data-dcnode-id="1076" id="Why_We_Use_ThesenbspLiterary_Devices"><span data-dcnode-id="1077" instrument_node="">Why We Use These&nbsp;Literary Devices</span></span></h2><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Metaphors are used, foremost, to help the reader understand. If you describe someone as someone who oozes when he walks, you are clearly describing an unsavory person. But, even more important than helping us see, metaphors help us feel. When we consider a person who oozes, it evokes a sensation of disgust. The image of a woman as the sun makes us see her in our minds as radiant.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1071" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1070" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1069" id="commontypes-offigurative-language"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1068" id="commontypes-offigurative-language"></span><h2 data-dcnode-id="1065"><span data-dcnode-id="1066" id="CommonnbspTypes_ofnbspFigurative_Language"><span data-dcnode-id="1067" instrument_node="">Common&nbsp;Types of&nbsp;Figurative Language</span></span></h2><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Figurative language&nbsp;can be roughly broken down into different types of words and phrases. These&nbsp;types of&nbsp;figurative language&nbsp;are ones many writers find useful:</span></p><span data-dcnode-id="1061" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1060" id="simileand-metaphor"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1059" id="simileand-metaphor"></span><h3 data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Simile&nbsp;and Metaphor</span></h3><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Simile&nbsp;and metaphor are related, but the mechanics are different. In a&nbsp;simile, an object and what it’s being compared to are linked with “like” or “as.”&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1053" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">A few&nbsp;examples of&nbsp;similes&nbsp;include:</span></p><span data-dcnode-id="1049" instrument_node="">
</span><ul data-dcnode-id="1042"><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">That runner is “fast as a&nbsp;cheetah.”</span></li><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">In his suit, he stood out like a sore thumb.</span></li><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Like a babe in the woods.</span></li></ul><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Metaphors, by contrast, use the comparison more directly, characterizing without like or as.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Examples of metaphors&nbsp;include:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1035" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1034" instrument_node="">
</span><ul data-dcnode-id="1024"><li data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">In&nbsp;</span><a data-dcnode-id="1031" data-lasso-id="89017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shakespeare.mit.edu/romeo_juliet/full.html" rel="noopener" target="_blank"><span data-dcnode-id="1032" instrument_node="">Romeo and Juliet</span></a><span data-dcnode-id="1030" instrument_node="">,&nbsp;Shakespeare&nbsp;describes Juliet as “the sun.”</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Her brother is a couch potato.</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">His eyes were chips of ice.</span></li></ul><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1022" instrument_node="">Read our guide to </span><a data-dcnode-id="1020" data-lasso-id="89020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/metaphor-examples-in-literature/"><span data-dcnode-id="1021" instrument_node="">metaphor examples from literature</span></a></p><span data-dcnode-id="1018" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1017" id="hyperbole"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1016" id="hyperbole"></span><h3 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Hyperbole</span></h3><span data-dcnode-id="1013" instrument_node="">
</span><div class="wp-block-image size-full" data-dcnode-id="1006"><figure class="aligncenter" data-dcnode-id="1007"><img alt="What is figurative language?" class="wp-image-87244" data-dcnode-id="1012" data-src="https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language.jpgw3.webp" data-srcset="https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language.jpgw3.webp 1000w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language-300x200.jpgw3.webp 300w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language-768x512.jpgw3.webp 768w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language-595xh.jpgw3.webp 595w" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language.jpgw3.webp&amp;raw" srcset="https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language.jpgw3.webp 1000w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language-300x200.jpgw3.webp 300w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language-768x512.jpgw3.webp 768w, https://cdn-bcmawriter.pressidium.com/wp-content/w3-webp/uploads/2021/11/What-Is-Figurative-Language-595xh.jpgw3.webp 595w" width="1000"><figcaption data-dcnode-id="1008"><span data-dcnode-id="1011" instrument_node="">Hyperbole example: </span><span data-dcnode-id="1009" style="color: var(--ast-global-color-3); font-size: 1rem;"><span data-dcnode-id="1010" instrument_node="">It was literally 1000 degrees in there</span></span></figcaption></figure></div><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Hyperbole&nbsp;replaces the&nbsp;literal meaning&nbsp;of a word with a figurative one that is exaggerated for emphasis. When you say, “it took him&nbsp;a million&nbsp;years,” you don’t mean that literal span of time, just that he was late.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1002" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Other&nbsp;examples of&nbsp;hyperbole&nbsp;include:</span></p><span data-dcnode-id="998" instrument_node="">
</span><ul data-dcnode-id="993"><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">It was literally 1000 degrees in there.</span></li><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">He cooked enough for an army.</span></li></ul><span data-dcnode-id="992" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="991" id="onomatopoeia"></span><span class="uag-toc__heading-anchor" data-dcnode-id="990" id="onomatopoeia"></span><h3 data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Onomatopoeia</span></h3><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Onomatopoeia&nbsp;describes&nbsp;figures of speech&nbsp;where the words evoke the actual sound of the thing that they describe.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Examples include:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="981" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="980" instrument_node="">
</span><ul data-dcnode-id="973"><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">the “ring” of a telephone</span></li><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">a clock’s “tick,”</span></li><li data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">a “knock” on the door.</span></li></ul><span data-dcnode-id="972" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="971" id="synecdoche"></span><span class="uag-toc__heading-anchor" data-dcnode-id="970" id="synecdoche"></span><h3 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Synecdoche</span></h3><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Synecdoches&nbsp;are a type of shorthand, where we use a part of something to stand in for the whole. If someone says “Chicago is going to the playoffs,” they mean a sports team from Chicago, not the city itself.&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="964" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Other examples include:</span></p><span data-dcnode-id="960" instrument_node="">
</span><ul data-dcnode-id="955"><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Legal will have to look it over.</span></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">I’ll get this to post.</span></li></ul><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">A closely related type of word is&nbsp;metonymy. A&nbsp;metonymy&nbsp;substitutes the name of an&nbsp;attribute&nbsp;or part of a thing for the thing itself. Someone may describe their car as their wheels, by example.&nbsp;</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Other&nbsp;metonymy&nbsp;includes:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="948" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="947" instrument_node="">
</span><ul data-dcnode-id="942"><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Give me a hand.</span></li><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">She swore an oath to the crown.</span></li></ul><span data-dcnode-id="941" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="940" id="personification"></span><span class="uag-toc__heading-anchor" data-dcnode-id="939" id="personification"></span><h3 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Personification</span></h3><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Personification&nbsp;is a subset of metaphors that gives&nbsp;inanimate objects&nbsp;human characteristics. Objects can be imbued with their own emotions, motivations, and movements in this&nbsp;figure of speech.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Examples can include:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="930" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><span data-dcnode-id="929" instrument_node="">
</span><ul data-dcnode-id="922"><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">a stubbornly stuck window.</span></li><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">an angry, red rash.</span></li><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">a howling wind.</span></li></ul><span data-dcnode-id="921" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="920" id="alliteration"></span><span class="uag-toc__heading-anchor" data-dcnode-id="919" id="alliteration"></span><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Alliteration</span></h3><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Alliteration&nbsp;is the use of the same letter or sound at the beginning of words that are used closely together in a sentence. This is one of the&nbsp;literary devices&nbsp;whose purpose is to make language more pleasing. It catches readers’ attention and encourages them to continue. It can also sometimes be used to link two ideas thematically.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="913" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">An example of the latter is the</span><a data-dcnode-id="909" data-lasso-id="89023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//training.npr.org/2016/12/13/beyond-the-5ws-what-should-you-ask-before-starting-a-story/" rel="noopener" target="_blank"><span data-dcnode-id="910" instrument_node=""> “5 Ws” of journalism</span></a><span data-dcnode-id="908" instrument_node="">: who, what, when, where, why. The&nbsp;alliteration&nbsp;makes them memorable and links them in the readers’ minds.&nbsp;</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Other examples include:</span></p><span data-dcnode-id="903" instrument_node="">
</span><ul data-dcnode-id="898"><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">the whistling wind.</span></li><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">A bad bag of beef jerky not worth the mandibular manipulation to masticate it.</span></li></ul><span data-dcnode-id="897" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="896" id="the-final-word-on-what-isfigurative-language"></span><span class="uag-toc__heading-anchor" data-dcnode-id="895" id="the-final-word-on-what-isfigurative-language"></span><h2 data-dcnode-id="892"><span data-dcnode-id="893" id="The_Final_Word_on_What_IsnbspFigurative_Language"><span data-dcnode-id="894" instrument_node="">The Final Word on What Is&nbsp;Figurative Language</span></span></h2><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The more you look, the more&nbsp;examples of&nbsp;figurative language&nbsp;you will see. Closely study works that resonate with you, whether they are blog posts, novels, or articles in the newspaper. Look at each sentence, and you will likely find many examples of this literary tool.&nbsp;</span></p><span data-dcnode-id="888" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="887" id="faqs-about-what-isfigurative-language"></span><span class="uag-toc__heading-anchor" data-dcnode-id="886" id="faqs-about-what-isfigurative-language"></span><h2 data-dcnode-id="883"><span data-dcnode-id="884" id="FAQs_About_What_IsnbspFigurative_Language"><span data-dcnode-id="885" instrument_node="">FAQs About What Is&nbsp;Figurative Language</span></span></h2><span data-dcnode-id="882" instrument_node="">
</span><div class="rank-math-block" data-dcnode-id="851" id="rank-math-faq"><span data-dcnode-id="881" instrument_node="">
</span><div class="rank-math-list" data-dcnode-id="853"><span data-dcnode-id="880" instrument_node="">
</span><div class="rank-math-list-item" data-dcnode-id="868" id="faq-question-1637009820837"><span data-dcnode-id="879" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="878" id="what-does-figurative-language-mean"></span><span class="uag-toc__heading-anchor" data-dcnode-id="877" id="what-does-figurative-language-mean"></span><h3 class="rank-math-question" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">What does “figurative language” mean?</span></h3><span data-dcnode-id="874" instrument_node="">
</span><div class="rank-math-answer" data-dcnode-id="870"><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Figurative language&nbsp;refers to language that is not meant to be taken literally. Rather, it is intended to be understood through comparisons or references.</span></p><span data-dcnode-id="871" instrument_node="">
</span></div><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span><div class="rank-math-list-item" data-dcnode-id="855" id="faq-question-1637009823068"><span data-dcnode-id="866" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="865" id="why-do-we-usefigures-of-speech"></span><span class="uag-toc__heading-anchor" data-dcnode-id="864" id="why-do-we-usefigures-of-speech"></span><h3 class="rank-math-question" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Why do we use&nbsp;figures of speech?</span></h3><span data-dcnode-id="861" instrument_node="">
</span><div class="rank-math-answer" data-dcnode-id="857"><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">On the surface, it may seem like you’ll be more easily understood speaking plainly and factually. However, having comparisons to other phenomena, objects, and experience makes it easier for your reader or listener to understand you.</span></p><span data-dcnode-id="858" instrument_node="">
</span></div><span data-dcnode-id="856" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="705" itemprop="headline"><span data-dcnode-id="706" instrument_node="">How To Write Dialogue That Sizzles: 14 Top Tips</span></h1><div class="entry-meta" data-dcnode-id="694"><span data-dcnode-id="704" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="696" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="703" instrument_node=""> </span><a class="url fn n" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/author/mark-oneill/" itemprop="url" rel="author" title="View all posts by Mark O'Neill"><span data-dcnode-id="702" instrument_node="">
</span><span class="author-name" data-dcnode-id="700" itemprop="name"><span data-dcnode-id="701" instrument_node="">Mark O'Neill</span></span><span data-dcnode-id="699" instrument_node="">

</span><div class="entry-content clear" data-dcnode-id="272" itemprop="text"><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="684"><em data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Writing&nbsp;effective dialogue&nbsp;can make all the difference between a bestseller and a door stopper. Learn about how to write dialogue in this article.</span></em></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Writing dialogue is one of the essentials for producing good books, regardless of whether it’s fiction or non-fiction. But the difference between good and bad dialogue comes down to the right word choices and how realistic it would sound if played out in real life.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Like everything else in life, there are established rules and norms for creating&nbsp;effective dialogue&nbsp;in your&nbsp;creative writing. Let’s take a look at how we can boost your dialogue writing skills from zero to a hundred in ten seconds.</span></p><span data-dcnode-id="677" instrument_node="">
</span><div class="toc_white no_bullets" data-dcnode-id="625" id="toc_container"><p class="toc_title" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Contents</span></p><ul class="toc_list" data-dcnode-id="626"><li data-dcnode-id="672"><a data-dcnode-id="673" href="#1_Give_Each_Speaker_A_New_Paragraph"><span data-dcnode-id="674" instrument_node="">1. Give Each Speaker A New Paragraph</span></a></li><li data-dcnode-id="669"><a data-dcnode-id="670" href="#2_Start_Every_Dialogue_Paragraph_With_An_Indent"><span data-dcnode-id="671" instrument_node="">2. Start Every Dialogue Paragraph With An Indent</span></a></li><li data-dcnode-id="666"><a data-dcnode-id="667" href="#3_Long_Dialogue_Paragraphs_Dont_Have_End_Quotations"><span data-dcnode-id="668" instrument_node="">3. Long Dialogue Paragraphs Don’t Have End Quotations</span></a></li><li data-dcnode-id="663"><a data-dcnode-id="664" href="#4_Use_Single_Quotes_If_The_Person_Speaking_Is_Quoting"><span data-dcnode-id="665" instrument_node="">4. Use Single Quotes If The Person Speaking Is Quoting</span></a></li><li data-dcnode-id="660"><a data-dcnode-id="661" href="#5_Separate_Actions_FromnbspDialogue"><span data-dcnode-id="662" instrument_node="">5. Separate Actions From&nbsp;Dialogue</span></a></li><li data-dcnode-id="657"><a data-dcnode-id="658" href="#6_Be_Sparing_With_ThenbspCommasnbspandnbspDashes"><span data-dcnode-id="659" instrument_node="">6. Be Sparing With The&nbsp;Commas&nbsp;and&nbsp;Dashes</span></a></li><li data-dcnode-id="654"><a data-dcnode-id="655" href="#7_Avoid_Punctuation_AfternbspEllipses"><span data-dcnode-id="656" instrument_node="">7. Avoid Punctuation After&nbsp;Ellipses</span></a></li><li data-dcnode-id="651"><a data-dcnode-id="652" href="#8_Study_Similar_Books_And_Scripts"><span data-dcnode-id="653" instrument_node="">8. Study Similar Books And Scripts</span></a></li><li data-dcnode-id="648"><a data-dcnode-id="649" href="#9_Consider_How_People_In_Real_Life_Use_Dialogue"><span data-dcnode-id="650" instrument_node="">9. Consider How People In Real Life Use Dialogue</span></a></li><li data-dcnode-id="645"><a data-dcnode-id="646" href="#10_Keep_Language_Punchy_And_Edit_Small_Talk"><span data-dcnode-id="647" instrument_node="">10. Keep Language Punchy And Edit Small Talk</span></a></li><li data-dcnode-id="642"><a data-dcnode-id="643" href="#11nbspUsenbspDialoguenbspTags"><span data-dcnode-id="644" instrument_node="">11.&nbsp;Use&nbsp;Dialogue&nbsp;Tags</span></a></li><li data-dcnode-id="639"><a data-dcnode-id="640" href="#12_Read_The_Spoken_Words_Out_Loud"><span data-dcnode-id="641" instrument_node="">12. Read The Spoken Words Out Loud</span></a></li><li data-dcnode-id="636"><a data-dcnode-id="637" href="#13_Give_Your_Characters_Unique_Dialogue_Traits"><span data-dcnode-id="638" instrument_node="">13. Give Your Characters Unique Dialogue Traits</span></a></li><li data-dcnode-id="633"><a data-dcnode-id="634" href="#14_Don8217t_Info-Dump_In_The_Dialogue"><span data-dcnode-id="635" instrument_node="">14. Don’t Info-Dump In The Dialogue</span></a></li><li data-dcnode-id="630"><a data-dcnode-id="631" href="#The_Final_Word_On_How_To_Write_Dialogue"><span data-dcnode-id="632" instrument_node="">The Final Word On How To Write Dialogue</span></a></li><li data-dcnode-id="627"><a data-dcnode-id="628" href="#Author"><span data-dcnode-id="629" instrument_node="">Author</span></a></li></ul></div><span data-dcnode-id="624" instrument_node="">
</span><h2 data-dcnode-id="621"><span data-dcnode-id="622" id="1_Give_Each_Speaker_A_New_Paragraph"><span data-dcnode-id="623" instrument_node="">1. Give Each Speaker A New Paragraph</span></span></h2><span data-dcnode-id="620" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="618"><img alt="How to write dialogue that sizzles?" class="wp-image-92902" data-dcnode-id="619" height="614" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles-1024x614.png&amp;raw" srcset="https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles-1024x614.png 1024w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles-300x180.png 300w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles-768x461.png 768w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles-595xh.png 595w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles-275x165.png 275w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2022/01/How-To-Write-Dialogue-That-Sizzles.png 1200w" width="1024"></figure><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Every time a character says something, you need to create a&nbsp;new paragraph. It doesn’t matter if they’re only saying one word or revealing how they caught the murderer. When there’s a&nbsp;new speaker, a&nbsp;new line&nbsp;starts. No exceptions.</span></p><span data-dcnode-id="614" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="611"><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">“As of now, you are suspended Captain” he said stiffly, “pending further enquiries of your actions. When I am asked, I will be recommending your dismissal from the service. Get out of my office.”</span></p></blockquote><span data-dcnode-id="610" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="607"><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">“Yes sir” said Decker, saluting. “thank you sir. Nice day to work on the tan, sir.”</span></p></blockquote><span data-dcnode-id="606" instrument_node="">
</span><h2 data-dcnode-id="603"><span data-dcnode-id="604" id="2_Start_Every_Dialogue_Paragraph_With_An_Indent"><span data-dcnode-id="605" instrument_node="">2. Start Every Dialogue Paragraph With An Indent</span></span></h2><span data-dcnode-id="602" instrument_node="">
</span><div class="wp-block-image size-full" data-dcnode-id="597"><figure class="aligncenter" data-dcnode-id="598"><img alt="How to write dialogue?" class="wp-image-86953" data-dcnode-id="601" height="490" sizes="(max-width: 882px) 100vw, 882px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-bcmawriter.pressidium.com/wp-content/uploads/2021/11/Dialogue_attribution.png&amp;raw" srcset="https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2021/11/Dialogue_attribution.png 882w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2021/11/Dialogue_attribution-300x167.png 300w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2021/11/Dialogue_attribution-768x427.png 768w, https://cdn-bcmawriter.pressidium.com/wp-content/uploads/2021/11/Dialogue_attribution-595xh.png 595w" width="882"><figcaption data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">You never start a paragraph with an&nbsp;indent&nbsp;is if it’s the start of a chapter or after a scene break</span></figcaption></figure></div><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">An indent is when you start a paragraph a couple of spaces further than where the sentence starts typically. So while the rest of the paragraph is lined up neatly against the margin, the indented paragraph has a space at the beginning.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The only time you never start a paragraph with an indent is if it’s the start of a chapter or after a scene break. The first line is never indented in these cases, even if it starts with a dialogue scene.</span></p><span data-dcnode-id="590" instrument_node="">
</span><h2 data-dcnode-id="587"><span data-dcnode-id="588" id="3_Long_Dialogue_Paragraphs_Dont_Have_End_Quotations"><span data-dcnode-id="589" instrument_node="">3. Long Dialogue Paragraphs Don’t Have End Quotations</span></span></h2><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">If one character speaks for an extended period, they need separate paragraphs to break up the text. In these situations, the quotation marks at the end of each paragraph are removed – but you use quotation marks at the start of the next paragraph. The closing quotation marks go at the end.</span></p><span data-dcnode-id="583" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="580"><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">“We know all men are not created equal in the sense some people would have us believe—some people are smarter than others, some people have more opportunity because they’re born with it, some men make more money than others, some ladies make better cakes than others—some people are born gifted beyond the normal scope of most men.</span></p></blockquote><span data-dcnode-id="579" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="576"><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">“But there is one way in this country in which all men are created equal—there is one human institution that makes a pauper the equal of a Rockefeller, the stupid man the equal of an Einstein, and the ignorant man the equal of any college president. That institution, gentlemen, is a court.”</span></p></blockquote><span data-dcnode-id="575" instrument_node="">
</span><h2 data-dcnode-id="572"><span data-dcnode-id="573" id="4_Use_Single_Quotes_If_The_Person_Speaking_Is_Quoting"><span data-dcnode-id="574" instrument_node="">4. Use Single Quotes If The Person Speaking Is Quoting</span></span></h2><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">If the character speaking is quoting someone else, that quote needs to be in single quotation marks, which then goes between double quotation marks.</span></p><span data-dcnode-id="568" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="565"><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">“As the saying goes” he said, “‘treat others like you’d like them to treat you’.”</span></p></blockquote><span data-dcnode-id="564" instrument_node="">
</span><h2 data-dcnode-id="561"><span data-dcnode-id="562" id="5_Separate_Actions_FromnbspDialogue"><span data-dcnode-id="563" instrument_node="">5. Separate Actions From&nbsp;Dialogue</span></span></h2><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">If an action precedes a line of dialogue, place it on separate lines.</span></p><span data-dcnode-id="557" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="554"><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">He crouched into attack mode, his pistol drawn.</span></p></blockquote><span data-dcnode-id="553" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="550"><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">“Drop your weapon and surrender now!”</span></p></blockquote><span data-dcnode-id="549" instrument_node="">
</span><h2 data-dcnode-id="546"><span data-dcnode-id="547" id="6_Be_Sparing_With_ThenbspCommasnbspandnbspDashes"><span data-dcnode-id="548" instrument_node="">6. Be Sparing With The&nbsp;Commas&nbsp;and&nbsp;Dashes</span></span></h2><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The worst thing you can do is go completely overboard with the commas and the dashes. As the saying goes “if in doubt, leave it out.”</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The same can be said for commas and dashes. Unless you’re sure a comma or a dash is needed, do your dialogue a favour and leave them out. If you have a good editor, they’ll likely take them out for you, but doing it yourself is a good habit to have. Plus it makes your editor bill cheaper.</span></p><span data-dcnode-id="539" instrument_node="">
</span><h2 data-dcnode-id="536"><span data-dcnode-id="537" id="7_Avoid_Punctuation_AfternbspEllipses"><span data-dcnode-id="538" instrument_node="">7. Avoid Punctuation After&nbsp;Ellipses</span></span></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="532"><mark data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Ellipses are the dots at the end of a sentence that indicates a character’s voice is trailing off after saying something.</span></mark></p><span data-dcnode-id="531" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="528"><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">“I hope we caught all of the terrorists” he said, “but you never know……”</span></p></blockquote><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">If you have ellipses at the end of a sentence, there shouldn’t be any other punctuation such as commas, question marks, or exclamation points. In fact, exclamation points should be used extremely rarely overall. Let your dialogue show the reader the tone of the character’s voice. If you feel the need to add exclamation points to the end of a sentence, your dialogue isn’t very good.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Now that we’ve covered grammar, let’s look at other areas for improving your dialogue writing. Whether it’s a book or a short story, these following steps will turbocharge your writing dialogue in no time.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h2 data-dcnode-id="518"><span data-dcnode-id="519" id="8_Study_Similar_Books_And_Scripts"><span data-dcnode-id="520" instrument_node="">8. Study Similar Books And Scripts</span></span></h2><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">An author should always be reading, especially books and scripts in their genre. They need to see what their competitors are up to and study what’s working and what’s not. One of the things that should be closely studied is good dialogue, especially dialogue formatting.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Pick up a book or a script by a popular author or screenwriter in your genre and closely study each line of dialogue, the character’s voice and the character’s personality. See how the author or screenwriter has constructed the dialogue and what makes it work.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">There’s a reason that author is successful, so you should be taking copious notes on their style and examples of dialogue and working it into your prose.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h2 data-dcnode-id="505"><span data-dcnode-id="506" id="9_Consider_How_People_In_Real_Life_Use_Dialogue"><span data-dcnode-id="507" instrument_node="">9. Consider How People In Real Life Use Dialogue</span></span></h2><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">The best place to hear realistic dialogue is out in real life. So get outside for a walk and start listening to people’s conversations.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Look out for body language, speech patterns, mannerisms, local slang, and small talk. Noticing how two people interact with one another in real life ensures a higher degree of authenticity when writing your own dialogue. Notice if they use contractions (most likely, they are unless they’re speaking English as a foreign language). Listen out for common greetings, catchphrases, and pithy comebacks.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="497" instrument_node="">Whether you write in the </span><a data-dcnode-id="495" data-lasso-id="91858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandem.net/blog/introduction-to-english-accents" rel="noopener" target="_blank"><span data-dcnode-id="496" instrument_node="">first or third person</span></a><span data-dcnode-id="494" instrument_node="">, the best exchanges worth listening to are arguments. If you want to hear snappy, realistic dialogue, you can’t go wrong with a fight. Just don’t get involved in it.</span></p><span data-dcnode-id="492" instrument_node="">
</span><h2 data-dcnode-id="489"><span data-dcnode-id="490" id="10_Keep_Language_Punchy_And_Edit_Small_Talk"><span data-dcnode-id="491" instrument_node="">10. Keep Language Punchy And Edit Small Talk</span></span></h2><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Nobody likes long tedious sermons and monologues. If they wanted that, they’d talk to their parents. There are rare occasions&nbsp;when an author can get away with it, but on the whole, avoid long diatribes&nbsp;like the plague.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Keep the language short, snappy, and punchy. Readers love verbal exchanges, especially if it resembles two boxers taking jabs at one another. Cut out all unnecessary words (for example, use “very” instead of “very, very”), and don’t use a complicated word when a simpler one will do. One classic example of this is “utilise” when you could just say “use”, or my special pet hate which is “plethora” when you can say “lots”.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Remember, the whole point of a story is to keep the reader hooked. Once you start slowing down the story with turgid prose and thesaurus-level words, the reader will start to get bored and look for something more exciting to read.</span></p><span data-dcnode-id="479" instrument_node="">
</span><h2 data-dcnode-id="474"><span data-dcnode-id="475" id="11nbspUsenbspDialoguenbspTags"><span data-dcnode-id="478" instrument_node="">11.&nbsp;</span><mark data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Use&nbsp;Dialogue&nbsp;Tags</span></mark></span></h2><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">A dialogue tag is a part of the sentence that indicates who’s talking. So things like “he said”, “she said”, “Martin said”, and so on. These are essential to help the reader keep track of who’s saying what. However, if there are only two people in the conversation, dialogue tags only need to be used the first time to show who started the exchange.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">There are three important rules to remember though about dialogue tags. The first is, don’t overuse them. Every line of dialogue doesn’t have to end with a “He said” or “She said”. That drags the conversation down.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Second, when using a dialogue tag, try to stick to “he said” and “she said”. Or instead of he and she, use the character’s name. Try to avoid using other words in place of “said”, such as “shouted”, “mused”, “muttered”, and “exclaimed”. I’m guilty of the odd shouting, musing, and exclaiming myself, but on the whole, I try to cut it out of my writing.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The third rule is that whenever a dialogue tag splits up a line of dialogue in the middle, the tag must be in lowercase letters. So, for example:</span></p><span data-dcnode-id="461" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="458"><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">“I want to believe you” she said, “but you’re not making it easy for me.”</span></p></blockquote><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="454"><span data-dcnode-id="455" id="12_Read_The_Spoken_Words_Out_Loud"><span data-dcnode-id="456" instrument_node="">12. Read The Spoken Words Out Loud</span></span></h2><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">If you get into the flow while writing dialogue, you may inadvertently write something that doesn’t make sense. It happens – when the words are flying out of your head and onto the page, it doesn’t always make sense.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">That’s why I always like to read back aloud the dialogue I’ve just written. I can see if the words flow smoothly, if the words and tone match the characters’ intended moods, and if something sounds a bit out of place. I’ve quite often written my best dialogue after reading back aloud the first draft to myself and thinking “THAT doesn’t sound right.”</span></p><span data-dcnode-id="447" instrument_node="">
</span><h2 data-dcnode-id="444"><span data-dcnode-id="445" id="13_Give_Your_Characters_Unique_Dialogue_Traits"><span data-dcnode-id="446" instrument_node="">13. Give Your Characters Unique Dialogue Traits</span></span></h2><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="439"><mark data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Character development</span></mark><span data-dcnode-id="440" instrument_node="">&nbsp;is what matures your book series. In book one, your characters may start off being a bit one-dimensional, but as the series progresses, they develop into something a bit more three-dimensional. Eventually, your readers are so attached to them that they’re buying the next book because they miss your characters.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">One of the things you can do to develop your&nbsp;</span><a data-dcnode-id="435" data-lasso-id="91861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/what-are-foil-characters/"><span data-dcnode-id="436" instrument_node="">foil characters</span></a><span data-dcnode-id="434" instrument_node="">&nbsp;is to give them unique dialogue traits. In other words, every person speaks in different ways, whether it’s a&nbsp;</span><a data-dcnode-id="432" data-lasso-id="91864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandem.net/blog/introduction-to-english-accents" rel="noopener" target="_blank"><span data-dcnode-id="433" instrument_node="">posh accent</span></a><span data-dcnode-id="431" instrument_node="">, tone of voice, or a favourite catchphrase.&nbsp;</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Some people stutter some are always sarcastic, others are constantly joking, while a few are deadly serious. These characteristics will determine how they talk and the phrases they come out with.&nbsp;</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">So try and give each of your characters a unique way of talking. It helps to broaden their persona and make them either more likeable or more detestable.</span></p><span data-dcnode-id="423" instrument_node="">
</span><h2 data-dcnode-id="420"><span data-dcnode-id="421" id="14_Don8217t_Info-Dump_In_The_Dialogue"><span data-dcnode-id="422" instrument_node="">14. Don’t Info-Dump In The Dialogue</span></span></h2><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">This is a trap that many authors fall into, especially if they need to give the reader a lot of back-stories. It’s similar to what I was saying about lengthy monologues – nobody wants vast amounts of information dumped on them in the story, and this applies to dialogue.</span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Your characters shouldn’t start lengthy speeches where they offer lots of back-story to the reader. It’s too much to take in at once and it halts the story’s momentum if the reader is having to process the back-story.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Instead, gradually work the back-story in&nbsp;via things like flashbacks. A couple of paragraphs. can be dedicated to one flashback, then it’s back to the main story again. Don’t set up a character to begin a two-chapter detailed sermon on how they managed to escape Planet Earth before the Apocalypse.</span></p><span data-dcnode-id="410" instrument_node="">
</span><h2 data-dcnode-id="407"><span data-dcnode-id="408" id="The_Final_Word_On_How_To_Write_Dialogue"><span data-dcnode-id="409" instrument_node="">The Final Word On How To Write Dialogue</span></span></h2><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">You can learn the art of writing dialogue by observing real life. We talk every day in various situations, and if you have a notebook handy, you can record some useful exchanges for your next short story or book.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Remember, however, there’s good dialogue and bad dialogue. The difference can either make your book a success or sink it without a trace. So it’s worth the time investment in getting it perfect.</span></p><span data-dcnode-id="400" instrument_node="">
</span><span data-dcnode-id="398" instrument_node="">
