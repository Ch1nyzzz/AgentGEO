</span><h2 data-dcnode-id="4094" id="section---FigurativeLanguageInPoetry"><span data-dcnode-id="4095" instrument_node="">Figurative Language in Poetry</span></h2><p data-dcnode-id="4089"><span data-dcnode-id="4093" instrument_node="">The use of </span><b data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">figurative language in poetry</span></b><span data-dcnode-id="4090" instrument_node=""> is a way for writers to create a link or comparison between concrete objects and abstract ideas by using basic words or phrases in a non-literal way to draw on the emotions of the reader. Often times the writers will play on the senses in order to draw out powerful connections, allowing the reader to imagine how things may taste, smell, feel, look or sound. Figurative language and literary devices are meant to make reading poetry an enjoyable experience. For example, alliteration and consonance play on the way that words sound, allowing the words to flow together in a pleasing way. Similes, metaphors, and personification are three of the most frequently used forms of figurative language in poetry, and they are used to create mental associations between the concrete and the abstract to form one big picture. </span></p><span data-dcnode-id="4088" instrument_node="">
</span></article><span data-dcnode-id="4086" instrument_node="">

</span><h2 data-dcnode-id="3645" id="section---FigurativeLanguageList"><span data-dcnode-id="3646" instrument_node="">Figurative Language List</span></h2><p data-dcnode-id="3640"><span data-dcnode-id="3644" instrument_node="">Below is a list of many of the most commonly used forms of </span><b data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">figurative language</span></b><span data-dcnode-id="3641" instrument_node=""> and literary devices in poetry. </span></p><ul data-dcnode-id="3605"><span data-dcnode-id="3639" instrument_node="">
</span><li data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Simile: Used to describe one thing by comparing it to another in order to strengthen a description. Examples of a simile would be "she was as sweet as pie" and "life is like a box of chocolates." </span></li><span data-dcnode-id="3636" instrument_node="">
</span><li data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">Metaphor: A figure of speech where a word or phrase is used to describe something in a way that is not physically possible. For example, "the world is your oyster" and "your bedroom is a pigsty" are both metaphors. </span></li><span data-dcnode-id="3633" instrument_node="">
</span><li data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Personification: The assignment of human characteristics to something nonhuman. Examples would be "the wind howled" and "her joints complained." </span></li><span data-dcnode-id="3630" instrument_node="">
</span><li data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Idiom: A saying or expression with a figurative meaning different from the literal meaning. "She spilled the beans" and "take it with a grain of salt" are examples of idioms. </span></li><span data-dcnode-id="3627" instrument_node="">
</span><li data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Onomatopoeia: A word that is formed based on vocal imitation and used to describe the sound something makes. Words such as "sizzle," "tick tock," "ding-dong," and "buzz" are all onomatopoeias. </span></li><span data-dcnode-id="3624" instrument_node="">
</span><li data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">Hyperbole: Speech that is extremely exaggerated and not meant to be taken literally. For example, "she talks a mile a minute" and "I'm so embarrassed I could die" are both hyperboles. </span></li><span data-dcnode-id="3621" instrument_node="">
</span><li data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Consonance: The repetition of similar consonant sounds within a literary work. One example would be the common tongue twister, "she sells seashells by the seashore." The "s" and "sh" sounds are used repeatedly. </span></li><span data-dcnode-id="3618" instrument_node="">
</span><li data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">Assonance: Similar to consonance, but focuses on vowels and vowel sounds. "Light my fire" would be an example of assonance, as all three words have the long "i" sound. </span></li><span data-dcnode-id="3615" instrument_node="">
</span><li data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">Alliteration: Similar to both consonance and assonance, alliteration is the repetition of a letter or sound at the beginning of closely placed words. "Lilly looks lovely looking at lightning" is an example of alliteration. </span></li><span data-dcnode-id="3612" instrument_node="">
</span><li data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">Paradox: A figure of speech where a statement contradicts itself. For example, "the beginning of the end" and "if I know one thing, it's that I know nothing" are both paradoxical statements. </span></li><span data-dcnode-id="3609" instrument_node="">
</span><li data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Litotes: A figure of speech where a negative phrase is used to express something positive, an intentional understatement. "You're not wrong" and "I can't say that it didn't hurt" are both examples of litotes. </span></li><span data-dcnode-id="3606" instrument_node="">
</span></ul><p data-dcnode-id="3604"></p><span data-dcnode-id="3603" instrument_node="">

</span><p data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Photograph of Edgar Allan Poe, 1849</span></p><span data-dcnode-id="3599" instrument_node="">
</span></caption><tbody data-dcnode-id="3589"><tr data-dcnode-id="3591"><td data-dcnode-id="3593"><img alt="Edgar Allan Poe, 1849" data-dcnode-id="3594" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/edgar_allan_poe_circa_1849_restored_squared_off5376224902814801834.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3586"></p><h2 data-dcnode-id="3584" id="section---FigurativeLanguageExamples"><span data-dcnode-id="3585" instrument_node="">Figurative Language Examples</span></h2><p data-dcnode-id="3579"><span data-dcnode-id="3583" instrument_node="">Figurative language is frequently used in poetry to help elicit emotion and build imagery. Below are some examples of </span><b data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">poems using figurative language. </span></b><span data-dcnode-id="3580" instrument_node=""> </span></p><p data-dcnode-id="3575"><b data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">-Simile</span></b><span data-dcnode-id="3576" instrument_node=""> </span></p><p data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">"Like a bruised, little bird </span></p><p data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Too confused to fly, </span></p><p data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">I'm trapped, in a word, </span></p><p data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">So confined am I." </span></p><p data-dcnode-id="3562"><span data-dcnode-id="3566" instrument_node="">- </span><i data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Greater Than That</span></i><span data-dcnode-id="3563" instrument_node="">, Joyce Garacci </span></p><p data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">_____ </span></p><p data-dcnode-id="3556"><b data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">-Metaphor</span></b><span data-dcnode-id="3557" instrument_node=""> </span></p><p data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">"A captive, collared lion </span></p><p data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Alone in its pen, </span></p><p data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">I'm pacin' and dyin' </span></p><p data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">In a manmade den." </span></p><p data-dcnode-id="3543"><span data-dcnode-id="3547" instrument_node="">- </span><i data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Greater Than That</span></i><span data-dcnode-id="3544" instrument_node="">, Joyce Garacci </span></p><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">_____ </span></p><p data-dcnode-id="3537"><b data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">-Personification</span></b><span data-dcnode-id="3538" instrument_node=""> </span></p><p data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">"Sing to me, Autumn, with the rustle of your leaves. </span></p><p data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Breathe on me your spicy scents that flow within your breeze." </span></p><p data-dcnode-id="3529"><i data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Sing To Me, Autumn</span></i><span data-dcnode-id="3530" instrument_node="">, Patricia L. Cisco </span></p><p data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">_____ </span></p><p data-dcnode-id="3523"><b data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">-Idiom</span></b><span data-dcnode-id="3524" instrument_node=""> </span></p><p data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">"Though this be madness, yet there is method in't." </span></p><p data-dcnode-id="3517"><i data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Hamlet</span></i><span data-dcnode-id="3518" instrument_node="">, Shakespeare </span></p><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">_____ </span></p><p data-dcnode-id="3511"><b data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">-Onomatopoeia</span></b><span data-dcnode-id="3512" instrument_node=""> </span></p><span data-dcnode-id="3510" instrument_node="">
</span><div class="hidden" data-dcnode-id="3366" ng-non-bindable=""><p data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">"I heard the ripple washing in the reeds, </span></p><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">And the wild water lapping on the crag." </span></p><p data-dcnode-id="3502"><i data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Morte D'Arthur</span></i><span data-dcnode-id="3503" instrument_node="">, Alfred Lord Tennyson </span></p><p data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">_____ </span></p><p data-dcnode-id="3496"><b data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">-Hyperbole</span></b><span data-dcnode-id="3497" instrument_node=""> </span></p><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">"A hundred years should go to praise </span></p><p data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Thine eyes and on thy forehead gaze; </span></p><p data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Two hundred to adore each breast; </span></p><p data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">But thirty thousand to the rest." </span></p><p data-dcnode-id="3484"><i data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">To His Coy Mistress</span></i><span data-dcnode-id="3485" instrument_node="">, Andrew Marvell </span></p><p data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">_____ </span></p><p data-dcnode-id="3478"><b data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">-Consonance</span></b><span data-dcnode-id="3479" instrument_node=""> </span></p><p data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">"I'll swing by my ankles. </span></p><p data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">She'll cling to your knees. </span></p><p data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">As you hang by your nose, </span></p><p data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">From a high-up trapeze. </span></p><p data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">But just one thing, please, </span></p><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">As we float through the breeze, </span></p><p data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">Don't sneeze." </span></p><p data-dcnode-id="3460"><i data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">The Acrobats</span></i><span data-dcnode-id="3461" instrument_node="">, Shel Silverstein </span></p><p data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">_____ </span></p><p data-dcnode-id="3454"><b data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">-Assonance</span></b><span data-dcnode-id="3455" instrument_node=""> </span></p><p data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">"Ah, distinctly I remember it was in the bleak December, </span></p><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">And each separate dying ember wrought its ghost upon the floor. </span></p><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Eagerly I wished the morrow; - vainly I had sought to borrow </span></p><p data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">From my books surcease of sorrow - sorrow for the lost Lenore - </span></p><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">For the rare and radiant maiden whom the angels named Lenore - </span></p><p data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">Nameless here for evermore" </span></p><p data-dcnode-id="3438"><i data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">The Raven</span></i><span data-dcnode-id="3439" instrument_node="">, Edgar Allan Poe </span></p><p data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">_____ </span></p><p data-dcnode-id="3432"><b data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">-Alliteration</span></b><span data-dcnode-id="3433" instrument_node=""> </span></p><p data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">"Peter Piper picked a peck of pickled peppers, </span></p><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">A peck of pickled peppers Peter Piper picked; </span></p><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">If Peter Piper picked a peck of pickled peppers, </span></p><p data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Where's the peck of pickled peppers Peter Piper picked?" </span></p><p data-dcnode-id="3420"><i data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Peter Piper</span></i><span data-dcnode-id="3421" instrument_node="">, John Harris </span></p><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">_____ </span></p><p data-dcnode-id="3414"><b data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">-Paradox</span></b><span data-dcnode-id="3415" instrument_node=""> </span></p><p data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">"I could just remember how my father used to say that the reason for living was to get ready to stay dead a long time." </span></p><p data-dcnode-id="3408"><i data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">As I Lay Dying</span></i><span data-dcnode-id="3409" instrument_node="">, William Faulkner </span></p><p data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">_____ </span></p><p data-dcnode-id="3402"><b data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">-Litotes</span></b><span data-dcnode-id="3403" instrument_node=""> </span></p><p data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">"No, 'tis not so deep as a well nor so wide as a </span></p><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">church-door, but 'tis enough, 'twill serve. Ask for </span></p><p data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">me tomorrow, and you shall find me a grave man." </span></p><p data-dcnode-id="3392"><i data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Romeo and Juliet</span></i><span data-dcnode-id="3393" instrument_node="">, William Shakespeare </span></p><p data-dcnode-id="3391"></p><span data-dcnode-id="3390" instrument_node="">

</span></caption><tbody data-dcnode-id="3376"><tr data-dcnode-id="3378"><td data-dcnode-id="3380"><img alt="Romeo and Juliet Title Page" data-dcnode-id="3381" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/160px-romeo_and_juliet_q1_title_page8058753334212046216.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3373"></p><h2 data-dcnode-id="3371" id="section---LessonSummary"><span data-dcnode-id="3372" instrument_node="">Lesson Summary</span></h2><p data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Literary devices are used to enhance the reading experience in a number of ways. Some focus on adding depth and resonance to descriptions, the most common being metaphors, similes, and personification. Others, such as alliteration, consonance, and assonance, add to the sound and flow of the words on the page. </span></p><p data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">It is important to note that some forms of figurative language can possess many meanings, and oftentimes the author will use that to their advantage. For example, metaphors can seem straightforward upon first glance, but if you take the time to look more closely, you will may realize that the author meant something else entirely. If you come across a metaphor in a poem, write down your first impression then finish reading the poem. After you have completed the poem, return to the metaphor and try to consider other meanings the author may have intended based on the context that followed. You may be surprised to find that your initial understanding has changed. This is just another way that figurative language adds to the reader's experience.</span></p></div><span data-dcnode-id="3365" instrument_node="">
</span></div><span data-dcnode-id="3363" instrument_node="">
</span><div class="article-cutoff-div" data-dcnode-id="3348"><span data-dcnode-id="3362" instrument_node="">

</span><h4 data-dcnode-id="3334" itemprop="name"><span data-dcnode-id="3335" instrument_node="">What is figurative language?</span></h4><span data-dcnode-id="3333" instrument_node="">
</span><div data-dcnode-id="3325" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3332" instrument_node="">
</span><div data-dcnode-id="3327" itemprop="text"><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Figurative language is used to create comparisons between two things in a way that is abstract or symbolic rather than literal in order play on the reader's senses in a way that allows a deeper understanding. Similes, metaphors, idioms, and hyperboles are all forms of literary devices.</span></p><span data-dcnode-id="3328" instrument_node="">
</span></div><span data-dcnode-id="3326" instrument_node="">
</span></div><span data-dcnode-id="3324" instrument_node="">
</span></div><span data-dcnode-id="3322" instrument_node="">
</span><div data-dcnode-id="3308" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3321" instrument_node="">
</span><h4 data-dcnode-id="3319" itemprop="name"><span data-dcnode-id="3320" instrument_node="">What is figurative language in poetry?</span></h4><span data-dcnode-id="3318" instrument_node="">
</span><div data-dcnode-id="3310" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3317" instrument_node="">
</span><div data-dcnode-id="3312" itemprop="text"><span data-dcnode-id="3316" instrument_node="">
</span><p data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">All good literary works use figurative language and poetry is no exception. Bursting with figurative language, poetry uses literary devices to inflict strong emotion on the reader as well as assist in continuity. For example, devices such as similes, metaphors and hyperboles are descriptive while alliteration, consonance, and assonance have more to do with the sound of the words as they flow together.</span></p><span data-dcnode-id="3313" instrument_node="">
</span></div><span data-dcnode-id="3311" instrument_node="">
</span></div><span data-dcnode-id="3309" instrument_node="">
</span></div><span data-dcnode-id="3307" instrument_node="">
</span><div data-dcnode-id="3293" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3306" instrument_node="">
</span><h4 data-dcnode-id="3304" itemprop="name"><span data-dcnode-id="3305" instrument_node="">How do you identify figurative language in a poem?</span></h4><span data-dcnode-id="3303" instrument_node="">
</span><div data-dcnode-id="3295" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3302" instrument_node="">
</span><div data-dcnode-id="3297" itemprop="text"><span data-dcnode-id="3301" instrument_node="">
</span><p data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Whether it be a novel or a poem, there are many things the reader can look for to identify figurative language in a piece. For example, similes will contain the words "like" or "as." Most commonly, if the reader wants to identify figurative language, they should first look for comparisons and sentences that use imagery beyond what the literal meanings would allow.</span></p><span data-dcnode-id="3298" instrument_node="">
