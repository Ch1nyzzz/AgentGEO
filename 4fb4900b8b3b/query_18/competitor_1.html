</span><p data-dcnode-id="1110"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/figurative-language/"><span data-dcnode-id="1140" instrument_node="">Figurative Languages</span></a><span data-dcnode-id="1138" instrument_node=""> are words and expressions used in poems and texts to convey various meanings and interpretations from the literal meaning. Figurative devices </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/play/"><span data-dcnode-id="1137" instrument_node="">play</span></a><span data-dcnode-id="1135" instrument_node=""> major while writing poems, </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/sonnet/"><span data-dcnode-id="1134" instrument_node="">sonnets</span></a><span data-dcnode-id="1132" instrument_node="">, or ballads. They are the best tool for a writer to appeal to the senses of the reader. These devices give the reader detailed, vivid, and expressive insights. It also gives dimension to poetry and allows the writer to say things with additional flair and color. The most common techniques of </span><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/figurative-language/"><span data-dcnode-id="1131" instrument_node="">figurative languages</span></a><span data-dcnode-id="1129" instrument_node=""> you can find in poetry are </span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/simile/"><span data-dcnode-id="1128" instrument_node="">Simile</span></a><span data-dcnode-id="1126" instrument_node="">, </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/metaphor/"><span data-dcnode-id="1125" instrument_node="">Metaphor</span></a><span data-dcnode-id="1123" instrument_node="">, </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/symbolism/"><span data-dcnode-id="1122" instrument_node="">Symbolism</span></a><span data-dcnode-id="1120" instrument_node="">, </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/alliteration/"><span data-dcnode-id="1119" instrument_node="">Alliteration</span></a><span data-dcnode-id="1117" instrument_node="">, </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/hyperbole/"><span data-dcnode-id="1116" instrument_node="">Hyperbole</span></a><span data-dcnode-id="1114" instrument_node="">, and many more. For a detailed list refer to this article: </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/figurative-language/"><span data-dcnode-id="1113" instrument_node="">https://literarydevices.net/figurative-language/.&nbsp;</span></a><span data-dcnode-id="1111" instrument_node="">Here are a few examples of figurative languages in a poetry</span></p><div class="code-block code-block-1" data-dcnode-id="1097" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1109" instrument_node="">
</span><div data-dcnode-id="1099" id="ezoic-pub-ad-placeholder-106"><span data-dcnode-id="1108" instrument_node="">
</span><div class="ad_first_paragraph" data-dcnode-id="1100" style="text-align: center; margin-top:15px;margin-bottom:15px;"><span data-dcnode-id="1106" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3251641771602819" data-ad-format="auto" data-ad-slot="4069662201" data-dcnode-id="1105" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1104" instrument_node="">
</span><span data-dcnode-id="1101" instrument_node="">
</span></div></div><span data-dcnode-id="1098" instrument_node="">
</span></div><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1089"><strong data-dcnode-id="1090"><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/ode-to-a-nightingale/"><span data-dcnode-id="1095" instrument_node="">Ode to a Nightingale</span></a><span data-dcnode-id="1093" instrument_node=""> – </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/john-keats/"><span data-dcnode-id="1092" instrument_node="">John Keats</span></a></strong></p><div class="code-block code-block-8" data-dcnode-id="1084" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1088" instrument_node="">
</span><div data-dcnode-id="1086" id="ezoic-pub-ad-placeholder-107"><span data-dcnode-id="1087" instrument_node=""> </span></div><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><blockquote data-dcnode-id="1059"><p data-dcnode-id="1060"><span data-dcnode-id="1082" instrument_node="">My heart aches, and a drowsy numbness pains</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
My sense, as though of hemlock I had drunk,..</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
O for a beaker full of the warm South,</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
Full of the true, the blushful Hippocrene,….</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
Where </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/beauty/"><span data-dcnode-id="1073" instrument_node="">Beauty</span></a><span data-dcnode-id="1071" instrument_node=""> cannot keep her lustrous eyes,</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
Or new Love pine at them beyond to-morrow…</span><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">
White hawthorn, and the pastoral eglantine;</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
Fast fading violets cover’d up in leaves;…</span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">
Forlorn! the very word is like a bell</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">
To toll me back from thee to my sole self!</span></p></blockquote><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1045"><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/ode-to-a-nightingale/"><span data-dcnode-id="1057" instrument_node="">Ode to a Nightingale</span></a><span data-dcnode-id="1055" instrument_node=""> is an extraordinary </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/poem/"><span data-dcnode-id="1054" instrument_node="">poem</span></a><span data-dcnode-id="1052" instrument_node=""> that relates life’s suffering to the briefness of bird’s song. Here simile is used to compare abandonment or loneliness to a bell. In the line, “for a beaker full of the warm south”. The poet has used a metaphor to compare liquid with south country weather. In the </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/verse/"><span data-dcnode-id="1051" instrument_node="">verse</span></a><span data-dcnode-id="1049" instrument_node="">, “where beauty cannot keep her lustrous eyes” beauty is personified. The poet has used the </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/apostrophe/"><span data-dcnode-id="1048" instrument_node="">apostrophe</span></a><span data-dcnode-id="1046" instrument_node=""> in “Thou wast not born for death, immortal Bird”. Here, he is directly addressing the bird.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1041"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Tartary- Walter De La Mare</span></strong></p><span data-dcnode-id="1040" instrument_node="">
</span><blockquote data-dcnode-id="1028"><p data-dcnode-id="1036"><span data-dcnode-id="1039" instrument_node="">And in the evening lamps would shine,</span><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">
Yellow as honey, red as wine,</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1034" instrument_node="">Her bird-delighting, citron </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/trees/"><span data-dcnode-id="1033" instrument_node="">trees</span></a><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
In every purple vale!</span></p></blockquote><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1026" instrument_node="">In the above lines, the poet uses the simile explicitly way. Yellow is compared to honey and red is to wine. The poet uses hyperbole for </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/exaggeration/"><span data-dcnode-id="1025" instrument_node="">exaggeration</span></a><span data-dcnode-id="1023" instrument_node="">, and for glorifying his dream. “The evening lamp would shine, yellow as honey red as wine.” Here, the poet exaggerates the colors of light. The implicit </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/comparison/"><span data-dcnode-id="1022" instrument_node="">comparison</span></a><span data-dcnode-id="1020" instrument_node=""> draws through metaphor as ‘In every purple vale’.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1015"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Daffodils – W. W. Worth</span></strong></p><span data-dcnode-id="1014" instrument_node="">
</span><blockquote data-dcnode-id="999"><p data-dcnode-id="1000"><span data-dcnode-id="1013" instrument_node="">&nbsp;</span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/i-wandered-lonely-as-a-cloud/"><span data-dcnode-id="1012" instrument_node="">I wandered lonely as a cloud</span></a><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">
That floats on high o’er vales and hills,</span><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">
When all at once I saw a crowd,</span><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">
A host, of golden daffodils;</span><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">
Beside the lake, beneath the trees,…</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">
And dances with the daffodils.</span></p></blockquote><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="997" instrument_node="">In the first line, ‘I wandered lonely as a cloud’ The poet compares himself to a cloud by using a simile. Alliteration is used in ‘Beside the lake, beneath the trees, And dances with the daffodils’. The sounds of ‘b’ and ‘d’ are in </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/repetition/"><span data-dcnode-id="996" instrument_node="">repetition</span></a><span data-dcnode-id="994" instrument_node="">. The poet has personified the daffodils as if </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/the-flower/"><span data-dcnode-id="993" instrument_node="">the flowers</span></a><span data-dcnode-id="991" instrument_node=""> can dance.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="985"><span data-dcnode-id="988" instrument_node="">Because I could not stop for death – </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/emily-dickinson/"><span data-dcnode-id="987" instrument_node="">Emily Dickinson</span></a></strong></p><span data-dcnode-id="983" instrument_node="">
</span><blockquote data-dcnode-id="968"><p data-dcnode-id="974"><span data-dcnode-id="982" instrument_node="">He kindly stopped for me</span><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">
The Carriage held but just Ourselves…</span><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
We passed the </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/setting/"><span data-dcnode-id="977" instrument_node="">Setting</span></a><span data-dcnode-id="975" instrument_node=""> Sun&nbsp;–</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="972" instrument_node="">We paused before a House that seemed</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">
A Swelling of the Ground&nbsp;–</span></p></blockquote><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="966" instrument_node="">In this poem, death is personified as a male suitor throughout the poem, driving the cart slowly. The carriage is a metaphor for the final journey. The house is a metaphor for grave. Sunset is the </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/symbolism/"><span data-dcnode-id="965" instrument_node="">symbol</span></a><span data-dcnode-id="963" instrument_node=""> for the </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/foreshadowing/"><span data-dcnode-id="962" instrument_node="">foreshadowing</span></a><span data-dcnode-id="960" instrument_node=""> of death or old age.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="952"><strong data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">All the world’s a stage – </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/william-shakespeare/"><span data-dcnode-id="956" instrument_node="">William Shakespeare</span></a><span data-dcnode-id="954" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong></p><span data-dcnode-id="951" instrument_node="">
</span><blockquote data-dcnode-id="929"><p data-dcnode-id="930"><span data-dcnode-id="950" instrument_node="">&nbsp;&nbsp; All the world’s a stage,</span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">
And all the men and women merely players;…</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
Mewling and puking in the nurse’s arms;</span><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">
And then the whining school-boy, with his satchel</span><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node="">
And shining morning face, creeping like snail</span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
Unwillingly to school. And then the lover,</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
Sighing like furnace, with a woeful </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/ballad/"><span data-dcnode-id="937" instrument_node="">ballad</span></a><span data-dcnode-id="935" instrument_node="">…</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
second childishness and mere oblivion;</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
Sans teeth, sans eyes, sans taste, sans everything.</span></p></blockquote><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="927" instrument_node="">The idea behind this poem is fortune and fate. Shakespeare has beautifully used metaphors for seven stages of life. The visual </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/imagery/"><span data-dcnode-id="926" instrument_node="">imagery</span></a><span data-dcnode-id="924" instrument_node=""> of lover, infant, and child display their </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/character/"><span data-dcnode-id="923" instrument_node="">character</span></a><span data-dcnode-id="921" instrument_node=""> traits. The simile of ‘creeping like a snail’, ’sighing like a furnace’, and ‘beard like the pard’ are remarkable.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914"><strong data-dcnode-id="915"><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/little-boy-blue/"><span data-dcnode-id="918" instrument_node="">Little Boy Blue</span></a><span data-dcnode-id="916" instrument_node=""> – Mother Goose</span></strong></p><span data-dcnode-id="913" instrument_node="">
</span><blockquote data-dcnode-id="894"><p data-dcnode-id="895"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/little-boy-blue/"><span data-dcnode-id="912" instrument_node="">Little Boy Blue</span></a><span data-dcnode-id="910" instrument_node="">,</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">
Come blow your horn,</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
The sheep’s in the meadow,</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
The cow’s in the corn.</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
But where is the boy</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
Who looks after the sheep?</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
He’s under a haystack,</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
Fast asleep.</span></p></blockquote><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="892" instrument_node="">‘The sheep’s in the meadow’, ‘cow’s in the corn’, and ‘he‘s under haystack’ are the imageries. Alliteration is used in ‘</span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/little-boy-blue/"><span data-dcnode-id="891" instrument_node="">little boy blue</span></a><span data-dcnode-id="889" instrument_node="">’ as the consonant sound /b/ is repeated. The </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/rhyme/"><span data-dcnode-id="888" instrument_node="">rhyme</span></a><span data-dcnode-id="886" instrument_node=""> is an </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/extended-metaphor/"><span data-dcnode-id="885" instrument_node="">extended metaphor</span></a><span data-dcnode-id="883" instrument_node=""> for the innocence of a child. The rhyme also has </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/enjambment/"><span data-dcnode-id="882" instrument_node="">enjambment</span></a><span data-dcnode-id="880" instrument_node=""> when she transfers the thought to the next line.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="871"><strong data-dcnode-id="872"><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/stopping-by-woods-on-a-snowy-evening/"><span data-dcnode-id="877" instrument_node="">Stopping By Woods on a Snowy Evening</span></a><span data-dcnode-id="875" instrument_node=""> – </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/robert-frost/"><span data-dcnode-id="874" instrument_node="">Robert Frost</span></a></strong></p><span data-dcnode-id="870" instrument_node="">
</span><blockquote data-dcnode-id="853"><p data-dcnode-id="854"><span data-dcnode-id="869" instrument_node="">He gives his harness bells a shake</span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">
To </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/community/ask/"><span data-dcnode-id="866" instrument_node="">ask</span></a><span data-dcnode-id="864" instrument_node=""> if there is some mistake.</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
The woods are lovely, dark and deep,</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
But I have promises to keep,</span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
And </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/miles-to-go-before-i-sleep/"><span data-dcnode-id="857" instrument_node="">miles to go before I sleep</span></a><span data-dcnode-id="855" instrument_node="">,</span></p></blockquote><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="851" instrument_node="">The following verse, ‘And miles to go before I sleep’ is an extended metaphor for the journey of life where sleep is for death. Poet has personified the thinking of horse mildly in the second </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/stanza/"><span data-dcnode-id="850" instrument_node="">stanza</span></a><span data-dcnode-id="848" instrument_node=""> and further when he signs to the rider with’ bell’. The lake, </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/snow/"><span data-dcnode-id="847" instrument_node="">snow</span></a><span data-dcnode-id="845" instrument_node="">, bell, and woods are imageries that appeal to our senses. </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/assonance/"><span data-dcnode-id="844" instrument_node="">Assonance</span></a><span data-dcnode-id="842" instrument_node=""> is used in ‘He gives his harness bells a shake’. The sound of /i/ </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/come-in/"><span data-dcnode-id="841" instrument_node="">come in</span></a><span data-dcnode-id="839" instrument_node=""> quick succession in ‘gives’ and ‘his’.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><strong data-dcnode-id="833"><span data-dcnode-id="836" instrument_node="">Patriot into traitor – </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/robert-browning/"><span data-dcnode-id="835" instrument_node="">Robert Browning</span></a></strong></p><span data-dcnode-id="831" instrument_node="">
</span><blockquote data-dcnode-id="816"><p data-dcnode-id="817"><span data-dcnode-id="830" instrument_node="">It was roses, roses, all the way,</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
With myrtle mixed in my path like mad:</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
The house-roofs seemed to heave and sway,</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node="">
The church-spires flames, such flags they had,</span><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">
A year ago on this very day…</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">
There’s nobody on the house-tops now–</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
Just a palsied few at the windows set</span></p></blockquote><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">In this poem, the poet presents how people change their mindsets using </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/irony/"><span data-dcnode-id="813" instrument_node="">irony</span></a><span data-dcnode-id="811" instrument_node="">. For example, the fame and downfall of a leader. Political upheavals go parallel to ironic situations in the poem. In verse, “The house roofs seemed to heave and sway” the houses are personified and referred to the mob. The poem also begins with the image of the past, where a patriot is being welcomed warmly. The use of roses shows love, heaving, and swaying of rooftops is juxtaposed with the image of empty roofs.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="804"><strong data-dcnode-id="805"><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/sailing-to-byzantium/"><span data-dcnode-id="808" instrument_node="">Sailing to Byzantium</span></a><span data-dcnode-id="806" instrument_node=""> – W. B. Yeats</span></strong></p><span data-dcnode-id="803" instrument_node="">
</span><blockquote data-dcnode-id="788"><p data-dcnode-id="789"><span data-dcnode-id="802" instrument_node="">In one another’s arms, birds in the trees,</span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">
A tattered coat upon a stick, unless</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
Soul clap its hands and sing, and louder sing</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
For every tatter in its mortal dress,</span><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
Consume my heart away; sick with desire</span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
And fastened to a dying </span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animals.net/"><span data-dcnode-id="791" instrument_node="">animal</span></a></p></blockquote><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="780"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/imagery/"><span data-dcnode-id="786" instrument_node="">Imagery</span></a><span data-dcnode-id="784" instrument_node=""> is used in ‘In one another’s arms, birds in the trees’, ‘O sages standing in God’s holy fire’ and ‘Soul clap its hands and sing, and louder sing’, which appeals our senses. Here ‘Soul’ is personified. In the line, ‘A tattered coat upon a stick, unless” the poet has used the metaphor. Here, he compares himself to a scarecrow.&nbsp; “Consume my heart away; sick with desire”, the </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/oxymoron/"><span data-dcnode-id="783" instrument_node="">Oxymoron</span></a><span data-dcnode-id="781" instrument_node=""> is clear here sickness presents desire and desire is for passion.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="774"><strong data-dcnode-id="775"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/kubla-khan/"><span data-dcnode-id="778" instrument_node="">Kubla Khan</span></a><span data-dcnode-id="776" instrument_node=""> – S. T. Coleridge</span></strong></p><span data-dcnode-id="773" instrument_node="">
</span><blockquote data-dcnode-id="756"><p data-dcnode-id="757"><span data-dcnode-id="772" instrument_node="">As e’er beneath a waning moon was haunted</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
By woman wailing for her demon-lover!</span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
And from this chasm, with ceaseless turmoil seething,</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
As if this earth in fast thick pants were breathing,</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
A mighty fountain momently was forced:</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
Amid whose swift half-intermitted burst</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
Huge fragments vaulted like rebounding hail,</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
Or chaffy grain beneath the thresher’s flail:</span></p></blockquote><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">In verse, “huge fragments vaulted like rebounding hail”, the poet has used a simile to compare the fragments to hailstorm to show their impact. In the line, ‘as if this earth in fast thick pant was breathing’ earth is personified as if it can breathe like a human being. Alliteration is used in ‘woman wailing for her demon-lover’; the sound of /w/ is repeated.</span></p><div class="yarpp yarpp-related yarpp-related-website yarpp-template-list" data-dcnode-id="738"><span data-dcnode-id="752" instrument_node="">
