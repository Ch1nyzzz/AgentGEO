ode-id="1133"><div class="entry-category" data-dcnode-id="1136"></div><h1 class="entry-title" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Figurative Language Poems | Poetry in Figurative Language</span></h1></div></div><div class="box-inner-p-bigger box-single" data-dcnode-id="443"><div class="entry-content" data-dcnode-id="465"><p data-dcnode-id="1129"><span data-dcnode-id="1130" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1131" instrument_node="">Figurative languages are words and expressions used in poems and texts to convey various meanings and interpretations from the literal meaning. We collect various poems which figurative language words are used. Read these poems and share your ideas. How much you understand figurative language?</span></span></p><div class="code-block code-block-2" data-dcnode-id="1120" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1128" instrument_node=""> </span><span data-dcnode-id="1126" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-slot="4500976159" data-dcnode-id="1125" style="display:inline-block;width:300px;height:100px"></ins><span data-dcnode-id="1124" instrument_node=""> </span><span data-dcnode-id="1121" instrument_node=""> </span></div><figure aria-describedby="caption-attachment-402" class="wp-caption aligncenter" data-dcnode-id="1116" id="attachment_402" style="width: 615px"><img alt="Poetry in Figurative Language Examples" class="size-full wp-image-402" data-dcnode-id="1119" height="595" sizes="(max-width: 615px) 100vw, 615px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language-Exapmles.jpg%3Fresize%3D615%252C640%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language-Exapmles.jpg?w=615&amp;ssl=1 615w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language-Exapmles.jpg?resize=288%2C300&amp;ssl=1 288w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language-Exapmles.jpg?resize=370%2C385&amp;ssl=1 370w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language-Exapmles.jpg?resize=270%2C281&amp;ssl=1 270w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language-Exapmles.jpg?resize=570%2C593&amp;ssl=1 570w" width="572"><figcaption class="wp-caption-text" data-dcnode-id="1117" id="caption-attachment-402"><span data-dcnode-id="1118" instrument_node="">Figurative Language Poems</span></figcaption></figure><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1110" style="text-align: center;"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1113" instrument_node="">Ode To A Nightingale – John Keats</span></span></strong></p><p data-dcnode-id="1071" style="text-align: center;"><span data-dcnode-id="1108" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1109" instrument_node="">My heart aches, and a drowsy numbness pains</span></span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node=""> </span><span data-dcnode-id="1104" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1105" instrument_node="">My sense, as though of hemlock I had drunk,..</span></span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node=""> </span><span data-dcnode-id="1100" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1101" instrument_node="">O for a beaker full of the warm South,</span></span><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node=""> </span><span data-dcnode-id="1096" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1097" instrument_node="">Full of the true, the blushful Hippocrene,….</span></span><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node=""> </span><span data-dcnode-id="1092" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1093" instrument_node="">Where Beauty cannot keep her lustrous eyes,</span></span><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node=""> </span><span data-dcnode-id="1088" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1089" instrument_node="">Or new Love pine at them beyond to-morrow…</span></span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node=""> </span><span data-dcnode-id="1084" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1085" instrument_node="">White hawthorn, and the pastoral eglantine;</span></span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node=""> </span><span data-dcnode-id="1080" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1081" instrument_node="">Fast fading violets cover’d up in leaves;…</span></span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node=""> </span><span data-dcnode-id="1076" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1077" instrument_node="">Forlorn! the very word is like a bell</span></span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node=""> </span><span data-dcnode-id="1072" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1073" instrument_node="">To toll me back from thee to my sole self!</span></span></p><p data-dcnode-id="1068" style="text-align: center;"><span data-dcnode-id="1069" style="font-size: 14pt;"><span data-dcnode-id="1070" instrument_node="">********************</span></span></p><div class="code-block code-block-3" data-dcnode-id="1059" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1067" instrument_node=""> </span><span data-dcnode-id="1065" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-format="auto" data-ad-slot="7448711307" data-dcnode-id="1064" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1063" instrument_node=""> </span><span data-dcnode-id="1060" instrument_node=""> </span></div><figure aria-describedby="caption-attachment-403" class="wp-caption aligncenter" data-dcnode-id="1055" id="attachment_403" style="width: 615px"><img alt="Poetry in Figurative Language" class="size-full wp-image-403" data-dcnode-id="1058" height="595" loading="lazy" sizes="(max-width: 615px) 100vw, 615px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language.jpg%3Fresize%3D615%252C640%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language.jpg?w=615&amp;ssl=1 615w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language.jpg?resize=288%2C300&amp;ssl=1 288w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language.jpg?resize=370%2C385&amp;ssl=1 370w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language.jpg?resize=270%2C281&amp;ssl=1 270w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Poetry-in-Figurative-Language.jpg?resize=570%2C593&amp;ssl=1 570w" width="572"><figcaption class="wp-caption-text" data-dcnode-id="1056" id="caption-attachment-403"><span data-dcnode-id="1057" instrument_node="">Figurative Language Poems 5th Grade</span></figcaption></figure><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1047" style="text-align: center;"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1052" instrument_node="">Because I could not stop for death – </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publishersweekly.com/pw/by-topic/industry-news/tip-sheet/article/67591-the-10-best-emily-dickinson-poems.html"><span data-dcnode-id="1051" instrument_node="">Emily Dickinson</span></a></span></strong></p><p data-dcnode-id="1036" style="text-align: center;"><span data-dcnode-id="1045" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1046" instrument_node="">He kindly stopped for me</span></span><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node=""> </span><span data-dcnode-id="1041" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1042" instrument_node="">The Carriage held but just Ourselves…</span></span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node=""> </span><span data-dcnode-id="1037" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1038" instrument_node="">We passed the Setting Sun –</span></span></p><p data-dcnode-id="1029" style="text-align: center;"><span data-dcnode-id="1034" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1035" instrument_node="">We paused before a House that seemed</span></span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node=""> </span><span data-dcnode-id="1030" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="1031" instrument_node="">A Swelling of the Ground –</span></span></p><p data-dcnode-id="1026" style="text-align: center;"><span data-dcnode-id="1027" style="font-size: 14pt;"><span data-dcnode-id="1028" instrument_node="">********************</span></span></p><figure aria-describedby="caption-attachment-404" class="wp-caption aligncenter" data-dcnode-id="1022" id="attachment_404" style="width: 615px"><img alt="Figurative Language Poems" class="size-full wp-image-404" data-dcnode-id="1025" height="595" loading="lazy" sizes="(max-width: 615px) 100vw, 615px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Figurative-Language-Poems.jpg%3Fresize%3D615%252C640%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Figurative-Language-Poems.jpg?w=615&amp;ssl=1 615w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Figurative-Language-Poems.jpg?resize=288%2C300&amp;ssl=1 288w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Figurative-Language-Poems.jpg?resize=370%2C385&amp;ssl=1 370w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Figurative-Language-Poems.jpg?resize=270%2C281&amp;ssl=1 270w, https://i0.wp.com/postpoetics.org/wp-content/uploads/2020/12/Figurative-Language-Poems.jpg?resize=570%2C593&amp;ssl=1 570w" width="572"><figcaption class="wp-caption-text" data-dcnode-id="1023" id="caption-attachment-404"><span data-dcnode-id="1024" instrument_node="">Figurative Language Poems For Middle School</span></figcaption></figure><div class="code-block code-block-4" data-dcnode-id="1013" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1021" instrument_node=""> </span><span data-dcnode-id="1019" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="3241038835" data-dcnode-id="1018" style="display:block; text-alig , palatino, serif;"><span data-dcnode-id="734" instrument_node="">Sunlight floods the shiny many-windowed place,</span></span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node=""> </span><span data-dcnode-id="729" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="730" instrument_node="">Coldly glainting on flawless steel under glass,</span></span><br data-dcnode-id="728"><span data-dcnode-id="727" instrument_node=""> </span><span data-dcnode-id="725" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="726" instrument_node="">And blaring imperially on the spattered gules</span></span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node=""> </span><span data-dcnode-id="721" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="722" instrument_node="">Where kneeling men grunt as they swab the floor.</span></span></p><p data-dcnode-id="705" style="text-align: center;"><span data-dcnode-id="718" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="719" instrument_node="">Startled eyes of nurses swish by noiselessly,</span></span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node=""> </span><span data-dcnode-id="714" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="715" instrument_node="">Orderlies with cropped heads swagger like murderers;</span></span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node=""> </span><span data-dcnode-id="710" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="711" instrument_node="">And three surgeons, robed and masked mysteriously,</span></span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node=""> </span><span data-dcnode-id="706" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="707" instrument_node="">Lounge gossiping of guts, and wihs it were lunch-time.</span></span></p><div class="code-block code-block-14" data-dcnode-id="697" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="704" instrument_node=""> </span><span data-dcnode-id="702" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-format="auto" data-ad-slot="3704907418" data-dcnode-id="701" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="700" instrument_node=""> </span></div><p data-dcnode-id="686" style="text-align: center;"><span data-dcnode-id="695" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="696" instrument_node="">Beyond the porcelain door, screaming mounts crescendo</span></span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node=""> </span><span data-dcnode-id="691" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="692" instrument_node="">Case 4001 coming out of the ether,</span></span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node=""> </span><span data-dcnode-id="687" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="688" instrument_node="">Born again half a man, to spend his life in bed.</span></span></p><p data-dcnode-id="683" style="text-align: center;"><span data-dcnode-id="684" style="font-size: 14pt;"><span data-dcnode-id="685" instrument_node="">********************</span></span></p><p data-dcnode-id="679" style="text-align: center;"><strong data-dcnode-id="680"><span data-dcnode-id="681" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="682" instrument_node="">All the world’s a stage – William Shakespeare</span></span></strong></p><p data-dcnode-id="644" style="text-align: center;"><span data-dcnode-id="677" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="678" instrument_node="">All the world’s a stage,</span></span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node=""> </span><span data-dcnode-id="673" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="674" instrument_node="">And all the men and women merely players;…</span></span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node=""> </span><span data-dcnode-id="669" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="670" instrument_node="">Mewling and puking in the nurse’s arms;</span></span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node=""> </span><span data-dcnode-id="665" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="666" instrument_node="">And then the whining school-boy, with his satchel</span></span><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node=""> </span><span data-dcnode-id="661" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="662" instrument_node="">And shining morning face, creeping like snail</span></span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node=""> </span><span data-dcnode-id="657" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="658" instrument_node="">Unwillingly to school. And then the lover,</span></span><br data-dcnode-id="656"><span data-dcnode-id="655" instrument_node=""> </span><span data-dcnode-id="653" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="654" instrument_node="">Sighing like furnace, with a woeful ballad…</span></span><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node=""> </span><span data-dcnode-id="649" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="650" instrument_node="">second childishness and mere oblivion;</span></span><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node=""> </span><span data-dcnode-id="645" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="646" instrument_node="">Sans teeth, sans eyes, sans taste, sans everything.</span></span></p><p data-dcnode-id="641" style="text-align: center;"><span data-dcnode-id="642" style="font-size: 14pt;"><span data-dcnode-id="643" instrument_node="">********************</span></span></p><div class="code-block code-block-15" data-dcnode-id="633" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="640" instrument_node=""> </span><span data-dcnode-id="638" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-format="auto" data-ad-slot="7448711307" data-dcnode-id="637" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="636" instrument_node=""> </span></div><p data-dcnode-id="629" style="text-align: center;"><strong data-dcnode-id="630"><span data-dcnode-id="631" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="632" instrument_node="">Stopping By Woods On A Snowy Evening – Robert Frost</span></span></strong></p><p data-dcnode-id="610" style="text-align: center;"><span data-dcnode-id="627" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="628" instrument_node="">He gives his harness bells a shake</span></span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node=""> </span><span data-dcnode-id="623" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="624" instrument_node="">To ask if there is some mistake.</span></span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node=""> </span><span data-dcnode-id="619" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="620" instrument_node="">The woods are lovely, dark and deep,</span></span><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node=""> </span><span data-dcnode-id="615" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="616" instrument_node="">But I have promises to keep,</span></span><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node=""> </span><span data-dcnode-id="611" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="612" instrument_node="">And miles to go before I sleep,</span></span></p><p data-dcnode-id="607" style="text-align: center;"><span data-dcnode-id="608" style="font-size: 14pt;"><span data-dcnode-id="609" instrument_node="">********************</span></span></p><p data-dcnode-id="603" style="text-align: center;"><strong data-dcnode-id="604"><span data-dcnode-id="605" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="606" instrument_node="">Patriot into traitor – Robert Browning</span></span></strong></p><p data-dcnode-id="576" style="text-align: center;"><span data-dcnode-id="601" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="602" instrument_node="">It was roses, roses, all the way,</span></span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node=""> </span><span data-dcnode-id="597" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="598" instrument_node="">With myrtle mixed in my path like mad:</span></span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node=""> </span><span data-dcnode-id="593" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="594" instrument_node="">The house-roofs seemed to heave and sway,</span></span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node=""> </span><span data-dcnode-id="589" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="590" instrument_node="">The church-spires flames, such flags they had,</span></span><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node=""> </span><span data-dcnode-id="585" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="586" instrument_node="">A year ago on this very day…</span></span><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node=""> </span><span data-dcnode-id="581" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="582" instrument_node="">There’s nobody on the house-tops now–</span></span><br data-dcnode-id="580"><span data-dcnode-id="579" instrument_node=""> </span><span data-dcnode-id="577" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="578" instrument_node="">Just a palsied few at the windows set</span></span></p><p data-dcnode-id="573" style="text-align: center;"><span data-dcnode-id="574" style="font-size: 14pt;"><span data-dcnode-id="575" instrument_node="">********************</span></span></p><p data-dcnode-id="569" style="text-align: center;"><strong data-dcnode-id="570"><span data-dcnode-id="571" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="572" instrument_node="">Sailing to Byzantium – W. B. Yeats</span></span></strong></p><p data-dcnode-id="546" style="text-align: center;"><span data-dcnode-id="567" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="568" instrument_node="">In one another’s arms, birds in the trees,</span></span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node=""> </span><span data-dcnode-id="563" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="564" instrument_node="">A tattered coat upon a stick, unless</span></span><br data-dcnode-id="562"><span data-dcnode-id="561" instrument_node=""> </span><span data-dcnode-id="559" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="560" instrument_node="">Soul clap its hands and sing, and louder sing</span></span><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node=""> </span><span data-dcnode-id="555" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="556" instrument_node="">For every tatter in its mortal dress,</span></span><br data-dcnode-id="554"><span data-dcnode-id="553" instrument_node=""> </span><span data-dcnode-id="551" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="552" instrument_node="">Consume my heart away; sick with desire</span></span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node=""> </span><span data-dcnode-id="547" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="548" instrument_node="">And fastened to a dying animal.</span></span></p><div class="code-block code-block-7" data-dcnode-id="538" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="545" instrument_node=""> </span><span data-dcnode-id="543" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-slot="7612749876" data-dcnode-id="542" style="display:inline-block;width:250px;height:300px"></ins><span data-dcnode-id="541" instrument_node=""> </span></div><p data-dcnode-id="535" style="text-align: center;"><span data-dcnode-id="536" style="font-size: 14pt;"><span data-dcnode-id="537" instrument_node="">********************</span></span></p><p data-dcnode-id="531" style="text-align: center;"><strong data-dcnode-id="532"><span data-dcnode-id="533" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="534" instrument_node="">Kubla Khan – S. T. Coleridge</span></span></strong></p><p data-dcnode-id="500" style="text-align: center;"><span data-dcnode-id="529" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="530" instrument_node="">As e’er beneath a waning moon was haunted</span></span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node=""> </span><span data-dcnode-id="525" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="526" instrument_node="">By woman wailing for her demon-lover!</span></span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node=""> </span><span data-dcnode-id="521" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="522" instrument_node="">And from this chasm, with ceaseless turmoil seething,</span></span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node=""> </span><span data-dcnode-id="517" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="518" instrument_node="">As if this earth in fast thick pants were breathing,</span></span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node=""> </span><span data-dcnode-id="513" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="514" instrument_node="">A mighty fountain momently was forced:</span></span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node=""> </span><span data-dcnode-id="509" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="510" instrument_node="">Amid whose swift half-intermitted burst</span></span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node=""> </span><span data-dcnode-id="505" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="506" instrument_node="">Huge fragments vaulted like rebounding hail,</span></span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node=""> </span><span data-dcnode-id="501" style="font-size: 14pt; font-family: 'book antiqua', palatino, serif;"><span data-dcnode-id="502" instrument_node="">Or chaffy grain beneath the thresher’s flail.</span></span></p><p data-dcnode-id="497" style="text-align: center;"><span data-dcnode-id="498" style="font-size: 14pt;"><span data-dcnode-id="499" instrument_node="">********************</span></span></p><p data-dcnode-id="490"><span data-dcnode-id="491" style="font-size: 14pt;"><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Read Also:</span></strong><span data-dcnode-id="494" instrument_node=""> </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/welcome-back-school-poems/"><span data-dcnode-id="493" instrument_node="">Welcome Back to School Poems</span></a></span></p><div class="code-block code-block-9" data-dcnode-id="482" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="489" instrument_node=""> </span><span data-dcnode-id="487" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7561565615215938" data-ad-slot="4500976159" data-dcnode-id="486" style="display:inline-block;width:300px;height:100px"></ins><span data-dcnode-id="485" instrument_node=""> </span></div><div class="entry-tags" data-dcnode-id="466"><span data-dcnode-id="481" instrument_node=""> </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/tag/figurative-language-poems-5th-grade/" rel="tag"><span data-dcnode-id="480" instrument_node="">Figurative Language Poems 5th Grade</span></a><span data-dcnode-id="478" instrument_node=""> </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/tag/figurative-language-poems-for-middle-school/" rel="tag"><span data-dcnode-id="477" instrument_node="">Figurative Language Poems for Middle School</span></a><span data-dcnode-id="475" instrument_node=""> </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/tag/figurative-language-poems-for-students/" rel="tag"><span data-dcnode-id="474" instrument_node="">Figurative Language Poems for Students</span></a><span data-dcnode-id="472" instrument_node=""> </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/tag/poems-in-figurative-language/" rel="tag"><span data-dcnode-id="471" instrument_node="">Poems in Figurative Language</span></a><span data-dcnode-id="469" instrument_node=""> </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/tag/poems-in-figurative-language-examples/" rel="tag"><span data-dcnode-id="468" instrument_node="">Poems in Figurative Language Examples</span></a></div></div><nav class="gridlove-prev-next-nav" data-dcnode-id="444"><div class="gridlove-prev-link" data-dcnode-id="455"><span data-dcnode-id="464" instrument_node=""> </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//postpoetics.org/beautiful-smile-poems/"><span data-dcnode-id="463" instrument_node=""> </span><span class="gridlove-pn-ico" data-dcnode-id="461"><i class="fa fa fa-chevron-left" data-dcnode-id="462"></i></span><span data-dcnode-id="460" instrument_node=""> </span><span class="gridlove-pn-link" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Beautiful Smile Poems To Make Her / Him Smile &amp; Laughter</span></span><span data-dcnode-id="457" instrument_node=""> </span></a></div><div class="gridlove-next-link" data-dcnode-id="445"><span data-dcnode-id="454" instrument_node=""> </span><a dat
