</span><div class="use-editor post-6825 post type-post status-publish format-standard has-post-thumbnail hentry category-blog category-vocabulary tag-chengyu" data-dcnode-id="524" itemprop="blogPost" itemscope="itemscope" itemtype="http://schema.org/BlogPosting"><span data-dcnode-id="1061" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1059" itemprop="headline"><span data-dcnode-id="1060" instrument_node="">
15 of the Most Popular Idioms in Chinese </span></h2><span data-dcnode-id="1058" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1031"><span data-dcnode-id="1057" instrument_node="">
</span><span class="meta-item blog-date" data-dcnode-id="1052"><i class="iconentypo-calendar" data-dcnode-id="1056"></i><span data-dcnode-id="1055" instrument_node="">On </span><time class="txt published" data-dcnode-id="1053" datetime="2017-06-23T15:59:25+08:00" itemprop="datePublished"><span data-dcnode-id="1054" instrument_node="">June 23, 2017</span></time></span><span data-dcnode-id="1051" instrument_node="">
</span><span class="meta-item blog-author" data-dcnode-id="1044" itemprop="author" itemscope="itemscope" itemtype="http://schema.org/Person"><span data-dcnode-id="1050" instrument_node="">
</span><i class="iconentypo-user" data-dcnode-id="1049"></i><span data-dcnode-id="1048" instrument_node="">
By </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writtenchinese.com/author/hollie/" itemprop="name"><span data-dcnode-id="1047" instrument_node="">Hollie</span></a><span data-dcnode-id="1045" instrument_node=""> </span></span><span data-dcnode-id="1043" instrument_node="">
</span><span class="meta-item blog-category" data-dcnode-id="1033"><span data-dcnode-id="1042" instrument_node="">
</span><i class="iconentypo-tag" data-dcnode-id="1041"></i><span data-dcnode-id="1040" instrument_node="">
In </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writtenchinese.com/category/blog/" rel="category tag"><span data-dcnode-id="1039" instrument_node="">Blog</span></a><span data-dcnode-id="1037" instrument_node="">, </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writtenchinese.com/category/vocabulary/" rel="category tag"><span data-dcnode-id="1036" instrument_node="">Vocabulary</span></a><span data-dcnode-id="1034" instrument_node=""> </span></span><span data-dcnode-id="1032" instrument_node="">
</span></div><span data-dcnode-id="1030" instrument_node="">
</span><div class="entry-thumbnail" data-dcnode-id="1025" itemprop="image"><span data-dcnode-id="1029" instrument_node="">
</span><div class="st-image st-image-center" data-dcnode-id="1027"><img alt="" class="no-effect" data-dcnode-id="1028" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/15-of-the-Most-Popular-Idioms-in-Chinese.png%3Fresize%3D500%252C300%26ssl%3D1&amp;raw"></div><span data-dcnode-id="1026" instrument_node=""> </span></div><span data-dcnode-id="1024" instrument_node="">
</span><div class="entry-content" data-dcnode-id="624" itemprop="text"><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">It will only take 10 minutes to read this post!</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1019" instrument_node="">If you don’t have time to learn this now, you can </span><a data-dcnode-id="1017" data-leadbox="https://gigabud.lpages.co/leadbox/140320973f72a2%3A14bef93ccb46dc/5653942327312384/" data-leadbox-id="140320973f72a2:14bef93ccb46dc" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gigabud.lpages.co/leadbox/140320973f72a2%253A14bef93ccb46dc/5653942327312384/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1018" instrument_node="">download your 15 of the Most Popular Idioms in Chinese PDF</span></a><span data-dcnode-id="1015" instrument_node=""> and read it later!</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">Idiom comes from the </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.english-online.org.uk/adv6/idiom1a6.htm" target="_blank"><span data-dcnode-id="1011" instrument_node="">Greek word meaning ‘one of a kind</span></a><span data-dcnode-id="1009" instrument_node="">’. They’re often used to convey a special meaning that is not directly spoken. Idioms also shorten a longer meaning, and can add colour to a language and emphasis to a specific phrase.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1006" instrument_node="">Idioms, known as </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/worddetail/shouyu/56169/2/1" target="_blank"><span data-dcnode-id="1005" instrument_node="">熟语</span></a><span data-dcnode-id="1003" instrument_node=""> (shóu yǔ) or </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/worddetail/chengyu/11607/3/1" target="_blank"><span data-dcnode-id="1002" instrument_node="">成语</span></a><span data-dcnode-id="1000" instrument_node=""> (chéng yǔ) if made up of 4 characters in Chinese, are commonplace in both English and Chinese culture. Whilst some have crossed cultures and been translated literally, there are others which strongly reflect the cultural origins and have been translated to demonstrate Chinese or English traditions and history.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Below are 15 popular idioms in the English language, translated into Chinese. Some have been translated quite literally from their English origins, other have taken on a more ‘Chinese’ translation or use an existing Chinese equivalent.</span></p><span data-dcnode-id="995" instrument_node="">
</span><h2 data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">1. High as a kite </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2597%25A8%25E5%2588%25B0%25E9%25A3%259E%25E8%25B5%25B7%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="993" instrument_node="">嗨到飞起</span></a><span data-dcnode-id="991" instrument_node=""> (hāi dào fēi qǐ)</span></h2><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><img alt="" class="aligncenter size-full wp-image-6826 jetpack-lazy-image" data-dcnode-id="988" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?resize=500%2C353&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?w=500&amp;ssl=1 500w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?resize=100%2C71&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?resize=300%2C212&amp;ssl=1 300w" data-recalc-dims="1" height="353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg%3Fresize%3D500%252C353%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="500"><noscript data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">&lt;img class="aligncenter size-full wp-image-6826" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?resize=500%2C353&amp;#038;ssl=1" alt="" width="500" height="353" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?w=500&amp;amp;ssl=1 500w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?resize=100%2C71&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/high-as-a-kite.jpg?resize=300%2C212&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">The idiom high as a kite was first used in the 19th century in the US and UK, meaning to be ‘high above the ground’. The modern meaning, ‘to be intoxicated’ or ‘excited’ probably came about after the use of ‘high’ as </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrases.org.uk/meanings/as-high-as-a-kite.html" target="_blank"><span data-dcnode-id="982" instrument_node="">meaning ‘to be intoxicated with drugs’ came about in the 1930s</span></a><span data-dcnode-id="980" instrument_node="">.</span></p><span data-dcnode-id="978" instrument_node="">
</span><h2 data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">2. Raining cats and dogs </span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2580%25BE%25E7%259B%2586%25E5%25A4%25A7%25E9%259B%25A8%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="976" instrument_node="">倾盆大雨</span></a><span data-dcnode-id="974" instrument_node=""> (qīng pén dà yǔ)</span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><img alt="" class="aligncenter size-large wp-image-6827 jetpack-lazy-image" data-dcnode-id="971" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs-1024x639.jpeg?resize=900%2C562&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=1024%2C639&amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=510%2C318&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=100%2C62&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=300%2C187&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=768%2C479&amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?w=1176&amp;ssl=1 1176w" data-recalc-dims="1" height="562" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs-1024x639.jpeg%3Fresize%3D900%252C562%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="900"><noscript data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-6827" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs-1024x639.jpeg?resize=900%2C562&amp;#038;ssl=1" alt="" width="900" height="562" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=1024%2C639&amp;amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=510%2C318&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=100%2C62&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=300%2C187&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?resize=768%2C479&amp;amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/raining-cats-and-dogs.jpeg?w=1176&amp;amp;ssl=1 1176w" sizes="(max-width: 900px) 100vw, 900px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">This phrase is thought to have come from the 17th century, when dead animals would be washed along the streets during heavy rain. The meaning of the idiom is ‘heavy rain’, which feels like you’re being pelted by cats and dogs!</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="963" instrument_node="">The Chinese version comes from the Tang Dynasty poet, </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/worddetail/dufu/14610/3/1" target="_blank"><span data-dcnode-id="962" instrument_node="">杜甫</span></a><span data-dcnode-id="960" instrument_node=""> (dù fǔ) Du Fu’s poem “</span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E7%2599%25BD%25E5%25B8%259D%25E5%259F%258E%25E4%25B8%25AD%25E4%25BA%2591%25E5%2587%25BA%25E9%2597%25A8%25EF%25BC%258C%25E7%2599%25BD%25E5%25B8%259D%25E5%259F%258E%25E4%25B8%258B%25E9%259B%25A8%25E7%25BF%25BB%25E7%259B%2586%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="959" instrument_node="">白帝城中云出门，白帝城下雨翻盆</span></a><span data-dcnode-id="957" instrument_node="">。” It means the rain is as heavy as pouring away the water from basin.</span></p><span data-dcnode-id="955" instrument_node="">
</span><h2 data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">3. Speak of the devil </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%25AF%25B4%25E6%259B%25B9%25E6%2593%258D%25E6%259B%25B9%25E6%2593%258D%25E5%25B0%25B1%25E5%2588%25B0%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="953" instrument_node="">说曹操曹操就到</span></a><span data-dcnode-id="951" instrument_node=""> (shuō cáo cāo cáo cāo jiù dào)</span></h2><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="945"><img alt="" class="aligncenter size-full wp-image-6828 jetpack-lazy-image" data-dcnode-id="948" data-lazy-sizes="(max-width: 342px) 100vw, 342px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?resize=342%2C408&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?w=342&amp;ssl=1 342w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?resize=84%2C100&amp;ssl=1 84w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?resize=251%2C300&amp;ssl=1 251w" data-recalc-dims="1" height="408" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg%3Fresize%3D342%252C408%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="342"><noscript data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6828" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?resize=342%2C408&amp;#038;ssl=1" alt="" width="342" height="408" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?w=342&amp;amp;ssl=1 342w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?resize=84%2C100&amp;amp;ssl=1 84w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/talkofthedevil.jpeg?resize=251%2C300&amp;amp;ssl=1 251w" sizes="(max-width: 342px) 100vw, 342px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Speak of the devil means to talk about someone, and that person appears unexpectedly. The idiom originated in England around the 16th century and comes from the phrase, ‘Speak of the devil, and he will appear’.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="940" instrument_node="">The Chinese equivalent comes from the story 《</span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25B8%2589%25E5%259B%25BD%25E6%25BC%2594%25E4%25B9%2589%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="939" instrument_node="">三国演义</span></a><span data-dcnode-id="937" instrument_node="">》(sān guó yǎn yì) Romance of the Three Kingdoms, written in the 14th century by Luo Guanzhong </span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E7%25BD%2597%25E8%25B4%25AF%25E4%25B8%25AD%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="936" instrument_node="">罗贯中</span></a><span data-dcnode-id="934" instrument_node=""> (luó guàn zhōng) and predates the western use of the phrase. The tale tells of the Three Kingdoms during the breaking of the Han in 200 AD. 曹操 (cáo cāo) Cao cao is the leader of the Wei and the villain of the piece in contrast with the heroic Liu Bei, the leader of the Shu. The Chinese translation is literally, ‘speak of Cao Cao and Cao Cao arrives’.</span></p><span data-dcnode-id="932" instrument_node="">
</span><h2 data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">4. Between a rock and a hard place </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%25B7%25A6%25E5%258F%25B3%25E4%25B8%25BA%25E9%259A%25BE%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="930" instrument_node="">左右为难</span></a><span data-dcnode-id="928" instrument_node=""> (zuǒ yòu wéi nán)</span></h2><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="922"><img alt="" class="aligncenter size-large wp-image-6829 jetpack-lazy-image" data-dcnode-id="925" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock-1024x819.jpg?resize=900%2C720&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=1024%2C819&amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=510%2C408&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=100%2C80&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=300%2C240&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=768%2C614&amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?w=1280&amp;ssl=1 1280w" data-recalc-dims="1" height="720" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock-1024x819.jpg%3Fresize%3D900%252C720%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="900"><noscript data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-6829" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock-1024x819.jpg?resize=900%2C720&amp;#038;ssl=1" alt="" width="900" height="720" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=1024%2C819&amp;amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=510%2C408&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=100%2C80&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=300%2C240&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?resize=768%2C614&amp;amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/rock.jpg?w=1280&amp;amp;ssl=1 1280w" sizes="(max-width: 900px) 100vw, 900px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">This phrase means to be caught between two difficult situations or choices. The phrase originated in the early 20 century, </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrases.org.uk/meanings/between-a-rock-and-a-hard-place.html" target="_blank"><span data-dcnode-id="919" instrument_node="">relating to bankruptcy and the mining industry</span></a><span data-dcnode-id="917" instrument_node=""> in Arizona, USA. Miners were said to have the choice to either work without pay or go unemployed and starving.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="914" instrument_node="">The Chinese version was originally seen in a Yuan dynasty (1271 – 1368) drama, 《</span><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E6%25BD%2587%25E6%25B9%2598%25E9%259B%25A8%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="913" instrument_node="">潇湘雨</span></a><span data-dcnode-id="911" instrument_node="">》(xiāo xiāng yǔ) Rain on the Xiaoxiang River – “</span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E6%2588%2591%25E6%25AC%25B2%25E5%25BE%2585%25E4%25BA%25B2%25E8%2587%25AA%25E5%258E%25BB%25E5%25AF%25BB%25E6%259D%25A5%25EF%25BC%258C%25E9%2599%2590%25E6%25AC%25A1%25E5%258F%2588%25E7%25B4%25A7%25EF%25BC%258C%25E7%259D%2580%25E8%2580%2581%25E5%25A4%25AB%25E5%25B7%25A6%25E5%258F%25B3%25E4%25B8%25BA%25E9%259A%25BE%25EF%25BC%258C%25E5%25A6%2582%25E4%25BD%2595%25E6%2598%25AF%25E5%25A5%25BD%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="910" instrument_node="">我欲待亲自去寻来，限次又紧，着老夫左右为难，如何是好</span></a><span data-dcnode-id="908" instrument_node="">！”</span></p><span data-dcnode-id="906" instrument_node="">
</span><h2 data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">5. Two birds with one stone </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25B8%2580%25E7%259F%25B3%25E4%25BA%258C%25E9%25B8%259F%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="904" instrument_node="">一石二鸟</span></a><span data-dcnode-id="902" instrument_node=""> (yī shí èr niǎo)</span></h2><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="896"><img alt="" class="aligncenter size-full wp-image-6830 jetpack-lazy-image" data-dcnode-id="899" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=600%2C420&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?w=600&amp;ssl=1 600w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=510%2C357&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=100%2C70&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=300%2C210&amp;ssl=1 300w" data-recalc-dims="1" height="420" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png%3Fresize%3D600%252C420%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="600"><noscript data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6830" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=600%2C420&amp;#038;ssl=1" alt="" width="600" height="420" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?w=600&amp;amp;ssl=1 600w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=510%2C357&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=100%2C70&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two-birds-with-one-stone.png?resize=300%2C210&amp;amp;ssl=1 300w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="894" instrument_node="">This idiom is said to have originated in China, but there are also stories in </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qlanguage.com.hk/kill-two-birds-with-one-stone/" target="_blank"><span data-dcnode-id="893" instrument_node="">Greek mythology</span></a><span data-dcnode-id="891" instrument_node=""> (the tale of ‘</span><i data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Daedalus and Icarus’)</span></i><span data-dcnode-id="888" instrument_node=""> that suggests an earlier source for the term. Two birds with one stone means to complete two actions in one go.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">The Chinese origin is said to have come from the Chengyu </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25B8%2580%25E7%25AE%25AD%25E5%258F%258C%25E9%259B%2595%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="884" instrument_node="">一箭双雕</span></a><span data-dcnode-id="882" instrument_node=""> (yī jiàn shuāng diāo) meaning to ‘kill two golden eagles with one arrow’.</span></p><span data-dcnode-id="880" instrument_node="">
</span><h2 data-dcnode-id="872"><span data-dcnode-id="879" instrument_node="">6. When in Rome </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2585%25A5%25E5%25A2%2583%25E9%2597%25AE%25E4%25BF%2597%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="878" instrument_node="">入境问俗</span></a><span data-dcnode-id="876" instrument_node=""> (rù jìng wèn sú) / Do as the natives do </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2585%25A5%25E4%25B9%25A1%25E9%259A%258F%25E4%25BF%2597%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="875" instrument_node="">入乡随俗</span></a><span data-dcnode-id="873" instrument_node=""> (rù xiāng suí sú)</span></h2><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="867"><img alt="" class="aligncenter size-full wp-image-6840 jetpack-lazy-image" data-dcnode-id="870" data-lazy-sizes="(max-width: 798px) 100vw, 798px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=798%2C564&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?w=798&amp;ssl=1 798w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=510%2C360&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=100%2C71&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=300%2C212&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=768%2C543&amp;ssl=1 768w" data-recalc-dims="1" height="564" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png%3Fresize%3D798%252C564%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="798"><noscript data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6840" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=798%2C564&amp;#038;ssl=1" alt="" width="798" height="564" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?w=798&amp;amp;ssl=1 798w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=510%2C360&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=100%2C71&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=300%2C212&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/When-in-Rome-do-as-the-Romans-do.png?resize=768%2C543&amp;amp;ssl=1 768w" sizes="(max-width: 798px) 100vw, 798px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The origins of this phrase comes from a Christian saint who wrote in circa 390 AD, that on visiting Rome, he would fast on Saturday, which was not his normal custom, and that his friend should do the same to avoid ‘scandal’. The full phrase, When in Rome, do as the Romans do suggests that when travelling in another place with different customs than your own, follow the customs of the place to prevent offense.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="862" instrument_node="">The Chinese equivelant was originally from the Daoist author, Zhuang Zi’s ‘The Mountain Tree’《</span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%25BA%2584%25E5%25AD%2590%25C2%25B7%25E5%25B1%25B1%25E6%259C%25A8%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="861" instrument_node="">庄子·山木</span></a><span data-dcnode-id="859" instrument_node="">》(zhuāng zǐ · shān mù) – “</span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2585%25A5%25E5%2585%25B6%25E4%25BF%2597%25EF%25BC%258C%25E4%25BB%258E%25E5%2585%25B6%25E4%25BB%25A4%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="858" instrument_node="">入其俗，从其令</span></a><span data-dcnode-id="856" instrument_node="">。”</span></p><span data-dcnode-id="854" instrument_node="">
</span><h2 data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">7. Take the bull by the horns </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%25BF%258E%25E9%259A%25BE%25E8%2580%258C%25E4%25B8%258A%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="852" instrument_node="">迎难而上</span></a><span data-dcnode-id="850" instrument_node=""> (yíng nán ér shàng)</span></h2><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="844"><img alt="" class="aligncenter size-large wp-image-6831 jetpack-lazy-image" data-dcnode-id="847" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596-1024x593.png?resize=900%2C521&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=1024%2C593&amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=510%2C295&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=100%2C58&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=300%2C174&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=768%2C444&amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=1030%2C596&amp;ssl=1 1030w" data-recalc-dims="1" height="521" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596-1024x593.png%3Fresize%3D900%252C521%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="900"><noscript data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-6831" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596-1024x593.png?resize=900%2C521&amp;#038;ssl=1" alt="" width="900" height="521" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=1024%2C593&amp;amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=510%2C295&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=100%2C58&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=300%2C174&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=768%2C444&amp;amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/idioms_take_the_bull_by_the_horns-1030x596.png?resize=1030%2C596&amp;amp;ssl=1 1030w" sizes="(max-width: 900px) 100vw, 900px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="842" instrument_node="">The origin of this idiom, meaning ‘to address something head-on’ is hazy. Whilst some sources say it originated in the 19th century and is </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historybyzim.com/2014/04/take-the-bull-by-the-horns/" target="_blank"><span data-dcnode-id="841" instrument_node="">connected with bullfighting</span></a><span data-dcnode-id="839" instrument_node="">, others have connected it with rodeos in USA.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">The Chinese version of the phrase, translates the meaning of the idiom, to ‘face difficulty head on)’ and comes from the story of </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%25BD%25A6%25E8%2583%25A4%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="835" instrument_node="">车胤</span></a><span data-dcnode-id="833" instrument_node=""> (chē yìn) written in the 晋 (jìn) Jin dynasty, who studies hard through poor family circumstances.</span></p><span data-dcnode-id="831" instrument_node="">
</span><h2 data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">8. Don’t judge a book by its cover </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25BA%25BA%25E4%25B8%258D%25E5%258F%25AF%25E8%25B2%258C%25E7%259B%25B8%25EF%25BC%258C%25E6%25B5%25B7%25E6%25B0%25B4%25E4%25B8%258D%25E5%258F%25AF%25E6%2596%2597%25E9%2587%258F%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="829" instrument_node="">人不可貌相，海水不可斗量</span></a><span data-dcnode-id="827" instrument_node=""> (rén bù kě mào xiàng ,hǎi shuǐ bù kě dǒu liàng)</span></h2><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="821"><img alt="" class="aligncenter size-full wp-image-6832 jetpack-lazy-image" data-dcnode-id="824" data-lazy-sizes="(max-width: 698px) 100vw, 698px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=698%2C400&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?w=698&amp;ssl=1 698w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=510%2C292&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=100%2C57&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=300%2C172&amp;ssl=1 300w" data-recalc-dims="1" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg%3Fresize%3D698%252C400%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="698"><noscript data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6832" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=698%2C400&amp;#038;ssl=1" alt="" width="698" height="400" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?w=698&amp;amp;ssl=1 698w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=510%2C292&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=100%2C57&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/judge-a-book.jpg?resize=300%2C172&amp;amp;ssl=1 300w" sizes="(max-width: 698px) 100vw, 698px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">This idiom was </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gingersoftware.com/content/phrases/dont-judge-a-book-by-its-cover/%23.WUnuC3V96WY" target="_blank"><span data-dcnode-id="818" instrument_node="">popularised in the 1940s</span></a><span data-dcnode-id="816" instrument_node=""> after it was used in several texts released during this time. The meaning is that you ‘cannot make a decision about something just on its appearance’.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="813" instrument_node="">The Chinese idiom which translates to ‘You can’t judge a person by appearance, just as you can’t measure the sea with a pint pot’, comes from the Story of the Journey to the West 《</span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%25A5%25BF%25E6%25B8%25B8%25E8%25AE%25B0%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="812" instrument_node="">西游记</span></a><span data-dcnode-id="810" instrument_node="">》(xī yóu jì) Chapter 62 “</span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E9%2599%259B%25E4%25B8%258B%25EF%25BC%258C%25E4%25BA%25BA%25E4%25B8%258D%25E5%258F%25AF%25E8%25B2%258C%25E7%259B%25B8%25EF%25BC%258C%25E6%25B5%25B7%25E6%25B0%25B4%25E4%25B8%258D%25E5%258F%25AF%25E6%2596%2597%25E9%2587%258F%25E3%2580%2582%25E8%258B%25A5%25E7%2588%25B1%25E4%25B8%25B0%25E5%25A7%25BF%25E8%2580%2585%25EF%25BC%258C%25E5%25A6%2582%25E4%25BD%2595%25E6%258D%2589%25E5%25BE%2597%25E5%25A6%2596%25E8%25B4%25BC%25E4%25B9%259F%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="809" instrument_node="">陛下，人不可貌相，海水不可斗量。若爱丰姿者，如何捉得妖贼也</span></a><span data-dcnode-id="807" instrument_node="">？”</span></p><span data-dcnode-id="805" instrument_node="">
</span><h2 data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">9. Grass is always greener </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%25BF%2599%25E5%25B1%25B1%25E6%259C%259B%25E7%259D%2580%25E9%2582%25A3%25E5%25B1%25B1%25E9%25AB%2598%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="803" instrument_node="">这山望着那山高</span></a><span data-dcnode-id="801" instrument_node=""> (zhè shān wàng zhe nà shān gāo)</span></h2><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="795"><img alt="" class="aligncenter size-full wp-image-6833 jetpack-lazy-image" data-dcnode-id="798" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=600%2C398&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?w=600&amp;ssl=1 600w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=510%2C338&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=100%2C66&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=300%2C199&amp;ssl=1 300w" data-recalc-dims="1" height="398" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg%3Fresize%3D600%252C398%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="600"><noscript data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6833" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=600%2C398&amp;#038;ssl=1" alt="" width="600" height="398" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?w=600&amp;amp;ssl=1 600w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=510%2C338&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=100%2C66&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/the-grass-is-always-greener-david-arment.jpg?resize=300%2C199&amp;amp;ssl=1 300w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="793" instrument_node="">The phrase became well known in the 1920s when the song ‘The Grass is Always Greener in the Other Fellow’s Yard’ was released in 1924, however the origins of the idiom are said to have </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mamalisa.com/blog/the-proverb-the-grass-is-always-greener-on-the-other-side/" target="_blank"><span data-dcnode-id="792" instrument_node="">come from as far back as to the poet Ovid</span></a><span data-dcnode-id="790" instrument_node=""> (43 BC – 17 or 18 AD) in his poem ‘Art of Love’.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="787" instrument_node="">The Chinese version of this idiom translates as lit. the next mountain looks taller and comes from the poem 《</span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25B9%25A1%25E4%25B8%2587%25E8%25A7%25A3%25E9%25A2%2590%25C2%25B7%25E5%259C%25B0%25E9%2583%25A8%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="786" instrument_node="">乡万解颐·地部</span></a><span data-dcnode-id="784" instrument_node="">》(xiāng wàn jiě yí·dì bù): “</span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%258B%25A5%25E8%25BF%2599%25E5%25B1%25B1%25E7%259C%258B%25E7%259D%2580%25E9%2582%25A3%25E5%25B1%25B1%25E9%25AB%2598%25EF%25BC%258C%25E7%2595%2594%25E6%258F%25B4%25E6%25AD%2586%25E7%25BE%25A1%25E4%25B9%258B%25E8%25AF%258D%25E4%25B9%259F%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="783" instrument_node="">若这山看着那山高，畔援歆羡之词也</span></a><span data-dcnode-id="781" instrument_node="">。”</span></p><span data-dcnode-id="779" instrument_node="">
</span><h2 data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">10. Scrape the barrel </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2588%25AE%25E6%25A1%25B6%25E7%259A%2584%25E5%25BA%2595%25E9%2583%25A8%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="777" instrument_node="">刮桶的底部</span></a><span data-dcnode-id="775" instrument_node=""> (guā tǒng de dǐ bù)</span></h2><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="769"><img alt="" class="aligncenter size-full wp-image-6834 jetpack-lazy-image" data-dcnode-id="772" data-lazy-sizes="(max-width: 317px) 100vw, 317px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?resize=317%2C400&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?w=317&amp;ssl=1 317w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?resize=79%2C100&amp;ssl=1 79w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?resize=238%2C300&amp;ssl=1 238w" data-recalc-dims="1" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg%3Fresize%3D317%252C400%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="317"><noscript data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6834" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?resize=317%2C400&amp;#038;ssl=1" alt="" width="317" height="400" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?w=317&amp;amp;ssl=1 317w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?resize=79%2C100&amp;amp;ssl=1 79w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/scrape-bottom-of-barrel.jpg?resize=238%2C300&amp;amp;ssl=1 238w" sizes="(max-width: 317px) 100vw, 317px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">To ‘scrape the bottom of the barrel’ </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rollsoffthetongue.tumblr.com/post/43985900487/scrape-the-bottom-of-the-barrel-origin-this-is-an" target="_blank"><span data-dcnode-id="766" instrument_node="">originated in the USA in the days before refrigerators</span></a><span data-dcnode-id="764" instrument_node=""> when food was stored in barrels. The remainder of the food (which would no doubt be spoiled) would have to be scraped out with spoons (gross!) which produces the meaning, ‘to take an undesirable option because it’s the only choice’.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">刮桶的底部 is a literal translation of ‘to scrape the barrel’.</span></p><span data-dcnode-id="759" instrument_node="">
</span><h2 data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">11. Can’t teach an old dog new tricks </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%2580%2581%25E7%258B%2597%25E7%258E%25A9%25E4%25B8%258D%25E5%2587%25BA%25E6%2596%25B0%25E6%258A%258A%25E6%2588%258F%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="757" instrument_node="">老狗玩不出新把戏</span></a><span data-dcnode-id="755" instrument_node=""> (lǎo gǒu wán bù chū xīn bǎ xì)</span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="749"><img alt="" class="aligncenter size-full wp-image-6835 jetpack-lazy-image" data-dcnode-id="752" data-lazy-sizes="(max-width: 882px) 100vw, 882px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=882%2C543&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?w=882&amp;ssl=1 882w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=510%2C314&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=100%2C62&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=300%2C185&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=768%2C473&amp;ssl=1 768w" data-recalc-dims="1" height="543" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg%3Fresize%3D882%252C543%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="882"><noscript data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6835" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=882%2C543&amp;#038;ssl=1" alt="" width="882" height="543" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?w=882&amp;amp;ssl=1 882w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=510%2C314&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=100%2C62&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=300%2C185&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/newtricksolddogs.jpg?resize=768%2C473&amp;amp;ssl=1 768w" sizes="(max-width: 882px) 100vw, 882px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">This phrase, meaning ‘older people cannot learn as easily as the young’, </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrases.org.uk/meanings/you-cant-teach-an-old-dog-new-tricks.html" target="_blank"><span data-dcnode-id="746" instrument_node="">originates from as far back as the 1500s</span></a><span data-dcnode-id="744" instrument_node="">, when it was mentioned in ‘The Boke of Husbandry’, written by John Fitzherbert in 1534.</span></p><span data-dcnode-id="742" instrument_node="">
</span><h2 data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">12. Two peas in a pod </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25B8%2580%25E6%25A8%25A1%25E4%25B8%2580%25E6%25A0%25B7%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="740" instrument_node="">一模一样</span></a><span data-dcnode-id="738" instrument_node=""> (yī mú yī yàng)</span></h2><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="732"><img alt="" class="aligncenter size-medium wp-image-6836 jetpack-lazy-image" data-dcnode-id="735" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz-300x300.png?resize=300%2C300&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=300%2C300&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=235%2C235&amp;ssl=1 235w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=100%2C100&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=510%2C510&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=768%2C768&amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?w=1000&amp;ssl=1 1000w" data-recalc-dims="1" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz-300x300.png%3Fresize%3D300%252C300%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&lt;img loading="lazy" class="aligncenter size-medium wp-image-6836" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz-300x300.png?resize=300%2C300&amp;#038;ssl=1" alt="" width="300" height="300" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=300%2C300&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=235%2C235&amp;amp;ssl=1 235w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=100%2C100&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=510%2C510&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?resize=768%2C768&amp;amp;ssl=1 768w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/two_peas_in_a_pod_by_pettileaf-d6jbtyz.png?w=1000&amp;amp;ssl=1 1000w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">This phrase was first seen in </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrases.org.uk/meanings/as-alike-as-two-peas-in-a-pod.html" target="_blank"><span data-dcnode-id="729" instrument_node="">John Lyly’s ‘Euphues and his England</span></a><span data-dcnode-id="727" instrument_node="">’, 1580 “the Twinnes of Hippocrates, (who wer as lyke as one pease is to an other).”</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="724" instrument_node="">The original Chinese phrase was first seen in the Ming dynasty novel, ‘Slapping the Table in Amazement’《</span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2588%259D%25E5%2588%25BB%25E6%258B%258D%25E6%25A1%2588%25E6%2583%258A%25E5%25A5%2587%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="723" instrument_node="">初刻拍案惊奇</span></a><span data-dcnode-id="721" instrument_node="">》(chū kè pāi àn jīng qí): “</span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E8%25AF%259D%25E8%25AF%25B4%25E4%25BA%25BA%25E7%2594%259F%25E5%258F%25AA%25E6%259C%2589%25E9%259D%25A2%25E8%25B2%258C%25E6%259C%2580%25E4%25B8%258D%25E5%2590%258C%25EF%25BC%258C%25E7%259B%2596%25E5%259B%25A0%25E5%2590%2584%25E7%2588%25B6%25E6%25AF%258D%25E6%2589%2580%25E7%2594%259F%25EF%25BC%258C%25E5%258D%2583%25E6%2594%25AF%25E4%25B8%2587%25E6%25B4%25BE%25EF%25BC%258C%25E9%2582%25A3%25E8%2583%25BD%25E5%25A4%259F%25E4%25B8%2580%25E6%25A8%25A1%25E4%25B8%2580%25E6%25A0%25B7%25E7%259A%2584%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="720" instrument_node="">话说人生只有面貌最不同，盖因各父母所生，千支万派，那能够一模一样的</span></a><span data-dcnode-id="718" instrument_node="">？”</span></p><span data-dcnode-id="716" instrument_node="">
</span><h2 data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">13. Up the creek without a paddle </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%25B1%25B1%25E7%25A9%25B7%25E6%25B0%25B4%25E5%25B0%25BD%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="714" instrument_node="">山穷水尽</span></a><span data-dcnode-id="712" instrument_node=""> (shān qióng shuǐ jìn)</span></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="706"><img alt="" class="aligncenter size-large wp-image-6837 jetpack-lazy-image" data-dcnode-id="709" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle-1024x684.jpeg?resize=900%2C601&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=510%2C341&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=100%2C67&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=768%2C513&amp;ssl=1 768w" data-recalc-dims="1" height="601" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle-1024x684.jpeg%3Fresize%3D900%252C601%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="900"><noscript data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-6837" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle-1024x684.jpeg?resize=900%2C601&amp;#038;ssl=1" alt="" width="900" height="601" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?w=1024&amp;amp;ssl=1 1024w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=510%2C341&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=100%2C67&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/upthecreekwithoutapaddle.jpeg?resize=768%2C513&amp;amp;ssl=1 768w" sizes="(max-width: 900px) 100vw, 900px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">The phrase ‘up shit creek’ </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrases.org.uk/meanings/up-shit-creek-without-a-paddle.html" target="_blank"><span data-dcnode-id="703" instrument_node="">originated during the 1860s when it was quoted</span></a><span data-dcnode-id="701" instrument_node=""> by the Secretary of War that, “Our men have put old [Abraham] Lincoln up shit creek.” The phrase means to be in an almost ‘impossible or uncomfortable situation’</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="698" instrument_node="">The Chinese idiom has a similar meaning and comes from </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/worddetail/luyou/18280/3/1" target="_blank"><span data-dcnode-id="697" instrument_node="">陆游</span></a><span data-dcnode-id="695" instrument_node=""> (lù yóu) Lu You’s poem from the Song dynasty《</span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E6%25B8%25B8%25E5%25B1%25B1%25E8%25A5%25BF%25E6%259D%2591%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="694" instrument_node="">游山西村</span></a><span data-dcnode-id="692" instrument_node="">》(yóu shān xī cūn): “</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%25B1%25B1%25E9%2587%258D%25E6%25B0%25B4%25E5%25A4%258D%25E7%2596%2591%25E6%2597%25A0%25E8%25B7%25AF%25EF%25BC%258C%25E6%259F%25B3%25E6%259A%2597%25E8%258A%25B1%25E6%2598%258E%25E5%258F%2588%25E4%25B8%2580%25E6%259D%2591%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="691" instrument_node="">山重水复疑无路，柳暗花明又一村</span></a><span data-dcnode-id="689" instrument_node="">。”</span></p><span data-dcnode-id="687" instrument_node="">
</span><h2 data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">14. Once bitten, twice shy </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E4%25B8%2580%25E6%259C%259D%25E8%25A2%25AB%25E8%259B%2587%25E5%2592%25AC%25EF%25BC%258C%25E5%258D%2581%25E5%25B9%25B4%25E6%2580%2595%25E4%25BA%2595%25E7%25BB%25B3%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="685" instrument_node=""> 一朝被蛇咬，十年怕井绳</span></a><span data-dcnode-id="683" instrument_node=""> (yī zhāo bèi shé yǎo , shí nián pà jǐng shéng)</span></h2><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="677"><img alt="" class="aligncenter size-full wp-image-6838 jetpack-lazy-image" data-dcnode-id="680" data-lazy-sizes="(max-width: 509px) 100vw, 509px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?resize=509%2C300&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?w=509&amp;ssl=1 509w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?resize=100%2C59&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?resize=300%2C177&amp;ssl=1 300w" data-recalc-dims="1" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg%3Fresize%3D509%252C300%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="509"><noscript data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6838" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?resize=509%2C300&amp;#038;ssl=1" alt="" width="509" height="300" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?w=509&amp;amp;ssl=1 509w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?resize=100%2C59&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/oncebittentwiceshy.jpg?resize=300%2C177&amp;amp;ssl=1 300w" sizes="(max-width: 509px) 100vw, 509px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">The phrase became popular in the 1920s after several authors, including Joseph Conrad and Aldous Huxley, used it in their work. However it is said to have been used first in </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrases.org.uk/bulletin_board/10/messages/468.html" target="_blank"><span data-dcnode-id="674" instrument_node="">William Caxton’s translation of Aesop’s Fables</span></a><span data-dcnode-id="672" instrument_node=""> in 1484.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The Chinese version of this idiom comes from 《续传灯录》“一度著蛇咬，怕见断井索”.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Literally meaning ‘once you’ve been bitten by a snake, you’ll be afraid of a rope for ten years’.</span></p><span data-dcnode-id="664" instrument_node="">
</span><h2 data-dcnode-id="659"><span data-dcnode-id="663" instrument_node="">15. Time flies </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dictionary.writtenchinese.com/%23sk%3D%25E5%2585%2589%25E9%2598%25B4%25E4%25BC%25BC%25E7%25AE%25AD%26svt%3Dpinyin" target="_blank"><span data-dcnode-id="662" instrument_node="">光阴似箭</span></a><span data-dcnode-id="660" instrument_node=""> (guāng yīn sì jiàn)</span></h2><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="654"><img alt="" class="aligncenter size-full wp-image-6839 jetpack-lazy-image" data-dcnode-id="657" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=800%2C529&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?w=800&amp;ssl=1 800w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=510%2C337&amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=100%2C66&amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=300%2C198&amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=768%2C508&amp;ssl=1 768w" data-recalc-dims="1" height="529" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg%3Fresize%3D800%252C529%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="800"><noscript data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-6839" src="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=800%2C529&amp;#038;ssl=1" alt="" width="800" height="529" srcset="https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?w=800&amp;amp;ssl=1 800w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=510%2C337&amp;amp;ssl=1 510w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=100%2C66&amp;amp;ssl=1 100w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=300%2C198&amp;amp;ssl=1 300w, https://i0.wp.com/www.writtenchinese.com/wp-content/uploads/2017/06/time_flies35..jpg?resize=768%2C508&amp;amp;ssl=1 768w" sizes="(max-width: 800px) 100vw, 800px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">This phrase </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.importantindia.com/23794/time-flies/" target="_blank"><span data-dcnode-id="651" instrument_node="">originates from the Latin, ‘empus fugit</span></a><span data-dcnode-id="649" instrument_node="">‘ and was taken from the poetry of Virgil. It was used as a common proverb by the Romans which they translated as ‘time flees’.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The Chinese idiom translates to ‘time flies like an arrow’, meaning ‘time goes quickly (as an arrow) and was seen first in the Ming dynasty children’s book 《增广贤文》“光阴似箭，日月如梭”. The phrase is usually used to mean ‘there isn’t enough time to do something’.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="643" instrument_node="">You might also like to check out our article, </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writtenchinese.com/10-useful-chinese-chengyu-and-idioms-for-beginners/"><span data-dcnode-id="642" instrument_node="">10 Useful Chinese Chengyu and Idioms for Beginners. </span></a></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">If you have other idioms to share with us, please leave them in the comment section below!</span></p><span data-dcnode-id="636" instrument_node="">
