</span><h1 class="entry-title" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Money Idioms: 12 Popular Idioms with Sentences (+ Practice Quiz!)</span></h1><span data-dcnode-id="4390" instrument_node="">
</span><p class="post-meta" data-dcnode-id="4383"><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nextstepenglish.com/category/english-vocabulary/english-idioms/" rel="category tag"><span data-dcnode-id="4389" instrument_node="">English Idioms</span></a><span data-dcnode-id="4387" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="4384"><a data-dcnode-id="4385" href="#respond"><span data-dcnode-id="4386" instrument_node="">10 comments</span></a></span></p><span data-dcnode-id="4382" instrument_node="">
</span></div><span data-dcnode-id="4380" instrument_node=""> </span><span data-dcnode-id="4378" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1058"><span data-dcnode-id="4377" instrument_node="">
</span><p data-dcnode-id="4366"><span data-dcnode-id="4376" instrument_node="">With tax day right around the corner, money seems to be on everybody’s minds here in the U.S. And heck, we don’t need tax day in order to think about money! Whether you </span><em data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">were born with a silver spoon in your mouth</span></em><span data-dcnode-id="4373" instrument_node=""> or </span><em data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">live hand to mouth</span></em><span data-dcnode-id="4370" instrument_node="">, money is central to daily life. In this post, we’re going to explore </span><strong data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">12 money idioms with sentences, images, and a practice quiz</span></strong><span data-dcnode-id="4367" instrument_node="">! Are any of these money-related idioms new to you? Tell us in the comments!</span></p><span data-dcnode-id="4365" instrument_node="">
</span><p data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4362" instrument_node="">
</span><div class="et-learn-more clearfix" data-dcnode-id="4352"><span data-dcnode-id="4361" instrument_node="">
</span><h3 class="heading-more" data-dcnode-id="4357"><span data-dcnode-id="4360" instrument_node="">What do you mean by TAX DAY?</span><span class="et_learnmore_arrow" data-dcnode-id="4358"><span data-dcnode-id="4359"></span></span></h3><span data-dcnode-id="4356" instrument_node="">
</span><div class="learn-more-content" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">In the United States, individual tax returns are due on April 15 every year. My parents are both accountants, so tax day was a big day in our house!</span></div><span data-dcnode-id="4353" instrument_node="">
</span></div><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4348" instrument_node="">

</span><p data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4268" instrument_node="">

</span><h2 data-dcnode-id="4261"><span data-dcnode-id="4262" style="color: #339966;"><strong data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">Money Idiom 1: BRING HOME THE BACON</span></strong></span></h2><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4246"><span data-dcnode-id="4256" instrument_node="">This popular idiom has two meanings, but the meanings are very similar. If I say that Reginald </span><strong data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">brings home the bacon</span></strong><span data-dcnode-id="4253" instrument_node="">, I might mean that he </span><strong data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">is successful at something</span></strong><span data-dcnode-id="4250" instrument_node="">. I might also mean, though, that he </span><strong data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">earns money for his family to live on</span></strong><span data-dcnode-id="4247" instrument_node="">. They’re similar because if you’re successful at something, it might give you the opportunity to earn money to support your family.</span></p><span data-dcnode-id="4245" instrument_node="">
</span><p data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4242" instrument_node="">
</span><p data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Personally, I think I would love any man who brought me bacon!&nbsp;? (If my husband is reading this: HINT, HINT!)</span></p><span data-dcnode-id="4239" instrument_node="">
</span><p data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4236" instrument_node="">
</span><div class="et-learn-more clearfix" data-dcnode-id="4226"><span data-dcnode-id="4235" instrument_node="">
</span><h3 class="heading-more" data-dcnode-id="4231"><span data-dcnode-id="4234" instrument_node="">What do you mean by HINT, HINT?</span><span class="et_learnmore_arrow" data-dcnode-id="4232"><span data-dcnode-id="4233"></span></span></h3><span data-dcnode-id="4230" instrument_node="">
</span><div class="learn-more-content" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">hint, hint = (informal, humorous) this is something we say when we want someone to do something without directly asking them to do it.</span></div><span data-dcnode-id="4227" instrument_node="">
</span></div><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4212" style="padding-left: 60px;"><em data-dcnode-id="4217"><span data-dcnode-id="4221" instrument_node="">Those weren’t the empty promises of a politician. She actually </span><strong data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">brought home the bacon</span></strong><span data-dcnode-id="4218" instrument_node="">.</span></em><br data-dcnode-id="4216"><span data-dcnode-id="4215" instrument_node="">
</span><em data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">(= She was actually successful at doing what she said she was going to do)</span></em></p><span data-dcnode-id="4211" instrument_node="">
</span><p data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4208" instrument_node="">
</span><p data-dcnode-id="4198" style="padding-left: 60px;"><em data-dcnode-id="4203"><span data-dcnode-id="4207" instrument_node="">I take care of the kids, and Lee </span><strong data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">brings home the bacon</span></strong><span data-dcnode-id="4204" instrument_node="">.</span></em><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node="">
</span><em data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">(= Lee supports the family financially)</span></em></p><span data-dcnode-id="4197" instrument_node="">
</span><p data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4193"></p><div class="et_social_media_wrapper" data-dcnode-id="4128"><img alt="money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English" class="aligncenter size-large wp-image-2400" data-dcnode-id="4192" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English-1024x512.png&amp;raw" srcset="https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English.png 1024w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English-300x150.png 300w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English-768x384.png 768w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English-610x305.png 610w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-bring-home-the-bacon-Next-Step-English-600x300.png 600w" width="1024"><div class="et_social_media et_social_media_hidden et_social_mobile_on" data-dcnode-id="4129"><span data-dcnode-id="4191" instrument_node="">

</span><h2 data-dcnode-id="3702"><span data-dcnode-id="3703" style="color: #339966;"><strong data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Money Idiom 4: WORTH YOUR/ITS WEIGHT IN GOLD</span></strong></span></h2><span data-dcnode-id="3701" instrument_node="">
</span><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3698" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3697" instrument_node="">A person who is </span><strong data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">worth their weight in gold</span></strong><span data-dcnode-id="3694" instrument_node=""> is </span><strong data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">very useful or valuable</span></strong><span data-dcnode-id="3691" instrument_node="">. Likewise, something that’s </span><strong data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">worth its weight in gold</span></strong><span data-dcnode-id="3688" instrument_node=""> is </span><strong data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">very useful or valuable</span></strong><span data-dcnode-id="3685" instrument_node="">.</span></p><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3674" style="padding-left: 60px;"><em data-dcnode-id="3675"><span data-dcnode-id="3679" instrument_node="">My lawyer is </span><strong data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">worth her weight in gold</span></strong><span data-dcnode-id="3676" instrument_node="">. I thought for sure I’d have to do jail time, but she got me out of it on procedural grounds.</span></em></p><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3664" style="padding-left: 60px;"><em data-dcnode-id="3665"><span data-dcnode-id="3669" instrument_node="">The new shovel you got me is </span><strong data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">worth its weight in gold</span></strong><span data-dcnode-id="3666" instrument_node="">. It takes a lot of pressure off my back when I’m shoveling the driveway.</span></em></p><span data-dcnode-id="3663" instrument_node="">

</span><h2 data-dcnode-id="3582"><span data-dcnode-id="3583" style="color: #339966;"><strong data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Money Idiom 5: IN FOR A PENNY, IN FOR A POUND</span></strong></span></h2><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3574"><strong data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">In for a penny, in for a pound</span></strong><span data-dcnode-id="3575" instrument_node="">. This common idiom makes reference to British currency. A penny is a tiny amount of money—it’s not even enough to buy a gumball!—and a pound is worth 100 pence. It’s still not a lot of money, but it’s certainly worth a lot more!</span></p><span data-dcnode-id="3573" instrument_node="">
</span><p data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3570" instrument_node="">
</span><div class="et-learn-more clearfix" data-dcnode-id="3560"><span data-dcnode-id="3569" instrument_node="">
</span><h3 class="heading-more" data-dcnode-id="3565"><span data-dcnode-id="3568" instrument_node="">PENCE? I thought it was PENNIES?</span><span class="et_learnmore_arrow" data-dcnode-id="3566"><span data-dcnode-id="3567"></span></span></h3><span data-dcnode-id="3564" instrument_node="">
</span><div class="learn-more-content" data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">In Great Britain, the plural of ‘penny’ is ‘pence’. In the United States, the plural of ‘penny’ is ‘pennies’. Interesting, right? ?</span></div><span data-dcnode-id="3561" instrument_node="">
</span></div><span data-dcnode-id="3559" instrument_node="">
</span><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3556" instrument_node="">
</span><p data-dcnode-id="3551"><span data-dcnode-id="3555" instrument_node="">We use this idiom to say that </span><strong data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">since you have started to do something, it is worth spending as much time or money as you need to in order to complete it</span></strong><span data-dcnode-id="3552" instrument_node="">.</span></p><span data-dcnode-id="3550" instrument_node="">
</span><p data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3547" instrument_node="">
</span><p data-dcnode-id="3537" style="padding-left: 60px;"><em data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Rick: I know I gave you an estimate of $5,000 for the remodeling work in your basement, but I’ve just discovered a major structural issue. It’s going to double the price of the job.</span></em><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">
</span><em data-dcnode-id="3538"><span data-dcnode-id="3542" instrument_node="">Frank: You’re kidding. Ah well. </span><strong data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">In for a penny, in for a pound.</span></strong><span data-dcnode-id="3539" instrument_node=""> Do what you need to do.</span></em></p><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3533" instrument_node="">

</span><h2 data-dcnode-id="3455"><span data-dcnode-id="3456" style="color: #339966;"><strong data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Money Idiom 6: A KING’S RANSOM</span></strong></span></h2><span data-dcnode-id="3454" instrument_node="">
</span><p data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3446"><span data-dcnode-id="3450" instrument_node="">One of the great things about learning idioms is that you learn other English vocabulary, too! This money idiom contains a fabulous word in English, </span><em data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">ransom</span></em><span data-dcnode-id="3447" instrument_node="">. A ransom is money that you pay to someone in exchange for a prisoner they’re keeping. If the prisoner is an average person, the ransom wouldn’t be that high. But can you imagine how high the ransom would be if the prisoner were a king?</span></p><span data-dcnode-id="3445" instrument_node="">
</span><p data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3442" instrument_node="">
</span><p data-dcnode-id="3431"><span data-dcnode-id="3441" instrument_node="">So, when we say that something cost you </span><strong data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">a king’s ransom</span></strong><span data-dcnode-id="3438" instrument_node="">, we mean that it cost you </span><strong data-dcnode-id="3433"><span data-dcnode-id="3437" instrument_node="">a </span><em data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">very </span></em><span data-dcnode-id="3434" instrument_node="">large amount of money</span></strong><span data-dcnode-id="3432" instrument_node="">.</span></p><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3427" instrument_node="">
</span><p data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Of course, we love to exaggerate in English! We can use this idiom to refer to something that cost a lot of money. However, we can also use it to refer to paying more for something than we thought was a fair price, even if it’s not a lot of money.</span></p><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3421" instrument_node="">
</span><p data-dcnode-id="3413" style="padding-left: 60px;"><em data-dcnode-id="3416"><span data-dcnode-id="3420" instrument_node="">I love living on the water. I paid </span><strong data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">a king’s ransom</span></strong><span data-dcnode-id="3417" instrument_node=""> for the location, but it was worth every penny. I feel totally connected to nature.</span></em><br data-dcnode-id="3415"><span data-dcnode-id="3414" instrument_node="">
(Here, the speaker really did pay a very large amount of money.)</span></p><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3409" instrument_node="">
</span><p data-dcnode-id="3401" style="padding-left: 60px;"><em data-dcnode-id="3404"><span data-dcnode-id="3408" instrument_node="">When I was a kid, you could get a burger for 25 cents. Now, it’ll cost you </span><strong data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">a king’s ransom</span></strong><span data-dcnode-id="3405" instrument_node="">!</span></em><br data-dcnode-id="3403"><span data-dcnode-id="3402" instrument_node="">
(Here, the burger doesn’t cost a lot of money. It just costs a lot more than the speaker thinks is a fair price. It’s a lot more than what he used to pay.)</span></p><span data-dcnode-id="3400" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3397" instrument_node="">

</span><h2 data-dcnode-id="3319"><span data-dcnode-id="3320" style="color: #339966;"><strong data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Money Idiom 7: NEST EGG</span></strong></span></h2><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3314" instrument_node="">A </span><strong data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">nest egg</span></strong><span data-dcnode-id="3311" instrument_node=""> is </span><strong data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">a sum of money that you save to use in the future</span></strong><span data-dcnode-id="3308" instrument_node="">.</span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3297" style="padding-left: 60px;"><em data-dcnode-id="3298"><span data-dcnode-id="3302" instrument_node="">I’d rather not use our </span><strong data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">nest egg</span></strong><span data-dcnode-id="3299" instrument_node=""> for something like a new car. Our old beater works just fine for now, and I want to save that money for a house down payment.</span></em></p><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3292" style="padding-left: 60px;"></p><div class="et-learn-more clearfix" data-dcnode-id="3282"><span data-dcnode-id="3291" instrument_node="">

</span><div class="learn-more-content" data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">beater = (informal) an old car that is in bad condition</span></div><span data-dcnode-id="3283" instrument_node="">

</span><p data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3277" instrument_node="">

</span><h2 data-dcnode-id="3190"><span data-dcnode-id="3191" style="color: #339966;"><strong data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Money Idiom 8: BORN WITH A SILVER SPOON IN YOUR MOUTH</span></strong></span></h2><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3186" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3185" instrument_node="">If I say that someone was </span><strong data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">born with a silver spoon in their mouth</span></strong><span data-dcnode-id="3182" instrument_node="">, I mean they were </span><strong data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">born into a rich family</span></strong><span data-dcnode-id="3179" instrument_node="">. We usually use this idiom disapprovingly to imply that the person doesn’t understand the struggles of average people because they’ve had a very easy life, financially speaking.</span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3168" style="padding-left: 60px;"><em data-dcnode-id="3169"><span data-dcnode-id="3173" instrument_node="">What does Thomas know about the struggle to make rent each month? Or how much we sacrifice to be able to send our kids to school? He was </span><strong data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">born with a silver spoon in his mouth</span></strong><span data-dcnode-id="3170" instrument_node="">.</span></em></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3163" style="padding-left: 60px;"></p><div class="et-learn-more clearfix" data-dcnode-id="3153"><span data-dcnode-id="3162" instrument_node="">
</span><h3 class="heading-more" data-dcnode-id="3158"><span data-dcnode-id="3161" instrument_node="">MAKE RENT? I thought it was PAY RENT?</span><span class="et_learnmore_arrow" data-dcnode-id="3159"><span data-dcnode-id="3160"></span></span></h3><span data-dcnode-id="3157" instrument_node="">
</span><div class="learn-more-content" data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">You can definitely say ‘pay rent’. ‘Make rent’ means something slightly different. When you struggle to make rent, you struggle to make enough money to be able to pay your rent every month.</span></div><span data-dcnode-id="3154" instrument_node="">
</span></div><p data-dcnode-id="3152"></p><span data-dcnode-id="3151" instrument_node="">

</span><h2 data-dcnode-id="3070"><span data-dcnode-id="3071" style="color: #339966;"><strong data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Money Idiom 9: LIVE HAND TO MOUTH</span></strong></span></h2><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3065" instrument_node="">Someone who was born with a silver spoon in their mouth probably doesn’t understand what it’s like to </span><strong data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">live hand to mouth</span></strong><span data-dcnode-id="3062" instrument_node="">. When you live hand to mouth, you </span><strong data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">spend all the money you earn on basic needs, such as food, without being able to save any money</span></strong><span data-dcnode-id="3059" instrument_node="">.</span></p><span data-dcnode-id="3057" instrument_node="">
</span><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3048" style="padding-left: 60px;"><em data-dcnode-id="3049"><span data-dcnode-id="3053" instrument_node="">We were </span><strong data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">living hand to mouth</span></strong><span data-dcnode-id="3050" instrument_node=""> for a few years while we were getting the business off the ground, but that’s all in the past now. We’re finally living our dreams!</span></em></p><span data-dcnode-id="3047" instrument_node="">
</span><p data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3043"></p><div class="et_social_media_wrapper" data-dcnode-id="2978"><img alt="money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English" class="aligncenter size-large wp-image-2408" data-dcnode-id="3042" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English-1024x512.png&amp;raw" srcset="https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English.png 1024w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English-300x150.png 300w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English-768x384.png 768w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English-610x305.png 610w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-live-hand-to-mouth-Next-Step-English-600x300.png 600w" width="1024"><div class="et_social_media et_social_media_hidden et_social_mobile_on" data-dcnode-id="2979"><span data-dcnode-id="3041" instrument_node="">

</span><h2 data-dcnode-id="2966"><span data-dcnode-id="2967" style="color: #339966;"><strong data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Money Idiom 10: COOK THE BOOKS</span></strong></span></h2><span data-dcnode-id="2965" instrument_node="">
</span><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2962" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2961" instrument_node="">My parents are both accountants, and when I lived at home, it wasn’t uncommon for me to hear them talking about discovering that someone was </span><strong data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">cooking the books</span></strong><span data-dcnode-id="2958" instrument_node="">. They usually said it with a grin, proud of themselves for having discovered it. When someone cooks the books, they </span><strong data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">falsify the financial records for a company or organization</span></strong><span data-dcnode-id="2955" instrument_node="">. This is a crime, and people might cook the books for a variety of reasons. They might be embezzling, or they might be committing tax fraud, etc.</span></p><span data-dcnode-id="2953" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2950" instrument_node="">
</span><div class="et-learn-more clearfix" data-dcnode-id="2940"><span data-dcnode-id="2949" instrument_node="">
</span><h3 class="heading-more" data-dcnode-id="2945"><span data-dcnode-id="2948" instrument_node="">EMBEZZLING? What does that mean?</span><span class="et_learnmore_arrow" data-dcnode-id="2946"><span data-dcnode-id="2947"></span></span></h3><span data-dcnode-id="2944" instrument_node="">
</span><div class="learn-more-content" data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">embezzle = to steal money that you are responsible for or that belongs to your employer</span></div><span data-dcnode-id="2941" instrument_node="">
</span></div><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2930" style="padding-left: 60px;"><em data-dcnode-id="2931"><span data-dcnode-id="2935" instrument_node="">Integrity needs to be the main quality we look for in our next bookkeeper. Our last bookkeeper was </span><strong data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">cooking the books</span></strong><span data-dcnode-id="2932" instrument_node=""> and managed to embezzle over $100,000 before we caught on.</span></em></p><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2925"></p><div class="et_social_media_wrapper" data-dcnode-id="2860"><img alt="money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English" class="aligncenter size-large wp-image-2409" data-dcnode-id="2924" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English-1024x512.png&amp;raw" srcset="https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English.png 1024w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English-300x150.png 300w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English-768x384.png 768w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English-610x305.png 610w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cook-the-books-Next-Step-English-600x300.png 600w" width="1024"><div class="et_social_media et_social_media_hidden et_social_mobile_on" data-dcnode-id="2861"><span data-dcnode-id="2923" instrument_node="">

</span><h2 data-dcnode-id="2848"><span data-dcnode-id="2849" style="color: #339966;"><strong data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Money Idiom 11: CASH COW</span></strong></span></h2><span data-dcnode-id="2847" instrument_node="">
</span><p data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2844" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2843" instrument_node="">A </span><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">cash cow</span></strong><span data-dcnode-id="2840" instrument_node=""> is</span><strong data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node=""> the part of a business that always makes a profit and that provides money for the rest of the business</span></strong><span data-dcnode-id="2837" instrument_node="">. A cash cow might be a popular product, or it could even be a superstar performer or athlete who attracts customers more than anyone else on the team.</span></p><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2826" style="padding-left: 60px;"><em data-dcnode-id="2827"><span data-dcnode-id="2831" instrument_node="">You think the Patriots wants to trade Tom Brady? Are you kidding?! He’s their </span><strong data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">cash cow</span></strong><span data-dcnode-id="2828" instrument_node="">!</span></em></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2816" style="padding-left: 60px;"><em data-dcnode-id="2817"><span data-dcnode-id="2821" instrument_node="">We sometimes lose money on the food, but hookah is our </span><strong data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">cash cow</span></strong><span data-dcnode-id="2818" instrument_node="">. People love coming here to smoke, and the profit margins on hookah are through the roof.</span></em></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2811"></p><div class="et_social_media_wrapper" data-dcnode-id="2746"><img alt="money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English" class="aligncenter size-large wp-image-2410" data-dcnode-id="2810" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English-1024x512.png&amp;raw" srcset="https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English.png 1024w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English-300x150.png 300w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English-768x384.png 768w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English-610x305.png 610w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-cash-cow-Next-Step-English-600x300.png 600w" width="1024"><div class="et_social_media et_social_media_hidden et_social_mobile_on" data-dcnode-id="2747"><span data-dcnode-id="2809" instrument_node="">

</span><h2 data-dcnode-id="2734"><span data-dcnode-id="2735" style="color: #339966;"><strong data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Money Idiom 12: PUT YOUR MONEY WHERE YOUR MOUTH IS</span></strong></span></h2><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2729" instrument_node="">This is one of the most popular idioms on this list of money idioms! If you </span><strong data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">put your money where your mouth is</span></strong><span data-dcnode-id="2726" instrument_node="">, you </span><strong data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">show by your actions that you really mean something</span></strong><span data-dcnode-id="2723" instrument_node="">.</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2718" instrument_node="">
</span><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Someone might talk a lot about solving a problem, but if they actually contribute some of their own money towards solving the problem, people understand that they truly care about the issue. This idiom doesn’t only refer to using money to show your sincerity, but that’s where the idea behind the idiom came from.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2706" style="padding-left: 60px;"><em data-dcnode-id="2707"><span data-dcnode-id="2711" instrument_node="">You talk a lot about sustainability, but I don’t see you making a single change in your own life. </span><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Put your money where your mouth is</span></strong><span data-dcnode-id="2708" instrument_node="">.</span></em></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2701"></p><div class="et_social_media_wrapper" data-dcnode-id="2636"><img alt="money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English" class="aligncenter size-large wp-image-2411" data-dcnode-id="2700" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English-1024x512.png&amp;raw" srcset="https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English.png 1024w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English-300x150.png 300w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English-768x384.png 768w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English-610x305.png 610w, https://nextstepenglish.com/wp-content/uploads/2018/03/money-idioms-with-sentences-popular-idioms-put-your-money-where-your-mouth-is-Next-Step-English-600x300.png 600w" width="1024"><div class="et_social_media et_social_media_hidden et_social_mobile_on" data-dcnode-id="2637"><span data-dcnode-id="2699" instrument_node="">
