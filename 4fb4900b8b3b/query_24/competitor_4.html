</span><div class="site-content wpex-clr" data-dcnode-id="307" id="content"><span data-dcnode-id="841" instrument_node="">
</span><article class="single-blog-article wpex-first-mt-0 wpex-clr" data-dcnode-id="309" id="single-blocks"><span data-dcnode-id="840" instrument_node="">
</span><header class="single-blog-header wpex-mb-10" data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">
</span><h1 class="single-post-title entry-title wpex-text-3xl" data-dcnode-id="837" itemprop="headline"><span data-dcnode-id="838" instrument_node="">English Idioms with Chinese Origins</span></h1><span data-dcnode-id="836" instrument_node="">
</span></header><span data-dcnode-id="834" instrument_node="">
</span><ul class="meta wpex-text-sm wpex-text-gray-600 wpex-mb-20 wpex-last-mr-0" data-dcnode-id="816"><span data-dcnode-id="833" instrument_node="">
</span><li class="meta-date" data-dcnode-id="830"><span aria-hidden="true" class="ticon ticon-clock-o" data-dcnode-id="832"></span><span data-dcnode-id="831" instrument_node="">Last updated: May 22, 2018</span></li><span data-dcnode-id="829" instrument_node="">
</span><li class="meta-author" data-dcnode-id="823"><span aria-hidden="true" class="ticon ticon-user-o" data-dcnode-id="828"></span><span class="vcard author" data-dcnode-id="824" itemprop="name"><span class="fn" data-dcnode-id="825"><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digmandarin.com/author/dhruvchatterjee" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person" rel="author" title="Posts by Dhruv Chatterjee"><span data-dcnode-id="827" instrument_node="">Dhruv Chatterjee</span></a></span></span></li><span data-dcnode-id="822" instrument_node="">
</span><li class="meta-category" data-dcnode-id="818"><span aria-hidden="true" class="ticon ticon-folder-o" data-dcnode-id="821"></span><a class="term-1" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digmandarin.com/category/learn-mandarin-online"><span data-dcnode-id="820" instrument_node="">Learn Chinese</span></a></li><span data-dcnode-id="817" instrument_node="">
</span></ul><span data-dcnode-id="815" instrument_node="">
</span><div class="single-blog-content entry wpex-mt-20 wpex-mb-40 wpex-clr" data-dcnode-id="565" itemprop="text"><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Have you ever wondered where idioms come from? Well, being one of the oldest civilizations on our planet today, it is no surprise that the source of many English sayings is China! The Mandarin word for idiom is 成语 and the most common types are four-character idioms. Ancient Chinese scholars loved their idioms and therefore most of these sayings that we take for granted in English have their roots in ancient Chinese literature.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The purpose of this article is not, however, to delve into the etymology of each saying. The truth is that each saying has a complicated history that includes dialects unrelated to Mandarin and English.&nbsp; Today, however, I hope to simply bring your attention to some obvious idiomatic overlaps between these two languages.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">&nbsp;</span></p><span data-dcnode-id="806" instrument_node="">
</span><h2 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">1. Kill two birds with one stone</span></h2><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="794"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">一石二</span></strong><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">鸟</span></strong><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node=""> (y</span></strong><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">ī shí èr niǎo)</span></strong></p><span data-dcnode-id="793" instrument_node="">
</span><div class="mjp-s-wrapper s-graphic unsel-mjp" data-dcnode-id="783" id="mp3jWrap_0" style="font-size:18px;"><span class="wrap_inline_mp3j" data-dcnode-id="784" id="playpause_wrap_mp3j_0" style="font-weight:700;"><span class="gfxbutton_mp3j play-mjp" data-dcnode-id="791" id="playpause_mp3j_0" style="font-size:18px;"><span data-dcnode-id="792" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="790" instrument_node="">&nbsp;</span><span class="group_wrap" data-dcnode-id="785"><span class="bars_mp3j" data-dcnode-id="787"><span class="loadB_mp3j" data-dcnode-id="789" id="load_mp3j_0"></span><span class="posbarB_mp3j" data-dcnode-id="788" id="posbar_mp3j_0"></span></span><span class="indi_mp3j" data-dcnode-id="786" id="statusMI_0" style="font-size:12.6px;"></span></span></span></div><span class="s-nosolution" data-dcnode-id="782" id="mp3j_nosolution_0" style="display:none;"></span><span data-dcnode-id="779" instrument_node="">
</span><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The overlap here is quite simple and straightforward. The Mandarin translates to “one stone two birds” and English speakers added the ‘kill’ because they could not leave anything to the imagination, and thought it felt slightly incomplete without some classic colonial violence </span><em data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">(joking, geez</span></em><span data-dcnode-id="772" instrument_node="">).</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">&nbsp;</span></p><span data-dcnode-id="767" instrument_node="">
</span><h2 data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">2. Love at first sight</span></h2><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="755"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">一</span></strong><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">见钟</span></strong><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">情</span></strong><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">(yí jiàn zhōng qíng)</span></strong></p><span data-dcnode-id="754" instrument_node="">
</span><div class="mjp-s-wrapper s-graphic unsel-mjp" data-dcnode-id="744" id="mp3jWrap_1" style="font-size:18px;"><span class="wrap_inline_mp3j" data-dcnode-id="745" id="playpause_wrap_mp3j_1" style="font-weight:700;"><span class="gfxbutton_mp3j play-mjp" data-dcnode-id="752" id="playpause_mp3j_1" style="font-size:18px;"><span data-dcnode-id="753" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="751" instrument_node="">&nbsp;</span><span class="group_wrap" data-dcnode-id="746"><span class="bars_mp3j" data-dcnode-id="748"><span class="loadB_mp3j" data-dcnode-id="750" id="load_mp3j_1"></span><span class="posbarB_mp3j" data-dcnode-id="749" id="posbar_mp3j_1"></span></span><span class="indi_mp3j" data-dcnode-id="747" id="statusMI_1" style="font-size:12.6px;"></span></span></span></div><span class="s-nosolution" data-dcnode-id="743" id="mp3j_nosolution_1" style="display:none;"></span><span data-dcnode-id="740" instrument_node="">
</span><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">It’s generally used for people, but you can also use it for other physical objects. Here’s an example:</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" style="color: #000000;"><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">She is my love at first sight.</span></em></span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" style="color: #000000;"><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">我对她</span></em><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">一见钟情</span></em><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">。</span></em><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node=""> &nbsp;</span></em></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" style="color: #000000;"><em data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">(Wǒ duì tā yíjiànzhōngqíng.)</span></em></span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">&nbsp;</span></p><span data-dcnode-id="710" instrument_node="">
</span><h2 data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">3. The customer is always right</span></h2><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="700"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">顾客就</span></strong><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">是上帝</span></strong><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node=""> (gùkèjiù shì shàngdì)</span></strong></p><span data-dcnode-id="699" instrument_node="">
</span><div class="mjp-s-wrapper s-graphic unsel-mjp" data-dcnode-id="689" id="mp3jWrap_2" style="font-size:18px;"><span class="wrap_inline_mp3j" data-dcnode-id="690" id="playpause_wrap_mp3j_2" style="font-weight:700;"><span class="gfxbutton_mp3j play-mjp" data-dcnode-id="697" id="playpause_mp3j_2" style="font-size:18px;"><span data-dcnode-id="698" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="696" instrument_node="">&nbsp;</span><span class="group_wrap" data-dcnode-id="691"><span class="bars_mp3j" data-dcnode-id="693"><span class="loadB_mp3j" data-dcnode-id="695" id="load_mp3j_2"></span><span class="posbarB_mp3j" data-dcnode-id="694" id="posbar_mp3j_2"></span></span><span class="indi_mp3j" data-dcnode-id="692" id="statusMI_2" style="font-size:12.6px;"></span></span></span></div><span class="s-nosolution" data-dcnode-id="688" id="mp3j_nosolution_2" style="display:none;"></span><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The Chinese version of the English expression takes the concept of customer service even more seriously. Word for word, this translates as “the customer is God,” which is similar to an Indian saying that “the guest is always God”. &nbsp;No wonder people working in restaurants seem to have lightning hands here. Someday, Shanghai’s taxi drivers might learn this saying but don’t get your hopes up.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">&nbsp;</span></p><span data-dcnode-id="676" instrument_node="">
</span><h2 data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">4. You can’t teach an old dog new tricks</span></h2><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="661"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">老狗玩不出</span></strong><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">新把</span></strong><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">戏</span></strong><span data-dcnode-id="666" instrument_node=""> </span><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">(lǎo gǒu wán bù chū xīn bǎxì</span></strong><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">)</span></strong></p><span data-dcnode-id="660" instrument_node="">
</span><div class="mjp-s-wrapper s-graphic unsel-mjp" data-dcnode-id="650" id="mp3jWrap_3" style="font-size:18px;"><span class="wrap_inline_mp3j" data-dcnode-id="651" id="playpause_wrap_mp3j_3" style="font-weight:700;"><span class="gfxbutton_mp3j play-mjp" data-dcnode-id="658" id="playpause_mp3j_3" style="font-size:18px;"><span data-dcnode-id="659" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="657" instrument_node="">&nbsp;</span><span class="group_wrap" data-dcnode-id="652"><span class="bars_mp3j" data-dcnode-id="654"><span class="loadB_mp3j" data-dcnode-id="656" id="load_mp3j_3"></span><span class="posbarB_mp3j" data-dcnode-id="655" id="posbar_mp3j_3"></span></span><span class="indi_mp3j" data-dcnode-id="653" id="statusMI_3" style="font-size:12.6px;"></span></span></span></div><span class="s-nosolution" data-dcnode-id="649" id="mp3j_nosolution_3" style="display:none;"></span><span data-dcnode-id="646" instrument_node="">
</span><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">The translation of this one is almost exactly like it is in English: “Old dogs can’t play new tricks”. It is interesting to notice that in the English versions, we make everything actionable by adding verbs like “teach” and “kill” whereas the Chinese sayings, like photographs, simply attempt to capture the reality of our world (illuminati confirmed).</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&nbsp;</span></p><span data-dcnode-id="637" instrument_node="">
</span><h2 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">5. Speak of the devil</span></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">说曹操，曹操到</span></strong><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node=""> (shuō Cáo Cāo, Cáo Cāo dào)</span></strong></p><span data-dcnode-id="628" instrument_node="">
</span><div class="mjp-s-wrapper s-graphic unsel-mjp" data-dcnode-id="618" id="mp3jWrap_4" style="font-size:18px;"><span class="wrap_inline_mp3j" data-dcnode-id="619" id="playpause_wrap_mp3j_4" style="font-weight:700;"><span class="gfxbutton_mp3j play-mjp" data-dcnode-id="626" id="playpause_mp3j_4" style="font-size:18px;"><span data-dcnode-id="627" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="625" instrument_node="">&nbsp;</span><span class="group_wrap" data-dcnode-id="620"><span class="bars_mp3j" data-dcnode-id="622"><span class="loadB_mp3j" data-dcnode-id="624" id="load_mp3j_4"></span><span class="posbarB_mp3j" data-dcnode-id="623" id="posbar_mp3j_4"></span></span><span class="indi_mp3j" data-dcnode-id="621" id="statusMI_4" style="font-size:12.6px;"></span></span></span></div><span class="s-nosolution" data-dcnode-id="617" id="mp3j_nosolution_4" style="display:none;"></span><span data-dcnode-id="614" instrument_node="">
</span><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="610" instrument_node="">This one literally translates to “say Cao Cao, Cao Cao arrives”. Cáo Cāo (曹操) was a warlord during the Three Kingdoms period of Chinese history. While he was praised as a brilliant strategist and fair ruler, Chinese opera also represented him as cunning and deceitful.&nbsp;This portrayal was made popular by the literary epic, </span><em data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Romance of the Three Kingdoms</span></em><em data-dcnode-id="606"><span data-dcnode-id="607" instrument_node=""> (</span></em><em data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">三国演义</span></em><em data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Sān Guó Yǎn Yì). </span></em><span data-dcnode-id="601" instrument_node="">The idiom arose out of the belief that Cáo Cāo had many eyes and ears everywhere, and moved with unbelievable speed. You had to be careful when speaking badly about him.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="596"><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">&nbsp;</span></em></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Anytime you are enjoying some gossip and the subject of your conversation suddenly texts,&nbsp;calls, or somehow announces her presence, you can verbalize this coincidence by saying, ” shuō Cáo Cāo, Cáo Cāo dào”. While the second half of the idiom about the devil showing up is implied in English, no one will ever just leave it at “shuō Cáo Cāo” in Mandarin. So this time, unlike this uninteresting explanation, the English version is shorter. (Boom! take that Mandarin!)</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">&nbsp;</span></p><span data-dcnode-id="589" instrument_node="">
</span><h2 data-dcnode-id="586"><u data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Conclusion</span></u></h2><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Since there are thousands of idioms in both English and Chinese, This article only managed to expose the tip of the iceberg (冰山一角 bīngshānyījiǎo) concerning idiomatic overlap. Each idiom went through a long etymological journey of its own and there are millions of connections that we did not get to. An obvious one not covered is &nbsp;‘long time no see’ which is a literal translation of Mandarin’s “好久不见” (hǎojiǔbújiàn). This one was borrowed (stolen) from Mandarin quite recently and seems to have resulted more from hipsters being hipsters rather than from the depths of human history and culture.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">&nbsp;</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Regardless of where, why and how they came about, the discovery of similarities between two languages that are very drastically different on the surface, insinuates the possibility that our differences are superficial, and we actually have more in common that we like to admit.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">&nbsp;</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Or maybe it just suggests that I love China.&nbsp; Either way, thanks for reading.</span></p><span data-dcnode-id="570" instrument_node="">
</span><div class="awac-wrapper" data-dcnode-id="566"><div class="awac widget media_image-2" data-dcnode-id="567"><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.touchchinese.com/%3Futm_source%3Ddigmandarin%26utm_medium%3Dbanner%26utm_content%3D20211122%26utm_campaign%3DDM" rel="noopener noreferrer" target="_blank"><img alt="" class="image wp-image-14223 attachment-370x328 size-370x328" data-dcnode-id="569" height="328" sizes="(max-width: 370px) 100vw, 370px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digmandarin.com/wp-content/uploads/2021/11/TMB-1.jpg&amp;raw" srcset="https://www.digmandarin.com/wp-content/uploads/2021/11/TMB-1.jpg 700w, https://www.digmandarin.com/wp-content/uploads/2021/11/TMB-1-300x266.jpg 300w" style="max-width: 100%; height: auto;" width="370"></a></div></div></div><span data-dcnode-id="564" instrument_node="">
