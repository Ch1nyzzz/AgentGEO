</span><header class="post-header clr" data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">
</span><h1 class="post-header-title entry-title" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Popular English Idioms and Their Curious Origins</span></h1><span data-dcnode-id="586" instrument_node="">
</span></header><span data-dcnode-id="584" instrument_node="">
</span><div class="single-post-media clr" data-dcnode-id="574"><span data-dcnode-id="583" instrument_node="">
</span><div class="post-thumbnail" data-dcnode-id="576"><span data-dcnode-id="582" instrument_node="">
</span><img alt="one man leaning over and speaking to two women sitting on a bench in olden times" data-dcnode-id="581" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-hero-03-1.jpg&amp;raw"><span data-dcnode-id="580" instrument_node="">
</span><span class="caption" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Federico Andreotti, "Flirtation," 1847-1930.</span></span><span data-dcnode-id="577" instrument_node="">
</span></div><span data-dcnode-id="575" instrument_node="">
</span></div><span data-dcnode-id="573" instrument_node="">
</span><div class="post-meta-top clr" data-dcnode-id="559"><span data-dcnode-id="572" instrument_node="">
</span><div class="post-meta-reading" data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">

•
</span><div class="post-meta-date updated" data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">
Last updated: </span><b data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">04.17.19</span></b><span data-dcnode-id="562" instrument_node="">

</span><div class="entry clr" data-dcnode-id="360"><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">According to Merriam-Webster, an idiom is defined as “an expression in the usage of a language that is peculiar to itself either grammatically or in having a meaning that cannot be derived from the conjoined meanings of its elements.” Each language and dialect has its own distinct, complex system of idioms, often derived from local or cultural customs, historical events, important figures, or religious traditions.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">Some are even derived from advertisements or notable literary examples. Such is the case for the illuminating phrase on hypocrisy known as “the pot calling the kettle black,” which first appeared in Thomas Shelton’s translation of Miguel de Cervantes’ Spanish novel, </span><em data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Don Quixote</span></em><span data-dcnode-id="550" instrument_node="">, in 1620.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Many of these figurative phrases have curious origins that were often quite literal at the time they were conceived. Here, we explore the origins of some of the most popular English language idioms, and how they live on today in modern context.</span></p><span data-dcnode-id="545" instrument_node="">
</span><h2 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Resting on Laurels</span></h2><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Those who “rest on laurels” are considered seemingly complacent about what could be achieved and are overly consumed with basking in previous accomplishments. The phrase originated in ancient Greece during the Pythian Games in the 6th century B.C. Winning competitors were presented wreaths made of aromatic laurel leaves to symbolize their victories.</span></p><span data-dcnode-id="539" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="531" id="attachment_12550" style="width: 680px"><img alt="Gian Lorenzo Bernini, Apollo and Daphne (1622–1655). On view at the Galleria Borghese, Rome, Italy." aria-describedby="caption-attachment-12550" class="size-medium wp-image-12550" data-dcnode-id="538" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/01-resting-on-laurels-670x450.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="532" id="caption-attachment-12550"><span data-dcnode-id="537" instrument_node="">Gian Lorenzo Bernini, </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AApollo_%2526_Daphne_September_2a.jpg" rel="noopener" target="_blank"><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Apollo and Daphne</span></em></a><span data-dcnode-id="533" instrument_node="">&nbsp;(1622–1655). On view at the Galleria Borghese, Rome, Italy.</span></p></div><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">According to Greek mythology, Apollo—God of the sun, light, music, and prophecy—proclaimed the laurel plant to be sacred after his love, Daphne, was turned into one. In many examples of the Greek myth in art history, Apollo is often depicted wearing a laurel crown. The Romans later expanded on the idea, presenting laurel wreaths to successful military commanders. This tradition is still used today to honor marathon race winners.</span></p><span data-dcnode-id="527" instrument_node="">
</span><h2 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Butter Someone Up</span></h2><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="523" instrument_node="">The most straightforward explanation of the phrase—describing a scenario in which someone overly flatters another in the hope of getting something in return—relates to the act of buttering a slice of bread smoothly, which in turn makes it taste that much more delicious. Likely origins trace back to Hindu temples in India, where worshippers sought divine favor by throwing balls of </span><em data-dcnode-id="520"><em data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">ghee </span></em></em><span data-dcnode-id="519" instrument_node="">(clarified butter used in Indian cooking) at statues of their deities. Worshippers believed that this act of “buttering up” the gods would reward them peace and good harvest. During the Tang Dynasty (A.D. 618–906), it was a common Tibetan tradition to create butter sculptures </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/new-years-traditions/"><span data-dcnode-id="518" instrument_node="">to commemorate the New Year</span></a><span data-dcnode-id="516" instrument_node=""> as a means of fostering peace and happiness.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Apple of My Eye</span></h2><span data-dcnode-id="511" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="501" id="attachment_12552" style="width: 680px"><img alt="scene from Shakespeare's A Midsummer Night's Dream" aria-describedby="caption-attachment-12552" class="wp-image-12552 size-full" data-dcnode-id="510" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/02-apple-of-my-eye.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="502" id="caption-attachment-12552"><span data-dcnode-id="509" instrument_node="">Arthur Rackham, </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/rackham-arthur.-shakespeare-william.-a-midsu-q3crh34sep" rel="noopener" target="_blank"><span data-dcnode-id="508" instrument_node="">A Midsummer Night’s Dream</span></a><span data-dcnode-id="506" instrument_node="">, 1908. Sold for $2,200 via </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/swann-auction-galleries-elzaixcmrm" rel="noopener" target="_blank"><span data-dcnode-id="505" instrument_node="">Swann Auction Galleries</span></a><span data-dcnode-id="503" instrument_node=""> (September 2004).</span></p></div><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="499" instrument_node="">This idiom refers to someone or something which is beloved above all else. It first appeared in the year 885 in Alfred the Great’s Anglo-Saxon version of Pope Gregory I’s </span><em data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Pastoral Care</span></em><span data-dcnode-id="496" instrument_node="">, which was a text designed to teach clergyman how to perform their pastoral duties. Later, it appeared in Shakespeare’s </span><em data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">A Midsummer Night’s Dream</span></em><span data-dcnode-id="493" instrument_node=""> in 1605 in reference to the central aperture of the eye. In the play, the fairy Robin Goodfellow acquires a flower once hit by Cupid’s arrow, dropping juice of the flower into a sleeping man’s eyes while uttering the words, “Flower of this purple dye, hit with Cupid’s archery, sink in apple of his eye.”</span></p><span data-dcnode-id="491" instrument_node="">
</span><h2 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">The Pot Calling the Kettle Black</span></h2><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="487" instrument_node="">This proverbial idiom is often used to refer to someone who is guilty of the very same thing in which they accuse another of doing. The roots of the phrase date back to the Medieval period, when both pots and kettles—commonly used kitchen tools from the era—were made from sturdy cast iron and would become black with soot from the open fire. The earliest appearance of the phrase came in the year 1620 from Thomas Shelton’s translation of the Spanish novel, </span><em data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Don Quixote</span></em><span data-dcnode-id="484" instrument_node=""> (1605). Growing increasingly frustrated by the criticism of his servant Sancho Panza, </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/search%3Fkeyword%3Ddon%2520Quixote" rel="noopener" target="_blank"><span data-dcnode-id="483" instrument_node="">Don Quixote</span></a><span data-dcnode-id="481" instrument_node=""> exclaims, “You are like what is said that the frying-pan said to the kettle, ‘Avant, black-browes’.”</span></p><span data-dcnode-id="479" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="469" id="attachment_12553" style="width: 680px"><img alt="pot calling the kettle black" aria-describedby="caption-attachment-12553" class="size-medium wp-image-12553" data-dcnode-id="478" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/03-pot-calling-kettle-black-670x450.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="470" id="caption-attachment-12553"><span data-dcnode-id="477" instrument_node="">Miguel de Cervantes, </span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/cervantes-saavedra-miguel-de.-el-ingenioso-hida-99943abb32" rel="noopener" target="_blank"><span data-dcnode-id="476" instrument_node="">El Ingenioso Hidalgo Don Quixote</span></a><span data-dcnode-id="474" instrument_node="">, 1780. Sold for $9,500 via </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/swann-auction-galleries-elzaixcmrm" rel="noopener" target="_blank"><span data-dcnode-id="473" instrument_node="">Swann Auction Galleries</span></a><span data-dcnode-id="471" instrument_node=""> (March 2019).</span></p></div><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">Though this is one of the earliest recorded uses of the phrase, the meaning of the term as we know it today is more closely associated with its use in 1693 when William Penn, founder of Pennsylvania (what was then an American colony), wrote in his </span><em data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Some Fruits of Solitude</span></em><span data-dcnode-id="464" instrument_node="">, “For a Covetous Man to inveigh against Prodigality… is for the Pot to call the Kettle black.”</span></p><span data-dcnode-id="462" instrument_node="">
</span><h2 data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Bury the Hatchet</span></h2><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">A Native American practice that involved the literal burying of hatchets as a peace offering serves as the origin of this idiom. As a part of the custom, chiefs would meet and bury their weapons as a symbolic gesture that signified peace. According to an Iroquois legend, two leaders once convinced the five great nations—Mohawk, Oneida, Onondaga, Cayuga, and Seneca—to stop fighting and form a confederacy. They solidified this union by burying their weapons under a large pine tree.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">The first English mentions of the phrase came in 1680 from Judge Samuel Sewall—best known for his involvement in the Salem Witch Trials—when he exclaimed, “I write to you of the Mischief the Mohawks did… they came to an agreement and buried two Axes in the Ground; one for English another for themselves; which ceremony to them is more significant and binding than all Articles of Peace, the hatchet being a principal weapon with them.” Later, it was used in various peace treaties by colonels throughout the 18th century.</span></p><span data-dcnode-id="453" instrument_node="">
</span><h2 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">White Elephant</span></h2><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="449" instrument_node="">Today, the term “white elephant” is commonly associated with holiday gift exchanges in which the presents are more impractical and useless rather than sought-after treasures. The first use can be traced back to the Kingdom of Siam (present-day Thailand). According to popular legend, Siamese kings would gift rare, white elephants to any subject who betrayed or displeased them. The gift proved burdensome because these large animals were expensive to care for and anyone who received one bore the financial responsibility of keeping them alive. Since elephants were also a revered symbol in Thai and </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/buddhist-art/" rel="noopener" target="_blank"><span data-dcnode-id="448" instrument_node="">Buddhist</span></a><span data-dcnode-id="446" instrument_node=""> cultures, they could not be used for work, furthering the onus of owning one.</span></p><span data-dcnode-id="444" instrument_node="">
</span><h2 data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Knight in Shining Armor</span></h2><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">We often use this expression to describe a heroic figure who typically comes to the rescue of another. The origins of the phrase are linked back to Old England, a period that extends from the coming of Germanic invaders to Britain in the early 5th century up to the Norman Conquest of 1066, where often imagery of chivalrous knights coming to the rescue of a damsel in distress. Many Victorian-era novelists and artists proliferated this ideal, consumed with the chivalrous stories that surrounded King Arthur and the Court of Camelot.</span></p><span data-dcnode-id="438" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="428" id="attachment_12554" style="width: 680px"><img alt="Sir Frank Dicksee, P.R.A., Chivalry, 1885. Sold for £577,250 via Christie’s (December 2012)." aria-describedby="caption-attachment-12554" class="size-medium wp-image-12554" data-dcnode-id="437" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/04-knight-in-shining-armor-670x450.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="429" id="caption-attachment-12554"><span data-dcnode-id="436" instrument_node="">Sir Frank Dicksee, </span><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-lot/sir-fra-1d69b7bb91" rel="noopener" target="_blank"><span data-dcnode-id="435" instrument_node="">P.R.A., Chivalry</span></a><span data-dcnode-id="433" instrument_node="">, 1885. Sold for £577,250 via </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/auction-house/christie-s-wndj7l05cs" rel="noopener" target="_blank"><span data-dcnode-id="432" instrument_node="">Christie’s</span></a><span data-dcnode-id="430" instrument_node=""> (December 2012).</span></p></div><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="426" instrument_node="">The earliest recorded use of the idiom was in a poem by English poet Henry Pye called “Amusement: A Poetical Essay” published in </span><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The British Journal</span></em><span data-dcnode-id="423" instrument_node=""> in 1790. Pye writes, “no more the knight in shining armour dress’d.”</span></p><span data-dcnode-id="421" instrument_node="">
</span><h2 data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Turn a Blind Eye</span></h2><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Used to acknowledge a scenario in which we pretend not to notice something, the saying “turn a blind eye” dates back to the early 1800s. During the Battle of Copenhagen in 1801, the ships of British naval hero Horatio Nelson faced a large Danish-Norwegian fleet that appeared nearly impossible to overtake. Nelson’s superior advised that he withdraw, to which the one-eyed officer is believed to have responded by bringing a telescope to his bad eye and declaring, “I really do not see the signal,” before securing a victory. Though many historians believe this story to be a myth, the idiom is still widely used to this day.</span></p><span data-dcnode-id="415" instrument_node="">
</span><h2 data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Give the Cold Shoulder</span></h2><span data-dcnode-id="412" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="405" id="attachment_12555" style="width: 680px"><img alt="curiosity shop drawing" aria-describedby="caption-attachment-12555" class="wp-image-12555 size-full" data-dcnode-id="411" height="390" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/05-cold-shoulder.jpg&amp;raw" width="670"><p class="wp-caption-text" data-dcnode-id="406" id="caption-attachment-12555"><span data-dcnode-id="410" instrument_node="">Charles Dickens, The Old Curiosity Shop, 1840. Image via </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ACuriosity_Shop_drawing.jpg" rel="noopener" target="_blank"><span data-dcnode-id="409" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="407" instrument_node="">.</span></p></div><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">To give the cold shoulder refers to an act of displaying indifferences or coldness, which is intended to hurt someone else. It transcends from the tradition of giving visitors a warm meal as a welcome offering. For those who were happily invited, hosts would prepare a large, warm meal of roasted meat. However, those who overstayed their welcome were given subpar food or a “cold shoulder of mutton” for dinner.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">There are several written uses of this phrase throughout Scottish texts. One famous example appears in </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">The Antiquary</span></em><span data-dcnode-id="397" instrument_node=""> (1816), a work by Scottish novelist and poet Sir Walter Scott. In it, he writes, “The Countess’s dislike didna gang farther at first than just showing o’ the cauld shouther,” where “cauld” is the Scottish dialect for cold. The phrase began appearing in print frequently, and was even used by Charles Dickens in his popular 1840 novel, The Old Curiosity Shop.</span></p><span data-dcnode-id="395" instrument_node="">
</span><h2 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">How Our Most-Used Phrases Came To Be</span></h2><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">We often use idioms in everyday language without consciously realizing the words don’t make sense without the implied and accepted meaning behind them. Linguists and historians have dedicated time to discovering the origins behind many of the most commonly spoken idioms, and why they’ve endured the test of time.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><img alt="popular idioms infographic" class="alignnone wp-image-12571 size-full" data-dcnode-id="388" height="9732" loading="lazy" sizes="(max-width: 1341px) 100vw, 1341px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-rd1-v3-1.jpg&amp;raw" srcset="https://www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-rd1-v3-1.jpg 1341w, https://www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-rd1-v3-1-768x5574.jpg 768w, https://www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-rd1-v3-1-141x1024.jpg 141w, https://www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-rd1-v3-1-670x4862.jpg 670w, https://www.invaluable.com/blog/wp-content/uploads/sites/77/2019/04/popular-idioms-origins-rd1-v3-1-1020x7402.jpg 1020w" width="1341"></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">There are approximately 25,000 idioms in the English language alone, all of which have been widely adopted in everyday conversation. We often use these phrases liberally without understanding their root or original context. Passed down from poems and </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invaluable.com/books-maps-manuscripts/cc-NVAZ3UE29G/" rel="noopener" target="_blank"><span data-dcnode-id="384" instrument_node="">books</span></a><span data-dcnode-id="382" instrument_node=""> to cultural practices of ancient Greece, each idiom has a fascinating origin that can help contextualize nuance in colloquialisms today.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="362"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Sources</span></strong><span data-dcnode-id="377" instrument_node="">: </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/idiom" rel="noopener" target="_blank"><span data-dcnode-id="376" instrument_node="">Merriam-Webster</span></a><span data-dcnode-id="374" instrument_node=""> |&nbsp;</span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxford-royale.co.uk/articles/bizarre-english-idioms-meaning-origins.html" rel="noopener" target="_blank"><span data-dcnode-id="373" instrument_node="">Oxford Royale Academy</span></a><span data-dcnode-id="371" instrument_node=""> | </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grammarly.com/blog/14-expressions-with-crazy-origins-that-you-would-never-have-guessed/" rel="noopener" target="_blank"><span data-dcnode-id="370" instrument_node="">Grammarly</span></a><span data-dcnode-id="368" instrument_node=""> | </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/news/10-common-sayings-with-historical-origins" rel="noopener" target="_blank"><span data-dcnode-id="367" instrument_node="">History</span></a><span data-dcnode-id="365" instrument_node=""> | </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bachelorsdegree.org/2011/01/30/30-common-english-idioms-and-the-history-behind-them/" rel="noopener" target="_blank"><span data-dcnode-id="364" instrument_node="">Bachelors Degree</span></a></p><span data-dcnode-id="361" instrument_node="">
