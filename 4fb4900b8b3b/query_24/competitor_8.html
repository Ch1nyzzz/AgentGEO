node-id="239" version="1.1" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="240" fill="#FFFFFF"><path d="M4.3,49.8c-0.9,0-1.8-0.3-2.6-0.9C0.6,48.1,0,46.8,0,45.5L0,4.3C0,1.9,1.9,0,4.3,0l41.2,0c2.4,0,4.3,1.9,4.3,4.3l0,6.5 l-7.1,0l0-3.7l-35.6,0l0,35.5l3.8,0l0,7.1l-6.3,0C4.5,49.8,4.4,49.8,4.3,49.8z" data-dcnode-id="242"></path><path d="M18.6,64c-2.4,0-4.3-1.9-4.3-4.3l0-41.1c0-2.4,1.9-4.3,4.3-4.3l41,0c2.4,0,4.3,1.9,4.3,4.3L64,59.7c0,2.4-1.9,4.3-4.3,4.3 L18.6,64z M21.3,21.3l0,35.5l35.5,0l-0.1-35.5L21.3,21.3z M56.8,18.5C56.8,18.5,56.8,18.5,56.8,18.5L56.8,18.5z" data-dcnode-id="241"></path></g></svg><svg class="copyLinkIcon_1g9cfvr-o_O-successIcon_1knzxsj" data-dcnode-id="234" version="1.1" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="235" fill="#FFFFFF"><path d="M59.5,10.8" data-dcnode-id="238"></path><path d="M23.1,56L1,32.9c-1.4-1.4-1.3-3.7,0.1-5.1c1.4-1.4,3.7-1.4,5,0.1l17,17.8L57.9,9.1c1.4-1.4,3.6-1.5,5-0.1 c1.4,1.4,1.4,3.7,0.1,5.1L23.1,56z" data-dcnode-id="237"></path><path d="M23.4,43.4" data-dcnode-id="236"></path></g></svg></button></div></div><div class="wrapper_wfxu5h" data-dcnode-id="97"><main data-dcnode-id="99"><figure class="style_1ngkwsz-o_O-style_1ts1q2h" data-dcnode-id="228"><div class="style_7z5va1-o_O-style_48hmcm-o_O-style_1ts1q2h" data-dcnode-id="229"><div class="style_suz0zz-o_O-style_1ts1q2h" data-dcnode-id="230" id="mm-player-placeholder-large-screen"></div></div></figure><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="226" data-mm-id="_et6thk88o"><span data-dcnode-id="227" instrument_node="">Horses own the winner’s circle in English idioms. But where did these popular phrases originate?</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="224" data-mm-id="_qq96g65nk"><span data-dcnode-id="225" instrument_node="">1. Hold your horses!</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="220" data-mm-id="_ah1sv8f14"><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">When It Originated: </span></strong><span data-dcnode-id="221" instrument_node="">800 BCE</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="215" data-mm-id="_2psixcssj"><span data-dcnode-id="219" instrument_node="">A line in Book 23 of Homer’s </span><em data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Iliad</span></em><span data-dcnode-id="216" instrument_node=""> is commonly translated as “Antilochus—you drive like a maniac! Hold your horses!” (Although the original 1598 translation has it as “Contain thy horses!”)￼</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="213" data-mm-id="_16b8pnmvv"><span data-dcnode-id="214" instrument_node="">2. Don't look a gift horse in the mouth</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="208" data-mm-id="_6gz2l42yw"><strong data-dcnode-id="210"><strong data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="209" instrument_node="">380 BCE</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="206" data-mm-id="_6w7ctpy0r"><span data-dcnode-id="207" instrument_node="">This idiom is so old that when St. Jerome translated the New Testament, he included it in the introduction: “Equi donati dentes non inspicuintur.”</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="204" data-mm-id="_njpwh9s30"><span data-dcnode-id="205" instrument_node="">3. You can lead a horse to water, but you can't make it drink</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="192" data-mm-id="_x6g21xn7g"><strong data-dcnode-id="201"><strong data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">When It Originated:</span></strong></strong><span data-dcnode-id="200" instrument_node="">&nbsp;1175</span><br data-dcnode-id="199"><span data-dcnode-id="198" instrument_node="">
￼</span><br data-dcnode-id="197"><span data-dcnode-id="196" instrument_node="">
￼One of the oldest aphorisms in English, this adage was first recorded in the Old English Homilies: “Hwa is thet mei thet hors wettrien the him self nule drinken.” A modern version appeared in the 1602 play </span><em data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Narcissus</span></em><span data-dcnode-id="193" instrument_node="">: “They can but bringe horse to the water brinke / But horse may choose whether that horse will drinke.”￼</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="190" data-mm-id="_ceviyd0j3"><span data-dcnode-id="191" instrument_node="">4. Horseplay</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="182" data-mm-id="_ukyuj68su"><strong data-dcnode-id="187"><strong data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">When I</span></strong></strong><strong data-dcnode-id="184"><strong data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">t Originated:&nbsp;</span></strong></strong><span data-dcnode-id="183" instrument_node="">1580s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="180" data-mm-id="_mr69u3h2s"><span data-dcnode-id="181" instrument_node="">In the 16th century, “horse” was a common adjective describing anything strong, big, or coarse. Along with horseplay, that’s how horseradish got its name.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="178" data-mm-id="_agye1nhhb"><span data-dcnode-id="179" instrument_node="">5. A horse of a different color</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="173" data-mm-id="_x5fsvt6no"><strong data-dcnode-id="175"><strong data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="174" instrument_node="">1600s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="168" data-mm-id="_3jbsv2oej"><span data-dcnode-id="172" instrument_node="">In Act II, Scene 3 of </span><em data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Twelfth Night</span></em><span data-dcnode-id="169" instrument_node="">, Maria says, “My purpose is, indeed, a horse of that colour.” It’s believed the phrase evolved from there or that the idiom already existed and Shakespeare was twisting it.￼</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="166" data-mm-id="_js25c422u"><span data-dcnode-id="167" instrument_node="">￼6. Beat a dead horse</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="161" data-mm-id="_mm5ninhbp"><strong data-dcnode-id="163"><strong data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="162" instrument_node="">1640s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="159" data-mm-id="_dxk7t497t"><span data-dcnode-id="160" instrument_node="">In the 17th century, sailors were paid in advance and promptly blew their checks on booze. The ensuing period of work was called “dead horse” time. Since they didn’t have the promise of a paycheck for motivation, most sea dogs were woefully unproductive.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="157" data-mm-id="_zlhqn5zua"><span data-dcnode-id="158" instrument_node="">7. Eat Like a Horse</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="152" data-mm-id="_5yd42zwyo"><strong data-dcnode-id="154"><strong data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">When It Originated:</span></strong></strong><span data-dcnode-id="153" instrument_node="">&nbsp;18th Century</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="150" data-mm-id="_xytkgo8ju"><span data-dcnode-id="151" instrument_node="">A full-grown gelding can eat up to 2 percent of its body weight per day—that’s about 20 pounds of food!￼</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="148" data-mm-id="_avhhka9kc"><span data-dcnode-id="149" instrument_node="">8. Get off your high horse</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="143" data-mm-id="_z7jugye0y"><strong data-dcnode-id="145"><strong data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="144" instrument_node="">1780s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="141" data-mm-id="_lyjezjqmg"><span data-dcnode-id="142" instrument_node="">Being told you were on a high horse used to be a compliment: Only soldiers and royalty rode tall war chargers. Then, as people lost respect for the high and mighty during the revolutions of the late 1700s, the high horse was seen as uppity.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="139" data-mm-id="_67jw8bw9s"><span data-dcnode-id="140" instrument_node="">9. Dark horse</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="134" data-mm-id="_zsmx3j62a"><strong data-dcnode-id="136"><strong data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">When It Originated:</span></strong></strong><span data-dcnode-id="135" instrument_node="">&nbsp;1830s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="132" data-mm-id="_hy5b0z72j"><span data-dcnode-id="133" instrument_node="">Not a reference to the Katy Perry song, the word dark was Victorian era lingo describing anything unknown. “Dark horse” was popular racing slang for an unfamiliar trotter that won a race.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="130" data-mm-id="_ie3p0mczl"><span data-dcnode-id="131" instrument_node="">10. One Horse Town</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="125" data-mm-id="_zkgga4w5z"><strong data-dcnode-id="127"><strong data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="126" instrument_node="">1850s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="123" data-mm-id="_ru0w18yjw"><span data-dcnode-id="124" instrument_node="">Settled in 1849, the village of One Horse Town in Shasta County, California, was a regular stop for gold miners. Legend has it that Jack Spencer’s ole gray mare was the only horse around.￼</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="121" data-mm-id="_8z00cdseo"><span data-dcnode-id="122" instrument_node="">11. Charley horse</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="116" data-mm-id="_nmz3k3u70"><strong data-dcnode-id="118"><strong data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="117" instrument_node="">1850s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="114" data-mm-id="_ri7v3grfy"><span data-dcnode-id="115" instrument_node="">Back in the 19th century, lame race-horses were called “Charley.” Around the same time, old horses were used to drag the infield dirt at baseball stadiums. Whenever a ballplayer cramped up, they were compared to the grounds crew of limping equines—Charley horses.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="112" data-mm-id="_se85jlj1o"><span data-dcnode-id="113" instrument_node="">12. Chomp/champ at the bit</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="107" data-mm-id="_qqjqxbcjt"><strong data-dcnode-id="109"><strong data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">When It Originated:&nbsp;</span></strong></strong><span data-dcnode-id="108" instrument_node="">1920s</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="101" data-mm-id="_169b9qfo5"><span data-dcnode-id="106" instrument_node="">Part of the bridle, a bit rests inside the horse’s mouth and is controlled by the reins. Impatient horses tend to anxiously chew on their bits before races.</span><br data-dcnode-id="105"><span data-dcnode-id="104" instrument_node="">
