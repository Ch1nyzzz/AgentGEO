gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="370" instrument_node="">
</span><p class="alert" data-dcnode-id="360"><span data-dcnode-id="369" instrument_node="">Here’s how to improve your English listening skills when listening to my video: </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/headphones/" target="_blank"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">put the headphones on</span></strong></a><span data-dcnode-id="365" instrument_node="">, playback the video and </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/dictation/" target="_blank"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">write it all down</span></strong></a><span data-dcnode-id="361" instrument_node=""> while listening to it!</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Hi guys, hello boys and girls and welcome back to Robby’s English Harmony video blog!</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="355" instrument_node="">Today I decided to bring another English idiomatic expression video to you and </span><span data-dcnode-id="351" style="color: #ff0000;"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">this time around</span></strong><span data-dcnode-id="352" instrument_node=""> </span></span><span data-dcnode-id="350" instrument_node="">the video </span><span data-dcnode-id="346" style="color: #ff0000;"><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">in question</span></strong><span data-dcnode-id="347" instrument_node=""> </span></span><span data-dcnode-id="345" instrument_node="">is – no, not the video in question, the phrase, the expression in question!</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="342" instrument_node="">Sorry guys for making this mistake but I’m just going to leave it here on record so that you can see that Robby is not really afraid of making mistakes, he </span><span data-dcnode-id="338" style="color: #ff0000;"><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">practices what he preaches</span></strong><span data-dcnode-id="339" instrument_node=""> </span></span><span data-dcnode-id="337" instrument_node="">and that’s the path that you should be going down as well if you’re anything serious about your English fluency improvement that is, right?</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">So basically don’t be afraid, don’t be embarrassed of making mistakes, saying something wrong, going back, correcting yourself, it’s all part of the game.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="331" instrument_node="">Anyway, going back to the original subject, the expression in question for today is “</span><span data-dcnode-id="328" style="color: #ff0000;"><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">to the best of my knowledge</span></strong></span><span data-dcnode-id="327" instrument_node="">”, right? So if you’re interested in learning how to use this particular English idiomatic expression, just </span><span data-dcnode-id="323" style="color: #ff0000;"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">bear with me</span></strong><span data-dcnode-id="324" instrument_node=""> </span></span><span data-dcnode-id="322" instrument_node="">for a few more moments and everything is going to become crystal clear to you my friends!</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" id="more-4362"></span></p><span data-dcnode-id="317" instrument_node="">
</span><h2 data-dcnode-id="314" style="text-align: center;"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Example #1</span></strong></h2><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="312" instrument_node="">So welcome back guys. Now, basically how to use the idiomatic expression “to the best of my knowledge”? Let me give you a very simple example sentence, right? </span><span data-dcnode-id="308" style="color: #ff0000;"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">To the best of my knowledge</span></strong><span data-dcnode-id="309" instrument_node=""> </span></span><span data-dcnode-id="307" instrument_node="">I haven’t actually recorded a video about the English idiomatic expression “</span><span data-dcnode-id="304" style="color: #ff0000;"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">to the best of my knowledge</span></strong></span><span data-dcnode-id="303" instrument_node="">”, right? It’s like a joke but anyway, I hope I made you laugh!</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="300" instrument_node="">So I hope that you could clearly understand what way the phrase “to the best of my knowledge” is used in this particular example, right? It’s basically as if I were to say </span><span data-dcnode-id="297" style="color: #ff0000;"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">as far as I’m aware</span></strong></span><span data-dcnode-id="296" instrument_node="">, right? Same thing, right? </span><strong data-dcnode-id="292"><span data-dcnode-id="294" style="color: #ff0000;"><span data-dcnode-id="295" instrument_node="">Much of a muchness</span></span><span data-dcnode-id="293" instrument_node=""> </span></strong><span data-dcnode-id="291" instrument_node="">which is an expression I learned years ago which means that the two things are pretty much the same, right? </span><span data-dcnode-id="288" style="color: #ff0000;"><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Much of a muchness</span></strong></span><span data-dcnode-id="287" instrument_node="">. It doesn’t matter which way you go, right?</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="284" instrument_node="">So </span><span data-dcnode-id="281" style="color: #ff0000;"><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">as far as I’m aware</span></strong></span><span data-dcnode-id="280" instrument_node=""> I haven’t recorded a video about the phrase “to the best of my knowledge”. “To the best of my knowledge” I haven’t recorded and </span><span data-dcnode-id="277" style="color: #ff0000;"><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">so on and so forth</span></strong></span><span data-dcnode-id="276" instrument_node="">. So pretty much the same meaning, right is carried by both of these phrases. </span><strong data-dcnode-id="272"><span data-dcnode-id="274" style="color: #ff0000;"><span data-dcnode-id="275" instrument_node="">Speaking of which</span></span><span data-dcnode-id="273" instrument_node="">,</span></strong><span data-dcnode-id="271" instrument_node=""> I actually recorded the videos about similar phrases, right? Such as “</span><span data-dcnode-id="268" style="color: #ff0000;"><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">if I’m not mistaken</span></strong></span><span data-dcnode-id="267" instrument_node="">” and “</span><span data-dcnode-id="264" style="color: #ff0000;"><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">correct me if I’m wrong</span></strong></span><span data-dcnode-id="263" instrument_node="">”, right? And you may want to </span><a data-dcnode-id="261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/correct-me-if-im-wrong-if-im-not-mistaken/" target="_blank"><span data-dcnode-id="262" instrument_node="">click on this link </span></a><span data-dcnode-id="260" instrument_node="">which is going to take you to the respective page on my blog where you’ll be able to watch a video about those two phrases.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="257" instrument_node="">And actually all these four phrases “</span><span data-dcnode-id="254" style="color: #ff0000;"><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">to the best of my knowledge</span></strong></span><span data-dcnode-id="253" instrument_node="">”, “</span><span data-dcnode-id="250" style="color: #ff0000;"><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">as far as I’m aware</span></strong></span><span data-dcnode-id="249" instrument_node="">”, “</span><span data-dcnode-id="246" style="color: #ff0000;"><strong data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">if I’m not mistaken</span></strong></span><span data-dcnode-id="245" instrument_node="">”, “</span><span data-dcnode-id="242" style="color: #ff0000;"><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">correct me if I’m wrong</span></strong></span><span data-dcnode-id="241" instrument_node="">” they’re pretty much interchangeable. </span><span data-dcnode-id="237" style="color: #ff0000;"><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Having said that, I have to admit that</span></strong><span data-dcnode-id="238" instrument_node=""> </span></span><span data-dcnode-id="236" instrument_node="">“if I’m not mistaken”, “correct me if I’m wrong” kind of involves a little bit more doubt factor, right? In that particular situation I’m probably only 50-50 sure that what I’m saying is right or 60-40 or something like that, right?</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">But “to the best of my knowledge” that’s quite a big certainty, right? So whatever you’re saying, whatever statement you’re making you’re pretty sure of that, right?</span></p><span data-dcnode-id="231" instrument_node="">
</span><h2 data-dcnode-id="228" style="text-align: center;"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Example #2</span></strong></h2><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="220"><span data-dcnode-id="226" instrument_node="">And now let me just give you a few more example sentences so that you can develop the feeling, the instinct for using this particular phrase, right? Let’s say you’re showing someone how to install a Windows operating system, right? </span><span data-dcnode-id="222" style="color: #ff0000;"><strong data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">As a matter of fact</span></strong><span data-dcnode-id="223" instrument_node=""> </span></span><span data-dcnode-id="221" instrument_node="">that’s something that I did today in the college, right?</span></p><span data-dcnode-id="219" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="218" instrument_node="">I was guiding one person through all the steps necessary to install – what was it? – rooting an active directory services on the Windows 2012 server machine, right? And I was going through the wizard and he was asking “Hold on a second, do you see those options there, Robby? Do you not have to tick them as well?” And I said to him “Listen, </span><span data-dcnode-id="214" style="color: #ff0000;"><strong data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="215" instrument_node=""> </span></span><span data-dcnode-id="213" instrument_node="">you just ignore them. You just go next, next, next, bam, bam, bam, install, that’s going to be done for you.” Right?</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="210" instrument_node="">So that was a typical example. So you’re basically saying to someone “Listen, </span><span data-dcnode-id="206" style="color: #ff0000;"><strong data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="207" instrument_node=""> </span></span><span data-dcnode-id="205" instrument_node="">this is the way it’s done.” And this is basically </span><span data-dcnode-id="201" style="color: #ff0000;"><strong data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">when it comes to</span></strong><span data-dcnode-id="202" instrument_node=""> </span></span><span data-dcnode-id="200" instrument_node="">certain procedures and whatnot. That’s when you typically would be using this phrase in your work environment, right? Someone asks you for advice and they kind of slightly doubt that, they question it and then you say “Well, </span><span data-dcnode-id="196" style="color: #ff0000;"><strong data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="197" instrument_node=""> </span></span><span data-dcnode-id="195" instrument_node="">that’s the way it works.” If you’re in doubt you may want to ask someone else but </span><span data-dcnode-id="188" style="color: #ff0000;"><strong data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="192" instrument_node="">, </span><strong data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">as far as I’m aware</span></strong><span data-dcnode-id="189" instrument_node=""> </span></span><span data-dcnode-id="187" instrument_node="">that’s the way it is, right?</span></p><span data-dcnode-id="185" instrument_node="">
</span><h2 data-dcnode-id="182" style="text-align: center;"><strong data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Example #3</span></strong></h2><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="180" instrument_node="">And let me think… can I think of another example? I suppose you could use this one when talking about some facts, right? When you’re saying something that you might have read before, that someone might have told you before but you’re not a 100% sure of that you can say “Well, </span><span data-dcnode-id="176" style="color: #ff0000;"><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="177" instrument_node=""> </span></span><span data-dcnode-id="175" instrument_node="">you’re not supposed to pour boiling water over tea. If you put your teabag in a tea cup you’re not supposed to boil water and pour it immediately over the tea, right? You have to – I suppose – cool it down for something like 2 or 3 minutes or something like that so that its temperature drops from a 100 degrees Celsius down to 95 or something. And I think I’m pretty sure that I read it somewhere. So </span><span data-dcnode-id="171" style="color: #ff0000;"><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="172" instrument_node=""> </span></span><span data-dcnode-id="170" instrument_node="">that’s the way you </span><span data-dcnode-id="166" style="color: #ff0000;"><strong data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">go about</span></strong><span data-dcnode-id="167" instrument_node=""> </span></span><span data-dcnode-id="165" instrument_node="">making tea in </span><span data-dcnode-id="162" style="color: #ff0000;"><strong data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">the ideal set of circumstances</span></strong></span><span data-dcnode-id="161" instrument_node="">, right?”</span></p><span data-dcnode-id="159" instrument_node="">
</span><h2 data-dcnode-id="156" style="text-align: center;"><strong data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Example #4</span></strong></h2><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="134"><span data-dcnode-id="154" instrument_node="">And to finish off this video I should probably </span><span data-dcnode-id="150" style="color: #ff0000;"><strong data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">come up with</span></strong><span data-dcnode-id="151" instrument_node=""> </span></span><span data-dcnode-id="149" instrument_node="">another example. Well, let me see, let’s say for example that you’re chatting with a friend of yours and that person – basically it’s an informal conversation – that person, that friend of yours is saying that he thinks that – let’s assume </span><strong data-dcnode-id="145"><span data-dcnode-id="147" style="color: #ff0000;"><span data-dcnode-id="148" instrument_node="">for argument’s sake</span></span><span data-dcnode-id="146" instrument_node=""> </span></strong><span data-dcnode-id="144" instrument_node="">that your friend’s name is Mark and you’re talking about Sally. And Mark is telling you that Sally is going out with someone, right? And then you’re saying to your friend “Now listen, buddy, that’s not the way it is. </span><span data-dcnode-id="140" style="color: #ff0000;"><strong data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">To the best of my knowledge</span></strong><span data-dcnode-id="141" instrument_node=""> </span></span><span data-dcnode-id="139" instrument_node="">Sally only broke up with Peter last week so there is no way she could be possibly going out with someone. It’s only been a week since her breakup. So </span><span data-dcnode-id="136" style="color: #ff0000;"><strong data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">to the best of my knowledge</span></strong></span><span data-dcnode-id="135" instrument_node=""> that’s not true. I don’t know who might have told you that but that’s just rumors is all, right?”</span></p><span data-dcnode-id="133" instrument_node="">
</span><p data-dcnode-id="122"><span data-dcnode-id="132" instrument_node="">So this was </span><span data-dcnode-id="129" style="color: #ff0000;"><strong data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">the last and final</span></strong></span><span data-dcnode-id="128" instrument_node=""> example of using the idiomatic expression </span><span data-dcnode-id="124" style="color: #ff0000;"><strong data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">to the best of my knowledge</span></strong><span data-dcnode-id="125" instrument_node=""> </span></span><span data-dcnode-id="123" instrument_node="">in a conversation. So please make sure that you do a lot of spoken English self-practicing where you use this particular phrase and also if you happen to have conversations with other people don’t hesitate to use this particular phrase in your conversations to make sure that that speech pattern is imprinted into your brain and into your mouth which is the most important part of the whole English fluency thing, right?</span></p><span data-dcnode-id="121" instrument_node="">
</span><p data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">So thanks for watching this video! Obviously if you have any questions post them in the comment section below. Don’t forget to like this video and subscribe to my channel if you haven’t already done so and chat to you soon again. Bye-bye!</span></p><span data-dcnode-id="118" instrument_node="">
</span><p data-dcnode-id="115"><a data-dcnode-id="116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/improve-spoken-english.php" target="_blank"><img alt="English Idiomatic Expressions" class="aligncenter" data-dcnode-id="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/images/phrases-Banner.jpg&amp;raw"></a></p><span data-dcnode-id="114" instrument_node="">
</span><p data-dcnode-id="104" style="padding-left: 30px;"><strong data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">P.S. </span></strong><strong data-dcnode-id="109"><span data-dcnode-id="110" style="color: #ff0000;"><span data-dcnode-id="111" instrument_node="">Are you serious about your spoken English improvement?</span></span></strong><span data-dcnode-id="108" instrument_node=""> Check out the </span><a data-dcnode-id="105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/improve-spoken-english.php" target="_blank"><strong data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">English Harmony System HERE!</span></strong></a></p><span data-dcnode-id="103" instrument_node="">
</span><a data-dcnode-id="101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/improve-spoken-english.php" target="_blank"><img alt="English Harmony System" class="aligncenter" data-dcnode-id="102" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/check-out-eh.jpg&amp;raw"></a><span data-dcnode-id="100" instrument_node="">
