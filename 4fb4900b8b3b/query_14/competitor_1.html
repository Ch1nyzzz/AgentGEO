</span><section data-dcnode-id="991"><span data-dcnode-id="1015" instrument_node=""> </span><img alt="Robby Kukurs" data-dcnode-id="1014" hspace="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/images/eBook-mugshot100.jpg&amp;raw" style="display: block;margin: 0 auto;border-radius: 25px;"><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">I’m Robby, and I’m a non-native English speaker. Throughout my entire life I’ve always wanted to speak in English fluently, but because of the way English is taught in schools, I always struggled with my spoken English.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">I couldn't learn to speak fluent English for 5 years - </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/journey/" target="_new"><span data-dcnode-id="1008" instrument_node="">read about what I was doing to learn to speak fluently HERE</span></a><span data-dcnode-id="1006" instrument_node=""> - are YOU in the same situation?</span></p><span data-dcnode-id="1004" instrument_node="">

</span><article class="post-744 post type-post status-publish format-standard hentry category-english-idiomatic-expressions tag-english-idiomatic-expressions tag-english-idioms tag-english-idioms-and-idiomatic-expressions" data-dcnode-id="650" id="post-744"><span data-dcnode-id="949" instrument_node="">
</span><header class="entry-header" data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Idiomatic Expressions: Why I’m Highlighting Some Bits of Text in Red in My Blog Posts</span></h1><span data-dcnode-id="945" instrument_node="">
</span></header><span data-dcnode-id="942" instrument_node="">
</span><div class="entry-content" data-dcnode-id="653"><span data-dcnode-id="941" instrument_node="">
</span><div data-dcnode-id="938"><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">By Robby</span></p></div><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">If you are new here please read </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/start/"><span data-dcnode-id="935" instrument_node=""> this</span></a><span data-dcnode-id="933" instrument_node=""> first. </span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="927"><img alt="English Idiomatic Expressions" class="aligncenter" data-dcnode-id="930" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/wp-content/uploads/2011/07/english-idiomatic-expressions3.jpg&amp;raw"><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
Here’s the short answer – they’re bits of spoken English any foreign English speaker should know to communicate effectively! They’re word combinations used by native English speakers and by using them you’re going to make your spoken English sound more natural and native-like.</span></p><span data-dcnode-id="926" instrument_node="">
</span><blockquote data-dcnode-id="905"><p data-dcnode-id="906"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/use-english-collocations/" target="_blank"><span data-dcnode-id="925" instrument_node="">English collocations</span></a><span data-dcnode-id="923" instrument_node="">, </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/free-ebook-about-english-phrasal-verbs/" target="_blank"><span data-dcnode-id="922" instrument_node="">phrasal verbs</span></a><span data-dcnode-id="920" instrument_node=""> and sayings all fall under the </span><span data-dcnode-id="917" style="color: #ff0000;"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">broad category</span></strong></span><span data-dcnode-id="916" instrument_node=""> of these idiomatic expressions, and </span><span data-dcnode-id="913" style="color: #ff0000;"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">to put it simply</span></strong></span><span data-dcnode-id="912" instrument_node=""> – you can’t </span><span data-dcnode-id="909" style="color: #ff0000;"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">come up with</span></strong></span><span data-dcnode-id="908" instrument_node=""> these sort of sayings just by sticking the words together; you have to learn the EXACT phrase or word combination to be able to use it </span><img alt="❗" class="emoji" data-dcnode-id="907" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/2757.svg&amp;raw"></p></blockquote><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="903" instrument_node="">There are also typical full English idioms among them, but I have to admit I have some reservations towards learning certain idioms like </span><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">“It’s raining cats and dogs”</span></em><span data-dcnode-id="900" instrument_node=""> or </span><em data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">“pot calling the kettle black.”</span></em><span data-dcnode-id="897" instrument_node=""> They are typical English idioms that you’ll find on any decent </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usingenglish.com/reference/idioms/" target="_blank"><span data-dcnode-id="896" instrument_node="">English idiom list</span></a><span data-dcnode-id="894" instrument_node=""> online, yet they’re rarely heard in real life, if at all.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="889" style="color: #ff0000;"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">My take on</span></strong></span><span data-dcnode-id="888" instrument_node=""> the whole English idiom thing (like it’s on spoken English in general) is the following – </span><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">you don’t need to hammer loads of English idioms in your brain that you’re not going to use</span></strong><span data-dcnode-id="885" instrument_node="">. You’d much better off using your potential as a foreign English speaker by learning idiomatic expressions because there’s a much bigger chance you’re going to use them in real life!</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="882" instrument_node="">How about the following ones: </span><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">“for the argument’s sake”</span></em><span data-dcnode-id="879" instrument_node="">, </span><em data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">“to jump to a conclusion”</span></em><span data-dcnode-id="876" instrument_node="">, </span><em data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">“fit for the purpose”</span></em><span data-dcnode-id="873" instrument_node="">?</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="867"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">These are typical idiomatic expressions</span></strong><span data-dcnode-id="868" instrument_node=""> that have some characteristics of full idioms, but at the same time it would be possible to derive their meaning from the words alone.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="865" instrument_node="">Also, they don’t even need to be long phrases to fall under the category of idiomatic expressions. </span><em data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">“On target”</span></em><span data-dcnode-id="862" instrument_node="">, </span><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">“straight away”</span></em><span data-dcnode-id="859" instrument_node="">, </span><em data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">“I’m all ears”</span></em><span data-dcnode-id="856" instrument_node="">, </span><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">“big time”</span></em><span data-dcnode-id="853" instrument_node=""> and similar short expressions are the ones that can make a difference between you being perceived a so-so English speaker or quite an advanced one! Not that you should care </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/native-english-speakers-assumptions/" target="_blank"><span data-dcnode-id="852" instrument_node="">what others think of you</span></a><span data-dcnode-id="850" instrument_node="">, but still it’s nice to be capable of communicating with native English speakers like an equal, isn’t it? </span><img alt="😉" class="emoji" data-dcnode-id="849" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f609.svg&amp;raw"></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">So to help you with learning these idiomatic expressions, I’ve been highlighting them in my blog posts in red color so that you can immediately see which bits are useful to memorize!</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="843" id="more-744"></span><span data-dcnode-id="840" style="color: #ff0000;"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Just to remind you</span></strong></span><span data-dcnode-id="839" instrument_node=""> – </span><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">idioms are sayings and phrases you can’t take literally</span></strong><span data-dcnode-id="836" instrument_node="">, </span><span data-dcnode-id="833" style="color: #ff0000;"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">for instance</span></strong></span><span data-dcnode-id="832" instrument_node=""> </span><em data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">“a piece of cake”</span></em><span data-dcnode-id="829" instrument_node=""> means something is very easy to do but it’s </span><span data-dcnode-id="826" style="color: #ff0000;"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">got nothing to do with</span></strong></span><span data-dcnode-id="825" instrument_node=""> pastry. </span><strong data-dcnode-id="822"><span data-dcnode-id="824" instrument_node="">You can’t infer the meaning of this idiom from the words alone </span><img alt="❗" class="emoji" data-dcnode-id="823" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/2757.svg&amp;raw"></strong></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="819" instrument_node="">Idiomatic expressions, </span><strong data-dcnode-id="816"><span data-dcnode-id="817" style="color: #ff0000;"><span data-dcnode-id="818" instrument_node="">for the most part</span></span></strong><span data-dcnode-id="815" instrument_node="">, would reveal their true meaning even to those who hear them </span><span data-dcnode-id="812" style="color: #ff0000;"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">for the first time</span></strong></span><span data-dcnode-id="811" instrument_node="">, yet you as a foreign English speaker wouldn’t be able to construct them on your own anyway.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="808" instrument_node="">Let’s take the expression</span><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node=""> “for the most part”</span></em><span data-dcnode-id="805" instrument_node="">. You could quite easily guess its meaning even if you hadn’t heard it before, yet could you come up with an identical phrase on your won? Of course not, simply because natural English language doesn’t always comply with rules that are </span><span data-dcnode-id="802" style="color: #ff0000;"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">set in stone</span></strong></span><span data-dcnode-id="801" instrument_node="">. You can’t translate directly across languages, and every language has its own unique means of expressions.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="798" instrument_node="">Sometimes </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">foreign English speakers might even think there’s something wrong with grammar</span></strong><span data-dcnode-id="795" instrument_node=""> in the idiomatic expressions. If I was asked to create a sentence conveying the same message, most likely I’d come up with something like </span><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">“for the biggest part”</span></em><span data-dcnode-id="792" instrument_node="">, or </span><em data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">“at the biggest part”</span></em><span data-dcnode-id="789" instrument_node="">.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="786" instrument_node="">How could I ever think of pairing up the words </span><em data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">“most”</span></em><span data-dcnode-id="783" instrument_node=""> and </span><em data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">“part”</span></em><span data-dcnode-id="780" instrument_node=""> if it doesn’t make grammatical sense to me? Yet&nbsp;</span><span data-dcnode-id="777" style="color: #ff0000;"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">for one reason or another</span></strong></span><span data-dcnode-id="776" instrument_node=""> it’s how native English speakers speak and I strongly believe you’re much </span><strong data-dcnode-id="773"><span data-dcnode-id="774" style="color: #ff0000;"><span data-dcnode-id="775" instrument_node="">better off</span></span></strong><span data-dcnode-id="772" instrument_node=""> just repeating it without questioning WHY they say it. Leave it to </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/academic-english-studies/" target="_blank"><span data-dcnode-id="771" instrument_node="">academics</span></a><span data-dcnode-id="769" instrument_node="">!</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="766" instrument_node="">But now let’s go back to where I started – explaining </span><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">why I favor idiomatic expressions over typical idioms.</span></strong></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="761" instrument_node="">The reason behind it is – you’ll use the former ones </span><span data-dcnode-id="758" style="color: #ff0000;"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">an awful lot</span></strong></span><span data-dcnode-id="757" instrument_node=""> more than the latter ones. Spoken English is full of things people would describe as </span><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">“I don’t know why but they just say it this way in English”!</span></em><span data-dcnode-id="754" instrument_node=""> Sometimes I’d refer to it as </span><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">having the gut feeling for spoken English</span></strong><span data-dcnode-id="751" instrument_node=""> which means you just have to “feel” what the right thing to say is. This feeling can be acquired by plenty of exposure to the English language and engaging in as many English conversations as you can, so that eventually you’ll </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/learn-english-collocations/" target="_blank"><span data-dcnode-id="750" instrument_node="">mimic native English speakers</span></a><span data-dcnode-id="748" instrument_node="">.</span></p><span data-dcnode-id="746" instrument_node="">
</span><blockquote data-dcnode-id="736"><p data-dcnode-id="737"><span data-dcnode-id="745" instrument_node="">Don’t get me wrong though, </span><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">I’m not saying you don’t need to know any proper English idioms!</span></strong><span data-dcnode-id="742" instrument_node=""> If you ask your friend about his plans for the evening and he tells you</span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node=""> “we’ll play it by ear”</span></em><span data-dcnode-id="739" instrument_node="">, it’s obvious that you need to know the meaning of this idiom to understand what your friend meant </span><img alt="❗" class="emoji" data-dcnode-id="738" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/2757.svg&amp;raw"></p></blockquote><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="734" instrument_node="">There are plenty of full English idioms that you’ll pick up naturally just like idiomatic expressions and they’ll </span><span data-dcnode-id="731" style="color: #ff0000;"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">come in handy</span></strong></span><span data-dcnode-id="730" instrument_node=""> to make your spoken English natural and fluent. The point I was trying to make is that </span><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">many of those idioms are outdated so you shouldn’t learn all idioms that come along.</span></strong><span data-dcnode-id="727" instrument_node=""> You have to be selective and learn the ones you hear on a daily basis around you!</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="724" instrument_node="">Sometimes it’s pretty hard to say where an idiom becomes an idiomatic expression. For instance, a saying I hear quite often in Ireland is </span><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">“to scare the living daylights out of me”</span></em><span data-dcnode-id="721" instrument_node="">, which means that something or something gave me a terrible fright. Is it an idiom? Probably yes, because it’s not clear as to what</span><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node=""> “living daylights”</span></em><span data-dcnode-id="718" instrument_node=""> has got to do with being afraid.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="713" style="color: #ff0000;"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">On the other hand</span></strong></span><span data-dcnode-id="712" instrument_node="">, is it possible to guess its meaning? Well, I’d say it is! So – it’s probably not a full idiom whose meaning can’t be inferred by taking the words literally; it’s probably more like an idiomatic expression because the word </span><em data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">“to scare”</span></em><span data-dcnode-id="709" instrument_node=""> </span><span data-dcnode-id="706" style="color: #ff0000;"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">gives away</span></strong></span><span data-dcnode-id="705" instrument_node=""> its meaning!</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Anyway, I don’t want to spend more of your time trying to figure out whether this or that particular saying is an idiom, or idiomatic expression or whatever, it wouldn’t serve any purpose in your quest to becoming a fluent English speaker.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="699" instrument_node="">All you need to know is that there’s loads of English sayings and </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//englishharmony.com/small-talk/" target="_blank"><span data-dcnode-id="698" instrument_node="">small talk phrases</span></a><span data-dcnode-id="696" instrument_node=""> that are typical for the English language only and that you need to know </span><span data-dcnode-id="693" style="color: #ff0000;"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">a good few</span></strong></span><span data-dcnode-id="692" instrument_node=""> of them to make your conversational English sound natural and also so that you can fully understand what other English speakers are communicating with you! </span><img alt="🙂" class="emoji" data-dcnode-id="691" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="686"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Robby</span></strong></p><span data-dcnode-id="685" instrument_node="">

        </span></div><div class="comment__content" data-dcnode-id="431"><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Thanks Alicia for the positive feedback, I really appreciate it!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="418"><div class="comment__name clearfix" data-dcnode-id="424"><img class="comment__avatar" data-dcnode-id="429" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="426"><a data-dcnode-id="427" href=""><span data-dcnode-id="428" instrument_node="">Polly</span></a></strong><span data-dcnode-id="425" instrument_node=""> • 9 years ago

        </span></div><div class="comment__content" data-dcnode-id="406"><p data-dcnode-id="407"><span data-dcnode-id="411" instrument_node="">If you've no idea what a particular idiom means, please use the great search tool Google to look it up! You may also want to use this website </span><a data-dcnode-id="409" href="http://disq.us/url?url=http%3A%2F%2Fwww.thefreedictionary.com%2F%3AJUDn-Bt7O_CFb8xNfA-bplWFDak&amp;cuid=391572" rel="nofollow noopener" title="http://www.thefreedictionary.com/"><span data-dcnode-id="410" instrument_node="">http://www.thefreedictionar...</span></a><span data-dcnode-id="408" instrument_node=""> because you'll find pretty much any phrase or expression on it!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="395"><div class="comment__name clearfix" data-dcnode-id="399"><img class="comment__avatar" data-dcnode-id="404" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="401"><a data-dcnode-id="402" href=""><span data-dcnode-id="403" instrument_node="">Kestrel0117</span></a></strong><span data-dcnode-id="400" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="396"><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">very thoughtful of you, thanks a lot rob, keep up. GBU</span></p></div></div><div class="comment__wrapper" data-dcnode-id="383"><div class="comment__name clearfix" data-dcnode-id="389"><img class="comment__avatar" data-dcnode-id="394" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="391"><a data-dcnode-id="392" href=""><span data-dcnode-id="393" instrument_node="">Zsljulius</span></a></strong><span data-dcnode-id="390" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="384"><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Helpful, helpful, helpful. Your blog is very helpful not just for the learning purposes but also for the inspiration. I have been constantly in doubt of my English, and having hard time blending in the English community ( I am currently an international student in the U.S). I took my GRE the other day, but did really bad on the writing part(below 29%). You had any suggestion for academic  writings, or specifically for the time-limited writing? </span></p><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Thanks for your effort for putting all these great posts together.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="365"><div class="comment__name clearfix" data-dcnode-id="377"><img class="comment__avatar" data-dcnode-id="382" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="379"><a data-dcnode-id="380" href=""><span data-dcnode-id="381" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="378" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="366"><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Thanks, I really appreciate your opinion of my blog and my efforts to help my fellow foreigners with fluency and confidence related issues!</span></p><p data-dcnode-id="371"><span data-dcnode-id="374" instrument_node="">Speaking of academic writing - well, you may find this article helpful: </span><a data-dcnode-id="372" href="http://disq.us/url?url=http%3A%2F%2Fenglishharmony.com%2Fwrite-like-a-native-speaker%2F%3A5ZJk_OFgm_DbGSz9HCobVnFxirk&amp;cuid=391572" rel="nofollow noopener" title="http://englishharmony.com/write-like-a-native-speaker/"><span data-dcnode-id="373" instrument_node="">http://englishharmony.com/w...</span></a></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Hope this helps,</span></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Robby</span></p></div></div><div class="comment__wrapper" data-dcnode-id="355"><div class="comment__name clearfix" data-dcnode-id="359"><img class="comment__avatar" data-dcnode-id="364" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="361"><a data-dcnode-id="362" href=""><span data-dcnode-id="363" instrument_node="">Guest</span></a></strong><span data-dcnode-id="360" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="356"><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Robby, it would be great if you could make a list of those idiomatic expressions separately available for purchase?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="339"><div class="comment__name clearfix" data-dcnode-id="349"><img class="comment__avatar" data-dcnode-id="354" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="351"><a data-dcnode-id="352" href=""><span data-dcnode-id="353" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="350" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="340"><p data-dcnode-id="343"><span data-dcnode-id="348" instrument_node="">You can take a look at my English Harmony System 2.0:</span><br data-dcnode-id="347"/><a data-dcnode-id="345" href="http://disq.us/url?url=http%3A%2F%2Fenglishharmony.com%2Fimprove-spoken-english.php%3AXVkmbTFRdRRe2htqWXD8MiD5lk4&amp;cuid=391572" rel="nofollow noopener" title="http://englishharmony.com/improve-spoken-english.php"><span data-dcnode-id="346" instrument_node="">http://englishharmony.com/i...</span></a><span data-dcnode-id="344" instrument_node=""> </span></p><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">It's packed full with different phrases and idiomatic expressions and does its job beautifully! ;-)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="329"><div class="comment__name clearfix" data-dcnode-id="333"><img class="comment__avatar" data-dcnode-id="338" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="335"><a data-dcnode-id="336" href=""><span data-dcnode-id="337" instrument_node="">Guest</span></a></strong><span data-dcnode-id="334" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="330"><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node=""> Well, that's the problem: You have to buy the whole system and it's currently for Windows only :-(</span></p></div></div><div class="comment__wrapper" data-dcnode-id="319"><div class="comment__name clearfix" data-dcnode-id="323"><img class="comment__avatar" data-dcnode-id="328" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="325"><a data-dcnode-id="326" href=""><span data-dcnode-id="327" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="324" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="320"><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Btw - I'm currently working on a free eBook which is going to be packed full of idioms and phrases. So stay tuned and you'll be in a pleasant surprise! ;-)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="309"><div class="comment__name clearfix" data-dcnode-id="313"><img class="comment__avatar" data-dcnode-id="318" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="315"><a data-dcnode-id="316" href=""><span data-dcnode-id="317" instrument_node="">Guest</span></a></strong><span data-dcnode-id="314" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="310"><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node=""> Yay! Cant' wait to see it!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="283"><div class="comment__name clearfix" data-dcnode-id="303"><img class="comment__avatar" data-dcnode-id="308" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="305"><a data-dcnode-id="306" href=""><span data-dcnode-id="307" instrument_node="">Hashem</span></a></strong><span data-dcnode-id="304" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="284"><p data-dcnode-id="285"><span data-dcnode-id="302" instrument_node="">greeting robby :)</span><br data-dcnode-id="301"/><span data-dcnode-id="300" instrument_node="">in the last few couple of months i've memorized quite a few of idioms and phrases while watching tv in hopes that i'll become more effective when it comes to speaking english and i'd like you to take a gander at just a small fraction of them :</span><br data-dcnode-id="299"/><span data-dcnode-id="298" instrument_node="">1)go up in smoke.. means same as go to watse ,like 20 years of hard work went up in smoke.</span><br data-dcnode-id="297"/><span data-dcnode-id="296" instrument_node="">2)jump off the gun:to get a headstart but at a bad timing.</span><br data-dcnode-id="295"/><span data-dcnode-id="294" instrument_node="">3)at stake/at japordy/on the line? all could be used when you're speaking about something that's at risk.</span><br data-dcnode-id="293"/><span data-dcnode-id="292" instrument_node="">4)quell their hunger/quench their thirst.(not idioms nor phrases)</span><br data-dcnode-id="291"/><span data-dcnode-id="290" instrument_node="">5)tip the the scales to my direction/close to give someone and edge.</span><br data-dcnode-id="289"/><span data-dcnode-id="288" instrument_node="">6)tickles you fancy/floats the boat.could be used to tell that you're interested in a particular thing.</span><br data-dcnode-id="287"/><span data-dcnode-id="286" instrument_node="">7)pack a wallop: to punch with a considerable force.i guess you could use that when u're telling the other party that somebody is strong. like:sure can that boy pack a wallop.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="261"><div class="comment__name clearfix" data-dcnode-id="277"><img class="comment__avatar" data-dcnode-id="282" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="279"><a data-dcnode-id="280" href=""><span data-dcnode-id="281" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="278" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="262"><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Hi Hashem,</span></p><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Thanks for publishing the list of expressions, it's a great addition to this post and my blog as a whole!</span></p><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">I didn't know number 2, the first part of number 6 and number 7, so as they say you learn something new every day! ;-)</span></p><p data-dcnode-id="267"><span data-dcnode-id="270" instrument_node="">Btw, I looked up the meaning of 'pack a wallop' and it appears that it can be used to describe anything that causes excitement or other sorts of intense feelings; you can look it up here: </span><a data-dcnode-id="268" href="http://disq.us/url?url=http%3A%2F%2Fidioms.thefreedictionary.com%2Fpack%2Ba%2Bwallop%3AtQ-w7hedLVlzYv4k2Tl4F3vkXcM&amp;cuid=391572" rel="nofollow noopener" title="http://idioms.thefreedictionary.com/pack+a+wallop"><span data-dcnode-id="269" instrument_node="">http://idioms.thefreedictio...</span></a></p><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Thanks a lot,</span></p><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Robby</span></p></div></div><div class="comment__wrapper" data-dcnode-id="231"><div class="comment__name clearfix" data-dcnode-id="255"><img class="comment__avatar" data-dcnode-id="260" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="257"><a data-dcnode-id="258" href=""><span data-dcnode-id="259" instrument_node="">Tamara</span></a></strong><span data-dcnode-id="256" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="232"><p data-dcnode-id="233"><span data-dcnode-id="254" instrument_node=""> </span><br data-dcnode-id="253"/><span data-dcnode-id="252" instrument_node="">Guys, I just think that Robby is a very nice person first of all...</span><br data-dcnode-id="251"/><span data-dcnode-id="250" instrument_node=""> </span><br data-dcnode-id="249"/><span data-dcnode-id="248" instrument_node="">Robby in love with the English language and it is obvious; and he shared his love with us big time!</span><br data-dcnode-id="247"/><span data-dcnode-id="246" instrument_node=""> </span><br data-dcnode-id="245"/><span data-dcnode-id="244" instrument_node="">Robby, it’s so nice that native speakers are reading your blog posts and saying to you:” I would never have guessed English is not your first language.”</span><br data-dcnode-id="243"/><span data-dcnode-id="242" instrument_node=""> </span><br data-dcnode-id="241"/><span data-dcnode-id="240" instrument_node="">That is what I am dreaming of!  I wish one day someone say these words to me...</span><br data-dcnode-id="239"/><span data-dcnode-id="238" instrument_node="">Well... “To succeed at something you have to be engaged in that activity in earnest or else you won't achieve any noticeable success."</span><br data-dcnode-id="237"/><span data-dcnode-id="236" instrument_node=""> </span><br data-dcnode-id="235"/><span data-dcnode-id="234" instrument_node="">Robby, thank you for being such a great example of achieving English fluency!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="213"><div class="comment__name clearfix" data-dcnode-id="225"><img class="comment__avatar" data-dcnode-id="230" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="227"><a data-dcnode-id="228" href=""><span data-dcnode-id="229" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="226" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="214"><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Thanks Tamara, I'm flattered... ;-)</span></p><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">What I've achieved is within the realm of every foreign English speaker's possibility; and don't forget that the comment I received was made about my WRITING. </span></p><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">As I've often said on this blog, writing and speaking are two quite different things and while one can be very comfortable while writing, it's possible that that person is having severe oral fluency related issues.</span></p><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">In my case I've dealt with them and I can speak fluently and comfortably, yet I'm sure my speech wouldn't warrant the aforementioned comment because it's not as perfect as that of a native speaker.</span></p><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Not that I would be too hung up about it; I'm just saying this to point out that you might not be that far away from achieving your goal of English fluency yourself ;-)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="202"><div class="comment__name clearfix" data-dcnode-id="207"><img class="comment__avatar" data-dcnode-id="212" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="209"><a data-dcnode-id="210" href=""><span data-dcnode-id="211" instrument_node="">Marwa</span></a></strong><span data-dcnode-id="208" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="203"><p data-dcnode-id="204"><span data-dcnode-id="206" instrument_node="">hello robby i've been meeting to ask u.. do u happen to know a phrase or an idiom suitable in a situation when u want to describe a person who isn't hard to please (isn't picky) modest an he's almost satisfied with anything.another thing,suppose that ur uncle came to u while u're watching tv ...u're switching channels and there's nothing really interesting,is there some idiom to use here instead of sayng nothing intesersting?</span><br data-dcnode-id="205"/></p></div></div><div class="comment__wrapper" data-dcnode-id="180"><div class="comment__name clearfix" data-dcnode-id="196"><img class="comment__avatar" data-dcnode-id="201" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="198"><a data-dcnode-id="199" href=""><span data-dcnode-id="200" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="197" instrument_node=""> • 9 years ago
        </span></div><div class="comment__content" data-dcnode-id="181"><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Hi Marwa,</span></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Good questions, but I can't actually think of any fitting specific idiomatic expressions to describe those two situations.</span></p><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">In the first instance the phrase you used - "isn't hard to please" - is a very good one and can be considered a valid expression in its own right.</span></p><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Speaking of having nothing interesting to watch on TV, personally I would say - "not much on TV tonight" or something similar. </span></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">You see, such and similar phrases aren't generally considered as idioms, but I would still put them in the same category.</span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Regards,</span></p><p data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Robby</span></p></div></div><div class="comment__wrapper" data-dcnode-id="161"><div class="comment__name clearfix" data-dcnode-id="174"><img class="comment__avatar" data-dcnode-id="179" height="32" src="https://c.disquscdn.com/uploads/users/2522/6241/avatar92.jpg?1335204678" width="32"/><strong data-dcnode-id="176"><a data-dcnode-id="177" href=""><span data-dcnode-id="178" instrument_node="">Hadyn Thomas</span></a></strong><span data-dcnode-id="175" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="162"><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">A very interesting article, and I would never have guessed English is not your first language. I have often wondered why we say some of the strange things that we do, so it is good to discover others think the same about English :-).</span></p><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">You mentioned 'the pot calling the kettle black', which was said quite often when I was a child. I still use this phrase but I change the word black to refer back to the other person's remark - for example, if someone calls me fat and they are fat, I would say, 'that is the pot calling the kettle fat'. English is a great language to play around with, and most times people will understand you. Just have fun with it and kick around our expressions to make them your own.</span></p><p data-dcnode-id="166"><span data-dcnode-id="169" instrument_node="">Here are a couple local (England's Westcountry) expressions for you: </span><br data-dcnode-id="168"/><span data-dcnode-id="167" instrument_node="">'You are bombed out' (mad, crazy, out of your mind);'He is totally mazed' (confused, bewildered).</span></p><p data-dcnode-id="163"><span data-dcnode-id="165" instrument_node="">All the best.</span><br data-dcnode-id="164"/></p></div></div><div class="comment__wrapper" data-dcnode-id="147"><div class="comment__name clearfix" data-dcnode-id="155"><img class="comment__avatar" data-dcnode-id="160" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="157"><a data-dcnode-id="158" href=""><span data-dcnode-id="159" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="156" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="148"><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Thanks for the comment! My foreign origin isn't probably evident in my writing I guess, but when I open my mouth the hard East-European accent makes it all quite obvious! Which I'm not concerned about anyway because there's no point in being hung up over something I can't change.</span></p><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Thanks for the expressions - hadn't heard these (not surprising considering I live in Ireland!)</span></p><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Here's what came to my mind when reading your phrases - "You're bunkers" and "He's totally flabbergasted" - can't really think of any local Irish equivalents though!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="136"><div class="comment__name clearfix" data-dcnode-id="141"><img class="comment__avatar" data-dcnode-id="146" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="143"><a data-dcnode-id="144" href=""><span data-dcnode-id="145" instrument_node="">Yusuf</span></a></strong><span data-dcnode-id="142" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="137"><p data-dcnode-id="138"><span data-dcnode-id="140" instrument_node="">To say the truth, this is the first time I have found a really impressive and well prepared site which gives the follower the comfort of finding the right path to improve spoken English. Honestly saying, you are perfect. Thank you so much.</span><br data-dcnode-id="139"/></p></div></div><div class="comment__wrapper" data-dcnode-id="126"><div class="comment__name clearfix" data-dcnode-id="130"><img class="comment__avatar" data-dcnode-id="135" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="132"><a data-dcnode-id="133" href=""><span data-dcnode-id="134" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="131" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="127"><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Thanks Yusuf, but I'm far from being perfect, believe me! ;-) And actually that's what's allowed me to achieve English fluency - just doing as good as I can instead of trying to be perfect.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="116"><div class="comment__name clearfix" data-dcnode-id="120"><img class="comment__avatar" data-dcnode-id="125" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="122"><a data-dcnode-id="123" href=""><span data-dcnode-id="124" instrument_node="">Alabi Eric</span></a></strong><span data-dcnode-id="121" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="117"><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">I THINK ENGLISH LANGUAGE IS NOT APPRECIATED BY ITS USERS 'COS OF NOT UNDERSTANDING ITS ORIGIN,PURCHASE,AND THE EFFECT IT HAS TO USERS.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="106"><div class="comment__name clearfix" data-dcnode-id="110"><img class="comment__avatar" data-dcnode-id="115" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="112"><a data-dcnode-id="113" href=""><span data-dcnode-id="114" instrument_node="">Dark_26</span></a></strong><span data-dcnode-id="111" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="107"><p data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">speaking of idioms, could you explain what "in earnest" means? like when somebody says the battle will begin in earnest or celebrations in the uae will begin in earnest.put it in a couple of sentences please so that im able to come up with something on my own.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="94"><div class="comment__name clearfix" data-dcnode-id="100"><img class="comment__avatar" data-dcnode-id="105" height="32" src="https://c.disquscdn.com/uploads/users/2522/6241/avatar92.jpg?1335204678" width="32"/><strong data-dcnode-id="102"><a data-dcnode-id="103" href=""><span data-dcnode-id="104" instrument_node="">Hadyn Thomas</span></a></strong><span data-dcnode-id="101" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="95"><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">To be honest with you, most of us native speakers do not use this term much. You would definitely find it in something like a Jane Austen novel. I have only used it a few times in my life to tell the listener that I mean to do something completely and seriously.</span></p><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Cheers!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="73"><div class="comment__name clearfix" data-dcnode-id="88"><img class="comment__avatar" data-dcnode-id="93" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="90"><a data-dcnode-id="91" href=""><span data-dcnode-id="92" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="89" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="74"><p data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">I don't actually use this phrase and it's not a part of my active vocabulary. Anyway, "in earnest" means "for real", "seriously".</span></p><p data-dcnode-id="84"><span data-dcnode-id="85" instrument_node="">"To succeed at something you have to be engaged in that activity in earnest or else you won't achieve any noticeable success."</span></p><p data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">"When I write a new article for my blog I always do it in earnest so that I can pass on all my knowledge and expertise to my blog readers."</span></p><p data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">Maybe these examples are a bit clumsy because as I said I don't use this phrase and to be honest with you - it's not used by those native speakers I deal with on a daily basis. Anyway, it should give you an idea of how this phrase is generally used!</span></p><p data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">Hope this helps,</span></p><p data-dcnode-id="75"><span data-dcnode-id="77" instrument_node="">Robby</span><br data-dcnode-id="76"/></p></div></div><div class="comment__wrapper" data-dcnode-id="56"><div class="comment__name clearfix" data-dcnode-id="67"><img class="comment__avatar" data-dcnode-id="72" height="32" src="https://c.disquscdn.com/uploads/users/1708/8435/avatar92.jpg?1316710036" width="32"/><strong data-dcnode-id="69"><a data-dcnode-id="70" href=""><span data-dcnode-id="71" instrument_node="">David Sweetnam</span></a></strong><span data-dcnode-id="68" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="57"><p data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">I thought of doing something similar on my blog - with a glossary below - but it's already very time consuming!</span></p><p data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">English is a colourful language and agree these are def worth learning. Makes you sound more natural for one thing, and better able to understand native speakers.</span></p><p data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">I haven't had a typical 'idioms lesson' recently, but what I do is get students to practise recognising idiomatic language in our conversation or from our book, an article, a recording etc.</span></p><p data-dcnode-id="59"><span data-dcnode-id="60" instrument_node="">Often this language revolves around phrases with the most common words in English (eg 'take', 'get', 'put') which seem easier to remember than some idiom they'll hear once a year lol.</span></p><p data-dcnode-id="58"></p></div></div><div class="comment__wrapper" data-dcnode-id="44"><div class="comment__name clearfix" data-dcnode-id="50"><img class="comment__avatar" data-dcnode-id="55" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="52"><a data-dcnode-id="53" href=""><span data-dcnode-id="54" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="51" instrument_node=""> • 10 years ago
        </span></div><div class="comment__content" data-dcnode-id="45"><p data-dcnode-id="48"><span data-dcnode-id="49" instrument_node="">The funny thing is that I didn't even realize how much of spoken English is taken up by such idiomatic expressions until I started highlighting them in my blog posts!</span></p><p data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">And I don't even highlight them all or else nearly the whole text would be marked red and it would lose any practical purpose! :-)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="34"><div class="comment__name clearfix" data-dcnode-id="38"><img class="comment__avatar" data-dcnode-id="43" height="32" src="https://c.disquscdn.com/uploads/users/8463/774/avatar92.jpg?1386217512" width="32"/><strong data-dcnode-id="40"><a data-dcnode-id="41" href=""><span data-dcnode-id="42" instrument_node="">louiegi</span></a></strong><span data-dcnode-id="39" instrument_node=""> • 8 years ago
        </span></div><div class="comment__content" data-dcnode-id="35"><p data-dcnode-id="36"><span data-dcnode-id="37" instrument_node="">sentences containing idiomatic expressions</span></p></div></div><div class="comment__wrapper" data-dcnode-id="24"><div class="comment__name clearfix" data-dcnode-id="28"><img class="comment__avatar" data-dcnode-id="33" height="32" src="https://c.disquscdn.com/uploads/users/260/5842/avatar92.jpg?1416304286" width="32"/><strong data-dcnode-id="30"><a data-dcnode-id="31" href=""><span data-dcnode-id="32" instrument_node="">Robby Kukurs</span></a></strong><span data-dcnode-id="29" instrument_node=""> • 8 years ago
