</span><img alt="Director of A&amp;R wearing headphones" class="attachment-card-img size-card-img blog-card-img" data-dcnode-id="965" data-src="https://www.careersinmusic.com/wp-content/uploads/2020/04/director-a-r-550x350.jpg" data-status="loaded" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/wp-content/uploads/2020/04/director-a-r-550x350.jpg&amp;raw" width="550"><span data-dcnode-id="964" instrument_node=""> </span><div class="blog-card-meta" data-dcnode-id="958"><span data-dcnode-id="963" instrument_node="">

</span></section><span data-dcnode-id="951" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span></div><span data-dcnode-id="947" instrument_node="">
</span><div class="blog-section" data-dcnode-id="894" id="intro"><p class="subtitle first-sentence" data-dcnode-id="944"><span data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">There are so many different styles of music and different kinds of musicians available to the active listener and creative performer today. The list of genres and sub-genres is seemingly endless. </span></span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Some musicians dedicate themselves to playing one style of music; others play many styles convincingly. Some musicians are primarily performers; others focus on writing, composing, recording, or teaching. Most artists tend to listen to music outside their own genres for inspiration.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Perhaps surprisingly, many accomplished musicians from all styles of music tend to agree on what constitutes great musicianship. At the highest levels of music, there is general agreement about the skills a musician should have. As a music student, focusing on developing solid musicianship skills should be a definite priority.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="935"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Musicianship consists of:</span></strong></p><span data-dcnode-id="934" instrument_node="">
</span><ul data-dcnode-id="905"><span data-dcnode-id="933" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Primary skills: ear training, reading, and writing (transcription)</span></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Instrumental and ensemble performance (includes voice) for studio and stage</span></li><span data-dcnode-id="927" instrument_node="">
</span><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Creating a good sound, timbre (tone), blending</span></li><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Accuracy: intonation, phrasing and feel</span></li><span data-dcnode-id="921" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Audience and stage communication (performers only)</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Repertoire</span></li><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Composition, improvisation, arranging, and production</span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Odds and ends: music industry, touring, audio engineering (studio and live), conducting, music therapy, and teaching music</span></li><span data-dcnode-id="909" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Expressing your emotions</span></li><span data-dcnode-id="906" instrument_node="">
</span></ul><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">But what specifically are musicianship skills and what is musicianship? How does one develop great musicianship skills? It’s true that some people are just born with amazing natural talent, but even those individuals must study and work hard to develop real musicianship. Think of musicianship as a foundation.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">As lifelong learners, musicians continue to study and practice even after they have built solid skills, in order to deepen their understanding and keep their skills as sharp as possible. To be successful as a professional musician, you will need certain skills to get the gigs. We are fortunate that so many have gone before us and laid out various paths to acquiring and developing musicianship.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">In this piece, a master musician explains the key skills for modern musicianship and offers tips on how to develop them. Core musicianship skills include music reading and writing, ear training, performance, composition, improvisation, and transcription. Other musicianship skills include music production, music business, arranging music and teaching.</span></p><span data-dcnode-id="895" instrument_node="">
</span></div><div class="blog-section" data-dcnode-id="871" id="s_s_primary_skills"><h2 class="blog-header" data-dcnode-id="891"><span data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Primary Skills: Ear Training, Reading and Writing Music</span></span></h2><div class="blog-section-content" data-dcnode-id="872"><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">As I’ve said, most musicians agree musicianship as a whole requires a certain set of core skills. All of these skills are equally important, and the order of presentation here is not meant to imply that any one skill comes before another.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">All the skills are primary skills and should be studied concurrently, not consecutively. These primary skills are mostly related to playing an instrument (voice is considered an instrument), singing (also for instrumentalists), being musically literate (reading and writing music), and playing or singing with others in a group.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Also, it’s important to develop a good sound, be accurate with notes and rhythm, learn to compose, improvise, arrange music for and direct ensembles, communicate with the audience, and to build a vast repertoire.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">Of course, all of this takes some time. Becoming a master musician will take as much time as it takes to learn to be a Doctor, a </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/entertainment-attorney/"><span data-dcnode-id="880" instrument_node="">Lawyer</span></a><span data-dcnode-id="878" instrument_node="">, or any other kind of advanced professional.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">From the time one starts getting serious about learning music, expect it to take somewhere between 10-12 years to master all aspects of musicianship. Some people will do it more quickly, but this is a very realistic estimate for most aspiring professionals.</span></p><span data-dcnode-id="873" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="763" id="s_s_ear_training"><h3 class="blog-header" data-dcnode-id="868"><span data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Ear Training Skills</span></span></h3><div class="blog-section-content" data-dcnode-id="764"><p data-dcnode-id="860"><span data-dcnode-id="867" instrument_node="">What is known as </span><em data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">ear training</span></em><span data-dcnode-id="864" instrument_node=""> actually has little to do with training your ears. Your ears probably work better than mine (</span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/musicians-earplugs/"><span data-dcnode-id="863" instrument_node="">hearing loss is common</span></a><span data-dcnode-id="861" instrument_node=""> among aging musicians). What we are talking about here is memory training.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">In the same way, you can learn to recognize your different friends’ voices over the phone, you can learn to differentiate between notes and chords that you hear. This does take some practice. I’m not talking about perfect pitch, which very few people actually have, and won’t always help that much. (There are even some supposed disadvantages to having perfect pitch.)</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">There is something called </span><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">relative pitch</span></em><span data-dcnode-id="852" instrument_node=""> any musician can learn, though it typically takes a few years of work to get there. Relative pitch is the ability to hear any note in relation to any other note and know exactly what it is. Obviously, this is a very valuable musicianship skill.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">How to acquire perfect relative pitch? There are two things to practice and they are like two sides of the same coin.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="844"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Think of it this way:</span></strong></p><span data-dcnode-id="843" instrument_node="">
</span><ul data-dcnode-id="830"><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="838"><span data-dcnode-id="841" instrument_node="">Take music on the page and put it into the air. This is called </span><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">performing.</span></em></li><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">Take music out of the air and put it onto the page. This is called </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">transcribing</span></em><span data-dcnode-id="833" instrument_node="">.</span></li><span data-dcnode-id="831" instrument_node="">
</span></ul><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Another, simpler way to describe this is that performing is reading, and transcribing is writing.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">We do the performing part using only our voice, without any instrument. (You can use a piano or guitar to check yourself for accuracy as you go.) This means that even non-singers must learn to approximate pitches and rhythms using their voice and by tapping or clapping.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">While we are performing, the goal is to create a pleasing sound, but it’s not the main point.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">We generally use established musical works for ear training performance, while focusing on these qualities:</span></strong></p><span data-dcnode-id="816" instrument_node="">
</span><ul data-dcnode-id="793"><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">In time without stopping</span></li><span data-dcnode-id="812" instrument_node="">
</span><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">In tune (accurate intonation)</span></li><span data-dcnode-id="809" instrument_node="">
</span><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Using solfege syllables (do, re, mi, fa, sol, la, ti)</span></li><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">While conducting in correct meter</span></li><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Using dynamics</span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">With accuracy</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">With expressiveness</span></li><span data-dcnode-id="794" instrument_node="">
</span></ul><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">This kind of training is best done under the guidance of a </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/private-instrument-teacher/"><span data-dcnode-id="790" instrument_node="">Teacher</span></a><span data-dcnode-id="788" instrument_node="">, but there are also software programs and training videos available.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">For transcribing, we work with short examples (4-8 bars) of music, writing it out using standard musical notation after hearing it a number of times. Ear training is also best done with a group or class, since part of the focus is on harmonic (polyphonic) awareness while performing. The main goal of ear training is to improve musical literacy and musical memory.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="782" instrument_node="">These are crucial musicianship skills that musicians use every day of their lives. Students attending music schools usually complete several years of ear training classes, sometimes also called solfege. There are also two kinds of ear training: one uses the </span><em data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">fixed Do</span></em><span data-dcnode-id="779" instrument_node="">, where the note C is always Do, and the other is </span><em data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">moveable Do</span></em><span data-dcnode-id="776" instrument_node="">, which always calls the key center Do.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">Most classical musicians use the former, while contemporary (pop, jazz, rock, etc.) musicians use the latter. I’ve found the moveable Do system to be most helpful, especially for </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">transposing</span></em><span data-dcnode-id="770" instrument_node=""> music from one key to another.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Of all the primary musicianship skills, ear training skills are perhaps the most useful and important to acquire.</span></p><span data-dcnode-id="765" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="762"></div><div class="blog-section" data-dcnode-id="727" id="s_s_instrumental"><h2 class="blog-header" data-dcnode-id="759"><span data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Instrumental and Ensemble Performance (Includes Voice)</span></span></h2><div class="blog-section-content" data-dcnode-id="728"><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">It seems almost too obvious to say that to become a great musician, one should have absolute mastery of playing an instrument. For our purposes, the voice is also an instrument, and it is recommended that all Vocalists also learn to play a second instrument such as piano or guitar. Regardless of principal instrument, most musicians also play piano.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Piano is an ideal instrument to build musicianship skills on because of the linear aspect of the keyboard and the wide range of the instrument (from lowest to highest note). There are instrumental techniques unique to every instrument, and learning all the available and useful techniques for at least one instrument is considered to be an absolute prerequisite to musicianship.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Even </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/conductor/"><span data-dcnode-id="751" instrument_node="">Orchestra Conductors</span></a><span data-dcnode-id="749" instrument_node=""> must know how to play an instrument well. Anyone looking to enter a teaching career would also have to be an expert on the instrument they plan to teach.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">Beyond playing an instrument well, musicians must learn techniques for playing in an ensemble. The word </span><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">ensemble</span></em><span data-dcnode-id="743" instrument_node=""> comes from the French language and the literal meaning is a “collection.” We use the term in English to denote a group of musical performers. Playing in an ensemble requires listening skills, plus the ability to mix your sound with the other musicians in a pleasant way.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">The best way to become a great ensemble performer is to practice together, performing with other musicians in a group as often as possible. It can also help to play along with recordings, which is a good way to learn music before going into rehearsals.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="737" instrument_node="">As a side note, most professional musicians differentiate between time spent working on their instrument alone, called </span><em data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">practicing</span></em><span data-dcnode-id="734" instrument_node="">, and working on the music in a group, called </span><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">rehearsing</span></em><span data-dcnode-id="731" instrument_node="">.</span></p><span data-dcnode-id="729" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="689" id="s_s_creating"><h2 class="blog-header" data-dcnode-id="724"><span data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Creating a Good Sound, Timbre (Tone), Blending</span></span></h2><div class="blog-section-content" data-dcnode-id="690"><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">As mentioned above, playing in a group requires carefully </span><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">blending</span></em><span data-dcnode-id="720" instrument_node=""> the sound of your instrument with the sound of the other instruments. Most musicians work very hard on this special skill because it makes them much more valuable to the group.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="717" instrument_node="">It’s also especially important for vocalists when they are singing harmony, or background vocal parts. It’s much more difficult to sing background vocals than lead, because of the need to blend the sound. Due to this, professional </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/background-singer/"><span data-dcnode-id="716" instrument_node="">Background Vocalists</span></a><span data-dcnode-id="714" instrument_node=""> are usually in greater demand than </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/singer/"><span data-dcnode-id="713" instrument_node="">Lead Singers</span></a><span data-dcnode-id="711" instrument_node="">.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">Besides blending, it’s important to create a good quality </span><em data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">sound</span></em><span data-dcnode-id="705" instrument_node=""> on your instrument. It’s not as simple as it might seem at first, not least of all because sound quality is somewhat subjective. Not everyone likes the same things, so what might be a “good” sound to one person might not be the best to another.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="702" instrument_node="">Musicians use the word </span><em data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">timbre</span></em><span data-dcnode-id="699" instrument_node=""> (pronounced: “tam-ber”) to talk about the quality of musical sound. While best understood as a synonym to </span><em data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">tone</span></em><span data-dcnode-id="696" instrument_node="">, it’s actually a bit different in that it encompasses more characteristics of the sound.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">We think of “tone” as meaning more or less treble, mid-range, or bass, but timbre also incudes aspects of sound quality and resonance, as well as tone. The dictionary defines timbre as “the character or quality of a musical sound or voice as distinct from its pitch and intensity.”</span></p><span data-dcnode-id="691" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="620" id="s_s_accuracy"><h2 class="blog-header" data-dcnode-id="686"><span data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Accuracy: Intonation, Articulation, Phrasing and Feel</span></span></h2><div class="blog-section-content" data-dcnode-id="621"><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">As we describe these aspects of musicianship, we can think about all the qualities that make music sound great, and how music is created. Most musicians do know how to read music, but not all do.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="682" instrument_node="">Whether reading or not, a master musician will be very </span><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">accurate</span></em><span data-dcnode-id="679" instrument_node=""> in the placement of their notes. This accuracy applies to both pitch and rhythm. After all, a note played using the wrong rhythm is a wrong note, even if the pitch is correct.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">Many melodies are well-known and musicians should not take too many liberties in playing those melodies. Notes also must be played accurately in tune; with what we term accurate </span><em data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">intonation.</span></em></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="659"><em data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Articulation</span></em><span data-dcnode-id="669" instrument_node=""> refers to the emphasis or accent given to a note or chord. It also describes the characteristics of the attack and release, sometimes called the </span><em data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">sound envelope</span></em><span data-dcnode-id="666" instrument_node="">. Every note has a beginning, a middle, and an end, called the </span><em data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">attack, sustain</span></em><span data-dcnode-id="663" instrument_node="">, and </span><em data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">release</span></em><span data-dcnode-id="660" instrument_node=""> respectively.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="657" instrument_node="">Typical articulations and embellishments used in music are the </span><em data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">accent, tenuto, staccato, legato, slur, trill, glissando, fermata, sforzando,</span></em><span data-dcnode-id="654" instrument_node=""> and the </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">tremolo,</span></em><span data-dcnode-id="651" instrument_node=""> though these aren’t the only ones. Master musicians use articulations and embellishments to bring emotional expression to the music.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="648" instrument_node="">Along with articulations, musicians use </span><em data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">phrasing</span></em><span data-dcnode-id="645" instrument_node=""> to express musical ideas, such as in a melody or chord progression. Referring to a melody or a bass line, a short musical statement of a bar or less is called a </span><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">figure,</span></em><span data-dcnode-id="642" instrument_node=""> while several figures strung together into 2-4 bars is called a </span><em data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">phrase</span></em><span data-dcnode-id="639" instrument_node="">.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Most phrases in music are 4 bars long, and also include rests. (A rest is considered a note.) Just like a note, every figure and phrase has a beginning, a middle, and an end. Connecting enough phrases together creates a song or a musical work. Recognition of and mastery of phrasing is a key musicianship skill.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">Performing a figure or a phrase with the correct idiomatic rhythmic interpretation, along with application of articulations, and with accuracy, is known as </span><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">feel.</span></em><span data-dcnode-id="630" instrument_node=""> For example, a reggae piece will have a different rhythmic feel from a rock and roll or classical piece of music.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">Applying the appropriate feel when performing figures or phrases is a musicianship skill that requires careful listening, and is especially important when providing accompaniment, such as playing in a </span><em data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">rhythm section</span></em><span data-dcnode-id="624" instrument_node=""> (an ensemble with bass, drums, piano, and guitar or other chording instrument).</span></p><span data-dcnode-id="622" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="588" id="s_s_audience"><h2 class="blog-header" data-dcnode-id="617"><span data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Audience and Stage Communication, Cues (Performers Only)</span></span></h2><div class="blog-section-content" data-dcnode-id="589"><p data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">When performing with an ensemble, it’s important to maintain communication with the other musicians and the audience. If there is a Conductor or ensemble leader, all the performers should be watching carefully for </span><em data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">cues</span></em><span data-dcnode-id="613" instrument_node="">, or signals containing specific instructions about the music.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">A cue can be overt, such as a hand gesture or body movement, or can be very subtle, as in a glance or a facial expression. Cues can also be part of the music itself, such as a vocal cue (when the singer starts singing). Different groups and musicians will approach cues differently, and it is usually worked out in advance.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Properly given and received, cues alert the musicians to an impending transition, such as an upcoming chorus or bridge, and can signal dynamic or feel changes. Another example of a cue would be letting the soloist know in advance that their solo part is about to begin.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Musicians are sharing cues with each other on stage all the time, and many of these cues are designed to be unnoticeable to the audience. An important part of musicianship as it pertains to ensemble performance is the giving and receiving of cues, and this can take some advance preparation and practice, as part of learning to play the music properly in the group.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Besides stage communication among the ensemble performers, there is also audience communication. This might logically evolve out of the stage communications (cues) as the performers, through their movements and facial expressions, also share cues with the audience. Audience communication and cueing the audience is an art form. Livingston Taylor calls it the “care and feeding of your audience.”</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">One clear example: at the end of a song, or a concert, the musicians must let the audience know when the piece is finished, so they can respond with applause. This is most often done with visual (body movement and facial expressions) and verbal cues.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">If you watch master musicians performing in front of an audience you can notice the ways they interact with the audience, allowing the audience to “give back” at crucial moments. Live performance is an energy exchange flowing in both directions, from the stage to the audience and back again.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Performing live is an important musicianship skill most musicians learn to master. This might also include techniques for dealing with performance anxiety.</span></p><span data-dcnode-id="590" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="568" id="s_s_repertoire"><h2 class="blog-header" data-dcnode-id="585"><span data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Repertoire</span></span></h2><div class="blog-section-content" data-dcnode-id="569"><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">If you show up at a jam session or a gig, often the first question you will be asked is “what songs do you know?” It’s super important to have a vast repertoire of songs memorized; I really can’t stress this enough. I remember when I was much younger I met a professional </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/guitarist/"><span data-dcnode-id="583" instrument_node="">Guitarist</span></a><span data-dcnode-id="581" instrument_node=""> and singer at a festival in Europe. I was amazed when he estimated he knew 6,000 songs.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">When I went to music school I think I knew about 50 songs by heart. When I graduated I knew about 500. Now, I can say I know 5,000 songs. I think I’ve forgotten more songs than most people know!</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Knowing a song means you can play (or sing) the melody in different keys, and also know and can play the chord progression. Expanding your repertoire should be one of the primary goals of any young musician.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Make sure to learn music from different genres. It doesn’t mean you will actually perform every piece, but you should at least know the melody and chord progression, and the lyrics, too. Even if you are an instrumentalist, you should learn the lyrics to the songs, because the lyric shows the intent of the melody. Upgrading and expanding your repertoire should be worked at assiduously over a long time.</span></p><span data-dcnode-id="570" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="507" id="s_s_composition"><h2 class="blog-header" data-dcnode-id="565"><span data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Composition, Improvisation, Arranging, and Production</span></span></h2><div class="blog-section-content" data-dcnode-id="508"><p data-dcnode-id="557"><span data-dcnode-id="564" instrument_node="">There are many techniques used in composing. At its core, </span><em data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">composing</span></em><span data-dcnode-id="561" instrument_node=""> is transferring music from your head onto paper or your instrument. A composition doesn’t need to be written down to exist; for example, many </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/songwriter/"><span data-dcnode-id="560" instrument_node="">Songwriters</span></a><span data-dcnode-id="558" instrument_node=""> don’t actually “write” anything.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">For good musicianship, writing music down from your head is nevertheless an important skill. The process is similar whether you are transcribing something you’ve heard, or setting to paper the music you hear in your head. This skill is also closely related to </span><em data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">improvisation,</span></em><span data-dcnode-id="552" instrument_node=""> or making up music on the spot.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">I like to say that composition is improvisation in slow motion, while improvisation is composition speeded up. Throughout history, most of the great </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/composer/"><span data-dcnode-id="548" instrument_node="">Composers</span></a><span data-dcnode-id="546" instrument_node=""> could improvise, and most of the great improvisers, for example in Jazz, were also Composers. Mozart was reputed to be a proficient improviser of music and would play improvised music for hours at parties.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="537"><em data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Arranging</span></em><span data-dcnode-id="541" instrument_node=""> is taking an established piece of music and adapting it to a specific combination of musical instruments, usually (but not always) in an ensemble. </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/arranger/"><span data-dcnode-id="540" instrument_node="">Arrangers</span></a><span data-dcnode-id="538" instrument_node=""> make decisions about form, key, style, instrumentation, accompaniment, solos, and other aspects that, taken together, determine how the music is presented and what it will sound like.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Arrangers need strong skills in transcription, composition, and scoring. Arranging music is a useful and important skill.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="532" instrument_node="">Over the last few decades, with the radical advancement of music technology, especially synthesis, sequencing, sampling, and with </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/best-daw/"><span data-dcnode-id="531" instrument_node="">engineering</span></a><span data-dcnode-id="529" instrument_node=""> and </span><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/best-music-writing-software/"><span data-dcnode-id="528" instrument_node="">music notation software</span></a><span data-dcnode-id="526" instrument_node=""> vastly improving and decreasing in cost, the </span><em data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">music production</span></em><span data-dcnode-id="523" instrument_node=""> process has become integral to music as an art form.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">Composing, arranging, and production have intersected in new and useful ways. With digital sampling and sequencing, a Composer can hear what their piece will sound like without commissioning a </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/best-orchestral-vst/"><span data-dcnode-id="519" instrument_node="">live orchestra</span></a><span data-dcnode-id="517" instrument_node=""> to play it.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="514" instrument_node="">Not every musician needs to be a master of music technology or an </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/recording-engineer/"><span data-dcnode-id="513" instrument_node="">Engineer</span></a><span data-dcnode-id="511" instrument_node="">, but understanding the applications of technology, including with live sound reinforcement and in the recording studio, is important to almost all musicians in the 21st century.</span></p><span data-dcnode-id="509" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="480" id="s_s_odds"><h2 class="blog-header" data-dcnode-id="504"><span data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Odds and Ends</span></span></h2><div class="blog-section-content" data-dcnode-id="481"><p data-dcnode-id="501"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Music Industry, Touring, Audio Engineering (Studio and Live), Conducting, Music Therapy, and Teaching Music</span></strong></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Solid musicianship skills are considered a prerequisite to finding and building a career in most aspects of the music industry. There are lots of roles in music where having music skills will be viewed as a strong asset to success.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="496" instrument_node="">Besides the direct application of music (i.e. performing, composing, and arranging) many great musicians are involved in industry roles, such as </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/what-is-a-r/"><span data-dcnode-id="495" instrument_node="">A&amp;R</span></a><span data-dcnode-id="493" instrument_node="">, </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/tour-manager/"><span data-dcnode-id="492" instrument_node="">tour management</span></a><span data-dcnode-id="490" instrument_node="">, live and studio production, audio engineering, </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/what-is-music-therapy/"><span data-dcnode-id="489" instrument_node="">music therapy</span></a><span data-dcnode-id="487" instrument_node="">, and </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/music-education-careers/"><span data-dcnode-id="486" instrument_node="">music education</span></a><span data-dcnode-id="484" instrument_node="">. It makes sense that being a good musician will give you an edge in finding any kind of work in the music field.</span></p><span data-dcnode-id="482" instrument_node="">
</span></div></div><div class="blog-section" data-dcnode-id="459" id="s_s_expressing"><h2 class="blog-header" data-dcnode-id="477"><span data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Expressing Your Emotions (Say Something with Your Music)</span></span></h2><div class="blog-section-content" data-dcnode-id="460"><p data-dcnode-id="472"><span data-dcnode-id="476" instrument_node="">Now that we’ve explored musicianship as a set of important skills to be developed and worked on, it’s important to remember why we are doing this. Music is a universal language, and as with all art forms, a means of </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">expression</span></em><span data-dcnode-id="473" instrument_node="">. The emotional content of your music is at least as important to your listeners as the techniques you have mastered.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="470" instrument_node="">Finding your </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careersinmusic.com/recording-artist/"><em data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">artistic voice</span></em></a><span data-dcnode-id="466" instrument_node=""> is a lifelong journey for musicians, and can also be deeply personal. The musicianship skills discussed in this article are the main tools you will need to dig deep into your soul and express the meaning you find in your musical life.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Acquiring, developing, and refining your musicianship skills is an important step to achieving musical fulfillment. It takes some time to gain these skills and to be confident in your musicianship, but the time will pass anyway. It’s worth putting in the effort since strong musicianship is a basic requirement to becoming a master musician.</span></p><span data-dcnode-id="461" instrument_node="">
</span></div></div><span data-dcnode-id="458" instrument_node="">
