</span><section class="text-block rich-text" data-dcnode-id="2929"><span data-dcnode-id="3061" instrument_node="">
</span><div class="wrapper" data-dcnode-id="2931"><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">An idiom&nbsp;is&nbsp;a group of words in a fixed order that have&nbsp;a particular meaning different from the meanings of each word&nbsp;when used individually.&nbsp;Did you know&nbsp;there are&nbsp;an estimated&nbsp;25,000 different idioms&nbsp;in English?&nbsp;In this blog post we explain 25 common idiomatic expressions, and give you tips&nbsp;on&nbsp;how to work out&nbsp;the meaning&nbsp;of idioms you may not have come across before. There is also a short&nbsp;quiz&nbsp;at the end&nbsp;for you to&nbsp;practise&nbsp;your idiom-solving skills!&nbsp;</span></p><span data-dcnode-id="3057" instrument_node="">
</span><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">In the box below is&nbsp;a text with 10 idiomatic expressions&nbsp;in bold. Can you a guess what&nbsp;they&nbsp;might mean?&nbsp;
</span></p><span data-dcnode-id="3054" instrument_node="">
</span><table data-dcnode-id="3022"><tbody data-dcnode-id="3023"><tr data-dcnode-id="3024"><td data-dcnode-id="3025"><span data-dcnode-id="3053" instrument_node="">COVID&nbsp;has forced&nbsp;many companies to</span><strong data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">&nbsp;think outside the box</span></strong><span data-dcnode-id="3050" instrument_node="">&nbsp;and&nbsp;adopt more creative and unconventional solutions to stay&nbsp;</span><strong data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">ahead of the pack.</span></strong><span data-dcnode-id="3047" instrument_node="">&nbsp;&nbsp;Many companies have&nbsp;had&nbsp;to&nbsp;change their&nbsp;</span><strong data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">game plan</span></strong><span data-dcnode-id="3044" instrument_node="">, especially as some sectors have become more&nbsp;</span><strong data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">cut-throat</span></strong><span data-dcnode-id="3041" instrument_node="">.&nbsp;For some companies, adapting to the new environment has not&nbsp;been&nbsp;</span><strong data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">rocket science</span></strong><span data-dcnode-id="3038" instrument_node="">,&nbsp;whilst&nbsp;for others it has been more challenging.&nbsp;Some companies have had&nbsp;</span><strong data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">to go&nbsp;out on a limb</span></strong><span data-dcnode-id="3035" instrument_node="">, taking more risks than usual to ensure targets are reached,&nbsp;and many&nbsp;employees have been&nbsp;burning the midnight oil.&nbsp;</span><strong data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">The bottom line</span></strong><span data-dcnode-id="3032" instrument_node="">&nbsp;is that COVID has forced all of us to change at&nbsp;</span><strong data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">lightning speed</span></strong><span data-dcnode-id="3029" instrument_node="">.&nbsp;For some&nbsp;people&nbsp;this process has&nbsp;been&nbsp;</span><strong data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">a steep&nbsp;learning curve</span></strong><span data-dcnode-id="3026" instrument_node="">.</span></td></tr></tbody></table><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Now&nbsp;let’s&nbsp;take a look now at the meanings of these idioms:&nbsp;&nbsp;</span></p><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3012"><strong data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">1. Think outside the box</span></strong><strong data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">:</span></strong><span data-dcnode-id="3013" instrument_node="">&nbsp;to think of creative or unconventional solutions,&nbsp;instead of common ones;&nbsp;to go beyond a normal idea.&nbsp;</span></p><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3007"><strong data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">2. Ahead of the pack:</span></strong><span data-dcnode-id="3008" instrument_node="">&nbsp;to be more successful than&nbsp;one’s competitors.&nbsp;&nbsp;</span></p><span data-dcnode-id="3006" instrument_node="">
</span><p data-dcnode-id="3002"><strong data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">3. Game plan:</span></strong><span data-dcnode-id="3003" instrument_node="">&nbsp;a strategy or plan for success.&nbsp;</span></p><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2997"><strong data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">4. Cut-throat:</span></strong><span data-dcnode-id="2998" instrument_node="">&nbsp;very intense, aggressive, and merciless competition.&nbsp;</span></p><span data-dcnode-id="2996" instrument_node="">
</span><p data-dcnode-id="2992"><strong data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">5. It&nbsp;isn’t&nbsp;rocket science:</span></strong><span data-dcnode-id="2993" instrument_node="">&nbsp;something&nbsp;that isn’t&nbsp;complicated to understand.&nbsp;</span></p><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2987"><strong data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">6. To go out on a limb:</span></strong><span data-dcnode-id="2988" instrument_node="">&nbsp;to do or say something risky.&nbsp;</span></p><span data-dcnode-id="2986" instrument_node="">
</span><p data-dcnode-id="2982"><strong data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">7. Burning the midnight oil:&nbsp;</span></strong><span data-dcnode-id="2983" instrument_node="">to consistently work beyond normal business hours, usually late&nbsp;</span></p><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2977"><strong data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">8. The bottom line</span></strong><span data-dcnode-id="2978" instrument_node="">:&nbsp;the most important point&nbsp;or conclusion.&nbsp;</span></p><span data-dcnode-id="2976" instrument_node="">
</span><p data-dcnode-id="2972"><strong data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">9. Lightning speed:</span></strong><span data-dcnode-id="2973" instrument_node="">&nbsp;extremely quickly.&nbsp;</span></p><span data-dcnode-id="2971" instrument_node="">
</span><p data-dcnode-id="2967"><strong data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">10. Steep learning curve:</span></strong><span data-dcnode-id="2968" instrument_node="">&nbsp;the rate of someone’s progress in learning a new skill&nbsp;or set of information,&nbsp;usually in a short space of time. This is&nbsp;almost always&nbsp;expressed in&nbsp;a&nbsp;term associated with&nbsp;climbing&nbsp;hills or mountains,&nbsp;ie.&nbsp;steep.&nbsp;</span></p><span data-dcnode-id="2966" instrument_node="">
</span><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">How many did you know or&nbsp;guessed correctly?&nbsp;Here are strategies you can use&nbsp;to work out expressions you may come across in the future&nbsp;</span></p><span data-dcnode-id="2963" instrument_node="">
</span><ul data-dcnode-id="2956"><li data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">The context in which they are&nbsp;found&nbsp;will give you clues as to their meaning.&nbsp;</span></li><li data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">If there is a similar expression in your native language, translating each word of the idiom will reveal its meaning.&nbsp;&nbsp;</span></li><li data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">It&nbsp;isn’t&nbsp;crucial to know the exact meaning&nbsp;to understand what is being written,&nbsp;as long as you get the general idea, or ‘gist’.&nbsp;</span></li></ul><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Here are&nbsp;some&nbsp;other&nbsp;common&nbsp;idioms, and how to use them.&nbsp;</span></p><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2949"><strong data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">11.&nbsp;Back to square one&nbsp;</span></strong></p><span data-dcnode-id="2948" instrument_node="">
</span><ul data-dcnode-id="2943"><li data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Meaning: to start something over again because a previous attempt failed.&nbsp;</span></li><li data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Example:&nbsp;‘Unless we can resolve the problem&nbsp;now,&nbsp;we&nbsp;will be back to square&nbsp;one.’&nbsp;</span></li></ul><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2939"><strong data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">12. By the book&nbsp;</span></strong></p><span data-dcnode-id="2938" instrument_node="">
</span><ul data-dcnode-id="2933"><li data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Meaning: to do things exactly according to the rules.&nbsp;</span></li><li data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Example:&nbsp;‘We told our clients that we&nbsp;will&nbsp;do everything by the book&nbsp;and so we must follow procedures properly.’&nbsp;</span></li></ul><span data-dcnode-id="2932" instrument_node="">
</span></div><span data-dcnode-id="2930" instrument_node="">
</span></section><span data-dcnode-id="2928" instrument_node="">
</span><a class="image-block image-block--spacing" data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.londonschool.com/courses/" title=""><span data-dcnode-id="2927" instrument_node="">
</span><img alt="" class="lazyload" data-dcnode-id="2926" data-src="https://assets.londonschool.com/live/media/filer_public/a3/38/a3388a63-31cf-4b87-bd82-62b04d7cf06a/mid-page_banner_3.gif"><span data-dcnode-id="2925" instrument_node="">
</span></a><span data-dcnode-id="2923" instrument_node="">
</span><section class="text-block rich-text" data-dcnode-id="2656"><span data-dcnode-id="2922" instrument_node="">
</span><div class="wrapper" data-dcnode-id="2658"><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2919"><br data-dcnode-id="2920"></p><span data-dcnode-id="2918" instrument_node="">
</span><p data-dcnode-id="2915"><strong data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">13. Get down to business&nbsp;&nbsp;</span></strong></p><span data-dcnode-id="2914" instrument_node="">
</span><ul data-dcnode-id="2909"><li data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Meaning:&nbsp;stop making small talk and start talking about&nbsp;the topic.&nbsp;</span></li><li data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Example:&nbsp;‘Now that everyone is here,&nbsp;let’s&nbsp;get down to business.’&nbsp;</span></li></ul><span data-dcnode-id="2908" instrument_node="">
</span><p data-dcnode-id="2905"><strong data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">14. Go the extra mile&nbsp;</span></strong></p><span data-dcnode-id="2904" instrument_node="">
</span><ul data-dcnode-id="2899"><li data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Meaning: to do more than what people expect.&nbsp;</span></li><li data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Example:&nbsp;‘At&nbsp;The&nbsp;London School of English we go the extra mile to ensure that our clients have the best experience.’&nbsp;</span></li></ul><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2895"><strong data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">15. The elephant in the room&nbsp;</span></strong></p><span data-dcnode-id="2894" instrument_node="">
</span><ul data-dcnode-id="2889"><li data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Meaning: An obvious problem or controversial issue that no one wants to&nbsp;talk about.&nbsp;</span></li><li data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Example:&nbsp;‘I know it’s uncomfortable, but we&nbsp;really&nbsp;should talk about the elephant in the room.’&nbsp;</span></li></ul><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2885"><strong data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">16. Touch base&nbsp;</span></strong></p><span data-dcnode-id="2884" instrument_node="">
</span><ul data-dcnode-id="2879"><li data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">Meaning: to&nbsp;make&nbsp;contact with&nbsp;someone.&nbsp;</span></li><li data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Example:&nbsp;‘I’ll touch base with you next week.’&nbsp;</span></li></ul><span data-dcnode-id="2878" instrument_node="">
</span><p data-dcnode-id="2875"><strong data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">17. Word of mouth&nbsp;</span></strong></p><span data-dcnode-id="2874" instrument_node="">
</span><ul data-dcnode-id="2869"><li data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Meaning:&nbsp;information or a story that is passed on through speech.&nbsp;&nbsp;</span></li><li data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Example:&nbsp;‘Many companies rely on word of mouth to get new customers.’&nbsp;</span></li></ul><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2865"><strong data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">18. See something through&nbsp;</span></strong></p><span data-dcnode-id="2864" instrument_node="">
</span><ul data-dcnode-id="2859"><li data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Meaning: to continue until something is finished.&nbsp;</span></li><li data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Example:&nbsp;‘I would like to see this project through before taking on another one.’&nbsp;</span></li></ul><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2855"><strong data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">19. In a nutshell&nbsp;</span></strong></p><span data-dcnode-id="2854" instrument_node="">
</span><ul data-dcnode-id="2849"><li data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Meaning: using as few words as possible;&nbsp;summarising.&nbsp;</span></li><li data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Example:&nbsp;‘In a nutshell,&nbsp;the best way to improve your English is to&nbsp;practise&nbsp;using it.’&nbsp;</span></li></ul><span data-dcnode-id="2848" instrument_node="">
</span><p data-dcnode-id="2845"><strong data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">20. Twist someone’s arm&nbsp;</span></strong></p><span data-dcnode-id="2844" instrument_node="">
</span><ul data-dcnode-id="2839"><li data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Meaning: to convince someone to do something that he or she does not want to do.&nbsp;</span></li><li data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Example:&nbsp;‘My boss thought the budget was a bit high, so I had to twist her arm to get her to agree.’&nbsp;</span></li></ul><span data-dcnode-id="2838" instrument_node="">
</span><h2 data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Test yourself!&nbsp;</span></h2><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">These last five idioms&nbsp;are&nbsp;used in&nbsp;an example sentence, followed by&nbsp;three definitions.&nbsp;One&nbsp;of the definitions is the correct one. Can you guess which one it is?&nbsp;</span></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2829"><strong data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">21.&nbsp;Stand one’s ground&nbsp;&nbsp;</span></strong></p><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Example:&nbsp;‘They tried to offer me a voucher for my airline ticket, but I stood my ground and got my money&nbsp;back.’&nbsp;</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">(a)&nbsp;To hold a position in battle.&nbsp;</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">(b) Something that you do when you gamble.&nbsp;</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">(c) Something that you do when talking on the phone.&nbsp;&nbsp;</span></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2813"><strong data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">22. Up in the air&nbsp;</span></strong></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Example:&nbsp;‘Our worldwide expansion is up in the air.’&nbsp;</span></p><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">(a) It is&nbsp;undecided&nbsp;or plans have been upset by something&nbsp;</span></p><span data-dcnode-id="2806" instrument_node="">
</span><p data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">(b)&nbsp;It’s&nbsp;far away&nbsp;or&nbsp;not achievable.&nbsp;</span></p><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">(c) You will always find it.&nbsp;</span></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2797"><strong data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">23. Learn the ropes&nbsp;</span></strong></p><span data-dcnode-id="2796" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Example:&nbsp;‘I started my new job last month&nbsp;and&nbsp;I’m&nbsp;still learning the ropes’&nbsp;</span></p><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">(a) Something you do when you go climbing.&nbsp;</span></p><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">(b) A sporting&nbsp;term.&nbsp;</span></p><span data-dcnode-id="2787" instrument_node="">
</span><p data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">(c) Learning&nbsp;the basics of something,&nbsp;especially a job.&nbsp;</span></p><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2781"><strong data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">24. On the same page&nbsp;</span></strong></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Example:&nbsp;‘Let’s&nbsp;go over the details of the contract again, to make sure we are both on the same page.’&nbsp;</span></p><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">(a) To&nbsp;be in agreement&nbsp;about something.&nbsp;</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">(b) To make sure we read the same page together.&nbsp;</span></p><span data-dcnode-id="2771" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">(c) To make sure our page numbers are the same.&nbsp;</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2765"><strong data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">25. Red tape&nbsp;</span></strong></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Example:&nbsp;‘This new law is going to create a lot of red tape.’&nbsp;</span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">(a) Official rules and processes that seem excessive and unnecessary.&nbsp;</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">(b) Official rules and processes that must be written in red.&nbsp;</span></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">(c) Official rules and processes that are necessary.&nbsp;</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2751" instrument_node="">The&nbsp;answers for the idioms above are&nbsp;</span><strong data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">a&nbsp;a&nbsp;c a&nbsp;a</span></strong><span data-dcnode-id="2748" instrument_node="">. How many did you get&nbsp;right?&nbsp;&nbsp;</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">This blog has been written at level B1. Practise your reading and listening by reading the blogs below.</span></p><span data-dcnode-id="2743" instrument_node="">

</span><h2 data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">About The London School of English</span></h2><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">The London School of English has over 100 years of history teaching English and communication skills to adult learners. It is the joint #1 English language school in the UK according to the British Council inspections, the highest rated English language school in the world on Trustpilot, and the best value for money school according The English Language Gazette.&nbsp;</span></p><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Our practical, individualised approach enables our clients to learn effectively and make rapid progress. Courses include General English, Individual English training, Legal English, Business and Professional English, IELTS preparation and Academic English. We also offer bespoke business solutions for staff training and assessment.&nbsp;</span></p><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2609"><span data-dcnode-id="2613" instrument_node="">You can learn English with our expert trainers in our London centre at 15 Holland Park Gardens, in the Royal Borough of Kensington and Chelsea, or you can choose to study English online in groups or in individual classes.&nbsp;</span><a data-auth="NotApplicable" data-dcnode-id="2611" data-linkindex="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.londonschool.com/contact-us/" rel="noopener noreferrer" target="_blank" title="https://www.londonschool.com/contact-us/"><span data-dcnode-id="2612" instrument_node="">Contact us online</span></a><span data-dcnode-id="2610" instrument_node="">&nbsp;or via phone +44 (0) 207 605 4142.</span></p><span data-dcnode-id="2608" instrument_node="">

</span><div class="date secondary-text" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">6 April</span></div></div><div class="header" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">The school is very professional, five out of five :-)</span></div><div class="text" data-dcnode-id="1393"><span data-dcnode-id="1394"><span data-dcnode-id="1402" instrument_node="">The school is very professionally organized, very flexible and helpful when it comes to student requests. (Extensions, individual lessons). The teachers are competent and responsive to the needs of the students. The class size is not too big and the school makes sure that the level of the students is suitable. </span><br data-dcnode-id="1401"/><span data-dcnode-id="1400" instrument_node="">Also recommended for working students (40+) who want to improve their Business English. </span><br data-dcnode-id="1399"/><span data-dcnode-id="1398" instrument_node="">Top rating from my end :-)</span><br data-dcnode-id="1397"/><br data-dcnode-id="1396"/><span data-dcnode-id="1395" instrument_node="">PS: I would recommend the 1:1 lessons with a dedicated teacher to everyone, as you are 100% challenged and can really improve your English extremely.</span></span></div><div class="reply" data-dcnode-id="1370" style=""><div class="header secondary-text" data-dcnode-id="1385"><span class="reply-from" data-dcnode-id="1389"><span data-dcnode-id="1392" instrument_node="">Reply from </span><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">The London School of English</span></strong></span><span data-dcnode-id="1388" instrument_node="">
</span><span class="date" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">6 April</span></span></div><span data-dcnode-id="1384" instrument_node="">
</span><div class="reply__text very-small-screen-width" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Dear Michael, thank you very much for your detailed review. We are delighted to see that you found our approach both challenging and useful, and are pleased see you made great progress - do stay in touch! from all at The London School of English</span></div><span data-dcnode-id="1381" instrument_node="">

</span><div class="date secondary-text" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">3 April</span></div></div><div class="header" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">My studying at London school of English</span></div><div class="text" data-dcnode-id="1295"><span data-dcnode-id="1296"><span data-dcnode-id="1299" instrument_node="">I want to thank the London school of English for providing my attending the course. It was perfect. My studying during the course covered all that I needed, including my accommodation, providing the meals, attitude and being in London. Especially, I am very greatful for my teacher Ebru Ergen who presented all lessons in high level. Her lessons were held in one breath, interesting, full of lively. Thanks very much the whole school.I am hoping that I can come back soon.</span><br data-dcnode-id="1298"/><span data-dcnode-id="1297" instrument_node="">P/s Thanks a lot Silvia and Julia )))</span></span></div><div class="reply" data-dcnode-id="1272" style=""><div class="header secondary-text" data-dcnode-id="1287"><span class="reply-from" data-dcnode-id="1291"><span data-dcnode-id="1294" instrument_node="">Reply from </span><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">The London School of English</span></strong></span><span data-dcnode-id="1290" instrument_node="">

</span><div class="date secondary-text" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">27 March</span></div></div><div class="header" data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Thank you</span></div><div class="text" data-dcnode-id="1199"><span data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Thank you! The lunch has every day an high quality. Teachers are friendly and helpful. Every secretary helped with all questions, be it printing checkins or other things. Simply incredible, during and after the lesson we received suggestions for improvement on little cards. In the evening after the lesson, the lesson was summarized in my email account. Simply wonderful. And as the icing on the cake, my account is still open 3 months after school. There is even the possibility to ask questions to the teachers after school. Thank you very much for everything.</span></span></div><div class="reply" data-dcnode-id="1174" style=""><div class="header secondary-text" data-dcnode-id="1191"><span class="reply-from" data-dcnode-id="1195"><span data-dcnode-id="1198" instrument_node="">Reply from </span><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The London School of English</span></strong></span><span data-dcnode-id="1194" instrument_node="">

</span><div class="date secondary-text" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">24 March</span></div></div><div class="header" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Top-notch!</span></div><div class="text" data-dcnode-id="1101"><span data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">I had the loveliest time at The London School of English. I could focus on my weak points in my use of English, I had wonderful teachers. Homestay was so nice. School was great socially too, as there are plenty of other students who are on their own, wanting to get to know you. Social activities were interesting, and food at school (lunch) was very good! I give it an A!</span></span></div><div class="reply" data-dcnode-id="1078" style=""><div class="header secondary-text" data-dcnode-id="1093"><span class="reply-from" data-dcnode-id="1097"><span data-dcnode-id="1100" instrument_node="">Reply from </span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">The London School of English</span></strong></span><span data-dcnode-id="1096" instrument_node="">

</span><div class="date secondary-text" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">10 March</span></div></div><div class="header" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Very comprehensive English training</span></div><div class="text" data-dcnode-id="999"><span data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">I really enjoyed the English lesson with my trainer from the London School of English.</span><br data-dcnode-id="1006"/><span data-dcnode-id="1005" instrument_node="">In the 1:1 situation, my teacher focused on my individual mistakes and extracted grammar, vocabulary, explanations and phrases to fix those mistakes. And very useful, in my opinion, was the expansion of my personal vocabulary by suggesting synonyms and other related expressions or explanations.</span><br data-dcnode-id="1004"/><span data-dcnode-id="1003" instrument_node="">I also really enjoyed the discussions on political and multicultural issues and gained insights into British ways of thinking and behaving.</span><br data-dcnode-id="1002"/><span data-dcnode-id="1001" instrument_node="">Absolutely comprehensive and already I miss those hours.</span></span></div><div class="reply" data-dcnode-id="976" style=""><div class="header secondary-text" data-dcnode-id="991"><span class="reply-from" data-dcnode-id="995"><span data-dcnode-id="998" instrument_node="">Reply from </span><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The London School of English</span></strong></span><span data-dcnode-id="994" instrument_node="">

</span><div class="reply__text very-small-screen-width" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Dear Christiane, Thank you for taking the time to write a detailed review of your individual training - we do appreciate it. Wishing you every success - do stay in touch! All the best from The London School team</span></div><span data-dcnode-id="987" instrument_node="">
