 pay, many of us adopt a very interesting strategy – often called the ‘Ostrich method!‘</span></p><ul data-dcnode-id="461"><li data-dcnode-id="462"><span data-dcnode-id="466" instrument_node="">This is no way to run a company – whenever there’s a problem you just </span><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">put your head in the sand</span></strong><span data-dcnode-id="463" instrument_node=""> and hope it will go away!</span></li></ul><h2 data-dcnode-id="457"><noscript data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">&lt;img class="aligncenter size-full wp-image-24332" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/intelligence-is-light.jpg" alt="" width="700" height="312" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/intelligence-is-light.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/intelligence-is-light-300x134.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="" class="lazyload aligncenter size-full wp-image-24332" data-dcnode-id="458" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/intelligence-is-light.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/intelligence-is-light.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/intelligence-is-light-300x134.jpg 300w" height="312" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20312%22%3E%3C/svg%3E" width="700"></h2><h2 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">English Expressions About Intelligence</span></h2><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Imagine that you are in a college lecture and that your teacher is trying to explain something that the class have been having difficulty with. Maybe a tough equation, a difficult moral problem or a poem that nobody understands.</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Finally the teacher shows, proves or says something that finally makes everybody understand; everything now makes sense! Around the room, people nod in agreement; some raise their eyebrows and smile; the mood in the room lifts – as if some new bright light is now shining.</span></p><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">This is called a ‘</span><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">light-bulb moment</span></strong><span data-dcnode-id="447" instrument_node="">’ and it’s the moment when we conceive or understand a (usually good) idea for the first time. It’s quite a common idiomatic expression; The Oxford Dictionary defines it as ‘A moment of sudden realization, enlightenment, or inspiration’ and it is a powerful image.</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">For example, we often see cartoon characters with light-bulbs above their heads when they have a new idea, or come to understand something.</span></p><p data-dcnode-id="430"><span data-dcnode-id="443" instrument_node="">The idea that understanding (and, as we will see, intelligence) can be expressed as light is very common in English; people have </span><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">bright, ideas</span></strong><span data-dcnode-id="440" instrument_node="">, become </span><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">brilliant scholars</span></strong><span data-dcnode-id="437" instrument_node="">, </span><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">shine a light</span></strong><span data-dcnode-id="434" instrument_node=""> on things when they explain them, and </span><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">achieve enlightenment</span></strong><span data-dcnode-id="431" instrument_node="">.</span></p><p data-dcnode-id="419"><span data-dcnode-id="429" instrument_node="">This idiom also works in reverse; in English, darkness often refers to different types of ignorance. We get </span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">kept in the dark</span></strong><span data-dcnode-id="426" instrument_node=""> when people don’t tell us a secret; we make </span><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">dim-witted mistakes</span></strong><span data-dcnode-id="423" instrument_node="">, and we walk out of </span><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">dull</span></strong><span data-dcnode-id="420" instrument_node=""> movies.</span></p><h3 data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Examples of English Expressions about Intelligence:</span></h3><ul data-dcnode-id="366"><li data-dcnode-id="412"><span data-dcnode-id="416" instrument_node="">John came top of his class in all of his tests again – he’s a real </span><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">bright spark</span></strong><span data-dcnode-id="413" instrument_node="">!</span></li><li data-dcnode-id="407"><span data-dcnode-id="411" instrument_node="">People come from all over the world to find </span><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">enlightenment</span></strong><span data-dcnode-id="408" instrument_node=""> at the meditation centre.</span></li><li data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">The recent discovery of King Richard’s body has </span><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">thrown light</span></strong><span data-dcnode-id="403" instrument_node=""> on his actual cause of death.</span></li><li data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">This film is really </span><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">dull</span></strong><span data-dcnode-id="398" instrument_node=""> – when is something interesting going to happen?</span></li><li data-dcnode-id="392"><span data-dcnode-id="396" instrument_node="">He was always a </span><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">brilliant</span></strong><span data-dcnode-id="393" instrument_node=""> student and it was no surprise when he won the scholarship.</span></li><li data-dcnode-id="387"><span data-dcnode-id="391" instrument_node="">New evidence has recently </span><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">come to light</span></strong><span data-dcnode-id="388" instrument_node=""> that could lead to further charges in the case.</span></li><li data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">Let’s keep Sarah </span><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">in the dark</span></strong><span data-dcnode-id="383" instrument_node=""> about it for now – she loves a good surprise.</span></li><li data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">I think that his political supporters are pretty </span><strong data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">dim-witted</span></strong><span data-dcnode-id="378" instrument_node="">, they don’t seem to know much about the world.</span></li><li data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">These kinds of injuries were more common back in the </span><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Dark Ages</span></strong><span data-dcnode-id="373" instrument_node=""> of NFL concussion awareness.</span></li><li data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">Well that was a very </span><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">illuminating</span></strong><span data-dcnode-id="368" instrument_node=""> lecture – I think I really get it now!</span></li></ul><h2 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">English Expressions About Opinions</span></h2><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">What is a political map and why might we need one? In some countries there seem to be so many different political parties and points of view that things can become rather confusing for voters at election time – so maybe some kind of map would be useful.</span></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">But why a map – why not a list, or a diagram?</span></p><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Perhaps the reason is that we imagine a political landscape where&nbsp;people stand in particular places that&nbsp;indicate their opinions on particular issues. For example, in most democratic parliaments the political parties sit together in particular parts of the room that they meet in.</span></p><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">The prime minister sits in a seat at the front of his grouping with his supporters behind him and with the opposition politicians sitting opposite. The minor parties usually sit according to whether they support the government or not – which side they are on. This is why we can talk about right – or left-wing politics, and how we can take a position on an issue, stand behind someone we agree with, or change sides in an argument.</span></p><p data-dcnode-id="339"><span data-dcnode-id="355" instrument_node="">Interestingly, if I express my opinion by standing in a particular location then this will effect what I can see, what my view of the world is. So I can </span><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">see things differently</span></strong><span data-dcnode-id="352" instrument_node=""> from other people, have a </span><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">positive outlook</span></strong><span data-dcnode-id="349" instrument_node="">, </span><strong data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">look up to</span></strong><span data-dcnode-id="346" instrument_node=""> – or </span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">down on</span></strong><span data-dcnode-id="343" instrument_node=""> people, or describe my </span><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">point of view</span></strong><span data-dcnode-id="340" instrument_node=""> of a situation or issue.</span></p><h3 data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Examples of English Expressions About Opinions:</span></h3><ul data-dcnode-id="288"><li data-dcnode-id="332"><span data-dcnode-id="336" instrument_node="">I don’t want him to come to dinner – he has very </span><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">right-wing</span></strong><span data-dcnode-id="333" instrument_node=""> views.</span></li><li data-dcnode-id="327"><span data-dcnode-id="331" instrument_node="">I think the royal family </span><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">look down on</span></strong><span data-dcnode-id="328" instrument_node=""> us all.</span></li><li data-dcnode-id="319"><span data-dcnode-id="326" instrument_node="">How are things on your </span><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">side</span></strong><span data-dcnode-id="323" instrument_node=""> of the political </span><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">fence</span></strong><span data-dcnode-id="320" instrument_node="">?</span></li><li data-dcnode-id="314"><span data-dcnode-id="318" instrument_node="">There has always been a complex </span><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">political landscape</span></strong><span data-dcnode-id="315" instrument_node=""> in the country.</span></li><li data-dcnode-id="309"><span data-dcnode-id="313" instrument_node="">Artists and musicians often </span><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">look at life</span></strong><span data-dcnode-id="310" instrument_node=""> in new and interesting ways.</span></li><li data-dcnode-id="304"><span data-dcnode-id="308" instrument_node="">We’ll give you all the support you need – we’re </span><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">behind you all the way</span></strong><span data-dcnode-id="305" instrument_node="">.</span></li><li data-dcnode-id="299"><span data-dcnode-id="303" instrument_node="">From my </span><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">point of view</span></strong><span data-dcnode-id="300" instrument_node="">, I think that it’s a very good deal.</span></li><li data-dcnode-id="294"><span data-dcnode-id="298" instrument_node="">We need more information to give us a </span><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">better perspective</span></strong><span data-dcnode-id="295" instrument_node=""> of this situation.</span></li><li data-dcnode-id="289"><span data-dcnode-id="293" instrument_node="">It’s not fair – whenever there’s an argument you always </span><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">take his side</span></strong><span data-dcnode-id="290" instrument_node="">!</span></li></ul><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Notice that ‘stand’ can be used in both senses:</span></p><ul data-dcnode-id="275"><li data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">From </span><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">where I stand</span></strong><span data-dcnode-id="282" instrument_node=""> it looks like the economy is going nowhere.</span></li><li data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">Where do you </span><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">stand</span></strong><span data-dcnode-id="277" instrument_node=""> on nuclear energy?</span></li></ul><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Perhaps it’s not surprising to note that altitude affects morals:</span></p><ul data-dcnode-id="262"><li data-dcnode-id="268"><span data-dcnode-id="272" instrument_node="">I’ve always </span><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">looked up to</span></strong><span data-dcnode-id="269" instrument_node=""> my Mum; she’s been an inspiration to me.</span></li><li data-dcnode-id="263"><span data-dcnode-id="267" instrument_node="">I think we hold the </span><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">moral high ground</span></strong><span data-dcnode-id="264" instrument_node=""> on this issue.</span></li></ul><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Also, the two sides of an argument are often separated by some kind of barrier:</span></p><ul data-dcnode-id="254"><li data-dcnode-id="255"><span data-dcnode-id="259" instrument_node="">He’s always </span><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">sitting on the fence</span></strong><span data-dcnode-id="256" instrument_node=""> whenever there’s an argument.</span></li></ul><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Whether your an ESL student, teacher or just someone curious about the language, we&nbsp;hope you found that helpful! If you keep these concepts in mind, English idiomatic expressions should be easy for you.</span></p><p data-dcnode-id="247"><span data-dcnode-id="251" instrument_node="">If you’ve got any questions, feel free to add them in comments and we’ll respond. If you want to take your English further, </span><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skypeenglishclasses.com/"><span data-dcnode-id="250" instrument_node="">try a live, online English class with LOI</span></a><span data-dcnode-id="248" instrument_node="">.</span></p><p data-dcnode-id="238"><strong data-dcnode-id="242"><noscript data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">&lt;img class="alignleft size-medium wp-image-22164" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-300x300.jpg" alt="peter" width="300" height="300" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-300x300.jpg 300w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-150x150.jpg 150w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-50x50.jpg 50w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024.jpg 663w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><img alt="peter" class="lazyload alignleft size-medium wp-image-22164" data-dcnode-id="244" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-300x300.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-300x300.jpg 300w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-150x150.jpg 150w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024-50x50.jpg 50w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/peterball_0031-681x1024.jpg 663w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20300%20300%22%3E%3C/svg%3E" width="300"><span data-dcnode-id="243" instrument_node="">About the Author:</span></strong><span data-dcnode-id="241" instrument_node=""> </span><em data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Peter Ball has been teaching English for 15 years and has taught in Poland, Thailand, Malaysia, Egypt, Pakistan, Britain and Ireland, he still really enjoys the challenge – each student is unique. Peter has a Cambridge certificate in teaching (CELTA) and a Cambridge diploma (DELTA). </span></em></p><p data-dcnode-id="235"><em data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">He’s also an FCE and Cambridge examiner. He works with students of all levels from beginner to advanced and has taught professionals from all walks of life. Peter loves teaching pronunciation, explaining grammar, learner-training and better conversation. In his free time he has his own radio show in Connemara, Ireland and he swims, juggles and plays guitar – but not all at the same time!</span></em></p><p data-dcnode-id="231"><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skypeenglishclasses.com/english-teacher/peter/"><span data-dcnode-id="234" instrument_node="">Click here to schedule a class with Peter</span></a><span data-dcnode-id="232" instrument_node="">.</span></p></div></div><aside data-dcnode-id="130" id="sidebar"><div class="learn-english" data-dcnode-id="212"><div class="headerss" data-dcnode-id="216"><h5 data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Learn English in live 1-to-1 Classes with professional teachers online.</span></h5><div class="textwidget" data-dcnode-id="217"><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">" I was able to practice English specific to my job interview. My Job interview went really well, and I got the job!"</span></p><span data-dcnode-id="224" instrument_node=""> </span><noscript data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">&lt;img src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/06/cv_sam-227x300-e1502139393711.jpg"&gt;</span></noscript><img class="lazyloaded" data-dcnode-id="221" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/06/cv_sam-227x300-e1502139393711.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/06/cv_sam-227x300-e1502139393711.jpg&amp;raw"><h6 data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Sergio Agüero Spain</span></h6><div "="" class="rate rating-5" data-dcnode-id="218"></div></div></div><span data-dcnode-id="215" instrument_node=""> </span><a class="btn-primary button-sentence sidebars-a" data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.skypeenglishclasses.com/schedule-2"><span data-dcnode-id="214" instrument_node="">Try it Free!</span></a></div><div class="teacherss" data-dcnode-id="131"><div class="teacher-header" data-dcnode-id="209"><h4 data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Our Teachers</span></h4></div><div class="teacher-padding" data-dcnode-id="132"><div class="teacher-content" data-dcnode-id="197"><span data-dcnode-id="208" instrument_node=""> </span><noscript data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">&lt;img src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2021/06/Itai-300x269.jpg"/&gt;</span></noscript><img class="lazyloaded" data-dcnode-id="205" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2021/06/Itai-300x269.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2021/06/Itai-300x269.jpg&amp;raw"><h3 data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Itai</span></h3><ul data-dcnode-id="198"><li data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Bachelor of Medicine and Surgery - Zimbabwe University</span></li><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">TEFL Certified - with Distinction</span></li></ul></div><div class="teacher-content" data-dcnode-id="183"><span data-dcnode-id="196" instrument_node=""> </span><noscript data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">&lt;img src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2020/12/Capture43-188x300.png"/&gt;</span></noscript><img class="lazyloaded" data-dcnode-id="193" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2020/12/Capture43-188x300.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2020/12/Capture43-188x300.png&amp;raw"><h3 data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Jade</span></h3><ul data-dcnode-id="184"><li data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">TEFL certified</span></li><li data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">TEYL certified</span></li><li data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Completing Bachelor of Education (UNISA)</span></li></ul></div><div class="teacher-content" data-dcnode-id="171"><span data-dcnode-id="182" instrument_node=""> </span><noscript data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">&lt;img src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2020/11/Fiona-Photo-225x300.jpg"/&gt;</span></noscript><img class="lazyloaded" data-dcnode-id="179" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2020/11/Fiona-Photo-225x300.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2020/11/Fiona-Photo-225x300.jpg&amp;raw"><h3 data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Fiona</span></h3><ul data-dcnode-id="172"><li data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">BA in English and Spanish from the University of Bristol</span></li
