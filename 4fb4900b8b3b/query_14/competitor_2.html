 google-plus st-hide-label" data-dcnode-id="1879" data-description="<p>Idiomatic expressions are groups of words with an established meaning unrelated to the meanings of the individual words.&nbsp; Sometimes called an expression, an idiom can be very colorful and make a ‘picture’ in our minds. Some common idiomatic expressions: He let the cat out of the bag (accidentally told a secret). She got off Scott-free […]</p> " data-image="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/English-Idiomatic-Expressions.jpg" data-network="googleplus" data-title="100+ Idiomatic Expressions: The Ultimate Guide to Learning Them" data-url="https://www.skypeenglishclasses.com/idiomatic-expressions/"><span data-dcnode-id="1885" instrument_node=""> </span><noscript data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">&lt;img src="https://d2zon88i61wtiz.cloudfront.net/wp-content/themes/loi-english/images/bg-google.png"&gt;</span></noscript><img class="lazyloaded" data-dcnode-id="1882" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/themes/loi-english/images/bg-google.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/themes/loi-english/images/bg-google.png&amp;raw"><span data-dcnode-id="1881" instrument_node=""> </span><span class="count" data-dcnode-id="1880"></span></div></div></div></div><h2 data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">100+ Idiomatic Expressions: The Ultimate Guide to Learning Them</span></h2><div class="content-text" data-dcnode-id="230"><p data-dcnode-id="1869"><noscript data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">&lt;img class="size-medium wp-image-24450 alignright" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions-300x227.jpg" alt="Idiomatic Expressions" width="300" height="227" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions-300x227.jpg 300w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions.jpg 422w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><img alt="Idiomatic Expressions" class="size-medium wp-image-24450 alignright lazyloaded" data-dcnode-id="1871" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions-300x227.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions-300x227.jpg 300w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions.jpg 422w" height="227" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions-300x227.jpg&amp;raw" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions-300x227.jpg 300w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/idiomatic-expressions.jpg 422w" width="300"><span data-dcnode-id="1870" instrument_node="">Idiomatic expressions are groups of words with an established meaning unrelated to the meanings of the individual words.&nbsp; Sometimes called an expression, an idiom can be very colorful and make a ‘picture’ in our minds.</span></p><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Some common idiomatic expressions:</span></p><ul data-dcnode-id="1857"><li data-dcnode-id="1864"><em data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">He let the cat out of the bag (accidentally told a secret).</span></em></li><li data-dcnode-id="1861"><em data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">She got off Scott-free (escaped without punishment).</span></em></li><li data-dcnode-id="1858"><em data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">He flew off the handle (went crazy).</span></em></li></ul><p data-dcnode-id="1846"><span data-dcnode-id="1856" instrument_node="">We love idiomatic expressions and idiomatic phrases in English, don’t we? From an English&nbsp;language-learner’s point of view, they are the&nbsp;</span><strong data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">‘icing on the cake’</span></strong><span data-dcnode-id="1853" instrument_node="">&nbsp;much like </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skypeenglishclasses.com/english-phrasal-verbs/"><span data-dcnode-id="1852" instrument_node="">phrasal verbs</span></a><span data-dcnode-id="1850" instrument_node=""> and </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skypeenglishclasses.com/english-adjectives/"><span data-dcnode-id="1849" instrument_node="">adjectives</span></a><span data-dcnode-id="1847" instrument_node="">. But how do we remember what they mean and how to use them?</span></p><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">We can memorize a few, and try to use them as often as we can (probably too often!), but how do we manage&nbsp;an idiom that we are meeting for the first time?</span></p><p data-dcnode-id="1839" style="text-align: center;"><strong data-dcnode-id="1840"><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-idiomatic-expressions-download-20170917.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1843" instrument_node="">Click here to download our free guide to English Idioms</span></a><span data-dcnode-id="1841" instrument_node="">. </span></strong></p><p data-dcnode-id="1836" style="text-align: center;"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">No email required!</span></strong></p><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">I’m going to show you how you can easily understand more than 100 English idioms, used in both American English and British English, even the first time you hear them.</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Firstly, you need to know that idioms and phrases are everywhere in English: anything that doesn’t have a literal, physical meaning is an idiom. Let’s look at some idiom examples:</span></p><ul data-dcnode-id="1816"><li data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">I find his excuses </span><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">hard to swallow</span></strong><span data-dcnode-id="1828" instrument_node="">, he’s lying.</span></li><li data-dcnode-id="1822"><span data-dcnode-id="1826" instrument_node="">The police have been </span><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">digging around</span></strong><span data-dcnode-id="1823" instrument_node=""> in his accounts looking for evidence of fraud.</span></li><li data-dcnode-id="1817"><span data-dcnode-id="1821" instrument_node="">He’s </span><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">a really bright spark</span></strong><span data-dcnode-id="1818" instrument_node="">, so I think he’ll do well at school.</span></li></ul><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">These sentences all contain idioms, because you can’t swallow words or dig in a bank account in any literal or physical way – and how can a ‘spark’ do well at school? You’ll also notice that a literal translation into most languages won’t make sense.</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1813" instrument_node="">These kinds of idioms are far more common, and therefore far more important, than the more colorful expressions like </span><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">‘He’s kicked the bucket’ </span></strong><span data-dcnode-id="1810" instrument_node="">(died), </span><strong data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">‘She’s hitting the books’ </span></strong><span data-dcnode-id="1807" instrument_node="">(studying), or </span><em data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">‘</span></em><strong data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Break a leg!’ </span></strong><span data-dcnode-id="1802" instrument_node="">(Good luck!), and without them students often sound too formal – saying things like:</span></p><ul data-dcnode-id="1794"><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">I don’t believe his excuses.</span></li><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">The police have been investigating his accounts looking for evidence of fraud.</span></li><li data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">He is a very intelligent student, so I think he’ll succeed at university.</span></li></ul><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">So how can you learn&nbsp;idioms without memorizing huge lists of English expressions? Many of my students in my </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skypeenglishclasses.com/online-english-classes/"><span data-dcnode-id="1792" instrument_node="">online English classes</span></a><span data-dcnode-id="1790" instrument_node=""> ask me this. I’ll show you how.</span></p><h2 data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">List of Common English Idioms:</span></h2><table class="idioms-table" data-dcnode-id="1259"><thead data-dcnode-id="1781"><tr data-dcnode-id="1782"><td data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Idiom</span></td><td data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Meaning</span></td></tr></thead><tbody data-dcnode-id="1260"><tr data-dcnode-id="1776"><td data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Hard to swallow</span></td><td data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Difficult to believe</span></td></tr><tr data-dcnode-id="1771"><td data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Digging around</span></td><td data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Looking for</span></td></tr><tr data-dcnode-id="1766"><td data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">He’s a really bright spark</span></td><td data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">He’s an intelligent person</span></td></tr><tr data-dcnode-id="1761"><td data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">He’s kicked the bucket</span></td><td data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">He’s died</span></td></tr><tr data-dcnode-id="1756"><td data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">She’s hitting the books</span></td><td data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">She’s studying hard</span></td></tr><tr data-dcnode-id="1751"><td data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Break a leg!</span></td><td data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Good luck!</span></td></tr><tr data-dcnode-id="1746"><td data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Set out on a new career</span></td><td data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Start a new career</span></td></tr><tr data-dcnode-id="1741"><td data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Saunter through life</span></td><td data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Live in a relaxed way</span></td></tr><tr data-dcnode-id="1736"><td data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Follow in someone’s footsteps</span></td><td data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Do something the way another person did it before</span></td></tr><tr data-dcnode-id="1731"><td data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">One step at a time</span></td><td data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Do something slowly and carefully</span></td></tr><tr data-dcnode-id="1726"><td data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Career path</span></td><td data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">The sequence of jobs someone takes that create their career</span></td></tr><tr data-dcnode-id="1721"><td data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Milestones</span></td><td data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Important events in a person’s life or career</span></td></tr><tr data-dcnode-id="1716"><td data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Dead end job</span></td><td data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">A job that offers no opportunity for advancement</span></td></tr><tr data-dcnode-id="1711"><td data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">To be at a crossroads</span></td><td data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">When someone is at a point in life where their decisions will have long term consequences</span></td></tr><tr data-dcnode-id="1706"><td data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">He’s on the straight and narrow</span></td><td data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">He’s living in a morally proper way</span></td></tr><tr data-dcnode-id="1701"><td data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">To walk someone through something</span></td><td data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">To show someone how to do something</span></td></tr><tr data-dcnode-id="1696"><td data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">We need to come up with a road map</span></td><td data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">We need to make a plan</span></td></tr><tr data-dcnode-id="1691"><td data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">I wouldn’t go down that road if I were you!</span></td><td data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">I wouldn’t do that if I were you!</span></td></tr><tr data-dcnode-id="1686"><td data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Don’t run before you can walk</span></td><td data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Don’t try to do something difficult before mastering the basics</span></td></tr><tr data-dcnode-id="1681"><td data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Inching forward</span></td><td data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">When progress on something is being made in small increments</span></td></tr><tr data-dcnode-id="1676"><td data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">To move at a snail’s pace</span></td><td data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">To move slowly</span></td></tr><tr data-dcnode-id="1671"><td data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">To get good mileage out of something</span></td><td data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">To get a lot of benefits from something</span></td></tr><tr data-dcnode-id="1666"><td data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">To have your whole life in front of you</span></td><td data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">To be young and have a lot of years to live</span></td></tr><tr data-dcnode-id="1661"><td data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">To get on with your life</span></td><td data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">To make progress in life goals after a difficulty</span></td></tr><tr data-dcnode-id="1656"><td data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">To tread carefully</span></td><td data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">To behave or speak carefully to avoid offending or causing problems with someone or something</span></td></tr><tr data-dcnode-id="1651"><td data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">To be a minefield</span></td><td data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">When something presents many possible dangers</span></td></tr><tr data-dcnode-id="1646"><td data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">We’ll cross that bridge when we come to it</span></td><td data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">To wait to worry about one problem at a time</span></td></tr><tr data-dcnode-id="1641"><td data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Information superhighway</span></td><td data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">The internet</span></td></tr><tr data-dcnode-id="1636"><td data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Time is money</span></td><td data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Time is a valuable resource</span></td></tr><tr data-dcnode-id="1631"><td data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">A tasty (or juicy) bit of gossip</span></td><td data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Very interesting or sensational gossip</span></td></tr><tr data-dcnode-id="1626"><td data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">To devour someone or something</span></td><td data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">To consume something very quickly</span></td></tr><tr data-dcnode-id="1621"><td data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">To add a pinch of salt to something</span></td><td data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">To acknowledge that someone exaggerates</span></td></tr><tr data-dcnode-id="1616"><td data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">To chew something over</span></td><td data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">To think about something before making a decision</span></td></tr><tr data-dcnode-id="1611"><td data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">To not swallow something</span></td><td data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">To not accept something as fact</span></td></tr><tr data-dcnode-id="1606"><td data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">To bite off more than you can chew</span></td><td data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">When someone makes a commitment that they cannot keep</span></td></tr><tr data-dcnode-id="1601"><td data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">To eat your wods</span></td><td data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">When someone has to admit they were wrong</span></td></tr><tr data-dcnode-id="1596"><td data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">A warm welcome</span></td><td data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">A friendly welcome</span></td></tr><tr data-dcnode-id="1591"><td data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">The cold shoulder</span></td><td data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">An unfriendly w td></tr><tr data-dcnode-id="1291"><td data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Point of view</span></td><td data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">An opinion on something</span></td></tr><tr data-dcnode-id="1286"><td data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Better perspective</span></td><td data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">A clearer view of something, a more thorough understanding of a situation</span></td></tr><tr data-dcnode-id="1281"><td data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Take someone’s side</span></td><td data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">To support one person’s side of an argument</span></td></tr><tr data-dcnode-id="1276"><td data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Where I stand</span></td><td data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Your opinion, point of view</span></td></tr><tr data-dcnode-id="1271"><td data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Look up to</span></td><td data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">To respect someone as a role model</span></td></tr><tr data-dcnode-id="1266"><td data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Moral high ground</span></td><td data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">The status of being respected, a position of being ‘more’ moral than others</span></td></tr><tr data-dcnode-id="1261"><td data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Sitting on the fence</span></td><td data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Undecided on a decision, avoid making a decision on something</span></td></tr></tbody></table><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">A typical ESL student is both fascinated and frustrated by idioms; they give you fluency but are very hard to use accurately because:</span></p><ul data-dcnode-id="1247"><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">They may change meaning if you forget or change a single word.</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1254" instrument_node="">You must use them in the right context – don’t say </span><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">‘he’s kicked the bucket’ </span></em><span data-dcnode-id="1251" instrument_node="">(died) at a funeral!</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">You can’t translate them into, or from, another language. There is no literal translation.</span></li></ul><p data-dcnode-id="1243"><noscript data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">&lt;img class="aligncenter wp-image-24322 size-full" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/raining-cats-and-dogs.jpg" alt="" width="700" height="394" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/raining-cats-and-dogs.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/raining-cats-and-dogs-300x169.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="" class="lazyload aligncenter wp-image-24322 size-full" data-dcnode-id="1244" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/raining-cats-and-dogs.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/raining-cats-and-dogs.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/raining-cats-and-dogs-300x169.jpg 300w" height="394" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20394%22%3E%3C/svg%3E" width="700"></p><h2 data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">7 Ways to&nbsp;Make English Idioms and Phrases Easier to Understand:</span></h2><h3 data-dcnode-id="1238"><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">1. Listen to context.</span></strong></h3><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Idioms are unusual expressions. So ask yourself ‘Why is that person using an unusual expression?’ The reasons are likely to be connected with emphasis, exaggeration, or a high state of emotion! So check the context – and the facial expression!</span></p><h3 data-dcnode-id="1233"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">2. Check to see if you understood.</span></strong></h3><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Use expressions like; ‘so you’re pretty angry about that right?’ or ‘OK, you mean that you’re too busy at the moment.’</span></p><h3 data-dcnode-id="1228"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">3. Be honest when you don’t understand.</span></strong></h3><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Try using; ‘I’m sorry, but I don’t know what you mean.’</span></p><h3 data-dcnode-id="1223"><strong data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">4. Never translate idioms.</span></strong></h3><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Idioms from your own language may use the same imagery or concepts (and it is always interesting to notice these similarities) but they are unlikely to translate word-for-word into English expressions.</span></p><h3 data-dcnode-id="1218"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">5. Listen to how native speakers use idioms.</span></strong></h3><p data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">A native English speaker NEVER says ‘</span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">it’s raining cats and dogs</span></strong><span data-dcnode-id="1214" instrument_node="">’ – so why should an ESL student? Listen to what native speakers actually say in a given situation, and copy.</span></p><h3 data-dcnode-id="1210"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">6. Take notes.</span></strong></h3><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Keep a notebook of your favorite expressions in English and add anything new that you hear. Try to use new expressions soon after you learn them, this is called ‘use it or lose it.’</span></p><h3 data-dcnode-id="1205"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">7. Tolerate your mistakes.</span></strong></h3><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">You will definitely make mistakes and create confusion when you use idiomatic expressions, so be brave and allow yourself the space to try, fail, and try again.</span></p><h2 data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Learn English Idiomatic Expressions without Memorizing</span></h2><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Most lists of common English idiomatic expressions I see have 2 things wrong with them. They include a lot of out-dated expressions that no one actually uses anymore (it’s raining cats and dogs), and they’re really hard to memorize.</span></p><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Rather than force you to memorize a list of expressions, we’re going to teach you some tricks that will make it easy to understand English expressions, even if you’ve never heard them before.</span></p><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Most idiomatic expressions can be divided into a few groups, and these groups have things in common that make them easier to understand. Below you’ll find these groups, with the English expressions in bold.</span></p><p data-dcnode-id="1191"><noscript data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">&lt;img class="size-full wp-image-24324 aligncenter" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/life_is_a_road.jpg" alt="" width="700" height="214" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/life_is_a_road.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/life_is_a_road-300x92.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="" class="lazyload size-full wp-image-24324 aligncenter" data-dcnode-id="1192" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/life_is_a_road.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/life_is_a_road.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/life_is_a_road-300x92.jpg 300w" height="214" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20214%22%3E%3C/svg%3E" width="700"></p><h2 data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">English&nbsp;Expressions About Life:</span></h2><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">“A journey of a thousand miles begins with a single step” – so said Lao Tzu, the founder of Chinese Taoism.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">When he said these wise words, he wasn’t just offering encouragement to people who had to walk long distances in Zhou Dynasty China during the 6</span><sup data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">th</span></sup><span data-dcnode-id="1183" instrument_node=""> BC, but was talking about every kind of journey in life.</span></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The quotation is generally taken to mean that any undertaking in life – even really big ones – must start with small steps, and that we must not become discouraged by the size of the tasks in front of us. The idea that our tasks, and indeed our lives, can be seen as physical journeys that can be broken down into steps is common in many languages; English is no exception.</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1179" instrument_node="">So we might </span><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">set out</span></strong><span data-dcnode-id="1176" instrument_node=""> on a new career, </span><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">saunter</span></strong><span data-dcnode-id="1173" instrument_node=""> through life without a care, </span><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">follow in someone’s footsteps</span></strong><span data-dcnode-id="1170" instrument_node=""> or take a difficult task </span><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">one step at a time</span></strong><span data-dcnode-id="1167" instrument_node="">.</span></p><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">And just as the physical hikes, strolls or walks that we go on require paths or roads, which can be straight or winding, and sometimes lead to dead ends – so it is with our projects, careers and lives.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1163" instrument_node="">This means that some of us want to follow a clear </span><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">career path</span></strong><span data-dcnode-id="1160" instrument_node="">, are proud of the </span><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">milestones</span></strong><span data-dcnode-id="1157" instrument_node=""> we achieve and don’t want to work in a </span><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">dead end job</span></strong><span data-dcnode-id="1154" instrument_node="">. When deciding on a course of action we might find ourselves at a </span><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">crossroads in life</span></strong><span data-dcnode-id="1151" instrument_node="">, wondering </span><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">which way to turn</span></strong><span data-dcnode-id="1148" instrument_node="">, hoping we don’t take </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">the road to ruin</span></strong><span data-dcnode-id="1145" instrument_node="">!</span></p><h3 data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Examples of idiomatic expressions about life:</span></h3><ul data-dcnode-id="1088"><li data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">He’s put his criminal past behind him – He’s on the </span><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">straight and narrow</span></strong><span data-dcnode-id="1138" instrument_node=""> now!</span></li><li data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">It’s a difficult system to get used to, so </span><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">let me just walk you through the first few steps</span></strong><span data-dcnode-id="1133" instrument_node="">.</span></li><li data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">We need to come up with a </span><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">road map</span></strong><span data-dcnode-id="1128" instrument_node=""> to go forward with these negotiations.</span></li><li data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">Being selected for the national team was the first major </span><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">milestone</span></strong><span data-dcnode-id="1123" instrument_node=""> in my career.</span></li><li data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">So you want to invest in his business? I wouldn’t </span><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">go down that road</span></strong><span data-dcnode-id="1118" instrument_node=""> if I were you!</span></li><li data-dcnode-id="1109"><span data-dcnode-id="1116" instrument_node="">I feel like I’m at a </span><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">crossroads in my career</span></strong><span data-dcnode-id="1113" instrument_node=""> and I’m not sure </span><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">which way to turn</span></strong><span data-dcnode-id="1110" instrument_node="">.</span></li><li data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">I have tried to </span><strong data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">follow in Dad’s footsteps</span></strong><span data-dcnode-id="1105" instrument_node=""> and to do the right things.</span></li><li data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node="">I suppose I’ve gone down quite a </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">winding career path</span></strong><span data-dcnode-id="1100" instrument_node=""> – I’ve never done things the easy way!</span></li><li data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">Holmes had </span><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">crossed paths</span></strong><span data-dcnode-id="1095" instrument_node=""> with Moriarty several times before and it had never gone well.</span></li><li data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">I know I said you should read a bit more, but War and Peace? </span><strong data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Don’t run before you can walk</span></strong><span data-dcnode-id="1090" instrument_node="">!</span></li></ul><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Please note that we use the imperial system, rather than the modern metric system, to refer to distances in idioms:</span></p><ul data-dcnode-id="1072"><li data-dcnode-id="1078"><span data-dcnode-id="1085" instrument_node="">We are just </span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">inching forward</span></strong><span data-dcnode-id="1082" instrument_node=""> with this project </span><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">at a snail’s pace</span></strong><span data-dcnode-id="1079" instrument_node="">.</span></li><li data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">I think I can get </span><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">good mileage</span></strong><span data-dcnode-id="1074" instrument_node=""> out of this idea.</span></li></ul><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Notice the way that prepositions are used to imply movement or direction in life:</span></p><ul data-dcnode-id="1059"><li data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">He envied his grandchildren having their whole </span><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">lives in front of them</span></strong><span data-dcnode-id="1066" instrument_node="">.</span></li><li data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">I always try and put failures behind me and </span><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">get on with my life</span></strong><span data-dcnode-id="1061" instrument_node="">.</span></li></ul><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Also, if we are traveling along a road or pathway, we might expect to find obstacles to our progress and have to handle&nbsp;them in some way:</span></p><ul data-dcnode-id="1043"><li data-dcnode-id="1049"><span data-dcnode-id="1056" instrument_node="">We need to </span><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">tread carefully</span></strong><span data-dcnode-id="1053" instrument_node=""> here because ethnic tensions in the area can be </span><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">a minefield</span></strong><span data-dcnode-id="1050" instrument_node="">.</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">I don’t know yet what we’ll do if they reject our offer – but </span><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">we’ll cross that bridge when we come to it</span></strong><span data-dcnode-id="1045" instrument_node="">.</span></li></ul><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">And please note that idioms involving roads can refer to other things:</span></p><ul data-dcnode-id="1035"><li data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">The </span><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">information superhighway</span></strong><span data-dcnode-id="1037" instrument_node=""> has changed the way we think about the world.</span></li></ul><h2 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">English&nbsp;Expressions About Money:</span></h2><p data-dcnode-id="1025"><span data-dcnode-id="1032" instrument_node="">When Benjamin Franklyn wrote that ‘</span><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">time is money</span></strong><span data-dcnode-id="1029" instrument_node="">’ in his </span><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Advice to a Young Tradesman</span></em><span data-dcnode-id="1026" instrument_node=""> in 1746, he meant that time was a commodity which can be treated the same way that we treat money or any other resource. He was right too, from a linguistic perspective anyway, as we have long had this attitude towards time within the English language.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Like money, time is something that we save, waste or spend. We praise good time management, we complain that we don’t have enough time, and we wonder how long our time will last. Let’s&nbsp;look at the way the English language treats the concepts of time and money.</span></p><h3 data-dcnode-id="1019"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Examples</span></strong><span data-dcnode-id="1020" instrument_node="">&nbsp;of English Expressions About Money:</span></h3><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Look at these sentences and decide if you can substitute the word ‘time’ for the word ‘money’ (you may have to make a few extra changes):</span></p><ul data-dcnode-id="966"><li data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">We will have to go soon – we are getting short of </span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">money</span></strong><span data-dcnode-id="1013" instrument_node="">.</span></li><li data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">I have wasted a lot of </span><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">time</span></strong><span data-dcnode-id="1008" instrument_node=""> on this project.</span></li><li data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">We made some changes at work to save </span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">money</span></strong><span data-dcnode-id="1003" instrument_node="">.</span></li><li data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">He is determined to make it work – he’s invested so much </span><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">time</span></strong><span data-dcnode-id="998" instrument_node=""> in the business already.</span></li><li data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">He worked my shift at work for me – so I guess I owe him some </span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">time</span></strong><span data-dcnode-id="993" instrument_node=""> in return.</span></li><li data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">I would like to devote more </span><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">time</span></strong><span data-dcnode-id="988" instrument_node=""> to keeping the garden in shape.</span></li><li data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">This problem has cost us too much </span><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">money</span></strong><span data-dcnode-id="983" instrument_node=""> already!</span></li><li data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">We are living on borrowed </span><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">time</span></strong><span data-dcnode-id="978" instrument_node="">.</span></li><li data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">I thought I gave him enough </span><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">money</span></strong><span data-dcnode-id="973" instrument_node=""> – but he seems to have squandered it all!</span></li><li data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">She’s always had better </span><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">money</span></strong><span data-dcnode-id="968" instrument_node="">-management skills than me.</span></li></ul><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">In most of the sentences above you can substitute ‘time’ for ‘money’ without a problem. The context may change, but the sentences themselves still look fine.</span></p><p data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">Please note that we can replace the actual word ‘time’ with an </span><em data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">amount</span></em><span data-dcnode-id="960" instrument_node=""> of time – and we can do this with ‘money’ too:</span></p><ul data-dcnode-id="938"><li data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">We </span><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">spent</span></strong><span data-dcnode-id="955" instrument_node=""> three weeks there.</span></li><li data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">I </span><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">spent</span></strong><span data-dcnode-id="950" instrument_node=""> $50 on it.</span></li><li data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">It </span><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">takes</span></strong><span data-dcnode-id="945" instrument_node=""> half an hour to get there.</span></li><li data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">It </span><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">took</span></strong><span data-dcnode-id="940" instrument_node=""> $100 to convince him!</span></li></ul><h2 data-dcnode-id="934"><noscript data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">&lt;img class="aligncenter size-full wp-image-24327" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-expressions-food.jpg" alt="" width="700" height="352" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-expressions-food.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-expressions-food-300x151.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="" class="lazyload aligncenter size-full wp-image-24327" data-dcnode-id="935" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-expressions-food.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-expressions-food.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/english-expressions-food-300x151.jpg 300w" height="352" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20352%22%3E%3C/svg%3E" width="700"></h2><h2 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">English Expressions About Knowledge:</span></h2><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">What is the basic unit of knowledge – a fact, a truth, a maxim or a law? Well, from a computing point of view it is called a ‘byte’. In 1956 Werner Buchholz, a computer scientist working at IBM, wanted a term he could use to describe the eight binary digits (bits) needed to encode a single letter, number or symbol on a computer.</span></p><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">He chose the word ‘byte’ – a deliberate misspelling of the word ‘bite’ – and this term now refers to the basic unit of all the information held on all computers, everywhere. When he chose this word, Buchholz was (perhaps unknowingly) using a very common, basic and important idiom in the English language; knowledge (or information) is food.</span></p><p data-dcnode-id="924"><span data-dcnode-id="927" instrument_node="">If you think about it, this idiom is quite easy to understand; </span><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">information exists in the outside world and must somehow comes inside us so that we can learn and understand it. </span></strong></p><p data-dcnode-id="904"><span data-dcnode-id="923" instrument_node="">This process of bringing information into ourselves can be thought of as eating. So we might hear a </span><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">tasty bit of gossip</span></strong><span data-dcnode-id="920" instrument_node=""> or </span><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">devour a newspaper</span></strong><span data-dcnode-id="917" instrument_node="">, we may need to </span><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">add a pinch of salt to unlikely stories</span></strong><span data-dcnode-id="914" instrument_node="">, </span><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">chew over</span></strong><span data-dcnode-id="911" instrument_node=""> a difficult subject, or </span><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">digest information</span></strong><span data-dcnode-id="908" instrument_node=""> – we may even need to </span><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">spit information out</span></strong><span data-dcnode-id="905" instrument_node=""> if required!</span></p><h2 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Examples of English Expressions about Knowledge:</span></h2><ul data-dcnode-id="852"><li data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">He absolutely </span><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">devours newspapers</span></strong><span data-dcnode-id="898" instrument_node=""> – he gets about three every morning!</span></li><li data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">You have a </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">great appetite for knowledge</span></strong><span data-dcnode-id="893" instrument_node="">, and I respect that.</span></li><li data-dcnode-id="887"><span data-dcnode-id="891" instrument_node="">I won’t give you an answer yet – Let me </span><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">chew it over</span></strong><span data-dcnode-id="888" instrument_node=""> for a while.</span></li><li data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Who broke the school window? Come on lad – </span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">spit it out</span></strong><span data-dcnode-id="883" instrument_node="">!</span></li><li data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">I got my dad a subscription to </span><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">The Reader’s Digest</span></strong><span data-dcnode-id="878" instrument_node="">.</span></li><li data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">She always exaggerates so if I were you I’d take what she says with a </span><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">pinch of salt</span></strong><span data-dcnode-id="873" instrument_node="">.</span></li><li data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">Don’t give them too much information at the start of the course – just </span><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">bite-sized chunks</span></strong><span data-dcnode-id="868" instrument_node=""> for now.</span></li><li data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">We sat with a bottle by the river </span><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">ruminating on</span></strong><span data-dcnode-id="863" instrument_node=""> the meaning of life.</span></li><li data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">The exam system is terrible – you just have to </span><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">regurgitate</span></strong><span data-dcnode-id="858" instrument_node=""> the textbook, basically.</span></li><li data-dcnode-id="853"><span data-dcnode-id="856" instrument_node="">Information is food? – </span><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">I’m not swallowing that!</span></strong></li></ul><p data-dcnode-id="844"><span data-dcnode-id="851" instrument_node="">Please note that idiomatic expressions involving food or eating can express other meanings in English, for example if you </span><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">bite off more than you can chew</span></strong><span data-dcnode-id="848" instrument_node="">, you try to do too much or more than you are able to do; or if you </span><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">eat your own words</span></strong><span data-dcnode-id="845" instrument_node="">, you retract what you said earlier:</span></p><ul data-dcnode-id="834"><li data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">He </span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">bit off more than he could chew</span></strong><span data-dcnode-id="840" instrument_node=""> when he agreed to paint the house by himself.</span></li><li data-dcnode-id="835"><span data-dcnode-id="838" instrument_node="">He’s going to regret saying that – I’m going to make him </span><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">eat his own words!</span></strong></li></ul><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Don’t try making a literal translation of those! And choices, for example, have taste:</span></p><ul data-dcnode-id="821"><li data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">I can offer you a couple of </span><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">tasty options</span></strong><span data-dcnode-id="828" instrument_node=""> from our new winter collection.</span></li><li data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">The delegates are being forced to choose between two </span><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">unpalatable</span></strong><span data-dcnode-id="823" instrument_node=""> candidates.</span></li></ul><h2 data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">English Expressions About Relationships:</span></h2><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Here is a party game that I used to play with friends and family when I was young (a long time ago!) It involves somebody hiding something, and somebody else searching for it.</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Firstly, I would close my eyes or leave the room. Then someone would hide something, some keys perhaps, in some part of the room. After this I would be allowed to look for them and the rest of the players could offer encouragement by saying; ‘You’re getting warmer,’ when I approached the hidden object, or; ‘You’re getting colder,’ when I went in the wrong direction.</span></p><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">When I got really close to the hidden keys, some of the younger children would be shouting ‘You’re really hot now – boiling!’ And finally I would find the keys under a magazine on the coffee table!</span></p><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">The idea that you get warmer when you are closer to something is quite common in English and is particularly strong when applied to our relationships with each other. Heat is a metaphor for how close we feel to someone else, and how well we think they are treating us.</span></p><p data-dcnode-id="801"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Close relationships are ‘warm’</span></strong><span data-dcnode-id="808" instrument_node="">, and unfriendly relationships are ‘cold’. This means that if I say that the receptionist at the hotel </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">greeted me very warmly</span></strong><span data-dcnode-id="805" instrument_node="">, you can be sure that she was very friendly and welcoming. Equally, if I tell you that the audience gave me </span><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">a frosty reception</span></strong><span data-dcnode-id="802" instrument_node="">, you will know that my lecture was not a great success!</span></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">So we can say that our relationships and feelings have some sort of ‘linguistic temperature!’</span></p><h3 data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Examples of English Idioms about relationships:</span></h3><ul data-dcnode-id="746"><li data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">Hello – and a very </span><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">warm welcome</span></strong><span data-dcnode-id="793" instrument_node=""> to the show!</span></li><li data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">I tried to explain to her but she just gave me the </span><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">cold shoulder</span></strong><span data-dcnode-id="788" instrument_node="">.</span></li><li data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">Perhaps you should </span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">cool things off</span></strong><span data-dcnode-id="783" instrument_node=""> with him for a while.</span></li><li data-dcnode-id="777"><span data-dcnode-id="781" instrument_node="">I think things are </span><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">heating&nbsp;up</span></strong><span data-dcnode-id="778" instrument_node=""> between Dave and Mary!</span></li><li data-dcnode-id="772"><span data-dcnode-id="776" instrument_node="">She was a very </span><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">cold-hearted</span></strong><span data-dcnode-id="773" instrument_node=""> mother who never gave us hugs or praise.</span></li><li data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">We have set up a 24-hour </span><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">hotline</span></strong><span data-dcnode-id="768" instrument_node=""> for anyone who wants more information.</span></li><li data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">Well, that was a very </span><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">frosty reception</span></strong><span data-dcnode-id="763" instrument_node=""> – I don’t think we’re very welcome here!</span></li><li data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">The </span><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">cold war</span></strong><span data-dcnode-id="758" instrument_node=""> was a low point in East-West relations in Europe.</span></li><li data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">She liked him immediately; it was the </span><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">warm smile and the warm handshake</span></strong><span data-dcnode-id="753" instrument_node="">.</span></li><li data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">I can’t stand these </span><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">cold callers</span></strong><span data-dcnode-id="748" instrument_node=""> trying to sell me things I don’t want!</span></li></ul><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Notice that heat can also describe our relationship to ideas:</span></p><ul data-dcnode-id="735"><li data-dcnode-id="736"><span data-dcnode-id="743" instrument_node="">We </span><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">took the temperature</span></strong><span data-dcnode-id="740" instrument_node=""> of the group as to whether John would be a suitable replacement for Mark and found that most people were </span><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">quite warm</span></strong><span data-dcnode-id="737" instrument_node=""> to the idea.</span></li></ul><h2 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">English Expressions About Economics</span></h2><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">In Hal Ashby’s excellent 1979 comedy ‘Being There’, Peter Sellers plays the part of a simple-minded gardener who accidentally becomes a top financial adviser in Washington DC.</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">One of the running jokes in the film is the way that Sellers’ character misunderstands questions about the economy to be questions about his garden – and how businessmen and television presenters mistake his answers and comments about gardening to be sound financial advice!</span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">How can this be? Well, in the English language there are many words and expressions that we use in agriculture and gardening that can also be used to describe the world of economics and business. After all, if a gardener and an economist meet at a party, we can be sure they’ll agree with each other that encouraging growth is a good idea!</span></p><h3 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Examples of English Expressions About Economics:</span></h3><ul data-dcnode-id="674"><li data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">If you work hard now, you’ll </span><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">reap the rewards</span></strong><span data-dcnode-id="721" instrument_node=""> later.</span></li><li data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">We needed to </span><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">prune out</span></strong><span data-dcnode-id="716" instrument_node=""> the deadwood to make the company more competitive.</span></li><li data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">The first stage of the interview process is really just to </span><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">separate the wheat from the chaff</span></strong><span data-dcnode-id="711" instrument_node=""> – to discount the applicants who are definitely unsuitable.</span></li><li data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">Our main business is </span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">rooted</span></strong><span data-dcnode-id="706" instrument_node=""> in this sector.</span></li><li data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">There have been sharp staff </span><strong data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">cutbacks</span></strong><span data-dcnode-id="701" instrument_node=""> since they lost the contract.</span></li><li data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">We will have to </span><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">dig deep</span></strong><span data-dcnode-id="696" instrument_node=""> if we want this project to succeed.</span></li><li data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">There has been </span><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">great growth</span></strong><span data-dcnode-id="691" instrument_node=""> over the second quarter.</span></li><li data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">The company was in a terrible state – we needed to make </span><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">root and branch</span></strong><span data-dcnode-id="686" instrument_node=""> reform.</span></li><li data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">We have invested a lot of </span><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">seed money</span></strong><span data-dcnode-id="681" instrument_node=""> in this project.</span></li><li data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">After the recession we can now see the first </span><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">bright shoots</span></strong><span data-dcnode-id="676" instrument_node=""> of recovery, with several new businesses opening around town.</span></li></ul><p data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">Please note that many of the above phrases can be used in other contexts; for example, ‘</span><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">dig deep</span></strong><span data-dcnode-id="670" instrument_node="">’ simply means ‘try harder’ and can be used in any situation where more effort is required;</span></p><ul data-dcnode-id="663"><li data-dcnode-id="664"><span data-dcnode-id="668" instrument_node="">Liverpool are going to have to </span><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">dig deep</span></strong><span data-dcnode-id="665" instrument_node=""> here if they are going to win this match.</span></li></ul><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Also, some agricultural idioms can be used in non-business contexts:</span></p><ul data-dcnode-id="655"><li data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">The entire university should act as one on this issue, rather than each department trying to </span><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">plough its own furrow</span></strong><span data-dcnode-id="657" instrument_node="">.</span></li></ul><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">And some gardening idioms don’t seem to transfer to other contexts:</span></p><ul data-dcnode-id="647"><li data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">I’ve killed every plant I’ve ever owned. But she has got really </span><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">green fingers</span></strong><span data-dcnode-id="649" instrument_node="">, you should see her garden – it’s beautiful!</span></li></ul><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Ok, that should really help you with business English.</span></p><h2 data-dcnode-id="641"><noscript data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">&lt;img class="aligncenter size-full wp-image-24330" src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/information-is-water.jpg" alt="" width="700" height="332" srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/information-is-water.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/information-is-water-300x142.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="" class="lazyload aligncenter size-full wp-image-24330" data-dcnode-id="642" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/information-is-water.jpg" data-srcset="https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/information-is-water.jpg 700w, https://d2zon88i61wtiz.cloudfront.net/wp-content/uploads/2017/07/information-is-water-300x142.jpg 300w" height="332" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20332%22%3E%3C/svg%3E" width="700"></h2><h2 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">English Expressions About Opinions</span></h2><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">‘The wise man builds his house on the rock,’ – so goes the traditional saying (it’s loosely based on Matthew 7:24-27 in the Bible), but while it is certainly wise to build a house on solid ground, and with the proper materials, this saying is generally taken to be about the foundations of our beliefs.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">In fact there has always been a close link between buildings and beliefs; for example, the word ‘church’ originally referred to a group of people who worshipped together (now more commonly called a ‘congregation’), the teachings and philosophy they followed, and the physical building that they used.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Keeping this mind (and checking your dictionary for details) it won’t be surprising for you to find that the word ‘edifice’ refers to an important or imposing building (like a church), ‘edification’ means ‘moral improvement’ and ‘edified’ means ‘educated’ or ‘informed’.</span></p><p data-dcnode-id="619"><span data-dcnode-id="632" instrument_node="">This idiom now has a wider use in the English language so that an idiomatic phrase mentioning construction or foundation can refer to knowledge and ideas generally. So ideas and theories should be </span><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">grounded in fact or based on truth</span></strong><span data-dcnode-id="629" instrument_node="">, an argument should have a </span><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">clear structure</span></strong><span data-dcnode-id="626" instrument_node="">; we can </span><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">deconstruct a complex idea</span></strong><span data-dcnode-id="623" instrument_node=""> in order to explain it, or even </span><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">demolish ideas</span></strong><span data-dcnode-id="620" instrument_node=""> which we strongly disagree with.</span></p><h3 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">English Expressions About Knowledge:</span></h3><ul data-dcnode-id="571"><li data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">With so much supporting evidence, the police can </span><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">build a good case</span></strong><span data-dcnode-id="613" instrument_node=""> for conviction.</span></li><li data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">He is such an unreliable witness – his entire testimony was </span><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">a fabrication</span></strong><span data-dcnode-id="608" instrument_node=""> of lies and half-truths.</span></li><li data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">I feel like I am on pretty </span><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">solid ground</span></strong><span data-dcnode-id="603" instrument_node=""> when I’m talking about my thesis.</span></li><li data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">Our products are strong on reliability and we can </span><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">build on this foundation</span></strong><span data-dcnode-id="598" instrument_node=""> in the future.</span></li><li data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">His essay was terrible – there was </span><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">no structure to the argument</span></strong><span data-dcnode-id="593" instrument_node="">.</span></li><li data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">His reputation has been </span><strong data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">completely shattered</span></strong><span data-dcnode-id="588" instrument_node=""> by these baseless accusations.</span></li><li data-dcnode-id="582"><span data-dcnode-id="586" instrument_node="">If she is taking bribes, it completely </span><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">undermines her position</span></strong><span data-dcnode-id="583" instrument_node=""> on corruption.</span></li><li data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">She won the debate easily – she just </span><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">demolished their arguments</span></strong><span data-dcnode-id="578" instrument_node="">!</span></li><li data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">I welcome any </span><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">constructive criticisms</span></strong><span data-dcnode-id="573" instrument_node=""> of my work.</span></li></ul><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">‘Ground’ is the most commonly used word in this context:</span></p><ul data-dcnode-id="553"><li data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">Being rude to customers is </span><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">grounds for dismissal</span></strong><span data-dcnode-id="565" instrument_node="">.</span></li><li data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">These allegations are </span><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">completely groundless</span></strong><span data-dcnode-id="560" instrument_node=""> and are just intended to disrupt our preparations for the Games.</span></li><li data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">Is any of this </span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">grounded in fact</span></strong><span data-dcnode-id="555" instrument_node="">?</span></li></ul><h2 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">English Expressions About Truth:</span></h2><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">In Steven Spielberg’s excellent 1981 film Raiders of the Lost Ark, Indiana Jones must find the Ark of the Covenant.</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">This was a kind of box which was supposed to contain the 10 commandments that were given to Moses. There’s something symbolic in this – if you consider that the commandments represent some kind of universal truth or wisdom, then perhaps you can see the search for the covenant as a search for truth.</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">I used to work as an archaeologist and watching this excellent movie was more or less compulsory for us ‘diggers’ at the time – we used to joke that Indy was searching for truth itself and that an archaeologist was the ideal person to choose for a search for truth and wisdom!</span></p><p data-dcnode-id="537"><span data-dcnode-id="544" instrument_node="">But you don’t need to </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">get your hands dirty</span></strong><span data-dcnode-id="541" instrument_node=""> to </span><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">unearth</span></strong><span data-dcnode-id="538" instrument_node=""> interesting information, because in the English language, any kind of discovery can be made under the ground.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">It often seems that an investigation is an excavation: information may be hidden from us, perhaps buried deep somewhere; it needs to be dug around for, and finally brought to light.</span></p><h3 data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">English Expressions About Truth:</span></h3><ul data-dcnode-id="482"><li data-dcnode-id="528"><span data-dcnode-id="532" instrument_node="">I want you to </span><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">dig deep</span></strong><span data-dcnode-id="529" instrument_node=""> into your memories and think about your first day at school.</span></li><li data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">The Police have reopened the case after new evidence </span><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">came to light</span></strong><span data-dcnode-id="524" instrument_node="">.</span></li><li data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">I’ve been working in the archives for the last few months and have </span><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">unearthed</span></strong><span data-dcnode-id="519" instrument_node=""> some interesting stories about him.</span></li><li data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">Ask Mary – she’s </span><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">a mine</span></strong><span data-dcnode-id="514" instrument_node=""> of information on the subject!</span></li><li data-dcnode-id="508"><span data-dcnode-id="512" instrument_node="">They have started an investigation and hope to </span><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">get to the bottom</span></strong><span data-dcnode-id="509" instrument_node=""> of the problem soon.</span></li><li data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">I don’t want the newspapers </span><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">digging</span></strong><span data-dcnode-id="504" instrument_node=""> into my private life.</span></li><li data-dcnode-id="498"><span data-dcnode-id="502" instrument_node="">She had tried to </span><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">bury</span></strong><span data-dcnode-id="499" instrument_node=""> the memory of it for years.</span></li><li data-dcnode-id="493"><span data-dcnode-id="497" instrument_node="">New developments in the scandal </span><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">emerged</span></strong><span data-dcnode-id="494" instrument_node=""> over the weekend.</span></li><li data-dcnode-id="488"><span data-dcnode-id="492" instrument_node="">I think we need to get things </span><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">out in the open</span></strong><span data-dcnode-id="489" instrument_node=""> and talk about them honestly.</span></li><li data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">The city is home to a vibrant </span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">underground</span></strong><span data-dcnode-id="484" instrument_node=""> music scene.</span></li></ul><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">When a meaning is obvious and easy to understand we use a reversal of the idiom:</span></p><ul data-dcnode-id="469"><li data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">We need new financial </span><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">transparency</span></strong><span data-dcnode-id="476" instrument_node=""> regulations.</span></li><li data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">I understand you – your message is </span><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">crystal clear</span></strong><span data-dcnode-id="471" instrument_node="">.</span></li></ul><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Interestingly, if we have an exam to prepare for or a bill to
