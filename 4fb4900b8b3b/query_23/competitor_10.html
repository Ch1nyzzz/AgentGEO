		This article was co-authored by </span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/wikiHow%3AContent-Management"><span data-dcnode-id="2632" instrument_node="">wikiHow Staff</span></a><span data-dcnode-id="2630" instrument_node="">. Our trained team of editors and researchers validate articles for accuracy and comprehensiveness. wikiHow's </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/wikiHow%3AContent-Management"><span data-dcnode-id="2629" instrument_node="">Content Management Team</span></a><span data-dcnode-id="2627" instrument_node=""> carefully monitors the work from our editorial staff to ensure that each article is backed by trusted research and meets our high quality standards.

			</span><br data-dcnode-id="2623"><br data-dcnode-id="2622"><a class="sp_learn_more_link" data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/wikiHow%3ADelivering-a-Trustworthy-Experience"><span data-dcnode-id="2621" instrument_node="">Learn more...</span></a><span data-dcnode-id="2619" instrument_node="">
</span></p><span data-dcnode-id="2617" instrument_node="">

</span><div class="mf-section-0" data-dcnode-id="2605" id="mf-section-0"><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2611" instrument_node="">A phrasal verb is a combination of a verb and preposition that has a different meaning than the words individually. For example, “going out” has a different meaning than “going” and “out” do by themselves. Because of this, teaching phrasal verbs can be tricky for </span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Teach-Grammar" title="Teach Grammar"><span data-dcnode-id="2610" instrument_node="">grammar or English teachers</span></a><span data-dcnode-id="2608" instrument_node="">, especially those with ESL students. Start by introducing phrasal verbs slowly. Define their construction and give examples of phrasal verbs for your students to memorize. Then teach the students how to use context clues to pick out phrasal verbs for themselves. Test the class with a variety of activities to see how well they’re learning the concept.
</span></p><span data-dcnode-id="2606" instrument_node="">

</span><img alt="Image titled Teach Phrasal Verbs Step 1" class="whcdn content-fill img-loading-alt" data-dcnode-id="2544" data-height="345" data-src="https://www.wikihow.com/images/thumb/4/47/Teach-Phrasal-Verbs-Step-1.jpg/v4-460px-Teach-Phrasal-Verbs-Step-1.jpg" data-srclarge="/images/thumb/4/47/Teach-Phrasal-Verbs-Step-1.jpg/aid11485772-v4-728px-Teach-Phrasal-Verbs-Step-1.jpg" data-width="460" decoding="async" id="20a843deec500c4f6044b029aeb32d82" loading="lazy" onload="WH.performance.clearMarks('image1_rendered'); WH.performance.mark('image1_rendered');" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/4/47/Teach-Phrasal-Verbs-Step-1.jpg/aid11485772-v4-728px-Teach-Phrasal-Verbs-Step-1.jpg.webp&amp;raw"><span data-dcnode-id="2541" instrument_node="">

</span><div class="step_num" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">1</span></div><div class="step" data-dcnode-id="2475"><span data-dcnode-id="2525" instrument_node="">
</span><b class="whb" data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Teach the construction of a phrasal verb.</span></b><span data-dcnode-id="2522" instrument_node=""> Start with the basic definition and construction of phrasal verbs so your students can get a baseline. A phrasal verb is a combination of 2 words, usually a verb and a preposition, that create a phrase with a different meaning. The entire phrase acts as the verb in the sentence.</span><sup aria-label="Link to Reference 1" class="reference" data-dcnode-id="2506" id="_ref-1"><a data-dcnode-id="2520" href="#_note-1"><span data-dcnode-id="2521" instrument_node="">[1]</span></a><span class="ts_popup" data-dcnode-id="2508" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="2519" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">X</span></span><span data-dcnode-id="2516" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Research source</span></span><span data-dcnode-id="2513" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2512"></span><span data-dcnode-id="2511" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2510" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2509" instrument_node="">
</span></span><span data-dcnode-id="2507" instrument_node="">
</span></sup><span data-dcnode-id="2505" instrument_node="">
</span><ul data-dcnode-id="2480"><span data-dcnode-id="2504" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2503" instrument_node="">Remember that a verb is an action word like "ran" or "look." A preposition is a word that establishes a relationship between two parts of a sentence. For instance, in "She arrived after dinner," the preposition is "after." Review this concept with your students if you haven’t already.</span><sup aria-label="Link to Reference 2" class="reference" data-dcnode-id="2487" id="_ref-2"><a data-dcnode-id="2501" href="#_note-2"><span data-dcnode-id="2502" instrument_node="">[2]</span></a><span class="ts_popup" data-dcnode-id="2489" hidden="" id="ts_popup_2" style="display: none;"><span data-dcnode-id="2500" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">X</span></span><span data-dcnode-id="2497" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Research source</span></span><span data-dcnode-id="2494" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2493"></span><span data-dcnode-id="2492" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2491" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2490" instrument_node="">
</span></span><span data-dcnode-id="2488" instrument_node="">
</span></sup><span data-dcnode-id="2486" instrument_node="">
</span></li><span data-dcnode-id="2484" instrument_node="">
</span><li data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Most often, a phrasal verb is a combination of a verb and a preposition. For example, in the sentence "I gave up when the game got too hard," the phrasal verb is "gave up." Teach your students to recognize these combinations.</span></li><span data-dcnode-id="2481" instrument_node="">
</span></ul><span data-dcnode-id="2479" instrument_node="">
</span><span data-dcnode-id="2476" instrument_node="">
</span></div><span data-dcnode-id="2474" instrument_node="">
</span><div class="clearall" data-dcnode-id="2473"></div><span data-dcnode-id="2472" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="2471" data-isstep="1"></div><span data-dcnode-id="2470" instrument_node="">
</span></li><span data-dcnode-id="2468" instrument_node="">
</span><li data-dcnode-id="2400" id="step-id-01"><span data-dcnode-id="2467" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2466" name="step_1_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2446" style="max-width:728px"><a class="image" data-dcnode-id="2447" href="#/Image:Teach-Phrasal-Verbs-Step-2.jpg"><div class="content-spacer" data-dcnode-id="2455" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2461"><div class="loader" data-dcnode-id="2462"><div class="loader-dot" data-dcnode-id="2465"></div><div class="loader-dot" data-dcnode-id="2464"></div><div class="loader-dot" data-dcnode-id="2463"></div></div></div><span data-dcnode-id="2460" instrument_node="">
</span><img alt="Image titled Teach Phrasal Verbs Step 2" class="whcdn content-fill img-loading-alt" data-dcnode-id="2459" data-height="345" data-src="https://www.wikihow.com/images/thumb/c/c8/Teach-Phrasal-Verbs-Step-2.jpg/v4-460px-Teach-Phrasal-Verbs-Step-2.jpg" data-srclarge="/images/thumb/c/c8/Teach-Phrasal-Verbs-Step-2.jpg/aid11485772-v4-728px-Teach-Phrasal-Verbs-Step-2.jpg" data-width="460" decoding="async" id="1ed0968d110be2df0957e0dfe9a819d8" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/c/c8/Teach-Phrasal-Verbs-Step-2.jpg/aid11485772-v4-728px-Teach-Phrasal-Verbs-Step-2.jpg.webp&amp;raw"><span data-dcnode-id="2456" instrument_node="">
</span></div><span data-dcnode-id="2454" instrument_node="">
</span><noscript data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">&lt;img alt="Image titled Teach Phrasal Verbs Step 2" src="https://www.wikihow.com/images/thumb/c/c8/Teach-Phrasal-Verbs-Step-2.jpg/v4-460px-Teach-Phrasal-Verbs-Step-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/c/c8/Teach-Phrasal-Verbs-Step-2.jpg/aid11485772-v4-728px-Teach-Phrasal-Verbs-Step-2.jpg" data-width="460" data-height="345" id="1ed0968d110be2df0957e0dfe9a819d8"&gt;</span></noscript><span data-dcnode-id="2451" instrument_node="">
</span><div class="image_details" data-dcnode-id="2448" style="display:none;"><span data-dcnode-id="2449" style="display:none;"><span data-dcnode-id="2450" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/c\/c8\/Teach-Phrasal-Verbs-Step-2.jpg\/v4-460px-Teach-Phrasal-Verbs-Step-2.jpg","bigUrl":"\/images\/thumb\/c\/c8\/Teach-Phrasal-Verbs-Step-2.jpg\/aid11485772-v4-728px-Teach-Phrasal-Verbs-Step-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;\u00a9 2022 wikiHow, Inc. All rights reserved. wikiHow, Inc. is the copyright holder of this image under U.S. and international copyright laws. This image is &lt;b&gt;not&lt;\/b&gt; licensed under the Creative Commons license applied to text content and some other images posted to the wikiHow website. This image may not be used by other entities without the express written consent of wikiHow, Inc.&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2445" instrument_node="">
</span><div class="step_num" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">2</span></div><div class="step" data-dcnode-id="2412"><span data-dcnode-id="2442" instrument_node="">
</span><b class="whb" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Identify when a verb and preposition combination is not a phrasal verb.</span></b><span data-dcnode-id="2439" instrument_node=""> Not all verb and preposition combinations are phrasal verbs. For a phrase to be a phrasal verb, it must have an entirely new meaning from the 2 words separately. Have your students test word combinations to see if they are phrasal verbs. If the phrase has a different meaning than the 2 words individually, then it is a phrasal verb.</span><sup aria-label="Link to Reference 3" class="reference" data-dcnode-id="2423" id="_ref-3"><a data-dcnode-id="2437" href="#_note-3"><span data-dcnode-id="2438" instrument_node="">[3]</span></a><span class="ts_popup" data-dcnode-id="2425" hidden="" id="ts_popup_3" style="display: none;"><span data-dcnode-id="2436" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">X</span></span><span data-dcnode-id="2433" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Research source</span></span><span data-dcnode-id="2430" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2429"></span><span data-dcnode-id="2428" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2427" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2426" instrument_node="">
</span></span><span data-dcnode-id="2424" instrument_node="">
</span></sup><span data-dcnode-id="2422" instrument_node="">
</span><ul data-dcnode-id="2414"><span data-dcnode-id="2421" instrument_node="">
</span><li data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">For example, in "I went out of the room," "went out" is just a verb and preposition that literally means that you exited the room.</span></li><span data-dcnode-id="2418" instrument_node="">
</span><li data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">However, in "I went out with him," "went out" means that you went on a date. This is a phrasal verb because "went out" doesn’t literally mean you exited a place.</span></li><span data-dcnode-id="2415" instrument_node="">
</span></ul><span data-dcnode-id="2413" instrument_node="">
</span></div><span data-dcnode-id="2411" instrument_node="">
</span><div class="clearall" data-dcnode-id="2410"></div><span data-dcnode-id="2409" instrument_node="">
</span><span data-dcnode-id="2408" instrument_node="">
</span><div class="al_method" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Advertisement</span></div><span data-dcnode-id="2403" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="2402" data-isstep="1"></div><span data-dcnode-id="2401" instrument_node="">
</span></li><span data-dcnode-id="2399" instrument_node="">
</span><li data-dcnode-id="2337" id="step-id-02"><span data-dcnode-id="2398" instrument_node="">

</span><div class="step_num" data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">3</span></div><div class="step" data-dcnode-id="2343"><span data-dcnode-id="2373" instrument_node="">
</span><b class="whb" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Explain the difference between separable and inseparable phrasal verbs.</span></b><span data-dcnode-id="2370" instrument_node=""> Some phrasal verbs can have a direct object in between their verb and prepositions. This means they are separable. Inseparable phrasal verbs must stay together or they won’t make sense. The only way to tell if on is separable or inseparable is by trying the sentence both ways and seeing if they both make sense.</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="2354" id="_ref-4"><a data-dcnode-id="2368" href="#_note-4"><span data-dcnode-id="2369" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="2356" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="2367" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">X</span></span><span data-dcnode-id="2364" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Research source</span></span><span data-dcnode-id="2361" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2360"></span><span data-dcnode-id="2359" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2358" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2357" instrument_node="">
</span></span><span data-dcnode-id="2355" instrument_node="">
</span></sup><span data-dcnode-id="2353" instrument_node="">
</span><ul data-dcnode-id="2345"><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">For example, "I called John out for being rude" and "I called out John for being rude" both work grammatically. This means that the phrasal verb "called out" is separable.</span></li><span data-dcnode-id="2349" instrument_node="">
</span><li data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">However, "I went through my closet" works, while "I went my closet through" does not. This means that the phrasal verb "went through" is inseparable, because sentences don’t make sense with the phrase broken up.</span></li><span data-dcnode-id="2346" instrument_node="">
</span></ul><span data-dcnode-id="2344" instrument_node="">

</span><b class="whb" data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Introduce a small list of phrasal verbs every day.</span></b><span data-dcnode-id="2307" instrument_node=""> Don’t overwhelm your students with long lists of words that they have to memorize. When you start teaching phrasal verbs, introduce them slowly. Try starting each class with a list of 5-10 phrasal verbs and reviewing their meanings. This way, the students gradually build up a list of phrasal verbs without getting overwhelmed.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="2291" id="_ref-5"><a data-dcnode-id="2305" href="#_note-5"><span data-dcnode-id="2306" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="2293" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="2304" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">X</span></span><span data-dcnode-id="2301" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Research source</span></span><span data-dcnode-id="2298" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2297"></span><span data-dcnode-id="2296" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2295" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2294" instrument_node="">
</span></span><span data-dcnode-id="2292" instrument_node="">
</span></sup><span data-dcnode-id="2290" instrument_node="">
</span><ul data-dcnode-id="2287"><li data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Always explain why these phrases are phrasal verbs as well. If you teach them how phrasal verbs are used and constructed, then they can recognize them later on.</span></li></ul><span data-dcnode-id="2286" instrument_node="">
</span></div><span data-dcnode-id="2284" instrument_node="">

</span><b class="whb" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Organize phrasal verbs into categories.</span></b><span data-dcnode-id="2249" instrument_node=""> Since there are so many phrasal verbs, grouping similar ones together can helps students learn better. People learn better with patterns than with random selections. Picking out groups of phrasal verbs that begin with the same word, for example, is a good way to organize the phrases.</span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="2233" id="_ref-6"><a data-dcnode-id="2247" href="#_note-6"><span data-dcnode-id="2248" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="2235" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="2246" instrument_node="">

</span><span class="ts_description" data-dcnode-id="2239"></span><span data-dcnode-id="2238" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2237" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2236" instrument_node="">
</span></span><span data-dcnode-id="2234" instrument_node="">
</span></sup><span data-dcnode-id="2232" instrument_node="">
</span><ul data-dcnode-id="2229"><li data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Build a list of phrasal verbs that start with the same word. "Call" is one choice. Then take students through the different meanings of "call out," "call in," "call up," and all the other possible combinations.</span></li></ul><span data-dcnode-id="2228" instrument_node="">

</span><div class="step_num" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">6</span></div><div class="step" data-dcnode-id="2161"><span data-dcnode-id="2194" instrument_node="">
</span><b class="whb" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Teach students how to figure out verbs using context clues.</span></b><span data-dcnode-id="2191" instrument_node=""> There are over 2,000 phrasal verbs in English, so it’s not possible for them to memorize each one. Rather than having students memorize lists of words, teach them how to identify phrasal verbs from sentence context clues. Show them a sentence and circle the phrasal verb. Ask them to give you a definition of the verb based on its use in the sentence. Help the students along by asking questions, but let them figure out the definition. This helps them learn better.</span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="2175" id="_ref-7"><a data-dcnode-id="2189" href="#_note-7"><span data-dcnode-id="2190" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="2177" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="2188" instrument_node="">

</span></span><span data-dcnode-id="2176" instrument_node="">
</span></sup><span data-dcnode-id="2174" instrument_node="">
</span><ul data-dcnode-id="2163"><span data-dcnode-id="2173" instrument_node="">
</span><li data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Remember that the main sign that something is a phrasal verb is when the phrase has a different meaning than the 2 words by themselves. Have students break down verb and preposition combinations to see if each word works by itself, or if it has to be a single phrase to make sense.</span></li><span data-dcnode-id="2170" instrument_node="">
</span><li data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">"Wear out," for example, means to make something old or unusable. This is a much different meaning than "wear" and "out" by themselves. However, in "Go up the stairs," the verb "go" and the preposition "up" work individually, and don't need to be a phrase to make sense. Drill your students on recognizing these distinctions.</span></li><span data-dcnode-id="2167" instrument_node="">
</span><li data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Try having students then use that phrasal verb in a different sentence. This further trains them in proper usage for the verbs.</span></li><span data-dcnode-id="2164" instrument_node="">
</span></ul><span data-dcnode-id="2162" instrument_node="">
</span></div><span data-dcnode-id="2160" instrument_node="">
</span><div class="clearall" data-dcnode-id="2159"></div><span data-dcnode-id="2158" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="2157" data-isstep="1"></div><span data-dcnode-id="2156" instrument_node="">
</span></li><span data-dcnode-id="2154" instrument_node="">
</span><li data-dcnode-id="2083" id="step-id-06"><span data-dcnode-id="2153" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2152" name="step_1_7"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2132" style="max-width:728px"><a class="image" data-dcnode-id="2133" href="#/Image:Teach-Phrasal-Verbs-Step-7.jpg"><div class="content-spacer" data-dcnode-id="2141" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2147"><div class="loader" data-dcnode-id="2148"><div class="loader-dot" data-dcnode-id="2151"></div><div class="loader-dot" data-dcnode-id="2150"></div><div class="loader-dot" data-dcnode-id="2149"></div></div></div><span data-dcnode-id="2146" instrument_node="">

</span></div><span data-dcnode-id="2140" instrument_node="">

</span><div class="step_num" data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">7</span></div><div class="step" data-dcnode-id="2098"><span data-dcnode-id="2128" instrument_node="">
</span><b class="whb" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Have your students to look up phrasal verbs in the dictionary.</span></b><span data-dcnode-id="2125" instrument_node=""> If students are confused or lost and can’t figure out if a word is a phrasal verb, they can look it up in the dictionary. Phrasal verbs come after the singular verb in the dictionary. Let them use dictionaries when they’re first learning phrasal verbs to help them if they get stuck.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="2109" id="_ref-8"><a data-dcnode-id="2123" href="#_note-8"><span data-dcnode-id="2124" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="2111" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="2122" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">X</span></span><span data-dcnode-id="2119" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Research source</span></span><span data-dcnode-id="2116" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2115"></span><span data-dcnode-id="2114" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2113" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2112" instrument_node="">
</span></span><span data-dcnode-id="2110" instrument_node="">
</span></sup><span data-dcnode-id="2108" instrument_node="">
</span><ul data-dcnode-id="2100"><span data-dcnode-id="2107" instrument_node="">
</span><li data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">If a student isn’t sure if "give up" is a phrasal verb, they can look it up in the dictionary. It appears after "give" and is officially labeled as a phrasal verb.</span></li><span data-dcnode-id="2104" instrument_node="">
</span><li data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Students can use paper or online dictionaries. Online dictionaries may be more up to date than paper dictionaries, unless they’re new.</span></li><span data-dcnode-id="2101" instrument_node="">
</span></ul><span data-dcnode-id="2099" instrument_node="">

</span><b class="whb" data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Have your students write sentences with a phrasal verb you give them.</span></b><span data-dcnode-id="2021" instrument_node=""> Once you’ve introduced students to phrasal verbs, design activities where the class uses the verbs in their own sentences. Write a phrasal verb on the board. Then give the students time to write 1 or more sentences using that phrasal verb properly.</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="2005" id="_ref-9"><a data-dcnode-id="2019" href="#_note-9"><span data-dcnode-id="2020" instrument_node="">[9]</span></a><span class="ts_popup" data-dcnode-id="2007" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="2018" instrument_node="">

</span><li data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">For a participatory activity, have students read their sentences aloud to the class. Ask the class to decide if students have used the verbs correctly or not.</span></li><span data-dcnode-id="2000" instrument_node="">
</span><li data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">You can also make this an individual assignment that students will hand in. You can then grade everyone’s sentences to see if your point is getting across.</span></li><span data-dcnode-id="1997" instrument_node="">

</span><b class="whb" data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Ask students to define a phrasal verb without using the phrase.</span></b><span data-dcnode-id="1958" instrument_node=""> For another class activity, tell one student a phrasal verb. Then have them go to the front of the room and define that phrase without using the two words. Let the class guess which phrasal verb they are describing.</span><sup aria-label="Link to Reference 10" class="reference" data-dcnode-id="1942" id="_ref-10"><a data-dcnode-id="1956" href="#_note-10"><span data-dcnode-id="1957" instrument_node="">[10]</span></a><span class="ts_popup" data-dcnode-id="1944" hidden="" id="ts_popup_10" style="display: none;"><span data-dcnode-id="1955" instrument_node="">

</span><ul data-dcnode-id="1938"><li data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">If you assign a student "break up" for their phrasal verb, they could say "when you decide to leave a relationship with your boyfriend." This should tip the class off that the student is describing a break-up.</span></li></ul><span data-dcnode-id="1937" instrument_node="">

</span><div class="step_num" data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">3</span></div><div class="step" data-dcnode-id="1873"><span data-dcnode-id="1903" instrument_node="">
</span><b class="whb" data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Replace the phrasal verb in a sentence with another word as a quiz.</span></b><span data-dcnode-id="1900" instrument_node=""> This activity may sound strange at first, but it trains students to use context clues to figure out phrasal verbs. Write a sentence on the board or say it out loud, but replace the phrasal verb with a random noun, like "apple." If you’ve constructed a sentence with enough context clues, the students should be able to tell what the phrasal verb was.</span><sup aria-label="Link to Reference 11" class="reference" data-dcnode-id="1884" id="_ref-11"><a data-dcnode-id="1898" href="#_note-11"><span data-dcnode-id="1899" instrument_node="">[11]</span></a><span class="ts_popup" data-dcnode-id="1886" hidden="" id="ts_popup_11" style="display: none;"><span data-dcnode-id="1897" instrument_node="">
</span><span class="ts_close" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">X</span></span><span data-dcnode-id="1894" instrument_node="">
</span><span class="ts_name" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Research source</span></span><span data-dcnode-id="1891" instrument_node="">
</span><span class="ts_description" data-dcnode-id="1890"></span><span data-dcnode-id="1889" instrument_node="">
</span><a class="ts_source" data-dcnode-id="1888" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="1887" instrument_node="">
</span></span><span data-dcnode-id="1885" instrument_node="">
</span></sup><span data-dcnode-id="1883" instrument_node="">
</span><ul data-dcnode-id="1875"><span data-dcnode-id="1882" instrument_node="">
</span><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">For example, if you say "I apple a story that wasn’t true," the context clues should tell the students that the phrasal verb in this sentence is "made up." Do this for several sentences to make your point.</span></li><span data-dcnode-id="1879" instrument_node="">
</span><li data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Once students get good at this, ask for volunteers to do the same. The class will have fun with this activity.</span></li><span data-dcnode-id="1876" instrument_node="">
</span></ul><span data-dcnode-id="1874" instrument_node="">

</span></div><span data-dcnode-id="1852" instrument_node="">

</span><div class="step_num" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">4</span></div><div class="step" data-dcnode-id="1810"><span data-dcnode-id="1840" instrument_node="">
</span><b class="whb" data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Make students differentiate between phrasal verbs and verb + preposition combinations.</span></b><span data-dcnode-id="1837" instrument_node=""> Once the students get proficient at picking out phrasal verbs for themselves, advance the activities to differentiating between phrasal verbs and plain verb + preposition combinations. Once they can accurately choose between the two for themselves, then they are very well-versed in what phrasal verbs are.</span><sup aria-label="Link to Reference 12" class="reference" data-dcnode-id="1821" id="_ref-12"><a data-dcnode-id="1835" href="#_note-12"><span data-dcnode-id="1836" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="1823" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="1834" instrument_node="">
</span><span class="ts_close" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">X</span></span><span data-dcnode-id="1831" instrument_node="">
</span><span class="ts_name" data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Research source</span></span><span data-dcnode-id="1828" instrument_node="">
</span><span class="ts_description" data-dcnode-id="1827"></span><span data-dcnode-id="1826" instrument_node="">
</span><a class="ts_source" data-dcnode-id="1825" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="1824" instrument_node="">
</span></span><span data-dcnode-id="1822" instrument_node="">
</span></sup><span data-dcnode-id="1820" instrument_node="">
</span><ul data-dcnode-id="1812"><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Remind the students that for something to be a phrasal verb, the phrase must mean something different from the two words individually.</span></li><span data-dcnode-id="1816" instrument_node="">
</span><li data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">As an activity, give the students a worksheet of some sentences that use phrasal verbs and some that use plain verb + preposition combinations. They have to use clues from the sentence to figure out which is which.</span></li><span data-dcnode-id="1813" instrument_node="">
</span></ul><span data-dcnode-id="1811" instrument_node="">
</span></div><span data-dcnode-id="1809" instrument_node="">

</span><b class="whb" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Test students on picking out phrasal verbs themselves.</span></b><span data-dcnode-id="1774" instrument_node=""> Once you’ve done guided activities explaining and identifying phrasal verbs, let the students choose them for themselves. Use handouts, worksheets, or other activities where the students have to identify the phrasal verbs in sentences.</span><sup aria-label="Link to Reference 13" class="reference" data-dcnode-id="1758" id="_ref-13"><a data-dcnode-id="1772" href="#_note-13"><span data-dcnode-id="1773" instrument_node="">[13]</span></a><span class="ts_popup" data-dcnode-id="1760" hidden="" id="ts_popup_13" style="display: none;"><span data-dcnode-id="1771" instrument_node="">

</span><span class="ts_description" data-dcnode-id="1764"></span><span data-dcnode-id="1763" instrument_node="">
</span><a class="ts_source" data-dcnode-id="1762" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="1761" instrument_node="">
</span></span><span data-dcnode-id="1759" instrument_node="">
</span></sup><span data-dcnode-id="1757" instrument_node="">
</span><ul data-dcnode-id="1749"><span data-dcnode-id="1756" instrument_node="">
</span><li data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Do a few guided group activities first so students get used to identifying phrasal verbs. Then move on to individual activities.</span></li><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Consider making this activity ungraded at first so the students can learn without getting discouraged. Then give a graded quiz or test when you’ve taught the subject completely.</span></li><span data-dcnode-id="1750" instrument_node="">
</span></ul><span data-dcnode-id="1748" instrument_node="">
