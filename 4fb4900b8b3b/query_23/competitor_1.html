		This article was co-authored by </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Language-Academia"><span data-dcnode-id="4409" instrument_node="">Language Academia</span></a><span data-dcnode-id="4407" instrument_node="">. Language Academia is a private, online language school founded by Kordilia Foxstone. Kordilia and her team specialize in teaching foreign languages and accent reduction. Language Academia offers courses in several languages, including English, Spanish, and Mandarin.

</span><div class="mf-section-0" data-dcnode-id="4384" id="mf-section-0"><span data-dcnode-id="4388" instrument_node="">
</span><p data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Teaching English as a second language for beginners is a challenging task for anyone. No matter what your background, or experience level, you will encounter constant new challenges when teaching English as a second language. Like teaching other subjects, you’ll find that every student learns differently. At the same time, depending on the primary language of each student, you’ll face new challenges unique to that language. However, with some work and knowledge, you’ll be able to gain the skills you need to teach English as a second language to beginners.
</span></p><span data-dcnode-id="4385" instrument_node="">

</span><a class="stepanchor" data-dcnode-id="4340" name="step_1_1"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="4322" style="max-width:728px"><a class="image" data-dcnode-id="4323" href="#/Image:Teach-English-As-a-Second-Language-to-Beginners-Step-1-Version-3.jpg"><div class="content-spacer" data-dcnode-id="4331" style="padding-top:75%"><div class="loading-container" data-dcnode-id="4335"><div class="loader" data-dcnode-id="4336"><div class="loader-dot" data-dcnode-id="4339"></div><div class="loader-dot" data-dcnode-id="4338"></div><div class="loader-dot" data-dcnode-id="4337"></div></div></div><span data-dcnode-id="4334" instrument_node="">

</span><div class="image_details" data-dcnode-id="4324" style="display:none;"><span data-dcnode-id="4325" style="display:none;"><span data-dcnode-id="4326" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/c\/c1\/Teach-English-As-a-Second-Language-to-Beginners-Step-1-Version-3.jpg\/v4-460px-Teach-English-As-a-Second-Language-to-Beginners-Step-1-Version-3.jpg","bigUrl":"\/images\/thumb\/c\/c1\/Teach-English-As-a-Second-Language-to-Beginners-Step-1-Version-3.jpg\/aid739330-v4-728px-Teach-English-As-a-Second-Language-to-Beginners-Step-1-Version-3.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="4321" instrument_node="">
</span><div class="step_num" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">1</span></div><div class="step" data-dcnode-id="4298"><span data-dcnode-id="4318" instrument_node="">
</span><b class="whb" data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Start with the alphabet and numbers.</span></b><span data-dcnode-id="4315" instrument_node=""> One of the first things you should start with is to teach the alphabet and numbers. By teaching the alphabet and numbers, you’ll create a great foundation for everything else that your students will learn.
</span><ul data-dcnode-id="4301"><span data-dcnode-id="4314" instrument_node="">
</span><li data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Have your students learn the alphabet to a certain point. You can start at "a" and go to "m," if you want. Have your students finish the alphabet at a pace you are both comfortable with. The point is to push your students but to not push them too hard.</span></li><span data-dcnode-id="4311" instrument_node="">
</span><li data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Ask your students to work on numbers. As with letters, start them and stop them depending on their capabilities. Consider creating a worksheet on which students can practice writing letters and/or numbers.</span></li><span data-dcnode-id="4308" instrument_node="">
</span><li data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">Use flashcards with a word that begins with each letter of the alphabet to reinforce your lesson.</span></li><span data-dcnode-id="4305" instrument_node="">
</span><li data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">Learning the alphabet might be easier to speakers whose native language uses the Latin or English alphabet.</span></li><span data-dcnode-id="4302" instrument_node="">
</span></ul><span data-dcnode-id="4300" instrument_node="">
</span><span data-dcnode-id="4299" instrument_node="">
</span></div><span data-dcnode-id="4297" instrument_node="">
</span><div class="clearall" data-dcnode-id="4296"></div><span data-dcnode-id="4295" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="4294" data-isstep="1"></div><span data-dcnode-id="4293" instrument_node="">
</span></li><span data-dcnode-id="4291" instrument_node="">
</span><li data-dcnode-id="4204" id="step-id-01"><span data-dcnode-id="4290" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="4289" name="step_1_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="4271" style="max-width:728px"><a class="image" data-dcnode-id="4272" href="#/Image:Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg"><div class="content-spacer" data-dcnode-id="4280" style="padding-top:75%"><div class="loading-container" data-dcnode-id="4284"><div class="loader" data-dcnode-id="4285"><div class="loader-dot" data-dcnode-id="4288"></div><div class="loader-dot" data-dcnode-id="4287"></div><div class="loader-dot" data-dcnode-id="4286"></div></div></div><span data-dcnode-id="4283" instrument_node="">
</span><img alt="Image titled Teach English As a Second Language to Beginners Step 2" class="whcdn content-fill img-loading-alt" data-dcnode-id="4282" data-height="345" data-src="https://www.wikihow.com/images/thumb/6/63/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg/v4-460px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg" data-srclarge="/images/thumb/6/63/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg/aid739330-v4-728px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg" data-width="460" decoding="async" id="25fe63c2f6508f61a608066b946a4a63" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/6/63/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg/aid739330-v4-728px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg.webp&amp;raw"><span data-dcnode-id="4281" instrument_node="">
</span></div><span data-dcnode-id="4279" instrument_node="">
</span><noscript data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">&lt;img alt="Image titled Teach English As a Second Language to Beginners Step 2" src="https://www.wikihow.com/images/thumb/6/63/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg/v4-460px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/6/63/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg/aid739330-v4-728px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg" data-width="460" data-height="345" id="25fe63c2f6508f61a608066b946a4a63"&gt;</span></noscript><span data-dcnode-id="4276" instrument_node="">
</span><div class="image_details" data-dcnode-id="4273" style="display:none;"><span data-dcnode-id="4274" style="display:none;"><span data-dcnode-id="4275" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/6\/63\/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg\/v4-460px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg","bigUrl":"\/images\/thumb\/6\/63\/Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg\/aid739330-v4-728px-Teach-English-As-a-Second-Language-to-Beginners-Step-2-Version-3.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="4270" instrument_node="">
</span><div class="step_num" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">2</span></div><div class="step" data-dcnode-id="4214"><span data-dcnode-id="4267" instrument_node="">
</span><b class="whb" data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Teach pronunciation, especially for difficult sounds.</span></b><span data-dcnode-id="4264" instrument_node=""> Teaching pronunciation is extremely important when teaching English as a second language. Consider focusing on sounds that are particularly hard for English as a second language students like:
</span><ul data-dcnode-id="4216"><span data-dcnode-id="4263" instrument_node="">
</span><li data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">The "TH." The "TH" (like in "theater" or "thing") does not exist in a number of languages. As a result, it's relatively hard for some ESL students (such as those from Romance or Slavic language backgrounds) to pronounce.</span></li><span data-dcnode-id="4260" instrument_node="">
</span><li data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">The "R." The "R" sound is also difficult for many ESL learners for a variety of reason including the fact that it is pronounced differently depending on regional dialects.</span></li><span data-dcnode-id="4257" instrument_node="">
</span><li data-dcnode-id="4238"><span data-dcnode-id="4256" instrument_node="">The "L." The "L" sound is another difficult one for ESL learners, especially those from east Asia. Spend extra time on the "L."</span><sup aria-label="Link to Reference 1" class="reference" data-dcnode-id="4240" id="_ref-1"><a data-dcnode-id="4254" href="#_note-1"><span data-dcnode-id="4255" instrument_node="">[1]</span></a><span class="ts_popup" data-dcnode-id="4242" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="4253" instrument_node="">

</span><b class="whb" data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Teach your students nouns.</span></b><span data-dcnode-id="4176" instrument_node=""> After teaching the alphabet and numbers, move on to nouns. Teaching nouns will be one of the easiest things for your students to learn. This is because your students will be able to look at everything around them as potential things to learn.
</span><ul data-dcnode-id="4145"><span data-dcnode-id="4175" instrument_node="">
</span><li data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Start with common objects in your classroom.</span></li><span data-dcnode-id="4172" instrument_node="">
</span><li data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">Talk about English pronouns as well, such as: I, you, he, she, we, they, and them.</span></li><span data-dcnode-id="4169" instrument_node="">
</span><li data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Move on to common objects in your city or town. Good examples are: car, house, tree, road, and more.</span></li><span data-dcnode-id="4166" instrument_node="">
</span><li data-dcnode-id="4147"><span data-dcnode-id="4165" instrument_node="">Continue on to objects your students will encounter in their daily lives, such as food, electronics, and more.</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="4149" id="_ref-4"><a data-dcnode-id="4163" href="#_note-4"><span data-dcnode-id="4164" instrument_node="">[3]</span></a><span class="ts_popup" data-dcnode-id="4151" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="4162" instrument_node="">

</span><b class="whb" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">Explain how adjectives modify nouns.</span></b><span data-dcnode-id="4109" instrument_node=""> Adjectives allow you to describe nouns, so they're important for good communication. It's helpful to teach adjectives right after you teach nouns because adjectives are used exclusively with nouns.
</span><ul data-dcnode-id="4106"><li data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Adjectives change or describe other words. Examples of adjectives you can teach are: wild, silly, troubled, and agreeable.</span></li></ul><span data-dcnode-id="4105" instrument_node="">

</span><b class="whb" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Instruct your students on verbs.</span></b><span data-dcnode-id="4070" instrument_node=""> Teaching verbs will be a huge step in the process in which your students will put together full sentences (written or spoken).
</span><ul data-dcnode-id="4045"><span data-dcnode-id="4069" instrument_node="">
</span><li data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">Verbs describe an action. Examples of verbs you can teach are: to speak, to talk, and to pronounce.</span></li><span data-dcnode-id="4066" instrument_node="">
</span><li data-dcnode-id="4047"><span data-dcnode-id="4065" instrument_node="">Spend extra time on irregular verbs. The word "go" is a great example of a difficult English irregular verb. The past tense of "go" is "went." The past participle of "go" becomes "gone."</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="4049" id="_ref-5"><a data-dcnode-id="4063" href="#_note-5"><span data-dcnode-id="4064" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="4051" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="4062" instrument_node="">

</span><div class="step_num" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">6</span></div><div class="step" data-dcnode-id="3999"><span data-dcnode-id="4012" instrument_node="">
</span><b class="whb" data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">Teach that adverbs modify verbs, adjectives, or other adverbs.</span></b><span data-dcnode-id="4009" instrument_node=""> Adverbs allow you to add extra details to your sentence. Your students can use adverbs to clarify how or to what degree they did something. They can also use adverbs to add more detail when using adjectives to describe a noun.
</span><ul data-dcnode-id="4001"><span data-dcnode-id="4008" instrument_node="">
</span><li data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">Adverbs describe or change the meaning of verbs, adjectives, and other adverbs, adding to their meaning. Examples of adverbs include very, wearily, happily, and easily.</span></li><span data-dcnode-id="4005" instrument_node="">
</span><li data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">If a word ends in -ly, it's likely an adverb.</span></li><span data-dcnode-id="4002" instrument_node="">
</span></ul><span data-dcnode-id="4000" instrument_node="">
</span></div><span data-dcnode-id="3998" instrument_node="">

</span><b class="whb" data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">Explain tenses and articles.</span></b><span data-dcnode-id="3965" instrument_node=""> After you’ve covered nouns, adjectives, verbs, and adverbs you need to move on to teaching tenses and articles to your students. Without understanding how to use the proper tense and where to use articles, your students will not be able to put whole sentences together.
</span><ul data-dcnode-id="3934"><span data-dcnode-id="3964" instrument_node="">
</span><li data-dcnode-id="3959"><span data-dcnode-id="3963" instrument_node="">Tenses explain when something has happened or occurred. Make sure to explain </span><a data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Teach-the-Past-Tense" title="Teach the Past Tense"><span data-dcnode-id="3962" instrument_node="">past tense</span></a><span data-dcnode-id="3960" instrument_node="">, current tense, and future tense.</span></li><span data-dcnode-id="3958" instrument_node="">
</span><li data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Articles are adjectives that provide extra information about a noun. Articles include: "a," "an," and "the."</span></li><span data-dcnode-id="3955" instrument_node="">
</span><li data-dcnode-id="3936"><span data-dcnode-id="3954" instrument_node="">Make sure your students master tenses and articles, as they are paramount in their ability to construct sentences and to speak properly.</span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="3938" id="_ref-7"><a data-dcnode-id="3952" href="#_note-7"><span data-dcnode-id="3953" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="3940" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="3951" instrument_node="">

</span><b class="whb" data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Practice common phrases.</span></b><span data-dcnode-id="3898" instrument_node=""> One great way to teach English is to encourage your students to practice and use common phrases. This is important, as your students won’t understand the meaning of many common phrases just based off of the literal meaning of the words.
</span><ul data-dcnode-id="3870"><span data-dcnode-id="3897" instrument_node="">
</span><li data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">You should tell your students to repeat those phrases (and use them) until they feel comfortable using them in conversation.</span></li><span data-dcnode-id="3894" instrument_node="">
</span><li data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">Begin with a few common phrases like "never mind," "no doubt," or "make believe."</span></li><span data-dcnode-id="3891" instrument_node="">
</span><li data-dcnode-id="3872"><span data-dcnode-id="3890" instrument_node="">Provide your students with a list of common phrases to work with and think about.</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="3874" id="_ref-9"><a data-dcnode-id="3888" href="#_note-9"><span data-dcnode-id="3889" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="3876" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="3887" instrument_node="">

</span><div class="step_num" data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">9</span></div><div class="step" data-dcnode-id="3798"><span data-dcnode-id="3837" instrument_node="">
</span><b class="whb" data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Teach basic sentence construction.</span></b><span data-dcnode-id="3834" instrument_node=""> After you've taught the alphabet, verbs, and more, you should begin to teach your students basic sentence construction. This is important, as it will provide a foundation to their writing ability. It will also aid them in reading. Teach the main five patterns that sentences in English are constructed around:
</span><ul data-dcnode-id="3800"><span data-dcnode-id="3833" instrument_node="">
</span><li data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Subject-Verb sentences. These sentences have the subject followed by a verb. For instance, "The Dog runs."</span></li><span data-dcnode-id="3830" instrument_node="">
</span><li data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Subject-Verb-Object. These sentences have the subject first, followed by a verb, which is then followed by an object. For instance, "John eats pizza."</span></li><span data-dcnode-id="3827" instrument_node="">
</span><li data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">Subject-Verb-Adjective sentences. These sentences have the subject first, a verb, and then an adjective. For instance, "The puppy is cute."</span></li><span data-dcnode-id="3824" instrument_node="">
</span><li data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Subject-Verb-Adverb sentences. These sentences have the subject, a verb, and then an adverb. For instance, "The lion is there."</span></li><span data-dcnode-id="3821" instrument_node="">
</span><li data-dcnode-id="3802"><span data-dcnode-id="3820" instrument_node="">Subject-Verb-Noun sentences. These sentences have a subject, a verb, and end with a noun. For instance, "Emmanuel is a philosopher."</span><sup aria-label="Link to Reference 10" class="reference" data-dcnode-id="3804" id="_ref-10"><a data-dcnode-id="3818" href="#_note-10"><span data-dcnode-id="3819" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="3806" hidden="" id="ts_popup_10" style="display: none;"><span data-dcnode-id="3817" instrument_node="">

</span></sup><span data-dcnode-id="3803" instrument_node="">

</span><b class="whb" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Encourage students to speak only English in the classroom.</span></b><span data-dcnode-id="3730" instrument_node=""> One great way to facilitate learning is to encourage students to avoid speaking languages other than English in the classroom. This necessarily forces students to use their knowledge of English and further develop them. It also provides teaching moments for instructors and learning opportunities for students.
</span><ul data-dcnode-id="3696"><span data-dcnode-id="3729" instrument_node="">
</span><li data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">This tactic is best used when students have already learned the basics (basic questions, greetings, the alphabet, and numbers).</span></li><span data-dcnode-id="3726" instrument_node="">
</span><li data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">When a student uses English incorrectly, correct them in the proper way.</span></li><span data-dcnode-id="3723" instrument_node="">
</span><li data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Always be encouraging.</span></li><span data-dcnode-id="3720" instrument_node="">
</span><li data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">This tactic works well with the "repeat after me" and/or "answer me" approach. For instance, you can make a statement or ask a student a question. It will give them the opportunity to answer in English.</span></li><span data-dcnode-id="3717" instrument_node="">
</span><li data-dcnode-id="3698"><span data-dcnode-id="3716" instrument_node="">Avoid becoming a "language police." If a student has difficulty and has to talk in his or her native language, don’t shame them. Hear their concern.</span><sup aria-label="Link to Reference 11" class="reference" data-dcnode-id="3700" id="_ref-11"><a data-dcnode-id="3714" href="#_note-11"><span data-dcnode-id="3715" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="3702" hidden="" id="ts_popup_11" style="display: none;"><span data-dcnode-id="3713" instrument_node="">

</span><b class="whb" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Provide verbal and written instructions.</span></b><span data-dcnode-id="3660" instrument_node=""> When explaining an activity or giving directions about homework, classwork, or a project, you should always give both verbal and written instructions. Giving both verbal and written instructions allows your students to hear words and see them in print at the same time. This will aid in word association and in pronunciation.
</span><ul data-dcnode-id="3635"><li data-dcnode-id="3636"><span data-dcnode-id="3659" instrument_node="">Print off directions to an activity and distribute them to students before you explain an activity. If you are teaching online, email directions to your students before you explain it to them via video.</span><sup aria-label="Link to Reference 12" class="reference trusted" data-dcnode-id="3638" id="_ref-12"><a data-dcnode-id="3657" href="#_note-12"><span data-dcnode-id="3658" instrument_node="">[9]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3640" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="3656" instrument_node="">

</span><b class="whb" data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Monitor students’ progress constantly.</span></b><span data-dcnode-id="3599" instrument_node=""> No matter what type of lesson you are teaching or what activity your students are doing, you should monitor them constantly. Monitoring students will allow you to see their progress and to find out if they are struggling.
</span><ul data-dcnode-id="3566"><span data-dcnode-id="3598" instrument_node="">
</span><li data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">If you’re teaching in a classroom environment, walk around and talk to students to see if they are having trouble.</span></li><span data-dcnode-id="3595" instrument_node="">
</span><li data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">If you’re teaching online, send messages or emails to students and ask them if they need help.</span></li><span data-dcnode-id="3592" instrument_node="">
</span><li data-dcnode-id="3568"><span data-dcnode-id="3591" instrument_node="">Make yourself available as much as you can when students are doing in-class activities or other activities.</span><sup aria-label="Link to Reference 13" class="reference trusted" data-dcnode-id="3570" id="_ref-13"><a data-dcnode-id="3589" href="#_note-13"><span data-dcnode-id="3590" instrument_node="">[10]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3572" hidden="" id="ts_popup_13" style="display: none;"><span data-dcnode-id="3588" instrument_node="">

</span><b class="whb" data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Promote a diversity of modes of learning.</span></b><span data-dcnode-id="3530" instrument_node=""> Teaching English as a second language to beginners is a lot more effective when you use a variety of types of learning. Diversity in learning is important since each student is different and learns differently.
</span><ul data-dcnode-id="3491"><span data-dcnode-id="3529" instrument_node="">
</span><li data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Use speaking.</span></li><span data-dcnode-id="3526" instrument_node="">
</span><li data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">Employ writing.</span></li><span data-dcnode-id="3523" instrument_node="">
</span><li data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">Encourage reading.</span></li><span data-dcnode-id="3520" instrument_node="">
</span><li data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Suggest listening.</span></li><span data-dcnode-id="3517" instrument_node="">
</span><li data-dcnode-id="3493"><span data-dcnode-id="3516" instrument_node="">Try to promote all of the modes of learning equally.</span><sup aria-label="Link to Reference 14" class="reference trusted" data-dcnode-id="3495" id="_ref-14"><a data-dcnode-id="3514" href="#_note-14"><span data-dcnode-id="3515" instrument_node="">[11]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3497" hidden="" id="ts_popup_14" style="display: none;"><span data-dcnode-id="3513" instrument_node="">

</span><div class="step_num" data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">5</span></div><div class="step" data-dcnode-id="3442"><span data-dcnode-id="3458" instrument_node="">
</span><b class="whb" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Break lessons into small pieces.</span></b><span data-dcnode-id="3455" instrument_node=""> When teaching beginners or very young students, break the lesson into several pieces of about 10 minutes. Breaking lessons up into small pieces will make sure you don’t lose your students' attention. At the same time, it will make sure that you don’t overwhelm your students.
</span><ul data-dcnode-id="3444"><span data-dcnode-id="3454" instrument_node="">
</span><li data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">You don’t need to stay at exactly 10 minutes. Feel free to go a few minutes over if it will aid your lesson.</span></li><span data-dcnode-id="3451" instrument_node="">
</span><li data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">After each mini-lesson, switch to a totally different sort of lesson. This will help refresh students and keep their attention.</span></li><span data-dcnode-id="3448" instrument_node="">
</span><li data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Change your mini lessons daily. Try to incorporate as many different lessons as possible to keep your students' attention and to challenge them. However, don't add too much new information at once, as your students may get overwhelmed. Instead, change your strategy often but stick to the same material until your students understand it.</span></li><span data-dcnode-id="3445" instrument_node="">
</span></ul><span data-dcnode-id="3443" instrument_node="">

</span><b class="whb" data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Use games to reinforce the topic of the day.</span></b><span data-dcnode-id="3376" instrument_node=""> Games will help students learn English by making it fun and by compelling them to think in new and different ways.
</span><ul data-dcnode-id="3348"><span data-dcnode-id="3375" instrument_node="">
</span><li data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">Try a Jeopardy-type game that uses a point system to get your students to compete against each other.</span></li><span data-dcnode-id="3372" instrument_node="">
</span><li data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Consider a Family Feud-style game if you want your students to work together in teams.</span></li><span data-dcnode-id="3369" instrument_node="">
</span><li data-dcnode-id="3350"><span data-dcnode-id="3368" instrument_node="">Try memorizing or guessing games that rely on flash cards. For instance, display a flash card with a hint and see if your students can guess the correct answer.</span><sup aria-label="Link to Reference 15" class="reference" data-dcnode-id="3352" id="_ref-15"><a data-dcnode-id="3366" href="#_note-15"><span data-dcnode-id="3367" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="3354" hidden="" id="ts_popup_15" style="display: none;"><span data-dcnode-id="3365" instrument_node="">

</span><b class="whb" data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Use visuals to teach language.</span></b><span data-dcnode-id="3312" instrument_node=""> An important way to teach language is to use visuals in order to build word association. By using visuals to promote word association, your students will be able to make stronger connections between ideas and new words that they are learning in your class. Consider:
</span><ul data-dcnode-id="3273"><span data-dcnode-id="3311" instrument_node="">
</span><li data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">Pictures and photographs.</span></li><span data-dcnode-id="3308" instrument_node="">
</span><li data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Post-cards.</span></li><span data-dcnode-id="3305" instrument_node="">
</span><li data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">Video.</span></li><span data-dcnode-id="3302" instrument_node="">
</span><li data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Maps.</span></li><span data-dcnode-id="3299" instrument_node="">
</span><li data-dcnode-id="3275"><span data-dcnode-id="3298" instrument_node="">Comic books. Comic books are especially good because visuals and text are paired together.</span><sup aria-label="Link to Reference 16" class="reference trusted" data-dcnode-id="3277" id="_ref-16"><a data-dcnode-id="3296" href="#_note-16"><span data-dcnode-id="3297" instrument_node="">[13]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3279" hidden="" id="ts_popup_16" style="display: none;"><span data-dcnode-id="3295" instrument_node="">

</span><b class="whb" data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Promote the use of targeted language apps on mobile devices.</span></b><span data-dcnode-id="3237" instrument_node=""> One great way to teach English as a second language is to incorporate the use of targeted language applications on smart phones. Targeted language apps are a great way to reinforce what you have taught during instruction time, as students can use them to practice their language skills and to learn new phrases and words.
</span><ul data-dcnode-id="3226"><span data-dcnode-id="3236" instrument_node="">
</span><li data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Targeted language apps are available on a number of smart phone operating systems.</span></li><span data-dcnode-id="3233" instrument_node="">
</span><li data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">There are a wide variety of free targeted language apps, like Duolingo.</span></li><span data-dcnode-id="3230" instrument_node="">
</span><li data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Some apps provide the opportunity for multiple students to work together to learn.</span></li><span data-dcnode-id="3227" instrument_node="">

</span><b class="whb" data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Use social media.</span></b><span data-dcnode-id="3190" instrument_node=""> Social media is a great way to teach English as a second language for beginners. Social media provides a great opportunity for you to teach colloquial phrases and commonly used words. In addition, it provides an opportunity for students to observe word usage and to practice what they have learned.
</span><ul data-dcnode-id="3179"><span data-dcnode-id="3189" instrument_node="">
</span><li data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">Try an "idiom of the day" lesson. In this, you can pick common idioms or colloquial phrases, and explain them to your class.</span></li><span data-dcnode-id="3186" instrument_node="">
</span><li data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Have your students follow popular figures on Twitter and translate their tweets.</span></li><span data-dcnode-id="3183" instrument_node="">
</span><li data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Start a social media group and have students share news pieces and explain or translate them in English.</span></li><span data-dcnode-id="3180" instrument_node="">

</span><div class="qa_q_txt" data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">I am teaching an older woman from Afghanistan to speak English. She knows only a few words. I don't speak her language at all, and there is no translator available. What can I do?</span></div><span data-dcnode-id="3122" instrument_node="">
</span><div class="qa_answers" data-dcnode-id="3065"><span data-dcnode-id="3121" instrument_node="">
</span><div class="qa_user_area" data-dcnode-id="3101"><span data-dcnode-id="3120" instrument_node="">
</span><div class="qa_user_hover hint_box" data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">
</span></div><span data-dcnode-id="3117" instrument_node="">
</span><div class="qa_person_circle" data-dcnode-id="3111"><span data-dcnode-id="3116" instrument_node="">
</span><picture data-dcnode-id="3113"><source data-dcnode-id="3115" srcset="/images/thumb/f/f5/CommunityAvatar4.png/-crop-104-104-104px-CommunityAvatar4.png.webp" type="image/webp"><img alt="Community Answer" data-dcnode-id="3114" height="52" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/f/f5/CommunityAvatar4.png/-crop-104-104-104px-CommunityAvatar4.png&amp;raw" style="max-width:52px" width="52"></picture><span data-dcnode-id="3112" instrument_node="">
</span></div><span data-dcnode-id="3110" instrument_node="">
</span><div class="qa_answerer_info" data-dcnode-id="3103"><span data-dcnode-id="3109" instrument_node="">
</span><div class="qa_user_name" data-dcnode-id="3108"></div><span data-dcnode-id="3107" instrument_node="">
</span><div class="qa_user_label" data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Community Answer</span></div><span data-dcnode-id="3104" instrument_node="">
</span></div><span data-dcnode-id="3102" instrument_node="">
</span></div><span data-dcnode-id="3100" instrument_node="">
</span><div class="qa_answer answer" data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">
								You could always use pictures to show her the basic words. It might also help if you make a list of basic sentences translated from her language to English. Print the sentences and let her study them.

</span></div><span data-dcnode-id="2730" instrument_node="">
</span><div class="qa_answer answer" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">
								This scenario is unrealistic to learn to speak English in a month. Teach them in the same way we speak to children learning to speak. Present objects, saying the name of the object clearly. Have them repeat the word. Then, give the object to them, saying "I give you the _____".  Motion for them to return it, saying, "Give me the ______". You can now make your lesson plan. Your class will be fun. Review a lot. Also use simple sentences. "Hello, students!" "Hello, teacher." "Please sit." "Please get up." (motioning accordingly) "Student." "Teacher." Practice speaking slowly, clearly, and simply. You are lucky if you don't have to teach reading and writing at the same time.

</span><div class="qa_q_txt" data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">When do I start giving homework to my student who I just started teaching?</span></div><span data-dcnode-id="2536" instrument_node="">

								You can begin the first day with simple assignments of written work, such as "Discuss a happy experience you had this summer." As you get a sense of your class's homework strength, you can build it slowly and fit it to their needs. The homework you give should always be a review of what was taught during the day. The beginning days of schools can focus on school and classroom rules and include a writing sample. Then slowly introduce math. Also, try to gauge how long their assignments take them. You don't want your class spending hours on something if it's too hard, so plan on being flexible.
