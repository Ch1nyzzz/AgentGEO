</span><div class="field field-name-content-share-buttons-field" data-dcnode-id="806"><ul class="social-button-list" data-dcnode-id="807" data-share-title=" How to Teach ESL: Differences for Children and Adults" data-share-url="https://www.gooverseas.com/blog/teaching-english-abroad-children-vs-adults" id="js-social-button-list"><li class="share-facebook" data-dcnode-id="820"><a class="js-social-button social-button social-button--facebook" data-dcnode-id="821" data-social-network="facebook" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/%23facebook" rel="nofollow noopener" target="_blank"><i class="fa fa-facebook" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node=""></span></i><span class="h-vh" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Share on Facebook</span></span></a></li><li class="share-twitter" data-dcnode-id="814"><a class="js-social-button social-button social-button--twitter" data-dcnode-id="815" data-social-network="twitter" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/%23twitter" rel="nofollow noopener" target="_blank"><i class="fa fa-twitter" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node=""></span></i><span class="h-vh" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Share on Twitter</span></span></a></li><li class="share-pinterest" data-dcnode-id="808"><a class="js-social-button social-button social-button--pinterest" data-dcnode-id="809" data-social-network="pinterest" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/%23pinterest" rel="nofollow noopener" target="_blank"><i class="fa fa-pinterest" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node=""></span></i><span class="h-vh" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Share on Pinterest</span></span></a></li></ul></div><span data-dcnode-id="805" instrument_node="">

</span><div class="layoutArticle__main" data-dcnode-id="499"><span data-dcnode-id="802" instrument_node="">
</span><figure class="media media--type-image media--view-mode-full-content ds-1col" data-dcnode-id="798"><span data-dcnode-id="801" instrument_node="">
</span><img alt="How to Teach ESL: Differences for Children and Adults" class="image-style-_014x lazyloaded" data-dcnode-id="800" data-src="/sites/default/files/styles/1014x/public/images/2018-05-20/group-of-students-in-classroom-pixabay.jpg?itok=ArvtPmOW" height="639" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/sites/default/files/styles/1014x/public/images/2018-05-20/group-of-students-in-classroom-pixabay.jpg%3Fitok%3DArvtPmOW&amp;raw" width="960"><span data-dcnode-id="799" instrument_node="">
</span></figure><span data-dcnode-id="797" instrument_node="">
</span><div class="text" data-dcnode-id="769"><p data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">After finishing university, I did what thousands of new graduates do every year: I signed up to </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad"><span data-dcnode-id="795" instrument_node="">teach English abroad</span></a><span data-dcnode-id="793" instrument_node=""> and moved to suburban Tokyo, Japan for a year and a half. Being a native English speaker and having a degree in English, but no teaching experience (and certainly no ESL training), it was very easy for me to walk into a job. But, that didn’t mean the job itself was easy.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="790" instrument_node="">During my time </span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/japan"><span data-dcnode-id="789" instrument_node="">teaching in Japan</span></a><span data-dcnode-id="787" instrument_node=""> (which included the original company I worked for going bankrupt - but that’s another story!), I worked in a variety of different ESL contexts: public elementary and junior high schools, one-on-one and group lessons for </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/adults"><span data-dcnode-id="786" instrument_node="">adults</span></a><span data-dcnode-id="784" instrument_node="">, </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/business"><span data-dcnode-id="783" instrument_node="">business English</span></a><span data-dcnode-id="781" instrument_node="">, even private small-group lessons for </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/pre-school"><span data-dcnode-id="780" instrument_node="">preschoolers</span></a><span data-dcnode-id="778" instrument_node="">. The job was fun, most of the time, but each age group presented extremely different challenges. </span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Kids are, by nature, energetic and have short attention spans, so classes with kids are often full-on, and require a lot of creativity. Teaching adults requires more patience and technical (read: grammar!) knowledge, as adults have specific reasons for learning English but are often slower to learn.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">There are a few crucial differences between how and why children and adults learn. Keep these differences in mind so you can cater your lessons specifically to your students, and even know which type of job to apply for.</span></p><span data-dcnode-id="770" instrument_node="">
</span></div><span data-dcnode-id="768" instrument_node="">
</span><h2 class="block__title -primary" data-dcnode-id="766" id="paragraph-item-45338"><span data-dcnode-id="767" instrument_node="">
Children and adults learn languages differently</span></h2><span data-dcnode-id="765" instrument_node="">
</span><div class="text" data-dcnode-id="734"><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Whichever age group you’re teaching, it helps to understand the different stages of language-learning that happen throughout life.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="761" instrument_node="">Children’s natural ability to acquire new languages is strong before adolescence. Pronunciation comes more easily, and vocabulary sticks during this time. In fact, linguists don’t say that children learn a language but that </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linguisticsociety.org/resource/faq-how-do-we-learn-language%23%3A~%3Atext%3DChildren%2520acquire%2520language%2520through%2520interaction%2Cis%2520being%2520used%2520around%2520them." rel="noopener" target="_blank"><span data-dcnode-id="760" instrument_node="">they </span><em data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">acquire</span></em><span data-dcnode-id="757" instrument_node=""> it</span></a><span data-dcnode-id="755" instrument_node="">. You don’t really need to teach young kids a language because they will pick it up. They </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/whats-the-best-way-to-teach-children-a-second-language-new-research-produces-surprising-results-122059" rel="noopener" target="_blank"><span data-dcnode-id="754" instrument_node="">learn </span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">implicitly</span></em><span data-dcnode-id="751" instrument_node=""> rather than </span><em data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">explicitly</span></em></a><span data-dcnode-id="747" instrument_node="">. Easy, right?</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Anyone who has spent any time with kids, though, will tell you that the struggle is to keep them focused and interested, rather than to get them to learn. So, teaching kids requires small person-handling skills as much as it does language teaching prowess.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="736"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Read more</span></strong><span data-dcnode-id="739" instrument_node="">: </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/blog/teach-abroad-esl-lesson-planning"><span data-dcnode-id="738" instrument_node="">How to Create the Perfect ESL Lesson Plan</span></a></p><span data-dcnode-id="735" instrument_node="">
</span></div><span data-dcnode-id="733" instrument_node="">
</span><h2 class="block__title -primary" data-dcnode-id="731" id="paragraph-item-45342"><span data-dcnode-id="732" instrument_node="">
Tips for Teaching ESL to Children</span></h2><span data-dcnode-id="730" instrument_node="">
</span><figure class="media media--type-image media--view-mode-full-content ds-1col" data-dcnode-id="726"><span data-dcnode-id="729" instrument_node="">
</span><img alt="How to Teach ESL: Tips for Teaching ESL to Children" class="image-style-_014x lazyloaded" data-dcnode-id="728" data-src="/sites/default/files/styles/1014x/public/images/2018-05-20/teaching-young-students-pixabay.jpg?itok=4yqjiaO_" height="685" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/sites/default/files/styles/1014x/public/images/2018-05-20/teaching-young-students-pixabay.jpg%3Fitok%3D4yqjiaO_&amp;raw" width="960"><span data-dcnode-id="727" instrument_node="">
</span></figure><span data-dcnode-id="725" instrument_node="">
</span><div class="text" data-dcnode-id="667"><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Small children don’t have a driving motivation to learn languages. Their attention is fueled by curiosity and imagination. Anything and everything is potentially interesting to a younger child. It takes a lot of energy to teach them, especially full time over the course of a week, but it might be an ideal job for you if you’re creative and enthusiastic. Here are some things to keep in mind when teaching children.</span></p><span data-dcnode-id="722" instrument_node="">
</span><h4 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">1. Keep the momentum moving</span></h4><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Classes with children don’t run on autopilot, and you’re less likely to have to follow a set curriculum than you are when teaching older kids. It may even be up to you to plan your classes from scratch. </span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">If a group of 6-year-olds doesn’t have something to do, don’t expect them to sit quietly like angels and wait until you’re ready. That’s why it's important to always have your materials prepared before class and have backup lessons at hand for times when Plan A takes a nosedive.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h4 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">2. Don’t over-correct</span></h4><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Young children learn English just as they learned their native language: through experience and interaction. They aren’t consciously studying structure and grammar rules, so keep your corrections natural. If they make a mistake, just repeat back the correct sentence. For example, if your student says, “He goed to the park,” you could respond, “Yes, he goes to the park.” </span></p><span data-dcnode-id="707" instrument_node="">
</span><h4 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">3. Movement and activity is key</span></h4><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Not only is movement and activity a part of childhood, but it actually helps the learning process and keeps students involved in your lessons. In your classroom, try games like “Simon Says”, or pass around a ball and have each student answer a question when they catch it.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h4 data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">4. Use songs &amp; flashcards</span></h4><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Think back to your high school language classes. I’m sure we all remember the words to at least one catchy song, even if we still can’t give directions or order food to save our lives! Music is powerful, and fun songs will keep your students engaged and help them pick-up new vocabulary.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Similarly, some students are visual learners, especially younger kids who aren’t fully literate in their own languages, let alone a second. Holding up or pinning colorful flashcards to the board while learning vocab is ideal for helping them remember words.</span></p><span data-dcnode-id="692" instrument_node="">
</span><h4 data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">5. Remember classroom management</span></h4><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">You may be working alongside a local teacher who is more responsible for the </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/blog/beginner-guide-classroom-management"><span data-dcnode-id="687" instrument_node="">classroom management</span></a><span data-dcnode-id="685" instrument_node=""> side of teaching or you might have to go it alone. Either way, a big part of teaching young kids is managing their behavior.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Using a consistent “quiet signal” is an effective way to manage a big group (and groups will often be big, especially in public schools). A good signal is clapping three times, having students repeat the rhythm back and falling silent after they’ve finished. Other teachers will use a hand single which they’ll hold up until all students are quiet and making the same sign. No matter what happens, never shout over them. Raising your voice to get their attention can make them used to talking over you, so stay calm.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h4 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">6. Don’t try to be a rockstar</span></h4><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">One of the biggest complaints I heard through the ESL teaching grapevine in Japan was Japanese teachers of English who resented foreign teachers who played the “rockstar” card. For young kids, having a foreigner lead their class is interesting and exciting, especially if it doesn’t happen very often, such as once a week or even just once a term. It’s easy for kids to get whipped up into an exciting English-teaching frenzy, and some teachers encourage that because they think it means their students are engaged and motivated.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">If you want to have a good relationship with your local teachers, it might be a good idea to put yourself in their position. They have to teach their students for the rest of the day, or week, when you’re not there. They have to be the disciplinarian and teach things that might seem a bit more “boring” than English. They do their best to keep energy levels at a manageable level so that everyone can learn (and hear each other). The noise from lessons with rockstar English teachers can reverberate around the school and excite students for the rest of the day.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">We’re not saying to avoid having fun! Quite the opposite. But it’s a good idea to mix quiet, individual activities into your lessons, too.</span></p><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span><h2 class="block__title -primary" data-dcnode-id="664" id="paragraph-item-45345"><span data-dcnode-id="665" instrument_node="">
Tips for Teaching ESL to Teenagers</span></h2><span data-dcnode-id="663" instrument_node="">
</span><figure class="media media--type-image media--view-mode-full-content ds-1col" data-dcnode-id="659"><span data-dcnode-id="662" instrument_node="">
</span><img alt="How to Teach ESL: Tips for Teaching ESL to Teenagers" class="image-style-_014x lazyloaded" data-dcnode-id="661" data-src="/sites/default/files/styles/1014x/public/images/2018-05-20/teenage-students-pixabay.jpg?itok=xxU-Q3aS" height="639" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/sites/default/files/styles/1014x/public/images/2018-05-20/teenage-students-pixabay.jpg%3Fitok%3DxxU-Q3aS&amp;raw" width="960"><span data-dcnode-id="660" instrument_node="">
</span></figure><span data-dcnode-id="658" instrument_node="">
</span><div class="text" data-dcnode-id="624"><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Older children, such as junior high and high school students, can be more difficult to excite. They will often be studying English because they have to, either because it’s a requirement at school or because their parents want them to excel with extracurricular lessons. They don’t necessarily have the inherent curiosity of a younger child, but they also don’t have the motivation and discipline of an adult learner. </span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Cultural factors also play into this, as in some cultures it’s not ‘cool’ or acceptable to be too talkative or inquisitive, while in others it’s the opposite. Your biggest challenge will be planning activities that engage everyone.</span></p><span data-dcnode-id="652" instrument_node="">
</span><h4 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">1. Their interests are key</span></h4><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Let’s face it - many teens are self-centered (in the best possible way!) They’re more likely to be motivated when the lesson comes back to them and their interests. A great tactic is to do a survey at the beginning of term, or at the beginning of your block of lessons, to gauge your students’ interests. Whatever their interests (which are likely to revolve around sports, movies, celebrities, pop culture, and current events), you can build them into your future lessons.</span></p><span data-dcnode-id="646" instrument_node="">
</span><h4 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">2. Hone your empathy</span></h4><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Academic stress. Crushes. Self-consciousness. Peer and parental pressure. There are a lot of moving parts here. The best thing you can do is to create a comfortable classroom for your teens. Be especially aware of the kinds of activities you plan — yes, you want to challenge them, but don’t continually put students on the spot in front of their peers. Self-consciousness flourishes now, and speaking English in front of their peers can compound these feelings.</span></p><span data-dcnode-id="640" instrument_node="">
</span><h4 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">3. Create a strong rapport</span></h4><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">It’s surprising how something as simple as asking a student how their day is going can open up so much. It breaks down this invisible barrier. Talk with them after class if you notice they’re lingering at your desk, or say hi in the halls, perhaps giving them the chance to casually practice a phrase or two you learned in class. Depending on your country’s social norms, if you can comfortably make these friendly, personal connections then go for it!</span></p><span data-dcnode-id="634" instrument_node="">
</span><h4 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">4. Work creatively with the curriculum</span></h4><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Most teens in a school setting, or studying after class, will be learning English with some type of exam as an end goal. Depending on the country you’re teaching in, you may have a rigid curriculum you have to follow (as I did when teaching in Japan). If so, diverging from it too far will not be a good idea because the students will be tested on very specific things, and failing to teach those things could cause problems for them. </span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">But, there are ways you can make even dry textbooks fun. Have students act out the dialogues rather than you repeating them like a human tape recorder. Find songs and videos and pictures that are related to the curriculum to help students cement new words and concepts in their minds.</span></p><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span><h2 class="block__title -primary" data-dcnode-id="621" id="paragraph-item-45347"><span data-dcnode-id="622" instrument_node="">
Tips for Teaching ESL to Adults</span></h2><span data-dcnode-id="620" instrument_node="">
</span><figure class="media media--type-image media--view-mode-full-content ds-1col" data-dcnode-id="616"><span data-dcnode-id="619" instrument_node="">
</span><img alt="How to Teach ESL: Tips for Teaching ESL to Adults" class="image-style-_014x lazyloaded" data-dcnode-id="618" data-src="/sites/default/files/styles/1014x/public/images/2018-05-20/students-in-lecture-hall-pixabay.jpg?itok=IH-TTy3H" height="637" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/sites/default/files/styles/1014x/public/images/2018-05-20/students-in-lecture-hall-pixabay.jpg%3Fitok%3DIH-TTy3H&amp;raw" width="960"><span data-dcnode-id="617" instrument_node="">
</span></figure><span data-dcnode-id="615" instrument_node="">
</span><div class="text" data-dcnode-id="572"><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">Adults have more varying levels, needs, and difficulties when it comes to learning a new language. Around puberty, the natural ability to pick up a second language drops, and continues to do so as we get older (although it’s not all bad news for adult learners - </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/future/article/20181024-the-best-age-to-learn-a-foreign-language" rel="noopener" target="_blank"><span data-dcnode-id="613" instrument_node="">we have some advantages</span></a><span data-dcnode-id="611" instrument_node="">, too).</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Adults must deliberately and consciously learn a language to gain proficiency or fluency. If you’re teaching adults who are absolute beginners and have no previous experience or exposure to English, this can be a big challenge for them. Even adults with previous exposure can easily forget what they’ve learned, struggle with grammatical concepts that are different from their native tongue, and feel more self-conscious or embarrassed about their skills and progress.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">Adults also have very specific, but diverse, </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/blog/real-benefits-of-being-bilingual"><span data-dcnode-id="604" instrument_node="">reasons for learning English</span></a><span data-dcnode-id="602" instrument_node="">. They might be preparing for university abroad, trying to gain a new skill for their career at home, or planning on immigrating to an English-speaking country. ESL teachers will often teach in private language schools, and you may have a mix of reasons for studying English within the same class. The role of the teacher will become more strategic than teaching kids, and you’ll need to closely monitor your students’ progress to help them reach their specific goals.</span></p><span data-dcnode-id="600" instrument_node="">
</span><h4 data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">1. Never equate language ability with intelligence</span></h4><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">If your student is struggling to understand something you think is a simple concept, make sure you’re responding with patience and respect. Your tone, body language, and actions will all reveal your attitude. Students pick up on this, no matter how little English they know. Remember, learning English is just one slice of their life, and even though you have more skills in this area, they may have more professional and life experience than you do. Stay humble and respectful.</span></p><span data-dcnode-id="594" instrument_node="">
</span><h4 data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">2. Teach casual language and idioms</span></h4><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Many students are interested in getting practice with everyday, colloquial phrases. This kind of language, ever-changing, can’t be taught in textbooks, and many adults need it for professional (and personal) situations. If you’re teaching business English, for example, make it a point to practice common workplace phrases, such as “on the ball” and “kept under wraps.”</span></p><span data-dcnode-id="588" instrument_node="">
</span><h4 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">3. Use age-appropriate activities</span></h4><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Even if your adult students are basic beginners, make sure your lessons are relevant to their lives. Using children’s storybooks or songs, while simple and effective, may appear condescending to them. (And, in fact, kids’ books designed for native speakers of English can have some difficult and obscure vocabulary that adult learners probably don’t need to know). </span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Instead, plan your lessons around their present goals, such as how to fill out a job application, prepare for a citizenship test, or practice interview questions for a new job.</span></p><span data-dcnode-id="579" instrument_node="">
</span><h4 data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">4. Provide detailed and encouraging feedback</span></h4><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Encouragement is paramount with adults. They may be easily discouraged if they struggle or take a long time to remember something. Before beginning to teach, get a clear picture of your students’ language level, and use what they already know to help build their confidence. From there, you can start adding new language, and they’ll feel better knowing they have a foundation to stand on.</span></p><span data-dcnode-id="573" instrument_node="">
</span></div><span data-dcnode-id="571" instrument_node="">
</span><h2 class="block__title -primary" data-dcnode-id="569" id="paragraph-item-45348"><span data-dcnode-id="570" instrument_node="">
Which Program is Right for You?</span></h2><span data-dcnode-id="568" instrument_node="">
</span><div class="text" data-dcnode-id="546"><p data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">As a teacher, your students’ needs (should) come first. While it may be tempting to choose an </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad"><span data-dcnode-id="566" instrument_node="">ESL teaching program</span></a><span data-dcnode-id="564" instrument_node=""> based upon your dream location and travel opportunities, it’s also important to consider your own strengths, training, and needs, and how these can best serve your potential students. </span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">If you have no experience teaching young kids, you may find an ESL job teaching kindergarten exhausting, which won’t allow you to be the best teacher possible. Likewise, if you’re a trained elementary school teacher, the rigor and precision of teaching adult learners may challenge you in ways you didn’t anticipate (or want). </span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">Some </span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teaching-jobs-abroad"><span data-dcnode-id="557" instrument_node="">ESL teaching jobs abroad</span></a><span data-dcnode-id="555" instrument_node=""> will only require you to teach one age group, while others will expect you to hop around a bit, so you may be teaching first grade one day and business English the next. Investigate what you’re signing up for, ask specific questions if you’re unclear from an organization’s recruitment materials, and be prepared to “shop around” for a program that will suit your skills and help you help your students best. </span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">Avoid going into your ESL teaching job with a "one size fits all" mindset. Whichever age group you teach, you can’t go wrong with a </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/blog/teach-abroad-esl-lesson-planning"><span data-dcnode-id="551" instrument_node="">solid lesson plan</span></a><span data-dcnode-id="549" instrument_node="">, patience, and an understanding of your students’ goals and needs. Take your job seriously and your students will too!</span></p><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span><h3 class="block__title -secondary" data-dcnode-id="543" id="paragraph-item-88230"><span data-dcnode-id="544" instrument_node="">
Some recommended programs:</span></h3><span data-dcnode-id="542" instrument_node="">

</span><li data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">

</span><li data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">

</span><li data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">
</span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/china/teach-away-inc/29570"><span data-dcnode-id="526" instrument_node="">Teach Away</span></a><span data-dcnode-id="524" instrument_node=""> seeks teachers for students spanning from pre-K to adults in China.</span></li><span data-dcnode-id="522" instrument_node="">
</span><li data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">
</span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/japan/jetprogramme/29157"><span data-dcnode-id="520" instrument_node="">The Jet Programme</span></a><span data-dcnode-id="518" instrument_node=""> lets teachers choose between teaching in public schools or in local government offices in Japan.</span></li><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">
If you’re unable to travel at this point in your life or career but still want to teach ESL to students abroad, look into the variety of </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gooverseas.com/teach-abroad/online"><span data-dcnode-id="514" instrument_node="">online teaching jobs</span></a><span data-dcnode-id="512" instrument_node=""> available.</span></li><span data-dcnode-id="510" instrument_node="">
</span></ul><span data-dcnode-id="508" instrument_node="">
</span></div><span data-dcnode-id="506" instrument_node="">
</span><div class="text" data-dcnode-id="501"><p data-dcnode-id="503"><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">This article was originally published in October 2013, and it was updated in January 2021.</span></em></p><span data-dcnode-id="502" instrument_node="">
