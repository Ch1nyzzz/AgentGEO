</span><span class="cat-links" data-dcnode-id="2573"><span class="screen-reader-text" data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Posted in</span></span><span data-dcnode-id="2582" instrument_node=""> </span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/exam-preparation-class/" rel="category tag"><span data-dcnode-id="2581" instrument_node="">Exam Preparation Class</span></a><span data-dcnode-id="2579" instrument_node="">, </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="2578" instrument_node="">Proficiency</span></a><span data-dcnode-id="2576" instrument_node="">, </span><a data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/reading-classes/" rel="category tag"><span data-dcnode-id="2575" instrument_node="">Reading Classes</span></a></span><span data-dcnode-id="2572" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="2569"><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/10/26/c2-proficiency-exam-technique-reading-part-7/" rel="bookmark"><span data-dcnode-id="2571" instrument_node="">C2 Proficiency: Exam Technique – Reading Part 7</span></a></h2><span data-dcnode-id="2568" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2553"><span data-dcnode-id="2567" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2560"><span data-dcnode-id="2566" instrument_node="">Posted on </span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/10/26/c2-proficiency-exam-technique-reading-part-7/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2564" datetime="2021-10-26T13:03:36+00:00"><span data-dcnode-id="2565" instrument_node="">October 26, 2021</span></time><time class="updated" data-dcnode-id="2562" datetime="2021-10-26T13:03:56+00:00"><span data-dcnode-id="2563" instrument_node="">October 26, 2021</span></time></a></span><span class="byline" data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2556"><a class="url fn n" data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="2558" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="2554" instrument_node=""> </span></div><span data-dcnode-id="2551" instrument_node="">
</span></header><span data-dcnode-id="2548" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2512"><span data-dcnode-id="2547" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2542"><figure class="alignleft is-resized" data-dcnode-id="2543"><img alt="C2 Proficiency de Inglés (CPE) del Cambridge: Cómo Aprobarlo | TURBOLANGS" class="jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2546" data-lazy-loaded="1" data-recalc-dims="1" height="236" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg%3Fresize%3D287%252C236%26ssl%3D1&amp;raw" width="287"><noscript data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg?resize=287%2C236&amp;#038;ssl=1" alt="C2 Proficiency de Inglés (CPE) del Cambridge: Cómo Aprobarlo | TURBOLANGS" width="287" height="236" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">This is a lesson plan for C2 students preparing to take the Cambridge Proficiency exam. Students will learn exam techniques to tackle part 7 of paper 1, the multiple matching exercise. The example task is taken from CUP test book 1. Download the PowerPoint and task below:</span></p><span data-dcnode-id="2538" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2533"><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/10/proficiency-reading-part-7-technique.pptx" id="wp-block-file--media-4d9001ae-4af6-463c-bcd7-351f0e20f342"><span data-dcnode-id="2537" instrument_node="">proficiency-reading-part-7-technique</span></a><a aria-describedby="wp-block-file--media-4d9001ae-4af6-463c-bcd7-351f0e20f342" class="wp-block-file__button" data-dcnode-id="2534" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/10/proficiency-reading-part-7-technique.pptx"><span data-dcnode-id="2535" instrument_node="">Download</span></a></div><span data-dcnode-id="2532" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2527"><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/10/work-life-balance-text.pdf" id="wp-block-file--media-b2449054-7eb0-403d-859c-ad23702bcdf5"><span data-dcnode-id="2531" instrument_node="">work-life-balance-text</span></a><a aria-describedby="wp-block-file--media-b2449054-7eb0-403d-859c-ad23702bcdf5" class="wp-block-file__button" data-dcnode-id="2528" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/10/work-life-balance-text.pdf"><span data-dcnode-id="2529" instrument_node="">Download</span></a></div><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2523"><strong data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Procedure</span></strong></p><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Lead students through the steps in the PowerPoint. Students should focus on the list of questions first, underlining key words and trying to paraphrase the questions into simpler language where possible. The PowerPoint contains some examples of paraphrasing. Students should then tackle the reading texts in order while referring back to their notes. Encourage them to underline the parts of the text that they think answer each question. </span></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Students should complete the first paraphrasing exercise in pairs. Then for the reading, they should work individually, set a time limit of 15 minutes for them to complete the exercise. Students should then compare their answers and show their partner the sections of the text that they have underlined for each question. </span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">You will find the answer key and annotated copy of the texts on the final slides of the PowerPoint. You should set students another part 7 for homework so that they can put the technique into practice.</span></p><span data-dcnode-id="2513" instrument_node="">
</span></div><span data-dcnode-id="2510" instrument_node="">
</span></article><span data-dcnode-id="2507" instrument_node="">

</span><span class="cat-links" data-dcnode-id="2410"><span class="screen-reader-text" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Posted in</span></span><span data-dcnode-id="2419" instrument_node=""> </span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/conversation-classes/" rel="category tag"><span data-dcnode-id="2418" instrument_node="">Conversation Classes</span></a><span data-dcnode-id="2416" instrument_node="">, </span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/exam-preparation-class/" rel="category tag"><span data-dcnode-id="2415" instrument_node="">Exam Preparation Class</span></a><span data-dcnode-id="2413" instrument_node="">, </span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="2412" instrument_node="">Proficiency</span></a></span><span data-dcnode-id="2409" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="2406"><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/05/25/c2-proficiency-diy-speaking-long-turn-topics/" rel="bookmark"><span data-dcnode-id="2408" instrument_node="">C2 Proficiency: DIY Speaking Long Turn Topics</span></a></h2><span data-dcnode-id="2405" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2392"><span data-dcnode-id="2404" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">Posted on </span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/05/25/c2-proficiency-diy-speaking-long-turn-topics/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="2401" datetime="2021-05-25T12:44:18+00:00"><span data-dcnode-id="2402" instrument_node="">May 25, 2021</span></time></a></span><span class="byline" data-dcnode-id="2394"><span data-dcnode-id="2398" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2395"><a class="url fn n" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="2397" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="2393" instrument_node=""> </span></div><span data-dcnode-id="2390" instrument_node="">
</span></header><span data-dcnode-id="2387" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2337"><span data-dcnode-id="2386" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2381"><figure class="alignleft is-resized" data-dcnode-id="2382"><img alt="C2 Proficiency de Inglés (CPE) del Cambridge: Cómo Aprobarlo | TURBOLANGS" class="jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2385" data-lazy-loaded="1" data-recalc-dims="1" height="228" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg%3Fresize%3D278%252C228%26ssl%3D1&amp;raw" width="278"><noscript data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg?resize=278%2C228&amp;#038;ssl=1" alt="C2 Proficiency de Inglés (CPE) del Cambridge: Cómo Aprobarlo | TURBOLANGS" width="278" height="228" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">This is a lesson plan for students preparing to take the Cambridge C2 Proficiency exam. Students create their own topic cards for part 3 of the speaking exam; the dreaded long turn! Download the handout and examples below:</span></p><span data-dcnode-id="2377" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2372"><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/cpe-diy-part-3.docx"><span data-dcnode-id="2376" instrument_node="">cpe-diy-part-3</span></a><a class="wp-block-file__button" data-dcnode-id="2373" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/cpe-diy-part-3.docx"><span data-dcnode-id="2374" instrument_node="">Download</span></a></div><span data-dcnode-id="2371" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2366"><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/cpe-diy-part-3-examples.docx"><span data-dcnode-id="2370" instrument_node="">cpe-diy-part-3-examples</span></a><a class="wp-block-file__button" data-dcnode-id="2367" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/cpe-diy-part-3-examples.docx"><span data-dcnode-id="2368" instrument_node="">Download</span></a></div><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2362"><strong data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Procedure</span></strong></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2357"><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2013/03/09/cpe-long-turn-practice-class/"><span data-dcnode-id="2360" instrument_node="">You could use this lesson plan</span></a><span data-dcnode-id="2358" instrument_node=""> to introduce the long turn, give students a chance to practice and go over some useful language before they make their own topic cards.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Print and cut out the example cards, these examples were created by my C2 group. As you can see they came up with some thought provoking topics that are definitely more engaging than some of the run-of-the-mill topics from most text books.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Put students in pairs and have them complete a timed long turn each to get them warmed up to the task. </span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Then give them a set of blank cards each (candidate A &amp; B) and have them work together to create two topic cards with a main question and three bullet points. Tell them that their classmates are going to use their topic cards so they should choose engaging, open topics. Give them 3-5 minutes to do this. In the exam, after candidate A has finished their long turn, candidate B is asked a shorter question in response to what candidate A has just said, so you could have your students write a question for candidate B on the back of A’s card and vice versa for candidate B.</span></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Have them pass their newly created cards to another pair so that everyone has a set created by another group. Instruct them to keep practicing two-minute long turns using the new cards. Then encourage students to give feedback to the group who wrote the topic card; was it easy to talk about for two minutes? Did the bullet points help? Could anything be clarified? </span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Students then pass the cards to another group, rinse and repeat. Students will get lots of practice for this part of the exam on topics chosen by their peers.</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">I was really impressed by the questions my group came up with, there weren’t too many softballs in there. Comment below with some of the topics and bullet points your students come up with and I’ll add them to the example doc, that we can create a big list of topic cards for future use.</span></p><span data-dcnode-id="2338" instrument_node="">
</span></div><span data-dcnode-id="2335" instrument_node="">
</span></article><span data-dcnode-id="2332" instrument_node="">

</span><div class="wp-block-image" data-dcnode-id="2286"><figure class="alignleft is-resized" data-dcnode-id="2287"><img alt="4,881 Joker Card Illustrations &amp; Clip Art - iStock" class="jetpack-lazy-image" data-dcnode-id="2290" data-lazy-src="https://media.istockphoto.com/vectors/playing-card-joker-yellow-red-blue-black-vector-id1153852267?k=6&amp;m=1153852267&amp;s=612x612&amp;w=0&amp;h=lJ_yzQPwTcIMyaZq5uow3GU7mqENc7X-yH1WMWPCLIg%3D&amp;is-pending-load=1" height="208" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.istockphoto.com/vectors/playing-card-joker-yellow-red-blue-black-vector-id1153852267%3Fk%3D6%26m%3D1153852267%26s%3D612x612%26w%3D0%26h%3DlJ_yzQPwTcIMyaZq5uow3GU7mqENc7X-yH1WMWPCLIg%3D&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="150"><noscript data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">&lt;img loading="lazy" src="https://media.istockphoto.com/vectors/playing-card-joker-yellow-red-blue-black-vector-id1153852267?k=6&amp;amp;m=1153852267&amp;amp;s=612x612&amp;amp;w=0&amp;amp;h=lJ_yzQPwTcIMyaZq5uow3GU7mqENc7X-yH1WMWPCLIg=" alt="4,881 Joker Card Illustrations &amp;amp; Clip Art - iStock" width="150" height="208" /&gt;</span></noscript></figure></div><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">This is a fun revision activity I have designed for my C2 students to revise some of the vocabulary we have studied this year. It’s based on a series of lesson plans and activities I have used throughout the course, all of which you can find on the blog. Download the student handout, answer key and PowerPoint below:</span></p><span data-dcnode-id="2282" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2277"><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/revision-pub-quiz.pptx"><span data-dcnode-id="2281" instrument_node="">revision-pub-quiz – PowerPoint</span></a><a class="wp-block-file__button" data-dcnode-id="2278" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/revision-pub-quiz.pptx"><span data-dcnode-id="2279" instrument_node="">Download</span></a></div><span data-dcnode-id="2276" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2271"><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/mega-revision-pub-quiz.docx"><span data-dcnode-id="2275" instrument_node="">mega-revision-pub-quiz – questions</span></a><a class="wp-block-file__button" data-dcnode-id="2272" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/mega-revision-pub-quiz.docx"><span data-dcnode-id="2273" instrument_node="">Download</span></a></div><span data-dcnode-id="2270" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2265"><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/mega-revision-pub-quiz-answers.docx"><span data-dcnode-id="2269" instrument_node="">mega-revision-pub-quiz-answers</span></a><a class="wp-block-file__button" data-dcnode-id="2266" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/05/mega-revision-pub-quiz-answers.docx"><span data-dcnode-id="2267" instrument_node="">Download</span></a></div><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Show students the PowerPoint that will explain the rules. They should work in pairs or groups of 3 and come up with a team name. The second slide will explain the concept of a joker round. Each team can play their joker round once to get double points in one round, but they must decide when they want to play their card before they see the questions. So each team must decide when to use their joker round before the quiz starts based on the titles of the different categories. Make a note of the round each group has chosen for their joker before starting the quiz.</span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Give out the student handout and give them 5 minutes to complete round 1, if covid restrictions allow you could then have them pass their papers to the next team in order to correct them, if not, they can correct their own. </span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">The winning team is the one with the most points at the end of the 8 rounds!</span></p><span data-dcnode-id="2255" instrument_node="">
</span></div><span data-dcnode-id="2252" instrument_node="">
</span></article><span data-dcnode-id="2249" instrument_node="">
</span><article class="post-3783 post type-post status-publish format-standard hentry category-advanced-c1 category-conversation-classes category-proficiency-2 tag-advanced tag-c1 tag-c2 tag-conversation-activities-adults tag-conversation-topics tag-conversations-topics-for-teenagers tag-culture tag-entertainment tag-exam-preparation tag-proficiency tag-speaking tag-where-do-you-stand" data-dcnode-id="2122" id="post-3783"><span data-dcnode-id="2248" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2212"><span data-dcnode-id="2247" instrument_node="">
</span><span class="cat-links" data-dcnode-id="2235"><span class="screen-reader-text" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Posted in</span></span><span data-dcnode-id="2244" instrument_node=""> </span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/advanced-c1/" rel="category tag"><span data-dcnode-id="2243" instrument_node="">Advanced C1</span></a><span data-dcnode-id="2241" instrument_node="">, </span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/conversation-classes/" rel="category tag"><span data-dcnode-id="2240" instrument_node="">Conversation Classes</span></a><span data-dcnode-id="2238" instrument_node="">, </span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="2237" instrument_node="">Proficiency</span></a></span><span data-dcnode-id="2234" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="2231"><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/04/13/where-do-you-stand-entertainment-culture/" rel="bookmark"><span data-dcnode-id="2233" instrument_node="">Where do you Stand? Entertainment &amp; Culture</span></a></h2><span data-dcnode-id="2230" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2215"><span data-dcnode-id="2229" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2222"><span data-dcnode-id="2228" instrument_node="">Posted on </span><a data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/04/13/where-do-you-stand-entertainment-culture/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2226" datetime="2021-04-13T11:03:16+00:00"><span data-dcnode-id="2227" instrument_node="">April 13, 2021</span></time><time class="updated" data-dcnode-id="2224" datetime="2021-04-13T11:03:35+00:00"><span data-dcnode-id="2225" instrument_node="">April 13, 2021</span></time></a></span><span class="byline" data-dcnode-id="2217"><span data-dcnode-id="2221" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2218"><a class="url fn n" data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="2220" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="2216" instrument_node=""> </span></div><span data-dcnode-id="2213" instrument_node="">
</span></header><span data-dcnode-id="2210" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2125"><span data-dcnode-id="2209" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2204"><figure class="alignleft is-resized" data-dcnode-id="2205"><img alt="Entertainment And Culture Icon Set High-Res Vector Graphic - Getty Images" class="jetpack-lazy-image" data-dcnode-id="2208" data-lazy-src="https://media.gettyimages.com/vectors/entertainment-and-culture-icon-set-vector-id466103921?is-pending-load=1" height="265" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gettyimages.com/vectors/entertainment-and-culture-icon-set-vector-id466103921&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="269"><noscript data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">&lt;img loading="lazy" src="https://media.gettyimages.com/vectors/entertainment-and-culture-icon-set-vector-id466103921" alt="Entertainment And Culture Icon Set High-Res Vector Graphic - Getty Images" width="269" height="265" /&gt;</span></noscript></figure></div><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">This is another edition of my “Where do you Stand?” conversation series. Students debate different topics related to entertainment and culture but must rate the opinion on a scale from 1-6 before they begin the discussion. </span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2199" instrument_node="">The PowerPoint contains examples of language of opinion, agreement and disagreement designed with C1 students in mind. If you are teaching lower level students, you could just use the student handout. </span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2016/06/08/fce-speaking-phrases/"><span data-dcnode-id="2198" instrument_node="">You can download a B2 phrase sheet here.</span></a></p><span data-dcnode-id="2195" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2190"><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/04/where-do-you-stand-entertainment-culture.docx"><span data-dcnode-id="2194" instrument_node="">where-do-you-stand-entertainment-culture</span></a><a class="wp-block-file__button" data-dcnode-id="2191" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/04/where-do-you-stand-entertainment-culture.docx"><span data-dcnode-id="2192" instrument_node="">Download</span></a></div><span data-dcnode-id="2189" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2184"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/04/where-do-you-stand-entertainmentculture-pp.pptx"><span data-dcnode-id="2188" instrument_node="">where-do-you-stand-entertainmentculture-pp</span></a><a class="wp-block-file__button" data-dcnode-id="2185" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/04/where-do-you-stand-entertainmentculture-pp.pptx"><span data-dcnode-id="2186" instrument_node="">Download</span></a></div><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Here are the topics students discuss:</span></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">The book is always better than the film.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">There are too many sequels and spin-off films these days. There aren’t many original stories.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><div class="wp-container-1 wp-block-group" data-dcnode-id="2129"><div class="wp-block-group__inner-container" data-dcnode-id="2130"><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">The original version of a song is always the best.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Celebrities shouldn’t complain about being in the public eye. It’s part of the jobNetflix will kill the cinema.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">You shouldn’t watch films on your phone. It ruins the experience.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Watching a film at the cinema is always better than at home.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Violent films and videogames should be banned.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Music, art and drama should be compulsory subjects at school.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Social media companies should be responsible for the content that users post on their platforms.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Children shouldn’t play with “violent” toys like guns and weapons.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Something is always lost when a text is translated.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Physical books will disappear one day.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Governments should be allowed to censor some elements of the media including books and films.</span></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">The benefits of social media platforms outweigh the negative aspects.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Sports involving animals (hunting, horse riding, bullfighting, etc.) are an important part of my culture and must be protected.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Watching too much television makes you stupid.</span></p><span data-dcnode-id="2131" instrument_node="">
</span></div></div><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2127"></p><span data-dcnode-id="2126" instrument_node="">
</span></div><span data-dcnode-id="2123" instrument_node="">
</span></article><span data-dcnode-id="2120" instrument_node="">
</span><article class="post-3769 post type-post status-publish format-standard hentry category-advanced-c1 category-grammar-classes category-proficiency-2 tag-advanced tag-advanced-grammar tag-c1 tag-c2 tag-engaging-grammar-activities tag-grammar tag-inversion tag-parenthood tag-parenting tag-proficiency" data-dcnode-id="1807" id="post-3769"><span data-dcnode-id="2119" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2083"><span data-dcnode-id="2118" instrument_node="">
</span><span class="cat-links" data-dcnode-id="2106"><span class="screen-reader-text" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Posted in</span></span><span data-dcnode-id="2115" instrument_node=""> </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/advanced-c1/" rel="category tag"><span data-dcnode-id="2114" instrument_node="">Advanced C1</span></a><span data-dcnode-id="2112" instrument_node="">, </span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/grammar-classes/" rel="category tag"><span data-dcnode-id="2111" instrument_node="">Grammar Classes</span></a><span data-dcnode-id="2109" instrument_node="">, </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="2108" instrument_node="">Proficiency</span></a></span><span data-dcnode-id="2105" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="2102"><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/03/25/c1-c2-inversions-a-weekend-off/" rel="bookmark"><span data-dcnode-id="2104" instrument_node="">C1/C2: Inversions – A Weekend Off!</span></a></h2><span data-dcnode-id="2101" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2086"><span data-dcnode-id="2100" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2093"><span data-dcnode-id="2099" instrument_node="">Posted on </span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/03/25/c1-c2-inversions-a-weekend-off/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2097" datetime="2021-03-25T13:04:17+00:00"><span data-dcnode-id="2098" instrument_node="">March 25, 2021</span></time><time class="updated" data-dcnode-id="2095" datetime="2022-03-25T13:26:35+00:00"><span data-dcnode-id="2096" instrument_node="">March 25, 2022</span></time></a></span><span class="byline" data-dcnode-id="2088"><span data-dcnode-id="2092" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2089"><a class="url fn n" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="2091" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="2087" instrument_node=""> </span></div><span data-dcnode-id="2084" instrument_node="">
</span></header><span data-dcnode-id="2081" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1810"><span data-dcnode-id="2080" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2074"><span data-dcnode-id="2079" instrument_node="">
</span><figure class="alignleft is-resized" data-dcnode-id="2075"><img alt="Stressed and tired new parents with screaming newborn baby por Rob and  Julia Campbell - Stocksy United" class="jetpack-lazy-image" data-dcnode-id="2078" data-lazy-src="https://i0.wp.com/c.stocksy.com/a/sOX200/z9/605050.jpg?resize=263%2C175&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="175" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/c.stocksy.com/a/sOX200/z9/605050.jpg%3Fresize%3D263%252C175%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="263"><noscript data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/c.stocksy.com/a/sOX200/z9/605050.jpg?resize=263%2C175&amp;#038;ssl=1" alt="Stressed and tired new parents with screaming newborn baby por Rob and  Julia Campbell - Stocksy United" width="263" height="175" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">This is a grammar lesson focusing on inversions based around the topic of the stresses of parenthood. Students read a text about new parents who get a weekend off, then transform the text using inversions. Download the handout and teacher’s notes below.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2065"><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/03/a-weekend-off-student-handout.docx" id="wp-block-file--media-e078716c-af41-4fc8-bf17-8848ba82a817"><span data-dcnode-id="2069" instrument_node="">a-weekend-off-student-handout</span></a><a aria-describedby="wp-block-file--media-e078716c-af41-4fc8-bf17-8848ba82a817" class="wp-block-file__button" data-dcnode-id="2066" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.files.wordpress.com/2021/03/a-weekend-off-student-handout.docx"><span data-dcnode-id="2067" instrument_node="">Download</span></a></div><span data-dcnode-id="2064" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2059"><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/03/a-weekend-off-teachers-notes.docx" id="wp-block-file--media-c68d8d30-b964-4905-aa3c-e9207c37b9ad"><span data-dcnode-id="2063" instrument_node="">a-weekend-off-teachers-notes</span></a><a aria-describedby="wp-block-file--media-c68d8d30-b964-4905-aa3c-e9207c37b9ad" class="wp-block-file__button" data-dcnode-id="2060" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.files.wordpress.com/2021/03/a-weekend-off-teachers-notes.docx"><span data-dcnode-id="2061" instrument_node="">Download</span></a></div><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2055"><strong data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Possible Follow-up</span></strong></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">As a follow-up to this lesson plan, you might want to revise inverted conditionals with your C1 students. To do so, you could use this great worksheet created by Andrew Farmer @andrewfarmer80:</span></p><span data-dcnode-id="2051" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2045"><object aria-label="Embed of Inverted-conditionals-1." class="wp-block-file__embed" data="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/03/Inverted-conditionals-1.pdf&amp;raw" data-dcnode-id="2050" style="width:100%;height:600px" type="application/pdf"></object><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/03/Inverted-conditionals-1.pdf" id="wp-block-file--media-f4d5b973-54c1-4551-b6d6-b65e3bc26e56"><span data-dcnode-id="2049" instrument_node="">Inverted-conditionals-1</span></a><a aria-describedby="wp-block-file--media-f4d5b973-54c1-4551-b6d6-b65e3bc26e56" class="wp-block-file__button" data-dcnode-id="2046" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/03/Inverted-conditionals-1.pdf"><span data-dcnode-id="2047" instrument_node="">Download</span></a></div><span data-dcnode-id="2044" instrument_node="">
</span><h2 data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">A Weekend Off: Teacher’s Notes</span></h2><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">This lesson plan is designed to be used in several ways depending on your students’ level. The grammar focus is inversions, a structure that typically comes up at C1.</span></p><span data-dcnode-id="2038" instrument_node="">
</span><h3 data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Lead-in</span></h3><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Write these questions on the board and have students discuss them in groups:</span></p><span data-dcnode-id="2032" instrument_node="">
</span><ul data-dcnode-id="2025"><li data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">How does life change when you have kids?</span></li><li data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">How can other family members help with childcare?</span></li><li data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">What things do you think new parents miss about their old life?</span></li></ul><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Feedback in open class and top up language. Somethings that came up with my students were:</span></p><span data-dcnode-id="2021" instrument_node="">
</span><ul data-dcnode-id="2004"><li data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Suffer from sleep deprivation</span></li><li data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">loss/lack of intimacy</span></li><li data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Changing dirty nappies/diapers</span></li><li data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Pick kids up from kindergarten/nursery</span></li><li data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Grandparents help out, lend/give you a hand</span></li><li data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Financial struggles</span></li><li data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Look after/take care of kids</span></li><li data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Babysit – babysitter/nanny</span></li></ul><span data-dcnode-id="2003" instrument_node="">
</span><h3 data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Reading</span></h3><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Give out the text, fold the page so that they can’t see the grammar focus part yet, or just share the text if you’re teaching online.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Instruct students to read the text and find the answers to the lead in questions for the couple the text describes:</span></p><span data-dcnode-id="1994" instrument_node="">
</span><ul data-dcnode-id="1987"><li data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">How has their life changed?</span></li><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">How do their family members help with childcare?</span></li><li data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">What things do they miss about their old lives?</span></li></ul><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Feedback in open class.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><h3 data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Language Focus + Controlled Practice</span></h3><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Here is where you can choose a different path depending on how familiar your students are with inversions.</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1974"><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">C1 – Introduction to inversions</span></em></p><span data-dcnode-id="1973" instrument_node="">
</span><ul data-dcnode-id="1926"><li data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Lead them through the different types of inversions listed below the text.</span></li><li data-dcnode-id="1953"><span data-dcnode-id="1970" instrument_node="">Compare and contrast inverted sentences with uninverted ones:</span><ul data-dcnode-id="1954"><li data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">This phone can take photos and videos.</span></li><li data-dcnode-id="1957"><strong data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Not only</span></strong><span data-dcnode-id="1965" instrument_node=""> </span><strong data-dcnode-id="1962"><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">can this phone</span></em></strong><span data-dcnode-id="1961" instrument_node=""> take photos, </span><strong data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">but also</span></strong><span data-dcnode-id="1958" instrument_node=""> videos.</span></li><li data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Add emphasis, more formal.</span></li></ul></li><li data-dcnode-id="1931"><span data-dcnode-id="1952" instrument_node="">Highlight what we mean by “inversion”</span><ul data-dcnode-id="1932"><li data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Position of subject and auxiliary verb is inverted/switched</span></li><li data-dcnode-id="1943"><strong data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">This phone (subject)</span></strong><span data-dcnode-id="1947" instrument_node=""> </span><strong data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">can (auxiliary verb)</span></strong><span data-dcnode-id="1944" instrument_node=""> take photos….</span></li><li data-dcnode-id="1933"><strong data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Not only</span></strong><span data-dcnode-id="1940" instrument_node=""> </span><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">can (aux verb)</span></strong><span data-dcnode-id="1937" instrument_node=""> </span><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">this phone (subject)</span></strong><span data-dcnode-id="1934" instrument_node=""> take photos….</span></li></ul></li><li data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Tell students that the first paragraph contains 10 sentences that can be changed to use inversions and challenge them to change them.</span></li><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">There are 6 more in the second paragraph.</span></li></ul><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1922"><em data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">C1 – Inversion Revision</span></em></p><span data-dcnode-id="1921" instrument_node="">
</span><ul data-dcnode-id="1916"><li data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Challenge them to change the 10 sentences in the first paragraph (or all 16 in the whole text) using the language focus boxes as reference. Monitor and help out as needed.</span></li><li data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">The sentence stems at the bottom will help them identify which sentences they need to change.</span></li></ul><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1912"><em data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">C2 – Inversion Revision Super Challenge</span></em></p><span data-dcnode-id="1911" instrument_node="">
</span><ul data-dcnode-id="1906"><li data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Just give them the text, don’t give them language focus boxes for reference or the sentence stems! Tell them there are 16 sentences that can be changed to inversions and see how they get on.</span></li><li data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Give out the language focus boxes if needed, monitor specific groups, maybe not everyone needs it.</span></li></ul><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1901"><strong data-dcnode-id="1902"><em data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Task Check</span></em></strong></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1897"><em data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Show them the second version of the text with all the inversions.</span></em></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1853"><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Rarely do we</span></strong><span data-dcnode-id="1893" instrument_node=""> have much time to ourselves. </span><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">So busy is </span></strong><span data-dcnode-id="1890" instrument_node="">our schedule that we just can’t find the time to get out of the house. </span><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Not only do</span></strong><span data-dcnode-id="1887" instrument_node=""> my husband and I both work full time, </span><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">but we also</span></strong><span data-dcnode-id="1884" instrument_node=""> have two small kids to look after. </span><strong data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Little did I know</span></strong><span data-dcnode-id="1881" instrument_node=""> that my parents were planning a special surprise for me this weekend. </span><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Only when</span></strong><span data-dcnode-id="1878" instrument_node=""> I walked in the front door on Friday night </span><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">did I discover</span></strong><span data-dcnode-id="1875" instrument_node=""> what they had planned. </span><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">No sooner had</span></strong><span data-dcnode-id="1872" instrument_node=""> I opened the door </span><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">than</span></strong><span data-dcnode-id="1869" instrument_node=""> they appeared with a bottle of wine and the news that they were taking the kids to the local theme park for the weekend. Obviously the kids were ecstatic, </span><strong data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">not since</span></strong><span data-dcnode-id="1866" instrument_node=""> they were four years old </span><strong data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">have they</span></strong><span data-dcnode-id="1863" instrument_node=""> been to the theme park and that was just for 1 day, now they were going for a whole weekend! </span><strong data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">So grateful were</span></strong><span data-dcnode-id="1860" instrument_node=""> we that we gave my mum and dad a massive hug. However, there had to be some ground rules for the kids. We told them that </span><strong data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">under no circumstances should they</span></strong><span data-dcnode-id="1857" instrument_node=""> annoy grandma and grandad and </span><strong data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">on no account must they eat</span></strong><span data-dcnode-id="1854" instrument_node=""> too many sweets before going on the roller coasters.</span></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1818"><strong data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Hardly had</span></strong><span data-dcnode-id="1849" instrument_node=""> my parents left the house </span><strong data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">when</span></strong><span data-dcnode-id="1846" instrument_node=""> we opened the bottle of wine and sat on the sofa enjoying the sudden peace and quiet. </span><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Not until</span></strong><span data-dcnode-id="1843" instrument_node=""> we sat down </span><strong data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">did we realise</span></strong><span data-dcnode-id="1840" instrument_node=""> how tired we were. </span><strong data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Hardly ever do we get</span></strong><span data-dcnode-id="1837" instrument_node=""> a chance to watch a movie together over a glass of wine. However, </span><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">barely had</span></strong><span data-dcnode-id="1834" instrument_node=""> we chosen a movie and started watching it </span><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">when</span></strong><span data-dcnode-id="1831" instrument_node=""> we both fell asleep. </span><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Not until</span></strong><span data-dcnode-id="1828" instrument_node=""> the next morning when we woke up </span><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">did we appreciate</span></strong><span data-dcnode-id="1825" instrument_node=""> how quiet the house was. </span><strong data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Not since</span></strong><span data-dcnode-id="1822" instrument_node=""> our second daughter was born </span><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">had we had</span></strong><span data-dcnode-id="1819" instrument_node=""> the house to ourselves. We didn’t know what to do with ourselves!</span></p><span data-dcnode-id="1817" instrument_node="">
</span><h3 data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Freer Production</span></h3><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Challenge students to work in groups to continue the story. How did the couple spend the rest of their weekend off? Set them a time limit of ten minutes and encourage them to use as many inversions as they can.</span></p><span data-dcnode-id="1811" instrument_node="">
</span></div><span data-dcnode-id="1808" instrument_node="">
</span></article><span data-dcnode-id="1805" instrument_node="">

</span><span class="posted-on" data-dcnode-id="1780"><span data-dcnode-id="1784" instrument_node="">Posted on </span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/02/26/discussion-where-do-you-stand-animal-rights/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1782" datetime="2021-02-26T19:19:52+00:00"><span data-dcnode-id="1783" instrument_node="">February 26, 2021</span></time></a></span><span class="byline" data-dcnode-id="1775"><span data-dcnode-id="1779" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1776"><a class="url fn n" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="1778" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="1774" instrument_node=""> </span></div><span data-dcnode-id="1771" instrument_node="">

</span><div class="entry-content" data-dcnode-id="1537"><span data-dcnode-id="1767" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1762"><figure class="alignleft is-resized" data-dcnode-id="1763"><img alt="Animal Rights Advocates | LinkedIn" class="jetpack-lazy-image" data-dcnode-id="1766" data-lazy-src="https://media-exp1.licdn.com/dms/image/C4E1BAQEt1SKgHBjfcA/company-background_10000/0/1519799998073?e=2159024400&amp;v=beta&amp;t=IaHEAtsBl-Pv_TSVFw0VSdTmQusUSRQBto7AopD1qik&amp;is-pending-load=1" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media-exp1.licdn.com/dms/image/C4E1BAQEt1SKgHBjfcA/company-background_10000/0/1519799998073%3Fe%3D2159024400%26v%3Dbeta%26t%3DIaHEAtsBl-Pv_TSVFw0VSdTmQusUSRQBto7AopD1qik&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="408"><noscript data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">&lt;img loading="lazy" src="https://media-exp1.licdn.com/dms/image/C4E1BAQEt1SKgHBjfcA/company-background_10000/0/1519799998073?e=2159024400&amp;amp;v=beta&amp;amp;t=IaHEAtsBl-Pv_TSVFw0VSdTmQusUSRQBto7AopD1qik" alt="Animal Rights Advocates | LinkedIn" width="408" height="200" /&gt;</span></noscript></figure></div><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">This is a discussion topic for B2+ students on the topic of animal rights. Download the student handout and PowerPoint below:</span></p><span data-dcnode-id="1758" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1753"><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/where-do-you-stand-animal-rights-pp.pptx"><span data-dcnode-id="1757" instrument_node="">where-do-you-stand-animal-rights-pp</span></a><a class="wp-block-file__button" data-dcnode-id="1754" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/where-do-you-stand-animal-rights-pp.pptx"><span data-dcnode-id="1755" instrument_node="">Download</span></a></div><span data-dcnode-id="1752" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1747"><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/where-do-you-stand-animal-rights.docx"><span data-dcnode-id="1751" instrument_node="">where-do-you-stand-animal-rights</span></a><a class="wp-block-file__button" data-dcnode-id="1748" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/where-do-you-stand-animal-rights.docx"><span data-dcnode-id="1749" instrument_node="">Download</span></a></div><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">The PowerPoint contains advanced language for expressing opinion, personalising the topic, agreeing and disagreeing. It was made with C1/C2 students in mind. If you’re teaching lower levels, the student handout may be more suitable, although I recommend supplementing it with a phrase sheet, perhaps try my FCE Speaking Phrases post.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Put students into small groups (3/4) or conduct the activity as an open class discussion. Before engaging in discussion on the topics, students must decide individually to what extent they agree or disagree with the given statement by circling one of the numbers from 1-6. The idea is that students will be more likely to take a stand and defend their point of view and less able to go along with the crowd if they’ve assigned their opinion a numerical value. </span></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">You could also introduce the phrase “to play devil’s advocate” and encourage students do it during the discussion. Another idea could be to assign a specific student from each group as the devil’s advocate for each topic, thus forcing them to come up with counter arguments to what their classmates are saying.</span></p><span data-dcnode-id="1737" instrument_node="">

</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">A simple worksheet and discussion activity in which students look at 21 different phrasal verbs featuring either up or down. Download the student handout and answer key below, follow the link at the bottom of the post for a Kahoot game based on the target language:</span></p><span data-dcnode-id="1481" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1476"><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/student-handout_phrasal-verbs-with-up-down.docx"><span data-dcnode-id="1480" instrument_node="">student-handout_phrasal-verbs-with-up-down</span></a><a class="wp-block-file__button" data-dcnode-id="1477" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/student-handout_phrasal-verbs-with-up-down.docx"><span data-dcnode-id="1478" instrument_node="">Download</span></a></div><span data-dcnode-id="1475" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1470"><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/key_-phrasal-verbs-with-up-down.docx"><span data-dcnode-id="1474" instrument_node="">key_-phrasal-verbs-with-up-down</span></a><a class="wp-block-file__button" data-dcnode-id="1471" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/key_-phrasal-verbs-with-up-down.docx"><span data-dcnode-id="1472" instrument_node="">Download</span></a></div><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1468"></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1464"><strong data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Procedure</span></strong></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Put students into pairs or small groups and have them try to guess the preposition required to complete the sentence. It could be up or down.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Check answers in open class, then have students match the phrasal verbs with the definitions.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Have students test each other, one says a definition, the other recalls the phrasal verb.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Have students ask and answer the discussion questions in their groups</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1448"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Kahoot</span></strong></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node="">Use </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//create.kahoot.it/share/phrasal-verbs-with-up-and-down/1647e058-0be4-4f8d-9822-99efe6fe052a"><span data-dcnode-id="1445" instrument_node="">this Kahoot game</span></a><span data-dcnode-id="1443" instrument_node=""> for spaced repetition: </span></p><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1438" instrument_node="">
