</span><span class="meta-category" data-dcnode-id="1728"><a class="category-46" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/vocabulary/"><span data-dcnode-id="1730" instrument_node="">Vocabulary</span></a></span><span data-dcnode-id="1727" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">English Idioms about Family</span></h1><span data-dcnode-id="1724" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1720"><div class="meta-item comments" data-dcnode-id="1721"><a data-dcnode-id="1722" href="#respond"><span data-dcnode-id="1723" instrument_node="">Add Comment</span></a></div></div><span data-dcnode-id="1719" instrument_node="">
</span></header><span data-dcnode-id="1717" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1066"><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Here comes another post in our idioms series. Idioms are made up of a group of words and their meaning are often unpredictable. It is advisable to make use of idioms when learning a language, especially in communication because they help us sound natural. They are also the shortest way to express some specific terms for which there are no other words.</span></p><div data-dcnode-id="1710" data-inserter-version="2" id="ezoic-pub-ad-placeholder-120"></div><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Our topic today is about beloved people who are closest to every of us. Yes, you are right: our idioms are discussing family members (and related issues). For now, let’s dig deep into these useful expressions.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1695"><span class="novashare-pinterest-image" data-dcnode-id="1696"><img alt="English Idioms about Family" class="size-full wp-image-9511 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1704" data-lazy-loaded="1" height="333" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/wp-content/uploads/2020/04/Idioms-about-family.jpg&amp;raw" title="English Idioms about Family Idioms about family" width="550"><noscript data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">&lt;img class="size-full wp-image-9511 aligncenter" src="https://learnenglishfunway.com/wp-content/uploads/2020/04/Idioms-about-family.jpg" alt="English Idioms about Family" width="550" height="333" title="English Idioms about Family Idioms about family"&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1697" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Flearnenglishfunway.com%2Fenglish-idioms-about-family%2F&amp;media=https://learnenglishfunway.com/wp-content/uploads/2020/04/Idioms-about-family.jpg&amp;description=English%20Idioms%20about%20Family" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1700" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1701" fill="currentColor"></path></svg><span data-dcnode-id="1698" style="margin-left: 4px;"><span data-dcnode-id="1699" instrument_node="">Pin</span></span></span></span></p><div data-dcnode-id="1693" data-inserter-version="2" id="ezoic-pub-ad-placeholder-128"></div><span data-dcnode-id="1691" instrument_node="">
</span><h2 data-dcnode-id="1687"><span class="ez-toc-section" data-dcnode-id="1690" id="1_Idioms_About_Family_Members_In_General"></span><span data-dcnode-id="1689" instrument_node="">1. Idioms About Family Members In General</span><span class="ez-toc-section-end" data-dcnode-id="1688"></span></h2><div class="ez-toc-v2_0_19 counter-hierarchy" data-dcnode-id="1653" id="ez-toc-container"><span data-dcnode-id="1686" instrument_node="">
</span><div class="ez-toc-title-container" data-dcnode-id="1678"><span data-dcnode-id="1685" instrument_node="">
</span><p class="ez-toc-title" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Table of Contents</span></p><span data-dcnode-id="1682" instrument_node="">
</span><span class="ez-toc-title-toggle" data-dcnode-id="1679"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="1680" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="1681"></i></a></span></div><span data-dcnode-id="1677" instrument_node="">
</span><nav data-dcnode-id="1654"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="1655"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1674"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="1675" href="#1_Idioms_About_Family_Members_In_General" title="1. Idioms About Family Members In General"><span data-dcnode-id="1676" instrument_node="">1. Idioms About Family Members In General</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1671"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="1672" href="#2_Idioms_About_Family_Roles" title="2. Idioms About Family Roles"><span data-dcnode-id="1673" instrument_node="">2. Idioms About Family Roles</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1668"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="1669" href="#3_Idioms_About_Family_Tradition" title="3. Idioms About Family Tradition"><span data-dcnode-id="1670" instrument_node="">3. Idioms About Family Tradition</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1665"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="1666" href="#4_Idioms_About_Marriage" title="4. Idioms About Marriage"><span data-dcnode-id="1667" instrument_node="">4. Idioms About Marriage</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1662"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="1663" href="#5_Idioms_About_Children" title="5. Idioms About Children"><span data-dcnode-id="1664" instrument_node="">5. Idioms About Children</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1659"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="1660" href="#6_Idioms_About_Family_Closeness" title="6. Idioms About Family Closeness"><span data-dcnode-id="1661" instrument_node="">6. Idioms About Family Closeness</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1656"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1657" href="#Conclusion" title="Conclusion"><span data-dcnode-id="1658" instrument_node="">Conclusion</span></a></li></ul></nav></div><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1645"><strong data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Spitting image</span></strong><span data-dcnode-id="1649" instrument_node="">: When you say a person is the </span><i data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">spitting image</span></i><span data-dcnode-id="1646" instrument_node=""> of someone else, you mean they look exactly the same. This idiom often refers to members within a family.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1643" instrument_node="">Example: She is the </span><i data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">spitting image</span></i><span data-dcnode-id="1640" instrument_node=""> of her deceased mother.</span></p><div data-dcnode-id="1637" data-inserter-version="2" id="ezoic-pub-ad-placeholder-129"></div><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1625"><i data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Be the spitting image of somebody</span></i><span data-dcnode-id="1632" instrument_node=""> can also be replaced with </span><i data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">bear a strong/ close/ striking resemblance to somebody</span></i><span data-dcnode-id="1629" instrument_node=""> and </span><i data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">a chip off the old block</span></i><span data-dcnode-id="1626" instrument_node="">, all of which are common in daily communication.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1617"><strong data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Your (own) flesh and blood</span></strong><span data-dcnode-id="1621" instrument_node="">: If somebody is </span><i data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">your flesh and blood</span></i><span data-dcnode-id="1618" instrument_node="">, he/ she is a relative or family member of yours.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">Example: I cannot believe John treated </span><i data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">his own flesh and blood</span></i><span data-dcnode-id="1612" instrument_node=""> so badly. He is&nbsp; such a polite and charming man.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">You should pay special attention to this idiom so that you will not mistake it for </span><i data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">flesh and blood</span></i><span data-dcnode-id="1606" instrument_node="">, which refers to a normal person.</span></p><div data-dcnode-id="1603" data-inserter-version="2" id="ezoic-pub-ad-placeholder-130"></div><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1597"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Like father, like son</span></strong><span data-dcnode-id="1598" instrument_node="">: This is a common saying and is used to say that a son’s behaviors or characteristics are similar to those of his father.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Example:</span></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">A: Tom is such a mean and opportunist man! His son is no better than that despite his young age.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">B:</span><i data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node=""> Like father, like son</span></i><span data-dcnode-id="1586" instrument_node="">.</span></p><div data-dcnode-id="1583" data-inserter-version="2" id="ezoic-pub-ad-placeholder-131"></div><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1575"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">The apple doesn’t fall/ never falls far from the tree: </span></strong><span data-dcnode-id="1578" instrument_node="">This saying is used to say that a child’s behaviors are usually the same as his/ her parents. It can be seen as the extension of the aforementioned idiom</span><i data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node=""> Like father, like son.</span></i></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1573" instrument_node="">Example: Jane is as vivacious and smart as her mother. It is true that </span><i data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">the apple never falls far from the tree</span></i><span data-dcnode-id="1570" instrument_node="">.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1556" id="attachment_9507" style="width: 625px"><span class="novashare-pinterest-image" data-dcnode-id="1559"><img alt="the apple never falls far from the tree" aria-describedby="caption-attachment-9507" class="size-full wp-image-9507 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1567" data-lazy-loaded="1" height="497" loading="eager" sizes="(max-width: 615px) 100vw, 615px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family.jpeg&amp;raw" srcset="https://learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family.jpeg 615w, https://learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family-600x485.jpeg 600w" title="English Idioms about Family English Idioms about Family" width="615"><noscript data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">&lt;img aria-describedby="caption-attachment-9507" loading="lazy" class="size-full wp-image-9507" src="https://learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family.jpeg" alt="the apple never falls far from the tree" width="615" height="497" srcset="https://learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family.jpeg 615w, https://learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family-600x485.jpeg 600w" sizes="(max-width: 615px) 100vw, 615px" title="English Idioms about Family English Idioms about Family"&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1560" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Flearnenglishfunway.com%2Fenglish-idioms-about-family%2F&amp;media=https://learnenglishfunway.com/wp-content/uploads/2020/04/English-Idioms-about-Family.jpeg&amp;description=English%20Idioms%20about%20Family" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1563" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1564" fill="currentColor"></path></svg><span data-dcnode-id="1561" style="margin-left: 4px;"><span data-dcnode-id="1562" instrument_node="">Pin</span></span></span></span><p class="wp-caption-text" data-dcnode-id="1557" id="caption-attachment-9507"><span data-dcnode-id="1558" instrument_node="">the apple never falls far from the tree</span></p></div><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1552" style="text-align: center;"><em data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span></em></p><div data-dcnode-id="1550" data-inserter-version="2" id="ezoic-pub-ad-placeholder-132"></div><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1545" instrument_node="">
</span><h2 data-dcnode-id="1541"><span class="ez-toc-section" data-dcnode-id="1544" id="2_Idioms_About_Family_Roles"></span><span data-dcnode-id="1543" instrument_node="">2. Idioms About Family Roles</span><span class="ez-toc-section-end" data-dcnode-id="1542"></span></h2><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1531"><strong data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Men make houses, women make homes</span></strong><span data-dcnode-id="1537" instrument_node="">: This proverb means that men are the ones to build houses for the family, while women are responsible for creating a cozy home.</span><br data-dcnode-id="1536"><span data-dcnode-id="1535" instrument_node="">
</span><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Bring home the bacon</span></strong><span data-dcnode-id="1532" instrument_node="">: When you bring home the bacon, you are very successful and in charge of earning money for your family.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1529" instrument_node="">Example: Being a venerable doctor with in-depth knowledge and matchless skills, he always </span><i data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">brings home the bacon.</span></i></p><span data-dcnode-id="1525" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1510" id="attachment_9508" style="width: 520px"><span class="novashare-pinterest-image" data-dcnode-id="1516"><img alt="English Idioms about Family" aria-describedby="caption-attachment-9508" class="wp-image-9508 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1524" data-lazy-loaded="1" height="604" loading="eager" sizes="(max-width: 510px) 100vw, 510px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon.webp&amp;raw" srcset="https://learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon.webp 650w, https://learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon-506x600.webp 506w" title="English Idioms about Family he always brings home the bacon" width="510"><noscript data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">&lt;img aria-describedby="caption-attachment-9508" loading="lazy" class=" wp-image-9508" src="https://learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon.webp" alt="English Idioms about Family" width="510" height="604" srcset="https://learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon.webp 650w, https://learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon-506x600.webp 506w" sizes="(max-width: 510px) 100vw, 510px" title="English Idioms about Family he always brings home the bacon"&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1517" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Flearnenglishfunway.com%2Fenglish-idioms-about-family%2F&amp;media=https://learnenglishfunway.com/wp-content/uploads/2020/04/he-always-brings-home-the-bacon.webp&amp;description=English%20Idioms%20about%20Family" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1520" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1521" fill="currentColor"></path></svg><span data-dcnode-id="1518" style="margin-left: 4px;"><span data-dcnode-id="1519" instrument_node="">Pin</span></span></span></span><p class="wp-caption-text" data-dcnode-id="1514" id="caption-attachment-9508"><span data-dcnode-id="1515" instrument_node="">Men are often entrusted with bringing home the bacon</span></p><div data-dcnode-id="1512" data-inserter-version="2" id="ezoic-pub-ad-placeholder-133"></div></div><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1506"><strong data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Wear the trousers/ pants: This idiom has a disapproving tone, and often refers to a woman who makes most of the decisions in a family.</span></strong></p><span data-dcnode-id="1505" instrument_node="">
</span><div data-dcnode-id="1491" style="clear:both; margin-top:1em; margin-bottom:1em;"><a class="uc7757ef84862681cb90b00619bcbf9f2" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/habibi-meaning-what-is-the-meaning-of-habibi/" rel="dofollow" target="_blank"><div class="centered-text-area" data-dcnode-id="1494"><div class="centered-text" data-dcnode-id="1495" style="float: left;"><div class="uc7757ef84862681cb90b00619bcbf9f2-content" data-dcnode-id="1496"><span class="ctaText" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">LEARN MORE:</span></span><span data-dcnode-id="1499" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Habibi Meaning - What Is The Meaning Of Habibi ?</span></span></div></div></div><div class="ctaButton" data-dcnode-id="1493"></div></a></div><p data-dcnode-id="1484"><strong data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Example</span></strong><span data-dcnode-id="1488" instrument_node="">: A: I wonder who </span><i data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">wears the pants</span></i><span data-dcnode-id="1485" instrument_node=""> in the relationship.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">B: Isn’t it obvious that she always makes important decisions?</span></p><span data-dcnode-id="1480" instrument_node="">
</span><h2 data-dcnode-id="1476"><span class="ez-toc-section" data-dcnode-id="1479" id="3_Idioms_About_Family_Tradition"></span><span data-dcnode-id="1478" instrument_node="">3. Idioms About Family Tradition</span><span class="ez-toc-section-end" data-dcnode-id="1477"></span></h2><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1471"><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Follow in somebody’s footsteps</span></strong><span data-dcnode-id="1472" instrument_node="">: This idiom means “doing a job somebody did before”, especially a member within your family.</span></p><div data-dcnode-id="1469" data-inserter-version="2" id="ezoic-pub-ad-placeholder-134"></div><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">Example: Though she is into fine arts, she decides to become a doctor, </span><i data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">following in her dad’s footsteps</span></i><span data-dcnode-id="1463" instrument_node="">.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">One small note: For the sake of completeness, remember to include the preposition “in” when you use this expression in writing and speaking. Many learners tend to omit “in” because we often say “follow me” or “follow the rules”.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1457" instrument_node="">You can also relate this expression with </span><i data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">from father to son</span></i><span data-dcnode-id="1454" instrument_node="">, which means “from a generation of a family to the next”. For instance: Tom’s family’s tradition of making fine watches has been passed down </span><i data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">from father to son</span></i><span data-dcnode-id="1451" instrument_node="">.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1442"><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Run in the family</span></strong><span data-dcnode-id="1446" instrument_node="">: If something </span><i data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">runs in the family</span></i><span data-dcnode-id="1443" instrument_node="">, it is a common feature of that family.</span></p><div data-dcnode-id="1440" data-inserter-version="2" id="ezoic-pub-ad-placeholder-135"></div><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1437" instrument_node="">Example: Cardiovascular diseases </span><i data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">run in the family.</span></i></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1426"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Be/ Run in somebody’s blood</span></strong><span data-dcnode-id="1430" instrument_node="">: When you say a characteristic </span><i data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">is/ runs in somebody’s blood</span></i><span data-dcnode-id="1427" instrument_node="">, you mean it is his/ her (family’s) nature.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">Example: Greed </span><i data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">runs in his blood</span></i><span data-dcnode-id="1421" instrument_node="">. He is never satisfied with what he has.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1412"><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Black sheep</span></strong><span data-dcnode-id="1416" instrument_node="">: If a person is described as a </span><i data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">black sheep</span></i><span data-dcnode-id="1413" instrument_node="">, he/ she is considered an embarrassment because of the difference between him/ her and other family members.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">Example: Tom is such a </span><i data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">black sheep</span></i><span data-dcnode-id="1407" instrument_node="">. He is very lazy and short-sighted, which is not the case with his brothers.</span></p><div data-dcnode-id="1404" data-inserter-version="2" id="ezoic-pub-ad-placeholder-136"></div><span data-dcnode-id="1402" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1390" id="attachment_9509" style="width: 660px"><span class="novashare-pinterest-image" data-dcnode-id="1393"><img alt="English Idioms about Family" aria-describedby="caption-attachment-9509" class="wp-image-9509 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1401" data-lazy-loaded="1" height="406" loading="eager" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms.webp&amp;raw" srcset="https://learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms.webp 650w, https://learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms-600x375.webp 600w" title="English Idioms about Family family idioms" width="650"><noscript data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">&lt;img aria-describedby="caption-attachment-9509" loading="lazy" class="wp-image-9509 size-full" src="https://learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms.webp" alt="English Idioms about Family" width="650" height="406" srcset="https://learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms.webp 650w, https://learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms-600x375.webp 600w" sizes="(max-width: 650px) 100vw, 650px" title="English Idioms about Family family idioms"&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1394" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Flearnenglishfunway.com%2Fenglish-idioms-about-family%2F&amp;media=https://learnenglishfunway.com/wp-content/uploads/2020/04/family-idioms.webp&amp;description=English%20Idioms%20about%20Family" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1397" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1398" fill="currentColor"></path></svg><span data-dcnode-id="1395" style="margin-left: 4px;"><span data-dcnode-id="1396" instrument_node="">Pin</span></span></span></span><p class="wp-caption-text" data-dcnode-id="1391" id="caption-attachment-9509"><span data-dcnode-id="1392" instrument_node="">It hurts when you are called a black sheep, doesn’t it?</span></p></div><span data-dcnode-id="1389" instrument_node="">
</span><h2 data-dcnode-id="1385"><span class="ez-toc-section" data-dcnode-id="1388" id="4_Idioms_About_Marriage"></span><span data-dcnode-id="1387" instrument_node="">4. Idioms About Marriage</span><span class="ez-toc-section-end" data-dcnode-id="1386"></span></h2><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">Pop the question: When you </span><i data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">pop the question</span></i><span data-dcnode-id="1380" instrument_node="">, you ask for someone to marry you.</span></strong></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1376" instrument_node="">Example: A: I could not believe my ears when Jane told that Steve </span><i data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">popped the question</span></i><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">.</span></strong><span data-dcnode-id="1371" instrument_node=""> He seems so reserved that I think he is shy with girls.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1368" instrument_node="">B: Don’t judge a book by its cover.</span><br data-dcnode-id="1367"><span data-dcnode-id="1366" instrument_node="">
</span><strong data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">Tie the knot: This is an informal alternative to </span><i data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">get married</span></i><span data-dcnode-id="1362" instrument_node="">, and it is also in wide use.</span></strong></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1358" instrument_node="">Example: Only after they </span><i data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">tied the knot</span></i><span data-dcnode-id="1355" instrument_node=""> did the husband show </span><i data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">his true colors</span></i><span data-dcnode-id="1352" instrument_node="">. (Check out our </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/learn-english-idioms-with-colors/" rel="noopener" target="_blank"><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">idioms about colors</span></strong></a><span data-dcnode-id="1348" instrument_node=""> here to know what “his true colors” means)</span><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node="">
</span><strong data-dcnode-id="1338"><span data-dcnode-id="1345" instrument_node="">Made in heaven: </span><i data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Made in heaven</span></i><span data-dcnode-id="1342" instrument_node=""> is used to say that a relationship (especially a marriage) seems to be perfect. One of the most popular combinations is </span><i data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">match made in heaven</span></i><span data-dcnode-id="1339" instrument_node="">.</span></strong></p><div data-dcnode-id="1335" data-inserter-version="2" id="ezoic-pub-ad-placeholder-137"></div><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1332" instrument_node="">Example: Lily and James are really a </span><i data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">match made in heaven</span></i><span data-dcnode-id="1329" instrument_node="">. They have everything in common, from hobbies, lifestyle to ways of thinking.</span><br data-dcnode-id="1328"><span data-dcnode-id="1327" instrument_node="">
</span><strong data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">Confirmed bachelor: A bachelor is a man who has never been married, and a </span><i data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">confirmed bachelor</span></i><span data-dcnode-id="1323" instrument_node=""> is a man who has no intention of getting married. More often than not, this phrase is considered the language of newspapers and used to mention a gay man.</span></strong></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1319" instrument_node="">Example: He shows no interest in girls and is a</span><i data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node=""> confirmed bachelor</span></i><span data-dcnode-id="1316" instrument_node="">. One more interesting expression with bachelor is</span><i data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node=""> eligible bachelor</span></i><span data-dcnode-id="1313" instrument_node="">. Many people want to marry an </span><i data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">eligible bachelor</span></i><span data-dcnode-id="1310" instrument_node="">, especially because he is very wealthy.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><div data-dcnode-id="1294" style="clear:both; margin-top:1em; margin-bottom:1em;"><a class="u166210cfe76d388d9e9d7cf8b398ce4e" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/imk-the-meaning-of-imk-with-useful-illustrations/" rel="dofollow" target="_blank"><div class="centered-text-area" data-dcnode-id="1297"><div class="centered-text" data-dcnode-id="1298" style="float: left;"><div class="u166210cfe76d388d9e9d7cf8b398ce4e-content" data-dcnode-id="1299"><span class="ctaText" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">LEARN MORE:</span></span><span data-dcnode-id="1302" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">IMK Meaning - What Does IMK Mean?</span></span></div></div></div><div class="ctaButton" data-dcnode-id="1296"></div></a></div><h2 data-dcnode-id="1290"><span class="ez-toc-section" data-dcnode-id="1293" id="5_Idioms_About_Children"></span><span data-dcnode-id="1292" instrument_node="">5. Idioms About Children</span><span class="ez-toc-section-end" data-dcnode-id="1291"></span></h2><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1286"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Spare the rod and spoil the child: This proverb is used to say that if you do not punishes a child when he/ she behaves badly or do something wrong, he/ she cannot distinguish between right and wrong.</span></strong></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1281"><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Example:&nbsp;</span></strong><span data-dcnode-id="1282" instrument_node="">A: It distressed me to discipline Tom – he is so small.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1279" instrument_node="">B: I understand your feelings, but punishments do him good. You know: </span><i data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Spare the rod and spoil the child</span></i><span data-dcnode-id="1276" instrument_node="">.</span></p><div data-dcnode-id="1273" data-inserter-version="2" id="ezoic-pub-ad-placeholder-138"></div><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1265"><strong data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">Sleep like a baby: If somebody </span><i data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">sleeps like a baby</span></i><span data-dcnode-id="1267" instrument_node="">, he/ she sleeps very well.</span></strong></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1263" instrument_node="">Example: After the trip, my younger brother was so tired that he </span><i data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">slept like a baby.</span></i></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1252"><i data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Sleep like a log</span></i><span data-dcnode-id="1256" instrument_node=""> is a possible substitute for </span><i data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">sleep like a baby</span></i><span data-dcnode-id="1253" instrument_node="">.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1239" id="attachment_9510" style="width: 610px"><span class="novashare-pinterest-image" data-dcnode-id="1242"><img alt="English Idioms about Family" aria-describedby="caption-attachment-9510" class="size-full wp-image-9510 jetpack-lazy-image" data-dcnode-id="1250" data-lazy-src="https://learnenglishfunway.com/wp-content/uploads/2020/04/sleep-like-a-log-idiom.jpg?is-pending-load=1" height="460" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnenglishfunway.com/wp-content/uploads/2020/04/sleep-like-a-log-idiom.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="English Idioms about Family sleep like a log idiom" width="600"><noscript data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">&lt;img aria-describedby="caption-attachment-9510" loading="lazy" class="size-full wp-image-9510" src="https://learnenglishfunway.com/wp-content/uploads/2020/04/sleep-like-a-log-idiom.jpg" alt="English Idioms about Family" width="600" height="460" title="English Idioms about Family sleep like a log idiom"&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1243" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Flearnenglishfunway.com%2Fenglish-idioms-about-family%2F&amp;media=https://learnenglishfunway.com/wp-content/uploads/2020/04/sleep-like-a-log-idiom.jpg&amp;description=English%20Idioms%20about%20Family" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1246" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1247" fill="currentColor"></path></svg><span data-dcnode-id="1244" style="margin-left: 4px;"><span data-dcnode-id="1245" instrument_node="">Pin</span></span></span></span><p class="wp-caption-text" data-dcnode-id="1240" id="caption-attachment-9510"><span data-dcnode-id="1241" instrument_node="">Many people find it hard to sleep like a baby.</span></p></div><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1234"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Born with a silver spoon in your mouth</span></strong><span data-dcnode-id="1235" instrument_node="">: A child is said to be born with a silver spoon in his mouth when he/ she has rich parents.</span></p><div data-dcnode-id="1232" data-inserter-version="2" id="ezoic-pub-ad-placeholder-139"></div><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Example:</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">A: Did you see Jane’s outfit at the prom last night? It was so magnificent that I could not believe my eyes.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1223" instrument_node="">B: No surprise, as she is </span><i data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">born with a silver spoon in her mouth.</span></i></p><span data-dcnode-id="1219" instrument_node="">
</span><h2 data-dcnode-id="1215"><span class="ez-toc-section" data-dcnode-id="1218" id="6_Idioms_About_Family_Closeness"></span><span data-dcnode-id="1217" instrument_node="">6. Idioms About Family Closeness</span><span class="ez-toc-section-end" data-dcnode-id="1216"></span></h2><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">East or West, home is best</span></strong><span data-dcnode-id="1211" instrument_node="">: This saying means “No matter where you go, your home is always the best place for you to return.”</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1206"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Example:</span></strong></p><div data-dcnode-id="1204" data-inserter-version="2" id="ezoic-pub-ad-placeholder-140"></div><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">A: He had traveled a lot throughout his life, but spent the last years of his life in his hometown.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1198" instrument_node="">B: It is understandable. </span><i data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">East or West, home is best.</span></i></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1190"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Blood is thicker than water</span></strong><span data-dcnode-id="1191" instrument_node="">: This saying means that the bonds among family members are stronger than those of any other relationships.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Example:</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">A: If your brother and your best friend got into a fight, who would you support.</span></p><div data-dcnode-id="1182" data-inserter-version="2" id="ezoic-pub-ad-placeholder-141"></div><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1179" instrument_node="">B: Of course I would stand up for my brother. </span><i data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Blood is thicker than water!</span></i></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1171"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Home is where the heart is:</span></strong><span data-dcnode-id="1172" instrument_node=""> This saying emphasizes the importance of family members. Wherever they are, it is your home.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Example:</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">A: Bill moves to the countryside to live with his parents, although his career is budding in the city.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">B</span><i data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">: Home is where the heart is</span></i><span data-dcnode-id="1160" instrument_node="">.</span></p><div data-dcnode-id="1157" data-inserter-version="2" id="ezoic-pub-ad-placeholder-142"></div><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1151"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">(Come) hell or high water</span></strong><span data-dcnode-id="1152" instrument_node="">: This idiom means “despite any difficulties”. In fact, it can be used in various kinds of context, and family is a suitable topic to put it in use.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">Example: He knows that his sister will never leave him, </span><i data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">come high or high water</span></i><span data-dcnode-id="1146" instrument_node="">.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><h2 data-dcnode-id="1140"><span class="ez-toc-section" data-dcnode-id="1143" id="Conclusion"></span><span data-dcnode-id="1142" instrument_node="">Conclusion</span><span class="ez-toc-section-end" data-dcnode-id="1141"></span></h2><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Above are useful and popular idioms about family, ranging from members to such issues as traditions and roles. We hope you have obtained some expressions, and are able to put them into practice.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">There are various English idioms that may come in handy in your daily lives, and making use of them makes you sound much more natural. Great news is that such idioms are compiled in our posts, so you will not have to look for them from other sources. All you need is time and effort, without which you will never achieve success. Acquiring proficiency in English is a long process, but we are always here to help you, and look forward to your progress.</span></p><span data-dcnode-id="1133" instrument_node="">
