s.com/wp-content/uploads/2022/04/image-2.png?resize=480%2C300&amp;ssl=1 480w" width="329"><noscript data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">&lt;img data-attachment-id="4472" data-permalink="https://freeenglishlessonplans.com/2022/04/19/1st-class-back-after-easter-speaking-long-turn/image-2-8/" data-orig-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?fit=720%2C450&amp;amp;ssl=1" data-orig-size="720,450" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="image-2" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?fit=300%2C188&amp;amp;ssl=1" data-large-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?fit=720%2C450&amp;amp;ssl=1" src="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?resize=329%2C206&amp;#038;ssl=1" alt="" class="wp-image-4472" width="329" height="206" srcset="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?w=720&amp;amp;ssl=1 720w, https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?resize=300%2C188&amp;amp;ssl=1 300w, https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/04/image-2.png?resize=480%2C300&amp;amp;ssl=1 480w" sizes="(max-width: 329px) 100vw, 329px" data-recalc-dims="1" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="3721" instrument_node="">
</span><p data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Some quick speaking activities combining chatting about Easter holidays with some practice for exam speaking tasks. Download the PowerPoints and handout below:</span></p><span data-dcnode-id="3718" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="3713"><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Easter-Holidays-Collaborative-Speaking.pptx" id="wp-block-file--media-e53a109e-7b2b-4e73-afa4-39bca936b320"><span data-dcnode-id="3717" instrument_node="">Easter-Holidays-Collaborative-Speaking</span></a><a aria-describedby="wp-block-file--media-e53a109e-7b2b-4e73-afa4-39bca936b320" class="wp-block-file__button" data-dcnode-id="3714" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Easter-Holidays-Collaborative-Speaking.pptx"><span data-dcnode-id="3715" instrument_node="">Download</span></a></div><span data-dcnode-id="3712" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="3707"><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Long-Turn-Easter-Holidays.pptx" id="wp-block-file--media-12a72d4c-5823-4d75-81f8-c654ee6ad834"><span data-dcnode-id="3711" instrument_node="">Long-Turn-Easter-Holidays</span></a><a aria-describedby="wp-block-file--media-12a72d4c-5823-4d75-81f8-c654ee6ad834" class="wp-block-file__button" data-dcnode-id="3708" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Long-Turn-Easter-Holidays.pptx"><span data-dcnode-id="3709" instrument_node="">Download</span></a></div><span data-dcnode-id="3706" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="3700"><object aria-label="Embed of Proficiency-Speaking-Long-Turn-UPDATE.docx." class="wp-block-file__embed" data="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Proficiency-Speaking-Long-Turn-UPDATE.docx.pdf&amp;raw" data-dcnode-id="3705" style="width:100%;height:600px" type="application/pdf"></object><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Proficiency-Speaking-Long-Turn-UPDATE.docx.pdf" id="wp-block-file--media-0ecee21e-1921-41ca-815d-7a55dcf88a91"><span data-dcnode-id="3704" instrument_node="">Proficiency-Speaking-Long-Turn-UPDATE.docx</span></a><a aria-describedby="wp-block-file--media-0ecee21e-1921-41ca-815d-7a55dcf88a91" class="wp-block-file__button" data-dcnode-id="3701" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/04/Proficiency-Speaking-Long-Turn-UPDATE.docx.pdf"><span data-dcnode-id="3702" instrument_node="">Download</span></a></div><span data-dcnode-id="3699" instrument_node="">
</span><p data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">The long turn task is modelled on the C2 Proficiency speaking part 3 in which students have to speak for 2 minutes about a given topic with 3 bullet points to guide them. Give out the speaking phrases and go over the “cheat sheet” of useful expressions on the first slide. Then put students in pairs and have them take it in turns to complete the task seeing who can use the most expressions, they need to speak on their own for 2 minutes. Once they have finished they should find 5 similarities between their Easter holiday experiences and share them with the class. </span></p><span data-dcnode-id="3696" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">Alternatively, if you want something more collaborative, I’ve added a C1 Advanced part 3 style task in a separate PowerPoint. Students should first look at the cheat sheet, clear up any doubts, then have them answer the central question in pairs. You could then give them a further question: “which of these 5 types of activities do you appreciate doing most in your holidays.”</span></p><span data-dcnode-id="3693" instrument_node="">
</span><div data-dcnode-id="3692" id="atatags-462056621-6265f7abad24f"></div><span data-dcnode-id="3691" instrument_node="">
</span><span data-dcnode-id="3688" instrument_node=""> </span></div><span data-dcnode-id="3685" instrument_node="">

</span><ol data-dcnode-id="2764" type="1"><li data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Which member(s) of your family do you …….. the closest resemblance to?</span></li><li data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Are you the kind of person that often feels green with …….. about your friends’ achievements or possessions? Do you think it’s normal to have these feelings? What can we do about them?</span></li><li data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">If you’re feeling …….. in the mouth, how do you cheer yourself up? Are you someone who tends to look on the bright ……..? Or do you have a more gloomy outlook on life?</span></li><li data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Think of a place you’ve visited that was a far …….. from the place where you grew up. How was it different? Was it a good different or a bad different?</span></li><li data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">If you have to talk to someone about a difficult subject, do you tend to get ……… to the point, beat around the bush or avoid confrontation altogether? What are the pros and cons of each approach?</span></li><li data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Think of a celebrity who has recently ……… the record straight about something they did or said in the past. What happened? Do you think they were right to speak out?</span></li><li data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">When a person becomes extremely successful or famous, how much of their success do you think can be ……… down to luck and how much is about real talent?</span></li><li data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">What’s the best customer service you’ve ever received? A place where the staff couldn’t ……… been more attentive. How did it make you feel? Does your country generally have good customer service?</span></li><li data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Have you ever ……… off on the wrong foot with someone and had to start ………? Did you then go on to become good friends with that person?</span></li><li data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Which of your skills/abilities do you pride yourself ………? Why do you think people tend to be overly modest or hide their best talents and abilities?</span></li><li data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Have you ever ……… a glimpse of a really famous celebrity? Where were you? What was the celebrity doing? If you could live that moment again, would you do anything differently?</span></li><li data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Think of an example of a famous person who is no longer at the height ……… their success. What are they doing now? Do you feel sorry for them?</span></li><li data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Are you someone who tends to ……… up to facts when they’re staring you in the face? Or are you sometimes in denial?</span></li><li data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">“I’m not averse ……… going to the cinema by myself.” – Is this true for you? What are the pros and cons of going to see a film alone?</span></li><li data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">Did/do you work your ……… off at school or uni? Or just coast along doing the bare minimum?</span></li><li data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">How can the parents of a new girl/boyfriend ……… you at ease the first time you meet them? Have you ever been in this situation? How did it feel?</span></li></ol><span data-dcnode-id="2763" instrument_node="">

</span><p data-dcnode-id="2164"><span data-dcnode-id="2169" instrument_node="">Sadly, he’s just </span><strong data-dcnode-id="2166"><u data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">not cut out to be</span></u></strong><span data-dcnode-id="2165" instrument_node=""> a professional basketball player.</span></p><span data-dcnode-id="2163" instrument_node="">
</span><ol data-dcnode-id="2160" start="8" type="1"><li data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Do you think you’re cut out to be a professional sportsperson? Why? Why not? What skills/traits do you think you’re lacking?</span></li></ol><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2158" instrument_node="">He </span><strong data-dcnode-id="2155"><u data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">came in for</span></u></strong><span data-dcnode-id="2154" instrument_node=""> a lot of </span><strong data-dcnode-id="2151"><u data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">criticism</span></u></strong><span data-dcnode-id="2150" instrument_node=""> after his comments to the press.</span></p><span data-dcnode-id="2148" instrument_node="">
</span><ol data-dcnode-id="2145" start="9" type="1"><li data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Think of a celebrity who has come in for a lot of criticism recently. What did they do? Do you think the criticism was deserved? What’s your opinion of cancel culture?</span></li></ol><span data-dcnode-id="2144" instrument_node="">
</span></div><span data-dcnode-id="2141" instrument_node="">
</span></article><span data-dcnode-id="2138" instrument_node="">

" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="2111"><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/23/word-formation-noughts-crosses/" rel="bookmark"><span data-dcnode-id="2113" instrument_node="">Word Formation Noughts &amp; Crosses</span></a></h2><span data-dcnode-id="2110" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2097"><span data-dcnode-id="2109" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">Posted on </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/23/word-formation-noughts-crosses/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="2106" datetime="2022-02-23T17:07:24+00:00"><span data-dcnode-id="2107" instrument_node="">February 23, 2022</span></time></a></span><span class="byline" data-dcnode-id="2099"><span data-dcnode-id="2103" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2100"><a class="url fn n" data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="2102" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="2098" instrument_node=""> </span></div><span data-dcnode-id="2095" instrument_node="">

</span><div class="entry-content" data-dcnode-id="2051"><span data-dcnode-id="2091" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2085"><figure class="alignleft size-large is-resized" data-dcnode-id="2086"><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png%3Fssl%3D1"><img alt="" class="wp-image-4277 jetpack-lazy-image" data-attachment-id="4277" data-comments-opened="1" data-dcnode-id="2090" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-1" data-large-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?fit=372%2C282&amp;ssl=1" data-lazy-src="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?resize=239%2C181&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?fit=300%2C227&amp;ssl=1" data-orig-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?fit=372%2C282&amp;ssl=1" data-orig-size="372,282" data-permalink="https://freeenglishlessonplans.com/image-1-7/" data-recalc-dims="1" height="181" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png%3Fresize%3D239%252C181%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="239"><noscript data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">&lt;img data-attachment-id="4277" data-permalink="https://freeenglishlessonplans.com/image-1-7/" data-orig-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?fit=372%2C282&amp;amp;ssl=1" data-orig-size="372,282" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="image-1" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?fit=300%2C227&amp;amp;ssl=1" data-large-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?fit=372%2C282&amp;amp;ssl=1" loading="lazy" src="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/image-1.png?resize=239%2C181&amp;#038;ssl=1" alt="" class="wp-image-4277" width="239" height="181" data-recalc-dims="1" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">This is a lesson plan for students preparing for the Cambridge main suite exams. I specifically created it with C1 or C2 students in mind but it could easily be adapted to B2. Students practice word formation while playing a game of noughts and crosses. Download the handout below:</span></p><span data-dcnode-id="2081" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="2075"><object aria-label="Embed of word-formation_-noughts-crosses-blog-version." class="wp-block-file__embed" data="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/word-formation_-noughts-crosses-blog-version.pdf&amp;raw" data-dcnode-id="2080" style="width:100%;height:600px;" type="application/pdf"></object><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/word-formation_-noughts-crosses-blog-version.pdf" id="wp-block-file--media-825b9644-b27d-4c1a-b46f-b7c56f202880"><span data-dcnode-id="2079" instrument_node="">word-formation_-noughts-crosses-blog-version</span></a><a aria-describedby="wp-block-file--media-825b9644-b27d-4c1a-b46f-b7c56f202880" class="wp-block-file__button" data-dcnode-id="2076" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/word-formation_-noughts-crosses-blog-version.pdf"><span data-dcnode-id="2077" instrument_node="">Download</span></a></div><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Students play in pairs, they must choose a square on the board where they want to place their token, but they must first correctly complete the corresponding word formation question in order to do so. All of the words are based on the same root word. </span></p><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">If a student answers incorrectly, you could either have the opponent steal the square by answering correctly, or say that the square is now dead and nobody can place a token there. </span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2067" instrument_node="">An alternative game to play with the same 9 questions is </span><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tekhnologic.wordpress.com/2015/09/14/the-football-game/"><span data-dcnode-id="2066" instrument_node="">this great, and very versatile, football game</span></a><span data-dcnode-id="2064" instrument_node=""> by </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tekhnologic.wordpress.com/" rel="nofollow"><span data-dcnode-id="2063" instrument_node="">https://tekhnologic.wordpress.com/</span></a><span data-dcnode-id="2061" instrument_node=""> </span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2058" instrument_node="">As a follow-up you could set your students the task of coming up with their own lists of nine sentences to use in future games. You could give them each a root word (use, communicate, etc.) and send them to the Longman Online Dictionary to look up all the derivatives in order to make their 9 questions: </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ldoceonline.com/" rel="nofollow"><span data-dcnode-id="2057" instrument_node="">https://www.ldoceonline.com/</span></a></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2053"></p><span data-dcnode-id="2052" instrument_node="">
</span></div><span data-dcnode-id="2049" instrument_node="">

</span><article class="post-4233 post type-post status-publish format-standard hentry category-exam-preparation-class category-proficiency-2 category-vocabulary-classes tag-c2 tag-cambridge-c2-proficiency tag-cambridge-exams tag-cpe tag-exam-practice tag-exam-preparation tag-exam-training tag-fixed-expressions tag-lesson-plan tag-open-cloze tag-phrasal-verbs tag-use-of-english-part-2" data-dcnode-id="1952" id="post-4233"><span data-dcnode-id="2045" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2009"><span data-dcnode-id="2044" instrument_node="">
</span><span class="cat-links" data-dcnode-id="2032"><span class="screen-reader-text" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Posted in</span></span><span data-dcnode-id="2041" instrument_node=""> </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/exam-preparation-class/" rel="category tag"><span data-dcnode-id="2040" instrument_node="">Exam Preparation Class</span></a><span data-dcnode-id="2038" instrument_node="">, </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="2037" instrument_node="">Proficiency</span></a><span data-dcnode-id="2035" instrument_node="">, </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/vocabulary-classes/" rel="category tag"><span data-dcnode-id="2034" instrument_node="">Vocabulary Classes</span></a></span><span data-dcnode-id="2031" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="2028"><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/15/c2-proficiency-inverted-open-cloze/" rel="bookmark"><span data-dcnode-id="2030" instrument_node="">C2 Proficiency: Inverted Open Cloze</span></a></h2><span data-dcnode-id="2027" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2012"><span data-dcnode-id="2026" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2019"><span data-dcnode-id="2025" instrument_node="">Posted on </span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/15/c2-proficiency-inverted-open-cloze/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2023" datetime="2022-02-15T15:24:32+00:00"><span data-dcnode-id="2024" instrument_node="">February 15, 2022</span></time><time class="updated" data-dcnode-id="2021" datetime="2022-02-15T15:24:50+00:00"><span data-dcnode-id="2022" instrument_node="">February 15, 2022</span></time></a></span><span class="byline" data-dcnode-id="2014"><span data-dcnode-id="2018" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2015"><a class="url fn n" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="2017" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="2013" instrument_node=""> </span></div><span data-dcnode-id="2010" instrument_node="">
</span></header><span data-dcnode-id="2007" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1955"><span data-dcnode-id="2006" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2001"><figure class="alignleft is-resized" data-dcnode-id="2002"><img alt="C2 Proficiency: Exam Technique – Reading Part 7 – Tim's Free English Lesson  Plans" class="jetpack-lazy-image" data-dcnode-id="2005" data-lazy-src="https://i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg?resize=277%2C227&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="227" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg%3Fresize%3D277%252C227%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="277"><noscript data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg?resize=277%2C227&amp;#038;ssl=1" alt="C2 Proficiency: Exam Technique – Reading Part 7 – Tim&amp;#039;s Free English Lesson  Plans" width="277" height="227" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">This is a lesson plan for C2 proficiency students designed to more fully exploit a use of English part 2 open cloze text. Download the handout below:</span></p><span data-dcnode-id="1997" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1992"><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/c2_-inverted-open-cloze.docx" id="wp-block-file--media-3aa75653-5504-4bd7-a983-0975fea88a3c"><span data-dcnode-id="1996" instrument_node="">c2_-inverted-open-cloze</span></a><a aria-describedby="wp-block-file--media-3aa75653-5504-4bd7-a983-0975fea88a3c" class="wp-block-file__button" data-dcnode-id="1993" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/c2_-inverted-open-cloze.docx"><span data-dcnode-id="1994" instrument_node="">Download</span></a></div><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">The part 2 exercise is taken from the Expert Proficiency Coursebook published by Pearson.</span></p><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Students first complete the exercise from their books, compare answers with a partner and correct the task in open class. The teacher then instructs them to close their books/fold the handout over and try to complete the second “inverted” version. In this version, different words have been removed from the fixed expressions tested in the original text. Other changes have been made in order to fully exploit the text for more high level lexis such as phrasal verbs and fixed expressions. Students can then refer back to the original in order to check their answers.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">You can create your own inverted cloze exercises from any text in your course book. Happy inverting!</span></p><span data-dcnode-id="1982" instrument_node="">
</span><h3 data-dcnode-id="1980" id="inverted-version"><span data-dcnode-id="1981" instrument_node="">Inverted Version</span></h3><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1973"><strong data-dcnode-id="1976"><em data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Cover</span></em></strong><em data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node=""> the original exercise.</span></em></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1966"><strong data-dcnode-id="1969"><em data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Complete</span></em></strong><em data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node=""> this version.</span></em></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">The relationship between the modern consumer and their rubbish is a complex one. Getting (1) ……. of rubbish has come to mean a great (2) ……. more than simply consigning breakfast leftovers (3) ……. a plastic bag. With the advent (4)……. recycling, rubbish has now invaded many people’s personal lives to an unprecedented (5) ……. There was a time, (6) ……. living memory, when rubbish collection was a simple matter – but today’s household rubbish, before being (7) ……., has to be filed and sorted (8) ……. colour-coded containers (9) ……. to its recycling category.</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">What is (10) ……., we are brought (11) ……. in a rash of irritation by the suggestion that, if rubbish collections were to become more infrequent, people would then make the effort to (12) ……. down on shopping and recycle more. We might be excused for wondering (13) ……. this would be possible. Can people realistically buy fewer eggs or (14) ……. of toothpaste than their lives require?</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Recycling is supposed to be good for us. But for some, it’s just a (15) ……. of rubbish.</span></p><span data-dcnode-id="1956" instrument_node="">
</span></div><span data-dcnode-id="1953" instrument_node="">

</span><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">This is a guest post by Soleil García Brito. It’s a Cambridge exam style multiple choice reading activity based on </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/03/25/smarter-living/why-you-procrastinate-it-has-nothing-to-do-with-self-control.html"><span data-dcnode-id="1898" instrument_node="">an article from the New York Times by Charlotte Lieberman on the topic of procrastination.</span></a><span data-dcnode-id="1896" instrument_node=""> Watch this space for another activity on the topic coming soon… Download the handout and teacher’s notes below:</span></p><span data-dcnode-id="1894" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1889"><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/procrastination-reading-and-use-of-english-part-5-students-handout.docx" id="wp-block-file--media-4911c404-45f8-455e-b2ac-8bed976cf60c"><span data-dcnode-id="1893" instrument_node="">procrastination-reading-and-use-of-english-part-5-students-handout</span></a><a aria-describedby="wp-block-file--media-4911c404-45f8-455e-b2ac-8bed976cf60c" class="wp-block-file__button" data-dcnode-id="1890" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/procrastination-reading-and-use-of-english-part-5-students-handout.docx"><span data-dcnode-id="1891" instrument_node="">Download</span></a></div><span data-dcnode-id="1888" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1883"><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/procrastination-reading-and-use-of-english-part-5-teachers-notes.docx" id="wp-block-file--media-202f36e7-a713-4bce-aa57-e41bc7055ee6"><span data-dcnode-id="1887" instrument_node="">procrastination-reading-and-use-of-english-part-5-teachers-notes</span></a><a aria-describedby="wp-block-file--media-202f36e7-a713-4bce-aa57-e41bc7055ee6" class="wp-block-file__button" data-dcnode-id="1884" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/procrastination-reading-and-use-of-english-part-5-teachers-notes.docx"><span data-dcnode-id="1885" instrument_node="">Download</span></a></div><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1879"><strong data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Reading and Use of English – Part 5</span></strong></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1875"><em data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Read the text below and answer the following questions:</span></em></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1873" instrument_node="">Why You Procrastinate (It Has Nothing to Do With Self-Control)</span><em data-dcnode-id="1872"></em></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1867"><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">By Charlotte Lieberman</span></strong></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">If you’ve ever </span><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">put off</span></strong><span data-dcnode-id="1862" instrument_node=""> an important task by, say, alphabetizing your spice drawer, you know it wouldn’t be fair to describe yourself as lazy. After all, alphabetizing requires focus and effort — and hey, maybe you even went the extra mile to wipe down each bottle before putting it back. And it’s not like you’re hanging out with friends or watching Netflix. You’re cleaning — something your parents would be proud of! This isn’t laziness or bad time management. This is procrastination.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1859" instrument_node="">When we procrastinate, we’re not only aware that we’re avoiding the task in question, but also that doing so is probably going to have a </span><strong data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">detrimental</span></strong><span data-dcnode-id="1856" instrument_node=""> effect on our morale. And yet, we do it anyway.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">“This is why we say that procrastination is essentially irrational,” said Dr. Fuschia Sirois, professor of psychology at the University of Sheffield. “It doesn’t make sense to do something you know is going to have negative consequences.” She added: “People engage in this pointless cycle of chronic procrastination because of an inability to manage negative moods associated with a task.”</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1850" instrument_node="">The particular nature of our aversion depends on the given task or situation. It may be due to something </span><strong data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">inherently</span></strong><span data-dcnode-id="1847" instrument_node=""> unpleasant about the task itself — having to clean a dirty bathroom or organizing a long, boring spreadsheet for your boss. But it might also stem from deeper feelings related to the task, such as self-doubt, low self-esteem, anxiety or insecurity. Staring at a blank document, you might be thinking, </span><em data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">I’m not smart enough to write this. Even if I am, what will people think of it? What if I do a bad job?</span></em></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">There’s an entire body of research dedicated to the ruminative, self-blaming thoughts many of us tend to have in the wake of procrastination, which are known as “procrastinatory cognitions.” According to Dr. Sirois, the thoughts we have about procrastination typically exacerbate our distress and stress, which contribute to further procrastination.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">Although procrastination offers momentary relief, Dr. Sirois argues that it is what makes the cycle especially vicious. In the immediate present, </span><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">shelving</span></strong><span data-dcnode-id="1836" instrument_node=""> a task provides relief — “you’ve been rewarded for procrastinating,” Dr. Sirois said. This is precisely why procrastination tends not to be a one-off behavior, but a cycle, one that easily becomes a chronic habit. Over time, chronic procrastination has not only productivity costs, but measurably destructive effects on our mental and physical health, including chronic stress, general psychological distress and low life satisfaction, symptoms of depression and anxiety, unhealthy behavior, chronic illness and even hypertension and cardiovascular disease.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1833" instrument_node="">If it seems ironic that we procrastinate to avoid negative feelings, but end up feeling even worse, that’s because it is. And once again, we have evolution to thank. Procrastination is a perfect example of </span><em data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">present bias</span></em><span data-dcnode-id="1830" instrument_node="">, our </span><strong data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">hard-wired</span></strong><span data-dcnode-id="1827" instrument_node=""> tendency to prioritize short-term needs ahead of long-term ones.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">“We really weren’t designed to think ahead into the further future because we needed to focus on providing for ourselves in the here and now,” said psychologist Dr. Hal Hershfield, a professor of marketing at the U.C.L.A. Anderson School of Management.</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1821" instrument_node="">His research has shown that, on a neural level, we perceive our “future selves” more like strangers than as parts of ourselves. When we procrastinate, parts of our brains actually think that the tasks we’re putting off — and the accompanying negative feelings that </span><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">await</span></strong><span data-dcnode-id="1818" instrument_node=""> us on the other side — are somebody else’s problem.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1815" instrument_node="">The human ability to procrastinate is deeply existential, as it raises questions about individual </span><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">agency</span></strong><span data-dcnode-id="1812" instrument_node=""> and how we want to spend our time as opposed to how we actually do. But it’s also a reminder of our </span><strong data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">commonality</span></strong><span data-dcnode-id="1809" instrument_node=""> — we’re all vulnerable to painful feelings, and most of us just want to be happy with the choices we make. In the end, we have to find a better reward than avoidance — one that can relieve our challenging feelings in the present moment without causing harm to our future selves.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Questions:</span></p><span data-dcnode-id="1804" instrument_node="">
</span><ol data-dcnode-id="1737" type="1"><li data-dcnode-id="1793"><span data-dcnode-id="1803" instrument_node="">In the first paragraph, the author thinks that procrastinating:</span><ol data-dcnode-id="1794"><li data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">doesn’t include activities like cleaning and organizing, because they are productive.</span></li><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">involves focusing on very detailed tasks that require a lot of effort.</span></li><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">should not be equated to laziness.</span></li><li data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">consists of activities like watching Netflix and spending time with friends.</span></li></ol></li><li data-dcnode-id="1782"><span data-dcnode-id="1792" instrument_node="">Why does the author say that procrastination is irrational?</span><ol data-dcnode-id="1783"><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">We are not conscious of the fact that we are about to avoid a task.</span></li><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">We put off the task despite knowing it will affect us negatively.</span></li><li data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">People repeat the same behaviour for no reason.</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Particular tasks evoke strong negative emotions.</span></li></ol></li><li data-dcnode-id="1771"><span data-dcnode-id="1781" instrument_node="">According to the text, where does our reluctance to get on with tasks come from?</span><ol data-dcnode-id="1772"><li data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Deep negative feelings that were once associated with the task.</span></li><li data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Some tasks are gruesome and we want to avoid them.</span></li><li data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">The dullness of some tasks makes us bored and unmotivated.</span></li><li data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">It is probably not contingent on one specific origin.</span></li></ol></li><li data-dcnode-id="1760"><span data-dcnode-id="1770" instrument_node="">What does the article say about the vicious cycle of procrastination?</span><ol data-dcnode-id="1761"><li data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Procrastinating provides an immediate and prolonged sense of relief.</span></li><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">The behaviour only takes place once because it has negative consequences.</span></li><li data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">It is a consequence of the negative effects on our physical and mental health.</span></li><li data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Putting off a task can reinforce the procrastinating behaviour.</span></li></ol></li><li data-dcnode-id="1749"><span data-dcnode-id="1759" instrument_node="">What is the relationship between evolution and procrastination, according to Dr. Hershfield?</span><ol data-dcnode-id="1750"><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Brains have evolved to place current demands above future consequences.</span></li><li data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Procrastination is a product of recent evolution.</span></li><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">It is ironic that we evolved to be procrastinators.</span></li><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">We evolved to avoid negative feelings that may arise in the future.</span></li></ol></li><li data-dcnode-id="1738"><span data-dcnode-id="1748" instrument_node="">What is the neural justification for procrastination, according to Dr. Hershfield’s research?</span><ol data-dcnode-id="1739"><li data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">We avoid thinking about the future, even if it affects us in the present.</span></li><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Putting off a task provides relief from stress and anxiety.</span></li><li data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Our brains assign the responsibility for the task to a different entity.&nbsp;</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">The pursuit of happiness is the most important goal for our brains.</span></li></ol></li></ol><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Language focus:</span></p><span data-dcnode-id="1733" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1671"><table data-dcnode-id="1672"><tbody data-dcnode-id="1673"><tr data-dcnode-id="1726"><td data-dcnode-id="1730"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Phrasal verbs and vocabulary</span></strong></td><td data-dcnode-id="1727"><strong data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Idioms and collocations</span></strong></td></tr><tr data-dcnode-id="1721"><td data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Put off a task/doing something</span></td><td data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">To go the extra mile</span></td></tr><tr data-dcnode-id="1716"><td data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Detrimental effect on/to</span></td><td data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">To stem from</span></td></tr><tr data-dcnode-id="1711"><td data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Inherently (+adjective)</span></td><td data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">In the wake of</span></td></tr><tr data-dcnode-id="1703"><td data-dcnode-id="1706"><span data-dcnode-id="1710" instrument_node="">Shelving (</span><em data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">as a verb</span></em><span data-dcnode-id="1707" instrument_node="">)</span></td><td data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">A one-off (behavior)</span></td></tr><tr data-dcnode-id="1695"><td data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">Hard-wired (</span><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">as an adjective</span></em><span data-dcnode-id="1699" instrument_node="">)</span></td><td data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">To have (something) to thank for</span></td></tr><tr data-dcnode-id="1687"><td data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">Await (</span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">vs wait?</span></em><span data-dcnode-id="1691" instrument_node="">)</span></td><td data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">To raise questions</span></td></tr><tr data-dcnode-id="1679"><td data-dcnode-id="1682"><span data-dcnode-id="1686" instrument_node="">Agency (</span><em data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">as an abstract noun</span></em><span data-dcnode-id="1683" instrument_node="">)</span></td><td data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Prioritize X ahead of Y</span></td></tr><tr data-dcnode-id="1674"><td data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Commonality</span></td><td data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">In the here and now</span></td></tr></tbody></table></figure><span data-dcnode-id="1670" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1627"><span data-dcnode-id="1662" instrument_node="">
</span><span class="cat-links" data-dcnode-id="1650"><span class="screen-reader-text" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Posted in</span></span><span data-dcnode-id="1659" instrument_node=""> </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/exam-preparation-class/" rel="category tag"><span data-dcnode-id="1658" instrument_node="">Exam Preparation Class</span></a><span data-dcnode-id="1656" instrument_node="">, </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="1655" instrument_node="">Proficiency</span></a><span data-dcnode-id="1653" instrument_node="">, </span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/writing-classes/" rel="category tag"><span data-dcnode-id="1652" instrument_node="">Writing Classes</span></a></span><span data-dcnode-id="1649" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="1646"><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/10/c2-proficiency-hooks-for-articles-reviews/" rel="bookmark"><span data-dcnode-id="1648" instrument_node="">C2 Proficiency: Hooks for Articles &amp; Reviews</span></a></h2><span data-dcnode-id="1645" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1630"><span data-dcnode-id="1644" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1637"><span data-dcnode-id="1643" instrument_node="">Posted on </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/10/c2-proficiency-hooks-for-articles-reviews/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1641" datetime="2022-02-10T12:36:12+00:00"><span data-dcnode-id="1642" instrument_node="">February 10, 2022</span></time><time class="updated" data-dcnode-id="1639" datetime="2022-02-10T12:37:18+00:00"><span data-dcnode-id="1640" instrument_node="">February 10, 2022</span></time></a></span><span class="byline" data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1633"><a class="url fn n" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="1635" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="1631" instrument_node=""> </span></div><span data-dcnode-id="1628" instrument_node="">
</span></header><span data-dcnode-id="1625" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1329"><span data-dcnode-id="1624" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1619"><figure class="alignleft is-resized" data-dcnode-id="1620"><img alt="Fishing Hook Stock Photo - Download Image Now - iStock" class="jetpack-lazy-image" data-dcnode-id="1623" data-lazy-src="https://media.istockphoto.com/photos/fishing-hook-picture-id184294812?is-pending-load=1" height="218" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.istockphoto.com/photos/fishing-hook-picture-id184294812&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="138"><noscript data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">&lt;img loading="lazy" src="https://media.istockphoto.com/photos/fishing-hook-picture-id184294812" alt="Fishing Hook Stock Photo - Download Image Now - iStock" width="138" height="218" /&gt;</span></noscript></figure></div><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1617" instrument_node="">My C2 proficiency students have just taken a full mock exam and one of the issues their writings had in common was the lack of “hooks” in their articles and reviews to draw the reader in an encourage them to keep reading. So, I put together this lesson plan, based heavily on </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academicwritingsuccess.com/7-sensational-essay-hooks/%23%3A~%3Atext%3D4.%2Cto%2520something%2520that%2520seems%2520unconnected."><span data-dcnode-id="1616" instrument_node="">this great article by Suzanne Davis. </span></a></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">The final task I set my students is on the topic of fame, so you might want to use my </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/02/01/c1-c2-the-life-of-a-celeb-fame-vocabulary/"><span data-dcnode-id="1611" instrument_node="">“The Life of a Celeb” vocabulary lesson</span></a><span data-dcnode-id="1609" instrument_node=""> before setting it. Download the handout below:</span></p><span data-dcnode-id="1607" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="1602"><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/c2_-writing-engaging-hooks-1.docx" id="wp-block-file--media-04e977df-f90d-4f54-a155-cc6832e10f71"><span data-dcnode-id="1606" instrument_node="">c2_-writing-engaging-hooks-1</span></a><a aria-describedby="wp-block-file--media-04e977df-f90d-4f54-a155-cc6832e10f71" class="wp-block-file__button" data-dcnode-id="1603" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/02/c2_-writing-engaging-hooks-1.docx"><span data-dcnode-id="1604" instrument_node="">Download</span></a></div><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1598"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Procedure</span></strong></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Have students read the opening paragraphs by Gary Provost to each other out loud and ask them to reflect on the message. Encourage them to attempt a similar range of sentence lengths in their own articles.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Have students refer to the 7 steps to success while writing their article for homework.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Lead students through the different types of hook and field questions.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Draw students’ attention to the need to use an engaging title.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Have students read the writing task and underline the content points. Then put them in pairs and have them discuss which hook would work best for this particular task. Then have them choose an expression about fame for their title.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Some possible answers could be:</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Story hook: Imagine the scene, you just want to nip to the shops for a pint of milk but no sooner have you stepped out the door than a mob of paparazzi are hassling you. The constant click, click, click of the shutters, the blinding flashes fill your eyes, it’s enough to make you question if it’s all worth it.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Metaphor hook: Fame is, undoubtedly, a double-edged sword; while it bestows upon you all the riches your heart could desire, it slices away such basic comforts as privacy and anonymity. </span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Quotation hook: As Clive James once said “a life without fame can be a good life, but fame without a life is no life at all”</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1569"></p><span data-dcnode-id="1568" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1562"><figure class="alignleft size-large is-resized" data-dcnode-id="1563"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png%3Fssl%3D1"><img alt="" class="wp-image-4219 jetpack-lazy-image" data-attachment-id="4219" data-comments-opened="1" data-dcnode-id="1567" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="provost-quote" data-large-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?fit=659%2C678&amp;ssl=1" data-lazy-src="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?resize=565%2C581&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?fit=292%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?fit=659%2C678&amp;ssl=1" data-orig-size="659,678" data-permalink="https://freeenglishlessonplans.com/provost-quote/" data-recalc-dims="1" height="581" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png%3Fresize%3D565%252C581%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="565"><noscript data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">&lt;img data-attachment-id="4219" data-permalink="https://freeenglishlessonplans.com/provost-quote/" data-orig-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?fit=659%2C678&amp;amp;ssl=1" data-orig-size="659,678" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="provost-quote" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?fit=292%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?fit=659%2C678&amp;amp;ssl=1" loading="lazy" src="https://i0.wp.com/freeenglishlessonplans.com/wp-content/uploads/2022/02/provost-quote.png?resize=565%2C581&amp;#038;ssl=1" alt="" class="wp-image-4219" width="565" height="581" data-recalc-dims="1" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="1561" instrument_node="">
</span><h3 data-dcnode-id="1558" id="writing-part-2-7-steps-to-success"><a data-dcnode-id="1560"></a><span data-dcnode-id="1559" instrument_node="">Writing Part 2 – 7 Steps to Success</span></h3><span data-dcnode-id="1557" instrument_node="">
</span><ol data-dcnode-id="1508" type="1"><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Read the task, underline content points.</span></li><li data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Organise content points into paragraphs.</span></li><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">WHAT are you going to say? Add notes to paragraphs. STAY ON TOPIC!</span></li><li data-dcnode-id="1522"><span data-dcnode-id="1550" instrument_node="">HOW are you going to say it?</span><ol data-dcnode-id="1523" start="1" type="a"><li data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Register? Formal/informal?</span></li><li data-dcnode-id="1535"><span data-dcnode-id="1547" instrument_node="">Range of structures: What impressive grammar are you going to use?</span><ol data-dcnode-id="1536" start="1" type="i"><li data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Inversions (not only/no sooner/not until/seldom)</span></li><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Inverted conditionals (Were I to…./Had they known…)</span></li><li data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Cleft sentences (What impressed me most was…)</span></li><li data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Participle clauses (Having visited the city before, I know what to expect. Being a massive fan of cheese, I had a whale of a time in France)</span></li><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Double comparatives (The more cheese I ate, the fatter I became. The more I studied the more I understood about French culture.)</span></li></ol></li><li data-dcnode-id="1524"><span data-dcnode-id="1534" instrument_node="">Range of vocabulary:</span><ol data-dcnode-id="1525" start="1" type="i"><li data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Phrasal verbs. (switch over, zone out, sit back)</span></li><li data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Idioms/similes (like watching paint dry/to be on the edge of one’s seat)</span></li><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Relevant vocabulary to the topic (chat show, current affairs, couch potato, remote control)</span></li><li data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Other expressions (Something for everyone, a smorgasbord of options, kill time, etc.)</span></li></ol></li></ol></li><li data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Forms and conventions: Report/proposal – paragraph titles, letter conventions.</span></li><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Write!</span></li><li data-dcnode-id="1509"><span data-dcnode-id="1517" instrument_node="">Check</span><ol data-dcnode-id="1510" start="1" type="a"><li data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Repetition</span></li><li data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Spelling</span></li><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Punctuation</span></li></ol></li></ol><span data-dcnode-id="1507" instrument_node="">
</span><h3 data-dcnode-id="1504" id="an-article-hook"><a data-dcnode-id="1506"></a><span data-dcnode-id="1505" instrument_node="">An Article “Hook”</span></h3><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Capture the reader’s attention with your introduction, draw them in and make them want to read more.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1496"><strong data-dcnode-id="1497"><u data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">The Story Hook</span></u></strong></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Throw the reader straight into a narrative or story related to the topic. The story should be in the 1st person, be descriptive and intriguing:</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1489"><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">I got off the train and pulled my luggage behind me.&nbsp; A cab pulled up to the curb, and the driver got out.&nbsp; He lifted my luggage and said, “Miss, I’m just going to put your stuff in the boot.”&nbsp; I didn’t know what he meant until I saw him open the car’s trunk.&nbsp; Then I realized the boot means car trunk.&nbsp; I got in the cab, wondering how many other words would be different in England.</span></em></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Start in the middle of the most exciting part, then go back later:</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1482"><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">“Boom, boom, boom,” The sound of my heart beating faster and faster echoed in my ears. How on earth had I got myself into this situation? You might ask. Twenty feet underwater with nothing but a thin metal cage between me and perhaps the most terrifying apex predator on the planet, the great white shark….</span></em></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1478"><em data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Well, it had all started two weeks previously when….</span></em></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1473"><strong data-dcnode-id="1474"><u data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">The Descriptive Hook</span></u></strong></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Similar to the story hook but focus more on describing one moment/thing in great detail. Leave the reader wanting to know more about it.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1466"><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The dog howled in pain and limped along the side of the road.&nbsp; His leg was cut and blood streamed down his leg.</span></em></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Doesn’t this scene make you curious about what will happen to the dog?</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1459"><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">The leather strap of the ancient watch was creased and faded from long years in the sunlight. Down the glass of the face ran a long, roughly vertical crack, recalling the blunt impact which had stopped the hands of the timepiece dead all those years ago.</span></em></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Don’t you want to hear the story of the watch?</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1451"><strong data-dcnode-id="1452"><u data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">The Metaphor/Simile Hook</span></u></strong></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">The metaphor/simile hook engages your readers because it makes them think about a topic in a different way.&nbsp;</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1446" instrument_node="">A metaphor is a figure of speech that directly compares one thing to another, but these two things seem unrelated.&nbsp; An example of a metaphor is: </span><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Her boyfriend is a rat.</span></em></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">The boyfriend is not really a rat, but he behaves like one.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">A simile is like a metaphor.&nbsp; Both compare two unrelated things to each other, but a simile uses the words like or as to connect them. For example:&nbsp; Writing a research paper is like running a marathon when it’s 95 degrees Fahrenheit.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">If your article topic is on business blogging you could write the metaphor hook:</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1430"><em data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">A business blog is a magnet pulling clients to a company.</span></em></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Or the simile hook:</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1423"><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">A business blog is like a magnet that pulls clients to a company.</span></em></p><span data-dcnode-id="1422" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1406"><table data-dcnode-id="1407"><tbody data-dcnode-id="1408"><tr data-dcnode-id="1409"><td data-dcnode-id="1416"><span data-dcnode-id="1421" instrument_node="">Metaphor hooks: Marriage is a journey, with its ups and downs.</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">They say that silence is golden.</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">Laughter is the best medicine.</span></td><td data-dcnode-id="1410"><span data-dcnode-id="1415" instrument_node="">Simile hooks: Love is like a fine wine, it matures with age.</span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">My grandmother has always been as tough as an old boot.</span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">The dress fit her like a glove, there was no denying it</span></td></tr></tbody></table></figure><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1401"><strong data-dcnode-id="1402"><u data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">The Quotation Hook</span></u></strong></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">This is a hook where you begin your article with a quotation.&nbsp; The quotation could be from a famous person, but it doesn’t have to be. You can quote anyone if it connects to what you’re writing about.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">If you are writing about the topic of education you could begin with: Nelson Mandela said, “Education is the most powerful weapon you can use to change the world.”</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">If you want to use a quotation for a hook, make sure you quote the words exactly.&nbsp; Choose quotations where the words are striking, powerful, and/ or memorable.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Famous quotes:</span></p><span data-dcnode-id="1388" instrument_node="">
</span><ul data-dcnode-id="1369"><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">“The journey of a thousand miles begins with one step.” – Lao Tzu</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">“That which does not kill us makes us stronger.” – Friedrich Nietzsche</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">“Life is what happens when you’re busy making other plans.” – John Lennon</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">“When the going gets tough, the tough get going.” – Joe Kennedy</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">“You must be the change you wish to see in the world.” – Mahatma Gandhi</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">“You only live once, but if you do it right, once is enough.” – Mae West</span></li><li data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">“You miss 100 percent of the shots you never take.” – Wayne Gretzky</span></li><li data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">“Strive not to be a success, but rather to be of value.” – Albert Einstein</span></li><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">“Life is like a box of chocolates. You never know what you’re going to get.” – Forrest Gump</span></li></ul><span data-dcnode-id="1368" instrument_node="">
</span><h3 data-dcnode-id="1365" id="article-titles-keep-it-catchy"><a data-dcnode-id="1367"></a><span data-dcnode-id="1366" instrument_node="">Article Titles – Keep it Catchy</span></h3><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Most proficiency articles require a catchy title, try to include:</span></p><span data-dcnode-id="1361" instrument_node="">
</span><ul data-dcnode-id="1346"><li data-dcnode-id="1347"><span data-dcnode-id="1360" instrument_node="">An expression/idiom/proverb:</span><ul data-dcnode-id="1357"><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Taking the rough with the smooth</span></li></ul><ul data-dcnode-id="1354"><li data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Life in the limelight</span></li></ul><ul data-dcnode-id="1351"><li data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Coming face-to-face with a man-eater!</span></li></ul><ul data-dcnode-id="1348"><li data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">The long arm of the law</span></li></ul></li></ul><span data-dcnode-id="1345" instrument_node="">
</span><h3 data-dcnode-id="1342" id="task"><a data-dcnode-id="1344"></a><span data-dcnode-id="1343" instrument_node="">Task</span></h3><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">You recently read an article from an online youth magazine on the pressures of fame for young celebrities. The magazine has invited readers to respond to the topic with a short article of their own, which answers the following questions…</span></p><span data-dcnode-id="1338" instrument_node="">
</span><ul data-dcnode-id="1331"><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Is becoming famous worth it?</span></li><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Do male and female celebrities experience the same pressures?</span></li><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">What can be done to shield young celebrities from the drawbacks of fame?</span></li></ul><span data-dcnode-id="1330" instrument_node="">
</span></div><span data-dcnode-id="1327" instrument_node="">
</span></article><span data-dcnode-id="1324" instrument_node="">
