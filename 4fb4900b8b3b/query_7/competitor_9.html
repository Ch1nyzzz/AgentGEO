</span><div class="entry-content" data-dcnode-id="2264"><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2620"><img alt="" class="jetpack-lazy-image" data-dcnode-id="2623" data-lazy-src="https://metrouk2.files.wordpress.com/2013/09/elib_5034371.jpg?resize=366%2C260&amp;is-pending-load=1" data-recalc-dims="1" height="260" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//metrouk2.files.wordpress.com/2013/09/elib_5034371.jpg%3Fresize%3D366%252C260&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="366"><noscript data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">&lt;img loading="lazy" class="" src="https://metrouk2.files.wordpress.com/2013/09/elib_5034371.jpg?resize=366%2C260" alt="" width="366" height="260" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2618" instrument_node="">Image credit:&nbsp;</span><a class="_ZR irc_hol i3724" data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//metro.co.uk/2013/10/02/heres-johnny-what-are-the-best-stephen-king-movie-adaptations-4128782/"><span class="irc_ho" data-dcnode-id="2616" dir="ltr"><span data-dcnode-id="2617" instrument_node="">metro.co.uk</span></span></a></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2612" instrument_node="">Follow me on twitter&nbsp;</span><a class="DashboardProfileCard-screennameLink u-linkComplex u-linkClean" data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/RobbioDobbio"><span data-dcnode-id="2611" instrument_node="">@</span><span class="u-linkComplex-target" data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">RobbioDobbio</span></span></a></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">I’m running the Barcelona Half-Marathon dressed as David Bowie to raise money for Cancer Research, sponsor me here:</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2600"><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justgiving.com/Timothy-Warre/" rel="nofollow"><span data-dcnode-id="2602" instrument_node="">https://www.justgiving.com/Timothy-Warre/</span></a></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2598" instrument_node="">This is a lesson plan for higher level students (high B2+) in which students learn expressions related to fear and horror movies. It is a good companion activity my </span><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2015/04/23/chuckys-participle-clauses/"><span data-dcnode-id="2597" instrument_node="">Chucky’s Participle Clauses lesson</span></a><span data-dcnode-id="2595" instrument_node="">, I plan to teach the two activities in one 90 minute class. You will need the audio file and handouts below:</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2590"><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2016/02/scared-stiff-teacher-notes2.docx" title="Scared Stiff Teacher notes"><span data-dcnode-id="2592" instrument_node="">Scared Stiff Teacher notes</span></a></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2586"><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2016/02/scared-stiff-student-handout1.docx" title="Scared Stiff Student Handout"><span data-dcnode-id="2588" instrument_node="">Scared Stiff Student Handout</span></a></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2582"><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/1SQZBzlLNqwfZorQjLHCgTtcHTxvjvr9o/view%3Fusp%3Dsharing"><span data-dcnode-id="2584" instrument_node="">Audio File</span></a></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2580" instrument_node="">[office src=”</span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/embed%3Fcid%3D79CFF252BEEA0A7D%26resid%3D79CFF252BEEA0A7D%25212685%26authkey%3DAEC4lrrjJLPHKLk%26%238221" rel="nofollow"><span data-dcnode-id="2579" instrument_node="">https://onedrive.live.com/embed?cid=79CFF252BEEA0A7D&amp;resid=79CFF252BEEA0A7D%212685&amp;authkey=AEC4lrrjJLPHKLk&amp;#8221</span></a><span data-dcnode-id="2577" instrument_node="">; width=”98″ height=”120″]</span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2572"><strong data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Scared Stiff</span></strong></p><span data-dcnode-id="2571" instrument_node="">
</span><h1 data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Listening Comprehension</span></h1><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2565"><em data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">First check students understand “scared stiff” then tell them they are going to listen to a man talking about horror films. Dictate them these 5 questions, students write them down. Play the audio twice all the way through. </span></em></p><span data-dcnode-id="2564" instrument_node="">
</span><ol data-dcnode-id="2537"><span data-dcnode-id="2563" instrument_node="">
</span><li data-dcnode-id="2559"><span data-dcnode-id="2562" instrument_node="">What’s his opinion of gory films? </span><em data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">He doesn’t find them frightening</span></em></li><span data-dcnode-id="2558" instrument_node="">
</span><li data-dcnode-id="2554"><span data-dcnode-id="2557" instrument_node="">What types of gory scenes make him uncomfortable? </span><em data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Gory scenes involving eyes</span></em></li><span data-dcnode-id="2553" instrument_node="">
</span><li data-dcnode-id="2549"><span data-dcnode-id="2552" instrument_node="">What types of horror films scare him the most? </span><em data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Psychological horror</span></em></li><span data-dcnode-id="2548" instrument_node="">
</span><li data-dcnode-id="2544"><span data-dcnode-id="2547" instrument_node="">What sometimes happens while they are watching a horror film? </span><em data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">The phone rings or the cat makes a noise, scaring them.</span></em></li><span data-dcnode-id="2543" instrument_node="">
</span><li data-dcnode-id="2539"><span data-dcnode-id="2542" instrument_node="">What’s his girlfriend scared of? </span><em data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Spiders and anything that looks like a spider</span></em></li><span data-dcnode-id="2538" instrument_node="">
</span></ol><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2535" instrument_node="">Being a bit of </span><strong data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">a scaredy-cat</span></strong><span data-dcnode-id="2532" instrument_node=""> I’m not really into horror films. But every now and then I like to sit down and watch one with my girlfriend. I’m not very </span><strong data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">squeamish</span></strong><span data-dcnode-id="2529" instrument_node=""> so I don’t really find </span><strong data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">gory</span></strong><span data-dcnode-id="2526" instrument_node=""> films very frightening but anything to do with eyes </span><strong data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">gives me the heebie-jeebies</span></strong><span data-dcnode-id="2523" instrument_node="">, so I find any scenes where people get the eyes cut or poked out really </span><strong data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">unsettling</span></strong><span data-dcnode-id="2520" instrument_node="">.</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2517" instrument_node="">The films that really </span><strong data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">send shivers down my spine</span></strong><span data-dcnode-id="2514" instrument_node=""> are psychological horror films, for me they’re far scarier than gory films. Maybe ones where some people are exploring a </span><strong data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">spooky</span></strong><span data-dcnode-id="2511" instrument_node=""> house and there’s some </span><strong data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">creepy</span></strong><span data-dcnode-id="2508" instrument_node=""> music playing, they really </span><strong data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">put me on edge</span></strong><span data-dcnode-id="2505" instrument_node=""> because you don’t know when something is going to jump out and </span><strong data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">scare you half to death</span></strong><span data-dcnode-id="2502" instrument_node="">. Sometimes the scariest thing is when we’re watching a horror film and the house phone suddenly rings, or the cat makes a sound and we </span><strong data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">jump out of our skins </span></strong><span data-dcnode-id="2499" instrument_node="">with fright.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2496" instrument_node="">My girlfriend is slightly different to me. She’s </span><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">petrified of</span></strong><span data-dcnode-id="2493" instrument_node=""> spiders and anything that looks like a spider but they don’t really bother me. Once we watched a film about giant alien bugs and we had to switch it off because she was </span><strong data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">shaking like a leaf!</span></strong></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2486"><em data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Students listen again and write down as many expressions as they can.</span></em></p><span data-dcnode-id="2485" instrument_node="">
</span><h1 data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Language focus</span></h1><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2479"><em data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Students look at the expressions in the box, find them in the text and try to deduce meaning from context.</span></em></p><span data-dcnode-id="2478" instrument_node="">
</span><span data-dcnode-id="2477" instrument_node="">
</span><span data-dcnode-id="2476" instrument_node="">
</span><span data-dcnode-id="2475" instrument_node="">
</span><span data-dcnode-id="2433" instrument_node="">
</span><span data-dcnode-id="2431" instrument_node="">
</span><span data-dcnode-id="2429" instrument_node="">
</span><table data-dcnode-id="2428"><tbody data-dcnode-id="2430"><tr data-dcnode-id="2432"><td data-dcnode-id="2434" width="616"><span data-dcnode-id="2474" instrument_node="">1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Scaredy-cat – a person who is easily frightened/scared of a lot of things
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Squeamish – a person who can’t deal with the sight of blood/gore</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Gory – a film with lots of blood and guts</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Gives me the heebie-jeebies – makes me feel uncomfortable/scared/disgusted</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">5.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Unsettling – makes you feel uncomfortable</span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">6.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Sends shivers down my spine – a physical response to being scared</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">7.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Spooky – haunted, supernatural</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">8.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Creepy – discomforting, films can be creepy but people can too, a creepy guy etc.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">9.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Put me on edge – makes me nervous</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">10.&nbsp;&nbsp; Scare you half to death – scare a lot</span></p><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">11.&nbsp;&nbsp; Jump out of your skin – gives you a big fright</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">12.&nbsp;&nbsp; Petrified of – very scared of</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">13.&nbsp;&nbsp; Shake like a leaf – physically trembling with fear</span></p><span data-dcnode-id="2435" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2427" instrument_node="">
</span><p data-dcnode-id="2423"><strong data-dcnode-id="2424"><u data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Memory gap-fill</span></u></strong></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2419"><em data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Students turn the hand out over and try to remember the positions of all the expressions to complete the text. If they get stuck they can turn the paper over and look for one expression.</span></em></p><span data-dcnode-id="2418" instrument_node="">
</span><h1 data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Analysis</span></h1><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2412"><em data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Students look at the expressions and analyse them with the following questions to increase chance of retention.</span></em></p><span data-dcnode-id="2411" instrument_node="">
</span><ol data-dcnode-id="2397"><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Is the meaning obvious from the words?</span></li><span data-dcnode-id="2407" instrument_node="">
</span><li data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Which ones exist in your own language?</span></li><span data-dcnode-id="2404" instrument_node="">
</span><li data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Which one is your favourite?</span></li><span data-dcnode-id="2401" instrument_node="">
</span><li data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Which one will be the easiest/most difficult to remember? Why?</span></li><span data-dcnode-id="2398" instrument_node="">
</span></ol><span data-dcnode-id="2396" instrument_node="">
</span><h1 data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Discussion</span></h1><span data-dcnode-id="2393" instrument_node="">
</span><p data-dcnode-id="2390"><em data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Students discuss the following questions with their partner using the expressions and the language in the box below. Students should be encouraged to use the “showing interest” expressions to actively listen to their partner.</span></em></p><span data-dcnode-id="2389" instrument_node="">
</span><span data-dcnode-id="2388" instrument_node="">
</span><span data-dcnode-id="2387" instrument_node="">
</span><span data-dcnode-id="2386" instrument_node="">
</span><span data-dcnode-id="2381" instrument_node="">
</span><span data-dcnode-id="2376" instrument_node="">
</span><span data-dcnode-id="2374" instrument_node="">
</span><span data-dcnode-id="2373" instrument_node="">
</span><span data-dcnode-id="2340" instrument_node="">
</span><span data-dcnode-id="2313" instrument_node="">

</span><p data-dcnode-id="2099"><strong data-dcnode-id="2100"><u data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Definitions</span></u></strong></p><span data-dcnode-id="2098" instrument_node="">
</span><ol data-dcnode-id="2033"><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Great minds think alike – When two people have had the same good idea</span></li><span data-dcnode-id="2094" instrument_node="">
</span><li data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">A load off one’s mind – news that brings relief</span></li><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">A meeting of the minds – group of experts meeting to discuss something</span></li><span data-dcnode-id="2088" instrument_node="">
</span><li data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">In a frame of mind – in a mental condition</span></li><span data-dcnode-id="2085" instrument_node="">
</span><li data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">No one in their right mind would – no sane person would</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Give sb a piece of one’s mind – to angrily express disapproval to someone</span></li><span data-dcnode-id="2079" instrument_node="">
</span><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Have a mind of its own – does things on its own</span></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Mind-boggling – so big/complex that it’s difficult to comprehend</span></li><span data-dcnode-id="2073" instrument_node="">
</span><li data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">To be in/of two minds about something – to be undecided</span></li><span data-dcnode-id="2070" instrument_node="">
</span><li data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Cast one’s mind back – think about a specific time in the past/make an effort to remember</span></li><span data-dcnode-id="2067" instrument_node="">
</span><li data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Bear in mind/It’s worth bearing in mind – Remember/take into account</span></li><span data-dcnode-id="2064" instrument_node="">
</span><li data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Cross one’s mind/It never crossed my mind to – I never thought about (normally in relation to a solution to a problem)</span></li><span data-dcnode-id="2061" instrument_node="">
</span><li data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Don’t mind if I do – I would like to, used when accepting an offer, usually food/drink</span></li><span data-dcnode-id="2058" instrument_node="">
</span><li data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Have half a mind to – to be considering doing something (normally something you’re not going to do)</span></li><span data-dcnode-id="2055" instrument_node="">
</span><li data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Have a mind like a sieve – bad memory</span></li><span data-dcnode-id="2052" instrument_node="">
</span><li data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Have a one-tracked mind – always thinking about one thing, almost always sex</span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Run through one’s mind – something you’re constantly thinking about</span></li><span data-dcnode-id="2046" instrument_node="">
</span><li data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Put one’s mind to st – make a considerable effort to focus on doing something</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Mind one’s own business – not interfere in other people’s lives/problems</span></li><span data-dcnode-id="2040" instrument_node="">
</span><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Mind one’s p’s and q’s – be polite and follow social rules (please, thank you etc.)</span></li><span data-dcnode-id="2037" instrument_node="">
</span><li data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Slip one’s mind – forget something</span></li><span data-dcnode-id="2034" instrument_node="">
</span></ol><span data-dcnode-id="2032" instrument_node="">
