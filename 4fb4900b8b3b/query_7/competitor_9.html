</span><ol data-dcnode-id="4440"><li data-dcnode-id="4506"><span data-dcnode-id="4510" instrument_node="">I couldn’t tell you the exact figure </span><strong data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">off the top of my ……</span></strong><span data-dcnode-id="4507" instrument_node=""> but I think we sold about 10,000 units last year.</span></li><li data-dcnode-id="4502"><span data-dcnode-id="4505" instrument_node="">The neighbour just called to say they’ve found our cat, that’s </span><strong data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">a load off my ……</span></strong></li><li data-dcnode-id="4497"><span data-dcnode-id="4501" instrument_node="">She was </span><strong data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">at her …… end</span></strong><span data-dcnode-id="4498" instrument_node=""> trying to figure out how to control her 14 year-old son.</span></li><li data-dcnode-id="4492"><span data-dcnode-id="4496" instrument_node="">He presented the new model to the shareholders but she’s the real </span><strong data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">…… behind</span></strong><span data-dcnode-id="4493" instrument_node=""> it.</span></li><li data-dcnode-id="4487"><span data-dcnode-id="4491" instrument_node="">We were lucky enough to </span><strong data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">come …… to …… with</span></strong><span data-dcnode-id="4488" instrument_node=""> a Bengal tiger.</span></li><li data-dcnode-id="4482"><span data-dcnode-id="4486" instrument_node="">I have to admit, </span><strong data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">it never crossed my …… to</span></strong><span data-dcnode-id="4483" instrument_node=""> ask Brian for help with the artwork, but it turns out he’s brilliant!</span></li><li data-dcnode-id="4478"><span data-dcnode-id="4481" instrument_node="">If they don’t turn that music down, I’m going to go over there and </span><strong data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">give them a piece of my ……</span></strong></li><li data-dcnode-id="4474"><span data-dcnode-id="4477" instrument_node="">He’s insufferable these days, all the money and praise has clearly </span><strong data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">gone to his ……</span></strong></li><li data-dcnode-id="4469"><span data-dcnode-id="4473" instrument_node="">My laptop </span><strong data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">has a …… of its own</span></strong><span data-dcnode-id="4470" instrument_node="">, it shuts down whenever it wants.</span></li><li data-dcnode-id="4464"><span data-dcnode-id="4468" instrument_node="">The students struggled </span><strong data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">to keep a straight ……</span></strong><span data-dcnode-id="4465" instrument_node=""> while the teacher was having difficulty playing the video.</span></li><li data-dcnode-id="4459"><span data-dcnode-id="4463" instrument_node="">That part of town is a bit dodgy, you need to </span><strong data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">keep your …… about you</span></strong><span data-dcnode-id="4460" instrument_node=""> if you go there.</span></li><li data-dcnode-id="4455"><span data-dcnode-id="4458" instrument_node="">Trying to get the boys to tidy their bedrooms I always feel like I’m </span><strong data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">banging my …… against a brick wall.</span></strong></li><li data-dcnode-id="4451"><span data-dcnode-id="4454" instrument_node="">The boss had to think of a way to break his promise without </span><strong data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">losing ……</span></strong></li><li data-dcnode-id="4446"><span data-dcnode-id="4450" instrument_node="">In order to </span><strong data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">save ……</span></strong><span data-dcnode-id="4447" instrument_node=""> the company recalled all the faulty products and gave their customers full refunds.</span></li><li data-dcnode-id="4441"><span data-dcnode-id="4445" instrument_node="">I’ve been </span><strong data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">racking my …… </span></strong><span data-dcnode-id="4442" instrument_node="">all night trying to remember my PIN number but I just can’t.</span></li></ol><span data-dcnode-id="4439" instrument_node="">

</span><h3 data-dcnode-id="4325" id="conversation"><span data-dcnode-id="4326" instrument_node="">Conversation</span></h3><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4321"><em data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Complete the questions with one of the expressions, then answer the questions with a partner.</span></em></p><span data-dcnode-id="4320" instrument_node="">
</span><ol data-dcnode-id="4291"><li data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">What sort of things do politicians and celebrities tend to do to …… face after a scandal? Does it usually work?</span></li><li data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">If your neighbours are keeping you up, do you tend to ……. them a piece of your mind? Or grin and bear it?</span></li><li data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Think of a time when you struggled to ……. a straight face in a serious situation. Did you manage it?</span></li><li data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Can you think of a time when you lost ……. in front of your peers when you were a teenager? Can you laugh about it now?</span></li><li data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Are you good at remembering names, figures and dates ……. the top of your head? Or do you often need to look them up?&nbsp;</span></li><li data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Do you need to ……. your brain to put names to faces? Are there any things you struggle to remember?</span></li><li data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">Do the brains ……. the biggest inventions always get the credit? Can you think of any examples of people who didn’t get the credit they deserved?</span></li><li data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">What are you most stressed about at the moment? If you could wave a magic wand and make one of your problems disappear, what would be the biggest ……. off your mind?</span></li><li data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">Are you someone who tends to have your wits ……. you when you’re walking down the street? Or do you have your head in the clouds?</span></li><li data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">Do any of your electronic devices/appliances have minds of their …….? What sort of things do they do?</span></li><li data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">Do people tend to do what you ask them to? Or is it sometimes like ……. your head against a brick wall? Give some examples?</span></li><li data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">Have your parents ever been ….. their wits end with your, or one of your sibling’s behaviour? Why? What did they do?</span></li><li data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">What’s the best way to stop praise or money ……. to a person’s head? Do you think it’s inevitable?</span></li><li data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Have you ever received help or advice from an unexpected source? Had it ever ……. your mind to turn to that particular person?</span></li></ol><span data-dcnode-id="4290" instrument_node="">

</span><header class="entry-header" data-dcnode-id="4157"><span data-dcnode-id="4190" instrument_node="">
</span><span class="cat-links" data-dcnode-id="4178"><span class="screen-reader-text" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Posted in</span></span><span data-dcnode-id="4187" instrument_node=""> </span><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/exam-preparation-class/" rel="category tag"><span data-dcnode-id="4186" instrument_node="">Exam Preparation Class</span></a><span data-dcnode-id="4184" instrument_node="">, </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/proficiency-2/" rel="category tag"><span data-dcnode-id="4183" instrument_node="">Proficiency</span></a><span data-dcnode-id="4181" instrument_node="">, </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/vocabulary-classes/" rel="category tag"><span data-dcnode-id="4180" instrument_node="">Vocabulary Classes</span></a></span><span data-dcnode-id="4177" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="4174"><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/01/25/c2-proficiency-use-of-english-worksheet-conversation/" rel="bookmark"><span data-dcnode-id="4176" instrument_node="">C2 Proficiency: Use of English Worksheet &amp; Conversation</span></a></h2><span data-dcnode-id="4173" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="4160"><span data-dcnode-id="4172" instrument_node="">
</span><span class="posted-on" data-dcnode-id="4167"><span data-dcnode-id="4171" instrument_node="">Posted on </span><a data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2022/01/25/c2-proficiency-use-of-english-worksheet-conversation/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="4169" datetime="2022-01-25T10:37:47+00:00"><span data-dcnode-id="4170" instrument_node="">January 25, 2022</span></time></a></span><span class="byline" data-dcnode-id="4162"><span data-dcnode-id="4166" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="4163"><a class="url fn n" data-dcnode-id="4164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="4165" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="4161" instrument_node=""> </span></div><span data-dcnode-id="4158" instrument_node="">
</span></header><span data-dcnode-id="4155" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4104"><span data-dcnode-id="4154" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4149"><figure class="alignleft is-resized" data-dcnode-id="4150"><img alt="C2 Proficiency: Exam Technique – Reading Part 7 – Tim's Free English Lesson  Plans" class="jetpack-lazy-image" data-dcnode-id="4153" data-lazy-src="https://i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg?resize=331%2C272&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="272" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg%3Fresize%3D331%252C272%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="331"><noscript data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/turbolangs.com/wp-content/uploads/2019/03/CPE-C2-Proficiency.jpg?resize=331%2C272&amp;#038;ssl=1" alt="C2 Proficiency: Exam Technique – Reading Part 7 – Tim&amp;#039;s Free English Lesson  Plans" width="331" height="272" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="4148" instrument_node="">
</span><p data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">This is a lesson plan for students preparing to take the C2 Proficiency exam. Students look at some typical phrasal verbs, collocations and dependent prepositions that often come up in the exam and put them into practice in conversation. Download the handout, key and accompanying slides below:</span></p><span data-dcnode-id="4145" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="4140"><a data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/01/c2-proficiency_-use-of-english-part-2.docx" id="wp-block-file--media-bc39cc08-7ad4-4226-829f-599839c2db22"><span data-dcnode-id="4144" instrument_node="">c2-proficiency_-use-of-english-part-2</span></a><a aria-describedby="wp-block-file--media-bc39cc08-7ad4-4226-829f-599839c2db22" class="wp-block-file__button" data-dcnode-id="4141" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/01/c2-proficiency_-use-of-english-part-2.docx"><span data-dcnode-id="4142" instrument_node="">Download</span></a></div><span data-dcnode-id="4139" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="4134"><a data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/01/c2-proficiency_-use-of-english-part-2-key.docx" id="wp-block-file--media-41d3f6ff-49a2-48ff-a85c-a685454af31d"><span data-dcnode-id="4138" instrument_node="">c2-proficiency_-use-of-english-part-2-key</span></a><a aria-describedby="wp-block-file--media-41d3f6ff-49a2-48ff-a85c-a685454af31d" class="wp-block-file__button" data-dcnode-id="4135" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/01/c2-proficiency_-use-of-english-part-2-key.docx"><span data-dcnode-id="4136" instrument_node="">Download</span></a></div><span data-dcnode-id="4133" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="4128"><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/01/c2-use-of-english-training.pptx" id="wp-block-file--media-a90c23ce-28c8-4855-865f-7c15bcd63397"><span data-dcnode-id="4132" instrument_node="">c2-use-of-english-training</span></a><a aria-describedby="wp-block-file--media-a90c23ce-28c8-4855-865f-7c15bcd63397" class="wp-block-file__button" data-dcnode-id="4129" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2022/01/c2-use-of-english-training.pptx"><span data-dcnode-id="4130" instrument_node="">Download</span></a></div><span data-dcnode-id="4127" instrument_node="">
</span><p data-dcnode-id="4124"><strong data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Procedure</span></strong></p><span data-dcnode-id="4123" instrument_node="">
</span><p data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">First of all students have to choose from two prepositions to complete the phrasal verbs so that it fits the context of the sentence. Then have them match the phrasal verbs to the definitions in the box below. You could then have students test each other, one says a definition, the other has to recall the phrasal verb.</span></p><span data-dcnode-id="4120" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Show students slide 2 of the presentation and instruct them to turn their handouts over and attempt to recall the missing words in the questions from memory. In this exercise they are required to recall the verb, rather than the preposition. Once they have completed the exercise, have them ask and answer the questions in pairs or small groups and then share any funny/interesting discoveries in open class.</span></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Students then repeat the process for the dependent prepositions. However, in this case, rather than matching definitions, they match synonyms of the collocations to transform the sentence. I most cases they are direct synonyms that fit the same grammatical pattern but in a couple of cases they will need to make changes to the sentence, instruct them to check carefully if the synonym fits.</span></p><span data-dcnode-id="4114" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Slide 4-5 have a similar gapped questions task to the first one for students to complete in pairs. The final exercise contains more expressions and phrasal verbs with prepositions. Have students complete the exercise in pairs, then after checking in open class, have students come up with gapped questions for their classmates to complete. Tell them that their questions must be open-ended and designed to spark conversation, for example:</span></p><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Are there any things that you’ve done so many times that you can now do ….. auto-pilot?</span></p><span data-dcnode-id="4108" instrument_node="">
</span><p data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">Feel free to post any of your students’ questions in the comments! Let me know how it goes!</span></p><span data-dcnode-id="4105" instrument_node="">
</span></div><span data-dcnode-id="4102" instrument_node="">
</span></article><span data-dcnode-id="4099" instrument_node="">

</span><span class="posted-on" data-dcnode-id="4074"><span data-dcnode-id="4078" instrument_node="">Posted on </span><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2021/02/26/c1-advanced-key-word-transformation-training-2/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="4076" datetime="2021-02-26T22:27:26+00:00"><span data-dcnode-id="4077" instrument_node="">February 26, 2021</span></time></a></span><span class="byline" data-dcnode-id="4069"><span data-dcnode-id="4073" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="4070"><a class="url fn n" data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="4072" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="4068" instrument_node=""> </span></div><span data-dcnode-id="4065" instrument_node="">
</span></header><span data-dcnode-id="4062" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4017"><span data-dcnode-id="4061" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4056"><figure class="alignleft is-resized" data-dcnode-id="4057"><img alt="C1 Advanced (CAE) | The Lleida Cambridge Exams Centre" class="jetpack-lazy-image" data-dcnode-id="4060" data-lazy-src="https://i0.wp.com/cdnebasnet.com/data/cache/opt_png/eshop/cambridge/uploads/images/advanced_rgb_300dpi_msoffice-1024x294-1521663785-1400x1400.png?resize=274%2C79&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="79" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdnebasnet.com/data/cache/opt_png/eshop/cambridge/uploads/images/advanced_rgb_300dpi_msoffice-1024x294-1521663785-1400x1400.png%3Fresize%3D274%252C79%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="274"><noscript data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/cdnebasnet.com/data/cache/opt_png/eshop/cambridge/uploads/images/advanced_rgb_300dpi_msoffice-1024x294-1521663785-1400x1400.png?resize=274%2C79&amp;#038;ssl=1" alt="C1 Advanced (CAE) | The Lleida Cambridge Exams Centre" width="274" height="79" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">In this lesson plan students preparing for the C1 Advanced exam develop their understanding of some key fixed expressions that often come up in part 4 of the use of English. Download the handout and homework exercise below:</span></p><span data-dcnode-id="4052" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="4047"><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/key-word-transformation-training-2-handout.docx"><span data-dcnode-id="4051" instrument_node="">key-word-transformation-training-2-handout</span></a><a class="wp-block-file__button" data-dcnode-id="4048" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/key-word-transformation-training-2-handout.docx"><span data-dcnode-id="4049" instrument_node="">Download</span></a></div><span data-dcnode-id="4046" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="4041"><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/key-word-transformations-training-practice-followup-1.docx"><span data-dcnode-id="4045" instrument_node="">key-word-transformations-training-practice-followup-1</span></a><a class="wp-block-file__button" data-dcnode-id="4042" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2021/02/key-word-transformations-training-practice-followup-1.docx"><span data-dcnode-id="4043" instrument_node="">Download</span></a></div><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4035"><span data-dcnode-id="4039" instrument_node="">These particular expressions are taken from </span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quizlet.com/161491025/cae-use-of-english-part-5-key-word-transformation-flash-cards/"><span data-dcnode-id="4038" instrument_node="">this quizlet set of 82 different key word transformation expressions,</span></a><span data-dcnode-id="4036" instrument_node=""> you may want to use it for spaced repetition.</span></p><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4031"><strong data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">Procedure</span></strong></p><span data-dcnode-id="4030" instrument_node="">
</span><p data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">Students read the expressions in bold and discuss the meaning with their partner. Encourage them to paraphrase the expression and make any notes on the grammar that might be relevant: specific prepositions, verb patterns that may follow it (gerund/infinitive etc.)</span></p><span data-dcnode-id="4027" instrument_node="">
</span><p data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Students then flip the paper over and attempt to remember the expressions using the key words as prompts. They can check their answers by looking back at page 1. Ask students which expressions they struggled the most to recall.</span></p><span data-dcnode-id="4024" instrument_node="">
</span><p data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">Set the key word transformation worksheet for homework.</span></p><span data-dcnode-id="4021" instrument_node="">
</span><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node=""> </span></p><span data-dcnode-id="4018" instrument_node="">
</span></div><span data-dcnode-id="4015" instrument_node="">

</span><span class="posted-on" data-dcnode-id="3990"><span data-dcnode-id="3994" instrument_node="">Posted on </span><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2020/10/09/c2-proficiency-dependent-preps-music-idioms/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="3992" datetime="2020-10-09T12:05:16+00:00"><span data-dcnode-id="3993" instrument_node="">October 9, 2020</span></time></a></span><span class="byline" data-dcnode-id="3985"><span data-dcnode-id="3989" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="3986"><a class="url fn n" data-dcnode-id="3987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="3988" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="3984" instrument_node=""> </span></div><span data-dcnode-id="3981" instrument_node="">
</span></header><span data-dcnode-id="3978" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3851"><span data-dcnode-id="3977" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3972"><figure class="alignleft is-resized" data-dcnode-id="3973"><img alt="Plusnet corrects 'Blowing our own trumpet' ad after trumpet turns out to be  cornet" class="jetpack-lazy-image" data-dcnode-id="3976" data-lazy-src="https://i0.wp.com/cached.imagescaler.hbpl.co.uk/resize/scaleHeight/815/cached.offlinehbpl.hbpl.co.uk/news/OMC/plusnetcropped-20150422120039501.jpg?resize=259%2C172&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" height="172" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cached.imagescaler.hbpl.co.uk/resize/scaleHeight/815/cached.offlinehbpl.hbpl.co.uk/news/OMC/plusnetcropped-20150422120039501.jpg%3Fresize%3D259%252C172%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="259"><noscript data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/cached.imagescaler.hbpl.co.uk/resize/scaleHeight/815/cached.offlinehbpl.hbpl.co.uk/news/OMC/plusnetcropped-20150422120039501.jpg?resize=259%2C172&amp;#038;ssl=1" alt="Plusnet corrects 'Blowing our own trumpet' ad after trumpet turns out to be  cornet" width="259" height="172" data-recalc-dims="1" /&gt;</span></noscript></figure></div><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">This is a quick, communicative activity for C2 students in which they practice some expressions with dependent prepositions and some idioms related to music. I’m currently working with a coursebook which is packed with great C2 language but a little lacking in communicative production activities so I thought I’d share some I’ve been using. Download the handout and key below:</span></p><span data-dcnode-id="3968" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="3963"><a data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2020/10/expressions-gap-fill-901-blank.docx"><span data-dcnode-id="3967" instrument_node="">Gap-fill questions</span></a><a class="wp-block-file__button" data-dcnode-id="3964" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2020/10/expressions-gap-fill-901-blank.docx"><span data-dcnode-id="3965" instrument_node="">Download</span></a></div><span data-dcnode-id="3962" instrument_node="">
</span><div class="wp-block-file" data-dcnode-id="3957"><a data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2020/10/expressions-gap-fill-901-key-1.docx"><span data-dcnode-id="3961" instrument_node="">Gap-fill questions KEY</span></a><a class="wp-block-file__button" data-dcnode-id="3958" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2020/10/expressions-gap-fill-901-key-1.docx"><span data-dcnode-id="3959" instrument_node="">Download</span></a></div><span data-dcnode-id="3956" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">When creating your own gap-fill exercises, why not make them questions? That way you’ve got a speaking activity ready to go immediately. </span></p><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">Have students work in pairs to fill in the missing words in the expressions, then have them underline the dependent preposition in the first set of sentences and the complete idiom in the second. Then have them ask and answer the questions.</span></p><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3947"><strong data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Dependent Prepositions</span></strong></p><span data-dcnode-id="3946" instrument_node="">
</span><ul data-dcnode-id="3935"><li data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Are you someone who t________ on pressure or do you tend to go to pieces?</span></li><li data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">If you’re h_____-p_______ to come up with new ideas in your job/studies where do you turn for inspiration?</span></li><li data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Think of a time when you worked towards a c_______ g_______ with a group of people. What was the experience like? Did everybody pull their weight?</span></li><li data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Do your parents or grandparents tend to h_______ back to the good old days? What sort of comments or comparisons do they make?</span></li><li data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Think of a time when you t_______ to a new activity/hobby like a d______ to water. Did you expect it to be that easy? Why do you think you adapted so quickly?</span></li></ul><span data-dcnode-id="3934" instrument_node="">
</span><p data-dcnode-id="3931"><strong data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Music Idioms</span></strong></p><span data-dcnode-id="3930" instrument_node="">
</span><ul data-dcnode-id="3919"><li data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Are you someone who tends to blow their own t_________? Do you think it’s an attractive quality? Where is the line between confidence and arrogance?</span></li><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Have you ever bought or sold something for a s_______ (very cheaply) on ebay/wallapop etc.?</span></li><li data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Are you good at playing it by e_______? Or do you struggle to adapt to developing situations?</span></li><li data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">Have you or any of your friends or family ever changed your/their t_______ about a key issue/topic? What made you rethink your position?</span></li><li data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">When was the last time you had to pull out all the s________ to finish a big project?</span></li></ul><span data-dcnode-id="3918" instrument_node="">
</span><p data-dcnode-id="3915"><strong data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">Key</span></strong></p><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3911"><strong data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">Dependent Prepositions</span></strong></p><span data-dcnode-id="3910" instrument_node="">
</span><ul data-dcnode-id="3884"><li data-dcnode-id="3905"><span data-dcnode-id="3909" instrument_node="">Are you someone who THRIVES </span><strong data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">on</span></strong><span data-dcnode-id="3906" instrument_node=""> pressure or do you tend to go to pieces?</span></li><li data-dcnode-id="3900"><span data-dcnode-id="3904" instrument_node="">If you’re HARD-PRESSED </span><strong data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">to</span></strong><span data-dcnode-id="3901" instrument_node=""> come up with new ideas in your job/studies where do you turn for inspiration?</span></li><li data-dcnode-id="3895"><span data-dcnode-id="3899" instrument_node="">Think of a time when you worked </span><strong data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">towards</span></strong><span data-dcnode-id="3896" instrument_node=""> a COMMON GOAL with a group of people. What was the experience like? Did everybody pull their weight?</span></li><li data-dcnode-id="3890"><span data-dcnode-id="3894" instrument_node="">Do your parents or grandparents tend to HARK </span><strong data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">back</span></strong><span data-dcnode-id="3891" instrument_node=""> to the good old days? What sort of comments or comparisons do they make?</span></li><li data-dcnode-id="3885"><span data-dcnode-id="3889" instrument_node="">Think of a time when you TOOK </span><strong data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">to</span></strong><span data-dcnode-id="3886" instrument_node=""> a new activity/hobby like a DUCK to water. Did you expect it to be that easy? Why do you think you adapted so quickly?</span></li></ul><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3880"><strong data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Music Idioms</span></strong></p><span data-dcnode-id="3879" instrument_node="">
</span><ul data-dcnode-id="3853"><li data-dcnode-id="3874"><span data-dcnode-id="3878" instrument_node="">Are you someone who tends to blow their own </span><strong data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">TRUMPET</span></strong><span data-dcnode-id="3875" instrument_node="">? Do you think it’s an attractive quality? Where is the line between confidence and arrogance?</span></li><li data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node="">Have you ever bought or sold something for a </span><strong data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">SONG</span></strong><span data-dcnode-id="3870" instrument_node=""> (very cheaply) on ebay/wallapop etc.?</span></li><li data-dcnode-id="3864"><span data-dcnode-id="3868" instrument_node="">Are you good at playing it by </span><strong data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">EAR</span></strong><span data-dcnode-id="3865" instrument_node="">? Or do you struggle to adapt to developing situations?</span></li><li data-dcnode-id="3859"><span data-dcnode-id="3863" instrument_node="">Have you or any of your friends or family ever changed your/their </span><strong data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">TUNE</span></strong><span data-dcnode-id="3860" instrument_node=""> about a key issue/topic? What made you rethink your position?</span></li><li data-dcnode-id="3854"><span data-dcnode-id="3858" instrument_node="">When was the last time you had to pull out all the </span><strong data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">STOPS</span></strong><span data-dcnode-id="3855" instrument_node=""> to finish a big project?</span></li></ul><span data-dcnode-id="3852" instrument_node="">
</span></div><span data-dcnode-id="3849" instrument_node="">
</span></article><span data-dcnode-id="3846" instrument_node="">

</span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">This is a lesson plan for higher level learners (C1+) in which students learn some common English proverbs. Download the worksheet and key below:</span></p><span data-dcnode-id="3793" instrument_node="">

</span><span data-dcnode-id="3781" instrument_node="">
</span><span data-dcnode-id="3780" instrument_node="">

</span><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Don’t look a gift horse…</span></p><span data-dcnode-id="3379" instrument_node="">
</span><p data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; There’s no such thing as…</span></p><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">5.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2 heads are better than one</span></p><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">6.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Where there’s a will there’s a way</span></p><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">7.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The squeaky wheel…</span></p><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">8.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; People in glass houses…</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">9.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Don’t put all your eggs in one…</span></p><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">10.&nbsp;&nbsp; Don’t count your chickens…</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">11.&nbsp;&nbsp; Beggars can’t be choosers</span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">12.&nbsp;&nbsp; If it ain’t broke…</span></p></td></tr></tbody></table><span data-dcnode-id="3345" instrument_node="">

</span><header class="entry-header" data-dcnode-id="3307"><span data-dcnode-id="3337" instrument_node="">
</span><span class="cat-links" data-dcnode-id="3328"><span class="screen-reader-text" data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Posted in</span></span><span data-dcnode-id="3334" instrument_node=""> </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/games/" rel="category tag"><span data-dcnode-id="3333" instrument_node="">Games</span></a><span data-dcnode-id="3331" instrument_node="">, </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/uncategorized/" rel="category tag"><span data-dcnode-id="3330" instrument_node="">Uncategorized</span></a></span><span data-dcnode-id="3327" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="3324"><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2016/04/11/game-alphabet-quiz-cpe-idioms-version/" rel="bookmark"><span data-dcnode-id="3326" instrument_node="">Game: Alphabet Quiz CPE Idioms Version</span></a></h2><span data-dcnode-id="3323" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="3310"><span data-dcnode-id="3322" instrument_node="">
</span><span class="posted-on" data-dcnode-id="3317"><span data-dcnode-id="3321" instrument_node="">Posted on </span><a data-dcnode-id="3318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2016/04/11/game-alphabet-quiz-cpe-idioms-version/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="3319" datetime="2016-04-11T08:02:42+00:00"><span data-dcnode-id="3320" instrument_node="">April 11, 2016</span></time></a></span><span class="byline" data-dcnode-id="3312"><span data-dcnode-id="3316" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="3313"><a class="url fn n" data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="3315" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="3311" instrument_node=""> </span></div><span data-dcnode-id="3308" instrument_node="">
</span></header><span data-dcnode-id="3305" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3111"><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3300"><img alt="" class="jetpack-lazy-image" data-dcnode-id="3303" data-lazy-src="https://i0.wp.com/cdn.20m.es/img2/recortes/2012/02/23/49825-944-539.jpg?resize=366%2C209&amp;is-pending-load=1" data-recalc-dims="1" height="209" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn.20m.es/img2/recortes/2012/02/23/49825-944-539.jpg%3Fresize%3D366%252C209&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="366"><noscript data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">&lt;img loading="lazy" class="" src="https://i0.wp.com/cdn.20m.es/img2/recortes/2012/02/23/49825-944-539.jpg?resize=366%2C209" alt="" width="366" height="209" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3299" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3298" instrument_node="">Image credit:&nbsp;</span><a class="_ZR irc_hol i3724" data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.20minutos.es/minuteca/pasapalabra/" target="_blank"><span class="irc_ho" data-dcnode-id="3296" dir="ltr"><span data-dcnode-id="3297" instrument_node="">www.20minutos.es</span></span></a></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3287"><span data-dcnode-id="3292" instrument_node="">Follow me on twitter&nbsp;</span><a class="DashboardProfileCard-screennameLink u-linkComplex u-linkClean" data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/RobbioDobbio"><span data-dcnode-id="3291" instrument_node="">@</span><span class="u-linkComplex-target" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">RobbioDobbio</span></span></a></p><span data-dcnode-id="3286" instrument_node="">
</span><p data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">This is a new version of my Alphabet Quiz game designed for very high levels (high C1) in which students have to guess different idioms which begin with each letter of the alphabet.&nbsp;Credit to my colleague Peter Rassa&nbsp;for the idea.&nbsp;The game is similar to the gameshow “Pasaparabla” on Spanish television. You will need the&nbsp;lesson plan with the question sheet:</span></p><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3280"><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2016/04/alphabet-quiz-cpe-idiooms-version1.docx" title="Alphabet Quiz CPE Idiooms Version"><span data-dcnode-id="3282" instrument_node="">Alphabet Quiz CPE Idioms Version</span></a></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3275"><strong data-dcnode-id="3276"><u data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Procedure</span></u></strong></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">Write the alphabet on the board, if you’re feeling really creative you can do it in a circle as shown in the picture above. Quickly recap the letters that often cause your students problems. It varies from place to place but in Spain they struggle with J, G, E, I, Q, W, and Y.</span></p><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">Quickly recap the letters that often cause your students problems. It varies from place to place but in Spain they struggle with J, G, E, I, Q, W, and Y.</span></p><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Write all your students’ names on the board in a list.</span></p><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Choose a player to go first, explain to them that you are going to ask them a question, the answer to the question begins with the letter A. They have two options: they can attempt to answer the question or they can say “pass”. If they choose to answer and they get it right, they get 1 point but if they get it wrong they lose 1 point. If they choose to pass, then it is the next student’s turn but the next student is asked the “B” question. You continue like this through the list of questions, every time a question is answered correctly you cross that letter out from the list on the board. When you reach the end of the list (the “Z” question) you then return to the top of the list and work your way through any questions which were not answered the first time around.</span></p><span data-dcnode-id="3262" instrument_node="">
</span><p data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">NOTE: It is important that students don’t shout out the answers to the questions if it’s not their turn&nbsp;as&nbsp;that question could be revisited later.</span></p><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">The winner is the student with the most points when all the questions have been answered or at the end of a set time limit.</span></p><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3253" instrument_node="">
</span><ol data-dcnode-id="3113"><span data-dcnode-id="3252" instrument_node="">
</span><li data-dcnode-id="3248"><span data-dcnode-id="3251" instrument_node="">A person’s weak spot. </span><strong data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Achilles heel.</span></strong></li><span data-dcnode-id="3247" instrument_node="">
</span><li data-dcnode-id="3243"><span data-dcnode-id="3246" instrument_node="">A person who is bad and makes other bad. </span><strong data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Bad Apple</span></strong></li><span data-dcnode-id="3242" instrument_node="">
</span><li data-dcnode-id="3238"><span data-dcnode-id="3241" instrument_node="">A relaxed, quiet time immediately before period of violent activity or argument .</span><strong data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Calm before the storm.</span></strong></li><span data-dcnode-id="3237" instrument_node="">
</span><li data-dcnode-id="3233"><span data-dcnode-id="3236" instrument_node="">If you are overcharged or underpaid, open, unfair and hard to prevent. Rip-off has a similar meaning. </span><strong data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">daylight robbery.</span></strong></li><span data-dcnode-id="3232" instrument_node="">
</span><li data-dcnode-id="3227"><span data-dcnode-id="3231" instrument_node="">If someone has </span><strong data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">egg on their face,</span></strong><span data-dcnode-id="3228" instrument_node=""> they are made to look foolish or embarrassed.</span></li><span data-dcnode-id="3226" instrument_node="">
</span><li data-dcnode-id="3221"><span data-dcnode-id="3225" instrument_node="">If you have to </span><strong data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">face the music,</span></strong><span data-dcnode-id="3222" instrument_node=""> you have to accept the negative consequences of something you have done wrong.</span></li><span data-dcnode-id="3220" instrument_node="">
</span><li data-dcnode-id="3215"><span data-dcnode-id="3219" instrument_node="">If you </span><strong data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">get something off your chest,</span></strong><span data-dcnode-id="3216" instrument_node=""> you confess to something that has been troubling you.</span></li><span data-dcnode-id="3214" instrument_node="">
</span><li data-dcnode-id="3209"><span data-dcnode-id="3213" instrument_node="">If someone is </span><strong data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">happy-go-lucky</span></strong><span data-dcnode-id="3210" instrument_node="">, they don’t worry or plan and accept things as they happen.</span></li><span data-dcnode-id="3208" instrument_node="">
</span><li data-dcnode-id="3204"><span data-dcnode-id="3207" instrument_node="">This expression is used to refer to something good that happens on top of an already good thing or situation. </span><strong data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Icing on the cake</span></strong></li><span data-dcnode-id="3203" instrument_node="">
</span><li data-dcnode-id="3198"><span data-dcnode-id="3202" instrument_node="">If people are </span><strong data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">joined at the hip,</span></strong><span data-dcnode-id="3199" instrument_node=""> they are very closely connected and think the same way.</span></li><span data-dcnode-id="3197" instrument_node="">
</span><li data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">When someone kicks the bucket, they die.</span></li><span data-dcnode-id="3194" instrument_node="">
</span><li data-dcnode-id="3189"><span data-dcnode-id="3193" instrument_node="">The </span><strong data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">last straw</span></strong><span data-dcnode-id="3190" instrument_node=""> is the final problem that makes someone lose their temper or the problem that finally brought about the collapse of something. It comes from an Arabic story, where a camel was loaded with straw until a single straw placed on the rest of the load broke its back.</span></li><span data-dcnode-id="3188" instrument_node="">
</span><li data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">If you make a killing, you do something that makes you a lot of money.</span></li><span data-dcnode-id="3185" instrument_node="">
</span><li data-dcnode-id="3180"><span data-dcnode-id="3184" instrument_node="">If two competitors or candidates, etc, are </span><strong data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">neck and neck,</span></strong><span data-dcnode-id="3181" instrument_node=""> then they are very close and neither is clearly winning.</span></li><span data-dcnode-id="3179" instrument_node="">
</span><li data-dcnode-id="3174"><span data-dcnode-id="3178" instrument_node="">If you’re </span><strong data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">on a roll,</span></strong><span data-dcnode-id="3175" instrument_node=""> you’re moving from success to success.</span></li><span data-dcnode-id="3173" instrument_node="">
</span><li data-dcnode-id="3168"><span data-dcnode-id="3172" instrument_node="">If you go out for a night out with lots of fun and drinking, you </span><strong data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">paint the town red</span></strong><span data-dcnode-id="3169" instrument_node="">.</span></li><span data-dcnode-id="3167" instrument_node="">
</span><li data-dcnode-id="3162"><span data-dcnode-id="3166" instrument_node="">If someone’s as </span><strong data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">quiet as a mouse</span></strong><span data-dcnode-id="3163" instrument_node="">, they make absolutely no noise.</span></li><span data-dcnode-id="3161" instrument_node="">
</span><li data-dcnode-id="3157"><span data-dcnode-id="3160" instrument_node="">Someone who starts life very poor and becomes rich goes from </span><strong data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">rags to riches.</span></strong></li><span data-dcnode-id="3156" instrument_node="">
</span><li data-dcnode-id="3152"><span data-dcnode-id="3155" instrument_node="">When all the best people, things or ideas and so on are used up and people try to make do with what they have left, they are </span><strong data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">scraping the barrel.</span></strong></li><span data-dcnode-id="3151" instrument_node="">
</span><li data-dcnode-id="3146"><span data-dcnode-id="3150" instrument_node="">If you </span><strong data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">take a leaf out of someone’s book,</span></strong><span data-dcnode-id="3147" instrument_node=""> you copy something they do because it will help you.</span></li><span data-dcnode-id="3145" instrument_node="">
</span><li data-dcnode-id="3141"><span data-dcnode-id="3144" instrument_node="">If you are feeling a bit ill, sad or lack energy, you are </span><strong data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">under the weather.</span></strong></li><span data-dcnode-id="3140" instrument_node="">
</span><li data-dcnode-id="3136"><strong data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">A vicious circle</span></strong><span data-dcnode-id="3137" instrument_node=""> is a sequence of events that make each other worse- someone drinks because they are unhappy at work, then loses their job… ‘Vicious cycle’ is also used.</span></li><span data-dcnode-id="3135" instrument_node="">
</span><li data-dcnode-id="3131"><span data-dcnode-id="3134" instrument_node="">If something belongs to the past and isn’t important or troubling any more, it is </span><strong data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">water under the bridge.</span></strong></li><span data-dcnode-id="3130" instrument_node="">
</span><li data-dcnode-id="3125"><span data-dcnode-id="3129" instrument_node="">If something is </span><strong data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">x-rated,</span></strong><span data-dcnode-id="3126" instrument_node=""> it is not suitable for children.</span></li><span data-dcnode-id="3124" instrument_node="">
</span><li data-dcnode-id="3120"><span data-dcnode-id="3123" instrument_node="">This idiom means that if you do something for me, I’ll return the favour. </span><strong data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">You scratch my back, I’ll scratch yours.</span></strong></li><span data-dcnode-id="3119" instrument_node="">
</span><li data-dcnode-id="3115"><span data-dcnode-id="3118" instrument_node="">This is used to tell someone to be quiet. </span><strong data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Zip it.</span></strong></li><span data-dcnode-id="3114" instrument_node="">
</span></ol><span data-dcnode-id="3112" instrument_node="">
</span></div><span data-dcnode-id="3109" instrument_node="">
</span></article><span data-dcnode-id="3106" instrument_node="">
</span><article class="post-1930 post type-post status-publish format-standard hentry category-conversation-classes category-vocabulary-classes tag-advanced-vocabulary tag-c1 tag-cae tag-cpe tag-expressions tag-family-vocabulary tag-idioms tag-peer-teaching" data-dcnode-id="2663" id="post-1930"><span data-dcnode-id="3105" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3074"><span data-dcnode-id="3104" instrument_node="">
</span><span class="cat-links" data-dcnode-id="3095"><span class="screen-reader-text" data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Posted in</span></span><span data-dcnode-id="3101" instrument_node=""> </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/conversation-classes/" rel="category tag"><span data-dcnode-id="3100" instrument_node="">Conversation Classes</span></a><span data-dcnode-id="3098" instrument_node="">, </span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/category/vocabulary-classes/" rel="category tag"><span data-dcnode-id="3097" instrument_node="">Vocabulary Classes</span></a></span><span data-dcnode-id="3094" instrument_node=""> </span><h2 class="entry-title" data-dcnode-id="3091"><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2016/02/26/you-cant-choose-your-family-family-expressions/" rel="bookmark"><span data-dcnode-id="3093" instrument_node="">You can’t choose your family: Family Expressions</span></a></h2><span data-dcnode-id="3090" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="3077"><span data-dcnode-id="3089" instrument_node="">
</span><span class="posted-on" data-dcnode-id="3084"><span data-dcnode-id="3088" instrument_node="">Posted on </span><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/2016/02/26/you-cant-choose-your-family-family-expressions/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="3086" datetime="2016-02-26T18:02:51+00:00"><span data-dcnode-id="3087" instrument_node="">February 26, 2016</span></time></a></span><span class="byline" data-dcnode-id="3079"><span data-dcnode-id="3083" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="3080"><a class="url fn n" data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/author/timwarre/"><span data-dcnode-id="3082" instrument_node="">Tim Warre</span></a></span></span><span data-dcnode-id="3078" instrument_node=""> </span></div><span data-dcnode-id="3075" instrument_node="">
</span></header><span data-dcnode-id="3072" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2666"><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3067"><img alt="" class="jetpack-lazy-image" data-dcnode-id="3070" data-lazy-src="https://i0.wp.com/bramptondentalarts.com/wp-content/uploads/2013/08/FAMILY1.jpg?resize=356%2C237&amp;is-pending-load=1" data-recalc-dims="1" height="237" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/bramptondentalarts.com/wp-content/uploads/2013/08/FAMILY1.jpg%3Fresize%3D356%252C237&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="356"><noscript data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">&lt;img loading="lazy" class="" src="https://i0.wp.com/bramptondentalarts.com/wp-content/uploads/2013/08/FAMILY1.jpg?resize=356%2C237" alt="" width="356" height="237" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3061"><span data-dcnode-id="3065" instrument_node="">Image credit:&nbsp;</span><a class="_ZR irc_hol i3724" data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.elon.edu/gst336/category/a13-family/" target="_blank"><span class="irc_ho" data-dcnode-id="3063" dir="ltr"><span data-dcnode-id="3064" instrument_node="">blogs.elon.edu</span></span></a></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3059" instrument_node="">Follow me on twitter&nbsp;</span><a class="DashboardProfileCard-screennameLink u-linkComplex u-linkClean" data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/RobbioDobbio"><span data-dcnode-id="3058" instrument_node="">@</span><span class="u-linkComplex-target" data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">RobbioDobbio</span></span></a></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">This is a lesson plan for higher levels (C1+) designed with CAE students in mind. Students will teach each other&nbsp;some expressions related to family and use them to describe themselves. Credit to my colleague Julie Banks for some of the expressions. Download the handout and key below:</span></p><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3047"><a data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2016/02/you-cant-choose-your-family-handout.docx" title="You cant choose your family handout"><span data-dcnode-id="3049" instrument_node="">You cant choose your family handout</span></a></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3043"><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freeenglishlessonplans.com/wp-content/uploads/2016/02/you-cant-choose-your-fam-teacher-notes.docx" title="You can't choose your fam teacher notes"><span data-dcnode-id="3045" instrument_node="">You can’t choose your fam teacher notes</span></a></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3039"><strong data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Teacher’s notes</span></strong></p><span data-dcnode-id="3038" instrument_node="">
</span><h1 data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Lead-in</span></h1><span data-dcnode-id="3035" instrument_node="">
</span><p data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Write the expression “you can’t choose your family” on the board. What does it mean? Does it exist in your language?</span></p><span data-dcnode-id="3032" instrument_node="">
</span><h1 data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Peer Teaching</span></h1><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Put students in pairs and assign them As and Bs. Cut up the hand out and give them out. Tell students that they are going to teach each other some expressions related to family. Have two strong students do an example at the front of the class. A reads the first question of the first set to B:</span></p><span data-dcnode-id="3026" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3025" instrument_node="">“Are you </span><strong data-dcnode-id="3022"><u data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">named after</span></u></strong><span data-dcnode-id="3021" instrument_node=""> another member of your family?”</span></p><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">If B doesn’t understand they say “Sorry I don’t understand” and A reads them the second question, which contains the definition of the expression in bold:</span></p><span data-dcnode-id="3016" instrument_node="">
</span><p data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">“Were you given your name because an older member of the family has/had the same name?”</span></p><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3012" instrument_node="">So </span><strong data-dcnode-id="3009"><u data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">named after</span></u></strong><span data-dcnode-id="3008" instrument_node=""> means your name was inspired by the name of another member of the family or by another person whose name your parents liked.</span></p><span data-dcnode-id="3006" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">In pairs students ask and answer the questions, taking it in turns to ask and teach each other an expression. When they have finished they must test each other, first by asking for a definition of an expression, for example “what does like two peas in a pod mean?” and then by eliciting the expression “what’s the expression that means that two people are very similar?”</span></p><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Then test them in open class, As should know all of B’s expressions.</span></p><span data-dcnode-id="3000" instrument_node="">
</span><h1 data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Definition match</span></h1><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Students match the expressions with the definitions.</span></p><span data-dcnode-id="2994" instrument_node="">

</span><h1 data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Personalise</span></h1><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Students complete the sentences about themselves and then compare with their partners.</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2946"><strong data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Student handout</span></strong></p><span data-dcnode-id="2945" instrument_node="">
</span><h1 data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Student A</span></h1><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2939"><em data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Here you have six sets of two questions. Ask the first question of each set to your partner. If they don’t understand the expression in bold, ask them the second question, which contains the definition.</span></em></p><span data-dcnode-id="2938" instrument_node="">
</span><ol data-dcnode-id="2894"><span data-dcnode-id="2937" instrument_node="">
</span><li data-dcnode-id="2931"><span data-dcnode-id="2936" instrument_node="">Are you </span><strong data-dcnode-id="2933"><u data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">named after</span></u></strong><span data-dcnode-id="2932" instrument_node=""> another member of your family? Were you given your name because an older member of the family has/had the same name? Do any specific names run in your family?</span></li><span data-dcnode-id="2930" instrument_node="">
</span><li data-dcnode-id="2924"><span data-dcnode-id="2929" instrument_node="">Are you </span><strong data-dcnode-id="2926"><u data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">the spitting image of</span></u></strong><span data-dcnode-id="2925" instrument_node=""> another member of your family? Do you look almost exactly the same as another member of your family? If so, who?</span></li><span data-dcnode-id="2923" instrument_node="">
</span><li data-dcnode-id="2917"><span data-dcnode-id="2922" instrument_node="">Are you </span><strong data-dcnode-id="2919"><u data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">the black sheep</span></u></strong><span data-dcnode-id="2918" instrument_node=""> of your family? Are you the one member of your family who is different to all the others? If not, who is?</span></li><span data-dcnode-id="2916" instrument_node="">
</span><li data-dcnode-id="2910"><span data-dcnode-id="2915" instrument_node="">Do you often </span><strong data-dcnode-id="2912"><u data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">fall out with</span></u></strong><span data-dcnode-id="2911" instrument_node=""> members of your family? Do you argue of fight with members of your family? If so, who?</span></li><span data-dcnode-id="2909" instrument_node="">
</span><li data-dcnode-id="2903"><span data-dcnode-id="2908" instrument_node="">Do you want to </span><strong data-dcnode-id="2905"><u data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">follow in your parents’ footsteps</span></u></strong><span data-dcnode-id="2904" instrument_node="">? Do you want to do the same job as your parents? Why? Why not?</span></li><span data-dcnode-id="2902" instrument_node="">
</span><li data-dcnode-id="2896"><span data-dcnode-id="2901" instrument_node="">They say that </span><strong data-dcnode-id="2898"><u data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">blood is thicker than water.</span></u></strong><span data-dcnode-id="2897" instrument_node=""> Do you agree? Do you think that family is the most important thing?</span></li><span data-dcnode-id="2895" instrument_node="">
</span></ol><span data-dcnode-id="2893" instrument_node="">
</span><h1 data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Student B</span></h1><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2887"><em data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Here you have six sets of two questions. Ask the first question of each set to your partner. If they don’t understand the expression in bold, ask them the second question, which contains the definition.</span></em></p><span data-dcnode-id="2886" instrument_node="">
</span><ol data-dcnode-id="2838"><span data-dcnode-id="2885" instrument_node="">
</span><li data-dcnode-id="2879"><span data-dcnode-id="2884" instrument_node="">Do any specific names/characteristics </span><strong data-dcnode-id="2881"><u data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">run in your family</span></u></strong><span data-dcnode-id="2880" instrument_node="">? Are there any specific names/characteristics that are passed down from generation to generation?</span></li><span data-dcnode-id="2878" instrument_node="">
</span><li data-dcnode-id="2872"><span data-dcnode-id="2877" instrument_node="">Are you and any member of your family </span><strong data-dcnode-id="2874"><u data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">like chalk and cheese</span></u></strong><span data-dcnode-id="2873" instrument_node="">? Are you and any member of your family completely different?</span></li><span data-dcnode-id="2871" instrument_node="">
</span><li data-dcnode-id="2865"><span data-dcnode-id="2870" instrument_node="">Are you and any member of your family </span><strong data-dcnode-id="2867"><u data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">like two peas in a pod</span></u></strong><span data-dcnode-id="2866" instrument_node="">? Are you and any member of your family exactly the same in looks and personality?</span></li><span data-dcnode-id="2864" instrument_node="">
</span><li data-dcnode-id="2854"><span data-dcnode-id="2863" instrument_node="">Who is the main </span><strong data-dcnode-id="2860"><u data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">breadwinner</span></u></strong><span data-dcnode-id="2859" instrument_node=""> in your house? Who </span><strong data-dcnode-id="2856"><u data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">brings home the bacon</span></u></strong><span data-dcnode-id="2855" instrument_node="">? Who supports the family financially?</span></li><span data-dcnode-id="2853" instrument_node="">
</span><li data-dcnode-id="2847"><span data-dcnode-id="2852" instrument_node="">Who do you </span><strong data-dcnode-id="2849"><u data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">get on like a house on fire with</span></u></strong><span data-dcnode-id="2848" instrument_node=""> in your family? Who do you have a fantastic relationship with?</span></li><span data-dcnode-id="2846" instrument_node="">
</span><li data-dcnode-id="2840"><span data-dcnode-id="2845" instrument_node="">Who do you </span><strong data-dcnode-id="2842"><u data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">take after</span></u></strong><span data-dcnode-id="2841" instrument_node=""> in your family? Which parent have you inherited the most characteristics from?</span></li><span data-dcnode-id="2839" instrument_node="">

</span><p data-dcnode-id="2719"><em data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Complete these sentences so that they’re true for you.</span></em></p><span data-dcnode-id="2718" instrument_node="">

</span><li data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Me and my ______________ are like two peas in a pod because_______________________.</span></li><span data-dcnode-id="2711" instrument_node="">
</span><li data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">I often fall out with my ___________________ over ______________________.</span></li><span data-dcnode-id="2708" instrument_node="">
</span><li data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">I’m named after ____________________________.</span></li><span data-dcnode-id="2705" instrument_node="">
</span><li data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">I think I take after my ___________________ in my personality and my _________________ when it comes to my looks.</span></li><span data-dcnode-id="2702" instrument_node="">
</span><li data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">__________________ am/is the black sheep of my family because ____________________.</span></li><span data-dcnode-id="2699" instrument_node="">
</span><li data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Me and my ___________________are like chalk and cheese because __________________.</span></li><span data-dcnode-id="2696" instrument_node="">
</span><li data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">I get on with ____________ like a house on fire because __________________________.</span></li><span data-dcnode-id="2693" instrument_node="">
</span><li data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">____________________ runs in my family.</span></li><span data-dcnode-id="2690" instrument_node="">
</span><li data-dcnode-id="2680"><span data-dcnode-id="2689" instrument_node="">I </span><em data-dcnode-id="2686"><u data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">would/wouldn’t</span></u></em><span data-dcnode-id="2685" instrument_node=""> like to follow in my </span><em data-dcnode-id="2682"><u data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Mum/Dad/parents’</span></u></em><span data-dcnode-id="2681" instrument_node=""> footsteps because _________________________________.</span></li><span data-dcnode-id="2679" instrument_node="">
</span><li data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">People tell me that I’m the spitting image of ___________________________________.</span></li><span data-dcnode-id="2676" instrument_node="">
</span><li data-dcnode-id="2670"><span data-dcnode-id="2675" instrument_node="">I </span><em data-dcnode-id="2672"><u data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">agree/disagree</span></u></em><span data-dcnode-id="2671" instrument_node=""> that blood is thicker than water because___________________________.</span></li><span data-dcnode-id="2669" instrument_node="">
</span></ol><span data-dcnode-id="2667" instrument_node="">
