</span><p data-dcnode-id="745"><span data-dcnode-id="764" instrument_node="">Did you know that you can </span><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">ace</span></strong><span data-dcnode-id="761" instrument_node=""> an exam or even </span><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">bomb</span></strong><span data-dcnode-id="758" instrument_node=""> an exam? If you don't want to </span><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">bomb</span></strong><span data-dcnode-id="755" instrument_node=""> it, you should </span><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">hit the books</span></strong><span data-dcnode-id="752" instrument_node=""> or at least, </span><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">brush up on</span></strong><span data-dcnode-id="749" instrument_node=""> the subject. Or better yet, you should l</span><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">earn it by heart</span></strong><span data-dcnode-id="746" instrument_node="">. Today, I've got five idioms that have to do with learning something. Learning idioms can make your English conversation sound more natural and more colorful.&nbsp;</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="737"><strong data-dcnode-id="738"><em data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">Here are some of the example sentences.&nbsp;To get the rest and the details of this English lesson, you need to listen to the podcast&nbsp;or </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.myhappyenglish.com/transcript" style="color: #007aff;"><span data-dcnode-id="742" instrument_node="">get the&nbsp;transcript</span></a><span data-dcnode-id="740" instrument_node="">&nbsp;for the details.</span></em></strong></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">Remember!&nbsp;The transcript package includes </span><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">all of the Episodes</span></em><span data-dcnode-id="732" instrument_node="">, including this one.</span></p><span data-dcnode-id="730" instrument_node="">
</span><ul data-dcnode-id="700"><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="728" instrument_node="">I am taking a math exam on Friday and I'm sure I'm going to </span><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">ace</span></strong></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">Hey, I heard that Tommy </span><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">aced</span></strong><span data-dcnode-id="720" instrument_node=""> his job interview at Google.</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">How did you </span><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">bomb</span></strong><span data-dcnode-id="714" instrument_node=""> the history exam? Didn't you study?</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="711" instrument_node="">Oh man, I should have been better prepared for that interview. I totally </span><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">bombed</span></strong></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">Instead of spending the whole night looking at tick tock, why don't you try </span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">hitting the books</span></strong><span data-dcnode-id="703" instrument_node="">. Don't you have an exam next week?</span></li><span data-dcnode-id="701" instrument_node="">
</span></ul><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="696"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.myhappyenglish.com/transcript"><img data-dcnode-id="698" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/blogs/31941/images/wdVb8uCXTmmvs3vJ3vdU_Transcript-Plug-2021.jpg&amp;raw"></a></p><span data-dcnode-id="695" instrument_node="">
</span><ul data-dcnode-id="663"><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">I need to head to the library today and </span><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">hit the books</span></strong><span data-dcnode-id="690" instrument_node="">.</span></li><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">You guys know my second language is Japanese. So I've decided to </span><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">brush up on</span></strong><span data-dcnode-id="684" instrument_node=""> my reading and writing skills.</span></li><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">Nick decided to </span><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">brush up on</span></strong><span data-dcnode-id="678" instrument_node=""> his Italian for his vacation this summer.</span></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">The best way to remember idioms is to </span><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">learn them by heart</span></strong><span data-dcnode-id="672" instrument_node="">.</span></li><span data-dcnode-id="670" instrument_node="">
</span><li data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">Before he's audition, Eddie needed to </span><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">learn 10 songs by heart</span></strong><span data-dcnode-id="666" instrument_node="">.</span></li><span data-dcnode-id="664" instrument_node="">
</span></ul><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Thanks for checking it out! If you know anyone who might be interested in this English language point, why not help them out! Just share this lesson with them. Thanks for studying today!</span></p><span data-dcnode-id="659" instrument_node="">
