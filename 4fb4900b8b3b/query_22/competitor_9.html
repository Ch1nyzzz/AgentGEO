</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Idioms are expressions that don't mean what they appear to mean.
 For example, when you say 'it's raining cats and dogs',
 you don't mean that cats and dogs are falling out of sky, but rather
 that it's raining heavily. Idioms provide interesting insights into
 languages and thought processes of their speakers.
