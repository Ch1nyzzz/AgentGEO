</span><div class="entry-content" data-dcnode-id="1035"><span data-dcnode-id="2439" instrument_node="">
</span><div class="post-data__thumbnail post-data__thumbnail--topics" data-dcnode-id="2427" style="background-image: url(https://u5w6q7g2.stackpathcdn.com/blog/wp-content/uploads/2015/04/idioms1-624x325.jpg)"><div class="post-data__background" data-dcnode-id="2438"></div><div class="post-data__thumbnail-content" data-dcnode-id="2428"><div class="post-data__posted-on" data-dcnode-id="2431"><span class="meta-prep meta-prep-author" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Posted on</span></span><span data-dcnode-id="2435" instrument_node=""> </span><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//essayshark.com/blog/english-idioms-in-different-languages/" rel="bookmark" title="6:31 AM"><span class="entry-date updated" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">April 24, 2015</span></span></a></div><h1 class="post-data__post-title" data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">English Idioms in Different Languages</span></h1></div></div><span data-dcnode-id="2426" instrument_node=""> </span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//essayshark.com/survey/index.php%3Fr%3Dsurvey/index%26sid%3D792767%26lang%3Den" id="takeSurveyBanner" style="display: none;"><span data-dcnode-id="2425" instrument_node="">
</span><img alt="Take the Survey" data-dcnode-id="2424" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//u5w6q7g2.stackpathcdn.com/blog/wp-content/themes/themes/essayshark/css/img/take-survey.png&amp;raw" style="display: block; width: 100%;"><span data-dcnode-id="2423" instrument_node="">
</span></a><span data-dcnode-id="2421" instrument_node="">
</span><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416" style="text-align: justify;"><span data-dcnode-id="2417" instrument_node="">Hi everyone!</span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2413" style="text-align: justify;"><span data-dcnode-id="2414" instrument_node="">Do you know what is really exciting about learning foreign languages? We’ll tell you: getting a chance to take a look at habitual and mundane things from a different angle, getting a new perspective, and getting in the shoes of people who think and speak differently. It’s like becoming a foreigner!</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2401" style="text-align: justify;"><span data-dcnode-id="2411" instrument_node="">One of the easiest ways to take a glimpse at the mentality of other nations is to learn their sayings, proverbs, and idioms; and although the meaning of these idioms may be similar to English, the ways it is expressed can be really hilarious.</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">
</span><span data-dcnode-id="2408" id="more-7933"></span><br data-dcnode-id="2407"><span data-dcnode-id="2406" instrument_node="">
</span><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">1. English: It’s all Greek to me.</span></strong><br data-dcnode-id="2403"><span data-dcnode-id="2402" instrument_node="">
Greek: Sounds like Chinese.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2399" instrument_node="">Chinese: Looks like chicken intestines.</span><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">
Arabic: Am I speaking hindi?</span><br data-dcnode-id="2396"><span data-dcnode-id="2395" instrument_node="">
German: I understood only the “trainstation.”</span><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">
Danish: Sounds like a name of a Russian city.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2378" style="text-align: justify;"><strong data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">2. English: It’s raining cats and dogs.</span></strong><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">
Icelandic: Fire and sulfur.</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">
Greek: It’s raining with chair legs.</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">
Serbian: Rain that kills mice.</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">
Thai: Rain that covers eyes and ears.</span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">
Japanese: It’s raining soil and sand.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2364" style="text-align: justify;"><strong data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">3. English: When pigs fly.</span></strong><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node="">
Italian: When Easter is in May.</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">
Ukrainian: When a flea sneezes.</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">
Chinese: When the sun rises in the west.</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">
Finnish: When hell freezes.</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">
Croatian: In the day of Saint Nobody.</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2350" style="text-align: justify;"><strong data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">4. English: The lights are on, but no one is home.</span></strong><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">
Serbian: Hit by a wet sock.</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">
Czech: With an extra gear in his head.</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">
Estonian: Wooden head.</span><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node="">
Indonesian: Shrimp brain.</span><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">
Swedish: When he thinks he is not lucky.</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2336" style="text-align: justify;"><strong data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">5. English: As easy as falling off a log.</span></strong><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">
Chinese: As easy as turning your palm.</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">
Hebrew: It can be done blindfolded.</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">
French: As easy as putting a finger in your nose.</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">
Japanese: Can be done before breakfast.</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">
Korean: Can be done while lying on one’s back and eating rice cupcakes.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333" style="text-align: justify;"><span data-dcnode-id="2334" instrument_node="">We do hope, you found out post funny and useful. Here is out presentation that will help you to broaden the vocabulary and a viewpoint.</span></p><span data-dcnode-id="2332" instrument_node="">
