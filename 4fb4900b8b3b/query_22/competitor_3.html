</span><h1 data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Idioms in American Sign Language</span></h1><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">
A general online dictionary defines "idiom" as "A speech form or an expression of a given language that is peculiar to itself grammatically or cannot be understood from the individual meanings of its elements." 
</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">
In English, for example, "raining cats and dogs" for heavy rain, "break a leg" meaning "to wish someone good luck".
</span></p><span data-dcnode-id="1833" instrument_node="">
</span><h2 data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Train Zoom, Sorry</span></h2><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">
Here goes your million question (or actually a ten thousand question, I don't know) on the American TV game "Who Wants to Be a Millionaire":
</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1826" instrument_node="">
</span><img alt="a million question on an ASL idiom" data-dcnode-id="1825" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/learn/i/idiom/million-question-game.jpg&amp;raw"><span data-dcnode-id="1824" instrument_node="">
</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">
What is your answer to the question above?
</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">
Needs a lifeline? 50:50, Phone-a-Friend, Ask the Expert, or Ask the Audience? Whatever is your choice, here it is:
</span></p><span data-dcnode-id="1816" instrument_node="">
</span><video class="v-asl" controls="" data-dcnode-id="1815" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/learn/i/idiom/train-gone-sorry.mp4&amp;raw" type="video/mp4"></video><span data-dcnode-id="1814" instrument_node="">
</span><p class="ex" data-dcnode-id="1801"><span data-dcnode-id="1813" instrument_node="">
Glossed as: </span><span class="asl" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">train gone sorry</span></span><span data-dcnode-id="1810" instrument_node="">, or more literally, </span><span class="asl" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">train zoom sorry</span></span><span data-dcnode-id="1807" instrument_node="">
</span><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node="">English translation: </span><span class="eng" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The train has been just gone, sorry.</span></span><span data-dcnode-id="1802" instrument_node="">
</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">
Not helpful?
</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">
I don't wish to repeat what I just said.
</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">
Are you confused? Yeah, just a pun. :D
</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">
If a signer is about to finish the last sentence with a listener at around the same time another friend joins this group's conversation. The person might be curious and ask, "What did you just say?" The signer or listener in the group might say "train gone sorry." It means that they wouldn't repeat what they just talked. Usually, it is a friendly remark or sometimes a joke.
</span></p><span data-dcnode-id="1788" instrument_node="">
</span><figure data-dcnode-id="1781"><span data-dcnode-id="1787" instrument_node="">
</span><img alt="train gone sorry" data-dcnode-id="1786" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/learn/i/idiom/train-gone-sorry.jpg&amp;raw"><span data-dcnode-id="1785" instrument_node="">
</span><figcaption data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Cartoon by Matt and Kay Daigle. With Permission.</span></figcaption><span data-dcnode-id="1782" instrument_node="">
</span></figure><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1779" instrument_node="">
</span><span data-dcnode-id="1777" instrument_node="">
</span></p><h2 data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">The train is back!</span></h2><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1772" instrument_node="">
Back to </span><span class="asl" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">TRAIN GONE, SORRY"</span></span><span data-dcnode-id="1769" instrument_node=""> idiom (see video below contributed by June Ann LeFors).
</span></p><span data-dcnode-id="1767" instrument_node="">
</span><video class="v-asl" controls="" data-dcnode-id="1766" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/learn/i/idiom/idiom-train-zoom-lefors.mp4&amp;raw" type="video/mp4"></video><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">
"Sorry, I cannot repeat what I've just said." Or, "Sorry, you've just missed it and I won't repeat it."
</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">
But, the signer who missed the train can zinger "the train is back!" 
</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">
The signer then would sign "CIGARETTE-BURNED-OUT". See the video (contributed by June Ann LeFors, 2017) for a demonstration.
</span></p><span data-dcnode-id="1756" instrument_node="">
</span><video class="v-asl" controls="" data-dcnode-id="1755" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/learn/i/idiom/idiom-cig-lefors.mp4&amp;raw" type="video/mp4"></video><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">
You cannot get the burned-out cigarette back!
</span></p><span data-dcnode-id="1751" instrument_node="">
</span><h2 data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">More ASL Idioms</span></h2><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">
Another common ASL idiom is the verb phrase </span><span class="asl" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">FINISH+TOUCH</span></span><span data-dcnode-id="1744" instrument_node=""> in which means "been there" or "been to" in English.
</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1741" instrument_node="">
</span><span class="asl" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">STAND-ON-FENCE</span></span><span data-dcnode-id="1738" instrument_node=""> for "uncertain", </span><span class="asl" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">MIND+DISAPPEAR</span></span><span data-dcnode-id="1735" instrument_node=""> for "mind slips", </span><span class="asl" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">FUNNY+ZERO</span></span><span data-dcnode-id="1732" instrument_node=""> for "That's not funny!" (in a semi-humorous sense), </span><span class="asl" data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">WON'T BITE-YOU</span></span><span data-dcnode-id="1729" instrument_node=""> for "don't be afraid of me".
</span></p><span data-dcnode-id="1727" instrument_node="">
</span><video class="v-asl" controls="" data-dcnode-id="1726" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/learn/i/idiom/idiom-bird-pickhead-lefors.mp4&amp;raw" type="video/mp4"></video><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">
The ASL sign "BIRD+PICKHEAD" in the video (contributed by LeFors, 2017) above means "my thought just disappeared" or "I just forgot now."
</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">
More: FREE EYES (allowed to watch), FISH SWALLOWED (guillible), MONEY BEHIND, THINK+EASY, DRY DISCUSSION (no further discussion or discussion closed), RIGHT++ MIND-HEARING (No wonder, it's a hearing thing), RESPECT BLOW-AIR-HAND (completely no respect).
</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">
In American Sign Language (ASL), there are some idioms of its own and some idioms influenced by a spoken language (English). Both languages may share a few similar idioms.
</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">
For example, the idiom </span><span class="asl" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">BROWNNOSE</span></span><span data-dcnode-id="1712" instrument_node=""> (try to please the other; to suck up) in ASL, for example, is one of the terms that English and ASL share the same.
</span></p><span data-dcnode-id="1710" instrument_node="">
</span><video class="v-asl" controls="" data-dcnode-id="1709" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handspeak.com/word/b/brownnose.mp4&amp;raw" type="video/mp4"></video><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">
BROWNNOSE: to seek favor or approval from (someone) by obsequious behavior for personal gain.
</span></p><span data-dcnode-id="1705" instrument_node="">
