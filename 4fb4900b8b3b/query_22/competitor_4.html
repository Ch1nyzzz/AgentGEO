</span><section class="ct-section section single-post-section" data-dcnode-id="254" id="section-2-456"><div class="ct-section-inner-wrap" data-dcnode-id="255"><div class="ct-div-block row single-post-row" data-dcnode-id="1692" id="div_block-3-456"><h1 class="ct-headline single-post-h1" data-dcnode-id="1693" id="headline-4-456"><span class="ct-span" data-dcnode-id="1694" id="span-5-456"><span data-dcnode-id="1695" instrument_node="">Chinese Proverbs and Idioms on Learning and Education</span></span></h1></div><div class="ct-div-block row single-post-row" data-dcnode-id="1677" id="div_block-14-456"><div class="ct-div-block post-author-wrap" data-dcnode-id="1678" id="div_block-22-456"><a class="ct-link" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/author/anias/" id="link-62-456" target="_self"><img alt="" class="ct-image author-pic perfmatters-lazy" data-dcnode-id="1691" data-src="https://secure.gravatar.com/avatar/dd6a040be33853fd5540d028e04a47b4?s=96&amp;d=mm&amp;r=g" id="image-21-456" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">&lt;img id="image-21-456" alt="" src="https://secure.gravatar.com/avatar/dd6a040be33853fd5540d028e04a47b4?s=96&amp;d=mm&amp;r=g" class="ct-image author-pic"/&gt;</span></noscript></a><a class="ct-link-text author-name" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/author/anias/" id="text_block-25-456" target="_self"><span class="ct-span" data-dcnode-id="1686" id="span-26-456"><span data-dcnode-id="1687" instrument_node="">Anias Stambolis-D’Agostino</span></span></a><div class="ct-code-block author-post-date" data-dcnode-id="1683" id="code_block-84-456"><span data-dcnode-id="1684" instrument_node=""> October 19, 2021</span></div><div class="ct-text-block author-post-category" data-dcnode-id="1679" id="text_block-29-456"><span class="ct-span" data-dcnode-id="1680" id="span-30-456"><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/category/learn-chinese/" rel="tag"><span data-dcnode-id="1682" instrument_node="">Learn Chinese</span></a></span></div></div></div><div class="ct-div-block row single-post-row" data-dcnode-id="267" id="div_block-10-456"><div class="ct-inner-content" data-dcnode-id="517" id="inner_content-12-456"><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Proverbs and idioms are integral components of the Chinese language. Passed down through the ages, these concise sayings often aim to impart inherited wisdom, historical tales, and even moral insights. Chinese proverbs about learning are perhaps the most profound of them all.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Read on to learn 12 great Chinese sayings about the world of learning and education.</span></p><span data-dcnode-id="1671" instrument_node="">

</span><table class="tablepress tablepress-id-457 tablepress-responsive" data-dcnode-id="1432" id="tablepress-457"><thead data-dcnode-id="1557"><tr class="row-1" data-dcnode-id="1559"><th class="column-1" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">汉字</span></th><th class="column-2" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Pinyin</span></th><th class="column-3" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">English</span></th></tr></thead><tbody data-dcnode-id="1434"><tr class="row-2" data-dcnode-id="1546"><td class="column-1" data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">授人以鱼不如授人以渔</span></td><td class="column-2" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">shòu rén yǐ yú bùrú shòu rén yǐ yú</span></td><td class="column-3" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Give a man a fish and you feed him for one day. Teach a man to fish and you feed him for a lifetime.</span></td></tr><tr class="row-3" data-dcnode-id="1536"><td class="column-1" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">学如登山</span></td><td class="column-2" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">xué rú dēng shān</span></td><td class="column-3" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Studying is like climbing a mountain.</span></td></tr><tr class="row-4" data-dcnode-id="1526"><td class="column-1" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">念念不忘</span></td><td class="column-2" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">niànniàn-bùwàng</span></td><td class="column-3" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Study hard and don’t forget.</span></td></tr><tr class="row-5" data-dcnode-id="1516"><td class="column-1" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">三人行，必有我师</span></td><td class="column-2" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">sān rén xíng, bì yǒu wǒ shī</span></td><td class="column-3" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">In a group of three people, there will always be one person I can learn from.</span></td></tr><tr class="row-6" data-dcnode-id="1506"><td class="column-1" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">师傅领进门，修行在个人</span></td><td class="column-2" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">shīfù lǐng jìnmén, xiūxíng zài gèrén</span></td><td class="column-3" data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Teachers open the door; you enter by yourself.</span></td></tr><tr class="row-7" data-dcnode-id="1496"><td class="column-1" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">活到老，学到老</span></td><td class="column-2" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">huó dào lǎo, xué dào lǎo</span></td><td class="column-3" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Live until you're old, study until you're old.</span></td></tr><tr class="row-8" data-dcnode-id="1486"><td class="column-1" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">严师出高徒</span></td><td class="column-2" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">yánshī chū gāotú</span></td><td class="column-3" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Strict teachers produce brilliant students.</span></td></tr><tr class="row-9" data-dcnode-id="1476"><td class="column-1" data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">读万卷书不如行万里路</span></td><td class="column-2" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">dú wàn juǎn shū bùrú xíng wàn lǐ lù</span></td><td class="column-3" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Reading ten thousand books is not as good as walking a thousand miles.</span></td></tr><tr class="row-10" data-dcnode-id="1466"><td class="column-1" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">学无止境</span></td><td class="column-2" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">xué wú zhǐ jìng</span></td><td class="column-3" data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Learning is limitless.</span></td></tr><tr class="row-11" data-dcnode-id="1456"><td class="column-1" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">学然后知不足</span></td><td class="column-2" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">xué ránhòu zhī bùzú</span></td><td class="column-3" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">To learn is to encounter one’s own ignorance.</span></td></tr><tr class="row-12" data-dcnode-id="1446"><td class="column-1" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">教学相长</span></td><td class="column-2" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">jiàoxué-xiāngzhǎng</span></td><td class="column-3" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">When you teach someone, both teacher and student benefit. </span></td></tr><tr class="row-13" data-dcnode-id="1436"><td class="column-1" data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">温故而知新</span></td><td class="column-2" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">wēngù’érzhīxīn</span></td><td class="column-3" data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Studying the past helps to understand the present.</span></td></tr></tbody></table><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1430" instrument_node="">Download the above </span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/wp-content/uploads/2021/09/chinese-proverbs-about-learning.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1429" instrument_node="">table as a PDF</span></a><span data-dcnode-id="1427" instrument_node=""> or you can view it </span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/spreadsheets/d/1dnjfajpFV_gGH30zxJ6VnYwdEJ_9vKnbgRvENNcKlyM/edit%3Fusp%3Dsharing" rel="noopener" target="_blank"><span data-dcnode-id="1426" instrument_node="">in Google Sheets</span></a><span data-dcnode-id="1424" instrument_node="">.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1421" instrument_node="">Here's a more detailed explanation for each of the above </span><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Chinese proverbs about learning</span></strong><span data-dcnode-id="1418" instrument_node="">:</span></p><span data-dcnode-id="1416" instrument_node="">
</span><h3 data-dcnode-id="1413"><span data-dcnode-id="1414" id="i"><span data-dcnode-id="1415" instrument_node="">授人以鱼不如授人以渔</span></span></h3><span data-dcnode-id="1412" instrument_node="">
</span><ul data-dcnode-id="1395"><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1407"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1408" instrument_node=""> shòu rén yǐ yú bùrú shòu rén yǐ yú</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">English:</span></strong><span data-dcnode-id="1403" instrument_node=""> Give a man a fish and you feed him for one day. Teach a man to fish and you feed him for a lifetime.</span></li><span data-dcnode-id="1401" instrument_node="">
</span><li data-dcnode-id="1397"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1398" instrument_node=""> Easily translated between Chinese and English, this ancient insight emphasizes that teaching someone a skill, rather than simply procuring the reward for them, is the best way to help them achieve lifelong success.</span></li><span data-dcnode-id="1396" instrument_node="">
</span></ul><span data-dcnode-id="1394" instrument_node="">
</span><h3 data-dcnode-id="1391"><span data-dcnode-id="1392" id="i-2"><span data-dcnode-id="1393" instrument_node="">学如登山</span></span></h3><span data-dcnode-id="1390" instrument_node="">
</span><ul data-dcnode-id="1373"><span data-dcnode-id="1389" instrument_node="">
</span><li data-dcnode-id="1385"><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1386" instrument_node=""> xué rú dēng shān</span></li><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1380"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">English:</span></strong><span data-dcnode-id="1381" instrument_node=""> Studying is like climbing a mountain.</span></li><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1375"><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1376" instrument_node=""> Encourage your Chinese friends to keep working hard with this inspiring adage. Remember, while the road ahead may be steep like a mountain trail, the view from the top will surely be worth it!</span></li><span data-dcnode-id="1374" instrument_node="">
</span></ul><span data-dcnode-id="1372" instrument_node="">
</span><h3 data-dcnode-id="1369"><span data-dcnode-id="1370" id="i-3"><span data-dcnode-id="1371" instrument_node="">念念不忘</span></span></h3><span data-dcnode-id="1368" instrument_node="">
</span><ul data-dcnode-id="1351"><span data-dcnode-id="1367" instrument_node="">
</span><li data-dcnode-id="1363"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1364" instrument_node=""> niànniàn-bùwàng</span></li><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1358"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">English:</span></strong><span data-dcnode-id="1359" instrument_node=""> Study hard and don’t forget.</span></li><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1353"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1354" instrument_node=""> This proverb is similar to the English saying “where there’s a will, there’s a way.” It encourages the recipient to continue pondering a problem and not to quickly forget something learned by neglecting one’s studies.</span></li><span data-dcnode-id="1352" instrument_node="">
</span></ul><span data-dcnode-id="1350" instrument_node="">
</span><h3 data-dcnode-id="1347"><span data-dcnode-id="1348" id="i-4"><span data-dcnode-id="1349" instrument_node="">三人行，必有我师</span></span></h3><span data-dcnode-id="1346" instrument_node="">
</span><ul data-dcnode-id="1325"><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1341"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1342" instrument_node=""> sān rén xíng, bì yǒu wǒ shī</span></li><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">English:</span></strong><span data-dcnode-id="1337" instrument_node=""> In a group of three people, there will always be one person I can learn from.</span></li><span data-dcnode-id="1335" instrument_node="">
</span><li data-dcnode-id="1327"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1332" instrument_node=""> Confucius made many sagacious statements about learning in his life and works. As one of the most famous quotes from the </span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//classics.mit.edu/Confucius/analects.html" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Confucian Analects</span></i></a><span data-dcnode-id="1328" instrument_node="">, this positive anecdote reminds us to stay open-minded when interacting with and learning from others. Everyone (or at least one of the two people you are ‘walking’ with) has something unique to teach you.</span></li><span data-dcnode-id="1326" instrument_node="">
</span></ul><span data-dcnode-id="1324" instrument_node="">
</span><h3 data-dcnode-id="1321"><span data-dcnode-id="1322" id="i-5"><span data-dcnode-id="1323" instrument_node="">师傅领进门，修行在个人</span></span></h3><span data-dcnode-id="1320" instrument_node="">
</span><ul data-dcnode-id="1303"><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1315"><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1316" instrument_node=""> shīfù lǐng jìnmén, xiūxíng zài gèrén</span></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1310"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">English:</span></strong><span data-dcnode-id="1311" instrument_node=""> Teachers open the door; you enter by yourself.</span></li><span data-dcnode-id="1309" instrument_node="">
</span><li data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1306" instrument_node=""> Remember to take responsibility for your own learning with the help of this proverb, which demonstrates how education is a duty shared between the teacher and student. Note that 修行 (xiū xíng) means to devote oneself to perfecting a craft or spiritual practice.</span></li><span data-dcnode-id="1304" instrument_node="">
</span></ul><span data-dcnode-id="1302" instrument_node="">
</span><h3 data-dcnode-id="1299"><span data-dcnode-id="1300" id="i-6"><span data-dcnode-id="1301" instrument_node="">活到老，学到老</span></span></h3><span data-dcnode-id="1298" instrument_node="">
</span><ul data-dcnode-id="1281"><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1293"><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1294" instrument_node=""> huó dào lǎo, xué dào lǎo</span></li><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1288"><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">English:</span></strong><span data-dcnode-id="1289" instrument_node=""> Live until you're old, study until you're old.</span></li><span data-dcnode-id="1287" instrument_node="">
</span><li data-dcnode-id="1283"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1284" instrument_node=""> Never stop learning! This charming saying reminds us that one is never too old to learn something new.</span></li><span data-dcnode-id="1282" instrument_node="">
</span></ul><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1275"><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/free-chinese-lesson/"><img alt="chinese teacher in traditional chinese dress standing in front of yellow background facing forward with promotional language overlaid" class="alignnone wp-image-5261 promohover perfmatters-lazy loaded" data-dcnode-id="1279" data-src="https://studycli.org/wp-content/uploads/2021/10/online-promo-001.jpg" data-was-processed="true" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/wp-content/uploads/2021/10/online-promo-001.jpg&amp;raw" width="500"><noscript data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">&lt;img class="alignnone wp-image-5261 promohover" src="https://studycli.org/wp-content/uploads/2021/10/online-promo-001.jpg" alt="chinese teacher in traditional chinese dress standing in front of yellow background facing forward with promotional language overlaid" width="500" height="500" /&gt;</span></noscript></a></p><span data-dcnode-id="1274" instrument_node="">
</span><h3 data-dcnode-id="1271"><span data-dcnode-id="1272" id="i-7"><span data-dcnode-id="1273" instrument_node="">严师出高徒</span></span></h3><span data-dcnode-id="1270" instrument_node="">
</span><ul data-dcnode-id="1253"><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1265"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1266" instrument_node=""> yánshī chū gāotú</span></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1260"><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">English:</span></strong><span data-dcnode-id="1261" instrument_node=""> Strict teachers produce brilliant students.</span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1255"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1256" instrument_node=""> If you’ve ever been an educator or had a really tough teacher, you may either agree or disagree with this sentiment. Either way, this proverb speaks to the traditional Chinese notion that tough love and rigor is the most effective method for educating students and children.</span></li><span data-dcnode-id="1254" instrument_node="">
</span></ul><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1249"><span data-dcnode-id="1250" id="i-8"><span data-dcnode-id="1251" instrument_node="">读万卷书不如行万里路</span></span></h3><span data-dcnode-id="1248" instrument_node="">
</span><ul data-dcnode-id="1231"><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1243"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1244" instrument_node=""> dú wàn juǎn shū bùrú xíng wàn lǐ lù</span></li><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1238"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">English:</span></strong><span data-dcnode-id="1239" instrument_node=""> Reading ten thousand books is not as good as walking a thousand miles.</span></li><span data-dcnode-id="1237" instrument_node="">
</span><li data-dcnode-id="1233"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1234" instrument_node=""> For all the adventurers with a bad case of wanderlust out there, be sure to quote this proverb next time your friends or family tell you to stay indoors and study when you would rather be outside exploring. This philosophy validates the notion that life experience may, in fact, be more important than purely conceptual knowledge.</span></li><span data-dcnode-id="1232" instrument_node="">
</span></ul><span data-dcnode-id="1230" instrument_node="">
</span><h3 data-dcnode-id="1227"><span data-dcnode-id="1228" id="i-9"><span data-dcnode-id="1229" instrument_node="">学无止境</span></span></h3><span data-dcnode-id="1226" instrument_node="">
</span><ul data-dcnode-id="1209"><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1221"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1222" instrument_node=""> xué wú zhǐ jìng</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1216"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">English:</span></strong><span data-dcnode-id="1217" instrument_node=""> Learning is limitless.</span></li><span data-dcnode-id="1215" instrument_node="">
</span><li data-dcnode-id="1211"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1212" instrument_node=""> Literally meaning “study has no boundaries,” this proverb speaks to the infinite universe of knowledge that awaits you. In life, there is always something new to study—we think this saying is especially true when it comes to learning Chinese!</span></li><span data-dcnode-id="1210" instrument_node="">
</span></ul><span data-dcnode-id="1208" instrument_node="">
</span><h3 data-dcnode-id="1205"><span data-dcnode-id="1206" id="i-10"><span data-dcnode-id="1207" instrument_node="">学然后知不足</span></span></h3><span data-dcnode-id="1204" instrument_node="">
</span><ul data-dcnode-id="1183"><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1199"><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1200" instrument_node=""> xué ránhòu zhī bùzú</span></li><span data-dcnode-id="1198" instrument_node="">
</span><li data-dcnode-id="1194"><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">English:</span></strong><span data-dcnode-id="1195" instrument_node=""> To learn is to encounter one’s own ignorance.</span></li><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1185"><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1190" instrument_node=""> A quote from the Confucian classic </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chinaknowledge.de/Literature/Classics/liji.html" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Book of Rites</span></i></a><span data-dcnode-id="1186" instrument_node="">, 学然后知不足 (xué ránhòu zhī bùzú) is an important proverb for remembering humility and translates literally as “learn, then know your deficiencies.” In the original text, this quote is followed by the parallel clause 教然后知困 (jiāo ránhòu zhī kùn), meaning “teach, then know your difficulties.”</span></li><span data-dcnode-id="1184" instrument_node="">
</span></ul><span data-dcnode-id="1182" instrument_node="">
</span><h3 data-dcnode-id="1179"><span data-dcnode-id="1180" id="i-11"><span data-dcnode-id="1181" instrument_node="">教学相长</span></span></h3><span data-dcnode-id="1178" instrument_node="">
</span><ul data-dcnode-id="1161"><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1173"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1174" instrument_node=""> jiàoxué-xiāngzhǎng</span></li><span data-dcnode-id="1172" instrument_node="">
</span><li data-dcnode-id="1168"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">English:</span></strong><span data-dcnode-id="1169" instrument_node=""> When you teach someone, both teacher and student benefit.</span></li><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1163"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1164" instrument_node=""> This proverb is a helpful reminder that teaching can be a great way to continue learning. As the familiar theory goes, teaching someone is a useful way to learn and retain new information.</span></li><span data-dcnode-id="1162" instrument_node="">
</span></ul><span data-dcnode-id="1160" instrument_node="">
</span><h3 data-dcnode-id="1157"><span data-dcnode-id="1158" id="i-12"><span data-dcnode-id="1159" instrument_node="">温故而知新</span></span></h3><span data-dcnode-id="1156" instrument_node="">
</span><ul data-dcnode-id="1136"><span data-dcnode-id="1155" instrument_node="">
</span><li data-dcnode-id="1151"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Pinyin:</span></strong><span data-dcnode-id="1152" instrument_node=""> wēngù’érzhīxīn</span></li><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1146"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">English:</span></strong><span data-dcnode-id="1147" instrument_node=""> Studying the past helps to understand the present.</span></li><span data-dcnode-id="1145" instrument_node="">
</span><li data-dcnode-id="1138"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1142" instrument_node=""> Another idiom derived directly from the </span><i data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Confucian Analects</span></i><span data-dcnode-id="1139" instrument_node="">, this proverb advocates for the importance of considering the past in order to apply lessons to the present and future.</span></li><span data-dcnode-id="1137" instrument_node="">
</span></ul><span data-dcnode-id="1135" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1129" id="attachment_64867" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64867" class="wp-image-64867 size-full perfmatters-lazy" data-dcnode-id="1134" data-src="https://studycli.org/wp-content/uploads/2021/06/chinese-school.jpg" height="701" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20701'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">&lt;img aria-describedby="caption-attachment-64867" class="wp-image-64867 size-full" src="https://studycli.org/wp-content/uploads/2021/06/chinese-school.jpg" alt="" width="705" height="701" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1130" id="caption-attachment-64867"><span data-dcnode-id="1131" instrument_node="">A drawing featuring a traditional Chinese school in the early 20th century.</span></p></div><span data-dcnode-id="1128" instrument_node="">
</span><h2 data-dcnode-id="1125"><span data-dcnode-id="1126" id="A_brief_history_of_education_in_China"><span data-dcnode-id="1127" instrument_node="">A brief history of education in China</span></span></h2><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">As home to one of the world’s oldest civilizations, China has long placed great importance on 教育 (jiàoyù; education). Historians date the beginning of institutionalized education in the Middle Kingdom to the 16th century BC.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><h3 data-dcnode-id="1118"><span data-dcnode-id="1119" id="The_Four_Books_and_The_Five_Classics"><span data-dcnode-id="1120" instrument_node="">The Four Books and The Five Classics</span></span></h3><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1115" style="font-weight: 400;"><span data-dcnode-id="1116" instrument_node="">At the time, educational pedagogy was rooted in </span></span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asiasociety.org/education/confucianism" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1113" style="font-weight: 400;"><span data-dcnode-id="1114" instrument_node="">Confucianism</span></span></a><span data-dcnode-id="1110" style="font-weight: 400;"><span data-dcnode-id="1111" instrument_node="">, a moral ideology and school of thought founded by the esteemed scholar, philosopher, and teacher 孔子 (kǒngzǐ; Confucius).</span></span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1106" style="font-weight: 400;"><span data-dcnode-id="1107" instrument_node="">Like </span></span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/filial-piety-in-chinese-688386" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1104" style="font-weight: 400;"><span data-dcnode-id="1105" instrument_node="">filial piety</span></span></a><span data-dcnode-id="1101" style="font-weight: 400;"><span data-dcnode-id="1102" instrument_node="">, hierarchical governance, and moral virtue, the essential role of education within China’s broader value system was shaped in accordance with Confucian thought. Speaking to the importance of practice, or learning, as a vital framework in building effective societies, Confucius once said, “By nature, men are alike. By practice, men become far apart.”&nbsp;</span></span></p><span data-dcnode-id="1099" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1093" id="attachment_64869" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64869" class="wp-image-64869 size-full perfmatters-lazy" data-dcnode-id="1098" data-src="https://studycli.org/wp-content/uploads/2021/06/confucius-is-having-a-class-with-students.jpg" height="578" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20578'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">&lt;img aria-describedby="caption-attachment-64869" class="wp-image-64869 size-full" src="https://studycli.org/wp-content/uploads/2021/06/confucius-is-having-a-class-with-students.jpg" alt="" width="705" height="578" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1094" id="caption-attachment-64869"><span data-dcnode-id="1095" instrument_node="">Confucius (551–479 BCE), scholar of unmatched stature in Chinese history, holding class with his pupils.</span></p></div><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1090" style="font-weight: 400;"><span data-dcnode-id="1091" instrument_node="">In the early era of Confucian-style education during the </span></span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Spring-and-Autumn-Period" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1088" style="font-weight: 400;"><span data-dcnode-id="1089" instrument_node="">Spring and Autumn</span></span></a><span data-dcnode-id="1085" style="font-weight: 400;"><span data-dcnode-id="1086" instrument_node=""> and </span></span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Warring-States" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node="">Warring States</span></span></a><span data-dcnode-id="1080" style="font-weight: 400;"><span data-dcnode-id="1081" instrument_node=""> periods (770-221 BCE), schooling was reserved as a privilege for the elite, and academies were established to educate the children of nobility.</span></span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1076" style="font-weight: 400;"><span data-dcnode-id="1077" instrument_node="">Confucian curriculum—as consolidated by his disciples—was based on </span></span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shorthistory.org/ancient-civilizations/ancient-china/the-five-classics-of-the-ancient-china/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1074" style="font-weight: 400;"><span data-dcnode-id="1075" instrument_node="">the philosopher’s founding texts</span></span></a><span data-dcnode-id="1071" style="font-weight: 400;"><span data-dcnode-id="1072" instrument_node="">, known as The Four Books and The Five Classics (四书五经 Sìshū Wǔjīng). The Confucian doctrines that emerged during this period created an enduring structure for educational pedagogy in China.</span></span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1066"><b data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The Four Books (四书 sìshū)</span></b></p><span data-dcnode-id="1065" instrument_node="">
</span><ul data-dcnode-id="1035"><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1058" style="font-weight: 400;"><i data-dcnode-id="1061"><span data-dcnode-id="1062" style="font-weight: 400;"><span data-dcnode-id="1063" instrument_node="">Great Learning </span></span></i><span data-dcnode-id="1059" style="font-weight: 400;"><span data-dcnode-id="1060" instrument_node="">(大学 dà xué)</span></span></li><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1051" style="font-weight: 400;"><i data-dcnode-id="1054"><span data-dcnode-id="1055" style="font-weight: 400;"><span data-dcnode-id="1056" instrument_node="">Doctrine of the Mean </span></span></i><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node="">(中庸 zhōng yōng)</span></span></li><span data-dcnode-id="1050" instrument_node="">
</span><li data-dcnode-id="1044" style="font-weight: 400;"><i data-dcnode-id="1047"><span data-dcnode-id="1048" style="font-weight: 400;"><span data-dcnode-id="1049" instrument_node="">Confucian Analects</span></span></i><span data-dcnode-id="1045" style="font-weight: 400;"><span data-dcnode-id="1046" instrument_node=""> (论语 lún yǔ)</span></span></li><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1037"><i data-dcnode-id="1040"><span data-dcnode-id="1041" style="font-weight: 400;"><span data-dcnode-id="1042" instrument_node="">Works of Mencius</span></span></i><span data-dcnode-id="1038" style="font-weight: 400;"><span data-dcnode-id="1039" instrument_node=""> (孟子 mèng zǐ)</span></span></li><span data-dcnode-id="1036" instrument_node="">
</span></ul><span data-dcnode-id="1034" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1028" id="attachment_64872" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64872" class="wp-image-64872 size-full perfmatters-lazy" data-dcnode-id="1033" data-src="https://studycli.org/wp-content/uploads/2021/06/the-four-books.jpg" height="485" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20485'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&lt;img aria-describedby="caption-attachment-64872" class="wp-image-64872 size-full" src="https://studycli.org/wp-content/uploads/2021/06/the-four-books.jpg" alt="" width="705" height="485" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1029" id="caption-attachment-64872"><span data-dcnode-id="1030" instrument_node="">The Works of Mencius &amp; The Great Learning</span></p></div><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1024"><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The Five Classics (五经 wǔjīng)</span></b></p><span data-dcnode-id="1023" instrument_node="">
</span><ul data-dcnode-id="975"><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1008" style="font-weight: 400;"><i data-dcnode-id="1019"><span data-dcnode-id="1020" style="font-weight: 400;"><span data-dcnode-id="1021" instrument_node="">Book of Poetry</span></span></i><span data-dcnode-id="1017" style="font-weight: 400;"><span data-dcnode-id="1018" instrument_node=""> (诗经 shī jīng), also known as </span></span><i data-dcnode-id="1014"><span data-dcnode-id="1015" style="font-weight: 400;"><span data-dcnode-id="1016" instrument_node="">Book of Songs</span></span></i><span data-dcnode-id="1012" style="font-weight: 400;"><span data-dcnode-id="1013" instrument_node=""> or </span></span><i data-dcnode-id="1009"><span data-dcnode-id="1010" style="font-weight: 400;"><span data-dcnode-id="1011" instrument_node="">Book of Odes</span></span></i></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="998" style="font-weight: 400;"><i data-dcnode-id="1004"><span data-dcnode-id="1005" style="font-weight: 400;"><span data-dcnode-id="1006" instrument_node="">Book of Documents</span></span></i><span data-dcnode-id="1002" style="font-weight: 400;"><span data-dcnode-id="1003" instrument_node=""> (书经 shū jīng), also known as </span></span><i data-dcnode-id="999"><span data-dcnode-id="1000" style="font-weight: 400;"><span data-dcnode-id="1001" instrument_node="">Classic of History</span></span></i></li><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="991" style="font-weight: 400;"><i data-dcnode-id="994"><span data-dcnode-id="995" style="font-weight: 400;"><span data-dcnode-id="996" instrument_node="">Book of Rites</span></span></i><span data-dcnode-id="992" style="font-weight: 400;"><span data-dcnode-id="993" instrument_node=""> (礼记 lǐ jì)</span></span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="984" style="font-weight: 400;"><i data-dcnode-id="987"><span data-dcnode-id="988" style="font-weight: 400;"><span data-dcnode-id="989" instrument_node="">Book of Changes</span></span></i><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node=""> (易经 yì jīng)</span></span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="977" style="font-weight: 400;"><i data-dcnode-id="980"><span data-dcnode-id="981" style="font-weight: 400;"><span data-dcnode-id="982" instrument_node="">Spring and Autumn Annals</span></span></i><span data-dcnode-id="978" style="font-weight: 400;"><span data-dcnode-id="979" instrument_node=""> (春秋 chūn qiū)</span></span></li><span data-dcnode-id="976" instrument_node="">
</span></ul><span data-dcnode-id="974" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="968" id="attachment_64871" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64871" class="wp-image-64871 size-full perfmatters-lazy" data-dcnode-id="973" data-src="https://studycli.org/wp-content/uploads/2021/06/the-five-classics-e1600649634228.jpg" height="310" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20310'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">&lt;img aria-describedby="caption-attachment-64871" class="wp-image-64871 size-full" src="https://studycli.org/wp-content/uploads/2021/06/the-five-classics-e1600649634228.jpg" alt="" width="705" height="310" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="969" id="caption-attachment-64871"><span data-dcnode-id="970" instrument_node="">The complete anthology of the Five Classics</span></p></div><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="965" style="font-weight: 400;"><span data-dcnode-id="966" instrument_node="">Throughout the subsequent dynasties, official schools and professional colleges sprung up around the nation as Confucian education continued to take root. At the same time, private schools, which also trained students in </span></span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/religion/buddhism" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="963" style="font-weight: 400;"><span data-dcnode-id="964" instrument_node="">Buddhism</span></span></a><span data-dcnode-id="960" style="font-weight: 400;"><span data-dcnode-id="961" instrument_node="">, </span></span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plato.stanford.edu/entries/daoism/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="958" style="font-weight: 400;"><span data-dcnode-id="959" instrument_node="">Daoism</span></span></a><span data-dcnode-id="955" style="font-weight: 400;"><span data-dcnode-id="956" instrument_node="">, and other schools of thought, were established by scholars and often sponsored by academics belonging to the local elite.</span></span></p><span data-dcnode-id="953" instrument_node="">
</span><h3 data-dcnode-id="950"><span data-dcnode-id="951" id="The_civil_service_exam"><span data-dcnode-id="952" instrument_node="">The civil service exam</span></span></h3><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="947" style="font-weight: 400;"><span data-dcnode-id="948" instrument_node="">First established during the </span></span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient.eu/Sui_Dynasty/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="945" style="font-weight: 400;"><span data-dcnode-id="946" instrument_node="">Sui dynasty</span></span></a><span data-dcnode-id="942" style="font-weight: 400;"><span data-dcnode-id="943" instrument_node=""> (581-618 CE), the civil service exam, also called the imperial examination, quickly became a mainstay of China’s educational system and workforce.</span></span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" style="font-weight: 400;"><span data-dcnode-id="939" instrument_node="">Testing students on Confucian doctrine over a rigorous multi-day exam, the exam offered an opportunity for any male to enter a bureaucratic government position. In many ways, this centralized exam symbolized an inclination towards social mobility taking root across the country.</span></span></p><span data-dcnode-id="936" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="930" id="attachment_64870" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64870" class="wp-image-64870 size-full perfmatters-lazy" data-dcnode-id="935" data-src="https://studycli.org/wp-content/uploads/2021/06/the-civil-service-exam.jpg" height="483" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20483'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&lt;img aria-describedby="caption-attachment-64870" class="wp-image-64870 size-full" src="https://studycli.org/wp-content/uploads/2021/06/the-civil-service-exam.jpg" alt="" width="705" height="483" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="931" id="caption-attachment-64870"><span data-dcnode-id="932" instrument_node="">The civil service examination, officially established during the Sui dynasty (581-618 CE), was a highly innovative feature of the Chinese imperial system that promoted achievement through merit rather than birth or family line.</span></p></div><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" style="font-weight: 400;"><span data-dcnode-id="928" instrument_node="">However, while the exam theoretically provided equal opportunity to all candidates, individuals were typically confined in their inherited social class. Despite the innovation, it remained unlikely for a peasant to become a high-ranking official.&nbsp;</span></span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="923" style="font-weight: 400;"><span data-dcnode-id="924" instrument_node="">In the wake of the </span></span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Opium-Wars" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="921" style="font-weight: 400;"><span data-dcnode-id="922" instrument_node="">Opium War</span></span></a><span data-dcnode-id="918" style="font-weight: 400;"><span data-dcnode-id="919" instrument_node="">—nearly 1,300 years after initial implementation of the exam—local officials and intellectuals suggested a reframing of the entire educational system in China. The imperial examination was formally abolished with the fall of the </span></span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/china/qing-dynasty" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="916" style="font-weight: 400;"><span data-dcnode-id="917" instrument_node="">Qing dynasty</span></span></a><span data-dcnode-id="913" style="font-weight: 400;"><span data-dcnode-id="914" instrument_node=""> in the early 20th century. Thus, new education models introduced by Japan and the West were inaugurated.</span></span></p><span data-dcnode-id="911" instrument_node="">
</span><h3 data-dcnode-id="908"><span data-dcnode-id="909" id="Education_in_China_today"><span data-dcnode-id="910" instrument_node="">Education in China today</span></span></h3><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" style="font-weight: 400;"><span data-dcnode-id="906" instrument_node="">Education remains a cornerstone of contemporary Chinese society. State-run public schools, international private schools, and every model in between can be found operating throughout the country.</span></span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="901" style="font-weight: 400;"><span data-dcnode-id="902" instrument_node="">In 1986, following China’s 改革开放 (gǎigé kāifàng; Reform and Opening-up, a series of economic reforms </span></span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jri.co.jp/english/periodical/rim/1999/RIMe199904threereforms/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="899" style="font-weight: 400;"><span data-dcnode-id="900" instrument_node="">initiated by Deng Xiaoping</span></span></a><span data-dcnode-id="896" style="font-weight: 400;"><span data-dcnode-id="897" instrument_node=""> in 1978), the Chinese government passed the </span></span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.china.org.cn/english/education/184879.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="894" style="font-weight: 400;"><span data-dcnode-id="895" instrument_node="">Nine-Year Compulsory Education Law</span></span></a><span data-dcnode-id="891" style="font-weight: 400;"><span data-dcnode-id="892" instrument_node="">, deeming it mandatory for all children to attend nine years of basic, formal education.</span></span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="887" style="font-weight: 400;"><span data-dcnode-id="888" instrument_node="">China’s Ministry of Education estimates that 99% of the country’s youth participates in nine years of basic schooling. Furthermore, it estimates that over 96% of China’s adult population is literate, a staggering accomplishment considering its challenged starting point at the conclusion of the </span></span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2011/05/06/world/asia/06iht-letter06.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">Mao-era</span></span></a><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="883" instrument_node="">.</span></span></p><span data-dcnode-id="880" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="874" id="attachment_64866" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64866" class="wp-image-64866 size-full perfmatters-lazy" data-dcnode-id="879" data-src="https://studycli.org/wp-content/uploads/2021/06/chinese-middle-school-student-in-80s.jpg" height="478" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20478'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">&lt;img aria-describedby="caption-attachment-64866" class="wp-image-64866 size-full" src="https://studycli.org/wp-content/uploads/2021/06/chinese-middle-school-student-in-80s.jpg" alt="" width="705" height="478" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="875" id="caption-attachment-64866"><span data-dcnode-id="876" instrument_node="">Chinese middle school students in the 1980s</span></p></div><span data-dcnode-id="873" instrument_node="">
</span><h3 data-dcnode-id="870"><span data-dcnode-id="871" id="A_day_in_the_life"><span data-dcnode-id="872" instrument_node="">A day in the life</span></span></h3><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" style="font-weight: 400;"><span data-dcnode-id="868" instrument_node="">A typical school day for children in China begins around 7:00 AM and finishes late in the evening. Students’ schedules are filled with general subjects such as English, Chinese, math, science, history, and geography. Chinese students also have daily breaks for physical exercises and extracurricular clubs.</span></span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" style="font-weight: 400;"><span data-dcnode-id="864" instrument_node="">During the weekends and evenings, most students also participate in 补习班 (bǔxíbān; training school) courses to strengthen their academic skills and better prepare them for acceptance to a top university.&nbsp;</span></span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="859" style="font-weight: 400;"><span data-dcnode-id="860" instrument_node="">If you’ve ever chatted with Chinese friends about their school experience or </span></span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/teach-in-china/"><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">taught English in China</span></span></a><span data-dcnode-id="854" style="font-weight: 400;"><span data-dcnode-id="855" instrument_node="">, you have undoubtedly heard of the </span></span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/sample-questions-from-chinas-gaokao-one-of-worlds-toughest-tests-2018-6" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">高考</span></span></a><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="850" instrument_node=""> (gāokǎo; literally meaning “high exam”), the national exam required for college admission and considered to be the pinnacle of every Chinese students’ K-12 education.</span></span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="845" style="font-weight: 400;"><span data-dcnode-id="846" instrument_node="">Reminiscent of the imperial exam in terms of social significance, the </span></span><i data-dcnode-id="842"><span data-dcnode-id="843" style="font-weight: 400;"><span data-dcnode-id="844" instrument_node="">gāokǎo</span></span></i><span data-dcnode-id="840" style="font-weight: 400;"><span data-dcnode-id="841" instrument_node=""> is often regarded as the most important rite of passage for many young people, dictating their school curriculum and in many ways determining their future.&nbsp;</span></span></p><span data-dcnode-id="838" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="832" id="attachment_64861" style="width: 715px"><img alt="" aria-describedby="caption-attachment-64861" class="wp-image-64861 size-full perfmatters-lazy" data-dcnode-id="837" data-src="https://studycli.org/wp-content/uploads/2021/06/02-chinese-gaokao.jpg" height="469" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20705%20469'%3E%3C/svg%3E" width="705"><noscript data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">&lt;img aria-describedby="caption-attachment-64861" class="wp-image-64861 size-full" src="https://studycli.org/wp-content/uploads/2021/06/02-chinese-gaokao.jpg" alt="" width="705" height="469" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="833" id="caption-attachment-64861"><span data-dcnode-id="834" instrument_node="">Students preparing for 高考 (gāokǎo), the Chinese college entrance exam.</span></p></div><span data-dcnode-id="831" instrument_node="">
</span><h3 data-dcnode-id="828"><span data-dcnode-id="829" id="Learning_in_China_and_learning_overseas"><span data-dcnode-id="830" instrument_node="">Learning in China and learning overseas</span></span></h3><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">To date, China is the third-largest study abroad destination for international students following the United States and the United Kingdom. In terms of China's outbound study abroad prowess, Chinese students account for the largest percentage of international students studying in overseas universities.</span></span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" style="font-weight: 400;"><span data-dcnode-id="822" instrument_node="">Improving the quality of education and providing universal access to all citizens continues to be a major focus of China’s development initiatives.</span></span></p><span data-dcnode-id="819" instrument_node="">

-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">jīngjìxué</span></td><td class="column-3" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">(the study of) economics</span></td></tr></tbody></table><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="568" style="font-weight: 400;"><span data-dcnode-id="569" instrument_node="">While browsing through the above proverbs and vocabulary list, you may notice that several words and phrases contain the character 学 (xué; to study)</span></span><i data-dcnode-id="565"><span data-dcnode-id="566" style="font-weight: 400;"><span data-dcnode-id="567" instrument_node="">. </span></span></i><span data-dcnode-id="563" style="font-weight: 400;"><span data-dcnode-id="564" instrument_node="">As one of the </span></span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/chinese-characters/the-100-most-common-chinese-characters/"><span data-dcnode-id="561" style="font-weight: 400;"><span data-dcnode-id="562" instrument_node="">100 most common Chinese characters</span></span></a><span data-dcnode-id="558" style="font-weight: 400;"><span data-dcnode-id="559" instrument_node="">, 学 (xué)</span></span><span data-dcnode-id="557" instrument_node=""> </span><span data-dcnode-id="555" style="font-weight: 400;"><span data-dcnode-id="556" instrument_node="">is both widely used and straightforward in meaning. It’s also one of the first words that most </span></span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studycli.org/learn-chinese/things-to-know-before-you-learn-mandarin/"><span data-dcnode-id="553" style="font-weight: 400;"><span data-dcnode-id="554" instrument_node="">Chinese language students</span></span></a><span data-dcnode-id="550" style="font-weight: 400;"><span data-dcnode-id="551" instrument_node=""> learn.</span></span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" style="font-weight: 400;"><span data-dcnode-id="547" instrument_node="">学 (xué) is primarily used to mean “study” as a noun (e.g., a field of study) or verb (to study) and can also mean “-ology” or “study of” (e.g., biology 生物学 shēngwùxué or philosophy 哲学 zhéxué).</span></span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" style="font-weight: 400;"><span data-dcnode-id="543" instrument_node="">Paired with 习 (xí; practice or habit), 学习 (xuéxí) becomes one of the most common character compounds, translating into English simply as “study.”</span></span></p><span data-dcnode-id="540" instrument_node="">
