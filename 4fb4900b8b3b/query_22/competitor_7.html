</span></header><div class="entry-content" data-dcnode-id="832"><span data-dcnode-id="1158" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1154"><img alt="idioms speech therapy" class="wp-image-34749 entered lazyloaded" data-dcnode-id="1157" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1024x533.png" data-lazy-srcset="https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1024x533.png 1024w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-720x375.png 720w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-768x400.png 768w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1536x800.png 1536w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-2048x1067.png 2048w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-600x313.png 600w" data-ll-status="loaded" height="533" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1024x533.png&amp;raw" srcset="https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1024x533.png 1024w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-720x375.png 720w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-768x400.png 768w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1536x800.png 1536w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-2048x1067.png 2048w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-600x313.png 600w" width="1024"><noscript data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">&lt;img width="1024" height="533" src="https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1024x533.png" alt="idioms speech therapy" class="wp-image-34749" srcset="https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1024x533.png 1024w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-720x375.png 720w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-768x400.png 768w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-1536x800.png 1536w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-2048x1067.png 2048w, https://allisonfors.com/wp-content/uploads/2017/09/idioms-speech-therapy-600x313.png 600w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Idioms are a type of figurative language that speech-language pathologists work on because they are an essential skill to learn in order to communicate effectively, particularly socially. They are also important for academic success, especially in the secondary grades. Most students struggle with idioms because of a language disorder; they may also have a difficult time not taking things literally or simply haven’t had enough exposure to them.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1137"><strong data-dcnode-id="1147"><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">What are idioms?</span></em></strong><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node="">A phrase or combination of words that have a figurative meaning, differing from their literal meaning.</span><br data-dcnode-id="1144"><br data-dcnode-id="1143"><strong data-dcnode-id="1140"><em data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Why do we use them?</span></em></strong><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node="">They help us make a point in a more impactful and efficient way.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">There are tons of idioms! It’s estimated there are over 25,000 idioms in the English language! Their use is highly dependent on age, culture, and social groups.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Here is a list of more common idioms that I’ve organized into 2 levels, into what I considered simpler versus more complex. Certainly, these are not strict levels, and you may feel that some of these should be categorized.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><h2 data-dcnode-id="1127"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Idioms Examples</span></strong></h2><span data-dcnode-id="1126" instrument_node="">

83"><span data-dcnode-id="1082" instrument_node="">• Picture perfect</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">• Play with fire</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">• Drag your feet</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">• Beat around the bush</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">• Have a blast</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">• Under the weather</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">• Hit the road</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">• Eyes in the back of your head</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">• Pushing the envelope</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">• Fishy</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">• Have a cow</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">• Cost an arm and a leg</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">• Look up/down to</span></p><span data-dcnode-id="1056" instrument_node="">

</span><p data-dcnode-id="962"><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">LEVEL 2</span></strong><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">• Icing on the cake</span><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">• Your guess is as good as mine</span><br data-dcnode-id="1046"><span data-dcnode-id="1045" instrument_node="">• Barking up the wrong tree</span><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">• The ball is in your court</span><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">• It’s on the tip of my tongue</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">• Shoot the breeze</span><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">• At the drop of a hat</span><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">• A little bird told me</span><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">• An open book</span><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">• Curiosity killed the cat</span><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">• Cold shoulder</span><br data-dcnode-id="1028"><span data-dcnode-id="1027" instrument_node="">• Two left feet</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">• Through thick and thin</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">• Once in a blue moon</span><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">• Call it a day</span><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">• Over the moon</span><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">• Cry over spilt milk</span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">• Cut corners</span><br data-dcnode-id="1014"><span data-dcnode-id="1013" ta-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">• Bend over backwards</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">• Going out on a limb</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">• All in the same boat</span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">• Eye candy</span><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">• Green thumb</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">• Miss the boat</span></p><span data-dcnode-id="961" instrument_node="">

</span><h2 data-dcnode-id="954"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Free idioms pictures</span></strong></h2><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="952" instrument_node="">I have a </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/allisonfors/idiomsfigurative-language/" onclick="javascript:window.open('https://www.pinterest.com/allisonfors/idiomsfigurative-language/'); return false;"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Pinterest board</span></strong></a><span data-dcnode-id="948" instrument_node=""> dedicated to figurative language and idioms. You can find pictures illustrating idioms to use in your sessions. This board also contains ideas and resources for working on idioms and other figurative language concepts.</span></p><span data-dcnode-id="946" instrument_node="">

e-id="944" instrument_node="">&lt;img src="https://allisonfors.com/wp-content/uploads/2017/09/figurative-language-720x343.png" alt="idioms pinterest" class="wp-image-2752" width="652" height="311" srcset="https://allisonfors.com/wp-content/uploads/2017/09/figurative-language-720x343.png 720w, https://allisonfors.com/wp-content/uploads/2017/09/figurative-language-600x285.png 600w, https://allisonfors.com/wp-content/uploads/2017/09/figurative-language-768x365.png 768w, https://allisonfors.com/wp-content/uploads/2017/09/figurative-language-1024x487.png 1024w, https://allisonfors.com/wp-content/uploads/2017/09/figurative-language-150x71.png 150w, https://allisonfors.com/wp-content/uploads/2017/09/figurative-language.png 1671w" sizes="(max-width: 652px) 100vw, 652px" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="938"></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="936" instrument_node="">Idioms are a skill that need to be memorized and therefore are usually not fun to teach or learn. I created </span><strong data-dcnode-id="933"><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/Figurative-Language-Idioms-Fortune-Tellers-3239903%3Futm_source%3DAF%2520Blog%26utm_campaign%3DIdioms%2520Post" onclick="javascript:window.open('https://www.teacherspayteachers.com/Product/Figurative-Language-Idioms-Fortune-Tellers-3239903?utm_source=AF%20Blog&amp;utm_campaign=Idioms%20Post'); return false;" rel="noreferrer noopener"><span data-dcnode-id="935" instrument_node="">fortune tellers</span></a></strong><span data-dcnode-id="932" instrument_node=""> to make the repetition for memorization more engaging! They are a great way to master 8 idioms before moving onto more.</span></p><span data-dcnode-id="930" instrument_node="">

</span><img alt="Read-aloud strategies for toddlers:

📖 FOLLOW THE CHILD’S INTEREST
Follow their lead when choosing books. You don’t need to read books cover-to-cover. Model how to hold the book correctly and turn the pages in the proper order, but don’t place demands. Help, encourage, and praise to make it a positive experience.

📖 SIT FACE-TO-FACE
It is common to have a child sit in your lap to read but try facing each other! This allows them to see your face, mouth movement, and facial expressions.

📖 MAKE IT INTERACTIVE
Be expressive - Use different voices, facial expressions, hand gestures, and pointing to bring the book to life. Drag your finger along the text as you read or clap out syllables.

📖 ASK QUESTIONS
Ask questions for labeling nouns and verbs or have the child describe pictures or make inferences.

📖 PROVIDE LANGUAGE OPPORTUNITIES
Use strategies such as wait time and fill-in-the-blank. Use copy and add to repeat what the child has said and add another 1-2 words to expand their utterance.

📖 READ THE SAME BOOK OVER AND OVER
Kids love to know what to expect and becoming familiar with a book allows them to fill-in-the-blank and be exposed to the same vocabulary.

📖 TARGET ARTICULATION SOUNDS
Use sound-loaded books for articulation practice. Use auditory discrimination, “Is that a key? Or tea?” Get sound practice by having the child fill-in-the-blank or repeat words with their target sound. For older children, use a magnifying glass to find their target sound and repeat. You can also use a carrier phrase or sentence strip to practice the words.

What would you add? 👇
