</span><table data-dcnode-id="1542"><tbody data-dcnode-id="1544"><tr data-dcnode-id="1822"><td data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">(to) have a bee in one’s bonnet</span></td><td data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">&nbsp;&nbsp;to be slightly unbalanced mentally</span></td><td data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">&nbsp;&nbsp;His actions are erratic because he has a bee in his bonnet</span></td></tr><tr data-dcnode-id="1810"><td data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">(to) have a bone in the leg</span></td><td data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">&nbsp;&nbsp;to be tired</span></td><td data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">&nbsp;&nbsp;I cannot walk in his place &nbsp;I have a bone in the leg</span></td></tr><tr data-dcnode-id="1798"><td data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">(to) have a bone to pick</span></td><td data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">&nbsp;&nbsp;to have a cause of complaint</span></td><td data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">she has a bone to pick with him about the quarrel they had yesterday</span></td></tr><tr data-dcnode-id="1786"><td data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">(to) have a way with one</span></td><td data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">&nbsp;&nbsp;to have some pleasing Characteristic</span></td><td data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">&nbsp;&nbsp;She is not a charming girl but she has a way with her that is appealing</span></td></tr><tr data-dcnode-id="1774"><td data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">(to) have the gift of the gab</span></td><td data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">&nbsp;&nbsp;to have the talent for speaking</span></td><td data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">&nbsp;&nbsp;The only thing he has is the gift of the gab</span></td></tr><tr data-dcnode-id="1762"><td data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">(to) hold water</span></td><td data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">&nbsp;&nbsp;to be sound</span></td><td data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">&nbsp;&nbsp;This argument does not hold water</span></td></tr><tr data-dcnode-id="1750"><td data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">In good time</span></td><td data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">&nbsp;&nbsp;with time to spare</span></td><td data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">&nbsp;&nbsp;He finished his work in good time</span></td></tr><tr data-dcnode-id="1738"><td data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">In the pink</span></td><td data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">&nbsp;&nbsp;good in health</span></td><td data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">&nbsp;&nbsp;I am very happy to learn that you are in the pink</span></td></tr><tr data-dcnode-id="1726"><td data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Iron something out</span></td><td data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">&nbsp;&nbsp;resolve</span></td><td data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">&nbsp;&nbsp;You can iron out your differences only if you sit down and talk</span></td></tr><tr data-dcnode-id="1714"><td data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">(to) join forces with someone</span></td><td data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">&nbsp;&nbsp;to cooperate</span></td><td data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">&nbsp;&nbsp;I appealed to him to join forces with me to restore the prestige of the family</span></td></tr><tr data-dcnode-id="1702"><td data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">To keep one’s fingers crossed</span></td><td data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">&nbsp;&nbsp;to hope for the best</span></td><td data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">&nbsp;&nbsp;He is very unpredicted &nbsp;We can only keep our fingers crossed</span></td></tr><tr data-dcnode-id="1690"><td data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">To kick up a row</span></td><td data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">&nbsp;&nbsp;to make fuss</span></td><td data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">&nbsp;&nbsp;She kicked up such a big row over nothing</span></td></tr><tr data-dcnode-id="1678"><td data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">To knuckle under</span></td><td data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">&nbsp;&nbsp;to give way</span></td><td data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">&nbsp;&nbsp;He knuckled under after putting up some resistance</span></td></tr><tr data-dcnode-id="1666"><td data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Let someone off</span></td><td data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">&nbsp;&nbsp;forgive</span></td><td data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">&nbsp;&nbsp;The principal let the student off with a warning</span></td></tr><tr data-dcnode-id="1654"><td data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">To live by one’s wits</span></td><td data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">&nbsp;&nbsp;to live by deceit or fraud</span></td><td data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">&nbsp;&nbsp;I suspect your friend lives by his wits</span></td></tr><tr data-dcnode-id="1642"><td data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">(to) look green</span></td><td data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">&nbsp;&nbsp;to look sick</span></td><td data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">You do look green &nbsp;Is anything the matter?</span></td></tr><tr data-dcnode-id="1630"><td data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">(to) lose one’s head</span></td><td data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">&nbsp;&nbsp;to lose the presence of mind</span></td><td data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">&nbsp;&nbsp;He lost his head as soon as he read the charge-sheet</span></td></tr><tr data-dcnode-id="1618"><td data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">(to) meet someone halfway</span></td><td data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">&nbsp;&nbsp;to make a compromise</span></td><td data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">&nbsp;&nbsp;I am prepared to meet him halfway &nbsp;You can tell him so on my behalf</span></td></tr><tr data-dcnode-id="1606"><td data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">(to) mind one’s p’s and q’s</span></td><td data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">&nbsp;&nbsp;to be very polite</span></td><td data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">&nbsp;&nbsp;Yesterday you made a very bad impression &nbsp;You must mind your p’s and q’s in polite society</span></td></tr><tr data-dcnode-id="1594"><td data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Neck or nothing</span></td><td data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">&nbsp;&nbsp;every risk must be taken</span></td><td data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">&nbsp;&nbsp;There was no choice &nbsp;It was a case of neck or nothing with us</span></td></tr><tr data-dcnode-id="1582"><td data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">On the square</span></td><td data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">&nbsp;&nbsp;above board</span></td><td data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">&nbsp;&nbsp;I am sure, they will succeed in their business &nbsp;There dealings are on the square</span></td></tr><tr data-dcnode-id="1570"><td data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Other fish to try</span></td><td data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">&nbsp;other business to do</span></td><td data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">&nbsp;&nbsp;She can’t come to see you daily, she has other fish to try</span></td></tr><tr data-dcnode-id="1558"><td data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Out of character</span></td><td data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">&nbsp;not typical</span></td><td data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">&nbsp;&nbsp;He was not his usual self today &nbsp;His conversation was completely out of character</span></td></tr><tr data-dcnode-id="1546"><td data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">(to) pat someone on the back</span></td><td data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&nbsp;to congratulate someone on something</span></td><td data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">You deserve a pat on the back for the excellent job you have done</span></td></tr></tbody></table><span data-dcnode-id="1541" instrument_node="">

</span><table data-dcnode-id="1287"><tbody data-dcnode-id="1289"><tr data-dcnode-id="1522"><td data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">(to) pay through the nose</span></td><td data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">&nbsp;to pay dearly</span></td><td data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">&nbsp;&nbsp;She is paying through the nose for her faults</span></td></tr><tr data-dcnode-id="1510"><td data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">(to) pick holes in something</span></td><td data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&nbsp;&nbsp;to find fault with something</span></td><td data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Don’t pick holes in everything that other people do</span></td></tr><tr data-dcnode-id="1498"><td data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">(to) play fast and loose</span></td><td data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">&nbsp;&nbsp;to say one thing and do another</span></td><td data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">&nbsp;&nbsp;He always plays fast and lose it has become his second nature</span></td></tr><tr data-dcnode-id="1486"><td data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">(to) pluck at someones heart strings</span></td><td data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">&nbsp;&nbsp;to try to arouse sympathy</span></td><td data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">&nbsp;&nbsp;Do not pluck at everyone’s heart strings by narrating your tale of woe</span></td></tr><tr data-dcnode-id="1474"><td data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">(to) plumb the depths of something</span></td><td data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">&nbsp;&nbsp;to try to find out the truth</span></td><td data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">wish to plumb the depths of the problem she is facing &nbsp;She is really leading a miserable life</span></td></tr><tr data-dcnode-id="1462"><td data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">(to) put your best foot forward</span></td><td data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">&nbsp;&nbsp;to make effort</span></td><td data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">&nbsp;&nbsp;You won’t be able to complete this work before the end of the month unless you put your best foot forward</span></td></tr><tr data-dcnode-id="1450"><td data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">(to) run in the blood</span></td><td data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">&nbsp;&nbsp;characteristic of the members of a family</span></td><td data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">&nbsp;&nbsp;Gallantry runs in the blood of Indians</span></td></tr><tr data-dcnode-id="1438"><td data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">(to) set her cap at</span></td><td data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">&nbsp;&nbsp;to pay attention to</span></td><td data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">&nbsp;&nbsp;In my opinion, Sana has set her cap at Joe</span></td></tr><tr data-dcnode-id="1426"><td data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Settle for something</span></td><td data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">&nbsp;&nbsp;be prepared to accept</span></td><td data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">&nbsp;&nbsp;I am not prepared to settle for a second-rate job</span></td></tr><tr data-dcnode-id="1414"><td data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Shake someone up</span></td><td data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">&nbsp;&nbsp;upset</span></td><td data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">&nbsp;&nbsp;The news of his father’s death has shaken him up badly</span></td></tr><tr data-dcnode-id="1402"><td data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">(to) sit on the fence</span></td><td data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">&nbsp;&nbsp;not to take sides</span></td><td data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">the policy of sitting on the fence does not always pay</span></td></tr><tr data-dcnode-id="1390"><td data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">(to) spill the beans</span></td><td data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">&nbsp;&nbsp;to tell a secret</span></td><td data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">&nbsp;&nbsp;Why can’t you be careful &nbsp;You have spilled the beans</span></td></tr><tr data-dcnode-id="1378"><td data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">(to) stick to one’s colors</span></td><td data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">&nbsp;&nbsp;to be faithful to the cause</span></td><td data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">&nbsp;&nbsp;The Principal advised the students to stick to their colors</span></td></tr><tr data-dcnode-id="1366"><td data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Stir something up</span></td><td data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">&nbsp;&nbsp;revoke</span></td><td data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">He is trying to stir up trouble again, but he would not succeed this time</span></td></tr><tr data-dcnode-id="1354"><td data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">(to) take a firm line</span></td><td data-dcnode-id="1359"><span
