</span><div class="td-post-featured-image" data-dcnode-id="2517"><a class="td-modal-image" data-caption="" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myenglishteacher.eu/blog/wp-content/uploads/2018/02/Idiomatic-Definition-%25E2%2580%25BA%25E2%2580%25BA-15-Idiomatic-Expressions-with-Eye.png"><img alt="Idiomatic Definition ›› 15 Idiomatic Expressions with Eye" class="entry-thumb" data-dcnode-id="2519" height="262" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myenglishteacher.eu/blog/wp-content/uploads/2018/02/Idiomatic-Definition-%25E2%2580%25BA%25E2%2580%25BA-15-Idiomatic-Expressions-with-Eye-696x262.png&amp;raw" srcset="https://www.myenglishteacher.eu/blog/wp-content/uploads/2018/02/Idiomatic-Definition-››-15-Idiomatic-Expressions-with-Eye-696x262.png 696w, https://www.myenglishteacher.eu/blog/wp-content/uploads/2018/02/Idiomatic-Definition-››-15-Idiomatic-Expressions-with-Eye-300x113.png 300w, https://www.myenglishteacher.eu/blog/wp-content/uploads/2018/02/Idiomatic-Definition-››-15-Idiomatic-Expressions-with-Eye-768x289.png 768w, https://www.myenglishteacher.eu/blog/wp-content/uploads/2018/02/Idiomatic-Definition-››-15-Idiomatic-Expressions-with-Eye.png 784w" title="Idiomatic Definition ›› 15 Idiomatic Expressions with Eye" width="696"></a></div><span data-dcnode-id="2516" instrument_node="">
</span><div class="byoby6265275d6e932" data-dcnode-id="2507"><div data-dcnode-id="2510" id="vdo_ai_div-0" style="display: block; width: 100%; margin-left: 0px;"><vdo data-dcnode-id="2512" id="parentDiv0"><vdo data-dcnode-id="2513" id="unitDivWrapper-0" style="height: 360px;"><div class="vdo_content" data-dcnode-id="2514" id="_vdo_ads_player_ai_1130" style="display: block;"></div></vdo></vdo><vdo data-dcnode-id="2511" id="vdo_companion_wrapper" style="text-align: center;margin-top: 10px;"></vdo></div></div><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">In all languages, there are words that do not mean exactly what they seem to mean. Consider the following phrases:</span></p><div class="mvhzj6265275d6ea7d" data-dcnode-id="2497"><div data-dcnode-id="2500" id="s-myenglishteacher-eu" style="display: block; width: 100%;"><div data-dcnode-id="2501" id="_vdo_ads_player_ai_3367"></div></div></div><span data-dcnode-id="2494" instrument_node="">
</span><ul data-dcnode-id="2476"><span data-dcnode-id="2493" instrument_node="">
</span><li data-dcnode-id="2490"><em data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Be on cloud nine</span></em></li><span data-dcnode-id="2489" instrument_node="">
</span><li data-dcnode-id="2486"><em data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Kill time</span></em></li><span data-dcnode-id="2485" instrument_node="">
</span><li data-dcnode-id="2482"><em data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Go the extra mile</span></em></li><span data-dcnode-id="2481" instrument_node="">
</span><li data-dcnode-id="2478"><em data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Be as cool as a cucumber</span></em></li><span data-dcnode-id="2477" instrument_node="">
</span></ul><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Technically, you could do these. It might be hard to get on a cloud, or kill time, though! However, native English speakers commonly use these expressions.</span></p><div class="eyqfh6265275d6e9bf" data-dcnode-id="2468"><span data-dcnode-id="2471" instrument_node="">
</span></div><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2464" instrument_node="">The reason is that these phrases are </span><strong data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">idiomatic</span></strong><span data-dcnode-id="2461" instrument_node=""> – meaning that </span><strong data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">what they mean in conversation is not simply their literal meaning</span></strong><span data-dcnode-id="2458" instrument_node="">.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2455" instrument_node="">There is a denotation that tells what the phrases mean. These are the meanings of the </span><strong data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">idiomatic</span></strong><span data-dcnode-id="2452" instrument_node=""> expressions above, respectively:</span></p><div class="qlwke6265275d6eb17" data-dcnode-id="2449"><span data-dcnode-id="2450" id="ezoic-pub-video-placeholder-1"></span></div><span data-dcnode-id="2446" instrument_node="">
</span><ul data-dcnode-id="2417"><span data-dcnode-id="2445" instrument_node="">
</span><li data-dcnode-id="2440"><em data-dcnode-id="2441"><span data-dcnode-id="2444" instrument_node="">To be very happy (After my sister got engaged our family was </span><strong data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">on cloud nine!)</span></strong></em></li><span data-dcnode-id="2439" instrument_node="">
</span><li data-dcnode-id="2433"><em data-dcnode-id="2434"><span data-dcnode-id="2438" instrument_node="">To pass time mostly by wasting it, while waiting for something (I had to </span><strong data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">kill some time</span></strong><span data-dcnode-id="2435" instrument_node=""> before my job interview.)</span></em></li><span data-dcnode-id="2432" instrument_node="">
</span><li data-dcnode-id="2426"><em data-dcnode-id="2427"><span data-dcnode-id="2431" instrument_node="">To do something extra that is not required (Because Kelsey </span><strong data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">went the extra mile</span></strong><span data-dcnode-id="2428" instrument_node=""> on this project, I gave her the only perfect score in the class!)</span></em></li><span data-dcnode-id="2425" instrument_node="">
</span><li data-dcnode-id="2419"><em data-dcnode-id="2420"><span data-dcnode-id="2424" instrument_node="">To be very calm (If you want to use her emotions to manipulate her, I want to warn you she is </span><strong data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">cool as a cucumber</span></strong><span data-dcnode-id="2421" instrument_node="">. It won’t work.)</span></em></li><span data-dcnode-id="2418" instrument_node="">
</span></ul><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">There are idioms in many languages, and they cannot directly translate. The reason is that many of these idioms are based in culture. For example, being on cloud nine means that someone is extremely happy.</span></p><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">If you translated the phrase literally to any other language, speakers of that language would not take it to mean being very happy. They would be confused about someone being on a cloud!</span></p><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2406"><span class="td_btn td_btn_md td_default_btn" data-dcnode-id="2407" style="color: #ffffff;"><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myenglishteacher.eu/" rel="noopener noreferrer" style="color: #ffffff;" target="_blank"><span data-dcnode-id="2409" instrument_node="">Skype English Lesson with a native AMERICAN or BRITISH teacher ››</span></a></span></p><span data-dcnode-id="2405" instrument_node="">
</span><h2 data-dcnode-id="2401"><span class="td_text_highlight_marker_green td_text_highlight_marker" data-dcnode-id="2402"><strong data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Usage of idiomatic expressions</span></strong></span></h2><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">People use idioms for a variety of reasons. Most of the time, idioms and </span><strong data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">idiomatic</span></strong><span data-dcnode-id="2396" instrument_node=""> expressions are informal. They convey a specific meaning that only a group of people that is like you in some way would understand.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Think of American idioms that do not mean exactly the same thing in British English! A person who could understand an idiom you use has a background more similar to you than someone who can’t understand it.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2390" instrument_node="">Combined with the colloquial nature of the words, they are important! In addition, </span><strong data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">idiomatic</span></strong><span data-dcnode-id="2387" instrument_node=""> expressions can serve to emphasize the degree of a feeling.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">For example, someone who is cool as a cucumber is extremely calm, and will not panic even when faced with a disaster.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2378"><span class="td_btn td_btn_md td_default_btn" data-dcnode-id="2379" style="color: #ffffff;"><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//grammarly.go2cloud.org/aff_c%3Foffer_id%3D3%26aff_id%3D1858" rel="noopener noreferrer" style="color: #ffffff;" target="_blank"><span data-dcnode-id="2381" instrument_node="">Check your Grammar ››</span></a></span></p><span data-dcnode-id="2377" instrument_node="">
</span><h2 data-dcnode-id="2373"><span class="td_text_highlight_marker_green td_text_highlight_marker" data-dcnode-id="2374"><strong data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Some common idiomatic expressions with Eye</span></strong></span></h2><span data-dcnode-id="2372" instrument_node="">
</span><h3 data-dcnode-id="2369"><strong data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">1. Apple of my eye</span></strong></h3><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Something that you value very highly:</span></p><span data-dcnode-id="2365" instrument_node="">
</span><ul data-dcnode-id="2359"><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2361"><em data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">My daughter is the apple of my eye.</span></em></li><span data-dcnode-id="2360" instrument_node="">
</span></ul><span data-dcnode-id="2358" instrument_node="">
</span><h3 data-dcnode-id="2355"><strong data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">2. In my mind’s eye</span></strong></h3><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Something that you imagine:</span></p><span data-dcnode-id="2351" instrument_node="">
</span><ul data-dcnode-id="2345"><span data-dcnode-id="2350" instrument_node="">
</span><li data-dcnode-id="2347"><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">In my mind’s eye, working online is like sipping cold drinks on a warm beach.</span></em></li><span data-dcnode-id="2346" instrument_node="">
</span></ul><span data-dcnode-id="2344" instrument_node="">
</span><h3 data-dcnode-id="2341"><strong data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">3. The eyes are the window to the soul</span></strong></h3><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">A saying that means you should be able to understand someone just by looking at them in the eye:</span></p><span data-dcnode-id="2337" instrument_node="">
</span><ul data-dcnode-id="2331"><span data-dcnode-id="2336" instrument_node="">
</span><li data-dcnode-id="2333"><em data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">I just need to see his eyes to know whether he is lying because the eyes are the window to the soul.</span></em></li><span data-dcnode-id="2332" instrument_node="">
</span></ul><span data-dcnode-id="2330" instrument_node="">
</span><h3 data-dcnode-id="2327"><strong data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">4. Bird’s eye view</span></strong></h3><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">To see something from up high, either figuratively or literally:</span></p><span data-dcnode-id="2323" instrument_node="">
</span><ul data-dcnode-id="2313"><span data-dcnode-id="2322" instrument_node="">
</span><li data-dcnode-id="2319"><em data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">From the bird’s eye view, this city just looks like a bunch of blocks with ants walking around.</span></em></li><span data-dcnode-id="2318" instrument_node="">
</span><li data-dcnode-id="2315"><em data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">It looks like the new policies will decrease our compensation, but from the bird’s eye view it actually will have a positive effect in the long term.</span></em></li><span data-dcnode-id="2314" instrument_node="">
</span></ul><span data-dcnode-id="2312" instrument_node="">
</span><h3 data-dcnode-id="2309"><strong data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">5. Feast One’s Eyes on Something</span></strong></h3><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">To look at something very beautiful, wonderful, or something that you covet or admire a lot:</span></p><span data-dcnode-id="2305" instrument_node="">
</span><ul data-dcnode-id="2299"><span data-dcnode-id="2304" instrument_node="">
</span><li data-dcnode-id="2301"><em data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">I feasted my eyes on buffet laid out before me!</span></em></li><span data-dcnode-id="2300" instrument_node="">
</span></ul><span data-dcnode-id="2298" instrument_node="">
</span><h3 data-dcnode-id="2295"><strong data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">6. Cry One’s Eyes Out</span></strong></h3><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">To cry so much that you cannot cry anymore:</span></p><span data-dcnode-id="2291" instrument_node="">
</span><ul data-dcnode-id="2285"><span data-dcnode-id="2290" instrument_node="">
</span><li data-dcnode-id="2287"><em data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">When he heard his parents were in a serious car crash, he cried his eyes out before going to sleep.</span></em></li><span data-dcnode-id="2286" instrument_node="">
</span></ul><span data-dcnode-id="2284" instrument_node="">
</span><h3 data-dcnode-id="2281"><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">7. Get a black eye</span></strong></h3><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">A black eye refers to what the bruising around your eye looks like if someone injures your eye:</span></p><span data-dcnode-id="2277" instrument_node="">
</span><ul data-dcnode-id="2271"><span data-dcnode-id="2276" instrument_node="">
</span><li data-dcnode-id="2273"><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">The playground fight resulted in three students who got a black eye.</span></em></li><span data-dcnode-id="2272" instrument_node="">
</span></ul><span data-dcnode-id="2270" instrument_node="">
</span><h3 data-dcnode-id="2267"><strong data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">8. Catch someone’s eye</span></strong></h3><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">If something appeals to a person, it catches their eye:</span></p><span data-dcnode-id="2263" instrument_node="">
</span><ul data-dcnode-id="2257"><span data-dcnode-id="2262" instrument_node="">
</span><li data-dcnode-id="2259"><em data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">I was walking down the street when the pink car caught my eye.</span></em></li><span data-dcnode-id="2258" instrument_node="">
</span></ul><span data-dcnode-id="2256" instrument_node="">
</span><h3 data-dcnode-id="2253"><strong data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">9. [To have] An eagle eye</span></strong></h3><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Someone who has an eagle eye can spot mistakes even if they are very small, because the person is very perceptive:</span></p><span data-dcnode-id="2249" instrument_node="">
</span><ul data-dcnode-id="2243"><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2245"><em data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">You have to have an eagle eye to be a book editor because books cannot be published if they have even one mistake!</span></em></li><span data-dcnode-id="2244" instrument_node="">
</span></ul><span data-dcnode-id="2242" instrument_node="">
</span><h3 data-dcnode-id="2239"><strong data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">10. Give Someone the Eye</span></strong></h3><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">If you want to send a message to someone without talking to them, you can give them the eye! Usually this means giving them a stern glance so that they know you are angry or disappointed at them.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><ul data-dcnode-id="2229"><span data-dcnode-id="2234" instrument_node="">
</span><li data-dcnode-id="2231"><em data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">I thought about lying to my teacher but knowing that my mom would give me the eye if she found out made tell the truth instead. </span></em></li><span data-dcnode-id="2230" instrument_node="">
</span></ul><span data-dcnode-id="2228" instrument_node="">
</span><h3 data-dcnode-id="2225"><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">11. Have Eyes Bigger than Your Stomach</span></strong></h3><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Having eyes bigger than your stomach means that you look at and wish you could eat more food that you actually can.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><ul data-dcnode-id="2215"><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2217"><em data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">He has eyes bigger than his stomach, and always eats too much when we go to the buffet.</span></em></li><span data-dcnode-id="2216" instrument_node="">
</span></ul><span data-dcnode-id="2214" instrument_node="">
</span><h3 data-dcnode-id="2211"><strong data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">12. Have Eyes in the Back of One’s Head</span></strong></h3><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">This phrase describes someone who always seems to know what is happening, even if they are not there.</span></p><span data-dcnode-id="2207" instrument_node="">
</span><ul data-dcnode-id="2201"><span data-dcnode-id="2206" instrument_node="">
</span><li data-dcnode-id="2203"><em data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">&nbsp;I tried to pull a prank on my brother but my mother found out! It was like she had eyes in the back of her head.</span></em></li><span data-dcnode-id="2202" instrument_node="">
</span></ul><span data-dcnode-id="2200" instrument_node="">
</span><h3 data-dcnode-id="2197"><strong data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">13. In the Public Eye</span></strong></h3><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Someone or something is in the public eye if lots of people are paying attention to it. This almost always requires media coverage.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><ul data-dcnode-id="2187"><span data-dcnode-id="2192" instrument_node="">
</span><li data-dcnode-id="2189"><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">The actor is in the public eye now because of his arrest, but soon everyone will forget about him.</span></em></li><span data-dcnode-id="2188" instrument_node="">
</span></ul><span data-dcnode-id="2186" instrument_node="">
</span><h3 data-dcnode-id="2183"><strong data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">14. Turn a Blind Eye</span></strong></h3><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Someone who turns a blind eye ignores something that is happening – usually something terrible, usually because they have something to gain:</span></p><span data-dcnode-id="2179" instrument_node="">
</span><ul data-dcnode-id="2173"><span data-dcnode-id="2178" instrument_node="">
</span><li data-dcnode-id="2175"><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">The police turn a blind eye to the drug smuggling operation because the drug lords pay the police chiefs every month.</span></em></li><span data-dcnode-id="2174" instrument_node="">
</span></ul><span data-dcnode-id="2172" instrument_node="">
</span><h3 data-dcnode-id="2169"><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">15. Without Batting an Eye</span></strong></h3><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Something that you do without batting an eye is something that you do not have to think about before doing it. This idiom is usually used to describe people who have views different from the majority:</span></p><span data-dcnode-id="2165" instrument_node="">
</span><ul data-dcnode-id="2159"><span data-dcnode-id="2164" instrument_node="">
</span><li data-dcnode-id="2161"><em data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Mary did not even bat an eye when the tutor said that her hourly price would be $500/hour.</span></em></li><span data-dcnode-id="2160" instrument_node="">
</span></ul><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">In this example, hiring someone for $500/hour is very rare. Because Mary did not even stop to think about it, the idiom draws attention to her wealth (or at least, her willingness to spend and invest in herself).</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2151"><span class="td_btn td_btn_md td_default_btn" data-dcnode-id="2152" style="color: #ffffff;"><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myenglishteacher.eu/" rel="noopener noreferrer" style="color: #ffffff;" target="_blank"><span data-dcnode-id="2154" instrument_node="">Skype English Lesson with a native AMERICAN or BRITISH teacher ››</span></a></span></p><span data-dcnode-id="2150" instrument_node="">
</span></div><span data-dcnode-id="2148" instrument_node="">
