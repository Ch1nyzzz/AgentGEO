</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">No, it’s a piece of cake.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Or maybe it’s impossible to make&nbsp;heads or tails out of them.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="865"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Idioms.</span></strong><span data-dcnode-id="872" instrument_node=""> They’re a lot of fun to teach and to learn, and they’ll make your students sound more like&nbsp;</span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/english/educator/blog/esl-teaching-techniques-ttt/" rel="noopener noreferrer" target="_blank" title="6 ESL Teaching Techniques to Cut TTT and Get Your Students Talking"><span data-dcnode-id="871" instrument_node="">native speakers</span></a><span data-dcnode-id="869" instrument_node="">&nbsp;and </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/english/educator/blog/esl-lesson-audio-listening-materials/" rel="noopener noreferrer" target="_blank" title="A Model Lesson for Using Songs as ESL Audio Listening Materials"><span data-dcnode-id="868" instrument_node="">become better listeners</span></a><span data-dcnode-id="866" instrument_node="">, more in tune to&nbsp;colloquial English.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p class="fluentu-leadbox-link" data-dcnode-id="853"><span data-dcnode-id="863" instrument_node="">
</span><em data-dcnode-id="855"><span data-dcnode-id="862" instrument_node="">
</span><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Download: </span></strong><span data-dcnode-id="859" instrument_node="">
        This blog post is available as a convenient and portable PDF that you
        can take anywhere.
        </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/"><span data-dcnode-id="858" instrument_node="">Click here to get a copy. (Download)</span></a><span data-dcnode-id="856" instrument_node="">
</span></em><span data-dcnode-id="854" instrument_node="">
</span></p><span data-dcnode-id="852" instrument_node="">
</span><span data-dcnode-id="851" instrument_node="">
</span><h2 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Teaching Idioms Is Teaching Fluency</span></h2><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">Colorful language and powerful imagery make idioms a lot of fun for ESL learners. When you throw cats and dogs in a scene where they are falling from the sky, it’s hard to know exactly what a phrase might mean. It’s almost like a code-breaking game, where students must learn that&nbsp;when certain words come together in a phrase, they can mean something very different.&nbsp;</span><strong data-dcnode-id="844"><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
</span></strong></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">It’s important to not only teach the meaning of idioms, but to also teach how to use them correctly and effectively. When a non-native speaker uses an idiom correctly, he or she will sound very fluent. But, on the other hand, if they bumble the phrase, they will sound the exact opposite.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="838" instrument_node="">Learning idioms is appropriate for intermediate to </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/english/educator/blog/esl-listening-activities-advanced-tefl-tesol/" rel="noopener noreferrer" target="_blank" title="3 Awesome Listening Activities for Your Advanced ESL Students"><span data-dcnode-id="837" instrument_node="">advanced</span></a><span data-dcnode-id="835" instrument_node=""> students. If you teach an idiom lesson to </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/english/educator/blog/esl-listening-activities-intermediate/" rel="noopener noreferrer" target="_blank" title="10 Awesome Activities to Improve Intermediate ESL Students’ Listening"><span data-dcnode-id="834" instrument_node="">beginners or low-intermediate learners</span></a><span data-dcnode-id="832" instrument_node="">, you may well be putting them in the bumbling category mentioned above. Teach idioms wisely and sparingly to ensure your students’ success.</span></p><span data-dcnode-id="830" instrument_node="">
</span><h2 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Tips for&nbsp;Teaching English Idioms Wisely</span></h2><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="820"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Provide idioms in context</span></strong><span data-dcnode-id="824" instrument_node="">, so students can fully understand the meaning. Be sure to provide a sample </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/english/educator/blog/esl-tips-teaching-shy-students/" rel="noopener noreferrer" target="_blank" title="9 Fail-proof Tips to Get Shy ESL Students Out of Their Shells"><span data-dcnode-id="823" instrument_node="">conversation</span></a><span data-dcnode-id="821" instrument_node=""> around it. For example, take the following dialogue featuring the idiom “to be a chicken” when at a local amusement park.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="803" style="padding-left: 30px"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Jack:</span></strong><span data-dcnode-id="816" instrument_node=""> Ooh, wow. Look at that roller coaster, Jane! It goes upside-down!</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">
</span><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Jane:</span></strong><span data-dcnode-id="811" instrument_node=""> My stomach aches just looking at it. I will not ride that.</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
</span><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Jack:</span></strong><span data-dcnode-id="806" instrument_node=""> Ah, come on. </span><em data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Don’t be a chicken!</span></em></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="800" data-preserver-spaces="true"><span data-dcnode-id="801" instrument_node="">Watching videos of native speakers conversing is a great way to give your students demonstrations on how idioms are used in the real world. </span></span><span data-dcnode-id="796" data-preserver-spaces="true"><a class="editor-rtfLink" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/schools/" rel="noopener" target="_blank"><span data-dcnode-id="799" instrument_node="">FluentU</span></a><span data-dcnode-id="797" instrument_node=""> is</span></span><span data-dcnode-id="794" data-preserver-spaces="true"><span data-dcnode-id="795" instrument_node=""> a great resource that can help you highlight the usage and context of the various idioms used to your students. </span></span><span data-dcnode-id="793" data-preserver-spaces="true"></span></p><div class="fluen-target" data-advadstrackbid="13" data-advadstrackid="17241" data-dcnode-id="786" id="fluen-1150694992"><p data-dcnode-id="787"><strong data-dcnode-id="789"><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/schools/" target="_blank"><span data-dcnode-id="791" instrument_node="">FluentU</span></a></strong><span data-dcnode-id="788" instrument_node=""> takes authentic videos—like music videos, movie trailers, news and inspiring talks—and turns them into personalized language lessons.</span></p></div><span data-dcnode-id="785" instrument_node="">You’ll be able to teach your students with immersion and even search for specific idioms with the video dictionary.&nbsp;</span><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="780"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Teach idioms in spoken form</span></strong><span data-dcnode-id="781" instrument_node="">, not written, and explain to students how they are conversational, rather than formal. Have students practice the idioms in dialogue to help them understand they’re used in spoken colloquial English.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Be sure to explain how the individual words have different meanings</span></strong><span data-dcnode-id="776" instrument_node="">&nbsp;from the whole idiom phrase. For example, how much does an arm and a leg actually cost? Who knows?</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="770"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Don’t just hand out&nbsp;a long list of idioms.</span></strong><span data-dcnode-id="771" instrument_node=""> Be sure to provide a small selection of 5-10&nbsp;idioms (or less!) and explain each one. If you provide too many examples, it’ll simply turn into an introduction of what an idiom is, rather than how to actually remember the meaning and use one&nbsp;effectively in dialogue.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">That brings us to just how important it is to help your students understand idiom usage.</span></p><span data-dcnode-id="766" instrument_node="">
</span><h1 data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Easy as Pie: Everything You’ve Gotta Know to Teach English Idioms Effectively</span></h1><span data-dcnode-id="763" instrument_node="">
</span><h2 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">4 Exercises to Help Your Students Understand Idioms</span></h2><span data-dcnode-id="760" instrument_node="">
</span><h3 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">1. Teach&nbsp;idioms with pictures</span></h3><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="753"><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/english/educator/blog/esl-describing-pictures-students/" rel="noopener noreferrer" target="_blank" title="10 Creative Ways to Get Your ESL Students Talking with Pictures"><span data-dcnode-id="756" instrument_node="">Provide a picture</span></a><span data-dcnode-id="754" instrument_node=""> to explain the context. This works best if you show an image that humorously illustrates the literal meaning of the idiom. It will make students laugh, but also help them understand or guess what a phrase means. Idioms are full of colorful imagery, perfect for a flashcard or photo. Show the picture to your students and have them guess the meaning of the idiom.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="751" instrument_node="">From there, give examples of when you would use it and how the words and the actual meaning of the idiom are different. Looking for a good resource? </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myblog-inplainenglish.blogspot.kr/2014/04/learning-idioms.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="750" instrument_node="">Check out this website for an example of great images to explain the meaning of idioms</span></a><span data-dcnode-id="748" instrument_node="">.&nbsp;And for some beautiful images depicting idioms, be sure to </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.behance.net/gallery/5719523/Idioms-in-pictures" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="747" instrument_node="">check out this site</span></a><span data-dcnode-id="745" instrument_node="">.</span></p><span data-dcnode-id="743" instrument_node="">
</span><h3 data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">2.&nbsp;Use small groups to present dialogues</span></h3><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">Break your class into small groups and have each group look up two idioms. </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eslcafe.com/idioms/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="738" instrument_node="">Dave’s ESL Cafe</span></a><span data-dcnode-id="736" instrument_node=""> has a great collection of idioms and their meanings for student reference.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Before they&nbsp;look them up, have the students&nbsp;make an educated guess on what the idiom means, and then let&nbsp;them search for the real meaning. Have students&nbsp;explain the meaning to the rest of the class and use the idiom in a short sample dialogue.</span></p><span data-dcnode-id="731" instrument_node="">
</span><h3 data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">3. Introduce Amelia Bedelia</span></h3><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">No, Amelia! You don’t actually </span><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">throw</span></em><span data-dcnode-id="724" instrument_node=""> the tent into the woods!</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">You don’t have to be a kid to adore&nbsp;Amelia Bedelia and her literal mind. She’s the perfect teacher for&nbsp;an idiom lesson. Visit the </span><a class="broken_link" data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.harpercollinschildrens.com/kids/gamesandcontests/features/amelia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="720" instrument_node="">publisher’s website</span></a><span data-dcnode-id="718" instrument_node="">&nbsp;for activities, book excerpts, worksheets and games. While the material is oriented for children, it’s also a great way for older students to learn English idioms through a fun and quirky character!</span></p><span data-dcnode-id="716" instrument_node="">
</span><h3 data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">4. Use a theme</span></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="712" instrument_node="">A great way to teach idioms is to use a theme. For example, you could use all weather-related idioms (</span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.islcollective.com/resources/printables/worksheets_doc_docx/weather_idioms/idioms-preintermediate-a2/14659" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="711" instrument_node="">see this great worksheet</span></a><span data-dcnode-id="709" instrument_node="">!). Or teach sports-related idioms with </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.islcollective.com/resources/printables/worksheets_doc_docx/sports_idioms/idioms-intermediate-b1/16091" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="708" instrument_node="">this helpful worksheet</span></a><span data-dcnode-id="706" instrument_node="">. By using a common theme to teach idioms, it’s easier for students to grasp the meanings of the phrases, and see how similar words can mean very different things.</span></p><span data-dcnode-id="704" instrument_node="">
</span><h2 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">10 ESL Idioms Worth Repeating</span></h2><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">As you can see, there are hundreds of great resources for teaching idioms. Where should you even start? Remember, it’s important to provide context around your idioms.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">So to get you started, we’ve listed a few of our favorites with a sample dialogue and some helpful teaching tips.</span></p><span data-dcnode-id="695" instrument_node="">
</span><h3 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">1. (to be) A fish out of water</span></h3><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="689"><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms.jpg"><img alt="teach english idioms" class="alignnone wp-image-2676" data-dcnode-id="691" height="222" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms-300x222.jpg 300w" width="300"></a></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="684"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Meaning:</span></strong><span data-dcnode-id="685" instrument_node="">&nbsp;to feel awkward or uncomfortable, usually in a new situation</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="679"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="680" instrument_node=""> Start the lesson by talking to your students about feeling awkward. What makes them feel awkward? Give an example of what makes you feel awkward. Then, present the below dialogue.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="675"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="670" style="padding-left: 30px"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Sam:</span></strong><span data-dcnode-id="671" instrument_node=""> Gee, learning to rollerblade isn’t easy. I keep falling down!</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="661" style="padding-left: 30px"><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node=""> Sarah:</span></strong><span data-dcnode-id="666" instrument_node=""> I know, it’s so hard! I feel like</span><strong data-dcnode-id="663"><em data-dcnode-id="664"><span data-dcnode-id="665" instrument_node=""> a fish out of water</span></em></strong><span data-dcnode-id="662" instrument_node="">.</span></p><span data-dcnode-id="660" instrument_node="">
</span><h3 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">2. To be broke</span></h3><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="654"><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms1.jpg"><img alt="teach english idioms" class="alignnone wp-image-2677" data-dcnode-id="656" height="214" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms1.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms1.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms1-300x214.jpg 300w" width="300"></a></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="649"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Meaning:</span></strong><span data-dcnode-id="650" instrument_node="">&nbsp;to be&nbsp;out of money, to have no money</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="638"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="645" instrument_node=""> Provide the students with two images. One image should be of a broken item (</span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.isaiahhankel.com/wp-content/uploads/2012/11/Pencil.jpeg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="644" instrument_node="">such as a broken pencil</span></a><span data-dcnode-id="642" instrument_node="">) and one should be an image of a person with no money (</span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.clipartpanda.com/no-money-clipart-royalty-free-broke-clipart-illustration-1155782.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="641" instrument_node="">this is a great one</span></a><span data-dcnode-id="639" instrument_node="">). Explain how both images mean “to be broke.” Then, present the following dialogue and have the students match the correct image to the meaning of the idiom.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="634"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="625" style="padding-left: 30px"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node=""> Sam:</span></strong><span data-dcnode-id="630" instrument_node=""> I really want to buy that cool hat. But </span><em data-dcnode-id="627"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">I’m completely broke</span></strong></em><span data-dcnode-id="626" instrument_node="">.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="620" style="padding-left: 30px"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Sarah:</span></strong><span data-dcnode-id="621" instrument_node=""> Would you like to borrow some money?</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="615" style="padding-left: 30px"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node=""> Sam:</span></strong><span data-dcnode-id="616" instrument_node=""> That’d be great.&nbsp;I promise, I’ll pay you back later.</span></p><span data-dcnode-id="614" instrument_node="">
</span><h3 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">3. Rule of thumb</span></h3><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="608"><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms2.jpg"><img alt="teach english idioms" class="alignnone wp-image-2679" data-dcnode-id="610" height="201" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms2.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms2.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms2-300x201.jpg 300w" width="300"></a></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Meaning:</span></strong><span data-dcnode-id="604" instrument_node="">&nbsp;an unwritten but generally accepted guideline, policy or method of doing something</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="598"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Teaching tips</span></strong><span data-dcnode-id="599" instrument_node="">: Talk with your students about laws of society. Which ones are actual legal laws? Which ones are social norms or generally accepted rules? Make a list of each. Then, introduce the “rule of thumb” idiom. Practice with the below dialogue.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="589" style="padding-left: 30px"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Sam:</span></strong><span data-dcnode-id="590" instrument_node=""> These potato chips are so delicious. Want some?</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="584" style="padding-left: 30px"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Sarah:</span></strong><span data-dcnode-id="585" instrument_node=""> Sure, thanks.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="579" style="padding-left: 30px"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node=""> Sam:</span></strong><span data-dcnode-id="580" instrument_node=""> Ooh, sorry! I dropped that handful. Well, it’s the 5-second rule. They were&nbsp;on the ground less than 5 seconds, so it’s still okay to eat them.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="570" style="padding-left: 30px"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node=""> Sarah:</span></strong><span data-dcnode-id="575" instrument_node=""> What? Yuck. That doesn’t sound like a good </span><em data-dcnode-id="572"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">rule of thumb</span></strong></em><span data-dcnode-id="571" instrument_node="">. Give me some that haven’t dropped on the ground, please!</span></p><span data-dcnode-id="569" instrument_node="">
</span><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">4. (to be) Up in the air</span></h3><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="563"><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms3.jpg"><img alt="teach english idioms" class="alignnone wp-image-2680" data-dcnode-id="565" height="203" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms3.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms3.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms3-300x203.jpg 300w" width="300"></a></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="558"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Meaning:</span></strong><span data-dcnode-id="559" instrument_node="">&nbsp;undecided or indefinite, usually because&nbsp;often because other matters should be decided first</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="550"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Teaching tips</span></strong><span data-dcnode-id="554" instrument_node="">: </span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/170433167121299563/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="553" instrument_node="">Present this image</span></a><span data-dcnode-id="551" instrument_node="">, featuring the idiom “up in the air.” Talk to the students about what it means, and then present the following dialogue. Afterward, talk about what your students are currently up in the air about. Then, have them come up with their own sample dialogue.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="546"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="541" style="padding-left: 30px"><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Sarah:</span></strong><span data-dcnode-id="542" instrument_node=""> Hey, Sam! Remember, you need to let us know by tomorrow if you’re going to go on the class trip with us.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="532" style="padding-left: 30px"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node=""> Sam:</span></strong><span data-dcnode-id="537" instrument_node=""> That’s right. I’m still </span><em data-dcnode-id="534"><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">up in the air</span></strong></em><span data-dcnode-id="533" instrument_node="">. I need to figure out my work schedule first and see if they’ll let me have a few days off work.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="527" style="padding-left: 30px"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node=""> Sarah:</span></strong><span data-dcnode-id="528" instrument_node=""> I see. Well, let us know. I hope you can come!</span></p><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">5. (to be the) Devil’s advocate</span></h3><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms4.jpg"><img alt="teach english idioms" class="alignnone wp-image-2681 size-full" data-dcnode-id="522" height="205" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms4.jpg&amp;raw" width="300"></a></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="515"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Meaning:</span></strong><span data-dcnode-id="516" instrument_node="">&nbsp;to present a counter argument</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="510"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="511" instrument_node=""> After explaining the meaning of this idiom and practicing the following dialogue, present the class with a debate exercise. Split the class into two groups, and have each side come up with a different argument to the same issue. (Choose an issue you think might be relevant to your students). Have them debate the issue, using the idiom when appropriate.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="506"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="501" style="padding-left: 30px"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Sam:</span></strong><span data-dcnode-id="502" instrument_node="">&nbsp;I just can’t understand why healthcare is so expensive in the United States. It just doesn’t seem right.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="492" style="padding-left: 30px"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Sarah:</span></strong><span data-dcnode-id="497" instrument_node="">&nbsp;Tell me about it. But, </span><em data-dcnode-id="494"><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">to be the devil’s advocate</span></strong></em><span data-dcnode-id="493" instrument_node="">, doctors get paid more in the US than any other country. And so that attracts the best doctors in the world who possibly provide some of the best care in the world.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="487" style="padding-left: 30px"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Sam:</span></strong><span data-dcnode-id="488" instrument_node="">&nbsp;Well, maybe. But it still shouldn’t be so expensive.</span></p><span data-dcnode-id="486" instrument_node="">
</span><h3 data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">6. (to) Give someone the cold shoulder</span></h3><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="480"><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms5.jpg"><img alt="teach english idioms" class="alignnone wp-image-2682" data-dcnode-id="482" height="204" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms5.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms5.jpg 692w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms5-300x204.jpg 300w" width="300"></a></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="475"><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Meaning:</span></strong><span data-dcnode-id="476" instrument_node="">&nbsp;to no interest in someone or something, to ignore</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="467"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="471" instrument_node=""> Provide </span><a class="broken_link" data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.idiomeanings.com/idioms/wp-content/uploads/2008/07/coldshoulder-copy-300x287.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="470" instrument_node="">the sample image</span></a><span data-dcnode-id="468" instrument_node=""> and have the students guess what they think the idiom means. Ask the students if they’ve ever given someone the cold shoulder. Or, if they’ve ever received the cold shoulder. Practice below dialogue.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="463"><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="458" style="padding-left: 30px"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Sarah:&nbsp;</span></strong><span data-dcnode-id="459" instrument_node="">I ran into Sallie yesterday and we had a nice conversation at the coffee shop, catching up with each other.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="449" style="padding-left: 30px"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node=""> Sam:</span></strong><span data-dcnode-id="454" instrument_node=""> Oh, really? Last time I saw her, she </span><strong data-dcnode-id="451"><em data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">gave me the cold shoulder</span></em></strong><span data-dcnode-id="450" instrument_node="">. I couldn’t figure out what I had done to make her angry.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="444" style="padding-left: 30px"><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node=""> Sarah:</span></strong><span data-dcnode-id="445" instrument_node=""> Well, it probably doesn’t help that you are dating her best friend.</span></p><span data-dcnode-id="443" instrument_node="">
</span><h3 data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">7. Happy camper</span></h3><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="437"><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms6.jpg"><img alt="teach english idioms" class="alignnone wp-image-2683" data-dcnode-id="439" height="233" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms6.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms6.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms6-300x233.jpg 300w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms6-225x175.jpg 225w" width="300"></a></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="432"><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Meaning:</span></strong><span data-dcnode-id="433" instrument_node="">&nbsp;a person who is happy and cheerful</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="428" instrument_node=""> Explain the idiom and&nbsp;practice the sample dialogue. Ask your students what makes them happy. Also, practice using the idiom in the negative. Such as, “I’m not a happy camper today.”</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="423"><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="418" style="padding-left: 30px"><strong data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Sam:</span></strong><span data-dcnode-id="419" instrument_node="">&nbsp;Sarah, why are you so happy today?</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="409" style="padding-left: 30px"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Sarah:</span></strong><span data-dcnode-id="414" instrument_node="">&nbsp;Well, I made a perfect score on my English test. I also won first prize in an English writing contest and received a $100 prize. So yes, I’m a </span><em data-dcnode-id="411"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">happy camper</span></strong></em><span data-dcnode-id="410" instrument_node=""> today.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="404" style="padding-left: 30px"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Sam:</span></strong><span data-dcnode-id="405" instrument_node="">&nbsp;Wow, congratulations!</span></p><span data-dcnode-id="403" instrument_node="">
</span><h3 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">8. (to) Sit tight</span></h3><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="397"><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms7.jpg"><img alt="teach english idioms" class="alignnone wp-image-2684" data-dcnode-id="399" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms7.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms7.jpg 900w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms7-300x200.jpg 300w" width="300"></a></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="392"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Meaning:</span></strong><span data-dcnode-id="393" instrument_node=""> to stay where you are</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="387"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="388" instrument_node=""> Explain the definition of the idiom and practice the dialogue below. Have the students come up with scenarios where they could use this idiom in context.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="383"><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="378" style="padding-left: 30px"><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Sarah:</span></strong><span data-dcnode-id="379" instrument_node=""> Sam, are you okay? What happened?!</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="373" style="padding-left: 30px"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Sam:</span></strong><span data-dcnode-id="374" instrument_node=""> I fell down the stairs and now my leg really hurts.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="364" style="padding-left: 30px"><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Sarah:</span></strong><span data-dcnode-id="369" instrument_node=""> </span><em data-dcnode-id="366"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Sit tight!</span></strong></em><span data-dcnode-id="365" instrument_node=""> I’ll go call 9-1-1.</span></p><span data-dcnode-id="363" instrument_node="">
</span><h3 data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">9. (to be) Head over heels (in love)</span></h3><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="357"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms8.jpg"><img alt="teach english idioms" class="alignnone wp-image-2685" data-dcnode-id="359" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms8.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms8.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms8-300x200.jpg 300w" width="300"></a></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="352"><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Meaning:</span></strong><span data-dcnode-id="353" instrument_node=""> to be really or completely in love with someone</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="344"><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="348" instrument_node=""> </span><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kaplaninternational.com/blog/idioms-head-over-heels/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="347" instrument_node="">Show this image</span></a><span data-dcnode-id="345" instrument_node="">&nbsp;explaining the idiom. Talk to the students about being in love. Ask which students are currently in love (guaranteed to elicit a few giggles from your students!). Practice the below dialogue.</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="340"><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="335" style="padding-left: 30px"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Sarah:</span></strong><span data-dcnode-id="336" instrument_node=""> Sam, what are you writing?</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="330" style="padding-left: 30px"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node=""> Sam:</span></strong><span data-dcnode-id="331" instrument_node=""> I’m writing a letter to my new girlfriend.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="321" style="padding-left: 30px"><strong data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Sarah:</span></strong><span data-dcnode-id="326" instrument_node=""> Ooh, really? You just wrote to her yesterday. You must </span><em data-dcnode-id="323"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">be head over heels</span></strong></em><span data-dcnode-id="322" instrument_node="">!</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="316" style="padding-left: 30px"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Sam:</span></strong><span data-dcnode-id="317" instrument_node=""> I really am. I want to marry her.</span></p><span data-dcnode-id="315" instrument_node="">
</span><h3 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">10.&nbsp;(to) Get the ball rolling</span></h3><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="309"><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms9.jpg"><img alt="teach english idioms" class="alignnone wp-image-2686" data-dcnode-id="311" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms9.jpg&amp;raw" srcset="https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms9.jpg 1000w, https://www.fluentu.com/blog/educator-english/wp-content/uploads/sites/13/2015/04/teach-english-idioms9-300x200.jpg 300w" width="300"></a></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="304"><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Meaning:</span></strong><span data-dcnode-id="305" instrument_node=""> to get started</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="299"><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Teaching tips:</span></strong><span data-dcnode-id="300" instrument_node=""> Write the idiom on the board in front of class. Have the students make guesses on what it means. Then, practice the below dialogue and have them guess again.</span></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="295"><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Sample dialogue:</span></strong></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="290" style="padding-left: 30px"><strong data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Sam:</span></strong><span data-dcnode-id="291" instrument_node=""> Have you started the English class project yet?</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="285" style="padding-left: 30px"><strong data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Sarah:</span></strong><span data-dcnode-id="286" instrument_node=""> No, not yet. I need to ask the teacher a few more questions first.</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="276" style="padding-left: 30px"><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Sam:</span></strong><span data-dcnode-id="281" instrument_node=""> You better </span><em data-dcnode-id="278"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">get the ball rolling</span></strong></em><span data-dcnode-id="277" instrument_node="">! The project is due next week!</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="271" style="padding-left: 30px"><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Sarah:</span></strong><span data-dcnode-id="272" instrument_node=""> Don’t worry about me. I’ll get it done.</span></p><span data-dcnode-id="270" instrument_node="">
