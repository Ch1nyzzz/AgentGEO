</span><strong data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Are you up to learning how to study vocabulary using the strategies that experts use to double, even triple, their brain’s capacity to memorize info? </span></strong><span data-dcnode-id="2651" instrument_node="">You may have already seen&nbsp;people who can </span><a data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Ffeature%3Dplayer_embedded%26v%3DxisrtRIkMFU" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2650" instrument_node="">memorize huge amounts of information</span></a><span data-dcnode-id="2648" instrument_node="">, or you’ve heard of </span><strong data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">polyglots who easily speak 10 languages or more</span></strong><span data-dcnode-id="2645" instrument_node="">. Do you think that you could never be one of those people because you just don’t have a good memory? One of the things that often seems the most difficult to learn is vocabulary. But with the right strategies, it’s actually the easiest part. In fact, what is needed&nbsp;to effectively learn vocabulary is you,&nbsp;your brain, and your motivation to strengthen your memory. You don’t have to be a genius – it’s within everyone’s reach! </span><strong data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Knowing how to learn</span></strong><span data-dcnode-id="2642" instrument_node="">&nbsp;vocabulary is the biggest difference between polyglots like&nbsp;</span><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fluentin3months.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2641" instrument_node="">Benny</span></a><span data-dcnode-id="2639" instrument_node="">&nbsp;and the “average Joe.”</span><p data-dcnode-id="2638"></p><span data-dcnode-id="2637" instrument_node="">

</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Before going into the amazing tricks and techniques that effectively boost your capacity to learn new words, it is helpful&nbsp;to understand some aspects of the&nbsp;learning process and how our brain works.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><h2 data-dcnode-id="1989"><a data-dcnode-id="1993" name="how-does-memory-work"></a><span data-dcnode-id="1992" instrument_node="">How Does Memory Work?</span><a class="toplink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1991" instrument_node="">^</span></a></h2><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1984"><img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8968 alignleft entered lazyloaded" data-dcnode-id="1987" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-1024x576.jpg" data-lazy-srcset="https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-1024x576.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-300x169.jpg 300w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-768x432.jpg 768w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920.jpg 1920w" data-ll-status="loaded" height="253" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-1024x576.jpg&amp;raw" srcset="https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-1024x576.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-300x169.jpg 300w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-768x432.jpg 768w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920.jpg 1920w" width="450"><noscript data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">&lt;img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8968 alignleft" src="https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-1024x576.jpg" alt="" width="450" height="253" srcset="https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-1024x576.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-300x169.jpg 300w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920-768x432.jpg 768w, https://www.mosalingua.com/en/files/2014/08/nerve-cell-2213009_1920.jpg 1920w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Rest assured, even though&nbsp;I love&nbsp;this topic, I won’t go into the minute details; a brief summary can still shed light on your vocabulary learning experience.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><h3 data-dcnode-id="1975"><a data-dcnode-id="1979" name="a-network-of-neurons"></a><span data-dcnode-id="1978" instrument_node="">A network of neurons</span><a class="toplink" data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1977" instrument_node="">^</span></a></h3><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1973" instrument_node="">Think about it. Our brain is made up of a </span><strong data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">titanic sized network of neurons</span></strong><span data-dcnode-id="1970" instrument_node="">. Hundreds of millions of cells! Neurons transmit electric and chemical signals to other neurons. </span><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Each neuron is capable of connecting to tens of thousands of other neurons.</span></strong><span data-dcnode-id="1967" instrument_node="">&nbsp;Imagine all the possible combinations! It’s even more impressive than the most powerful computer and all the devices hooked up to the Internet. Yep, it can be crazy to think about these numbers, but it’s all going on in our heads – 24/7.&nbsp;So if you think that there’s no room left in your brain to learn a language, or that you’re “too old,” think again. Go tell that to the </span><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/famous-polyglots/" title="polyglot"><span data-dcnode-id="1966" instrument_node="">polyglot</span></a><span data-dcnode-id="1964" instrument_node=""> who speaks 10 languages and is working on new ones every day! 🙂</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">An important concept to consider is that neurons never stop connecting and disconnecting from one another. That’s how our brain and memory work. These connections between neurons can be more or less strong, and there can be more or less of them. Now that you have some insight into how your brain works, let’s find out how to study vocabulary most effectively.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><h4 data-dcnode-id="1954"><a data-dcnode-id="1958" name="associations"></a><span data-dcnode-id="1957" instrument_node="">Associations</span><a class="toplink" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1956" instrument_node="">^</span></a></h4><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1943"><strong data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">That’s why our brain works so well when remembering by association</span></strong><span data-dcnode-id="1950" instrument_node="">. When you can say that you know a word, it means that there are numerous connections that are strong enough to create pathways to this word in your memory. It also means that the pathways are very short, and therefore transmit information fast. For example, if I tell you “big clock in London,” you’ll probably think of Big Ben right away. Or, if I say, “statue of a woman in New York,” the Statue of Liberty will probably pop into your head before I’ve even finished my statement. Your brain has gone looking for information based on the clues I gave you and has come up with it very quickly since you have lots of pathways or associations to these monuments. When you think of these words, </span><strong data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">associations to other ideas</span></strong><span data-dcnode-id="1947" instrument_node=""> or </span><strong data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">even feelings may be conjured up</span></strong><span data-dcnode-id="1944" instrument_node="">…</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1941" instrument_node="">However, it’s important to remember that connections between neurons weaken if they are not regularly used. That’s why they say that </span><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">if you don’t use your brain,&nbsp;it goes to waste</span></strong><span data-dcnode-id="1938" instrument_node="">. My grandmother was diagnosed with Alzheimer’s, a terrible disease. </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.guardian.co.uk/science/2011/feb/18/bilingual-alzheimers-brain-power-multitasking" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1937" instrument_node="">A study</span></a><span data-dcnode-id="1935" instrument_node="">&nbsp;has shown that learning another language decreases the risk of developing this disease, since language learners are constantly creating new neural pathways and giving existing ones a workout. In other words, learning a language keeps your brain young!</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1932" instrument_node="">That also explains why, when you learn a new word but don’t review or use it right away, you usually forget it. If the neural connections used to store the word are not used, they will weaken and eventually disappear (refer to </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/memory-the-forgetting-curve/" title="Memory: The Forgetting Curve"><span data-dcnode-id="1931" instrument_node="">the forgetting curve</span></a><span data-dcnode-id="1929" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/the-spaced-repetition-system-srs-memorization-for-life/" title="The Spaced Repetition System (SRS): Memorization for Life"><span data-dcnode-id="1928" instrument_node="">the spaced repetition system</span></a><span data-dcnode-id="1926" instrument_node="">&nbsp;for more info on this).</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1923" instrument_node="">So, know that you know all that, how can you learn </span><strong data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">vocab without wasting time</span></strong><span data-dcnode-id="1920" instrument_node="">?</span><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1916" instrument_node="">
</span><h2 data-dcnode-id="1911"><a data-dcnode-id="1915" name="what-does-it-take-to-remember-a-word"></a><span data-dcnode-id="1914" instrument_node="">What Does It Take to Remember a Word?</span><a class="toplink" data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1913" instrument_node="">^</span></a></h2><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1906"><img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8970 alignright entered lazyloaded" data-dcnode-id="1909" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://www.mosalingua.com/en/files/2014/08/startup-photos-1024x683.jpg" data-lazy-srcset="https://www.mosalingua.com/en/files/2014/08/startup-photos-1024x683.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/startup-photos-300x200.jpg 300w, https://www.mosalingua.com/en/files/2014/08/startup-photos-768x512.jpg 768w" data-ll-status="loaded" height="300" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/files/2014/08/startup-photos-1024x683.jpg&amp;raw" srcset="https://www.mosalingua.com/en/files/2014/08/startup-photos-1024x683.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/startup-photos-300x200.jpg 300w, https://www.mosalingua.com/en/files/2014/08/startup-photos-768x512.jpg 768w" width="450"><noscript data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">&lt;img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8970 alignright" src="https://www.mosalingua.com/en/files/2014/08/startup-photos-1024x683.jpg" alt="" width="450" height="300" srcset="https://www.mosalingua.com/en/files/2014/08/startup-photos-1024x683.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/startup-photos-300x200.jpg 300w, https://www.mosalingua.com/en/files/2014/08/startup-photos-768x512.jpg 768w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">If you’re wondering how to study vocabulary, look no further. Here’s a quick reminder of what is most important when you learn new words. If you follow these steps, you won’t waste any time or energy:</span></p><span data-dcnode-id="1902" instrument_node="">
</span><ul data-dcnode-id="1871"><span data-dcnode-id="1901" instrument_node="">
</span><li data-dcnode-id="1894"><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">memorize meaning –</span></strong><span data-dcnode-id="1898" instrument_node="">&nbsp;the most obvious step. You don’t have to learn and memorize the meaning by </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/best-free-online-dictionaries-to-help-improve-english-spanish-german-french-portuguese/"><span data-dcnode-id="1897" instrument_node="">looking up the translation in a dictionary</span></a><span data-dcnode-id="1895" instrument_node="">. It’s even better to connect the new word to an image or to your own definition, especially since most words don’t have one perfect translation.</span></li><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1889"><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">memorize spelling</span></strong><span data-dcnode-id="1890" instrument_node="">. But you can ignore spelling if your goal is strictly speaking. Thinking about spelling in some languages might even mess up your pronunciation.</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1881"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">memorize pronunciation</span></strong><span data-dcnode-id="1885" instrument_node="">. A very important step that is too often ignored. It’s vital for certain languages, like English, whose spelling is different from its pronunciation (see our articles on&nbsp;</span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/ressources-anglais/prononciation-anglaise/" title="Prononciation Anglaise"><span data-dcnode-id="1884" instrument_node="">English pronunciation</span></a><span data-dcnode-id="1882" instrument_node=""> for more information). It’s better to learn the correct pronunciation from the very beginning than to go back and correct bad habits.</span></li><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1873"><strong data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">memorize use</span></strong><span data-dcnode-id="1877" instrument_node="">. If it’s a simple noun, that’s usually not too hard to do. But for other types of words, it’s important to know when and how to use them (our </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/our-apps/" title="Our Apps"><span data-dcnode-id="1876" instrument_node="">apps</span></a><span data-dcnode-id="1874" instrument_node="">&nbsp;provide example sentences, which show how a word might typically be used).</span></li><span data-dcnode-id="1872" instrument_node="">
</span></ul><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">This might seem like a lot of work to memorize just one word, but rest assured, we’re going to present many techniques for optimizing the learning process and making it worth the effort.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><h2 data-dcnode-id="1862"><a data-dcnode-id="1866" name="how-to-learn-vocabulary-more-efficiently"></a><span data-dcnode-id="1865" instrument_node="">How to Learn Vocabulary More Efficiently</span><a class="toplink" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1864" instrument_node="">^</span></a></h2><span data-dcnode-id="1861" instrument_node="">
</span><h3 data-dcnode-id="1856"><a data-dcnode-id="1860" name="reactivate-knowledge-by-spacing-out-review-time"></a><span data-dcnode-id="1859" instrument_node="">Reactivate knowledge by spacing out review time</span><a class="toplink" data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1858" instrument_node="">^</span></a></h3><span data-dcnode-id="1855" instrument_node="">
</span><div data-dcnode-id="1843" style="text-align: center;"><span data-dcnode-id="1854" instrument_node="">
</span><dl data-dcnode-id="1845" id="attachment_337"><span data-dcnode-id="1853" instrument_node="">
</span><dt data-dcnode-id="1849"><img alt="spaced repetition system – how to learn vocabulary fast" class="alignleft wp-image-14850 entered lazyloaded" data-dcnode-id="1852" data-lazy-sizes="(max-width: 361px) 100vw, 361px" data-lazy-src="https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-300x209.jpg" data-lazy-srcset="https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-300x209.jpg 300w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-768x535.jpg 768w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-1024x714.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt.jpg 1047w" data-ll-status="loaded" height="251" sizes="(max-width: 361px) 100vw, 361px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-300x209.jpg&amp;raw" srcset="https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-300x209.jpg 300w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-768x535.jpg 768w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-1024x714.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt.jpg 1047w" width="361"><noscript data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">&lt;img class="alignleft wp-image-14850 " src="https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-300x209.jpg" alt="spaced repetition system &amp;ndash; how to learn vocabulary fast" width="361" height="251" srcset="https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-300x209.jpg 300w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-768x535.jpg 768w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt-1024x714.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/screen_shot_2013_01__QEAYt.jpg 1047w" sizes="(max-width: 361px) 100vw, 361px" /&gt;</span></noscript></dt><span data-dcnode-id="1848" instrument_node="">
</span><dd data-dcnode-id="1847"></dd><span data-dcnode-id="1846" instrument_node="">
</span></dl><span data-dcnode-id="1844" instrument_node="">
</span></div><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1841" instrument_node="">This is one of the most important aspects to this article. </span><strong data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Simply repeating a word you just learned ten times in a row is useless.</span></strong><span data-dcnode-id="1838" instrument_node=""> You need to space out the repetitions of the word. Of course, the number of review sessions depends on the word and your personal struggles.</span><br data-dcnode-id="1837"><span data-dcnode-id="1836" instrument_node="">
</span><strong data-dcnode-id="1833"><br data-dcnode-id="1835"><span data-dcnode-id="1834" instrument_node="">
For example: </span></strong><span data-dcnode-id="1832" instrument_node="">review the word for the first&nbsp;time 10 minutes after you learn it, again after 8 hours, again after 24 hours, again after 3 days, 10 days, 25 days, etc.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1829" instrument_node="">This technique will enable you to store vocabulary in your </span><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">long-term memory and spend the least amount of time reviewing</span></strong><span data-dcnode-id="1826" instrument_node="">.&nbsp;MosaLingua uses the SRS, invented by scientists, which calculates a personalized review schedule by analyzing your memory and learning difficulties. To this day, it’s the most efficient method for learning new vocabulary.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1823" instrument_node="">You can learn more about how the&nbsp;</span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/mosacrea-limited/" title="MosaCrea Limited"><span data-dcnode-id="1822" instrument_node="">MOSA Learning method</span></a><span data-dcnode-id="1820" instrument_node="">® works if you’re interested.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><h3 data-dcnode-id="1813"><a data-dcnode-id="1817" name="learn-the-most-useful-vocabulary-firstwith-frequency-lists"></a><span data-dcnode-id="1816" instrument_node="">Learn the most useful vocabulary first&nbsp;with frequency lists</span><a class="toplink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1815" instrument_node="">^</span></a></h3><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">It’s very important to base your learning on the frequency of use of vocabulary words.&nbsp;It’s a simple concept. How to learn vocabulary fast? Don’t waste your time on words you’ll never use. Why would you learn words and phrases that people rarely use in conversation (curiously, lots of these words are still in our language textbooks)?</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1808" instrument_node="">If you understand&nbsp;</span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oxforddictionaries.com/words/the-oec-facts-about-the-language" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1807" instrument_node="">100 of the English words</span></a><span data-dcnode-id="1805" instrument_node="">&nbsp;from this list, you can probably understand 50% of written English.&nbsp;Of course, I recommend going beyond that and learning more words, but it just goes to show how important frequency lists are.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1802" instrument_node="">Here is one great frequency list that you can check out, thanks to Wiktionary:</span><br data-dcnode-id="1801"><span data-dcnode-id="1800" instrument_node="">
</span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wiktionary.org/wiki/Wiktionary%3AFrequency_lists" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1799" instrument_node="">http://en.wiktionary.org/wiki/Wiktionary:Frequency_lists</span></a><br data-dcnode-id="1797"><span data-dcnode-id="1796" instrument_node="">
Some lists have been created by analyzing thousands of movies and TV subtitles found online.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Of course, MosaLingua’s apps also use these lists. By learning the 20% of the lists that allow you to communicate 80% of the time, you can learn languages really quickly.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><h2 data-dcnode-id="1786"><a data-dcnode-id="1790" name="how-to-learn-vocabulary-a-few-tricks"></a><span data-dcnode-id="1789" instrument_node="">How to Learn Vocabulary – A Few Tricks</span><a class="toplink" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/jMTJ8-7Glgw%23pni-top0"><span data-dcnode-id="1788" instrument_node="">^</span></a></h2><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1780"><em data-dcnode-id="1781"><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/the-spaced-repetition-system-srs-memorization-for-life/"><span data-dcnode-id="1784" instrument_node="">Spaced repetition</span></a><span data-dcnode-id="1782" instrument_node=""> permits quick, effortless vocab memorization. But sometimes, certain words or phrases may seem harder to remember than others. In this case, turn to these strategies for help etching the words into your memory. Here are some tips and tricks about how to learn vocabulary.</span></em></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">First, check out Cédric’s best tips about how to memorize new information (like foreign-language words!) and actually retain them:</span></p><span data-dcnode-id="1776" instrument_node="">

rame><noscript data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">&lt;iframe data-placeholder-image="https://www.mosalingua.com/en/files/complianz/placeholders/youtubeyxHB-Dw1xME-hqdefault.jpg" data-category="marketing" data-service="youtube" class="cmplz-placeholder-element cmplz-iframe cmplz-iframe-styles cmplz-video " data-cmplz-target="src" data-src-cmplz="https://www.youtube.com/embed/yxHB-Dw1xME"  src="about:blank"  width="560" height="315" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;/iframe&gt;</span></noscript></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1247" style="text-align: center;"><span data-dcnode-id="1251" instrument_node="">If you liked that video, be sure to </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/youtube-channel"><span data-dcnode-id="1250" instrument_node="">subscribe to our YouTube channel</span></a><span data-dcnode-id="1248" instrument_node=""> for more tips and facts about language learning!</span></p><span data-dcnode-id="1246" instrument_node="">
</span><h3 data-dcnode-id="1241"><a data-dcnode-id="1245" name="think-about-images"></a><span data-dcnode-id="1244" instrument_node="">Think about images</span><a class="toplink" data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1243" instrument_node="">^</span></a></h3><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">All of the big experts in memorization agree on one thing: to have a good memory, you must be able to make mental visualizations.&nbsp;If you have to remember information, try to associate it to an image.&nbsp;In language learning, it’s especially important to come up with mental images. If I have to remember the word “soleil” (French for “sun”), I’ll have an easier time if I associate the word with an image of the sun.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1234"><b data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">How to learn vocabulary by creating effective mental images</span></b></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">You want to come up with very specific images so that you can remember particular characteristics or nuances of meaning. An effective mental illustration should meet the following 4 criteria: exaggeration, movement, creative&nbsp;association&nbsp;and&nbsp;emotional reaction.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><ul data-dcnode-id="1178"><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1228" instrument_node="">
</span><h4 data-dcnode-id="1223"><a data-dcnode-id="1227" name="exaggeration"></a><span data-dcnode-id="1226" instrument_node="">Exaggeration</span><a class="toplink" data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1225" instrument_node="">^</span></a></h4><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">A good mental image should be exaggerated so that its dimensions and proportions are not realistic. If you want to remember the word for “foot,” you may think of an enormous foot stomping on grapes, or someone with on very hairy foot. Whatever you do, make it an unforgettable image.</span></p></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1217" instrument_node="">
</span><h4 data-dcnode-id="1212"><a data-dcnode-id="1216" name="movement"></a><span data-dcnode-id="1215" instrument_node="">Movement</span><a class="toplink" data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1214" instrument_node="">^</span></a></h4><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">Our attention is better caught by things in movement than things that are static. That’s why images in movement are better recorded by our brain. If you want to remember the </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/spanish-vocabulary-lists-by-topic/"><span data-dcnode-id="1209" instrument_node="">Spanish vocabulary</span></a><span data-dcnode-id="1207" instrument_node=""> word “coche” (car), think about a car racing down the street.</span></p></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1203" instrument_node="">
</span><h4 data-dcnode-id="1198"><a data-dcnode-id="1202" name="creative-association"></a><span data-dcnode-id="1201" instrument_node="">Creative association</span><a class="toplink" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1200" instrument_node="">^</span></a></h4><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1196" instrument_node="">Groups of people and objects that you usually put together are considered routine, and they won’t be special or remarkable. But if you make creative and bizarre associations, they will have a better chance of sticking out in your mind. The new association pushes your brain to process the word, so this is quite a powerful trick. Some examples? To remember the word </span><em data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">livre (book)</span></em><span data-dcnode-id="1193" instrument_node="">, think about a cat reading a book that he has open between his paws. It’s bizarre, but you won’t forget it!</span></p></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1189" instrument_node="">
</span><h4 data-dcnode-id="1184"><a data-dcnode-id="1188" name="emotional-reaction"></a><span data-dcnode-id="1187" instrument_node="">Emotional reaction</span><a class="toplink" data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1186" instrument_node="">^</span></a></h4><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">It’s hard to forget people or places that you associate with intense emotion (this could be sadness, joy, fright, anger, etc.). We are often surprised by how well we remember insignificant details. You may go to work every single day and never notice the color of the building’s walls. But if you are old enough, I’m sure you remember the events of September 11th well, including where you were when you got the news, who you were with, and other vivid details. That’s because it was an emotional experience.</span></p></li><span data-dcnode-id="1179" instrument_node="">
</span></ul><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1173"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Note: </span></strong><span data-dcnode-id="1174" instrument_node="">Mental images work best when you are the one visualizing them (rather than looking up images online, for instance). This way, they are personalized and easier to remember. Plus, the act of thinking up a mental image is a task that helps you in the memorization process.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><h3 data-dcnode-id="1166"><a data-dcnode-id="1171" name="invent-fun-stories-with-words"></a><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Invent fun stories with words</span></strong><a class="toplink" data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1168" instrument_node="">^</span></a></h3><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1161"><img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8978 alignright" data-dcnode-id="1164" data-lazy-sizes="(max-width: 451px) 100vw, 451px" data-lazy-src="https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-1024x669.jpeg" data-lazy-srcset="https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-1024x669.jpeg 1024w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-300x196.jpeg 300w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-768x502.jpeg 768w" height="295" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20451%20295'%3E%3C/svg%3E" width="451"><noscript data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">&lt;img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8978 alignright" src="https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-1024x669.jpeg" alt="" width="451" height="295" srcset="https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-1024x669.jpeg 1024w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-300x196.jpeg 300w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-127968-768x502.jpeg 768w" sizes="(max-width: 451px) 100vw, 451px" /&gt;</span></noscript></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">I often use this method for learning hard words like false friends. I use the word to invent a story that I won’t forget.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">For example, I had the hardest time remembering that “jubilación” in Spanish means retirement. So I imagined a group of people who are older, singing and partying with flutes of champagne and little treats–real jubilation–to celebrate a retirement. Now, each time I think about it, it comes to me automatically.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">The sillier, funnier, or even ridiculous that the story is, the better you will remember it. Your imagination has no limits, so for each difficult word, you can make up your own story!</span></p><span data-dcnode-id="1151" instrument_node="">
</span><h3 data-dcnode-id="1146"><a data-dcnode-id="1150" name="create-ties-and-relationships-between-words"></a><span data-dcnode-id="1149" instrument_node="">Create ties and relationships between words</span><a class="toplink" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1148" instrument_node="">^</span></a></h3><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Remember our discussion on how the brain works? When you learn new words, it’s helpful to find links with other words that you already know, or to even take advantage of learning new words. That’s why it’s good to learn vocab by category (e.g. travel, food, health)</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">Sometimes you even look for common roots. For example, you can put “Krankenhaus” (hospital) and “Krankenschwester” (nurse) together in German. Or you can note down all the words that end in “-zione” in Italian, or “-tion” in French, “-ción” in Spanish, and in “-ção” in Portuguese. Associating concepts and words is an efficient way to use your reasoning ability to learn new words. It’s one </span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/best-age-to-learn-a-second-language/"><span data-dcnode-id="1140" instrument_node="">advantage that adults have over kids</span></a><span data-dcnode-id="1138" instrument_node="">.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><h3 data-dcnode-id="1131"><a data-dcnode-id="1135" name="deconstruct-words"></a><span data-dcnode-id="1134" instrument_node="">Deconstruct words</span><a class="toplink" data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1133" instrument_node="">^</span></a></h3><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Another interesting and efficient solution to the problem of how to memorize words is to deconstruct words and phrases. If you have to memorize a long number, like a phone number or a credit card, it’s easier to do it in chunks of numbers, right? Well, you can do the same with words. In English, to remember “tablecloth,” you can think about: “table” and “cloth” and figure out the meaning easily. You don’t have to have studied Latin, and you don’t need to do a formal linguistic breakdown of a word. Break it down any way that helps you!</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">If these tricks interest you, take a peek at our article&nbsp;on&nbsp;</span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/memorization-tips/" title="Tips for Memorizing and Learning Difficult Information"><span data-dcnode-id="1125" instrument_node="">advice for memorizing difficult information</span></a><span data-dcnode-id="1123" instrument_node="">.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><h3 data-dcnode-id="1116"><a data-dcnode-id="1120" name="imagine-yourself-in-a-context-where-youd-use-these-words"></a><span data-dcnode-id="1119" instrument_node="">Imagine yourself in a context where you’d use these words</span><a class="toplink" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1118" instrument_node="">^</span></a></h3><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1114" instrument_node="">You’ve surely noticed that you remember words more easily when they interest you and are of use to you in the immediate future. To learn a language, you don’t have to force yourself to learn vocab that isn’t helpful. That’s why at MosaLingua we dedicate time to picking out and sorting vocabulary and useful expressions. So, one great strategy is to imagine yourself using this word </span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">in a pleasant situation</span></strong><span data-dcnode-id="1111" instrument_node="">.&nbsp;If you want to learn the sentence,&nbsp;</span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">“Tu veux venir avec nous pour boire un verre ?”</span></em><span data-dcnode-id="1108" instrument_node=""> (do you want to come get a drink with us?) you can imagine yourself at a beautiful restaurant in Paris, sitting with your new friends and speaking French fluently. Then, repeat that sentence: </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">“Tu veux venir avec nous pour boire un verre ?”</span></em></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node="">Check out </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/5-simple-habits-help-you-remember-vocab/"><span data-dcnode-id="1102" instrument_node="">more tips here</span></a><span data-dcnode-id="1100" instrument_node="">.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><h2 data-dcnode-id="1093"><a data-dcnode-id="1097" name="use-all-3-types-of-memory-to-learn-new-words"></a><span data-dcnode-id="1096" instrument_node="">Use All 3 Types of Memory to Learn New Words</span><a class="toplink" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1095" instrument_node="">^</span></a></h2><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">We often say that people are visual, auditory, or kinesthetic (movement) learners. But most people are a combination of all three. If you want to know how to learn vocabulary faster, test out these three types of memory and find out which ones work best for you.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><h3 data-dcnode-id="1084"><a data-dcnode-id="1088" name="visual-and-auditory-memory"></a><span data-dcnode-id="1087" instrument_node="">Visual and auditory memory</span><a class="toplink" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1086" instrument_node="">^</span></a></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">When we learn a new word, we invent or imagine an image. We also must think about its pronunciation, though. Listening to a word said aloud and repeating it aloud is great practice for your brain. It’s s a way to tap into two types of memory that are connected.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><h3 data-dcnode-id="1074"><a data-dcnode-id="1079" name="kinesthetic-memory"></a><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Kinesthetic memory</span></strong><a class="toplink" data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1076" instrument_node="">^</span></a></h3><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1069"><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Re-write vocab: </span></strong><span data-dcnode-id="1070" instrument_node="">Writing requires kinesthetic memory, which is tied to movement. So, it’s often useful to recopy words and sentences that we study, especially when memorizing. You can also work on reading aloud and rewriting in a notebook. Here’s an interesting fact: writing by hand is better than typing on a keyboard.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1064"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Movement:</span></strong><span data-dcnode-id="1065" instrument_node="">&nbsp;When you create mental images of words or concepts, you&nbsp;can also do gestures or body movements to accompany it. It may seem strange, but it works very well. Give it a try! I was skeptical at first, but I forced myself to study pronominal verbs by pretending to brush my teeth, wash my face, and I do think that I know them better now because of this.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1062" instrument_node="">Everyone seems to have their own theories on how to learn vocabulary, and their favorite tricks. One of&nbsp;</span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/our-apps/" title="Our Apps"><span data-dcnode-id="1061" instrument_node="">our users</span></a><span data-dcnode-id="1059" instrument_node="">&nbsp;reviews vocab words on our app while walking. He told me that it was much more effective for him! (I take no responsibility for possible accidents 😉</span></p><span data-dcnode-id="1057" instrument_node="">
</span><h2 data-dcnode-id="1052"><a data-dcnode-id="1056" name="modify-your-environment-and-learn-new-words-quicker"></a><span data-dcnode-id="1055" instrument_node="">Modify Your Environment and Learn New Words Quicker</span><a class="toplink" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1054" instrument_node="">^</span></a></h2><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1047"><img alt="make your environment more conducive to learning vocabulary quickly modern desk " class="alignleft wp-image-8973" data-dcnode-id="1050" data-lazy-sizes="(max-width: 449px) 100vw, 449px" data-lazy-src="https://www.mosalingua.com/en/files/2014/08/pexels-photo-1024x683.jpg" data-lazy-srcset="https://www.mosalingua.com/en/files/2014/08/pexels-photo-1024x683.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-300x200.jpg 300w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-768x512.jpg 768w" height="299" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20449%20299'%3E%3C/svg%3E" width="449"><noscript data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">&lt;img class="alignleft wp-image-8973" src="https://www.mosalingua.com/en/files/2014/08/pexels-photo-1024x683.jpg" alt="make your environment more conducive to learning vocabulary quickly modern desk " width="449" height="299" srcset="https://www.mosalingua.com/en/files/2014/08/pexels-photo-1024x683.jpg 1024w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-300x200.jpg 300w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-768x512.jpg 768w" sizes="(max-width: 449px) 100vw, 449px" /&gt;</span></noscript></p><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1041"><a data-dcnode-id="1045" name="choose-the-right-time-to-focus-on-memorization"></a><span data-dcnode-id="1044" instrument_node="">Choose the right time to focus on memorization</span><a class="toplink" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1043" instrument_node="">^</span></a></h3><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">How to learn vocabulary is important, but so is </span><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">when&nbsp;</span></strong><span data-dcnode-id="1036" instrument_node="">to learn it. Morning is the ideal time for mental activity. Your brain is refreshed and rested, which allows you to be much more efficient. After a good lunch, you can start to memorize new words and sentences that you’ll study again in the evening before going to bed. Don’t forget to take short breaks to get up and move around.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><h3 data-dcnode-id="1032"><a data-dcnode-id="1033" name="sleep-well"></a></h3><span data-dcnode-id="1031" instrument_node="">
</span><h3 data-dcnode-id="1027"><span data-dcnode-id="1030" instrument_node="">Sleep well</span><a class="toplink" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1029" instrument_node="">^</span></a></h3><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1022"><img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8976 alignright" data-dcnode-id="1025" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-1024x684.jpeg" data-lazy-srcset="https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-1024x684.jpeg 1024w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-300x200.jpeg 300w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-768x513.jpeg 768w" height="301" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20450%20301'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">&lt;img alt="how-to-learn-vocabulary-quickly-and-effectively-mosalingua" class="wp-image-8976 alignright" src="https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-1024x684.jpeg" alt="" width="450" height="301" srcset="https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-1024x684.jpeg 1024w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-300x200.jpeg 300w, https://www.mosalingua.com/en/files/2014/08/pexels-photo-46100-768x513.jpeg 768w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Sleep plays a major role in your mental processes. Getting enough sleep is too often neglected. But it can really affect your performance. In fact, after a good night’s sleep, not only are you refreshed, but it has been proven that during sleep, your brain reviews the new information that you learned during the day. That’s why repeating words right before bedtime can be very effective.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><h3 data-dcnode-id="1013"><a data-dcnode-id="1017" name="change-your-lifestyle-and-your-eating-habits"></a><span data-dcnode-id="1016" instrument_node="">Change your lifestyle and your eating habits</span><a class="toplink" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yxHB-Dw1xME%23pni-top0"><span data-dcnode-id="1015" instrument_node="">^</span></a></h3><span data-dcnode-id="1012" instrument_node="">

</span><p data-dcnode-id="971"><span data-dcnode-id="978" instrument_node="">Now that you know how to learn vocabulary, it’s time to practice! Nothing helps your memory more than practice. Not only is it good for consolidating new knowledge, but it’s also a good way to stay motivated.&nbsp;That’s why in this </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/blog/" title="blog"><span data-dcnode-id="977" instrument_node="">blog</span></a><span data-dcnode-id="975" instrument_node=""> we talk about activities that you can do to </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mosalingua.com/en/tag/practice/" title="Practice!"><span data-dcnode-id="974" instrument_node="">practice the language you’re learning</span></a><span data-dcnode-id="972" instrument_node="">:</span></p><span data-dcnode-id="970" instrument_node="">
