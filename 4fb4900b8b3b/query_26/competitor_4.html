</span><p class="entry-meta" data-dcnode-id="1355"><time class="entry-time" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">April 19, 2012</span></time><span data-dcnode-id="1365" instrument_node=""> </span><span class="entry-author" data-dcnode-id="1361"><a class="entry-author-link" data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/author/susanbearman/" rel="author"><span class="entry-author-name" data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Susan Bearman</span></span></a></span><span data-dcnode-id="1360" instrument_node=""> </span><span class="entry-categories" data-dcnode-id="1356"><span data-dcnode-id="1359" instrument_node="">Filed Under: </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/topics/language/" rel="category tag"><span data-dcnode-id="1358" instrument_node="">Language</span></a></span></p></header><div class="entry-content" data-dcnode-id="1016"><div class="post-feature-image" data-dcnode-id="1348"><img alt="How to Use (not abuse) Jargon, Slang and Idioms" data-dcnode-id="1353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/wp-content/uploads/2016/01/how-to-use-not-abuse-jargon-slang-and-idioms-1024x683.jpg&amp;raw"><div class="image-credit" data-dcnode-id="1349"><span data-dcnode-id="1352" instrument_node="">Image courtesy </span><a alt="chaparral on Flickr" data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/chaparral/3385121149/"><span data-dcnode-id="1351" instrument_node="">chaparral on Flickr</span></a></div></div><p data-dcnode-id="1342"><em data-dcnode-id="1343"><span data-dcnode-id="1347" instrument_node="">Today’s post is written by regular contributor </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bearman.us/Susan_Bearman/Home.html" target="_blank" title="Susan Bearman"><span data-dcnode-id="1346" instrument_node="">Susan Bearman</span></a><span data-dcnode-id="1344" instrument_node="">.</span></em></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1330"><em data-dcnode-id="1331"><strong data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Editor’s Note:</span></strong><span data-dcnode-id="1338" instrument_node=""> For a chance to win a copy of my eBook, </span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//busymomsguidetowriting.com/" target="_blank" title="The Busy Mom's Guide to Writing"><span data-dcnode-id="1337" instrument_node="">The Busy Mom’s Guide to Writing</span></a><span data-dcnode-id="1335" instrument_node="">, drop by author Jody Hedlund’s blog and leave a comment on her latest post, </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jodyhedlund.blogspot.com.au/2012/04/5-ways-to-reduce-working-mom-whine.html" target="_blank" title="5 Ways to Reduce the Working-Mom Whine Syndrome"><span data-dcnode-id="1334" instrument_node="">5 Ways to Reduce the Working-Mom Whine Syndrome</span></a><span data-dcnode-id="1332" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1328" instrument_node="">I started </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/writers-write-creativity-is-a-state-of-mind/" target="_blank"><span data-dcnode-id="1327" instrument_node="">my writing life</span></a><span data-dcnode-id="1325" instrument_node=""> as a business writer, compelled to try to improve the tortured, often incomprehensible language I found in operating manuals, annual reports, memoranda, and other formats that some bad writers tried to pass off as business “communication”. There seems to be a great misconception that </span><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/101-of-the-best-fiction-writing-tips-part-iv/" target="_blank"><span data-dcnode-id="1324" instrument_node="">passive voice</span></a><span data-dcnode-id="1322" instrument_node="">, undefined acronyms and abbreviations, and loads of jargon make for good business writing.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1319" instrument_node="">Not true. All writers—whether writing for business, science, or academia, or those writing fiction and creative nonfiction—should strive for </span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/writers-beware-how-to-banish-the-fluff-bunny/" target="_blank"><span data-dcnode-id="1318" instrument_node="">clarity</span></a><span data-dcnode-id="1316" instrument_node="">.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1313" instrument_node="">But does that mean jargon, slang, and idioms are always taboo? Not if you do your job to make them serve your writing, rather confuse or bore </span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/15-reader-frustrations-to-avoid-in-your-novel/" target="_blank"><span data-dcnode-id="1312" instrument_node="">your readers</span></a><span data-dcnode-id="1310" instrument_node="">.</span><span data-dcnode-id="1309" id="more-9116"></span></p><span data-dcnode-id="1307" instrument_node="">
</span><h2 data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Jargon</span></h2><span data-dcnode-id="1304" instrument_node="">
</span><blockquote data-dcnode-id="1298"><p data-dcnode-id="1299"><span data-dcnode-id="1303" instrument_node="">jargon (</span><em data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">noun</span></em><span data-dcnode-id="1300" instrument_node="">) — specialized technical terminology characteristic of a particular subject; a characteristic language of a particular group.</span></p></blockquote><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">To use jargon effectively, you must know your audience. Almost all industries use jargon to some extent, and that’s OK, because most practitioners of a particular profession have a basic understanding of the material and its associated jargon. Business and sports writers are notorious jargon users, as those in medicine and education.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">For most writers, the goal is clarity. Unless you have a specific reason to use jargon, it’s best to avoid it. If you must include jargon, be sure to define it or make it understandable within the context of your story.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Bad writing is often the result of too much jargon. While jargon can be helpful when communicating within a specific group, too much jargon, or jargon that is not clearly defined can lead to muddy, confusing writing. If you find yourself having to reread a sentence over and over again, it is often because it contains confusing jargon.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">Well-placed jargon in a piece of fiction can lend the voice of authority or the face of authenticity to a particular character. If one of your </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/how-to-bring-your-characters-into-focus/" target="_blank"><span data-dcnode-id="1286" instrument_node="">characters</span></a><span data-dcnode-id="1284" instrument_node=""> is a pompous Wall Street trader, using some insider jargon will help readers hear his voice on your page.&nbsp;Genre fiction, such as crime fiction, often relies heavily on the use of jargon. Here again, know your audience.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">One way to help define jargon in your writing is to spell out acronyms or abbreviations the first time you use them:</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Fuzzy:</span></strong><span data-dcnode-id="1276" instrument_node=""> SCBWI announced on June 19 both the winner and runner up of the Don Freeman Memorial Grant-in-Aid.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1270"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Better:</span></strong><span data-dcnode-id="1271" instrument_node=""> On June 19, the Society for Children’s Book Writers and Illustrators (SCBWI) announced this year’s recipients of the Don Freeman Memorial Grants for picture book illustrators.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">See if you can translate the following jargon into language that could be understood by a general audience (note, I did not make these up). You may need your search engine to help you. How many clicks around the Internet did it take you to understand the original jargon?</span></p><span data-dcnode-id="1266" instrument_node="">
</span><ul data-dcnode-id="1249"><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Tender mooring area; please use a long painter.</span></li><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Eye of the Leopard managed to collar pacesetter Mr. Foricos Two U at the wire to win by a neck.</span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">The LNA is the “front end” of the block down-converter.</span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The increasingly performative quality of art is becoming the paradigm for a&nbsp;multiplicity&nbsp;of aesthetic practices.</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">The MVC (also known as a Mesoscale Convective Vortex (MCV) or a “Neddy eddy”) is best seen in a Java animation of visible imagery, appearing as a cyclonic spiral moving toward Saint Louis, MO.</span></li><span data-dcnode-id="1250" instrument_node="">
</span></ul><span data-dcnode-id="1248" instrument_node="">
</span><h2 data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Slang</span></h2><span data-dcnode-id="1245" instrument_node="">
</span><blockquote data-dcnode-id="1239"><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">slang (</span><em data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">noun</span></em><span data-dcnode-id="1241" instrument_node="">) —&nbsp;A kind of language occurring chiefly in casual and playful speech, made up typically of short-lived coinages and figures of speech that are deliberately used in place of standard terms for added raciness, humor, irreverence, or other effect.</span></p></blockquote><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1237" instrument_node="">Slang is the language of the moment. It’s especially common among young people and, therefore, a vital component in writing young adult (YA) literature or writing authentically in the voice of a teen. In a recent issue of </span><em data-dcnode-id="1234"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//triquarterly.org/views/finding-voice-first-person-narration-young-adult-literature-and-coming-age-adult-fiction" target="_blank"><span data-dcnode-id="1236" instrument_node="">TriQuarterly Online</span></a></em><span data-dcnode-id="1233" instrument_node="">, Natalie Haney Tilghman explains: “Slang is a language of exclusion and makes the world of adolescence inaccessible to outsiders, including adults.”</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">But using slang effectively is tricky. First, by its very nature, slang is short-lived. Words or phrases that sound fresh today may be as moldy as week-old bread by the time your book leaves the presses.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">If you do use slang, you have to define it in context and use it frequently enough in your text for it to seem a natural part of the telling of your story. It should sound right coming out of the mouths of your characters. This requires consistency and a good ear. If you’re going to use real slang from a particular community—the hip hop culture, for example—you better get it right or you will lose credibility with your readers.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">One way to avoid misusing slang is to make up your own. It’s not that hard; teenagers do it all the time. Mix in a few evergreens like “cool” or “hot” that most readers will immediately recognize as slang, and your imaginary slang will take on a life of its own. Again, consistency and context are key. Who knows, your made-up slang may become the real slang of tomorrow.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h2 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Idioms</span></h2><span data-dcnode-id="1219" instrument_node="">
</span><blockquote data-dcnode-id="1213"><p data-dcnode-id="1214"><span data-dcnode-id="1218" instrument_node="">idiom (</span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">noun</span></em><span data-dcnode-id="1215" instrument_node="">) —&nbsp;a group of words established by usage as having a meaning not deducible from those of the individual words (e.g. “on pins and needles”, meaning to be worried about something).</span></p></blockquote><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1202"><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usingenglish.com/reference/idioms/c.html" target="_blank"><span data-dcnode-id="1211" instrument_node="">Idioms</span></a><span data-dcnode-id="1209" instrument_node=""> (or&nbsp;colloquialisms)&nbsp;are those turns of phrases that mean something entirely different than the actual words would indicate. Idiom is often synonymous with </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/how-cliched-is-your-writing-take-the-test/" target="_blank"><span data-dcnode-id="1208" instrument_node="">cliché</span></a><span data-dcnode-id="1206" instrument_node=""> (a saying or expression that has been so overused that it has become </span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/avoid-these-lazy-mistakes-in-your-writing/" target="_blank"><span data-dcnode-id="1205" instrument_node="">boring and unoriginal</span></a><span data-dcnode-id="1203" instrument_node="">), but not all idioms are clichés. Used wisely in fiction or creative nonfiction, a well-chosen idiom can add color and flavor to your writing.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Since many idioms are regional&nbsp;they can be an efficient way of setting a character in a particular time or place. Speech from the American South is often riddled with colorful idioms, and English literature abounds with brilliant uses of idioms:</span></p><span data-dcnode-id="1198" instrument_node="">
</span><ul data-dcnode-id="1172"><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1196" instrument_node="">Tennessee Williams’ classic </span><em data-dcnode-id="1193"><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0811216012/ref%3Das_li_tf_tl%3Fie%3DUTF8%26tag%3Dwriitsid-20%26linkCode%3Das2%26camp%3D1789%26creative%3D9325%26creativeASIN%3D0811216012" target="_blank" title="Cat on a Hot Tin Roof, Tennessee Williams"><span data-dcnode-id="1195" instrument_node="">Cat on a Hot Tin Roof</span></a></em><span data-dcnode-id="1192" instrument_node=""> comes from a much older idiom, “like a cat on hot bricks”; both mean to be jumpy and nervous.</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1185"><span data-dcnode-id="1189" instrument_node="">Shakespeare coined </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enotes.com/shakespeare-quotes/themes/expressions-idioms" target="_blank"><span data-dcnode-id="1188" instrument_node="">many idioms </span></a><span data-dcnode-id="1186" instrument_node="">that are still used today, including: wearing your heart on your sleeve, to come full circle, or to go on a wild-goose chase.</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1174"><span data-dcnode-id="1183" instrument_node="">The classic children’s book </span><em data-dcnode-id="1179"><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0060267879/ref%3Das_li_tf_tl%3Fie%3DUTF8%26tag%3Dwriitsid-20%26linkCode%3Das2%26camp%3D1789%26creative%3D9325%26creativeASIN%3D0060267879" target="_blank" title="Amelia Bedelia Treasury"><span data-dcnode-id="1182" instrument_node="">Amelia Bedelia</span></a><span data-dcnode-id="1180" instrument_node="">,&nbsp;</span></em><span data-dcnode-id="1178" instrument_node="">by Peggy Parish, is rife with idioms that confound poor Amelia, as she “dusts the furniture” by putting dust everywhere (why </span><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">isn’t</span></em><span data-dcnode-id="1175" instrument_node=""> it “undusting” the furniture?)</span></li><span data-dcnode-id="1173" instrument_node="">
</span></ul><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">Jargon, slang, and idioms are often the culprits on unimaginative and confusing text. But in the hands of good writers, they are just three more tools in your </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/23-websites-that-make-your-writing-stronger/" target="_blank"><span data-dcnode-id="1169" instrument_node="">writing toolbox</span></a><span data-dcnode-id="1167" instrument_node="">.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><h3 data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Just for Fun</span></h3><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1161" instrument_node="">If you’re in need of a few good laughs (or want to feel really good about your own writing), check out the winners of the </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.plainenglish.co.uk/awards/golden-bull-awards/golden-bull-winners-2011.html" target="_blank"><span data-dcnode-id="1160" instrument_node="">2011 Golden Bull Awards</span></a><span data-dcnode-id="1158" instrument_node=""> from the </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.plainenglish.co.uk/" target="_blank"><span data-dcnode-id="1157" instrument_node="">Plain English Campaign</span></a><span data-dcnode-id="1155" instrument_node="">. If any of the examples sound like good writing to you, return to the top of this post and start taking good notes.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1150" instrument_node="">

</span></div><section class="author-box" data-dcnode-id="959" itemprop="author" itemscope="" itemtype="//schema.org/Person"><div class="left" data-dcnode-id="988"><img alt="" class="avatar avatar-200 photo" data-dcnode-id="989" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/98778c1deb9cde1399ea068f8b6398ef%3Fs%3D200%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/98778c1deb9cde1399ea068f8b6398ef?s=400&amp;r=g 2x" width="200"></div><div class="right" data-dcnode-id="960"><h4 class="author-box-title" data-dcnode-id="984"><span data-dcnode-id="987" instrument_node="">About </span><span data-dcnode-id="985" itemprop="name"><span data-dcnode-id="986" instrument_node="">Susan Bearman</span></span></h4><div class="author-box-content" data-dcnode-id="961" itemprop="description"><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bearman.us/"><span data-dcnode-id="983" instrument_node="">Susan Bearman</span></a><span data-dcnode-id="981" instrument_node=""> is a writing veteran of more than 20 years, working as a business and creative writer and editor. She is the author of the </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alphabetanimal.com/"><span data-dcnode-id="980" instrument_node="">Animal Store Alphabet Book</span></a><span data-dcnode-id="978" instrument_node="">, a picture book funded with a successful </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/self-publishing-by-design-real-life-lessons/"><span data-dcnode-id="977" instrument_node="">Kickstarter campaign</span></a><span data-dcnode-id="975" instrument_node="">. She teaches writing and social media for writers, and is the publisher of </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//orringtonpress.com/"><span data-dcnode-id="974" instrument_node="">Orrington Press</span></a><span data-dcnode-id="972" instrument_node="">. Read Susan on her own blog, </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2kop.blogspot.com/"><span data-dcnode-id="971" instrument_node="">Two Kinds of People</span></a><span data-dcnode-id="969" instrument_node="">; find her on </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/2KoP"><span data-dcnode-id="968" instrument_node="">Twitter</span></a><span data-dcnode-id="966" instrument_node=""> and </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Susan.Bearman.Writer"><span data-dcnode-id="965" instrument_node="">Facebook</span></a><span data-dcnode-id="963" instrument_node="">.</span><p data-dcnode-id="962"></p></div></div></section><div class="adjacent-entry-pagination pagination" data-dcnode-id="950"><div class="pagination-previous alignleft" data-dcnode-id="955"><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/10-ways-to-boost-your-odds-of-an-acceptance/" rel="prev"><span class="adjacent-post-link" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">« 10 Ways to Boost Your Odds of an Acceptance</span></span></a></div><div class="pagination-next alignright" data-dcnode-id="951"><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writeitsideways.com/whats-in-a-name-writing-the-right-title/" rel="next"><span class="adjacent-post-link" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">What’s In A Name? Writing the Right Title »</span></span></a></div></div><div class="entry-comments" data-dcnode-id="352" id="comments"><h3 data-dcnode-id="948"><span data-dcnode-id="949 </span><p class="comment-meta" data-dcnode-id="929"><time class="comment-time" data-dcnode-id="930"><a class="comment-time-link" data-dcnode-id="931" href="#comment-124132"><span data-dcnode-id="932" instrument_node="">April 20, 2012 at 8:17 am</span></a></time></p><span data-dcnode-id="928" instrument_node=""> </span></header><span data-dcnode-id="926" instrument_node="">
</span><div class="comment-content" data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Great post. I took a business writing class through my work and it changed how I write emails. I try to spell out every acronym first to our customers – we have tons – because it can start to sound like a hot mess if I don’t. You never know who that email will get passed on to, saved, or printed in a file that’s kept for years. It’s helped me a lot in my creative writing too.</span></p><span data-dcnode-id="922" instrument_node="">
</span></div><span data-dcnode-id="920" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="899"><time class="comment-time" data-dcnode-id="900"><a class="comment-time-link" data-dcnode-id="901" href="#comment-124138"><span data-dcnode-id="902" instrument_node="">April 20, 2012 at 10:29 pm</span></a></time></p><span data-dcnode-id="898" instrument_node=""> </span></header><span data-dcnode-id="896" instrument_node="">
</span><div class="comment-content" data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Any book that has jargon/slang/idioms( too much or not used properly) really does bore the reader. Like the writer has focused too much on trying to impress with their own knowledge ( sometimes actually seems like lack of knowledge!) and forgotten to tell an enjoyable story. I can never force myself to the end, not even out of curiosity for how things turn out.</span></p><span data-dcnode-id="892" instrument_node="">
