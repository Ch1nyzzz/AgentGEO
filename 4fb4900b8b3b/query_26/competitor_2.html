ors in Writing —&nbsp; 3 Essential Tips for Writers</span></h1><h3 class="subtitle" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Avoid Clichés, Compare Logically, Ditch Purple Prose</span></h3><table class="meta-author-wrap with-photo alternative-meta" data-dcnode-id="468"><tbody><tr class="meta-author-wrap-row" data-dcnode-id="469"><td data-dcnode-id="494"><div class="account-hover-wrapper" data-dcnode-id="495"><div class="user-head" data-dcnode-id="496"><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//substack.com/profile/17809405-noveldoctor"><div class="profile-img-wrap" data-dcnode-id="498"><img alt="" data-dcnode-id="499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.substack.com/image/fetch/w_90%2Ch_90%2Cc_fill%2Cf_auto%2Cq_auto%3Agood%2Cfl_progressive%3Asteep/https%253A//bucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com/public/images/07d8fb4a-e770-4fa7-b441-a96dbe7836be_400x400.jpeg&amp;raw"></div></a></div></div></td><td class="meta-author-contents" data-dcnode-id="483"><div class="meta-right-column" data-dcnode-id="484"><div class="meta-author" data-dcnode-id="490"><div class="account-hover-wrapper" data-dcnode-id="491"><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//substack.com/profile/17809405-noveldoctor"><span data-dcnode-id="493" instrument_node="">NovelDoctor</span></a></div></div><table cellpadding="0" cellspacing="0" class="post-meta custom alternative-meta" data-dcnode-id="485"><tbody><tr data-dcnode-id="486"><td class="post-meta-item post-date" data-dcnode-id="487" title="2020-10-26T17:24:38.698Z"><time data-dcnode-id="488" datetime="2020-10-26T17:24:38.698Z"><span data-dcnode-id="489" instrument_node="">Oct 26, 2020</span></time></td></tr></tbody></table></div></td><td data-dcnode-id="470"><div class="post-meta post-meta-actions-web custom alternative-meta" data-dcnode-id="471"><div class="post-meta-item icon" data-dcnode-id="472"><span data-dcnode-id="473"><a data-dcnode-id="474" href="javascript:void(0)"><svg class="recommend-icon post-meta-icon" data-dcnode-id="475" fill="transparent" height="20" role="img" stroke="#757575" stroke-width="1.5" style="height: 20px; width: 20px;" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="476"><title data-dcnode-id="481">Share</title><svg class="lucide lucide-share" data-dcnode-id="477" fill="transparent" height="24" stroke="#757575" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" data-dcnode-id="480"></path><polyline data-dcnode-id="479" points="16 6 12 2 8 6"></polyline><line data-dcnode-id="478" x1="12" x2="12" y1="2" y2="15"></line></svg></g></svg></a></span></div></div></td></tr></tbody></table></div><div data-dcnode-id="466"></div><div class="" data-dcnode-id="375"><div class="available-content" data-dcnode-id="419"><div class="body markup" data-dcnode-id="420" dir="auto"><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Writers are naturally drawn to metaphor, as this is one of the key tools in the writing toolbox. Here are a few tips to help you use metaphors effectively.</span></p><h3 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">1. Avoid Common Idioms and Clichés</span></h3><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Part of the reason that lists like the ones above exist is that most writers know about these comparisons. If you wish to be original, then you would do well to avoid re-using common metaphors that famous writers like William Shakespeare, George Eliot, and Toni Morrison have already used. </span></p><p data-dcnode-id="455"><span data-dcnode-id="459" instrument_node="">Using clichés in your writing will bore your readers and lead them to find more original, inspired writers to read. Here’s one helpful</span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//examples.yourdictionary.com/examples-of-cliches.html" rel="nofollow ugc noopener"><span data-dcnode-id="458" instrument_node="">&nbsp;list of clichés you’ll want to avoid</span></a><span data-dcnode-id="456" instrument_node="">&nbsp;in your writing.</span></p><h3 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">2. Compare Logically</span></h3><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">A metaphor compares two dissimilar things. While these things should on the surface be very different, they must share some sort of detectable common attributes. Don’t compare two things that just can’t be compared. The metaphor should make some sort of logical sense to the reader.</span></p><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">For example, if you wanted to use a metaphor to describe the rhythmic sound of a drum, it would make sense to compare this to another thing with a rhythmic motion, such as a heartbeat or waves. But it would not make sense to compare a drumbeat to oil sitting in a pan, or a still pool of water. The connection has to exist for you to use it in your work.</span></p><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Make your metaphors easy to understand so a reader can quickly grasp your point.</span></p><h3 data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">3. Avoid Purple Prose with too many metaphors</span></h3><p data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">It is possible to over-use metaphors. Storytelling that launches into metaphorical descriptions without a good grounding in plot and the basics of character description turns into&nbsp;</span><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">“purple prose”</span></strong><span data-dcnode-id="441" instrument_node="">&nbsp;— writing that is full of colorful images but without a sense of momentum or purpose.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Your writing slows down when you use too many metaphors or use them in the wrong way. If you over-use the metaphorical toolset, you risk boring your reader.</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Furthermore, if you use too many metaphors, this actually lessens the impact of each metaphor, since they’ll all start to blend together and each one will become less memorable on its own.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">If your prose seems over-loaded with metaphors, try to strip down the description to the bare bones, and only use a metaphor that helps us to experience the scene in a new light. If the bare bones description works without a metaphor, it’s always wise to leave it out.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Less is more in the use of metaphors!</span></p><div data-dcnode-id="430"><hr data-dcnode-id="431"></div><h3 data-dcnode-id="427"><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//novel.doctor/the-big-list-of-125-metaphor-examples-and-tips-for-writers" rel="nofollow ugc noopener"><span data-dcnode-id="429" instrument_node="">Read on for a list of 125+ metaphor examples &gt;&gt;</span></a></h3><p data-dcnode-id="426"></p><a class="image-link image2" data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.substack.com/image/fetch/f_auto%2Cq_auto%3Agood%2Cfl_progressive%3Asteep/https%253A//bucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com/public/images/dd9a127b-1f82-4a58-8a63-65172c6b105c_800x800.jpeg" rel="nofollow" target="_blank"><picture data-dcnode-id="423"><source data-dcnode-id="425" sizes="100vw" srcset="https://cdn.subs
