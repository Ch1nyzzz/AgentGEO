</span><h3 class="post-title entry-title" data-dcnode-id="11002" itemprop="name"><span data-dcnode-id="11006" instrument_node="">
</span><a data-dcnode-id="11004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//idioms.languagesystems.edu/2019/12/banger.html"><span data-dcnode-id="11005" instrument_node="">Banger</span></a><span data-dcnode-id="11003" instrument_node="">
</span></h3><span data-dcnode-id="11001" instrument_node="">
</span><div class="post-header" data-dcnode-id="10997"><span data-dcnode-id="11000" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="10999"></div><span data-dcnode-id="10998" instrument_node="">

</span><div class="post-body entry-content" data-dcnode-id="10309" id="post-body-1850117598363348587" itemprop="description articleBody"><span data-dcnode-id="10995" instrument_node="">
</span><div data-dcnode-id="10313" dir="ltr" style="text-align: left;" trbidi="on"><span data-dcnode-id="10994" instrument_node="">
</span><span data-dcnode-id="10988" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10989" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10990" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10992"><span data-dcnode-id="10993" instrument_node="">Banger</span></b><span data-dcnode-id="10991" instrument_node=""> - Describes a song that is really awesome.&nbsp;</span></span></span></span><br data-dcnode-id="10987"><span data-dcnode-id="10986" instrument_node="">
</span><span data-dcnode-id="10980" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10981" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10982" style="font-size: small;"><b data-dcnode-id="10983" style="text-align: center;"><span data-dcnode-id="10984" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif;"><br data-dcnode-id="10985"></span></b></span></span></span><span data-dcnode-id="10979" instrument_node="">
</span><span data-dcnode-id="10973" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10974" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10975" style="font-size: small;"><b data-dcnode-id="10976" style="text-align: center;"><span data-dcnode-id="10977" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif;"><span data-dcnode-id="10978" instrument_node="">Example 1</span></span></b></span></span></span><br data-dcnode-id="10972"><span data-dcnode-id="10971" instrument_node="">
</span><span data-dcnode-id="10961" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10962" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10963" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10969"><span data-dcnode-id="10970" instrument_node="">Paul:</span></b><span data-dcnode-id="10968" instrument_node=""> Have you heard that new Kanye song? It's a </span><span data-dcnode-id="10965" style="color: #0b5394;"><b data-dcnode-id="10966"><span data-dcnode-id="10967" instrument_node="">banger</span></b></span><span data-dcnode-id="10964" instrument_node="">!</span></span></span></span><br data-dcnode-id="10960"><span data-dcnode-id="10959" instrument_node="">
</span><span data-dcnode-id="10953" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10954" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10955" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10957"><span data-dcnode-id="10958" instrument_node="">Jake:</span></b><span data-dcnode-id="10956" instrument_node=""> Dude, I've been listening to Kanye's new album non-stop ever since he dropped it.</span></span></span></span><br data-dcnode-id="10952"><span data-dcnode-id="10951" instrument_node="">
</span><span data-dcnode-id="10945" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10946" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10947" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10949"><span data-dcnode-id="10950" instrument_node="">Paul:</span></b><span data-dcnode-id="10948" instrument_node=""> Really?</span></span></span></span><br data-dcnode-id="10944"><span data-dcnode-id="10943" instrument_node="">
</span><span data-dcnode-id="10933" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10934" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10935" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10941"><span data-dcnode-id="10942" instrument_node="">Jake: </span></b><span data-dcnode-id="10940" instrument_node="">Yeah. Every song on that album is a </span><span data-dcnode-id="10937" style="color: #0b5394;"><b data-dcnode-id="10938"><span data-dcnode-id="10939" instrument_node="">banger</span></b></span><span data-dcnode-id="10936" instrument_node="">.</span></span></span></span><br data-dcnode-id="10932"><span data-dcnode-id="10931" instrument_node="">
</span><span data-dcnode-id="10927" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10928" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10929" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><br data-dcnode-id="10930"></span></span></span><span data-dcnode-id="10926" instrument_node="">
</span><span data-dcnode-id="10920" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10921" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10922" style="font-size: small;"><b data-dcnode-id="10923"><span data-dcnode-id="10924" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif;"><span data-dcnode-id="10925" instrument_node="">Example 2</span></span></b></span></span></span><br data-dcnode-id="10919"><span data-dcnode-id="10918" instrument_node="">
</span><span data-dcnode-id="10912" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10913" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10914" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10916"><span data-dcnode-id="10917" instrument_node="">Mika:</span></b><span data-dcnode-id="10915" instrument_node=""> So let's plan out a surprise party for Rick. It's his 21st birthday, so it has to be really good.</span></span></span></span><br data-dcnode-id="10911"><span data-dcnode-id="10910" instrument_node="">
</span><span data-dcnode-id="10904" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10905" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10906" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10908"><span data-dcnode-id="10909" instrument_node="">Ted:</span></b><span data-dcnode-id="10907" instrument_node=""> Well, we should definitely have a live DJ so that everyone can dance.</span></span></span></span><br data-dcnode-id="10903"><span data-dcnode-id="10902" instrument_node="">
</span><span data-dcnode-id="10896" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10897" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10898" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10900"><span data-dcnode-id="10901" instrument_node="">Mika:</span></b><span data-dcnode-id="10899" instrument_node=""> OK but don't hire that DJ who did the last party we had. All the music he played sucked.</span></span></span></span><br data-dcnode-id="10895"><span data-dcnode-id="10894" instrument_node="">
</span><span data-dcnode-id="10884" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10885" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10886" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10892"><span data-dcnode-id="10893" instrument_node="">Ted:</span></b><span data-dcnode-id="10891" instrument_node=""> Don't worry. I know this new DJ and every song he plays is a </span><span data-dcnode-id="10888" style="color: #0b5394;"><b data-dcnode-id="10889"><span data-dcnode-id="10890" instrument_node="">banger</span></b></span><span data-dcnode-id="10887" instrument_node="">! People are going to lose their minds.</span></span></span></span><br data-dcnode-id="10883"><span data-dcnode-id="10882" instrument_node="">
</span><span data-dcnode-id="10878" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10879" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10880" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><br data-dcnode-id="10881"></span></span></span><span data-dcnode-id="10877" instrument_node="">
</span><span data-dcnode-id="10872" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10873" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10874" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><b data-dcnode-id="10875"><span data-dcnode-id="10876" instrument_node="">Explanation</span></b></span></span></span><br data-dcnode-id="10871"><span data-dcnode-id="10870" instrument_node="">
</span><span data-dcnode-id="10866" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10867" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10868" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><span data-dcnode-id="10869" instrument_node="">In example 1, Paul and Jake are talking about Kanye's new album and how the songs are all really good. In example 2, Ted assures Mika that the new DJ only plays songs that are bangers, or really good.</span></span></span></span><br data-dcnode-id="10865"><span data-dcnode-id="10864" instrument_node="">
</span><span data-dcnode-id="10860" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10861" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10862" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><br data-dcnode-id="10863"></span></span></span><span data-dcnode-id="10859" instrument_node="">
</span><span data-dcnode-id="10855" style="font-family: Verdana, sans-serif;"><span data-dcnode-id="10856" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="10857" style="font-family: &quot;arial&quot; , &quot;helvetica&quot; , sans-serif; font-size: small;"><span data-dcnode-id="10858" instrument_node="">Check out this video clip where two guys are talking about music:</span></span></span></span><br data-dcnode-id="10854"><span data-dcnode-id="10853" instrument_node="">

</span><span data-dcnode-id="9886" style="font-family: &quot;verdana&quot; , sans-serif;"><b data-dcnode-id="9951"><span data-dcnode-id="9952" style="color: #0b5394;"><span data-dcnode-id="9953" instrument_node="">Catch-22</span></span></b><span data-dcnode-id="9950" instrument_node="">: a dilemma or difficult circumstance from which there is no escape because of mutually conflicting or dependent conditions.</span><br data-dcnode-id="9949"><br data-dcnode-id="9948"><b data-dcnode-id="9946"><span data-dcnode-id="9947" instrument_node="">Example 1</span></b><span data-dcnode-id="9945" instrument_node=""> </span><br data-dcnode-id="9944"><b data-dcnode-id="9942"><span data-dcnode-id="9943" instrument_node="">Son:</span></b><span data-dcnode-id="9941" instrument_node=""> Dad, I'm going to apply for a job at the ice cream store downtown. </span><br data-dcnode-id="9940"><b data-dcnode-id="9938"><span data-dcnode-id="9939" instrument_node="">Dad:</span></b><span data-dcnode-id="9937" instrument_node=""> Why? What happened to your last three interviews with the New York Times, Newsweek, and Vogue Magazine? Don't you still want to be a journalist? </span><br data-dcnode-id="9936"><b data-dcnode-id="9934"><span data-dcnode-id="9935" instrument_node="">Son:</span></b><span data-dcnode-id="9933" instrument_node=""> Yeah I do... But they all said that they're not going to hire me because I don't have any experience.</span><br data-dcnode-id="9932"><b data-dcnode-id="9930"><span data-dcnode-id="9931" instrument_node="">Dad:</span></b><span data-dcnode-id="9929" instrument_node=""> Well, how do they expect you to have any experience if they don't give you a chance?! </span><br data-dcnode-id="9928"><b data-dcnode-id="9926"><span data-dcnode-id="9927" instrument_node="">Son:</span></b><span data-dcnode-id="9925" instrument_node=""> You're right, it's a </span><span data-dcnode-id="9922" style="color: #0b5394;"><b data-dcnode-id="9923"><span data-dcnode-id="9924" instrument_node="">catch-22</span></b></span><span data-dcnode-id="9921" instrument_node="">. </span><br data-dcnode-id="9920"><br data-dcnode-id="9919"><span data-dcnode-id="9918" instrument_node="">The son tried to apply for a job in journalism but no company would hire him because he doesn't have any experience. But he can't get any experience because no one would hire him. There are two problems that are dependent on one another and there seems to be no way out. </span><br data-dcnode-id="9917"><br data-dcnode-id="9916"><b data-dcnode-id="9914"><span data-dcnode-id="9915" instrument_node="">Example 2</span></b><br data-dcnode-id="9913"><b data-dcnode-id="9911"><span data-dcnode-id="9912" instrument_node="">Jason:</span></b><span data-dcnode-id="9910" instrument_node=""> I had a disappointing visit to the bank today.</span><br data-dcnode-id="9909"><b data-dcnode-id="9907"><span data-dcnode-id="9908" instrument_node="">June:</span></b><span data-dcnode-id="9906" instrument_node=""> Oh no, tell me what happened.</span><br data-dcnode-id="9905"><b data-dcnode-id="9903"><span data-dcnode-id="9904" instrument_node="">Jason:</span></b><span data-dcnode-id="9902" instrument_node=""> I tried to apply for a mortgage loan but the bank rejected the application because I still had debt from student loans. They said that they'll let me borrow money only if I don't have any existing debt. </span><br data-dcnode-id="9901"><b data-dcnode-id="9899"><span data-dcnode-id="9900" instrument_node="">June:</span></b><span data-dcnode-id="9898" instrument_node=""> That's ridiculous, the reason why you need the bank's help in the first place is because you don't have enough money. </span><br data-dcnode-id="9897"><b data-dcnode-id="9895"><span data-dcnode-id="9896" instrument_node="">Jason:</span></b><span data-dcnode-id="9894" instrument_node=""> Yeah, I guess I'm stuck in this </span><span data-dcnode-id="9891" style="color: #0b5394;"><b data-dcnode-id="9892"><span data-dcnode-id="9893" instrument_node="">catch-22</span></b></span><span data-dcnode-id="9890" instrument_node="">. </span><br data-dcnode-id="9889"><br data-dcnode-id="9888"><span data-dcnode-id="9887" instrument_node="">Jason tried to borrow money from the bank to buy a house but the bank will not help him because he still owes money from student loans. In conclusion, the bank doesn't allow Jason to borrow money because he doesn't have enough money. The two problems are tied together and there seems to be no solution.</span></span><br data-dcnode-id="9885"><span data-dcnode-id="9884" instrument_node="">
</span><br data-dcnode-id="9883"><span data-dcnode-id="9882" instrument_node="">
</span><br data-dcnode-id="9881"><span data-dcnode-id="9880" instrument_node="">

</span><span data-dcnode-id="9500" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="9501" style="font-size: small;"><b data-dcnode-id="9520"><span data-dcnode-id="9521" instrument_node="">Example 1 </span></b><br data-dcnode-id="9519"><b data-dcnode-id="9517"><span data-dcnode-id="9518" instrument_node="">13-year-old son</span></b><span data-dcnode-id="9516" instrument_node="">: Oh, mom, just a reminder. I don't have soccer practice today so you have to pick me up right after school. I'm just reminding you so you don't forget to come and get me. Remember, you forgot one time and I waited for you for an hour all by myself? I didn't know if you were going to come at all!</span><br data-dcnode-id="9515"><b data-dcnode-id="9513"><span data-dcnode-id="9514" instrument_node="">Mom:</span></b><span data-dcnode-id="9512" instrument_node=""> OK, I got it. I'll put an alert on my phone so I won't forget this time. Of course I remember that one time I forgot. I'm still very sorry about that. </span><br data-dcnode-id="9511"><b data-dcnode-id="9509"><span data-dcnode-id="9510" instrument_node="">Son:</span></b><span data-dcnode-id="9508" instrument_node=""> Yeah, I can't believe you forgot about your own son!</span><br data-dcnode-id="9507"><b data-dcnode-id="9505"><span data-dcnode-id="9506" instrument_node="">Mom:</span></b><span data-dcnode-id="9504" instrument_node=""> I was very busy that day and I'm still so sorry!</span><b data-dcnode-id="9502"><span data-dcnode-id="9503" instrument_node="">&nbsp;</span></b></span></span><br data-dcnode-id="9499"><span data-dcnode-id="9498" instrument_node="">
</span><span data-dcnode-id="9441" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="9442" style="font-size: small;"><b data-dcnode-id="9496"><span data-dcnode-id="9497" instrument_node="">Son:</span></b><span data-dcnode-id="9495" instrument_node=""> I would never do that to my own kid.....</span><br data-dcnode-id="9494"><b data-dcnode-id="9492"><span data-dcnode-id="9493" instrument_node="">Mom:</span></b><span data-dcnode-id="9491" instrument_node=""> OK, young man! You are really starting to sound like a </span><span data-dcnode-id="9488" style="color: #0b5394;"><b data-dcnode-id="9489"><span data-dcnode-id="9490" instrument_node="">broken record</span></b></span><span data-dcnode-id="9487" instrument_node="">. I have already apologized for that at least 10 times! Will you ever forgive me so we can move on?!</span><br data-dcnode-id="9486"><br data-dcnode-id="9485"><b data-dcnode-id="9483"><span data-dcnode-id="9484" instrument_node="">Example 2</span></b><br data-dcnode-id="9482"><b data-dcnode-id="9480"><span data-dcnode-id="9481" instrument_node="">Politician on TV:</span></b><span data-dcnode-id="9479" instrument_node=""> "...yes, but my opponent had done the same thing and no one accused her of any wrongdoing. Why is everyone being so unfair to me? This is the worst witch hunt in Presidential history....." </span><br data-dcnode-id="9478"><b data-dcnode-id="9476"><span data-dcnode-id="9477" instrument_node="">Me:</span></b><span data-dcnode-id="9475" instrument_node=""> Let's turn the TV off. This guy is a </span><span data-dcnode-id="9472" style="color: #0b5394;"><b data-dcnode-id="9473"><span data-dcnode-id="9474" instrument_node="">broken record</span></b></span><span data-dcnode-id="9471" instrument_node="">; constantly making the same false claims and accusations. Let's not give him the attention he craves and hopefully he'll go away soon. </span><br data-dcnode-id="9470"><br data-dcnode-id="9469"><b data-dcnode-id="9467"><span data-dcnode-id="9468" instrument_node="">Explanation</span></b><br data-dcnode-id="9466"><span data-dcnode-id="9465" instrument_node="">a </span><span data-dcnode-id="9462" style="color: #0b5394;"><b data-dcnode-id="9463"><span data-dcnode-id="9464" instrument_node="">broken record</span></b></span><span data-dcnode-id="9461" instrument_node=""> is a person who is (annoyingly) repeating themselves and/or talking about the same thing over and over again. </span><br data-dcnode-id="9460"><span data-dcnode-id="9459" instrument_node="">you can use the verb phrase sound like&nbsp; OR&nbsp; the be verb</span><br data-dcnode-id="9458"><span data-dcnode-id="9457" instrument_node="">examples: She sounds like a </span><span data-dcnode-id="9454" style="color: #0b5394;"><b data-dcnode-id="9455"><span data-dcnode-id="9456" instrument_node="">broken record</span></b></span><span data-dcnode-id="9453" instrument_node="">, constantly complaining about the food. OR She is a </span><span data-dcnode-id="9450" style="color: #0b5394;"><b data-dcnode-id="9451"><span data-dcnode-id="9452" instrument_node="">broken record</span></b></span><span data-dcnode-id="9449" instrument_node="">....</span><br data-dcnode-id="9448"><br data-dcnode-id="9447"><span data-dcnode-id="9446" instrument_node="">In </span><b data-dcnode-id="9444"><span data-dcnode-id="9445" instrument_node="">Example 1</span></b><span data-dcnode-id="9443" instrument_node="">, the boy is continuing to talk about the time that his mother forgot to pick him up even though he was never in danger and his mother had apologized many times for it. He continues to talk about it until his mother gets annoyed!</span></span></span><br data-dcnode-id="9440"><span data-dcnode-id="9439" instrument_node="">
</span><span data-dcnode-id="9429" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="9430" style="font-size: small;"><br data-dcnode-id="9438"><span data-dcnode-id="9437" instrument_node="">In </span><b data-dcnode-id="9435"><span data-dcnode-id="9436" instrument_node="">Example 2</span></b><span data-dcnode-id="9434" instrument_node="">, the politician on television is talking about the same points that he always does. The viewer opts to turn the television off because it's always the same in their opinion. It is implied that the viewer is not a supporter of this politician and finds the speech annoying.</span><br data-dcnode-id="9433"><br data-dcnode-id="9432"><span data-dcnode-id="9431" instrument_node="">Are you familiar with vinyl records? It is said that when a record is scratched or "broken," the needle skips while playing and repeats the same portion of the record over and over until someone stops the player.</span></span></span><br data-dcnode-id="9428"><span data-dcnode-id="9427" instrument_node="">
</span><br data-dcnode-id="9426"><span data-dcnode-id="9425" instrument_node="">

</span><br data-dcnode-id="9067"><span data-dcnode-id="9066" instrument_node="">
</span><span data-dcnode-id="9014" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="9015" style="font-size: small;"><b data-dcnode-id="9064"><span data-dcnode-id="9065" instrument_node="">Definition</span></b><span data-dcnode-id="9063" instrument_node="">: to feel completely refreshed and renewed, especially after an exhausting and difficult experience</span><br data-dcnode-id="9062"><b data-dcnode-id="9060"><span data-dcnode-id="9061" instrument_node="">Grammar form:</span></b><span data-dcnode-id="9059" instrument_node=""> Verb:&nbsp; feel-felt-felt</span><br data-dcnode-id="9058"><br data-dcnode-id="9057"><b data-dcnode-id="9055"><span data-dcnode-id="9056" instrument_node="">Example 1</span></b><br data-dcnode-id="9054"><b data-dcnode-id="9052"><span data-dcnode-id="9053" instrument_node="">Husband:</span></b><span data-dcnode-id="9051" instrument_node=""> Hi honey!&nbsp; How was your day at work?</span><br data-dcnode-id="9050"><b data-dcnode-id="9048"><span data-dcnode-id="9049" instrument_node="">Wife:</span></b><span data-dcnode-id="9047" instrument_node=""> The store was so busy today because of the long weekend.&nbsp; I worked 12 hours straight. I am so exhausted that I don’t feel like doing anything.</span><br data-dcnode-id="9046"><b data-dcnode-id="9044"><span data-dcnode-id="9045" instrument_node="">Husband:</span></b><span data-dcnode-id="9043" instrument_node=""> Oh no!&nbsp; Why don’t you go take a long warm bath?&nbsp; I am sure you will </span><span data-dcnode-id="9040" style="color: #0b5394;"><b data-dcnode-id="9041"><span data-dcnode-id="9042" instrument_node="">feel like a new person</span></b></span><span data-dcnode-id="9039" instrument_node=""> after.</span><br data-dcnode-id="9038"><b data-dcnode-id="9036"><span data-dcnode-id="9037" instrument_node="">Wife:</span></b><span data-dcnode-id="9035" instrument_node="">&nbsp; Thanks!&nbsp; That’s a great idea.</span><br data-dcnode-id="9034"><br data-dcnode-id="9033"><b data-dcnode-id="9031"><span data-dcnode-id="9032" instrument_node="">Example 2</span></b><br data-dcnode-id="9030"><span data-dcnode-id="9029" instrument_node="">After Tina broke up with her boyfriend, she was so sad that she stayed home for days. She didn’t feel like doing anything.&nbsp; In order to take her out of her depression, her friends decided to take her on a short camping trip. By being out in nature and talking to her friends, </span><span data-dcnode-id="9026" style="color: #0b5394;"><b data-dcnode-id="9027"><span data-dcnode-id="9028" instrument_node="">she felt like a new person</span></b></span><span data-dcnode-id="9025" instrument_node=""> again.</span><br data-dcnode-id="9024"><br data-dcnode-id="9023"><b data-dcnode-id="9021"><span data-dcnode-id="9022" instrument_node="">Meaning:</span></b><span data-dcnode-id="9020" instrument_node="">&nbsp; </span><span data-dcnode-id="9017" style="color: #0b5394;"><b data-dcnode-id="9018"><span data-dcnode-id="9019" instrument_node="">to feel like a new person</span></b></span><span data-dcnode-id="9016" instrument_node=""> means to feel refreshed and reenergized after you have experienced something unpleasant.&nbsp;&nbsp;</span></span></span><br data-dcnode-id="9013"><span data-dcnode-id="9012" instrument_node="">
</span><span data-dcnode-id="9005" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="9006" style="font-size: small;"><br data-dcnode-id="9011"><span data-dcnode-id="9010" instrument_node="">For instance, in </span><b data-dcnode-id="9008"><span data-dcnode-id="9009" instrument_node="">Example 1</span></b><span data-dcnode-id="9007" instrument_node="">, the person is exhausted from a long tiring day at work. Taking a bath will make her feel reenergized. She will feel refreshed mentally and physically.</span></span></span><br data-dcnode-id="9004"><span data-dcnode-id="9003" instrument_node="">
</span><span data-dcnode-id="8996" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8997" style="font-size: small;"><br data-dcnode-id="9002"><span data-dcnode-id="9001" instrument_node="">In </span><b data-dcnode-id="8999"><span data-dcnode-id="9000" instrument_node="">Example 2</span></b><span data-dcnode-id="8998" instrument_node="">, the person is extremely sad at first, but by spending time with friends outdoors, she was able to feel happy again. She wasn’t depressed anymore. This was a feeling that she hadn’t felt in a long time.</span></span></span><br data-dcnode-id="8995"><span data-dcnode-id="8994" instrument_node="">
</span><br data-dcnode-id="8993"><span data-dcnode-id="8992" instrument_node="">

</span><span data-dcnode-id="8615" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8616" style="font-size: small;"><b data-dcnode-id="8621"><span data-dcnode-id="8622" instrument_node="">Definition:</span></b><span data-dcnode-id="8620" instrument_node=""> in trouble, in a difficult situation, or mixed up</span><br data-dcnode-id="8619"><b data-dcnode-id="8617"><span data-dcnode-id="8618" instrument_node="">&nbsp;</span></b></span></span><br data-dcnode-id="8614"><span data-dcnode-id="8613" instrument_node="">
</span><span data-dcnode-id="8587" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8588" style="font-size: small;"><b data-dcnode-id="8611"><span data-dcnode-id="8612" instrument_node="">Example 1:</span></b><br data-dcnode-id="8610"><b data-dcnode-id="8608"><span data-dcnode-id="8609" instrument_node="">Sue: </span></b><span data-dcnode-id="8607" instrument_node="">I might lose my home.</span><br data-dcnode-id="8606"><b data-dcnode-id="8604"><span data-dcnode-id="8605" instrument_node="">Marvin:</span></b><span data-dcnode-id="8603" instrument_node=""> Why? What happened?</span><br data-dcnode-id="8602"><b data-dcnode-id="8600"><span data-dcnode-id="8601" instrument_node="">Sue:</span></b><span data-dcnode-id="8599" instrument_node=""> Well, last year I got laid off and I haven’t been able to find another job. I haven’t been able to paythe mortgage on the house so the bank is threatening to take over.</span><br data-dcnode-id="8598"><b data-dcnode-id="8596"><span data-dcnode-id="8597" instrument_node="">Marvin:</span></b><span data-dcnode-id="8595" instrument_node=""> Wow! I’m so sorry. You really are </span><span data-dcnode-id="8592" style="color: #0b5394;"><b data-dcnode-id="8593"><span data-dcnode-id="8594" instrument_node="">in a pickle</span></b></span><span data-dcnode-id="8591" instrument_node="">.</span><br data-dcnode-id="8590"><span data-dcnode-id="8589" instrument_node="">&nbsp;</span></span></span><br data-dcnode-id="8586"><span data-dcnode-id="8585" instrument_node="">
</span><span data-dcnode-id="8561" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8562" style="font-size: small;"><b data-dcnode-id="8583"><span data-dcnode-id="8584" instrument_node="">Example 2:</span></b><br data-dcnode-id="8582"><b data-dcnode-id="8580"><span data-dcnode-id="8581" instrument_node="">Larry:</span></b><span data-dcnode-id="8579" instrument_node=""> I’m </span><span data-dcnode-id="8576" style="color: #0b5394;"><b data-dcnode-id="8577"><span data-dcnode-id="8578" instrument_node="">in a pickle</span></b></span><span data-dcnode-id="8575" instrument_node="">.</span><br data-dcnode-id="8574"><b data-dcnode-id="8572"><span data-dcnode-id="8573" instrument_node="">Mary:</span></b><span data-dcnode-id="8571" instrument_node=""> Why? What happened?</span><br data-dcnode-id="8570"><b data-dcnode-id="8568"><span data-dcnode-id="8569" instrument_node="">Larry:</span></b><span data-dcnode-id="8567" instrument_node=""> The police caught me for drunk driving and took my driver’s license away. Now I can’t drive and I cannot get to work without a car.</span><br data-dcnode-id="8566"><b data-dcnode-id="8564"><span data-dcnode-id="8565" instrument_node="">Mary:</span></b><span data-dcnode-id="8563" instrument_node=""> Oh dear! You are in a pickle!</span></span></span><br data-dcnode-id="8560"><span data-dcnode-id="8559" instrument_node="">
</span><span data-dcnode-id="8547" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8548" style="font-size: small;"><br data-dcnode-id="8558"><b data-dcnode-id="8556"><span data-dcnode-id="8557" instrument_node="">Meaning:</span></b><span data-dcnode-id="8555" instrument_node=""> </span><span data-dcnode-id="8552" style="color: #0b5394;"><b data-dcnode-id="8553"><span data-dcnode-id="8554" instrument_node="">‘To be in a pickle’</span></b></span><span data-dcnode-id="8551" instrument_node=""> refers to a person being in a difficult situation. This situation is challenging to get out of, like a pickle in a pickle jar. The term can also mean that a person is drunk and mixed up.</span><br data-dcnode-id="8550"><span data-dcnode-id="8549" instrument_node="">&nbsp;</span></span></span><br data-dcnode-id="8546"><span data-dcnode-id="8545" instrument_node="">
</span><span data-dcnode-id="8540" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8541" style="font-size: small;"><b data-dcnode-id="8543"><span data-dcnode-id="8544" instrument_node="">Origin:</span></b><span data-dcnode-id="8542" instrument_node=""> A pickle is a preserved vegetable. Usually the vegetable is put in a jar with vinegar, salt, herbs and spices. In Dutch this preservative mixture is called “pekel.” So, the person is like a pickle in a jar, being mixed up with other ingredients.</span></span></span><br data-dcnode-id="8539"><span data-dcnode-id="8538" instrument_node="">

</span><a data-dcnode-id="8402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giphy.com/gifs/tyler-seguin-pk-subban-kevin-bieksa-7l5Dmg3aU30xq"></a><br data-dcnode-id="8401"><span data-dcnode-id="8400" instrument_node="">

</span><span data-dcnode-id="8397" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8398" instrument_node="">For a very long time, indefinite amount of time; forever.&nbsp;</span></span><br data-dcnode-id="8396"><span data-dcnode-id="8395" instrument_node="">
</span><span data-dcnode-id="8367" style="font-family: &quot;verdana&quot; , sans-serif;"><br data-dcnode-id="8394"><span data-dcnode-id="8393" instrument_node="">If you say that you can do something </span><span data-dcnode-id="8390" style="color: #0b5394;"><b data-dcnode-id="8391"><span data-dcnode-id="8392" instrument_node="">until the cows come home</span></b></span><span data-dcnode-id="8389" instrument_node="">, you mean that you can do it for a very long time. </span><br data-dcnode-id="8388"><br data-dcnode-id="8387"><span data-dcnode-id="8386" instrument_node="">#1 - My girlfriend was talking on the phone with her sister </span><span data-dcnode-id="8383" style="color: #0b5394;"><b data-dcnode-id="8384"><span data-dcnode-id="8385" instrument_node="">until the cows came </span></b></span><span data-dcnode-id="8382" instrument_node="">home last night! </span><br data-dcnode-id="8381"><br data-dcnode-id="8380"><span data-dcnode-id="8379" instrument_node="">#2 - They could argue </span><b data-dcnode-id="8376"><span data-dcnode-id="8377" style="color: #0b5394;"><span data-dcnode-id="8378" instrument_node="">till the cows come</span></span></b><span data-dcnode-id="8375" instrument_node=""> home and still not reach an agreement. </span><br data-dcnode-id="8374"><br data-dcnode-id="8373"><span data-dcnode-id="8372" instrument_node="">#3 - You can keep talking </span><span data-dcnode-id="8369" style="color: #0b5394;"><b data-dcnode-id="8370"><span data-dcnode-id="8371" instrument_node="">till the cows come home</span></b></span><span data-dcnode-id="8368" instrument_node="">, but you'll never persuade me to go with you!&nbsp;</span></span><br data-dcnode-id="8366"><span data-dcnode-id="8365" instrument_node="">

</span><a data-dcnode-id="8246" name="8815523334381628651"></a><span data-dcnode-id="8245" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="8240" itemprop="name"><span data-dcnode-id="8244" instrument_node="">
</span><a data-dcnode-id="8242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//idioms.languagesystems.edu/2019/11/a-bit-of-stretch_5.html"><span data-dcnode-id="8243" instrument_node="">a (bit of a) stretch</span></a><span data-dcnode-id="8241" instrument_node="">
</span></h3><span data-dcnode-id="8239" instrument_node="">
</span><div class="post-header" data-dcnode-id="8235"><span data-dcnode-id="8238" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="8237"></div><span data-dcnode-id="8236" instrument_node="">
</span></div><span data-dcnode-id="8234" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="8097" id="post-body-8815523334381628651" itemprop="description articleBody"><span data-dcnode-id="8233" instrument_node="">
</span><div data-dcnode-id="8101" dir="ltr" style="text-align: left;" trbidi="on"><span data-dcnode-id="8232" instrument_node="">
</span><div data-dcnode-id="8229" style="height: 0; padding-bottom: 56%; position: relative; width: 100%;"><span data-dcnode-id="8231" instrument_node="">
</span><iframe allowfullscreen="" class="giphy-embed" data-dcnode-id="8230" frameborder="0" height="100%" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giphy.com/embed/c5kBM6ijg8kEw&amp;raw" style="position: absolute;" width="100%"></iframe></div><span data-dcnode-id="8228" instrument_node="">
</span><a data-dcnode-id="8227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giphy.com/gifs/black-rebecca-c5kBM6ijg8kEw"></a><br data-dcnode-id="8226"><span data-dcnode-id="8225" instrument_node="">
</span><div data-dcnode-id="8103" dir="ltr" style="text-align: left;" trbidi="on"><span data-dcnode-id="8224" instrument_node="">
</span><div data-dcnode-id="8105" dir="ltr" style="text-align: left;" trbidi="on"><span data-dcnode-id="8223" instrument_node="">
</span><span data-dcnode-id="8149" style="font-family: &quot;verdana&quot; , sans-serif;"><b data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">Example 1 </span></b><span data-dcnode-id="8220" instrument_node="">- 2 friends talking on a Monday morning</span><br data-dcnode-id="8219"><b data-dcnode-id="8217"><span data-dcnode-id="8218" instrument_node="">Tony:</span></b><span data-dcnode-id="8216" instrument_node=""> What's up, Milly? How was your weekend?</span><br data-dcnode-id="8215"><b data-dcnode-id="8213"><span data-dcnode-id="8214" instrument_node="">Milly:</span></b><span data-dcnode-id="8212" instrument_node=""> It was crazy! You'll never believe it.</span><br data-dcnode-id="8211"><b data-dcnode-id="8209"><span data-dcnode-id="8210" instrument_node="">Tony:</span></b><span data-dcnode-id="8208" instrument_node=""> Wow, sounds so interesting! Tell me about it...</span><br data-dcnode-id="8207"><b data-dcnode-id="8205"><span data-dcnode-id="8206" instrument_node="">Milly:</span></b><span data-dcnode-id="8204" instrument_node="">
 Well, we had a birthday party for my roommate. We had over 80 people in
 our apartment! The party went on until 4 in the morning!</span><br data-dcnode-id="8203"><b data-dcnode-id="8201"><span data-dcnode-id="8202" instrument_node="">Tony:</span></b><span data-dcnode-id="8200" instrument_node=""> Hmm, well I've been to your apartment before and I know how small it is. 80 people you say? </span><span data-dcnode-id="8197" style="color: #0b5394;"><b data-dcnode-id="8198"><span data-dcnode-id="8199" instrument_node="">That's a stretch</span></b></span><span data-dcnode-id="8196" instrument_node="">!
 I doubt you had barely 30 people. Any more than that, the neighbors 
would complain and the police would have been called! You're totally 
exaggerating!</span><br data-dcnode-id="8195"><br data-dcnode-id="8194"><b data-dcnode-id="8192"><span data-dcnode-id="8193" instrument_node="">Example 2 </span></b><span data-dcnode-id="8191" instrument_node="">- 2 friends talking about plans for the summer</span><br data-dcnode-id="8190"><b data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">Frank:</span></b><span data-dcnode-id="8187" instrument_node=""> I don't think I'll be able to take any vacations for at least 5 years!</span><br data-dcnode-id="8186"><b data-dcnode-id="8184"><span data-dcnode-id="8185" instrument_node="">Monica:</span></b><span data-dcnode-id="8183" instrument_node=""> Why not? Surely you can take a weekend to San Diego or somewhere else nearby. What's the issue?</span><br data-dcnode-id="8182"><b data-dcnode-id="8180"><span data-dcnode-id="8181" instrument_node="">Frank:</span></b><span data-dcnode-id="8179" instrument_node=""> Well, for sure I will lose most of my paycheck to taxes. I don't have enough left at the end of the month for anything fun. </span><br data-dcnode-id="8178"><b data-dcnode-id="8176"><span data-dcnode-id="8177" instrument_node="">Monica:</span></b><span data-dcnode-id="8175" instrument_node=""> Oh, Frank! </span><span data-dcnode-id="8172" style="color: #0b5394;"><b data-dcnode-id="8173"><span data-dcnode-id="8174" instrument_node="">That's a bit of a stretch</span></b></span><span data-dcnode-id="8171" instrument_node="">!
 I know taxes are a pain, but to say most of our money goes to taxes is 
an exaggeration! Let me show you some cool apps on the iPhone for money 
management....</span><br data-dcnode-id="8170"><br data-dcnode-id="8169"><b data-dcnode-id="8167"><span data-dcnode-id="8168" instrument_node="">Explanation</span></b><br data-dcnode-id="8166"><span data-dcnode-id="8163" style="color: #0b5394;"><b data-dcnode-id="8164"><span data-dcnode-id="8165" instrument_node="">a (bit of a) stretch</span></b></span><span data-dcnode-id="8162" instrument_node=""> =&nbsp; an exaggeration</span><br data-dcnode-id="8161"><span data-dcnode-id="8160" instrument_node="">The speaker is "</span><span data-dcnode-id="8157" style="color: #0b5394;"><b data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">stretching the truth</span></b></span><span data-dcnode-id="8156" instrument_node="">"</span><br data-dcnode-id="8155"><br data-dcnode-id="8154"><span data-dcnode-id="8153" instrument_node="">In </span><b data-dcnode-id="8151"><span data-dcnode-id="8152" instrument_node="">Example 1</span></b><span data-dcnode-id="8150" instrument_node="">,
 Milly claims to have had over 80 people in her apartment for a 
late-night party. Tony knows that Milly is likely exaggerating because 
her apartment is small. He tells her, "That's a stretch!" Which is the 
same as saying "That's an exaggeration!"</span></span><br data-dcnode-id="8148"><span data-dcnode-id="8147" instrument_node="">
</span><span data-dcnode-id="8128" style="font-family: &quot;verdana&quot; , sans-serif;"><br data-dcnode-id="8146"><span data-dcnode-id="8145" instrument_node="">In </span><b data-dcnode-id="8143"><span data-dcnode-id="8144" instrument_node="">Example 2</span></b><span data-dcnode-id="8142" instrument_node="">,
 Frank is claiming to lose most of his money to taxes each month. Monica
 says he's slightly exaggerating. The word "most" generally refers to 
quantities of 50% or higher. </span><br data-dcnode-id="8141"><br data-dcnode-id="8140"><span data-dcnode-id="8139" instrument_node="">This expression is most often used 
with that's (that is contracted). Use a bit of a&nbsp; when it's not a huge 
exaggeration as in Example 2. </span><br data-dcnode-id="8138"><br data-dcnode-id="8137"><b data-dcnode-id="8135"><span data-dcnode-id="8136" instrument_node="">More examples:</span></b><br data-dcnode-id="8134"><span data-dcnode-id="8133" instrument_node="">"I haven't slept at all in a whole week!"&nbsp;&nbsp; "</span><span data-dcnode-id="8130" style="color: #0b5394;"><b data-dcnode-id="8131"><span data-dcnode-id="8132" instrument_node="">That's a stretch</span></b></span><span data-dcnode-id="8129" instrument_node="">! I saw you taking a nap in class this morning!"</span></span><br data-dcnode-id="8127"><span data-dcnode-id="8126" instrument_node="">
</span><span data-dcnode-id="8119" style="font-family: &quot;verdana&quot; , sans-serif;"><br data-dcnode-id="8125"><span data-dcnode-id="8124" instrument_node="">"I haven't slept at all today." "</span><span data-dcnode-id="8121" style="color: #0b5394;"><b data-dcnode-id="8122"><span data-dcnode-id="8123" instrument_node="">That's a bit of a stretch</span></b></span><span data-dcnode-id="8120" instrument_node="">! I saw you taking a nap in class this morning!"&nbsp;</span></span><br data-dcnode-id="8118"><span data-dcnode-id="8117" instrument_node="">
</span><br data-dcnode-id="8116"><span data-dcnode-id="8115" instrument_node="">
</span><br data-dcnode-id="8114"><span data-dcnode-id="8113" instrument_node="">
</span><div data-dcnode-id="8107" style="text-align: center;"><span data-dcnode-id="8112" instrument_node="">
</span><a data-dcnode-id="8108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//languagesystems.edu/" target="_blank"><span data-dcnode-id="8109" style="font-size: large;"><span data-dcnode-id="8110" style="font-family: &quot;verdana&quot; , sans-serif;"><span data-dcnode-id="8111" instrument_node="">https://languagesystems.edu/ </span></span></span></a></div><span data-dcnode-id="8106" instrument_node="">
</span></div><span data-dcnode-id="8104" instrument_node="">
