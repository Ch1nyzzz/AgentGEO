      </span></li></ol></nav><span data-dcnode-id="377" instrument_node=""> </span><article data-dcnode-id="79" data-v-18de9307="" data-v-218e08a7=""><span data-dcnode-id="374" instrument_node=""> </span><section class="article-heading p-0 sm:px-0 sm:pt-0 sm:pb-5" data-dcnode-id="369" data-v-218e08a7=""><h1 class="text-black text-3.66xl sm:text-12.5xl font-normal tracking-wide sm:tracking-0.125 leading-10.5 sm:leading-14.5 m-0 px-0 pt-3.75 pb-2.5 relative sm:mt-6.25 sm:mx-0 sm:mb-0 sm:px-0 sm:pt-0 sm:pb-2.5" data-dcnode-id="372" data-v-218e08a7=""><span data-dcnode-id="373" instrument_node="">
            Examples of Filipino Idioms: 15+ Everyday Metaphors
        </span></h1><span data-dcnode-id="371" instrument_node=""> </span><div class="closing-lines border-0 border-b-1 border-offBlueGrey block height-0 relative w-full" data-dcnode-id="370" data-v-218e08a7=""></div></section><span data-dcnode-id="368" instrument_node=""> </span><section class="article-body" data-dcnode-id="365" data-v-218e08a7=""><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Idioms are some of the most difficult parts of a language for a foreigner to learn when attempting to grasp a new foreign language. Idioms are an important part of the language since they have a strong relation to the culture of the land. Learn Filipino idioms and how to use them in conversation. </span></p></section><span data-dcnode-id="364" instrument_node=""> </span><section class="article-body" data-dcnode-id="356" data-v-218e08a7=""><div class="image-block" data-dcnode-id="357" data-v-218e08a7="" image-block="true"><img alt="Filipino idiom for spouse" data-dcnode-id="363" data-v-218e08a7="" height="936" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.ltkcontent.com/images/86901/filipino-idiom_8749d84155.jpg&amp;raw" srcset="https://assets.ltkcontent.com/images/86901/filipino-idiom_8749d84155.jpg 1x" title="Filipino idiom for spouse" width="1668"><span data-dcnode-id="362" instrument_node=""> </span><span class="image-block-alt" data-dcnode-id="360" data-v-218e08a7=""><span data-dcnode-id="361" instrument_node="">
                Filipino idiom for spouse
            </span></span><span data-dcnode-id="359" instrument_node=""> </span><span class="image-block-title" data-dcnode-id="358" data-v-218e08a7=""></span></div></section><span data-dcnode-id="355" instrument_node=""> </span><section class="article-body" data-dcnode-id="345" data-v-218e08a7=""><span data-dcnode-id="353" instrument_node=""> </span><div class="advertising-container flex flex-col h-170.75 justify-start px-0 py-6.25 sm:h-83.25" data-dcnode-id="346" data-v-218e08a7=""><div class="ad-title pb-2.5 text-center" data-dcnode-id="351" data-v-218e08a7=""><span data-dcnode-id="352" instrument_node="">
                    Advertisement
                </span></div><span data-dcnode-id="350" instrument_node=""> </span><div class="advertising-component items-center flex justify-center overflow-hidden sticky sticky__in-content" data-dcnode-id="347" data-v-218e08a7="" data-v-7ca3ccd3=""><div class="ltk-revenue ltk-revenue-dt_in_content" data-dcnode-id="348" data-targeting="{&quot;category&quot;:&quot;Culture&quot;}" data-v-218e08a7="" data-v-7ca3ccd3=""><div class="htlad-YDR_Examples_Desktop_In_Content" data-dcnode-id="349" data-targeting="{&quot;placement&quot;:&quot;dt_in_content_1&quot;,&quot;position&quot;:&quot;in_content&quot;,&quot;category&quot;:&quot;Culture&quot;}"></div></div></div></div></section><section class="article-body" data-dcnode-id="326" data-v-218e08a7=""><div data-dcnode-id="329" data-v-218e08a7=""><h2 data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">What Is an Idiom?</span></h2><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">An idiom is a phrase with a different meaning from the literal meaning of the phrase. In English a few examples of idioms are:</span></p><span data-dcnode-id="340" instrument_node="">
</span><ul data-dcnode-id="333"><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Break a leg - meaning good luck or do your best</span></li><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Kick the bucket - meaning died</span></li><li data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Bull in a china shop - meaning reckless or careless</span></li></ul><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">The meaning of an idiom in the mother language and culture has a completely different meaning than the literal definition of the phrase. Every language and culture has its own set of idioms, and Filipinos have their own idioms as well.</span></p></div><span data-dcnode-id="328" instrument_node=""> </span></section><section class="article-body" data-dcnode-id="188" data-v-218e08a7=""><div data-dcnode-id="191" data-v-218e08a7=""><h2 data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Filipino Idioms From Tagalog</span></h2><p data-dcnode-id="319"><span data-dcnode-id="323" instrument_node="">Tagalog is one of the many languages spoken in the Philippines. The following are examples of Filipino idioms shown as a list of </span><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reference.yourdictionary.com/other-languages/Idioms-in-Tagalog.html"><span data-dcnode-id="322" instrument_node="">Tagalog phrases</span></a><span data-dcnode-id="320" instrument_node=""> along with the literal meaning and the colloquial meaning of each.</span></p><span data-dcnode-id="318" instrument_node="">
</span><ul data-dcnode-id="195"><li data-dcnode-id="308"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Bungang-araw</span></strong><span data-dcnode-id="315" instrument_node=""> or </span><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">sakit sa balat</span></strong><span data-dcnode-id="312" instrument_node=""> literally means </span><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">fruit of the sun</span></em><span data-dcnode-id="309" instrument_node="">. When used in conversation, the phrase means prickly heat.</span></li><li data-dcnode-id="301"><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Bungang-tulog</span></strong><span data-dcnode-id="305" instrument_node=""> is literally </span><em data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">fruit of sleep</span></em><span data-dcnode-id="302" instrument_node="">. But when used in conversation it signifies or refers to dreams.</span></li><li data-dcnode-id="294"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Buto't balat</span></strong><span data-dcnode-id="298" instrument_node=""> literally translates to </span><em data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">bones and skin</span></em><span data-dcnode-id="295" instrument_node=""> but is an idiom meaning malnourished (Skin and bones is also an American idiom for someone who is very skinny or malnourished.).</span></li><li data-dcnode-id="287"><strong data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Makapal ang bulsa</span></strong><span data-dcnode-id="291" instrument_node=""> translates to </span><em data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">thick pocket</span></em><span data-dcnode-id="288" instrument_node=""> and is used to describe a person with a lot of cash in their possession.</span></li><li data-dcnode-id="280"><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Butas ang bulsa</span></strong><span data-dcnode-id="284" instrument_node=""> is someone with no cash but literally means </span><em data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">hole in the pocket</span></em><span data-dcnode-id="281" instrument_node="">.</span></li><li data-dcnode-id="273"><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Mabigat ang kamay</span></strong><span data-dcnode-id="277" instrument_node=""> describes someone who is lazy but is literally translated as </span><em data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">heavy-handed</span></em><span data-dcnode-id="274" instrument_node="">.</span></li><li data-dcnode-id="266"><strong data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Magaan ang kamay</span></strong><span data-dcnode-id="270" instrument_node=""> literally translates to </span><em data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">light-handed</span></em><span data-dcnode-id="267" instrument_node="">. The conversational meaning is quite different. It is used to describe someone that is easily provoked and/or easily hits another person.</span></li><li data-dcnode-id="259"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Kabiyak ng dibdib</span></strong><span data-dcnode-id="263" instrument_node=""> literally means the other </span><em data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">half of the heart</span></em><span data-dcnode-id="260" instrument_node=""> but is an idiom for spouse.</span></li><li data-dcnode-id="252"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Daga sa dibdib </span></strong><span data-dcnode-id="256" instrument_node="">describes worry or fear. The literal translation is </span><em data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">mouse in the chest</span></em><span data-dcnode-id="253" instrument_node="">.</span></li><li data-dcnode-id="245"><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Bulaklak ng dila</span></strong><span data-dcnode-id="249" instrument_node=""> has a literal meaning of </span><em data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">flower of the tongue</span></em><span data-dcnode-id="246" instrument_node="">. It is used to denote exaggeration.</span></li><li data-dcnode-id="238"><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Makati ang dila</span></strong><span data-dcnode-id="242" instrument_node=""> describes a chatterbox or talkative person and is literally translated as </span><em data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">itchy tongue</span></em><span data-dcnode-id="239" instrument_node="">.</span></li><li data-dcnode-id="231"><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Maitim ang dugo</span></strong><span data-dcnode-id="235" instrument_node=""> translates as </span><em data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">dark-blooded</span></em><span data-dcnode-id="232" instrument_node=""> but, when used in a conversation, signifies an evil or bad person.</span></li><li data-dcnode-id="217"><span data-dcnode-id="230" instrument_node="">The Tagalog idiom referring to the father is </span><strong data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">haligi ng tahanan</span></strong><span data-dcnode-id="227" instrument_node=""> which translates as the </span><em data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">post of the household</span></em><span data-dcnode-id="224" instrument_node=""> and the mother is referred to as </span><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">ilaw ng tahanan</span></strong><span data-dcnode-id="221" instrument_node="">, which means</span><em data-dcnode-id="219"><span data-dcnode-id="220" instrument_node=""> light of the home</span></em><span data-dcnode-id="218" instrument_node="">.</span></li><li data-dcnode-id="210"><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Itaga sa bato</span></strong><span data-dcnode-id="214" instrument_node=""> refers to remembering forever but holds the literal translation of </span><em data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">cast in stone</span></em><span data-dcnode-id="211" instrument_node="">. This reference is an English idiom holding the same meaning.</span></li><li data-dcnode-id="203"><strong data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Matigas ang katawan</span></strong><span data-dcnode-id="207" instrument_node=""> refers to a lazy person but literally translates to </span><em data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">stiff-body</span></em><span data-dcnode-id="204" instrument_node="">.</span></li><li data-dcnode-id="196"><strong data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Makati ang paa</span></strong><span data-dcnode-id="200" instrument_node=""> translates to </span><em data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">itchy feet</span></em><span data-dcnode-id="197" instrument_node="">, describing someone that enjoys going places.</span></li></ul><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Many of the idioms make no sense when translated literally, but many have been associated with a particular trait or characteristic that may be exhibited by a person. Some of the idioms, such as the ones for spouse and father or mother are a romanticized view of the person's status. </span></p></div><span data-dcnode-id="190" instrument_node=""> </span></section><section class="article-body" data-dcnode-id="111" data-v-218e08a7=""><div data-dcnode-id="114" data-v-218e08a7=""><h2 data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Other Filipino Language Idioms</span></h2><p data-dcnode-id="181"><span data-dcnode-id="185" instrument_node="">In addition to Tagalog, you can find other languages used throughout the Philippines like Cebuano and Ilocano. Explore common Filipino idioms and expressions in these </span><a data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reference.yourdictionary.com/reference/other-languages/50-beautiful-filipino-words-and-their-meanings.html"><span data-dcnode-id="184" instrument_node="">Filipino languages</span></a><span data-dcnode-id="182" instrument_node="">. </span></p><span data-dcnode-id="180" instrument_node="">
</span><ul data-dcnode-id="115"><li data-dcnode-id="173"><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Tubig-tubiang</span></strong><span data-dcnode-id="177" instrument_node=""> literally means is </span><em data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">to have a lot of water</span></em><span data-dcnode-id="174" instrument_node="">. However, it’s used in conversation to signify someone with more money. </span></li><li data-dcnode-id="166"><strong data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Tig bitay</span></strong><span data-dcnode-id="170" instrument_node="">, which means </span><em data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">when you hang the tightest</span></em><span data-dcnode-id="167" instrument_node="">, stands for the few days before the next payday. </span></li><li data-dcnode-id="159"><strong data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Utok bolinaw</span></strong><span data-dcnode-id="163" instrument_node=""> means the </span><em data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">brains of a fish</span></em><span data-dcnode-id="160" instrument_node="">. However, it is used in conversation to suggest someone with little intelligence. </span></li><li data-dcnode-id="152"><strong data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Nawong ug tadtaran</span></strong><span data-dcnode-id="156" instrument_node=""> is an expression used for someone with a wide face. It literally means</span><em data-dcnode-id="154"><span data-dcnode-id="155" instrument_node=""> face like a cutting board</span></em><span data-dcnode-id="153" instrument_node="">. </span></li><li data-dcnode-id="145"><strong data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Hanginon</span></strong><span data-dcnode-id="149" instrument_node=""> literally means </span><em data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">to be windy</span></em><span data-dcnode-id="146" instrument_node="">. You might use this idiom for someone that is boastful. </span></li><li data-dcnode-id="138"><strong data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Ti agkutak, isu't nagitlog</span></strong><span data-dcnode-id="142" instrument_node=""> breaks down to the first one to talk is the guilty one. The literal definition is</span><em data-dcnode-id="140"><span data-dcnode-id="141" instrument_node=""> he who cracks laid the egg</span></em><span data-dcnode-id="139" instrument_node="">. </span></li><li data-dcnode-id="131"><strong data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Ti kamatis, di agbunga ti mangga</span></strong><span data-dcnode-id="135" instrument_node=""> refers to how bad families don’t make good people. The literal translation is </span><em data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">the tomato plant doesn’t grow mangos</span></em><span data-dcnode-id="132" instrument_node="">.</span></li><li data-dcnode-id="123"><span data-dcnode-id="130" instrument_node="">The phrase </span><strong data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">nalpas ti ani, awan ti garami </span></strong><span data-dcnode-id="127" instrument_node="">is used to show how you can’t undo some deeds. Literally, this phrase means </span><em data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">after the harvest, there is no hay</span></em><span data-dcnode-id="124" instrument_node="">. </span></li><li data-dcnode-id="116"><strong data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Sasaor banbannog no sabali ti aglamlamot</span></strong><span data-dcnode-id="120" instrument_node=""> means </span><em data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">useless labor if someone else eats from it</span></em><span data-dcnode-id="117" instrument_node="">. This phrase is used when a person gets rewards for another’s work. </span></li></ul></div><span data-dcnode-id="113" instrument_node=""> </span></section><section class="article-body" data-dcnode-id="101" data-v-218e08a7=""><span data-dcnode-id="109" instrument_node=""> </span><div class="advertising-container flex flex-col h-170.75 justify-start px-0 py-6.25 sm:h-83.25" data-dcnode-id="102" data-v-218e08a7=""><div class="ad-title pb-2.5 text-center" data-dcnode-id="107" data-v-218e08a7=""><span data-dcnode-id="108" instrument_node="">

cnode-id="86" data-v-218e08a7=""><a class="text-base text-black hover:text-blue-800 focus:text-blue-dark underline visited:text-purple" data-dcnode-id="87" data-v-218e08a7="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yourdictionary.com/member/1975~jennifer-betts"><span data-dcnode-id="88" instrument_node="">
                Jennifer Betts
