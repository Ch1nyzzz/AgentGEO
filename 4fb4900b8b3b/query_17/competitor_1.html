When you socialize with French people, you’ll hear French idioms and expressions that you’ve never heard before. I will share my favorite ones with you. The French idioms I picked are commonly used, so go ahead and try incorporating them in your conversations.</span></p><div class="wp-container-1 wp-block-group" data-dcnode-id="1361"><div class="wp-block-group__inner-container" data-dcnode-id="1362"><h2 data-dcnode-id="1384" id="appeler-un-chat-un-chat"><span data-dcnode-id="1385" instrument_node="">Appeler un chat un chat</span></h2><p data-dcnode-id="1380"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">meaning</span></strong><span data-dcnode-id="1381" instrument_node="">: to be blunt</span></p><p data-dcnode-id="1376"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">literal translation</span></strong><span data-dcnode-id="1377" instrument_node="">: to call a cat a cat</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1367"><p data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node="">Elle n’a pas peur d’</span><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">appeler un chat un chat</span></strong><span data-dcnode-id="1372" instrument_node="">.</span></p><cite data-dcnode-id="1368"><em data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">She is blunt.</span></em></cite></blockquote><p data-dcnode-id="1363"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">English expression</span></strong><span data-dcnode-id="1364" instrument_node="">: to call a spade a spade</span></p></div></div><div class="wp-container-2 wp-block-group" data-dcnode-id="1333"><div class="wp-block-group__inner-container" data-dcnode-id="1334"><h2 data-dcnode-id="1359" id="avaler-la-pilule"><span data-dcnode-id="1360" instrument_node="">Avaler la pilule</span></h2><p data-dcnode-id="1355"><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">meaning</span></strong><span data-dcnode-id="1356" instrument_node="">: to accept something unpleasant</span></p><p data-dcnode-id="1351"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">literal translation</span></strong><span data-dcnode-id="1352" instrument_node="">: to swallow the pill</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1339"><p data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node="">Il l’a quittée sans prévenir et elle a du mal à </span><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">avaler la pilule</span></strong><span data-dcnode-id="1347" instrument_node="">.</span></p><cite data-dcnode-id="1340"><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">He left her unexpectedly</span></em><span data-dcnode-id="1343" instrument_node=""> </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">and she’s having a hard time dealing with it .</span></em></cite></blockquote><p data-dcnode-id="1335"><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">English expression</span></strong><span data-dcnode-id="1336" instrument_node="">: to deal with something</span></p></div></div><div class="wp-container-3 wp-block-group" data-dcnode-id="1309"><div class="wp-block-group__inner-container" data-dcnode-id="1310"><h2 data-dcnode-id="1331" id="une-fois-n-est-pas-coutume"><span data-dcnode-id="1332" instrument_node="">Une fois n’est pas coutume</span></h2><p data-dcnode-id="1327"><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">meaning</span></strong><span data-dcnode-id="1328" instrument_node="">: contrary to what is usual, for once</span></p><p data-dcnode-id="1323"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">literal translation</span></strong><span data-dcnode-id="1324" instrument_node="">: once is not a custom</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1315"><p data-dcnode-id="1319"><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Une fois n’est pas coutume</span></strong><span data-dcnode-id="1320" instrument_node="">, je vais commencer le repas par le dessert.</span></p><cite data-dcnode-id="1316"><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">For once, I’ll eat dessert first.</span></em></cite></blockquote><p data-dcnode-id="1311"><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">English expression</span></strong><span data-dcnode-id="1312" instrument_node="">: once in a blue moon</span></p></div></div><div class="wp-container-4 wp-block-group" data-dcnode-id="1284"><div class="wp-block-group__inner-container" data-dcnode-id="1285"><h2 data-dcnode-id="1307" id="ne-pas-avoir-froid-aux-yeux"><span data-dcnode-id="1308" instrument_node="">Ne pas avoir froid aux yeux</span></h2><p data-dcnode-id="1303"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">meaning</span></strong><span data-dcnode-id="1304" instrument_node="">: to be fearless, audacious</span></p><p data-dcnode-id="1299"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">literal translation</span></strong><span data-dcnode-id="1300" instrument_node="">: to not be cold in the eyes</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1290"><p data-dcnode-id="1294"><span data-dcnode-id="1298" instrument_node="">Elle n’</span><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">a pas froid aux yeux</span></strong><span data-dcnode-id="1295" instrument_node=""> quand il s’agit de demander une augmentation.</span></p><cite data-dcnode-id="1291"><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">She is fearless when it comes to asking for a raise.</span></em></cite></blockquote><p data-dcnode-id="1286"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">English expression</span></strong><span data-dcnode-id="1287" instrument_node="">: to not be fazed</span></p></div></div><div class="wp-container-5 wp-block-group" data-dcnode-id="1259"><div class="wp-block-group__inner-container" data-dcnode-id="1260"><h2 data-dcnode-id="1282" id="faire-des-pieds-et-des-mains"><span data-dcnode-id="1283" instrument_node="">Faire des pieds et des mains</span></h2><p data-dcnode-id="1278"><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">meaning</span></strong><span data-dcnode-id="1279" instrument_node="">: to do everything possible</span></p><p data-dcnode-id="1274"><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">literal translation</span></strong><span data-dcnode-id="1275" instrument_node="">: to do feet and hands</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1265"><p data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">Il a </span><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">fait des pieds et des mains</span></strong><span data-dcnode-id="1270" instrument_node=""> pour obtenir un rendez-vous.</span></p><cite data-dcnode-id="1266"><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">He did all he could to get an appointment.</span></em></cite></blockquote><p data-dcnode-id="1261"><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">English expression</span></strong><span data-dcnode-id="1262" instrument_node="">: to bend over backwards</span></p></div></div><div class="wp-container-6 wp-block-group" data-dcnode-id="1234"><div class="wp-block-group__inner-container" data-dcnode-id="1235"><h2 data-dcnode-id="1257" id="dire-a-quelqu-un-ses-quatre-verites"><span data-dcnode-id="1258" instrument_node="">Dire à quelqu’un ses quatre vérités</span></h2><p data-dcnode-id="1253"><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">meaning</span></strong><span data-dcnode-id="1254" instrument_node="">: to tell someone his flaws</span></p><p data-dcnode-id="1249"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">literal translation</span></strong><span data-dcnode-id="1250" instrument_node="">: to tell someone his Four truths</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1240"><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">Elle lui a </span><strong data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">dit ses quatre vérités</span></strong><span data-dcnode-id="1245" instrument_node=""> et puis elle est partie.</span></p><cite data-dcnode-id="1241"><em data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">She told him everything she hates about him and then she left.</span></em></cite></blockquote><p data-dcnode-id="1236"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">English expression</span></strong><span data-dcnode-id="1237" instrument_node="">: to give someone a piece of your mind</span></p></div></div><div class="wp-container-7 wp-block-group" data-dcnode-id="1206"><div class="wp-block-group__inner-container" data-dcnode-id="1207"><h2 data-dcnode-id="1232" id="poser-un-lapin"><span data-dcnode-id="1233" instrument_node="">Poser un lapin</span></h2><p data-dcnode-id="1228"><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">meaning</span></strong><span data-dcnode-id="1229" instrument_node="">: to stand up someone</span></p><p data-dcnode-id="1224"><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">literal translation</span></strong><span data-dcnode-id="1225" instrument_node="">: to drop off a rabbit</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1215"><p data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">On avait rendez-vous à 11h du matin devant la mairie mais il m’a </span><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">posé un lapin</span></strong><span data-dcnode-id="1220" instrument_node="">.</span></p><cite data-dcnode-id="1216"><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">We were supposed to meet at 11am in front of city hall but he stood me up.</span></em></cite></blockquote><p data-dcnode-id="1208"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">English expression</span></strong><span data-dcnode-id="1212" instrument_node="">: </span><a data-dcnode-id="1210" href="#respond"><span data-dcnode-id="1211" instrument_node="">leave a comment</span></a><span data-dcnode-id="1209" instrument_node=""> if you have a suggestion as I cannot think of one. Thanks!</span></p></div></div><div class="wp-container-8 wp-block-group" data-dcnode-id="1177"><div class="wp-block-group__inner-container" data-dcnode-id="1178"><h2 data-dcnode-id="1201" id="mettre-la-charrue-avant-les-boeufs"><span data-dcnode-id="1205" instrument_node="">Mettre la charrue avant les b</span><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">œ</span></strong><span data-dcnode-id="1202" instrument_node="">ufs</span></h2><p data-dcnode-id="1197"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">meaning</span></strong><span data-dcnode-id="1198" instrument_node="">: to do things in the wrong order</span></p><p data-dcnode-id="1193"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">literal translation</span></strong><span data-dcnode-id="1194" instrument_node="">: to put the plow before the oxen</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1183"><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">Ne mets pas</span><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node=""> la charrue avant les bœufs</span></strong><span data-dcnode-id="1189" instrument_node=""> et commence par gagner de l’argent avant de rêver à ta future maison!</span></p><cite data-dcnode-id="1184"><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Start by making money before fantasizing about purchasing a new house</span></em><span data-dcnode-id="1185" instrument_node="">!</span></cite></blockquote><p data-dcnode-id="1179"><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">English expression</span></strong><span data-dcnode-id="1180" instrument_node="">: to put the cart before the horse</span></p></div></div><div class="wp-container-9 wp-block-group" data-dcnode-id="1152"><div class="wp-block-group__inner-container" data-dcnode-id="1153"><h2 data-dcnode-id="1175" id="prendre-ses-jambes-a-son-cou"><span data-dcnode-id="1176" instrument_node="">Prendre ses jambes à son cou</span></h2><p data-dcnode-id="1171"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">meaning</span></strong><span data-dcnode-id="1172" instrument_node="">: to flee</span></p><p data-dcnode-id="1167"><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">literal translation</span></strong><span data-dcnode-id="1168" instrument_node="">: to take his legs to his neck</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1158"><p data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">Je n’ai pas cherché à comprendre, j’ai </span><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">pris mes jambes à mon cou</span></strong><span data-dcnode-id="1163" instrument_node="">.</span></p><cite data-dcnode-id="1159"><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">I didn’t try to figure it out, I immediately fled the scene.</span></em></cite></blockquote><p data-dcnode-id="1154"><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">English expression</span></strong><span data-dcnode-id="1155" instrument_node="">: to run like a bat out of hell</span></p></div></div><div class="wp-container-10 wp-block-group" data-dcnode-id="1124"><div class="wp-block-group__inner-container" data-dcnode-id="1125"><h2 data-dcnode-id="1150" id="avoir-un-caractere-de-cochon"><span data-dcnode-id="1151" instrument_node="">Avoir un caractère de cochon</span></h2><p data-dcnode-id="1146"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">meaning</span></strong><span data-dcnode-id="1147" instrument_node="">: to be bad-tempered</span></p><p data-dcnode-id="1142"><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">literal translation</span></strong><span data-dcnode-id="1143" instrument_node="">: to have a pig’s temper</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1130"><p data-dcnode-id="1134"><span data-dcnode-id="1141" instrument_node="">Je l’évite parce qu’il </span><strong data-dcnode-id="1136"><span data-dcnode-id="1140" instrument_node="">a un </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mafrenchlife.com/french-false-friends/%23caractere" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1139" instrument_node="">caractère</span></a><span data-dcnode-id="1137" instrument_node=""> de cochon</span></strong><span data-dcnode-id="1135" instrument_node="">.</span></p><cite data-dcnode-id="1131"><em data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">I am avoiding him because he is bad-tempered.</span></em></cite></blockquote><p data-dcnode-id="1126"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">English expression</span></strong><span data-dcnode-id="1127" instrument_node="">: to be pig-headed</span></p></div></div><div class="wp-container-11 wp-block-group" data-dcnode-id="1099"><div class="wp-block-group__inner-container" data-dcnode-id="1100"><h2 data-dcnode-id="1122" id="avoir-les-yeux-plus-gros-que-le-ventre"><span data-dcnode-id="1123" instrument_node="">Avoir les yeux plus gros que le ventre</span></h2><p data-dcnode-id="1118"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">meaning</span></strong><span data-dcnode-id="1119" instrument_node="">: to overestimate what you can eat or what you can do</span></p><p data-dcnode-id="1114"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">literal translation</span></strong><span data-dcnode-id="1115" instrument_node="">: to have eyes bigger than your belly</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1105"><p data-dcnode-id="1109"><span data-dcnode-id="1113" instrument_node="">Elle ne finit jamais son assiette parce qu’elle </span><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">a les yeux plus gros que le ventre</span></strong><span data-dcnode-id="1110" instrument_node="">.</span></p><cite data-dcnode-id="1106"><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">She never finishes her plate because she takes too much food.</span></em></cite></blockquote><p data-dcnode-id="1101"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">English expression</span></strong><span data-dcnode-id="1102" instrument_node="">: to bite off more than one can chew or to have eyes bigger than your stomach.</span></p></div></div><div class="wp-container-12 wp-block-group" data-dcnode-id="1074"><div class="wp-block-group__inner-container" data-dcnode-id="1075"><h2 data-dcnode-id="1097" id="prendre-son-mal-en-patience"><span data-dcnode-id="1098" instrument_node="">Prendre son mal en patience</span></h2><p data-dcnode-id="1093"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">meaning</span></strong><span data-dcnode-id="1094" instrument_node="">: to accept something unpleasant with resignation</span></p><p data-dcnode-id="1089"><strong data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">literal translation</span></strong><span data-dcnode-id="1090" instrument_node="">: to take the bad with patience</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1080"><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">Il y avait deux heures d’attente alors je me suis assise et j’</span><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">ai pris mon mal en patience</span></strong><span data-dcnode-id="1085" instrument_node="">.</span></p><cite data-dcnode-id="1081"><em data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">There was a two-hour wait so I sat down and waited patiently.</span></em></cite></blockquote><p data-dcnode-id="1076"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">English expression</span></strong><span data-dcnode-id="1077" instrument_node="">: to suck it up</span></p></div></div><div class="wp-container-13 wp-block-group" data-dcnode-id="1049"><div class="wp-block-group__inner-container" data-dcnode-id="1050"><h2 data-dcnode-id="1072" id="avoir-la-tete-sur-les-epaules"><span data-dcnode-id="1073" instrument_node="">Avoir la tête sur les épaules</span></h2><p data-dcnode-id="1068"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">meaning</span></strong><span data-dcnode-id="1069" instrument_node="">: to be well-balanced, reasonable</span></p><p data-dcnode-id="1064"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">literal translation</span></strong><span data-dcnode-id="1065" instrument_node="">: to have your head on your shoulders</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1055"><p data-dcnode-id="1059"><span data-dcnode-id="1063" instrument_node="">Je peux compter sur lui, il </span><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">a la tête sur les épaules</span></strong><span data-dcnode-id="1060" instrument_node="">.</span></p><cite data-dcnode-id="1056"><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">I can count on him, he is well-balanced.</span></em></cite></blockquote><p data-dcnode-id="1051"><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">English expression</span></strong><span data-dcnode-id="1052" instrument_node="">: to have a good head on your shoulders</span></p></div></div><div class="wp-container-14 wp-block-group" data-dcnode-id="1024"><div class="wp-block-group__inner-container" data-dcnode-id="1025"><h2 data-dcnode-id="1047" id="donner-froid-dans-le-dos"><span data-dcnode-id="1048" instrument_node="">Donner froid dans le dos</span></h2><p data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">meaning</span></strong><span data-dcnode-id="1044" instrument_node="">: to scare</span></p><p data-dcnode-id="1039"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">literal translation</span></strong><span data-dcnode-id="1040" instrument_node="">: to make you feel cold in your back</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1030"><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">J’ai vu un film sur le réchauffement climatique et ça m’a </span><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">donné froid dans le dos</span></strong><span data-dcnode-id="1035" instrument_node="">.</span></p><cite data-dcnode-id="1031"><em data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">I watched a movie on global warming and it was very scary.</span></em></cite></blockquote><p data-dcnode-id="1026"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">English expression</span></strong><span data-dcnode-id="1027" instrument_node="">: to make someone’s blood run cold</span></p></div></div><div class="wp-container-15 wp-block-group" data-dcnode-id="999"><div class="wp-block-group__inner-container" data-dcnode-id="1000"><h2 data-dcnode-id="1022" id="perdre-son-sang-froid"><span data-dcnode-id="1023" instrument_node="">Perdre son sang froid</span></h2><p data-dcnode-id="1018"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">meaning</span></strong><span data-dcnode-id="1019" instrument_node="">: to lose it</span></p><p data-dcnode-id="1014"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">literal translation</span></strong><span data-dcnode-id="1015" instrument_node="">: to lose your cold blood</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="1005"><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">Il a </span><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">perdu son sang froid</span></strong><span data-dcnode-id="1010" instrument_node=""> et il s’est mis à crier.</span></p><cite data-dcnode-id="1006"><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">He lost his cool and started yelling.</span></em></cite></blockquote><p data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">English expression</span></strong><span data-dcnode-id="1002" instrument_node="">: to lose your cool</span></p></div></div><div class="wp-container-16 wp-block-group" data-dcnode-id="977"><div class="wp-block-group__inner-container" data-dcnode-id="978"><h2 data-dcnode-id="997" id="casser-sa-pipe"><span data-dcnode-id="998" instrument_node="">Casser sa pipe</span></h2><p data-dcnode-id="993"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">meaning</span></strong><span data-dcnode-id="994" instrument_node="">: to die</span></p><p data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">literal translation</span></strong><span data-dcnode-id="990" instrument_node="">: to break your tobacco pipe</span></p><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="983"><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Il a cassé sa pipe à l’âge de 90 ans.</span></p><cite data-dcnode-id="984"><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">He died at 90.</span></em></cite></blockquote><p data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">English expression</span></strong><span data-dcnode-id="980" instrument_node="">: to cash in one’s chips</span></p></div></div><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">I will add some more French expressions to this article as I think about good ones. Please leave me your suggestions in the comment section below.</span></p></div><footer aria-label="Entry meta" class="entry-meta" data-dcnode-id="938"><span data-dcnode-id="973" instrument_node="">
