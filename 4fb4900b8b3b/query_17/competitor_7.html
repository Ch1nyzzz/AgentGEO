-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Dr8T84ais8Y" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div></div></div><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="924"><div class="et_pb_text_inner" data-dcnode-id="925"><h3 data-dcnode-id="991"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Lesson Summary&nbsp;</span></strong></h3><p data-dcnode-id="985"><span data-dcnode-id="990" instrument_node="">Ready for 18 everyday English idioms to Describe Feelings &amp; Emotions? I made you a workbook to help you study! </span><img alt="👉" class="emoji" data-dcnode-id="989" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f449.svg&amp;raw"><span data-dcnode-id="988" instrument_node=""> </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.mmmenglish.com/emotionsidioms"><span data-dcnode-id="987" instrument_node="">https://learn.mmmenglish.com/emotionsidioms</span></a></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Idioms are fantastic parts of language! They are so expressive! Learning these English idioms will help you to understand more native English speakers and help your English sound more interesting and fun! Choose a few of these idioms that you *LOVE* and think about how you can use them to tell stories or share experiences.</span></p><p data-dcnode-id="957"><span data-dcnode-id="982" instrument_node="">And I'm covering a whole range of emotions in this English lesson!</span><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node=""> </span><img alt="🤗" class="emoji" data-dcnode-id="979" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f917.svg&amp;raw"><span data-dcnode-id="978" instrument_node=""> happiness x 3 idioms</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node=""> </span><img alt="😔" class="emoji" data-dcnode-id="975" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f614.svg&amp;raw"><span data-dcnode-id="974" instrument_node=""> sadness x 3 idioms</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node=""> </span><img alt="😱" class="emoji" data-dcnode-id="971" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f631.svg&amp;raw"><span data-dcnode-id="970" instrument_node=""> fear x 3 idioms</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node=""> </span><img alt="🤢" class="emoji" data-dcnode-id="967" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f922.svg&amp;raw"><span data-dcnode-id="966" instrument_node=""> disgust x 3 idioms</span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node=""> </span><img alt="😡" class="emoji" data-dcnode-id="963" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f621.svg&amp;raw"><span data-dcnode-id="962" instrument_node=""> anger x 3 idioms</span><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node=""> </span><img alt="😯" class="emoji" data-dcnode-id="959" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f62f.svg&amp;raw"><span data-dcnode-id="958" instrument_node=""> surprise x 3 idioms</span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Emotions are expressed in a range. You can be mildly happy about getting a day off work, or extremely happy about winning the lottery. These idioms are useful to express the degree of emotion. Learning them will help you express the emotional side of English – what you really feel!</span></p><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">So buckle up! Today's lesson is going to be an emotional rollercoaster (ooohhhh that was a *bonus* idiom that I've added to the workbook!).</span></p><p data-dcnode-id="946"><span data-dcnode-id="952" instrument_node="">Download the workbook with all the idioms and three different activities that will test your skills. </span><img alt="⬇️" class="emoji" data-dcnode-id="951" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b07.svg&amp;raw"><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node=""> </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.mmmenglish.com/emotionsidioms"><span data-dcnode-id="948" instrument_node="">https://learn.mmmenglish.com/emotionsidioms</span></a></p><p data-dcnode-id="930"><span data-dcnode-id="945" instrument_node="">———- TIMESTAMPS ———-</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node=""> 0:00 Introduction</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node=""> 2:03 idioms for Happiness</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node=""> 4:25 idioms for Sadness</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node=""> 6:25 idioms for Fear</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node=""> 8:14 idioms for Disgust</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node=""> 10:17 idioms for Anger</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node=""> 12:40 idioms for Surprise</span></p><p data-dcnode-id="926"><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Dr8T84ais8Y%3Ffeature%3Doembed%23section1"><span data-dcnode-id="929" instrument_node="">CLICK HERE </span></a><span data-dcnode-id="927" instrument_node="">to read the full lesson transcript.</span></p></div></div><div class="et_pb_module et_pb_divider et_pb_divider_0 et_pb_divider_position_ et_pb_space" data-dcnode-id="922"><div class="et_pb_divider_internal" data-dcnode-id="923"></div></div><div class="et_pb_module et_pb_text et_pb_text_1 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="917"><div class="et_pb_text_inner" data-dcnode-id="918"><h3 data-dcnode-id="919" style="text-align: center;"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">More English lessons recommended for you:&nbsp;</span></strong></h3></div></div></div></div><div class="et_pb_row et_pb_row_1" data-dcnode-id="896"><div class="et_pb_column et_pb_column_1_3 et_pb_column_1 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="909"><div class="et_pb_module et_pb_image et_pb_image_0 et_always_center_on_mobile" data-dcnode-id="910"><span data-dcnode-id="914" instrument_node=""> </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mmmenglish.com/2020/08/06/wealth-money-phrases/" target="_blank"><span class="et_pb_image_wrap" data-dcnode-id="912"><img alt="" data-dcnode-id="913" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mmmenglish.com/wp-content/uploads/2020/08/117150769_3049753818470785_4559758210065351266_o-1080x608.jpg&amp;raw" title="Everyday English Phrases &amp; Slang 💰 Wealth &amp; Money"></span></a></div></div><div class="et_pb_column et_pb_colum xt_align_left" data-dcnode-id="456"><div class="et_pb_text_inner" data-dcnode-id="457"><p data-dcnode-id="882"><strong data-dcnode-id="891" style="color: #333333; font-size: 22px;"><em data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Video Transcript</span></em></strong><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node=""> </span><span data-dcnode-id="884" style="color: #ffffff;"><a data-dcnode-id="888" id="section1"></a><span data-dcnode-id="887" instrument_node="">Section 1</span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node=""> </span></span><span data-dcnode-id="883" instrument_node="">Well hey there I'm Emma from mmmEnglish and today we are gonna be going over eighteen everyday conversational idioms that will help you to describe feelings and emotions. These are really useful idioms, ones that I use all the time to describe</span></p><ul data-dcnode-id="869"><li data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">sadness</span></li><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">happiness</span></li><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">fear</span></li><li data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">disgust</span></li><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">anger</span></li><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">surprise</span></li></ul><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">So that's six different emotions and for each one, there's gonna be three idioms.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">&nbsp;</span></p><p data-dcnode-id="858"><span data-dcnode-id="864" instrument_node="">Now I've got a really fun and great little challenge for you at the end so make sure you stick with me all the way through. It's gonna be an </span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">emotional roller coaster.&nbsp;</span></strong><span data-dcnode-id="861" instrument_node="">Have you heard that idiom before? It's a bonus one. I've added the meaning to it on the worksheet that I've created for you. The link is </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.mmmenglish.com/emotionsidioms"><span data-dcnode-id="860" instrument_node="">down in the description.</span></a></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">I've got all of the idioms that we're going over today with the meaning and some examples to help you know when and how to use them. Plus there's a little mini quiz to help you put everything that you learn into&nbsp;practice.</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Are you ready to get into it? Let's go!</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Happy, sad, angry.</span></p><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">These are all really common adjectives that we can use to talk about our feelings in English but so common that they can sort of feel a little dull especially if they're the only adjectives that you use to talk&nbsp;about these feelings.</span></p><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">But to be totally honest, these words actually describe a really wide range of emotions because we can say: I'm really happy that I get to finish work early tonight or I'm really happy I just won a trip to Italy.</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">The idioms that we're going to go through in this lesson will help you talk about that range of emotions but also help to make your English more interesting, more fun, more meaningful.</span></p><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">&nbsp;</span></p><p data-dcnode-id="829"><em data-dcnode-id="840"><span data-dcnode-id="843" instrument_node="">Thanks very much. Bye!</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node=""> </span></em><em data-dcnode-id="836"><span data-dcnode-id="839" instrument_node="">Oh my gosh, I just got&nbsp;the promotion at work.</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node=""> </span></em><em data-dcnode-id="832"><span data-dcnode-id="835" instrument_node="">Emma, that's fantastic!</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node=""> </span></em><em data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">You must be over the moon!</span></em></p><h3 data-dcnode-id="826"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">over the moon</span></strong></h3><p data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Over the moon</span></strong><span data-dcnode-id="823" instrument_node=""> is when you are really pleased about something. You're ecstatic.</span></p><p data-dcnode-id="818"><span data-dcnode-id="821" instrument_node="">If you just won&nbsp;a trip to Italy, you would be </span><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">over the moon.</span></strong></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="813"><b data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">as happy as Larry</span></b></h3><p data-dcnode-id="804"><em data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">How was your meeting?</span></em><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node=""> </span><em data-dcnode-id="805"><span data-dcnode-id="808" instrument_node="">It was great! They gave&nbsp;me the time off so I'm </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">happy as Larry.</span></strong></em></p><p data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">Now this one is quite an Australian expression actually, I think, unless anyone's going to jump in and say that they use it too but I really love this expression, </span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">happy as Larry.</span></strong><span data-dcnode-id="800" instrument_node=""> It's kind of got that rhyming pattern in it.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">To be honest, we don't really know who Larry is but we all generally agree that he's a really happy guy so we all want to be as happy as Larry.</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">You can use it anytime you're feeling happy not crazy, crazy happy, not ecstatic but just right there in the middle.</span></p><ul data-dcnode-id="789"><li data-dcnode-id="790"><em data-dcnode-id="791"><span data-dcnode-id="794" instrument_node="">There's a public holiday coming up and I'm going away with my friends so I'm as</span><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node=""> happy as Larry.</span></strong></em></li></ul><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="784"><b data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">a happy camper</span></b></h3><ul data-dcnode-id="778"><li data-dcnode-id="779"><em data-dcnode-id="780"><span data-dcnode-id="783" instrument_node="">I had no idea that I'd enjoy my new job so much. I'm a very</span><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node=""> happy camper.</span></strong></em></li></ul><p data-dcnode-id="770"><span data-dcnode-id="777" instrument_node="">So this one is kind of similar to </span><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">‘happy as Larry'</span></strong><span data-dcnode-id="774" instrument_node="">, a happy camper indicates that you're really content, really satisfied rather than extremely happy but interestingly,</span><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node=""> ‘happy camper'</span></strong><span data-dcnode-id="771" instrument_node=""> is often used in the negative form as well.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">So for example:</span></p><ul data-dcnode-id="762"><li data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">When the company reshuffled the organisation, the team were not</span><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node=""> happy campers.</span></strong><span data-dcnode-id="764" instrument_node=""> They were unhappy.</span></li></ul><p data-dcnode-id="754"><span data-dcnode-id="761" instrument_node="">But it's really important to note that this is an exception. </span><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">‘A happy camper'</span></strong><span data-dcnode-id="758" instrument_node=""> can be used in the negative, we wouldn't use the negative form with ‘over the moon' or ‘happy as Larry'. We wouldn't say</span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node=""> I'm not as happy as Larry.&nbsp;</span></em><span data-dcnode-id="755" instrument_node="">For some reason. I don't know why.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">So remember if you want to use an idiom to describe happiness you can say:</span></p><ul data-dcnode-id="742"><li data-dcnode-id="749"><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">over the moon</span></em></li><li data-dcnode-id="746"><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">happy as Larry</span></em></li><li data-dcnode-id="743"><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">or that you're a happy camper</span></em></li></ul><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&nbsp;</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Okay let's talk about some idioms for sadness. And again, sadness can move from feeling a little down about your day to downright awful, you know feeling like life is super hard, something dramatic has happened, something awful has happened so there's some really big extremes here. We've got to be careful about how we use these idioms.</span></p><h3 data-dcnode-id="735"><b data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">a heavy heart</span></b></h3><p data-dcnode-id="731"><span data-dcnode-id="734" instrument_node="">And our first one is </span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">a heavy heart.</span></strong></p><ul data-dcnode-id="724"><li data-dcnode-id="725"><em data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">With</span><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node=""> a heavy&nbsp;heart,</span></strong><span data-dcnode-id="727" instrument_node=""> he spoke at his father's funeral.</span></em></li></ul><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Have you ever had that feeling where it seems like there's something heavy on your chest, maybe it's hard to breathe or just your heart feels heavy and that's this feeling that comes through in this idiom.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">It's a terrible feeling to experience and definitely on the more extreme side of sadness. Let's see if we can lift the mood a little.</span></p><h3 data-dcnode-id="717"><b data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">down in the dumps</span></b></h3><ul data-dcnode-id="711"><li data-dcnode-id="712"><em data-dcnode-id="713"><span data-dcnode-id="716" instrument_node="">They thought they were buying their dream house but another couple offered more for it. They've&nbsp;both been feeling </span><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">down in the dumps all week.</span></strong></em></li></ul><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">They're really sad, they're really disappointed.</span></p><h3 data-dcnode-id="706"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">bummed</span></strong></h3><p data-dcnode-id="700"><em data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">I'm&nbsp;a bit </span><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">bummed</span></strong><span data-dcnode-id="702" instrument_node=""> by missing my best friend's birthday.</span></em></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">So this just means that you're low on energy, a little disappointed, a bit sad so it's not as bad as down in the dumps and this one is definitely not as extreme as a heavy heart, right? So it's really not appropriate&nbsp;to say:</span></p><p data-dcnode-id="695"><em data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">He's a bit bummed because his friend died, right?</span></em></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">That would sound really insensitive. And&nbsp;similarly, it seems a little over the top to say:</span></p><p data-dcnode-id="690"><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">It's with a heavy heart that I tell you, I can't come to your birthday.</span></em></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">It's quite dramatic so just be wary of how and when it's appropriate&nbsp;to use these idioms.</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">&nbsp;</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Now our next emotion is fear and again fear is felt in a range. There's anxious and nervous right through to utter terror. I really hope that you haven't felt&nbsp;utter terror too often in life.</span></p><h3 data-dcnode-id="681"><b data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">scare the living daylights out of</span></b></h3><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Sometimes that can scare the living daylights out of you so this idiom describes a terrifying feeling, it's right at the top of our scale. You know when it's 3am in the morning and the phone rings randomly.</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Something must be wrong. You get worried,&nbsp;terrified.</span></p><ul data-dcnode-id="671"><li data-dcnode-id="672"><em data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">When my brother called me at 3am, it </span><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">scared the living daylights out of me.</span></strong></em></li></ul><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="666"><b data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">jumped out of my skin</span></b></h3><p data-dcnode-id="662"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">‘I jumped out of my skin'</span></strong><span data-dcnode-id="663" instrument_node=""> is a little less severe. Maybe you've just walked into a room and a sibling or a friend is jumped out from behind a wall to scare you, right? You get&nbsp;such a fright.</span></p><p data-dcnode-id="657"><em data-dcnode-id="658"><span data-dcnode-id="661" instrument_node="">I nearly </span><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">jumped out of my skin.</span></strong></em></p><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="652"><b data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">the heebie jeebies</span></b></h3><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">I quite like this next idiom too, it's used to describe a feeling of unease or discomfort, nervousness. That sound gives me the heebie jeebies. Say it, it's fun to say, heebie jeebies.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">You know when all the hairs on your arms prickle and they stand up on end, that's the heebie jeebies. So to talk about fear we have:</span></p><ul data-dcnode-id="638"><li data-dcnode-id="645"><em data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">It scared the living daylights out of me</span></em></li><li data-dcnode-id="642"><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">I jumped out of my skin</span></em></li><li data-dcnode-id="639"><em data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">I got the heebie jeebies</span></em></li></ul><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">&nbsp;</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">So our next set of idioms are about the feeling of disgust, a really strong feeling of revulsion and disapproval. And our first disgusting idiom is to make you want to vomit.</span></p><h3 data-dcnode-id="631"><b data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">(to) make (one) want to vomit</span></b></h3><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">So this is really gross, right? It is so disgusting, whatever this thing is, is so disgusting it makes you want to be sick, to throw up, to vomit. The smell was so foul it made me want to vomit. Okay, that's not really a great image so let's move along.</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Actually, this next one is not much better, it's&nbsp;just not quite as graphic.</span></p><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="622"><b data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">(to) make (one's) stomach turn</span></b></h3><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Something can make your stomach turn. I can't watch those medical shows that show you close-ups of knee and hip surgeries in the middle of an&nbsp;operation.</span></p><p data-dcnode-id="615"><em data-dcnode-id="616"><span data-dcnode-id="619" instrument_node="">They</span><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node=""> make my stomach turn.</span></strong></em></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">The thought of it sends you these feelings that your stomach sort of is twisting and turning and upside down and you feel a little ill. No thank you. I don't like that one either. Not quite as graphic as the last one but still not a pleasant feeling.</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="608"><b data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">(to) make (one's) skin crawl</span></b></h3><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Okay to make your skin crawl. This one would also fit into the fear category I think because it's that similar, uneasy uncomfortable feeling that you&nbsp;get.</span></p><ul data-dcnode-id="600"><li data-dcnode-id="601"><em data-dcnode-id="602"><span data-dcnode-id="605" instrument_node="">I remember watching a documentary on Netflix last year when they showed the picture of a serial killer and honestly he looked so scary, he</span><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node=""> made my skin crawl.</span></strong></em></li></ul><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">If you have a phobia of insects or leeches like me, spiders and bugs and things, they might make your skin crawl. The thought of spiders and snakes makes your skin crawl.</span></p><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">&nbsp;</span></p><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">All right let's leave disgust behind and move on to the next emotion anger.</span></p><ul data-dcnode-id="588"><li data-dcnode-id="589"><em data-dcnode-id="590"><span data-dcnode-id="593" instrument_node="">My neighbour had just got a new car, he pulled up onto the street out the front of our house and then got out to admire it and out of nowhere someone hit the back of the car. Oh my gosh, he </span><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">flew off the handle.</span></strong></em></li></ul><h3 data-dcnode-id="585"><b data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">(to) fly off the handle</span></b></h3><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">So this expression is used to describe someone who's really angry. If anyone is in this state, it's best to stay out of their way right?</span></p><ul data-dcnode-id="576"><li data-dcnode-id="577"><em data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">He</span><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node=""> flew off the handle</span></strong><span data-dcnode-id="579" instrument_node=""> when someone rammed into his car.</span></em></li></ul><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">Now keep in mind, it's not he flew off his handle,</span><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node=""> flew off the handle</span></strong><span data-dcnode-id="572" instrument_node="">, okay?</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="566"><b data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">(to) be up in arms</span></b></h3><p data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">To be </span><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">‘up in arms about something'</span></strong><span data-dcnode-id="562" instrument_node=""> it also describes feeling really angry but it's less aggressive than to </span><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">‘fly off the handle'</span></strong><span data-dcnode-id="559" instrument_node="">. Sounds less aggressive,&nbsp;right?</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">You think about throwing your arms up in the air, we do this when we're frustrated, we're annoyed about something, we're irritated.</span></p><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">So there's a difference, right? </span><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">‘Flying off the handle'</span></strong><span data-dcnode-id="552" instrument_node=""> is really angry but we can say she was up in arms about how messy the shared kitchen&nbsp;was.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="546"><b data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">(to) be at the end of (one's) tether</span></b></h3><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">And lastly, I'm at the end of my tether. If you've got young kids then this could be a&nbsp;really useful idiom for you.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Imagine that moment when your kids have been really naughty, really disobedient all day. You've been asking them to tidy their room, clean up all their toys all afternoon and they're not doing it and you keep hearing them yelling and screaming. It's driving you nuts, right? And then A ball breaks through the kitchen window. And you&nbsp;yell at them.</span></p><ul data-dcnode-id="536"><li data-dcnode-id="537"><em data-dcnode-id="538"><span data-dcnode-id="541" instrument_node="">I'm </span><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">at the end of my tether with you!</span></strong></em></li></ul><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">meaning you've pushed me to my limit. I'm at the end of my ability to be patient with you, I've had enough.</span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Cool so now you've got three idioms to use if someone is driving you crazy.</span></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Another idiom or maybe someone is making you really angry or annoyed or even if you're thinking about describing a situation where you felt that way, use these idioms to add flavour and colour to the way that you're describing that situation.</span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">&nbsp;</span></p><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Couldn't you believe that? I had to do a double-take there. We've already been through fifteen idioms together. Time flies when you're having fun. Before we get into our last emotion, let me know what you think about this video. Are you enjoying&nbsp;it?</span></p><p data-dcnode-id="523"><span data-dcnode-id="525" instrument_node="">Hit that subscribe button, give it a like, all of these things help me to know what&nbsp;lessons you really want to see here at mmmEnglish.</span><b data-dcnode-id="524"></b></p><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">That came out of the blue. I hope it didn't stop you dead in your tracks. I've already used all three idioms that I'm going to go through now. I wonder if you picked up on any of them?</span></p><h3 data-dcnode-id="518"><b data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">do a double-take</span></b></h3><p data-dcnode-id="511"><span data-dcnode-id="517" instrument_node="">To </span><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">do a double-take</span></strong><span data-dcnode-id="514" instrument_node=""> is to look again at something really quickly like you see it and then you go back to normal and then you suddenly think </span><em data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">oh my gosh what was that?</span></em></p><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">It's surprise, right? It's caught you by surprise and we often use it with the verb do. I</span><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node=""> did a double-take.</span></strong><span data-dcnode-id="507" instrument_node=""> I couldn't believe it and when something comes at you from out of the blue it's like it came from nowhere, it was completely&nbsp;unexpected.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="501"><b data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">out of the blue</span></b></h3><ul data-dcnode-id="495"><li data-dcnode-id="496"><em data-dcnode-id="497"><span data-dcnode-id="500" instrument_node="">They got married just a few weeks after meeting, it was completely</span><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node=""> out of the blue.</span></strong></em></li></ul><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Now this one is almost quite literal, it's when you suddenly stop moving because you're so surprised&nbsp;by something.</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="488"><b data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">stop dead in your tracks</span></b></h3><ul data-dcnode-id="481"><li data-dcnode-id="482"><em data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">She </span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">stopped dead in her tracks</span></strong><span data-dcnode-id="484" instrument_node=""> when she saw Maria. She hadn't seen her in over twenty years.</span></em></li></ul><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">So all of these idioms helped to express shock or surprise in some way. They're really great to add to stories and to make your English more interesting and exciting, right?</span></p><p data-dcnode-id="471"><em data-dcnode-id="472"><span data-dcnode-id="478" instrument_node="">I </span><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">stopped dead in my tracks</span></strong><span data-dcnode-id="475" instrument_node="">. I couldn't believe it was her. It </span><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">came out of the blue.</span></strong></em></p><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">&nbsp;</span></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Okay, so we've been through all of those different idioms. Now I've got a little challenge for you to help you put into practice what you've been learning so get your fingers ready to type. I want you to share a little story with me down in the comments.</span></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Take me on an emotional roller coaster. Tell me a story, maybe one that you've experienced, maybe it's a fictional one that you make up but tell me a story where the emotions go up, go down, go up and go down and try to use one of the idioms from each section of&nbsp;this video.</span></p><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">And don't forget to download the </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.mmmenglish.com/emotionsidioms"><span data-dcnode-id="463" instrument_node="">free workbook</span></a><span data-dcnode-id="461" instrument_node=""> that I've created for you, it's got all of the idioms from this lesson, their meanings, example sentences as well as a bonus little quiz to help you test what you learned.</span></p><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">I'm super excited about my next video coming out on the mmmEnglish Channel. I hope to see you in there. Bye for now!</span></p></div></div><div class="et_pb_module et_pb_code et_pb_code_0" data-dcnode-id="449"><div class="et_pb_code_inner" data-dcnode-id="450"><span data-dcnode-id="455" instrument_node=""> </span><a data-dcnode-id="453" data-leadbox="https://mmmenglish.lpages.co/leadbox/143a29173f72a2%3A113c33df6746dc/5715921523965952/" data-leadbox-id="143a29173f72a2:113c33df6746dc" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mmmenglish.lpages.co/leadbox/143a29173f72a2%253A113c33df6746dc/5715921523965952/" target="_blank"><img data-dcnode-id="454" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/eVE7VyWQ16Wrd4GVMWrBjFnhdOmmbHVGh7LhTDRNjIh0qZxUCGu32DFHafAJ3nr16ouWZ4HubXN6tLHzSS-YhQ%3Ds0&amp;raw"></a><span data-dcnode-id="451" instrument_node=""> </span></div></div><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="435"><div class="et_pb_text_inner" data-dcnode-id="436"><p data-dcnode-id="437"><strong data-dcnode-id="445"><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">mmmEnglish</span></em><span data-dcnode-id="446" instrument_node=""> Video Lessons</span></strong><span data-dcnode-id="444" instrument_node=""> are a series of video lessons created to build confidence in English learners and focus on English in daily life. Download them and watch them anywhere!&nbsp;</span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UCrRiVfHqBIIvSgKmgnSY66g"><span data-dcnode-id="443" instrument_node="">Subscribe to my YouTube Channel </span></a><span data-dcnode-id="441" instrument_node="">to be the first to get my new videos, and come and say hi on my </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/mmmenglish/"><span data-dcnode-id="440" instrument_node="">Facebook</span></a><span data-dcnode-id="438" instrument_node=""> page!!</span></p></div></div></div></div></div><div class="at-below-post addthis_tool" data-dcnode-id="431" data-url="https://www.mmmenglish.com/2021/11/10/idioms-to-describe-how-you-feel/"></div></div><div class="et_post_meta_wrapper" data-dcnode-id="273"><section data-dcnode-id="274" id="comment-wrap"><h1 class="page_title" data-dcnode-id="428" id="comments"><span data-dcnode-id="429" instrument_node="">4 Comments</span></h1><ol class="commentlist clearfix" data-dcnode-id="337"><li class="comment even thread-even depth-1 et-pb-non-builder-comment" data-dcnode-id="386" id="li-comment-93315"><article class="comment-body clearfix" data-dcnode-id="409" id="comment-93315"><div class="comment_avatar" data-dcnode-id="425"><span data-dcnode-id="427" instrument_node=""> </span><img alt="NAKHLI ABDELOUAHID" class="avatar avatar-80 photo" data-dcnode-id="426" height="80" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/3b06f31844eb2ffd715c76e01c6fb931%3Fs%3D80%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/3b06f31844eb2ffd715c76e01c6fb931?s=160&amp;d=mm&amp;r=g 2x" width="80"></div><div class="comment_postinfo" data-dcnode-id="418"><span data-dcnode-id="424" instrument_node=""> </span><span class="fn" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">NAKHLI ABDELOUAHID</span></span><span data-dcnode-id="421" instrument_node=""> </span><span class="comment_date" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node=""> on November 13, 20
