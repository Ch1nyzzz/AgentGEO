</span><h1 class="post-title" data-dcnode-id="546"><div data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The Interesting Origins Of 7 Common English Idioms</span></div></h1><span data-dcnode-id="545" instrument_node="">

</span><div class="byline" data-dcnode-id="528"><span data-dcnode-id="531" instrument_node="">By </span><span class="author" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Mamta Bhatt</span></span></div><span data-dcnode-id="527" instrument_node="">

</span><div class="container" data-dcnode-id="340"><span data-dcnode-id="506" instrument_node="">
</span><main class="row content-row" data-dcnode-id="381" role="main"><span data-dcnode-id="505" instrument_node="">
</span><article class="post-content" data-dcnode-id="383" itemprop="articleBody"><span data-dcnode-id="504" instrument_node="">
</span><span data-dcnode-id="501" instrument_node="">
</span><p class="dropcaps" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Ever wondered where some ever-present idioms originated from in the English language? We’ve researched the interesting origins of common English idioms and traced back their fascinating and sometimes bizarre history:</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><img alt="Interesting Origins Of Common English Idioms Always A Bridesmaid" class="lazyloaded" data-dcnode-id="497" data-src="http://i.imgur.com/MWO7I.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//i.imgur.com/MWO7I.jpg&amp;raw"><noscript data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">&lt;img src="http://i.imgur.com/MWO7I.jpg" alt="Interesting Origins Of Common English Idioms Always A Bridesmaid"&gt;</span></noscript></p><span data-dcnode-id="493" instrument_node="">
</span><h2 data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">“Always a bridesmaid, never a bride”</span></h2><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="486"><b data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Definition:</span></b><span data-dcnode-id="487" instrument_node=""> Literally, always being a bridesmaid and never a bride. More figuratively, it is a forlorn saying for women when they can’t find love.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="481"><b data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Origin:</span></b><span data-dcnode-id="482" instrument_node="">  This gem of an idiom was first recorded in a Victorian music hall tune, “Why Am I Always A Bridesmaid?”, by Fred W. Leigh. However, the phrase garnered popularity after a retrospectively hilarious ad for Listerine mouthwash in 1924. The slogan, “Often a bridesmaid, but never a bride”, accompanied a picture of a forlorn ‘Edna’, who, because of her halitosis (bad breath), was never being able to find love. The solution: buying Listerine mouthwash in bulk.</span></p><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">The Interesting Origins Of Common English Idioms: “Pull someone’s leg”</span></h2><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="473"><b data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Definition:</span></b><span data-dcnode-id="474" instrument_node=""> Joking or fooling with someone.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="468"><b data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Origin:</span></b><span data-dcnode-id="469" instrument_node=""> To pull someone’s leg had much more sinister overtones when it first came in use. It was originally a method used by thieves to entrap their pedestrians and subsequently rob them. One thief would be assigned ‘tripper up’ duty, and would use different instruments to knock the person to the ground. Luckily, these days the saying is much more friendlier, though being on the end of a joke might not always be fun.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="463"><img alt="Interesting Origins Of Common English Idioms Meeting a Deadline" class="lazyloaded" data-dcnode-id="466" data-src="http://i.imgur.com/yOOuc.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//i.imgur.com/yOOuc.jpg&amp;raw"><noscript data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">&lt;img src="http://i.imgur.com/yOOuc.jpg" alt="Interesting Origins Of Common English Idioms Meeting a Deadline"&gt;</span></noscript></p><span data-dcnode-id="462" instrument_node="">
</span><h2 data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">“Meeting a deadline”</span></h2><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="455"><b data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Definition:</span></b><span data-dcnode-id="456" instrument_node=""> To finish something by a predetermined time.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="450"><b data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Origin:</span></b><span data-dcnode-id="451" instrument_node=""> This saying apparently stems from the prison camps during the Civil War, where a line was drawn to demarcate the boundaries for the prisoners. The line became to be known as a deadline because any prisoner who attempted to cross it was shot.</span></p><span data-dcnode-id="449" instrument_node="">
</span><h2 data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">The Interesting Origins Of Common English Idioms: “Basket Case”</span></h2><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="442"><b data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Definition:</span></b><span data-dcnode-id="443" instrument_node=""> Someone who is unhinged.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="437"><b data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Origin:</span></b><span data-dcnode-id="438" instrument_node=""> According to undetermined reports, WW1 soldiers who had lost all their limbs were carried around in baskets. The actual term, ‘basket case’, however was coined by the US military – in denial of this practice – after WW1. In 1919, a bulletin was issued by the U.S. Command on Public Information, making use of the phrase:</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">“The Surgeon General of the Army … denies … that there is any foundation for the stories that have been circulated … of the existence of ‘basket cases’ in our hospitals.” </span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="429"><img class="lazyloaded" data-dcnode-id="432" data-src="http://i.imgur.com/en7K8.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//i.imgur.com/en7K8.jpg&amp;raw"><noscript data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">&lt;img src="http://i.imgur.com/en7K8.jpg" /&gt;</span></noscript></p><span data-dcnode-id="428" instrument_node="">
</span><h2 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">The Interesting Origins Of Common English Idioms: “Close, but no cigar”</span></h2><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="421"><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Definition:</span></b><span data-dcnode-id="422" instrument_node=""> Being near success, but just missing out.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="416"><b data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Origin:</span></b><span data-dcnode-id="417" instrument_node=""> Once upon a time, fairground stalls favored gifting cigars to winners rather than overstuffed, over-sized plush toys. Needless to say, winning was nearly impossible at the rigged carnival games and thus the idiom war born. The first evidence of the saying comes from a film script for Annie Oakley in 1935, after which it was frequently used in newspaper articles.</span></p><span data-dcnode-id="415" instrument_node="">
</span><h2 data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">“Bust your balls”</span></h2><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="408"><b data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Definition:</span></b><span data-dcnode-id="409" instrument_node=""> A slang term which can refer to a form of punishment, working hard, or being harassed or teased.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="403"><b data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Origin:</span></b><span data-dcnode-id="404" instrument_node=""> Believe it or not, the term actually comes from literally busting the balls of a calf. Rather than cutting them off or chemically sterilizing them, a method was developed to literally break a calf’s testicles to turn them from a bull to a steer. Thankfully, only the figurative version is used by humans.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="398"><img alt="Origins Of Common English Idioms Bust Your Balls" class="lazyloaded" data-dcnode-id="401" data-src="http://i.imgur.com/M3toO.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//i.imgur.com/M3toO.jpg&amp;raw"><noscript data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">&lt;img src="http://i.imgur.com/M3toO.jpg" alt="Origins Of Common English Idioms Bust Your Balls"&gt;</span></noscript></p><span data-dcnode-id="397" instrument_node="">
</span><h2 data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">“Bark up the wrong tree”</span></h2><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="390"><b data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Definition:</span></b><span data-dcnode-id="391" instrument_node=""> To make the wrong choice or pursue the wrong course.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="385"><b data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Origin:</span></b><span data-dcnode-id="386" instrument_node=""> When hunting raccoons for fur was a popular sport, hunting dogs were used to sniff them out of trees. Being a nocturnal animal, the hunting party had to work at night, and the dogs would sometimes end up choosing the wrong tree, or as the idiom goes, ‘bark up the wrong tree”. The term was first printed in a book by Davy Crockett in 1833.</span></p><span data-dcnode-id="384" instrument_node="">
</span></article><span data-dcnode-id="382" instrument_node="">
</span></main><span data-dcnode-id="380" instrument_node="">
