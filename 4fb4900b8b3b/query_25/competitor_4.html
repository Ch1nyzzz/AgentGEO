</span><p class="disclaimer" data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">To keep the lights on, we receive affiliate commissions via some of our links. Rankings remain impartial.&nbsp;</span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploringlifesmysteries.com/our-review-process/"><span data-dcnode-id="795" instrument_node="">Our review process</span></a><span data-dcnode-id="793" instrument_node="">.</span></p><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="784"><img alt="Vintage Typewriter with Origins of Common Idioms" class="alignleft wp-image-2503 size-full entered lazyloaded" data-dcnode-id="788" data-lazy-src="https://www.exploringlifesmysteries.com/wp-content/uploads/origins-common-idioms-jpg.jpg" data-ll-status="loaded" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploringlifesmysteries.com/wp-content/uploads/origins-common-idioms-jpg.jpg&amp;raw" title="Origins of Common Idioms" width="325"><noscript data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">&lt;img class="alignleft wp-image-2503 size-full" title="Origins of Common Idioms" src="https://www.exploringlifesmysteries.com/wp-content/uploads/origins-common-idioms-jpg.jpg" alt="Vintage Typewriter with Origins of Common Idioms" width="325" height="200" /&gt;</span></noscript><span data-dcnode-id="785" instrument_node="">The origins of common idioms are as varied as the idioms themselves. Below we will take a look at the history of some of the world’s most popular idioms including: armed to the teeth, a backhanded compliment, to bleed like a stuck pig, blowing off steam and to chew the fat.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">What is an Idiom?</span></h2><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">An idiom is an expression or phrase that has a meaning that cannot be deduced from the expression or phrase itself. An example of this is the use of the term “chewing the fat” as a means to describe passing time. Idioms generally have culturally specific meanings.</span></p><span data-dcnode-id="777" instrument_node="">
</span><h2 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Armed to the Teeth</span></h2><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">The term </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">armed to the teeth</span></em><span data-dcnode-id="770" instrument_node=""> is used to describe someone who is heavily armed. The origin of this phrase is Port Royal Jamaica from the 1600’s and is considered a “pirate” phrase. Since many of the weapons used by pirates at this time relied upon a single shot of black powder pirates would have to carry multiple weapons to protect themselves in a fight. Commonly one of these weapons was a knife that was carried between their teeth.</span></p><span data-dcnode-id="768" instrument_node="">
</span><h2 data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">A Backhanded Compliment</span></h2><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="758"><em data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">A backhanded compliment</span></em><span data-dcnode-id="762" instrument_node=""> is a compliment that insults the recipient at the same time that it is complimenting them. The origin of this idiom comes from the fact that the term “back-handed” is synonymous with something that is left-handed. Throughout history the left side of the body has been connected with devious or sinister actions as the </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//english.stackexchange.com/questions/39092/how-did-sinister-the-latin-word-for-left-handed-get-its-current-meaning" onclick="javascript:window.open('http://english.stackexchange.com/questions/39092/how-did-sinister-the-latin-word-for-left-handed-get-its-current-meaning'); return false;" rel="noopener" title="StackExchange: Latin definition of left"><span data-dcnode-id="761" instrument_node="">Latin word for left is sinister</span></a><span data-dcnode-id="759" instrument_node="">.</span></p><span data-dcnode-id="757" instrument_node="">
</span><h2 data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">To Bleed Like a Stuck Pig</span></h2><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">The idiom </span><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">to bleed like a stuck pig</span></em><span data-dcnode-id="750" instrument_node=""> is used to refer to someone who is bleeding heavily. The origin of this phrase comes from the slitting of a hunted pigs throat. Hunters cut the throat of a pig to hasten its death but it also results in a significant amount of blood loss.</span></p><span data-dcnode-id="748" instrument_node="">
</span><h2 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Blowing Off Steam</span></h2><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="741"><em data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Blowing off steam</span></em><span data-dcnode-id="742" instrument_node=""> is a phrase used to refer to someone who relaxes by enjoying mundane or “normal” activities. The origin of this idiom comes from traditional boilers that run on heated water that turns in to steam as it heats. Steam builds up in the boiler and so too does pressure and in order to prevent an explosion, a valve must be opened to blow off steam.</span></p><span data-dcnode-id="740" instrument_node="">
</span><h2 data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">To Chew the Fat</span></h2><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">The term </span><em data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">to chew the fat</span></em><span data-dcnode-id="733" instrument_node="">&nbsp;is used to refer to people talking about mundane or everyday things. The origin of this phrase comes from the Inuit culture that used to chew on whale blubber. Being so thick, the blubber would take a long time to disappear. As they waited groups of Inuit would stand around and talk about anything and everything.</span></p><span data-dcnode-id="731" instrument_node="">
</span><h2 data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Clean Bill of Health</span></h2><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">The term </span><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">clean bill of health</span></em><span data-dcnode-id="724" instrument_node=""> is used to refer to people who have been found to be healthy by a doctor. The origin of this idiom comes from the days of sailing ships that carried and transported goods. Before a ship was allowed to dock or unload in a destination port it had to present a “bill of health” that proved that all aboard were disease free when they left their port of departure. This practice was implemented in order to reduce the spread of severe diseases and plagues that were carried from port to port by ship crews. There was one problem with this process though; it didn’t take in to account small rats and fleas that could easily stow away.</span></p><span data-dcnode-id="722" instrument_node="">
</span><h2 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Cut From the Same Cloth</span></h2><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="718" instrument_node="">The term </span><em data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">cut from the same cloth</span></em><span data-dcnode-id="715" instrument_node="">&nbsp;refers to individuals that are similar in specific ways. The origin of this phrase comes from the fact that suit makers cut the trousers and jacket of a suit from the same cloth in order to have them match.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h2 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Down the Hatch</span></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">The phrase </span><em data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">down the hatch</span></em><span data-dcnode-id="706" instrument_node="">&nbsp;is used when eating or drinking. The origin of this phrase is sea freight when cargo was lowered in to the hatch to be stored below the ship’s deck. As this cargo is loaded it gives the image of the ship “eating” the cargo being loaded.</span></p><span data-dcnode-id="704" instrument_node="">
</span><h2 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Dressed to the Nines</span></h2><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="697"><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Dressed to the nines</span></em><span data-dcnode-id="698" instrument_node=""> is a phrase used to refer to someone who is dressed very well. It used to be said that tailors making more exemplary suits would use more fabric than they would when making lower quality suits. The amount of fabric tailors would use for the top of the line suits was nine yards.</span></p><span data-dcnode-id="696" instrument_node="">
</span><h2 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Face the Music</span></h2><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="689"><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Face the music</span></em><span data-dcnode-id="690" instrument_node=""> is a term used to refer to someone who must face the truth of a situation. The origin of this phrase comes from the British military when a drum squad would play music as an individual was court martialed.</span></p><span data-dcnode-id="688" instrument_node="">
</span><h2 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">High on the Hog</span></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">Someone who is said to be living </span><em data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">high on the hog</span></em><span data-dcnode-id="681" instrument_node=""> is someone who is living extravagantly or beyond their means. The origin of this phrase comes from the fact that the best meat of a pig is found on the top of the pig where the “scraps” are found at the base of the pig, for example,&nbsp;trotters.</span></p><span data-dcnode-id="679" instrument_node="">
</span><h2 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Jump on the Bandwagon</span></h2><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">To </span><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">jump on the bandwagon</span></em><span data-dcnode-id="672" instrument_node=""> is a phrase used to refer to people who are doing whatever is popular or whatever others are doing. This phrase comes from a political age when political candidates would throw parades to drum up supporters. These parades would often include a band if the candidate was popular and someone who jumped to support this candidate was said to be jumping on the bandwagon.</span></p><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">To Let the Cat Out of the Bag</span></h2><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="663"><em data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">To let the cat out of the bag</span></em><span data-dcnode-id="664" instrument_node=""> is to reveal a secret. This phrase comes from medieval times when con men would display healthy pigs for sale in the marketplace. As customers came by to purchase a pig they would receive their purchase inside a back and be told not to open the bag until they were home. The problem being that once the customer was home they would open the back and find a cat rather than a pig! This discovery of the cat would reveal the secret of the con man’s routine.</span></p><span data-dcnode-id="662" instrument_node="">
</span><h2 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">The History of Idioms</span></h2><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">It’s fun to learn about the history and original meaning behind common idioms we use today. Did you really know what these meant before reading this article? Probably not since the meaning was “lost in translation” in a way. Even though we don’t use these idioms for their literal meaning they still bring a lot to our language today. Check out this fun song about idioms.</span></p><span data-dcnode-id="656" instrument_node="">
