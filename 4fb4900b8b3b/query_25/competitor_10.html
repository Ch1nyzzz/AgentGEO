</span><div class="inside-article" data-dcnode-id="141"><span data-dcnode-id="309" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="304"><span data-dcnode-id="308" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="306" itemprop="headline"><span data-dcnode-id="307" instrument_node="">Down To Earth – Meaning &amp; Origin</span></h1><span data-dcnode-id="305" instrument_node=""> </span></header><span data-dcnode-id="303" instrument_node="">
</span><div class="entry-content" data-dcnode-id="143" itemprop="text"><span data-dcnode-id="302" instrument_node="">
</span><span data-dcnode-id="301" data-image-pin-it="false" id="dpsp-post-content-markup"></span><span data-dcnode-id="300" instrument_node="">
</span><h2 data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Meaning:</span></h2><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="296" instrument_node="">Someone might use the idiom </span><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">down to earth</span></strong><span data-dcnode-id="293" instrument_node=""> to describe a person who is unpretentious and/or reasonable. This phrase might also be used to describe ideas that are practical and sensible.</span></p><span data-dcnode-id="291" instrument_node="">
</span><p class="colored-box blue" data-dcnode-id="284"><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Example:</span></strong><span data-dcnode-id="288" instrument_node=""> Someone in our marketing department suggested we advertise our new product with hot air balloons. While I appreciated his suggestion, I told him that we need a plan that is more </span><em data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">down to earth</span></em><span data-dcnode-id="285" instrument_node="">.</span></p><span data-dcnode-id="283" instrument_node="">
</span><div class="wp-block-ub-content-toggle" data-dcnode-id="261" data-desktopcollapse="false" data-mobilecollapse="false" id="ub-content-toggle-469e2527-730a-4a64-bb97-6d380562d6dd"><span data-dcnode-id="282" instrument_node="">
</span><div "="" class="wp-block-ub-content-toggle-accordion" data-dcnode-id="263" id=""><span data-dcnode-id="281" instrument_node="">
</span><div aria-controls="ub-content-toggle-panel-0-469e2527-730a-4a64-bb97-6d380562d6dd" aria-expanded="true" class="wp-block-ub-content-toggle-accordion-title-wrap" data-dcnode-id="273" tabindex="0"><span data-dcnode-id="280" instrument_node="">
</span><p class="wp-block-ub-content-toggle-accordion-title ub-content-toggle-title-469e2527-730a-4a64-bb97-6d380562d6dd" data-dcnode-id="277"><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Synonyms / Similar Phrases:</span></strong></p><div class="wp-block-ub-content-toggle-accordion-toggle-wrap right" data-dcnode-id="274"><span class="wp-block-ub-content-toggle-accordion-state-indicator wp-block-ub-chevron-down open" data-dcnode-id="276"></span><span data-dcnode-id="275" instrument_node="">
</span></div></div><div class="wp-block-ub-content-toggle-accordion-content-wrap" data-dcnode-id="264" id="ub-content-toggle-panel-0-469e2527-730a-4a64-bb97-6d380562d6dd" role="region"><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="271" instrument_node="">1. Level-headed</span><br data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">2. Rational</span><br data-dcnode-id="268"><span data-dcnode-id="267" instrument_node="">3. Sensible</span></p><span data-dcnode-id="265" instrument_node="">
</span></div></div><span data-dcnode-id="262" instrument_node="">
</span></div><span data-dcnode-id="260" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="255"><figure class="aligncenter" data-dcnode-id="256"><img alt="Idiom: Down to earth, planet in space." class="wp-image-2469" data-dcnode-id="259" data-pin-nopin="true" height="375" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//knowyourphrase.com/wp-content/uploads/2019/08/phrases-down-to-earth.jpg&amp;raw" srcset="https://knowyourphrase.com/wp-content/uploads/2019/08/phrases-down-to-earth.jpg 750w, https://knowyourphrase.com/wp-content/uploads/2019/08/phrases-down-to-earth-300x150.jpg 300w" width="750"><figcaption data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Anton Balazh – stock.adobe.com.</span></figcaption></figure></div><span data-dcnode-id="254" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">
</span><h2 data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">The Origin Of ‘Down to Earth’</span></h2><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="248" instrument_node="">This idiom’s origin is not clear. The earliest I could find the phrase ‘down to earth’ in print with its figurative meaning is during the early 20th century. During that time, it was commonly used (and this may still be the case today to some extent) to describe the cost of certain items and how ‘reasonable and affordable’ these prices were. For example, in the </span><em data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Newark Advocate</span></em><span data-dcnode-id="245" instrument_node=""> newspaper from 1922, there’s a section in the paper about women’s clothing that says:</span></p><span data-dcnode-id="243" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="240"><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">“Here are four groups of worth-while garments at ‘down to earth’ prices.”</span></p></blockquote><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="238" instrument_node="">A second example of this phrase being used to express ‘low, sensible prices’ comes from the </span><em data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Sandusky Star Journal</span></em><span data-dcnode-id="235" instrument_node=""> newspaper, 1935:</span></p><span data-dcnode-id="233" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="230"><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">“And, while our fashions are as new as tomorrow, our prices are the good down-to-earth prices that save you money.”</span></p></blockquote><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">So this phrase is nearly 100 years old, at the least.</span></p><span data-dcnode-id="226" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">
</span><h3 data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Examples and Sentences</span></h3><span data-dcnode-id="221" instrument_node="">
</span><ul data-dcnode-id="210"><li data-dcnode-id="216"><span data-dcnode-id="220" instrument_node="">I needed to have my car repaired and I was worried that the costs would be through the roof. However, the prices were actually </span><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">down to earth</span></strong><span data-dcnode-id="217" instrument_node=""> and reasonable.</span></li><li data-dcnode-id="211"><span data-dcnode-id="215" instrument_node="">I met a professional basketball player and I thought he would be full of himself, but he was more </span><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">down to earth</span></strong><span data-dcnode-id="212" instrument_node=""> than I expected.</span></li></ul><span data-dcnode-id="209" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">
</span><p class="colored-box grey" data-dcnode-id="196"><strong data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Note:</span></strong><span data-dcnode-id="204" instrument_node=""> The origin of many&nbsp;</span><u data-dcnode-id="201"><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//knowyourphrase.com/"><span data-dcnode-id="203" instrument_node="">popular sayings</span></a></u><span data-dcnode-id="200" instrument_node="">&nbsp;are not known. Generally then, what you’ll see on the phrase’s page is either a theory about its origin, or there will be a quotation. The purpose of these quotations is to give you an idea on how far back in history a saying goes. So if you see an idiom being quoted in a book from 1600, then you know that idiom is </span><i data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">at least</span></i><span data-dcnode-id="197" instrument_node=""> that old.</span></p><span data-dcnode-id="195" instrument_node="">
