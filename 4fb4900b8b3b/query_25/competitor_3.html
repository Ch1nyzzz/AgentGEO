ite text-uppercase px-lg-3" data-dcnode-id="81" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idiomorigins.org/dates-of-origin"><span data-dcnode-id="82" instrument_node="">Dates of Origin</span></a></li><span data-dcnode-id="79" instrument_node=""> </span><li class="nav-item" data-dcnode-id="76"><a class="nav-link text-white text-uppercase pr-md-0 pl-lg-3" data-dcnode-id="77" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idiomorigins.org/contact-us"><span data-dcnode-id="78" instrument_node="">Contact</span></a></li></ul></div></div></div></div></div></div></div></nav><span data-dcnode-id="66" instrument_node=""> </span><div class="container my-5" data-dcnode-id="51"><div class="row" data-dcnode-id="52"><div class="col-lg-10 offset-lg-1 col-xl-8 offset-xl-2" data-dcnode-id="53"><div class="card rounded-0" data-dcnode-id="54"><div class="card-header bg-aqua" data-dcnode-id="63"><h3 class="text-white m-0 noselect" data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">Origin of: Bob’s your uncle</span></h3></div><span data-dcnode-id="62" instrument_node=""> </span><div class="card-body px-5" data-dcnode-id="55"><div class="card-text text-black content-spacing" data-dcnode-id="56"><h5 class="card-title noselect" data-dcnode-id="60"><span data-dcnode-id="61" instrument_node="">Bob’s your uncle</span></h5><span data-dcnode-id="59" instrument_node=""> </span><p class="noselect" data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">The origin of ‘Bob’s your uncle’ sparks debates between etymologists to this day. There is no controversy over its meaning, which is ‘everything is perfect’ or ‘there you have it’, usually after making a pronouncement of some sort.  Its origin, however, has not been resolved beyond doubt. A popular explanation of its origin derives from the alleged nepotism of Lord Robert (Bob) Salisbury, who served two terms as Prime Minister of Britain from 1886-1892 and from 1895-1902. In 1902, he was succeeded as prime minister by his nephew Arthur Balfour. Hence, the meaning that everything is just perfect if one happens to have such an influential uncle as Lord ‘Bob’ Salisbury. There is no doubt that Arthur Balfour was a favourite of his uncle and occupied many important government posts while his uncle was prime minister. The story is not the problem, but the timing is. The expression, ‘Bob’s your uncle’ is first attested from 1924 when it appeared as the title of a musical revue in Dundee of all places. From this, one can assume it was in the spoken language for a while before this. Arthur Balfour was still alive then. He died in 1930, but there seems to be no attested or reported association between him and the expression, satirical or otherwise. One would have thought that Punch Magazine in particular would not have passed up such an opportunity to have a dig at a politician. This gives credence to the alternative theory that the expression has nothing to do with nepotism between Lord Robert Salisbury and his nephew Arthur Balfour, and that it in fact derives from a much earlier expression ‘everything is Bob’ or ‘all is Bob’ meaning, everything is alright, which dates from the late 18th century. ‘Uncle’ on its own refers to a rich or influential relative and also dates in this sense from around the same time. Therefore, putting these two together one could arrive at ‘Bob’s your uncle’ but, again, the date is the problem. Why the expression was only first attested from 1924 remains a mystery. It is interesting to note that Eric Partridge subscribes to the theory that ‘Bob’s your uncle’ derives from ‘all is Bob’ and cites c. 1890 as its first appearance, but gives no further evidence. Until more convincing evidence is to hand, the nepotism of Lord Salisbury remains extremely dubious as an explanation of its origin, whereas the simple combination of ‘Bob’ meaning right or perfect and ‘uncle’ meaning a rich or influential relative, seems the more probable explanation. In the Aubrey-Maturin novels by Patrick O’Brian, set in the Napoleonic Wars, one of O’Brian’s characters uses the expression ‘Bob’s your uncle’ (Post Captain Harper Collins paperback edition 2002, p.291.) .This constitutes a rare anachronism from this author who is otherwise renowned for the accuracy of his characters’ language. See also True as Bob.</span></p></div></div></div></div></div></div><span data-dcnode-id="50" instrument_node=""> </span><footer class="footer bg-black text-white py-4" data-dcnode-id="9"><div class="container" data-dcnode-id="10"><div class="row" data-dcnode-id="11"><div class="col-12 col-md-6 text-center text-sm-left mb-3 mb-md-0 order-2 order-md-0" data-dcnode-id="39"><p data-dcnode-id="46"><span data-dcnode-id="49" instrument_node="">We are human. There will inevitably be some errors. Please help us correct them. </span><a data-dcnode-id="47" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idiomorigins.org/contact-us"><span data-dcnode-id="48" instrument_node="">Contact us</span></a></p><span data-dcnode-id="45" instrument_node=""> </span><small class="d-block mb-3" data-dcnode-id="43"><span data-dcnode-id="44" instrument_node="">Our mission: to become the best, most comprehensive idiom database in the world.</span></small><span data-dcnode-id="42" instrument_node=""> </span><small class="d-block mb-3 text-muted" data-dcnode-id="40"><span data-dcnode-id="41" instrument_node="">Copyright © idiomorigins.org All rights reserved</span></small></div><span data-dcnode-id="38" instrument_node=""> </span><div class="col-12 col-md order-0 order-md-1" data-dcnode-id="12"><div class="row" data-dcnode-id="13"><div class="col-xl-8 offset-xl-2" data-dcnode-id="14"><ul class="list-unstyled row mb-3 mb-md-0" data-dcnode-id="15"><li class="col-12 text-center text-sm-left" data-dcnode-id="34"><a class="text-white text-uppercase" data-dcnode-id="35" href="https://chatnoir-webcontent.chatnoir.eu/?
