</span></div></div></header><div class="site-inner" data-dcnode-id="355"><section class="hero-section" data-dcnode-id="811" id="hero-section" role="banner"><div class="wrap" data-dcnode-id="812"><h1 class="entry-title" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Origin and Meaning of the Idiom ‘Curiosity Killed the Cat’</span></h1><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">We use the idiom 'curiosity killed the cat' without really knowing its origin or its complete meaning. Penlighten deciphers the story and the meaning behind this popular and commonly used phrase.</span></p><div class="breadcrumb" data-dcnode-id="813"><span class="breadcrumb-link-wrap" data-dcnode-id="821"><a class="breadcrumb-link" data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//penlighten.com/"><span class="breadcrumb-link-text-wrap" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Home</span></span></a><meta data-dcnode-id="822"></span><span data-dcnode-id="820" instrument_node=""> / </span><span class="breadcrumb-link-wrap" data-dcnode-id="815"><a class="breadcrumb-link" data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//penlighten.com/category/uncategorized"><span class="breadcrumb-link-text-wrap" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Uncategorized</span></span></a><meta data-dcnode-id="816"></span><span data-dcnode-id="814" instrument_node=""> / Origin and Meaning of the Idiom ‘Curiosity Killed the Cat’</span></div></div></section><div class="content-sidebar-wrap" data-dcnode-id="356"><main class="content" data-dcnode-id="411" id="genesis-content"><article aria-label="Origin and Meaning of the Idiom ‘Curiosity Killed the Cat’" class="post-2248 post type-post status-publish format-standard category-uncategorized entry" data-dcnode-id="532" itemref="hero-section"><div class="entry-content" data-dcnode-id="619"><div class="revbox-inline-the-content-wrapper" data-dcnode-id="627"><div class="bz-card-image" data-dcnode-id="809"><img alt="Origin and Meaning of the Idiom 'Curiosity Killed the Cat'" data-dcnode-id="810" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mlb.com/img/articleImages/610687-4242-46.jpg&amp;raw" width="260"></div><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">We use the idiom ‘curiosity killed the cat’ without really knowing its origin or its complete meaning. Penlighten deciphers the story and the meaning behind this popular and commonly used phrase.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="804"></p><div data-dcnode-id="792"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Did You Know?</span></strong><br data-dcnode-id="801"><em data-dcnode-id="793"><span data-dcnode-id="800" instrument_node="">The idiom that is used every day </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">curiosity killed the cat</span></strong><span data-dcnode-id="797" instrument_node=""> is a part of a longer statement, </span><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">curiosity killed the cat, but satisfaction brought it back</span></strong><span data-dcnode-id="794" instrument_node="">. However, adding the later part to the idiom alters its meaning completely.</span></em></div><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="790" instrument_node="">When we were kids, we must have come across old and isolated houses that had no visitors. We all were always eager to know what was inside that old, dingy, and empty house and planned a quiet adventure trip with our friends. The mystery surrounding the house surely made us a teensy bit curious. This might be just one of the instances of curiosity we came across when we were young. However, whenever we embarked on such a journey, it came with a slight warning―</span><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">‘curiosity kills the cat.’</span></strong></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Why is it connected to cats, you ask? Well, a cat is said to be a naturally curious animal. It has a liking to investigate things, wander off, and get caught in dangerous situations. Such situations can be fatally dangerous in which the cat might end up losing its life. The idiom alludes to this nature of cats.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Origin of the Idiom ‘Curiosity Killed the Cat’</span></h3><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">✦</span></span><span data-dcnode-id="777" instrument_node=""> Though no one can pinpoint the exact date and place where the idiom was conjured up, we can trace the use back in history. However, its first written use is attributed to English poet and playwright Ben Jonson. The phrase was used in his play </span><i data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Every Man in His Humour</span></i><span data-dcnode-id="774" instrument_node=""> (1598)―</span><strong data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">“… Helter skelter, hang sorrow, </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">care will kill a cat,</span></em><span data-dcnode-id="770" instrument_node=""> up-tails all, and a pox on the hangman.”</span></strong><span data-dcnode-id="768" instrument_node=""> In the earlier version of the idiom, the word “care” was used instead of “curiosity,” which was defined as “worry” or “sorrow.”</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">✦</span></span><span data-dcnode-id="763" instrument_node=""> It was none other than English playwright and poet William Shakespeare who performed in Jonson’s play. He used the similar phrase in his play </span><i data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Much Ado About Nothing</span></i><span data-dcnode-id="760" instrument_node=""> (1599), </span><strong data-dcnode-id="755"><span data-dcnode-id="759" instrument_node="">“What, courage man! what though </span><em data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">care killed a cat</span></em><span data-dcnode-id="756" instrument_node="">, thou hast mettle enough in thee to kill care.”</span></strong></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">✦</span></span><span data-dcnode-id="750" instrument_node=""> In 1898, the phrase came closer to the form that we know of today. Reverend Dr. Ebenezer Cobham Brewer included the phrase in the </span><i data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Brewer’s Dictionary of Phrase and Fable</span></i><span data-dcnode-id="747" instrument_node="">, </span><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Care killed the Cat</span></strong><span data-dcnode-id="744" instrument_node="">. It is said that “a cat has nine lives, yet care would wear them all out.”</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">✦</span></span><span data-dcnode-id="739" instrument_node=""> The variation of the idiom that we use today was first listed as an Irish proverb in James Allan Mair’s collection </span><i data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">A handbook of proverbs: English, Scottish, Irish, American, Shakesperean, and scriptural; and family mottoes</span></i><span data-dcnode-id="736" instrument_node=""> (1873). It was included in John Hendricks Bechtel’s Proverbs: Maxims and Phrases (1902) under the topic “curiosity.”</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">✦</span></span><span data-dcnode-id="731" instrument_node=""> In 1909, an American writer, O. Henry referred to the phrase ‘curiosity killed the cat’ in his short story </span><i data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Schools and Schools</span></i><span data-dcnode-id="728" instrument_node="">, “</span><span data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Curiosity can do more things than kill a cat</span></span><span data-dcnode-id="725" instrument_node="">; and if emotions, well recognized as feminine, are inimical to feline life, then jealousy would soon leave the whole world catless.”</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">✦</span></span><span data-dcnode-id="720" instrument_node=""> The phrase appeared as a headline in </span><i data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">The Washington Post</span></i><span data-dcnode-id="717" instrument_node=""> on March 4, 1916.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">✦</span></span><span data-dcnode-id="712" instrument_node=""> In 1920, an American playwright, Eugene O’Neill included the idiom in his play </span><i data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Diff’rent</span></i><span data-dcnode-id="709" instrument_node="">, “BENNY-(with a wink) </span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Curiosity killed a cat</span></strong><span data-dcnode-id="706" instrument_node="">! Ask me no questions and I’ll tell you no lies.”</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">✦</span></span><span data-dcnode-id="701" instrument_node=""> The longer version of the idiom includes a replay to the original idiom in the later half, “curiosity killed the cat, but satisfaction brought it back.” A variation of the longer phrase was first printed in </span><i data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The Galveston Daily News</span></i><span data-dcnode-id="698" instrument_node=""> (August 10, 1905), </span><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Curiosity killed a cat; but it came back.”</span></strong><span data-dcnode-id="695" instrument_node=""> The whole phrase was used in </span><i data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The Titusville Herald</span></i><span data-dcnode-id="692" instrument_node=""> (December 23, 1912.) Also, it was recorded in The Jewell Record on May 15, 1924.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">✦</span></span><span data-dcnode-id="687" instrument_node=""> An American rock singer and songwriter, Iggy Pop included the phrase in his song “Curiosity” from the album “New Values” (1979),</span><br data-dcnode-id="686"><strong data-dcnode-id="682"><span data-dcnode-id="685" instrument_node="">“Curiosity killed the cat</span><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">But satisfaction brought it back</span></strong><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">In terms of this cat, as a matter of fact</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">I’ll meet you at the old mouse hole</span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">I’ll meet you at the old mouse hole.”</span></p><span data-dcnode-id="674" instrument_node="">
</span><h3 data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Meaning</span></h3><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">✦</span></span><span data-dcnode-id="668" instrument_node=""> The idiom means that your inquisitiveness can lead you to danger. The phrase serves as a warning to those who act upon their curiosity, which can be harmful for them. To quench their thirst, to find out truth, people jump into situations that can be physically harmful for them. For example, a friend might discourage a person who wants to do a bungee jump using this idiom.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">✦</span></span><span data-dcnode-id="663" instrument_node=""> On the other hand, this saying can work as a warning to discourage nosy people or those asking too many questions. In such situations, one may not be killed, but might face discomfort, embarrassment, stress, etc.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">✦</span></span><span data-dcnode-id="658" instrument_node=""> The idiom is a part of a longer phrase, which is seldom used. Though curiosity killed the cat has a negative undercurrent, the complete phrase ‘curiosity killed the cat, but satisfaction brought it back’ might be looked upon as being supportive of one’s curious nature. It means that even though one might get harmed due to their curious nature, the satisfaction of uncovering things is worth the risk.</span></p><span data-dcnode-id="656" instrument_node="">
</span><h3 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Examples</span></h3><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">►</span></span><span data-dcnode-id="650" instrument_node=""> Tom’s boss warned him that </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">curiosity killed the cat</span></strong><span data-dcnode-id="647" instrument_node=""> as he was asking many questions about an employee who got fired last week.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">►</span></span><span data-dcnode-id="642" instrument_node=""> I wouldn’t go in that room if I were you. Don’t you know that </span><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">curiosity killed the cat?</span></strong></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">►</span></span><span data-dcnode-id="635" instrument_node=""> “I want to know what it is like to skydive.” “Don’t do it. </span><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Curiosity killed the cat.”</span></strong></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">It is always fun finding out how a certain phrase is originated because it makes it easier for us to use it, and same is the case with the idiom that we discussed in this post.</span></p><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="626" instrument_node="">
