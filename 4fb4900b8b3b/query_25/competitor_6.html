</span><article class="post type-post status-publish" data-dcnode-id="430" id="post-8425"><span data-dcnode-id="957" instrument_node="">
</span><div class="post-entry blockquote-style-1" data-dcnode-id="779"><span data-dcnode-id="956" instrument_node="">
</span><div class="inner-post-entry entry-content" data-dcnode-id="781" id="penci-post-entry-inner"><span data-dcnode-id="955" instrument_node="">
</span><span data-dcnode-id="954" data-mobile-size="720" id="dpsp-post-sticky-bar-markup"></span><span data-dcnode-id="953" data-image-pin-it="true" id="dpsp-post-content-markup"></span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">There are lots of sayings and phrases about our feline friends. And cat idioms are rather common, too. But we often hear them said and don’t know exactly how they came to be. Here I’ve gathered for you the most common cat idioms and their meanings and origins. The English language can be difficult to interpret for non-native speakers, and these cat idioms are excellent proof of it. If you’re a lover of words and cats, then this might be the purrfect read for you. Enjoy!</span></p><span data-dcnode-id="950" instrument_node="">
</span><h3 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Check out these common cat idioms and their meanings below…</span></h3><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="940"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8495" data-dcnode-id="941"><img alt="" class="" data-dcnode-id="946" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647.jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647.jpg 1600w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-600x400.jpg 600w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-300x200.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-1024x683.jpg 1024w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-768x512.jpg 768w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-1536x1024.jpg 1536w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-1170x780.jpg 1170w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-585x390.jpg 585w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-263x175.jpg 263w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-72x48.jpg 72w, https://cattitudedaily.com/wp-content/uploads/2020/06/bigstock-A-Cat-Looking-Up-Animal-Portr-291053647-144x96.jpg 144w" style="" width="600"><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F06%252Fbigstock-A-Cat-Looking-Up-Animal-Portr-291053647.jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="943"><svg data-dcnode-id="944" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="945"></path></svg></span></a></div><p></p><span data-dcnode-id="939" instrument_node="">
</span><h4 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Curiosity killed the cat</span></h4><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">This might be the most popular cat idiom of all. And the meaning of this one comes as a no-brainer since we all know that </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/why-are-cats-so-curious/"><span data-dcnode-id="934" instrument_node="">cats are naturally curious little beings</span></a><span data-dcnode-id="932" instrument_node="">. But with this commonly used cat idiom, it basically means that being so curious can land you into a lot of trouble. Tread lightly!</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">When it comes to this cat idiom which has an easy-to-decipher meaning, it seems that the root of the phrase actually differs. The phrase ‘care killed the cat’ which is believed to be the origin of the saying dates all the way back to a play from 1598. And </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.online-spellcheck.com/spellcheck-help/curiosity-killed-the-cat-there-is-more-to-proverbs-than-you-think/"><span data-dcnode-id="928" instrument_node="">the modern version of this phrase dates back to 1873</span></a><span data-dcnode-id="926" instrument_node=""> when it was published in a book of English language proverbs. The “satisfaction brought him back” part we often hear said in conjunction with this cat idiom dates back to the early 1900’s.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="917"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-7184" data-dcnode-id="918"><img alt="" class="" data-dcnode-id="923" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032.jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032.jpg 1600w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-600x400.jpg 600w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-300x200.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-1024x683.jpg 1024w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-768x512.jpg 768w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-1536x1024.jpg 1536w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-1170x780.jpg 1170w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-585x390.jpg 585w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-263x175.jpg 263w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-72x48.jpg 72w, https://cattitudedaily.com/wp-content/uploads/2020/05/bigstock-Yumm-2736032-144x96.jpg 144w" style="" width="600"><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F05%252Fbigstock-Yumm-2736032.jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="920"><svg data-dcnode-id="921" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="922"></path></svg></span></a></div><p></p><span data-dcnode-id="916" instrument_node="">
</span><h4 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Cat got your tongue</span></h4><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="912" instrument_node="">I often used to hear this as a kid, and I’m sure many parents today still say it to their children when they’re not ready to fess up. When a cat’s got your tongue, essentially someone is searching for the truth and you might not be prepared to spill it. It’s thought to be a light-hearted question for someone talkative who’s suddenly gone silent. It might seem like a relatively new idiom,</span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phrases.org.uk/meanings/cat-got-your-tongue.html"><span data-dcnode-id="911" instrument_node=""> but its origins date back to a newspaper from the mid-1800’s.&nbsp;</span></a></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="901"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8492" data-dcnode-id="902"><img alt="cat idioms and their origins" class="" data-dcnode-id="907" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw.jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw.jpg 800w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-600x400.jpg 600w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-300x200.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-768x512.jpg 768w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-585x390.jpg 585w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-263x175.jpg 263w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-72x48.jpg 72w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-adorable-cat-peeking-out-of-bag.-bw-144x96.jpg 144w" style="" width="600"><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F06%252FCanva-adorable-cat-peeking-out-of-bag.-bw.jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="904"><svg data-dcnode-id="905" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="906"></path></svg></span></a></div><p></p><span data-dcnode-id="900" instrument_node="">
</span><h4 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Let the cat out of the bag</span></h4><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">You might hear this one used if someone has spoiled a big secret or surprise. By letting the cat out of the bag, you’re spilling details on something which was intended to be kept private. Seems like an odd connection, seeing as I can’t imagine the thought of putting a cat into a bag in the first place! But, in all reality, the mental picture of a cat shooting out of a bag relates to the exact meaning of this idiom. And someone who has let the cat out of the bag is typically shamed for doing so.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="893" instrument_node="">This cat idiom was first documented in a 1760 issue of London Magazine. </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/31180/whats-origin-let-cat-out-bag%23%3A~%3Atext%3DThe%2520first%2520origin%2520story%2520claims%2Cof%2520punishment%2520aboard%2520its%2520ships.%26text%3DThe%2520bag%2520comes%2520into%2520play%2Cair%2520and%2520keep%2520it%2520flexible."><span data-dcnode-id="892" instrument_node="">According to Mental Floss</span></a><span data-dcnode-id="890" instrument_node="">, a book reviewer detailed that he wished a particular author had not “let the cat out of the bag” concerning specific details of the novel. </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.todayifoundout.com/index.php/2014/01/expression-let-cat-bag-come/"><span data-dcnode-id="889" instrument_node="">Writer and humorist Will Rogers once said, </span></a><em data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">“Letting the cat out of the bag is a whole lot easier than putting it back in.”</span></em><span data-dcnode-id="885" instrument_node=""> And I’d have to wholeheartedly agree!</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="876"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8493" data-dcnode-id="877"><img alt="" class="" data-dcnode-id="882" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door..jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door..jpg 800w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-600x400.jpg 600w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-300x200.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-768x512.jpg 768w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-585x390.jpg 585w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-263x175.jpg 263w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-72x48.jpg 72w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-leaning-over-the-green-door.-144x96.jpg 144w" style="" width="600"><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F06%252FCanva-Cat-leaning-over-the-green-door..jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="879"><svg data-dcnode-id="880" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="881"></path></svg></span></a></div><p></p><span data-dcnode-id="875" instrument_node="">
</span><h4 data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Look what the cat dragged in</span></h4><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">If someone tells you that you look this way, it would mean that you’re a disheveled mess or been caught out in the rain. If you’ve ever had a cat that’s been allowed to travel outdoors, then you know exactly what many cats will do on occasion. And while we wouldn’t give our caregivers a dead rat as a token of our esteem, remember, we are not cats! The origin of this saying was first documented in the early 1900’s. While it can have a negative meaning when used, it can also be used for playful teasing as if it jokingly tell someone they look untidy.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="862"></p><div class="dpsp-pin-it-wrapper wp-image-8499 aligncenter" data-dcnode-id="863"><img alt="" class="" data-dcnode-id="868" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up.jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up.jpg 800w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-600x400.jpg 600w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-300x200.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-768x512.jpg 768w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-585x390.jpg 585w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-263x175.jpg 263w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-72x48.jpg 72w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Cat-Face-Close-Up-144x96.jpg 144w" style="" width="600"><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F06%252FCanva-Cat-Face-Close-Up.jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcno </span><h4 data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Cat nap</span></h4><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">This one seems totally self-explanatory, but I’m simply going to list it here for good measure. A cat sleeps anywhere from 12-15 hours a day, so no wonder there’s an idiom relating to cat sleep! Essentially, when you take a cat nap, it’s a short time spent sleeping that has you feeling refreshed, recharged, and rejuvenated as a result of it. Did you know that for our feline friends, there’s a big difference between actual sleep and those cat naps?&nbsp;</span></p><span data-dcnode-id="855" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="845" id="attachment_8478" style="width: 574px"><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//www.loc.gov/everyday-mysteries/item/what-is-the-origin-of-the-phrase-its-raining-cats-and-dogs/"></a><div class="dpsp-pin-it-wrapper size-full wp-image-8478" data-dcnode-id="849"><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//www.loc.gov/everyday-mysteries/item/what-is-the-origin-of-the-phrase-its-raining-cats-and-dogs/"><img alt="" aria-describedby="caption-attachment-8478" class="" data-dcnode-id="854" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="363" loading="lazy" sizes="(max-width: 564px) 100vw, 564px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/06/very-unpleasant-weather.jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/06/very-unpleasant-weather.jpg 564w, https://cattitudedaily.com/wp-content/uploads/2020/06/very-unpleasant-weather-300x193.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/06/very-unpleasant-weather-75x48.jpg 75w, https://cattitudedaily.com/wp-content/uploads/2020/06/very-unpleasant-weather-149x96.jpg 149w" style="" width="564"></a><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F06%252Fvery-unpleasant-weather.jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="851"><svg data-dcnode-id="852" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="853"></path></svg></span></a></div><p class="wp-caption-text" data-dcnode-id="846" id="caption-attachment-8478"><span data-dcnode-id="847" instrument_node="">Very unpleasant weather. George Cruikshank, 1820. Alisa Mellon Bruce Fund, National Gallery of Art</span></p></div><span data-dcnode-id="844" instrument_node="">
</span><h4 data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">It’s raining cats and dogs</span></h4><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="840" instrument_node="">When we hear this cat idiom, we know that it equates to heavy rain. But how and why did people start using this phrase which paints a picture of canines and felines dropping down from rain clouds? Well, there are a few plausible theories on this commonly used cat idiom. Library of Congress shares that the first recorded use of a similar phrase was documented in 1651. In a collection of poems known as </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Olor Iscanus</span></em><span data-dcnode-id="837" instrument_node="">, </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.loc.gov/everyday-mysteries/item/what-is-the-origin-of-the-phrase-its-raining-cats-and-dogs/"><span data-dcnode-id="836" instrument_node="">British poet Henry Vaughan referred&nbsp;to a roof that was secure against “dogs and cats rained in shower.”</span></a></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">It’s believed that the saying itself has Norse mythology origins, and has also been linked to </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/black-cats-are-bad-luck/"><span data-dcnode-id="831" instrument_node="">Medieval superstitions</span></a><span data-dcnode-id="829" instrument_node="">. Additionally, it’s been speculated that the saying has Greek roots, coming from the Greek expression “cata doxa” which translates to “contrary to experience or belief.” This one might be a bit of a hyperbole, but it’s one I know I find myself saying during those heavy downpours. Fighting like cats and dogs is another common cat idiom you might hear which references canines. And for that one, there’s not much explanation needed knowing these two species don’t always get along.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="820"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8490" data-dcnode-id="821"><img alt="" class="" data-dcnode-id="826" data-pin-description="Common Cat Idioms And Their Meanings And Origins" data-pin-title="Common Cat Idioms And Their Meanings And Origins" height="404" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1.jpg&amp;raw" srcset="https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1.jpg 800w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1-600x404.jpg 600w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1-300x202.jpg 300w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1-768x517.jpg 768w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1-585x394.jpg 585w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1-71x48.jpg 71w, https://cattitudedaily.com/wp-content/uploads/2020/06/Canva-Mice.-1-142x96.jpg 142w" style="" width="600"><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rounded" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fwp-content%252Fuploads%252F2020%252F06%252FCanva-Mice.-1.jpg%26url%3Dhttps%253A%252F%252Fcattitudedaily.com%252Fcommon-cat-idioms%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-pug%26is_video%3Dfalse%26description%3DCommon%2520Cat%2520Idioms%2520And%2520Their%2520Meanings%2520And%2520Origins" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="823"><svg data-dcnode-id="824" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.4 </span><h4 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">When the cat’s away, the mice will play</span></h4><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="815" instrument_node="">This fun cat idiom has been used for centuries. Cats have been praised and relied on for their hunting abilities since their domestication, so this popular cat saying comes as a result of it. The saying that we commonly use today is derived from the Latin phrase, </span><em data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">dum felis dormit, mus gaudet et exsi litantro</span></em><span data-dcnode-id="812" instrument_node="">. </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//grammarist.com/proverb/when-the-cats-away-the-mice-will-play/"><span data-dcnode-id="811" instrument_node="">Grammarist</span></a><span data-dcnode-id="809" instrument_node=""> shares the literal translation to English is</span><em data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">“when the cat sleeps, the mouse leaves its hole, rejoicing.”&nbsp;</span></em><span data-dcnode-id="806" instrument_node="">Today, the saying is widely used in both the US and Great Britain and holds a positive and happy meaning. It’s often used when kids are home unattended from their parents or employees get to work without their boss present. Just be careful, that “cat” might be lurking around the corner ready to pounce!</span></p><span data-dcnode-id="804" instrument_node="">
