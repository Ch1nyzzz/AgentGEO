</span></body></html></iframe></div><div class="accordion" data-dcnode-id="476"><input class="spoiler_button" data-dcnode-id="623" id="transcript" type="checkbox"><label data-dcnode-id="621" for="transcript"><span data-dcnode-id="622" instrument_node="">Transcript</span></label><div class="spoiler" data-dcnode-id="477" id="transcript-spoiler"><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Hey guys! Welcome to this Mometrix video over figurative language.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Figurative language is just any language that employs phrases or words that have a different meaning than they would if they were interpreted literally. This is in direct contrast to literal language, where someone says exactly what they mean. For example, when someone looks at an outdoor thermometer that reads 96 degrees and they say, “It is 96 degrees Fahrenheit outside.” If they were using figurative language they might say, “It’s a million degrees outside!” It’s pretty obvious that it’s not a million degrees outside, but the point that they are trying to get across is that it’s uncomfortably hot.</span></p><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Figurative language typically exaggerates what is literal in order to convey a point.</span></p><h2 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Figurative Language Examples</span></h2><p data-dcnode-id="599"><span data-dcnode-id="612" instrument_node="">There are several different kinds of figurative language; such as </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/alliteration/"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">alliteration</span></strong></a><span data-dcnode-id="608" instrument_node="">, assonance, idiom, onomatopoeia, </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/metonymy-and-synedoche/"><strong data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">synecdoche</span></strong></a><span data-dcnode-id="604" instrument_node="">, </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/metonymy-and-synedoche/"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">metonymy</span></strong></a><span data-dcnode-id="600" instrument_node="">, cliche, and so on.</span></p><p data-dcnode-id="581"><span data-dcnode-id="598" instrument_node="">In this video, however, we will be looking at the five main types of figurative language: </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/simile/"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">simile</span></strong></a><span data-dcnode-id="594" instrument_node="">, </span><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/metaphor/"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">metaphor</span></strong></a><span data-dcnode-id="590" instrument_node="">, </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/figure-of-speech/"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">hyperbole</span></strong></a><span data-dcnode-id="586" instrument_node="">, </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/personification/"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">personification</span></strong></a><span data-dcnode-id="582" instrument_node="">, and symbolism.</span></p><h2 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Similes</span></h2><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node=""> A simile uses like or as to directly compare two different things. Now, you may have heard it said that a simile is comparing two things that are unalike; but that can be confusing, because often a simile is used directly to show how two different things are specifically alike. So, that is why I use the word different.</span></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Here are some examples of similes:</span></p><blockquote data-dcnode-id="564" style="border: 0px; padding-right: 10px; padding-left: 10px; padding-top: 15px; padding-bottom: 15px; background-color: #eee; box-shadow: 3px 3px 10px grey"><div data-dcnode-id="565" style="font-style:normal; font-size:90%"><center data-dcnode-id="566"><span data-dcnode-id="574" instrument_node="">We all, like sheep, do things that we should not.</span><p data-dcnode-id="573"></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">She is as tough as nails.</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">She was as fast as a cheetah.</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">He was like a sloth in the mornings.</span></p></center></div></blockquote><h2 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Metaphors</span></h2><p data-dcnode-id="554"><span data-dcnode-id="561" instrument_node=""> A metaphor is actually kind of similar to a simile, which would make sense seeing as how they are both figurative language. Even more than that, they are similar, because they compare two different things. However, the way that these two things are compared is where we find our distinguishing factor. A simile uses </span><em data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">like</span></em><span data-dcnode-id="558" instrument_node=""> or </span><em data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">as</span></em><span data-dcnode-id="555" instrument_node=""> to compare two different things, but a metaphor compares them in a more absolute way.</span></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Here are some examples of a metaphor:</span></p><blockquote data-dcnode-id="541" style="border: 0px; padding-right: 10px; padding-left: 10px; padding-top: 15px; padding-bottom: 15px; background-color: #eee; box-shadow: 3px 3px 10px grey"><div data-dcnode-id="542" style="font-style:normal; font-size:90%"><center data-dcnode-id="543"><span data-dcnode-id="551" instrument_node="">He is a dog.</span><p data-dcnode-id="550"></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">He is a gem.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Bobby Jo is a chicken.</span></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">He wanted to just sweep his problems under the rug.</span></p></center></div></blockquote><h2 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Hyperbole</span></h2><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node=""> A hyperbole is an extreme exaggeration of facts in order to stress the significance of a point. The example we looked at earlier, “It’s a million degrees outside!” is a good illustration.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Here are some other examples of hyperbole:</span></p><blockquote data-dcnode-id="527" style="border: 0px; padding: 30px; background-color: #eee; box-shadow: 3px 3px 10px grey"><div data-dcnode-id="528" style="font-style:normal; font-size:90%"><span data-dcnode-id="534" instrument_node="">It was so cold the polar bears wore blankets.</span><p data-dcnode-id="533"></p><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">He so desperately wants to make his presence known that he never stops making noise.</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">I’m so hungry I could eat a horse!</span></p></div></blockquote><h2 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Personification</span></h2><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node=""> Personification is the use of words that imply human qualities to describe something that is not human. For example:</span></p><blockquote data-dcnode-id="512" style="border: 0px; padding-right: 10px; padding-left: 10px; padding-top: 15px; padding-bottom: 15px; background-color: #eee; box-shadow: 3px 3px 10px grey"><div data-dcnode-id="513" style="font-style:normal; font-size:90%"><center data-dcnode-id="514"><span data-dcnode-id="522" instrument_node="">Every time the wind blew the tree would dance.</span><p data-dcnode-id="521"></p><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The sky is crying.</span></p><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Time shows no partiality.</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">My microwave always screams at me when it’s finished heating.</span></p></center></div></blockquote><h2 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Symbolism</span></h2><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node=""> Symbolism is typically when some object is used to represent a deeper meaning. For example, a dove is a classic symbol for peace. Now, symbolism can be a little more abstract and has many different forms. Here’s what I mean: it’s possible that something could be symbolism, but it could also be a metaphor. For example, “life is a roller coaster.” The roller coaster symbolizes that in life you will have ups (times of happiness) and downs (times of sadness).</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Now, let’s look at some general examples of symbolism:</span></p><blockquote data-dcnode-id="482" style="border: 0px; padding-right: 10px; padding-left: 10px; padding-top: 15px; padding-bottom: 15px; background-color: #eee; box-shadow: 3px 3px 10px grey"><div data-dcnode-id="483" style="font-style:normal; font-size:90%"><center data-dcnode-id="484"><span data-dcnode-id="505" instrument_node="">He became fearful after the black cat crossed his path.</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node=""> </span><span data-dcnode-id="500" style="font-style:normal; font-size:70%"><em data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">(The black cat crossing someone’s path symbolizes very bad luck, according to an old omen)</span></em></span><p data-dcnode-id="499"></p><p data-dcnode-id="492"><span data-dcnode-id="498" instrument_node="">The King wore a purple robe during the ceremony.</span><br data-dcnode-id="497"><span data-dcnode-id="496" instrument_node=""> </span><span data-dcnode-id="493" style="font-style:normal; font-size:70%"><em data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">(The color purple is symbolic for royalty)</span></em></span></p><p data-dcnode-id="485"><span data-dcnode-id="491" instrument_node="">After a rough day she desperately anticipated the sunrise.</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node=""> </span><span data-dcnode-id="486" style="font-style:normal; font-size:70%"><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">(The sun rising is symbolic of a new day, and a chance to start over)</span></em></span></p></center></div></blockquote><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Figurative language can be a really useful tool to add depth to your writing. So, I hope that this video helped you to better understand, and sets you up to successfully apply it to your own writing.</span></p><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">See you guys next time!</span></p></div></div><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">&nbsp;</span></p><p data-dcnode-id="470"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/academy/writing/"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Return to Writing Videos</span></strong></a></p></div><span data-dcnode-id="468" instrument_node=""> </span><span data-dcnode-id="466" style="visibility: hidden;"><span data-dcnode-id="467" instrument_node="">584902</span></span><div data-dcnode-id="458"><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node=""> &nbsp;</span></p><p data-dcnode-id="459" style="text-align:center;"><span data-dcnode-id="463" instrument_node=""> by </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mometrix.com/about.htm"><span data-dcnode-id="462" instrument_node="">Mometrix Test Preparation</span></a><span data-dcnode-id="460" instrument_node=""> | This Page Last Updated: February 17, 2022</span></p></div></div></article><div class="a2a_kit a2a_kit_size_32 a2a_floating_style a2a_vertical_style" data-dcnode-id="423" style="margin-left: -20px; top: 205px; background-color: transparent; line-height: 32px;"><a class="a2a_button_email" data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/%23email" rel="nofollow noopener" target="_blank"><span class="a2a_svg a2a_s__default a2a_s_email" data-dcnode-id="453" style="background-color: rgb(1, 102, 255);"><svg aria-hidden="true" data-dcnode-id="454" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M26 21.25v-9s-9.1 6.35-9.984 6.68C15.144 18.616 6 12.25 6 12.25v9c0 1.25.266 1.5 1.5 1.5h17c1.266 0 1.5-.22 1.5-1.5zm-.015-10.765c0-.91-.265-1.235-1.485-1.235h-17c-1.255 0-1.5.39-1.5 1.3l.015.14s9.035 6.22 10 6.56c1.02-.395 9.985-6.7 9.985-6.7l-.015-
