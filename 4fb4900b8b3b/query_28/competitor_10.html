ent_node=""> </span><svg class="social-svg" data-dcnode-id="361" height="32" viewBox="0 0 448 512" width="28" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="364" instrument_node=""> </span><path d="M400 32H48C21.49 32 0 53.49 0 80v352c0 26.51 21.49 48 48 48h352c26.51 0 48-21.49 48-48V80c0-26.51-21.49-48-48-48zM178.117 262.104C87.429 196.287 88.353 196.121 64 177.167V152c0-13.255 10.745-24 24-24h272c13.255 0 24 10.745 24 24v25.167c-24.371 18.969-23.434 19.124-114.117 84.938-10.5 7.655-31.392 26.12-45.883 25.894-14.503.218-35.367-18.227-45.883-25.895zM384 217.775V360c0 13.255-10.745 24-24 24H88c-13.255 0-24-10.745-24-24V217.775c13.958 10.794 33.329 25.236 95.303 70.214 14.162 10.341 37.975 32.145 64.694 32.01 26.887.134 51.037-22.041 64.72-32.025 61.958-44.965 81.325-59.406 95.283-70.199z" data-dcnode-id="363"></path><span data-dcnode-id="362" instrument_node=""> </span><span data-dcnode-id="360" instrument_node=""> </span></div><span data-dcnode-id="358" instrument_node=""> </span></a><span data-dcnode-id="356" instrument_node=""> </span></div><span data-dcnode-id="354" instrument_node=""> </span></span><span data-dcnode-id="352" instrument_node=""> </span></div><span data-dcnode-id="350" instrument_node=""> </span><div class="breadcrumbs" data-dcnode-id="342"><span data-dcnode-id="349" instrument_node=""> </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//penandthepad.com/"><span data-dcnode-id="348" instrument_node="">Home</span></a><span data-dcnode-id="346" instrument_node=""> » </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//penandthepad.com/rhyme-rhythm/"><span data-dcnode-id="345" instrument_node="">Rhyme &amp; Rhythm</span></a><span data-dcnode-id="343" instrument_node=""> </span></div><span data-dcnode-id="341" instrument_node=""> </span></div><span data-dcnode-id="339" instrument_node=""> </span><div class="article-content" data-dcnode-id="208"><span data-dcnode-id="338" instrument_node=""> </span><div class="freestyle-content" data-dcnode-id="210"><div class="article-image" data-dcnode-id="327"><span data-dcnode-id="337" instrument_node=""> </span><picture data-dcnode-id="329"><span data-dcnode-id="336" instrument_node=""> </span><source data-dcnode-id="335" srcset=" https://img-aws.ehowcdn.com/400x300p/cpi.studiod.com/www_ehow_com/i.ehow.com/images/a08/4i/c9/types-figurative-language-poetry-800x800.jpg?type=webp 400w" type="image/webp"><span data-dcnode-id="334" instrument_node=""> </span><source data-dcnode-id="333" srcset=" https://img-aws.ehowcdn.com/400x300p/cpi.studiod.com/www_ehow_com/i.ehow.com/images/a08/4i/c9/types-figurative-language-poetry-800x800.jpg 400w" type="image/jpeg"><span data-dcnode-id="332" instrument_node=""> </span><img alt="" data-dcnode-id="331" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//penandthepad.com/public/images/logo-fallback.svg&amp;raw"><span data-dcnode-id="330" instrument_node=""> </span></picture><span data-dcnode-id="328" instrument_node=""> </span></div><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">"Men live like bears with furniture," quips comedian Rita Rudner. Rudner's claim is an example of figurative language -- language that departs from the literal for the sake of comparison or exaggeration. In poetry, figurative language makes the ideas more vivid and engaging. Figurative language surprises the reader and forces him to think. As with Rudner's quote, it is a great way to challenge your readers' perceptions about the world.</span></p><span data-dcnode-id="324" instrument_node=""> </span><div class="adsense-inline" data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="320"><span data-dcnode-id="323" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3235755782694080" data-ad-format="auto" data-ad-slot="9707625633" data-dcnode-id="321" data-full-width-responsive="true" style="display:block"><span data-dcnode-id="322" instrument_node="">
</span></ins></div><span data-dcnode-id="319" instrument_node=""> </span><div class="mobile-inline-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="318"></div><span data-dcnode-id="317" instrument_node=""> </span><h2 data-dcnode-id="315" id="personification"><span data-dcnode-id="316" instrument_node="">Personification</span></h2><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Personification attributes the characteristics of a person to an inanimate object. They key to success is to make the comparison surprising but appropriate. Charles Reznikoff's poem is a good example:</span></p><span data-dcnode-id="312" instrument_node=""> </span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Permit me to warn you</span></p><span data-dcnode-id="309" instrument_node=""> </span><div class="mobile-inline-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="308"></div><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">against this automobile rushing to embrace you</span></p><span data-dcnode-id="305" instrument_node=""> </span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">with outstretched fender.</span></p><span data-dcnode-id="302" instrument_node=""> </span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">The poem makes us chuckle because cars do not embrace people or try to shake hands. However, the comparison feels right because cars can approach as suddenly and unexpectedly as strangers.</span></p><span data-dcnode-id="299" instrument_node=""> </span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Personification does not have to be humorous. Consider Philip Larkin's poem, "Aubade":</span></p><span data-dcnode-id="296" instrument_node=""> </span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Meanwhile telephones crouch, getting ready to ring</span></p><span data-dcnode-id="293" instrument_node=""> </span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">In locked-up offices.</span></p><span data-dcnode-id="290" instrument_node=""> </span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Here the crouching phones seem sinister, as if they are waiting to attack.</span></p><span data-dcnode-id="287" instrument_node=""> </span><h2 data-dcnode-id="285" id="metaphor,-similie-and-extended-metaphor"><span data-dcnode-id="286" instrument_node="">Metaphor, Similie and Extended Metaphor</span></h2><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">A metaphor compares two unlike things, forcing the reader to make a connection between them. This kind of comparison does not use "like" or "as." The key to a great metaphor is balancing surprise with the shock of recognition. For example, Charles Reznikoff writes:</span></p><span data-dcnode-id="282" instrument_node=""> </span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Walk about the subway station</span></p><span data-dcnode-id="279" instrument_node=""> </span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">in a grove of steel pillars</span></p><span data-dcnode-id="276" instrument_node=""> </span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Here the subway is compared to a forest, forcing the reader to think about the difference, or lack of difference, between the human and natural world.</span></p><span data-dcnode-id="273" instrument_node=""> </span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">A simile is a special type of metaphor that does use "like" or "as" to make the comparison explicit. For example, in "Aubade," Philip Larkin writes: "The sky is white as clay, with no sun." Here Larkin forces the reader to compare the sky with its opposite, the earth.</span></p><span data-dcnode-id="270" instrument_node=""> </span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">An extended metaphor is when a poem explores a single metaphor, or simile, in great detail. The poem "April" by Alicia Ostriker is a great example:</span></p><span data-dcnode-id="267" instrument_node=""> </span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">... What a concerto</span></p><span data-dcnode-id="264" instrument_node=""> </span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">of good stinks said the dog</span></p><span data-dcnode-id="261" instrument_node=""> </span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">trotting along Riverside Drive</span></p><span data-dcnode-id="258" instrument_node=""> </span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">in the early spring afternoon</span></p><span data-dcnode-id="255" instrument_node=""> </span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">sniffing this way and that</span></p><span data-dcnode-id="252" instrument_node=""> </span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">how gratifying the cellos of the river</span></p><span data-dcnode-id="249" instrument_node=""> </span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">the tubas of the traffic</span></p><span data-dcnode-id="246" instrument_node=""> </span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">the trombones</span></p><span data-dcnode-id="243" instrument_node=""> </span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">of the leafing elms with the legato ...</span></p><span data-dcnode-id="240" instrument_node=""> </span><h2 data-dcnode-id="238" id="symbolism-and-allegory"><span data-dcnode-id="239" instrument_node="">Symbolism and Allegory</span></h2><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Symbols are objects or people that stand for abstract ideas. The connection is made either through shared characteristics or the repeated association of a thing with the idea it represents. The key to success is to avoid the obvious or cliché. For example, the idea that love is like a rose is so overused that it has lost its original force. Beyond avoiding cliches, nearly any object can be linked with any idea.</span></p><span data-dcnode-id="235" instrument_node=""> </span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">One example of a symbol is in Wallace Stevens' poem, "The Man With the Blue Guitar." Throughout the poem, the blue guitar becomes a symbol for the imagination.</span></p><span data-dcnode-id="232" instrument_node=""> </span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Allegory is a special type of symbolism. This is when an abstract idea is made into a character in a story. For example, in Edmund Spenser's long poem, "The Fairie Queene," the main character is named The Redcrosse Knight. Both his name and his armor show that he represents Christianity.</span></p><span data-dcnode-id="229" instrument_node=""> </span><h2 data-dcnode-id="227" id="metonymy-and-synedoche"><span data-dcnode-id="228" instrument_node="">Metonymy and Synedoche</span></h2><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Metonymy and synedoche are both forms of substitution. Metonymy is like a nickname; instead of referring to the thing directly, this figure of speech uses a related word. One example would be referring to your tall friend as Tree. Synedoche uses just part of the thing to refer to the whole thing.</span></p><span data-dcnode-id="224" instrument_node=""> </span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">An example might be referring to your tall friend as Bigfoot. Both figures make the expression vivid and interesting. The key to success is choosing an appropriate way to refer to the object. For example, in the famous poem, "Elegy Written in a Country Churchyard," Thomas Gray writes "drowsy tinklings lull the distant folds." Here the poet refers to sheep by the sound their bells make, an example of metonymy that allows us to hear the bells clearly.</span></p><span data-dcnode-id="221" instrument_node=""> </span><h2 data-dcnode-id="219" id="hyperbole-and-understatement"><span data-dcnode-id="220" instrument_node="">Hyperbole and Understatement</span></h2><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Hyperbole is deliberate exaggeration to the point that the idea becomes ridiculous. Understatement is the opposite; the idea is downplayed to the point that it becomes ridiculous. Both are frequently used for humorous effects. The key to success lies in making them both obvious and absurd.</span></p><span data-dcnode-id="216" instrument_node=""> </span><h2 data-dcnode-id="214" id="tips-on-identifying-figurative-language"><span data-dcnode-id="215" instrument_node="">Tips on Identifying Figurative Language</span></h2><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Remember that language has to go beyond its real-world meaning to be figurative. Alliteration and onomatopoeia are sometimes listed as types of figurative language, but these are really sound effects that can be figurative or not. Many print and online sources exist to help you practice identifying and using figurative language.</span></p><span data-dcnode-id="211" instrument_node=""> </span></div><span data-dcnode-id="209" instrument_node=""> </span></div><span data-dcnode-id="207" instrument_node=""> </span><div class="main-ad" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="203"><span data-dcnode-id="206" instrument_node="">
