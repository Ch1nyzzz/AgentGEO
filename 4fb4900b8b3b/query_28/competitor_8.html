</span><h2 class="has-text-align-center" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">The Meaning of “Figurative Language”</span></h2><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1059" instrument_node="">This friendly </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/english-lessons/"><span data-dcnode-id="1058" instrument_node="">English teacher</span></a><span data-dcnode-id="1056" instrument_node=""> welcomes you to one of the most important lessons in ELA and life! Now for the definition you’ve been waiting for… The term “figurative language” refers to a kind of language which conveys meaning in an </span><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">exciting way that isn’t literal</span></strong><span data-dcnode-id="1053" instrument_node="">. Huh? What is this “literal” business? </span></p><span data-dcnode-id="1051" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1045"><noscript data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">&lt;img width="1200" height="1200" src="https://drawingsof.com/wp-content/uploads/2021/05/Figurative-1200x1200.png" alt="Literally vs. Figuratively" class="wp-image-1885" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Figurative-1200x1200.png 1200w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-700x700.png 700w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-400x400.png 400w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-768x768.png 768w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative.png 1414w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Literally vs. Figuratively" class="wp-image-1885 lazyload" data-dcnode-id="1048" data-pin-media="https://drawingsof.com/wp-content/uploads/2021/05/Figurative.png" data-src="https://drawingsof.com/wp-content/uploads/2021/05/Figurative-1200x1200.png.webp" data-srcset="https://drawingsof.com/wp-content/uploads/2021/05/Figurative-1200x1200.png.webp 1200w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-700x700.png.webp 700w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-400x400.png.webp 400w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-768x768.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative.png.webp 1414w" data-trellis-processed="1" data-webp="true" height="1200" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/wp-content/uploads/2021/05/Figurative-1200x1200.png.webp&amp;raw" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Figurative-1200x1200.png.webp 1200w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-700x700.png.webp 700w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-400x400.png.webp 400w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative-768x768.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Figurative.png.webp 1414w" width="1200"><figcaption data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">My height, literally vs. figuratively.</span></figcaption></figure><span data-dcnode-id="1044" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="1041"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Literal vs. Figurative Language: What’s the Difference?</span></strong></h3><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">“Literal language” refers to plain, “what you see is what you get” ways of writing or speaking: language that means exactly what it says. For example: “Ms. Marshall is six feet tall” is a </span><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">literal statement</span></strong><span data-dcnode-id="1036" instrument_node=""> because I am mathematically exactly six feet tall. (Yes, I’m shockingly large for a lady.)</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">In contrast, a </span><strong data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">figurative statement</span></strong><span data-dcnode-id="1030" instrument_node=""> about my height would be something like, “Ms. Marshall is as tall as a tree!” Now, anyone with an ounce of logic in their noggin would know that I’m not LITERALLY as tall as a tree (unless it’s a short, stubby one that’s just six feet tall), but this figurative language — a simile to be exact — is delightful because it helps the reader get an image of my towering height in a creative way. </span></p><span data-dcnode-id="1028" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">What Are Types of Figurative Language?</span></h2><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The exact number of types of figurative language is up for debate (a deliciously dorky ELA debate), but for today, let’s focus on five of the most common and useful kinds. Once you learn them, you can leverage each to spice up your own writing, and to better understand what others are saying.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1016"><noscript data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">&lt;img loading="lazy" width="916" height="1200" src="https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-916x1200.png" alt="Simile figurative language." class="wp-image-1881" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-916x1200.png 916w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-534x700.png 534w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-768x1006.png 768w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-1173x1536.png 1173w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-1563x2048.png 1563w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Simile figurative language." class="wp-image-1881 lazyload" data-dcnode-id="1019" data-pin-media="https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3.png" data-src="https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-916x1200.png.webp" data-srcset="https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-916x1200.png.webp 916w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-534x700.png.webp 534w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-768x1006.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-1173x1536.png.webp 1173w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-1563x2048.png.webp 1563w" data-trellis-processed="1" data-webp="true" height="1200" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-916x1200.png.webp&amp;raw" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-916x1200.png.webp 916w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-534x700.png.webp 534w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-768x1006.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-1173x1536.png.webp 1173w, https://drawingsof.com/wp-content/uploads/2021/05/Flower_Crown_3-1563x2048.png.webp 1563w" width="916"><figcaption data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Figurative Language Example #1: SIMILE.</span></figcaption></figure><span data-dcnode-id="1015" instrument_node="">
</span><h3 data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">1. </span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Simile</span></strong><span data-dcnode-id="1011" instrument_node="">: </span></h3><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1008" instrument_node="">The </span><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">definition</span></strong><span data-dcnode-id="1005" instrument_node=""> </span><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">of a simile</span></strong><span data-dcnode-id="1002" instrument_node=""> is a phrase that compares two very different things using “like” or “as.” The purpose is to give the reader or listener an interesting new way to visualize the thing that’s being compared. (The key is that the two things have to be very different, and the sentence needs to not be literal. For example, “Zuzu is as tall as Mimi” is NOT a simile because it’s just a literal statement of fact if the girls are both 5’4″ tall.)</span></p><span data-dcnode-id="1000" instrument_node="">
</span><h4 data-dcnode-id="997"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Correct Example of a Simile:</span></strong></h4><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="987"><em data-dcnode-id="988"><span data-dcnode-id="995" instrument_node="">Her hair is </span><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">as</span></strong><span data-dcnode-id="992" instrument_node=""> soft </span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">as</span></strong><span data-dcnode-id="989" instrument_node=""> a cloud, and when I hug her, her curls press softly against my cheek, making me smile.</span></em></p><span data-dcnode-id="986" instrument_node="">
</span><ul data-dcnode-id="983"><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">This is an example of the figurative language called a simile because this woman’s hair is not literally as soft as a cloud (the two things are actually quite different — clouds are just water droplets), but the description gives a vivid image of how fluffy those curls must be.</span></li></ul><span data-dcnode-id="982" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="976"><noscript data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">&lt;img loading="lazy" width="1200" height="1200" src="https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1200x1200.png" alt="Metaphor figurative language." class="wp-image-1882" srcset="https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1200x1200.png 1200w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-700x700.png 700w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-400x400.png 400w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-768x768.png 768w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1536x1536.png 1536w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep.png 2048w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Metaphor figurative language." class="wp-image-1882 lazyload" data-dcnode-id="979" data-pin-media="https://drawingsof.com/wp-content/uploads/2021/05/The_Prep.png" data-src="https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1200x1200.png.webp" data-srcset="https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1200x1200.png.webp 1200w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-700x700.png.webp 700w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-400x400.png.webp 400w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-768x768.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1536x1536.png.webp 1536w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep.png.webp 2048w" data-trellis-processed="1" data-webp="true" height="1200" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/wp-content/uploads/2021/05/The_Prep-1200x1200.png.webp&amp;raw" srcset="https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1200x1200.png.webp 1200w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-700x700.png.webp 700w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-400x400.png.webp 400w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-768x768.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep-1536x1536.png.webp 1536w, https://drawingsof.com/wp-content/uploads/2021/05/The_Prep.png.webp 2048w" width="1200"><figcaption data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Figurative Language Example #2: METAPHOR.</span></figcaption></figure><span data-dcnode-id="975" instrument_node="">
</span><h3 data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">2. </span><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Metaphor</span></strong><span data-dcnode-id="971" instrument_node="">: </span></h3><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="968" instrument_node="">The </span><strong data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">definition</span></strong><span data-dcnode-id="965" instrument_node=""> </span><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">of a metaphor</span></strong><span data-dcnode-id="962" instrument_node=""> is a phrase that compares two very different things WITHOUT using “like” or “as,” in order to give a deeper and more poetic understanding of the thing being compared. (Again, the two things have to be very different, and the sentence needs to not be literal. For example, the sentence “Ms. Marshall is a </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aroundtheworldl.com/famous-architecture-buildings/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="961" instrument_node="">travel photographer</span></a><span data-dcnode-id="959" instrument_node="">” is NOT a metaphor because it’s just a literal, documented statement of the fact that I travel and take photographs around the world — and enjoy it, too!)</span></p><span data-dcnode-id="957" instrument_node="">
</span><h4 data-dcnode-id="951"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Correct</span></strong><span data-dcnode-id="954" instrument_node=""> </span><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Example of a Metaphor:</span></strong></h4><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="947"><em data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">After weightlifting five times a day for a year, my muscles are now bulging boulders.</span></em></p><span data-dcnode-id="946" instrument_node="">
</span><ul data-dcnode-id="943"><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">This is an example of the figurative language called a metaphor because my muscles are not literally now made of rock (my biceps would puncture if you poked them with a sharp stick, whereas a boulder would not), however the description provides a powerful message about the effects of weightlifting on my strength and physique.</span></li></ul><span data-dcnode-id="942" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="936"><noscript data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">&lt;img loading="lazy" width="943" height="1200" src="https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-943x1200.png" alt="Hyperbole figurative language." class="wp-image-1884" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-943x1200.png 943w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-550x700.png 550w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-768x977.png 768w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-1207x1536.png 1207w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-1609x2048.png 1609w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole.png 2048w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Hyperbole figurative language." class="wp-image-1884 lazyload" data-dcnode-id="939" data-pin-media="https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole.png" data-src="https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-943x1200.png.webp" data-srcset="https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-943x1200.png.webp 943w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-550x700.png.webp 550w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-768x977.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-1207x1536.png.webp 1207w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-1609x2048.png.webp 1609w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole.png.webp 2048w" data-trellis-processed="1" data-webp="true" height="1200" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/wp-content/uploads/2021/05/Hyperbole-943x1200.png.webp&amp;raw" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-943x1200.png.webp 943w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-550x700.png.webp 550w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-768x977.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-1207x1536.png.webp 1207w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole-1609x2048.png.webp 1609w, https://drawingsof.com/wp-content/uploads/2021/05/Hyperbole.png.webp 2048w" width="943"><figcaption data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Figurative Language Example #3: HYPERBOLE.</span></figcaption></figure><span data-dcnode-id="935" instrument_node="">
</span><h3 data-dcnode-id="930"><span data-dcnode-id="934" instrument_node="">3. </span><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Hyperbole</span></strong><span data-dcnode-id="931" instrument_node="">: </span></h3><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="928" instrument_node="">The </span><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">definition</span></strong><span data-dcnode-id="925" instrument_node=""> </span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">of a hyperbole</span></strong><span data-dcnode-id="922" instrument_node=""> is a phrase that exaggerates the truth. It states something in such an extreme way that it’s often comically over-the-top. It’s important to be able to spot that this is figurative language, because if you took hyperbole literally, it would be shocking and inaccurate!</span></p><span data-dcnode-id="920" instrument_node="">
</span><h4 data-dcnode-id="914"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Correct</span></strong><span data-dcnode-id="917" instrument_node=""> </span><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Example of a Hyperbole:</span></strong></h4><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="912" instrument_node="">“</span><em data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">I’m so hungry, I could eat everything in this entire supermarket!”</span></em></p><span data-dcnode-id="908" instrument_node="">
</span><ul data-dcnode-id="905"><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">This is an example of the figurative language called hyperbole because if you literally ate everything in a supermarket, you would burst. This is an exaggeration meant to over-dramatically convey how ravenous this person is — to comical effect. </span></li></ul><span data-dcnode-id="904" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="898"><noscript data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">&lt;img loading="lazy" width="875" height="1200" src="https://drawingsof.com/wp-content/uploads/2021/05/Personification_-875x1200.png" alt="Personification figurative language." class="wp-image-1883" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Personification_-875x1200.png 875w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-510x700.png 510w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-768x1053.png 768w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-1120x1536.png 1120w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-1493x2048.png 1493w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_.png 1866w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Personification figurative language." class="wp-image-1883 lazyload" data-dcnode-id="901" data-pin-media="https://drawingsof.com/wp-content/uploads/2021/05/Personification_.png" data-src="https://drawingsof.com/wp-content/uploads/2021/05/Personification_-875x1200.png.webp" data-srcset="https://drawingsof.com/wp-content/uploads/2021/05/Personification_-875x1200.png.webp 875w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-510x700.png.webp 510w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-768x1053.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-1120x1536.png.webp 1120w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-1493x2048.png.webp 1493w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_.png.webp 1866w" data-trellis-processed="1" data-webp="true" height="1200" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/wp-content/uploads/2021/05/Personification_-875x1200.png.webp&amp;raw" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Personification_-875x1200.png.webp 875w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-510x700.png.webp 510w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-768x1053.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-1120x1536.png.webp 1120w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_-1493x2048.png.webp 1493w, https://drawingsof.com/wp-content/uploads/2021/05/Personification_.png.webp 1866w" width="875"><figcaption data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Figurative Language Example #4: PERSONIFICATION.</span></figcaption></figure><span data-dcnode-id="897" instrument_node="">
</span><h3 data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">4. </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Personification</span></strong><span data-dcnode-id="893" instrument_node="">: </span></h3><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="890" instrument_node="">The </span><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">definition</span></strong><span data-dcnode-id="887" instrument_node=""> </span><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">of personification</span></strong><span data-dcnode-id="884" instrument_node=""> is a phrase in which something that is not human is described with human-like characteristics. This type of figurative language can help create a vivid scene, but again should not be taken literally because, well, non-human things can’t actually do the things personification has them do. It would be creepy if they did. </span></p><span data-dcnode-id="882" instrument_node="">
</span><h4 data-dcnode-id="876"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Correct</span></strong><span data-dcnode-id="879" instrument_node=""> </span><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Example of Personification:</span></strong></h4><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="872"><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The rain ripped the leaves off the trees, thundering with wild laughter as it destroyed the forest.</span></em></p><span data-dcnode-id="871" instrument_node="">
</span><ul data-dcnode-id="868"><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">This is an example of the figurative language called personification because the rain is not a human — it doesn’t literally have hands to rip leaves, and it doesn’t have emotions, or a mouth to laugh maniacally! However, this poetic description helps the reader visualize the dramatically destructive scene.</span></li></ul><span data-dcnode-id="867" instrument_node="">

s/2021/05/Ono_5-1198x1536.png.webp 1198w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-1598x2048.png.webp 1598w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-735x942.png.webp 735w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-261x335.png.webp 261w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-271x347.png.webp 271w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-406x520.png.webp 406w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-499x640.png.webp 499w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-599x768.png.webp 599w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-749x960.png.webp 749w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-842x1080.png.webp 842w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5.png.webp 1997w" data-trellis-processed="1" data-webp="true" height="1200" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/wp-content/uploads/2021/05/Ono_5-936x1200.png.webp&amp;raw" srcset="https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-936x1200.png.webp 936w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-546x700.png.webp 546w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-768x984.png.webp 768w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-1198x1536.png.webp 1198w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-1598x2048.png.webp 1598w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-735x942.png.webp 735w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-261x335.png.webp 261w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-271x347.png.webp 271w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-406x520.png.webp 406w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-499x640.png.webp 499w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-599x768.png.webp 599w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-749x960.png.webp 749w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5-842x1080.png.webp 842w, https://drawingsof.com/wp-content/uploads/2021/05/Ono_5.png.webp 1997w" width="936"><figcaption data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Figurative Language Example #5: ONOMATOPOEIA.</span></figcaption></figure><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">5. </span><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Onomatopoeia</span></strong><span data-dcnode-id="856" instrument_node="">: </span></h3><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="853" instrument_node="">The </span><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">definition</span></strong><span data-dcnode-id="850" instrument_node=""> </span><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">of onomatopoeia</span></strong><span data-dcnode-id="847" instrument_node=""> is… sound effect words! This type of figurative language encompasses the written-out version of sounds, such as animal or machine noises. It’s extremely fun to use and to say! </span></p><span data-dcnode-id="845" instrument_node="">
</span><h4 data-dcnode-id="836"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Correct</span></strong><span data-dcnode-id="842" instrument_node=""> </span><strong data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">Examples of </span><strong data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Onomatopoeia</span></strong><span data-dcnode-id="838" instrument_node="">:</span></strong></h4><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="829"><em data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">POP! CRASH! WOOF! BANG! ZAP! </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/aww-or-awe-cartoon-definition/"><span data-dcnode-id="833" instrument_node="">AWW</span></a><span data-dcnode-id="831" instrument_node="">! ARGH! POOF! </span></em></p><span data-dcnode-id="828" instrument_node="">
</span><ul data-dcnode-id="822"><li data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">Enjoying these samples of the figurative language type called onomatopoeia? I actually have an entire article dedicated to understanding this fabulous word better (including spelling tips and pronunciation), so pop on over to “</span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/onomatopoeia-examples-words-art/"><span data-dcnode-id="826" instrument_node="">Onomatopoeia Examples and Word List</span></a><span data-dcnode-id="824" instrument_node="">!”</span></li></ul><span data-dcnode-id="821" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">When to Use Figurative Language</span></h2><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">Getting the hang of the wonderful world of figurative language? Good! Now the question is: when should you use it? Well, the purpose of </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drawingsof.com/literary-devices-terms-words-list/"><span data-dcnode-id="816" instrument_node="">literary devices</span></a><span data-dcnode-id="814" instrument_node=""> like figurative language is to make your writing or speech more intriguing and artful, so use similes, metaphors, and so on whenever you want to add some pizzazz and pop to your prose or poetry. </span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">When should you NOT use figurative language? Use these literary devices sparingly if you’re speaking with someone who needs a clear, direct answer — aka, a lover of the literal — or a person who is still in the process of learning English, who may therefore misunderstand figures of speech. In other words, do not use the hyperbole, “I’m so hungry that I could eat a horse!” with someone who might then go out and cook you a horse to consume.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="808" instrument_node="">So what about you? What’s YOUR take on figurative language? Which is your favorite type, and how do you like to use it?</span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node=""> Do share!</span></strong></p><span data-dcnode-id="804" instrument_node="">
