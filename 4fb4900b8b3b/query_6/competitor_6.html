</span><div class="html" data-dcnode-id="1397"><h2 data-dcnode-id="1431"><strong data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Idiom&nbsp;</span></strong></h2><p data-dcnode-id="1425"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">idiom, idiomatic expression, phrasal idiom, set phrase, phrase - n</span></strong><span data-dcnode-id="1428" instrument_node="">&nbsp;</span><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node="">an expression whose meanings cannot be inferred from the meanings of the words that make it up; an expression peculiar to a language&nbsp;</span></p><p data-dcnode-id="1422"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wordplays.com/definition/IDIOM"><span data-dcnode-id="1424" instrument_node="">Wordplays</span></a></p><p data-dcnode-id="1414"><span data-dcnode-id="1421" instrument_node="">An&nbsp;</span><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">idiom&nbsp;</span></strong><span data-dcnode-id="1418" instrument_node="">is a form of expression that is particular to a certain person or group of people. If your friend always says, "squirrelly nuteriffic!" when she means something is great, she's using her own&nbsp;</span><i data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">idiom</span></i><span data-dcnode-id="1415" instrument_node="">.</span></p><p data-dcnode-id="1398"><i data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Idiom</span></i><span data-dcnode-id="1411" instrument_node="">&nbsp;comes from the Greek&nbsp;</span><i data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">idios</span></i><span data-dcnode-id="1408" instrument_node="">, which means personal.&nbsp;</span><i data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Idiom</span></i><span data-dcnode-id="1405" instrument_node="">&nbsp;originally meant "speech peculiar or proper to a people or country." These days we use&nbsp;</span><i data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">idiom</span></i><span data-dcnode-id="1402" instrument_node="">&nbsp;for a specialized vocabulary or an expression that isn't obvious, like&nbsp;</span><i data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">kick the bucket</span></i><span data-dcnode-id="1399" instrument_node="">&nbsp;which means "die." If you're studying a foreign language, idioms are the hardest phrases to translate.</span></p></div><span data-dcnode-id="1396" instrument_node="">

</span><h4 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Quick Help</span></h4><span data-dcnode-id="538" instrument_node="">
</span><div class="intro" data-dcnode-id="504"><span data-dcnode-id="537" instrument_node="">

      Enter the crossword clue and click "Find" to search for
      answers to crossword puzzle clues. Crossword answers are sorted by
      relevance and can be sorted by length as well. Check "Sort by Length"
      to sort crossword answers by length.

      </span><br data-dcnode-id="536"><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">

      Optionally specify the length of the crossword answer and
      provide any known letters in "# of Letters or Pattern".

      </span><br data-dcnode-id="533"><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">

      If many answers are found, try entering the answer length or
      pattern for better results.

      
	
      

      </span><br data-dcnode-id="530"><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">

      If the answer is not found, click "NO" when asked "Was the Clue
      Answered?". Provide information about the clue including
      the </span><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Date &amp; Publication</span></strong><span data-dcnode-id="525" instrument_node=""> where the clue was found and
      we'll research the clue.

      </span><br data-dcnode-id="524"><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">

      Use the handy Anagrammer tool to find anagrams in clues and the Roman
      Numeral tool for converting Arabic number to Roman and vice-versa.
