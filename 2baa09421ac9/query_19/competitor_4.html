</span><div class="bubBody" data-dcnode-id="2627" id="bubBody"><span data-dcnode-id="2772" instrument_node="">
</span><div data-dcnode-id="2768" id="stewartHead"><span data-dcnode-id="2771" instrument_node="">
</span><img alt="Don Stewart" class="mast" data-dcnode-id="2770" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blb.s3.us-central-1.terrahost.no/images/comms/stewart_don.jpg&amp;raw"><span data-dcnode-id="2769" instrument_node="">
</span></div><span data-dcnode-id="2767" instrument_node="">
</span><div data-dcnode-id="2633" id="stewartData"><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">
    In the first chapter of Colossians Paul makes the following statement about Jesus.
</span></p><span data-dcnode-id="2763" instrument_node="">
</span><blockquote data-dcnode-id="2755"><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2761" instrument_node="">
        And he is the image of the invisible God, the firstborn of all creation (</span><a class="nowrap" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/col/1/15/s_1108015"><span data-dcnode-id="2760" instrument_node="">Colossians 1:15</span></a><span data-dcnode-id="2758" instrument_node="">).
    </span></p><span data-dcnode-id="2756" instrument_node="">
</span></blockquote><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">
    It has been alleged that firstborn means that Jesus was the first creation of God. Does this mean that Jesus Christ was a created being?
</span></p><span data-dcnode-id="2751" instrument_node="">
The Word Can Mean A Number Of Different Things 
</span><p data-dcnode-id="2746"><span data-dcnode-id="2750" instrument_node="">
    The Greek word </span><em data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">prototokos</span></em><span data-dcnode-id="2747" instrument_node="">, which is translated as firstborn, can refer to different things. It could refer either to something or someone that is first in order of time, such as a firstborn child, or it could refer to someone who is preeminent in rank. Or it could refer to someone who was both firstborn and preeminent in rank. It all depends upon the context.
</span></p><span data-dcnode-id="2745" instrument_node="">
David, The Youngest Son, Was Called The Firstborn 
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">
    The psalmist gives a description of David as being the firstborn. The Lord said of him.
</span></p><span data-dcnode-id="2742" instrument_node="">
</span><blockquote data-dcnode-id="2734"><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2740" instrument_node="">
        I will also appoint him my firstborn, the most exalted of the kings of the earth (</span><a class="nowrap" data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/psa/89/27/s_567027"><span data-dcnode-id="2739" instrument_node="">Psalm 89:27</span></a><span data-dcnode-id="2737" instrument_node="">).
    </span></p><span data-dcnode-id="2735" instrument_node="">
</span></blockquote><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">
    In this example the term firstborn obviously speaks of preeminence in rank. David was preeminent among the kings of Israel. However he was not the oldest, or firstborn, in his family. David was in fact the youngest. Therefore in this context, the idea of firstborn among the kings has the idea of preeminence and does not have the idea of time.
</span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2725"><span data-dcnode-id="2729" instrument_node="">
</span><strong data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">It Has The Idea Of Preeminence In The Book Of Colossians</span></strong><span data-dcnode-id="2726" instrument_node="">
</span></p><span data-dcnode-id="2724" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">
    In the passage in Colossians the idea of Jesus as firstborn means that He is preeminent over creation not that He is a created being. This can be seen from the verses that follow.
</span></p><span data-dcnode-id="2721" instrument_node="">
</span><blockquote data-dcnode-id="2710"><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2719" instrument_node="">
        For by him all things were created: things in heaven and on earth, visible and invisible, whether thrones or powers or rulers or authorities; all things were created by him and for him. He is before all things, and in him all things hold together (</span><a class="nowrap" data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/col/1/16/s_1108016"><span data-dcnode-id="2718" instrument_node="">Colossians 1:16</span></a><span data-dcnode-id="2716" instrument_node="">,</span><a class="nowrap" data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/col/1/17/s_1108017"><span data-dcnode-id="2715" instrument_node="">17</span></a><span data-dcnode-id="2713" instrument_node="">).
    </span></p><span data-dcnode-id="2711" instrument_node="">
</span></blockquote><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">
    Jesus is clearly called the Creator of all things. Consequently He could not have been the first thing created.
</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2705" instrument_node="">
</span><strong data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Jesus Has Preeminence Over The Dead</span></strong><span data-dcnode-id="2702" instrument_node="">
</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">
    Jesus is also called the firstborn from the dead.
</span></p><span data-dcnode-id="2697" instrument_node="">
</span><blockquote data-dcnode-id="2689"><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2695" instrument_node="">
        And from Jesus Christ, who is the faithful witness, the firstborn from the dead, and the ruler of the kings of the earth (</span><a class="nowrap" data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/rev/1/5/s_1168005"><span data-dcnode-id="2694" instrument_node="">Revelation 1:5</span></a><span data-dcnode-id="2692" instrument_node="">).
    </span></p><span data-dcnode-id="2690" instrument_node="">
</span></blockquote><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">
    Jesus was the first person in time to come back from the dead never to die again. In addition, He is preeminent over the dead and death itself. Jesus said that He has the keys, or the authority, to death and Hades.
</span></p><span data-dcnode-id="2685" instrument_node="">
</span><blockquote data-dcnode-id="2677"><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2679"><span data-dcnode-id="2683" instrument_node="">
        I was dead, and behold, I am alive forevermore, and I have the keys of death and of Hades (</span><a class="nowrap" data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/rev/1/18/s_1168018"><span data-dcnode-id="2682" instrument_node="">Revelation 1:18</span></a><span data-dcnode-id="2680" instrument_node="">).
    </span></p><span data-dcnode-id="2678" instrument_node="">
</span></blockquote><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2675" instrument_node="">
</span><strong data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Jesus Is The Firstborn Over All Creation</span></strong><span data-dcnode-id="2672" instrument_node="">
</span></p><span data-dcnode-id="2670" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2669" instrument_node="">
    There is one final thing. </span><a class="nowrap" data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/col/1/15/s_1108015"><span data-dcnode-id="2668" instrument_node="">Colossians 1:15</span></a><span data-dcnode-id="2666" instrument_node=""> could be better translated in the following manner.
</span></p><span data-dcnode-id="2664" instrument_node="">
</span><blockquote data-dcnode-id="2656"><span data-dcnode-id="2663" instrument_node="">
</span><p data-dcnode-id="2658"><span data-dcnode-id="2662" instrument_node="">
        And he is the image of the invisible God, the firstborn over all creation (</span><a class="nowrap" data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueletterbible.org/kjv/col/1/15/s_1108015"><span data-dcnode-id="2661" instrument_node="">Colossians 1:15</span></a><span data-dcnode-id="2659" instrument_node="">).
    </span></p><span data-dcnode-id="2657" instrument_node="">
</span></blockquote><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">
    This translation emphasizes that Jesus is preeminent "over" His creation. This is to be preferred to the translation of "the firstborn of all creation" which gives the impression that Jesus is a created being.
</span></p><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2651" instrument_node="">
</span><strong data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Summary</span></strong><span data-dcnode-id="2648" instrument_node="">
</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">
    Jesus is called the firstborn of all creation. This does not mean that He is a created being. The idea is that Jesus has preeminence over all creation.
</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">
    The word translated, "firstborn" can refer to preeminence in rank or preeminence in time. The context will determine. In the Psalms David is called the "firstborn" among the kings even though he was the youngest son of his father. In this context, firstborn can only refer to rank.
</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">
    Jesus is called the firstborn in the sense that He is over all of creation. This is made clear by the following verses in which it says that He is the Creator. Therefore a better translation would be that Jesus is the firstborn, "over all of creation."
</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">
    Consequently there is no idea here of Jesus being someone who was created.
</span></p><span data-dcnode-id="2634" instrument_node="">
</span></div><span data-dcnode-id="2632" instrument_node="">
