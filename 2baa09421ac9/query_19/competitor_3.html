</span><article class="content engage" data-dcnode-id="321"><span data-dcnode-id="1123" instrument_node="">
</span><div class="main-column" data-dcnode-id="452"><span data-dcnode-id="1122" instrument_node="">
</span><h1 data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Can we believe the Bible's miracles?</span></h1><span data-dcnode-id="1119" instrument_node="">
</span><p class="lead" data-dcnode-id="1108"><span data-dcnode-id="1118" instrument_node="">Have you ever been embarrassed by the miracles in the Bible? Have you winced at the thought of defending them? How about the account of creation,</span><a class="endnote" data-dcnode-id="1116" data-tooltip-content="#edn-content-1" href="#_edn1" name="_ednref1" title=""><span data-dcnode-id="1117" instrument_node="">[1]</span></a><span data-dcnode-id="1115" instrument_node=""> the ten plagues of the Exodus,</span><a class="endnote" data-dcnode-id="1113" href="#_edn2" name="_ednref2" title=""><span data-dcnode-id="1114" instrument_node="">[2]</span></a><span data-dcnode-id="1112" instrument_node=""> the day the sun stood still,</span><a class="endnote" data-dcnode-id="1110" href="#_edn3" name="_ednref3" title=""><span data-dcnode-id="1111" instrument_node="">[3]</span></a><span data-dcnode-id="1109" instrument_node=""> or perhaps some of the healing miracles of Jesus?</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The theologian Rudolph Bultmann (1884-1976) tried to ‘demythologise’ the teaching of Jesus by stripping away the miraculous. He went so far as to say:</span></p><span data-dcnode-id="1104" instrument_node="">
</span><blockquote data-dcnode-id="1095"><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1097"><em data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">It is impossible to use electric light and the wireless and to avail ourselves of modern medical and surgical discoveries, and at the same time to believe in the New Testament world of spirits and miracles</span></em><span data-dcnode-id="1100" instrument_node="">.</span><a class="endnote" data-dcnode-id="1098" href="#_edn4" name="_ednref4" title=""><span data-dcnode-id="1099" instrument_node="">[4]</span></a></p><span data-dcnode-id="1096" instrument_node="">
</span></blockquote><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">This belief is really what is in the minds of most modern western people when they discount the possibility of miracles. As far as they are concerned, the Bible was written in a prescientific age when many natural phenomena (eg thunder, lightning, earthquakes) were attributed to direct divine action. We now know that there are perfectly natural explanations for these and many other phenomena. People in Bible times may have been more willing to believe miracle stories, but that is indefensible today. So the story goes…</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1090" instrument_node="">For Christian medical students and doctors the issue is a live one. How do we treat the miraculous healings and events of the Bible? Do we believe in miraculous healing today? These are very pertinent questions to which we need a clear answer, not least because to deny the miraculous is to deny God himself. If miracles did not happen, then the resurrection did not happen and our faith is therefore in vain.</span><a class="endnote" data-dcnode-id="1088" href="#_edn5" name="_ednref5" title=""><span data-dcnode-id="1089" instrument_node="">[5]</span></a></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Before going any further, we should define our terms. A miracle is any event that cannot be explained by natural processes or phenomena and which requires a supernatural agent to perform it.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><h2 data-dcnode-id="1079"><span data-dcnode-id="1082" instrument_node="">Historical background </span><a class="endnote" data-dcnode-id="1080" href="#_edn6" name="_ednref6" title=""><span data-dcnode-id="1081" instrument_node="">[6]</span></a></h2><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">For many centuries, most Europeans believed in the intervention of supernatural forces, whether God or lesser beings, such as angels and demons. However, with the rise of the Enlightenment in Europe during the 17th century, this thinking changed dramatically.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Isaac Newton (1643-1727) formed his laws of motion and promoted the idea that what goes on in the world is simply a matter of cause and effect, with everything following very strict rules. This was part of the background for the rise of deism, a philosophical worldview that involved belief in a personal God who created the universe, but later withdrew, leaving it to run automatically like a great clockwork contraption, without him ever interfering again. This meant that miracles were impossible because God was thought never to intervene.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><h3 data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Spinoza</span></h3><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">One of the main proponents of deism was Benedict (Baruch) Spinoza (1632-1677) and he was a passionate opponent of the miraculous. He based this on two main lines of attack:</span></p><span data-dcnode-id="1066" instrument_node="">
</span><h4 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">i) The unchangeable order of nature</span></h4><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Spinoza held that God’s understanding and his will were one and the same, that both were unchanging and eternal and that the laws of nature flowed out from these. Thus for a miracle to occur that defied the laws of nature, this would indicate some essential change in the nature of God, which was impossible.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><h4 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">ii) The need for certainty</span></h4><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">He also maintained that a proof of God’s existence must be absolutely certain. For him, the constancy of the natural world and its processes was proof of God’s existence, and therefore if miracles disturbed this order they cast doubt on God’s existence and led us towards atheism!</span></p><span data-dcnode-id="1054" instrument_node="">
</span><h3 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Hume</span></h3><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">David Hume (1711-1776) took a different approach but was just as vehement in his opposition to miracles. He again had two main arguments:</span></p><span data-dcnode-id="1048" instrument_node="">
</span><h4 data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">i) Miracles are impossible to prove in principle</span></h4><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Belief should be proportionate to evidence. For Hume, the evidence of the unchangeability of the natural order was absolute, so that even if, for the sake of argument, absolute proof could be given for the occurrence of a certain miracle, this would at best equal the opposing evidence and mean that a miracle could not be asserted with any certainty.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><h4 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">ii) The evidence for miracles is actually weak</span></h4><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Despite his concessions above, Hume maintained that the evidence for miracles was not even enough to make them probable, let alone certain. He cited four reasons for this: a lack of sufficient credible witnesses, the tendency of people to believe extraordinary stories, miracles occurring only amongst uncivilised peoples, and miracles occurring in all religions and therefore not supporting one religion’s truth claims over another.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">He held that Christianity required faith, but could not be believed by anyone on the basis of reason.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Answering the deists</span></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Although history generally assumes that these propositions were unanswerable, this betrays an ignorance of the sophisticated and cogent replies that were given by Christians at the time.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1026" instrument_node="">In answer to Spinoza, Jacob Vernet wrote that only experience leads us to believe that nature is unchangeable, but that this does not give us any reason to think it cannot change. Natural events depend on the will of God, who can make exceptions to the general order of things if and when he chooses. The course of nature ‘is not the effect of a blind necessity but of a free Cause who interrupts and suspends it when He pleases.’</span><a class="endnote" data-dcnode-id="1024" href="#_edn7" name="_ednref7" title=""><span data-dcnode-id="1025" instrument_node="">[7]</span></a></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Claude Francois Houtteville rejoined that natural law is not a necessary extension of God’s nature, but that he is free to establish it in whatever way he chooses. Furthermore, he could change his laws if he wanted to.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node="">Hume had the misfortune of being comprehensively rebutted by William Paley, whose </span><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">A View of the Evidences of Christianity</span></em><span data-dcnode-id="1015" instrument_node=""> was so influential that it was compulsory reading for Cambridge University applicants until the 20th century! Against Hume’s first argument, Paley responded that the unchangeability of the natural order was far from proven. Even if our own limited experience leads us to believe that nature operates uniformly, this is a far cry from saying that universal experience absolutely denies the miraculous. To claim as much is begging the question (ie assuming the answer to a question without making any attempt to prove it), for which finite being can legitimately appeal to ‘universal experience’? It stands to reason that if God exists he would want to reveal himself, and use the miraculous to do it. If he used certain miracles to authenticate his revelation (eg at the inauguration of Christianity), this would be quite consistent with us not seeing the same miracles today, as they were for a particular purpose at a particular time.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">In response to Hume’s supposed lack of evidence for miracles, Paley agreed that much care is needed in treating claims of the miraculous. However, he stressed the need to see such claims in their theological and historical context. When seen this way, he said, the miracles of the gospels are without parallel and the evidence is excellent. We will return to this later.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">The above summary is useful to see something of how western society began to turn away from belief in the miraculous. Of course, many of our peers in medicine today are not deists but naturalists; they no longer believe in a remote God who set the universe running and watches from afar, but rather deny the existence of God altogether.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><h2 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Contemporary Questions</span></h2><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Very few of our friends will quote Spinoza or Hume, although their thinking has had a profound influence. The alternative explanations for miracles we get today are phrased differently.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h3 data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">'Miracles have natural explanations'</span></h3><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="997" instrument_node="">Some events in the Bible are now known to have natural causes, or at least natural causes can be suggested. The rainbow after the flood was said to be a sign from God,</span><a class="endnote" data-dcnode-id="995" href="#_edn8" name="_ednref8" title=""><span data-dcnode-id="996" instrument_node="">[8]</span></a><span data-dcnode-id="994" instrument_node=""> yet we know that rainbows are caused by the refraction of light through water drops in the atmosphere. Other suggestions include Sodom and Gomorrah being destroyed by a volcano,</span><a class="endnote" data-dcnode-id="992" href="#_edn9" name="_ednref9" title=""><span data-dcnode-id="993" instrument_node="">[9]</span></a><span data-dcnode-id="991" instrument_node=""> the Red Sea parting because of a strong wind</span><a class="endnote" data-dcnode-id="989" href="#_edn10" name="_ednref10" title=""><span data-dcnode-id="990" instrument_node="">[10]</span></a><span data-dcnode-id="988" instrument_node=""> or the Jordan river drying up because of a landslide.</span><a class="endnote" data-dcnode-id="986" href="#_edn11" name="_ednref11" title=""><span data-dcnode-id="987" instrument_node="">[11]</span></a></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="983" instrument_node="">But natural explanations in no way discount God’s activity. The Bible presents God as the sustainer of the universe</span><a class="endnote" data-dcnode-id="981" href="#_edn12" name="_ednref12" title=""><span data-dcnode-id="982" instrument_node="">[12]</span></a><span data-dcnode-id="980" instrument_node=""> who covers the sky with clouds, supplies the earth with rain, makes the grass grow and sends the snow, frost, hail and breezes.</span><a class="endnote" data-dcnode-id="978" href="#_edn13" name="_ednref13" title=""><span data-dcnode-id="979" instrument_node="">[13]</span></a><span data-dcnode-id="977" instrument_node=""> God works in and through natural events and they are part of his providence, his general rather than specific activity.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Where there may be a natural explanation for miraculous events, often the timing points to God’s activity and oversight. The destruction of Sodom and Gomorrah, the parting of the Red Sea and the drying up of the Jordan river came at exactly the right time to demonstrate God’s power in judging evil or guiding and protecting his people. Another example is that of the coin found in the fish’s mouth.</span><a class="endnote" data-dcnode-id="972" href="#_edn14" name="_ednref14" title=""><span data-dcnode-id="973" instrument_node="">[14]</span></a><span data-dcnode-id="971" instrument_node=""> There is a fish in the Sea of Galilee to this day known as St Peter’s fish. Eaten locally, they are often caught with objects such as bottle caps or coins in their mouths. This in itself was not miraculous; the striking part was that the very first fish pulled out by Peter after Jesus’ instruction should be the right kind with the right coin in its mouth.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="968" instrument_node="">Despite possible ‘natural’ causes for some events, there are many biblical miracles where there can be no natural explanation. A stick turning into a snake,</span><a class="endnote" data-dcnode-id="966" href="#_edn15" name="_ednref15" title=""><span data-dcnode-id="967" instrument_node="">[15]</span></a><span data-dcnode-id="965" instrument_node=""> an iron axe-head floating</span><a class="endnote" data-dcnode-id="963" href="#_edn16" name="_ednref16" title=""><span data-dcnode-id="964" instrument_node="">[16]</span></a><span data-dcnode-id="962" instrument_node=""> and of course the resurrection of Jesus’ body after a grisly execution and around 36 hours in a tomb. These cannot be explained away as coincidences and if true are clearly supernatural events.</span></p><span data-dcnode-id="960" instrument_node="">
</span><h3 data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">'Miracles break the laws of nature'</span></h3><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">This argument, favoured by the deists, is also often used today. Yet it is based on a misunderstanding. Scientific observation records the way that things usually operate, and theories and laws are built up around this. Often these need to be modified in the light of later observations. For example, Einstein’s theory of relativity explained the behaviour of small particles moving near the speed of light in a way that Newton’s laws of motion could not. A single fact can disprove a well established theory.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">But it is a great leap of faith to argue that because things normally happen a certain way, they can only happen that way. Talk of laws implies the presence of a lawgiver, and if laws are established by a supernatural agent, then they could also be modified or temporarily suspended for a purpose.</span></p><span data-dcnode-id="951" instrument_node="">
</span><h3 data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">‘I’ve never seen a miracle’</span></h3><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Miracles should be rare events by their very nature. It’s therefore not surprising if we have never witnessed one ourselves. But should this make us doubt their existence? I have never seen a case of Weil’s disease, but when a man came to me in the emergency department, complaining of some of the symptoms and informing me that he worked near rat-infested water, I was obliged to include it in my differential diagnosis! I trusted my medical textbooks that such a disease existed despite my having no experience of it. In the end he turned out not to have it, but I would have been foolish to deny the possibility.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Likewise with miracles, we should weigh the testimony of those who claim to have experienced one and not discount it because we weren’t there. It would be foolish for a Somalian woman to deny that snow existed just because she had never seen it in her village!</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">We spend much of our lives accepting the testimony of other people about events or facts that we cannot verify ourselves. If a claim seems unusual or extraordinary, that should of course make us cautious before accepting it, but if the evidence is sound then we are obliged to take it seriously.</span></p><span data-dcnode-id="939" instrument_node="">
</span><h3 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">'There’s no evidence for miracles'</span></h3><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Once the other objections are cleared away, this is what it really all comes down to. If God actually exists then miracles must be possible, even probable. Our problem then becomes, how do we establish in a given situation if a miracle has occurred; specifically how should a sincere non-believer investigate the miracle claims of the Bible?</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">Closely related to the issue of evidence for biblical miracles is that of biblical authority and reliability. It is unreasonable to ask a non-believer to begin by treating the Bible or the Gospels as the written Word of God. But it is entirely reasonable to ask them to treat the Bible as a highly reliable source of ancient history. The evidence to support the historicity and trustworthiness of the Bible is such that seriously to doubt the Bible on historical grounds would lead to rejecting virtually all ancient historical documents, as the Bible (particularly the New Testament) has far better manuscripts and supporting evidence than any other comparable ancient documents.</span><a class="endnote" data-dcnode-id="930" href="#_edn17" name="_ednref17" title=""><span data-dcnode-id="931" instrument_node="">[17]</span></a><span data-dcnode-id="929" instrument_node=""> Once the Bible is accepted as trustworthy history, then the evidence can be looked at fairly.</span></p><span data-dcnode-id="927" instrument_node="">
</span><h2 data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Evidence for the Resurrection</span></h2><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">A natural place to begin is by examining the evidence for the resurrection of Jesus. This is one of the chief miracles of Christianity (along with the incarnation, where God became man in Jesus) and as Paul reminds us, our faith stands or falls on this.</span><a class="endnote" data-dcnode-id="921" href="#_edn18" name="_ednref18" title=""><span data-dcnode-id="922" instrument_node="">[18]</span></a><span data-dcnode-id="920" instrument_node=""> It receives ample coverage in the New Testament and can therefore be closely examined from several different angles. Although the resurrection appears incredible, it is based on very solid evidence.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="917" instrument_node="">First, no-one disputed the fact that Jesus died on the cross. He was seen to breathe his last by eye-witnesses,</span><a class="endnote" data-dcnode-id="915" href="#_edn19" name="_ednref19" title=""><span data-dcnode-id="916" instrument_node="">[19]</span></a><span data-dcnode-id="914" instrument_node=""> and was certified dead by Roman soldiers whose very business was killing.</span><a class="endnote" data-dcnode-id="912" href="#_edn20" name="_ednref20" title=""><span data-dcnode-id="913" instrument_node="">[20]</span></a><span data-dcnode-id="911" instrument_node=""> They decided not to break Jesus’ legs (customary practice to hasten death in crucifixion), because they were convinced he was dead already;</span><a class="endnote" data-dcnode-id="909" href="#_edn21" name="_ednref21" title=""><span data-dcnode-id="910" instrument_node="">[21]</span></a><span data-dcnode-id="908" instrument_node=""> and this was confirmed by the observation of ‘blood and water’ (separated cells and serum) coming from his pierced side.</span><a class="endnote" data-dcnode-id="906" href="#_edn22" name="_ednref22" title=""><span data-dcnode-id="907" instrument_node="">[22]</span></a><span data-dcnode-id="905" instrument_node=""> This only occurs as a post-mortem event.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The so-called ‘swoon’ theory, that Jesus may have only fainted and then revived in the cool of the tomb, is much more difficult to substantiate. It involves believing that a man beaten to within an inch of his life, impaled on a cross and then wrapped in 75lb of bandages and spices (rather like a plaster cast) could somehow unwrap himself, push away a one ton boulder, single-handedly overcome an armed guard and then persuade over 500 others that he had conquered death. The foolishness of this position is evidenced by the fact that no-one dared suggest the possibility until centuries later. Would Christ, the model of integrity, really deceive his followers by claiming he had risen when he knew he hadn’t? Apart from the testimony of eye-witnesses, no secular historian at the time (eg Josephus, Pliny, Tacitus and Lucian) doubted that Jesus died.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="899" instrument_node="">Second, the body was gone. If the Jews had removed it (Mary’s immediate assumption)</span><a class="endnote" data-dcnode-id="897" href="#_edn23" name="_ednref23" title=""><span data-dcnode-id="898" instrument_node="">[23]</span></a><span data-dcnode-id="896" instrument_node=""> then they would simply have reproduced it at the first rumour of resurrection. If the disciples had removed it, they would not have subsequently been prepared to die for what they knew had not happened. In any case, the tomb was heavily guarded,</span><a class="endnote" data-dcnode-id="894" href="#_edn24" name="_ednref24" title=""><span data-dcnode-id="895" instrument_node="">[24]</span></a><span data-dcnode-id="893" instrument_node=""> and they had all run for their lives when Jesus was arrested.</span><a class="endnote" data-dcnode-id="891" href="#_edn25" name="_ednref25" title=""><span data-dcnode-id="892" instrument_node="">[25]</span></a><span data-dcnode-id="890" instrument_node=""> Pilgrims never flocked to Jesus’ tomb. It was empty.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="887" instrument_node="">Third, the post-resurrection appearances were impressive. Despite Jesus’ repeated predictions that he would rise from the dead,</span><a class="endnote" data-dcnode-id="885" href="#_edn26" name="_ednref26" title=""><span data-dcnode-id="886" instrument_node="">[26]</span></a><span data-dcnode-id="884" instrument_node=""> all his followers first thought of other explanations for the missing corpse. What convinced them? Mary,</span><a class="endnote" data-dcnode-id="882" href="#_edn27" name="_ednref27" title=""><span data-dcnode-id="883" instrument_node="">[27]</span></a><span data-dcnode-id="881" instrument_node=""> the twelve disciples,</span><a class="endnote" data-dcnode-id="879" href="#_edn28" name="_ednref28" title=""><span data-dcnode-id="880" instrument_node="">[28]</span></a><span data-dcnode-id="878" instrument_node=""> the followers on the Emmaus road,</span><a class="endnote" data-dcnode-id="876" href="#_edn29" name="_ednref29" title=""><span data-dcnode-id="877" instrument_node="">[29]</span></a><span data-dcnode-id="875" instrument_node=""> Paul</span><a class="endnote" data-dcnode-id="873" href="#_edn30" name="_ednref30" title=""><span data-dcnode-id="874" instrument_node="">[30]</span></a><span data-dcnode-id="872" instrument_node=""> and 500 others</span><a class="endnote" data-dcnode-id="870" href="#_edn31" name="_ednref31" title=""><span data-dcnode-id="871" instrument_node="">[31]</span></a><span data-dcnode-id="869" instrument_node=""> became convinced when they saw him. Some have suggested hallucinations as an alternative explanation; but hallucinations do not occur with varied groups, on multiple occasions, in different places, over a period of several weeks. Hallucinations don’t light real beach fires or eat real fish either, but Jesus did!</span><a class="endnote" data-dcnode-id="867" href="#_edn32" name="_ednref32" title=""><span data-dcnode-id="868" instrument_node="">[32]</span></a></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Fourth, one has to account for the rapid spread of Christianity after Christ’s death. Most of the twelve disciples later died for their belief that Jesus was God. Although dying for a belief does not make it true, the point is this: they came to believe in Christ’s divinity after being convinced that he really had risen from the dead. It was this conviction that transformed them from fearful cowards into the bold apostles who literally turned the world upside down. The survival and growth of the early church resulted from the unshakeable belief that Jesus was alive.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Fifth is the personal experience of Christians, generations of people who have come to know Jesus as a person, with whom they enjoy a genuine friendship. Christianity is not just a creed to be followed nor an ideology to be embraced; it is a dynamic relationship with a real living God – through Jesus Christ.</span></p><span data-dcnode-id="859" instrument_node="">
</span><h2 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Biblical Background</span></h2><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">This is not the place for a full biblical theology of miracles, but there are several points that are of relevance and can be dealt with briefly. We have already mentioned William Paley’s assertion that the theological and historical context of a miracle is crucial to its interpretation and believability, and this is very important.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="852" instrument_node="">First, miracles have a purpose. God is not in the business of doing the miraculous simply to amaze and astound people. Jesus refused to perform miracles to satisfy people’s curiosity.</span><a class="endnote" data-dcnode-id="850" href="#_edn33" name="_ednref33" title=""><span data-dcnode-id="851" instrument_node="">[33]</span></a><span data-dcnode-id="849" instrument_node=""> Instead, miracles are to confirm the authority of those sent by God</span><a class="endnote" data-dcnode-id="847" href="#_edn34" name="_ednref34" title=""><span data-dcnode-id="848" instrument_node="">[34]</span></a><span data-dcnode-id="846" instrument_node=""> and to testify to the truth of the revelation they bring.</span><a class="endnote" data-dcnode-id="844" href="#_edn35" name="_ednref35" title=""><span data-dcnode-id="845" instrument_node="">[35]</span></a></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="841" instrument_node="">Second, although God ultimately stands behind all that happens, supernatural agents other than God (eg angels) can perform miracles. A miraculous event can even come from Satan to lead people astray. If a miracle is performed that encourages us to abandon authentic biblical truth and the gospel, we are to reject it.</span><a class="endnote" data-dcnode-id="839" href="#_edn36" name="_ednref36" title=""><span data-dcnode-id="840" instrument_node="">[36]</span></a></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Third, there seems to be in Scripture a principle that miracles increase around periods where a new era of God’s revelation is being inaugurated (eg Moses and the Exodus, Elijah and the beginning of the prophetic age, Jesus and the apostles). They did not cease at other periods in the Bible, but were less frequent. This therefore is another reason why a lack of observed miracles today should not prompt anyone to deny the miracles recorded in these periods of frequent miraculous activity.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="833" instrument_node="">There is also the question of miraculous healing today. Although both authors are open to God’s working in miraculous ways today, there is a real need for Christian doctors to have clarity, honesty and the ability to ask the right questions when faced with contemporary miracle claims, many of which sadly turn out to be false. It can be easy to claim that a particular case is a miracle, when actually there may be several factors operating.</span><a class="endnote" data-dcnode-id="831" href="#_edn37" name="_ednref37" title=""><span data-dcnode-id="832" instrument_node="">[37]</span></a></p><span data-dcnode-id="829" instrument_node="">
</span><h2 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Conclusion</span></h2><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The modern western mindset mocks the idea of rational people believing in miracles. Much of this stems back to the discredited theories of the 17th and 18th century deists such as Spinoza and Hume. Yet both these and the contemporary objections to miracles can all be dealt with.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">If we claim to be Christians then we can neither escape nor deny the miraculous; nor should we wish to. In accepting the existence of a personal creator God who wishes to reveal himself to us, we should affirm that miracles are a natural and logical way to do this. The evidence for the resurrection of Jesus is excellent and if discussion of miracles prompts us to talk about the resurrection, we are both on certain ground and a great topic!</span></p><span data-dcnode-id="820" instrument_node="">
</span><h4 data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">References</span></h4><span data-dcnode-id="817" instrument_node="">
