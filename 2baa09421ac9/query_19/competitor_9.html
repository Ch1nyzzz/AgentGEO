</span><h1 data-dcnode-id="946"><span data-dcnode-id="953" instrument_node="">
                The First Creation (Gen 1:1-2:3)
				</span><span data-dcnode-id="948"><span data-dcnode-id="952" instrument_node="">
                    by </span><a data-dcnode-id="950" href="#contrib_carr-david"><span data-dcnode-id="951" instrument_node="">David Carr</span></a><span data-dcnode-id="949" instrument_node="">
</span></span><span data-dcnode-id="947" instrument_node="">
</span></h1><span data-dcnode-id="945" instrument_node="">
</span><div data-dcnode-id="934"><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="943" instrument_node="">Standing at the outset of the whole Bible, </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1%253a1-2%253a3" id="Gen_1_1_2_3"><span data-dcnode-id="942" instrument_node="">Gen 1:1-2:3</span></a><span data-dcnode-id="940" instrument_node=""> is one of the Bible’s most influential descriptions relating to God, the universe, and the role of humanity in the </span><a class="qtip-trigger" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles" id="cosmos"><span data-dcnode-id="939" instrument_node="">cosmos</span></a><span data-dcnode-id="937" instrument_node="">. The God we see here is a cosmic king, functioning (as many ancient kings did) as both supreme commander and high priest. The text depicts the universe as a cosmic temple over which God presides and in which God offers God’s blessing. Within this context humans are depicted as earthly replicas of God (made in God’s “image and likeness”), reflecting God’s sovereign and creative power in the way that they “rule” over creation and themselves create children. It is not a scientific account of the origins of the universe, nor can it be made compatible with contemporary science. Instead, it is a story by theologians, meant to show God’s ultimate power over the universe and the ways in which humans share that power. </span></p><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
</span><h4 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">
                Does Genesis 1 describe creation "out of nothing"?
            </span></h4><span data-dcnode-id="930" instrument_node="">
</span><div data-dcnode-id="907"><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="928" instrument_node="">The first verse of </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1" id="Gen_1"><span data-dcnode-id="927" instrument_node="">Gen 1</span></a><span data-dcnode-id="925" instrument_node=""> is usually translated “in the beginning when God created heaven and earth,” and most people picture God conjuring parts of the universe like a magician: “Let there be ... and it was so.” But historical research suggests that the traditional translation is wrong. Instead, the first two verses of the Bible describe the </span><a class="qtip-trigger" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles" id="chaos"><span data-dcnode-id="924" instrument_node="">chaos</span></a><span data-dcnode-id="922" instrument_node=""> that preceded God’s creative ordering of the cosmos: “when God first created the heaven and the earth—and the earth was a formless void, darkness was on the face of the deep, and a </span><a class="qtip-trigger" data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles" id="divine"><span data-dcnode-id="921" instrument_node="">divine</span></a><span data-dcnode-id="919" instrument_node=""> wind hovered over the waters—God said ....” In the beginning, so to speak, was chaos. </span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="916" instrument_node="">The rest of </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1" id="Gen_1_1"><span data-dcnode-id="915" instrument_node="">Gen 1</span></a><span data-dcnode-id="913" instrument_node=""> then describes how God transforms that dark chaos into an ordered, inhabited, “very good” cosmos. God creates light first, and this helps ground the pattern of day and night that dominates the rest of the chapter. On day two, God creates a dome (often translated “firmament”) that creates an air bubble between the upper and lower primal oceans, in which the rest of creation can flourish. Day three brings the creation of dry land and God’s command for that dry land to spring forth with plants. The next three days each correspond to one of the first three: God creates heavenly lights on day four, corresponding to light on day one; God creates sea and air creatures on day five to inhabit the realms focused on in day two; and God creates animals and humans on day six to inhabit the dry land created on day three and to eat the plants that sprung forth then. Throughout, God speaks commands like a royal ruler, and God’s commands are executed, marked by notices such as “and it was so.” Then, God looks on God’s work and pronounces that “it is good.” Indeed, after creating animals and humanity on the sixth day, God proclaims the inhabited cosmos to be “very good.” If there is one message that </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1" id="Gen_1_2"><span data-dcnode-id="912" instrument_node="">Gen 1</span></a><span data-dcnode-id="910" instrument_node=""> wants to give about God and the universe, it is that God is in charge and the world that God ordered is “very good.” Note here that the emphasis throughout the chapter is on God's power to organize creation into the different parts of a cosmic temple, not God's magical "creation" of matter out of nothing. The main idea is the goodness of creation and humanity's role in it. </span></p><span data-dcnode-id="908" instrument_node="">
</span></div><span data-dcnode-id="906" instrument_node="">
</span><h4 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">
                Can the word 'day' in Genesis 1 also mean 'era'?
            </span></h4><span data-dcnode-id="903" instrument_node="">
</span><div data-dcnode-id="871"><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="901" instrument_node="">Some people have suggested that </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1" id="Gen_1"><span data-dcnode-id="900" instrument_node="">Gen 1</span></a><span data-dcnode-id="898" instrument_node=""> can be made compatible with modern science if one understands the word “day” in the story to refer to an “era” potentially spanning thousands or even hundreds of thousands of years. What these readers miss is that the whole six-day structure of </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1" id="Gen_1_1"><span data-dcnode-id="897" instrument_node="">Gen 1</span></a><span data-dcnode-id="895" instrument_node=""> leads to a conclusion based on an actual week: God’s rest (</span><a class="qtip-trigger" data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles" id="Hebrew"><span data-dcnode-id="894" instrument_node="">Hebrew</span></a><span data-dcnode-id="892" instrument_node=""> </span><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">shabbat</span></em><span data-dcnode-id="889" instrument_node="">) on and blessing of the seventh day (</span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B2%253a1-3" id="Gen_2_1_3"><span data-dcnode-id="888" instrument_node="">Gen 2:1-3</span></a><span data-dcnode-id="886" instrument_node="">). No other ancient creation account is organized this way. Some describe the gods resting after creation, but only because they had created humans to do their work for them. </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1" id="Gen_1_2"><span data-dcnode-id="885" instrument_node="">Gen 1</span></a><span data-dcnode-id="883" instrument_node=""> is unique in describing creation as a seven-day process crowned by God’s establishment of a weekly holiday on which not just God but eventually humans as well are to rest (for example, </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DExod%2B20%253a8-11" id="Exod_20_8_11"><span data-dcnode-id="882" instrument_node="">Exod 20:8-11</span></a><span data-dcnode-id="880" instrument_node="">, </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DExod%2B31%253a12-17" id="Exod_31_12_17"><span data-dcnode-id="879" instrument_node="">Exod 31:12-17</span></a><span data-dcnode-id="877" instrument_node="">). This Sabbath rest is not a burden but another way that humans can reflect God’s “image and likeness.” Thus to reinterpret the “days” of </span><a class="qtip-trigger fancybox-trigger" data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/lightbox-bible-passage.aspx%3Fpassage%3DGen%2B1%253a1-2%253a3" id="Gen_1_1_2_3"><span data-dcnode-id="876" instrument_node="">Gen 1:1-2:3</span></a><span data-dcnode-id="874" instrument_node=""> as metaphorical “eras” or the like is to miss the whole emphasis of this story on God’s introduction of a Sabbath rest in the week we all know.</span></p><span data-dcnode-id="872" instrument_node="">
</span></div><span data-dcnode-id="870" instrument_node="">
</span><p class="article-citation" data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">
    David Carr, "First Creation (Gen 1:1-2:3)", n.p. [cited 24 Apr 2022]. Online: </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles/first-creation" target="_blank"><span data-dcnode-id="868" instrument_node="">https://www.bibleodyssey.org:443/en/passages/main-articles/first-creation</span></a><span data-dcnode-id="866" instrument_node="">
</span></p><span data-dcnode-id="864" instrument_node="">

</span><p data-dcnode-id="830"><span data-dcnode-id="840" instrument_node="">David M. Carr is the author, most recently, of</span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node=""> Holy Resilience: The Bible's Traumatic Origins</span></em><span data-dcnode-id="837" instrument_node=""> (Yale University Press, 2014), which retells the story of the emergence of the Bible and of Judaism and Christianity as a story of survival of trauma. He is professor of Old Testament at Union Theological Seminary in New York and is the author of numerous other books, including </span><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">The Erotic Word: Sexuality, Spirituality and the Bible</span></em><span data-dcnode-id="834" instrument_node=""> (Oxford University Press, 2003) and </span><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Introduction to the Old Testament: Sacred Texts and Imperial Contexts of the Hebrew Bibl</span></em><span data-dcnode-id="831" instrument_node="">e (Blackwell, 2010). </span></p><span data-dcnode-id="829" instrument_node="">

</span></div><span data-dcnode-id="785" instrument_node="">
</span></div><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">
                The creation account in Genesis 1:1-2:3 is a tightly organized story of the ordering of a chaotic cosmos, culminating on the seventh day with the Sabbath.
            </span></strong></p><span data-dcnode-id="779" instrument_node="">
</span><div data-dcnode-id="753"><span data-dcnode-id="778" instrument_node="">
</span><h4 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Did you know…?</span></h4><span data-dcnode-id="775" instrument_node="">
</span><ul class="boFactoidList" data-dcnode-id="755"><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Genesis 1 describes God’s ordering of primeval chaos, not creation “out of nothing.” </span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">A focus on Sabbath rest in Genesis 1 suggests it was written during the </span><a class="qtip-trigger" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles" id="exile"><span data-dcnode-id="769" instrument_node="">exile</span></a><span data-dcnode-id="767" instrument_node=""> of Jews in Babylon, when observance of the Sabbath became an important cultural and religious marker.</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Genesis 1 contrasts with other ancient creation stories in its inclusion of human rest and not just human work. </span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">Genesis 1 is the first part of a “</span><a class="qtip-trigger" data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles" id="priestly"><span data-dcnode-id="760" instrument_node="">Priestly</span></a><span data-dcnode-id="758" instrument_node=""> source” that existed earlier in separate form before most of it was embedded in the books of Genesis–Deuteronomy as we have them now.</span></li><span data-dcnode-id="756" instrument_node="">
</span></ul><span data-dcnode-id="754" instrument_node="">
</span></div><span data-dcnode-id="752" instrument_node="">

</span><h6 aria-expanded="true" aria-selected="true" class="title ui-accordion-header ui-helper-reset ui-state-default ui-state-active ui-corner-top" data-dcnode-id="734" role="tab" tabindex="0"><span class="ui-icon ui-icon-triangle-1-s" data-dcnode-id="737"></span><a data-dcnode-id="735" href="#"><span data-dcnode-id="736" instrument_node="">Related Articles (4)</span></a></h6><div class="dark-block ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom ui-accordion-content-active scroll-pane jspScrollable" data-dcnode-id="689" role="tabpanel" style="overflow: hidden; padding: 0px; width: 273px;" tabindex="0"><div class="jspContainer" data-dcnode-id="690" style="width: 273px; height: 430px;"><div class="jspPane" data-dcnode-id="700" style="padding: 9px 36px 9px 17px; width: 194px; top: 0px;"><ul class="accordion-list" data-dcnode-id="701"><li data-dcnode-id="726"><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles/second-creation"><img alt="Martiros Saryan, Fairy Tale. Garden of Eden. Watercolor on paper, 1904." data-dcnode-id="733" height="71" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/-/media/Images/Places/E/eden-1.ashx&amp;raw" title="Martiros Saryan, Fairy Tale, Garden of Eden, 1904." width="100"></a><h5 data-dcnode-id="729"><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/main-articles/second-creation"><span data-dcnode-id="731" instrument_node="">Second Creation</span></a></h5><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The second account of creation, which begins in Genesis 2:4, includes the familiar depiction of the planting of the garden of Eden and the forming of the first humans.</span></p></li><li data-dcnode-id="718"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/people/related-articles/adam-adamah"><img alt="Edward Burne-Jones, When Adam Delved, 1888. " data-dcnode-id="725" height="71" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/-/media/Images/People/A/adam-eve-burne-jones.ashx&amp;raw" title="Edward Burne-Jones, When Adam Delved, 1888. " width="100"></a><h5 data-dcnode-id="721"><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/people/related-articles/adam-adamah"><span data-dcnode-id="723" instrument_node="">Adam/Adamah</span></a></h5><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Exploring the Hebrew wordplay in the Garden of Eden narrative reveals the complex relationship between humans and the earth or ground.

</span></p></li><li data-dcnode-id="710"><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/related-articles/creation-of-the-animals"><img alt="Jacopo “Il Tintoretto” Robusti, Creation of the Animals, 1551–52. " data-dcnode-id="717" height="71" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/-/media/Images/Passages/C/creation-of-the-animals.ashx&amp;raw" title="Jacopo “Il Tintoretto” Robusti, Creation of the Animals, 1551–52. " width="100"></a><h5 data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/related-articles/creation-of-the-animals"><span data-dcnode-id="715" instrument_node="">Creation of the Animals </span></a></h5><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">The Genesis accounts of the creation of the animals go right to the root of how we imagine humanity’s place in relation to the cosmos.</span></p></li><li data-dcnode-id="702"><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/related-articles/meaning-of-dominion"><img alt="Edward Hicks, The Peacable Kingdom. Oil on canvas, circa 1834. National Gallery of Art, Washington." data-dcnode-id="709" height="71" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/-/media/Images/Passages/D/dominion-hicks.ashx&amp;raw" title="Edward Hicks, The Peaceable Kingdom, circa 1834." width="100"></a><h5 data-dcnode-id="705"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/passages/related-articles/meaning-of-dominion"><span data-dcnode-id="707" instrument_node="">Meaning of Dominion</span></a></h5><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">“Dominion” is better conceived as the human exercise of skilled mastery among our fellow creatures, with special reference to perpetuating food security for all. </span></p></li></ul></div><div class="jspVerticalBar" data-dcnode-id="691"><div class="jspCap jspCapTop" data-dcnode-id="699"></div><a class="jspArrow jspArrowUp jspDisabled" data-dcnode-id="698"></a><div class="jspTrack" data-dcnode-id="694" style="height: 368px;"><div class="jspDrag" data-dcnode-id="695" style="height: 164px;"><div class="jspDragTop" data-dcnode-id="697"></div><div class="jspDragBottom" data-dcnode-id="696"></div></div></div><a class="jspArrow jspArrowDown" data-dcnode-id="693"></a><div class="jspCap jspCapBottom" data-dcnode-id="692"></div></div></div></div><h6 aria-expanded="false" aria-selected="false" class="title ui-accordion-header ui-helper-reset ui-state-default ui-corner-all" data-dcnode-id="685" role="tab" tabindex="-1"><span class="ui-icon ui-icon-triangle-1-e" data-dcnode-id="688"></span><a data-dcnode-id="686" href="#"><span data-dcnode-id="687" instrument_node="">Related Videos (2)</span></a></h6><div class="dark-block ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="667" role="tabpanel" style="display: none;"><ul class="accordion-list" data-dcnode-id="668" style=""><li data-dcnode-id="677"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/tools/video-gallery/t/translation-of-ezer-ke-negdo-ska"><img alt="Jean-Louis Ska " data-dcnode-id="684" height="71" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/-/media/Images/Video-Images/ska-thumbnail.ashx&amp;raw" title="Jean-Louis Ska " width="100"></a><h5 data-dcnode-id="680"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleodyssey.org/en/tools/video-gallery/t/translation-of-ezer-ke-negdo-ska"><span data-dcnode-id="68
