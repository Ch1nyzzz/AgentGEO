rl=https%3A//www.americamagazine.org/sites/default/files/styles/article_voice_small_sc_75x75/public/default_images/thumbOurVoiceDefault.png%3Fitok%3D7C35UoQs&amp;raw" typeof="Image" width="75"></div><div class="authorTitle" data-dcnode-id="1009"><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americamagazine.org/voices/daniel-j-harrington" hreflang="und"><span data-dcnode-id="1013" instrument_node="">Daniel J. Harrington</span></a><span data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">March 21, 2011</span></span></div></div></div></div></div></section></div><div class="dynamic-layouts-container-column layout-builder--layout__region col-lg-4" data-dcnode-id="977"><section class="block block-addtoany block-addtoany-block clearfix" data-dcnode-id="978"><span class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="Scripture Passages: The Bible's influence through history" data-a2a-url="https://www.americamagazine.org/issue/769/bookings/scripture-passages" data-dcnode-id="979" style="line-height: 32px;"><div class="soucialLinks" data-dcnode-id="996"><a class="a2a_button_facebook facebook" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americamagazine.org/%23facebook" rel="nofollow noopener" target="_blank" title="facebook"><span class="a2a_svg a2a_s__default a2a_s_facebook" data-dcnode-id="1000" style="background-color: rgb(24, 119, 242);"><svg aria-hidden="true" data-dcnode-id="1001" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M17.78 27.5V17.008h3.522l.527-4.09h-4.05v-2.61c0-1.182.33-1.99 2.023-1.99h2.166V4.66c-.375-.05-1.66-.16-3.155-.16-3.123 0-5.26 1.905-5.26 5.405v3.016h-3.53v4.09h3.53V27.5h4.223z" data-dcnode-id="1002" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Facebook</span></span></a></div><div class="soucialLin ll="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Email</span></span></a></div><div class="soucialLinks" data-dcnode-id="980"><a class="print" data-dcnode-id="981" onclick="myFunction()"></a></div></span></section></div></div></div></div><div class="container" data-dcnode-id="592"><div class="dynamic-layouts-container bootstrap-12" data-dcnode-id="593"><div class="dynamic-layout-row row" data-dcnode-id="594"><div class="dynamic-layouts-container-column layout-builder--layout__region col-lg-8" data-dcnode-id="792"><section class="block block-views block-views-blockarticle-image-block-1 clearfix" data-dcnode-id="966"><div class="views-element-container" data-dcnode-id="967"><div class="imageExpandableLead mt-5 view view-article-image view-id-article_image view-display-id-block_1 js-view-dom-id-acb417d50dc23c7dbfdbfec082036df194211f2ea44670ee9a0b6523a39d0d90" data-dcnode-id="968"><div class="view-content" data-dcnode-id="969"><div data-dcnode-id="970"><a class="colorbox cboxElement" data-cbox-img-attrs="{&quot;title&quot;:&quot;Image&quot;,&quot;alt&quot;:&quot;&quot;}" data-colorbox-gallery="gallery-article-150080-U9MBiOKmrxA" data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americamagazine.org/sites/default/files/main_image/br-Wainsborough-Abuse-Bible_2.jpg" title=""><img class="image-style-article-image-750-x-503-" data-dcnode-id="973" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americamagazine.org/sites/default/files/styles/article_image_750_x_503_/public/main_image/br-Wainsborough-Abuse-Bible_2.jpg%3Fitok%3D_Ku5XLQE&amp;raw" title="Image" typeof="foaf:Image" width="127"></a><span class="imageTitle" data-dcnode-id="971"></span></div></div></div></div></section><section class="block block-layout-builder block-field-blocknodearticlebody clearfix" data-dcnode-id="864"><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="865" property="schema:text"><p data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">One of the most attractive and productive approaches in biblical studies in recent years goes by the German term </span><em data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Wirkungsgeschichte</span></em><span data-dcnode-id="962" instrument_node="">, that is, the history of the Bible’s influence or effects. The books covered in this survey illustrate in various ways the influence of the Bible and its interpretation throughout the centuries and today.</span></p><p data-dcnode-id="953"><span data-dcnode-id="960" instrument_node="">Henry Wansbrough’s </span><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">The Use and Abuse of the Bible: A Brief History of Biblical Interpretation</span></em><span data-dcnode-id="957" instrument_node=""> (T&amp;T Clark) offers a sound, concise, engaging and stimulating journey through the history of biblical interpretation from New Testament times to the present. Wansbrough, a British Benedictine monk of Ampleforth Abbey, seeks to capture some of the ways in which the Scriptures have been interpreted in Christianity and on its fringes—for good (mostly) or for ill (in some cases). His volume contains general chapters on the interpretation of the Old Testament in the New Testament, the Bible in the politics of early 17th-century England, the Bible and the State of Israel, and the Second Vatican Council and the revival of </span><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">lectio divina</span></em><span data-dcnode-id="954" instrument_node="">. It also considers individuals and their contributions to the history of biblical interpretation: Melito of Sardis, Irenaeus, Origen, Jerome, Bede, Bernard of Clairvaux, Thomas Aquinas, Julian of Norwich, Margery Kempe, Martin Luther, John and Charles Wesley and John Henry Newman.</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">In treating these topics and figures, Wansbrough offers a nice blend of historical and biographical context, samples of their approaches to the Bible and appropriate praise and blame for the results. For example, he praises Origen for insisting on the mystical sense of Scripture and Jerome for stressing the literal sense, while noting the dangers of overemphasizing either approach. And he applauds the Wesley brothers for their abundant use of Scripture in their hymns and preaching, but also lauds Newman for striking a balance between Scripture and tradition and facing up to the challenges posed by the new archaeological, historical and literary studies of the Bible in the 19th century. He regards most of these interpreters sympathetically and even affectionately, though he is very tough on the early Zionists’ political/propagandistic use of the Old Testament and biblical archaeology in the Land of Israel. All in all, this is a remarkably solid and appealing survey of Christian biblical interpretation and theology by a distinguished biblical interpreter in his own right.</span></p><p data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">What happens when familiar interpretations of biblical texts (such as the creation story in Genesis 1) clash with history and archaeology, modern science, biblical scholarship and good sense? In </span><em data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Making Sense of the Bible: Difficult Texts and Modern Faith</span></em><span data-dcnode-id="947" instrument_node=""> (Paulist), Antony F. Campbell, S.J., explores how critical study of the Old Testament, along with current trends in biblical scholarship, can assist readers today in understanding what may appear to be difficult and problematic scriptural texts in ways that are beneficial to modern faith and do not endanger it. His motto is “Go, think!”</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Campbell first treats Israel’s traditions in the Pentateuch about humanity (creation, the garden, Cain, the flood, Babel), Israel’s ancestors (Abraham and Sarah; Isaac and Rebekah; Jacob, Leah and Rachel; Joseph) and Mount Sinai (the law, the sanctuary). Then he considers issues regarding Joshua and the land (Israel’s doing, God’s doing, the absolutely appalling—with an appendix on archaeology and the book of Joshua) and King David (his climb to power and his middle years). Campbell contends that while we can no longer do what our forebears did with these texts, when we now see what we can do with them we can and should be encouraged.</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Campbell regards Genesis 1, for example, not as an account about how God created the world but rather as a grand portrayal of Israel’s longing for an ideal and ordered world and a fitting preface to the book’s dour reflections on human limit (the garden), human violence (Cain), human existence (the flood) and human ambition (Babel). Bible readers who find themselves puzzled or even embarrassed by certain Old Testament texts will discover here many fresh and stimulating insights for today.</span></p><p data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">Among the enduring (and questionable) legacies of the Bible over the centuries have been the model of the patriarchal family and the complementarity of the sexes (as in “women’s work”). In </span><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Women’s Lives in Biblical Times </span></em><span data-dcnode-id="938" instrument_node="">(T&amp;T Clark), Jennie R. Ebeling, associate professor of archaeology at the University of Evansville, presents a reconstruction of the life of a fictional woman named “Orah”—Hebrew for “light”—in a small village in the central highlands of Iron Age I Israel (1200-1000 B.C.). She works on the basis of archaeology, the Hebrew Bible, other ancient Near Eastern and Egyptian texts, iconography and ethnography.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">In seven chapters Ebeling chronicles Orah’s life “from cradle to grave”: birth and background, childhood, womanhood, marriage, childbirth, motherhood, and old age and death. She focuses on the events, customs, crafts and technologies, and other activities in which Israelite women would have participated daily according to the agricultural calendar by which they lived. She gives particular attention to women’s control of such diverse crafts and technologies as pottery production, spinning, weaving, basketry and hide-working, along with women’s essential contributions in the realms of midwifery, birth, breast-feeding, child rearing and household religious rituals, as well as their participation in supposedly male activities like harvesting and processing grain, grapes, olives and other crops.</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">The Iron Age I archaeological period in ancient Israel correlates with events described in the book of Judges and leading up to the formation of the monarchy under Saul and David. It was a decisive period in the formation of the various peoples in the central highlands into what came to be understood as Israel. Ebeling has a great story to tell, and she does so quite effectively by correlating each chapter not only with an age in Orah’s life but also with the various festivals on the ancient agricultural calendar (Passover, Weeks, Tabernacles, etc.). In each chapter she develops four topics pertaining to women’s life. For example, with regard to Orah’s childhood (at age 8) she treats education and literacy, baking and brewing, pottery production and spinning and weaving. Thus she brings to life the day-to-day existence of characters about whom the Bible says relatively very little.</span></p><p data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">Most introductions to the Old Testament these days are written with an eye to the large secular university textbook market. Thus they tend to concentrate on historical and literary matters and avoid theology and spirituality. Michael W. Duggan’s </span><em data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">The Consuming Fire: A Christian Guide to the Old Testament</span></em><span data-dcnode-id="929" instrument_node=""> (Our Sunday Visitor) is different in that it treats the Old Testament explicitly as part of the Christian Bible and makes many connections with the New Testament and Christian piety.</span></p><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Duggan, who teaches at St. Mary’s University College in Calgary, takes his title from the biblical image of God’s glory or word as “like a consuming fire” (Ex 24:17; Dt 4:24; etc.). After setting the stage with almost 100 pages of introductory material, he treats each book in the Pentateuch, Historical Books, Prophets, Writings and Deuterocanonical Books. He sets the individual books in their historical contexts, explains their content, notes some of their major themes or topics and provides a detailed outline. His discussions are solidly based on the biblical texts, conversant with modern scholarship, objective and fair in judgment and expressed in a clear and concise manner.</span></p><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">What sets his work apart are the sections on the legacy of the Old Testament books in the New Testament and the invitations to the meditative reading of specific passages. While most obviously a textbook, this volume can be kept as a reference work and a stimulus to serious discussion and prayerful reading of Scripture.</span></p><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">The enduring legacy of Jesus and his first followers has resided primarily in the four Gospels attributed to Matthew, Mark, Luke and John. In </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Who Chose the Gospels? Probing the Great Gospel Conspiracy</span></em><span data-dcnode-id="920" instrument_node=""> (Oxford University Press), Charles E. Hill, professor of New Testament at Reformed Theological Seminary in Orlando, takes issue with some prominent scholars (and their followers in the popular media) who claim that the choice of those four Gospels represents merely the political victory of one “proto-orthodox” party supported by the emperor Constantine. This development supposedly had its roots in the polemical writing of Irenaeus around A.D. 200. On the contrary, Hill traces the idea of just four canonical Gospels and their authority in the churches back to around A.D. 100 and argues that their content and protagonist (Jesus) made them self-attesting and self-authenticating.</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">The second century of the Christian era was pivotal, according to Hill, in the development of the four-Gospel canon and the church’s faith. By all accounts it was a wild and woolly time in church history. Having published widely about this period, Hill culls the evidence for his thesis from ancient manuscripts as well as the earliest Christian writings outside the canon (Irenaeus, Justin, Apologists, Apostolic Fathers, apocryphal Gospels and even the enemies of Christianity). The trail ends with Papias and the mysterious John the Elder in the early second century. Hill’s learned, careful and sensible readings of the ancient texts provide a healthy antidote to the skeptical and sensationalist treatments they have too often received in recent years.</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Ernst Käsemann (1906–98) was one of the most famous biblical scholars of the 20th century. He served as a Lutheran pastor in the early years of Nazi oppression, and after World War II he was a professor on the Protestant theological faculties at Mainz, Göttingen and Tübingen. While he wrote important monographs on Hebrews and on the theme of the body of Christ, as well as a full-scale commentary on Paul’s Letter to the Romans, he is perhaps best known from his provocative essays on such topics as the quest for the historical Jesus, justification as the center of Pauline theology, and unity and diversity in the New Testament.</span></p><p data-dcnode-id="911"><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">On Being a Disciple of the Crucified Nazarene</span></em><span data-dcnode-id="912" instrument_node=""> (Eerdmans) is the English version of the 2005 German collection of 28 previously unpublished lectures and sermons delivered by Käsemann between 1975 and 1996. They treat many of his favorite topics: the kingdom of God, discipleship and faith, the righteousness of God according to Paul, the body and Christ’s body, justification and gospel freedom, Paul’s letter to the Galatians, the Sermon on the Mount, possession and healing, and so on. Käsemann was always both an exegete and a preacher, and his challenging (and sometimes cantankerous) statements keep alive the theological legacies of both Paul and Luther. His essays are full of theological passion and will surely stimulate all who read them today.</span></p><p data-dcnode-id="903"><span data-dcnode-id="910" instrument_node="">The Pauline Year observed in 2008-9 produced many excellent studies of Paul’s life, missionary activity, letters and theology (see </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">America,</span></strong><span data-dcnode-id="907" instrument_node=""> 3/9/09, pp. 22-25). A somewhat overlooked topic, however, was the legacy of Paul in early Christian circles. In </span><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">The Making of Paul: Constructions of the Apostle in Early Christianity</span></em><span data-dcnode-id="904" instrument_node=""> (Fortress), Richard I. Pervo, the author of the massive and learned commentary on the Acts of the Apostles (2009) for the Hermeneia series, seeks to provide a survey of how Paul was remembered, honored and vilified in the early churches. His goal is to describe how Paul became the pillar and founder of catholic Christianity, that is, the emerging “great church” of the period from A.D. 150 to A.D. 250. His focus is on how Paul’s undisputed letters and the figure of Paul the Apostle were used to carry on the Pauline tradition and were adapted to speak to the needs of Christians long after Paul’s death.</span></p><p data-dcnode-id="895"><span data-dcnode-id="902" instrument_node="">Pervo first describes how Paul’s undisputed letters (Romans, 1 and 2 Corinthians, Galatians, Philippians, 1 Thessalonians and Philemon) were gathered, edited and circulated in the form of a collection around A.D. 100. Then he considers how the pseudepigraphical Pauline letters (Colossians, Ephesians, 2 Thessalonians, Pastorals, etc.) carried on and developed the Pauline tradition in various ways and how the figure of Paul appears in other early Christian letters (such as Hebrews, James, 1 Peter, etc.) and in narratives (Acts of the Apostles, </span><em data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Acts of Paul</span></em><span data-dcnode-id="899" instrument_node="">, </span><em data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Epistula Apostolorum</span></em><span data-dcnode-id="896" instrument_node="">, etc.). Next he deals with possible examples of opposition to Paul in Matthew’s Gospel and with the silences about Paul in other early writings. Finally he discusses how Paul was interpreted and used by Marcion, the Gnostics and Irenaeus.</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">This volume is immensely learned, full of fresh insights and connections and written in a lively and engaging style. Pervo plays very well the role of the historian as detective, always in search of loose ends, inconsistencies and contradictions, and other clues in the ancient sources. He defines the legacy of Paul as an inspiration to generate fresh understandings of his message for the service of the church and the world. He observes ironically that although Paul gave his life in pursuit of unity, he has often been the apostle of disunity; but that the complexity of his legacy is a fitting tribute to his memory.</span></p><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">The year 2011 marks the 400th anniversary of the publication of the King James Version, the British Protestant translation that has functioned as “the Bible” for English-speaking Christians for many centuries. In </span><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Pen of Iron: American Prose and the King James Bible</span></em><span data-dcnode-id="889" instrument_node=""> (Princeton University Press), Robert Alter, who has taught Hebrew and comparative literature at the University of California at Berkeley since 1967 and has for many years been a pioneer in the literary study of the Old Testament, contends that it is in America that the potential of the 1611 KJV to determine the foundational language and symbolic imagery of a whole culture has been most fully realized. Taking his title from its translation of Jer 17:1, Alter explores the role of this translation in the shaping of style in the American novel, and so seeks to reanimate the sense of the importance of literary style in the novel.</span></p><p data-dcnode-id="868"><span data-dcnode-id="887" instrument_node="">After a seven-page prelude, he discusses literary style in the United States and the King James Version, and then considers various aspects of its stylistic influence in Herman Melville’s </span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Moby Dick</span></em><span data-dcnode-id="884" instrument_node="">—polyphony; William Faulkner’s </span><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Absalom, Absalom!</span></em><span data-dcnode-id="881" instrument_node="">—lexicon; Saul Bellow’s </span><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Seize the Day</span></em><span data-dcnode-id="878" instrument_node="">—American amalgam; Ernest Hemingway’s </span><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The Sun Also Rises</span></em><span data-dcnode-id="875" instrument_node="">—the world through parataxis; and other American novels, including Marilynne Robinson’s </span><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Gilead</span></em><span data-dcnode-id="872" instrument_node=""> and Cormac McCarthy’s </span><em data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">The Road</span></em><span data-dcnode-id="869" instrument_node="">. Alter concludes that the resonant language and the arresting vision of the King James Version, however old fashioned they may seem, continue to ring in our cultural memory. For those who love the Bible, the English language, literary stylistics and great American novels, this will be an engaging and stimulating book.</span></p><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">The legacy of the Bible can be found in many different forms and places. Tracking its influence is a fascinating enterprise in itself. It is yet another indication that the word of God is “living and active” (Heb 4:12).</span></p></div></section><section class="block block-addtoany block-addtoany-block clearfix" data-dcnode-id="839"><span class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="Scripture Passages: The Bible's influence through history" data-a2a-url="https://www.ame count</span></strong></em></h2><div class="description help-block" data-dcnode-id="278"><div class="whyContent" data-dcnode-id="279"><em data-dcnode-id="280"><strong data-dcnode-id="281"><a aria-controls="AMwhyAnswerL" aria-expanded="false" class="whyQue collapsed" data-dcnode-id="289" data-toggle="collapse" href="#AMwhyAnswerL"><span data-dcnode-id="290" instrument_node="">Why am I being asked to log in?</span></a><span aria-expanded="false" class="collapse" data-dcnode-id="282" id="AMwhyAnswerL" style="height: 0px;"><span data-dcnode-id="288" instrument_node="">We ask readers to log in so that we can recognize you as a registered user and give you unrestricted access to our website. You can also manage your account details and your print subscription after logging in. Logging in will also give you access to commenting features on our website.</span><a class="readPolicies" data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americamagazine.org/privacy-policy"><span data-dcnode-id="287" instrument_node="">Read more about our privacy policy.</span></a><span data-dcnode-id="285" instrument_node=""> | </span><a aria-controls="whyAnswer" aria-expanded="false" class="closeMsg collapsed" data-dcnode-id="283" data-toggle="collapse" href="#whyAnswer"><span data-dcnode-id="284" instrument_node="">Close this message</span></a></span></strong></em></div></div></div></section><section class="create-why block block-block-content block-block-contentbd280b0a-bc77-47c6-b23e-db25dac45e5b clearfix" data-dcnode-id="257" id="block-america2021-createnewaccountwhycontent"><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="258"><h2 class="block-title" data-dcnode-id="272"><em data-dcnode-id="273"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Create a new account</span></strong></em></h2><div class="description help-block" data-dcnode-id="259"><div class="whyContent" data-dcnode-id="260"><em data-dcnode-id="261"><strong data-dcnode-id="262"><a aria-controls="AMwhyAnswerCA" aria-expanded="false" class="whyQue collapsed" data-dcnode-id="270" data-toggle="collapse" href="#AMwhyAnswerCA"><span data-dcnode-id="271" instrument_node="">Why am I being asked to create an account?</span></a><span aria-expanded="false" class="collapse" data-dcnode-id="263" id="AMwhyAnswerCA" style="height: 0px;"><span data-dcnode-id="269" instrument_node="">if you are trying to comment, you must log in or set up a new account. this helps us promote a safe and accountable online community, and allows us to update you when other commenters reply to your posts. </span><a class="readPolicies" data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americamagazine.org/privacy-policy"><span data-dcnode-id="268" instrument_node=""> Read more about our policies</span></a><span data-dcnode-id="266" instrument_node=""> | </span><a aria-controls="whyAnswer" aria-expanded="false" class="closeMsg collapsed" data-dcnode-id="264" data-toggle="collapse" href="#whyAnswer"><span data-dcnode-id="265" instrument_node="">Close this message</span></a></span></strong></em></div></div></div></section><section class="Join-reader-community block block-block-content block-block-content03d5676c-4d73-4b54-a65c-515580dcfbb6 clearfix" data-dcnode-id="211" id="block-america2021-joinourreadercommunityforfree"><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="212"><h2 data-dcnode-id="253"><em data-dcnode-id="254"><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Good news—this is your 5th America article this month.</span></strong></em></h2><h2 data-dcnode-id="243"><em data-dcnode-id="244"><strong data-dcnode-id="245"><span data-dcnode-id="252" instrument_node="">Register for </span><span data-dcnode-id="250" style="color:#83322e"><span data-dcnode-id="251" instrument_node="">FREE</span></span><span data-dcnode-id="249" instrument_node=""> or </span><a class="loginLink" data-dcnode-id="247" href="#" style="color:inherit;font-size:inherit;margin:0"><span data-dcnode-id="248" instrument_node="">log in</span></a><span data-dcnode-id="246" instrument_node=""> to continue reading.</span></strong></em></h2><div data-dcnode-id="236" style="font-size:13px;margin-top:12px;line-height:110%"><em data-dcnode-id="237"><strong data-dcnode-id="238"><span data-dcnode-id="242" instrument_node="">When you register, you’ll get unlimited access to our website and a free subscription to our email newsletter for daily updates with a smart, Catholic take on faith and culture from </span><em data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">America</span></em><span data-dcnode-id="239" instrument_node="">.</span></strong></em></div><div class="whyContent" data-dcnode-id="213" style="margin-bottom:0px;margin-top:10px"><em data-dcnode-id="214"><strong data-dcnode-id="215"><a aria-controls="AMwhyAnswerCA" aria-expanded="false" class="whyQue collapsed" data-dcnode-id="234" data-toggle="collapse" href="#AMwhyAnswerJO" style="line-height:110%"><span data-dcnode-id="235" instrument_node="">Wondering why we ask for your email, or having trouble registering?</span></a><span aria-expanded="false" class="collapse" data-dcnode-id="216" id="AMwhyAnswerJO" style="height: 0px;line-height:110%"><span data-dcnode-id="233" instrument_node=""> Since you’re a frequent reader of our website, we want to be able to share even more great </span><em data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">America</span></em><span data-dcnode-id="230" instrument_node=""> content with you and let you know about more ways to get involved with our media ministry. There’s no charge or cost for access to the website, we’ll never sell your email and you can unsubscribe at any time.</
