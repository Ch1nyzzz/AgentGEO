</span><div class="text show-more__control" data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">Having never played the game I didn't know much about what the plot was about but the games were big hits and popular enough to make a live action movie so I eventually gave it a watch and was very surprised, The story is very loyal to the games from what I seen in the games, Some nice action scenes and good effects, I didn't like the choice of actors but they did ok, As far as game to movies go it's probably one of the better ones, Even if it won't stand the test of time (No pun intended) I think maybe it could of been better if it wasn't made by Disney as they like to tone films down so much that if you're over the age of 11 it's not as enjoyable, But it could of been much worse so I can't complain too much, A good family film that is easy to watch even if you haven't played any of the games.</span></div><span data-dcnode-id="3386" instrument_node="">

</span></a><span data-dcnode-id="3314" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3306"><span data-dcnode-id="3313" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3310"><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur4294858/"><span data-dcnode-id="3312" instrument_node="">3xHCCH</span></a></span><span class="review-date" data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">30 May 2010</span></span><span data-dcnode-id="3307" instrument_node="">
</span></div><span data-dcnode-id="3305" instrument_node="">
</span><div class="content" data-dcnode-id="3290"><span data-dcnode-id="3304" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3293"><span data-dcnode-id="3303" instrument_node="">I was looking forward to this film because of the hype, and I was afraid to be disappointed. But as the film unfolded, I most definitely enjoyed this adventure from beginning to end.</span><br data-dcnode-id="3302"><br data-dcnode-id="3301"><span data-dcnode-id="3300" instrument_node="">Jake Gyllenhaal plays the titular Prince of Persia, Dastan, who was an urchin picked by the King from the marketplace to be his third son. He and his brothers get caught in a web of political high jinx that cross their paths with Princess Tamina of Alamut (played by Gemma Arterton), and the fabled powers of the Sands of Time.</span><br data-dcnode-id="3299"><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">This is Jake Gyllenhaal's most accessible film so far, and he goes to town with it. OK, granted he does not look the least bit Persian, or of that particular time period, but somehow his charisma was able to carry us on this fantastic ride. I also enjoyed his interaction with the beautiful Arterton, which sparks with humor and romance. She was my favorite part of "Clash of the Titans (2010)," and same here.</span><br data-dcnode-id="3296"><br data-dcnode-id="3295"><span data-dcnode-id="3294" instrument_node="">I highly recommend this film for a good old-fashioned, action-adventure film set in ancient times. The parkour sequences are definitely of the highest order and very well-edited and photographed. The sets and visual effects are excellent. Best of all, the story is intelligent and well-constructed. Producer Jerry Bruckheimer has again delivered a very entertaining summer blockbuster. A very well-executed film of its genre. A must watch!</span></div><span data-dcnode-id="3292" instrument_node="">

</span></a><span data-dcnode-id="3220" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3216"><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur4328640/"><span data-dcnode-id="3218" instrument_node="">OrinAGN</span></a></span><span class="review-date" data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">28 May 2010</span></span><span data-dcnode-id="3213" instrument_node="">
</span></div><span data-dcnode-id="3211" instrument_node="">
</span><div class="content" data-dcnode-id="3166"><span data-dcnode-id="3210" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3169"><span data-dcnode-id="3209" instrument_node="">The common view amongst "professional" reviews is that the movie is average. scoring below 50% from Rotten Tomatoes, and MetaCritic, and notably a 2 out of 4 stars from Roger Ebert. The average user ranking on MC puts it at 9 out of 10.</span><br data-dcnode-id="3208"><br data-dcnode-id="3207"><span data-dcnode-id="3206" instrument_node="">Most reviews range anywhere from 8 out of 10, to as low as 2 or 3 out of 10.</span><br data-dcnode-id="3205"><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">If there's one thing critics can agree on, its that the movie is clichéd, borrowing elements from plenty of epics based in the Middle East and fantasy alike, and that it's loads of fun.</span><br data-dcnode-id="3202"><br data-dcnode-id="3201"><span data-dcnode-id="3200" instrument_node="">The one thing no one can agree on is whether that's good or bad.</span><br data-dcnode-id="3199"><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node="">It should be pointed out that this film is produced by the same company/studio that brought us 'Pirates of the Caribbean', and it certainly shows.</span><br data-dcnode-id="3196"><br data-dcnode-id="3195"><span data-dcnode-id="3194" instrument_node="">With that said, I'll lead into my thoughts on the film. The first "Pirates" scored on average a 7.8 - 6.4 of 10, while the sequels averaged anywhere from 4.5 to 5.3. I'd say this movie is better than the sequels while not as good as the first. </span><br data-dcnode-id="3193"><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">So, I'd give it roughly a 7 out of 10.</span><br data-dcnode-id="3190"><br data-dcnode-id="3189"><span data-dcnode-id="3188" instrument_node="">The story is fun, for what it is. Which is a rough retelling of the video game "Prince of Persia: The Sands of Time", while incorporating elements of the following two sequels, as well as incorporating stylistic elements from the following game and the first three of the original trilogy. Thats right! Based loosely on one game, borrowing elements from SIX more. The movie is stretched too thin, and it shows.</span><br data-dcnode-id="3187"><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">The movie feels like your prototypical "sword and sandal" action flick, borrowing heavily from films like "The Thief of Baghdad", and stories found in "1001 Nights". So think 'Arabian Nights', Ali Baba and the 40 Thieves, Aladdin, all mixed with some Steve Reeves 'Hercules' and Robert E. Howard 'Conan' flash.</span><br data-dcnode-id="3184"><br data-dcnode-id="3183"><span data-dcnode-id="3182" instrument_node="">Is it as cheesy as that sounds? YES! Is it as awesome as that sounds? YES!</span><br data-dcnode-id="3181"><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">But it's still well edited, well acted, well scored (Harry Gregson-Williams never fails), and overall well done enough to merit an enjoyable experience.</span><br data-dcnode-id="3178"><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">The ONLY complaints I can think of are few, but here they are: A bit too much CGI, not on the stunts (not much CGI there surprisingly) but on things like demonic-esque snakes (you'll see). Too much random slow-motion. The sexual-tension seemed too forced (too many of those really slow "they're about to kiss but don't" moments). And whereas yes, the ending is supposed to have a "Deus-Ex-Machina" feel to it, in the game it is much more thorough and more explained, in the movie you're just expected to roll with it.</span><br data-dcnode-id="3175"><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">Other than that. A fun night at the movies! Grab your over-priced candy, soda, and popcorn (or do like me and sneak snacks in) and have fun with friends, family and loved ones, recapturing the fun escapism of your childhood with an epic but cliché action movie.</span><br data-dcnode-id="3172"><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">Hope you enjoyed my review... And I hope you enjoy the movie too!</span></div><span data-dcnode-id="3168" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="3081"><span data-dcnode-id="3085" instrument_node="">First of all when I read some of the reviews about this movie all my excitement was drained but I went to see it anyway. What do you now, the movie was great. It was fun, had a lot of action in it, the CGI was nice (excecpt few scenes in the beginning). I thought acting was nice Gyllenhaal (prince) and Arterton (Princess) did a good job in my opinion. As a fun of the game; the script wasn't entirely accurate just like most of the movies based on games but it didn't stray too far either. OK it was not the perfect movie but it was something that I would go and watch its sequel.</span><br data-dcnode-id="3084"><br data-dcnode-id="3083"><span data-dcnode-id="3082" instrument_node="">Overall I enjoyed myself and I believe if you go open minded you will enjoy yourself too.</span></div><span data-dcnode-id="3080" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="3004"><a data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur23322253/"><span data-dcnode-id="3006" instrument_node="">miriam-rios</span></a></span><span class="review-date" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">28 May 2010</span></span><span data-dcnode-id="3001" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2987"><span data-dcnode-id="2997" instrument_node="">Did you see Iron Man and Robin Hood? Yes? Well, this film is better, simply because the story is original. I know, I know, it is based on the computer game...which I used to play ages ago...but the story portrayed in the script is classic and refreshing at the same time; the performances are natural and the stunt scenes are unbelievable. Now, what did Iron Man 2 miss and this movie excels at? Plot, and a fast action pace without being over caffeinated big bang explosions (ever saw G.I. Joe?)</span><br data-dcnode-id="2996"><br data-dcnode-id="2995"><span data-dcnode-id="2994" instrument_node="">Having said that, you must be warned, the dialogues are simple but not stupid and it does contain a fair amount of moral references.</span><br data-dcnode-id="2993"><br data-dcnode-id="2992"><span data-dcnode-id="2991" instrument_node="">Sure everyone is crying out loud about the British accents... "ohh but Persians didn't speak English" yeah but this isn't The Passion of The Christ, or Apocalypto and Mel Gibson was nowhere near the production, Jake Gyllenhaal is an American, but the rest of the cast is British, makes sense they should all have a similar accent doesn't it?? So quit yer whining </span><br data-dcnode-id="2990"><br data-dcnode-id="2989"><span data-dcnode-id="2988" instrument_node="">Overall a good wholesome fun summer movie. worth repeating!</span></div><span data-dcnode-id="2986" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2799"><span data-dcnode-id="2818" instrument_node="">Movies are like food. There are some which are bitter and hard to swallow yet nutritious in every aspect, and those which are tasty albeit fattening. "Prince Of Persia" falls in the latter category, it's fun to watch and enjoyable, and where intelligence doesn't really matter.</span><br data-dcnode-id="2817"><br data-dcnode-id="2816"><span data-dcnode-id="2815" instrument_node="">With Jerry Bruckheimer producing, lots of action, adventure and excitement are promised. With "Prince Of Persia: The Sands Of Time" he continues that promise. The film, from start to finish, is filled with well-choreographed sword-fighting action, fantastic special effects, sweepingly exotic scenery, lavish production design, and a good, sweeping music score by Harry Gregson-Williams. During the action scenes the camera does not shake that much compared to recent movies... although I admit there are one too many slow-motion sequences, that (although gorgeous to look at) distracts the audience too much. However Bruckheimer has a thing for slo-mo, so he's excused. The screenplay is about what you'd expect for a Hollywood-filmed Arabian adventure.</span><br data-dcnode-id="2814"><br data-dcnode-id="2813"><span data-dcnode-id="2812" instrument_node="">The actors did a good job with the material they're given. Jake Gyllenhaal emits sex appeal and charisma throughout, walking through the film with ease. And he's quite good with the action sequences and fighting! Jake, welcome to the action hero club. A big surprise though is Gemma Arterton's performance as Princess Tamina; it is a HUGE improvement from her bland performances in "Quantum Of Solace" and "Clash Of The Titans"; here Arterton manages to inject wit, charm AND emotion into her character, not to mention looking gorgeous at the same time. However I was slightly disappointed by Ben Kingsley's performance - a two dimensional villain. Granted, Kingsley acted great in the role but I felt like it just didn't match to his standards. Alfred Molina has a funny supporting role and the rest of the cast did quite a good job, although I wish a little characterization would come from this.</span><br data-dcnode-id="2811"><br data-dcnode-id="2810"><span data-dcnode-id="2809" instrument_node="">Still, Mike Newell's tight direction manage to put all these amazing factors together, thus he and Bruckheimer not only made an entertaining summer blockbuster, they also made arguably one of, if not the, best movies based on a video game ever. Period.</span><br data-dcnode-id="2808"><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node="">In short, if you want to take a little escape from reality, go back in time to "Prince of Persia" and enjoy. It's fun and light on the brain.</span><br data-dcnode-id="2805"><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">Entertainment value: 9/10</span><br data-dcnode-id="2802"><br data-dcnode-id="2801"><span data-dcnode-id="2800" instrument_node="">Overall: 7/10</span></div><span data-dcnode-id="2798" instrument_node="">

</span></a><span data-dcnode-id="2726" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2718"><span data-dcnode-id="2725" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2722"><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur15087047/"><span data-dcnode-id="2724" instrument_node="">Generic_Gooner</span></a></span><span class="review-date" data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">24 May 2010</span></span><span data-dcnode-id="2719" instrument_node="">
</span></div><span data-dcnode-id="2717" instrument_node="">
</span><div class="content" data-dcnode-id="2690"><span data-dcnode-id="2716" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2693"><span data-dcnode-id="2715" instrument_node="">We all know the score. Movie based on a video game, it's going to be poor, right? Well actually Bruckheimer, Newell and Disney beg to differ, and I have to agree with them on this one.</span><br data-dcnode-id="2714"><br data-dcnode-id="2713"><span data-dcnode-id="2712" instrument_node="">It's not perfect, but it is far superior to many other efforts that came before it. Even those that promised much like Hit-man failed to deliver on the hype beforehand, so with a trailer that had me questioning how good this really was (in hindsight it held back a lot of story reveals and the better scenes, which was quite a gamble) I went in not sure what I would get.</span><br data-dcnode-id="2711"><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">And what I got was a film made by people who seemed to understand what was required to entertain. The flow was perfect, and the story seemed to run cohesively. The story itself wasn't groundbreaking and at times could be a little predictable, but it was enjoyable and not over complicated or patchy.</span><br data-dcnode-id="2708"><br data-dcnode-id="2707"><span data-dcnode-id="2706" instrument_node="">Jake Gyllenhaal is an indie movie mainstay, so to see him in a role like this was interesting. He certainly looked the part and didn't do a bad job on the English accent, but the acting ability of the guy in general made him believable. Gemma Arteton has at time felt a little wooden in films I have seen her in, but this role of the feisty princess worked well for her and her chemistry with Gyllenhaal made the characters more believable.</span><br data-dcnode-id="2705"><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">The supporting cast were solid too, and the comedy turn from Molina's Amar was a very welcome addition.</span><br data-dcnode-id="2702"><br data-dcnode-id="2701"><span data-dcnode-id="2700" instrument_node="">But then a film like this will also live or die on the action, and this is an area that may divide people. The film wasn't packed out with it, but what action scenes there were came at perfect moments in the story, and some had genuine class to them. The nod to the earlier prince of Persia games too will not be lost on some of the older audience, like the leaping from one roof to another and climbing and running across strategic poles stuck out of walls. It offered a return to the swashbuckling sword fighting that looks very impressive and doesn't require a CGI monster to enhance it in any way.</span><br data-dcnode-id="2699"><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">To summarise this movie I would offer a comparison to another Disney film that was born of a different media, Pirates of the Caribbean, a ride that became a successful film franchise. Prince of Persia soars towards that level of quality, and is only really let down by a lack of a scene stealer of Captain Jack Sparrow's genius.</span><br data-dcnode-id="2696"><br data-dcnode-id="2695"><span data-dcnode-id="2694" instrument_node="">But it certainly has made a claim for the best video game adaptation of them all.</span></div><span data-dcnode-id="2692" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2530"><span data-dcnode-id="2579" instrument_node="">Prince of Persia was an immensely enjoyable movie. Below I list the positives and few negatives of the movie before summarising.</span><br data-dcnode-id="2578"><br data-dcnode-id="2577"><span data-dcnode-id="2576" instrument_node="">Positives - What I liked about Prince of Persia: The Sands of Time</span><br data-dcnode-id="2575"><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node="">~Its beautiful</span><br data-dcnode-id="2572"><br data-dcnode-id="2571"><span data-dcnode-id="2570" instrument_node="">The visuals in this movie are stunning. Everything from the cinematography of the desert landscapes to the city of Alamut and the beautiful sets are a real treat to look at.</span><br data-dcnode-id="2569"><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node="">~The two leads are excellent</span><br data-dcnode-id="2566"><br data-dcnode-id="2565"><span data-dcnode-id="2564" instrument_node="">The chemistry between Gyllenhaal and Arterton is fantastic and they, like the visuals, are great to look at. Arterton is stunning as Princess Tamina and Gyllenhaal is as watchable as always. The supporting actors all do their jobs decently.</span><br data-dcnode-id="2563"><br data-dcnode-id="2562"><span data-dcnode-id="2561" instrument_node="">~The fight choreography and parkour</span><br data-dcnode-id="2560"><br data-dcnode-id="2559"><span data-dcnode-id="2558" instrument_node="">Parkour is going to be the new big thing in movieland so I hear and its great to watch, really adding an exciting new element to the tried and tested swordfight </span><br data-dcnode-id="2557"><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node="">~The story wasn't actually totally predictable</span><br data-dcnode-id="2554"><br data-dcnode-id="2553"><span data-dcnode-id="2552" instrument_node="">I haven't played the games so I didn't really know what I was in for with the plot, only that it involved some sands of time... Call me a moron but I actually found quite a lot of what happened in the movie very unpredictable and the ending of the movie for me was totally unexpected.</span><br data-dcnode-id="2551"><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">Negatives- What could have been better</span><br data-dcnode-id="2548"><br data-dcnode-id="2547"><span data-dcnode-id="2546" instrument_node="">~Historical inaccuracy</span><br data-dcnode-id="2545"><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">I thought the movie was meant to be in Sassanid Persia (3rd-7th century AD) but the map at the beginning clearly showed Achaemenid Persia which was quite confusing so the inclusion of crossbows and the mention of the "Turkish" was quite out of place. The Mughuls are also mentioned which is out of place regardless since they Mughuls were Mongols... The movie does include a dagger which can turn back time so perhaps the whole point of moot but I don't feel some more research would have hurt.</span><br data-dcnode-id="2542"><br data-dcnode-id="2541"><span data-dcnode-id="2540" instrument_node="">~Could have been funnier</span><br data-dcnode-id="2539"><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">The movie could have been a little funnier but the storyline moved at such a pace that there wasn't much chance for much hijinks. There were some funny lines in there however and as I mentioned before, the chemistry between Arteron and Gyllenhaal was very enjoyable</span><br data-dcnode-id="2536"><br data-dcnode-id="2535"><span data-dcnode-id="2534" instrument_node="">##Conclusion##</span><br data-dcnode-id="2533"><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">Prince of Persia: The Sands of Time is not the type of movie that comes along often. How often do you really get to see a beautifully shot film set in Ancient Persia featuring such good leads and original story? It was an enjoyable movie and a great movie in its own right I say, bring on the sequels - just don't mess them up like Pirates of the Caribbean.</span></div><span data-dcnode-id="2529" instrument_node="">

</span></a><span data-dcnode-id="2492" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2484"><span data-dcnode-id="2491" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2488"><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur23210781/"><span data-dcnode-id="2490" instrument_node="">bucaneerfilms</span></a></span><span class="review-date" data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">3 May 2010</span></span><span data-dcnode-id="2485" instrument_node="">
</span></div><span data-dcnode-id="2483" instrument_node="">
</span><div class="content" data-dcnode-id="2462"><span data-dcnode-id="2482" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2465"><span data-dcnode-id="2481" instrument_node="">Tonight I was fortunate enough to see an advanced screening of this film. Like many, I became a fan of this franchise with the Sands of Time trilogy, and I was very excited when I learned that there were plans to make a feature film based on it. The storyline of the game is very cinematic (at least in the aforementioned trilogy, not necessarily in the previous games in the series) so I felt that at film adaptation would be an impressive epic.</span><br data-dcnode-id="2480"><br data-dcnode-id="2479"><span data-dcnode-id="2478" instrument_node="">Having finally seen this movie, I can say that I was not at all disappointed!</span><br data-dcnode-id="2477"><br data-dcnode-id="2476"><span data-dcnode-id="2475" instrument_node="">One of the main strengths going into this movie was it's involvement of the series creator Jordan Mechner. He crafted a very engaging screen story that pushed beyond the controller, creating an entirely new addition to the mythos. I know that at times including the creator can sometimes stifle the process, as many will fight changes to the source material that may need to be altered to work better with a director's vision; but I feel that Mechner's involvement showed his desire to see his brain-child develop into a success on the big screen.</span><br data-dcnode-id="2474"><br data-dcnode-id="2473"><span data-dcnode-id="2472" instrument_node="">In addition to involving Mechner, the other big strength was the way that the filmmakers chose to handle the story. Let's face it, movies based on video games have a very poor track record. Super Mario Brothers, Street Fighter, Tomb Raider... all of them made for films that were mediocre at best, and downright abysmal at worst. Prince of Persia had a mighty big hurdle to clear with this, and they found the perfect team to tackle it. Jerry Bruckheimer and Disney already accomplished a similar feat when they brought Pirates of the Caribbean to the big screen (a movie based on a theme park ride, in a genre that had not seen success in 50 years!) </span><br data-dcnode-id="2471"><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node="">Their strategy was the same, they wrote their own story that borrowed elements from the game, but did not strictly follow it. The film stands alone, and does not require it's audience to be intimately familiar with the source material. The nods to the game throughout were great, but I was relieved that I was able to enjoy this film for what it was, rather than constantly looking for where it deviated from the games.</span><br data-dcnode-id="2468"><br data-dcnode-id="2467"><span data-dcnode-id="2466" instrument_node="">This movie clearly was made for someone like me, and in my party of four, three of us, who were all guys, loved it. The fourth, who was the only woman in the group, was less than impressed, and complained that it was too much action. If you're expecting Citizen Kane, you stand to be disappointed, but if you expect this to be another video game adaptation, you are in for a real treat!</span></div><span data-dcnode-id="2464" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="2388"><a data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2488512/"><span data-dcnode-id="2390" instrument_node="">claudio_carvalho</span></a></span><span class="review-date" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">21 August 2010</span></span><span data-dcnode-id="2385" instrument_node="">

</span><div class="content" data-dcnode-id="2371"><span data-dcnode-id="2382" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2374"><span data-dcnode-id="2381" instrument_node="">In Persia, in the Royal City of Nasaf, the fair King Sharaman (Ronald Pickup) rules the empire with his brother Nizan (Ben Kingsley). Sharaman has two sons, but adopts the orphan Dastan that becomes part of his family. Years later, the Holy City of Alamut ruled by Princess Tamina (Gemma Arterton) is under siege of the troops led by Tus (Richard Coyle), Garsiv (Toby Kebbell) and Dastan (Jake Gyllenhaal), after their uncle Nizan had intercepted a spy carrying weapons manufactured in Alamut. Dastan invades the city with his men to avoid a massacre and the Persian army conquers the city. Dastan gets a dagger from an enemy and King Sharaman comes to Almut very upset with the invasion of the holy city. Then he arranges the marriage of Dastan with Princess Tamina. When Dastan gives a holy cloak delivered by Tus to his father, the mantle is poisoned and kills Sharaman. Dastan is accused of betrayal but he escapes with Princess Ttamina. Sooner he finds that the dagger is a powerful device to travel and change time and that Tus is not the traitor and he engages with Tamina in a quest for justice. </span><br data-dcnode-id="2380"><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">"Prince of Persia: The Sands of Time" is a delightful adventure that gives a sensation of nostalgia from the times when movies were just for entertainment without the necessity of sex scenes or graphic violence. The use of CGI is excessive in some moments, but never replace the great performances. The story and the screenplay are excellent, full of action and humor, and the motive for the invasion of Alamut is a clear joke with the invasion of Iraq by USA. The art direction is carefully detailed and set decoration is awesome with locations in Moroco and Pinewwod Studios in England and David Belle that created the Parkour is responsible for the stunning choreography. Gemma Arterton is extremely beautiful in the role of Tamina and Jake Gyllenhall is a great surprise performing a funny hero of an action film. Their chemistry is wonderful and this movie is a magnificent entertainment for the whole family. The music score of Alanis Morissette is awesome. My vote is nine.</span><br data-dcnode-id="2377"><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">Title (Brazil): "Príncipe da Pérsia – As Areias do Tempo" ("Prince of Persia - The Sands of Time")</span></div><span data-dcnode-id="2373" instrument_node="">

</span></a><span data-dcnode-id="2301" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2293"><span data-dcnode-id="2300" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2297"><a data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2483625/"><span data-dcnode-id="2299" instrument_node="">bkoganbing</span></a></span><span class="review-date" data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">29 May 2010</span></span><span data-dcnode-id="2294" instrument_node="">
</span></div><span data-dcnode-id="2292" instrument_node="">
</span><div class="content" data-dcnode-id="2271"><span data-dcnode-id="2291" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2274"><span data-dcnode-id="2290" instrument_node="">There was a time back in the day when Hollywood turned out dozens of films like Prince Of Persia. Universal Studios was the chief maker of these ancient Middle East fantasies. Maria Montez had a set built for her films and when she died it was used lots of times by stars like Rock Hudson and Tony Curtis in their early days. And of course the boy from India, Sabu kept his career going on films like Prince Of Persia.</span><br data-dcnode-id="2289"><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node="">Now if you're expecting to see something remotely realistic about the Persian Empire which Alexander the Great put out of business, don't look at this film. Based on a video game, Prince Of Persia has about as much realism as an old Sabu movie. But that doesn't mean it isn't fun.</span><br data-dcnode-id="2286"><br data-dcnode-id="2285"><span data-dcnode-id="2284" instrument_node="">Jake Gyllenhaal plays the adopted son of the King Of Persia Ronald Pickup who as a lad is taken into the royal family and becomes like another brother to his two natural sons. There is a brother of Pickup played by Ben Kingsley who is a chief adviser to the throne. All seems like a happy family.</span><br data-dcnode-id="2283"><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">But Kingsley's got Richard III like ambitions and Shakespeare immortal crook backed child murderer has got nothing on Kingsley. He gets the sons to invade a Holy and peaceful city run by Princess Gemma Arterton on the pretext this crowd is plotting with folks who want to overthrow the Empire. However Kingsley wants to get at an artifact which in his hands can make him the master of time.</span><br data-dcnode-id="2280"><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">I think with all the computer graphic generated effects which are considerable and nice, still don't make this that much more than one of those Arabian Nights fantasies that Universal used to specialize in. Sabu, Rock Hudson, and Tony Curtis, and Maria Montez were never in a film with a budget like Prince Of Persia.</span><br data-dcnode-id="2277"><br data-dcnode-id="2276"><span data-dcnode-id="2275" instrument_node="">So with a plot based partially on Richard III and a bit taken from the Biblical account of the flood, Prince Of Persia will give you a couple of hours of good old fashioned film entertainment.</span></div><span data-dcnode-id="2273" instrument_node="">
</span><span data-dcnode-id="2272" instrument_node="">

</span></a><span data-dcnode-id="2201" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2193"><span data-dcnode-id="2200" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2197"><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur3608743/"><span data-dcnode-id="2199" instrument_node="">EUyeshima</span></a></span><span class="review-date" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">2 June 2010</span></span><span data-dcnode-id="2194" instrument_node="">

</span><div class="content" data-dcnode-id="2180"><span data-dcnode-id="2191" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2183"><span data-dcnode-id="2190" instrument_node="">The sight of Jake Gyllenhaal in a defiantly heroic pose with his imposing dagger on the poster of this 2010 fantasy adventure would seem to portend a film filled with self-parody, but alas, the actor takes the Aladdin-like title role semi-seriously. He's actually better than expected in the over-the-top derring-do role, but the movie itself is absurdly convoluted and overly ridiculous, even by the standards of the 2003 video game which inspired this CGI-saturated production. It should come as no surprise that the executive producer is action-schlock master Jerry Bruckheimer, whose commercial track record extends from "Beverly Hills Cop" to the "National Treasure" franchise. What did surprise me is that the director is Mike Newell, better known for soft, female-oriented fare such as "Enchanted April" and "Four Weddings and a Funeral". However, both he and Gyllenhaal give themselves almost entirely to Bruckheimer's more commercial, comic-book sensibilities.</span><br data-dcnode-id="2189"><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">The fanciful plot takes place in the sixth century B.C. where we find a Persian street urchin named Dastan being adopted by King Sharaman for his courageous acrobatics in a crowded marketplace. He grows up with his loyal foster brothers Garsiv and Tus, the rightful heirs to the throne who lead the Persian army in an attack on the sacred city of Alamut. In a none-too-subtle allusion to current-day Iraq, the siege on Alamut comes from a wrongful assumption that the city's people are selling weapons to their enemies. Behind the assault is the King's brother and trusted adviser, the Dick Cheney-like Nizam. Elsewhere in the city, Dashan leads a swashbuckling rogue effort that leads him to the comely Princess Tamina who holds the secret behind the mythical Dagger of Time. The dagger has time-bending powers that allow the user to undo any mistake and redo any moment. In short order, Dashan gets framed for murder and escapes with Tamina and the dagger.</span><br data-dcnode-id="2186"><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node="">All sorts of contrived shenanigans subsequently follow with the addition of Sheik Amar, an ostrich-racing thief who amusingly hates both taxes and the confining role of government, as the dagger elusively changes hands and a fatalistic sinkhole yields an ending that may remind you of Pam's unexpected discovery of Bobby in the shower on "Dallas". Aside from Gyllenhaal's muscular performance, Gemma Arterton (a memorable bit as Strawberry Fields in "Quantum of Solace") makes a fetching princess with plenty of predictable moxy. As Nizam, Ben Kingsley is not nearly as embarrassing here as he was in "The Love Guru", but his Oscar will continue collecting dust by itself with his string of disappointing movie choices. The ethnically versatile Alfred Molina steals the film in an act of petty larceny as the comical sheik. With so many special effects coming at the viewer uninterrupted, it was extremely difficult to find a core of humanity in this whole venture. But that's Bruckheimer's objective after all - to overwhelm your senses until you turn into the exact same pulp he chooses to present to all the fanboys and fangirls who will flock to this paper-thin extravaganza.</span></div><span data-dcnode-id="2182" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2056"><span data-dcnode-id="2069" instrument_node="">As a player of the original video game, back when computers were clunky and slow, I was quite interested to see how the Prince has evolved. I wasn't disappointed; a lot of the moves and mythology from the original game survives in this film. Obviously the graphics are much better, and the film isn't too bad either.</span><br data-dcnode-id="2068"><br data-dcnode-id="2067"><span data-dcnode-id="2066" instrument_node="">Dastan is an orphaned street urchin when he is taken in and adopted by King Sharaman, who has seen something he likes in the boy. He grows up alongside the kings' two natural sons, Tus and Garsiv who treat him as an equal even though he will never inherit the throne. The king's brother, Nizam is with the three brothers when they approach a city that the king has told them not to take. Nizam tells the brothers that a spy has found evidence that the city is making weapons for the Persia's enemies. They take the city and Dastan comes into possession of a mysterious dagger that everyone seems interested in. Princess Tamina, who rules the city, also wants the dagger, but to protect it. The king comes to the city and is murdered, seemingly by Dastan. Fleeing for his life, he takes Tamina with him. That night, he discovers the dagger's secret, it can turn back time, but only the person holding the dagger is aware of it. This makes the dagger a very powerful weapon. It will only work for one minute though before the sand is all used up. The magical sand is hidden below the city and if it is released, it will destroy the world. Can Dastan discover who really murdered the king, and can he and Tamina keep it safe from those who would use it for evil? Well, since I don't want to spoil the ending, I'm not going to tell you right now.</span><br data-dcnode-id="2065"><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">As with previous Disney/Jerry Bruckheimer productions, I'm thinking of the 'Pirates of the Caribbean' films, there plenty of swashbuckling action. It's a very well made film, as you'd expect with some very good special effects. Decent performances from all of the main cast, Jake Gyllenhaal as Dastan, Gemma Arterton as Tamina, Ben Kingsley as Nizam, Alfred Molina as Sheik Amar, Steve Toussaint as Seso, Toby Kebbell as Garsiv, Richard Coyle as Tus and Ronald Pickup as King Sharaman.</span><br data-dcnode-id="2062"><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">A special mention for Alfred Molina as Sheik Amar, his comic role reminded slightly me of Robert Newton as Long John Silver. There was plenty of action, although I felt the ploy of running and jumping over rooftops was a little over used. Over all a very entertaining film with some great action and a pretty reasonable story, a great one to take the kids to! Recommended.</span><br data-dcnode-id="2059"><br data-dcnode-id="2058"><span data-dcnode-id="2057" instrument_node="">My score: 7.0/10</span></div><span data-dcnode-id="2055" instrument_node="">

</span></div><span data-dcnode-id="2009" instrument_node="">
</span><div class="content" data-dcnode-id="1994"><span data-dcnode-id="2008" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1997"><span data-dcnode-id="2007" instrument_node="">It isn't often that a video game is so vivid, so involving...so enveloping, that it is looked on as a possible movie franchise on all those merits. Usually, just the action (Doom, Final Fantasy), or just the body (Lara Croft...Tomb Raider) or just some other one aspect makes for a great game, but an underwhelming movie. I had the pleasure of watching this movie in an early screening on Monday night, and it is definitely a step above and beyond the aforementioned videogames-turned-movies.</span><br data-dcnode-id="2006"><br data-dcnode-id="2005"><span data-dcnode-id="2004" instrument_node="">The hallmark from the very beginning of the Prince of Persia franchise (a primitive DOS programmed, side-scrolling adventure through a castle to rescue a locked-up princess) was not only having a great story, but telling it in such a way to keep the player in that world. This film, surprisingly enough, doesn't play out quite as closely to the video games as I had expected. Still, without spoiling either the games or this movie, I can say that it shows Jordan Mechner had full involvement in the movie. Many storytelling elements present in the "Prince of Peria: The Sands of Time" video game can be found here, and made for a very entertaining romp through the vast lands of Persia.</span><br data-dcnode-id="2003"><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node="">I would say that my main gripe is the under-use of parkour, the running/fighting style the Prince deploys in the video games. This is a hard gripe to substantiate though, because of how difficult parkour is to execute, let alone master, nonetheless I had expected something resembling the wall-running, banner-ripping moves seen in the "Sands of Time" video game trilogy. It's harder still to be too down on a little parkour, due to Disney's desire that this film would be the first in a Prince of Persia movie franchise, equal to or greater than the "Pirates of the Caribbean" movie franchise. Therefore, I await with anticipation the creativity that more parkour would bring to the stories this most agile Prince can tell.</span><br data-dcnode-id="2000"><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">"Prince of Peria: The Sands of Time" gets 8 of 10 stars.</span></div><span data-dcnode-id="1996" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="1920"><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur20552756/"><span data-dcnode-id="1922" instrument_node="">TheLittleSongbird</span></a></span><span class="review-date" data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">2 May 2011</span></span><span data-dcnode-id="1917" instrument_node="">

</span><div class="content" data-dcnode-id="1903"><span data-dcnode-id="1914" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1906"><span data-dcnode-id="1913" instrument_node="">This film I see has had a mixed reception. I am inclined to think that while it is flawed it was an entertaining and above average film. As I've said, it is flawed, the film is rushed sometimes, I personally would have liked more room to breathe, the script does have its weaknesses, some of it could have been more witty and less wordy and banal though there are some funny moments, and while I don't think Gemma Arterton is a bad actress-she was brilliant in Tess of the D'Urbevilles her chemistry with Gyllanhaal is rather dull and her character was quite vapid.</span><br data-dcnode-id="1912"><br data-dcnode-id="1911"><span data-dcnode-id="1910" instrument_node="">However, the visuals, cinematography, costumes, special effects and sets are all excellent, as is the rousing music and exciting action sequences. The story has some nice nods to the games but is essentially a stand-alone which I didn't mind at all, and for me it was a not-too-predictable and fun story. The direction is serviceable enough, and the acting apart from Arterton is good and the characters if slightly unoriginal and under-developed fun. Jake Gyllanhaal is a handsome and likable lead, Ben Kingsley is excellent and Alfred Molina steals the show.</span><br data-dcnode-id="1909"><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node="">In conclusion, I thought it was entertaining albeit with flaws. 7/10 Bethany Cox</span></div><span data-dcnode-id="1905" instrument_node="">

</span><a class="title" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2265011/"><span data-dcnode-id="1835" instrument_node=""> When a very best combat/platform game turns age 21, now it became a Swashbuckler film
</span></a><span data-dcnode-id="1833" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1825"><span data-dcnode-id="1832" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1829"><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur19658928/"><span data-dcnode-id="1831" instrument_node="">CihanVercan</span></a></span><span class="review-date" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">15 June 2010</span></span><span data-dcnode-id="1826" instrument_node="">
</span></div><span data-dcnode-id="1824" instrument_node="">
</span><div class="content" data-dcnode-id="1797"><span data-dcnode-id="1823" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1800"><span data-dcnode-id="1822" instrument_node="">Prince of Persia is the BEST PLATFORM GAME on computer I ever played as a child. It's not that industrial standard movies can create new ideas, they have to find a source to make an adaptation, but Sands of Time doesn't stand enough loyal to its title. What not staying loyal to Prince of Persia means, there is not any visually admirable combat with the film at all. When it's been first released, AUTUMN 1989, in Apple II; there were only a palace, a peasant child, a princess under the Caliph's servitude and hundreds of guardians defending the palace. Our peasant child as a spy was there to rescue the princess to bring her back to father the Persian Emperor. Looking at the continuation of the game series, the story is taken back in time about 15 centuries back to Persian realm before the birth of Christ. When I played the 2003 Sands of Time game on X-Box, the combat sense of the game had been gone. It was rather boring and bothersome since our peasant has become a prince, with not much to do other than jumping back and forth over the house roofs like Spider-Man.</span><br data-dcnode-id="1821"><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node="">What's good with the movie better than its 2003 version of video game is we have more challenges than the game here. It's widely enriched with industrial standards. Classic cat and mouse type tags, rebel and noble girl falling in love with the boy, people from evil side turning to good side, suspicious characters seeking tricky and manipulative ways of possessing more power and authority, good side falls into an adventure/journey as a team, proves the importance of teamwork and beats the odds: The very-well known SWASHBUCKLER clichés since 1950s' Erol Flynn flicks, 1960s' Akira Kurosawa Seven Samurai, 1980s' Conan the Barbarian with Arnie, Indiana Jones with Harrie, 1990s' The Mummy, and from recent years the LOTR and the Pirates of the Caribbean. Prince of Persia has a lot to offer to the video game fans, but not much to offer for movie fans at all.</span><br data-dcnode-id="1818"><br data-dcnode-id="1817"><span data-dcnode-id="1816" instrument_node="">With great aspects from locations and change on weather conditions especially on desert, this movie is considerably interesting, even though most of them are CGI; animals from desert, the OSTRICHS, the COBRA SNAKES and ARMORED HORSES even though it's not appropriate with its history.</span><br data-dcnode-id="1815"><br data-dcnode-id="1814"><span data-dcnode-id="1813" instrument_node="">Sands of Time as a production had great potential of usage in props, but either the producers never made a deep research or may be they just couldn't provide them. In the computer game, the props were the heart of the franchise. FLYING CARPET, DOUBLE-SIDED ALTER-EGO CREATOR MIRROR, POTHOLE AMBUSHES, BARRED DOORS, ROTTEN PUNK FLOORS, ELIXIRS...(for the full list props from the game, please go to the Message Board to find my message, in the title page). Here in the film, a large barred door been used, but it was a pre-built one with very well-known studio usage from 1980s' RED SONJA especially. Other cons were the SACRED DAGGER which given its name to the title of the movie, the POISONED KING DALMATIC. Other than those the costumes of the actors were only average. But the Princess needed a better costume other than a gown.</span><br data-dcnode-id="1812"><br data-dcnode-id="1811"><span data-dcnode-id="1810" instrument_node="">I found the editing job in the introduction scenes and the first half very pathetic. It became a matter of story design afterwards. There are bunches of continuation mistakes, costume changes without the location changes and errors in every other scene while telling the drama sequences. I'm crazy for sword combats in action movies, but Sands of Time displayed one of the worst sword combats I've ever seen, Jake needed to practise more on handling swords. In this case, even the Pirates of the Caribbean was so-so. If it's the matter the best sword combat was used in Star Wars 30 years ago. As a reminder, the first 3 games until 1999, Prince of Persia was full of excitement with its excellent sword combat simulations. Instead of sword combat, we witness the agility skills of our Prince, making the guardians run after him, jumping back and forth over the house roofs. If you're using agility skills to display in such a Swashbuckler; then what's Spider-Man, X-Men, BatMan for? For the cuts and takes from the action scenes, which is hard to say "combat", director Mike Newell has preferred mostly C.U. shots, that's dated back to John Woo, which is underclass nowadays. So as an action genre, Sands of Time fails almost every aspect. But there is one thing, I most fond of is the Hassansin soldiers and their combat weapons, and the successful sound effects comes with them.</span><br data-dcnode-id="1809"><br data-dcnode-id="1808"><span data-dcnode-id="1807" instrument_node="">The story design is pathetic, but we feel a nice development work on the story-telling. There is not many heritages from Persian Mythology, so it's fine and dandy to draw the long bow, but why is it always TIME-TRAVEL, isn't there anything else for the Mythological Gods to represent their power on Earth? After the first half, when the exact idea of who is on evil side, who is on good side is established, and when it's their time to challenge each other; it becomes breath-taking to watch and admire the Sands of Time.</span><br data-dcnode-id="1806"><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">Story: 3/10 , Story Development: 9/10, Production Design: 2/10, Sounds: 7/10, Effects: 7/10, Acting: 5/10, Script: 3/10, Visuals: 7/10, Action: 5/10, Adventure: 7/10, Fantasy and Creativity: 4/10. </span><br data-dcnode-id="1803"><br data-dcnode-id="1802"><span data-dcnode-id="1801" instrument_node="">Overall my mark is 6.5/10. Time is never wasted if it's for fun while watching Sands of Time</span></div><span data-dcnode-id="1799" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">I didn't expect much from this movie, and wasn't planning on watching it after watching the trailer, which had somehow managed to butcher the action sequences which turned to be pretty good in the movie. It hardly depicted the movie for what it made out to be, so i'm more than glad that i did. At first glance Jake wouldn't be my first choice for the role of the prince as i didn't think he really looked the part, with his slightly goofy looking demeanor, but he made up for it as he certainly played the part(and thanks to the costume designer, dressed the part), coupled with a good body double the parkour wasn't far off either. There was good chemistry between the male and female leads, however, granted perhaps overplayed in less than idyllic moments for pda haha, which some might find cliché but hardly something to dwell on in this pretty awesome movie so its not as bad as other critics claim. It offers aesthetically pleasing graphics (as to be expected of the people who worked on the pirates of the Caribbean) and although deviated from the plot of the game, the important aspects blended well and made for an enjoyable, and not totally predictable storyline. Another epic jerry epic i say. I sincerely hope they make a sequel, especially if the the dark prince is involved in the storyline, that would be badass (magma cracks already showing on the prince's body during slow mo time travel scenes so fingers crossed)</span></div><span data-dcnode-id="1714" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="1621"><span data-dcnode-id="1631" instrument_node="">My friend dragged me to this movie, I am usually picky and wouldn't have seen this on my own but there I was in the theater on my friends insistence watching Prince of Persia. Surprisingly it was pretty good for a summer movie meant to entertain. I was never a fan of the main actor in this movie, but he was good in the role as the Prince of Persia who was not royal born.</span><br data-dcnode-id="1630"><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">There are lots of jumping and sequences that remind of video games where you have to do fancy acrobatics to get to the next point, and good action scenes in the movie. It kind of reminded me of "The Mummy", but of course wasn't as good, but did have a similar vibe going on.</span><br data-dcnode-id="1627"><br data-dcnode-id="1626"><span data-dcnode-id="1625" instrument_node="">The computer generated backgrounds were excellent and showed exotic fantasy architecture of middle eastern flavor and normally I would hate that a lot of the movie had computer graphics as backgrounds but this was done so well I have to make an exception.</span><br data-dcnode-id="1624"><br data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node="">For other picky movie goers like me I can give you a recommendation for this movie, it is a fun lightweight summer movie and you will have a good time watching it.</span></div><span data-dcnode-id="1620" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1530"><span data-dcnode-id="1537" instrument_node="">A Hollywood blockbuster in the best tradition - exotic kingdoms, a hero with the right heart, a beautiful princess who can stab back with tongue and sword and lots of adventures and evil beings with black magic.</span><br data-dcnode-id="1536"><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">I admit, Prince of Persia is like Hansel &amp; Gretel: Witch Hunters (Jeremy Renner and Gemma Arterton) a guilt pleasure for me: a mindless adventure and action story zillion times told before, but what we get on top are beautiful pictures, actors who have fun and a good shot or two of humor and slapstick spiced with battle scenes and duels and some unique ideas.</span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">Well, anyway, I watched this one like Hansel &amp; Gretel more than just one or two times, and I don't know, both movies got Gemma, maybe that got some magical influence on me ;)</span></div><span data-dcnode-id="1529" instrument_node="">

</span><div class="content" data-dcnode-id="1436"><span data-dcnode-id="1447" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1439"><span data-dcnode-id="1446" instrument_node="">The latest game to get the movie treatment, PRINCE OF PERSIA: THE SANDS OF TIME is probably one of the better game to film adaptations today and this is not about how it compares to the game, the game is a very action packed and very energetic game play experience, the film stays close to the story but what it does best is capture that same energetic feeling the game has.</span><br data-dcnode-id="1445"><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">The characters are well cast and great performances are given all around and the extra dash of humor makes it that much more entertaining, as a film its a great action adventure story, compared to the game you'll find a few things done differently but that doesn't keep it from being a good film in the end.</span><br data-dcnode-id="1442"><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">Also you can take comfort in knowing that Uwe Boll didn't get the chance to sink his teeth into this one but I would recommend he watch this to see what happens when you do a good job at making a movie, it might not be a bad idea he could take notes and actually learn something.</span></div><span data-dcnode-id="1438" instrument_node="">

</span></a><span data-dcnode-id="1366" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1358"><span data-dcnode-id="1365" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1362"><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur5156288/"><span data-dcnode-id="1364" instrument_node="">MaxBorg89</span></a></span><span class="review-date" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">29 May 2010</span></span><span data-dcnode-id="1359" instrument_node="">
</span></div><span data-dcnode-id="1357" instrument_node="">
</span><div class="content" data-dcnode-id="1339"><span data-dcnode-id="1356" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1342"><span data-dcnode-id="1355" instrument_node="">One thing has to be said about Jerry Bruckheimer: he isn't afraid of anything. Despite the frequent criticism he receives for having launched the dodgy careers of Tony Scott and Michael Bay (ironically with both achieving their finest work to date without his tutelage), he's also responsible for crowd-pleasing franchises like Beverly Hills Cop and Pirates of the Caribbean. Even by his standards, though, Prince of Persia: The Sands of Time was a bit of a risk. Sure, he secured a competent director (Mike Newell, who helmed the best Harry Potter film to date) and a reliable cast (Jake Gyllenhaal, Ben Kingsley, Alfred Molina), but the project still came with that one unpleasant characteristic: based on a video game. Then again, everyone said he was crazy when he wanted to make a movie out of a theme park ride, so maybe he had the right tools to get the game-to-film transition right for once. Based on the finished product, it looks like the gamble mostly paid off.</span><br data-dcnode-id="1354"><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node="">Based on the fifth installment in the popular game series, The Sands of Time focuses on Gyllenhaal's Dastan, a street kid who finds himself adopted by the Persian king. Well loved by the people and his family, he does fine until a series of circumstances lead to his being accused of murdering the king and being on the run alongside the mysterious and beautiful Tamina (Gemma Arterton), guardian of a dagger that allows its user to travel back in time, something that might come in handy for Dastan to prove his innocence and save the kingdom.</span><br data-dcnode-id="1351"><br data-dcnode-id="1350"><span data-dcnode-id="1349" instrument_node="">What makes Prince of Persia stand out in the genre is the fact that, except for the (excellent) scenes that involve running, jumping and fighting, it doesn't look like a video-game movie at all. In fact, the surprisingly coherent and fun script follows the Pirates of the Caribbean formula by combining equal doses of action, wit (the exchanges between Dastan and Tamina), pure laughs (Alfred Molina) and charismatic characters (ditto, plus Gyllenhaal, despite an initially shaky English accent). It's formulaic - no prizes for guessing who the villain is - but enjoyable, and the time travel aspect of the story makes the third act less ridiculous than it would have been in an average action flick.</span><br data-dcnode-id="1348"><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node="">The only real defect, save for a bit of inevitable parallels between then and now (Persia is currently known as Iran, you know), is the fact that the compromise between Bruckheimer (money shots) and Newell (story and character) leads to some chunks of truly awful dialogue, especially the repetitive exposition scenes: is the audience's attention span really so limited that someone has to explain the dagger's function seven times over the course of two hours? Granted, there is time travel in the mix, but that doesn't mean we have to start over every single time. Maybe the screenwriters should have considered hitting the rewind button too.</span><br data-dcnode-id="1345"><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">Overall, Prince of Persia: The Sands of Time is exactly what it sets out to be, namely a professionally crafted blockbuster that is guaranteed to entertain for a couple of hours. It doesn't quite pack the same charm as the first Pirates movie, but if Bruckheimer has his way and a new franchise begins, there's plenty of potential to exploit in future installments.</span></div><span data-dcnode-id="1341" instrument_node="">

</span></a><span data-dcnode-id="1269" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1261"><span data-dcnode-id="1268" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1265"><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur19892892/"><span data-dcnode-id="1267" instrument_node="">Floated2</span></a></span><span class="review-date" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">19 August 2010</span></span><span data-dcnode-id="1262" instrument_node="">
</span></div><span data-dcnode-id="1260" instrument_node="">
</span><div class="content" data-dcnode-id="1248"><span data-dcnode-id="1259" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1251"><span data-dcnode-id="1258" instrument_node="">Prince of Persia the sands of time, is a great video game ever, and I was really curious at first to see how this movie would turn out. I am not an avid gamer of this game but I have played the game sometimes. I wanted to see if ''Disney'' could make the movie as epic as the video game. When i first saw the first look i was really intrigued by it. Then the official casting has been made and I notice that i saw Jake Gyllenhall as the Price Dastan, then I sorta knew that it was going to be a complete disaster. Not only they changed the whole theme of the video game but also i was really shocked that the only character that came even close to the game was Ben Kingsley's role, he was without a doubt the perfect one for the role of Nizam.</span><br data-dcnode-id="1257"><br data-dcnode-id="1256"><span data-dcnode-id="1255" instrument_node="">For the movie, it had nice special effects and the landscape was nice but the story wasn't that great. It could have been much better, and it was a little confusing to follow. Also the relationship between Dastan and the Princess Tamina was quite awkward. At first they didn't like each other then after a few scenes together they were scene teasing each other, and fooling around town (no pun intended).</span><br data-dcnode-id="1254"><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">It should be noted that Disney produced this. Disney basically means no violence, no gore nothing. The video game was rated M for Mature, while this movie is rated PG-13. I guess they wanted to make the movie visible to more people so they could get more money from the profits. Not the best move but I can see why they did this. I really like the armoury, i love the way they designed the weapon and the dagger of time itself was a pretty good job. I really loved the way they presented us Tamina (Gemma A) she was one of the good points of this movie along Sir Ben Kingsley's fine acting. The movie was actually really boring at certain parts. The only real parts were the fight scenes and when he's using the dagger of time. Also the ending was alright, could have been better. Though I know they're be a sequel and am expecting that to be better. Overall this movie is not close near the game and it was quite disappointing. ==================================================================== ======= After a rewatch (02/24/17) after nearly seven years later, my opinions have changed slightly on this film. I do not quite remember the video games as I once have but this film isn't too bad. The actions sequences are there and although it is Disney and the games were rated R, it wasn't as bad as once remembered, it could have been a lot worse. It is quite predictable in the ending but noticeably entertaining and a decent journey. Knowing that this film did not produce a sequel, may have been for the best. Changed from a 5/10 to 7/10.</span></div><span data-dcnode-id="1250" instrument_node="">

</span></a><span data-dcnode-id="1178" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1170"><span data-dcnode-id="1177" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1174"><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur19404364/"><span data-dcnode-id="1176" instrument_node="">drakula2005</span></a></span><span class="review-date" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">23 May 2010</span></span><span data-dcnode-id="1171" instrument_node="">
</span></div><span data-dcnode-id="1169" instrument_node="">
</span><div class="content" data-dcnode-id="1142"><span data-dcnode-id="1168" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1145"><span data-dcnode-id="1167" instrument_node="">To be honest, i wasn't a big "Prince of Persia" fan, i haven't played the games, but i probably will now, because the film is great.The movie is shot in great style, well adjusted to it's time and era.And this means costumes, effects, traditions-everything.</span><br data-dcnode-id="1166"><br data-dcnode-id="1165"><span data-dcnode-id="1164" instrument_node="">I have a friend, who's waiting for this movie for a few years, early 2007 to be exact.We went in, and he was totally blown as well, and said there are more similarities with the game, than he could've imagined.So it's story is actually accurate and believable.</span><br data-dcnode-id="1163"><br data-dcnode-id="1162"><span data-dcnode-id="1161" instrument_node="">The acting was at a very high level, equal to the scale of the movie itself.I like Jake Gyllenhaal for a long time, since "Donnie Darko" and than he was great in "Brokeback Mountain".But i never could've imagined he'll fit so good in a blockbuster movie like this.Gemma Arterton is also cool, as she is in "Casino Royale" or "Clash of the Titans", where she's actually one of the few things i liked.But here, she has more on-screen time, and she shows her talent more fully and that's a lot for a movie like this-a blockbuster.</span><br data-dcnode-id="1160"><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">Another thing, that's not very common for a cash-making movie is the dialogue.There are some pretty edgy and funny lines one could enjoy, especially in the hands of the leads in the movie.Once again, they did an outstanding job.</span><br data-dcnode-id="1157"><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">I can't wait till the day i'll see sir Ben Kingsley as the good guy in a movie of such scale.I doubt it'll ever happen, but i hope it will.He was better than most of his villains, more convincing than before.I liked him.</span><br data-dcnode-id="1154"><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">There was a little mystery as well.Who is the killer, who's guilty, many people can be responsible for what's happened.I didn't expect such things, and was left surprised by them too. </span><br data-dcnode-id="1151"><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">The lenght of the movie is one of the many good things about it.It was long enough, not too long, but perfect.I was a little bit disappointed of the ending of the movie, i don't like endings like this, but i haven't played the game, so that must be the reason for me to feel like this.Go see for yourself, because i'm sure You won't be disappointed! I went in and i enjoyed it.The best blockbuster/summer movie this season.I'll see it again, very soon, with more of my friends.</span><br data-dcnode-id="1148"><br data-dcnode-id="1147"><span data-dcnode-id="1146" instrument_node="">My rate: 9/10 Agh, what the heck, sheer 10.I'm a fan now!</span></div><span data-dcnode-id="1144" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1003"><span data-dcnode-id="1031" instrument_node="">Adopted from the streets of Nasaf by King Sharaman of Persia, young Dastan grows up amongst royalty and quickly earns his place as a mighty warrior and prince. </span><br data-dcnode-id="1030"><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">As his brothers Garsiv and Tus plan battle strategies, a spy sends word that the Holy City of Alamut has been supplying weapons to enemies of Persia. </span><br data-dcnode-id="1027"><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">Taking matters into his own hands, Tus orders an attack on the sacred city and upon its fall Dastan encounters the beautiful Princess Tamina. </span><br data-dcnode-id="1024"><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">When King Sharaman dies under mysterious circumstances shortly after, and Dastan is accused of his murder, he flees with the princess on a harrowing mission to clear his name...</span><br data-dcnode-id="1021"><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">Coming from the house of Disney and produced by Bruckhiemer, i expected something along the line of POTC, with a little bit of Raiders thrown in. What i got was just another Video game movie which was nothing above average at best.</span><br data-dcnode-id="1018"><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">Kingsley is in high camp mode here just like he was in a sound of thunder, and adds nothing to the film while Gyllenhall, although looking pretty and buff, spends the entirety flicking his hair and putting in his most wooden performance. Arterton wanders in from Clash of the Titans and carries on her performance from there.</span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">The effects are okay, but it stinks of the mummy returns in some sequences. Molina is easily the best thing in this, providing the best lines and carrying the film whenever he is in it, but his role is nothing more than an extended cameo.</span><br data-dcnode-id="1012"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">Action scenes are repetitive and have a deja vu feeling about them (especially as every on feels like the basket chase from raiders), and the ending has been stolen from the Nicolas Cage classic 'Next'.</span><br data-dcnode-id="1009"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">I wasn't expected much from this, and i got less than that. </span><br data-dcnode-id="1006"><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">Easily the most disappointing summer release so far in the UK.</span></div><span data-dcnode-id="1002" instrument_node="">
