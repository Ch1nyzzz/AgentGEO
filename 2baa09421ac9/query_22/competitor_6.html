</span></p><p data-dcnode-id="3055"><span data-dcnode-id="3119" instrument_node="">The Prince as he appears in </span><i data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3116" instrument_node=""> is generally seen as the most likable version of the character, with critics and fans praising his portrayal and development.</span><sup class="reference" data-dcnode-id="3113" id="cite_ref-IGNhistory_9-3"><a data-dcnode-id="3114" href="#cite_note-IGNhistory-9"><span data-dcnode-id="3115" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3110" id="cite_ref-GRtop100_60-1"><a data-dcnode-id="3111" href="#cite_note-GRtop100-60"><span data-dcnode-id="3112" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3109" instrument_node=""> The Prince's change into a darker character for </span><i data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3106" instrument_node=""> received a notoriously mixed response, with fans and many critics seeing it as a change for the worse.</span><sup class="reference" data-dcnode-id="3103" id="cite_ref-EndaInter1_12-2"><a data-dcnode-id="3104" href="#cite_note-EndaInter1-12"><span data-dcnode-id="3105" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="3100" id="cite_ref-GRcharacters_63-0"><a data-dcnode-id="3101" href="#cite_note-GRcharacters-63"><span data-dcnode-id="3102" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3099" instrument_node=""> Mechner was among them, commenting on </span><i data-dcnode-id="3096"><a class="mw-redirect" data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wired_%28website%29" title="Wired (website)"><span data-dcnode-id="3098" instrument_node="">Wired</span></a></i><span data-dcnode-id="3095" instrument_node=""> that he was "not a fan of the artistic direction, or the violence that earned it an M rating. The story, character, dialog, voice acting, and visual style were not to my taste".</span><sup class="reference" data-dcnode-id="3092" id="cite_ref-WiredMechner_64-0"><a data-dcnode-id="3093" href="#cite_note-WiredMechner-64"><span data-dcnode-id="3094" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3091" instrument_node=""> Others praised the change, such as Heather Newman of </span><i data-dcnode-id="3088"><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detroit_Free_Press" title="Detroit Free Press"><span data-dcnode-id="3090" instrument_node="">Detroit Free Press</span></a></i><span data-dcnode-id="3087" instrument_node="">, who praised the character's portrayal and design.</span><sup class="reference" data-dcnode-id="3084" id="cite_ref-EndaInter1_12-3"><a data-dcnode-id="3085" href="#cite_note-EndaInter1-12"><span data-dcnode-id="3086" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="3081" id="cite_ref-DetroitReview_65-0"><a data-dcnode-id="3082" href="#cite_note-DetroitReview-65"><span data-dcnode-id="3083" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3080" instrument_node=""> Despite the mixed critic and fan reception, Ubisoft have defended the change as a legitimate evolution of the Prince's character.</span><sup class="reference" data-dcnode-id="3077" id="cite_ref-IGNhistory_9-4"><a data-dcnode-id="3078" href="#cite_note-IGNhistory-9"><span data-dcnode-id="3079" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3076" instrument_node=""> The Prince's return to a persona similar to that in </span><i data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3073" instrument_node=""> both pleased Mechner and was more favorably received by critics and fans.</span><sup class="reference" data-dcnode-id="3070" id="cite_ref-IGNhistory_9-5"><a data-dcnode-id="3071" href="#cite_note-IGNhistory-9"><span data-dcnode-id="3072" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3067" id="cite_ref-GRtop100_60-2"><a data-dcnode-id="3068" href="#cite_note-GRtop100-60"><span data-dcnode-id="3069" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="3064" id="cite_ref-WiredMechner_64-1"><a data-dcnode-id="3065" href="#cite_note-WiredMechner-64"><span data-dcnode-id="3066" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3063" instrument_node=""> </span><a data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GameSpot" title="GameSpot"><span data-dcnode-id="3062" instrument_node="">GameSpot</span></a><span data-dcnode-id="3060" instrument_node="">'s Bob Colayco enjoyed how the game seemed to self-reference the criticism in its portrayal of the character and his struggle with his Dark Prince persona. He praised the portrayal of this struggle, saying "the internal strife in the schizophrenic prince's mind forms a compelling part of the storyline".</span><sup class="reference" data-dcnode-id="3057" id="cite_ref-GStwothrones_66-0"><a data-dcnode-id="3058" href="#cite_note-GStwothrones-66"><span data-dcnode-id="3059" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3056" instrument_node="">
</span></p><p data-dcnode-id="3023"><span data-dcnode-id="3054" instrument_node="">The Prince from the 2008 reboot was well received by video game critics, but criticized by fans of the series, whose main complaint was the performance of North in the role.</span><sup class="reference" data-dcnode-id="3051" id="cite_ref-GamaCritics_67-0"><a data-dcnode-id="3052" href="#cite_note-GamaCritics-67"><span data-dcnode-id="3053" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="3048" id="cite_ref-GamaPrince_68-0"><a data-dcnode-id="3049" href="#cite_note-GamaPrince-68"><span data-dcnode-id="3050" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3047" instrument_node=""> In an article about the sexuality of the </span><i data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3044" instrument_node=""> reboot, </span><a class="mw-redirect" data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamasutra" title="Gamasutra"><span data-dcnode-id="3043" instrument_node="">Gamasutra</span></a><span data-dcnode-id="3041" instrument_node=""> editor Tom Cross stated that he finds the rejection of both the game and its protagonist incomprehensible. He compared </span><i data-dcnode-id="3038"><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uncharted" title="Uncharted"><span data-dcnode-id="3040" instrument_node="">Uncharted</span></a></i><span data-dcnode-id="3037" instrument_node=""> protagonist </span><a class="mw-redirect" data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathan_Drake_%28character%29" title="Nathan Drake (character)"><span data-dcnode-id="3036" instrument_node="">Nathan Drake</span></a><span data-dcnode-id="3034" instrument_node=""> to the Prince, stating that it was not just because he was voiced by [North], but also because the sexual tension that [Drake] holds reminded him of the prince. He addressed the criticism of his voice, stating that people found it annoying and improper for him to sound so much like a </span><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Han_Solo" title="Han Solo"><span data-dcnode-id="3033" instrument_node="">Han Solo</span></a><span data-dcnode-id="3031" instrument_node="">-type character considering the video game is located in the Middle East. Cross found this criticism unfair, arguing that no one criticized female protagonist Elika's </span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_English" title="American English"><span data-dcnode-id="3030" instrument_node="">North American accent</span></a><span data-dcnode-id="3028" instrument_node=""> and added that the prince was a harder character to like than Nathan Drake, due to him being an "unrepentant jerk" instead of a "lovable jerk," but that merely makes him a harder sell.</span><sup class="reference" data-dcnode-id="3025" id="cite_ref-GamaPrince_68-1"><a data-dcnode-id="3026" href="#cite_note-GamaPrince-68"><span data-dcnode-id="3027" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3024" instrument_node="">
</span></p><p data-dcnode-id="3004"><span data-dcnode-id="3022" instrument_node="">Gyllenhaal's appearance and especially his haircut for the role of the Prince were ridiculed by several sources, but Ghazzal Dabiri, a lecturer and coordinator of </span><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_studies" title="Iranian studies"><span data-dcnode-id="3021" instrument_node="">Iranian studies</span></a><span data-dcnode-id="3019" instrument_node=""> at </span><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_University" title="Columbia University"><span data-dcnode-id="3018" instrument_node="">Columbia University</span></a><span data-dcnode-id="3016" instrument_node="">, said it was historically accurate, positively comparing the portrayal of Persians in the film to those of </span><i data-dcnode-id="3013"><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/300_%28film%29" title="300 (film)"><span data-dcnode-id="3015" instrument_node="">300</span></a></i><span data-dcnode-id="3012" instrument_node=""> and adding: "An Iranian warrior-prince would have had those kinds of muscles! They did train in martial arts from very young ages. Some accounts say as soon as they were old enough to be taught reading, writing, </span><a data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arithmetic" title="Arithmetic"><span data-dcnode-id="3011" instrument_node="">arithmetic</span></a><span data-dcnode-id="3009" instrument_node="">, and so on, martial arts ... was part of their curriculum."</span><sup class="reference" data-dcnode-id="3006" id="cite_ref-PrinceFilmHair_69-0"><a data-dcnode-id="3007" href="#cite_note-PrinceFilmHair-69"><span data-dcnode-id="3008" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3005" instrument_node="">
</span></p><span data-dcnode-id="3003" instrument_node="">

ps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20150523121231/http%3A//www.behindthevoiceactors.com/characters/Prince-of-Persia/Prince/" rel="nofollow"><span data-dcnode-id="2913" instrument_node="">Archived</span></a><span data-dcnode-id="2911" instrument_node=""> from the original on May 23, 2015</span><span class="reference-accessdate" data-dcnode-id="2906"><span data-dcnode-id="2910" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">June 27,</span></span><span data-dcnode-id="2907" instrument_node=""> 2015</span></span><span data-dcnode-id="2905" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="2903" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=Behind+the+Voice+Actors+%E2%80%93+Prince&amp;rft.pub=Behind+the+Voice+Actors&amp;rft_id=http%3A%2F%2Fwww.behindthevoiceactors.com%2Fcharacters%2FPrince-of-Persia%2FPrince%2F&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+%28Prince+of+Persia%29"></span></span><span data-dcnode-id="2901" instrument_node="">

 not intimidated. He threw me out harm's way, shouting, "Leave now!" as he fought furiously. My Father was right… He told me many years ago that I did not have the instincts of a warrior. Darius did not have to die! Perhaps we could have overpowered the beast together. Instead I hesitated, terrified by the black shadow that haunted me.</span></q></cite><span class="Z3988" data-dcnode-id="2116" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Battles+of+Prince+of+Persia&amp;rft.pub=Ubisoft&amp;rft.date=2005-12-06&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+%28Prince+of+Persia%29"></span></span><span data-dcnode-id="2114" instrument_node="">
</span></li><span data-dcnode-id="2112" instrument_node="">

 Thousand Restraints. The box that I had to abandon at the summit of that unholy mountain. Father! Thank you for visiting your disgraced Son. It is not right that I live, while my mother...</span></q></cite><span class="Z3988" data-dcnode-id="2088" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Battles+of+Prince+of+Persia&amp;rft.pub=Ubisoft&amp;rft.date=2005-12-06&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+%28Prince+of+Persia%29"></span></span><span data-dcnode-id="2086" instrument_node="">

ensured that peace will return to this land... But will there be peace for me? I cannot rest with this beast forever at my back. I must travel on to distant places, desperate and alone. A prince without a land to call his own...</span></q></cite><span class="Z3988" data-dcnode-id="2060" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Battles+of+Prince+of+Persia&amp;rft.pub=Ubisoft&amp;rft.date=2005-12-06&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+%28Prince+of+Persia%29"></span></span><span data-dcnode-id="2058" instrument_node="">

rince+of+Persia%29"></span></span><span data-dcnode-id="1962" instrument_node="">

=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Prince+of+Persia%3A+Warrior+Within&amp;rft.pub=Ubisoft&amp;rft.date=2004-11-30&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+%28Prince+of+Persia%29"></span></span><span data-dcnode-id="1937" instrument_node="">

ll...</span></q></cite><span class="Z3988" data-dcnode-id="1914" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Prince+of+Persia%3A+The+Two+Thrones&amp;rft.pub=Ubisoft&amp;rft.date=2005-12-01&amp;rft.au=Ubisoft+Montreal&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APrince+%28Prince+of+Persia%29"></span></span><span data-dcnode-id="1912" instrument_node="">
