</span><p data-dcnode-id="4060"><span data-dcnode-id="4075" instrument_node="">The </span><b data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Prince</span></b><span data-dcnode-id="4072" instrument_node=""> is the name given to a group of fictional characters who act as the main protagonists of the </span><i data-dcnode-id="4069"><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia" title="Prince of Persia"><span data-dcnode-id="4071" instrument_node="">Prince of Persia</span></a></i><span data-dcnode-id="4068" instrument_node=""> franchise, developed and published by </span><a data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubisoft" title="Ubisoft"><span data-dcnode-id="4067" instrument_node="">Ubisoft</span></a><span data-dcnode-id="4065" instrument_node="">. There have been several distinct Prince characters, all sharing general traits. The most prominent version was first featured in the 2003 game </span><i data-dcnode-id="4062"><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="Prince of Persia: The Sands of Time"><span data-dcnode-id="4064" instrument_node="">Prince of Persia: The Sands of Time</span></a></i><span data-dcnode-id="4061" instrument_node="">, who has featured in a large number of games set within that game's continuity. In the 2008 reboot, the Prince is not from a royal family, but was planned to earn his title during the course of his journey.
</span></p><p data-dcnode-id="4018"><span data-dcnode-id="4059" instrument_node="">The Prince was originally created by </span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="4058" instrument_node="">Jordan Mechner</span></a><span data-dcnode-id="4056" instrument_node=""> for the </span><a data-dcnode-id="4054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_%281989_video_game%29" title="Prince of Persia (1989 video game)"><span data-dcnode-id="4055" instrument_node="">original 1989 game</span></a><span data-dcnode-id="4053" instrument_node="">. His main concepts for the character were taken from Middle Eastern fiction such as </span><i data-dcnode-id="4050"><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Thousand_and_One_Nights" title="One Thousand and One Nights"><span data-dcnode-id="4052" instrument_node="">One Thousand and One Nights</span></a></i><span data-dcnode-id="4049" instrument_node="">, while his athleticism taking inspiration from the opening of </span><i data-dcnode-id="4046"><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raiders_of_the_Lost_Ark" title="Raiders of the Lost Ark"><span data-dcnode-id="4048" instrument_node="">Raiders of the Lost Ark</span></a></i><span data-dcnode-id="4045" instrument_node="">. The character's movements were created by Mechner by capturing footage of his brother and transferring them into the game using </span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rotoscoping" title="Rotoscoping"><span data-dcnode-id="4044" instrument_node="">rotoscoping</span></a><span data-dcnode-id="4042" instrument_node="">. For </span><i data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4039" instrument_node="">, the Prince was redesigned and rewritten, and over the course of its sequels, was developed in various ways. The </span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_%282008_video_game%29" title="Prince of Persia (2008 video game)"><span data-dcnode-id="4038" instrument_node="">2008 series reboot</span></a><span data-dcnode-id="4036" instrument_node=""> redesigned him around a concept of a prince in making. In the 2010 </span><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time_%28film%29" title="Prince of Persia: The Sands of Time (film)"><i data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="4033" instrument_node=""> film</span></a><span data-dcnode-id="4031" instrument_node="">, the Prince is named </span><b data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Dastan</span></b><span data-dcnode-id="4028" instrument_node=""> (</span><a data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="4027" instrument_node="">Persian</span></a><span data-dcnode-id="4025" instrument_node="">: </span><span data-dcnode-id="4023" dir="rtl" lang="fa"><span data-dcnode-id="4024" instrument_node="">دستان</span></span><span data-dcnode-id="4022" instrument_node="">), and portrayed by </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jake_Gyllenhaal" title="Jake Gyllenhaal"><span data-dcnode-id="4021" instrument_node="">Jake Gyllenhaal</span></a><span data-dcnode-id="4019" instrument_node="">.
</span></p><p data-dcnode-id="4010"><span data-dcnode-id="4017" instrument_node="">While public and critical opinion of individual Princes has varied, the character in general has been positively received. The original Prince has been seen as a breakthrough in gameplay design, while his appearances in </span><i data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="4014" instrument_node=""> have varied, with particular criticism being laid against his dark portrayal in </span><i data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Warrior Within</span></i><span data-dcnode-id="4011" instrument_node="">. The reboot Prince's portrayal has also divided public opinion, while Gyllenhaal's portrayal in film has drawn mixed opinions from critics.
</span></p><span data-dcnode-id="4009" instrument_node="">

</span><h2 data-dcnode-id="3910"><span class="mw-headline" data-dcnode-id="3918" id="Characteristics"><span data-dcnode-id="3919" instrument_node="">Characteristics</span></span><span class="mw-editsection" data-dcnode-id="3911"><span class="mw-editsection-bracket" data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">[</span></span><a data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D1" title="Edit section: Characteristics"><span data-dcnode-id="3915" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3879"><span data-dcnode-id="3908" instrument_node="">The Prince represents multiple characters across a number of different settings, but all these characters share general traits. Most incarnations of the Prince have been of a royal line, although in the original games the character was initially unaware of this.</span><sup class="reference" data-dcnode-id="3905" id="cite_ref-MechnerPOP2_3-0"><a data-dcnode-id="3906" href="#cite_note-MechnerPOP2-3"><span data-dcnode-id="3907" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3902" id="cite_ref-MANUALsands_4-0"><a data-dcnode-id="3903" href="#cite_note-MANUALsands-4"><span data-dcnode-id="3904" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3901" instrument_node=""> In the 2008 reboot, the Prince is instead a character on an epic journey that will eventually mold him into a Prince.</span><sup class="reference" data-dcnode-id="3898" id="cite_ref-KotakuMattes_5-0"><a data-dcnode-id="3899" href="#cite_note-KotakuMattes-5"><span data-dcnode-id="3900" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3897" instrument_node=""> Each Prince has been adept at acrobatics and combat, and according to </span><a data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Mechner" title="Jordan Mechner"><span data-dcnode-id="3896" instrument_node="">Jordan Mechner</span></a><span data-dcnode-id="3894" instrument_node="">, the series' gameplay and its title character were "inseparable".</span><sup class="reference" data-dcnode-id="3891" id="cite_ref-KotakuMattes_5-1"><a data-dcnode-id="3892" href="#cite_note-KotakuMattes-5"><span data-dcnode-id="3893" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="3888" id="cite_ref-SoTwriting_6-0"><a data-dcnode-id="3889" href="#cite_note-SoTwriting-6"><span data-dcnode-id="3890" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3887" instrument_node=""> According to Ben Mattes, the concept of the Prince has become synonymous with the number of potential stories within the </span><i data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3884" instrument_node=""> series, along with defining the various incarnations' unifying traits.</span><sup class="reference" data-dcnode-id="3881" id="cite_ref-KotakuMattes_5-2"><a data-dcnode-id="3882" href="#cite_note-KotakuMattes-5"><span data-dcnode-id="3883" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3880" instrument_node="">
</span></p><span data-dcnode-id="3878" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3854"><p data-dcnode-id="3859"><span data-dcnode-id="3875" instrument_node="">Beginning with [</span><i data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3872" instrument_node="">] back in 1989 to Ubisoft's [</span><i data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">Sands of Time</span></i><span data-dcnode-id="3869" instrument_node="">] trilogy, the </span><i data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3866" instrument_node=""> brand is like a collection of fantastic tales, drawing inspiration from the </span><i data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">Arabian Nights</span></i><span data-dcnode-id="3863" instrument_node=""> stories. Possibilities for enticing storylines and characters are endless with such a rich, colorful, shape shifting and magical universe. So there are as many stories of the Prince as there are many versions of the Prince himself – they all co-exist, they all share prodigious abilities and a liking for dauntless adventures and trouble.</span><sup class="reference" data-dcnode-id="3860" id="cite_ref-KotakuMattes_5-3"><a data-dcnode-id="3861" href="#cite_note-KotakuMattes-5"><span data-dcnode-id="3862" instrument_node="">[5]</span></a></sup></p><div class="templatequotecite" data-dcnode-id="3855"><span data-dcnode-id="3858" instrument_node="">— </span><cite data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Ben Mattes, 2008</span></cite></div></blockquote><span data-dcnode-id="3853" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3852" instrument_node="">The version of the Prince that has gone through the most development is the character from </span><i data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3849" instrument_node=""> and its sequels. Mechner described the Prince as he is portrayed during the opening of </span><i data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3846" instrument_node=""> as "[A] daredevil who races ahead of the attacking army in order to gain "honor and glory" by being the first to steal a valuable trophy of war".</span><sup class="reference" data-dcnode-id="3843" id="cite_ref-SoTwriting_6-1"><a data-dcnode-id="3844" href="#cite_note-SoTwriting-6"><span data-dcnode-id="3845" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3842" instrument_node=""> Ceri Young, writer of </span><i data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">The Forgotten Sands</span></i><span data-dcnode-id="3839" instrument_node="">, described this young Prince as "arrogant and [craving] power".</span><sup class="reference" data-dcnode-id="3836" id="cite_ref-FBceri_7-0"><a data-dcnode-id="3837" href="#cite_note-FBceri-7"><span data-dcnode-id="3838" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3835" instrument_node=""> For </span><i data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3832" instrument_node="">, the Prince was turned into a darker, more callous character who had to face the consequences of his actions.</span><sup class="reference" data-dcnode-id="3829" id="cite_ref-MANUALwarrior_8-0"><a data-dcnode-id="3830" href="#cite_note-MANUALwarrior-8"><span data-dcnode-id="3831" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3826" id="cite_ref-IGNhistory_9-0"><a data-dcnode-id="3827" href="#cite_note-IGNhistory-9"><span data-dcnode-id="3828" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3825" instrument_node=""> This was partly due to Mallet not liking the ending of </span><i data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3822" instrument_node="">, in which the Prince undid everything and consequently went unpunished for his actions.</span><sup class="reference" data-dcnode-id="3819" id="cite_ref-IGNhistory_9-1"><a data-dcnode-id="3820" href="#cite_note-IGNhistory-9"><span data-dcnode-id="3821" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3818" instrument_node=""> For </span><i data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">The Two Thrones</span></i><span data-dcnode-id="3815" instrument_node="">, the developers played on previous themes of duality when creating both the Prince and his abilities.</span><sup class="reference" data-dcnode-id="3812" id="cite_ref-TTTinterview_10-0"><a data-dcnode-id="3813" href="#cite_note-TTTinterview-10"><span data-dcnode-id="3814" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3811" instrument_node=""> For </span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">The Forgotten Sands</span></i><span data-dcnode-id="3808" instrument_node="">, he was given a personality much like that present in </span><i data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3805" instrument_node="">. According to Young, the Prince does still have aspects of his younger self, but is wiser from his experiences during </span><i data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3802" instrument_node=""> and is wary of the weight of magic on its wielders.</span><sup class="reference" data-dcnode-id="3799" id="cite_ref-FBceri_7-1"><a data-dcnode-id="3800" href="#cite_note-FBceri-7"><span data-dcnode-id="3801" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3798" instrument_node=""> He was also set to suffer hardships that would begin his change into what he appeared as in </span><i data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3795" instrument_node="">.</span><sup class="reference" data-dcnode-id="3792" id="cite_ref-EndaInter2_11-0"><a data-dcnode-id="3793" href="#cite_note-EndaInter2-11"><span data-dcnode-id="3794" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3791" instrument_node=""> While he has a companion in </span><i data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3788" instrument_node="">, he is portrayed in </span><i data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">The Forgotten Sands</span></i><span data-dcnode-id="3785" instrument_node=""> as trying to distance himself from that after those events.</span><sup class="reference" data-dcnode-id="3782" id="cite_ref-EndaInter1_12-0"><a data-dcnode-id="3783" href="#cite_note-EndaInter1-12"><span data-dcnode-id="3784" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3781" instrument_node="">
</span></p><span data-dcnode-id="3779" instrument_node="">
</span><h2 data-dcnode-id="3769"><span class="mw-headline" data-dcnode-id="3777" id="Appearances"><span data-dcnode-id="3778" instrument_node="">Appearances</span></span><span class="mw-editsection" data-dcnode-id="3770"><span class="mw-editsection-bracket" data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">[</span></span><a data-dcnode-id="3773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D2" title="Edit section: Appearances"><span data-dcnode-id="3774" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3768" instrument_node="">
</span><h3 data-dcnode-id="3758"><span class="mw-headline" data-dcnode-id="3766" id="Original_trilogy"><span data-dcnode-id="3767" instrument_node="">Original trilogy</span></span><span class="mw-editsection" data-dcnode-id="3759"><span class="mw-editsection-bracket" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">[</span></span><a data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D3" title="Edit section: Original trilogy"><span data-dcnode-id="3763" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3706"><span data-dcnode-id="3756" instrument_node="">The original Prince was a noble who fell from grace when his family and kingdom were destroyed by an evil witch, with the Prince as the only survivor.</span><sup class="reference" data-dcnode-id="3753" id="cite_ref-MechnerPOP2_3-1"><a data-dcnode-id="3754" href="#cite_note-MechnerPOP2-3"><span data-dcnode-id="3755" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3750" id="cite_ref-QUOTEbeginning_13-0"><a data-dcnode-id="3751" href="#cite_note-QUOTEbeginning-13"><span data-dcnode-id="3752" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3749" instrument_node=""> Living as a street thief in an unspecified city, he eventually met and won the heart of the daughter of the city's Sultan. During the events of the original </span><i data-dcnode-id="3746"><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_%281989_video_game%29" title="Prince of Persia (1989 video game)"><span data-dcnode-id="3748" instrument_node="">Prince of Persia</span></a></i><span data-dcnode-id="3745" instrument_node="">, the Sultan's vizier Jaffar attempts to seize control of the kingdom, and the Prince is imprisoned in the palace dungeons. He frees himself, defeats the Vizier and saves the Princess.</span><sup class="reference" data-dcnode-id="3742" id="cite_ref-QUOTEpop_14-0"><a data-dcnode-id="3743" href="#cite_note-QUOTEpop-14"><span data-dcnode-id="3744" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3741" instrument_node=""> In </span><i data-dcnode-id="3738"><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_2%3A_The_Shadow_and_the_Flame" title="Prince of Persia 2: The Shadow and the Flame"><span data-dcnode-id="3740" instrument_node="">Prince of Persia 2: The Shadow and the Flame</span></a></i><span data-dcnode-id="3737" instrument_node="">, having married the Princess, the Prince is driven from the kingdom by Jaffar, who magically poses as the Prince to usurp the kingdom in his name and poison the Princess.</span><sup class="reference" data-dcnode-id="3734" id="cite_ref-QUOTEusurp_15-0"><a data-dcnode-id="3735" href="#cite_note-QUOTEusurp-15"><span data-dcnode-id="3736" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3731" id="cite_ref-QUOTEpoison_16-0"><a data-dcnode-id="3732" href="#cite_note-QUOTEpoison-16"><span data-dcnode-id="3733" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3730" instrument_node=""> The Prince learns of his former heritage, and returns to defeat Jaffar using powers gained from an ancient temple. Plot elements from the ending of </span><i data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">The Shadow and the Flame</span></i><span data-dcnode-id="3727" instrument_node=""> were going to be continued in an unpronounced sequel.</span><sup class="reference" data-dcnode-id="3724" id="cite_ref-MechnerPOP2_3-2"><a data-dcnode-id="3725" href="#cite_note-MechnerPOP2-3"><span data-dcnode-id="3726" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3723" instrument_node=""> In </span><i data-dcnode-id="3720"><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_3D" title="Prince of Persia 3D"><span data-dcnode-id="3722" instrument_node="">Prince of Persia 3D</span></a></i><span data-dcnode-id="3719" instrument_node="">, the Prince, Princess and Sultan visit the Sultan's brother Assan. Assan, whose son Rugnor had been promised the Princess' hand in marriage, imprisons the Prince, intent on fulfilling the promised marriage.</span><sup class="reference" data-dcnode-id="3716" id="cite_ref-QUOTEmarriage_17-0"><a data-dcnode-id="3717" href="#cite_note-QUOTEmarriage-17"><span data-dcnode-id="3718" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3715" instrument_node=""> The Prince escapes, and when he confronts Assan and the Sultan, Assan accidentally kills the Sultan, then frames the Prince.</span><sup class="reference" data-dcnode-id="3712" id="cite_ref-QUOTEdeath_18-0"><a data-dcnode-id="3713" href="#cite_note-QUOTEdeath-18"><span data-dcnode-id="3714" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3711" instrument_node=""> The Prince pursues Rugnor, who has captured the Princess, and eventually kills him. He then flees to places unknown with the Princess.</span><sup class="reference" data-dcnode-id="3708" id="cite_ref-QUOTEflight_19-0"><a data-dcnode-id="3709" href="#cite_note-QUOTEflight-19"><span data-dcnode-id="3710" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3707" instrument_node="">
</span></p><span data-dcnode-id="3705" instrument_node="">
</span><h3 data-dcnode-id="3694"><span class="mw-headline" data-dcnode-id="3702" id="The_Sands_of_Time"><i data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">The Sands of Time</span></i></span><span class="mw-editsection" data-dcnode-id="3695"><span class="mw-editsection-bracket" data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">[</span></span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D4" title="Edit section: The Sands of Time"><span data-dcnode-id="3699" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3693" instrument_node="">
</span><p data-dcnode-id="3653"><span data-dcnode-id="3692" instrument_node="">In </span><i data-dcnode-id="3689"><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time" title="Prince of Persia: The Sands of Time"><span data-dcnode-id="3691" instrument_node="">Prince of Persia: The Sands of Time</span></a></i><span data-dcnode-id="3688" instrument_node="">, the Prince and his father Sharaman attack the palace of an Indian Maharaja after the Maharaja's Vizier lets them in with the promise of treasure, among them an hourglass containing the Sands of Time. The Prince finds an artifact called the Dagger of Time, which can manipulate time. While visiting the Sultan of Azad after the battle, the Vizier betrays them and releases the Sands of Time, turning everyone but the Prince, the Vizier, and the Maharaja's daughter Farah into monsters.</span><sup class="reference" data-dcnode-id="3685" id="cite_ref-SoTwriting_6-2"><a data-dcnode-id="3686" href="#cite_note-SoTwriting-6"><span data-dcnode-id="3687" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3684" instrument_node=""> Despite mistrusting each other, the Prince and Farah ally.</span><sup class="reference" data-dcnode-id="3681" id="cite_ref-QUOTEtrust_20-0"><a data-dcnode-id="3682" href="#cite_note-QUOTEtrust-20"><span data-dcnode-id="3683" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3680" instrument_node=""> That mistrust later leads to Farah's death while saving the Prince, and the Prince uses the Sands and the Dagger to return to before the attack on the Maharaja's palace, preventing those events from taking place.</span><sup class="reference" data-dcnode-id="3677" id="cite_ref-QUOTEreverse1_21-0"><a data-dcnode-id="3678" href="#cite_note-QUOTEreverse1-21"><span data-dcnode-id="3679" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="3674" id="cite_ref-QUOTEreverse2_22-0"><a data-dcnode-id="3675" href="#cite_note-QUOTEreverse2-22"><span data-dcnode-id="3676" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3673" instrument_node=""> In </span><i data-dcnode-id="3670"><a data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battles_of_Prince_of_Persia" title="Battles of Prince of Persia"><span data-dcnode-id="3672" instrument_node="">Battles of Prince of Persia</span></a></i><span data-dcnode-id="3669" instrument_node="">, the Prince goes on new campaigns for his father, but due to his interference in </span><i data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3666" instrument_node="">, a mystical being called the Dahaka appears to kill the Prince and correct his changes to the timeline.</span><sup class="reference" data-dcnode-id="3663" id="cite_ref-QUOTEdahaka_23-0"><a data-dcnode-id="3664" href="#cite_note-QUOTEdahaka-23"><span data-dcnode-id="3665" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3662" instrument_node=""> The Prince's desperate attempt to imprison the Dahaka in the Box of A Thousand Restraints unleashes a group of hostile spirits and provokes a war between Persia and India. This leads to the death of his mother and to him becoming an outcast.</span><sup class="reference" data-dcnode-id="3659" id="cite_ref-QUOTEqueen_24-0"><a data-dcnode-id="3660" href="#cite_note-QUOTEqueen-24"><span data-dcnode-id="3661" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3658" instrument_node=""> He succeeds in undoing his mistake, but is forced to go on the run from the Dahaka.</span><sup class="reference" data-dcnode-id="3655" id="cite_ref-QUOTErun_25-0"><a data-dcnode-id="3656" href="#cite_note-QUOTErun-25"><span data-dcnode-id="3657" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3654" instrument_node="">
</span></p><p data-dcnode-id="3606"><span data-dcnode-id="3652" instrument_node="">By the events of </span><i data-dcnode-id="3649"><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_Warrior_Within" title="Prince of Persia: Warrior Within"><span data-dcnode-id="3651" instrument_node="">Warrior Within</span></a></i><span data-dcnode-id="3648" instrument_node="">, seven years after </span><i data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3645" instrument_node="">, he has become callous and depressed due to being deprived of proper food and sleep by the Dahaka's pursuit.</span><sup class="reference" data-dcnode-id="3642" id="cite_ref-MANUALwarrior_8-1"><a data-dcnode-id="3643" href="#cite_note-MANUALwarrior-8"><span data-dcnode-id="3644" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3639" id="cite_ref-GSimpressions_26-0"><a data-dcnode-id="3640" href="#cite_note-GSimpressions-26"><span data-dcnode-id="3641" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3638" instrument_node=""> He decides to travel to the island where the Sands of Time were found and prevent their creation. Travelling to the time when the Sands were created, he encounters Kaileena, the Empress of Time who was created by the gods and is destined to create the Sands.</span><sup class="reference" data-dcnode-id="3635" id="cite_ref-WarriorGuide_27-0"><a data-dcnode-id="3636" href="#cite_note-WarriorGuide-27"><span data-dcnode-id="3637" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3634" instrument_node=""> The Prince kills Kaileena, but he unknowingly creates the Sands in doing so.</span><sup class="reference" data-dcnode-id="3631" id="cite_ref-QUOTEarchitect_28-0"><a data-dcnode-id="3632" href="#cite_note-QUOTEarchitect-28"><span data-dcnode-id="3633" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3630" instrument_node=""> Using an artifact called the Mask of the Wraith, the Prince travels back in time and forces Kaileena into his time, hoping to kill her there and create the Sands while saving himself.</span><sup class="reference" data-dcnode-id="3627" id="cite_ref-QUOTEmask_29-0"><a data-dcnode-id="3628" href="#cite_note-QUOTEmask-29"><span data-dcnode-id="3629" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3626" instrument_node=""> In the game's canon ending, the Prince obtains a magical sword and uses to kill the Dakaha when it attacks Kaileena after he brings her to his time. In </span><i data-dcnode-id="3623"><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Two_Thrones" title="Prince of Persia: The Two Thrones"><span data-dcnode-id="3625" instrument_node="">The Two Thrones</span></a></i><span data-dcnode-id="3622" instrument_node="">, the Prince returns to Babylon with Kaileena and finds that his actions in </span><i data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3619" instrument_node=""> undid the death of the Vizier. The Vizier kills Kaileena, absorbing the Sands and turning into a god-like monster. The Prince is also partially infected by the Sands, which turns him into a Sand Monster hybrid and helps manifests an alternate Dark Prince personality.</span><sup class="reference" data-dcnode-id="3616" id="cite_ref-QUOTEdark_30-0"><a data-dcnode-id="3617" href="#cite_note-QUOTEdark-30"><span data-dcnode-id="3618" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3615" instrument_node=""> During his adventure, he reunites with Farah and struggles against his Dark Prince persona. Upon finding his father's body, the Prince decides to accept the consequences of his actions, gaining control over his Dark Prince self.</span><sup class="reference" data-dcnode-id="3612" id="cite_ref-QUOTEaccept_31-0"><a data-dcnode-id="3613" href="#cite_note-QUOTEaccept-31"><span data-dcnode-id="3614" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3611" instrument_node=""> He kills the Vizier and frees Kaileena's spirit, who purges the Sands from him and leaves with the Sands for another world. When the Dark Prince makes a final attack, Farah helps the Prince finally overcome his dark self.</span><sup class="reference" data-dcnode-id="3608" id="cite_ref-QUOTEfree_32-0"><a data-dcnode-id="3609" href="#cite_note-QUOTEfree-32"><span data-dcnode-id="3610" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3607" instrument_node="">
</span></p><p data-dcnode-id="3580"><span data-dcnode-id="3605" instrument_node="">The four versions of </span><i data-dcnode-id="3602"><a data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Forgotten_Sands" title="Prince of Persia: The Forgotten Sands"><span data-dcnode-id="3604" instrument_node="">The Forgotten Sands</span></a></i><span data-dcnode-id="3601" instrument_node=""> across its six platforms tell additional stories about the Prince. The main console version shows part of how the Prince's outlook on the world changed during the seven-year gap between </span><i data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3598" instrument_node=""> and </span><i data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3595" instrument_node="">.</span><sup class="reference" data-dcnode-id="3592" id="cite_ref-GSimpressions_26-1"><a data-dcnode-id="3593" href="#cite_note-GSimpressions-26"><span data-dcnode-id="3594" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3591" instrument_node=""> The Prince is sent by his father to the reign of his brother Malik to learn the skills of a leader, and finds the city under siege. Malik releases Solomon's Army in the hopes of destroying the enemy army, but instead unleashes a hostile army led by the Ifrti Ratash. The Prince allies with Razia, queen of the Marid, in his quest to re-imprison the army.</span><sup class="reference" data-dcnode-id="3588" id="cite_ref-FBceri_7-2"><a data-dcnode-id="3589" href="#cite_note-FBceri-7"><span data-dcnode-id="3590" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3585" id="cite_ref-QUOTEratash_33-0"><a data-dcnode-id="3586" href="#cite_note-QUOTEratash-33"><span data-dcnode-id="3587" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3584" instrument_node=""> Malik attacks Ratash and is possessed by him, forcing Razia to become a sword the Prince uses to kill his brother and Ratash. In the PSP version, the Prince goes in search of the fire spirit Ahihud, who is killing everyone of royal blood to prevent a prophecy of his death coming true. Allied with Helem, a spirit of time, he frees her sisters from Ahihud's power and kills him, ending his tyranny. In </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Forgotten_Sands_%28Wii%29" title="Prince of Persia: The Forgotten Sands (Wii)"><span data-dcnode-id="3583" instrument_node="">the Wii version</span></a><span data-dcnode-id="3581" instrument_node="">, the Prince allies with a Djinn named Zahra, who promises him a kingdom, a princess and freedom from death. She leads him to the hidden city of Izdihar, which the Prince must purge of an evil vine called the Haoma in exchange for his promised prize. In the event, he rejects the prizes, eventually granting his immortality to the kingdom's princess Nasreen in an attempt to save her from the Haoma. While he succeeds in destroying the Haoma, the kingdom is destroyed and Zahra vanishes. In the DS version, the Prince is kidnapped by a cult whose master wants to use his blood and Razia's magic to become all powerful. An amnesiac Prince reunites with Razia to reclaim his memories and her power. With this done, they defeat the Master, but it costs Razia's life.
</span></p><span data-dcnode-id="3579" instrument_node="">
</span><h3 data-dcnode-id="3569"><span class="mw-headline" data-dcnode-id="3577" id="Reboot"><span data-dcnode-id="3578" instrument_node="">Reboot</span></span><span class="mw-editsection" data-dcnode-id="3570"><span class="mw-editsection-bracket" data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">[</span></span><a data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D5" title="Edit section: Reboot"><span data-dcnode-id="3574" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3568" instrument_node="">
</span><p data-dcnode-id="3557"><span data-dcnode-id="3567" instrument_node="">In the 2008 reboot, the Prince gets lost in a sandstorm and falls into a valley where he encounters </span><a class="mw-redirect" data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Prince_of_Persia_characters%23Elika" title="List of Prince of Persia characters"><span data-dcnode-id="3566" instrument_node="">Elika</span></a><span data-dcnode-id="3564" instrument_node="">. The prince soon aids Elika in her quest to contain the dark god </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahriman" title="Ahriman"><span data-dcnode-id="3563" instrument_node="">Ahriman</span></a><span data-dcnode-id="3561" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tree_of_Life" title="Tree of Life"><span data-dcnode-id="3560" instrument_node="">Tree of Life</span></a><span data-dcnode-id="3558" instrument_node=""> at the center of the valley. They ultimately fail, but make every effort to lock Ahriman back into the tree. They succeed at this, but Elika dies. The prince, mirroring the actions of Elika's father which originally released Ahriman, decides to bring Elika back to life, freeing Ahriman once again. Ahriman chases them to an underground palace, where Elika ultimately abandons the prince in search of her people.
</span></p><p data-dcnode-id="3552"><span data-dcnode-id="3556" instrument_node="">In </span><i data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">The Fallen King</span></i><span data-dcnode-id="3553" instrument_node="">, the Prince fighting against a new evil created by Ahriman's corruption called the King of New Dawn. He is aided by Zan, a strange magus who turns out to be the King's other half. With the help of a mysterious being known as the Ancestor, the King of New Dawn is killed and the Corruption is purged, though it costs Zan's life. The Ancestor leaves the Prince with a message of hope, saying that a new ally and an inner power would be found.
</span></p><span data-dcnode-id="3551" instrument_node="">
</span><h2 data-dcnode-id="3541"><span class="mw-headline" data-dcnode-id="3549" id="Concept_and_design"><span data-dcnode-id="3550" instrument_node="">Concept and design</span></span><span class="mw-editsection" data-dcnode-id="3542"><span class="mw-editsection-bracket" data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">[</span></span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D6" title="Edit section: Concept and design"><span data-dcnode-id="3546" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3540" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3539" instrument_node="">The Prince was originally created by Mechner as the protagonist of his new game. His inspiration for the character's athleticism was the opening ten minutes of </span><i data-dcnode-id="3536"><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raiders_of_the_Lost_Ark" title="Raiders of the Lost Ark"><span data-dcnode-id="3538" instrument_node="">Raiders of the Lost Ark</span></a></i><span data-dcnode-id="3535" instrument_node="">, referencing main character </span><a data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indiana_Jones_%28character%29" title="Indiana Jones (character)"><span data-dcnode-id="3534" instrument_node="">Indiana Jones</span></a><span data-dcnode-id="3532" instrument_node="">' approach to situations encountered.</span><sup class="reference" data-dcnode-id="3529" id="cite_ref-GSpostmortem_34-0"><a data-dcnode-id="3530" href="#cite_note-GSpostmortem-34"><span data-dcnode-id="3531" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3528" instrument_node=""> Indiana Jones' less impervious portrayal compared to other action heroes also influenced Mechner's portrayal of the Prince.</span><sup class="reference" data-dcnode-id="3525" id="cite_ref-POPEdge_35-0"><a data-dcnode-id="3526" href="#cite_note-POPEdge-35"><span data-dcnode-id="3527" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3524" instrument_node=""> The character was based on multiple similar figures in ancient literature, including </span><i data-dcnode-id="3521"><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Thousand_and_One_Nights" title="One Thousand and One Nights"><span data-dcnode-id="3523" instrument_node="">One Thousand and One Nights</span></a></i><span data-dcnode-id="3520" instrument_node="">.</span><sup class="reference" data-dcnode-id="3517" id="cite_ref-SinaInterview_36-0"><a data-dcnode-id="3518" href="#cite_note-SinaInterview-36"><span data-dcnode-id="3519" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3516" instrument_node=""> The character's movements were created using </span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rotoscoping" title="Rotoscoping"><span data-dcnode-id="3515" instrument_node="">rotoscoping</span></a><span data-dcnode-id="3513" instrument_node="">, with Mechner video taping his brother doing the movements, then mapping them into the game.</span><sup class="reference" data-dcnode-id="3510" id="cite_ref-GSpostmortem_34-1"><a data-dcnode-id="3511" href="#cite_note-GSpostmortem-34"><span data-dcnode-id="3512" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3509" instrument_node=""> Originally a plain figure in white clothing, the Prince was restyled for its Japanese release in a turban and baggy pants. This look pleased Mechner, and became associated with the character during the original trilogy.</span><sup class="reference" data-dcnode-id="3506" id="cite_ref-HG101persia_37-0"><a data-dcnode-id="3507" href="#cite_note-HG101persia-37"><span data-dcnode-id="3508" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3505" instrument_node=""> Speaking in 2010, Mechner said that during his time writing the series bible for the production of future </span><i data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Prince of Persia</span></i><span data-dcnode-id="3502" instrument_node=""> games, he was attempting to force the character into the conventions of western fiction, forgetting the character's literary origins. By the time </span><i data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Prince of Persia 3D</span></i><span data-dcnode-id="3499" instrument_node=""> released to a lukewarm response, Mechner was actually pleased that the Prince had run his course, as he no longer recognized the character.</span><sup class="reference" data-dcnode-id="3496" id="cite_ref-PrinceAfterword_38-0"><a data-dcnode-id="3497" href="#cite_note-PrinceAfterword-38"><span data-dcnode-id="3498" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3495" instrument_node="">
</span></p><span data-dcnode-id="3493" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3472"><div class="thumbinner" data-dcnode-id="3473" style="width:252px;"><a class="image" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_of_Persia_version_comparison.jpg"><img alt="" class="thumbimage" data-dcnode-id="3492" data-file-height="235" data-file-width="424" decoding="async" height="139" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/d/d0/Prince_of_Persia_version_comparison.jpg/250px-Prince_of_Persia_version_comparison.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/d/d0/Prince_of_Persia_version_comparison.jpg/375px-Prince_of_Persia_version_comparison.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/d/d0/Prince_of_Persia_version_comparison.jpg 2x" width="250"></a><span data-dcnode-id="3490" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3474"><div class="magnify" data-dcnode-id="3488"><a class="internal" data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_of_Persia_version_comparison.jpg" title="Enlarge"></a></div><span data-dcnode-id="3487" instrument_node="">The Prince's portrayal and appearance changed radically between </span><i data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3484" instrument_node=""> (left) and </span><i data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3481" instrument_node=""> (right). The change divided critics and fans of the series.</span><sup class="reference" data-dcnode-id="3478" id="cite_ref-IGNhistory_9-2"><a data-dcnode-id="3479" href="#cite_note-IGNhistory-9"><span data-dcnode-id="3480" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3475" id="cite_ref-EndaInter1_12-1"><a data-dcnode-id="3476" href="#cite_note-EndaInter1-12"><span data-dcnode-id="3477" instrument_node="">[12]</span></a></sup></div></div></div><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3470" instrument_node="">For </span><i data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3467" instrument_node="">, the character was completely redesigned, taking reference purely from the original game rather than </span><i data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Prince of Persia 3D</span></i><span data-dcnode-id="3464" instrument_node="">.</span><sup class="reference" data-dcnode-id="3461" id="cite_ref-GamaMechner_39-0"><a data-dcnode-id="3462" href="#cite_note-GamaMechner-39"><span data-dcnode-id="3463" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3460" instrument_node=""> Mechner wrote the new story for the Prince purely for newcomers to the series, wanting the character to be memorable so as to provide a good "hook" for players together with the gameplay. He again drew inspiration from the opening of </span><i data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Raiders of the Lost Ark</span></i><span data-dcnode-id="3457" instrument_node=""> for the opening of </span><i data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3454" instrument_node="">. Something he was pleased with was his initially unsympathetic portrayal of the Prince.</span><sup class="reference" data-dcnode-id="3451" id="cite_ref-SoTwriting_6-3"><a data-dcnode-id="3452" href="#cite_note-SoTwriting-6"><span data-dcnode-id="3453" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3450" instrument_node=""> His inspiration for the character's more serious portrayal was the stories of the </span><i data-dcnode-id="3447"><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shahnameh" title="Shahnameh"><span data-dcnode-id="3449" instrument_node="">Shahnameh</span></a></i><span data-dcnode-id="3446" instrument_node="">, although he later admitted that he could not entirely remove the influences of the original Prince. In his view, "It's [the Prince's] inability to solve this conflict that gives him his particular charm."</span><sup class="reference" data-dcnode-id="3443" id="cite_ref-PrinceAfterword_38-1"><a data-dcnode-id="3444" href="#cite_note-PrinceAfterword-38"><span data-dcnode-id="3445" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3442" instrument_node=""> For his gameplay model, the Prince had over 780 movement animations scripted, far more than any other character in the game. This conversely led to difficulties with other enemy movements.</span><sup class="reference" data-dcnode-id="3439" id="cite_ref-GDMpostmortem_40-0"><a data-dcnode-id="3440" href="#cite_note-GDMpostmortem-40"><span data-dcnode-id="3441" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3438" instrument_node=""> The Prince was designed by Raphael Lacoste, the game's art director, who went through multiple versions from a young boy to a bare-chested older man. His final look was partially determined by the aesthetics of the game's environments.</span><sup class="reference" data-dcnode-id="3435" id="cite_ref-GSdevelopment_41-0"><a data-dcnode-id="3436" href="#cite_note-GSdevelopment-41"><span data-dcnode-id="3437" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3434" instrument_node="">
</span></p><p data-dcnode-id="3375"><span data-dcnode-id="3432" instrument_node="">For </span><i data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3429" instrument_node="">, a decision was taken by the development team from the outset to make the game's atmosphere darker. They also wanted to flesh the Prince out as a character, as they had felt something was lacking in </span><i data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3426" instrument_node="">. With these concepts in mind, they decided the Prince would "grow up", with the story being more focused on his character than him saving a person or place.</span><sup class="reference" data-dcnode-id="3423" id="cite_ref-IGNwarrior_42-0"><a data-dcnode-id="3424" href="#cite_note-IGNwarrior-42"><span data-dcnode-id="3425" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3422" instrument_node=""> The two people most involved with the Prince's redesigned were art director Mikael Labat and illustrator Nicolas Bouvier. During the early stages, some hybrid designs with his appearance in </span><i data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3419" instrument_node=""> were created, but it was soon decided that the team was not being radical enough with the redesign. His "charisma" needed to be new, yet consistent with the events of </span><i data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3416" instrument_node="">. His new armor reflected this change: it is made up of interlaced leather straps, granting him protection while giving him freedom to perform his acrobatic movements.</span><sup class="reference" data-dcnode-id="3413" id="cite_ref-WarriorMaking_43-0"><a data-dcnode-id="3414" href="#cite_note-WarriorMaking-43"><span data-dcnode-id="3415" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="3410" id="cite_ref-WarriorArtwork_44-0"><a data-dcnode-id="3411" href="#cite_note-WarriorArtwork-44"><span data-dcnode-id="3412" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3409" instrument_node=""> His design and portrayal in </span><i data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">The Two Thrones</span></i><span data-dcnode-id="3406" instrument_node=""> was intended to be a balance of elements from both </span><i data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3403" instrument_node=""> and </span><i data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">The Warrior Within</span></i><span data-dcnode-id="3400" instrument_node="">.</span><sup class="reference" data-dcnode-id="3397" id="cite_ref-TTTinterview_10-1"><a data-dcnode-id="3398" href="#cite_note-TTTinterview-10"><span data-dcnode-id="3399" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3396" instrument_node=""> In </span><i data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">The Forgotten Sands</span></i><span data-dcnode-id="3393" instrument_node="">, the story was written around the Prince still being a developing character, learning what it takes to be a ruler and to take responsibility for his actions.</span><sup class="reference" data-dcnode-id="3390" id="cite_ref-FBceri_7-3"><a data-dcnode-id="3391" href="#cite_note-FBceri-7"><span data-dcnode-id="3392" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3387" id="cite_ref-UbiDeveloper_45-0"><a data-dcnode-id="3388" href="#cite_note-UbiDeveloper-45"><span data-dcnode-id="3389" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3386" instrument_node=""> His representation was a cross between his portrayals in </span><i data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3383" instrument_node=""> and </span><i data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3380" instrument_node="">.</span><sup class="reference" data-dcnode-id="3377" id="cite_ref-GSimpressions_26-2"><a data-dcnode-id="3378" href="#cite_note-GSimpressions-26"><span data-dcnode-id="3379" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3376" instrument_node="">
</span></p><p data-dcnode-id="3328"><span data-dcnode-id="3374" instrument_node="">A third variation of the prince appears in the </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia_%282008_video_game%29" title="Prince of Persia (2008 video game)"><span data-dcnode-id="3373" instrument_node="">2008 series reboot</span></a><span data-dcnode-id="3371" instrument_node=""> and its DS companion game </span><i data-dcnode-id="3368"><a data-dcnode-id="3369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Fallen_King" title="Prince of Persia: The Fallen King"><span data-dcnode-id="3370" instrument_node="">The Fallen King</span></a></i><span data-dcnode-id="3367" instrument_node="">.</span><sup class="reference" data-dcnode-id="3364" id="cite_ref-EnReboot_46-0"><a data-dcnode-id="3365" href="#cite_note-EnReboot-46"><span data-dcnode-id="3366" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3363" instrument_node=""> Ben Mattes, the reboot's producer, explained that the inspiration for the character design of the prince was to express how he will eventually become a prince through an epic journey. Additional inspiration was drawn from characters such as </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sinbad_the_Sailor" title="Sinbad the Sailor"><span data-dcnode-id="3362" instrument_node="">Sinbad</span></a><span data-dcnode-id="3360" instrument_node=""> from </span><i data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">One Thousand and One Nights</span></i><span data-dcnode-id="3357" instrument_node="">, </span><a data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Han_Solo" title="Han Solo"><span data-dcnode-id="3356" instrument_node="">Han Solo</span></a><span data-dcnode-id="3354" instrument_node=""> from </span><i data-dcnode-id="3351"><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Wars" title="Star Wars"><span data-dcnode-id="3353" instrument_node="">Star Wars</span></a></i><span data-dcnode-id="3350" instrument_node="">, and </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aragorn" title="Aragorn"><span data-dcnode-id="3349" instrument_node="">Aragorn</span></a><span data-dcnode-id="3347" instrument_node=""> from </span><i data-dcnode-id="3344"><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Lord_of_the_Rings" title="The Lord of the Rings"><span data-dcnode-id="3346" instrument_node="">The Lord of the Rings</span></a></i><span data-dcnode-id="3343" instrument_node="">. Mattes explained that when designing the character, Ubisoft wanted to communicate visually the dichotomy of the life of an adventurer. The prince wears red and blue cloth as a </span><a data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turban" title="Turban"><span data-dcnode-id="3342" instrument_node="">turban</span></a><span data-dcnode-id="3340" instrument_node=""> and scarves, a sign of wealth. However, he also wears plain leather leggings to help protect his legs, instead of opting for fashion.</span><sup class="reference" data-dcnode-id="3337" id="cite_ref-KotakuMattes_5-4"><a data-dcnode-id="3338" href="#cite_note-KotakuMattes-5"><span data-dcnode-id="3339" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3336" instrument_node=""> The Prince also had a companion in the form of Elika. Their relationship was based on the story and gameplay relationship between the Prince in </span><i data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3333" instrument_node=""> and Farah, which had worked well.</span><sup class="reference" data-dcnode-id="3330" id="cite_ref-MattesPrima_47-0"><a data-dcnode-id="3331" href="#cite_note-MattesPrima-47"><span data-dcnode-id="3332" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3329" instrument_node="">
</span></p><p data-dcnode-id="3246"><span data-dcnode-id="3327" instrument_node="">The Prince has been voiced by four actors in his various incarnations, most notably beginning with </span><i data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3324" instrument_node="">. The known voice actors to have portrayed the Prince are </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dave_Boat" title="Dave Boat"><span data-dcnode-id="3323" instrument_node="">David Boat</span></a><span data-dcnode-id="3321" instrument_node="">, </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuri_Lowenthal" title="Yuri Lowenthal"><span data-dcnode-id="3320" instrument_node="">Yuri Lowenthal</span></a><span data-dcnode-id="3318" instrument_node="">, </span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robin_Atkin_Downes" title="Robin Atkin Downes"><span data-dcnode-id="3317" instrument_node="">Robin Atkin Downes</span></a><span data-dcnode-id="3315" instrument_node=""> and </span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nolan_North" title="Nolan North"><span data-dcnode-id="3314" instrument_node="">Nolan North</span></a><span data-dcnode-id="3312" instrument_node="">.</span><sup class="reference" data-dcnode-id="3309" id="cite_ref-3Dprince_1-1"><a data-dcnode-id="3310" href="#cite_note-3Dprince-1"><span data-dcnode-id="3311" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="3306" id="cite_ref-BtVAprince_2-3"><a data-dcnode-id="3307" href="#cite_note-BtVAprince-2"><span data-dcnode-id="3308" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3305" instrument_node=""> Boat's one performance as the Prince was in </span><i data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">Prince of Persia 3D</span></i><span data-dcnode-id="3302" instrument_node="">.</span><sup class="reference" data-dcnode-id="3299" id="cite_ref-3Dprince_1-2"><a data-dcnode-id="3300" href="#cite_note-3Dprince-1"><span data-dcnode-id="3301" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3298" instrument_node=""> Lowenthal portrayed the Prince in </span><i data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3295" instrument_node="">, </span><i data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">The Two Thrones</span></i><span data-dcnode-id="3292" instrument_node=""> and </span><i data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">The Forgotten Sands</span></i><span data-dcnode-id="3289" instrument_node="">.</span><sup class="reference" data-dcnode-id="3286" id="cite_ref-PrinceLowenthall2_48-0"><a data-dcnode-id="3287" href="#cite_note-PrinceLowenthall2-48"><span data-dcnode-id="3288" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="3283" id="cite_ref-GUlowenthal_49-0"><a data-dcnode-id="3284" href="#cite_note-GUlowenthal-49"><span data-dcnode-id="3285" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3282" instrument_node=""> In an interview, he said that "[he felt] that [he] in a way originated that role". Lowenthal did not return to voice the Prince in </span><i data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3279" instrument_node="">, being replaced by Downes. Lowenthal felt that this was a conscious decision by Ubisoft to fit in with the game's overall tonal shift, and thought it was the right decision. For </span><i data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">The Two Thrones</span></i><span data-dcnode-id="3276" instrument_node="">, Lowenthal returned to play the role, as fans had stated their preference for his portrayal of the character.</span><sup class="reference" data-dcnode-id="3273" id="cite_ref-PrinceLowenthall2_48-1"><a data-dcnode-id="3274" href="#cite_note-PrinceLowenthall2-48"><span data-dcnode-id="3275" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3272" instrument_node=""> The Prince became one of Lowenthal's favorite roles, and he was pleased to return to the role for </span><i data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">The Forgotten Sands</span></i><span data-dcnode-id="3269" instrument_node="">.</span><sup class="reference" data-dcnode-id="3266" id="cite_ref-GUlowenthal_49-1"><a data-dcnode-id="3267" href="#cite_note-GUlowenthal-49"><span data-dcnode-id="3268" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3265" instrument_node=""> According to Lowenthal, his well-received performance put pressure on him in future games from both fans and staff, as he needed to remain true to and improve on his original portrayal. This ultimately gave him little creative freedom with the character after </span><i data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3262" instrument_node="">.</span><sup class="reference" data-dcnode-id="3259" id="cite_ref-PrinceLowenthall1_50-0"><a data-dcnode-id="3260" href="#cite_note-PrinceLowenthall1-50"><span data-dcnode-id="3261" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3258" instrument_node=""> For the reboot, the staff wanted a different portrayal of the Prince to Lowenthal's, and so recast the role.</span><sup class="reference" data-dcnode-id="3255" id="cite_ref-PrinceLowenthall2_48-2"><a data-dcnode-id="3256" href="#cite_note-PrinceLowenthall2-48"><span data-dcnode-id="3257" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3254" instrument_node=""> North voiced the Prince for the 2008 reboot, and in hindsight felt that he did not do the character justice. In a 2012 interview, he said that "[he] just didn't really feel like the American accent worked with the artistry that the game showed", further saying that he thought a </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="3253" instrument_node="">Middle Eastern</span></a><span data-dcnode-id="3251" instrument_node=""> or British accent would have better suited the character.</span><sup class="reference" data-dcnode-id="3248" id="cite_ref-XboxNorth_51-0"><a data-dcnode-id="3249" href="#cite_note-XboxNorth-51"><span data-dcnode-id="3250" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3247" instrument_node="">
</span></p><span data-dcnode-id="3245" instrument_node="">
</span><h2 data-dcnode-id="3235"><span class="mw-headline" data-dcnode-id="3243" id="In_other_media"><span data-dcnode-id="3244" instrument_node="">In other media</span></span><span class="mw-editsection" data-dcnode-id="3236"><span class="mw-editsection-bracket" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">[</span></span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D7" title="Edit section: In other media"><span data-dcnode-id="3240" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3207"><span data-dcnode-id="3233" instrument_node="">Multiple Prince characters were featured in </span><i data-dcnode-id="3230"><a class="mw-redirect" data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Graphic_Novel" title="Prince of Persia: The Graphic Novel"><span data-dcnode-id="3232" instrument_node="">Prince of Persia: The Graphic Novel</span></a></i><span data-dcnode-id="3229" instrument_node="">, created by Mechner, co-written by Mechner and A. B. Sina, illustrated by </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LeUyen_Pham" title="LeUyen Pham"><span data-dcnode-id="3228" instrument_node="">LeUyen Pham</span></a><span data-dcnode-id="3226" instrument_node=""> and Alex Puvilland, and published by </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Second_Books" title="First Second Books"><span data-dcnode-id="3225" instrument_node="">First Second Books</span></a><span data-dcnode-id="3223" instrument_node="">.</span><sup class="reference" data-dcnode-id="3220" id="cite_ref-PersiaCreators_52-0"><a data-dcnode-id="3221" href="#cite_note-PersiaCreators-52"><span data-dcnode-id="3222" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3219" instrument_node=""> The story takes place in a kingdom called Marv, alternating between the 9th and 13th centuries. The story follows two men of royal blood: Guiv, who goes into self-imposed exile after clashing with his brother; and Ferdos, hidden with the region's water keeper during a purge of newborn children. Each is helped by a mystical bird named Tulen, with Guiv's actions in his time influencing Ferdos' own life.</span><sup class="reference" data-dcnode-id="3216" id="cite_ref-PrinceNovel_53-0"><a data-dcnode-id="3217" href="#cite_note-PrinceNovel-53"><span data-dcnode-id="3218" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3215" instrument_node=""> Sina was initially wary of the project, as he had negative experience of the portrayal of Midden Eastern people, and did not want to be controlled by marketing requirements. But after meeting Mechner and the editor for First Second Books, he was won over Sina's story deliberately played on the series concept of there being multiple Princes, writing his story around several Prince characters in different eras.</span><sup class="reference" data-dcnode-id="3212" id="cite_ref-SinaInterview_36-1"><a data-dcnode-id="3213" href="#cite_note-SinaInterview-36"><span data-dcnode-id="3214" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="3209" id="cite_ref-PrinceAfterword_38-2"><a data-dcnode-id="3210" href="#cite_note-PrinceAfterword-38"><span data-dcnode-id="3211" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3208" instrument_node="">
</span></p><p data-dcnode-id="3163"><span data-dcnode-id="3206" instrument_node="">For the </span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_of_Persia%3A_The_Sands_of_Time_%28film%29" title="Prince of Persia: The Sands of Time (film)"><span data-dcnode-id="3205" instrument_node="">2010 movie adaptation</span></a><span data-dcnode-id="3203" instrument_node="">, the Prince was given the name Dastan. According to Mechner, he chose the name as he had learned it was an old Persian name meaning "trickster".</span><sup class="reference" data-dcnode-id="3200" id="cite_ref-PrinceMovie_54-0"><a data-dcnode-id="3201" href="#cite_note-PrinceMovie-54"><span data-dcnode-id="3202" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3199" instrument_node=""> Dastan was portrayed by American actor </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jake_Gyllenhaal" title="Jake Gyllenhaal"><span data-dcnode-id="3198" instrument_node="">Jake Gyllenhaal</span></a><span data-dcnode-id="3196" instrument_node="">. Gyllenhaal said that there were several reasons that he chose to accept the role of the Prince, including the character's appeal to him, the fact that the film was based on the video game, and he "[liked] to do things that people have tried their hand at and haven't succeeded."</span><sup class="reference" data-dcnode-id="3193" id="cite_ref-KotakuPrince_55-0"><a data-dcnode-id="3194" href="#cite_note-KotakuPrince-55"><span data-dcnode-id="3195" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3192" instrument_node=""> According to Gyllenhaal, he retrospectively felt he had over-prepared physically for his role as he knew little of what it entailed. He trained for five months prior to the beginning of filming in </span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morocco" title="Morocco"><span data-dcnode-id="3191" instrument_node="">Morocco</span></a><span data-dcnode-id="3189" instrument_node="">, and continued to train during the filming period.</span><sup class="reference" data-dcnode-id="3186" id="cite_ref-PrinceJake_56-0"><a data-dcnode-id="3187" href="#cite_note-PrinceJake-56"><span data-dcnode-id="3188" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3185" instrument_node=""> Despite the original script being written prior to the making of later games in the </span><i data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">Sands of Time</span></i><span data-dcnode-id="3182" instrument_node=""> continuity, Mechner said that the production team for the film incorporated design elements from later games into the Prince's appearance.</span><sup class="reference" data-dcnode-id="3179" id="cite_ref-ComingPrince_57-0"><a data-dcnode-id="3180" href="#cite_note-ComingPrince-57"><span data-dcnode-id="3181" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3178" instrument_node=""> An element pointed out by staff is the Prince's appearance in the film's opening and climax, which was inspired by the Prince as he appeared in </span><i data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Warrior Within</span></i><span data-dcnode-id="3175" instrument_node="">.</span><sup class="reference" data-dcnode-id="3172" id="cite_ref-XboxPrince_58-0"><a data-dcnode-id="3173" href="#cite_note-XboxPrince-58"><span data-dcnode-id="3174" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3171" instrument_node=""> The character's costumes were designed by </span><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penny_Rose" title="Penny Rose"><span data-dcnode-id="3170" instrument_node="">Penny Rose</span></a><span data-dcnode-id="3168" instrument_node="">. The Prince's most worn outfit, a loose-fitting spiral coat, was designed by her based on a picture from a piece of ancient Persian embroidery. Her costumes also made nods to the costume designs of the video games.</span><sup class="reference" data-dcnode-id="3165" id="cite_ref-RoseInterview_59-0"><a data-dcnode-id="3166" href="#cite_note-RoseInterview-59"><span data-dcnode-id="3167" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3164" instrument_node="">
</span></p><span data-dcnode-id="3162" instrument_node="">
</span><h2 data-dcnode-id="3152"><span class="mw-headline" data-dcnode-id="3160" id="Reception"><span data-dcnode-id="3161" instrument_node="">Reception</span></span><span class="mw-editsection" data-dcnode-id="3153"><span class="mw-editsection-bracket" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">[</span></span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrince_%28Prince_of_Persia%29%26action%3Dedit%26section%3D8" title="Edit section: Reception"><span data-dcnode-id="3157" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3151" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3150" instrument_node="">In 2012, </span><a class="mw-redirect" data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GamesRadar" title="GamesRadar"><span data-dcnode-id="3149" instrument_node="">GamesRadar</span></a><span data-dcnode-id="3147" instrument_node=""> ranked the character in his various incarnations as the 27th in their list of the "Top 100 protagonists in video games", commenting on his multiple incarnations by saying "No character of the last couple of generations has had so many radically different personality reboots."</span><sup class="reference" data-dcnode-id="3144" id="cite_ref-GRtop100_60-0"><a data-dcnode-id="3145" href="#cite_note-GRtop100-60"><span data-dcnode-id="3146" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3143" instrument_node=""> </span><i data-dcnode-id="3140"><a class="mw-redirect" data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_%28magazine%29" title="Empire (magazine)"><span data-dcnode-id="3142" instrument_node="">Empire</span></a></i><span data-dcnode-id="3139" instrument_node=""> also included Prince on their list of the 50 greatest video game characters, ranking him as 35th and giving particular reference to his portrayal in </span><i data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">The Sands of Time</span></i><span data-dcnode-id="3136" instrument_node=""> and its sequels, saying that despite his banter being weaker in </span><i data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">The Two Thrones</span></i><span data-dcnode-id="3133" instrument_node="">, he was "a genuinely likeable guy in baggy trousers wielding a large cutlass and sporting a natty beardlet".</span><sup class="reference" data-dcnode-id="3130" id="cite_ref-EmpireCharacters_61-0"><a data-dcnode-id="3131" href="#cite_note-EmpireCharacters-61"><span data-dcnode-id="3132" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3129" instrument_node=""> The Prince was placed as 34th in a list by </span><i data-dcnode-id="3126"><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guinness_World_Records" title="Guinness World Records"><span data-dcnode-id="3128" instrument_node="">Guinness World Records</span></a></i><span data-dcnode-id="3125" instrument_node=""> of the top video game characters of all time </span><sup class="reference" data-dcnode-id="3122" id="cite_ref-GIguinness_62-0"><a data-dcnode-id="3123" href="#cite_note-GIguinness-62"><span data-dcnode-id="3124" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3121" instrument_node="">
