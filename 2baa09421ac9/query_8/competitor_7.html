</span></div></div></div></div></div></div></div><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">In seasons of hardship and struggle, it’s often difficult to find hope. Yet these </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Scriptures for thanksgiving and praise</span></strong><span data-dcnode-id="1091" instrument_node=""> lead you to a heart that openly trusts God, even when it’s painful and raw.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><img alt="journal next to couch " class="wp-image-16309 size-shareaholic-thumbnail aligncenter" data-dcnode-id="1088" height="428" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2020/06/journal-on-couch-with-blanket-and-plant-640x428.jpg&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2020/06/journal-on-couch-with-blanket-and-plant-640x428.jpg 640w, https://proverbs31mentor.com/wp-content/uploads/2020/06/journal-on-couch-with-blanket-and-plant-300x200.jpg 300w, https://proverbs31mentor.com/wp-content/uploads/2020/06/journal-on-couch-with-blanket-and-plant-150x100.jpg 150w, https://proverbs31mentor.com/wp-content/uploads/2020/06/journal-on-couch-with-blanket-and-plant-768x513.jpg 768w, https://proverbs31mentor.com/wp-content/uploads/2020/06/journal-on-couch-with-blanket-and-plant.jpg 1024w" width="640"></p><span data-dcnode-id="1086" instrument_node="">
</span><h2 data-dcnode-id="1083"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Why praise God and give thanks to God?</span></strong></h2><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">No matter our circumstances or the trials we face, God commands us to give thanks 37 times in the pages of His Word.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">He longs for our praise and worship, despite what life brings our way. When we focus on who He is and not on our circumstances, our joy is rekindled in His presence and our heart softens with praise.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Plus, practicing daily gratitude keeps you rooted in God’s promises and reflecting on His faithfulness of the past. It’s through focusing on God’s faithfulness where we learn to surrender our will and follow God’s plan, even when we don’t see the way.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" style="font-weight: 400;"><span data-dcnode-id="1072" instrument_node="">No matter where life finds you, these powerful Bible verses of thanksgiving will help you embrace a heart of gratitude and give God the glory He so justly deserves.</span></span></p><div class="mmtcustom-flight" data-dcnode-id="1069" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">PIN THIS RESOURCE:</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><img alt="Title: 20 Scriptures for Thanksgiving and Praise picture: woman praying in a field" class="wp-image-17489 size-shareaholic-thumbnail aligncenter" data-dcnode-id="1064" height="960" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise-640x960.png&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise-640x960.png 640w, https://proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise-200x300.png 200w, https://proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise-683x1024.png 683w, https://proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise-100x150.png 100w, https://proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise-768x1152.png 768w, https://proverbs31mentor.com/wp-content/uploads/2019/10/20-Scriptures-for-Thanksgiving-and-Praise.png 1000w" width="640"></p><span data-dcnode-id="1062" instrument_node="">
</span><h2 data-dcnode-id="1059"><b data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">20 Scriptures for Thanksgiving and Praise</span></b></h2><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">When there isn’t much to be thankful for or you’re struggling to find joy, these Scriptures will help you praise God in every season of life.&nbsp; Use these Bible verses of thanksgiving and praise in your </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/how-to-create-a-thriving-quiet-time-routine/"><span data-dcnode-id="1056" instrument_node="">daily quiet time </span></a><span data-dcnode-id="1054" instrument_node="">to cultivate a heart of praise.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><h3 data-dcnode-id="1049" style="text-align: center;"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">God’s has freely given you grace</span></strong></h3><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Even when life is crumbling around you, give thanks to God for salvation and the gift of grace at the cross.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Jesus, in His perfection and holiness, gave you the chance to spend eternity with God, and that’s a reason to give thanks!</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1039"><em data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Who hath saved us, and called us with a holy calling, not according to our works, but according to his own purpose and grace, which was given us in Christ Jesus before the world began.&nbsp;2 Timothy 1:9</span></em></p><div class="mmtcustom-flight" data-dcnode-id="1038" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="1037" instrument_node="">
</span><h3 data-dcnode-id="1034" style="text-align: center;"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">God commands you to give thanks</span></strong></h3><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Whether you’re singing on the mountains or struggling in the valleys, God invites you to worship His flawless character. He calls you to celebrate His faithfulness and reflect on His blessings whether in good times or bad.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">In everything give thanks: for this is the will of God in Christ Jesus concerning you.&nbsp;1 Thessalonians 5:18</span></em></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><img alt="woman praying with her eyes looking toward heaven" class="wp-image-16053 size-shareaholic-thumbnail aligncenter" data-dcnode-id="1025" height="425" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-640x425.jpg&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-640x425.jpg 640w, https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-300x199.jpg 300w, https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-1024x680.jpg 1024w, https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-150x100.jpg 150w, https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-768x510.jpg 768w, https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile-1536x1021.jpg 1536w, https://proverbs31mentor.com/wp-content/uploads/2020/04/girl-praying-in-field-with-profile.jpg 2000w" width="640"></p><span data-dcnode-id="1023" instrument_node="">
</span><h3 data-dcnode-id="1020" style="text-align: center;"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">God is loving and trustworthy</span></strong></h3><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">God’s love is perfect and can be trusted! His love never fails and never gives up on His children.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1010"><em data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">The&nbsp;</span><span class="small-caps" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Lord</span></span><span data-dcnode-id="1012" instrument_node="">&nbsp;appeared to us in the past, saying: “I have&nbsp;loved you with an&nbsp;everlasting&nbsp;love; I have drawn you with unfailing kindness.” Jeremiah 31:3</span></em></p><span data-dcnode-id="1009" instrument_node="">
</span><h3 data-dcnode-id="1006" style="text-align: center;"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">The Lord is merciful and patient</span></strong></h3><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Even when you stray and wander from God’s promises, God is merciful to forgive your sins. Praise the Lord for His patience with His wayward children!</span></p><div class="mmtcustom-flight" data-dcnode-id="1002" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="998"><em data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">But thou, O Lord, art a God full of compassion, and gracious, long-suffering, and plenteous in mercy and truth.&nbsp;Psalm 86:15</span></em></p><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="994" style="text-align: center;"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">God alone is righteous</span></strong></h3><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">As humans, we stumble and fall. In our sin nature, we stray from God’s best and easily wander from His promises. But God is righteous and His ways are perfect!</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="987"><em data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">I will praise the&nbsp;Lord&nbsp;according to his righteousness: and will sing praise to the name of the&nbsp;Lord&nbsp;most high.&nbsp;Psalm 7:17</span></em></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><img alt="woman praying" class="aligncenter wp-image-17224 size-shareaholic-thumbnail" data-dcnode-id="985" height="411" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE-640x411.png&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE-640x411.png 640w, https://proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE-300x193.png 300w, https://proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE-1024x657.png 1024w, https://proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE-150x96.png 150w, https://proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE-768x493.png 768w, https://proverbs31mentor.com/wp-content/uploads/2021/05/WOMAN-PRAYING-BY-A-TREE.png 1064w" width="640"></p><span data-dcnode-id="983" instrument_node="">
</span><h3 data-dcnode-id="981" style="text-align: center;"><span data-dcnode-id="982" instrument_node="">The Lord is our refuge</span></h3><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">When trouble surrounds you and you need a place to find rest, take refuge in the presence of God. He invites you to surrender your burdens and to find hope in His perfect peace.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="974"><em data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">How priceless is your unfailing love! Both high and low among men find refuge in the shadow of your wings.&nbsp;Psalm 36:7</span></em></p><div class="mmtcustom-flight" data-dcnode-id="973" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="972" instrument_node="">
</span><h3 data-dcnode-id="969" style="text-align: center;"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">God is faithful and just</span></strong></h3><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">God’s ways are flawless and faithful. He is without fault, blameless, and pure. God faithfully walks with His children in all seasons of life.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="962"><em data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">He is the rock, his works are perfect, and all his ways are just.&nbsp; A faithful God who does no wrong, upright and just is he. Deuteronomy 32:4</span></em></p><span data-dcnode-id="961" instrument_node="">
</span><h3 data-dcnode-id="958" style="text-align: center;"><strong data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">God is our Heavenly Father</span></strong></h3><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">God loves you, His child, and welcomes you into His family with open arms. He’s a faithful Father who always cares and comforts His children.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="951"><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">See what great love&nbsp;the Father has lavished on us, that we should be called children of God! 1 John 3:1</span></em></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><img alt="woman praying" class="wp-image-17225 size-shareaholic-thumbnail aligncenter" data-dcnode-id="949" height="411" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW-640x411.png&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW-640x411.png 640w, https://proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW-300x193.png 300w, https://proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW-1024x657.png 1024w, https://proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW-150x96.png 150w, https://proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW-768x493.png 768w, https://proverbs31mentor.com/wp-content/uploads/2021/05/PRAYING-HANDS-BY-A-WINDOW.png 1064w" width="640"></p><span data-dcnode-id="947" instrument_node="">
</span><h3 data-dcnode-id="944" style="text-align: center;"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The Lord’s love is eternal</span></strong></h3><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">God loved you before the beginning of time. As the ultimate proof of His love, He sent His only Son, Jesus, to die in your place and become the final sacrifice for the sins of all mankind.</span></p><div class="mmtcustom-flight" data-dcnode-id="940" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="936"><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Give thanks to the Lord, for He is good; His love endures forever.&nbsp; 1 Chronicles 16:34</span></em></p><span data-dcnode-id="935" instrument_node="">
</span><h3 data-dcnode-id="932" style="text-align: center;"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">God’s ways are perfect</span></strong></h3><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">The Lord’s plans are perfect and filled with wisdom. He commands the sun to rise and the stars to shine, as well as guide the path of His children.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="922"><em data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">As for&nbsp;God, his way&nbsp;is&nbsp;perfect: The&nbsp;</span><span class="small-caps" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Lord</span></span><span data-dcnode-id="924" instrument_node="">’s word&nbsp;is flawless; he shields all who take refuge in him. Psalm 18:30</span></em></p><span data-dcnode-id="921" instrument_node="">
</span><h3 data-dcnode-id="919" style="text-align: center;"><span data-dcnode-id="920" instrument_node="">God’s deeds are praise-worthy</span></h3><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">When God’s ways don’t line up with your desires, He is still worthy of praise! God is your Creator, Father, and Righteousness, and always deserves your praise!</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="900"><em data-dcnode-id="901"><span class="text Ps-9-1" data-dcnode-id="910"><span data-dcnode-id="914" instrument_node="">I will give thanks to you,&nbsp;</span><span class="small-caps" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Lord</span></span><span data-dcnode-id="911" instrument_node="">, with all my heart; </span></span><span class="indent-1" data-dcnode-id="907"><span class="text Ps-9-1" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">I will tell of all your wonderful deeds. </span></span></span><span class="text Ps-9-2" data-dcnode-id="905" id="en-NIV-14024"><span data-dcnode-id="906" instrument_node="">I will be glad and rejoice in you; </span></span><span class="indent-1" data-dcnode-id="902"><span class="text Ps-9-2" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">I will sing the praises of your name, O Most High. Psalm 9:1-2</span></span></span></em></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><img alt="woman praising God" class="wp-image-16447 size-shareaholic-thumbnail aligncenter" data-dcnode-id="898" height="307" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-640x307.jpg&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-640x307.jpg 640w, https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-300x144.jpg 300w, https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-1024x492.jpg 1024w, https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-150x72.jpg 150w, https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-768x369.jpg 768w, https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised-1536x738.jpg 1536w, https://proverbs31mentor.com/wp-content/uploads/2016/03/woman-in-front-of-beach-with-arms-raised.jpg 1999w" width="640"></p><div class="mmtcustom-flight" data-dcnode-id="896" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="895" instrument_node="">
</span><h3 data-dcnode-id="893" style="text-align: center;"><span data-dcnode-id="894" instrument_node="">God always has a purpose and plan</span></h3><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">God didn’t leave His children here to flounder or wander the world without a plan. God is leading and guiding His children according to His perfect will, even today.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="886"><em data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">And we know that in all things God works for the good of those who love him, who have been called according to his purpose. Romans 8:28</span></em></p><span data-dcnode-id="885" instrument_node="">
</span><h3 data-dcnode-id="882" style="text-align: center;"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">God is peace</span></strong></h3><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">While many search the world for peace, Scripture reminds us God IS our peace. He alone can comfort a </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/bible-verses-for-the-hurting-heart/"><span data-dcnode-id="879" instrument_node="">hurting heart</span></a><span data-dcnode-id="877" instrument_node=""> or bring peace when life is too much to bear.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="872"><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">And the peace of God, which transcends all understanding, will guard your hearts and your minds in Christ Jesus. Philippians 4:7</span></em></p><span data-dcnode-id="871" instrument_node="">
</span><h3 data-dcnode-id="868" style="text-align: center;"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">God is your Creator</span></strong></h3><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">The Creator of the Earth loves YOU and longs to fellowship with YOU! That’s a reason to celebrate!</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="837"><em data-dcnode-id="838"><span class="text Ps-100-1" data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">Shout for joy&nbsp;to the&nbsp;</span><span class="small-caps" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Lord</span></span><span data-dcnode-id="860" instrument_node="">, all the earth. </span></span><span class="indent-1" data-dcnode-id="853"><span class="text Ps-100-2" data-dcnode-id="854" id="en-NIV-15511"><span data-dcnode-id="858" instrument_node="">Worship the </span><span class="small-caps" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Lord</span></span><span data-dcnode-id="855" instrument_node=""> with gladness; </span></span></span><span class="indent-1" data-dcnode-id="850"><span class="text Ps-100-2" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">come before him with joyful songs. </span></span></span><span class="text Ps-100-3" data-dcnode-id="845" id="en-NIV-15512"><span data-dcnode-id="849" instrument_node="">Know that the&nbsp;</span><span class="small-caps" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Lord</span></span><span data-dcnode-id="846" instrument_node=""> is God. </span></span><span class="indent-1" data-dcnode-id="842"><span class="text Ps-100-3" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">It is he who made us, and we are his; </span></span></span><span class="indent-1" data-dcnode-id="839"><span class="text Ps-100-3" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">we are his people, the sheep of his pasture. Psalm 100:1-3</span></span></span></em></p><div class="mmtcustom-flight" data-dcnode-id="836" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><img alt="girl writing in prayer journal on the bed" class="wp-image-17397 size-shareaholic-thumbnail aligncenter" data-dcnode-id="834" height="427" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-640x427.jpg&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-640x427.jpg 640w, https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-300x200.jpg 300w, https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-1024x683.jpg 1024w, https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-150x100.jpg 150w, https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-768x512.jpg 768w, https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-1536x1024.jpg 1536w, https://proverbs31mentor.com/wp-content/uploads/2021/07/woman-writing-on-pink-pillows-2048x1365.jpg 2048w" width="640"></p><span data-dcnode-id="832" instrument_node="">
</span><h3 data-dcnode-id="829" style="text-align: center;"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">The Lord is Our Strength and Shield</span></strong></h3><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">When your strength feels depleted and you struggle to carry on, press into the Lord for strength. Trust God to carry you in times of weakness and to supply you with His strength.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="810"><em data-dcnode-id="811"><span class="text Ps-28-7" data-dcnode-id="820" id="en-NIV-14307"><span data-dcnode-id="824" instrument_node="">The&nbsp;</span><span class="small-caps" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Lord</span></span><span data-dcnode-id="821" instrument_node=""> is my strength and my shield;&nbsp;</span></span><span class="indent-1" data-dcnode-id="817"><span class="text Ps-28-7" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">my heart trusts in him, and he helps me. </span></span></span><span class="text Ps-28-7" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">My heart leaps for joy, </span></span><span class="indent-1" data-dcnode-id="812"><span class="text Ps-28-7" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">and with my song I praise him. Psalm 28:7</span></span></span></em></p><span data-dcnode-id="809" instrument_node="">
</span><h3 data-dcnode-id="806" style="text-align: center;"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">God is good (always!)</span></strong></h3><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Even when life is falling apart around you, God is still good and faithful. His goodness never fails and God’s ways are perfect, always.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="793"><span class="text Ps-13-6" data-dcnode-id="797" id="en-NIV-14081"><span data-dcnode-id="801" instrument_node="">I will sing&nbsp;the&nbsp;</span><span class="small-caps" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Lord</span></span><span data-dcnode-id="798" instrument_node="">’s praise, </span></span><span class="indent-1" data-dcnode-id="794"><span class="text Ps-13-6" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">for he has been good to me. Psalm 13:6</span></span></span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="789" style="text-align: center;"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">God fills me with joy</span></strong></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">God alone is your joy and true soul satisfaction. He quenches your deepest needs and restores your joy in Jesus, even when your circumstances are dire.</span></p><div class="mmtcustom-flight" data-dcnode-id="785" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="766"><em data-dcnode-id="767"><span class="text Ps-19-8" data-dcnode-id="779" id="en-NIV-14177"><span data-dcnode-id="783" instrument_node="">The precepts of the&nbsp;</span><span class="small-caps" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Lord</span></span><span data-dcnode-id="780" instrument_node=""> are right, </span></span><span class="indent-1" data-dcnode-id="776"><span class="text Ps-19-8" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">giving joy to the heart. </span></span></span><span class="text Ps-19-8" data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The commands of the&nbsp;</span><span class="small-caps" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Lord</span></span><span data-dcnode-id="772" instrument_node=""> are radiant, </span></span><span class="indent-1" data-dcnode-id="768"><span class="text Ps-19-8" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">giving light to the eyes. Psalm 19:8</span></span></span></em></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><img alt="open Bible on a white blanket with a cell phone and glasses" class="wp-image-17223 size-shareaholic-thumbnail aligncenter" data-dcnode-id="764" height="427" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2021/05/BIBLE-WITH-BLANKET-PHONE-AND-GLASSES-HORIZONTAL-640x427.jpg&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2021/05/BIBLE-WITH-BLANKET-PHONE-AND-GLASSES-HORIZONTAL-640x427.jpg 640w, https://proverbs31mentor.com/wp-content/uploads/2021/05/BIBLE-WITH-BLANKET-PHONE-AND-GLASSES-HORIZONTAL-300x200.jpg 300w, https://proverbs31mentor.com/wp-content/uploads/2021/05/BIBLE-WITH-BLANKET-PHONE-AND-GLASSES-HORIZONTAL-150x100.jpg 150w, https://proverbs31mentor.com/wp-content/uploads/2021/05/BIBLE-WITH-BLANKET-PHONE-AND-GLASSES-HORIZONTAL-768x512.jpg 768w, https://proverbs31mentor.com/wp-content/uploads/2021/05/BIBLE-WITH-BLANKET-PHONE-AND-GLASSES-HORIZONTAL.jpg 1024w" width="640"></p><span data-dcnode-id="762" instrument_node="">
</span><h3 data-dcnode-id="759" style="text-align: center;"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">The Lord is my Comforter</span></strong></h3><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">The Lord comforts His children and provides hope to every weary soul who seeks Him. As you walk the road of hardship, choose to give thanks to God as your loving Comforter no matter what you face.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="748"><em data-dcnode-id="749"><span class="text Jer-8-18" data-dcnode-id="753" id="en-NIV-19172"><span data-dcnode-id="754" instrument_node="">You who are my Comforter in sorrow, </span></span><span class="indent-1" data-dcnode-id="750"><span class="text Jer-8-18" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">my heart is faint within me. Jeremiah 8:18</span></span></span></em></p><span data-dcnode-id="747" instrument_node="">
</span><h3 data-dcnode-id="744" style="text-align: center;"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">God is my Rock of Salvation</span></strong></h3><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">As you reflect on your salvation, rejoice! God has made a way for redemption and freely gives grace to all who believe.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="728"><em data-dcnode-id="729"><span class="text Ps-95-1" data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">Come,&nbsp;let us sing for joy&nbsp;to the&nbsp;</span><span class="small-caps" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Lord</span></span><span data-dcnode-id="736" instrument_node="">;</span></span><span class="indent-1" data-dcnode-id="730"><span class="indent-1-breaks" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&nbsp;</span></span><span class="text Ps-95-1" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">let us shout aloud to the Rock of our salvation. Psalm 95:1</span></span></span></em></p><div class="mmtcustom-flight" data-dcnode-id="727" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="726" instrument_node="">
</span><h3 data-dcnode-id="724" style="text-align: center;"><span data-dcnode-id="725" instrument_node="">The Lord is the Great King</span></h3><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The Lord is powerful and mighty! His power is unmatched and unwavering, even in a world of suffering. Take comfort in God’s greatness and reflect on His power in your daily quiet time.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="710"><em data-dcnode-id="711"><span class="text Ps-47-2" data-dcnode-id="715" id="en-NIV-14628"><span data-dcnode-id="719" instrument_node="">For the&nbsp;</span><span class="small-caps" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Lord</span></span><span data-dcnode-id="716" instrument_node=""> Most High is awesome,&nbsp;</span></span><span class="indent-1" data-dcnode-id="712"><span class="text Ps-47-2" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">the great King over all the earth. Psalm 47:2</span></span></span></em></p><span data-dcnode-id="709" instrument_node="">
</span><h3 data-dcnode-id="706" style="text-align: center;"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">God’s love is unfailing</span></strong></h3><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">The love of God is steadfast and an anchor for your soul in all seasons of life. Count the unwavering love of God as a reason to give thanks.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="692"><em data-dcnode-id="693"><span class="text Ps-33-18" data-dcnode-id="697" id="en-NIV-14385"><span data-dcnode-id="701" instrument_node="">But the eyes&nbsp;of the&nbsp;</span><span class="small-caps" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Lord</span></span><span data-dcnode-id="698" instrument_node=""> are on those who fear him, </span></span><span class="indent-1" data-dcnode-id="694"><span class="text Ps-33-18" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">on those whose hope is in his unfailing love… Psalm 33:18</span></span></span></em></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><img alt="pink prayer journal" class="wp-image-17351 size-shareaholic-thumbnail aligncenter" data-dcnode-id="690" height="427" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/wp-content/uploads/2021/07/horizontal-pink-journal-640x427.jpg&amp;raw" srcset="https://proverbs31mentor.com/wp-content/uploads/2021/07/horizontal-pink-journal-640x427.jpg 640w, https://proverbs31mentor.com/wp-content/uploads/2021/07/horizontal-pink-journal-300x200.jpg 300w, https://proverbs31mentor.com/wp-content/uploads/2021/07/horizontal-pink-journal-150x100.jpg 150w, https://proverbs31mentor.com/wp-content/uploads/2021/07/horizontal-pink-journal-768x512.jpg 768w, https://proverbs31mentor.com/wp-content/uploads/2021/07/horizontal-pink-journal.jpg 1024w" width="640"></p><span data-dcnode-id="688" instrument_node="">
</span><h3 data-dcnode-id="686" style="text-align: center;"><span data-dcnode-id="687" instrument_node="">God is your refuge</span></h3><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">When the world is crumbling around you, take refuge in the presence of the Lord. Be still at the feet of Jesus and pour out your sorrows to Him with a heart of gratitude for His faithfulness.</span></p><div class="mmtcustom-flight" data-dcnode-id="682" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="674"><em data-dcnode-id="675"><span class="text Ps-36-7" data-dcnode-id="679" id="en-NIV-14446"><span data-dcnode-id="680" instrument_node="">How priceless is your unfailing love, O God! </span></span><span class="indent-1" data-dcnode-id="676"><span class="text Ps-36-7" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">People take refuge in the shadow of your wings. Psalm 36: 7</span></span></span></em></p><span data-dcnode-id="673" instrument_node="">
</span><h3 data-dcnode-id="671" style="text-align: center;"><span data-dcnode-id="672" instrument_node="">God is the Alpha and Omega</span></h3><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">While it’s hard to comprehend that God always has been and always will be, it’s a powerful reason to praise the Lord. God is constant and that’s a reason to give thanks!</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="664"><em data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">I am the Alpha and the Omega, the First and the Last, the Beginning and the End. Revelation 22:13</span></em></p><span data-dcnode-id="663" instrument_node="">
</span><h3 data-dcnode-id="660" style="text-align: center;"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">God is eternal</span></strong></h3><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">This world is not your home! Instead, God is preparing a place for His children to be with Him in eternity. He always has been and always will be. Forever and amen!</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="653"><em data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">We know also that the Son of God has come and has given us understanding, so that we may know him who is true. And we are in him who is true by being in his Son Jesus Christ. He is the true God and eternal life. 1 John 5:20</span></em></p><span data-dcnode-id="652" instrument_node="">

</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Over the years I’ve discovered that being truly being thankful requires more than a causal prayer or a mumbled, “Thanks, God.”</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">True gratitude requires intentional surrender of our circumstances and our status quo. It’s purposefully embracing God for He who is and understanding that His greatness isn’t limited by our current situation.&nbsp;</span></strong></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">No matter what circumstances we’re in, God changes us to the core when we regularly </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crosswalk.com/blogs/debbie-mcdaniel/the-power-of-a-grateful-heart-21-verses-of-thanksgiving.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="629" instrument_node="">offer thanksgiving and praise</span></a><span data-dcnode-id="627" instrument_node=""> to the one who redeems our soul.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">Plus, living thankful and with a heart of gratitude can be a simple part of your daily quiet time and </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proverbs31mentor.com/what-is-prayer-journaling-and-how-to-start-a-daily-journaling-habit/"><span data-dcnode-id="623" instrument_node="">prayer journaling</span></a><span data-dcnode-id="621" instrument_node="">. (Pinky promise- it doesn’t have to be complicated!)</span></p><div class="mmtcustom-flight" data-dcnode-id="619" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc"></div><span data-dcnode-id="618" instrument_node="">

</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Just as God commanded the Israelites to build stones of remembrance, it’s a gift to rejoice in God’s leading and provision.&nbsp; Use stones of remembrance in your own life, either tangible or in a journal, to rejoice over God’s faithfulness.</span></p><span data-dcnode-id="572" instrument_node="">
