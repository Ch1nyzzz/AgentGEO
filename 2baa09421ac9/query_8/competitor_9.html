</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1244" id="mntl-sc-block_1-0"><span data-dcnode-id="1248" instrument_node="">
In The Church of Jesus Christ of Latter-day Saints studying the LDS scriptures is important because they are the word of God.&nbsp;</span><a data-component="link" data-dcnode-id="1246" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/how-to-study-the-bible-700238"><span data-dcnode-id="1247" instrument_node="">Studying the word of God</span></a><span data-dcnode-id="1245" instrument_node="">&nbsp;is vital to our salvation.
</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1241" id="mntl-sc-block_1-0-1"><span data-dcnode-id="1242" instrument_node="">
The following are a list of techniques (with pictures) that you can use to study the Bible or all of the LDS scriptures.
</span></p><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1238" instrument_node="">
</span><div class="comp list-sc__content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="753" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="54em" data-sc-content-positions="[1, 1050, 1250, 1550, 1950, 2350, 2750, 3150]" data-sc-load-immediate="3" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="97" id="list-sc__content_1-0"><span data-dcnode-id="1237" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1173" id="list-sc-item_1-0"><span data-dcnode-id="1236" instrument_node="">

</span><div class="total" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">of 09</span></div><span data-dcnode-id="1228" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1223" id="toc-color-coding"></span><span data-dcnode-id="1222" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1217" id="mntl-sc-block_2-0"><span data-dcnode-id="1221" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node=""> Color Coding </span></span><span data-dcnode-id="1218" instrument_node=""> </span></h2><span data-dcnode-id="1216" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1214" id="mntl-sc-block_2-0-1"><span data-dcnode-id="1215" instrument_node="">
Color coding your LDS Scriptures is a great technique that works for beginners, experts, adults, or children. It's how many first come to love their daily study time and to realize the true value of the LDS scriptures.
</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1211" id="mntl-sc-block_2-0-2"><span data-dcnode-id="1212" instrument_node="">
First, buy some good quality colored pencils or scripture marking crayons/pens. Make sure they won't show or bleed through to the other side as the pages of LDS scriptures are very thin.
</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1208" id="mntl-sc-block_2-0-3"><span data-dcnode-id="1209" instrument_node="">
Then mark LDS scriptures either words, phrases, verses, or entire sections in a color that you associate with a specific topic or subject. Here's a suggestion list of categories to use for each color although, you can make your own with more or fewer colors/subjects:
</span></p><span data-dcnode-id="1207" instrument_node="">
</span><ol class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1178" id="mntl-sc-block_2-0-4"><span data-dcnode-id="1206" instrument_node="">
</span><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Red = Heavenly Father, Christ</span></li><li data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Peach = Holy Ghost</span></li><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Orange = Charity, Services</span></li><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Light Yellow = Faith, Hope</span></li><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Dark Yellow = Repentance</span></li><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Gold = Creation, Fall</span></li><li data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Pink = Righteousness of People</span></li><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Light Green = Salvation, Eternal Life</span></li><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Dark Green = Prophecies yet to be fulfilled</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Light Blue = Prayer</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Dark Blue = Wickedness of People/Evil Works</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Purple = Prophecies already fulfilled</span></li><li data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Brown = Baptism</span></li><span data-dcnode-id="1179" instrument_node="">
</span></ol><span data-dcnode-id="1177" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1175" id="mntl-sc-block_2-0-5"><span data-dcnode-id="1176" instrument_node="">
The two different ways I marked my LDS scriptures was either to underline the entire verse or outline it and any other corresponding verses before and after it.
</span></p><span data-dcnode-id="1174" instrument_node="">
</span></div><span data-dcnode-id="1172" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1161" id="adslot_1-0"><div class="comp mntl-block" data-dcnode-id="1162" id="mntl-block_4-0"><span data-dcnode-id="1171" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1146" id="toc-footnote-referencing"></span><span data-dcnode-id="1145" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1140" id="mntl-sc-block_2-0-6"><span data-dcnode-id="1144" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node=""> Footnote Referencing </span></span><span data-dcnode-id="1141" instrument_node=""> </span></h2><span data-dcnode-id="1139" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1133" id="mntl-sc-block_2-0-7"><span data-dcnode-id="1138" instrument_node="">
Referencing the footnotes is an excellent way to further your understanding of gospel principles and to study the LDS Scriptures. While reading a passage pay attention to words or phrases that "jump out at you" meaning you find them interesting, curious, or are unsure of what they mean. If there's a footnote reference (a lowercase a, b, c, etc. before the word) look to the bottom of the page where you'll see the footnotes (listed by chapter and verse) and related references or other notes.</span><br data-dcnode-id="1137"><span data-dcnode-id="1136" instrument_node="">Some people like to circle the little letter in both the verse and its corresponding footnote. They will then take a bookmark, or another firm piece of cardstock, and draw a line between the two letters. A regular ball-point pen will work for this but a pencil would work too. You may also like to add a little arrowhead pointing towards the footnote. If you're using the color code system (Technique #2) you can underline the footnote reference in its corresponding color.</span><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">After doing this you'll be amazed at all the gems you'll find. For many, this is a favorite study technique which can be used when reading from cover to cover or with any other LDS scripture study method.
</span></p><span data-dcnode-id="1132" instrument_node="">
</span></div><span data-dcnode-id="1130" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1104" id="toc-pictures-and-stickers"></span><span data-dcnode-id="1103" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1098" id="mntl-sc-block_2-0-8"><span data-dcnode-id="1102" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node=""> Pictures and Stickers </span></span><span data-dcnode-id="1099" instrument_node=""> </span></h2><span data-dcnode-id="1097" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1089" id="mntl-sc-block_2-0-9"><span data-dcnode-id="1096" instrument_node="">
Putting pictures and stickers into your LDS scriptures is a really fun way to liven up your study time and is perfect for students of all ages. You can buy special see-through stickers called </span><a data-component="link" data-dcnode-id="1094" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scripturestickers.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1095" instrument_node="">Scripture Stickers</span></a><span data-dcnode-id="1093" instrument_node=""> (although they are pricey) or make your own "stickers" by cutting out pictures from Church magazines, especially the Friend, or printing out some </span><a data-component="link" data-dcnode-id="1091" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/latter-day-saints-4684874"><span data-dcnode-id="1092" instrument_node="">LDS</span></a><span data-dcnode-id="1090" instrument_node=""> Clipart.
</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1086" id="mntl-sc-block_2-0-10"><span data-dcnode-id="1087" instrument_node="">
When pasting your own pictures make sure you use a glue stick, not runny glue, and only place a small amount of paste onto the part of the picture where it will attach to the margins, don’t put glue on the parts that cover text. This way you can lift up the picture to read the text underneath it.
</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1083" id="mntl-sc-block_2-0-11"><span data-dcnode-id="1084" instrument_node="">
Stickers are fun too. Make sure you don't cover any of the text with stickers. Large stickers can be placed on blank spaces/pages but very small ones can fit in the margins.
</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1080" id="mntl-sc-block_2-0-12"><span data-dcnode-id="1081" instrument_node="">
You can use star and heart stickers to keep track of your favorite LDS scriptures. Here's what you do: While you're studying keep a look out for those verses that touch you or mean something to you, such as answers to prayers or insightful readings. Place the sticker (or you can just draw a star or heart) next to those verses in the margin. One of my companions during my mission drew hearts which she called "Love Notes." She'd write a small note in the margin explaining why that verse was a love note from Heavenly Father.
</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1072" id="mntl-sc-block_2-0-13"><span data-dcnode-id="1078" instrument_node="">
</span><strong data-dcnode-id="1074"><span class="ql-cursor" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">﻿</span></span><span data-dcnode-id="1075" instrument_node="">Tip</span></strong><span data-dcnode-id="1073" instrument_node="">: When using stickers you can also fold one over the top of the page so that half of the sticker is on one side and the other half on the opposite side, this makes it easier to find your favorite LDS scriptures when looking from the top.
</span></p><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1058" id="adslot_1-0-2"><div class="comp mntl-block" data-dcnode-id="1059" id="mntl-block_6-0"><span data-dcnode-id="1068" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1043" id="toc-marginal-notes"></span><span data-dcnode-id="1042" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1037" id="mntl-sc-block_2-0-14"><span data-dcnode-id="1041" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node=""> Marginal Notes </span></span><span data-dcnode-id="1038" instrument_node=""> </span></h2><span data-dcnode-id="1036" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1031" id="mntl-sc-block_2-0-15"><span data-dcnode-id="1035" instrument_node="">
Placing notes in the margins is a quick technique to help you get involved with what's happening in the LDS scriptures as you study them. Just write the main event in the margin next to the verse(s) that describes it. For example, when Nephi brakes his bow in </span><a data-component="link" data-dcnode-id="1033" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.churchofjesuschrist.org/scriptures/bofm/1-ne/16.18%3Flang%3Deng" rel="noopener" target="_blank"><span data-dcnode-id="1034" instrument_node="">1 Nephi 16:18</span></a><span data-dcnode-id="1032" instrument_node=""> write "Nephi Brakes Bow" in large letters in the margin. If you're doing the color coding method (Technique #2) you can write this in the topic's corresponding color or if you’re artistic you could draw a broken bow in your LDS scriptures.
</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1015" id="mntl-sc-block_2-0-16"><span data-dcnode-id="1029" instrument_node="">
You may also like to keep track of who's speaking to whom so in the top margin, above the column you're reading, by writing the name of the speaker and put an arrow then write the name of the person/group being spoken to. For example, when an angle speaks to Nephi in </span><a data-component="link" data-dcnode-id="1027" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.churchofjesuschrist.org/scriptures/bofm/1-ne/14%3Flang%3Deng" rel="noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">1 Nephi 14</span></a><span data-dcnode-id="1026" instrument_node=""> you'd write "Angel —&gt; Nephi." If there isn't a particular audience you can just write the speaker's name or put "me" or "us" as the receiver.</span><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">You can also keep track of who’s who in the </span><a data-component="link" data-dcnode-id="1022" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/free-book-of-mormon-2159085"><span data-dcnode-id="1023" instrument_node="">Book of Mormon</span></a><span data-dcnode-id="1021" instrument_node=""> when there's more than one person with the same name, such as Nephi, Lehi, Helaman, Jacob, etc. When you come across the name of a new person look them up in the </span><a data-component="link" data-dcnode-id="1019" data-ordinal="3" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.churchofjesuschrist.org/study/manual/doctrines-of-the-gospel-student-manual/scripture-index%3Flang%3Deng" rel="noopener" target="_blank"><span data-dcnode-id="1020" instrument_node="">LDS Scripture Index</span></a><span data-dcnode-id="1018" instrument_node="">. If there is more than one person with the same name you'll see a small number following each name along with a bit of info and corresponding references. Go back to your LDS scripture reading and write the number of the corresponding person after their name.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">For example, when reading in 1 Nephi you come across Jacob. Look in the Index, under J, and you'll see four different Jacob's listed. Each has a number following the name along with some references. Which Jacob you've come across will depend upon where you're reading in 1 Nephi since both Jacob 1 and Jacob 2 are mentioned. If you're in 1 Ne 5:14 you would put a small one after Jacob's name, but in 1 Nephi 18:7 you would put a two.
</span></p><span data-dcnode-id="1014" instrument_node="">
</span></div><span data-dcnode-id="1012" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="977" id="mntl-sc-block_2-0-18"><span data-dcnode-id="978" instrument_node="">
Using post-it notes is the perfect technique to have more room for writing notes and still keeping them in your LDS scriptures. Just place the sticky side of the note along the margins so it doesn't cover up the text. This way you can lift up the note and read the text below. Some of the notes you could write are questions, thoughts, inspirations, coinage, lineages, travel routs, etc.
</span></p><span data-dcnode-id="976" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="974" id="mntl-sc-block_2-0-19"><span data-dcnode-id="975" instrument_node="">
You can also cut the notes into smaller pieces (just make sure to keep part of the sticky side) so they don't take up as much room. This works well if you have a small question or thought.
</span></p><span data-dcnode-id="973" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="945" id="toc-spiritual-journal--patriarchal-blessing"></span><span data-dcnode-id="944" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="939" id="mntl-sc-block_2-0-20"><span data-dcnode-id="943" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="941"><span data-dcnode-id="942" instrument_node=""> Spiritual Journal &amp; Patriarchal Blessing </span></span><span data-dcnode-id="940" instrument_node=""> </span></h2><span data-dcnode-id="938" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="931" id="mntl-sc-block_2-0-21"><span data-dcnode-id="937" instrument_node="">
Keeping a spiritual journal is a simple yet powerful technique to help you record your own spiritual experiences as you study LDS scriptures. All you need is a notebook of any type and size. You can copy touching passages, note inspirational thoughts, and many other things. Just make sure not to lose your notebook. If it's small enough you could tuck it in a case for carrying your LDS scriptures.</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">You can also use your </span><a data-component="link" data-dcnode-id="933" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/what-is-a-patriarchal-blessing-2159184"><span data-dcnode-id="934" instrument_node="">patriarchal blessing</span></a><span data-dcnode-id="932" instrument_node=""> when studying LDS scriptures and make notes in your spiritual journal about it. A patriarchal blessing is your own personal scriptures from the Lord, like a chapter written just for you and it can be a very powerful resource if you study it often. You can study it word by word, phrase by phrase, or paragraph by paragraph by looking up topics in the "Study Helps" (below). You may want to have a small, laminated copy of that fits in my scriptures so you always know where it's at. If you'd like to mark up your Patriarchal Blessing make sure you use a copy and not the original.
</span></p><span data-dcnode-id="930" instrument_node="">
</span></div><span data-dcnode-id="928" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="887" id="mntl-sc-block_2-0-23"><span data-dcnode-id="894" instrument_node="">
Many LDS scripture study helps are available from The Church of Jesus Christ of Latter-day Saints both from </span><a data-component="link" data-dcnode-id="892" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/getting-lds-church-materials-2159377"><span data-dcnode-id="893" instrument_node="">LDS Distribution</span></a><span data-dcnode-id="891" instrument_node=""> and from their website at </span><a data-component="link" data-dcnode-id="889" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.churchofjesuschrist.org/scriptures/study-helps%3Flang%3Deng" rel="noopener" target="_blank"><span data-dcnode-id="890" instrument_node="">LDS.org</span></a><span data-dcnode-id="888" instrument_node="">. These great resources include:
</span></p><span data-dcnode-id="886" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="818" id="mntl-sc-block_2-0-27"><span data-dcnode-id="819" instrument_node="">
In this technique, you look up the definition of words as you study your LDS scripture which will help increase your vocabulary. While reading pick out words that you don't know the meaning of, or that you'd like to more fully comprehend, then look them up in the Study Helps (above) or you can use the Triple Combination Vocabulary Guide by Greg Wright and Blair Tolman. (There used to be individual guides but they're now all combined into one.) This vocabulary guide for The Triple Combination (meaning The Book of Mormon, Doctrine &amp; Covenants, and Pearl of Great Price) is wonderful and I use it all the time, it's very handy and would make a great gift!
</span></p><span data-dcnode-id="817" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="812" id="mntl-sc-block_2-0-28"><span data-dcnode-id="816" instrument_node="">
After you've discovered the definition write it in the bottom margin below the footnotes. You may like to write the verse, the footnote letter (if it doesn't have one you can make one starting with the next letter available), then the word, followed by the short definition. For example, in </span><a data-component="link" data-dcnode-id="814" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.churchofjesuschrist.org/scriptures/bofm/alma/34.35%3Flang%3Deng" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node="">Alma 34:35</span></a><span data-dcnode-id="813" instrument_node=""> you might look up in the "Triple Combination Vocabulary Guide" the definition for "subjected" which is footnote letter "a". Then in the bottom margin, you can write, "35a: subjected= slavery, under obedience or bondage to."
</span></p><span data-dcnode-id="811" instrument_node="">
</span></div><span data-dcnode-id="809" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="808" id="adslot_1-0-7"></div><span data-dcnode-id="807" instrument_node="">

</span><div class="total" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">of 09</span></div><span data-dcnode-id="798" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="793" id="toc-memorize-powerful-lds-scriptures"></span><span data-dcnode-id="792" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="787" id="mntl-sc-block_2-0-29"><span data-dcnode-id="791" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node=""> Memorize Powerful LDS Scriptures </span></span><span data-dcnode-id="788" instrument_node=""> </span></h2><span data-dcnode-id="786" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="781" id="mntl-sc-block_2-0-30"><span data-dcnode-id="785" instrument_node="">
Memorizing powerful LDS scriptures is a technique that takes extra work but it's worth it. There are many verses in the LDS scriptures that contain special promises from our </span><a data-component="link" data-dcnode-id="783" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/god-eternal-heavenly-father-2158978"><span data-dcnode-id="784" instrument_node="">Father in Heaven</span></a><span data-dcnode-id="782" instrument_node="">. If we find and memorize them they will help us in our times of need. You can write the verses on index cards to more easily carry them around. This way you can read over them during your spare time.
</span></p><span data-dcnode-id="780" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="778" id="mntl-sc-block_2-0-31"><span data-dcnode-id="779" instrument_node="">
Thanks to Steven A. Cramer's book, "Putting on the Armor of God" for this idea and the list of LDS scriptures that you can use.
</span></p><span data-dcnode-id="777" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="769" id="mntl-sc-block_2-0-32"><span data-dcnode-id="776" instrument_node="">
Studying the LDS Scriptures really is important and as you take the time to really focus your mind and study them instead of just reading them you will come to love them even more.</span><br data-dcnode-id="775"><em data-dcnode-id="771"><span data-dcnode-id="774" instrument_node="">Updated by </span><a data-component="link" data-dcnode-id="772" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/krista-cook-2158195"><span data-dcnode-id="773" instrument_node="">Krista Cook</span></a></em><span data-dcnode-id="770" instrument_node="">
</span></p><span data-dcnode-id="768" instrument_node="">
