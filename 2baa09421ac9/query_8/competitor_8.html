</span><meta content="Alfred Freddoso" data-dcnode-id="797" name="Author"><span data-dcnode-id="796" instrument_node="">
</span><title data-dcnode-id="794">Aquinas &amp; Sacred Scripture</title><span data-dcnode-id="793" instrument_node="">
</span><span data-dcnode-id="791" instrument_node="">
</span><span data-dcnode-id="790" instrument_node="">
&nbsp;
</span><center data-dcnode-id="8"><span data-dcnode-id="789" instrument_node="">
</span><span data-dcnode-id="788" instrument_node="">
</span><span data-dcnode-id="787" instrument_node="">
</span><span data-dcnode-id="786" instrument_node="">
</span><span data-dcnode-id="15" instrument_node="">
</span><span data-dcnode-id="13" instrument_node="">
</span><span data-dcnode-id="11" instrument_node="">
</span><table border="0" cols="1" data-dcnode-id="10" width="75%"><tbody data-dcnode-id="12"><tr data-dcnode-id="14"><td data-dcnode-id="16"><span data-dcnode-id="785" instrument_node="">
</span><center data-dcnode-id="771"><b data-dcnode-id="782"><font data-dcnode-id="783" size="+1"><span data-dcnode-id="784" instrument_node="">St. Thomas Aquinas and Sacred Scripture</span></font></b><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="780" instrument_node="">John F. Boyle </span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">
Department of Theology </span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
University of St. Thomas </span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">
St. Paul, MN 55104</span></p><span data-dcnode-id="772" instrument_node="">
</span></center><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="767"><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="765" instrument_node="">Some seven hundred years after his death, St. Thomas Aquinas
is best
known as a systematic theologian. Few have had his capacity to grasp
the
speculative constructive elements of theology understood as a science,
that is, as a unified coherent realm of rational inquiry. His two most
cited works are of this kind, the </span><i data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Summa contra gentiles</span></i><span data-dcnode-id="762" instrument_node=""> and,
his
most famous work, the </span><i data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Summa theologiae</span></i><span data-dcnode-id="759" instrument_node="">. It is a testimony to
this
quality of his work that the council fathers at Trent placed the </span><i data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Summa
theologiae</span></i><span data-dcnode-id="756" instrument_node=""> on the altar during their deliberations. </span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="753" instrument_node="">Yet, Thomas himself might be surprised at this legacy. He
certainly
understood the importance of articulating the intelligibility and
coherence
of the faith. But much of his time as a university master of theology
was
dedicated to commenting on Scripture. Indeed, Thomas may well have
thought
his Scripture commentaries to be his most important works. If we
distinguish
so sharply systematic from biblical theology, Thomas would not.
Theology
-- however one chooses to distinguish its parts -- is, for Thomas, a
unified
science. As the highest science, it is the most unified and unifying.
As
a theologian, Thomas always returns to the foundation of that science:
Scripture. The purpose of this essay is to suggest some of the ways in
which he understands and interprets Scripture. </span><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="745"><b data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">I. The University Master</span></b><span data-dcnode-id="746" instrument_node=""> </span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="743" instrument_node="">In any analysis of something, Thomas considers its purpose,
its goal,
its end. Sacred Scripture is no different. "It must be said that Sacred
Scripture is divinely ordered to this: that through it, the truth
necessary
for salvation may be made known to us."</span><sup data-dcnode-id="740"><a data-dcnode-id="741" href="#N_1_"><span data-dcnode-id="742" instrument_node="">(1)</span></a></sup><span data-dcnode-id="739" instrument_node="">
So Thomas situates Scripture squarely within the divine economy. Man
was
made to share in the divine Trinitarian life of God; this is his end.
To
achieve this end, he requires divine help, which raises his nature to
that
which transcends it. And yet, as Thomas insists, grace perfects nature.</span><sup data-dcnode-id="736"><a data-dcnode-id="737" href="#N_2_"><span data-dcnode-id="738" instrument_node="">(2)</span></a></sup><span data-dcnode-id="735" instrument_node="">
God acts in ways most fitting to our nature, to the kind of creature He
created. Thus, while God might have elevated man in any number of ways,
He does it in ways that recognize the integrity of His creation. Thus,
a free and rational creature should, if it is to live according to its
created nature, order its actions to its end, to participation in the
divine
life. This poses a problem: how can this creature order itself to that
which ultimately exceeds its grasp? For Thomas, the answer is, in part,
revelation. God reveals Himself not in order to satisfy idle human
curiosity,
but to make possible the full ordering in grace of the human person to
God.</span><sup data-dcnode-id="732"><a data-dcnode-id="733" href="#N_3_"><span data-dcnode-id="734" instrument_node="">(3)</span></a></sup><span data-dcnode-id="731" instrument_node=""> In this light, Thomas
understands
the purpose of Scripture: to make known the truths necessary for
salvation. </span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="728" instrument_node="">Given this understanding of Scripture's purpose, one can see
why Thomas
maintains that the principal author of Scripture is God. If man is to
be
given this revelation that exceeds his natural capacities, it must
ultimately
come from God, not another man (unless that man be the Word incarnate).
Of course, Thomas is quite aware of the human authorship of Scripture,
of its many authors and its many genres.</span><sup data-dcnode-id="725"><a data-dcnode-id="726" href="#N_4_"><span data-dcnode-id="727" instrument_node="">(4)</span></a></sup><span data-dcnode-id="724" instrument_node="">
What unites this collection, however, is its divine authorship, which
orders
it perfectly to its end of manifesting the saving truth. This
understanding of Scripture governs all of Thomas' thought. </span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="721" instrument_node="">When he began his career as a master of theology at the
University of
Paris, Thomas gave an inaugural lecture in which he took as his text
Psalm
103.13: "Watering the earth from his things above, the earth will be
filled
from the fruit of your works." The divine wisdom of rain pours down
upon
the teachers of that wisdom (the mountains) and from there to the
fields
where it produces much fruit. Thomas then considers four elements: "the
exalted nature of spiritual teaching, the high standing of those who
teach
it, the position of those who hear it and the manner of its
communication."</span><sup data-dcnode-id="718"><a data-dcnode-id="719" href="#N_5_"><span data-dcnode-id="720" instrument_node="">(5)</span></a></sup><span data-dcnode-id="717" instrument_node="">
In presenting in capsule form the high standing of the spiritual
teacher,
Thomas opens to us his own understanding of the task of the theologian.
"Because of the exalted nature of this teaching, high standing is also
required in those who teach it, and this is why they are symbolized by
mountains." Thomas notes three characteristics of mountains that should
characterize the teacher: high, radiant, and a defense. "Holy teachers
ought to make light of the things of earth and yearn only for the
things
of heaven." They must be radiant, that is, "enlightened by the rays of
divine wisdom." And finally, "They are a defense, because mountains
protect
the land from its enemies. In the same way the church's teachers ought
to protect the faith against error."</span><sup data-dcnode-id="714"><a data-dcnode-id="715" href="#N_6_"><span data-dcnode-id="716" instrument_node="">(6)</span></a></sup><span data-dcnode-id="713" instrument_node="">
The teacher thus stands as a minister who receives his wisdom from
above
and in turn hands it on. The fruit is not attributed to the teacher,
who
is but an instrument, but to God who is the source of all wisdom. Of
course,
instruments can be more or less suitable for the job. "What God
requires
is ministers who are innocent ('The one who walks a spotless path is
the
one who has been my minister,' Psalm 100:6), intelligent ('An
intelligent
minister is pleasing to his king,' Prov. 14:35), fervent ('You make
spirits
your messengers and your ministers a burning fire,' Psalm 103:4) and
obedient
('His minsters who do his will,' Psalm 102:21)."</span><sup data-dcnode-id="710"><a data-dcnode-id="711" href="#N_7_"><span data-dcnode-id="712" instrument_node="">(7)</span></a></sup><span data-dcnode-id="709" instrument_node="">
Thus Thomas sees his task, and the task of all masters of theology, to
teach the divine wisdom and truth in the Scripture. To do this well
requires
moral uprightness of life, a keen intelligence, and a faithful
docility. </span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="706" instrument_node="">But practically speaking, what was a master of theology's job?
His duties
were twofold: to hold periodic public disputations throughout the
course
of the academic term and to lecture on sacred Scripture. Although
Thomas
wrote a dozen commentaries on various works of Aristotle, he never
taught
Aristotle in the classroom. Likewise, the two great summas, the </span><i data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Summa
contra gentiles</span></i><span data-dcnode-id="703" instrument_node=""> and the </span><i data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Summa theologiae</span></i><span data-dcnode-id="700" instrument_node="">, were private
works
of the study; Thomas never taught them. What Thomas taught in his
classroom
as a master of theology was Scripture.</span><sup data-dcnode-id="697"><a data-dcnode-id="698" href="#N_8_"><span data-dcnode-id="699" instrument_node="">(8)</span></a></sup><span data-dcnode-id="696" instrument_node="">
</span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="688"><b data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">II. The Principles of Scriptural Interpretation</span></b><span data-dcnode-id="689" instrument_node=""> </span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="686" instrument_node="">In turning to the principles of Thomas' interpretation of
Scripture,
we find that Thomas has little to say of a strictly hermeneutical
nature.</span><sup data-dcnode-id="683"><a data-dcnode-id="684" href="#N_9_"><span data-dcnode-id="685" instrument_node="">(9)</span></a></sup><span data-dcnode-id="682" instrument_node="">
This may be because Thomas is more interested in actually interpreting
Scripture than in thinking about interpreting Scripture. As well,
Thomas
holds nothing that is significantly novel; he is thoroughly rooted in a
tradition extending back to the Fathers, indeed, to Scripture itself.
Thomas
speaks in a commonly accepted and understood language.</span><sup data-dcnode-id="679"><a data-dcnode-id="680" href="#N_10_"><span data-dcnode-id="681" instrument_node="">(10)</span></a></sup><span data-dcnode-id="678" instrument_node="">
This language, so common to the Middle Ages, is no longer so common to
us, and so we shall give some attention to it. </span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Thomas sees in Scripture, as the entire tradition did, various
levels
of meaning in the text. As the revelation of the infinite God,
Scripture
offers ever deeper levels of understanding. In presenting the levels of
meaning in Scripture, Thomas first distinguishes between the literal
sense
and the spiritual (or mystical) sense. This is the primary and most
important
distinction in the levels or senses of Scripture. </span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="672" instrument_node="">The literal sense is the meaning or signification of the words
themselves.
In this, Scripture is like any other literary work and can be studied
accordingly.
While Thomas' linguistic and literary skills were modest by modern
standards,
he would no doubt delight in the deepened modern understanding of the
linguistic
and literary contexts of Scripture. Likewise with history, Thomas'
tools
were few, but here again, he would appreciate our deepened
understanding
of the historical context of Scripture. Nonetheless, these studies are
not ends in themselves. What interests Thomas in considering the
literal
sense of Scripture is what do the words mean? In presenting the literal
sense of Scripture, Thomas speaks, by way of a kind of formula, of
"words
signifying things." His own understanding of human intelligence is that
words as sounds are signs of mental words -- what we might call
concepts
and ideas -- which themselves have some referent in reality.</span><sup data-dcnode-id="669"><a data-dcnode-id="670" href="#N_11_"><span data-dcnode-id="671" instrument_node="">(11)</span></a></sup><span data-dcnode-id="668" instrument_node="">
To know the literal sense is to know the reality intended by the author
and signified by those words.&nbsp; </span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="665" instrument_node="">Within this understanding of the literal sense, Thomas
includes metaphor.
Indeed, any literary device used in Scripture, in so far as it is
common
to other literary texts, is a matter of the literal sense. So, for
example,
Thomas notes that Christ's sitting on the right hand of God is to be
understood
metaphorically, since God has no right hand, but that the metaphorical
meaning (the power of God) is the literal meaning as it is the thing,
the
reality, ultimately signified by the words.</span><sup data-dcnode-id="662"><a data-dcnode-id="663" href="#N_12_"><span data-dcnode-id="664" instrument_node="">(12)</span></a></sup><span data-dcnode-id="661" instrument_node="">
</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="658" instrument_node="">This is not to suggest that Thomas naively thinks the literal
sense
is obvious or self-evident. Thomas is well aware of the manifold
possibilities
presented by the letter. We catch a telling glimpse of this in one of
the
disputed questions&nbsp; when Thomas asks whether the creation of
unformed
matter precedes in duration the creation of things.</span><sup data-dcnode-id="655"><a data-dcnode-id="656" href="#N_13_"><span data-dcnode-id="657" instrument_node="">(13)</span></a></sup><span data-dcnode-id="654" instrument_node="">
The question is not only a metaphysical one; much of the debate is
about
interpreting the opening lines of Genesis. In this lengthy question,
Thomas
considers the interpretations of Augustine, Gregory the Great, Basil,
Gregory
Nazianzus, and Moses Maimonides, as well as a host of presumably more
contemporary
"others." We need not rehearse the multiple and complex arguments of
this
question. Of interest to us are Thomas' general comments at the
beginning
of his response to the question. </span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Leaning on Augustine, Thomas says that with questions such as
this one
there is a twofold debate, namely, concerning the truth of the matter,
and concerning the sense of the letter. In disputing the truth of the
matter,
one should neither assert something false, especially what would
contradict
the truth of faith, nor assert that what one believes to be true is a
truth
of faith. Thomas is particularly concerned that one might tie some
personal
belief to the truth of faith, which if shown to be false, would hold
the
faith up to the ridicule of non-believers. Those who maintained the
ptolemaic
universe to be a truth of faith may provide a good, albeit subsequent,
example of what concerns Thomas here. </span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="648" instrument_node="">Concerning the sense of the letter, Thomas again notes two
extremes
to be avoided. One should neither assert that something false is in
Scripture,
nor should one insist upon a particular meaning to the exclusion of
others
that contain the truth and that fit the circumstances of the letter.
The
first seems clear enough: one ought not maintain something known to be
false as scriptural since Scripture is the revelation of God who is
truth.</span><sup data-dcnode-id="645"><a data-dcnode-id="646" href="#N_14_"><span data-dcnode-id="647" instrument_node="">(14)</span></a></sup><span data-dcnode-id="644" instrument_node="">
The second is of particular interest for Thomas notes in passing the
grounds
for entertaining competing literal interpretations. They must not claim
anything known to be false, and they must fit the text or, to quote
more
precisely, "the circumstances of the letter must be preserved." Thomas
does not explain what he means here. He does provide an example a bit
later
in the question when he considers how to understand the firmament that
divides the waters. He explains that some (including Maimonides) hold
that
this refers to the air or that part of the atmosphere between the rain
clouds and the water on the earth. Thomas argues that this
interpretation
does not seem to fit the circumstances of the letter since the text
also
says that God placed the two great lights and the stars in that
firmament.</span><sup data-dcnode-id="641"><a data-dcnode-id="642" href="#N_15_"><span data-dcnode-id="643" instrument_node="">(15)</span></a></sup><span data-dcnode-id="640" instrument_node="">
Thus minimally, Thomas appeals to context and a contextual coherence. </span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="637" instrument_node="">Let us note the implications of these cautions for the literal
interpretation
of Scripture as understood by Thomas. Thomas grants that one may be
confronted
with competing literal interpretations each of which is true with
regard
to the nature of things and each of which fits the "circumstances of
the
letter." In these cases one is not to insist on one's own
interpretation
to the exclusion of the others. Thomas even goes so far as to suggest
that
these all may have been the author's intention, and if they were not,
they
nonetheless could be the intention of the divine author and thus all
acceptable.</span><sup data-dcnode-id="634"><a data-dcnode-id="635" href="#N_16_"><span data-dcnode-id="636" instrument_node="">(16)</span></a></sup><span data-dcnode-id="633" instrument_node=""> </span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="630" instrument_node="">The literal sense of Scripture plays two important roles in
Aquinas'
thought. First, theological argument is only to be made on the basis of
the literal sense. For Thomas, theology is a science, that is, it is
characterized
by reasoned arguments. First and foremost, those arguments are from
authority.</span><sup data-dcnode-id="627"><a data-dcnode-id="628" href="#N_17_"><span data-dcnode-id="629" instrument_node="">(17)</span></a></sup><span data-dcnode-id="626" instrument_node="">
Scripture holds pride of place among these authorities; however, Thomas
is firm that that authority, in so far as it is part of a theological
argument,
is proper to the literal sense.</span><sup data-dcnode-id="623"><a data-dcnode-id="624" href="#N_18_"><span data-dcnode-id="625" instrument_node="">(18)</span></a></sup><span data-dcnode-id="622" instrument_node=""> </span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The second role that the literal sense plays in Thomas'
thought is as
the foundation for the spiritual or mystical sense. The spiritual sense
is carefully distinguished from the literal. If the literal sense is
concerned
with what things the words signify, the spiritual sense is concerned
with
what those things, signified by the words, in turn signify. This is the
level on which, to use Thomas' shorthand, "things signify other
things."
Actual persons, events, and things in turn signify something else.
Thus,
for example, the lamb sacrificed at Passover signifies Christ. This is
not to deny the truth and reality of the Passover lamb; indeed, it
presupposes
it. The word "lamb" does not stand metaphorically for Christ; the
actual
lamb itself of the Passover (signified by the word) is the sign of
Christ.
This spiritual sense is unique to Scripture. Man cannot invest created
things or history with intrinsic meaning; at best, he can use
attributes
metaphorically, as all good poets do. God, however, can so invest
persons,
events, and things as the creator of everything and the provident Lord
of history. Scripture can make known such signification because it has
that same creator and Lord as its principal author. </span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="616" instrument_node="">Thomas divides the spiritual sense into three senses:
allegorical, moral,
and anagogical. Each is related to Christ.</span><sup data-dcnode-id="613"><a data-dcnode-id="614" href="#N_19_"><span data-dcnode-id="615" instrument_node="">(19)</span></a></sup><span data-dcnode-id="612" instrument_node="">
The allegorical sense is the signification of Christ Himself,
especially
in the Old Testament (such as the paschal lamb above). This does not
necessarily
include prophecy of Christ; such passages might well be literal
significations
of Christ.</span><sup data-dcnode-id="609"><a data-dcnode-id="610" href="#N_20_"><span data-dcnode-id="611" instrument_node="">(20)</span></a></sup><span data-dcnode-id="608" instrument_node=""> To be truly allegorical
in the precise way in which Thomas means it here requires that the
words
signify some thing and that that thing in turn signifies Christ. </span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="605" instrument_node="">The second sense is the moral in which something signifies how
Christians
are to act. For Thomas, first and foremost it is the actions of Christ
himself and then of the saints (as exemplary members of His body) that
signify the actions proper to the Christian life. Again, not all texts
pertaining to human action are necessarily instances of the moral
sense.
The Sermon on the Mount, for example, in its moral directives speaks
literally
of how those who would follow Christ are to live. Rather, it is the
life
of Christ himself and the saints that signify. This is not merely a
matter
of moral examples of good and heroic persons (i.e. edifying moral
biography);
rather, the lives of Christ and his saints directly signify how the
Christian
is to live. As an engaging and utterly typical instance of the moral
sense,
consider Thomas' comments on the passage in Mark in which Jesus'
disciples
pluck ears of corn on the Sabbath: </span><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="601" instrument_node="">
</span><blockquote data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">But in a mystical sense these disciples pass through
the corn
fields, when the holy doctors look with the care of a pious solicitude
upon those whom they have initiated in the faith, and who, it is
implied,
are hungering for the best of all things, the salvation of men. But to
pluck the ears of corn means to snatch men away from the eager desire
of
earthly things. And to rub with the hands is by examples of virtue to
put
from the purity of their minds the concupiscence of the flesh, as men
do
husks. To eat the grains is when a man, cleansed from the filth of vice
by the mouths of preachers, is incorporated amongst the members of the
Church. Again fitly are the disciples related to have done this,
walking
before the face of the Lord, for it is necessary that the discourse of
the doctor should come first, although the grace of visitation from on
high, following it, must enlighten the heart of the hearer.</span><sup data-dcnode-id="597"><a data-dcnode-id="598" href="#N_21_"><span data-dcnode-id="599" instrument_node="">(21)</span></a></sup></blockquote><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="584"><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
Finally, in the third sense, the anagogical, what is signified is
the beatific life of heaven with Christ. For example, the observance of
the sabbath not only keeps the creation of the world always before
one's
eyes (here Thomas cites Moses Maimonides for the literal sense), but it
also signifies the eternal rest that the saints enjoy in glory.</span><sup data-dcnode-id="590"><a data-dcnode-id="591" href="#N_22_"><span data-dcnode-id="592" instrument_node="">(22)</span></a></sup><span data-dcnode-id="589" instrument_node="">
Or again, circumcision signifies anagogically the casting off of the
corruptibility
of flesh and blood in the resurrection.</span><sup data-dcnode-id="586"><a data-dcnode-id="587" href="#N_23_"><span data-dcnode-id="588" instrument_node="">(23)</span></a></sup><span data-dcnode-id="585" instrument_node="">
</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="582" instrument_node="">Thomas himself gives an example of the senses of Scripture as
applied
to a particular passage: "When I say 'Let there be light' and speak of
corporeal light, it pertains to the literal sense. If 'Let there be
light'
is understood as 'let Christ be born in the church,' it pertains to the
allegorical sense. If it is understood as 'let us be introduced into
glory
through Christ,' it pertains to the anagogical sense. If it is
understood
as 'let us be illumined in our intellects and inflamed in our
affections,'
it pertains to the moral sense."</span><sup data-dcnode-id="579"><a data-dcnode-id="580" href="#N_24_"><span data-dcnode-id="581" instrument_node="">(24)</span></a></sup><span data-dcnode-id="578" instrument_node=""> </span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="575" instrument_node="">Of course not every passage of Scripture admits of all the
senses. Nor
is it always clear under what sense a particular interpretation fits.</span><sup data-dcnode-id="572"><a data-dcnode-id="573" href="#N_25_"><span data-dcnode-id="574" instrument_node="">(25)</span></a></sup><span data-dcnode-id="571" instrument_node="">
Nonetheless, the notion of the senses of Scripture informed the very
intellectual
and spiritual makeup of Thomas and all of his contemporaries. </span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="563"><b data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">III. Thomas' Commentaries on Scripture</span></b><span data-dcnode-id="564" instrument_node=""> </span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="561" instrument_node="">Several of Thomas' commentaries on Scripture have survived. He
wrote
commentaries on Psalms 1-54, Job, Isaiah, Ezekiel, Jeremiah,
Lamentations,
Matthew, John, and all the letters of Paul.</span><sup data-dcnode-id="558"><a data-dcnode-id="559" href="#N_26_"><span data-dcnode-id="560" instrument_node="">(26)</span></a></sup><span data-dcnode-id="557" instrument_node="">
As well, he compiled a compendium of patristic comments on the four
Gospels. </span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">The very organization of the commentaries is disconcerting to
the modern
reader. Thomas usually begins by dividing the text. To this end, Thomas
articulates in general what the book is about. In the light of this
principal
theme, Thomas then divides the text into parts, each of which is
related
to the overall theme. Each part is in turn divided into smaller and
smaller
parts. </span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="551" instrument_node="">Consider his commentary on the Gospel of John. Thomas begins
by stating
the principal point of the Gospel: to "show the divinity of the
incarnate
Word."</span><sup data-dcnode-id="548"><a data-dcnode-id="549" href="#N_27_"><span data-dcnode-id="550" instrument_node="">(27)</span></a></sup><span data-dcnode-id="547" instrument_node=""> In view of this intention,
Thomas
divides the Gospel into two parts: in the first, John suggests the
divinity
of Christ (c. 1), and in the second he manifests the divinity of Christ
through those things He did in the flesh (2-25). These two parts are in
turn further divided. For example, the second is divided into two
parts:
how Christ manifests His divinity while living in the world (2-11), and
how Christ manifests His divinity in His death (12-21). The first is
again
divided into two parts: manifesting His dominion over nature (c. 2),
and
manifesting the effects of grace (3-11). This latter is divided into
spiritual
regeneration (3-4) and spiritual goods conferred on those divinely
regenerated
(5-11). These spiritual goods are threefold: spiritual life (5),
spiritual
food (6), and spiritual teaching (7-11). Each of these sections is
itself
further divided and subdivided to the point that Thomas can comment
sometimes
word by word on a given verse.</span><sup data-dcnode-id="544"><a data-dcnode-id="545" href="#N_28_"><span data-dcnode-id="546" instrument_node="">(28)</span></a></sup><span data-dcnode-id="543" instrument_node=""> </span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Although Thomas' comments on a particular verse can be rich in
detail
and substance, as for example his consideration of "Word" in the
prologue
to the Gospel of John, more typically his comment on a given lemma or
word
is sparse. This is, in part, his style; Thomas was not one to speak at
length or say the same thing in a variety of ways. Nonetheless, this is
not just a matter of style. Indeed, to look simply at the comments on a
particular verse is to fail as a reader of Thomas. To ask what Thomas
says
about John 6, for example, and then go and read the comments on the
specific
text is to miss much, if not the heart, of the commentary. The genius
of
the commentaries is often in the division of the text. It is this
division
that sets every passage in a context, or perhaps better, in a set of
nested
contexts. Thus, an appreciation of Thomas' interpretation of John 6
requires
minimally that one see that this chapter is in the context of spiritual
food as a spiritual gift conferred on those divinely regenerated which
in turn is part of Christ's manifestation of his divinity through those
things he did in the flesh. In this light one can see all the more
clearly
the force of the transition from the feeding of the five thousand to
the
bread of life discourse. </span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="537" instrument_node="">Two commentaries are a bit different from the rest: the
commentary on
Job and the </span><i data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Catena aurea</span></i><span data-dcnode-id="534" instrument_node="">. Thomas' commentary on Job is
explicitly
a literal one.</span><sup data-dcnode-id="531"><a data-dcnode-id="532" href="#N_29_"><span data-dcnode-id="533" instrument_node="">(29)</span></a></sup><span data-dcnode-id="530" instrument_node=""> The Middle Ages was
heir to the rich and influential </span><i data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Moralia in Job</span></i><span data-dcnode-id="527" instrument_node=""> of Gregory the
Great,
which was concerned principally with the spiritual senses of the text.
With typical modesty, Thomas says that he has nothing to add to
Gregory,
but instead offers a literal commentary. In so commenting, Thomas
understands
the Book of Job to be about divine providence, especially the question
of reward and punishment. In this he is hardly novel. What is striking
about Thomas' commentary is his careful reading of the book as an
extended
argument. He sees the work's intrinsic unity in the question of whether
faithfulness to God is necessarily or properly rewarded by temporal
blessings.
He charts subtle developments and movements of the arguments. Thomas is
even attentive to the ways in which emotion and dimwittedness can cloud
and affect arguments and disputes. In following the narrative give and
take (treating the book much like a dialogue), Thomas does not provide
a
formal division of the text. Instead, he considers arguments as the
essential
units. Again, the comment on a particular lemma or word can only be
appreciated
in the light of its place within a larger picture, in this case, within
an argument. In his presentation and analysis of the arguments of Job,
Thomas considers with astute subtlety the nature of divine providence
and
its relation to the human end. It is a valuable, or better, necessary,
complement to his treatments of providence in the summas. </span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="524" instrument_node="">The </span><i data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Catena aurea</span></i><sup data-dcnode-id="519"><a data-dcnode-id="520" href="#N_30_"><span data-dcnode-id="521" instrument_node="">(30)</span></a></sup><span data-dcnode-id="518" instrument_node="">
proved to
be one of Thomas' most popular works although technically he wrote none
of it. It is an instance -- one of the best instances -- of a common
medieval
genre, the </span><i data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">florelegium</span></i><span data-dcnode-id="515" instrument_node=""> or gathering of quotations (flowers)
into
a whole. In this case, Thomas raids the Fathers to produce a verse by
verse
running commentary on each of the four Gospels. The selections are
carefully
chosen and edited with an eye, one suspects, to prayer and preaching.
Several
fathers may be quoted for a single passage, offering a variety of
readings.
Inevitably, the readings are classical within the tradition. The result
is a compendium of the patristic tradition's readings of the Fathers,
especially
as received in the Latin West. </span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="512" instrument_node="">Throughout his commentaries, Thomas is thoroughly theological;
that
is, he is first and always concerned with deepening his understanding
of
the revealed truths of the faith. Scripture always speaks to that
faith.
Furthermore, that theological reading is itself thoroughly ecclesial;
that
is, Thomas reads Scripture as a faithful son of the church. Scripture
itself
has its origin and confirmation in the church;</span><sup data-dcnode-id="509"><a data-dcnode-id="510" href="#N_31_"><span data-dcnode-id="511" instrument_node="">(31)</span></a></sup><span data-dcnode-id="508" instrument_node="">
it nourishes the truths learned from the church and lived in the
church.
While Thomas would no doubt grant the possibility of an extra-ecclesial
reading of Scripture; he would surely doubt its ultimate worth to the
theologian. </span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="498"><b data-dcnode-id="500"><span data-dcnode-id="503" instrument_node="">IV. The </span><i data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Summa theologiae</span></i></b><span data-dcnode-id="499" instrument_node=""> </span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">To consider the </span><i data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Summa theologiae</span></i><span data-dcnode-id="493" instrument_node=""> in the context of St.
Thomas
and Scripture may seem odd. Such apparent oddity may well, however, say
more of the contemporary theological divides than of Thomas and his own
understanding of his work. </span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="490" instrument_node="">When Thomas considers the nature of sacred doctrine in the
opening question
of the </span><i data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Summa</span></i><span data-dcnode-id="487" instrument_node="">, he notes among its many characteristics, that it
proceeds
by way of argument; that is, it is a fitting object of human
intelligence.
Nonetheless, because it deals with what has been revealed, its
arguments
are rightly often from authority. The highest authority, which is
intrinsic
and proper to the science of sacred doctrine, is sacred Scripture.</span><sup data-dcnode-id="484"><a data-dcnode-id="485" href="#N_32_"><span data-dcnode-id="486" instrument_node="">(32)</span></a></sup><span data-dcnode-id="483" instrument_node="">
Of course, there are other authorities, especially the Fathers, but
Thomas
is careful to distinguish them from Scripture, which holds the highest
authority. </span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="480" instrument_node="">The importance Thomas places on Scripture in theological
argument suggests
one needs to be careful in reading the </span><i data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Summa</span></i><span data-dcnode-id="477" instrument_node="">, especially the </span><i data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">sed
contra</span></i><span data-dcnode-id="474" instrument_node=""> ("on the other hand") where the authority for the answer to
the question is often to be found. The modern reader has a tendency to
glide past the scriptural quotations (as instances, perhaps, of
primitive
"proof-texting") in order to get to the real meat of Thomas' arguments.
This may, however, entail a subtle shifting of the weight of the text
from
Thomas' own intentions. For Thomas, the careful arguments and
distinctions
of his responses are in the service of the revealed truth made known in
Scripture as the church reads it. Indeed, Scripture is not a proof text
for the conclusion of his argument; rather, the argument is a defense
and
elucidation of Scripture itself. </span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="471" instrument_node="">Throughout the </span><i data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Summa</span></i><span data-dcnode-id="468" instrument_node=""> one finds articles dedicated to
specific
biblical texts. So, for example, in a question dedicated to the
different
kinds of law, Thomas asks whether there is a law that inclines to sin.</span><sup data-dcnode-id="465"><a data-dcnode-id="466" href="#N_33_"><span data-dcnode-id="467" instrument_node="">(33)</span></a></sup><span data-dcnode-id="464" instrument_node="">
The question arises because of Romans 7:23: "I see another law in my
members."
Thomas explicitly situates this Pauline passage within his
consideration
of the nature of law. Yet his very notion of law has been shaped in
such
a way as to account for, and not simply dismiss, the language of the
Apostle.
Or again, in considering the priesthood of Christ, Thomas asks whether
the priesthood of Christ was according to the order of Melchisedech.</span><sup data-dcnode-id="461"><a data-dcnode-id="462" href="#N_34_"><span data-dcnode-id="463" instrument_node="">(34)</span></a></sup><span data-dcnode-id="460" instrument_node=""> </span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="457" instrument_node="">Beyond particular articles within the </span><i data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Summa</span></i><span data-dcnode-id="454" instrument_node="">, whole
sections are
strikingly scriptural, for example the treatment of the six days of
creation,
of the elements of the old law, and of the life of Christ.</span><sup data-dcnode-id="451"><a data-dcnode-id="452" href="#N_35_"><span data-dcnode-id="453" instrument_node="">(35)</span></a></sup><span data-dcnode-id="450" instrument_node="">
But even acknowledging biblical sections may not get to the truly
scriptural
orientation of the </span><i data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Summa</span></i><span data-dcnode-id="447" instrument_node="">. For example, the treatment of Christ
is
divided into two parts; the first is sometimes characterized as more
"scientific"
and the second, covering the events of His life, more "scriptural." But
is this truly an adequate description? The first section analyzes "the
Word made flesh," the grace of Christ as He is head of the church,
Christ
as high priest, Christ as mediator. Are not all these scriptural?
Thomas
works to understand these scriptural ideas which he then uses in turn
to
illumine the life of Christ in the second part of the christology. </span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="444" instrument_node="">All of this is to suggest that perhaps Thomas never intended
for the </span><i data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Summa</span></i><span data-dcnode-id="441" instrument_node=""> to stand as an independent work. Might it not be
seen as a
guide to understanding Scripture bringing to bear all that revelation
and
human science have to offer? Thomas characterizes the </span><i data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Summa</span></i><span data-dcnode-id="438" instrument_node=""> as
a
work for beginners. And who are these beginners? They are beginners in
theology, that science that stands grounded in and ordered to the study
of sacred Scripture. In addition to its many other purposes, might not
the </span><i data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Summa</span></i><span data-dcnode-id="435" instrument_node=""> also stand as a guide, for the beginner, to the
faithful
and theological reading of Scripture?</span><sup data-dcnode-id="432"><a data-dcnode-id="433" href="#N_36_"><span data-dcnode-id="434" instrument_node="">(36)</span></a></sup><span data-dcnode-id="431" instrument_node="">
After all, the </span><i data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Summa</span></i><span data-dcnode-id="428" instrument_node=""> was not alone on the altar at Trent; it
accompanied
sacred Scripture. </span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="420"><b data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Conclusion</span></b><span data-dcnode-id="421" instrument_node=""> </span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="418" instrument_node="">Patristic and medieval exegesis, of which St. Thomas is but
one more
or less typical example, has been out of favor for some time,
especially
among Scripture scholars. One does hear a few rumblings from time to
time
that scholars have been premature and over zealous in their rejection
of
such a rich and varied tradition.</span><sup data-dcnode-id="415"><a data-dcnode-id="416" href="#N_37_"><span data-dcnode-id="417" instrument_node="">(37)</span></a></sup><span data-dcnode-id="414" instrument_node=""> </span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="411" instrument_node="">The traditional exegesis and the modern critical methods need
not be
necessarily contradictory. But when one considers Thomas one sees how
much
more there is to the interpretation of Scripture, beyond that which is
the focus of the critical methods.</span><sup data-dcnode-id="408"><a data-dcnode-id="409" href="#N_38_"><span data-dcnode-id="410" instrument_node="">(38)</span></a></sup><span data-dcnode-id="407" instrument_node="">
One also sees that the issue is not so much the understanding of
methods,
but the understanding of theology. For Thomas, indeed for much if not
all
of the tradition, the theologian's vocation is ecclesial. He lives and
works within the church, not apart from it. </span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="404" instrument_node="">This ecclesial understanding of the theologians' work is what
makes
possible the great variety of interpretations according to the various
senses of Scripture. The fullness of truth, which Thomas was so
convinced
was united in revelation and reason within the church, provides the
necessary
safeguards and checks for the work of the exegete. Every passage could
be found to speak, here and now, in any number of ways of the saving
truth
that brings man to his proper end. What Thomas offers is not simply
specific
readings of Scripture, but rather a vision of the theologian as
interpreter
of Scripture. He may yet have much to say to our own time. </span><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node="">
&nbsp; </span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="399"></p><span data-dcnode-id="398" instrument_node="">
</span><hr data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">
</span><center data-dcnode-id="389"><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="391"><b data-dcnode-id="392"><font data-dcnode-id="393" size="+1"><span data-dcnode-id="394" instrument_node="">Endnotes</span></font></b></p><span data-dcnode-id="390" instrument_node="">
</span></center><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="385"><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">

</span><p data-dcnode-id="378"><a data-dcnode-id="383" name="N_1_"></a><span data-dcnode-id="382" instrument_node="">1. </span><i data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Quaestiones quodlibetales</span></i><span data-dcnode-id="379" instrument_node="">,

</span><p data-dcnode-id="186"><a data-dcnode-id="191" name="N_19_"></a><span data-dcnode-id="190" instrument_node="">19. See </span><i data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">ST</span></i><span data-dcnode-id="187" instrument_node=""> I.1.10.resp. </span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="179"><a data-dcnode-id="184" name="N_20_"></a><span data-dcnode-id="183" instrument_node="">20. "Another error was that of Theodore
[of Mopsuestia]
who said that nothing in the Old Testament is said literally of Christ,
but is adapted....Against this is the final chapter of Luke: 'It is
necessary
that all that was written about me in the law of Moses, in the
prophets,
and in the psalms be fulfilled.' It is to be known that in the Old
Testament
some passages refer to Christ and are said of him alone, as 'Behold a
virgin
shall conceive and bring forth a son' (Is 7:14), and the psalm, 'My
God,
my God, why have you forsaken me?' (21.10). If someone should posit
some
other literal sense, he would be a heretic, for that heresy has been
condemned.
But because not only the words of the Old Testament, but also the
events
signify Christ, sometimes some things are said literally of others but
are referred to Christ in so far as they bear some figure of Christ, as
is said of Solomon, 'And he shall rule from sea to sea' (Ps 71:8), for
this was not fulfilled in Solomon." </span><i data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Super Evangelium s. Matthaei
lectura</span></i><span data-dcnode-id="180" instrument_node="">,
c. 1, lect. 5, ed. R. Cai (Turin: Marietti, 1951), p. 21. </span></p><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="169"><a data-dcnode-id="177" name="N_21_"></a><span data-dcnode-id="176" instrument_node="">21. </span><i data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Catena aurea in quatuor Evangelia</span></i><span data-dcnode-id="173" instrument_node="">,
in
Mk 2:23-28, ed. A. Guarienti (Turin: Marietti, 1953), vol. 1, p. 450.
The
translation is taken from </span><i data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Catena aurea. Commentary on the Four
Gospels,
Collected out of the Works of the Fathers</span></i><span data-dcnode-id="170" instrument_node=""> (Oxford: Parker, 1870),
vol.
3, p. 52. Thomas himself has taken this interpretation from the
Venerable
Bede. </span></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="159"><a data-dcnode-id="167" name="N_22_"></a><span data-dcnode-id="166" instrument_node="">22. </span><i data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Scriptum super Sententiis</span></i><span data-dcnode-id="163" instrument_node="">,
III.37.5.1.solutio,
ed. M. Moos (Paris: Lethielleux, 1933), vol. 3, pp. 1251-52. Cf. </span><i data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">ST</span></i><span data-dcnode-id="160" instrument_node="">
II-II.122.4. ad 1m. </span></p><span data-dcnode-id="158" instrument_node="">

vol. 4, p. 47. </span></p><span data-dcnode-id="151" instrument_node="">

</span><p data-dcnode-id="138"><a data-dcnode-id="143" name="N_25_"></a><span data-dcnode-id="142" instrument_node="">25. Is, for example, the use of Ps 103 in
the </span><i data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Inaugural

</span><p data-dcnode-id="131"><a data-dcnode-id="136" name="N_26_"></a><span data-dcnode-id="135" instrument_node="">26. Some of these Thomas completed for
publication;
others survive as reports (</span><i data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">reportationes</span></i><span data-dcnode-id="132" instrument_node="">) of Thomas' classroom

See the "Brief Catalogue of Authentic Works" in Weisheipl, pp. 368-74.
Thomas' biographers report a deathbed commentary on the Song of Songs.
The commentaries on the Song of Songs in the collected works of Thomas
are spurious; the authentic commentary has yet to be found. </span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="121"><a data-dcnode-id="129" name="N_27_"></a><span data-dcnode-id="128" instrument_node="">27. </span><i data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">Super Evangelium s. Ioannis lectura</span></i><span data-dcnode-id="125" instrument_node="">,
c. 1, lect. 1, ed. R. Cai (Turin: Marietti, 1952), p. 7; the commentary
on the first six chapters has been translated into English as </span><i data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">The
Commentary
on the Gospel of St. John</span></i><span data-dcnode-id="122" instrument_node="">, trans. J. A. Weisheipl and F. R. Larcher
(Albany: Magi Books, 1980), p. 31. This is hardly a novel take on the
Gospel;
indeed, it is a commonplace for the Fathers and for medieval exegetes
alike. </span></p><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="108"><a data-dcnode-id="119" name="N_28_"></a><span data-dcnode-id="118" instrument_node="">28. In his commentary on the Gospel of
Matthew,
Thomas proposes a very different division rooted in a very different
intention.
For Thomas, the principal focus in Matthew is the humanity of Christ.
This
leads Thomas to a common sense threefold division of the Gospel: the
entrance
of the humanity of Christ into the world (1-2), its life in the world
(3-20),
and its departure from the world (21-28); </span><i data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">Super Evangelium s.
Matthaei</span></i><span data-dcnode-id="115" instrument_node="">,
c. 1, lect. 1, p. 3. Thomas applies such a scheme to the entire corpus
of Pauline epistles; see </span><i data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Super epistolas s. Pauli lectura</span></i><span data-dcnode-id="112" instrument_node="">,
prolog,
vol. 1, p. 3. This technique of dividing the text is not unique to
Thomas;
it is common among the scholastics of the period although like any
instrument
it can be used more or less skillfully. Likewise, the division of the
text
is not limited to Scripture commentaries; Thomas uses the same
technique
in his commentaries on Aristotle; and he even uses a modified form of
it
to structure his own </span><i data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Summa theologiae</span></i><span data-dcnode-id="109" instrument_node="">.&nbsp; </span></p><span data-dcnode-id="107" instrument_node="">

in </span><i data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Opera
omnia iussu Leonis XIII P.M. edita</span></i><span data-dcnode-id="99" instrument_node=""> (Leonine edition), vol. 26
(Rome:
Ad sanctae Sabinae, 1965); in English, </span><i data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">The Literal Exposition on Job</span></i><span data-dcnode-id="96" instrument_node="">,
trans. A. Damico (Atlanta: Scholars Press, 1989). </span></p><span data-dcnode-id="94" instrument_node="">
