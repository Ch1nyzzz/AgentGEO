="543" style=""><span data-dcnode-id="544" instrument_node="">Fr. Robert Capone, University of San Diego, San Diego, California</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="531" id="testimonials291" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="532"><div class="testimonial_text_holder" data-dcnode-id="533"><div class="testimonial_text_inner" data-dcnode-id="534" style=""><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">"For Catholics wanting to learn more about the bible, the best place to go is The Cornerstone. They have plenty of resources to break open God's Word and to relate Scripture to one's daily life - whether for beginners with little knowledge or for more experienced readers of the bible."</span></p><p class="testimonial_author" data-dcnode-id="535" style=""><span data-dcnode-id="536" instrument_node="">Geoffrey D. Miller, Ph.D., Assistant Professor of Biblical Studies, St. Louis University , St. Louis, Missouri</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="523" id="testimonials290" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0.845; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="524"><div class="testimonial_text_holder" data-dcnode-id="525"><div class="testimonial_text_inner" data-dcnode-id="526" style=""><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">“The Cornerstone unites study and prayer, faith and reason, contemplation and action.  I highly recommend it to anyone who wants to reflect on how the Word of God can transform our lives and our world.”</span></p><p class="testimonial_author" data-dcnode-id="527" style=""><span data-dcnode-id="528" instrument_node="">Fr. Seán Charles Martin, President and Associate Professor of Biblical Studies, Aquinas Institute of Theology, Saint Louis, Missouri</span></p></div></div></div></li><li class="testimonial_content flex-active-slide" data-dcnode-id="515" id="testimonials289" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0.1525; display: block; z-index: 2;"><div class="testimonial_content_inner" data-dcnode-id="516"><div class="testimonial_text_holder" data-dcnode-id="517"><div class="testimonial_text_inner" data-dcnode-id="518" style=""><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">“I'm a six year participant in Cornerstone Scripture Study and each fall I can't wait for the next session to start.   The study questions draw out the meaning of each lesson and as we discuss them in class the input from members adds more depth to my understanding of the Bible.  Becoming a member of Cornerstone Scripture Study group is the best gift I've given myself in years!”</span></p><p class="testimonial_author" data-dcnode-id="519" style=""><span data-dcnode-id="520" instrument_node="">Patricia Z, St. Raphael- FL, member since 2009</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="507" id="testimonials288" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="508"><div class="testimonial_text_holder" data-dcnode-id="509"><div class="testimonial_text_inner" data-dcnode-id="510" style=""><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">“Cornerstone has allowed me to grow in my spiritual life, by sharing, reflecting and making connections through the lessons with my personal life.”
-Cornerstone me  ha  permitido crecer  espiritualmente, al  compartir ,reflexionar y encontrar conexiones en las  diferentes lecciones,  con mi  vida personal.-</span></p><p class="testimonial_author" data-dcnode-id="511" style=""><span data-dcnode-id="512" instrument_node=""> Beatriz V, St. Martha – Kingwood Day Branch- TX, member since 2012</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="499" id="testimonials287" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="500"><div class="testimonial_text_holder" data-dcnode-id="501"><div class="testimonial_text_inner" data-dcnode-id="502" style=""><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">“For so long I have wanted to do a bible study, but just could not find the time or the right fit for me.  I can say without hesitation I have found my place.  This is my second year and Cornerstone has proven to be a source of great learning, peace and inspiration.  Each and every member of this Branch plays an important role in my faith journey.  Each week we gather I look forward to sharing, learning and growing spiritually.  What great encouragement is offered here. It is giving me the discipline to improve my prayer life.”</span></p><p class="testimonial_author" data-dcnode-id="503" style=""><span data-dcnode-id="504" instrument_node="">Mary Beth N, ROC Branch- MO, member since 2013</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="491" id="testimonials286" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="492"><div class="testimonial_text_holder" data-dcnode-id="493"><div class="testimonial_text_inner" data-dcnode-id="494" style=""><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">“For me, Cornerstone offers the unique blend of the history of our faith, the sharing of our beliefs and the benefits of belonging to a community that is filled with love, compassion and understanding. No other Bible study has offered this powerful combination.“</span></p><p class="testimonial_author" data-dcnode-id="495" style=""><span data-dcnode-id="496" instrument_node="">Tom M, Mission Branch- CA, member</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="483" id="testimonials285" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="484"><div class="testimonial_text_holder" data-dcnode-id="485"><div class="testimonial_text_inner" data-dcnode-id="486" style=""><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">“Cornerstone has given life and meaning to scriptures I have been hearing and reading my entire life.  Cornerstone has introduced me to the authors of scripture as living breathing people who have undergone trials and tribulations just as I have.  They have reinforced the notion that God is in control of the universe and all that is in it.  I have seen how they have persevered and that I will persevere if I have faith and trust in God.”</span></p><p class="testimonial_author" data-dcnode-id="487" style=""><span data-dcnode-id="488" instrument_node="">Barb B, St. Gerard-MN Branch, member since 2013</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="475" id="testimonials85" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="476"><div class="testimonial_text_holder" data-dcnode-id="477"><div class="testimonial_text_inner" data-dcnode-id="478" style=""><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">So often I am asked if there is a Bible Study in which a Catholic would both feel at home and be nourished both spiritually and intellectually as well. So often I respond, 'I recommend The Cornerstone.'</span></p><p class="testimonial_author" data-dcnode-id="479" style=""><span data-dcnode-id="480" instrument_node="">Rev. Msgr. James Telthorst</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="467" id="testimonials84" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="468"><div class="testimonial_text_holder" data-dcnode-id="469"><div class="testimonial_text_inner" data-dcnode-id="470" style=""><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">The unique gift of The Cornerstone is that Catholics learn not only to study, but to pray the Scriptures in community, and so meet the living Word -- Jesus.</span></p><p class="testimonial_author" data-dcnode-id="471" style=""><span data-dcnode-id="472" instrument_node="">Rev. Paul Niemann</span></p></div></div></div></li><li class="testimonial_content" data-dcnode-id="459" id="testimonials83" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial_content_inner" data-dcnode-id="460"><div class="testimonial_text_holder" data-dcnode-id="461"><div class="testimonial_text_inner" data-dcnode-id="462" style=""><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">The Cornerstone Bible Study is a gathering of people of faith who wish to be nourished by God's Word. I recommend participation in this faith experience for all who seek to know the Lord.</span></p><p class="testimonial_author" data-dcnode-id="463" style=""><span data-dcnode-id="464" instrument_node="">Rev. Greg Mikesch</span></p></div></div></div></li></ul><ul class="flex-direction-nav" data-dcnode-id="451"><li class="flex-nav-prev" data-dcnode-
