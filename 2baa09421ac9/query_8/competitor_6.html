</span><h1 data-dcnode-id="357"><span data-dcnode-id="362" instrument_node="">Buddhism for beginners</span><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">
</span><font data-dcnode-id="358" size="3"><span data-dcnode-id="359" instrument_node="">- including agnostic and secular Buddhism -</span></font></h1><span data-dcnode-id="356" instrument_node="">
</span><h4 data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Introduction</span></h4><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">There is a good deal of misunderstanding about Buddhism, particularly in Western countries. This 
site explains what it is and what is not, how to become a Buddhist and how to practise 
Buddhism. Buddhism is described in both its traditional aspect and in modern terms, with 
application to modern lifestyles.</span></p><span data-dcnode-id="350" instrument_node="">
</span><span data-dcnode-id="348" instrument_node="">
</span><div class="twelve columns category" data-dcnode-id="341"><span data-dcnode-id="347" instrument_node="">
</span><div class="centertext" data-dcnode-id="343"><span data-dcnode-id="346" instrument_node="">
</span><img alt="Chiang Saen Buddha" class="u-max-full-width" data-dcnode-id="345" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.buddhismforbeginners.com/images/chiang-saen-buddha-boat.jpg&amp;raw" title="Chiang Saen Sakyamuni Buddha - Thailand"><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="342" instrument_node="">
</span></div><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="339" instrument_node="">If you are looking for a book that covers the whole subject, try </span><a data-amzn-asin="0835607860" data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/dp/0835607860/%3Ftag%3Dbuddhismforbg-20" rel="nofollow"><span data-dcnode-id="338" instrument_node="">The Illustrated Encyclopedia of Buddhist Wisdom</span></a><span data-dcnode-id="336" instrument_node="">, 
by Gill Farrer-Halls (more of a guide than an encyclopedia), </span><a data-amzn-asin="0892817615" data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/dp/0892817615/%3Ftag%3Dbuddhismforbg-20" rel="nofollow"><span data-dcnode-id="335" instrument_node="">The Buddhist Handbook: A Complete Guide to Buddhist Schools, Teaching, Practice, and History</span></a><span data-dcnode-id="333" instrument_node="">, 
by John Snelling, or check out this collection of </span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.buddhismforbeginners.com/buddhism_bibliography.html"><span data-dcnode-id="332" instrument_node="">recommended books</span></a><span data-dcnode-id="330" instrument_node="">.</span></p><span data-dcnode-id="328" instrument_node="">
</span><h4 data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">The Origin of Buddhism</span></h4><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="324" instrument_node="">The Buddha-to-be was born Siddhattha Gotama about 2,600 years ago as a prince of the Sakya clan near what is now the 
Indian-Nepalese border.

To preserve the monastic order, the Buddha set down 227 rules for a 
</span><i data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">bhikkhu</span></i><span data-dcnode-id="321" instrument_node=""> (monk) to observe and 311 for a </span><i data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">bhikkhuni</span></i><span data-dcnode-id="318" instrument_node=""> (nun). 
Before his death (known as </span><i data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">parinirvana</span></i><span data-dcnode-id="315" instrument_node="">) he said that some minor 
rules could be changed.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Within a short time of his passing away there was disagreement over 
what could be changed and different sects emerged. The more reformist 
sects later called themselves Mahayana (greater vehicle) and referred 
to the conservative sects as Hinayana (lesser vehicle). The only 
conservative sect remaining today is Theravada, which is prevalent in 
Sri Lanka, Burma and Thailand. Theravada recognises the Pali Canon as 
its scriptures and a variety of ancient Theravadin commentaries.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Whereas Theravada spread to the south and east, Mahayana moved to the 
northwest through what is now Pakistan and Afghanistan and then across 
Central Asia to China, Tibet, Vietnam, Korea and Japan. For historical 
reasons, the language of Mahayana scriptures was Sanskrit and that of 
Theravada was Pali. Hence the difference in spelling of some common 
Buddhist terms: Nirvana/Nibbana, Sutra/Sutta, Karma/Kamma, 
Dharma/Damma, etc. Westerners are more familiar with Mahayana Sanskrit 
terms.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Mahayana also has its own scriptures in addition to the Pali Canon, the 
most important of which is the Lotus Sutra. These sutras are purported 
to be the Buddha's secret "higher" teachings, which were handed down 
only to those who were ready for them - an idea emphasised at the 
beginning of the Lotus Sutra.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Apart from a modified monastic code which made monasticism possible in 
harsh environments such as Tibet, Mahayana emphasises the Bodhisattva 
Ideal, where a man vows not to achieve final enlightenment until all 
sentient beings have been saved. So anyone helping others to achieve 
enlightenment can be considered a bodhisattva. In Theravada, the term 
bodhisattva usually refers only to the historical Buddha in his 
previous lives. Historically, some Mahayanists consider Theravadins 
to be selfish for seeking enlightenment only for themselves, while 
some Theravadins consider Mahayanists to have deviated from what the 
Buddha taught.</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">For more than 2,500 years, the religion we know today as Buddhism has 
been the primary inspiration behind many successful civilizations, the 
source of great cultural achievements and a lasting and meaningful 
guide to the very purpose of life for millions of people. Today, large 
numbers of men and women from diverse backgrounds throughout our world 
are following the Teachings of the Buddha. So who was the Buddha and 
what are His Teachings?</span></p><span data-dcnode-id="298" instrument_node="">
</span><h5 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">The Buddha</span></h5><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">The man who was to become the Buddha was born Siddhattha Gotama around 
2,600 years ago as a Prince of a small territory near what is now the 
Indian-Nepalese border. Though he was raised in splendid comfort, 
enjoying aristocratic status, no amount of material pleasure could 
satisify the enquiring and philosophic nature of the young man. At the 
age of 29 he left palace and family to search for a deeper meaning in 
the secluded forests and remote mountains of North-East India. He 
studied under the wisest religious teachers and philosophers of his 
time, learning all they had to offer, but he found it was not enough. 
He then struggled alone with the path of self- mortification, taking 
that practice to the extremes of asceticism, but still to no avail.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Then, at the age of 35, on the full moon night of May, he sat beneath 
the branches of what is now known as the Bodhi Tree, in a secluded 
grove by the banks of the river Neranjara, and developed his mind in 
deep but luminous, tranquil meditation. Using the extraordinary clarity 
of such a mind with its sharp penetrative power generated by states of 
deep inner stillness, he turned his attention to investigate upon the 
hidden meanings of mind, universe and life. Thus he gained the supreme 
Enlightenment experience and from that time on he was known as the 
Buddha. His Enlightenment consisted of the most profound and 
all-embracing insight into the nature of mind and all phenomena. This 
Enlightenment was not a revelation from some divine being, but a 
discovery made by Himself and based on the deepest level of meditation 
and the clearest experience of the mind. It meant that He was no longer 
subject to craving, ill-will and delusion but was free from their 
shackles, having attained the complete ending of all forms of inner 
suffering and acquired unshakeable peace.</span></p><span data-dcnode-id="289" instrument_node="">
</span><h5 data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">The Teachings of the Buddha</span></h5><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Having realized the goal of Perfect Enlightenment, the Buddha spent the 
next 45 years teaching a Path which, when diligently followed, will 
take anyone regardless of race, class or gender to that same Perfect 
Enlightenment. The Teachings about this Path are called the Dhamma, 
literally meaning "the nature of all things" or "the truth underlying 
existence". It is beyond the scope of this pamphlet to present a 
thorough description of all of these Teachings but the following 7 
topics will give you an overview of what the Buddha taught:</span></p><span data-dcnode-id="283" instrument_node="">
</span><h6 data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">1. The way of Inquiry</span></h6><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The Buddha warned strongly against blind faith and encouraged the way 
of truthful inquiry. In one of His best known sermons, the Kalama 
Sutta, the Buddha pointed out the danger in fashioning one's beliefs 
merely on the following grounds: on hearsay, on tradition, because many 
others say it is so, on the authority of ancient scriptures, on the 
word of a supernatural being, or out of trust in one's teachers, 
elders, or priests. Instead one maintains an open mind and thoroughly 
investigates one's own experience of life. When one sees for oneself 
that a particular view agrees with both experience and reason, and 
leads to the happiness of one and all, then one should accept that view 
and live up to it!</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">This principle, of course, applies to the Buddha's own Teachings. They 
should be considered and inquired into using the clarity of mind born 
of meditation. Only when one sees these Teachings for oneself in the 
experience of insight, do these Teachings become one's Truth and give 
blissful liberation.</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">The traveller on the way of inquiry needs the practice of tolerance. 
Tolerance does not mean that one embraces every idea or view but means 
one doesn't get angry at what one can't accept.</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Further along the journey, what one once disagreed with might later be 
seen to be true. So in the spirit of tolerant inquiry, here are some 
more of the basic Teachings as the Buddha gave them.</span></p><span data-dcnode-id="268" instrument_node="">
</span><h6 data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2. The Four Noble Truths</span></h6><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">The main Teaching of the Buddha focuses not on philosophical 
speculations about a Creator God or the origin of the universe, or on a 
heaven world ever after. The Teaching, instead, is centred on the 
down-to-earth reality of human suffering and the urgent need to find 
lasting relief from all forms of discontent. The Buddha gave the simile 
of a man shot by a poison-tipped arrow who, before he would call a 
doctor to treat him, demanded to know first who shot the arrow and 
where the arrow was made and of what and by whom and when and where ... 
this foolish man would surely die before his questions could be well 
answered. In the same way, the Buddha said, the urgent need of our 
existence is to find lasting relief from recurrent suffering, which 
robs us of happiness and leaves us in strife.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Philosophical speculations are of secondary importance and, anyway, 
they are best left until after one has well trained the mind in 
meditation to the stage where one has the ability to examine the matter 
clearly and find the Truth for oneself.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Thus, the central Teaching of the Buddha, around which all other 
teachings revolve, is the Four Noble Truths:</span></p><span data-dcnode-id="256" instrument_node="">
</span><ol data-dcnode-id="242"><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">That all forms of being, human and otherwise, are afflicted with 
suffering.</span></li><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">That the cause of this suffering is Craving, born of the illusion 
of a soul.</span></li><span data-dcnode-id="249" instrument_node="">
</span><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">That this suffering has a lasting end in the Experience of 
Enlightenment (Nibbana) which is the complete letting go of the 
illusion of soul and all consequent desire and aversion.</span></li><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">That this peaceful and blissful Enlightenment is achieved through a 
gradual training, a Path that is called the Middle Way or the 
Eightfold Path.</span></li><span data-dcnode-id="243" instrument_node="">
</span></ol><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">It would be mistaken to label this Teaching as 'pessimistic' on the 
grounds that it begins by centring on suffering. Rather, Buddhism is 
'realistic' in that it unflinchingly faces up to the truth of life's 
many sufferings and it is 'optimistic' in that it shows a final end of 
the problem of suffering - Nibbana, Enlightenment in this very life! 
Those who have achieved this ultimate peace are the inspiring examples 
who demonstrate once and for all that Buddhism is far from pessimistic, 
but it is a Path to true Happiness.</span></p><span data-dcnode-id="238" instrument_node="">
</span><h6 data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">3. The Middle Way or Eightfold Path</span></h6><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">The Way to end all suffering is called the Middle Way because it avoids 
the two extremes of sensual indulgence and self-mortification. Only 
when the body is in reasonable comfort but not over-indulged has the 
mind the clarity and strength to meditate deeply and discover the 
Truth. This Middle Way consists of the diligent cultivation of Virtue, 
Meditation and Wisdom, which is explained in more detail as the Noble 
Eightfold Path. </span></p><span data-dcnode-id="232" instrument_node="">
</span><ol data-dcnode-id="206"><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Right Understanding</span></li><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Right Thought</span></li><span data-dcnode-id="225" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Right Speech</span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Right Action</span></li><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Right Livelihood</span></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Right Effort</span></li><span data-dcnode-id="213" instrument_node="">
</span><li data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Right Mindfulness</span></li><span data-dcnode-id="210" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Right Concentration</span></li><span data-dcnode-id="207" instrument_node="">
</span></ol><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Right Speech, Action and Livelihood constitute the training in Virtue 
or Morality. For a practising Buddhist it consists of maintaining the 
five Buddhist Precepts, which are to refrain from: </span></p><span data-dcnode-id="202" instrument_node="">
</span><ol data-dcnode-id="190"><span data-dcnode-id="201" instrument_node="">
</span><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Deliberately causing the death of any living being; 
</span></li><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Intentionally taking for one's own the property of another; 
</span></li><li data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Sexual misconduct, in particular adultery; 
</span></li><li data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Lying and breaking promises; 
</span></li><li data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Drinking alcohol or taking stupefying drugs which lead to lack of 
mindfulness. 
</span></li></ol><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Right Effort, Mindfulness and Concentration refer to the practice of 
Meditation, which purifies the mind through the experience of blissful 
states of inner stillness and empowers the mind to penetrate the 
meaning of life through profound moments of insight.</span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Right Understanding and Thought are the manifestation of Buddha-Wisdom 
which ends all suffering, transforms the personality and produces 
unshakeable serenity and tireless compassion.</span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">According to the Buddha, without perfecting the practice of Virtue it 
is impossible to perfect Meditation, and without perfecting Meditation 
it is impossible to arrive at Enlightenment Wisdom. Thus the Buddhist 
Path is a Gradual Path, a Middle Way consisting of Virtue, Meditation 
and Wisdom as explained in the Noble Eightfold Path leading to 
happiness and liberation.</span></p><span data-dcnode-id="180" instrument_node="">
</span><h6 data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">4. Kamma</span></h6><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Kamma means 'action'. The Law of Kamma means that there are inescapable 
results of our actions. There are deeds of body, speech or mind that 
lead to others' harm, one's own harm, or to the harm of both. Such 
deeds are called bad (or 'unwholesome') kamma. They are usually 
motivated by greed, hatred or delusion. Because they bring painful 
results, they should not be done.</span></p><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">There are also deeds of body, speech or mind that lead to others' well 
being, one's own well being, or to the well being of both. Such deeds 
are called good (or 'wholesome') kamma. They are usually motivated by 
generosity, compassion or wisdom. Because they bring happy results, 
they should be done as often as possible.</span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Thus much of what one experiences is the result of one's own previous 
kamma. When misfortune occurs, instead of blaming someone else, one can 
look for any fault in one's own past conduct. If a fault is found, the 
experience of its consequences will make one more careful in the 
future. When happiness occurs, instead of taking it for granted, one 
can look to see if it is the result of good kamma. If so, the 
experience of its pleasant results will encourage more good kamma in 
the future.</span></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">The Buddha pointed out that no being whatsoever, divine or otherwise, 
has any power to stop the consequences of good and bad kamma. The fact 
that one reaps just what one sows gives to the Buddhist a greater 
incentive to avoid all forms of bad kamma while doing as much good 
kamma as possible.</span></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">Though one cannot escape the results of bad kamma, one can lessen their 
effect. A spoon of salt mixed in a glass of pure water makes the whole 
very salty, whereas the same spoon of salt mixed in a freshwater lake 
hardly changes the taste of the water. Similarly, the result of a bad 
kamma in a person habitually doing only a small amount of good kamma is 
painful indeed, whereas the result of the same bad kamma in a person 
habitually doing a great deal of good kamma is only mildly felt.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">This natural Law of Kamma becomes the force behind, and reason for, the 
practice of morality and compassion in our society.</span></p><span data-dcnode-id="159" instrument_node="">
</span><h6 data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">5. Rebirth</span></h6><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">The Buddha remembered clearly many of His past lives. Even today, many 
Buddhist monks, nuns and others also remember their past lives. Such a 
strong memory is a result of deep meditation. For those who remember 
their past life, Rebirth is an established fact which puts this life in 
a meaningful perspective.</span></p><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">The Law of Kamma can only be understood in the framework of many 
lifetimes, because it sometimes takes this long for Kamma to bear its 
fruit. Thus Kamma and Rebirth offer a plausible explanation to the 
obvious inequalities of birth; why some are born into great wealth 
whereas others are born into pathetic poverty; why some children enter 
this world healthy and full-limbed whereas others enter deformed and 
diseased... The fruits of bad Kamma are not regarded as a punishment 
for evil deeds but as lessons from which to learn, for example, how 
much better to learn about the need for generosity than to be reborn 
among the poor!</span></p><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Rebirth takes place not only within this human realm. The Buddha 
pointed out that the realm of human beings is but one among many. There 
are many separate heavenly realms and grim lower realms, too, realms of 
the animals and realms of the ghosts. Not only can human beings go to 
any of these realms in the next life, but we can come from any of these 
realms into our present life. This explains a common objection against 
Rebirth that argues "How can there be Rebirth when there are ten times 
as many people alive today than there were 50 years ago?" The answer is 
that people alive today have come from many different realms.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Understanding that we can come and go between these different realms, 
gives us more respect and compassion for the beings in these realms. It 
is unlikely, for example, that one would exploit animals when one has 
seen the link of Rebirth that connects them with us.</span></p><span data-dcnode-id="144" instrument_node="">
</span><h6 data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">6. No Creator God</span></h6><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">The Buddha pointed out that no God or priest nor any other kind of 
being has the power to interfere in the working out of someone else's 
Kamma. Buddhism, therefore, teaches the individual to take full 
responsibility for themselves. For example, if you want to be wealthy 
then be trustworthy, diligent and frugal, or if you want to live in a 
heaven realm then always be kind to others. There is no God to ask 
favours from, or to put it another way there is no corruption possible 
in the workings of Kamma.</span></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Do Buddhists believe that a Supreme Being created the universe? 
Buddhists would first ask which universe do you mean? This present 
universe, from the moment of the 'big bang' up to now, is but one among 
countless millions in Buddhist cosmology. The Buddha gave an estimate 
of the age of a single universe-cycle of around 37,000 million years, 
which is quite plausible when compared to modern astrophysics. After 
one universe- cycle ends another begins, again and again, according to 
impersonal law. A Creator God is redundant in this scheme.</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">No being is a Supreme Saviour, according to the Buddha, because whether 
God, human, animal or whatever, all are subject to the Law of Kamma. 
Even the Buddha had no power to save. He could only point out the Truth 
so that the wise could see it for themselves. Everyone must take 
responsibility for their own future well-being, and it is dangerous to 
give that responsibility to another.</span></p><span data-dcnode-id="132" instrument_node="">
</span><h6 data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">7. The Illusion of Soul</span></h6><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">The Buddha taught that there is no soul, no essential and permanent 
core to a living being. Instead, that which we call a 'living being', 
human or other, can be seen to be but a temporary coming together of 
many activities and parts - when complete it is called a 'living 
being', but after the parts separate and the activities cease it is not 
called a 'living being' anymore. Like an advanced computer assembled of 
many parts and activities, only when it is complete and performs 
coherent tasks is it called a 'computer', but after the parts are 
disconnected and the activities cease it is no longer called a 
'computer'. No essential permanent core can be found which we can truly 
call 'the computer', just so, no essential permanent core can be found 
which we can call 'the soul'.</span></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">Yet Rebirth still occurs without a soul. Consider this simile: on a 
Buddhist shrine one candle, burnt low, is about to expire. A monk takes 
a new candle and lights it from the old. The old candle dies, the new 
candle burns bright. What went across from the old candle to the new? 
There was a causal link but no thing went across! In the same way, 
there was a causal link between your previous life and your present 
life, but no soul has gone across.</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Indeed, the illusion of a soul is said by the Buddha to be the root 
cause of all human suffering. The illusion of 'soul' manifests as the 
'Ego'. The natural unstoppable function of the Ego is to control. Big 
Egos want to control the world, average Egos try to control their 
immediate surroundings of home, family and workplace, and almost all 
Egos strive to control what they take to be their own body and mind. 
Such control manifests as desire and aversion, it results in a lack of 
both inner peace and outer harmony. It is this Ego that seeks to 
acquire possessions, manipulate others and exploit the environment. Its 
aim is its own happiness but it invariably produces suffering. It 
craves for satisfaction but it experiences discontent. Such deep- 
rooted suffering cannot come to an end until one sees, through deep and 
powerful meditation, that the idea 'me and mine' is no more than a 
mirage.</span></p><span data-dcnode-id="120" instrument_node="">
</span><h4 data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Are rebirth and karma for real?</span></h4><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Is rebirth for real - either as a human or in one of the other realms? 
This is the question most Westerners ask as soon as they become 
interested in Buddhism. Karma (Pali: Kamma) - the law of cause and 
effect - operates across multiple lifetimes, but where's the proof that 
there is any life other than the current one?</span></p><span data-dcnode-id="114" instrument_node="">
</span><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">It's a complex subject and each tradition has its own explanation. It 
isn't uncommon for different teachers in the same tradition to have a 
different take on rebirth. One thing's for sure, there is no scientific 
proof of rebirth (yet). There are rational explanations, but they all 
rest on unprovable assumptions.</span></p><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="106"><span data-dcnode-id="110" instrument_node="">One way to approach the question of rebirth is suggested by Thanissaro 
Bhikkhu, who says, "You don't have to </span><i data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">believe</span></i><span data-dcnode-id="107" instrument_node=""> in rebirth, you 
just have to take it as a working hypothesis." Other teachers, such as 
Ajahn Summedho, have a similar view, that since we can never know what 
will happen after death, it makes sense to practise Dharma (Pali: 
Dhamma) and live this life in the best way possible.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Some well-known monks, Ajahn Brahm and P.A. Payutto among them, say 
that when meditators reach the third or fourth jhana (level of 
absorbtion) they are able to "read their past lives" as the Buddha did 
and experience the truth of rebirth. But this ability is by no means 
universal, even among meditation masters.</span></p><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Another explanation championed by Buddhadasa, Thailand's most revered 
monk, is that rebirth in a series of physical bodies is "conventional 
talk" to make the subject understandable for the masses, but in "Dharma 
talk" what the Buddha really meant was that each life was the arising 
of the ego in the mind. So we experience "death" and "rebirth" (of the 
ego) many times each day.</span></p><span data-dcnode-id="99" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">Similarly, the six realms of existence all correspond to states of 
mind. In the same way, the cause and effect of karma can be observed in 
our own mental states - when we do good deeds it results in a wholesome 
mental state, when we do bad deeds, we experience unwholesome mental 
states.</span></p><span data-dcnode-id="96" instrument_node="">
</span><p data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">This rational explanation of rebirth and karma doesn't necessarily 
exclude the traditional view. It augments it. What works for me is to 
take both of them as working hypotheses and practise accordingly. 
Recalling the Buddha's story about the man shot with a poisoned arrow, 
if we need to have every detail of the teaching proved to us at the 
outset, we'll be dead before we start practising.</span></p><span data-dcnode-id="93" instrument_node="">
</span><h4 data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">What is our purpose in life?</span></h4><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">The traditional answer to this is that our purpose is to attain nirvana 
and stop the endless cycle of rebirths and suffering. But the idea 
of a general purpose for mankind suggests that someone or something 
created that purpose, which in turn suggests an omnipotent deity.</span></p><span data-dcnode-id="87" instrument_node="">
</span><p data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">The way I think of it is that we have no pre-ordained purpose. We 
evolved, and here we are. Because we also evolved language and 
conceptual thinking, we got stuck with this concept of a self, an ego 
that makes us feel separate from everything else. The ego needs 
constant reassurance of its importance, which is why we cling to our 
views and defend them fanatically, and why we are constantly 
criticizing others. Our ego rules our lives. It is terrified of being 
snuffed out.</span></p><span data-dcnode-id="84" instrument_node="">
</span><p data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">We handle this in different ways. Some of us have lots of kids so we 
can feel that a part of us lives on forever through our descendants. 
Some of us perform heroic deeds so that our names will live on in 
history forever. Some of us get onto Ripley's Believe It Or Not with 
the world's longest moustache or beating the world record for smashing 
melons with our head, or some such nonsense, so that we'll achieve 
digital immortality. Some of us cling to the idea that a god will give 
us eternal life in some form after death.</span></p><span data-dcnode-id="81" instrument_node="">
</span><p data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">For those of us who don't find this pseudo-immortality or unguaranteed 
immortality satisfying, there's a need to create our own purpose in 
life. This is where Buddhism fits the bill nicely. Instead of being 
ruled by the ego and its fears, get rid of it! Being rid of the ego and 
the suffering it brings is what Ajahn Jagaro called "True Freedom" - a 
very appealing idea for all of us.</span></p><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">If we don't achieve true freedom in this life, we should get another 
chance in a future life. But simply diminishing the ego and increasing 
freedom in this life seems like a worthwhile purpose to me.</span></p><span data-dcnode-id="75" instrument_node="">
</span><h4 data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">How to become a Buddhist</span></h4><span data-dcnode-id="72" instrument_node="">
</span><p data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">Unlike the Abrahamic faiths, Buddhism has no conversion ceremony, and it is not necessary to 
renounce any other beliefs. There is the ceremony of taking the Three Refuges (the Buddha, 
the Dharma, and the Sangha), often performed along with a ceremony agreeing to keep the 5 precepts, but 
these are both optional. In fact, many Westerners prefer not to call themselves Buddhists at all.</span></p><span data-dcnode-id="69" instrument_node="">
</span><p data-dcnode-id="62"><span data-dcnode-id="68" instrument_node="">If you found this page useful or have any comments you can contact the author at
