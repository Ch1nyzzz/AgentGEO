</span><li data-dcnode-id="2663"><b data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Flower Garland </span></b><span data-dcnode-id="2676" instrument_node="">(Avataṃsaka Sūtra): Explains how reality appears to an enlightened being (such as a Bodhisattva).&nbsp; A compilation of teachings on topics such as the ten stages on the </span><b data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Bodhisattva path</span></b><span data-dcnode-id="2673" instrument_node="">, </span><b data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">phenomena </span></b><span data-dcnode-id="2670" instrument_node="">(dharmas), </span><b data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">meditation/mind only </span></b><span data-dcnode-id="2667" instrument_node="">(Vijñaptimatra), and </span><b data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">emptiness </span></b><span data-dcnode-id="2664" instrument_node="">(sunyata).&nbsp; It is the second-longest sutra in the Mahayana (40 chapters).&nbsp; It is said to record the higher teaching of the Buddha to Bodhisattvas and other high spiritual beings.&nbsp; Also referred to as the Flower Ornament Sutra, Flower Adornment Sutra, or Gandavyuha Sutra.</span></li><span data-dcnode-id="2662" instrument_node="">
</span><li data-dcnode-id="2634"><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Heart-Sutra.pdf" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Heart </span></b></a><span data-dcnode-id="2658" instrument_node="">(Prajñāpāramitā Hṛdaya Sūtra):&nbsp; Through the </span><b data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">perfection of insight and wisdom </span></b><span data-dcnode-id="2655" instrument_node="">(Prajñāpāramitā), the Bodhisattva is able to see the </span><b data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">emptiness </span></b><span data-dcnode-id="2652" instrument_node="">(sunyata) of all phenomena (dharmas) known through (and as) the </span><b data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Five Aggregates.&nbsp; &nbsp;</span></b><span data-dcnode-id="2648" style="font-size: 1.125rem;"><span data-dcnode-id="2649" instrument_node="">This is a Sūtra about wisdom (prajna).&nbsp; A great introduction to this Sūtra is </span></span><a data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/the-heart-sutra-450023" rel="noopener noreferrer" style="font-size: 1.125rem;" target="_blank"><span data-dcnode-id="2647" instrument_node="">by Barbara O’Brien</span></a><span data-dcnode-id="2644" style="font-size: 1.125rem;"><span data-dcnode-id="2645" instrument_node="">, and commentary can be found </span></span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tricycle.com/dharma-talk/heart-sutra" rel="noopener noreferrer" style="font-size: 1.125rem;" target="_blank"><span data-dcnode-id="2643" instrument_node="">on Tricycle magazine’s website</span></a><span data-dcnode-id="2640" style="font-size: 1.125rem;"><span data-dcnode-id="2641" instrument_node="">.&nbsp;&nbsp;</span></span><span data-dcnode-id="2638" style="font-size: 1.125rem;"><span data-dcnode-id="2639" instrument_node="">The </span></span><span data-dcnode-id="2637" instrument_node="">Heart Sūtra </span><span data-dcnode-id="2635" style="font-size: 1.125rem;"><span data-dcnode-id="2636" instrument_node="">is perhaps the most well known, and recited, among Buddhists, and is part of the Prajnaparamita group of sutras (the Diamond Sūtra is the other one).&nbsp;&nbsp;</span></span></li><span data-dcnode-id="2633" instrument_node="">
</span><li data-dcnode-id="2617"><b data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Jewel Heap </span></b><span data-dcnode-id="2630" instrument_node="">(Mahāratnakūṭa Sūtra): Collection of 49 texts of various lengths and topics such as: </span><b data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">wisdom </span></b><span data-dcnode-id="2627" instrument_node="">(prajñā), </span><b data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">illusion </span></b><span data-dcnode-id="2624" instrument_node="">(māyā), </span><b data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">skillful means </span></b><span data-dcnode-id="2621" instrument_node="">(upāya), and the </span><b data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Western Pure Land </span></b><span data-dcnode-id="2618" instrument_node="">(Sukhāvatī).&nbsp; This is one of the oldest sutras in the Vaipulya group of 49 independent sutras.&nbsp;&nbsp;</span></li><span data-dcnode-id="2616" instrument_node="">
</span><li data-dcnode-id="2600"><b data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Decent into Lanka </span></b><span data-dcnode-id="2613" instrument_node="">(Laṅkāvatāra Sūtra):&nbsp; &nbsp;Scriptural basis of the Yogacara and Chán/Zen schools on the doctrines of the </span><b data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">illusionary and empty nature of all phenomena</span></b><span data-dcnode-id="2610" instrument_node=""> </span><b data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">as manifestations of the mind</span></b><span data-dcnode-id="2607" instrument_node="">, that </span><b data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">consciousness is our only true reality</span></b><span data-dcnode-id="2604" instrument_node="">, culminating in the </span><b data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Tathāgatagarbha </span></b><span data-dcnode-id="2601" instrument_node="">(i.e., Buddha-nature).</span></li><span data-dcnode-id="2599" instrument_node="">
</span><li data-dcnode-id="2585"><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.english.fgs2.ca/sites/default/files/pdf/The%2520Lotus%2520Sutra.pdf" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Lotus </span></b></a><span data-dcnode-id="2595" instrument_node="">(Saddharmapuṇḍarīka Sūtra):&nbsp; &nbsp;Considered the sūtra of </span><b data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">skillful means </span></b><span data-dcnode-id="2592" instrument_node="">(upāya) providing a way for persons to readily achieve enlightenment, and stresses that every living being can achieve Buddhahood.&nbsp; &nbsp;</span><span data-dcnode-id="2590" style="font-size: 1.125rem;"><span data-dcnode-id="2591" instrument_node="">As one of the smallest and most popular Mahāyāna Sūtras, it has become almost a central text in some schools such as Nichiren.&nbsp; Many Buddhists (schools and practitioners) consider the Lotus Sūtra the final teaching of the Buddha that contains all that is needed for enlightenment (“salvation”) where all beings can become Buddhas.&nbsp; It is also considered the Sūtra of “upāya” or ‘skillful/expedient means’ meaning it provides a way for persons to achieve enlightenment more readily.&nbsp; This is also one of the oldest Mahāyāna Sūtras (believed to have been completed around 200 BCE).&nbsp; Theravāda monastic Bhikkhu Sujato </span></span><a data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fakebuddhaquotes.com/is-the-lotus-sutra-authentic-by-bhikkhu-sujato/" rel="noopener noreferrer" style="font-size: 1.125rem;" target="_blank"><span data-dcnode-id="2589" instrument_node="">believes it may even predate Mahāyāna&nbsp;</span></a><span data-dcnode-id="2586" style="font-size: 1.125rem;"><span data-dcnode-id="2587" instrument_node="">as it was likely worked on over a period of time and the earliest form of it was before Mahāyāna).</span></span></li><span data-dcnode-id="2584" instrument_node="">
</span><li data-dcnode-id="2571"><b data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Meditation </span></b><span data-dcnode-id="2581" instrument_node="">(Amitāyurdhyāna Sūtra):&nbsp; </span><b data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Meditations </span></b><span data-dcnode-id="2578" instrument_node="">and </span><b data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">visualization </span></b><span data-dcnode-id="2575" instrument_node="">of Amitabha Buddha’s </span><b data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Western Pure Land</span></b><span data-dcnode-id="2572" instrument_node=""> (Sukhāvatī).&nbsp; This is the third of the three sutras that make up the doctrinal basis of the Pure Land school (the other two are the shorter and longer Amitabha sutras).</span></li><span data-dcnode-id="2570" instrument_node="">
</span><li data-dcnode-id="2554"><b data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Ten Stages </span></b><span data-dcnode-id="2567" instrument_node="">(Daśabhūmika Sūtra):&nbsp; The Buddha describes the </span><b data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Ten Stages of Cultivation </span></b><span data-dcnode-id="2564" instrument_node="">for </span><b data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Bodhisattva’s </span></b><span data-dcnode-id="2561" instrument_node="">on their </span><b data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">path to full enlightenment </span></b><span data-dcnode-id="2558" instrument_node="">and </span><b data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Buddhahood</span></b><span data-dcnode-id="2555" instrument_node="">.</span></li><span data-dcnode-id="2553" instrument_node="">
</span><li data-dcnode-id="2534"><b data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Vimalakīrti </span></b><span data-dcnode-id="2550" instrument_node="">(Vimalakīrti Sūtra): Teachings on the doctrines of </span><b data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">non-duality </span></b><span data-dcnode-id="2547" instrument_node="">and </span><b data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">emptiness</span></b><span data-dcnode-id="2544" instrument_node="">.&nbsp; It explains the </span><b data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">illusionary nature of the world</span></b><span data-dcnode-id="2541" instrument_node="">, the </span><b data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">equality of women</span></b><span data-dcnode-id="2538" instrument_node="">, and the </span><b data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">enlightenment of laypersons</span></b><span data-dcnode-id="2535" instrument_node="">.</span></li><span data-dcnode-id="2533" instrument_node="">
</span></ol><span data-dcnode-id="2531" instrument_node="">
</span><figure aria-describedby="caption-attachment-9328" class="wp-caption alignnone" data-dcnode-id="2522" id="attachment_9328" style="width: 2000px"><img alt="Diamond Sutra frontispiece Or 8210 p2" class="alignnone size-full wp-image-9328 jetpack-lazy-image" data-dcnode-id="2530" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=792%2C651&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=300%2C247&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=1024%2C842&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=768%2C632&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=1536%2C1263&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="651" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg%3Fresize%3D792%252C651%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9328" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=792%2C651&amp;#038;ssl=1" alt="Diamond Sutra frontispiece Or 8210 p2" width="792" height="651" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=300%2C247&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=1024%2C842&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=768%2C632&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Diamond-Sutra-frontispiece-Or-8210-p2.jpg?resize=1536%2C1263&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2523" id="caption-attachment-9328"><span data-dcnode-id="2527" instrument_node="">This copy of the Diamond Sutra is one of the world’s earliest, dated, books. (Source: </span><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/collection-items/the-diamond-sutra" rel="noopener noreferrer" target="new"><span data-dcnode-id="2526" instrument_node="">British Museum</span></a><span data-dcnode-id="2524" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2517"><img alt="diamond-sutra-OR8210_P2_R_2" class="alignnone size-full wp-image-9327 jetpack-lazy-image" data-dcnode-id="2520" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=792%2C544&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=300%2C206&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=1024%2C703&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=768%2C528&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=1536%2C1055&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="544" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg%3Fresize%3D792%252C544%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9327" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=792%2C544&amp;#038;ssl=1" alt="diamond-sutra-OR8210_P2_R_2" width="792" height="544" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=300%2C206&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=1024%2C703&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=768%2C528&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/diamond-sutra-OR8210_P2_R_2.jpg?resize=1536%2C1055&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2516" instrument_node="">
</span><h3 data-dcnode-id="2511"><span data-dcnode-id="2515" instrument_node="">The </span><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Taishō </span></em><span data-dcnode-id="2512" instrument_node="">Edition of the Chinese Canon</span></h3><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2509" instrument_node="">While there are different editions of the Chinese Canon, the most used standardized version is the </span><em data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Taishō</span></em><span data-dcnode-id="2506" instrument_node=""> .&nbsp; It is an enormous collection of information, with a numbering structure and organization that does not fit into a typical “Tripitaka” structure.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node="">According to the </span><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//encyclopediaofbuddhism.org/wiki/Chinese_Buddhist_Canon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2502" instrument_node="">Encyclopedia of Buddhism</span></a><span data-dcnode-id="2500" instrument_node="">, the structure of the Taishō is more than just the traditional three sections that typically make up a Tripitaka.&nbsp; When the Taishō was being created, the different parts were made into separate ‘volumes’ / ‘sections’ / ‘divisions’.&nbsp;</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2497" instrument_node="">The </span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taish%25C5%258D_Tripi%25E1%25B9%25ADaka" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2496" instrument_node="">numbering structure of the&nbsp;</span><em data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Taishō </span></em></a><span data-dcnode-id="2492" instrument_node="">may be of more importance to scholars than to everyday laypersons (who will typically only work with parts of this edition anyways).</span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2482"><span data-dcnode-id="2489" instrument_node="">In the following simplified structure of the&nbsp;Taishō (this is </span><strong data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">not</span></strong><span data-dcnode-id="2486" instrument_node=""> the actual numbering structure, but a way I organized to help me understand it), the items/texts that can be considered part of a “Tripitaka” appear in </span><strong data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">bold</span></strong><span data-dcnode-id="2483" instrument_node=""> in the following list (I will also add which Tripitaka category in brackets before each one).&nbsp; Note that I am including various different sections/volumes under “Abhidharma”, however, there is an actual Abhidharma (#6 below).&nbsp; The early Chinese canons were in the Tripitaka structure, however as it grew (such as with the Taishō), various commentaries and analyses were included over the centuries.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><ol data-dcnode-id="2399"><span data-dcnode-id="2480" instrument_node="">
</span><li data-dcnode-id="2474"><strong data-dcnode-id="2475"><b data-dcnode-id="2476"><span data-dcnode-id="2478" style="color: #993300;"><span data-dcnode-id="2479" instrument_node="">[Sutra] </span></span><span data-dcnode-id="2477" instrument_node="">Āgamas</span></b></strong></li><span data-dcnode-id="2473" instrument_node="">
</span><li data-dcnode-id="2467"><strong data-dcnode-id="2468"><b data-dcnode-id="2470"><span data-dcnode-id="2471" style="color: #993300;"><span data-dcnode-id="2472" instrument_node="">[Sutra] Mahāyāna </span></span></b><span data-dcnode-id="2469" instrument_node="">sutras</span></strong></li><span data-dcnode-id="2466" instrument_node="">
</span><li data-dcnode-id="2460"><strong data-dcnode-id="2461"><b data-dcnode-id="2463"><span data-dcnode-id="2464" style="color: #993300;"><span data-dcnode-id="2465" instrument_node="">[Sutra] </span></span></b><span data-dcnode-id="2462" instrument_node="">Tantras</span></strong></li><span data-dcnode-id="2459" instrument_node="">
</span><li data-dcnode-id="2453"><strong data-dcnode-id="2454"><span data-dcnode-id="2456" style="color: #ff6600;"><b data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">[Vinaya] </span></b></span><span data-dcnode-id="2455" instrument_node="">Vinaya texts</span></strong></li><span data-dcnode-id="2452" instrument_node="">
</span><li data-dcnode-id="2444"><strong data-dcnode-id="2445"><b data-dcnode-id="2447"><span data-dcnode-id="2448" style="color: #993300;"><span data-dcnode-id="2450" style="color: #00ccff;"><span data-dcnode-id="2451" instrument_node="">[Abhidharma]</span></span><span data-dcnode-id="2449" instrument_node=""> </span></span></b><span data-dcnode-id="2446" instrument_node="">Translations of commentaries on the Agamas and Mahāyāna scriptures</span></strong></li><span data-dcnode-id="2443" instrument_node="">
</span><li data-dcnode-id="2430"><strong data-dcnode-id="2436"><b data-dcnode-id="2438"><span data-dcnode-id="2439" style="color: #993300;"><span data-dcnode-id="2441" style="color: #00ccff;"><span data-dcnode-id="2442" instrument_node="">[Abhidharma]</span></span><span data-dcnode-id="2440" instrument_node=""> </span></span></b><span data-dcnode-id="2437" instrument_node="">Abhidharma texts&nbsp;</span></strong><span data-dcnode-id="2435" instrument_node="">(translations of various early Abhidharma including the Sarvastivada Abhidharma from the Sarvastivadins (an early school of Buddhism), and various other parts of different Abdhidharmas from India).&nbsp; For comparison, the Pāḷi canon contains seven </span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shastra"><span data-dcnode-id="2434" instrument_node="">Shastras</span></a><span data-dcnode-id="2432" instrument_node=""> (Indian commentaries), while the Chinese Canon has a large collection from the Sarvastivada school.</span><sup class="reference" data-dcnode-id="2431" id="cite_ref-bn1_2-8"></sup></li><span data-dcnode-id="2429" instrument_node="">
</span><li data-dcnode-id="2421"><strong data-dcnode-id="2422"><b data-dcnode-id="2424"><span data-dcnode-id="2425" style="color: #993300;"><span data-dcnode-id="2427" style="color: #00ccff;"><span data-dcnode-id="2428" instrument_node="">[Abhidharma]</span></span><span data-dcnode-id="2426" instrument_node=""> </span></span></b><span data-dcnode-id="2423" instrument_node="">Translations of commentaries on&nbsp;Yogacara&nbsp;and&nbsp;Madhyamaka</span></strong></li><span data-dcnode-id="2420" instrument_node="">
</span><li data-dcnode-id="2410"><strong data-dcnode-id="2412"><span data-dcnode-id="2417" style="color: #00ccff;"><b data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">[Abhidharma] </span></b></span><span data-dcnode-id="2416" instrument_node="">Chinese commentaries on the sutras, Vinaya, and </span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shastra"><span data-dcnode-id="2415" instrument_node="">shastras</span></a><span data-dcnode-id="2413" instrument_node=""> </span></strong><span data-dcnode-id="2411" instrument_node="">(Indian commentaries)</span></li><span data-dcnode-id="2409" instrument_node="">
</span><li data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Chinese sectarian writings</span></li><span data-dcnode-id="2406" instrument_node="">
</span><li data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Histories and biographies</span></li><span data-dcnode-id="2403" instrument_node="">
</span><li data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Encyclopedias, dictionaries, non-Buddhist doctrines (Hindu, Manichean, and Nestorian Christian), and catalogs of various Chinese Canons</span></li><span data-dcnode-id="2400" instrument_node="">
</span></ol><span data-dcnode-id="2398" instrument_node="">
</span><h3 data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Short History of the Chinese Canon</span></h3><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">I have intentionally left off information about the early Buddhist councils, which you can read in the Pāḷi Canon section of this article.&nbsp; Chinese Buddhism developed, of course, within China.&nbsp; So it was not one of the early Buddhist schools of India.&nbsp; However, it developed as a result of monastics from those early Buddhist schools in India, as well as their scriptural canons.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><ol data-dcnode-id="2271"><span data-dcnode-id="2391" instrument_node="">
</span><li data-dcnode-id="2356"><span data-dcnode-id="2390" instrument_node="">The area that now is part of present-day Pakistan and Afghanistan was called </span><strong data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Gandhāra</span></strong><span data-dcnode-id="2387" instrument_node="">, and was a base of Buddhist culture according to Professor T H Barrett.
</span><ol data-dcnode-id="2358"><span data-dcnode-id="2386" instrument_node="">
</span><li data-dcnode-id="2381"><span data-dcnode-id="2385" instrument_node="">This is important because of Gandhāra’s proximity to China.&nbsp; </span><strong data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Beginning in the 2nd century CE, these texts began to come into China</span></strong><span data-dcnode-id="2382" instrument_node=""> (and likely other areas) and have a profound impact.&nbsp;</span></li><span data-dcnode-id="2380" instrument_node="">
</span><li data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">These texts were in what modern linguistics call “Gandhāri”, which was a local Indian language.&nbsp;</span></li><span data-dcnode-id="2377" instrument_node="">
</span><li data-dcnode-id="2360"><span data-dcnode-id="2376" instrument_node="">Over 1,000 years and well over 500 Buddhist works were </span><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">translated</span></strong><span data-dcnode-id="2373" instrument_node=""> from other languages (such as Gandhāri and Sanskrit) into Chinese which Barrett called “one of the most extensive and protracted translation enterprises in world history”.&nbsp;&nbsp;</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">
</span><figure aria-describedby="caption-attachment-9331" class="wp-caption aligncenter" data-dcnode-id="2362" id="attachment_9331" style="width: 730px"><img alt="" class="size-full wp-image-9331 jetpack-lazy-image" data-dcnode-id="2370" data-lazy-sizes="(max-width: 730px) 100vw, 730px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg?resize=730%2C660&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg?w=730&amp;ssl=1 730w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg?resize=300%2C271&amp;ssl=1 300w" data-recalc-dims="1" draggable="false" height="660" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg%3Fresize%3D730%252C660%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="730"><noscript data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-9331" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg?resize=730%2C660&amp;#038;ssl=1" alt="" width="730" height="660" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg?w=730&amp;amp;ssl=1 730w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/gandharan-buddhist-scroll-f30v.jpg?resize=300%2C271&amp;amp;ssl=1 300w" sizes="(max-width: 730px) 100vw, 730px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2363" id="caption-attachment-9331"><span data-dcnode-id="2367" instrument_node="">The twenty-nine birch bark scrolls from the ancient region of Gandhāra (extending in present day northern Pakistan and Afghanistan) are among the oldest surviving Buddhist manuscripts. They are in Gāndhārī in the Kharoṣṭhī script. Gāndhārī is a language related to Sanskrit and Pāli which was used in the area from the 3rd century BCE to the 5th century CE. Written in black ink with a reed pen, the scrolls are made of sections of bark glued together to form long strips. (Source: </span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/collection-items/gandharan-scrolls" rel="noopener noreferrer" target="new"><span data-dcnode-id="2366" instrument_node="">British Library</span></a><span data-dcnode-id="2364" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="2361" instrument_node="">
</span></li><span data-dcnode-id="2359" instrument_node="">
</span></ol><span data-dcnode-id="2357" instrument_node="">
</span></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2341"><span data-dcnode-id="2354" instrument_node="">Buddhism originally comes into China originally thanks to two</span><strong data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node=""> missionary Buddhist monks</span></strong><span data-dcnode-id="2351" instrument_node=""> (named </span><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Dharmaratna</span></strong><span data-dcnode-id="2348" instrument_node=""> and </span><strong data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Kaśyapa Mātaṅga</span></strong><span data-dcnode-id="2345" instrument_node=""> during the Han Dynasty), and subsequently by other monks such as </span><strong data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Kumārajīva</span></strong><span data-dcnode-id="2342" instrument_node=""> (344-413) who was regarded as a great translator of Buddhist scriptures from Sanskrit into Chinese.&nbsp; He was a Kuchean who understood Chinese so well, that his accuracy and readability of translating the scripture was invaluable.&nbsp;&nbsp;</span></li><span data-dcnode-id="2340" instrument_node="">
</span><li data-dcnode-id="2328"><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Faxian</span></strong><span data-dcnode-id="2337" instrument_node=""> (337-422), along with nine other monks, travelled to ancient India to acquire Buddhist scriptures between 399 and 412 AD.&nbsp; He spent the rest of his life translating the works that would help shape the Chinese Canon.&nbsp; His journey helped another monk, Xuanzang, in his journey to learn and collect more scriptures for the Chinese Canon.&nbsp;</span><br data-dcnode-id="2336"><img alt="" class="aligncenter size-large wp-image-10511 jetpack-lazy-image" data-dcnode-id="2335" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=792%2C591&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=1024%2C764&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=300%2C224&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=768%2C573&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?w=1280&amp;ssl=1 1280w" data-recalc-dims="1" draggable="false" height="591" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg%3Fresize%3D792%252C591%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-10511" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=792%2C591&amp;#038;ssl=1" alt="" width="792" height="591" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=1024%2C764&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=300%2C224&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?resize=768%2C573&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/1280px-BEAL1869_FAH-HIANS_ROUTE_THROUGH_INDIA_AND_TARTARY.jpg?w=1280&amp;amp;ssl=1 1280w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><span data-dcnode-id="2332" instrument_node=""> </span><img alt="" class="aligncenter size-large wp-image-10512 jetpack-lazy-image" data-dcnode-id="2331" data-lazy-sizes="(max-width: 665px) 100vw, 665px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=665%2C1024&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=665%2C1024&amp;ssl=1 665w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=195%2C300&amp;ssl=1 195w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=768%2C1183&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?w=800&amp;ssl=1 800w" data-recalc-dims="1" draggable="false" height="1024" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg%3Fresize%3D665%252C1024%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="665"><noscript data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-10512" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=665%2C1024&amp;#038;ssl=1" alt="" width="665" height="1024" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=665%2C1024&amp;amp;ssl=1 665w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=195%2C300&amp;amp;ssl=1 195w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?resize=768%2C1183&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Fa_Hien_at_the_ruins_of_Ashoka_palace.jpg?w=800&amp;amp;ssl=1 800w" sizes="(max-width: 665px) 100vw, 665px" data-recalc-dims="1" /&gt;</span></noscript></li><span data-dcnode-id="2327" instrument_node="">
</span><li data-dcnode-id="2310"><span data-dcnode-id="2326" instrument_node="">During the Tang Dynasty, the monk </span><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Xuanzang</span></strong><span data-dcnode-id="2323" instrument_node=""> (602-664) left for India on a journey that ended up lasting 17 years.&nbsp; &nbsp;While in India, he was able to learn from Buddhist monks there, and collect over 600 sutras/Tripitakas written in Sanskrit which he brought back with him to China.&nbsp; The emperor (During the Tang Dynasty) was fully supportive and commissioned him and his team in translating the Buddhist teachings into Chinese.&nbsp; </span><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/programmes/b06yglnh" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2322" instrument_node="">He continued to communicate with monastics in India throughout his life</span></a><span data-dcnode-id="2320" instrument_node="">, and while mostly unknown to Westerners, his letters contain an insightful and important history of how this canon came to be.</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">
</span><figure aria-describedby="caption-attachment-9392" class="wp-caption aligncenter" data-dcnode-id="2312" id="attachment_9392" style="width: 458px"><img alt="" class="size-large wp-image-9392 jetpack-lazy-image" data-dcnode-id="2317" data-lazy-sizes="(max-width: 458px) 100vw, 458px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=458%2C1024&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=458%2C1024&amp;ssl=1 458w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=134%2C300&amp;ssl=1 134w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=768%2C1717&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=687%2C1536&amp;ssl=1 687w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?w=800&amp;ssl=1 800w" data-recalc-dims="1" draggable="false" height="1024" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg%3Fresize%3D458%252C1024%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="458"><noscript data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">&lt;img loading="lazy" class="size-large wp-image-9392" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=458%2C1024&amp;#038;ssl=1" alt="" width="458" height="1024" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=458%2C1024&amp;amp;ssl=1 458w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=134%2C300&amp;amp;ssl=1 134w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=768%2C1717&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?resize=687%2C1536&amp;amp;ssl=1 687w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Xuanzang_w.jpg?w=800&amp;amp;ssl=1 800w" sizes="(max-width: 458px) 100vw, 458px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2313" id="caption-attachment-9392"><span data-dcnode-id="2314" instrument_node="">Xuanzang (Public Domain)</span></figcaption></figure><span data-dcnode-id="2311" instrument_node="">
</span></li><span data-dcnode-id="2309" instrument_node="">
</span><li data-dcnode-id="2301"><span data-dcnode-id="2308" instrument_node="">In the 10th century, the Chinese government </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/sacred-texts/articles/translation-and-transmission-of-buddhism" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2307" instrument_node="">created</span></a><span data-dcnode-id="2305" instrument_node=""> a</span><strong data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node=""> translation bureau</span></strong><span data-dcnode-id="2302" instrument_node=""> but eventually did not have enough Chinese monks with a good knowledge of Sanskrit.&nbsp; Eventually, bilingual glossaries and other references were used to help with translation and study.&nbsp; Regular travel between China/East Asia and India resumed in the 19th century.</span></li><span data-dcnode-id="2300" instrument_node="">
</span><li data-dcnode-id="2290"><a data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.kenyon.edu/Depts/Religion/Fac/Adler/Reln260/Buddhist%2520Canons.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2299" instrument_node="">According to Richard H. Robinson and Willard L Johnson</span></a><span data-dcnode-id="2297" instrument_node="">, The </span><strong data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">first printed edition of the Chinese Canon</span></strong><span data-dcnode-id="2294" instrument_node=""> was in 972-983 CE was the Shu-pen or Szechuan edition, and consisted of 1,076 texts in 480 cases.&nbsp; There have been </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lapislazulitexts.com/articles/chinese-buddhist-canons" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2293" instrument_node="">several editions of the Canon since</span></a><span data-dcnode-id="2291" instrument_node="">, including geographic-based editions such as the Tripitaka Koreana (Korea). However, the current standard edition is known as the Taishō edition (sometimes referred to as the Taishō Tripitaka).&nbsp;&nbsp;The project for the Taishō started in 1924 in Japan and was completed in 1934.&nbsp; It consists of 55 volumes, containing 2,184 texts, along with a supplement of 45 volumes.&nbsp;&nbsp;Most online versions and translated versions of the Chinese Canon are of the Taishō.</span></li><span data-dcnode-id="2289" instrument_node="">
</span><li data-dcnode-id="2284"><span data-dcnode-id="2288" instrument_node="">As the Chinese Canon moved outside of China (and untranslated),</span><strong data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node=""> “literacy”</span></strong><span data-dcnode-id="2285" instrument_node=""> was defined as understanding Chinese writing.&nbsp; Therefore, many laypersons were “illiterate” and could not read Buddhist teachings (due to it being written in Chinese and transmitted that way).&nbsp; For a long time, this was how the teachings were transmitted, and likely were accessible only by monastics and educated individuals who understood Chinese writing.&nbsp; This is what eventually formed the translation of the Chinese Canon in these countries (as described above) into canons such as the Tripitaka Koreana, Taishō, and others.&nbsp; You can see a picture of scripture using images at the bottom of this section that helped laypersons recite sutras.</span></li><span data-dcnode-id="2283" instrument_node="">
</span><li data-dcnode-id="2279"><strong data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Copying the canonical texts by hand</span></strong><span data-dcnode-id="2280" instrument_node=""> was the norm in East Asian Buddhism.&nbsp; According to Professor T H Barrett, in medieval Japan, they found that portioning out this task to ten thousand people (or more) could complete the task in a single day!&nbsp; This was also one of the origins of practicing hand-copying the scriptures in order to gain karmic merit.</span></li><span data-dcnode-id="2278" instrument_node="">
</span><li data-dcnode-id="2273"><span data-dcnode-id="2277" instrument_node="">Eventually, </span><strong data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">printing helped the spread of Buddhism</span></strong><span data-dcnode-id="2274" instrument_node="">.&nbsp; In the 10th century the first canon was carved on woodblocks in Szechuan, China, and eventually moved to the capital to create new sets when needed.&nbsp; Woodblock printing also was springing up in other countries as a way to make copies of the canon without having to resort to the laborious practice of hand-copying.</span></li><span data-dcnode-id="2272" instrument_node="">
</span></ol><span data-dcnode-id="2270" instrument_node="">
</span><figure aria-describedby="caption-attachment-9361" class="wp-caption alignnone" data-dcnode-id="2261" id="attachment_9361" style="width: 2000px"><img alt="orb_30_885_foldout" class="alignnone size-full wp-image-9361 jetpack-lazy-image" data-dcnode-id="2269" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=792%2C254&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=300%2C96&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=1024%2C329&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=768%2C247&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=1536%2C493&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="254" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg%3Fresize%3D792%252C254%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9361" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=792%2C254&amp;#038;ssl=1" alt="orb_30_885_foldout" width="792" height="254" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=300%2C96&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=1024%2C329&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=768%2C247&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/orb_30_885_foldout.jpg?resize=1536%2C493&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2262" id="caption-attachment-9361"><span data-dcnode-id="2266" instrument_node="">This small, folding book contains the text of the Heart Sūtra (in Sanskrit Prajñāpāramitāhṛdaya) represented in pictures and was intended to allow illiterate people to recite this popular Buddhist sūtra. The repeated chanting of texts is an important part of Buddhist devotion and is believed to be a way of acquiring religious merit. However, to be able to read a Buddhist text written in Chinese script, which was also used in Japan and Korea, requires a knowledge of many thousands of individual characters. In earlier times, when rates of literacy were much lower, this type of illustrated sūtra – known popularly as Mekura-kyō or Monmō-kyō (literally ‘Sūtras for the Illiterate’) – was a way to provide people who were unable to read with a way to gain the merit derived from chanting the texts. Mekura-kyō work on a rebus principle, whereby the sounds of the Chinese characters are represented by pictures of everyday objects that have the same pronunciation. By reading out the sounds of the images, the worshipper is able to repeat the text of the sūtra. An English example would be to represent the word ‘belief’ with a picture of a bee and a leaf. (Source: </span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/collection-items/sutra-for-the-illiterate" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2265" instrument_node="">British Library</span></a><span data-dcnode-id="2263" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="2260" instrument_node="">
</span><h2 data-dcnode-id="2255"><span class="ez-toc-section" data-dcnode-id="2259" id="The_Tibetan_Canon_Tibetan_Buddhism"></span><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">The Tibetan Canon (Tibetan Buddhism)</span></strong><span class="ez-toc-section-end" data-dcnode-id="2256"></span></h2><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">The Tibetan Canon is the canon of Buddhism used in the central-Asian countries of Tibet, Bhutan, the Himalayas, and Mongolia.</span></p><span data-dcnode-id="2251" instrument_node="">
</span><figure aria-describedby="caption-attachment-8309" class="wp-caption aligncenter" data-dcnode-id="2241" id="attachment_8309" style="width: 800px"><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alanpeto.com/buddhism/buddhist-scriptures/attachment/800px-classroom_lessons/" rel="attachment wp-att-8309"><img alt="" class="size-full wp-image-8309 jetpack-lazy-image" data-dcnode-id="2250" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?resize=792%2C528&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?w=800&amp;ssl=1 800w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?resize=768%2C512&amp;ssl=1 768w" data-recalc-dims="1" draggable="false" height="528" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg%3Fresize%3D792%252C528%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-8309" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?resize=792%2C528&amp;#038;ssl=1" alt="" width="792" height="528" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?w=800&amp;amp;ssl=1 800w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/800px-Classroom_lessons.jpg?resize=768%2C512&amp;amp;ssl=1 768w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="2242" id="caption-attachment-8309"><span data-dcnode-id="2246" instrument_node="">Photo by Ailiajameel [CC BY-SA 4.0 (</span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow"><span data-dcnode-id="2245" instrument_node="">https://creativecommons.org/licenses/by-sa/4.0</span></a><span data-dcnode-id="2243" instrument_node="">)]</span></figcaption></figure><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" style="font-size: 1.125rem;"><em data-dcnode-id="2239"></em></span></p><div class="zilla-alert yellow" data-dcnode-id="2232"><em data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node=""> This section is still under development.&nbsp; Send me a message if you have any feedback!</span></em><span data-dcnode-id="2233" style="font-size: 1.125rem;"><em data-dcnode-id="2234"></em></span></div><p data-dcnode-id="2231"></p><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2229" instrument_node="">In addition to the </span><span data-dcnode-id="2227" style="font-size: 1.125rem;"><span data-dcnode-id="2228" instrument_node="">Pāli </span></span><span data-dcnode-id="2226" instrument_node="">Canon and Chinese Canon, Tibetan Buddhism as their own scriptural canon.&nbsp; Although Tibetan Buddhism is a form of Mahāyāna, their Canon is not an edition of the Chinese Canon (although some of the Chinese Canon found its way into their canon).&nbsp;</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">It was written in Tibet mostly from translations of various scripture that originated in India, to include Mahāyāna texts (although the Chinese Canon and Tibetan Canon do not always include the same Mahāyāna texts).</span></p><span data-dcnode-id="2221" instrument_node="">
</span><ul data-dcnode-id="2188"><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2197"><span data-dcnode-id="2219" instrument_node="">There are </span><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">two parts to this Canon</span></strong><span data-dcnode-id="2216" instrument_node=""> (which may also be used to refer to the Tibetan Canon itself) which are the&nbsp;</span><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Kangyur</span></strong><span data-dcnode-id="2213" instrument_node=""> (“Translation of the Words of the Buddha”) and </span><strong data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Tengyur</span></strong><span data-dcnode-id="2210" instrument_node=""> (“Translations of the Teachings”)
</span><ol data-dcnode-id="2199"><span data-dcnode-id="2209" instrument_node="">
</span><li data-dcnode-id="2204"><span data-dcnode-id="2208" instrument_node="">Bka’-‘gyur (Kangyur/Kanjur) contains different volumes and sections based on the edition.&nbsp; The Narthang version contains a Vinaya (13 volumes), Sutra (30 volumes), and 55 other volumes.&nbsp; </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.istb.univie.ac.at/kanjur/rktsneu/sigla/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2207" instrument_node="">There are several different versions of the Kangyr</span></a><span data-dcnode-id="2205" instrument_node="">.</span></li><span data-dcnode-id="2203" instrument_node="">
</span><li data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Bstan-‘gyur (Tengyur/Tenjur) contains (in the Peking edition) 224 volumes and 3,626 texts.&nbsp; Among them are the commentaries on the Sutras and the Abhidharma.</span></li><span data-dcnode-id="2200" instrument_node="">
</span></ol><span data-dcnode-id="2198" instrument_node="">
</span></li><span data-dcnode-id="2196" instrument_node="">
</span><li data-dcnode-id="2190"><strong data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Tibetan Book of the Dead (Bardo Thodol):</span></strong><span data-dcnode-id="2193" instrument_node="">&nbsp; Although not part of the Tibetan Canon, it is perhaps the most well known (or at least the title is known by everyday people). &nbsp;This book explains the stages of death, specifically from the Tibetan Buddhism viewpoint, and was a very popular work that was created during the medieval period (which is why it is not in the Tibetan Canon). The Bardo Thodol explains the experiences of a person as they are dying, the moment of death, and for 49 days afterward. Also included are practices that are to be taken after the person has died. It was originally written by Yeshe Tsogyak, the primary student of Padmasambhava, in the 8th century. &nbsp;Interestingly enough, the title “book of the dead” is not an accurate title and was named this due to a Western misunderstanding. &nbsp;You can find more information here: &nbsp;</span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.buddhanet.net/deathtib.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2192" instrument_node="">http://www.buddhanet.net/deathtib.htm</span></a></li><span data-dcnode-id="2189" instrument_node="">
</span></ul><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2186" instrument_node="">The Tibetan Canon also contains Vajrayana texts.&nbsp; Professor TH Barrett </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/sacred-texts/articles/the-buddhist-canon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2185" instrument_node="">explains</span></a><span data-dcnode-id="2183" instrument_node="">:</span></p><span data-dcnode-id="2181" instrument_node="">
</span><blockquote data-dcnode-id="2170"><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">Vajrayana texts draw on the ideas of Māhāyana but present them through meditation practices and visually startling art that often seems to negate basic Buddhist values, though in fact they depend on trust in a teacher (the term&nbsp;</span><em data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">guru&nbsp;</span></em><span data-dcnode-id="2176" instrument_node="">is used) to give the true meaning of their scripture (the term used is&nbsp;</span><em data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">tantra</span></em><span data-dcnode-id="2173" instrument_node="">) to those who are initiated into their practices. Vajrayana is said to provide a more direct route to enlightenment, but since it is open to misunderstanding by the uninitiated it is sometimes called ‘esoteric’.</span></p><span data-dcnode-id="2171" instrument_node="">
</span></blockquote><span data-dcnode-id="2169" instrument_node="">
</span><figure aria-describedby="caption-attachment-9343" class="wp-caption alignnone" data-dcnode-id="2163" id="attachment_9343" style="width: 2000px"><img alt="Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av" class="alignnone size-full wp-image-9343 jetpack-lazy-image" data-dcnode-id="2168" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=792%2C449&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=300%2C170&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=1024%2C581&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=768%2C436&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=1536%2C872&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="449" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg%3Fresize%3D792%252C449%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9343" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=792%2C449&amp;#038;ssl=1" alt="Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av" width="792" height="449" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=300%2C170&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=1024%2C581&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=768%2C436&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f001av.jpg?resize=1536%2C872&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2164" id="caption-attachment-9343"><span data-dcnode-id="2165" instrument_node="">The volume displayed here is the result of such a project which was completed in 1712 at the south-western Tibetan monastery of Shelkar. A text accompanying the Kanjur lists the names of eighteen sponsors, ten monks from the monastery who acted as editors, six people who provided the paper, and eight calligraphers who came from Nyemo, a monastery in central Tibet whose monks were famous for their calligraphic skills. This volume contains the Fortunate Aeon Sūtra, a text which is traditionally always the first in the sūtra section of the Kanjur. (Source: British Library)</span></figcaption></figure><span data-dcnode-id="2162" instrument_node="">
</span><figure aria-describedby="caption-attachment-9342" class="wp-caption alignnone" data-dcnode-id="2156" id="attachment_9342" style="width: 2000px"><img alt="Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r" class="alignnone size-full wp-image-9342 jetpack-lazy-image" data-dcnode-id="2161" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=792%2C308&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=300%2C117&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=1024%2C399&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=768%2C299&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=1536%2C598&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="308" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg%3Fresize%3D792%252C308%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9342" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=792%2C308&amp;#038;ssl=1" alt="Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r" width="792" height="308" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=300%2C117&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=1024%2C399&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=768%2C299&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Volume-of-the-Shelkar-Kanjur-or_6724_mod_1_f003r.jpg?resize=1536%2C598&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2157" id="caption-attachment-9342"><span data-dcnode-id="2158" instrument_node="">Inner text of the Kanjur. (Source: British Library)</span></figcaption></figure><span data-dcnode-id="2155" instrument_node="">
</span><h2 data-dcnode-id="2150"><span class="ez-toc-section" data-dcnode-id="2154" id="Which_One_is_the_Best_or_Real_Buddhist_Canon"></span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Which One is the Best (or Real) Buddhist Canon?</span></strong><span class="ez-toc-section-end" data-dcnode-id="2151"></span></h2><span data-dcnode-id="2149" instrument_node="">
</span><blockquote data-dcnode-id="2144"><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">To mold a new, critical and comprehensive system, based on the Chinese Tripitaka, the Theravada teaching of Ceylon, and selected components of the Tibetan canon, should be the objective of the writing of a history of Indian Buddhism.&nbsp; ~ Venerable Tai Hsu</span></p><span data-dcnode-id="2145" instrument_node="">
</span></blockquote><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2142" instrument_node="">I hoped you enjoyed learning more about the amazing, and extensive,&nbsp; world of Buddhist scripture.&nbsp; One of the main things I wanted to leave you with is a greater understanding of the scriptural canons of the three main schools, and how they were developed and came from the same home.&nbsp; Also, we should find common ground and understanding between the schools of Buddhism, and their scriptural canons.&nbsp; </span><strong data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">We should not be thinking of which one is “better”, but how they can help us in our path towards </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alanpeto.com/buddhism/understanding-enlightenment/"><span data-dcnode-id="2140" instrument_node="">awakening</span></a><span data-dcnode-id="2138" instrument_node="">.</span></strong></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2134" instrument_node="">We must also understand that the scripture is not a </span><em data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">perfect </span></em><span data-dcnode-id="2131" instrument_node="">historical record of what the Buddha said.&nbsp; We can’t go back and ask the Buddha if he&nbsp;</span><em data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">really</span></em><span data-dcnode-id="2128" instrument_node=""> said any of this.&nbsp; We instead put our faith in the monastic community who, for centuries, orally recited the scripture until the effort to write it down began.&nbsp; Yet, as much as Buddhist scripture is important and revered, it was the result of human efforts and we must take that into consideration.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">Bodhipaksa, author of the book “</span><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Yq61IZ" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2124" instrument_node="">I Can’t Believe It’s Not Buddha!</span></a><span data-dcnode-id="2122" instrument_node="">” and the website Fake Buddha Quotes (which helps dispel fake Buddha quotes spread on the internet), talked about the accuracy of Buddhist scripture in general which will relate to both canons:</span></p><span data-dcnode-id="2120" instrument_node="">
</span><blockquote data-dcnode-id="2115"><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">There’s no guarantee that any given verse in the Buddhist scriptures was actually spoken by the Buddha. There was inevitably some editing of the teachings as they were passed on by word of mouth from generation to generation, and there’s also evidence of tampering by monks who were pushing particular agendas. But we can safely assume that most of the early scriptures that have been passed down do reflect the kinds of things the Buddha said, if not in his exactly words. And some — possibly a lot — may consist of pretty much exact quotes.</span></p><span data-dcnode-id="2116" instrument_node="">
</span></blockquote><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2113" instrument_node="">When it comes to the (seemingly) never-ending debate about the </span><span data-dcnode-id="2111" style="font-size: 1.125rem;"><span data-dcnode-id="2112" instrument_node="">Pāli </span></span><span data-dcnode-id="2110" instrument_node="">and Chinese Canons, we need to understand how they have the same common doctrine and are </span><span data-dcnode-id="2108" style="text-decoration: underline;"><span data-dcnode-id="2109" instrument_node="">both</span></span><span data-dcnode-id="2107" instrument_node=""> Buddhist.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2098"><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/santipada/whatthebuddhareallytaught" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2104" instrument_node="">According to Bhikkhu Sujato </span></a><span data-dcnode-id="2102" instrument_node="">&nbsp;(A Theravāda Thai Forrest monk), both Canons are very similar (Nikayas refer to the Suttas in the </span><span data-dcnode-id="2100" style="font-size: 1.125rem;"><span data-dcnode-id="2101" instrument_node="">Pāli </span></span><span data-dcnode-id="2099" instrument_node="">Canon, and Agamas refer to the Sutras in the Chinese Canon):</span></p><span data-dcnode-id="2097" instrument_node="">
</span><blockquote data-dcnode-id="2089"><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">It is easy to forget that, in our times, the reason why the Nikāyas carry such prestige is largely due to the discovery that they are very similar to corresponding collections of sutras found in Chinese translation. The logic is powerful: the Southern (Theravāda) school and the Northern (Chinese) schools have been separated by vast distances, with only occasional contacts over the past 2000 years. Even before that, within India herself, the schools had separated and passed down distinct versions of their canonical scriptures. Yet despite this separation, their root canonical scriptures are doctrinally almost identical.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">These conclusions were arrived at by the early generations of cross-cultural Buddhist scholars, both Western and Eastern. Their findings gave strong impetus to the authority of the Pali Nikāyas and Chinese Āgamas and the importance of studying these collections on comparative basis. These findings have been taken to heart in modern Buddhist studies especially in Taiwan and Japan. However in the English speaking world, the Chinese Āgamas have been comparatively neglected. This seems to be due to a number of factors, not least the practical difficulty of learning to read Chinese.</span></p><span data-dcnode-id="2090" instrument_node="">
</span></blockquote><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">In his article, he referenced some of the analysis of both Canons that have been done showing they are almost identical:</span></p><span data-dcnode-id="2085" instrument_node="">
</span><blockquote data-dcnode-id="2075"><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2082" lang="EN-GB"><span data-dcnode-id="2083" instrument_node="">These studies have largely confirmed Beal’s initial hypothesis – the Chinese Ᾱgamas and the Pali Nikāyas are virtually identical in doctrine. They are two varying recensions of the same set of texts. These texts – popularly referred to simply as ‘the Suttas</span></span><span data-dcnode-id="2080" lang="EN-GB"><span data-dcnode-id="2081" instrument_node="">’ – were assembled by the first generations of the Buddha’s followers, before the period of sectarian divisions. They are pre-sectarian Buddhism</span></span><span data-dcnode-id="2078" lang="EN-GB"><span data-dcnode-id="2079" instrument_node="">.</span></span></p><span data-dcnode-id="2076" instrument_node="">
</span></blockquote><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2073" instrument_node="">Near the end of his article, he wrote this which I think really summarizes why this is all so important (remember, the Buddha’s sermons/teachings are called the Agamas in the Chinese Canon, and Nikayas in the </span><span data-dcnode-id="2071" style="font-size: 1.125rem;"><span data-dcnode-id="2072" instrument_node="">Pāli </span></span><span data-dcnode-id="2070" instrument_node="">Canon):</span></p><span data-dcnode-id="2068" instrument_node="">
</span><blockquote data-dcnode-id="2063"><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Perhaps another reason for the relative neglect of the Āgamas is their very closeness to the Nikāyas. We have to go to a lot of effort to discover what we think we know already: the core Buddhist teachings really are the four noble truths, the eightfold path, dependent origination, and so on. Although there are occasional instructive variations, the main fruit of this study is not in the content of the teaching, but in the method. Rather than assuming that the scriptures of just one school are the first and last word on what the Buddha taught, we are searching in the root teachings shared in common between the schools. Such an approach will not only help us to get ‘back to the Buddha’, but it will provide the best platform for an improved understanding between the Buddhist schools we find alive today.</span></p><span data-dcnode-id="2064" instrument_node="">
</span></blockquote><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">Additionally, </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2pFSP36" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2060" instrument_node="">Ven. Thich Nhat Hanh stated</span></a><span data-dcnode-id="2058" instrument_node=""> that we can benefit from these two Canons because the Southern (Theravāda) and Northern (Mahāyāna) canons were able to capture different (or additional) teachings better than the other.&nbsp; In this way, we have the unique benefit of being able to learn and compare both!</span></p><span data-dcnode-id="2056" instrument_node="">
</span><blockquote data-dcnode-id="2051"><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">By comparing the two extant sutra recensions, we can see which teachings must have preceded Buddhism’s dividing into schools.&nbsp; When the sutras of both transmissions are the same, we can conclude that what they say must have been there before the division.&nbsp; When the recensions are different, we can surmise that one or both might be incorrect.&nbsp; The Northern transmission preserved some discourses better, and the Southern transmission preserved others better.&nbsp; That is the advantage of having two transmissions to compare.</span></p><span data-dcnode-id="2052" instrument_node="">
</span></blockquote><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2049" instrument_node="">To go a little further on, and to reinforce that point,&nbsp;</span><em data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Bhikshu Kongmu</span></em><span data-dcnode-id="2046" instrument_node=""> </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kongmu.wordpress.com/2013/03/07/new-english-samyukta-agama-translation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2045" instrument_node="">said</span></a><span data-dcnode-id="2043" instrument_node="">:</span></p><span data-dcnode-id="2041" instrument_node="">
</span><blockquote data-dcnode-id="2036"><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">I bring this up here mostly to make the point that, if one truly wants to understand so-called “Early Buddhism”, comparative studies between the Pali and Chinese sources (along with whatever Sanskrit fragments and Tibetan parallels) is really the most complete method for doing so. Otherwise, by solely relying upon, say, the Pali Canon, we indadvertedly get only one Early Buddhist School’s inheritance and neglect the rich sources found presently in translation or in fragments of Indian languages.</span></p><span data-dcnode-id="2037" instrument_node="">
