sl=1 2376w" width="792"><noscript data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">&lt;img loading="lazy" class="wp-image-8526 size-full" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?resize=792%2C612&amp;#038;ssl=1" alt="" width="792" height="612" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?w=3300&amp;amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?resize=300%2C232&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?resize=1024%2C791&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?resize=768%2C593&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?resize=1536%2C1187&amp;amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?resize=2048%2C1583&amp;amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-The-Buddhist-Canons-2019-by-Alan-Peto.jpg?w=2376&amp;amp;ssl=1 2376w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="4654" id="caption-attachment-8526"><span data-dcnode-id="4672" instrument_node="">Zoom in to view the graphic, hover over image to find social media share buttons, and&nbsp;</span><a data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gumroad.com/l/BuddhismGraphics" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4671" instrument_node="">click the image if you wish to donate and get a printable PDF version</span></a><span data-dcnode-id="4669" instrument_node="">.&nbsp; To view/share on&nbsp;</span><a data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/204491639317979177" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4668" instrument_node="">Pinterest, click here</span></a><span data-dcnode-id="4666" instrument_node="">.&nbsp; </span><strong data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">Note:&nbsp;</span></strong><span data-dcnode-id="4663" instrument_node=""> There are also graphics for the </span><a data-dcnode-id="4660" href="#Pali_Canon_Theravada_Buddhism"><em data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">Pali Canon</span></em></a><span data-dcnode-id="4659" instrument_node=""> and </span><a data-dcnode-id="4656" href="#Chinese_Canon_Mahayana_Buddhism"><em data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">Chinese Canon</span></em></a><span data-dcnode-id="4655" instrument_node=""> in this article!</span></figcaption></figure><span data-dcnode-id="4652" instrument_node="">
</span><p data-dcnode-id="4647"><span data-dcnode-id="4651" instrument_node="">Unlike most religions, there is not a </span><em data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">single</span></em><span data-dcnode-id="4648" instrument_node=""> book (like a bible) that exists for Buddhism.&nbsp; Nor is there a single ‘authority’ or ‘church’ for Buddhism (like how there is a Pope for the Catholic Church) where the teachings are centrally created and disseminated.&nbsp;</span></p><span data-dcnode-id="4646" instrument_node="">
</span><p data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Instead, each branch (school) of Buddhism has its own ‘canon’ of scripture they developed, and use.</span></p><span data-dcnode-id="4643" instrument_node="">
</span><h3 data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">What is a Scriptural Canon?</span></h3><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4636"><img alt="" class="aligncenter size-large wp-image-8140 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="4639" data-lazy-loaded="1" data-recalc-dims="1" draggable="false" height="528" loading="eager" sizes="(max-width: 792px) 100vw, 792px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg%3Fresize%3D792%252C528%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=1536%2C1024&amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?w=1920&amp;ssl=1 1920w" width="792"><noscript data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">&lt;img loading="lazy" class="aligncenter size-large wp-image-8140" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=792%2C528&amp;#038;ssl=1" alt="" width="792" height="528" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=1024%2C683&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=768%2C512&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?resize=1536%2C1024&amp;amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/the-law-of-the-2454702_1920.jpg?w=1920&amp;amp;ssl=1 1920w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="4635" instrument_node="">
</span><p data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">While we use the word “canon” in this article and graphics for ease of communication and reference, the term ‘canon’ deserves some clarification upfront in its relation to Buddhism.</span></p><span data-dcnode-id="4632" instrument_node="">
</span><ul data-dcnode-id="4578"><span data-dcnode-id="4631" instrument_node="">
</span><li data-dcnode-id="4623"><span data-dcnode-id="4630" instrument_node="">Generally, the word “canon” implies a </span><strong data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">closed or fixed set of texts which are immutable (unchanging), and are included in a collection by a governing authority.&nbsp;</span></strong><span data-dcnode-id="4627" instrument_node=""> An example of this might be the Biblical texts that are </span><a data-dcnode-id="4625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_canon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4626" instrument_node="">said to have first use that term</span></a><span data-dcnode-id="4624" instrument_node="">&nbsp;and do not include any new additions or changes.</span></li><span data-dcnode-id="4622" instrument_node="">
</span><li data-dcnode-id="4617"><span data-dcnode-id="4621" instrument_node="">In Buddhism, we have </span><strong data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">three main collections of texts</span></strong><span data-dcnode-id="4618" instrument_node=""> (which you will learn about in this article) which may be called a Canon, Tipiṭaka, or Tripitaka.&nbsp;</span></li><span data-dcnode-id="4616" instrument_node="">
</span><li data-dcnode-id="4611"><span data-dcnode-id="4615" instrument_node="">Historically, there was never such a thing as a ‘closed’ canon.&nbsp; The </span><strong data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">Pāli canon</span></strong><span data-dcnode-id="4612" instrument_node=""> may now be considered ‘closed’, however it was being added to until centuries later after much dispute, and shifts in development and influence.&nbsp; More on this will be included in the last chapter of this article.</span></li><span data-dcnode-id="4610" instrument_node="">
</span><li data-dcnode-id="4599"><span data-dcnode-id="4609" instrument_node="">In contrast, the </span><strong data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">Chinese Canon</span></strong><span data-dcnode-id="4606" instrument_node=""> may not even be considered a ‘canon’ at all in the traditional sense.&nbsp; While it does have the texts you would see in the Pāli canon (including essentially the same sermons of the Buddha), it allowed other items to be included throughout history.&nbsp; This included additional commentaries and even non-Buddhist texts.&nbsp; The standard edition of the Chinese Canon is the </span><em data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">Taishō</span></em><span data-dcnode-id="4603" instrument_node=""> edition which has many volumes or sections, which are similar to a library or collection.&nbsp; Additionally, the Chinese Canon was a </span><strong data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">state-sponsored project</span></strong><span data-dcnode-id="4600" instrument_node=""> to collect and codify the information (often for various reasons such as political power, to establish the texts in order to ensure standardization, etc.).&nbsp;&nbsp;</span></li><span data-dcnode-id="4598" instrument_node="">
</span><li data-dcnode-id="4580"><span data-dcnode-id="4597" instrument_node="">Finally, the </span><strong data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">authoritative bodies</span></strong><span data-dcnode-id="4594" instrument_node=""> of any of these canons must also be taken into context.&nbsp; For example, the Kings that favored the Mahāvihāra monks in the Theravāda school promoted the development of the </span><span data-dcnode-id="4592" style="font-size: inherit;"><span data-dcnode-id="4593" instrument_node="">Pāli </span></span><span data-dcnode-id="4591" instrument_node="">canon in that way over that of the Abhayagiri monks.&nbsp; While the religious authoritative bodies may have had different degrees of influence in the canon, the authoritative bodies that </span><span data-dcnode-id="4588" style="text-decoration: underline;"><em data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">created</span></em></span><span data-dcnode-id="4587" instrument_node=""> a canon may not be the same ones that speak on behalf of that Buddhist school (especially when state-sponsored).&nbsp; This is most notable with the Chinese Canon as it was a state-sponsored project.&nbsp; When the Chinese Canon spread to other east-Asian countries, those countries would also have had state sponsors for the eventual translation and structure (for instance, the Korean </span><em data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">Tripitaka Koreana</span></em><span data-dcnode-id="4584" instrument_node=""> was ordered re-created by King&nbsp;</span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gojong_of_Goryeo" title="Gojong of Goryeo"><span data-dcnode-id="4583" instrument_node="">Gojong</span></a><span data-dcnode-id="4581" instrument_node="">).&nbsp; &nbsp;</span></li><span data-dcnode-id="4579" instrument_node="">
</span></ul><span data-dcnode-id="4577" instrument_node="">
</span><h3 data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Buddhist Schools and Their Canons</span></h3><span data-dcnode-id="4574" instrument_node="">

</span><div class="zilla-alert green" data-dcnode-id="4045"><strong data-dcnode-id="4046"><span data-dcnode-id="4050" instrument_node="">To learn more about the differences between the Theravada and Mahayana branches of Buddhism, </span><a data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alanpeto.com/buddhism/understanding-mahayana-theravada/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4049" instrument_node="">click here for an article and video</span></a><span data-dcnode-id="4047" instrument_node="">.</span></strong></div><span data-dcnode-id="4044" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4043" instrument_node="">While there have been </span><em data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">many</span></em><span data-dcnode-id="4040" instrument_node=""> canons of Buddhism in the ancient past, there are only three (3) primary branches of Buddhism today, each with its own traditional canon of texts.&nbsp;</span></p><span data-dcnode-id="4038" instrument_node="">
</span><ul data-dcnode-id="4002"><span data-dcnode-id="4037" instrument_node="">
</span><li data-dcnode-id="4030"><strong data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Theravāda</span></strong><span data-dcnode-id="4034" instrument_node=""> traditions rely on texts collected in the </span><strong data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">Pāli canon</span></strong><span data-dcnode-id="4031" instrument_node="">.</span></li><span data-dcnode-id="4029" instrument_node="">
</span><li data-dcnode-id="4021"><span data-dcnode-id="4028" instrument_node="">Similarly, </span><strong data-dcnode-id="4026" style="font-size: inherit;"><span data-dcnode-id="4027" instrument_node="">Mahāyāna</span></strong><span data-dcnode-id="4024" style="font-size: inherit;"><span data-dcnode-id="4025" instrument_node=""> traditions rely on iterations of the </span></span><strong data-dcnode-id="4022" style="font-size: inherit;"><span data-dcnode-id="4023" instrument_node="">Chinese canon.&nbsp; </span></strong></li><span data-dcnode-id="4020" instrument_node="">
</span><li data-dcnode-id="4011"><strong data-dcnode-id="4018" style="font-size: inherit;"><span data-dcnode-id="4019" instrument_node="">Tibetan</span></strong><span data-dcnode-id="4016" style="font-size: inherit;"><span data-dcnode-id="4017" instrument_node=""> Buddhism traditions rely on iterations of the </span></span><strong data-dcnode-id="4014" style="font-size: inherit;"><span data-dcnode-id="4015" instrument_node="">Tibetan canon</span></strong><span data-dcnode-id="4012" style="font-size: inherit;"><span data-dcnode-id="4013" instrument_node="">. </span></span></li><span data-dcnode-id="4010" instrument_node="">
</span><li data-dcnode-id="4004"><span data-dcnode-id="4005" style="font-size: inherit;"><span data-dcnode-id="4009" instrument_node="">The Chinese and Tibetan canons incorporate early teachings from Pāli and Sanskrit, often as translated into their primary language. In some cases, early </span><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Aryan_languages" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4008" instrument_node="">Indic</span></a><span data-dcnode-id="4006" instrument_node=""> teachings from the early schools of Buddhism now exist only as translations in the Chinese and Tibetan canons, as the originals have been lost over time.</span></span></li><span data-dcnode-id="4003" instrument_node="">
</span></ul><span data-dcnode-id="4001" instrument_node="">
</span><p data-dcnode-id="3990"><span data-dcnode-id="4000" instrument_node="">The three canons relate to the three major branches of Buddhism that exist today which are </span><strong data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Theravāda</span></strong><span data-dcnode-id="3997" instrument_node=""> (mainly practiced in South/Southeast Asian countries), </span><strong data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Mahāyāna</span></strong><span data-dcnode-id="3994" instrument_node=""> (mainly practiced in East Asian countries), and </span><strong data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">Tibetan</span></strong><span data-dcnode-id="3991" instrument_node=""> (mainly practiced in Central Asian countries.&nbsp; Tibetan Buddhism is generally part of Mahāyāna Buddhism because it has Mahāyāna sūtras, however, it has its own canon and practices which make it distinct):</span></p><span data-dcnode-id="3989" instrument_node="">
</span><ol data-dcnode-id="3933"><span data-dcnode-id="3988" instrument_node="">
</span><li data-dcnode-id="3971"><strong data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">South/Southeast Asian Buddhism:&nbsp;</span></strong><span data-dcnode-id="3985" instrument_node=""> The </span><a data-dcnode-id="3979" href="#Pai_Canon_Theravada_Buddhism"><strong data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Pāli</span></strong><span data-dcnode-id="3982" instrument_node=""> </span><strong data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">Canon</span></strong></a><span data-dcnode-id="3978" instrument_node=""> (</span><a data-dcnode-id="3976" href="#Pai_Canon_Theravada_Buddhism"><span data-dcnode-id="3977" instrument_node="">click to jump to this section of the article</span></a><span data-dcnode-id="3975" instrument_node="">) is the scriptural canon of </span><strong data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">Theravāda</span></strong><span data-dcnode-id="3972" instrument_node=""> [Buddhism] Buddhists mainly in the south and southeast Asian countries of Sri Lanka, Thailand, Burma, Cambodia, Laos. and Myanmar.&nbsp; When you think of Buddhism in Thailand, for instance, that is Theravāda Buddhism which uses the Pāli Canon.</span></li><span data-dcnode-id="3970" instrument_node="">
</span><li data-dcnode-id="3950"><strong data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">East-Asian Buddhism:&nbsp;</span></strong><span data-dcnode-id="3967" instrument_node=""> The </span><a data-dcnode-id="3964" href="#Chinese_Canon_Mahayana_Buddhism"><strong data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node=""> Chinese Canon</span></strong></a><span data-dcnode-id="3963" instrument_node=""> (</span><a data-dcnode-id="3961" href="#Chinese_Canon_Mahayana_Buddhism"><span data-dcnode-id="3962" instrument_node="">click to jump to this section of the article</span></a><span data-dcnode-id="3960" instrument_node="">) is the scriptural canon of </span><strong data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">Mahāyāna</span></strong><span data-dcnode-id="3957" instrument_node=""> [Buddhism] Buddhists mainly in the east-Asian countries of China, Taiwan, Japan, Korea, and Vietnam.&nbsp; There are different versions of the Chinese Canon, with the modern standard edition being the </span><em data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Taishō</span></em><span data-dcnode-id="3954" instrument_node=""> , which was completed in Japan.&nbsp; When you think of Zen Buddhism, Pure Land Buddhism (chanting), or Buddhism practiced in Japan or China, for instance, that is Mahāyāna Buddhism which uses the Chinese Canon.&nbsp; While we do refer to the Chinese Canon as a “canon”, it is actually made up of various sources such as scripture and works from various </span><a data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Aryan_languages" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3953" instrument_node="">Indic</span></a><span data-dcnode-id="3951" instrument_node=""> Buddhist schools, Chinese works, and also non-Buddhist works.&nbsp; We will cover this more in that section of the article.</span></li><span data-dcnode-id="3949" instrument_node="">
</span><li data-dcnode-id="3935"><strong data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Central-Asian Buddhism:&nbsp;</span></strong><span data-dcnode-id="3946" instrument_node=""> The </span><a data-dcnode-id="3943" href="#The_Tibetan_Canon_Tibetan_Buddhism"><strong data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Tibetan Canon</span></strong></a><span data-dcnode-id="3942" instrument_node=""> (</span><a data-dcnode-id="3940" href="#The_Tibetan_Canon_Tibetan_Buddhism"><span data-dcnode-id="3941" instrument_node="">click to jump to this section of the article</span></a><span data-dcnode-id="3939" instrument_node="">) is the scriptural canon of </span><strong data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">Tibetan</span></strong><span data-dcnode-id="3936" instrument_node=""> [Buddhism] Buddhists (which is a form of Mahāyāna Buddhism) mainly in the central-Asian countries of Tibet, Bhutan, the Himalayas, and Mongolia.&nbsp; When you think of the Dalai Lama or the religion of Tibet, that is Tibetan Buddhism.&nbsp; While part of Mahāyāna Buddhism, it has its own unique differences and traditions which is why it is simply referred to as Tibetan Buddhism which uses their own canon known as the Tibetan Canon.&nbsp; The Tibetan Canon also features some similar thoughts we just had with the Chinese Canon.&nbsp; While it is called a canon, it is made up of various works, to include Theravāda and Mahāyāna, from various Indic Buddhist schools, and even some of the Chinese Canon!</span></li><span data-dcnode-id="3934" instrument_node="">
</span></ol><span data-dcnode-id="3932" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3931" instrument_node="">While this is a simplified summary of the three canons currently in existence today, they all evolved from a long and rich history from many schools of early Buddhism, some of which we still don’t fully understand or even know about.&nbsp; For example, fragments of a </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lionsroar.com/how-the-gandharan-manuscripts-change-buddhist-history/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3930" instrument_node="">Gandhāran</span></a><span data-dcnode-id="3928" instrument_node=""> canon which we currently identify as Mahāyāna may have been in existence as early as the Pāli canon even if it is not represented in that canon.</span></p><span data-dcnode-id="3926" instrument_node="">
</span><h2 data-dcnode-id="3922"><span class="ez-toc-section" data-dcnode-id="3925" id="A_Short_History_of_the_Buddhist_Canons"></span><span data-dcnode-id="3924" instrument_node="">A Short History of the Buddhist Canons</span><span class="ez-toc-section-end" data-dcnode-id="3923"></span></h2><span data-dcnode-id="3921" instrument_node="">
</span><figure aria-describedby="caption-attachment-1675" class="wp-caption aligncenter" data-dcnode-id="3912" id="attachment_1675" style="width: 792px"><img alt="" class="size-large wp-image-1675 jetpack-lazy-image" data-dcnode-id="3920" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=792%2C526&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=300%2C199&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=768%2C510&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=696%2C462&amp;ssl=1 696w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=632%2C420&amp;ssl=1 632w" data-recalc-dims="1" draggable="false" height="526" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg%3Fresize%3D792%252C526%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">&lt;img loading="lazy" class="size-large wp-image-1675" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=792%2C526&amp;#038;ssl=1" alt="" width="792" height="526" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?w=1024&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=300%2C199&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=768%2C510&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=696%2C462&amp;amp;ssl=1 696w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2012/01/4782699332_4f48e6f061_b.jpg?resize=632%2C420&amp;amp;ssl=1 632w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3913" id="caption-attachment-1675"><span data-dcnode-id="3917" instrument_node="">Young monk reading.&nbsp; (CC 2.0 Photo by </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/abhisheksundaram/4782699332/"><span data-dcnode-id="3916" instrument_node="">Abhishek Sundaram on Flickr</span></a><span data-dcnode-id="3914" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="3911" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">While this may seem strange that each branch/school of Buddhism has its own canons, it is like how each city or town may have its own library or school.&nbsp; That city or town, for instance, decided on what books make it into their library or school.&nbsp; And like most libraries or schools, you are likely to find a lot of the same things in a country.</span></p><span data-dcnode-id="3908" instrument_node="">
</span><p data-dcnode-id="3903"><span data-dcnode-id="3907" instrument_node="">For instance, they may all have standardized history books (which we can correlate to the “sūtras” in the Buddhist canons), a copy of the laws or rules of a country so they can live in peace and prosper (which we can correlate to the “Vinaya” in the Buddhist canons), and books that present a scholarly analysis of certain topics and offer explanations (which we can correlate to the “Abhidharma” in the Buddhist canons).&nbsp; That is important to understand because all the Buddhist canons </span><em data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">generally</span></em><span data-dcnode-id="3904" instrument_node=""> share a lot of the same things!&nbsp; The core teachings of the Buddha can be found throughout these canons.</span></p><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">So as a new Buddhist, you should not be overly concerned about which canon is ‘best’, but instead should start practicing and learning from your teacher/temple.</span></p><span data-dcnode-id="3899" instrument_node="">
</span><h4 data-dcnode-id="3896"><strong data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">Early Efforts to Create a Scriptural Canon</span></strong></h4><span data-dcnode-id="3895" instrument_node="">
</span><p data-dcnode-id="3890"><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2VUDTzX" rel="noopener noreferrer" style="font-size: 1.125rem;" target="_blank"><span data-dcnode-id="3894" instrument_node="">According to Ven. Thich Nhat Hanh</span></a><span data-dcnode-id="3891" style="font-size: 1.125rem;"><span data-dcnode-id="3892" instrument_node="">, the first attempt to develop a standardized scripture of the Buddha’s teachings actually began when the Buddha was alive.&nbsp; </span></span></p><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3877"><span data-dcnode-id="3887" style="font-size: 1.125rem;"><span data-dcnode-id="3888" instrument_node="">One day in Jetavana Monastery, Monks </span></span><span data-dcnode-id="3886" instrument_node="">Yamelu</span><span data-dcnode-id="3884" style="font-size: 1.125rem;"><span data-dcnode-id="3885" instrument_node=""> and </span></span><span data-dcnode-id="3883" instrument_node="">Tekula</span><span data-dcnode-id="3878" style="font-size: 1.125rem;"><span data-dcnode-id="3882" instrument_node=""> asked the Buddha if they could translate his teachings into the classical </span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vedic_Sanskrit" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3881" instrument_node="">Vedic</span></a><span data-dcnode-id="3879" instrument_node=""> language (which would have meant it would have been really only meant for monastics and scholars).&nbsp; The Buddha, however, wanted his teachings to be for everyone and did not approve of using that language.&nbsp; </span></span></p><span data-dcnode-id="3876" instrument_node="">
</span><p data-dcnode-id="3874"><span data-dcnode-id="3875" style="font-size: 1.125rem;"></span></p><div class="zilla-alert yellow" data-dcnode-id="3851"><span data-dcnode-id="3873" instrument_node=""> </span><strong data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Note:&nbsp;</span></strong><span data-dcnode-id="3870" instrument_node=""> T</span><span data-dcnode-id="3852" style="font-size: 1.125rem;"><span data-dcnode-id="3865" style="font-size: 1.125rem;"><span data-dcnode-id="3869" instrument_node="">he Buddha’s original language (</span><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magadhi_Prakrit" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3868" instrument_node="">Magadhi Prakrit</span></a><span data-dcnode-id="3866" instrument_node="">) is now a ‘dead language’ and is no longer used by any culture.&nbsp; Although the canons of early Buddhist </span></span><span data-dcnode-id="3864" instrument_node="">schools</span><span data-dcnode-id="3862" style="font-size: 1.125rem;"><span data-dcnode-id="3863" instrument_node=""> were written in either Pāli </span></span><span data-dcnode-id="3861" instrument_node="">or Sanskrit, the Buddha did not speak either of those languages.&nbsp; Sanskrit was the classical language used in India at that time and was the language of many of the canons.&nbsp; &nbsp; The </span><span data-dcnode-id="3859" style="font-size: 1.125rem;"><span data-dcnode-id="3860" instrument_node="">Theravāda </span></span><span data-dcnode-id="3858" instrument_node="">school used Pāli</span><span data-dcnode-id="3856" style="font-size: 1.125rem;"><span data-dcnode-id="3857" instrument_node="">, as a new language to be used for </span></span><span data-dcnode-id="3855" instrument_node="">their</span><span data-dcnode-id="3853" style="font-size: 1.125rem;"><span data-dcnode-id="3854" instrument_node=""> canon.&nbsp; While both were similar in some ways to the Buddha’s original language, they are not exact but became liturgical languages in Buddhism. </span></span></span></div><p data-dcnode-id="3850"></p><span data-dcnode-id="3849" instrument_node="">
</span><h4 data-dcnode-id="3846"><strong data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">After the Buddha’s Death:&nbsp; The Councils</span></strong></h4><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3837"><span data-dcnode-id="3844" instrument_node="">After the Buddha’s death (and </span><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parinirvana" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3843" instrument_node="">Parinirvana</span></a><span data-dcnode-id="3841" instrument_node="">), the monastics started a series of “Councils” in order to remember, and organize, the Buddha’s teachings and rules.&nbsp; These councils are believed to have helped formed the early understanding, and structure, of Buddhist scripture.&nbsp; Originally this was done in the oral tradition, then in the written tradition.&nbsp; Yet, </span><a data-dcnode-id="3839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tricycle.org/magazine/whose-buddhism-truest/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3840" instrument_node="">new understanding (and debate) about the scripture and its relation to the councils</span></a><span data-dcnode-id="3838" instrument_node=""> is showing that it had a much more dynamic evolution than just coming from one single “root”.</span></p><span data-dcnode-id="3836" instrument_node="">
</span><figure aria-describedby="caption-attachment-8142" class="wp-caption aligncenter" data-dcnode-id="3819" id="attachment_8142" style="width: 792px"><img alt="" class="size-large wp-image-8142 jetpack-lazy-image" data-dcnode-id="3835" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=792%2C475&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=1024%2C614&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=300%2C180&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=768%2C460&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=1536%2C921&amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?w=1920&amp;ssl=1 1920w" data-recalc-dims="1" draggable="false" height="475" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg%3Fresize%3D792%252C475%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">&lt;img loading="lazy" class="size-large wp-image-8142" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=792%2C475&amp;#038;ssl=1" alt="" width="792" height="475" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=1024%2C614&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=300%2C180&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=768%2C460&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?resize=1536%2C921&amp;amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Nava_Jetavana_Temple_-_Shravasti_-_014_King_Asoka_at_the_Third_Council_9241725897.jpg?w=1920&amp;amp;ssl=1 1920w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3820" id="caption-attachment-8142"><span data-dcnode-id="3832" instrument_node="">Third Buddhist Council. By </span><a class="external text" data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/people/64337707%40N07" rel="nofollow"><span data-dcnode-id="3831" instrument_node="">Photo Dharma</span></a><span data-dcnode-id="3829" instrument_node=""> from Penang, Malaysia – </span><a class="external text" data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/anandajoti/9241725897/" rel="nofollow"><span data-dcnode-id="3828" instrument_node="">014 King Asoka at the Third Council</span></a><span data-dcnode-id="3826" instrument_node="">, </span><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0" title="Creative Commons Attribution 2.0"><span data-dcnode-id="3825" instrument_node="">CC BY 2.0</span></a><span data-dcnode-id="3823" instrument_node="">, </span><a data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3Fcurid%3D37483356"><span data-dcnode-id="3822" instrument_node="">Link</span></a></figcaption></figure><span data-dcnode-id="3818" instrument_node="">
</span><h4 data-dcnode-id="3815"><strong data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">The Split in the Monastic Community</span></strong></h4><span data-dcnode-id="3814" instrument_node="">
</span><p data-dcnode-id="3807"><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2VUDTzX" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3813" instrument_node="">According to Ven. Thich Nhat Hanh</span></a><span data-dcnode-id="3811" instrument_node="">, in 375 BCE, after the Second Council, and before the Third Council, the community of bhikkhus (monastics) divided itself into two schools:&nbsp; Sthaviravāda (Sthavira / conservative), and the Mahasanghika (promoted development and reform) which were more numerous (</span><a data-dcnode-id="3809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ancient.eu/Mahasanghika/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3810" instrument_node="">learn more here</span></a><span data-dcnode-id="3808" instrument_node="">).</span></p><span data-dcnode-id="3806" instrument_node="">
</span><p data-dcnode-id="3801"><span data-dcnode-id="3805" instrument_node="">From these two schools branched off many other schools.&nbsp; It is believed that up to (</span><a data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2GZOdy8" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="3804" instrument_node="">according to André&nbsp;Bareau</span></a><span data-dcnode-id="3802" instrument_node="">) thirty-three different schools (called Nikāyas) developed due to the monastics differing on philosophical topics.&nbsp;</span></p><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3795"><span data-dcnode-id="3799" instrument_node="">Of those many schools, only one early Buddhist school remains today in its current form which is Theravāda.&nbsp; However, the Chinese Canon included some texts from some of the Tripitakas that were developed by these early schools (and thus preserved different teachings from these early Buddhist schools that may have not made it into the </span><span data-dcnode-id="3797" style="font-size: 1.125rem;"><span data-dcnode-id="3798" instrument_node="">Pāli </span></span><span data-dcnode-id="3796" instrument_node="">Canon, and possibly from the Mahasanghika school).</span></p><span data-dcnode-id="3794" instrument_node="">
</span><figure aria-describedby="caption-attachment-8597" class="wp-caption aligncenter" data-dcnode-id="3786" id="attachment_8597" style="width: 792px"><img alt="" class="size-large wp-image-8597 jetpack-lazy-image" data-dcnode-id="3793" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=792%2C587&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=1024%2C759&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=300%2C222&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=768%2C569&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?w=1200&amp;ssl=1 1200w" data-recalc-dims="1" draggable="false" height="587" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png%3Fresize%3D792%252C587%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">&lt;img loading="lazy" class="size-large wp-image-8597" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=792%2C587&amp;#038;ssl=1" alt="" width="792" height="587" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=1024%2C759&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=300%2C222&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?resize=768%2C569&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Mahajanapadas_c._500_BCE.png?w=1200&amp;amp;ssl=1 1200w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3787" id="caption-attachment-8597"><span data-dcnode-id="3790" instrument_node="">The early Buddhist schools in India. By Avantiputra7 – Own work, CC BY-SA 3.0, </span><a data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3Fcurid%3D33202412" rel="nofollow"><span data-dcnode-id="3789" instrument_node="">https://commons.wikimedia.org/w/index.php?curid=33202412</span></a></figcaption></figure><span data-dcnode-id="3785" instrument_node="">
</span><h3 data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">The spread of the Teachings</span></h3><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Monastics from these early schools of Buddhism in India had made their way into China and Tibet (and vice versa) bringing the teachings, and the scriptural canons, with them which helped form the Buddhism found in central and eastern-Asia.</span></p><span data-dcnode-id="3779" instrument_node="">
</span><p data-dcnode-id="3774"><span data-dcnode-id="3778" instrument_node="">A major contributor that helped to spread early Buddhism was due to </span><a data-dcnode-id="3776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ashoka" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3777" instrument_node="">King Ashoka</span></a><span data-dcnode-id="3775" instrument_node=""> (c. 271-231 BCE) during the Mauryan period (324-187 BCE).&nbsp; He commissioned many structures, missionaries, [stone] edicts, and other acts that helped spread Buddhist teachings to many regions (with some saying they even made it as far as Greece).</span></p><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">The spread of Buddhism to east-Asian countries will be covered in the Chinese Canon section of this article.</span></p><span data-dcnode-id="3770" instrument_node="">
</span><figure aria-describedby="caption-attachment-9371" class="wp-caption aligncenter" data-dcnode-id="3762" id="attachment_9371" style="width: 1004px"><img alt="" class="size-full wp-image-9371 jetpack-lazy-image" data-dcnode-id="3769" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?resize=792%2C731&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?w=1004&amp;ssl=1 1004w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?resize=300%2C277&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?resize=768%2C709&amp;ssl=1 768w" data-recalc-dims="1" draggable="false" height="731" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png%3Fresize%3D792%252C731%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-9371" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?resize=792%2C731&amp;#038;ssl=1" alt="" width="792" height="731" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?w=1004&amp;amp;ssl=1 1004w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?resize=300%2C277&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Teachings-Map.png?resize=768%2C709&amp;amp;ssl=1 768w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3763" id="caption-attachment-9371"><span data-dcnode-id="3766" instrument_node="">Spread of the Buddhist Teachings. CC work by Gunawan Kartapranata on </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABuddhist_Expansion.svg" rel="noopener noreferrer" target="new"><span data-dcnode-id="3765" instrument_node="">Wikimedia</span></a></figcaption></figure><span data-dcnode-id="3761" instrument_node="">
</span><h2 data-dcnode-id="3757"><span class="ez-toc-section" data-dcnode-id="3760" id="Why_Are_There_Three_Buddhist_Canons"></span><span data-dcnode-id="3759" instrument_node="">Why Are There Three Buddhist Canons?</span><span class="ez-toc-section-end" data-dcnode-id="3758"></span></h2><span data-dcnode-id="3756" instrument_node="">
</span><figure aria-describedby="caption-attachment-8260" class="wp-caption aligncenter" data-dcnode-id="3749" id="attachment_8260" style="width: 3300px"><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg%3Fssl%3D1"><img alt="" class="size-full wp-image-8260 jetpack-lazy-image" data-dcnode-id="3755" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=792%2C612&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?w=3300&amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=300%2C232&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=1024%2C791&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=768%2C593&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=1536%2C1187&amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=2048%2C1583&amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?w=2376&amp;ssl=1 2376w" data-recalc-dims="1" draggable="false" height="612" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg%3Fresize%3D792%252C612%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-8260" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=792%2C612&amp;#038;ssl=1" alt="" width="792" height="612" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?w=3300&amp;amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=300%2C232&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=1024%2C791&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=768%2C593&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=1536%2C1187&amp;amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?resize=2048%2C1583&amp;amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Evolution-of-the-Canons-by-Alan-Peto-2019.jpg?w=2376&amp;amp;ssl=1 2376w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="3750" id="caption-attachment-8260"><span data-dcnode-id="3751" instrument_node="">Click the image to view the chart larger in your browser!</span></figcaption></figure><span data-dcnode-id="3748" instrument_node="">
</span><p data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">So why do we have three different canons of Buddhist scripture?&nbsp;</span></p><span data-dcnode-id="3745" instrument_node="">
</span><p data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">The short answer is that after the Buddha’s death, there have been different interpretations and discussions about his teachings, and rules.&nbsp;</span></p><span data-dcnode-id="3742" instrument_node="">
</span><p data-dcnode-id="3739"><strong data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">The three canons we have today relate to the three main schools/branches of Buddhism that currently exist, and their understanding and practice of the Buddha’s teachings.&nbsp;</span></strong></p><span data-dcnode-id="3738" instrument_node="">
</span><p data-dcnode-id="3732"><strong data-dcnode-id="3734"><a data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alanpeto.com/buddhism/understanding-mahayana-theravada/"><span data-dcnode-id="3737" instrument_node="">Each school has different interpretations, understanding, and practices of the Buddha’s teachings</span></a><span data-dcnode-id="3735" instrument_node="">.&nbsp;</span></strong><span data-dcnode-id="3733" instrument_node=""> While the essential ‘core’ of the Buddha’s teachings remains, there was a dynamic and evolving understanding of the Buddha’s teachings which resulted in many scriptural canons in the past.</span></p><span data-dcnode-id="3731" instrument_node="">
</span><ol data-dcnode-id="3687"><span data-dcnode-id="3730" instrument_node="">
</span><li data-dcnode-id="3719"><span data-dcnode-id="3729" instrument_node="">The period where the Buddha was alive and teaching can best be described as “</span><strong data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">original Buddhism</span></strong><span data-dcnode-id="3726" instrument_node="">” (although this term is often used with ‘early Buddhism’ as well).&nbsp; After the Buddha passed, and the monastic community took over, we tend to call this period “</span><strong data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">early Buddhism</span></strong><span data-dcnode-id="3723" instrument_node="">” (“EBT” – “Early Buddhist Teachings”) or “</span><strong data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Pre-Sectarian Buddhism</span></strong><span data-dcnode-id="3720" instrument_node="">“.&nbsp; &nbsp;This form of Buddhism remained true to the Buddha’s original teachings and practice, however, there was (even immediately after the Buddha’s death) debate, confusion, and interpretation about the Buddha’s teachings.&nbsp; Since he was no longer around to clear things up, it was up to the monastic community’s intellectual and elder monastics to figure things out and move forward.</span></li><span data-dcnode-id="3718" instrument_node="">
</span><li data-dcnode-id="3711"><strong data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Early Buddhism continued for centuries after the Buddha’s death, and eventually encompassed many different schools.&nbsp;</span></strong><span data-dcnode-id="3715" instrument_node=""> Each school maintained its own scripture, however, they all generally stemmed from the original Buddha’s teachings albeit with a different understanding, interpretation, translations, and practices.&nbsp; However, due to the lack of written scripture to the time of the Buddha, and there being no ‘holy grail’ of an original canon, </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tricycle.org/magazine/whose-buddhism-truest/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3714" instrument_node="">there is no way to establish that any of the scripture is exactly what the Buddha said</span></a><span data-dcnode-id="3712" instrument_node="">.&nbsp; However, it is generally believed that the core meaning and the teachings themselves remain preserved and transmitted exists in the canons we have today, even if they may not be literally what the Buddha said.</span></li><span data-dcnode-id="3710" instrument_node="">
</span><li data-dcnode-id="3703"><span data-dcnode-id="3705" style="font-size: inherit;"><span data-dcnode-id="3709" instrument_node="">Before there was the written Buddhist Canons (Scripture) that we have today, </span><strong data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">it was recited orally by monastics and was not always organized in a structured or standardized way among all the schools.</span></strong><span data-dcnode-id="3706" instrument_node="">&nbsp; </span></span><span data-dcnode-id="3704" instrument_node="">Eventually, the oral tradition was largely abandoned and a desire to commit the teachings to writings was started by the monastic community.&nbsp; This was due to famine, external conflict, and other issues that threatened the monastic community and the continued existence of the teachings.</span></li><span data-dcnode-id="3702" instrument_node="">
</span><li data-dcnode-id="3694"><span data-dcnode-id="3701" instrument_node="">The early Buddhist schools that existed in ancient India, and other countries (such as where the modern-day countries of Afghanistan, Pakistan, etc., exist), no longer exist due to war/conflict, destruction, economics, politics, and changing belief structures of those areas.&nbsp; Theravāda’s </span><span data-dcnode-id="3699" style="font-size: 1.125rem;"><span data-dcnode-id="3700" instrument_node="">Pāli </span></span><span data-dcnode-id="3698" instrument_node="">Canon is the only canon of an early Buddhist school that remains </span><em data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">with</span></em><span data-dcnode-id="3695" instrument_node=""> that same school.&nbsp; However, some of the scriptures of several of the canons of the other early Buddhism schools had already found their way to the Chinese Canon, and Tibetan Canon, and thus preserved (while not being a complete edition of those schools separate canons).</span></li><span data-dcnode-id="3693" instrument_node="">
</span><li data-dcnode-id="3689"><span data-dcnode-id="3692" instrument_node="">So, we have three (3) canons of Buddhism because these are the three major schools of Buddhism in existence today.&nbsp; </span><b data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Like the early schools of Buddhism which had their own separate canons, so do the Buddhist schools of our modern time.&nbsp;&nbsp;</span></b></li><span data-dcnode-id="3688" instrument_node="">
</span></ol><span data-dcnode-id="3686" instrument_node="">
</span><h2 data-dcnode-id="3682"><span class="ez-toc-section" data-dcnode-id="3685" id="Which_Canon_Do_I_Read"></span><span data-dcnode-id="3684" instrument_node="">Which Canon Do I Read?</span><span class="ez-toc-section-end" data-dcnode-id="3683"></span></h2><span data-dcnode-id="3681" instrument_node="">
</span><figure aria-describedby="caption-attachment-8256" class="wp-caption aligncenter" data-dcnode-id="3675" id="attachment_8256" style="width: 2000px"><img alt="" class="size-full wp-image-8256 jetpack-lazy-image" data-dcnode-id="3680" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=792%2C528&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=1024%2C682&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=1536%2C1024&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="528" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg%3Fresize%3D792%252C528%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-8256" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=792%2C528&amp;#038;ssl=1" alt="" width="792" height="528" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=1024%2C682&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=768%2C512&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/shutterstock_567404065b.jpg?resize=1536%2C1024&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3676" id="caption-attachment-8256"><span data-dcnode-id="3677" instrument_node="">Young monk reading Buddhist scripture (Image purchased for this website / Photo by vectorx2263 / shutterstock.com)</span></figcaption></figure><span data-dcnode-id="3674" instrument_node="">
</span><blockquote data-dcnode-id="3666"><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3668"><span data-dcnode-id="3671" style="font-size: inherit;"><span data-dcnode-id="3672" instrument_node="">I am often asked whether the teachings and techniques of Buddhism continue to be relevant in the present day and age.&nbsp; Like all religions, Buddhism addresses basic human problems. So long as we continue to experience the basic human sufferings of birth, disease, old age, and death, there is no question of whether it is relevant or not.&nbsp; ~&nbsp; </span></span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bdkamerica.org/system/files/pdf/dBET_Alpha_Buddha-Dharma_2003_0.pdf" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="3670" instrument_node="">His Holiness, the Fourteenth Dalai Lama</span></a></p><span data-dcnode-id="3667" instrument_node="">
</span></blockquote><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">So, what does this mean to you, the Buddhist layperson?&nbsp; What canon does your practice fall under?&nbsp; What do you read?&nbsp; The answer is both simple, and complicated:</span></p><span data-dcnode-id="3662" instrument_node="">
</span><ol data-dcnode-id="3589"><span data-dcnode-id="3661" instrument_node="">
</span><li data-dcnode-id="3651"><strong data-dcnode-id="3656"><span data-dcnode-id="3660" instrument_node="">For those who live in </span><em data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">Asian</span></em><span data-dcnode-id="3657" instrument_node=""> countries</span></strong><span data-dcnode-id="3655" instrument_node="">, whatever is the main branch/school of Buddhism is practiced, they will use the canon of that form of Buddhism.&nbsp; </span><em data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">Generally</span></em><span data-dcnode-id="3652" instrument_node="">, “case closed”, with few exceptions.&nbsp; When you attend services and listen to a monk, read, or chant, you are using the canon from your school of Buddhism which (typically) is the primary school in your country.</span></li><span data-dcnode-id="3650" instrument_node="">
</span><li data-dcnode-id="3614"><strong data-dcnode-id="3645"><span data-dcnode-id="3649" instrument_node="">For those in </span><em data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Western</span></em><span data-dcnode-id="3646" instrument_node=""> countries</span></strong><span data-dcnode-id="3644" instrument_node="">, where Buddhism is </span><span data-dcnode-id="3642" style="text-decoration: underline;"><span data-dcnode-id="3643" instrument_node="">not</span></span><span data-dcnode-id="3641" instrument_node=""> the main religion, the answer is more complex. There are often numerous temples and organizations that exist for each school of Buddhism, and from the country which they originated in. Even with Theravāda Buddhism (which does not have the diversity of Mahāyāna), each country that follows “Theravāda” may have different traditions, culture, and even decisions on which parts of the monastic rules (Vinaya) they follow, or how they partake in Buddhist holidays/celebrations/events.
</span><ul data-dcnode-id="3616"><span data-dcnode-id="3640" instrument_node="">
</span><li data-dcnode-id="3636"><strong data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">You will likely attend services at a temple or organization that originates from an Asian country, and Buddhism practiced there.</span></strong><span data-dcnode-id="3637" instrument_node="">&nbsp; In that case, whatever teachings you are presented will be from that specific canon/school of Buddhism.</span></li><span data-dcnode-id="3635" instrument_node="">
</span><li data-dcnode-id="3618"><span data-dcnode-id="3634" instrument_node="">However, many western Buddhists are either starting off on their own or are</span><strong data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node=""> more willing to explore the breadth of Buddhist scripture that exists.</span></strong><span data-dcnode-id="3631" instrument_node="">&nbsp; And in that case, sectarian Buddhism becomes blurred.&nbsp; You may have already read the </span><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2MTZgMV" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3630" instrument_node="">Dhammapada</span></a><span data-dcnode-id="3628" instrument_node="">, which is part of the </span><span data-dcnode-id="3626" style="font-size: 1.125rem;"><span data-dcnode-id="3627" instrument_node="">Pāli </span></span><span data-dcnode-id="3625" instrument_node="">Canon of Theravāda Buddhism.&nbsp; But did you know there is also a version in the Chinese Canon of Mahāyāna Buddhism?&nbsp; In this instance, most western Mahāyāna Buddhists would read the </span><span data-dcnode-id="3623" style="font-size: 1.125rem;"><span data-dcnode-id="3624" instrument_node="">Pāli </span></span><span data-dcnode-id="3622" instrument_node="">Canon’s </span><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2MTZgMV" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3621" instrument_node="">Dhammapada</span></a><span data-dcnode-id="3619" instrument_node=""> since it is more widely translated into English (and that’s OK!).</span></li><span data-dcnode-id="3617" instrument_node="">
</span></ul><span data-dcnode-id="3615" instrument_node="">
</span></li><span data-dcnode-id="3613" instrument_node="">
</span><li data-dcnode-id="3604"><strong data-dcnode-id="3609"><span data-dcnode-id="3612" instrument_node="">As a non-monastic (a layperson), you are unlikely to read an </span><em data-dcnode-id="3610" style="font-size: inherit;"><span data-dcnode-id="3611" instrument_node="">entire&nbsp;</span></em></strong><span data-dcnode-id="3605" style="font-size: inherit;"><strong data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Buddhist canon</span></strong><span data-dcnode-id="3606" instrument_node=""> (and especially not one as enormous as the Chinese Canon).&nbsp; Instead, you will often be reading, or reciting, parts of the Sutta/Sūtra (sermons of the Buddha), learning from your teacher (who understands the teachings through the Abhidhamma/Abhidharma), and applying ethical conduct and practice in a form laypersons use which has their roots in the Vinaya (such as the Five Precepts, or when attending a short term retreat for laypersons at a temple where you follow monastic code).&nbsp; To give you an example, you are unlikely to find a Buddhist layperson in the Asian countries who have read an entire Buddhist canon.&nbsp; Instead, they focus on certain scriptures that are recited, chanted, or focused on within their school.</span></span></li><span data-dcnode-id="3603" instrument_node="">
</span><li data-dcnode-id="3591"><strong data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">You will learn in this article that the Buddhist scripture between the canons is similar in doctrine</span></strong><span data-dcnode-id="3600" instrument_node="">&nbsp;because early Buddhist teachings (</span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Buddhism" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="3599" instrument_node="">EBT</span></a><span data-dcnode-id="3596" style="font-size: inherit;"><span data-dcnode-id="3597" instrument_node="">) helped to form the many canons of the different schools of early Buddhism that existed in ancient India (33 schools, </span></span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2GZOdy8" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="3595" instrument_node="">according to André&nbsp;Bareau</span></a><span data-dcnode-id="3592" style="font-size: inherit;"><span data-dcnode-id="3593" instrument_node="">).&nbsp; There may be different translations, interpretations, and commentaries, however, the ‘core’ of Buddhism remains central to all of them.&nbsp; The path each one takes for its practitioners is the main difference.</span></span></li><span data-dcnode-id="3590" instrument_node="">
</span></ol><span data-dcnode-id="3588" instrument_node="">
</span><h2 data-dcnode-id="3583"><span class="ez-toc-section" data-dcnode-id="3587" id="Pali_Canon_Theravada_Buddhism"></span><strong data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">Pāli Canon (Theravāda Buddhism)</span></strong><span class="ez-toc-section-end" data-dcnode-id="3584"></span></h2><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">The Pāḷi Canon is the canon of Buddhism used primarily in the South and Southeast Asian countries of Thailand, Sri Lanka, Myanmar, Laos, and Cambodia.</span></p><span data-dcnode-id="3579" instrument_node="">
</span><figure aria-describedby="caption-attachment-8527" class="wp-caption aligncenter" data-dcnode-id="3566" id="attachment_8527" style="width: 3300px"><a data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gumroad.com/l/BuddhismGraphics" rel="attachment noopener wp-att-8214 noreferrer" target="_blank"><img alt="" class="wp-image-8527 size-full jetpack-lazy-image" data-dcnode-id="3578" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=792%2C612&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?w=3300&amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=300%2C232&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=1024%2C791&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=768%2C593&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=1536%2C1187&amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=2048%2C1583&amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?w=2376&amp;ssl=1 2376w" data-recalc-dims="1" draggable="false" height="612" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg%3Fresize%3D792%252C612%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">&lt;img loading="lazy" class="wp-image-8527 size-full" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=792%2C612&amp;#038;ssl=1" alt="" width="792" height="612" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?w=3300&amp;amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=300%2C232&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=1024%2C791&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=768%2C593&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=1536%2C1187&amp;amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?resize=2048%2C1583&amp;amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Theravada-2019-by-Alan-Peto.jpg?w=2376&amp;amp;ssl=1 2376w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="3567" id="caption-attachment-8527"><span data-dcnode-id="3574" instrument_node="">Zoom in to view the graphic, hover over image to find social media share buttons, and&nbsp;</span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gumroad.com/l/BuddhismGraphics" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3573" instrument_node="">click the image if you wish to donate and get a printable PDF version</span></a><span data-dcnode-id="3571" instrument_node="">.&nbsp; To view/share on&nbsp;</span><a data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/204491639317995446/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3570" instrument_node="">Pinterest, click here</span></a><span data-dcnode-id="3568" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="3565" instrument_node="">
</span><div class="zilla-alert green" data-dcnode-id="3549"><span data-dcnode-id="3564" instrument_node=""> </span><strong data-dcnode-id="3559"><span data-dcnode-id="3563" instrument_node="">Find the </span><span data-dcnode-id="3561" style="font-size: 1.125rem;"><span data-dcnode-id="3562" instrument_node="">Pāli </span></span><span data-dcnode-id="3560" instrument_node="">Canon Online:&nbsp;</span></strong><span data-dcnode-id="3558" instrument_node=""> &nbsp;</span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.accesstoinsight.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3557" instrument_node="">accesstoinsight.com</span></a><span data-dcnode-id="3555" instrument_node="">, </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dhammatalks.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3554" instrument_node="">dhammatalks.org</span></a><span data-dcnode-id="3552" instrument_node="">, and </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//suttacentral.net/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3551" instrument_node="">suttacentral.net</span></a></div><span data-dcnode-id="3548" instrument_node="">
</span><p data-dcnode-id="3543"><span data-dcnode-id="3547" instrument_node="">The </span><span data-dcnode-id="3545" style="font-size: 1.125rem;"><span data-dcnode-id="3546" instrument_node="">Pāli </span></span><span data-dcnode-id="3544" instrument_node="">Canon (Tipiṭaka) contains early Buddhist teachings which were originally written down from the verbal tradition on long, narrow palm leaves in Sri Lanka. The name “Tipiṭaka” means “three baskets” and consists of up to 50 volumes. &nbsp;There actually were originally “three baskets” that Buddhist monks used to collect and categorize the transcribed scripture that was put on leaves hundreds of years after his death.&nbsp;</span></p><span data-dcnode-id="3542" instrument_node="">
</span><p data-dcnode-id="3535"><span data-dcnode-id="3541" instrument_node="">This canon is the product of just one of the schools of early Buddhism (Theravāda), with some of the others finding their way into the Chinese and Tibetan canons.&nbsp; Interestingly, Steven Collins stated that there was an </span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/document/147317582/On-the-Very-Idea-of-the-Pali-Canon-Collins-CCRS-1990" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3540" instrument_node="">older version</span></a><span data-dcnode-id="3538" instrument_node=""> of the Theravāda school which does not directly connect to the Theravāda we know of today (such as the pre-Aśoka[Ashoka] period, Aśoka period, and modern period.&nbsp; Therefore, what we know of the </span><span data-dcnode-id="3536" style="font-size: 1.125rem;"><span data-dcnode-id="3537" instrument_node="">Pāli Canon may relate more to the modern version of Theravāda.</span></span></p><span data-dcnode-id="3534" instrument_node="">
