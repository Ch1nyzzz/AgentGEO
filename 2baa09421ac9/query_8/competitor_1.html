</span><p data-dcnode-id="3526"><span data-dcnode-id="3533" instrument_node="">Today, the </span><span data-dcnode-id="3531" style="font-size: 1.125rem;"><span data-dcnode-id="3532" instrument_node="">Pāli </span></span><span data-dcnode-id="3530" instrument_node="">Canon is considered a ‘closed canon’, meaning no new works are added to it (unlike the Chinese canon, for instance).&nbsp; However, historically the </span><span data-dcnode-id="3528" style="font-size: 1.125rem;"><span data-dcnode-id="3529" instrument_node="">Pāli </span></span><span data-dcnode-id="3527" instrument_node="">Canon was not a ‘written down once and done’ thing.&nbsp; According to Ven. Walpola Rāhula:</span></p><span data-dcnode-id="3525" instrument_node="">
</span><blockquote data-dcnode-id="3520"><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">“Although there is evidence to prove the growth of the Pali Scriptures during the early centuries of Buddhism in India and Celyon, there is no reason to doubt that their growth was arrested and the text was finally fixed in the 5th century A.C. when the Sinhalese Commentaries on the Tipitaka were translated into Pali by Buddhaghosa.”</span></p><span data-dcnode-id="3521" instrument_node="">
</span></blockquote><span data-dcnode-id="3519" instrument_node="">
</span><h3 data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Structure of the Canon</span></h3><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3511"><span data-dcnode-id="3515" instrument_node="">The </span><span data-dcnode-id="3513" style="font-size: 1.125rem;"><span data-dcnode-id="3514" instrument_node="">Pāli Tipiṭaka&nbsp;</span></span><span data-dcnode-id="3512" instrument_node="">is made up of these ‘three baskets’ of scripture (this same structure can also be largely found in the Chinese Canon):</span></p><span data-dcnode-id="3510" instrument_node="">
</span><ol data-dcnode-id="3476"><span data-dcnode-id="3509" instrument_node="">
</span><li data-dcnode-id="3503"><strong data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Vinaya Pitaka</span></strong><span data-dcnode-id="3506" instrument_node=""> (Discipline Basket).&nbsp; The Vinaya contains the regulatory framework (precepts, rules, discipline, ordination, rituals, etiquette and manners, training, etc.) followed by monks and nuns in a monastic community (saṅgha</span><span data-dcnode-id="3504" style="font-size: inherit;"><span data-dcnode-id="3505" instrument_node="">).</span></span></li><span data-dcnode-id="3502" instrument_node="">
</span><li data-dcnode-id="3490"><strong data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Sutta Pitaka</span></strong><span data-dcnode-id="3499" instrument_node="">&nbsp;(Nikāyas/Sayings Basket). The Nikāyas </span><span data-dcnode-id="3497" style="font-size: inherit;"><span data-dcnode-id="3498" instrument_node="">are the historical discourses of the Buddha.&nbsp; The most well-known part of this collection is the </span></span><span data-dcnode-id="3496" instrument_node="">Dhammapada</span><span data-dcnode-id="3494" style="font-size: inherit;"><span data-dcnode-id="3495" instrument_node="">, which is in the </span></span><span data-dcnode-id="3493" instrument_node="">Khuddaka Nikāya</span><span data-dcnode-id="3491" style="font-size: inherit;"><span data-dcnode-id="3492" instrument_node="">.</span></span></li><span data-dcnode-id="3489" instrument_node="">
</span><li data-dcnode-id="3478"><strong data-dcnode-id="3486"><strong data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Abhidhamma Pitaka.&nbsp; </span></strong></strong><span data-dcnode-id="3485" instrument_node="">The analysis, commentary, and summaries of the Suttas (teachings of the Buddha) are contained in the Abhidhamma Piṭaka.&nbsp;&nbsp; This commentary is important to help monastics, and laypersons, in understanding and applying the Suttas in their practice.&nbsp; Numerous commentaries and sub-commentaries were written by Pāli scholars.&nbsp; For example, </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/sacred-texts/articles/the-buddhist-canon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3484" instrument_node="">according to Professor T H Barret</span></a><span data-dcnode-id="3482" instrument_node=""> the works of 5th-century scholar </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhaghosa" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3481" instrument_node="">Buddhaghoṣa</span></a><span data-dcnode-id="3479" instrument_node=""> have been essential for the understanding of Theravāda Buddhist scriptures.</span></li><span data-dcnode-id="3477" instrument_node="">
</span></ol><span data-dcnode-id="3475" instrument_node="">
</span><figure aria-describedby="caption-attachment-9337" class="wp-caption aligncenter" data-dcnode-id="3466" id="attachment_9337" style="width: 2000px"><img alt="Abhidhamma-commentary-or_16079_f001r" class="alignnone size-full wp-image-9337 jetpack-lazy-image" data-dcnode-id="3474" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=792%2C691&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=300%2C262&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=1024%2C893&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=768%2C670&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=1536%2C1340&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="691" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg%3Fresize%3D792%252C691%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9337" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=792%2C691&amp;#038;ssl=1" alt="Abhidhamma-commentary-or_16079_f001r" width="792" height="691" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=300%2C262&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=1024%2C893&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=768%2C670&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Abhidhamma-commentary-or_16079_f001r.jpg?resize=1536%2C1340&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3467" id="caption-attachment-9337"><span data-dcnode-id="3471" instrument_node="">An Abhidhamma commentary commissioned in 1916. (Source: </span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/collection-items/an-abhidhamma-commentary" rel="noopener noreferrer" target="new"><span data-dcnode-id="3470" instrument_node="">British Library</span></a><span data-dcnode-id="3468" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="3465" instrument_node="">
</span><h3 data-dcnode-id="3462"><strong data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">The Nikāyas (Sutta)</span></strong></h3><span data-dcnode-id="3461" instrument_node="">
</span><p data-dcnode-id="3457"><strong data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">The Nikāyas,</span></strong><span data-dcnode-id="3458" instrument_node=""> which is also used to describe the Sutta Pitaka, contains the following:</span></p><span data-dcnode-id="3456" instrument_node="">
</span><ol data-dcnode-id="3418"><span data-dcnode-id="3455" instrument_node="">
</span><li data-dcnode-id="3451"><b data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Dīgha Nikāya (dīghanikāya): </span></b><span data-dcnode-id="3452" instrument_node="">There are 34 “long” discourses in this Nikāya, to include the Greater Discourse on the Foundations of Mindfulness (Satipatthana Sutta), The Fruits of the Contemplative Life, and the Buddha’s Last Days.</span></li><span data-dcnode-id="3450" instrument_node="">
</span><li data-dcnode-id="3444"><b data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Majjhima </span></b><b data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Nikāya: </span></b><span data-dcnode-id="3445" instrument_node="">There are 152 “middle-length” discourses in this Nikāya to include the Shorter Exposition of Kamma, Mindfulness of Breathing, and the Mindfulness of the Body.</span></li><span data-dcnode-id="3443" instrument_node="">
</span><li data-dcnode-id="3439"><b data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Saṃyutta Nikāya: </span></b><span data-dcnode-id="3440" instrument_node="">There are between 2,889 to 7,762 shorter Suttas in this Nikāya, known as the “connected” discourses.</span></li><span data-dcnode-id="3438" instrument_node="">
</span><li data-dcnode-id="3434"><b data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">Aṅguttara Nikāya: </span></b><span data-dcnode-id="3435" instrument_node="">The teachings in this Nikāya are arranged numerically, which gives its title as the “numerical” discourses.&nbsp; There are 9,565 short Suttas grouped by the number “ones” to “elevens”.</span></li><span data-dcnode-id="3433" instrument_node="">
</span><li data-dcnode-id="3420"><b data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Khuddaka </span></b><b data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Nikāya: </span></b><span data-dcnode-id="3428" instrument_node="">This Nikāya contains a mixture of Suttas, known as the “minor collection”, by the Buddha or his disciples.&nbsp; There are between 15 to 18 sections between the different editions.&nbsp; It contains the </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31AqXPV" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Dhammapada</span></b></a><span data-dcnode-id="3424" instrument_node="">, which is perhaps the most well known of the entire </span><span data-dcnode-id="3422" style="font-size: 1.125rem;"><span data-dcnode-id="3423" instrument_node="">Pāli </span></span><span data-dcnode-id="3421" instrument_node="">Canon by laypersons.&nbsp; The sections include Khuddakapatha, Dhammapada, Udana, Itivuttaka, Suttanipata, Vimanavatthu, Petavatthu, Theragatha, Therigatha, Jataka tales [birth stories], Niddesa, Patisambhidamagga, Apadana, Buddhavamsa, Cariyapitaka, Nettipakarana or Netti, Petakopadesa, and Milinda Panha.</span></li><span data-dcnode-id="3419" instrument_node="">
</span></ol><span data-dcnode-id="3417" instrument_node="">
</span><figure aria-describedby="caption-attachment-9357" class="wp-caption alignnone" data-dcnode-id="3411" id="attachment_9357" style="width: 2000px"><img alt="Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05" class="alignnone size-full wp-image-9357 jetpack-lazy-image" data-dcnode-id="3416" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=792%2C278&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=300%2C105&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=1024%2C359&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=768%2C269&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=1536%2C538&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="278" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg%3Fresize%3D792%252C278%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9357" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=792%2C278&amp;#038;ssl=1" alt="Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05" width="792" height="278" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=300%2C105&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=1024%2C359&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=768%2C269&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/Mahabuddhaguna-and-other-Buddhist-texts-1_14_Or-14068-05.jpg?resize=1536%2C538&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3412" id="caption-attachment-9357"><span data-dcnode-id="3413" instrument_node="">An example of the Jātaka tales (this one of the Suvannasāma) in illustrated format. (Source: British Library)</span></figcaption></figure><span data-dcnode-id="3410" instrument_node="">
</span><h3 data-dcnode-id="3407"><strong data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Theravāda Suttas for Beginners</span></strong></h3><span data-dcnode-id="3406" instrument_node="">
</span><p data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">For the individual who is new to Theravāda Buddhism, it can be difficult to know where to begin with the scripture.</span></p><span data-dcnode-id="3403" instrument_node="">
</span><div class="zilla-alert yellow" data-dcnode-id="3386"><span data-dcnode-id="3402" instrument_node=""> </span><strong data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">Study Guides:</span></strong><span data-dcnode-id="3399" instrument_node="">&nbsp; There are many </span><span data-dcnode-id="3397" style="text-decoration: underline;"><span data-dcnode-id="3398" instrument_node="">study guides</span></span><span data-dcnode-id="3396" instrument_node=""> online (</span><a data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bodhimonastery.org/a-systematic-study-of-the-majjhima-nikaya.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3395" instrument_node="">here is one from Bhikkhu Bodhi</span></a><span data-dcnode-id="3393" instrument_node="">, and </span><a data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhammatalks.org/ebook_index.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3392" instrument_node="">another from&nbsp;Thanissaro Bhikkhu</span></a><span data-dcnode-id="3390" instrument_node="">).&nbsp; For books, </span><a data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2IIVNwX" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3389" instrument_node="">Bhikku Bodhi’s “The Teachings of the Buddha” series of books is a good choice</span></a><span data-dcnode-id="3387" instrument_node="">.&nbsp; The following list is some Suttas that you may want to start off with, and the reasons why. </span></div><span data-dcnode-id="3385" instrument_node="">
</span><p data-dcnode-id="3380"><span data-dcnode-id="3384" instrument_node="">These three Suttas are considered essential reading by most Theravāda Buddhists. They cover fundamental teachings of the Buddha which are the core of Buddhist practice (clicking these links will take you to the great Theravāda scripture website known as </span><em data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Access to Insight</span></em><span data-dcnode-id="3381" instrument_node="">):</span></p><span data-dcnode-id="3379" instrument_node="">

</span><ol data-dcnode-id="3288"><span data-dcnode-id="3345" instrument_node="">
</span><li data-dcnode-id="3339"><strong data-dcnode-id="3341"><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accesstoinsight.org/tipitaka/dn/dn.31.0.nara.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3344" instrument_node="">Sigalovada Sutta</span></a><span data-dcnode-id="3342" instrument_node="">:</span></strong><span data-dcnode-id="3340" instrument_node=""> The Buddha provides instructions for laypersons.</span></li><span data-dcnode-id="3338" instrument_node="">

</span><li data-dcnode-id="3311"><strong data-dcnode-id="3313"><a data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accesstoinsight.org/tipitaka/mn/mn.061.than.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3316" instrument_node="">Ambalatthika-rahulovada Sutta</span></a><span data-dcnode-id="3314" instrument_node="">:</span></strong><span data-dcnode-id="3312" instrument_node=""> Teaching on Virtue.</span></li><span data-dcnode-id="3310" instrument_node="">
</span><li data-dcnode-id="3304"><strong data-dcnode-id="3306"><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accesstoinsight.org/tipitaka/an/an05/an05.028.than.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3309" instrument_node="">Samadhanga Sutta</span></a><span data-dcnode-id="3307" instrument_node="">:</span></strong><span data-dcnode-id="3305" instrument_node=""> Teaching on Concentration.</span></li><span data-dcnode-id="3303" instrument_node="">

</span><li data-dcnode-id="3290"><strong data-dcnode-id="3292"><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accesstoinsight.org/tipitaka/kn/snp/snp.1.08.amar.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3295" instrument_node="">Karaniya Metta Suta</span></a><span data-dcnode-id="3293" instrument_node="">:</span></strong><span data-dcnode-id="3291" instrument_node=""> The practice of loving-kindness.</span></li><span data-dcnode-id="3289" instrument_node="">

</span><h3 data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">The History of the Pāli Canon</span></h3><span data-dcnode-id="3284" instrument_node="">
</span><figure aria-describedby="caption-attachment-8136" class="wp-caption aligncenter" data-dcnode-id="3275" id="attachment_8136" style="width: 800px"><img alt="" class="size-full wp-image-8136 jetpack-lazy-image" data-dcnode-id="3283" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?resize=792%2C553&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?w=800&amp;ssl=1 800w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?resize=300%2C210&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?resize=768%2C537&amp;ssl=1 768w" data-recalc-dims="1" draggable="false" height="553" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg%3Fresize%3D792%252C553%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-8136" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?resize=792%2C553&amp;#038;ssl=1" alt="" width="792" height="553" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?w=800&amp;amp;ssl=1 800w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?resize=300%2C210&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Burmese-Pali_Manuscript._Wellcome_L0026547.jpg?resize=768%2C537&amp;amp;ssl=1 768w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3276" id="caption-attachment-8136"><span data-dcnode-id="3280" instrument_node="">A portion of the Burmese-Pali Tripitaka (</span><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABurmese-Pali_Manuscript._Wellcome_L0026547.jpg"><span data-dcnode-id="3279" instrument_node="">cc0 Wikimedia</span></a><span data-dcnode-id="3277" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="3274" instrument_node="">
</span><ol data-dcnode-id="3214"><span data-dcnode-id="3273" instrument_node="">
</span><li data-dcnode-id="3268"><span data-dcnode-id="3272" instrument_node="">During the</span><strong data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node=""> First Council</span></strong><span data-dcnode-id="3269" instrument_node=""> that occurred three to four months after the Buddha’s death, 500 senior monks (who were Arhats) met.&nbsp; Ānanda (the attendant of the Buddha) was the one who was tasked with specifying the correct teachings/sermons of the Buddha (Sūtra/Sutta).&nbsp; Another monk, Upali, took on the other task of setting the rules of discipline for the monastics (Sangha), which is the Vinaya.&nbsp; He was also the one, along with his pupils, who began the process of remembering and reciting the teachings. This began the long oral recitation tradition of the Buddha’s teachings. While we are dependent on the written word today, oral recitation of teachings was an art in the ancient world and an important role. Practices such as chanting also helped monastics to remember scripture (and for modern-day monastics and laypersons).</span></li><span data-dcnode-id="3267" instrument_node="">
</span><li data-dcnode-id="3262"><span data-dcnode-id="3266" instrument_node="">The </span><strong data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Second Council</span></strong><span data-dcnode-id="3263" instrument_node=""> occurred 100 years later with 700 monastic Arhats attending and was primarily focused on the Vinaya (rules of the monastics).</span></li><span data-dcnode-id="3261" instrument_node="">
</span><li data-dcnode-id="3254"><span data-dcnode-id="3260" instrument_node="">Around 244 BCE the </span><strong data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">Third Council</span></strong><span data-dcnode-id="3257" instrument_node=""> occurred with about a thousand Buddhist monks met for several months to debate the Dharma and the precepts and clarify these things.&nbsp; This work resulted in a new collection of teachings.&nbsp; </span><em data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">As a note, this is the time when the monastic community split.</span></em></li><span data-dcnode-id="3253" instrument_node="">
</span><li data-dcnode-id="3228"><span data-dcnode-id="3252" instrument_node="">It was not until the </span><strong data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Fourth Council,</span></strong><span data-dcnode-id="3249" instrument_node=""> which was believed to be in 29 BCE (during the reign of King Vattagamani) that around 500 monks started to write down the teachings for the first time in Sri Lanka and became the first </span><span data-dcnode-id="3247" style="font-size: 1.125rem;"><span data-dcnode-id="3248" instrument_node="">Pāli </span></span><span data-dcnode-id="3246" instrument_node="">Canon.&nbsp; &nbsp;This was due to several reasons, but primarily due to war and famine which would, if only the verbal recitation existed, have a precarious situation to the transmission of the Buddha’s teachings.&nbsp; The </span><span data-dcnode-id="3244" style="font-size: 1.125rem;"><span data-dcnode-id="3245" instrument_node="">Pāli </span></span><span data-dcnode-id="3243" instrument_node="">Canon is the only Canon that remains intact thanks to the stability of Sri Lanka throughout history.&nbsp; However, the other Tripitakas (written in Sanskrit) was in India where they were eventually all destroyed (along with the Buddhist schools) due to invasions, war, and other actions that removed Buddhism as a major religion there.&nbsp; However, some of the Tripitakas/scripture was brought to China by Monks and helped to form the Chinese Canon used by Mahāyāna Buddhism.
</span><ul data-dcnode-id="3230"><span data-dcnode-id="3242" instrument_node="">
</span><li data-dcnode-id="3237"><span data-dcnode-id="3241" instrument_node="">The original </span><span data-dcnode-id="3239" style="font-size: 1.125rem;"><span data-dcnode-id="3240" instrument_node="">Pāli </span></span><span data-dcnode-id="3238" instrument_node="">Canon that was written on palm leaves, is lost to history (likely due to the fragile nature of the leaves themselves).&nbsp; It spawned translations including into the Sanskrit language (which is the classical language of India) used by the early schools of Buddhism which formed their scripture (which included their own Tripitakas, or other collections).</span></li><span data-dcnode-id="3236" instrument_node="">
</span><li data-dcnode-id="3232"><strong data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">But this wasn’t the “only” Fourth Council.&nbsp;</span></strong><span data-dcnode-id="3233" instrument_node=""> There was another held in India around the first century, CE.&nbsp; This council was led by the ruler known as Kanishka (he ruled in the region which is modern-day Pakistan and Northern India) who loved the Dharma and wanted scripture which was not different.&nbsp; This council had about 500 monks as well and created their Canon (which may have been the first Sanskrit Canon).&nbsp; However, this council, and Canon, is not recognized by Theravāda.</span></li><span data-dcnode-id="3231" instrument_node="">
</span></ul><span data-dcnode-id="3229" instrument_node="">
</span></li><span data-dcnode-id="3227" instrument_node="">
</span><li data-dcnode-id="3216"><span data-dcnode-id="3226" instrument_node="">There was also a </span><strong data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Fifth Council</span></strong><span data-dcnode-id="3223" instrument_node="">, taking place in Burma in 1871, where thousands of monks inscribed the [</span><span data-dcnode-id="3221" style="font-size: 1.125rem;"><span data-dcnode-id="3222" instrument_node="">Pāli</span></span><span data-dcnode-id="3220" instrument_node="">] </span><strong data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Tipiṭaka&nbsp;</span></strong><span data-dcnode-id="3217" instrument_node="">onto marble.&nbsp; Finally, there was a Sixth Council taking place in Rangoon in 1954 with thousands of Theravāda monks.</span></li><span data-dcnode-id="3215" instrument_node="">
</span></ol><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3208"><span data-dcnode-id="3212" instrument_node="">While we may like to think of the Pāli canon as being complete, we can never really know.&nbsp; The original has long been lost to history (due to its fragile nature of being written on leaves), and it is always possible that some undiscovered artifacts may be found (similar to what occurred with the </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tricycle.org/magazine/whose-buddhism-truest/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3211" instrument_node="">Gandhārī</span></a><span data-dcnode-id="3209" instrument_node=""> texts).</span></p><span data-dcnode-id="3207" instrument_node="">
</span><h2 data-dcnode-id="3200"><span class="ez-toc-section" data-dcnode-id="3206" id="Chinese_Canon_Mahayana_Buddhism"></span><strong data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Chinese Canon (</span></strong><strong data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Mahāyāna Buddhism)</span></strong><span class="ez-toc-section-end" data-dcnode-id="3201"></span></h2><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">The Chinese Canon is the canon of Buddhism used primarily in the east-Asian countries of China, Taiwan, Japan, Korea, and Vietnam.</span></p><span data-dcnode-id="3196" instrument_node="">
</span><figure aria-describedby="caption-attachment-8528" class="wp-caption aligncenter" data-dcnode-id="3183" id="attachment_8528" style="width: 3300px"><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gumroad.com/l/BuddhismGraphics" rel="attachment noopener wp-att-8281 noreferrer" target="_blank"><img alt="" class="wp-image-8528 size-full jetpack-lazy-image" data-dcnode-id="3195" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=792%2C612&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?w=3300&amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=300%2C232&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=1024%2C791&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=768%2C593&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=1536%2C1187&amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=2048%2C1583&amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?w=2376&amp;ssl=1 2376w" data-recalc-dims="1" draggable="false" height="612" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg%3Fresize%3D792%252C612%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">&lt;img loading="lazy" class="wp-image-8528 size-full" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=792%2C612&amp;#038;ssl=1" alt="" width="792" height="612" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?w=3300&amp;amp;ssl=1 3300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=300%2C232&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=1024%2C791&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=768%2C593&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=1536%2C1187&amp;amp;ssl=1 1536w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?resize=2048%2C1583&amp;amp;ssl=1 2048w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2013/07/Buddhist-Scripture-Quick-Reference-Mahayana-2019-by-Alan-Peto.jpg?w=2376&amp;amp;ssl=1 2376w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="3184" id="caption-attachment-8528"><span data-dcnode-id="3191" instrument_node="">Zoom in to view the graphic, hover over image to find social media share buttons, and&nbsp;</span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gumroad.com/l/BuddhismGraphics" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3190" instrument_node="">click the image if you wish to donate and get a printable PDF version</span></a><span data-dcnode-id="3188" instrument_node="">.&nbsp; To view/share on&nbsp;</span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/204491639317995442" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3187" instrument_node="">Pinterest, click here</span></a><span data-dcnode-id="3185" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="3182" instrument_node="">
</span><div class="zilla-alert green" data-dcnode-id="3160"><span data-dcnode-id="3181" instrument_node=""> </span><strong data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Find the Chinese Canon Online:</span></strong><span data-dcnode-id="3178" instrument_node="">&nbsp; The entire Chinese Canon (and the different versions of it) has not been completely translated to English.&nbsp; However, there are several translation projects related to this.&nbsp; BDK’s Tripitaka Project has the most complete English translation of the </span><em data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Taishō</span></em><span data-dcnode-id="3175" instrument_node=""> edition with </span><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bdkamerica.org/bdk-tripitaka-digital-downloads" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3174" instrument_node="">free PDF downloads</span></a><span data-dcnode-id="3172" instrument_node=""> / </span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bdkamerica.org/catalog-tripitaka" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3171" instrument_node="">Index</span></a><span data-dcnode-id="3169" instrument_node="">, and you can also refer to </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lapislazulitexts.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3168" instrument_node="">Lapis Luzuli Texts</span></a><span data-dcnode-id="3166" instrument_node="">, </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//suttacentral.net/sa1-100" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3165" instrument_node="">SuttaCentral</span></a><span data-dcnode-id="3163" instrument_node="">, and </span><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ntireader.org/taisho/taisho.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3162" instrument_node="">FGS’s NTI Reader</span></a></div><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3140"><span data-dcnode-id="3158" instrument_node="">While Theravāda Buddhism’s </span><span data-dcnode-id="3156" style="font-size: 1.125rem;"><span data-dcnode-id="3157" instrument_node="">Pāli </span></span><span data-dcnode-id="3155" instrument_node="">Canon is the scriptural canon from one of the early schools of Buddhism, this does not mean it is the </span><em data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">only</span></em><span data-dcnode-id="3152" instrument_node=""> Canon that contains </span><em data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">early</span></em><span data-dcnode-id="3149" instrument_node=""> Buddhist scripture and teachings.&nbsp; The Chinese Canon, which is used in Mahāyāna Buddhism of eastern-Asia (in China, Japan, Korea, and Vietnam), derived much of its early scripture from some of the many schools of early Buddhism that existed in India </span><span data-dcnode-id="3147" style="font-size: inherit;"><span data-dcnode-id="3148" instrument_node="">(33 schools </span></span><a data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2GZOdy8" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="3146" instrument_node="">according to André&nbsp;Bareau</span></a><span data-dcnode-id="3143" style="font-size: inherit;"><span data-dcnode-id="3144" instrument_node="">).&nbsp; </span></span><span data-dcnode-id="3141" style="font-size: inherit;"><span data-dcnode-id="3142" instrument_node="">The early schools of Buddhism in India also had their own scriptural canons which were written in Sanskrit and called Tripitakas.</span></span></p><span data-dcnode-id="3139" instrument_node="">
</span><ol data-dcnode-id="3039"><span data-dcnode-id="3138" instrument_node="">
</span><li data-dcnode-id="3125"><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alanpeto.com/buddhism/understanding-mahayana-theravada/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3137" instrument_node="">While there are fundamental differences between Theravāda and Mahāyāna Buddhism’s</span></a><span data-dcnode-id="3135" instrument_node=""> understanding of the teachings and subsequent practices, </span><strong data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">much of the sermons (sayings) of the Buddha (Sūtra) are virtually identical in doctrine or storytelling</span></strong><span data-dcnode-id="3132" instrument_node=""> despite translation differences and organization in the Canons.&nbsp; </span><strong data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Core concepts</span></strong><span data-dcnode-id="3129" instrument_node="">, such as the Noble Eightfold Path and the Four Noble Truths, are part of the Chinese Canon just like they are found in Theravāda’s </span><span data-dcnode-id="3127" style="font-size: 1.125rem;"><span data-dcnode-id="3128" instrument_node="">Pāli </span></span><span data-dcnode-id="3126" instrument_node="">Canon.</span></li><span data-dcnode-id="3124" instrument_node="">
</span><li data-dcnode-id="3085"><strong data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">The Chinese Canon is often called the&nbsp;Dazangjing&nbsp;(which means the ‘Great Scripture Store’).&nbsp;</span></strong><span data-dcnode-id="3121" instrument_node=""> The Canon may also be referred to in various ways such as the </span><em data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">[Great]&nbsp;Chinese Tripitaka</span></em><span data-dcnode-id="3118" instrument_node="">&nbsp;or&nbsp;</span><em data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">East Asian Buddhist Canon.&nbsp;&nbsp;</span></em><span data-dcnode-id="3114" style="font-size: inherit;"><span data-dcnode-id="3115" instrument_node="">Beyond China, there are several editions (that are derived from the Chinese Canon)</span></span><span data-dcnode-id="3113" instrument_node="">&nbsp;such as the&nbsp;</span><i data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Taishō&nbsp;</span></i><span data-dcnode-id="3104" style="font-size: inherit;"><span data-dcnode-id="3110" instrument_node="">Tripitaka (Japan) or </span><em data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Tripitaka Koreana </span></em><span data-dcnode-id="3107" instrument_node="">(Korea)</span><em data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">.&nbsp;&nbsp;</span></em></span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lapislazulitexts.com/articles/chinese-buddhist-canons" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3103" instrument_node="">There are also</span></a><span data-dcnode-id="3101" instrument_node="">&nbsp;other versions/editions of the Chinese Canon (beyond the </span><em data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Taishō </span></em><span data-dcnode-id="3098" instrument_node="">edition and </span><em data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Tripitaka Koreana</span></em><span data-dcnode-id="3095" instrument_node="">) such as the&nbsp;</span><em data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Yongle Northern Tripiṭaka</span></em><span data-dcnode-id="3092" instrument_node=""> (most important version in the Ming dynasty),&nbsp;</span><em data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Jiaxing Tripiṭaka</span></em><span data-dcnode-id="3089" instrument_node=""> (a Qing dynasty version that contained over 500 works not found in another collection), and the&nbsp;</span><em data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Qianlong Tripiṭaka</span></em><span data-dcnode-id="3086" instrument_node=""> (last version of the Chinese canons printed in the classical style)</span></li><span data-dcnode-id="3084" instrument_node="">
</span><li data-dcnode-id="3058"><span data-dcnode-id="3083" instrument_node="">Compared to the </span><span data-dcnode-id="3081" style="font-size: 1.125rem;"><span data-dcnode-id="3082" instrument_node="">Pāli </span></span><span data-dcnode-id="3080" instrument_node="">Canon, </span><strong data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">this Canon is loosely canonical with the various schools in Mahāyāna Buddhism.</span></strong><span data-dcnode-id="3077" instrument_node="">&nbsp; While most schools in Mahāyāna Buddhism generally agree and acknowledge the Canon, they typically only work with parts of it.&nbsp; This includes selective emphasizing and/or using specific Sūtras and/or commentaries/analysis.
</span><ol data-dcnode-id="3060"><span data-dcnode-id="3076" instrument_node="">
</span><li data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">As part of daily practice or religious services, typically Mahāyāna scriptures (Sūtra) are chanted or recited.&nbsp;</span></li><span data-dcnode-id="3073" instrument_node="">
</span><li data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">A good way to imagine the Chinese Canon being used in Mahāyāna Buddhism is to visualize a public (or private) library in your hometown.&nbsp; The reader (in this case, a particular school of Mahāyāna Buddhism) selects the books they want to use on the path towards enlightenment.&nbsp; While the reader (once again, we are referencing a particular school of Mahāyāna Buddhism) acknowledges the “Library” and its contents as authentic, they are only checking out certain “books” to use.&nbsp; The “Library” is always there should the reader (such as a layperson or monastic) want to explore and learn more.</span></li><span data-dcnode-id="3070" instrument_node="">
</span><li data-dcnode-id="3062"><span data-dcnode-id="3069" instrument_node="">While we generally use the term “Mahāyāna Buddhism” and “East-Asian Buddhism” here because all use Mahāyāna scripture in some way, it is actually more country-specific.&nbsp; For example Chinese Buddhism (also practiced in Taiwan), Japanese Buddhism, Korean Buddhism, and Vietnamese Buddhism.&nbsp; To give an example of this:&nbsp; </span><em data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Zen</span></em><span data-dcnode-id="3066" instrument_node=""> in Japan originated from the original </span><em data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Ch’an</span></em><span data-dcnode-id="3063" instrument_node=""> in China.&nbsp; Despite being similar, they are also different.&nbsp; Chinese Buddhism also incorporates two schools (Pure Land and Ch’an) as part of the practice, whereas in Japan they are distinct schools, and several are available.&nbsp;&nbsp;</span></li><span data-dcnode-id="3061" instrument_node="">
</span></ol><span data-dcnode-id="3059" instrument_node="">
</span></li><span data-dcnode-id="3057" instrument_node="">
</span><li data-dcnode-id="3041"><strong data-dcnode-id="3052"><span data-dcnode-id="3056" instrument_node="">The </span><em data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Chinese Canon</span></em><span data-dcnode-id="3053" instrument_node="">&nbsp;is made up of the traditional ‘three collections’ (Tripitaka) of scripture</span></strong><span data-dcnode-id="3051" instrument_node=""> (this same general structure can also be found in the </span><span data-dcnode-id="3049" style="font-size: 1.125rem;"><span data-dcnode-id="3050" instrument_node="">Pāli </span></span><span data-dcnode-id="3048" instrument_node="">Canon, known as a Tipiṭaka), but also contains</span><span data-dcnode-id="3046" style="font-size: 1.125rem;"><span data-dcnode-id="3047" instrument_node="">&nbsp;</span></span><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//encyclopediaofbuddhism.org/wiki/Chinese_Buddhist_Canon" rel="noopener noreferrer" style="font-size: 1.125rem;" target="_blank"><span data-dcnode-id="3045" instrument_node="">various other texts which are included in this large canon</span></a><span data-dcnode-id="3042" style="font-size: 1.125rem;"><span data-dcnode-id="3043" instrument_node=""> such as Tantras (Tantric school of Buddhism), translations and commentaries on the Āgamas and Mahāyāna scriptures (the Mahāyāna scriptures are what make the Chinese Canon a “Mahāyāna” Canon), translations of commentaries on Yogacara and Madhyamaka, Chinese commentaries on the various parts of the canon, Chinese sectarian writings, and histories and biographies.&nbsp; Additionally, there are encyclopedias, dictionaries, non-Buddhist doctrines, and catalogs of various Chinese Canons to round out the entire canon.&nbsp; However, for most laypersons, they will unlikely be looking at anything other than the Sūtra (Āgamas)/Mahāyāna Sūtras as part of their practice.</span></span></li><span data-dcnode-id="3040" instrument_node="">
</span></ol><span data-dcnode-id="3038" instrument_node="">
</span><h3 data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Structure of the Canon</span></h3><span data-dcnode-id="3035" instrument_node="">
</span><p data-dcnode-id="3027"><span data-dcnode-id="3034" instrument_node="">Just like the </span><span data-dcnode-id="3032" style="font-size: 1.125rem;"><span data-dcnode-id="3033" instrument_node="">Pāli </span></span><span data-dcnode-id="3031" instrument_node="">Canon, the Chinese Canon also contains a “</span><strong data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Tripitaka</span></strong><span data-dcnode-id="3028" instrument_node="">“:</span></p><span data-dcnode-id="3026" instrument_node="">
</span><ol data-dcnode-id="2994"><span data-dcnode-id="3025" instrument_node="">
</span><li data-dcnode-id="3016"><strong data-dcnode-id="3022"><strong data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Vinaya </span></strong></strong><span data-dcnode-id="3021" instrument_node="">contains the regulatory framework (precepts, rules, discipline, ordination, rituals, etiquette and manners, training, etc.) followed by monks and nuns in a monastic community (</span><i data-dcnode-id="3019" style="font-size: inherit;"><span data-dcnode-id="3020" instrument_node="">saṅgha</span></i><span data-dcnode-id="3017" style="font-size: inherit;"><span data-dcnode-id="3018" instrument_node="">).</span></span></li><span data-dcnode-id="3015" instrument_node="">
</span><li data-dcnode-id="3005"><strong data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Sūtra</span></strong><span data-dcnode-id="3012" instrument_node="">&nbsp;(Sermons of the Buddha), contain the Buddha’s discourses (Āgamas), the Jātaka&nbsp;tales (birth stories) of the Buddha, and Mahāyāna scriptures (Sūtras).&nbsp; Note that the Mahāyāna&nbsp;Sūtras are </span><em data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">not</span></em><span data-dcnode-id="3009" instrument_node=""> the same as the Āgamas.&nbsp; The Āgamas (historical discourses and sermons of the Buddha) are similar (but not identical) to Theravāda’s Sutta Pitaka (Nikāyas) in the </span><span data-dcnode-id="3007" style="font-size: 1.125rem;"><span data-dcnode-id="3008" instrument_node="">Pāli </span></span><span data-dcnode-id="3006" instrument_node="">Canon.&nbsp; The Mahāyāna scriptures are what makes the Chinese Canon a “Mahāyāna” Branch of Buddhism Canon and are considered the most important part of the Canon to many schools/Buddhists.</span></li><span data-dcnode-id="3004" instrument_node="">
</span><li data-dcnode-id="2996"><strong data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Abhidharma</span></strong><span data-dcnode-id="3001" instrument_node=""> provides an analysis of the Dharma (teachings) known as the “Collection of Treatises”.&nbsp; Although there are some similarities, </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnreligions.com/the-chinese-mahayana-buddhist-canon-450028" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3000" instrument_node="">the analysis of time and matter is different than what is found in the Pāli Canon’s Abhidhamma</span><span data-dcnode-id="2998" style="font-size: inherit;"><span data-dcnode-id="2999" instrument_node="">.</span></span></a></li><span data-dcnode-id="2995" instrument_node="">
</span></ol><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2980"><span data-dcnode-id="2992" instrument_node="">However, the Chinese Canon eventually included texts that went </span><strong data-dcnode-id="2988"><em data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">beyond</span></em><span data-dcnode-id="2989" instrument_node=""> </span></strong><span data-dcnode-id="2987" instrument_node="">the typical Tripitaka structure.&nbsp; You can read more about that below in the </span><em data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Taishō</span></em><span data-dcnode-id="2984" instrument_node=""> section of this article.&nbsp; The </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Taishō</span></em><span data-dcnode-id="2981" instrument_node=""> is the standard edition of the Chinese Canon that is currently being used and contains numerous additional items (like a library).&nbsp;&nbsp;</span></p><span data-dcnode-id="2979" instrument_node="">
</span><h3 data-dcnode-id="2974"><span data-dcnode-id="2978" instrument_node="">The Āgamas (</span><strong data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Sūtra</span></strong><span data-dcnode-id="2975" instrument_node="">)</span></h3><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2968"><i data-dcnode-id="2970"><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">The Āgamas</span></strong></i><span data-dcnode-id="2969" instrument_node="">, which is also used to describe the portion of the Sūtra related to the discourses and sermons of the Buddha, contains the following:</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" style="font-size: 1.125rem;"></span></p><div class="zilla-alert yellow" data-dcnode-id="2953"><span data-dcnode-id="2964" instrument_node=""> </span><strong data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Note:&nbsp;</span></strong><span data-dcnode-id="2961" instrument_node=""> While the </span><span data-dcnode-id="2959" style="font-size: 1.125rem;"><span data-dcnode-id="2960" instrument_node="">Pāli </span></span><span data-dcnode-id="2958" instrument_node="">Canon has five groupings of Suttas, the Chinese Canon contains four groupings of Sūtras (while maintaining the same general composition).&nbsp; The word/term “Agama” refers to the scripture of any of the religions coming from India and is not specific to Buddhism, or Mahāyāna.&nbsp; As described previously, Theravāda’s </span><span data-dcnode-id="2956" style="font-size: 1.125rem;"><span data-dcnode-id="2957" instrument_node="">Pāli </span></span><span data-dcnode-id="2955" instrument_node="">Canon used the term “Nikaya” when creating their Canon.&nbsp; Additionally, the Chinese Canon contains Mahāyāna Sūtras (which are separate from the Agamas).</span><span data-dcnode-id="2954" style="font-size: 1.125rem;"></span></div><span data-dcnode-id="2952" instrument_node=""> </span><p data-dcnode-id="2951"></p><span data-dcnode-id="2950" instrument_node="">
</span><ol data-dcnode-id="2854"><span data-dcnode-id="2949" instrument_node="">
</span><li data-dcnode-id="2930"><b data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Dīrgha Āgama</span></b><b data-dcnode-id="2944"><b data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">:&nbsp; </span></b></b><span data-dcnode-id="2943" instrument_node="">There are 30 “long” discourses in this Āgama including the Sūtra of Preaching Travels </span><span data-dcnode-id="2941" style="font-size: inherit;"><span data-dcnode-id="2942" instrument_node="">which describes the Buddha’s travels and discourses the year before his death, and the </span></span><span data-dcnode-id="2940" instrument_node="">World Sūtra </span><span data-dcnode-id="2938" style="font-size: inherit;"><span data-dcnode-id="2939" instrument_node="">which explains Buddhist cosmology. </span></span><span data-dcnode-id="2937" instrument_node="">(Corresponds to the Dīgha Nikāya of the </span><span data-dcnode-id="2935" style="font-size: 1.125rem;"><span data-dcnode-id="2936" instrument_node="">Pāli </span></span><span data-dcnode-id="2934" instrument_node="">Canon).&nbsp; Some translations can be </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agamaresearch.dila.edu.tw/dirgha-agama"><span data-dcnode-id="2933" instrument_node="">found here</span></a><span data-dcnode-id="2931" instrument_node="">.</span></li><span data-dcnode-id="2929" instrument_node="">
</span><li data-dcnode-id="2918"><b data-dcnode-id="2926"><b data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Madhyama Āgama:&nbsp; </span></b></b><span data-dcnode-id="2925" instrument_node="">There are 222 “middle-length” discourses in this Āgama which explain the basic doctrines of Buddhism such as the Four Noble Truths and the Noble Eightfold Path. (Corresponds to the Majjhima Nikāya of the Pāli Canon).&nbsp; Translations of the </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bdkamerica.org/system/files/pdf/dBET_T0026_MadhyamaAgama1_2013_0.pdf%3Ffile%3D1%26type%3Dnode%26id%3D495"><span data-dcnode-id="2924" instrument_node="">first 71 Sutras can be found here</span></a><span data-dcnode-id="2922" instrument_node=""> and </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buddhismuskunde.uni-hamburg.de/pdf/5-personen/analayo/mastudies.pdf"><span data-dcnode-id="2921" instrument_node="">others here</span></a><span data-dcnode-id="2919" instrument_node="">.</span></li><span data-dcnode-id="2917" instrument_node="">
</span><li data-dcnode-id="2903"><b data-dcnode-id="2914"><b data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Samyukta Āgama:&nbsp; </span></b></b><span data-dcnode-id="2913" instrument_node="">There are 1,300 “short” sūtras </span><span data-dcnode-id="2911" style="font-size: inherit;"><span data-dcnode-id="2912" instrument_node="">in this Āgama, known as the “connected” or “miscellaneous” discourses.&nbsp; The </span></span><span data-dcnode-id="2910" instrument_node="">sūtras </span><span data-dcnode-id="2908" style="font-size: inherit;"><span data-dcnode-id="2909" instrument_node="">discuss a variety of doctrines such as Dukkha, emptiness, impermanence, non-self, and the Noble Eightfold Path. </span></span><span data-dcnode-id="2907" instrument_node="">(Corresponds to the Samyutta Nikāya of the Pāli Canon).&nbsp; Some translations can be </span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agamaresearch.dila.edu.tw/sa%25E1%25B9%2583yukta-agama-3"><span data-dcnode-id="2906" instrument_node="">found here</span></a><span data-dcnode-id="2904" instrument_node="">.</span></li><span data-dcnode-id="2902" instrument_node="">
</span><li data-dcnode-id="2888"><b data-dcnode-id="2899" style="font-size: inherit;"><b data-dcnode-id="2900" style="font-size: inherit;"><span data-dcnode-id="2901" instrument_node="">Ekottara Āgama:&nbsp; </span></b></b><span data-dcnode-id="2898" instrument_node="">The numbered discourses in this Āgama are organized numerically and incrementally, which gives it the title “Increasing by One”.&nbsp; There are 471 short sūtras </span><span data-dcnode-id="2896" style="font-size: inherit;"><span data-dcnode-id="2897" instrument_node="">in fifty-two sections.&nbsp; The </span></span><span data-dcnode-id="2895" instrument_node="">sūtras </span><span data-dcnode-id="2893" style="font-size: inherit;"><span data-dcnode-id="2894" instrument_node="">are grouped by the number “ones” to “elevens”.&nbsp; </span></span><span data-dcnode-id="2892" instrument_node="">(Corresponds to the Anguttara Nikāya of the Pāli Canon, although there are differences).&nbsp; Some translations can be </span><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agamaresearch.dila.edu.tw/ekottarika-agama-2"><span data-dcnode-id="2891" instrument_node="">found here</span></a><span data-dcnode-id="2889" instrument_node="">.</span></li><span data-dcnode-id="2887" instrument_node="">
</span><li data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Unlike the Pāli&nbsp;Canon’s Khuddaka Nikāya, there is not a fifth Āgama for miscellaneous texts. However, texts such as the Jātaka&nbsp;Tales (prior lives/birth stories of the Buddha), and other texts, may be found in other sections of the canon.</span></li><span data-dcnode-id="2884" instrument_node="">
</span><li data-dcnode-id="2856"><strong data-dcnode-id="2882" style="font-size: inherit;"><span data-dcnode-id="2883" instrument_node="">What About the Dhammapada?&nbsp;</span></strong><span data-dcnode-id="2880" style="font-size: inherit;"><span data-dcnode-id="2881" instrument_node=""> One of my personal top questions used to be “Is the </span></span><span data-dcnode-id="2879" instrument_node="">Dhammapada, which is found in the </span><span data-dcnode-id="2877" style="font-size: 1.125rem;"><span data-dcnode-id="2878" instrument_node="">Pāli </span></span><span data-dcnode-id="2876" instrument_node="">Canon, in the Chinese Canon as well?”&nbsp; The short answer is “yes”.&nbsp; &nbsp;The most well-known and translated piece of Theravāda Buddhist scripture containing the sayings of the Buddha is the Dhammapada which is found in the Khuddaka </span><span data-dcnode-id="2874" style="font-size: inherit;"><span data-dcnode-id="2875" instrument_node="">Nikāya </span></span><span data-dcnode-id="2873" instrument_node="">(note:&nbsp; in the&nbsp;</span><span data-dcnode-id="2871" style="font-size: inherit;"><span data-dcnode-id="2872" instrument_node="">Āgamas there is not a corresponding section as the scripture was grouped differently during the creation of the Canon).&nbsp;&nbsp;</span></span><span data-dcnode-id="2869" style="font-size: inherit;"><span data-dcnode-id="2870" instrument_node="">While other sermons of the Buddha may be lengthy in their traditional structure, the Dhammapada presents bite-sized (or what I like to call “Twitter-sized”) sayings, which were likely due to the need to remember and recite them by monastics throughout the centuries.&nbsp; Within the Chinese Canon, Taishō edition, we can also find a version of the Dhammapada (a </span></span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bdkamerica.org/system/files/pdf/dBET_Alpha_T0211_ScripturalTextVersesofDoctrine_1999.pdf%3Ffile%3D1%26type%3Dnode%26id%3D465" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="2868" instrument_node="">translated version is available from BDK by clicking here</span></a><span data-dcnode-id="2865" style="font-size: inherit;"><span data-dcnode-id="2866" instrument_node="">, and as part of their </span></span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bdkamerica.org/system/files/pdf/dBET_Alpha_Buddha-Dharma_2003_0.pdf" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="2864" instrument_node="">Buddha-Dharma book by clicking here</span></a><span data-dcnode-id="2861" style="font-size: inherit;"><span data-dcnode-id="2862" instrument_node="">).&nbsp; However, there are </span></span><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Z7tjDT" rel="noopener noreferrer" style="font-size: inherit;" target="_blank"><span data-dcnode-id="2860" instrument_node="">plenty of translated versions of the Dhammapada from Theravāda’s Pāli Canon in books that include commentary and are easily available</span></a><span data-dcnode-id="2857" style="font-size: inherit;"><span data-dcnode-id="2858" instrument_node="">.</span></span></li><span data-dcnode-id="2855" instrument_node="">
</span></ol><span data-dcnode-id="2853" instrument_node="">
</span><h3 data-dcnode-id="2848"><strong data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Mahāyāna </span></strong><strong data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Sūtras</span></strong></h3><span data-dcnode-id="2847" instrument_node="">
</span><figure aria-describedby="caption-attachment-9321" class="wp-caption alignnone" data-dcnode-id="2838" id="attachment_9321" style="width: 2000px"><img alt="eighth-chapter-of-the-or_13926" class="alignnone size-full wp-image-9321 jetpack-lazy-image" data-dcnode-id="2846" data-lazy-sizes="(max-width: 792px) 100vw, 792px" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=792%2C439&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?w=2000&amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=300%2C166&amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=1024%2C568&amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=768%2C426&amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=1536%2C852&amp;ssl=1 1536w" data-recalc-dims="1" draggable="false" height="439" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg%3Fresize%3D792%252C439%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="792"><noscript data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-9321" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=792%2C439&amp;#038;ssl=1" alt="eighth-chapter-of-the-or_13926" width="792" height="439" srcset="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?w=2000&amp;amp;ssl=1 2000w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=300%2C166&amp;amp;ssl=1 300w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=1024%2C568&amp;amp;ssl=1 1024w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=768%2C426&amp;amp;ssl=1 768w, https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/02/eighth-chapter-of-the-or_13926.jpg?resize=1536%2C852&amp;amp;ssl=1 1536w" sizes="(max-width: 792px) 100vw, 792px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2839" id="caption-attachment-9321"><span data-dcnode-id="2843" instrument_node="">The Lotus Sūtra, known in Sanskrit as Saddharma Puṇḍarīka Sūtra or ‘Sūtra of the Lotus of the Wonderful Law,’ is one of the most influential scriptures of Mahāyāna Buddhism in East Asia. (Source: </span><a data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/collection-items/lotus-sutra-eighth-chapter"><span data-dcnode-id="2842" instrument_node="">The British Library</span></a><span data-dcnode-id="2840" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2832"><span data-dcnode-id="2836" instrument_node="">There are several </span><strong data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Mahāyāna Sūtras </span></strong><span data-dcnode-id="2833" instrument_node="">that are important, and widely read and chanted, in Mahāyāna Buddhism.&nbsp; The Mahāyāna Sūtras are what makes the Chinese Canon a Mahāyāna Branch of Buddhism Canon.&nbsp;</span></p><span data-dcnode-id="2831" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">You will likely be using some, or all, of these Sūtras more than you would anything else in your practice.&nbsp; This is because, in the Mahāyāna tradition, these Sūtras can be said to contain the essence of all the Buddha’s teachings.&nbsp; They can also help a practitioner to use them almost as a meditative tool through study and insight in order to gain awakening.</span></p><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Click the titles in the following lists to read the Sūtras.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><ol data-dcnode-id="2765"><span data-dcnode-id="2824" instrument_node="">
</span><li data-dcnode-id="2806"><span data-dcnode-id="2823" instrument_node="">Some of the&nbsp;</span><b data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">popular Sūtras </span></b><span data-dcnode-id="2820" instrument_node="">in Mahāyāna are the </span><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Heart-Sutra.pdf" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Heart</span></b></a><span data-dcnode-id="2816" instrument_node="">, </span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Diamond-Sutra.pdf" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Diamond</span></b></a><span data-dcnode-id="2812" instrument_node="">, and </span><b data-dcnode-id="2808"><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.english.fgs2.ca/sites/default/files/pdf/The%2520Lotus%2520Sutra.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2811" instrument_node="">Lotus</span></a><span data-dcnode-id="2809" instrument_node=""> </span></b><span data-dcnode-id="2807" instrument_node="">Sūtras.</span></li><span data-dcnode-id="2805" instrument_node="">
</span><li data-dcnode-id="2780"><span data-dcnode-id="2804" instrument_node="">Some sutras that influential with&nbsp;</span><b data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Chán/Zen </span></b><span data-dcnode-id="2801" instrument_node="">include the&nbsp; </span><strong data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Decent into Lanka</span></strong><span data-dcnode-id="2798" instrument_node=""> (</span><b data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Lankavatara)</span></b><span data-dcnode-id="2795" instrument_node="">, </span><a data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.english.fgs2.ca/sites/default/files/pdf/The%2520Lotus%2520Sutra.pdf" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Lotus</span></b></a><span data-dcnode-id="2791" instrument_node="">,&nbsp;</span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Diamond-Sutra.pdf" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Diamond</span></b></a><span data-dcnode-id="2787" instrument_node="">, and </span><strong data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Flower Garland</span></strong><span data-dcnode-id="2784" instrument_node=""> (</span><b data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">Avatamsaka)</span></b><span data-dcnode-id="2781" instrument_node=""> Sūtras.</span></li><span data-dcnode-id="2779" instrument_node="">
</span><li data-dcnode-id="2767"><b data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Pure Land Buddhism: </span></b><span data-dcnode-id="2776" instrument_node="">Some of the sūtras used are the </span><b data-dcnode-id="2772"><a data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Amitabha-Sutra.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2775" instrument_node="">Amitabha (Shorter and Longer)</span></a><span data-dcnode-id="2773" instrument_node=""> </span></b><span data-dcnode-id="2771" instrument_node="">and </span><b data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Meditation </span></b><span data-dcnode-id="2768" instrument_node="">sūtras.</span></li><span data-dcnode-id="2766" instrument_node="">
</span></ol><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2763" instrument_node="">The following are just a </span><i data-dcnode-id="2759"><u data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">few</span></u><span data-dcnode-id="2760" instrument_node=""> </span></i><span data-dcnode-id="2758" instrument_node="">of the many Mahāyāna Sūtras:</span></p><span data-dcnode-id="2756" instrument_node="">
</span><ol data-dcnode-id="2532"><span data-dcnode-id="2755" instrument_node="">
</span><li data-dcnode-id="2738"><b data-dcnode-id="2751"><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Amitabha-Sutra.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2754" instrument_node="">Amitabha</span></a><span data-dcnode-id="2752" instrument_node=""> [Shorter] </span></b><span data-dcnode-id="2750" instrument_node="">(Sukhāvatīvyūha Sūtra):&nbsp; The blessings and virtues of </span><b data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Amitabha Buddha</span></b><span data-dcnode-id="2747" instrument_node="">, his </span><b data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Pure Land </span></b><i data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">(Sukhāvatī)</span></i><span data-dcnode-id="2742" instrument_node="">, and </span><b data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">rebirth</span></b><span data-dcnode-id="2739" instrument_node="">.</span></li><span data-dcnode-id="2737" instrument_node="">
</span><li data-dcnode-id="2721"><b data-dcnode-id="2733"><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Amitabha-Sutra.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2736" instrument_node="">Amitabha</span></a><span data-dcnode-id="2734" instrument_node=""> [Longer] </span></b><span data-dcnode-id="2732" instrument_node="">(Sukhāvatīvyūha Sūtra):&nbsp; Explains </span><b data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">cause and effect </span></b><i data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">(Karma)</span></i><span data-dcnode-id="2727" instrument_node="">, and describes </span><b data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">the Western Pure Land</span></b><span data-dcnode-id="2724" instrument_node=""> </span><i data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">(Sukhāvatī).</span></i></li><span data-dcnode-id="2720" instrument_node="">
</span><li data-dcnode-id="2710"><b data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Brahma Net </span></b><span data-dcnode-id="2717" instrument_node="">(Brahmajāla Sūtra): The </span><b data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Ten Major Precepts </span></b><span data-dcnode-id="2714" instrument_node="">of Mahayana followers and </span><b data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">48 Minor Precepts for Bodhisattvas </span></b><span data-dcnode-id="2711" instrument_node="">to follow on the path.</span></li><span data-dcnode-id="2709" instrument_node="">
</span><li data-dcnode-id="2680"><b data-dcnode-id="2705"><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fgsitc.org/wp-content/uploads/2017/11/Diamond-Sutra.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2708" instrument_node="">Diamond</span></a><span data-dcnode-id="2706" instrument_node=""> </span></b><span data-dcnode-id="2704" instrument_node="">(Vajracchedikā Prajñāpāramitā Sūtra): The Buddha teaches how to cut through </span><b data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">afflictions</span></b><span data-dcnode-id="2701" instrument_node="">, </span><b data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">ignorance</span></b><span data-dcnode-id="2698" instrument_node="">, </span><b data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">delusion</span></b><span data-dcnode-id="2695" instrument_node="">, or </span><b data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">illusion</span></b><span data-dcnode-id="2692" instrument_node=""> through the </span><b data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">perfection of insight and wisdom </span></b><span data-dcnode-id="2689" instrument_node="">(Prajñāpāramitā). </span><span data-dcnode-id="2681" style="font-size: 1.125rem;"><span data-dcnode-id="2688" instrument_node="">This Sūtra is about the </span><strong data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">emptiness</span></strong><span data-dcnode-id="2685" instrument_node=""> of all phenomena, </span><strong data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">wisdom</span></strong><span data-dcnode-id="2682" instrument_node="">, perception, and non-attachment. It is considered an extremely important Sūtra by Chan Buddhists.&nbsp;&nbsp;</span></span></li><span data-dcnode-id="2679" instrument_node="">
