</span></blockquote><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2034" instrument_node="">One of the most common statements is that the </span><span data-dcnode-id="2032" style="font-size: 1.125rem;"><span data-dcnode-id="2033" instrument_node="">Pāli </span></span><span data-dcnode-id="2031" instrument_node="">Canon of Theravāda Buddhism is the only true scripture of Buddhism because it is the closest to that of early Buddhism, and of the Buddha’s teachings.&nbsp; While the </span><span data-dcnode-id="2029" style="font-size: 1.125rem;"><span data-dcnode-id="2030" instrument_node="">Pāli </span></span><span data-dcnode-id="2028" instrument_node="">Canon is the only existing canon of an early Buddhist school that contains its own works (although it is difficult to call it complete, as new </span><span data-dcnode-id="2026" style="font-size: 1.125rem;"><span data-dcnode-id="2027" instrument_node="">Pāli may be discovered in the future)</span></span><span data-dcnode-id="2025" instrument_node="">, it was not the only canon.&nbsp; While not all the canons of the many schools survived in any form, some did make their way into the Chinese Canon, and the Tibetan Canon.&nbsp; While not the ‘complete’ canons of those other early Buddhist schools, the doctrine between all canons generally is the same.</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">Steven Collins wrote at the end of his article “</span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/document/147317582/On-the-Very-Idea-of-the-Pali-Canon-Collins-CCRS-1990" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2021" instrument_node="">On the very idea of the Pali canon</span></a><span data-dcnode-id="2019" instrument_node="">” in the Journal of the Pali Text Society:</span></p><span data-dcnode-id="2017" instrument_node="">
</span><blockquote data-dcnode-id="2000"><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2015" instrument_node="">“…suggests that the actual importance of what we know as the Pali Canon has not lain in the specific texts collected in that list, but rather the </span><em data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">idea</span></em><span data-dcnode-id="2012" instrument_node=""> of such a collection, the idea that one lineage has the definite list of </span><em data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">buddha-vacana.&nbsp; </span></em><span data-dcnode-id="2009" instrument_node="">So </span><em data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">the</span></em><span data-dcnode-id="2006" instrument_node=""> Pali Canon should be seen as just&nbsp;</span><em data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">a</span></em><span data-dcnode-id="2003" instrument_node=""> ‘canon’ (in one sense of that word) in Pali, one amongst others.”</span></p><span data-dcnode-id="2001" instrument_node="">
</span></blockquote><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">That’s important to note.&nbsp; We should not take one canon as ‘authoritative’ for all of Buddhism.&nbsp; The canons are reflective of the schools of Buddhism.&nbsp; Additionally, we are finding that, especially in the scholarly world, the Buddhist scripture is seen as historically not complete as new things are being discovered.&nbsp;</span></p><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1995" instrument_node="">Mr. Collins included in that article that there was no such thing as a ‘closed’ canon in the Buddha’s lifetime, but that eventually did come to have the ‘sense of a closed and fixed Canon’.&nbsp; However, he noted that </span><em data-dcnode-id="1990"><span data-dcnode-id="1994" instrument_node="">“Originally, then, neither p</span><span data-dcnode-id="1992" style="font-size: 1.125rem;"><span data-dcnode-id="1993" instrument_node="">āli</span></span><span data-dcnode-id="1991" instrument_node=""> nor Tipitaka referred to a closed canon.”</span></em><span data-dcnode-id="1989" instrument_node="">.&nbsp; I mention this because we have seen the Chinese canon be a living canon that was open, rather than closed, which causes criticism that by doing so it makes it less legitimate.&nbsp; Again, each canon is reflective of that school of Buddhism and should be understood as such.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Collins also stated that there were at least three different periods of Theravāda, so it is unclear if the canon as we know it now was what was used during that time:</span></p><span data-dcnode-id="1984" instrument_node="">
</span><blockquote data-dcnode-id="1979"><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">…we cannot know the relation between ‘the canon’ as we now have it and the canon as it was being transmitted at this time; still less can we know that this canon was thought of in the closed, exclusivist sense.</span></p><span data-dcnode-id="1980" instrument_node="">
</span></blockquote><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1971"><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tricycle.org/magazine/whose-buddhism-truest/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1977" instrument_node="">According to Linda Heuman (referring to Professor Solomon, and the discovery of new Buddhist scripture from Gandhārī )</span></a><span data-dcnode-id="1975" instrument_node=""> our view that certain scripture, such as the </span><span data-dcnode-id="1973" style="font-size: 1.125rem;"><span data-dcnode-id="1974" instrument_node="">Pāli</span></span><span data-dcnode-id="1972" instrument_node=""> Canon being the only true form of Buddhist scripture (or even the only earliest), is being uprooted the more we uncover about early Buddhism:</span></p><span data-dcnode-id="1970" instrument_node="">
</span><blockquote data-dcnode-id="1956"><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">As scholars scrutinized the Gandhari texts, however, they saw that history didn’t work that way at all, Salomon said. It was a mistake to assume that the foundation of Buddhist textual tradition was singular, that if you followed the genealogical branches back far enough into the past they would eventually converge. Traced back in time, the genealogical branches diverged and intertwined in such complex relationships that the model of a tree broke down completely. The picture looked more like a tangled bush, he reported.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1965" instrument_node="">Here is where I clicked Rewind: these newly found manuscripts, he declared, strike the&nbsp;</span><i data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">coup de grâce</span></i><span data-dcnode-id="1962" instrument_node="">&nbsp;to a traditional conception of Buddhism’s past that has been disintegrating for decades. It is now clear that&nbsp;</span><i data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">none</span></i><span data-dcnode-id="1959" instrument_node="">&nbsp;of the existing Buddhist collections of early Indian scriptures—not the Pali, Sanskrit, Chinese, nor even the Gandhari—“can be privileged as the most authentic or original words of the Buddha.”</span></p><span data-dcnode-id="1957" instrument_node="">
</span></blockquote><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">She also added this quote:</span></p><span data-dcnode-id="1952" instrument_node="">
</span><blockquote data-dcnode-id="1947"><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">“Nobody holds the view of an original canon anymore,” Oskar von Hinüber, one of the world’s leading scholars of Pali, told me.</span></p><span data-dcnode-id="1948" instrument_node="">
</span></blockquote><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1945" instrument_node="">This is not negating the </span><span data-dcnode-id="1943" style="font-size: 1.125rem;"><span data-dcnode-id="1944" instrument_node="">Pāli </span></span><span data-dcnode-id="1942" instrument_node="">Canon or any canon for that matter.&nbsp; Instead, it helps to shed light on the history of Buddhist scripture is ‘gray’, to say the least.&nbsp; We have an unclear, and unsubstantiated, view of the history with no way to truly validate anything.&nbsp; However, in the conclusion part of this article, I provide some explanations of others who show that the value we put in the </span><span data-dcnode-id="1940" style="font-size: 1.125rem;"><span data-dcnode-id="1941" instrument_node="">Pāli </span></span><span data-dcnode-id="1939" instrument_node="">Canon today was reinforced due to the Chinese Canon.&nbsp; Because these two groups didn’t really talk to each other, they gave scholars and historians a unique and rare way to validate the most essential core of the scripture…the Buddha’s teachings (Sutra/Sutta), and the monastic rules (Vinaya).</span></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">“Mahāyāna” Buddhists never felt they were separate from the lengthy line of monastics that came from the Buddha’s time.&nbsp; They followed the Vinaya and preserved and practiced the teachings.&nbsp; Even during early Buddhism, none of the many different schools felt they were a ‘separate’ Buddhism.&nbsp; They had different understandings, practices, and even regional translations/language, but that was understood to be part of the dynamic nature of Buddhism itself even during this early period.</span></p><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">A good article to read on this is “</span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tricycle.org/magazine/whose-buddhism-truest/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1932" instrument_node="">Whose Buddhism is Truest?</span></a><span data-dcnode-id="1930" instrument_node="">” on Tricycle.&nbsp; While it is centered around the discovery of new Buddhist scripture found in a region once called Gandhāra, it explains the now (more) muddied nature of what we believe to be the original origins of Buddhism.&nbsp; There may never have been a “single” source of scripture which has been widely believed.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1921"><strong data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">For the Buddhist layperson, like you and me, you will not get a black and white answer you are looking for (as explained, we will never be able to find this holy grail of an original canon that everyone agreed upon in the ancient past).&nbsp; &nbsp;</span></strong><span data-dcnode-id="1925" instrument_node="">And this is OK!&nbsp; “</span><strong data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Faith</span></strong><span data-dcnode-id="1922" instrument_node="">” in Buddhism and Buddhist practice flows from this understanding that we can’t put our hands on some document signed by the Buddha, but we can put our faith in the scripture we have now (regardless of the school of Buddhism) as containing (at least) the essence of the Buddha’s teachings that leads us to liberation.&nbsp; This faith is supported by the monastic community who did their best to retain, recite, write down, and understand the teachings, as well as the enlightenment of monastics throughout the centuries since the Buddha left us.&nbsp; Further, our faith is not ‘blind’ faith but is also reinforced through the fact we can actually prove the truth of these teachings ourselves.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1919" instrument_node="">Now that we talked about the Canons, let’s go back to the Mahāyāna scriptures such as the Diamond, Heart, Amitabha, etc.&nbsp; According&nbsp;to </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">David Kalupahana</span></em><span data-dcnode-id="1916" instrument_node=""> (a Buddhist scholar from Sri Lanka),&nbsp;(2006,&nbsp;</span><i data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Mulamadhyamakakarika&nbsp;of Nagarjuna.</span></i><span data-dcnode-id="1913" instrument_node=""> Motilal Banarsidass: p. 5.) those Mahāyāna scriptures can be connected to early Buddhism:</span></p><span data-dcnode-id="1911" instrument_node="">
</span><blockquote data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Scholars have noted that many key Mahāyāna ideas are closely connected to the earliest texts of Buddhism.</span></p><span data-dcnode-id="1907" instrument_node="">
</span></blockquote><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1904" instrument_node="">The Mahāyāna scriptures (sutras) exist nowhere else in the </span><span data-dcnode-id="1902" style="font-size: 1.125rem;"><span data-dcnode-id="1903" instrument_node="">Pāli </span></span><span data-dcnode-id="1901" instrument_node="">Canon, so what are we to make of those?&nbsp; Once again </span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fakebuddhaquotes.com/is-the-lotus-sutra-authentic-by-bhikkhu-sujato/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1900" instrument_node="">commentary</span></a><span data-dcnode-id="1898" instrument_node=""> by </span><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Bhikkhu Sujato</span></em><span data-dcnode-id="1895" instrument_node="">:</span></p><span data-dcnode-id="1893" instrument_node="">
</span><blockquote data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">So there is no doubt that the Lotus Suta and other Mahayana sutras are historically late, dating from many centuries after the Buddha. When reading them as historical documents, rather than seeing them as spoken by the Buddha, we should see them as the response and articulation by Buddhists of the past to the conditions that they were in. They were addressing matters of concern for them, asking how the Dhamma is to be applied in these situations. Of course the same is true of many Theravadin texts, although in the case of the early Suttas and Vinaya there is still a core that probably stems from the Buddha himself.</span></p><span data-dcnode-id="1889" instrument_node="">
</span></blockquote><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">We must understand when it comes to the Mahāyāna specific Sūtra, the spiritual and transformative value of them.&nbsp; The Dharma is vast, and in Mahāyāna there are said to be 84,000 Dharma Doors in which people can be taught in a way that speaks to them.&nbsp;</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1883" instrument_node="">For Theravādins looking at the Mahāyāna Sūtras, there can be found early Buddhism and Buddhist thought that may not have been fully explored by Theravāda when the </span><span data-dcnode-id="1881" style="font-size: 1.125rem;"><span data-dcnode-id="1882" instrument_node="">Pāli </span></span><span data-dcnode-id="1880" instrument_node="">Canon was being formed (as well as similarities).&nbsp;</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1877" instrument_node="">But should the Mahāyāna sūtras be canonical if there is doubt regarding their lineage back to the Buddha?&nbsp; </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/sacred-texts/articles/the-buddhist-canon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1876" instrument_node="">According to Professor T H Barrett</span></a><span data-dcnode-id="1874" instrument_node=""> explains:</span></p><span data-dcnode-id="1872" instrument_node="">
</span><blockquote data-dcnode-id="1864"><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node="">There are also texts like the&nbsp;</span><em data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Lotus Sūtra</span></em><span data-dcnode-id="1867" instrument_node="">, whose special status is not just proclaimed by the work itself, but also acknowledged in the art and material culture of East Asia in a way that makes the use of the word ‘canonical’ far from inappropriate. The Buddha’s word was for many, in effect, a form of the Buddha’s very presence, still with us in later ages, and still to be treated with every form of respect. In looking at Buddhist books this is certainly something to bear in mind.</span></p><span data-dcnode-id="1865" instrument_node="">
</span></blockquote><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">It is also interesting that at one-point certain Theravāda Buddhists read what we would now refer to as Mahāyāna texts from at least the 3rd century A.D. and possibly before and were very popular.&nbsp;</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">The Abhayagiri monks were, at times, more numerous in the Theravāda school than the Mahāvihāra monks.&nbsp; However, none of their scripture remains.&nbsp; Steven Collins remarked:</span></p><span data-dcnode-id="1857" instrument_node="">
</span><blockquote data-dcnode-id="1849"><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1855" instrument_node="">It seems that at least from the 3rd century A.D., and perhaps before, the Abhayagiri monks used what we would now call Mahayana texts; it is revealing that this is standardly referred to by their Mahaviharin opponents as their embracing the vetulla-vada.&nbsp; The term vetulla</span><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">, Sanskrit vaitulya or vaipulya, </span></em><span data-dcnode-id="1852" instrument_node="">meaning ‘extended’ or ‘enlarged’, refers to the great extent of certain Mahayana scriptures.&nbsp; Later triumphalist chronicles condemn with increasing vehemence the heresy of these unacceptable texts, and tell of repeated book-burnings by pro-Mahaviharin kings.</span></p><span data-dcnode-id="1850" instrument_node="">
</span></blockquote><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Collins also stated that the Mahāvihārin monks eventually won out and focused on a strategy to make it a closed canon as part of “self-definition and self-legitimation”.&nbsp;&nbsp;</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1844" instrument_node="">For Mahāyānists, the </span><span data-dcnode-id="1842" style="font-size: 1.125rem;"><span data-dcnode-id="1843" instrument_node="">Pāli </span></span><span data-dcnode-id="1841" instrument_node="">Canon takes us back to one of the schools of early Buddhism and it also has similar or identical teaching as shown in the Agamas and may have additional teachings we can learn from.&nbsp; Mahāyāna teachers and schools may refer to the </span><span data-dcnode-id="1839" style="font-size: 1.125rem;"><span data-dcnode-id="1840" instrument_node="">Pāli </span></span><span data-dcnode-id="1838" instrument_node="">Canon without concern, as it flows from the same early school of Buddhism.&nbsp;</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">For example, the Dhammapada, with its short verses, is easy for laypersons to read and recite, and is also why the Chinese Canon’s Agamas are not often translated into English because the Dhammapada essentially contains the same sermons/teachings, and there are plenty of translations.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">An important thing I would like to impart is that we can learn a lot from each school, and each other, to deepen our understanding of the teachings.&nbsp; While a beginner should follow the guidance of their teacher and school with the specified texts, as you grow you can explore both branches of Buddhism to deepen understanding and views.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1813"><img alt="Awakening of the Heart" class="size-full wp-image-9095 alignright jetpack-lazy-image" data-dcnode-id="1829" data-lazy-src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/01/Awakening-of-the-Heart-1.jpg?resize=107%2C160&amp;is-pending-load=1#038;ssl=1" data-recalc-dims="1" draggable="false" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/alanpeto.com/wp-content/uploads/2020/01/Awakening-of-the-Heart-1.jpg%3Fresize%3D107%252C160%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="107"><noscript data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-9095 alignright" src="https://i0.wp.com/alanpeto.com/wp-content/uploads/2020/01/Awakening-of-the-Heart-1.jpg?resize=107%2C160&amp;#038;ssl=1" alt="Awakening of the Heart" width="107" height="160" data-recalc-dims="1" /&gt;</span></noscript><span data-dcnode-id="1826" instrument_node="">I will leave you with a book I recommend that contains both Theravāda Suttas and Mahāyāna Sūtras is </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2VUDTzX" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1825" instrument_node="">“</span><em data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Awakening the Heart”</span></em><span data-dcnode-id="1822" instrument_node=""> by </span><em data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Ven. Thich Nhat Hanh</span></em><span data-dcnode-id="1819" instrument_node="">.</span></a><span data-dcnode-id="1817" instrument_node="">&nbsp; Although he is a famous monastic of the Mahāyāna school, he covers many </span><span data-dcnode-id="1815" style="font-size: 1.125rem;"><span data-dcnode-id="1816" instrument_node="">Pāli </span></span><span data-dcnode-id="1814" instrument_node="">Canon Suttas in this book and provides the scripture in this book as a “foundation” for an individual’s practice.&nbsp;</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">What I especially love is that he was excited to find some of these Theravāda Suttas, which demonstrates that even those in Mahāyāna can benefit.&nbsp; The commentaries are especially beneficial and can help you understand the sutta/sūtra you just read, and how to apply it to your practice.&nbsp;</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">It goes to show that you can learn from both branches of Buddhism (and thus both Canons) to aid you in your practice!</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1803" instrument_node="">

e the ads display based on user behaviour.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="823"><td class="cookielawinfo-column-1" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">ruds</span></td><td class="cookielawinfo-column-3" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">session</span></td><td class="cookielawinfo-column-4" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The domain of this cookie is owned by Rocketfuel. This cookie is a session cookie version of the 'rud' cookie. It contain the user ID information. It is used to deliver targeted advertising across the networks.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="816"><td class="cookielawinfo-column-1" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">sd-session-id</span></td><td class="cookielawinfo-column-3" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">1 year 24 days</span></td><td class="cookielawinfo-column-4" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">This cookie is set by the provider live.rezync.com. This cookie is used for collecting data on visitor behaviour on multiple websites inorder to measure the efficiency of advertisement on the website.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="809"><td class="cookielawinfo-column-1" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">test_cookie</span></td><td class="cookielawinfo-column-3" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">15 minutes</span></td><td class="cookielawinfo-column-4" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">This cookie is set by doubleclick.net. The purpose of the cookie is to determine if the user's browser supports cookies.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="802"><td class="cookielawinfo-column-1" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">uid</
