</span></a><span data-dcnode-id="3233" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3225"><span data-dcnode-id="3232" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3229"><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur7646876/"><span data-dcnode-id="3231" instrument_node="">fongniur</span></a></span><span class="review-date" data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">4 November 2013</span></span><span data-dcnode-id="3226" instrument_node="">
</span></div><span data-dcnode-id="3224" instrument_node="">
</span><div class="content" data-dcnode-id="3209"><span data-dcnode-id="3223" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3212"><span data-dcnode-id="3222" instrument_node="">As a Christian who was born and raised in China, I find it fairly difficult to hold fast to my faith when the majority of people here still take Christianity as superstition or a series of fairy tales. So I was more than thrilled to have this opportunity to revisit these thought- provoking stories that could help to strengthen my faith in God.</span><br data-dcnode-id="3221"><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">The narrative style and visual effect on the first couple of episodes was stunning enough to draw me into the age of Genesis and Exodus.Both of the actors did an amazing job in conveying the steadfastness and faithfulness of Abraham and Moses. To top it off, from episode 6 onward, the depiction of Jesus Christ is the best I've ever seen compared to other titles with the similar theme. I was also glad to notice that the script includes some of the most memorable and inspiring verses like Psalms 23 ("The Lord is my shepherd") and Matthew 5:3-10 (The Sermon on the Mount).</span><br data-dcnode-id="3218"><br data-dcnode-id="3217"><span data-dcnode-id="3216" instrument_node="">The drawback of this TV production is that it has neglected many great events in the Old Testament. For instance, the detail of some of the ancient prophets like Samuel, Nathan, and Jeremiah and one of my favorite stories --Jonah's disobedience to God's command. (In fact it left out the entire book of Jonah). I understand that due to its limited length and budget, it is impossible to include every detail, yet to look at the show in a bigger picture, I still feel that it's lacking something important. It most probably could be the omission of the Holy Spirit which makes every heart submit to the Lord and leads our way, proclaims the truth, and restores our lives. In other words, I think this production only explains 2/3 of the Trinity.</span><br data-dcnode-id="3215"><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">But in general, this is a very truthful rendering of the Bible and I would strongly recommend it to people who are still searching for God and those who wish to get an outline of important events in the Holy Bible.</span></div><span data-dcnode-id="3211" instrument_node="">
</span><span data-dcnode-id="3210" instrument_node="">

</span></a><span data-dcnode-id="3139" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3131"><span data-dcnode-id="3138" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3135"><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur7826013/"><span data-dcnode-id="3137" instrument_node="">zkonedog</span></a></span><span class="review-date" data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">3 March 2017</span></span><span data-dcnode-id="3132" instrument_node="">
</span></div><span data-dcnode-id="3130" instrument_node="">
</span><div class="content" data-dcnode-id="3106"><span data-dcnode-id="3129" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3109"><span data-dcnode-id="3128" instrument_node="">I got this gift as a Christmas present in 2013. It took me nearly half a year to get into. I had heard some middling reviews and wasn't overly impressed by the "Son of God" theater spin-off. When I finally gave it go, however, I discovered that each episode kept building and left me wanting more.</span><br data-dcnode-id="3127"><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">"The Bible" is pretty much split into two halves: The first half tells a number of Old Testament stories (Abraham, David, Daniel, Samson, etc.), while the second half transitions into the New Testament, telling of the ministry of Jesus Christ and his subsequent crucifixion/resurrection.</span><br data-dcnode-id="3124"><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">The first couple of episodes of this series are "just okay". I felt they made too big of a point to showcase the brutal violence of the Old Testament era. As such, I kind of dragged myself into those early episodes. They aren't terrible (I could still appreciate the stories being told), but just not entirely focused.</span><br data-dcnode-id="3121"><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">Once I was about 3-4 episodes in, however, the drama/stories/characters really started to pick up and I watched the final few episodes over the span of hours, not days. Whatever you do, PLEASE DO NOT compare this to "Son of God" that was patched-together and released into theaters to capitalize on the success of this show. "Son of God" isn't bad...just bland. "The Bible", on the other hand, is filled with emotion, especially during the "passion" scenes involving Jesus. It was that emotion that kept me watching.</span><br data-dcnode-id="3118"><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">In terms of accurateness, I had no problems with "The Bible". I'm not a huge biblical scholar, but I did attend Sunday School and thus know my basic bible stories (!). Besides a few tiny little nit- picks here and there, I found nothing major to criticize here.</span><br data-dcnode-id="3115"><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">Finally, "The Bible" can also serve as a great history of the Jewish religion. Creator/producer Mark Burnett does a great job of telling a coherent, structural history of the Jews, complete with narration to "fill in the gaps".</span><br data-dcnode-id="3112"><br data-dcnode-id="3111"><span data-dcnode-id="3110" instrument_node="">Overall, then, I feel "The Bible" to be one of the best Biblical works of film ever produced. Once you get through the first couple of episodes that focus a bit too much on the violence, you'll find yourself getting sucked into the history and emotion of the stories being told.</span></div><span data-dcnode-id="3108" instrument_node="">
</span><span data-dcnode-id="3107" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="3021"><span data-dcnode-id="3025" instrument_node="">The one thing I was instantly pleasantly surprised with when I watched the first episode of The Bible was the scale of this production, especially for a TV Mini-Series. Unlike most of its predecessors this classic story has been made into a Hollywood epic, both in terms of proportion and the style in which it has been filmed. The visual effects are very impressive and the score, composed by the brilliant Hans Zimmer is beautiful. Perhaps some might argue that it is more of an "entertainment" series rather than an "educational" one, but all the key points of the Bible have been respected. </span><br data-dcnode-id="3024"><br data-dcnode-id="3023"><span data-dcnode-id="3022" instrument_node="">It's well scripted and the actors did an excellent job in portraying very believable characters, and how great to see the beautiful Roma Downey play the part of Mary!</span></div><span data-dcnode-id="3020" instrument_node="">

</span><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2763027/"><span data-dcnode-id="2932" instrument_node="">Permalink</span></a><span data-dcnode-id="2930" instrument_node="">
</span></div><div class="content" data-dcnode-id="2908"><span data-dcnode-id="2928" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="2911"><span data-dcnode-id="2927" instrument_node="">Whenever words like that splash before anything I always cringe with a tad bit of worry because it usually means "we've changed it and kept the title but still like it". Prince of Egypt way back in 1998 had the same disclaimer. While neither are 100% accurate descriptions of the Bible story that I grew up with, I genuinely believe that they kept the spirit of the Biblical story. However, I know that a generic review to get you to watch this or avoid it might not be the best thing so here goes</span><br data-dcnode-id="2926"><br data-dcnode-id="2925"><span data-dcnode-id="2924" instrument_node="">1. who Am I? I am an evangelical Christian, I believe that the Bible is God's word on earth and I believe that the whole thing is as relevant as today as it was back then. while it may not be a word for word account of things that happened day by day, I do believe that it holds its own as a historical document as well. If I had a choice in creating a TV docudrama of the Bible- I would make it 24 hours and give it a chance to breathe (but more on that later) I'm telling you who I am because my faith plays a part in my review and I want to, in full disclosure, let you know the bias behind my review.</span><br data-dcnode-id="2923"><br data-dcnode-id="2922"><span data-dcnode-id="2921" instrument_node="">2. The Pros. -The narrative structure is compelling. By having the pre credit sequence be Noah telling the creation story to his family on the boat, I thought it was a stroke of genius. -The acting. Noah was a Scottish actor which really fit, in my opinion. The actor portraying him had conviction, toughness and a hint of crazy that was all par with who the world saw Noah as.Then came the following big names like Abraham, Moses and Joshua. Both men (young and old) acted their butts off. The challenging thing about playing a Bible character is to portray the strength of faith and the weakness that we tend to feel when faced with such extraordinary characters. -There is a really subtle but awesome bit of foreshadowing with the scene between Abraham and the three visitors. If I think its going where its going, I give props to the creators for sticking true to that aspect of the passage. - The angels in Sodom and Gomorrah. While this part was very Hollywood, I honestly didn't care because I really think the phrase "spirit of the Bible" was true. - The narration- Keith David was an awesome choice. I can't explain it but something about his voice really fits with this version - They're adding bits of the Bible story that isn't often represented in film. (not that I've seen anyway). Its an interesting creative choice and I look forward to the next four weeks and what else they include.</span><br data-dcnode-id="2920"><br data-dcnode-id="2919"><span data-dcnode-id="2918" instrument_node="">3. THE CONS - While I applaud the film makers for some of the stuff they added, they are leaving out some really key stories. there are barely any mentions of Jacob or even Joseph. I get that not everything can fit, but I would have at least thought that they would have merited at least a montage. Plus, Moses' story is largely truncated and the Israelites 40 years in the wilderness , well that shaped the nation, more of it should have been added- if I speak from a purely Hollywood standpoint? To have more scenes with the actor portraying Moses. He was pretty awesome. But from a narrative standpoint? stuff that happened later on largely stemmed from their time in the desert.</span><br data-dcnode-id="2917"><br data-dcnode-id="2916"><span data-dcnode-id="2915" instrument_node="">So all in all, I think its a really well done production, because at the end of the day, if it gets people to pick up the book( or download the app) even if it is to argue with it, then it's fulfilling its great Commission. </span><br data-dcnode-id="2914"><br data-dcnode-id="2913"><span data-dcnode-id="2912" instrument_node="">Take the time to watch it- Unless you're a stickler for the details and can't get your head around the Samson is going to be black or that Jesus is going to be portrayed as the Roman "pretty version" or because you're favorite story isn't in it... well then that's on you. I for one enjoyed it and will continue to watch and see how God's story unfolds.</span></div><span data-dcnode-id="2910" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Not being a Christian myself, but having read some biblical literature and having an interest in documentaries on Bible, I've always felt that to be able to see these stories in action is perhaps the best way to commit them to memory, and I believe the series excels in that. This is especially monumental for the younger generation who does not often give as much importance to religion as did our forefathers. The accuracy of any representation of Bible will be and has been questioned for authenticity and for not being true to the scriptures, but I think these claims need to be looked in the light of the fact that the 4 gospels in the New Testament bear so many differences among them too.. So what is true might merely by "our version" of truth. And we need to understand the spirit of the Bible, and realize that neither does it claim to serve as an answer nor as the actual representations of what must have happened. It just tries to bring a visual representation of the Holy Bible aimed at bringing people possible who are not as much aware of the scriptures as others and serve as a quick crash course on the Biblical times, if you must.. I am not a Christian, and by watching the series know more about Christianity than I even did .. I'm sure there are others like me, and if it helps people realize the true story or the greatness of God, I''d say any form should be welcome..</span></div><span data-dcnode-id="2860" instrument_node="">

</span><div class="content" data-dcnode-id="2570"><span data-dcnode-id="2587" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2573"><span data-dcnode-id="2586" instrument_node="">Dear practicing Jews, Xtians, &amp; Muslims; Pointing out the inaccuracies of the show is pointless...anyone who cares knows Jesus wasn't white, or that ancient Semetic tribes spoke English(!) We know, we know.</span><br data-dcnode-id="2585"><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">Dear fellow atheists &amp; the like; the miracles are at a minimum &amp; really are no offense to us as it is the production &amp; presentation that should move us.</span><br data-dcnode-id="2582"><br data-dcnode-id="2581"><span data-dcnode-id="2580" instrument_node="">I do not believe in god.</span><br data-dcnode-id="2579"><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">I do love Jesus of Nazareth. I live each day with the words of this Rabbi of Judea, only without all the hocus-pocus. I have seen every Biblical epic since the first Ben-Hur in the silent era. Even in my atheism they move me. Greatly. Read some Joseph Conrad to appreciate the STORY for what it is: The greatest mythology ever written. To believers &amp; non-believers alike: let us just enjoy this great story without interjecting religion. Take the wisdom from these tales and leave the rest.</span><br data-dcnode-id="2576"><br data-dcnode-id="2575"><span data-dcnode-id="2574" instrument_node="">Do what Jesus of Nazareth suggested: Be nice to each other.</span></div><span data-dcnode-id="2572" instrument_node="">

</span><a class="title" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw4237145/"><span data-dcnode-id="2502" instrument_node=""> An Honest Review
</span></a><span data-dcnode-id="2500" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2492"><span data-dcnode-id="2499" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2496"><a data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur14520497/"><span data-dcnode-id="2498" instrument_node="">generationofswine</span></a></span><span class="review-date" data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">13 July 2018</span></span><span data-dcnode-id="2493" instrument_node="">
</span></div><span data-dcnode-id="2491" instrument_node="">
</span><div class="content" data-dcnode-id="2410"><span data-dcnode-id="2490" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2413"><span data-dcnode-id="2489" instrument_node="">This is one of those series that get hit from both sides. </span><br data-dcnode-id="2488"><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">It radicalizes and polarizes both sides on the political spectrum, and the religious spectrum and draws hatred from the fanatics on both sides.</span><br data-dcnode-id="2485"><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">If you read the reviews:</span><br data-dcnode-id="2482"><br data-dcnode-id="2481"><span data-dcnode-id="2480" instrument_node="">The far right uber-religious are crying about how Biblically inaccurate this is...and that means that they missed the "mini-series" part of production. Really, how are you going to make it accurate to the Bible and watchable for the general public? </span><br data-dcnode-id="2479"><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">I used to work in history and that was a HUGE pet peeve of mine. "Saving Private Ryan would have been good but this, this, and this were inaccurate and..." WHO CARES????!!!!!!!</span><br data-dcnode-id="2476"><br data-dcnode-id="2475"><span data-dcnode-id="2474" instrument_node="">Do you honestly want an entire two-hour episode of David sitting down writing Psalms? That's really not going to be entertaining. The same goes with long winded rehearsals of who begot whom, which are also guaranteed to put the public to sleep.</span><br data-dcnode-id="2473"><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">If you want a literal interpretation of the book...buy and read the book. Otherwise you will have a faithful depiction at best, but never a truly accurate one.</span><br data-dcnode-id="2470"><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">You can't even translate Harry Potter 100% accurately into a film and those novels are a lot less, well, Biblical. So, chill, take a seat, and be entertained.</span><br data-dcnode-id="2467"><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">The series might be made to educate, but it's education for entertainment as implied by the word "dramatization." </span><br data-dcnode-id="2464"><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">And moving across the alley you have far left fanatics yelling that both the book and this series should be banned. Yelling that they are harmful, that they are dangerous....</span><br data-dcnode-id="2461"><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">...and I guess they are forgetting that people said the exact same things about "Howl" when it was published, and if you live in America and have that view, you should be seriously ashamed of yourself.</span><br data-dcnode-id="2458"><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node="">There is something inherently wrong about censoring thought and speech. Chill, this is an AMERICAN production and over here, if you want to worship the stick you found in the parking lot last Tuesday...and then make a movie about it, that's your Constitutionally protected right as stated in the 1st Amendment.</span><br data-dcnode-id="2455"><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">If you have an issue with that, move someplace that censors thought, religion, and speech. The rest of us are perfectly happy that we won't get thrown in jail for not sharing the same views as whomever is in power at the moment.</span><br data-dcnode-id="2452"><br data-dcnode-id="2451"><span data-dcnode-id="2450" instrument_node="">So...if you think about it, if you really think about it, the Bible did a FANTASTIC job in dramatizing the Bible if it's getting it from both sides. The far left is not happy with it and the far right is not happy with it...and that generally means I'm going to be pretty happy with it.</span><br data-dcnode-id="2449"><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">And I was, as someone that spent most of his adult life working around history...well...is there a word that best explains salivating in nerd fueled bliss?</span><br data-dcnode-id="2446"><br data-dcnode-id="2445"><span data-dcnode-id="2444" instrument_node="">It was awesome. Like The Da Vinci Code (book not movie) the little chapters were just long enough to draw you in and short enough not to get dull. But, the historian in me absolutely loved how well it showed the the stories and people were inter-connected...and that is really an aspect of the Bible that you do NOT get when you go to church.</span><br data-dcnode-id="2443"><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">So you have a bunch of short interconnected stories that sort of turns the Bible into a "Pulp Fiction" styled miniseries and just sits really well for entertainment purposes.</span><br data-dcnode-id="2440"><br data-dcnode-id="2439"><span data-dcnode-id="2438" instrument_node="">For real entertainment purposes, spending more time on Judges, where you get the bulk of the nation building and the only real stories that you liked when your parents forced you at gunpoint to go to CCD as a child, would have been preferable. </span><br data-dcnode-id="2437"><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">Yeah Moses and Noah are OK, but really you want to hear more about Samson and the high adventure stories...the ones that you liked as a little kid because it read kind of like Robert E. Howard...But I guess focusing only on those stories wouldn't make The Bible as epic in scope as the miniseries became.</span><br data-dcnode-id="2434"><br data-dcnode-id="2433"><span data-dcnode-id="2432" instrument_node="">And, I feel because of that need to be more epic you had what so many other people complained about...</span><br data-dcnode-id="2431"><br data-dcnode-id="2430"><span data-dcnode-id="2429" instrument_node="">SAMURAI NINJA WARRIOR VR TROOPER ANGELS</span><br data-dcnode-id="2428"><br data-dcnode-id="2427"><span data-dcnode-id="2426" instrument_node="">And unlike the political and religious zealot complaints...the Samurai Angels were really a valid complaint. That just hurt to see. </span><br data-dcnode-id="2425"><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">I WOULD have given it 10 stars because it was super entertaining...but Ninja Warrior Angels. You can't suspend your disbelief enough not to do a spit-take when you see them.</span><br data-dcnode-id="2422"><br data-dcnode-id="2421"><span data-dcnode-id="2420" instrument_node="">They were so bad.</span><br data-dcnode-id="2419"><br data-dcnode-id="2418"><span data-dcnode-id="2417" instrument_node="">But fortunately they were also short lived.</span><br data-dcnode-id="2416"><br data-dcnode-id="2415"><span data-dcnode-id="2414" instrument_node="">So...don't turn it off when you see them. It's a good dramatization to sit back and watch, and the strongest part is honestly the length of the little chapters. It makes it perfect for viewing.</span></div><span data-dcnode-id="2412" instrument_node="">

</span><div class="content" data-dcnode-id="2325"><span data-dcnode-id="2330" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Please disregard all my arrogant Christian brothers. They somehow feel that the Bible itself is a screenplay and thus should be treated as one. As a bible student for 23 years and possessing All Bible films ever made from silent films until today I can clearly say what is good and what is bad. This mniseries is fantastic to spark interest in the good Book. While the miniseries takes many dramatic license, the emotion and heart of it is clearly felt. It makes no claim to authenticity yet many scenes actually feel more authentic and not forced to look holier than thou but instead makes you think how hard those times were and thus these people did not know they would be in the bible one day. Many may mention omissions of many stories which it does skip,however it spends a great deal in Christ. Acting us excellent as well as the score. For my all my Christians brothers who criticize this series I say to you then what would you produce. Those word for word Visual Bible Videos "Matthew, Acts, John?" That although literal word for word and nothing more and honest, nevertheless are completely dull boring and without emotion whatsoever. Even I who know the bible and enjoy it have had a hard time getting through those videos and if i knew not the material with those productions i would turn it off. Sad but true. Those videos are for Christians and Christians alone. You say you want to reach people well with those videos Christianity would have never gotten of the ground per say. In 2004 every Christian complained about "The Passion of the Christ" including scenes not in the gospels or out of order yet it was so power full no one could not say they weren't moved and it reached to millions. This miniseries is great if you are curious about the Bible and and recommend it as a great start up tool. As I mentioned I have seen every film and have every film so I can say what is blasphemous or not. Please forgive my Christian arrogant brothers who act more like Pharisees all righteous and knowing. Times like this I love saying I am an Anti Christian,,,Christian. God bless and enjoy the series.</span></div><span data-dcnode-id="2327" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="2251"><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur42040052/"><span data-dcnode-id="2253" instrument_node="">digitalhat</span></a></span><span class="review-date" data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">23 March 2013</span></span><span data-dcnode-id="2248" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2231"><span data-dcnode-id="2244" instrument_node="">I think my biggest issue was the attempt to make this series true to the Bible. I was reading article after article about how they brought in historical experts to make this as accurate as possible. This claim alone is laughable and insulting to anyone who has ever read the Bible.</span><br data-dcnode-id="2243"><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">Let's just take the scene with Lot and his family, hiding the Angels from the angry mob. The Bible clearly states that Lot offers up his daughters to the mob (to be raped) in order to save the Angels, but instead we get a sword slashing kung-fu scene that wipes out the mob. Genesis 19:1-11 </span><br data-dcnode-id="2240"><br data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node="">And let's not get into the story where Lot's daughters get him drunk and have an orgy with their Dad. Genesis 19:30-38</span><br data-dcnode-id="2237"><br data-dcnode-id="2236"><span data-dcnode-id="2235" instrument_node="">I agree with the Producers that there is a ton of content in the Bible that is unsuitable for television - more rape, torture, violence, genocide and immorality than anything on TV. So, in their defense (at some point) you have to ignore all that and create the fairy tale version for kids. And since they have not discovered any archaeological evidence that ANY of this happened, fairy tale would be the right word.</span><br data-dcnode-id="2234"><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node="">And shame on the "History" Channel for content like this and Ancient Aliens. Stick to what you are good at - actual history, and leave this stuff to the SyFy Channel.</span></div><span data-dcnode-id="2230" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">I thought this was EXCELLENT!!!!! To be able to make the story of the bible in such a small amount of time allotted (5 parts) it was absolutely excellent! The special effects made it SO realistic,the story line loosely true to the "Word" (remember trying to keep a thread through all these stories and through the total bible "must" have been difficult at best). The actors who played these characters did a beautiful job. The only negative i can say is that it wasn't a longer series than it was. Thank you so much for the recounting of the Bible in this entertainment industry fashion and for creating this documentary.</span></div><span data-dcnode-id="2065" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">I finally had a chance to watch "The Bible" and was amazed at the poorly-written, almost laughable script. While the cinematography, acting and SFX are professional and believable, the script IS NOT. If you were to take a Sunday school class of 8 to 12 year-olds and ask them to write a script for a series based on the Bible, this would be the result. I was amazed to read that the producers consulted "a wide range of pastors and academics." Really? Maybe the only way to tell such a beloved story is to be simplistic and shallow. But, since these stories have all been done many times before, I would have hoped for something a little more sophisticated. And whoever it was that said narration is the sign of a poorly-written script was absolutely right about this one.</span></div><span data-dcnode-id="1980" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1842"><span data-dcnode-id="1867" instrument_node="">First off let me disclose I am an atheist. I don't believe the bible is real aside from a few small historical sections. That being said I love mythology of all cultures and when I saw Mr &amp; Mrs Saved by an Angel talking about how great this project was and how a country founded on Christian religion and ideals (it wasn't, but thats a subject of a different conversation) and how they were going to put the bible on film I thought to myself, I wonder how they are going to deal with the more controversial things like the sex/orgy/gang bang described in the Song of Solomon.</span><br data-dcnode-id="1866"><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">Then I watched the first episode, they condense a score of chapters and hours worth of stories into less than 10 minutes. No creation, no garden, no Cain and Able, 45 second on the story of Noah, nothing of the Tower of Babel or Nimrod, no mention of the angels raping women to death and creating the Nephilim. Nothing on Abrams marriage to his slave Hagar and Sarahis abominable treatment of her. </span><br data-dcnode-id="1863"><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">If fact the movie calls Abram Abraham from the moment he is introduced.</span><br data-dcnode-id="1860"><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">Straight to the story of Sodom, which has sword wielding ninja angels, and miraculously Lot never offers up his daughters for the crowds pleasure, I wonder why that got cut. As did the story of Lots daughters getting him drunk and having sex with him.</span><br data-dcnode-id="1857"><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node="">The we skip to the sacrifice of Issac which has his 111 year old mother running more than a marathon to try and stop Abraham, which isn't even in the bible. It makes you wonder who was writing this and how these asinine non existent story lines got filmed.</span><br data-dcnode-id="1854"><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">Then we skip EVERYTHING up until the birth of Moses. See a pattern emerging yet? Skip real stories of the bible that are uncomfortable by modern ethic standards, inset fake ones which are more palatable.</span><br data-dcnode-id="1851"><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">So now we are in Egypt where the Israeli slaves are decidedly ethnic, and the whip bearing African Egyptians are blindingly white - liberal guilt perhaps? We have the 10 Plagues, The Red Sea, and Moses walking up and then down the mountain, gone is the story if the rebellion and the reason why they were punished to wonder 40yrs, as are any of those stories from that time.</span><br data-dcnode-id="1848"><br data-dcnode-id="1847"><span data-dcnode-id="1846" instrument_node="">So Now we skip to Jericho. And yet gone is the scene where god commands every man woman and child slaughtered except the virgin women which can be raped in to a god blessed marriage, and gone is the scene where they obey gods command.</span><br data-dcnode-id="1845"><br data-dcnode-id="1844"><span data-dcnode-id="1843" instrument_node="">I stopped watching after that, I have no doubt such errors continue throughout the entire production</span></div><span data-dcnode-id="1841" instrument_node="">

</span></a><span data-dcnode-id="1804" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1796"><span data-dcnode-id="1803" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1800"><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur42092374/"><span data-dcnode-id="1802" instrument_node="">jefferysikes911</span></a></span><span class="review-date" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">25 March 2013</span></span><span data-dcnode-id="1797" instrument_node="">
</span></div><span data-dcnode-id="1795" instrument_node="">
</span><div class="content" data-dcnode-id="1758"><span data-dcnode-id="1794" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1761"><span data-dcnode-id="1793" instrument_node="">As a bible student for over 10 years, I was hoping that the film industry had finally gotten this one right, however in less that 10 minutes and after several grueling hours afterword, I realized this was the worst account ever filmed. </span><br data-dcnode-id="1792"><br data-dcnode-id="1791"><span data-dcnode-id="1790" instrument_node="">There is almost no actual biblical content provided in the film save a few splotches sprinkled here and there. This is not a review to simply indicate this is a completely non-biblical based work. I will explain in detail why I make this founded claim. </span><br data-dcnode-id="1789"><br data-dcnode-id="1788"><ul data-dcnode-id="1785"><li data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Lets start with Adam, who is not indicated as "the man to till the soil" who was formed on the 8th day (as it is written) - There is no binding account of Adam to Noah (who was chosen because he was perfect in his generations to Adam), to Abram (later re-named Abraham by our Father) to Isaac (chosen over all Abraham other sons), to Jacob (later renamed Israel by or Father), to the tribes (sons) of Israel. </span></li></ul><br data-dcnode-id="1784"><br data-dcnode-id="1783"><ul data-dcnode-id="1780"><li data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">There is no mention of Israel going into Egypt only 70 souls and coming forth out of Egypt some 430 years later over 2 million (the promise to Abraham "as the stars of heaven in number")</span></li></ul><br data-dcnode-id="1779"><br data-dcnode-id="1778"><ul data-dcnode-id="1775"><li data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">There is no mention of Joseph being the right hand man to Pharaoh himself and that Joseph saved all of Egypt during a famine. - There is no mention of the hard bondage Israel was forced to serve under the later Pharaoh's and the atrocities which occurred against the people of Israel while in bondage and the fact that these atrocities were the reason behind punishing Egypt. </span></li></ul><br data-dcnode-id="1774"><br data-dcnode-id="1773"><ul data-dcnode-id="1770"><li data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">The events related to Christ were haphazard and completely inaccurate. There was no mention that he served the vow of the Nazarite (reason for beard and long hair) or that his Mother was full blooded Levi.... so on and so forth. He was presented as from a Marxist point of view, as simply a Marxist rebel out to change. When actual text indicated something completely different "I come for the Lost Sheep of the House of Israel" </span></li></ul><br data-dcnode-id="1769"><br data-dcnode-id="1768"><ul data-dcnode-id="1765"><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">The appearance of Satan, missed the mark entirely, as it is documented in the 13th chapter of the book of Revelation that he looks just like Christ (the lamb slain). The account in the wilderness, with Christ and Satan has no bearing in biblical text. It was never brought that in Christs weak state (40 days without food and water), he still easily defeated Satan. </span></li></ul><br data-dcnode-id="1764"><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node="">These are basic factual accounts which are all well documented in biblical text. This film included where it might have brushed over the topic, in the majority of cases, it was not based upon biblical fact. If you are looking yourself or you are looking as parents for a reference film for your children, I would reconsider. From my several years of biblical study, I can not recommend this film to anyone due to is factual inaccuracy and complete distance from anything remotely connected to biblical accounts, historically.</span></div><span data-dcnode-id="1760" instrument_node="">

</span></a><span data-dcnode-id="1688" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1680"><span data-dcnode-id="1687" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1684"><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur24818924/"><span data-dcnode-id="1686" instrument_node="">bug76</span></a></span><span class="review-date" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">29 September 2013</span></span><span data-dcnode-id="1681" instrument_node="">
</span></div><span data-dcnode-id="1679" instrument_node="">
</span><div class="content" data-dcnode-id="1649"><span data-dcnode-id="1678" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1652"><span data-dcnode-id="1677" instrument_node="">Never have I seen a show that has touched me so deeply as this epic mini-series. I'm all for it when 'The Bible' reaches new listeners, picks up those that have fallen, those who are lost or refreshes their faith when it has gone stale.</span><br data-dcnode-id="1676"><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">I was struggling this past year with many things. I am a person of faith but felt that even I had lost some of the fire in my soul. I was having trouble finding it again. I had faith. I just felt it was becoming 'stale'.</span><br data-dcnode-id="1673"><br data-dcnode-id="1672"><span data-dcnode-id="1671" instrument_node="">Then, I watched 'The Bible' when it first came out on the History Channel. I loved every minute of the stories from 'Genesis' to the book of 'Revelation'. I felt some of that fire returning. Diogo Morgado lit up the screen with his portrayal of Jesus Christ. I saw such passion on his face and love in his eyes every second he was on screen. But, what lifted my spirits and renewed every ounce of faith I had in me was when I saw the interview of Diogo on Youtube. With so much warmth and conviction, he teared up as he talked about how he was haunted by the Crucifixion scene. I know Diogo is a very talented actor but he seemed completely genuine and humbled by going through this experience. He did shine when he talked about his role. It was evident on his face.</span><br data-dcnode-id="1670"><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node="">But, can we please drop the #HotJesus now?(I never jumped on that bandwagon). It feels sacrilegious to me. He gets asked about that hash-tag in every interview and I know he's being nice but I can tell it makes him a little uncomfortable. I like #SexyDiogo, however. I like #LovingJesus or #MercifulJesus. But not #HotJesus. This beautiful story isn't about how sexy people think Jesus(Morgado) is but what He came here to do for us. Matthew 26:28: "For this is my blood of the new testament, which is shed for many for the remissions of sins." That's the message this whole series is trying to convey. Jesus gives his heart freely and loves unconditionally. He sacrificed so that we may live.</span><br data-dcnode-id="1667"><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">Darwin Shawn, as the disciple, Peter, did a fantastic job embracing the role of Jesus' favorite follower. He truly let the Lord work through him and was so convincing in his role that I wanted to be there in that moment with him; with them all. Roma Downey was excellent as Mary. To watch her help her son pick up his cross, knowing what was in store for him was heart breaking. We get to see suffering on different levels and in various ways. We suffer through the eyes of another--'suffering by proxy'.</span><br data-dcnode-id="1664"><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node="">Since I've already watched it on t.v., I'm leaving a review now. Though, I will be getting the DVD for my birthday next month! :) Diogo Morgado said he would be happy if this series even touched one soul. No, you have touched millions with your gifts. Never let them die or become corrupted by the monsters of the industry. Your role has renewed my spirit. He was perfect for this role as Jesus Christ. He seems down to earth and humble. He wanted to play the Jesus he knew. In Matthew 11:29---"Take my yoke upon you, and learn of me, for I am meek and lowly in heart: and ye shall find rest unto you souls." No one could portray Jesus so humbly as Diogo has so beautifully done. Who better to play the part than one who is kind, warm and also humble? Example: When asked if he was 'famous' in Portugal, he said, "I'm known there." A perfect answer. He didn't say 'I'm a famous actor/model'. It does one no good to think too highly of him/herself. It's better to let others praise your work than to praise yourself.</span><br data-dcnode-id="1661"><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">I highly recommend this series to any and all who are looking for more; for those who are tired of what they are watching on t.v. and in movies; for those who have seen enough violence and depravity to last two lifetimes; for those seeking the positive to overshadow all the negative we endure in this world.</span><br data-dcnode-id="1658"><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node="">Diogo didn't have say a word or even move. I've never seen an actor convey everything they had in them as Diogo did portraying Jesus. I knew exactly what he was 'saying' just by looking in his eyes. Diogo is extremely blessed and gifted when all he needs to do is show his eyes and you just know. The eyes are the windows to the soul. It seems Diogo really is a sweet person if the saying is true.</span><br data-dcnode-id="1655"><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">Watch my video that is dedicated to this series. http://www.youtube.com/watch?v=dzJ01VFKWas</span></div><span data-dcnode-id="1651" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="1490"><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur41224821/"><span data-dcnode-id="1492" instrument_node="">ZJFox43</span></a></span><span class="review-date" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">31 March 2013</span></span><span data-dcnode-id="1487" instrument_node="">
</span></div><span data-dcnode-id="1485" instrument_node="">
</span><div class="content" data-dcnode-id="1467"><span data-dcnode-id="1484" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1470"><span data-dcnode-id="1483" instrument_node="">Being about the Bible, I don't want to spoil the end. (Joke.) But, I must say this was very well done aside from a few inaccuracies. This is to be expected seeing as it is a mini-series rather than a gigantic series.</span><br data-dcnode-id="1482"><br data-dcnode-id="1481"><span data-dcnode-id="1480" instrument_node="">Now, the only complaint I would have is the actual crucification of Jesus. Many believe it was a cross (though it was a stake if you do the research into it) and since it is a minor matter and to be expected that should be no matter here. But, the nail in the hand instead of wrist is still happening even knowing the truth behind it.</span><br data-dcnode-id="1479"><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">Aside from that little fact, the show was great. I do hope it opens up people to reading the Bible and to their God. The show portrayed things in a very good way, aside from a few things with Jesus and after Jesus. </span><br data-dcnode-id="1476"><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node="">If you have not read the Bible read Luke then read Acts. Though, you can always start with this show for a start. I do recommend it as a start before reading or to those who know the Bible. </span><br data-dcnode-id="1473"><br data-dcnode-id="1472"><span data-dcnode-id="1471" instrument_node="">I will say, as a Jehovah's Witness I really expected to be even more disappointed with the portrayal of Jesus, I didn't expect God's name to be used since it may offend some or confuse even more but a few lines not from the Bible got me but that in itself did is not a problem, only implying Jesus as God without Biblical support. But, overall, I liked it.</span></div><span data-dcnode-id="1469" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">I don't think this will be a spoiler but in response to others reviews (as well as including my own)... First off I don't think this series was intended to give a fully detailed account of the Bible in its entirety. If you want to know more read the Bible for yourself. I feel like this series so far gives enough of each story to get people thirsty for more which again is in the Bible itself. Otherwise...I say job well done! I am enjoying the series so far. I think the roles (so far as I have not seen it all yet) are well acted. It is also nice to see these things played out. It kind of gives the viewer the idea of how things actual happened and puts things into perspective a lot more. It's easy I miss that piece when reading the Bible so I think this is a great supplement (I guess) for that. You get a feel of the emotions each person may/cod have felt.</span></div><span data-dcnode-id="1374" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Things I've learned from this version of 'The Bible'so far: Noah was actually Scottish with a great accent (more Edinburgh than Glasgow); Nebuchadnezzar and the Babylonians had a real problem with uni-brows and were the first Bronze Age men to wear man-scara; the Persians thought Duck Egg Blue went with EVERYTHING; Galilee looks a lot like the Eastern Washington in August; Jesus wore a wig and looked a little like Billy Ray Cyrus; and they had already discovered Crest Whitening Strips, probably found at their local kosher WalGreens; can't wait to see what they come up with for Paul. Really had hoped for better than this.</span></div><span data-dcnode-id="1294" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1212"><span data-dcnode-id="1216" instrument_node="">This is what I wrote after the first two episodes. I don't get this at all. They have all these production values, a huge audience, the best stories out there, nice actors, so why do they have to do their own thing? I've been teaching Sunday School for the last 22 years, I'm excited that my young kids are more interested in the Bible because of this series, they do a nice job with much of this. But ninja angels at Sodom? A black Samson? A middle-aged David taking Goliath down? I don't think so. And I'm only two episodes in. There's so much that can be done with the actual, real stories that these deviations are at least a distraction and at most something much worse. People shouldn't be telling "Bible" stories with their own other agenda, then that's no longer the Bible. </span><br data-dcnode-id="1215"><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node="">This is how I would qualify that after seeing all of the episodes: I don't like the divergences from the Bible, I just think they are a distraction and worse. That being said, I think their treatment of Jesus was pretty darn good, although I personally could have gone for a few more post-resurrection stories of Jesus. Pilate in particular was played so darn well it's scary, that was like Emmy stuff. Their treatment of Acts and Paul was pretty good too, something usually ignored in these spectacles. So I've upped this a couple of points and pretty much recommend it, nice job with the exceptions noted.</span></div><span data-dcnode-id="1211" instrument_node="">
</span><span data-dcnode-id="1210" instrument_node="">
</span></div><span data-dcnode-id="1208" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1146"><span data-dcnode-id="1153" instrument_node="">After watching the first of 5 episodes, I feel the series is not bad. I give it 4 out of 5. Photography is very good, acting very good, and the stories are true - right out of the bible. I'm sure many will say "how could they leave out Joseph" etc. but come on, it's only 10 hours.</span><br data-dcnode-id="1152"><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">I do wish they'd spent a little more on extras as the Moses (with God's help) parting the red sea had what looked like 40 people crossing when in fact it was 200,000 to 2 million that crossed. Reminds me of the first Schwarzenegger "Conan" movie where the major battle scene had 20 guys fighting.</span><br data-dcnode-id="1149"><br data-dcnode-id="1148"><span data-dcnode-id="1147" instrument_node="">The scene of Pharaoh's hacks killing the babies was a little graphic, hence the warning (If I remember something like PG-13) BTW, because of free will, God allows evil to happen - in response to all the atheists that are making hay out of this series.</span></div><span data-dcnode-id="1145" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1110"><span data-dcnode-id="1117" instrument_node="">This, is in fact a nice show, of course it will modify dialogs, of course it shows a little bit more of this and a little less of that, of course it does not show EVERYTHING of that tick book with a tiny font, of course some people will hate it because it is not what they imagined (just as harry potter fans complain about the movie not showing EVERYTHING of the books either).</span><br data-dcnode-id="1116"><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">don't listen to them. - Good acting. - Good production. - Decent effects. - Sticks to the real story (of course with some modifications, who cares) - and the best of all, i think it does show the story in a neutral point..</span><br data-dcnode-id="1113"><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">so as everything in life nowadays...."haters will hate". so shut your mouth and enjoy the show. do not expect too much from a mini series but it was better than expected for me.</span></div><span data-dcnode-id="1109" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1006"><span data-dcnode-id="1016" instrument_node="">Surely we've collected enough archaeological evidence to portray these people the way they truly would have looked.</span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">Why then is it that we continue to portray them via stereotypes we learned in Sunday school in the 1950s.</span><br data-dcnode-id="1012"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">Whether we want to believe it or not, Jesus did NOT look like a modern-day version of Brad Pit with long hair and a beard. His mother Mary probably didn't have flawless white skin and the face of the Mona Lisa.</span><br data-dcnode-id="1009"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">In 2013 we had a shot at presenting stories in the Bible from a far more scientific, more realistic approach...even using exactly what is in the Bible... but we cannot seem to remove our own personal prejudices.</span></div><span data-dcnode-id="1005" instrument_node="">
