</span><p data-dcnode-id="9582"><b data-dcnode-id="9584"><span data-dcnode-id="9585" instrument_node="">Women in the Bible</span></b><span data-dcnode-id="9583" instrument_node=""> are wives, mothers and daughters, victors and victims, women who change the course of historical events, and women who are powerless to affect even their own destinies.
</span></p><p data-dcnode-id="9538"><a data-dcnode-id="9580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Near_East" title="Ancient Near East"><span data-dcnode-id="9581" instrument_node="">Ancient Near Eastern</span></a><span data-dcnode-id="9579" instrument_node=""> societies have traditionally been described as </span><a class="mw-redirect" data-dcnode-id="9577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patriarchal" title="Patriarchal"><span data-dcnode-id="9578" instrument_node="">patriarchal</span></a><span data-dcnode-id="9576" instrument_node="">, and the Bible as a document written by men from an age where men and women played very different roles in society.</span><sup class="reference" data-dcnode-id="9573" id="cite_ref-Carol_L._Meyers_1-0"><a data-dcnode-id="9574" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="9575" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="9570"><span data-dcnode-id="9571" title="Page / location: 9"><span data-dcnode-id="9572" instrument_node="">: 9 </span></span></sup><sup class="reference" data-dcnode-id="9567" id="cite_ref-Frymer-Kensky2006_2-0"><a data-dcnode-id="9568" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="9569" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="9564"><span data-dcnode-id="9565" title="Page / location: 166–167"><span data-dcnode-id="9566" instrument_node="">: 166–167 </span></span></sup><sup class="reference" data-dcnode-id="9561" id="cite_ref-WBC_3-0"><a data-dcnode-id="9562" href="#cite_note-WBC-3"><span data-dcnode-id="9563" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9560" instrument_node="">  Marital laws in the Bible favored men, as did inheritance laws, and women lived under strict laws of sexual behavior with adultery a crime punishable by </span><a data-dcnode-id="9558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stoning" title="Stoning"><span data-dcnode-id="9559" instrument_node="">stoning</span></a><span data-dcnode-id="9557" instrument_node="">. A woman in ancient biblical times was always subject to strict purity laws, both ritual and moral. Recent scholarship accepts patriarchy, but argues for </span><i data-dcnode-id="9554"><a data-dcnode-id="9555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heterarchy" title="Heterarchy"><span data-dcnode-id="9556" instrument_node="">heterarchy</span></a></i><span data-dcnode-id="9553" instrument_node=""> as well; heterarchy acknowledges that different power structures between people can exist at the same time, and that each power structure has its own hierarchical arrangements.</span><sup class="reference" data-dcnode-id="9550" id="cite_ref-Carol_L._Meyers_1-1"><a data-dcnode-id="9551" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="9552" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="9547"><span data-dcnode-id="9548" title="Page / location: 27"><span data-dcnode-id="9549" instrument_node="">: 27 </span></span></sup><span data-dcnode-id="9546" instrument_node=""> Male dominance was real, but fragmentary, with women having spheres of influence of their own where women were in charge even while still being under the authority of a man.</span><sup class="reference" data-dcnode-id="9543" id="cite_ref-Carol_L._Meyers_1-2"><a data-dcnode-id="9544" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="9545" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="9540"><span data-dcnode-id="9541" title="Page / location: 27"><span data-dcnode-id="9542" instrument_node="">: 27 </span></span></sup><span data-dcnode-id="9539" instrument_node="">
</span></p><p data-dcnode-id="9518"><span data-dcnode-id="9537" instrument_node="">The majority of women in the Bible are unnamed, with named women making up only 5.5 to 8 percent of all named characters in the Bible. Women are not generally in the forefront of public life in the Bible, and women who are named are usually prominent for reasons outside the ordinary. For example, they are often involved in the overturning of human power structures in a common biblical literary device called "reversal." </span><a data-dcnode-id="9535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abigail" title="Abigail"><span data-dcnode-id="9536" instrument_node="">Abigail</span></a><span data-dcnode-id="9534" instrument_node=""> and </span><a data-dcnode-id="9532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esther" title="Esther"><span data-dcnode-id="9533" instrument_node="">Esther</span></a><span data-dcnode-id="9531" instrument_node="">, and </span><a data-dcnode-id="9529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jael" title="Jael"><span data-dcnode-id="9530" instrument_node="">Jael</span></a><span data-dcnode-id="9528" instrument_node="">, who drove a tent peg into the enemy commander's temple while he slept, are a few examples of women who turned the tables on men with power. The </span><a class="mw-redirect" data-dcnode-id="9526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matriarchs_%28Bible%29" title="Matriarchs (Bible)"><span data-dcnode-id="9527" instrument_node="">founding matriarchs</span></a><span data-dcnode-id="9525" instrument_node=""> are mentioned by name, as are some prophetesses, judges, heroines, and queens, while the common woman is largely, though not completely, unseen. The slave </span><a data-dcnode-id="9523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagar" title="Hagar"><span data-dcnode-id="9524" instrument_node="">Hagar</span></a><span data-dcnode-id="9522" instrument_node="">'s story is told, and the prostitute </span><a data-dcnode-id="9520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rahab" title="Rahab"><span data-dcnode-id="9521" instrument_node="">Rahab</span></a><span data-dcnode-id="9519" instrument_node="">'s story is also told, among a few others.
</span></p><p data-dcnode-id="9510"><span data-dcnode-id="9517" instrument_node="">The </span><a data-dcnode-id="9515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Testament" title="New Testament"><span data-dcnode-id="9516" instrument_node="">New Testament</span></a><span data-dcnode-id="9514" instrument_node=""> refers to a number of women in </span><a data-dcnode-id="9512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="9513" instrument_node="">Jesus</span></a><span data-dcnode-id="9511" instrument_node="">’ inner circle, and he is generally seen by scholars as dealing with women with respect. The New Testament names women in positions of leadership in the early church as well. Views of women in the Bible have changed throughout history and those changes are reflected in art and culture. There are controversies within the contemporary Christian church concerning women and their role in the church.
</span></p><span data-dcnode-id="9509" instrument_node="">

</span><h2 data-dcnode-id="9038"><span data-dcnode-id="9048" id="Women.2C_sex.2C_and_law_in_surrounding_cultures"></span><span class="mw-headline" data-dcnode-id="9046" id="Women,_sex,_and_law_in_surrounding_cultures"><span data-dcnode-id="9047" instrument_node="">Women, sex, and law in surrounding cultures</span></span><span class="mw-editsection" data-dcnode-id="9039"><span class="mw-editsection-bracket" data-dcnode-id="9044"><span data-dcnode-id="9045" instrument_node="">[</span></span><a data-dcnode-id="9042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D1" title="Edit section: Women, sex, and law in surrounding cultures"><span data-dcnode-id="9043" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9040"><span data-dcnode-id="9041" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9037" instrument_node="">
</span><p data-dcnode-id="8994"><span data-dcnode-id="9036" instrument_node="">Almost all Near Eastern societies of the </span><a data-dcnode-id="9034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bronze_Age" title="Bronze Age"><span data-dcnode-id="9035" instrument_node="">Bronze Age</span></a><span data-dcnode-id="9033" instrument_node=""> (3000-1200 BCE) and </span><a data-dcnode-id="9031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axial_Age" title="Axial Age"><span data-dcnode-id="9032" instrument_node="">Axial Age</span></a><span data-dcnode-id="9030" instrument_node=""> (800 to 300 BCE) were patriarchal with patriarchy established in most by 3000 BCE.</span><sup class="reference" data-dcnode-id="9027" id="cite_ref-Henry_Sumner_Maine_4-0"><a data-dcnode-id="9028" href="#cite_note-Henry_Sumner_Maine-4"><span data-dcnode-id="9029" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="9024"><span data-dcnode-id="9025" title="Page / location: xxxii"><span data-dcnode-id="9026" instrument_node="">: xxxii </span></span></sup><span data-dcnode-id="9023" instrument_node=""> Eastern societies such as the </span><a class="mw-redirect" data-dcnode-id="9021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akkadians" title="Akkadians"><span data-dcnode-id="9022" instrument_node="">Akkadians</span></a><span data-dcnode-id="9020" instrument_node="">, </span><a data-dcnode-id="9018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hittites" title="Hittites"><span data-dcnode-id="9019" instrument_node="">Hittites</span></a><span data-dcnode-id="9017" instrument_node="">, </span><a data-dcnode-id="9015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assyria" title="Assyria"><span data-dcnode-id="9016" instrument_node="">Assyrians</span></a><span data-dcnode-id="9014" instrument_node=""> and </span><a data-dcnode-id="9012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persians" title="Persians"><span data-dcnode-id="9013" instrument_node="">Persians</span></a><span data-dcnode-id="9011" instrument_node=""> relegated women to an inferior and subordinate position. There are very few exceptions, but one can be found in the third millennium B.C. with the </span><a data-dcnode-id="9009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sumer" title="Sumer"><span data-dcnode-id="9010" instrument_node="">Sumerians</span></a><span data-dcnode-id="9008" instrument_node=""> who accorded women a position which was almost equal to that of men. However, by the second millennium, the rights and status of women were reduced.</span><sup class="reference" data-dcnode-id="9005" id="cite_ref-Elisabeth_Meier_Tetlow_5-0"><a data-dcnode-id="9006" href="#cite_note-Elisabeth_Meier_Tetlow-5"><span data-dcnode-id="9007" instrument_node="">[5]</span></a></sup><sup class="reference nowrap" data-dcnode-id="9002"><span data-dcnode-id="9003" title="Page / location: 42"><span data-dcnode-id="9004" instrument_node="">: 42 </span></span></sup><sup class="reference" data-dcnode-id="8999" id="cite_ref-Samuel_Noah_Kramer_6-0"><a data-dcnode-id="9000" href="#cite_note-Samuel_Noah_Kramer-6"><span data-dcnode-id="9001" instrument_node="">[6]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8996"><span data-dcnode-id="8997" title="Page / location: 4–5"><span data-dcnode-id="8998" instrument_node="">: 4–5 </span></span></sup><span data-dcnode-id="8995" instrument_node="">
</span></p><p data-dcnode-id="8965"><span data-dcnode-id="8993" instrument_node="">In the West, the status of Egyptian women was high, and their legal rights approached equality with men throughout the last three millennia B.C.</span><sup class="reference" data-dcnode-id="8990" id="cite_ref-Swidler_7-0"><a data-dcnode-id="8991" href="#cite_note-Swidler-7"><span data-dcnode-id="8992" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8987"><span data-dcnode-id="8988" title="Page / location: 5–6"><span data-dcnode-id="8989" instrument_node="">: 5–6 </span></span></sup><span data-dcnode-id="8986" instrument_node=""> A few women even ruled as </span><a class="mw-redirect" data-dcnode-id="8984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaohs" title="Pharaohs"><span data-dcnode-id="8985" instrument_node="">pharaohs</span></a><span data-dcnode-id="8983" instrument_node="">.</span><sup class="reference" data-dcnode-id="8980" id="cite_ref-Swidler_7-1"><a data-dcnode-id="8981" href="#cite_note-Swidler-7"><span data-dcnode-id="8982" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8977"><span data-dcnode-id="8978" title="Page / location: 7"><span data-dcnode-id="8979" instrument_node="">: 7 </span></span></sup><span data-dcnode-id="8976" instrument_node=""> However, historian </span><a data-dcnode-id="8974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_B._Pomeroy" title="Sarah B. Pomeroy"><span data-dcnode-id="8975" instrument_node="">Sarah Pomeroy</span></a><span data-dcnode-id="8973" instrument_node=""> explains that even in those ancient patriarchal societies where a woman could occasionally become queen, her position did not empower her female subjects.</span><sup class="reference" data-dcnode-id="8970" id="cite_ref-Sarah_Pomeroy_8-0"><a data-dcnode-id="8971" href="#cite_note-Sarah_Pomeroy-8"><span data-dcnode-id="8972" instrument_node="">[8]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8967"><span data-dcnode-id="8968" title="Page / location: x"><span data-dcnode-id="8969" instrument_node="">: x </span></span></sup><span data-dcnode-id="8966" instrument_node="">
</span></p><p data-dcnode-id="8956"><span data-dcnode-id="8964" instrument_node="">Classics scholar Bonnie MacLachlan writes that Greece and Rome were patriarchal cultures.</span><sup class="reference" data-dcnode-id="8961" id="cite_ref-Bonnie_MacLachlan_9-0"><a data-dcnode-id="8962" href="#cite_note-Bonnie_MacLachlan-9"><span data-dcnode-id="8963" instrument_node="">[9]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8958"><span data-dcnode-id="8959" title="Page / location: vi"><span data-dcnode-id="8960" instrument_node="">: vi </span></span></sup><span data-dcnode-id="8957" instrument_node="">
</span></p><p data-dcnode-id="8904"><span data-dcnode-id="8955" instrument_node="">The roles women were expected to fill in all these ancient societies were predominantly domestic with a few exceptions such as </span><a data-dcnode-id="8953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sparta" title="Sparta"><span data-dcnode-id="8954" instrument_node="">Sparta</span></a><span data-dcnode-id="8952" instrument_node="">, who fed women equally with men, and trained them to fight in the belief women would thereby produce stronger children. The predominant views of Ancient and Classical Greece were patriarchal; however, there is also a </span><a class="mw-redirect" data-dcnode-id="8950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Misogynistic" title="Misogynistic"><span data-dcnode-id="8951" instrument_node="">misogynistic</span></a><span data-dcnode-id="8949" instrument_node=""> strain present in Greek literature from its beginnings.</span><sup class="reference" data-dcnode-id="8946" id="cite_ref-Susan_Moller_Okin_10-0"><a data-dcnode-id="8947" href="#cite_note-Susan_Moller_Okin-10"><span data-dcnode-id="8948" instrument_node="">[10]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8943"><span data-dcnode-id="8944" title="Page / location: 15"><span data-dcnode-id="8945" instrument_node="">: 15 </span></span></sup><span data-dcnode-id="8942" instrument_node=""> A polarized view of women allowed some classics authors, such as </span><a class="mw-redirect" data-dcnode-id="8940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thales" title="Thales"><span data-dcnode-id="8941" instrument_node="">Thales</span></a><span data-dcnode-id="8939" instrument_node="">, </span><a data-dcnode-id="8937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socrates" title="Socrates"><span data-dcnode-id="8938" instrument_node="">Socrates</span></a><span data-dcnode-id="8936" instrument_node="">, </span><a data-dcnode-id="8934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plato" title="Plato"><span data-dcnode-id="8935" instrument_node="">Plato</span></a><span data-dcnode-id="8933" instrument_node="">, </span><a data-dcnode-id="8931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="8932" instrument_node="">Aristotle</span></a><span data-dcnode-id="8930" instrument_node="">, </span><a data-dcnode-id="8928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristophanes" title="Aristophanes"><span data-dcnode-id="8929" instrument_node="">Aristophanes</span></a><span data-dcnode-id="8927" instrument_node=""> and </span><a data-dcnode-id="8925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philo" title="Philo"><span data-dcnode-id="8926" instrument_node="">Philo</span></a><span data-dcnode-id="8924" instrument_node="">, and others, to write about women as "twice as bad as men", a "pernicious race", "never to be trusted on any account", and as an inherently inferior race of beings separate from the race of men.</span><sup class="reference" data-dcnode-id="8921" id="cite_ref-Blumenthal_11-0"><a data-dcnode-id="8922" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8923" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8918"><span data-dcnode-id="8919" title="Page / location: 41, 42"><span data-dcnode-id="8920" instrument_node="">: 41, 42 </span></span></sup><sup class="reference" data-dcnode-id="8915" id="cite_ref-Susan_Moller_Okin_10-1"><a data-dcnode-id="8916" href="#cite_note-Susan_Moller_Okin-10"><span data-dcnode-id="8917" instrument_node="">[10]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8912"><span data-dcnode-id="8913" title="Page / location: 15–20"><span data-dcnode-id="8914" instrument_node="">: 15–20 </span></span></sup><sup class="reference" data-dcnode-id="8909" id="cite_ref-Sarah_Pomeroy_8-1"><a data-dcnode-id="8910" href="#cite_note-Sarah_Pomeroy-8"><span data-dcnode-id="8911" instrument_node="">[8]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8906"><span data-dcnode-id="8907" title="Page / location: 18"><span data-dcnode-id="8908" instrument_node="">: 18 </span></span></sup><span data-dcnode-id="8905" instrument_node="">
</span></p><p data-dcnode-id="8875"><span data-dcnode-id="8903" instrument_node="">Rome was heavily influenced by Greek thought.</span><sup class="reference" data-dcnode-id="8900" id="cite_ref-Kevin_M._McGeough_12-0"><a data-dcnode-id="8901" href="#cite_note-Kevin_M._McGeough-12"><span data-dcnode-id="8902" instrument_node="">[12]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8897"><span data-dcnode-id="8898" title="Page / location: 248"><span data-dcnode-id="8899" instrument_node="">: 248 </span></span></sup><span data-dcnode-id="8896" instrument_node=""> Sarah Pomeroy says "never did Roman society encourage women to engage in the same activities as men of the same social class."</span><sup class="reference" data-dcnode-id="8893" id="cite_ref-Sarah_Pomeroy_8-2"><a data-dcnode-id="8894" href="#cite_note-Sarah_Pomeroy-8"><span data-dcnode-id="8895" instrument_node="">[8]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8890"><span data-dcnode-id="8891" title="Page / location: xv"><span data-dcnode-id="8892" instrument_node="">: xv </span></span></sup><span data-dcnode-id="8889" instrument_node=""> In </span><i data-dcnode-id="8887"><span data-dcnode-id="8888" instrument_node="">The World of Odysseus</span></i><span data-dcnode-id="8886" instrument_node="">, classical scholar </span><a data-dcnode-id="8884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses_Finley" title="Moses Finley"><span data-dcnode-id="8885" instrument_node="">Moses Finley</span></a><span data-dcnode-id="8883" instrument_node=""> says: "There is no mistaking the fact that Homer fully reveals what remained true for the whole of antiquity: that women were held to be naturally inferior..."</span><sup class="reference" data-dcnode-id="8880" id="cite_ref-Susan_Moller_Okin_10-2"><a data-dcnode-id="8881" href="#cite_note-Susan_Moller_Okin-10"><span data-dcnode-id="8882" instrument_node="">[10]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8877"><span data-dcnode-id="8878" title="Page / location: 16"><span data-dcnode-id="8879" instrument_node="">: 16 </span></span></sup><span data-dcnode-id="8876" instrument_node="">
</span></p><p data-dcnode-id="8837"><span data-dcnode-id="8874" instrument_node="">Pomeroy also states that women played a vital role in classical Greek and Roman religion, sometimes attaining a freedom in religious activities denied to them elsewhere.</span><sup class="reference" data-dcnode-id="8871" id="cite_ref-graeco_13-0"><a data-dcnode-id="8872" href="#cite_note-graeco-13"><span data-dcnode-id="8873" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8870" instrument_node=""> Priestesses in charge of official cults such as that of </span><a data-dcnode-id="8868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athena" title="Athena"><span data-dcnode-id="8869" instrument_node="">Athena</span></a><span data-dcnode-id="8867" instrument_node=""> Polias in ancient Athens were paid well, were looked upon as role models, and wielded considerable social and political power.</span><sup class="reference" data-dcnode-id="8864" id="cite_ref-14"><a data-dcnode-id="8865" href="#cite_note-14"><span data-dcnode-id="8866" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8863" instrument_node=""> In the important </span><a data-dcnode-id="8861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eleusinian_Mysteries" title="Eleusinian Mysteries"><span data-dcnode-id="8862" instrument_node="">Eleusinian Mysteries</span></a><span data-dcnode-id="8860" instrument_node=""> in ancient Greece, men, women, children and slaves were admitted and initiated into its secrets on a basis of complete equality.</span><sup class="reference" data-dcnode-id="8857" id="cite_ref-15"><a data-dcnode-id="8858" href="#cite_note-15"><span data-dcnode-id="8859" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8856" instrument_node=""> In Rome, priestesses of state cults, such as the </span><a class="mw-redirect" data-dcnode-id="8854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vestal_Virgins" title="Vestal Virgins"><span data-dcnode-id="8855" instrument_node="">Vestal Virgins</span></a><span data-dcnode-id="8853" instrument_node="">, were able to achieve positions of status and power. They  were able to live independently from men, made ceremonial appearances at public events and could  accrue considerable wealth.</span><sup class="reference" data-dcnode-id="8850" id="cite_ref-4_November_2018_16-0"><a data-dcnode-id="8851" href="#cite_note-4_November_2018-16"><span data-dcnode-id="8852" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8849" instrument_node=""> Both ancient Greece and Rome celebrated important women-only religious festivals during which women were able to socialize and build bonds with each other.</span><sup class="reference" data-dcnode-id="8846" id="cite_ref-17"><a data-dcnode-id="8847" href="#cite_note-17"><span data-dcnode-id="8848" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8843" id="cite_ref-18"><a data-dcnode-id="8844" href="#cite_note-18"><span data-dcnode-id="8845" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8842" instrument_node="">  Although the "ideal woman" in the writings and sayings of male philosophers and leaders was one who would stay out of the public view and attend to the running of her household and the upbringing of her children, in practice some women in both ancient Greece and Rome were able to attain considerable influence outside the purely domestic sphere.</span><sup class="reference" data-dcnode-id="8839" id="cite_ref-Tetlow_19-0"><a data-dcnode-id="8840" href="#cite_note-Tetlow-19"><span data-dcnode-id="8841" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8838" instrument_node="">
</span></p><p data-dcnode-id="8783"><span data-dcnode-id="8836" instrument_node="">Laws in patriarchal societies regulated three sorts of sexual infractions involving women: rape, fornication (which includes adultery and prostitution), and incest.</span><sup class="reference" data-dcnode-id="8833" id="cite_ref-Marten_Stol_20-0"><a data-dcnode-id="8834" href="#cite_note-Marten_Stol-20"><span data-dcnode-id="8835" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8832" instrument_node="">  There is a homogeneity to these codes across time, and across borders, which implies the aspects of life that these laws enforced were established practices within the norms and values of the populations.</span><sup class="reference" data-dcnode-id="8829" id="cite_ref-Henry_Sumner_Maine_4-1"><a data-dcnode-id="8830" href="#cite_note-Henry_Sumner_Maine-4"><span data-dcnode-id="8831" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8826"><span data-dcnode-id="8827" title="Page / location: 48"><span data-dcnode-id="8828" instrument_node="">: 48 </span></span></sup><span data-dcnode-id="8825" instrument_node="">  The prominent use of corporal punishment, capital punishment, corporal mutilation, 'eye-for-an-eye' </span><i data-dcnode-id="8822"><a data-dcnode-id="8823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eye_for_an_eye" title="Eye for an eye"><span data-dcnode-id="8824" instrument_node="">talion</span></a></i><span data-dcnode-id="8821" instrument_node=""> punishments, and vicarious punishments (children for their fathers) were standard across Mesopotamian Law.</span><sup class="reference" data-dcnode-id="8818" id="cite_ref-Elisabeth_Meier_Tetlow_5-1"><a data-dcnode-id="8819" href="#cite_note-Elisabeth_Meier_Tetlow-5"><span data-dcnode-id="8820" instrument_node="">[5]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8815"><span data-dcnode-id="8816" title="Page / location: 72"><span data-dcnode-id="8817" instrument_node="">: 72 </span></span></sup><span data-dcnode-id="8814" instrument_node=""> </span><a data-dcnode-id="8812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ur-Nammu" title="Ur-Nammu"><span data-dcnode-id="8813" instrument_node="">Ur-Nammu</span></a><span data-dcnode-id="8811" instrument_node="">, who founded the Sumerian Third Dynasty of Ur in southern Mesopotamia, sponsored the </span><a data-dcnode-id="8809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Code_of_Ur-Nammu" title="Code of Ur-Nammu"><span data-dcnode-id="8810" instrument_node="">oldest surviving codes of law</span></a><span data-dcnode-id="8808" instrument_node=""> dating from approximately 2200 BCE.</span><sup class="reference" data-dcnode-id="8805" id="cite_ref-Elisabeth_Meier_Tetlow_5-2"><a data-dcnode-id="8806" href="#cite_note-Elisabeth_Meier_Tetlow-5"><span data-dcnode-id="8807" instrument_node="">[5]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8802"><span data-dcnode-id="8803" title="Page / location: 10, 40"><span data-dcnode-id="8804" instrument_node="">: 10, 40 </span></span></sup><span data-dcnode-id="8801" instrument_node="">  Most other codes of law date from the second millennium BCE including the famous </span><a data-dcnode-id="8799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Code_of_Hammurabi" title="Code of Hammurabi"><span data-dcnode-id="8800" instrument_node="">Babylonian Laws of Hammurabi</span></a><span data-dcnode-id="8798" instrument_node=""> which dates to about 1750 BCE.</span><sup class="reference" data-dcnode-id="8795" id="cite_ref-Elisabeth_Meier_Tetlow_5-3"><a data-dcnode-id="8796" href="#cite_note-Elisabeth_Meier_Tetlow-5"><span data-dcnode-id="8797" instrument_node="">[5]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8792"><span data-dcnode-id="8793" title="Page / location: 53"><span data-dcnode-id="8794" instrument_node="">: 53 </span></span></sup><span data-dcnode-id="8791" instrument_node="">  Ancient laws favored men, protecting the procreative rights of men as a common value in all the laws pertaining to women and sex.</span><sup class="reference" data-dcnode-id="8788" id="cite_ref-Marten_Stol_20-1"><a data-dcnode-id="8789" href="#cite_note-Marten_Stol-20"><span data-dcnode-id="8790" instrument_node="">[20]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8785"><span data-dcnode-id="8786" title="Page / location: 14"><span data-dcnode-id="8787" instrument_node="">: 14 </span></span></sup><span data-dcnode-id="8784" instrument_node="">
</span></p><p data-dcnode-id="8753"><span data-dcnode-id="8782" instrument_node="">In all these codes, rape is punished differently depending upon whether it occurs in the city where a woman's calls for help could be heard or the country where they could not be (as in Deuteronomy 22:23-27).</span><sup class="reference" data-dcnode-id="8779" id="cite_ref-Elisabeth_Meier_Tetlow_5-4"><a data-dcnode-id="8780" href="#cite_note-Elisabeth_Meier_Tetlow-5"><span data-dcnode-id="8781" instrument_node="">[5]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8776"><span data-dcnode-id="8777" title="Page / location: 12"><span data-dcnode-id="8778" instrument_node="">: 12 </span></span></sup><span data-dcnode-id="8775" instrument_node=""> The </span><a data-dcnode-id="8773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hittite_laws" title="Hittite laws"><span data-dcnode-id="8774" instrument_node="">Hittite laws</span></a><span data-dcnode-id="8772" instrument_node=""> also condemns a woman raped in her house presuming the man could not have entered without her permission.</span><sup class="reference" data-dcnode-id="8769" id="cite_ref-Charles_Burney_21-0"><a data-dcnode-id="8770" href="#cite_note-Charles_Burney-21"><span data-dcnode-id="8771" instrument_node="">[21]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8766"><span data-dcnode-id="8767" title="Page / location: 198, 199"><span data-dcnode-id="8768" instrument_node="">: 198, 199 </span></span></sup><span data-dcnode-id="8765" instrument_node=""> Fornication is a broad term for a variety of inappropriate sexual behaviors including adultery and prostitution. In the code of Hammurabi, and in the Assyrian code, both the adulterous woman and her lover are to be bound and drowned, but forgiveness could supply a reprieve.</span><sup class="reference" data-dcnode-id="8762" id="cite_ref-Adultery_22-0"><a data-dcnode-id="8763" href="#cite_note-Adultery-22"><span data-dcnode-id="8764" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8761" instrument_node=""> In the Biblical law, (Leviticus 20:10; Deuteronomy 22:22) forgiveness is not an option: the lovers must die (Deuteronomy 22:21,24). No mention is made of an adulterous man in any code. In Hammurabi, a woman can apply for a divorce but must prove her moral worthiness or be drowned for asking. It is enough in all codes for two unmarried individuals engaged in a sexual relationship to marry.  However, if a husband later accuses his wife of not having been a virgin when they married, she will be stoned to death.</span><sup class="reference" data-dcnode-id="8758" id="cite_ref-23"><a data-dcnode-id="8759" href="#cite_note-23"><span data-dcnode-id="8760" instrument_node="">[23]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8755"><span data-dcnode-id="8756" title="Page / location: 94, 104"><span data-dcnode-id="8757" instrument_node="">: 94, 104 </span></span></sup><span data-dcnode-id="8754" instrument_node="">
</span></p><p data-dcnode-id="8704"><span data-dcnode-id="8752" instrument_node="">Until the codes introduced in the Hebrew Bible, most codes of law allowed prostitution. Classics scholars </span><a data-dcnode-id="8750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allison_Glazebrook" title="Allison Glazebrook"><span data-dcnode-id="8751" instrument_node="">Allison Glazebrook</span></a><span data-dcnode-id="8749" instrument_node=""> and Madeleine M. Henry say attitudes concerning prostitution "cut to the core of societal attitude towards gender and to social constructions of sexuality."</span><sup class="reference" data-dcnode-id="8746" id="cite_ref-Glazebrook_and_Henry_24-0"><a data-dcnode-id="8747" href="#cite_note-Glazebrook_and_Henry-24"><span data-dcnode-id="8748" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8743"><span data-dcnode-id="8744" title="Page / location: 3"><span data-dcnode-id="8745" instrument_node="">: 3 </span></span></sup><span data-dcnode-id="8742" instrument_node=""> Many women in a variety of ancient cultures were forced into prostitution.</span><sup class="reference" data-dcnode-id="8739" id="cite_ref-Marten_Stol_20-2"><a data-dcnode-id="8740" href="#cite_note-Marten_Stol-20"><span data-dcnode-id="8741" instrument_node="">[20]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8736"><span data-dcnode-id="8737" title="Page / location: 413"><span data-dcnode-id="8738" instrument_node="">: 413 </span></span></sup><span data-dcnode-id="8735" instrument_node=""> Many were children and adolescents. According to the 5th century BC historian </span><a data-dcnode-id="8733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herodotus" title="Herodotus"><span data-dcnode-id="8734" instrument_node="">Herodotus</span></a><span data-dcnode-id="8732" instrument_node="">, the </span><a data-dcnode-id="8730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacred_prostitution" title="Sacred prostitution"><span data-dcnode-id="8731" instrument_node="">sacred prostitution</span></a><span data-dcnode-id="8729" instrument_node=""> of the Babylonians was "a shameful custom" requiring every woman in the country to go to the precinct of Venus, and consort with a stranger.</span><sup class="reference" data-dcnode-id="8726" id="cite_ref-25"><a data-dcnode-id="8727" href="#cite_note-25"><span data-dcnode-id="8728" instrument_node="">[25]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8723"><span data-dcnode-id="8724" title="Page / location: 211"><span data-dcnode-id="8725" instrument_node="">: 211 </span></span></sup><span data-dcnode-id="8722" instrument_node=""> Some waited years for release while being used without say or pay. The initiation rituals of </span><i data-dcnode-id="8720"><span data-dcnode-id="8721" instrument_node="">devdasi</span></i><span data-dcnode-id="8719" instrument_node=""> of pre-pubescent girls included a deflowering ceremony which gave Priests the right to have intercourse with every girl in the temple. In Greece, slaves were required to work as prostitutes and had no right to decline.</span><sup class="reference" data-dcnode-id="8716" id="cite_ref-Glazebrook_and_Henry_24-1"><a data-dcnode-id="8717" href="#cite_note-Glazebrook_and_Henry-24"><span data-dcnode-id="8718" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8713"><span data-dcnode-id="8714" title="Page / location: 3"><span data-dcnode-id="8715" instrument_node="">: 3 </span></span></sup><span data-dcnode-id="8712" instrument_node=""> The Hebrew Bible code is the only one of these codes that condemns prostitution.</span><sup class="reference" data-dcnode-id="8709" id="cite_ref-Marten_Stol_20-3"><a data-dcnode-id="8710" href="#cite_note-Marten_Stol-20"><span data-dcnode-id="8711" instrument_node="">[20]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8706"><span data-dcnode-id="8707" title="Page / location: 399–418"><span data-dcnode-id="8708" instrument_node="">: 399–418 </span></span></sup><span data-dcnode-id="8705" instrument_node="">
</span></p><p data-dcnode-id="8688"><span data-dcnode-id="8703" instrument_node="">In the code of Hammurabi, as in Leviticus, incest is condemned and punishable by death, however, punishment is dependent upon whether the honor of another man has been compromised.</span><sup class="reference" data-dcnode-id="8700" id="cite_ref-Elisabeth_Meier_Tetlow_5-5"><a data-dcnode-id="8701" href="#cite_note-Elisabeth_Meier_Tetlow-5"><span data-dcnode-id="8702" instrument_node="">[5]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8697"><span data-dcnode-id="8698" title="Page / location: 61"><span data-dcnode-id="8699" instrument_node="">: 61 </span></span></sup><span data-dcnode-id="8696" instrument_node="">  Genesis glosses over incest repeatedly, and in 2 Samuel and the time of King David, Tamar is still able to offer marriage to her half brother as an alternative to rape. Exodus, Leviticus, and Numbers condemn all sexual relations between relatives.</span><sup class="reference" data-dcnode-id="8693" id="cite_ref-Marten_Stol_20-4"><a data-dcnode-id="8694" href="#cite_note-Marten_Stol-20"><span data-dcnode-id="8695" instrument_node="">[20]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8690"><span data-dcnode-id="8691" title="Page / location: 268–274"><span data-dcnode-id="8692" instrument_node="">: 268–274 </span></span></sup><span data-dcnode-id="8689" instrument_node="">
</span></p><span data-dcnode-id="8687" instrument_node="">
</span><h2 data-dcnode-id="8676"><span data-dcnode-id="8686" id="Hebrew_Bible_.28Old_Testament.29"></span><span class="mw-headline" data-dcnode-id="8684" id="Hebrew_Bible_(Old_Testament)"><span data-dcnode-id="8685" instrument_node="">Hebrew Bible (Old Testament)</span></span><span class="mw-editsection" data-dcnode-id="8677"><span class="mw-editsection-bracket" data-dcnode-id="8682"><span data-dcnode-id="8683" instrument_node="">[</span></span><a data-dcnode-id="8680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D2" title="Edit section: Hebrew Bible (Old Testament)"><span data-dcnode-id="8681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8678"><span data-dcnode-id="8679" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8675" instrument_node="">
</span><link data-dcnode-id="8674" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8670" role="note"><span data-dcnode-id="8673" instrument_node="">See also: </span><a data-dcnode-id="8671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women_in_Judaism" title="Women in Judaism"><span data-dcnode-id="8672" instrument_node="">Women in Judaism</span></a></div><span data-dcnode-id="8669" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8649"><div class="thumbinner" data-dcnode-id="8650" style="width:332px;"><a class="image" data-dcnode-id="8667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJacopo_da_Ponte_002.jpg"><img alt="" class="thumbimage" data-dcnode-id="8668" data-file-height="2493" data-file-width="3176" decoding="async" height="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Jacopo_da_Ponte_002.jpg/330px-Jacopo_da_Ponte_002.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Jacopo_da_Ponte_002.jpg/495px-Jacopo_da_Ponte_002.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/36/Jacopo_da_Ponte_002.jpg/660px-Jacopo_da_Ponte_002.jpg 2x" width="330"></a><span data-dcnode-id="8666" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8651"><div class="magnify" data-dcnode-id="8664"><a class="internal" data-dcnode-id="8665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJacopo_da_Ponte_002.jpg" title="Enlarge"></a></div><i data-dcnode-id="8662"><span data-dcnode-id="8663" instrument_node="">The Construction of Noah's Ark</span></i><span data-dcnode-id="8661" instrument_node=""> depicts the eight people said to be on </span><a data-dcnode-id="8659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noah%2527s_Ark" title="Noah's Ark"><span data-dcnode-id="8660" instrument_node="">the ark</span></a><span data-dcnode-id="8658" instrument_node="">, including </span><a data-dcnode-id="8656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wives_aboard_Noah%2527s_Ark" title="Wives aboard Noah's Ark"><span data-dcnode-id="8657" instrument_node="">the four wives</span></a><span data-dcnode-id="8655" instrument_node="">, who are all unnamed in the Book of Genesis. </span><a data-dcnode-id="8653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacopo_Bassano" title="Jacopo Bassano"><span data-dcnode-id="8654" instrument_node="">Jacopo Bassano</span></a><span data-dcnode-id="8652" instrument_node="">, 16th century.</span></div></div></div><span data-dcnode-id="8648" instrument_node="">
</span><p data-dcnode-id="8614"><span data-dcnode-id="8647" instrument_node="">According to traditional Jewish enumeration, the Hebrew canon is composed of 24 books written </span><a data-dcnode-id="8645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authorship_of_the_Bible" title="Authorship of the Bible"><span data-dcnode-id="8646" instrument_node="">by various authors</span></a><span data-dcnode-id="8644" instrument_node="">, using primarily </span><a data-dcnode-id="8642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="8643" instrument_node="">Hebrew</span></a><span data-dcnode-id="8641" instrument_node=""> and some </span><a class="mw-redirect" data-dcnode-id="8639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aramaic_language" title="Aramaic language"><span data-dcnode-id="8640" instrument_node="">Aramaic</span></a><span data-dcnode-id="8638" instrument_node="">, which came into being over a span of almost a millennium.</span><sup class="reference" data-dcnode-id="8635" id="cite_ref-Alan_Mittleman_26-0"><a data-dcnode-id="8636" href="#cite_note-Alan_Mittleman-26"><span data-dcnode-id="8637" instrument_node="">[26]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8632"><span data-dcnode-id="8633" title="Page / location: 17"><span data-dcnode-id="8634" instrument_node="">: 17 </span></span></sup><sup class="reference" data-dcnode-id="8629" id="cite_ref-Lim_2005_41_27-0"><a data-dcnode-id="8630" href="#cite_note-Lim_2005_41-27"><span data-dcnode-id="8631" instrument_node="">[27]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8626"><span data-dcnode-id="8627" title="Page / location: 41"><span data-dcnode-id="8628" instrument_node="">: 41 </span></span></sup><span data-dcnode-id="8625" instrument_node=""> The Hebrew Bible's earliest texts reflect a Late Bronze Age Near Eastern civilization, while its last text, thought by most scholars to be the </span><a data-dcnode-id="8623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Daniel" title="Book of Daniel"><span data-dcnode-id="8624" instrument_node="">Book of Daniel</span></a><span data-dcnode-id="8622" instrument_node="">, comes from a second century BCE Hellenistic world.</span><sup class="reference" data-dcnode-id="8619" id="cite_ref-Alan_Mittleman_26-1"><a data-dcnode-id="8620" href="#cite_note-Alan_Mittleman-26"><span data-dcnode-id="8621" instrument_node="">[26]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8616"><span data-dcnode-id="8617" title="Page / location: 17"><span data-dcnode-id="8618" instrument_node="">: 17 </span></span></sup><span data-dcnode-id="8615" instrument_node="">
</span></p><p data-dcnode-id="8594"><span data-dcnode-id="8613" instrument_node="">Compared to the number of men, few women are mentioned in the Bible by name. The exact number of named and unnamed women in the Bible is somewhat uncertain because of a number of difficulties involved in calculating the total. For example, the Bible sometimes uses different names for the same woman, names in different languages can be translated differently, and some names can be used for either men or women. Professor Karla Bombach says one study produced a total of 3000-3100 names, 2900 of which are men with 170 of the total being women. However, the possibility of duplication produced the recalculation of a total of 1700 distinct personal names in the Bible with 137 of them being women.  In yet another study of the Hebrew Bible only, there were a total of 1426 names with 1315 belonging to men and 111 to women. Seventy percent of the named and unnamed women in the Bible come from the Hebrew Bible.</span><sup class="reference" data-dcnode-id="8610" id="cite_ref-Bombach_28-0"><a data-dcnode-id="8611" href="#cite_note-Bombach-28"><span data-dcnode-id="8612" instrument_node="">[28]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8607"><span data-dcnode-id="8608" title="Page / location: 33, 34"><span data-dcnode-id="8609" instrument_node="">: 33, 34 </span></span></sup><span data-dcnode-id="8606" instrument_node=""> "Despite the disparities among these different calculations, ... [it remains true that] women or women's names represent between 5.5 and 8 percent of the total [names in  the Bible], a stunning reflection of the androcentric character of the Bible."</span><sup class="reference" data-dcnode-id="8603" id="cite_ref-Bombach_28-1"><a data-dcnode-id="8604" href="#cite_note-Bombach-28"><span data-dcnode-id="8605" instrument_node="">[28]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8600"><span data-dcnode-id="8601" title="Page / location: 34"><span data-dcnode-id="8602" instrument_node="">: 34 </span></span></sup><span data-dcnode-id="8599" instrument_node=""> A study of women whose spoken words are recorded found 93, of which 49 women are named.</span><sup class="reference" data-dcnode-id="8596" id="cite_ref-Hardin_29-0"><a data-dcnode-id="8597" href="#cite_note-Hardin-29"><span data-dcnode-id="8598" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8595" instrument_node="">
</span></p><p data-dcnode-id="8535"><span data-dcnode-id="8593" instrument_node="">The common, ordinary, everyday Hebrew woman is "largely unseen" in the pages of the Bible, and the women that are seen, are the unusual who rose to prominence.</span><sup class="reference" data-dcnode-id="8590" id="cite_ref-Carol_Meyers_30-0"><a data-dcnode-id="8591" href="#cite_note-Carol_Meyers-30"><span data-dcnode-id="8592" instrument_node="">[30]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8587"><span data-dcnode-id="8588" title="Page / location: 5"><span data-dcnode-id="8589" instrument_node="">: 5 </span></span></sup><span data-dcnode-id="8586" instrument_node=""> These prominent women include the </span><a class="mw-redirect" data-dcnode-id="8584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matriarchs_%28Bible%29" title="Matriarchs (Bible)"><span data-dcnode-id="8585" instrument_node="">Matriarchs</span></a><span data-dcnode-id="8583" instrument_node=""> </span><a data-dcnode-id="8581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah" title="Sarah"><span data-dcnode-id="8582" instrument_node="">Sarah</span></a><span data-dcnode-id="8580" instrument_node="">, </span><a data-dcnode-id="8578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rebecca" title="Rebecca"><span data-dcnode-id="8579" instrument_node="">Rebecca</span></a><span data-dcnode-id="8577" instrument_node="">, </span><a data-dcnode-id="8575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rachel" title="Rachel"><span data-dcnode-id="8576" instrument_node="">Rachel</span></a><span data-dcnode-id="8574" instrument_node="">, and </span><a data-dcnode-id="8572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leah" title="Leah"><span data-dcnode-id="8573" instrument_node="">Leah</span></a><span data-dcnode-id="8571" instrument_node="">, </span><a data-dcnode-id="8569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miriam" title="Miriam"><span data-dcnode-id="8570" instrument_node="">Miriam</span></a><span data-dcnode-id="8568" instrument_node=""> the prophetess, </span><a data-dcnode-id="8566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deborah" title="Deborah"><span data-dcnode-id="8567" instrument_node="">Deborah</span></a><span data-dcnode-id="8565" instrument_node=""> the Judge, </span><a data-dcnode-id="8563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huldah" title="Huldah"><span data-dcnode-id="8564" instrument_node="">Huldah</span></a><span data-dcnode-id="8562" instrument_node=""> the prophetess, </span><a data-dcnode-id="8560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abigail" title="Abigail"><span data-dcnode-id="8561" instrument_node="">Abigail</span></a><span data-dcnode-id="8559" instrument_node="">, who married </span><a data-dcnode-id="8557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David" title="David"><span data-dcnode-id="8558" instrument_node="">David</span></a><span data-dcnode-id="8556" instrument_node="">, </span><a data-dcnode-id="8554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rahab" title="Rahab"><span data-dcnode-id="8555" instrument_node="">Rahab</span></a><span data-dcnode-id="8553" instrument_node="">, and </span><a data-dcnode-id="8551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esther" title="Esther"><span data-dcnode-id="8552" instrument_node="">Esther</span></a><span data-dcnode-id="8550" instrument_node="">.  A common phenomenon in the bible is the pivotal role that women take in subverting man-made power structures.  The result is often a more just outcome than what would have taken place under ordinary circumstances.</span><sup class="reference" data-dcnode-id="8547" id="cite_ref-31"><a data-dcnode-id="8548" href="#cite_note-31"><span data-dcnode-id="8549" instrument_node="">[31]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8544"><span data-dcnode-id="8545" title="Page / location: 68"><span data-dcnode-id="8546" instrument_node="">: 68 </span></span></sup><span data-dcnode-id="8543" instrument_node=""> Law professor Geoffrey Miller explains that these women did not receive opposition for the roles they played, but were honored instead.</span><sup class="reference" data-dcnode-id="8540" id="cite_ref-32"><a data-dcnode-id="8541" href="#cite_note-32"><span data-dcnode-id="8542" instrument_node="">[32]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8537"><span data-dcnode-id="8538" title="Page / location: 127"><span data-dcnode-id="8539" instrument_node="">: 127 </span></span></sup><span data-dcnode-id="8536" instrument_node="">
</span></p><span data-dcnode-id="8534" instrument_node="">
</span><h3 data-dcnode-id="8524"><span class="mw-headline" data-dcnode-id="8532" id="Hebrew_Bible_views_on_gender"><span data-dcnode-id="8533" instrument_node="">Hebrew Bible views on gender</span></span><span class="mw-editsection" data-dcnode-id="8525"><span class="mw-editsection-bracket" data-dcnode-id="8530"><span data-dcnode-id="8531" instrument_node="">[</span></span><a data-dcnode-id="8528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D3" title="Edit section: Hebrew Bible views on gender"><span data-dcnode-id="8529" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8526"><span data-dcnode-id="8527" instrument_node="">]</span></span></span></h3><p data-dcnode-id="8501"><span data-dcnode-id="8523" instrument_node="">
There has been a substantial agreement for over one hundred years, among a wide variety of scholars, that the Hebrew Bible is a predominantly patriarchal document from a patriarchal age. New Testament scholar </span><a data-dcnode-id="8521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Witherington_III" title="Ben Witherington III"><span data-dcnode-id="8522" instrument_node="">Ben Witherington III</span></a><span data-dcnode-id="8520" instrument_node=""> says it "limited women's roles and functions to the home, and severely restricted: (1) their rights of inheritance, (2) their choice of relationship, (3) their ability to pursue a religious education or fully participate in a synagogue, and (4) limited their freedom of movement."</span><sup class="reference" data-dcnode-id="8517" id="cite_ref-Scot_McKnight_33-0"><a data-dcnode-id="8518" href="#cite_note-Scot_McKnight-33"><span data-dcnode-id="8519" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8516" instrument_node=""> Textual scholar </span><a data-dcnode-id="8514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phyllis_Trible" title="Phyllis Trible"><span data-dcnode-id="8515" instrument_node="">Phyllis Trible</span></a><span data-dcnode-id="8513" instrument_node=""> says "considerable evidence depicts the Bible as a document of male supremacy."</span><sup class="reference" data-dcnode-id="8510" id="cite_ref-Trible1973depat_34-0"><a data-dcnode-id="8511" href="#cite_note-Trible1973depat-34"><span data-dcnode-id="8512" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="8507" id="cite_ref-Trible1984terror_35-0"><a data-dcnode-id="8508" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="8509" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8506" instrument_node="">  Theologian Eryl Davies says the patriarchal ethos is reflected in texts ranging from legal texts to narratives, and from the prophetic sayings to the wisdom literature.</span><sup class="reference" data-dcnode-id="8503" id="cite_ref-Davies1_36-0"><a data-dcnode-id="8504" href="#cite_note-Davies1-36"><span data-dcnode-id="8505" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8502" instrument_node=""> Recent scholarship is calling some aspects of this into question. </span></p><blockquote data-dcnode-id="8492"><p data-dcnode-id="8493"><span data-dcnode-id="8500" instrument_node=""> This concept [of patriarchy] was formulated by nineteenth-century anthropologists using classical literature, especially legal texts, ... Biblical scholars ...soon took up the term. By the early twentieth century, sociologists (notably Weber) extended the concept of patriarchy to include society-wide male domination. This too entered scholarship on the Hebrew Bible and ancient Israel. However, the validity and appropriateness of this concept to designate both families and society have recently been challenged in several disciplines: in classical scholarship, by using sources other than legal texts; in research on the Hebrew Bible and ancient Israel, also by using multiple sources; and in the work of third-wave feminists, both social theorists and feminist archaeologists. Taken together, these challenges provide compelling reasons for abandoning the patriarchy model as an adequate or accurate descriptor of ancient Israel.</span><sup class="reference" data-dcnode-id="8497" id="cite_ref-Carol_L._Meyers_1-3"><a data-dcnode-id="8498" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8499" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8494"><span data-dcnode-id="8495" title="Page / location: 9"><span data-dcnode-id="8496" instrument_node="">: 9 </span></span></sup></p></blockquote><span data-dcnode-id="8491" instrument_node="">
</span><p data-dcnode-id="8451"><span data-dcnode-id="8490" instrument_node="">Meyers argues for </span><em data-dcnode-id="8488"><span data-dcnode-id="8489" instrument_node="">heterarchy</span></em><span data-dcnode-id="8487" instrument_node=""> over patriarchy as the appropriate term to describe ancient Israelite attitudes toward gender. Heterarchy acknowledges that different "power structures can exist simultaneously in any given society, with each structure having its own hierarchical arrangements that may cross-cut each other laterally".</span><sup class="reference" data-dcnode-id="8484" id="cite_ref-Carol_L._Meyers_1-4"><a data-dcnode-id="8485" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8486" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8481"><span data-dcnode-id="8482" title="Page / location: 27"><span data-dcnode-id="8483" instrument_node="">: 27 </span></span></sup><span data-dcnode-id="8480" instrument_node=""> Meyers says male dominance was real but fragmentary, with women also having spheres of influence of their own.</span><sup class="reference" data-dcnode-id="8477" id="cite_ref-Carol_L._Meyers_1-5"><a data-dcnode-id="8478" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8479" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8474"><span data-dcnode-id="8475" title="Page / location: 27"><span data-dcnode-id="8476" instrument_node="">: 27 </span></span></sup><span data-dcnode-id="8473" instrument_node=""> Women were responsible for "maintenance activities" including economic, social, political and religious life in both the household and the community.</span><sup class="reference" data-dcnode-id="8470" id="cite_ref-Carol_L._Meyers_1-6"><a data-dcnode-id="8471" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8472" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8467"><span data-dcnode-id="8468" title="Page / location: 20"><span data-dcnode-id="8469" instrument_node="">: 20 </span></span></sup><span data-dcnode-id="8466" instrument_node=""> The Old Testament lists twenty different professional-type positions that women held in ancient Isarael.</span><sup class="reference" data-dcnode-id="8463" id="cite_ref-Carol_L._Meyers_1-7"><a data-dcnode-id="8464" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8465" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8460"><span data-dcnode-id="8461" title="Page / location: 22, 23"><span data-dcnode-id="8462" instrument_node="">: 22, 23 </span></span></sup><span data-dcnode-id="8459" instrument_node=""> Meyers references </span><a data-dcnode-id="8457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tikva_Frymer-Kensky" title="Tikva Frymer-Kensky"><span data-dcnode-id="8458" instrument_node="">Tikva Frymer-Kensky</span></a><span data-dcnode-id="8456" instrument_node=""> as saying that Deuteronomic laws were fair to women except in matters of sexuality.</span><sup class="reference" data-dcnode-id="8453" id="cite_ref-WBC_3-1"><a data-dcnode-id="8454" href="#cite_note-WBC-3"><span data-dcnode-id="8455" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8452" instrument_node="">
</span></p><p data-dcnode-id="8385"><span data-dcnode-id="8450" instrument_node="">Frymer-Kensky says there is evidence of "gender blindness" in the Hebrew Bible.</span><sup class="reference" data-dcnode-id="8447" id="cite_ref-Frymer-Kensky2006_2-1"><a data-dcnode-id="8448" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="8449" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8444"><span data-dcnode-id="8445" title="Page / location: 166–167"><span data-dcnode-id="8446" instrument_node="">: 166–167 </span></span></sup><span data-dcnode-id="8443" instrument_node="">  Unlike other ancient literature, the Hebrew Bible does not explain or justify cultural subordination by portraying women as deserving of less because of their "naturally evil" natures.  The Biblical depiction of early Bronze Age culture up through the Axial Age, depicts the "essence" of women, (that is the Bible's metaphysical view of being and nature), of both male and female as "created in the image of God" with neither one inherently inferior in nature.</span><sup class="reference" data-dcnode-id="8440" id="cite_ref-Blumenthal_11-1"><a data-dcnode-id="8441" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8442" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8437"><span data-dcnode-id="8438" title="Page / location: 41, 42"><span data-dcnode-id="8439" instrument_node="">: 41, 42 </span></span></sup><span data-dcnode-id="8436" instrument_node=""> Discussions of the nature of women are conspicuously absent from the Hebrew Bible.</span><sup class="reference" data-dcnode-id="8433" id="cite_ref-Tykva_Frymer-Kensky_37-0"><a data-dcnode-id="8434" href="#cite_note-Tykva_Frymer-Kensky-37"><span data-dcnode-id="8435" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8432" instrument_node=""> Biblical narratives do not show women as having different goals, desires, or strategies or as using methods that vary from those used by men not in authority.</span><sup class="reference" data-dcnode-id="8429" id="cite_ref-Tykva_Frymer-Kensky_37-1"><a data-dcnode-id="8430" href="#cite_note-Tykva_Frymer-Kensky-37"><span data-dcnode-id="8431" instrument_node="">[37]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8426"><span data-dcnode-id="8427" title="Page / location: xv"><span data-dcnode-id="8428" instrument_node="">: xv </span></span></sup><span data-dcnode-id="8425" instrument_node=""> Judaic studies scholar David R. Blumenthal explains these strategies made use of "informal power" which was different from that of men with authority.</span><sup class="reference" data-dcnode-id="8422" id="cite_ref-Blumenthal_11-2"><a data-dcnode-id="8423" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8424" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8419"><span data-dcnode-id="8420" title="Page / location: 41, 42"><span data-dcnode-id="8421" instrument_node="">: 41, 42 </span></span></sup><span data-dcnode-id="8418" instrument_node=""> There are no personality traits described as being unique to women in the Hebrew Bible.</span><sup class="reference" data-dcnode-id="8415" id="cite_ref-Tykva_Frymer-Kensky_37-2"><a data-dcnode-id="8416" href="#cite_note-Tykva_Frymer-Kensky-37"><span data-dcnode-id="8417" instrument_node="">[37]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8412"><span data-dcnode-id="8413" title="Page / location: 166–167"><span data-dcnode-id="8414" instrument_node="">: 166–167 </span></span></sup><span data-dcnode-id="8411" instrument_node="">  Most theologians agree the Hebrew Bible does not depict the slave, the poor, or women, as different metaphysically in the manner other societies of the same eras did.</span><sup class="reference" data-dcnode-id="8408" id="cite_ref-Tykva_Frymer-Kensky_37-3"><a data-dcnode-id="8409" href="#cite_note-Tykva_Frymer-Kensky-37"><span data-dcnode-id="8410" instrument_node="">[37]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8405"><span data-dcnode-id="8406" title="Page / location: 166–167"><span data-dcnode-id="8407" instrument_node="">: 166–167 </span></span></sup><sup class="reference" data-dcnode-id="8402" id="cite_ref-Blumenthal_11-3"><a data-dcnode-id="8403" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8404" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8399"><span data-dcnode-id="8400" title="Page / location: 41, 42"><span data-dcnode-id="8401" instrument_node="">: 41, 42 </span></span></sup><sup class="reference" data-dcnode-id="8396" id="cite_ref-Susan_Moller_Okin_10-3"><a data-dcnode-id="8397" href="#cite_note-Susan_Moller_Okin-10"><span data-dcnode-id="8398" instrument_node="">[10]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8393"><span data-dcnode-id="8394" title="Page / location: 15–20"><span data-dcnode-id="8395" instrument_node="">: 15–20 </span></span></sup><sup class="reference" data-dcnode-id="8390" id="cite_ref-Sarah_Pomeroy_8-3"><a data-dcnode-id="8391" href="#cite_note-Sarah_Pomeroy-8"><span data-dcnode-id="8392" instrument_node="">[8]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8387"><span data-dcnode-id="8388" title="Page / location: 18"><span data-dcnode-id="8389" instrument_node="">: 18 </span></span></sup><span data-dcnode-id="8386" instrument_node="">
</span></p><p data-dcnode-id="8354"><span data-dcnode-id="8384" instrument_node="">Theologians </span><a data-dcnode-id="8382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evelyn_Stagg" title="Evelyn Stagg"><span data-dcnode-id="8383" instrument_node="">Evelyn Stagg</span></a><span data-dcnode-id="8381" instrument_node=""> and </span><a data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Stagg_%28theologian%29" title="Frank Stagg (theologian)"><span data-dcnode-id="8380" instrument_node="">Frank Stagg</span></a><span data-dcnode-id="8378" instrument_node=""> say the </span><a class="mw-redirect" data-dcnode-id="8376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decalogue" title="Decalogue"><span data-dcnode-id="8377" instrument_node="">Ten Commandments</span></a><span data-dcnode-id="8375" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="8373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exodus_20" title="Exodus 20"><span data-dcnode-id="8374" instrument_node="">Exodus 20</span></a><span data-dcnode-id="8372" instrument_node=""> contain aspects of both male priority and gender balance.</span><sup class="reference" data-dcnode-id="8369" id="cite_ref-Evelyn_and_Frank_Stagg_38-0"><a data-dcnode-id="8370" href="#cite_note-Evelyn_and_Frank_Stagg-38"><span data-dcnode-id="8371" instrument_node="">[38]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8366"><span data-dcnode-id="8367" title="Page / location: 21"><span data-dcnode-id="8368" instrument_node="">: 21 </span></span></sup><span data-dcnode-id="8365" instrument_node=""> In the tenth commandment against coveting, a wife is depicted in the examples not to be coveted: house, </span><i data-dcnode-id="8363"><span data-dcnode-id="8364" instrument_node="">wife,</span></i><span data-dcnode-id="8362" instrument_node=""> male or female slave, ox or donkey, or 'anything that belongs to your neighbour.' On the other hand, the fifth commandment to honor parents does not make any distinction in the honor to be shown between one parent and another.</span><sup class="reference" data-dcnode-id="8359" id="cite_ref-Ben_Witherington_III1984_39-0"><a data-dcnode-id="8360" href="#cite_note-Ben_Witherington_III1984-39"><span data-dcnode-id="8361" instrument_node="">[39]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8356"><span data-dcnode-id="8357" title="Page / location: 11, 12"><span data-dcnode-id="8358" instrument_node="">: 11, 12 </span></span></sup><span data-dcnode-id="8355" instrument_node="">
</span></p><p data-dcnode-id="8317"><span data-dcnode-id="8353" instrument_node="">The Hebrew Bible often portrays women as victors, leaders, and heroines with qualities Israel should emulate. Women such as </span><a data-dcnode-id="8351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagar" title="Hagar"><span data-dcnode-id="8352" instrument_node="">Hagar</span></a><span data-dcnode-id="8350" instrument_node="">, </span><a data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tamar_%28Genesis%29" title="Tamar (Genesis)"><span data-dcnode-id="8349" instrument_node="">Tamar</span></a><span data-dcnode-id="8347" instrument_node="">, </span><a data-dcnode-id="8345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miriam" title="Miriam"><span data-dcnode-id="8346" instrument_node="">Miriam</span></a><span data-dcnode-id="8344" instrument_node="">, </span><a data-dcnode-id="8342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rahab" title="Rahab"><span data-dcnode-id="8343" instrument_node="">Rahab</span></a><span data-dcnode-id="8341" instrument_node="">, </span><a data-dcnode-id="8339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deborah" title="Deborah"><span data-dcnode-id="8340" instrument_node="">Deborah</span></a><span data-dcnode-id="8338" instrument_node="">, </span><a data-dcnode-id="8336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esther" title="Esther"><span data-dcnode-id="8337" instrument_node="">Esther</span></a><span data-dcnode-id="8335" instrument_node="">, and </span><a data-dcnode-id="8333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jael" title="Jael"><span data-dcnode-id="8334" instrument_node="">Yael/Jael</span></a><span data-dcnode-id="8332" instrument_node="">, are among many female "saviors" of Israel. Tykva Frymer-Kensky says "victor stories follow the paradigm of Israel's central sacred story: the lowly are raised, the marginal come to the center, the poor boy makes good."</span><sup class="reference" data-dcnode-id="8329" id="cite_ref-Frymer-Kensky2006_2-2"><a data-dcnode-id="8330" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="8331" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8326"><span data-dcnode-id="8327" title="Page / location: 333–337"><span data-dcnode-id="8328" instrument_node="">: 333–337 </span></span></sup><span data-dcnode-id="8325" instrument_node=""> She goes on to say these women conquered the enemy "by their wits and daring, were symbolic representations of their people, and pointed to the salvation of Israel."</span><sup class="reference" data-dcnode-id="8322" id="cite_ref-Frymer-Kensky2006_2-3"><a data-dcnode-id="8323" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="8324" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8319"><span data-dcnode-id="8320" title="Page / location: 333–337"><span data-dcnode-id="8321" instrument_node="">: 333–337 </span></span></sup><span data-dcnode-id="8318" instrument_node="">
</span></p><p data-dcnode-id="8277"><span data-dcnode-id="8316" instrument_node="">The Hebrew Bible portrays women as victims as well as victors.</span><sup class="reference" data-dcnode-id="8313" id="cite_ref-Frymer-Kensky2006_2-4"><a data-dcnode-id="8314" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="8315" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8310"><span data-dcnode-id="8311" title="Page / location: 166–167"><span data-dcnode-id="8312" instrument_node="">: 166–167 </span></span></sup><span data-dcnode-id="8309" instrument_node=""> For example, in </span><a data-dcnode-id="8307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="8308" instrument_node="">Numbers</span></a><span data-dcnode-id="8306" instrument_node=""> 31, the Israelites </span><a class="mw-redirect" data-dcnode-id="8304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midian_war" title="Midian war"><span data-dcnode-id="8305" instrument_node="">slay the people of Midian</span></a><span data-dcnode-id="8303" instrument_node="">, except for 32,000 virgin women who are kept as spoils of war.</span><sup class="reference" data-dcnode-id="8300" id="cite_ref-40"><a data-dcnode-id="8301" href="#cite_note-40"><span data-dcnode-id="8302" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="8297" id="cite_ref-41"><a data-dcnode-id="8298" href="#cite_note-41"><span data-dcnode-id="8299" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8296" instrument_node="">  Frymer-Kensky says the Bible author uses vulnerable women symbolically "as images of an Israel that is also small and vulnerable..."</span><sup class="reference" data-dcnode-id="8293" id="cite_ref-Frymer-Kensky2006_2-5"><a data-dcnode-id="8294" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="8295" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8290"><span data-dcnode-id="8291" title="Page / location: 333–337"><span data-dcnode-id="8292" instrument_node="">: 333–337 </span></span></sup><span data-dcnode-id="8289" instrument_node=""> She adds "This is not misogynist story-telling but something far more complex in which the treatment of women becomes the clue to the morality of the social order."</span><sup class="reference" data-dcnode-id="8286" id="cite_ref-Frymer-Kensky2006_2-6"><a data-dcnode-id="8287" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="8288" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8283"><span data-dcnode-id="8284" title="Page / location: 174"><span data-dcnode-id="8285" instrument_node="">: 174 </span></span></sup><span data-dcnode-id="8282" instrument_node=""> Professor of Religion J. David Pleins says these tales are included by the Deuteronomic historian to demonstrate the evils of life without a centralized shrine and single political authority.</span><sup class="reference" data-dcnode-id="8279" id="cite_ref-J._David_Pleins_42-0"><a data-dcnode-id="8280" href="#cite_note-J._David_Pleins-42"><span data-dcnode-id="8281" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8278" instrument_node="">
</span></p><p data-dcnode-id="8232"><span data-dcnode-id="8276" instrument_node="">Women did have some role in the ritual life of religion as represented in the Bible, though they could not be priests, but then, neither could just any man; only </span><a class="mw-redirect" data-dcnode-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Levites" title="Levites"><span data-dcnode-id="8275" instrument_node="">Levites</span></a><span data-dcnode-id="8273" instrument_node=""> could be priests. Women (as well as men) were required to make a pilgrimage to the </span><a data-dcnode-id="8271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_in_Jerusalem" title="Temple in Jerusalem"><span data-dcnode-id="8272" instrument_node="">Temple in Jerusalem</span></a><span data-dcnode-id="8270" instrument_node=""> once a year (men each of the three main festivals if they could) and offer the </span><a data-dcnode-id="8268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover" title="Passover"><span data-dcnode-id="8269" instrument_node="">Passover</span></a><span data-dcnode-id="8267" instrument_node=""> </span><a data-dcnode-id="8265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korban" title="Korban"><span data-dcnode-id="8266" instrument_node="">sacrifice</span></a><span data-dcnode-id="8264" instrument_node="">.</span><sup class="reference" data-dcnode-id="8261" id="cite_ref-Lim_2005_41_27-1"><a data-dcnode-id="8262" href="#cite_note-Lim_2005_41-27"><span data-dcnode-id="8263" instrument_node="">[27]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8258"><span data-dcnode-id="8259" title="Page / location: 41"><span data-dcnode-id="8260" instrument_node="">: 41 </span></span></sup><span data-dcnode-id="8257" instrument_node="">  They would also do so on
