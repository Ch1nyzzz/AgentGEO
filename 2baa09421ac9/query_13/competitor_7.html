ngton_III-105"><span data-dcnode-id="5908" instrument_node="">[105]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5903"><span data-dcnode-id="5904" title="Page / location: 161"><span data-dcnode-id="5905" instrument_node="">: 161 </span></span></sup><span data-dcnode-id="5902" instrument_node=""> Mary Magdalene and the other women go to anoint Jesus' body at the tomb, but find the body gone.  Mary Magdalene is inconsolable, but she turns and Jesus speaks to her. He calls her by name and she recognizes him.</span><sup class="reference" data-dcnode-id="5899" id="cite_ref-Ben_Witherington_III_105-1"><a data-dcnode-id="5900" href="#cite_note-Ben_Witherington_III-105"><span data-dcnode-id="5901" instrument_node="">[105]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5896"><span data-dcnode-id="5897" title="Page / location: 173, 178"><span data-dcnode-id="5898" instrument_node="">: 173, 178 </span></span></sup><span data-dcnode-id="5895" instrument_node=""> Witherington adds, "There are certain parallels between the story of the appearance to Mary and John 20:24-31 (when Jesus appears to Thomas) [however] Mary is given an apostolic task (to go tell the men) and Thomas is not...  There is little doubt the Fourth evangelist wishes to portray Mary Magdalene as important, perhaps equally important for Jesus' fledgling community as </span><a data-dcnode-id="5893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary%2C_mother_of_Jesus" title="Mary, mother of Jesus"><span data-dcnode-id="5894" instrument_node="">Mother Mary</span></a><span data-dcnode-id="5892" instrument_node=""> herself."</span><sup class="reference" data-dcnode-id="5889" id="cite_ref-Ben_Witherington_III_105-2"><a data-dcnode-id="5890" href="#cite_note-Ben_Witherington_III-105"><span data-dcnode-id="5891" instrument_node="">[105]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5886"><span data-dcnode-id="5887" title="Page / location: 179, 181"><span data-dcnode-id="5888" instrument_node="">: 179, 181 </span></span></sup><span data-dcnode-id="5885" instrument_node="">
</span></p><p data-dcnode-id="5863"><span data-dcnode-id="5883" instrument_node="">The Roman writer </span><a data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Celsus" title="Celsus"><span data-dcnode-id="5882" instrument_node="">Celsus</span></a><span data-dcnode-id="5880" instrument_node="">' </span><i data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">On The True Doctrine</span></i><span data-dcnode-id="5877" instrument_node="">, circa 175, is the earliest known comprehensive criticism of Christianity and survives exclusively in quotations from it in </span><i data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">Contra Celsum</span></i><span data-dcnode-id="5874" instrument_node="">, a refutation written in 248 by </span><a data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Origen" title="Origen"><span data-dcnode-id="5873" instrument_node="">Origen</span></a><span data-dcnode-id="5871" instrument_node=""> of Alexandria.  Margaret MacDonald says Celsus' study of Christian scripture led him to focus on Mary Magdalene as the witness to the resurrection, as someone deluded by the "sorcery" by which Jesus did miracles, and as someone who then becomes one of Jesus' primary "instigators" and "perpetrators". MacDonald explains that, "In Celsus' work, Mary Magdalene's role in the resurrection story denigrates its credibility... From beginning to end, [Celsus says] the story of Jesus' life has been shaped by the 'fanciful imaginings' of women" thus lending enemy attestation to the importance of women in the early church and of Mary Magdalene herself.</span><sup class="reference" data-dcnode-id="5868" id="cite_ref-Margaret_Y._MacDonald_89-5"><a data-dcnode-id="5869" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="5870" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5865"><span data-dcnode-id="5866" title="Page / location: 104"><span data-dcnode-id="5867" instrument_node="">: 104 </span></span></sup><span data-dcnode-id="5864" instrument_node="">
</span></p><p data-dcnode-id="5844"><span data-dcnode-id="5862" instrument_node="">MacDonald sees this negative view of Mary as reflecting a challenge taking place within the church of the second century.  This was a challenge to Mary's role as a woman disciple and to leadership roles for women in general.  "The challenge to Mary's position has been evaluated as an indication of tensions between the existing fact of women's leadership in Christian communities and traditional Greco-Roman views about gender roles."</span><sup class="reference" data-dcnode-id="5859" id="cite_ref-Margaret_Y._MacDonald_89-6"><a data-dcnode-id="5860" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="5861" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5856"><span data-dcnode-id="5857" title="Page / location: 105"><span data-dcnode-id="5858" instrument_node="">: 105 </span></span></sup><span data-dcnode-id="5855" instrument_node="">  MacDonald adds that "Several apocryphal and gnostic texts provide evidence of such a controversy."</span><sup class="reference" data-dcnode-id="5852" id="cite_ref-Margaret_Y._MacDonald_89-7"><a data-dcnode-id="5853" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="5854" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5849"><span data-dcnode-id="5850" title="Page / location: 105"><span data-dcnode-id="5851" instrument_node="">: 105 </span></span></sup><sup class="reference" data-dcnode-id="5846" id="cite_ref-Rosemary_Radford_Ruether_106-0"><a data-dcnode-id="5847" href="#cite_note-Rosemary_Radford_Ruether-106"><span data-dcnode-id="5848" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5845" instrument_node="">
</span></p><span data-dcnode-id="5843" instrument_node="">
</span><h4 data-dcnode-id="5833"><span class="mw-headline" data-dcnode-id="5841" id="Herodias_and_her_daughter"><span data-dcnode-id="5842" instrument_node="">Herodias and her daughter</span></span><span class="mw-editsection" data-dcnode-id="5834"><span class="mw-editsection-bracket" data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">[</span></span><a data-dcnode-id="5837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D39" title="Edit section: Herodias and her daughter"><span data-dcnode-id="5838" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5832" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5818"><div class="thumbinner" data-dcnode-id="5819" style="width:222px;"><a class="image" data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APeter_Paul_Rubens_018.jpg"><img alt="" class="thumbimage" data-dcnode-id="5831" data-file-height="1464" data-file-width="1920" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Peter_Paul_Rubens_018.jpg/220px-Peter_Paul_Rubens_018.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Peter_Paul_Rubens_018.jpg/330px-Peter_Paul_Rubens_018.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Peter_Paul_Rubens_018.jpg/440px-Peter_Paul_Rubens_018.jpg 2x" width="220"></a><span data-dcnode-id="5829" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5820"><div class="magnify" data-dcnode-id="5827"><a class="internal" data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APeter_Paul_Rubens_018.jpg" title="Enlarge"></a></div><i data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">Feast of Herod</span></i><span data-dcnode-id="5824" instrument_node="">, </span><a data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Paul_Rubens" title="Peter Paul Rubens"><span data-dcnode-id="5823" instrument_node="">Peter Paul Rubens</span></a><span data-dcnode-id="5821" instrument_node="">. 17th century</span></div></div></div><span data-dcnode-id="5817" instrument_node="">
</span><p data-dcnode-id="5803"><span data-dcnode-id="5816" instrument_node="">In the Gospels of Matthew and Mark, these women are involved with the execution of </span><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_the_Baptist" title="John the Baptist"><span data-dcnode-id="5815" instrument_node="">John the Baptist</span></a><span data-dcnode-id="5813" instrument_node="">. </span><a data-dcnode-id="5811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herodias" title="Herodias"><span data-dcnode-id="5812" instrument_node="">Herodias</span></a><span data-dcnode-id="5810" instrument_node=""> wanted John dead, because he had called her second marriage unlawful, but her husband king </span><a data-dcnode-id="5808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herod_Antipas" title="Herod Antipas"><span data-dcnode-id="5809" instrument_node="">Herod</span></a><span data-dcnode-id="5807" instrument_node=""> prevented this. On Herod's birthday, </span><a data-dcnode-id="5805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salome" title="Salome"><span data-dcnode-id="5806" instrument_node="">Herodias' daughter</span></a><span data-dcnode-id="5804" instrument_node=""> danced for him, and he was so pleased that he took an oath, in front of witnesses, that he would give her what she wanted. Her mother instructed her to ask for the head of John the Baptist on a plate, and Herod sadly agreed. The imprisoned John was beheaded, the head given to the daughter, and she gave it to her mother.
</span></p><p data-dcnode-id="5797"><span data-dcnode-id="5802" instrument_node="">Herodias' daughter is unnamed in the gospels, but has outside the Bible been referred to as Salome.</span><sup class="reference" data-dcnode-id="5799" id="cite_ref-107"><a data-dcnode-id="5800" href="#cite_note-107"><span data-dcnode-id="5801" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5798" instrument_node="">
</span></p><span data-dcnode-id="5796" instrument_node="">
</span><h4 data-dcnode-id="5786"><span class="mw-headline" data-dcnode-id="5794" id="Sapphira"><span data-dcnode-id="5795" instrument_node="">Sapphira</span></span><span class="mw-editsection" data-dcnode-id="5787"><span class="mw-editsection-bracket" data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">[</span></span><a data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D40" title="Edit section: Sapphira"><span data-dcnode-id="5791" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5785" instrument_node="">
</span><link data-dcnode-id="5784" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5780" role="note"><span data-dcnode-id="5783" instrument_node="">Main article: </span><a data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ananias_and_Sapphira" title="Ananias and Sapphira"><span data-dcnode-id="5782" instrument_node="">Ananias and Sapphira</span></a></div><span data-dcnode-id="5779" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5766"><div class="thumbinner" data-dcnode-id="5767" style="width:222px;"><a class="image" data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANicolas_Poussin%2C_La_Mort_de_Saphire.jpg"><img alt="" class="thumbimage" data-dcnode-id="5778" data-file-height="2816" data-file-width="4594" decoding="async" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Nicolas_Poussin%252C_La_Mort_de_Saphire.jpg/220px-Nicolas_Poussin%252C_La_Mort_de_Saphire.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Nicolas_Poussin%2C_La_Mort_de_Saphire.jpg/330px-Nicolas_Poussin%2C_La_Mort_de_Saphire.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Nicolas_Poussin%2C_La_Mort_de_Saphire.jpg/440px-Nicolas_Poussin%2C_La_Mort_de_Saphire.jpg 2x" width="220"></a><span data-dcnode-id="5776" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5768"><div class="magnify" data-dcnode-id="5774"><a class="internal" data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANicolas_Poussin%2C_La_Mort_de_Saphire.jpg" title="Enlarge"></a></div><a data-dcnode-id="5772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicolas_Poussin" title="Nicolas Poussin"><span data-dcnode-id="5773" instrument_node="">Nicolas Poussin</span></a><span data-dcnode-id="5771" instrument_node="">, </span><i data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">The Death of  Sapphira</span></i></div></div></div><span data-dcnode-id="5765" instrument_node="">
</span><p data-dcnode-id="5751"><span data-dcnode-id="5764" instrument_node="">Ananias and his wife Sapphira were, according to the </span><a data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_of_the_Apostles" title="Acts of the Apostles"><span data-dcnode-id="5763" instrument_node="">Acts of the Apostles</span></a><span data-dcnode-id="5761" instrument_node=""> </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_5" title="Acts 5"><span data-dcnode-id="5760" instrument_node="">chapter 5</span></a><span data-dcnode-id="5758" instrument_node="">, members of the </span><a class="mw-redirect" data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Christian" title="Early Christian"><span data-dcnode-id="5757" instrument_node="">early Christian</span></a><span data-dcnode-id="5755" instrument_node=""> church in </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_centers_of_Christianity%23Jerusalem" title="Early centers of Christianity"><span data-dcnode-id="5754" instrument_node="">Jerusalem</span></a><span data-dcnode-id="5752" instrument_node="">. The account records their sudden deaths after lying about money.
</span></p><p data-dcnode-id="5734"><span data-dcnode-id="5750" instrument_node="">Acts chapter </span><a class="external text" data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DActs%25204%3A32%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="5749" instrument_node="">4:32</span></a><span data-dcnode-id="5747" instrument_node=""> closes by stating that the first followers of Jesus did not consider their possessions to be their own but rather held in common, in order to use what they had on behalf of those in want. As told at the beginning of Acts chapter </span><a class="external text" data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DActs%25205%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="5746" instrument_node="">5</span></a><span data-dcnode-id="5744" instrument_node=""> Ananias and Sapphira sold their land but secretly withheld a portion of the proceeds. Ananias presented his donation to </span><a data-dcnode-id="5742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Peter" title="Saint Peter"><span data-dcnode-id="5743" instrument_node="">Peter</span></a><span data-dcnode-id="5741" instrument_node="">. Peter replied, "Why is it that </span><a data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satan" title="Satan"><span data-dcnode-id="5740" instrument_node="">Satan</span></a><span data-dcnode-id="5738" instrument_node=""> has so filled your heart that you have lied to the </span><a class="mw-redirect" data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Spirit_%28Christianity%29" title="Holy Spirit (Christianity)"><span data-dcnode-id="5737" instrument_node="">Holy Spirit</span></a><span data-dcnode-id="5735" instrument_node="">?" Peter pointed out that Ananias was in control of the money and could give or keep it as he saw fit, but had withheld a portion of it.  Peter stated that Ananias had lied not to men, but to God.  Ananias died on the spot and was carried out. Three hours after Ananias' death his wife arrived, unaware of what had happened. Peter asked her the price of the land that she and Ananias had sold, and Sapphira stated the same untruthful price that Ananias had given. She also fell dead.
</span></p><p data-dcnode-id="5725"><span data-dcnode-id="5733" instrument_node="">Theologian </span><a data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Dunn_%28theologian%29" title="James Dunn (theologian)"><span data-dcnode-id="5732" instrument_node="">James Dunn</span></a><span data-dcnode-id="5730" instrument_node=""> describes this story as "one of the most unnerving episodes in the whole of the New Testament."</span><sup class="reference" data-dcnode-id="5727" id="cite_ref-108"><a data-dcnode-id="5728" href="#cite_note-108"><span data-dcnode-id="5729" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5726" instrument_node="">
</span></p><span data-dcnode-id="5724" instrument_node="">
</span><h3 data-dcnode-id="5714"><span class="mw-headline" data-dcnode-id="5722" id="The_Pauline_epistles_and_women"><span data-dcnode-id="5723" instrument_node="">The Pauline epistles and women</span></span><span class="mw-editsection" data-dcnode-id="5715"><span class="mw-editsection-bracket" data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">[</span></span><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D41" title="Edit section: The Pauline epistles and women"><span data-dcnode-id="5719" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5716"><span data-dcnode-id="5717" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5713" instrument_node="">
</span><link data-dcnode-id="5712" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5708" role="note"><span data-dcnode-id="5711" instrument_node="">Main article: </span><a data-dcnode-id="5709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_the_Apostle_and_women" title="Paul the Apostle and women"><span data-dcnode-id="5710" instrument_node="">Paul the Apostle and women</span></a></div><span data-dcnode-id="5707" instrument_node="">
</span><link data-dcnode-id="5706" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5702" role="note"><span data-dcnode-id="5705" instrument_node="">See also: </span><a data-dcnode-id="5703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authorship_of_the_Pauline_epistles" title="Authorship of the Pauline epistles"><span data-dcnode-id="5704" instrument_node="">Authorship of the Pauline epistles</span></a></div><span data-dcnode-id="5701" instrument_node="">
</span><p data-dcnode-id="5661"><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_the_Apostle" title="Paul the Apostle"><span data-dcnode-id="5700" instrument_node="">Paul the Apostle</span></a><span data-dcnode-id="5698" instrument_node=""> was the first writer to give </span><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecclesiastical" title="Ecclesiastical"><span data-dcnode-id="5697" instrument_node="">ecclesiastical</span></a><span data-dcnode-id="5695" instrument_node=""> directives about the role of women in the church. Some of these are now heavily disputed. There are also arguments that some of the writings attributed to Paul are </span><a data-dcnode-id="5693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pseudepigrapha" title="Pseudepigrapha"><span data-dcnode-id="5694" instrument_node="">pseudepigraphal</span></a><span data-dcnode-id="5692" instrument_node=""> </span><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pauline_Christianity" title="Pauline Christianity"><span data-dcnode-id="5691" instrument_node="">post-Pauline interpolations</span></a><span data-dcnode-id="5689" instrument_node="">.</span><sup class="reference" data-dcnode-id="5686" id="cite_ref-109"><a data-dcnode-id="5687" href="#cite_note-109"><span data-dcnode-id="5688" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5685" instrument_node="">  Scholars agree certain texts attributed to Paul and the </span><a data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pauline_epistles" title="Pauline epistles"><span data-dcnode-id="5684" instrument_node="">Pauline epistles</span></a><span data-dcnode-id="5682" instrument_node=""> have provided much support for the view of the role of women as subservient.</span><sup class="reference" data-dcnode-id="5679" id="cite_ref-Leland_E._Wilshire_110-0"><a data-dcnode-id="5680" href="#cite_note-Leland_E._Wilshire-110"><span data-dcnode-id="5681" instrument_node="">[110]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5676"><span data-dcnode-id="5677" title="Page / location: 22–34"><span data-dcnode-id="5678" instrument_node="">: 22–34 </span></span></sup><sup class="reference" data-dcnode-id="5673" id="cite_ref-Belleville_85-2"><a data-dcnode-id="5674" href="#cite_note-Belleville-85"><span data-dcnode-id="5675" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="5670" id="cite_ref-Hayk_Hovhannisyan_99-3"><a data-dcnode-id="5671" href="#cite_note-Hayk_Hovhannisyan-99"><span data-dcnode-id="5672" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5669" instrument_node="">  Others have claimed culture has imposed a particular translation upon his texts that Paul did not actually support.</span><sup class="reference" data-dcnode-id="5666" id="cite_ref-Belleville_85-3"><a data-dcnode-id="5667" href="#cite_note-Belleville-85"><span data-dcnode-id="5668" instrument_node="">[85]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5663"><span data-dcnode-id="5664" title="Page / location: 80–97"><span data-dcnode-id="5665" instrument_node="">: 80–97 </span></span></sup><span data-dcnode-id="5662" instrument_node="">
</span></p><span data-dcnode-id="5660" instrument_node="">
</span><h4 data-dcnode-id="5650"><span class="mw-headline" data-dcnode-id="5658" id="1_Corinthians_14:34-35"><span data-dcnode-id="5659" instrument_node="">1 Corinthians 14:34-35</span></span><span class="mw-editsection" data-dcnode-id="5651"><span class="mw-editsection-bracket" data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">[</span></span><a data-dcnode-id="5654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D42" title="Edit section: 1 Corinthians 14:34-35"><span data-dcnode-id="5655" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5649" instrument_node="">
</span><p data-dcnode-id="5644"><span data-dcnode-id="5648" instrument_node="">These verses read in the </span><a class="mw-redirect" data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authorized_Version" title="Authorized Version"><span data-dcnode-id="5647" instrument_node="">Authorized Version</span></a><span data-dcnode-id="5645" instrument_node=""> "Let your women keep silence in the churches: for it is not permitted unto them to speak; but they are commanded to be under obedience as also saith the law. And if they will learn any thing, let them ask their husbands at home: for it is a shame for women to speak in the church."
</span></p><span data-dcnode-id="5643" instrument_node="">
</span><h4 data-dcnode-id="5633"><span class="mw-headline" data-dcnode-id="5641" id="1_Timothy_2:11-15"><span data-dcnode-id="5642" instrument_node="">1 Timothy 2:11-15</span></span><span class="mw-editsection" data-dcnode-id="5634"><span class="mw-editsection-bracket" data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">[</span></span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D43" title="Edit section: 1 Timothy 2:11-15"><span data-dcnode-id="5638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5632" instrument_node="">
</span><link data-dcnode-id="5631" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5627" role="note"><span data-dcnode-id="5630" instrument_node="">See also: </span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authorship_of_the_Pauline_epistles%23Pastoral_epistles" title="Authorship of the Pauline epistles"><span data-dcnode-id="5629" instrument_node="">Authorship of the Pauline epistles §&nbsp;Pastoral epistles</span></a></div><span data-dcnode-id="5626" instrument_node="">
</span><p data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">These verses in the King James version read as follows "Let the woman learn in silence with all subjection. But I suffer not a woman to teach, nor to usurp authority over the man, but to be in silence. For Adam was first formed, then Eve. And Adam was not deceived, but the woman being deceived was in the transgression. Notwithstanding she shall be saved in childbearing, if they continue in faith and charity and holiness with sobriety."
</span></p><span data-dcnode-id="5623" instrument_node="">
</span><h4 data-dcnode-id="5613"><span class="mw-headline" data-dcnode-id="5621" id="1_Timothy_5:3-16"><span data-dcnode-id="5622" instrument_node="">1 Timothy 5:3-16</span></span><span class="mw-editsection" data-dcnode-id="5614"><span class="mw-editsection-bracket" data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">[</span></span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D44" title="Edit section: 1 Timothy 5:3-16"><span data-dcnode-id="5618" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5615"><span data-dcnode-id="5616" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5612" instrument_node="">
</span><p data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">1 Timothy 5:3-16 states in the Authorized Version "Honour widows that are widows indeed. But if any widow have children or nephews, let them learn first to shew piety at home, and to requite their parents: for that is good and acceptable before God.  Now she that is a widow indeed, and desolate, trusteth in God, and continueth in supplications and prayers night and day.  But she that liveth in pleasure is dead while she liveth.  And these things give in charge, that they may be blameless.  But if any provide not for his own, and specially for those of his own house, he hath denied the faith, and is worse than an infidel.  Let not a widow be taken into the number under threescore years old, having been the wife of one man, well reported of for good works; if she have brought up children, if she have lodged strangers, if she have washed the saints’ feet, if she have relieved the afflicted, if she have diligently followed every good work. But the younger widows refuse: for when they have begun to wax wanton against Christ, they will marry; having damnation, because they have cast off their first faith. And withal they learn to be idle, wandering about from house to house; and not only idle, but tattlers also and busybodies, speaking things which they ought not. I will therefore that the younger women marry, bear children, guide the house, give none occasion to the adversary to speak reproachfully. For some are already turned aside after Satan. If any man or woman that believeth have widows, let them relieve them, and let not the church be charged; that it may relieve them that are widows indeed."
</span></p><span data-dcnode-id="5609" instrument_node="">
</span><h4 data-dcnode-id="5599"><span class="mw-headline" data-dcnode-id="5607" id="1_Corinthians_11:2-16"><span data-dcnode-id="5608" instrument_node="">1 Corinthians 11:2-16</span></span><span class="mw-editsection" data-dcnode-id="5600"><span class="mw-editsection-bracket" data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">[</span></span><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D45" title="Edit section: 1 Corinthians 11:2-16"><span data-dcnode-id="5604" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5598" instrument_node="">
</span><p data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">In the King James translation these verses read as "Now I praise you, brethren, that ye remember me in all things, and keep the ordinances, as I delivered them to you. But I would have you know, that the head of every man is Christ; and the head of the woman is the man; and the head of Christ is God. Every man praying or prophesying, having his head covered, dishonoureth his head.But every woman that prayeth or prophesieth with her head uncovered dishonoureth her head: for that is even all one as if she were shaven. For if the woman be not covered, let her also be shorn: but if it be a shame for a woman to be shorn or shaven, let her be covered. For a man indeed ought not to cover his head, forasmuch as he is the image and glory of God: but the woman is the glory of the man. For the man is not of the woman: but the woman of the man.Neither was the man created for the woman; but the woman for the man.
For this cause ought the woman to have power on her head because of the angels. Nevertheless, neither is the man without the woman, neither the woman without the man, in the Lord. For as the woman is of the man, even so is the man also by the woman; but all things of God. Judge in yourselves: is it comely that a woman pray unto God uncovered? Doth not even nature itself teach you, that, if a man have long hair, it is a shame unto him? But if a woman have long hair, it is a glory to her: for her hair is given her for a covering. But if any man seem to be contentious, we have no such custom, neither the churches of God."
</span></p><span data-dcnode-id="5595" instrument_node="">
</span><h3 data-dcnode-id="5585"><span class="mw-headline" data-dcnode-id="5593" id="1_Peter_on_women"><span data-dcnode-id="5594" instrument_node="">1 Peter on women</span></span><span class="mw-editsection" data-dcnode-id="5586"><span class="mw-editsection-bracket" data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">[</span></span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D46" title="Edit section: 1 Peter on women"><span data-dcnode-id="5590" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5584" instrument_node="">
</span><link data-dcnode-id="5583" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5576" role="note"><span data-dcnode-id="5582" instrument_node="">See also: </span><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Peter" title="Saint Peter"><span data-dcnode-id="5581" instrument_node="">Saint Peter</span></a><span data-dcnode-id="5579" instrument_node=""> and </span><a data-dcnode-id="5577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authorship_of_the_Petrine_epistles" title="Authorship of the Petrine epistles"><span data-dcnode-id="5578" instrument_node="">Authorship of the Petrine epistles</span></a></div><span data-dcnode-id="5575" instrument_node="">
</span><p data-dcnode-id="5570"><span data-dcnode-id="5574" instrument_node="">In 1 Peter 3 wives are exhorted to submit to their husbands "so they may be won over." (</span><i data-dcnode-id="5572"><span data-dcnode-id="5573" instrument_node="">Wives, in the same way, accept the authority of your husbands, so that, even if some of them do not obey the word, they may be won over without a word by their wives’ conduct</span></i><span data-dcnode-id="5571" instrument_node="">).
</span></p><span data-dcnode-id="5569" instrument_node="">
</span><h3 data-dcnode-id="5559"><span class="mw-headline" data-dcnode-id="5567" id="Contemporary_views"><span data-dcnode-id="5568" instrument_node="">Contemporary views</span></span><span class="mw-editsection" data-dcnode-id="5560"><span class="mw-editsection-bracket" data-dcnode-id="5565"><span data-dcnode-id="5566" instrument_node="">[</span></span><a data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D47" title="Edit section: Contemporary views"><span data-dcnode-id="5564" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5558" instrument_node="">
</span><p data-dcnode-id="5526"><span data-dcnode-id="5557" instrument_node="">There is no contemporary consensus on the New Testament view of women. Psychologist James R. Beck points out that "</span><a class="mw-redirect" data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evangelical_Christians" title="Evangelical Christians"><span data-dcnode-id="5556" instrument_node="">Evangelical Christians</span></a><span data-dcnode-id="5554" instrument_node=""> have not yet settled the exegetical and theological issues."</span><sup class="reference" data-dcnode-id="5551" id="cite_ref-BeckConclusion_111-0"><a data-dcnode-id="5552" href="#cite_note-BeckConclusion-111"><span data-dcnode-id="5553" instrument_node="">[111]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5548"><span data-dcnode-id="5549" title="Page / location: 343"><span data-dcnode-id="5550" instrument_node="">: 343 </span></span></sup><span data-dcnode-id="5547" instrument_node=""> </span><a data-dcnode-id="5545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Christianity" title="Liberal Christianity"><span data-dcnode-id="5546" instrument_node="">Liberal Christianity</span></a><span data-dcnode-id="5544" instrument_node=""> represented by the development of historical criticism was not united in its view of women either: </span><a class="mw-redirect" data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffragist" title="Suffragist"><span data-dcnode-id="5543" instrument_node="">suffragist</span></a><span data-dcnode-id="5541" instrument_node=""> </span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Cady_Stanton" title="Elizabeth Cady Stanton"><span data-dcnode-id="5540" instrument_node="">Elizabeth Cady Stanton</span></a><span data-dcnode-id="5538" instrument_node=""> tells of the committee that formed </span><i data-dcnode-id="5535"><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Woman%2527s_Bible" title="The Woman's Bible"><span data-dcnode-id="5537" instrument_node="">The Woman's Bible</span></a></i><span data-dcnode-id="5534" instrument_node=""> in 1895.  Twenty six women purchased two Bibles and went through them, cutting out every text that concerned women, pasted them into a book, and wrote commentaries underneath.  Its purpose was to challenge Liberal theology of the time that supported the orthodox position that woman should be subservient to man. The book attracted a great deal of controversy and antagonism. Contemporary Christianity is still divided between those who support equality of all types for women in the church, those who support spiritual equality with the compartmentalization of roles, and those who support a more modern equivalent of patriarchy.</span><sup class="reference" data-dcnode-id="5531" id="cite_ref-Rebecca_Moore_112-0"><a data-dcnode-id="5532" href="#cite_note-Rebecca_Moore-112"><span data-dcnode-id="5533" instrument_node="">[112]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5528"><span data-dcnode-id="5529" title="Page / location: 3–5"><span data-dcnode-id="5530" instrument_node="">: 3–5 </span></span></sup><span data-dcnode-id="5527" instrument_node="">
</span></p><span data-dcnode-id="5525" instrument_node="">
</span><h2 data-dcnode-id="5515"><span class="mw-headline" data-dcnode-id="5523" id="Female_sexuality_in_the_early_church"><span data-dcnode-id="5524" instrument_node="">Female sexuality in the early church</span></span><span class="mw-editsection" data-dcnode-id="5516"><span class="mw-editsection-bracket" data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">[</span></span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D48" title="Edit section: Female sexuality in the early church"><span data-dcnode-id="5520" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5514" instrument_node="">
</span><link data-dcnode-id="5513" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5509" role="note"><span data-dcnode-id="5512" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity_and_sexuality" title="Christianity and sexuality"><span data-dcnode-id="5511" instrument_node="">Christianity and sexuality</span></a></div><link data-dcnode-id="5508" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5504" role="note"><span data-dcnode-id="5507" instrument_node="">See also: </span><a data-dcnode-id="5505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_views_on_marriage" title="Christian views on marriage"><span data-dcnode-id="5506" instrument_node="">Christian views on marriage</span></a></div><span data-dcnode-id="5503" instrument_node="">
</span><p data-dcnode-id="5447"><span data-dcnode-id="5502" instrument_node="">Classics scholar Kyle Harper references the historian Peter Brown as showing sexuality (especially female sexuality) was at the heart of the early clash over Christianity's place in the world. Views on sexuality in the early church were diverse and fiercely debated within its various communities; these doctrinal debates took place within the boundaries of the ideas in Paul's letters and in the context of an often persecuted minority seeking to define itself from the world around it.  In his letters, Paul often attempted to find a middle way among these disputes, which included people who saw the gospel as liberating them from all moral boundaries, and those who took very strict moral stances.</span><sup class="reference" data-dcnode-id="5499" id="cite_ref-Kyle_Harper_113-0"><a data-dcnode-id="5500" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5501" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5496"><span data-dcnode-id="5497" title="Page / location: 1–14, 84–86, 88"><span data-dcnode-id="5498" instrument_node="">: 1–14, 84–86, 88 </span></span></sup><span data-dcnode-id="5495" instrument_node="">  Conflicts over sexuality with the culture surrounding Christianity, as well as within Christianity itself, were fierce.  These conflicts are thought by many scholars to have impacted Bible content in the later </span><a class="mw-redirect" data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pauline_Epistles" title="Pauline Epistles"><span data-dcnode-id="5494" instrument_node="">Pauline Epistles</span></a><span data-dcnode-id="5492" instrument_node="">.</span><sup class="reference" data-dcnode-id="5489" id="cite_ref-Kyle_Harper_113-1"><a data-dcnode-id="5490" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5491" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5486"><span data-dcnode-id="5487" title="Page / location: 1–11"><span data-dcnode-id="5488" instrument_node="">: 1–11 </span></span></sup><sup class="reference" data-dcnode-id="5483" id="cite_ref-Margaret_Y._MacDonald_89-8"><a data-dcnode-id="5484" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="5485" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5480"><span data-dcnode-id="5481" title="Page / location: 164"><span data-dcnode-id="5482" instrument_node="">: 164 </span></span></sup><span data-dcnode-id="5479" instrument_node=""> For example, in Roman culture, widows were required to remarry within a few years of their husband's death, but Christian widows were not required to remarry and could freely choose to remain single, and celibate, with the church's support.</span><sup class="reference" data-dcnode-id="5476" id="cite_ref-Kyle_Harper_113-2"><a data-dcnode-id="5477" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5478" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5473"><span data-dcnode-id="5474" title="Page / location: 1–7"><span data-dcnode-id="5475" instrument_node="">: 1–7 </span></span></sup><span data-dcnode-id="5472" instrument_node=""> As Harper says, "The church developed the radical notion of individual freedom centered around a libertarian paradigm of complete sexual agency."</span><sup class="reference" data-dcnode-id="5469" id="cite_ref-Kyle_Harper_113-3"><a data-dcnode-id="5470" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5471" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5466"><span data-dcnode-id="5467" title="Page / location: 4"><span data-dcnode-id="5468" instrument_node="">: 4 </span></span></sup><span data-dcnode-id="5465" instrument_node=""> Many widows and single women were choosing not to marry, were staying celibate, and were encouraging other women to follow, but pagan response to this female activity was negative and sometimes violent toward Christianity as a whole.</span><sup class="reference" data-dcnode-id="5462" id="cite_ref-Margaret_Y._MacDonald_89-9"><a data-dcnode-id="5463" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="5464" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5459"><span data-dcnode-id="5460" title="Page / location: 164"><span data-dcnode-id="5461" instrument_node="">: 164 </span></span></sup><span data-dcnode-id="5458" instrument_node=""> Margaret MacDonald demonstrates these dangerous circumstances were likely the catalysts for the "shift in perspective concerning unmarried women from Paul's [early] days to the time of the </span><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pastoral_epistles" title="Pastoral epistles"><span data-dcnode-id="5457" instrument_node="">Pastoral epistles</span></a><span data-dcnode-id="5455" instrument_node="">".</span><sup class="reference" data-dcnode-id="5452" id="cite_ref-Margaret_Y._MacDonald_89-10"><a data-dcnode-id="5453" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="5454" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5449"><span data-dcnode-id="5450" title="Page / location: 164"><span data-dcnode-id="5451" instrument_node="">: 164 </span></span></sup><span data-dcnode-id="5448" instrument_node="">
</span></p><p data-dcnode-id="5401"><span data-dcnode-id="5446" instrument_node="">The sexual-ethical structures of Roman society were built on status, and sexual modesty and shame meant something different for men than it did for women, and for the well-born than it did for the poor, and for the free citizen than it did for the slave.</span><sup class="reference" data-dcnode-id="5443" id="cite_ref-Kyle_Harper_113-4"><a data-dcnode-id="5444" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5445" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5440"><span data-dcnode-id="5441" title="Page / location: 7"><span data-dcnode-id="5442" instrument_node="">: 7 </span></span></sup><span data-dcnode-id="5439" instrument_node="">  In the Roman Empire, shame was a social concept that was always mediated by gender and status.</span><sup class="reference" data-dcnode-id="5436" id="cite_ref-John_Younger_114-0"><a data-dcnode-id="5437" href="#cite_note-John_Younger-114"><span data-dcnode-id="5438" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5435" instrument_node=""> Classics Professor </span><a data-dcnode-id="5433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rebecca_Langlands" title="Rebecca Langlands"><span data-dcnode-id="5434" instrument_node="">Rebecca Langlands</span></a><span data-dcnode-id="5432" instrument_node=""> explains: "It was not enough that a wife merely regulate her sexual behavior in the accepted ways; it was required that her virtue in this area be conspicuous."</span><sup class="reference" data-dcnode-id="5429" id="cite_ref-Rebecca_Langlands_115-0"><a data-dcnode-id="5430" href="#cite_note-Rebecca_Langlands-115"><span data-dcnode-id="5431" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5428" instrument_node=""> </span><sup class="reference nowrap" data-dcnode-id="5425"><span data-dcnode-id="5426" title="Page / location: 10, 38"><span data-dcnode-id="5427" instrument_node="">: 10, 38 </span></span></sup><span data-dcnode-id="5424" instrument_node="">  Younger says men, on the other hand, were allowed live-in mistresses called </span><i data-dcnode-id="5420"><a data-dcnode-id="5422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pallake" title="Pallake"><span data-dcnode-id="5423" instrument_node="">pallake</span></a><span data-dcnode-id="5421" instrument_node="">.</span></i><sup class="reference" data-dcnode-id="5417" id="cite_ref-John_Younger_114-1"><a data-dcnode-id="5418" href="#cite_note-John_Younger-114"><span data-dcnode-id="5419" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5416" instrument_node="">  Roman society did not believe slaves had an inner ethical life or any sense of shame, since they had no status, therefore concepts of sexual morality were not applicable to slaves.</span><sup class="reference" data-dcnode-id="5413" id="cite_ref-Kyle_Harper_113-5"><a data-dcnode-id="5414" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5415" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5410"><span data-dcnode-id="5411" title="Page / location: 84–86, 88"><span data-dcnode-id="5412" instrument_node="">: 84–86, 88 </span></span></sup><span data-dcnode-id="5409" instrument_node="">  Langlands points out this value system permitted Roman society to find both a husband's control of a wife's sexual behavior a matter of intense importance, and at the same time, see the husband's sex with young slave boys as of little concern.</span><sup class="reference" data-dcnode-id="5406" id="cite_ref-Rebecca_Langlands_115-1"><a data-dcnode-id="5407" href="#cite_note-Rebecca_Langlands-115"><span data-dcnode-id="5408" instrument_node="">[115]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5403"><span data-dcnode-id="5404" title="Page / location: 12, 20"><span data-dcnode-id="5405" instrument_node="">: 12, 20 </span></span></sup><span data-dcnode-id="5402" instrument_node="">
</span></p><p data-dcnode-id="5366"><span data-dcnode-id="5400" instrument_node="">Harper says: "The model of normative sexual behavior that developed out of Paul's reactions to the erotic culture surrounding him...was a distinct alternative to the social order of the Roman empire."</span><sup class="reference" data-dcnode-id="5397" id="cite_ref-Kyle_Harper_113-6"><a data-dcnode-id="5398" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5399" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5394"><span data-dcnode-id="5395" title="Page / location: 85"><span data-dcnode-id="5396" instrument_node="">: 85 </span></span></sup><span data-dcnode-id="5393" instrument_node=""> For Paul, according to Harper, "the body was a consecrated space, a point of mediation between the individual and the divine."</span><sup class="reference" data-dcnode-id="5390" id="cite_ref-Kyle_Harper_113-7"><a data-dcnode-id="5391" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5392" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5387"><span data-dcnode-id="5388" title="Page / location: 88–92"><span data-dcnode-id="5389" instrument_node="">: 88–92 </span></span></sup><span data-dcnode-id="5386" instrument_node=""> The obligation for sexual self-control was placed equally on all people in the Christian communities, men or women, slave or free. In Paul's letters, </span><i data-dcnode-id="5382"><a class="mw-redirect" data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porneia" title="Porneia"><span data-dcnode-id="5385" instrument_node="">porneia</span></a><span data-dcnode-id="5383" instrument_node="">,</span></i><span data-dcnode-id="5381" instrument_node=""> (a single name for an array of sexual behaviors outside marital intercourse), became a central defining concept of sexual morality, and shunning it, a key sign of choosing to follow Jesus. Sexual morality could be shown by forgoing sex altogether and practicing chastity, remaining virgin, or having sex only within a marriage.</span><sup class="reference" data-dcnode-id="5378" id="cite_ref-Kyle_Harper_113-8"><a data-dcnode-id="5379" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5380" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5375"><span data-dcnode-id="5376" title="Page / location: 88–92"><span data-dcnode-id="5377" instrument_node="">: 88–92 </span></span></sup><span data-dcnode-id="5374" instrument_node=""> Harper indicates this was a transformation in the deep logic of sexual morality as personal rather than social, spiritual rather than merely physical, and for everyone rather than solely for those with status.</span><sup class="reference" data-dcnode-id="5371" id="cite_ref-Kyle_Harper_113-9"><a data-dcnode-id="5372" href="#cite_note-Kyle_Harper-113"><span data-dcnode-id="5373" instrument_node="">[113]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5368"><span data-dcnode-id="5369" title="Page / location: 6, 7"><span data-dcnode-id="5370" instrument_node="">: 6, 7 </span></span></sup><span data-dcnode-id="5367" instrument_node="">
</span></p><span data-dcnode-id="5365" instrument_node="">
</span><h2 data-dcnode-id="5355"><span class="mw-headline" data-dcnode-id="5363" id="In_art_and_culture"><span data-dcnode-id="5364" instrument_node="">In art and culture</span></span><span class="mw-editsection" data-dcnode-id="5356"><span class="mw-editsection-bracket" data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">[</span></span><a data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D49" title="Edit section: In art and culture"><span data-dcnode-id="5360" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5354" instrument_node="">
</span><link data-dcnode-id="5353" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5349" role="note"><span data-dcnode-id="5352" instrument_node="">See also: </span><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AOperas_based_on_the_Bible" title="Category:Operas based on the Bible"><span data-dcnode-id="5351" instrument_node="">Category:Operas based on the Bible</span></a></div><span data-dcnode-id="5348" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5333"><div class="thumbinner" data-dcnode-id="5334" style="width:222px;"><a class="image" data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARegnault%2C_Henri%2C_Salom%25C3%25A9.jpg"><img alt="" class="thumbimage" data-dcnode-id="5347" data-file-height="854" data-file-width="534" decoding="async" height="352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Regnault%252C_Henri%252C_Salom%25C3%25A9.jpg/220px-Regnault%252C_Henri%252C_Salom%25C3%25A9.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Regnault%2C_Henri%2C_Salom%C3%A9.jpg/330px-Regnault%2C_Henri%2C_Salom%C3%A9.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/43/Regnault%2C_Henri%2C_Salom%C3%A9.jpg/440px-Regnault%2C_Henri%2C_Salom%C3%A9.jpg 2x" width="220"></a><span data-dcnode-id="5345" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5335"><div class="magnify" data-dcnode-id="5343"><a class="internal" data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARegnault%2C_Henri%2C_Salom%25C3%25A9.jpg" title="Enlarge"></a></div><i data-dcnode-id="5340"><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salom%25C3%25A9_%28Henri_Regnault%29" title="Salomé (Henri Regnault)"><span data-dcnode-id="5342" instrument_node="">Salomé</span></a></i><span data-dcnode-id="5339" instrument_node="">, by </span><a data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Regnault" title="Henri Regnault"><span data-dcnode-id="5338" instrument_node="">Henri Regnault</span></a><span data-dcnode-id="5336" instrument_node=""> (1870).</span></div></div></div><span data-dcnode-id="5332" instrument_node="">
</span><p data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">There are hundreds of examples of women from the Bible as characters in painting, sculpture, opera and film. Historically, artistic renderings tend to reflect the changing views on women from within society more than the biblical account that mentions them.
</span></p><p data-dcnode-id="5293"><span data-dcnode-id="5329" instrument_node="">Eve is a common subject. Art historian Mati Meyer says society's views of women are observable in the differing renderings of Eve in art over the centuries. Meyer explains: "Genesis 2–3 recounts the creation of man and the origins of evil and death; Eve, the temptress who disobeys God’s commandment, is probably the most widely discussed and portrayed figure in art."</span><sup class="reference" data-dcnode-id="5326" id="cite_ref-Mati_Meyer_116-0"><a data-dcnode-id="5327" href="#cite_note-Mati_Meyer-116"><span data-dcnode-id="5328" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5325" instrument_node=""> According to Mati Meyer, Eve is historically portrayed in a favorable light up through the </span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Middle_Ages" title="Early Middle Ages"><span data-dcnode-id="5324" instrument_node="">Early Middle Ages</span></a><span data-dcnode-id="5322" instrument_node=""> (AD 800's), but by the </span><a data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Late_Middle_Ages" title="Late Middle Ages"><span data-dcnode-id="5321" instrument_node="">Late Middle Ages</span></a><span data-dcnode-id="5319" instrument_node=""> (1400s) artistic interpretation of Eve becomes heavily misogynistic.  Meyer sees this change as influenced by the writings of the 4th century theologian </span><a data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine_of_Hippo" title="Augustine of Hippo"><span data-dcnode-id="5318" instrument_node="">Augustine of Hippo</span></a><span data-dcnode-id="5316" instrument_node="">, "who sees Eve’s sexuality as destructive to male rationality".</span><sup class="reference" data-dcnode-id="5313" id="cite_ref-Mati_Meyer_116-1"><a data-dcnode-id="5314" href="#cite_note-Mati_Meyer-116"><span data-dcnode-id="5315" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5312" instrument_node="">  By the seventeenth century, the </span><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fall_of_man" title="Fall of man"><span data-dcnode-id="5311" instrument_node="">Fall of man</span></a><span data-dcnode-id="5309" instrument_node=""> as a male-female struggle emerges, and in the eighteenth century, the perception of Eve is influenced by </span><a data-dcnode-id="5307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Milton" title="John Milton"><span data-dcnode-id="5308" instrument_node="">John Miltons</span></a><span data-dcnode-id="5306" instrument_node=""> </span><i data-dcnode-id="5303"><a data-dcnode-id="5304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paradise_Lost" title="Paradise Lost"><span data-dcnode-id="5305" instrument_node="">Paradise Lost</span></a></i><span data-dcnode-id="5302" instrument_node=""> where Adam's free will is emphasized along with Eve's beauty. Thereafter a secular view of Eve emerges "through her transformation into a </span><i data-dcnode-id="5299"><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Femme_fatale" title="Femme fatale"><span data-dcnode-id="5301" instrument_node="">femme fatale</span></a></i><span data-dcnode-id="5298" instrument_node="">—a compound of beauty, seductiveness and independence set to destroy the man."</span><sup class="reference" data-dcnode-id="5295" id="cite_ref-Mati_Meyer_116-2"><a data-dcnode-id="5296" href="#cite_note-Mati_Meyer-116"><span data-dcnode-id="5297" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5294" instrument_node="">
</span></p><p data-dcnode-id="5275"><span data-dcnode-id="5292" instrument_node="">Courageous and victorious women, such as Jael, Esther and the </span><a class="mw-redirect" data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deuterocanonical" title="Deuterocanonical"><span data-dcnode-id="5291" instrument_node="">deuterocanonical</span></a><span data-dcnode-id="5289" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judith" title="Judith"><span data-dcnode-id="5288" instrument_node="">Judith</span></a><span data-dcnode-id="5286" instrument_node="">, were popular "moral" figures in the Middle Ages. </span><a class="mw-redirect" data-dcnode-id="5284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Renaissance" title="The Renaissance"><span data-dcnode-id="5285" instrument_node="">The Renaissance</span></a><span data-dcnode-id="5283" instrument_node="">, which preferred the sensuous female nude up through the eighteenth century, and the "femme fatale", such as Delilah, from the nineteenth century onward, all demonstrate how the Bible and art both shape and reflect views of women.</span><sup class="reference" data-dcnode-id="5280" id="cite_ref-117"><a data-dcnode-id="5281" href="#cite_note-117"><span data-dcnode-id="5282" instrument_node="">[117]</span></a></sup><sup class="reference" data-dcnode-id="5277" id="cite_ref-Diane_Apostolos-Cappadona_118-0"><a data-dcnode-id="5278" href="#cite_note-Diane_Apostolos-Cappadona-118"><span data-dcnode-id="5279" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5276" instrument_node="">
</span></p><p data-dcnode-id="5259"><span data-dcnode-id="5274" instrument_node="">The story of the biblical Queen Athaliah was the inspiration for one of the greatest tragedies of French dramatist </span><a data-dcnode-id="5272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Racine" title="Jean Racine"><span data-dcnode-id="5273" instrument_node="">Jean Racine</span></a><span data-dcnode-id="5271" instrument_node="">, </span><i data-dcnode-id="5268"><a data-dcnode-id="5269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athalie" title="Athalie"><span data-dcnode-id="5270" instrument_node="">Athalie</span></a></i><span data-dcnode-id="5267" instrument_node="">.</span><sup class="reference" data-dcnode-id="5264" id="cite_ref-119"><a data-dcnode-id="5265" href="#cite_note-119"><span data-dcnode-id="5266" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="5261" id="cite_ref-120"><a data-dcnode-id="5262" href="#cite_note-120"><span data-dcnode-id="5263" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5260" instrument_node="">
</span></p><p data-dcnode-id="5174"><span data-dcnode-id="5258" instrument_node="">The opera </span><i data-dcnode-id="5255"><a data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salome_%28opera%29" title="Salome (opera)"><span data-dcnode-id="5257" instrument_node="">Salome</span></a></i><span data-dcnode-id="5254" instrument_node=""> by </span><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Strauss" title="Richard Strauss"><span data-dcnode-id="5253" instrument_node="">Richard Strauss</span></a><span data-dcnode-id="5251" instrument_node=""> was highly controversial when first composed due to its combination of biblical theme, eroticism and murder.</span><sup class="reference" data-dcnode-id="5248" id="cite_ref-121"><a data-dcnode-id="5249" href="#cite_note-121"><span data-dcnode-id="5250" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5247" instrument_node="">  The story of </span><a data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salome" title="Salome"><span data-dcnode-id="5246" instrument_node="">her</span></a><span data-dcnode-id="5244" instrument_node=""> dance before </span><a data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herod_Antipas" title="Herod Antipas"><span data-dcnode-id="5243" instrument_node="">Herod</span></a><span data-dcnode-id="5241" instrument_node=""> with the head of </span><a data-dcnode-id="5239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_the_Baptist" title="John the Baptist"><span data-dcnode-id="5240" instrument_node="">John the Baptist</span></a><span data-dcnode-id="5238" instrument_node=""> on a silver platter led medieval Christian artists to depict her as the personification of the lascivious woman, a temptress who lures men away from salvation.</span><sup class="reference" data-dcnode-id="5235" id="cite_ref-Barr2008_122-0"><a data-dcnode-id="5236" href="#cite_note-Barr2008-122"><span data-dcnode-id="5237" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5234" instrument_node="">  Strauss' opera is based upon </span><a data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oscar_Wilde" title="Oscar Wilde"><span data-dcnode-id="5233" instrument_node="">Oscar Wilde</span></a><span data-dcnode-id="5231" instrument_node="">'s play </span><i data-dcnode-id="5228"><a data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salome_%28play%29" title="Salome (play)"><span data-dcnode-id="5230" instrument_node="">Salome</span></a></i><span data-dcnode-id="5227" instrument_node=""> which depicts her in the role of femme fatale.</span><sup class="reference" data-dcnode-id="5224" id="cite_ref-Burton2000_123-0"><a data-dcnode-id="5225" href="#cite_note-Burton2000-123"><span data-dcnode-id="5226" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5223" instrument_node="">  This biblical story has long been a favorite of painters as well.  Notable representations of Salome include </span><a data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Masolino_da_Panicale" title="Masolino da Panicale"><span data-dcnode-id="5222" instrument_node="">Masolino da Panicale</span></a><span data-dcnode-id="5220" instrument_node="">, </span><a data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Filippo_Lippi" title="Filippo Lippi"><span data-dcnode-id="5219" instrument_node="">Filippo Lippi</span></a><span data-dcnode-id="5217" instrument_node="">, </span><a data-dcnode-id="5215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benozzo_Gozzoli" title="Benozzo Gozzoli"><span data-dcnode-id="5216" instrument_node="">Benozzo Gozzoli</span></a><span data-dcnode-id="5214" instrument_node="">, </span><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonardo_da_Vinci" title="Leonardo da Vinci"><span data-dcnode-id="5213" instrument_node="">Leonardo da Vinci</span></a><span data-dcnode-id="5211" instrument_node=""> followers </span><a class="mw-redirect" data-dcnode-id="5209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrea_Solario" title="Andrea Solario"><span data-dcnode-id="5210" instrument_node="">Andrea Solario</span></a><span data-dcnode-id="5208" instrument_node=""> and </span><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernardino_Luini" title="Bernardino Luini"><span data-dcnode-id="5207" instrument_node="">Bernardino Luini</span></a><span data-dcnode-id="5205" instrument_node="">, </span><a data-dcnode-id="5203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucas_Cranach_the_Elder" title="Lucas Cranach the Elder"><span data-dcnode-id="5204" instrument_node="">Lucas Cranach the Elder</span></a><span data-dcnode-id="5202" instrument_node="">, </span><a data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titian" title="Titian"><span data-dcnode-id="5201" instrument_node="">Titian</span></a><span data-dcnode-id="5199" instrument_node="">, </span><a data-dcnode-id="5197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caravaggio" title="Caravaggio"><span data-dcnode-id="5198" instrument_node="">Caravaggio</span></a><span data-dcnode-id="5196" instrument_node="">, </span><a data-dcnode-id="5194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guido_Reni" title="Guido Reni"><span data-dcnode-id="5195" instrument_node="">Guido Reni</span></a><span data-dcnode-id="5193" instrument_node="">, </span><a data-dcnode-id="5191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carel_Fabritius" title="Carel Fabritius"><span data-dcnode-id="5192" instrument_node="">Fabritius</span></a><span data-dcnode-id="5190" instrument_node="">,  </span><a data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Regnault" title="Henri Regnault"><span data-dcnode-id="5189" instrument_node="">Henri Regnault</span></a><span data-dcnode-id="5187" instrument_node="">, </span><a data-dcnode-id="5185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Rochegrosse" title="Georges Rochegrosse"><span data-dcnode-id="5186" instrument_node="">Georges Rochegrosse</span></a><span data-dcnode-id="5184" instrument_node="">, </span><a data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Moreau" title="Gustave Moreau"><span data-dcnode-id="5183" instrument_node="">Gustave Moreau</span></a><span data-dcnode-id="5181" instrument_node="">, </span><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lovis_Corinth" title="Lovis Corinth"><span data-dcnode-id="5180" instrument_node="">Lovis Corinth</span></a><span data-dcnode-id="5178" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federico_Beltran-Masses" title="Federico Beltran-Masses"><span data-dcnode-id="5177" instrument_node="">Federico Beltran-Masses</span></a><span data-dcnode-id="5175" instrument_node="">.
</span></p><p data-dcnode-id="5156"><span data-dcnode-id="5173" instrument_node="">Other examples of Biblical women in operas include the story of </span><i data-dcnode-id="5170"><a data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samson_and_Delilah_%28opera%29" title="Samson and Delilah (opera)"><span data-dcnode-id="5172" instrument_node="">Samson and Delilah</span></a></i><span data-dcnode-id="5169" instrument_node=""> by </span><a data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camille_Saint-Sa%25C3%25ABns" title="Camille Saint-Saëns"><span data-dcnode-id="5168" instrument_node="">Camille Saint-Saëns</span></a><span data-dcnode-id="5166" instrument_node="">; it is one of the pieces that defines </span><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_opera" title="French opera"><span data-dcnode-id="5165" instrument_node="">French opera</span></a><span data-dcnode-id="5163" instrument_node="">. </span><i data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">Ruth</span></i><span data-dcnode-id="5160" instrument_node=""> is an opera with libretto in English composed by </span><a data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lennox_Berkeley" title="Lennox Berkeley"><span data-dcnode-id="5159" instrument_node="">Lennox Berkeley</span></a><span data-dcnode-id="5157" instrument_node=""> that premiered in London in 1956.
</span></p><p data-dcnode-id="5101"><a data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Frideric_Handel" title="George Frideric Handel"><span data-dcnode-id="5155" instrument_node="">George Frideric Handel</span></a><span data-dcnode-id="5153" instrument_node="">  composed a series of dramatic </span><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oratorio" title="Oratorio"><span data-dcnode-id="5152" instrument_node="">oratorios</span></a><span data-dcnode-id="5150" instrument_node=""> in English on Biblical themes. Among those with major roles for notable women from the Bible are </span><i data-dcnode-id="5147"><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esther_%28Handel%29" title="Esther (Handel)"><span data-dcnode-id="5149" instrument_node="">Esther</span></a></i><span data-dcnode-id="5146" instrument_node="">,</span><sup class="reference" data-dcnode-id="5143" id="cite_ref-Grove2001Vol10Page784_124-0"><a data-dcnode-id="5144" href="#cite_note-Grove2001Vol10Page784-124"><span data-dcnode-id="5145" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5142" instrument_node=""> composed for private performance in a nobleman's home in 1718, revised into a full oratorio in 1732, </span><i data-dcnode-id="5139"><a data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deborah_%28Handel%29" title="Deborah (Handel)"><span data-dcnode-id="5141" instrument_node="">Deborah</span></a></i><span data-dcnode-id="5138" instrument_node="">, first performed at the King's Theatre in London on 17 March 1733,</span><sup class="reference" data-dcnode-id="5135" id="cite_ref-Martini_125-0"><a data-dcnode-id="5136" href="#cite_note-Martini-125"><span data-dcnode-id="5137" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5134" instrument_node=""> </span><i data-dcnode-id="5131"><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athalia_%28Handel%29" title="Athalia (Handel)"><span data-dcnode-id="5133" instrument_node="">Athalia</span></a></i><span data-dcnode-id="5130" instrument_node="">, first performed on 10 July 1733 at the </span><a data-dcnode-id="5128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheldonian_Theatre" title="Sheldonian Theatre"><span data-dcnode-id="5129" instrument_node="">Sheldonian Theatre</span></a><span data-dcnode-id="5127" instrument_node=""> in </span><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxford" title="Oxford"><span data-dcnode-id="5126" instrument_node="">Oxford</span></a><span data-dcnode-id="5124" instrument_node="">,</span><sup class="reference" data-dcnode-id="5121" id="cite_ref-Rooke_126-0"><a data-dcnode-id="5122" href="#cite_note-Rooke-126"><span data-dcnode-id="5123" instrument_node="">[126]</span></a></sup><i data-dcnode-id="5118"><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samson_%28Handel%29" title="Samson (Handel)"><span data-dcnode-id="5120" instrument_node="">Samson</span></a></i><span data-dcnode-id="5117" instrument_node="">,</span><sup class="reference" data-dcnode-id="5114" id="cite_ref-Kemp_127-0"><a data-dcnode-id="5115" href="#cite_note-Kemp-127"><span data-dcnode-id="5116" instrument_node="">[127]</span></a></sup><span data-dcnode-id="5113" instrument_node=""> premiere performance at </span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Opera_House" title="Royal Opera House"><span data-dcnode-id="5112" instrument_node="">Covent Garden theatre</span></a><span data-dcnode-id="5110" instrument_node=""> in London on 18 February 1743, and </span><i data-dcnode-id="5107"><a data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jephtha_%28Handel%29" title="Jephtha (Handel)"><span data-dcnode-id="5109" instrument_node="">Jephtha</span></a></i><span data-dcnode-id="5106" instrument_node="">,</span><sup class="reference" data-dcnode-id="5103" id="cite_ref-Chandos_128-0"><a data-dcnode-id="5104" href="#cite_note-Chandos-128"><span data-dcnode-id="5105" instrument_node="">[128]</span></a></sup><span data-dcnode-id="5102" instrument_node=""> premiered at Covent Garden on 26 February 1752.
