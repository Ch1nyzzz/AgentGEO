</span><h4 data-dcnode-id="7504"><span class="mw-headline" data-dcnode-id="7512" id="Asenath"><span data-dcnode-id="7513" instrument_node="">Asenath</span></span><span class="mw-editsection" data-dcnode-id="7505"><span class="mw-editsection-bracket" data-dcnode-id="7510"><span data-dcnode-id="7511" instrument_node="">[</span></span><a data-dcnode-id="7508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D14" title="Edit section: Asenath"><span data-dcnode-id="7509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7506"><span data-dcnode-id="7507" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7503" instrument_node="">
</span><link data-dcnode-id="7502" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7498" role="note"><span data-dcnode-id="7501" instrument_node="">Main article: </span><a data-dcnode-id="7499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asenath" title="Asenath"><span data-dcnode-id="7500" instrument_node="">Asenath</span></a></div><span data-dcnode-id="7497" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7482"><div class="thumbinner" data-dcnode-id="7483" style="width:202px;"><a class="image" data-dcnode-id="7495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAsenath.jpg"><img alt="" class="thumbimage" data-dcnode-id="7496" data-file-height="434" data-file-width="430" decoding="async" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Asenath.jpg/200px-Asenath.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Asenath.jpg/300px-Asenath.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Asenath.jpg/400px-Asenath.jpg 2x" width="200"></a><span data-dcnode-id="7494" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7484"><div class="magnify" data-dcnode-id="7492"><a class="internal" data-dcnode-id="7493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAsenath.jpg" title="Enlarge"></a></div><span data-dcnode-id="7491" instrument_node="">Asenath from </span><a data-dcnode-id="7489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guillaume_Rouill%25C3%25A9" title="Guillaume Rouillé"><span data-dcnode-id="7490" instrument_node="">Guillaume Rouillé</span></a><span data-dcnode-id="7488" instrument_node="">'s </span><i data-dcnode-id="7485"><a class="mw-redirect" data-dcnode-id="7486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promptuarii_Iconum_Insigniorum" title="Promptuarii Iconum Insigniorum"><span data-dcnode-id="7487" instrument_node="">Promptuarii Iconum Insigniorum</span></a></i></div></div></div><span data-dcnode-id="7481" instrument_node="">
</span><p data-dcnode-id="7427"><span data-dcnode-id="7480" instrument_node="">First mentioned in Genesis 41:45, Asenath is said to be the wife of </span><a data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_%28Genesis%29" title="Joseph (Genesis)"><span data-dcnode-id="7479" instrument_node="">Joseph</span></a><span data-dcnode-id="7477" instrument_node=""> and the mother of his sons, </span><a data-dcnode-id="7475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manasseh_%28tribal_patriarch%29" title="Manasseh (tribal patriarch)"><span data-dcnode-id="7476" instrument_node="">Manasseh</span></a><span data-dcnode-id="7474" instrument_node=""> and </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ephraim" title="Ephraim"><span data-dcnode-id="7473" instrument_node="">Ephraim</span></a><span data-dcnode-id="7471" instrument_node="">. In the </span><a data-dcnode-id="7469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Genesis" title="Book of Genesis"><span data-dcnode-id="7470" instrument_node="">Book of Genesis</span></a><span data-dcnode-id="7468" instrument_node="">, she is referred to as the daughter of </span><a data-dcnode-id="7466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Potipherah" title="Potipherah"><span data-dcnode-id="7467" instrument_node="">Potipherah</span></a><span data-dcnode-id="7465" instrument_node=""> priest of </span><a class="mw-redirect" data-dcnode-id="7463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_%28Ancient_Egypt%29" title="On (Ancient Egypt)"><span data-dcnode-id="7464" instrument_node="">On</span></a><span data-dcnode-id="7462" instrument_node=""> (Gk. Heliopolis). In the </span><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Jubilees" title="Book of Jubilees"><span data-dcnode-id="7461" instrument_node="">Book of Jubilees</span></a><span data-dcnode-id="7459" instrument_node="">, she is said to be given to Joseph to marry by </span><a data-dcnode-id="7457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaoh" title="Pharaoh"><span data-dcnode-id="7458" instrument_node="">Pharaoh</span></a><span data-dcnode-id="7456" instrument_node="">, a daughter of </span><a data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Potiphar" title="Potiphar"><span data-dcnode-id="7455" instrument_node="">Potiphar</span></a><span data-dcnode-id="7453" instrument_node="">, a high priest of </span><a data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heliopolis_%28ancient_Egypt%29" title="Heliopolis (ancient Egypt)"><span data-dcnode-id="7452" instrument_node="">Heliopolis</span></a><span data-dcnode-id="7450" instrument_node="">, with no clarification as to whether or not this Potiphar is the same Potiphar whose wife falsely accused Joseph of attempting to rape her. While in the </span><a data-dcnode-id="7448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midrash" title="Midrash"><span data-dcnode-id="7449" instrument_node="">Midrash</span></a><span data-dcnode-id="7447" instrument_node=""> and </span><a data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Targum_Pseudo-Jonathan" title="Targum Pseudo-Jonathan"><span data-dcnode-id="7446" instrument_node="">Targum Pseudo-Jonathan</span></a><span data-dcnode-id="7444" instrument_node="">, she is said to be the daughter of </span><a data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dinah" title="Dinah"><span data-dcnode-id="7443" instrument_node="">Dinah</span></a><span data-dcnode-id="7441" instrument_node="">, Joseph's sister, and </span><a class="mw-redirect" data-dcnode-id="7439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shechem_%28biblical_figure%29" title="Shechem (biblical figure)"><span data-dcnode-id="7440" instrument_node="">Shechem</span></a><span data-dcnode-id="7438" instrument_node="">, born of an illicit union, described as either premarital sex or rape, depending on the narrative.</span><sup class="reference" data-dcnode-id="7435" id="cite_ref-57"><a data-dcnode-id="7436" href="#cite_note-57"><span data-dcnode-id="7437" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="7432" id="cite_ref-58"><a data-dcnode-id="7433" href="#cite_note-58"><span data-dcnode-id="7434" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="7429" id="cite_ref-59"><a data-dcnode-id="7430" href="#cite_note-59"><span data-dcnode-id="7431" instrument_node="">[59]</span></a></sup><span data-dcnode-id="7428" instrument_node="">
</span></p><span data-dcnode-id="7426" instrument_node="">
</span><h4 data-dcnode-id="7415"><span data-dcnode-id="7425" id="Tamar.2C_daughter_of_David"></span><span class="mw-headline" data-dcnode-id="7423" id="Tamar,_daughter_of_David"><span data-dcnode-id="7424" instrument_node="">Tamar, daughter of David</span></span><span class="mw-editsection" data-dcnode-id="7416"><span class="mw-editsection-bracket" data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">[</span></span><a data-dcnode-id="7419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D15" title="Edit section: Tamar, daughter of David"><span data-dcnode-id="7420" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7414" instrument_node="">
</span><link data-dcnode-id="7413" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7409" role="note"><span data-dcnode-id="7412" instrument_node="">Main article: </span><a data-dcnode-id="7410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tamar_%28daughter_of_David%29" title="Tamar (daughter of David)"><span data-dcnode-id="7411" instrument_node="">Tamar (daughter of David)</span></a></div><span data-dcnode-id="7408" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7399"><div class="thumbinner" data-dcnode-id="7400" style="width:182px;"><a class="image" data-dcnode-id="7406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADesolation_of_Tamar_by_J.Tissot.jpg"><img alt="" class="thumbimage" data-dcnode-id="7407" data-file-height="3000" data-file-width="1999" decoding="async" height="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Desolation_of_Tamar_by_J.Tissot.jpg/180px-Desolation_of_Tamar_by_J.Tissot.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Desolation_of_Tamar_by_J.Tissot.jpg/270px-Desolation_of_Tamar_by_J.Tissot.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/Desolation_of_Tamar_by_J.Tissot.jpg/360px-Desolation_of_Tamar_by_J.Tissot.jpg 2x" width="180"></a><span data-dcnode-id="7405" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7401"><div class="magnify" data-dcnode-id="7403"><a class="internal" data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADesolation_of_Tamar_by_J.Tissot.jpg" title="Enlarge"></a></div><span data-dcnode-id="7402" instrument_node="">Desolation of Tamar by J.Tissot, c. 1900</span></div></div></div><span data-dcnode-id="7398" instrument_node="">
</span><p data-dcnode-id="7373"><span data-dcnode-id="7397" instrument_node="">The story of Tamar is a literary unit consisting of seven parts. According to Frymer-Kensky, the story "has received a great deal of attention as a superb piece of literature, and several have concentrated on explicating the artistry involved."</span><sup class="reference" data-dcnode-id="7394" id="cite_ref-Frymer-Kensky2002_49-4"><a data-dcnode-id="7395" href="#cite_note-Frymer-Kensky2002-49"><span data-dcnode-id="7396" instrument_node="">[49]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7391"><span data-dcnode-id="7392" title="Page / location: 399"><span data-dcnode-id="7393" instrument_node="">: 399 </span></span></sup><span data-dcnode-id="7390" instrument_node=""> This story (2 Samuel) focuses on three of King </span><a data-dcnode-id="7388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David" title="David"><span data-dcnode-id="7389" instrument_node="">David</span></a><span data-dcnode-id="7387" instrument_node="">'s children, </span><a data-dcnode-id="7385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnon" title="Amnon"><span data-dcnode-id="7386" instrument_node="">Amnon</span></a><span data-dcnode-id="7384" instrument_node=""> the first born, </span><a data-dcnode-id="7382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absalom" title="Absalom"><span data-dcnode-id="7383" instrument_node="">Absalom</span></a><span data-dcnode-id="7381" instrument_node=""> the beloved son, and his beautiful sister Tamar.</span><sup class="reference" data-dcnode-id="7378" id="cite_ref-Trible1984terror_35-3"><a data-dcnode-id="7379" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7380" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7375"><span data-dcnode-id="7376" title="Page / location: 38"><span data-dcnode-id="7377" instrument_node="">: 38 </span></span></sup><span data-dcnode-id="7374" instrument_node="">
</span></p><p data-dcnode-id="7361"><span data-dcnode-id="7372" instrument_node="">Amnon desires Tamar deeply. Immediately after explaining Amnon's desire the narrator first uses the term sister to reveal Tamar is not only Absalom's sister but is also Amnon's sister by another mother.  Phyllis Trible says the storyteller "stresses family ties for such intimacy exacerbates the coming tragedy."  Full of lust, the prince is impotent to act; Tamar is a virgin and protected property. Then comes a plan from his cousin </span><a data-dcnode-id="7370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jonadab" title="Jonadab"><span data-dcnode-id="7371" instrument_node="">Jonadab</span></a><span data-dcnode-id="7369" instrument_node="">, "a very crafty man."</span><sup class="reference" data-dcnode-id="7366" id="cite_ref-Trible1984terror_35-4"><a data-dcnode-id="7367" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7368" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7363"><span data-dcnode-id="7364" title="Page / location: 39"><span data-dcnode-id="7365" instrument_node="">: 39 </span></span></sup><span data-dcnode-id="7362" instrument_node="">
</span></p><p data-dcnode-id="7338"><span data-dcnode-id="7360" instrument_node="">Jonadab's scheme to aid Amnon pivots on David the king. Amnon pretends to be sick and David comes to see him.</span><sup class="reference" data-dcnode-id="7357" id="cite_ref-Trible1984terror_35-5"><a data-dcnode-id="7358" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7359" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7354"><span data-dcnode-id="7355" title="Page / location: 43"><span data-dcnode-id="7356" instrument_node="">: 43 </span></span></sup><span data-dcnode-id="7353" instrument_node=""> He asks that his sister Tamar make him food and feed him. The king orders it sending a message to Tamar.</span><sup class="reference" data-dcnode-id="7350" id="cite_ref-Trible1984terror_35-6"><a data-dcnode-id="7351" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7352" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7347"><span data-dcnode-id="7348" title="Page / location: 44"><span data-dcnode-id="7349" instrument_node="">: 44 </span></span></sup><span data-dcnode-id="7346" instrument_node="">  Amnon sends the servants away. Alone with her brother she is vulnerable, but Tamar claims her voice. Frymer-Kensky says Tamar speaks to Amnon with wisdom, but she speaks to a foolish man. She attempts to dissuade him, then offers the alternative of marriage, and tells him to appeal to the king. He does not listen, and rapes her.</span><sup class="reference" data-dcnode-id="7343" id="cite_ref-Trible1984terror_35-7"><a data-dcnode-id="7344" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7345" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7340"><span data-dcnode-id="7341" title="Page / location: 45"><span data-dcnode-id="7342" instrument_node="">: 45 </span></span></sup><span data-dcnode-id="7339" instrument_node="">
</span></p><p data-dcnode-id="7322"><span data-dcnode-id="7337" instrument_node="">Amnon is immediately full of shame and angrily throws Tamar out. “No!” she said to him. “Sending me away would be a greater wrong than what you have already done to me.” But he refuses to listen. Tamar is desolate: ruined and miserable. King David is furious but he does nothing to avenge his daughter or punish his son. Frymer Kensky says "The reader of the story who expects that the state will provide protection for the vulnerable now sees that the state cannot control itself."</span><sup class="reference" data-dcnode-id="7334" id="cite_ref-Frymer-Kensky2006_2-11"><a data-dcnode-id="7335" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="7336" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7331"><span data-dcnode-id="7332" title="Page / location: 174"><span data-dcnode-id="7333" instrument_node="">: 174 </span></span></sup><span data-dcnode-id="7330" instrument_node=""> Absalom is filled with hatred, and kills Amnon two years later. Absalom then rebels against his father and is also killed.</span><sup class="reference" data-dcnode-id="7327" id="cite_ref-Trible1984terror_35-8"><a data-dcnode-id="7328" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7329" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7324"><span data-dcnode-id="7325" title="Page / location: 48"><span data-dcnode-id="7326" instrument_node="">: 48 </span></span></sup><span data-dcnode-id="7323" instrument_node="">
</span></p><span data-dcnode-id="7321" instrument_node="">
</span><h4 data-dcnode-id="7311"><span class="mw-headline" data-dcnode-id="7319" id="Bathsheba"><span data-dcnode-id="7320" instrument_node="">Bathsheba</span></span><span class="mw-editsection" data-dcnode-id="7312"><span class="mw-editsection-bracket" data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">[</span></span><a data-dcnode-id="7315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D16" title="Edit section: Bathsheba"><span data-dcnode-id="7316" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7313"><span data-dcnode-id="7314" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7310" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7299"><div class="thumbinner" data-dcnode-id="7300" style="width:222px;"><a class="image" data-dcnode-id="7308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABethsab%25C3%25A9e%2C_by_Jean-L%25C3%25A9on_G%25C3%25A9r%25C3%25B4me.jpg"><img alt="" class="thumbimage" data-dcnode-id="7309" data-file-height="1202" data-file-width="2000" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Bethsab%25C3%25A9e%252C_by_Jean-L%25C3%25A9on_G%25C3%25A9r%25C3%25B4me.jpg/220px-Bethsab%25C3%25A9e%252C_by_Jean-L%25C3%25A9on_G%25C3%25A9r%25C3%25B4me.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Bethsab%C3%A9e%2C_by_Jean-L%C3%A9on_G%C3%A9r%C3%B4me.jpg/330px-Bethsab%C3%A9e%2C_by_Jean-L%C3%A9on_G%C3%A9r%C3%B4me.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/Bethsab%C3%A9e%2C_by_Jean-L%C3%A9on_G%C3%A9r%C3%B4me.jpg/440px-Bethsab%C3%A9e%2C_by_Jean-L%C3%A9on_G%C3%A9r%C3%B4me.jpg 2x" width="220"></a><span data-dcnode-id="7307" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7301"><div class="magnify" data-dcnode-id="7305"><a class="internal" data-dcnode-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABethsab%25C3%25A9e%2C_by_Jean-L%25C3%25A9on_G%25C3%25A9r%25C3%25B4me.jpg" title="Enlarge"></a></div><a data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-L%25C3%25A9on_G%25C3%25A9r%25C3%25B4me" title="Jean-Léon Gérôme"><span data-dcnode-id="7304" instrument_node="">Jean-Léon Gérôme</span></a><span data-dcnode-id="7302" instrument_node="">'s depiction of Bathsheba bathing watched by David.</span></div></div></div><span data-dcnode-id="7298" instrument_node="">
</span><link data-dcnode-id="7297" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7293" role="note"><span data-dcnode-id="7296" instrument_node="">Main article: </span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bathsheba" title="Bathsheba"><span data-dcnode-id="7295" instrument_node="">Bathsheba</span></a></div><span data-dcnode-id="7292" instrument_node="">
</span><p data-dcnode-id="7263"><span data-dcnode-id="7291" instrument_node="">In the Book of Samuel, Bathsheba is a married woman who is noticed by king David while she is bathing. He has her brought to him, and she becomes pregnant. The text in the Bible does not explicitly state whether Bathsheba consented to sex.</span><sup class="reference" data-dcnode-id="7288" id="cite_ref-Campbell2005_60-0"><a data-dcnode-id="7289" href="#cite_note-Campbell2005-60"><span data-dcnode-id="7290" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="7285" id="cite_ref-Koenig2011_61-0"><a data-dcnode-id="7286" href="#cite_note-Koenig2011-61"><span data-dcnode-id="7287" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="7282" id="cite_ref-Campbell2004_62-0"><a data-dcnode-id="7283" href="#cite_note-Campbell2004-62"><span data-dcnode-id="7284" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7281" instrument_node=""> David successfully plots the death of her husband </span><a data-dcnode-id="7279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uriah_the_Hittite" title="Uriah the Hittite"><span data-dcnode-id="7280" instrument_node="">Uriah</span></a><span data-dcnode-id="7278" instrument_node="">, and she becomes one of David's wives.</span><sup class="reference" data-dcnode-id="7275" id="cite_ref-Campbell2005_60-1"><a data-dcnode-id="7276" href="#cite_note-Campbell2005-60"><span data-dcnode-id="7277" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7274" instrument_node=""> Their child is killed as divine punishment, but Bathsheba later has another child, </span><a data-dcnode-id="7272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solomon" title="Solomon"><span data-dcnode-id="7273" instrument_node="">Solomon</span></a><span data-dcnode-id="7271" instrument_node="">. In the Book of Kings, when David is old, she and the prophet </span><a data-dcnode-id="7269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathan_%28prophet%29" title="Nathan (prophet)"><span data-dcnode-id="7270" instrument_node="">Nathan</span></a><span data-dcnode-id="7268" instrument_node=""> convince David to let Solomon take the throne instead of an older brother.</span><sup class="reference" data-dcnode-id="7265" id="cite_ref-63"><a data-dcnode-id="7266" href="#cite_note-63"><span data-dcnode-id="7267" instrument_node="">[63]</span></a></sup><span data-dcnode-id="7264" instrument_node="">
</span></p><span data-dcnode-id="7262" instrument_node="">
</span><h4 data-dcnode-id="7252"><span class="mw-headline" data-dcnode-id="7260" id="Susanna"><span data-dcnode-id="7261" instrument_node="">Susanna</span></span><span class="mw-editsection" data-dcnode-id="7253"><span class="mw-editsection-bracket" data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">[</span></span><a data-dcnode-id="7256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D17" title="Edit section: Susanna"><span data-dcnode-id="7257" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7251" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7238"><div class="thumbinner" data-dcnode-id="7239" style="width:222px;"><a class="image" data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg"><img alt="" class="thumbimage" data-dcnode-id="7250" data-file-height="990" data-file-width="1280" decoding="async" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Guido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg/220px-Guido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Guido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg/330px-Guido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Guido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg/440px-Guido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg 2x" width="220"></a><span data-dcnode-id="7248" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7240"><div class="magnify" data-dcnode-id="7246"><a class="internal" data-dcnode-id="7247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuido_Reni_-_Susanna_and_the_Elders_-_WGA19296.jpg" title="Enlarge"></a></div><i data-dcnode-id="7244"><span data-dcnode-id="7245" instrument_node="">Susanna and the Elders</span></i><span data-dcnode-id="7243" instrument_node=""> by </span><a data-dcnode-id="7241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guido_Reni" title="Guido Reni"><span data-dcnode-id="7242" instrument_node="">Guido Reni</span></a></div></div></div><span data-dcnode-id="7237" instrument_node="">
</span><link data-dcnode-id="7236" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7232" role="note"><span data-dcnode-id="7235" instrument_node="">Main article: </span><a data-dcnode-id="7233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susanna_%28Book_of_Daniel%29" title="Susanna (Book of Daniel)"><span data-dcnode-id="7234" instrument_node="">Susanna (Book of Daniel)</span></a></div><span data-dcnode-id="7231" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7230" instrument_node="">The tale of Susanna is included in the Old Testament of the </span><a class="mw-redirect" data-dcnode-id="7228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic" title="Roman Catholic"><span data-dcnode-id="7229" instrument_node="">Roman Catholic</span></a><span data-dcnode-id="7227" instrument_node=""> and </span><a data-dcnode-id="7225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="7226" instrument_node="">Eastern Orthodox</span></a><span data-dcnode-id="7224" instrument_node=""> churches. Susanna is a married, beautiful and law-abiding woman. Two elders, newly appointed judges, lust for her, and attempt to coerce her to have sex with them. She refuses, and the elders falsely testifies that she has committed adultery with a young man. Susanna is condemned to death, and cries to God for help. God hears her, and makes </span><a data-dcnode-id="7222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_%28biblical_figure%29" title="Daniel (biblical figure)"><span data-dcnode-id="7223" instrument_node="">Daniel</span></a><span data-dcnode-id="7221" instrument_node=""> come to her aid. Daniel exposes the lies of the elders, and they are put to death instead.</span><sup class="reference" data-dcnode-id="7218" id="cite_ref-64"><a data-dcnode-id="7219" href="#cite_note-64"><span data-dcnode-id="7220" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="7215" id="cite_ref-65"><a data-dcnode-id="7216" href="#cite_note-65"><span data-dcnode-id="7217" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="7212" id="cite_ref-66"><a data-dcnode-id="7213" href="#cite_note-66"><span data-dcnode-id="7214" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7211" instrument_node="">
</span></p><span data-dcnode-id="7209" instrument_node="">
</span><h3 data-dcnode-id="7199"><span class="mw-headline" data-dcnode-id="7207" id="Other_women_in_the_Hebrew_Bible"><span data-dcnode-id="7208" instrument_node="">Other women in the Hebrew Bible</span></span><span class="mw-editsection" data-dcnode-id="7200"><span class="mw-editsection-bracket" data-dcnode-id="7205"><span data-dcnode-id="7206" instrument_node="">[</span></span><a data-dcnode-id="7203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D18" title="Edit section: Other women in the Hebrew Bible"><span data-dcnode-id="7204" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7201"><span data-dcnode-id="7202" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7198" instrument_node="">
</span><h4 data-dcnode-id="7188"><span class="mw-headline" data-dcnode-id="7196" id="Eve"><span data-dcnode-id="7197" instrument_node="">Eve</span></span><span class="mw-editsection" data-dcnode-id="7189"><span class="mw-editsection-bracket" data-dcnode-id="7194"><span data-dcnode-id="7195" instrument_node="">[</span></span><a data-dcnode-id="7192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D19" title="Edit section: Eve"><span data-dcnode-id="7193" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7190"><span data-dcnode-id="7191" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7187" instrument_node="">
</span><link data-dcnode-id="7186" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7182" role="note"><span data-dcnode-id="7185" instrument_node="">Main article: </span><a data-dcnode-id="7183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eve" title="Eve"><span data-dcnode-id="7184" instrument_node="">Eve</span></a></div><span data-dcnode-id="7181" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7166"><div class="thumbinner" data-dcnode-id="7167" style="width:222px;"><a class="image" data-dcnode-id="7179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOrvieto060.jpg"><img alt="" class="thumbimage" data-dcnode-id="7180" data-file-height="1712" data-file-width="2272" decoding="async" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Orvieto060.jpg/220px-Orvieto060.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Orvieto060.jpg/330px-Orvieto060.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Orvieto060.jpg/440px-Orvieto060.jpg 2x" width="220"></a><span data-dcnode-id="7178" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7168"><div class="magnify" data-dcnode-id="7176"><a class="internal" data-dcnode-id="7177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOrvieto060.jpg" title="Enlarge"></a></div><span data-dcnode-id="7175" instrument_node="">Creation of Eve, marble relief by </span><a data-dcnode-id="7173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lorenzo_Maitani" title="Lorenzo Maitani"><span data-dcnode-id="7174" instrument_node="">Lorenzo Maitani</span></a><span data-dcnode-id="7172" instrument_node="">, </span><a data-dcnode-id="7170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orvieto_Cathedral" title="Orvieto Cathedral"><span data-dcnode-id="7171" instrument_node="">Orvieto Cathedral</span></a><span data-dcnode-id="7169" instrument_node="">, Italy, c. 1300</span></div></div></div><span data-dcnode-id="7165" instrument_node="">
</span><p data-dcnode-id="7163"><span data-dcnode-id="7164" instrument_node="">The story of Eve begins in Genesis 2:18 with "The Lord God said, 'It is not good for the man to be alone. I will make a helper suitable for him'... Then the Lord God made a woman from the rib he had taken out of the man, and he brought her to the man... That is why a man leaves his father and mother and is united to his wife, and they become one flesh.  Adam and his wife were both naked, and they felt no shame.” (Genesis 2:18-25) Eve is deceived, tempted and indulges, then shares with her husband who apparently neither questions nor argues. Their eyes are opened and they realize they are naked, and they make coverings from fig leaves. When God comes to the garden, they hide, and God knows something is wrong. Both attempt to shift the blame, but they end up bearing the responsibility, each receiving their own curses, and getting thrown out of the garden together. (Genesis 2)
</span></p><p data-dcnode-id="7114"><span data-dcnode-id="7162" instrument_node="">According to Near Eastern scholar </span><a data-dcnode-id="7160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carol_Meyers" title="Carol Meyers"><span data-dcnode-id="7161" instrument_node="">Carol Meyers</span></a><span data-dcnode-id="7159" instrument_node="">, "Perhaps more than any other part of the Bible, [the story of Eve] has influenced western notions of gender and identity."</span><sup class="reference" data-dcnode-id="7156" id="cite_ref-Carol_Meyers_30-1"><a data-dcnode-id="7157" href="#cite_note-Carol_Meyers-30"><span data-dcnode-id="7158" instrument_node="">[30]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7153"><span data-dcnode-id="7154" title="Page / location: 72"><span data-dcnode-id="7155" instrument_node="">: 72 </span></span></sup><span data-dcnode-id="7152" instrument_node=""> Sociologist Linda L. Lindsey says "women have born a greater burden for 'original sin'... Eve's creation from Adam's rib, second in order, with God's "curse" at the expulsion is a stubbornly persistent frame used to justify male supremacy."</span><sup class="reference" data-dcnode-id="7149" id="cite_ref-Linda_L._Lindsey_67-0"><a data-dcnode-id="7150" href="#cite_note-Linda_L._Lindsey-67"><span data-dcnode-id="7151" instrument_node="">[67]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7146"><span data-dcnode-id="7147" title="Page / location: 133, 397"><span data-dcnode-id="7148" instrument_node="">: 133, 397 </span></span></sup><span data-dcnode-id="7145" instrument_node="">  Trible and Frymer-Kensky find the story of Eve in Genesis implies no inferiority of Eve to Adam; the word </span><i data-dcnode-id="7143"><span data-dcnode-id="7144" instrument_node="">helpmate</span></i><span data-dcnode-id="7142" instrument_node=""> (</span><i data-dcnode-id="7140"><span data-dcnode-id="7141" instrument_node="">ezer</span></i><span data-dcnode-id="7139" instrument_node="">) connotes a mentor in the Bible rather than an assistant and is used frequently for the relation of God to Israel (not Israel to God).</span><sup class="reference" data-dcnode-id="7136" id="cite_ref-Trible1984terror_35-9"><a data-dcnode-id="7137" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7138" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="7133" id="cite_ref-Frymer-Kensky2006_2-12"><a data-dcnode-id="7134" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="7135" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7130"><span data-dcnode-id="7131" title="Page / location: 168"><span data-dcnode-id="7132" instrument_node="">: 168 </span></span></sup><span data-dcnode-id="7129" instrument_node=""> Trible points out that, in mythology, the last-created thing is traditionally the culmination of creation, which is implied in Genesis 1 where man is created after everything else—except Eve.</span><sup class="reference" data-dcnode-id="7126" id="cite_ref-Trible1984terror_35-10"><a data-dcnode-id="7127" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7128" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7125" instrument_node="">  However, New Testament scholar </span><a data-dcnode-id="7123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Craig_Blomberg" title="Craig Blomberg"><span data-dcnode-id="7124" instrument_node="">Craig Blomberg</span></a><span data-dcnode-id="7122" instrument_node=""> says ancient Jews might have seen the order of creation in terms of the laws of primogeniture (both in their scriptures and in surrounding cultures) and interpreted Adam being created first as a sign of privilege.</span><sup class="reference" data-dcnode-id="7119" id="cite_ref-Blomberg_68-0"><a data-dcnode-id="7120" href="#cite_note-Blomberg-68"><span data-dcnode-id="7121" instrument_node="">[68]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7116"><span data-dcnode-id="7117" title="Page / location: 129"><span data-dcnode-id="7118" instrument_node="">: 129 </span></span></sup><span data-dcnode-id="7115" instrument_node="">
</span></p><span data-dcnode-id="7113" instrument_node="">
</span><h4 data-dcnode-id="7103"><span class="mw-headline" data-dcnode-id="7111" id="Deborah_and_Jael"><span data-dcnode-id="7112" instrument_node="">Deborah and Jael</span></span><span class="mw-editsection" data-dcnode-id="7104"><span class="mw-editsection-bracket" data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">[</span></span><a data-dcnode-id="7107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D20" title="Edit section: Deborah and Jael"><span data-dcnode-id="7108" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7102" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7093"><div class="thumbinner" data-dcnode-id="7094" style="width:222px;"><a class="image" data-dcnode-id="7100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATissot_Jael_Smote_Sisera%2C_and_Slew_Him.jpg"><img alt="" class="thumbimage" data-dcnode-id="7101" data-file-height="335" data-file-width="445" decoding="async" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/28/Tissot_Jael_Smote_Sisera%252C_and_Slew_Him.jpg/220px-Tissot_Jael_Smote_Sisera%252C_and_Slew_Him.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/28/Tissot_Jael_Smote_Sisera%2C_and_Slew_Him.jpg/330px-Tissot_Jael_Smote_Sisera%2C_and_Slew_Him.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/28/Tissot_Jael_Smote_Sisera%2C_and_Slew_Him.jpg/440px-Tissot_Jael_Smote_Sisera%2C_and_Slew_Him.jpg 2x" width="220"></a><span data-dcnode-id="7099" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7095"><div class="magnify" data-dcnode-id="7097"><a class="internal" data-dcnode-id="7098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATissot_Jael_Smote_Sisera%2C_and_Slew_Him.jpg" title="Enlarge"></a></div><span data-dcnode-id="7096" instrument_node="">Jael smiting Sisera, Tissot, c. 1900</span></div></div></div><span data-dcnode-id="7092" instrument_node="">
</span><link data-dcnode-id="7091" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7084" role="note"><span data-dcnode-id="7090" instrument_node="">Main articles: </span><a data-dcnode-id="7088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deborah" title="Deborah"><span data-dcnode-id="7089" instrument_node="">Deborah</span></a><span data-dcnode-id="7087" instrument_node=""> and </span><a data-dcnode-id="7085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jael" title="Jael"><span data-dcnode-id="7086" instrument_node="">Jael</span></a></div><span data-dcnode-id="7083" instrument_node="">
</span><p data-dcnode-id="7053"><span data-dcnode-id="7082" instrument_node="">The </span><a data-dcnode-id="7080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Judges" title="Book of Judges"><span data-dcnode-id="7081" instrument_node="">Book of Judges</span></a><span data-dcnode-id="7079" instrument_node=""> tells the story of </span><a data-dcnode-id="7077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deborah" title="Deborah"><span data-dcnode-id="7078" instrument_node="">Deborah</span></a><span data-dcnode-id="7076" instrument_node="">, as a </span><a data-dcnode-id="7074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prophet" title="Prophet"><span data-dcnode-id="7075" instrument_node="">prophet</span></a><span data-dcnode-id="7073" instrument_node=""> (Judges 4:4), a judge of </span><a data-dcnode-id="7071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israelites" title="Israelites"><span data-dcnode-id="7072" instrument_node="">Israel</span></a><span data-dcnode-id="7070" instrument_node=""> (Judges 4:4-5), the wife of </span><a data-dcnode-id="7068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lapidoth" title="Lapidoth"><span data-dcnode-id="7069" instrument_node="">Lapidoth</span></a><span data-dcnode-id="7067" instrument_node=""> and a mother (Judges 5:7). She was based in the region between </span><a data-dcnode-id="7065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramah_in_Benjamin" title="Ramah in Benjamin"><span data-dcnode-id="7066" instrument_node="">Ramah in Benjamin</span></a><span data-dcnode-id="7064" instrument_node=""> and </span><a data-dcnode-id="7062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bethel" title="Bethel"><span data-dcnode-id="7063" instrument_node="">Bethel</span></a><span data-dcnode-id="7061" instrument_node=""> in the land of </span><a data-dcnode-id="7059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_of_Ephraim" title="Tribe of Ephraim"><span data-dcnode-id="7060" instrument_node="">Ephraim</span></a><span data-dcnode-id="7058" instrument_node="">.</span><sup class="reference" data-dcnode-id="7055" id="cite_ref-je_69-0"><a data-dcnode-id="7056" href="#cite_note-je-69"><span data-dcnode-id="7057" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7054" instrument_node="">  Deborah could also be described as a warrior, leader of war, and a leader of faith. (Judges 4:6-22).
</span></p><p data-dcnode-id="7031"><span data-dcnode-id="7052" instrument_node="">The narrative describes the people of Israel as having been oppressed by </span><a data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jabin" title="Jabin"><span data-dcnode-id="7051" instrument_node="">Jabin</span></a><span data-dcnode-id="7049" instrument_node="">, the king of </span><a data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canaan" title="Canaan"><span data-dcnode-id="7048" instrument_node="">Canaan</span></a><span data-dcnode-id="7046" instrument_node="">, for twenty years. Deborah sends a prophetic message to </span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barak" title="Barak"><span data-dcnode-id="7045" instrument_node="">Barak</span></a><span data-dcnode-id="7043" instrument_node=""> to raise an army and fight them, but Barak refuses to do so without her. Deborah declares his refusal means the glory of the victory will belong to a woman.</span><sup class="reference" data-dcnode-id="7040" id="cite_ref-je_69-1"><a data-dcnode-id="7041" href="#cite_note-je-69"><span data-dcnode-id="7042" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7039" instrument_node="">  A battle is fought (led by Barak), and </span><a data-dcnode-id="7037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sisera" title="Sisera"><span data-dcnode-id="7038" instrument_node="">Sisera</span></a><span data-dcnode-id="7036" instrument_node="">, the enemy commander, is defeated.</span><sup class="reference" data-dcnode-id="7033" id="cite_ref-je_69-2"><a data-dcnode-id="7034" href="#cite_note-je-69"><span data-dcnode-id="7035" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7032" instrument_node="">
</span></p><p data-dcnode-id="7026"><span data-dcnode-id="7030" instrument_node="">Sisera had summoned all his men and 900 iron chariots, but he was routed and fled on foot. "Barak pursued the chariots and army as far as </span><a data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harosheth_Haggoyim" title="Harosheth Haggoyim"><span data-dcnode-id="7029" instrument_node="">Harosheth Haggoyim</span></a><span data-dcnode-id="7027" instrument_node="">, and all Sisera’s troops fell by the sword; not a man was left. Sisera, meanwhile, fled on foot to the tent of Jael, the wife of Heber the Kenite, because there was an alliance between Jabin king of Hazor and the family of Heber the Kenite."  Jael gave him drink, covered him with a blanket, and when, exhausted from battle, Sisera slept, Jael picked up a tent peg and a hammer and drove the peg into his temple all the way into the ground and he died.
</span></p><span data-dcnode-id="7025" instrument_node="">
</span><h4 data-dcnode-id="7015"><span class="mw-headline" data-dcnode-id="7023" id="The_Witch_of_Endor"><span data-dcnode-id="7024" instrument_node="">The Witch of Endor</span></span><span class="mw-editsection" data-dcnode-id="7016"><span class="mw-editsection-bracket" data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">[</span></span><a data-dcnode-id="7019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D21" title="Edit section: The Witch of Endor"><span data-dcnode-id="7020" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7017"><span data-dcnode-id="7018" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7014" instrument_node="">
</span><link data-dcnode-id="7013" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7009" role="note"><span data-dcnode-id="7012" instrument_node="">Main article: </span><a data-dcnode-id="7010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Witch_of_Endor" title="Witch of Endor"><span data-dcnode-id="7011" instrument_node="">Witch of Endor</span></a></div><span data-dcnode-id="7008" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6995"><div class="thumbinner" data-dcnode-id="6996" style="width:222px;"><a class="image" data-dcnode-id="7006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWitch_of_Endor_by_Elsheimer.jpg"><img alt="" class="thumbimage" data-dcnode-id="7007" data-file-height="2231" data-file-width="2007" decoding="async" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Witch_of_Endor_by_Elsheimer.jpg/220px-Witch_of_Endor_by_Elsheimer.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Witch_of_Endor_by_Elsheimer.jpg/330px-Witch_of_Endor_by_Elsheimer.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Witch_of_Endor_by_Elsheimer.jpg/440px-Witch_of_Endor_by_Elsheimer.jpg 2x" width="220"></a><span data-dcnode-id="7005" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6997"><div class="magnify" data-dcnode-id="7003"><a class="internal" data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWitch_of_Endor_by_Elsheimer.jpg" title="Enlarge"></a></div><i data-dcnode-id="7001"><span data-dcnode-id="7002" instrument_node="">Witch of Endor</span></i><span data-dcnode-id="7000" instrument_node=""> by </span><a data-dcnode-id="6998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Elsheimer" title="Adam Elsheimer"><span data-dcnode-id="6999" instrument_node="">Adam Elsheimer</span></a></div></div></div><span data-dcnode-id="6994" instrument_node="">
</span><p data-dcnode-id="6950"><span data-dcnode-id="6993" instrument_node="">The Witch of </span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Endor_%28village%29" title="Endor (village)"><span data-dcnode-id="6992" instrument_node="">Endor</span></a><span data-dcnode-id="6990" instrument_node=""> is a woman who summons the </span><a data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prophet" title="Prophet"><span data-dcnode-id="6989" instrument_node="">prophet</span></a><span data-dcnode-id="6987" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_%28Bible%29" title="Samuel (Bible)"><span data-dcnode-id="6986" instrument_node="">Samuel</span></a><span data-dcnode-id="6984" instrument_node="">'s spirit, at the demand of King </span><a class="mw-redirect" data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saul_the_King" title="Saul the King"><span data-dcnode-id="6983" instrument_node="">Saul</span></a><span data-dcnode-id="6981" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Israel_%28united_kingdom%29" title="Kingdom of Israel (united kingdom)"><span data-dcnode-id="6980" instrument_node="">Kingdom of Israel</span></a><span data-dcnode-id="6978" instrument_node=""> in the 28th chapter of the </span><a data-dcnode-id="6975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Books_of_Samuel" title="Books of Samuel"><i data-dcnode-id="6976"><span data-dcnode-id="6977" instrument_node="">First Book of Samuel</span></i></a><span data-dcnode-id="6974" instrument_node="">.</span><sup class="reference" data-dcnode-id="6971" id="cite_ref-70"><a data-dcnode-id="6972" href="#cite_note-70"><span data-dcnode-id="6973" instrument_node="">[70]</span></a></sup><span data-dcnode-id="6970" instrument_node=""> Saul, the current King of Israel, seeks wisdom from God in choosing a course of action against the assembled forces of the </span><a data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philistines" title="Philistines"><span data-dcnode-id="6969" instrument_node="">Philistines</span></a><span data-dcnode-id="6967" instrument_node="">. He receives no answer from </span><a data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dream" title="Dream"><span data-dcnode-id="6966" instrument_node="">dreams</span></a><span data-dcnode-id="6964" instrument_node="">, prophets, or the </span><a data-dcnode-id="6962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urim_and_Thummim" title="Urim and Thummim"><span data-dcnode-id="6963" instrument_node="">Urim and Thummim</span></a><span data-dcnode-id="6961" instrument_node="">. Having driven out all </span><a class="mw-redirect" data-dcnode-id="6959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Necromancer" title="Necromancer"><span data-dcnode-id="6960" instrument_node="">necromancers</span></a><span data-dcnode-id="6958" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magician_%28paranormal%29" title="Magician (paranormal)"><span data-dcnode-id="6957" instrument_node="">magicians</span></a><span data-dcnode-id="6955" instrument_node=""> from Israel, Saul searches for a witch anonymously and in disguise. His search leads him to a woman of Endor, who claims that she can see the ghost of the deceased prophet Samuel rising from the abode of the dead.</span><sup class="reference" data-dcnode-id="6952" id="cite_ref-71"><a data-dcnode-id="6953" href="#cite_note-71"><span data-dcnode-id="6954" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6951" instrument_node="">
</span></p><p data-dcnode-id="6948"><span data-dcnode-id="6949" instrument_node="">The voice of the prophet's ghost at first frightens the witch of Endor, and after complaining of being disturbed, berates Saul for disobeying God, and predicts Saul's downfall. The spirit reiterates a pre-mortem prophecy by Samuel, adding that Saul will perish with his whole army in battle the next day. Saul is terrified.  The next day, his army is defeated as prophesied, and Saul commits suicide.
</span></p><p data-dcnode-id="6943"><span data-dcnode-id="6947" instrument_node="">Although Saul is depicted as an enemy to witches and </span><a data-dcnode-id="6945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Divination" title="Divination"><span data-dcnode-id="6946" instrument_node="">diviners</span></a><span data-dcnode-id="6944" instrument_node="">, the Witch of Endor comforts Saul when she sees his distress and insists on feeding him before he leaves.
</span></p><span data-dcnode-id="6942" instrument_node="">
</span><h4 data-dcnode-id="6932"><span class="mw-headline" data-dcnode-id="6940" id="Jezebel"><span data-dcnode-id="6941" instrument_node="">Jezebel</span></span><span class="mw-editsection" data-dcnode-id="6933"><span class="mw-editsection-bracket" data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">[</span></span><a data-dcnode-id="6936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D22" title="Edit section: Jezebel"><span data-dcnode-id="6937" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6931" instrument_node="">
</span><link data-dcnode-id="6930" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6926" role="note"><span data-dcnode-id="6929" instrument_node="">Main article: </span><a data-dcnode-id="6927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jezebel" title="Jezebel"><span data-dcnode-id="6928" instrument_node="">Jezebel</span></a></div><span data-dcnode-id="6925" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6912"><div class="thumbinner" data-dcnode-id="6913" style="width:222px;"><a class="image" data-dcnode-id="6923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A097.The_Death_of_Jezebel.jpg"><img alt="Engraving of Jezebel being thrown out of a window to waiting mounted troops and dogs" class="thumbimage" data-dcnode-id="6924" data-file-height="2886" data-file-width="2290" decoding="async" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/097.The_Death_of_Jezebel.jpg/220px-097.The_Death_of_Jezebel.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/097.The_Death_of_Jezebel.jpg/330px-097.The_Death_of_Jezebel.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c6/097.The_Death_of_Jezebel.jpg/440px-097.The_Death_of_Jezebel.jpg 2x" width="220"></a><span data-dcnode-id="6922" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6914"><div class="magnify" data-dcnode-id="6920"><a class="internal" data-dcnode-id="6921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A097.The_Death_of_Jezebel.jpg" title="Enlarge"></a></div><i data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">The Death of Jezebel</span></i><span data-dcnode-id="6917" instrument_node="">, by </span><a data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Dor%25C3%25A9" title="Gustave Doré"><span data-dcnode-id="6916" instrument_node="">Gustave Doré</span></a></div></div></div><span data-dcnode-id="6911" instrument_node="">
</span><p data-dcnode-id="6890"><span data-dcnode-id="6910" instrument_node="">Jezebel is described in the </span><a data-dcnode-id="6908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Books_of_Kings" title="Books of Kings"><span data-dcnode-id="6909" instrument_node="">Book of Kings</span></a><span data-dcnode-id="6907" instrument_node=""> (1 Kings 16:31) as a queen who was the daughter of </span><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ithobaal_I" title="Ithobaal I"><span data-dcnode-id="6906" instrument_node="">Ithobaal I</span></a><span data-dcnode-id="6904" instrument_node=""> of </span><a data-dcnode-id="6902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidon" title="Sidon"><span data-dcnode-id="6903" instrument_node="">Sidon</span></a><span data-dcnode-id="6901" instrument_node=""> and the wife of </span><a data-dcnode-id="6899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahab" title="Ahab"><span data-dcnode-id="6900" instrument_node="">Ahab</span></a><span data-dcnode-id="6898" instrument_node="">, </span><a data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Israel_%28Samaria%29" title="Kingdom of Israel (Samaria)"><span data-dcnode-id="6897" instrument_node="">King of Israel</span></a><span data-dcnode-id="6895" instrument_node="">.</span><sup class="reference" data-dcnode-id="6892" id="cite_ref-72"><a data-dcnode-id="6893" href="#cite_note-72"><span data-dcnode-id="6894" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6891" instrument_node="">
</span></p><p data-dcnode-id="6867"><span data-dcnode-id="6889" instrument_node="">According to the Books of Kings, Jezebel incited her husband King Ahab to abandon the worship of </span><a data-dcnode-id="6887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="6888" instrument_node="">Yahweh</span></a><span data-dcnode-id="6886" instrument_node=""> and encourage worship of the deities </span><a data-dcnode-id="6884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baal" title="Baal"><span data-dcnode-id="6885" instrument_node="">Baal</span></a><span data-dcnode-id="6883" instrument_node=""> and </span><a data-dcnode-id="6881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asherah" title="Asherah"><span data-dcnode-id="6882" instrument_node="">Asherah</span></a><span data-dcnode-id="6880" instrument_node=""> instead. Jezebel persecuted the prophets of Yahweh, and fabricated evidence of </span><a data-dcnode-id="6878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blasphemy" title="Blasphemy"><span data-dcnode-id="6879" instrument_node="">blasphemy</span></a><span data-dcnode-id="6877" instrument_node=""> against an innocent </span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naboth" title="Naboth"><span data-dcnode-id="6876" instrument_node="">landowner</span></a><span data-dcnode-id="6874" instrument_node=""> who refused to sell his property to King Ahab, causing the landowner to be put to death. For these transgressions against the God and people of Israel, Jezebel met a gruesome death—</span><a data-dcnode-id="6872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defenestration" title="Defenestration"><span data-dcnode-id="6873" instrument_node="">thrown out of a window</span></a><span data-dcnode-id="6871" instrument_node=""> by members of her own court retinue, and the flesh of her corpse eaten by </span><a class="mw-redirect" data-dcnode-id="6869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stray_dogs" title="Stray dogs"><span data-dcnode-id="6870" instrument_node="">stray dogs</span></a><span data-dcnode-id="6868" instrument_node="">.
</span></p><p data-dcnode-id="6851"><span data-dcnode-id="6866" instrument_node="">In the biblical story, Jezebel became associated with </span><a data-dcnode-id="6864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/False_prophet" title="False prophet"><span data-dcnode-id="6865" instrument_node="">false prophets</span></a><span data-dcnode-id="6863" instrument_node="">. In some interpretations, her dressing in finery and putting on makeup</span><sup class="reference" data-dcnode-id="6860" id="cite_ref-Bibleverse||2_Kings|9:30|kjv_73-0"><a data-dcnode-id="6861" href="#cite_note-Bibleverse%7C%7C2_Kings%7C9:30%7Ckjv-73"><span data-dcnode-id="6862" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6859" instrument_node=""> led to the association of the use of </span><a data-dcnode-id="6857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmetics" title="Cosmetics"><span data-dcnode-id="6858" instrument_node="">cosmetics</span></a><span data-dcnode-id="6856" instrument_node=""> with "painted women" or prostitutes.</span><sup class="reference" data-dcnode-id="6853" id="cite_ref-74"><a data-dcnode-id="6854" href="#cite_note-74"><span data-dcnode-id="6855" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6852" instrument_node="">
</span></p><span data-dcnode-id="6850" instrument_node="">
</span><h4 data-dcnode-id="6840"><span class="mw-headline" data-dcnode-id="6848" id="Athaliah"><span data-dcnode-id="6849" instrument_node="">Athaliah</span></span><span class="mw-editsection" data-dcnode-id="6841"><span class="mw-editsection-bracket" data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">[</span></span><a data-dcnode-id="6844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D23" title="Edit section: Athaliah"><span data-dcnode-id="6845" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6839" instrument_node="">
</span><link data-dcnode-id="6838" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6834" role="note"><span data-dcnode-id="6837" instrument_node="">Main article: </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athaliah" title="Athaliah"><span data-dcnode-id="6836" instrument_node="">Athaliah</span></a></div><span data-dcnode-id="6833" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6820"><div class="thumbinner" data-dcnode-id="6821" style="width:222px;"><a class="image" data-dcnode-id="6831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAthaliah1.jpg"><img alt="" class="thumbimage" data-dcnode-id="6832" data-file-height="452" data-file-width="400" decoding="async" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/57/Athaliah1.jpg/220px-Athaliah1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/57/Athaliah1.jpg/330px-Athaliah1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/5/57/Athaliah1.jpg 2x" width="220"></a><span data-dcnode-id="6830" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6822"><div class="magnify" data-dcnode-id="6828"><a class="internal" data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAthaliah1.jpg" title="Enlarge"></a></div><i data-dcnode-id="6826"><span data-dcnode-id="6827" instrument_node="">The Death of Athaliah</span></i><span data-dcnode-id="6825" instrument_node=""> by </span><a data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Dor%25C3%25A9" title="Gustave Doré"><span data-dcnode-id="6824" instrument_node="">Gustave Doré</span></a></div></div></div><span data-dcnode-id="6819" instrument_node="">
</span><p data-dcnode-id="6793"><span data-dcnode-id="6818" instrument_node="">Athaliah was the daughter of Jezebel and King Ahab. Her story is told in </span><a data-dcnode-id="6816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Books_of_Kings" title="Books of Kings"><span data-dcnode-id="6817" instrument_node="">2 Kings</span></a><span data-dcnode-id="6815" instrument_node=""> 8:16 – 11:16 and </span><a data-dcnode-id="6813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Books_of_Chronicles" title="Books of Chronicles"><span data-dcnode-id="6814" instrument_node="">2 Chronicles</span></a><span data-dcnode-id="6812" instrument_node=""> 22:10-23:15. According to these passages, Athaliah married </span><a data-dcnode-id="6810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehoram_of_Judah" title="Jehoram of Judah"><span data-dcnode-id="6811" instrument_node="">Jehoram</span></a><span data-dcnode-id="6809" instrument_node="">, King of </span><a data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Judah" title="Kingdom of Judah"><span data-dcnode-id="6808" instrument_node="">Judah</span></a><span data-dcnode-id="6806" instrument_node="">. After her husband died, Athaliah's son </span><a data-dcnode-id="6804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahaziah_of_Judah" title="Ahaziah of Judah"><span data-dcnode-id="6805" instrument_node="">Ahaziah</span></a><span data-dcnode-id="6803" instrument_node=""> came to the throne of Judah, but he reigned for only a year before being killed. When he died, Athaliah usurped the throne and ruled as Queen of Judah for six years. In an attempt to consolidate her position, she ordered all the royal house of Judah to be put to death, but unbeknownst to her, </span><a data-dcnode-id="6801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehosheba" title="Jehosheba"><span data-dcnode-id="6802" instrument_node="">Jehosheba</span></a><span data-dcnode-id="6800" instrument_node="">, Ahaziah's sister, managed to rescue from the purge one of Athaliah's grandsons with Jehoram of Judah, named </span><a data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehoash_of_Judah" title="Jehoash of Judah"><span data-dcnode-id="6799" instrument_node="">Jehoash</span></a><span data-dcnode-id="6797" instrument_node="">, who was only one year old. Jehoash was raised in secret by Jehosheba's husband, a priest named </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehoiada" title="Jehoiada"><span data-dcnode-id="6796" instrument_node="">Jehoiada</span></a><span data-dcnode-id="6794" instrument_node="">.
</span></p><p data-dcnode-id="6781"><span data-dcnode-id="6792" instrument_node="">After six years of raising the boy in secret, Jehoiada revealed his existence and had him proclaimed King. Athaliah denounced this as treason, but a successful revolt was organised in his favour and Athaliah was put to death at the entrance of her palace.</span><sup class="reference" data-dcnode-id="6789" id="cite_ref-75"><a data-dcnode-id="6790" href="#cite_note-75"><span data-dcnode-id="6791" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="6786" id="cite_ref-76"><a data-dcnode-id="6787" href="#cite_note-76"><span data-dcnode-id="6788" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="6783" id="cite_ref-77"><a data-dcnode-id="6784" href="#cite_note-77"><span data-dcnode-id="6785" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6782" instrument_node="">
</span></p><span data-dcnode-id="6780" instrument_node="">
</span><h4 data-dcnode-id="6770"><span class="mw-headline" data-dcnode-id="6778" id="The_Shunammite_woman"><span data-dcnode-id="6779" instrument_node="">The Shunammite woman</span></span><span class="mw-editsection" data-dcnode-id="6771"><span class="mw-editsection-bracket" data-dcnode-id="6776"><span data-dcnode-id="6777" instrument_node="">[</span></span><a data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D24" title="Edit section: The Shunammite woman"><span data-dcnode-id="6775" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6772"><span data-dcnode-id="6773" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6769" instrument_node="">
</span><link data-dcnode-id="6768" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6764" role="note"><span data-dcnode-id="6767" instrument_node="">Main article: </span><a data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woman_of_Shunem" title="Woman of Shunem"><span data-dcnode-id="6766" instrument_node="">Woman of Shunem</span></a></div><span data-dcnode-id="6763" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6749"><div class="thumbinner" data-dcnode-id="6750" style="width:222px;"><a class="image" data-dcnode-id="6761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEeckhout_Elisha_and_the_Shunammite_woman.jpg"><img alt="" class="thumbimage" data-dcnode-id="6762" data-file-height="665" data-file-width="805" decoding="async" height="182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Eeckhout_Elisha_and_the_Shunammite_woman.jpg/220px-Eeckhout_Elisha_and_the_Shunammite_woman.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Eeckhout_Elisha_and_the_Shunammite_woman.jpg/330px-Eeckhout_Elisha_and_the_Shunammite_woman.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/90/Eeckhout_Elisha_and_the_Shunammite_woman.jpg/440px-Eeckhout_Elisha_and_the_Shunammite_woman.jpg 2x" width="220"></a><span data-dcnode-id="6760" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6751"><div class="magnify" data-dcnode-id="6758"><a class="internal" data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEeckhout_Elisha_and_the_Shunammite_woman.jpg" title="Enlarge"></a></div><i data-dcnode-id="6756"><span data-dcnode-id="6757" instrument_node="">Elisha and the Shunammite woman</span></i><span data-dcnode-id="6755" instrument_node="">. </span><a data-dcnode-id="6753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerbrand_van_den_Eeckhout" title="Gerbrand van den Eeckhout"><span data-dcnode-id="6754" instrument_node="">Gerbrand van den Eeckhout</span></a><span data-dcnode-id="6752" instrument_node="">, 1649.</span></div></div></div><span data-dcnode-id="6748" instrument_node="">
</span><p data-dcnode-id="6740"><span data-dcnode-id="6747" instrument_node="">2 Kings 4 tells of a woman in </span><a data-dcnode-id="6745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shunem" title="Shunem"><span data-dcnode-id="6746" instrument_node="">Shunem</span></a><span data-dcnode-id="6744" instrument_node=""> who treated the prophet </span><a data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elisha" title="Elisha"><span data-dcnode-id="6743" instrument_node="">Elisha</span></a><span data-dcnode-id="6741" instrument_node=""> with respect, feeding him and providing a place for him to stay whenever he traveled through town.  One day Elisha asked his servant what could be done for her and the servant said, she has no son. So Elisha called her and said, this time next year she would have a son.  She does, the boy grows, and then one day he dies. She placed the child's body on Elisha's bed and went to find him. "When she reached the man of God at the mountain, she took hold of his feet. Gehazi came over to push her away, but the man of God said, 'Leave her alone! She is in bitter distress, but the Lord has hidden it from me and has not told me why.' 'Did I ask you for a son, my lord?' she said. 'Didn’t I tell you, ‘Don’t raise my hopes’?”  And she refuses to leave Elisha who goes and heals the boy.
</span></p><p data-dcnode-id="6717"><span data-dcnode-id="6739" instrument_node="">Biblical scholar Burke Long says the </span><a data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woman_of_Shunem" title="Woman of Shunem"><span data-dcnode-id="6738" instrument_node="">"great woman" of Shunnem</span></a><span data-dcnode-id="6736" instrument_node=""> who appears in the Book of Kings acknowledges and respects the prophet Elisha's position yet is also a "determined mover and shaper of events."</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-Burke_Long_78-0"><a data-dcnode-id="6734" href="#cite_note-Burke_Long-78"><span data-dcnode-id="6735" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6732" instrument_node="">  According to Frymer-Kensky, this narrative demonstrates how gender intersects with class in the Bible's portrayal of ancient Israel. The Shunammite's story takes place among the rural poor, and against this "backdrop of extreme poverty, the Shunammite is wealthy, giving her more boldness than poor women or sometimes even poor men."</span><sup class="reference" data-dcnode-id="6729" id="cite_ref-Frymer-Kensky2006_2-13"><a data-dcnode-id="6730" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="6731" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6726"><span data-dcnode-id="6727" title="Page / location: 164"><span data-dcnode-id="6728" instrument_node="">: 164 </span></span></sup><span data-dcnode-id="6725" instrument_node=""> She is well enough off she is able to extend a kind of patronage to Elisha, and is independent enough she is willing to confront the prophet and King in pursuit of the well-being of her household.</span><sup class="reference" data-dcnode-id="6722" id="cite_ref-Frymer-Kensky2006_2-14"><a data-dcnode-id="6723" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="6724" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6719"><span data-dcnode-id="6720" title="Page / location: 164"><span data-dcnode-id="6721" instrument_node="">: 164 </span></span></sup><span data-dcnode-id="6718" instrument_node="">
</span></p><span data-dcnode-id="6716" instrument_node="">
