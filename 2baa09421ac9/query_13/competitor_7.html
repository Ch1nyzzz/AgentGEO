 special occasions in their lives such as giving a </span><i data-dcnode-id="8254"><a class="mw-redirect" data-dcnode-id="8255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Todah" title="Todah"><span data-dcnode-id="8256" instrument_node="">todah</span></a></i><span data-dcnode-id="8253" instrument_node=""> ("thanksgiving") offering after childbirth. Hence, they participated in many of the major public religious roles that non-Levitical men could, albeit less often and on a somewhat smaller and generally more discreet scale.</span><sup class="reference" data-dcnode-id="8250" id="cite_ref-HauptmanEtz_43-0"><a data-dcnode-id="8251" href="#cite_note-HauptmanEtz-43"><span data-dcnode-id="8252" instrument_node="">[43]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8247"><span data-dcnode-id="8248" title="Page / location: 167–169"><span data-dcnode-id="8249" instrument_node="">: 167–169 </span></span></sup><span data-dcnode-id="8246" instrument_node=""> Old Testament scholar </span><a data-dcnode-id="8244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christine_Roy_Yoder" title="Christine Roy Yoder"><span data-dcnode-id="8245" instrument_node="">Christine Roy Yoder</span></a><span data-dcnode-id="8243" instrument_node=""> says that in the </span><a data-dcnode-id="8241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Proverbs" title="Book of Proverbs"><span data-dcnode-id="8242" instrument_node="">Book of Proverbs</span></a><span data-dcnode-id="8240" instrument_node="">, the divine attribute of </span><a data-dcnode-id="8238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Wisdom" title="Holy Wisdom"><span data-dcnode-id="8239" instrument_node="">Holy Wisdom</span></a><span data-dcnode-id="8237" instrument_node=""> is presented as female.  She points out that "on the one hand" such a reference elevates women, and "on the other hand" the "strange" woman also in Proverbs "perpetuates the stereotype of woman as either wholly good or wholly evil."</span><sup class="reference" data-dcnode-id="8234" id="cite_ref-Christine_Elizabeth_Yoder_44-0"><a data-dcnode-id="8235" href="#cite_note-Christine_Elizabeth_Yoder-44"><span data-dcnode-id="8236" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8233" instrument_node="">
</span></p><span data-dcnode-id="8231" instrument_node="">
</span><h4 data-dcnode-id="8221"><span class="mw-headline" data-dcnode-id="8229" id="Economics"><span data-dcnode-id="8230" instrument_node="">Economics</span></span><span class="mw-editsection" data-dcnode-id="8222"><span class="mw-editsection-bracket" data-dcnode-id="8227"><span data-dcnode-id="8228" instrument_node="">[</span></span><a data-dcnode-id="8225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D4" title="Edit section: Economics"><span data-dcnode-id="8226" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8223"><span data-dcnode-id="8224" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8220" instrument_node="">
</span><p data-dcnode-id="8201"><span data-dcnode-id="8219" instrument_node="">In traditional agrarian societies, a woman's role in the economic well-being of the household was an essential one. Ancient Israel had no developed market economy for most of the Iron Age, so a woman's role in commodity production was essential for survival.</span><sup class="reference" data-dcnode-id="8216" id="cite_ref-Carol_L._Meyers_1-8"><a data-dcnode-id="8217" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8218" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8213"><span data-dcnode-id="8214" title="Page / location: 22"><span data-dcnode-id="8215" instrument_node="">: 22 </span></span></sup><span data-dcnode-id="8212" instrument_node=""> Meyer's says that "women were largely responsible for food processing, textile production, and the fashioning of various household implements and containers (grinding tools, stone, and ceramic vessels, baskets, weaving implements, and sewing tools).  Many of these tasks were not only time-consuming and physically demanding but also technologically sophisticated. ... As anthropologist </span><a data-dcnode-id="8210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Goody" title="Jack Goody"><span data-dcnode-id="8211" instrument_node="">Jack Goody</span></a><span data-dcnode-id="8209" instrument_node=""> noted, because women could transform the raw into the cooked and produce other essential commodities, they were seen as having the ability to “work ... wonders.”</span><sup class="reference" data-dcnode-id="8206" id="cite_ref-Carol_L._Meyers_1-9"><a data-dcnode-id="8207" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8208" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8203"><span data-dcnode-id="8204" title="Page / location: 22"><span data-dcnode-id="8205" instrument_node="">: 22 </span></span></sup><span data-dcnode-id="8202" instrument_node="">
</span></p><p data-dcnode-id="8171"><span data-dcnode-id="8200" instrument_node="">This translated into a share of power in the household. According to Meyer, women had a say in activities related to production and consumption, the allocation of household spaces and implements, supervision and assignment of tasks, and the use of resources in their own households and sometimes across households.</span><sup class="reference" data-dcnode-id="8197" id="cite_ref-Carol_L._Meyers_1-10"><a data-dcnode-id="8198" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8199" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8194"><span data-dcnode-id="8195" title="Page / location: 22"><span data-dcnode-id="8196" instrument_node="">: 22 </span></span></sup><span data-dcnode-id="8193" instrument_node=""> Meyers adds that "in traditional societies comparable to ancient Israel, when women and men both make significant economic contributions to household life, female–male relationships are marked by interdependence or mutual dependence. Thus, for many — but not all — household processes in ancient Israel, the marital union would have been a partnership. The different gendered components of household life cannot be lumped together; men dominated some aspects, women others.</span><sup class="reference" data-dcnode-id="8190" id="cite_ref-Carol_L._Meyers_1-11"><a data-dcnode-id="8191" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8192" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8187"><span data-dcnode-id="8188" title="Page / location: 20–22"><span data-dcnode-id="8189" instrument_node="">: 20–22 </span></span></sup><span data-dcnode-id="8186" instrument_node=""> A number of biblical texts, even with their androcentric perspective, support this conclusion. Women’s managerial agency can be identified in some legal stipulations of the Covenant Code, in several narratives, and in Proverbs".</span><sup class="reference" data-dcnode-id="8183" id="cite_ref-Carol_L._Meyers_1-12"><a data-dcnode-id="8184" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8185" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8180"><span data-dcnode-id="8181" title="Page / location: 22"><span data-dcnode-id="8182" instrument_node="">: 22 </span></span></sup><span data-dcnode-id="8179" instrument_node=""> This assessment relies on "ethnographic evidence from traditional societies, not on how those tasks are viewed today in industrialized societies".</span><sup class="reference" data-dcnode-id="8176" id="cite_ref-Carol_L._Meyers_1-13"><a data-dcnode-id="8177" href="#cite_note-Carol_L._Meyers-1"><span data-dcnode-id="8178" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8173"><span data-dcnode-id="8174" title="Page / location: 20"><span data-dcnode-id="8175" instrument_node="">: 20 </span></span></sup><span data-dcnode-id="8172" instrument_node="">
</span></p><span data-dcnode-id="8170" instrument_node="">
</span><h3 data-dcnode-id="8159"><span data-dcnode-id="8169" id="Sex.2C_marriage_and_family"></span><span class="mw-headline" data-dcnode-id="8167" id="Sex,_marriage_and_family"><span data-dcnode-id="8168" instrument_node="">Sex, marriage and family</span></span><span class="mw-editsection" data-dcnode-id="8160"><span class="mw-editsection-bracket" data-dcnode-id="8165"><span data-dcnode-id="8166" instrument_node="">[</span></span><a data-dcnode-id="8163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D5" title="Edit section: Sex, marriage and family"><span data-dcnode-id="8164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8161"><span data-dcnode-id="8162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8158" instrument_node="">
</span><p data-dcnode-id="8121"><span data-dcnode-id="8157" instrument_node="">Talmudic scholar </span><a data-dcnode-id="8155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judith_Hauptman" title="Judith Hauptman"><span data-dcnode-id="8156" instrument_node="">Judith Hauptman</span></a><span data-dcnode-id="8154" instrument_node=""> says marriage and family law in the Bible favored men over women. For example, a husband could divorce a wife if he chose to, but a wife could not divorce a husband without his consent. The law said a woman could not make a binding vow without the consent of her male authority, so she could not legally marry without male approval.  The practice of </span><a data-dcnode-id="8152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Levirate_marriage" title="Levirate marriage"><span data-dcnode-id="8153" instrument_node="">levirate marriage</span></a><span data-dcnode-id="8151" instrument_node=""> applied to widows of childless deceased husbands, not to widowers of childless deceased wives; though, if either he or she didn't consent to the marriage, a different ceremony called </span><i data-dcnode-id="8148"><a class="mw-redirect" data-dcnode-id="8149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalitza" title="Chalitza"><span data-dcnode-id="8150" instrument_node="">chalitza</span></a></i><span data-dcnode-id="8147" instrument_node=""> was done instead; this involves the widow removing her brother-in-law's shoe, spitting in front of him, and proclaiming, "This is what happens to someone who will not build his brother's house!".</span><sup class="reference" data-dcnode-id="8144" id="cite_ref-HauptmanEtz_43-1"><a data-dcnode-id="8145" href="#cite_note-HauptmanEtz-43"><span data-dcnode-id="8146" instrument_node="">[43]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8141"><span data-dcnode-id="8142" title="Page / location: 163"><span data-dcnode-id="8143" instrument_node="">: 163 </span></span></sup><span data-dcnode-id="8140" instrument_node=""> Laws concerning the loss of female virginity have no male equivalent. Women in biblical times depended on men economically. Women had the right to own property jointly with their husbands, except in the rare case of inheriting land from a father who didn't bear sons. Even "in such cases, women would be required to remarry within the tribe so as not to reduce its land holdings."</span><sup class="reference" data-dcnode-id="8137" id="cite_ref-HauptmanEtz_43-2"><a data-dcnode-id="8138" href="#cite_note-HauptmanEtz-43"><span data-dcnode-id="8139" instrument_node="">[43]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8134"><span data-dcnode-id="8135" title="Page / location: 171"><span data-dcnode-id="8136" instrument_node="">: 171 </span></span></sup><span data-dcnode-id="8133" instrument_node=""> Property was transferred through the male line and women could not inherit unless there were no male heirs (Numbers 27:1-11; 36:1-12).</span><sup class="reference" data-dcnode-id="8130" id="cite_ref-Davies1_36-1"><a data-dcnode-id="8131" href="#cite_note-Davies1-36"><span data-dcnode-id="8132" instrument_node="">[36]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8127"><span data-dcnode-id="8128" title="Page / location: 3"><span data-dcnode-id="8129" instrument_node="">: 3 </span></span></sup><span data-dcnode-id="8126" instrument_node=""> These and other gender-based differences found in the Torah suggest that women were seen as subordinate to men; however, they also suggest that biblical society viewed continuity, property, and family unity as paramount.</span><sup class="reference" data-dcnode-id="8123" id="cite_ref-HauptmanEtz_43-3"><a data-dcnode-id="8124" href="#cite_note-HauptmanEtz-43"><span data-dcnode-id="8125" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8122" instrument_node="">
</span></p><p data-dcnode-id="8080"><span data-dcnode-id="8120" instrument_node="">Philosopher Michael Berger says, the rural family was the backbone of biblical society. Women did tasks as important as those of men, managed their households, and were equals in daily life, but all public decisions were made by men. Men had specific obligations they were required to perform for their wives including the provision of clothing, food, and sexual relations.</span><sup class="reference" data-dcnode-id="8117" id="cite_ref-45"><a data-dcnode-id="8118" href="#cite_note-45"><span data-dcnode-id="8119" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8116" instrument_node=""> Ancient Israel was a frontier and life was "tough." Everyone was a "small holder" and had to work hard to survive. A large percentage of children died early, and those that survived, learned to share the burdens and responsibilities of family life as they grew.  The marginal environment required a strict authority structure: parents had to not just be honored but not be challenged.  Ungovernable children, especially adult children, had to be kept in line or eliminated. Respect for the dead was obligatory, and sexual lines were rigidly drawn. Virginity was expected, adultery the worst of crimes, and even suspicion of adultery led to trial by ordeal.</span><sup class="reference" data-dcnode-id="8113" id="cite_ref-Berger_46-0"><a data-dcnode-id="8114" href="#cite_note-Berger-46"><span data-dcnode-id="8115" instrument_node="">[46]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8110"><span data-dcnode-id="8111" title="Page / location: 1, 2"><span data-dcnode-id="8112" instrument_node="">: 1, 2 </span></span></sup><span data-dcnode-id="8109" instrument_node=""> Adultery was defined differently for men than for women: a woman was an adulteress if she had sexual relations outside her marriage, but if a man had sexual relations outside his marriage with an unmarried woman, a concubine or a prostitute, it was not considered adultery on his part.</span><sup class="reference" data-dcnode-id="8106" id="cite_ref-Davies1_36-2"><a data-dcnode-id="8107" href="#cite_note-Davies1-36"><span data-dcnode-id="8108" instrument_node="">[36]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8103"><span data-dcnode-id="8104" title="Page / location: 3"><span data-dcnode-id="8105" instrument_node="">: 3 </span></span></sup><span data-dcnode-id="8102" instrument_node=""> A woman was considered "owned by a master."</span><sup class="reference" data-dcnode-id="8099" id="cite_ref-Blumenthal_11-4"><a data-dcnode-id="8100" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8101" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8096"><span data-dcnode-id="8097" title="Page / location: 20, 21"><span data-dcnode-id="8098" instrument_node="">: 20, 21 </span></span></sup><span data-dcnode-id="8095" instrument_node="">  A woman was always under the authority of a man: her father, her brothers, her husband, and since she did not inherit, eventually her eldest son.</span><sup class="reference" data-dcnode-id="8092" id="cite_ref-Berger_46-1"><a data-dcnode-id="8093" href="#cite_note-Berger-46"><span data-dcnode-id="8094" instrument_node="">[46]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8089"><span data-dcnode-id="8090" title="Page / location: 1, 2"><span data-dcnode-id="8091" instrument_node="">: 1, 2 </span></span></sup><span data-dcnode-id="8088" instrument_node=""> She was subject to strict purity laws, both ritual and moral, and non-conforming sex—homosexuality, bestiality, cross-dressing and masturbation—was punished. Stringent protection of the marital bond and loyalty to kin was very strong.</span><sup class="reference" data-dcnode-id="8085" id="cite_ref-Berger_46-2"><a data-dcnode-id="8086" href="#cite_note-Berger-46"><span data-dcnode-id="8087" instrument_node="">[46]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8082"><span data-dcnode-id="8083" title="Page / location: 20"><span data-dcnode-id="8084" instrument_node="">: 20 </span></span></sup><span data-dcnode-id="8081" instrument_node="">
</span></p><p data-dcnode-id="8025"><span data-dcnode-id="8079" instrument_node="">The </span><i data-dcnode-id="8076"><a class="mw-redirect" data-dcnode-id="8077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zonah" title="Zonah"><span data-dcnode-id="8078" instrument_node="">zonah</span></a></i><span data-dcnode-id="8075" instrument_node=""> of the Hebrew Bible is a woman who is not under the authority of a man; she may be a paid prostitute, but not necessarily. In the Bible, for a woman or girl who was under the protection of a man to be called a "</span><i data-dcnode-id="8073"><span data-dcnode-id="8074" instrument_node="">zonah</span></i><span data-dcnode-id="8072" instrument_node="">" was a grave insult to her and her family. The </span><i data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">zonah</span></i><span data-dcnode-id="8069" instrument_node=""> is shown as lacking protection, making each </span><i data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">zonah</span></i><span data-dcnode-id="8066" instrument_node=""> vulnerable and available to other men; the lack of a specific man governing her meant that she was free to act in ways that other women weren't. According to David Blumenthal, the Bible depicts the </span><i data-dcnode-id="8064"><span data-dcnode-id="8065" instrument_node="">zonah</span></i><span data-dcnode-id="8063" instrument_node=""> as "dangerous, fearsome and threatening by her freedom, and yet appealing and attractive at the same time."</span><sup class="reference" data-dcnode-id="8060" id="cite_ref-Blumenthal_11-5"><a data-dcnode-id="8061" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8062" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8057"><span data-dcnode-id="8058" title="Page / location: 42"><span data-dcnode-id="8059" instrument_node="">: 42 </span></span></sup><span data-dcnode-id="8056" instrument_node="">  Her freedom is recognized by biblical law and her sexual activity is not punishable.</span><sup class="reference" data-dcnode-id="8053" id="cite_ref-Blumenthal_11-6"><a data-dcnode-id="8054" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8055" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8050"><span data-dcnode-id="8051" title="Page / location: 42"><span data-dcnode-id="8052" instrument_node="">: 42 </span></span></sup><span data-dcnode-id="8049" instrument_node=""> She is the source of extra-institutional sex. Therefore, she is seen as a threat to patriarchy and the family structure it supports.</span><sup class="reference" data-dcnode-id="8046" id="cite_ref-Blumenthal_11-7"><a data-dcnode-id="8047" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8048" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8043"><span data-dcnode-id="8044" title="Page / location: 43"><span data-dcnode-id="8045" instrument_node="">: 43 </span></span></sup><span data-dcnode-id="8042" instrument_node=""> Over time, the term "</span><i data-dcnode-id="8040"><span data-dcnode-id="8041" instrument_node="">zonah</span></i><span data-dcnode-id="8039" instrument_node="">" came to be applied to a married woman who committed adultery, and that sense of the term was used as a metaphor for the Jewish people being unfaithful to Yahweh, especially in the </span><a data-dcnode-id="8037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Hosea" title="Book of Hosea"><span data-dcnode-id="8038" instrument_node="">Book of Hosea</span></a><span data-dcnode-id="8036" instrument_node=""> and the </span><a data-dcnode-id="8034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Ezekiel" title="Book of Ezekiel"><span data-dcnode-id="8035" instrument_node="">Book of Ezekiel</span></a><span data-dcnode-id="8033" instrument_node="">, where the descriptions of sexual acts and punishments are both brutal and pornographic.</span><sup class="reference" data-dcnode-id="8030" id="cite_ref-Blumenthal_11-8"><a data-dcnode-id="8031" href="#cite_note-Blumenthal-11"><span data-dcnode-id="8032" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8027"><span data-dcnode-id="8028" title="Page / location: 43"><span data-dcnode-id="8029" instrument_node="">: 43 </span></span></sup><span data-dcnode-id="8026" instrument_node="">
</span></p><span data-dcnode-id="8024" instrument_node="">
</span><h4 data-dcnode-id="8014"><span class="mw-headline" data-dcnode-id="8022" id="Hagar_and_Sarah"><span data-dcnode-id="8023" instrument_node="">Hagar and Sarah</span></span><span class="mw-editsection" data-dcnode-id="8015"><span class="mw-editsection-bracket" data-dcnode-id="8020"><span data-dcnode-id="8021" instrument_node="">[</span></span><a data-dcnode-id="8018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D6" title="Edit section: Hagar and Sarah"><span data-dcnode-id="8019" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8016"><span data-dcnode-id="8017" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8013" instrument_node="">
</span><link data-dcnode-id="8012" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8005" role="note"><span data-dcnode-id="8011" instrument_node="">Main articles: </span><a data-dcnode-id="8009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagar" title="Hagar"><span data-dcnode-id="8010" instrument_node="">Hagar</span></a><span data-dcnode-id="8008" instrument_node=""> and </span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah" title="Sarah"><span data-dcnode-id="8007" instrument_node="">Sarah</span></a></div><span data-dcnode-id="8004" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7990"><div class="thumbinner" data-dcnode-id="7991" style="width:182px;"><a class="image" data-dcnode-id="8002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHolman_Hagar_and_Ishmael_cast_out.jpg"><img alt="" class="thumbimage" data-dcnode-id="8003" data-file-height="1592" data-file-width="1084" decoding="async" height="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/87/Holman_Hagar_and_Ishmael_cast_out.jpg/180px-Holman_Hagar_and_Ishmael_cast_out.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/87/Holman_Hagar_and_Ishmael_cast_out.jpg/270px-Holman_Hagar_and_Ishmael_cast_out.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/87/Holman_Hagar_and_Ishmael_cast_out.jpg/360px-Holman_Hagar_and_Ishmael_cast_out.jpg 2x" width="180"></a><span data-dcnode-id="8001" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7992"><div class="magnify" data-dcnode-id="7999"><a class="internal" data-dcnode-id="8000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHolman_Hagar_and_Ishmael_cast_out.jpg" title="Enlarge"></a></div><a data-dcnode-id="7997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagar" title="Hagar"><span data-dcnode-id="7998" instrument_node="">Hagar</span></a><span data-dcnode-id="7996" instrument_node=""> and </span><a data-dcnode-id="7994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ishmael" title="Ishmael"><span data-dcnode-id="7995" instrument_node="">Ishmael</span></a><span data-dcnode-id="7993" instrument_node=""> cast out, 1890 illustration</span></div></div></div><span data-dcnode-id="7989" instrument_node="">
</span><p data-dcnode-id="7956"><a data-dcnode-id="7987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abraham" title="Abraham"><span data-dcnode-id="7988" instrument_node="">Abraham</span></a><span data-dcnode-id="7986" instrument_node=""> is an important figure in the Bible, yet "his story pivots on two women."</span><sup class="reference" data-dcnode-id="7983" id="cite_ref-Trible1973depat_34-1"><a data-dcnode-id="7984" href="#cite_note-Trible1973depat-34"><span data-dcnode-id="7985" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="7980" id="cite_ref-Trible1984terror_35-1"><a data-dcnode-id="7981" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7982" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7977"><span data-dcnode-id="7978" title="Page / location: 9"><span data-dcnode-id="7979" instrument_node="">: 9 </span></span></sup><span data-dcnode-id="7976" instrument_node=""> Sarah was Abraham's wife and Hagar was Sarah's personal slave who became Abraham's concubine. Sarah is introduced in the Bible with only her name and that she is "barren" and without child. She had borne no children though God had promised them a child. Sarah is the first of barren women introduced, and the theme of infertility remains present throughout the matriarch narratives (Genesis 11:30, 25:21; 30:1-2).</span><sup class="reference" data-dcnode-id="7973" id="cite_ref-Review_&amp;_Expositor_47-0"><a data-dcnode-id="7974" href="#cite_note-Review_&amp;_Expositor-47"><span data-dcnode-id="7975" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7972" instrument_node=""> Later in the story Sarah overhears God's promise that she is to bear a child, and she does not believe it. "Abraham and Sarah were already very old, and Sarah was past the age of childbearing. Sarah laughed to herself as she thought, “After I am worn out and my lord is old, will I now have this pleasure?” (Genesis 18:10-15). Sarah's response to God's promise could imply different interpretations including the lack of Abraham's sexual response to Sarah, Sarah's emotional numbness due to infertility has put her in disbelief, or more traditionally, Sarah is relieved, and God has brought "joy out of sorrow through the birth of Issac".</span><sup class="reference" data-dcnode-id="7969" id="cite_ref-Review_&amp;_Expositor_47-1"><a data-dcnode-id="7970" href="#cite_note-Review_&amp;_Expositor-47"><span data-dcnode-id="7971" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7968" instrument_node=""> Later on, Sarah relies on her beauty and gives her slave Hagar to Abraham as a concubine. Abraham then has sexual relations with her and Hagar becomes pregnant.</span><sup class="reference" data-dcnode-id="7965" id="cite_ref-jstor.org_48-0"><a data-dcnode-id="7966" href="#cite_note-jstor.org-48"><span data-dcnode-id="7967" instrument_node="">[48]</span></a></sup><span data-dcnode-id="7964" instrument_node=""> Sarah hopes to build a family through Hagar, but Hagar "began to despise her mistress" (Genesis 16:4). The text suggests that Sarah had made a mistake which could have been avoidable if she had a strong maternal presence to guide her.</span><sup class="reference" data-dcnode-id="7961" id="cite_ref-jstor.org_48-1"><a data-dcnode-id="7962" href="#cite_note-jstor.org-48"><span data-dcnode-id="7963" instrument_node="">[48]</span></a></sup><span data-dcnode-id="7960" instrument_node=""> Then Sarah mistreated Hagar, who fled. God spoke to the slave Hagar in the desert, sent her home, and she bore Abraham a son, </span><a data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ishmael" title="Ishmael"><span data-dcnode-id="7959" instrument_node="">Ishmael</span></a><span data-dcnode-id="7957" instrument_node="">, "a wild donkey of a man" (Genesis 16:12).
</span></p><p data-dcnode-id="7944"><span data-dcnode-id="7955" instrument_node="">When Ishmael was 13, Abraham received the covenant practice of circumcision, and circumcised every male of his household. Sarah became pregnant and bore a son that they named Isaac when Abraham was a hundred years old. When Isaac was eight days old, Abraham circumcised him as well. Hagar and Ishmael are sent away again, and this time they do not return (Genesis 21:1-5). Frymer-Kensky says "This story starkly illuminates the relations between </span><i data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">women</span></i><span data-dcnode-id="7952" instrument_node=""> in a patriarchy." She adds that it demonstrates the problems associated with gender intersecting with the disadvantages of class: Sarah has the power, her actions are legal, not compassionate, but her motives are clear: "she [Sarah] is vulnerable, making her incapable of compassion toward her social inferior."</span><sup class="reference" data-dcnode-id="7949" id="cite_ref-Frymer-Kensky2002_49-0"><a data-dcnode-id="7950" href="#cite_note-Frymer-Kensky2002-49"><span data-dcnode-id="7951" instrument_node="">[49]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7946"><span data-dcnode-id="7947" title="Page / location: 98"><span data-dcnode-id="7948" instrument_node="">: 98 </span></span></sup><span data-dcnode-id="7945" instrument_node="">
</span></p><span data-dcnode-id="7943" instrument_node="">
</span><h4 data-dcnode-id="7932"><span data-dcnode-id="7942" id="Lot.27s_daughters"></span><span class="mw-headline" data-dcnode-id="7940" id="Lot's_daughters"><span data-dcnode-id="7941" instrument_node="">Lot's daughters</span></span><span class="mw-editsection" data-dcnode-id="7933"><span class="mw-editsection-bracket" data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">[</span></span><a data-dcnode-id="7936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D7" title="Edit section: Lot's daughters"><span data-dcnode-id="7937" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7931" instrument_node="">
</span><link data-dcnode-id="7930" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7926" role="note"><span data-dcnode-id="7929" instrument_node="">Main article: </span><a data-dcnode-id="7927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lot%2527s_daughters" title="Lot's daughters"><span data-dcnode-id="7928" instrument_node="">Lot's daughters</span></a></div><span data-dcnode-id="7925" instrument_node="">
</span><p data-dcnode-id="7907"><span data-dcnode-id="7924" instrument_node="">Genesis 19 narrates that </span><a data-dcnode-id="7922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lot_%28biblical_person%29" title="Lot (biblical person)"><span data-dcnode-id="7923" instrument_node="">Lot</span></a><span data-dcnode-id="7921" instrument_node=""> and his two daughters live in Sodom, and are visited by two angels. A mob gathers, and Lot offers them his daughters to protect the angels, but the angels intervene. </span><a data-dcnode-id="7919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sodom_and_Gomorrah" title="Sodom and Gomorrah"><span data-dcnode-id="7920" instrument_node="">Sodom is destroyed</span></a><span data-dcnode-id="7918" instrument_node="">, and the family goes to live in a cave. Since there are no men around except Lot, the daughters decide to make him drink wine and have him unknowingly impregnate them. They each have a son, </span><a data-dcnode-id="7916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moab%23Biblical_and_other_narratives" title="Moab"><span data-dcnode-id="7917" instrument_node="">Moab</span></a><span data-dcnode-id="7915" instrument_node=""> and </span><a data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ammon%23Biblical_account" title="Ammon"><span data-dcnode-id="7914" instrument_node="">Ben-Ammi</span></a><span data-dcnode-id="7912" instrument_node="">.</span><sup class="reference" data-dcnode-id="7909" id="cite_ref-50"><a data-dcnode-id="7910" href="#cite_note-50"><span data-dcnode-id="7911" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7908" instrument_node="">
</span></p><span data-dcnode-id="7906" instrument_node="">
</span><h4 data-dcnode-id="7896"><span class="mw-headline" data-dcnode-id="7904" id="Additional_women_in_Genesis_and_Exodus"><span data-dcnode-id="7905" instrument_node="">Additional women in Genesis and Exodus</span></span><span class="mw-editsection" data-dcnode-id="7897"><span class="mw-editsection-bracket" data-dcnode-id="7902"><span data-dcnode-id="7903" instrument_node="">[</span></span><a data-dcnode-id="7900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D8" title="Edit section: Additional women in Genesis and Exodus"><span data-dcnode-id="7901" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7898"><span data-dcnode-id="7899" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7895" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7880"><div class="thumbinner" data-dcnode-id="7881" style="width:222px;"><a class="image" data-dcnode-id="7893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg"><img alt="" class="thumbimage" data-dcnode-id="7894" data-file-height="1920" data-file-width="1731" decoding="async" height="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Jacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg/220px-Jacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Jacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg/330px-Jacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Jacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg/440px-Jacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg 2x" width="220"></a><span data-dcnode-id="7892" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7882"><div class="magnify" data-dcnode-id="7890"><a class="internal" data-dcnode-id="7891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJacob_Jordaens_-_Moses_and_his_Ethiopian_wife_Sephora.jpg" title="Enlarge"></a></div><i data-dcnode-id="7887"><a data-dcnode-id="7888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses_and_his_Ethiopian_wife_Zipporah" title="Moses and his Ethiopian wife Zipporah"><span data-dcnode-id="7889" instrument_node="">Moses and his Ethiopian wife Zipporah (Mozes en zijn Ethiopische vrouw Sippora)</span></a></i><span data-dcnode-id="7886" instrument_node="">. </span><a data-dcnode-id="7884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Jordaens" title="Jacob Jordaens"><span data-dcnode-id="7885" instrument_node="">Jacob Jordaens</span></a><span data-dcnode-id="7883" instrument_node="">, c. 1650</span></div></div></div><span data-dcnode-id="7879" instrument_node="">
</span><p data-dcnode-id="7842"><a class="mw-redirect" data-dcnode-id="7877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Potiphar%2527s_Wife" title="Potiphar's Wife"><span data-dcnode-id="7878" instrument_node="">Potiphar's Wife</span></a><span data-dcnode-id="7876" instrument_node="">, whose false accusations of </span><a data-dcnode-id="7874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_%28Genesis%29" title="Joseph (Genesis)"><span data-dcnode-id="7875" instrument_node="">Joseph</span></a><span data-dcnode-id="7873" instrument_node=""> leads to his imprisonment. </span><a class="mw-redirect" data-dcnode-id="7871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bithiah" title="Bithiah"><span data-dcnode-id="7872" instrument_node="">Pharaoh's Daughter</span></a><span data-dcnode-id="7870" instrument_node="">, who rescues and cares for the infant </span><a data-dcnode-id="7868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="7869" instrument_node="">Moses</span></a><span data-dcnode-id="7867" instrument_node="">. </span><a data-dcnode-id="7865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiphrah_and_Puah" title="Shiphrah and Puah"><span data-dcnode-id="7866" instrument_node="">Shiphrah and Puah</span></a><span data-dcnode-id="7864" instrument_node="">, two Hebrew midwives who disobey </span><a data-dcnode-id="7862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaohs_in_the_Bible%23In_the_Book_of_Exodus" title="Pharaohs in the Bible"><span data-dcnode-id="7863" instrument_node="">Pharao</span></a><span data-dcnode-id="7861" instrument_node="">'s command to kill all newborn Hebrew boys. God favors them for this. Moses' wife </span><a data-dcnode-id="7859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zipporah" title="Zipporah"><span data-dcnode-id="7860" instrument_node="">Zipporah</span></a><span data-dcnode-id="7858" instrument_node="">, who saves his life when </span><a data-dcnode-id="7856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zipporah_at_the_inn" title="Zipporah at the inn"><span data-dcnode-id="7857" instrument_node="">God intends to kill him</span></a><span data-dcnode-id="7855" instrument_node="">. </span><a data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miriam" title="Miriam"><span data-dcnode-id="7854" instrument_node="">Miriam</span></a><span data-dcnode-id="7852" instrument_node="">, Moses' sister, a prophetess. </span><a data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cozbi" title="Cozbi"><span data-dcnode-id="7851" instrument_node="">Cozbi</span></a><span data-dcnode-id="7849" instrument_node="">, a woman slain by </span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phinehas" title="Phinehas"><span data-dcnode-id="7848" instrument_node="">Phinehas</span></a><span data-dcnode-id="7846" instrument_node=""> shortly before the </span><a class="mw-redirect" data-dcnode-id="7844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midian_war" title="Midian war"><span data-dcnode-id="7845" instrument_node="">Midian war</span></a><span data-dcnode-id="7843" instrument_node="">.
</span></p><span data-dcnode-id="7841" instrument_node="">
</span><h4 data-dcnode-id="7831"><span class="mw-headline" data-dcnode-id="7839" id="Rahab"><span data-dcnode-id="7840" instrument_node="">Rahab</span></span><span class="mw-editsection" data-dcnode-id="7832"><span class="mw-editsection-bracket" data-dcnode-id="7837"><span data-dcnode-id="7838" instrument_node="">[</span></span><a data-dcnode-id="7835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D9" title="Edit section: Rahab"><span data-dcnode-id="7836" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7830" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7819"><div class="thumbinner" data-dcnode-id="7820" style="width:222px;"><a class="image" data-dcnode-id="7828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARahab_and_the_Emissaries_of_Joshua.jpg"><img alt="" class="thumbimage" data-dcnode-id="7829" data-file-height="858" data-file-width="1000" decoding="async" height="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Rahab_and_the_Emissaries_of_Joshua.jpg/220px-Rahab_and_the_Emissaries_of_Joshua.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Rahab_and_the_Emissaries_of_Joshua.jpg/330px-Rahab_and_the_Emissaries_of_Joshua.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Rahab_and_the_Emissaries_of_Joshua.jpg/440px-Rahab_and_the_Emissaries_of_Joshua.jpg 2x" width="220"></a><span data-dcnode-id="7827" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7821"><div class="magnify" data-dcnode-id="7825"><a class="internal" data-dcnode-id="7826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARahab_and_the_Emissaries_of_Joshua.jpg" title="Enlarge"></a></div><i data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">Rahab and the Emissaries of Joshua</span></i><span data-dcnode-id="7822" instrument_node="">, 17th century</span></div></div></div><span data-dcnode-id="7818" instrument_node="">
</span><link data-dcnode-id="7817" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7813" role="note"><span data-dcnode-id="7816" instrument_node="">Main article: </span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rahab" title="Rahab"><span data-dcnode-id="7815" instrument_node="">Rahab</span></a></div><span data-dcnode-id="7812" instrument_node="">
</span><p data-dcnode-id="7804"><span data-dcnode-id="7811" instrument_node="">The book of Joshua tells the story of Rahab the prostitute (zonah), a resident of Jericho, who houses two spies sent by </span><a data-dcnode-id="7809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joshua" title="Joshua"><span data-dcnode-id="7810" instrument_node="">Joshua</span></a><span data-dcnode-id="7808" instrument_node=""> to prepare for an </span><a data-dcnode-id="7806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Jericho" title="Battle of Jericho"><span data-dcnode-id="7807" instrument_node="">attack on the city</span></a><span data-dcnode-id="7805" instrument_node="">. The king of Jericho knew the spies were there and sent soldiers to her house to capture them, but she hid them, sent the soldiers off in misdirection, and lied to the King on their behalf.  She said to the spies, "I know that the Lord has given you this land and that a great fear of you has fallen on us, so that all who live in this country are melting in fear because of you. We have heard how the Lord dried up the water of the Red Sea for you when you came out of Egypt, and what you did to Sihon and Og, the two kings of the Amorites east of the Jordan, whom you completely destroyed. When we heard of it, our hearts melted in fear and everyone’s courage failed because of you, for the Lord your God is God in heaven above and on the earth below.  Now then, please swear to me by the Lord that you will show kindness to my family, because I have shown kindness to you. Give me a sure sign that you will spare the lives of my father and mother, my brothers and sisters, and all who belong to them—and that you will save us from death.” (Joshua 2:9-13) She was told to tie a scarlet cord in the same window through which she helped the spies escape, and to have all her family in the house with her and not to go into the streets, and if she did not comply, their blood would be on their own heads. She did comply, and she and her whole family were saved before the city was captured and burned (Joshua 6).
</span></p><span data-dcnode-id="7803" instrument_node="">
</span><h4 data-dcnode-id="7793"><span class="mw-headline" data-dcnode-id="7801" id="Delilah"><span data-dcnode-id="7802" instrument_node="">Delilah</span></span><span class="mw-editsection" data-dcnode-id="7794"><span class="mw-editsection-bracket" data-dcnode-id="7799"><span data-dcnode-id="7800" instrument_node="">[</span></span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D10" title="Edit section: Delilah"><span data-dcnode-id="7798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7795"><span data-dcnode-id="7796" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7792" instrument_node="">
</span><link data-dcnode-id="7791" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7787" role="note"><span data-dcnode-id="7790" instrument_node="">Main article: </span><a data-dcnode-id="7788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delilah" title="Delilah"><span data-dcnode-id="7789" instrument_node="">Delilah</span></a></div><span data-dcnode-id="7786" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7773"><div class="thumbinner" data-dcnode-id="7774" style="width:262px;"><a class="image" data-dcnode-id="7784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASamson_and_Delilah_film_still.JPG"><img alt="" class="thumbimage" data-dcnode-id="7785" data-file-height="556" data-file-width="717" decoding="async" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Samson_and_Delilah_film_still.JPG/260px-Samson_and_Delilah_film_still.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Samson_and_Delilah_film_still.JPG/390px-Samson_and_Delilah_film_still.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/90/Samson_and_Delilah_film_still.JPG/520px-Samson_and_Delilah_film_still.JPG 2x" width="260"></a><span data-dcnode-id="7783" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7775"><div class="magnify" data-dcnode-id="7781"><a class="internal" data-dcnode-id="7782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASamson_and_Delilah_film_still.JPG" title="Enlarge"></a></div><span data-dcnode-id="7780" instrument_node="">Still photo from </span><i data-dcnode-id="7777"><a data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samson_and_Delilah_%281949_film%29" title="Samson and Delilah (1949 film)"><span data-dcnode-id="7779" instrument_node="">Samson and Delilah</span></a></i><span data-dcnode-id="7776" instrument_node=""> (1949)</span></div></div></div><span data-dcnode-id="7772" instrument_node="">
</span><p data-dcnode-id="7756"><span data-dcnode-id="7771" instrument_node="">Judges chapters 13 to 16 tell the story of </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samson" title="Samson"><span data-dcnode-id="7770" instrument_node="">Samson</span></a><span data-dcnode-id="7768" instrument_node=""> who meets Delilah and his end in chapter 16. Samson was a </span><a class="mw-redirect" data-dcnode-id="7766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazarite" title="Nazarite"><span data-dcnode-id="7767" instrument_node="">Nazarite</span></a><span data-dcnode-id="7765" instrument_node="">, a specially dedicated individual, from birth, yet his story indicates he violated every requirement of the Nazarite vow.</span><sup class="reference" data-dcnode-id="7762" id="cite_ref-51"><a data-dcnode-id="7763" href="#cite_note-51"><span data-dcnode-id="7764" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7761" instrument_node=""> Long hair was only one of the symbolic representations of his special relationship with God, and it was the last one that Samson violated. Nathan MacDonald explains that touching the carcass of the lion and Samson's celebration of his wedding to a Philistine can be seen as the initial steps that led to his end.</span><sup class="reference" data-dcnode-id="7758" id="cite_ref-52"><a data-dcnode-id="7759" href="#cite_note-52"><span data-dcnode-id="7760" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7757" instrument_node=""> Samson travels to Gaza and "fell in love with a woman in the Valley of Sorek whose name was Delilah. The rulers of the Philistines went to her and said, “See if you can lure him into showing you the secret of his great strength and how we can overpower him so we may tie him up and subdue him. Each one of us will give you eleven hundred shekels of silver.” Samson lies to her a couple of times then tells her the truth. "Then the Philistines seized him, gouged out his eyes and took him down to Gaza. Binding him with bronze shackles, they set him to grinding grain in the prison. But the hair on his head began to grow again after it had been shaved."
</span></p><p data-dcnode-id="7754"><span data-dcnode-id="7755" instrument_node="">"Now the rulers of the Philistines assembled to offer a great sacrifice to Dagon their god and to celebrate, saying, “Our god has delivered Samson, our enemy, into our hands.” And they brought Samson out to entertain each other. But Samson prayed, "O Lord, remember me" and he pushed the columns holding up the Temple and killed everyone there.
</span></p><p data-dcnode-id="7745"><span data-dcnode-id="7753" instrument_node="">The story does not call Delilah a Philistine. The valley of Sorek was Danite territory that had been overrun by Philistines, so the population there would have been mixed. Delilah was likely an Israelite or the story would have said otherwise.  The Philistines offered Delilah an enormous sum of money to betray Samson. Art has generally portrayed Delilah as a type of femme fatale, but the biblical term used (pattî) means to persuade with words. Delilah uses emotional blackmail and Samson's genuine love for her to betray him. No other Hebrew biblical hero is ever defeated by an Israelite woman. Samson does not suspect, perhaps because he cannot think of a woman as dangerous, but Delilah is determined, bold and very dangerous indeed. The entire Philistine army could not bring him down. Delilah did, but it was Samson himself who made that possible.</span><sup class="reference" data-dcnode-id="7750" id="cite_ref-Tykva_Frymer-Kensky_37-4"><a data-dcnode-id="7751" href="#cite_note-Tykva_Frymer-Kensky-37"><span data-dcnode-id="7752" instrument_node="">[37]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7747"><span data-dcnode-id="7748" title="Page / location: 79–85"><span data-dcnode-id="7749" instrument_node="">: 79–85 </span></span></sup><span data-dcnode-id="7746" instrument_node="">
</span></p><span data-dcnode-id="7744" instrument_node="">
</span><h4 data-dcnode-id="7733"><span data-dcnode-id="7743" id="The_Levite.27s_concubine"></span><span class="mw-headline" data-dcnode-id="7741" id="The_Levite's_concubine"><span data-dcnode-id="7742" instrument_node="">The Levite's concubine</span></span><span class="mw-editsection" data-dcnode-id="7734"><span class="mw-editsection-bracket" data-dcnode-id="7739"><span data-dcnode-id="7740" instrument_node="">[</span></span><a data-dcnode-id="7737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D11" title="Edit section: The Levite's concubine"><span data-dcnode-id="7738" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7735"><span data-dcnode-id="7736" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7732" instrument_node="">
</span><link data-dcnode-id="7731" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7727" role="note"><span data-dcnode-id="7730" instrument_node="">Main article: </span><a data-dcnode-id="7728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Levite%2527s_concubine" title="Levite's concubine"><span data-dcnode-id="7729" instrument_node="">Levite's concubine</span></a></div><span data-dcnode-id="7726" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7714"><div class="thumbinner" data-dcnode-id="7715" style="width:312px;"><a class="image" data-dcnode-id="7724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Levite_finds_his_concubine_lying_on_the_doorstep%2C_James_Tissot.jpg"><img alt="" class="thumbimage" data-dcnode-id="7725" data-file-height="355" data-file-width="541" decoding="async" height="203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/The_Levite_finds_his_concubine_lying_on_the_doorstep%252C_James_Tissot.jpg/310px-The_Levite_finds_his_concubine_lying_on_the_doorstep%252C_James_Tissot.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/The_Levite_finds_his_concubine_lying_on_the_doorstep%2C_James_Tissot.jpg/465px-The_Levite_finds_his_concubine_lying_on_the_doorstep%2C_James_Tissot.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/c/c7/The_Levite_finds_his_concubine_lying_on_the_doorstep%2C_James_Tissot.jpg 2x" width="310"></a><span data-dcnode-id="7723" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7716"><div class="magnify" data-dcnode-id="7721"><a class="internal" data-dcnode-id="7722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Levite_finds_his_concubine_lying_on_the_doorstep%2C_James_Tissot.jpg" title="Enlarge"></a></div><span data-dcnode-id="7720" instrument_node="">The Levite finds his concubine lying on the doorstep, </span><a data-dcnode-id="7718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Tissot" title="James Tissot"><span data-dcnode-id="7719" instrument_node="">James Tissot</span></a><span data-dcnode-id="7717" instrument_node="">, 19th century</span></div></div></div><span data-dcnode-id="7713" instrument_node="">
</span><p data-dcnode-id="7678"><span data-dcnode-id="7712" instrument_node="">The Levite's concubine in the book of Judges is "vulnerable as she is only a minor wife, a concubine".</span><sup class="reference" data-dcnode-id="7709" id="cite_ref-Frymer-Kensky2006_2-7"><a data-dcnode-id="7710" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="7711" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7706"><span data-dcnode-id="7707" title="Page / location: 173"><span data-dcnode-id="7708" instrument_node="">: 173 </span></span></sup><span data-dcnode-id="7705" instrument_node=""> She is one of the </span><a data-dcnode-id="7703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_names_for_the_biblical_nameless" title="List of names for the biblical nameless"><span data-dcnode-id="7704" instrument_node="">biblical nameless</span></a><span data-dcnode-id="7702" instrument_node="">.  Frymer-Kensky says this story is also an example of class intersecting with gender and power: when she is unhappy she runs home, only to have her father give her to another, the Levite.  The Levite and his concubine travel to a strange town where they are vulnerable because they travel alone without extended family to rescue them; strangers attack. To protect the Levite, his host offers his daughter to the mob and the Levite sends out his concubine.  Trible says "The story makes us realize that in those days men had ultimate powers of disposal over their women."</span><sup class="reference" data-dcnode-id="7699" id="cite_ref-Trible1984terror_35-2"><a data-dcnode-id="7700" href="#cite_note-Trible1984terror-35"><span data-dcnode-id="7701" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7696"><span data-dcnode-id="7697" title="Page / location: 65–89"><span data-dcnode-id="7698" instrument_node="">: 65–89 </span></span></sup><span data-dcnode-id="7695" instrument_node=""> Frymer-Kensky says the scene is similar to one in the </span><a data-dcnode-id="7693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sodom_and_Gomorrah" title="Sodom and Gomorrah"><span data-dcnode-id="7694" instrument_node="">Sodom and Gomorrah</span></a><span data-dcnode-id="7692" instrument_node=""> story when </span><a data-dcnode-id="7690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lot_%28biblical_person%29" title="Lot (biblical person)"><span data-dcnode-id="7691" instrument_node="">Lot</span></a><span data-dcnode-id="7689" instrument_node=""> sent </span><a data-dcnode-id="7687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lot%2527s_daughters" title="Lot's daughters"><span data-dcnode-id="7688" instrument_node="">his daughters</span></a><span data-dcnode-id="7686" instrument_node=""> to the mob, but in Genesis the angels save them, and in the book of Judges God is no longer intervening.  The concubine is raped to death.</span><sup class="reference" data-dcnode-id="7683" id="cite_ref-Frymer-Kensky2006_2-8"><a data-dcnode-id="7684" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="7685" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7680"><span data-dcnode-id="7681" title="Page / location: 173"><span data-dcnode-id="7682" instrument_node="">: 173 </span></span></sup><span data-dcnode-id="7679" instrument_node="">
</span></p><p data-dcnode-id="7662"><span data-dcnode-id="7677" instrument_node="">The Levite butchers her body and uses it to rouse Israel against the </span><a data-dcnode-id="7675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_of_Benjamin" title="Tribe of Benjamin"><span data-dcnode-id="7676" instrument_node="">tribe of Benjamin</span></a><span data-dcnode-id="7674" instrument_node="">.  Civil war follows nearly wiping out an entire tribe. To resuscitate it, hundreds of women are captured and forced into marriage. Fryman-Kensky says, "Horror follows horror."</span><sup class="reference" data-dcnode-id="7671" id="cite_ref-Frymer-Kensky2006_2-9"><a data-dcnode-id="7672" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="7673" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7670" instrument_node=""> The narrator caps off the story with "in those days there was no king in Israel and every man did as he pleased." The decline of Israel is reflected in the violence against women that takes place when government fails and social upheaval occurs.</span><sup class="reference" data-dcnode-id="7667" id="cite_ref-CreachOxford_53-0"><a data-dcnode-id="7668" href="#cite_note-CreachOxford-53"><span data-dcnode-id="7669" instrument_node="">[53]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7664"><span data-dcnode-id="7665" title="Page / location: 14"><span data-dcnode-id="7666" instrument_node="">: 14 </span></span></sup><span data-dcnode-id="7663" instrument_node="">
</span></p><p data-dcnode-id="7629"><span data-dcnode-id="7661" instrument_node="">According to Old Testament scholar Jerome Creach, some feminist critiques of Judges say the Bible gives tacit approval to violence against women by not speaking out against these acts.</span><sup class="reference" data-dcnode-id="7658" id="cite_ref-CreachOxford_53-1"><a data-dcnode-id="7659" href="#cite_note-CreachOxford-53"><span data-dcnode-id="7660" instrument_node="">[53]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7655"><span data-dcnode-id="7656" title="Page / location: 14"><span data-dcnode-id="7657" instrument_node="">: 14 </span></span></sup><span data-dcnode-id="7654" instrument_node=""> Frymer-Kensky says leaving moral conclusions to the reader is a recognized method of writing called </span><i data-dcnode-id="7652"><span data-dcnode-id="7653" instrument_node="">gapping</span></i><span data-dcnode-id="7651" instrument_node=""> used in many Bible stories.</span><sup class="reference" data-dcnode-id="7648" id="cite_ref-Frymer-Kensky2006_2-10"><a data-dcnode-id="7649" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="7650" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7645"><span data-dcnode-id="7646" title="Page / location: 395"><span data-dcnode-id="7647" instrument_node="">: 395 </span></span></sup><span data-dcnode-id="7644" instrument_node="">  Biblical scholar </span><a data-dcnode-id="7642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Patrick_O%2527Connor" title="Michael Patrick O'Connor"><span data-dcnode-id="7643" instrument_node="">Michael Patrick O'Connor</span></a><span data-dcnode-id="7641" instrument_node=""> attributed acts of violence against women described in the </span><a data-dcnode-id="7639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Judges" title="Book of Judges"><span data-dcnode-id="7640" instrument_node="">Book of Judges</span></a><span data-dcnode-id="7638" instrument_node=""> to a period of crisis in the society of ancient Israel before the institution of kingship.</span><sup class="reference" data-dcnode-id="7635" id="cite_ref-OConnor1986_54-0"><a data-dcnode-id="7636" href="#cite_note-OConnor1986-54"><span data-dcnode-id="7637" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7634" instrument_node=""> Yet others have alleged such problems are innate to patriarchy.</span><sup class="reference" data-dcnode-id="7631" id="cite_ref-Trible1973depat_34-2"><a data-dcnode-id="7632" href="#cite_note-Trible1973depat-34"><span data-dcnode-id="7633" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7630" instrument_node="">
</span></p><span data-dcnode-id="7628" instrument_node="">
</span><h4 data-dcnode-id="7617"><span data-dcnode-id="7627" id="Tamar.2C_daughter-in-Law_of_Judah"></span><span class="mw-headline" data-dcnode-id="7625" id="Tamar,_daughter-in-Law_of_Judah"><span data-dcnode-id="7626" instrument_node="">Tamar, daughter-in-Law of Judah</span></span><span class="mw-editsection" data-dcnode-id="7618"><span class="mw-editsection-bracket" data-dcnode-id="7623"><span data-dcnode-id="7624" instrument_node="">[</span></span><a data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D12" title="Edit section: Tamar, daughter-in-Law of Judah"><span data-dcnode-id="7622" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7619"><span data-dcnode-id="7620" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7616" instrument_node="">
</span><link data-dcnode-id="7615" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7611" role="note"><span data-dcnode-id="7614" instrument_node="">Main article: </span><a data-dcnode-id="7612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tamar_%28Genesis%29" title="Tamar (Genesis)"><span data-dcnode-id="7613" instrument_node="">Tamar (Genesis)</span></a></div><span data-dcnode-id="7610" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7601"><div class="thumbinner" data-dcnode-id="7602" style="width:182px;"><a class="image" data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFigures_Judah_Gives_his_Signet%2C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg"><img alt="" class="thumbimage" data-dcnode-id="7609" data-file-height="1004" data-file-width="663" decoding="async" height="273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Figures_Judah_Gives_his_Signet%252C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg/180px-Figures_Judah_Gives_his_Signet%252C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Figures_Judah_Gives_his_Signet%2C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg/270px-Figures_Judah_Gives_his_Signet%2C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/Figures_Judah_Gives_his_Signet%2C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg/360px-Figures_Judah_Gives_his_Signet%2C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg 2x" width="180"></a><span data-dcnode-id="7607" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7603"><div class="magnify" data-dcnode-id="7605"><a class="internal" data-dcnode-id="7606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFigures_Judah_Gives_his_Signet%2C_Bracelets_and_Staff_in_Pledge_to_Tamar.jpg" title="Enlarge"></a></div><span data-dcnode-id="7604" instrument_node="">Judah Gives his Pledge to Tamar, 16th century illustration</span></div></div></div><span data-dcnode-id="7600" instrument_node="">
</span><p data-dcnode-id="7589"><span data-dcnode-id="7599" instrument_node="">In the Book of Genesis, Tamar is </span><a data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judah_%28son_of_Jacob%29" title="Judah (son of Jacob)"><span data-dcnode-id="7598" instrument_node="">Judah</span></a><span data-dcnode-id="7596" instrument_node="">'s daughter–in–law. She was married to Judah's son </span><a data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Er_%28biblical_person%29" title="Er (biblical person)"><span data-dcnode-id="7595" instrument_node="">Er</span></a><span data-dcnode-id="7593" instrument_node="">, but Er died, leaving Tamar childless. Under levirate law, Judah's next son, </span><a data-dcnode-id="7591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Onan" title="Onan"><span data-dcnode-id="7592" instrument_node="">Onan</span></a><span data-dcnode-id="7590" instrument_node="">, was told to have sex with Tamar and give her a child, but when Onan slept with her, he "spilled his seed on the ground" rather than give her a child that would belong to his brother. Then Onan died too. "Judah then said to his daughter-in-law Tamar, 'Live as a widow in your father’s household until my son Shelah grows up.' For he thought, 'He may die too, just like his brothers'." (Genesis 38:11) But when Shelah grew up, she was not given to him as his wife. One day Judah travels to town (Timnah) to shear his sheep. Tamar "took off her widow’s clothes, covered herself with a veil to disguise herself, and then sat down at the entrance to Enaim, which is on the road to Timnah.  When Judah saw her, he thought she was a prostitute, for she had covered her face. Not realizing that she was his daughter-in-law, he went over to her by the roadside and said, 'Come now, let me sleep with you'."(Genesis 38:14) He said he would give her something in return and she asked for a pledge, accepting his staff and his seal with its cord as earnest of later payment. So Judah slept with her and she became pregnant. Then she went home and put on her widow's weeds again. Months later when it was discovered she was pregnant, she was accused of prostitution (zonah), and was set to be burned.  Instead, she sent Judah's pledge offerings to him saying "I am pregnant by the man who owns these." Judah recognized them and said, “She is more righteous than I, since I wouldn’t give her to my son Shelah.”
</span></p><span data-dcnode-id="7588" instrument_node="">
</span><h4 data-dcnode-id="7577"><span data-dcnode-id="7587" id="Jephthah.27s_daughter"></span><span class="mw-headline" data-dcnode-id="7585" id="Jephthah's_daughter"><span data-dcnode-id="7586" instrument_node="">Jephthah's daughter</span></span><span class="mw-editsection" data-dcnode-id="7578"><span class="mw-editsection-bracket" data-dcnode-id="7583"><span data-dcnode-id="7584" instrument_node="">[</span></span><a data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D13" title="Edit section: Jephthah's daughter"><span data-dcnode-id="7582" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7576" instrument_node="">
</span><link data-dcnode-id="7575" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7571" role="note"><span data-dcnode-id="7574" instrument_node="">Main article: </span><a data-dcnode-id="7572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jephthah%2527s_daughter" title="Jephthah's daughter"><span data-dcnode-id="7573" instrument_node="">Jephthah's daughter</span></a></div><span data-dcnode-id="7570" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7556"><div class="thumbinner" data-dcnode-id="7557" style="width:172px;"><a class="image" data-dcnode-id="7568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlexandre_Cabanel_-_The_Daughter_of_Jephthah_%281879%2C_Oil_on_canvas%29.JPG"><img alt="" class="thumbimage" data-dcnode-id="7569" data-file-height="1300" data-file-width="826" decoding="async" height="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/41/Alexandre_Cabanel_-_The_Daughter_of_Jephthah_%25281879%252C_Oil_on_canvas%2529.JPG/170px-Alexandre_Cabanel_-_The_Daughter_of_Jephthah_%25281879%252C_Oil_on_canvas%2529.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/41/Alexandre_Cabanel_-_The_Daughter_of_Jephthah_%281879%2C_Oil_on_canvas%29.JPG/255px-Alexandre_Cabanel_-_The_Daughter_of_Jephthah_%281879%2C_Oil_on_canvas%29.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/41/Alexandre_Cabanel_-_The_Daughter_of_Jephthah_%281879%2C_Oil_on_canvas%29.JPG/340px-Alexandre_Cabanel_-_The_Daughter_of_Jephthah_%281879%2C_Oil_on_canvas%29.JPG 2x" width="170"></a><span data-dcnode-id="7567" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7558"><div class="magnify" data-dcnode-id="7565"><a class="internal" data-dcnode-id="7566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlexandre_Cabanel_-_The_Daughter_of_Jephthah_%281879%2C_Oil_on_canvas%29.JPG" title="Enlarge"></a></div><i data-dcnode-id="7563"><span data-dcnode-id="7564" instrument_node="">The Daughter of Jephthah</span></i><span data-dcnode-id="7562" instrument_node="">, by </span><a data-dcnode-id="7560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexandre_Cabanel" title="Alexandre Cabanel"><span data-dcnode-id="7561" instrument_node="">Alexandre Cabanel</span></a><span data-dcnode-id="7559" instrument_node=""> (1879).</span></div></div></div><span data-dcnode-id="7555" instrument_node="">
</span><p data-dcnode-id="7543"><span data-dcnode-id="7554" instrument_node="">The story of </span><a data-dcnode-id="7552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jephthah" title="Jephthah"><span data-dcnode-id="7553" instrument_node="">Jephthah</span></a><span data-dcnode-id="7551" instrument_node="">'s daughter in Book of Judges begins as an archetypal biblical hagiography of a hero. Jephthah is the son of a marginal woman, a prostitute (zonah), and as such he is vulnerable.  He lives in his father's house, but when his father dies, his half-brothers reject him. According to Frymer-Kensky, "This is not right.  In the ancient Near East prostitutes could be hired as surrogate wombs as well as sex objects. Laws and contracts regulated the relationship between the child of such a prostitute and children of the first wife... he could not be disinherited. Jephthah has been wronged, but he has no recourse. He must leave home."  Frymer-Kensky says the author assumes the biblical audience is familiar with this, will know Jephthah has been wronged, and will be sympathetic to him.</span><sup class="reference" data-dcnode-id="7548" id="cite_ref-Frymer-Kensky2002_49-1"><a data-dcnode-id="7549" href="#cite_note-Frymer-Kensky2002-49"><span data-dcnode-id="7550" instrument_node="">[49]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7545"><span data-dcnode-id="7546" title="Page / location: 102–115"><span data-dcnode-id="7547" instrument_node="">: 102–115 </span></span></sup><span data-dcnode-id="7544" instrument_node="">
</span></p><p data-dcnode-id="7527"><span data-dcnode-id="7542" instrument_node="">Nevertheless, Jephthah goes out into the world and makes a name for himself as a mighty warrior—a hero of Israel. The threat of </span><a data-dcnode-id="7540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ammon%23Biblical_account" title="Ammon"><span data-dcnode-id="7541" instrument_node="">the Ammonites</span></a><span data-dcnode-id="7539" instrument_node=""> is grave. The brothers acknowledge their wrongdoing to gain his protection.  Frymer-Kensky says Jephthah's response reveals negotiation skills and deep piety. Then he attempts to negotiate peace with Ammon but fails.  War comes, with all of Israel vulnerable.  Before the battle he makes a battle vow: "If you give the Ammonites into my hand...the one who comes out of the doors of my house...I will offer to YHWH."  This turns out to be his daughter. Jephthah's reaction expresses his horror and sense of tragedy in three key expressions of mourning, utter defeat, and reproach. He reproaches her and himself, but foresees only his doom in either keeping or breaking his vow. Jephthah's daughter responds to his speech and she becomes a true heroine of this story. They are both good, yet tragedy happens.  Frymer-Kensky summarizes: "The vulnerable heroine is sacrificed, the hero's name is gone."</span><sup class="reference" data-dcnode-id="7536" id="cite_ref-Frymer-Kensky2002_49-2"><a data-dcnode-id="7537" href="#cite_note-Frymer-Kensky2002-49"><span data-dcnode-id="7538" instrument_node="">[49]</span></a></sup><span data-dcnode-id="7535" instrument_node="">  She adds, the author of the book of Judges knew people were sacrificing their children and the narrator of Judges is in opposition. "The horror is the very reason this story is in the book of Judges."</span><sup class="reference" data-dcnode-id="7532" id="cite_ref-Frymer-Kensky2002_49-3"><a data-dcnode-id="7533" href="#cite_note-Frymer-Kensky2002-49"><span data-dcnode-id="7534" instrument_node="">[49]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7529"><span data-dcnode-id="7530" title="Page / location: 115"><span data-dcnode-id="7531" instrument_node="">: 115 </span></span></sup><span data-dcnode-id="7528" instrument_node="">
</span></p><p data-dcnode-id="7515"><span data-dcnode-id="7526" instrument_node="">Some scholars have interpreted this story to mean that Jephthah's daughter was not actually sacrificed, but kept in seclusion.</span><sup class="reference" data-dcnode-id="7523" id="cite_ref-55"><a data-dcnode-id="7524" href="#cite_note-55"><span data-dcnode-id="7525" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="7520" id="cite_ref-56"><a data-dcnode-id="7521" href="#cite_note-56"><span data-dcnode-id="7522" instrument_node="">[56]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7517"><span data-dcnode-id="7518" title="Page / location: 137"><span data-dcnode-id="7519" instrument_node="">: 137 </span></span></sup><span data-dcnode-id="7516" instrument_node="">
</span></p><span data-dcnode-id="7514" instrument_node="">
