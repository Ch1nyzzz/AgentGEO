</span><h4 data-dcnode-id="6706"><span class="mw-headline" data-dcnode-id="6714" id="Huldah"><span data-dcnode-id="6715" instrument_node="">Huldah</span></span><span class="mw-editsection" data-dcnode-id="6707"><span class="mw-editsection-bracket" data-dcnode-id="6712"><span data-dcnode-id="6713" instrument_node="">[</span></span><a data-dcnode-id="6710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D25" title="Edit section: Huldah"><span data-dcnode-id="6711" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6705" instrument_node="">
</span><link data-dcnode-id="6704" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6700" role="note"><span data-dcnode-id="6703" instrument_node="">Main article: </span><a data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huldah" title="Huldah"><span data-dcnode-id="6702" instrument_node="">Huldah</span></a></div><span data-dcnode-id="6699" instrument_node="">
</span><p data-dcnode-id="6671"><span data-dcnode-id="6698" instrument_node="">2 Kings 22 shows it was not unusual for women to be prophetesses in ancient Israel even if they could not be priests.</span><sup class="reference" data-dcnode-id="6695" id="cite_ref-Frymer-Kensky2006_2-15"><a data-dcnode-id="6696" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="6697" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6692"><span data-dcnode-id="6693" title="Page / location: 167"><span data-dcnode-id="6694" instrument_node="">: 167 </span></span></sup><span data-dcnode-id="6691" instrument_node=""> </span><a data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josiah" title="Josiah"><span data-dcnode-id="6690" instrument_node="">Josiah</span></a><span data-dcnode-id="6688" instrument_node=""> the King was having the Temple repaired when the High Priest </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hilkiah" title="Hilkiah"><span data-dcnode-id="6687" instrument_node="">Hilkiah</span></a><span data-dcnode-id="6685" instrument_node=""> found the Book of the Law which had been lost. He gave it to </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shaphan" title="Shaphan"><span data-dcnode-id="6684" instrument_node="">Shaphan</span></a><span data-dcnode-id="6682" instrument_node="">, the king's scribe, who read it, then gave it to King Josiah.  The king tore his robes in distress and said "Go and inquire of the Lord for me ..."  So they went to the prophet </span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huldah" title="Huldah"><span data-dcnode-id="6681" instrument_node="">Huldah</span></a><span data-dcnode-id="6679" instrument_node="">, the wife of Shallum. The text does not comment on the fact this prophet was a woman, but says only that they took her answer back to the king (verse 20) thereby demonstrating there was nothing unusual in a female prophet.</span><sup class="reference" data-dcnode-id="6676" id="cite_ref-Frymer-Kensky2006_2-16"><a data-dcnode-id="6677" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="6678" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6673"><span data-dcnode-id="6674" title="Page / location: 161"><span data-dcnode-id="6675" instrument_node="">: 161 </span></span></sup><span data-dcnode-id="6672" instrument_node="">
</span></p><span data-dcnode-id="6670" instrument_node="">
</span><h4 data-dcnode-id="6660"><span class="mw-headline" data-dcnode-id="6668" id="Abigail"><span data-dcnode-id="6669" instrument_node="">Abigail</span></span><span class="mw-editsection" data-dcnode-id="6661"><span class="mw-editsection-bracket" data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">[</span></span><a data-dcnode-id="6664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D26" title="Edit section: Abigail"><span data-dcnode-id="6665" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6659" instrument_node="">
</span><link data-dcnode-id="6658" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6654" role="note"><span data-dcnode-id="6657" instrument_node="">Main article: </span><a data-dcnode-id="6655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abigail" title="Abigail"><span data-dcnode-id="6656" instrument_node="">Abigail</span></a></div><span data-dcnode-id="6653" instrument_node="">
</span><p data-dcnode-id="6637"><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abigail" title="Abigail"><span data-dcnode-id="6652" instrument_node="">Abigail</span></a><span data-dcnode-id="6650" instrument_node=""> was the wife of </span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nabal" title="Nabal"><span data-dcnode-id="6649" instrument_node="">Nabal</span></a><span data-dcnode-id="6647" instrument_node="">, who refused to assist the future king David after having accepted his help. Abigail, realizing David's anger will be dangerous to the entire household, acts immediately. She intercepts David bearing gifts and, with what Frymer-Kensky describes as Abigail's "brilliant rhetoric", convinces David not to kill anyone. When Nabal later dies, David weds her. Frymer-Kensky says "Once again an intelligent determined woman is influential far beyond the confines of patriarchy" showing biblical women had what anthropology terms </span><i data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">informal power.</span></i><sup class="reference" data-dcnode-id="6642" id="cite_ref-Frymer-Kensky2006_2-17"><a data-dcnode-id="6643" href="#cite_note-Frymer-Kensky2006-2"><span data-dcnode-id="6644" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6639"><span data-dcnode-id="6640" title="Page / location: 166"><span data-dcnode-id="6641" instrument_node="">: 166 </span></span></sup><span data-dcnode-id="6638" instrument_node="">
</span></p><span data-dcnode-id="6636" instrument_node="">
</span><h4 data-dcnode-id="6626"><span class="mw-headline" data-dcnode-id="6634" id="Ruth"><span data-dcnode-id="6635" instrument_node="">Ruth</span></span><span class="mw-editsection" data-dcnode-id="6627"><span class="mw-editsection-bracket" data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">[</span></span><a data-dcnode-id="6630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D27" title="Edit section: Ruth"><span data-dcnode-id="6631" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6625" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6612"><div class="thumbinner" data-dcnode-id="6613" style="width:302px;"><a class="image" data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJulius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg"><img alt="" class="thumbimage" data-dcnode-id="6624" data-file-height="5067" data-file-width="6000" decoding="async" height="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Julius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg/300px-Julius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Julius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg/450px-Julius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/35/Julius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg/600px-Julius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg 2x" width="300"></a><span data-dcnode-id="6622" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6614"><div class="magnify" data-dcnode-id="6620"><a class="internal" data-dcnode-id="6621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJulius_Schnorr_von_Carolsfeld-_Ruth_im_Feld_des_Boaz.jpg" title="Enlarge"></a></div><i data-dcnode-id="6618"><span data-dcnode-id="6619" instrument_node="">Ruth on the fields of Boaz</span></i><span data-dcnode-id="6617" instrument_node=""> by </span><a data-dcnode-id="6615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julius_Schnorr_von_Carolsfeld" title="Julius Schnorr von Carolsfeld"><span data-dcnode-id="6616" instrument_node="">Julius Schnorr von Carolsfeld</span></a></div></div></div><span data-dcnode-id="6611" instrument_node="">
</span><p data-dcnode-id="6591"><a data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_%28biblical_figure%29" title="Ruth (biblical figure)"><span data-dcnode-id="6610" instrument_node="">Ruth</span></a><span data-dcnode-id="6608" instrument_node=""> is the title character of the </span><a data-dcnode-id="6606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Ruth" title="Book of Ruth"><span data-dcnode-id="6607" instrument_node="">Book of Ruth</span></a><span data-dcnode-id="6605" instrument_node="">.  In the narrative, she is not an Israelite but rather is from </span><a data-dcnode-id="6603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moab" title="Moab"><span data-dcnode-id="6604" instrument_node="">Moab</span></a><span data-dcnode-id="6602" instrument_node="">; she marries an Israelite. Both her husband and her father-in-law die, and she helps her mother-in-law, </span><a data-dcnode-id="6600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naomi_%28biblical_figure%29" title="Naomi (biblical figure)"><span data-dcnode-id="6601" instrument_node="">Naomi</span></a><span data-dcnode-id="6599" instrument_node="">, find protection.  The two of them travel to Bethlehem together, where Ruth wins the love of </span><a data-dcnode-id="6597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boaz" title="Boaz"><span data-dcnode-id="6598" instrument_node="">Boaz</span></a><span data-dcnode-id="6596" instrument_node=""> through her kindness.</span><sup class="reference" data-dcnode-id="6593" id="cite_ref-ppp_79-0"><a data-dcnode-id="6594" href="#cite_note-ppp-79"><span data-dcnode-id="6595" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6592" instrument_node="">
</span></p><p data-dcnode-id="6564"><span data-dcnode-id="6590" instrument_node="">She is one of five women mentioned in the </span><a data-dcnode-id="6588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genealogy_of_Jesus" title="Genealogy of Jesus"><span data-dcnode-id="6589" instrument_node="">genealogy of Jesus</span></a><span data-dcnode-id="6587" instrument_node=""> found in the </span><a data-dcnode-id="6585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_Matthew" title="Gospel of Matthew"><span data-dcnode-id="6586" instrument_node="">Gospel of Matthew</span></a><span data-dcnode-id="6584" instrument_node="">, alongside </span><a data-dcnode-id="6582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tamar_%28Genesis%29" title="Tamar (Genesis)"><span data-dcnode-id="6583" instrument_node="">Tamar</span></a><span data-dcnode-id="6581" instrument_node="">, </span><a data-dcnode-id="6579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rahab" title="Rahab"><span data-dcnode-id="6580" instrument_node="">Rahab</span></a><span data-dcnode-id="6578" instrument_node="">, the "wife of </span><a data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uriah_the_Hittite" title="Uriah the Hittite"><span data-dcnode-id="6577" instrument_node="">Uriah</span></a><span data-dcnode-id="6575" instrument_node="">" (</span><a data-dcnode-id="6573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bathsheba" title="Bathsheba"><span data-dcnode-id="6574" instrument_node="">Bathsheba</span></a><span data-dcnode-id="6572" instrument_node="">), and </span><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary%2C_mother_of_Jesus" title="Mary, mother of Jesus"><span data-dcnode-id="6571" instrument_node="">Mary</span></a><span data-dcnode-id="6569" instrument_node="">.</span><sup class="reference" data-dcnode-id="6566" id="cite_ref-CBQ_80-0"><a data-dcnode-id="6567" href="#cite_note-CBQ-80"><span data-dcnode-id="6568" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6565" instrument_node="">
</span></p><span data-dcnode-id="6563" instrument_node="">
</span><h4 data-dcnode-id="6553"><span class="mw-headline" data-dcnode-id="6561" id="Esther"><span data-dcnode-id="6562" instrument_node="">Esther</span></span><span class="mw-editsection" data-dcnode-id="6554"><span class="mw-editsection-bracket" data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">[</span></span><a data-dcnode-id="6557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D28" title="Edit section: Esther"><span data-dcnode-id="6558" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6552" instrument_node="">
</span><p data-dcnode-id="6520"><a data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esther" title="Esther"><span data-dcnode-id="6551" instrument_node="">Esther</span></a><span data-dcnode-id="6549" instrument_node=""> is described in the </span><a data-dcnode-id="6547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Esther" title="Book of Esther"><span data-dcnode-id="6548" instrument_node="">Book of Esther</span></a><span data-dcnode-id="6546" instrument_node=""> as a </span><a class="mw-redirect" data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish" title="Jewish"><span data-dcnode-id="6545" instrument_node="">Jewish</span></a><span data-dcnode-id="6543" instrument_node=""> queen of the </span><a class="mw-redirect" data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_king" title="Persian king"><span data-dcnode-id="6542" instrument_node="">Persian king</span></a><span data-dcnode-id="6540" instrument_node=""> </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahasuerus%23Book_of_Esther" title="Ahasuerus"><span data-dcnode-id="6539" instrument_node="">Ahasuerus</span></a><span data-dcnode-id="6537" instrument_node="">.  In the narrative, Ahasuerus seeks a new wife after his queen, </span><a data-dcnode-id="6535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vashti" title="Vashti"><span data-dcnode-id="6536" instrument_node="">Vashti</span></a><span data-dcnode-id="6534" instrument_node="">, refuses to obey him, and Esther is chosen for her beauty.  The king's chief advisor, </span><a class="mw-redirect" data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haman_%28Bible%29" title="Haman (Bible)"><span data-dcnode-id="6533" instrument_node="">Haman</span></a><span data-dcnode-id="6531" instrument_node="">, is offended by Esther's cousin and guardian, </span><a data-dcnode-id="6529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mordecai" title="Mordecai"><span data-dcnode-id="6530" instrument_node="">Mordecai</span></a><span data-dcnode-id="6528" instrument_node="">, and gets permission from the king to have all the Jews in the kingdom killed. Esther foils the plan, and wins permission from the king for the Jews to kill their enemies, and they do so.  Her story is the traditional basis for the Jewish holiday </span><a data-dcnode-id="6526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purim" title="Purim"><span data-dcnode-id="6527" instrument_node="">Purim</span></a><span data-dcnode-id="6525" instrument_node="">, which is celebrated on the date given in the story for when Haman's order was to go into effect, which is the same day that Jews kill their enemies after the plan is reversed.</span><sup class="reference" data-dcnode-id="6522" id="cite_ref-je-esther_81-0"><a data-dcnode-id="6523" href="#cite_note-je-esther-81"><span data-dcnode-id="6524" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6521" instrument_node="">
</span></p><span data-dcnode-id="6519" instrument_node="">
</span><h2 data-dcnode-id="6509"><span class="mw-headline" data-dcnode-id="6517" id="New_Testament"><span data-dcnode-id="6518" instrument_node="">New Testament</span></span><span class="mw-editsection" data-dcnode-id="6510"><span class="mw-editsection-bracket" data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">[</span></span><a data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D29" title="Edit section: New Testament"><span data-dcnode-id="6514" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6511"><span data-dcnode-id="6512" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6508" instrument_node="">
</span><link data-dcnode-id="6507" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6503" role="note"><span data-dcnode-id="6506" instrument_node="">See also: </span><a data-dcnode-id="6504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women_in_Christianity" title="Women in Christianity"><span data-dcnode-id="6505" instrument_node="">Women in Christianity</span></a></div><span data-dcnode-id="6502" instrument_node="">
</span><p data-dcnode-id="6481"><span data-dcnode-id="6501" instrument_node="">The </span><a data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Testament" title="New Testament"><span data-dcnode-id="6500" instrument_node="">New Testament</span></a><span data-dcnode-id="6498" instrument_node=""> is the second part of the Christian Bible. It tells about the teachings and person of </span><a data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_in_Christianity" title="Jesus in Christianity"><span data-dcnode-id="6497" instrument_node="">Jesus</span></a><span data-dcnode-id="6495" instrument_node="">, as well as events in </span><a data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity_in_the_1st_century" title="Christianity in the 1st century"><span data-dcnode-id="6494" instrument_node="">first-century Christianity</span></a><span data-dcnode-id="6492" instrument_node="">. It consists of four narratives called gospels about the life, teaching, death and resurrection of Jesus. It includes a record of the Apostolic ministries in the early church, called the </span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_of_the_Apostles" title="Acts of the Apostles"><span data-dcnode-id="6491" instrument_node="">Acts of the Apostles</span></a><span data-dcnode-id="6489" instrument_node="">; twenty-one letters called "epistles" written by various authors to specific groups with specific needs concerning Christian doctrine, counsel, instruction, and conflict resolution; and one Apocalyptic book, the </span><a data-dcnode-id="6487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Revelation" title="Book of Revelation"><span data-dcnode-id="6488" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="6486" instrument_node="">, which is a book of prophecy, containing some instructions to seven local congregations of Asia Minor, but mostly containing prophetical symbology about the end times.</span><sup class="reference" data-dcnode-id="6483" id="cite_ref-82"><a data-dcnode-id="6484" href="#cite_note-82"><span data-dcnode-id="6485" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6482" instrument_node="">
</span></p><span data-dcnode-id="6480" instrument_node="">
</span><h3 data-dcnode-id="6470"><span class="mw-headline" data-dcnode-id="6478" id="New_Testament_views_on_gender"><span data-dcnode-id="6479" instrument_node="">New Testament views on gender</span></span><span class="mw-editsection" data-dcnode-id="6471"><span class="mw-editsection-bracket" data-dcnode-id="6476"><span data-dcnode-id="6477" instrument_node="">[</span></span><a data-dcnode-id="6474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D30" title="Edit section: New Testament views on gender"><span data-dcnode-id="6475" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6469" instrument_node="">
</span><p data-dcnode-id="6438"><span data-dcnode-id="6468" instrument_node="">The New Testament names many women among the followers of Jesus and in positions of leadership in the early church.</span><sup class="reference" data-dcnode-id="6465" id="cite_ref-Richards_83-0"><a data-dcnode-id="6466" href="#cite_note-Richards-83"><span data-dcnode-id="6467" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="6462" id="cite_ref-Mary_Keng_Mun_Chung_84-0"><a data-dcnode-id="6463" href="#cite_note-Mary_Keng_Mun_Chung-84"><span data-dcnode-id="6464" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6461" instrument_node="">  New Testament scholar Linda Belleville says "virtually every leadership role that names a man also names a woman. In fact there are more women named as leaders in the New Testament than men.  </span><a data-dcnode-id="6459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoebe_%28biblical_figure%29" title="Phoebe (biblical figure)"><span data-dcnode-id="6460" instrument_node="">Phoebe</span></a><span data-dcnode-id="6458" instrument_node=""> is a 'deacon' and a 'benefactor' (Romans 16:1-2).  </span><a data-dcnode-id="6456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary%2C_mother_of_John_Mark" title="Mary, mother of John Mark"><span data-dcnode-id="6457" instrument_node="">Mary, mother of John Mark</span></a><span data-dcnode-id="6455" instrument_node="">, </span><a data-dcnode-id="6453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lydia_of_Thyatira" title="Lydia of Thyatira"><span data-dcnode-id="6454" instrument_node="">Lydia</span></a><span data-dcnode-id="6452" instrument_node=""> and Nympha are overseers of house churches (Acts 12:12; 16:15; Colossians 4:15). </span><a data-dcnode-id="6450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euodia_and_Syntyche" title="Euodia and Syntyche"><span data-dcnode-id="6451" instrument_node="">Euodia and Syntyche</span></a><span data-dcnode-id="6449" instrument_node=""> are among 'the overseers and deacons' at </span><a data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippi" title="Philippi"><span data-dcnode-id="6448" instrument_node="">Philippi</span></a><span data-dcnode-id="6446" instrument_node=""> (Philippians 1:1; cf, 4:2-3).  The only role lacking specific female names is that of 'elder'--but there male names are lacking as well."</span><sup class="reference" data-dcnode-id="6443" id="cite_ref-Belleville_85-0"><a data-dcnode-id="6444" href="#cite_note-Belleville-85"><span data-dcnode-id="6445" instrument_node="">[85]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6440"><span data-dcnode-id="6441" title="Page / location: 54, 112"><span data-dcnode-id="6442" instrument_node="">: 54, 112 </span></span></sup><span data-dcnode-id="6439" instrument_node="">
</span></p><p data-dcnode-id="6398"><span data-dcnode-id="6437" instrument_node="">New Testament scholar </span><a data-dcnode-id="6435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Craig_Blomberg" title="Craig Blomberg"><span data-dcnode-id="6436" instrument_node="">Craig Blomberg</span></a><span data-dcnode-id="6434" instrument_node=""> and other </span><a class="mw-redirect" data-dcnode-id="6432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complementarian" title="Complementarian"><span data-dcnode-id="6433" instrument_node="">complementarians</span></a><span data-dcnode-id="6431" instrument_node=""> assert there are three primary texts that are critical to the traditional view of women and women's roles:  "</span><i data-dcnode-id="6426"><span data-dcnode-id="6430" instrument_node="">1 </span><a class="mw-redirect" data-dcnode-id="6428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corinthians" title="Corinthians"><span data-dcnode-id="6429" instrument_node="">Corinthians</span></a><span data-dcnode-id="6427" instrument_node=""> 14:34-35</span></i><span data-dcnode-id="6425" instrument_node="">, where women are commanded to be silent in the church; </span><i data-dcnode-id="6420"><span data-dcnode-id="6424" instrument_node="">1 </span><a data-dcnode-id="6422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Epistle_to_Timothy" title="First Epistle to Timothy"><span data-dcnode-id="6423" instrument_node="">Timothy</span></a><span data-dcnode-id="6421" instrument_node=""> 2:11-15</span></i><span data-dcnode-id="6419" instrument_node=""> where women (according to the TNIV) are not permitted to teach or have authority over a man; and </span><i data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">1 Corinthians 11:2-16</span></i><span data-dcnode-id="6416" instrument_node=""> where the male and female relationship is defined in terms of </span><i data-dcnode-id="6413"><a data-dcnode-id="6414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kephale_%28New_Testament%29" title="Kephale (New Testament)"><span data-dcnode-id="6415" instrument_node="">kephalē</span></a></i><span data-dcnode-id="6412" instrument_node=""> commonly translated </span><i data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">head.</span></i><span data-dcnode-id="6409" instrument_node="">"</span><sup class="reference" data-dcnode-id="6406" id="cite_ref-Blomberg_68-1"><a data-dcnode-id="6407" href="#cite_note-Blomberg-68"><span data-dcnode-id="6408" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="6403" id="cite_ref-Belleville_85-1"><a data-dcnode-id="6404" href="#cite_note-Belleville-85"><span data-dcnode-id="6405" instrument_node="">[85]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6400"><span data-dcnode-id="6401" title="Page / location: 97"><span data-dcnode-id="6402" instrument_node="">: 97 </span></span></sup><span data-dcnode-id="6399" instrument_node="">
</span></p><span data-dcnode-id="6397" instrument_node="">
</span><h4 data-dcnode-id="6386"><span data-dcnode-id="6396" id="Jesus.27_interactions_with_women"></span><span class="mw-headline" data-dcnode-id="6394" id="Jesus'_interactions_with_women"><span data-dcnode-id="6395" instrument_node="">Jesus' interactions with women</span></span><span class="mw-editsection" data-dcnode-id="6387"><span class="mw-editsection-bracket" data-dcnode-id="6392"><span data-dcnode-id="6393" instrument_node="">[</span></span><a data-dcnode-id="6390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D31" title="Edit section: Jesus' interactions with women"><span data-dcnode-id="6391" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6385" instrument_node="">
</span><link data-dcnode-id="6384" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6380" role="note"><span data-dcnode-id="6383" instrument_node="">Main article: </span><a data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus%2527_interactions_with_women" title="Jesus' interactions with women"><span data-dcnode-id="6382" instrument_node="">Jesus' interactions with women</span></a></div><span data-dcnode-id="6379" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6365"><div class="thumbinner" data-dcnode-id="6366" style="width:182px;"><a class="image" data-dcnode-id="6377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASt_Photina.jpg"><img alt="" class="thumbimage" data-dcnode-id="6378" data-file-height="400" data-file-width="293" decoding="async" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1f/St_Photina.jpg/180px-St_Photina.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1f/St_Photina.jpg/270px-St_Photina.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/1/1f/St_Photina.jpg 2x" width="180"></a><span data-dcnode-id="6376" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6367"><div class="magnify" data-dcnode-id="6374"><a class="internal" data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASt_Photina.jpg" title="Enlarge"></a></div><span data-dcnode-id="6373" instrument_node="">The </span><a data-dcnode-id="6371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samaritan_woman_at_the_well" title="Samaritan woman at the well"><span data-dcnode-id="6372" instrument_node="">Samaritan woman</span></a><span data-dcnode-id="6370" instrument_node="">, meeting Jesus by the well. Orthodox </span><a data-dcnode-id="6368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Icon" title="Icon"><span data-dcnode-id="6369" instrument_node="">icon</span></a></div></div></div><span data-dcnode-id="6364" instrument_node="">
</span><p data-dcnode-id="6334"><span data-dcnode-id="6363" instrument_node="">The New Testament refers to a number of women in Jesus’ inner circle. Jesus often spoke directly to women in public. The disciples were astonished to see Jesus talking with the </span><a data-dcnode-id="6361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samaritan_woman_at_the_well" title="Samaritan woman at the well"><span data-dcnode-id="6362" instrument_node="">Samaritan woman at the well</span></a><span data-dcnode-id="6360" instrument_node=""> of Sychar (John 4:7-26). He spoke freely with the </span><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_and_the_woman_taken_in_adultery" title="Jesus and the woman taken in adultery"><span data-dcnode-id="6359" instrument_node="">woman taken in adultery</span></a><span data-dcnode-id="6357" instrument_node=""> (John 8:10–11), with the </span><a class="mw-redirect" data-dcnode-id="6355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Widow_of_Nain" title="Widow of Nain"><span data-dcnode-id="6356" instrument_node="">widow of Nain</span></a><span data-dcnode-id="6354" instrument_node=""> (Luke 7:12–13), the </span><a data-dcnode-id="6352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_healing_the_bleeding_woman" title="Jesus healing the bleeding woman"><span data-dcnode-id="6353" instrument_node="">woman with the bleeding disorder</span></a><span data-dcnode-id="6351" instrument_node=""> (Luke 8:48; cf. Matt. 9:22; Mark 5:34), and a woman who called to him from a crowd (Luke 11:27–28). Similarly, Jesus addressed a </span><a data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_healing_an_infirm_woman" title="Jesus healing an infirm woman"><span data-dcnode-id="6350" instrument_node="">woman bent over for eighteen years</span></a><span data-dcnode-id="6348" instrument_node=""> (Luke 13:12) and a </span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crucifixion_of_Jesus%23Path_to_the_crucifixion" title="Crucifixion of Jesus"><span data-dcnode-id="6347" instrument_node="">group of women on the route to the cross</span></a><span data-dcnode-id="6345" instrument_node=""> (Luke 23:27-31).  Jesus spoke in a thoughtful, caring manner. Each synoptic writer records Jesus addressing the woman with the bleeding disorder tenderly as “daughter” and he refers to the bent woman as a “daughter of Abraham” (Luke 13:16). Theologian </span><a data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_G._Bloesch" title="Donald G. Bloesch"><span data-dcnode-id="6344" instrument_node="">Donald G. Bloesch</span></a><span data-dcnode-id="6342" instrument_node=""> infers that “Jesus called the Jewish women ‘daughters of Abraham’ (Luke 13:16), thereby according them a spiritual status equal to that of men.”</span><sup class="reference" data-dcnode-id="6339" id="cite_ref-Donald_G._Bloesch_86-0"><a data-dcnode-id="6340" href="#cite_note-Donald_G._Bloesch-86"><span data-dcnode-id="6341" instrument_node="">[86]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6336"><span data-dcnode-id="6337" title="Page / location: 28"><span data-dcnode-id="6338" instrument_node="">: 28 </span></span></sup><span data-dcnode-id="6335" instrument_node="">
</span></p><p data-dcnode-id="6301"><span data-dcnode-id="6333" instrument_node="">Jesus held women personally responsible for their own behavior as seen in his dealings with the woman at the well (John 4:16–18), the woman taken in adultery (John 8:10–11), and the </span><a data-dcnode-id="6331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anointing_of_Jesus" title="Anointing of Jesus"><span data-dcnode-id="6332" instrument_node="">sinful woman who anointed his feet</span></a><span data-dcnode-id="6330" instrument_node=""> (Luke 7:44–50 and the other three gospels). Jesus dealt with each as having the personal freedom and enough self-determination to deal with their own repentance and forgiveness.  There are several Gospel accounts of Jesus imparting important teachings to and about women: his public admiration for </span><a data-dcnode-id="6328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lesson_of_the_widow%2527s_mite" title="Lesson of the widow's mite"><span data-dcnode-id="6329" instrument_node="">a poor widow who donated two copper coins</span></a><span data-dcnode-id="6327" instrument_node=""> to the Temple in Jerusalem, his friendship with </span><a data-dcnode-id="6325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_of_Bethany" title="Mary of Bethany"><span data-dcnode-id="6326" instrument_node="">Mary of Bethany</span></a><span data-dcnode-id="6324" instrument_node=""> and </span><a data-dcnode-id="6322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martha" title="Martha"><span data-dcnode-id="6323" instrument_node="">Martha</span></a><span data-dcnode-id="6321" instrument_node="">, the sisters of </span><a data-dcnode-id="6319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lazarus_of_Bethany" title="Lazarus of Bethany"><span data-dcnode-id="6320" instrument_node="">Lazarus</span></a><span data-dcnode-id="6318" instrument_node="">, and the presence of </span><a data-dcnode-id="6316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Magdalene" title="Mary Magdalene"><span data-dcnode-id="6317" instrument_node="">Mary Magdalene</span></a><span data-dcnode-id="6315" instrument_node="">, </span><a data-dcnode-id="6313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary%2C_mother_of_Jesus" title="Mary, mother of Jesus"><span data-dcnode-id="6314" instrument_node="">his mother</span></a><span data-dcnode-id="6312" instrument_node="">, and the other women as he was crucified.  New Testament scholar </span><a data-dcnode-id="6310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Witherington_III" title="Ben Witherington III"><span data-dcnode-id="6311" instrument_node="">Ben Witherington III</span></a><span data-dcnode-id="6309" instrument_node=""> says "Jesus broke with both biblical and rabbinic traditions that restricted women's roles in religious practices, and he rejected attempts to devalue the worth of a woman, or her word of witness."</span><sup class="reference" data-dcnode-id="6306" id="cite_ref-Ben_Witherington_III1984_39-1"><a data-dcnode-id="6307" href="#cite_note-Ben_Witherington_III1984-39"><span data-dcnode-id="6308" instrument_node="">[39]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6303"><span data-dcnode-id="6304" title="Page / location: 127"><span data-dcnode-id="6305" instrument_node="">: 127 </span></span></sup><span data-dcnode-id="6302" instrument_node="">
</span></p><span data-dcnode-id="6300" instrument_node="">
</span><h4 data-dcnode-id="6290"><span class="mw-headline" data-dcnode-id="6298" id="Women_in_the_early_church"><span data-dcnode-id="6299" instrument_node="">Women in the early church</span></span><span class="mw-editsection" data-dcnode-id="6291"><span class="mw-editsection-bracket" data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">[</span></span><a data-dcnode-id="6294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D32" title="Edit section: Women in the early church"><span data-dcnode-id="6295" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6292"><span data-dcnode-id="6293" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6289" instrument_node="">
</span><link data-dcnode-id="6288" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6284" role="note"><span data-dcnode-id="6287" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="6285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Christianity" title="Early Christianity"><span data-dcnode-id="6286" instrument_node="">Early Christianity</span></a></div><span data-dcnode-id="6283" instrument_node="">
</span><p data-dcnode-id="6231"><span data-dcnode-id="6282" instrument_node="">Sociologist Linda L. Lindsey says "Belief in the spiritual equality of the genders (</span><a data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galatians_3%3A28" title="Galatians 3:28"><span data-dcnode-id="6281" instrument_node="">Galatians 3:28</span></a><span data-dcnode-id="6279" instrument_node="">) and Jesus' inclusion of women in prominent roles, led the early New Testament church to recognize women's contributions to charity, evangelism and teaching."</span><sup class="reference" data-dcnode-id="6276" id="cite_ref-Linda_L._Lindsey_67-1"><a data-dcnode-id="6277" href="#cite_note-Linda_L._Lindsey-67"><span data-dcnode-id="6278" instrument_node="">[67]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6273"><span data-dcnode-id="6274" title="Page / location: 131"><span data-dcnode-id="6275" instrument_node="">: 131 </span></span></sup><span data-dcnode-id="6272" instrument_node=""> </span><a data-dcnode-id="6270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pliny_the_Younger" title="Pliny the Younger"><span data-dcnode-id="6271" instrument_node="">Pliny the Younger</span></a><span data-dcnode-id="6269" instrument_node="">, first century,  says in his letter to Emperor </span><a data-dcnode-id="6267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trajan" title="Trajan"><span data-dcnode-id="6268" instrument_node="">Trajan</span></a><span data-dcnode-id="6266" instrument_node=""> that Christianity had people from every age and rank, and refers to "two women slaves called deaconesses" .</span><sup class="reference" data-dcnode-id="6263" id="cite_ref-Luke_Painter_87-0"><a data-dcnode-id="6264" href="#cite_note-Luke_Painter-87"><span data-dcnode-id="6265" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6262" instrument_node=""> Professor of religion Margaret Y. MacDonald uses a "social scientific concept of power" which distinguishes between power and authority to show early Christian women, while lacking overt authority, still retained sufficient indirect power and influence to play a significant role in Christianity's beginnings.</span><sup class="reference" data-dcnode-id="6259" id="cite_ref-MacDonaldreview_88-0"><a data-dcnode-id="6260" href="#cite_note-MacDonaldreview-88"><span data-dcnode-id="6261" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6258" instrument_node="">  
According to MacDonald, much of the vociferous pagan criticism of the early church is evidence of this "female initiative" which contributed to the reasons Roman society saw Christianity as a threat.</span><sup class="reference" data-dcnode-id="6255" id="cite_ref-Margaret_Y._MacDonald_89-0"><a data-dcnode-id="6256" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="6257" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6252"><span data-dcnode-id="6253" title="Page / location: 127"><span data-dcnode-id="6254" instrument_node="">: 127 </span></span></sup><sup class="reference" data-dcnode-id="6249" id="cite_ref-Jane_F._Gardner_90-0"><a data-dcnode-id="6250" href="#cite_note-Jane_F._Gardner-90"><span data-dcnode-id="6251" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6248" instrument_node="">  Accusations that Christianity undermined the Roman family and male authority in the home were used to stir up opposition to Christianity and negatively influence public opinion.</span><sup class="reference" data-dcnode-id="6245" id="cite_ref-Margaret_Y._MacDonald_89-1"><a data-dcnode-id="6246" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="6247" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6242"><span data-dcnode-id="6243" title="Page / location: 126"><span data-dcnode-id="6244" instrument_node="">: 126 </span></span></sup><sup class="reference" data-dcnode-id="6239" id="cite_ref-Kay_Ramnarine_91-0"><a data-dcnode-id="6240" href="#cite_note-Kay_Ramnarine-91"><span data-dcnode-id="6241" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="6236" id="cite_ref-Margaret_Y._MacDonald_89-2"><a data-dcnode-id="6237" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="6238" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6233"><span data-dcnode-id="6234" title="Page / location: 126"><span data-dcnode-id="6235" instrument_node="">: 126 </span></span></sup><span data-dcnode-id="6232" instrument_node="">
</span></p><p data-dcnode-id="6212"><span data-dcnode-id="6230" instrument_node="">Some New Testament texts (1 Peter 2:12;3:15-16; 1 Timothy 3:6-7;5:14) explicitly discuss early Christian communities being burdened by slanderous rumors because of Roman society perceiving Christianity as a threat. Christians were accused of incest because they spoke of each other as brother and sister and of loving one another, and they were accused of cannibalism because of the Lord's supper as well as being accused of undermining family and society. Such negative public opinion played a part in the </span><a data-dcnode-id="6228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_Christians_in_the_Roman_Empire" title="Persecution of Christians in the Roman Empire"><span data-dcnode-id="6229" instrument_node="">persecution of Christians in the Roman Empire</span></a><span data-dcnode-id="6227" instrument_node="">.</span><sup class="reference" data-dcnode-id="6224" id="cite_ref-Margaret_Y._MacDonald_89-3"><a data-dcnode-id="6225" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="6226" instrument_node="">[89]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6221"><span data-dcnode-id="6222" title="Page / location: 127"><span data-dcnode-id="6223" instrument_node="">: 127 </span></span></sup><sup class="reference" data-dcnode-id="6218" id="cite_ref-92"><a data-dcnode-id="6219" href="#cite_note-92"><span data-dcnode-id="6220" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6217" instrument_node="">  MacDonald says some New Testament texts reasserting traditional roles concerning the behavior of women were written in response to these dangerous circumstances.</span><sup class="reference" data-dcnode-id="6214" id="cite_ref-Margaret_Y._MacDonald_89-4"><a data-dcnode-id="6215" href="#cite_note-Margaret_Y._MacDonald-89"><span data-dcnode-id="6216" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6213" instrument_node="">
</span></p><span data-dcnode-id="6211" instrument_node="">
</span><h3 data-dcnode-id="6201"><span class="mw-headline" data-dcnode-id="6209" id="Women_in_the_New_Testament"><span data-dcnode-id="6210" instrument_node="">Women in the New Testament</span></span><span class="mw-editsection" data-dcnode-id="6202"><span class="mw-editsection-bracket" data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">[</span></span><a data-dcnode-id="6205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D33" title="Edit section: Women in the New Testament"><span data-dcnode-id="6206" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6200" instrument_node="">
</span><h4 data-dcnode-id="6189"><span data-dcnode-id="6199" id="Mary.2C_mother_of_Jesus"></span><span class="mw-headline" data-dcnode-id="6197" id="Mary,_mother_of_Jesus"><span data-dcnode-id="6198" instrument_node="">Mary, mother of Jesus</span></span><span class="mw-editsection" data-dcnode-id="6190"><span class="mw-editsection-bracket" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">[</span></span><a data-dcnode-id="6193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D34" title="Edit section: Mary, mother of Jesus"><span data-dcnode-id="6194" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6191"><span data-dcnode-id="6192" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6188" instrument_node="">
</span><link data-dcnode-id="6187" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6183" role="note"><span data-dcnode-id="6186" instrument_node="">Main article: </span><a data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary%2C_mother_of_Jesus" title="Mary, mother of Jesus"><span data-dcnode-id="6185" instrument_node="">Mary, mother of Jesus</span></a></div><span data-dcnode-id="6182" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6173"><div class="thumbinner" data-dcnode-id="6174" style="width:222px;"><a class="image" data-dcnode-id="6180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrari_%28Venice%29_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg"><img alt="" class="thumbimage" data-dcnode-id="6181" data-file-height="2679" data-file-width="2352" decoding="async" height="251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/73/Frari_%2528Venice%2529_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg/220px-Frari_%2528Venice%2529_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/73/Frari_%28Venice%29_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg/330px-Frari_%28Venice%29_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/73/Frari_%28Venice%29_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg/440px-Frari_%28Venice%29_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg 2x" width="220"></a><span data-dcnode-id="6179" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6175"><div class="magnify" data-dcnode-id="6177"><a class="internal" data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrari_%28Venice%29_-_Sacristy_-_Il_Sassoferrato_-_Madonna_in_prayer.jpg" title="Enlarge"></a></div><span data-dcnode-id="6176" instrument_node="">Frari (Venice) - Sacristy - Il Sassoferrato - Mary in prayer</span></div></div></div><span data-dcnode-id="6172" instrument_node="">
</span><p data-dcnode-id="6148"><span data-dcnode-id="6171" instrument_node="">Outside of the </span><a class="mw-redirect" data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infancy_narrative" title="Infancy narrative"><span data-dcnode-id="6170" instrument_node="">infancy narratives</span></a><span data-dcnode-id="6168" instrument_node="">, Mary is mentioned infrequently after the beginning of Jesus' public ministry. The Gospels say Mary is the one "of whom Jesus was born" (Matthew 1:16) and that she is the "favored one" (Luke 1:28). Some scholars believe the infancy narratives were interpolations by the early church. </span><a class="mw-redirect" data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bart_Ehrman" title="Bart Ehrman"><span data-dcnode-id="6167" instrument_node="">Bart Ehrman</span></a><span data-dcnode-id="6165" instrument_node=""> explains that Jesus is never mentioned by name in </span><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_in_the_Talmud" title="Jesus in the Talmud"><span data-dcnode-id="6164" instrument_node="">the Talmud</span></a><span data-dcnode-id="6162" instrument_node="">, but there is a subtle attack on the virgin birth that refers to the illegitimate son of a Roman soldier named  "Panthera." (Ehrman says, "In Greek the word for virgin is </span><i data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">parthenos</span></i><span data-dcnode-id="6159" instrument_node="">").</span><sup class="reference" data-dcnode-id="6156" id="cite_ref-93"><a data-dcnode-id="6157" href="#cite_note-93"><span data-dcnode-id="6158" instrument_node="">[93]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6153"><span data-dcnode-id="6154" title="Page / location: 67–69"><span data-dcnode-id="6155" instrument_node="">: 67–69 </span></span></sup><sup class="reference" data-dcnode-id="6150" id="cite_ref-94"><a data-dcnode-id="6151" href="#cite_note-94"><span data-dcnode-id="6152" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6149" instrument_node="">
</span></p><p data-dcnode-id="6139"><span data-dcnode-id="6147" instrument_node="">Mary is not introduced in the Gospels in a way that would make her seem noteworthy or deserving of special honor.  She is young, resides in an insignificant town, far from the centers of power, with no special social position or status, yet she is the one granted the highest of all statuses, demonstrating the supreme reversal.</span><sup class="reference" data-dcnode-id="6144" id="cite_ref-Joel_B._Green_95-0"><a data-dcnode-id="6145" href="#cite_note-Joel_B._Green-95"><span data-dcnode-id="6146" instrument_node="">[95]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6141"><span data-dcnode-id="6142" title="Page / location: 14"><span data-dcnode-id="6143" instrument_node="">: 14 </span></span></sup><span data-dcnode-id="6140" instrument_node="">  When she receives the announcement of Jesus' birth, she asks "How can this be?" Then, "...let it be" (1:38).
</span></p><p data-dcnode-id="6124"><span data-dcnode-id="6138" instrument_node="">In the Gospel of Luke, Mary visits </span><a data-dcnode-id="6136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_%28biblical_figure%29" title="Elizabeth (biblical figure)"><span data-dcnode-id="6137" instrument_node="">Elizabeth</span></a><span data-dcnode-id="6135" instrument_node="">, her cousin, twice, and twice Elizabeth calls her blessed (Luke 1:42,45). Mary herself states all future generations will call her blessed (1:48). Mary "ponders" </span><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simeon_%28Gospel_of_Luke%29" title="Simeon (Gospel of Luke)"><span data-dcnode-id="6134" instrument_node="">Simeon</span></a><span data-dcnode-id="6132" instrument_node="">'s warning that "a sword would pierce her soul" in Luke 2:34,35. She is troubled by Jesus staying behind in the Temple at Jerusalem at 12 and his assumption his parents would know where he was (Luke 2:49). Mary "ponders all these things in her heart."</span><sup class="reference" data-dcnode-id="6129" id="cite_ref-Joel_B._Green_95-1"><a data-dcnode-id="6130" href="#cite_note-Joel_B._Green-95"><span data-dcnode-id="6131" instrument_node="">[95]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6126"><span data-dcnode-id="6127" title="Page / location: 16, 17"><span data-dcnode-id="6128" instrument_node="">: 16, 17 </span></span></sup><span data-dcnode-id="6125" instrument_node="">
</span></p><p data-dcnode-id="6111"><span data-dcnode-id="6123" instrument_node="">In all three </span><a class="mw-redirect" data-dcnode-id="6121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synoptic_gospels" title="Synoptic gospels"><span data-dcnode-id="6122" instrument_node="">synoptic gospels</span></a><span data-dcnode-id="6120" instrument_node="">, Mark, Matthew and Luke, Mary and Jesus' brothers are disowned by Jesus. The Matthew version has it as "Then one said unto him, Behold, thy mother and thy brethren stand without, desiring to speak with thee. But he answered and said unto him that told him, Who is my mother? and who are my brethren? And he stretched forth his hand toward his disciples, and said, Behold my mother and my brethren! For whosoever shall do the will of my Father which is in heaven, the same is my brother, and sister, and mother."</span><sup class="reference" data-dcnode-id="6117" id="cite_ref-96"><a data-dcnode-id="6118" href="#cite_note-96"><span data-dcnode-id="6119" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6116" instrument_node=""> In Luke the repudiation is even stronger, there Jesus says his disciples have to hate their mothers. "If any man come to me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be my disciple."</span><sup class="reference" data-dcnode-id="6113" id="cite_ref-97"><a data-dcnode-id="6114" href="#cite_note-97"><span data-dcnode-id="6115" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6112" instrument_node="">
</span></p><p data-dcnode-id="6106"><span data-dcnode-id="6110" instrument_node="">The Gospel of John never identifies her by name, referring instead to "the mother of Jesus." Mary appears twice in John, once at the beginning of the Gospel, and once near its end. The first is the </span><a class="mw-redirect" data-dcnode-id="6108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marriage_at_Cana" title="Marriage at Cana"><span data-dcnode-id="6109" instrument_node="">wedding feast at Cana</span></a><span data-dcnode-id="6107" instrument_node=""> where the wine runs out. Mary tells Jesus, and his response is "Woman, what have I to do with you? My hour has not yet come." In spite of this, Mary tells the servants, "Do whatever he says." Jesus orders 6 stone water jars filled with water, and then directs that it be taken to the steward who describes it as the "best" wine.
</span></p><p data-dcnode-id="6087"><span data-dcnode-id="6105" instrument_node="">Jesus' mother appears again in John (19:25-27) at </span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crucifixion_of_Jesus" title="Crucifixion of Jesus"><span data-dcnode-id="6104" instrument_node="">the crucifixion</span></a><span data-dcnode-id="6102" instrument_node="">, where Jesus makes provision for the care of his mother in her senior years (John 19:25-27).</span><sup class="reference" data-dcnode-id="6099" id="cite_ref-Beverly_Roberts_Gaventa_98-0"><a data-dcnode-id="6100" href="#cite_note-Beverly_Roberts_Gaventa-98"><span data-dcnode-id="6101" instrument_node="">[98]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6096"><span data-dcnode-id="6097" title="Page / location: 48, 49"><span data-dcnode-id="6098" instrument_node="">: 48, 49 </span></span></sup><span data-dcnode-id="6095" instrument_node=""> Mary speaks not a word and the narrator does not describe her.</span><sup class="reference" data-dcnode-id="6092" id="cite_ref-Beverly_Roberts_Gaventa_98-1"><a data-dcnode-id="6093" href="#cite_note-Beverly_Roberts_Gaventa-98"><span data-dcnode-id="6094" instrument_node="">[98]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6089"><span data-dcnode-id="6090" title="Page / location: 49"><span data-dcnode-id="6091" instrument_node="">: 49 </span></span></sup><span data-dcnode-id="6088" instrument_node="">
</span></p><span data-dcnode-id="6086" instrument_node="">
</span><h4 data-dcnode-id="6076"><span class="mw-headline" data-dcnode-id="6084" id="Junia"><span data-dcnode-id="6085" instrument_node="">Junia</span></span><span class="mw-editsection" data-dcnode-id="6077"><span class="mw-editsection-bracket" data-dcnode-id="6082"><span data-dcnode-id="6083" instrument_node="">[</span></span><a data-dcnode-id="6080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D35" title="Edit section: Junia"><span data-dcnode-id="6081" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6075" instrument_node="">
</span><link data-dcnode-id="6074" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6070" role="note"><span data-dcnode-id="6073" instrument_node="">Main article: </span><a data-dcnode-id="6071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Junia_%28New_Testament_person%29" title="Junia (New Testament person)"><span data-dcnode-id="6072" instrument_node="">Junia (New Testament person)</span></a></div><span data-dcnode-id="6069" instrument_node="">
</span><p data-dcnode-id="6037"><span data-dcnode-id="6068" instrument_node="">Paul wrote in Romans 16:7 "Greet </span><a data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andronicus_of_Pannonia" title="Andronicus of Pannonia"><span data-dcnode-id="6067" instrument_node="">Andronicus</span></a><span data-dcnode-id="6065" instrument_node=""> and Junia, my fellow Jews who have been in prison with me. They are outstanding among the apostles, and they were in Christ before I was." Bible translator Hayk Hovhannisyan says Junia was a woman and there is consensus supporting this view.</span><sup class="reference" data-dcnode-id="6062" id="cite_ref-Hayk_Hovhannisyan_99-0"><a data-dcnode-id="6063" href="#cite_note-Hayk_Hovhannisyan-99"><span data-dcnode-id="6064" instrument_node="">[99]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6059"><span data-dcnode-id="6060" title="Page / location: 297"><span data-dcnode-id="6061" instrument_node="">: 297 </span></span></sup><sup class="reference" data-dcnode-id="6056" id="cite_ref-Craig_S._Keener_100-0"><a data-dcnode-id="6057" href="#cite_note-Craig_S._Keener-100"><span data-dcnode-id="6058" instrument_node="">[100]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6053"><span data-dcnode-id="6054" title="Page / location: 241, 242"><span data-dcnode-id="6055" instrument_node="">: 241, 242 </span></span></sup><span data-dcnode-id="6052" instrument_node=""> He says that "Some scholars argue that Junia was really a man by the name of Junias...  Whether this name is masculine or feminine depends on how the word was accented in Greek. ...scribes wrote Junia as feminine. Examination of ancient Greek and Latin literature confirms the masculine name Junias is nowhere attested, whereas the female name Junia...is found more than 250 times..."</span><sup class="reference" data-dcnode-id="6049" id="cite_ref-Hayk_Hovhannisyan_99-1"><a data-dcnode-id="6050" href="#cite_note-Hayk_Hovhannisyan-99"><span data-dcnode-id="6051" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6048" instrument_node="">  New Testament scholar </span><a data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Craig_S._Keener" title="Craig S. Keener"><span data-dcnode-id="6047" instrument_node="">Craig S. Keener</span></a><span data-dcnode-id="6045" instrument_node=""> says the early church understood Andronicus and Junia to be a husband and wife apostolic team.</span><sup class="reference" data-dcnode-id="6042" id="cite_ref-Craig_S._Keener_100-1"><a data-dcnode-id="6043" href="#cite_note-Craig_S._Keener-100"><span data-dcnode-id="6044" instrument_node="">[100]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6039"><span data-dcnode-id="6040" title="Page / location: 242"><span data-dcnode-id="6041" instrument_node="">: 242 </span></span></sup><span data-dcnode-id="6038" instrument_node="">
</span></p><span data-dcnode-id="6036" instrument_node="">
</span><h4 data-dcnode-id="6026"><span class="mw-headline" data-dcnode-id="6034" id="Priscilla"><span data-dcnode-id="6035" instrument_node="">Priscilla</span></span><span class="mw-editsection" data-dcnode-id="6027"><span class="mw-editsection-bracket" data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">[</span></span><a data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D36" title="Edit section: Priscilla"><span data-dcnode-id="6031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6028"><span data-dcnode-id="6029" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6025" instrument_node="">
</span><link data-dcnode-id="6024" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6020" role="note"><span data-dcnode-id="6023" instrument_node="">Main article: </span><a data-dcnode-id="6021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priscilla_and_Aquila" title="Priscilla and Aquila"><span data-dcnode-id="6022" instrument_node="">Priscilla and Aquila</span></a></div><span data-dcnode-id="6019" instrument_node="">
</span><p data-dcnode-id="6004"><span data-dcnode-id="6018" instrument_node="">In Romans 16:3-5 Paul refers to the married couple Priscilla and Aquila as his "fellow workers" saying they risked their lives for him. Paul worked and seemingly lived with them for a considerable time, and they followed him to </span><a data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ephesus" title="Ephesus"><span data-dcnode-id="6017" instrument_node="">Ephesus</span></a><span data-dcnode-id="6015" instrument_node=""> before he left on his next missionary journey. In Acts 18:25,26 Luke says </span><a data-dcnode-id="6013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollos" title="Apollos"><span data-dcnode-id="6014" instrument_node="">Apollos</span></a><span data-dcnode-id="6012" instrument_node="">, a "learned man," came to Ephesus and began speaking in the synagogue.  When Priscilla and Aquilla heard him, they took him with them and "explained the way of God more accurately." Hayk Hovhannisyan says "either Priscilla was unaware of [Paul's doctrine that a woman shouldn't teach a man], which is virtually impossible; or she knew about it and decided to rebel--or the doctrine did not exist."</span><sup class="reference" data-dcnode-id="6009" id="cite_ref-Hayk_Hovhannisyan_99-2"><a data-dcnode-id="6010" href="#cite_note-Hayk_Hovhannisyan-99"><span data-dcnode-id="6011" instrument_node="">[99]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6006"><span data-dcnode-id="6007" title="Page / location: 275"><span data-dcnode-id="6008" instrument_node="">: 275 </span></span></sup><span data-dcnode-id="6005" instrument_node="">
</span></p><span data-dcnode-id="6003" instrument_node="">
</span><h4 data-dcnode-id="5993"><span class="mw-headline" data-dcnode-id="6001" id="Mary_of_Bethany"><span data-dcnode-id="6002" instrument_node="">Mary of Bethany</span></span><span class="mw-editsection" data-dcnode-id="5994"><span class="mw-editsection-bracket" data-dcnode-id="5999"><span data-dcnode-id="6000" instrument_node="">[</span></span><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D37" title="Edit section: Mary of Bethany"><span data-dcnode-id="5998" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5992" instrument_node="">
</span><link data-dcnode-id="5991" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5987" role="note"><span data-dcnode-id="5990" instrument_node="">Main article: </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_of_Bethany" title="Mary of Bethany"><span data-dcnode-id="5989" instrument_node="">Mary of Bethany</span></a></div><span data-dcnode-id="5986" instrument_node="">
</span><p data-dcnode-id="5977"><span data-dcnode-id="5985" instrument_node="">In Luke 10:39, the author says Mary sat "at Jesus feet."  The author "chooses terminology associated with rabbinic study (compare Acts 22:3), suggesting that Mary became Jesus' student."</span><sup class="reference" data-dcnode-id="5982" id="cite_ref-Stanley_J._Grenz_101-0"><a data-dcnode-id="5983" href="#cite_note-Stanley_J._Grenz-101"><span data-dcnode-id="5984" instrument_node="">[101]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5979"><span data-dcnode-id="5980" title="Page / location: 75"><span data-dcnode-id="5981" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="5978" instrument_node="">
</span></p><span data-dcnode-id="5976" instrument_node="">
</span><h4 data-dcnode-id="5966"><span class="mw-headline" data-dcnode-id="5974" id="Mary_Magdalene"><span data-dcnode-id="5975" instrument_node="">Mary Magdalene</span></span><span class="mw-editsection" data-dcnode-id="5967"><span class="mw-editsection-bracket" data-dcnode-id="5972"><span data-dcnode-id="5973" instrument_node="">[</span></span><a data-dcnode-id="5970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWomen_in_the_Bible%26action%3Dedit%26section%3D38" title="Edit section: Mary Magdalene"><span data-dcnode-id="5971" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5965" instrument_node="">
</span><link data-dcnode-id="5964" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5960" role="note"><span data-dcnode-id="5963" instrument_node="">Main article: </span><a data-dcnode-id="5961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Magdalene" title="Mary Magdalene"><span data-dcnode-id="5962" instrument_node="">Mary Magdalene</span></a></div><span data-dcnode-id="5959" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5945"><div class="thumbinner" data-dcnode-id="5946" style="width:332px;"><a class="image" data-dcnode-id="5957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlexander_Ivanov_-_Christ%2527s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg"><img alt="" class="thumbimage" data-dcnode-id="5958" data-file-height="3556" data-file-width="4725" decoding="async" height="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Alexander_Ivanov_-_Christ%2527s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg/330px-Alexander_Ivanov_-_Christ%2527s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Alexander_Ivanov_-_Christ%27s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg/495px-Alexander_Ivanov_-_Christ%27s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Alexander_Ivanov_-_Christ%27s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg/660px-Alexander_Ivanov_-_Christ%27s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg 2x" width="330"></a><span data-dcnode-id="5956" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5947"><div class="magnify" data-dcnode-id="5954"><a class="internal" data-dcnode-id="5955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlexander_Ivanov_-_Christ%2527s_Appearance_to_Mary_Magdalene_after_the_Resurrection_-_Google_Art_Project.jpg" title="Enlarge"></a></div><i data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">Appearance of Jesus Christ to Maria Magdalena</span></i><span data-dcnode-id="5951" instrument_node=""> (1835) by </span><a data-dcnode-id="5949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Andreyevich_Ivanov" title="Alexander Andreyevich Ivanov"><span data-dcnode-id="5950" instrument_node="">Alexander Andreyevich Ivanov</span></a><span data-dcnode-id="5948" instrument_node="">.</span></div></div></div><span data-dcnode-id="5944" instrument_node="">
</span><p data-dcnode-id="5929"><span data-dcnode-id="5943" instrument_node="">New Testament scholar Mary Ann Getty-Sullivan says Mary Magdalene, or Mary from the town of </span><a data-dcnode-id="5941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magdala" title="Magdala"><span data-dcnode-id="5942" instrument_node="">Magdala</span></a><span data-dcnode-id="5940" instrument_node="">, is sometimes "erroneously identified as the </span><i data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">sinner</span></i><span data-dcnode-id="5937" instrument_node=""> who anointed Jesus according to Luke's description in Luke 7:36-50. She is at times also confused with Mary of Bethany, the sister of Martha and Lazarus (John 12:1-8)",  and is sometimes assumed to be the woman caught in adultery (John 7:53-8:11), though there is nothing in the text to indicate that. Luke qualifies her as "one who was healed" but otherwise little is known about her. There is nothing to directly indicate Mary Magdalene was a former prostitute, and some scholars believe she was a woman of means who helped support Jesus and his ministry.</span><sup class="reference" data-dcnode-id="5934" id="cite_ref-Mary_Ann_Getty-Sullivan_102-0"><a data-dcnode-id="5935" href="#cite_note-Mary_Ann_Getty-Sullivan-102"><span data-dcnode-id="5936" instrument_node="">[102]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5931"><span data-dcnode-id="5932" title="Page / location: 183–187"><span data-dcnode-id="5933" instrument_node="">: 183–187 </span></span></sup><span data-dcnode-id="5930" instrument_node="">
</span></p><p data-dcnode-id="5884"><span data-dcnode-id="5928" instrument_node="">In </span><a class="extiw" data-dcnode-id="5926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Bible_%28King_James%29/John%2320%3A1" title="s:Bible (King James)/John"><span data-dcnode-id="5927" instrument_node="">John 20:1–13</span></a><span data-dcnode-id="5925" instrument_node="">, Mary Magdalene sees the risen Jesus alone and he tells her "Don't touch me, for I have not yet ascended to my father."</span><sup class="reference" data-dcnode-id="5922" id="cite_ref-103"><a data-dcnode-id="5923" href="#cite_note-103"><span data-dcnode-id="5924" instrument_node="">[103]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5919"><span data-dcnode-id="5920" title="Page / location: 464"><span data-dcnode-id="5921" instrument_node="">: 464 </span></span></sup><sup class="reference" data-dcnode-id="5916" id="cite_ref-104"><a data-dcnode-id="5917" href="#cite_note-104"><span data-dcnode-id="5918" instrument_node="">[104]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5913"><span data-dcnode-id="5914" title="Page / location: 228"><span data-dcnode-id="5915" instrument_node="">: 228 </span></span></sup><span data-dcnode-id="5912" instrument_node=""> New Testament scholar </span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Witherington_III" title="Ben Witherington III"><span data-dcnode-id="5911" instrument_node="">Ben Witherington III</span></a><span data-dcnode-id="5909" instrument_node=""> says John is the only evangelist with a "keen interest" in portraying women in Jesus' story, yet, the "only Easter event narrated by all four evangelists concerns the visit of the women to the tomb of Jesus."</span><sup class="reference" data-dcnode-id="5906" id="cite_ref-Ben_Witherington_III_105-0"><a data-dcnode-id="5907" href="#cite_note-Ben_Witheri
