</span><h2 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Jesus Is the Common Theme</span></h2><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="637" instrument_node="">In my new book, I begin by looking at the theme of </span><em data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">eschatology</span></em><span data-dcnode-id="634" instrument_node=""> or "the end." So I want to start by asking the question, How does knowing the end of the story influence the way we think about the story </span><em data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">now</span></em><span data-dcnode-id="631" instrument_node="">? And not just how does the end influence the way we think about it now, but how has the end actually been brought </span><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">into</span></em><span data-dcnode-id="628" instrument_node=""> the present? That reality frames the whole book. </span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">From there, we talk about God. Obviously God is the central character in the Bible, so I walk through how God's character is revealed and developed—if we can put it that way—as the message of the Bible unfolds from Genesis to Revelation.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">And then I begin to look at some of the key structural themes: </span></p><span data-dcnode-id="620" instrument_node="">
</span><ul data-dcnode-id="609"><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Covenant: how God makes covenants with his people that provide a structure for redemptive history. </span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Kingdom: how God advances his saving reign through these covenants. </span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Creation: how God begins with creation and he promises one day to make all things new again. </span></li><span data-dcnode-id="610" instrument_node="">
</span></ul><span data-dcnode-id="608" instrument_node="">
</span><div class="product-placement list-item clear" data-dcnode-id="577"><span data-dcnode-id="607" instrument_node="">
</span><div class="product-placement-image" data-dcnode-id="600"><span data-dcnode-id="606" instrument_node="">
</span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/books/the-whole-message-of-the-bible-in-16-words-tpb/"><span data-dcnode-id="605" instrument_node="">
</span><img alt="The Whole Message of the Bible in 16 Words" data-dcnode-id="604" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.crossway.org/studio-files/media/b656c6d8c7a7625a3ddd516c6b9db29142821f51.jpg&amp;raw"><span data-dcnode-id="603" instrument_node="">
</span></a><span data-dcnode-id="601" instrument_node="">
</span></div><span data-dcnode-id="599" instrument_node="">
</span><div class="post-excerpt" data-dcnode-id="579"><span data-dcnode-id="598" instrument_node="">
</span><h2 data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">
</span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/books/the-whole-message-of-the-bible-in-16-words-tpb/"><span data-dcnode-id="596" instrument_node="">The Whole Message of the Bible in 16 Words</span></a><span data-dcnode-id="594" instrument_node="">
</span></h2><span data-dcnode-id="592" instrument_node="">
</span><h3 data-dcnode-id="584"><span data-dcnode-id="591" instrument_node="">
</span><em data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">
</span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/authors/chris-bruno/"><span data-dcnode-id="589" instrument_node="">Chris Bruno</span></a><span data-dcnode-id="587" instrument_node="">
</span></em><span data-dcnode-id="585" instrument_node="">
</span></h3><span data-dcnode-id="583" instrument_node="">
</span><p class="copy-excerpt" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">This accessible overview of biblical theology traces the development of sixteen key themes from Genesis to Revelation, showing how each theme contributes to the one main storyline of Scripture.</span></p><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
