 data-dcnode-id="1441" id="options-menu"><div class="flex items-end caption1" data-dcnode-id="1448"><a aria-label="Copy Content" class="hover:no-underline optionButton items-center flex mr-2 text-primaryColor" data-dcnode-id="1449"><div class="items-center flex flex-row" data-dcnode-id="1450"><img alt="" class="mr-1 self-center" data-dcnode-id="1453" height="15" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/icons/copyTextIcon.svg&amp;raw" width="15"><span class="text-primaryColor" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Copy</span></span></div></a></div><div class="relative inline-block" data-dcnode-id="1442"><button class="h-3 focus:outline-none" data-dcnode-id="1443"><svg class="h-6 w-6 mt-px transform rotate-90" data-dcnode-id="1444" viewBox="0 0 24 24"><use data-dcnode-id="1445" fill="#3A78FC" xlink:href="#menu-dots"><svg data-dcnode-id="1446" id="menu-dots"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" data-dcnode-id="1447" fill="#3A78FC"></path></svg></use></svg></button></div></div></div><div class="w-full flex flex-col" data-dcnode-id="1340"><div class="mt-1" data-dcnode-id="1387"><div class="markdownStyles undefined" data-dcnode-id="1388" property="content"><div data-dcnode-id="1389"><p data-dcnode-id="1437"><span data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Another answer from our community:</span></span></p><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">The message of the Kingdom of God was the heart and core of Christ's teaching from the very beginning. Together, the Gospels of Matthew, Mark, Luke and John use the term "kingdom of God" in 53 verses. The gospel (Good News) that</span></p><p data-dcnode-id="1431"><a class="internal-link" data-dcnode-id="1433" data-link-target="https://www.answers.com/t/jesus-christ" data-link-text="Jesus Christ" data-phrase-id="10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/t/jesus-christ" id="link_phrase_10"><span data-dcnode-id="1434" instrument_node="">Jesus Christ</span></a><span data-dcnode-id="1432" instrument_node=""> brought is clearly about this Kingdom. Here are several verses:</span></p><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Luke 4:43 New King James Version (NKJV)</span></p><p data-dcnode-id="1425"><span data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">43</span></span><span data-dcnode-id="1426" instrument_node=""> but He said to them, "I must preach the kingdom of God to the other cities also, because for this purpose I have been sent."</span></p><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Luke 8:1 New King James Version (NKJV)</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1422" instrument_node="">Many Women Minister to Jesus </span><span data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">8</span></span><span data-dcnode-id="1419" instrument_node=""> Now it came to pass, afterward, that He went through every city and village, preaching and bringing the glad tidings of the kingdom of God. And the twelve </span><span data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">were</span></span><span data-dcnode-id="1416" instrument_node=""> with Him,</span></p><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Mark 1:14-15 New King James Version (NKJV)</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1412" instrument_node="">Jesus Begins His Galilean Ministry </span><span data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">14</span></span><span data-dcnode-id="1409" instrument_node=""> Now after John was put in prison, Jesus came to Galilee, preaching the gospel of the kingdom of God, </span><span data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">15</span></span><span data-dcnode-id="1406" instrument_node=""> and saying,"The time is fulfilled, and the kingdom of God is at hand. Repent, and believe in the gospel."</span></p><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Jesus gave this exact message to the Apostles to continue to spread throughout the world:</span></p><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Luke 9:1-2 New King James Version (NKJV)</span></p><p data-dcnode-id="1390"><span data-dcnode-id="1400" instrument_node="">Sending Out the Twelve </span><span data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">9</span></span><span data-dcnode-id="1397" instrument_node=""> Then He called His twelve disciples together and gave them power and authority over all demons, and to cure diseases.</span><span data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">2</span></span><span data-dcnode-id="1394" instrument_node=""> </span><span data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">He sent them to preach the kingdom of God</span></span><span data-dcnode-id="1391" instrument_node=""> and to heal the sick.</span></p></div></div></div><div class="flex items-center" data-dcnode-id="1374"><a class="hover:no-underline null" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/page/wiki-users"><span data-dcnode-id="1386" instrument_node=""> </span><img alt="User Avatar" class="avatar-h-15 avatar-img rounded-full z-10" data-dcnode-id="1385" name="user-avatar" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/images/avatars/wiki-user.svg&amp;raw"></a><a class="hover:no-underline" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/page/wiki-users"><span data-dcnode-id="1383" instrument_node=""> </span><p cla ned" data-dcnode-id="892"><div class="border rounded titleChip p-2 pb-1 mb-2 h-auto w-max bg-primaryExtraLight text-primaryColor" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">More answers</span></div><div data-dcnode-id="893" id="other-answers"><div data-dcnode-id="1242"></div><div class="grid grid-cols-1 cursor-pointer justify-start items-start" data-dcnode-id="981" id="answer_34642182" property="suggestedAnswer"><div class="flex justify-between" data-dcnode-id="1213"><div class="inline" data-dcnode-id="1228"><div class="flex items-center" data-dcnode-id="1229"><a class="hover:no-underline null" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/page/wiki-users"><span data-dcnode-id="1241" instrument_node=""> </span><img alt="User Avatar" class="avatar-h-15 avatar-img rounded-full z-10" data-dcnode-id="1240" name="user-avatar" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/images/avatars/wiki-user.svg&amp;raw"></a><a class="hover:no-underline" data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/page/wiki-users"><span data-dcnode-id="1238" instrument_node=""> </span><p class="text-primaryText caption2 ml-1 my-0" data-dcnode-id="1235"><span class="text-primaryColor" data-dcnode-id="1236" property="creator"><span data-dcnode-id="1237" instrument_node="">Wiki User</span></span></p></a><span class="caption2 text-charcoal -ml-1" data-dcnode-id="1230"><span data-dcnode-id="1233" instrument_node=""> ∙ </span><span data-dcnode-id="1231" instrument_node="">2015-06-26 05:07:46</span></span></div></div><div data-dcnode-id="1214"><div class="flex body1 bg-transparent h-6 pl-0 hover:bg-transparent no-underline" data-dcnode-id="1215" id="options-menu"><div class="flex items-end caption1" data-dcnode-id="1222"><a aria-label="Copy Content" class="hover:no-underline optionButton items-center flex mr-2 text-primaryColor" data-dcnode-id="1223"><div class="items-center flex flex-row" data-dcnode-id="1224"><img alt="" class="mr-1 self-center" data-dcnode-id="1227" height="15" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/icons/copyTextIcon.svg&amp;raw" width="15"><span class="text-primaryColor" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Copy</span></span></div></a></div><div class="relative inline-block" data-dcnode-id="1216"><button class="h-3 focus:outline-none" data-dcnode-id="1217"><svg class="h-6 w-6 mt-px transform rotate-90" data-dcnode-id="1218" viewBox="0 0 24 24"><use data-dcnode-id="1219" fill="#3A78FC" xlink:href="#menu-dots"><svg data-dcnode-id="1220" id="menu-dots"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" data-dcnode-id="1221" fill="#3A78FC"></path></svg></use></svg></button></div></div></div></div><div class="w-full flex flex-col" data-dcnode-id="982"><div class="mt-1" data-dcnode-id="1016"><div class="flex flex-col" data-dcnode-id="1017"><div class="markdownStyles undefined" data-dcnode-id="1018" property="content"><div data-dcnode-id="1019"><p data-dcnode-id="1192"><span data-dcnode-id="1212" instrument_node="">One of the most important themes of the ministry of Jesus is that he was the son of God. Surprisingly, however, Mark's Gospel, the first </span><a class="internal-link" data-dcnode-id="1210" data-link-target="https://www.answers.com/t/new-testament" data-link-text="New Testament" data-phrase-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/t/new-testament" id="link_phrase_400"><span data-dcnode-id="1211" instrument_node="">New Testament</span></a><span data-dcnode-id="1209" instrument_node=""> gospel to be written, treads very warily in making this claim for Jesus. Jesus and his followers do not call Jesus the son of God, but outsiders such as demons (event H in the following table, which summarises the parallel structure of the gospel) and the high priest (event S', answering event S) could be used to make this claim. On two occasions, God himself announces that Jesus is his beloved son, in whom he is well pleased. This can be seen at events C and C' of the framework chiastic structure of Mark's Gospel. Peter says, at event T that Jesus is the Christ, but Jesus says to tell no one of this; then at event T' Peter denies Jesus three times.</span><br data-dcnode-id="1208"><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">A well-disguised theme in </span><span data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Mark</span></span><span data-dcnode-id="1203" instrument_node=""> is of Jesus as the second Elijah and the second Moses. 1 Kings 19:5-7 says that Elijah was ministered by an angel and in the wilderness forty days. Exodus 34:28 says that Moses also fasted for 40 days while he wrote the words of the Ten Commandments on tablets. Mark's Gospel then draws a very strong parallel between those events and the forty days that Jesus spent in the wilderness, ministered by an angel. There is no actual suggestion in </span><span data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Mark</span></span><span data-dcnode-id="1200" instrument_node=""> that Jesus fasted for this time, but those familiar with the story of Elijah are likely to have assumed he did do so. This brings into play another allusion, to Moses when he fasted for 40 days while he wrote the words of the Ten Commandments on tablets. </span><span data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Mark</span></span><span data-dcnode-id="1197" instrument_node=""> encouraged this association by linking the forty days in the wilderness (event D) to the appearance of Elijah and Moses (event D') at the Transfiguration, which also reflects the baptism and the voice of God from heaven. In Matthew's Gospel, the accent moves to Jesus more as the second Moses, rather than Elijah.</span><br data-dcnode-id="1196"><br data-dcnode-id="1195"><span data-dcnode-id="1194" instrument_node="">A well-known theme of Mark's Gospel is that the disciples did not understand. This is no more evident than in a group of miracles and discourses with continuous themes of food and of the disciples not understanding, Mark 6:33-8:21:</span><br data-dcnode-id="1193"></p><ul data-dcnode-id="1171"><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Jesus and the disciples had no leisure so much as to eat, so they went into a desert place</span></li><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Feeding the 5000</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">When Jesus walked on water the disciples were amazed, for they considered not the miracle of the loaves</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Pharisees complain about the disciples eating with unwashed hands</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Discourse - what goes into a man goes into his belly and does not defile</span></li><li data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Jesus tells the Greek woman that he must first feed the children (the Jews), to which she metaphorically begs for crumbs from the table</span></li><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Feeding the 4000</span></li><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Disciples are hungry and have only one loaf of bread</span></li><li data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Jesus warns the disciples about the leaven of the Pharisees and they reason, "It is because we have no bread," showing they do not understand</span></li><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Summary by Jesus of the two feasts, asking, "How is it that ye do not understand?"</span></li></ul><span data-dcnode-id="1170" instrument_node="">This group of miracles and discourses forms event R in the framework structure, matched by the Last Supper (event R').</span><br data-dcnode-id="1169"><br data-dcnode-id="1168"><br data-dcnode-id="1167"><span data-dcnode-id="1166" instrument_node="">An important theme throughout the gospels is the forgiveness of sins. Today, the crucifixion and resurrection of Jesus are recognised as being for the forgiveness of sins, stated most clearly in Ephesians 1:7 and Colossians 1:14. But it was not always so, because Mark's Gospel originally ended at verse 16:8, with no physical resurrection. Putting aside the 'Long Ending' (verses 16:9-20), as well as the resurrection appearances of the gospels written some time after </span><span data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Mark</span></span><span data-dcnode-id="1163" instrument_node="">, this gospel was uniquely a gospel of hope. The promise of </span><span data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Mark</span></span><span data-dcnode-id="1160" instrument_node=""> was not the physical resurrection, but the second coming - verse 9:1 (event X) and chapter 13 (event X').</span><br data-dcnode-id="1159"><p data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">A . </span><span data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">John explains the coming of Jesus</span></span><span data-dcnode-id="1155" instrument_node=""> (Mark 1:1-8)</span></p><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">B .The baptism of Jesus (1:9)</span></p><p data-dcnode-id="1149"><span data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">C . The voice of God from heaven, "Thou art my beloved son" (1:11)</span></span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">D . The forty days in the wilderness as an allusion to Elijah and Moses (1:13)</span></span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">E . The people were astonished at what Jesus taught (1:22)</span></p><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">F . Jesus casts out an unclean spirit (1:23-26)</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">G . Pharisees took counsel with the Herodians how they might destroy Jesus (3:6)</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137"><span data-dcnode-id="1139" instrument_node="">H . Demons, whenever they see Jesus, fall down and say that he is the Son of God.</span><br data-dcnode-id="1138"></span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">-- Jesus commands that they tell no one of this (3:11-12)</span></span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">I .. Jesus calls the 12 disciples (3:13-19)</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">J .. Jesus rejects his own family: he has a new family, his followers (3:31-35)</span></p><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">K . Jesus rebukes the wind (4:36-41)</span></p><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">L . The demoniac, wearing no clothes (5:15), cries out that Jesus not torment him and Jesus sends out the demons (5:1-20)</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1124" instrument_node="">M . Jesus comes into his own country (6:1)</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">-- Where he was brought up</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">N . The people misunderstand Jesus and he can do no mighty work (6:2-6)</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1118" instrument_node="">O . Jesus sends out the disciples and curses those who will not receive them (6:7-11)</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">-- in sending the disciples with authority and expecting all to receive them, Jesus is asserting his own authority</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">P . Herod thinks that Jesus is </span><a class="internal-link" data-dcnode-id="1112" data-link-target="https://www.answers.com/t/john-the-baptist" data-link-text="John the Baptist" data-phrase-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/t/john-the-baptist" id="link_phrase_1236"><span data-dcnode-id="1113" instrument_node="">John the Baptist</span></a><span data-dcnode-id="1111" instrument_node=""> risen from the dead (6:14)</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Q . Herodias and her daughter conspire to kill John the Baptist (6:16-29)</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">R . Feeding the thousands, and related miracles and discourses (6:33-8:21)</span></span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">S . Who do people say that I am (8:27)</span></span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">T . Peter affirms faith in Jesus as the Christ (8:29)</span></span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">U . Whosoever shall be ashamed of me: of him also shall the Son of man be ashamed (8:38)</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">V . The Son of Man must suffer many things and be rejected by the elders, chief priests and scribes (8:31a)</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">W . Be killed and after three days rise again (8:31b)</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">X . Prophecy of second coming (9:1)- Jesus tells the disciples that some of them would not taste death until they saw the kingdom of God coming with power.</span></span></p><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">B' .The Transfiguration of Jesus (9:2-3)</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">C' .The voice of God from heaven, "This is my beloved son" (9:7)</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">D' . Jesus talks to Elijah and Moses then to the disciples about Elijah (9:4-13)</span></span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">E' .A great multitude was amazed at Jesus (9:15)</span></p><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">F' .Jesus cast out a dumb spirit (9:17-27)</span></p><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">G' .They shall kill the Son of man and he shall rise on the third day (9:31)</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">H' .Jesus clarifies his divine status, saying that he is not God: "Why call me good? There is none good but God" (10:18)</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">I' . Peter says the disciples have left all and followed Jesus (10:28)</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">J' . Those who have left their family for Jesus have a new family: all Jesus' followers (10:29-30)</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">K'. Jesus rebukes the 'sons of thunder', James and John (10:35-45 - cf 3:17)</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">L' .Blind Bartimaeus cries out for mercy and casts off his clothes, then Jesus heals him (10:46-52)</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1066" instrument_node="">M' .Jesus comes into </span><a class="internal-link" data-dcnode-id="1064" data-link-target="https://www.answers.com/t/jerusalem" data-link-text="Jerusalem" data-phrase-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/t/jerusalem" id="link_phrase_3053"><span data-dcnode-id="1065" instrument_node="">Jerusalem</span></a><span data-dcnode-id="1063" instrument_node=""> (11:1-10)</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">-- Where he will die</span></p><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">N' .Jesus misunderstands the fig tree that can provide no fruit (11:13-14)</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1057" instrument_node="">O' .Jesus casts out them that sold and bought in the Temple and curses them for making the Temple a den of thieves (11:15-17)</span><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">-- Jesus is asserting his authority</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">P' .Jesus asks whether the baptism of John is from heaven or of men, and the priests, scribes and elders can not answer (11:30-33)</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Q' .Parable of husbandmen who conspire to kill the vineyard owner's son (12:1-9)</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">X' .Prophecy of second coming (chapter 13)</span></span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">-- on clouds of glory, within the lifetimes of some of those to whom he was speaking</span></span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">R' .The Last Supper (14:17-25)</span></span></p><p data-dcnode-id="1038"><span data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">S' .Art thou the Christ, Son of God (14:61)</span></span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">T' .Peter denies Jesus three times (14:66-72a)</span></span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">U' .And when he thought thereon, Peter wept (14:72b)</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">V' .The chief priests, elders and scribes delivered Jesus to Pontius Pilate (15:1)</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1030" instrument_node="">-- Delivering Jesus is a similar concept to rejecting him.</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">-- Both parts of the pair involve chief priests, elders and scribes</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">W' .Jesus dies and on the third day rises again (15:37, 16:6)</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1024" instrument_node="">A' .</span><span data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">The young man explains the departure of Jesus</span></span><span data-dcnode-id="1021" instrument_node="">(16:6-8)</span></p></div></div></div></div><div class="w-full items-end mt-4" data-dcnode-id="993"><div data-dcnode-id="994"><span class="caption3" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">This answer is:</span></span><div class="mt-1 self-center rounded-md flex items-center votebutton-spaced" data-dcnode-id="995"><button aria-label="up vote" class="mr-2 py-2 px-4 caption2 h-8 min-w-max items-center border border-solid focus:outline-none border-primaryLight rounded-md md:w-1/4 w-full" data-dcnode-id="1005" value=""><span class="vote-emoji mr-1" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">👍</span></span><span class="mdSm:contents" data-dcnode-id="1006"><span data-dcnode-id="1011" instrument_node=""> Helpful (</span><span data-dcnode-id="1009" instrument_node="">0</span><span data-dcnode-id="1007" instrument_node="">)</span></span></button><button aria-label="down vote" class="py-2 px-4 caption2 h-8 min-w-max items-center border border-solid focus:outline-none border-primaryLight rounded-md w-full mr-0 md:w-1/4 md:mr-2" data-dcnode-id="996" value=""><span class="vote-emoji mr-1" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">👎</span></span><span class="mdSm:contents" data-dcnode-id="997"><span data-dcnode-id="1002" instrument_node=""> Not Helpful (</span><span data-dcnode-id="1000" instrument_node="">0</span><span data-dcnode-id="998" instrument_node="">) </span></span></button></div></div></div><button class="caption1 text-primaryColor text-left hover:underline my-4" data-dcnode-id="991" property="commentCount"><span data-dcnode-id="992" instrument_node="">Add a Comment</span></button><div class="flex w-full border border-solid border-primaryLight rounded-md" data-dcnode-id="984"><div class="ml-2 mt-1.5 w-9" data-dcnode-id="988"><a data-dcnode-id="989"><img alt="User Avatar" class="avatar-h-20 avatar-img" data-dcnode-id="990" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/images/avatars/default.png&amp;raw"></a></div><textarea class="mr-2 body1 placeholder-charcoal rounded-md resize-none shadow-none outline-none w-full h-8 max-h-8 overflow-y-auto overflow-x-hidden pt-1 cursor-text" data-dcnode-id="987" id="comment-input-box" max="255" placeholder="Add comment..."></textarea><div class="mr-2 self-center" data-dcnode-id="985"><img alt="" class="self-center" data-dcnode-id="986" height="24" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/icons/sendIcon.svg&amp;raw" width="24"></div></div><div class="mt-4" data-dcnode-id="983"></div></div></div><div data-dcnode-id="979"><hr class="w-full my-4 bg-black opacity-10" data-dcnode-id="980"></div><div data-dcnode-id="978"></div><div class="grid grid-cols-1 cursor-pointer justify-start items-start" data-dcnode-id="894" id="answer_34643107" property="suggestedAnswer"><div class="flex justify-between" data-dcnode-id="950"><div class="inline" data-dcnode-id="965"><div class="flex items-center" data-dcnode-id="966"><a data-dcnode-id="976"><img alt="User Avatar" class="avatar-h-15 avatar-img" data-dcnode-id="977" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/images/avatars/default.png&amp;raw"></a><a class="hover:no-underline" data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/page/wiki-users"><span data-dcnode-id="975" instrument_node=""> </span><p class="text-primaryText caption2 ml-1 my-0" data-dcnode-id="972"><span class="text-primaryColor" data-dcnode-id="973" property="creator"><span data-dcnode-id="974" instrument_node="">Wiki User</span></span></p></a><span class="caption2 text-charcoal -ml-1" data-dcnode-id="967"><span data-dcnode-id="970" instrument_node=""> ∙ </span><span data-dcnode-id="968" instrument_node="">2015-06-27 17:30:47</span></span></div></div><div data-dcnode-id="951"><div class="flex body1 bg-transparent h-6 pl-0 hover:bg-transparent no-underline" data-dcnode-id="952" id="options-menu"><div class="flex items-end caption1" data-dcnode-id="959"><a aria-label="Copy Content" class="hover:no-underline optionButton items-center flex mr-2 text-primaryColor" data-dcnode-id="960"><div class="items-center flex flex-row" data-dcnode-id="961"><img alt="" class="mr-1 self-center" data-dcnode-id="964" height="15" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.answers.com/icons/copyTextIcon.svg&amp;raw" width="15"><span class="text-primaryColor" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Copy</span></span></div></a></div><div class="relative inline-block" data-dcnode-id="953"><button class="h-3 focus:outline-none" data-dcnode-id="954"><svg class="h-6 w-6 mt-px transform rotate-90" data-dcnode-id="955" viewBox="0 0 24 24"><use data-dcnode-id="956" fill="#3A78FC" xlink:href="#menu-dots"><svg data-dcnode-id="957" id="menu-dots"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" data-dcnode-id="958" fill="#3A78FC"></path></svg></use></svg></button></div></div></div></div><div class="w-full flex flex-col" data-dcnode-id="895"><div class="mt-1" data-dcnode-id="929"><div class="flex flex-col" data-dcnode-id="930"><div class="markdownStyles undefined" data-dcnode-id="931" property="content"><p data-dcnode-id="932"><span data-dcnode-id="949" instrument_node="">The very first is found here:</span><br data-dcnode-id="948"><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">Mark 1:14-15New King James Version (NKJV)Jesus Begins His Galilean Ministry14 Now after John was put in prison, Jesus came to Galilee, preaching the gospel of the kingdom of God, 15 and saying, The time is fulfilled, and the kingdom of God is at hand. Repent, and believe in the gospel.</span><br data-dcnode-id="945"><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">Another is found here:</span><br data-dcnode-id="942"><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">Matthew 5:17New King James Version (NKJV)Christ Fulfills the Law17 Do not think that I came to destroy the Law or the Prophets. I did not come to destroy but to fulfill.</span><br data-dcnode-id="939"><br data-dcnode-id="938"><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">And another is here with many more:<
